id: DEU.10.18
reference: Deuteronomy 10:18
source:
  edition: WLC
  text: עֹשֶׂ֛ה מִשְׁפַּ֥ט יָת֖וֹם וְ/אַלְמָנָ֑ה וְ/אֹהֵ֣ב גֵּ֔ר לָ֥/תֶת ל֖/וֹ לֶ֥חֶם
    וְ/שִׂמְלָֽה׃
translation:
  text: He executes justice for the fatherless and the widow, and loves the sojourner,
    giving him food and clothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the orphan.' Hebrew יָתוֹם refers to one deprived of a father; 'fatherless'
      preserves the legal-social nuance of the Hebrew expression.
    reason: lexical_alternative
  - marker: b
    text: Or 'the resident foreigner' or 'the foreigner.' Hebrew גֵּר denotes a non-native
      living among Israel, not merely a passing stranger.
    reason: lexical_alternative
  - marker: c
    text: Literally 'bread and clothing.' 'Food and clothing' expresses the sense
      of basic provision in natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹשֶׂה
  chosen: executes
  alternatives:
  - does
  - works
  - accomplishes
  lexicon: HALOT
  rationale: With מִשְׁפָּט as its object, the idiom means to carry out or administer
    justice, not merely to 'do' in a generic sense. 'Executes justice' is natural
    English and preserves the judicial force.
- source_word: מִשְׁפַּט
  chosen: justice
  alternatives:
  - judgment
  - legal right
  - case
  lexicon: HALOT
  rationale: Here the sense is the just cause or justice due to vulnerable persons.
    'Justice' communicates the ethical-judicial meaning better than the more archaic
    'judgment'.
- source_word: יָתוֹם
  chosen: the fatherless
  alternatives:
  - the orphan
  lexicon: HALOT
  rationale: The Hebrew denotes one deprived of a father. 'Fatherless' is a traditional
    and precise rendering in this legal-social pairing, though 'orphan' is a close
    alternative.
- source_word: אַלְמָנָה
  chosen: the widow
  lexicon: HALOT
  rationale: Standard and precise rendering for the vulnerable social category named
    in the text.
- source_word: אֹהֵב
  chosen: loves
  alternatives:
  - shows love to
  - has love for
  lexicon: HALOT
  rationale: The participle expresses God's active disposition toward the גֵּר. 'Loves'
    is the most direct and transparent rendering.
- source_word: גֵּר
  chosen: the sojourner
  alternatives:
  - the foreigner
  - the resident foreigner
  - the stranger
  lexicon: HALOT
  rationale: גֵּר refers not to a mere passerby but to a non-native residing among
    Israel. 'Sojourner' preserves the covenantal-legal nuance better than 'stranger,'
    while avoiding the potentially too broad 'foreigner'.
- source_word: לָתֶת לוֹ
  chosen: giving him
  alternatives:
  - to give him
  - by giving him
  lexicon: HALOT
  rationale: The infinitive expresses the concrete manner in which God's love is shown.
    Rendering it as 'giving him' connects smoothly to the English participial flow
    while preserving the action.
- source_word: לֶחֶם
  chosen: food
  alternatives:
  - bread
  lexicon: HALOT
  rationale: Although literally 'bread,' in this collocation with clothing it functions
    as a synecdoche for sustenance. 'Food' communicates the plain sense in modern
    English without unnecessary narrowing.
- source_word: שִׂמְלָה
  chosen: clothing
  alternatives:
  - garment
  - cloak
  lexicon: HALOT
  rationale: A general term for clothing or garment. 'Clothing' fits the paired provision
    of basic necessities in contemporary English.
