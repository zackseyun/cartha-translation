theological_decisions:
- issue: Divine concern for vulnerable groups
  chosen_reading: Render the verse as describing God's concrete acts of justice and
    provision for socially vulnerable persons without importing broader doctrinal
    claims.
  alternative_readings:
  - Emphasize only legal advocacy
  - Emphasize only emotional compassion
  rationale: The Hebrew presents both judicial action ('executes justice') and affectionate
    commitment ('loves') expressed in material provision. The translation preserves
    both dimensions without reducing one to the other.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
