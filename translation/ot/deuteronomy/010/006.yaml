id: DEU.10.6
reference: Deuteronomy 10:6
source:
  edition: WLC
  text: וּ/בְנֵ֣י יִשְׂרָאֵ֗ל נָֽסְע֛וּ מִ/בְּאֵרֹ֥ת בְּנֵי יַעֲקָ֖ן מוֹסֵרָ֑ה שָׁ֣ם
    מֵ֤ת אַהֲרֹן֙ וַ/יִּקָּבֵ֣ר שָׁ֔ם וַ/יְכַהֵ֛ן אֶלְעָזָ֥ר בְּנ֖/וֹ תַּחְתָּֽי/ו־׃
translation:
  text: Now the sons of Israel journeyed from Beeroth Bene-jaakan to Moserah. There
    Aaron died, and there he was buried; and Eleazar his son served as priest in his
    place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Beeroth Bene-jaakan may be understood literally as 'the wells of the sons
      of Jaakan,' but it is rendered here as a place name by transliteration.
    reason: lexical_alternative
  - marker: b
    text: Or 'Eleazar his son served as priest after him.' The Hebrew literally says
      'in his place,' indicating succession.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְנֵי יִשְׂרָאֵל
  chosen: Now the sons of Israel
  alternatives:
  - And the sons of Israel
  - The Israelites
  lexicon: HALOT
  rationale: ו conjunction plus construct phrase literally means 'and/now the sons
    of Israel.' 'Sons of Israel' preserves the Hebrew expression and its genealogical-national
    force better than the smoother 'Israelites.' 'Now' is chosen for the conjunction
    because this verse functions as a narrative aside/transition rather than a simple
    additive clause.
- source_word: נָסְעוּ
  chosen: journeyed
  alternatives:
  - set out
  - traveled
  lexicon: HALOT
  rationale: The verb נסע in travel contexts denotes breaking camp and moving on.
    'Journeyed' is natural modern English while retaining the wilderness-travel sense
    better than the more generic 'traveled.'
- source_word: מִ/בְּאֵרֹת בְּנֵי יַעֲקָן
  chosen: from Beeroth Bene-jaakan
  alternatives:
  - from the wells of the sons of Jaakan
  - from Beeroth of the sons of Jaakan
  lexicon: HALOT
  rationale: This is a place name in the wilderness itinerary. Following the philosophy
    to transliterate names, the toponym is kept as 'Beeroth Bene-jaakan' rather than
    translated. The prefixed מִן is rendered 'from.'
- source_word: מוֹסֵרָה
  chosen: to Moserah
  alternatives:
  - Moserah
  lexicon: HALOT
  rationale: Although no explicit preposition precedes מוֹסֵרָה, the travel formula
    after 'journeyed from' implies destination, so idiomatic English supplies 'to.'
    The place name is transliterated.
- source_word: שָׁם
  chosen: There
  alternatives:
  - there
  lexicon: HALOT
  rationale: The adverb marks location emphatically in both occurrences. Capitalized
    at sentence start in English, then repeated as 'there' to preserve the Hebrew
    repetition.
- source_word: מֵת אַהֲרֹן
  chosen: Aaron died
  alternatives:
  - Aaron died there
  lexicon: HALOT
  rationale: 'Hebrew word order is adverb + verb + subject: ''there died Aaron.''
    English normally places the subject before the verb; the preceding ''There'' preserves
    the locative emphasis.'
- source_word: וַ/יִּקָּבֵר
  chosen: he was buried
  alternatives:
  - and he was buried
  - and they buried him
  lexicon: HALOT
  rationale: The Niphal form is passive/reflexive in sense, so 'he was buried' is
    the most straightforward rendering. It should not be converted into an active
    plural without textual warrant.
- source_word: וַ/יְכַהֵן
  chosen: served as priest
  alternatives:
  - became priest
  - ministered as priest
  - officiated as priest
  lexicon: HALOT
  rationale: כהן as a verb means to act or serve as priest. 'Served as priest' is
    clear modern English and avoids implying merely accession ('became priest') rather
    than actual priestly function.
- source_word: אֶלְעָזָר בְּנוֹ תַּחְתָּיו
  chosen: Eleazar his son served as priest in his place
  alternatives:
  - Eleazar his son served as priest after him
  - Eleazar his son became priest in his stead
  lexicon: HALOT
  rationale: תחתיו literally means 'under him/in place of him,' indicating succession.
    'In his place' is idiomatic and preserves the succession sense without archaic
    diction.
