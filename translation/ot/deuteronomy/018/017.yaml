id: DEU.18.17
reference: Deuteronomy 18:17
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר יְהוָ֖ה אֵלָ֑/י הֵיטִ֖יבוּ אֲשֶׁ֥ר דִּבֵּֽרוּ׃
translation:
  text: And Yahweh said to me, ‘They have spoken well.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'They have done well what they have spoken.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces the next event in narrative sequence. 'And ... said' preserves the Hebrew narrative flow in natural English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition אֶל with 1cs suffix straightforwardly means 'to me.' Modern English prefers 'to me' over archaic 'unto me.'
- source_word: הֵיטִיבוּ
  chosen: have spoken well
  alternatives:
  - have done well
  - have spoken rightly
  lexicon: HALOT
  rationale: 'The Hiphil of יטב means ''to do well, act well, be good.'' In this clause it evaluates the content of what was said, so English idiom is best captured by folding the evaluation into the following relative clause: ''have spoken well.'' This avoids the awkwardly literal ''They have done well what they have spoken'' while preserving the commendation.'
- source_word: אֲשֶׁר
  chosen: implicit in 'have spoken well'
  alternatives:
  - that
  - what
  lexicon: HALOT
  rationale: 'The relative particle links the commendation to the preceding verb: literally, ''They have done well what/that they spoke.'' English idiom normally absorbs the relative into ''have spoken well'' rather than retaining a wooden ''what they spoke.'''
- source_word: דִּבֵּרוּ
  chosen: spoken
  alternatives:
  - said
  lexicon: HALOT
  rationale: Piel perfect of דבר means 'speak.' 'Spoken' pairs naturally with the evaluative phrase and reflects the completed action.
