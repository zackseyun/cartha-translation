theological_decisions:
- issue: Potential messianic specificity of 'a prophet like me'
  chosen_reading: Main text preserves the immediate wording as an indefinite singular prophet while allowing broader canonical/messianic significance to be inferred rather than inserted.
  alternative_readings:
  - an explicitly messianic rendering such as 'the Prophet'
  - a purely collective reading referring only to the prophetic institution
  rationale: The Hebrew text itself says 'a prophet like me' and does not explicitly supply the later christological identification in the wording of the verse. In keeping with optimal equivalence and the instruction not to import doctrinal claims the text does not make, the translation preserves the source wording while leaving canonical interpretation to footnote or cross-reference.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
- issue: Rendering of אָח / 'brothers' in representative sense
  chosen_reading: Retain 'brothers' in the main text with explanatory footnote.
  alternative_readings:
  - fellow Israelites
  - kinsmen
  - brothers and sisters
  rationale: The doctrine excerpt directs gender-accurate over gender-neutral renderings where the source is grammatically masculine with representative force. 'Brothers' best reflects the Hebrew form; a footnote can clarify the communal reference.
  doctrine_reference: Translation philosophy §4
