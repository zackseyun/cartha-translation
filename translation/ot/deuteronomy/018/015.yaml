id: DEU.18.15
reference: Deuteronomy 18:15
source:
  edition: WLC
  text: נָבִ֨יא מִ/קִּרְבְּ/ךָ֤ מֵ/אַחֶ֨י/ךָ֙ כָּמֹ֔/נִי יָקִ֥ים לְ/ךָ֖ יְהוָ֣ה אֱלֹהֶ֑י/ךָ אֵלָ֖י/ו תִּשְׁמָעֽוּ/ן׃
translation:
  text: Yahweh your God will raise up for you a prophet like me from among you, from your brothers; you must listen to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from your midst, from your fellow Israelites.' The Hebrew 'from your brothers' uses a masculine kinship term that here refers to members of Israel generally.
    reason: lexical_alternative
  - marker: b
    text: This verse is later applied to the Messiah in the New Testament; the Hebrew here, however, reads simply 'a prophet like me.'
    reason: cross_reference
lexical_decisions:
- source_word: נָבִיא
  chosen: a prophet
  alternatives:
  - prophet
  lexicon: HALOT
  rationale: Indefinite singular is natural in English here. The term denotes one who speaks on God's behalf; 'a prophet' preserves the Hebrew singular without over-specifying identity in the main text.
- source_word: מִקִּרְבְּךָ
  chosen: from among you
  alternatives:
  - from your midst
  - from among your people
  lexicon: HALOT
  rationale: Literally 'from your midst.' 'From among you' is idiomatic modern English and preserves the sense of arising from within Israel rather than from outside.
- source_word: מֵאַחֶיךָ
  chosen: from your brothers
  alternatives:
  - from your brethren
  - from your fellow Israelites
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine plural and in Deuteronomic usage refers to fellow members of Israel. Per translation philosophy, the masculine form is retained as gender-accurate rather than flattened to a gender-neutral paraphrase; the representative sense can be noted in a footnote.
- source_word: כָּמֹנִי
  chosen: like me
  alternatives:
  - as I am
  - like myself
  lexicon: HALOT
  rationale: Direct comparison to Moses is best rendered simply and clearly as 'like me.'
- source_word: יָקִים לְךָ
  chosen: will raise up for you
  alternatives:
  - will appoint for you
  - will establish for you
  lexicon: HALOT
  rationale: The Hiphil of קום here commonly means 'raise up' in the sense of bringing forth or appointing. 'Raise up for you' preserves both the verbal imagery and the benefactive sense of לְךָ.
- source_word: יְהוָה אֱלֹהֶיךָ
  chosen: The LORD your God
  alternatives:
  - Yahweh your God
  lexicon: HALOT
  rationale: Per doctrine guidelines, יְהוָה is rendered 'the LORD.' The covenantal phrase is standardly and accurately rendered 'the LORD your God.'
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - him
  lexicon: HALOT
  rationale: The preposition is explicit in Hebrew. English idiom with 'listen' can omit or include 'to'; here it is retained to reflect the source more closely.
- source_word: תִּשְׁמָעוּן
  chosen: you must listen
  alternatives:
  - you shall listen
  - you are to listen
  - you must obey
  lexicon: HALOT
  rationale: שׁמע can mean hear/listen/obey depending on context. Here the command concerns heeding the prophet's words. 'You must listen' captures the imperative force in clear modern English without over-interpreting as full 'obey' in the main text.
