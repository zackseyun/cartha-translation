theological_decisions:
- issue: Interpretation of the final clause מִמְכָּרָיו עַל הָאָבוֹת
  chosen_reading: The clause refers to private income derived from ancestral/family
    property or patrimonial rights, which is additional to the equal priestly share.
  alternative_readings:
  - besides what he receives from selling family possessions
  - besides what is due to him by ancestral houses
  - except for sales made according to the fathers
  rationale: The Hebrew is syntactically compressed and has been understood in several
    ways. The broader context concerns Levites receiving equal support when they come
    to minister at the central sanctuary. The most coherent reading is that they receive
    equal cultic portions regardless of any separate personal income tied to family
    inheritance or patrimonial assets. This preserves the text's practical point without
    importing later doctrinal claims.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
