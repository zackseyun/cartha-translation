id: DEU.18.8
reference: Deuteronomy 18:8
source:
  edition: WLC
  text: חֵ֥לֶק כְּ/חֵ֖לֶק יֹאכֵ֑לוּ לְ/בַ֥ד מִמְכָּרָ֖י/ו עַל הָ/אָבֽוֹת־׃ס
translation:
  text: They shall eat equal portions, besides what comes from the sale of his patrimony.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'besides what he receives from selling family possessions'; the Hebrew
      of the final clause is difficult and may refer more generally to income connected
      with his ancestral house.
    reason: alternative_reading
lexical_decisions:
- source_word: חֵלֶק
  chosen: portion
  alternatives:
  - share
  - allotment
  lexicon: HALOT
  rationale: חֵלֶק denotes a share or allotted portion. In this priestly-support context,
    'portion' is natural English and fits the idiom of receiving sustenance.
- source_word: כְּחֵלֶק
  chosen: equal portions
  alternatives:
  - like portion
  - share alike
  lexicon: HALOT
  rationale: 'The construction חֵלֶק כְּחֵלֶק is idiomatic, expressing equivalence:
    ''portion like portion,'' i.e., equal shares. Rendering the phrase as ''equal
    portions'' communicates the distributive sense clearly in English.'
- source_word: יֹאכֵלוּ
  chosen: they shall eat
  alternatives:
  - they may eat
  - they shall receive for food
  lexicon: HALOT
  rationale: The verb is literally 'eat,' commonly used for consuming or enjoying
    allotted provisions. Retaining 'eat' preserves the concrete idiom of priestly
    support rather than abstracting it to 'receive'.
- source_word: לְבַד
  chosen: besides
  alternatives:
  - apart from
  - except for
  lexicon: HALOT
  rationale: לְבַד marks something additional or separate. Here it introduces an exception/addition
    to the equal share, best rendered 'besides' in smooth modern English.
- source_word: מִמְכָּרָיו
  chosen: what comes from the sale of his patrimony
  alternatives:
  - his sales
  - the proceeds of his sale
  - what he sells
  lexicon: HALOT
  rationale: מִמְכָּרָיו refers to sale(s) or proceeds from sale. In context, the
    Levite may have private resources connected with ancestral property or rights.
    'What comes from the sale of his patrimony' makes explicit the likely sense without
    over-paraphrasing.
- source_word: עַל הָאָבוֹת
  chosen: of his patrimony
  alternatives:
  - according to the fathers
  - from his ancestral estate
  - by reason of his fathers
  lexicon: HALOT
  rationale: Literally 'upon the fathers' is elliptical. In context it most plausibly
    refers to what belongs to him by family lineage or ancestral house. 'Of his patrimony'
    captures the inherited-family sense in idiomatic English while remaining concise.
