theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This preserves reverential convention without altering the verse's meaning.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered kinship term אֶחָיו
  chosen_reading: his brothers
  alternative_readings:
  - his fellow Levites
  rationale: The Hebrew uses a masculine kinship term. Per translation philosophy,
    gender-accurate rendering is preferred unless context clearly demands a generic
    paraphrase. Since the appositive 'the Levites' immediately clarifies the referent,
    'his brothers' can be retained without confusion.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
