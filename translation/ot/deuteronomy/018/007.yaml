id: DEU.18.7
reference: Deuteronomy 18:7
source:
  edition: WLC
  text: וְ/שֵׁרֵ֕ת בְּ/שֵׁ֖ם יְהוָ֣ה אֱלֹהָ֑י/ו כְּ/כָל אֶחָי/ו֙ הַ/לְוִיִּ֔ם הָ/עֹמְדִ֥ים
    שָׁ֖ם לִ/פְנֵ֥י יְהוָֽה־׃
translation:
  text: then he may minister in the name of the LORD his God, like all his brothers
    the Levites who stand there before the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and he shall minister.' The Hebrew imperfect can be rendered with either
      permissive ('may') or more direct future force depending on how the legal context
      is expressed in English.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his brothers,' that is, his fellow Levites.
    reason: lexical_alternative
  - marker: c
    text: Hebrew YHWH, traditionally rendered 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְשֵׁרֵת
  chosen: then he may minister
  alternatives:
  - and he shall minister
  - and he may serve
  lexicon: HALOT
  rationale: Piel of שׁרת commonly denotes ministerial/service activity, especially
    cultic service. 'Minister' better captures priestly/Levitical service than the
    broader 'serve.' The prefixed conjunction continues the legal provision from the
    previous verse; 'then' makes the resultative sense natural in English while preserving
    the permissive/imperfect force with 'may.'
- source_word: בְּשֵׁם
  chosen: in the name of
  alternatives:
  - by the name of
  lexicon: HALOT
  rationale: The idiom בְּשֵׁם regularly means acting under the authority/invocation
    of a name. 'In the name of' is the standard and most natural English equivalent.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the pattern reflected in the
    Septuagint tradition.
- source_word: אֱלֹהָיו
  chosen: his God
  lexicon: HALOT
  rationale: Straightforward possessive construction referring to the Levite's covenant
    God; 'his God' preserves the Hebrew suffix without overinterpretation.
- source_word: כְּכָל
  chosen: like all
  alternatives:
  - as all
  lexicon: HALOT
  rationale: The comparative כ plus כל introduces comparison with the other Levites.
    'Like all' is idiomatic and clear.
- source_word: אֶחָיו
  chosen: his brothers
  alternatives:
  - his fellow Israelites
  - his kinsmen
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural 'brothers.' In context it refers
    to fellow Levites. Per translation philosophy, gender-accurate language is preferred
    over flattening to a neutral term.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Appositional clarification of 'his brothers'; retained explicitly in
    English for clarity and fidelity.
- source_word: הָעֹמְדִים
  chosen: who stand
  alternatives:
  - who are standing
  - who serve
  lexicon: HALOT
  rationale: עמד literally means 'stand.' In cultic contexts it can imply attendance
    for service, but the literal wording is clear and should be preserved here.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Locative adverb referring to the central sanctuary mentioned in context;
    'there' is the direct equivalent.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: A standard Hebrew expression for being in God's presence, especially
    in worship/service settings. 'Before the LORD' is both literal and natural.
