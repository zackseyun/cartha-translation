theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Strength of תּוֹעֵבָה language
  chosen_reading: abominations
  alternative_readings:
  - detestable practices
  rationale: The verse condemns the practices of the nations in strong covenantal-moral terms. 'Abominations' preserves that force without narrowing the term to a specific subset of acts before the following verses enumerate them.
