id: DEU.18.9
reference: Deuteronomy 18:9
source:
  edition: WLC
  text: כִּ֤י אַתָּה֙ בָּ֣א אֶל הָ/אָ֔רֶץ אֲשֶׁר יְהוָ֥ה אֱלֹהֶ֖י/ךָ נֹתֵ֣ן לָ֑/ךְ לֹֽא תִלְמַ֣ד לַ/עֲשׂ֔וֹת כְּ/תוֹעֲבֹ֖ת הַ/גּוֹיִ֥ם הָ/הֵֽם־־־׃
translation:
  text: When you come into the land that Yahweh your God is giving you, you shall not learn to do according to the abominations of those nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like the abominations of those nations'; the Hebrew preposition can express comparison or conformity.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - For
  - When/indeed
  lexicon: HALOT
  rationale: 'Here כִּי introduces a temporal circumstance for the following prohibition rather than a causal explanation alone. ''When'' fits the discourse flow in English: the command applies upon Israel''s entry into the land.'
- source_word: בָּא
  chosen: come into
  alternatives:
  - enter
  - come
  lexicon: HALOT
  rationale: The participial form with second-person pronoun has future/incipient force in context. 'Come into' is natural English and preserves the movement into the land.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the country
  lexicon: HALOT
  rationale: '''The land'' is the standard covenantal/geographical term in Deuteronomy and preserves the biblical resonance better than ''country.'''
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'Construct with second masculine singular suffix is straightforwardly possessive: ''your God.'''
- source_word: נֹתֵן לָךְ
  chosen: is giving you
  alternatives:
  - gives you
  - will give you
  lexicon: HALOT
  rationale: The participle conveys an ongoing or imminent action from the speaker's perspective. 'Is giving you' reflects the Hebrew aspect well and suits the anticipatory context.
- source_word: לֹא תִלְמַד
  chosen: you shall not learn
  alternatives:
  - do not learn
  - you must not learn
  lexicon: HALOT
  rationale: The imperfect with negation expresses prohibition. 'You shall not learn' preserves the formal force and echoes legal style without becoming archaic.
- source_word: לַעֲשׂוֹת
  chosen: to do
  alternatives:
  - to practice
  - to act
  lexicon: HALOT
  rationale: Infinitive complement to 'learn' is most directly 'to do.' Although 'practice' is interpretively possible, 'do' stays closer to the Hebrew and leaves the scope broad.
- source_word: כְּתוֹעֲבֹת
  chosen: according to the abominations
  alternatives:
  - like the abominations
  - the detestable practices
  lexicon: HALOT
  rationale: The preposition כְ marks comparison/conformity. 'According to the abominations' preserves the sense of conforming to those practices. 'Abominations' retains the strong moral-religious force of תּוֹעֵבָה better than a softened paraphrase.
- source_word: הַגּוֹיִם הָהֵם
  chosen: those nations
  alternatives:
  - those peoples
  - the nations there
  lexicon: HALOT
  rationale: גּוֹיִם in Deuteronomy commonly refers to the surrounding nations/peoples. 'Those nations' is the most natural rendering here and reflects the distal demonstrative הָהֵם.
