theological_decisions:
- issue: Referent of the singular pronouns ('him,' 'his')
  chosen_reading: The singular refers collectively to the Levite/Levitical priest as representative of the tribe, yielding a generic singular in English.
  alternative_readings:
  - The pronouns refer specifically to Levi as the tribal ancestor.
  - The pronouns refer to each individual priest in a distributive sense.
  rationale: The immediate context concerns the Levitical priests/tribe, and biblical Hebrew commonly uses singular forms for collective or representative reference. Rendering with singular English preserves the source form without forcing a narrower interpretation than the context warrants.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral) and §5 (consistency of key terms)
- issue: Nature of 'the LORD is his inheritance'
  chosen_reading: Retain the covenantal-metaphorical statement without expanding it into explanatory theology.
  alternative_readings:
  - Interpretively expand to 'the LORD is the Levites' allotted portion instead of land.'
  rationale: 'The Hebrew states the theological reality succinctly: the LORD himself is the inheritance. The translation preserves this tension and richness without paraphrastic explanation.'
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3 (preserve theological tension rather than resolve it)
