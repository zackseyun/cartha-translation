id: DEU.18.2
reference: Deuteronomy 18:2
source:
  edition: WLC
  text: וְ/נַחֲלָ֥ה לֹא יִֽהְיֶה לּ֖/וֹ בְּ/קֶ֣רֶב אֶחָ֑י/ו יְהוָה֙ ה֣וּא נַחֲלָת֔/וֹ כַּ/אֲשֶׁ֖ר דִּבֶּר לֽ/וֹ־־־׃ס
translation:
  text: He shall have no inheritance among his brothers; Yahweh is his inheritance, as he spoke to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his kinsmen.' The Hebrew says 'his brothers,' referring to his fellow Israelites, specifically the other tribes.
    reason: lexical_alternative
  - marker: b
    text: Or 'as he said to him.' The verb is the ordinary Hebrew word for 'speak'; 'promised' is possible by implication but is more interpretive.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַחֲלָה / נַחֲלָתוֹ
  chosen: inheritance
  alternatives:
  - portion
  - possession
  lexicon: HALOT
  rationale: נַחֲלָה in Deuteronomic land-allotment contexts refers to an allotted inheritance or hereditary share. 'Inheritance' preserves both the legal-land sense in the first clause and the metaphorical covenantal sense in 'the LORD is his inheritance.' Using the same English term in both places reflects the Hebrew repetition.
- source_word: בְּקֶרֶב
  chosen: among
  alternatives:
  - in the midst of
  - in the middle of
  lexicon: HALOT
  rationale: The phrase בְּקֶרֶב אֶחָיו idiomatically means 'among his brothers.' 'Among' is natural modern English while preserving the relational setting.
- source_word: אֶחָיו
  chosen: his brothers
  alternatives:
  - his kinsmen
  - his fellow Israelites
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine plural 'his brothers.' Per the gender-accurate policy, 'brothers' is retained rather than neutralizing to 'siblings' or expanding interpretively. In context it refers to fellow members of Israel, specifically the other tribes.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הוּא
  chosen: is
  alternatives:
  - he himself is
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis in Hebrew ('the LORD—he is his inheritance'), but standard English expresses this adequately with 'the LORD is his inheritance' without awkwardness. The emphasis is preserved by word order and the clause structure.
- source_word: כַּאֲשֶׁר דִּבֶּר לוֹ
  chosen: as he spoke to him
  alternatives:
  - as he promised him
  - as he said to him
  lexicon: HALOT
  rationale: דִּבֶּר is the ordinary verb 'speak/say.' 'As he spoke to him' is slightly more formal but closely tracks the Hebrew. 'Promised' would overinterpret, since the verb itself does not explicitly encode promise, even if the context involves divine commitment.
