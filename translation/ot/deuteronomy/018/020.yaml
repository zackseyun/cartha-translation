theological_decisions:
- issue: Divine-name reference in first person speech
  chosen_reading: Retained first-person divine speech as 'my name' without substituting
    'the LORD' into the quotation.
  alternative_readings:
  - Expanded paraphrase such as 'in the name of the LORD'
  rationale: The Hebrew is direct divine speech, so the first-person pronoun should
    be preserved. This avoids importing wording not present in the verse while maintaining
    clarity.
  doctrine_reference: Translation philosophy §1, §6
- issue: Penalty formula
  chosen_reading: Rendered וּמֵת as 'shall die' rather than 'is to be put to death.'
  alternative_readings:
  - must die
  - is to be put to death
  rationale: The Hebrew states the death sentence tersely. 'Shall die' preserves the
    judicial declaration without adding an explicit causative nuance not overtly present
    in this form, while still communicating the legal penalty.
  doctrine_reference: Translation philosophy §1, §5
