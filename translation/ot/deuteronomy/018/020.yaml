id: DEU.18.20
reference: Deuteronomy 18:20
source:
  edition: WLC
  text: אַ֣ךְ הַ/נָּבִ֡יא אֲשֶׁ֣ר יָזִיד֩ לְ/דַבֵּ֨ר דָּבָ֜ר בִּ/שְׁמִ֗/י אֵ֣ת אֲשֶׁ֤ר
    לֹֽא צִוִּיתִי/ו֙ לְ/דַבֵּ֔ר וַ/אֲשֶׁ֣ר יְדַבֵּ֔ר בְּ/שֵׁ֖ם אֱלֹהִ֣ים אֲחֵרִ֑ים
    וּ/מֵ֖ת הַ/נָּבִ֥יא הַ/הֽוּא־׃
translation:
  text: But the prophet who presumptuously speaks a word in my name that I have not
    commanded him to speak, or who speaks in the name of other gods—that prophet shall
    die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'acts presumptuously' / 'speaks arrogantly.' The Hebrew verb conveys
      willful presumption or arrogant overstepping.
    reason: lexical_alternative
  - marker: b
    text: Or 'must die' or 'is to be put to death.' The Hebrew gives the legal death
      sentence in a terse form.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: But
  alternatives:
  - Only
  - Surely
  - However
  lexicon: HALOT
  rationale: Introduces a strong contrast with the preceding legitimate prophet. 'But'
    is natural English and preserves the adversative force better in context than
    'only' or 'surely'.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: Standard rendering of נָבִיא. The definite article is retained.
- source_word: יָזִיד
  chosen: presumptuously
  alternatives:
  - acts presumptuously
  - speaks arrogantly
  - is bold enough
  lexicon: HALOT
  rationale: From זיד in the Hiphil, conveying willful presumption or arrogant overstepping.
    'Presumptuously' captures the moral and legal force of deliberate audacity in
    this context.
- source_word: לְדַבֵּר דָּבָר
  chosen: speaks a word
  alternatives:
  - speaks anything
  - utters a message
  lexicon: HALOT
  rationale: Keeps the Hebrew verbal-nominal construction with readable English. 'A
    word' preserves the formal sense without unnecessary paraphrase.
- source_word: בִּשְׁמִי
  chosen: in my name
  alternatives:
  - on my behalf
  lexicon: HALOT
  rationale: Standard idiom for claiming divine authorization. 'In my name' is both
    literal and clear.
- source_word: אֵת אֲשֶׁר לֹא צִוִּיתִיו לְדַבֵּר
  chosen: that I have not commanded him to speak
  alternatives:
  - which I did not command him to speak
  - that I did not order him to say
  lexicon: HALOT
  rationale: Retains the relative clause and the explicit divine command language.
    Present perfect in English is idiomatic here and fits the legal framing.
- source_word: וַאֲשֶׁר יְדַבֵּר
  chosen: or who speaks
  alternatives:
  - and who speaks
  lexicon: HALOT
  rationale: 'The waw joins a second qualifying offense. In English, ''or'' best expresses
    the disjunctive sense: either unauthorized speech in YHWH''s name or speech in
    the name of other gods.'
- source_word: בְּשֵׁם אֱלֹהִים אֲחֵרִים
  chosen: in the name of other gods
  alternatives:
  - by other gods' name
  lexicon: HALOT
  rationale: Literal and idiomatic rendering of the phrase for invoking rival deities
    as authority.
- source_word: וּמֵת
  chosen: shall die
  alternatives:
  - must die
  - is to be put to death
  lexicon: HALOT
  rationale: The clause states the legal consequence. 'Shall die' is a close and traditional
    legal rendering; 'must die' is possible, but 'shall die' preserves the terse judicial
    force without over-specifying the mechanism.
- source_word: הַנָּבִיא הַהוּא
  chosen: that prophet
  alternatives:
  - that same prophet
  - the prophet, that one
  lexicon: HALOT
  rationale: English naturally renders the repeated noun plus demonstrative as 'that
    prophet,' preserving the emphatic identification.
