id: DEU.18.5
reference: Deuteronomy 18:5
source:
  edition: WLC
  text: כִּ֣י ב֗/וֹ בָּחַ֛ר יְהוָ֥ה אֱלֹהֶ֖י/ךָ מִ/כָּל שְׁבָטֶ֑י/ךָ לַ/עֲמֹ֨ד לְ/שָׁרֵ֧ת בְּ/שֵׁם יְהוָ֛ה ה֥וּא וּ/בָנָ֖י/ו כָּל הַ/יָּמִֽים־־־׃ס
translation:
  text: For Yahweh your God has chosen him from all your tribes to stand and minister in the name of Yahweh, he and his sons all the days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the days.' The Hebrew expression can be rendered more literally, but here it refers to enduring, ongoing priestly service.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the rationale for the preceding legislation; 'for' is natural English and preserves the explanatory force.
- source_word: בּוֹ
  chosen: him
  alternatives:
  - in him
  lexicon: HALOT
  rationale: With בחר ('choose'), the preposition ב can mark the person chosen. English idiom requires 'choose him' rather than the more literal 'choose in him'.
- source_word: בָּחַר
  chosen: has chosen
  alternatives:
  - chose
  lexicon: HALOT
  rationale: Rendered with English present perfect to express a past divine choice with continuing covenantal relevance in context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name YHWH.
- source_word: מִכָּל שְׁבָטֶיךָ
  chosen: from all your tribes
  alternatives:
  - out of all your tribes
  lexicon: HALOT
  rationale: Expresses selection from among Israel's tribes; 'from' is concise and accurate.
- source_word: לַעֲמֹד
  chosen: to stand
  alternatives:
  - to take his stand
  lexicon: HALOT
  rationale: Keeps the concrete priestly posture language rather than flattening it into a purely functional paraphrase.
- source_word: לְשָׁרֵת
  chosen: and minister
  alternatives:
  - and serve
  lexicon: HALOT
  rationale: In priestly context, 'minister' better conveys cultic service before God than the broader 'serve'.
- source_word: בְּשֵׁם יְהוָה
  chosen: in the name of the LORD
  alternatives:
  - by the name of the LORD
  - for the name of the LORD
  lexicon: HALOT
  rationale: Standard and natural rendering that preserves the covenantal-authoritative sense of priestly service performed under YHWH's name.
- source_word: הוּא וּבָנָיו
  chosen: he and his sons
  alternatives:
  - he and his children
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural 'sons,' referring to priestly descent; this follows the project's gender-accurate policy.
- source_word: כָּל הַיָּמִים
  chosen: for all time
  alternatives:
  - all the days
  - continually
  lexicon: HALOT
  rationale: Idiomatic English expressing enduring duration of the priestly right/office. 'All the days' is more literal but less natural here.
