theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render YHWH as 'the LORD' in keeping with stated
    doctrine and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered priestly inheritance language
  chosen_reading: he and his sons
  alternative_readings:
  - he and his children
  rationale: The Hebrew explicitly specifies sons, and the context concerns Levitical
    priestly succession. This should not be neutralized.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
