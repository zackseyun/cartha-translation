id: DEU.18.12
reference: Deuteronomy 18:12
source:
  edition: WLC
  text: כִּֽי תוֹעֲבַ֥ת יְהוָ֖ה כָּל עֹ֣שֵׂה אֵ֑לֶּה וּ/בִ/גְלַל֙ הַ/תּוֹעֵבֹ֣ת הָ/אֵ֔לֶּה
    יְהוָ֣ה אֱלֹהֶ֔י/ךָ מוֹרִ֥ישׁ אוֹתָ֖/ם מִ/פָּנֶֽי/ךָ־־׃
translation:
  text: For everyone who does these things is an abomination to the LORD, and because
    of these abominations the LORD your God is driving them out before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is dispossessing them'; the Hebrew verb can emphasize causing the nations
      to lose possession of the land as well as driving them out.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding prohibition. 'For' fits the explanatory
    force in context and reads naturally in English.
- source_word: תוֹעֲבַת יְהוָה
  chosen: an abomination to the LORD
  alternatives:
  - detestable to the LORD
  - the LORD's abomination
  lexicon: HALOT
  rationale: The construct phrase denotes something abhorrent in the LORD's sight.
    'An abomination to the LORD' preserves the strong covenantal and moral force of
    תועבה without paraphrase.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's mandated default for the divine name, preserving
    reverential convention and standard English Bible usage.
- source_word: כָּל עֹשֵׂה אֵלֶּה
  chosen: everyone who does these things
  alternatives:
  - whoever does these things
  - every doer of these things
  lexicon: HALOT
  rationale: 'כָּל with the participle expresses an indefinite universal: any person
    practicing these acts. ''Everyone who does these things'' is natural English and
    preserves the comprehensive scope.'
- source_word: וּבִגְלַל
  chosen: and because of
  alternatives:
  - and on account of
  - and for the sake of
  lexicon: HALOT
  rationale: Marks causal ground for the following judgment. 'Because of' is the clearest
    modern rendering.
- source_word: הַתּוֹעֵבֹת הָאֵלֶּה
  chosen: these abominations
  alternatives:
  - these detestable things
  - these abhorrent practices
  lexicon: HALOT
  rationale: Plural of תועבה refers back to the prohibited occult practices in the
    preceding verses. 'Abominations' maintains lexical continuity with the singular
    earlier in the verse.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'Second-person singular suffix is retained to address Israel directly:
    ''the LORD your God.'''
- source_word: מוֹרִישׁ אֹתָם
  chosen: is driving them out
  alternatives:
  - is dispossessing them
  - is causing them to lose possession
  lexicon: HALOT
  rationale: The Hiphil of ירש here means to dispossess or drive out nations from
    the land. 'Is driving them out' is idiomatic and fits the immediate context of
    conquest and removal.
- source_word: מִפָּנֶיךָ
  chosen: before you
  alternatives:
  - from before you
  - out of your presence
  lexicon: HALOT
  rationale: Literally 'from before your face/presence,' but in conquest contexts
    idiomatic English is 'before you,' meaning in Israel's presence and ahead of their
    advance.
