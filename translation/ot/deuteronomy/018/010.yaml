theological_decisions:
- issue: Nature of the child-fire prohibition
  chosen_reading: Retain the Hebrew idiom 'makes his son or his daughter pass through
    the fire' rather than specifying sacrifice or execution in the main text.
  alternative_readings:
  - burns his son or daughter in the fire
  - sacrifices his son or daughter in the fire
  rationale: The context clearly condemns a pagan ritual involving children and fire,
    but the Hebrew expression itself is idiomatic and does not explicitly spell out
    every ritual detail in this verse. Preserving the idiom avoids overstating what
    this clause alone says while allowing readers to recognize the practice's severity.
  doctrine_reference: Translation philosophy §1, §3
