id: DEU.18.10
reference: Deuteronomy 18:10
source:
  edition: WLC
  text: לֹֽא יִמָּצֵ֣א בְ/ךָ֔ מַעֲבִ֥יר בְּנֽ/וֹ וּ/בִתּ֖/וֹ בָּ/אֵ֑שׁ קֹסֵ֣ם קְסָמִ֔ים
    מְעוֹנֵ֥ן וּ/מְנַחֵ֖שׁ וּ/מְכַשֵּֽׁף־־׃
translation:
  text: There must not be found among you anyone who makes his son or his daughter
    pass through the fire, one who practices divination, tells fortunes, interprets
    omens, or practices sorcery.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'burns his son or his daughter in the fire' or 'offers his son or his
      daughter in the fire.' The Hebrew literally says 'makes his son or his daughter
      pass through the fire.'
    reason: alternative_reading
  - marker: b
    text: '''Tells fortunes'' renders a difficult Hebrew term also translated ''soothsayer''
      or, more literally in older English, ''observer of times.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'practices augury' / 'divines by omens.'
    reason: lexical_alternative
  - marker: d
    text: Or 'practices witchcraft.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִמָּצֵא בְךָ
  chosen: must not be found among you
  alternatives:
  - shall not be found in you
  - let there not be found among you
  lexicon: HALOT
  rationale: The Niphal imperfect of מצא with negation functions as a prohibition
    about what is permitted within the covenant community. 'Among you' is idiomatic
    English for בך in this communal legal context.
- source_word: מַעֲבִיר בְּנוֹ וּבִתּוֹ בָּאֵשׁ
  chosen: who makes his son or his daughter pass through the fire
  alternatives:
  - who burns his son or his daughter in the fire
  - who offers his son or daughter in the fire
  lexicon: HALOT
  rationale: The Hiphil participle of עבר literally means 'causing to pass.' In this
    context it refers to a prohibited ritual involving children and fire. The more
    literal 'pass through the fire' preserves the Hebrew expression without over-specifying
    the exact ritual form, while still conveying its gravity.
- source_word: קֹסֵם קְסָמִים
  chosen: one who practices divination
  alternatives:
  - a diviner of divinations
  - one who divines
  lexicon: HALOT
  rationale: The participle plus cognate accusative intensifies the activity. English
    idiom is best served by 'practices divination,' which preserves the technical
    sense without awkward literalism.
- source_word: מְעוֹנֵן
  chosen: tells fortunes
  alternatives:
  - soothsayer
  - observer of times
  - augur
  lexicon: HALOT
  rationale: The term is difficult and historically rendered in several ways. 'Tells
    fortunes' is clear modern English for a prohibited occult practice and avoids
    the archaic 'observer of times,' while not collapsing it into the neighboring
    terms.
- source_word: מְנַחֵשׁ
  chosen: interprets omens
  alternatives:
  - practices augury
  - divines by omens
  - soothsays
  lexicon: HALOT
  rationale: This verb is associated with omen-reading or divination by signs. 'Interprets
    omens' communicates the likely sense in accessible English and distinguishes it
    from the broader 'practices divination' earlier in the verse.
- source_word: מְכַשֵּׁף
  chosen: practices sorcery
  alternatives:
  - sorcerer
  - practices witchcraft
  lexicon: HALOT
  rationale: The Piel participle denotes engaging in magical arts. 'Practices sorcery'
    is natural in a list of participial descriptions and avoids importing later cultural
    connotations that 'witchcraft' may carry in English.
