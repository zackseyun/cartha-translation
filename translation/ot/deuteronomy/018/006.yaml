id: DEU.18.6
reference: Deuteronomy 18:6
source:
  edition: WLC
  text: וְ/כִֽי יָבֹ֨א הַ/לֵּוִ֜י מֵ/אַחַ֤ד שְׁעָרֶ֨י/ךָ֙ מִ/כָּל יִשְׂרָאֵ֔ל אֲשֶׁר ה֖וּא גָּ֣ר שָׁ֑ם וּ/בָא֙ בְּ/כָל אַוַּ֣ת נַפְשׁ֔/וֹ אֶל הַ/מָּק֖וֹם אֲשֶׁר יִבְחַ֥ר יְהוָֽה־־־־־־׃
translation:
  text: And if the Levite comes from one of your gates out of all Israel, where he is residing, and comes with all the desire of his soul to the place that Yahweh will choose,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'from one of your gates.' Here 'gates' refers metonymically to a town or civic settlement.
    reason: cultural_note
  - marker: b
    text: Or, 'with all his heart’s desire' / 'with all the longing of his soul.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  chosen: And if
  alternatives:
  - Now if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional case connected to the preceding legislation. 'And if' preserves the conjunction plus conditional force without sounding unnatural.
- source_word: יָבֹא
  chosen: comes
  alternatives:
  - should come
  - enters
  lexicon: HALOT
  rationale: Qal imperfect in a casuistic law context is naturally rendered as a present/future condition in English. 'Comes' is straightforward and idiomatic.
- source_word: הַלֵּוִי
  chosen: the Levite
  alternatives:
  - a Levite
  lexicon: HALOT
  rationale: The article is present in Hebrew. English legal style often uses 'the Levite' generically for a representative case, preserving the source form.
- source_word: מֵאַחַד שְׁעָרֶיךָ
  chosen: from one of your towns
  alternatives:
  - from one of your gates
  - from one of your settlements
  lexicon: HALOT
  rationale: Literally 'from one of your gates,' but 'gates' is a metonym for a town/city as a civic location. 'Towns' communicates the sense in readable modern English while remaining close to the Hebrew.
- source_word: מִכָּל יִשְׂרָאֵל
  chosen: out of all Israel
  alternatives:
  - from anywhere in Israel
  - from all Israel
  lexicon: HALOT
  rationale: Expresses the Levite's origin from anywhere within Israelite territory. 'Out of all Israel' preserves the distributive sense and the preposition.
- source_word: אֲשֶׁר הוּא גָּר שָׁם
  chosen: where he is residing
  alternatives:
  - where he sojourns
  - where he is living as a resident alien
  lexicon: HALOT
  rationale: גור often denotes residing as a sojourner. Here the Levite lives there without landed inheritance. 'Residing' is natural English and preserves the non-native-settled nuance better than a flat 'lives,' while avoiding overtranslation with 'resident alien' in this intranational context.
- source_word: וּבָא
  chosen: and comes
  alternatives:
  - and he comes
  - and arrives
  lexicon: HALOT
  rationale: 'Keeps the Hebrew verbal repetition for emphasis and sequence: he comes from his town and comes to the chosen place.'
- source_word: בְּכָל אַוַּת נַפְשׁוֹ
  chosen: with all the desire of his soul
  alternatives:
  - with all his heart's desire
  - with all that he desires
  - with all the longing of his soul
  lexicon: HALOT
  rationale: The phrase expresses full personal desire or longing. 'With all the desire of his soul' stays close to the Hebrew נפש while remaining intelligible. A more idiomatic alternative is worth preserving in a footnote.
- source_word: אֶל הַמָּקוֹם
  chosen: to the place
  alternatives:
  - to the place of worship
  - to the sanctuary
  lexicon: HALOT
  rationale: The Hebrew says simply 'to the place.' The referent is the central worship site, but the text itself leaves it implicit, so the translation should not import a fuller interpretation into the main text.
- source_word: אֲשֶׁר יִבְחַר יְהוָה
  chosen: that the LORD will choose
  alternatives:
  - that the LORD chooses
  - which the LORD will choose
  lexicon: HALOT
  rationale: יבחר is future/imperfect, fitting Deuteronomy's recurring formula for the central place of worship. Per doctrine, יְהוָה is rendered 'the LORD'.
