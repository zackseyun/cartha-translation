id: DEU.18.3
reference: Deuteronomy 18:3
source:
  edition: WLC
  text: וְ/זֶ֡ה יִהְיֶה֩ מִשְׁפַּ֨ט הַ/כֹּהֲנִ֜ים מֵ/אֵ֣ת הָ/עָ֗ם מֵ/אֵ֛ת זֹבְחֵ֥י
    הַ/זֶּ֖בַח אִם שׁ֣וֹר אִם שֶׂ֑ה וְ/נָתַן֙ לַ/כֹּהֵ֔ן הַ/זְּרֹ֥עַ וְ/הַ/לְּחָיַ֖יִם
    וְ/הַ/קֵּבָֽה־־׃
translation:
  text: 'And this shall be the priests’ due from the people, from those who sacrifice
    a sacrifice, whether an ox or a sheep: he shall give to the priest the shoulder,
    the two cheeks, and the stomach.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''from those who offer a sacrifice.'' The Hebrew repeats the sacrificial
      root for emphasis: literally, ''from sacrificers of the sacrifice.'''
    reason: lexical_alternative
  - marker: b
    text: '''Shoulder'' translates a word literally meaning ''arm''; in this context
      it refers to the animal’s foreleg or shoulder portion.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the cheeks' or 'the jawbones.' The Hebrew form is dual.
    reason: lexical_alternative
  - marker: d
    text: Traditionally 'the maw.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁפַּט
  chosen: due
  alternatives:
  - right
  - customary due
  - ordinance
  lexicon: HALOT
  rationale: In this cultic/legal context, מִשְׁפַּט refers to what is rightfully
    assigned or prescribed for the priests rather than abstract 'judgment.' 'Due'
    is concise and idiomatic in English for an allotted portion.
- source_word: הַכֹּהֲנִים
  chosen: the priests’
  alternatives:
  - the priests
  - the priestly officials’
  lexicon: HALOT
  rationale: Rendered as a possessive in English to match the construction 'the priests’
    due,' which naturally expresses the genitive relationship.
- source_word: מֵאֵת הָעָם
  chosen: from the people
  alternatives:
  - from the populace
  - from the Israelites
  lexicon: HALOT
  rationale: A straightforward rendering of the source. The text says 'the people,'
    not specifically 'the Israelites,' so the broader term is retained.
- source_word: מֵאֵת זֹבְחֵי הַזֶּבַח
  chosen: from those who sacrifice a sacrifice
  alternatives:
  - from those who offer a sacrifice
  - from the sacrificers of the sacrifice
  lexicon: HALOT
  rationale: The Hebrew repeats the sacrificial root (זבח ... זבח). This translation
    preserves that repetition more closely than a smoother but less transparent rendering.
    The phrase identifies the subset of the people from whom the due is taken.
- source_word: אִם שׁוֹר אִם שֶׂה
  chosen: whether an ox or a sheep
  alternatives:
  - whether bull or sheep
  - whether cattle or flock animal
  lexicon: HALOT
  rationale: '''Ox'' and ''sheep'' are natural English equivalents for the singular
    Hebrew nouns here and fit sacrificial context. ''Sheep'' is preferable to the
    broader ''small livestock'' for readability.'
- source_word: וְנָתַן
  chosen: he shall give
  alternatives:
  - and he shall give
  - one shall give
  - they shall give
  lexicon: HALOT
  rationale: 'The Hebrew form is singular, functioning distributively: each sacrificer
    is to give. English singular ''he shall give'' preserves the legal style and number
    of the source.'
- source_word: לַכֹּהֵן
  chosen: to the priest
  alternatives:
  - to a priest
  lexicon: HALOT
  rationale: The definite article is present in Hebrew. In context it refers to the
    officiating priestly recipient as a class instance, and 'the priest' is the most
    direct rendering.
- source_word: הַזְּרֹעַ
  chosen: the shoulder
  alternatives:
  - the foreleg
  - the arm
  lexicon: HALOT
  rationale: Though literally 'arm,' in animal anatomy and sacrificial distribution
    this refers to the foreleg/shoulder portion. 'Shoulder' is the established and
    most intelligible English rendering in this context.
- source_word: הַלְּחָיַיִם
  chosen: the two cheeks
  alternatives:
  - the cheeks
  - the jawbones
  lexicon: HALOT
  rationale: The Hebrew is dual, so 'the two cheeks' explicitly reflects the form.
    'Jawbones' is possible but less direct lexically.
- source_word: הַקֵּבָה
  chosen: the stomach
  alternatives:
  - the maw
  - the fourth stomach
  lexicon: HALOT
  rationale: The term denotes the stomach of the animal. 'Maw' is traditional but
    archaic; 'stomach' is clear modern English. More technical renderings such as
    'fourth stomach' are too specific for the lexical evidence in a general translation.
