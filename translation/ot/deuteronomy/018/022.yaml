id: DEU.18.22
reference: Deuteronomy 18:22
source:
  edition: WLC
  text: אֲשֶׁר֩ יְדַבֵּ֨ר הַ/נָּבִ֜יא בְּ/שֵׁ֣ם יְהוָ֗ה וְ/לֹֽא יִהְיֶ֤ה הַ/דָּבָר֙
    וְ/לֹ֣א יָב֔וֹא ה֣וּא הַ/דָּבָ֔ר אֲשֶׁ֥ר לֹא דִבְּר֖/וֹ יְהוָ֑ה בְּ/זָדוֹן֙ דִּבְּר֣/וֹ
    הַ/נָּבִ֔יא לֹ֥א תָג֖וּר מִמֶּֽ/נּוּ־־׃ס
translation:
  text: When the prophet speaks in the name of the LORD, and the matter does not happen
    or come about, that is the matter that the LORD has not spoken. The prophet has
    spoken it presumptuously; you shall not fear him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the word' instead of 'the matter' for Hebrew דָּבָר; the term can refer
      both to the spoken message and to the event foretold.
    reason: lexical_alternative
  - marker: b
    text: Or 'does not occur or come to pass.'
    reason: lexical_alternative
  - marker: c
    text: '''Presumptuously'' conveys arrogant, willful presumption in speaking without
      the LORD''s authorization.'
    reason: cultural_note
lexical_decisions:
- source_word: יְדַבֵּר
  chosen: speaks
  alternatives:
  - says
  - declares
  lexicon: HALOT
  rationale: Rendered as present/future-like 'speaks' in the conditional clause, matching
    Hebrew imperfect usage in legal instruction and preserving the verbal connection
    with later דִבְּרוֹ ('has spoken it').
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: Standard rendering of נָבִיא. The definite article is retained because
    the verse speaks of any such prophet in a representative legal case.
- source_word: בְּשֵׁם יְהוָה
  chosen: in the name of the LORD
  alternatives:
  - by the name of the LORD
  lexicon: HALOT
  rationale: Idiomatic covenantal formula for speaking under claimed divine authority.
    YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    Jewish reverence tradition and established covenantal usage.
- source_word: הַדָּבָר
  chosen: the matter
  alternatives:
  - the word
  - the thing
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'thing.' Here it refers to the prophetic
    utterance/content and its fulfillment. 'Matter' avoids awkward repetition in English
    while still covering both spoken content and event.
- source_word: וְלֹא יִהְיֶה ... וְלֹא יָבֹא
  chosen: does not happen or come about
  alternatives:
  - does not occur
  - does not come to pass
  lexicon: HALOT
  rationale: The paired verbs intensify non-fulfillment. 'Happen or come about' preserves
    the twofold expression in readable modern English without archaic 'come to pass.'
- source_word: הוּא הַדָּבָר
  chosen: that is the matter
  alternatives:
  - that is the word
  - this is the matter
  lexicon: HALOT
  rationale: 'The pronoun gives emphasis/identification: this is precisely the matter
    in question. ''That is the matter'' captures the demonstrative force in context.'
- source_word: אֲשֶׁר לֹא דִבְּרוֹ יְהוָה
  chosen: that the LORD has not spoken
  alternatives:
  - which the LORD did not speak
  lexicon: HALOT
  rationale: 'English present perfect works naturally after the test of fulfillment:
    the failed prediction shows it is something the LORD has not spoken.'
- source_word: בְּזָדוֹן
  chosen: presumptuously
  alternatives:
  - arrogantly
  - with presumption
  - insolently
  lexicon: HALOT
  rationale: זָדוֹן denotes presumptuous, arrogant willfulness. 'Presumptuously' is
    the established legal-ethical sense and fits the context of unauthorized prophetic
    speech.
- source_word: דִּבְּרוֹ הַנָּבִיא
  chosen: The prophet has spoken it
  alternatives:
  - the prophet spoke it
  lexicon: HALOT
  rationale: Retains the explicit object suffix ('it') and keeps the clause tightly
    linked to the prior 'matter.' Present perfect reads naturally in English as a
    conclusion from the evidence.
- source_word: לֹא תָגוּר מִמֶּנּוּ
  chosen: you shall not fear him
  alternatives:
  - you shall not be afraid of him
  - you shall not stand in dread of him
  lexicon: HALOT
  rationale: גור in this stem here conveys fearing or being intimidated by someone.
    'You shall not fear him' is concise and preserves the legal force of the prohibition.
