theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD.' This verse concerns prophetic
    claims made under covenantal divine authority, and the standard small-caps convention
    is represented here in plain text as 'the LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nature of the prophetic test
  chosen_reading: The verse is rendered as an objective test of whether a claimed
    prophetic word came from the LORD, without importing broader doctrinal claims
    about all prophecy beyond the verse itself.
  alternative_readings:
  - A broader theological rule about all forms of prophetic ministry
  rationale: The translation keeps the legal and textual focus on fulfillment and
    unauthorized presumption, avoiding interpretive expansion not explicit in the
    Hebrew.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy;
    do not import doctrinal claims the text does not make'
