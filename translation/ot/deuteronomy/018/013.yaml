id: DEU.18.13
reference: Deuteronomy 18:13
source:
  edition: WLC
  text: תָּמִ֣ים תִּֽהְיֶ֔ה עִ֖ם יְהוָ֥ה אֱלֹהֶֽי/ךָ׃ס
translation:
  text: You shall be blameless with the LORD your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whole' or 'complete' with the LORD your God.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּמִים
  chosen: blameless
  alternatives:
  - whole
  - complete
  - upright
  lexicon: HALOT
  rationale: תָּמִים commonly denotes wholeness, integrity, or being without defect.
    In this context—contrasting Israel with pagan divination and illicit practices
    in the surrounding verses—'blameless' best conveys moral integrity before God
    without implying sinless perfection. 'Whole' or 'complete' are possible but less
    idiomatic here in English.
- source_word: תִּהְיֶה
  chosen: you shall be
  alternatives:
  - you must be
  - be
  lexicon: HALOT
  rationale: Qal imperfect 2ms of היה functions here as an injunction. 'You shall
    be' preserves the formal force and covenantal tone of the Hebrew while remaining
    natural English. 'You must be' is slightly more interpretive; the bare imperative
    'be' is possible but less directly reflective of the verbal form.
- source_word: עִם
  chosen: with
  alternatives:
  - before
  - toward
  lexicon: HALOT
  rationale: The preposition עִם normally means 'with.' Here it expresses Israel's
    relationship in the presence of and in fellowship with the LORD. 'With' is the
    most direct and natural rendering; 'before' would over-interpret the relational
    nuance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD,' following established reverential convention and the pattern reflected
    in many English translations and the Septuagint's treatment.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: Although אֱלֹהִים can be morphologically plural, with the 2ms suffix
    and in covenantal reference to יְהוָה it clearly means 'your God' in the singular.
    This preserves the personal covenant relationship emphasized in Deuteronomy.
