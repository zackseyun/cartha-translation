theological_decisions:
- issue: Meaning of תָּמִים in covenant exhortation
  chosen_reading: blameless in integrity/devotion before God, not sinless perfection
  alternative_readings:
  - complete with the LORD your God
  - wholehearted with the LORD your God
  rationale: The verse calls Israel to undivided covenant fidelity in contrast to
    occult practices in the immediate context (Deut 18:9–14). Rendering תָּמִים as
    'blameless' preserves the ethical and covenantal force without importing a doctrine
    of absolute moral perfection.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; readable modern English, not archaic or academic.'
