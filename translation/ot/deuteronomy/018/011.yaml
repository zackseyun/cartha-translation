theological_decisions:
- issue: Rendering occult-practice terminology without importing later folklore
  chosen_reading: Use clear modern terms ('medium,' 'spiritist,' 'casts spells') that
    reflect the Hebrew practices in context.
  alternative_readings:
  - Retain traditional terms such as 'charmer' and 'wizard'
  rationale: The verse catalogs prohibited divinatory and necromantic practices. Modern
    English should be readable and accurate without importing fantasy or later occult
    systems. This follows the stated optimal-equivalence philosophy and avoids doctrinal
    overreach.
  doctrine_reference: Translation philosophy §§1, 5, 6
