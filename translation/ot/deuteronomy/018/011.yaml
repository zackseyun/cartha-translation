id: DEU.18.11
reference: Deuteronomy 18:11
source:
  edition: WLC
  text: וְ/חֹבֵ֖ר חָ֑בֶר וְ/שֹׁאֵ֥ל אוֹב֙ וְ/יִדְּעֹנִ֔י וְ/דֹרֵ֖שׁ אֶל הַ/מֵּתִֽים־׃
translation:
  text: or one who casts spells, or one who consults a medium or a spiritist, or one
    who seeks the dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'charmer' for 'one who casts spells'; the Hebrew idiom is literally 'one
      who binds a binding,' referring to magical incantation.
    reason: lexical_alternative
  - marker: b
    text: Or 'one who inquires of a ghost' for 'one who consults a medium.'
    reason: lexical_alternative
  - marker: c
    text: Or 'wizard' for 'spiritist,' though 'wizard' can sound misleading in modern
      English.
    reason: lexical_alternative
  - marker: d
    text: Or 'one who consults the dead' or 'one who inquires of the dead.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֹבֵר חָבֶר
  chosen: one who casts spells
  alternatives:
  - one who binds a binding
  - charmer
  - one who joins together an incantation
  lexicon: HALOT
  rationale: The idiom literally involves 'binding/binding,' but in this context of
    forbidden occult practices it refers to spell-casting or magical incantation.
    'Casts spells' communicates the sense in clear modern English better than the
    traditional but less transparent 'charmer.'
- source_word: שֹׁאֵל אוֹב
  chosen: one who consults a medium
  alternatives:
  - one who inquires of a ghost
  - one who asks of an ov/spirit-medium
  lexicon: HALOT
  rationale: אוֹב can denote a spirit of the dead or, by extension, a medium associated
    with such consultation. In English, 'consults a medium' best captures the prohibited
    practice rather than suggesting the object is merely a disembodied spirit.
- source_word: יִדְּעֹנִי
  chosen: a spiritist
  alternatives:
  - a wizard
  - a familiar spirit practitioner
  lexicon: HALOT
  rationale: The term denotes a practitioner of occult knowledge, often paired with
    אוֹב. 'Spiritist' is clearer and less misleading in modern English than 'wizard,'
    which carries fantasy connotations.
- source_word: דֹרֵשׁ אֶל הַמֵּתִים
  chosen: one who seeks the dead
  alternatives:
  - one who inquires of the dead
  - one who consults the dead
  lexicon: HALOT
  rationale: The phrase refers to necromantic consultation. 'Seeks the dead' is a
    fairly close rendering of the Hebrew while remaining natural English; the more
    explicit 'consults the dead' is preserved as an alternative sense.
- source_word: וְ
  chosen: or
  alternatives:
  - and
  rationale: Within this legal prohibition list, the conjunction functions disjunctively
    in English style, continuing the series of banned practitioners. 'Or' best matches
    the list structure from the preceding verse.
