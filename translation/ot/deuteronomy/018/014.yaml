id: DEU.18.14
reference: Deuteronomy 18:14
source:
  edition: WLC
  text: כִּ֣י הַ/גּוֹיִ֣ם הָ/אֵ֗לֶּה אֲשֶׁ֤ר אַתָּה֙ יוֹרֵ֣שׁ אוֹתָ֔/ם אֶל מְעֹנְנִ֥ים וְ/אֶל קֹסְמִ֖ים יִשְׁמָ֑עוּ וְ/אַתָּ֕ה לֹ֣א כֵ֔ן נָ֛תַן לְ/ךָ֖ יְהוָ֥ה אֱלֹהֶֽי/ךָ׀־־׃
translation:
  text: For these nations, which you are dispossessing, listen to soothsayers and diviners; but as for you, Yahweh your God has not allowed you to do this.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which you are driving out' or 'which you are taking possession of'; the Hebrew verb can include both taking possession and dispossessing prior inhabitants.
    reason: lexical_alternative
  - marker: b
    text: '''Soothsayers'' translates a term for practitioners of omen-reading or augury.'
    reason: cultural_note
  - marker: c
    text: Hebrew literally, 'but you, not so has the LORD your God given to you'; the object ('this,' i.e., such practices) is implied.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding prohibition section; 'For' fits the causal/explanatory force in context.
- source_word: הַגּוֹיִם הָאֵלֶּה
  chosen: these nations
  alternatives:
  - these peoples
  - these Gentile nations
  lexicon: HALOT
  rationale: גּוֹיִם here refers to the surrounding non-Israelite peoples in the land. 'Nations' is the standard and contextually clear rendering.
- source_word: אֲשֶׁר אַתָּה יוֹרֵשׁ אֹתָם
  chosen: which you are dispossessing
  alternatives:
  - which you are driving out
  - which you are taking possession of
  lexicon: HALOT
  rationale: ירשׁ in Deuteronomy often carries the sense of taking possession by dispossessing prior inhabitants. 'Dispossessing' preserves that force better than the softer 'inheriting' or the more interpretive 'driving out'.
- source_word: אֶל מְעֹנְנִים
  chosen: to soothsayers
  alternatives:
  - to cloud-diviners
  - to augurs
  - to fortune-tellers
  lexicon: HALOT
  rationale: מְעֹנְנִים denotes practitioners of omen-reading/soothsaying. 'Soothsayers' is concise, readable, and broad enough to cover the likely semantic range without overcommitting to one technique.
- source_word: וְאֶל קֹסְמִים
  chosen: and diviners
  alternatives:
  - and sorcerers
  - and fortune-tellers
  lexicon: HALOT
  rationale: קֹסְמִים refers to those who practice divination. 'Diviners' is the most direct and semantically accurate English equivalent.
- source_word: יִשְׁמָעוּ
  chosen: listen to
  alternatives:
  - heed
  - pay attention to
  - consult
  lexicon: HALOT
  rationale: שׁמע literally means 'hear/listen,' but in this context implies receptive attention to occult practitioners. 'Listen to' preserves the lexical core while remaining idiomatic.
- source_word: וְאַתָּה לֹא כֵן
  chosen: but as for you, ... not
  alternatives:
  - but you, not so
  - but you shall not do so
  lexicon: HALOT
  rationale: 'The Hebrew is elliptical: ''but you, not thus/so.'' English requires completion from context. ''But as for you'' preserves the contrast, while the following clause supplies the implied sense.'
- source_word: נָתַן לְךָ יְהוָה אֱלֹהֶיךָ
  chosen: the LORD your God has not given this to you
  alternatives:
  - the LORD your God has not allowed you this
  - the LORD your God has not appointed this for you
  lexicon: HALOT
  rationale: 'נתן is literally ''give.'' Because the object is implicit, ''this'' is supplied in English to complete the sense: Israel has not been given such practices as its means of guidance. ''The LORD'' follows the project''s default for YHWH.'
