theological_decisions:
- issue: Potential messianic specificity of the promised prophet
  chosen_reading: Main text retains the Hebrew wording as a prophet like Moses without
    making the referent explicit.
  alternative_readings:
  - A collective line of prophets
  - A singular eschatological prophet fulfilled in the Messiah
  rationale: The verse itself promises 'a prophet like you' and does not explicitly
    identify the figure. In keeping with preserving theological tension, the translation
    does not import a christological identification into the main text, though Christian
    canonical reading may see fulfillment in Jesus.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Rendering of אֲחֵיהֶם
  chosen_reading: their brothers
  alternative_readings:
  - their kindred
  - their fellow Israelites
  rationale: The masculine plural is retained per gender-accurate policy. Because
    modern readers may hear 'brothers' narrowly, a footnote can clarify the covenantal-kinship
    sense without neutralizing the source term in the main text.
  doctrine_reference: Translation philosophy §4
