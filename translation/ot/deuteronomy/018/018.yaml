id: DEU.18.18
reference: Deuteronomy 18:18
source:
  edition: WLC
  text: נָבִ֨יא אָקִ֥ים לָ/הֶ֛ם מִ/קֶּ֥רֶב אֲחֵי/הֶ֖ם כָּמ֑וֹ/ךָ וְ/נָתַתִּ֤י דְבָרַ/י֙
    בְּ/פִ֔י/ו וְ/דִבֶּ֣ר אֲלֵי/הֶ֔ם אֵ֖ת כָּל אֲשֶׁ֥ר אֲצַוֶּֽ/נּוּ־׃
translation:
  text: I will raise up for them a prophet like you from among their brothers, and
    I will put my words in his mouth, and he will speak to them all that I command
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from among their kin' or 'from among their fellow Israelites'; Hebrew
      literally, 'from among their brothers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָבִיא
  chosen: a prophet
  alternatives:
  - prophet
  lexicon: HALOT
  rationale: Standard rendering of the common Hebrew term for one who speaks on God's
    behalf. The indefinite English article fits the Hebrew anarthrous noun in this
    predictive context.
- source_word: אָקִים
  chosen: I will raise up
  alternatives:
  - I will establish
  - I will appoint
  lexicon: HALOT
  rationale: Hiphil of קום here conveys causing to arise/raising up a prophet. 'Raise
    up' is idiomatic in English and preserves the sense of divine appointment without
    overinterpreting.
- source_word: לָהֶם
  chosen: for them
  alternatives:
  - to them
  lexicon: HALOT
  rationale: The preposition ל here is best rendered 'for' in the sense of provision
    on behalf of the people, matching the promise context.
- source_word: מִקֶּרֶב אֲחֵיהֶם
  chosen: from among their brothers
  alternatives:
  - from the midst of their brothers
  - from among their kin
  - from among their fellow Israelites
  lexicon: HALOT
  rationale: מִקֶּרֶב means 'from the midst of, from among.' אֲחֵיהֶם is literally
    'their brothers.' Per gender-accurate policy, the masculine familial term is retained
    rather than flattened; in Deuteronomy this idiom refers to fellow members of Israel.
- source_word: כָּמוֹךָ
  chosen: like you
  alternatives:
  - as you are
  lexicon: HALOT
  rationale: Direct comparison to Moses is explicit and should remain concise and
    formal.
- source_word: וְנָתַתִּי דְבָרַי בְּפִיו
  chosen: and I will put my words in his mouth
  alternatives:
  - and I will place my words in his mouth
  lexicon: HALOT
  rationale: A vivid prophetic commissioning formula. 'Put my words in his mouth'
    is natural English and preserves the metaphor of divinely given speech.
- source_word: וְדִבֶּר אֲלֵיהֶם
  chosen: and he will speak to them
  alternatives:
  - and he shall speak to them
  lexicon: HALOT
  rationale: Simple future rendering fits the sequence of divine promise. 'Speak to
    them' preserves the directional sense of אֶל.
- source_word: אֵת כָּל אֲשֶׁר אֲצַוֶּנּוּ
  chosen: all that I command him
  alternatives:
  - everything that I command him
  - all that I will command him
  lexicon: HALOT
  rationale: The object marker plus כָּל אֲשֶׁר yields 'all that.' The imperfect of
    צוה in this context is well represented by English present 'I command' within
    a future frame, avoiding unnecessary stiffness while preserving the sense of comprehensive
    divine commission.
