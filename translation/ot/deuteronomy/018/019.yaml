id: DEU.18.19
reference: Deuteronomy 18:19
source:
  edition: WLC
  text: וְ/הָיָ֗ה הָ/אִישׁ֙ אֲשֶׁ֤ר לֹֽא יִשְׁמַע֙ אֶל דְּבָרַ֔/י אֲשֶׁ֥ר יְדַבֵּ֖ר
    בִּ/שְׁמִ֑/י אָנֹכִ֖י אֶדְרֹ֥שׁ מֵ/עִמּֽ/וֹ־־׃
translation:
  text: And the man who does not listen to my words that he speaks in my name—I myself
    will require it from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will call him to account.' The Hebrew says literally, 'I will require
      it from him,' expressing divine accountability for refusing the prophet's words.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And
  alternatives:
  - And it shall be
  - And it will be
  lexicon: HALOT
  rationale: The clause-initial וְהָיָה introduces the consequence/apodosis of the
    preceding promise about the prophet. In English, a simple 'And' naturally carries
    the transition without the wooden 'and it shall be,' while preserving the forward-looking
    force in the rest of the sentence.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the person
  - whoever
  lexicon: HALOT
  rationale: The Hebrew is singular masculine with representative force. Per the gender-accurate
    philosophy, 'the man' best matches the source form and sense, rather than neutralizing
    to 'the person' or recasting as 'whoever'.
- source_word: לֹא יִשְׁמַע אֶל
  chosen: does not listen to
  alternatives:
  - does not hear
  - does not obey
  lexicon: HALOT
  rationale: שׁמע with אֶל can mean hear/listen with the implication of heed. 'Listen
    to' preserves both auditory and responsive nuance without over-interpreting as
    full 'obey' in the main text.
- source_word: דְּבָרַי
  chosen: my words
  alternatives:
  - my word
  - what I say
  lexicon: HALOT
  rationale: The plural construct with first-person suffix is straightforwardly 'my
    words.' This preserves the direct divine speech and avoids unnecessary smoothing.
- source_word: אֲשֶׁר יְדַבֵּר
  chosen: that he speaks
  alternatives:
  - which he will speak
  - that he says
  lexicon: HALOT
  rationale: The relative clause refers to the prophet's speaking. Present English
    'that he speaks' works generically and idiomatically in this legal-prophetic context.
- source_word: בִּשְׁמִי
  chosen: in my name
  alternatives:
  - on my behalf
  - under my authority
  lexicon: HALOT
  rationale: The idiom literally means 'in my name' and carries the sense of authorized
    representation. The literal rendering is clear in English and preserves the theological
    weight of divine authorization.
- source_word: אָנֹכִי
  chosen: I myself
  alternatives:
  - I
  - I indeed
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis before the verb. 'I myself' brings
    out the emphatic force more clearly than an unmarked 'I.'
- source_word: אֶדְרֹשׁ מֵעִמּוֹ
  chosen: will require it from him
  alternatives:
  - will require it of him
  - will call him to account
  - will seek it from him
  lexicon: HALOT
  rationale: דרשׁ with מן/מעם in this context conveys holding someone accountable
    or exacting an answer. 'Will require it from him' preserves the formal, judicial
    sense while remaining readable. The object 'it' is implicit in English, referring
    to heed owed to God's words.
