id: DEU.18.16
reference: Deuteronomy 18:16
source:
  edition: WLC
  text: כְּ/כֹ֨ל אֲשֶׁר שָׁאַ֜לְתָּ מֵ/עִ֨ם יְהוָ֤ה אֱלֹהֶ֨י/ךָ֙ בְּ/חֹרֵ֔ב בְּ/י֥וֹם
    הַ/קָּהָ֖ל לֵ/אמֹ֑ר לֹ֣א אֹסֵ֗ף לִ/שְׁמֹ֨עַ֙ אֶת קוֹל֙ יְהוָ֣ה אֱלֹהָ֔/י וְ/אֶת
    הָ/אֵ֨שׁ הַ/גְּדֹלָ֥ה הַ/זֹּ֛את לֹֽא אֶרְאֶ֥ה ע֖וֹד וְ/לֹ֥א אָמֽוּת־־־־׃
translation:
  text: just as you asked from the LORD your God at Horeb on the day of the assembly,
    saying, ‘Let me not continue to hear the voice of the LORD my God, and let me
    not see this great fire anymore, lest I die.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will not continue to hear' / 'I will hear no more.' The Hebrew idiom
      literally involves 'adding/continuing' to hear.
    reason: lexical_alternative
  - marker: b
    text: Or 'so that I may not die.' The final clause expresses the speaker's fear
      of death from direct exposure to the divine presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּכֹל אֲשֶׁר
  chosen: just as
  alternatives:
  - according to all that
  - exactly as
  lexicon: HALOT
  rationale: 'Introduces comparison with the previous promise: the coming prophet
    corresponds to what Israel requested. ''Just as'' is idiomatic English that preserves
    the comparative force without woodenly reproducing ''according to all that.'''
- source_word: שָׁאַלְתָּ
  chosen: you asked
  alternatives:
  - you requested
  - you petitioned
  lexicon: HALOT
  rationale: The verb denotes asking/requesting. 'Asked' is the most natural modern
    English equivalent and fits the Horeb context.
- source_word: מֵעִם
  chosen: from
  alternatives:
  - of
  - with
  lexicon: HALOT
  rationale: Here the preposition marks the one from whom the request was made. 'From'
    is the clearest English rendering.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name יְהוָה is rendered 'the LORD' rather
    than transliterated.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward possessive construction; preserves covenantal address
    to Israel.
- source_word: בְּחֹרֵב
  chosen: at Horeb
  alternatives:
  - in Horeb
  lexicon: HALOT
  rationale: Standard English for location with a place name in this context is 'at
    Horeb.'
- source_word: בְּיוֹם הַקָּהָל
  chosen: on the day of the assembly
  alternatives:
  - on the day of the gathering
  - on the day of convocation
  lexicon: HALOT
  rationale: קָהָל refers to the assembled congregation of Israel. 'Assembly' is both
    accurate and readable, and 'day of the assembly' preserves the formal event reference.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - when you said
  lexicon: HALOT
  rationale: Standard quotation introducer. 'Saying' keeps the syntax close to the
    Hebrew while remaining natural.
- source_word: לֹא אֹסֵף לִשְׁמֹעַ
  chosen: Let me not continue to hear
  alternatives:
  - I will not continue to hear
  - let me not hear again
  lexicon: HALOT
  rationale: אָסַף in this idiom means to continue/add again. In the quoted plea from
    Horeb, English jussive-like wording ('Let me not continue') best captures the
    request being voiced to God, rather than a mere prediction.
- source_word: קוֹל יְהוָה אֱלֹהָי
  chosen: the voice of the LORD my God
  alternatives:
  - the sound of the LORD my God
  lexicon: HALOT
  rationale: קוֹל commonly means 'voice' here, referring to the terrifying divine
    speech at Sinai/Horeb. 'Voice' preserves the personal nature of God's speaking.
- source_word: וְאֶת הָאֵשׁ הַגְּדֹלָה הַזֹּאת
  chosen: and let me not see this great fire
  alternatives:
  - and this great fire let me not see
  - and let me not look upon this great fire
  lexicon: HALOT
  rationale: The object is fronted in Hebrew, but smoother English places the negated
    verb before the object. 'This great fire' preserves both demonstrative immediacy
    and the adjective's force.
- source_word: עוֹד
  chosen: anymore
  alternatives:
  - again
  - any longer
  lexicon: HALOT
  rationale: In context of repeated exposure, 'anymore' naturally conveys cessation.
- source_word: וְלֹא אָמוּת
  chosen: lest I die
  alternatives:
  - and I not die
  - so that I may not die
  - or I will die
  lexicon: HALOT
  rationale: Though formally coordinated, the clause expresses feared result. 'Lest
    I die' best captures the sense of the plea in idiomatic English.
