id: DEU.18.4
reference: Deuteronomy 18:4
source:
  edition: WLC
  text: רֵאשִׁ֨ית דְּגָֽנְ/ךָ֜ תִּֽירֹשְׁ/ךָ֣ וְ/יִצְהָרֶ֗/ךָ וְ/רֵאשִׁ֛ית גֵּ֥ז צֹאנְ/ךָ֖
    תִּתֶּן לּֽ/וֹ־׃
translation:
  text: You shall give him the firstfruits of your grain, your new wine, and your
    oil, and the first of the fleece of your flock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the first portion of your grain, your wine, and your oil.'
    reason: lexical_alternative
  - marker: b
    text: '''New wine'' translates a Hebrew term often used for freshly produced wine.'
    reason: cultural_note
  - marker: c
    text: Or 'the first of the shearing of your flock.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רֵאשִׁית
  chosen: the firstfruits
  alternatives:
  - the first
  - the best part
  - the first portion
  lexicon: HALOT
  rationale: רֵאשִׁית denotes the first or beginning portion. In this cultic-gift
    context, 'firstfruits' is the most natural English rendering for produce offered
    from the initial yield, while still reflecting the Hebrew sense of priority.
- source_word: דָּגָן
  chosen: grain
  alternatives:
  - corn
  - cereal
  lexicon: HALOT
  rationale: דָּגָן is a broad term for grain/cereal produce. 'Grain' is standard
    modern English and avoids the regional ambiguity of 'corn'.
- source_word: תִּירוֹשׁ
  chosen: new wine
  alternatives:
  - wine
  - fresh wine
  lexicon: HALOT
  rationale: תִּירוֹשׁ commonly refers to freshly produced wine or must rather than
    wine in the most general sense. 'New wine' preserves that lexical distinction
    in readable English.
- source_word: יִצְהָר
  chosen: oil
  alternatives:
  - olive oil
  - fresh oil
  lexicon: HALOT
  rationale: יִצְהָר refers to fresh oil, ordinarily olive oil in Israelite context.
    'Oil' is sufficiently accurate and idiomatic here; 'olive oil' is possible but
    slightly more interpretive than the Hebrew wording requires.
- source_word: גֵּז
  chosen: the fleece
  alternatives:
  - the shearing
  - the wool
  lexicon: HALOT
  rationale: גֵּז can denote shorn wool/fleece or the act/product of shearing. In
    the phrase 'the first of the fleece of your flock,' 'fleece' best captures the
    concrete item given to the priest.
- source_word: צֹאן
  chosen: your flock
  alternatives:
  - your sheep
  - your small livestock
  lexicon: HALOT
  rationale: צֹאן can refer collectively to small livestock, especially sheep and
    goats. 'Flock' is the best collective English equivalent in this context and matches
    the possessive construction naturally.
- source_word: תִּתֶּן לוֹ
  chosen: You shall give him
  alternatives:
  - you must give him
  - you are to give him
  lexicon: HALOT
  rationale: The imperfect here functions as legal instruction. 'You shall give him'
    preserves the prescriptive force and fits the covenant-law style of the passage.
