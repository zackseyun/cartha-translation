theological_decisions:
- issue: Referent of 'him' (לוֹ)
  chosen_reading: the gift is to be given to the priest/Levite in the immediate legal
    context
  alternative_readings:
  - a singular representative priest
  - the priestly class collectively
  rationale: The pronoun is singular in Hebrew, but within the surrounding legislation
    it refers to the priestly recipient described in context. Rendering simply 'him'
    preserves the grammatical form without over-specifying beyond the text.
