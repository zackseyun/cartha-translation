id: DEU.18.1
reference: Deuteronomy 18:1
source:
  edition: WLC
  text: לֹֽא יִ֠הְיֶה לַ/כֹּהֲנִ֨ים הַ/לְוִיִּ֜ם כָּל שֵׁ֧בֶט לֵוִ֛י חֵ֥לֶק וְ/נַחֲלָ֖ה
    עִם יִשְׂרָאֵ֑ל אִשֵּׁ֧י יְהוָ֛ה וְ/נַחֲלָת֖/וֹ יֹאכֵלֽוּ/ן־־־׃
translation:
  text: The Levitical priests—all the tribe of Levi—shall have no portion or inheritance
    with Israel; they shall eat the food offerings of the LORD and his inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “the offerings by fire of the LORD.”
    reason: lexical_alternative
  - marker: b
    text: “His inheritance” may refer collectively to Levi/the Levite; compare the
      parallel statement in Deuteronomy 18:2, where the LORD is said to be their inheritance.
    reason: cross_reference
lexical_decisions:
- source_word: לַכֹּהֲנִים הַלְוִיִּם
  chosen: The Levitical priests
  alternatives:
  - the priests, the Levites
  - the priests who are Levites
  lexicon: HALOT
  rationale: Construct-like apposition identifies the priests as Levitical. 'Levitical
    priests' is concise, natural English and reflects the class designation without
    implying a separate group from Levi.
- source_word: כָּל שֵׁבֶט לֵוִי
  chosen: all the tribe of Levi
  alternatives:
  - the whole tribe of Levi
  - even the whole tribe of Levi
  lexicon: HALOT
  rationale: כָּל with שֵׁבֶט intensifies the scope, clarifying that the statement
    applies not merely to priests narrowly but to the entire tribe. 'All the tribe
    of Levi' preserves the Hebrew emphasis and appositional force.
- source_word: חֵלֶק וְנַחֲלָה
  chosen: portion or inheritance
  alternatives:
  - share or inheritance
  - portion and inheritance
  lexicon: HALOT
  rationale: The pair refers to allotted territorial/property rights. 'Portion or
    inheritance' communicates the near-synonymous legal terms in idiomatic English;
    'or' avoids awkward redundancy while preserving the sense of denied allotment.
- source_word: עִם יִשְׂרָאֵל
  chosen: with Israel
  alternatives:
  - among Israel
  - along with Israel
  lexicon: HALOT
  rationale: The phrase indicates possession in common with the other tribes. 'With
    Israel' is sufficiently literal and clear.
- source_word: אִשֵּׁי יְהוָה
  chosen: the food offerings of the LORD
  alternatives:
  - the offerings by fire of the LORD
  - the LORD's fire offerings
  lexicon: HALOT
  rationale: Though literally related to fire offerings, the term denotes offerings
    presented to the LORD for priestly consumption. 'Food offerings' is a clear modern
    rendering that preserves sacrificial context without wooden literalism. The divine
    name follows project policy as 'the LORD' for יְהוָה.
- source_word: וְנַחֲלָתוֹ
  chosen: his inheritance
  alternatives:
  - their inheritance
  - the inheritance due to him
  - the LORD's inheritance
  lexicon: HALOT
  rationale: The 3ms suffix is singular. In context it most naturally refers to Levi/the
    Levite as a collective singular, matching the preceding singular tribal language.
    'His inheritance' preserves the Hebrew form while allowing the following plural
    verb to refer back to the collective group.
- source_word: יֹאכֵלוּן
  chosen: they shall eat
  alternatives:
  - they may eat
  - they shall feed on
  lexicon: HALOT
  rationale: 'The imperfect here expresses customary/future legal provision. ''They
    shall eat'' fits the legislative context and links both objects: the LORD''s offerings
    and his inheritance.'
