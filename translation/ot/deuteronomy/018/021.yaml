id: DEU.18.21
reference: Deuteronomy 18:21
source:
  edition: WLC
  text: וְ/כִ֥י תֹאמַ֖ר בִּ/לְבָבֶ֑/ךָ אֵיכָה֙ נֵדַ֣ע אֶת הַ/דָּבָ֔ר אֲשֶׁ֥ר לֹא דִבְּר֖/וֹ
    יְהוָֽה־־׃
translation:
  text: And if you say in your heart, ‘How shall we know the word that the LORD has
    not spoken?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the matter' or 'the message'; Hebrew davar can refer broadly to a word,
      message, or matter. In this prophetic context, 'word' best fits.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  chosen: And if
  alternatives:
  - But if
  - And when
  lexicon: HALOT
  rationale: The conjunction plus particle introduces a conditional or prospective
    question flowing from the previous context. 'And if' preserves the discourse connection
    and the conditional sense without overinterpreting it as adversative.
- source_word: תֹאמַר
  chosen: you say
  alternatives:
  - you will say
  - you should say
  lexicon: HALOT
  rationale: 'Qal imperfect 2ms here functions naturally in English as a simple present
    in a conditional clause: ''if you say.'' This is idiomatic and preserves the direct
    address to Israel.'
- source_word: בִּלְבָבֶךָ
  chosen: in your heart
  alternatives:
  - in your mind
  - to yourself
  lexicon: HALOT
  rationale: The Hebrew idiom literally refers to the inner person as the seat of
    thought. 'In your heart' preserves the source imagery and biblical idiom better
    than a flattening paraphrase such as 'to yourself.'
- source_word: אֵיכָה
  chosen: How shall
  alternatives:
  - How will
  - How can
  lexicon: HALOT
  rationale: Introduces the manner or means of knowing. 'How shall we know' is natural,
    suitably weighty, and fits the deliberative tone of the question.
- source_word: נֵדַע
  chosen: we know
  alternatives:
  - we recognize
  - we discern
  lexicon: HALOT
  rationale: The common verb ידע is best rendered 'know' here. More interpretive options
    like 'discern' are possible but unnecessary in the main text.
- source_word: הַדָּבָר
  chosen: the word
  alternatives:
  - the matter
  - the message
  - the thing
  lexicon: HALOT
  rationale: 'In the prophetic context, דָּבָר commonly refers to an utterance or
    message. ''Word'' best matches the immediate concern: identifying a purported
    prophetic word from the LORD.'
- source_word: אֲשֶׁר לֹא דִבְּרוֹ
  chosen: that ... has not spoken
  alternatives:
  - which ... did not speak
  - that ... has not declared
  lexicon: HALOT
  rationale: 'The relative clause modifies ''the word.'' The perfect with negation
    is well represented by English present perfect in this context: ''has not spoken.''
    This keeps the focus on whether the LORD is the source of the utterance.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the stated translation
    policy.
