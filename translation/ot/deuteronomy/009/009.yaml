id: DEU.9.9
reference: Deuteronomy 9:9
source:
  edition: WLC
  text: בַּ/עֲלֹתִ֣/י הָ/הָ֗רָ/ה לָ/קַ֜חַת לוּחֹ֤ת הָֽ/אֲבָנִים֙ לוּחֹ֣ת הַ/בְּרִ֔ית
    אֲשֶׁר כָּרַ֥ת יְהוָ֖ה עִמָּ/כֶ֑ם וָ/אֵשֵׁ֣ב בָּ/הָ֗ר אַרְבָּעִ֥ים יוֹם֙ וְ/אַרְבָּעִ֣ים
    לַ֔יְלָה לֶ֚חֶם לֹ֣א אָכַ֔לְתִּי וּ/מַ֖יִם לֹ֥א שָׁתִֽיתִי־׃
translation:
  text: When I went up the mountain to receive the stone tablets, the tablets of the
    covenant that the LORD made with you, I remained on the mountain forty days and
    forty nights; I ate no bread and drank no water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''to take''; here ''to receive'' reflects the sense of Moses going
      up to be given the tablets.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the tablets of stone.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'cut with you,' a standard Hebrew idiom for making a covenant.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּעֲלֹתִי
  chosen: When I went up
  alternatives:
  - When I ascended
  - In my going up
  lexicon: HALOT
  rationale: 'The preposition ב plus infinitive construct of עלה with 1cs suffix is
    temporal: ''when I went up'' or ''in my going up.'' ''Went up'' is natural modern
    English and preserves the motion without sounding overly formal.'
- source_word: הָהָרָה
  chosen: the mountain
  alternatives:
  - the hill-country
  - the hill
  lexicon: HALOT
  rationale: הַר with directional ה refers to ascent toward a specific mountain, here
    Sinai/Horeb in context. 'The mountain' best reflects the definite article and
    narrative specificity.
- source_word: לָקַחַת
  chosen: to receive
  alternatives:
  - to take
  lexicon: HALOT
  rationale: Although לקח commonly means 'take,' in this context Moses is going up
    in order to receive what God gives. 'Receive' conveys the idiomatic sense in English
    without distorting the source.
- source_word: לוּחֹת הָאֲבָנִים
  chosen: the stone tablets
  alternatives:
  - the tablets of stone
  - the stone slabs
  lexicon: HALOT
  rationale: The construct phrase literally means 'tablets of stones/stone.' 'Stone
    tablets' is clear, idiomatic, and preserves the material.
- source_word: לוּחֹת הַבְּרִית
  chosen: the tablets of the covenant
  alternatives:
  - the covenant tablets
  lexicon: HALOT
  rationale: This appositional repetition identifies the stone tablets as covenant
    tablets. Retaining both phrases reflects the Hebrew emphasis and structure.
- source_word: אֲשֶׁר כָּרַת יְהוָה עִמָּכֶם
  chosen: that the LORD made with you
  alternatives:
  - that the LORD cut with you
  - that the LORD established with you
  lexicon: HALOT
  rationale: כרת ברית is the standard idiom 'make/cut a covenant.' English normally
    uses 'made.' Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The doctrine file specifies the default rendering 'the LORD' for the
    divine name, following Jewish reverence tradition and LXX pattern.
- source_word: וָאֵשֵׁב
  chosen: I remained
  alternatives:
  - I stayed
  - I sat
  lexicon: HALOT
  rationale: ישב can mean 'sit,' 'dwell,' or 'remain.' In this narrative context,
    duration on the mountain is in view, so 'remained' best communicates the sense.
- source_word: אַרְבָּעִים יוֹם וְאַרְבָּעִים לַיְלָה
  chosen: forty days and forty nights
  alternatives:
  - forty days and forty night-periods
  lexicon: HALOT
  rationale: This is the standard Hebrew duration expression and should be rendered
    straightforwardly.
- source_word: לֶחֶם לֹא אָכַלְתִּי
  chosen: I ate no bread
  alternatives:
  - I did not eat bread
  - I ate no food
  lexicon: HALOT
  rationale: לחם literally means 'bread,' though it can stand for food more broadly.
    Because the Hebrew specifically says 'bread,' the translation keeps the concrete
    term rather than broadening it to 'food.'
- source_word: וּמַיִם לֹא שָׁתִיתִי
  chosen: and drank no water
  alternatives:
  - and I did not drink water
  lexicon: HALOT
  rationale: A direct and natural rendering of the Hebrew clause, preserving the parallel
    with the previous statement.
