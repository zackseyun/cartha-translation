id: DEU.9.7
reference: Deuteronomy 9:7
source:
  edition: WLC
  text: זְכֹר֙ אַל תִּשְׁכַּ֔ח אֵ֧ת אֲשֶׁר הִקְצַ֛פְתָּ אֶת יְהוָ֥ה אֱלֹהֶ֖י/ךָ בַּ/מִּדְבָּ֑ר לְ/מִן הַ/יּ֞וֹם אֲשֶׁר יָצָ֣אתָ מֵ/אֶ֣רֶץ מִצְרַ֗יִם עַד בֹּֽאֲ/כֶם֙ עַד הַ/מָּק֣וֹם הַ/זֶּ֔ה מַמְרִ֥ים הֱיִיתֶ֖ם עִם יְהוָֽה־־־־־׀־־־׃
translation:
  text: Remember—do not forget—how you provoked Yahweh your God to wrath in the wilderness. From the day you came out of the land of Egypt until you came to this place, you have been rebellious against Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'how you angered the LORD your God in the wilderness.'
    reason: lexical_alternative
  - marker: b
    text: 'Literally, ''with the LORD''; here the sense is adversative: ''against the LORD.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: זְכֹר
  chosen: Remember
  alternatives:
  - Call to mind
  lexicon: HALOT
  rationale: Imperative of זכר, a direct command to remember. 'Remember' is the standard, natural English equivalent.
- source_word: אַל תִּשְׁכַּח
  chosen: do not forget
  alternatives:
  - do not fail to remember
  lexicon: HALOT
  rationale: Negative jussive/imperfect reinforcing the prior imperative. Rendering both verbs preserves the emphatic Hebrew pairing rather than collapsing them into one English command.
- source_word: אֵת אֲשֶׁר הִקְצַפְתָּ
  chosen: how you provoked ... to wrath
  alternatives:
  - that you provoked
  - how you angered
  lexicon: HALOT
  rationale: The construction introduces the content to be remembered. 'How you provoked ... to wrath' captures both the eventive force and the causative nuance of הקצף ('to provoke to anger/wrath').
- source_word: הִקְצַפְתָּ
  chosen: provoked ... to wrath
  alternatives:
  - angered
  - provoked to anger
  lexicon: HALOT
  rationale: The Hiphil of קצף is causative. 'Provoked ... to wrath' preserves the stronger covenantal sense better than the flatter 'angered.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with second masculine singular suffix; 'the LORD your God' is the natural covenantal expression.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: '''Wilderness'' is the conventional and contextually appropriate rendering in the exodus tradition; it need not imply a sandy desert only.'
- source_word: לְמִן הַיּוֹם אֲשֶׁר
  chosen: From the day
  alternatives:
  - Ever since the day when
  lexicon: HALOT
  rationale: This marks the starting point of a time span. 'From the day' is concise and faithful.
- source_word: יָצָאתָ מֵאֶרֶץ מִצְרַיִם
  chosen: you came out of the land of Egypt
  alternatives:
  - you went out from the land of Egypt
  lexicon: HALOT
  rationale: '''Came out of the land of Egypt'' is idiomatic English and preserves the exodus formula.'
- source_word: עַד בֹּאֲכֶם עַד הַמָּקוֹם הַזֶּה
  chosen: until your coming to this place
  alternatives:
  - until you came to this place
  - up to your arrival at this place
  lexicon: HALOT
  rationale: The Hebrew shifts from second masculine singular earlier to second masculine plural here. 'Your coming' preserves the infinitive construct plus plural suffix and allows the shift to stand without awkwardness.
- source_word: מַמְרִים הֱיִיתֶם
  chosen: you have been rebellious
  alternatives:
  - you were rebellious
  - you have been defiant
  lexicon: HALOT
  rationale: מרה denotes rebellion or defiance, especially against authority. 'Rebellious' fits the covenantal context. The English present perfect reflects the durative sense over the span just described.
- source_word: עִם יְהוָה
  chosen: against the LORD
  alternatives:
  - with the LORD
  lexicon: HALOT
  rationale: Although עִם commonly means 'with,' in contexts of hostility after מרה it is best rendered idiomatically as 'against' in English. This conveys the adversative relationship intended by the Hebrew.
