theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Temporal force of Israel's rebellion across the verse
  chosen_reading: you have been rebellious
  alternative_readings:
  - you were rebellious
  rationale: The verse describes a continuous pattern from the exodus until the present location. English present perfect best communicates that ongoing history without overstating a theological claim beyond the text.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
