theological_decisions:
- issue: Rhetorical distancing in 'your people, whom you brought out from Egypt'
  chosen_reading: Preserved the wording as a divine rebuke to Moses without softening
    it.
  alternative_readings:
  - Paraphrasing to remove the distancing effect
  rationale: The Hebrew intentionally echoes covenant language in a sharpened, confrontational
    way. The translation keeps that tension rather than smoothing it out.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
- issue: Rendering of idolatry term מַסֵּכָה
  chosen_reading: cast image
  alternative_readings:
  - idol
  - molten image
  rationale: The text specifies the physical form of the idol rather than using a
    generic term alone. 'Cast image' preserves the concrete nature of the sin without
    interpretive expansion.
  doctrine_reference: Translation philosophy §1 and §5
