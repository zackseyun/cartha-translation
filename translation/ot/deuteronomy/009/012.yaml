id: DEU.9.12
reference: Deuteronomy 9:12
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֵלַ֗/י ק֣וּם רֵ֤ד מַהֵר֙ מִ/זֶּ֔ה כִּ֚י שִׁחֵ֣ת עַמְּ/ךָ֔
    אֲשֶׁ֥ר הוֹצֵ֖אתָ מִ/מִּצְרָ֑יִם סָ֣רוּ מַהֵ֗ר מִן הַ/דֶּ֨רֶךְ֙ אֲשֶׁ֣ר צִוִּיתִ֔/ם
    עָשׂ֥וּ לָ/הֶ֖ם מַסֵּכָֽה־׃
translation:
  text: And the LORD said to me, 'Arise, go down quickly from here, because your people,
    whom you brought out from Egypt, have acted corruptly. They have quickly turned
    aside from the way that I commanded them; they have made for themselves a cast
    image.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a molten image.' The Hebrew term refers to an image formed by casting
      metal.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Follows the project's default rendering for the divine name, preserving
    covenantal sense while matching established English Bible convention.
- source_word: קוּם
  chosen: Arise
  alternatives:
  - Get up
  - Rise
  lexicon: HALOT
  rationale: Imperative of standing/getting up. 'Arise' preserves the abrupt solemn
    force of the command better than the more colloquial 'get up.'
- source_word: רֵד
  chosen: go down
  alternatives:
  - descend
  lexicon: HALOT
  rationale: The verb denotes downward movement. 'Go down' is natural modern English
    and preserves the directional sense without sounding overly formal like 'descend.'
- source_word: מַהֵר
  chosen: quickly
  alternatives:
  - hurry
  - at once
  lexicon: HALOT
  rationale: Adverbial use indicating urgency. 'Quickly' is clear and idiomatic in
    both occurrences and preserves the repetition in the verse.
- source_word: מִזֶּה
  chosen: from here
  alternatives:
  - from this place
  lexicon: HALOT
  rationale: Deictic expression referring to Moses' present location. 'From here'
    is concise and natural.
- source_word: שִׁחֵת
  chosen: have acted corruptly
  alternatives:
  - have corrupted themselves
  - have become corrupt
  - have ruined themselves
  lexicon: HALOT
  rationale: The verb in this context describes moral corruption/apostasy. 'Have acted
    corruptly' avoids adding reflexive wording not explicit in the Hebrew while conveying
    ethical degeneration.
- source_word: עַמְּךָ
  chosen: your people
  alternatives:
  - the people belonging to you
  lexicon: HALOT
  rationale: Direct and idiomatic rendering of the possessive phrase. It also preserves
    the rhetorical distancing in God's address to Moses.
- source_word: הוֹצֵאתָ מִמִּצְרָיִם
  chosen: whom you brought out from Egypt
  alternatives:
  - whom you led out of Egypt
  lexicon: HALOT
  rationale: The hiphil of יצא means 'bring out/lead out.' 'Brought out from Egypt'
    closely matches the causative sense and common exodus idiom.
- source_word: סָרוּ
  chosen: have quickly turned aside
  alternatives:
  - have quickly departed
  - have quickly turned away
  lexicon: HALOT
  rationale: With מן הדרך, the idiom means deviating from a prescribed path. 'Turned
    aside' is the standard and most precise English equivalent.
- source_word: מִן הַדֶּרֶךְ
  chosen: from the way
  alternatives:
  - from the path
  lexicon: HALOT
  rationale: '''Way'' preserves the metaphorical sense of commanded conduct and aligns
    with common biblical usage.'
- source_word: צִוִּיתִם
  chosen: that I commanded them
  alternatives:
  - that I commanded for them
  lexicon: HALOT
  rationale: The verb takes the people as object; English idiom requires 'commanded
    them.' This preserves divine authority without awkwardness.
- source_word: מַסֵּכָה
  chosen: a cast image
  alternatives:
  - a molten image
  - an idol of cast metal
  lexicon: HALOT
  rationale: The noun refers to an image made by casting metal. 'Cast image' is accurate
    and readable; 'molten image' is traditional but less natural in contemporary English.
- source_word: עָשׂוּ לָהֶם
  chosen: they have made for themselves
  alternatives:
  - they made themselves
  - they have made themselves
  lexicon: HALOT
  rationale: The phrase indicates making something for their own use/benefit. 'For
    themselves' brings out the reflexive-benefactive nuance more clearly than a bare
    'made themselves.'
