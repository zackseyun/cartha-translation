theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Force of נָתַתִּי ('I have given') in the land promise
  chosen_reading: that I have given you
  alternative_readings:
  - that I gave you
  rationale: The perfect is retained with present relevance to emphasize the certainty
    and established status of God's grant without importing a theological system beyond
    the verse.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
