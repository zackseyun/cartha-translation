id: DEU.9.23
reference: Deuteronomy 9:23
source:
  edition: WLC
  text: וּ/בִ/שְׁלֹ֨חַ יְהוָ֜ה אֶתְ/כֶ֗ם מִ/קָּדֵ֤שׁ בַּרְנֵ֨עַ֙ לֵ/אמֹ֔ר עֲלוּ֙ וּ/רְשׁ֣וּ
    אֶת הָ/אָ֔רֶץ אֲשֶׁ֥ר נָתַ֖תִּי לָ/כֶ֑ם וַ/תַּמְר֗וּ אֶת פִּ֤י יְהוָה֙ אֱלֹ֣הֵי/כֶ֔ם
    וְ/לֹ֤א הֶֽאֱמַנְתֶּם֙ ל֔/וֹ וְ/לֹ֥א שְׁמַעְתֶּ֖ם בְּ/קֹלֽ/וֹ־־׃
translation:
  text: And when the LORD sent you from Kadesh-barnea, saying, 'Go up and take possession
    of the land that I have given you,' you rebelled against the command of the LORD
    your God, and you did not believe him or listen to his voice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'you rebelled against the mouth of the LORD your God,'
      an idiom meaning his command or word.
    reason: lexical_alternative
  - marker: b
    text: Or 'you did not trust him.'
    reason: lexical_alternative
  - marker: c
    text: Or 'you did not obey his voice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִשְׁלֹחַ
  chosen: And when ... sent
  alternatives:
  - and in sending
  - when ... sent
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition with infinitive construct introduces
    a temporal circumstance. English idiom is best captured by 'And when ... sent'
    rather than a more wooden 'and in sending.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name, render YHWH as 'the LORD' rather
    than transliteration.
- source_word: מִקָּדֵשׁ בַּרְנֵעַ
  chosen: from Kadesh-barnea
  alternatives:
  - from Kadesh Barnea
  lexicon: HALOT
  rationale: Place name is transliterated. Hyphenation keeps the compound toponym
    readable in English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard Hebrew quotative introducing direct speech; 'saying' is natural
    English.
- source_word: עֲלוּ
  chosen: Go up
  alternatives:
  - Ascend
  - Go
  lexicon: HALOT
  rationale: עלה commonly means 'go up'; in this context it reflects movement into
    the hill country/land and preserves the Hebrew idiom.
- source_word: וּרְשׁוּ
  chosen: take possession of
  alternatives:
  - possess
  - inherit
  lexicon: HALOT
  rationale: ירשׁ in conquest-land contexts means to take possession/occupy as inheritance.
    'Take possession of' is clearer in modern English than the bare 'possess' and
    avoids overreading 'inherit' where military entry is in view.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: In Deuteronomy this commonly refers to the promised land; 'the land'
    preserves covenantal resonance without unnecessary expansion.
- source_word: אֲשֶׁר נָתַתִּי לָכֶם
  chosen: that I have given you
  alternatives:
  - which I gave you
  - that I am giving you
  lexicon: HALOT
  rationale: The perfect can be rendered as a completed divine grant viewed as certain.
    'Have given' communicates the settled nature of God's gift in context.
- source_word: וַתַּמְרוּ
  chosen: you rebelled
  alternatives:
  - you were rebellious
  - you defied
  lexicon: HALOT
  rationale: מרה denotes rebellion/defiance against authority. 'You rebelled' is direct
    and idiomatic.
- source_word: אֶת־פִּי יְהוָה אֱלֹהֵיכֶם
  chosen: against the command of the LORD your God
  alternatives:
  - against the mouth of the LORD your God
  - against the word of the LORD your God
  lexicon: HALOT
  rationale: Literally 'against the mouth of' is a Hebrew idiom for authoritative
    utterance/command. 'Against the command of' best conveys the sense in natural
    English.
- source_word: וְלֹא הֶאֱמַנְתֶּם לוֹ
  chosen: and you did not believe him
  alternatives:
  - and you did not trust him
  - and you did not have faith in him
  lexicon: HALOT
  rationale: אמן in the Hiphil here means to believe/trust. 'Believe him' fits the
    immediate context of refusing God's promise and command; 'trust him' is a viable
    nuance but less directly tied to the verbal construction.
- source_word: וְלֹא שְׁמַעְתֶּם בְּקֹלוֹ
  chosen: or listen to his voice
  alternatives:
  - and did not obey his voice
  - and did not listen to his voice
  lexicon: HALOT
  rationale: שׁמע בקול can mean listen to/obey. Because rebellion has already been
    stated explicitly, 'listen to his voice' preserves the auditory idiom while allowing
    the obedience implication to remain. 'Or' avoids clunky repetition after the prior
    negative clause in English while preserving the coordinated sense.
