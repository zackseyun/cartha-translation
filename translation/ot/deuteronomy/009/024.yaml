id: DEU.9.24
reference: Deuteronomy 9:24
source:
  edition: WLC
  text: מַמְרִ֥ים הֱיִיתֶ֖ם עִם יְהוָ֑ה מִ/יּ֖וֹם דַּעְתִּ֥/י אֶתְ/כֶֽם־׃
translation:
  text: You have been rebellious against Yahweh from the day I knew you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''with the LORD''; the phrase means opposition to him, hence ''against the LORD.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מַמְרִים
  chosen: rebellious
  alternatives:
  - rebels
  - stubbornly rebellious
  - defiant
  lexicon: HALOT
  rationale: 'From the root מרה, denoting rebellion or resistance. Predicative adjective/participle fits the construction with הֱיִיתֶם: ''you have been rebellious.'' ''Rebellious'' is natural English and preserves the covenantal sense of resisting God''s authority.'
- source_word: הֱיִיתֶם
  chosen: have been
  alternatives:
  - were
  lexicon: HALOT
  rationale: 'Qal perfect 2mp of היה in a summary statement about Israel''s continuing character up to the present discourse. English present perfect best captures the retrospective force: ''you have been rebellious.'''
- source_word: עִם
  chosen: against
  alternatives:
  - with
  - toward
  lexicon: HALOT
  rationale: Although literally 'with,' in this context with מרה it expresses opposition toward YHWH. 'Against' conveys the adversative sense idiomatically in English without obscuring the Hebrew relationship.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִיּוֹם
  chosen: from the day
  alternatives:
  - since the day
  - from the time
  lexicon: HALOT
  rationale: Temporal expression marking the starting point of the accusation. 'From the day' is a close and idiomatic rendering.
- source_word: דַּעְתִּי
  chosen: I knew
  alternatives:
  - I came to know
  - I became acquainted with
  lexicon: HALOT
  rationale: Qal perfect 1cs of ידע. 'I knew' is the most direct rendering. In context it refers to Moses' knowing Israel from the beginning of his relationship with them, not merely intellectual awareness.
- source_word: אֶתְכֶם
  chosen: you
  lexicon: HALOT
  rationale: Direct-object marker plus 2mp suffix. English simply renders the pronoun as the object of 'knew.'
