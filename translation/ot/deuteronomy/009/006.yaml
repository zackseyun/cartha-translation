theological_decisions:
- issue: Reason Israel receives the land
  chosen_reading: The verse denies that Israel's own righteousness is the basis for the LORD's gift of the land.
  alternative_readings:
  - The verse could be flattened into a general statement about humility without emphasizing covenantal unworthiness.
  rationale: The Hebrew explicitly contrasts Israel's lack of qualifying righteousness with God's act of giving and with Israel's stubbornness. The translation preserves that theological tension without importing a fuller doctrine beyond the verse.
  doctrine_reference: Translation philosophy §3
- issue: Corporate singular address
  chosen_reading: Translate singular pronouns as 'you' while keeping 'people' singular collective.
  alternative_readings:
  - Expand to plural 'you all are a stiff-necked people'
  rationale: Hebrew addresses Israel corporately as a singular entity. Standard English 'you' preserves this without unnecessary paraphrase.
  doctrine_reference: Translation philosophy §1
