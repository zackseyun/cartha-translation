id: DEU.9.6
reference: Deuteronomy 9:6
source:
  edition: WLC
  text: וְ/יָדַעְתָּ֗ כִּ֠י לֹ֤א בְ/צִדְקָֽתְ/ךָ֙ יְהוָ֣ה אֱ֠לֹהֶי/ךָ נֹתֵ֨ן לְ/ךָ֜ אֶת הָ/אָ֧רֶץ הַ/טּוֹבָ֛ה הַ/זֹּ֖את לְ/רִשְׁתָּ֑/הּ כִּ֥י עַם קְשֵׁה עֹ֖רֶף אָֽתָּה־־־׃
translation:
  text: So know that it is not because of your righteousness that Yahweh your God is giving you this good land to possess, for you are a stiff-necked people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to inherit.' The Hebrew verb can denote receiving an inheritance, but in Deuteronomy it often includes the sense of taking possession of the land.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדַעְתָּ
  chosen: So know
  alternatives:
  - And know
  - Know
  lexicon: HALOT
  rationale: Qal perfect 2ms of ידע used imperatively/exhortationally in context; the prefixed conjunction is carried as discourse continuation ('So') rather than a bare 'and' for natural English while preserving the inferential force from the preceding argument.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Introduces the content of what Israel is to know; 'that' best fits the first occurrence syntactically.
- source_word: לֹא בְצִדְקָתְךָ
  chosen: not because of your righteousness
  alternatives:
  - not by your righteousness
  - not on account of your righteousness
  lexicon: HALOT
  rationale: The preposition ב with צדקה here expresses basis/grounds rather than instrument; 'because of' makes explicit that Israel's righteousness is not the reason for receiving the land.
- source_word: צִדְקָה
  chosen: righteousness
  alternatives:
  - justice
  - uprightness
  lexicon: HALOT
  rationale: In this covenantal-moral context the term refers to moral rightness/upright standing, not primarily judicial 'justice.' 'Righteousness' is the standard biblical rendering and best preserves the theological contrast.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and standard English Bible practice.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Construct with 2ms suffix; straightforward covenantal address.
- source_word: נֹתֵן לְךָ
  chosen: is giving you
  alternatives:
  - gives you
  - is about to give you
  lexicon: HALOT
  rationale: The participle conveys ongoing/imminent action in context; English progressive reflects the present relevance of the gift as Israel stands poised to enter the land.
- source_word: הָאָרֶץ הַטּוֹבָה הַזֹּאת
  chosen: this good land
  alternatives:
  - this good הארץ/land
  - this good country
  lexicon: HALOT
  rationale: Retains the demonstrative emphasis and the adjective's evaluative force. 'Land' is preferable to 'country' in covenant-promise contexts.
- source_word: לְרִשְׁתָּהּ
  chosen: to possess
  alternatives:
  - to inherit
  - to take possession of it
  lexicon: HALOT
  rationale: ירשׁ in Deuteronomy often carries the sense of taking/holding possession of the promised land. 'Possess' is concise and idiomatic here; 'inherit' could suggest passive reception without the conquest nuance.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: The second occurrence gives the explanatory ground for the warning; 'for' preserves the explanatory connection in formal yet readable English.
- source_word: עַם
  chosen: people
  alternatives:
  - nation
  lexicon: HALOT
  rationale: Refers to Israel corporately; 'people' is the natural covenantal term.
- source_word: קְשֵׁה עֹרֶף
  chosen: stiff-necked
  alternatives:
  - hard-necked
  - stubborn
  lexicon: HALOT
  rationale: This is a well-established Hebrew idiom for obstinacy/rebellion. 'Stiff-necked' preserves the metaphor and biblical resonance better than the interpretive 'stubborn'.
- source_word: אָתָּה
  chosen: you are
  lexicon: HALOT
  rationale: Second masculine singular pronoun addresses Israel as a corporate singular, naturally rendered with English 'you are' before the predicate nominative 'a stiff-necked people.'
