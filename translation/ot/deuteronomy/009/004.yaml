theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering of
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Potential implication that Israel earned the land by merit
  chosen_reading: Because of my righteousness the LORD has brought me in to possess
    this land
  alternative_readings:
  - For my righteousness the LORD has brought me in to inherit this land
  rationale: The translation preserves Moses' warning against a merit-based interpretation
    without softening 'righteousness' into a less theological term. The verse itself
    rejects Israel's self-attribution of covenant blessing to moral merit.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
