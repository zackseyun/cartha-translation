id: DEU.9.4
reference: Deuteronomy 9:4
source:
  edition: WLC
  text: אַל תֹּאמַ֣ר בִּ/לְבָבְ/ךָ֗ בַּ/הֲדֹ֣ף יְהוָה֩ אֱלֹהֶ֨י/ךָ אֹתָ֥/ם מִ/לְּ/פָנֶי/ךָ֮
    לֵ/אמֹר֒ בְּ/צִדְקָתִ/י֙ הֱבִיאַ֣/נִי יְהוָ֔ה לָ/רֶ֖שֶׁת אֶת הָ/אָ֣רֶץ הַ/זֹּ֑את
    וּ/בְ/רִשְׁעַת֙ הַ/גּוֹיִ֣ם הָ/אֵ֔לֶּה יְהוָ֖ה מוֹרִישָׁ֥/ם מִ/פָּנֶֽי/ךָ־׀־׃
translation:
  text: Do not say in your heart, when the LORD your God drives them out from before
    you, saying, ‘Because of my righteousness the LORD has brought me in to possess
    this land,’ while because of the wickedness of these nations the LORD is dispossessing
    them before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For my righteousness the LORD has brought me in to inherit this land.'
      The Hebrew can be rendered more formally with 'for' and 'inherit,' but the main
      text uses clearer modern English while preserving the sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תֹּאמַר
  chosen: Do not say
  alternatives:
  - You must not say
  lexicon: HALOT
  rationale: אַל with the imperfect gives a prohibition. 'Do not say' is the natural
    English imperative equivalent.
- source_word: בִּלְבָבְךָ
  chosen: in your heart
  alternatives:
  - to yourself
  - within yourself
  lexicon: HALOT
  rationale: Hebrew idiom for inward thought or self-talk. 'In your heart' preserves
    the source metaphor and remains clear in English.
- source_word: בַּהֲדֹף
  chosen: when ... drives ... out
  alternatives:
  - when ... thrusts ... away
  - in ... driving ... away
  lexicon: HALOT
  rationale: 'The infinitive construct with prefixed ב marks temporal circumstance
    here: ''when.'' The verb נדף conveys driving away or thrusting out; in context
    of conquest, ''drives them out'' is idiomatic and clear.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Standard covenantal expression; straightforward possessive rendering.
- source_word: מִלְּפָנֶיךָ / מִפָּנֶיךָ
  chosen: from before you / before you
  alternatives:
  - from your presence
  - ahead of you
  lexicon: HALOT
  rationale: The idiom literally involves 'face/presence.' In conquest context, 'from
    before you' and 'before you' preserve the spatial-relational sense without over-paraphrase.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - thinking
  - to say
  lexicon: HALOT
  rationale: This introduces the content of the prohibited inner speech. Retaining
    'saying' reflects the Hebrew discourse marker, even though it is slightly formal
    in English.
- source_word: בְּצִדְקָתִי
  chosen: Because of my righteousness
  alternatives:
  - For my righteousness
  - On account of my righteousness
  lexicon: HALOT
  rationale: צְדָקָה here refers to supposed moral rightness/merit. 'Because of my
    righteousness' best captures the causal claim Israel is warned not to make.
- source_word: הֱבִיאַנִי
  chosen: has brought me in
  alternatives:
  - has brought me
  - has caused me to enter
  lexicon: HALOT
  rationale: Hiphil of בוא with 1cs suffix means 'has brought me in/caused me to enter.'
    'Brought me in' fits the land-entry context.
- source_word: לָרֶשֶׁת
  chosen: to possess
  alternatives:
  - to take possession of
  - to inherit
  lexicon: HALOT
  rationale: ירשׁ can mean possess, dispossess, or inherit depending on context. Here
    Israel is entering the land, so 'to possess' is concise and accurate.
- source_word: הָאָרֶץ הַזֹּאת
  chosen: this land
  alternatives:
  - this הארץ
  - this country
  lexicon: HALOT
  rationale: In Deuteronomy, 'land' is the standard covenant-geographical term and
    should be preserved.
- source_word: וּבְרִשְׁעַת הַגּוֹיִם הָאֵלֶּה
  chosen: while because of the wickedness of these nations
  alternatives:
  - but because of the wickedness of these nations
  - and because of the wickedness of these nations
  lexicon: HALOT
  rationale: The prefixed waw here is contrastive in sense relative to Israel's imagined
    self-righteous claim. 'While because of' brings out the contrast without adding
    too much interpretation.
- source_word: רִשְׁעָה
  chosen: wickedness
  alternatives:
  - evil
  - guilt
  lexicon: HALOT
  rationale: '''Wickedness'' best matches the moral sense in this judgment context.'
- source_word: מוֹרִישָׁם
  chosen: is dispossessing them
  alternatives:
  - is driving them out
  - is causing them to lose possession
  lexicon: HALOT
  rationale: Hiphil of ירשׁ in relation to the nations means to dispossess them from
    the land. Using 'dispossessing' preserves the lexical connection with the earlier
    'possess' while distinguishing the causative sense.
