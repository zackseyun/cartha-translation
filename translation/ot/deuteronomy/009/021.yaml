theological_decisions:
- issue: Identification of the calf as 'your sin' rather than merely 'the sinful thing
    you made'
  chosen_reading: 'The main text preserves the Hebrew''s direct equation of the idol
    with Israel''s sin: ''your sin, the calf that you had made.'''
  alternative_readings:
  - your sinful thing, the calf that you had made
  rationale: This is not a doctrinally contested term in DOCTRINE.md, but it is theologically
    weighty. The Hebrew apposition is intentionally severe, and the translation should
    preserve that force rather than soften it.
  doctrine_reference: Translation philosophy §1, §3
