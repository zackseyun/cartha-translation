id: DEU.9.21
reference: Deuteronomy 9:21
source:
  edition: WLC
  text: וְֽ/אֶת חַטַּאתְ/כֶ֞ם אֲשֶׁר עֲשִׂיתֶ֣ם אֶת הָ/עֵ֗גֶל לָקַחְתִּי֮ וָ/אֶשְׂרֹ֣ף
    אֹת֣/וֹ בָּ/אֵשׁ֒ וָ/אֶכֹּ֨ת אֹת֤/וֹ טָחוֹן֙ הֵיטֵ֔ב עַ֥ד אֲשֶׁר דַּ֖ק לְ/עָפָ֑ר
    וָֽ/אַשְׁלִךְ֙ אֶת עֲפָר֔/וֹ אֶל הַ/נַּ֖חַל הַ/יֹּרֵ֥ד מִן הָ/הָֽר־־־׀־־־־׃
translation:
  text: And I took your sin, the calf that you had made, and burned it with fire;
    then I crushed it, grinding it thoroughly until it was as fine as dust, and I
    threw its dust into the stream that comes down from the mountain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the brook'; Hebrew נחל can refer to a stream, torrent-bed, or wadi.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַטַּאתְכֶם
  chosen: your sin
  alternatives:
  - your sinful thing
  - your sin offering
  lexicon: HALOT
  rationale: In context the word denotes the sinful object/idol as the embodiment
    of Israel's sin, not a 'sin offering.' Rendering 'your sin' preserves the Hebrew's
    stark identification of the calf with their sin.
- source_word: הָעֵגֶל
  chosen: the calf
  alternatives:
  - the young bull
  lexicon: HALOT
  rationale: The standard sense is 'calf.' Since the referent is the golden calf episode,
    this rendering is both accurate and contextually clear.
- source_word: וָאֶשְׂרֹף אֹתוֹ בָּאֵשׁ
  chosen: burned it with fire
  alternatives:
  - burned it in the fire
  lexicon: HALOT
  rationale: The Hebrew idiom literally uses 'with/in fire.' 'Burned it with fire'
    keeps the emphatic concreteness of the source while remaining natural English.
- source_word: וָאֶכֹּת אֹתוֹ
  chosen: I crushed it
  alternatives:
  - I beat it
  - I pounded it
  lexicon: HALOT
  rationale: The verb can mean strike/beat, but here in sequence with grinding it
    refers to pulverizing the idol. 'Crushed' communicates the result clearly in English.
- source_word: טָחוֹן
  chosen: grinding it
  alternatives:
  - ground it
  - pulverizing it
  lexicon: HALOT
  rationale: This infinitive/participle-like form specifies the manner of crushing.
    'Grinding it' preserves the process nuance rather than only the end result.
- source_word: הֵיטֵב
  chosen: thoroughly
  alternatives:
  - well
  - completely
  lexicon: HALOT
  rationale: The adverb intensifies the action. 'Thoroughly' is idiomatic modern English
    and conveys deliberate completeness.
- source_word: עַד אֲשֶׁר דַּק לְעָפָר
  chosen: until it was as fine as dust
  alternatives:
  - until it was crushed to dust
  - until it became fine like dust
  lexicon: HALOT
  rationale: The clause expresses the degree of pulverization. 'As fine as dust' reads
    naturally and captures the comparison implied by דק + לעפר.
- source_word: עֲפָרוֹ
  chosen: its dust
  alternatives:
  - its powder
  - its ashes
  lexicon: HALOT
  rationale: Refers to the pulverized remains of the calf. 'Dust' links back to the
    previous clause and avoids narrowing the sense to ashes alone.
- source_word: הַנַּחַל
  chosen: the stream
  alternatives:
  - the brook
  - the wadi
  lexicon: HALOT
  rationale: נחל can denote a streambed or torrent valley. 'Stream' is accessible
    modern English; 'brook' is traditional but slightly dated, while 'wadi' would
    require explanation.
- source_word: הַיֹּרֵד מִן הָהָר
  chosen: that comes down from the mountain
  alternatives:
  - that descended from the mountain
  - flowing down from the mountain
  lexicon: HALOT
  rationale: The participle describes the stream's movement. 'Comes down from the
    mountain' is natural English and preserves the present descriptive force.
