id: DEU.9.22
reference: Deuteronomy 9:22
source:
  edition: WLC
  text: וּ/בְ/תַבְעֵרָה֙ וּ/בְ/מַסָּ֔ה וּ/בְ/קִבְרֹ֖ת הַֽתַּאֲוָ֑ה מַקְצִפִ֥ים הֱיִיתֶ֖ם אֶת יְהוָֽה־׃
translation:
  text: And at Taberah, and at Massah, and at Kibroth-hattaavah, you were provoking Yahweh to anger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Kibroth-hattaavah is the name of the place; literally, 'graves of craving' or 'graves of desire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/תַבְעֵרָה
  chosen: and at Taberah
  alternatives:
  - and in Taberah
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition are best rendered 'and at' in a list of locations. The place name is transliterated rather than translated, following the philosophy for personal/place names.
- source_word: וּ/בְ/מַסָּה
  chosen: and at Massah
  alternatives:
  - and in Massah
  lexicon: HALOT
  rationale: As with the preceding toponym, the preposition marks location and the name is transliterated.
- source_word: וּ/בְ/קִבְרֹת הַתַּאֲוָה
  chosen: and at Kibroth-hattaavah
  alternatives:
  - and at Kibroth Hattaavah
  - and at the graves of craving
  lexicon: HALOT
  rationale: This is a fixed place name and is therefore transliterated. A more literal rendering of the components ('graves of craving/desire') is possible but would obscure that this is a named location in the wilderness narrative.
- source_word: מַקְצִפִים
  chosen: provoking ... to anger
  alternatives:
  - making angry
  - provoking to wrath
  lexicon: HALOT
  rationale: The Hiphil participle of קצף conveys causing anger or provoking wrath. 'Provoking ... to anger' preserves the causative force and fits idiomatic English.
- source_word: הֱיִיתֶם
  chosen: you kept
  alternatives:
  - you were
  - you became
  lexicon: HALOT
  rationale: Combined with the participle, היה forms a periphrastic verbal expression indicating ongoing or characteristic action in past time. 'You kept' captures the iterative/continuous sense better than a bare 'you were.'
- source_word: אֶת יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - the LORD God
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The direct-object marker אֶת is not translated in English but indicates that the LORD is the object of the provocation.
