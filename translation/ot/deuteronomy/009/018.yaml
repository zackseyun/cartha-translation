id: DEU.9.18
reference: Deuteronomy 9:18
source:
  edition: WLC
  text: וָֽ/אֶתְנַפַּל֩ לִ/פְנֵ֨י יְהוָ֜ה כָּ/רִאשֹׁנָ֗ה אַרְבָּעִ֥ים יוֹם֙ וְ/אַרְבָּעִ֣ים לַ֔יְלָה לֶ֚חֶם לֹ֣א אָכַ֔לְתִּי וּ/מַ֖יִם לֹ֣א שָׁתִ֑יתִי עַ֤ל כָּל חַטַּאתְ/כֶם֙ אֲשֶׁ֣ר חֲטָאתֶ֔ם לַ/עֲשׂ֥וֹת הָ/רַ֛ע בְּ/עֵינֵ֥י יְהוָ֖ה לְ/הַכְעִיסֽ/וֹ־׃
translation:
  text: Then I fell down before Yahweh, as at the first, forty days and forty nights; I ate no bread and drank no water, because of all your sin that you had committed by doing what was evil in the sight of Yahweh, provoking him to anger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as before' or 'as formerly.' The Hebrew phrase points back to Moses' earlier forty-day period before the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶתְנַפַּל
  chosen: Then I fell down
  alternatives:
  - Then I prostrated myself
  - Then I lay fallen
  lexicon: HALOT
  rationale: The hitpael/waw-consecutive form of נפל here describes Moses casting himself down before God in intercession. 'Fell down' is idiomatic and preserves the physical posture without over-paraphrasing; 'Then' reflects the narrative waw.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי is spatial-relational, 'before/in the presence of.' 'Before the LORD' is the most natural English here. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: כָּרִאשֹׁנָה
  chosen: as at the first
  alternatives:
  - as before
  - as formerly
  lexicon: HALOT
  rationale: This points back to the earlier forty-day period. 'As at the first' preserves the comparative force and the backward reference more clearly than a bare 'the first time.'
- source_word: אַרְבָּעִים יוֹם וְאַרְבָּעִים לַיְלָה
  chosen: forty days and forty nights
  lexicon: HALOT
  rationale: Standard literal rendering of the duration phrase; no contextual reason to alter it.
- source_word: לֶחֶם לֹא אָכַלְתִּי
  chosen: I ate no bread
  alternatives:
  - I did not eat bread
  - I ate nothing
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'bread,' not a generalized 'food.' 'I ate no bread' keeps the lexical form while remaining natural English.
- source_word: וּמַיִם לֹא שָׁתִיתִי
  chosen: and drank no water
  alternatives:
  - and I did not drink water
  lexicon: HALOT
  rationale: Direct and literal rendering coordinated with the previous clause.
- source_word: עַל כָּל חַטַּאתְכֶם
  chosen: because of all your sin
  alternatives:
  - on account of all your sin
  - for all your sin
  lexicon: HALOT
  rationale: עַל here gives the reason for Moses' fasting/prostration. The singular חַטָּאת with collective force is well represented by 'all your sin' rather than the more individualized 'sins.'
- source_word: אֲשֶׁר חֲטָאתֶם
  chosen: that you had committed
  alternatives:
  - that you sinned
  - which you committed
  lexicon: HALOT
  rationale: English idiom prefers 'committed' with 'sin' in this construction. The pluperfect sense fits the retrospective narration.
- source_word: לַעֲשׂוֹת הָרַע
  chosen: by doing what was evil
  alternatives:
  - in doing evil
  - to do the evil
  lexicon: HALOT
  rationale: The infinitive expresses the manner/content of their sin. 'By doing what was evil' is clear modern English and preserves the moral evaluation.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the sight of the LORD
  alternatives:
  - in the eyes of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This common idiom denotes divine evaluation. 'In the sight of the LORD' is natural and preserves the metaphor.
- source_word: לְהַכְעִיסוֹ
  chosen: provoking him to anger
  alternatives:
  - to provoke him
  - to anger him
  lexicon: HALOT
  rationale: The hiphil of כעס means to provoke to anger. 'Provoking him to anger' makes the causative force explicit and fits the clause's result/purpose nuance.
