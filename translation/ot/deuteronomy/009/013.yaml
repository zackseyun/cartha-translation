id: DEU.9.13
reference: Deuteronomy 9:13
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר יְהוָ֖ה אֵלַ֣/י לֵ/אמֹ֑ר רָאִ֨יתִי֙ אֶת הָ/עָ֣ם הַ/זֶּ֔ה וְ/הִנֵּ֥ה
    עַם קְשֵׁה עֹ֖רֶף הֽוּא־־־׃
translation:
  text: Then the LORD said to me, ‘I have seen this people, and behold, they are a
    stiff-necked people.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I saw this people, and indeed it is a stiff-necked people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence; 'and' is possible but less idiomatic
    here.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and the longstanding convention reflected
    in the LXX/English tradition.
- source_word: אֵלַי
  chosen: to me
  lexicon: HALOT
  rationale: Direct object of speaking with first-person singular pronominal suffix;
    straightforwardly rendered 'to me.'
- source_word: לֵאמֹר
  chosen: omitted in English as redundant after 'said to me'
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Hebrew speech-introduction formula is often redundant in English. Omitting
    it yields natural modern English without loss of meaning, consistent with optimal
    equivalence.
- source_word: רָאִיתִי
  chosen: I have seen
  alternatives:
  - I saw
  lexicon: HALOT
  rationale: The perfect can be rendered as a present-result perfect in English here,
    highlighting the LORD's settled assessment based on what he has observed. 'I saw'
    is possible but slightly less vivid in this context.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this nation
  - these people
  lexicon: HALOT
  rationale: עם commonly means 'people.' Singular 'this people' closely reflects the
    Hebrew demonstrative construction and collective singular, better than pluralizing
    to 'these people.' 'Nation' is possible but less immediate in this rebuke context.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and indeed
  - and look
  lexicon: HALOT
  rationale: הִנֵּה draws attention emphatically to what follows. 'Behold' preserves
    the discourse force and solemnity better than flatter alternatives.
- source_word: עַם
  chosen: people
  alternatives:
  - nation
  lexicon: HALOT
  rationale: Repeated for emphasis in Hebrew; retained in English as 'people' to preserve
    the characterization formula.
- source_word: קְשֵׁה עֹרֶף
  chosen: stiff-necked
  alternatives:
  - stubborn
  - hard-necked
  lexicon: HALOT
  rationale: This idiom literally means 'hard/stiff of neck' and conventionally denotes
    obstinacy or rebellion. 'Stiff-necked' preserves the metaphor and its biblical
    resonance; 'stubborn' captures sense but loses the image.
- source_word: הוּא
  chosen: they are
  alternatives:
  - it is
  - he is
  lexicon: HALOT
  rationale: Though grammatically singular agreeing with the collective noun 'people,'
    idiomatic English refers to a people-group as 'they.' This preserves meaning while
    reading naturally.
