id: DEU.9.8
reference: Deuteronomy 9:8
source:
  edition: WLC
  text: וּ/בְ/חֹרֵ֥ב הִקְצַפְתֶּ֖ם אֶת יְהוָ֑ה וַ/יִּתְאַנַּ֧ף יְהוָ֛ה בָּ/כֶ֖ם לְ/הַשְׁמִ֥יד אֶתְ/כֶֽם־׃
translation:
  text: Even at Horeb you provoked Yahweh to wrath, and Yahweh was angry with you enough to destroy you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'At Horeb' or 'And at Horeb'; the Hebrew conjunction may simply continue the narrative, though here it likely adds emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or 'the LORD was angry with you to destroy you' or 'the LORD was angry enough with you to destroy you.' The Hebrew links the LORD's anger directly with the threatened destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְחֹרֵב
  chosen: Even at Horeb
  alternatives:
  - And at Horeb
  - At Horeb
  lexicon: HALOT
  rationale: The conjunction plus preposition marks continuation with emphasis from the surrounding context. 'Even at Horeb' brings out the adversative/emphatic force naturally in English while retaining the place name Horeb by transliteration.
- source_word: הִקְצַפְתֶּם
  chosen: you provoked ... to wrath
  alternatives:
  - you angered
  - you made ... angry
  lexicon: HALOT
  rationale: The Hiphil of קצף conveys causing anger or provoking wrath. 'Provoked ... to wrath' preserves the causative force and the gravity of covenant offense better than the flatter 'angered.'
- source_word: אֶת יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated. The direct-object marker is not translated.
- source_word: וַיִּתְאַנַּף
  chosen: was angry enough
  alternatives:
  - became angry
  - was enraged
  lexicon: HALOT
  rationale: The verb from אנף denotes anger, often intense divine anger. In this construction with the following infinitive of result/purpose, 'was angry enough' idiomatically links the anger to the ensuing threat of destruction without overstating beyond the Hebrew.
- source_word: בָּכֶם
  chosen: with you
  alternatives:
  - against you
  lexicon: HALOT
  rationale: The preposition can be rendered 'with' or 'against' in contexts of anger. 'With you' is idiomatic after 'angry' in English, while the following infinitive clarifies the hostile direction.
- source_word: לְהַשְׁמִיד אֶתְכֶם
  chosen: to destroy you
  alternatives:
  - so as to destroy you
  - to wipe you out
  lexicon: HALOT
  rationale: The Hiphil infinitive of שׁמד means to destroy, exterminate, or wipe out. 'To destroy you' is the most direct and sufficiently weighty rendering; 'wipe you out' is vivid but more colloquial than desired.
