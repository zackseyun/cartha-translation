id: DEU.9.15
reference: Deuteronomy 9:15
source:
  edition: WLC
  text: וָ/אֵ֗פֶן וָֽ/אֵרֵד֙ מִן הָ/הָ֔ר וְ/הָ/הָ֖ר בֹּעֵ֣ר בָּ/אֵ֑שׁ וּ/שְׁנֵי֙ לֻחֹ֣ת
    הַ/בְּרִ֔ית עַ֖ל שְׁתֵּ֥י יָדָֽ/י־׃
translation:
  text: So I turned and came down from the mountain, while the mountain was burning
    with fire, and the two tablets of the covenant were in my two hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more formally, ''and the mountain was burning with fire.'' The Hebrew
      conjunction can be read as simple coordination, though the context supports
      a circumstantial sense: ''while the mountain was burning with fire.'''
    reason: alternative_reading
  - marker: b
    text: Literally, 'upon my two hands.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֵפֶן
  chosen: So I turned
  alternatives:
  - Then I turned
  - I turned
  lexicon: HALOT
  rationale: The verb פנה in the wayyiqtol form narrates a sequential action, 'turned.'
    Rendering the prefixed conjunction as 'So' preserves narrative flow in natural
    English without overformal repetition.
- source_word: וָאֵרֵד
  chosen: came down
  alternatives:
  - went down
  - descended
  lexicon: HALOT
  rationale: ירד means 'go down/come down.' Because Moses is narrating from the perspective
    of the scene below the mountain, 'came down' is idiomatic English and fits optimal
    equivalence better than the more wooden 'descended.'
- source_word: מִן הָהָר
  chosen: from the mountain
  alternatives:
  - from the hill-country
  - from the hill
  lexicon: HALOT
  rationale: הַר here clearly refers to the specific mountain Moses was on, so 'the
    mountain' is the plain contextual sense.
- source_word: וְהָהָר בֹּעֵר בָּאֵשׁ
  chosen: while the mountain was burning with fire
  alternatives:
  - and the mountain was burning with fire
  - with the mountain burning with fire
  - and the mountain was ablaze with fire
  lexicon: HALOT
  rationale: The clause is circumstantial alongside Moses' descent. 'While' brings
    out the concurrent action naturally. בֹּעֵר means 'burning,' and בָּאֵשׁ is literally
    'with/in fire'; 'burning with fire' preserves the Hebrew emphasis better than
    simplifying to merely 'burning.'
- source_word: וּשְׁנֵי לֻחֹת הַבְּרִית
  chosen: and the two tablets of the covenant
  alternatives:
  - and the two tablets of the testimony
  - and the two covenant tablets
  lexicon: HALOT
  rationale: לֻחֹת are stone tablets in this context. 'Tablets' is standard and precise.
    הַבְּרִית is 'the covenant,' the established designation for these tablets in
    Deuteronomy.
- source_word: עַל שְׁתֵּי יָדָי
  chosen: were in my two hands
  alternatives:
  - were on my two hands
  - were in both my hands
  - upon my two hands
  lexicon: HALOT
  rationale: Although עַל is literally 'on/upon,' the idiomatic sense here is that
    Moses was carrying them in his hands. 'In my two hands' communicates the physical
    sense clearly in English while retaining the explicit 'two' present in Hebrew.
