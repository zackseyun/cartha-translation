theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    יְהוָה, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering the compound title אֲדֹנָי יְהוִה
  chosen_reading: Lord GOD
  alternative_readings:
  - Lord Yahweh
  rationale: Because יְהוָה is rendered 'the LORD,' the compound title is conventionally
    represented as 'Lord GOD' to preserve both title elements without producing the
    confusing English sequence 'Lord LORD.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy §2; Contested terms: יְהוָה
    YHWH → the LORD'
