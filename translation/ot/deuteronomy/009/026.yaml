id: DEU.9.26
reference: Deuteronomy 9:26
source:
  edition: WLC
  text: וָ/אֶתְפַּלֵּ֣ל אֶל יְהוָה֮ וָ/אֹמַר֒ אֲדֹנָ֣/י יְהוִ֗ה אַל תַּשְׁחֵ֤ת עַמְּ/ךָ֙
    וְ/נַחֲלָ֣תְ/ךָ֔ אֲשֶׁ֥ר פָּדִ֖יתָ בְּ/גָדְלֶ֑/ךָ אֲשֶׁר הוֹצֵ֥אתָ מִ/מִּצְרַ֖יִם
    בְּ/יָ֥ד חֲזָקָֽה־־־׃
translation:
  text: So I prayed to the LORD and said, “Lord GOD, do not destroy your people and
    your inheritance, whom you redeemed by your greatness, whom you brought out of
    Egypt with a strong hand.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Lord Yahweh.'' English ''Lord GOD'' reflects the combined title
      אֲדֹנָי יְהוִה while avoiding the awkward repetition ''Lord LORD.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'with a mighty hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶתְפַּלֵּל
  chosen: So I prayed
  alternatives:
  - And I prayed
  - Then I prayed
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So I prayed' gives natural
    English flow while preserving the sequential sense.
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
    The preposition אֶל is straightforwardly 'to'.
- source_word: וָאֹמַר
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Standard narrative continuation after 'I prayed'; simple past fits the
    Hebrew wayyiqtol.
- source_word: אֲדֹנָי יְהוִה
  chosen: Lord GOD
  alternatives:
  - Lord GOD
  - Lord Yahweh
  - Lord LORD
  lexicon: HALOT
  rationale: The compound divine title combines אֲדֹנָי with the Tetragrammaton. In
    English Bible convention, 'Lord GOD' avoids the awkward 'Lord LORD' and preserves
    both elements of the title.
- source_word: אַל תַּשְׁחֵת
  chosen: do not destroy
  alternatives:
  - do not ruin
  - do not wipe out
  lexicon: HALOT
  rationale: The jussive prohibition is best rendered 'do not destroy.' This preserves
    the gravity of שׁחת in context without over-specifying the manner of destruction.
- source_word: עַמְּךָ
  chosen: your people
  lexicon: HALOT
  rationale: Direct and standard rendering of the covenantal term עַם with 2ms suffix.
- source_word: וְנַחֲלָתְךָ
  chosen: and your inheritance
  alternatives:
  - your heritage
  - your possession
  lexicon: HALOT
  rationale: נַחֲלָה often denotes inheritance or allotted possession. 'Inheritance'
    preserves the covenantal nuance that Israel belongs to the LORD as his allotted
    people.
- source_word: אֲשֶׁר פָּדִיתָ
  chosen: whom you redeemed
  alternatives:
  - which you redeemed
  - whom you ransomed
  lexicon: HALOT
  rationale: Because the referent is 'people/inheritance,' 'whom' is idiomatic in
    English. 'Redeemed' fits פדה in exodus/covenant contexts better than the more
    commercial-sounding 'ransomed'.
- source_word: בְּגָדְלֶךָ
  chosen: by your greatness
  alternatives:
  - with your greatness
  - by your great power
  lexicon: HALOT
  rationale: The noun גֹּדֶל denotes greatness. 'By your greatness' is a close rendering;
    'great power' would be interpretive and is unnecessary since the next phrase already
    expresses power concretely.
- source_word: אֲשֶׁר הוֹצֵאתָ מִמִּצְרַיִם
  chosen: whom you brought out of Egypt
  alternatives:
  - whom you led out from Egypt
  lexicon: HALOT
  rationale: הוציא in the exodus formula is regularly 'bring out.' This preserves
    the established covenant-historical wording.
- source_word: בְּיָד חֲזָקָה
  chosen: with a strong hand
  alternatives:
  - by a strong hand
  - with a mighty hand
  lexicon: HALOT
  rationale: Literally 'with/by a strong hand.' 'Strong hand' is a transparent rendering;
    'mighty hand' is traditional and possible, but 'strong' more directly reflects
    חֲזָקָה.
