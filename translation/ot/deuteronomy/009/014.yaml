id: DEU.9.14
reference: Deuteronomy 9:14
source:
  edition: WLC
  text: הֶ֤רֶף מִמֶּ֨/נִּי֙ וְ/אַשְׁמִידֵ֔/ם וְ/אֶמְחֶ֣ה אֶת שְׁמָ֔/ם מִ/תַּ֖חַת הַ/שָּׁמָ֑יִם
    וְ/אֶֽעֱשֶׂה֙ אֽוֹתְ/ךָ֔ לְ/גוֹי עָצ֥וּם וָ/רָ֖ב מִמֶּֽ/נּוּ־־׃
translation:
  text: Leave me alone, so that I may destroy them and blot out their name from under
    the heavens; and I will make you into a nation mightier and more numerous than
    they are.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Let me alone, and I will destroy them and blot out their name from under
      heaven.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from under the heavens'; the phrase means removal from the earth,
      that is, from human remembrance and existence.
    reason: cultural_note
lexical_decisions:
- source_word: הֶרֶף מִמֶּנִּי
  chosen: Leave me alone
  alternatives:
  - Let me alone
  - Stand aside from me
  lexicon: HALOT
  rationale: The imperative of רפה with מן + pronoun is an idiomatic request to desist
    or leave off. 'Leave me alone' is natural modern English and fits the context
    of divine speech to Moses without adding content.
- source_word: וְאַשְׁמִידֵם
  chosen: so that I may destroy them
  alternatives:
  - and I will destroy them
  - that I may exterminate them
  lexicon: HALOT
  rationale: שׁמד commonly means destroy, annihilate. The prefixed waw after the imperative
    is well represented here by purpose/result in English ('so that I may'), which
    captures the flow better than a simple coordinate 'and.' 'Destroy' is strong without
    over-specifying.
- source_word: וְאֶמְחֶה אֶת־שְׁמָם
  chosen: and blot out their name
  alternatives:
  - and wipe out their name
  - and erase their name
  lexicon: HALOT
  rationale: מחה in this idiom refers to erasing/removing remembrance. 'Blot out'
    is the established and semantically precise English idiom for the destruction
    of a name/memory.
- source_word: מִתַּחַת הַשָּׁמַיִם
  chosen: from under the heavens
  alternatives:
  - from under heaven
  - from beneath the heavens
  lexicon: HALOT
  rationale: The Hebrew is literally plural, 'the heavens.' English can use singular
    idiomatically, but 'the heavens' preserves the source form and remains readable.
- source_word: וְאֶעֱשֶׂה אֹתְךָ לְגוֹי
  chosen: and I will make you into a nation
  alternatives:
  - and I will make you a nation
  lexicon: HALOT
  rationale: עשה + object + ל expresses making someone/something into something. 'Make
    you into a nation' is slightly more explicit in English and preserves the transformational
    sense.
- source_word: עָצוּם
  chosen: mightier
  alternatives:
  - mighty
  - strong
  lexicon: HALOT
  rationale: In comparison with the following מִמֶּנּוּ, an English comparative is
    appropriate. 'Mightier' conveys strength/power in relation to the current nation.
- source_word: וָרָב
  chosen: more numerous
  alternatives:
  - greater
  - more many
  lexicon: HALOT
  rationale: רב in this context refers to size/number. 'More numerous' is the clearest
    idiomatic comparative in English.
- source_word: מִמֶּנּוּ
  chosen: than they are
  alternatives:
  - than it
  - than this nation
  lexicon: HALOT
  rationale: 'The suffix is singular, referring collectively to Israel as a people/nation.
    English naturally renders the collective comparison with plural sense here: ''than
    they are.'' This avoids awkwardness while preserving the referent.'
