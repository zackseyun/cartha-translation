theological_decisions:
- issue: Divine declaration of judgment and offer to make Moses a greater nation
  chosen_reading: Render the statement straightforwardly as a real declaration within
    the narrative, without softening the threat or importing later theological explanations
    about testing Moses.
  alternative_readings:
  - Treat the speech primarily as rhetorical or as a test of Moses and signal that
    in translation
  rationale: The Hebrew presents direct divine speech of judgment and promise. Translation
    should preserve the narrative tension and not resolve interpretive debates in
    the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
