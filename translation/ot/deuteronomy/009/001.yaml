id: DEU.9.1
reference: Deuteronomy 9:1
source:
  edition: WLC
  text: שְׁמַ֣ע יִשְׂרָאֵ֗ל אַתָּ֨ה עֹבֵ֤ר הַ/יּוֹם֙ אֶת הַ/יַּרְדֵּ֔ן לָ/בֹא֙ לָ/רֶ֣שֶׁת
    גּוֹיִ֔ם גְּדֹלִ֥ים וַ/עֲצֻמִ֖ים מִמֶּ֑/ךָּ עָרִ֛ים גְּדֹלֹ֥ת וּ/בְצֻרֹ֖ת בַּ/שָּׁמָֽיִם־׃
translation:
  text: 'Hear, Israel: today you are crossing the Jordan to go in to dispossess nations
    greater and mightier than you, cities great and fortified up to the heavens.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to take possession of'; the Hebrew verb can mean inherit/possess, but
      here in a conquest context it carries the sense of dispossessing prior inhabitants.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to the heavens,' a hyperbolic expression for very high fortifications.
    reason: cultural_note
lexical_decisions:
- source_word: שְׁמַע
  chosen: Hear
  alternatives:
  - Listen
  - Hear this
  lexicon: HALOT
  rationale: Imperative singular addressing Israel as a corporate entity. 'Hear' preserves
    the covenantal summons formula familiar in Deuteronomy without adding words not
    present in the text.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Proper name transliterated per translation philosophy.
- source_word: עֹבֵר הַיּוֹם
  chosen: today you are crossing
  alternatives:
  - you are crossing today
  - today you cross
  lexicon: HALOT
  rationale: The participle with 'today' conveys imminent/present action. 'Today you
    are crossing' is natural English and preserves the temporal emphasis.
- source_word: אֶת־הַיַּרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: Standard English rendering of the proper geographic name; 'River' is
    not required by the Hebrew.
- source_word: לָבֹא
  chosen: to go in
  alternatives:
  - to enter
  lexicon: HALOT
  rationale: Infinitive of בוא following 'crossing the Jordan' points to entering
    the land. 'Go in' keeps the directional nuance and idiomatic sequence with the
    next infinitive.
- source_word: לָרֶשֶׁת
  chosen: to dispossess
  alternatives:
  - to take possession of
  - to inherit
  lexicon: HALOT
  rationale: In conquest contexts ירשׁ often means taking possession by dispossessing
    prior occupants. 'Dispossess' makes explicit the object as nations, which fits
    the immediate syntax better than 'inherit'.
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - peoples
  lexicon: HALOT
  rationale: Standard rendering in Deuteronomy for distinct national groups.
- source_word: גְּדֹלִים וַעֲצֻמִים מִמֶּךָּ
  chosen: greater and mightier than you
  alternatives:
  - larger and stronger than you
  - great and numerous beyond you
  lexicon: HALOT
  rationale: 'Captures both comparative adjectives: size/status (''greater'') and
    strength (''mightier''). ''Than you'' preserves the direct comparison with Israel.'
- source_word: עָרִים גְּדֹלֹת וּבְצֻרֹת
  chosen: cities great and fortified
  alternatives:
  - great and fortified cities
  - large and fortified cities
  lexicon: HALOT
  rationale: Predicate-like apposition after 'nations'; English smoothness could favor
    'great and fortified cities,' but the chosen order stays closer to the Hebrew
    while remaining readable.
- source_word: בַּשָּׁמָיִם
  chosen: up to the heavens
  alternatives:
  - to heaven
  - in the heavens
  lexicon: HALOT
  rationale: Idiomatic hyperbole describing extreme height. 'Up to the heavens' communicates
    the Hebrew image more naturally in modern English than the traditional singular
    'to heaven.'
