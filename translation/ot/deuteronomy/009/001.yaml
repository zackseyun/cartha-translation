theological_decisions:
- issue: Hyperbolic description of city fortifications
  chosen_reading: Rendered as 'fortified up to the heavens' as a vivid idiom of great
    height/strength, without flattening it into mere paraphrase.
  alternative_readings:
  - fortified to heaven
  - fortified sky-high
  rationale: The phrase is rhetorical and need not be literalized or weakened. The
    translation preserves the biblical imagery while using natural English.
  doctrine_reference: Translation philosophy §1, §6
