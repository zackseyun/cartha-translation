id: DEU.9.16
reference: Deuteronomy 9:16
source:
  edition: WLC
  text: וָ/אֵ֗רֶא וְ/הִנֵּ֤ה חֲטָאתֶם֙ לַ/יהוָ֣ה אֱלֹֽהֵי/כֶ֔ם עֲשִׂיתֶ֣ם לָ/כֶ֔ם עֵ֖גֶל מַסֵּכָ֑ה סַרְתֶּ֣ם מַהֵ֔ר מִן הַ/דֶּ֕רֶךְ אֲשֶׁר צִוָּ֥ה יְהוָ֖ה אֶתְ/כֶֽם־־׃
translation:
  text: 'And I looked, and behold, you had sinned against Yahweh your God: you had made for yourselves a cast-metal calf. You had turned aside quickly from the way that Yahweh had commanded you.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a molten calf.' The Hebrew phrase refers to a calf made by casting metal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֵרֶא
  chosen: And I looked
  alternatives:
  - And I saw
  lexicon: HALOT
  rationale: The verb ראה commonly means 'see,' but in narrative English 'I looked' followed by 'behold' preserves the sequence and avoids redundancy with the deictic particle. 'I saw' is possible and idiomatic, but 'looked' better reflects the discourse movement into observation.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and see
  - and there it was
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention. 'Behold' preserves the force compactly and suits the solemn narrative tone. Though somewhat elevated, it remains understandable and avoids over-paraphrase.
- source_word: חֲטָאתֶם לַיהוָה אֱלֹהֵיכֶם
  chosen: you had sinned against the LORD your God
  alternatives:
  - you sinned against the LORD your God
  lexicon: HALOT
  rationale: The qatal form in this retrospective context is well rendered with English pluperfect ('had sinned'), matching the surrounding recounting of prior actions. The preposition ל with חטא here is idiomatically 'sin against/to,' and 'against' is the natural English equivalent.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עֲשִׂיתֶם לָכֶם
  chosen: you had made for yourselves
  alternatives:
  - you made yourselves
  - you had made yourselves
  lexicon: HALOT
  rationale: The idiom עשה + ל expresses making something for one's own use/benefit. 'For yourselves' is clearer than the more ambiguous 'yourselves,' which could suggest reflexive identity rather than beneficiary.
- source_word: עֵגֶל מַסֵּכָה
  chosen: a cast-metal calf
  alternatives:
  - a molten calf
  - a cast calf
  - an image of a calf
  lexicon: HALOT
  rationale: מַסֵּכָה refers to something cast in metal, especially an idol image. 'Cast-metal calf' communicates both the object and its manufacture in clear modern English. 'Molten calf' is traditional but less natural today; 'image of a calf' loses the material/process nuance.
- source_word: סַרְתֶּם
  chosen: You had turned aside
  alternatives:
  - You had turned away
  - You departed
  lexicon: HALOT
  rationale: סור in this covenantal context often means turning aside from the commanded path. 'Turned aside' preserves the metaphor that is completed by 'from the way' in the next phrase.
- source_word: מַהֵר
  chosen: quickly
  alternatives:
  - soon
  - speedily
  lexicon: HALOT
  rationale: The adverb denotes haste. 'Quickly' is the most natural modern equivalent.
- source_word: מִן הַדֶּרֶךְ
  chosen: from the way
  alternatives:
  - from the path
  lexicon: HALOT
  rationale: '''Way'' is the standard rendering for דרך in covenantal/ethical metaphor and preserves intertextual consistency in Deuteronomy.'
- source_word: אֲשֶׁר צִוָּה יְהוָה אֶתְכֶם
  chosen: that the LORD had commanded you
  alternatives:
  - which the LORD commanded you
  lexicon: HALOT
  rationale: This relative clause modifies 'the way.' English idiom prefers 'that' here. The pluperfect 'had commanded' maintains the retrospective sequence of Moses' recounting.
