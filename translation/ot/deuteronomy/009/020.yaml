id: DEU.9.20
reference: Deuteronomy 9:20
source:
  edition: WLC
  text: וּֽ/בְ/אַהֲרֹ֗ן הִתְאַנַּ֧ף יְהוָ֛ה מְאֹ֖ד לְ/הַשְׁמִיד֑/וֹ וָֽ/אֶתְפַּלֵּ֛ל גַּם בְּעַ֥ד אַהֲרֹ֖ן בָּ/עֵ֥ת הַ/הִֽוא־
translation:
  text: And Yahweh was very angry with Aaron, to destroy him; and I also prayed for Aaron at that time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against Aaron'; the Hebrew preposition can be rendered either way in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְאַהֲרֹן
  chosen: And with Aaron
  alternatives:
  - And against Aaron
  - Now with Aaron
  lexicon: HALOT
  rationale: The conjunction plus preposition literally means 'and/now with Aaron.' In English, the clause is more naturally expressed by making Aaron the object of the anger ('the LORD was very angry with Aaron'). 'Against Aaron' is possible, but 'angry with' best reflects idiomatic English while preserving the relational sense of בְ with anger verbs.
- source_word: הִתְאַנַּף
  chosen: was very angry
  alternatives:
  - became enraged
  - was furious
  lexicon: HALOT
  rationale: The Hitpael of אנף denotes becoming angry or enraged. Rendering it as 'was very angry' keeps the verbal force and pairs naturally with the following intensifier מְאֹד.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מְאֹד
  chosen: very
  alternatives:
  - greatly
  - exceedingly
  lexicon: HALOT
  rationale: The adverb intensifies the anger. 'Very' is the most natural modern English equivalent in this construction.
- source_word: לְהַשְׁמִידוֹ
  chosen: to destroy him
  alternatives:
  - to annihilate him
  - to wipe him out
  lexicon: HALOT
  rationale: The Hiphil infinitive of שׁמד expresses destruction. 'To destroy him' is a clear, direct rendering that preserves the severity without over-specifying the mode. 'Annihilate' is possible but stronger and less idiomatic here.
- source_word: וָאֶתְפַּלֵּל
  chosen: and I prayed
  alternatives:
  - so I prayed
  - and I interceded
  lexicon: HALOT
  rationale: The verb פלל in the Hitpael commonly means 'to pray.' 'Interceded' captures the context but is more interpretive; 'prayed' preserves the lexical form while the phrase 'for Aaron' conveys the intercessory sense.
- source_word: גַּם
  chosen: also
  alternatives:
  - too
  - even
  lexicon: HALOT
  rationale: גַּם adds that Moses prayed for Aaron in addition to the people. 'Also' is the most natural placement in English.
- source_word: בְּעַד
  chosen: for
  alternatives:
  - on behalf of
  - concerning
  lexicon: HALOT
  rationale: In prayer contexts, בְּעַד commonly means 'for' or 'on behalf of.' 'For' is concise and idiomatic, while still conveying intercession.
- source_word: בָּעֵת הַהִוא
  chosen: at that time
  alternatives:
  - at that same time
  - in that time
  lexicon: HALOT
  rationale: This temporal phrase points back to the episode under discussion. 'At that time' is the standard and natural English rendering.
