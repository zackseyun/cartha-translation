theological_decisions:
- issue: Anthropomorphic expression for divine action
  chosen_reading: with the finger of God
  alternative_readings:
  - by the power of God
  - by God himself
  rationale: The Hebrew explicitly uses anthropomorphic language. The translation preserves the image rather than interpreting it away, in keeping with original-language primacy and preserving theological tension where the text is vivid and concrete.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
