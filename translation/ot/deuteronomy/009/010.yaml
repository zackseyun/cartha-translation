id: DEU.9.10
reference: Deuteronomy 9:10
source:
  edition: WLC
  text: וַ/יִּתֵּ֨ן יְהוָ֜ה אֵלַ֗/י אֶת שְׁנֵי֙ לוּחֹ֣ת הָֽ/אֲבָנִ֔ים כְּתֻבִ֖ים בְּ/אֶצְבַּ֣ע אֱלֹהִ֑ים וַ/עֲלֵי/הֶ֗ם כְּֽ/כָל הַ/דְּבָרִ֡ים אֲשֶׁ֣ר דִּבֶּר֩ יְהוָ֨ה עִמָּ/כֶ֥ם בָּ/הָ֛ר מִ/תּ֥וֹךְ הָ/אֵ֖שׁ בְּ/י֥וֹם הַ/קָּהָֽל־־׃
translation:
  text: And Yahweh gave me the two stone tablets, written with the finger of God, and on them were all the words that Yahweh had spoken to you on the mountain from the midst of the fire on the day of the assembly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the finger of God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'that the LORD spoke to you.' The Hebrew says 'with you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Follows the project's default rendering for the divine name, preserving the covenant name while following established English convention.
- source_word: וַיִּתֵּן
  chosen: gave
  alternatives:
  - handed
  - delivered
  lexicon: HALOT
  rationale: The verb נתן here straightforwardly denotes giving; 'gave' is the most natural and sufficiently formal English equivalent.
- source_word: שְׁנֵי לוּחֹת הָאֲבָנִים
  chosen: the two stone tablets
  alternatives:
  - the two tablets of stone
  - the two slabs of stone
  lexicon: HALOT
  rationale: This combines the construct phrase naturally in English. 'Stone tablets' is clear, idiomatic, and faithful to the Hebrew phrase.
- source_word: כְּתֻבִים
  chosen: written
  alternatives:
  - inscribed
  lexicon: HALOT
  rationale: The passive participle means 'written.' 'Inscribed' is possible given the medium, but 'written' better preserves the Hebrew wording and echoes the traditional phrasing without being archaic.
- source_word: בְּאֶצְבַּע אֱלֹהִים
  chosen: with the finger of God
  alternatives:
  - by the finger of God
  lexicon: HALOT
  rationale: A literal rendering best preserves the vivid anthropomorphic expression and its theological force. 'With' reflects the instrumental beth naturally in English.
- source_word: וַעֲלֵיהֶם
  chosen: and on them were
  alternatives:
  - and on them was written
  - with on them
  lexicon: HALOT
  rationale: The Hebrew is verbless after the conjunction and prepositional phrase; supplying 'were' yields natural English while preserving the sense that the contents were on the tablets.
- source_word: כְּכָל הַדְּבָרִים
  chosen: all the words
  alternatives:
  - all the things
  - the whole of the words
  lexicon: HALOT
  rationale: 'Though כְּ can sometimes mean ''according to,'' here the idiom points to correspondence in content: the tablets contained ''all the words'' spoken previously.'
- source_word: אֲשֶׁר דִּבֶּר יְהוָה עִמָּכֶם
  chosen: that the LORD had spoken with you
  alternatives:
  - that the LORD spoke with you
  - that the LORD had spoken to you
  lexicon: HALOT
  rationale: The relative clause refers back to the prior event at Horeb/Sinai, so English past perfect fits the discourse context. The preposition עִם is most directly 'with,' preserving the dialogical aspect of the encounter, though 'to' is a possible smoothing.
- source_word: בָּהָר
  chosen: on the mountain
  alternatives:
  - at the mountain
  - in the mountain
  lexicon: HALOT
  rationale: '''On the mountain'' is the most idiomatic rendering for the location of the revelation.'
- source_word: מִתּוֹךְ הָאֵשׁ
  chosen: from the midst of the fire
  alternatives:
  - from the fire
  - out of the midst of the fire
  lexicon: HALOT
  rationale: This preserves the solemnity and specificity of the Hebrew expression better than the flatter 'from the fire.'
- source_word: בְּיוֹם הַקָּהָל
  chosen: on the day of the assembly
  alternatives:
  - on the day of the congregation
  - on the day when the people were assembled
  lexicon: HALOT
  rationale: קהל denotes the gathered assembly of Israel. 'Assembly' is clear modern English and preserves the formal communal sense.
