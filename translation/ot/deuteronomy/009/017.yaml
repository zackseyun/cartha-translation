id: DEU.9.17
reference: Deuteronomy 9:17
source:
  edition: WLC
  text: וָ/אֶתְפֹּשׂ֙ בִּ/שְׁנֵ֣י הַ/לֻּחֹ֔ת וָֽ/אַשְׁלִכֵ֔/ם מֵ/עַ֖ל שְׁתֵּ֣י יָדָ֑/י
    וָ/אֲשַׁבְּרֵ֖/ם לְ/עֵינֵי/כֶֽם׃
translation:
  text: So I took hold of the two tablets and threw them from my two hands and shattered
    them before your eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'broke them.' The Hebrew verb can be rendered more simply as 'broke,'
      while 'shattered' brings out the likely effect on the stone tablets in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶתְפֹּשׂ
  chosen: I took hold of
  alternatives:
  - I seized
  - I grasped
  lexicon: HALOT
  rationale: The verb תפשׂ denotes taking hold or grasping. 'Took hold of' is natural
    English and preserves the physical action without overstating violence as 'seized'
    might.
- source_word: בִּשְׁנֵי הַלֻּחֹת
  chosen: the two tablets
  alternatives:
  - the two stone tablets
  - both tablets
  lexicon: HALOT
  rationale: לֻחוֹת refers to tablets, here the covenant tablets already known in
    context. 'The two tablets' is sufficiently clear and formally close; 'stone' is
    implied by context but not explicit in this verse.
- source_word: וָאַשְׁלִכֵם
  chosen: threw them
  alternatives:
  - cast them
  - flung them
  lexicon: HALOT
  rationale: שלך commonly means throw/cast. 'Threw them' is straightforward modern
    English; 'cast' is more traditional but less natural, and 'flung' may sound more
    interpretive.
- source_word: מֵעַל שְׁתֵּי יָדַי
  chosen: from my two hands
  alternatives:
  - out of my two hands
  - from both my hands
  lexicon: HALOT
  rationale: The phrase is literally 'from upon my two hands.' 'From my two hands'
    preserves the dual emphasis present in Hebrew better than simply 'from my hands.'
- source_word: וָאֲשַׁבְּרֵם
  chosen: shattered them
  alternatives:
  - broke them
  - smashed them
  lexicon: HALOT
  rationale: שׁבר means break, and in this context of stone tablets being thrown,
    'shattered' conveys the resulting complete breakage more vividly while remaining
    faithful to the sense. 'Broke' is possible but less forceful in English.
- source_word: לְעֵינֵיכֶם
  chosen: before your eyes
  alternatives:
  - in your sight
  - before you
  lexicon: HALOT
  rationale: This idiom means in the sight/presence of the audience. 'Before your
    eyes' is a natural, vivid rendering that closely matches the Hebrew idiom.
