id: DEU.9.2
reference: Deuteronomy 9:2
source:
  edition: WLC
  text: עַֽם גָּד֥וֹל וָ/רָ֖ם בְּנֵ֣י עֲנָקִ֑ים אֲשֶׁ֨ר אַתָּ֤ה יָדַ֨עְתָּ֙ וְ/אַתָּ֣ה
    שָׁמַ֔עְתָּ מִ֣י יִתְיַצֵּ֔ב לִ/פְנֵ֖י בְּנֵ֥י עֲנָֽק־׃
translation:
  text: 'a great and tall people, the sons of Anak, whom you know, and of whom you
    have heard: ‘Who can stand before the sons of Anak?’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Anakites.” The Hebrew is literally “the sons of Anak.”
    reason: lexical_alternative
lexical_decisions:
- source_word: עַם
  chosen: people
  alternatives:
  - nation
  lexicon: HALOT
  rationale: עַם commonly denotes a people-group. 'People' is the most natural English
    rendering here and fits the description of the inhabitants as a formidable group.
- source_word: גָּדוֹל
  chosen: great
  alternatives:
  - large
  lexicon: HALOT
  rationale: The adjective can denote greatness or largeness. 'Great' preserves the
    elevated, weighty tone of the description, while still implying size in context.
- source_word: וָרָם
  chosen: tall
  alternatives:
  - high
  - exalted
  lexicon: HALOT
  rationale: In this context of physical description alongside 'great,' the sense
    is stature/height rather than status. 'Tall' communicates the likely meaning clearly
    in modern English.
- source_word: בְּנֵי עֲנָקִים / בְּנֵי עֲנָק
  chosen: the sons of Anak
  alternatives:
  - the Anakites
  - the descendants of Anak
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Anak.' Following the translation philosophy,
    names are transliterated, and the familial expression is retained rather than
    flattened to the ethnic label 'Anakites.' The singular/proper-name form עֲנָק
    in the final phrase supports understanding Anak as the ancestor/name behind the
    group designation.
- source_word: אֲשֶׁר אַתָּה יָדַעְתָּ
  chosen: whom you know
  alternatives:
  - that you know
  - whom you have known
  lexicon: HALOT
  rationale: The clause identifies a people already known to Israel. 'Whom you know'
    is idiomatic English for a personal/collective object and preserves the directness
    of the Hebrew perfect.
- source_word: וְאַתָּה שָׁמַעְתָּ
  chosen: and of whom you have heard
  alternatives:
  - and you have heard
  - and you heard about them
  lexicon: HALOT
  rationale: English idiom requires an object/complement to make explicit what is
    heard. 'Of whom you have heard' smoothly links to the following reported saying
    and reflects the Hebrew perfect with present relevance.
- source_word: מִי יִתְיַצֵּב לִפְנֵי
  chosen: Who can stand before
  alternatives:
  - Who can stand against
  - Who can present himself before
  lexicon: HALOT
  rationale: The idiom means to withstand or hold one's ground before an opponent.
    'Who can stand before' is both literal enough and idiomatic in biblical English,
    preserving the rhetorical force.
