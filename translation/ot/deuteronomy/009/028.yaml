id: DEU.9.28
reference: Deuteronomy 9:28
source:
  edition: WLC
  text: פֶּן יֹאמְר֗וּ הָ/אָרֶץ֮ אֲשֶׁ֣ר הוֹצֵאתָ֣/נוּ מִ/שָּׁם֒ מִ/בְּלִי֙ יְכֹ֣לֶת
    יְהוָ֔ה לַ/הֲבִיאָ֕/ם אֶל הָ/אָ֖רֶץ אֲשֶׁר דִּבֶּ֣ר לָ/הֶ֑ם וּ/מִ/שִּׂנְאָת֣/וֹ
    אוֹתָ֔/ם הוֹצִיאָ֖/ם לַ/הֲמִתָ֥/ם בַּ/מִּדְבָּֽר־־־׃
translation:
  text: Otherwise the land from which you brought us out will say, ‘Because the LORD
    was not able to bring them into the land that he promised to them, and because
    he hated them, he brought them out to put them to death in the wilderness.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the land from which you brought us out,'' with ''land'' standing
      for its inhabitants.'
    reason: cultural_note
  - marker: b
    text: Or more literally, 'the land that he spoke to them [about].'
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  chosen: Otherwise
  alternatives:
  - Lest
  - Or else
  lexicon: HALOT
  rationale: Introduces the feared consequence of God's judgment in natural modern
    English. 'Lest' is more formal but less readable; 'otherwise' preserves the warning
    force in context.
- source_word: הָאָרֶץ אֲשֶׁר הוֹצֵאתָנוּ מִשָּׁם
  chosen: the land from which you brought us out
  alternatives:
  - the land whence you brought us out
  - the people of the land from which you brought us out
  lexicon: HALOT
  rationale: The Hebrew subject is literally 'the land,' a metonymy for the inhabitants
    of that land. The main text preserves the Hebrew wording rather than resolving
    the metonymy into 'people,' since the source text itself says 'land.'
- source_word: מִבְּלִי יְכֹלֶת יְהוָה
  chosen: Because the LORD was not able
  alternatives:
  - For lack of the LORD's ability
  - Because the LORD lacked power
  lexicon: HALOT
  rationale: This construction expresses inability. 'Was not able' is idiomatic and
    direct. It reflects the nations' slanderous interpretation without implying actual
    divine limitation.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: לַהֲבִיאָם
  chosen: to bring them
  alternatives:
  - to bring them in
  lexicon: HALOT
  rationale: The infinitive with suffix refers to bringing Israel into the promised
    land. 'To bring them' is sufficient with the following destination phrase; 'bring
    them in' is possible but slightly redundant in English.
- source_word: אֶל הָאָרֶץ אֲשֶׁר דִּבֶּר לָהֶם
  chosen: into the land that he promised to them
  alternatives:
  - to the land that he spoke to them about
  - into the land that he said he would give them
  lexicon: HALOT
  rationale: Though the verb is literally 'spoke,' in covenantal context with land
    as object and indirect object 'to them,' English 'promised' best conveys the sense
    intended.
- source_word: וּמִשִּׂנְאָתוֹ אֹתָם
  chosen: and because he hated them
  alternatives:
  - and out of his hatred for them
  - and because of his hatred toward them
  lexicon: HALOT
  rationale: 'The prefixed preposition marks cause: the nations would claim hatred
    as the motive. ''Because he hated them'' is the most natural rendering.'
- source_word: הוֹצִיאָם
  chosen: he brought them out
  alternatives:
  - he led them out
  lexicon: HALOT
  rationale: Maintains lexical consistency with the earlier use of יצא in the verse
    and echoes the exodus motif.
- source_word: לַהֲמִתָם
  chosen: to put them to death
  alternatives:
  - to kill them
  - to cause them to die
  lexicon: HALOT
  rationale: The Hiphil infinitive of מות is causative. 'Put them to death' is clear
    and weighty without sounding casual.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: '''Wilderness'' is the standard and contextually appropriate rendering
    for Israel''s desert wandering, preserving biblical resonance.'
