theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render YHWH as 'the LORD,' following Jewish
    reverence tradition and longstanding English Bible convention while distinguishing
    the covenant name typographically.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Whether to translate דִּבֶּר לָהֶם woodenly as 'spoke to them' or contextually
    as 'promised to them'
  chosen_reading: promised to them
  alternative_readings:
  - spoke to them
  - said to them
  rationale: In this covenant context, the content of the speech is God's pledged
    gift of the land. 'Promised' communicates the force of the Hebrew idiom more accurately
    in English without adding new theology.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
