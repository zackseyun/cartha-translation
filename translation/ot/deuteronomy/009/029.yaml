id: DEU.9.29
reference: Deuteronomy 9:29
source:
  edition: WLC
  text: וְ/הֵ֥ם עַמְּ/ךָ֖ וְ/נַחֲלָתֶ֑/ךָ אֲשֶׁ֤ר הוֹצֵ֨אתָ֙ בְּ/כֹחֲ/ךָ֣ הַ/גָּדֹ֔ל
    וּ/בִֽ/זְרֹעֲ/ךָ֖ הַ/נְּטוּיָֽה׃פ
translation:
  text: But they are your people and your inheritance, whom you brought out by your
    great power and by your outstretched arm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And they are your people and your inheritance.' The Hebrew conjunction
      can be read simply as 'and'; 'but' reflects the likely contrast in Moses' plea.
    reason: lexical_alternative
  - marker: b
    text: '''Outstretched arm'' is a stock exodus expression for the LORD''s powerful
      deliverance.'
    reason: cross_reference
lexical_decisions:
- source_word: וְהֵם
  chosen: But they are
  alternatives:
  - And they are
  - Yet they are
  lexicon: HALOT
  rationale: The conjunction ו can be rendered simply as 'and,' but in context Moses
    is making a pleading contrast after asking God not to destroy Israel; 'but' brings
    out the adversative force naturally in English without exceeding the Hebrew sense.
- source_word: עַמְּךָ
  chosen: your people
  alternatives:
  - your nation
  lexicon: HALOT
  rationale: עַם commonly denotes a people-group, especially covenant people. 'Your
    people' is the standard and most contextually fitting rendering here.
- source_word: וְנַחֲלָתֶךָ
  chosen: your inheritance
  alternatives:
  - your heritage
  - your possession
  lexicon: HALOT
  rationale: נַחֲלָה often means inheritance or allotted possession. 'Your inheritance'
    preserves the covenantal and possessive nuance and matches common biblical usage.
- source_word: אֲשֶׁר
  chosen: whom
  alternatives:
  - that
  lexicon: HALOT
  rationale: The relative pronoun refers to persons ('your people'), so 'whom' is
    the most precise English rendering.
- source_word: הוֹצֵאתָ
  chosen: you brought out
  alternatives:
  - you led out
  lexicon: HALOT
  rationale: The Hiphil of יצא here is the standard exodus expression for causing
    to come out. 'Brought out' is idiomatic and preserves the exodus motif.
- source_word: בְּכֹחֲךָ הַגָּדֹל
  chosen: by your great power
  alternatives:
  - with your great power
  - by your mighty power
  lexicon: HALOT
  rationale: כֹּחַ denotes strength or power. 'Great power' closely reflects the adjective
    גָּדוֹל while remaining natural English. 'By' fits instrumental ב well here.
- source_word: וּבִזְרֹעֲךָ הַנְּטוּיָה
  chosen: and by your outstretched arm
  alternatives:
  - and with your outstretched arm
  - and by your extended arm
  lexicon: HALOT
  rationale: זְרוֹעַ 'arm' is a common anthropomorphic image for divine might, and
    נְטוּיָה is conventionally and accurately rendered 'outstretched.' This preserves
    the established exodus idiom without paraphrase.
