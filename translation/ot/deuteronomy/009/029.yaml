theological_decisions:
- issue: Anthropomorphic language for divine action
  chosen_reading: Retain 'your outstretched arm' literally as covenantal imagery for
    God's power.
  alternative_readings:
  - Render dynamically as 'your mighty acts' or similar
  rationale: The Hebrew intentionally uses embodied imagery that is theologically
    significant in exodus language. Preserving the metaphor maintains the text's literary
    and theological force rather than flattening it into abstraction.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Covenantal possession language in נַחֲלָה
  chosen_reading: Render as 'inheritance' rather than a weaker term like 'possession.'
  alternative_readings:
  - heritage
  - possession
  rationale: In this context Moses appeals to Israel's covenant relationship to God.
    'Inheritance' best preserves that covenantal nuance and the traditional biblical
    idiom without importing extra doctrine.
  doctrine_reference: Translation philosophy §1, §5
