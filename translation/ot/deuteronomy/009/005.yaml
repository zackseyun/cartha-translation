id: DEU.9.5
reference: Deuteronomy 9:5
source:
  edition: WLC
  text: לֹ֣א בְ/צִדְקָתְ/ךָ֗ וּ/בְ/יֹ֨שֶׁר֙ לְבָ֣בְ/ךָ֔ אַתָּ֥ה בָ֖א לָ/רֶ֣שֶׁת אֶת
    אַרְצָ֑/ם כִּ֞י בְּ/רִשְׁעַ֣ת הַ/גּוֹיִ֣ם הָ/אֵ֗לֶּה יְהוָ֤ה אֱלֹהֶ֨י/ךָ֙ מוֹרִישָׁ֣/ם
    מִ/פָּנֶ֔י/ךָ וּ/לְמַ֜עַן הָקִ֣ים אֶת הַ/דָּבָ֗ר אֲשֶׁ֨ר נִשְׁבַּ֤ע יְהוָה֙ לַ/אֲבֹתֶ֔י/ךָ
    לְ/אַבְרָהָ֥ם לְ/יִצְחָ֖ק וּֽ/לְ/יַעֲקֹֽב־׀־׃
translation:
  text: It is not because of your righteousness or the uprightness of your heart that
    you are going in to possess their land, but because of the wickedness of these
    nations the LORD your God is driving them out before you, and in order to confirm
    the word that the LORD swore to your fathers, to Abraham, to Isaac, and to Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is dispossessing them before you.' The Hebrew verb can emphasize causing
      them to lose possession of the land, not only expelling them.
    reason: lexical_alternative
  - marker: b
    text: Or 'the promise that the LORD swore.' Hebrew 'word' here carries the sense
      of a pledged word in an oath context.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew ''your fathers'' refers specifically to the patriarchs named here:
      Abraham, Isaac, and Jacob.'
    reason: cultural_note
lexical_decisions:
- source_word: בְצִדְקָתְךָ
  chosen: because of your righteousness
  alternatives:
  - by your righteousness
  - on account of your righteousness
  lexicon: HALOT
  rationale: 'צְדָקָה here denotes moral righteousness/right standing. With the prefixed
    ב and the negated clause, the sense is causal rather than instrumental in English:
    Israel''s possession of the land is not grounded in its righteousness.'
- source_word: וּבְיֹשֶׁר לְבָבְךָ
  chosen: or the uprightness of your heart
  alternatives:
  - or the integrity of your heart
  - or the rightness of your heart
  lexicon: HALOT
  rationale: יֹשֶׁר conveys straightness/uprightness, and with לֵבָב refers to inner
    moral disposition. 'Uprightness of your heart' preserves the concrete Hebrew idiom
    while remaining natural English.
- source_word: בָא לָרֶשֶׁת
  chosen: you are going in to possess
  alternatives:
  - you are entering to take possession of
  - you are coming to possess
  lexicon: HALOT
  rationale: בוא plus infinitive expresses imminent entry/purpose. 'Going in to possess'
    reflects the movement into the land and the purpose of taking possession without
    over-paraphrasing.
- source_word: אַרְצָם
  chosen: their land
  alternatives:
  - their country
  lexicon: HALOT
  rationale: אֶרֶץ commonly means land; 'their land' is the most direct rendering
    in this conquest context.
- source_word: בְרִשְׁעַת
  chosen: because of the wickedness of
  alternatives:
  - on account of the wickedness of
  - through the wickedness of
  lexicon: HALOT
  rationale: רִשְׁעָה denotes wickedness/guilt. The prefixed ב is best rendered causally
    here in parallel with the earlier negated phrase.
- source_word: הַגּוֹיִם הָאֵלֶּה
  chosen: these nations
  alternatives:
  - these peoples
  - these Gentile nations
  lexicon: HALOT
  rationale: גּוֹיִם in Deuteronomy commonly refers to nations/peoples. 'These nations'
    is idiomatic and contextually precise.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the LXX pattern.
- source_word: מוֹרִישָׁם מִפָּנֶיךָ
  chosen: is driving them out before you
  alternatives:
  - is dispossessing them before you
  - is causing them to lose possession before you
  lexicon: HALOT
  rationale: The Hiphil of ירשׁ can mean cause to dispossess or drive out. In this
    conquest setting, 'driving them out before you' communicates the result clearly
    in natural English while preserving the force of removal from the land.
- source_word: וּלְמַעַן הָקִים
  chosen: and in order to confirm
  alternatives:
  - and so that he may establish
  - and for the sake of establishing
  lexicon: HALOT
  rationale: לְמַעַן marks purpose, and הקים with דבר in covenant contexts means to
    establish/confirm/fulfill. 'In order to confirm' fits the oath-and-promise context
    and reads naturally.
- source_word: הַדָּבָר אֲשֶׁר נִשְׁבַּע
  chosen: the word that the LORD swore
  alternatives:
  - the promise that the LORD swore
  - the matter that the LORD swore
  lexicon: HALOT
  rationale: דָּבָר is broadly 'word/matter,' but in oath contexts can denote the
    pledged word or promise. 'Word' keeps closer to the Hebrew while remaining understandable;
    the oath language supplies the promissory sense.
- source_word: לַאֲבֹתֶיךָ
  chosen: to your fathers
  alternatives:
  - to your ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural and refers to the patriarchs
    named immediately after. Per gender-accurate policy, 'fathers' is preferred over
    the more generic 'ancestors'.
