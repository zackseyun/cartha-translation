theological_decisions:
- issue: Reason for Israel's possession of the land
  chosen_reading: 'The verse presents two stated grounds: not Israel''s righteousness,
    but the wickedness of the nations and the LORD''s faithfulness to his sworn word
    to the patriarchs.'
  alternative_readings:
  - A reading that centers only on Canaanite wickedness
  - A reading that centers only on covenant promise
  rationale: The Hebrew explicitly includes both כִּי ... and וּלְמַעַן ... clauses.
    The translation preserves this dual rationale without collapsing one into the
    other.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for YHWH and preserves continuity
    with Jewish reverence practice and longstanding English Bible convention.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH → the LORD'
