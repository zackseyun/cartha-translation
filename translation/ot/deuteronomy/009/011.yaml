id: DEU.9.11
reference: Deuteronomy 9:11
source:
  edition: WLC
  text: וַ/יְהִ֗י מִ/קֵּץ֙ אַרְבָּעִ֣ים י֔וֹם וְ/אַרְבָּעִ֖ים לָ֑יְלָה נָתַ֨ן יְהוָ֜ה אֵלַ֗/י אֶת שְׁנֵ֛י לֻחֹ֥ת הָ/אֲבָנִ֖ים לֻח֥וֹת הַ/בְּרִֽית־׃
translation:
  text: And at the end of forty days and forty nights, Yahweh gave me the two stone tablets, the tablets of the covenant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Yahweh gave me.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ...
  alternatives:
  - And it happened
  - Now it happened
  lexicon: HALOT
  rationale: The waw-consecutive on היה functions as a narrative transition. In natural English, the formal 'and it happened' is often unnecessarily wooden, so the sense is carried by 'And' plus the temporal phrase.
- source_word: מִקֵּץ
  chosen: at the end of
  alternatives:
  - after
  - from the end of
  lexicon: HALOT
  rationale: The preposition with קֵץ marks the completion point of a period. 'At the end of' preserves the temporal boundary more precisely than the looser 'after'.
- source_word: אַרְבָּעִים יוֹם וְאַרְבָּעִים לָיְלָה
  chosen: forty days and forty nights
  lexicon: HALOT
  rationale: This is the standard idiomatic expression in Hebrew and is best preserved directly in English.
- source_word: נָתַן
  chosen: gave
  alternatives:
  - delivered
  - handed
  lexicon: HALOT
  rationale: The common verb 'gave' matches the plain sense without adding interpretive nuance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵלַי
  chosen: me
  alternatives:
  - to me
  lexicon: HALOT
  rationale: English idiom normally expresses נתן + אֶל with an indirect object as 'gave me'; this preserves the meaning without awkwardness.
- source_word: שְׁנֵי
  chosen: the two
  alternatives:
  - two
  lexicon: HALOT
  rationale: The construct numeral specifies a definite pair in context; 'the two' reflects that definiteness.
- source_word: לֻחֹת הָאֲבָנִים
  chosen: stone tablets
  alternatives:
  - tablets of stone
  - stone slabs
  lexicon: HALOT
  rationale: The phrase denotes tablets made of stone. 'Stone tablets' is clear modern English while remaining faithful to the construct relationship.
- source_word: לֻחֹת הַבְּרִית
  chosen: the tablets of the covenant
  alternatives:
  - the covenant tablets
  lexicon: HALOT
  rationale: The repeated noun is retained rather than collapsed, reflecting the Hebrew appositional restatement and preserving the covenantal significance.
