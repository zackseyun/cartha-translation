id: DEU.9.19
reference: Deuteronomy 9:19
source:
  edition: WLC
  text: כִּ֣י יָגֹ֗רְתִּי מִ/פְּנֵ֤י הָ/אַף֙ וְ/הַ֣/חֵמָ֔ה אֲשֶׁ֨ר קָצַ֧ף יְהוָ֛ה עֲלֵי/כֶ֖ם לְ/הַשְׁמִ֣יד אֶתְ/כֶ֑ם וַ/יִּשְׁמַ֤ע יְהוָה֙ אֵלַ֔/י גַּ֖ם בַּ/פַּ֥עַם הַ/הִֽוא׃
translation:
  text: For I was afraid because of the anger and the wrath with which Yahweh was angry against you, to destroy you. But Yahweh listened to me also at that time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For I feared because of the anger and the wrath that the LORD was angry with against you.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'heard/listened to me'; in context this implies that the LORD responded favorably to Moses' intercession.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָגֹרְתִּי
  chosen: I was afraid
  alternatives:
  - I feared
  - I was in dread
  lexicon: HALOT
  rationale: Qal perfect 1cs of גור expresses fear/dread. 'I was afraid' is natural modern English and preserves the personal emotional force without overformal archaism.
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - from before
  - on account of
  lexicon: HALOT
  rationale: Literally 'from the face of,' but in this idiom it marks the cause or occasion of fear. 'Because of' communicates the sense clearly in English.
- source_word: הָאַף
  chosen: the anger
  alternatives:
  - the nose
  - the anger
  lexicon: HALOT
  rationale: אַף literally means 'nose' but commonly denotes anger. Here it is part of a hendiadys-like pairing with חֵמָה, so 'anger' is required by context.
- source_word: וְהַחֵמָה
  chosen: and the wrath
  alternatives:
  - and the heat
  - and the fury
  lexicon: HALOT
  rationale: חֵמָה denotes heat, venom, rage, or wrath. In parallel with אַף, 'wrath' gives a strong but readable English distinction.
- source_word: אֲשֶׁר קָצַף יְהוָה עֲלֵיכֶם
  chosen: with which the LORD was furious against you
  alternatives:
  - that the LORD was angry against you with
  - which the LORD was enraged against you with
  lexicon: HALOT
  rationale: קצף conveys intense anger. Rendering it verbally ('was furious') avoids a wooden repetition while preserving the severity of divine displeasure. 'Against you' reflects עֲלֵיכֶם.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְהַשְׁמִיד אֶתְכֶם
  chosen: to destroy you
  alternatives:
  - to annihilate you
  - to wipe you out
  lexicon: HALOT
  rationale: Hiphil infinitive of שׁמד expresses destruction. 'To destroy you' is direct and sufficiently strong without adding interpretive color.
- source_word: וַיִּשְׁמַע יְהוָה אֵלַי
  chosen: But the LORD listened to me
  alternatives:
  - And the LORD heard me
  - So the LORD listened to me
  lexicon: HALOT
  rationale: שׁמע with אֶל can mean 'listen to' in the sense of hearing favorably. 'Listened to me' captures the responsive sense in context of intercession better than the more neutral 'heard me.' The conjunction is rendered 'But' to reflect the favorable turn after the threat of destruction.
- source_word: גַּם בַּפַּעַם הַהִוא
  chosen: also at that time
  alternatives:
  - even that time too
  - that time as well
  lexicon: HALOT
  rationale: The phrase marks an additional instance of divine hearing. 'Also at that time' is idiomatic and preserves the additive force of גַּם.
