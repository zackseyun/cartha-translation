theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Intensity of divine anger language
  chosen_reading: the anger and the wrath with which the LORD was furious against you
  alternative_readings:
  - the anger and the hot displeasure that the LORD bore against you
  rationale: The Hebrew stacks multiple anger terms (אַף, חֵמָה, קצף). The translation preserves this intensity without softening it or importing later theological categories.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
