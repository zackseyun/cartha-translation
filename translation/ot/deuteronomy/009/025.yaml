id: DEU.9.25
reference: Deuteronomy 9:25
source:
  edition: WLC
  text: וָֽ/אֶתְנַפַּ֞ל לִ/פְנֵ֣י יְהוָ֗ה אֵ֣ת אַרְבָּעִ֥ים הַ/יּ֛וֹם וְ/אֶת אַרְבָּעִ֥ים
    הַ/לַּ֖יְלָה אֲשֶׁ֣ר הִתְנַפָּ֑לְתִּי כִּֽי אָמַ֥ר יְהוָ֖ה לְ/הַשְׁמִ֥יד אֶתְ/כֶֽם־־׃
translation:
  text: So I fell down before the LORD for forty days and forty nights, the same forty
    days and forty nights that I fell down, because the LORD had said he would destroy
    you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I lay prostrate before the LORD for forty days and forty nights.' The
      Hebrew verb can emphasize prostration in intercession.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶתְנַפַּל
  chosen: So I fell down
  alternatives:
  - Then I fell down
  - And I fell down
  - So I lay prostrate
  lexicon: HALOT
  rationale: The hitpael of נפל here describes Moses casting himself down in intercession.
    'Fell down' is a natural, sufficiently literal rendering. 'So' captures the waw
    in context as consequential/resumptive from the preceding narrative.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - before Yahweh
  lexicon: HALOT
  rationale: לִפְנֵי is spatial/relational, 'before' or 'in the presence of.' Per
    doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: אֵת אַרְבָּעִים הַיּוֹם וְאֶת אַרְבָּעִים הַלַּיְלָה
  chosen: for forty days and forty nights
  alternatives:
  - those forty days and forty nights
  lexicon: HALOT
  rationale: The accusative of duration is idiomatically rendered with 'for.' English
    naturally combines the repeated אֵת phrases into 'for forty days and forty nights'
    while preserving the duration.
- source_word: אֲשֶׁר הִתְנַפָּלְתִּי
  chosen: the same forty days and forty nights that I fell down
  alternatives:
  - which I fell down
  - during which I fell down
  - when I fell down
  lexicon: HALOT
  rationale: The clause restates and specifies the same period already mentioned.
    Because a wooden 'which I fell down' is awkward in English, 'the same forty days
    and forty nights that I fell down' preserves the emphatic repetition and temporal
    reference.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for Moses' prostration/intercession,
    so 'because' is clearer in modern English than the more formal 'for.'
- source_word: אָמַר יְהוָה
  chosen: the LORD had said
  alternatives:
  - the LORD said
  lexicon: HALOT
  rationale: 'The pluperfect sense fits the discourse: Moses fell down because of
    what the LORD had already declared. English often uses ''had said'' to make that
    prior action explicit.'
- source_word: לְהַשְׁמִיד אֶתְכֶם
  chosen: he would destroy you
  alternatives:
  - to destroy you
  - to annihilate you
  lexicon: HALOT
  rationale: The infinitive with ל after 'said' expresses intended action; in idiomatic
    English this is well rendered 'he would destroy you.' 'Destroy' fits השמיד without
    overstating to 'annihilate.'
