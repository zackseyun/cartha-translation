theological_decisions:
- issue: Rendering of עבד for the patriarchs
  chosen_reading: your servants
  alternative_readings:
  - your slaves
  rationale: The project allows servant/slave context-dependently. Here the term functions
    as an honorific covenant designation for Abraham, Isaac, and Jacob in prayer,
    not to foreground chattel or bonded-status imagery. 'Servants' best reflects the
    relational and reverential sense without unnecessary distortion.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    for δοῦλος by analogy of context-dependent bonded nuance
- issue: Collective singular suffixes on 'wickedness' and 'sin' rendered with plural
    English pronouns
  chosen_reading: their wickedness ... their sin
  alternative_readings:
  - its wickedness ... its sin
  rationale: Hebrew often uses singular agreement with collective nouns. English idiom
    prefers plural reference for 'people' when speaking of their moral actions. This
    is a translation-language decision, not a theological reinterpretation.
  doctrine_reference: DOCTRINE.md Translation philosophy §6
