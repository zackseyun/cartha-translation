id: DEU.9.27
reference: Deuteronomy 9:27
source:
  edition: WLC
  text: זְכֹר֙ לַ/עֲבָדֶ֔י/ךָ לְ/אַבְרָהָ֥ם לְ/יִצְחָ֖ק וּֽ/לְ/יַעֲקֹ֑ב אַל תֵּ֗פֶן
    אֶל קְשִׁי֙ הָ/עָ֣ם הַ/זֶּ֔ה וְ/אֶל רִשְׁע֖/וֹ וְ/אֶל חַטָּאתֽ/וֹ־־־־׃
translation:
  text: Remember your servants, Abraham, Isaac, and Jacob. Do not turn your attention
    to the stubbornness of this people, or to their wickedness, or to their sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not look at' or 'Do not regard' the stubbornness of this people.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'hardness' or 'stubbornness'; compare the idea of being obstinate,
      not the specific idiom 'stiff-necked' used elsewhere.
    reason: lexical_alternative
lexical_decisions:
- source_word: זְכֹר
  chosen: Remember
  alternatives:
  - Call to mind
  lexicon: HALOT
  rationale: Imperative addressed to God in Moses' intercession. 'Remember' is the
    standard and natural English rendering for זכר in covenantal prayer contexts.
- source_word: לַעֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: עבד can denote servant or slave. Here it refers honorifically to the
    patriarchs in relation to God, where 'servants' is the most idiomatic and contextually
    fitting English rendering; the bonded-status nuance is not foregrounded as in
    some NT doulos contexts.
- source_word: לְאַבְרָהָם לְיִצְחָק וּלְיַעֲקֹב
  chosen: Abraham, Isaac, and Jacob
  rationale: Personal names are transliterated by standard English conventions per
    project philosophy.
- source_word: אַל תֵּפֶן אֶל
  chosen: Do not turn your attention to
  alternatives:
  - Do not look at
  - Do not regard
  - Do not turn to
  lexicon: HALOT
  rationale: פנה with אֶל literally means 'turn toward.' In this prayer context it
    means to give regard or attention to something. 'Turn your attention to' preserves
    the metaphor while making the idiomatic sense clear in modern English.
- source_word: קְשִׁי
  chosen: the stubbornness
  alternatives:
  - the hardness
  - the stiff-neckedness
  lexicon: HALOT
  rationale: The noun denotes hardness or stubbornness. 'Stubbornness' communicates
    the moral sense clearly in contemporary English. 'Stiff-neckedness' would import
    wording from related but different Hebrew expressions not used here.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this nation
  lexicon: HALOT
  rationale: עם commonly means 'people.' 'This people' preserves the demonstrative
    force and the covenant-community reference better than 'nation' in this context.
- source_word: רִשְׁעוֹ
  chosen: their wickedness
  alternatives:
  - its wickedness
  - their guilt
  lexicon: HALOT
  rationale: Although the suffix is grammatically singular ('his/its'), it refers
    collectively to the people. English naturally renders the collective with plural
    'their.' 'Wickedness' best matches רשע here as moral evil rather than legal guilt.
- source_word: חַטָּאתוֹ
  chosen: their sin
  alternatives:
  - its sin
  - their sinfulness
  lexicon: HALOT
  rationale: As with רִשְׁעוֹ, the singular suffix refers to the collective people.
    'Their sin' is idiomatic English and preserves the concrete moral offense sense
    of חטאת in context.
