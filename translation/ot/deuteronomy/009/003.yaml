  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Divine-war imagery in אֵשׁ אֹכְלָה
  chosen_reading: a consuming fire
  alternative_readings:
  - a devouring fire
  rationale: The phrase is retained as metaphorical-theological language of God's holy, destructive presence without softening it or expanding it into doctrinal paraphrase.
