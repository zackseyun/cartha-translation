id: DEU.9.3
reference: Deuteronomy 9:3
source:
  edition: WLC
  text: וְ/יָדַעְתָּ֣ הַ/יּ֗וֹם כִּי֩ יְהוָ֨ה אֱלֹהֶ֜י/ךָ הֽוּא הָ/עֹבֵ֤ר לְ/פָנֶ֨י/ךָ֙ אֵ֣שׁ אֹֽכְלָ֔ה ה֧וּא יַשְׁמִידֵ֛/ם וְ/ה֥וּא יַכְנִיעֵ֖/ם לְ/פָנֶ֑י/ךָ וְ/הֽוֹרַשְׁתָּ֤/ם וְ/הַֽאַבַדְתָּ/ם֙ מַהֵ֔ר כַּ/אֲשֶׁ֛ר דִּבֶּ֥ר יְהוָ֖ה לָֽ/ךְ־׃
translation:
  text: So know today that Yahweh your God is the one crossing over before you, a consuming fire. He will destroy them, and he will subdue them before you; and you will dispossess them and make them perish quickly, just as Yahweh has spoken to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "going before you" for "crossing over before you." The Hebrew participle literally speaks of the LORD as the one crossing over ahead of Israel.
    reason: lexical_alternative
  - marker: b
    text: Or "a devouring fire."
    reason: lexical_alternative
  - marker: c
    text: Or "you will drive them out" for "you will dispossess them."
    reason: lexical_alternative
  - marker: d
    text: Or "as the LORD spoke to you"; the sense is that this will happen in accordance with the LORD's prior word to Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדַעְתָּ הַיּוֹם
  chosen: So know today
  alternatives:
  - And know today
  - Know today
  lexicon: HALOT
  rationale: The conjunction plus perfect 2ms functions as an exhortatory/resultative statement in context. 'So know today' captures the discourse connection to the preceding warning while remaining natural English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Standard covenantal expression in direct address; 'your God' is the plain sense.
- source_word: הוּא הָעֹבֵר לְפָנֶיךָ
  chosen: is the one crossing over before you
  alternatives:
  - is the one going before you
  - is the one passing over before you
  lexicon: HALOT
  rationale: The participle of עבר is vivid and immediate. 'Crossing over' preserves the verbal link with Israel's crossing into the land and keeps the concrete imagery better than the more generalized 'going before you.'
- source_word: אֵשׁ אֹכְלָה
  chosen: a consuming fire
  alternatives:
  - a devouring fire
  lexicon: HALOT
  rationale: This is a well-established Hebrew expression for destructive divine holiness and judgment. 'Consuming fire' is both accurate and idiomatic in English.
- source_word: יַשְׁמִידֵם
  chosen: He will destroy them
  alternatives:
  - He will exterminate them
  - He will wipe them out
  lexicon: HALOT
  rationale: The Hiphil of שׁמד denotes causing destruction. 'Destroy' is strong without importing a more technical or modern connotation than the Hebrew itself requires.
- source_word: יַכְנִיעֵם
  chosen: he will subdue them
  alternatives:
  - he will humble them
  - he will bring them down
  lexicon: HALOT
  rationale: The Hiphil of כנע here refers to bringing the nations low before Israel in battle. 'Subdue' fits the military context better than the more inward-sounding 'humble.'
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - in your presence
  lexicon: HALOT
  rationale: The phrase is repeated in the verse and is best kept consistently as 'before you' to preserve the spatial and military sense.
- source_word: וְהוֹרַשְׁתָּם
  chosen: you will dispossess them
  alternatives:
  - you will drive them out
  - you will take possession from them
  lexicon: HALOT
  rationale: The Hiphil of ירשׁ commonly means to dispossess/inherit by taking possession. 'Dispossess' preserves the legal-territorial force better than merely 'drive out.'
- source_word: וְהַאֲבַדְתָּם
  chosen: make them perish
  alternatives:
  - destroy them
  - wipe them out
  lexicon: HALOT
  rationale: Using 'make them perish' distinguishes this verb from the earlier שׁמד ('destroy') while still reflecting the causative force of אבד in Hiphil.
- source_word: מַהֵר
  chosen: quickly
  alternatives:
  - swiftly
  - soon
  lexicon: HALOT
  rationale: The adverb indicates rapidity of outcome. 'Quickly' is clear modern English.
- source_word: כַּאֲשֶׁר דִּבֶּר יְהוָה לָךְ
  chosen: just as the LORD has spoken to you
  alternatives:
  - as the LORD spoke to you
  - just as the LORD promised you
  lexicon: HALOT
  rationale: The perfect of דבר points to prior divine speech. 'Has spoken' preserves that prior promise/statement without over-interpreting it as 'promised,' though promise is implied by context.
