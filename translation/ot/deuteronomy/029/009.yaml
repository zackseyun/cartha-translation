id: DEU.29.9
reference: Deuteronomy 29:9
source:
  edition: WLC
  text: אַתֶּ֨ם נִצָּבִ֤ים הַ/יּוֹם֙ כֻּלְּ/כֶ֔ם לִ/פְנֵ֖י יְהוָ֣ה אֱלֹהֵי/כֶ֑ם רָאשֵׁי/כֶ֣ם שִׁבְטֵי/כֶ֗ם זִקְנֵי/כֶם֙ וְ/שֹׁ֣טְרֵי/כֶ֔ם כֹּ֖ל אִ֥ישׁ יִשְׂרָאֵֽל׃
translation:
  text: 'You are standing today, all of you, before Yahweh your God: your heads, your tribes, your elders, and your officers—all the men of Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every man of Israel.' The Hebrew is literally 'every man of Israel,' a distributive expression.
    reason: lexical_alternative
  - marker: b
    text: '''Your heads'' may also be understood idiomatically as ''your leaders'' or, with the next word taken closely, ''the heads of your tribes.'''
    reason: alternative_reading
lexical_decisions:
- source_word: נִצָּבִים
  chosen: are standing
  alternatives:
  - stand
  - are stationed
  lexicon: HALOT
  rationale: The Niphal participle of נצב denotes being in a standing position or taking one's stand. In context it describes the assembled covenant community presently positioned before God, so 'are standing' preserves the participial, scene-setting force better than a simple imperative-like 'stand.'
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: '''Today'' is the natural modern English equivalent and preserves the temporal emphasis without archaic phrasing.'
- source_word: כֻּלְּכֶם
  chosen: all of you
  alternatives:
  - all of you together
  - every one of you
  lexicon: HALOT
  rationale: This explicitly renders the collective emphasis of כֹּל with the 2mp suffix and fits the covenant-assembly context.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: '''Before'' is the standard concise rendering for covenantal standing in God''s presence and is fully adequate here.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with suffix; 'the LORD your God' is the standard covenant formula and should be preserved.
- source_word: רָאשֵׁיכֶם
  chosen: your heads
  alternatives:
  - your leaders
  - your chiefs
  lexicon: HALOT
  rationale: Although idiomatically this refers to leaders, the following appositional list appears to enumerate social groupings in a fairly formal way. 'Your heads' preserves the Hebrew metaphor more closely, while the sense remains clear in context.
- source_word: שִׁבְטֵיכֶם
  chosen: your tribes
  alternatives:
  - your tribal leaders
  lexicon: HALOT
  rationale: 'The plain lexical sense is ''tribes.'' Some versions construe the phrase collectively as ''heads of your tribes,'' but the Hebrew accentuation and sequence can be represented as a list: ''your heads, your tribes...'' preserving the source structure.'
- source_word: זִקְנֵיכֶם
  chosen: your elders
  lexicon: HALOT
  rationale: Standard rendering for communal leaders/older men in Israelite civic structure.
- source_word: שֹׁטְרֵיכֶם
  chosen: your officers
  alternatives:
  - your officials
  - your scribes
  lexicon: HALOT
  rationale: In Deuteronomic administrative contexts, שֹׁטֵר commonly refers to officials/officers. 'Officers' is concise and conventional without over-specifying function.
- source_word: כֹּל אִישׁ יִשְׂרָאֵל
  chosen: all the men of Israel
  alternatives:
  - every man of Israel
  - all Israelite men
  lexicon: HALOT
  rationale: The Hebrew is grammatically singular קול + איש used distributively, referring specifically to male Israelites. Per doctrine, gender-accurate rendering is preferred over flattening to 'everyone in Israel.' 'All the men of Israel' communicates the collective sense in natural English.
