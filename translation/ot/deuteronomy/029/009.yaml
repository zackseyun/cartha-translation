theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Gendered expression in כֹּל אִישׁ יִשְׂרָאֵל
  chosen_reading: all the men of Israel
  alternative_readings:
  - everyone in Israel
  - all Israel
  rationale: The source uses אִישׁ, a masculine singular noun with distributive force. Following the gender-accurate policy, the translation preserves the male-specific wording rather than neutralizing it, while recognizing that the broader assembly includes women and children in the following verse.
