id: DEU.29.22
reference: Deuteronomy 29:22
source:
  edition: WLC
  text: גָּפְרִ֣ית וָ/מֶלַח֮ שְׂרֵפָ֣ה כָל אַרְצָ/הּ֒ לֹ֤א תִזָּרַע֙ וְ/לֹ֣א תַצְמִ֔חַ וְ/לֹֽא יַעֲלֶ֥ה בָ֖/הּ כָּל עֵ֑שֶׂב כְּֽ/מַהְפֵּכַ֞ת סְדֹ֤ם וַ/עֲמֹרָה֙ אַדְמָ֣ה ו/צביים אֲשֶׁר֙ הָפַ֣ךְ יְהוָ֔ה בְּ/אַפּ֖/וֹ וּ/בַ/חֲמָתֽ/וֹ־־־׃
translation:
  text: Sulfur and salt, a burning waste, are all its land; it is not sown, and it does not sprout, and no grass grows in it, like the overthrow of Sodom and Gomorrah, Admah and Zeboiim, which Yahweh overthrew in his anger and in his wrath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brimstone and salt, a burning.' 'Sulfur' is used for clear modern English; 'brimstone' preserves traditional diction.
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּפְרִית
  chosen: sulfur
  alternatives:
  - brimstone
  lexicon: HALOT
  rationale: The Hebrew denotes sulfur; 'sulfur' is the clear modern English equivalent, while 'brimstone' is traditional but archaic and can suggest a later idiom rather than the plain substance named.
- source_word: וָמֶלַח
  chosen: and salt
  lexicon: HALOT
  rationale: A straightforward rendering of the conjunction plus noun. The pairing with sulfur evokes desolation and sterility.
- source_word: שְׂרֵפָה
  chosen: a burning waste
  alternatives:
  - burning
  - burned-out waste
  - conflagration
  lexicon: HALOT
  rationale: The noun refers to burning/burned condition. In context it functions appositionally with 'sulfur and salt' to describe the land's devastated state. 'A burning waste' preserves both the fire imagery and the result of devastation in idiomatic English.
- source_word: כָל אַרְצָהּ
  chosen: is all its land
  alternatives:
  - covers all its land
  - are over all its land
  lexicon: HALOT
  rationale: 'Literally ''all her/its land.'' Because the Hebrew verbless clause lists the condition of the land, English supplies ''is'' to make the predication natural: the whole land is characterized by sulfur, salt, and burning waste.'
- source_word: לֹא תִזָּרַע
  chosen: it is not sown
  alternatives:
  - it cannot be sown
  - it will not be sown
  lexicon: HALOT
  rationale: The Niphal imperfect can be rendered as a passive statement of the land's condition. 'It is not sown' fits the descriptive sequence better than a future or modal rendering.
- source_word: וְלֹא תַצְמִחַ
  chosen: and it does not sprout
  alternatives:
  - and it does not produce growth
  - and nothing sprouts
  lexicon: HALOT
  rationale: The Hiphil of צמח here describes the land's failure to bring forth growth. Rendering the feminine subject as 'it' keeps the land as the subject through the sequence.
- source_word: וְלֹא יַעֲלֶה בָהּ כָּל עֵשֶׂב
  chosen: and no grass grows in it
  alternatives:
  - and no vegetation comes up in it
  - and no herb springs up in it
  lexicon: HALOT
  rationale: Literally 'and no grass/plant comes up in it.' 'Grass' is a natural rendering of עֵשֶׂב here, and 'grows' communicates the idiom smoothly in English.
- source_word: כְּמַהְפֵּכַת
  chosen: like the overthrow of
  alternatives:
  - like the destruction of
  - like the overturning of
  lexicon: HALOT
  rationale: The noun from הפך refers to catastrophic overthrow. 'Overthrow' preserves the lexical link with the later verb 'overthrew' and echoes the well-known judgment motif without over-paraphrasing.
- source_word: סְדֹם וַעֲמֹרָה אַדְמָה וּצְבֹיִים
  chosen: Sodom and Gomorrah, Admah and Zeboiim
  lexicon: HALOT
  rationale: These are place names and are therefore transliterated by standard English conventions, per translation philosophy.
- source_word: אֲשֶׁר הָפַךְ יְהוָה
  chosen: which the LORD overthrew
  alternatives:
  - which the LORD destroyed
  lexicon: HALOT
  rationale: The relative clause resumes the noun 'overthrow' with the cognate verb הפך. 'Overthrew' preserves the lexical correspondence. YHWH is rendered 'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּאַפּוֹ וּבַחֲמָתוֹ
  chosen: in his anger and in his wrath
  alternatives:
  - in his nostril and in his heat
  - in his anger and fury
  lexicon: HALOT
  rationale: These paired terms express divine anger with intensification. 'Anger' and 'wrath' preserve the distinction and gravity without flattening the anthropomorphic idiom too woodenly.
