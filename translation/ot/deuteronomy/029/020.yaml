id: DEU.29.20
reference: Deuteronomy 29:20
source:
  edition: WLC
  text: וְ/הִבְדִּיל֤/וֹ יְהוָה֙ לְ/רָעָ֔ה מִ/כֹּ֖ל שִׁבְטֵ֣י יִשְׂרָאֵ֑ל כְּ/כֹל֙ אָל֣וֹת הַ/בְּרִ֔ית הַ/כְּתוּבָ֕ה בְּ/סֵ֥פֶר הַ/תּוֹרָ֖ה הַ/זֶּֽה׃
translation:
  text: And Yahweh will single him out from all the tribes of Israel for disaster, according to all the curses of the covenant written in this book of the law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the oath-curses of the covenant.' The Hebrew term can refer specifically to covenant curses invoked by oath.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִבְדִּילוֹ
  chosen: will single him out
  alternatives:
  - will separate him
  - will set him apart
  lexicon: HALOT
  rationale: Hiphil of בדל with 3ms suffix conveys causing someone to be separated/distinguished. In context of judgment, 'single him out' captures the hostile, punitive force more naturally than the more neutral 'separate him' while remaining faithful to the verb's core sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name YHWH.
- source_word: לְרָעָה
  chosen: for disaster
  alternatives:
  - for evil
  - for harm
  - for calamity
  lexicon: HALOT
  rationale: רָעָה here denotes harmful outcome/judgment rather than moral evil. 'Disaster' communicates covenant curse and punitive ruin in clear modern English.
- source_word: מִכֹּל שִׁבְטֵי יִשְׂרָאֵל
  chosen: from all the tribes of Israel
  alternatives:
  - out of all the tribes of Israel
  - away from all the tribes of Israel
  lexicon: HALOT
  rationale: The preposition מִן with 'all the tribes of Israel' marks separation from the larger covenant community. 'From' is idiomatic and preserves the sense.
- source_word: כְּכֹל
  chosen: according to all
  alternatives:
  - in keeping with all
  - corresponding to all
  lexicon: HALOT
  rationale: כְּ here indicates correspondence or conformity. 'According to all' preserves the formal linkage between the punishment and the written covenant curses.
- source_word: אָלוֹת
  chosen: the curses
  alternatives:
  - the oath-curses
  - the imprecations
  lexicon: HALOT
  rationale: אָלָה in covenant contexts often refers to the curse sanctions attached to oath obligations. 'Curses' is the clearest main-text rendering; the oath-related nuance is worth preserving in a footnote.
- source_word: הַבְּרִית
  chosen: of the covenant
  alternatives:
  - of the treaty
  - of the pact
  lexicon: HALOT
  rationale: בְּרִית is consistently rendered 'covenant' in biblical theological contexts.
- source_word: הַכְּתוּבָה
  chosen: written
  alternatives:
  - that is written
  - recorded
  lexicon: HALOT
  rationale: The passive participle modifies 'covenant' via its curses as inscribed in the book. English idiom is best served by attaching 'written' to the covenant curses without overcomplicating the syntax.
- source_word: בְּסֵפֶר הַתּוֹרָה הַזֶּה
  chosen: in this book of the law
  alternatives:
  - in this scroll of the law
  - in the book of this law
  lexicon: HALOT
  rationale: סֵפֶר can denote book/scroll; 'book' is standard and natural in English. תּוֹרָה here refers specifically to the covenantal law corpus, so 'the law' is appropriate.
