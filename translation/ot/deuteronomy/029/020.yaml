theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nature of the judgment in לְרָעָה
  chosen_reading: for disaster
  alternative_readings:
  - for evil
  - for harm
  - for calamity
  rationale: The text speaks of covenant judgment, not moral evil in God. 'For disaster' preserves the punitive sense without implying that the LORD singles him out for moral evil.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: readable modern English; do not import doctrinal claims the text does not make'
