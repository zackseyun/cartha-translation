id: DEU.29.14
reference: Deuteronomy 29:14
source:
  edition: WLC
  text: כִּי֩ אֶת אֲשֶׁ֨ר יֶשְׁנ֜/וֹ פֹּ֗ה עִמָּ֨/נוּ֙ עֹמֵ֣ד הַ/יּ֔וֹם לִ/פְנֵ֖י יְהוָ֣ה אֱלֹהֵ֑י/נוּ וְ/אֵ֨ת אֲשֶׁ֥ר אֵינֶ֛/נּוּ פֹּ֖ה עִמָּ֥/נוּ הַ/יּֽוֹם־׃
translation:
  text: but with whoever is standing here with us today before Yahweh our God, and with whoever is not here with us today.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with those who are not here with us today.' This may refer to Israelites absent from the assembly, future generations, or both.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: but
  alternatives:
  - for
  - rather
  lexicon: HALOT
  rationale: In context this continues and contrasts with the previous verse's negation ('not with you alone'), so an adversative English connector fits better than a purely causal 'for.'
- source_word: אֶת אֲשֶׁר
  chosen: with whoever
  alternatives:
  - with those who
  - with him who
  lexicon: HALOT
  rationale: The object marker with relative particle introduces the persons included in the covenant/oath. English idiom requires supplying 'with' from the prior verse's covenant formula; 'whoever' preserves the singular distributive sense while reading naturally.
- source_word: יֶשְׁנוֹ
  chosen: is
  alternatives:
  - exists
  - is present
  lexicon: HALOT
  rationale: The form from ישׁ conveys existence/presence. In this construction with פֹּה, simple 'is' is the most natural English equivalent.
- source_word: פֹּה עִמָּנוּ
  chosen: here with us
  alternatives:
  - here among us
  lexicon: HALOT
  rationale: This phrase marks physical presence in the assembly. 'Here with us' is straightforward and preserves the relational nuance of עִם.
- source_word: עֹמֵד
  chosen: standing
  alternatives:
  - stationed
  - present
  lexicon: HALOT
  rationale: Literally 'standing'; in covenant-assembly context it can imply being present, but retaining 'standing' preserves the concrete posture before God without obscuring meaning.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Modern, readable rendering of the temporal marker, repeated in both clauses for emphasis.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: Standard covenantal/spatial rendering; concise and accurate.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by doctrine table for the divine name.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Direct rendering of the pronominal form; paired with 'the LORD' in the standard covenant formula.
- source_word: וְאֵת אֲשֶׁר אֵינֶנּוּ
  chosen: and with whoever is not
  alternatives:
  - and with those who are not
  - and with whoever is absent
  lexicon: HALOT
  rationale: Mirrors the first clause and preserves the existential negation. 'Absent' is interpretive; 'is not' keeps closer to the Hebrew while remaining intelligible with 'here with us' following.
