theological_decisions:
- issue: Scope of the covenant participants, including those 'not here with us today'
  chosen_reading: Render the phrase straightforwardly without specifying whether it refers to absent Israelites, future generations, or both.
  alternative_readings:
  - future generations not yet born
  - members of Israel physically absent from the assembly
  - both absent contemporaries and future covenant members
  rationale: The Hebrew intentionally leaves the referent broad. The translation should preserve that openness rather than resolve an interpretive question not explicit in the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
