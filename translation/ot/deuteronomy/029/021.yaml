id: DEU.29.21
reference: Deuteronomy 29:21
source:
  edition: WLC
  text: וְ/אָמַ֞ר הַ/דּ֣וֹר הָֽ/אַחֲר֗וֹן בְּנֵי/כֶם֙ אֲשֶׁ֤ר יָק֨וּמוּ֙ מֵ/אַ֣חֲרֵי/כֶ֔ם וְ/הַ֨/נָּכְרִ֔י אֲשֶׁ֥ר יָבֹ֖א מֵ/אֶ֣רֶץ רְחוֹקָ֑ה וְ֠/רָאוּ אֶת מַכּ֞וֹת הָ/אָ֤רֶץ הַ/הִוא֙ וְ/אֶת תַּ֣חֲלֻאֶ֔י/הָ אֲשֶׁר חִלָּ֥ה יְהוָ֖ה בָּֽ/הּ־־־׃
translation:
  text: 'And the generation to come—your children who rise up after you—and the foreigner who comes from a distant land will say, when they see the plagues of that land and its sicknesses with which Yahweh has afflicted it:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the later generation.' The Hebrew expression refers to a future generation after the present one, not necessarily the final generation.
    reason: lexical_alternative
  - marker: b
    text: Or 'its diseases' for 'its sicknesses.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'which the LORD has made sick in it' or 'has afflicted in it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַר
  chosen: will say
  alternatives:
  - shall say
  - will say
  lexicon: HALOT
  rationale: Though morphologically singular, the verb introduces a compound subject that follows ('the generation... and the foreigner'). In English, 'will say' naturally anticipates the later plural sense and fits the forward-looking discourse.
- source_word: הַדּוֹר הָאַחֲרוֹן
  chosen: the generation to come
  alternatives:
  - the later generation
  - the last generation
  lexicon: HALOT
  rationale: In context this refers to a future generation after the present hearers, not necessarily the final generation in an eschatological sense. 'To come' is idiomatic and contextually precise.
- source_word: בְּנֵיכֶם אֲשֶׁר יָקֻמוּ מֵאַחֲרֵיכֶם
  chosen: your children who rise up after you
  alternatives:
  - your sons who come after you
  - your descendants who arise after you
  lexicon: HALOT
  rationale: בנים can mean children/sons/descendants. 'Your children' is gender-accurate enough in English for offspring generally and avoids narrowing the sense to males only where the context is corporate posterity.
- source_word: וְהַנָּכְרִי
  chosen: and the foreigner
  alternatives:
  - and the stranger
  - and the outsider
  lexicon: HALOT
  rationale: נכרי denotes a foreign person from outside Israel. 'Foreigner' is the clearest modern equivalent; 'stranger' can sound merely unfamiliar rather than ethnically/nationally foreign.
- source_word: מֵאֶרֶץ רְחוֹקָה
  chosen: from a distant land
  alternatives:
  - from a far country
  - from a remote land
  lexicon: HALOT
  rationale: A natural modern rendering preserving the geographic remoteness.
- source_word: וְרָאוּ
  chosen: when they see
  alternatives:
  - and they see
  - after they see
  lexicon: HALOT
  rationale: The waw + perfect here is best rendered in English as a temporal clause tied to the reaction 'will say.' 'When they see' makes the sequence explicit and readable.
- source_word: מַכּוֹת
  chosen: the plagues
  alternatives:
  - the blows
  - the afflictions
  lexicon: HALOT
  rationale: The noun often denotes striking blows or plagues. Given the land's visible devastation and covenant-curse context, 'plagues' best captures the punitive calamities.
- source_word: תַּחֲלֻאֶיהָ
  chosen: its sicknesses
  alternatives:
  - its diseases
  - its maladies
  lexicon: HALOT
  rationale: A literal rendering of the plural noun for illnesses/diseases affecting the land. 'Sicknesses' pairs well with 'plagues' while preserving the metaphor of the land under disease.
- source_word: חִלָּה
  chosen: has afflicted
  alternatives:
  - has made sick
  - has wounded
  - has stricken
  lexicon: HALOT
  rationale: The verb from חלה in the piel can mean to make sick or afflict. 'Has afflicted' is broad enough to cover the land's cursed condition while remaining faithful to the causative sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בָּהּ
  chosen: it
  alternatives:
  - in it
  - upon it
  lexicon: HALOT
  rationale: The preposition plus pronoun refers back to the land. English idiom with 'afflicted' prefers direct object style ('afflicted it'), though the Hebrew literally says 'in it/on it.'
