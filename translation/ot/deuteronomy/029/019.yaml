theological_decisions:
- issue: Anthropomorphic judgment imagery
  chosen_reading: Retain the metaphor that the LORD's anger and jealousy 'will smoke' rather than flattening it to a generic statement of wrath.
  alternative_readings:
  - the LORD's wrath will burn
  rationale: The Hebrew uses vivid anthropomorphic imagery to express covenant judgment. Preserving the metaphor maintains the text's force without importing speculative theology about divine passions beyond what the text states.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Gendered singular reference
  chosen_reading: Render הָאִישׁ הַהוּא as 'that man.'
  alternative_readings:
  - that person
  rationale: The Hebrew is grammatically masculine singular and refers to the individual covenant-breaker in context. Per the gender-accurate policy, the translation keeps the masculine form rather than neutralizing it.
  doctrine_reference: Translation philosophy §4
- issue: Covenant-curse terminology
  chosen_reading: Use 'every curse' in the main text, with oath-curse nuance preserved in a footnote.
  alternative_readings:
  - every oath-curse
  rationale: The immediate sense is intelligible as 'curse,' but Deuteronomy's covenantal setting gives אָלָה a formal oath-curse nuance worth preserving for auditability without overloading the main text.
  doctrine_reference: Translation philosophy §3, §6
