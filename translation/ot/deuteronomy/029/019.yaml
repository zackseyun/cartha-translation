id: DEU.29.19
reference: Deuteronomy 29:19
source:
  edition: WLC
  text: לֹא יֹאבֶ֣ה יְהוָה֮ סְלֹ֣חַֽ ל/וֹ֒ כִּ֣י אָ֠ז יֶעְשַׁ֨ן אַף יְהוָ֤ה וְ/קִנְאָת/וֹ֙ בָּ/אִ֣ישׁ הַ/ה֔וּא וְ/רָ֤בְצָה בּ/וֹ֙ כָּל הָ֣/אָלָ֔ה הַ/כְּתוּבָ֖ה בַּ/סֵּ֣פֶר הַ/זֶּ֑ה וּ/מָחָ֤ה יְהוָה֙ אֶת שְׁמ֔/וֹ מִ/תַּ֖חַת הַ/שָּׁמָֽיִם־־־־׃
translation:
  text: Yahweh will not be willing to forgive him, for then the anger of Yahweh and his jealousy will burn against that man, and every curse written in this book will settle on him, and Yahweh will blot out his name from under heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every oath-curse'; the Hebrew term can denote a curse invoked in covenant oath context, not merely a general malediction.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹאבֶה
  chosen: will not be willing
  alternatives:
  - will not consent
  - will not be pleased
  lexicon: HALOT
  rationale: The verb אבה denotes willingness or consent, not mere ability. 'Will not be willing' preserves the volitional force before the infinitive 'to forgive.'
- source_word: סְלֹחַ לוֹ
  chosen: to forgive him
  alternatives:
  - to pardon him
  lexicon: HALOT
  rationale: סלח commonly means forgive/pardon in covenantal contexts. 'Forgive him' is the most natural modern English rendering.
- source_word: כִּי אָז
  chosen: for then
  alternatives:
  - because then
  - for at that time
  lexicon: HALOT
  rationale: This pair introduces the consequence if forgiveness were not granted; 'for then' captures the explanatory and temporal force succinctly.
- source_word: יֶעְשַׁן אַף יְהוָה
  chosen: the anger of the LORD ... will smoke
  alternatives:
  - the nose/anger of the LORD will smoke
  - the wrath of the LORD will burn
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of anger smoking. Retaining 'will smoke' preserves the vivid metaphor, while rendering אַף as 'anger' rather than the overly literal 'nose.'
- source_word: קִנְאָתוֹ
  chosen: his jealousy
  alternatives:
  - his zeal
  lexicon: HALOT
  rationale: In covenant judgment language, קנאה often carries the sense of jealous zeal. 'Jealousy' is the more direct lexical equivalent here and fits the warning context.
- source_word: בָּאִישׁ הַהוּא
  chosen: against that man
  alternatives:
  - upon that man
  - in that man
  lexicon: HALOT
  rationale: With verbs of anger and hostility, ב can be rendered idiomatically as 'against.' 'That man' preserves the masculine singular reference of the Hebrew.
- source_word: וְרָבְצָה בוֹ
  chosen: will settle on him
  alternatives:
  - will lie down on him
  - will rest on him
  lexicon: HALOT
  rationale: רבץ literally means to lie down or crouch. For a curse, 'settle on him' communicates the image of something coming to rest and remaining upon him in readable English.
- source_word: כָּל הָאָלָה
  chosen: every curse
  alternatives:
  - all the oath-curse
  - the whole curse
  lexicon: HALOT
  rationale: אָלָה in Deuteronomy often refers to covenant curses invoked by oath. 'Every curse' is clear in English, while the oath nuance can be preserved in a footnote.
- source_word: הַכְּתוּבָה בַּסֵּפֶר הַזֶּה
  chosen: written in this book
  alternatives:
  - recorded in this scroll
  - written in this scroll
  lexicon: HALOT
  rationale: סֵפֶר can mean book or scroll. 'Book' is acceptable modern English and matches common Deuteronomic usage without obscuring meaning.
- source_word: וּמָחָה ... אֶת שְׁמוֹ
  chosen: will blot out his name
  alternatives:
  - will wipe out his name
  - will erase his name
  lexicon: HALOT
  rationale: מחה with 'name' is a standard idiom for erasing memory or posterity. 'Blot out' preserves the biblical idiom well in English.
- source_word: מִתַּחַת הַשָּׁמָיִם
  chosen: from under heaven
  alternatives:
  - from under the heavens
  lexicon: HALOT
  rationale: The phrase is a stock Hebrew expression for removal from the earth. 'From under heaven' is idiomatic and preserves the traditional force.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
