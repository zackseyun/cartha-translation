id: DEU.29.3
reference: Deuteronomy 29:3
source:
  edition: WLC
  text: וְ/לֹֽא נָתַן֩ יְהוָ֨ה לָ/כֶ֥ם לֵב֙ לָ/דַ֔עַת וְ/עֵינַ֥יִם לִ/רְא֖וֹת וְ/אָזְנַ֣יִם לִ/שְׁמֹ֑עַ עַ֖ד הַ/יּ֥וֹם הַ/זֶּֽה־׃
translation:
  text: But Yahweh has not given you a heart to know, or eyes to see, or ears to hear, to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And the LORD has not given you a heart to know, and eyes to see, and ears to hear, until this day.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא
  chosen: But ... not
  alternatives:
  - And ... not
  - Yet ... not
  lexicon: HALOT
  rationale: The conjunction with negation continues the discourse while marking contrast with the preceding mention of what Israel has seen. 'But' brings out the adversative force in natural English better than a bare 'and not.'
- source_word: נָתַן
  chosen: has not given
  alternatives:
  - did not give
  lexicon: HALOT
  rationale: The Hebrew perfect states a completed reality with present relevance. English present perfect communicates that the lack has persisted up to the stated endpoint, 'to this day.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֵב לָדַעַת
  chosen: a heart to know
  alternatives:
  - a mind to understand
  - a heart to understand
  lexicon: HALOT
  rationale: Retains the Hebrew anthropological term 'heart' rather than reducing it to 'mind,' since in Hebrew לֵב includes understanding and inner disposition. 'To know' is the direct lexical sense of ידע and preserves the source imagery.
- source_word: וְעֵינַיִם לִרְאוֹת
  chosen: or eyes to see
  alternatives:
  - and eyes to see
  lexicon: HALOT
  rationale: The repeated coordinated infinitive phrases are rendered with 'or ... or ... or ...' for idiomatic English enumeration after 'has not given you.' 'Eyes to see' is a transparent formal rendering.
- source_word: וְאָזְנַיִם לִשְׁמֹעַ
  chosen: or ears to hear
  alternatives:
  - and ears to hear
  lexicon: HALOT
  rationale: Preserves the Hebrew parallelism and the common biblical idiom of perceptive hearing.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  - up to this day
  lexicon: HALOT
  rationale: This is the standard idiomatic English equivalent for the temporal phrase, expressing persistence up to the present point in the narrative.
