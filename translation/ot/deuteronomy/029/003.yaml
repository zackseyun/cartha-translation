theological_decisions:
- issue: Divine agency in Israel's lack of understanding
  chosen_reading: The verse is rendered straightforwardly as stating that the LORD has not given Israel the inward capacity to truly know, see, and hear up to that day.
  alternative_readings:
  - 'A permissive sense: the LORD has not enabled/allowed them to attain such understanding'
  - An idiomatic covenantal judgment sense emphasizing Israel's condition without resolving broader questions of human responsibility
  rationale: The Hebrew text explicitly attributes the non-giving to the LORD, so the translation should not soften this into mere human failure. At the same time, the wording should not import a later systematic explanation of divine sovereignty and human responsibility beyond what the verse itself states. Preserving the concrete imagery of heart, eyes, and ears maintains the theological tension present in the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
