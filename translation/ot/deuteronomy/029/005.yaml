id: DEU.29.5
reference: Deuteronomy 29:5
source:
  edition: WLC
  text: לֶ֚חֶם לֹ֣א אֲכַלְתֶּ֔ם וְ/יַ֥יִן וְ/שֵׁכָ֖ר לֹ֣א שְׁתִיתֶ֑ם לְמַ֨עַן֙ תֵּֽדְע֔וּ כִּ֛י אֲנִ֥י יְהוָ֖ה אֱלֹהֵי/כֶֽם׃
translation:
  text: You did not eat bread, and you did not drink wine or strong drink, so that you might know that I am Yahweh your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'intoxicating drink.' The Hebrew term refers broadly to fermented strong drink, not necessarily a specific beverage.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: The basic sense is 'bread,' and in wilderness-provision context it naturally contrasts with wine/strong drink. Although it can sometimes stand more broadly for food, the concrete 'bread' best matches the Hebrew and preserves the verse's wording.
- source_word: אֲכַלְתֶּם
  chosen: you did not eat
  alternatives:
  - you have not eaten
  lexicon: HALOT
  rationale: Rendered as simple past in idiomatic English narrative summary. The Hebrew perfect here recounts Israel's experience over the wilderness period.
- source_word: יַיִן
  chosen: wine
  lexicon: HALOT
  rationale: Standard lexical meaning; no contextual reason to broaden or paraphrase.
- source_word: שֵׁכָר
  chosen: strong drink
  alternatives:
  - beer
  - intoxicating drink
  lexicon: HALOT
  rationale: '''Strong drink'' is the established and accurate broad rendering for fermented intoxicants other than wine. ''Beer'' is too narrow; ''intoxicating drink'' is possible but less natural.'
- source_word: שְׁתִיתֶם
  chosen: you did not drink
  alternatives:
  - you have not drunk
  lexicon: HALOT
  rationale: Simple past fits the retrospective discourse and reads naturally in English.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the sake of
  lexicon: HALOT
  rationale: Marks purpose/result. 'So that' is clear modern English and preserves the clause's force without sounding wooden.
- source_word: תֵּדְעוּ
  chosen: you might know
  alternatives:
  - you may know
  lexicon: HALOT
  rationale: Following the purpose marker לְמַעַן, 'might know' expresses intended result in natural English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward possessive construction identifying covenant relationship; 'your God' is the plain sense.
