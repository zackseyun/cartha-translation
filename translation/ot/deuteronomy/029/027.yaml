id: DEU.29.27
reference: Deuteronomy 29:27
source:
  edition: WLC
  text: וַ/יִּתְּשֵׁ֤/ם יְהוָה֙ מֵ/עַ֣ל אַדְמָתָ֔/ם בְּ/אַ֥ף וּ/בְ/חֵמָ֖ה וּ/בְ/קֶ֣צֶף גָּד֑וֹל וַ/יַּשְׁלִכֵ֛/ם אֶל אֶ֥רֶץ אַחֶ֖רֶת כַּ/יּ֥וֹם הַ/זֶּֽה־׃
translation:
  text: So Yahweh uprooted them from their land in anger, fury, and great wrath, and cast them into another land, as it is this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'plucked them up' or 'tore them out' for 'uprooted them.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'as this day,' an idiom meaning 'as is evident today' or 'as it is this day.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּשֵׁם
  chosen: uprooted them
  alternatives:
  - plucked them up
  - tore them out
  lexicon: HALOT
  rationale: The verb נתשׁ commonly conveys pulling up or tearing out, especially with plants or people from land. 'Uprooted' preserves the forceful image and fits the land context better than a flatter 'removed.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מֵעַל אַדְמָתָם
  chosen: from their land
  alternatives:
  - from upon their soil
  - off their ground
  lexicon: HALOT
  rationale: אַדָמָה can mean ground/soil/land. In this covenant-exile context, 'land' is the most natural English and best reflects territorial dispossession.
- source_word: בְּאַף
  chosen: in anger
  alternatives:
  - in nose/anger
  - with anger
  lexicon: HALOT
  rationale: אַף literally refers to nose but idiomatically means anger. 'In anger' is idiomatic and preserves the causal/instrumental sense of the preposition.
- source_word: וּבְחֵמָה
  chosen: fury
  alternatives:
  - heat
  - rage
  lexicon: HALOT
  rationale: חֵמָה denotes burning wrath or fury. 'Fury' gives a strong but readable distinction from the surrounding wrath terms.
- source_word: וּבְקֶצֶף גָּדוֹל
  chosen: and great wrath
  alternatives:
  - and with great indignation
  - and with great anger
  lexicon: HALOT
  rationale: קֶצֶף often denotes wrath/indignation. 'Great wrath' preserves the adjective גָּדוֹל directly and maintains the escalating triad of divine anger terms.
- source_word: וַיַּשְׁלִכֵם
  chosen: and cast them
  alternatives:
  - and threw them
  - and hurled them
  lexicon: HALOT
  rationale: The verb שלך means throw/cast. 'Cast' is forceful yet dignified in English and suits judgment language.
- source_word: אֶל אֶרֶץ אַחֶרֶת
  chosen: into another land
  alternatives:
  - to another land
  - into a different land
  lexicon: HALOT
  rationale: The phrase indicates deportation/exile to foreign territory. 'Into another land' conveys movement into a new place more vividly than simple 'to.'
- source_word: כַּיּוֹם הַזֶּה
  chosen: as it is this day
  alternatives:
  - as on this day
  - as is the case today
  lexicon: HALOT
  rationale: This idiom points to the present, observable state resulting from the judgment. 'As it is this day' is clear modern English while staying close to the Hebrew formula.
