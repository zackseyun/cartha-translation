theological_decisions:
- issue: Scope of what is 'revealed' and its purpose
  chosen_reading: The verse contrasts matters reserved to God with covenantal revelation given to Israel for obedience, without specifying exhaustive categories of divine secrecy.
  alternative_readings:
  - A broader epistemological principle about all divine mysteries
  - A narrower statement only about the specific covenant curses/blessings in context
  rationale: The translation preserves the general contrast in the Hebrew while allowing the immediate Deuteronomic context to inform interpretation. It does not over-specify the content of 'the hidden things' or 'the revealed things' beyond what the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
