id: DEU.29.28
reference: Deuteronomy 29:28
source:
  edition: WLC
  text: הַ֨/נִּסְתָּרֹ֔ת לַ/יהוָ֖ה אֱלֹהֵ֑י/נוּ וְ/הַ/נִּגְלֹ֞ת לָ֤ׄ/נׄוּׄ וּׄ/לְׄ/בָׄנֵׄ֨יׄ/נׄוּׄ֙ עַד עוֹלָ֔ם לַ/עֲשׂ֕וֹת אֶת כָּל דִּבְרֵ֖י הַ/תּוֹרָ֥ה הַ/זֹּֽאת־־־׃ס
translation:
  text: The hidden things belong to Yahweh our God, but the revealed things belong to us and to our children forever, so that we may do all the words of this law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The secret things belong to the LORD our God, but the things revealed belong to us and to our children forever.'
    reason: lexical_alternative
  - marker: b
    text: '''This law'' may also be rendered ''this instruction''; in Deuteronomy the term refers to the covenantal teaching Moses sets before Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנִּסְתָּרֹת
  chosen: the hidden things
  alternatives:
  - the secret things
  - the concealed things
  lexicon: HALOT
  rationale: Passive participle from סתר used substantivally in the feminine plural. 'The hidden things' is natural English and preserves the sense of matters concealed from human knowledge. 'Secret things' is traditional and viable, but 'hidden' better reflects the participial idea without implying esoteric mysteries.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: 'The preposition marks possession/belonging: these things belong to YHWH. Per doctrine, יהוה is rendered ''the LORD'' rather than transliterated.'
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: 'Standard covenantal designation in construct with the divine name: ''the LORD our God.'''
- source_word: וְהַנִּגְלֹת
  chosen: but the revealed things
  alternatives:
  - and the revealed things
  - but the things revealed
  lexicon: HALOT
  rationale: Passive participle from גלה, parallel to 'the hidden things.' The conjunction is rendered adversatively as 'but' because the clause contrasts what belongs to God alone with what has been disclosed to Israel.
- source_word: לָנוּ
  chosen: belong to us
  alternatives:
  - are for us
  lexicon: HALOT
  rationale: Though the verb 'belong' is implied rather than repeated in Hebrew, English requires it for clarity. 'Belong to us' preserves the parallelism with the first clause.
- source_word: וּלְבָנֵינוּ
  chosen: and to our children
  alternatives:
  - and to our sons
  lexicon: HALOT
  rationale: בנים can mean sons specifically or children more broadly. In this covenantal context it refers to descendants generally, so 'children' best matches the representative sense.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for all time
  lexicon: HALOT
  rationale: Idiomatic expression for enduring perpetuity. 'Forever' is concise, natural modern English.
- source_word: לַעֲשׂוֹת
  chosen: so that we may do
  alternatives:
  - to do
  - for doing
  lexicon: HALOT
  rationale: 'The infinitive with ל expresses purpose/result here: the revealed things are given with a view to obedience. ''So that we may do'' makes the purpose explicit in idiomatic English.'
- source_word: אֵת כָּל דִּבְרֵי
  chosen: all the words of
  alternatives:
  - everything spoken in
  - all the matters of
  lexicon: HALOT
  rationale: דברי is literally 'words of.' Retaining 'words' preserves the textual emphasis on the specific covenant stipulations rather than paraphrasing more loosely.
- source_word: הַתּוֹרָה הַזֹּאת
  chosen: this law
  alternatives:
  - this instruction
  lexicon: HALOT
  rationale: תורה can mean 'instruction' broadly, but in Deuteronomy's covenantal-legal setting 'law' is the most contextually fitting and recognizable rendering. 'This law' refers to the covenantal teaching set before Israel.
