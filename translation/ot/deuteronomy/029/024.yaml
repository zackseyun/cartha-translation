id: DEU.29.24
reference: Deuteronomy 29:24
source:
  edition: WLC
  text: וְ/אָ֣מְר֔וּ עַ֚ל אֲשֶׁ֣ר עָֽזְב֔וּ אֶת בְּרִ֥ית יְהוָ֖ה אֱלֹהֵ֣י אֲבֹתָ֑/ם אֲשֶׁר֙ כָּרַ֣ת עִמָּ֔/ם בְּ/הוֹצִיא֥/וֹ אֹתָ֖/ם מֵ/אֶ֥רֶץ מִצְרָֽיִם־׃
translation:
  text: Then they will say, ‘Because they forsook the covenant of Yahweh, the God of their fathers, which he made with them when he brought them out of the land of Egypt.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the God of their fathers''; alternatively, ''their fathers’ God.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמְרוּ
  chosen: Then they will say
  alternatives:
  - And they will say
  - So they will say
  lexicon: HALOT
  rationale: Wayyiqtol/qatal sequence continues the narrative response of the nations in the surrounding context. 'Then' captures the discourse progression naturally in English, while 'will say' preserves the future sense in context.
- source_word: עַל אֲשֶׁר
  chosen: Because
  alternatives:
  - On account of which
  - For that
  lexicon: HALOT
  rationale: The preposition plus relative introduces the reason for the land's devastation. 'Because' is the most natural causal rendering in English.
- source_word: עָזְבוּ
  chosen: abandoned
  alternatives:
  - forsook
  - left
  lexicon: HALOT
  rationale: The verb denotes covenantal desertion, not mere departure. 'Abandoned' communicates deliberate covenant unfaithfulness in readable modern English; 'forsook' is possible but more archaic.
- source_word: בְּרִית
  chosen: covenant
  alternatives:
  - treaty
  - agreement
  lexicon: HALOT
  rationale: '''Covenant'' is the standard and theologically appropriate rendering for Israel''s binding relationship with God; alternatives flatten the biblical and theological weight.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי אֲבֹתָם
  chosen: the God of their fathers
  alternatives:
  - their fathers' God
  - the God of their ancestors
  lexicon: HALOT
  rationale: This construct chain identifies the covenant God in relation to the patriarchal line. 'The God of their fathers' is a clear, established rendering that preserves the source structure. 'Ancestors' is more inclusive in modern English but less gender-accurate to the Hebrew wording.
- source_word: אֲשֶׁר כָּרַת עִמָּם
  chosen: which he made with them
  alternatives:
  - which he cut with them
  - that he established with them
  lexicon: HALOT
  rationale: Hebrew idiom literally says 'cut a covenant.' English normally says 'make a covenant.' 'Made with them' preserves the covenantal sense without awkward literalism.
- source_word: בְּהוֹצִיאוֹ אֹתָם
  chosen: when he brought them out
  alternatives:
  - in his bringing them out
  - when he led them out
  lexicon: HALOT
  rationale: The infinitive construct with prefixed beth is temporal here. 'When he brought them out' is idiomatic and accurately expresses the timing of covenant making in relation to the exodus.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: out of the land of Egypt
  alternatives:
  - from the land of Egypt
  - out of Egypt
  lexicon: HALOT
  rationale: This preserves the full Hebrew phrase and its exodus resonance. 'Land of Egypt' is slightly more formal and contextually weighty than simply 'Egypt'.
