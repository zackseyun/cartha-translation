theological_decisions:
- issue: Rendering the covenant formula involving YHWH
  chosen_reading: Yahweh your God
  alternative_readings:
  - Yahweh your God
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether אָלָה should be rendered with explicit curse language in the main text
  chosen_reading: and into his oath
  alternative_readings:
  - and into his curse
  - and into the oath with its curses
  rationale: The term can include the sanction/curse dimension of a sworn oath. To preserve theological tension rather than over-resolve, the main text uses the broader 'oath' and a footnote preserves the curse nuance.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (preserve theological tension)
