id: DEU.29.11
reference: Deuteronomy 29:11
source:
  edition: WLC
  text: לְ/עָבְרְ/ךָ֗ בִּ/בְרִ֛ית יְהוָ֥ה אֱלֹהֶ֖י/ךָ וּ/בְ/אָלָת֑/וֹ אֲשֶׁר֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ כֹּרֵ֥ת עִמְּ/ךָ֖ הַ/יּֽוֹם׃
translation:
  text: so that you may enter into the covenant of Yahweh your God, and into his oath, which Yahweh your God is making with you today.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and into his oath-bound curse'; the Hebrew term can denote an oath that includes covenant sanctions or curses.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'is cutting with you today,' a Hebrew idiom for making a covenant.
    reason: cultural_note
lexical_decisions:
- source_word: לְעָבְרְךָ
  chosen: so that you may enter
  alternatives:
  - for you to pass into
  - that you may pass over into
  lexicon: HALOT
  rationale: The infinitive construct of עבר with prefixed ל expresses purpose/result in context, linked to the preceding assembly formula. In covenantal context with בְּרִית, the idiom means entering into covenant obligations, not literal movement. 'So that you may enter' gives clear modern English while preserving the purposive force.
- source_word: בִּבְרִית
  chosen: into the covenant
  alternatives:
  - in the covenant
  lexicon: HALOT
  rationale: Though the preposition is literally 'in/into,' English idiom with 'enter' normally takes 'into.' 'Covenant' is the standard rendering of בְּרִית and is theologically central here.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'The construct with second masculine singular suffix is straightforwardly possessive: ''your God.'''
- source_word: וּבְאָלָתוֹ
  chosen: and into his oath
  alternatives:
  - and into his curse
  - and into the oath-bound curse
  lexicon: HALOT
  rationale: אָלָה can denote an oath, often specifically an oath accompanied by sanctions or curse. Here, paired with covenant-making, 'oath' is the best main-text rendering for readability and flow, while the sanction nuance is significant enough to preserve in a footnote.
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  lexicon: HALOT
  rationale: A simple relative pronoun introducing the clause modifying 'covenant' and/or 'oath.' 'Which' reads naturally in this formal covenantal sentence.
- source_word: כֹּרֵת
  chosen: is making
  alternatives:
  - is cutting
  - cuts
  - is establishing
  lexicon: HALOT
  rationale: The Hebrew idiom כרת ברית is literally 'cut a covenant.' In English, 'make a covenant' is the natural equivalent. Present progressive fits the participial form in this immediate ceremonial context. The more literal 'cutting' is not used in the main text because it is opaque in modern English.
- source_word: עִמְּךָ
  chosen: with you
  lexicon: HALOT
  rationale: Standard rendering of עם with second masculine singular suffix.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: '''Today'' is the natural modern English equivalent; ''this day'' is more formal but less idiomatic.'
