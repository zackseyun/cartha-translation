id: DEU.29.23
reference: Deuteronomy 29:23
source:
  edition: WLC
  text: וְ/אָֽמְרוּ֙ כָּל הַ/גּוֹיִ֔ם עַל מֶ֨ה עָשָׂ֧ה יְהוָ֛ה כָּ֖כָה לָ/אָ֣רֶץ הַ/זֹּ֑את מֶ֥ה חֳרִ֛י הָ/אַ֥ף הַ/גָּד֖וֹל הַ/זֶּֽה־־׃
translation:
  text: And all the nations will say, ‘Why has Yahweh done thus to this land? Why this great burning anger?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “Why has the LORD done so to this land? Why this great fierceness of anger?”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמְרוּ
  chosen: And ... will say
  alternatives:
  - and they said
  - then ... will say
  lexicon: HALOT
  rationale: 'Qal perfect with prefixed conjunction in this predictive/covenantal context is naturally rendered as future in English: the nations'' response to the land''s devastation. The conjunction is retained as discourse linkage with ''And.'''
- source_word: כָּל הַגּוֹיִם
  chosen: all the nations
  alternatives:
  - all the peoples
  - every nation
  lexicon: HALOT
  rationale: גּוֹיִם commonly means 'nations' in Deuteronomy, especially foreign peoples observing Israel's fate. 'All the nations' preserves the collective scope and standard geopolitical sense.
- source_word: עַל מֶה
  chosen: Why
  alternatives:
  - For what reason
  - On account of what
  lexicon: HALOT
  rationale: The idiom עַל מֶה introduces a question of cause. 'Why' is the most natural modern English equivalent without loss of meaning.
- source_word: עָשָׂה יְהוָה כָּכָה
  chosen: has the LORD done thus
  alternatives:
  - did the LORD do this way
  - has the LORD done this
  lexicon: HALOT
  rationale: עָשָׂה with כָּכָה means 'do thus/so.' 'Has ... done thus' preserves the formal force of the Hebrew while remaining readable. The subject יְהוָה is rendered per doctrine as 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לָאָרֶץ הַזֹּאת
  chosen: to this land
  alternatives:
  - to this הארץ
  - to this country
  lexicon: HALOT
  rationale: אָרֶץ here refers specifically to the covenant land under judgment. 'Land' is the most contextually appropriate and biblically resonant rendering; the preposition ל is naturally expressed with 'to' after 'done.'
- source_word: מֶה חֳרִי הָאַף
  chosen: Why this ... anger
  alternatives:
  - What is the heat of anger
  - Why the fierceness of anger
  lexicon: HALOT
  rationale: 'The second מֶה again functions idiomatically as an exclamation/question of cause: ''Why this ...?'' חֳרִי literally denotes burning/heat, and אַף in this idiom means anger/wrath. Rendering the phrase as ''Why this ... anger?'' preserves both the interrogative force and the metaphor.'
- source_word: חֳרִי
  chosen: burning
  alternatives:
  - fierce
  - heat of
  lexicon: HALOT
  rationale: חֳרִי derives from a root associated with burning/heat. 'Burning' keeps the vivid metaphor alive better than the more interpretive 'fierce.'
- source_word: הָאַף הַגָּדוֹל הַזֶּה
  chosen: great ... anger
  alternatives:
  - this great wrath
  - this great nose/anger
  lexicon: HALOT
  rationale: 'אַף literally ''nose'' commonly means ''anger'' idiomatically in Hebrew; ''anger'' is required in English. גָּדוֹל and הַזֶּה together intensify and specify the judgment: ''this great ...'' In idiomatic English, ''this great burning anger'' is smoother than a more wooden sequence.'
