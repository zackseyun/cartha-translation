id: DEU.29.17
reference: Deuteronomy 29:17
source:
  edition: WLC
  text: פֶּן יֵ֣שׁ בָּ֠/כֶם אִ֣ישׁ אוֹ אִשָּׁ֞ה א֧וֹ מִשְׁפָּחָ֣ה אוֹ שֵׁ֗בֶט אֲשֶׁר֩ לְבָב֨/וֹ פֹנֶ֤ה הַ/יּוֹם֙ מֵ/עִם֙ יְהוָ֣ה אֱלֹהֵ֔י/נוּ לָ/לֶ֣כֶת לַ/עֲבֹ֔ד אֶת אֱלֹהֵ֖י הַ/גּוֹיִ֣ם הָ/הֵ֑ם פֶּן יֵ֣שׁ בָּ/כֶ֗ם שֹׁ֛רֶשׁ פֹּרֶ֥ה רֹ֖אשׁ וְ/לַעֲנָֽה־־־־־׃
translation:
  text: lest there be among you a man or a woman, or a clan or a tribe, whose heart turns away today from Yahweh our God to go and serve the gods of those nations; lest there be among you a root bearing poison and wormwood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a root producing gall and wormwood.' The Hebrew רֹאשׁ can be rendered more traditionally as 'gall,' but here it likely refers broadly to poisonous produce.
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  chosen: lest
  alternatives:
  - so that not
  - otherwise
  lexicon: HALOT
  rationale: Introduces a warning against a possible danger. 'Lest' best preserves the formal cautionary force in readable English.
- source_word: יֵשׁ בָּכֶם
  chosen: there be among you
  alternatives:
  - there is among you
  - there may be among you
  lexicon: HALOT
  rationale: Existential construction with a warning particle; English subjunctive-like 'there be' fits the cautionary sense after 'lest'.
- source_word: אִישׁ אוֹ אִשָּׁה
  chosen: a man or a woman
  alternatives:
  - any man or woman
  - a person, man or woman
  lexicon: HALOT
  rationale: Gender-accurate rendering preserves the explicit male/female pair in the Hebrew rather than collapsing to a generic 'person'.
- source_word: מִשְׁפָּחָה
  chosen: clan
  alternatives:
  - family
  lexicon: HALOT
  rationale: In this covenantal-social context, the term denotes a kinship group larger than a household; 'clan' better matches the social unit than modern 'family'.
- source_word: שֵׁבֶט
  chosen: tribe
  alternatives:
  - branch
  - staff
  lexicon: HALOT
  rationale: Here it clearly refers to a tribal unit within Israel, not the literal object or metaphorical branch.
- source_word: לְבָבוֹ פֹנֶה
  chosen: whose heart is turning away
  alternatives:
  - whose heart turns away
  - whose heart is turning aside
  lexicon: HALOT
  rationale: The participle conveys an ongoing or incipient turning. 'Turning away' captures both motion and apostasy.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Standard temporal adverb; 'today' is natural modern English while preserving the covenantal immediacy.
- source_word: מֵעִם יְהוָה אֱלֹהֵינוּ
  chosen: from the LORD our God
  alternatives:
  - away from the LORD our God
  - from being with the LORD our God
  lexicon: HALOT
  rationale: The preposition marks departure from covenant allegiance. 'From the LORD our God' is concise, with the turning-away sense already carried by the verb.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: לָלֶכֶת לַעֲבֹד
  chosen: to go and serve
  alternatives:
  - to go to serve
  - to walk to serve
  lexicon: HALOT
  rationale: Hebrew idiom of movement plus infinitive of purpose; 'to go and serve' is idiomatic English without losing the purposive sense.
- source_word: אֱלֹהֵי הַגּוֹיִם הָהֵם
  chosen: the gods of those nations
  alternatives:
  - the gods of those peoples
  - the gods of those Gentiles
  lexicon: HALOT
  rationale: '''Nations'' is the most straightforward rendering of גוים here, referring to surrounding peoples and their deities.'
- source_word: שֹׁרֶשׁ
  chosen: a root
  alternatives:
  - root
  lexicon: HALOT
  rationale: Metaphor for a hidden source of future corruption; the indefinite article suits English style.
- source_word: פֹּרֶה
  chosen: bearing
  alternatives:
  - producing
  - fruitful with
  lexicon: HALOT
  rationale: Participial form describes what the root yields. 'Bearing' works naturally with the agricultural metaphor.
- source_word: רֹאשׁ
  chosen: poisonous fruit
  alternatives:
  - poison
  - gall
  lexicon: HALOT
  rationale: The Hebrew term likely denotes a poisonous plant/substance rather than the anatomical 'head.' In this collocation with wormwood, an English rendering that communicates toxic produce is clearer than the traditional but opaque 'gall'.
- source_word: לַעֲנָה
  chosen: wormwood
  alternatives:
  - bitterness
  lexicon: HALOT
  rationale: Common biblical plant metaphor for bitterness and toxicity. 'Wormwood' is established and still understandable in English.
