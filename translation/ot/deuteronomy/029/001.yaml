id: DEU.29.1
reference: Deuteronomy 29:1
source:
  edition: WLC
  text: וַ/יִּקְרָ֥א מֹשֶׁ֛ה אֶל כָּל יִשְׂרָאֵ֖ל וַ/יֹּ֣אמֶר אֲלֵ/הֶ֑ם אַתֶּ֣ם רְאִיתֶ֗ם אֵ֣ת כָּל אֲשֶׁר֩ עָשָׂ֨ה יְהוָ֤ה לְ/עֵֽינֵי/כֶם֙ בְּ/אֶ֣רֶץ מִצְרַ֔יִם לְ/פַרְעֹ֥ה וּ/לְ/כָל עֲבָדָ֖י/ו וּ/לְ/כָל אַרְצֽ/וֹ־־־־־׃
translation:
  text: And Moses called all Israel and said to them, “You have seen all that Yahweh did before your eyes in the land of Egypt, to Pharaoh and to all his servants and to all his land.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “against Pharaoh and against all his servants and against all his land.” The Hebrew preposition can be rendered more interpretively in context to show that the LORD’s acts in Egypt were acts of judgment upon them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - summoned
  lexicon: HALOT
  rationale: The verb קרא in this narrative context means to call or summon an assembly. 'Called' is natural modern English and preserves the straightforward narrative force without overstating formality.
- source_word: כָּל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - the whole of Israel
  lexicon: HALOT
  rationale: A collective designation for the covenant people. 'All Israel' is the standard concise rendering and fits the assembly context.
- source_word: רְאִיתֶם
  chosen: you have seen
  alternatives:
  - you saw
  lexicon: HALOT
  rationale: The perfect here refers to the audience's witnessed experience with present relevance. 'You have seen' preserves that force better than the simple past, while remaining idiomatic.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְעֵינֵיכֶם
  chosen: before your eyes
  alternatives:
  - in your sight
  lexicon: HALOT
  rationale: The idiom emphasizes direct public visibility. 'Before your eyes' is a natural English equivalent that preserves the vividness of the Hebrew expression.
- source_word: בְּאֶרֶץ מִצְרַיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'land,' and retaining it preserves the formal scope of the setting without sounding unnatural.
- source_word: לְפַרְעֹה וּלְכָל עֲבָדָיו וּלְכָל אַרְצוֹ
  chosen: to Pharaoh and to all his servants and to all his land
  alternatives:
  - against Pharaoh and against all his servants and against all his land
  - to Pharaoh, all his servants, and all his land
  lexicon: HALOT
  rationale: The repeated ל marks the objects affected by what the LORD did in Egypt. 'To' is a formally close rendering and leaves the nature of the action to the broader context rather than importing an interpretive gloss like 'against,' though that is a plausible contextual sense.
