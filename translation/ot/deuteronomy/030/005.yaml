id: DEU.30.5
reference: Deuteronomy 30:5
source:
  edition: WLC
  text: וֶ/הֱבִֽיאֲ/ךָ֞ יְהוָ֣ה אֱלֹהֶ֗י/ךָ אֶל הָ/אָ֛רֶץ אֲשֶׁר יָרְשׁ֥וּ אֲבֹתֶ֖י/ךָ
    וִֽ/ירִשְׁתָּ֑/הּ וְ/הֵיטִֽבְ/ךָ֥ וְ/הִרְבְּ/ךָ֖ מֵ/אֲבֹתֶֽי/ךָ־־׃
translation:
  text: And the LORD your God will bring you into the land that your fathers possessed,
    and you will possess it; and he will prosper you and multiply you more than your
    fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that your fathers inherited' / 'that your fathers took possession of.'
      The Hebrew verb can carry both inheritance and possession nuances.
    reason: lexical_alternative
  - marker: b
    text: Or 'he will do you good.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וֶהֱבִיאֲךָ
  chosen: will bring you
  alternatives:
  - will bring you back
  - will cause you to enter
  lexicon: HALOT
  rationale: Hiphil of בוא with 2ms suffix means 'cause/bring you in.' 'Will bring
    you' is natural English and fits the restoration context without adding 'back,'
    which is contextually implied from surrounding verses but not explicit in this
    verb alone.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name, render YHWH as 'the LORD' rather
    than transliteration.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Construct with 2ms suffix straightforwardly means 'your God'; paired
    with YHWH as covenantal identification.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ/country
  lexicon: HALOT
  rationale: In Deuteronomy this commonly refers to the promised land. 'Land' preserves
    the covenantal-geographic sense better than 'country'.
- source_word: אֲשֶׁר יָרְשׁוּ אֲבֹתֶיךָ
  chosen: that your fathers possessed
  alternatives:
  - that your fathers inherited
  - that your fathers took possession of
  lexicon: HALOT
  rationale: ירשׁ can mean inherit/possess/dispossess depending on context. Here the
    object is the land already held by the ancestors, so 'possessed' is the clearest
    idiomatic choice. 'Inherited' is possible but can sound overly passive in English.
- source_word: אֲבֹתֶיךָ
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural 'fathers.' Following gender-accurate
    policy, the main text keeps 'fathers' rather than neutralizing to 'ancestors,'
    though the referent is the forefathers of Israel.
- source_word: וִירִשְׁתָּהּ
  chosen: and you will possess it
  alternatives:
  - and you will inherit it
  - and you will take possession of it
  lexicon: HALOT
  rationale: Qal of ירשׁ with land as object often means to possess/take possession.
    'Possess it' keeps verbal linkage with the previous clause and is concise. 'Inherit
    it' is possible but may underplay the active covenantal occupation sense.
- source_word: וְהֵיטִבְךָ
  chosen: and he will prosper you
  alternatives:
  - and he will do you good
  - and he will make it good for you
  lexicon: HALOT
  rationale: Hiphil of יטב with pronominal suffix means 'do good to' someone. 'Prosper
    you' captures the benefactive sense in this restoration-and-blessing context,
    though the more literal 'do you good' remains a viable alternative.
- source_word: וְהִרְבְּךָ
  chosen: and multiply you
  alternatives:
  - and make you numerous
  - and increase you
  lexicon: HALOT
  rationale: Hiphil of רבה with object suffix means to make numerous/increase. 'Multiply
    you' preserves covenantal resonance with patriarchal blessing language.
- source_word: מֵאֲבֹתֶיךָ
  chosen: more than your fathers
  alternatives:
  - beyond your fathers
  - more than your ancestors
  lexicon: HALOT
  rationale: Comparative מן here indicates exceeding the fathers in blessing/numbers.
    'More than your fathers' is direct and preserves the explicit masculine term.
