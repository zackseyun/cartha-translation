id: DEU.30.2
reference: Deuteronomy 30:2
source:
  edition: WLC
  text: וְ/שַׁבְתָּ֞ עַד יְהוָ֤ה אֱלֹהֶ֨י/ךָ֙ וְ/שָׁמַעְתָּ֣ בְ/קֹל֔/וֹ כְּ/כֹ֛ל אֲשֶׁר אָנֹכִ֥י מְצַוְּ/ךָ֖ הַ/יּ֑וֹם אַתָּ֣ה וּ/בָנֶ֔י/ךָ בְּ/כָל לְבָבְ/ךָ֖ וּ/בְ/כָל נַפְשֶֽׁ/ךָ־־־־׃
translation:
  text: and you return to Yahweh your God and obey his voice, according to all that I am commanding you today, you and your children, with all your heart and with all your soul,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and listen to his voice.' The Hebrew idiom often carries the stronger sense 'obey.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your sons'; here rendered 'your children' because the term can function generically for offspring in this covenant context.
    reason: lexical_alternative
  - marker: c
    text: Or 'with all your life' or 'with all your whole being' for 'with all your soul.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׁבְתָּ
  chosen: and you return
  alternatives:
  - and you turn back
  - and you repent
  lexicon: HALOT
  rationale: שׁוּב commonly means 'return/turn back.' In covenant context it can imply repentance, but 'return' preserves the concrete Hebrew wording without importing a narrower theological term not explicitly used.
- source_word: עַד
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: With שׁוּב and a personal object, עַד marks movement toward or return to someone. English 'to' is the most natural rendering; 'unto' is overly archaic.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'The construct with second masculine singular suffix is straightforwardly possessive: ''your God.'''
- source_word: וְשָׁמַעְתָּ בְקֹלוֹ
  chosen: and obey his voice
  alternatives:
  - and listen to his voice
  - and hear his voice
  lexicon: HALOT
  rationale: שׁמע with בְּקוֹל often carries the sense of heeding or obeying, not mere auditory hearing. 'Obey his voice' preserves both the idiom's force and the Hebrew imagery better than the flatter 'obey him.'
- source_word: כְּכֹל אֲשֶׁר
  chosen: according to all that
  alternatives:
  - in accordance with all that
  - just as all that
  lexicon: HALOT
  rationale: This phrase expresses conformity to the full scope of the command. 'According to all that' is clear and reasonably formal.
- source_word: אָנֹכִי מְצַוְּךָ הַיּוֹם
  chosen: I am commanding you today
  alternatives:
  - I command you today
  - I am commanding you this day
  lexicon: HALOT
  rationale: The participle מְצַוֶּה can be rendered as a present progressive in English. 'Today' is more natural modern English than 'this day' while preserving temporal force.
- source_word: אַתָּה וּבָנֶיךָ
  chosen: you and your children
  alternatives:
  - you and your sons
  lexicon: HALOT
  rationale: Although בנים can literally mean 'sons,' in many covenantal/familial contexts it functions generically for offspring/children. 'Children' best reflects likely representative force here without unnecessary narrowing.
- source_word: בְּכָל לְבָבְךָ
  chosen: with all your heart
  lexicon: HALOT
  rationale: Standard idiomatic rendering. In Hebrew anthropology, 'heart' includes will and inner person; the familiar English phrase adequately carries this.
- source_word: וּבְכָל נַפְשֶׁךָ
  chosen: and with all your soul
  alternatives:
  - and with all your life
  - and with all your whole being
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote soul, life, self, or whole being. 'Soul' preserves the traditional pairing with 'heart' and remains understandable; alternatives are possible but less textually anchored in this formulaic covenant expression.
