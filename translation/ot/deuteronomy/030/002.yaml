- issue: Rendering of the covenant name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Scope of בָנֶיךָ
  chosen_reading: your children
  alternative_readings:
  - your sons
  rationale: The Hebrew masculine plural can function generically for offspring. Rendering it as 'children' reflects likely representative force without making an unnecessary male-only claim, consistent with gender-accurate translation philosophy.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
