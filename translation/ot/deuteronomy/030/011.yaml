id: DEU.30.11
reference: Deuteronomy 30:11
source:
  edition: WLC
  text: כִּ֚י הַ/מִּצְוָ֣ה הַ/זֹּ֔את אֲשֶׁ֛ר אָנֹכִ֥י מְצַוְּ/ךָ֖ הַ/יּ֑וֹם לֹֽא נִפְלֵ֥את
    הִוא֙ מִמְּ/ךָ֔ וְ/לֹ֥א רְחֹקָ֖ה הִֽוא־׃
translation:
  text: For this commandment that I am commanding you today is not too difficult for
    you, nor is it far away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is not beyond you' or 'is not hidden from you.' The Hebrew verb can
      carry the sense of being extraordinary, inaccessible, or beyond one's grasp.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Introduces an explanation of the preceding exhortation. 'For' fits the
    discourse flow naturally in English.
- source_word: הַמִּצְוָה הַזֹּאת
  chosen: this commandment
  alternatives:
  - this command
  - this instruction
  lexicon: HALOT
  rationale: מִצְוָה commonly means 'commandment' or 'command.' 'Commandment' preserves
    the covenantal/legal register appropriate to Deuteronomy.
- source_word: אֲשֶׁר אָנֹכִי מְצַוְּךָ הַיּוֹם
  chosen: that I am commanding you today
  alternatives:
  - that I command you today
  - which I am commanding you today
  lexicon: HALOT
  rationale: The participle מְצַוֶּה with the temporal marker 'today' is well represented
    by the English progressive 'am commanding,' though simple present would also be
    possible. This keeps the immediacy of Moses' address.
- source_word: לֹא נִפְלֵאת הִוא מִמְּךָ
  chosen: is not too difficult for you
  alternatives:
  - is not hidden from you
  - is not beyond you
  - is not extraordinary for you
  lexicon: HALOT
  rationale: The verb פלא can denote something extraordinary, inaccessible, or beyond
    one's grasp. In this context, paired with 'nor is it far away' and followed by
    vv. 12–14, the sense is practical accessibility rather than concealment alone.
    'Not too difficult for you' communicates that the command is not beyond the hearer's
    capacity to apprehend and obey.
- source_word: וְלֹא רְחֹקָה הִוא
  chosen: nor is it far away
  alternatives:
  - and it is not distant
  - nor is it remote
  lexicon: HALOT
  rationale: רָחוֹק denotes spatial or metaphorical distance. 'Far away' is idiomatic
    and preserves the metaphor of accessibility developed in the following verses.
