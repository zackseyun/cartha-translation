id: DEU.30.4
reference: Deuteronomy 30:4
source:
  edition: WLC
  text: אִם יִהְיֶ֥ה נִֽדַּחֲ/ךָ֖ בִּ/קְצֵ֣ה הַ/שָּׁמָ֑יִם מִ/שָּׁ֗ם יְקַבֶּצְ/ךָ֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ וּ/מִ/שָּׁ֖ם יִקָּחֶֽ/ךָ־׃
translation:
  text: If your outcasts are at the end of the heavens, from there Yahweh your God will gather you, and from there he will take you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your banished ones' or 'your dispersed ones.' The Hebrew refers to those driven away or scattered.
    reason: lexical_alternative
  - marker: b
    text: '''At the end of the heavens'' is a Hebrew idiom for the farthest possible place.'
    reason: cultural_note
  - marker: c
    text: Or 'he will bring you.' The Hebrew verb is more literally 'he will take you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - Even if
  lexicon: HALOT
  rationale: Introduces a conditional clause. 'If' is the straightforward rendering; 'even if' is a possible contextual expansion but is not required by the Hebrew.
- source_word: יִהְיֶה
  chosen: are
  alternatives:
  - will be
  lexicon: HALOT
  rationale: Though formally singular ('will be'), it functions idiomatically with the following nominal form and 2ms suffix to describe the addressee's dispersed people. English reads more naturally with 'are' in this conditional setting.
- source_word: נִדַּחֲךָ
  chosen: your outcasts
  alternatives:
  - your banished ones
  - your dispersed ones
  lexicon: HALOT
  rationale: From נדח, referring to those driven away or scattered. 'Your outcasts' preserves the passive/resultative sense without overinterpreting the mechanism. The 2ms suffix is rendered corporately, addressing Israel as a singular people.
- source_word: בִּקְצֵה הַשָּׁמָיִם
  chosen: at the end of the heavens
  alternatives:
  - at the farthest end of the heavens
  - at the end of the sky
  lexicon: HALOT
  rationale: A spatial idiom for the most remote possible location. 'Heavens' is preferred over 'sky' because שָׁמַיִם regularly bears the broader biblical sense and matches the elevated register of the passage.
- source_word: מִשָּׁם
  chosen: from there
  lexicon: HALOT
  rationale: Simple adverbial phrase indicating the point from which restoration occurs; repeated for emphasis in the Hebrew and retained in English.
- source_word: יְקַבֶּצְךָ
  chosen: will gather you
  alternatives:
  - will gather you back
  lexicon: HALOT
  rationale: Piel of קבץ, 'gather, collect.' 'Will gather you' is sufficient and avoids adding 'back,' which is implied by context but not explicit in the verb itself.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'Standard covenantal designation attached appositionally to the divine name: ''the LORD your God.'''
- source_word: וּמִשָּׁם יִקָּחֶךָ
  chosen: and from there he will take you
  alternatives:
  - and from there he will bring you
  - and from there he will fetch you
  lexicon: HALOT
  rationale: לקח is broadly 'take.' 'Take you' preserves the lexical force and leaves the nuance to context. 'Bring you' would anticipate the next verse's movement language more explicitly than this verse states.
