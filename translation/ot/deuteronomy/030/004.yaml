theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Corporate singular address to Israel
  chosen_reading: Second-person singular rendered as 'you/your' with collective force
  alternative_readings:
  - Explicit plural expansion such as 'your exiles' or 'your people who were banished'
  rationale: The Hebrew addresses Israel in the singular while referring to the nation's scattered members. Preserving 'you/your' maintains the covenantal singular address without flattening the collective sense.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5'
