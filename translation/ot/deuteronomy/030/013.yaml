id: DEU.30.13
reference: Deuteronomy 30:13
source:
  edition: WLC
  text: וְ/לֹֽא מֵ/עֵ֥בֶר לַ/יָּ֖ם הִ֑וא לֵ/אמֹ֗ר מִ֣י יַעֲבָר לָ֜/נוּ אֶל עֵ֤בֶר
    הַ/יָּם֙ וְ/יִקָּחֶ֣/הָ לָּ֔/נוּ וְ/יַשְׁמִעֵ֥/נוּ אֹתָ֖/הּ וְ/נַעֲשֶֽׂ/נָּה־־־׃
translation:
  text: And it is not beyond the sea, that you should say, ‘Who will cross over the
    sea for us and get it for us and make us hear it, so that we may do it?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'across the sea' / 'on the other side of the sea.'
    reason: lexical_alternative
  - marker: b
    text: Or 'bring it to us' for 'get it for us'; the Hebrew verb literally means
      'take,' but in context it implies obtaining and bringing within reach.
    reason: lexical_alternative
  - marker: c
    text: Literally 'make us hear it,' a causative expression meaning to cause someone
      to hear, that is, to declare or explain it to them.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵעֵבֶר לַיָּם
  chosen: beyond the sea
  alternatives:
  - across the sea
  - on the other side of the sea
  lexicon: HALOT
  rationale: The idiom denotes location on the far side of the sea. 'Beyond the sea'
    is concise and natural in English while preserving the spatial metaphor.
- source_word: הִוא
  chosen: it is
  alternatives:
  - it
  lexicon: HALOT
  rationale: 'The feminine pronoun refers back to the commandment/word in the surrounding
    context. Rendering with an explicit English copula produces clear, idiomatic sense:
    ''it is not beyond the sea.'''
- source_word: לֵאמֹר
  chosen: that you should say
  alternatives:
  - saying
  - for saying
  lexicon: HALOT
  rationale: Introduces the content of a hypothetical objection. 'That you should
    say' fits the rhetorical construction in English better than a bare participial
    'saying.'
- source_word: יַעֲבָר לָנוּ
  chosen: will cross over ... for us
  alternatives:
  - would cross over ... for us
  - will go over ... for us
  lexicon: HALOT
  rationale: The imperfect in this rhetorical question is well represented by English
    future. 'Cross over' preserves the verbal link with עֵבֶר and the movement implied.
- source_word: אֶל עֵבֶר הַיָּם
  chosen: the sea
  alternatives:
  - to the other side of the sea
  lexicon: HALOT
  rationale: Because English normally says 'cross over the sea' rather than 'cross
    over to the other side of the sea,' the destination phrase is absorbed into idiomatic
    English without loss of meaning.
- source_word: וְיִקָּחֶהָ לָּנוּ
  chosen: and get it for us
  alternatives:
  - and bring it to us
  - and take it for us
  lexicon: HALOT
  rationale: In context the sense is obtaining and bringing the command/word within
    reach. 'Get it for us' is natural modern English and captures the practical force
    better than the more wooden 'take it for us.'
- source_word: וְיַשְׁמִעֵנוּ אֹתָהּ
  chosen: and make us hear it
  alternatives:
  - and proclaim it to us
  - and let us hear it
  lexicon: HALOT
  rationale: The Hiphil of שׁמע is causative. 'Make us hear it' preserves that causative
    nuance more directly than 'proclaim it,' though the latter is interpretive.
- source_word: וְנַעֲשֶׂנָּה
  chosen: so that we may do it
  alternatives:
  - that we may do it
  - and do it
  lexicon: HALOT
  rationale: 'Expresses purpose/result following the hearing: hearing leads to obedience.
    ''So that we may do it'' makes the relationship clear in idiomatic English.'
