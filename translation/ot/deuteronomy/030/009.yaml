id: DEU.30.9
reference: Deuteronomy 30:9
source:
  edition: WLC
  text: וְ/הוֹתִֽירְ/ךָ֩ יְהוָ֨ה אֱלֹהֶ֜י/ךָ בְּ/כֹ֣ל מַעֲשֵׂ֣ה יָדֶ֗/ךָ בִּ/פְרִ֨י
    בִטְנְ/ךָ֜ וּ/בִ/פְרִ֧י בְהֶמְתְּ/ךָ֛ וּ/בִ/פְרִ֥י אַדְמָתְ/ךָ֖ לְ/טוֹבָ֑ה כִּ֣י
    יָשׁ֣וּב יְהוָ֗ה לָ/שׂ֤וּשׂ עָלֶ֨י/ךָ֙ לְ/ט֔וֹב כַּ/אֲשֶׁר שָׂ֖שׂ עַל אֲבֹתֶֽי/ךָ׀׀־־׃
translation:
  text: And the LORD your God will make you abound in all the work of your hand, in
    the fruit of your womb, in the fruit of your livestock, and in the fruit of your
    ground, for good; for the LORD will again rejoice over you for good, just as he
    rejoiced over your fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will give you plenty' / 'will prosper you'; the Hebrew verb carries
      the sense of causing abundance or surplus.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your fathers'; that is, the forefathers or ancestors of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹתִירְךָ
  chosen: will make you abound
  alternatives:
  - will give you plenty
  - will prosper you
  - will make you have in excess
  lexicon: HALOT
  rationale: The Hiphil of יתר here conveys causing someone to have abundance or surplus.
    'Make you abound' preserves the causative force and the sense of plentiful increase
    without sounding overly wooden. 'Prosper you' is possible but can sound broader
    and less tied to the concrete list that follows.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name יְהוָה is rendered 'the LORD' rather
    than transliterated.
- source_word: בְּכֹל מַעֲשֵׂה יָדֶךָ
  chosen: in all the work of your hand
  alternatives:
  - in all the work of your hands
  - in all your undertakings
  - in everything you do
  lexicon: HALOT
  rationale: This idiom refers to one's labor or undertakings. 'The work of your hand'
    keeps the Hebrew singular and idiomatic concreteness while remaining understandable
    in English. 'Everything you do' is smoother but less formally tied to the source.
- source_word: בִּפְרִי בִטְנְךָ
  chosen: in the fruit of your womb
  alternatives:
  - in your offspring
  - in the produce of your body
  lexicon: HALOT
  rationale: A standard Hebrew idiom for children/offspring. 'Fruit of your womb'
    preserves the metaphor and covenantal resonance found in similar blessing formulas.
- source_word: בְהֶמְתְּךָ
  chosen: your livestock
  alternatives:
  - your cattle
  - your animals
  lexicon: HALOT
  rationale: בְּהֵמָה in this context refers broadly to domesticated animals. 'Livestock'
    is the most natural modern equivalent and fits the agricultural blessing context
    better than the narrower 'cattle'.
- source_word: אַדְמָתְךָ
  chosen: your ground
  alternatives:
  - your land
  - your soil
  lexicon: HALOT
  rationale: אֲדָמָה here points to arable ground/soil producing crops. 'Ground' preserves
    the agricultural concreteness and pairs naturally with 'fruit.' 'Land' could sound
    broader and more territorial.
- source_word: לְטוֹבָה
  chosen: for good
  alternatives:
  - for your good
  - for prosperity
  - for blessing
  lexicon: HALOT
  rationale: The phrase marks beneficial result. 'For good' is concise and close to
    the Hebrew; adding 'your' is interpretive though implied by context.
- source_word: יָשׁוּב
  chosen: will again
  alternatives:
  - will return
  - will turn back
  lexicon: HALOT
  rationale: 'The verb literally means ''return,'' but with the following infinitive
    it idiomatically signals renewed action: the LORD will once more rejoice. ''Will
    again'' expresses the sense clearly in English while avoiding awkwardness.'
- source_word: לָשׂוּשׂ עָלֶיךָ
  chosen: rejoice over you
  alternatives:
  - take delight in you
  - exult over you
  lexicon: HALOT
  rationale: שׂוּשׂ denotes rejoicing or exulting. 'Rejoice over you' is a direct
    and natural rendering that preserves the personal, covenantal affection of the
    expression.
- source_word: כַּאֲשֶׁר שָׂשׂ עַל אֲבֹתֶיךָ
  chosen: just as he rejoiced over your fathers
  alternatives:
  - as he rejoiced over your ancestors
  lexicon: HALOT
  rationale: אָבוֹת literally means 'fathers' and in context refers to the forefathers/ancestors
    of Israel. Per gender-accurate philosophy, 'fathers' is retained because the Hebrew
    is explicitly masculine and points to the patriarchal line.
