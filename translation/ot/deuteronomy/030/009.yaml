theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Following the doctrine's
    contested-terms table, it is rendered 'the LORD' rather than transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered term אֲבֹתֶיךָ
  chosen_reading: your fathers
  alternative_readings:
  - your ancestors
  rationale: The Hebrew is grammatically and referentially masculine, likely evoking
    the patriarchs and prior generations. In keeping with the gender-accurate policy,
    the masculine form is preserved in the main text, while the broader English alternative
    is noted as possible.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
