id: DEU.30.12
reference: Deuteronomy 30:12
source:
  edition: WLC
  text: לֹ֥א בַ/שָּׁמַ֖יִם הִ֑וא לֵ/אמֹ֗ר מִ֣י יַעֲלֶה לָּ֤/נוּ הַ/שָּׁמַ֨יְמָ/ה֙
    וְ/יִקָּחֶ֣/הָ לָּ֔/נוּ וְ/יַשְׁמִעֵ֥/נוּ אֹתָ֖/הּ וְ/נַעֲשֶֽׂ/נָּה־׃
translation:
  text: It is not in heaven, that you should say, ‘Who will go up for us to heaven
    and get it for us and make us hear it, so that we may do it?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Who will ascend for us to heaven and take it for us and cause us to
      hear it, that we may do it?'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַשָּׁמַיִם
  chosen: in heaven
  alternatives:
  - in the heavens
  - in the sky
  lexicon: HALOT
  rationale: The phrase denotes the inaccessible heavenly realm in contrast to what
    is near and attainable in the surrounding context. 'In heaven' is idiomatic English
    and preserves the singular sense commonly used in English for the divine/heavenly
    sphere, though Hebrew is morphologically plural.
- source_word: הִוא
  chosen: it is
  alternatives:
  - she is
  - this is
  lexicon: HALOT
  rationale: The pronoun is feminine singular, referring back to the commandment/word
    in the context. English uses 'it' naturally for the referent.
- source_word: לֵאמֹר
  chosen: that you should say
  alternatives:
  - saying
  - so as to say
  lexicon: HALOT
  rationale: Introduces the content of a hypothetical objection. 'That you should
    say' fits the English syntax after 'It is not in heaven' and preserves the infinitive's
    discourse function.
- source_word: מִי יַעֲלֶה לָּנוּ
  chosen: Who will go up for us
  alternatives:
  - Who will ascend for us
  - Who will go up on our behalf
  lexicon: HALOT
  rationale: עלה means 'go up/ascend.' 'Go up' is more readable modern English, while
    still preserving the upward movement toward heaven. 'For us' captures the benefactive
    sense of לָנוּ.
- source_word: הַשָּׁמַיְמָה
  chosen: to heaven
  alternatives:
  - to the heavens
  - heavenward
  lexicon: HALOT
  rationale: The directional ending indicates motion toward heaven. 'To heaven' is
    the most natural English equivalent.
- source_word: וְיִקָּחֶהָ לָּנוּ
  chosen: and get it for us
  alternatives:
  - and take it for us
  - and fetch it for us
  lexicon: HALOT
  rationale: לקח literally means 'take,' but in this context of obtaining something
    from heaven for the people, 'get it for us' communicates the sense clearly in
    contemporary English without undue paraphrase. 'Fetch it' is possible but less
    natural here.
- source_word: וְיַשְׁמִעֵנוּ אֹתָהּ
  chosen: and make us hear it
  alternatives:
  - and proclaim it to us
  - and let us hear it
  lexicon: HALOT
  rationale: 'The Hiphil of שמע is causative: ''cause us to hear.'' ''Make us hear
    it'' preserves that causative force more closely than the smoother but more interpretive
    ''proclaim it to us.'''
- source_word: וְנַעֲשֶׂנָּה
  chosen: so that we may do it
  alternatives:
  - that we may do it
  - and we will do it
  lexicon: HALOT
  rationale: עשה here means to do/observe the command. The cohortative sense after
    the preceding verbs is well represented by 'so that we may do it,' expressing
    purpose/result in natural English.
