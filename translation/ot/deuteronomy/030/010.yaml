theological_decisions:
- issue: Rendering of covenantal שׁוּב in a repentance context
  chosen_reading: return
  alternative_readings:
  - turn back
  - repent
  rationale: The Hebrew verb fundamentally means 'turn/return.' In Deuteronomy it often carries covenant-renewal and repentance overtones, but 'return' preserves the metaphor and theological tension without over-interpreting.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
