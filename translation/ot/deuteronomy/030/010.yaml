id: DEU.30.10
reference: Deuteronomy 30:10
source:
  edition: WLC
  text: כִּ֣י תִשְׁמַ֗ע בְּ/קוֹל֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ לִ/שְׁמֹ֤ר מִצְוֺתָי/ו֙ וְ/חֻקֹּתָ֔י/ו הַ/כְּתוּבָ֕ה בְּ/סֵ֥פֶר הַ/תּוֹרָ֖ה הַ/זֶּ֑ה כִּ֤י תָשׁוּב֙ אֶל יְהוָ֣ה אֱלֹהֶ֔י/ךָ בְּ/כָל לְבָבְ/ךָ֖ וּ/בְ/כָל נַפְשֶֽׁ/ךָ־־־׃פ
translation:
  text: if you obey the voice of Yahweh your God, keeping his commandments and his statutes that are written in this book of the law, if you return to Yahweh your God with all your heart and with all your soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'turn back' or 'repent' to the LORD your God.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'obey the voice of the LORD'; the expression means to heed what he says.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: if
  alternatives:
  - for
  - when
  - because
  lexicon: HALOT
  rationale: In this context כִּי introduces the condition on which the preceding promise depends, so 'if' best fits the syntax and discourse flow rather than causal 'for/because'.
- source_word: תִשְׁמַע בְּקוֹל
  chosen: you obey the voice
  alternatives:
  - you listen to the voice
  - you hear the voice
  lexicon: HALOT
  rationale: The idiom שׁמע בקול commonly means not mere auditory hearing but heeding/obeying. 'Obey the voice' preserves the Hebrew idiom while communicating the covenantal sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with second masculine singular suffix; 'your God' is the natural English equivalent.
- source_word: לִשְׁמֹר
  chosen: by keeping
  alternatives:
  - to keep
  - in keeping
  lexicon: HALOT
  rationale: The infinitive expresses the manner/content of obeying the LORD's voice. 'By keeping' makes the relationship clear in natural English.
- source_word: מִצְוֺתָיו
  chosen: his commandments
  alternatives:
  - his commands
  lexicon: HALOT
  rationale: '''Commandments'' is the standard and suitably weighty rendering for מִצְוָה in covenantal legal contexts.'
- source_word: חֻקֹּתָיו
  chosen: his statutes
  alternatives:
  - his decrees
  - his ordinances
  lexicon: HALOT
  rationale: '''Statutes'' is a conventional and precise rendering for חֻקִּים in Torah contexts, distinguishing it from broader ''commandments''.'
- source_word: הַכְּתוּבָה
  chosen: written
  alternatives:
  - that are written
  - inscribed
  lexicon: HALOT
  rationale: The feminine singular participle agrees collectively with the preceding command terms and is naturally rendered in English as 'written' modifying the combined phrase.
- source_word: בְּסֵפֶר הַתּוֹרָה הַזֶּה
  chosen: in this book of the law
  alternatives:
  - in this scroll of the law
  - in the book of this law
  lexicon: HALOT
  rationale: This is the standard covenant-document expression. 'Book of the law' is clear modern English; 'scroll' is possible historically but less idiomatic here.
- source_word: כִּי תָשׁוּב
  chosen: if you return
  alternatives:
  - when you return
  - for you return
  - if you turn back
  lexicon: HALOT
  rationale: The second כִּי again introduces a condition parallel to the first. שׁוּב here carries covenantal repentance/return, and 'return' preserves that theological resonance better than the more interpretive 'repent'.
- source_word: אֶל יְהוָה אֱלֹהֶיךָ
  chosen: to the LORD your God
  alternatives:
  - to Yahweh your God
  lexicon: HALOT
  rationale: Direct rendering of the prepositional phrase, with YHWH handled per doctrinal default.
- source_word: בְּכָל לְבָבְךָ
  chosen: with all your heart
  lexicon: HALOT
  rationale: Established and accurate rendering of the Hebrew anthropological idiom for the inner person, will, and affections.
- source_word: וּבְכָל נַפְשֶׁךָ
  chosen: and with all your soul
  alternatives:
  - and with all your life
  - and with all your being
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote life/self/person, but 'soul' preserves the familiar covenant formula and its theological weight; alternatives are possible but less consistent with Deuteronomic usage.
