theological_decisions:
- issue: Whether to render שׁוּב as explicit repentance
  chosen_reading: shall return
  alternative_readings:
  - shall repent
  - turn back
  rationale: The verse participates in a broader restoration-and-obedience context,
    and שׁוּב can carry covenantal return language. However, rendering it as 'repent'
    would narrow the semantic range beyond what the Hebrew alone requires here. 'Return'
    preserves the theological tension between physical return, covenant return, and
    repentance.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Whether to translate שׁמע בְּקוֹל as 'obey' or more literally
  chosen_reading: listen to the voice of the LORD
  alternative_readings:
  - obey the LORD
  rationale: The idiom often implies obedience, but the verse immediately adds 'and
    you shall do all his commandments,' making the obedience sense explicit in the
    next clause. A more literal rendering avoids collapsing two related but distinct
    expressions into one English idea.
  doctrine_reference: Translation philosophy §1 and §3
