id: DEU.30.8
reference: Deuteronomy 30:8
source:
  edition: WLC
  text: וְ/אַתָּ֣ה תָשׁ֔וּב וְ/שָׁמַעְתָּ֖ בְּ/ק֣וֹל יְהוָ֑ה וְ/עָשִׂ֨יתָ֙ אֶת כָּל
    מִצְוֺתָ֔י/ו אֲשֶׁ֛ר אָנֹכִ֥י מְצַוְּ/ךָ֖ הַ/יּֽוֹם־־׃
translation:
  text: And you shall return and listen to the voice of the LORD, and you shall do
    all his commandments that I am commanding you today.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "turn back"; in context this can also carry the sense of covenantal repentance.
    reason: lexical_alternative
  - marker: b
    text: Hebrew "listen to the voice of the LORD"; the idiom often implies obedience.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָשׁוּב
  chosen: shall return
  alternatives:
  - will return
  - turn back
  lexicon: HALOT
  rationale: שׁוּב commonly means 'return/turn back.' In this restoration context,
    'return' preserves both the physical and covenantal sense without over-interpreting
    it as explicit repentance in the main text.
- source_word: וְשָׁמַעְתָּ בְּקוֹל יְהוָה
  chosen: listen to the voice of the LORD
  alternatives:
  - obey the LORD
  - hear the voice of the LORD
  lexicon: HALOT
  rationale: שׁמע with בְּקוֹל literally means 'listen to the voice of.' In Deuteronomy
    this idiom often carries the sense of obedience, but the more transparent rendering
    'listen to the voice of' preserves the Hebrew expression while allowing the obedience
    nuance to be inferred from context and the following clause.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention reflecting
    the covenant name.
- source_word: וְעָשִׂיתָ
  chosen: you shall do
  alternatives:
  - you will do
  - you shall keep
  lexicon: HALOT
  rationale: עָשָׂה is the common verb 'do/make.' With commandments as object, English
    can say 'keep,' but 'do' stays closer to the Hebrew and avoids importing a more
    interpretive gloss.
- source_word: כָּל מִצְוֺתָיו
  chosen: all his commandments
  alternatives:
  - all his commands
  lexicon: HALOT
  rationale: מִצְוֺת means 'commandments/commands.' 'Commandments' preserves the covenantal
    and legal register typical of Deuteronomy. The suffix is 3ms, referring to the
    LORD.
- source_word: אֲשֶׁר אָנֹכִי מְצַוְּךָ הַיּוֹם
  chosen: that I am commanding you today
  alternatives:
  - that I command you today
  - which I am commanding you today
  lexicon: HALOT
  rationale: The participle מְצַוְּךָ gives an ongoing/immediate force, well represented
    by 'am commanding.' 'Today' is retained, as it is a significant Deuteronomic covenant
    marker emphasizing present obligation.
- source_word: וְאַתָּה
  chosen: And you
  alternatives:
  - But you
  - Then you
  lexicon: HALOT
  rationale: The pronoun is explicit in Hebrew and gives emphasis. 'And you' preserves
    the conjunction and the marked subject without forcing a stronger adversative
    or temporal nuance.
