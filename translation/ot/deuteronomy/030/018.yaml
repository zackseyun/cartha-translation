theological_decisions:
- issue: Corporate singular address to Israel
  chosen_reading: Retain singular 'you' in English while understanding it as Israel
    collectively
  alternative_readings:
  - Convert to plural 'you all' for explicit collectivity
  rationale: Deuteronomy frequently addresses Israel as a single covenant people with
    singular pronouns. Preserving singular 'you' reflects the source rhetoric without
    importing a different discourse structure.
  doctrine_reference: Translation philosophy §5 (consistency) and §6 (readable modern
    English)
- issue: Covenant-land terminology
  chosen_reading: Render הָאֲדָמָה here as 'the land'
  alternative_readings:
  - the ground
  rationale: In this covenant-warning context the referent is the promised territory
    across the Jordan, not soil in the abstract. 'The land' preserves the theological
    and narrative connection to Deuteronomy's land promise and warning.
