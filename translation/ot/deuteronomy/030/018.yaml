id: DEU.30.18
reference: Deuteronomy 30:18
source:
  edition: WLC
  text: הִגַּ֤דְתִּי לָ/כֶם֙ הַ/יּ֔וֹם כִּ֥י אָבֹ֖ד תֹּאבֵד֑וּ/ן לֹא תַאֲרִיכֻ֤/ן
    יָמִים֙ עַל הָ֣/אֲדָמָ֔ה אֲשֶׁ֨ר אַתָּ֤ה עֹבֵר֙ אֶת הַ/יַּרְדֵּ֔ן לָ/בֹ֥א שָׁ֖מָּ/ה
    לְ/רִשְׁתָּֽ/הּ־־־׃
translation:
  text: I declare to you today that you will surely perish; you will not prolong your
    days on the land that you are crossing the Jordan to enter there and possess it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''perishing you will perish,'' an emphatic construction meaning
      ''you will surely perish.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'you will not live long on the land.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew addresses Israel with singular 'you,' treating the nation as
      one people.
    reason: cultural_note
lexical_decisions:
- source_word: הִגַּדְתִּי
  chosen: I declare
  alternatives:
  - I announce
  - I tell
  lexicon: HALOT
  rationale: Hiphil of נגד conveys making something known or declaring. Present English
    'declare' preserves the solemn, formal warning force better than the flatter 'tell.'
- source_word: לָכֶם
  chosen: to you
  lexicon: HALOT
  rationale: Second person masculine plural dative; rendered straightforwardly as
    the audience addressed by Moses.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Temporal adverbial use. 'Today' is natural modern English while preserving
    the covenantal immediacy of the Hebrew.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: Introduces the content of the declaration. 'That' fits the syntax of
    reported warning in English.
- source_word: אָבֹד תֹּאבֵדוּן
  chosen: you will surely perish
  alternatives:
  - you shall surely perish
  - perishing you will perish
  lexicon: HALOT
  rationale: Infinitive absolute plus finite verb intensifies the certainty of destruction.
    'You will surely perish' is the standard optimal-equivalence way to preserve the
    emphatic force without wooden repetition.
- source_word: לֹא תַאֲרִיכֻן יָמִים
  chosen: you will not prolong your days
  alternatives:
  - you will not live long
  - you will not lengthen days
  lexicon: HALOT
  rationale: Hiphil of ארך with 'days' literally means to make days long. 'Prolong
    your days' preserves the Hebrew idiom and its covenantal resonance better than
    the more interpretive 'live long.'
- source_word: עַל הָאֲדָמָה
  chosen: on the land
  alternatives:
  - in the land
  - upon the ground
  lexicon: HALOT
  rationale: In Deuteronomy this phrase commonly refers to the promised land as territory.
    'On the land' is formally close to the Hebrew preposition על, while still idiomatic
    enough in context.
- source_word: אֲשֶׁר אַתָּה עֹבֵר אֶת־הַיַּרְדֵּן
  chosen: that you are crossing the Jordan
  alternatives:
  - which you are crossing the Jordan
  - that you are about to cross the Jordan
  lexicon: HALOT
  rationale: The singular pronoun 'you' addresses Israel corporately, a common Deuteronomic
    usage. English keeps the singular form because it is natural and reflects the
    Hebrew's corporate singular rhetoric.
- source_word: לָבֹא שָׁמָּה
  chosen: to enter there
  alternatives:
  - to go in there
  - to enter it
  lexicon: HALOT
  rationale: Infinitive of בוא plus adverb שמה expresses movement into that place.
    'Enter there' preserves both the motion and the deictic adverb, though English
    could omit 'there'; it is retained for transparency.
- source_word: לְרִשְׁתָּהּ
  chosen: and possess it
  alternatives:
  - and take possession of it
  - and inherit it
  lexicon: HALOT
  rationale: ירש in land-promise contexts often means to take possession/possess.
    'Possess it' is concise and accurate; 'inherit' could suggest passive reception
    more than the conquest-settlement nuance here.
