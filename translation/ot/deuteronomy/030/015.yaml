id: DEU.30.15
reference: Deuteronomy 30:15
source:
  edition: WLC
  text: רְאֵ֨ה נָתַ֤תִּי לְ/פָנֶ֨י/ךָ֙ הַ/יּ֔וֹם אֶת הַֽ/חַיִּ֖ים וְ/אֶת הַ/טּ֑וֹב
    וְ/אֶת הַ/מָּ֖וֶת וְ/אֶת הָ/רָֽע־־־־׃
translation:
  text: See, I have set before you today life and good, and death and evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I have given before you' or 'I have placed before you.'
    reason: lexical_alternative
  - marker: b
    text: '''Evil'' may also be rendered ''harm'' or ''calamity'' in some contexts;
      here the Hebrew sets it in direct contrast with ''good.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאֵה
  chosen: See
  alternatives:
  - Look
  - Behold
  lexicon: HALOT
  rationale: Imperative of ראה functioning as a discourse attention-getter. 'See'
    is natural modern English and preserves the direct summons better than the more
    archaic 'behold.'
- source_word: נָתַתִּי
  chosen: I have set
  alternatives:
  - I have given
  - I have placed
  lexicon: HALOT
  rationale: נתן literally means 'give/put/set.' In the idiom with 'before you,' English
    'have set before you' is the most natural and established equivalent, conveying
    presentation of alternatives rather than a simple gift.
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - in front of you
  lexicon: HALOT
  rationale: Idiomatic prepositional phrase meaning 'before you' in the sense of placing
    options before someone for decision.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Temporal adverbial. 'Today' is clear modern English; 'this day' is more
    formal but less natural here.
- source_word: הַחַיִּים
  chosen: life
  alternatives:
  - the life
  - lives
  lexicon: HALOT
  rationale: Though morphologically plural, חַיִּים commonly functions as an abstract
    noun meaning 'life.' Singular English best matches the sense in this choice-setting
    context.
- source_word: הַטּוֹב
  chosen: good
  alternatives:
  - prosperity
  - well-being
  lexicon: HALOT
  rationale: טוֹב broadly denotes 'good.' Here it is paired with 'life' and contrasted
    with 'death' and 'evil.' Retaining 'good' preserves the lexical parallelism of
    the Hebrew; more interpretive renderings like 'prosperity' belong more to contextual
    exposition than translation of this verse alone.
- source_word: הַמָּוֶת
  chosen: death
  alternatives:
  - the death
  lexicon: HALOT
  rationale: Straightforward rendering of the noun in antithesis to 'life.' English
    omits the article naturally.
- source_word: הָרָע
  chosen: evil
  alternatives:
  - harm
  - calamity
  - bad
  lexicon: HALOT
  rationale: רַע can denote moral evil or adversity/harm depending on context. In
    this covenantal choice formula, paired antithetically with 'good,' 'evil' best
    preserves the stark moral and existential contrast without over-narrowing it to
    mere misfortune.
