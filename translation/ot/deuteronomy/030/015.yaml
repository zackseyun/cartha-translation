theological_decisions:
- issue: Rendering of הָרָע in covenantal antithesis
  chosen_reading: evil
  alternative_readings:
  - harm
  - calamity
  rationale: 'The verse presents a comprehensive covenant choice: life/good versus
    death/evil. Translating רַע as ''evil'' preserves the moral-theological force
    of the contrast and avoids reducing it to impersonal disaster alone, while recognizing
    that the Hebrew term can include harmful consequences in context.'
  doctrine_reference: Translation philosophy §3, §5
