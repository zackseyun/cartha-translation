id: DEU.30.1
reference: Deuteronomy 30:1
source:
  edition: WLC
  text: וְ/הָיָה֩ כִֽי יָבֹ֨אוּ עָלֶ֜י/ךָ כָּל הַ/דְּבָרִ֣ים הָ/אֵ֗לֶּה הַ/בְּרָכָה֙ וְ/הַ/קְּלָלָ֔ה אֲשֶׁ֥ר נָתַ֖תִּי לְ/פָנֶ֑י/ךָ וַ/הֲשֵׁבֹתָ֙ אֶל לְבָבֶ֔/ךָ בְּ/כָל הַ/גּוֹיִ֔ם אֲשֶׁ֧ר הִדִּיחֲ/ךָ֛ יְהוָ֥ה אֱלֹהֶ֖י/ךָ שָֽׁמָּ/ה־־־־׃
translation:
  text: And when all these things come upon you—the blessing and the curse that I have set before you—and you take them to heart among all the nations where Yahweh your God has driven you,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and you take them to heart'; literally, 'and you bring back to your heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  chosen: And when
  alternatives:
  - And it shall be, when
  - Now when
  lexicon: HALOT
  rationale: This construction introduces a future circumstance. 'And when' preserves the temporal force in natural English without the wooden formula 'and it shall be, when.'
- source_word: יָבֹאוּ עָלֶיךָ
  chosen: come upon you
  alternatives:
  - come on you
  - happen to you
  lexicon: HALOT
  rationale: The idiom literally means 'come upon you.' This is both natural and close to the Hebrew, conveying events befalling the addressee.
- source_word: כָּל הַדְּבָרִים הָאֵלֶּה
  chosen: all these things
  alternatives:
  - all these words
  - all these matters
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'thing.' Here it refers to the totality of covenant outcomes just mentioned, so 'things' best fits idiomatic English.
- source_word: הַבְּרָכָה וְהַקְּלָלָה
  chosen: the blessing and the curse
  alternatives:
  - the blessing and the cursing
  lexicon: HALOT
  rationale: These are the covenant sanctions previously set forth. 'Curse' is the standard and most natural rendering opposite 'blessing.'
- source_word: אֲשֶׁר נָתַתִּי לְפָנֶיךָ
  chosen: that I have set before you
  alternatives:
  - that I have given before you
  - that I have placed before you
  lexicon: HALOT
  rationale: Although נתן is literally 'give,' the idiom with 'before you' means to place or set before someone. 'Set before you' is idiomatic and faithful.
- source_word: וַהֲשֵׁבֹתָ אֶל לְבָבֶךָ
  chosen: and you call them to mind
  alternatives:
  - and you bring them back to your heart
  - and you take them to heart
  lexicon: HALOT
  rationale: The Hiphil of שוב with 'to your heart' conveys reflective recollection. 'Call them to mind' captures the sense clearly in modern English while preserving the act of inward remembrance. The plural object 'them' is supplied from the preceding 'these things.'
- source_word: לְבָבֶךָ
  chosen: mind
  alternatives:
  - heart
  lexicon: HALOT
  rationale: Hebrew 'heart' often includes thought and reflection, not merely emotion. In this context of remembering and considering, 'mind' communicates the intended sense more clearly in English.
- source_word: בְּכָל הַגּוֹיִם
  chosen: among all the nations
  alternatives:
  - in all the nations
  lexicon: HALOT
  rationale: The preposition can be rendered 'in' or 'among.' 'Among' better conveys dispersion within foreign peoples.
- source_word: הִדִּיחֲךָ
  chosen: has driven you
  alternatives:
  - has banished you
  - has scattered you
  lexicon: HALOT
  rationale: The verb denotes being thrust away or driven out. 'Driven you' is a strong, direct rendering that fits exile language.
- source_word: יְהוָה אֱלֹהֶיךָ
  chosen: the LORD your God
  alternatives:
  - Yahweh your God
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The covenantal phrase is standardly and accurately translated 'the LORD your God.'
- source_word: שָׁמָּה
  chosen: there
  alternatives:
  - to there
  lexicon: HALOT
  rationale: The adverb indicates the place of exile. English idiom requires simply 'there.'
