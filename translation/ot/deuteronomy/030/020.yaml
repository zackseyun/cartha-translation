theological_decisions:
- issue: Referent of 'he' in 'for he is your life'
  chosen_reading: The pronoun refers to the LORD himself.
  alternative_readings:
  - The pronoun refers more generally to the preceding way of covenant obedience.
  rationale: The nearest and most salient antecedent is 'the LORD your God,' and the
    personal formulation fits Deuteronomy's theology of life being found in relation
    to the LORD. The alternative is possible at a conceptual level, but the Hebrew
    wording favors the personal referent.
  doctrine_reference: Preserve theological tension rather than resolve it only where
    ambiguity is genuine; here the personal referent is the stronger reading.
