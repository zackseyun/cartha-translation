id: DEU.30.20
reference: Deuteronomy 30:20
source:
  edition: WLC
  text: לְ/אַֽהֲבָה֙ אֶת יְהוָ֣ה אֱלֹהֶ֔י/ךָ לִ/שְׁמֹ֥עַ בְּ/קֹל֖/וֹ וּ/לְ/דָבְקָה
    ב֑/וֹ כִּ֣י ה֤וּא חַיֶּ֨י/ךָ֙ וְ/אֹ֣רֶךְ יָמֶ֔י/ךָ לָ/שֶׁ֣בֶת עַל הָ/אֲדָמָ֗ה
    אֲשֶׁר֩ נִשְׁבַּ֨ע יְהוָ֧ה לַ/אֲבֹתֶ֛י/ךָ לְ/אַבְרָהָ֛ם לְ/יִצְחָ֥ק וּֽ/לְ/יַעֲקֹ֖ב
    לָ/תֵ֥ת לָ/הֶֽם־־־׃פ
translation:
  text: by loving the LORD your God, by listening to his voice, and by holding fast
    to him; for he is your life and the length of your days, so that you may dwell
    on the land that the LORD swore to your fathers, to Abraham, to Isaac, and to
    Jacob, to give to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by obeying his voice'; the Hebrew idiom 'listen to his voice' often
      includes the sense of heeding or obeying.
    reason: lexical_alternative
  - marker: b
    text: Or 'and by clinging to him.'
    reason: lexical_alternative
  - marker: c
    text: Or 'to your ancestors'; Hebrew 'fathers' is retained because the text immediately
      names Abraham, Isaac, and Jacob.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְאַהֲבָה
  chosen: by loving
  alternatives:
  - to love
  - in loving
  lexicon: HALOT
  rationale: Infinitive construct with prefixed ל continues the means/explanation
    from the previous verse ('choose life ...'), so an instrumental English gerund
    ('by loving') best captures the syntax and discourse flow.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    covenantal force while matching established English convention.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with 2ms suffix; retained in natural English
    apposition after 'the LORD'.
- source_word: לִשְׁמֹעַ בְּקֹלוֹ
  chosen: by listening to his voice
  alternatives:
  - by obeying his voice
  - to listen to his voice
  lexicon: HALOT
  rationale: שׁמע with בְּקוֹל often carries the sense of heeding/obeying, but the
    concrete expression 'listen to his voice' preserves the Hebrew idiom and lets
    the obedience nuance remain implicit in context.
- source_word: וּלְדָבְקָה בוֹ
  chosen: and by holding fast to him
  alternatives:
  - and by clinging to him
  - and by cleaving to him
  lexicon: HALOT
  rationale: דבק with ב conveys close attachment or adherence. 'Holding fast' is idiomatic
    modern English that preserves covenantal loyalty without archaic tone; 'cleaving'
    is accurate but dated.
- source_word: כִּי הוּא חַיֶּיךָ
  chosen: for he is your life
  alternatives:
  - for that is your life
  - for he is the source of your life
  lexicon: HALOT
  rationale: The pronoun most naturally refers to the LORD, not the preceding acts
    abstractly. The verbless clause is rendered directly and personally.
- source_word: וְאֹרֶךְ יָמֶיךָ
  chosen: and the length of your days
  alternatives:
  - and your long life
  - and the prolonging of your days
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the Hebrew expression while remaining
    understandable. It also avoids overinterpreting whether emphasis is on duration
    or blessing.
- source_word: לָשֶׁבֶת עַל הָאֲדָמָה
  chosen: so that you may dwell on the land
  alternatives:
  - to dwell on the land
  - to live in the land
  lexicon: HALOT
  rationale: The infinitive expresses result/purpose in relation to life and length
    of days. 'Dwell' preserves covenant-land resonance better than the flatter 'live.'
    'Land' is preferable to 'ground' here because the promise is territorial.
- source_word: אֲשֶׁר נִשְׁבַּע יְהוָה
  chosen: that the LORD swore
  alternatives:
  - which the LORD swore
  - that the LORD promised with an oath
  lexicon: HALOT
  rationale: נשבע means 'swear, take an oath.' The concise rendering keeps the formal
    covenantal sense.
- source_word: לַאֲבֹתֶיךָ
  chosen: to your fathers
  alternatives:
  - to your ancestors
  lexicon: HALOT
  rationale: Per project guidance, gender-accurate language is preferred where the
    source is masculine. 'Fathers' also fits the immediate specification of Abraham,
    Isaac, and Jacob.
- source_word: לָתֵת לָהֶם
  chosen: to give to them
  alternatives:
  - to give them
  - to give it to them
  lexicon: HALOT
  rationale: The Hebrew explicitly includes the indirect object 'to them.' Retaining
    it avoids smoothing away the formal oath language, even though English could compress
    it.
