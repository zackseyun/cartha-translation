theological_decisions:
- issue: Referent of 'the word'
  chosen_reading: Rendered generically as 'the word' without narrowing it to 'commandment'
    in the main text.
  alternative_readings:
  - the command
  - the matter
  rationale: The Hebrew דָּבָר can bear several related senses. Since the immediate
    context concerns God's commandment yet the verse itself uses the broader term,
    the translation preserves that breadth rather than interpreting more narrowly
    than the source requires.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
