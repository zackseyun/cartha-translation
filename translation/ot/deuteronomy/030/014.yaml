id: DEU.30.14
reference: Deuteronomy 30:14
source:
  edition: WLC
  text: כִּֽי קָר֥וֹב אֵלֶ֛י/ךָ הַ/דָּבָ֖ר מְאֹ֑ד בְּ/פִ֥י/ךָ וּ/בִֽ/לְבָבְ/ךָ֖ לַ/עֲשֹׂתֽ/וֹ־׃ס
translation:
  text: For the word is very near you, in your mouth and in your heart, so that you
    may do it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the matter' or 'the command.' Hebrew דָּבָר can refer to a word, matter,
      or command, depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces an explanation grounding the preceding statement,
    so 'For' best preserves the logical connection in natural English.
- source_word: קָרוֹב
  chosen: near
  alternatives:
  - close
  - at hand
  lexicon: HALOT
  rationale: The adjective denotes proximity. 'Near' is the most direct and idiomatic
    rendering in this context.
- source_word: אֵלֶיךָ
  chosen: you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: The preposition plus pronoun literally means 'to you,' but English idiom
    with 'near' normally expresses this simply as 'near you.'
- source_word: הַדָּבָר
  chosen: the word
  alternatives:
  - the matter
  - the command
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'thing.' In this context, referring
    back to the command/instruction Moses has been discussing, 'the word' preserves
    the Hebrew's lexical form while remaining intelligible. Alternatives are possible
    but less formally transparent.
- source_word: מְאֹד
  chosen: very
  alternatives:
  - exceedingly
  lexicon: HALOT
  rationale: The adverb intensifies the nearness. 'Very' is clear, natural, and sufficient
    without sounding archaic.
- source_word: בְּפִיךָ
  chosen: in your mouth
  alternatives:
  - on your lips
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the embodied imagery of confession/speech.
    'On your lips' is smoother but less direct.
- source_word: וּבִלְבָבְךָ
  chosen: and in your heart
  alternatives:
  - and in your mind
  - and in your inner being
  lexicon: HALOT
  rationale: לֵבָב in Hebrew commonly denotes the inner person, including thought
    and will, but 'heart' is the standard and theologically resonant rendering. It
    also preserves the mouth/heart parallel.
- source_word: לַעֲשֹׂתוֹ
  chosen: so that you may do it
  alternatives:
  - to do it
  - for doing it
  lexicon: HALOT
  rationale: The infinitive with ל expresses purpose or result here. 'So that you
    may do it' makes the sense explicit in idiomatic English while preserving the
    connection between inward possession of the word and obedient action.
