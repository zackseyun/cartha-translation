id: DEU.30.16
reference: Deuteronomy 30:16
source:
  edition: WLC
  text: אֲשֶׁ֨ר אָנֹכִ֣י מְצַוְּ/ךָ֮ הַ/יּוֹם֒ לְ/אַהֲבָ֞ה אֶת יְהוָ֤ה אֱלֹהֶ֨י/ךָ֙ לָ/לֶ֣כֶת בִּ/דְרָכָ֔י/ו וְ/לִ/שְׁמֹ֛ר מִצְוֺתָ֥י/ו וְ/חֻקֹּתָ֖י/ו וּ/מִשְׁפָּטָ֑י/ו וְ/חָיִ֣יתָ וְ/רָבִ֔יתָ וּ/בֵֽרַכְ/ךָ֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ בָּ/אָ֕רֶץ אֲשֶׁר אַתָּ֥ה בָא שָׁ֖מָּ/ה לְ/רִשְׁתָּֽ/הּ־־־׃
translation:
  text: 'which I am commanding you today: to love Yahweh your God, to walk in his ways, and to keep his commandments, his statutes, and his judgments, so that you may live and multiply, and Yahweh your God may bless you in the land that you are entering to possess.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his ordinances' for 'his judgments' (מִשְׁפָּטָיו).
    reason: lexical_alternative
  - marker: b
    text: Or 'that you may live and become many, and the LORD your God will bless you.' The Hebrew verbal sequence can be understood as result or promise.
    reason: alternative_reading
  - marker: c
    text: Hebrew 'that you are entering there to possess it,' preserving the directional adverb 'there.' English may also be rendered more smoothly, 'that you are entering to possess.'
    reason: lexical_alternative
  - marker: d
    text: Or 'to inherit it' for 'to possess it' (לְרִשְׁתָּהּ), especially in land-promise contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  lexicon: HALOT
  rationale: Introduces the content of what is being commanded. 'Which' preserves the relative linkage from the previous clause; 'that' is possible but slightly less formal.
- source_word: מְצַוְּךָ
  chosen: I am commanding you
  alternatives:
  - I command you
  lexicon: HALOT
  rationale: The participial form supports an ongoing/immediate sense. 'I am commanding you' reflects the Hebrew aspect more closely than a simple present.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: '''Today'' is natural modern English while preserving the temporal emphasis.'
- source_word: לְאַהֲבָה
  chosen: to love
  lexicon: HALOT
  rationale: Infinitive of purpose; straightforwardly rendered 'to love.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Construct with 2ms suffix; standard covenantal address.
- source_word: לָלֶכֶת בִּדְרָכָיו
  chosen: to walk in his ways
  alternatives:
  - to go in his ways
  lexicon: HALOT
  rationale: Established Hebrew idiom for conduct of life. 'Walk' preserves the metaphor better than 'go.'
- source_word: לִשְׁמֹר
  chosen: to keep
  alternatives:
  - to observe
  - to guard
  lexicon: HALOT
  rationale: In covenant/legal contexts, 'keep' is the most idiomatic English rendering while retaining obedience nuance.
- source_word: מִצְוֺתָיו
  chosen: his commandments
  alternatives:
  - his commands
  lexicon: HALOT
  rationale: '''Commandments'' preserves the formal covenantal register and distinguishes this term from the broader act of commanding.'
- source_word: חֻקֹּתָיו
  chosen: his statutes
  alternatives:
  - his decrees
  lexicon: HALOT
  rationale: '''Statutes'' is a conventional and precise rendering for חֻקִּים in legal contexts.'
- source_word: מִשְׁפָּטָיו
  chosen: his judgments
  alternatives:
  - his rules
  - his ordinances
  lexicon: HALOT
  rationale: The term can denote judgments/ordinances. 'Judgments' preserves the lexical connection to משפט and the judicial nuance, though 'ordinances' is possible.
- source_word: וְחָיִיתָ
  chosen: so that you may live
  alternatives:
  - and you will live
  lexicon: HALOT
  rationale: Given the sequence of purpose/result clauses in context, this is best taken as result/purpose rather than a bare future. 'May live' communicates the consequence of obedience.
- source_word: וְרָבִיתָ
  chosen: and multiply
  alternatives:
  - and become many
  - and increase
  lexicon: HALOT
  rationale: Keeps the covenant-blessing language concise and recognizable.
- source_word: וּבֵרַכְךָ
  chosen: and ... may bless you
  alternatives:
  - and ... will bless you
  lexicon: HALOT
  rationale: 'Rendered with modal force coordinated to the preceding result clause: obedience leads to blessing. The ellipsis is resolved in English by supplying the subject in full.'
- source_word: בָּאָרֶץ
  chosen: in the land
  lexicon: HALOT
  rationale: Standard rendering in Deuteronomic covenant-land context.
- source_word: אֲשֶׁר אַתָּה בָא שָׁמָּה
  chosen: that you are entering there
  alternatives:
  - that you are going there
  - which you are entering
  lexicon: HALOT
  rationale: בוא plus שָׁמָּה is somewhat redundant in English; 'entering there' preserves both motion and destination, though it is slightly wooden.
- source_word: לְרִשְׁתָּהּ
  chosen: to possess it
  alternatives:
  - to take possession of it
  - to inherit it
  lexicon: HALOT
  rationale: ירשׁ in land-promise contexts can mean possess/inherit. 'Possess it' is concise and fits the immediate context of entering the land.
