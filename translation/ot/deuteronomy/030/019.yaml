id: DEU.30.19
reference: Deuteronomy 30:19
source:
  edition: WLC
  text: הַעִידֹ֨תִי בָ/כֶ֣ם הַ/יּוֹם֮ אֶת הַ/שָּׁמַ֣יִם וְ/אֶת הָ/אָרֶץ֒ הַ/חַיִּ֤ים
    וְ/הַ/מָּ֨וֶת֙ נָתַ֣תִּי לְ/פָנֶ֔י/ךָ הַ/בְּרָכָ֖ה וְ/הַ/קְּלָלָ֑ה וּ/בָֽחַרְתָּ֙
    בַּֽ/חַיִּ֔ים לְמַ֥עַן תִּחְיֶ֖ה אַתָּ֥ה וְ/זַרְעֶֽ/ךָ־־׃
translation:
  text: 'I call heaven and earth to witness against you today: I have set before you
    life and death, blessing and curse. Therefore choose life, so that you and your
    offspring may live,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the heavens and the earth.'
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew has a legal/covenantal sense: ''I call heaven and earth to witness
      against you today.'''
    reason: cultural_note
  - marker: c
    text: Or 'your descendants'; Hebrew 'your seed/offspring.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַעִידֹתִי בָכֶם
  chosen: I call ... to witness against you
  alternatives:
  - I testify against you
  - I have warned you
  lexicon: HALOT
  rationale: The Hiphil of עוּד here has a causative/legal sense of invoking witnesses.
    With בָכֶם, the sense is not merely 'to you' but 'against you' in covenant lawsuit
    style. 'Call ... to witness against you' preserves the formal judicial nuance
    better than a flatter 'testify.'
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: '''Today'' is natural modern English and preserves the temporal emphasis
    without archaic phrasing.'
- source_word: אֶת הַשָּׁמַיִם וְאֶת הָאָרֶץ
  chosen: heaven and earth
  alternatives:
  - the heavens and the earth
  lexicon: HALOT
  rationale: The pair is a standard merism and covenant-witness formula. Singular
    'heaven and earth' is idiomatic in English while still accurately representing
    the Hebrew expression.
- source_word: הַחַיִּים וְהַמָּוֶת
  chosen: life and death
  lexicon: HALOT
  rationale: Straightforward lexical rendering; the abstract pair expresses covenant
    outcomes set before Israel.
- source_word: נָתַתִּי לְפָנֶיךָ
  chosen: I have set before you
  alternatives:
  - I have given before you
  - I have placed before you
  lexicon: HALOT
  rationale: In context, נָתַן + לִפְנֵי means to place or set before someone as a
    presented choice. 'Set before you' is idiomatic and precise.
- source_word: הַבְּרָכָה וְהַקְּלָלָה
  chosen: blessing and curse
  alternatives:
  - the blessing and the curse
  lexicon: HALOT
  rationale: English idiom normally omits the articles in paired abstractions. The
    singular 'curse' matches the Hebrew and keeps the covenantal contrast concise.
- source_word: וּבָחַרְתָּ
  chosen: Therefore choose
  alternatives:
  - and choose
  - so choose
  lexicon: HALOT
  rationale: Formally the conjunction is 'and,' but in context it carries an exhortational/resultative
    force after the options are set forth. 'Therefore choose' makes the discourse
    relation clear in natural English without over-paraphrasing.
- source_word: בַּחַיִּים
  chosen: life
  alternatives:
  - the life
  lexicon: HALOT
  rationale: English does not require the article here; the phrase means choosing
    the way/outcome of life.
- source_word: לְמַעַן תִּחְיֶה
  chosen: so that ... may live
  alternatives:
  - that ... may live
  - in order that ... may live
  lexicon: HALOT
  rationale: This expresses purpose/result. 'So that ... may live' is clear modern
    English and preserves the purposive force.
- source_word: אַתָּה וְזַרְעֶךָ
  chosen: you and your offspring
  alternatives:
  - you and your seed
  - you and your descendants
  lexicon: HALOT
  rationale: זֶרַע can mean seed/offspring/descendants. 'Offspring' is natural, sufficiently
    broad, and avoids overly literal 'seed' while preserving familial continuity.
