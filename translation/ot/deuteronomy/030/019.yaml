theological_decisions:
- issue: Covenant-witness/judicial framing
  chosen_reading: The verse is rendered with legal-witness language ('call heaven
    and earth to witness against you') rather than a generalized warning.
  alternative_readings:
  - I testify to you today by heaven and earth
  - I warn you today
  rationale: The Hebrew invokes heaven and earth as witnesses in a covenantal setting.
    Preserving that forensic texture avoids flattening the theological seriousness
    of the appeal while not importing later doctrinal claims.
  doctrine_reference: 'Translation philosophy #1 and #3'
- issue: Second-person masculine singular with representative force
  chosen_reading: Main text keeps singular 'you' addressed to Israel through Moses,
    with 'your offspring' preserving the familial/covenantal extension.
  alternative_readings:
  - you all
  - Israel and its offspring
  rationale: The Hebrew is 2ms, addressing the covenant partner representatively.
    English 'you' can preserve this without forcing a plural paraphrase. This aligns
    with gender-accurate/source-accurate translation.
  doctrine_reference: 'Translation philosophy #4'
