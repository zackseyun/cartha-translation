id: DEU.30.17
reference: Deuteronomy 30:17
source:
  edition: WLC
  text: וְ/אִם יִפְנֶ֥ה לְבָבְ/ךָ֖ וְ/לֹ֣א תִשְׁמָ֑ע וְ/נִדַּחְתָּ֗ וְ/הִֽשְׁתַּחֲוִ֛יתָ
    לֵ/אלֹהִ֥ים אֲחֵרִ֖ים וַ/עֲבַדְתָּֽ/ם־׃
translation:
  text: But if your heart turns away, and you do not listen, and you are led astray
    and bow down to other gods and serve them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and you are drawn away' or 'and you are driven away.' The Hebrew verb
      can carry the sense of being pulled off course or driven from proper allegiance.
    reason: lexical_alternative
  - marker: b
    text: '''Listen'' may also be rendered ''obey'' in covenant contexts, since the
      Hebrew verb often includes the sense of heeding what is commanded.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces the contrary conditional to the previous positive exhortation.
    'But if' best conveys the adversative force in context, though the conjunction
    is formally 'and.'
- source_word: יִפְנֶה לְבָבְךָ
  chosen: your heart turns away
  alternatives:
  - your heart turns
  - your heart is turned
  lexicon: HALOT
  rationale: The verb פנה means 'turn' and with 'heart' expresses inward apostasy
    or deflection of loyalty. 'Turns away' makes the implied movement away from the
    LORD explicit in natural English.
- source_word: וְלֹא תִשְׁמָע
  chosen: and you do not listen
  alternatives:
  - and you do not hear
  - and you do not obey
  lexicon: HALOT
  rationale: שׁמע can mean hear, listen, or obey. Here the immediate sense is refusal
    to heed the covenantal command. 'Listen' preserves the auditory metaphor while
    allowing the obedience nuance to remain implicit.
- source_word: וְנִדַּחְתָּ
  chosen: and you are led astray
  alternatives:
  - and you are driven away
  - and you are drawn away
  lexicon: HALOT
  rationale: The Niphal of נדח conveys being driven, drawn, or led away from proper
    allegiance. 'Led astray' captures both passive movement and the moral-religious
    sense in this idolatry context.
- source_word: וְהִשְׁתַּחֲוִיתָ
  chosen: and bow down
  alternatives:
  - and worship
  - and prostrate yourself
  lexicon: HALOT
  rationale: The verb literally denotes bowing/prostration. 'Bow down' preserves the
    physical act, which in context functions as worship, without over-paraphrasing.
- source_word: לֵאלֹהִים אֲחֵרִים
  chosen: to other gods
  alternatives:
  - to foreign gods
  lexicon: HALOT
  rationale: אֱלֹהִים אֲחֵרִים is the standard Deuteronomic expression for rival deities.
    'Other gods' is the most direct and conventional rendering.
- source_word: וַעֲבַדְתָּם
  chosen: and serve them
  alternatives:
  - and worship them
  lexicon: HALOT
  rationale: עבד in this context refers to cultic service rendered to deities. 'Serve
    them' preserves the lexical link to service while allowing the religious sense
    to be understood from context.
