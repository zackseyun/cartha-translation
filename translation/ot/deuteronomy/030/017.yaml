theological_decisions:
- issue: Rendering the progression of apostasy
  chosen_reading: 'The verse is translated as a sequence: inward turning of heart,
    refusal to listen, being led astray, bowing to other gods, and serving them.'
  alternative_readings:
  - Treat 'you are led astray' as a more active 'you let yourself be drawn away'
  - Render שׁמע as 'obey' to foreground covenant disobedience
  rationale: The Hebrew presents a cascading description of covenant unfaithfulness
    without requiring interpretive expansion. The translation preserves that progression
    and avoids importing stronger doctrinal conclusions than the text states.
  doctrine_reference: Translation philosophy §§1, 3, 6
