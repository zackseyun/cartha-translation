id: DEU.30.6
reference: Deuteronomy 30:6
source:
  edition: WLC
  text: וּ/מָ֨ל יְהוָ֧ה אֱלֹהֶ֛י/ךָ אֶת לְבָבְ/ךָ֖ וְ/אֶת לְבַ֣ב זַרְעֶ֑/ךָ לְ/אַהֲבָ֞ה אֶת יְהוָ֧ה אֱלֹהֶ֛י/ךָ בְּ/כָל לְבָבְ/ךָ֥ וּ/בְ/כָל נַפְשְׁ/ךָ֖ לְמַ֥עַן חַיֶּֽי/ךָ־־־־־׃
translation:
  text: And Yahweh your God will circumcise your heart and the heart of your offspring, so that you may love Yahweh your God with all your heart and with all your soul, so that you may live.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the heart of your descendants.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'circumcise your heart'—a metaphor for inward transformation and covenant devotion.
    reason: cultural_note
  - marker: c
    text: Or 'with all your life' / 'with all your self' for 'with all your soul.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָל
  chosen: will circumcise
  alternatives:
  - will cut away
  - will remove the foreskin of
  lexicon: HALOT
  rationale: The verb מול literally refers to circumcising. Because the object is 'heart,' the expression is metaphorical but the covenantal image is central and should be preserved rather than paraphrased away.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Standard construct with second masculine singular suffix; straightforward covenantal address.
- source_word: לְבָבְךָ
  chosen: your heart
  alternatives:
  - your inner heart
  - your mind
  lexicon: HALOT
  rationale: לֵבָב/לֵב in Deuteronomy denotes the inner person, especially will and affection. 'Heart' is the established and sufficiently broad English equivalent.
- source_word: לְבַב זַרְעֶךָ
  chosen: the heart of your offspring
  alternatives:
  - the heart of your descendants
  - the heart of your seed
  lexicon: HALOT
  rationale: זֶרַע can mean seed, offspring, or descendants. 'Offspring' is natural modern English and preserves the collective singular sense.
- source_word: לְאַהֲבָה
  chosen: so that you may love
  alternatives:
  - to love
  - for loving
  lexicon: HALOT
  rationale: The infinitive construct with ל expresses purpose/result here. 'So that you may love' makes the clause natural in English while preserving the purposive force.
- source_word: בְּכָל לְבָבְךָ
  chosen: with all your heart
  alternatives:
  - with your whole heart
  lexicon: HALOT
  rationale: Traditional and accurate rendering of the covenant demand for total devotion.
- source_word: וּבְכָל נַפְשְׁךָ
  chosen: and with all your soul
  alternatives:
  - and with all your life
  - and with all your self
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote soul, life, or self. In this Deuteronomic formula paired with 'heart,' 'soul' best preserves the familiar covenantal wording and theological resonance, while the life-or-self nuance is reflected by the final clause.
- source_word: לְמַעַן חַיֶּיךָ
  chosen: so that you may live
  alternatives:
  - for the sake of your life
  - that your life may continue
  lexicon: HALOT
  rationale: לְמַעַן marks purpose/result. Though literally 'for your life,' idiomatic English is 'so that you may live,' which captures the intended outcome without awkwardness.
