theological_decisions:
- issue: Metaphorical covenant language of heart circumcision
  chosen_reading: Retained the metaphor 'circumcise your heart' in the main text.
  alternative_readings:
  - change your heart
  - purify your heart
  rationale: The verse uses covenant-sign imagery to describe divine inner transformation. Preserving the metaphor maintains the theological connection between covenant sign and inward renewal without importing later doctrinal formulations.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering of נֶפֶשׁ in the love-command formula
  chosen_reading: Rendered נֶפֶשׁ as 'soul' in the main text.
  alternative_readings:
  - life
  - self
  rationale: The term can denote the whole living self, but in this fixed Deuteronomic expression 'heart and soul' is both accurate and theologically resonant. The translation avoids over-specifying anthropology while preserving the source's total-devotion language.
  doctrine_reference: Translation philosophy §§3, 5, 6
