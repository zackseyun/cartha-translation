id: DEU.30.7
reference: Deuteronomy 30:7
source:
  edition: WLC
  text: וְ/נָתַן֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ אֵ֥ת כָּל הָ/אָל֖וֹת הָ/אֵ֑לֶּה עַל אֹיְבֶ֥י/ךָ וְ/עַל שֹׂנְאֶ֖י/ךָ אֲשֶׁ֥ר רְדָפֽוּ/ךָ־־־׃
translation:
  text: And Yahweh your God will put all these curses on your enemies and on those who hate you, who pursued you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all these oaths'; in Deuteronomy this term commonly refers to covenant curses or sanctions.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַן
  chosen: will put
  alternatives:
  - will set
  - will place
  - will give
  lexicon: HALOT
  rationale: נתן has a broad semantic range including 'give, put, set.' With 'all these curses' as object and 'on your enemies' following, 'will put' is idiomatic English and preserves the sense of imposing these curses upon others.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'The construct with 2ms suffix is straightforwardly possessive: ''your God.'' Combined with YHWH, the full covenantal address is ''the LORD your God.'''
- source_word: כָּל הָאָלוֹת הָאֵלֶּה
  chosen: all these curses
  alternatives:
  - all these oaths
  - all these imprecations
  lexicon: HALOT
  rationale: אָלָה in Deuteronomic covenant context refers to covenant curses rather than merely spoken oaths. 'All these curses' best matches the immediate literary context of Deuteronomy's blessings and curses.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  - against
  lexicon: HALOT
  rationale: The preposition marks the target upon whom the curses fall. 'On' is natural modern English and sufficiently formal.
- source_word: אֹיְבֶיךָ
  chosen: your enemies
  lexicon: HALOT
  rationale: Standard rendering of אויב in plural construct with suffix.
- source_word: וְעַל שֹׂנְאֶיךָ
  chosen: and on those who hate you
  alternatives:
  - and on your haters
  - and on those who are hostile to you
  lexicon: HALOT
  rationale: Although a more formally parallel rendering would be 'and on your haters,' English style favors the relative expression 'those who hate you.' This preserves the participial force without awkwardness.
- source_word: אֲשֶׁר רְדָפוּךָ
  chosen: who pursued you
  alternatives:
  - who persecuted you
  - who chased you
  lexicon: HALOT
  rationale: רדף commonly means 'pursue, chase, persecute.' In this national-oppression context, 'pursued' is broad and faithful, avoiding over-interpretation while retaining hostility.
