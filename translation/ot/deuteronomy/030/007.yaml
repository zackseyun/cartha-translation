- issue: Rendering of the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Meaning of אָלוֹת in covenant context
  chosen_reading: curses
  alternative_readings:
  - oaths
  rationale: In Deuteronomy 30, the referent is the covenant sanctions previously pronounced. Translating as 'curses' reflects the contextual sense rather than the broader lexical possibility of 'oaths.'
