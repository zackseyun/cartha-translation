theological_decisions:
- issue: Idiomatic force of שׁוּב אֶת־שְׁבוּת
  chosen_reading: restore your fortunes
  alternative_readings:
  - restore your captivity
  - bring back your captives
  rationale: The phrase is a recognized Hebrew restoration idiom. Rendering it woodenly as 'restore your captivity' is obscure in English, and 'bring back your captives' would shift the object from the addressee's condition to literal captives, which is less likely here. The following clause already states the concrete regathering from exile.
- issue: Force of the second וְשָׁב
  chosen_reading: he will gather you again
  alternative_readings:
  - he will return and gather you
  rationale: The Hebrew permits either a separate verb ('return') or an adverbial/restorative nuance ('again'). The chosen rendering preserves the sense in clear English without implying a theological distinction not explicit in the text.
