id: DEU.30.3
reference: Deuteronomy 30:3
source:
  edition: WLC
  text: וְ/שָׁ֨ב יְהוָ֧ה אֱלֹהֶ֛י/ךָ אֶת שְׁבוּתְ/ךָ֖ וְ/רִחֲמֶ֑/ךָ וְ/שָׁ֗ב וְ/קִבֶּצְ/ךָ֙ מִ/כָּל הָ֣/עַמִּ֔ים אֲשֶׁ֧ר הֱפִֽיצְ/ךָ֛ יְהוָ֥ה אֱלֹהֶ֖י/ךָ שָֽׁמָּ/ה־־׃
translation:
  text: then Yahweh your God will restore your fortunes and have compassion on you, and he will gather you again from all the peoples where Yahweh your God has scattered you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'will return your captivity'; the Hebrew idiom means to restore someone from a state of distress or exile.
    reason: lexical_alternative
  - marker: b
    text: Or 'and he will return and gather you.'
    reason: alternative_reading
  - marker: c
    text: Or 'from all the nations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the covenant name while following established English convention.
- source_word: שָׁב
  chosen: will restore
  alternatives:
  - will return
  - will turn back
  lexicon: HALOT
  rationale: With אֶת שְׁבוּתְךָ, the idiom means restoration of condition/fortunes rather than a literal physical return of God. English 'restore' best captures the idiomatic sense.
- source_word: שְׁבוּתְךָ
  chosen: your fortunes
  alternatives:
  - your captivity
  - your restoration
  lexicon: HALOT
  rationale: In the idiom שׁוּב שְׁבוּת, the phrase commonly denotes reversal of plight or restoration of fortunes. 'Your captivity' is more literal but can mislead here, since the verse immediately speaks separately of regathering from the nations.
- source_word: וְרִחֲמֶךָ
  chosen: and have compassion on you
  alternatives:
  - and show you mercy
  - and pity you
  lexicon: HALOT
  rationale: רחם conveys compassionate mercy. 'Have compassion on you' is natural modern English and preserves the emotional force without archaic tone.
- source_word: וְשָׁב
  chosen: and he will gather you again
  alternatives:
  - and he will return and gather you
  - and he will again gather you
  lexicon: HALOT
  rationale: The second שָׁב may be taken adverbially with the following verb ('again') or more formally as a separate verb ('return'). In English, 'gather you again' communicates the sense clearly and avoids awkward repetition, while preserving the restoration motif.
- source_word: וְקִבֶּצְךָ
  chosen: gather you
  alternatives:
  - assemble you
  - collect you
  lexicon: HALOT
  rationale: קבץ in restoration contexts regularly refers to regathering dispersed people. 'Gather' is the most idiomatic and biblically recognizable English equivalent.
- source_word: מִכָּל הָעַמִּים
  chosen: from all the peoples
  alternatives:
  - from all the nations
  lexicon: HALOT
  rationale: עַמִּים can mean peoples or nations. 'Peoples' better reflects the plural ethnic-group sense here, though 'nations' is also possible.
- source_word: הֱפִיצְךָ
  chosen: has scattered you
  alternatives:
  - has dispersed you
  lexicon: HALOT
  rationale: פוץ in the Hiphil commonly means to scatter or disperse. 'Scattered' is the more vivid and standard rendering in exile contexts.
- source_word: שָׁמָּה
  chosen: where
  alternatives:
  - there
  lexicon: HALOT
  rationale: Though literally 'there,' in English the relative clause is more naturally rendered 'where the LORD your God has scattered you.' This preserves the locative sense idiomatically.
