id: DEU.6.2
reference: Deuteronomy 6:2
source:
  edition: WLC
  text: לְמַ֨עַן תִּירָ֜א אֶת יְהוָ֣ה אֱלֹהֶ֗י/ךָ לִ֠/שְׁמֹר אֶת כָּל חֻקֹּתָ֣י/ו וּ/מִצְוֺתָי/ו֮ אֲשֶׁ֣ר אָנֹכִ֣י מְצַוֶּ/ךָ֒ אַתָּה֙ וּ/בִנְ/ךָ֣ וּ/בֶן בִּנְ/ךָ֔ כֹּ֖ל יְמֵ֣י חַיֶּ֑י/ךָ וּ/לְמַ֖עַן יַאֲרִכֻ֥/ן יָמֶֽי/ךָ־־־־׃
translation:
  text: so that you may fear Yahweh your God, by keeping all his statutes and his commandments that I am commanding you—you and your son and your grandson—all the days of your life, and so that your days may be prolonged.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'revere the LORD your God.' The Hebrew verb can include reverence and awe as well as fear.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'you and your son and the son of your son.'
    reason: lexical_alternative
  - marker: c
    text: Or 'your days may be long.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the sake of
  lexicon: HALOT
  rationale: Introduces purpose/result. 'So that' is natural modern English and preserves the purposive force.
- source_word: תִּירָא
  chosen: you may fear
  alternatives:
  - you may revere
  - you may stand in awe of
  lexicon: HALOT
  rationale: The verb ירא commonly denotes fear/reverence toward God. 'Fear' preserves the covenantal and theological weight better than the softer 'revere,' while 'may' reflects the purposive construction after לְמַעַן.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with 2ms suffix; preserves covenant relationship language.
- source_word: לִשְׁמֹר
  chosen: by keeping
  alternatives:
  - to keep
  - to observe
  lexicon: HALOT
  rationale: The infinitive expresses the manner/means by which the fear of the LORD is manifested. 'By keeping' makes the relation clear in English; 'observe' is possible but less natural for modern readers.
- source_word: חֻקֹּתָיו
  chosen: his statutes
  alternatives:
  - his decrees
  - his ordinances
  lexicon: HALOT
  rationale: חקים often refers to prescribed enactments. 'Statutes' is a standard, reasonably transparent rendering that distinguishes it from commandments.
- source_word: מִצְוֺתָיו
  chosen: his commandments
  alternatives:
  - his commands
  lexicon: HALOT
  rationale: Maintains distinction from חֻקֹּתָיו and preserves the formal covenantal register.
- source_word: אֲשֶׁר אָנֹכִי מְצַוֶּךָ
  chosen: that I am commanding you
  alternatives:
  - which I command you
  - that I command you today
  lexicon: HALOT
  rationale: The participle מְצַוֶּה has present/imperfective force here. 'I am commanding you' reflects the ongoing speech situation. 'Today' is not present in this verse and should not be imported from nearby context.
- source_word: אַתָּה וּבִנְךָ וּבֶן בִּנְךָ
  chosen: you—you and your son and your grandson
  alternatives:
  - you, your son, and your son's son
  - you and your children and grandchildren
  lexicon: HALOT
  rationale: The Hebrew explicitly lists three generations and fronting אַתָּה adds emphasis. The dash preserves the appositional/emphatic feel. 'Grandson' is idiomatic for 'son of your son' without overgeneralizing to all descendants.
- source_word: כֹּל יְמֵי חַיֶּיךָ
  chosen: all the days of your life
  alternatives:
  - all your life
  - throughout your lifetime
  lexicon: HALOT
  rationale: A fairly literal and idiomatic rendering that preserves the distributive sense of 'all the days.'
- source_word: וּלְמַעַן
  chosen: and so that
  alternatives:
  - and in order that
  - so that
  lexicon: HALOT
  rationale: Marks a second purpose/result clause linked to the first. Including 'and' reflects the conjunction.
- source_word: יַאֲרִכֻן יָמֶיךָ
  chosen: your days may be prolonged
  alternatives:
  - your days may be long
  - you may live long
  lexicon: HALOT
  rationale: The Hiphil of ארך with 'days' means to make days long/prolong them. 'Your days may be prolonged' stays close to the Hebrew while remaining natural. It also avoids over-paraphrasing into a generalized promise.
