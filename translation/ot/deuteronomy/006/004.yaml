theological_decisions:
- issue: Syntax and sense of the Shema's final clause
  chosen_reading: the LORD our God, the LORD is one
  alternative_readings:
  - the LORD is our God, the LORD alone
  - the LORD our God is one LORD
  rationale: The Hebrew permits more than one construal because of verbless clause
    structure. The chosen rendering preserves the classic monotheistic affirmation
    with minimal expansion and avoids importing an exclusivity gloss ('alone') into
    the main text where the Hebrew adjective is simply אֶחָד. Because the alternatives
    are longstanding and plausible, they are preserved in a footnote rather than suppressed.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it); Contested terms table for יְהוָה
