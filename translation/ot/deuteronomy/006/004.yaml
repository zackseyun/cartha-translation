id: DEU.6.4
reference: Deuteronomy 6:4
source:
  edition: WLC
  text: שְׁמַ֖ יִשְׂרָאֵ֑ל יְהוָ֥ה אֱלֹהֵ֖י/נוּ יְהוָ֥ה אֶחָֽ׀׃
translation:
  text: 'Hear, Israel: the LORD our God, the LORD is one.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the LORD is our God, the LORD alone'; alternatively, 'the LORD our
      God is one LORD.' The Hebrew wording is compact and allows more than one syntactically
      plausible rendering.
    reason: alternative_reading
lexical_decisions:
- source_word: שְׁמַע
  chosen: Hear
  alternatives:
  - Listen
  - Hearken
  lexicon: HALOT
  rationale: Imperative singular addressed to Israel as a corporate people. 'Hear'
    preserves both the auditory sense and the covenantal call to heed, while remaining
    idiomatic and traditional without being archaic.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Proper name of the covenant people; transliterated per translation philosophy.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies יְהוָה default rendering as 'the LORD,' following
    Jewish reverence tradition and the Septuagintal pattern. Both occurrences are
    rendered consistently.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  alternatives:
  - our gods
  lexicon: HALOT
  rationale: Though morphologically plural in form, with 1cp suffix it commonly functions
    as a singular title for Israel's God in this covenantal context. 'Our God' reflects
    standard Hebrew usage and the immediate monotheistic confession.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - alone
  - unique
  lexicon: HALOT
  rationale: Basic adjectival/numerical sense is 'one.' In this verse it can imply
    uniqueness or exclusivity, but the most textually transparent rendering is 'one,'
    allowing the theological force to remain without interpretive overtranslation.
