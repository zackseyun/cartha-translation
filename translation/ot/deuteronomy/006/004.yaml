id: DEU.6.4
reference: Deuteronomy 6:4
source:
  edition: WLC
  text: שְׁמַ֖ יִשְׂרָאֵ֑ל יְהוָ֥ה אֱלֹהֵ֖י/נוּ יְהוָ֥ה אֶחָֽ׀׃
translation:
  text: 'Hear, Israel: Yahweh our God, Yahweh is one.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the LORD is our God, the LORD alone'; alternatively, 'the LORD our God is one LORD.' The Hebrew wording is compact and allows more than one syntactically plausible rendering.
    reason: alternative_reading
lexical_decisions:
- source_word: שְׁמַע
  chosen: Hear
  alternatives:
  - Listen
  - Hearken
  lexicon: HALOT
  rationale: Imperative singular addressed to Israel as a corporate people. 'Hear' preserves both the auditory sense and the covenantal call to heed, while remaining idiomatic and traditional without being archaic.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Proper name of the covenant people; transliterated per translation philosophy.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  alternatives:
  - our gods
  lexicon: HALOT
  rationale: Though morphologically plural in form, with 1cp suffix it commonly functions as a singular title for Israel's God in this covenantal context. 'Our God' reflects standard Hebrew usage and the immediate monotheistic confession.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - alone
  - unique
  lexicon: HALOT
  rationale: Basic adjectival/numerical sense is 'one.' In this verse it can imply uniqueness or exclusivity, but the most textually transparent rendering is 'one,' allowing the theological force to remain without interpretive overtranslation.
