theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file explicitly sets 'the LORD' as the default rendering
    for YHWH. This preserves reverential convention and aligns with the translation's
    stated policy while avoiding unnecessary novelty in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Anthropological terms in the command of love
  chosen_reading: heart ... soul ... might
  alternative_readings:
  - heart ... life ... strength
  - mind included within 'heart'
  rationale: The Hebrew presents overlapping terms for the whole person rather than
    sharply separated faculties. The translation preserves the source's theological
    tension and holistic anthropology instead of resolving the terms into a modern
    psychological scheme.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension
    rather than resolve it
