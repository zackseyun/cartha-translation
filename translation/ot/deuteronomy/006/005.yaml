id: DEU.6.5
reference: Deuteronomy 6:5
source:
  edition: WLC
  text: וְ/אָ֣הַבְתָּ֔ אֵ֖ת יְהוָ֣ה אֱלֹהֶ֑י/ךָ בְּ/כָל לְבָבְ/ךָ֥ וּ/בְ/כָל נַפְשְׁ/ךָ֖
    וּ/בְ/כָל מְאֹדֶֽ/ךָ־־־׃
translation:
  text: And you shall love the LORD your God with all your heart and with all your
    soul and with all your might.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'soul' (nephesh) can also mean 'life' or 'self.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'might' (me'od) is literally related to 'muchness' and can denote
      strength, intensity, or resources.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָהַבְתָּ
  chosen: And you shall love
  alternatives:
  - and you must love
  - and love
  lexicon: HALOT
  rationale: Qal perfect 2ms with prefixed conjunction in this legal-exhortative context
    functions imperativally/futurally. 'You shall love' preserves the covenant-command
    force in idiomatic English without weakening it to mere prediction.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name, render YHWH as 'the LORD' rather
    than transliteration, following established covenantal convention and the stated
    translation policy.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: Though morphologically plural in form, אֱלֹהִים with singular referent
    and pronominal suffix here clearly denotes Israel's God; 'your God' is the idiomatic
    and contextual sense.
- source_word: בְּכָל
  chosen: with all
  alternatives:
  - in all
  - by all
  lexicon: HALOT
  rationale: The preposition ב with כָּל in this construction expresses totality of
    devotion by means of the whole person. 'With all' is the natural English equivalent
    and preserves the repeated emphatic structure.
- source_word: לְבָבְךָ
  chosen: your heart
  alternatives:
  - your inner self
  - your mind
  lexicon: HALOT
  rationale: לֵבָב/לֵב in Hebrew denotes the inner person, including thought and will,
    not merely emotion. 'Heart' is the standard and sufficiently broad English rendering
    here; narrowing it to 'mind' would over-specify.
- source_word: נַפְשְׁךָ
  chosen: your soul
  alternatives:
  - your life
  - your self
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote soul, life, self, or living being. In this triadic
    formulation, 'soul' best preserves the traditional and holistic sense of one's
    animating life/person, while alternatives remain lexically possible.
- source_word: מְאֹדֶךָ
  chosen: your might
  alternatives:
  - your strength
  - your very muchness
  - all that you have
  lexicon: HALOT
  rationale: מְאֹד is literally 'muchness/abundance' and unusually used substantivally
    here to express total capacity or resources. 'Might' is a concise, established
    rendering that captures comprehensive strength/intensity without flattening the
    idiom.
