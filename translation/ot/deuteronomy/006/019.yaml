theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This preserves covenantal resonance in readable English without transliterating
    the name in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of דִּבֶּר in covenant context
  chosen_reading: has spoken
  alternative_readings:
  - spoke
  - promised
  rationale: The verse grounds Israel's victory in what the LORD previously said.
    'Has spoken' preserves the lexical sense of דבר while allowing the continuing
    validity of the divine word to remain felt. 'Promised' is a legitimate contextual
    inference but slightly over-interprets the verb.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
