id: DEU.6.19
reference: Deuteronomy 6:19
source:
  edition: WLC
  text: לַ/הֲדֹ֥ף אֶת כָּל אֹיְבֶ֖י/ךָ מִ/פָּנֶ֑י/ךָ כַּ/אֲשֶׁ֖ר דִּבֶּ֥ר יְהוָֽה־־׃ס
translation:
  text: to drive out all your enemies from before you, as the LORD has spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spoke'; the Hebrew verb is literally 'spoke,' with the sense of a prior
      divine word that remains in force.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from before you,' an idiom for removing enemies from one's path
      or presence.
    reason: cultural_note
lexical_decisions:
- source_word: לַ/הֲדֹף
  chosen: to drive out
  alternatives:
  - to thrust away
  - to push back
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ל expresses purpose/result continuing
    from the previous verse. The verb נדף in the Hiphil here conveys causing enemies
    to be removed or driven away. 'Drive out' is idiomatic modern English and fits
    conquest context better than the more wooden 'thrust away.'
- source_word: אֶת
  chosen: '[direct object marker, untranslated]'
  rationale: Hebrew direct object marker has no direct English equivalent and is therefore
    not represented in the translation.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: '''All'' straightforwardly renders the totalizing force of כָּל before
    the plural noun.'
- source_word: אֹיְבֶיךָ
  chosen: your enemies
  alternatives:
  - those hostile to you
  lexicon: HALOT
  rationale: Standard rendering of אויב with 2ms suffix. 'Your enemies' is natural
    and preserves the personal address to Israel in the singular.
- source_word: מִפָּנֶיךָ
  chosen: from before you
  alternatives:
  - from your presence
  - before you
  lexicon: HALOT
  rationale: Literally 'from your face/presence.' In military context, 'from before
    you' preserves the Hebrew idiom and communicates removal from Israel's path. A
    more dynamic 'before you' would lose the prefixed מן, while 'from your presence'
    sounds less idiomatic in English.
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - according as
  lexicon: HALOT
  rationale: Introduces comparison/correspondence with the divine promise. 'As' is
    concise and natural.
- source_word: דִּבֶּר
  chosen: has spoken
  alternatives:
  - spoke
  - promised
  lexicon: HALOT
  rationale: Though morphologically a perfect, in this covenantal context English
    present perfect best conveys a prior divine utterance with abiding force. 'Promised'
    is interpretive; 'spoken' stays closer to the Hebrew verb דבר.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the translation's
    stated policy.
