id: DEU.6.17
reference: Deuteronomy 6:17
source:
  edition: WLC
  text: שָׁמ֣וֹר תִּשְׁמְר֔וּ/ן אֶת מִצְוֺ֖ת יְהוָ֣ה אֱלֹהֵי/כֶ֑ם וְ/עֵדֹתָ֥י/ו וְ/חֻקָּ֖י/ו
    אֲשֶׁ֥ר צִוָּֽ/ךְ־׃
translation:
  text: You shall diligently keep the commandments of the LORD your God, and his testimonies
    and his statutes, which he has commanded you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'must surely keep' / 'shall carefully observe'; the Hebrew uses an infinitive
      absolute with the finite verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: '''Testimonies'' can also be rendered ''decrees'' or ''covenant stipulations.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמוֹר תִּשְׁמְרוּן
  chosen: shall diligently keep
  alternatives:
  - must surely keep
  - shall carefully keep
  - shall surely observe
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect of שׁמר intensifies the verbal
    idea. 'Diligently keep' captures both the imperative force and the emphasis in
    natural English without sounding wooden. 'Observe' is possible, but 'keep' better
    fits covenant-command language in English.
- source_word: מִצְוֺת
  chosen: the commandments
  alternatives:
  - the commands
  lexicon: HALOT
  rationale: מצוה commonly denotes commanded obligations. 'Commandments' preserves
    the formal covenantal tone and aligns with the legal context of Deuteronomy.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the Septuagintal
    pattern.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: The construct with the divine name yields 'the LORD your God,' the standard
    covenant formula in Deuteronomy.
- source_word: עֵדֹתָיו
  chosen: his testimonies
  alternatives:
  - his decrees
  - his covenant stipulations
  lexicon: HALOT
  rationale: עֵדוֹת in Deuteronomy refers to covenantal witness-bearing stipulations.
    'Testimonies' is the more direct lexical rendering and preserves the distinctiveness
    from the surrounding legal terms, even if slightly less common in contemporary
    English.
- source_word: חֻקָּיו
  chosen: his statutes
  alternatives:
  - his ordinances
  - his prescribed rules
  lexicon: HALOT
  rationale: חֹק/חֻקָּה often denotes prescribed enactments. 'Statutes' is a standard
    and suitably formal rendering that distinguishes it from 'commandments' and 'testimonies.'
- source_word: אֲשֶׁר צִוָּךְ
  chosen: which he has commanded you
  alternatives:
  - that he commanded you
  lexicon: HALOT
  rationale: The relative clause most naturally modifies the preceding legal terms
    collectively. The perfect is rendered with present relevance in English ('has
    commanded') to fit the ongoing covenant obligation. Although the morphology table
    marks a 2fs suffix, the verse context and standard text are understood generically/plurally
    in address; English 'you' preserves this without over-specifying gender or number.
