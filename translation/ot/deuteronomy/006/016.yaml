- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to make the allusion to Exodus 17 explicit in the main text
  chosen_reading: Keep the historical reference as 'at Massah' without expanding it
  alternative_readings:
  - at the place of testing
  - at Massah, the place of testing
  rationale: The Hebrew uses the place name בַּמַּסָּה. Expanding the allusion in the main text would add interpretive material not explicit in the verse. The connection can be preserved in a footnote.
