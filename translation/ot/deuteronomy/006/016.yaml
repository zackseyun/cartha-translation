id: DEU.6.16
reference: Deuteronomy 6:16
source:
  edition: WLC
  text: לֹ֣א תְנַסּ֔וּ אֶת יְהוָ֖ה אֱלֹהֵי/כֶ֑ם כַּ/אֲשֶׁ֥ר נִסִּיתֶ֖ם בַּ/מַּסָּֽה־׃
translation:
  text: You shall not test Yahweh your God, as you tested him at Massah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Massah was the place where Israel tested the LORD in the wilderness (Exod 17:1–7); the name is associated with 'testing.'
    reason: cross_reference
  - marker: b
    text: Or 'You shall not put the LORD your God to the test.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Standard negation particle introducing the prohibition.
- source_word: תְנַסּוּ
  chosen: shall test
  alternatives:
  - must not test
  - shall put to the test
  - shall try
  lexicon: HALOT
  rationale: Piel imperfect 2mp of נסה in a prohibitive construction with לֹא. 'Test' is the most natural modern English equivalent and preserves the covenantal warning without over-paraphrase. 'Put to the test' is possible but less concise.
- source_word: אֶת
  chosen: '[direct object marker, untranslated]'
  lexicon: HALOT
  rationale: Marks the definite direct object and is not represented directly in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Construct form with 2mp suffix; 'your God' is the straightforward possessive rendering.
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - like
  lexicon: HALOT
  rationale: Introduces the comparison with the prior historical event. 'As' is concise and accurate.
- source_word: נִסִּיתֶם
  chosen: you tested
  alternatives:
  - you put to the test
  - you tried
  lexicon: HALOT
  rationale: Same verb נסה in the Piel perfect 2mp, referring back to Israel's past action. Rendering it consistently as 'tested' preserves the lexical link.
- source_word: בַּמַּסָּה
  chosen: at Massah
  alternatives:
  - at the testing place
  lexicon: HALOT
  rationale: Massah is a place name and should be transliterated rather than translated in the main text. The name is associated with 'testing,' but the narrative reference is best preserved by the proper name.
