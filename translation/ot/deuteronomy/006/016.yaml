theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This also aligns with the covenantal address in Deuteronomy and standard
    English readability.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to make the allusion to Exodus 17 explicit in the main text
  chosen_reading: Keep the historical reference as 'at Massah' without expanding it
  alternative_readings:
  - at the place of testing
  - at Massah, the place of testing
  rationale: The Hebrew uses the place name בַּמַּסָּה. Expanding the allusion in
    the main text would add interpretive material not explicit in the verse. The connection
    can be preserved in a footnote.
  doctrine_reference: 'Translation philosophy: original-language primacy; never paraphrase
    beyond what the source text warrants.'
