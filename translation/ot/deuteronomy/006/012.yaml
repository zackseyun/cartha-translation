theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering עֲבָדִים in the exodus formula
  chosen_reading: slaves
  alternative_readings:
  - slavery
  - bondage
  - servants
  rationale: The phrase describes Egypt as a place of actual enslavement. In line with the translation philosophy's preference for plain bonded-status language where salient, 'slaves' is chosen over the more traditional but less concrete 'bondage.'
