id: DEU.6.12
reference: Deuteronomy 6:12
source:
  edition: WLC
  text: הִשָּׁ֣מֶר לְ/ךָ֔ פֶּן תִּשְׁכַּ֖ח אֶת יְהוָ֑ה אֲשֶׁ֧ר הוֹצִֽיאֲ/ךָ֛ מֵ/אֶ֥רֶץ מִצְרַ֖יִם מִ/בֵּ֥ית עֲבָדִֽים־־׃
translation:
  text: Be careful lest you forget Yahweh, who brought you out of the land of Egypt, out of the house of slavery.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'from the house of slavery.' The Hebrew is literally 'from the house of slaves.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשָּׁמֶר
  chosen: Be careful
  alternatives:
  - Take care
  - Guard yourself
  - Watch yourself
  lexicon: HALOT
  rationale: Niphal imperative of שׁמר here functions as a warning to be on guard. 'Be careful' is natural modern English and preserves the imperative force without sounding wooden.
- source_word: לְךָ
  chosen: you
  alternatives:
  - yourself
  lexicon: HALOT
  rationale: The preposition with 2ms suffix intensifies the reflexive sense of the warning ('for yourself'). English normally leaves this implicit in 'Be careful,' though the personal address is retained by the singular/plural-neutral 'you' in context.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - so that you do not
  lexicon: HALOT
  rationale: Introduces a negative warning clause. 'Lest' is concise and fits the solemn register of the passage better than more colloquial alternatives.
- source_word: תִּשְׁכַּח
  chosen: you forget
  alternatives:
  - you may forget
  lexicon: HALOT
  rationale: Qal imperfect after פֶּן expresses the danger to be avoided. 'Forget' is the straightforward lexical sense and in Deuteronomy carries covenantal overtones of neglecting or failing to remember the LORD's acts.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - that
  lexicon: HALOT
  rationale: Relative pronoun introducing the clause describing the LORD. 'Who' is appropriate for a personal antecedent in English.
- source_word: הוֹצִיאֲךָ
  chosen: brought you out
  alternatives:
  - led you out
  - caused you to come out
  lexicon: HALOT
  rationale: Hiphil of יצא commonly means 'bring out' in exodus contexts. 'Brought you out' is idiomatic and preserves the established exodus motif without unnecessary expansion.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of Egypt
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'land,' which is worth retaining here for formal clarity and rhythm.
- source_word: מִבֵּית עֲבָדִים
  chosen: from the house of slaves
  alternatives:
  - from the house of slavery
  - from the slave house
  - from the house of bondage
  lexicon: HALOT
  rationale: Literally 'from the house of slaves.' Because the doctrine emphasizes rendering bonded-status terms plainly where salient, 'slaves' better reflects עֲבָדִים than the traditional abstract 'bondage.' 'House of slaves' also preserves the Hebrew concrete expression, though 'house of slavery' remains a viable idiomatic alternative.
