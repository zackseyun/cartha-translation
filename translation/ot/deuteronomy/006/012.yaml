theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God explicitly. Per DOCTRINE.md contested
    terms, the default rendering is 'the LORD' rather than a transliteration of the
    tetragrammaton.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering עֲבָדִים in the exodus formula
  chosen_reading: slaves
  alternative_readings:
  - slavery
  - bondage
  - servants
  rationale: The phrase describes Egypt as a place of actual enslavement. In line
    with the translation philosophy's preference for plain bonded-status language
    where salient, 'slaves' is chosen over the more traditional but less concrete
    'bondage.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms analogy
    for δοῦλος
