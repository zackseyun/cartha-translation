theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Gendered filial term בִנְךָ
  chosen_reading: your son
  alternative_readings:
  - your child
  rationale: The Hebrew is grammatically and semantically masculine singular, and the translation philosophy requires gender-accurate rendering rather than neutralization.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
