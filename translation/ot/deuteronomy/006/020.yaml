id: DEU.6.20
reference: Deuteronomy 6:20
source:
  edition: WLC
  text: כִּֽי יִשְׁאָלְ/ךָ֥ בִנְ/ךָ֛ מָחָ֖ר לֵ/אמֹ֑ר מָ֣ה הָ/עֵדֹ֗ת וְ/הַֽ/חֻקִּים֙
    וְ/הַ/מִּשְׁפָּטִ֔ים אֲשֶׁ֥ר צִוָּ֛ה יְהוָ֥ה אֱלֹהֵ֖י/נוּ אֶתְ/כֶֽם־׃
translation:
  text: When your son asks you in time to come, saying, ‘What is the meaning of the
    testimonies and the statutes and the judgments that the LORD our God commanded
    you?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'tomorrow'; here used idiomatically for a future time, hence 'in
      time to come.'
    reason: lexical_alternative
  - marker: b
    text: Or 'What are the testimonies and the statutes and the judgments...?' The
      Hebrew wording is more literal, while the main text brings out the implied sense
      of asking their meaning.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - If
  - For
  lexicon: HALOT
  rationale: Here כִּי introduces a future eventuality in a legal-instructional setting;
    'When' fits the expected scenario better than the more conditional 'If' or the
    explanatory 'For'.
- source_word: יִשְׁאָלְךָ
  chosen: asks you
  alternatives:
  - inquires of you
  - questions you
  lexicon: HALOT
  rationale: The verb שאל commonly means 'ask, inquire.' 'Asks you' is natural modern
    English and preserves the direct address to the father.
- source_word: בִנְךָ
  chosen: your son
  alternatives:
  - your child
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine singular. Per gender-accurate policy,
    'your son' is retained rather than neutralizing to 'your child'.
- source_word: מָחָר
  chosen: in time to come
  alternatives:
  - tomorrow
  - later
  lexicon: HALOT
  rationale: Although literally 'tomorrow,' in idiomatic contexts like this it refers
    to the future generally. 'In time to come' captures the idiom in readable English
    without flattening the temporal sense.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and says
  - asking
  lexicon: HALOT
  rationale: The infinitive introduces the content of the son's question. 'Saying'
    is a standard and sufficiently transparent rendering.
- source_word: מָה
  chosen: What is the meaning of
  alternatives:
  - What are
  - What do ... mean
  lexicon: HALOT
  rationale: A wooden 'What are the testimonies...?' is awkward in English. The question
    clearly asks for significance or explanation, so 'What is the meaning of' expresses
    the sense while staying close to the source.
- source_word: הָעֵדֹת
  chosen: the testimonies
  alternatives:
  - the decrees
  - the stipulations
  lexicon: HALOT
  rationale: עֵדוֹת is distinct from the following legal terms and often carries the
    sense of covenantal testimonies/witnessing ordinances. 'Testimonies' preserves
    that distinctiveness better than collapsing it into a generic legal term.
- source_word: הַחֻקִּים
  chosen: the statutes
  alternatives:
  - the decrees
  - the ordinances
  lexicon: HALOT
  rationale: '''Statutes'' is a standard rendering for חֻקִּים and maintains distinction
    from both ''testimonies'' and ''judgments.'''
- source_word: הַמִּשְׁפָּטִים
  chosen: the judgments
  alternatives:
  - the rules
  - the ordinances
  lexicon: HALOT
  rationale: מִשְׁפָּטִים often denotes judgments or legal decisions. 'Judgments'
    preserves the legal nuance and keeps the triad differentiated.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Straightforward possessive construction; 'our God' preserves the covenantal
    relationship expressed in the Hebrew.
- source_word: צִוָּה ... אֶתְכֶם
  chosen: commanded you
  alternatives:
  - has commanded you
  - commanded you all
  lexicon: HALOT
  rationale: The verb is singular with a 2mp object. English 'you' can represent the
    plural addressees naturally. Simple past fits the narrative instruction context.
