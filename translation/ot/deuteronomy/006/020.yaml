theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD,' following the stated doctrine
    and established reverential convention while preserving covenantal force.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered filial term בִנְךָ
  chosen_reading: your son
  alternative_readings:
  - your child
  rationale: The Hebrew is grammatically and semantically masculine singular, and
    the translation philosophy requires gender-accurate rendering rather than neutralization.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
