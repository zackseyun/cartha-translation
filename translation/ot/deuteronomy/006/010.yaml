id: DEU.6.10
reference: Deuteronomy 6:10
source:
  edition: WLC
  text: וְ/הָיָ֞ה כִּ֥י יְבִיאֲ/ךָ֣ יְהוָ֣ה אֱלֹהֶ֗י/ךָ אֶל הָ/אָ֜רֶץ אֲשֶׁ֨ר נִשְׁבַּ֧ע לַ/אֲבֹתֶ֛י/ךָ לְ/אַבְרָהָ֛ם לְ/יִצְחָ֥ק וּֽ/לְ/יַעֲקֹ֖ב לָ֣/תֶת לָ֑/ךְ עָרִ֛ים גְּדֹלֹ֥ת וְ/טֹבֹ֖ת אֲשֶׁ֥ר לֹא בָנִֽיתָ׀־־׃
translation:
  text: And when Yahweh your God brings you into the land that he swore to your fathers—to Abraham, to Isaac, and to Jacob—to give you, with great and good cities that you did not build,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your ancestors.' The Hebrew says 'your fathers,' and the context specifically names Abraham, Isaac, and Jacob.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  chosen: And when
  alternatives:
  - And it shall be, when
  - Now when
  lexicon: HALOT
  rationale: This construction introduces a future circumstance or ensuing situation. 'And when' preserves the forward-looking narrative linkage in natural modern English without the stiffness of a fully formal 'and it shall be, when.'
- source_word: יְבִיאֲךָ
  chosen: brings you into
  alternatives:
  - brings you
  - causes you to enter
  lexicon: HALOT
  rationale: Hiphil of בוא commonly has a causative sense, 'bring in/bring into.' 'Brings you into' is idiomatic and preserves the causative force.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'The construct with second masculine singular suffix is straightforwardly possessive: ''your God.'''
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the country
  lexicon: HALOT
  rationale: In Deuteronomy, הארץ in covenantal promise contexts is best rendered 'the land,' preserving the theological and narrative connection to the promised land.
- source_word: אֲשֶׁר נִשְׁבַּע
  chosen: that he swore
  alternatives:
  - which he swore
  - that he promised with an oath
  lexicon: HALOT
  rationale: The Niphal of שׁבע means 'swear, take an oath.' 'That he swore' is concise and preserves the oath language without paraphrase.
- source_word: לַאֲבֹתֶיךָ
  chosen: to your fathers
  alternatives:
  - to your ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural and refers to the patriarchal forefathers. 'Fathers' is gender-accurate and contextually precise; 'ancestors' would flatten the patriarchal specificity.
- source_word: לְאַבְרָהָם לְיִצְחָק וּלְיַעֲקֹב
  chosen: to Abraham, to Isaac, and to Jacob
  lexicon: HALOT
  rationale: Personal names are transliterated by standard conventions, and the repeated preposition is retained in English for rhetorical clarity and fidelity.
- source_word: לָתֶת לָךְ
  chosen: to give you
  alternatives:
  - to give to you
  lexicon: HALOT
  rationale: Infinitive of purpose with pronominal complement; 'to give you' is natural English and fully preserves the sense.
- source_word: עָרִים גְּדֹלֹת וְטֹבֹת
  chosen: great and good cities
  alternatives:
  - large and prosperous cities
  - great and fine cities
  lexicon: HALOT
  rationale: גדל denotes size or greatness; טוב here conveys desirability/quality. 'Great and good cities' stays close to the Hebrew while remaining intelligible. More interpretive options like 'prosperous' go beyond the immediate wording.
- source_word: אֲשֶׁר לֹא בָנִיתָ
  chosen: that you did not build
  alternatives:
  - which you did not build
  lexicon: HALOT
  rationale: A simple relative clause with negated perfect second masculine singular. 'That you did not build' is direct and idiomatic.
