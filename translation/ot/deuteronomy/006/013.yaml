id: DEU.6.13
reference: Deuteronomy 6:13
source:
  edition: WLC
  text: אֶת יְהוָ֧ה אֱלֹהֶ֛י/ךָ תִּירָ֖א וְ/אֹת֣/וֹ תַעֲבֹ֑ד וּ/בִ/שְׁמ֖/וֹ תִּשָּׁבֵֽעַ־׃
translation:
  text: You shall fear Yahweh your God, and him you shall serve, and by his name you shall swear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'revere the LORD your God'; the Hebrew verb includes reverential fear and awe, not merely terror.
    reason: lexical_alternative
  - marker: b
    text: Or 'worship him'; the Hebrew verb commonly means 'serve' and in context includes worshipful service.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Construct form with 2ms suffix naturally yields 'your God'; paired with YHWH in covenantal address.
- source_word: תִּירָא
  chosen: you shall fear
  alternatives:
  - you shall revere
  - you shall be in awe of
  lexicon: HALOT
  rationale: ירא in covenant exhortation includes reverential fear and awe. 'Fear' is the most direct and traditional equivalent and preserves the full semantic weight without reducing it to mere respect.
- source_word: וְאֹתוֹ
  chosen: and him
  alternatives:
  - and him alone
  lexicon: HALOT
  rationale: The direct-object pronoun is explicit in Hebrew and is retained for emphasis. 'Alone' is not overtly present in this verse, though exclusivity is implied by context; therefore it is not added to the main text.
- source_word: תַעֲבֹד
  chosen: you shall serve
  alternatives:
  - you shall worship
  lexicon: HALOT
  rationale: עבד broadly means 'serve' and in covenantal/religious contexts can imply worshipful service. 'Serve' is closer to the lexical form and preserves the practical covenantal dimension; 'worship' is a contextual interpretation better left as an alternative.
- source_word: וּבִשְׁמוֹ
  chosen: and by his name
  alternatives:
  - and in his name
  lexicon: HALOT
  rationale: The preposition ב with 'name' in oath contexts is best rendered 'by,' indicating the basis or authority invoked in swearing.
- source_word: תִּשָּׁבֵעַ
  chosen: you shall swear
  alternatives:
  - you shall take oaths
  lexicon: HALOT
  rationale: The Niphal of שׁבע means 'to swear, take an oath.' 'Swear' is concise and idiomatic here, especially with 'by his name.'
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: HALOT
  rationale: Direct-object marker has no standalone English equivalent; its function is represented in the syntax of the clause.
