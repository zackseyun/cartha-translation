theological_decisions:
- issue: Whether to soften 'fear' into 'revere' in describing the proper response to God
  chosen_reading: Retain 'fear' in the main text
  alternative_readings:
  - revere
  - stand in awe of
  rationale: The Hebrew verb carries reverential fear, not mere terror, but translating it as 'revere' alone risks narrowing the term and diminishing the covenantal seriousness of the command. Preserving 'fear' maintains the theological tension between awe, obedience, and holy dread.
  doctrine_reference: Translation philosophy §3, §6
- issue: Whether to render עבד as 'serve' or 'worship'
  chosen_reading: Render as 'serve'
  alternative_readings:
  - worship
  rationale: The text commands covenant loyalty expressed in service to God. 'Serve' preserves the lexical breadth and avoids importing a narrower liturgical sense, while still allowing worshipful implications to remain present.
  doctrine_reference: Translation philosophy §1, §5
