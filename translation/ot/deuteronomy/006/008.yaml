id: DEU.6.8
reference: Deuteronomy 6:8
source:
  edition: WLC
  text: וּ/קְשַׁרְתָּ֥/ם לְ/א֖וֹת עַל יָדֶ֑/ךָ וְ/הָי֥וּ לְ/טֹטָפֹ֖ת בֵּ֥ין עֵינֶֽי/ךָ־׃
translation:
  text: And you shall bind them as a sign on your hand, and they shall be as frontlets
    between your eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'phylacteries,' referring to small cases worn in later Jewish practice;
      the Hebrew term is rare and more literally denotes forehead ornaments or bands.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּקְשַׁרְתָּם
  chosen: And you shall bind them
  alternatives:
  - And tie them
  - And fasten them
  lexicon: HALOT
  rationale: 'Qal perfect with prefixed conjunction in instructional sequence functions
    imperativally/futurally: ''you shall bind them.'' ''Bind'' preserves the concrete
    action better than the looser ''tie'' while remaining natural English. The 3mp
    suffix ''them'' refers back to the words/commands of the preceding context and
    should be retained explicitly.'
- source_word: לְאוֹת
  chosen: as a sign
  alternatives:
  - for a sign
  - as a mark
  lexicon: HALOT
  rationale: אוֹת commonly means 'sign' or 'mark.' 'As a sign' fits the לְ of designation
    and reads naturally in English. 'Sign' preserves the symbolic force without overinterpreting
    the practice.
- source_word: עַל יָדֶךָ
  chosen: on your hand
  alternatives:
  - upon your hand
  - on your arm
  lexicon: HALOT
  rationale: יָד normally means 'hand,' though in some contexts it can extend to the
    arm. Here 'hand' is the plain lexical sense and matches the Hebrew wording closely;
    'arm' would be interpretive.
- source_word: וְהָיוּ
  chosen: and they shall be
  alternatives:
  - and let them be
  - and they will be
  lexicon: HALOT
  rationale: The verb continues the instructional sequence. 'They shall be' preserves
    the formal parallelism with the previous clause and reflects the Hebrew without
    weakening it into mere prediction.
- source_word: לְטֹטָפֹת
  chosen: as frontlets
  alternatives:
  - as bands
  - as phylacteries
  lexicon: HALOT
  rationale: טֹטָפֹת is a rare term traditionally understood as something worn on
    the forehead. 'Frontlets' is a transparent English rendering that preserves the
    object’s placement/function without importing the later, more historically specific
    term 'phylacteries' into the main text. Because the exact referent is debated
    and 'phylacteries' is a known traditional interpretation, that alternative is
    preserved in a footnote.
- source_word: בֵּין עֵינֶיךָ
  chosen: between your eyes
  alternatives:
  - on your forehead
  - before your eyes
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'between your eyes.' Retaining the literal
    expression preserves the imagery and leaves open the question of whether the command
    is strictly physical, symbolic, or both. 'On your forehead' is interpretive and
    therefore better left as an alternative.
