theological_decisions:
- issue: Whether the command should be rendered in a way that resolves the long-standing
    debate between literal bodily practice and metaphorical/internalized remembrance
  chosen_reading: Retain the concrete wording without resolving whether the command
    is literal, symbolic, or both
  alternative_readings:
  - Render more interpretively as a metaphor for constant remembrance
  - Render more specifically as a reference to later phylactery practice
  rationale: The Hebrew uses concrete bodily imagery. In keeping with the translation
    philosophy, the wording should preserve the textual tension rather than decide
    the interpretive question in translation. The main text therefore stays close
    to the Hebrew while a footnote preserves the more specific traditional term.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
