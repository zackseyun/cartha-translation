theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, preserving reverential convention and alignment with the Septuagintal/Lord
    pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Relationship of singular 'commandment' to plural 'statutes and judgments'
  chosen_reading: 'Retain both, with singular as a collective heading: ''the commandment—the
    statutes and the judgments'''
  alternative_readings:
  - 'Smooth to all-plural: ''the commandments, statutes, and judgments'''
  rationale: The Hebrew text has singular מִצְוָה followed by plural categories. Preserving
    the number distinction reflects the source text and avoids harmonizing away a
    likely summary-plus-expansion structure.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #5'
