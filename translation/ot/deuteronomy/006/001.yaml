id: DEU.6.1
reference: Deuteronomy 6:1
source:
  edition: WLC
  text: וְ/זֹ֣את הַ/מִּצְוָ֗ה הַֽ/חֻקִּים֙ וְ/הַ/מִּשְׁפָּטִ֔ים אֲשֶׁ֥ר צִוָּ֛ה יְהוָ֥ה
    אֱלֹהֵי/כֶ֖ם לְ/לַמֵּ֣ד אֶתְ/כֶ֑ם לַ/עֲשׂ֣וֹת בָּ/אָ֔רֶץ אֲשֶׁ֥ר אַתֶּ֛ם עֹבְרִ֥ים
    שָׁ֖מָּ/ה לְ/רִשְׁתָּֽ/הּ׃
translation:
  text: Now this is the commandment—the statutes and the judgments—that the LORD your
    God commanded to teach you, so that you may do them in the land into which you
    are crossing, to possess it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And this is the commandment—the statutes and the judgments.' The opening
      conjunction can be rendered 'and,' and 'judgments' may also be translated 'ordinances.'
    reason: lexical_alternative
  - marker: b
    text: '''The LORD'' renders the divine name YHWH; alternatively, some translations
      use ''Yahweh.'''
    reason: alternative_reading
  - marker: c
    text: Or 'to take possession of it' or 'to inherit it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזֹאת
  chosen: Now this is
  alternatives:
  - And this is
  lexicon: HALOT
  rationale: The conjunction plus demonstrative introduces a new section while linking
    it to what precedes. 'Now this is' gives natural English discourse flow without
    losing the connective force; 'And this is' is possible but less idiomatic here.
- source_word: הַמִּצְוָה
  chosen: the commandment
  alternatives:
  - the command
  lexicon: HALOT
  rationale: Singular מִצְוָה likely functions as a heading or collective summary
    for the covenantal instruction that is then unpacked by 'the statutes and the
    judgments.' 'Commandment' preserves the established covenantal/legal nuance better
    than the flatter 'command'.
- source_word: הַחֻקִּים
  chosen: the statutes
  alternatives:
  - the decrees
  - the prescriptions
  lexicon: HALOT
  rationale: חֻקִּים commonly refers to fixed enactments. 'Statutes' is a standard
    and suitably formal legal term in English that preserves the distinct category.
- source_word: וְהַמִּשְׁפָּטִים
  chosen: and the judgments
  alternatives:
  - and the rules
  - and the ordinances
  lexicon: HALOT
  rationale: מִשְׁפָּטִים denotes judgments/legal decisions or ordinances. 'Judgments'
    keeps the lexical connection to משפט and preserves the legal-covenantal register.
    'Ordinances' is possible, but using 'judgments' better distinguishes it from חֻקִּים.
- source_word: אֲשֶׁר צִוָּה
  chosen: that ... commanded
  alternatives:
  - which ... commanded
  lexicon: HALOT
  rationale: A straightforward relative clause. 'That ... commanded' is idiomatic
    modern English and preserves the verbal force of צוה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding covenantal usage.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Construct with second person plural suffix is naturally rendered 'your
    God.'
- source_word: לְלַמֵּד אֶתְכֶם
  chosen: to teach you
  alternatives:
  - for teaching you
  - to instruct you
  lexicon: HALOT
  rationale: The infinitive expresses purpose/result tied to the command. 'To teach
    you' is direct and natural; 'instruct' is possible but less transparent.
- source_word: לַעֲשׂוֹת
  chosen: so that you may do them
  alternatives:
  - to do
  - to observe
  lexicon: HALOT
  rationale: Although the Hebrew infinitive is simply 'to do,' English benefits from
    making the purpose relation explicit after 'commanded to teach you.' Adding 'them'
    clarifies that the statutes and judgments are the implied object. 'Observe' is
    interpretive and less literal than 'do.'
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the הארץ/land
  lexicon: HALOT
  rationale: Standard rendering of the phrase in Deuteronomy's covenantal-geographical
    context.
- source_word: אֲשֶׁר אַתֶּם עֹבְרִים שָׁמָּה
  chosen: into which you are crossing
  alternatives:
  - which you are crossing over to
  - where you are going over
  lexicon: HALOT
  rationale: The participle עֹבְרִים with directional שָׁמָּה conveys imminent movement
    into the land. 'Into which you are crossing' preserves the motion and destination
    concisely. 'Crossing over' could also work, but 'crossing' is smoother in English
    here.
- source_word: לְרִשְׁתָּהּ
  chosen: to possess it
  alternatives:
  - to take possession of it
  - to inherit it
  lexicon: HALOT
  rationale: ירשׁ in Deuteronomy often carries the sense of taking possession/inheriting
    the land. 'Possess it' is concise and traditional; 'inherit it' is possible but
    can overemphasize passive reception, while the context includes active entry and
    occupation.
