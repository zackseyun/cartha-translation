theological_decisions:
- issue: Nature of the promised abundance
  chosen_reading: Material provisions received by Israel through God's gift, without
    adding moral evaluation beyond the text
  alternative_readings:
  - A warning-laden paraphrase in the verse itself
  - An implication that the goods are illicitly taken
  rationale: The verse catalogs houses, water sources, and cultivated land that Israel
    did not produce. The theological force is divine gift and inherited abundance,
    but the verse itself does not yet state the warning; that comes in the next verse.
    The translation therefore preserves the list plainly without importing interpretive
    expansion.
  doctrine_reference: Translation philosophy items 1 and 3
- issue: Second person singular address
  chosen_reading: Retain singular 'you' throughout
  alternative_readings:
  - Convert to plural 'you all' or 'you' as corporate plural in English
  rationale: Hebrew addresses Israel in the singular, a common covenantal style in
    Deuteronomy. English 'you' preserves this without awkward expansion, maintaining
    the representative singular force.
  doctrine_reference: Translation philosophy item 4
