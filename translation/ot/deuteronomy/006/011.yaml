id: DEU.6.11
reference: Deuteronomy 6:11
source:
  edition: WLC
  text: וּ/בָ֨תִּ֜ים מְלֵאִ֣ים כָּל טוּב֮ אֲשֶׁ֣ר לֹא מִלֵּאתָ֒ וּ/בֹרֹ֤ת חֲצוּבִים֙
    אֲשֶׁ֣ר לֹא חָצַ֔בְתָּ כְּרָמִ֥ים וְ/זֵיתִ֖ים אֲשֶׁ֣ר לֹא נָטָ֑עְתָּ וְ/אָכַלְתָּ֖
    וְ/שָׂבָֽעְתָּ־־־־׃
translation:
  text: and houses full of every good thing that you did not fill, and cisterns hewn
    out that you did not hew, vineyards and olive trees that you did not plant—and
    you eat and are satisfied—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wells.' The Hebrew more precisely refers to cisterns cut into rock for
      storing water.
    reason: lexical_alternative
  - marker: b
    text: Or 'and you will eat and be full.' The Hebrew verbs continue the sequence
      of what will happen when Israel enters the land.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָתִּים
  chosen: houses
  alternatives:
  - homes
  lexicon: HALOT
  rationale: Standard concrete rendering of the plural noun; 'houses' fits the list
    of material provisions and preserves the physical sense better than the more affective
    'homes'.
- source_word: מְלֵאִים כָּל טוּב
  chosen: full of every good thing
  alternatives:
  - filled with all good things
  - full of all kinds of good things
  lexicon: HALOT
  rationale: Combines the participle 'full' with כָּל טוּב in a natural English expression.
    'Good thing' here refers broadly to desirable goods/provisions, not moral goodness
    alone.
- source_word: אֲשֶׁר לֹא מִלֵּאתָ
  chosen: that you did not fill
  alternatives:
  - which you did not fill
  lexicon: HALOT
  rationale: Direct relative clause preserving the second masculine singular address
    and the contrast between Israel's lack of labor and God's gift.
- source_word: בֹרֹת
  chosen: cisterns
  alternatives:
  - wells
  - pits
  lexicon: HALOT
  rationale: In this settlement context, בּוֹרֹת commonly refers to water-storage
    cisterns cut into rock rather than naturally supplied wells. 'Cisterns' is more
    precise than 'wells'.
- source_word: חֲצוּבִים
  chosen: hewn out
  alternatives:
  - dug
  - cut
  lexicon: HALOT
  rationale: The passive participle from חצב denotes something cut/hewn, especially
    from rock. 'Hewn out' matches the likely construction of cisterns.
- source_word: אֲשֶׁר לֹא חָצַבְתָּ
  chosen: that you did not hew
  alternatives:
  - that you did not dig out
  - that you did not cut
  lexicon: HALOT
  rationale: Keeps lexical correspondence with חֲצוּבִים and preserves the imagery
    of cutting rock rather than ordinary digging.
- source_word: כְּרָמִים
  chosen: vineyards
  alternatives:
  - grapevines
  lexicon: HALOT
  rationale: Refers to cultivated vineyard plots rather than individual vines; 'vineyards'
    is the normal English equivalent.
- source_word: זֵיתִים
  chosen: olive trees
  alternatives:
  - olives
  - olive groves
  lexicon: HALOT
  rationale: The bare plural can denote olive trees/plantings. 'Olive trees' is the
    clearest English rendering in a list of planted resources; 'olive groves' would
    add collectivity not explicit in the Hebrew.
- source_word: אֲשֶׁר לֹא נָטָעְתָּ
  chosen: that you did not plant
  alternatives:
  - which you did not plant
  lexicon: HALOT
  rationale: Straightforward rendering preserving the repeated pattern of inherited
    goods not produced by the addressee.
- source_word: וְאָכַלְתָּ
  chosen: and you eat
  alternatives:
  - and you will eat
  - then you will eat
  lexicon: HALOT
  rationale: The qatal with prefixed waw in this context continues the future/result
    sequence from the surrounding passage. English present 'you eat' can sound vivid
    but slightly less explicit; retained here to mirror the Hebrew sequence while
    the context implies future consequence.
- source_word: וְשָׂבָעְתָּ
  chosen: and are satisfied
  alternatives:
  - and be full
  - and be satisfied
  lexicon: HALOT
  rationale: Conveys satiation/completion after eating. 'Are satisfied' is idiomatic
    and broader than merely physical fullness, while still fitting the immediate context
    of food and provision.
