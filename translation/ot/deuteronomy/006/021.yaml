id: DEU.6.21
reference: Deuteronomy 6:21
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֣ לְ/בִנְ/ךָ֔ עֲבָדִ֛ים הָיִ֥ינוּ לְ/פַרְעֹ֖ה בְּ/מִצְרָ֑יִם וַ/יּוֹצִיאֵ֧/נוּ יְהוָ֛ה מִ/מִּצְרַ֖יִם בְּ/יָ֥ד חֲזָקָֽה׃
translation:
  text: then you shall say to your son, ‘We were slaves to Pharaoh in Egypt, and Yahweh brought us out from Egypt with a strong hand.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and you shall say.' The Hebrew conjunction can be rendered simply 'and'; 'then' brings out the instructional sequence from the previous verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'with a mighty hand.' The Hebrew idiom refers to the LORD's powerful act of deliverance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ
  chosen: then you shall say
  alternatives:
  - and you shall say
  lexicon: HALOT
  rationale: The conjunction ו plus perfect with instructional force in this context continues the apodosis from the previous verse. 'Then you shall say' makes the sequence clear in natural English while preserving the directive sense.
- source_word: לְבִנְךָ
  chosen: to your son
  alternatives:
  - to your child
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine singular, 'your son.' Per the gender-accurate policy, the masculine form is retained rather than neutralized.
- source_word: עֲבָדִים
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: HALOT
  rationale: The noun denotes persons in bondage. In this exodus context, the bonded nature is salient, so 'slaves' better reflects the force of the Hebrew than the softer 'servants.'
- source_word: הָיִינוּ
  chosen: we were
  lexicon: HALOT
  rationale: Simple past of היה fits the retrospective statement of Israel's former condition.
- source_word: לְפַרְעֹה
  chosen: to Pharaoh
  alternatives:
  - belonging to Pharaoh
  - under Pharaoh
  lexicon: HALOT
  rationale: The preposition ל marks relation/subjection here. 'To Pharaoh' is a concise, idiomatic rendering in English when paired with 'slaves,' conveying ownership/subjection.
- source_word: בְּמִצְרָיִם
  chosen: in Egypt
  lexicon: HALOT
  rationale: Locative beth is straightforwardly rendered 'in Egypt.'
- source_word: וַיּוֹצִיאֵנוּ
  chosen: brought us out
  alternatives:
  - led us out
  lexicon: HALOT
  rationale: The hiphil of יצא means 'cause to go out, bring out.' 'Brought us out' is the standard and contextually apt exodus wording.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִמִּצְרַיִם
  chosen: from Egypt
  alternatives:
  - out of Egypt
  lexicon: HALOT
  rationale: The preposition מן marks source. 'From Egypt' works naturally after 'brought us out'; 'out of Egypt' is possible but slightly redundant in English.
- source_word: בְּיָד חֲזָקָה
  chosen: with a strong hand
  alternatives:
  - by a mighty hand
  - with a mighty hand
  lexicon: HALOT
  rationale: This idiom denotes powerful action. 'Strong hand' is a fairly literal rendering of חֲזָקָה and remains intelligible in English. 'Mighty hand' is traditional and idiomatic, but 'strong' more directly reflects the adjective used.
