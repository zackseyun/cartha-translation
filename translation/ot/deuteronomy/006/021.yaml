  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Degree of bondage in עֲבָדִים
  chosen_reading: slaves
  alternative_readings:
  - servants
  - bondservants
  rationale: The exodus context emphasizes Israel's oppressive bondage under Pharaoh. Rendering the term as 'slaves' preserves the historical and theological weight of deliverance from slavery.
