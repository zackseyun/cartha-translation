id: DEU.6.14
reference: Deuteronomy 6:14
source:
  edition: WLC
  text: לֹ֣א תֵֽלְכ֔וּ/ן אַחֲרֵ֖י אֱלֹהִ֣ים אֲחֵרִ֑ים מֵ/אֱלֹהֵי֙ הָֽ/עַמִּ֔ים אֲשֶׁ֖ר
    סְבִיבוֹתֵי/כֶֽם׃
translation:
  text: You shall not go after other gods, from the gods of the peoples who are around
    you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'You shall not follow other gods, any of the gods
      of the peoples around you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Standard negation particle introducing a prohibition.
- source_word: תֵלְכוּן
  chosen: you shall go
  alternatives:
  - you must go
  - you are to go
  lexicon: HALOT
  rationale: Qal imperfect 2mp of הלך in prohibitive context after לֹא is naturally
    rendered as an English prohibition with 'shall not.'
- source_word: אַחֲרֵי
  chosen: after
  alternatives:
  - following
  lexicon: HALOT
  rationale: With הלך, the idiom means 'go after/follow.' 'After' preserves the Hebrew
    idiom and its covenantal sense of allegiance.
- source_word: אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  lexicon: HALOT
  rationale: The phrase straightforwardly denotes deities other than the God of Israel.
    'Other gods' is the standard and most transparent rendering; 'foreign gods' adds
    a nuance not explicit in אֲחֵרִים.
- source_word: מֵאֱלֹהֵי
  chosen: from the gods of
  alternatives:
  - among the gods of
  lexicon: HALOT
  rationale: 'The prefixed מ here is partitive: ''from among/out of the gods of.''
    Rendering it explicitly as ''from the gods of'' preserves the Hebrew construction,
    though English is slightly less idiomatic.'
- source_word: הָעַמִּים
  chosen: the peoples
  alternatives:
  - the nations
  lexicon: HALOT
  rationale: עַמִּים commonly means 'peoples.' 'Nations' is possible, but 'peoples'
    more closely matches the lexical sense here.
- source_word: אֲשֶׁר סְבִיבֹתֵיכֶם
  chosen: who are around you
  alternatives:
  - that are around you
  - surrounding you
  lexicon: HALOT
  rationale: This relative clause modifies 'the peoples.' 'Who are around you' is
    natural English while preserving the local sense of surrounding neighboring peoples.
