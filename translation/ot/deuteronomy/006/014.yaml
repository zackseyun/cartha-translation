theological_decisions:
- issue: Nature of the prohibition
  chosen_reading: A covenantal prohibition against pursuing or aligning with other
    deities.
  alternative_readings:
  - A narrower prohibition only against literal physical movement toward pagan shrines.
  rationale: The idiom 'go after' in Deuteronomy regularly denotes religious allegiance
    and worship, not merely physical motion. The translation preserves the idiom without
    over-paraphrasing it into 'worship.'
