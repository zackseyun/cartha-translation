theological_decisions:
- issue: Gendered filial term in covenant instruction
  chosen_reading: to your sons
  alternative_readings:
  - to your children
  rationale: The Hebrew is explicitly masculine plural ('your sons'). In keeping with
    the translation philosophy's gender-accurate principle, the main text preserves
    the source form rather than broadening it in translation. The broader household
    application can be preserved in a footnote without altering the lexical form of
    the text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
