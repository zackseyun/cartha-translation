id: DEU.6.7
reference: Deuteronomy 6:7
source:
  edition: WLC
  text: וְ/שִׁנַּנְתָּ֣/ם לְ/בָנֶ֔י/ךָ וְ/דִבַּרְתָּ֖ בָּ֑/ם בְּ/שִׁבְתְּ/ךָ֤ בְּ/בֵיתֶ֨/ךָ֙
    וּ/בְ/לֶכְתְּ/ךָ֣ בַ/דֶּ֔רֶךְ וּֽ/בְ/שָׁכְבְּ/ךָ֖ וּ/בְ/קוּמֶֽ/ךָ׃
translation:
  text: You shall teach them diligently to your sons, and you shall speak of them
    when you sit in your house, and when you walk on the road, and when you lie down,
    and when you rise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'impress them on'; the Hebrew verb literally has the sense of sharpening,
      here used metaphorically for repeated, careful instruction.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your sons'; by extension this instruction applies within the household
      more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁנַּנְתָּם
  chosen: you shall teach them diligently
  alternatives:
  - you shall sharpen them
  - you shall impress them on
  lexicon: HALOT
  rationale: The verb שׁנן literally relates to sharpening, but in this pedagogical
    context it idiomatically means to inculcate or teach with repetition and care.
    'Teach them diligently' preserves the intensive force without becoming opaque.
    Alternatives are worth noting because 'impress them on' is common in English tradition
    and reflects the metaphorical force.
- source_word: לְבָנֶיךָ
  chosen: to your sons
  alternatives:
  - to your children
  lexicon: HALOT
  rationale: The Hebrew noun בנים here is specifically masculine plural with second
    masculine singular suffix, literally 'your sons.' Per the gender-accurate policy,
    the main text preserves the masculine form rather than neutralizing to 'children,'
    though the broader representative force may be noted as an alternative.
- source_word: וְדִבַּרְתָּ בָּם
  chosen: and you shall speak of them
  alternatives:
  - and you shall speak them
  - and you shall talk about them
  lexicon: HALOT
  rationale: The preposition ב with pronominal suffix after דבר is most naturally
    rendered 'speak of/about them' in idiomatic English. 'Talk about them' is natural
    but slightly more colloquial; 'speak of them' better matches the register and
    keeps close to the Hebrew.
- source_word: בְּשִׁבְתְּךָ בְּבֵיתֶךָ
  chosen: when you sit in your house
  alternatives:
  - while you sit in your house
  - when you are sitting in your house
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב conveys a temporal circumstance.
    'When you sit in your house' is concise and natural, preserving the habitual setting.
- source_word: וּבְלֶכְתְּךָ בַדֶּרֶךְ
  chosen: and when you walk on the road
  alternatives:
  - and when you walk by the way
  - and when you travel on the road
  lexicon: HALOT
  rationale: דרך is literally 'way/road.' 'On the road' communicates ordinary travel
    in contemporary English better than the traditional 'by the way,' which can be
    misunderstood idiomatically in modern English.
- source_word: וּבְשָׁכְבְּךָ
  chosen: and when you lie down
  alternatives:
  - and at your lying down
  lexicon: HALOT
  rationale: The phrase denotes the time of going to bed or reclining. 'When you lie
    down' is the most natural temporal rendering in English.
- source_word: וּבְקוּמֶךָ
  chosen: and when you rise
  alternatives:
  - and when you get up
  - and at your rising
  lexicon: HALOT
  rationale: The phrase denotes rising up, especially from sleep. 'When you rise'
    is natural, slightly elevated, and pairs well with 'when you lie down'.
