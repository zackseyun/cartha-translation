id: DEU.6.18
reference: Deuteronomy 6:18
source:
  edition: WLC
  text: וְ/עָשִׂ֛יתָ הַ/יָּשָׁ֥ר וְ/הַ/טּ֖וֹב בְּ/עֵינֵ֣י יְהוָ֑ה לְמַ֨עַן֙ יִ֣יטַב
    לָ֔/ךְ וּ/בָ֗אתָ וְ/יָֽרַשְׁתָּ֙ אֶת הָ/אָ֣רֶץ הַ/טֹּבָ֔ה אֲשֶׁר נִשְׁבַּ֥ע יְהוָ֖ה
    לַ/אֲבֹתֶֽי/ךָ־־׃
translation:
  text: And you shall do what is right and good in the eyes of the LORD, so that it
    may go well for you, and you may go in and take possession of the good land that
    the LORD swore to your fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'inherit the good land.' The Hebrew verb can mean 'inherit,' 'possess,'
      or 'take possession of'; here it refers to Israel's entering and possessing
      the land promised by oath.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: you shall do
  alternatives:
  - you must do
  - you are to do
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this instructional context carries
    directive force looking forward; 'you shall do' preserves the covenantal-command
    tone without over-paraphrase.
- source_word: הַיָּשָׁר
  chosen: what is right
  alternatives:
  - the upright
  - what is ישר/straight
  lexicon: HALOT
  rationale: The adjective denotes what is straight/upright/right. In idiomatic English
    with the paired adjective following, 'what is right' best conveys ethical correctness.
- source_word: וְהַטּוֹב
  chosen: and good
  alternatives:
  - and what is good
  lexicon: HALOT
  rationale: Kept coordinate with הַיָּשָׁר. English compresses the pair naturally
    as 'what is right and good,' preserving both terms rather than collapsing them
    into one idea.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This is a common Hebrew evaluative idiom. 'In the eyes of' is transparent
    and preserves the metaphor; 'the LORD' follows the doctrinal default for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, יְהוָה is rendered 'the LORD'
    in the main text.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the sake of
  lexicon: HALOT
  rationale: Introduces purpose/result. 'So that' is natural modern English and preserves
    the clause relationship.
- source_word: יִיטַב לָךְ
  chosen: it may go well for you
  alternatives:
  - it may be well with you
  - you may prosper
  lexicon: HALOT
  rationale: This idiom expresses well-being or favorable outcome. 'It may go well
    for you' is standard, clear English and avoids narrowing the sense to material
    prosperity.
- source_word: וּבָאתָ
  chosen: you may go in
  alternatives:
  - you shall enter
  - you may enter
  lexicon: HALOT
  rationale: Literally 'and you come/go in.' In sequence with the purpose clause,
    'you may go in' fits the volitional/result sense and preserves the movement into
    the land.
- source_word: וְיָרַשְׁתָּ
  chosen: and take possession of
  alternatives:
  - and inherit
  - and possess
  lexicon: HALOT
  rationale: ירשׁ can mean inherit/possess/dispossess. Here, regarding Israel's entry
    into the land, 'take possession of' best captures active covenantal possession
    without implying merely passive inheritance.
- source_word: הָאָרֶץ הַטּוֹבָה
  chosen: the good land
  alternatives:
  - the pleasant land
  - the fertile land
  lexicon: HALOT
  rationale: A straightforward attributive phrase; 'good land' preserves the evaluative
    language of the Hebrew without interpretive expansion.
- source_word: אֲשֶׁר נִשְׁבַּע יְהוָה
  chosen: that the LORD swore
  alternatives:
  - which the LORD swore
  - that the LORD promised with an oath
  lexicon: HALOT
  rationale: נשבע explicitly refers to swearing an oath. 'Swore' keeps the covenant-oath
    force stronger than simply 'promised.'
- source_word: לַאֲבֹתֶיךָ
  chosen: to your fathers
  alternatives:
  - to your ancestors
  lexicon: HALOT
  rationale: The Hebrew is specifically 'your fathers,' and the translation philosophy
    prefers gender-accurate renderings over neutralizing. 'Ancestors' is possible
    but less precise to the source wording.
