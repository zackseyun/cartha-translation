theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines specify 'the LORD' as the default rendering,
    following Jewish reverence tradition and the Septuagintal pattern. No footnote
    is required because this is the stated default rather than a verse-specific ambiguity.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered kinship term in לַאֲבֹתֶיךָ
  chosen_reading: to your fathers
  alternative_readings:
  - to your ancestors
  rationale: The Hebrew explicitly uses a masculine plural kinship term. Per the translation
    philosophy, gender-accurate rendering is preferred unless context clearly demands
    a generic abstraction. Here the patriarchal covenant reference is historically
    specific.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
