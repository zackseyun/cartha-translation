- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This preserves covenantal continuity and follows the stated translation
    policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Gendered kinship term in אֱלֹהֵי אֲבֹתֶיךָ
  chosen_reading: the God of your fathers
  alternative_readings:
