id: DEU.6.3
reference: Deuteronomy 6:3
source:
  edition: WLC
  text: וְ/שָׁמַעְתָּ֤ יִשְׂרָאֵל֙ וְ/שָׁמַרְתָּ֣ לַ/עֲשׂ֔וֹת אֲשֶׁר֙ יִיטַ֣ב לְ/ךָ֔ וַ/אֲשֶׁ֥ר תִּרְבּ֖וּ/ן מְאֹ֑ד כַּ/אֲשֶׁר֩ דִּבֶּ֨ר יְהוָ֜ה אֱלֹהֵ֤י אֲבֹתֶ֨י/ךָ֙ לָ֔/ךְ אֶ֛רֶץ זָבַ֥ת חָלָ֖ב וּ/דְבָֽשׁ׃פ
translation:
  text: So hear, Israel, and be careful to do it, that it may go well with you and that you may multiply greatly, just as Yahweh, the God of your fathers, has spoken to you, in a land flowing with milk and honey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the God of your ancestors.' The Hebrew reads 'your fathers.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'as the LORD, the God of your fathers, promised you, a land flowing with milk and honey.' The Hebrew wording is compressed and can be understood with 'a land flowing with milk and honey' in apposition to what the LORD spoke concerning.
    reason: alternative_reading
lexical_decisions:
- source_word: וְשָׁמַעְתָּ
  chosen: hear
  alternatives:
  - listen
  - obey
  lexicon: HALOT
  rationale: שׁמע can mean hear, listen, or obey depending on context. Here, with Israel as vocative and followed by keeping/doing, 'hear' preserves the Hebrew wording while allowing the obedience nuance to emerge from the larger clause rather than being imported into this verb alone.
- source_word: וְשָׁמַרְתָּ לַעֲשׂוֹת
  chosen: be careful to do it
  alternatives:
  - keep to do
  - observe to do
  - carefully do
  lexicon: HALOT
  rationale: The combination of שׁמר with an infinitive of עשה expresses careful observance leading to action. 'Be careful to do it' is idiomatic English that preserves both guarding/observing and actual performance. 'It' is supplied in English for clarity from the implied covenant instruction.
- source_word: אֲשֶׁר יִיטַב לְךָ
  chosen: that it may go well with you
  alternatives:
  - so that it may be good for you
  - that it may be well for you
  lexicon: HALOT
  rationale: This is a common Deuteronomic idiom. 'Go well with you' is natural modern English and preserves the benefactive sense without flattening it into mere moral goodness.
- source_word: וַאֲשֶׁר תִּרְבּוּן מְאֹד
  chosen: and that you may multiply greatly
  alternatives:
  - and that you may increase greatly
  - and that you may become very many
  lexicon: HALOT
  rationale: רבה in this context refers to numerical increase. 'Multiply greatly' keeps the covenantal resonance of population growth and matches the intensifier מְאֹד.
- source_word: כַּאֲשֶׁר דִּבֶּר
  chosen: just as ... has spoken
  alternatives:
  - as ... spoke
  - just as ... promised
  lexicon: HALOT
  rationale: The perfect verb refers to the LORD's prior covenant word. 'Has spoken' preserves the verbal idea without over-interpreting it as 'promised,' though promise is implied by context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי אֲבֹתֶיךָ
  chosen: the God of your fathers
  alternatives:
  - the God of your ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine/plural 'fathers.' Following the gender-accurate policy, 'fathers' is retained rather than neutralized to 'ancestors.'
- source_word: לָךְ
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: Although the form is morphologically feminine singular in the table, in context it functions idiomatically after דִּבֶּר as the indirect object of speaking. 'To you' is the most straightforward English rendering.
- source_word: אֶרֶץ זָבַת חָלָב וּדְבָשׁ
  chosen: a land flowing with milk and honey
  alternatives:
  - a land that flows with milk and honey
  lexicon: HALOT
  rationale: This is a fixed covenantal description of the promised land. 'Flowing with milk and honey' is both accurate and idiomatic in English.
