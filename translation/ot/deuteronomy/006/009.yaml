id: DEU.6.9
reference: Deuteronomy 6:9
source:
  edition: WLC
  text: וּ/כְתַבְתָּ֛/ם עַל מְזוּזֹ֥ת בֵּיתֶ֖/ךָ וּ/בִ/שְׁעָרֶֽי/ךָ־׃ס
translation:
  text: You shall write them on the doorposts of your house and on your gates.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'doorframes.' The Hebrew term refers specifically to the posts of a doorway.
    reason: lexical_alternative
  - marker: b
    text: Or 'and on your gateposts' / 'and at your gates.' The Hebrew can refer to
      the gate area or its structural entrance posts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְתַבְתָּם
  chosen: You shall write them
  alternatives:
  - and you shall write them
  - write them
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this command sequence functions
    injunctively/futuristically in context, naturally rendered as 'you shall write
    them.' The object suffix 'them' refers back to the words/commands of the preceding
    context and should be retained explicitly.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: The preposition straightforwardly indicates inscription placement. 'On'
    is idiomatic modern English while preserving the spatial sense.
- source_word: מְזוּזֹת
  chosen: doorposts
  alternatives:
  - doorframes
  - mezuzot
  lexicon: HALOT
  rationale: The noun denotes the doorposts or side-posts of an entrance. 'Doorposts'
    is the clearest natural English equivalent. 'Mezuzot' would be an unnecessary
    transliteration here, and 'doorframes' is broader and less precise.
- source_word: בֵּיתֶךָ
  chosen: of your house
  alternatives:
  - of your home
  lexicon: HALOT
  rationale: '''House'' closely matches בַּיִת and preserves the concrete household
    setting. ''Home'' is possible but slightly more interpretive and less formally
    tied to the physical structure named in the Hebrew.'
- source_word: וּבִשְׁעָרֶיךָ
  chosen: and on your gates
  alternatives:
  - and on your gateposts
  - and at your gates
  lexicon: HALOT
  rationale: שַׁעַר commonly refers to a gate, especially the entrance area of a property,
    settlement, or compound. 'Gates' is the standard rendering and fits the plural
    construct with suffix. Repeating 'on' in English clarifies the parallel with the
    first phrase and reflects the implied inscription location.
