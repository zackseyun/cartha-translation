id: DEU.6.23
reference: Deuteronomy 6:23
source:
  edition: WLC
  text: וְ/אוֹתָ֖/נוּ הוֹצִ֣יא מִ/שָּׁ֑ם לְמַ֨עַן֙ הָבִ֣יא אֹתָ֔/נוּ לָ֤/תֶת לָ֨/נוּ֙
    אֶת הָ/אָ֔רֶץ אֲשֶׁ֥ר נִשְׁבַּ֖ע לַ/אֲבֹתֵֽי/נוּ־׃
translation:
  text: And he brought us out from there, so that he might bring us in, to give us
    the land that he swore to our fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''to our ancestors.'' Hebrew: ''to our fathers.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֹתָנוּ
  chosen: And us
  alternatives:
  - And we
  - Now us
  lexicon: HALOT
  rationale: Fronted direct object with conjunction; in idiomatic English the object
    is incorporated into the clause as 'And he brought us out.' The conjunction is
    retained as 'And' to preserve discourse continuity.
- source_word: הוֹצִיא
  chosen: brought ... out
  alternatives:
  - led ... out
  - took ... out
  lexicon: HALOT
  rationale: Hiphil of יצא commonly means 'bring out' or 'lead out.' 'Brought us out'
    preserves the exodus idiom and pairs naturally with the later 'bring us in,' reflecting
    the Hebrew verbal contrast.
- source_word: מִשָּׁם
  chosen: from there
  alternatives:
  - out of there
  - from that place
  lexicon: HALOT
  rationale: Simple locative adverb; 'from there' is the most natural and sufficiently
    formal rendering.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the sake of
  lexicon: HALOT
  rationale: Marks purpose. 'So that' is clear modern English and preserves the purposive
    force without sounding wooden.
- source_word: הָבִיא אֹתָנוּ
  chosen: he might bring us in
  alternatives:
  - he might bring us
  - he might bring us into the land
  lexicon: HALOT
  rationale: Hiphil of בוא here has the sense of causing to enter. 'Bring us in' preserves
    the compact Hebrew expression and intentionally echoes 'brought us out.' The destination
    is then specified by the following infinitive phrase.
- source_word: לָתֵת לָנוּ
  chosen: to give us
  alternatives:
  - in order to give us
  - to grant to us
  lexicon: HALOT
  rationale: Infinitive construct of נתן with preposition expresses purpose/result
    connected to the bringing in. 'To give us' is direct and idiomatic.
- source_word: אֶת־הָאָרֶץ
  chosen: the land
  alternatives:
  - the country
  - the territory
  lexicon: HALOT
  rationale: In Deuteronomic covenant context, הָאָרֶץ refers specifically to the
    promised land. 'The land' is the standard and most theologically resonant rendering.
- source_word: אֲשֶׁר נִשְׁבַּע
  chosen: that he swore
  alternatives:
  - which he swore
  - that he promised with an oath
  lexicon: HALOT
  rationale: Niphal of שׁבע means 'swear, take an oath.' 'That he swore' preserves
    the covenant-oath language more precisely than simply 'promised.'
- source_word: לַאֲבֹתֵינוּ
  chosen: to our fathers
  alternatives:
  - to our ancestors
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'our fathers.' Per translation philosophy,
    gender-accurate language is preferred where it matches the source. 'Ancestors'
    is possible interpretively, but 'fathers' better preserves the covenantal linkage
    to the patriarchs.
