theological_decisions:
- issue: Gendered covenantal reference in לַאֲבֹתֵינוּ
  chosen_reading: to our fathers
  alternative_readings:
  - to our ancestors
  rationale: The Hebrew is explicitly masculine plural and in context points to the
    patriarchal forefathers of Israel. Following the project's gender-accurate policy,
    the masculine form is retained rather than neutralized.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Covenant-oath language in נִשְׁבַּע
  chosen_reading: that he swore
  alternative_readings:
  - that he promised
  rationale: The verse grounds the gift of the land in God's sworn oath, not merely
    a general promise. Retaining 'swore' preserves the theological weight of covenantal
    commitment.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
