id: DEU.6.24
reference: Deuteronomy 6:24
source:
  edition: WLC
  text: וַ/יְצַוֵּ֣/נוּ יְהוָ֗ה לַ/עֲשׂוֹת֙ אֶת כָּל הַ/חֻקִּ֣ים הָ/אֵ֔לֶּה לְ/יִרְאָ֖ה
    אֶת יְהוָ֣ה אֱלֹהֵ֑י/נוּ לְ/ט֥וֹב לָ֨/נוּ֙ כָּל הַ/יָּמִ֔ים לְ/חַיֹּתֵ֖/נוּ כְּ/הַ/יּ֥וֹם
    הַ/זֶּֽה־־־־׃
translation:
  text: And the LORD commanded us to do all these statutes, to fear the LORD our God,
    for our good always, to keep us alive as it is this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'all the days.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    Jewish reverence tradition and matching established covenantal usage.
- source_word: וַיְצַוֵּנוּ
  chosen: commanded us
  alternatives:
  - charged us
  - gave us command
  lexicon: HALOT
  rationale: The piel of צוה commonly denotes authoritative command. 'Commanded us'
    is the most natural and sufficiently formal rendering in context.
- source_word: לַעֲשׂוֹת
  chosen: to do
  alternatives:
  - to observe
  - to carry out
  lexicon: HALOT
  rationale: עשה is broadly 'do/make.' Here it governs the statutes; 'to do' preserves
    the Hebrew wording, while English readability is maintained by the object phrase.
- source_word: הַחֻקִּים
  chosen: statutes
  alternatives:
  - decrees
  - ordinances
  lexicon: HALOT
  rationale: חֻקִּים refers to prescribed enactments. 'Statutes' is a standard, readable
    legal term that preserves the covenant-law sense.
- source_word: הָאֵלֶּה
  chosen: these
  alternatives:
  - these here
  lexicon: HALOT
  rationale: Simple demonstrative referring to the immediately discussed covenant
    commands.
- source_word: לְיִרְאָה
  chosen: to fear
  alternatives:
  - so that we might fear
  - to revere
  lexicon: HALOT
  rationale: ירא in covenant contexts includes reverential fear. 'To fear' preserves
    the theological weight and avoids softening the term to mere respect, though reverential
    nuance is understood.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Straightforward construct with first person plural suffix; covenantal
    possession is important in context.
- source_word: לְטוֹב לָנוּ
  chosen: for our good
  alternatives:
  - for good to us
  - for our benefit
  lexicon: HALOT
  rationale: This prepositional phrase expresses purpose/result beneficial to Israel.
    'For our good' is idiomatic and close to the Hebrew.
- source_word: כָּל הַיָּמִים
  chosen: always
  alternatives:
  - all the days
  - all our days
  lexicon: HALOT
  rationale: Literally 'all the days.' In English, 'always' communicates the durative
    sense naturally. The literal alternative is preserved in a footnote because it
    is a viable formal rendering.
- source_word: לְחַיֹּתֵנוּ
  chosen: to keep us alive
  alternatives:
  - to preserve us alive
  - to let us live
  lexicon: HALOT
  rationale: The infinitive with suffix expresses the purpose/result of preserving
    life. 'To keep us alive' is idiomatic and accurately conveys ongoing preservation.
- source_word: כְּהַיּוֹם הַזֶּה
  chosen: as it is this day
  alternatives:
  - as on this day
  - as today
  lexicon: HALOT
  rationale: This idiom points to the present, observable state of preservation. 'As
    it is this day' is a natural English equivalent that retains the demonstrative
    force.
