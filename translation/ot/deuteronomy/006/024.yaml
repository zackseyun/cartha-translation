theological_decisions:
- issue: Rendering ירא in covenant context
  chosen_reading: to fear the LORD our God
  alternative_readings:
  - to revere the LORD our God
  rationale: The Hebrew term includes reverence, but the text explicitly uses the
    language of fear. Preserving 'fear' maintains biblical theological tension and
    avoids interpretive softening.
  doctrine_reference: Translation philosophy §3
- issue: Rendering the purpose/result sequence of the verse
  chosen_reading: The commands are given for covenant fear, for Israel's good, and
    for their preservation in life.
  alternative_readings:
  - The commands are given merely for ethical instruction
  rationale: The verse itself links obedience with reverent fear, well-being, and
    life. The translation preserves these stated purposes without importing later
    doctrinal formulations.
