id: DEU.6.22
reference: Deuteronomy 6:22
source:
  edition: WLC
  text: וַ/יִּתֵּ֣ן יְהוָ֡ה אוֹתֹ֣ת וּ֠/מֹפְתִים גְּדֹלִ֨ים וְ/רָעִ֧ים בְּ/מִצְרַ֛יִם
    בְּ/פַרְעֹ֥ה וּ/בְ/כָל בֵּית֖/וֹ לְ/עֵינֵֽי/נוּ׀־׃
translation:
  text: And the LORD gave great and grievous signs and wonders against Egypt, against
    Pharaoh, and against all his house before our eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in Egypt'; the Hebrew preposition can be read locatively, but here it
      likely carries the sense of judgments directed against Egypt, Pharaoh, and his
      household.
    reason: lexical_alternative
  - marker: b
    text: Or 'terrible' or 'harmful' signs and wonders; Hebrew 'grievous' emphasizes
      the devastating effect of these acts on Egypt.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: gave
  alternatives:
  - set
  - performed
  lexicon: HALOT
  rationale: נתן literally means 'give/put.' In this idiom with 'signs and wonders,'
    'gave' preserves the Hebrew wording better than the more interpretive 'performed.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible convention.
- source_word: אוֹתֹת
  chosen: signs
  alternatives:
  - tokens
  lexicon: HALOT
  rationale: אות commonly denotes signs or markers. 'Signs' is the standard clear
    English rendering in the Exodus-plague context.
- source_word: מֹפְתִים
  chosen: wonders
  alternatives:
  - portents
  - miracles
  lexicon: HALOT
  rationale: מופתים paired with 'signs' is conventionally and accurately rendered
    'wonders.' 'Portents' is possible but less natural; 'miracles' is more interpretive.
- source_word: גְּדֹלִים
  chosen: great
  alternatives:
  - mighty
  lexicon: HALOT
  rationale: גדול here intensifies the signs and wonders in magnitude. 'Great' is
    straightforward and idiomatic.
- source_word: וְרָעִים
  chosen: grievous
  alternatives:
  - harmful
  - terrible
  - evil
  lexicon: HALOT
  rationale: רע can mean bad, harmful, or calamitous. Here it describes the devastating
    character of the signs and wonders for Egypt. 'Grievous' communicates severe affliction
    without implying moral evil in God.
- source_word: בְּמִצְרַיִם
  chosen: against Egypt
  alternatives:
  - in Egypt
  - on Egypt
  lexicon: HALOT
  rationale: The preposition ב can be locative ('in') or, in plague/judgment contexts,
    effectively denote the object affected. Because the following parallel phrases
    ('against Pharaoh,' 'against all his house') are clearly adversative in sense,
    'against Egypt' best captures the force in context.
- source_word: בְּפַרְעֹה
  chosen: against Pharaoh
  alternatives:
  - on Pharaoh
  - in Pharaoh
  lexicon: HALOT
  rationale: The preposition marks Pharaoh as the target of the signs and wonders.
    'Against Pharaoh' is the clearest idiomatic English rendering.
- source_word: וּבְכָל בֵּיתוֹ
  chosen: and against all his house
  alternatives:
  - and against his whole household
  - and in all his house
  lexicon: HALOT
  rationale: '''House'' in Hebrew often means household/dynasty. Here it refers to
    Pharaoh''s household broadly. ''All his house'' preserves the Hebrew expression
    while remaining understandable.'
- source_word: לְעֵינֵינוּ
  chosen: before our eyes
  alternatives:
  - in our sight
  lexicon: HALOT
  rationale: Literally 'to/for our eyes,' an idiom meaning in the direct sight of
    the speakers. 'Before our eyes' is natural and vivid English.
