theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. No contextual factor here requires deviation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of וְרָעִים in relation to divine acts
  chosen_reading: grievous
  alternative_readings:
  - terrible
  - harmful
  - evil
  rationale: The Hebrew adjective can denote calamity or harmful effect. Rendering
    it 'evil' in English could misleadingly suggest moral evil in God rather than
    severe judgments on Egypt. 'Grievous' preserves the severity while avoiding a
    doctrinally misleading implication not demanded by the text.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
