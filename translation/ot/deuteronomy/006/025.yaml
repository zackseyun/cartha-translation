theological_decisions:
- issue: Meaning of 'righteousness' in covenant-obedience context
  chosen_reading: The verse states that such obedience 'will be righteousness for
    us' in the covenantal sense of being regarded as right before God, without specifying
    a later doctrinal mechanism of imputation.
  alternative_readings:
  - The obedience will be 'justice' for us
  - This means righteousness will be credited to us in a technical forensic sense
  rationale: The Hebrew itself affirms a real connection between covenant obedience
    and righteousness, but it does not require importing later systematic categories.
    The translation preserves the text's wording and theological tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
