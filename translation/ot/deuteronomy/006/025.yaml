id: DEU.6.25
reference: Deuteronomy 6:25
source:
  edition: WLC
  text: וּ/צְדָקָ֖ה תִּֽהְיֶה לָּ֑/נוּ כִּֽי נִשְׁמֹ֨ר לַ/עֲשׂ֜וֹת אֶת כָּל הַ/מִּצְוָ֣ה
    הַ/זֹּ֗את לִ/פְנֵ֛י יְהוָ֥ה אֱלֹהֵ֖י/נוּ כַּ/אֲשֶׁ֥ר צִוָּֽ/נוּ־־־־׃ס
translation:
  text: And it will be righteousness for us, if we are careful to do all this commandment
    before the LORD our God, as he has commanded us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justice for us.' The Hebrew צְדָקָה can denote what is right or just,
      though 'righteousness' best fits this covenantal context.
    reason: lexical_alternative
  - marker: b
    text: Or 'this whole commandment.' The singular 'commandment' likely refers to
      the instruction as a unified whole.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּצְדָקָה
  chosen: righteousness
  alternatives:
  - right standing
  - justice
  lexicon: HALOT
  rationale: צְדָקָה commonly denotes righteousness or what is considered right. In
    this covenantal context, 'righteousness' best preserves the moral-forensic sense
    without flattening it into merely social 'justice.'
- source_word: תִּהְיֶה לָּנוּ
  chosen: it will be ... for us
  alternatives:
  - it shall be ... to us
  - this will count as ... for us
  lexicon: HALOT
  rationale: 'The clause is existential/predicative: ''it will be righteousness for
    us.'' This preserves the Hebrew structure and avoids importing later theological
    formulations such as ''credited'' unless explicitly warranted.'
- source_word: כִּי
  chosen: if
  alternatives:
  - because
  - when
  lexicon: HALOT
  rationale: Here כִּי introduces the condition under which the preceding statement
    holds. 'If' best captures the sense in English; 'because' would overstate causation
    and sound less natural in this construction.
- source_word: נִשְׁמֹר
  chosen: we are careful
  alternatives:
  - we keep
  - we observe
  lexicon: HALOT
  rationale: שׁמר with an infinitive of action often conveys careful observance. Rendering
    it as 'we are careful' brings out the guarding/attentive nuance before the following
    'to do.'
- source_word: לַעֲשׂוֹת
  chosen: to do
  alternatives:
  - to observe
  - to carry out
  lexicon: HALOT
  rationale: עשה is the ordinary verb 'to do/make.' 'To do' keeps the Hebrew idiom
    'be careful to do' and avoids redundancy with possible renderings of שׁמר as 'observe.'
- source_word: כָּל הַמִּצְוָה הַזֹּאת
  chosen: all this commandment
  alternatives:
  - all this command
  - this whole commandment
  lexicon: HALOT
  rationale: The singular מִצְוָה with כָּל and demonstrative likely refers to the
    commandment as a unified body of instruction in the immediate context. 'All this
    commandment' is slightly formal but closely tracks the Hebrew.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  - before the face of
  lexicon: HALOT
  rationale: לִפְנֵי denotes being before or in the presence of. 'Before' is idiomatic
    and preserves the covenantal sense of living under God's sight.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Straightforward covenant designation; 'our God' preserves both possession
    and relationship.
- source_word: כַּאֲשֶׁר צִוָּנוּ
  chosen: as he has commanded us
  alternatives:
  - just as he commanded us
  - as he commanded us
  lexicon: HALOT
  rationale: The perfect verb naturally looks to the prior giving of the command.
    'Has commanded' fits English aspect well while preserving the completed divine
    command behind present obedience.
