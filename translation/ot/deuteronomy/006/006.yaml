id: DEU.6.6
reference: Deuteronomy 6:6
source:
  edition: WLC
  text: וְ/הָי֞וּ הַ/דְּבָרִ֣ים הָ/אֵ֗לֶּה אֲשֶׁ֨ר אָנֹכִ֧י מְצַוְּ/ךָ֛ הַ/יּ֖וֹם
    עַל לְבָבֶֽ/ךָ־׃
translation:
  text: And these words that I am commanding you today shall be on your heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in your heart.' The Hebrew reads literally 'on your heart,' an idiom
      for keeping these words continually in one's inner life.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיוּ
  chosen: shall be
  alternatives:
  - are to be
  - must be
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this context carries an injunctive/future
    sense following the preceding command context, best rendered as 'shall be' in
    natural but still formal English.
- source_word: הַדְּבָרִים הָאֵלֶּה
  chosen: these words
  alternatives:
  - these matters
  - these commands
  lexicon: HALOT
  rationale: דְּבָרִים commonly means 'words' and here most naturally refers to the
    words/command just given. 'Words' preserves the lexical form better than the more
    interpretive 'commands' or 'matters'.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Standard relative marker; 'that' is the most natural modern English connector
    here.
- source_word: אָנֹכִי
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: The independent pronoun adds some emphasis, but English normally does
    not require explicit intensification here. 'I' sufficiently conveys the subject
    without overtranslation.
- source_word: מְצַוְּךָ
  chosen: am commanding you
  alternatives:
  - command you
  - am giving you as a command
  lexicon: HALOT
  rationale: The participial form gives an ongoing/immediate force in the discourse
    setting; 'am commanding you' captures the present speech-act more precisely than
    the simple present 'command you'.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: '''Today'' is the natural modern English equivalent and preserves the
    deictic immediacy of Moses'' address.'
- source_word: עַל לְבָבֶךָ
  chosen: on your heart
  alternatives:
  - upon your heart
  - in your heart
  lexicon: HALOT
  rationale: The preposition עַל is most directly 'on/upon,' and the idiom speaks
    of internalized remembrance and devotion. 'On your heart' preserves the Hebrew
    image more closely than the smoother but less literal 'in your heart'.
