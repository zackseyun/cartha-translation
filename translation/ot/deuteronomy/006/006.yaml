theological_decisions:
- issue: Anthropological idiom of לְבָב
  chosen_reading: heart
  alternative_readings:
  - mind
  - inner being
  rationale: The Hebrew 'heart' includes thought, will, and affection. Retaining 'heart'
    preserves the biblical anthropology and avoids narrowing the sense to cognition
    alone.
  doctrine_reference: Translation philosophy §1, §6
