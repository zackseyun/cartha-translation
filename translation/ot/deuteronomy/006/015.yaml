theological_decisions:
- issue: Rendering divine jealousy
  chosen_reading: a jealous God
  alternative_readings:
  - a zealous God
  rationale: The Hebrew describes God's covenantal exclusivity, not sinful envy. Retaining
    'jealous' preserves the theological tension and the established biblical category,
    while context guards against misunderstanding.
  doctrine_reference: Translation philosophy §3; preserve theological tension rather
    than resolve it
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH, while alternatives may be noted but not adopted in the main text absent
    special contextual need.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH → the LORD'
