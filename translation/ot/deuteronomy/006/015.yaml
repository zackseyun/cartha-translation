id: DEU.6.15
reference: Deuteronomy 6:15
source:
  edition: WLC
  text: כִּ֣י אֵ֥ל קַנָּ֛א יְהוָ֥ה אֱלֹהֶ֖י/ךָ בְּ/קִרְבֶּ֑/ךָ פֶּן יֶ֠חֱרֶה אַף יְהוָ֤ה
    אֱלֹהֶ֨י/ךָ֙ בָּ֔/ךְ וְ/הִשְׁמִ֣ידְ/ךָ֔ מֵ/עַ֖ל פְּנֵ֥י הָ/אֲדָמָֽה־־׃ס
translation:
  text: for the LORD your God in your midst is a jealous God, lest the anger of the
    LORD your God burn against you and he destroy you from the face of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a zealous God.' The Hebrew emphasizes the LORD's exclusive covenant
      claim over his people.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from upon the face of the ground/earth,' an idiom for being removed
      completely.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the prohibition in the previous verse; 'for'
    is the most natural English connective here.
- source_word: אֵל קַנָּא
  chosen: a jealous God
  alternatives:
  - a zealous God
  lexicon: HALOT
  rationale: The phrase denotes God's exclusive covenant claim and intolerance of
    rival worship. 'Jealous' is the established and most semantically precise rendering
    in this covenant context; 'zealous' weakens the relational exclusivity.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Construct form with second masculine singular suffix; straightforwardly
    rendered 'your God.'
- source_word: בְּקִרְבֶּךָ
  chosen: in your midst
  alternatives:
  - among you
  - within you
  lexicon: HALOT
  rationale: The phrase indicates God's presence among his people. 'In your midst'
    preserves the covenantal and spatial sense better than the more individualized
    'within you.'
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - so that not
  lexicon: HALOT
  rationale: Introduces a warning of possible consequence. 'Lest' is concise and suitably
    solemn in this legal-covenantal context.
- source_word: יֶחֱרֶה אַף
  chosen: the anger ... burn
  alternatives:
  - be kindled
  - flare up
  lexicon: HALOT
  rationale: This idiom literally involves anger burning or kindling. 'Burn' preserves
    the metaphor in readable modern English.
- source_word: בָּךְ
  chosen: against you
  alternatives:
  - in you
  lexicon: HALOT
  rationale: With verbs of anger, the preposition is idiomatically adversative in
    English; 'against you' conveys the sense clearly.
- source_word: וְהִשְׁמִידְךָ
  chosen: and he destroy you
  alternatives:
  - and he exterminate you
  - and he wipe you out
  lexicon: HALOT
  rationale: Hiphil of שׁמד conveys destruction/removal. 'Destroy' is strong, accurate,
    and avoids colloquial flattening.
- source_word: מֵעַל פְּנֵי הָאֲדָמָה
  chosen: from the face of the earth
  alternatives:
  - from upon the face of the ground
  - from the land
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for removal from the inhabited earth/ground.
    'From the face of the earth' is idiomatic English and preserves the force of total
    removal.
