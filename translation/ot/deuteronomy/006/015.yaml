theological_decisions:
- issue: Rendering divine jealousy
  chosen_reading: a jealous God
  alternative_readings:
  - a zealous God
  rationale: The Hebrew describes God's covenantal exclusivity, not sinful envy. Retaining 'jealous' preserves the theological tension and the established biblical category, while context guards against misunderstanding.
  doctrine_reference: Translation philosophy §3; preserve theological tension rather than resolve it
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
