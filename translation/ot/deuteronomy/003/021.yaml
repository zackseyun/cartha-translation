id: DEU.3.21
reference: Deuteronomy 3:21
source:
  edition: WLC
  text: וְ/אֶת יְהוֹשׁ֣וּעַ צִוֵּ֔יתִי בָּ/עֵ֥ת הַ/הִ֖וא לֵ/אמֹ֑ר עֵינֶ֣י/ךָ הָ/רֹאֹ֗ת אֵת֩ כָּל אֲשֶׁ֨ר עָשָׂ֜ה יְהוָ֤ה אֱלֹהֵי/כֶם֙ לִ/שְׁנֵי֙ הַ/מְּלָכִ֣ים הָ/אֵ֔לֶּה כֵּֽן יַעֲשֶׂ֤ה יְהוָה֙ לְ/כָל הַ/מַּמְלָכ֔וֹת אֲשֶׁ֥ר אַתָּ֖ה עֹבֵ֥ר שָֽׁמָּ/ה־־־־׃
translation:
  text: And I commanded Joshua at that time, saying, ‘Your eyes have seen all that Yahweh your God did to these two kings; so Yahweh will do to all the kingdoms through which you are passing.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more smoothly, 'all the kingdoms that you are crossing over to.' The Hebrew more literally says 'which you are crossing there.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת יְהוֹשׁוּעַ צִוֵּיתִי
  chosen: And I commanded Joshua
  alternatives:
  - And I charged Joshua
  - And I instructed Joshua
  lexicon: HALOT
  rationale: צוה commonly denotes giving a command or charge. 'Commanded' is the most direct and natural English rendering here, preserving Moses' authoritative instruction to Joshua.
- source_word: בָּעֵת הַהִוא
  chosen: at that time
  alternatives:
  - in that time
  - on that occasion
  lexicon: HALOT
  rationale: A standard temporal expression. 'At that time' is idiomatic and sufficiently formal without sounding wooden.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Retained as 'saying' to preserve the discourse-introducing formula in a readable way.
- source_word: עֵינֶיךָ הָרֹאֹת
  chosen: Your eyes have seen
  alternatives:
  - Your eyes saw
  - You yourself have seen
  lexicon: HALOT
  rationale: The construction is emphatic, literally 'your eyes are the ones seeing/have seen.' 'Your eyes have seen' preserves the vividness and direct witness motif better than the flatter 'you have seen.' Present perfect English fits the completed action with present relevance.
- source_word: אֵת כָּל אֲשֶׁר עָשָׂה
  chosen: all that ... did
  alternatives:
  - everything that ... has done
  lexicon: HALOT
  rationale: Straightforward rendering of the totalizing object clause. 'All that ... did' is concise and natural in context.
- source_word: יְהוָה אֱלֹהֵיכֶם
  chosen: the LORD your God
  alternatives:
  - the LORD your gods
  lexicon: HALOT
  rationale: 'Per doctrine, יְהוָה is rendered ''the LORD.'' Although אֱלֹהֵיכֶם is morphologically plural in form, it is the standard singular referent with second person plural suffix: ''your God.'''
- source_word: לִשְׁנֵי הַמְּלָכִים הָאֵלֶּה
  chosen: to these two kings
  alternatives:
  - for these two kings
  - to the two kings האלה
  lexicon: HALOT
  rationale: The preposition ל here marks the object affected by the action in idiomatic English. 'To these two kings' best matches the sense of what the LORD did against Sihon and Og.
- source_word: כֵּן יַעֲשֶׂה יְהוָה
  chosen: so the LORD will do
  alternatives:
  - thus the LORD will do
  - in the same way the LORD will do
  lexicon: HALOT
  rationale: 'כֵּן marks comparison: what happened to the two kings serves as the pattern for what will happen next. ''So'' is concise and natural.'
- source_word: לְכָל הַמַּמְלָכוֹת
  chosen: to all the kingdoms
  alternatives:
  - against all the kingdoms
  - for all the kingdoms
  lexicon: HALOT
  rationale: The phrase refers to the kingdoms Joshua/Israel will encounter. English 'to all the kingdoms' is a close rendering, though the hostile sense is supplied by context rather than made explicit.
- source_word: אֲשֶׁר אַתָּה עֹבֵר שָׁמָּה
  chosen: into which you are crossing there
  alternatives:
  - that you are crossing over to
  - which you are about to enter
  - where you are crossing over
  lexicon: HALOT
  rationale: עבר plus שמה indicates movement across/into a destination. Because Joshua is addressed individually, singular 'you' should be preserved. 'Crossing' keeps the Jordan-crossing motif audible; 'there' reflects שמה, though English is slightly awkward. A smoother alternative would be 'crossing over to,' but the chosen rendering stays closer to the Hebrew components.
