id: DEU.3.4
reference: Deuteronomy 3:4
source:
  edition: WLC
  text: וַ/נִּלְכֹּ֤ד אֶת כָּל עָרָי/ו֙ בָּ/עֵ֣ת הַ/הִ֔וא לֹ֤א הָֽיְתָה֙ קִרְיָ֔ה
    אֲשֶׁ֥ר לֹא לָקַ֖חְנוּ מֵֽ/אִתָּ֑/ם שִׁשִּׁ֥ים עִיר֙ כָּל חֶ֣בֶל אַרְגֹּ֔ב מַמְלֶ֥כֶת
    ע֖וֹג בַּ/בָּשָֽׁן־־־־׃
translation:
  text: 'And we captured all his cities at that time; there was not a city that we
    did not take from them: sixty cities, all the region of Argob, the kingdom of
    Og in Bashan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'from them,' likely referring to Og's people or forces, not Og alone.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנִּלְכֹּד
  chosen: captured
  alternatives:
  - took
  - seized
  lexicon: HALOT
  rationale: From לכד, denoting capture in warfare. 'Captured' preserves the military
    sense more clearly than the broader 'took.'
- source_word: כָּל עָרָיו
  chosen: all his cities
  alternatives:
  - all his towns
  lexicon: HALOT
  rationale: עיר can be rendered 'city' or 'town'; 'cities' is retained as the standard
    rendering and fits the conquest context. The suffix refers to Og.
- source_word: בָּעֵת הַהִוא
  chosen: at that time
  alternatives:
  - in that time
  - then
  lexicon: HALOT
  rationale: A common temporal expression; 'at that time' is natural modern English
    and sufficiently formal.
- source_word: לֹא הָיְתָה קִרְיָה אֲשֶׁר לֹא לָקַחְנוּ מֵאִתָּם
  chosen: there was not a city that we did not take from them
  alternatives:
  - there was no town that we did not capture from them
  - not a city remained that we did not take from them
  lexicon: HALOT
  rationale: Preserves the Hebrew emphatic negation and relative clause structure.
    'Take from them' reflects לקח plus מן idiomatically in conquest language without
    over-paraphrasing.
- source_word: מֵאִתָּם
  chosen: from them
  alternatives:
  - from him
  lexicon: HALOT
  rationale: The form is plural, referring to Og's people/forces rather than Og alone.
    This is preferable to smoothing to singular because the Hebrew explicitly uses
    the plural pronominal suffix.
- source_word: שִׁשִּׁים עִיר
  chosen: sixty cities
  alternatives:
  - sixty towns
  lexicon: HALOT
  rationale: Straightforward numeral plus noun construction; 'cities' maintains consistency
    with earlier עָרָיו / קִרְיָה.
- source_word: כָּל חֶבֶל אַרְגֹּב
  chosen: all the region of Argob
  alternatives:
  - all Argob's district
  - the whole tract of Argob
  lexicon: HALOT
  rationale: חבל here denotes a district or region. 'Region' is clear modern English
    and avoids archaic 'tract.'
- source_word: מַמְלֶכֶת עוֹג בַּבָּשָׁן
  chosen: the kingdom of Og in Bashan
  alternatives:
  - Og's kingdom in Bashan
  - the kingdom of Og, in Bashan
  lexicon: HALOT
  rationale: A construct chain identifying the region just mentioned as belonging
    to Og's kingdom located in Bashan. The chosen wording is natural and precise.
