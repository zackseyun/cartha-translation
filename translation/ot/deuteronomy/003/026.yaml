id: DEU.3.26
reference: Deuteronomy 3:26
source:
  edition: WLC
  text: וַ/יִּתְעַבֵּ֨ר יְהוָ֥ה בִּ/י֙ לְמַ֣עַנְ/כֶ֔ם וְ/לֹ֥א שָׁמַ֖ע אֵלָ֑/י וַ/יֹּ֨אמֶר
    יְהוָ֤ה אֵלַ/י֙ רַב לָ֔/ךְ אַל תּ֗וֹסֶף דַּבֵּ֥ר אֵלַ֛/י ע֖וֹד בַּ/דָּבָ֥ר הַ/זֶּֽה־־׃
translation:
  text: But the LORD was angry with me because of you and did not listen to me, and
    the LORD said to me, “Enough from you; do not speak to me again about this matter.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for your sake' / 'on your account.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Enough for you,' an idiom of sharp dismissal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְעַבֵּר
  chosen: was angry
  alternatives:
  - was furious
  - was enraged
  - was indignant
  lexicon: HALOT
  rationale: The hitpael of עבר with YHWH as subject in this idiom conveys becoming
    angry or showing wrath toward someone. 'Was angry' is clear modern English and
    fits the context without overstating beyond the Hebrew idiom.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: בִּי
  chosen: with me
  alternatives:
  - at me
  - against me
  lexicon: HALOT
  rationale: With the anger idiom, English naturally says 'angry with me.' 'Against
    me' is possible but less idiomatic here.
- source_word: לְמַעַנְכֶם
  chosen: because of you
  alternatives:
  - for your sake
  - on your account
  lexicon: HALOT
  rationale: 'The phrase indicates causation in context: Moses says the LORD''s anger
    toward him was on account of the people. ''Because of you'' is the most natural
    and direct rendering.'
- source_word: וְלֹא שָׁמַע אֵלַי
  chosen: and did not listen to me
  alternatives:
  - and did not hear me
  - and would not heed me
  lexicon: HALOT
  rationale: שׁמע with אֶל commonly means to listen to or heed someone. 'Did not listen
    to me' preserves the sense of refusing Moses' plea in accessible English.
- source_word: רַב לָךְ
  chosen: Enough from you
  alternatives:
  - Enough for you
  - That is enough
  - Enough
  lexicon: HALOT
  rationale: This terse idiom is a sharp dismissal. 'Enough from you' captures the
    force directed at Moses' speech more clearly than the less specific 'Enough.'
- source_word: אַל תּוֹסֶף דַּבֵּר
  chosen: do not speak
  alternatives:
  - do not continue speaking
  - do not add to speak
  - do not speak any more
  lexicon: HALOT
  rationale: The construction with יסף plus infinitive means to continue or do again.
    In English, the following עוֹד already supplies 'again/any more,' so 'do not speak'
    keeps the line natural without losing meaning.
- source_word: עוֹד
  chosen: again
  alternatives:
  - any more
  - further
  lexicon: HALOT
  rationale: In this prohibition, עוֹד marks repetition or continuation. 'Again' fits
    smoothly with 'do not speak to me again.'
- source_word: בַּדָּבָר הַזֶּה
  chosen: about this matter
  alternatives:
  - about this thing
  - concerning this matter
  lexicon: HALOT
  rationale: דבר here refers to the issue under discussion, namely Moses' request
    to cross over. 'Matter' is idiomatic and suitably formal.
