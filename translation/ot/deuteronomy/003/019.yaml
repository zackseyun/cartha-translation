id: DEU.3.19
reference: Deuteronomy 3:19
source:
  edition: WLC
  text: רַ֠ק נְשֵׁי/כֶ֣ם וְ/טַפְּ/כֶם֮ וּ/מִקְנֵ/כֶם֒ יָדַ֕עְתִּי כִּֽי מִקְנֶ֥ה רַ֖ב
    לָ/כֶ֑ם יֵֽשְׁבוּ֙ בְּ/עָ֣רֵי/כֶ֔ם אֲשֶׁ֥ר נָתַ֖תִּי לָ/כֶֽם־׃
translation:
  text: Only your wives, your little ones, and your livestock—I know that you have
    much livestock—shall remain in your towns that I have given you,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your children' for 'your little ones.' The Hebrew term refers to small
      children or dependents.
    reason: lexical_alternative
  - marker: b
    text: Or 'cities' instead of 'towns.' The Hebrew word can denote settlements of
      varying size.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  chosen: Only
  alternatives:
  - except that
  - nevertheless
  lexicon: HALOT
  rationale: Marks an exception to the preceding command; 'Only' is concise and natural
    in English while preserving the restrictive force.
- source_word: נְשֵׁיכֶם
  chosen: your wives
  alternatives:
  - your women
  lexicon: HALOT
  rationale: In this context of household members left behind, 'wives' is the idiomatic
    and contextually specific sense, not the broader 'women'.
- source_word: טַפְּכֶם
  chosen: your little ones
  alternatives:
  - your children
  - your dependents
  lexicon: HALOT
  rationale: טַף refers to small children/dependents. 'Little ones' preserves the
    concrete, familial sense and echoes common biblical usage without becoming archaic.
- source_word: מִקְנֵיכֶם / מִקְנֶה רַב
  chosen: your livestock / much livestock
  alternatives:
  - your cattle / many cattle
  - your herds / abundant livestock
  lexicon: HALOT
  rationale: מִקְנֶה denotes acquired domestic animals broadly, not only bovines.
    'Livestock' is the most accurate modern umbrella term; repeating it reflects the
    Hebrew repetition.
- source_word: יָדַעְתִּי כִּי
  chosen: I know that
  alternatives:
  - for I know that
  - since I know that
  lexicon: HALOT
  rationale: The clause explains why the exception is made. 'I know that' preserves
    the first-person assertion plainly; the explanatory force is sufficiently conveyed
    by punctuation in English.
- source_word: יֵשְׁבוּ
  chosen: shall remain
  alternatives:
  - shall dwell
  - shall stay
  - shall live
  lexicon: HALOT
  rationale: While the verb literally means 'sit/dwell,' here it contrasts those staying
    behind with the men crossing over to fight. 'Shall remain' best captures that
    situational force in natural English.
- source_word: בְּעָרֵיכֶם
  chosen: in your towns
  alternatives:
  - in your cities
  lexicon: HALOT
  rationale: עִיר can mean either 'city' or 'town.' Given the settlement context east
    of the Jordan, 'towns' is natural modern English without overstating urban scale.
- source_word: אֲשֶׁר נָתַתִּי לָכֶם
  chosen: that I have given you
  alternatives:
  - which I gave you
  lexicon: HALOT
  rationale: The perfect verb refers to land already allotted. English present perfect
    naturally conveys a completed action with present relevance.
