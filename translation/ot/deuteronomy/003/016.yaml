id: DEU.3.16
reference: Deuteronomy 3:16
source:
  edition: WLC
  text: וְ/לָ/רֻאוּבֵנִ֨י וְ/לַ/גָּדִ֜י נָתַ֤תִּי מִן הַ/גִּלְעָד֙ וְ/עַד נַ֣חַל אַרְנֹ֔ן
    תּ֥וֹךְ הַ/נַּ֖חַל וּ/גְבֻ֑ל וְ/עַד֙ יַבֹּ֣ק הַ/נַּ֔חַל גְּב֖וּל בְּנֵ֥י עַמּֽוֹן־־׃
translation:
  text: And to the Reubenites and to the Gadites I gave from Gilead as far as the
    Arnon Valley, with the middle of the valley as the border, and as far as the Jabbok
    Valley, the border of the sons of Ammon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the border of the Ammonites.” The Hebrew reads “the sons of Ammon,”
      a kinship expression for the people of Ammon.
    reason: lexical_alternative
  - marker: b
    text: Hebrew נחל can refer to a stream, wadi, or the valley associated with it;
      here “Valley” is used because the next phrase speaks of “the middle of the valley”
      as the boundary.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָרֻאוּבֵנִי
  chosen: to the Reubenites
  alternatives:
  - to Reuben
  - to the tribe of Reuben
  lexicon: HALOT
  rationale: The form denotes the Reubenite tribal group, not merely the individual
    ancestor. 'To the Reubenites' is natural English and matches the distributive
    sense of territorial allotment.
- source_word: לַגָּדִי
  chosen: to the Gadites
  alternatives:
  - to Gad
  - to the tribe of Gad
  lexicon: HALOT
  rationale: As with Reuben, the gentilic refers to the tribal group receiving land.
    'Gadites' is concise and accurate.
- source_word: נָתַתִּי
  chosen: I gave
  alternatives:
  - I assigned
  - I granted
  lexicon: HALOT
  rationale: The simple verb 'gave' best reflects נתן without adding interpretive
    nuance. In context it refers to Moses' assignment of territory.
- source_word: מִן הַגִּלְעָד
  chosen: from Gilead
  alternatives:
  - from the Gilead
  - from the hill country of Gilead
  lexicon: HALOT
  rationale: 'The phrase marks the starting point of the territorial extent. English
    idiom omits the article in a place name: ''from Gilead.'''
- source_word: עַד נַחַל אַרְנֹן
  chosen: as far as the Arnon Valley
  alternatives:
  - as far as the Arnon River
  - to the Wadi Arnon
  lexicon: HALOT
  rationale: נחל can denote a wadi, streambed, or valley associated with a watercourse.
    'Valley' fits the following phrase about the middle of the valley and avoids over-specifying
    a perennial river.
- source_word: תּוֹךְ הַנַּחַל
  chosen: the middle of the valley
  alternatives:
  - the middle of the wadi
  - the midst of the valley
  lexicon: HALOT
  rationale: תוך denotes the middle/interior. Because נחל here is rendered 'valley,'
    the phrase is translated consistently as 'the middle of the valley.'
- source_word: וּגְבֻל
  chosen: as the border
  alternatives:
  - and border
  - for a border
  lexicon: HALOT
  rationale: The phrase appositionally clarifies that the middle of the valley served
    as the boundary line. Supplying 'as' makes the relation clear in idiomatic English.
- source_word: עַד יַבֹּק הַנַּחַל
  chosen: as far as the Jabbok Valley
  alternatives:
  - as far as the Jabbok River
  - to the Wadi Jabbok
  lexicon: HALOT
  rationale: Again נחל is best kept consistent with the earlier occurrence. 'Jabbok
    Valley' preserves the topographical sense and coheres with the boundary description.
- source_word: גְּבוּל בְּנֵי עַמּוֹן
  chosen: the border of the sons of Ammon
  alternatives:
  - the border of the Ammonites
  - the boundary of the people of Ammon
  lexicon: HALOT
  rationale: A formally closer rendering is preferable in this boundary notice. 'Sons
    of Ammon' preserves the Hebrew kinship expression, though 'Ammonites' would also
    be acceptable.
