theological_decisions:
- issue: Rendering of חרם language in a warfare judgment context
  chosen_reading: Use 'devoted to destruction' in the main clause, with the following
    infinitive rendered 'utterly destroying' for readable English while preserving
    the technical and severe force of the Hebrew.
  alternative_readings:
  - '''destroyed them completely'''
  - '''put them under the ban'''
  rationale: The verse describes total destruction under ḥerem. The translation should
    neither soften the severity nor obscure the technical covenant-war term. 'Devoted
    to destruction' best balances transparency and readability; 'under the ban' is
    preserved as a lexical alternative rather than used in the main text because it
    is less clear to modern readers.
  doctrine_reference: Translation philosophy §§1, 5, 6
