id: DEU.3.6
reference: Deuteronomy 3:6
source:
  edition: WLC
  text: וַ/נַּחֲרֵ֣ם אוֹתָ֔/ם כַּ/אֲשֶׁ֣ר עָשִׂ֔ינוּ לְ/סִיחֹ֖ן מֶ֣לֶךְ חֶשְׁבּ֑וֹן
    הַחֲרֵם֙ כָּל עִ֣יר מְתִ֔ם הַ/נָּשִׁ֖ים וְ/הַ/טָּֽף־׃
translation:
  text: And we devoted them to destruction, just as we had done to Sihon king of Heshbon,
    utterly destroying every city—men, women, and little ones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'we put them under the ban'; the Hebrew uses the verb חרם, a technical
      term for devoting something or someone to destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנַּחֲרֵם
  chosen: we devoted them to destruction
  alternatives:
  - we completely destroyed them
  - we put them under the ban
  lexicon: HALOT
  rationale: From חרם in the Hiphil, denoting placing persons or things under ḥerem,
    that is, devoting them to destruction. 'Devoted ... to destruction' preserves
    the technical force better than the flatter 'destroyed,' while avoiding the less
    transparent idiom 'put under the ban' in the main text.
- source_word: כַּאֲשֶׁר עָשִׂינוּ
  chosen: just as we had done
  alternatives:
  - as we did
  - just as we did
  lexicon: HALOT
  rationale: A comparative clause referring back to prior action. The pluperfect-like
    English 'had done' fits the retrospective narrative sense in context.
- source_word: לְסִיחֹן מֶלֶךְ חֶשְׁבּוֹן
  chosen: to Sihon king of Heshbon
  alternatives:
  - with Sihon king of Heshbon
  - against Sihon king of Heshbon
  lexicon: HALOT
  rationale: The preposition ל here marks the object affected in idiomatic Hebrew
    after עשה. English idiom is best preserved by 'to Sihon king of Heshbon' in this
    construction.
- source_word: הַחֲרֵם
  chosen: utterly destroying
  alternatives:
  - devoting to destruction
  - putting under the ban
  lexicon: HALOT
  rationale: This infinitive absolute intensifies or explicates the preceding חרם
    action. 'Utterly destroying' gives natural English emphasis while still reflecting
    the totalizing force of the construction.
- source_word: כָּל עִיר
  chosen: every city
  alternatives:
  - each city
  - every town
  lexicon: HALOT
  rationale: עיר commonly means 'city' or 'town.' 'Every city' is the more standard
    rendering and fits the conquest context.
- source_word: מְתִם
  chosen: men
  alternatives:
  - males
  - male inhabitants
  lexicon: HALOT
  rationale: The noun refers to male persons here, distinguished from 'women' and
    'little ones' in the following words. 'Men' is idiomatic and sufficiently precise
    in this triad.
- source_word: הַנָּשִׁים
  chosen: women
  lexicon: HALOT
  rationale: Straightforward lexical rendering.
- source_word: וְהַטָּף
  chosen: and little ones
  alternatives:
  - and children
  - and dependents
  lexicon: HALOT
  rationale: טף refers to small children or dependents. 'Little ones' preserves the
    sense of young children more closely than the broader 'children.'
