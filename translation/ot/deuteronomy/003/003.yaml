id: DEU.3.3
reference: Deuteronomy 3:3
source:
  edition: WLC
  text: וַ/יִּתֵּן֩ יְהוָ֨ה אֱלֹהֵ֜י/נוּ בְּ/יָדֵ֗/נוּ גַּ֛ם אֶת ע֥וֹג מֶֽלֶךְ הַ/בָּשָׁ֖ן
    וְ/אֶת כָּל עַמּ֑/וֹ וַ/נַּכֵּ֕/הוּ עַד בִּלְתִּ֥י הִשְׁאִֽיר ל֖/וֹ שָׂרִֽיד־־־־־־׃
translation:
  text: So the LORD our God also gave into our hand Og king of Bashan, and all his
    people, and we struck him down until he had no survivor left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'until no survivor was left to him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD,' following
    Jewish reverence tradition and the Septuagintal pattern.
- source_word: וַיִּתֵּן
  chosen: gave
  alternatives:
  - delivered
  - handed over
  lexicon: HALOT
  rationale: The verb נתן commonly means 'give.' In the military context with 'into
    our hand,' English 'gave' preserves the Hebrew idiom while remaining natural.
- source_word: בְּיָדֵנוּ
  chosen: into our hand
  alternatives:
  - into our hands
  - into our power
  lexicon: HALOT
  rationale: The singular 'hand' reflects the Hebrew form and preserves the idiom
    of military deliverance. 'Into our power' is interpretive and less transparent
    to the source.
- source_word: גַּם
  chosen: also
  alternatives:
  - even
  - indeed
  lexicon: HALOT
  rationale: Here גַּם links Og with the prior defeat of Sihon; 'also' best conveys
    the additive force in context.
- source_word: עוֹג מֶלֶךְ הַבָּשָׁן
  chosen: Og king of Bashan
  alternatives:
  - Og, the king of Bashan
  lexicon: HALOT
  rationale: Standard English rendering of the proper name plus royal title and region;
    no article is needed in smooth English.
- source_word: כָּל עַמּוֹ
  chosen: all his people
  alternatives:
  - all his army
  - all his folk
  lexicon: HALOT
  rationale: עַם normally means 'people.' Although in war context it includes fighting
    forces, the Hebrew is broader than 'army,' so 'people' is retained.
- source_word: וַנַּכֵּהוּ
  chosen: we struck him down
  alternatives:
  - we defeated him
  - we struck him
  lexicon: HALOT
  rationale: נכה in battle contexts often denotes striking/defeating. 'Struck him
    down' preserves the violent military sense better than the more abstract 'defeated,'
    while allowing the singular object to stand representatively for Og and his forces.
- source_word: עַד בִּלְתִּי הִשְׁאִיר לוֹ שָׂרִיד
  chosen: until he had no survivor left
  alternatives:
  - until no survivor was left to him
  - until he left no survivor for him
  lexicon: HALOT
  rationale: This clause expresses total defeat. The Hebrew construction is somewhat
    idiomatic; 'until he had no survivor left' communicates the result naturally in
    English while preserving the sense that none of Og's survivors remained. The more
    literal 'was left to him' is possible but less idiomatic.
