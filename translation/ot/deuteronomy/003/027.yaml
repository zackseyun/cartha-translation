id: DEU.3.27
reference: Deuteronomy 3:27
source:
  edition: WLC
  text: עֲלֵ֣ה רֹ֣אשׁ הַ/פִּסְגָּ֗ה וְ/שָׂ֥א עֵינֶ֛י/ךָ יָ֧מָּ/ה וְ/צָפֹ֛נָ/ה וְ/תֵימָ֥נָ/ה
    וּ/מִזְרָ֖חָ/ה וּ/רְאֵ֣ה בְ/עֵינֶ֑י/ךָ כִּי לֹ֥א תַעֲבֹ֖ר אֶת הַ/יַּרְדֵּ֥ן הַ/זֶּֽה׀־־׃
translation:
  text: Go up to the top of Pisgah, and lift up your eyes westward and northward and
    southward and eastward, and see with your eyes; for you shall not cross this Jordan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally 'sea-ward,' a conventional way of saying 'westward.'
    reason: cultural_note
  - marker: b
    text: Or 'this Jordan River.' Hebrew simply says 'this Jordan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲלֵה
  chosen: Go up
  alternatives:
  - Ascend
  lexicon: HALOT
  rationale: Qal imperative of עלה, a straightforward command to go upward. 'Go up'
    is natural modern English and preserves the directional force without sounding
    overly formal.
- source_word: רֹאשׁ הַפִּסְגָּה
  chosen: the top of Pisgah
  alternatives:
  - the summit of Pisgah
  - the head of Pisgah
  lexicon: HALOT
  rationale: רֹאשׁ literally 'head/top' with הַפִּסְגָּה referring to Pisgah. 'Top
    of Pisgah' is idiomatic English and preserves the geographical reference. 'Head
    of' would be too literal in English.
- source_word: וְשָׂא עֵינֶיךָ
  chosen: lift up your eyes
  alternatives:
  - raise your eyes
  - look up
  lexicon: HALOT
  rationale: Hebrew idiom meaning to direct one's gaze. 'Lift up your eyes' preserves
    the idiomatic and literary quality of the source better than the flatter 'look
    up.'
- source_word: יָמָּה
  chosen: westward
  alternatives:
  - toward the sea
  - to the west
  lexicon: HALOT
  rationale: Directional accusative/adverb from ים ('sea'), conventionally meaning
    westward in the land-oriented Hebrew compass. 'Westward' communicates the intended
    direction clearly in English.
- source_word: וְצָפֹנָה
  chosen: northward
  alternatives:
  - to the north
  lexicon: HALOT
  rationale: Directional form meaning 'northward.' Chosen for consistency with the
    other directional adverbs in the verse.
- source_word: וְתֵימָנָה
  chosen: southward
  alternatives:
  - to the south
  - toward Teman
  lexicon: HALOT
  rationale: Directional form from תימן meaning south/right-hand side. In this context
    it is clearly a compass direction, so 'southward' is best.
- source_word: וּמִזְרָחָה
  chosen: eastward
  alternatives:
  - to the east
  - toward the sunrise
  lexicon: HALOT
  rationale: Directional form from מזרח, 'east/sunrise.' 'Eastward' matches the series
    of directional adverbs and reads smoothly.
- source_word: וּרְאֵה בְעֵינֶיךָ
  chosen: and see with your eyes
  alternatives:
  - and look with your own eyes
  - and behold with your eyes
  lexicon: HALOT
  rationale: The repetition of 'eyes' after 'lift up your eyes' is emphatic in Hebrew.
    Retaining 'with your eyes' preserves that emphasis rather than collapsing it into
    a simple 'look.'
- source_word: כִּי לֹא תַעֲבֹר
  chosen: for you shall not cross
  alternatives:
  - because you will not cross
  - for you will not pass over
  lexicon: HALOT
  rationale: כִּי here gives the reason for the command. 'For' fits the explanatory
    sense. 'Cross' is the natural rendering of עבר in relation to the Jordan.
- source_word: אֶת הַיַּרְדֵּן הַזֶּה
  chosen: this Jordan
  alternatives:
  - this Jordan River
  - the Jordan
  lexicon: HALOT
  rationale: The demonstrative הַזֶּה is significant and should be represented. Hebrew
    often uses 'the Jordan' without 'River'; 'this Jordan' is concise and preserves
    the immediacy of the deictic expression.
