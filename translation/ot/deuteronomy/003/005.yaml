id: DEU.3.5
reference: Deuteronomy 3:5
source:
  edition: WLC
  text: כָּל אֵ֜לֶּה עָרִ֧ים בְּצֻר֛וֹת חוֹמָ֥ה גְבֹהָ֖ה דְּלָתַ֣יִם וּ/בְרִ֑יחַ לְ/בַ֛ד
    מֵ/עָרֵ֥י הַ/פְּרָזִ֖י הַרְבֵּ֥ה מְאֹֽד־׃
translation:
  text: All these were fortified cities with a high wall, double doors, and bars,
    besides a great many rural towns.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'villages of the open country' or 'unwalled towns.' The Hebrew contrasts
      these settlements with the fortified cities just described.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּצֻר֛וֹת
  chosen: fortified
  alternatives:
  - fortress-like
  - made inaccessible
  lexicon: HALOT
  rationale: The adjective from בצר describes cities strengthened against attack.
    'Fortified' is the natural modern English equivalent and fits the military-geographical
    context.
- source_word: חוֹמָ֥ה גְבֹהָ֖ה
  chosen: with a high wall
  alternatives:
  - with high walls
  lexicon: HALOT
  rationale: The Hebrew uses singular 'wall' with adjective 'high,' likely collective
    or descriptive. English idiom can preserve this as 'a high wall' without loss
    of sense.
- source_word: דְּלָתַ֣יִם
  chosen: double doors
  alternatives:
  - gates
  - doors
  lexicon: HALOT
  rationale: The dual form literally denotes a pair of doors or leaves. Since 'bars'
    follows, the image is of city entrances secured by door-leaves and bars. 'Double
    doors' preserves the dual nuance better than the more generic 'gates.'
- source_word: וּבְרִ֑יחַ
  chosen: and bars
  alternatives:
  - and a bar
  - and gate-bars
  lexicon: HALOT
  rationale: Though singular in form, בריח can function collectively in this construction.
    'Bars' is idiomatic in English for fortified entrances and matches the plural
    sense implied by the list of defensive features.
- source_word: לְבַ֛ד
  chosen: besides
  alternatives:
  - apart from
  - in addition to
  lexicon: HALOT
  rationale: The preposition marks exception/addition. 'Besides' is concise and natural
    in context.
- source_word: מֵעָרֵ֥י הַפְּרָזִ֖י
  chosen: rural towns
  alternatives:
  - villages of the open country
  - unwalled towns
  lexicon: HALOT
  rationale: The phrase refers to settlements lacking fortification, in contrast to
    the fortified cities just mentioned. 'Rural towns' communicates the open-country
    character in readable English; the more literal 'unwalled towns' is possible but
    slightly interpretive in a different direction.
- source_word: הַרְבֵּ֥ה מְאֹֽד
  chosen: a great many
  alternatives:
  - very many
  - exceedingly many
  lexicon: HALOT
  rationale: The adverbial intensifier expresses abundance. 'A great many' is natural
    modern English and preserves the emphatic quantity.
- source_word: כָּל אֵ֜לֶּה עָרִ֧ים
  chosen: All these were ... cities
  alternatives:
  - All these cities were ...
  lexicon: HALOT
  rationale: English requires a copular expression to make the clause smooth. Fronting
    'All these' preserves the Hebrew emphasis while keeping the sentence readable.
