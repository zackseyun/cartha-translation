id: DEU.3.23
reference: Deuteronomy 3:23
source:
  edition: WLC
  text: וָ/אֶתְחַנַּ֖ן אֶל יְהוָ֑ה בָּ/עֵ֥ת הַ/הִ֖וא לֵ/אמֹֽר־׃
translation:
  text: And I pleaded with Yahweh at that time, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH.'' Traditionally rendered ''the LORD''; alternatively, ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וָאֶתְחַנַּן
  chosen: And I pleaded
  alternatives:
  - And I implored
  - And I entreated
  - And I sought favor
  lexicon: HALOT
  rationale: The hitpael of חנן here expresses earnest supplication or pleading for favor/mercy, not a casual request. 'Pleaded' is natural modern English and preserves the intensity better than the more archaic 'entreated.' The prefixed waw with imperfect is rendered as simple past narrative, with 'And' preserving the discourse flow.
- source_word: אֶל
  chosen: with
  alternatives:
  - to
  lexicon: HALOT
  rationale: Although אֶל commonly means 'to,' with verbs of supplication English idiom prefers 'pleaded with' rather than 'pleaded to.' This is an optimal-equivalence adjustment for natural English while preserving the relational direction toward YHWH.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בָּעֵת הַהִוא
  chosen: at that time
  alternatives:
  - in that time
  - at that moment
  lexicon: HALOT
  rationale: This temporal phrase is idiomatically rendered 'at that time' in English. It preserves the narrative setting without over-specifying the exact moment.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: The infinitive construct formula introducing direct speech is conventionally and accurately rendered 'saying,' which keeps the formal narrative linkage to the following quotation in the next verse.
