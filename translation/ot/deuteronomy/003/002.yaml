id: DEU.3.2
reference: Deuteronomy 3:2
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֤ה אֵלַ/י֙ אַל תִּירָ֣א אֹת֔/וֹ כִּ֣י בְ/יָדְ/ךָ֞ נָתַ֧תִּי אֹת֛/וֹ וְ/אֶת כָּל עַמּ֖/וֹ וְ/אֶת אַרְצ֑/וֹ וְ/עָשִׂ֣יתָ לּ֔/וֹ כַּ/אֲשֶׁ֣ר עָשִׂ֗יתָ לְ/סִיחֹן֙ מֶ֣לֶךְ הָֽ/אֱמֹרִ֔י אֲשֶׁ֥ר יוֹשֵׁ֖ב בְּ/חֶשְׁבּֽוֹן־־־־׃
translation:
  text: And Yahweh said to me, “Do not fear him, for I have given him, all his people, and his land into your hand; and you shall do to him just as you did to Sihon king of the Amorites, who lived in Heshbon.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the covenant name with small-caps convention in English rather than transliteration.
- source_word: אַל תִּירָא
  chosen: Do not fear
  alternatives:
  - Do not be afraid of
  - Do not dread
  lexicon: HALOT
  rationale: A direct and natural rendering of the negative imperative of ירא. 'Do not fear him' preserves the object explicitly present in Hebrew and keeps the force concise.
- source_word: בְיָדְךָ
  chosen: into your hand
  alternatives:
  - into your power
  - over to you
  lexicon: HALOT
  rationale: Retains the Hebrew idiom of handing over into someone's hand, which conveys both transfer and power. This is understandable in modern English and preserves the source imagery.
- source_word: נָתַתִּי
  chosen: I have given
  alternatives:
  - I give
  - I have delivered
  lexicon: HALOT
  rationale: 'The perfect verb is rendered as a present-result perfect in English: the action is stated as accomplished from God''s perspective prior to the battle. ''Given'' is more literal than ''delivered'' and fits the handover idiom.'
- source_word: וְאֶת כָּל עַמּוֹ וְאֶת אַרְצוֹ
  chosen: all his people, and his land
  alternatives:
  - his whole people, and his land
  - all his army, and his country
  lexicon: HALOT
  rationale: עַם is best rendered 'people,' not narrowed to 'army,' since the text names the totality of his populace. 'Land' is the straightforward rendering of אֶרֶץ here.
- source_word: וְעָשִׂיתָ לּוֹ
  chosen: you shall do to him
  alternatives:
  - you shall deal with him
  - you shall do to it/him
  lexicon: HALOT
  rationale: Keeps the broad Hebrew verb עשה without over-specifying the action. The following comparison clause supplies the content of what is to be done.
- source_word: כַּאֲשֶׁר עָשִׂיתָ
  chosen: just as you did
  alternatives:
  - as you did
  - according to what you did
  lexicon: HALOT
  rationale: '''Just as'' clearly marks the comparison and reflects the Hebrew construction in idiomatic English.'
- source_word: לְסִיחֹן מֶלֶךְ הָאֱמֹרִי
  chosen: to Sihon king of the Amorites
  alternatives:
  - to Sihon, the Amorite king
  lexicon: HALOT
  rationale: 'This preserves the appositional structure and keeps the people-group designation plural/gentilic in standard English: ''king of the Amorites.'''
- source_word: אֲשֶׁר יוֹשֵׁב בְּחֶשְׁבּוֹן
  chosen: who lived in Heshbon
  alternatives:
  - who dwelt in Heshbon
  - who was living in Heshbon
  lexicon: HALOT
  rationale: The participle of ישב can mean 'dwelling/living.' 'Lived' is readable modern English and avoids archaic 'dwelt' while still indicating residence.
