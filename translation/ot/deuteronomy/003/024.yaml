id: DEU.3.24
reference: Deuteronomy 3:24
source:
  edition: WLC
  text: אֲדֹנָ֣/י יְהוִ֗ה אַתָּ֤ה הַֽחִלּ֨וֹתָ֙ לְ/הַרְא֣וֹת אֶֽת עַבְדְּ/ךָ֔ אֶ֨ת גָּדְלְ/ךָ֔ וְ/אֶת יָדְ/ךָ֖ הַ/חֲזָקָ֑ה אֲשֶׁ֤ר מִי אֵל֙ בַּ/שָּׁמַ֣יִם וּ/בָ/אָ֔רֶץ אֲשֶׁר יַעֲשֶׂ֥ה כְ/מַעֲשֶׂ֖י/ךָ וְ/כִ/גְבוּרֹתֶֽ/ךָ־־־־־׃
translation:
  text: O Lord Yahweh, you have begun to show your servant your greatness and your strong hand. For what god is there in heaven or on earth who can do deeds like your deeds and mighty acts like yours?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Adonai YHWH'; alternatively, 'O Lord Yahweh.' The main text uses 'Lord GOD' to avoid the awkward English sequence 'Lord LORD' while still distinguishing the two divine titles.
    reason: alternative_reading
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: O Lord GOD
  alternatives:
  - O Lord the LORD
  - O Lord Yahweh
  lexicon: HALOT
  rationale: The Hebrew combines ʾadonay with the divine name YHWH. Because the project default is to render YHWH as 'the LORD,' but English convention in this specific collocation often avoids 'Lord LORD' by using 'Lord GOD,' this rendering preserves both titles distinctly and naturally. 'Yahweh' is preserved as an alternative but not used in the main text per doctrine.
- source_word: הַחִלּוֹתָ
  chosen: you have begun
  alternatives:
  - you began
  - you have started
  lexicon: HALOT
  rationale: Hiphil perfect of חלל/החל in this idiom means 'to begin.' The perfect is well represented by English present perfect here because Moses is speaking of an action already initiated with continuing relevance.
- source_word: לְהַרְאוֹת
  chosen: to show
  alternatives:
  - to let see
  - to cause to see
  lexicon: HALOT
  rationale: Hiphil infinitive of ראה means 'to show' or 'cause to see.' 'Show' is idiomatic and sufficiently transparent.
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in prayerful address to God for a faithful covenant subordinate, 'servant' is the most natural and contextually appropriate English rendering. The bonded-status nuance is not foregrounded here as in some NT doulos contexts.
- source_word: גָּדְלְךָ
  chosen: your greatness
  alternatives:
  - your majesty
  - your greatness of power
  lexicon: HALOT
  rationale: The noun denotes greatness, magnitude, or majesty. 'Greatness' is the most direct rendering and pairs well with the following phrase.
- source_word: יָדְךָ הַחֲזָקָה
  chosen: your strong hand
  alternatives:
  - your mighty hand
  - your powerful hand
  lexicon: HALOT
  rationale: A common biblical idiom for divine power in action. 'Strong hand' is formally close to the Hebrew; 'mighty hand' is possible, but 'strong' reflects חזק more directly here.
- source_word: מִי אֵל
  chosen: what god is there
  alternatives:
  - who is a god
  - what god
  lexicon: HALOT
  rationale: The clause is rhetorical, asking about any comparable deity. 'What god is there' communicates the comparative force naturally in English.
- source_word: בַּשָּׁמַיִם וּבָאָרֶץ
  chosen: in heaven or on earth
  alternatives:
  - in the heavens and on the earth
  - in heaven and on earth
  lexicon: HALOT
  rationale: The phrase expresses total scope. 'In heaven or on earth' is idiomatic in English within a rhetorical question about any possible rival deity.
- source_word: יַעֲשֶׂה
  chosen: can do
  alternatives:
  - does
  - will do
  lexicon: HALOT
  rationale: 'Although formally imperfect ''does/will do,'' in this rhetorical comparison the sense is capability or possibility: no god is able to do what YHWH does. ''Can do'' best captures the force in English.'
- source_word: כְמַעֲשֶׂיךָ
  chosen: deeds like your deeds
  alternatives:
  - works like your works
  - what you do
  lexicon: HALOT
  rationale: מעשה denotes deeds/works. Repeating 'deeds' preserves the Hebrew comparison and avoids flattening the poetic parallelism.
- source_word: וְכִגְבוּרֹתֶיךָ
  chosen: and mighty acts like yours
  alternatives:
  - and mighty deeds like yours
  - and acts of power like yours
  lexicon: HALOT
  rationale: גבורות refers to mighty acts or displays of power. 'Mighty acts' is a standard, clear rendering that preserves the climactic parallel with 'deeds.'
