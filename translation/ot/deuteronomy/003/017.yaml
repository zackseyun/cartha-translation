id: DEU.3.17
reference: Deuteronomy 3:17
source:
  edition: WLC
  text: וְ/הָֽ/עֲרָבָ֖ה וְ/הַ/יַּרְדֵּ֣ן וּ/גְבֻ֑ל מִ/כִּנֶּ֗רֶת וְ/עַ֨ד יָ֤ם הָֽ/עֲרָבָה֙
    יָ֣ם הַ/מֶּ֔לַח תַּ֛חַת אַשְׁדֹּ֥ת הַ/פִּסְגָּ֖ה מִזְרָֽחָ/ה׃
translation:
  text: also the Arabah, with the Jordan as its border, from Kinnereth as far as the
    Sea of the Arabah, the Salt Sea, below the slopes of Pisgah on the east.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from Chinnereth'; the Hebrew preserves the place-name in a form commonly
      transliterated either way.
    reason: lexical_alternative
  - marker: b
    text: That is, the Dead Sea.
    reason: alternative_reading
lexical_decisions:
- source_word: הָעֲרָבָה
  chosen: the Arabah
  alternatives:
  - the plain
  - the rift valley
  lexicon: HALOT
  rationale: Rendered as the geographic proper name 'the Arabah' rather than the generic
    'plain' because in this boundary description it refers to the Jordan rift region
    as a recognized place-name.
- source_word: הַיַּרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: Kept the standard geographic name 'the Jordan'; 'River' is implicit and
    unnecessary in a boundary list.
- source_word: גְבֻל
  chosen: as its border
  alternatives:
  - and border
  - and territory
  lexicon: HALOT
  rationale: The noun means 'border/boundary.' The Hebrew is elliptical in this list,
    so 'as its border' makes the relation clear in natural English without adding
    more than the syntax requires.
- source_word: מִכִּנֶּרֶת
  chosen: from Kinnereth
  alternatives:
  - from Chinnereth
  - from the Sea of Kinnereth
  lexicon: HALOT
  rationale: Used the transliterated place-name 'Kinnereth' in keeping with the policy
    to transliterate names. The context likely refers to the region/lake area at the
    northern extent, but the Hebrew form itself is simply the name.
- source_word: יָם הָעֲרָבָה
  chosen: the Sea of the Arabah
  alternatives:
  - the sea of the Arabah
  - the Arabah Sea
  lexicon: HALOT
  rationale: Translated literally to preserve the Hebrew designation before the appositional
    clarification 'the Salt Sea.'
- source_word: יָם הַמֶּלַח
  chosen: the Salt Sea
  alternatives:
  - the Salt Sea
  - the Dead Sea
  lexicon: HALOT
  rationale: Chose the formal equivalent 'the Salt Sea,' which reflects the Hebrew
    wording directly. 'Dead Sea' is the familiar modern name but not the source expression.
- source_word: תַּחַת
  chosen: below
  alternatives:
  - under
  - south of
  lexicon: HALOT
  rationale: In topographical description, 'below' best conveys spatial relation in
    idiomatic English without over-interpreting as a cardinal direction.
- source_word: אַשְׁדֹּת
  chosen: the slopes of
  alternatives:
  - the foothills of
  - the springs of
  lexicon: HALOT
  rationale: In this geographic context the term refers to mountain slopes or declivities.
    'Slopes' fits the terrain reference to Pisgah better than less certain alternatives.
- source_word: הַפִּסְגָּה
  chosen: Pisgah
  alternatives:
  - the Pisgah
  lexicon: HALOT
  rationale: Treated as a proper place-name and transliterated accordingly.
- source_word: מִזְרָחָה
  chosen: on the east
  alternatives:
  - eastward
  - to the east
  lexicon: HALOT
  rationale: Rendered adverbially to clarify the orientation of the boundary in smooth
    English. 'On the east' preserves the locative sense in relation to Pisgah.
