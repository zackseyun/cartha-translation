id: DEU.3.1
reference: Deuteronomy 3:1
source:
  edition: WLC
  text: וַ/נֵּ֣פֶן וַ/נַּ֔עַל דֶּ֖רֶךְ הַ/בָּשָׁ֑ן וַ/יֵּצֵ֣א עוֹג֩ מֶֽלֶךְ הַ/בָּשָׁ֨ן
    לִ/קְרָאתֵ֜/נוּ ה֧וּא וְ/כָל עַמּ֛/וֹ לַ/מִּלְחָמָ֖ה אֶדְרֶֽעִי־־׃
translation:
  text: Then we turned and went up by the way of Bashan, and Og king of Bashan came
    out to meet us, he and all his people, for battle at Edrei.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the road to Bashan.' The Hebrew idiom literally says 'the way of
      Bashan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנֵּפֶן
  chosen: Then we turned
  alternatives:
  - So we turned
  - And we turned
  lexicon: HALOT
  rationale: The verb פנה in the wayyiqtol narrative sequence means 'turn' or 'turn
    aside.' 'Then' captures the sequential force of the waw-consecutive in readable
    English without over-literal repetition of 'and.'
- source_word: וַנַּעַל
  chosen: went up
  alternatives:
  - ascended
  - went
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' 'Went up' preserves the directional
    nuance while remaining natural English.
- source_word: דֶּרֶךְ הַבָּשָׁן
  chosen: by the way of Bashan
  alternatives:
  - on the road to Bashan
  - by the road of Bashan
  lexicon: HALOT
  rationale: דרך plus region name denotes the route leading into or through that territory.
    'By the way of Bashan' is a fairly formal but clear rendering that preserves the
    idiom without excessive paraphrase.
- source_word: וַיֵּצֵא
  chosen: came out
  alternatives:
  - went out
  - marched out
  lexicon: HALOT
  rationale: יצא literally means 'go out/come out.' In context of military confrontation,
    'came out' is natural from the narrator's perspective and avoids adding the more
    interpretive 'marched out.'
- source_word: עוֹג מֶלֶךְ הַבָּשָׁן
  chosen: Og king of Bashan
  alternatives:
  - Og, the king of Bashan
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy. The construct
    chain is naturally rendered as apposition in English.
- source_word: לִקְרָאתֵנוּ
  chosen: to meet us
  alternatives:
  - against us
  - to confront us
  lexicon: HALOT
  rationale: The idiom לקראת commonly means 'to meet' or 'to encounter.' Because the
    military purpose is made explicit by the following phrase 'for battle,' the less
    interpretive 'to meet us' best preserves the Hebrew structure.
- source_word: הוּא וְכָל־עַמּוֹ
  chosen: he and all his people
  alternatives:
  - he and all his army
  - he and all his troops
  lexicon: HALOT
  rationale: עם is broadly 'people.' In battle context it could refer to fighting
    forces, but the Hebrew does not explicitly narrow it to 'army,' so 'his people'
    is retained.
- source_word: לַמִּלְחָמָה
  chosen: for battle
  alternatives:
  - for war
  - to battle
  lexicon: HALOT
  rationale: מלחמה can mean 'war' or 'battle.' Here, in a specific encounter, 'for
    battle' fits the immediate context better than the broader 'for war.'
- source_word: אֶדְרֶעִי
  chosen: at Edrei
  alternatives:
  - to Edrei
  - Edrei
  lexicon: HALOT
  rationale: The place name is transliterated. Although the Hebrew lacks an explicit
    preposition here, the final noun functions adverbially as the location of the
    battle encounter; 'at Edrei' is the most natural English rendering.
