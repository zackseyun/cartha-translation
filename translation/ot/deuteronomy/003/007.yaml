id: DEU.3.7
reference: Deuteronomy 3:7
source:
  edition: WLC
  text: וְ/כָל הַ/בְּהֵמָ֛ה וּ/שְׁלַ֥ל הֶ/עָרִ֖ים בַּזּ֥וֹנוּ לָֽ/נוּ־׃
translation:
  text: But all the livestock and the spoil of the cities we took as plunder for ourselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And all the livestock and the spoil of the cities we plundered for ourselves.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כָל
  chosen: But all
  alternatives:
  - And all
  - Now all
  lexicon: HALOT
  rationale: The conjunction waw here links back to the preceding destruction of the
    population and contrasts it with what was spared; 'But all' captures the mild
    adversative force in context while preserving the comprehensiveness of כָּל ('all').
- source_word: הַ/בְּהֵמָה
  chosen: the livestock
  alternatives:
  - the cattle
  - the animals
  lexicon: HALOT
  rationale: בְּהֵמָה in this context refers to domesticated animals kept by the cities'
    inhabitants. 'Livestock' is natural modern English and more precise than the broader
    'animals.'
- source_word: וּ/שְׁלַל
  chosen: and the spoil
  alternatives:
  - and the plunder
  - and the booty
  lexicon: HALOT
  rationale: שָׁלָל denotes goods taken in war. 'Spoil' is a standard biblical-military
    term and pairs well with the following verbal idea of taking as plunder; alternatives
    are viable but 'booty' can sound dated or informal.
- source_word: הֶ/עָרִים
  chosen: of the cities
  alternatives:
  - from the cities
  lexicon: HALOT
  rationale: The construct relationship is most directly rendered 'the spoil of the
    cities,' meaning spoil belonging to or taken from those cities. 'From the cities'
    is interpretive; 'of the cities' stays closer to the Hebrew structure.
- source_word: בַּזּוֹנוּ
  chosen: we took as plunder
  alternatives:
  - we plundered
  - we seized as spoil
  lexicon: HALOT
  rationale: From בזז, the verb means to plunder or take spoil. Because English 'we
    spoiled' is misleading, 'we took as plunder' expresses the action clearly while
    retaining the military sense.
- source_word: לָֽ/נוּ
  chosen: for ourselves
  alternatives:
  - for us
  - as our own
  lexicon: HALOT
  rationale: The preposition plus first person plural pronoun marks the beneficiaries
    of the plundering. 'For ourselves' makes explicit that the spoil was taken for
    Israel's own possession, which is the force of the Hebrew in idiomatic English.
