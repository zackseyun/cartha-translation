id: DEU.3.12
reference: Deuteronomy 3:12
source:
  edition: WLC
  text: וְ/אֶת הָ/אָ֧רֶץ הַ/זֹּ֛את יָרַ֖שְׁנוּ בָּ/עֵ֣ת הַ/הִ֑וא מֵ/עֲרֹעֵ֞ר אֲשֶׁר
    עַל נַ֣חַל אַרְנֹ֗ן וַ/חֲצִ֤י הַֽר הַ/גִּלְעָד֙ וְ/עָרָ֔י/ו נָתַ֕תִּי לָ/רֻֽאוּבֵנִ֖י
    וְ/לַ/גָּדִֽי־־־־׃
translation:
  text: And we took possession of this land at that time, from Aroer, which is on
    the Arnon Valley, and half the hill country of Gilead with its cities; I gave
    it to the Reubenites and the Gadites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from Aroer, which is by the Wadi Arnon.' The Hebrew נחל can refer to
      a wadi, ravine, or valley.
    reason: lexical_alternative
  - marker: b
    text: Or 'half of Mount Gilead.' Here 'hill country of Gilead' is preferred because
      the Hebrew הַר often refers to a mountainous region in territorial descriptions.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָרַשְׁנוּ
  chosen: we took possession of
  alternatives:
  - we possessed
  - we inherited
  lexicon: HALOT
  rationale: The verb ירשׁ in conquest/allotment contexts commonly means to take possession
    or occupy, not merely to inherit in a passive sense. 'Took possession of' captures
    the active acquisition of territory in context.
- source_word: הָאָרֶץ הַזֹּאת
  chosen: this land
  alternatives:
  - this הארץ/territory
  - this country
  lexicon: HALOT
  rationale: '''Land'' is the most natural rendering here for the conquered territory.
    ''Country'' is possible but less idiomatic in this allotment context.'
- source_word: בָּעֵת הַהִוא
  chosen: at that time
  alternatives:
  - at that time then
  lexicon: HALOT
  rationale: Standard temporal expression; 'at that time' is clear and idiomatic.
- source_word: מֵעֲרֹעֵר אֲשֶׁר עַל נַחַל אַרְנֹן
  chosen: from Aroer, which is on the Arnon Valley
  alternatives:
  - from Aroer, which is by the Wadi Arnon
  - from Aroer on the Arnon
  lexicon: HALOT
  rationale: Aroer is a place name and is transliterated. נחל can denote a wadi or
    valley; 'Arnon Valley' is readable modern English while preserving the geographical
    sense. The relative clause is retained.
- source_word: נַחַל
  chosen: Valley
  alternatives:
  - wadi
  - torrent valley
  - brook
  lexicon: HALOT
  rationale: In this geographic setting נחל refers to the ravine/valley associated
    with the Arnon. 'Wadi' is precise but less accessible; 'brook' is too narrow.
- source_word: וַחֲצִי הַר הַגִּלְעָד
  chosen: and half the hill country of Gilead
  alternatives:
  - and half of Mount Gilead
  - and half of the mountains of Gilead
  lexicon: HALOT
  rationale: הַר can denote hill country or mountainous region, not only a single
    mountain. Since the phrase is paired with cities and territorial allotment, 'hill
    country of Gilead' best fits the regional sense.
- source_word: וְעָרָיו
  chosen: with its cities
  alternatives:
  - and its cities
  lexicon: HALOT
  rationale: The suffix refers back to the Gilead region. English idiom prefers 'with
    its cities' in a territorial description, though 'and its cities' is also possible.
- source_word: נָתַתִּי
  chosen: I gave it
  alternatives:
  - I assigned it
  - I granted it
  lexicon: HALOT
  rationale: Moses shifts from first person plural ('we took possession') to first
    person singular ('I gave'), reflecting his role in allotting the land. 'Gave'
    preserves the straightforward force of נתן. 'It' is supplied in English for clarity,
    referring to the territory just described.
- source_word: לָרֻאוּבֵנִי וְלַגָּדִי
  chosen: to the Reubenites and the Gadites
  alternatives:
  - to the tribe of Reuben and the tribe of Gad
  - to the Reubenite and the Gadite
  lexicon: HALOT
  rationale: Though morphologically singular gentilic forms appear, they function
    collectively for the tribal groups. 'Reubenites and Gadites' is the natural English
    rendering.
