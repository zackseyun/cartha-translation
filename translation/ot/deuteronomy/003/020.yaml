id: DEU.3.20
reference: Deuteronomy 3:20
source:
  edition: WLC
  text: עַ֠ד אֲשֶׁר יָנִ֨יחַ יְהוָ֥ה לַֽ/אֲחֵי/כֶם֮ כָּ/כֶם֒ וְ/יָרְשׁ֣וּ גַם הֵ֔ם
    אֶת הָ/אָ֕רֶץ אֲשֶׁ֨ר יְהוָ֧ה אֱלֹהֵי/כֶ֛ם נֹתֵ֥ן לָ/הֶ֖ם בְּ/עֵ֣בֶר הַ/יַּרְדֵּ֑ן
    וְ/שַׁבְתֶּ֗ם אִ֚ישׁ לִֽ/ירֻשָּׁת֔/וֹ אֲשֶׁ֥ר נָתַ֖תִּי לָ/כֶֽם־׀־־׃
translation:
  text: until the LORD gives rest to your brothers as to you, and they also take possession
    of the land that the LORD your God is giving them beyond the Jordan. Then each
    of you may return to his possession that I have given you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to your fellow Israelites.' The Hebrew says 'your brothers,' using a
      masculine kinship term for fellow members of Israel.
    reason: lexical_alternative
  - marker: b
    text: Or 'across the Jordan.' The phrase is relative to the speaker's location
      east of the river.
    reason: lexical_alternative
  - marker: c
    text: Or 'to his inheritance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָנִיחַ
  chosen: gives rest
  alternatives:
  - gives relief
  - settles
  lexicon: HALOT
  rationale: Hiphil of נוח here means to cause to rest or give rest/relief. 'Gives
    rest' is the most natural English and fits the Deuteronomic theme of settled security
    in the land.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name is rendered 'the LORD' rather
    than transliterated.
- source_word: לַאֲחֵיכֶם
  chosen: to your brothers
  alternatives:
  - to your brothers and sisters
  - to your fellow Israelites
  lexicon: HALOT
  rationale: אָח in the plural here refers to fellow members of Israel. Following
    the gender-accurate policy, 'brothers' preserves the masculine representative
    form; a more inclusive sense is contextually possible but not placed in the main
    text.
- source_word: כָכֶם
  chosen: as to you
  alternatives:
  - as he has to you
  - like you
  lexicon: HALOT
  rationale: The comparison is elliptical in Hebrew. 'As to you' preserves the sense
    that the LORD will grant the same rest to their brothers as he has already granted
    to the Transjordan tribes.
- source_word: וְיָרְשׁוּ
  chosen: take possession of
  alternatives:
  - inherit
  - possess
  lexicon: HALOT
  rationale: ירשׁ can mean inherit or dispossess/possess. In land-allotment contexts,
    'take possession of' communicates the concrete act without implying merely passive
    inheritance.
- source_word: גַם הֵם
  chosen: they also
  alternatives:
  - they too
  lexicon: HALOT
  rationale: This combination adds emphasis that the western tribes, like the eastern
    ones, will likewise receive their land.
- source_word: נֹתֵן
  chosen: is giving
  alternatives:
  - gives
  - will give
  lexicon: HALOT
  rationale: The participle presents the gift as certain and in process from Moses'
    perspective. English progressive best captures the aspect while remaining natural.
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  chosen: beyond the Jordan
  alternatives:
  - across the Jordan
  - on the other side of the Jordan
  lexicon: HALOT
  rationale: The phrase is spatially relative. 'Beyond the Jordan' is a conventional
    and sufficiently transparent rendering here, referring to the land west of the
    river from the speaker's east-of-Jordan vantage point.
- source_word: וְשַׁבְתֶּם
  chosen: Then each of you may return
  alternatives:
  - and you shall return
  - then you shall go back
  lexicon: HALOT
  rationale: 'The waw-consecutive advances the sequence after the conquest obligation
    is fulfilled. ''May return'' fits the permissive force in context: they are allowed
    to go back once their duty is complete.'
- source_word: אִישׁ
  chosen: each of you
  alternatives:
  - each man
  - every one
  lexicon: HALOT
  rationale: Although literally 'man,' the distributive sense is primary here. 'Each
    of you' conveys the individual distribution naturally in English while matching
    the referent, the addressed fighting men.
- source_word: לִירֻשָּׁתוֹ
  chosen: to his possession
  alternatives:
  - to his inheritance
  - to his property
  lexicon: HALOT
  rationale: The noun denotes inherited possession/allotted property. 'Possession'
    avoids sounding overly abstract while preserving the covenantal land-allotment
    sense; 'inheritance' is a viable alternative.
- source_word: נָתַתִּי לָכֶם
  chosen: that I have given you
  alternatives:
  - that I gave you
  lexicon: HALOT
  rationale: The perfect refers to Moses' prior grant/allotment of the Transjordan
    land. Present perfect in English reflects a completed action with present relevance.
