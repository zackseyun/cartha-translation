theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH,
    following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Gendered language in לַאֲחֵיכֶם and אִישׁ
  chosen_reading: Retain 'brothers' for אֲחֵיכֶם; render distributive אִישׁ idiomatically
    as 'each of you'
  alternative_readings:
  - brothers and sisters
  - fellow Israelites
  - each man
  rationale: The source uses masculine forms with representative force. Per translation
    policy, gender-accurate renderings are preferred; however, idiomatic English allows
    'each of you' for distributive אִישׁ without erasing the masculine address context.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
