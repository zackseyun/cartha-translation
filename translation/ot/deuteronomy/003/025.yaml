theological_decisions:
- issue: Geographic sense of הָהָר ('the mountain'/'the hill country')
  chosen_reading: Rendered collectively as 'this good hill country' rather than a
    singular 'this good mountain.'
  alternative_readings:
  - this good mountain
  rationale: The Hebrew singular can function collectively for a mountainous region.
    In Deuteronomy's land-description context and in apposition with 'Lebanon,' a
    regional sense is more likely and avoids implying one specific mountain unless
    the text requires it.
  doctrine_reference: Translation philosophy §1, §5
