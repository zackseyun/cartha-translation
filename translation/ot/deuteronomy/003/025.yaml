id: DEU.3.25
reference: Deuteronomy 3:25
source:
  edition: WLC
  text: אֶעְבְּרָה נָּ֗א וְ/אֶרְאֶה֙ אֶת הָ/אָ֣רֶץ הַ/טּוֹבָ֔ה אֲשֶׁ֖ר בְּ/עֵ֣בֶר
    הַ/יַּרְדֵּ֑ן הָ/הָ֥ר הַ/טּ֛וֹב הַ/זֶּ֖ה וְ/הַ/לְּבָנֽוֹן־־׃
translation:
  text: Please let me cross over and see the good land that is beyond the Jordan,
    this good hill country, and Lebanon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this good mountain.' The Hebrew can refer either to a specific mountain
      or to the mountainous region west of the Jordan.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶעְבְּרָה
  chosen: let me cross over
  alternatives:
  - let me pass over
  - I pray, let me cross
  lexicon: HALOT
  rationale: Qal cohortative 1cs of עבר expresses Moses' request/desire, not a simple
    future. 'Let me cross over' captures the volitional nuance in natural English.
- source_word: נָּא
  chosen: please
  alternatives:
  - I pray
  - now
  lexicon: HALOT
  rationale: Particle of entreaty softening the request. 'Please' is idiomatic modern
    English and preserves the pleading tone without archaic diction.
- source_word: וְאֶרְאֶה
  chosen: and see
  alternatives:
  - that I may see
  - and look upon
  lexicon: HALOT
  rationale: Coordinate cohortative following the first verb, expressing the purpose/result
    of crossing. 'And see' is concise and natural in English.
- source_word: הָאָרֶץ הַטּוֹבָה
  chosen: the good land
  alternatives:
  - the good country
  lexicon: HALOT
  rationale: אָרֶץ commonly means 'land' in Deuteronomy's territorial context. 'Good
    land' preserves the covenant-land emphasis and echoes Deuteronomic diction.
- source_word: אֲשֶׁר בְּעֵבֶר הַיַּרְדֵּן
  chosen: that is beyond the Jordan
  alternatives:
  - that is across the Jordan
  - that is on the other side of the Jordan
  lexicon: HALOT
  rationale: בְּעֵבֶר denotes the region across/beyond the Jordan from the speaker's
    current standpoint east of the river. 'Beyond the Jordan' is idiomatic and sufficiently
    literal.
- source_word: הָהָר הַטּוֹב הַזֶּה
  chosen: this good hill country
  alternatives:
  - this good mountain
  - this fine hill country
  lexicon: HALOT
  rationale: הָר can denote not only a single mountain but mountainous country. In
    context, paired with 'Lebanon,' it likely refers to the highland region of Canaan
    rather than one peak. 'Hill country' best conveys the geographic sense in readable
    English.
- source_word: וְהַלְּבָנוֹן
  chosen: and Lebanon
  lexicon: HALOT
  rationale: Proper place name, transliterated per project philosophy. It likely specifies
    the northern mountain region as part of the land Moses longs to see.
