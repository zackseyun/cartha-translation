id: DEU.3.14
reference: Deuteronomy 3:14
source:
  edition: WLC
  text: יָאִ֣יר בֶּן מְנַשֶּׁ֗ה לָקַח֙ אֶת כָּל חֶ֣בֶל אַרְגֹּ֔ב עַד גְּב֥וּל הַ/גְּשׁוּרִ֖י
    וְ/הַ/מַּֽעֲכָתִ֑י וַ/יִּקְרָא֩ אֹתָ֨/ם עַל שְׁמ֤/וֹ אֶת הַ/בָּשָׁן֙ חַוֺּ֣ת יָאִ֔יר
    עַ֖ד הַ/יּ֥וֹם הַ/זֶּֽה־־־־־־׃
translation:
  text: Jair son of Manasseh took all the region of Argob, as far as the border of
    the Geshurites and the Maacathites, and he called them—that is, Bashan—Havvoth-jair,
    to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'and he called them after his own name, Bashan, Havvoth-jair.'
      The Hebrew syntax is compressed and may be understood slightly differently.
    reason: alternative_reading
  - marker: b
    text: Havvoth-jair likely means 'the villages of Jair' or 'the tent-settlements
      of Jair.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶבֶל
  chosen: region
  alternatives:
  - tract
  - territory
  - district
  lexicon: HALOT
  rationale: In this geographical context חֶבֶל refers to a defined area or tract
    of land. 'Region' is natural modern English and preserves the territorial sense
    without sounding overly technical.
- source_word: אַרְגֹּב
  chosen: Argob
  rationale: Proper place name; transliterated per translation philosophy.
- source_word: עַד גְּב֥וּל הַגְּשׁוּרִי וְהַמַּעֲכָתִי
  chosen: as far as the border of the Geshurites and the Maacathites
  alternatives:
  - up to the territory of the Geshurites and the Maacathites
  lexicon: HALOT
  rationale: גְּבוּל commonly denotes border or boundary. The gentilic forms are best
    rendered as people-groups ('Geshurites,' 'Maacathites'), with the sense that Argob
    extended to their border.
- source_word: וַיִּקְרָא אֹתָם
  chosen: he called them
  alternatives:
  - he named them
  - he called it
  lexicon: HALOT
  rationale: The Hebrew object suffix is masculine plural ('them'), likely referring
    to the settlements/encampments designated by the following phrase. The plural
    should be preserved rather than smoothed into a singular.
- source_word: עַל שְׁמוֹ
  chosen: after his own name
  alternatives:
  - by his name
  - according to his name
  lexicon: HALOT
  rationale: The idiom means naming something after oneself. This is the clearest
    English equivalent.
- source_word: אֶת הַבָּשָׁן
  chosen: that is, Bashan
  alternatives:
  - Bashan
  - in Bashan
  lexicon: HALOT
  rationale: The syntax is difficult. The phrase likely appositionally identifies
    the area being named as Bashan. To make the Hebrew understandable in English without
    over-paraphrasing, an appositional clarifier is used. A more literal alternative
    is preserved in a footnote.
- source_word: חַוֹּת יָאִיר
  chosen: Havvoth-jair
  alternatives:
  - the villages of Jair
  - the tent-settlements of Jair
  lexicon: HALOT
  rationale: This is a toponym formed from חַוֹּת plus Jair. Because it functions
    as a place name elsewhere, transliteration is preferable in the main text; lexical
    alternatives are preserved in a footnote since the underlying noun may denote
    villages or tent-settlements.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: Standard idiomatic rendering indicating the name persisted up to the
    narrator's present.
