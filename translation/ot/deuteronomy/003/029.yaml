id: DEU.3.29
reference: Deuteronomy 3:29
source:
  edition: WLC
  text: וַ/נֵּ֣שֶׁב בַּ/גָּ֔יְא מ֖וּל בֵּ֥ית פְּעֽוֹר׃פ
translation:
  text: So we stayed in the valley opposite Beth-peor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “And we dwelt in the valley facing Beth-peor.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנֵּשֶׁב
  chosen: So we stayed
  alternatives:
  - And we dwelt
  - And we remained
  - So we lived
  lexicon: HALOT
  rationale: From ישׁב in the waw-consecutive imperfect 1cp, narrating past action.
    'Stayed' gives natural modern English for encampment/residence in a location without
    sounding overly formal; 'So' reflects the narrative continuation force of waw
    in context.
- source_word: בַּגָּיְא
  chosen: in the valley
  alternatives:
  - in the ravine
  - in the gorge
  lexicon: HALOT
  rationale: גַּיְא denotes a valley, ravine, or gorge. 'Valley' is the broadest and
    most idiomatic English choice here, while preserving the topographical sense without
    over-specifying terrain.
- source_word: מוּל
  chosen: opposite
  alternatives:
  - facing
  - across from
  - before
  lexicon: HALOT
  rationale: מוּל commonly indicates spatial correspondence or position in front of/opposite
    something. 'Opposite' is concise and natural with a place name in English.
- source_word: בֵּית פְּעוֹר
  chosen: Beth-peor
  alternatives:
  - Beth Peor
  - the house of Peor
  lexicon: HALOT
  rationale: This is a place name and should be transliterated rather than translated,
    per project philosophy. Hyphenation in 'Beth-peor' aids readability while preserving
    the Hebrew form.
