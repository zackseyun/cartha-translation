theological_decisions:
- issue: Whether הָרְפָאִים should be rendered interpretively as 'giants' or preserved
    as a proper group name
  chosen_reading: the Rephaim
  alternative_readings:
  - the giants
  rationale: The Hebrew term names a known people-group/category in the OT. Rendering
    it as 'giants' imports an interpretation rather than translating the term directly.
    The context implies unusual stature, but the translation preserves the lexical
    form and leaves the inference to readers.
  doctrine_reference: Translation philosophy §1, §5
- issue: Whether עֶרֶשׂ here refers to a bed/couch or a bier/sarcophagus
  chosen_reading: bed
  alternative_readings:
  - couch
  - bier
  - sarcophagus
  rationale: The immediate context uses the object's dimensions to underscore Og's
    extraordinary size, which fits 'bed' naturally. More specialized funerary senses
    are possible in later interpretation but are not demanded by the Hebrew here.
  doctrine_reference: Translation philosophy §1, §6
