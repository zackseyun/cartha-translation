id: DEU.3.11
reference: Deuteronomy 3:11
source:
  edition: WLC
  text: כִּ֣י רַק ע֞וֹג מֶ֣לֶךְ הַ/בָּשָׁ֗ן נִשְׁאַר֮ מִ/יֶּ֣תֶר הָ/רְפָאִים֒ הִנֵּ֤ה
    עַרְשׂ/וֹ֙ עֶ֣רֶשׂ בַּרְזֶ֔ל הֲ/לֹ֣ה הִ֔וא בְּ/רַבַּ֖ת בְּנֵ֣י עַמּ֑וֹן תֵּ֧שַׁע
    אַמּ֣וֹת אָרְכָּ֗/הּ וְ/אַרְבַּ֥ע אַמּ֛וֹת רָחְבָּ֖/הּ בְּ/אַמַּת אִֽישׁ־־׃
translation:
  text: For only Og king of Bashan was left from the remnant of the Rephaim. Look,
    his bed was a bed of iron. Is it not in Rabbah of the Ammonites? Its length was
    nine cubits and its width four cubits, by the cubit of a man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the giants.' Hebrew 'Rephaim,' likely the name of an ancient people
      associated with great size.
    reason: alternative_reading
  - marker: b
    text: Or 'by an ordinary cubit' or 'according to the common cubit.' Hebrew literally,
      'by the cubit of a man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  chosen: only
  alternatives:
  - alone
  - surely only
  lexicon: HALOT
  rationale: 'Marks exclusivity: Og alone remained from this group.'
- source_word: נִשְׁאַר מִיֶּתֶר
  chosen: was left from the remnant of
  alternatives:
  - remained of the rest of
  - survived from the remainder of
  lexicon: HALOT
  rationale: Combines the passive verb with the prepositional phrase to express that
    Og was the sole survivor from what remained of the Rephaim.
- source_word: הָרְפָאִים
  chosen: the Rephaim
  alternatives:
  - the giants
  lexicon: HALOT
  rationale: A transliterated ethnic/clan term is preferable to the interpretive gloss
    'giants.' The term may denote an ancient people associated with unusual size,
    but the Hebrew form itself is preserved.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Uses readable modern English while preserving the demonstrative force
    that draws attention to the object cited as evidence.
- source_word: עַרְשׂוֹ ... עֶרֶשׂ
  chosen: his bed was a bed
  alternatives:
  - his couch was a couch
  - his bier was a bier
  lexicon: HALOT
  rationale: The repeated noun is retained for emphasis. 'Bed' is the most natural
    default; 'bier/sarcophagus' is possible in some discussions but less likely in
    context, where dimensions are given as a sign of Og's great size.
- source_word: בַּרְזֶל
  chosen: iron
  lexicon: HALOT
  rationale: Straightforward material term; no reason to paraphrase.
- source_word: הֲלֹה הִוא
  chosen: Is it not
  alternatives:
  - Is it not indeed
  - Surely it is
  lexicon: HALOT
  rationale: Represents the rhetorical question that appeals to a known object/location.
- source_word: בְּרַבַּת בְּנֵי עַמּוֹן
  chosen: in Rabbah of the Ammonites
  alternatives:
  - in Rabbah of the sons of Ammon
  - in Rabbah of the Ammonite people
  lexicon: HALOT
  rationale: Uses the standard English place name Rabbah and renders the gentilic
    phrase idiomatically as 'the Ammonites.'
- source_word: תֵּשַׁע אַמּוֹת ... וְאַרְבַּע אַמּוֹת
  chosen: nine cubits ... four cubits
  lexicon: HALOT
  rationale: Keeps the ancient measurement in the text rather than converting it,
    preserving formal correspondence and avoiding false precision.
- source_word: בְּאַמַּת אִישׁ
  chosen: by the cubit of a man
  alternatives:
  - according to the common cubit
  - by an ordinary cubit
  lexicon: HALOT
  rationale: A formally close rendering preserves the Hebrew expression. The phrase
    likely distinguishes a standard human cubit measurement, but the literal wording
    is retained and the interpretive alternative is preserved in a footnote.
