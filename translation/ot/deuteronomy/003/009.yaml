id: DEU.3.9
reference: Deuteronomy 3:9
source:
  edition: WLC
  text: צִידֹנִ֛ים יִקְרְא֥וּ לְ/חֶרְמ֖וֹן שִׂרְיֹ֑ן וְ/הָ֣/אֱמֹרִ֔י יִקְרְאוּ ל֖/וֹ
    שְׂנִֽיר־׃
translation:
  text: The Sidonians call Hermon Sirion, and the Amorites call it Senir—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Mount Hermon'; the Hebrew text here has simply 'Hermon.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew form 'the Amorite' is collective here, hence 'the Amorites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צִידֹנִים
  chosen: The Sidonians
  alternatives:
  - Sidonians
  lexicon: HALOT
  rationale: Gentilic plural referring to the people of Sidon. The article is supplied
    in English for natural style when introducing an ethnic group as subject.
- source_word: יִקְרְאוּ
  chosen: call
  alternatives:
  - name
  lexicon: HALOT
  rationale: 'Qal imperfect of קרא with ל marks naming/designation: ''call'' or ''name.''
    ''Call'' is idiomatic and concise in English here.'
- source_word: לְחֶרְמוֹן
  chosen: Hermon
  alternatives:
  - Mount Hermon
  lexicon: HALOT
  rationale: Proper place name. The preposition ל with קרא indicates the object receiving
    the name ('call Hermon...'). 'Mount' is not explicit in the Hebrew of this verse,
    so it is not added to the main text.
- source_word: שִׂרְיֹן
  chosen: Sirion
  lexicon: HALOT
  rationale: Proper name used by the Sidonians for Hermon. Transliteration follows
    the philosophy of transliterating names rather than translating them.
- source_word: וְהָאֱמֹרִי
  chosen: and the Amorites
  alternatives:
  - and the Amorite
  lexicon: HALOT
  rationale: Although morphologically singular in form, the gentilic here functions
    collectively, parallel to the plural 'Sidonians' and the plural verb 'they call.'
    English plural 'the Amorites' best reflects the collective sense.
- source_word: יִקְרְאוּ לוֹ
  chosen: call it
  alternatives:
  - call it by the name
  - call to it
  lexicon: HALOT
  rationale: The pronoun refers back to Hermon. English 'call it' captures the naming
    sense naturally; a more wooden rendering would be less readable without adding
    meaning.
- source_word: שְׂנִיר
  chosen: Senir
  alternatives:
  - Senir
  lexicon: HALOT
  rationale: Proper name used by the Amorites for Hermon. Standard transliteration
    retained.
