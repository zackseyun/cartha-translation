id: DEU.3.8
reference: Deuteronomy 3:8
source:
  edition: WLC
  text: וַ/נִּקַּ֞ח בָּ/עֵ֤ת הַ/הִוא֙ אֶת הָ/אָ֔רֶץ מִ/יַּ֗ד שְׁנֵי֙ מַלְכֵ֣י הָ/אֱמֹרִ֔י
    אֲשֶׁ֖ר בְּ/עֵ֣בֶר הַ/יַּרְדֵּ֑ן מִ/נַּ֥חַל אַרְנֹ֖ן עַד הַ֥ר חֶרְמֽוֹן־־׃
translation:
  text: And at that time we took the land from the hand of the two kings of the Amorites
    who were beyond the Jordan, from the Wadi Arnon as far as Mount Hermon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the Arnon Valley' or 'from the Arnon River'; the Hebrew נחל can
      refer to a wadi, streambed, or valley.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנִּקַּח
  chosen: we took
  alternatives:
  - we captured
  - we seized
  lexicon: HALOT
  rationale: Qal wayyiqtol 1cp of לקח, here narrating Israel's taking possession of
    territory. 'We took' is the most natural and sufficiently formal rendering; 'captured'
    or 'seized' would add military color beyond the verb itself.
- source_word: בָּעֵת הַהִוא
  chosen: at that time
  alternatives:
  - in that time
  - at that moment
  lexicon: HALOT
  rationale: Standard temporal expression. 'At that time' is idiomatic modern English
    and preserves the narrative reference.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the territory
  - the country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to a defined tract of land taken from the Amorite kings,
    not the whole earth. 'The land' is the most natural biblical-English rendering.
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from
  - out of the power of
  lexicon: HALOT
  rationale: Literally 'from the hand of,' a common Hebrew idiom for taking from someone's
    possession or control. The idiom is transparent enough in English and preserves
    the source texture.
- source_word: שְׁנֵי מַלְכֵי הָאֱמֹרִי
  chosen: the two kings of the Amorites
  alternatives:
  - the two Amorite kings
  lexicon: HALOT
  rationale: Both are accurate. 'The two kings of the Amorites' follows the Hebrew
    construct more closely while remaining clear.
- source_word: אֲשֶׁר בְּעֵבֶר הַיַּרְדֵּן
  chosen: who were beyond the Jordan
  alternatives:
  - who were across the Jordan
  - who were on the other side of the Jordan
  lexicon: HALOT
  rationale: בְּעֵבֶר הַיַּרְדֵּן is a geographic expression. 'Beyond the Jordan'
    is concise and conventional; it preserves the relative spatial perspective without
    overexplaining.
- source_word: מִנַּחַל אַרְנֹן
  chosen: from the Wadi Arnon
  alternatives:
  - from the Arnon Valley
  - from the Arnon River
  lexicon: HALOT
  rationale: נחל can denote a wadi/streambed/valley. 'Wadi' best captures the Levantine
    geographical term without forcing a perennial-river sense; 'Arnon' is transliterated
    as a place name.
- source_word: עַד הַר חֶרְמוֹן
  chosen: as far as Mount Hermon
  alternatives:
  - to Mount Hermon
  - up to Mount Hermon
  lexicon: HALOT
  rationale: עַד marks the extent of the territory. 'As far as Mount Hermon' clearly
    expresses the boundary sense; 'Mount Hermon' translates הַר and transliterates
    the proper name חֶרְמוֹן.
