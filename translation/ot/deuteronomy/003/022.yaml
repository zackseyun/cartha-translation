id: DEU.3.22
reference: Deuteronomy 3:22
source:
  edition: WLC
  text: לֹ֖א תְִּירָא֑וּ/ם כִּ֚י יְהוָ֣ה אֱלֹֽהֵי/כֶ֔ם ה֖וּא הַ/נִּלְחָ֥ם לָ/כֶֽם׃ס
translation:
  text: Do not fear them, for the LORD your God is the one who fights for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Do not be afraid of them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  chosen: Do not
  alternatives:
  - not
  lexicon: HALOT
  rationale: Standard negation used with the following imperfect to express prohibition
    in English.
- source_word: תִּירָאוּם
  chosen: fear them
  alternatives:
  - be afraid of them
  lexicon: HALOT
  rationale: From ירא, 'to fear, be afraid.' The 2mp form with 3mp suffix directly
    means 'you (plural) shall fear them / be afraid of them.' 'Fear them' is concise
    and natural, while preserving the object suffix.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the prohibition. 'For' best preserves
    the explanatory force in a formal yet readable way.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: 'Though morphologically plural in form, אֱלֹהִים with singular reference
    to Israel''s God is idiomatically singular. The suffix marks second person plural
    possession: ''your God.'''
- source_word: הוּא
  chosen: is the one who
  alternatives:
  - he is the one who
  - he
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis. Rendering it as 'is the one who'
    brings the emphatic force into natural English better than a bare 'he'.
- source_word: הַנִּלְחָם
  chosen: fights
  alternatives:
  - is fighting
  - wars
  - does battle
  lexicon: HALOT
  rationale: 'The participle of לחם conveys ongoing characteristic action: ''the one
    fighting.'' English present ''fights'' communicates this well in a general assurance
    context.'
- source_word: לָכֶם
  chosen: for you
  alternatives:
  - on your behalf
  lexicon: HALOT
  rationale: The preposition ל here indicates advantage/benefit. 'For you' is the
    most natural and direct rendering.
