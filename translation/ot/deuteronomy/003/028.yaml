id: DEU.3.28
reference: Deuteronomy 3:28
source:
  edition: WLC
  text: וְ/צַ֥ו אֶת יְהוֹשֻׁ֖עַ וְ/חַזְּקֵ֣/הוּ וְ/אַמְּצֵ֑/הוּ כִּי ה֣וּא יַעֲבֹ֗ר
    לִ/פְנֵי֙ הָ/עָ֣ם הַ/זֶּ֔ה וְ/הוּא֙ יַנְחִ֣יל אוֹתָ֔/ם אֶת הָ/אָ֖רֶץ אֲשֶׁ֥ר תִּרְאֶֽה־־־׃
translation:
  text: But commission Joshua, and strengthen him and encourage him, for he will cross
    over before this people, and he will cause them to inherit the land that you will
    see.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'command Joshua' or 'charge Joshua.' The Hebrew verb can denote giving
      a formal charge; 'commission' highlights the official entrusting of leadership.
    reason: lexical_alternative
  - marker: b
    text: Or 'make him courageous.' The paired verbs 'strengthen' and 'encourage'
      render a common Hebrew exhortation to firmness and courage.
    reason: lexical_alternative
  - marker: c
    text: 'Or ''he will give them the land as an inheritance.'' The Hebrew verb is
      causative: Joshua will be the agent through whom the people come to possess
      their inheritance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְצַו
  chosen: commission
  alternatives:
  - command
  - charge
  lexicon: HALOT
  rationale: The piel imperative of צוה here is not merely a generic command but an
    official entrusting of responsibility to Joshua. 'Commission' captures the formal
    transfer of leadership better than the flatter 'command,' while remaining natural
    English.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: וְחַזְּקֵהוּ
  chosen: strengthen him
  alternatives:
  - make him strong
  lexicon: HALOT
  rationale: From חזק in the piel, the sense is to strengthen or make firm. 'Strengthen
    him' is idiomatic and preserves the imperative force.
- source_word: וְאַמְּצֵהוּ
  chosen: encourage him
  alternatives:
  - make him courageous
  - fortify him
  lexicon: HALOT
  rationale: אמץ in this collocation with חזק often carries the nuance of emboldening
    or encouraging. Rendering the pair as 'strengthen him and encourage him' preserves
    the distinct but complementary force without sounding wooden.
- source_word: כִּי הוּא יַעֲבֹר
  chosen: for he will cross over
  alternatives:
  - for he will pass over
  - for he will go over
  lexicon: HALOT
  rationale: עבר commonly means to cross over, especially in Deuteronomy's Jordan-crossing
    context. 'Cross over' is both literal and contextually apt.
- source_word: לִפְנֵי הָעָם הַזֶּה
  chosen: before this people
  alternatives:
  - ahead of this people
  - in front of this people
  lexicon: HALOT
  rationale: לִפְנֵי can denote spatial position and leadership. 'Before this people'
    preserves the Hebrew wording and implies leadership without over-interpreting.
- source_word: וְהוּא יַנְחִיל אֹתָם
  chosen: and he will cause them to inherit
  alternatives:
  - and he will give them as an inheritance
  - and he will lead them to inherit
  lexicon: HALOT
  rationale: 'The hiphil of נחל is causative: Joshua will cause Israel to inherit/receive
    their inheritance. ''Cause them to inherit'' preserves this causative nuance more
    precisely than simply ''give them the land.'''
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ/land
  lexicon: HALOT
  rationale: In Deuteronomy this ordinarily refers to the promised land. 'The land'
    is the natural and sufficiently specific rendering.
- source_word: אֲשֶׁר תִּרְאֶה
  chosen: that you will see
  alternatives:
  - which you are seeing
  - that you are about to see
  lexicon: HALOT
  rationale: 'The relative clause refers to the land Moses is permitted to view but
    not enter. The imperfect is well rendered here as future: ''that you will see.'''
