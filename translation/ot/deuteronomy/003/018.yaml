id: DEU.3.18
reference: Deuteronomy 3:18
source:
  edition: WLC
  text: וָ/אֲצַ֣ו אֶתְ/כֶ֔ם בָּ/עֵ֥ת הַ/הִ֖וא לֵ/אמֹ֑ר יְהוָ֣ה אֱלֹהֵי/כֶ֗ם נָתַ֨ן
    לָ/כֶ֜ם אֶת הָ/אָ֤רֶץ הַ/זֹּאת֙ לְ/רִשְׁתָּ֔/הּ חֲלוּצִ֣ים תַּֽעַבְר֗וּ לִ/פְנֵ֛י
    אֲחֵי/כֶ֥ם בְּנֵֽי יִשְׂרָאֵ֖ל כָּל בְּנֵי חָֽיִל־־־־׃
translation:
  text: And I commanded you at that time, saying, ‘The LORD your God has given you
    this land to possess it. You shall cross over armed before your brothers, the
    sons of Israel—all the men of valor.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your fellow Israelites'; the Hebrew reads 'your brothers, the sons of
      Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'equipped for battle' for 'armed.'
    reason: lexical_alternative
  - marker: c
    text: '''Men of valor'' refers to able fighting men, not merely inward courage.'
    reason: cultural_note
lexical_decisions:
- source_word: וָאֲצַו
  chosen: And I commanded
  alternatives:
  - And I charged
  - And I ordered
  lexicon: HALOT
  rationale: צוה commonly denotes giving a command or charge. 'Commanded' is the most
    direct and natural rendering in context.
- source_word: בָּעֵת הַהִוא
  chosen: at that time
  alternatives:
  - in that time
  - at that moment
  lexicon: HALOT
  rationale: Standard temporal expression; 'at that time' is idiomatic English and
    preserves the narrative setting.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Conventional speech introducer; 'saying' keeps the formal narrative flow
    without paraphrase.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Construct with second person plural suffix; straightforwardly 'your God'.
- source_word: נָתַן לָכֶם
  chosen: has given you
  alternatives:
  - gave you
  lexicon: HALOT
  rationale: The perfect can be rendered as a present perfect in English to reflect
    a completed act with present relevance in Moses' speech.
- source_word: הָאָרֶץ הַזֹּאת
  chosen: this land
  alternatives:
  - this הארץ
  - this territory
  lexicon: HALOT
  rationale: '''Land'' is the normal rendering of אֶרֶץ here, referring to the territory
    east of the Jordan.'
- source_word: לְרִשְׁתָּהּ
  chosen: to possess it
  alternatives:
  - to take possession of it
  - to inherit it
  lexicon: HALOT
  rationale: ירשׁ in this context refers to taking/holding possession of the land.
    'Possess it' is concise and standard; 'inherit' could suggest passive reception
    more than the military-settlement context warrants.
- source_word: חֲלוּצִים
  chosen: armed
  alternatives:
  - equipped for battle
  - in battle array
  lexicon: HALOT
  rationale: The term refers to men prepared for military action. 'Armed' is clear
    modern English and fits the immediate command to cross over ahead of their brothers.
- source_word: תַּעַבְרוּ
  chosen: You shall cross over
  alternatives:
  - you must cross over
  - you are to cross over
  lexicon: HALOT
  rationale: Imperfect in direct command context; 'shall' preserves the formal imperative
    force without sounding overly colloquial.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - ahead of
  - in front of
  lexicon: HALOT
  rationale: In military movement context, 'before' means going in advance of; it
    is concise and faithful.
- source_word: אֲחֵיכֶם
  chosen: your brothers
  alternatives:
  - your brothers and sisters
  - your kinsmen
  lexicon: HALOT
  rationale: Per gender-accurate policy, the masculine plural familial term is retained
    as 'brothers.' A more inclusive alternative is possible interpretively, but the
    source wording is masculine and representative.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: A more formal rendering preserves the Hebrew idiom and appositional relation
    to 'your brothers.' 'Israelites' is possible but slightly less transparent to
    the source structure.
- source_word: כָּל בְּנֵי חָיִל
  chosen: all the men of valor
  alternatives:
  - every mighty man
  - all the warriors
  - all the able-bodied fighting men
  lexicon: HALOT
  rationale: חַיִל here denotes martial strength/valor. 'Men of valor' is a well-established
    and accurate rendering that preserves both masculinity and military capability.
