theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered language in אֲחֵיכֶם / בְּנֵי יִשְׂרָאֵל / בְּנֵי חָיִל
  chosen_reading: your brothers ... the sons of Israel ... men of valor
  alternative_readings:
  - your fellow Israelites
  - your brothers and sisters ... Israelites ... warriors
  rationale: The Hebrew uses grammatically masculine representative terms in a military
    census context. Per doctrine, gender-accurate renderings are preferred over flattening
    to gender-neutral English, while an inclusive interpretive alternative may be
    noted in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
