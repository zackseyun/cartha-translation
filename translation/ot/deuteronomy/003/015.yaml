id: DEU.3.15
reference: Deuteronomy 3:15
source:
  edition: WLC
  text: וּ/לְ/מָכִ֖יר נָתַ֥תִּי אֶת הַ/גִּלְעָֽד־׃
translation:
  text: And to Machir I gave Gilead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the Gilead,' with the article; English idiom normally renders the
      place name simply as 'Gilead.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/מָכִיר
  chosen: And to Machir
  alternatives:
  - And for Machir
  - Now to Machir
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition naturally yield 'and to Machir.'
    'Machir' is a personal name and is therefore transliterated, per translation philosophy.
    The conjunction is retained because it links this allotment statement with the
    surrounding distribution narrative.
- source_word: נָתַתִּי
  chosen: I gave
  alternatives:
  - I have given
  - I assigned
  lexicon: HALOT
  rationale: Qal perfect 1cs of נתן is most straightforwardly rendered 'I gave.' In
    this narrative recollection, simple past English is the clearest equivalent. 'Assigned'
    is interpretive and less direct than the Hebrew verb.
- source_word: אֶת
  chosen: '[direct object marker not translated]'
  lexicon: Hebrew grammar
  rationale: The particle marks the definite direct object and has no independent
    English equivalent, so it is represented implicitly in normal English syntax.
- source_word: הַגִּלְעָד
  chosen: Gilead
  alternatives:
  - the Gilead
  - the hill country of Gilead
  lexicon: HALOT
  rationale: As a place name with the article in Hebrew, 'Gilead' is the most natural
    English rendering. English normally omits the article with established place names.
    'The hill country of Gilead' adds specificity not explicit in this verse alone.
