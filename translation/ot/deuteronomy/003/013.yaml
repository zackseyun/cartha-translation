id: DEU.3.13
reference: Deuteronomy 3:13
source:
  edition: WLC
  text: וְ/יֶ֨תֶר הַ/גִּלְעָ֤ד וְ/כָל הַ/בָּשָׁן֙ מַמְלֶ֣כֶת ע֔וֹג נָתַ֕תִּי לַ/חֲצִ֖י
    שֵׁ֣בֶט הַֽ/מְנַשֶּׁ֑ה כֹּ֣ל חֶ֤בֶל הָֽ/אַרְגֹּב֙ לְ/כָל הַ/בָּשָׁ֔ן הַ/ה֥וּא
    יִקָּרֵ֖א אֶ֥רֶץ רְפָאִֽים־־׃
translation:
  text: And the rest of Gilead, and all Bashan, the kingdom of Og, I gave to the half-tribe
    of Manasseh—all the region of Argob, that is, all Bashan. That was called the
    land of the Rephaim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, 'the land of the giants.' 'Rephaim' is the Hebrew name
      of an ancient people associated with this region.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶתֶר
  chosen: the rest of
  alternatives:
  - the remainder of
  lexicon: HALOT
  rationale: Conveys what remains of Gilead after the earlier allotment; 'the rest
    of' is natural modern English and sufficiently formal.
- source_word: הַגִּלְעָד
  chosen: Gilead
  lexicon: HALOT
  rationale: Standard transliteration of the place name.
- source_word: כָל הַבָּשָׁן
  chosen: all Bashan
  alternatives:
  - the whole of Bashan
  lexicon: HALOT
  rationale: Retains the comprehensive force of כָל with idiomatic English word order.
- source_word: מַמְלֶכֶת עוֹג
  chosen: the kingdom of Og
  alternatives:
  - Og's kingdom
  lexicon: HALOT
  rationale: A straightforward construct rendering; preserves the political designation
    of the territory.
- source_word: נָתַתִּי
  chosen: I gave
  alternatives:
  - I assigned
  lexicon: HALOT
  rationale: The common verb 'gave' fits the allotment context and preserves the first-person
    divine speech without over-interpreting.
- source_word: לַחֲצִי שֵׁבֶט הַמְנַשֶּׁה
  chosen: to the half-tribe of Manasseh
  alternatives:
  - to half the tribe of Manasseh
  lexicon: HALOT
  rationale: This is the conventional and clear rendering for the tribal subdivision
    in the Transjordan allotment.
- source_word: כֹּל חֶבֶל הָאַרְגֹּב
  chosen: all the region of Argob
  alternatives:
  - all the district of Argob
  - the whole tract of Argob
  lexicon: HALOT
  rationale: חֶבֶל here denotes a territory or district, not a literal 'cord.' 'Region'
    is readable and accurate.
- source_word: לְכָל הַבָּשָׁן
  chosen: that is, all Bashan
  alternatives:
  - belonging to all Bashan
  - with all Bashan
  lexicon: HALOT
  rationale: The phrase is appositional/explanatory in context, identifying the Argob
    region with Bashan as a whole or as its full extent in view. 'That is' makes the
    relation intelligible in English.
- source_word: הַהוּא
  chosen: that
  alternatives:
  - this same
  lexicon: HALOT
  rationale: Demonstrative referring back to the territory just mentioned; 'that'
    is the natural English equivalent.
- source_word: יִקָּרֵא
  chosen: was called
  alternatives:
  - is called
  - was known as
  lexicon: HALOT
  rationale: The imperfect passive can express customary designation. In English narrative
    style, 'was called' fits the retrospective description.
- source_word: אֶרֶץ רְפָאִים
  chosen: the land of the Rephaim
  alternatives:
  - the land of the giants
  lexicon: HALOT
  rationale: Rephaim is best transliterated as an ethnonym/group name rather than
    interpreted as 'giants' in the main text. The interpretive alternative is worth
    preserving in a footnote because of traditional English usage and contextual association.
