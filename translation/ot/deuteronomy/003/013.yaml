theological_decisions:
- issue: Whether to render רְפָאִים as a transliterated people-group name or as an
    interpretive term like 'giants'
  chosen_reading: the land of the Rephaim
  alternative_readings:
  - the land of the giants
  rationale: The Hebrew term functions here as a proper ethnonym/toponymic designation.
    Transliteration avoids importing a more interpretive reading into the main text
    while still allowing the traditional understanding to be noted. This preserves
    lexical transparency and avoids overstating what the verse itself explicitly says.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
