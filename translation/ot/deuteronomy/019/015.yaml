id: DEU.19.15
reference: Deuteronomy 19:15
source:
  edition: WLC
  text: לֹֽא יָקוּם֩ עֵ֨ד אֶחָ֜ד בְּ/אִ֗ישׁ לְ/כָל עָוֺן֙ וּ/לְ/כָל חַטָּ֔את בְּ/כָל
    חֵ֖טְא אֲשֶׁ֣ר יֶֽחֱטָ֑א עַל פִּ֣י שְׁנֵ֣י עֵדִ֗ים א֛וֹ עַל פִּ֥י שְׁלֹשָֽׁה עֵדִ֖ים
    יָק֥וּם דָּבָֽר־־־־־׀־־׃
translation:
  text: A single witness shall not stand against a man for any iniquity or for any
    sin, in connection with any sin that he commits; on the testimony of two witnesses
    or on the testimony of three witnesses a matter shall stand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against anyone' / 'against a person.' The Hebrew says 'against a man,'
      using a masculine singular form in a representative legal sense.
    reason: lexical_alternative
  - marker: b
    text: Literally 'by the mouth of two witnesses or by the mouth of three witnesses.'
    reason: lexical_alternative
  - marker: c
    text: Or 'a case shall be established.' The Hebrew verb is the same as earlier
      in the verse ('shall stand'), creating a legal parallel.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָקוּם ... יָקוּם
  chosen: shall not stand ... shall stand
  alternatives:
  - shall not rise ... shall rise
  - shall not be established ... shall be established
  lexicon: HALOT
  rationale: The verb קום literally means 'arise/stand,' but in legal contexts it
    carries the sense of standing as valid or being established. 'Stand' preserves
    the Hebrew imagery while remaining idiomatic in English, and the repetition is
    maintained in both halves of the verse.
- source_word: עֵד אֶחָד
  chosen: a single witness
  alternatives:
  - one witness
  lexicon: HALOT
  rationale: '''Single witness'' is natural English and emphasizes the insufficiency
    of solitary testimony in legal judgment.'
- source_word: בְּאִישׁ
  chosen: against a man
  alternatives:
  - against anyone
  - concerning a man
  lexicon: HALOT
  rationale: The preposition with איש in this legal setting indicates testimony brought
    against a person. 'Man' follows the gender-accurate policy for the masculine singular
    representative usage, while the legal principle is clearly general.
- source_word: לְכָל עָוֺן
  chosen: for any iniquity
  alternatives:
  - for any guilt
  - for any wrongdoing
  lexicon: HALOT
  rationale: עָוֺן often denotes iniquity or guilt. 'Iniquity' preserves the moral-legal
    weight and distinguishes it from the following sin terms.
- source_word: וּלְכָל חַטָּאת
  chosen: or for any sin
  alternatives:
  - or for any offense
  lexicon: HALOT
  rationale: חַטָּאת here is best rendered broadly as 'sin.' Keeping it distinct from
    עָוֺן reflects the Hebrew's accumulation of categories rather than collapsing
    them into one English term.
- source_word: בְּכָל חֵטְא אֲשֶׁר יֶחֱטָא
  chosen: in connection with any sin that he commits
  alternatives:
  - for any sin that he sins
  - regarding any offense that he commits
  lexicon: HALOT
  rationale: The phrase intensifies comprehensiveness. A highly literal rendering
    ('for any sin that he sins') is awkward in English. 'In connection with any sin
    that he commits' preserves the broad legal scope without paraphrasing away the
    repetition.
- source_word: עַל פִּי
  chosen: on the testimony of
  alternatives:
  - by the mouth of
  - on the evidence of
  lexicon: HALOT
  rationale: Literally 'on the mouth of,' this idiom refers to the basis of testimony.
    'On the testimony of' is clear, idiomatic, and faithful to the legal setting.
- source_word: שְׁנֵי עֵדִים ... שְׁלֹשָׁה עֵדִים
  chosen: two witnesses ... three witnesses
  lexicon: HALOT
  rationale: Straightforward numerical legal requirement; the parallelism is preserved.
- source_word: דָּבָר
  chosen: a matter
  alternatives:
  - a case
  - a charge
  - a word
  lexicon: HALOT
  rationale: In judicial context דָּבָר refers to a matter or case under consideration.
    'Matter' is broad enough to preserve the Hebrew while fitting the legal context.
