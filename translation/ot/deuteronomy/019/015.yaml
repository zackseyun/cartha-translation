theological_decisions:
- issue: Gendered representative language in אִישׁ
  chosen_reading: a man
  alternative_readings:
  - anyone
  - a person
  rationale: Per the translation philosophy, gender-accurate renderings are preferred
    over flattening masculine forms into gender-neutral English when the source uses
    masculine representative language. Here the law's application is general, but
    the Hebrew singular masculine is retained in the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
