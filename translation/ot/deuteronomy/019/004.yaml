id: DEU.19.4
reference: Deuteronomy 19:4
source:
  edition: WLC
  text: וְ/זֶה֙ דְּבַ֣ר הָ/רֹצֵ֔חַ אֲשֶׁר יָנ֥וּס שָׁ֖מָּ/ה וָ/חָ֑י אֲשֶׁ֨ר יַכֶּ֤ה
    אֶת רֵעֵ֨/הוּ֙ בִּ/בְלִי דַ֔עַת וְ/ה֛וּא לֹא שֹׂנֵ֥א ל֖/וֹ מִ/תְּמֹ֥ל שִׁלְשֹֽׁם־־־־׃
translation:
  text: 'Now this is the provision for the manslayer who may flee there and live:
    when he strikes his neighbor without intent, and he did not hate him previously.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'from yesterday and the day before.' The idiom means 'previously'
      or 'beforehand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּבַר
  chosen: provision
  alternatives:
  - case
  - matter
  - word
  lexicon: HALOT
  rationale: In legal context, דָּבָר can denote the matter or rule governing a case.
    'Provision' communicates that what follows is the legal stipulation concerning
    the manslayer, more naturally than the overly literal 'word' and more specifically
    than 'matter'.
- source_word: הָרֹצֵחַ
  chosen: manslayer
  alternatives:
  - killer
  - slayer
  - murderer
  lexicon: HALOT
  rationale: In the cities-of-refuge context, the term refers broadly to one who has
    caused a death, not necessarily a culpable murderer. 'Manslayer' preserves the
    legal nuance better than 'murderer' and is more precise than 'killer'.
- source_word: יָנוּס שָׁמָּה
  chosen: may flee there
  alternatives:
  - flees there
  - shall flee there
  lexicon: HALOT
  rationale: The imperfect here states the class of person eligible to flee to the
    refuge city. 'May flee there' captures permitted/defining force in idiomatic English
    without overstating command.
- source_word: וָחָי
  chosen: and live
  alternatives:
  - so that he may live
  - and remain alive
  lexicon: HALOT
  rationale: The waw + perfect here gives the result/purpose of flight to the refuge
    city. 'And live' is concise and preserves the Hebrew sequence, while English readers
    still hear the consequential sense.
- source_word: יַכֶּה
  chosen: strikes
  alternatives:
  - kills
  - fatally strikes
  - hits
  lexicon: HALOT
  rationale: The verb נכה means 'strike/smite.' Since the verse defines the manslayer
    by the act that resulted in death but does not use the direct verb 'kill' here,
    'strikes' better reflects the Hebrew wording while allowing the broader legal
    context to supply the fatal outcome.
- source_word: רֵעֵהוּ
  chosen: his neighbor
  alternatives:
  - his fellow
  - another man
  - his companion
  lexicon: HALOT
  rationale: '''Neighbor'' is a standard and accurate rendering for רֵעַ in interpersonal
    legal contexts. It preserves the relational sense without unnecessary expansion.'
- source_word: בִּבְלִי דַעַת
  chosen: without intent
  alternatives:
  - unintentionally
  - without knowledge
  - without awareness
  lexicon: HALOT
  rationale: Literally 'without knowledge,' but in this legal setting the phrase denotes
    lack of awareness or intent in the act. 'Without intent' communicates the juridical
    force clearly in modern English while remaining faithful to the sense.
- source_word: לֹא שֹׂנֵא לוֹ
  chosen: he did not hate him
  alternatives:
  - he was not hating him
  - he was not an enemy to him
  lexicon: HALOT
  rationale: The participle with negation describes an ongoing prior disposition.
    'He did not hate him' is natural English and preserves the relevance of prior
    animosity to legal culpability.
- source_word: מִתְּמֹל שִׁלְשֹׁם
  chosen: previously
  alternatives:
  - yesterday or the day before
  - formerly
  - in times past
  lexicon: HALOT
  rationale: The idiom literally means 'from yesterday, three days ago,' i.e., previously
    or in the recent past. 'Previously' conveys the idiomatic sense smoothly in modern
    English; the more literal alternative is worth preserving in a footnote for auditability.
