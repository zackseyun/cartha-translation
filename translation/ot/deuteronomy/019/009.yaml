id: DEU.19.9
reference: Deuteronomy 19:9
source:
  edition: WLC
  text: כִּֽי תִשְׁמֹר֩ אֶת כָּל הַ/מִּצְוָ֨ה הַ/זֹּ֜את לַ/עֲשֹׂתָ֗/הּ אֲשֶׁ֨ר אָנֹכִ֣י מְצַוְּ/ךָ֮ הַ/יּוֹם֒ לְ/אַהֲבָ֞ה אֶת יְהוָ֧ה אֱלֹהֶ֛י/ךָ וְ/לָ/לֶ֥כֶת בִּ/דְרָכָ֖י/ו כָּל הַ/יָּמִ֑ים וְ/יָסַפְתָּ֨ לְ/ךָ֥ עוֹד֙ שָׁלֹ֣שׁ עָרִ֔ים עַ֖ל הַ/שָּׁלֹ֥שׁ הָ/אֵֽלֶּה־־־־־׃
translation:
  text: if you keep all this commandment by doing it, which I am commanding you today—to love Yahweh your God and to walk in his ways all your days—then you shall add for yourself three more cities besides these three,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''all this commandment'' (singular); English keeps the singular to reflect the source text''s wording.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: if
  alternatives:
  - for
  - when
  lexicon: HALOT
  rationale: Here כִּי introduces a condition for the expansion of the cities of refuge, not a causal explanation. 'If' best fits the syntax and discourse flow with the following imperfect and perfect/consecutive forms.
- source_word: תִשְׁמֹר
  chosen: you carefully keep
  alternatives:
  - you keep
  - you observe
  lexicon: HALOT
  rationale: שׁמר in covenantal contexts commonly means 'keep/observe' commandments. 'Carefully keep' brings out the covenantal obedience nuance without over-paraphrasing.
- source_word: כָּל הַמִּצְוָה הַזֹּאת
  chosen: all this commandment
  alternatives:
  - this whole commandment
  - all this command
  lexicon: HALOT
  rationale: The Hebrew is singular, not plural. 'All this commandment' preserves the singular form while reflecting the comprehensive force of כָּל.
- source_word: לַעֲשֹׂתָהּ
  chosen: by doing it
  alternatives:
  - to do it
  - to carry it out
  lexicon: HALOT
  rationale: The infinitive expresses the practical enactment of the commandment. 'By doing it' reads naturally in English while preserving the close link between keeping and doing.
- source_word: אֲשֶׁר אָנֹכִי מְצַוְּךָ הַיּוֹם
  chosen: which I am commanding you today
  alternatives:
  - that I command you today
  - which I command you today
  lexicon: HALOT
  rationale: The participle מְצַוֶּה has present/imperfective force. 'I am commanding' preserves that ongoing speech-act nuance in Moses' address.
- source_word: לְאַהֲבָה
  chosen: to love
  alternatives:
  - for loving
  lexicon: HALOT
  rationale: The infinitive gives the content/purpose of the commandment. 'To love' is the most direct and idiomatic rendering.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְלָלֶכֶת בִּדְרָכָיו
  chosen: and to walk in his ways
  alternatives:
  - and to walk in all his ways
  - and to live according to his ways
  lexicon: HALOT
  rationale: This is standard covenantal idiom. 'Walk in his ways' preserves the metaphor rather than flattening it into mere behavior.
- source_word: כָּל הַיָּמִים
  chosen: all your days
  alternatives:
  - always
  - all the days
  lexicon: HALOT
  rationale: Given the second person address, 'all your days' makes explicit the implied personal scope and is idiomatic English for lifelong covenant fidelity.
- source_word: וְיָסַפְתָּ לְךָ עוֹד שָׁלֹשׁ עָרִים
  chosen: then you shall add for yourself three more cities
  alternatives:
  - then you shall add three more cities for yourself
  - you shall increase by three more cities
  lexicon: HALOT
  rationale: יסף means 'add/increase.' The idiom concerns adding additional cities of refuge. 'Three more cities' is the clearest English expression; 'for yourself' reflects לְךָ without overstating possession.
- source_word: עַל הַשָּׁלֹשׁ הָאֵלֶּה
  chosen: besides these three
  alternatives:
  - in addition to these three
  - on top of these three
  lexicon: HALOT
  rationale: עַל here has an additive sense. 'Besides these three' is natural English and clearly communicates addition to the previously designated cities.
