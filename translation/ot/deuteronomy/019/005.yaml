id: DEU.19.5
reference: Deuteronomy 19:5
source:
  edition: WLC
  text: וַ/אֲשֶׁר֩ יָבֹ֨א אֶת רֵעֵ֥/הוּ בַ/יַּעַר֮ לַ/חְטֹ֣ב עֵצִים֒ וְ/נִדְּחָ֨ה
    יָד֤/וֹ בַ/גַּרְזֶן֙ לִ/כְרֹ֣ת הָ/עֵ֔ץ וְ/נָשַׁ֤ל הַ/בַּרְזֶל֙ מִן הָ/עֵ֔ץ וּ/מָצָ֥א
    אֶת רֵעֵ֖/הוּ וָ/מֵ֑ת ה֗וּא יָנ֛וּס אֶל אַחַ֥ת הֶ/עָרִים הָ/אֵ֖לֶּה וָ/חָֽי־־־־־׃
translation:
  text: But if a man goes with his neighbor into the forest to cut wood, and his hand
    swings the axe to cut down the tree, and the iron head slips off the handle and
    strikes his neighbor so that he dies, he may flee to one of these cities and live.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the iron slips off from the wood.' Here 'the iron' refers to
      the axe-head, and 'the wood' refers to the wooden handle.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲשֶׁר
  chosen: But if
  alternatives:
  - and whoever
  - but whoever
  lexicon: HALOT
  rationale: Introduces a casuistic example continuing the prior legal context. 'But
    if' reads naturally in English law-style discourse and reflects the conditional
    force better than a bare relative clause.
- source_word: רֵעֵהוּ
  chosen: his neighbor
  alternatives:
  - his companion
  - his friend
  lexicon: HALOT
  rationale: In legal material רֵעַ commonly denotes a fellow person/associate rather
    than an intimate friend. 'Neighbor' preserves the interpersonal and covenantal-social
    sense in clear English.
- source_word: בַיַּעַר
  chosen: into the forest
  alternatives:
  - into the woods
  lexicon: HALOT
  rationale: יַעַר denotes wooded land/forest. 'Forest' is slightly more formal and
    suits the legal register.
- source_word: לַחְטֹב עֵצִים
  chosen: to cut wood
  alternatives:
  - to chop wood
  - to cut trees
  lexicon: HALOT
  rationale: The phrase refers to woodcutting activity generally. 'Cut wood' is natural
    and broad enough to include felling and chopping without over-specifying.
- source_word: וְנִדְּחָה יָדוֹ
  chosen: his hand swings
  alternatives:
  - his hand is driven
  - his hand is forcefully moved
  lexicon: HALOT
  rationale: The passive/medio-passive form conveys the motion of the hand in the
    act of swinging the axe. English idiom prefers an active rendering here; 'swings'
    captures the practical sense in context.
- source_word: בַגַּרְזֶן
  chosen: the axe
  alternatives:
  - the ax
  lexicon: HALOT
  rationale: Refers to the cutting implement being used. Spelling 'axe' follows a
    standard modern English form.
- source_word: לִכְרֹת הָעֵץ
  chosen: to cut down the tree
  alternatives:
  - to cut the tree
  - to fell the tree
  lexicon: HALOT
  rationale: כרת in this context is felling a tree, not merely trimming it. 'Cut down
    the tree' is accessible modern English; 'fell' is possible but less common.
- source_word: וְנָשַׁל הַבַּרְזֶל
  chosen: the iron head slips off
  alternatives:
  - the iron flies off
  - the iron comes loose
  lexicon: HALOT
  rationale: הַבַּרְזֶל here refers metonymically to the iron axe-head, not iron as
    a material in abstraction. 'Slips off' conveys accidental detachment, which is
    central to the law's scenario.
- source_word: מִן הָעֵץ
  chosen: the handle
  alternatives:
  - the wood
  - the wooden haft
  lexicon: HALOT
  rationale: Literally 'from the wood,' but in context this means the wooden handle/haft
    of the axe. Rendering the implied referent avoids awkwardness and communicates
    the event clearly.
- source_word: וּמָצָא אֶת רֵעֵהוּ
  chosen: and strikes his neighbor
  alternatives:
  - and hits his neighbor
  - and finds his neighbor
  lexicon: HALOT
  rationale: מצא literally means 'find/reach,' but in impact contexts it can mean
    the object reaches or strikes someone. 'Strikes' best fits the accidental-blow
    context.
- source_word: וָמֵת
  chosen: so that he dies
  alternatives:
  - and he dies
  - with the result that he dies
  lexicon: HALOT
  rationale: Clarifies that the neighbor is the one who dies as the result of the
    blow. This avoids ambiguity in English.
- source_word: הוּא יָנוּס
  chosen: he may flee
  alternatives:
  - he shall flee
  - he can flee
  lexicon: HALOT
  rationale: 'In this legal provision the sense is permissive/protective: the manslayer
    is entitled to flee for refuge. ''May flee'' captures that nuance better than
    a simple future.'
- source_word: אֶל אַחַת הֶעָרִים הָאֵלֶּה
  chosen: to one of these cities
  alternatives:
  - to one of those cities
  lexicon: HALOT
  rationale: Refers to the designated cities of refuge just mentioned in context.
    'These cities' follows the deictic force of the Hebrew.
- source_word: וָחָי
  chosen: and live
  alternatives:
  - that he may live
  - and remain alive
  lexicon: HALOT
  rationale: 'Expresses the purpose/result of flight to the city of refuge: preservation
    of life. ''And live'' is concise and faithful.'
