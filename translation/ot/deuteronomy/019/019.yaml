id: DEU.19.19
reference: Deuteronomy 19:19
source:
  edition: WLC
  text: וַ/עֲשִׂ֣יתֶם ל֔/וֹ כַּ/אֲשֶׁ֥ר זָמַ֖ם לַ/עֲשׂ֣וֹת לְ/אָחִ֑י/ו וּ/בִֽעַרְתָּ֥
    הָ/רָ֖ע מִ/קִּרְבֶּֽ/ךָ׃
translation:
  text: Then you shall do to him just as he intended to do to his brother. So you
    shall purge the evil from your midst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "to his fellow"; Hebrew "to his brother," a covenant-community term in
      this legal context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲשִׂיתֶם
  chosen: you shall do
  alternatives:
  - then you shall do
  - you must do
  lexicon: HALOT
  rationale: From עשה, here a waw-prefixed verbal form addressed to the community/judges.
    'You shall do' preserves the legal-instruction force in natural English; 'Then'
    is implied by the discourse flow and included in the sentence but not required
    as part of the verb gloss itself.
- source_word: לוֹ
  chosen: to him
  lexicon: HALOT
  rationale: Dative pronoun referring to the false witness in context; 'to him' is
    the straightforward legal object.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Introduces the measure-for-measure comparison. 'Just as' clearly conveys
    correspondence in judicial penalty.
- source_word: זָמַם
  chosen: he intended
  alternatives:
  - he planned
  - he schemed
  lexicon: HALOT
  rationale: זמם can denote planning or devising, often with hostile intent. 'Intended'
    fits the legal context without overstating emotional coloration; the malicious
    dimension is already supplied by the context of false testimony.
- source_word: לַעֲשׂוֹת
  chosen: to do
  lexicon: HALOT
  rationale: Infinitive complement to זמם, best rendered simply as 'to do'.
- source_word: לְאָחִיו
  chosen: to his brother
  alternatives:
  - to his fellow Israelite
  - to his fellow
  lexicon: HALOT
  rationale: אָח commonly means 'brother' and in legal/covenantal contexts can denote
    a fellow member of the covenant community. Per translation philosophy, the gendered
    source form is retained as 'brother' rather than neutralized; broader communal
    sense can be noted as an alternative.
- source_word: וּבִעַרְתָּ
  chosen: So you shall purge
  alternatives:
  - and you shall burn away
  - thus you shall remove
  lexicon: HALOT
  rationale: בער in Deuteronomic legal formulas idiomatically means removing evil
    from the community, not literal burning here. 'Purge' preserves the covenant-judicial
    force and matches established Deuteronomic usage.
- source_word: הָרָע
  chosen: the evil
  alternatives:
  - the wrongdoing
  - the wickedness
  lexicon: HALOT
  rationale: The abstract noun in this formula refers to the evil act/personified
    evil within the community. 'The evil' preserves the formulaic and moral weight
    better than a narrower legal gloss.
- source_word: מִקִּרְבֶּךָ
  chosen: from your midst
  alternatives:
  - from among you
  lexicon: HALOT
  rationale: A standard covenant-community expression. 'From your midst' is slightly
    more formal and preserves the communal imagery of evil being removed from within
    Israel.
