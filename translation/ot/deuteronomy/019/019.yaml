theological_decisions:
- issue: Gendered covenantal term אָחִיו in legal context
  chosen_reading: his brother
  alternative_readings:
  - his fellow
  - his fellow Israelite
  rationale: The Hebrew is grammatically masculine singular and in context refers
    representatively to a fellow member of the covenant community. Following the stated
    gender-accurate philosophy, the main text keeps 'brother' rather than flattening
    to a neutral term, while preserving the broader communal sense as an alternative.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
