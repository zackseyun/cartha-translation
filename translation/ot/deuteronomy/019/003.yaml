theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether רֹצֵחַ should imply murder or broader homicide
  chosen_reading: manslayer
  alternative_readings:
  - murderer
  - killer
  rationale: The immediate legal context concerns refuge for one who kills without prior hatred or intent (expanded in the following verses). Rendering the term as 'manslayer' preserves the legal category without prematurely resolving guilt beyond what this verse states.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
