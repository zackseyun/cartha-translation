id: DEU.19.3
reference: Deuteronomy 19:3
source:
  edition: WLC
  text: תָּכִ֣ין לְ/ךָ֮ הַ/דֶּרֶךְ֒ וְ/שִׁלַּשְׁתָּ֙ אֶת גְּב֣וּל אַרְצְ/ךָ֔ אֲשֶׁ֥ר יַנְחִֽילְ/ךָ֖ יְהוָ֣ה אֱלֹהֶ֑י/ךָ וְ/הָיָ֕ה לָ/נ֥וּס שָׁ֖מָּ/ה כָּל רֹצֵֽחַ־־׃
translation:
  text: You shall prepare the road for yourself, and you shall divide into three parts the territory of your land that Yahweh your God is giving you as an inheritance, so that every manslayer may flee there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every killer'; the Hebrew term here is broader than 'murderer' in this cities-of-refuge context.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and it shall be for fleeing there.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּכִין
  chosen: you shall prepare
  alternatives:
  - you shall make ready
  - you shall establish
  lexicon: HALOT
  rationale: Hiphil of כון here carries the sense of making something ready or prepared. 'Prepare' is natural English and fits the practical instruction about access to the cities of refuge.
- source_word: הַדֶּרֶךְ
  chosen: the road
  alternatives:
  - the way
  - the الطريق/path
  lexicon: HALOT
  rationale: דֶּרֶךְ can mean road, way, or path. In this legal-geographical context, a literal travel route is in view, so 'road' is more concrete than 'way'.
- source_word: וְשִׁלַּשְׁתָּ
  chosen: you shall divide into three parts
  alternatives:
  - you shall make threefold
  - you shall divide in three
  lexicon: HALOT
  rationale: The verb from שלש in the Piel means to divide into three parts or make tripartite. The context is the arrangement of the land relative to the refuge cities, so an explicit rendering is warranted.
- source_word: גְּבוּל אַרְצְךָ
  chosen: the territory of your land
  alternatives:
  - the border of your land
  - the region of your land
  lexicon: HALOT
  rationale: גְּבוּל often means border/boundary, but here the sense is the extent or territory of the land as a whole to be apportioned for access. 'Territory' communicates the broader spatial sense better than a narrow boundary line.
- source_word: יַנְחִילְךָ
  chosen: is giving you as an inheritance
  alternatives:
  - causes you to inherit
  - is allotting to you
  lexicon: HALOT
  rationale: The Hiphil of נחל commonly denotes giving as an inheritance or causing someone to inherit. Because the land gift motif is covenantal, 'is giving you as an inheritance' preserves both gift and inheritance language in idiomatic English.
- source_word: יְהוָה אֱלֹהֶיךָ
  chosen: the LORD your God
  alternatives:
  - Yahweh your God
  lexicon: HALOT
  rationale: Per doctrine guidelines, יְהוָה is rendered 'the LORD' rather than transliterated. The covenant formula is standardly and clearly represented as 'the LORD your God.'
- source_word: וְהָיָה לָנוּס שָׁמָּה
  chosen: so that ... may flee there
  alternatives:
  - and it shall be for fleeing there
  - and it shall serve as a place to flee there
  lexicon: HALOT
  rationale: 'The Hebrew construction is somewhat compressed: ''and it shall be for fleeing there.'' In English, the purposive sense is best brought out as ''so that ... may flee there'' without adding content beyond the source.'
- source_word: כָּל רֹצֵחַ
  chosen: every manslayer
  alternatives:
  - every killer
  - every murderer
  - anyone who kills
  lexicon: HALOT
  rationale: In the cities-of-refuge legislation, רֹצֵחַ can denote one who has killed, including accidental killing, not only a culpable murderer. 'Manslayer' is the most precise legal English term and avoids importing the narrower moral judgment of 'murderer.'
