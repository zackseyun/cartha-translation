theological_decisions:
- issue: Second masculine singular address in covenant law
  chosen_reading: Render as singular 'you' without converting to plural or adding
    interpretive explanation in the main text.
  alternative_readings:
  - Render as plural 'you all' to make the corporate audience explicit
  - 'Render impersonally: ''three cities are to be set apart'''
  rationale: Hebrew covenantal instruction often addresses Israel in the singular.
    Keeping singular 'you' preserves the source form and avoids flattening the rhetorical
    style, while still being understandable in English.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
    and §5 (consistency of key terms, or documented exception)
