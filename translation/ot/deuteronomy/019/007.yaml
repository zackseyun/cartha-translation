id: DEU.19.7
reference: Deuteronomy 19:7
source:
  edition: WLC
  text: עַל כֵּ֛ן אָנֹכִ֥י מְצַוְּ/ךָ֖ לֵ/אמֹ֑ר שָׁלֹ֥שׁ עָרִ֖ים תַּבְדִּ֥יל לָֽ/ךְ־׃ס
translation:
  text: Therefore I am commanding you, saying, ‘You shall set apart three cities for
    yourself.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'designate three cities for yourself.' The Hebrew verb can mean 'separate,'
      'set apart,' or in context 'designate.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - Therefore
  lexicon: HALOT
  rationale: The phrase marks a conclusion or inference from the preceding context.
    'Therefore' is concise, natural English and preserves the logical force.
- source_word: אָנֹכִי
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis, but English can adequately carry
    this with the explicit subject 'I' in 'I am commanding you.' A stronger reflexive
    rendering would overstate the emphasis here.
- source_word: מְצַוְּךָ
  chosen: am commanding you
  alternatives:
  - command you
  - am giving you this command
  lexicon: HALOT
  rationale: The participial form with pronominal suffix is well represented by an
    English progressive, giving the sense of present directive speech. 'Am commanding
    you' preserves the directness of צוה without unnecessary expansion.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  - to say
  lexicon: HALOT
  rationale: This common quotative infinitive introduces the content of the command.
    'Saying' is slightly formal but natural in biblical narrative/legal discourse
    and keeps the source structure visible.
- source_word: שָׁלֹשׁ עָרִים
  chosen: three cities
  lexicon: HALOT
  rationale: A straightforward numeral + noun construction; no idiomatic adjustment
    is needed.
- source_word: תַּבְדִּיל
  chosen: shall set apart
  alternatives:
  - shall separate
  - shall designate
  lexicon: HALOT
  rationale: The Hiphil of בדל means to separate or set apart. In the legal context
    of appointing cities of refuge, 'set apart' preserves both the literal separation
    and the official designation implied by the context better than the more abstract
    'designate' alone.
- source_word: לָךְ
  chosen: for yourself
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The preposition with second masculine singular suffix indicates action
    done for Israel's own use/benefit. 'For yourself' reflects the Hebrew more transparently,
    even though the command is addressed corporately through the singular.
