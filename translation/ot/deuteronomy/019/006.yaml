id: DEU.19.6
reference: Deuteronomy 19:6
source:
  edition: WLC
  text: פֶּן יִרְדֹּף֩ גֹּאֵ֨ל הַ/דָּ֜ם אַחֲרֵ֣י הָ/רֹצֵ֗חַ כִּי יֵחַם֮ לְבָב/וֹ֒
    וְ/הִשִּׂיג֛/וֹ כִּֽי יִרְבֶּ֥ה הַ/דֶּ֖רֶךְ וְ/הִכָּ֣ה/וּ נָ֑פֶשׁ וְ/ל/וֹ֙ אֵ֣ין
    מִשְׁפַּט מָ֔וֶת כִּ֠י לֹ֣א שֹׂנֵ֥א ה֛וּא ל֖/וֹ מִ/תְּמ֥וֹל שִׁלְשֽׁוֹם־־־־׃
translation:
  text: otherwise the avenger of blood may pursue the manslayer, because his heart
    is hot, and overtake him because the way is long, and strike him dead, though
    he had no sentence of death, since he had not hated him previously.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'because his heart is hot.' The Hebrew idiom expresses inflamed
      anger.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'from yesterday or the day before,' a Hebrew idiom meaning 'previously'
      or 'formerly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  chosen: otherwise
  alternatives:
  - lest
  lexicon: HALOT
  rationale: Introduces the preventative purpose/result of establishing refuge cities.
    'Otherwise' is more natural modern English than the more formal 'lest' while preserving
    the warning force.
- source_word: גֹּאֵל הַדָּם
  chosen: the avenger of blood
  alternatives:
  - the blood avenger
  - the redeemer of blood
  lexicon: HALOT
  rationale: 'This is the established legal-kinship role in the Torah: the family
    member acting as blood-avenger. ''Avenger of blood'' preserves the idiom and legal
    sense better than the less idiomatic ''redeemer of blood.'''
- source_word: הָרֹצֵחַ
  chosen: the manslayer
  alternatives:
  - the killer
  - the slayer
  - the murderer
  lexicon: HALOT
  rationale: In this context the person is the one who killed another without prior
    hatred and is explicitly said not to deserve death. 'Manslayer' fits the legal
    distinction better than 'murderer' and is more precise than the generic 'killer.'
- source_word: כִּי יֵחַם לְבָבוֹ
  chosen: because his heart is hot
  alternatives:
  - because his heart burns
  - because he becomes enraged
  - because his anger burns
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of the heart becoming hot. 'His heart
    is hot' keeps the vividness of the source while remaining intelligible; it conveys
    inflamed anger without over-paraphrasing.
- source_word: וְהִשִּׂיגוֹ
  chosen: and overtake him
  alternatives:
  - and catch up with him
  - and reach him
  lexicon: HALOT
  rationale: A straightforward rendering of the pursuit verb in context.
- source_word: כִּי יִרְבֶּה הַדֶּרֶךְ
  chosen: because the way is long
  alternatives:
  - because the distance is great
  - because the road is long
  lexicon: HALOT
  rationale: Retains the concrete imagery of travel distance to the refuge city. 'Way'
    is slightly more literal than 'distance,' while still natural.
- source_word: וְהִכָּהוּ נָפֶשׁ
  chosen: and strike him dead
  alternatives:
  - and strike him fatally
  - and kill him
  lexicon: HALOT
  rationale: The idiom literally involves striking a life/soul, meaning a fatal blow.
    'Strike him dead' preserves the violent concreteness and reads naturally in English.
- source_word: וְלוֹ אֵין מִשְׁפַּט מָוֶת
  chosen: though he had no sentence of death
  alternatives:
  - though there was no judgment of death for him
  - though he did not deserve death
  - though he was not liable to death
  lexicon: HALOT
  rationale: מִשְׁפַּט here is legal judgment/right. The clause states that the manslayer
    was not under a lawful death sentence. 'Had no sentence of death' preserves the
    juridical nuance better than the more interpretive 'did not deserve death.'
- source_word: כִּי לֹא שֹׂנֵא הוּא לוֹ
  chosen: since he had not hated him
  alternatives:
  - because he was not hating him
  - for he was not his enemy
  lexicon: HALOT
  rationale: 'This gives the legal rationale for the lack of death penalty: absence
    of prior hatred, indicating accidental rather than malicious killing.'
- source_word: מִתְּמֹל שִׁלְשֹׁם
  chosen: previously
  alternatives:
  - from yesterday or the day before
  - formerly
  - in times past
  lexicon: HALOT
  rationale: The idiom literally means 'from yesterday, three days ago,' a Hebrew
    expression for prior time. 'Previously' communicates the temporal sense clearly
    in modern English without awkward literalism in the main text.
