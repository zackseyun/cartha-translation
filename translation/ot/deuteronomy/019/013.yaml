id: DEU.19.13
reference: Deuteronomy 19:13
source:
  edition: WLC
  text: לֹא תָח֥וֹס עֵֽינְ/ךָ֖ עָלָ֑י/ו וּ/בִֽעַרְתָּ֧ דַֽם הַ/נָּקִ֛י מִ/יִּשְׂרָאֵ֖ל
    וְ/ט֥וֹב לָֽ/ךְ־־׃ס
translation:
  text: Your eye shall not pity him, but you shall purge the innocent blood from Israel,
    and it shall go well with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Your eye shall not spare him.' The Hebrew idiom literally mentions
      the eye as the seat of pity or compassion.
    reason: lexical_alternative
  - marker: b
    text: That is, remove the bloodguilt incurred by the shedding of innocent blood
      from the community of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָח֥וֹס עֵינְךָ עָלָיו
  chosen: Your eye shall not pity him
  alternatives:
  - You shall not pity him
  - Your eye shall not spare him
  lexicon: HALOT
  rationale: The Hebrew idiom literally uses 'your eye' with חוס to express pity or
    sparing. Retaining 'your eye' preserves the source imagery and legal solemnity,
    while 'pity' best captures the emotional sense. 'Spare' is possible, but here
    the context emphasizes withholding compassion toward a murderer under due justice.
- source_word: וּבִעַרְתָּ
  chosen: but you shall purge
  alternatives:
  - and you shall burn away
  - and you shall remove
  lexicon: HALOT
  rationale: בער in Deuteronomic legal contexts commonly means to remove or purge
    evil/bloodguilt from the community, not literal burning. 'Purge' is a standard
    and contextually accurate legal rendering that preserves the covenantal-judicial
    force.
- source_word: דַם הַנָּקִי
  chosen: the innocent blood
  alternatives:
  - the blood of the innocent
  - innocent bloodshed
  lexicon: HALOT
  rationale: The construct-like phrase refers to blood that is innocent, that is,
    bloodguilt for shedding innocent blood. 'The innocent blood' is the most direct
    rendering and preserves the Hebrew legal idiom.
- source_word: מִיִּשְׂרָאֵל
  chosen: from Israel
  alternatives:
  - out of Israel
  - from among Israel
  lexicon: HALOT
  rationale: The preposition מן marks removal from the covenant community. 'From Israel'
    is concise and natural while preserving the communal scope.
- source_word: וְטוֹב לָךְ
  chosen: and it shall go well with you
  alternatives:
  - and it will be well for you
  - so that it may go well with you
  lexicon: HALOT
  rationale: This is a common Deuteronomic covenant formula expressing beneficial
    outcome from obedience. 'It shall go well with you' is idiomatic modern English
    and preserves the resultative sense.
- source_word: וְ
  chosen: but
  alternatives:
  - and
  lexicon: HALOT
  rationale: Although the conjunction is formally 'and,' English style and the logic
    of the command favor 'but' to mark contrast between refusing pity and carrying
    out the required judicial action.
