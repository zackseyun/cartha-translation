theological_decisions:
- issue: Nature of the command regarding execution of the murderer
  chosen_reading: The verse commands the community to withhold misplaced pity and
    remove bloodguilt through just legal action, not personal vengeance.
  alternative_readings:
  - The verse could be misconstrued as endorsing private retaliation.
  rationale: In context (Deut 19:11–12), the command concerns judicial handling of
    a deliberate murderer. The translation avoids importing extra explanation into
    the main text, but the lexical choices 'pity' and 'purge the innocent blood from
    Israel' fit the legal-covenantal setting rather than vigilante action.
