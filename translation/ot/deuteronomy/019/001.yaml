id: DEU.19.1
reference: Deuteronomy 19:1
source:
  edition: WLC
  text: כִּֽי יַכְרִ֞ית יְהוָ֤ה אֱלֹהֶ֨י/ךָ֙ אֶת הַ/גּוֹיִ֔ם אֲשֶׁר֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ
    נֹתֵ֥ן לְ/ךָ֖ אֶת אַרְצָ֑/ם וִֽ/ירִשְׁתָּ֕/ם וְ/יָשַׁבְתָּ֥ בְ/עָרֵי/הֶ֖ם וּ/בְ/בָתֵּי/הֶֽם־־־׃
translation:
  text: When the LORD your God cuts off the nations whose land the LORD your God is
    giving you, and you dispossess them and dwell in their cities and houses,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'destroys' or 'eliminates'; Hebrew 'cuts off.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - For
  - If
  lexicon: HALOT
  rationale: In this legal context introducing a future circumstance that triggers
    the following commands, 'When' best conveys the temporal force in natural English.
    'If' is possible, but the context assumes the event as expected rather than merely
    hypothetical.
- source_word: יַכְרִית
  chosen: cuts off
  alternatives:
  - destroys
  - eliminates
  lexicon: HALOT
  rationale: The Hiphil of כרת here means to cut off/remove nations from before Israel.
    'Cuts off' preserves the concrete Hebrew idiom and covenantal/legal tone better
    than the more interpretive 'destroys.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the LXX-influenced
    pattern.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with second masculine singular suffix; 'your
    God' is the natural and accurate rendering.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the peoples
  - the Gentile nations
  lexicon: HALOT
  rationale: '''Nations'' is the standard rendering of גוים and fits the Deuteronomic
    context of Israel dispossessing other peoples in the land. ''Gentile nations''
    would import later connotations not explicit here.'
- source_word: אֲשֶׁר
  chosen: whose
  alternatives:
  - which
  - that
  lexicon: HALOT
  rationale: Rendering the relative clause as 'whose land' is smoother English and
    accurately reflects the relationship between the nations and 'their land' expressed
    by the following object phrase.
- source_word: נֹתֵן לְךָ
  chosen: is giving you
  alternatives:
  - gives you
  - will give you
  lexicon: HALOT
  rationale: The participle conveys an ongoing or certain action; 'is giving you'
    preserves the aspectual nuance and the immediacy of divine gift in context.
- source_word: אַרְצָם
  chosen: whose land
  alternatives:
  - their land
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'their land.' In English, fronting it into
    the relative clause as 'whose land' avoids awkwardness while preserving meaning.
- source_word: וִירִשְׁתָּם
  chosen: you dispossess them
  alternatives:
  - you take possession of them
  - you inherit them
  lexicon: HALOT
  rationale: Although ירש often involves inheriting/possessing land, with a personal
    object suffix here it means to dispossess the nations from the land. 'Inherit
    them' would be misleading in English.
- source_word: וְיָשַׁבְתָּ
  chosen: and dwell
  alternatives:
  - and live
  - and settle
  lexicon: HALOT
  rationale: '''Dwell'' preserves the formal legal-register sense of settling in a
    place, while remaining readable. ''Settle'' is possible but slightly more interpretive.'
- source_word: בְעָרֵיהֶם
  chosen: in their cities
  alternatives:
  - in their towns
  lexicon: HALOT
  rationale: '''Cities'' is the standard rendering of ערים and suits the conquest-settlement
    context.'
- source_word: וּבְבָתֵּיהֶם
  chosen: and houses
  alternatives:
  - and in their houses
  lexicon: HALOT
  rationale: Because the preposition is naturally carried over in English after 'dwell
    in their cities,' 'and houses' yields concise, natural English while preserving
    the sense. The possessive 'their' is retained to show these formerly belonged
    to the nations.
