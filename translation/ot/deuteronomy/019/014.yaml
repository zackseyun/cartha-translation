id: DEU.19.14
reference: Deuteronomy 19:14
source:
  edition: WLC
  text: לֹ֤א תַסִּיג֙ גְּב֣וּל רֵֽעֲ/ךָ֔ אֲשֶׁ֥ר גָּבְל֖וּ רִאשֹׁנִ֑ים בְּ/נַחֲלָֽתְ/ךָ֙ אֲשֶׁ֣ר תִּנְחַ֔ל בָּ/אָ֕רֶץ אֲשֶׁר֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ נֹתֵ֥ן לְ/ךָ֖ לְ/רִשְׁתָּֽ/הּ׃ס
translation:
  text: You shall not move your neighbor’s boundary marker, which the former generations set, in your inheritance that you will inherit in the land that Yahweh your God is giving you to possess.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'landmark' for 'boundary marker.' The Hebrew refers to the property boundary as fixed by a marker.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַסִּיג
  chosen: move
  alternatives:
  - shift back
  - remove
  lexicon: HALOT
  rationale: The Hiphil of נסג here refers to moving a boundary line/marker backward. 'Move' is natural modern English and preserves the legal prohibition without over-specifying direction. 'Remove' is possible but too absolute; the offense is encroaching by shifting the marker.
- source_word: גְּבוּל
  chosen: boundary marker
  alternatives:
  - boundary
  - landmark
  lexicon: HALOT
  rationale: In this legal context the term refers concretely to the property boundary as represented by a marker. 'Boundary marker' makes explicit the object being moved and avoids the archaic feel of 'landmark' in modern English.
- source_word: רֵעֲךָ
  chosen: your neighbor’s
  alternatives:
  - your fellow’s
  - your companion’s
  lexicon: HALOT
  rationale: רֵעַ in covenantal/legal contexts commonly means a fellow member of the community. 'Neighbor' is idiomatic and fits property-law context.
- source_word: גָּבְלוּ
  chosen: set
  alternatives:
  - marked out
  - fixed
  lexicon: HALOT
  rationale: The verb denotes establishing or marking boundaries. 'Set' is concise and idiomatic with 'boundary marker,' while still reflecting the completed action of prior generations.
- source_word: רִאשֹׁנִים
  chosen: the former generations
  alternatives:
  - the former ones
  - your predecessors
  - the ancestors
  lexicon: HALOT
  rationale: The plural adjective refers to those earlier than the present generation who originally established the allotments. 'Former generations' communicates this more clearly than the bare 'former ones.'
- source_word: בְּנַחֲלָתְךָ
  chosen: in your inheritance
  alternatives:
  - within your inheritance
  - in your allotted inheritance
  lexicon: HALOT
  rationale: נַחֲלָה is a key covenant-land term meaning inherited allotment. 'Inheritance' preserves the theological and legal sense better than merely 'property' or 'portion'.
- source_word: תִּנְחַל
  chosen: you will inherit
  alternatives:
  - you are inheriting
  - you receive as an inheritance
  lexicon: HALOT
  rationale: The imperfect points to the possession Israel is to receive. 'You will inherit' keeps the future-oriented covenantal sense and echoes the noun נַחֲלָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: נֹתֵן לְךָ
  chosen: is giving you
  alternatives:
  - gives you
  - will give you
  lexicon: HALOT
  rationale: The participle presents the giving as the LORD's defining action in this context. 'Is giving you' reflects the participial aspect naturally in English.
- source_word: לְרִשְׁתָּהּ
  chosen: to possess
  alternatives:
  - to take possession of it
  - as a possession
  lexicon: HALOT
  rationale: The infinitive of ירשׁ here expresses taking/holding possession of the land. 'To possess' is concise and preserves the covenant-land terminology.
