id: DEU.19.2
reference: Deuteronomy 19:2
source:
  edition: WLC
  text: שָׁל֥וֹשׁ עָרִ֖ים תַּבְדִּ֣יל לָ֑/ךְ בְּ/ת֣וֹךְ אַרְצְ/ךָ֔ אֲשֶׁר֙ יְהוָ֣ה
    אֱלֹהֶ֔י/ךָ נֹתֵ֥ן לְ/ךָ֖ לְ/רִשְׁתָּֽ/הּ׃
translation:
  text: You shall set apart three cities for yourself within your land that the LORD
    your God is giving you to possess.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to inherit it.' The Hebrew verb can mean 'possess' or 'inherit' in land-grant
      contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלֹשׁ עָרִים
  chosen: three cities
  alternatives:
  - three towns
  lexicon: HALOT
  rationale: עִיר commonly denotes a city or town; 'cities' is the standard and suitably
    formal rendering in legal material, especially for designated cities of refuge.
- source_word: תַּבְדִּיל
  chosen: you shall set apart
  alternatives:
  - you shall separate
  - you shall designate
  lexicon: HALOT
  rationale: Hiphil of בדל means to separate or set apart. 'Set apart' preserves both
    the formal sense of separation and the legal sense of designation in context.
- source_word: לָךְ
  chosen: for yourself
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The preposition with pronominal suffix marks advantage/dative. 'For yourself'
    is idiomatic English and preserves the reflexive-benefactive nuance.
- source_word: בְּתוֹךְ אַרְצְךָ
  chosen: within your land
  alternatives:
  - in the midst of your land
  - in your land
  lexicon: HALOT
  rationale: בְּתוֹךְ literally means 'in the midst/middle of.' 'Within your land'
    is natural English while retaining the spatial sense.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Simple relative pronoun introducing the clause modifying 'land.' 'That'
    is the most natural modern English choice.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Construct form with second masculine singular suffix; standard covenantal
    address is best rendered 'your God.'
- source_word: נֹתֵן לְךָ
  chosen: is giving you
  alternatives:
  - gives you
  - is about to give you
  lexicon: HALOT
  rationale: The participle conveys ongoing or imminent action. 'Is giving you' preserves
    the Hebrew aspect better than a simple present and fits the promissory context.
- source_word: לְרִשְׁתָּהּ
  chosen: to possess
  alternatives:
  - to inherit
  - to take possession of it
  lexicon: HALOT
  rationale: From ירשׁ, which can mean inherit or possess. Here the object is the
    land being granted by God; 'to possess' is clear, idiomatic, and avoids overloading
    English 'inherit' with later theological associations, while still matching the
    land-tenure sense.
