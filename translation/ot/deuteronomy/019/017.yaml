id: DEU.19.17
reference: Deuteronomy 19:17
source:
  edition: WLC
  text: וְ/עָמְד֧וּ שְׁנֵֽי הָ/אֲנָשִׁ֛ים אֲשֶׁר לָ/הֶ֥ם הָ/רִ֖יב לִ/פְנֵ֣י יְהוָ֑ה לִ/פְנֵ֤י הַ/כֹּֽהֲנִים֙ וְ/הַ/שֹּׁ֣פְטִ֔ים אֲשֶׁ֥ר יִהְי֖וּ בַּ/יָּמִ֥ים הָ/הֵֽם־־׃
translation:
  text: then the two men who have the dispute shall stand before Yahweh, before the priests and the judges who are in office in those days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''who have the dispute''; alternatively, ''who have the case'' or ''between whom is the dispute.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'who are in office in those days.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָמְדוּ
  chosen: then ... shall stand
  alternatives:
  - and ... shall stand
  lexicon: HALOT
  rationale: The waw + perfect continues the legal procedure sequentially. English 'then' captures the procedural force naturally, while 'shall stand' preserves the formal/judicial setting.
- source_word: שְׁנֵי הָאֲנָשִׁים
  chosen: the two men
  alternatives:
  - the two parties
  - the two persons
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural with the numeral construct, referring to the litigants in the case. 'Men' is gender-accurate and formally closer than the more interpretive 'parties,' though the legal sense is clear from context.
- source_word: אֲשֶׁר לָהֶם הָרִיב
  chosen: who have the dispute
  alternatives:
  - who have the case
  - between whom is the dispute
  - who are in dispute
  lexicon: HALOT
  rationale: רִיב denotes a dispute, controversy, or legal case. 'Who have the dispute' preserves the Hebrew construction ('to whom belongs the dispute') while remaining readable. 'Case' is possible but slightly more interpretive/legalized.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - before Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' 'Before' preserves the covenantal/judicial sense of appearing in God's presence.
- source_word: לִפְנֵי הַכֹּהֲנִים וְהַשֹּׁפְטִים
  chosen: before the priests and the judges
  alternatives:
  - before the priests and judges
  lexicon: HALOT
  rationale: 'The repeated לִפְנֵי is retained once in English with the coordinated objects. The articles are preserved for specificity: these are the recognized judicial-religious authorities.'
- source_word: אֲשֶׁר יִהְיוּ בַּיָּמִים הָהֵם
  chosen: who are serving in those days
  alternatives:
  - who will be in office in those days
  - who are there in those days
  - who are in those days
  lexicon: HALOT
  rationale: The clause identifies the contemporaneous officeholders. 'Serving' communicates active official function in idiomatic English without over-paraphrasing. 'In office' is also possible but slightly more modern-administrative in tone.
