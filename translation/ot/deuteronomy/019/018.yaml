theological_decisions:
- issue: Rendering of אָח in legal context
  chosen_reading: his brother
  alternative_readings:
  - his fellow
  - his countryman
  rationale: The Hebrew is grammatically singular masculine and in covenant-law context
    often refers representatively to a fellow member of the community. Following the
    gender-accurate policy, the main text keeps 'brother' rather than neutralizing
    it, while preserving the broader communal sense in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
