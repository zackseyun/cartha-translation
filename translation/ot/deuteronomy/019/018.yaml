id: DEU.19.18
reference: Deuteronomy 19:18
source:
  edition: WLC
  text: וְ/דָרְשׁ֥וּ הַ/שֹּׁפְטִ֖ים הֵיטֵ֑ב וְ/הִנֵּ֤ה עֵֽד שֶׁ֨קֶר֙ הָ/עֵ֔ד שֶׁ֖קֶר
    עָנָ֥ה בְ/אָחִֽי/ו־׃
translation:
  text: And the judges shall investigate thoroughly, and if the witness is a false
    witness and has testified falsely against his brother,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against his fellow' or 'against his countryman'; Hebrew 'his brother'
      can function in Israel's law for a fellow member of the covenant community.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְדָרְשׁוּ
  chosen: shall investigate
  alternatives:
  - shall inquire
  - shall examine
  lexicon: HALOT
  rationale: דרש in judicial context means to seek out, inquire into, or investigate.
    'Investigate' best fits modern legal English while preserving the formal force
    of the command.
- source_word: הַשֹּׁפְטִים
  chosen: the judges
  alternatives:
  - the magistrates
  lexicon: HALOT
  rationale: The noun refers to legal authorities deciding the case. 'Judges' is the
    most direct and standard rendering in this context.
- source_word: הֵיטֵב
  chosen: thoroughly
  alternatives:
  - carefully
  - well
  lexicon: HALOT
  rationale: The adverb intensifies the investigation. 'Thoroughly' conveys the required
    diligence more naturally in English legal style than the more wooden 'well.'
- source_word: וְהִנֵּה
  chosen: and if
  alternatives:
  - and behold
  - and look
  lexicon: HALOT
  rationale: Although literally deictic ('behold'), in this legal conditional setting
    it introduces the discovered state of affairs. 'And if' communicates the sense
    idiomatically in English without unnecessary archaism.
- source_word: עֵד שֶׁקֶר
  chosen: a false witness
  alternatives:
  - a lying witness
  - a witness of falsehood
  lexicon: HALOT
  rationale: The construct phrase denotes a witness characterized by falsehood. 'False
    witness' is the established and accurate English legal-biblical expression.
- source_word: הָעֵד שֶׁקֶר
  chosen: the witness is a false witness
  alternatives:
  - the witness is false
  - that witness is a false witness
  lexicon: HALOT
  rationale: The Hebrew repeats the noun for emphasis and clarity. The English preserves
    that emphasis without becoming too awkward.
- source_word: עָנָה
  chosen: has testified falsely
  alternatives:
  - has answered falsely
  - has given false testimony
  lexicon: HALOT
  rationale: ענה in legal settings commonly means to testify. Because שקר already
    frames the testimony as false, 'has testified falsely' brings out the judicial
    sense clearly.
- source_word: בְאָחִיו
  chosen: against his brother
  alternatives:
  - against his fellow
  - against his kinsman
  lexicon: HALOT
  rationale: אָח literally means 'brother,' but can extend to a fellow Israelite.
    Per translation philosophy, the gendered term is retained in the main text as
    matching the source, while the broader social sense can be noted in a footnote.
