id: DEU.19.20
reference: Deuteronomy 19:20
source:
  edition: WLC
  text: וְ/הַ/נִּשְׁאָרִ֖ים יִשְׁמְע֣וּ וְ/יִרָ֑אוּ וְ/לֹֽא יֹסִ֨פוּ לַ/עֲשׂ֜וֹת ע֗וֹד
    כַּ/דָּבָ֥ר הָ/רָ֛ע הַ/זֶּ֖ה בְּ/קִרְבֶּֽ/ךָ־׃
translation:
  text: And those who remain shall hear and fear, and shall never again do such an
    evil thing in your midst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the rest' or 'those who are left.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'like this evil thing,' that is, an evil act of this kind.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew singular, addressing Israel as a corporate whole: ''in your midst.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנִּשְׁאָרִים
  chosen: those who remain
  alternatives:
  - the rest
  - those who are left
  lexicon: HALOT
  rationale: From שׁאר in the nifal participial form, referring to the remaining people
    after the judicial punishment in context. 'Those who remain' is natural English
    and preserves the sense better than the more static 'the rest.'
- source_word: יִשְׁמְעוּ
  chosen: shall hear
  alternatives:
  - will hear
  - hear
  lexicon: HALOT
  rationale: Basic sense of שמע is 'hear.' In this legal-warning context, 'hear' implies
    learning of the event; no expansion such as 'hear about it' is added to avoid
    over-paraphrase.
- source_word: וְיִרָאוּ
  chosen: and fear
  alternatives:
  - and be afraid
  - and stand in fear
  lexicon: HALOT
  rationale: ירא here expresses fear produced by the punishment as deterrence. 'Fear'
    is concise and preserves the covenant-legal tone better than the more colloquial
    'be afraid.'
- source_word: וְלֹא יֹסִפוּ
  chosen: and shall never again
  alternatives:
  - and they shall not continue
  - and they shall not add again
  lexicon: HALOT
  rationale: יסף + infinitive commonly means 'to do again/continue further.' In idiomatic
    English with the following infinitive, 'shall never again' best captures the prohibitive
    future sense.
- source_word: לַעֲשׂוֹת עוֹד
  chosen: do
  alternatives:
  - to do again
  - to act further
  lexicon: HALOT
  rationale: Combined with לא יספו, the phrase yields 'not do again.' Since 'again'
    is already carried by 'shall never again,' the infinitive itself is simply rendered
    'do' to avoid redundancy.
- source_word: כַּדָּבָר הָרָע הַזֶּה
  chosen: such an evil thing
  alternatives:
  - this evil thing
  - anything like this evil deed
  lexicon: HALOT
  rationale: דבר can mean 'thing,' 'matter,' or 'word.' Here it refers to the kind
    of evil act just described. 'Such an evil thing' captures the comparative force
    of כ and reads naturally in English; 'this evil thing' is possible but less clearly
    reflects the prefixed כ ('like/as').
- source_word: בְּקִרְבֶּךָ
  chosen: in your midst
  alternatives:
  - among you
  - within you
  lexicon: HALOT
  rationale: A standard covenantal/judicial expression meaning within the community
    of Israel. 'In your midst' preserves the formal communal sense; 'among you' is
    possible but slightly less weighty in this legal context.
