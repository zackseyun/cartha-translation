theological_decisions:
- issue: Number and addressee shift in בְּקִרְבֶּךָ
  chosen_reading: retain singular 'your' in English
  alternative_readings:
  - render idiomatically as 'among you' without signaling singular
  rationale: The Hebrew suffix is second masculine singular, addressing Israel corporately
    as a singular entity. Retaining 'your midst' preserves that covenantal corporate
    address without importing additional theological interpretation.
  doctrine_reference: 'Translation philosophy #4 and #5'
