theological_decisions:
- issue: Legal description of intentional homicide versus accidental manslaughter
  chosen_reading: The verse is rendered to emphasize premeditation and lethal intent
    through the sequence 'hates ... lies in wait ... rises up against ... strikes
    him fatally.'
  alternative_readings:
  - A more compressed rendering such as 'murders him'
  rationale: Although the legal sense is clearly intentional homicide, the Hebrew
    presents the case through a sequence of actions rather than a single summary verb.
    Preserving that sequence avoids importing a more interpretive label into the main
    text while still making the intent plain.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    without paraphrase beyond what the text warrants.'
