id: DEU.19.11
reference: Deuteronomy 19:11
source:
  edition: WLC
  text: וְ/כִֽי יִהְיֶ֥ה אִישׁ֙ שֹׂנֵ֣א לְ/רֵעֵ֔/הוּ וְ/אָ֤רַב ל/וֹ֙ וְ/קָ֣ם עָלָ֔י/ו
    וְ/הִכָּ֥ה/וּ נֶ֖פֶשׁ וָ/מֵ֑ת וְ/נָ֕ס אֶל אַחַ֖ת הֶ/עָרִ֥ים הָ/אֵֽל־־׃
translation:
  text: But if there is a man who hates his neighbor, and lies in wait for him, and
    rises up against him, and strikes him fatally so that he dies, and he flees to
    one of these cities,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'strikes him mortally' or 'strikes him so that he dies.' The Hebrew expression
      is literally 'strikes him [in] life/soul,' an idiom for delivering a lethal
      blow.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  chosen: But if
  alternatives:
  - And if
  - Now if
  lexicon: HALOT
  rationale: Introduces a contrasting conditional case to the preceding law about
    accidental killing. 'But if' captures both the conditional force and the adversative
    transition in context better than a simple 'and if.'
- source_word: יִהְיֶה אִישׁ
  chosen: there is a man
  alternatives:
  - a man is
  - someone is
  lexicon: HALOT
  rationale: The existential construction is naturally rendered in English as 'there
    is a man.' 'Man' is retained rather than a gender-neutral substitute because the
    Hebrew is grammatically masculine and refers to a representative legal case, consistent
    with the project's gender-accurate policy.
- source_word: שֹׂנֵא לְרֵעֵהוּ
  chosen: who hates his neighbor
  alternatives:
  - who is hostile to his fellow
  - who hates his friend
  lexicon: HALOT
  rationale: '''Hates'' is the plain sense of the participle שֹׂנֵא. רֵעַ in legal
    contexts commonly means ''neighbor'' or ''fellow''; ''neighbor'' is idiomatic
    and preserves the interpersonal/legal sense without implying intimacy that ''friend''
    might suggest.'
- source_word: וְאָרַב לוֹ
  chosen: and lies in wait for him
  alternatives:
  - and ambushes him
  - and lurks for him
  lexicon: HALOT
  rationale: The verb conveys premeditated ambush or lying in wait. 'Lies in wait
    for him' preserves the durative, deliberate sense and fits the legal description
    of intentional murder.
- source_word: וְקָם עָלָיו
  chosen: and rises up against him
  alternatives:
  - and attacks him
  - and stands against him
  lexicon: HALOT
  rationale: The idiom literally means 'rises against him' and signals hostile action.
    Retaining 'rises up against him' preserves the formal sequence of the Hebrew while
    remaining clear in English.
- source_word: וְהִכָּהוּ נֶפֶשׁ
  chosen: and strikes him fatally
  alternatives:
  - and strikes him mortally
  - and strikes him so as to take his life
  lexicon: HALOT
  rationale: The phrase combines the verb 'strike' with נֶפֶשׁ in an idiomatic expression
    indicating a lethal blow. 'Strikes him fatally' communicates the result-oriented
    force naturally in English without over-paraphrasing.
- source_word: וָמֵת
  chosen: so that he dies
  alternatives:
  - and he dies
  - with the result that he dies
  lexicon: HALOT
  rationale: This makes explicit the consequential relation between the fatal strike
    and the victim's death. 'So that he dies' reads naturally in English legal prose
    and preserves the sequence.
- source_word: וְנָס
  chosen: and he flees
  alternatives:
  - and flees
  - and escapes
  lexicon: HALOT
  rationale: The verb means 'flee.' Including the pronoun 'he' helps English clarity
    in the chain of actions.
- source_word: אֶל אַחַת הֶעָרִים הָאֵל
  chosen: to one of these cities
  alternatives:
  - to one of those cities
  - to one of these towns
  lexicon: HALOT
  rationale: Refers to the designated cities of refuge in the immediate context. 'Cities'
    is the standard rendering of עָרִים, and 'these' reflects the proximal demonstrative.
