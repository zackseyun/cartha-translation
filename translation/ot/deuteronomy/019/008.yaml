theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering אבות as 'fathers' versus a more inclusive 'ancestors'
  chosen_reading: fathers
  alternative_readings:
  - ancestors
  rationale: The Hebrew explicitly says 'fathers.' Per the gender-accurate-over-gender-neutral policy, the main text preserves the masculine familial term where it refers to the patriarchal ancestors of Israel. An inclusive contextual alternative is worth preserving in a footnote for readability.
