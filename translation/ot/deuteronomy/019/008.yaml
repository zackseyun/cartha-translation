id: DEU.19.8
reference: Deuteronomy 19:8
source:
  edition: WLC
  text: וְ/אִם יַרְחִ֞יב יְהוָ֤ה אֱלֹהֶ֨י/ךָ֙ אֶת גְּבֻ֣לְ/ךָ֔ כַּ/אֲשֶׁ֥ר נִשְׁבַּ֖ע לַ/אֲבֹתֶ֑י/ךָ וְ/נָ֤תַן לְ/ךָ֙ אֶת כָּל הָ/אָ֔רֶץ אֲשֶׁ֥ר דִּבֶּ֖ר לָ/תֵ֥ת לַ/אֲבֹתֶֽי/ךָ־־־־׃
translation:
  text: And if Yahweh your God enlarges your territory, as he swore to your fathers, and gives you all the land that he promised to give to your fathers,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to your ancestors' in both occurrences of 'to your fathers.' The Hebrew is literally 'to your fathers,' referring to Israel's patriarchal forefathers.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: And if
  alternatives:
  - If
  lexicon: HALOT
  rationale: The conjunction plus conditional particle introduces a continuation of the legal instruction from the previous verse. 'And if' preserves the linkage to the preceding context better than a bare 'If'.
- source_word: יַרְחִיב
  chosen: enlarges
  alternatives:
  - widens
  - makes broad
  - extends
  lexicon: HALOT
  rationale: Hiphil of רחב here means to make wide or enlarge. 'Enlarges' is natural modern English for expanding territorial borders while remaining close to the Hebrew.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with second masculine singular suffix; 'your God' is the standard and accurate rendering.
- source_word: גְּבֻלְךָ
  chosen: your territory
  alternatives:
  - your border
  - your boundary
  lexicon: HALOT
  rationale: גְּבוּל can denote border, boundary, or territory. In English, 'enlarges your territory' best conveys the sense of expanded national landholding rather than merely moving a line.
- source_word: כַּאֲשֶׁר נִשְׁבַּע
  chosen: as he swore
  alternatives:
  - just as he swore
  - as he had sworn
  lexicon: HALOT
  rationale: This comparative clause recalls the oath to the ancestors. 'As he swore' is concise and faithful.
- source_word: לַאֲבֹתֶיךָ
  chosen: to your fathers
  alternatives:
  - to your ancestors
  lexicon: HALOT
  rationale: The Hebrew is literally 'to your fathers.' In keeping with the gender-accurate policy and the covenantal idiom, the main text preserves 'fathers,' while 'ancestors' is a viable contextual alternative.
- source_word: וְנָתַן לְךָ
  chosen: and gives you
  alternatives:
  - and he gives you
  - then he gives you
  - and has given you
  lexicon: HALOT
  rationale: The waw plus perfect continues the protasis in a future-oriented legal condition. English present 'gives' after 'if' is idiomatic and reflects the Hebrew sequence without awkwardness.
- source_word: כָּל הָאָרֶץ
  chosen: all the land
  alternatives:
  - the whole land
  - all the territory
  lexicon: HALOT
  rationale: אָרֶץ here refers to land/territory promised to Israel, not the earth in a global sense. 'All the land' is the most natural fit.
- source_word: אֲשֶׁר דִּבֶּר לָתֵת
  chosen: that he promised to give
  alternatives:
  - that he spoke of giving
  - that he said he would give
  lexicon: HALOT
  rationale: Although דִּבֶּר is literally 'spoke,' in covenant-promise contexts English 'promised' best captures the force of divine commitment without over-paraphrasing.
- source_word: לַאֲבֹתֶיךָ
  chosen: to your fathers
  alternatives:
  - to your ancestors
  lexicon: HALOT
  rationale: Repeated phrase retained consistently for covenant continuity and to mirror the Hebrew repetition.
