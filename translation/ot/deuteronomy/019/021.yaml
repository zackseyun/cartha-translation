id: DEU.19.21
reference: Deuteronomy 19:21
source:
  edition: WLC
  text: וְ/לֹ֥א תָח֖וֹס עֵינֶ֑/ךָ נֶ֣פֶשׁ בְּ/נֶ֗פֶשׁ עַ֤יִן בְּ/עַ֨יִן֙ שֵׁ֣ן בְּ/שֵׁ֔ן
    יָ֥ד בְּ/יָ֖ד רֶ֥גֶל בְּ/רָֽגֶל׃ס
translation:
  text: 'Your eye shall not pity: life for life, eye for eye, tooth for tooth, hand
    for hand, foot for foot.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shall not spare' or 'shall not show compassion.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'life for life'; נֶפֶשׁ here refers to life, not specifically 'soul'
      in a later theological sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָח֖וֹס
  chosen: shall ... pity
  alternatives:
  - shall spare
  - shall show compassion
  lexicon: HALOT
  rationale: חוס commonly denotes sparing or showing pity/compassion. In this legal
    context, 'shall not pity' is a natural English rendering that preserves the idiom
    with 'eye' and the judicial severity of the command.
- source_word: עֵינֶךָ
  chosen: Your eye
  alternatives:
  - you
  - your compassion
  lexicon: HALOT
  rationale: The Hebrew uses the concrete idiom 'your eye' as the subject of תחוס.
    Retaining 'Your eye' preserves the source imagery and matches the established
    Hebrew expression for pity or compassion.
- source_word: נֶפֶשׁ
  chosen: life
  alternatives:
  - soul
  - person
  lexicon: HALOT
  rationale: In the formula נֶפֶשׁ בְּנֶפֶשׁ, the sense is judicial equivalence of
    life for life, not 'soul' in a later metaphysical sense. 'Life' is the clearest
    and most idiomatic English rendering here.
- source_word: בְּ
  chosen: for
  alternatives:
  - in exchange for
  - instead of
  lexicon: HALOT
  rationale: 'In each pair, ב marks equivalence or requital. ''For'' is concise, idiomatic,
    and preserves the legal formula in English: ''life for life, eye for eye,'' etc.'
- source_word: עַיִן
  chosen: eye
  lexicon: HALOT
  rationale: Literal body-part term in the lex talionis formula; no contextual reason
    to paraphrase.
- source_word: שֵׁן
  chosen: tooth
  lexicon: HALOT
  rationale: Literal body-part term in the legal formula; 'tooth' is the standard
    and precise gloss.
- source_word: יָד
  chosen: hand
  lexicon: HALOT
  rationale: Literal body-part term in the legal formula; 'hand' best matches the
    Hebrew.
- source_word: רֶגֶל
  chosen: foot
  alternatives:
  - leg
  lexicon: HALOT
  rationale: In this formula, 'foot' is the conventional and contextually fitting
    rendering, matching the sequence of bodily injuries in legal retaliation.
