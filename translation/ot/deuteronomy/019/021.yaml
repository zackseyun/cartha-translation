theological_decisions:
- issue: Whether to preserve the concrete legal-retaliation formula or soften it into
    a generalized principle of proportional justice
  chosen_reading: 'Preserve the concrete formula: ''life for life, eye for eye, tooth
    for tooth, hand for hand, foot for foot.'''
  alternative_readings:
  - Render more dynamically as 'the punishment must fit the crime'
  rationale: Optimal equivalence here favors preserving the formal legal wording because
    the Hebrew presents a fixed judicial formula, and a dynamic paraphrase would obscure
    the text's concrete rhetoric and intertextual resonance with other Torah passages.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
