theological_decisions:
- issue: Representative masculine language in legal formulation
  chosen_reading: against a man
  alternative_readings:
  - against someone
  - against a person
  rationale: The Hebrew uses singular masculine אִישׁ in a legal case formulation.
    Following the translation philosophy's gender-accurate principle, the masculine
    form is preserved rather than neutralized, since the text's legal style uses representative
    masculine language.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
