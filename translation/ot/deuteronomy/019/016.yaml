id: DEU.19.16
reference: Deuteronomy 19:16
source:
  edition: WLC
  text: כִּֽי יָק֥וּם עֵד חָמָ֖ס בְּ/אִ֑ישׁ לַ/עֲנ֥וֹת בּ֖/וֹ סָרָֽה־־׃
translation:
  text: If a malicious witness rises up against a man to testify against him of wrongdoing,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a false witness.' The Hebrew phrase literally reads 'a witness of violence/wrong,'
      which can denote a malicious or false accuser in court.
    reason: lexical_alternative
  - marker: b
    text: Or 'rebellion' or 'apostasy.' The Hebrew word can refer to serious deviation
      or defection; here it is rendered more generally as 'wrongdoing' to fit the
      legal setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: If
  alternatives:
  - When
  - If indeed
  lexicon: HALOT
  rationale: Here כִּי introduces a casuistic condition in legal material, best rendered
    'If' in English law-style discourse rather than the more causal 'for'.
- source_word: יָקוּם
  chosen: rises up
  alternatives:
  - arises
  - stands up
  lexicon: HALOT
  rationale: The verb קום in this legal context refers to appearing or taking a stand
    as a witness. 'Rises up' preserves the concrete verbal imagery while remaining
    natural English.
- source_word: עֵד חָמָס
  chosen: a malicious witness
  alternatives:
  - a false witness
  - a violent witness
  - a wrongful witness
  lexicon: HALOT
  rationale: The construct phrase literally means 'a witness of violence/wrong.' In
    context of judicial testimony, it denotes a witness acting with wrongful, malicious
    intent. 'Malicious witness' captures the sense better than the traditional 'false
    witness,' since the next clause specifies the false accusation.
- source_word: בְּאִישׁ
  chosen: against a man
  alternatives:
  - against someone
  - against a person
  lexicon: HALOT
  rationale: The preposition with אִישׁ here marks the person targeted by the testimony.
    Per the project's gender-accurate policy, 'man' is retained because the Hebrew
    is singular masculine and legal style often uses representative masculine language.
- source_word: לַעֲנוֹת
  chosen: to testify
  alternatives:
  - to answer
  - to accuse
  - to bear witness
  lexicon: HALOT
  rationale: ענה in this stem can mean 'answer/respond,' but in legal settings it
    commonly refers to giving testimony. 'To testify' is the clearest idiomatic rendering
    in context.
- source_word: בּוֹ
  chosen: against him
  alternatives:
  - concerning him
  - about him
  lexicon: HALOT
  rationale: With legal testimony, English idiom prefers 'against him' when the testimony
    is accusatory. This also fits the hostile force of the verse.
- source_word: סָרָה
  chosen: wrongdoing
  alternatives:
  - rebellion
  - apostasy
  - deviation
  - falsehood
  lexicon: HALOT
  rationale: סָרָה denotes a turning aside, often a serious offense or defection.
    In this judicial context, 'wrongdoing' is broad enough to fit the legal accusation
    without importing specifically cultic 'apostasy,' which is not explicit here.
