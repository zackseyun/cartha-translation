id: DEU.19.12
reference: Deuteronomy 19:12
source:
  edition: WLC
  text: וְ/שָֽׁלְחוּ֙ זִקְנֵ֣י עִיר֔/וֹ וְ/לָקְח֥וּ אֹת֖/וֹ מִ/שָּׁ֑ם וְ/נָתְנ֣וּ
    אֹת֗/וֹ בְּ/יַ֛ד גֹּאֵ֥ל הַ/דָּ֖ם וָ/מֵֽת׃
translation:
  text: then the elders of his city shall send and take him from there and hand him
    over to the avenger of blood, and he shall die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the blood avenger." The Hebrew phrase גֹּאֵל הַדָּם is a technical legal
      expression for the person responsible to avenge the shedding of blood.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁלְחוּ
  chosen: shall send
  alternatives:
  - must send
  - are to send
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in legal material functions with
    injunctive/future force. 'Shall send' preserves the legal prescription in natural
    English.
- source_word: זִקְנֵי עִירוֹ
  chosen: the elders of his city
  alternatives:
  - the elders of his town
  lexicon: HALOT
  rationale: זִקְנֵי denotes the recognized civic leaders/elders; עִיר commonly means
    'city' or 'town.' 'City' is retained as the more standard legal-administrative
    rendering.
- source_word: וְלָקְחוּ אֹתוֹ מִשָּׁם
  chosen: take him from there
  alternatives:
  - fetch him from there
  - seize him from there
  lexicon: HALOT
  rationale: לקח is broadly 'take.' In this asylum-law context it refers to removing
    the manslayer from the city of refuge. 'Take him from there' is sufficiently literal
    without over-specifying force beyond the text.
- source_word: וְנָתְנוּ אֹתוֹ בְּיַד
  chosen: hand him over to
  alternatives:
  - deliver him into the hand of
  - give him into the custody of
  lexicon: HALOT
  rationale: The idiom נתן ביד means to deliver into someone's power/hand. 'Hand him
    over to' is a clear modern equivalent that preserves the legal transfer of custody.
- source_word: גֹּאֵל הַדָּם
  chosen: the avenger of blood
  alternatives:
  - the blood avenger
  - the kinsman-avenger
  lexicon: HALOT
  rationale: This is the established legal term in the Pentateuch for the person authorized
    to avenge a killing. 'Avenger of blood' is the most transparent literal rendering.
    'Kinsman-avenger' reflects the broader semantic range of גאל in other contexts,
    but here the legal phrase specifically focuses on blood vengeance.
- source_word: וָמֵת
  chosen: and he shall die
  alternatives:
  - so that he may die
  - and he dies
  lexicon: HALOT
  rationale: The clause states the legal outcome after delivery to the avenger. 'And
    he shall die' preserves the terse resultative force without adding explanatory
    material not explicit in the Hebrew.
