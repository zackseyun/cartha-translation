id: DEU.19.10
reference: Deuteronomy 19:10
source:
  edition: WLC
  text: וְ/לֹ֤א יִשָּׁפֵךְ֙ דָּ֣ם נָקִ֔י בְּ/קֶ֣רֶב אַרְצְ/ךָ֔ אֲשֶׁר֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ
    נֹתֵ֥ן לְ/ךָ֖ נַחֲלָ֑ה וְ/הָיָ֥ה עָלֶ֖י/ךָ דָּמִֽים׃ס
translation:
  text: so that innocent blood may not be shed in the midst of your land that the
    LORD your God is giving you as an inheritance, and bloodguilt would be upon you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''and blood would be on you''; the Hebrew idiom means liability for
      innocent bloodshed, that is, bloodguilt.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשָּׁפֵךְ
  chosen: may not be shed
  alternatives:
  - be poured out
  - be spilled
  lexicon: HALOT
  rationale: Niphal of שׁפך conveys passive/reflexive 'be poured out/shed.' In context
    of blood and homicide law, 'be shed' is the most natural and idiomatic legal English.
- source_word: דָּם נָקִי
  chosen: innocent blood
  alternatives:
  - the blood of an innocent person
  - blameless blood
  lexicon: HALOT
  rationale: This collocation is a standard legal-moral expression for bloodshed of
    one not liable to death. 'Innocent blood' preserves the compact force of the Hebrew
    idiom.
- source_word: בְּקֶרֶב אַרְצְךָ
  chosen: in the midst of your land
  alternatives:
  - within your land
  - in your land
  lexicon: HALOT
  rationale: קֶרֶב literally means 'midst/inner part.' 'In the midst of your land'
    keeps the spatial sense while remaining readable; it also preserves the solemn
    legal tone.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name is rendered 'the LORD' rather
    than transliterated.
- source_word: נֹתֵן לְךָ נַחֲלָה
  chosen: is giving you as an inheritance
  alternatives:
  - gives you for an inheritance
  - is giving to you for a possession
  lexicon: HALOT
  rationale: The participle נֹתֵן has present/imperfective force in this discourse,
    and נַחֲלָה denotes inherited possession. 'Is giving you as an inheritance' is
    natural English that preserves covenant-land terminology.
- source_word: וְהָיָה עָלֶיךָ דָּמִים
  chosen: and bloodguilt would be upon you
  alternatives:
  - and blood would be on you
  - and you would incur bloodguilt
  lexicon: HALOT
  rationale: The plural דָּמִים in legal contexts often denotes bloodguilt rather
    than literal multiple bloods. 'Would be upon you' reflects the Hebrew construction
    עַל + pronoun, expressing liability resting on the addressee.
