theological_decisions:
- issue: Rendering of צֶדֶק in a judicial context
  chosen_reading: justice
  alternative_readings:
  - righteousness
  rationale: The immediate context concerns judges, bribes, and legal integrity, so the civic-forensic sense is primary. This preserves the text's ethical force without denying the broader semantic overlap between justice and righteousness.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Rendering of יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
