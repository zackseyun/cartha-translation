id: DEU.16.20
reference: Deuteronomy 16:20
source:
  edition: WLC
  text: צֶ֥דֶק צֶ֖דֶק תִּרְדֹּ֑ף לְמַ֤עַן תִּֽחְיֶה֙ וְ/יָרַשְׁתָּ֣ אֶת הָ/אָ֔רֶץ אֲשֶׁר יְהוָ֥ה אֱלֹהֶ֖י/ךָ נֹתֵ֥ן לָֽ/ךְ־־׃ס
translation:
  text: Justice, justice you shall pursue, so that you may live and possess the land that Yahweh your God is giving you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Righteousness, righteousness you shall pursue.' The Hebrew צֶדֶק can denote both justice and righteousness; here 'justice' fits the legal context.
    reason: lexical_alternative
  - marker: b
    text: Or 'inherit the land.' The Hebrew verb can carry the sense of inheriting as well as possessing.
    reason: lexical_alternative
lexical_decisions:
- source_word: צֶדֶק צֶדֶק
  chosen: Justice, justice
  alternatives:
  - Righteousness, righteousness
  - What is right, what is right
  lexicon: HALOT
  rationale: The doubled noun is emphatic. In this legal/judicial context (surrounding instructions about judges and impartiality), 'justice' best captures the public, forensic sense of צֶדֶק. 'Righteousness' is possible lexically, but in English it can sound more inward or moralistic than the context warrants. The repetition is preserved rather than smoothed out.
- source_word: תִּרְדֹּף
  chosen: you shall pursue
  alternatives:
  - you must pursue
  - you are to pursue
  lexicon: HALOT
  rationale: רדף literally means 'pursue/chase after.' 'You shall pursue' preserves the imperative force of the Hebrew imperfect in legal instruction while remaining idiomatic and suitably formal.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: HALOT
  rationale: Marks purpose/result. 'So that' is natural modern English and clearly connects the command with its covenant consequence.
- source_word: תִּחְיֶה
  chosen: you may live
  alternatives:
  - you may live on
  - you may thrive
  lexicon: HALOT
  rationale: חיה here denotes continued life/prosperity under covenant blessing. 'You may live' is the most direct and sufficiently broad rendering without importing extra nuance.
- source_word: וְיָרַשְׁתָּ
  chosen: and possess
  alternatives:
  - and inherit
  - and take possession of
  lexicon: HALOT
  rationale: ירשׁ can mean 'inherit' or 'possess/dispossess.' Here, with 'the land' that the LORD is giving, 'possess' communicates receiving and holding the land without implying merely passive inheritance. 'Inherit' is possible and worth preserving in a footnote because of covenant-land language.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: In Deuteronomy, 'the land' is a key covenant term referring to the promised land. 'Land' is the standard and theologically loaded rendering; 'country' would flatten that resonance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with second masculine singular suffix; 'your God' preserves the covenantal address to Israel in the singular.
- source_word: נֹתֵן לָךְ
  chosen: is giving you
  alternatives:
  - gives you
  - gives to you
  - is about to give you
  lexicon: HALOT
  rationale: The participle נֹתֵן conveys ongoing or characteristic action. 'Is giving you' preserves the vividness of the Hebrew better than a simple present, while fitting the Deuteronomic idiom of imminent divine gift.
