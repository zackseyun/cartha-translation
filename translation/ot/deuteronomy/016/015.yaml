id: DEU.16.15
reference: Deuteronomy 16:15
source:
  edition: WLC
  text: שִׁבְעַ֣ת יָמִ֗ים תָּחֹג֙ לַ/יהוָ֣ה אֱלֹהֶ֔י/ךָ בַּ/מָּק֖וֹם אֲשֶׁר יִבְחַ֣ר יְהוָ֑ה כִּ֣י יְבָרֶכְ/ךָ֞ יְהוָ֣ה אֱלֹהֶ֗י/ךָ בְּ/כֹ֤ל תְּבוּאָֽתְ/ךָ֙ וּ/בְ/כֹל֙ מַעֲשֵׂ֣ה יָדֶ֔י/ךָ וְ/הָיִ֖יתָ אַ֥ךְ שָׂמֵֽחַ־׃
translation:
  text: For seven days you shall celebrate a feast to Yahweh your God in the place that Yahweh will choose, because Yahweh your God will bless you in all your produce and in all the work of your hands, and you shall be altogether joyful.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you shall be only joyful' or 'you shall surely rejoice.' The Hebrew expression emphasizes full, unalloyed joy.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּחֹג
  chosen: shall celebrate a feast
  alternatives:
  - shall keep the feast
  - shall celebrate
  lexicon: HALOT
  rationale: The verb חָגַג denotes keeping/celebrating a pilgrimage festival, not merely generic rejoicing. 'Celebrate a feast' preserves the festal action in natural English.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The preposition ל here marks dedication/direction of the festival toward YHWH. 'To the LORD' is a natural rendering that preserves this orientation.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בַּמָּקוֹם אֲשֶׁר יִבְחַר יְהוָה
  chosen: in the place that the LORD will choose
  alternatives:
  - at the place that the LORD will choose
  lexicon: HALOT
  rationale: This phrase refers to the divinely chosen worship site. 'In the place' is a close rendering of ב + מקום and fits the syntax smoothly.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the commanded celebration and joy. 'Because' makes the causal force explicit in contemporary English.
- source_word: יְבָרֶכְךָ
  chosen: will bless you
  alternatives:
  - will prosper you
  lexicon: HALOT
  rationale: The piel of ברך here is the standard covenantal language of divine blessing. 'Bless you' preserves both lexical consistency and theological resonance.
- source_word: תְּבוּאָתְךָ
  chosen: your produce
  alternatives:
  - your harvest
  - your yield
  lexicon: HALOT
  rationale: תְּבוּאָה refers broadly to agricultural produce/yield. 'Produce' is broad enough to avoid narrowing it to grain alone, while fitting the harvest context.
- source_word: מַעֲשֵׂה יָדֶיךָ
  chosen: the work of your hands
  alternatives:
  - all your handiwork
  - all that your hands do
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for one's labor and its results. 'The work of your hands' preserves the idiom and remains understandable in modern English.
- source_word: וְהָיִיתָ
  chosen: and you shall be
  alternatives:
  - so that you will be
  lexicon: HALOT
  rationale: The qatal with prefixed conjunction here continues the result/consequence of divine blessing. 'And you shall be' is sufficiently literal while allowing the following adverbial emphasis to carry the sense.
- source_word: אַךְ
  chosen: altogether
  alternatives:
  - surely
  - only
  - completely
  lexicon: HALOT
  rationale: אַךְ here intensifies the resulting state rather than restricting it in a narrow sense. 'Altogether' conveys emphatic fullness of joy in idiomatic English.
- source_word: שָׂמֵחַ
  chosen: joyful
  alternatives:
  - glad
  - rejoicing
  lexicon: HALOT
  rationale: As a predicate adjective, שָׂמֵחַ describes the person's state. 'Joyful' is natural English and preserves the emotional force without sounding archaic.
