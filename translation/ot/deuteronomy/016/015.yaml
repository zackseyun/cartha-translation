theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of the closing clause וְהָיִיתָ אַךְ שָׂמֵחַ
  chosen_reading: and you shall be altogether joyful
  alternative_readings:
  - and you shall be only joyful
  - and you shall surely rejoice
  rationale: The Hebrew can be rendered with either a restrictive-sounding 'only' or an emphatic sense of full joy. In context of harvest blessing and festival celebration, the emphasis is on unalloyed fullness of joy rather than exclusion of every other emotion. 'Altogether joyful' preserves that emphasis without over-paraphrasing.
