theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH.
    This verse contains no contextual reason to depart from that standard.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Potential tension between 'cook/boil' here and Exodus 12:9
  chosen_reading: cook it
  alternative_readings:
  - boil it
  rationale: Because בשׁל can denote boiling/cooking and because a narrower rendering
    'boil' may appear to conflict with Exodus 12:9, the main text uses the broader
    'cook' while preserving 'boil' in a footnote for auditability. This preserves
    the lexical data without forcing a harmonization beyond the text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, preserve theological
    tension rather than resolve it'
