id: DEU.16.7
reference: Deuteronomy 16:7
source:
  edition: WLC
  text: וּ/בִשַּׁלְתָּ֙ וְ/אָ֣כַלְתָּ֔ בַּ/מָּק֕וֹם אֲשֶׁ֥ר יִבְחַ֛ר יְהוָ֥ה אֱלֹהֶ֖י/ךָ
    בּ֑/וֹ וּ/פָנִ֣יתָ בַ/בֹּ֔קֶר וְ/הָלַכְתָּ֖ לְ/אֹהָלֶֽי/ךָ׃
translation:
  text: And you shall cook it and eat it in the place that the LORD your God will
    choose for it, and in the morning you shall turn and go to your tents.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'boil it.' The Hebrew verb can specifically denote boiling, though here
      it may be used more broadly for cooking/preparing the Passover meal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִשַּׁלְתָּ
  chosen: cook it
  alternatives:
  - boil it
  - prepare it
  lexicon: HALOT
  rationale: The verb בשׁל commonly means 'cook/boil.' In Passover contexts this is
    debated because Exodus 12:9 forbids eating the animal 'boiled in water.' 'Cook
    it' preserves the broader sense without forcing the narrower 'boil it' into the
    main text; the narrower alternative is worth preserving in a footnote because
    of the intertextual tension.
- source_word: וְאָכַלְתָּ
  chosen: eat it
  lexicon: HALOT
  rationale: Straightforward rendering of אכל with the implied object carried over
    from the sacrificial meal context.
- source_word: בַּמָּקוֹם
  chosen: in the place
  alternatives:
  - at the place
  lexicon: HALOT
  rationale: Standard locative sense; 'in the place' is idiomatic in English and fits
    Deuteronomy's repeated formula for the central sanctuary.
- source_word: אֲשֶׁר יִבְחַר
  chosen: that ... will choose
  alternatives:
  - which ... chooses
  lexicon: HALOT
  rationale: 'Imperfect verb in Deuteronomy''s sanctuary formula is naturally rendered
    future here: the place the LORD will choose.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Covenantal designation in direct address; standard rendering.
- source_word: בּוֹ
  chosen: for it
  alternatives:
  - there
  - in it
  lexicon: HALOT
  rationale: 'The preposition with pronominal suffix most naturally refers back to
    ''the place'': ''the place that the LORD your God will choose for it,'' i.e.,
    as the site for his name/dwelling in Deuteronomic idiom. Rendering simply ''there''
    is possible but less transparent to the Hebrew construction.'
- source_word: וּפָנִיתָ
  chosen: you shall turn
  alternatives:
  - you may turn
  - you shall return
  lexicon: HALOT
  rationale: The verb literally means 'turn.' Here it introduces departure after the
    festival night. 'Turn' keeps the concrete sense, while the following 'go' completes
    the motion.
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - at morning
  - the next morning
  lexicon: HALOT
  rationale: Standard temporal expression. 'In the morning' is natural English and
    does not over-specify beyond the Hebrew.
- source_word: וְהָלַכְתָּ
  chosen: go
  alternatives:
  - walk
  - depart
  lexicon: HALOT
  rationale: הלך often means 'go' in ordinary movement contexts. 'Walk' would be too
    literal in English here.
- source_word: לְאֹהָלֶיךָ
  chosen: to your tents
  alternatives:
  - to your homes
  - to your dwelling places
  lexicon: HALOT
  rationale: The Hebrew literally says 'to your tents.' This should be preserved in
    the main text for concreteness and historical setting, even though it can idiomatically
    mean returning home.
