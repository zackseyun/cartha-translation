id: DEU.16.8
reference: Deuteronomy 16:8
source:
  edition: WLC
  text: שֵׁ֥שֶׁת יָמִ֖ים תֹּאכַ֣ל מַצּ֑וֹת וּ/בַ/יּ֣וֹם הַ/שְּׁבִיעִ֗י עֲצֶ֨רֶת֙ לַ/יהוָ֣ה אֱלֹהֶ֔י/ךָ לֹ֥א תַעֲשֶׂ֖ה מְלָאכָֽה׃ס
translation:
  text: For six days you shall eat unleavened bread, and on the seventh day there shall be a solemn assembly to Yahweh your God; you shall do no work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a sacred assembly' or 'a closing assembly.' The Hebrew term denotes a formal festal gathering, likely with the nuance of a concluding assembly.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׁשֶׁת יָמִים
  chosen: For six days
  alternatives:
  - Six days
  lexicon: HALOT
  rationale: The construct phrase denotes duration. 'For six days' is idiomatic English and conveys the temporal force clearly.
- source_word: תֹּאכַל
  chosen: you shall eat
  alternatives:
  - you are to eat
  - you may eat
  lexicon: HALOT
  rationale: The imperfect here functions instructionally within legal material. 'You shall eat' preserves the prescriptive force better than a permissive rendering.
- source_word: מַצּוֹת
  chosen: unleavened bread
  alternatives:
  - unleavened loaves
  - matzot
  lexicon: HALOT
  rationale: This is the standard sense of the plural noun in Passover context. 'Unleavened bread' is clear modern English; transliteration is unnecessary in the main text.
- source_word: וּבַיּוֹם הַשְּׁבִיעִי
  chosen: and on the seventh day
  alternatives:
  - but on the seventh day
  lexicon: HALOT
  rationale: The conjunction is simple waw. 'And on the seventh day' is the most straightforward rendering; adversative 'but' is possible contextually but not required by the Hebrew.
- source_word: עֲצֶרֶת
  chosen: a solemn assembly
  alternatives:
  - a sacred assembly
  - a closing assembly
  lexicon: HALOT
  rationale: The noun refers to a restrained or special assembly day, often cultic/festal. 'Solemn assembly' is established and communicates the formal sacred gathering without overinterpreting it as merely 'closing,' though that nuance may be present in festival context.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' The preposition ל marks relation/dedication; 'to the LORD' preserves the Hebrew closely, though 'for the LORD' is also possible.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'Standard covenantal expression following the divine name: ''the LORD your God.'''
- source_word: לֹא תַעֲשֶׂה מְלָאכָה
  chosen: you shall do no work
  alternatives:
  - you shall not do any work
  - you shall not work
  lexicon: HALOT
  rationale: The phrase prohibits labor. 'You shall do no work' is a natural, fairly formal rendering that preserves the Hebrew construction without unnecessary expansion.
