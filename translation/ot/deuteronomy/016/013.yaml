id: DEU.16.13
reference: Deuteronomy 16:13
source:
  edition: WLC
  text: חַ֧ג הַ/סֻּכֹּ֛ת תַּעֲשֶׂ֥ה לְ/ךָ֖ שִׁבְעַ֣ת יָמִ֑ים בְּ/אָ֨סְפְּ/ךָ֔ מִֽ/גָּרְנְ/ךָ֖
    וּ/מִ/יִּקְבֶֽ/ךָ׃
translation:
  text: You shall keep the Feast of Booths for seven days, when you gather in from
    your threshing floor and from your winepress.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Feast of Tabernacles.' The Hebrew literally refers to booths or
      temporary shelters.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַג הַסֻּכּוֹת
  chosen: the Feast of Booths
  alternatives:
  - the Festival of Booths
  - the Feast of Tabernacles
  - the Festival of Shelters
  lexicon: HALOT
  rationale: חַג denotes a pilgrimage feast/festival; 'Feast' preserves the formal
    festal sense. סֻכּוֹת literally means 'booths' or temporary shelters. 'Booths'
    is the most direct English rendering; 'Tabernacles' is traditional but less transparent
    to modern readers and can suggest the sanctuary rather than temporary shelters.
- source_word: תַּעֲשֶׂה לְךָ
  chosen: you shall keep
  alternatives:
  - you shall celebrate
  - you shall observe
  - you shall make for yourself
  lexicon: HALOT
  rationale: עשה literally means 'do/make,' but with חַג in legal-festal context it
    idiomatically means to observe or celebrate a feast. 'Keep' is natural English
    for covenantal observance and preserves the imperative force without woodenly
    saying 'make.' The לְךָ is not reflexive emphasis in English here but indicates
    personal obligation, adequately conveyed by 'you shall.'
- source_word: שִׁבְעַת יָמִים
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: HALOT
  rationale: A straightforward duration phrase. 'For seven days' is idiomatic English
    and makes the temporal extent explicit.
- source_word: בְּאָסְפְּךָ
  chosen: when you gather in
  alternatives:
  - at your gathering in
  - in your gathering in
  - after you have gathered in
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct of אסף can be rendered temporally.
    'When you gather in' communicates the harvest-time setting naturally. 'After you
    have gathered in' is possible but slightly more interpretive than the Hebrew requires.
- source_word: מִגָּרְנְךָ
  chosen: from your threshing floor
  alternatives:
  - from your grain floor
  lexicon: HALOT
  rationale: גֹּרֶן refers to the threshing floor, metonymically the grain harvest.
    The concrete image should be preserved rather than generalized to 'harvest' alone.
- source_word: וּמִיִּקְבֶךָ
  chosen: and from your winepress
  alternatives:
  - and from your vat
  lexicon: HALOT
  rationale: יֶקֶב denotes a winepress or wine vat associated with grape harvest.
    'Winepress' is the clearest and most common English equivalent in biblical context.
