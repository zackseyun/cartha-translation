id: DEU.16.1
reference: Deuteronomy 16:1
source:
  edition: WLC
  text: שָׁמוֹר֙ אֶת חֹ֣דֶשׁ הָ/אָבִ֔יב וְ/עָשִׂ֣יתָ פֶּ֔סַח לַ/יהוָ֖ה אֱלֹהֶ֑י/ךָ
    כִּ֞י בְּ/חֹ֣דֶשׁ הָֽ/אָבִ֗יב הוֹצִ֨יאֲ/ךָ֜ יְהוָ֧ה אֱלֹהֶ֛י/ךָ מִ/מִּצְרַ֖יִם
    לָֽיְלָה־׃
translation:
  text: Observe the month of Abib, and keep the Passover to the LORD your God, because
    in the month of Abib the LORD your God brought you out from Egypt by night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Abib is the name of the month associated with early ripening grain; alternatively,
      'the month of spring.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמוֹר
  chosen: Observe
  alternatives:
  - Keep
  - Guard
  lexicon: HALOT
  rationale: Imperative of שׁמר here calls for careful observance of a calendrical
    requirement, not merely mental remembrance. 'Observe' fits festival-law context
    in natural English while preserving the command's force.
- source_word: חֹדֶשׁ הָאָבִיב
  chosen: the month of Abib
  alternatives:
  - the month of Aviv
  - the month of spring
  lexicon: HALOT
  rationale: אָבִיב can denote the stage of ripening grain and by extension the spring
    season/month. Because the Hebrew expression functions as a named month in Israel's
    liturgical calendar, 'Abib' is retained rather than generalized to 'spring,' which
    would lose the calendrical specificity.
- source_word: וְעָשִׂיתָ פֶּסַח
  chosen: and keep the Passover
  alternatives:
  - and do the Passover
  - and celebrate the Passover
  lexicon: HALOT
  rationale: Literally 'do/make Passover,' but idiomatic English for performing the
    festival observance is 'keep the Passover.' This preserves the ritual sense without
    wooden wording. 'Celebrate' is possible but slightly freer and can sound more
    festive than the legal command context warrants.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The preposition ל marks dedication/direction of the observance toward
    YHWH. 'To the LORD' is a natural rendering that preserves this orientation.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding covenantal usage.
- source_word: הוֹצִיאֲךָ
  chosen: brought you out
  alternatives:
  - brought you forth
  lexicon: HALOT
  rationale: Standard exodus idiom for יצא in the Hiphil. 'Brought you out' is clear,
    idiomatic, and preserves the redemptive-historical formula.
- source_word: מִמִּצְרַיִם
  chosen: from Egypt
  alternatives:
  - out of Egypt
  lexicon: HALOT
  rationale: With 'brought you out,' 'from Egypt' yields smooth English without loss
    of meaning. The exodus sense remains explicit in the verb.
- source_word: לָיְלָה
  chosen: by night
  alternatives:
  - at night
  - in the night
  lexicon: HALOT
  rationale: Adverbial accusative indicating the time/circumstance of the exodus event.
    'By night' is concise and idiomatic in English, matching the narrative emphasis.
