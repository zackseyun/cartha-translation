theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Following the project's stated
    default for YHWH, it is rendered 'the LORD' rather than transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to render אָבִיב as a season or as a month name
  chosen_reading: Abib as a calendrical designation
  alternative_readings:
  - spring
  rationale: In this legal/festival context the phrase identifies the liturgical month
    associated with the exodus and Passover. Rendering it as 'spring' would flatten
    the formal calendar reference.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, original-language primacy
    over translation tradition
