id: DEU.16.2
reference: Deuteronomy 16:2
source:
  edition: WLC
  text: וְ/זָבַ֥חְתָּ פֶּ֛סַח לַ/יהוָ֥ה אֱלֹהֶ֖י/ךָ צֹ֣אן וּ/בָקָ֑ר בַּ/מָּקוֹם֙ אֲשֶׁר יִבְחַ֣ר יְהוָ֔ה לְ/שַׁכֵּ֥ן שְׁמ֖/וֹ שָֽׁם־׃
translation:
  text: And you shall sacrifice the Passover to Yahweh your God, from the flock and the herd, at the place that Yahweh will choose to make his name dwell there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''The Passover'' here is paired with ''from the flock and the herd.'' Some understand this as including not only the Passover victim itself but also the festival sacrifices associated with Passover/Unleavened Bread.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְזָבַחְתָּ
  chosen: And you shall sacrifice
  alternatives:
  - And you must sacrifice
  - Then you shall slaughter
  lexicon: HALOT
  rationale: The verb זבח denotes sacrificial slaughter, not merely generic killing. 'Sacrifice' best captures the cultic action in readable English. 'Shall' preserves the legal/instructional force of the Hebrew form in context.
- source_word: פֶּסַח
  chosen: the Passover
  alternatives:
  - the Passover sacrifice
  - the Passover offering
  lexicon: HALOT
  rationale: פֶּסַח can denote the Passover observance or the sacrificial victim/rite. Here, because it is the object of 'sacrifice,' English 'the Passover' is idiomatic and preserves the Hebrew compactness, while the sacrificial sense is already carried by the verb.
- source_word: לַיהוָה אֱלֹהֶיךָ
  chosen: to the LORD your God
  alternatives:
  - for the LORD your God
  lexicon: HALOT
  rationale: The preposition ל marks dedication/direction of the sacrifice. 'To the LORD your God' is the standard and natural rendering. YHWH is rendered 'the LORD' per doctrine guidelines.
- source_word: צֹאן וּבָקָר
  chosen: from the flock and the herd
  alternatives:
  - sheep and cattle
  - small livestock and cattle
  lexicon: HALOT
  rationale: 'Literally ''flock and herd.'' Rendering with ''from'' makes explicit the implied source relationship in English: the Passover-related sacrificial animals are taken from these categories. This also avoids over-specifying species where the Hebrew uses collective livestock terms.'
- source_word: בַּמָּקוֹם
  chosen: at the place
  alternatives:
  - in the place
  lexicon: HALOT
  rationale: The phrase refers to the central sanctuary location chosen by God. 'At the place' is idiomatic for a designated worship site.
- source_word: אֲשֶׁר יִבְחַר יְהוָה
  chosen: that the LORD will choose
  alternatives:
  - which the LORD chooses
  - that the LORD shall choose
  lexicon: HALOT
  rationale: The imperfect points to the place of future divine choosing relative to Moses' speech. 'Will choose' is the clearest English rendering.
- source_word: לְשַׁכֵּן שְׁמוֹ שָׁם
  chosen: to make his name dwell there
  alternatives:
  - to cause his name to dwell there
  - to place his name there
  lexicon: HALOT
  rationale: 'The Hiphil of שכן is causative: ''cause/make dwell.'' Retaining ''his name'' preserves the covenantal-theological idiom of divine presence/ownership without flattening it to a mere abstraction. ''Make his name dwell there'' is slightly more natural than ''cause'' while remaining faithful.'
