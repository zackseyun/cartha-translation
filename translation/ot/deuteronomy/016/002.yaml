- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Scope of 'Passover' in relation to 'flock and herd'
  chosen_reading: Retain the Hebrew wording without harmonizing away the broader livestock reference.
  alternative_readings:
  - Translate more interpretively as 'Passover sacrifice and festival offerings'
  rationale: The verse's wording includes 'flock and herd,' which is broader than the lamb/kid alone. Rather than importing a harmonization into the main text, the translation preserves the source wording and notes the interpretive issue in a footnote.
