theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering household dependents עבד/אמה
  chosen_reading: male slave / female slave
  alternative_readings:
  - servant / female servant
  - male servant / maidservant
  rationale: In this legal-social context, the bonded status is significant and should not be softened. This follows the translation philosophy's preference to avoid traditional inertia where the source indicates slavery rather than generic service.
  doctrine_reference: 'Translation philosophy §1; Contested terms analogy: δοῦλος servant / slave (context-dependent)'
- issue: Sanctuary formula לְשַׁכֵּן שְׁמוֹ שָׁם
  chosen_reading: for his name to dwell there
  alternative_readings:
  - to cause his name to dwell there
  - to place his name there
  rationale: The wording preserves the Deuteronomic theology of God's name dwelling at the chosen place without over-specifying metaphysical implications. It keeps the tension between divine transcendence and covenantal presence.
  doctrine_reference: Translation philosophy §3
