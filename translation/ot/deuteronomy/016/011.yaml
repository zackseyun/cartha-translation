theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD.' This preserves reverential
    convention and aligns with the stated doctrine guidance.
  doctrine_reference: 'Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering household dependents עבד/אמה
  chosen_reading: male slave / female slave
  alternative_readings:
  - servant / female servant
  - male servant / maidservant
  rationale: In this legal-social context, the bonded status is significant and should
    not be softened. This follows the translation philosophy's preference to avoid
    traditional inertia where the source indicates slavery rather than generic service.
  doctrine_reference: 'Translation philosophy §1; Contested terms analogy: δοῦλος
    servant / slave (context-dependent)'
- issue: Sanctuary formula לְשַׁכֵּן שְׁמוֹ שָׁם
  chosen_reading: for his name to dwell there
  alternative_readings:
  - to cause his name to dwell there
  - to place his name there
  rationale: The wording preserves the Deuteronomic theology of God's name dwelling
    at the chosen place without over-specifying metaphysical implications. It keeps
    the tension between divine transcendence and covenantal presence.
  doctrine_reference: Translation philosophy §3
