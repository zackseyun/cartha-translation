id: DEU.16.11
reference: Deuteronomy 16:11
source:
  edition: WLC
  text: וְ/שָׂמַחְתָּ֞ לִ/פְנֵ֣י יְהוָ֣ה אֱלֹהֶ֗י/ךָ אַתָּ֨ה וּ/בִנְ/ךָ֣ וּ/בִתֶּ/ךָ֮
    וְ/עַבְדְּ/ךָ֣ וַ/אֲמָתֶ/ךָ֒ וְ/הַ/לֵּוִי֙ אֲשֶׁ֣ר בִּ/שְׁעָרֶ֔י/ךָ וְ/הַ/גֵּ֛ר
    וְ/הַ/יָּת֥וֹם וְ/הָ/אַלְמָנָ֖ה אֲשֶׁ֣ר בְּ/קִרְבֶּ֑/ךָ בַּ/מָּק֗וֹם אֲשֶׁ֤ר יִבְחַר֙
    יְהוָ֣ה אֱלֹהֶ֔י/ךָ לְ/שַׁכֵּ֥ן שְׁמ֖/וֹ שָֽׁם׀׃
translation:
  text: And you shall rejoice before the LORD your God—you, your son, your daughter,
    your male slave, your female slave, the Levite who is within your gates, and the
    sojourner, the fatherless, and the widow who are among you—at the place that the
    LORD your God will choose for his name to dwell there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the resident foreigner' for 'the sojourner.' The Hebrew refers to a
      non-Israelite living among Israel under its social order.
    reason: lexical_alternative
  - marker: b
    text: Or 'the orphan' for 'the fatherless.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'to cause his name to dwell there.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׂמַחְתָּ
  chosen: And you shall rejoice
  alternatives:
  - And you shall be glad
  - And you shall celebrate
  lexicon: HALOT
  rationale: The verb שׂמח denotes rejoicing/gladness. 'Rejoice' preserves the covenantal
    and liturgical tone better than the more casual 'be glad,' while avoiding over-interpretive
    expansion beyond the Hebrew.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: The preposition with פָּנִים idiomatically means 'before' or 'in the
    presence of.' 'Before' is concise and natural, while still conveying worship in
    God's presence.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention rooted
    in the LXX pattern.
- source_word: אַתָּה
  chosen: you
  alternatives:
  - you yourself
  lexicon: HALOT
  rationale: The pronoun is explicit in Hebrew for emphasis. English can preserve
    this emphasis adequately by placing 'you' first in the list without adding awkward
    redundancy.
- source_word: וּבִנְךָ
  chosen: your son
  lexicon: HALOT
  rationale: Direct familial term; singular in Hebrew but representative in legal
    instruction, naturally rendered as singular in English.
- source_word: וּבִתֶּךָ
  chosen: your daughter
  lexicon: HALOT
  rationale: Direct familial term matching the Hebrew singular.
- source_word: וְעַבְדְּךָ
  chosen: your male slave
  alternatives:
  - your servant
  - your male servant
  lexicon: HALOT
  rationale: ' עבד can mean servant or slave, but in this household-law context the
    bonded social status is salient. ''Male slave'' makes the gender distinction explicit,
    matching the paired female term and the project''s preference to use ''slave''
    where bonded status matters.'
- source_word: וַאֲמָתֶךָ
  chosen: your female slave
  alternatives:
  - your maidservant
  - your female servant
  lexicon: HALOT
  rationale: אָמָה denotes a female slave/servant. 'Female slave' preserves both the
    social status and the gender contrast with the preceding masculine term.
- source_word: וְהַלֵּוִי
  chosen: the Levite
  lexicon: HALOT
  rationale: Standard rendering for the member of the tribe with cultic association;
    definite article retained.
- source_word: בִּשְׁעָרֶיךָ
  chosen: within your gates
  alternatives:
  - in your towns
  - inside your gates
  lexicon: HALOT
  rationale: Literally 'in your gates.' In Deuteronomic usage this refers to one's
    local community/towns. 'Within your gates' preserves the Hebrew idiom and its
    legal resonance better than the more interpretive 'in your towns.'
- source_word: וְהַגֵּר
  chosen: the sojourner
  alternatives:
  - the resident foreigner
  - the stranger
  lexicon: HALOT
  rationale: גֵּר refers to a non-native resident living among Israel. 'Sojourner'
    is a well-established biblical term that preserves the social-legal nuance better
    than the vaguer 'stranger.'
- source_word: וְהַיָּתוֹם
  chosen: the fatherless
  alternatives:
  - the orphan
  lexicon: HALOT
  rationale: Both are possible. 'Fatherless' reflects the Hebrew term more literally
    and preserves the recurring covenantal triad expression in the Torah.
- source_word: וְהָאַלְמָנָה
  chosen: the widow
  lexicon: HALOT
  rationale: Standard and precise rendering.
- source_word: אֲשֶׁר בְּקִרְבֶּךָ
  chosen: who are among you
  alternatives:
  - who are in your midst
  lexicon: HALOT
  rationale: The singular relative clause governs the grouped vulnerable persons and
    indicates their presence within the covenant community. 'Among you' is natural
    modern English while preserving the communal sense.
- source_word: בַּמָּקוֹם
  chosen: at the place
  alternatives:
  - in the place
  lexicon: HALOT
  rationale: The preposition here is locative. 'At the place' is idiomatic in English
    for a chosen worship site.
- source_word: אֲשֶׁר יִבְחַר
  chosen: that ... will choose
  alternatives:
  - which ... chooses
  lexicon: HALOT
  rationale: The imperfect points to the place of worship as to be designated by God.
    Future 'will choose' fits the Deuteronomic formula in context.
- source_word: לְשַׁכֵּן שְׁמוֹ שָׁם
  chosen: for his name to dwell there
  alternatives:
  - to cause his name to dwell there
  - to place his name there
  lexicon: HALOT
  rationale: The Hiphil of שכן in this formula is often rendered more woodenly as
    'cause his name to dwell.' 'For his name to dwell there' is smoother English while
    preserving the theological idea that God places his name-presence at the chosen
    sanctuary. 'Place his name there' is possible but loses the dwelling nuance.
