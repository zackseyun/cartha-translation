theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, while alternatives may be acknowledged. No footnote is necessary here because
    the default is straightforward and not a contested textual reading within the
    verse itself.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Cultic force of מַצֵּבָה
  chosen_reading: sacred pillar
  alternative_readings:
  - standing stone
  - pillar
  - cultic pillar
  rationale: The verse prohibits a worship-related object, not merely any stone monument.
    'Sacred pillar' preserves the religious significance without importing extra detail
    beyond the Hebrew. This avoids undertranslating the cultic context.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition'
