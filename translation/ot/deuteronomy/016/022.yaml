id: DEU.16.22
reference: Deuteronomy 16:22
source:
  edition: WLC
  text: וְ/לֹֽא תָקִ֥ים לְ/ךָ֖ מַצֵּבָ֑ה אֲשֶׁ֥ר שָׂנֵ֖א יְהוָ֥ה אֱלֹהֶֽי/ךָ־׃ס
translation:
  text: And you shall not set up for yourself a sacred pillar, which the LORD your
    God hates.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'standing stone' or 'cultic pillar.' The Hebrew term refers to an erected
      stone associated with worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָקִים
  chosen: set up
  alternatives:
  - erect
  - raise up
  lexicon: HALOT
  rationale: Hiphil of קום here means to cause to stand, in the sense of erecting
    or establishing an object. 'Set up' is natural modern English and fits the cultic
    context without sounding overly technical.
- source_word: לְךָ
  chosen: for yourself
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The dative pronoun marks personal involvement or benefit. 'For yourself'
    brings out the reflexive nuance in idiomatic English.
- source_word: מַצֵּבָה
  chosen: sacred pillar
  alternatives:
  - pillar
  - standing stone
  - cultic pillar
  lexicon: HALOT
  rationale: מַצֵּבָה refers to an erected stone monument, often associated with worship.
    'Sacred pillar' best communicates that this is not merely architectural but a
    cultic object, while remaining readable. 'Standing stone' is possible but less
    immediately clear to modern readers.
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  lexicon: HALOT
  rationale: Introduces a relative clause modifying מַצֵּבָה. 'Which' reads smoothly
    in English after a non-personal antecedent.
- source_word: שָׂנֵא
  chosen: hates
  alternatives:
  - detests
  lexicon: HALOT
  rationale: The verb plainly denotes hatred or strong aversion. 'Hates' is the most
    direct rendering and preserves the force of the Hebrew without softening it.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the pattern reflected
    in many English translations.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Standard covenantal expression in direct address. 'Your God' preserves
    both the possessive suffix and the relational force of the phrase.
