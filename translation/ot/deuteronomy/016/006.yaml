id: DEU.16.6
reference: Deuteronomy 16:6
source:
  edition: WLC
  text: כִּ֠י אִֽם אֶל הַ/מָּק֞וֹם אֲשֶׁר יִבְחַ֨ר יְהוָ֤ה אֱלֹהֶ֨י/ךָ֙ לְ/שַׁכֵּ֣ן
    שְׁמ֔/וֹ שָׁ֛ם תִּזְבַּ֥ח אֶת הַ/פֶּ֖סַח בָּ/עָ֑רֶב כְּ/ב֣וֹא הַ/שֶּׁ֔מֶשׁ מוֹעֵ֖ד
    צֵֽאתְ/ךָ֥ מִ/מִּצְרָֽיִם־־־־׃
translation:
  text: but only at the place that the LORD your God will choose for his name to dwell—there
    you shall sacrifice the Passover in the evening, at sunset, at the appointed time
    of your coming out from Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to cause his name to dwell there' or 'to put his name there.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you shall slaughter the Passover.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'at the appointed time of your coming out from Egypt.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: but only
  alternatives:
  - except
  - rather only
  lexicon: HALOT
  rationale: The collocation introduces a strong restriction contrasting with the
    previous prohibition against sacrificing in any town. 'But only' captures the
    exceptive force in natural English.
- source_word: הַמָּקוֹם
  chosen: the place
  alternatives:
  - the location
  lexicon: HALOT
  rationale: Standard rendering for מָקוֹם; in Deuteronomy this often refers to the
    central sanctuary site chosen by God.
- source_word: יִבְחַר
  chosen: will choose
  alternatives:
  - chooses
  - selects
  lexicon: HALOT
  rationale: Imperfect verb with future sense in this legal context; 'will choose'
    reflects the prospective designation of the worship site.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    following established reverential convention and LXX-influenced English tradition.
- source_word: לְשַׁכֵּן שְׁמוֹ שָׁם
  chosen: for his name to dwell
  alternatives:
  - to cause his name to dwell there
  - to place his name there
  lexicon: HALOT
  rationale: The Hiphil infinitive of שכן with 'his name' expresses God's choosing
    a place for the manifestation of his name/presence. 'For his name to dwell' preserves
    the idiom while remaining readable. The more wooden 'cause his name to dwell there'
    is possible but less natural in English.
- source_word: תִּזְבַּח
  chosen: you shall sacrifice
  alternatives:
  - you shall slaughter
  lexicon: HALOT
  rationale: זבח can denote sacrificial slaughter. Because the object is the Passover
    and the cultic setting is explicit, 'sacrifice' best conveys the ritual act, while
    'slaughter' is preserved as a lexical alternative.
- source_word: הַפֶּסַח
  chosen: the Passover
  alternatives:
  - the Passover sacrifice
  - the Passover lamb
  lexicon: HALOT
  rationale: The noun can refer to the Passover observance or sacrificial victim.
    Here, as the direct object of 'sacrifice,' it denotes the Passover offering. 'The
    Passover' is concise and traditional; the sacrificial nuance is already supplied
    by the verb.
- source_word: בָּעָרֶב
  chosen: in the evening
  alternatives:
  - at evening
  lexicon: HALOT
  rationale: Straightforward temporal phrase; 'in the evening' is idiomatic modern
    English.
- source_word: כְּבֹא הַשֶּׁמֶשׁ
  chosen: at sunset
  alternatives:
  - when the sun goes down
  - at the going down of the sun
  lexicon: HALOT
  rationale: The phrase literally means 'as the sun comes/goes in,' idiomatically
    sunset. 'At sunset' is concise and accurate.
- source_word: מוֹעֵד
  chosen: at the appointed time
  alternatives:
  - at the set time
  - at the fixed time
  - at the appointed season
  lexicon: HALOT
  rationale: מוֹעֵד denotes an appointed time or fixed occasion. Here it specifies
    the proper time of Passover observance. 'Appointed time' preserves both temporal
    precision and covenantal overtones.
- source_word: צֵאתְךָ מִמִּצְרַיִם
  chosen: of your coming out from Egypt
  alternatives:
  - when you came out of Egypt
  - of your exodus from Egypt
  lexicon: HALOT
  rationale: The construct phrase links the appointed time to Israel's departure from
    Egypt. 'Your coming out from Egypt' stays close to the Hebrew while remaining
    understandable. 'Exodus' is possible but imports a title-like term not present
    in the Hebrew wording.
