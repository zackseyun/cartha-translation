theological_decisions:
- issue: Divine-name formula in Deuteronomy's centralization language
  chosen_reading: the LORD your God will choose for his name to dwell
  alternative_readings:
  - the LORD your God will choose to put his name there
  - the LORD your God will choose to make his name dwell there
  rationale: The verse expresses Deuteronomy's theology of centralized worship through
    the idiom of God's name dwelling at the chosen place. The translation preserves
    the idiom without over-interpreting it as a metaphysical statement about divine
    localization. 'For his name to dwell' keeps the theological tension between God's
    transcendence and covenantal presence.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3; Contested terms table
    for יְהוָה'
