id: DEU.16.9
reference: Deuteronomy 16:9
source:
  edition: WLC
  text: שִׁבְעָ֥ה שָׁבֻעֹ֖ת תִּסְפָּר לָ֑/ךְ מֵ/הָחֵ֤ל חֶרְמֵשׁ֙ בַּ/קָּמָ֔ה תָּחֵ֣ל
    לִ/סְפֹּ֔ר שִׁבְעָ֖ה שָׁבֻעֽוֹת־׃
translation:
  text: You shall count seven weeks for yourself; from the time the sickle begins
    to be put to the standing grain, you shall begin to count seven weeks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'seven sevens.' Here the Hebrew idiom refers to seven weeks.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁבְעָה שָׁבֻעֹת
  chosen: seven weeks
  alternatives:
  - seven sevens
  lexicon: HALOT
  rationale: שָׁבֻעֹת is the normal Hebrew term for 'weeks.' Although literally related
    to 'sevens,' in this calendrical context the idiomatic sense is 'weeks,' which
    is clearer in English while preserving the counting structure.
- source_word: תִּסְפָּר לָךְ
  chosen: you shall count for yourself
  alternatives:
  - you shall count
  - you are to count
  lexicon: HALOT
  rationale: The Qal imperfect of ספר gives an instruction/future command, well rendered
    'you shall count.' The dative לָךְ is retained with 'for yourself' to reflect
    the Hebrew's explicit personal reference, even though English could omit it.
- source_word: מֵהָחֵל
  chosen: from the time ... begins
  alternatives:
  - from when ... begins
  - from the beginning of
  lexicon: HALOT
  rationale: The preposition מִן with the infinitive construct of חלל/חלל II ('begin')
    marks the starting point. 'From the time ... begins' expresses the temporal force
    naturally in English.
- source_word: חֶרְמֵשׁ
  chosen: the sickle
  alternatives:
  - a sickle
  lexicon: HALOT
  rationale: חֶרְמֵשׁ denotes a harvesting sickle. 'The sickle' fits the generic/institutional
    sense in English for the harvest action being described.
- source_word: בַּקָּמָה
  chosen: to the standing grain
  alternatives:
  - in the standing grain
  - upon the standing grain
  - to the standing crop
  lexicon: HALOT
  rationale: קָמָה refers to standing grain/crop. With the harvest idiom involving
    the sickle, English commonly says the sickle is 'put to' the standing grain; this
    conveys the sense more idiomatically than a woodenly literal prepositional rendering.
- source_word: תָּחֵל לִסְפֹּר
  chosen: you shall begin to count
  alternatives:
  - you shall start counting
  lexicon: HALOT
  rationale: The Hiphil of חלל plus infinitive of ספר forms a clear verbal expression
    of inception. 'Begin to count' is both accurate and natural.
- source_word: שִׁבְעָה שָׁבֻעוֹת
  chosen: seven weeks
  alternatives:
  - seven sevens
  lexicon: HALOT
  rationale: The repeated phrase is preserved consistently as 'seven weeks,' matching
    the first occurrence and the festival-counting context.
