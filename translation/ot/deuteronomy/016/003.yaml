theological_decisions:
- issue: Meaning of לֶחֶם עֹנִי in relation to the exodus memorial
  chosen_reading: Rendered as 'the bread of affliction' to preserve the memorial of
    hardship in Egypt and the urgency of departure.
  alternative_readings:
  - the bread of poverty
  - the bread of misery
  rationale: The phrase carries theological significance as a ritual reminder of Israel's
    suffering and deliverance. 'Affliction' best preserves that tension without narrowing
    the sense to economics alone.
  doctrine_reference: Translation philosophy §3, §5
