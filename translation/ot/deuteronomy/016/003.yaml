id: DEU.16.3
reference: Deuteronomy 16:3
source:
  edition: WLC
  text: לֹא תֹאכַ֤ל עָלָי/ו֙ חָמֵ֔ץ שִׁבְעַ֥ת יָמִ֛ים תֹּֽאכַל עָלָ֥י/ו מַצּ֖וֹת לֶ֣חֶם
    עֹ֑נִי כִּ֣י בְ/חִפָּז֗וֹן יָצָ֨אתָ֙ מֵ/אֶ֣רֶץ מִצְרַ֔יִם לְמַ֣עַן תִּזְכֹּר֔
    אֶת י֤וֹם צֵֽאתְ/ךָ֙ מֵ/אֶ֣רֶץ מִצְרַ֔יִם כֹּ֖ל יְמֵ֥י חַיֶּֽי/ךָ־־־׃
translation:
  text: You shall not eat leavened bread with it. For seven days you shall eat with
    it unleavened bread, the bread of affliction, because you came out from the land
    of Egypt in haste, so that you may remember the day of your coming out from the
    land of Egypt all the days of your life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the bread of poverty' or 'the bread of misery.' The Hebrew phrase may
      emphasize hardship, deprivation, or affliction associated with the exodus.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלָיו
  chosen: with it
  alternatives:
  - on it
  - over it
  lexicon: HALOT
  rationale: The preposition עַל with the Passover sacrifice idiomatically means eating
    something in accompaniment with it. 'With it' is natural English and fits the
    sacrificial meal context better than the overly literal 'on it.'
- source_word: חָמֵץ
  chosen: leavened bread
  alternatives:
  - leaven
  - anything leavened
  lexicon: HALOT
  rationale: In this meal context, the prohibition concerns leavened food eaten with
    the Passover, and 'leavened bread' communicates the practical sense clearly in
    English. 'Leaven' alone could sound like the ingredient rather than the resulting
    food.
- source_word: מַצּוֹת
  chosen: unleavened bread
  alternatives:
  - unleavened cakes
  - matzot
  lexicon: HALOT
  rationale: This is the standard and clear English rendering for the festival food.
    'Matzot' would transliterate rather than translate; 'cakes' is possible but less
    idiomatic here.
- source_word: לֶחֶם עֹנִי
  chosen: the bread of affliction
  alternatives:
  - bread of misery
  - bread of poverty
  - poor bread
  lexicon: HALOT
  rationale: The construct phrase is traditionally and lexically tied to hardship
    or misery associated with the exodus. 'Affliction' preserves the weight of עֹנִי
    without overinterpreting it as merely economic poverty.
- source_word: בְחִפָּזוֹן
  chosen: in haste
  alternatives:
  - in hurried flight
  - in alarm
  lexicon: HALOT
  rationale: '''In haste'' is the most natural and established rendering, matching
    the exodus context of urgent departure without adding interpretive detail.'
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the sake of
  lexicon: HALOT
  rationale: This marks purpose. 'So that' is readable modern English and preserves
    the purposive force.
- source_word: תִּזְכֹּר
  chosen: you may remember
  alternatives:
  - you will remember
  - you shall remember
  lexicon: HALOT
  rationale: 'Following לְמַעַן, the imperfect is best rendered as purpose/result:
    ''so that you may remember.'''
- source_word: יֹום צֵאתְךָ
  chosen: the day of your coming out
  alternatives:
  - the day you came out
  - the day of your departure
  lexicon: HALOT
  rationale: The Hebrew uses a construct expression with the infinitive, and 'the
    day of your coming out' preserves that form while remaining understandable. It
    also echoes the repeated exodus motif in the verse.
- source_word: כֹּל יְמֵי חַיֶּיךָ
  chosen: all the days of your life
  alternatives:
  - all your life
  - throughout your lifetime
  lexicon: HALOT
  rationale: This is a standard idiomatic rendering that preserves the distributive
    sense of continual remembrance across one's lifetime.
