id: DEU.16.16
reference: Deuteronomy 16:16
source:
  edition: WLC
  text: שָׁל֣וֹשׁ פְּעָמִ֣ים בַּ/שָּׁנָ֡ה יֵרָאֶ֨ה כָל זְכוּרְ/ךָ֜ אֶת פְּנֵ֣י יְהוָ֣ה
    אֱלֹהֶ֗י/ךָ בַּ/מָּקוֹם֙ אֲשֶׁ֣ר יִבְחָ֔ר בְּ/חַ֧ג הַ/מַּצּ֛וֹת וּ/בְ/חַ֥ג הַ/שָּׁבֻע֖וֹת
    וּ/בְ/חַ֣ג הַ/סֻּכּ֑וֹת וְ/לֹ֧א יֵרָאֶ֛ה אֶת פְּנֵ֥י יְהוָ֖ה רֵיקָֽם׀־־׀־׃
translation:
  text: 'Three times a year all your males shall appear before the LORD your God in
    the place that he will choose: at the Feast of Unleavened Bread, at the Feast
    of Weeks, and at the Feast of Booths. No one shall appear before the LORD empty-handed.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shall be seen before the LORD'; the Hebrew verb is literally passive/reflexive,
      but in this context it functions as the idiom for presenting oneself before
      God.
    reason: lexical_alternative
  - marker: b
    text: '''The Feast of Booths'' is traditionally rendered ''the Feast of Tabernacles.'''
    reason: alternative_reading
  - marker: c
    text: '''Empty-handed'' means coming without the required gift or offering.'
    reason: cultural_note
lexical_decisions:
- source_word: יֵרָאֶה
  chosen: shall appear
  alternatives:
  - shall be seen
  - shall present himself
  lexicon: HALOT
  rationale: The Niphal of ראה here functions idiomatically for presenting oneself
    before God at pilgrimage festivals. 'Shall appear' is natural English and preserves
    the formal sense better than a freer paraphrase.
- source_word: כָל זְכוּרְךָ
  chosen: all your males
  alternatives:
  - every male among you
  - all your men
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine and refers to male Israelites obligated
    to attend. 'All your males' is gender-accurate to the source and avoids softening
    the legal scope.
- source_word: פְּנֵי יְהוָה אֱלֹהֶיךָ
  chosen: before the LORD your God
  alternatives:
  - the face/presence of the LORD your God
  lexicon: HALOT
  rationale: The idiom 'before the face of' commonly means appearing in the presence
    of. 'Before the LORD your God' is idiomatic English while retaining the covenantal
    force. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's default rendering for the divine name, preserving
    Jewish reverence tradition and established covenantal usage.
- source_word: בַּמָּקוֹם אֲשֶׁר יִבְחָר
  chosen: in the place that he will choose
  alternatives:
  - at the place that he chooses
  - in the place which he will choose
  lexicon: HALOT
  rationale: The imperfect points to the place of divine choosing, central to Deuteronomy's
    theology of worship. 'Will choose' preserves the forward-looking force in context.
- source_word: חַג הַמַּצּוֹת
  chosen: the Feast of Unleavened Bread
  alternatives:
  - the festival of Unleavened Bread
  lexicon: HALOT
  rationale: A standard, transparent rendering of the pilgrimage festival name; 'Feast'
    fits the repeated חג pattern in the verse.
- source_word: חַג הַשָּׁבֻעוֹת
  chosen: the Feast of Weeks
  alternatives:
  - the festival of Weeks
  lexicon: HALOT
  rationale: This is the literal Hebrew festival name. It is preferable to importing
    the later Greek-derived name 'Pentecost' into the Old Testament context.
- source_word: חַג הַסֻּכּוֹת
  chosen: the Feast of Booths
  alternatives:
  - the festival of Booths
  - the Feast of Tabernacles
  lexicon: HALOT
  rationale: '''Booths'' directly reflects סֻכּוֹת and is more transparent to modern
    readers than the traditional but less immediately clear ''Tabernacles.'''
- source_word: וְלֹא יֵרָאֶה אֶת־פְּנֵי יְהוָה רֵיקָם
  chosen: No one shall appear before the LORD empty-handed
  alternatives:
  - and he shall not appear before the LORD empty
  - and none shall appear before the LORD empty
  lexicon: HALOT
  rationale: רֵיקָם in this cultic context means not coming without an offering or
    gift. 'Empty-handed' conveys the idiomatic force clearly in modern English without
    adding more than the context warrants.
