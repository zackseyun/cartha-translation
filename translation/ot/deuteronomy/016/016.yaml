theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD.' This preserves reverential
    convention and aligns with the doctrine guidance on contested terms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered legal obligation in כָל זְכוּרְךָ
  chosen_reading: all your males
  alternative_readings:
  - all your men
  - everyone among you
  rationale: The source text specifies males, not the whole population generically.
    Per the project's gender-accurate policy, the translation preserves the masculine
    legal reference rather than neutralizing it.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
