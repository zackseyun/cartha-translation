id: DEU.16.17
reference: Deuteronomy 16:17
source:
  edition: WLC
  text: אִ֖ישׁ כְּ/מַתְּנַ֣ת יָד֑/וֹ כְּ/בִרְכַּ֛ת יְהוָ֥ה אֱלֹהֶ֖י/ךָ אֲשֶׁ֥ר נָֽתַן
    לָֽ/ךְ־׃ס
translation:
  text: Each man shall give according to the gift of his hand, according to the blessing
    of the LORD your God that he has given you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the gift of his hand,' an idiom referring to what one has available
      to give.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  chosen: Each man
  alternatives:
  - Each one
  - Each person
  lexicon: HALOT
  rationale: The singular noun means 'man' or 'each man' here in a distributive sense.
    Following the gender-accurate policy, 'man' is retained rather than neutralizing
    to 'person,' while 'each' brings out the distributive force in context.
- source_word: כְּ/מַתְּנַת
  chosen: according to the gift
  alternatives:
  - in proportion to the gift
  - according to the present
  lexicon: HALOT
  rationale: The prefixed כ conveys proportion ('according to/in proportion to'),
    and מַתָּנָה denotes a gift/present. 'According to the gift' preserves the Hebrew
    structure while remaining natural English.
- source_word: יָד/וֹ
  chosen: of his hand
  alternatives:
  - he is able to give
  - his means
  lexicon: HALOT
  rationale: Literally 'his hand.' In this idiom the hand represents what one has
    available to give, but the literal expression is still intelligible in English
    and preserves the Hebrew imagery. A more interpretive rendering like 'his means'
    is possible but less transparent.
- source_word: כְּ/בִרְכַּת
  chosen: according to the blessing
  alternatives:
  - in proportion to the blessing
  lexicon: HALOT
  rationale: Again the prefixed כ marks proportion. בְּרָכָה here refers to the blessing
    bestowed by God, especially material provision in context. 'According to the blessing'
    is both accurate and readable.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD' rather than a transliteration.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Construct with the divine name yields 'the LORD your God,' the standard
    covenantal expression in Deuteronomy.
- source_word: אֲשֶׁר נָתַן לָךְ
  chosen: that he has given you
  alternatives:
  - which he gave you
  - that he gave to you
  lexicon: HALOT
  rationale: The relative clause modifies 'the blessing.' English present perfect
    ('has given') fits the sense of a bestowed blessing with continuing relevance,
    though simple past would also be possible.
