theological_decisions:
- issue: Whether אֲשֵׁרָה should be rendered as the goddess name or as a cult object
  chosen_reading: Retain 'Asherah' in transliteration, with the following phrase 'any
    kind of tree' clarifying the cultic/tree reference.
  alternative_readings:
  - Asherah pole
  - wooden image of Asherah
  rationale: The Hebrew term is semantically contested in context. Transliteration
    avoids over-resolving whether the text refers primarily to the deity, her symbol,
    or a cultic tree/pole, while still communicating the prohibition. This preserves
    interpretive tension rather than collapsing it.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
