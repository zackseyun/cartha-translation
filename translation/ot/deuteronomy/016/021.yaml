id: DEU.16.21
reference: Deuteronomy 16:21
source:
  edition: WLC
  text: לֹֽא תִטַּ֥ע לְ/ךָ֛ אֲשֵׁרָ֖ה כָּל עֵ֑ץ אֵ֗צֶל מִזְבַּ֛ח יְהוָ֥ה אֱלֹהֶ֖י/ךָ
    אֲשֶׁ֥ר תַּעֲשֶׂה לָּֽ/ךְ־־־׃ס
translation:
  text: You shall not plant for yourself an Asherah, any kind of tree, beside the
    altar of the LORD your God that you make for yourself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an Asherah pole'; the Hebrew אֲשֵׁרָה can refer to a cult object associated
      with the goddess Asherah, not only to the goddess herself.
    reason: alternative_reading
lexical_decisions:
- source_word: תִטַּע
  chosen: plant
  alternatives:
  - set up
  lexicon: HALOT
  rationale: The verb נטע normally means 'plant.' Although the object here is cultic
    and some translations smooth toward 'set up,' the Hebrew wording retains the imagery
    of planting, likely because the Asherah could be a living tree or wooden cult
    object. 'Plant' best preserves the source wording and its cultic force.
- source_word: אֲשֵׁרָה
  chosen: Asherah
  alternatives:
  - Asherah pole
  - wooden cult pole
  lexicon: HALOT
  rationale: The Hebrew term can denote either the goddess Asherah or a cult object
    associated with her worship. Transliteration preserves the ambiguity better than
    forcing 'pole.' Because the following phrase 'any kind of tree' clarifies the
    arboreal/cultic association, 'Asherah' in the main text is most auditable and
    least interpretively loaded.
- source_word: כָּל עֵץ
  chosen: any kind of tree
  alternatives:
  - any tree
  - any wood/tree
  lexicon: HALOT
  rationale: Literally 'any tree.' Rendering as 'any kind of tree' makes clear that
    the prohibition covers every tree-form Asherah, not merely one specific species.
    This also reflects the appositional relationship to אֲשֵׁרָה.
- source_word: אֵצֶל
  chosen: beside
  alternatives:
  - near
  - next to
  lexicon: HALOT
  rationale: אֵצֶל denotes proximity. 'Beside' is natural English and suitably concrete
    in a legal prohibition.
- source_word: מִזְבַּח
  chosen: altar
  lexicon: HALOT
  rationale: Standard rendering for מזבח; no contextual reason to vary.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the Septuagintal pattern.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with second masculine singular suffix; 'your
    God' preserves covenantal address.
- source_word: אֲשֶׁר תַּעֲשֶׂה לָּךְ
  chosen: that you make for yourself
  alternatives:
  - which you make
  - that you build for yourself
  lexicon: HALOT
  rationale: עשה is broad ('make/do'). Since the object is an altar, 'build' is possible,
    but 'make' stays closer to the Hebrew while remaining idiomatic. The reflexive
    sense from לָּךְ is preserved with 'for yourself,' matching the second-person
    legal address.
