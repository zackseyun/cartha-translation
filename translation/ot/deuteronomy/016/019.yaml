id: DEU.16.19
reference: Deuteronomy 16:19
source:
  edition: WLC
  text: לֹא תַטֶּ֣ה מִשְׁפָּ֔ט לֹ֥א תַכִּ֖יר פָּנִ֑ים וְ/לֹא תִקַּ֣ח שֹׁ֔חַד כִּ֣י
    הַ/שֹּׁ֗חַד יְעַוֵּר֙ עֵינֵ֣י חֲכָמִ֔ים וִֽ/יסַלֵּ֖ף דִּבְרֵ֥י צַדִּיקִֽם־־׃
translation:
  text: You shall not pervert justice; you shall not show partiality; and you shall
    not take a bribe, for the bribe blinds the eyes of the wise and twists the words
    of the righteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'recognize faces,' an idiom meaning to show favoritism
      or partiality.
    reason: lexical_alternative
  - marker: b
    text: Or 'distorts the words/case of the righteous.' The Hebrew can refer either
      to their words or, in legal context, to their cause.
    reason: alternative_reading
lexical_decisions:
- source_word: תַטֶּה מִשְׁפָּט
  chosen: pervert justice
  alternatives:
  - distort justice
  - bend judgment
  lexicon: HALOT
  rationale: The Hiphil of נטה with מִשְׁפָּט conveys turning aside or bending what
    is right in legal judgment. 'Pervert justice' is idiomatic modern legal English
    and preserves the forensic force better than the more wooden 'bend judgment.'
- source_word: תַכִּיר פָּנִים
  chosen: show partiality
  alternatives:
  - recognize faces
  - regard persons
  - be partial
  lexicon: HALOT
  rationale: Literally 'recognize faces,' this Hebrew idiom refers to favoritism in
    judgment. 'Show partiality' communicates the idiomatic sense clearly in modern
    English while retaining the judicial context.
- source_word: שֹׁחַד
  chosen: bribe
  alternatives:
  - gift
  lexicon: HALOT
  rationale: In this legal context שֹׁחַד denotes a corrupt payment intended to influence
    judgment. 'Bribe' is the precise English equivalent; 'gift' would understate the
    moral and legal force.
- source_word: יְעַוֵּר עֵינֵי חֲכָמִים
  chosen: blinds the eyes of the wise
  alternatives:
  - makes the wise blind
  - blinds wise eyes
  lexicon: HALOT
  rationale: The phrase is metaphorical but transparent in English. Keeping 'blinds
    the eyes' preserves the vivid imagery and causal force of the Hebrew.
- source_word: חֲכָמִים
  chosen: the wise
  alternatives:
  - wise men
  lexicon: HALOT
  rationale: The masculine plural here refers generically to wise persons, not specifically
    males. 'The wise' is gender-accurate to the sense while remaining natural English.
- source_word: וִיסַלֵּף דִּבְרֵי צַדִּיקִם
  chosen: twists the words of the righteous
  alternatives:
  - distorts the words of the righteous
  - subverts the case of the righteous
  lexicon: HALOT
  rationale: סלף means to twist or distort. דִּבְרֵי can mean 'words' or, in legal
    context, 'statements/case.' 'Words of the righteous' stays close to the Hebrew
    while still fitting the courtroom setting. 'Twists' pairs well with the imagery
    of corruption.
- source_word: צַדִּיקִם
  chosen: the righteous
  alternatives:
  - the just
  - the innocent
  lexicon: HALOT
  rationale: צַדִּיקִם in this context refers to those in the right, morally or legally.
    'The righteous' is the most consistent and transparent rendering, while 'the innocent'
    would narrow the sense too much.
