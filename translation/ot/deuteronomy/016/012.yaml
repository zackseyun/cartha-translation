theological_decisions:
- issue: Rendering of עֶבֶד in Israel's Egyptian bondage
  chosen_reading: slave
  alternative_readings:
  - servant
  - bondman
  rationale: The historical memory in Deuteronomy concerns Israel's coerced bondage
    in Egypt, so the stronger English term better reflects the social reality and
    aligns with the project's guidance to use 'slave' where bonded status is salient.
  doctrine_reference: Translation philosophy §1; Contested terms table for δοῦλος/servant-slave
    principle applied analogically to Hebrew עֶבֶד
