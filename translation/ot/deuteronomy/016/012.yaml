id: DEU.16.12
reference: Deuteronomy 16:12
source:
  edition: WLC
  text: וְ/זָ֣כַרְתָּ֔ כִּי עֶ֥בֶד הָיִ֖יתָ בְּ/מִצְרָ֑יִם וְ/שָׁמַרְתָּ֣ וְ/עָשִׂ֔יתָ
    אֶת הַֽ/חֻקִּ֖ים הָ/אֵֽלֶּה־־׃פ
translation:
  text: Remember that you were a slave in Egypt, and keep and do these statutes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servant.' The Hebrew עֶבֶד can denote a servant or slave, but here 'slave'
      best reflects Israel's bondage in Egypt.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזָכַרְתָּ
  chosen: Remember
  alternatives:
  - And you shall remember
  - So remember
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional context functions
    as an imperative-like command. 'Remember' is natural modern English and preserves
    the force without unnecessary woodenness.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Introduces the content of what is to be remembered rather than giving
    a causal nuance; 'that' best fits English after 'remember.'
- source_word: עֶבֶד
  chosen: slave
  alternatives:
  - servant
  - bondman
  lexicon: HALOT
  rationale: The term denotes bonded status, and in Israel's memory of Egypt the oppressive
    servile condition is salient. Per translation philosophy, 'slave' is preferred
    where bonded nature matters.
- source_word: הָיִיתָ
  chosen: you were
  alternatives:
  - you became
  lexicon: HALOT
  rationale: Simple past of היה in this clause is best rendered 'you were.'
- source_word: בְּמִצְרַיִם
  chosen: in Egypt
  alternatives:
  - in the land of Egypt
  lexicon: HALOT
  rationale: The prepositional phrase is straightforward; 'in Egypt' is sufficient
    here since 'land' is not explicit.
- source_word: וְשָׁמַרְתָּ
  chosen: keep
  alternatives:
  - observe
  - guard
  lexicon: HALOT
  rationale: In legal/covenantal contexts שׁמר commonly means to keep or observe commandments/statutes.
    'Keep' is concise and idiomatic in English.
- source_word: וְעָשִׂיתָ
  chosen: do
  alternatives:
  - carry out
  - practice
  lexicon: HALOT
  rationale: Paired with שׁמר, this verb emphasizes actual performance. 'Do' preserves
    the familiar Hebrew legal collocation 'keep and do' without over-interpretation.
- source_word: הַחֻקִּים
  chosen: statutes
  alternatives:
  - decrees
  - ordinances
  lexicon: HALOT
  rationale: חֻקִּים refers to prescribed enactments. 'Statutes' is a standard and
    suitably precise rendering in legal material.
- source_word: הָאֵלֶּה
  chosen: these
  alternatives:
  - these here
  lexicon: HALOT
  rationale: Simple demonstrative modifying 'statutes'; 'these' is direct and natural.
