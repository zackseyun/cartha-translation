id: DEU.16.5
reference: Deuteronomy 16:5
source:
  edition: WLC
  text: לֹ֥א תוּכַ֖ל לִ/זְבֹּ֣חַ אֶת הַ/פָּ֑סַח בְּ/אַחַ֣ד שְׁעָרֶ֔י/ךָ אֲשֶׁר יְהוָ֥ה
    אֱלֹהֶ֖י/ךָ נֹתֵ֥ן לָֽ/ךְ־־׃
translation:
  text: You may not sacrifice the Passover in one of your gates that the LORD your
    God is giving you,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Passover sacrifice.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'gates,' a common metonym for a town or settlement.
    reason: cultural_note
lexical_decisions:
- source_word: לֹא תוּכַל
  chosen: You may not
  alternatives:
  - You cannot
  - You shall not be able to
  lexicon: HALOT
  rationale: The idiom with יכל + infinitive often expresses prohibition in legal
    material, not mere inability. 'You may not' communicates the force naturally in
    English while preserving the second-person singular address.
- source_word: לִזְבֹּחַ
  chosen: sacrifice
  alternatives:
  - slaughter
  - offer as a sacrifice
  lexicon: HALOT
  rationale: זבח in cultic context refers to sacrificial slaughter/offerings. 'Sacrifice'
    is the clearest concise English rendering here, especially with the direct object
    'the Passover.'
- source_word: הַפָּסַח
  chosen: the Passover
  alternatives:
  - the Passover sacrifice
  - the Passover lamb
  lexicon: HALOT
  rationale: פסח can denote the festival, the sacrificial animal, or the Passover
    offering. In this context with 'sacrifice,' 'the Passover' is idiomatic and sufficiently
    precise, while the sacrificial sense is already signaled by the verb. An alternative
    is preserved in a footnote for clarity.
- source_word: בְּאַחַד שְׁעָרֶיךָ
  chosen: in one of your gates
  alternatives:
  - within one of your towns
  - in one of your city gates
  lexicon: HALOT
  rationale: שער often literally means 'gate,' but in Deuteronomy it frequently stands
    metonymically for a town/city as a local settlement unit. The more formal 'gates'
    preserves the Hebrew imagery and Deuteronomic diction; a clarifying alternative
    is footnoted.
- source_word: אֲשֶׁר יְהוָה אֱלֹהֶיךָ נֹתֵן לָךְ
  chosen: that the LORD your God is giving you
  alternatives:
  - which the LORD your God gives you
  - that the LORD your God will give you
  lexicon: HALOT
  rationale: The participle נֹתֵן has an ongoing or characteristic force. 'Is giving
    you' reflects the Hebrew aspect naturally in English and fits Deuteronomy's repeated
    land-gift formula. YHWH is rendered 'the LORD' per doctrine guidance.
