id: DEU.16.18
reference: Deuteronomy 16:18
source:
  edition: WLC
  text: שֹׁפְטִ֣ים וְ/שֹֽׁטְרִ֗ים תִּֽתֶּן לְ/ךָ֙ בְּ/כָל שְׁעָרֶ֔י/ךָ אֲשֶׁ֨ר יְהוָ֧ה
    אֱלֹהֶ֛י/ךָ נֹתֵ֥ן לְ/ךָ֖ לִ/שְׁבָטֶ֑י/ךָ וְ/שָׁפְט֥וּ אֶת הָ/עָ֖ם מִשְׁפַּט צֶֽדֶק־־־־׃
translation:
  text: You shall appoint judges and officers for yourself in all your gates that
    the LORD your God is giving you, according to your tribes, and they shall judge
    the people with righteous judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'within all your towns'; literally 'in all your gates,' referring to
      the gate areas that functioned as civic and judicial centers.
    reason: cultural_note
  - marker: b
    text: Or 'with just judgment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁפְטִים
  chosen: judges
  alternatives:
  - magistrates
  lexicon: HALOT
  rationale: The noun denotes those who render legal decisions. 'Judges' is the standard
    and clearest English equivalent in this legal-administrative context.
- source_word: שֹׁטְרִים
  chosen: officers
  alternatives:
  - officials
  - scribes
  lexicon: HALOT
  rationale: The term refers to administrative officers associated with legal governance.
    'Officers' preserves the institutional sense without over-specifying their exact
    function.
- source_word: תִּתֶּן
  chosen: you shall appoint
  alternatives:
  - you shall set
  - you shall give
  lexicon: HALOT
  rationale: Although the verb is literally 'give/set,' in context it refers to establishing
    persons in office. 'Appoint' communicates the idiomatic force in natural English
    while remaining close to the source sense.
- source_word: בְּכָל שְׁעָרֶיךָ
  chosen: in all your gates
  alternatives:
  - within all your towns
  - at all your gates
  lexicon: HALOT
  rationale: Literally 'in all your gates.' Since city gates functioned as civic-judicial
    centers, the literal image is retained rather than interpreted as 'towns' in the
    main text.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD.'
- source_word: לִשְׁבָטֶיךָ
  chosen: according to your tribes
  alternatives:
  - for your tribes
  - by your tribes
  lexicon: HALOT
  rationale: The phrase most naturally indicates tribal distribution or organization
    of these appointments. 'According to your tribes' expresses that structuring sense
    more clearly than a more wooden rendering.
- source_word: וְשָׁפְטוּ אֶת־הָעָם
  chosen: and they shall judge the people
  alternatives:
  - and they shall govern the people
  lexicon: HALOT
  rationale: The verb here retains its judicial sense. 'Judge the people' fits the
    legal context established by 'judges and officers.'
- source_word: מִשְׁפַּט צֶדֶק
  chosen: with righteous judgment
  alternatives:
  - with just judgment
  - a judgment of righteousness
  lexicon: HALOT
  rationale: The construct phrase combines legal decision with moral rectitude. 'Righteous
    judgment' preserves both the judicial and ethical dimensions; 'with' makes the
    English idiomatic with the preceding verb.
