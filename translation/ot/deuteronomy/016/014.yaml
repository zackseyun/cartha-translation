theological_decisions:
- issue: Rendering socially dependent household terms עֶבֶד / אָמָה
  chosen_reading: male slave / female slave
  alternative_readings:
  - servant / maidservant
  - male servant / female servant
  rationale: In this legal-social list, the text names vulnerable and dependent persons
    included in covenant rejoicing. Rendering with 'slave' preserves the bonded status
    rather than softening it to generic service, in line with the project's stated
    philosophy about such terms.
  doctrine_reference: Translation philosophy §1; Contested terms table on δοῦλος by
    analogy of bonded-status rendering
- issue: Rendering גֵּר
  chosen_reading: sojourner
  alternative_readings:
  - foreigner
  - resident alien
  rationale: The verse emphasizes inclusion of the non-native resident among the covenant
    community's celebrants. 'Sojourner' preserves this legal-social identity without
    importing modern immigration categories.
