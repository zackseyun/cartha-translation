id: DEU.16.14
reference: Deuteronomy 16:14
source:
  edition: WLC
  text: וְ/שָׂמַחְתָּ֖ בְּ/חַגֶּ֑/ךָ אַתָּ֨ה וּ/בִנְ/ךָ֤ וּ/בִתֶּ֨/ךָ֙ וְ/עַבְדְּ/ךָ֣
    וַ/אֲמָתֶ֔/ךָ וְ/הַ/לֵּוִ֗י וְ/הַ/גֵּ֛ר וְ/הַ/יָּת֥וֹם וְ/הָ/אַלְמָנָ֖ה אֲשֶׁ֥ר
    בִּ/שְׁעָרֶֽי/ךָ׃
translation:
  text: And you shall rejoice in your feast—you and your son and your daughter, and
    your male slave and your female slave, and the Levite, and the sojourner, and
    the fatherless, and the widow, who are within your gates.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “at your festival.” The Hebrew חַג can denote a festival celebration
      or feast.
    reason: lexical_alternative
  - marker: b
    text: “The sojourner” refers to a non-Israelite resident living among Israel;
      alternatively, “the resident alien.”
    reason: lexical_alternative
  - marker: c
    text: Or “the orphan.” Hebrew “fatherless” highlights the vulnerable social status
      addressed in Torah law.
    reason: lexical_alternative
  - marker: d
    text: Hebrew “within your gates” is an idiom for those living within your towns
      or community.
    reason: cultural_note
lexical_decisions:
- source_word: וְשָׂמַחְתָּ
  chosen: And you shall rejoice
  alternatives:
  - And you must rejoice
  - And rejoice
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in legal/instructional context
    functions imperativally/futurally. 'You shall rejoice' preserves the covenantal
    command tone in idiomatic English.
- source_word: בְּחַגֶּךָ
  chosen: in your feast
  alternatives:
  - at your festival
  - during your feast
  lexicon: HALOT
  rationale: חַג denotes a pilgrimage festival/feast. 'Feast' keeps the celebratory
    cultic sense and fits the immediate context of festival observance; 'in' is natural
    for participation in the celebration.
- source_word: אַתָּה
  chosen: you
  alternatives:
  - you yourself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis after the verb. English can convey
    this adequately by placing 'you' first in the list after the dash without an overly
    heavy reflexive.
- source_word: וּבִנְךָ
  chosen: your son
  lexicon: HALOT
  rationale: Straightforward filial term; singular in Hebrew used distributively in
    legal address.
- source_word: וּבִתֶּךָ
  chosen: your daughter
  lexicon: HALOT
  rationale: Straightforward filial term; singular in Hebrew used distributively in
    legal address.
- source_word: וְעַבְדְּךָ
  chosen: your male slave
  alternatives:
  - your servant
  - your male servant
  lexicon: HALOT
  rationale: עֶבֶד can mean servant or slave, but in household-property/social-status
    lists the bonded status is salient. Following the project's philosophy, 'slave'
    better reflects the term here; 'male' distinguishes it from the following feminine
    term.
- source_word: וַאֲמָתֶךָ
  chosen: your female slave
  alternatives:
  - your maidservant
  - your female servant
  lexicon: HALOT
  rationale: אָמָה denotes a female slave/servant. 'Female slave' matches the social
    reality and pairs clearly with 'male slave'.
- source_word: וְהַלֵּוִי
  chosen: the Levite
  lexicon: HALOT
  rationale: Gentilic/title for a member of the tribe with cultic association; standard
    rendering retained.
- source_word: וְהַגֵּר
  chosen: the sojourner
  alternatives:
  - the foreigner
  - the resident alien
  lexicon: HALOT
  rationale: גֵּר refers to a non-native resident living among Israel. 'Sojourner'
    is a readable, established rendering that preserves the legal-social nuance better
    than the broader 'foreigner.'
- source_word: וְהַיָּתוֹם
  chosen: the fatherless
  alternatives:
  - the orphan
  lexicon: HALOT
  rationale: יָתוֹם is often rendered 'orphan,' but 'fatherless' more closely reflects
    the Hebrew social category in Torah law, where vulnerability due to loss of paternal
    protection is foregrounded.
- source_word: וְהָאַלְמָנָה
  chosen: the widow
  lexicon: HALOT
  rationale: Standard rendering of the vulnerable social category.
- source_word: אֲשֶׁר בִּשְׁעָרֶיךָ
  chosen: who are within your gates
  alternatives:
  - who are in your towns
  - who are inside your gates
  lexicon: HALOT
  rationale: שְׁעָרִים literally means 'gates,' often metonymic for the settlement/community
    under one's jurisdiction. 'Within your gates' preserves the Hebrew idiom while
    remaining understandable; plural Hebrew takes plural verb in English relative
    clause.
