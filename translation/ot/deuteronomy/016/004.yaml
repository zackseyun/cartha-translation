id: DEU.16.4
reference: Deuteronomy 16:4
source:
  edition: WLC
  text: וְ/לֹֽא יֵרָאֶ֨ה לְ/ךָ֥ שְׂאֹ֛ר בְּ/כָל גְּבֻלְ/ךָ֖ שִׁבְעַ֣ת יָמִ֑ים וְ/לֹא
    יָלִ֣ין מִן הַ/בָּשָׂ֗ר אֲשֶׁ֨ר תִּזְבַּ֥ח בָּ/עֶ֛רֶב בַּ/יּ֥וֹם הָ/רִאשׁ֖וֹן
    לַ/בֹּֽקֶר־־־־׃
translation:
  text: No leaven is to be seen with you within all your territory for seven days,
    and none of the flesh that you sacrifice in the evening on the first day shall
    remain overnight until morning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'none of the meat.' The Hebrew word is literally 'flesh,' a common sacrificial
      term.
    reason: lexical_alternative
  - marker: b
    text: '''On the first day'' may refer specifically to the Passover sacrifice at
      the festival''s opening, though the Hebrew does not explicitly say ''Passover
      lamb'' here.'
    reason: alternative_reading
lexical_decisions:
- source_word: יֵרָאֶה
  chosen: is to be seen
  alternatives:
  - shall be seen
  - appear
  lexicon: HALOT
  rationale: Niphal of ראה functions passively here. 'Is to be seen' preserves the
    prohibition's force in natural English without over-paraphrasing.
- source_word: שְׂאֹר
  chosen: leaven
  alternatives:
  - yeast
  - sourdough starter
  lexicon: HALOT
  rationale: '''Leaven'' is the standard and contextually precise term for fermented
    agent in Passover law. ''Yeast'' is possible but narrower and more modernizing;
    ''leaven'' better matches the ritual context.'
- source_word: בְּכָל גְּבֻלְךָ
  chosen: within all your territory
  alternatives:
  - in all your borders
  - throughout all your territory
  lexicon: HALOT
  rationale: גְּבוּל can mean border/territory. In English, 'within all your territory'
    communicates the scope idiomatically while preserving the territorial sense.
- source_word: שִׁבְעַת יָמִים
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: HALOT
  rationale: English idiom normally supplies 'for' with duration; this does not add
    meaning beyond the Hebrew temporal phrase.
- source_word: יָלִין
  chosen: shall remain overnight
  alternatives:
  - shall stay all night
  - shall be left until morning
  - shall lodge
  lexicon: HALOT
  rationale: From לין, 'remain overnight' best captures the prohibition against leaving
    sacrificial meat until the next morning. It is clearer than the more literal but
    less idiomatic 'lodge.'
- source_word: מִן הַבָּשָׂר
  chosen: none of the flesh
  alternatives:
  - none of the meat
  - nothing from the flesh
  lexicon: HALOT
  rationale: בָּשָׂר literally means 'flesh,' and in sacrificial contexts can denote
    meat. 'Flesh' preserves the sacrificial register; 'none of the flesh' renders
    the partitive מִן naturally.
- source_word: אֲשֶׁר תִּזְבַּח
  chosen: that you sacrifice
  alternatives:
  - that you slaughter
  - which you offer as a sacrifice
  lexicon: HALOT
  rationale: זבח in cultic context refers to sacrificial slaughter/offer. 'Sacrifice'
    communicates the ritual act clearly in modern English.
- source_word: בָּעֶרֶב
  chosen: in the evening
  alternatives:
  - at evening
  lexicon: HALOT
  rationale: Straightforward temporal rendering; 'in the evening' is idiomatic modern
    English.
- source_word: בַּיּוֹם הָרִאשׁוֹן
  chosen: on the first day
  alternatives:
  - on the first day of the festival
  lexicon: HALOT
  rationale: The Hebrew says simply 'on the first day.' Adding 'of the festival' would
    be interpretive, so the main text stays closer to the source.
- source_word: לַבֹּקֶר
  chosen: until morning
  alternatives:
  - by morning
  - for the morning
  lexicon: HALOT
  rationale: In this prohibition, ל plus בֹּקֶר marks the limit of time. 'Until morning'
    is the clearest English equivalent.
