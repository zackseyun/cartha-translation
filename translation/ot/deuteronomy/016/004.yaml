theological_decisions:
- issue: Referent of 'the flesh' sacrificed on 'the first day'
  chosen_reading: Render generically as sacrificial flesh without specifying 'Passover
    lamb' in the main text.
  alternative_readings:
  - Interpret specifically as the Passover sacrifice/lamb
  - Interpret more broadly as festival sacrifices associated with the opening day
  rationale: The Hebrew text itself says only 'the flesh that you sacrifice in the
    evening on the first day.' Because interpreters debate whether this refers narrowly
    to the Passover animal or more broadly to festival sacrificial meat, the translation
    preserves the wording of the source and does not resolve the question in the main
    text.
  doctrine_reference: Preserve theological tension rather than resolve it.
