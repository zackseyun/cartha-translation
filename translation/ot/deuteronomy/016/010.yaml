id: DEU.16.10
reference: Deuteronomy 16:10
source:
  edition: WLC
  text: וְ/עָשִׂ֜יתָ חַ֤ג שָׁבֻעוֹת֙ לַ/יהוָ֣ה אֱלֹהֶ֔י/ךָ מִסַּ֛ת נִדְבַ֥ת יָדְ/ךָ֖
    אֲשֶׁ֣ר תִּתֵּ֑ן כַּ/אֲשֶׁ֥ר יְבָרֶכְ/ךָ֖ יְהוָ֥ה אֱלֹהֶֽי/ךָ׃
translation:
  text: Then you shall celebrate the Feast of Weeks to the LORD your God with the
    measure of a freewill offering from your hand, which you shall give according
    to how the LORD your God blesses you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the measure of a freewill offering of your hand'; the Hebrew
      expression emphasizes that the gift is voluntary and proportionate to what God
      has provided.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: Then you shall celebrate
  alternatives:
  - And you shall observe
  - And you shall make
  lexicon: HALOT
  rationale: The verb עשה with חג in festival contexts means to observe/celebrate
    a feast, not literally to 'make' it. 'Then' reflects the sequential waw in context
    and reads naturally in English.
- source_word: חַג שָׁבֻעוֹת
  chosen: the Feast of Weeks
  alternatives:
  - the festival of weeks
  - the Feast of Sevens
  lexicon: HALOT
  rationale: This is the established and contextually clear rendering of the pilgrimage
    festival name. 'Weeks' reflects the Hebrew plural and the counting context of
    the feast.
- source_word: לַיהוָה אֱלֹהֶיךָ
  chosen: to the LORD your God
  alternatives:
  - for the LORD your God
  lexicon: HALOT
  rationale: The preposition ל marks dedication/direction toward YHWH. Per doctrine,
    יְהוָה is rendered 'the LORD.' 'To the LORD your God' preserves the covenantal
    orientation of the feast.
- source_word: מִסַּת
  chosen: with the measure of
  alternatives:
  - according to the measure of
  - in proportion to
  lexicon: HALOT
  rationale: The noun denotes sufficiency, measure, or proportion. Here it introduces
    the standard by which the offering is given. 'With the measure of' keeps the concrete
    sense while remaining readable.
- source_word: נִדְבַת יָדְךָ
  chosen: a freewill offering from your hand
  alternatives:
  - the freewill offering of your hand
  - your voluntary offering
  lexicon: HALOT
  rationale: נִדְבָה denotes a voluntary/freewill offering. 'From your hand' preserves
    the Hebrew idiom of personal giving rather than flattening it entirely to 'your.'
- source_word: אֲשֶׁר תִּתֵּן
  chosen: which you shall give
  alternatives:
  - that you give
  lexicon: HALOT
  rationale: A straightforward relative clause referring to the offering. Future/modal
    'shall give' matches the legal-instruction context.
- source_word: כַּאֲשֶׁר יְבָרֶכְךָ
  chosen: according to how ... blesses you
  alternatives:
  - according as ... has blessed you
  - in proportion to how ... blesses you
  lexicon: HALOT
  rationale: The phrase expresses proportion based on divine blessing. Present English
    'blesses' works idiomatically in legal instruction and conveys the ongoing basis
    for the amount given.
- source_word: יְהוָה אֱלֹהֶיךָ
  chosen: the LORD your God
  alternatives: []
  lexicon: HALOT
  rationale: Repeated covenant formula retained consistently; יְהוָה rendered 'the
    LORD' per doctrine.
