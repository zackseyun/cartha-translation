theological_decisions:
- issue: Rendering of צָרַעַת
  chosen_reading: skin disease
  alternative_readings:
  - leprosy
  rationale: The Torah's צָרַעַת covers a broader set of ritual conditions than modern
    leprosy. Using 'skin disease' avoids importing anachronistic medical specificity
    while preserving the legal-ritual context.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition)
- issue: Identification of הַכֹּהֲנִים הַלְוִיִּם
  chosen_reading: the Levitical priests
  alternative_readings:
  - the priests, the Levites
  rationale: The phrase is rendered as a recognized Deuteronomic designation for priests
    belonging to Levi, not as two separate groups. This is a lexical-syntactic decision
    rather than a denominational one.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
