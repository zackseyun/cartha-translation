id: DEU.24.8
reference: Deuteronomy 24:8
source:
  edition: WLC
  text: הִשָּׁ֧מֶר בְּ/נֶֽגַע הַ/צָּרַ֛עַת לִ/שְׁמֹ֥ר מְאֹ֖ד וְ/לַ/עֲשׂ֑וֹת כְּ/כֹל֩
    אֲשֶׁר יוֹר֨וּ אֶתְ/כֶ֜ם הַ/כֹּהֲנִ֧ים הַ/לְוִיִּ֛ם כַּ/אֲשֶׁ֥ר צִוִּיתִ֖/ם תִּשְׁמְר֥וּ
    לַ/עֲשֽׂוֹת־־׃ס
translation:
  text: Be careful concerning an outbreak of skin disease, to observe very carefully
    and to do according to all that the Levitical priests instruct you; as I have
    commanded them, you shall be careful to do.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditionally, 'leprosy.' The Hebrew term refers more broadly to a range
      of skin conditions in the Torah, not specifically to modern Hansen's disease.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשָּׁמֶר
  chosen: Be careful
  alternatives:
  - Take heed
  - Guard yourself
  lexicon: HALOT
  rationale: Niphal imperative of שׁמר functions as a warning/exhortation. 'Be careful'
    is natural modern English and preserves the imperative force without sounding
    archaic.
- source_word: בְּנֶגַע הַצָּרַעַת
  chosen: concerning an outbreak of skin disease
  alternatives:
  - about the plague of leprosy
  - regarding an affliction of skin disease
  lexicon: HALOT
  rationale: נֶגַע is an affliction/outbreak/mark, and צָרַעַת in the Torah refers
    to a range of ritual skin conditions rather than specifically Hansen's disease.
    'Skin disease' avoids the misleading traditional term 'leprosy'; 'outbreak' captures
    נֶגַע idiomatically.
- source_word: לִשְׁמֹר מְאֹד וְלַעֲשׂוֹת
  chosen: to observe very carefully and to do
  alternatives:
  - to be very careful to observe and do
  - to keep diligently and to do
  lexicon: HALOT
  rationale: The infinitives express the content of the warning. Retaining both 'observe'
    and 'do' reflects the Hebrew's emphasis on careful attention followed by action.
- source_word: כְּכֹל אֲשֶׁר יוֹרוּ אֶתְכֶם
  chosen: according to all that ... instruct you
  alternatives:
  - according to everything that ... teach you
  - just as ... direct you in all things
  lexicon: HALOT
  rationale: ירה in Hiphil commonly means 'teach/instruct/direct.' 'Instruct' fits
    priestly legal guidance well and keeps the sense broader than mere information
    transfer.
- source_word: הַכֹּהֲנִים הַלְוִיִּם
  chosen: the Levitical priests
  alternatives:
  - the priests, the Levites
  - the levitical priests
  lexicon: HALOT
  rationale: This construct-like apposition is a standard Deuteronomic expression
    for priests from the tribe of Levi. 'The Levitical priests' is idiomatic English
    and preserves the tribal qualification.
- source_word: כַּאֲשֶׁר צִוִּיתִם
  chosen: as I have commanded them
  alternatives:
  - just as I commanded them
  lexicon: HALOT
  rationale: The 1cs verb with 3mp suffix refers to Moses' prior command to the priests.
    English present perfect is acceptable here to connect prior command with present
    obligation.
- source_word: תִּשְׁמְרוּ לַעֲשׂוֹת
  chosen: you shall be careful to do
  alternatives:
  - you shall carefully do
  - you must be careful to do
  lexicon: HALOT
  rationale: This repeats the שׁמר + לעשות pattern for emphasis. 'You shall be careful
    to do' preserves both the future/imperfect force and the exhortational tone.
