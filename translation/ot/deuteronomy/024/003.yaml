id: DEU.24.3
reference: Deuteronomy 24:3
source:
  edition: WLC
  text: וּ/שְׂנֵאָ/הּ֮ הָ/אִ֣ישׁ הָ/אַחֲרוֹן֒ וְ/כָ֨תַב לָ֜/הּ סֵ֤פֶר כְּרִיתֻת֙ וְ/נָתַ֣ן
    בְּ/יָדָ֔/הּ וְ/שִׁלְּחָ֖/הּ מִ/בֵּית֑/וֹ א֣וֹ כִ֤י יָמוּת֙ הָ/אִ֣ישׁ הָ/אַחֲר֔וֹן
    אֲשֶׁר לְקָחָ֥/הּ ל֖/וֹ לְ/אִשָּֽׁה־׃
translation:
  text: and the latter man hates her, and writes her a certificate of divorce, and
    puts it into her hand, and sends her out of his house, or if the latter man dies,
    who took her to himself as a wife—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'comes to hate her.' The Hebrew perfect can be rendered in a simple
      past-like legal sequence, but the sense is that the latter man develops hostility
      toward her and proceeds to divorce her.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'a book/document of cutting off.' This is a formal written notice
      dissolving the marriage.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'took her to himself as a wife,' that is, 'married her.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׂנֵאָהּ
  chosen: hates her
  alternatives:
  - comes to hate her
  - rejects her
  lexicon: HALOT
  rationale: The verb שׂנא in the qatal with object suffix straightforwardly means
    'hate.' In this legal context some English versions soften it to 'dislikes,' but
    'hates her' best preserves the lexical force while allowing the legal scenario
    to stand without interpretive expansion.
- source_word: הָאִישׁ הָאַחֲרוֹן
  chosen: the latter man
  alternatives:
  - the second man
  - the later husband
  lexicon: HALOT
  rationale: אַחֲרוֹן means 'last/latter.' 'The latter man' closely reflects the Hebrew
    and maintains the legal contrast with the first husband in the surrounding context.
    'Husband' is contextually true but not the noun used here.
- source_word: וְכָתַב לָהּ סֵפֶר כְּרִיתֻת
  chosen: writes her a certificate of divorce
  alternatives:
  - writes for her a scroll/document of cutting off
  - writes her a bill of divorce
  lexicon: HALOT
  rationale: סֵפֶר is a written document; כְּרִיתֻת is the technical term for severance/dissolution.
    'Certificate of divorce' is clear modern legal English and preserves the formal
    sense better than archaic 'bill of divorcement.'
- source_word: וְנָתַן בְּיָדָהּ
  chosen: puts it into her hand
  alternatives:
  - gives it into her hand
  - places it in her hand
  lexicon: HALOT
  rationale: The idiom is literal and procedural. 'Puts it into her hand' preserves
    the concrete legal action while remaining natural English.
- source_word: וְשִׁלְּחָהּ מִבֵּיתוֹ
  chosen: sends her out of his house
  alternatives:
  - dismisses her from his house
  - sends her away from his house
  lexicon: HALOT
  rationale: שׁלח in this divorce context means to send away/release. 'Sends her out
    of his house' keeps the spatial phrase מִבֵּיתוֹ explicit and avoids overtechnical
    wording.
- source_word: אוֹ כִי יָמוּת
  chosen: or if ... dies
  alternatives:
  - or when ... dies
  lexicon: HALOT
  rationale: The construction introduces an alternative condition in the legal case.
    'Or if' fits the casuistic flow of the sentence in English.
- source_word: אֲשֶׁר לְקָחָהּ לוֹ לְאִשָּׁה
  chosen: who took her to himself as a wife
  alternatives:
  - who took her as his wife
  - who married her
  lexicon: HALOT
  rationale: לקח + ל + אשה is the standard idiom for taking a woman in marriage. 'Took
    her to himself as a wife' preserves the Hebrew idiom more transparently than the
    compressed 'married her,' while still reading naturally enough in a legal text.
