theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This preserves reverential convention and aligns with the stated translation
    policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Social-legal category גֵּר
  chosen_reading: sojourner
  alternative_readings:
  - foreigner
  - resident alien
  - stranger
  rationale: The verse concerns provision for vulnerable persons within Israel's community.
    'Sojourner' best preserves the covenantal and legal nuance of a non-native resident
    without reducing the term to a mere outsider.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
