id: DEU.24.19
reference: Deuteronomy 24:19
source:
  edition: WLC
  text: כִּ֣י תִקְצֹר֩ קְצִֽירְ/ךָ֨ בְ/שָׂדֶ֜/ךָ וְ/שָֽׁכַחְתָּ֧ עֹ֣מֶר בַּ/שָּׂדֶ֗ה
    לֹ֤א תָשׁוּב֙ לְ/קַחְתּ֔/וֹ לַ/גֵּ֛ר לַ/יָּת֥וֹם וְ/לָ/אַלְמָנָ֖ה יִהְיֶ֑ה לְמַ֤עַן
    יְבָרֶכְ/ךָ֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ בְּ/כֹ֖ל מַעֲשֵׂ֥ה יָדֶֽי/ךָ׃
translation:
  text: When you reap your harvest in your field and forget a sheaf in the field,
    you shall not go back to take it. It shall be for the sojourner, the fatherless,
    and the widow, so that the LORD your God may bless you in all the work of your
    hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the foreigner,' 'the resident alien,' or 'the stranger' for 'the sojourner.'
      The Hebrew term refers to a non-native resident living among Israel.
    reason: lexical_alternative
  - marker: b
    text: Or 'the orphan' for 'the fatherless.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - If
  lexicon: HALOT
  rationale: Introduces a situational legal case. 'When' fits casuistic law style
    in English better than 'if' while preserving the conditional sense.
- source_word: תִקְצֹר
  chosen: you reap
  alternatives:
  - you harvest
  lexicon: HALOT
  rationale: The verb specifically denotes reaping/cutting grain. 'Reap' preserves
    the agricultural imagery more precisely than the broader 'harvest'.
- source_word: קְצִירְךָ
  chosen: your harvest
  alternatives:
  - your crop
  - your reaping
  lexicon: HALOT
  rationale: Refers to the harvested produce/crop. 'Your harvest' is natural English
    and matches the legal-agricultural context.
- source_word: בְשָׂדֶךָ
  chosen: in your field
  alternatives:
  - on your field
  lexicon: HALOT
  rationale: Standard locative rendering for the agricultural setting.
- source_word: וְשָׁכַחְתָּ
  chosen: and forget
  alternatives:
  - and have forgotten
  lexicon: HALOT
  rationale: Rendered with simple present in English legal style after 'when you reap';
    this communicates the circumstance without awkward tense stacking.
- source_word: עֹמֶר
  chosen: a sheaf
  alternatives:
  - a bundle
  - an omer
  lexicon: HALOT
  rationale: Here the word denotes a bundle/sheaf of cut grain, not the later dry-measure
    sense 'omer.' 'Sheaf' is the most contextually precise rendering.
- source_word: לֹא תָשׁוּב לְקַחְתּוֹ
  chosen: you shall not go back to take it
  alternatives:
  - you must not return to get it
  - do not turn back to take it
  lexicon: HALOT
  rationale: Expresses prohibition in legal style. 'Go back to take it' is clear modern
    English while preserving the motion plus retrieval sense.
- source_word: לַגֵּר
  chosen: the sojourner
  alternatives:
  - the foreigner
  - the resident alien
  - the stranger
  lexicon: HALOT
  rationale: גֵּר denotes a non-native resident living among Israel. 'Sojourner' preserves
    the social-legal nuance better than the more generic 'stranger,' while avoiding
    overly technical phrasing in the main text.
- source_word: לַיָּתוֹם
  chosen: the fatherless
  alternatives:
  - the orphan
  lexicon: HALOT
  rationale: A standard covenantal triad term. 'Fatherless' is slightly more literal
    and preserves the Hebrew social category, though 'orphan' is a viable alternative.
- source_word: וְלָאַלְמָנָה
  chosen: the widow
  lexicon: HALOT
  rationale: Straightforward rendering of the vulnerable social category in the legal
    triad.
- source_word: יִהְיֶה
  chosen: It shall be for
  alternatives:
  - it shall belong to
  - it shall remain for
  lexicon: HALOT
  rationale: Conveys designated provision rather than strict transfer-of-title language;
    fits the gleaning-law context.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  lexicon: HALOT
  rationale: Introduces purpose/result in accessible modern English.
- source_word: יְבָרֶכְךָ
  chosen: may bless you
  alternatives:
  - will bless you
  lexicon: HALOT
  rationale: The yiqtol after לְמַעַן is well represented by 'may bless,' expressing
    intended result without overstating mechanistic certainty.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: בְּכֹל מַעֲשֵׂה יָדֶיךָ
  chosen: in all the work of your hands
  alternatives:
  - in all that your hands do
  - in all your handiwork
  lexicon: HALOT
  rationale: This idiom refers to one's labor and undertakings. 'In all the work of
    your hands' preserves the Hebrew imagery while remaining natural English.
