id: DEU.24.11
reference: Deuteronomy 24:11
source:
  edition: WLC
  text: בַּ/ח֖וּץ תַּעֲמֹ֑ד וְ/הָ/אִ֗ישׁ אֲשֶׁ֤ר אַתָּה֙ נֹשֶׁ֣ה ב֔/וֹ יוֹצִ֥יא אֵלֶ֛י/ךָ
    אֶֽת הַ/עֲב֖וֹט הַ/חֽוּצָ/ה־׃
translation:
  text: You shall stand outside, and the man to whom you are making the loan shall
    bring the pledge out to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the man who is indebted to you shall bring the pledge out to you.'
      The Hebrew expression can emphasize either the creditor's act of lending or
      the debtor's state of indebtedness.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחוּץ
  chosen: outside
  alternatives:
  - outdoors
  lexicon: HALOT
  rationale: The noun with prefixed preposition denotes being outside the house. 'Outside'
    is the most natural modern English rendering and fits the legal setting of not
    entering the debtor's home.
- source_word: תַּעֲמֹד
  chosen: you shall stand
  alternatives:
  - you shall remain standing
  - you shall wait
  lexicon: HALOT
  rationale: עמד literally means 'stand.' In this legal instruction the physical sense
    is primary, though it also implies waiting outside. 'You shall stand' preserves
    the concrete command.
- source_word: וְהָאִישׁ
  chosen: and the man
  alternatives:
  - and the האיש
  - and the person
  lexicon: HALOT
  rationale: איש is grammatically and semantically 'man' here, referring to the male
    debtor in the case law. This follows the gender-accurate principle rather than
    neutralizing to 'person.'
- source_word: אֲשֶׁר אַתָּה נֹשֶׁה בוֹ
  chosen: to whom you are making the loan
  alternatives:
  - whom you are lending to
  - who is indebted to you
  - from whom you are exacting payment
  lexicon: HALOT
  rationale: נשה in this stem can denote lending on credit / being a creditor to someone.
    In context (vv. 10–13) the issue is taking a pledge for a loan, so 'to whom you
    are making the loan' best captures the creditor-debtor relationship without importing
    the harsher sense of dunning for payment.
- source_word: יוֹצִיא
  chosen: shall bring
  alternatives:
  - shall bring out
  - shall take out
  lexicon: HALOT
  rationale: The Hiphil of יצא means 'cause to go out,' hence 'bring out.' Because
    the following הַחוּצָה already supplies 'out,' English can either say 'bring'
    or 'bring out.' Here 'shall bring ... out to you' preserves both elements smoothly.
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The preposition marks direction toward the creditor; 'to you' is the
    straightforward rendering.
- source_word: הָעֲבוֹט
  chosen: the pledge
  alternatives:
  - the security
  - the collateral
  - the item given in pledge
  lexicon: HALOT
  rationale: עבוט refers to an item taken as security for a loan. 'Pledge' is concise,
    idiomatic, and preserves the legal nuance better than the more technical 'collateral'
    in this biblical-law context.
- source_word: הַחוּצָה
  chosen: out
  alternatives:
  - outside
  - outdoors
  lexicon: HALOT
  rationale: The directional form means 'to the outside/outward.' Rendering it as
    'out' avoids awkward repetition with the earlier 'outside' while preserving the
    movement from the house to the creditor.
