theological_decisions:
- issue: Individual liability in capital punishment
  chosen_reading: The verse states that judicial death is to be imposed on the basis
    of one's own sin, not transferred between fathers and sons.
  alternative_readings:
  - A broader statement about all consequences of sin across generations
  rationale: Because the repeated Hophil of מות refers specifically to being put to
    death, the immediate scope is judicial/capital punishment. The wording does articulate
    a principle of individual responsibility, but the translation should not broaden
    it beyond what the verse explicitly states.
  doctrine_reference: Translation philosophy §1, §3, §4
