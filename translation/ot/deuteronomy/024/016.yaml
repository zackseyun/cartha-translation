id: DEU.24.16
reference: Deuteronomy 24:16
source:
  edition: WLC
  text: לֹֽא יוּמְת֤וּ אָבוֹת֙ עַל בָּנִ֔ים וּ/בָנִ֖ים לֹא יוּמְת֣וּ עַל אָב֑וֹת אִ֥יש
    בְּ/חֶטְא֖/וֹ יוּמָֽתוּ־־־־׃ס
translation:
  text: Fathers shall not be put to death for sons, and sons shall not be put to death
    for fathers; each man shall be put to death for his own sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'children' for 'sons'; the Hebrew literally says 'sons' in both clauses.
    reason: lexical_alternative
  - marker: b
    text: Or 'shall die'; the Hebrew more specifically indicates being put to death.
    reason: lexical_alternative
lexical_decisions:
- source_word: יוּמְתוּ / יוּמָתוּ
  chosen: shall be put to death
  alternatives:
  - shall die
  - shall be executed
  lexicon: HALOT
  rationale: The Hophil of מות is causative/passive ('be caused to die'), so 'be put
    to death' best reflects judicial execution rather than mere death. 'Shall die'
    is too ambiguous in English, while 'shall be executed' is slightly more interpretive/legalized
    than the Hebrew requires.
- source_word: אָבוֹת
  chosen: fathers
  alternatives:
  - parents
  lexicon: HALOT
  rationale: The noun specifically means 'fathers,' not the gender-neutral 'parents.'
    This follows the gender-accurate principle and preserves the parallel with 'sons.'
- source_word: בָּנִים
  chosen: sons
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew term here is literally 'sons.' Although the legal principle
    extends more broadly, the text itself uses the masculine familial term, so 'sons'
    preserves the source wording more accurately than 'children.'
- source_word: עַל
  chosen: for
  alternatives:
  - because of
  - on account of
  lexicon: HALOT
  rationale: In this legal context עַל marks the basis or account for punishment.
    'For' is concise, idiomatic, and captures the sense of liability on another person's
    account.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - a man
  - each person
  lexicon: HALOT
  rationale: 'אִישׁ distributively introduces the individual principle: each individual
    is liable for his own offense. ''Each man'' preserves the singular distributive
    force and the masculine form of the Hebrew better than the more generic ''each
    person.'''
- source_word: בְּחֶטְאוֹ
  chosen: for his own sin
  alternatives:
  - in his sin
  - for his sin
  lexicon: HALOT
  rationale: חטא denotes sin/offense, and the prefixed ב in this judicial setting
    is best represented by 'for' or 'on account of.' Adding 'own' makes explicit the
    possessive suffix and sharpens the contrast with vicarious punishment in the first
    two clauses.
