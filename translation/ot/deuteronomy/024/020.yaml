id: DEU.24.20
reference: Deuteronomy 24:20
source:
  edition: WLC
  text: כִּ֤י תַחְבֹּט֙ זֵֽיתְ/ךָ֔ לֹ֥א תְפָאֵ֖ר אַחֲרֶ֑י/ךָ לַ/גֵּ֛ר לַ/יָּת֥וֹם
    וְ/לָ/אַלְמָנָ֖ה יִהְיֶֽה׃ס
translation:
  text: When you beat your olive tree, you shall not go over the branches after yourself;
    it shall be for the sojourner, for the fatherless, and for the widow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you shall not strip what remains after you,' that is, you must not
      make a second pass to remove the olives left after the first beating.
    reason: lexical_alternative
  - marker: b
    text: '''Sojourner'' renders גֵּר, a non-native resident living among Israel;
      alternatives include ''foreigner'' or ''resident alien.'''
    reason: cultural_note
  - marker: c
    text: Or 'orphan' for 'fatherless.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - If
  lexicon: HALOT
  rationale: In this legal context, כִּי introduces a situational clause best rendered
    temporally as 'When,' matching the casuistic force of the law rather than a mere
    conditional.
- source_word: תַחְבֹּט
  chosen: you beat
  alternatives:
  - you strike
  - you knock down
  lexicon: HALOT
  rationale: The verb חבט refers to beating or striking olive branches to dislodge
    fruit. 'Beat' is the most natural and concrete English equivalent in this agricultural
    setting.
- source_word: זֵיתְךָ
  chosen: your olive tree
  alternatives:
  - your olive
  - your olives
  lexicon: HALOT
  rationale: Although זַיִת can denote olive or olive tree, the action of beating
    points specifically to the tree. Singular with 2ms suffix is preserved.
- source_word: לֹא תְפָאֵר אַחֲרֶיךָ
  chosen: you shall not go over the branches after yourself
  alternatives:
  - you shall not strip what remains after you
  - you shall not glean after yourself
  - you shall not beat it again
  lexicon: HALOT
  rationale: The piel of פאר here is an idiom in harvest law meaning not to go back
    over what remains after the first pass. 'Go over the branches after yourself'
    makes the agricultural image explicit while preserving the prohibition against
    a second pass. Alternatives such as 'glean' are possible but less precise for
    olive harvesting.
- source_word: לַגֵּר
  chosen: for the sojourner
  alternatives:
  - for the foreigner
  - for the resident alien
  lexicon: HALOT
  rationale: גֵּר denotes a non-native resident living among Israel. 'Sojourner' preserves
    the covenantal-legal nuance without reducing it merely to ethnicity.
- source_word: לַיָּתוֹם
  chosen: for the fatherless
  alternatives:
  - for the orphan
  lexicon: HALOT
  rationale: יָתוֹם is traditionally 'fatherless' in legal texts, highlighting social
    vulnerability in the household structure. 'Orphan' is acceptable but slightly
    less specific.
- source_word: וְלָאַלְמָנָה
  chosen: for the widow
  lexicon: HALOT
  rationale: Standard rendering of אַלְמָנָה in covenantal care laws.
- source_word: יִהְיֶה
  chosen: it shall be
  alternatives:
  - it will belong
  lexicon: HALOT
  rationale: 'The simple verb ''be'' expresses legal assignment: the remaining olives
    are to be left for these vulnerable groups. ''It shall be'' preserves the formal
    legal tone.'
