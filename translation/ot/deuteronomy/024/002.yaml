id: DEU.24.2
reference: Deuteronomy 24:2
source:
  edition: WLC
  text: וְ/יָצְאָ֖ה מִ/בֵּית֑/וֹ וְ/הָלְכָ֖ה וְ/הָיְתָ֥ה לְ/אִישׁ אַחֵֽר־׃
translation:
  text: and she leaves his house and goes and becomes another man's wife,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'to another man.' The Hebrew idiom means that she enters marriage
      with another man.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָצְאָה
  chosen: and she leaves
  alternatives:
  - and she goes out
  - then she shall go out
  lexicon: HALOT
  rationale: Qal wayyiqtol 3fs of יצא, continuing the legal sequence. English present
    in a case-law style ('leaves') keeps the procedural force natural in modern English,
    while preserving the action of departure.
- source_word: מִבֵּיתוֹ
  chosen: his house
  alternatives:
  - from his house
  lexicon: HALOT
  rationale: Literally 'from his house.' In English, 'leaves his house' naturally
    incorporates the preposition without loss of meaning.
- source_word: וְהָלְכָה
  chosen: and goes
  alternatives:
  - and walks away
  - and departs
  lexicon: HALOT
  rationale: הלך here marks the next step in the sequence after leaving. 'Goes' is
    the most natural modern rendering and avoids over-specifying manner.
- source_word: וְהָיְתָה
  chosen: and becomes
  alternatives:
  - and is
  - and belongs to
  lexicon: HALOT
  rationale: היה with ל often indicates entering a state or relation. 'Becomes' best
    conveys transition into a new marital status in context.
- source_word: לְאִישׁ אַחֵר
  chosen: another man's wife
  alternatives:
  - to another man
  - another man's
  lexicon: HALOT
  rationale: Literally 'to another man,' but in this divorce/remarriage context the
    idiom denotes becoming the wife of another man. Supplying 'wife' makes the relational
    sense explicit in idiomatic English without adding a new concept beyond the context.
