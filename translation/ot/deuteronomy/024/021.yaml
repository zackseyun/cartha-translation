id: DEU.24.21
reference: Deuteronomy 24:21
source:
  edition: WLC
  text: כִּ֤י תִבְצֹר֙ כַּרְמְ/ךָ֔ לֹ֥א תְעוֹלֵ֖ל אַחֲרֶ֑י/ךָ לַ/גֵּ֛ר לַ/יָּת֥וֹם
    וְ/לָ/אַלְמָנָ֖ה יִהְיֶֽה׃
translation:
  text: When you harvest the grapes of your vineyard, you shall not go over it again
    after yourself; it shall be for the sojourner, the fatherless, and the widow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you shall not glean it afterward' or 'you shall not pick over it again.'
      The Hebrew verb refers to making a second pass to collect what remains.
    reason: lexical_alternative
  - marker: b
    text: '''Sojourner'' refers to a non-native resident living among Israel; alternatively,
      ''resident alien.'''
    reason: cultural_note
  - marker: c
    text: Or 'orphan.' The Hebrew term is literally 'fatherless' in many contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - If
  lexicon: HALOT
  rationale: Here כִּי introduces a situational clause in casuistic law. 'When' fits
    the legal instruction better than a more conditional 'if,' while preserving the
    expected circumstance sense.
- source_word: תִבְצֹר
  chosen: harvest the grapes
  alternatives:
  - gather grapes
  - vintage
  lexicon: HALOT
  rationale: בצר refers specifically to gathering grapes from a vineyard. 'Harvest
    the grapes' makes the object implicit in the verb explicit in natural English
    without exceeding the Hebrew sense.
- source_word: כַּרְמְךָ
  chosen: your vineyard
  alternatives:
  - your vine-garden
  lexicon: HALOT
  rationale: Standard rendering for כֶּרֶם. 'Vineyard' is the natural English equivalent.
- source_word: לֹא תְעוֹלֵל
  chosen: you shall not go over it again
  alternatives:
  - you shall not glean it afterward
  - you shall not strip it bare
  - you shall not pick over it again
  lexicon: HALOT
  rationale: The verb עולל in this agricultural context means to glean or strip what
    remains after the first pass. 'Go over it again' communicates the prohibition
    clearly in modern English while preserving the sense of a second pass. Because
    'glean' can sound as though the owner is doing what the poor normally do, the
    fuller phrase avoids confusion.
- source_word: אַחֲרֶיךָ
  chosen: after yourself
  alternatives:
  - afterward
  - behind you
  lexicon: HALOT
  rationale: Literally 'after you/behind you.' 'After yourself' preserves the reflexive
    sense that the owner must not make a second pass after his own harvesting.
- source_word: לַגֵּר
  chosen: for the sojourner
  alternatives:
  - for the foreigner
  - for the resident alien
  lexicon: HALOT
  rationale: גֵּר denotes a non-native resident living among Israel. 'Sojourner' is
    a concise traditional rendering that preserves the social-legal nuance better
    than the broader 'foreigner.'
- source_word: לַיָּתוֹם
  chosen: the fatherless
  alternatives:
  - the orphan
  lexicon: HALOT
  rationale: יָתוֹם is conventionally 'fatherless' or 'orphan.' 'Fatherless' preserves
    the covenant-law idiom and matches the recurring triad with widow and sojourner.
- source_word: וְלָאַלְמָנָה
  chosen: the widow
  lexicon: HALOT
  rationale: אַלְמָנָה straightforwardly means 'widow.'
- source_word: יִהְיֶה
  chosen: it shall be
  alternatives:
  - it will belong
  lexicon: HALOT
  rationale: 'Simple existential-possession sense in legal formulation: the remaining
    produce is to be left for these vulnerable groups. ''It shall be'' is faithful
    and idiomatic.'
