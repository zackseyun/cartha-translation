id: DEU.24.6
reference: Deuteronomy 24:6
source:
  edition: WLC
  text: לֹא יַחֲבֹ֥ל רֵחַ֖יִם וָ/רָ֑כֶב כִּי נֶ֖פֶשׁ ה֥וּא חֹבֵֽל־־׃ס
translation:
  text: No one shall take a pair of millstones, or even the upper millstone, as a
    pledge, for he would be taking a life as a pledge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for he would be taking a person's livelihood as a pledge.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחֲבֹל / חֹבֵל
  chosen: take ... as a pledge / taking ... as a pledge
  alternatives:
  - seize as collateral
  - take in pledge
  lexicon: HALOT
  rationale: The verb חבל in this legal context refers to taking an item as security
    for a debt. 'Take as a pledge' is clear modern legal-English and preserves the
    repeated wordplay with the participle at the end of the verse.
- source_word: רֵחַיִם
  chosen: a pair of millstones
  alternatives:
  - millstones
  - a handmill
  lexicon: HALOT
  rationale: The dual form naturally refers to the millstones as a pair. 'A pair of
    millstones' makes the sense explicit in English.
- source_word: וָרָכֶב
  chosen: or even the upper millstone
  alternatives:
  - and the upper millstone
  - or the rider stone
  lexicon: HALOT
  rationale: 'רָכֶב here denotes the upper millstone. The conjunction is rendered
    ''or even'' to reflect the legal force: not the whole mill apparatus, nor even
    one essential part of it.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the rationale for the prohibition; 'for' is concise and natural
    in English legal style.
- source_word: נֶפֶשׁ
  chosen: a life
  alternatives:
  - a person's livelihood
  - a soul
  lexicon: HALOT
  rationale: נֶפֶשׁ here is not a metaphysical 'soul' but the person's life in the
    concrete sense of life-sustaining existence. Since millstones are necessary for
    preparing daily food, the law treats taking them as endangering life itself. 'A
    life' preserves the force while remaining idiomatic.
- source_word: הוּא
  chosen: he would be
  alternatives:
  - it is
  - that is what he is
  lexicon: HALOT
  rationale: 'The pronoun refers back to the person taking the pledge. Rendering it
    verbally in English clarifies the clause: the creditor would in effect be taking
    a life as pledge.'
