theological_decisions:
- issue: Meaning of נֶפֶשׁ in a legal-social context
  chosen_reading: concrete life/livelihood rather than immaterial soul
  alternative_readings:
  - soul
  - person
  rationale: The verse concerns collateral that would deprive a debtor of the means
    to prepare food. The law's ethical force is that such a pledge threatens the person's
    very life. This is a lexical-contextual decision, not a doctrinal statement about
    anthropology.
