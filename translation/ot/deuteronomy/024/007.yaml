id: DEU.24.7
reference: Deuteronomy 24:7
source:
  edition: WLC
  text: כִּי יִמָּצֵ֣א אִ֗ישׁ גֹּנֵ֨ב נֶ֤פֶשׁ מֵ/אֶחָי/ו֙ מִ/בְּנֵ֣י יִשְׂרָאֵ֔ל וְ/הִתְעַמֶּר
    בּ֖/וֹ וּ/מְכָר֑/וֹ וּ/מֵת֙ הַ/גַּנָּ֣ב הַ/ה֔וּא וּ/בִֽעַרְתָּ֥ הָ/רָ֖ע מִ/קִּרְבֶּֽ/ךָ־־׃
translation:
  text: If a man is found kidnapping one of his brothers from the sons of Israel,
    and he treats him as a slave and sells him, then that kidnapper shall die. So
    you shall purge the evil from your midst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'kidnapping a person'; literally 'stealing a soul/person.'
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' here refers to fellow members of Israel, not only biological
      siblings.'
    reason: cultural_note
  - marker: c
    text: Or 'he enslaves him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִמָּצֵא
  chosen: is found
  alternatives:
  - is discovered
  lexicon: HALOT
  rationale: Niphal of מצא commonly has the passive sense 'be found' or 'be discovered.'
    'Is found' preserves the legal-register conditional formulation.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: The Hebrew is singular masculine. In legal material it often functions
    generically, but per gender-accurate policy 'a man' best matches the source form
    and legal style.
- source_word: גֹּנֵב נֶפֶשׁ
  chosen: kidnapping
  alternatives:
  - stealing a person
  - man-stealing
  lexicon: HALOT
  rationale: Literally 'stealing a soul/person.' In this legal context the idiom refers
    to abducting a human being. 'Kidnapping' is the clearest modern legal equivalent
    without losing force.
- source_word: נֶפֶשׁ
  chosen: one
  alternatives:
  - person
  - life
  - soul
  lexicon: HALOT
  rationale: While נֶפֶשׁ often means 'soul' or 'life,' here in the idiom גנב נפש
    it denotes a person. English idiom works best by absorbing the sense into 'kidnapping
    one of his brothers' rather than woodenly saying 'stealing a soul.'
- source_word: מֵאֶחָיו
  chosen: one of his brothers
  alternatives:
  - one of his kinsmen
  - one of his fellow Israelites
  lexicon: HALOT
  rationale: אָח can mean literal brother or fellow member of the covenant people.
    Because the following phrase specifies 'from the sons of Israel,' 'one of his
    brothers' preserves the familial covenantal language while the next phrase clarifies
    the national scope.
- source_word: מִבְּנֵי יִשְׂרָאֵל
  chosen: from the sons of Israel
  alternatives:
  - from the Israelites
  - from the people of Israel
  lexicon: HALOT
  rationale: This phrase identifies the victim as belonging to Israel. 'From the sons
    of Israel' is more formally close to the Hebrew and preserves the covenantal expression,
    while remaining understandable in context.
- source_word: וְהִתְעַמֶּר בּוֹ
  chosen: he treats him as a slave
  alternatives:
  - he enslaves him
  - he makes merchandise of him
  - he deals tyrannically with him
  lexicon: HALOT
  rationale: The Hitpael of עמר here conveys dealing with the abducted person as property
    or as a slave. 'Treats him as a slave' preserves the exploitative force and fits
    the sequence before sale.
- source_word: וּמְכָרוֹ
  chosen: and sells him
  alternatives:
  - and sells that person
  lexicon: HALOT
  rationale: Straightforward rendering of מכר with object suffix. The sale is part
    of the kidnapping offense and should remain explicit.
- source_word: וּמֵת הַגַּנָּב הַהוּא
  chosen: then that kidnapper shall die
  alternatives:
  - then that thief shall die
  - then that man-stealer shall die
  lexicon: HALOT
  rationale: The Hebrew literally says 'and that thief shall die,' referring back
    to the person-stealer. Rendering as 'that kidnapper' makes the legal referent
    explicit in natural English and avoids ambiguity with ordinary theft.
- source_word: וּבִעַרְתָּ הָרָע מִקִּרְבֶּךָ
  chosen: So you shall purge the evil from your midst
  alternatives:
  - you shall remove the evil from among you
  - you shall burn out the evil from your midst
  lexicon: HALOT
  rationale: This is a recurring Deuteronomic legal formula. 'Purge the evil from
    your midst' is established, accurate, and preserves the covenant-judicial force
    of בער in this idiom.
