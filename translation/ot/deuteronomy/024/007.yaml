theological_decisions:
- issue: Rendering of covenantal kinship language in a legal text
  chosen_reading: Retain 'brothers' in the main text while clarifying national identity
    with 'from the sons of Israel.'
  alternative_readings:
  - fellow Israelites
  - kinsmen
  rationale: The verse uses familial language for fellow members of Israel. Keeping
    'brothers' preserves the source's covenantal rhetoric and aligns with the project's
    gender-accurate policy, while the following phrase prevents misunderstanding as
    only literal siblings.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering of enslavement language
  chosen_reading: Use 'treats him as a slave' rather than a softer term.
  alternative_readings:
  - treats him harshly
  - uses him
  rationale: The offense includes reducing a fellow Israelite to slave-status and
    selling him. The translation should not mute the bonded nature of the act.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1; Contested terms table
    on δοῦλος by analogy of bonded-status clarity
