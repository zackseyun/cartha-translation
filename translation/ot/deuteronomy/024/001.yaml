id: DEU.24.1
reference: Deuteronomy 24:1
source:
  edition: WLC
  text: כִּֽי יִקַּ֥ח אִ֛ישׁ אִשָּׁ֖ה וּ/בְעָלָ֑/הּ וְ/הָיָ֞ה אִם לֹ֧א תִמְצָא חֵ֣ן
    בְּ/עֵינָ֗י/ו כִּי מָ֤צָא בָ/הּ֙ עֶרְוַ֣ת דָּבָ֔ר וְ/כָ֨תַב לָ֜/הּ סֵ֤פֶר כְּרִיתֻת֙
    וְ/נָתַ֣ן בְּ/יָדָ֔/הּ וְ/שִׁלְּחָ֖/הּ מִ/בֵּיתֽ/וֹ־־־־׃
translation:
  text: If a man takes a wife and marries her, and it happens that she does not find
    favor in his eyes because he has found in her some indecency, and he writes her
    a certificate of divorce, puts it into her hand, and sends her out of his house,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a matter of indecency' or 'something shameful.' The Hebrew phrase is
      deliberately ambiguous and has been interpreted in more than one way.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: If
  alternatives:
  - When
  - Suppose
  lexicon: HALOT
  rationale: Here כִּי introduces a casuistic legal scenario rather than a simple
    causal clause. 'If' best signals the protasis of the law in natural English.
- source_word: יִקַּח אִישׁ אִשָּׁה
  chosen: a man takes a wife
  alternatives:
  - a man marries a woman
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'take a wife.' Retaining 'takes a wife'
    preserves the source idiom while remaining understandable in English legal style.
- source_word: וּבְעָלָהּ
  chosen: and marries her
  alternatives:
  - and becomes her husband
  - and possesses her
  lexicon: HALOT
  rationale: From בעל in the Qal, the sense is entering the marital relation as husband.
    'Marries her' is idiomatic modern English and avoids the misleading connotations
    of 'possesses her.'
- source_word: וְהָיָה
  chosen: and it happens
  alternatives:
  - and it shall be
  - and it comes about
  lexicon: HALOT
  rationale: This formula advances the legal case conditionally. 'And it happens'
    preserves the Hebrew discourse function in readable English.
- source_word: לֹא תִמְצָא חֵן בְּעֵינָיו
  chosen: she does not find favor in his eyes
  alternatives:
  - she is not pleasing to him
  - she finds no favor with him
  lexicon: HALOT
  rationale: The idiom literally involves finding favor in someone's eyes. This rendering
    stays close to the Hebrew while remaining clear.
- source_word: כִּי מָצָא בָהּ
  chosen: because he has found in her
  alternatives:
  - for he finds in her
  - since he has found in her
  lexicon: HALOT
  rationale: The clause gives the stated grounds within the legal scenario. 'Because'
    best expresses the explanatory force here.
- source_word: עֶרְוַת דָּבָר
  chosen: some indecency
  alternatives:
  - a matter of indecency
  - something shameful
  - nakedness of a thing
  lexicon: HALOT
  rationale: This difficult phrase is intentionally somewhat indefinite. 'Some indecency'
    preserves that ambiguity better than an overly specific rendering, while avoiding
    a wooden literalism that would obscure meaning.
- source_word: וְכָתַב לָהּ סֵפֶר כְּרִיתֻת
  chosen: and he writes her a certificate of divorce
  alternatives:
  - and he writes for her a scroll of cutting off
  - and he writes her a bill of divorce
  lexicon: HALOT
  rationale: סֵפֶר כְּרִיתֻת is a formal legal document dissolving the marriage. 'Certificate
    of divorce' is clear modern legal English and reflects the function of the phrase.
- source_word: וְנָתַן בְּיָדָהּ
  chosen: puts it into her hand
  alternatives:
  - gives it into her hand
  - places it in her hand
  lexicon: HALOT
  rationale: The Hebrew is concrete and procedural. 'Puts it into her hand' preserves
    the physical legal act.
- source_word: וְשִׁלְּחָהּ מִבֵּיתוֹ
  chosen: and sends her out of his house
  alternatives:
  - and sends her away from his house
  - and dismisses her from his house
  lexicon: HALOT
  rationale: The verb means to send away/release. 'Sends her out of his house' keeps
    the spatial and legal force of the Hebrew.
