theological_decisions:
- issue: Whether the verse should be rendered as a command endorsing divorce or as
    the opening condition of a case law
  chosen_reading: Rendered as a conditional legal scenario, not as an imperative approving
    divorce
  alternative_readings:
  - A looser reading could sound like a prescription to divorce under certain conditions
  rationale: 'The syntax of Deut 24:1–4 is casuistic: verse 1 begins the protasis
    that continues through subsequent verses, with the legal prohibition/resolution
    arriving later. The translation therefore avoids implying that Moses is commanding
    divorce here.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
