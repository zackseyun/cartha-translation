id: DEU.24.15
reference: Deuteronomy 24:15
source:
  edition: WLC
  text: בְּ/יוֹמ/וֹ֩ תִתֵּ֨ן שְׂכָר֜/וֹ וְֽ/לֹא תָב֧וֹא עָלָ֣י/ו הַ/שֶּׁ֗מֶשׁ כִּ֤י עָנִי֙ ה֔וּא וְ/אֵלָ֕י/ו ה֥וּא נֹשֵׂ֖א אֶת נַפְשׁ֑/וֹ וְ/לֹֽא יִקְרָ֤א עָלֶ֨י/ךָ֙ אֶל יְהוָ֔ה וְ/הָיָ֥ה בְ/ךָ֖ חֵֽטְא־־־־׃ס
translation:
  text: You shall give him his wages on the same day, and the sun shall not go down on it, because he is poor and depends on it, lest he cry out against you to Yahweh, and there be sin in you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'depends on it for his life.' The Hebrew literally says 'to it he lifts/carries his life,' an idiom expressing urgent dependence on the wage.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיוֹמוֹ
  chosen: on his day
  alternatives:
  - the same day
  - that day
  lexicon: HALOT
  rationale: Literally 'in/on his day.' 'On his day' preserves the Hebrew idiom and the immediacy of same-day payment without over-paraphrasing.
- source_word: תִתֵּן
  chosen: You shall give
  alternatives:
  - you must give
  lexicon: HALOT
  rationale: Imperfect in legal instruction is well rendered as an imperative-like future, matching English legal style in Deuteronomy.
- source_word: שְׂכָרוֹ
  chosen: his wages
  alternatives:
  - his pay
  - his hire
  lexicon: HALOT
  rationale: Refers to earned compensation. 'Wages' is clear modern English and fits labor context better than the archaic 'hire.'
- source_word: וְלֹא תָבוֹא עָלָיו הַשֶּׁמֶשׁ
  chosen: and the sun shall not go down on it
  alternatives:
  - and the sun shall not set on it
  - do not let the sun go down on it
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of the sun coming upon it, meaning sunset before payment is made. 'Go down on it' is natural English while preserving the temporal boundary. The pronoun most naturally refers to the wages due.
- source_word: כִּי עָנִי הוּא
  chosen: because he is poor
  alternatives:
  - for he is needy
  - for he is afflicted
  lexicon: HALOT
  rationale: עָנִי here denotes economic vulnerability. 'Poor' is the most direct and idiomatic rendering in this labor-law context.
- source_word: וְאֵלָיו הוּא נֹשֵׂא אֶת נַפְשׁוֹ
  chosen: and sets his life on it
  alternatives:
  - and depends on it for his life
  - and lifts his soul toward it
  - and risks his life for it
  lexicon: HALOT
  rationale: 'This idiom expresses intense dependence: his life is bound up with receiving the wage. ''Sets his life on it'' preserves the metaphor more closely than a fully interpretive paraphrase, while remaining intelligible.'
- source_word: וְלֹא יִקְרָא עָלֶיךָ אֶל יְהוָה
  chosen: so that he does not cry out against you to the LORD
  alternatives:
  - lest he cry out against you to the LORD
  - and he not call out against you to the LORD
  lexicon: HALOT
  rationale: The clause gives the consequence to be avoided. 'Cry out against you' captures the legal-moral appeal to God by an oppressed worker. יְהוָה follows the doctrinal default 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְהָיָה בְךָ חֵטְא
  chosen: and it becomes sin in you
  alternatives:
  - and you incur guilt
  - and it is sin for you
  - and there is sin on you
  lexicon: HALOT
  rationale: The Hebrew states that sin comes to be 'in/for' the offender. 'It becomes sin in you' preserves the wording and moral force without importing a more technical doctrine of guilt than the text itself states.
