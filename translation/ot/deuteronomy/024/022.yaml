id: DEU.24.22
reference: Deuteronomy 24:22
source:
  edition: WLC
  text: וְ/זָ֣כַרְתָּ֔ כִּי עֶ֥בֶד הָיִ֖יתָ בְּ/אֶ֣רֶץ מִצְרָ֑יִם עַל כֵּ֞ן אָנֹכִ֤י
    מְצַוְּ/ךָ֙ לַ/עֲשׂ֔וֹת אֶת הַ/דָּבָ֖ר הַ/זֶּֽה־־־׃ס
translation:
  text: And remember that you were a slave in the land of Egypt; therefore I am commanding
    you to do this thing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this matter' or 'this command.' Hebrew 'this thing' refers to the preceding
      instruction about leaving produce for the vulnerable.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזָכַרְתָּ
  chosen: And remember
  alternatives:
  - And you shall remember
  - So remember
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this legal context functions
    imperativally/exhortationally. 'Remember' gives natural English while preserving
    the command force; 'And' retains the connective to the preceding law.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Introduces the content of what is to be remembered rather than a causal
    clause in English style, so 'that' is the clearest rendering.
- source_word: עֶבֶד
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: HALOT
  rationale: The term denotes bonded status, and in the Egypt context Israel's condition
    was one of slavery, not ordinary service. This aligns with the project's preference
    to use 'slave' where the bonded nature is salient.
- source_word: הָיִיתָ
  chosen: you were
  alternatives:
  - you became
  lexicon: HALOT
  rationale: Simple past of היה in predicative construction with עבד; 'you were' is
    the straightforward sense.
- source_word: בְּאֶרֶץ מִצְרַיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: Retains the concrete Hebrew phrase 'land of Egypt' rather than compressing
    it, preserving the formal cadence of the motivation clause.
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - for that reason
  - so
  lexicon: HALOT
  rationale: This idiom marks inference from Israel's past slavery to the present
    command. 'Therefore' preserves the legal-logical connection succinctly.
- source_word: אָנֹכִי
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis, but standard English can convey
    this adequately without overtranslation. The emphasis is sufficiently carried
    by the clause structure.
- source_word: מְצַוְּךָ
  chosen: am commanding you
  alternatives:
  - command you
  - am commanding you now
  lexicon: HALOT
  rationale: The participle gives present/imperfective force in direct speech. 'Am
    commanding you' reflects the ongoing authoritative command better than a simple
    present.
- source_word: לַעֲשׂוֹת
  chosen: to do
  alternatives:
  - to observe
  - to carry out
  lexicon: HALOT
  rationale: עשה is broad and basic here; 'to do' is the most direct equivalent and
    avoids importing a more specialized nuance.
- source_word: אֶת־הַדָּבָר הַזֶּה
  chosen: this thing
  alternatives:
  - this command
  - this matter
  lexicon: HALOT
  rationale: דבר here refers back to the immediately preceding instruction as a matter/requirement.
    'This thing' is formally close to the Hebrew and avoids narrowing it to 'command'
    where the Hebrew uses the broader noun.
