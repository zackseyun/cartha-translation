id: DEU.24.5
reference: Deuteronomy 24:5
source:
  edition: WLC
  text: כִּֽי יִקַּ֥ח אִישׁ֙ אִשָּׁ֣ה חֲדָשָׁ֔ה לֹ֤א יֵצֵא֙ בַּ/צָּבָ֔א וְ/לֹא יַעֲבֹ֥ר
    עָלָ֖י/ו לְ/כָל דָּבָ֑ר נָקִ֞י יִהְיֶ֤ה לְ/בֵית/וֹ֙ שָׁנָ֣ה אֶחָ֔ת וְ/שִׂמַּ֖ח
    אֶת אִשְׁתּ֥/וֹ אֲשֶׁר לָקָֽח־־־־־׃ס
translation:
  text: When a man takes a new wife, he shall not go out with the army, nor shall
    any duty be imposed on him. He shall be free for his household for one year, and
    he shall make his wife whom he has taken rejoice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he shall not go out to war'; the Hebrew literally says 'go out with
      the army,' which may include broader military service, not only direct combat.
    reason: lexical_alternative
  - marker: b
    text: Or, 'nor shall he be assigned any task' or 'nor shall any obligation be
      laid on him.' The Hebrew is broader than military duty alone.
    reason: alternative_reading
  - marker: c
    text: Or, 'He shall be exempt at home for one year.' The Hebrew phrase may emphasize
      either his freedom for domestic life or his remaining with his household.
    reason: lexical_alternative
  - marker: d
    text: Or, 'and he shall make glad his wife whom he has married.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - If
  - When/if
  lexicon: HALOT
  rationale: Introduces a case law scenario. 'When' fits English legal style and reflects
    the expected circumstance without making it merely hypothetical.
- source_word: יִקַּח אִישׁ אִשָּׁה חֲדָשָׁה
  chosen: a man takes a new wife
  alternatives:
  - a man marries a new wife
  - a man takes a wife newly
  lexicon: HALOT
  rationale: לָקַח with אִשָּׁה is the standard idiom for taking/marrying a wife.
    'Takes a new wife' stays close to the Hebrew while remaining natural. 'New wife'
    reflects חֲדָשָׁה directly, indicating recent marriage rather than a contrast
    with an old wife.
- source_word: לֹא יֵצֵא בַּצָּבָא
  chosen: he shall not go out with the army
  alternatives:
  - he shall not go out to war
  - he shall not serve in the army
  lexicon: HALOT
  rationale: צָבָא can denote military service/army. 'Go out with the army' preserves
    the Hebrew image and avoids over-specifying combat, while clearly conveying military
    mobilization.
- source_word: וְלֹא יַעֲבֹר עָלָיו לְכָל דָּבָר
  chosen: nor shall any duty be imposed on him
  alternatives:
  - nor shall he be charged with any matter
  - nor shall any obligation pass over to him
  - nor shall he be assigned any task
  lexicon: HALOT
  rationale: The idiom עָבַר עַל with לְכָל דָּבָר indicates that no public obligation
    or official duty is to be laid upon him. 'Any duty be imposed on him' communicates
    the legal force in idiomatic English better than a wooden rendering.
- source_word: נָקִי יִהְיֶה
  chosen: He shall be free
  alternatives:
  - He shall be exempt
  - He shall be clear
  lexicon: HALOT
  rationale: נָקִי here carries the sense of being exempt or unencumbered from obligations.
    'Free' is natural English and fits the legal context; the following phrase specifies
    the sphere of that freedom.
- source_word: לְבֵיתוֹ
  chosen: for his household
  alternatives:
  - at home
  - for his house
  lexicon: HALOT
  rationale: בַּיִת often means household/home, not merely the physical structure.
    'For his household' captures the domestic orientation of the exemption better
    than the more locative 'at home'.
- source_word: שָׁנָה אֶחָת
  chosen: for one year
  alternatives:
  - one year
  lexicon: HALOT
  rationale: Straightforward temporal duration; 'for one year' makes the legal duration
    explicit in English.
- source_word: וְשִׂמַּח אֶת אִשְׁתּוֹ
  chosen: and he shall make his wife ... rejoice
  alternatives:
  - and he shall bring joy to his wife
  - and he shall cheer his wife
  - and he shall gladden his wife
  lexicon: HALOT
  rationale: 'The piel of שׂמח is causative: to make glad/rejoice. ''Make his wife
    rejoice'' preserves that causative nuance more clearly than the flatter ''be happy
    with his wife''.'
- source_word: אֲשֶׁר לָקָח
  chosen: whom he has taken
  alternatives:
  - whom he has married
  lexicon: HALOT
  rationale: Retains the lexical link with the earlier לָקַח ('takes'). Though 'married'
    is idiomatic, preserving 'taken' shows the Hebrew repetition and keeps the clause
    tightly connected to the opening condition.
