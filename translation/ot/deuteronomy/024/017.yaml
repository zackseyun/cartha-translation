theological_decisions:
- issue: Rendering the protected social category גֵּר
  chosen_reading: sojourner
  alternative_readings:
  - resident foreigner
  - foreigner
  - stranger
  rationale: The verse concerns legal protection for vulnerable persons within Israel's
    community structure. 'Sojourner' best preserves the covenantal and legal nuance
    of a non-native resident without flattening it to a generic outsider.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
