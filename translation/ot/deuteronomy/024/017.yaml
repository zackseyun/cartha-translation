id: DEU.24.17
reference: Deuteronomy 24:17
source:
  edition: WLC
  text: לֹ֣א תַטֶּ֔ה מִשְׁפַּ֖ט גֵּ֣ר יָת֑וֹם וְ/לֹ֣א תַחֲבֹ֔ל בֶּ֖גֶד אַלְמָנָֽה׃
translation:
  text: You shall not pervert the justice due to a sojourner or an orphan, nor take
    a widow’s garment as a pledge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'resident foreigner' or 'stranger.' The Hebrew term denotes a non-native
      living among Israel under its social and legal protections.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַטֶּה
  chosen: pervert
  alternatives:
  - bend
  - distort
  - turn aside
  lexicon: HALOT
  rationale: The Hiphil of נטה here means to bend or turn aside in a juridical sense.
    'Pervert' is idiomatic modern legal English for corrupting justice and fits the
    collocation with מִשְׁפָּט.
- source_word: מִשְׁפַּט
  chosen: the justice due to
  alternatives:
  - justice
  - judgment
  - legal rights
  lexicon: HALOT
  rationale: מִשְׁפָּט can denote justice, legal decision, or a person's rightful
    claim. In this context, with vulnerable persons as objects, 'the justice due to'
    makes explicit that their rightful legal claim must not be denied.
- source_word: גֵּר
  chosen: sojourner
  alternatives:
  - resident foreigner
  - foreigner
  - stranger
  lexicon: HALOT
  rationale: גֵּר refers not to a passing outsider but to a non-native residing among
    Israel. 'Sojourner' preserves the covenantal-legal category better than the broader
    'foreigner,' while remaining recognizable in English.
- source_word: יָתוֹם
  chosen: orphan
  alternatives:
  - fatherless
  lexicon: HALOT
  rationale: The term denotes a child deprived of paternal protection. 'Orphan' is
    clear modern English; 'fatherless' is more literal but less natural here.
- source_word: תַחֲבֹל
  chosen: take ... as a pledge
  alternatives:
  - seize in pledge
  - take in pawn
  lexicon: HALOT
  rationale: The verb חבל in this legal context means to take an item as security
    for debt. 'Take ... as a pledge' is clear and idiomatic contemporary legal-economic
    English.
- source_word: בֶּגֶד
  chosen: garment
  alternatives:
  - cloak
  - outer garment
  lexicon: HALOT
  rationale: בֶּגֶד is a general term for clothing or garment. 'Garment' is broad
    enough to match the Hebrew without over-specifying the type of clothing.
- source_word: אַלְמָנָה
  chosen: widow’s
  alternatives:
  - of a widow
  lexicon: HALOT
  rationale: The noun denotes a widow. The possessive form in English is natural and
    preserves the legal protection of a socially vulnerable woman.
