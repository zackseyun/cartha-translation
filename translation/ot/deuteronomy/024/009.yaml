id: DEU.24.9
reference: Deuteronomy 24:9
source:
  edition: WLC
  text: זָכ֕וֹר אֵ֧ת אֲשֶׁר עָשָׂ֛ה יְהוָ֥ה אֱלֹהֶ֖י/ךָ לְ/מִרְיָ֑ם בַּ/דֶּ֖רֶךְ בְּ/צֵאתְ/כֶ֥ם מִ/מִּצְרָֽיִם־׃ס
translation:
  text: Remember what Yahweh your God did to Miriam on the way when you were coming out of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what the LORD your God had done to Miriam.'
    reason: lexical_alternative
  - marker: b
    text: That is, during Israel's journey after the exodus; see Numbers 12:1–15.
    reason: cross_reference
lexical_decisions:
- source_word: זָכוֹר
  chosen: Remember
  alternatives:
  - Keep in mind
  - Call to mind
  lexicon: HALOT
  rationale: Qal imperative singular of זכר, a direct command to remember. 'Remember' is the standard, clear imperative and preserves the covenantal force of recollection.
- source_word: אֵת אֲשֶׁר
  chosen: what
  alternatives:
  - that which
  lexicon: HALOT
  rationale: 'The object marker plus relative particle introduces the content remembered: ''what ... did.'' ''What'' is natural English and accurately represents the clause.'
- source_word: עָשָׂה
  chosen: did
  alternatives:
  - had done
  - dealt
  lexicon: HALOT
  rationale: Common verb עשה here refers to the LORD's action toward Miriam. 'Did' is the most straightforward rendering in English with the relative clause.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'Construct form with 2ms suffix: ''your God.'' This is the standard covenantal designation and should be translated, not paraphrased.'
- source_word: לְמִרְיָם
  chosen: to Miriam
  alternatives:
  - against Miriam
  - for Miriam
  lexicon: HALOT
  rationale: The preposition ל with עשה can mark the person affected by the action. In English, 'did to Miriam' best captures the sense of what befell her without over-interpreting the exact nuance.
- source_word: בַּדֶּרֶךְ
  chosen: on the way
  alternatives:
  - along the way
  - on the journey
  lexicon: HALOT
  rationale: Literally 'on the way/road.' In context it refers to Israel's wilderness journey after the exodus. 'On the way' is concise and idiomatic.
- source_word: בְּצֵאתְכֶם
  chosen: when you were coming out
  alternatives:
  - when you came out
  - as you went out
  lexicon: HALOT
  rationale: 'Infinitive construct with preposition and 2mp suffix, temporal in force: ''in/when your coming out.'' ''When you were coming out'' preserves the processive sense while remaining natural English.'
- source_word: מִמִּצְרַיִם
  chosen: of Egypt
  alternatives:
  - from Egypt
  lexicon: HALOT
  rationale: With the preceding verb phrase, standard English is 'coming out of Egypt.' This reflects the source preposition מן naturally in context.
