theological_decisions:
- issue: Meaning of 'after she has been defiled' in the remarriage prohibition
  chosen_reading: Retain the broad term 'defiled' without specifying ritual impurity,
    sexual immorality, or mere second marriage as the sole mechanism.
  alternative_readings:
  - after she has become ceremonially unclean
  - after she has been sexually defiled
  - after she has been rendered ineligible by the intervening marriage
  rationale: The Hebrew uses the passive of טמא but does not explicitly define the
    mode of defilement in this verse. To preserve theological and legal tension, the
    translation keeps the source's broader wording rather than resolving a debated
    interpretation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH → the LORD'
