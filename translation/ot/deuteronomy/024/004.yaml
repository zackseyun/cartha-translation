id: DEU.24.4
reference: Deuteronomy 24:4
source:
  edition: WLC
  text: לֹא יוּכַ֣ל בַּעְלָ֣/הּ הָ/רִאשׁ֣וֹן אֲשֶֽׁר שִׁ֠לְּחָ/הּ לָ/שׁ֨וּב לְ/קַחְתָּ֜/הּ
    לִ/הְי֧וֹת ל֣/וֹ לְ/אִשָּׁ֗ה אַחֲרֵי֙ אֲשֶׁ֣ר הֻטַּמָּ֔אָה כִּֽי תוֹעֵבָ֥ה הִ֖וא
    לִ/פְנֵ֣י יְהוָ֑ה וְ/לֹ֤א תַחֲטִיא֙ אֶת הָ/אָ֔רֶץ אֲשֶׁר֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ
    נֹתֵ֥ן לְ/ךָ֖ נַחֲלָֽה־־־־׃ס
translation:
  text: her first husband, who sent her away, may not take her again to be his wife
    after she has been defiled, for that is an abomination before the LORD; and you
    shall not bring sin upon the land that the LORD your God is giving you as an inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after she has become unclean' or 'after she has been made impure.' The
      Hebrew says 'after she has been defiled,' without specifying the exact nature
      of the defilement.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּעְלָהּ הָרִאשׁוֹן
  chosen: her first husband
  alternatives:
  - her former husband
  - her first master
  lexicon: HALOT
  rationale: בעל in marital context means 'husband.' 'First husband' reflects הָרִאשׁוֹן
    straightforwardly and preserves the legal contrast with a later husband.
- source_word: שִׁלְּחָהּ
  chosen: sent her away
  alternatives:
  - divorced her
  - dismissed her
  lexicon: HALOT
  rationale: The verb שלח literally means 'send away.' In this legal context it refers
    to divorce, but 'sent her away' preserves the Hebrew wording without importing
    more than the text states; the divorce context is already established in the surrounding
    law.
- source_word: לָשׁוּב לְקַחְתָּהּ
  chosen: take her again
  alternatives:
  - take her back
  - return to take her
  lexicon: HALOT
  rationale: 'The infinitive chain expresses resumption: he may not return to take
    her. ''Take her again'' is idiomatic English that preserves the sense of remarriage.'
- source_word: לִהְיוֹת לוֹ לְאִשָּׁה
  chosen: to be his wife
  alternatives:
  - as wife to him
  lexicon: HALOT
  rationale: Standard Hebrew marital idiom; 'to be his wife' is natural and sufficiently
    formal.
- source_word: אַחֲרֵי אֲשֶׁר הֻטַּמָּאָה
  chosen: after she has been defiled
  alternatives:
  - after she has become unclean
  - after she has been made impure
  lexicon: HALOT
  rationale: The passive of טמא denotes becoming defiled/unclean. 'Defiled' best fits
    the legal-moral force here, while leaving open the debated question of whether
    the defilement is ritual, legal, or relational.
- source_word: תוֹעֵבָה
  chosen: an abomination
  alternatives:
  - a detestable thing
  lexicon: HALOT
  rationale: תוֹעֵבָה is a strong covenantal-moral term. 'Abomination' preserves its
    gravity and established biblical force.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the sight of the LORD
  lexicon: HALOT
  rationale: The phrase means 'before/in the presence of.' 'Before the LORD' is concise
    and preserves the covenantal setting. YHWH is rendered 'the LORD' per doctrine.
- source_word: וְלֹא תַחֲטִיא אֶת הָאָרֶץ
  chosen: you shall not bring sin upon the land
  alternatives:
  - you shall not cause the land to sin
  - you shall not pollute the land with sin
  lexicon: HALOT
  rationale: The Hiphil of חטא can mean 'cause to sin' or 'bring guilt upon.' Since
    the land is the object, English idiom favors 'bring sin upon the land,' conveying
    corporate defilement/guilt without awkward personification.
- source_word: נֹתֵן לְךָ נַחֲלָה
  chosen: is giving you as an inheritance
  alternatives:
  - gives you for an inheritance
  - is giving you for a possession
  lexicon: HALOT
  rationale: נחלה is inheritance/heritage. 'As an inheritance' is natural modern English
    and preserves the covenant-land concept.
