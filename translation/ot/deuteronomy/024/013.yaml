id: DEU.24.13
reference: Deuteronomy 24:13
source:
  edition: WLC
  text: הָשֵׁב֩ תָּשִׁ֨יב ל֤/וֹ אֶֽת הַ/עֲבוֹט֙ כְּ/בֹ֣א הַ/שֶּׁ֔מֶשׁ וְ/שָׁכַ֥ב בְּ/שַׂלְמָת֖/וֹ
    וּ/בֵֽרֲכֶ֑/ךָּ וּ/לְ/ךָ֙ תִּהְיֶ֣ה צְדָקָ֔ה לִ/פְנֵ֖י יְהוָ֥ה אֱלֹהֶֽי/ךָ־׃ס
translation:
  text: You must surely return the pledge to him at sunset, so that he may lie down
    in his cloak and bless you; and it will be righteousness for you before the LORD
    your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the collateral' or 'what was taken in pledge.'
    reason: lexical_alternative
  - marker: b
    text: Or 'it will be counted as righteousness for you' or 'it will be a righteous
      deed for you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָשֵׁב תָּשִׁיב
  chosen: You must surely return
  alternatives:
  - you shall surely restore
  - you must indeed give back
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb of שוב intensifies the command.
    'You must surely return' preserves the emphatic force in natural English.
- source_word: הַעֲבוֹט
  chosen: the pledge
  alternatives:
  - the collateral
  - what was taken in pledge
  lexicon: HALOT
  rationale: עֲבוֹט refers to an item taken as security for a loan. 'Pledge' is concise,
    idiomatic, and fits the legal context better than the more technical 'collateral'.
- source_word: כְּבֹא הַשֶּׁמֶשׁ
  chosen: at sunset
  alternatives:
  - when the sun goes in
  - when the sun sets
  lexicon: HALOT
  rationale: Literally 'at the coming of the sun,' an idiom for sunset. 'At sunset'
    is the clearest natural equivalent.
- source_word: וְשָׁכַב
  chosen: so that he may lie down
  alternatives:
  - and he will lie down
  - and he may sleep
  lexicon: HALOT
  rationale: Though formally a waw + qatal, in context it expresses the intended result
    of returning the garment before nightfall. 'So that he may lie down' captures
    the purpose/result relation without overparaphrase.
- source_word: בְּשַׂלְמָתוֹ
  chosen: in his cloak
  alternatives:
  - in his garment
  - in his mantle
  lexicon: HALOT
  rationale: שַׂלְמָה denotes an outer garment or cloak, here used as a covering for
    sleep. 'Cloak' communicates the practical function more clearly than the generic
    'garment'.
- source_word: וּבֵרֲכֶךָּ
  chosen: and bless you
  alternatives:
  - and he will bless you
  lexicon: HALOT
  rationale: The verb ברך with 2ms suffix means the poor man blesses the lender/creditor.
    English coordinate structure after 'so that he may lie down' naturally yields
    'and bless you.'
- source_word: וּלְךָ תִּהְיֶה צְדָקָה
  chosen: and it will be righteousness for you
  alternatives:
  - and it will be counted as righteousness for you
  - and it will be a righteous deed for you
  lexicon: HALOT
  rationale: צְדָקָה here denotes what is regarded as right before God. 'It will be
    righteousness for you' stays close to the Hebrew and preserves possible resonance
    with covenantal/accounting language, without importing later doctrinal formulations.
- source_word: לִפְנֵי יְהוָה אֱלֹהֶיךָ
  chosen: before the LORD your God
  alternatives:
  - in the sight of the LORD your God
  lexicon: HALOT
  rationale: לִפְנֵי is spatial-relational, 'before/in the presence of.' 'Before the
    LORD your God' is a standard, clear rendering. Per doctrine, יְהוָה is rendered
    'the LORD'.
