id: DEU.24.18
reference: Deuteronomy 24:18
source:
  edition: WLC
  text: וְ/זָכַרְתָּ֗ כִּ֣י עֶ֤בֶד הָיִ֨יתָ֙ בְּ/מִצְרַ֔יִם וַֽ/יִּפְדְּ/ךָ֛ יְהוָ֥ה אֱלֹהֶ֖י/ךָ מִ/שָּׁ֑ם עַל כֵּ֞ן אָנֹכִ֤י מְצַוְּ/ךָ֙ לַ/עֲשׂ֔וֹת אֶת הַ/דָּבָ֖ר הַ/זֶּֽה־־׃ס
translation:
  text: And remember that you were a slave in Egypt, and Yahweh your God redeemed you from there; therefore I am commanding you to do this.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְזָכַרְתָּ
  chosen: And remember
  alternatives:
  - So remember
  - But remember
  lexicon: HALOT
  rationale: Qal perfect 2ms with prefixed conjunction functions as an injunction in context, naturally rendered as an imperative in English. 'And' preserves the simple connective without over-interpreting discourse force.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Introduces the content of what Israel is to remember: ''that you were a slave.'' ''Because'' would shift the clause toward causal force, but here the remembered fact itself is foregrounded.'
- source_word: עֶבֶד
  chosen: slave
  alternatives:
  - servant
  - bondman
  lexicon: HALOT
  rationale: In line with the project's philosophy, 'slave' best conveys bonded status and the social reality of Israel's condition in Egypt. 'Servant' would soften the force of the term.
- source_word: בְּמִצְרַיִם
  chosen: in Egypt
  alternatives:
  - in the land of Egypt
  lexicon: HALOT
  rationale: The Hebrew simply says 'in Egypt'; adding 'the land of' is unnecessary here.
- source_word: וַיִּפְדְּךָ
  chosen: redeemed you
  alternatives:
  - ransomed you
  - freed you
  lexicon: HALOT
  rationale: פדה commonly carries the sense of redeeming/ransoming from bondage. 'Redeemed' preserves the covenantal and theological resonance without becoming obscure.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Standard construct with 2ms suffix; rendered directly and naturally.
- source_word: מִשָּׁם
  chosen: from there
  alternatives:
  - from that place
  lexicon: HALOT
  rationale: Simple adverbial expression referring back to Egypt; 'from there' is the most natural equivalent.
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - for this reason
  - so
  lexicon: HALOT
  rationale: Marks the ethical inference from Israel's redemption to obedience. 'Therefore' preserves the formal causal connection.
- source_word: אָנֹכִי מְצַוְּךָ
  chosen: I am commanding you
  alternatives:
  - I command you
  - I am commanding you today
  lexicon: HALOT
  rationale: The participle with explicit pronoun gives a present, emphatic sense. 'I am commanding you' reflects the ongoing directive force better than a simple English present. 'Today' is not in this verse and should not be imported from nearby contexts.
- source_word: לַעֲשׂוֹת
  chosen: to do
  alternatives:
  - to observe
  - to carry out
  lexicon: HALOT
  rationale: עשה is broad and here pairs naturally with 'this thing/matter.' 'Do' is sufficiently literal and idiomatic.
- source_word: אֶת־הַדָּבָר הַזֶּה
  chosen: this thing
  alternatives:
  - this matter
  - this command
  lexicon: HALOT
  rationale: דבר here refers back to the immediately preceding legal instruction. 'This thing' is a straightforward rendering; 'this command' would be interpretive, and 'this matter' is possible but less natural in contemporary English.
