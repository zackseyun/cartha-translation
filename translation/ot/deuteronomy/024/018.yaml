theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering עֶבֶד in Israel's Egyptian condition
  chosen_reading: slave
  alternative_readings:
  - servant
  - bondman
  rationale: The project's translation philosophy prefers 'slave' where bonded status
    is salient. In recalling Israel's oppression in Egypt, the bonded nature is central
    to the verse's ethical motivation.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms analogously
    on bonded-status language
