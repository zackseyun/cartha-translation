theological_decisions:
- issue: Kinship term אַחֶיךָ in covenant law
  chosen_reading: brothers
  alternative_readings:
  - fellow Israelites
  - kinsmen
  rationale: The Hebrew is grammatically masculine and covenantal. Following the gender-accurate
    policy, the translation keeps the kinship term rather than neutralizing it, while
    recognizing that the legal scope is fellow Israelites generally.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering גֵּר
  chosen_reading: sojourners
  alternative_readings:
  - resident foreigners
  - resident aliens
  rationale: The term names a protected resident outsider within Israel's land. 'Sojourner'
    preserves the biblical-social category without narrowing it to ethnicity alone
    or importing modern legal categories.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
