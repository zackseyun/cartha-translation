id: DEU.24.14
reference: Deuteronomy 24:14
source:
  edition: WLC
  text: לֹא תַעֲשֹׁ֥ק שָׂכִ֖יר עָנִ֣י וְ/אֶבְי֑וֹן מֵ/אַחֶ֕י/ךָ א֧וֹ מִ/גֵּרְ/ךָ֛
    אֲשֶׁ֥ר בְּ/אַרְצְ/ךָ֖ בִּ/שְׁעָרֶֽי/ךָ־׃
translation:
  text: You shall not oppress a hired worker who is poor and needy, whether one of
    your brothers or one of your sojourners who are in your land, within your gates.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'defraud' or 'exploit' a hired worker; the Hebrew verb includes economic
      oppression.
    reason: lexical_alternative
  - marker: b
    text: '''Within your gates'' is a Hebrew idiom for life within your towns or community
      jurisdiction.'
    reason: cultural_note
lexical_decisions:
- source_word: תַעֲשֹׁק
  chosen: oppress
  alternatives:
  - defraud
  - exploit
  lexicon: HALOT
  rationale: The verb עָשַׁק commonly denotes oppression or exploitation, often in
    economic contexts. 'Oppress' is broad enough to include withholding due wages
    while preserving the moral force of the prohibition. 'Defraud' is possible in
    context but narrower than the Hebrew verb itself.
- source_word: שָׂכִיר
  chosen: hired worker
  alternatives:
  - hired servant
  - wage earner
  lexicon: HALOT
  rationale: The noun refers to a person hired for wages. 'Hired worker' is clear
    modern English and avoids archaic 'hireling' or potentially misleading 'servant.'
- source_word: עָנִי וְאֶבְיוֹן
  chosen: poor and needy
  alternatives:
  - poor and destitute
  - afflicted and needy
  lexicon: HALOT
  rationale: The paired terms intensify economic vulnerability. 'Poor and needy' is
    the standard natural rendering that preserves the twofold description without
    overinterpreting degrees of poverty.
- source_word: מֵאַחֶיךָ
  chosen: one of your brothers
  alternatives:
  - your brothers
  - your fellow Israelites
  lexicon: HALOT
  rationale: Literally 'from your brothers.' In Deuteronomic covenantal usage this
    refers to a fellow member of Israel. 'One of your brothers' preserves the singular
    relation to the hired worker and maintains the source's kinship language, in line
    with the gender-accurate policy.
- source_word: מִגֵּרְךָ
  chosen: one of your sojourners
  alternatives:
  - the resident foreigner among you
  - your resident alien
  lexicon: HALOT
  rationale: גֵּר denotes a non-native resident living within Israelite society. 'Sojourner'
    preserves the covenantal-legal category without importing modern immigration terminology.
    The possessive 'your' reflects the Hebrew suffix.
- source_word: אֲשֶׁר בְּאַרְצְךָ
  chosen: who are in your land
  alternatives:
  - who is in your land
  - who are in your country
  lexicon: HALOT
  rationale: This relative clause most naturally modifies the sojourner(s). English
    shifts to plural agreement because 'one of your sojourners' is idiomatically followed
    by 'who are,' while still referring to the class from which the individual comes.
- source_word: בִּשְׁעָרֶיךָ
  chosen: within your gates
  alternatives:
  - in your towns
  - inside your gates
  lexicon: HALOT
  rationale: Literally 'in your gates,' a common idiom for the sphere of one's towns
    or jurisdiction. 'Within your gates' preserves the Hebrew image and legal resonance;
    a more interpretive alternative is worth preserving in a footnote.
