id: DEU.24.10
reference: Deuteronomy 24:10
source:
  edition: WLC
  text: כִּֽי תַשֶּׁ֥ה בְ/רֵֽעֲ/ךָ מַשַּׁ֣את מְא֑וּמָה לֹא תָבֹ֥א אֶל בֵּית֖/וֹ לַ/עֲבֹ֥ט
    עֲבֹטֽ/וֹ־־־׃
translation:
  text: When you make your neighbor a loan of anything, you shall not go into his
    house to take his pledge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If you lend your neighbor anything, you shall not enter his house to
      take what he pledged.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - If
  lexicon: HALOT
  rationale: Here כִּי introduces a case law situation. 'When' fits the legal casuistic
    sense naturally in English, though 'if' is also possible.
- source_word: תַשֶּׁה
  chosen: you make ... a loan
  alternatives:
  - you lend
  - you give on loan
  lexicon: HALOT
  rationale: Hiphil of נשה here refers to extending credit or lending. 'Make ... a
    loan' reflects the construction with the following cognate noun מַשַּׁאת and reads
    naturally in English legal style.
- source_word: בְרֵעֲךָ
  chosen: your neighbor
  alternatives:
  - your fellow
  - your companion
  lexicon: HALOT
  rationale: רֵעַ commonly denotes a fellow member of the community. 'Neighbor' is
    idiomatic and preserves the interpersonal covenantal context.
- source_word: מַשַּׁאת מְאוּמָה
  chosen: a loan of anything
  alternatives:
  - any kind of loan
  - a debt of anything
  - anything at all as a loan
  lexicon: HALOT
  rationale: מַשַּׁאת denotes a loan or debt, and מְאוּמָה broadens it to 'anything/anything
    at all.' The phrase is rendered compactly as 'a loan of anything' to preserve
    both elements without awkwardness.
- source_word: לֹא תָבֹא אֶל בֵּיתוֹ
  chosen: you shall not go into his house
  alternatives:
  - do not enter his house
  lexicon: HALOT
  rationale: The imperfect with לֹא in this legal context carries prohibitive force.
    'You shall not' matches English legal-register instruction well.
- source_word: לַעֲבֹט
  chosen: to take
  alternatives:
  - to seize
  - to collect
  lexicon: HALOT
  rationale: The infinitive from עבט in context refers to taking a pledge from a debtor.
    'Take' is the most straightforward English equivalent; 'seize' would overstate
    the force.
- source_word: עֲבֹטוֹ
  chosen: his pledge
  alternatives:
  - his security
  - what he has pledged
  lexicon: HALOT
  rationale: עֲבוֹט is the pledged item given as security for a loan. 'Pledge' is
    concise and standard in English Bible/legal usage.
