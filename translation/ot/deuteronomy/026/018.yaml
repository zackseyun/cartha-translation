theological_decisions:
- issue: Covenantal force of the rare verb הֶאֱמִיר in Deut 26:18
  chosen_reading: formal divine declaration within covenant context
  alternative_readings:
  - election/choosing language
  - mutual avowal formula rendered more archaically as 'avouched'
  rationale: The verse describes the LORD's formal covenantal declaration regarding Israel's status. Rendering the verb as 'has declared' preserves that force without importing a stronger doctrinal claim of election than the immediate wording states, and without relying on archaic English.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; readable modern English, not archaic or academic.'
