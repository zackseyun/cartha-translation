id: DEU.26.18
reference: Deuteronomy 26:18
source:
  edition: WLC
  text: וַֽ/יהוָ֞ה הֶאֱמִֽירְ/ךָ֣ הַ/יּ֗וֹם לִ/הְי֥וֹת ל/וֹ֙ לְ/עַ֣ם סְגֻלָּ֔ה כַּ/אֲשֶׁ֖ר דִּבֶּר לָ֑/ךְ וְ/לִ/שְׁמֹ֖ר כָּל מִצְוֺתָֽי/ו־־׃
translation:
  text: And Yahweh has declared today that you are to be his treasured people, as he promised you, and that you are to keep all his commandments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his treasured possession'; Hebrew 'a people, a treasured possession.'
    reason: lexical_alternative
  - marker: b
    text: Or 'as he spoke to you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - the Lord
  lexicon: HALOT
  rationale: The divine name יְהוָה is rendered 'the LORD' per the project's stated default for YHWH, following established English convention that reflects Jewish reverence practice and the LXX pattern.
- source_word: הֶאֱמִירְךָ
  chosen: has declared
  alternatives:
  - has set apart
  - has avouched
  - has affirmed
  lexicon: HALOT
  rationale: This rare Hiphil form of אמר in Deut 26:17–18 carries the sense of a formal declaration or mutual avowal in covenant context. 'Has declared' is clear modern English and preserves the performative force without importing a more interpretive sense like 'chosen' or an archaic one like 'avouched'.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: '''Today'' is the natural modern rendering and preserves the covenantal immediacy of the Hebrew.'
- source_word: לִהְיוֹת לוֹ
  chosen: that you are to be his
  alternatives:
  - to be his
  - for you to be his
  lexicon: HALOT
  rationale: The infinitive construction expresses purpose/result tied to the LORD's declaration. 'That you are to be his' reads naturally in English while preserving the covenantal designation.
- source_word: לְעַם סְגֻלָּה
  chosen: treasured people
  alternatives:
  - treasured possession
  - special people
  - people for his own possession
  lexicon: HALOT
  rationale: סְגֻלָּה denotes a valued possession or treasure, especially in covenant language. Because עַם is explicit, 'treasured people' preserves both the corporate identity and the value nuance better than the more abstract 'treasured possession' alone.
- source_word: כַּאֲשֶׁר דִּבֶּר לָךְ
  chosen: as he promised you
  alternatives:
  - as he spoke to you
  - as he said to you
  lexicon: HALOT
  rationale: While דִּבֶּר is literally 'spoke,' in this covenantal context it refers to prior divine commitment. 'Promised' makes the force explicit in idiomatic English without exceeding the context.
- source_word: וְלִשְׁמֹר
  chosen: and that you are to keep
  alternatives:
  - and to keep
  - and to observe
  lexicon: HALOT
  rationale: שׁמר with commandments commonly means to keep or observe them. 'Keep' is the most natural and widely understood English equivalent. Repeating 'that you are to' matches the prior infinitive construction and clarifies the syntax.
- source_word: כָּל מִצְוֺתָיו
  chosen: all his commandments
  alternatives:
  - all his commands
  lexicon: HALOT
  rationale: מִצְוֺתָיו is straightforwardly 'his commandments.' This preserves the covenant-law register of the Hebrew.
