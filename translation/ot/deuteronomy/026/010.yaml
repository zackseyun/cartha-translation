id: DEU.26.10
reference: Deuteronomy 26:10
source:
  edition: WLC
  text: וְ/עַתָּ֗ה הִנֵּ֤ה הֵבֵ֨אתִי֙ אֶת רֵאשִׁית֙ פְּרִ֣י הָ/אֲדָמָ֔ה אֲשֶׁר נָתַ֥תָּה
    לִּ֖/י יְהוָ֑ה וְ/הִנַּחְתּ֗/וֹ לִ/פְנֵי֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ וְ/הִֽשְׁתַּחֲוִ֔יתָ
    לִ/פְנֵ֖י יְהוָ֥ה אֱלֹהֶֽי/ךָ־־׃
translation:
  text: And now, look, I have brought the first of the fruit of the ground that you,
    O LORD, have given me. Then you shall set it down before the LORD your God and
    bow down before the LORD your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the firstfruits of the ground' or 'the first of the produce of the
      land.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb here refers specifically to bowing oneself down; 'worship'
      is a broader interpretive rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - And now therefore
  - Now
  lexicon: HALOT
  rationale: Marks the transition from the recited confession to the present act of
    offering; 'And now' is natural English and preserves the discourse connection.
- source_word: הִנֵּה
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: Deictic particle drawing attention to the offering. 'Look' preserves
    the demonstrative force in readable modern English better than archaic 'behold.'
- source_word: הֵבֵאתִי
  chosen: I have brought
  alternatives:
  - I bring
  - I have come with
  lexicon: HALOT
  rationale: Perfect first person singular refers to the completed act of bringing
    the firstfruits. English present perfect fits the ritual declaration.
- source_word: רֵאשִׁית פְּרִי הָאֲדָמָה
  chosen: the first of the fruit of the ground
  alternatives:
  - the firstfruits of the ground
  - the first of the produce of the land
  lexicon: HALOT
  rationale: Keeps the construct relationship explicit and close to the Hebrew. 'Firstfruits'
    is possible, but the more transparent phrasing shows the underlying wording while
    still sounding natural.
- source_word: הָאֲדָמָה
  chosen: the ground
  alternatives:
  - the land
  - the soil
  lexicon: HALOT
  rationale: אֲדָמָה often means arable ground/soil. Here the focus is agricultural
    produce rather than territorial possession as such, so 'ground' best fits the
    immediate context.
- source_word: אֲשֶׁר נָתַתָּה לִּי
  chosen: that you ... have given me
  alternatives:
  - which you gave me
  lexicon: HALOT
  rationale: Retains the relative clause and the direct acknowledgment that the produce
    is a gift from God.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's required default rendering for the divine name.
- source_word: וְהִנַּחְתּוֹ
  chosen: Then you shall set it down
  alternatives:
  - and you shall place it
  - and you shall lay it down
  lexicon: HALOT
  rationale: Second masculine singular perfect with prefixed conjunction in this procedural
    context carries instructional force after the declaration. 'Set it down' is idiomatic
    and concrete for placing the offering before God.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: Standard rendering that preserves the cultic sense of presentation in
    God's presence.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward covenantal designation in second person singular, retained
    consistently in both occurrences.
- source_word: וְהִשְׁתַּחֲוִיתָ
  chosen: and bow down
  alternatives:
  - and worship
  - and prostrate yourself
  lexicon: HALOT
  rationale: The verb denotes the physical act of prostration/bowing. 'Bow down' preserves
    the embodied action without overinterpreting it as the broader concept 'worship,'
    though worship is certainly involved.
