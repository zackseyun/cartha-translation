theological_decisions:
- issue: Rendering the sequence of oppression verbs distinctly
  chosen_reading: 'Use three differentiated expressions: ''treated us badly,'' ''afflicted
    us,'' and ''laid hard labor on us.'''
  alternative_readings:
  - Compress the first two verbs into a single idea of oppression
  - Render all three with stronger slavery terminology in each clause
  rationale: The Hebrew uses a sequence of related but non-identical verbs to recount
    Egypt's oppression. Preserving the progression respects the source text's rhetoric
    without importing additional doctrinal or historical claims beyond the words present.
  doctrine_reference: Translation philosophy §§1, 5
