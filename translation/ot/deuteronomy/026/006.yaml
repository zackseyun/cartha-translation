id: DEU.26.6
reference: Deuteronomy 26:6
source:
  edition: WLC
  text: וַ/יָּרֵ֧עוּ אֹתָ֛/נוּ הַ/מִּצְרִ֖ים וַ/יְעַנּ֑וּ/נוּ וַ/יִּתְּנ֥וּ עָלֵ֖י/נוּ
    עֲבֹדָ֥ה קָשָֽׁה׃
translation:
  text: And the Egyptians treated us badly and afflicted us, and laid hard labor on
    us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dealt harshly with us' for 'treated us badly.'
    reason: lexical_alternative
  - marker: b
    text: Or 'oppressed us' for 'afflicted us.'
    reason: lexical_alternative
  - marker: c
    text: Or 'imposed harsh labor on us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּרֵעוּ
  chosen: treated us badly
  alternatives:
  - dealt harshly with us
  - did evil to us
  - mistreated us
  lexicon: HALOT
  rationale: From רעע in the Hiphil/waw-consecutive narrative form, expressing causing
    harm or dealing badly with someone. 'Treated us badly' is natural modern English
    and preserves the sense of harmful treatment without over-specifying violence
    beyond the verb itself.
- source_word: הַמִּצְרִים
  chosen: the Egyptians
  alternatives:
  - Egyptians
  lexicon: HALOT
  rationale: Definite ethnic/national designation referring to the people of Egypt
    as the oppressing group in the historical recollection.
- source_word: וַיְעַנּוּנוּ
  chosen: afflicted us
  alternatives:
  - oppressed us
  - humbled us
  - mistreated us
  lexicon: HALOT
  rationale: From ענה in the Piel, commonly used for afflicting, oppressing, or humiliating.
    'Afflicted us' preserves the broader suffering imposed, while avoiding collapsing
    it into the previous verb's sense of mistreatment.
- source_word: וַיִּתְּנוּ עָלֵינוּ
  chosen: laid on us
  alternatives:
  - put on us
  - imposed on us
  lexicon: HALOT
  rationale: The idiom נתן על conveys placing or imposing something upon someone.
    'Laid on us' is idiomatic English that fits the burden imagery of the following
    noun phrase.
- source_word: עֲבֹדָה קָשָׁה
  chosen: hard labor
  alternatives:
  - harsh labor
  - severe service
  - hard service
  lexicon: HALOT
  rationale: עֲבֹדָה denotes labor/service/work, and קָשָׁה means hard, harsh, severe.
    'Hard labor' is the clearest natural English equivalent and captures the forced,
    burdensome nature of Israel's servitude in Egypt.
