theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for YHWH, aligning with Jewish reverence
    tradition and longstanding biblical English convention while preserving covenantal
    force.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sanctuary formula לְשַׁכֵּן שְׁמוֹ שָׁם
  chosen_reading: to make his name dwell there
  alternative_readings:
  - to place his name there
  rationale: The Hebrew preserves Deuteronomy's theology of the chosen place as the
    location of God's name, not a simplistic statement that God himself is spatially
    contained there. The rendering keeps the idiom and its theological tension rather
    than resolving it into a flatter paraphrase.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
