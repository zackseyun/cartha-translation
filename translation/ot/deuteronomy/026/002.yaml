id: DEU.26.2
reference: Deuteronomy 26:2
source:
  edition: WLC
  text: וְ/לָקַחְתָּ֞ מֵ/רֵאשִׁ֣ית כָּל פְּרִ֣י הָ/אֲדָמָ֗ה אֲשֶׁ֨ר תָּבִ֧יא מֵֽ/אַרְצְ/ךָ֛
    אֲשֶׁ֨ר יְהוָ֧ה אֱלֹהֶ֛י/ךָ נֹתֵ֥ן לָ֖/ךְ וְ/שַׂמְתָּ֣ בַ/טֶּ֑נֶא וְ/הָֽלַכְתָּ֙
    אֶל הַ/מָּק֔וֹם אֲשֶׁ֤ר יִבְחַר֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ לְ/שַׁכֵּ֥ן שְׁמ֖/וֹ שָֽׁם׀־־׃
translation:
  text: you shall take some of the first of all the fruit of the ground that you bring
    in from your land, which the LORD your God is giving you, and put it in a basket,
    and go to the place that the LORD your God will choose to make his name dwell
    there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the firstfruits of all the fruit/produce of the
      ground.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to make his name dwell there,' a Deuteronomic expression for the
      place the LORD chooses for his worshipful presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַחְתָּ
  chosen: you shall take
  alternatives:
  - and you shall take
  - you are to take
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in legal/instructional context
    functions as an injunctive sequence. 'You shall take' gives natural English legislative
    force without over-literal repetition of 'and.'
- source_word: מֵרֵאשִׁית
  chosen: some of the first
  alternatives:
  - from the first
  - from the firstfruits
  - from the choicest first part
  lexicon: HALOT
  rationale: The preposition מִן plus רֵאשִׁית indicates taking from the first portion/first
    produce. Because the next phrase already specifies 'all the fruit of the ground,'
    'some of the first' avoids implying every single first item while preserving the
    idea of first produce. 'Firstfruits' is possible but somewhat interpretive here
    since the Hebrew expression is expanded rather than using a standalone technical
    English term.
- source_word: כָּל פְּרִי הָאֲדָמָה
  chosen: all the fruit of the ground
  alternatives:
  - all the produce of the soil
  - every fruit of the land
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the agricultural concreteness of
    פְּרִי and אֲדָמָה. 'Fruit of the ground' is broader than orchard fruit and can
    denote produce generally.
- source_word: אֲשֶׁר תָּבִיא מֵאַרְצְךָ
  chosen: that you bring in from your land
  alternatives:
  - that you harvest from your land
  - that you bring from your land
  lexicon: HALOT
  rationale: Hiphil of בוא here refers to bringing the produce in, likely from field
    to sanctuary context. 'Bring in from your land' preserves the motion nuance better
    than the more interpretive 'harvest.'
- source_word: אֲשֶׁר יְהוָה אֱלֹהֶיךָ נֹתֵן לָךְ
  chosen: which the LORD your God is giving you
  alternatives:
  - which the LORD your God gives you
  - that the LORD your God is giving to you
  lexicon: HALOT
  rationale: The participle נֹתֵן conveys ongoing or characteristic giving. 'Is giving
    you' preserves the present participial sense and the theological emphasis that
    the land remains God's gift.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: וְשַׂמְתָּ בַטֶּנֶא
  chosen: and put it in a basket
  alternatives:
  - and place it in the basket
  lexicon: HALOT
  rationale: טֶּנֶא denotes a basket used for carrying produce. The singular object
    in English naturally refers to the gathered produce collectively as 'it.' The
    article is rendered idiomatically as indefinite in English.
- source_word: וְהָלַכְתָּ אֶל הַמָּקוֹם
  chosen: and go to the place
  alternatives:
  - and you shall go to the place
  - and go to the site
  lexicon: HALOT
  rationale: Simple sequential command. 'Place' is the standard rendering for הַמָּקוֹם
    in Deuteronomy's central-sanctuary language.
- source_word: אֲשֶׁר יִבְחַר
  chosen: that ... will choose
  alternatives:
  - which ... chooses
  lexicon: HALOT
  rationale: Imperfect points to the future selection of the sanctuary location relative
    to Moses' speech. 'Will choose' preserves Deuteronomy's forward-looking formulation.
- source_word: לְשַׁכֵּן שְׁמוֹ שָׁם
  chosen: to make his name dwell there
  alternatives:
  - to cause his name to dwell there
  - to place his name there
  lexicon: HALOT
  rationale: The Hiphil infinitive of שכן is causative. 'Make his name dwell there'
    is readable modern English while preserving the theological idiom of God's name
    dwelling at the chosen sanctuary, rather than flattening it to mere ownership
    or designation.
