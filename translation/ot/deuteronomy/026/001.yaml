theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of land gift and possession
  chosen_reading: Distinguish God's gift ('is giving you as an inheritance') from Israel's subsequent action ('you take possession of it and live in it')
  alternative_readings:
  - Compress the sequence into a simpler statement of receiving the land
  rationale: 'The Hebrew presents a sequence: entering, divine giving, possessing, and dwelling. Preserving that sequence avoids importing a theological simplification and keeps both divine gift and human occupation in view.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
