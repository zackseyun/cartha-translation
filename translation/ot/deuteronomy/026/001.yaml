id: DEU.26.1
reference: Deuteronomy 26:1
source:
  edition: WLC
  text: וְ/הָיָה֙ כִּֽי תָב֣וֹא אֶל הָ/אָ֔רֶץ אֲשֶׁר֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ נֹתֵ֥ן לְ/ךָ֖ נַחֲלָ֑ה וִֽ/ירִשְׁתָּ֖/הּ וְ/יָשַׁ֥בְתָּ בָּֽ/הּ־־׃
translation:
  text: And when you come into the land that Yahweh your God is giving you as an inheritance, and you take possession of it and live in it,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and you possess it'; the Hebrew verb can also be rendered 'inherit' in some contexts, but here it refers to taking possession of the land.
    reason: lexical_alternative
  - marker: b
    text: Or 'dwell in it' or 'settle in it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  chosen: And when
  alternatives:
  - And it shall be, when
  - Now when
  lexicon: HALOT
  rationale: This clause is a common Hebrew discourse and temporal formula introducing a future circumstance. 'And when' preserves the temporal force of כִּי with readable modern English, while avoiding overly wooden English like 'and it shall be, when.'
- source_word: תָבֹוא
  chosen: you come
  alternatives:
  - you enter
  lexicon: HALOT
  rationale: The verb בוא means 'come/enter.' 'Come' fits the idiomatic English construction 'come into the land' and preserves the second masculine singular address.
- source_word: אֶל הָאָרֶץ
  chosen: into the land
  alternatives:
  - to the land
  lexicon: HALOT
  rationale: The preposition אֶל with בוא is naturally rendered 'into' in this context, expressing entry into the land rather than mere movement toward it.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: The construct with second masculine singular suffix is straightforwardly 'your God,' preserving the covenantal address to Israel in the singular.
- source_word: נֹתֵן לְךָ
  chosen: is giving you
  alternatives:
  - gives you
  - will give you
  lexicon: HALOT
  rationale: The participle נֹתֵן can express ongoing or imminent action. 'Is giving you' reflects the Hebrew participial form and the promissory immediacy of the context without overcommitting to a simple future.
- source_word: נַחֲלָה
  chosen: as an inheritance
  alternatives:
  - for an inheritance
  - as a possession
  lexicon: HALOT
  rationale: נַחֲלָה denotes an inherited possession or allotted inheritance. 'As an inheritance' preserves the covenantal-land theology better than the flatter 'possession.'
- source_word: וִירִשְׁתָּהּ
  chosen: and you take possession of it
  alternatives:
  - and you possess it
  - and you inherit it
  lexicon: HALOT
  rationale: ירשׁ in land contexts often means to take possession/occupy. 'Take possession of it' communicates the active sense more clearly in modern English than simply 'possess,' while avoiding possible confusion from 'inherit it' after נַחֲלָה has already expressed inheritance.
- source_word: וְיָשַׁבְתָּ בָּהּ
  chosen: and live in it
  alternatives:
  - and dwell in it
  - and settle in it
  lexicon: HALOT
  rationale: ישׁב can mean sit, dwell, remain, or settle. 'Live in it' is natural modern English and captures the settled-residence sense in context. 'Dwell' is more formal; 'settle' is possible but slightly narrower.
