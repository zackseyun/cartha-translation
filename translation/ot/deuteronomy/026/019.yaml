theological_decisions:
- issue: Whether to make the final clause explicitly promissory
  chosen_reading: as he has spoken
  alternative_readings:
  - as he promised
  - just as he said
  rationale: The Hebrew verb is simply 'spoke/said.' Because the translation philosophy
    prioritizes original-language primacy and avoids importing doctrinal or interpretive
    claims beyond the text, the main text keeps 'spoken' rather than the interpretive
    'promised,' though the covenantal context supports that implication.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies the default rendering of YHWH as 'the
    LORD.'
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
