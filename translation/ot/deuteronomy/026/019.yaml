id: DEU.26.19
reference: Deuteronomy 26:19
source:
  edition: WLC
  text: וּֽ/לְ/תִתְּ/ךָ֣ עֶלְי֗וֹן עַ֤ל כָּל הַ/גּוֹיִם֙ אֲשֶׁ֣ר עָשָׂ֔ה לִ/תְהִלָּ֖ה
    וּ/לְ/שֵׁ֣ם וּ/לְ/תִפְאָ֑רֶת וְ/לִֽ/הְיֹתְ/ךָ֧ עַם קָדֹ֛שׁ לַ/יהוָ֥ה אֱלֹהֶ֖י/ךָ
    כַּ/אֲשֶׁ֥ר דִּבֵּֽר־־׃ס
translation:
  text: and to set you high above all the nations that he has made, for praise and
    for name and for beauty, and for you to be a holy people to the LORD your God,
    as he has spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for renown' at 'for name'; Hebrew 'name' often carries the sense of
      reputation or renown.
    reason: lexical_alternative
  - marker: b
    text: Or 'for glory' at 'for beauty'; the Hebrew can denote beauty, splendor,
      or glory.
    reason: lexical_alternative
  - marker: c
    text: Or 'as he promised'; literally, 'as he has spoken.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּלְתִתְּךָ
  chosen: and to set you
  alternatives:
  - and to make you
  - and to place you
  lexicon: HALOT
  rationale: 'Infinitive construct of נתן with prefixed conjunction/preposition continues
    the prior declaration of what the LORD has affirmed; in context it expresses purpose/result:
    ''to set/make you.'' ''Set you'' preserves the elevated-placement nuance before
    עֶלְיוֹן.'
- source_word: עֶלְיוֹן
  chosen: high
  alternatives:
  - most high
  - exalted
  - uppermost
  lexicon: HALOT
  rationale: 'Here the adjective functions predicatively with נתן: ''set you high
    above.'' ''Most high'' would sound like a divine title in English and is less
    natural for the object Israel.'
- source_word: עַל כָּל הַגּוֹיִם
  chosen: above all the nations
  alternatives:
  - over all the nations
  - higher than all the nations
  lexicon: HALOT
  rationale: עַל with comparative/exaltation sense is well rendered 'above.' 'Nations'
    is the standard gloss for גוים in this covenantal-national context.
- source_word: אֲשֶׁר עָשָׂה
  chosen: that he has made
  alternatives:
  - which he made
  - that he created
  lexicon: HALOT
  rationale: Refers to the nations as those made by the LORD. 'Has made' is idiomatic
    and keeps the relative clause attached to 'nations.' 'Created' is possible but
    stronger than the common verb עשה requires here.
- source_word: לִתְהִלָּה
  chosen: for praise
  alternatives:
  - for renown
  - for a praise
  lexicon: HALOT
  rationale: The lamed marks purpose/result. 'Praise' keeps the nominal abstraction
    and allows the triad with 'name' and 'beauty' to remain compact.
- source_word: וּלְשֵׁם
  chosen: and for name
  alternatives:
  - and for a name
  - and for renown
  lexicon: HALOT
  rationale: שֵׁם can mean literal 'name' or figuratively 'renown.' Retaining 'name'
    preserves the Hebrew idiom and literary parallelism; the idiomatic sense can be
    inferred.
- source_word: וּלְתִפְאָרֶת
  chosen: and for beauty
  alternatives:
  - and for glory
  - and for honor
  lexicon: HALOT
  rationale: תפארת denotes beauty, splendor, glory. 'Beauty' is less traditional than
    'glory' but more directly reflects the noun's aesthetic sense and avoids flattening
    all three nouns into near-synonyms.
- source_word: וְלִהְיֹתְךָ עַם קָדוֹשׁ
  chosen: and for you to be a holy people
  alternatives:
  - and that you may be a holy people
  - and for your being a holy people
  lexicon: HALOT
  rationale: Infinitive construct with pronominal suffix continues the purpose sequence.
    'For you to be' is slightly formal but transparent; 'a holy people' is the natural
    rendering of עם קדוש.
- source_word: לַיהוָה אֱלֹהֶיךָ
  chosen: to the LORD your God
  alternatives:
  - belonging to the LORD your God
  - for the LORD your God
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' The lamed here marks relation/belonging;
    'to the LORD your God' is concise and idiomatic, though possessive force is present.
- source_word: כַּאֲשֶׁר דִּבֵּר
  chosen: as he has spoken
  alternatives:
  - as he promised
  - just as he said
  lexicon: HALOT
  rationale: דבר is 'speak/say,' not explicitly 'promise,' though the covenant context
    implies promissory speech. 'Has spoken' stays closer to the Hebrew while remaining
    natural.
