id: DEU.26.13
reference: Deuteronomy 26:13
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֡ לִ/פְנֵי֩ יְהוָ֨ה אֱלֹהֶ֜י/ךָ בִּעַ֧רְתִּי הַ/קֹּ֣דֶשׁ מִן הַ/בַּ֗יִת וְ/גַ֨ם נְתַתִּ֤י/ו לַ/לֵּוִי֙ וְ/לַ/גֵּר֙ לַ/יָּת֣וֹם וְ/לָ/אַלְמָנָ֔ה כְּ/כָל מִצְוָתְ/ךָ֖ אֲשֶׁ֣ר צִוִּיתָ֑/נִי לֹֽא עָבַ֥רְתִּי מִ/מִּצְוֺתֶ֖י/ךָ וְ/לֹ֥א שָׁכָֽחְתִּי־־־׃
translation:
  text: Then you shall say before Yahweh your God, ‘I have removed the holy portion from the house, and I have also given it to the Levite, the sojourner, the fatherless, and the widow, according to all your commandment that you commanded me. I have not transgressed your commandments, nor have I forgotten them.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sacred portion' or 'the holy thing'; the Hebrew refers to the consecrated tithe or produce set apart for distribution.
    reason: lexical_alternative
  - marker: b
    text: Or 'the resident foreigner' for 'the sojourner.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the orphan' for 'the fatherless.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ
  chosen: Then you shall say
  alternatives:
  - And you shall say
  lexicon: HALOT
  rationale: The conjunction plus perfect with vav continues the ritual sequence. 'Then' gives natural English progression while preserving the procedural force.
- source_word: לִפְנֵי יְהוָה אֱלֹהֶיךָ
  chosen: before the LORD your God
  alternatives:
  - in the presence of the LORD your God
  lexicon: HALOT
  rationale: לִפְנֵי commonly means 'before/in the presence of.' 'Before' is concise and idiomatic. יְהוָה follows the doctrinal default as 'the LORD.'
- source_word: בִּעַרְתִּי
  chosen: I have removed
  alternatives:
  - I have cleared out
  - I have burned away
  lexicon: HALOT
  rationale: בער in this context refers to removing or clearing away the consecrated tithe from one's house, not literal burning. 'Removed' best fits the ritual declaration.
- source_word: הַקֹּדֶשׁ
  chosen: the holy portion
  alternatives:
  - the sacred portion
  - the consecrated thing
  - the holy thing
  lexicon: HALOT
  rationale: The noun literally means 'the holy thing,' but here it refers specifically to the consecrated produce/tithe set apart for distribution. 'Holy portion' makes the referent clearer without over-paraphrasing.
- source_word: מִן הַבַּיִת
  chosen: from the house
  alternatives:
  - from my house
  - out of the house
  lexicon: HALOT
  rationale: The Hebrew has 'from the house' with the article, but in context it is the speaker's household/store. English can retain the formal wording without adding 'my,' though that is implied.
- source_word: וְגַם נְתַתִּיו
  chosen: and I have also given it
  alternatives:
  - and also I have given it
  lexicon: HALOT
  rationale: The pronoun suffix refers back to the consecrated portion. The perfect is rendered with present perfect in English to match the completed declaration.
- source_word: לַלֵּוִי
  chosen: to the Levite
  alternatives:
  - to the Levitical priest
  lexicon: HALOT
  rationale: The text says 'Levite,' not specifically priest. The simpler rendering preserves the social category named in the law.
- source_word: לַגֵּר
  chosen: the sojourner
  alternatives:
  - the resident foreigner
  - the stranger
  lexicon: HALOT
  rationale: גֵּר denotes a resident outsider living among Israel. 'Sojourner' is a standard, concise rendering that preserves the covenantal-social nuance better than the vaguer 'stranger.'
- source_word: לַיָּתוֹם
  chosen: the fatherless
  alternatives:
  - the orphan
  lexicon: HALOT
  rationale: Both are possible. 'Fatherless' preserves the Hebrew term's literal social vulnerability category and its recurring legal formula with widow and sojourner.
- source_word: וְלָאַלְמָנָה
  chosen: the widow
  lexicon: HALOT
  rationale: Standard and precise rendering of the social category named.
- source_word: כְּכָל מִצְוָתְךָ אֲשֶׁר צִוִּיתָנִי
  chosen: according to all your commandment that you commanded me
  alternatives:
  - according to every commandment you commanded me
  - according to all that you commanded me
  lexicon: HALOT
  rationale: The singular מִצְוָה can function collectively. Retaining 'commandment' reflects the Hebrew form while the relative clause preserves the emphatic repetition of the verb 'command.'
- source_word: לֹא עָבַרְתִּי מִמִּצְוֺתֶיךָ
  chosen: I have not transgressed any of your commandments
  alternatives:
  - I have not gone beyond your commandments
  - I have not violated your commandments
  lexicon: HALOT
  rationale: עבר מן in this context means to overstep or transgress. 'Any of your commandments' makes the English idiomatic while preserving the plural object.
- source_word: וְלֹא שָׁכָחְתִּי
  chosen: nor have I forgotten them
  alternatives:
  - and I have not forgotten
  lexicon: HALOT
  rationale: English requires an object for clarity; 'them' refers to the commandments. The negative parallelism is preserved with 'nor.'
