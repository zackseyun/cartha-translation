id: DEU.26.14
reference: Deuteronomy 26:14
source:
  edition: WLC
  text: לֹא אָכַ֨לְתִּי בְ/אֹנִ֜י מִמֶּ֗/נּוּ וְ/לֹא בִעַ֤רְתִּי מִמֶּ֨/נּוּ֙ בְּ/טָמֵ֔א וְ/לֹא נָתַ֥תִּי מִמֶּ֖/נּוּ לְ/מֵ֑ת שָׁמַ֗עְתִּי בְּ/קוֹל֙ יְהוָ֣ה אֱלֹהָ֔/י עָשִׂ֕יתִי כְּ/כֹ֖ל אֲשֶׁ֥ר צִוִּיתָֽ/נִי־־־׃
translation:
  text: I have not eaten any of it while in mourning, and I have not removed any of it while unclean, and I have not given any of it for the dead. I have obeyed the voice of Yahweh my God; I have done according to all that you commanded me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in my mourning,' 'in sorrow,' or 'in affliction.'
    reason: lexical_alternative
  - marker: b
    text: Or 'burned any of it' or 'cleared away any of it.' The Hebrew verb can refer to burning or removing.
    reason: lexical_alternative
  - marker: c
    text: Or 'for a dead person' or 'in connection with the dead'; the exact prohibited use is not specified.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּאֹנִי
  chosen: while in mourning
  alternatives:
  - in my mourning
  - in sorrow
  - in affliction
  lexicon: HALOT
  rationale: The noun אֹנִי can denote sorrow, mourning, or affliction. In this cultic context, the sense is participation while in a state of mourning, which fits the surrounding purity language and common interpretation of the tithe declaration. 'While in mourning' is idiomatic English and preserves the ritual nuance better than the more ambiguous 'in my sorrow' or 'in affliction.'
- source_word: בִעַרְתִּי מִמֶּנּוּ
  chosen: removed any of it
  alternatives:
  - burned any of it
  - consumed any of it
  - cleared away any of it
  lexicon: HALOT
  rationale: The verb בער in the Piel commonly means 'burn, remove, consume, clear away.' Here the object is part of the consecrated produce, and the following phrase 'while unclean' suggests improper disposal or handling rather than literal burning alone. 'Removed any of it' captures the broader sense without overcommitting to a specific mode of disposal.
- source_word: בְּטָמֵא
  chosen: while unclean
  alternatives:
  - in uncleanness
  - when unclean
  lexicon: HALOT
  rationale: The phrase indicates a state of ritual impurity associated with the speaker's handling of the holy portion. 'While unclean' is natural English and preserves the temporal/state nuance.
- source_word: לְמֵת
  chosen: for the dead
  alternatives:
  - to a dead person
  - for a corpse
  - in connection with the dead
  lexicon: HALOT
  rationale: The phrase likely refers to use associated with funerary rites or the needs of the dead/mourning context. 'For the dead' is the most natural and sufficiently broad rendering, preserving the ambiguity of the Hebrew rather than narrowing it to corpse contamination alone.
- source_word: שָׁמַעְתִּי בְּקוֹל
  chosen: I have obeyed the voice
  alternatives:
  - I have listened to the voice
  - I have heard the voice
  lexicon: HALOT
  rationale: The idiom שמע בקול regularly means not merely auditory hearing but obedient response. 'I have obeyed the voice' best conveys the covenantal sense in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כְּכֹל אֲשֶׁר צִוִּיתָנִי
  chosen: according to all that you commanded me
  alternatives:
  - just as you commanded me
  - in accordance with everything you commanded me
  lexicon: HALOT
  rationale: This phrase expresses comprehensive conformity to divine command. 'According to all that you commanded me' is clear, faithful, and slightly more formal, fitting the declarative oath-like context.
