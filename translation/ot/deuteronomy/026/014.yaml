theological_decisions:
- issue: Nature of the prohibited use 'for the dead'
  chosen_reading: Retain the broader wording 'for the dead' without specifying funerary offering or corpse impurity.
  alternative_readings:
  - for funeral rites
  - for a dead person
  - for a corpse
  rationale: The Hebrew is concise and does not explicitly define the exact prohibited practice. Preserving the broader phrase avoids importing a more specific ritual explanation than the text itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
