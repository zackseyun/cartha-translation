id: DEU.26.7
reference: Deuteronomy 26:7
source:
  edition: WLC
  text: וַ/נִּצְעַ֕ק אֶל יְהוָ֖ה אֱלֹהֵ֣י אֲבֹתֵ֑י/נוּ וַ/יִּשְׁמַ֤ע יְהוָה֙ אֶת קֹלֵ֔/נוּ וַ/יַּ֧רְא אֶת עָנְיֵ֛/נוּ וְ/אֶת עֲמָלֵ֖/נוּ וְ/אֶת לַחֲצֵֽ/נוּ־־־־־׃
translation:
  text: Then we cried out to Yahweh, the God of our fathers, and Yahweh heard our voice and saw our affliction, our labor, and our oppression.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the God of our fathers.' The phrase recalls the covenant God of Israel's forefathers; 'ancestors' is a possible inclusive alternative.
    reason: lexical_alternative
  - marker: b
    text: Or 'heard our cry'; literally, 'heard our voice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנִּצְעַק
  chosen: we cried out
  alternatives:
  - we called out
  - we cried
  lexicon: HALOT
  rationale: The verb צעק in the nifal/qal narrative context conveys a desperate cry for help, not merely speaking or praying. 'Cried out' preserves the urgency and covenant-appeal sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי אֲבֹתֵינוּ
  chosen: the God of our fathers
  alternatives:
  - our fathers' God
  - the God of our ancestors
  lexicon: HALOT
  rationale: This construct identifies YHWH covenantally as the God worshiped by Israel's forefathers. 'Fathers' is retained as gender-accurate to the Hebrew and to preserve the traditional covenant formula.
- source_word: וַיִּשְׁמַע ... אֶת קֹלֵנוּ
  chosen: heard our voice
  alternatives:
  - heard us
  - heard our cry
  lexicon: HALOT
  rationale: The Hebrew literally says 'heard our voice.' This idiom means hearing their appeal. Retaining 'voice' preserves the source wording while remaining natural in English.
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - looked upon
  - took notice of
  lexicon: HALOT
  rationale: The simple verb 'saw' is both literal and theologically weighty, implying attentive regard without over-interpreting.
- source_word: עָנְיֵנוּ
  chosen: our affliction
  alternatives:
  - our misery
  - our suffering
  lexicon: HALOT
  rationale: עֳנִי commonly denotes affliction, misery, or humbled condition. 'Affliction' is a clear and suitably weighty rendering in this salvation-history recital.
- source_word: עֲמָלֵנוּ
  chosen: our hardship
  alternatives:
  - our toil
  - our trouble
  - our labor
  lexicon: HALOT
  rationale: עָמָל can denote toil, trouble, or burdensome labor. In the Egypt context it refers to the burdens laid on Israel; 'hardship' captures the broader oppressive burden better than the narrower 'labor' or 'toil'.
- source_word: לַחֲצֵנוּ
  chosen: our oppression
  alternatives:
  - the oppression against us
  - our distress
  - our pressure
  lexicon: HALOT
  rationale: לַחַץ denotes oppression or crushing pressure from oppressors. 'Oppression' best fits the Exodus context and distinguishes it from the previous terms.
