theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Reference of 'our fathers'
  chosen_reading: our fathers
  alternative_readings:
  - our ancestors
  rationale: The Hebrew is explicitly masculine plural and in Deuteronomic covenantal context commonly points to the patriarchal fathers. Following the gender-accurate policy, the translation preserves this rather than neutralizing it.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
