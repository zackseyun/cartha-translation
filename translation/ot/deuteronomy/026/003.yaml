id: DEU.26.3
reference: Deuteronomy 26:3
source:
  edition: WLC
  text: וּ/בָאתָ֙ אֶל הַ/כֹּהֵ֔ן אֲשֶׁ֥ר יִהְיֶ֖ה בַּ/יָּמִ֣ים הָ/הֵ֑ם וְ/אָמַרְתָּ֣ אֵלָ֗י/ו הִגַּ֤דְתִּי הַ/יּוֹם֙ לַ/יהוָ֣ה אֱלֹהֶ֔י/ךָ כִּי בָ֨אתִי֙ אֶל הָ/אָ֔רֶץ אֲשֶׁ֨ר נִשְׁבַּ֧ע יְהוָ֛ה לַ/אֲבֹתֵ֖י/נוּ לָ֥/תֶת לָֽ/נוּ־־־׃
translation:
  text: And you shall go to the priest who is in office in those days and say to him, ‘Today I declare to Yahweh your God that I have come into the land that Yahweh swore to our fathers to give to us.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the priest who will be in those days,'' that is, the priest then serving or in office.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''Today I have declared.'' The Hebrew form likely functions performatively: the speaker makes the declaration by saying it.'
    reason: lexical_alternative
  - marker: c
    text: Or 'our ancestors.' Hebrew 'our fathers' is retained because the wording is masculine and likely refers specifically to the patriarchal forefathers.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאתָ
  chosen: And you shall go
  alternatives:
  - And you shall come
  - Then you shall go
  lexicon: HALOT
  rationale: בוא literally means 'come/go/enter' depending on viewpoint. In English, with movement toward the priest, 'go' is the most natural idiom, while preserving the directive force of the Hebrew perfect with vav in instruction sequence.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן in cultic/legal context.
- source_word: אֲשֶׁר יִהְיֶה בַּיָּמִים הָהֵם
  chosen: who is serving in those days
  alternatives:
  - who will be in those days
  - who is in office in those days
  lexicon: HALOT
  rationale: Literally 'who will be in those days.' In context this refers to the priest then holding office/serving at the sanctuary. 'Is serving' makes the idiomatic sense clear without over-paraphrasing.
- source_word: וְאָמַרְתָּ אֵלָיו
  chosen: and say to him
  alternatives:
  - and you shall say to him
  lexicon: HALOT
  rationale: Direct speech introduction; concise modern English preserves the imperative/instructional force.
- source_word: הִגַּדְתִּי הַיּוֹם
  chosen: Today I declare
  alternatives:
  - I declare today
  - Today I have declared
  - I profess today
  lexicon: HALOT
  rationale: 'The Hebrew perfect can function performatively in direct speech: the speaker makes the declaration by uttering it. ''Today I declare'' captures this better than a simple past in English.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' in the main text.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'Second masculine singular suffix retained: the worshiper addresses the priest and says ''the LORD your God,'' matching the Hebrew wording rather than smoothing to ''our God.'''
- source_word: כִּי בָאתִי
  chosen: that I have come
  alternatives:
  - that I came
  - for I have come
  lexicon: HALOT
  rationale: English present perfect fits the declarative sense of arrival with present relevance in the ritual confession.
- source_word: אֶל הָאָרֶץ
  chosen: into the land
  alternatives:
  - to the land
  - into the country
  lexicon: HALOT
  rationale: '''Into the land'' best reflects entry into the promised land and matches the motion verb naturally.'
- source_word: אֲשֶׁר נִשְׁבַּע יְהוָה
  chosen: that the LORD swore
  alternatives:
  - which the LORD swore
  lexicon: HALOT
  rationale: Straightforward relative clause; 'swore' preserves covenantal oath language.
- source_word: לַאֲבֹתֵינוּ
  chosen: to our fathers
  alternatives:
  - to our ancestors
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, the masculine plural is retained as 'fathers.' In Deuteronomy this commonly refers to the patriarchal forefathers specifically, not merely ancestors in general.
- source_word: לָתֶת לָנוּ
  chosen: to give to us
  alternatives:
  - to give us
  lexicon: HALOT
  rationale: The fuller form preserves the Hebrew infinitive plus indirect object, though still natural in English. It also keeps the emphasis on the gift nature of the land promise.
