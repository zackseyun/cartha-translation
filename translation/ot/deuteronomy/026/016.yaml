id: DEU.26.16
reference: Deuteronomy 26:16
source:
  edition: WLC
  text: הַ/יּ֣וֹם הַ/זֶּ֗ה יְהוָ֨ה אֱלֹהֶ֜י/ךָ מְצַוְּ/ךָ֧ לַ/עֲשׂ֛וֹת אֶת הַ/חֻקִּ֥ים
    הָ/אֵ֖לֶּה וְ/אֶת הַ/מִּשְׁפָּטִ֑ים וְ/שָׁמַרְתָּ֤ וְ/עָשִׂ֨יתָ֙ אוֹתָ֔/ם בְּ/כָל
    לְבָבְ/ךָ֖ וּ/בְ/כָל נַפְשֶֽׁ/ךָ־־־־׃
translation:
  text: This day the LORD your God is commanding you to do these statutes and judgments;
    therefore you shall keep and do them with all your heart and with all your soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Today the LORD your God commands you to do these statutes and judgments.'
    reason: lexical_alternative
  - marker: b
    text: '''Judgments'' may also be rendered ''ordinances'' or ''rules''; the Hebrew
      term often refers to legal decisions or prescribed judgments.'
    reason: lexical_alternative
  - marker: c
    text: '''Soul'' here translates Hebrew nephesh, which can also mean ''life'' or
      ''self.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיּוֹם הַזֶּה
  chosen: This day
  alternatives:
  - Today
  - On this day
  lexicon: HALOT
  rationale: A temporal deictic expression. 'This day' preserves the covenantal solemnity
    and discourse emphasis common in Deuteronomy better than the flatter 'today,'
    while remaining natural English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name, 'the LORD' follows established
    reverential convention and reflects the translation policy for YHWH.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with 2ms suffix. 'Your God' preserves the covenant
    relationship addressed to Israel in the singular.
- source_word: מְצַוְּךָ
  chosen: is commanding you
  alternatives:
  - commands you
  - commands
  lexicon: HALOT
  rationale: The participial form conveys present/immediate force. 'Is commanding
    you' captures the ongoing, solemn immediacy of the command in context better than
    a simple English present.
- source_word: לַעֲשׂוֹת
  chosen: to do
  alternatives:
  - to observe
  - to carry out
  lexicon: HALOT
  rationale: The basic sense of עשה is 'do/make.' Here 'to do' is sufficiently natural
    and keeps a tighter link to the Hebrew than the more interpretive 'observe' or
    'carry out.'
- source_word: הַחֻקִּים
  chosen: statutes
  alternatives:
  - decrees
  - ordinances
  lexicon: HALOT
  rationale: '''Statutes'' is a standard and suitably formal rendering for חֻקִּים
    in legal/covenantal contexts, preserving distinction from מִשְׁפָּטִים.'
- source_word: הַמִּשְׁפָּטִים
  chosen: judgments
  alternatives:
  - rules
  - ordinances
  - judicial decisions
  lexicon: HALOT
  rationale: מִשְׁפָּטִים often denotes legal judgments or ordinances. 'Judgments'
    preserves the legal nuance and maintains distinction from 'statutes.'
- source_word: וְשָׁמַרְתָּ
  chosen: you shall keep
  alternatives:
  - you must keep
  - you shall carefully observe
  lexicon: HALOT
  rationale: The verb שמר in covenant contexts commonly means keep/observe. 'You shall
    keep' fits the exhortational force without overexpanding the text.
- source_word: וְעָשִׂיתָ אֹתָם
  chosen: and do them
  alternatives:
  - and perform them
  - and carry them out
  lexicon: HALOT
  rationale: Retaining 'do them' reflects the Hebrew repetition of עשה and preserves
    the paired emphasis 'keep and do' found throughout Deuteronomy.
- source_word: בְּכָל לְבָבְךָ
  chosen: with all your heart
  alternatives:
  - with your whole heart
  lexicon: HALOT
  rationale: לֵבָב in Deuteronomy refers to the inner will, thought, and affection.
    'With all your heart' is the established and accurate English equivalent.
- source_word: וּבְכָל נַפְשֶׁךָ
  chosen: and with all your soul
  alternatives:
  - and with all your life
  - and with your whole being
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote soul, life, or self. In the covenant formula paired
    with 'heart,' 'soul' best preserves the traditional and theological resonance
    without denying the broader anthropological sense.
