theological_decisions:
- issue: Rendering of the covenant name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH,
    following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Force of the singular second-person address
  chosen_reading: singular 'you/your' retained in English without expansion
  alternative_readings:
  - explicitly adding 'Israel'
  - pluralizing for contemporary English
  rationale: The Hebrew addresses Israel in the singular for covenantal directness.
    English 'you/your' preserves this adequately without interpretive expansion.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #5'
