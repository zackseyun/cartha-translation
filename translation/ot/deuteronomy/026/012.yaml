theological_decisions:
- issue: Rendering of socially vulnerable groups in covenant law
  chosen_reading: Retain the concrete categories 'Levite, sojourner, fatherless, and
    widow' without broad paraphrase.
  alternative_readings:
  - religious workers, immigrants, orphans, and widows
  - the needy among you
  rationale: The verse names specific covenantal beneficiaries of the tithe. Preserving
    the categories avoids importing modern social-policy abstractions and keeps the
    legal-theological texture of Deuteronomy intact.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Literal versus interpretive rendering of בִּשְׁעָרֶיךָ
  chosen_reading: Use the literal 'within your gates' in the main text.
  alternative_readings:
  - in your towns
  rationale: The Hebrew idiom refers to the local settlement/community, but the literal
    expression is understandable in English and preserves the source texture. A footnote
    can preserve the more interpretive alternative.
  doctrine_reference: Translation philosophy §§1, 6
