id: DEU.26.12
reference: Deuteronomy 26:12
source:
  edition: WLC
  text: כִּ֣י תְכַלֶּ֞ה לַ֠/עְשֵׂר אֶת כָּל מַעְשַׂ֧ר תְּבוּאָתְ/ךָ֛ בַּ/שָּׁנָ֥ה
    הַ/שְּׁלִישִׁ֖ת שְׁנַ֣ת הַֽ/מַּעֲשֵׂ֑ר וְ/נָתַתָּ֣ה לַ/לֵּוִ֗י לַ/גֵּר֙ לַ/יָּת֣וֹם
    וְ/לָֽ/אַלְמָנָ֔ה וְ/אָכְל֥וּ בִ/שְׁעָרֶ֖י/ךָ וְ/שָׂבֵֽעוּ־־׃
translation:
  text: When you have finished setting aside all the tithe of your produce in the
    third year, the year of the tithe, then you shall give it to the Levite, the sojourner,
    the fatherless, and the widow, and they shall eat within your gates and be satisfied.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in your towns'; literally 'within your gates.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - For
  - If
  lexicon: HALOT
  rationale: Here כִּי introduces a temporal circumstance rather than a causal statement.
    'When' best fits the procedural instruction that follows.
- source_word: תְכַלֶּה
  chosen: you have finished
  alternatives:
  - you complete
  - you finish
  lexicon: HALOT
  rationale: The Piel of כלה conveys bringing an action to completion. The English
    perfect 'have finished' naturally matches the sense before the following infinitive
    construction.
- source_word: לַעְשֵׂר
  chosen: setting aside
  alternatives:
  - tithing
  - giving a tenth
  lexicon: HALOT
  rationale: The infinitive from עשר refers to the act of taking or giving the tenth.
    'Setting aside' communicates the practical action in context without losing the
    tithe concept, which is then stated explicitly by מַעְשַׂר.
- source_word: מַעְשַׂר
  chosen: the tithe
  alternatives:
  - the tenth portion
  lexicon: HALOT
  rationale: Standard and precise rendering for מַעְשַׂר. Retained for consistency
    with biblical usage.
- source_word: תְּבוּאָתְךָ
  chosen: your produce
  alternatives:
  - your yield
  - your harvest
  lexicon: HALOT
  rationale: תְּבוּאָה denotes produce/yield of the land. 'Produce' is broad enough
    to cover agricultural increase generally.
- source_word: בַּשָּׁנָה הַשְּׁלִישִׁת
  chosen: in the third year
  alternatives:
  - during the third year
  lexicon: HALOT
  rationale: Straightforward temporal phrase; 'in the third year' is idiomatic and
    clear.
- source_word: שְׁנַת הַמַּעֲשֵׂר
  chosen: the year of the tithe
  alternatives:
  - the tithe year
  lexicon: HALOT
  rationale: Construct phrase identifying the special third-year tithe cycle. The
    fuller rendering preserves clarity for modern readers.
- source_word: וְנָתַתָּה
  chosen: then you shall give it
  alternatives:
  - and you shall give it
  lexicon: HALOT
  rationale: The waw-consecutive continues the sequence of instruction. 'Then' makes
    the procedural progression explicit in natural English; 'it' is supplied from
    context, referring to the tithe.
- source_word: לַלֵּוִי
  chosen: to the Levite
  lexicon: HALOT
  rationale: Standard rendering of the tribal/social designation.
- source_word: לַגֵּר
  chosen: the sojourner
  alternatives:
  - the resident foreigner
  - the stranger
  lexicon: HALOT
  rationale: גֵּר refers to a non-native resident living among Israel. 'Sojourner'
    preserves the covenantal-social nuance better than the more vague 'stranger.'
- source_word: לַיָּתוֹם
  chosen: the fatherless
  alternatives:
  - the orphan
  lexicon: HALOT
  rationale: Both are possible, but 'fatherless' preserves the Hebrew's conventional
    covenant-law expression and its social vulnerability emphasis.
- source_word: וְלָאַלְמָנָה
  chosen: the widow
  lexicon: HALOT
  rationale: Standard rendering.
- source_word: וְאָכְלוּ
  chosen: and they shall eat
  alternatives:
  - and let them eat
  lexicon: HALOT
  rationale: The verb states the result/purpose of the gift in future sequence. 'They
    shall eat' preserves the straightforward force.
- source_word: בִּשְׁעָרֶיךָ
  chosen: within your gates
  alternatives:
  - in your towns
  - inside your gates
  lexicon: HALOT
  rationale: Literally 'in your gates,' an idiom for the local community/town jurisdiction.
    The more literal 'within your gates' is retained in the main text, with a clarifying
    alternative suitable for footnote.
- source_word: וְשָׂבֵעוּ
  chosen: be satisfied
  alternatives:
  - be filled
  - have their fill
  lexicon: HALOT
  rationale: The verb denotes being sated or having enough to eat. 'Be satisfied'
    is natural English and conveys sufficiency without sounding wooden.
