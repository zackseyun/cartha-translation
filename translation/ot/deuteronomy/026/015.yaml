id: DEU.26.15
reference: Deuteronomy 26:15
source:
  edition: WLC
  text: הַשְׁקִיפָ/ה֩ מִ/מְּע֨וֹן קָדְשְׁ/ךָ֜ מִן הַ/שָּׁמַ֗יִם וּ/בָרֵ֤ךְ אֶֽת עַמְּ/ךָ֙
    אֶת יִשְׂרָאֵ֔ל וְ/אֵת֙ הָ/אֲדָמָ֔ה אֲשֶׁ֥ר נָתַ֖תָּה לָ֑/נוּ כַּ/אֲשֶׁ֤ר נִשְׁבַּ֨עְתָּ֙
    לַ/אֲבֹתֵ֔י/נוּ אֶ֛רֶץ זָבַ֥ת חָלָ֖ב וּ/דְבָֽשׁ־־־׃ס
translation:
  text: Look down from your holy dwelling, from heaven, and bless your people Israel
    and the ground that you have given us, as you swore to our fathers, a land flowing
    with milk and honey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our ancestors.' The Hebrew says 'our fathers,' referring to the patriarchs.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְׁקִיפָה
  chosen: Look down
  alternatives:
  - Look
  - Gaze down
  - Look out
  lexicon: HALOT
  rationale: The imperative asks God to direct his attention from above toward the
    speaker's situation. 'Look down' captures both the visual sense and the heavenly
    vantage point implied by the following phrases.
- source_word: מִמְּעוֹן קָדְשְׁךָ
  chosen: from your holy dwelling
  alternatives:
  - from your holy habitation
  - from your holy abode
  lexicon: HALOT
  rationale: מָעוֹן denotes a dwelling place or habitation. 'Holy dwelling' is natural
    modern English and preserves the sacred character marked by קָדְשְׁךָ.
- source_word: מִן הַשָּׁמַיִם
  chosen: from heaven
  alternatives:
  - from the heavens
  lexicon: HALOT
  rationale: Though formally plural in Hebrew, הַשָּׁמַיִם is commonly rendered idiomatically
    as singular 'heaven' in English in locative expressions like this. This avoids
    awkwardness while preserving meaning.
- source_word: וּבָרֵךְ
  chosen: and bless
  alternatives:
  - and bestow blessing on
  lexicon: HALOT
  rationale: A straightforward imperative of ברך. 'Bless' is the standard and most
    transparent rendering.
- source_word: עַמְּךָ אֶת יִשְׂרָאֵל
  chosen: your people Israel
  alternatives:
  - your people, Israel
  - your people, namely Israel
  lexicon: HALOT
  rationale: The appositional structure identifies the people as Israel. 'Your people
    Israel' is concise and natural, preserving both covenantal possession and national
    identity.
- source_word: הָאֲדָמָה
  chosen: the ground
  alternatives:
  - the land
  - the soil
  lexicon: HALOT
  rationale: אֲדָמָה often refers to arable ground/soil, distinct from אֶרֶץ later
    in the verse. Rendering it 'ground' preserves the lexical distinction within the
    verse while still fitting the agricultural context of firstfruits and produce.
- source_word: אֲשֶׁר נָתַתָּה לָנוּ
  chosen: that you have given us
  alternatives:
  - which you gave us
  - that you gave to us
  lexicon: HALOT
  rationale: The perfect verb can be rendered with English present perfect to express
    the enduring gift already granted. This reads naturally in prayer while preserving
    completed divine action with present relevance.
- source_word: כַּאֲשֶׁר נִשְׁבַּעְתָּ לַאֲבֹתֵינוּ
  chosen: as you swore to our fathers
  alternatives:
  - just as you swore to our ancestors
  lexicon: HALOT
  rationale: The comparison recalls God's oath to the patriarchs. 'Fathers' matches
    the masculine plural source and the covenantal formula common in the Pentateuch;
    it is gender-accurate per project philosophy.
- source_word: אֶרֶץ זָבַת חָלָב וּדְבָשׁ
  chosen: a land flowing with milk and honey
  alternatives:
  - a land that flows with milk and honey
  lexicon: HALOT
  rationale: This is a conventional Hebrew idiom for abundance and fertility. 'A land
    flowing with milk and honey' is the established English equivalent and remains
    clear and accurate.
