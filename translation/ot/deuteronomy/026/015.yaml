theological_decisions:
- issue: Rendering of לַאֲבֹתֵינוּ in covenant formula
  chosen_reading: our fathers
  alternative_readings:
  - our ancestors
  rationale: The Hebrew explicitly uses the masculine term 'fathers' in a standard
    covenantal expression referring to the patriarchs. Following the project's gender-accurate
    principle, the main text retains 'fathers,' while the broader sense can be noted
    as an alternative.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
