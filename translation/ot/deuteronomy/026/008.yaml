id: DEU.26.8
reference: Deuteronomy 26:8
source:
  edition: WLC
  text: וַ/יּוֹצִאֵ֤/נוּ יְהוָה֙ מִ/מִּצְרַ֔יִם בְּ/יָ֤ד חֲזָקָה֙ וּ/בִ/זְרֹ֣עַ נְטוּיָ֔ה
    וּ/בְ/מֹרָ֖א גָּדֹ֑ל וּ/בְ/אֹת֖וֹת וּ/בְ/מֹפְתִֽים׃
translation:
  text: And the LORD brought us out of Egypt with a strong hand and an outstretched
    arm, and with great terror, and with signs and wonders.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with great awe' or 'with great awe-inspiring deeds.' The Hebrew term
      can denote fear, terror, or an awe-producing display.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצִאֵנוּ
  chosen: brought us out
  alternatives:
  - led us out
  - took us out
  lexicon: HALOT
  rationale: From יצא in the Hiphil, meaning to cause to go out or bring out. 'Brought
    us out' is idiomatic English and preserves the exodus motif without unnecessary
    paraphrase.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the Septuagintal pattern.
- source_word: מִמִּצְרַיִם
  chosen: out of Egypt
  alternatives:
  - from Egypt
  lexicon: HALOT
  rationale: With the verb 'brought out,' 'out of Egypt' best reflects the preposition
    and the exodus context in natural English.
- source_word: בְּיָד חֲזָקָה
  chosen: with a strong hand
  alternatives:
  - by a mighty hand
  - with a mighty hand
  lexicon: HALOT
  rationale: A conventional Hebrew idiom for powerful action. 'Strong hand' is a transparent
    rendering of the adjective חֲזָקָה, while remaining natural in English. 'Mighty
    hand' is possible, but 'strong' stays closer to the source adjective.
- source_word: וּבִזְרֹעַ נְטוּיָה
  chosen: and an outstretched arm
  alternatives:
  - and with an outstretched arm
  - and with an extended arm
  lexicon: HALOT
  rationale: Another exodus idiom for divine power in action. 'Outstretched arm' is
    the standard and clear English equivalent of זְרוֹעַ נְטוּיָה.
- source_word: וּבְמֹרָא גָּדֹל
  chosen: and with great terror
  alternatives:
  - and with great awe-inspiring deeds
  - and with great dread
  lexicon: HALOT
  rationale: מוֹרָא can denote fear, terror, or awe-inspiring display. In the exodus-plague
    context, the emphasis is on acts that inspire dread. 'Great terror' preserves
    the force of the noun without over-interpreting it as merely subjective fear or
    as generalized 'awesome deeds'.
- source_word: וּבְאֹתוֹת
  chosen: and with signs
  alternatives:
  - and with miraculous signs
  lexicon: HALOT
  rationale: אוֹתוֹת commonly means 'signs.' The miraculous sense is contextually
    present, but 'signs' is sufficient and avoids adding words not explicit in the
    Hebrew.
- source_word: וּבְמֹפְתִים
  chosen: and wonders
  alternatives:
  - and miracles
  - and portents
  lexicon: HALOT
  rationale: מוֹפְתִים is often paired with 'signs' as 'signs and wonders.' This preserves
    the established collocation while remaining faithful to the Hebrew.
