theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This preserves reverential convention and aligns with the translation's
    stated policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of מוֹרָא in the exodus formula
  chosen_reading: great terror
  alternative_readings:
  - great awe
  - great awe-inspiring deeds
  rationale: The term can cover fear, terror, or awe-inspiring manifestation. In this
    context, where the LORD's acts against Egypt are in view, 'great terror' best
    preserves the severity and experiential impact of those acts without reducing
    them to a vague sense of wonder.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source-text sense
    and avoid paraphrase beyond what the text warrants'
