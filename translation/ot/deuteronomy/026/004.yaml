id: DEU.26.4
reference: Deuteronomy 26:4
source:
  edition: WLC
  text: וְ/לָקַ֧ח הַ/כֹּהֵ֛ן הַ/טֶּ֖נֶא מִ/יָּדֶ֑/ךָ וְ/הִ֨נִּיח֔/וֹ לִ/פְנֵ֕י מִזְבַּ֖ח
    יְהוָ֥ה אֱלֹהֶֽי/ךָ׃
translation:
  text: Then the priest shall take the basket from your hand and set it down before
    the altar of the LORD your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְלָקַח
  chosen: Then ... shall take
  alternatives:
  - and ... shall take
  - and ... takes
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in procedural/legal sequence is
    naturally rendered as a future/modal step in English ('shall take'). 'Then' brings
    out the sequential force of waw in this ritual context more idiomatically than
    a bare 'and.'
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Definite singular noun referring to the officiating priest in the ritual.
- source_word: הַטֶּנֶא
  chosen: the basket
  alternatives:
  - the container
  lexicon: HALOT
  rationale: טֶּנֶא denotes a basket, specifically the container holding the firstfruits
    in this context. 'Basket' is the plain and established sense.
- source_word: מִיָּדֶךָ
  chosen: from your hand
  alternatives:
  - out of your hand
  lexicon: HALOT
  rationale: Literal expression indicating transfer from the offerer's possession
    to the priest. 'From your hand' is natural English and preserves the concrete
    imagery.
- source_word: וְהִנִּיחוֹ
  chosen: and set it down
  alternatives:
  - and place it
  - and lay it down
  lexicon: HALOT
  rationale: Hiphil of נוח here means to place/set down. 'Set it down' captures the
    physical action clearly in modern English; the object suffix refers back to the
    basket.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in front of
  - in the presence of
  lexicon: HALOT
  rationale: Standard cultic/spatial preposition meaning 'before' in relation to the
    altar.
- source_word: מִזְבַּח
  chosen: the altar
  lexicon: HALOT
  rationale: Standard rendering for sacrificial altar; definite in English because
    it is specified by the following divine name phrase.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Second masculine singular pronominal suffix retained; covenantal address
    is personal and direct.
