id: DEU.26.11
reference: Deuteronomy 26:11
source:
  edition: WLC
  text: וְ/שָׂמַחְתָּ֣ בְ/כָל הַ/טּ֗וֹב אֲשֶׁ֧ר נָֽתַן לְ/ךָ֛ יְהוָ֥ה אֱלֹהֶ֖י/ךָ
    וּ/לְ/בֵיתֶ֑/ךָ אַתָּה֙ וְ/הַ/לֵּוִ֔י וְ/הַ/גֵּ֖ר אֲשֶׁ֥ר בְּ/קִרְבֶּֽ/ךָ־־׃ס
translation:
  text: And you shall rejoice in all the good that the LORD your God has given to
    you and to your household—you, and the Levite, and the sojourner who is among
    you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the resident foreigner.' The Hebrew גֵּר refers to a non-Israelite living
      among Israel under its protection.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׂמַחְתָּ
  chosen: And you shall rejoice
  alternatives:
  - And you shall be glad
  - And you shall celebrate
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional context functions
    as an injunctive/future command. 'Rejoice' preserves both the emotional and covenantal-festive
    sense better than the flatter 'be glad' or the more event-specific 'celebrate'.
- source_word: בְּכָל הַטּוֹב
  chosen: in all the good
  alternatives:
  - over all the good things
  - because of all the good
  lexicon: HALOT
  rationale: The phrase is idiomatic for rejoicing with respect to the totality of
    blessing received. 'In all the good' stays close to the Hebrew while remaining
    natural English; 'good things' is possible but slightly more interpretive.
- source_word: אֲשֶׁר נָתַן לְךָ
  chosen: that ... has given to you
  alternatives:
  - that ... gave you
  lexicon: HALOT
  rationale: The relative clause with נתן is straightforward. Present perfect in English
    fits the completed action with present result in this liturgical setting. 'To
    you' is retained for transparency to the Hebrew dative.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name יְהוָה is rendered 'the LORD' rather
    than transliterated.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Standard covenantal expression; the pronominal suffix is preserved.
- source_word: וּלְבֵיתֶךָ
  chosen: and to your household
  alternatives:
  - and to your house
  lexicon: HALOT
  rationale: '''Household'' better conveys the social/familial unit intended by בַּיִת
    here, not merely the physical structure.'
- source_word: אַתָּה
  chosen: you
  lexicon: HALOT
  rationale: 'The pronoun is explicit in Hebrew for emphasis. It is retained in apposition
    within the list: ''you, and the Levite, and the sojourner...''.'
- source_word: הַלֵּוִי
  chosen: the Levite
  lexicon: HALOT
  rationale: A member of the tribe of Levi, especially in cultic/social dependence
    contexts. 'Levite' is the standard precise rendering.
- source_word: הַגֵּר
  chosen: the sojourner
  alternatives:
  - the resident foreigner
  - the stranger
  lexicon: HALOT
  rationale: גֵּר denotes a non-native resident living among Israel under its protection.
    'Sojourner' preserves the legal-social nuance with biblical continuity; 'stranger'
    can sound too temporary or vague, and 'resident foreigner' is accurate but less
    readable.
- source_word: אֲשֶׁר בְּקִרְבֶּךָ
  chosen: who is among you
  alternatives:
  - who is in your midst
  lexicon: HALOT
  rationale: '''Among you'' is idiomatic modern English for בקרבך while preserving
    the communal inclusion emphasized in the verse.'
