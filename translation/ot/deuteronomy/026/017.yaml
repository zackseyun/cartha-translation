id: DEU.26.17
reference: Deuteronomy 26:17
source:
  edition: WLC
  text: אֶת יְהוָ֥ה הֶאֱמַ֖רְתָּ הַ/יּ֑וֹם לִ/הְיוֹת֩ לְ/ךָ֨ לֵֽ/אלֹהִ֜ים וְ/לָ/לֶ֣כֶת בִּ/דְרָכָ֗י/ו וְ/לִ/שְׁמֹ֨ר חֻקָּ֧י/ו וּ/מִצְוֺתָ֛י/ו וּ/מִשְׁפָּטָ֖י/ו וְ/לִ/שְׁמֹ֥עַ בְּ/קֹלֽ/וֹ־׃
translation:
  text: Today you have declared Yahweh to be your God, and that you will walk in his ways, keep his statutes, his commandments, and his judgments, and obey his voice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this day.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb here is unusual and can be rendered more formally as 'have affirmed' or archaically 'have avouched.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and obey his voice'; the Hebrew literally says 'and listen to his voice,' with an obedience nuance in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הֶאֱמַרְתָּ
  chosen: have declared
  alternatives:
  - have avouched
  - have affirmed
  - have said
  lexicon: HALOT
  rationale: The Hiphil of אמר here is unusual and covenantal in force, indicating a formal declaration or acknowledgment rather than mere speech. 'Have declared' is clear modern English and preserves the solemnity better than archaic 'avouched'.
- source_word: הַיּוֹם
  chosen: Today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: '''Today'' gives the temporal emphasis in natural modern English. ''This day'' is more formal/traditional but less idiomatic.'
- source_word: לִהְיוֹת לְךָ לֵאלֹהִים
  chosen: to be your God
  alternatives:
  - as your God
  - to be God for you
  lexicon: HALOT
  rationale: This infinitive construction expresses covenant relationship. 'To be your God' is the most direct and idiomatic rendering in English.
- source_word: וְלָלֶכֶת בִּדְרָכָיו
  chosen: that you will walk in his ways
  alternatives:
  - and to walk in his ways
  - to live according to his ways
  lexicon: HALOT
  rationale: The idiom 'walk in his ways' is standard biblical covenant language and should be preserved. Adding 'that you will' makes the coordination with the prior declaration explicit in English.
- source_word: חֻקָּיו
  chosen: his statutes
  alternatives:
  - his decrees
  lexicon: HALOT
  rationale: '''Statutes'' is a conventional and sufficiently transparent rendering for חֻקִּים in legal/covenantal contexts.'
- source_word: מִצְוֺתָיו
  chosen: his commandments
  alternatives:
  - his commands
  lexicon: HALOT
  rationale: '''Commandments'' preserves the formal covenantal/legal register better than the slightly flatter ''commands''.'
- source_word: מִשְׁפָּטָיו
  chosen: his judgments
  alternatives:
  - his rules
  - his ordinances
  lexicon: HALOT
  rationale: מִשְׁפָּטִים can denote legal decisions or ordinances. 'Judgments' keeps the lexical connection to judicial order and avoids collapsing it into the other legal terms.
- source_word: וְלִשְׁמֹעַ בְּקֹלוֹ
  chosen: and listen to his voice
  alternatives:
  - and obey his voice
  - and heed his voice
  lexicon: HALOT
  rationale: שׁמע with 'voice' often carries the sense of obedient hearing. 'Listen to his voice' preserves the literal wording, while the obedience nuance remains available from context; 'obey' would be interpretive.
