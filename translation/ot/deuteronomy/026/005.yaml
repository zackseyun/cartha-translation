id: DEU.26.5
reference: Deuteronomy 26:5
source:
  edition: WLC
  text: וְ/עָנִ֨יתָ וְ/אָמַרְתָּ֜ לִ/פְנֵ֣י יְהוָ֣ה אֱלֹהֶ֗י/ךָ אֲרַמִּי֙ אֹבֵ֣ד אָבִ֔/י
    וַ/יֵּ֣רֶד מִצְרַ֔יְמָ/ה וַ/יָּ֥גָר שָׁ֖ם בִּ/מְתֵ֣י מְעָ֑ט וַֽ/יְהִי שָׁ֕ם לְ/ג֥וֹי
    גָּד֖וֹל עָצ֥וּם וָ/רָֽב׀־׃
translation:
  text: And you shall answer and say before the LORD your God, ‘My father was a wandering
    Aramean, and he went down to Egypt and sojourned there, few in number; and there
    he became a great, mighty, and numerous nation.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'My father was a perishing Aramean.' The Hebrew participle can carry
      the sense 'perishing' as well as 'wandering.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְעָנִיתָ
  chosen: you shall answer
  alternatives:
  - you shall respond
  - you shall declare
  lexicon: HALOT
  rationale: ענה in this liturgical setting introduces a formal recitation or response.
    'Answer' preserves the Hebrew idiom and the ceremonial character better than a
    freer 'declare.'
- source_word: וְאָמַרְתָּ
  chosen: and say
  alternatives:
  - and declare
  lexicon: HALOT
  rationale: Kept as 'and say' to reflect the paired Hebrew formula 'answer and say,'
    a conventional introduction to a set confession.
- source_word: לִפְנֵי יְהוָה אֱלֹהֶיךָ
  chosen: before the LORD your God
  alternatives:
  - in the presence of the LORD your God
  lexicon: HALOT
  rationale: '''Before'' is the standard and natural rendering of לִפְנֵי here. YHWH
    is rendered ''the LORD'' per doctrine.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: אֲרַמִּי
  chosen: Aramean
  alternatives:
  - Syrian
  lexicon: HALOT
  rationale: '''Aramean'' is the precise ethnic designation and avoids the historically
    broader and potentially misleading ''Syrian.'''
- source_word: אֹבֵד
  chosen: wandering
  alternatives:
  - perishing
  - about to perish
  - lost
  lexicon: HALOT
  rationale: The participle is famously ambiguous. In this context, with 'my father'
    and followed by migration language, 'wandering' best fits the ancestral confession
    and yields coherent English. The alternative 'perishing' is preserved in a footnote
    because it remains a viable lexical option.
- source_word: אָבִי
  chosen: my father
  alternatives:
  - my ancestor
  lexicon: HALOT
  rationale: The singular 'my father' is retained as the literal and rhetorically
    vivid expression of Israel's ancestor, likely Jacob viewed representatively. 'Ancestor'
    is interpretive and less direct.
- source_word: וַיֵּרֶד מִצְרַיְמָה
  chosen: and he went down to Egypt
  alternatives:
  - and he went to Egypt
  lexicon: HALOT
  rationale: '''Went down'' preserves the Hebrew verb and the conventional directional
    idiom for travel to Egypt.'
- source_word: וַיָּגָר שָׁם
  chosen: and sojourned there
  alternatives:
  - and lived there as a foreigner
  - and stayed there
  lexicon: HALOT
  rationale: גור denotes residing as a resident alien or temporary settler. 'Sojourned'
    preserves that nuance better than the flatter 'stayed.'
- source_word: בִּמְתֵי מְעָט
  chosen: few in number
  alternatives:
  - with few men
  - as a small company
  lexicon: HALOT
  rationale: This idiom refers to smallness of the group rather than specifically
    adult males. 'Few in number' is idiomatic English and captures the sense.
- source_word: וַיְהִי שָׁם לְגוֹי
  chosen: and there he became a nation
  alternatives:
  - and there he became into a nation
  lexicon: HALOT
  rationale: The singular subject reflects the representative ancestor becoming, through
    his descendants, a nation. English requires smoothing the idiom to 'became a nation.'
- source_word: גָּדוֹל עָצוּם וָרָב
  chosen: great, mighty, and numerous
  alternatives:
  - great, strong, and many
  lexicon: HALOT
  rationale: This triad emphasizes size and strength. 'Mighty' for עָצוּם and 'numerous'
    for רָב produce natural English while preserving the cumulative force.
