theological_decisions:
- issue: Interpretation of אֲרַמִּי אֹבֵד אָבִי
  chosen_reading: My father was a wandering Aramean
  alternative_readings:
  - My father was a perishing Aramean
  - An Aramean sought to destroy my father
  rationale: The Hebrew phrase is syntactically compressed and historically debated.
    The participial reading with 'my father' as subject is the most straightforward
    from the Masoretic pointing and fits the liturgical summary of Israel's humble
    origins before descent to Egypt. 'Perishing' remains lexically possible and is
    preserved in a footnote. The rendering 'An Aramean sought to destroy my father'
    reflects a more interpretive construal not demanded by the Hebrew here.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
