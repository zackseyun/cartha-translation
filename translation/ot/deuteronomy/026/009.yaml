id: DEU.26.9
reference: Deuteronomy 26:9
source:
  edition: WLC
  text: וַ/יְבִאֵ֖/נוּ אֶל הַ/מָּק֣וֹם הַ/זֶּ֑ה וַ/יִּתֶּן לָ֨/נוּ֙ אֶת הָ/אָ֣רֶץ
    הַ/זֹּ֔את אֶ֛רֶץ זָבַ֥ת חָלָ֖ב וּ/דְבָֽשׁ־־־׃
translation:
  text: And he brought us to this place and gave us this land, a land flowing with
    milk and honey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'a land abundant in milk and honey'; the Hebrew idiom depicts
      fertility and abundance.
    reason: lexical_alternative
  - marker: b
    text: '''Honey'' may in some contexts include syrup such as date syrup, not only
      bee honey.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיְבִאֵנוּ
  chosen: he brought us
  alternatives:
  - he brought us in
  - he caused us to come
  lexicon: HALOT
  rationale: From בוא in the Hiphil with 1cp suffix, indicating causative movement
    into/unto a destination. 'He brought us' is natural English and preserves the
    causative sense without over-literal awkwardness.
- source_word: אֶל
  chosen: to
  alternatives:
  - into
  lexicon: HALOT
  rationale: The preposition marks movement toward a destination. 'To' fits idiomatic
    English with 'brought us to this place'; 'into' is possible but less natural here.
- source_word: הַמָּקוֹם הַזֶּה
  chosen: this place
  alternatives:
  - this location
  lexicon: HALOT
  rationale: מָקוֹם is 'place.' 'This place' is the standard, clear rendering and
    preserves the demonstrative force of הַזֶּה.
- source_word: וַיִּתֶּן לָנוּ
  chosen: and gave us
  alternatives:
  - and gave to us
  - and granted us
  lexicon: HALOT
  rationale: נתן plus ל marks giving to a recipient. 'Gave us' is straightforward
    and idiomatic; 'granted us' is interpretive and slightly elevated beyond the plain
    lexical sense.
- source_word: אֶת הָאָרֶץ הַזֹּאת
  chosen: this land
  alternatives:
  - this הארץ/land
  - this הארץ/country
  lexicon: HALOT
  rationale: אֶרֶץ can mean land, earth, or country depending on context. Here it
    refers specifically to the promised territory given to Israel, so 'land' is the
    most fitting and traditional contextual sense.
- source_word: אֶרֶץ זָבַת חָלָב וּדְבָשׁ
  chosen: a land flowing with milk and honey
  alternatives:
  - a land oozing milk and honey
  - a land abundant in milk and honey
  lexicon: HALOT
  rationale: The participial expression literally describes a land 'flowing' or 'oozing'
    with milk and honey, an established Hebrew idiom for abundance and fertility.
    'Flowing with milk and honey' preserves the imagery and remains natural modern
    English.
- source_word: דְבָשׁ
  chosen: honey
  alternatives:
  - honey/syrup
  lexicon: HALOT
  rationale: דְבָשׁ commonly denotes honey, though in some contexts it may include
    syrup such as date syrup. The conventional 'honey' is retained in the main text
    because it best matches the idiom and common English recognition; the broader
    possibility is worth noting in a footnote.
