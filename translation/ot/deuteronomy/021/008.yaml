theological_decisions:
- issue: Rendering of YHWH
  chosen_reading: O LORD
  alternative_readings:
  - Yahweh
  - the LORD
  rationale: The project default for יְהוָה is 'the LORD.' In direct address, 'O LORD' preserves that default while fitting English prayer style.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Interpretation of final clause הַדָּם
  chosen_reading: bloodguilt
  alternative_readings:
  - blood
  - guilt for the bloodshed
  rationale: The context is communal expiation for an unsolved murder. Rendering הַדָּם woodenly as 'the blood' in English can obscure that the concern is liability for bloodshed. 'Bloodguilt' makes explicit the juridical sense already present in the Hebrew context without adding foreign theology.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
