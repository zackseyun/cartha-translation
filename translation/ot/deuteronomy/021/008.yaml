id: DEU.21.8
reference: Deuteronomy 21:8
source:
  edition: WLC
  text: כַּפֵּר֩ לְ/עַמְּ/ךָ֨ יִשְׂרָאֵ֤ל אֲשֶׁר פָּדִ֨יתָ֙ יְהוָ֔ה וְ/אַל תִּתֵּן֙ דָּ֣ם נָקִ֔י בְּ/קֶ֖רֶב עַמְּ/ךָ֣ יִשְׂרָאֵ֑ל וְ/נִכַּפֵּ֥ר לָ/הֶ֖ם הַ/דָּֽם־־׃
translation:
  text: Make atonement for your people Israel, whom you redeemed, O Yahweh, and do not set innocent blood in the midst of your people Israel. Then the bloodguilt will be atoned for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and the blood will be atoned for them.' The Hebrew uses 'the blood' as a legal expression for liability arising from bloodshed.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּפֵּר
  chosen: Make atonement
  alternatives:
  - Cover
  - Purge
  lexicon: HALOT
  rationale: Imperative of כפר in a cultic/juridical context is best rendered with the established but still understandable phrase 'make atonement,' which preserves the sacrificial-legal sense better than the more opaque 'cover' or the narrower 'purge.'
- source_word: לְעַמְּךָ יִשְׂרָאֵל
  chosen: for your people Israel
  alternatives:
  - for your people, Israel
  lexicon: HALOT
  rationale: The preposition ל marks the beneficiary of the requested atonement. 'Your people Israel' is natural English and preserves covenantal address.
- source_word: אֲשֶׁר פָּדִיתָ
  chosen: whom you redeemed
  alternatives:
  - whom you ransomed
  - whom you delivered
  lexicon: HALOT
  rationale: פדה commonly carries the sense of redeeming/ransoming from bondage or liability. 'Redeemed' best preserves covenant-redemption language familiar in the Pentateuch.
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְאַל תִּתֵּן
  chosen: and do not let
  alternatives:
  - and do not place
  - and do not set
  - and do not allow
  lexicon: HALOT
  rationale: נתן literally means 'give/put,' but in this idiom with blood in the midst of the people it functions as a request that such guilt not be imposed or remain upon them. 'Do not let' is a clear optimal-equivalence rendering.
- source_word: דָּם נָקִי
  chosen: innocent blood
  alternatives:
  - the blood of the innocent
  lexicon: HALOT
  rationale: This is a standard Hebrew legal expression for bloodshed involving an innocent victim, and 'innocent blood' is the conventional and accurate English equivalent.
- source_word: בְּקֶרֶב עַמְּךָ יִשְׂרָאֵל
  chosen: among your people Israel
  alternatives:
  - in the midst of your people Israel
  lexicon: HALOT
  rationale: בקרב literally means 'in the midst of,' but 'among' is idiomatic modern English and preserves the communal setting.
- source_word: וְנִכַּפֵּר לָהֶם הַדָּם
  chosen: Then the bloodguilt will be atoned for them
  alternatives:
  - and the blood will be atoned for them
  - and it will be forgiven them concerning the blood
  - thus atonement will be made for them for the blood
  lexicon: HALOT
  rationale: 'The Niphal of כפר is passive/resultative: ''be atoned for.'' Although the Hebrew says ''the blood,'' in English this legal idiom is clearer as ''the bloodguilt,'' since the issue is liability for unsolved bloodshed, not literal blood itself. ''Then'' brings out the resultative force of the final clause.'
