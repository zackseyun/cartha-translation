id: DEU.21.3
reference: Deuteronomy 21:3
source:
  edition: WLC
  text: וְ/הָיָ֣ה הָ/עִ֔יר הַ/קְּרֹבָ֖ה אֶל הֶ/חָלָ֑ל וְ/לָֽקְח֡וּ זִקְנֵי֩ הָ/עִ֨יר
    הַ/הִ֜וא עֶגְלַ֣ת בָּקָ֗ר אֲשֶׁ֤ר לֹֽא עֻבַּד֙ בָּ֔/הּ אֲשֶׁ֥ר לֹא מָשְׁכָ֖ה בְּ/עֹֽל־־־׃
translation:
  text: And it shall be that the city nearest to the slain man, the elders of that
    city shall take a heifer from the herd that has not been worked with and has not
    pulled in a yoke.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "to the corpse" or "to the slain one." The Hebrew term refers to a person
      who has been killed.
    reason: lexical_alternative
  - marker: b
    text: Or simply "a heifer." The phrase more fully specifies a young female bovine
      from the cattle herd.
    reason: lexical_alternative
  - marker: c
    text: Literally, "which has not pulled in a yoke," that is, one not previously
      used for draft labor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it shall be that
  alternatives:
  - And it shall happen that
  - Then it shall be
  lexicon: HALOT
  rationale: Uses a natural but still formal English rendering for the Hebrew narrative-legal
    formula introducing the next procedural step.
- source_word: הָעִיר הַקְּרֹבָה
  chosen: the city nearest
  alternatives:
  - the nearest city
  - the city that is closest
  lexicon: HALOT
  rationale: Combines noun and attributive adjective into idiomatic English while
    preserving the superlative sense implied by context.
- source_word: אֶל הֶחָלָל
  chosen: to the slain man
  alternatives:
  - to the slain one
  - to the corpse
  lexicon: HALOT
  rationale: חָלָל denotes one who has been slain. 'Slain man' fits the context of
    an unsolved killing better than the more clinical 'corpse,' while keeping the
    personal reference.
- source_word: וְלָקְחוּ זִקְנֵי הָעִיר הַהִוא
  chosen: the elders of that city shall take
  alternatives:
  - then the elders of that city shall take
  lexicon: HALOT
  rationale: Preserves the legal instruction directed to the recognized civic leaders.
- source_word: עֶגְלַת בָּקָר
  chosen: a heifer from the herd
  alternatives:
  - a young cow
  - a heifer
  lexicon: HALOT
  rationale: עֶגְלָה is a young female bovine, conventionally 'heifer.' Adding 'from
    the herd' reflects בָּקָר and avoids the misleadingly narrow sense of dairy cattle
    in some English contexts.
- source_word: אֲשֶׁר לֹא עֻבַּד בָּהּ
  chosen: that has not been worked with
  alternatives:
  - with which no work has been done
  - that has not been used for labor
  lexicon: HALOT
  rationale: The passive of עבד here refers to labor performed by means of the animal.
    'Worked with' is concise and natural while preserving the instrumental sense.
- source_word: אֲשֶׁר לֹא מָשְׁכָה בְּעֹל
  chosen: and has not pulled in a yoke
  alternatives:
  - and has not drawn with a yoke
  - and has not borne a yoke
  lexicon: HALOT
  rationale: The verb משך means 'draw/pull.' The phrase describes an animal not yet
    used for draft work. 'Pulled in a yoke' communicates the practical sense clearly
    in modern English.
