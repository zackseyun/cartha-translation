id: DEU.21.23
reference: Deuteronomy 21:23
source:
  edition: WLC
  text: לֹא תָלִ֨ין נִבְלָת֜/וֹ עַל הָ/עֵ֗ץ כִּֽי קָב֤וֹר תִּקְבְּרֶ֨/נּוּ֙ בַּ/יּ֣וֹם הַ/ה֔וּא כִּֽי קִלְלַ֥ת אֱלֹהִ֖ים תָּל֑וּי וְ/לֹ֤א תְטַמֵּא֙ אֶת אַדְמָ֣תְ/ךָ֔ אֲשֶׁר֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ נֹתֵ֥ן לְ/ךָ֖ נַחֲלָֽה־־־־־׃ס
translation:
  text: His corpse shall not remain all night on the tree, but you shall surely bury him that same day, for he who is hanged is accursed of God; and you shall not defile your land that Yahweh your God is giving you as an inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for the hanged one is cursed by God'; alternatively, 'for hanging is an affront to God.' The Hebrew phrase is concise and can be understood in more than one way.
    reason: alternative_reading
lexical_decisions:
- source_word: תָלִין
  chosen: shall not remain all night
  alternatives:
  - shall not stay overnight
  - shall not lodge
  lexicon: HALOT
  rationale: The verb from לון in this form refers to spending the night or remaining overnight. 'Remain all night' is natural English and preserves the temporal force of the prohibition.
- source_word: נִבְלָתוֹ
  chosen: his corpse
  alternatives:
  - his body
  - his dead body
  lexicon: HALOT
  rationale: נְבֵלָה denotes a carcass/corpse, emphasizing the dead body rather than a living person. 'Corpse' is more precise than the softer 'body'.
- source_word: עַל הָעֵץ
  chosen: on the tree
  alternatives:
  - upon the tree
  - on the wood
  lexicon: HALOT
  rationale: עֵץ commonly means 'tree' or wood. In this legal context the public display is on a tree/wooden structure; 'tree' is the straightforward rendering and preserves the wording later echoed in biblical tradition.
- source_word: קָבוֹר תִּקְבְּרֶנּוּ
  chosen: you shall surely bury him
  alternatives:
  - you must bury him
  - you shall indeed bury him
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the command. 'Surely bury' preserves the emphatic force without paraphrase.
- source_word: בַּיּוֹם הַהוּא
  chosen: that same day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Idiomatic English prefers 'that same day' here to convey the requirement of burial before nightfall.
- source_word: קִלְלַת אֱלֹהִים
  chosen: God's curse
  alternatives:
  - a curse of God
  - an affront to God
  - cursed by God
  lexicon: HALOT
  rationale: 'The construct phrase is terse and debated. ''God''s curse'' best captures the genitival sense in context: the hanged person stands under divine curse. This also aligns with the verse''s rationale for prompt burial. Alternatives are preserved because the Hebrew could be construed differently.'
- source_word: תָּלוּי
  chosen: a hanged man
  alternatives:
  - one who is hanged
  - the hanged one
  lexicon: HALOT
  rationale: The passive participle means 'hanged' or 'hung up.' Supplying 'man' makes the clause idiomatic in English while reflecting the singular individual in view.
- source_word: תְטַמֵּא
  chosen: defile
  alternatives:
  - make unclean
  - pollute
  lexicon: HALOT
  rationale: טמא in land-purity contexts is well rendered 'defile,' preserving both ritual and moral contamination overtones.
- source_word: אַדְמָתְךָ
  chosen: your land
  alternatives:
  - your ground
  - your soil
  lexicon: HALOT
  rationale: אֲדָמָה can mean ground/soil/land. In covenant-inheritance context, 'land' is the most natural and contextually appropriate rendering.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: נַחֲלָה
  chosen: as an inheritance
  alternatives:
  - for an inheritance
  - as your inheritance
  lexicon: HALOT
  rationale: נַחֲלָה denotes inherited possession. 'As an inheritance' reads naturally while preserving the covenantal land-grant sense.
