theological_decisions:
- issue: Meaning of כִּי קִלְלַת אֱלֹהִים תָּלוּי
  chosen_reading: the hanged person is under God's curse
  alternative_readings:
  - hanging is an affront/curse against God
  - the hanged person is cursed by God
  rationale: The Hebrew construction is compressed and has been understood in more than one way. In this legal context, the most coherent sense is that the publicly hanged criminal bears the sign of divine curse, which explains why the body must not remain exposed and thereby defile the land. The wording avoids over-specifying beyond the Hebrew while preserving the theological force later reflected in Second Temple and New Testament usage.
  doctrine_reference: Preserve theological tension rather than resolve it; document ambiguity and preserve alternatives in footnotes.
