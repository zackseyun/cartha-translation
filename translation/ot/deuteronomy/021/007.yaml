id: DEU.21.7
reference: Deuteronomy 21:7
source:
  edition: WLC
  text: וְ/עָנ֖וּ וְ/אָמְר֑וּ יָדֵ֗י/נוּ לֹ֤א שפכה אֶת הַ/דָּ֣ם הַ/זֶּ֔ה וְ/עֵינֵ֖י/נוּ
    לֹ֥א רָאֽוּ־׃
translation:
  text: Then they shall answer and say, ‘Our hands did not shed this blood, and our
    eyes did not see it.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'this blood.' The phrase is a legal idiom denying responsibility
      for the killing.
    reason: lexical_alternative
  - marker: b
    text: Or 'did not witness it.' Hebrew 'our eyes did not see' uses concrete body-part
      language to deny eyewitness knowledge.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָנוּ
  chosen: Then they shall answer
  alternatives:
  - And they shall answer
  - They shall respond
  lexicon: HALOT
  rationale: ענה in this formulaic legal/declarative context means to answer or respond
    publicly. 'Then' brings out the sequential force of waw in English narrative/legal
    procedure, while 'shall answer' preserves the formal declaration sense.
- source_word: וְאָמְרוּ
  chosen: and say
  alternatives:
  - and declare
  - and say as follows
  lexicon: HALOT
  rationale: אמר is the standard verb 'say.' Paired with ענה it forms a common Hebrew
    expression for making a formal spoken response. 'And say' is natural and sufficiently
    formal without overtranslating.
- source_word: יָדֵינוּ
  chosen: Our hands
  lexicon: HALOT
  rationale: Literal body-part language should be preserved. Here 'hands' is the agentive
    expression for direct responsibility in bloodshed.
- source_word: שָׁפְכָה
  chosen: did not shed
  alternatives:
  - have not shed
  - did not pour out
  lexicon: HALOT
  rationale: שפך with דם is the standard idiom for shedding blood, i.e., killing.
    'Did not shed' is idiomatic English and fits the formal denial. Although the Hebrew
    form is 3fs agreeing with the feminine plural subject 'our hands,' English naturally
    uses the plural subject with auxiliary 'did not shed.'
- source_word: אֶת־הַדָּם הַזֶּה
  chosen: this blood
  alternatives:
  - the blood of this one
  - this bloodshed
  lexicon: HALOT
  rationale: The direct object is literally 'this blood.' In context it refers to
    the murder under investigation, but the Hebrew does not explicitly say 'bloodshed'
    or 'the blood of this man.' Retaining 'this blood' preserves the concrete legal
    idiom.
- source_word: וְעֵינֵינוּ
  chosen: and our eyes
  lexicon: HALOT
  rationale: Literal body-part language is retained. 'Eyes' here denotes eyewitness
    knowledge, and the concrete expression should remain visible in translation.
- source_word: לֹא רָאוּ
  chosen: did not see it
  alternatives:
  - have not seen
  - did not witness it
  lexicon: HALOT
  rationale: ראה means 'see.' Because English normally requires an object here for
    clarity, 'it' is supplied, referring to the bloodshed/murder. 'Witness' is interpretive
    and slightly narrower than the Hebrew, so it is kept as an alternative rather
    than the main text.
