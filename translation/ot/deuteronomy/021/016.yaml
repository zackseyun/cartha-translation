id: DEU.21.16
reference: Deuteronomy 21:16
source:
  edition: WLC
  text: וְ/הָיָ֗ה בְּ/יוֹם֙ הַנְחִיל֣/וֹ אֶת בָּנָ֔י/ו אֵ֥ת אֲשֶׁר יִהְיֶ֖ה ל֑/וֹ
    לֹ֣א יוּכַ֗ל לְ/בַכֵּר֙ אֶת בֶּן הָ֣/אֲהוּבָ֔ה עַל פְּנֵ֥י בֶן הַ/שְּׂנוּאָ֖ה
    הַ/בְּכֹֽר־־־־־־׃
translation:
  text: And on the day he gives his sons as an inheritance what belongs to him, he
    may not treat the son of the loved wife as firstborn over the son of the hated
    wife, who is the firstborn.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the son of the unloved wife' or 'the less loved wife.' The Hebrew literally
      contrasts 'loved' and 'hated,' but in family-law contexts the latter can denote
      one who is comparatively less favored rather than actively detested.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And ...
  alternatives:
  - And it shall be
  - Now it shall be
  lexicon: HALOT
  rationale: Introduces a legal case or circumstance. In English law-style discourse,
    a simple connective 'And' with the temporal clause communicates the force without
    woodenly preserving 'it shall be.'
- source_word: בְּיוֹם
  chosen: on the day
  alternatives:
  - when
  lexicon: HALOT
  rationale: Literally 'on the day'; retained because it is idiomatic enough in English
    and preserves the formal legal-temporal framing of the Hebrew.
- source_word: הַנְחִילוֹ
  chosen: he gives his sons as an inheritance
  alternatives:
  - he causes his sons to inherit
  - he apportions an inheritance to his sons
  lexicon: HALOT
  rationale: The Hiphil of נחל denotes causing to inherit or assigning inheritance.
    'Gives his sons as an inheritance' is not idiomatic, so 'gives his sons as an
    inheritance what belongs to him' clarifies the object while preserving the causative
    sense.
- source_word: אֵת אֲשֶׁר יִהְיֶה לוֹ
  chosen: what belongs to him
  alternatives:
  - what he has
  - that which is his
  lexicon: HALOT
  rationale: Refers to the estate/property in his possession. 'What belongs to him'
    is natural modern English and suitably precise.
- source_word: לֹא יוּכַל
  chosen: he may not
  alternatives:
  - he is not able to
  - he cannot
  lexicon: HALOT
  rationale: In legal context, the phrase expresses prohibition or lack of legal right,
    not mere incapacity. 'He may not' best captures the normative force.
- source_word: לְבַכֵּר
  chosen: treat ... as firstborn
  alternatives:
  - make ... the firstborn
  - declare ... firstborn
  - give the rights of the firstborn to
  lexicon: HALOT
  rationale: The Piel of בכר here means to accord firstborn status/rights. 'Treat
    ... as firstborn' is concise and preserves the legal sense without over-expanding
    beyond the Hebrew.
- source_word: בֶּן הָאֲהוּבָה
  chosen: the son of the loved wife
  alternatives:
  - the son of the loved one
  - the son of the favored wife
  lexicon: HALOT
  rationale: The passive participle means 'loved.' Supplying 'wife' in English is
    contextually warranted from the preceding law about two wives and avoids ambiguity.
- source_word: עַל פְּנֵי
  chosen: over
  alternatives:
  - in preference to
  - before
  lexicon: HALOT
  rationale: In this legal comparison, the phrase marks preference or precedence.
    'Over' is concise and natural, while the context makes the preferential sense
    clear.
- source_word: בֶן הַשְּׂנוּאָה
  chosen: the son of the hated wife
  alternatives:
  - the son of the unloved wife
  - the son of the less loved wife
  lexicon: HALOT
  rationale: The participle from שׂנא literally means 'hated.' Although in some contexts
    it can denote being less loved, the immediate contrast with 'loved' supports the
    stronger antonym in the main text. The softer alternative is worth preserving
    in a footnote because English readers may hear emotional hostility more strongly
    than the Hebrew legal/familial contrast requires.
- source_word: הַבְּכֹר
  chosen: who is the firstborn
  alternatives:
  - the firstborn
  lexicon: HALOT
  rationale: Rendered with a relative sense in English to make clear that the final
    term identifies the son of the hated wife as the actual firstborn.
