theological_decisions:
- issue: Rendering of relational contrast in polygynous household law
  chosen_reading: Retain 'loved wife' and 'hated wife' in the main text
  alternative_readings:
  - '''favored wife'' and ''unfavored wife'''
  - '''loved'' and ''less loved'''
  rationale: This is not a doctrinally contested term in DOCTRINE.md, but it is interpretively
    sensitive. The Hebrew uses a strong antonym pair, and the translation should not
    soften it in the main text without necessity. A footnote preserves the idiomatic
    alternative that may better reflect comparative affection in some contexts.
  doctrine_reference: Translation philosophy §§1, 3, 6
