id: DEU.21.1
reference: Deuteronomy 21:1
source:
  edition: WLC
  text: כִּי יִמָּצֵ֣א חָלָ֗ל בָּ/אֲדָמָה֙ אֲשֶׁר֩ יְהוָ֨ה אֱלֹהֶ֜י/ךָ נֹתֵ֤ן לְ/ךָ֙ לְ/רִשְׁתָּ֔/הּ נֹפֵ֖ל בַּ/שָּׂדֶ֑ה לֹ֥א נוֹדַ֖ע מִ֥י הִכָּֽה/וּ־׃
translation:
  text: If a slain man is found in the land that Yahweh your God is giving you to possess, lying in the open field, and it is not known who struck him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'When a slain person is found ...' The Hebrew is grammatically masculine singular ('a slain man'), though the law's principle concerns an unidentified homicide generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a casuistic law condition. English legal style is well served by 'If,' though 'When' is also possible.
- source_word: יִמָּצֵא
  chosen: is found
  alternatives:
  - is discovered
  lexicon: HALOT
  rationale: Niphal of מצא is naturally passive/reflexive here; 'is found' is the standard and most direct legal rendering.
- source_word: חָלָל
  chosen: a slain man
  alternatives:
  - a slain person
  - a corpse
  - one slain
  lexicon: HALOT
  rationale: In this context the noun denotes a person killed violently, not merely a dead body. 'Slain man' preserves the violent sense and the grammatically masculine singular form; 'corpse' would undertranslate the homicide context.
- source_word: בָּאֲדָמָה
  chosen: in the land
  alternatives:
  - on the ground
  - in the soil
  lexicon: HALOT
  rationale: Here אֲדָמָה refers to the land/territory Israel is inheriting, not merely dirt or soil, as shown by the following relative clause.
- source_word: אֲשֶׁר יְהוָה אֱלֹהֶיךָ נֹתֵן לְךָ לְרִשְׁתָּהּ
  chosen: that the LORD your God is giving you to possess
  alternatives:
  - which the LORD your God gives you to inherit
  lexicon: HALOT
  rationale: Uses the doctrine-required rendering 'the LORD' for YHWH. 'Giving you to possess' reflects the participle plus infinitive construction in idiomatic modern English while retaining covenant-land language.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md.
- source_word: נֹפֵל
  chosen: lying
  alternatives:
  - fallen
  lexicon: HALOT
  rationale: Although literally 'fallen,' in English 'lying' better conveys the state of the slain body in the field without implying a recent motion. This is an optimal-equivalence adjustment.
- source_word: בַּשָּׂדֶה
  chosen: in the open field
  alternatives:
  - in the field
  lexicon: HALOT
  rationale: '''Open field'' captures the sense of a rural, uncultivated or uninhabited area and is a natural English legal-narrative expression.'
- source_word: לֹא נוֹדַע
  chosen: it is not known
  alternatives:
  - it remains unknown
  - it has not become known
  lexicon: HALOT
  rationale: Impersonal passive is the clearest English equivalent for the Niphal construction.
- source_word: מִי הִכָּהוּ
  chosen: who struck him
  alternatives:
  - who killed him
  - who attacked him
  lexicon: HALOT
  rationale: The Hebrew verb נכה is literally 'strike/smite.' Since the homicide is already conveyed by חָלָל, 'struck him' preserves the lexical distinction without redundancy; 'killed him' is interpretive but possible.
