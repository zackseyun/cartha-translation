id: DEU.21.4
reference: Deuteronomy 21:4
source:
  edition: WLC
  text: וְ/הוֹרִ֡דוּ זִקְנֵי֩ הָ/עִ֨יר הַ/הִ֤וא אֶת הָֽ/עֶגְלָה֙ אֶל נַ֣חַל אֵיתָ֔ן
    אֲשֶׁ֛ר לֹא יֵעָבֵ֥ד בּ֖/וֹ וְ/לֹ֣א יִזָּרֵ֑עַ וְ/עָֽרְפוּ שָׁ֥ם אֶת הָ/עֶגְלָ֖ה
    בַּ/נָּֽחַל־־־־־׃
translation:
  text: Then the elders of that city shall bring the heifer down to a wadi with running
    water, which is neither worked nor sown, and there in the wadi they shall break
    the heifer’s neck.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to a perennial wadi,' 'to a ravine with an ever-flowing stream.' The
      Hebrew phrase נַחַל אֵיתָן likely refers to a wadi or ravine characterized by
      enduring flow, not merely rough terrain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹרִדוּ
  chosen: shall bring ... down
  alternatives:
  - shall lead ... down
  - shall take ... down
  lexicon: HALOT
  rationale: Hiphil of ירד means to cause to go down/bring down. 'Bring ... down'
    preserves the causative sense and the likely movement to a lower-lying ravine
    or streambed.
- source_word: זִקְנֵי הָעִיר הַהִוא
  chosen: the elders of that city
  alternatives:
  - the elders of that town
  lexicon: HALOT
  rationale: Standard rendering of the construct phrase; 'city' is the usual gloss
    for עִיר and fits the legal setting.
- source_word: הָעֶגְלָה
  chosen: the heifer
  alternatives:
  - the young cow
  lexicon: HALOT
  rationale: עגלה denotes a young female bovine. 'Heifer' is precise and conventional
    in sacrificial/legal contexts.
- source_word: אֶל נַחַל אֵיתָן
  chosen: to a wadi with running water
  alternatives:
  - to a perennial wadi
  - to a rugged ravine
  - to a valley with an ever-flowing stream
  lexicon: HALOT
  rationale: נחל commonly refers to a wadi/streambed/ravine. אֵיתָן can mean enduring,
    perennial, or ever-flowing in this context. 'Wadi with running water' communicates
    both the geographical feature and the sense that it is not a dry seasonal bed.
    This balances precision and readability better than the traditional but potentially
    misleading 'rough valley.'
- source_word: אֲשֶׁר לֹא יֵעָבֵד בּוֹ
  chosen: which is neither worked
  alternatives:
  - which is not cultivated
  - where no labor is done
  lexicon: HALOT
  rationale: The Niphal of עבד here refers to being worked or cultivated agriculturally.
    'Neither worked' pairs naturally with the following 'nor sown' and keeps the passive
    sense.
- source_word: וְלֹא יִזָּרֵעַ
  chosen: nor sown
  alternatives:
  - nor planted
  - and not seeded
  lexicon: HALOT
  rationale: Passive of זרע, specifically agricultural sowing. 'Nor sown' is concise
    and idiomatic in English.
- source_word: וְעָרְפוּ
  chosen: they shall break ... neck
  alternatives:
  - they shall decapitate
  - they shall strike the neck
  lexicon: HALOT
  rationale: ערף in this ritual context means to break the neck from behind rather
    than the more general 'slaughter.' Rendering the action explicitly avoids obscuring
    the distinctive rite.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Simple locative adverb; 'there' is the natural English equivalent.
- source_word: בַּנָּחַל
  chosen: in the wadi
  alternatives:
  - in the ravine
  - by the streambed
  lexicon: HALOT
  rationale: Repeats נחל from earlier in the verse; keeping 'wadi' maintains consistency
    and preserves the specific terrain term.
