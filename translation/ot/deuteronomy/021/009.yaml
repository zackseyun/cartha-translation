id: DEU.21.9
reference: Deuteronomy 21:9
source:
  edition: WLC
  text: וְ/אַתָּ֗ה תְּבַעֵ֛ר הַ/דָּ֥ם הַ/נָּקִ֖י מִ/קִּרְבֶּ֑/ךָ כִּֽי תַעֲשֶׂ֥ה הַ/יָּשָׁ֖ר
    בְּ/עֵינֵ֥י יְהוָֽה־׃ס
translation:
  text: So you shall purge the innocent blood from your midst, because you shall do
    what is right in the eyes of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'remove the blood of the innocent from among you.' The Hebrew idiom 'innocent
      blood' can imply the community's liability for unatoned bloodshed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתָּה
  chosen: So you
  alternatives:
  - And you
  - You
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun gives an emphatic transition/conclusion.
    'So you' captures the discourse force in natural English better than a bare 'and
    you,' while preserving the direct second-person singular address.
- source_word: תְּבַעֵר
  chosen: shall purge
  alternatives:
  - shall remove
  - shall burn away
  - shall purge away
  lexicon: HALOT
  rationale: בער in the Piel commonly carries the sense of removing or purging evil/bloodguilt
    from the community in Deuteronomic legal contexts. 'Purge' preserves the covenant-legal
    force better than the flatter 'remove.'
- source_word: הַ/דָּם הַ/נָּקִי
  chosen: the innocent blood
  alternatives:
  - the blood of the innocent
  - innocent bloodguilt
  lexicon: HALOT
  rationale: Literally 'the innocent blood.' In context this refers to bloodshed for
    which guilt would otherwise remain on the community. The literal rendering is
    retained because it is idiomatic enough in English and preserves the legal-moral
    imagery.
- source_word: מִ/קִּרְבֶּךָ
  chosen: from your midst
  alternatives:
  - from among you
  - out of your midst
  lexicon: HALOT
  rationale: A standard covenantal/judicial expression in Deuteronomy. 'From your
    midst' is slightly more formal but remains readable and preserves the communal
    sense.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - when
  lexicon: HALOT
  rationale: Here כִּי gives the ground or basis for the preceding command/result.
    'Because' makes the causal relationship explicit in contemporary English.
- source_word: תַעֲשֶׂה
  chosen: you shall do
  alternatives:
  - you do
  - you will do
  lexicon: HALOT
  rationale: The imperfect here is rendered with modal-future force in legal instruction.
    'You shall do' matches the prescriptive tone of the passage.
- source_word: הַ/יָּשָׁר
  chosen: what is right
  alternatives:
  - the right
  - what is upright
  lexicon: HALOT
  rationale: The adjective functions substantivally. 'What is right' is the most natural
    and accurate English equivalent in this ethical context.
- source_word: בְּ/עֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: A common Hebrew idiom for divine evaluation. 'In the eyes of the LORD'
    is transparent and preserves the metaphor. Per doctrine, יְהוָה is rendered 'the
    LORD.'
