id: DEU.21.5
reference: Deuteronomy 21:5
source:
  edition: WLC
  text: וְ/נִגְּשׁ֣וּ הַ/כֹּהֲנִים֮ בְּנֵ֣י לֵוִי֒ כִּ֣י בָ֗/ם בָּחַ֞ר יְהוָ֤ה אֱלֹהֶ֨י/ךָ֙ לְ/שָׁ֣רְת֔/וֹ וּ/לְ/בָרֵ֖ךְ בְּ/שֵׁ֣ם יְהוָ֑ה וְ/עַל פִּי/הֶ֥ם יִהְיֶ֖ה כָּל רִ֥יב וְ/כָל נָֽגַע־־־׃
translation:
  text: And the priests, the sons of Levi, shall come forward, for Yahweh your God has chosen them to minister to him and to bless in the name of Yahweh, and by their word every dispute and every injury shall be settled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every injury,' 'every stroke,' or 'every affliction.' The Hebrew term is broader than 'assault' but in this legal setting likely refers to cases involving bodily harm.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִגְּשׁוּ
  chosen: shall come forward
  alternatives:
  - shall approach
  - shall come near
  lexicon: HALOT
  rationale: The Niphal of נגשׁ here introduces the priests' formal involvement in the legal-ritual procedure. 'Come forward' is natural modern English and preserves the sense of approaching for official action better than the more wooden 'come near.'
- source_word: הַכֹּהֲנִים בְּנֵי לֵוִי
  chosen: the priests, the sons of Levi
  alternatives:
  - the Levitical priests
  - the priests, the Levites
  lexicon: HALOT
  rationale: The Hebrew apposition is preserved most transparently as 'the priests, the sons of Levi.' 'Levitical priests' is smoother but slightly more interpretive; this rendering keeps the source structure visible while remaining readable.
- source_word: כִּי בָם בָּחַר
  chosen: for ... has chosen them
  alternatives:
  - because ... chose them
  lexicon: HALOT
  rationale: כִּי gives the reason for priestly authority. The perfect verb is well represented by English present perfect in this explanatory context, highlighting the abiding result of God's prior choice.
- source_word: יְהוָה אֱלֹהֶיךָ
  chosen: the LORD your God
  alternatives:
  - Yahweh your God
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The covenant formula is standardly and accurately represented as 'the LORD your God.'
- source_word: לְשָׁרְתוֹ
  chosen: to minister to him
  alternatives:
  - to serve him
  lexicon: HALOT
  rationale: שרת in priestly contexts often denotes cultic service. 'Minister to him' preserves the formal sacred sense better than the broader 'serve him,' while still being accessible English.
- source_word: וּלְבָרֵךְ בְּשֵׁם יְהוָה
  chosen: and to bless in the name of the LORD
  alternatives:
  - and to pronounce blessing in the name of the LORD
  - and to bless by the name of the LORD
  lexicon: HALOT
  rationale: This phrase refers to priestly blessing performed under divine authority. 'Bless in the name of the LORD' is the most direct and idiomatic rendering.
- source_word: וְעַל פִּיהֶם
  chosen: and by their word
  alternatives:
  - and according to their mouth
  - and on their authority
  - and according to their decision
  lexicon: HALOT
  rationale: Literally 'upon their mouth,' an idiom for authoritative pronouncement or decision. 'By their word' preserves the speech-based idiom while sounding natural in English. 'On their authority' is possible but less tied to the Hebrew expression.
- source_word: יִהְיֶה
  chosen: shall be settled
  alternatives:
  - shall be
  - shall stand
  - shall be decided
  lexicon: HALOT
  rationale: Although the verb is simply 'shall be,' English requires an implied predicate in this legal context. 'Shall be settled' brings out the judicial force of the clause without overparaphrasing.
- source_word: כָּל רִיב
  chosen: every dispute
  alternatives:
  - every case
  - every controversy
  - every quarrel
  lexicon: HALOT
  rationale: רִיב commonly denotes a legal dispute or controversy. 'Every dispute' is broad enough to fit the legal setting and readable in modern English.
- source_word: וְכָל נָגַע
  chosen: every assault
  alternatives:
  - every injury
  - every affliction
  - every stroke
  lexicon: HALOT
  rationale: נֶגַע literally denotes a blow, stroke, or affliction. In parallel with רִיב in a judicial context, it likely refers to cases involving bodily injury or violent assault. 'Assault' best captures the forensic sense in contemporary English, while a footnote preserves the more literal alternatives.
