id: DEU.21.14
reference: Deuteronomy 21:14
source:
  edition: WLC
  text: וְ/הָיָ֞ה אִם לֹ֧א חָפַ֣צְתָּ בָּ֗/הּ וְ/שִׁלַּחְתָּ/הּ֙ לְ/נַפְשָׁ֔/הּ וּ/מָכֹ֥ר
    לֹא תִמְכְּרֶ֖/נָּה בַּ/כָּ֑סֶף לֹא תִתְעַמֵּ֣ר בָּ֔/הּ תַּ֖חַת אֲשֶׁ֥ר עִנִּיתָֽ/הּ־־־׃ס
translation:
  text: But if it happens that you do not delight in her, then you shall let her go
    where she wishes; you must certainly not sell her for money. You must not treat
    her as merchandise, because you have humiliated her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you shall let her go free,' literally 'you shall send her away for
      herself.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'You must not exploit her for gain.' The Hebrew verb is rare and likely
      carries the sense of treating her as an object of economic use.
    reason: lexical_alternative
  - marker: c
    text: Or, 'because you have violated her.' The Hebrew can denote affliction, humiliation,
      or sexual violation depending on context.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה אִם
  chosen: But if it happens that
  alternatives:
  - And if
  - Now if it happens that
  lexicon: HALOT
  rationale: Introduces a conditional development from the prior law. 'But' captures
    the contrastive flow in English, while 'it happens' reflects וְהָיָה idiomatically
    without over-literal awkwardness.
- source_word: לֹא חָפַצְתָּ בָּהּ
  chosen: you do not delight in her
  alternatives:
  - you no longer desire her
  - you do not want her
  lexicon: HALOT
  rationale: חפץ conveys taking pleasure in, desiring, or delighting in. 'Delight
    in' preserves the personal-affective sense without becoming crassly sexualized;
    'no longer desire' is possible but adds 'no longer,' which is not explicit.
- source_word: וְשִׁלַּחְתָּהּ לְנַפְשָׁהּ
  chosen: you shall let her go where she wishes
  alternatives:
  - you shall send her away on her own
  - you shall let her go free
  lexicon: HALOT
  rationale: Literally 'send her to/for herself.' The idiom indicates release to her
    own freedom/disposal. 'Where she wishes' communicates the sense naturally in English;
    'let her go free' is also valid but less explicit about personal agency.
- source_word: וּמָכֹר לֹא תִמְכְּרֶנָּה בַּכָּסֶף
  chosen: you must certainly not sell her for money
  alternatives:
  - you shall not sell her at all for silver
  - you must not sell her for payment
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the prohibition.
    'Must certainly not sell' captures that emphasis. בַּכָּסֶף is literally 'for
    silver/money'; 'money' is the clearest modern equivalent.
- source_word: לֹא תִתְעַמֵּר בָּהּ
  chosen: You must not treat her as merchandise
  alternatives:
  - you must not deal harshly with her
  - you must not make a slave of her
  - you must not exploit her for gain
  lexicon: HALOT
  rationale: The verb עמר in this stem is rare and contextually tied to commercial
    or domineering exploitation. In parallel with the ban on selling her, 'treat her
    as merchandise' best captures the economic-objectifying force. Alternatives like
    'deal harshly' are too broad; 'make a slave of her' is interpretive and narrower
    than the likely sense.
- source_word: תַּחַת אֲשֶׁר
  chosen: because
  alternatives:
  - since
  - in return for the fact that
  lexicon: HALOT
  rationale: This construction gives the ground for the prohibition. 'Because' is
    the most natural causal rendering in English.
- source_word: עִנִּיתָהּ
  chosen: you have humiliated her
  alternatives:
  - you have violated her
  - you have afflicted her
  - you have humbled her
  lexicon: HALOT
  rationale: ענה in the piel can denote afflicting, humiliating, or violating, especially
    in sexual contexts. Here the context is marital/sexual taking of the captive woman.
    'Humiliated' preserves the moral injury without overstating to a narrower legal
    category the text does not explicitly specify; 'violated' is a strong contextual
    alternative worth preserving in a footnote.
