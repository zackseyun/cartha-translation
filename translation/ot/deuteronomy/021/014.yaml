theological_decisions:
- issue: Ethical force of the law regarding the captive woman
  chosen_reading: Render the verse as restricting the man's power over the woman after
    sexual/marital union, without softening the coercive context or importing later
    doctrinal conclusions.
  alternative_readings:
  - Render in a way that implies a consensual divorce only
  - Render in a way that explicitly labels the act as rape in the main text
  rationale: The verse itself regulates release and forbids commodification because
    the woman has been 'humiliated/afflicted.' The translation should preserve the
    text's own moral logic and gravity without either sanitizing the coercive setting
    or making the main text more specific than the Hebrew wording requires.
  doctrine_reference: Translation philosophy §§1, 3, 6
