theological_decisions:
- issue: Gendered civic term in legal context
  chosen_reading: all the men of his city
  alternative_readings:
  - all the people of his city
  - all the citizens of his city
  rationale: The Hebrew phrase is explicitly masculine ('men of his city'). In keeping
    with the translation philosophy's gender-accurate principle, the masculine form
    is retained rather than generalized. This reflects the source wording without
    making a broader doctrinal claim about gender roles beyond the text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Deuteronomic purge formula
  chosen_reading: purge the evil from your midst
  alternative_readings:
  - remove the evil from among you
  rationale: This recurring covenant-legal formula carries communal and moral force.
    'Purge' preserves the solemn judicial register and the formulaic continuity within
    Deuteronomy better than a flatter 'remove.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
