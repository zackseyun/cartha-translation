id: DEU.21.21
reference: Deuteronomy 21:21
source:
  edition: WLC
  text: וּ֠/רְגָמֻ/הוּ כָּל אַנְשֵׁ֨י עִיר֤/וֹ בָֽ/אֲבָנִים֙ וָ/מֵ֔ת וּ/בִֽעַרְתָּ֥
    הָ/רָ֖ע מִ/קִּרְבֶּ֑/ךָ וְ/כָל יִשְׂרָאֵ֖ל יִשְׁמְע֥וּ וְ/יִרָֽאוּ־־׃ס
translation:
  text: Then all the men of his city shall stone him with stones, and he shall die.
    So you shall purge the evil from your midst, and all Israel shall hear and fear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the people of his city'; Hebrew literally, 'all the men of his city.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּרְגָמֻהוּ
  chosen: shall stone him
  alternatives:
  - must stone him
  - shall pelt him with stones
  lexicon: HALOT
  rationale: רגם in legal/judicial contexts refers specifically to execution by stoning.
    'Shall stone him' is the clearest idiomatic legal rendering in English.
- source_word: כָּל אַנְשֵׁי עִירוֹ
  chosen: all the men of his city
  alternatives:
  - all the people of his city
  - all the citizens of his city
  lexicon: HALOT
  rationale: אַנְשֵׁי is literally 'men of.' In this legal setting it refers to the
    male members of the town acting corporately. Per gender-accurate policy, 'men'
    is retained rather than neutralizing to 'people,' since the Hebrew is grammatically
    and semantically masculine.
- source_word: בָאֲבָנִים
  chosen: with stones
  alternatives:
  - by stoning
  - with rocks
  lexicon: HALOT
  rationale: The prepositional phrase specifies the means of execution. 'With stones'
    preserves the concrete Hebrew expression; English legal style often uses this
    wording.
- source_word: וָמֵת
  chosen: and he shall die
  alternatives:
  - so that he dies
  - and he dies
  lexicon: HALOT
  rationale: The clause states the result of the stoning. 'And he shall die' preserves
    the legal-sequential force without overinterpreting it as purpose.
- source_word: וּבִעַרְתָּ
  chosen: you shall purge
  alternatives:
  - you shall remove
  - you shall burn away
  lexicon: HALOT
  rationale: בער in Deuteronomic legal formulae idiomatically means removing or purging
    evil from the community, not literal burning here. 'Purge' best captures the covenant-legal
    formula.
- source_word: הָרָע
  chosen: the evil
  alternatives:
  - the wrongdoing
  - the wickedness
  lexicon: HALOT
  rationale: The singular abstract noun in this recurring formula is best rendered
    'the evil,' preserving the formal legal-moral category used throughout Deuteronomy.
- source_word: מִקִּרְבֶּךָ
  chosen: from your midst
  alternatives:
  - from among you
  - out of your community
  lexicon: HALOT
  rationale: '''From your midst'' is a standard, transparent rendering of the covenant-community
    idiom and fits the Deuteronomic formula well.'
- source_word: יִשְׁמְעוּ
  chosen: shall hear
  alternatives:
  - will hear
  - shall learn of it
  lexicon: HALOT
  rationale: The verb is simply 'hear.' Although the sense includes hearing about
    the event, the Hebrew does not explicitly add 'of it,' so the more direct rendering
    is preferred.
- source_word: וְיִרָאוּ
  chosen: and fear
  alternatives:
  - and be afraid
  - and stand in fear
  lexicon: HALOT
  rationale: ירא here denotes fear in response to judicial warning. 'Fear' preserves
    both the emotional and covenantal deterrent sense without narrowing it to mere
    fright.
