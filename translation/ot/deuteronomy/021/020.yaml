id: DEU.21.20
reference: Deuteronomy 21:20
source:
  edition: WLC
  text: וְ/אָמְר֞וּ אֶל זִקְנֵ֣י עִיר֗/וֹ בְּנֵ֤/נוּ זֶה֙ סוֹרֵ֣ר וּ/מֹרֶ֔ה אֵינֶ֥/נּוּ
    שֹׁמֵ֖עַ בְּ/קֹלֵ֑/נוּ זוֹלֵ֖ל וְ/סֹבֵֽא־׃
translation:
  text: Then they shall say to the elders of his city, ‘This son of ours is stubborn
    and rebellious; he does not listen to our voice; he is a glutton and a drunkard.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he does not obey us.' The Hebrew idiom is literally 'he does not listen
      to our voice,' where listening carries the sense of heeding or obeying.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמְרוּ
  chosen: Then they shall say
  alternatives:
  - And they shall say
  - and they must say
  lexicon: HALOT
  rationale: Wayyiqtol/Qal perfect with prefixed conjunction continues the legal procedure
    sequence. 'Then they shall say' gives natural English in case-law style while
    preserving the procedural force.
- source_word: זִקְנֵי עִירוֹ
  chosen: the elders of his city
  alternatives:
  - the elders of his town
  lexicon: HALOT
  rationale: זִקְנֵי is the governing body of older men/leaders; 'elders' is the standard
    and accurate rendering. עִיר can mean city or town; 'city' is retained for consistency
    with common legal-administrative usage in Deuteronomy.
- source_word: בְּנֵנוּ זֶה
  chosen: This son of ours
  alternatives:
  - This our son
  - This son, ours
  lexicon: HALOT
  rationale: The demonstrative plus construct with pronominal suffix is naturally
    rendered 'This son of ours.' This preserves the emphatic identification without
    archaic English.
- source_word: סוֹרֵר
  chosen: stubborn
  alternatives:
  - wayward
  - defiant
  lexicon: HALOT
  rationale: The participle denotes one who turns aside, is stubbornly resistant,
    or wayward. 'Stubborn' fits the legal accusation and pairs well with the following
    term.
- source_word: וּמֹרֶה
  chosen: rebellious
  alternatives:
  - defiant
  - recalcitrant
  lexicon: HALOT
  rationale: This participle intensifies the son's resistance as active rebellion,
    not mere immaturity. 'Rebellious' is the clearest modern English equivalent and
    preserves the legal-moral force.
- source_word: אֵינֶנּוּ שֹׁמֵעַ בְּקֹלֵנוּ
  chosen: he does not listen to our voice
  alternatives:
  - he does not obey us
  - he does not heed our voice
  lexicon: HALOT
  rationale: Literally 'he is not listening to our voice.' 'Listen to our voice' preserves
    the Hebrew idiom and its obedience nuance; 'obey us' is interpretive, so it is
    kept as an alternative rather than the main text.
- source_word: זוֹלֵל
  chosen: a glutton
  alternatives:
  - gluttonous
  - a squanderer
  lexicon: HALOT
  rationale: In context, paired with 'drunkard,' the term denotes a gluttonous person
    rather than merely a squanderer. The nominal English 'a glutton' matches the accusatory
    list.
- source_word: וְסֹבֵא
  chosen: a drunkard
  alternatives:
  - a heavy drinker
  - drunken
  lexicon: HALOT
  rationale: The participle denotes one given to drink. 'A drunkard' is the established
    and accurate English equivalent in this vice-pairing and best reflects the habitual
    sense.
