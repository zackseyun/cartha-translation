id: DEU.21.22
reference: Deuteronomy 21:22
source:
  edition: WLC
  text: וְ/כִֽי יִהְיֶ֣ה בְ/אִ֗ישׁ חֵ֛טְא מִשְׁפַּט מָ֖וֶת וְ/הוּמָ֑ת וְ/תָלִ֥יתָ
    אֹת֖/וֹ עַל עֵֽץ־־־׃
translation:
  text: And if in a man there is a sin deserving death, and he is put to death, and
    you hang him on a tree,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'worthy of death' or 'under a sentence of death.' The Hebrew phrase
      is literally 'a sin/judgment of death.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'on a stake.' The Hebrew literally says 'on a tree.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כִי
  chosen: And if
  alternatives:
  - If
  - Now if
  lexicon: HALOT
  rationale: Introduces a conditional case with simple narrative linkage. 'And if'
    preserves the Hebrew conjunction plus conditional particle without overloading
    the English.
- source_word: יִהְיֶה
  chosen: there is
  alternatives:
  - there happens to be
  - is found
  lexicon: HALOT
  rationale: The verb היה here expresses existence/state rather than simple future.
    'There is' gives natural English while preserving the casuistic force.
- source_word: בְ/אִישׁ
  chosen: in a man
  alternatives:
  - in someone
  - with a man
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and refers to an individual
    male person in legal case style. Per gender-accurate policy, 'man' is retained
    rather than neutralizing to 'someone.' The preposition ב is preserved with 'in,'
    reflecting the idiom 'there is in a man.'
- source_word: חֵטְא
  chosen: a sin
  alternatives:
  - an offense
  - a crime
  lexicon: HALOT
  rationale: חטא broadly denotes sin/offense. 'Sin' preserves the moral-legal dimension
    of the Hebrew and avoids narrowing too quickly to merely civil crime.
- source_word: מִשְׁפַּט מָוֶת
  chosen: deserving death
  alternatives:
  - worthy of death
  - the judgment of death
  - a death sentence
  lexicon: HALOT
  rationale: The construct phrase literally means something like 'a judgment of death.'
    In idiomatic English legal style, 'deserving death' communicates that the offense
    is capital. 'Worthy of death' is possible but slightly archaic; 'death sentence'
    could imply the judicial process more specifically than the Hebrew requires.
- source_word: וְ/הוּמָת
  chosen: and he is put to death
  alternatives:
  - and he is executed
  - and he is killed
  lexicon: HALOT
  rationale: The Hophal of מות is passive/causative passive. 'Put to death' is a clear,
    formal legal rendering that matches the judicial context better than the broader
    'killed' and is less interpretively loaded than 'executed,' though that sense
    is present.
- source_word: וְ/תָלִיתָ
  chosen: and you hang
  alternatives:
  - and you shall hang
  - and you suspend
  lexicon: HALOT
  rationale: The verb תלה means to hang/suspend. Present-tense English in legal casuistic
    style ('you hang') naturally conveys the instruction. 'Suspend' is too technical
    and less idiomatic.
- source_word: אֹת/וֹ
  chosen: him
  lexicon: HALOT
  rationale: Direct-object pronoun referring to the condemned man.
- source_word: עַל עֵץ
  chosen: on a tree
  alternatives:
  - on wood
  - on a stake
  lexicon: HALOT
  rationale: עֵץ ordinarily means 'tree' or wood. 'On a tree' is the standard and
    most transparent rendering, and it preserves the wording later echoed in biblical
    tradition. 'Stake' is possible in some contexts but is too specific here without
    stronger contextual warrant.
