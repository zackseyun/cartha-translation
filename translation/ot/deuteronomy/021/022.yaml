theological_decisions:
- issue: Gendered legal subject
  chosen_reading: a man
  alternative_readings:
  - someone
  - a person
  rationale: The Hebrew uses אישׁ, a masculine singular legal subject. Following the
    translation philosophy's gender-accurate principle, the masculine form is retained
    rather than neutralized.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering of עַל עֵץ
  chosen_reading: on a tree
  alternative_readings:
  - on a stake
  rationale: The phrase is rendered literally to preserve the Hebrew wording and its
    later intertextual significance in Scripture, without importing a narrower reconstruction
    of the execution device.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
