theological_decisions:
- issue: Ambiguity of the phrase וְעָשְׂתָה אֶת צִפָּרְנֶיהָ
  chosen_reading: The woman is instructed to trim/attend her nails.
  alternative_readings:
  - The woman is instructed to let her nails grow.
  rationale: The Hebrew literally says 'and she shall do/make her nails,' which is
    idiomatic and debated. The translation keeps a natural English rendering in the
    main text while preserving the alternative in a footnote, in keeping with the
    policy of preserving genuine ambiguity rather than overstating certainty.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological
    tension rather than resolve it)
