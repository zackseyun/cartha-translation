id: DEU.21.12
reference: Deuteronomy 21:12
source:
  edition: WLC
  text: וַ/הֲבֵאתָ֖/הּ אֶל תּ֣וֹךְ בֵּיתֶ֑/ךָ וְ/גִלְּחָה֙ אֶת רֹאשָׁ֔/הּ וְ/עָשְׂתָ֖ה
    אֶת צִפָּרְנֶֽי/הָ־־־׃
translation:
  text: then you shall bring her into the midst of your house, and she shall shave
    her head and trim her nails.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and let her nails grow.' The Hebrew literally reads, 'and she shall
      do her nails,' which is idiomatic and debated.
    reason: alternative_reading
lexical_decisions:
- source_word: וַהֲבֵאתָהּ
  chosen: then you shall bring her
  alternatives:
  - and you shall bring her
  - then you must bring her
  lexicon: HALOT
  rationale: 'Hiphil perfect with prefixed waw in legal sequence functions as the
    next required action: ''then you shall bring her.'' ''Bring'' is the plain sense
    of בוא in Hiphil. ''Then'' captures the sequential force in English law-style
    discourse.'
- source_word: אֶל תּוֹךְ בֵּיתֶךָ
  chosen: into the midst of your house
  alternatives:
  - into your house
  - inside your house
  lexicon: HALOT
  rationale: תּוֹךְ literally denotes the interior/middle. 'Into the midst of your
    house' preserves the Hebrew emphasis more closely than the smoother 'into your
    house,' while remaining understandable.
- source_word: וְגִלְּחָה אֶת רֹאשָׁהּ
  chosen: and she shall shave her head
  alternatives:
  - and she shall shave off her hair
  - and she shall shave her head bare
  lexicon: HALOT
  rationale: גלח commonly means 'shave.' With 'her head' as object, the idiomatic
    English is 'shave her head.' This avoids overtranslation while preserving the
    concrete action.
- source_word: וְעָשְׂתָה אֶת צִפָּרְנֶיהָ
  chosen: and trim her nails
  alternatives:
  - and do her nails
  - and pare her nails
  - and let her nails grow
  lexicon: HALOT
  rationale: 'עשה with ''nails'' is idiomatic and has been understood in two main
    ways: attending/trimming the nails or letting them grow. The immediate legal-ritual
    context and common English clarity favor ''trim her nails'' in the main text.
    Because the Hebrew expression is not fully explicit, the major alternative ''let
    her nails grow'' is preserved in a footnote.'
