id: DEU.21.11
reference: Deuteronomy 21:11
source:
  edition: WLC
  text: וְ/רָאִיתָ֙ בַּ/שִּׁבְיָ֔ה אֵ֖שֶׁת יְפַת תֹּ֑אַר וְ/חָשַׁקְתָּ֣ בָ֔/הּ וְ/לָקַחְתָּ֥
    לְ/ךָ֖ לְ/אִשָּֽׁה־׃
translation:
  text: and you see among the captives a woman beautiful in form, and you desire her
    and take her for yourself as a wife,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a woman of beautiful appearance.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'take her for yourself as a wife,' an idiom for marrying her.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/רָאִיתָ
  chosen: and you see
  alternatives:
  - and you look and see
  - and you notice
  lexicon: HALOT
  rationale: Qal perfect 2ms in this legal casuistic sequence functions with conditional/temporal
    force under the preceding context ('when ... and ...'). Present English 'you see'
    fits legal style better than a simple past while preserving the directness of
    the Hebrew.
- source_word: בַּ/שִּׁבְיָה
  chosen: among the captives
  alternatives:
  - in the captivity
  - among the prisoners of war
  lexicon: HALOT
  rationale: The noun refers to the body of captives taken in war. 'Among the captives'
    is idiomatic and reflects the locative sense of the preposition plus article.
    'Prisoners of war' is possible but slightly more interpretive than the Hebrew
    wording.
- source_word: אֵשֶׁת יְפַת תֹּאַר
  chosen: a woman beautiful in form
  alternatives:
  - a beautiful woman
  - a woman of beautiful appearance
  lexicon: HALOT
  rationale: The construct phrase literally denotes 'a woman of beautiful form/appearance.'
    'Beautiful in form' preserves the Hebrew emphasis on physical appearance more
    transparently than the flatter 'beautiful woman.'
- source_word: תֹּאַר
  chosen: form
  alternatives:
  - appearance
  - figure
  lexicon: HALOT
  rationale: The term denotes outward form or appearance. 'Form' keeps the phrase
    concise and close to the Hebrew; 'appearance' is also viable and is preserved
    as an alternative.
- source_word: וְ/חָשַׁקְתָּ בָהּ
  chosen: and you desire her
  alternatives:
  - and you are attracted to her
  - and you set your desire on her
  lexicon: HALOT
  rationale: The verb conveys strong desire or attachment. 'Desire' is the most direct
    and natural rendering here without softening the force into mere attraction.
- source_word: וְ/לָקַחְתָּ לְ/ךָ לְ/אִשָּׁה
  chosen: and take her for yourself as a wife
  alternatives:
  - and take her as your wife
  - and marry her
  lexicon: HALOT
  rationale: The Hebrew literally says 'take for yourself for a wife,' an idiom for
    marriage. 'Take her for yourself as a wife' preserves the idiom's form and the
    reflexive nuance of לְךָ better than the more interpretive 'marry her.'
