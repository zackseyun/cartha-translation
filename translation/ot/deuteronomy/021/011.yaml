theological_decisions:
- issue: Rendering a morally difficult legal text without either euphemizing or importing
    judgments not explicit in the verse
  chosen_reading: Retain the plain legal description of desire and taking as wife
  alternative_readings:
  - Soften to 'choose her to be your wife'
  - Expand to make explicit coercion or approval
  rationale: The verse describes a wartime legal scenario in straightforward terms.
    The translation should neither sanitize the man's desire/taking nor add evaluative
    language not present in the Hebrew. This preserves the text's ethical tension
    rather than resolving it.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
