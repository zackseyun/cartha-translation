theological_decisions:
- issue: Legal/sexual idiom in a difficult warfare-marriage law
  chosen_reading: Retain the idiom 'go in to her' and explicit marital language without
    softening the text into mere romance or hardening it beyond what the Hebrew states.
  alternative_readings:
  - translate more euphemistically as 'marry her'
  - translate more starkly as 'have sexual relations with her'
  rationale: The verse regulates marriage to a captive woman after a waiting period.
    The Hebrew distinguishes the sexual/marital approach ('go in to her') from the
    resulting status ('be her husband' / 'she shall be your wife'). Preserving both
    elements maintains the legal and moral texture of the text without importing claims
    the verse itself does not make.
  doctrine_reference: Translation philosophy items 1 and 3
