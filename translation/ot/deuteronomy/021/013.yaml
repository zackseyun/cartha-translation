id: DEU.21.13
reference: Deuteronomy 21:13
source:
  edition: WLC
  text: וְ/הֵסִ֩ירָה֩ אֶת שִׂמְלַ֨ת שִׁבְיָ֜/הּ מֵ/עָלֶ֗י/הָ וְ/יָֽשְׁבָה֙ בְּ/בֵיתֶ֔/ךָ
    וּ/בָֽכְתָ֛ה אֶת אָבִ֥י/הָ וְ/אֶת אִמָּ֖/הּ יֶ֣רַח יָמִ֑ים וְ/אַ֨חַר כֵּ֜ן תָּב֤וֹא
    אֵלֶ֨י/הָ֙ וּ/בְעַלְתָּ֔/הּ וְ/הָיְתָ֥ה לְ/ךָ֖ לְ/אִשָּֽׁה־־־׃
translation:
  text: She shall remove the clothing of her captivity from herself and remain in
    your house, and mourn her father and her mother for a full month. After that you
    may go in to her and be her husband, and she shall be your wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the garments of her captivity' or 'the clothes she wore when captured.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵסִירָה
  chosen: She shall remove
  alternatives:
  - and she shall take off
  - then she shall put away
  lexicon: HALOT
  rationale: Hiphil of סור here is causative/removal language. 'Remove' is clear modern
    English and preserves the directive force.
- source_word: שִׂמְלַת שִׁבְיָהּ
  chosen: the clothing of her captivity
  alternatives:
  - her captive's clothing
  - the clothes she wore when captured
  - the garments of her captivity
  lexicon: HALOT
  rationale: Literally 'the garment/clothing of her captivity.' This likely refers
    to the attire associated with her captive status or former condition. 'Clothing
    of her captivity' preserves the Hebrew genitive without over-interpreting.
- source_word: מֵעָלֶיהָ
  chosen: from herself
  alternatives:
  - from upon her
  - off her
  lexicon: HALOT
  rationale: Literally 'from upon her.' 'From herself' is idiomatic enough in context
    with 'remove,' while reflecting the reflexive sense.
- source_word: וְיָשְׁבָה בְּבֵיתֶךָ
  chosen: and remain in your house
  alternatives:
  - and sit in your house
  - and dwell in your house
  - and stay in your house
  lexicon: HALOT
  rationale: ישב commonly means sit, dwell, remain. In this legal context, 'remain
    in your house' communicates continued residence without sounding wooden.
- source_word: וּבָכְתָה
  chosen: and mourn
  alternatives:
  - and weep for
  - and cry over
  lexicon: HALOT
  rationale: While the verb is 'weep,' English 'mourn' better captures the bereavement
    context introduced by mention of father and mother.
- source_word: אֶת אָבִיהָ וְאֶת אִמָּהּ
  chosen: her father and her mother
  alternatives:
  - for her father and her mother
  lexicon: HALOT
  rationale: Direct-object marker with verbs of weeping can imply mourning over the
    persons named. English requires an idiomatic rendering; the object is retained
    in natural form after 'mourn.'
- source_word: יֶרַח יָמִים
  chosen: for a full month
  alternatives:
  - for a month of days
  - for one month
  lexicon: HALOT
  rationale: The idiom literally means 'a month of days,' i.e., a full month. 'Full
    month' preserves the idiomatic emphasis better than a bare 'month.'
- source_word: וְאַחַר כֵּן
  chosen: After that
  alternatives:
  - and after that
  - then afterward
  lexicon: HALOT
  rationale: Straightforward temporal sequence marker.
- source_word: תָּבֹא אֵלֶיהָ
  chosen: you may go in to her
  alternatives:
  - you shall go in to her
  - you may come to her
  lexicon: HALOT
  rationale: '''Go in to'' is the standard idiom for sexual relations and should be
    preserved. ''May'' reflects legal permission in context better than a simple future
    in English.'
- source_word: וּבְעַלְתָּהּ
  chosen: and be her husband
  alternatives:
  - and marry her
  - and possess her as husband
  lexicon: HALOT
  rationale: From בעל in this stem/context, the sense is entering the husband-role.
    'Be her husband' is more formally transparent than simply 'marry her,' while avoiding
    misleading ownership connotations.
- source_word: וְהָיְתָה לְךָ לְאִשָּׁה
  chosen: and she shall be your wife
  alternatives:
  - and she shall become your wife
  lexicon: HALOT
  rationale: Standard covenantal/marital formulation in Hebrew. 'She shall be your
    wife' is natural and sufficiently formal.
