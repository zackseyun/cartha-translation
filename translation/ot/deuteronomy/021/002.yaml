id: DEU.21.2
reference: Deuteronomy 21:2
source:
  edition: WLC
  text: וְ/יָצְא֥וּ זְקֵנֶ֖י/ךָ וְ/שֹׁפְטֶ֑י/ךָ וּ/מָדְדוּ֙ אֶל הֶ֣/עָרִ֔ים אֲשֶׁ֖ר
    סְבִיבֹ֥ת הֶ/חָלָֽל־׃
translation:
  text: then your elders and your judges shall go out and measure the distance to
    the cities that are around the slain man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'measure to the cities that are around the slain one.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָצְאוּ
  chosen: then ... shall go out
  alternatives:
  - and ... shall go out
  - and ... go out
  lexicon: HALOT
  rationale: The waw + qatal continues the legal procedure in sequence; 'then' brings
    out the procedural force in natural English while preserving the action 'go out'.
- source_word: זְקֵנֶיךָ
  chosen: your elders
  alternatives:
  - the elders of your people
  lexicon: HALOT
  rationale: Literally 'your elders,' addressed to Israel/covenant community in the
    singular. 'Your elders' preserves the second-person singular suffix and the representative
    corporate address.
- source_word: וְשֹׁפְטֶיךָ
  chosen: and your judges
  alternatives:
  - and your officials
  lexicon: HALOT
  rationale: The participial/plural form from שׁפט refers to those exercising judicial
    authority. 'Judges' is the most direct and contextually appropriate rendering
    in this legal setting.
- source_word: וּמָדְדוּ
  chosen: measure the distance
  alternatives:
  - measure
  - take measurements
  lexicon: HALOT
  rationale: The verb means 'measure.' Adding 'the distance' makes explicit in idiomatic
    English what is being measured in relation to the surrounding cities, without
    materially expanding the sense.
- source_word: אֶל הֶעָרִים
  chosen: to the cities
  alternatives:
  - toward the cities
  - as far as the cities
  lexicon: HALOT
  rationale: The preposition אֶל with the measuring verb indicates the cities as the
    termini of measurement. 'To the cities' is the most natural concise rendering.
- source_word: אֲשֶׁר סְבִיבֹת
  chosen: that are around
  alternatives:
  - that are surrounding
  - which are all around
  lexicon: HALOT
  rationale: This relative construction identifies the nearby cities encircling the
    location of the corpse. 'That are around' is clear modern English.
- source_word: הֶחָלָל
  chosen: the slain man
  alternatives:
  - the slain one
  - the corpse
  - the murdered man
  lexicon: HALOT
  rationale: חָלָל commonly denotes one who has been slain. In this context of an
    unidentified homicide victim, 'the slain man' preserves the lexical sense better
    than the more neutral 'corpse' and avoids overstating with 'murdered' before the
    legal process establishes details.
