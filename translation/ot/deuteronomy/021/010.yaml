id: DEU.21.10
reference: Deuteronomy 21:10
source:
  edition: WLC
  text: כִּֽי תֵצֵ֥א לַ/מִּלְחָמָ֖ה עַל אֹיְבֶ֑י/ךָ וּ/נְתָנ֞/וֹ יְהוָ֧ה אֱלֹהֶ֛י/ךָ בְּ/יָדֶ֖/ךָ וְ/שָׁבִ֥יתָ שִׁבְיֽ/וֹ־־׃
translation:
  text: When you go out to war against your enemies, and Yahweh your God gives them into your hand, and you take them captive,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'gives him/it into your hand'; the singular suffix likely refers collectively to the enemy force, hence 'them' in English.
    reason: lexical_alternative
  - marker: b
    text: Or 'and you capture captives from them.' The Hebrew uses a cognate verb-noun expression for taking prisoners.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - If
  lexicon: HALOT
  rationale: Here כִּי introduces a situational clause heading a case law scenario. 'When' fits the legal/casuistic force in context better than a more conditional-sounding 'if,' while remaining faithful to the Hebrew.
- source_word: תֵצֵא
  chosen: you go out
  alternatives:
  - you go forth
  lexicon: HALOT
  rationale: The verb יָצָא is literally 'go out.' 'You go out' preserves the concrete movement and reads naturally in modern English.
- source_word: לַמִּלְחָמָה
  chosen: to war
  alternatives:
  - to battle
  - for war
  lexicon: HALOT
  rationale: The prepositional phrase is idiomatically rendered 'to war' in English, preserving the military sense without unnecessary stiffness.
- source_word: עַל אֹיְבֶיךָ
  chosen: against your enemies
  alternatives:
  - upon your enemies
  lexicon: HALOT
  rationale: עַל with hostile action is naturally 'against.' 'Enemies' straightforwardly renders אֹיֵב in the plural construct with 2ms suffix.
- source_word: וּנְתָנוֹ
  chosen: gives them
  alternatives:
  - delivers him
  - delivers them
  lexicon: HALOT
  rationale: Though the suffix on the verb is singular ('him/it'), the antecedent 'your enemies' is plural and the construction is a common collective usage. English smooths this to plural 'them.' 'Gives' reflects נתן directly; 'delivers' is possible but slightly more interpretive.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Standard covenantal expression; 'your God' accurately renders the noun with 2ms suffix.
- source_word: בְּיָדֶךָ
  chosen: into your hand
  alternatives:
  - into your power
  - into your control
  lexicon: HALOT
  rationale: The idiom 'into your hand' is common in Hebrew for giving over into someone's power. It is sufficiently transparent in English and preserves the source imagery.
- source_word: וְשָׁבִיתָ
  chosen: and you take
  alternatives:
  - and you capture
  - and you carry off
  lexicon: HALOT
  rationale: From שָׁבָה, 'take captive/capture.' Because the following cognate noun specifies captivity, 'take' avoids redundancy while allowing the full phrase 'take them captive.'
- source_word: שִׁבְיוֹ
  chosen: them captive
  alternatives:
  - his captives
  - its captivity
  - captives from them
  lexicon: HALOT
  rationale: The noun שְׁבִי means 'captivity/captive(s).' With the singular suffix referring collectively to the enemy force, the idiomatic English sense is that Israel takes captives from the defeated enemies. 'Take them captive' best communicates the result in natural English.
