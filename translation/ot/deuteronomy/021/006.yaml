id: DEU.21.6
reference: Deuteronomy 21:6
source:
  edition: WLC
  text: וְ/כֹ֗ל זִקְנֵי֙ הָ/עִ֣יר הַ/הִ֔וא הַ/קְּרֹבִ֖ים אֶל הֶ/חָלָ֑ל יִרְחֲצוּ֙
    אֶת יְדֵי/הֶ֔ם עַל הָ/עֶגְלָ֖ה הָ/עֲרוּפָ֥ה בַ/נָּֽחַל־־־׃
translation:
  text: And all the elders of that city nearest to the slain man shall wash their
    hands over the heifer whose neck was broken in the wadi.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'nearest to the corpse.' The Hebrew term can denote a slain person or
      the corpse of one slain; here 'slain man' was chosen to keep the homicide context
      explicit.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the valley' or 'in the streambed.' The Hebrew word refers to a wadi
      or ravine associated with a watercourse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֹל
  chosen: And all
  alternatives:
  - Then all
  lexicon: HALOT
  rationale: The conjunction with כֹּל naturally continues the procedure and includes
    the full group. 'And all' is straightforward and preserves the coordination.
- source_word: זִקְנֵי הָעִיר הַהִוא
  chosen: the elders of that city
  alternatives:
  - the elders of that town
  lexicon: HALOT
  rationale: זִקְנֵי denotes civic leaders/elders; עִיר is commonly 'city,' though
    'town' is possible. 'That city' preserves the demonstrative specificity.
- source_word: הַקְּרֹבִים אֶל הֶחָלָל
  chosen: nearest to the slain man
  alternatives:
  - who are nearest to the corpse
  - who are nearest to the slain one
  lexicon: HALOT
  rationale: קָרוֹב in the plural with אֶל marks proximity. חָלָל refers to one slain,
    not merely a dead body in general. 'Slain man' makes explicit the homicide context
    established in the passage, while remaining natural English.
- source_word: יִרְחֲצוּ אֶת יְדֵיהֶם
  chosen: shall wash their hands
  alternatives:
  - must wash their hands
  - are to wash their hands
  lexicon: HALOT
  rationale: The imperfect here is procedural/jussive in legal instruction. 'Shall
    wash' fits English legal-register style and preserves the prescriptive force.
- source_word: עַל
  chosen: over
  alternatives:
  - upon
  - by
  lexicon: HALOT
  rationale: עַל here most naturally indicates position over the animal during the
    ritual handwashing. 'Over' is the clearest idiomatic rendering in English.
- source_word: הָעֶגְלָה
  chosen: the heifer
  alternatives:
  - the young cow
  lexicon: HALOT
  rationale: עֶגְלָה denotes a young female bovine. 'Heifer' is the standard concise
    English equivalent in sacrificial/legal contexts.
- source_word: הָעֲרוּפָה
  chosen: whose neck was broken
  alternatives:
  - that was beheaded
  - that was decapitated
  lexicon: HALOT
  rationale: From ערף, in this ritual context the animal's neck is broken rather than
    slaughtered in the usual way. 'Whose neck was broken' is more precise than 'beheaded'
    and avoids implying a sword execution.
- source_word: בַנָּחַל
  chosen: in the wadi
  alternatives:
  - in the valley
  - in the streambed
  lexicon: HALOT
  rationale: נחל can denote a wadi/seasonal streambed or valley associated with it.
    Given the immediate ritual setting in the preceding verse, 'wadi' best preserves
    the specific topographical sense, while remaining understandable modern English.
