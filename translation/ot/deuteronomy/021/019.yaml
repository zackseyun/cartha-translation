id: DEU.21.19
reference: Deuteronomy 21:19
source:
  edition: WLC
  text: וְ/תָ֥פְשׂוּ ב֖/וֹ אָבִ֣י/ו וְ/אִמּ֑/וֹ וְ/הוֹצִ֧יאוּ אֹת֛/וֹ אֶל זִקְנֵ֥י
    עִיר֖/וֹ וְ/אֶל שַׁ֥עַר מְקֹמֽ/וֹ־־׃
translation:
  text: then his father and his mother shall seize him and bring him out to the elders
    of his city and to the gate of his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the city gate as the public place where local elders heard legal
      matters.
    reason: cultural_note
  - marker: b
    text: 'Or ''the gate of his town.'' Hebrew: ''the gate of his place.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְתָפְשׂוּ בוֹ
  chosen: shall seize him
  alternatives:
  - shall take hold of him
  - shall lay hold of him
  lexicon: HALOT
  rationale: תפשׂ with ב marks physically taking hold of the son. 'Seize' conveys
    firm restraint more naturally in modern English than the more archaic 'lay hold
    of,' while preserving the force of the legal action.
- source_word: אָבִיו וְאִמּוֹ
  chosen: his father and his mother
  alternatives:
  - his father and mother
  lexicon: HALOT
  rationale: The Hebrew explicitly names both parents with separate possessive suffixes.
    The fuller English phrasing preserves the formal legal tone and the emphasis that
    both parents act together.
- source_word: וְהוֹצִיאוּ אֹתוֹ
  chosen: bring him out
  alternatives:
  - take him out
  - lead him out
  lexicon: HALOT
  rationale: יצא in the Hiphil means to cause to go out, bring out, or lead out. 'Bring
    him out' fits the movement from the household sphere to the public legal forum
    and reads naturally in English.
- source_word: אֶל זִקְנֵי עִירוֹ
  chosen: to the elders of his city
  alternatives:
  - to his city's elders
  lexicon: HALOT
  rationale: זקני העיר is the standard expression for the civic leaders/judges at
    the local level. 'Elders of his city' is clear, formal, and close to the Hebrew
    structure.
- source_word: וְאֶל שַׁעַר מְקֹמוֹ
  chosen: and to the gate of his place
  alternatives:
  - and to the gate of his town
  - and to the gate of the place where he lives
  lexicon: HALOT
  rationale: שׁער in legal contexts refers to the city gate as the place of public
    judgment. מקום literally means 'place.' Because the Hebrew does not repeat 'city'
    here, 'his place' preserves the wording more closely, though the sense is the
    local community's gate.
