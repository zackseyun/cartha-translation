theological_decisions:
- issue: Rendering שְׂנוּאָה in a family-law context
  chosen_reading: unloved
  alternative_readings:
  - hated
  - less loved
  rationale: The Hebrew lexeme can denote hatred, but in contrastive marital contexts
    it often indicates the less favored or rejected wife rather than explicit hostility.
    Rendering it 'unloved' preserves the relational contrast with 'loved' and avoids
    importing a stronger emotional claim than the legal scenario requires.
  doctrine_reference: Translation philosophy §1, §4, §6
