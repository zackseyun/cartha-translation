id: DEU.21.15
reference: Deuteronomy 21:15
source:
  edition: WLC
  text: כִּֽי תִהְיֶ֨יןָ לְ/אִ֜ישׁ שְׁתֵּ֣י נָשִׁ֗ים הָ/אַחַ֤ת אֲהוּבָה֙ וְ/הָ/אַחַ֣ת
    שְׂנוּאָ֔ה וְ/יָֽלְדוּ ל֣/וֹ בָנִ֔ים הָ/אֲהוּבָ֖ה וְ/הַ/שְּׂנוּאָ֑ה וְ/הָיָ֛ה
    הַ/בֵּ֥ן הַ/בְּכ֖וֹר לַ/שְּׂנִיאָֽה־־׃
translation:
  text: If a man has two wives, one loved and the other unloved, and both the loved
    and the unloved have borne him sons, and the firstborn son belongs to the unloved
    wife,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hated' for 'unloved'; the Hebrew term can carry the stronger sense,
      but here likely marks the wife who is not favored in contrast to the loved wife.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a case law scenario conditionally. 'If' fits English legal
    style and the casuistic force of the Hebrew better than a purely temporal 'when'
    in this context.
- source_word: תִהְיֶיןָ לְאִישׁ
  chosen: a man has
  alternatives:
  - there are to a man
  - a man has come to have
  lexicon: HALOT
  rationale: The Hebrew literally expresses existence ('there are to a man'), but
    idiomatic English in legal material is 'a man has.' This preserves the possession
    sense without awkwardness.
- source_word: שְׁתֵּי נָשִׁים
  chosen: two wives
  alternatives:
  - two women
  lexicon: HALOT
  rationale: In this legal context נָשִׁים refers to wives, not merely women, since
    the man is said to have them and inheritance law follows.
- source_word: הָאַחַת אֲהוּבָה
  chosen: one loved
  alternatives:
  - one beloved
  - one favored
  lexicon: HALOT
  rationale: אֲהוּבָה is the passive participial/adjectival form 'loved.' 'Loved'
    is direct and natural. 'Favored' is interpretive and weaker than the lexical sense.
- source_word: וְהָאַחַת שְׂנוּאָה
  chosen: the other unloved
  alternatives:
  - the other hated
  - the other less loved
  lexicon: HALOT
  rationale: שְׂנוּאָה literally means 'hated,' but in familial/legal contexts it
    can denote being disfavored or unloved rather than active hostility. 'Unloved'
    preserves the contrast with 'loved' in readable English and avoids overstating
    emotional animus where the context concerns preferential status.
- source_word: וְיָלְדוּ לוֹ בָנִים
  chosen: have borne him sons
  alternatives:
  - bear him sons
  - have given birth to sons for him
  - have borne him children
  lexicon: HALOT
  rationale: The perfect form suits English present perfect in a case description.
    בָנִים is specifically 'sons,' not generic 'children,' and should be retained
    for gender accuracy and because firstborn-son law is in view.
- source_word: הָאֲהוּבָה וְהַשְּׂנוּאָה
  chosen: both the loved and the unloved
  alternatives:
  - the loved wife and the unloved wife
  lexicon: HALOT
  rationale: The repeated substantivized adjectives are preserved. Adding 'both' clarifies
    that each wife bore sons, matching the Hebrew structure.
- source_word: וְהָיָה הַבֵּן הַבְּכוֹר
  chosen: and the firstborn son
  alternatives:
  - and it happens that the firstborn son
  - and the son, the firstborn
  lexicon: HALOT
  rationale: The clause advances the legal scenario to the relevant condition. English
    smooths the existential/circumstantial construction while preserving the focus
    on the firstborn son.
- source_word: לַשְּׂנִיאָה
  chosen: belongs to the unloved wife
  alternatives:
  - is the unloved one's
  - is of the unloved wife
  lexicon: HALOT
  rationale: The lamed marks relation/possession. 'Belongs to the unloved wife' is
    idiomatic English that clearly conveys maternity in the inheritance setting.
