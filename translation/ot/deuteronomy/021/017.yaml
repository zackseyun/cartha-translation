id: DEU.21.17
reference: Deuteronomy 21:17
source:
  edition: WLC
  text: כִּי֩ אֶת הַ/בְּכֹ֨ר בֶּן הַ/שְּׂנוּאָ֜ה יַכִּ֗יר לָ֤/תֶת ל/וֹ֙ פִּ֣י שְׁנַ֔יִם
    בְּ/כֹ֥ל אֲשֶׁר יִמָּצֵ֖א ל֑/וֹ כִּי הוּא֙ רֵאשִׁ֣ית אֹנ֔/וֹ ל֖/וֹ מִשְׁפַּ֥ט
    הַ/בְּכֹרָֽה־־־־׃ס
translation:
  text: But he shall acknowledge the firstborn, the son of the unloved wife, by giving
    him a double portion of all that is found to belong to him, for he is the firstfruits
    of his vigor; the right of the firstborn belongs to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the son of the hated wife.' The Hebrew term can be rendered more literally
      as 'hated,' but here likely denotes the less favored or unloved wife in contrast
      to the loved wife.
    reason: lexical_alternative
  - marker: b
    text: Literally 'a mouth of two,' an idiom meaning a double share or double portion.
    reason: lexical_alternative
  - marker: c
    text: Or 'the first of his strength.' The Hebrew expression refers to the first
      issue as the first expression of the father's generative power.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַכִּיר
  chosen: shall acknowledge
  alternatives:
  - shall recognize
  - must acknowledge
  lexicon: HALOT
  rationale: Hiphil of נכר here means to recognize or acknowledge legally the status
    of the true firstborn. 'Acknowledge' fits the juridical context better than a
    merely perceptual 'recognize.'
- source_word: הַבְּכֹר
  chosen: the firstborn
  alternatives:
  - the eldest son
  lexicon: HALOT
  rationale: Standard legal/familial term for the son holding birthright status. 'Firstborn'
    preserves the technical inheritance sense better than 'eldest son.'
- source_word: בֶּן הַשְּׂנוּאָה
  chosen: the son of the unloved wife
  alternatives:
  - the son of the hated wife
  - the son of the less loved wife
  lexicon: HALOT
  rationale: שְׂנוּאָה can literally mean 'hated,' but in this marital contrast with
    the loved wife it often denotes the less favored or unloved wife. 'Unloved' is
    natural English and avoids overstating emotional hostility while preserving the
    contrast.
- source_word: לָתֶת לוֹ פִּי שְׁנַיִם
  chosen: by giving him a double portion
  alternatives:
  - to give him two shares
  - to give him a twofold portion
  lexicon: HALOT
  rationale: The idiom פִּי שְׁנַיִם denotes a double share in inheritance law. 'Double
    portion' is the clearest established English equivalent.
- source_word: בְּכֹל אֲשֶׁר יִמָּצֵא לוֹ
  chosen: of all that is found to belong to him
  alternatives:
  - of all that he has
  - from all that is found with him
  lexicon: HALOT
  rationale: The Niphal of מצא with ל indicates what is found in the father's possession,
    i.e., his estate. This wording preserves the passive nuance while making the inheritance
    context clear.
- source_word: רֵאשִׁית אֹנוֹ
  chosen: the firstfruits of his vigor
  alternatives:
  - the first of his strength
  - the beginning of his virility
  lexicon: HALOT
  rationale: The phrase refers to the father's first issue as the first expression
    of his generative strength. 'Firstfruits of his vigor' is idiomatic and preserves
    the metaphorical force; 'strength' is possible but less natural here.
- source_word: מִשְׁפַּט הַבְּכֹרָה
  chosen: the right of the firstborn
  alternatives:
  - the legal right of the birthright
  - the due of the firstborn
  lexicon: HALOT
  rationale: This phrase denotes the legal entitlement attached to firstborn status.
    'Right of the firstborn' is concise and clear in English.
- source_word: כִּי ... כִּי
  chosen: But ... for
  alternatives:
  - Rather ... because
  - Indeed ... for
  lexicon: HALOT
  rationale: The first כִּי is adversative in context, contrasting with the prohibited
    favoritism in the previous verse; the second is causal, grounding the law in the
    son's status.
