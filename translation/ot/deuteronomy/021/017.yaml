theological_decisions:
- issue: Rendering of marital status term שְׂנוּאָה in a legal context
  chosen_reading: unloved wife
  alternative_readings:
  - hated wife
  - less loved wife
  rationale: The verse concerns inheritance law, not a theological claim about marriage.
    'Unloved' best reflects the comparative relational sense common in such contexts
    and avoids importing a stronger emotional claim than the Hebrew requires.
  doctrine_reference: Translation philosophy §1, §6
