id: DEU.21.18
reference: Deuteronomy 21:18
source:
  edition: WLC
  text: כִּֽי יִהְיֶ֣ה לְ/אִ֗ישׁ בֵּ֚ן סוֹרֵ֣ר וּ/מוֹרֶ֔ה אֵינֶ֣/נּוּ שֹׁמֵ֔עַ בְּ/ק֥וֹל
    אָבִ֖י/ו וּ/בְ/ק֣וֹל אִמּ֑/וֹ וְ/יסְּר֣וּ אֹת֔/וֹ וְ/לֹ֥א יִשְׁמַ֖ע אֲלֵי/הֶֽם־׃
translation:
  text: If a man has a stubborn and rebellious son who does not listen to the voice
    of his father or to the voice of his mother, and though they discipline him, he
    does not listen to them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'When a man has ...' The Hebrew legal formula can be rendered either
      'if' or 'when.'
    reason: alternative_reading
  - marker: b
    text: '''Listen'' here carries the sense of heeding or obeying parental instruction.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'to the voice of his father and to the voice of his mother.' 'Voice'
      is an idiom for authoritative instruction.
    reason: lexical_alternative
  - marker: d
    text: Or 'and they discipline him.' The Hebrew conjunction can be read straightforwardly,
      while the context also supports the concessive sense 'though they discipline
      him.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a casuistic legal condition. 'If' fits English law-style formulation
    naturally, though 'when' is also possible.
- source_word: יִהְיֶה לְאִישׁ
  chosen: a man has
  alternatives:
  - there is to a man
  - a man comes to have
  lexicon: HALOT
  rationale: The Hebrew literally uses 'there is/is' with a dative ('to a man'), a
    common possession construction. 'A man has' is the clearest idiomatic English
    equivalent.
- source_word: בֵּן
  chosen: son
  alternatives:
  - child
  lexicon: HALOT
  rationale: The noun specifically means 'son,' not a gender-neutral child. This follows
    the gender-accurate principle.
- source_word: סוֹרֵר
  chosen: stubborn
  alternatives:
  - wayward
  - defiant
  lexicon: HALOT
  rationale: Conveys persistent refusal to submit or turn rightly. 'Stubborn' is standard
    and readable in English legal/moral description.
- source_word: מוֹרֶה
  chosen: rebellious
  alternatives:
  - disobedient
  - resistant
  lexicon: HALOT
  rationale: Paired with סוֹרֵר, the term intensifies the son's resistance. 'Rebellious'
    preserves the active, defiant sense better than the weaker 'disobedient'.
- source_word: אֵינֶנּוּ שֹׁמֵעַ
  chosen: does not listen
  alternatives:
  - does not obey
  - is not listening
  lexicon: HALOT
  rationale: The verb שמע fundamentally means 'hear/listen,' often with the implication
    of obedience. 'Listen' keeps the lexical link visible, while the context already
    implies refusal to obey.
- source_word: בְּקוֹל אָבִיו וּבְקוֹל אִמּוֹ
  chosen: to the voice of his father or to the voice of his mother
  alternatives:
  - to his father or his mother
  - to the sound of his father and mother
  lexicon: HALOT
  rationale: Hebrew idiom uses 'voice of' to mean authoritative speech or instruction.
    Retaining 'voice' preserves the source texture and parental authority language.
    'Or' is natural under English negation, though the Hebrew conjunction is 'and'.
- source_word: וְיִסְּרוּ אֹתוֹ
  chosen: though they discipline him
  alternatives:
  - and they chasten him
  - and they correct him
  - and they punish him
  lexicon: HALOT
  rationale: 'יסר denotes parental correction/discipline, not necessarily punitive
    violence. ''Discipline'' best captures the pedagogical and corrective force in
    modern English. ''Though'' brings out the concessive sense in context: even after
    discipline, he still refuses.'
- source_word: וְלֹא יִשְׁמַע אֲלֵיהֶם
  chosen: he does not listen to them
  alternatives:
  - he does not obey them
  - he will not listen to them
  lexicon: HALOT
  rationale: Repeats שמע for emphasis; preserving 'listen' maintains the lexical repetition.
    English present tense works well in casuistic law, though a modal future is also
    possible.
