id: DEU.13.16
reference: Deuteronomy 13:16
source:
  edition: WLC
  text: הַכֵּ֣ה תַכֶּ֗ה אֶת יֹֽשְׁבֵ֛י הָ/עִ֥יר ה/הוא לְ/פִי חָ֑רֶב הַחֲרֵ֨ם אֹתָ֧/הּ
    וְ/אֶת כָּל אֲשֶׁר בָּ֛/הּ וְ/אֶת בְּהֶמְתָּ֖/הּ לְ/פִי חָֽרֶב־־־־־־־׃
translation:
  text: You shall surely strike the inhabitants of that city with the edge of the
    sword, devoting it to destruction, along with all that is in it and its livestock,
    with the edge of the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'put it under the ban'; the Hebrew verb denotes devoting something irrevocably
      to destruction.
    reason: lexical_alternative
  - marker: b
    text: Literally 'to the mouth of the sword,' an idiom meaning 'with the edge of
      the sword.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֵּה תַכֶּה
  chosen: You shall surely strike
  alternatives:
  - You must strike
  - You shall certainly strike down
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect of נכה intensifies the command.
    'Surely strike' preserves the emphatic force without excessive paraphrase. 'Strike'
    is kept rather than 'kill' because the following sword phrase specifies the lethal
    means.
- source_word: יֹשְׁבֵי הָעִיר הַהוּא
  chosen: the inhabitants of that city
  alternatives:
  - those who dwell in that city
  - the residents of that city
  lexicon: HALOT
  rationale: יֹשְׁבֵי is a participial form meaning those dwelling/residing. 'Inhabitants'
    is natural modern English and accurately conveys the resident population.
- source_word: לְפִי חָרֶב
  chosen: with the edge of the sword
  alternatives:
  - by the sword
  - to the mouth of the sword
  lexicon: HALOT
  rationale: The idiom literally means 'to/by the mouth of the sword.' 'With the edge
    of the sword' is a standard, transparent English idiom that preserves the concrete
    imagery better than the flatter 'by the sword.'
- source_word: הַחֲרֵם
  chosen: devoting it to destruction
  alternatives:
  - utterly destroy it
  - put it under the ban
  lexicon: HALOT
  rationale: חרם in the Hiphil denotes placing under ḥerem, that is, devoting something
    irrevocably to destruction. 'Devoting it to destruction' preserves the technical-sacral
    nuance better than simply 'destroy,' while remaining readable. 'Put it under the
    ban' is more traditional but less transparent to modern readers.
- source_word: אֹתָהּ
  chosen: it
  alternatives:
  - the city
  lexicon: HALOT
  rationale: The feminine singular pronoun refers back to 'city.' English naturally
    uses 'it' here.
- source_word: וְאֶת כָּל אֲשֶׁר בָּהּ
  chosen: along with all that is in it
  alternatives:
  - and everything that is in it
  - with all that is within it
  lexicon: HALOT
  rationale: This phrase expands the scope of the destruction beyond the inhabitants
    to the city's contents. 'Along with all that is in it' fits the syntax and reads
    naturally in sequence with the prior clause.
- source_word: בְּהֶמְתָּהּ
  chosen: its livestock
  alternatives:
  - its cattle
  - its animals
  lexicon: HALOT
  rationale: בְּהֵמָה can denote domestic animals generally. 'Livestock' best captures
    the collective sense in contemporary English without narrowing the term to cattle
    alone.
- source_word: לְפִי חָרֶב
  chosen: with the edge of the sword
  alternatives:
  - by the sword
  lexicon: HALOT
  rationale: The repeated idiom is rendered consistently. Repetition is preserved
    because the Hebrew repeats it for emphasis and scope.
