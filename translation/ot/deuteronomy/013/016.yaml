theological_decisions:
- issue: Rendering of חרם in a warfare/judgment context
  chosen_reading: devoting it to destruction
  alternative_readings:
  - utterly destroy it
  - put it under the ban
  rationale: The verse describes a total destruction command with sacral overtones.
    The chosen rendering preserves the theological tension of חרם as more than mere
    military annihilation while avoiding opaque jargon. This follows the project's
    preference for source-language primacy and readable modern English.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Retention of the verse's severe judgment language
  chosen_reading: Preserve the full force of the command without softening
  alternative_readings:
  - Use milder dynamic language such as 'defeat' or 'destroy completely' without the
    devotion nuance
  rationale: The text's gravity and severity must remain visible. Softening would
    import interpretive mitigation not warranted by the Hebrew.
  doctrine_reference: Translation philosophy §§1, 3
