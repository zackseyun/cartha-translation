id: DEU.13.2
reference: Deuteronomy 13:2
source:
  edition: WLC
  text: כִּֽי יָק֤וּם בְּ/קִרְבְּ/ךָ֙ נָבִ֔יא א֖וֹ חֹלֵ֣ם חֲל֑וֹם וְ/נָתַ֥ן אֵלֶ֛י/ךָ
    א֖וֹת א֥וֹ מוֹפֵֽת־׃
translation:
  text: If a prophet or a dreamer of dreams arises among you and gives you a sign
    or a wonder,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a sign or a portent.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: If
  alternatives:
  - When
  - Suppose
  lexicon: HALOT
  rationale: In this legal/conditional context, כִּי introduces a case condition rather
    than a simple causal 'for/because.' 'If' best fits the protasis that continues
    into the following verse.
- source_word: יָקוּם
  chosen: arises
  alternatives:
  - rises up
  - appears
  lexicon: HALOT
  rationale: Qal imperfect of קום here denotes the emergence of such a person within
    the community. 'Arises' is natural English and preserves the formal sense without
    sounding archaic.
- source_word: בְּקִרְבְּךָ
  chosen: among you
  alternatives:
  - in your midst
  - within you
  lexicon: HALOT
  rationale: The phrase means 'in your midst/among you.' 'Among you' is idiomatic
    modern English while retaining the communal setting.
- source_word: נָבִיא
  chosen: prophet
  lexicon: HALOT
  rationale: Standard rendering for נָבִיא; no contextual reason to vary.
- source_word: אוֹ
  chosen: or
  lexicon: HALOT
  rationale: Simple disjunctive conjunction linking two possible claimants.
- source_word: חֹלֵם חֲלוֹם
  chosen: a dreamer of dreams
  alternatives:
  - one who dreams dreams
  - a dreamer
  lexicon: HALOT
  rationale: The participle plus cognate noun is a Hebrew idiom. 'A dreamer of dreams'
    preserves the source texture and distinguishes this figure from a prophet without
    over-paraphrasing.
- source_word: וְנָתַן אֵלֶיךָ
  chosen: and gives you
  alternatives:
  - and sets before you
  - and provides you
  lexicon: HALOT
  rationale: Though formally a qatal form, in this conditional sequence it functions
    with future sense. 'Gives you' is the most straightforward English rendering.
- source_word: אוֹת
  chosen: a sign
  alternatives:
  - an omen
  - a token
  lexicon: HALOT
  rationale: אוֹת commonly denotes a sign, often evidentiary or confirmatory. 'Sign'
    is the standard and clearest rendering.
- source_word: מוֹפֵת
  chosen: a wonder
  alternatives:
  - a portent
  - a miraculous sign
  lexicon: HALOT
  rationale: מוֹפֵת often pairs with אוֹת and carries the sense of a striking wonder/portent.
    'Wonder' preserves the pairing without importing more specificity than the Hebrew
    states.
