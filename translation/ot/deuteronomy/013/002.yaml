theological_decisions:
- issue: Nature of the signs performed by the false prophet/dreamer
  chosen_reading: Render אוֹת ... מוֹפֵת straightforwardly as 'a sign or a wonder'
    without deciding in translation whether the phenomenon is genuinely miraculous,
    deceptive, or merely claimed.
  alternative_readings:
  - a sign or portent
  - a miraculous sign or wonder
  rationale: The verse itself states that the prophet or dreamer gives a sign/wonder
    but does not yet explain its source or character. Preserving the plain lexical
    sense avoids importing a theological judgment not explicit in this verse.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
