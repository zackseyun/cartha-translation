id: DEU.13.8
reference: Deuteronomy 13:8
source:
  edition: WLC
  text: מֵ/אֱלֹהֵ֣י הָֽ/עַמִּ֗ים אֲשֶׁר֙ סְבִיבֹ֣תֵי/כֶ֔ם הַ/קְּרֹבִ֣ים אֵלֶ֔י/ךָ
    א֖וֹ הָ/רְחֹקִ֣ים מִמֶּ֑/ךָּ מִ/קְצֵ֥ה הָ/אָ֖רֶץ וְ/עַד קְצֵ֥ה הָ/אָֽרֶץ־׃
translation:
  text: from the gods of the peoples that are around you, whether near to you or far
    from you, from one end of the earth to the other end of the earth—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from one end of the land to the other end of the land.' Hebrew אֶרֶץ
      can mean either 'earth' or 'land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵאֱלֹהֵי
  chosen: from the gods of
  alternatives:
  - from among the gods of
  lexicon: HALOT
  rationale: 'The preposition מִן with אֱלֹהִים here indicates source/origin: the
    enticement concerns gods belonging to the surrounding peoples. ''From the gods
    of'' is direct and idiomatic in English.'
- source_word: הָעַמִּים
  chosen: the peoples
  alternatives:
  - the nations
  lexicon: HALOT
  rationale: עַמִּים commonly means 'peoples' in a plural ethnic sense. 'Peoples'
    preserves the collective-ethnic nuance better than 'nations' in this immediate
    context.
- source_word: אֲשֶׁר סְבִיבֹתֵיכֶם
  chosen: that are around you
  alternatives:
  - who are around you
  - surrounding you
  lexicon: HALOT
  rationale: This relative clause modifies 'the peoples.' 'That are around you' is
    natural modern English and preserves the spatial sense of סְבִיבוֹת.
- source_word: הַקְּרֹבִים אֵלֶיךָ
  chosen: near to you
  alternatives:
  - close to you
  - nearest to you
  lexicon: HALOT
  rationale: קָרוֹב denotes proximity. 'Near to you' is concise and matches the comparative
    pairing with 'far from you.'
- source_word: אוֹ הָרְחֹקִים מִמֶּךָּ
  chosen: or far from you
  alternatives:
  - or distant from you
  lexicon: HALOT
  rationale: רָחוֹק denotes distance. 'Far from you' is the most idiomatic counterpart
    to 'near to you.'
- source_word: מִקְצֵה הָאָרֶץ וְעַד קְצֵה הָאָרֶץ
  chosen: from one end of the earth to the other end of the earth
  alternatives:
  - from one end of the land to the other end of the land
  - from one end of the earth to the other
  lexicon: HALOT
  rationale: The idiom expresses total geographic extent. 'Earth' is retained rather
    than 'land' because the phrase is expansive and proverbial, not merely local.
    Repeating 'end of the earth' mirrors the Hebrew structure more closely than smoothing
    it out.
