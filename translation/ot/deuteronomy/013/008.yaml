theological_decisions:
- issue: Scope of הָאָרֶץ in the closing idiom
  chosen_reading: earth
  alternative_readings:
  - land
  rationale: In Deuteronomy, אֶרֶץ can mean either 'land' or 'earth.' Here the formulaic
    expression with 'from end to end' most naturally conveys the widest conceivable
    range of foreign gods, so 'earth' best preserves the rhetorical force without
    narrowing it to Canaan alone.
