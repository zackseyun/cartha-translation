id: DEU.13.10
reference: Deuteronomy 13:10
source:
  edition: WLC
  text: כִּ֤י הָרֹג֙ תַּֽהַרְגֶ֔/נּוּ יָֽדְ/ךָ֛ תִּֽהְיֶה בּ֥/וֹ בָ/רִֽאשׁוֹנָ֖ה לַ/הֲמִית֑/וֹ
    וְ/יַ֥ד כָּל הָ/עָ֖ם בָּ/אַחֲרֹנָֽה־־׃
translation:
  text: For you must surely put him to death; your hand shall be first against him
    to put him to death, and afterward the hand of all the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you shall surely kill him.' The Hebrew uses an infinitive absolute with
      a finite verb for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces the grounds or explanation for the preceding command,
    so 'For' best preserves the logical connection in natural English.
- source_word: הָרֹג תַּהַרְגֶנּוּ
  chosen: you must surely put him to death
  alternatives:
  - you shall surely kill him
  - you must certainly kill him
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect of הרג intensifies the verb, conveying
    certainty or strong obligation. 'You must surely put him to death' captures both
    the emphatic force and the judicial-execution context better than the blunter
    'kill him.'
- source_word: יָדְךָ
  chosen: your hand
  alternatives:
  - you
  lexicon: HALOT
  rationale: The Hebrew explicitly uses 'your hand,' and retaining it preserves the
    concrete idiom and legal imagery rather than flattening it to a simple pronoun.
- source_word: תִּהְיֶה בּוֹ בָרִאשׁוֹנָה
  chosen: shall be first against him
  alternatives:
  - shall be upon him first
  - shall be the first on him
  lexicon: HALOT
  rationale: This clause specifies priority in carrying out the sentence. 'First against
    him' is idiomatic English that preserves the adversative/judicial sense of the
    preposition with 'hand.'
- source_word: לַהֲמִיתוֹ
  chosen: to put him to death
  alternatives:
  - to kill him
  lexicon: HALOT
  rationale: The Hiphil of מות often denotes causing death in a legal or formal sense.
    'Put him to death' better reflects the judicial setting than the more general
    'kill him.'
- source_word: וְיַד כָּל הָעָם
  chosen: and afterward the hand of all the people
  alternatives:
  - and the hand of all the people afterward
  - and then all the people
  lexicon: HALOT
  rationale: Retaining 'the hand of all the people' preserves the Hebrew parallelism
    with 'your hand' and the communal participation specified in the law.
- source_word: בָּאַחֲרֹנָה
  chosen: afterward
  alternatives:
  - last
  - finally
  lexicon: HALOT
  rationale: In contrast to 'first,' this adverb marks subsequent action. 'Afterward'
    is the most natural English equivalent in this legal sequence.
