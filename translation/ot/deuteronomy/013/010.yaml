theological_decisions:
- issue: Rendering judicial execution language without softening or overstating it
  chosen_reading: put him to death
  alternative_readings:
  - kill him
  rationale: The verse legislates covenantal capital punishment. 'Put him to death'
    reflects the formal legal force of the Hebrew and avoids either euphemism or unnecessary
    crudity. This is a translational, not doctrinal, decision.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source
    text''s plain sense without paraphrase.'
