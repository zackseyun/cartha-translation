theological_decisions:
- issue: Verse numbering and discourse connection
  chosen_reading: Translate the verse as a standalone injunction without importing
    material from the following verse.
  alternative_readings:
  - Some English traditions number this as 12:32 and attach it more tightly to the
    preceding section.
  rationale: The Hebrew text here contains a complete injunction that serves as a
    transition into the false-prophet legislation. The translation should render only
    the present verse's content and not harmonize numbering traditions in the main
    text.
