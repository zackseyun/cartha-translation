theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Anthropomorphic expression 'the LORD your God is testing you, to know whether...'
  chosen_reading: Retain the anthropomorphic wording without softening
  alternative_readings:
  - the LORD your God is testing you to reveal whether...
  - the LORD your God is testing you to show whether...
  rationale: The Hebrew states 'to know,' and the translation philosophy requires preserving theological tension rather than resolving it. Recasting to avoid anthropomorphism would import an interpretive solution not explicit in the text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
