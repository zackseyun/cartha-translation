id: DEU.13.4
reference: Deuteronomy 13:4
source:
  edition: WLC
  text: לֹ֣א תִשְׁמַ֗ע אֶל דִּבְרֵי֙ הַ/נָּבִ֣יא הַ/ה֔וּא א֛וֹ אֶל חוֹלֵ֥ם הַ/חֲל֖וֹם הַ/ה֑וּא כִּ֣י מְנַסֶּ֞ה יְהוָ֤ה אֱלֹֽהֵי/כֶם֙ אֶתְ/כֶ֔ם לָ/דַ֗עַת הֲ/יִשְׁ/כֶ֤ם אֹֽהֲבִים֙ אֶת יְהוָ֣ה אֱלֹהֵי/כֶ֔ם בְּ/כָל לְבַבְ/כֶ֖ם וּ/בְ/כָל נַפְשְׁ/כֶֽם־־־־־׃
translation:
  text: You shall not listen to the words of that prophet or to that dreamer of dreams, for Yahweh your God is testing you, to know whether you love Yahweh your God with all your heart and with all your soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whether you love the LORD your God.' The Hebrew participle can be rendered as a simple present, though 'are loving' more explicitly reflects the ongoing/state nuance.
    reason: lexical_alternative
  - marker: b
    text: '''Soul'' here can also mean ''life,'' ''self,'' or ''being.'' In this covenant formula, ''soul'' preserves the traditional and intertextually important wording.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִשְׁמַע אֶל
  chosen: shall not listen to
  alternatives:
  - must not listen to
  - shall not heed
  lexicon: HALOT
  rationale: שׁמע with אֶל commonly means to listen to/heed. 'Listen to' preserves the auditory-obediential force without over-paraphrasing; the prohibition is direct and covenantal.
- source_word: דִּבְרֵי
  chosen: the words of
  alternatives:
  - the message of
  - the sayings of
  lexicon: HALOT
  rationale: דָּבָר often means 'word(s), matter, message.' Here the plural construct with the following speaker is most naturally 'the words of,' preserving formal correspondence.
- source_word: הַנָּבִיא
  chosen: that prophet
  alternatives:
  - the prophet
  lexicon: HALOT
  rationale: With the article plus demonstrative הַהוּא, English idiom is best represented by 'that prophet,' marking the previously mentioned false claimant distinctly.
- source_word: חוֹלֵם הַחֲלוֹם
  chosen: dreamer of dreams
  alternatives:
  - one who dreams dreams
  - dreamer
  lexicon: HALOT
  rationale: This is a Hebrew idiom. 'Dreamer of dreams' is a natural, established English rendering that preserves the idiomatic emphasis better than a flattened 'dreamer' alone.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the prohibition. 'For' is concise and fits the legal-exhortational style.
- source_word: מְנַסֶּה
  chosen: is testing
  alternatives:
  - is proving
  - is trying
  lexicon: HALOT
  rationale: נסה in the piel commonly means 'test, try, prove.' 'Testing' is the clearest modern English and avoids archaic 'proving' while preserving the evaluative sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Construct form with 2mp suffix straightforwardly means 'your God.' Repeated in the verse for covenant emphasis and retained both times.
- source_word: לָדַעַת
  chosen: to know
  alternatives:
  - in order to know
  - to find out
  lexicon: HALOT
  rationale: Infinitive of purpose/result. 'To know' is formally close and preserves the anthropomorphic expression without interpretive expansion.
- source_word: הֲיִשְׁכֶם אֹהֲבִים
  chosen: whether you are loving
  alternatives:
  - whether you love
  - if you are loving
  lexicon: HALOT
  rationale: The particle plus participle yields an ongoing/state sense. 'Whether you are loving' preserves the participial aspect better than the simpler English present, while remaining readable.
- source_word: בְּכָל לְבַבְכֶם
  chosen: with all your heart
  alternatives:
  - with your whole heart
  lexicon: HALOT
  rationale: לֵבָב denotes the inner heart/mind/will. Traditional 'heart' is accurate and idiomatic in covenant language.
- source_word: וּבְכָל נַפְשְׁכֶם
  chosen: and with all your soul
  alternatives:
  - and with all your life
  - and with all your being
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote soul, life, self. In the fixed covenant formula paired with 'heart,' 'soul' best preserves intertextual continuity with Deuteronomy's language, while alternatives are worth noting.
