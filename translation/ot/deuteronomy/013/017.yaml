theological_decisions:
- issue: Cultic force of כָּלִיל in the command to burn the city
  chosen_reading: 'Rendered with sacrificial nuance: ''as a whole offering to the LORD your God.'''
  alternative_readings:
  - 'Rendered adverbially: ''completely for the LORD your God'''
  - 'Rendered more interpretively: ''as a whole burnt offering to the LORD your God'''
  rationale: The verse frames the city's destruction not merely as total annihilation but as an act of complete devotion to God. 'Whole offering' preserves the sacrificial resonance without importing the technical Levitical term 'burnt offering' too strongly where the object is a city rather than an animal sacrifice.
  doctrine_reference: Translation philosophy §1, §3, §6; Contested terms table for יְהוָה
