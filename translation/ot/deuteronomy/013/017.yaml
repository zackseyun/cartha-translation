id: DEU.13.17
reference: Deuteronomy 13:17
source:
  edition: WLC
  text: וְ/אֶת כָּל שְׁלָלָ֗/הּ תִּקְבֹּץ֮ אֶל תּ֣וֹךְ רְחֹבָ/הּ֒ וְ/שָׂרַפְתָּ֨ בָ/אֵ֜שׁ אֶת הָ/עִ֤יר וְ/אֶת כָּל שְׁלָלָ/הּ֙ כָּלִ֔יל לַ/יהוָ֖ה אֱלֹהֶ֑י/ךָ וְ/הָיְתָה֙ תֵּ֣ל עוֹלָ֔ם לֹ֥א תִבָּנֶ֖ה עֽוֹד־־־־־־׃
translation:
  text: You shall gather all its spoil into the middle of its open square, and you shall burn the city and all its spoil with fire as a whole offering to Yahweh your God. It shall remain a perpetual ruin mound; it shall not be rebuilt again.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'completely for the LORD your God.' The Hebrew כָּלִיל can be taken adverbially ('wholly, completely') or with sacrificial force, indicating something entirely consumed for God.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a mound forever' or 'an everlasting heap,' that is, a lasting ruin.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלָלָהּ
  chosen: its spoil
  alternatives:
  - its plunder
  - its booty
  lexicon: HALOT
  rationale: שָׁלָל refers to goods taken as plunder/spoil. 'Spoil' is concise and natural in this legal-war context, while preserving the sense of seized property.
- source_word: תִּקְבֹּץ
  chosen: you shall gather
  alternatives:
  - you shall collect
  lexicon: HALOT
  rationale: Qal imperfect 2ms of קבץ in instructional law is well rendered as a directive future, 'you shall gather.'
- source_word: אֶל תּוֹךְ רְחֹבָהּ
  chosen: into the middle of its open square
  alternatives:
  - into the midst of its plaza
  - into the middle of its street
  lexicon: HALOT
  rationale: רְחוֹב commonly denotes a broad public place/open square rather than a narrow street. 'Open square' best fits the urban setting and the act of assembling spoil there.
- source_word: וְשָׂרַפְתָּ בָאֵשׁ
  chosen: and you shall burn ... with fire
  alternatives:
  - and you shall burn ... in the fire
  lexicon: HALOT
  rationale: The idiom straightforwardly indicates destruction by fire. 'With fire' is idiomatic English and preserves the Hebrew expression.
- source_word: כָּלִיל
  chosen: as a whole offering
  alternatives:
  - completely
  - wholly
  - as an offering wholly burned
  lexicon: HALOT
  rationale: כָּלִיל can function adverbially ('wholly') but in sacrificial contexts carries the sense of something entirely consumed for God. Because it is followed by 'to the LORD your God,' 'as a whole offering' preserves the cultic force better than a bare adverb.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The preposition ל here marks dedication/devotion to God; 'to the LORD' is a natural rendering.
- source_word: תֵּל עוֹלָם
  chosen: a perpetual ruin mound
  alternatives:
  - an everlasting heap
  - a mound forever
  - a permanent ruin
  lexicon: HALOT
  rationale: תֵּל is literally a mound/heap, often of ruins; עוֹלָם here indicates enduring duration. 'Perpetual ruin mound' preserves both the physical image and the lasting desolation.
- source_word: לֹא תִבָּנֶה עוֹד
  chosen: it shall not be rebuilt again
  alternatives:
  - it shall never be rebuilt
  - it shall not be built anymore
  lexicon: HALOT
  rationale: 'Nifal imperfect of בנה with עוֹד expresses future prohibition/result: the city is not to be rebuilt thereafter. ''Shall not be rebuilt again'' is direct and close to the Hebrew.'
