theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Covenantal apostasy language in לְהַדִּיחֲךָ מֵעַל יְהוָה
  chosen_reading: drive you away from Yahweh
  alternative_readings:
  - lead you astray from the LORD
  - entice you away from the LORD
  rationale: The verse concerns attempted seduction into covenant disloyalty. 'Drive you away' preserves the causative force of the Hiphil verb and the relational break implied by מֵעַל, without importing later theological categories beyond the text.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
