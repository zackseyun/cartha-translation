id: DEU.13.11
reference: Deuteronomy 13:11
source:
  edition: WLC
  text: וּ/סְקַלְתּ֥/וֹ בָ/אֲבָנִ֖ים וָ/מֵ֑ת כִּ֣י בִקֵּ֗שׁ לְ/הַדִּֽיחֲ/ךָ֙ מֵ/עַל֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ הַ/מּוֹצִיאֲ/ךָ֛ מֵ/אֶ֥רֶץ מִצְרַ֖יִם מִ/בֵּ֥ית עֲבָדִֽים׃
translation:
  text: You shall stone him with stones, and he shall die, because he sought to drive you away from Yahweh your God, who brought you out from the land of Egypt, out of the house of slavery.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to lead you astray from the LORD your God' or 'to entice you away from the LORD your God.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'out of the house of slavery,' a covenant formula recalling Israel's deliverance from Egypt.
    reason: cultural_note
lexical_decisions:
- source_word: וּסְקַלְתּוֹ
  chosen: You shall stone him
  alternatives:
  - You must stone him
  - Stone him
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in legal instruction functions as an injunctive/future command. 'Stone him' preserves the judicial execution sense of סקל; 'You shall' fits the legal register of the context.
- source_word: בָאֲבָנִים
  chosen: with stones
  alternatives:
  - to death with stones
  - with rocks
  lexicon: HALOT
  rationale: The prepositional phrase specifies the means of execution. 'With stones' is the natural and sufficiently literal English rendering; the death result is stated separately in the next clause.
- source_word: וָמֵת
  chosen: and he shall die
  alternatives:
  - and he must die
  - so that he dies
  lexicon: HALOT
  rationale: The clause states the result/outcome of the stoning. Retaining it explicitly reflects the Hebrew sequence and legal solemnity.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the sentence. 'Because' is clearer in modern English than 'for' while preserving the causal force.
- source_word: בִקֵּשׁ
  chosen: he sought
  alternatives:
  - he attempted
  - he tried
  lexicon: HALOT
  rationale: בקש commonly means 'seek.' Here it denotes deliberate intent or attempt. 'He sought' stays close to the Hebrew and preserves the volitional nuance.
- source_word: לְהַדִּיחֲךָ
  chosen: to drive you away
  alternatives:
  - to entice you away
  - to lead you astray
  - to thrust you away
  lexicon: HALOT
  rationale: The Hiphil of נדח conveys causing someone to be driven away or led astray from covenant loyalty. 'Drive you away' best matches the following מֵעַל ('from upon/from allegiance to') and preserves the force of apostasy without over-paraphrase.
- source_word: מֵעַל יְהוָה אֱלֹהֶיךָ
  chosen: from the LORD your God
  alternatives:
  - away from the LORD your God
  - from following the LORD your God
  lexicon: HALOT
  rationale: Given English idiom, 'drive you away from the LORD your God' communicates the sense of apostasy from covenant allegiance. YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַמּוֹצִיאֲךָ
  chosen: who brought you out
  alternatives:
  - who is bringing you out
  - who delivered you
  lexicon: HALOT
  rationale: The participle functions here as a relative description of the LORD by his redemptive act. English idiom favors the simple past 'who brought you out' in this historical reference.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of the land of Egypt
  lexicon: HALOT
  rationale: Standard geographic expression. 'From the land of Egypt' is natural English and pairs well with the repeated 'out of' in the next phrase.
- source_word: מִבֵּית עֲבָדִים
  chosen: out of the house of slavery
  alternatives:
  - from the house of slaves
  - from the slave house
  - from the house of bondage
  lexicon: HALOT
  rationale: This covenant formula refers to Egypt as the place of enslavement. 'House of slavery' is both literal and clear, and better reflects the bonded condition than the traditional but archaic 'house of bondage.'
