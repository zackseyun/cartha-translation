id: DEU.13.15
reference: Deuteronomy 13:15
source:
  edition: WLC
  text: וְ/דָרַשְׁתָּ֧ וְ/חָקַרְתָּ֧ וְ/שָׁאַלְתָּ֖ הֵיטֵ֑ב וְ/הִנֵּ֤ה אֱמֶת֙ נָכ֣וֹן
    הַ/דָּבָ֔ר נֶעֶשְׂתָ֛ה הַ/תּוֹעֵבָ֥ה הַ/זֹּ֖את בְּ/קִרְבֶּֽ/ךָ׃
translation:
  text: and you shall investigate, and search out, and inquire thoroughly; and behold,
    if it is true and certain that this abomination has been done in your midst,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'if the report is true and the matter is established.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְדָרַשְׁתָּ
  chosen: you shall investigate
  alternatives:
  - you shall inquire
  - you shall seek out
  lexicon: HALOT
  rationale: דרש in this legal context carries the sense of making inquiry or investigation.
    'Investigate' fits modern legal English and preserves the imperative force better
    than the more generic 'seek.'
- source_word: וְחָקַרְתָּ
  chosen: search out
  alternatives:
  - examine
  - probe
  lexicon: HALOT
  rationale: חקר intensifies the process of inquiry, suggesting careful examination.
    'Search out' preserves the concrete force and distinguishes it from the preceding
    verb.
- source_word: וְשָׁאַלְתָּ הֵיטֵב
  chosen: inquire thoroughly
  alternatives:
  - ask carefully
  - make thorough inquiry
  lexicon: HALOT
  rationale: שאל means ask/inquire, and הֵיטֵב adverbially strengthens it ('well,
    thoroughly'). Rendering the phrase together as 'inquire thoroughly' gives natural
    English while preserving the cumulative legal scrutiny.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and indeed
  lexicon: HALOT
  rationale: הנה marks the result or confirmation of the inquiry. 'Behold' is slightly
    formal but still readable and preserves the discourse marker's force better than
    omitting it.
- source_word: אֱמֶת
  chosen: 'true'
  alternatives:
  - truth
  lexicon: HALOT
  rationale: Here אמת functions predicatively with the following confirmation formula.
    'True' is idiomatic in English in the expression 'if it is true and certain.'
- source_word: נָכוֹן
  chosen: certain
  alternatives:
  - established
  - confirmed
  lexicon: HALOT
  rationale: נכון in this context conveys that the matter is verified or established.
    'Certain' works naturally with 'true' and reflects judicial confirmation.
- source_word: הַדָּבָר
  chosen: it
  alternatives:
  - the matter
  - the report
  - the thing
  lexicon: HALOT
  rationale: Although literally 'the matter/thing,' English idiom in this clause is
    smoother with 'if it is true and certain.' The referent remains the reported matter
    under investigation.
- source_word: נֶעֶשְׂתָה
  chosen: has been done
  alternatives:
  - was done
  - has occurred
  lexicon: HALOT
  rationale: The Niphal/passive-like form of עשה here indicates that the abomination
    has taken place. Present perfect English fits the evidentiary conclusion after
    investigation.
- source_word: הַתּוֹעֵבָה הַזֹּאת
  chosen: this abomination
  alternatives:
  - this detestable thing
  lexicon: HALOT
  rationale: תועבה is a strong term for something abhorrent, especially in covenantal
    and cultic-ethical contexts. 'Abomination' preserves the gravity and established
    biblical register without paraphrase.
- source_word: בְּקִרְבֶּךָ
  chosen: in your midst
  alternatives:
  - among you
  - within you
  lexicon: HALOT
  rationale: The phrase denotes occurrence within the covenant community. 'In your
    midst' is a natural and suitably weighty rendering in legal material.
