theological_decisions:
- issue: Judicial verification formula
  chosen_reading: 'Render the sequence as a legal process culminating in confirmed
    truth: ''if it is true and certain that this abomination has been done in your
    midst'''
  alternative_readings:
  - if the report is true and the matter established
  - if it is truth and certain, the matter is established
  rationale: The Hebrew piles up investigative verbs and then uses a confirmation
    formula. The chosen rendering preserves the legal seriousness without woodenly
    reproducing Hebrew syntax that would sound unnatural in English.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    meaning without paraphrase'
