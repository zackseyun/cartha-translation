theological_decisions:
- issue: Rendering intimate kinship idioms without flattening their force
  chosen_reading: Preserve the familial and relational intensity with 'the son of
    your mother,' 'the wife of your embrace,' and 'your friend who is like your own
    soul.'
  alternative_readings:
  - Use smoother idioms such as 'your own brother,' 'your beloved wife,' and 'your
    closest friend'
  rationale: The verse heightens the severity of the warning by naming the closest
    possible human relationships. Preserving the Hebrew imagery maintains that rhetorical
    and theological force without adding interpretation.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Rendering עבד with respect to false gods
  chosen_reading: Translate as 'serve' rather than 'worship.'
  alternative_readings:
  - worship
  rationale: The Hebrew verb עבד in idolatry contexts includes worship but more broadly
    denotes religious service. 'Serve' preserves the lexical range and avoids importing
    a narrower liturgical sense than the source requires.
  doctrine_reference: Translation philosophy §§1, 5
