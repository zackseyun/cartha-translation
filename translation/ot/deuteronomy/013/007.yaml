id: DEU.13.7
reference: Deuteronomy 13:7
source:
  edition: WLC
  text: כִּ֣י יְסִֽיתְ/ךָ֡ אָחִ֣י/ךָ בֶן אִ֠מֶּ/ךָ אֽוֹ בִנְ/ךָ֨ אֽוֹ בִתְּ/ךָ֜ א֣וֹ
    אֵ֣שֶׁת חֵיקֶ֗/ךָ א֧וֹ רֵֽעֲ/ךָ֛ אֲשֶׁ֥ר כְּ/נַפְשְׁ/ךָ֖ בַּ/סֵּ֣תֶר לֵ/אמֹ֑ר
    נֵֽלְכָ֗ה וְ/נַֽעַבְדָה֙ אֱלֹהִ֣ים אֲחֵרִ֔ים אֲשֶׁר֙ לֹ֣א יָדַ֔עְתָּ אַתָּ֖ה וַ/אֲבֹתֶֽי/ךָ־־־׀׃
translation:
  text: If your brother, the son of your mother, or your son or your daughter, or
    the wife of your embrace, or your friend who is like your own soul, secretly entices
    you, saying, ‘Let us go and serve other gods’—gods that neither you nor your fathers
    have known—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the wife of your bosom''—an idiom for a wife held in closest
      intimacy.'
    reason: lexical_alternative
  - marker: b
    text: Or 'your friend who is as your own life/soul.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְסִיתְךָ
  chosen: secretly entices you
  alternatives:
  - incites you
  - seduces you
  - tries to lure you
  lexicon: HALOT
  rationale: The verb סות in the Hiphil means to entice, incite, or lure someone toward
    a course of action. Because בַּסֵּתֶר ('in secret') modifies the action in context,
    the English places 'secretly' with 'entices you' for natural readability while
    preserving the sense.
- source_word: אָחִיךָ בֶן אִמֶּךָ
  chosen: your brother, the son of your mother
  alternatives:
  - your maternal brother
  - your brother, your mother's son
  lexicon: HALOT
  rationale: The Hebrew apposition is explicit and should be preserved rather than
    flattened. 'The son of your mother' keeps the formal force and emphasis on close
    kinship.
- source_word: אֵשֶׁת חֵיקֶךָ
  chosen: the wife of your embrace
  alternatives:
  - the wife you hold close
  - the wife of your bosom
  lexicon: HALOT
  rationale: חֵיק literally refers to the bosom/lap/embrace. 'Wife of your embrace'
    preserves the intimate idiom in understandable modern English without the archaic
    'bosom.'
- source_word: רֵעֲךָ אֲשֶׁר כְּנַפְשְׁךָ
  chosen: your friend who is like your own soul
  alternatives:
  - your companion who is as yourself
  - your friend who is as your own life
  lexicon: HALOT
  rationale: נֶפֶשׁ here expresses the depth of personal attachment, not merely biological
    life. 'Like your own soul' preserves the Hebrew intensity and relational closeness.
- source_word: בַּסֵּתֶר
  chosen: secretly
  alternatives:
  - in secret
  - privately
  lexicon: HALOT
  rationale: The noun phrase means 'in secret.' 'Secretly' is a natural adverbial
    rendering in English and fits optimal equivalence.
- source_word: נֵלְכָה וְנַעַבְדָה
  chosen: Let us go and serve
  alternatives:
  - Let us go and worship
  - Come, let us go and serve
  lexicon: HALOT
  rationale: The cohortatives express invitation/exhortation. 'Let us go and serve'
    preserves both movement and cultic service. 'Serve' is preferred over 'worship'
    because עבד regularly denotes service rendered to a deity and should not be narrowed
    unnecessarily.
- source_word: אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  lexicon: HALOT
  rationale: The adjective אֲחֵרִים means 'other.' 'Other gods' is the plain sense;
    'foreign gods' is interpretive and better reserved for contexts using נֵכָר or
    similar language.
- source_word: אֲשֶׁר לֹא יָדַעְתָּ אַתָּה וַאֲבֹתֶיךָ
  chosen: gods that neither you nor your fathers have known
  alternatives:
  - whom you and your fathers have not known
  - that you did not know, you or your fathers
  lexicon: HALOT
  rationale: יָדַע in this context refers to covenantal/religious acquaintance or
    recognition. 'Have known' is idiomatic and preserves the perfect sense. Recasting
    with 'neither...nor...' makes the Hebrew coordination clear in English.
