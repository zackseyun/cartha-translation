theological_decisions:
- issue: Rendering of the false gods clause
  chosen_reading: other gods, which you have not known
  alternative_readings:
  - other gods, whom you have not known
  rationale: The verse reports an enticement to idolatry without granting theological
    legitimacy to the idols. Using 'which' avoids implying personhood beyond the Hebrew
    expression while still translating the clause naturally.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
