id: DEU.13.3
reference: Deuteronomy 13:3
source:
  edition: WLC
  text: וּ/בָ֤א הָ/אוֹת֙ וְ/הַ/מּוֹפֵ֔ת אֲשֶׁר דִּבֶּ֥ר אֵלֶ֖י/ךָ לֵ/אמֹ֑ר נֵֽלְכָ֞ה
    אַחֲרֵ֨י אֱלֹהִ֧ים אֲחֵרִ֛ים אֲשֶׁ֥ר לֹֽא יְדַעְתָּ֖/ם וְ/נָֽעָבְדֵֽ/ם־־׃
translation:
  text: and the sign or the wonder comes to pass, about which he spoke to you, saying,
    ‘Let us go after other gods, which you have not known, and let us serve them,’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and the wonder'; the Hebrew pair often functions idiomatically as 'sign
      or wonder.'
    reason: lexical_alternative
  - marker: b
    text: Or 'whom you have not known.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and let us worship them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָא
  chosen: comes to pass
  alternatives:
  - comes
  - happens
  lexicon: HALOT
  rationale: Though the verb is literally 'comes,' in English with 'sign or wonder'
    the idiom 'comes to pass' best conveys that the predicted event actually occurs.
- source_word: הָאוֹת
  chosen: the sign
  alternatives:
  - the mark
  - the portent
  lexicon: HALOT
  rationale: אוֹת commonly denotes a sign, token, or attesting event. 'Sign' is the
    most natural and standard rendering here.
- source_word: וְהַמּוֹפֵת
  chosen: or the wonder
  alternatives:
  - and the wonder
  - or the portent
  lexicon: HALOT
  rationale: In this construction אוֹת וּמוֹפֵת functions as a paired expression often
    rendered 'sign or wonder.' English idiom favors 'or' here to express either category
    of miraculous attestation rather than requiring both.
- source_word: אֲשֶׁר דִּבֶּר אֵלֶיךָ
  chosen: about which he spoke to you
  alternatives:
  - which he told you about
  - that he spoke to you
  lexicon: HALOT
  rationale: This preserves the relative clause and the prepositional sense toward
    the hearer while remaining readable modern English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and saying
  lexicon: HALOT
  rationale: Standard rendering introducing the quoted speech.
- source_word: נֵלְכָה אַחֲרֵי
  chosen: Let us go after
  alternatives:
  - Let us follow
  - Let us go along after
  lexicon: HALOT
  rationale: The cohortative plus אַחֲרֵי is a common idiom for following after, especially
    in religious allegiance. 'Go after' preserves the Hebrew imagery and the moral-religious
    sense.
- source_word: אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - other deities
  lexicon: HALOT
  rationale: Standard covenantal expression in Deuteronomy. 'Other gods' is both literal
    and contextually appropriate.
- source_word: אֲשֶׁר לֹא יְדַעְתָּם
  chosen: which you have not known
  alternatives:
  - whom you have not known
  - that you have not recognized
  lexicon: HALOT
  rationale: The direct object suffix refers back to 'other gods.' 'Known' preserves
    the covenantal sense of acquaintance/recognition without overinterpreting. 'Which'
    is used because the referent is false gods rather than personal beings acknowledged
    by the text.
- source_word: וְנָעָבְדֵם
  chosen: and let us serve them
  alternatives:
  - and let us worship them
  lexicon: HALOT
  rationale: עבד in this context refers to religious service/worship. 'Serve' is more
    formally aligned with the Hebrew and preserves the broader covenantal category;
    'worship' is a valid contextual alternative.
