id: DEU.13.13
reference: Deuteronomy 13:13
source:
  edition: WLC
  text: כִּֽי תִשְׁמַ֞ע בְּ/אַחַ֣ת עָרֶ֗י/ךָ אֲשֶׁר֩ יְהוָ֨ה אֱלֹהֶ֜י/ךָ נֹתֵ֥ן לְ/ךָ֛ לָ/שֶׁ֥בֶת שָׁ֖ם לֵ/אמֹֽר־׃
translation:
  text: If you hear it said in one of your cities that Yahweh your God is giving you to dwell there, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'When you hear'—the Hebrew conjunction can introduce a conditional or temporal clause in legal material.
    reason: lexical_alternative
  - marker: b
    text: Or 'to dwell there' or 'to settle there.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: If
  alternatives:
  - When
  - For
  lexicon: HALOT
  rationale: In this legal casuistic context, כִּי introduces a conditional scenario rather than a causal statement. 'If' best fits the protasis that continues into the following verses.
- source_word: תִשְׁמַע
  chosen: you hear
  alternatives:
  - you hear of
  - you listen
  lexicon: HALOT
  rationale: שׁמע here denotes receiving a report. 'You hear' is natural English and leaves the object to be supplied by the following infinitive construction.
- source_word: בְּאַחַת עָרֶיךָ
  chosen: in one of your cities
  alternatives:
  - in one of your towns
  lexicon: HALOT
  rationale: עִיר commonly means 'city/town.' 'Cities' is retained for consistency and because the legal setting concerns Israelite urban settlements generally.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Introduces the relative clause modifying 'cities.' 'That' is smoother in modern English than 'which' here.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Standard covenantal expression with second masculine singular suffix; 'your God' preserves the direct address.
- source_word: נֹתֵן לְךָ
  chosen: is giving you
  alternatives:
  - gives you
  - is about to give you
  lexicon: HALOT
  rationale: The participle conveys ongoing or characteristic action. 'Is giving you' preserves the Hebrew aspect and the immediacy of divine grant.
- source_word: לָשֶׁבֶת שָׁם
  chosen: to live there
  alternatives:
  - to dwell there
  - to settle there
  lexicon: HALOT
  rationale: יׁשב in the infinitive with ל expresses purpose/result of the gift of the land/city. 'To live there' is readable modern English; 'dwell' is more formal, 'settle' slightly narrower.
- source_word: לֵאמֹר
  chosen: it said ... saying
  alternatives:
  - saying
  - as follows
  lexicon: HALOT
  rationale: לֵאמֹר introduces the content of the report in the next verse. Because English normally requires an impersonal object after 'hear,' 'hear it said' makes the syntax natural while preserving the forward-looking quotative force; 'saying' is retained to reflect the Hebrew transition.
