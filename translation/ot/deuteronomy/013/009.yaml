id: DEU.13.9
reference: Deuteronomy 13:9
source:
  edition: WLC
  text: לֹא תֹאבֶ֣ה ל֔/וֹ וְ/לֹ֥א תִשְׁמַ֖ע אֵלָ֑י/ו וְ/לֹא תָח֤וֹס עֵֽינְ/ךָ֙ עָלָ֔י/ו
    וְ/לֹֽא תַחְמֹ֥ל וְ/לֹֽא תְכַסֶּ֖ה עָלָֽי/ו־־־־׃
translation:
  text: You shall not yield to him or listen to him, and your eye shall not pity him,
    and you shall not spare, and you shall not conceal him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'consent to him.' The Hebrew verb can denote being willing, consenting,
      or yielding.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'your eye shall not pity him,' a Hebrew idiom for withholding
      compassionate regard.
    reason: cultural_note
  - marker: c
    text: Or 'cover for him'—that is, hide him or conceal his guilt.
    reason: lexical_alternative
lexical_decisions:
- source_word: תֹאבֶה לּוֹ
  chosen: yield to him
  alternatives:
  - consent to him
  - be willing for him
  - agree to him
  lexicon: HALOT
  rationale: אָבָה in the Qal commonly denotes willingness, consent, or yielding.
    In this context of enticement to apostasy, 'yield to him' communicates refusal
    to comply with his persuasion more naturally than the more wooden 'consent to
    him,' while staying close to the Hebrew sense.
- source_word: תִשְׁמַע אֵלָיו
  chosen: listen to him
  alternatives:
  - hear him
  - obey him
  lexicon: HALOT
  rationale: שׁמע with אֶל can mean listen to or heed. Here the parallel with refusing
    consent suggests receptive listening to his solicitation, not mere auditory hearing.
    'Listen to him' preserves that sense without overtranslating to full obedience.
- source_word: תָחוֹס עֵינְךָ עָלָיו
  chosen: your eye shall not pity him
  alternatives:
  - your eye shall not spare him
  - your eye shall not look compassionately on him
  lexicon: HALOT
  rationale: חוּס means to look with pity, spare, or have compassion. Because the
    idiom explicitly includes 'your eye,' the translation preserves the Hebrew imagery
    rather than flattening it to simply 'do not spare him.'
- source_word: תַחְמֹל
  chosen: spare
  alternatives:
  - have compassion
  - show mercy
  lexicon: HALOT
  rationale: חמל overlaps semantically with חוס but is a distinct verb, often meaning
    spare or have compassion. Rendering it as 'spare' differentiates it from the prior
    'pity' while preserving the cumulative force of the prohibitions.
- source_word: תְכַסֶּה עָלָיו
  chosen: conceal him
  alternatives:
  - cover for him
  - hide him
  - shield him
  lexicon: HALOT
  rationale: כסה in the Piel here means to cover or conceal, likely in the sense of
    hiding the offender or suppressing his guilt. 'Conceal him' is concise, idiomatic,
    and preserves the legal-judicial force.
