theological_decisions:
- issue: Retention of severe covenant-judicial language in a verse about an apostasy
    enticer
  chosen_reading: Preserve the direct prohibitions without softening them into generalized
    disapproval.
  alternative_readings:
  - Paraphrase as emotional detachment only
  - Soften to 'do not protect him' without the repeated prohibitions
  rationale: The verse belongs to a legal context requiring the hearer not to consent
    to, sympathize with, spare, or hide the offender. The translation keeps the escalating
    sequence and does not mute the text's severity, in keeping with original-language
    primacy and avoidance of doctrinally motivated softening.
  doctrine_reference: Translation philosophy §§1, 3, 6
