theological_decisions:
- issue: Number/person of the final suffix in covenant address
  chosen_reading: Retain singular 'your midst'
  alternative_readings:
  - among you
  rationale: The Hebrew suffix is singular masculine, a common feature of Deuteronomy's
    corporate address to Israel as one people. Preserving 'your' reflects the source
    more closely, while English readers can still understand the collective reference.
  doctrine_reference: Translation philosophy §4, gender-accurate over gender-neutral
