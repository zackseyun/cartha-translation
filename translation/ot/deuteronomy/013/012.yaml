id: DEU.13.12
reference: Deuteronomy 13:12
source:
  edition: WLC
  text: וְ/כָל יִשְׂרָאֵ֔ל יִשְׁמְע֖וּ וְ/יִֽרָא֑וּ/ן וְ/לֹֽא יוֹסִ֣פוּ לַ/עֲשׂ֗וֹת
    כַּ/דָּבָ֥ר הָ/רָ֛ע הַ/זֶּ֖ה בְּ/קִרְבֶּֽ/ךָ־־׃ס
translation:
  text: And all Israel shall hear and fear, and they shall not again do this evil
    thing in your midst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among you.' The Hebrew uses a singular form of address for Israel as
      a corporate whole.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל יִשְׂרָאֵל
  chosen: And all Israel
  alternatives:
  - And all of Israel
  lexicon: HALOT
  rationale: כָּל with the proper name Israel denotes the whole covenant people collectively.
    'All Israel' is the natural English rendering.
- source_word: יִשְׁמְעוּ
  chosen: shall hear
  alternatives:
  - will hear
  lexicon: HALOT
  rationale: Qal imperfect 3mp of שׁמע here has future/result force in legal context.
    'Shall hear' preserves the formal judicial tone.
- source_word: וְיִרָאוּן
  chosen: and fear
  alternatives:
  - and be afraid
  lexicon: HALOT
  rationale: From ירא, in this covenant-law setting the sense is fear leading to deterrence.
    'Fear' is concise and traditional without overstating emotional terror.
- source_word: וְלֹא יוֹסִפוּ
  chosen: and they shall not again
  alternatives:
  - and they shall not continue
  - and they shall no longer
  lexicon: HALOT
  rationale: The Hiphil of יסף with infinitive commonly means 'to add, continue, do
    again.' Here it expresses prevention of repetition after punishment. 'Shall not
    again' captures the idiom naturally in English.
- source_word: לַעֲשׂוֹת
  chosen: do
  alternatives:
  - to do
  lexicon: HALOT
  rationale: Infinitive construct governed by יוֹסִפוּ; in English the finite expression
    'shall not again do' is smoother than preserving the infinitive overtly.
- source_word: כַּדָּבָר הָרָע הַזֶּה
  chosen: this evil thing
  alternatives:
  - such an evil thing
  - this evil matter
  lexicon: HALOT
  rationale: דָּבָר can mean 'word, matter, thing.' In this legal narrative context
    it refers to the deed just described. 'This evil thing' is idiomatic and specific.
- source_word: בְּקִרְבֶּךָ
  chosen: in your midst
  alternatives:
  - among you
  lexicon: HALOT
  rationale: Literally 'in your midst,' singular suffix addressing Israel corporately.
    This preserves the covenantal address while remaining natural English.
