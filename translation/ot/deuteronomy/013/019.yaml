id: DEU.13.19
reference: Deuteronomy 13:19
source:
  edition: WLC
  text: כִּ֣י תִשְׁמַ֗ע בְּ/קוֹל֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ לִ/שְׁמֹר֙ אֶת כָּל מִצְוֺתָ֔י/ו
    אֲשֶׁ֛ר אָנֹכִ֥י מְצַוְּ/ךָ֖ הַ/יּ֑וֹם לַ/עֲשׂוֹת֙ הַ/יָּשָׁ֔ר בְּ/עֵינֵ֖י יְהוָ֥ה
    אֱלֹהֶֽי/ךָ־־׃ס
translation:
  text: if you listen to the voice of the LORD your God, keeping all his commandments
    that I am commanding you today, by doing what is right in the eyes of the LORD
    your God.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: כִּי
  chosen: if
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: In this context כִּי introduces the condition on which the preceding
    promise depends, so 'if' best captures the syntactic force in natural English.
- source_word: תִשְׁמַע
  chosen: you listen
  alternatives:
  - you hear
  - you obey
  lexicon: HALOT
  rationale: שׁמע with 'voice' often carries the sense of attentive hearing that issues
    in obedience. 'Listen' preserves the auditory metaphor while allowing the obedience
    nuance to remain, rather than flattening it to simply 'obey'.
- source_word: בְּקוֹל
  chosen: to the voice
  alternatives:
  - to the sound
  - to the command
  lexicon: HALOT
  rationale: The idiom שׁמע בקול is conventionally 'listen to the voice of.' Retaining
    'voice' preserves the Hebrew expression and its personal dimension.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name is rendered 'the LORD' rather
    than transliterated.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Standard covenantal expression; straightforward possessive rendering.
- source_word: לִשְׁמֹר
  chosen: keeping
  alternatives:
  - to keep
  - observing
  - guarding
  lexicon: HALOT
  rationale: An infinitive of purpose/result following the conditional clause. 'Keeping'
    fits smooth English while preserving the sense of careful observance.
- source_word: כָּל מִצְוֺתָיו
  chosen: all his commandments
  alternatives:
  - all his commands
  lexicon: HALOT
  rationale: מִצְוָה is well represented by 'commandment' in covenantal/legal contexts;
    'all' is retained explicitly.
- source_word: אֲשֶׁר אָנֹכִי מְצַוְּךָ הַיּוֹם
  chosen: that I am commanding you today
  alternatives:
  - that I command you today
  - which I am commanding you today
  lexicon: HALOT
  rationale: The participle מְצַוֶּה has present/imperfective force; 'am commanding'
    reflects the ongoing speech-act in the discourse setting.
- source_word: לַעֲשׂוֹת
  chosen: by doing
  alternatives:
  - to do
  - doing
  lexicon: HALOT
  rationale: This infinitive explains the manner in which the commandments are kept.
    'By doing' makes the relationship clear in idiomatic English.
- source_word: הַיָּשָׁר
  chosen: what is right
  alternatives:
  - the right thing
  - what is upright
  lexicon: HALOT
  rationale: יָשָׁר denotes what is right/upright. 'What is right' is natural modern
    English and preserves the ethical sense.
- source_word: בְּעֵינֵי
  chosen: in the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: A common Hebrew idiom for evaluation or judgment. 'In the eyes of' is
    transparent and familiar in English Bible style.
