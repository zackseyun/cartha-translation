theological_decisions:
- issue: Rendering בְּנֵי בְלִיַּעַל
  chosen_reading: worthless men
  alternative_readings:
  - sons of Belial
  - wicked men
  rationale: In this Hebrew context the phrase is an idiom for morally corrupt persons,
    not necessarily a proper name or demonic title. Rendering it idiomatically avoids
    importing later theological associations with 'Belial' that the verse itself does
    not require.
  doctrine_reference: 'Translation philosophy: original-language primacy; do not import
    doctrinal claims the text does not make.'
