id: DEU.13.14
reference: Deuteronomy 13:14
source:
  edition: WLC
  text: יָצְא֞וּ אֲנָשִׁ֤ים בְּנֵֽי בְלִיַּ֨עַל֙ מִ/קִּרְבֶּ֔/ךָ וַ/יַּדִּ֛יחוּ אֶת
    יֹשְׁבֵ֥י עִירָ֖/ם לֵ/אמֹ֑ר נֵלְכָ֗ה וְ/נַעַבְדָ֛ה אֱלֹהִ֥ים אֲחֵרִ֖ים אֲשֶׁ֥ר
    לֹא יְדַעְתֶּֽם־־־׃
translation:
  text: Certain worthless men have gone out from among you and have led the inhabitants
    of their city astray, saying, ‘Let us go and serve other gods,’ whom you have
    not known.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''sons of worthlessness''; traditionally, ''sons of Belial.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יָצְאוּ
  chosen: have gone out
  alternatives:
  - have come out
  - went out
  lexicon: HALOT
  rationale: Qal perfect plural of יצא, here introducing the emergence of agitators
    from within Israel. Present perfect in English fits the conditional/report style
    ('if you hear... that ... have gone out').
- source_word: אֲנָשִׁים
  chosen: men
  alternatives:
  - people
  - persons
  lexicon: HALOT
  rationale: The noun is explicitly masculine plural. To follow the gender-accurate
    principle, 'men' is retained rather than neutralizing to 'people.'
- source_word: בְּנֵי בְלִיַּעַל
  chosen: worthless men
  alternatives:
  - base fellows
  - sons of worthlessness
  - wicked men
  lexicon: HALOT
  rationale: The construct phrase literally means 'sons of worthlessness,' an idiom
    for morally corrupt or lawless persons. 'Worthless men' preserves the idiomatic
    force in readable English without importing later personified uses of Belial.
- source_word: מִקִּרְבְּךָ
  chosen: from among you
  alternatives:
  - from your midst
  lexicon: HALOT
  rationale: The phrase indicates origin from within the covenant community. 'From
    among you' is natural modern English and preserves the communal sense.
- source_word: וַיַּדִּיחוּ
  chosen: have led ... astray
  alternatives:
  - have driven away
  - have enticed
  - have seduced
  lexicon: HALOT
  rationale: The Hiphil of נדח conveys causing someone to be driven away or led astray,
    especially into apostasy in Deuteronomy. 'Led astray' best captures the religious
    defection in context.
- source_word: יֹשְׁבֵי עִירָם
  chosen: the inhabitants of their city
  alternatives:
  - those dwelling in their city
  - the residents of their city
  lexicon: HALOT
  rationale: The participial construction means 'the dwellers/inhabitants of their
    city.' 'Inhabitants' is concise and idiomatic.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - by saying
  lexicon: HALOT
  rationale: Standard rendering of the infinitive construct introducing direct speech.
- source_word: נֵלְכָה וְנַעַבְדָה
  chosen: Let us go and serve
  alternatives:
  - Let us go and worship
  - Come, let us go and serve
  lexicon: HALOT
  rationale: The cohortatives express exhortation. 'Serve' is preferred for עבד because
    it is the broader covenantal term for religious service, not only cultic worship.
- source_word: אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  lexicon: HALOT
  rationale: The standard Deuteronomic phrase is best rendered literally as 'other
    gods.' 'Foreign gods' is interpretive and narrower.
- source_word: אֲשֶׁר לֹא יְדַעְתֶּם
  chosen: whom you have not known
  alternatives:
  - which you have not known
  - that you have not known
  lexicon: HALOT
  rationale: Because the referent is 'gods,' English idiom can use 'whom' for personal
    objects of worship. 'Known' preserves the covenantal-relational nuance of ידע
    rather than reducing it to mere awareness.
