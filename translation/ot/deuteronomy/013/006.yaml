id: DEU.13.6
reference: Deuteronomy 13:6
source:
  edition: WLC
  text: וְ/הַ/נָּבִ֣יא הַ/ה֡וּא א֣וֹ חֹלֵם֩ הַ/חֲל֨וֹם הַ/ה֜וּא יוּמָ֗ת כִּ֣י דִבֶּר
    סָ֠רָה עַל יְהוָ֨ה אֱלֹֽהֵי/כֶ֜ם הַ/מּוֹצִ֥יא אֶתְ/כֶ֣ם מֵ/אֶ֣רֶץ מִצְרַ֗יִם וְ/הַ/פֹּֽדְ/ךָ֙
    מִ/בֵּ֣ית עֲבָדִ֔ים לְ/הַדִּֽיחֲ/ךָ֙ מִן הַ/דֶּ֔רֶךְ אֲשֶׁ֧ר צִוְּ/ךָ֛ יְהוָ֥ה
    אֱלֹהֶ֖י/ךָ לָ/לֶ֣כֶת בָּ֑/הּ וּ/בִֽעַרְתָּ֥ הָ/רָ֖ע מִ/קִּרְבֶּֽ/ךָ־־׀־׃
translation:
  text: But that prophet, or that dreamer of dreams, shall be put to death, because
    he has spoken rebellion against the LORD your God, who brought you out from the
    land of Egypt and redeemed you from the house of slaves, to drive you from the
    way in which the LORD your God commanded you to walk. So you shall purge the evil
    from your midst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'apostasy.' The Hebrew phrase 'spoken rebellion' denotes defection from
      covenant loyalty to the LORD.
    reason: lexical_alternative
  - marker: b
    text: Traditionally 'the house of bondage'; literally 'the house of slaves.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַנָּבִיא הַהוּא
  chosen: But that prophet
  alternatives:
  - And that prophet
  - Now that prophet
  lexicon: HALOT
  rationale: The conjunction links back to the prior case and here is best rendered
    adversatively/resumptively as 'But' in English legal discourse. 'Prophet' is the
    straightforward sense of נָבִיא.
- source_word: אוֹ חֹלֵם הַחֲלוֹם הַהוּא
  chosen: or that dreamer of dreams
  alternatives:
  - or that dreamer
  - or the one dreaming that dream
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'dreamer of the dream,' but English naturally
    renders this as 'dreamer of dreams.' Retaining 'that' mirrors the demonstrative
    emphasis applied to both false claimants.
- source_word: יוּמָת
  chosen: shall be put to death
  alternatives:
  - shall die
  - must be executed
  lexicon: HALOT
  rationale: The Hophal of מות is causative/passive, indicating judicial execution
    rather than mere death. 'Shall be put to death' preserves the legal force.
- source_word: כִּי דִבֶּר סָרָה
  chosen: because he has spoken rebellion
  alternatives:
  - because he has spoken apostasy
  - because he has spoken perversity
  - because he has spoken a turning away
  lexicon: HALOT
  rationale: סָרָה denotes defection, rebellion, or apostasy against covenant loyalty.
    'Rebellion' is clear modern English and fits the context of incitement against
    the LORD. 'Spoken rebellion' preserves the Hebrew construction without over-paraphrasing.
- source_word: עַל יְהוָה אֱלֹהֵיכֶם
  chosen: against the LORD your God
  alternatives:
  - concerning the LORD your God
  lexicon: HALOT
  rationale: With דיבר + על in this hostile context, 'against' best conveys speech
    in opposition to the LORD. YHWH is rendered 'the LORD' per doctrine.
- source_word: הַמּוֹצִיא אֶתְכֶם מֵאֶרֶץ מִצְרַיִם
  chosen: who brought you out from the land of Egypt
  alternatives:
  - who brought you out of the land of Egypt
  lexicon: HALOT
  rationale: This is standard exodus language. 'Brought you out from' closely reflects
    the preposition while remaining natural English.
- source_word: וְהַפֹּדְךָ מִבֵּית עֲבָדִים
  chosen: and redeemed you from the house of slaves
  alternatives:
  - and redeemed you from the house of bondage
  - and ransomed you from the slave house
  lexicon: HALOT
  rationale: פּדה is 'redeem/ransom.' בֵּית עֲבָדִים is literally 'house of slaves';
    this preserves the concrete social imagery better than the traditional but more
    abstract 'house of bondage.' The shift from plural 'you' earlier to singular suffix
    here reflects the Hebrew's distributive address but is smoothed to plural in English
    for coherence.
- source_word: לְהַדִּיחֲךָ
  chosen: to drive you
  alternatives:
  - to thrust you away
  - to lead you astray
  lexicon: HALOT
  rationale: The Hiphil of נדח carries the sense of driving away or seducing away
    from covenant fidelity. 'Drive you' keeps the force and pairs naturally with 'from
    the way.'
- source_word: מִן הַדֶּרֶךְ
  chosen: from the way
  alternatives:
  - away from the path
  lexicon: HALOT
  rationale: '''The way'' is a common covenantal metaphor in Deuteronomy and should
    be preserved rather than flattened.'
- source_word: אֲשֶׁר צִוְּךָ יְהוָה אֱלֹהֶיךָ לָלֶכֶת בָּהּ
  chosen: in which the LORD your God commanded you to walk
  alternatives:
  - that the LORD your God commanded you to walk in
  - which the LORD your God commanded you to follow
  lexicon: HALOT
  rationale: The infinitive 'to walk in it' is a standard Hebrew idiom for conduct.
    'Walk' preserves the metaphor and theological texture.
- source_word: וּבִעַרְתָּ הָרָע מִקִּרְבֶּךָ
  chosen: So you shall purge the evil from your midst
  alternatives:
  - and you shall burn out the evil from your midst
  - thus you shall remove the evil from among you
  lexicon: HALOT
  rationale: בער in this Deuteronomic legal formula means to remove/purge decisively.
    'Purge the evil from your midst' is the established and accurate legal-covenantal
    sense.
