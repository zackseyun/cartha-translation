theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering בֵּית עֲבָדִים
  chosen_reading: the house of slaves
  alternative_readings:
  - the house of bondage
  rationale: The translation philosophy prioritizes original-language primacy over
    inherited tradition. The literal social image of slavery is present in the Hebrew
    and should be preserved rather than abstracted.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
