id: DEU.13.5
reference: Deuteronomy 13:5
source:
  edition: WLC
  text: אַחֲרֵ֨י יְהוָ֧ה אֱלֹהֵי/כֶ֛ם תֵּלֵ֖כוּ וְ/אֹת֣/וֹ תִירָ֑אוּ וְ/אֶת מִצְוֺתָ֤י/ו תִּשְׁמֹ֨רוּ֙ וּ/בְ/קֹל֣/וֹ תִשְׁמָ֔עוּ וְ/אֹת֥/וֹ תַעֲבֹ֖דוּ וּ/ב֥/וֹ תִדְבָּקֽוּ/ן־׃
translation:
  text: You shall walk after Yahweh your God and fear him, and keep his commandments and listen to his voice, and serve him, and cling to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'follow the LORD your God.' The Hebrew says literally, 'walk after the LORD your God.'
    reason: lexical_alternative
  - marker: b
    text: '''Listen to his voice'' can also carry the sense ''obey his voice'' or ''obey him.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'hold fast to him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרֵי
  chosen: after
  alternatives:
  - following
  lexicon: HALOT
  rationale: The preposition literally means 'after.' In the idiom with הלך ('walk'), 'walk after' preserves the covenantal metaphor of following in allegiance better than a flatter dynamic rendering alone.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with 2mp suffix; 'your God' preserves the covenant relationship addressed to Israel.
- source_word: תֵּלֵכוּ
  chosen: you shall walk
  alternatives:
  - you shall go
  - you shall follow
  lexicon: HALOT
  rationale: הלך in covenant exhortation commonly carries the metaphorical sense of conduct or allegiance. 'Walk' preserves the Hebrew idiom and biblical resonance; 'follow' is possible but would duplicate the force already conveyed by אַחֲרֵי.
- source_word: תִירָאוּ
  chosen: fear him
  alternatives:
  - revere him
  lexicon: HALOT
  rationale: ירא in relation to God includes reverence and awe, but 'fear' is the standard covenant term and best preserves the theological weight without softening it.
- source_word: מִצְוֺתָיו
  chosen: his commandments
  alternatives:
  - his commands
  lexicon: HALOT
  rationale: '''Commandments'' preserves the formal covenantal register of מצוה better than the slightly more colloquial ''commands.'''
- source_word: תִּשְׁמֹרוּ
  chosen: keep
  alternatives:
  - observe
  - guard
  lexicon: HALOT
  rationale: שׁמר with commandments means to keep/observe them. 'Keep' is concise, idiomatic, and standard in covenant contexts.
- source_word: וּבְקֹלוֹ תִּשְׁמָעוּ
  chosen: listen to his voice
  alternatives:
  - obey his voice
  - listen to him
  lexicon: HALOT
  rationale: שׁמע בְּקוֹל can imply obedience, but the Hebrew wording is literally 'listen to his voice.' This preserves the source expression while allowing the obedience nuance to remain implicit in context.
- source_word: תַעֲבֹדוּ
  chosen: serve him
  alternatives:
  - worship him
  lexicon: HALOT
  rationale: עבד can denote service or worship in relation to God. 'Serve' is broader and more literal here, preserving both cultic and covenantal dimensions without narrowing the sense.
- source_word: תִדְבָּקוּן
  chosen: cling to him
  alternatives:
  - hold fast to him
  - be joined to him
  lexicon: HALOT
  rationale: דבק conveys close attachment or cleaving. 'Cling to him' is vivid, idiomatic, and preserves the relational intensity of covenant loyalty.
