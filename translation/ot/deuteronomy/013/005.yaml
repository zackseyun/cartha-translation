theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to render שׁמע בְּקוֹל dynamically as explicit obedience
  chosen_reading: listen to his voice
  alternative_readings:
  - obey his voice
  - obey him
  rationale: The phrase often carries the sense of obedience, but the Hebrew text explicitly says 'listen to his voice.' To avoid importing more interpretation than necessary, the main text preserves the wording, while the obedience nuance is acknowledged as an alternative lexical possibility.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
