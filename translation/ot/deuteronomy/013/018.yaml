theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering חֵרֶם
  chosen_reading: what is devoted to destruction
  alternative_readings:
  - the ban
  - what is under the ban
  rationale: This verse depends on the covenantal concept of items placed under irrevocable destruction. The chosen rendering makes the meaning explicit for modern readers without importing extra doctrinal claims.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
- issue: Anthropopathic language for divine anger
  chosen_reading: the LORD may turn from the fierceness of his anger
  alternative_readings:
  - the LORD may turn from his burning anger
  rationale: The Hebrew uses vivid anthropopathic idiom. The translation preserves the personal and covenantal force of divine wrath without softening it into abstraction or over-literalizing the body-part imagery.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
- issue: Gender-accurate rendering of אֲבֹתֶיךָ
  chosen_reading: your fathers
  alternative_readings:
  - your ancestors
  rationale: The Hebrew specifically says 'your fathers,' referring to the patriarchal covenant line. Per translation philosophy, gender-accurate wording is preferred where it matches the source's intent.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
