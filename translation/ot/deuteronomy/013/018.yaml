id: DEU.13.18
reference: Deuteronomy 13:18
source:
  edition: WLC
  text: וְ/לֹֽא יִדְבַּ֧ק בְּ/יָדְ/ךָ֛ מְא֖וּמָה מִן הַ/חֵ֑רֶם לְמַעַן֩ יָשׁ֨וּב יְהוָ֜ה מֵ/חֲר֣וֹן אַפּ֗/וֹ וְ/נָֽתַן לְ/ךָ֤ רַחֲמִים֙ וְ/רִֽחַמְ/ךָ֣ וְ/הִרְבֶּ֔/ךָ כַּ/אֲשֶׁ֥ר נִשְׁבַּ֖ע לַ/אֲבֹתֶֽי/ךָ־־־׃
translation:
  text: And nothing from what is devoted to destruction shall cling to your hand, so that Yahweh may turn from the fierceness of his anger and show you mercy, and have compassion on you, and multiply you, just as he swore to your fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'nothing from the ban' or 'nothing of what is under the ban.' The Hebrew חֵרֶם refers to something devoted irrevocably to God, often for destruction.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from the fierceness of his nose/anger,' an idiom for intense anger.
    reason: cultural_note
lexical_decisions:
- source_word: יִדְבַּק
  chosen: shall cling
  alternatives:
  - shall stick
  - shall remain attached
  lexicon: HALOT
  rationale: The verb דבק literally denotes sticking or clinging. 'Shall cling' preserves the concrete image while reading naturally in English in the idiom 'cling to your hand.'
- source_word: בְּיָדְךָ
  chosen: to your hand
  alternatives:
  - in your hand
  - on your hand
  lexicon: HALOT
  rationale: The Hebrew preposition ב with 'hand' here functions idiomatically for possession or retention. 'To your hand' best matches the verb 'cling' in English while preserving the bodily metaphor.
- source_word: מְאוּמָה
  chosen: nothing
  alternatives:
  - anything
  - the least thing
  lexicon: HALOT
  rationale: The noun means anything at all; with negation it is naturally rendered 'nothing.' This conveys the total prohibition clearly.
- source_word: הַחֵרֶם
  chosen: what is devoted to destruction
  alternatives:
  - the devoted thing
  - the ban
  - what is under the ban
  lexicon: HALOT
  rationale: חֵרֶם is a key covenant-war term for something devoted irrevocably to God for destruction. 'What is devoted to destruction' communicates the sense more transparently than the traditional but opaque 'the ban.'
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the sake that
  lexicon: HALOT
  rationale: This introduces purpose/result. 'So that' is natural modern English and preserves the clause's logic.
- source_word: יָשׁוּב יְהוָה מֵחֲרוֹן אַפּוֹ
  chosen: the LORD may turn from the fierceness of his anger
  alternatives:
  - the LORD may turn from his burning anger
  - the LORD may turn back from the heat of his anger
  lexicon: HALOT
  rationale: שׁוּב with מן expresses turning away from. חֲרוֹן אַף is an idiom for burning or fierce anger. 'Fierceness of his anger' is idiomatic and weighty without being archaic. YHWH is rendered 'the LORD' per doctrine.
- source_word: רַחֲמִים
  chosen: mercy
  alternatives:
  - compassion
  - tender mercies
  lexicon: HALOT
  rationale: The plural noun often denotes compassion or mercy. Here 'show you mercy' fits the collocation with נתן ('give') in idiomatic English.
- source_word: וְרִחַמְךָ
  chosen: have compassion on you
  alternatives:
  - show compassion to you
  - have mercy on you
  lexicon: HALOT
  rationale: Using 'have compassion on you' distinguishes this verbal form from the preceding noun רַחֲמִים, preserving the Hebrew's near-synonymous intensification rather than flattening both into identical English.
- source_word: וְהִרְבֶּךָ
  chosen: multiply you
  alternatives:
  - make you numerous
  - increase you
  lexicon: HALOT
  rationale: The Hiphil of רבה commonly means to make numerous. 'Multiply you' preserves covenantal resonance with patriarchal promise language.
- source_word: כַּאֲשֶׁר נִשְׁבַּע לַאֲבֹתֶיךָ
  chosen: just as he swore to your fathers
  alternatives:
  - as he swore to your ancestors
  lexicon: HALOT
  rationale: '''Fathers'' is retained as gender-accurate and covenantally specific, in line with the translation philosophy. ''Just as'' captures the comparative force of כַאֲשֶׁר.'
