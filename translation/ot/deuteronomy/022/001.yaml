id: DEU.22.1
reference: Deuteronomy 22:1
source:
  edition: WLC
  text: לֹֽא תִרְאֶה֩ אֶת שׁ֨וֹר אָחִ֜י/ךָ א֤וֹ אֶת שֵׂי/וֹ֙ נִדָּחִ֔ים וְ/הִתְעַלַּמְתָּ֖
    מֵ/הֶ֑ם הָשֵׁ֥ב תְּשִׁיבֵ֖/ם לְ/אָחִֽי/ךָ־־־׃
translation:
  text: You shall not see your brother’s ox or his sheep driven away and ignore them;
    you must certainly return them to your brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'his sheep' may more broadly denote a head of small livestock, such
      as a sheep or goat.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'hide yourself from them,' that is, deliberately avoid involvement.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָחִיךָ
  chosen: your brother
  alternatives:
  - your fellow Israelite
  - your kinsman
  - your neighbor
  lexicon: HALOT
  rationale: Literal 'your brother' best matches the Hebrew and preserves the covenantal/social
    force of kinship language. Although the law applies within Israelite community
    life and may imply a fellow member of the covenant people, the text itself uses
    kinship terminology, so the main text keeps 'brother' rather than flattening to
    'neighbor.'
- source_word: שׁוֹר
  chosen: ox
  alternatives:
  - bull
  - cattle
  lexicon: HALOT
  rationale: '''Ox'' is the standard and sufficiently precise rendering for domesticated
    bovine livestock in legal material. ''Bull'' is too specific, and ''cattle'' is
    too collective.'
- source_word: שֵׂיוֹ
  chosen: his sheep
  alternatives:
  - his flock animal
  - his goat/sheep
  lexicon: HALOT
  rationale: The noun can refer more broadly to small livestock, especially sheep
    or goats, but 'sheep' is the most natural English rendering here and matches common
    legal-list pairings with oxen. A broader alternative is worth preserving in a
    footnote because the Hebrew term can include goats.
- source_word: נִדָּחִים
  chosen: driven away
  alternatives:
  - straying
  - wandering
  - cast off
  lexicon: HALOT
  rationale: The participle from נדח conveys being driven off, banished, or scattered.
    In this context of lost livestock, 'driven away' preserves the passive/resultative
    sense better than the more neutral 'straying,' while still reading naturally in
    English.
- source_word: וְהִתְעַלַּמְתָּ מֵהֶם
  chosen: and ignore them
  alternatives:
  - and hide yourself from them
  - and disregard them
  - and pretend not to notice them
  lexicon: HALOT
  rationale: The idiom literally means 'hide yourself from them,' that is, deliberately
    avoid involvement. 'Ignore them' communicates the legal-ethical force in clear
    modern English; the more literal idiom is preserved in a footnote.
- source_word: הָשֵׁב תְּשִׁיבֵם
  chosen: you must certainly return them
  alternatives:
  - you shall surely bring them back
  - you must indeed restore them
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the command. 'You
    must certainly return them' captures both the obligation and the emphatic force
    without sounding archaic.
