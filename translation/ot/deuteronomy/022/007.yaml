id: DEU.22.7
reference: Deuteronomy 22:7
source:
  edition: WLC
  text: שַׁלֵּ֤חַ תְּשַׁלַּח֙ אֶת הָ/אֵ֔ם וְ/אֶת הַ/בָּנִ֖ים תִּֽקַּֽח לָ֑/ךְ לְמַ֨עַן֙
    יִ֣יטַב לָ֔/ךְ וְ/הַאֲרַכְתָּ֖ יָמִֽים־־־׃ס
translation:
  text: You must surely let the mother go, but you may take the young for yourself,
    so that it may go well for you and you may live long.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'you shall surely let the mother go.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sons'; in the context of a bird's nest, this means the young.
    reason: lexical_alternative
  - marker: c
    text: Or, more literally, 'and you may prolong days.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁלֵּחַ תְּשַׁלַּח
  chosen: must surely let ... go
  alternatives:
  - shall certainly let ... go
  - surely send away
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the command. 'Must
    surely let ... go' preserves the emphatic force in natural English without sounding
    archaic.
- source_word: הָאֵם
  chosen: the mother
  alternatives:
  - the mother bird
  lexicon: HALOT
  rationale: The immediate context is a bird's nest, so 'the mother' is sufficient
    and reflects the Hebrew directly. 'Bird' is implied by context and need not be
    added in the main text.
- source_word: הַבָּנִים
  chosen: the young
  alternatives:
  - the children
  - the chicks
  lexicon: HALOT
  rationale: Although literally 'sons/children,' in the context of birds this refers
    to offspring. 'The young' is idiomatic and broad enough to include nestlings or
    eggs from the prior verse's context, whereas 'children' would sound unnatural
    and 'chicks' could be too narrow.
- source_word: תִּקַּח לָךְ
  chosen: you may take ... for yourself
  alternatives:
  - you shall take ... for yourself
  - you may take
  lexicon: HALOT
  rationale: 'The imperfect here follows the prohibition/command sequence and functions
    permissively in context: after releasing the mother, taking the young is allowed.
    ''For yourself'' preserves לָךְ.'
- source_word: לְמַעַן יִיטַב לָךְ
  chosen: so that it may go well for you
  alternatives:
  - that it may be well with you
  lexicon: HALOT
  rationale: This is a common covenantal/result formula. 'Go well for you' is clear
    modern English while staying close to the Hebrew idiom.
- source_word: וְהַאֲרַכְתָּ יָמִים
  chosen: and you may live long
  alternatives:
  - and you may prolong your days
  - and your days may be prolonged
  lexicon: HALOT
  rationale: Literally, 'and you will prolong days.' In English, 'live long' communicates
    the idiomatic sense naturally. The modal 'may' matches the purpose/result construction
    introduced by לְמַעַן.
