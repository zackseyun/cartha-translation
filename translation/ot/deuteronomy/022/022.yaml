theological_decisions:
- issue: Rendering the marital-status phrase בְעֻלַת בַּעַל
  chosen_reading: married to a husband
  alternative_readings:
  - married woman
  rationale: The Hebrew emphasizes that the woman is under a marital bond. The chosen
    wording keeps that emphasis visible while avoiding an unnecessarily wooden or
    misleading ownership expression in English.
  doctrine_reference: Translation philosophy §1, §6
- issue: Whether to make the judicial penalty explicit as execution
  chosen_reading: shall die
  alternative_readings:
  - shall be put to death
  rationale: The legal context clearly implies judicial death, but the Hebrew wording
    itself says 'shall die.' The main text stays closer to the source, while the legal
    force is evident from context.
  doctrine_reference: Translation philosophy §1, §5
