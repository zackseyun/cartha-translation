id: DEU.22.22
reference: Deuteronomy 22:22
source:
  edition: WLC
  text: כִּֽי יִמָּצֵ֨א אִ֜ישׁ שֹׁכֵ֣ב עִם אִשָּׁ֣ה בְעֻֽלַת בַּ֗עַל וּ/מֵ֨תוּ֙ גַּם
    שְׁנֵי/הֶ֔ם הָ/אִ֛ישׁ הַ/שֹּׁכֵ֥ב עִם הָ/אִשָּׁ֖ה וְ/הָ/אִשָּׁ֑ה וּ/בִֽעַרְתָּ֥
    הָ/רָ֖ע מִ/יִּשְׂרָאֵֽל־׀־־־־׃ס
translation:
  text: If a man is found lying with a woman married to a husband, then both of them
    shall die—the man who lay with the woman, and the woman. So you shall purge the
    evil from Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more smoothly, 'a married woman.' Literally, 'a woman married to a husband.'
    reason: lexical_alternative
  - marker: b
    text: '''Shall die'' here states the law''s death penalty; some translations make
      this explicit with ''shall be put to death.'''
    reason: alternative_reading
lexical_decisions:
- source_word: יִמָּצֵא
  chosen: is found
  alternatives:
  - is discovered
  - is caught
  lexicon: HALOT
  rationale: Niphal of מצא here is passive/reflexive, indicating discovery rather
    than merely existence. 'Is found' is the most direct and idiomatic legal rendering.
- source_word: שֹׁכֵב עִם
  chosen: lying with
  alternatives:
  - sleeping with
  - having sexual relations with
  lexicon: HALOT
  rationale: This idiom denotes sexual intercourse. 'Lying with' preserves the Hebrew
    idiom and legal-register gravity better than the more colloquial 'sleeping with'
    or the more interpretive 'having sexual relations with'.
- source_word: בְעֻלַת בַּעַל
  chosen: married to a husband
  alternatives:
  - married woman
  - owned by a husband
  lexicon: HALOT
  rationale: Literally the phrase is 'possessed of a husband' / 'married to a husband.'
    The chosen rendering preserves the marital status explicitly without importing
    the cruder ownership nuance into the main text. 'Married woman' is smoother but
    loses the Hebrew emphasis on her being under a husband's marriage bond.
- source_word: וּמֵתוּ גַּם שְׁנֵיהֶם
  chosen: then both of them shall die
  alternatives:
  - both of them must die
  - both of them shall be put to death
  lexicon: HALOT
  rationale: The qatal with vav in this legal context expresses the prescribed penalty.
    'Shall die' is formally close to the Hebrew; 'shall be put to death' makes the
    judicial sense more explicit but adds a passive causative nuance not directly
    stated in the wording.
- source_word: הָאִישׁ הַשֹּׁכֵב עִם הָאִשָּׁה
  chosen: the man who lay with the woman
  alternatives:
  - the man lying with the woman
  lexicon: HALOT
  rationale: English relative clause style is more natural here than a participial
    phrase, while preserving the specification that the man in question is the sexual
    partner.
- source_word: וְהָאִשָּׁה
  chosen: and the woman
  lexicon: HALOT
  rationale: Straightforward rendering; the repetition in Hebrew is retained for legal
    clarity and emphasis on shared culpability in the law's formulation.
- source_word: וּבִעַרְתָּ
  chosen: So you shall purge
  alternatives:
  - thus you shall remove
  - you shall burn away
  lexicon: HALOT
  rationale: בער in Deuteronomic legal formulas commonly means removing or purging
    evil from the covenant community. 'Purge' preserves the established juridical-moral
    force better than the flatter 'remove.'
- source_word: הָרָע
  chosen: the evil
  alternatives:
  - the wickedness
  - what is evil
  lexicon: HALOT
  rationale: The singular abstract noun is best rendered 'the evil' in this recurring
    Deuteronomic formula, preserving its formal and covenantal tone.
- source_word: מִיִּשְׂרָאֵל
  chosen: from Israel
  alternatives:
  - from among Israel
  - from your midst, Israel
  lexicon: HALOT
  rationale: The preposition marks removal from the covenant people. 'From Israel'
    is concise and faithful; 'from among Israel' is possible but slightly more expansive
    than the Hebrew wording here.
