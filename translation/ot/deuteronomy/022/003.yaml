theological_decisions:
- issue: Rendering of אָחִיךָ in covenant-law context
  chosen_reading: your brother
  alternative_readings:
  - your fellow Israelite
  - your kinsman
  rationale: The Hebrew singular masculine kinship term is retained in line with the
    project's gender-accurate policy and preference for original-language primacy.
    Although the law applies broadly within the covenant community, the text itself
    uses 'brother,' so the translation preserves that social-theological framing rather
    than generalizing it in the main text.
  doctrine_reference: Translation philosophy §1, §4
- issue: Force of לֹא תוּכַל לְהִתְעַלֵּם
  chosen_reading: you may not ignore it
  alternative_readings:
  - you cannot hide yourself
  - you must not pretend not to notice
  rationale: The Hebrew idiom literally speaks of not being able to conceal oneself,
    but in legal context it functions as a prohibition against refusing responsibility.
    The chosen rendering preserves the law's force in idiomatic English while a footnote
    preserves the more literal image.
  doctrine_reference: Translation philosophy §1, §6
