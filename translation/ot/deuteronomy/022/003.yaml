id: DEU.22.3
reference: Deuteronomy 22:3
source:
  edition: WLC
  text: וְ/כֵ֧ן תַּעֲשֶׂ֣ה לַ/חֲמֹר֗/וֹ וְ/כֵ֣ן תַּעֲשֶׂה֮ לְ/שִׂמְלָת/וֹ֒ וְ/כֵ֣ן
    תַּעֲשֶׂ֜ה לְ/כָל אֲבֵדַ֥ת אָחִ֛י/ךָ אֲשֶׁר תֹּאבַ֥ד מִמֶּ֖/נּוּ וּ/מְצָאתָ֑/הּ
    לֹ֥א תוּכַ֖ל לְ/הִתְעַלֵּֽם־־׃ס
translation:
  text: And so you shall do with his donkey, and so you shall do with his cloak, and
    so you shall do with any lost thing of your brother that is lost from him and
    you find it; you may not ignore it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'you may not hide yourself' or 'you may not pretend not
      to notice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֵן
  chosen: And so
  alternatives:
  - Likewise
  - In the same way
  lexicon: HALOT
  rationale: Marks continuation from the previous verse and repeated instruction.
    'And so' preserves the connective force and the repetitive legal style.
- source_word: תַּעֲשֶׂה
  chosen: you shall do
  alternatives:
  - you must do
  - you are to do
  lexicon: HALOT
  rationale: Imperfect in legal context carries directive force. 'You shall do' preserves
    the covenant-law register without becoming archaic.
- source_word: לַחֲמֹרוֹ
  chosen: with his donkey
  alternatives:
  - for his donkey
  lexicon: HALOT
  rationale: Refers back to the fellow Israelite's lost animal from the prior context.
    'With' fits English idiom for handling the matter of the donkey.
- source_word: לְשִׂמְלָתוֹ
  chosen: with his cloak
  alternatives:
  - with his garment
  - with his clothing
  lexicon: HALOT
  rationale: שִׂמְלָה commonly denotes an outer garment or cloak. 'Cloak' is more
    specific and concrete than 'garment' while remaining natural English.
- source_word: לְכָל אֲבֵדַת
  chosen: with any lost thing
  alternatives:
  - with anything lost
  - with any lost property
  lexicon: HALOT
  rationale: The phrase broadens the law from named items to any lost item. 'Lost
    thing' stays close to the Hebrew while remaining readable; 'property' is possible
    but slightly more interpretive.
- source_word: אָחִיךָ
  chosen: your brother
  alternatives:
  - your fellow Israelite
  - your kinsman
  lexicon: HALOT
  rationale: Per gender-accurate policy, the masculine kinship term is retained. In
    Deuteronomy this often has covenant-community force, but 'brother' best preserves
    the source wording; broader implications can be inferred from context.
- source_word: אֲשֶׁר תֹּאבַד מִמֶּנּוּ
  chosen: that is lost from him
  alternatives:
  - which he loses
  - that goes missing from him
  lexicon: HALOT
  rationale: The Hebrew is passive/intransitive in form rather than directly active
    ('which he loses'). 'Is lost from him' preserves that nuance and avoids over-specifying
    agency.
- source_word: וּמְצָאתָהּ
  chosen: and you find it
  alternatives:
  - and you come upon it
  lexicon: HALOT
  rationale: 'Simple sequential action: the addressee encounters the lost item. ''Find
    it'' is the most direct rendering.'
- source_word: לֹא תוּכַל
  chosen: you may not
  alternatives:
  - you cannot
  - you must not
  lexicon: HALOT
  rationale: In legal prohibition, the idiom expresses disallowed action rather than
    inability in a literal sense. 'You may not' captures prohibition cleanly.
- source_word: לְהִתְעַלֵּם
  chosen: ignore it
  alternatives:
  - hide yourself
  - pretend not to notice it
  - disregard it
  lexicon: HALOT
  rationale: The hitpael literally suggests concealing oneself or withdrawing oneself
    from involvement. In this legal context, 'ignore it' communicates the practical
    force in natural English, while the more literal nuance is worth preserving in
    a footnote.
