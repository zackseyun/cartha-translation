theological_decisions:
- issue: Meaning of תִּקְדַּשׁ in a purity-law context
  chosen_reading: Rendered as a legal consequence ('be forfeited') rather than a strictly
    literal 'be holy/consecrated.'
  alternative_readings:
  - become holy
  - be consecrated
  rationale: The verse warns against a prohibited mixture and the consequence is that
    the resulting produce becomes set apart from ordinary use. In English, a literal
    'be holy' could wrongly suggest commendation rather than penalty. The chosen rendering
    preserves the legal force of the prohibition in readable modern English.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense over translation tradition where needed.'
