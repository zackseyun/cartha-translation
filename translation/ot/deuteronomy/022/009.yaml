id: DEU.22.9
reference: Deuteronomy 22:9
source:
  edition: WLC
  text: לֹא תִזְרַ֥ע כַּרְמְ/ךָ֖ כִּלְאָ֑יִם פֶּן תִּקְדַּ֗שׁ הַֽ/מְלֵאָ֤ה הַ/זֶּ֨רַע֙
    אֲשֶׁ֣ר תִּזְרָ֔ע וּ/תְבוּאַ֖ת הַ/כָּֽרֶם־־׃ס
translation:
  text: You shall not sow your vineyard with mixed seed, lest the whole yield be forfeited—the
    seed that you sow and the produce of the vineyard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'lest the whole yield become holy/consecrated'—that
      is, set apart and no longer for ordinary use.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִזְרַע
  chosen: you shall not sow
  alternatives:
  - you shall not plant
  lexicon: HALOT
  rationale: זרע commonly means 'to sow' seed. 'Sow' is more precise than 'plant'
    in an agricultural law involving seed mixture.
- source_word: כַּרְמְךָ
  chosen: your vineyard
  alternatives:
  - your vine plot
  lexicon: HALOT
  rationale: כרם is the standard term for a vineyard. 'Vineyard' is the natural and
    established English equivalent.
- source_word: כִּלְאָיִם
  chosen: mixed seed
  alternatives:
  - two kinds of seed
  - a mixture
  lexicon: HALOT
  rationale: כלאים denotes a forbidden mixture of kinds. In this context of sowing,
    'mixed seed' communicates the practical sense clearly while preserving the legal
    category of mixture.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - or else
  lexicon: HALOT
  rationale: פן introduces a negative consequence to be avoided. 'Lest' is concise
    and fits legal style well.
- source_word: תִּקְדַּשׁ
  chosen: be forfeited
  alternatives:
  - become holy
  - be consecrated
  - be sanctified
  lexicon: HALOT
  rationale: The verb קדש literally means 'be holy/consecrated,' but in this legal
    context many understand it to mean becoming set apart from ordinary use, effectively
    forfeited to the sanctuary or prohibited from personal use. 'Be forfeited' conveys
    the legal consequence in idiomatic English while avoiding the misleading impression
    that the mixed crop is positively 'holy' in a devotional sense.
- source_word: הַמְלֵאָה
  chosen: the whole yield
  alternatives:
  - the fullness
  - the full produce
  lexicon: HALOT
  rationale: המלאה refers to the full produce or yield. 'The whole yield' expresses
    the sense naturally in English and fits the warning formula.
- source_word: הַזֶּרַע אֲשֶׁר תִּזְרָע
  chosen: the seed that you sow
  alternatives:
  - the seed you sow
  lexicon: HALOT
  rationale: This phrase specifies one component of the affected produce. The relative
    clause is retained in natural English.
- source_word: וּתְבוּאַת הַכָּרֶם
  chosen: and the produce of the vineyard
  alternatives:
  - and the crop of the vineyard
  - and the vineyard's produce
  lexicon: HALOT
  rationale: תבואה denotes produce/yield. 'Produce of the vineyard' is clear and keeps
    the agricultural register.
