id: DEU.22.17
reference: Deuteronomy 22:17
source:
  edition: WLC
  text: וְ/הִנֵּה ה֡וּא שָׂם֩ עֲלִילֹ֨ת דְּבָרִ֜ים לֵ/אמֹ֗ר לֹֽא מָצָ֤אתִי לְ/בִתְּ/ךָ֙
    בְּתוּלִ֔ים וְ/אֵ֖לֶּה בְּתוּלֵ֣י בִתִּ֑/י וּ/פָֽרְשׂוּ֙ הַ/שִּׂמְלָ֔ה לִ/פְנֵ֖י
    זִקְנֵ֥י הָ/עִֽיר־־׃
translation:
  text: and look, he has charged her with slanderous words, saying, “I did not find
    your daughter a virgin.” But these are the proofs of my daughter’s virginity.
    And they shall spread out the garment before the elders of the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “I did not find virginities for your daughter,” an idiom
      meaning that he claims she was not a virgin.
    reason: lexical_alternative
  - marker: b
    text: Or “tokens/evidence of my daughter’s virginity.”
    reason: lexical_alternative
  - marker: c
    text: The “garment” refers to the cloth presented as legal evidence in this case.
    reason: cultural_note
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: and look
  alternatives:
  - and behold
  - now look
  lexicon: HALOT
  rationale: Discourse marker drawing attention to the accusation; 'and look' is readable
    modern English while preserving the demonstrative force better than omitting it.
- source_word: שָׂם עֲלִילֹת דְּבָרִים
  chosen: has charged her with slanderous words
  alternatives:
  - has laid abusive charges
  - has brought false accusations
  - has charged her with shameful things
  lexicon: HALOT
  rationale: The idiom combines 'set/place' with 'grounds for accusation/false pretexts'
    and 'words.' 'Charged her with slanderous words' captures a formal accusation
    with defamatory content. 'Her' is supplied from context, since the accusation
    concerns the daughter.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - claiming
  lexicon: HALOT
  rationale: Standard quotative introducing the husband's allegation.
- source_word: לֹא מָצָאתִי לְבִתְּךָ בְּתוּלִים
  chosen: I did not find your daughter a virgin
  alternatives:
  - I did not find virginity in your daughter
  - I did not find evidence of virginity in your daughter
  lexicon: HALOT
  rationale: Hebrew literally says 'I did not find for your daughter virginities,'
    an idiomatic expression. English requires smoothing; 'a virgin' best conveys the
    accusation plainly. The more literal 'virginity' is preserved conceptually in
    the following clause.
- source_word: וְאֵלֶּה בְּתוּלֵי בִתִּי
  chosen: But these are the proofs of my daughter’s virginity
  alternatives:
  - And these are my daughter's virginities
  - And these are the tokens of my daughter's virginity
  - And these are the evidences of my daughter's virginity
  lexicon: HALOT
  rationale: The plural form is idiomatic for physical evidence/tokens associated
    with virginity in this legal context. 'Proofs' communicates the forensic setting
    clearly. 'But' reflects the adversative sense in context, though the Hebrew conjunction
    is simply 'and'.
- source_word: וּפָרְשׂוּ
  chosen: And they shall spread out
  alternatives:
  - And they will spread out
  - Then they shall spread
  lexicon: HALOT
  rationale: Sequential legal action following the parents' declaration. English future/modal
    'shall' fits the procedural sense.
- source_word: הַשִּׂמְלָה
  chosen: the garment
  alternatives:
  - the cloth
  - the cloak
  lexicon: HALOT
  rationale: A general outer garment or cloth. 'Garment' is broad enough to avoid
    over-specifying while matching the legal-cultural object referenced here.
- source_word: לִפְנֵי זִקְנֵי הָעִיר
  chosen: before the elders of the city
  alternatives:
  - in the presence of the elders of the city
  lexicon: HALOT
  rationale: Standard judicial phrase indicating presentation of evidence to civic
    authorities.
