id: DEU.22.14
reference: Deuteronomy 22:14
source:
  edition: WLC
  text: וְ/שָׂ֥ם לָ/הּ֙ עֲלִילֹ֣ת דְּבָרִ֔ים וְ/הוֹצִ֥יא עָלֶ֖י/הָ שֵׁ֣ם רָ֑ע וְ/אָמַ֗ר
    אֶת הָ/אִשָּׁ֤ה הַ/זֹּאת֙ לָקַ֔חְתִּי וָ/אֶקְרַ֣ב אֵלֶ֔י/הָ וְ/לֹא מָצָ֥אתִי לָ֖/הּ
    בְּתוּלִֽים־־׃
translation:
  text: and he charges her with shameful accusations and brings a bad name upon her,
    saying, ‘I took this woman, and when I came near to her, I did not find evidence
    of virginity in her.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'false charges.' The Hebrew phrase is idiomatic and refers to defamatory
      accusations.
    reason: lexical_alternative
  - marker: b
    text: Literally 'brings a bad name upon her'; that is, defames her.
    reason: lexical_alternative
  - marker: c
    text: Or 'when I went in to her,' a Hebrew euphemism for sexual relations.
    reason: lexical_alternative
  - marker: d
    text: Literally 'I did not find virginity for her.' In context this refers to
      evidence or tokens of virginity, as explained in the following verses.
    reason: cross_reference
lexical_decisions:
- source_word: וְשָׂם לָהּ
  chosen: he charges her with
  alternatives:
  - he lays on her
  - he attributes to her
  lexicon: HALOT
  rationale: The idiom שׂוּם + לְ with an abstract object means to place or assign
    something to someone. In this legal context, 'charges her with' communicates an
    accusation more naturally than the more literal 'lays on her.'
- source_word: עֲלִילֹת דְּבָרִים
  chosen: shameful accusations
  alternatives:
  - deeds of words
  - false charges
  - abusive allegations
  lexicon: HALOT
  rationale: The phrase is idiomatic and refers to accusatory claims rather than literal
    'deeds of words.' 'Shameful accusations' captures the defamatory force in context.
    'False' is likely implied by the legal setting but not explicitly stated in the
    phrase itself, so it is not placed in the main text.
- source_word: וְהוֹצִיא עָלֶיהָ שֵׁם רָע
  chosen: brings a bad name upon her
  alternatives:
  - brings an evil report against her
  - defames her
  lexicon: HALOT
  rationale: This is a Hebrew idiom for damaging someone's reputation. 'Brings a bad
    name upon her' preserves the metaphor while remaining readable. 'Defames her'
    is concise but loses the concrete imagery of 'name.'
- source_word: הָאִשָּׁה הַזֹּאת
  chosen: this woman
  alternatives:
  - this wife
  lexicon: HALOT
  rationale: The Hebrew says 'this woman.' Since the speaker is the husband, 'wife'
    would be contextually true, but the source wording is more demonstrative and somewhat
    distancing, so 'this woman' is retained.
- source_word: לָקַחְתִּי
  chosen: I took
  alternatives:
  - I married
  lexicon: HALOT
  rationale: לקח in marriage contexts often means 'take as wife' or 'marry.' Here
    'I took' preserves the Hebrew wording and legal-marital idiom, while the surrounding
    context makes the marital sense clear.
- source_word: וָאֶקְרַב אֵלֶיהָ
  chosen: when I came near to her
  alternatives:
  - when I went in to her
  - when I had relations with her
  lexicon: HALOT
  rationale: The phrase is a modest euphemism for sexual approach. 'Came near to her'
    preserves the euphemistic register of the Hebrew better than the more explicit
    alternatives.
- source_word: וְלֹא מָצָאתִי לָהּ בְּתוּלִים
  chosen: I did not find evidence of virginity in her
  alternatives:
  - I did not find virginity in her
  - I did not find the marks of virginity for her
  - I did not find tokens of virginity in her
  lexicon: HALOT
  rationale: בְּתוּלִים is plural and in this legal context refers not merely to an
    abstract state but to evidence/tokens associated with virginity, as the following
    verses make explicit. 'Evidence of virginity' communicates the legal sense in
    natural English without importing later technical terminology into the main text.
