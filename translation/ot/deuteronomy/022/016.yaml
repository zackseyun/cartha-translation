id: DEU.22.16
reference: Deuteronomy 22:16
source:
  edition: WLC
  text: וְ/אָמַ֛ר אֲבִ֥י ה/נער אֶל הַ/זְּקֵנִ֑ים אֶת בִּתִּ֗/י נָתַ֜תִּי לָ/אִ֥ישׁ
    הַ/זֶּ֛ה לְ/אִשָּׁ֖ה וַ/יִּשְׂנָאֶֽ/הָ־־׃
translation:
  text: And the young woman’s father shall say to the elders, ‘I gave my daughter
    to this man as a wife, and he hates her.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and he has come to hate her.' The Hebrew verb simply means 'hate';
      English may express the resulting state either as present ('hates') or as developed
      attitude ('has come to hate').
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַר
  chosen: And ... shall say
  alternatives:
  - And ... said
  - Then ... shall say
  lexicon: HALOT
  rationale: The form is a waw-consecutive/qatal in legal narrative-procedural context.
    English future-like 'shall say' best reflects the prescriptive case-law setting,
    rather than a simple past narrative.
- source_word: אֲבִי הַנַּעַר
  chosen: the young woman’s father
  alternatives:
  - the girl’s father
  - the maiden’s father
  lexicon: HALOT
  rationale: נַעַר/נַעֲרָה terminology can denote a young person of marriageable age.
    'Young woman' is natural modern English and fits the marital context better than
    'girl,' while avoiding the archaic 'maiden.' The construct phrase is rendered
    possessively in English.
- source_word: הַזְּקֵנִים
  chosen: the elders
  alternatives:
  - the older men
  lexicon: HALOT
  rationale: In this legal setting, the term refers to recognized civic/judicial leaders,
    not merely elderly males. 'The elders' is the standard and contextually precise
    rendering.
- source_word: אֶת בִּתִּי
  chosen: my daughter
  lexicon: HALOT
  rationale: Direct-object marker אֶת is untranslated in English; בִּתִּי is straightforwardly
    'my daughter.'
- source_word: נָתַתִּי
  chosen: I gave
  alternatives:
  - I have given
  lexicon: HALOT
  rationale: The verb נָתַן in marriage arrangements commonly means 'give' in the
    sense of giving a daughter in marriage. 'I gave' is the most direct and idiomatic
    rendering here.
- source_word: לָאִישׁ הַזֶּה
  chosen: to this man
  alternatives:
  - to this husband
  lexicon: HALOT
  rationale: אִישׁ literally means 'man' here, with 'this' marking the accused husband.
    'Man' preserves the lexical form; the marital role is already clarified by the
    following phrase 'as a wife.'
- source_word: לְאִשָּׁה
  chosen: as a wife
  alternatives:
  - for a wife
  - in marriage
  lexicon: HALOT
  rationale: This prepositional phrase is a standard marriage expression. 'As a wife'
    is idiomatic modern English and preserves the relational sense without over-paraphrase.
- source_word: וַיִּשְׂנָאֶהָ
  chosen: and he hates her
  alternatives:
  - and he has come to hate her
  - but he hates her
  lexicon: HALOT
  rationale: שָׂנֵא means 'hate.' The simple present in direct speech works naturally
    in English to describe the husband's present disposition. 'Has come to hate' is
    possible contextually, but the Hebrew itself simply states the hatred.
