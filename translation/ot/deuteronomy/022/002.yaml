id: DEU.22.2
reference: Deuteronomy 22:2
source:
  edition: WLC
  text: וְ/אִם לֹ֨א קָר֥וֹב אָחִ֛י/ךָ אֵלֶ֖י/ךָ וְ/לֹ֣א יְדַעְתּ֑/וֹ וַ/אֲסַפְתּ/וֹ֙
    אֶל תּ֣וֹךְ בֵּיתֶ֔/ךָ וְ/הָיָ֣ה עִמְּ/ךָ֗ עַ֣ד דְּרֹ֤שׁ אָחִ֨י/ךָ֙ אֹת֔/וֹ וַ/הֲשֵׁבֹת֖/וֹ
    לֽ/וֹ־־׃
translation:
  text: But if your brother is not near to you, and you do not know him, then you
    shall bring it into your house, and it shall remain with you until your brother
    seeks it; then you shall restore it to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'your brother' likely refers broadly to a fellow member of the covenant
      community, not only a biological brother.
    reason: cultural_note
  - marker: b
    text: Or 'you do not know whose it is'; literally, 'you do not know him.'
    reason: lexical_alternative
  - marker: c
    text: Or 'return it to him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָחִיךָ
  chosen: your brother
  alternatives:
  - your fellow Israelite
  - your kinsman
  lexicon: HALOT
  rationale: Literal 'your brother' is retained. In Deuteronomic law this often refers
    broadly to a fellow member of the covenant community, but the text uses kinship
    language and the translation philosophy prefers gender-accurate rendering rather
    than flattening to a neutral collective term.
- source_word: קָרוֹב אֵלֶיךָ
  chosen: is not near to you
  alternatives:
  - does not live near you
  - is not close by
  lexicon: HALOT
  rationale: The phrase denotes physical proximity. 'Is not near to you' preserves
    the source wording while remaining natural English.
- source_word: וְלֹא יְדַעְתּוֹ
  chosen: you do not know him
  alternatives:
  - you do not know whose it is
  - you do not recognize him
  lexicon: HALOT
  rationale: The Hebrew object suffix is masculine singular ('him'), referring back
    to 'your brother' rather than directly to the animal/object. The wording preserves
    the grammar, while the context makes clear this means the owner is unknown to
    the finder.
- source_word: וַאֲסַפְתּוֹ
  chosen: you shall bring it in
  alternatives:
  - you shall gather it in
  - you shall take it in
  lexicon: HALOT
  rationale: Although the suffix is masculine singular and could be rendered 'him/it,'
    the referent in context is the lost animal or item from the previous verse. 'Bring
    it in' fits idiomatic English and the movement into the house expressed by the
    following phrase.
- source_word: אֶל תּוֹךְ בֵּיתֶךָ
  chosen: into your house
  alternatives:
  - into the midst of your house
  - inside your house
  lexicon: HALOT
  rationale: A straightforward rendering of the prepositional phrase; 'into your house'
    is natural and sufficiently precise.
- source_word: וְהָיָה עִמְּךָ
  chosen: it shall remain with you
  alternatives:
  - it shall be with you
  lexicon: HALOT
  rationale: '''Be with you'' is literal, but ''remain with you'' better conveys the
    durative sense in context without adding meaning beyond the source.'
- source_word: עַד דְּרֹשׁ אָחִיךָ אֹתוֹ
  chosen: until your brother seeks it
  alternatives:
  - until your brother asks for it
  - until your brother inquires after it
  lexicon: HALOT
  rationale: דרש in this context means to seek, inquire after, or claim what was lost.
    'Seeks it' is concise and natural; the object is the lost property.
- source_word: וַהֲשֵׁבֹתוֹ לוֹ
  chosen: then you shall restore it to him
  alternatives:
  - and you shall return it to him
  lexicon: HALOT
  rationale: The Hiphil of שוב here means to cause to return, i.e., restore/return.
    'Restore it to him' fits legal-restorative context well, though 'return' is also
    possible.
