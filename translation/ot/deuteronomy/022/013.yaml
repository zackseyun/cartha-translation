id: DEU.22.13
reference: Deuteronomy 22:13
source:
  edition: WLC
  text: כִּֽי יִקַּ֥ח אִ֖ישׁ אִשָּׁ֑ה וּ/בָ֥א אֵלֶ֖י/הָ וּ/שְׂנֵאָֽ/הּ־׃
translation:
  text: If a man takes a wife and goes in to her, and then hates her,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'and has sexual relations with her.' The Hebrew idiom
      'goes in to her' refers to marital intercourse.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Here כִּי introduces a casuistic legal scenario, best rendered as the
    conditional 'If' in English law-style discourse. 'When' is possible, but 'If'
    more clearly signals the protasis of a case law provision.
- source_word: יִקַּח
  chosen: takes
  alternatives:
  - marries
  lexicon: HALOT
  rationale: The verb לקח literally means 'take.' In marriage contexts it can idiomatically
    mean 'take as wife' or 'marry.' Because the following direct object is 'a wife,'
    'takes a wife' preserves the Hebrew idiom while remaining natural English. 'Marries'
    is a valid interpretive alternative but is less formally transparent.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a husband
  lexicon: HALOT
  rationale: The noun is singular masculine and refers to an adult male in this legal
    case. Per the gender-accurate policy, 'a man' best matches the source. 'A husband'
    would anticipate a relational status not yet explicitly stated in the clause,
    though context moves in that direction.
- source_word: אִשָּׁה
  chosen: a wife
  alternatives:
  - a woman
  lexicon: HALOT
  rationale: Although אִשָּׁה can mean either 'woman' or 'wife,' in the collocation
    'take a wife' the marital sense is clearly intended. 'Wife' is therefore the most
    contextually accurate rendering.
- source_word: וּבָא אֵלֶיהָ
  chosen: and goes in to her
  alternatives:
  - and has relations with her
  - and comes to her
  lexicon: HALOT
  rationale: This idiom is a conventional Hebrew euphemism for sexual intercourse/consummation.
    'Goes in to her' preserves the idiomatic and modest register of the Hebrew better
    than the more explicit 'has relations with her.' 'Comes to her' is possible but
    less idiomatic in contemporary English.
- source_word: וּשְׂנֵאָהּ
  chosen: and then hates her
  alternatives:
  - and hates her
  lexicon: HALOT
  rationale: The verb means 'hate.' Adding 'then' is a light discourse-level clarification
    reflecting the sequential waw-consecutive chain in English narrative/legal style
    without materially expanding the sense.
