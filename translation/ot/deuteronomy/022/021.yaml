theological_decisions:
- issue: Rendering of legal-sexual terminology without softening or over-specifying
  chosen_reading: The verse is translated in a way that preserves its legal and moral
    gravity, including 'outrageous act' and 'prostituting herself,' without importing
    later doctrinal categories beyond the Hebrew text.
  alternative_readings:
  - Use broader modern categories such as 'sexual immorality' throughout
  - Use more euphemistic language such as 'acted improperly'
  rationale: The translation should neither sanitize the severity of the legal accusation
    nor expand it into later theological terminology not present in the text. The
    chosen wording reflects the Hebrew's strong moral-legal register.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Gendered legal subject language
  chosen_reading: Retain 'the men of her city' rather than neutralizing to 'people
    of her city.'
  alternative_readings:
  - the people of her city
  - the townspeople
  rationale: The Hebrew uses a masculine plural expression. Per the gender-accurate
    principle, the translation should reflect the source wording unless context clearly
    demands a generic rendering.
  doctrine_reference: Translation philosophy §4
