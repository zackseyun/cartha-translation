id: DEU.22.21
reference: Deuteronomy 22:21
source:
  edition: WLC
  text: וְ/הוֹצִ֨יאוּ אֶת ה/נער אֶל פֶּ֣תַח בֵּית אָבִ֗י/הָ וּ/סְקָלוּ/הָ֩ אַנְשֵׁ֨י
    עִירָ֤/הּ בָּ/אֲבָנִים֙ וָ/מֵ֔תָה כִּֽי עָשְׂתָ֤ה נְבָלָה֙ בְּ/יִשְׂרָאֵ֔ל לִ/זְנ֖וֹת
    בֵּ֣ית אָבִ֑י/הָ וּ/בִֽעַרְתָּ֥ הָ/רָ֖ע מִ/קִּרְבֶּֽ/ךָ־־־־׃ס
translation:
  text: Then they shall bring out the young woman to the entrance of her father's
    house, and the men of her city shall stone her with stones, and she shall die,
    because she has committed an outrageous act in Israel by prostituting herself
    in her father's house. So you shall purge the evil from your midst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the girl.' The Hebrew נַעַר can refer to a young female person, with
      nuance determined by context.
    reason: lexical_alternative
  - marker: b
    text: Or 'a disgraceful thing' or 'a vile act.' The Hebrew נְבָלָה denotes a morally
      shocking outrage.
    reason: lexical_alternative
  - marker: c
    text: Or 'by committing sexual immorality.' The Hebrew verb זנה literally evokes
      prostitution/harlotry and is often used more broadly for illicit sexual conduct.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנַּעַר
  chosen: the young woman
  alternatives:
  - the girl
  - the young woman
  lexicon: HALOT
  rationale: Though נַעַר can denote a girl/young woman, 'young woman' is more natural
    and suitably formal in English for this legal context, while preserving her youth
    and unmarried status implied by the surrounding passage.
- source_word: פֶּתַח
  chosen: the entrance
  alternatives:
  - the doorway
  - the door
  lexicon: HALOT
  rationale: פֶּתַח refers to the opening/entrance. 'Entrance' fits idiomatic modern
    English and the formal legal setting better than the more concrete 'doorway' or
    'door'.
- source_word: בֵּית אָבִיהָ
  chosen: her father's house
  alternatives:
  - her father's household
  lexicon: HALOT
  rationale: The Hebrew is literally 'house of her father.' 'House' preserves the
    concrete wording and can also carry the household sense without over-interpreting.
- source_word: וּסְקָלוּהָ ... בָּאֲבָנִים
  chosen: shall stone her with stones
  alternatives:
  - shall stone her
  - shall pelt her with stones
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'with stones' after the verb 'stone.'
    Retaining both reflects the source emphasis and legal formula, even though English
    could omit the object as redundant.
- source_word: אַנְשֵׁי עִירָהּ
  chosen: the men of her city
  alternatives:
  - the people of her city
  - the townsmen
  lexicon: HALOT
  rationale: אַנְשֵׁי is literally 'men of.' In keeping with the gender-accurate principle,
    'men of her city' is preferred over the more neutral 'people,' since the Hebrew
    uses a masculine plural form in this legal formulation.
- source_word: נְבָלָה
  chosen: an outrageous act
  alternatives:
  - a disgraceful thing
  - a vile act
  - folly
  lexicon: HALOT
  rationale: נְבָלָה in legal/moral contexts denotes a shocking, disgraceful outrage,
    not mere intellectual 'folly.' 'Outrageous act' communicates the moral and communal
    gravity in accessible modern English.
- source_word: לִזְנוֹת
  chosen: by prostituting herself
  alternatives:
  - by committing sexual immorality
  - by playing the prostitute
  - by being sexually immoral
  lexicon: HALOT
  rationale: The infinitive of זנה often carries the sense of illicit sexual conduct
    framed as harlotry/prostitution. 'By prostituting herself' preserves the metaphorically
    charged and morally weighty wording more closely than the broader 'sexual immorality.'
- source_word: בֵּית אָבִיהָ
  chosen: in her father's house
  alternatives:
  - while in her father's house
  - under her father's roof
  lexicon: HALOT
  rationale: The phrase is repeated and here functions locatively. 'In her father's
    house' keeps the Hebrew wording and the legal-social setting without paraphrase.
- source_word: וּבִעַרְתָּ הָרָע מִקִּרְבֶּךָ
  chosen: So you shall purge the evil from your midst
  alternatives:
  - thus you shall remove the evil from among you
  - so you shall burn out the evil from your midst
  lexicon: HALOT
  rationale: This is a recurring Deuteronomic legal formula. 'Purge the evil from
    your midst' is established, clear English that preserves the covenantal-judicial
    force of בער without wooden literalism.
