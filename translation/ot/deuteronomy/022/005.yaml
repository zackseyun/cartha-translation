theological_decisions:
- issue: Scope of the first prohibition (כְלִי גבר)
  chosen_reading: Render broadly as 'a man's article' rather than narrowly as 'man's clothing.'
  alternative_readings:
  - a woman shall not wear man's clothing
  - a woman shall not have a man's weapon/gear on her
  rationale: The Hebrew uses a broader noun in the first clause and a specific clothing term in the second. The translation preserves that lexical distinction rather than importing a narrower interpretation into both clauses. This avoids over-resolving whether the text addresses only clothing or also other male-associated articles/gear.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Gendered language
  chosen_reading: Use 'woman' and 'man' rather than gender-neutral terms.
  alternative_readings:
  - person
  - someone
  rationale: The Hebrew explicitly contrasts male and female terms. The translation preserves this gendered contrast in line with the project's gender-accurate policy.
  doctrine_reference: Translation philosophy §4
