id: DEU.22.5
reference: Deuteronomy 22:5
source:
  edition: WLC
  text: לֹא יִהְיֶ֤ה כְלִי גֶ֨בֶר֙ עַל אִשָּׁ֔ה וְ/לֹא יִלְבַּ֥שׁ גֶּ֖בֶר שִׂמְלַ֣ת אִשָּׁ֑ה כִּ֧י תוֹעֲבַ֛ת יְהוָ֥ה אֱלֹהֶ֖י/ךָ כָּל עֹ֥שֵׂה אֵֽלֶּה־־־־־׃פ
translation:
  text: A woman shall not wear a man's article, and a man shall not put on a woman's garment, for everyone who does these things is an abomination to Yahweh your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A woman shall not wear a man's garment'; the Hebrew in the first clause uses a broader term than the second clause's specific word for 'garment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְלִי גֶבֶר
  chosen: a man's article
  alternatives:
  - a man's garment
  - a man's implement
  - the gear of a man
  lexicon: HALOT
  rationale: כְלִי is broader than clothing and can denote an article, vessel, implement, or equipment. Since the second clause specifically uses שִׂמְלָה for garment, rendering כְלִי more broadly avoids collapsing the distinction while still fitting the likely wearable context of the prohibition.
- source_word: עַל אִשָּׁה
  chosen: wear a woman shall not wear
  alternatives:
  - be on a woman
  - be upon a woman
  lexicon: HALOT
  rationale: The idiom 'be upon' with clothing/equipment naturally refers to wearing or having on one's person. English requires an explicit verbal expression; 'wear' communicates the idiomatic sense clearly.
- source_word: יִלְבַּשׁ
  chosen: put on
  alternatives:
  - wear
  lexicon: HALOT
  rationale: The verb means to clothe oneself or put on clothing. 'Put on' is natural English and pairs well with the broader first clause without forcing identical wording.
- source_word: שִׂמְלַת אִשָּׁה
  chosen: a woman's garment
  alternatives:
  - a woman's clothing
  - a woman's cloak
  lexicon: HALOT
  rationale: שִׂמְלָה commonly denotes a garment or outer clothing. 'Garment' is sufficiently formal and specific without overnarrowing to a particular item such as cloak.
- source_word: גֶּבֶר
  chosen: man
  alternatives:
  - male
  lexicon: HALOT
  rationale: גֶּבֶר denotes a man in distinction from a woman here. 'Man' preserves the gendered contrast of the Hebrew, in keeping with the project's gender-accurate policy.
- source_word: אִשָּׁה
  chosen: woman
  alternatives:
  - female
  lexicon: HALOT
  rationale: The term here contrasts with גבר in ordinary human gendered terms. 'Woman' is the natural English equivalent.
- source_word: תוֹעֲבַת יְהוָה
  chosen: an abomination to the LORD
  alternatives:
  - detestable to the LORD
  - abhorrent to the LORD
  lexicon: HALOT
  rationale: תוֹעֵבָה is a strong covenantal term for something detestable or abhorrent before God. 'Abomination' preserves the gravity and established semantic force. יְהוָה follows the doctrinal default 'the LORD'.
- source_word: כָּל עֹשֵׂה אֵלֶּה
  chosen: everyone who does these things
  alternatives:
  - whoever does these things
  - everyone doing these things
  lexicon: HALOT
  rationale: The participial construction is naturally rendered as a generalizing expression. 'Everyone who does these things' is clear modern English and preserves the distributive force of כָּל.
