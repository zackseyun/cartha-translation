theological_decisions:
- issue: Nature of דָּמִים in legal context
  chosen_reading: bloodguilt
  alternative_readings:
  - bloodshed
  - guilt for blood
  rationale: The verse concerns legal and moral responsibility for preventable death,
    not merely physical blood. 'Bloodguilt' preserves the covenantal-legal force without
    importing later doctrinal claims.
  doctrine_reference: Translation philosophy §1, §5
