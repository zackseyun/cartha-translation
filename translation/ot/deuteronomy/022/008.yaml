id: DEU.22.8
reference: Deuteronomy 22:8
source:
  edition: WLC
  text: כִּ֤י תִבְנֶה֙ בַּ֣יִת חָדָ֔שׁ וְ/עָשִׂ֥יתָ מַעֲקֶ֖ה לְ/גַגֶּ֑/ךָ וְ/לֹֽא
    תָשִׂ֤ים דָּמִים֙ בְּ/בֵיתֶ֔/ךָ כִּֽי יִפֹּ֥ל הַ/נֹּפֵ֖ל מִמֶּֽ/נּוּ־־׃ס
translation:
  text: When you build a new house, you shall make a parapet for your roof, so that
    you do not bring bloodguilt on your house if someone falls from it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'railing' or 'guardrail.' The Hebrew refers to a protective barrier built
      around a flat roof.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - If
  - For
  lexicon: HALOT
  rationale: Here כִּי introduces a case law situation rather than a causal explanation.
    'When' best reflects the legal scenario in natural English.
- source_word: תִבְנֶה בַּיִת חָדָשׁ
  chosen: you build a new house
  alternatives:
  - you build a house anew
  lexicon: HALOT
  rationale: Straightforward rendering of verb + object + adjective. 'Build a new
    house' is idiomatic and preserves the concrete legal setting.
- source_word: וְעָשִׂיתָ
  chosen: you shall make
  alternatives:
  - you must make
  - and make
  lexicon: HALOT
  rationale: In legal material the perfect with vav commonly carries injunctive force.
    'You shall make' preserves the law's prescriptive tone in standard English Bible
    style.
- source_word: מַעֲקֶה
  chosen: parapet
  alternatives:
  - railing
  - guardrail
  lexicon: HALOT
  rationale: The term denotes a protective barrier around a flat roof edge. 'Parapet'
    is precise and traditional without being obscure; alternatives are preserved in
    a footnote because modern readers may better recognize them.
- source_word: לְגַגֶּךָ
  chosen: for your roof
  alternatives:
  - around your roof
  lexicon: HALOT
  rationale: The preposition marks purpose/direction with the roof as the location
    protected by the parapet. 'For your roof' is concise and natural.
- source_word: וְלֹא תָשִׂים דָּמִים
  chosen: so that you do not bring bloodguilt
  alternatives:
  - and you shall not put blood
  - and you shall not incur bloodguilt
  lexicon: HALOT
  rationale: The idiom 'put bloods' means to incur or bring bloodguilt. 'Bloodguilt'
    captures the legal-moral force better than a wooden literalism.
- source_word: בְּבֵיתֶךָ
  chosen: on your house
  alternatives:
  - in your house
  - upon your household
  lexicon: HALOT
  rationale: In context the guilt attaches to the house as the property for which
    the builder is responsible. 'On your house' communicates liability resting upon
    it; 'in your house' is possible but less idiomatic in English for culpability.
- source_word: כִּי יִפֹּל הַנֹּפֵל
  chosen: if someone falls
  alternatives:
  - if the one falling falls
  - when a person falls
  lexicon: HALOT
  rationale: The Hebrew uses an infinitive-like participial expression for an indefinite
    potential victim. 'If someone falls' conveys the generic contingency clearly in
    English without awkward repetition.
- source_word: מִמֶּנּוּ
  chosen: from it
  alternatives:
  - from the roof
  - from him
  lexicon: HALOT
  rationale: The suffix most naturally refers to the roof/house structure just mentioned.
    'From it' keeps the antecedent compact; 'from the roof' is interpretive but possible.
