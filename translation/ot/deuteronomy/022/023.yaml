id: DEU.22.23
reference: Deuteronomy 22:23
source:
  edition: WLC
  text: כִּ֤י יִהְיֶה֙ נער בְתוּלָ֔ה מְאֹרָשָׂ֖ה לְ/אִ֑ישׁ וּ/מְצָאָ֥/הּ אִ֛ישׁ בָּ/עִ֖יר
    וְ/שָׁכַ֥ב עִמָּֽ/הּ׃
translation:
  text: If there is a young woman, a virgin, pledged to a man, and another man finds
    her in the city and lies with her,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'betrothed to a man.' The Hebrew denotes a formal, legally binding engagement.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a case law condition. 'If' fits English legal style well;
    'when' is possible but slightly more temporal than conditional here.
- source_word: יִהְיֶה
  chosen: there is
  alternatives:
  - it happens
  - there happens to be
  lexicon: HALOT
  rationale: With כִּי, היה introduces a hypothetical legal scenario. 'There is' is
    idiomatic and preserves the casuistic force.
- source_word: נַעֲרָ
  chosen: young woman
  alternatives:
  - girl
  - maiden
  lexicon: HALOT
  rationale: Refers to a female of marriageable age. 'Young woman' is natural modern
    English and avoids the archaic 'maiden' and the potentially too-young nuance of
    'girl'.
- source_word: בְתוּלָה
  chosen: a virgin
  alternatives:
  - virgin
  lexicon: HALOT
  rationale: The term explicitly denotes virginity; retaining 'virgin' preserves the
    legal and social significance in the passage.
- source_word: מְאֹרָשָׂה לְאִישׁ
  chosen: pledged to a man
  alternatives:
  - betrothed to a man
  - engaged to a man
  lexicon: HALOT
  rationale: Denotes formal betrothal, stronger than modern informal engagement. 'Pledged'
    communicates binding commitment in readable English; 'betrothed' is more formal
    but less common.
- source_word: וּמְצָאָהּ אִישׁ
  chosen: and another man finds her
  alternatives:
  - and a man finds her
  lexicon: HALOT
  rationale: The Hebrew says simply 'a man,' but English benefits from 'another man'
    to distinguish him from the man to whom she is pledged. This is an explicative
    addition warranted by context, not a change in meaning.
- source_word: בָּעִיר
  chosen: in the city
  alternatives:
  - in the town
  lexicon: HALOT
  rationale: '''City'' is the standard rendering and is important contextually for
    the legal inference in the following verse.'
- source_word: וְשָׁכַב עִמָּהּ
  chosen: and lies with her
  alternatives:
  - and sleeps with her
  - and has sexual relations with her
  lexicon: HALOT
  rationale: '''Lie with'' is the established and sufficiently clear idiom for sexual
    intercourse in legal/narrative biblical contexts. It preserves the source''s euphemistic
    register better than the more colloquial ''sleeps with'' or the more explicit
    paraphrase.'
