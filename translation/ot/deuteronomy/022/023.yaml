theological_decisions:
- issue: Whether to make the sexual act explicitly coercive in this verse
  chosen_reading: Render neutrally as 'lies with her' without adding 'rapes' or 'forces'
  alternative_readings:
  - and rapes her
  - and forces her to lie with him
  rationale: This verse alone does not lexically specify coercion; the legal distinction
    in the surrounding context depends partly on location and response. To preserve
    the text's own wording and not import a conclusion from adjacent verses, the translation
    keeps the act stated neutrally here.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
