id: DEU.22.20
reference: Deuteronomy 22:20
source:
  edition: WLC
  text: וְ/אִם אֱמֶ֣ת הָיָ֔ה הַ/דָּבָ֖ר הַ/זֶּ֑ה לֹא נִמְצְא֥וּ בְתוּלִ֖ים ל/נער־־׃
translation:
  text: But if this matter is true, and evidence of virginity was not found for the
    young woman,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tokens of virginity were not found for the young woman.' The Hebrew
      uses בְּתוּלִים, literally 'virginity' or 'signs/evidence of virginity,' in
      the context of an ancient legal custom.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If, however
  lexicon: HALOT
  rationale: The conjunction plus conditional particle introduces a contrast with
    the preceding hypothetical. 'But if' captures the adversative flow from the prior
    verse in natural English.
- source_word: אֱמֶת
  chosen: 'true'
  alternatives:
  - truth
  - certain
  lexicon: HALOT
  rationale: 'Here אֱמֶת functions predicatively with הָיָה: ''the matter was true.''
    ''True'' is the most idiomatic English predicate adjective in this construction.'
- source_word: הָיָה
  chosen: is
  alternatives:
  - was
  lexicon: HALOT
  rationale: 'Although formally qatal (''was''), English legal-style conditional clauses
    commonly use present tense after ''if'' for a general case: ''if this matter is
    true.'' This is an optimal-equivalence smoothing without changing temporal sense.'
- source_word: הַדָּבָר הַזֶּה
  chosen: this matter
  alternatives:
  - this thing
  - this charge
  - this word
  lexicon: HALOT
  rationale: דָּבָר is broad, but in this judicial context 'matter' best conveys a
    legal case or allegation without over-specifying beyond the Hebrew.
- source_word: לֹא נִמְצְאוּ
  chosen: was not found
  alternatives:
  - were not found
  lexicon: HALOT
  rationale: The Hebrew verb is plural because its subject בְּתוּלִים is morphologically
    plural. English idiom prefers singular agreement when rendering the phrase as
    'evidence of virginity,' hence 'was not found.'
- source_word: בְּתוּלִים
  chosen: evidence of virginity
  alternatives:
  - virginity
  - tokens of virginity
  - proofs of virginity
  lexicon: HALOT
  rationale: Literally the noun is 'virginities/virginity tokens,' referring in context
    to physical evidence expected by the legal custom. 'Evidence of virginity' communicates
    the sense clearly in modern English without archaic 'tokens.'
- source_word: לַנַּעֲרָ
  chosen: for the young woman
  alternatives:
  - for the girl
  - in the young woman
  - for the maiden
  lexicon: HALOT
  rationale: נַעֲרָה denotes a young woman/girl of marriageable age. 'Young woman'
    is gender-accurate, natural, and avoids the archaic tone of 'maiden' and the potentially
    too-young implication of 'girl.' The preposition ל is rendered 'for' in keeping
    with the legal idiom of evidence being found for someone.
