id: DEU.22.4
reference: Deuteronomy 22:4
source:
  edition: WLC
  text: לֹא תִרְאֶה֩ אֶת חֲמ֨וֹר אָחִ֜י/ךָ א֤וֹ שׁוֹר/וֹ֙ נֹפְלִ֣ים בַּ/דֶּ֔רֶךְ וְ/הִתְעַלַּמְתָּ֖
    מֵ/הֶ֑ם הָקֵ֥ם תָּקִ֖ים עִמּֽ/וֹ־־׃ס
translation:
  text: You shall not see your brother’s donkey or his ox fallen on the road and ignore
    them; you must surely help him lift them up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'with him,' emphasizing that the person is to assist the owner
      rather than leave him unaided.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָחִיךָ
  chosen: your brother’s
  alternatives:
  - your fellow Israelite’s
  - your kinsman’s
  lexicon: HALOT
  rationale: Literally 'your brother.' In Deuteronomic covenant law this commonly
    refers to a fellow member of the covenant community. 'Brother’s' preserves the
    source wording and its familial-communal force better than a flattened 'neighbor’s.'
- source_word: חֲמוֹר
  chosen: donkey
  alternatives:
  - ass
  lexicon: HALOT
  rationale: '''Donkey'' is the standard modern English rendering; ''ass'' is archaic
    in contemporary usage.'
- source_word: שׁוֹרוֹ
  chosen: his ox
  alternatives:
  - his bull
  - his cattle animal
  lexicon: HALOT
  rationale: '''Ox'' is the conventional and contextually appropriate rendering for
    שׁוֹר in legal material concerning working livestock.'
- source_word: נֹפְלִים
  chosen: fallen
  alternatives:
  - lying fallen
  - collapsed
  lexicon: HALOT
  rationale: The participle from נפל describes the animals as having fallen down,
    likely under a load or from exhaustion. 'Fallen' is concise and natural, while
    allowing the following command to imply assistance in raising them.
- source_word: בַּדֶּרֶךְ
  chosen: on the road
  alternatives:
  - in the way
  - along the road
  lexicon: HALOT
  rationale: '''On the road'' gives clear modern English for the location where the
    animal is encountered.'
- source_word: וְהִתְעַלַּמְתָּ מֵהֶם
  chosen: and ignore them
  alternatives:
  - and hide yourself from them
  - and disregard them
  lexicon: HALOT
  rationale: The hitpael of עלם here idiomatically means to ignore or deliberately
    overlook the situation. The plural pronoun 'them' follows the Hebrew pronoun,
    referring to the animals in view; English could also construe the owner and animal
    together, but 'them' best matches the text.
- source_word: הָקֵם תָּקִים
  chosen: you must surely help ... lift ... up
  alternatives:
  - you shall surely raise
  - you must certainly set up
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the command. Because
    the direct object is implicit and the final phrase is 'with him,' the sense is
    not merely 'raise' in isolation but 'help him lift [them] up.' This brings out
    the idiomatic force in natural English without adding content beyond the context.
- source_word: עִמּוֹ
  chosen: him
  alternatives:
  - with him
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'with him,' indicating cooperative action
    with the owner. In English, 'help him lift them up' naturally incorporates that
    sense; a footnote preserves the more literal phrasing.
