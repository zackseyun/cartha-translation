theological_decisions:
- issue: Rendering of the legal rationale for the woman's guilt
  chosen_reading: because she did not cry out in the city
  alternative_readings:
  - for not calling for help in the city
  rationale: The text itself states the legal rationale in terms of not crying out,
    implying presumed consent within the city setting. The translation preserves the
    text's stated rationale without importing broader doctrinal or ethical conclusions
    beyond the verse.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of עִנָּה in a sexual-law context
  chosen_reading: violated
  alternative_readings:
  - humiliated
  - raped
  rationale: '''Violated'' preserves the seriousness of the act and fits the Hebrew
    legal context without over-specifying beyond the lexical data of ענה in this form.
    ''Raped'' may be contextually inferred by some readers, but the immediate legal
    framing here concerns a betrothed woman in the city and the text''s own wording
    is broader than a single modern legal term.'
  doctrine_reference: Translation philosophy §1, §6
