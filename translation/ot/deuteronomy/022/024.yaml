id: DEU.22.24
reference: Deuteronomy 22:24
source:
  edition: WLC
  text: וְ/הוֹצֵאתֶ֨ם אֶת שְׁנֵי/הֶ֜ם אֶל שַׁ֣עַר הָ/עִ֣יר הַ/הִ֗וא וּ/סְקַלְתֶּ֨ם
    אֹתָ֥/ם בָּ/אֲבָנִים֮ וָ/מֵתוּ֒ אֶת ה/נער עַל דְּבַר֙ אֲשֶׁ֣ר לֹא צָעֲקָ֣ה בָ/עִ֔יר
    וְ/אֶ֨ת הָ/אִ֔ישׁ עַל דְּבַ֥ר אֲשֶׁר עִנָּ֖ה אֶת אֵ֣שֶׁת רֵעֵ֑/הוּ וּ/בִֽעַרְתָּ֥
    הָ/רָ֖ע מִ/קִּרְבֶּֽ/ךָ־־׀־־־־־־־׃ס
translation:
  text: 'then you shall bring both of them out to the gate of that city, and you shall
    stone them with stones so that they die: the young woman because she did not cry
    out in the city, and the man because he violated his neighbor’s wife. So you shall
    purge the evil from your midst.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the girl.' The Hebrew form here is written without the final he of
      the more explicit feminine spelling, but the following verb 'she did not cry
      out' shows that a female is meant.
    reason: lexical_alternative
  - marker: b
    text: Or, 'humiliated' or 'afflicted.' The Hebrew verb can denote sexual violation
      with accompanying humiliation; 'violated' is chosen here as the clearest modern
      rendering.
    reason: lexical_alternative
  - marker: c
    text: The city gate was the customary public place of legal proceedings and judgment.
    reason: cultural_note
lexical_decisions:
- source_word: וְהוֹצֵאתֶם
  chosen: you shall bring ... out
  alternatives:
  - you shall take ... out
  - you shall lead ... out
  lexicon: HALOT
  rationale: Hiphil of יצא here is causative, referring to bringing the accused parties
    out for public judgment. 'Bring out' is natural modern English and preserves the
    causative sense.
- source_word: שְׁנֵיהֶם
  chosen: both of them
  alternatives:
  - the two of them
  lexicon: HALOT
  rationale: The dual expression explicitly refers to both parties involved; 'both
    of them' is idiomatic and precise.
- source_word: שַׁעַר הָעִיר הַהִוא
  chosen: the gate of that city
  alternatives:
  - that city's gate
  - the city gate of that city
  lexicon: HALOT
  rationale: The gate is the judicial/public place in ancient Israelite towns. The
    formal phrase is retained without overexplaining in the main text.
- source_word: וּסְקַלְתֶּם אֹתָם בָּאֲבָנִים
  chosen: you shall stone them with stones
  alternatives:
  - you shall stone them
  - you shall pelt them with stones
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'with stones.' Retaining it reflects the
    source wording and the legal solemnity, even though English could omit it as redundant.
- source_word: וָמֵתוּ
  chosen: so that they die
  alternatives:
  - and they shall die
  - and they must die
  lexicon: HALOT
  rationale: Following the preceding action, this expresses the result of the stoning.
    'So that they die' makes the relation clear in contemporary English.
- source_word: הנער
  chosen: the young woman
  alternatives:
  - the girl
  - the maiden
  lexicon: HALOT
  rationale: Although the consonantal form can be read in relation to נער/נערה, the
    context is explicitly feminine ('she did not cry out'). 'Young woman' is accurate,
    readable, and avoids the potentially misleading age implications of 'girl'.
- source_word: עַל דְּבַר אֲשֶׁר לֹא צָעֲקָה בָעִיר
  chosen: because she did not cry out in the city
  alternatives:
  - on account of the fact that she did not cry out in the city
  - for not crying out in the city
  lexicon: HALOT
  rationale: עַל דְּבַר introduces the stated grounds for judgment. 'Because' communicates
    the causal force clearly.
- source_word: הָאִישׁ
  chosen: the man
  lexicon: HALOT
  rationale: Straightforward lexical rendering.
- source_word: עִנָּה
  chosen: violated
  alternatives:
  - humiliated
  - ravished
  - afflicted
  lexicon: HALOT
  rationale: In this sexual-legal context, ענה denotes sexual violation/humiliation.
    'Violated' communicates the gravity without archaic wording. 'Humiliated' is too
    weak in English here, while 'ravished' is archaic.
- source_word: אֵשֶׁת רֵעֵהוּ
  chosen: his neighbor’s wife
  alternatives:
  - the wife of his neighbor
  lexicon: HALOT
  rationale: Construct chain rendered naturally in English while preserving the covenantal/social
    category of 'neighbor.'
- source_word: וּבִעַרְתָּ הָרָע מִקִּרְבֶּךָ
  chosen: So you shall purge the evil from your midst
  alternatives:
  - thus you shall burn out the evil from your midst
  - so you shall remove the evil from among you
  lexicon: HALOT
  rationale: This is a recurring Deuteronomic legal formula. 'Purge the evil from
    your midst' is established, accurate, and preserves the covenant-judicial force
    better than the flatter 'remove.'
