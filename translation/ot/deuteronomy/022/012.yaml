id: DEU.22.12
reference: Deuteronomy 22:12
source:
  edition: WLC
  text: גְּדִלִ֖ים תַּעֲשֶׂה לָּ֑/ךְ עַל אַרְבַּ֛ע כַּנְפ֥וֹת כְּסוּתְ/ךָ֖ אֲשֶׁ֥ר
    תְּכַסֶּה בָּֽ/הּ־־־׃ס
translation:
  text: You shall make tassels for yourself on the four corners of your covering with
    which you cover yourself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'twisted cords' or 'fringes' for 'tassels.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your covering'; alternatively 'your garment' or 'your cloak.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גְּדִלִים
  chosen: tassels
  alternatives:
  - twisted cords
  - fringes
  lexicon: HALOT
  rationale: The noun refers to hanging ornamental or prescribed attachments on a
    garment. 'Tassels' is the most natural modern English equivalent and aligns with
    the garment context; 'twisted cords' is more etymologically literal, and 'fringes'
    is a traditional alternative.
- source_word: תַּעֲשֶׂה
  chosen: you shall make
  alternatives:
  - you shall make for yourself
  lexicon: HALOT
  rationale: Qal imperfect 2ms of עשה in legal material is naturally rendered as an
    injunction, 'you shall make.' The reflexive nuance from לָּךְ is handled separately
    rather than folded into the verb.
- source_word: לָּךְ
  chosen: for yourself
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The preposition with pronominal suffix marks personal interest or benefit.
    'For yourself' preserves the direct second-person force and reads naturally in
    English law-style instruction.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: Simple spatial relation; 'on' is idiomatic modern English.
- source_word: אַרְבַּע כַּנְפוֹת
  chosen: the four corners
  alternatives:
  - the four edges
  - the four wings
  lexicon: HALOT
  rationale: כָּנָף literally can mean 'wing' or 'extremity,' but in garment context
    it denotes the corners or extremities of the cloth. 'Corners' is the clearest
    idiomatic rendering here.
- source_word: כְּסוּתְךָ
  chosen: your covering
  alternatives:
  - your garment
  - your cloak
  lexicon: HALOT
  rationale: The noun denotes something used as a covering, often a garment or cloak.
    'Your covering' stays close to the Hebrew while remaining understandable; 'garment'
    and 'cloak' are possible but somewhat more interpretive.
- source_word: אֲשֶׁר תְּכַסֶּה בָּהּ
  chosen: with which you cover yourself
  alternatives:
  - with which you clothe yourself
  - in which you wrap yourself
  lexicon: HALOT
  rationale: The relative clause explains the function of the covering. Rendering
    the verb כסה as 'cover' preserves the lexical connection with כְּסוּת ('covering')
    and avoids over-specifying the garment type.
