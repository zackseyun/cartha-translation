theological_decisions:
- issue: Whether to make the sexual violence explicit in the main text beyond the
    lexical content of חזק
  chosen_reading: Retain 'seizes her' in the main text and let the coercive legal
    context imply the assault, rather than adding 'rapes her' as an interpretive gloss.
  alternative_readings:
  - rapes her
  - forces her
  rationale: The verse clearly describes a coercive act in context, especially in
    contrast with the preceding city case and the following exoneration of the woman.
    However, the specific Hebrew verb here is חזק ('seize, take hold of, overpower'),
    not a dedicated verb meaning 'rape.' To preserve transparency to the source while
    still conveying force, 'seizes her' is chosen. A footnote preserves the stronger
    interpretive alternative.
  doctrine_reference: Translation philosophy §§1, 3, 5
