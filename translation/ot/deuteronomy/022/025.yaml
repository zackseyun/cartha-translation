id: DEU.22.25
reference: Deuteronomy 22:25
source:
  edition: WLC
  text: וְֽ/אִם בַּ/שָּׂדֶ֞ה יִמְצָ֣א הָ/אִ֗ישׁ אֶת ה/נער הַ/מְאֹ֣רָשָׂ֔ה וְ/הֶחֱזִֽיק
    בָּ֥/הּ הָ/אִ֖ישׁ וְ/שָׁכַ֣ב עִמָּ֑/הּ וּ/מֵ֗ת הָ/אִ֛ישׁ אֲשֶׁר שָׁכַ֥ב עִמָּ֖/הּ
    לְ/בַדּֽ/וֹ־־־־׃
translation:
  text: But if in the open field the man finds the young woman who is betrothed, and
    the man seizes her and lies with her, then only the man who lay with her shall
    die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'overpowers her' or 'rapes her'; the Hebrew says 'seizes her,' and the
      surrounding law makes clear that the act is non-consensual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a contrasting conditional case from the preceding scenario;
    'But if' captures the adversative force in context better than a bare 'If.'
- source_word: בַּשָּׂדֶה
  chosen: in the open field
  alternatives:
  - in the field
  - in the countryside
  lexicon: HALOT
  rationale: שָׂדֶה is 'field,' but 'open field' makes explicit the setting's isolation,
    which is contextually important for the legal distinction in the surrounding verses
    without overparaphrasing.
- source_word: יִמְצָא
  chosen: finds
  alternatives:
  - comes upon
  - encounters
  lexicon: HALOT
  rationale: The verb מצא commonly means 'find.' 'Finds' is the most direct rendering
    and preserves the legal narrative style.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - a man
  lexicon: HALOT
  rationale: The article is present; 'the man' reflects the Hebrew form and maintains
    the legal-case specificity.
- source_word: הַנַּעַר
  chosen: the young woman
  alternatives:
  - the girl
  - the maiden
  lexicon: HALOT
  rationale: Though נער can be rendered 'girl' or 'maiden,' 'young woman' is clear
    modern English and avoids sounding either too childish or archaic. The feminine
    referent is clear from context and morphology.
- source_word: הַמְאֹרָשָׂה
  chosen: who is betrothed
  alternatives:
  - the betrothed one
  - who is engaged
  lexicon: HALOT
  rationale: The passive participle from ארשׂ denotes a legally pledged woman. 'Betrothed'
    is more precise than modern 'engaged,' since the legal force is stronger than
    contemporary engagement.
- source_word: וְהֶחֱזִיק בָּהּ
  chosen: seizes her
  alternatives:
  - takes hold of her
  - overpowers her
  - forces her
  lexicon: HALOT
  rationale: The hiphil of חזק with ב conveys forceful grasping. 'Seizes her' preserves
    the coercive action without importing more detail than the verb itself states.
    'Forces her' is interpretive; the coercive sense is supported by context but the
    lexical rendering should stay close to the verb.
- source_word: וְשָׁכַב עִמָּהּ
  chosen: lies with her
  alternatives:
  - has sexual relations with her
  - sleeps with her
  lexicon: HALOT
  rationale: This is the standard Hebrew idiom for sexual intercourse. 'Lies with
    her' is both accurate and suitably dignified for legal material.
- source_word: וּמֵת
  chosen: then ... shall die
  alternatives:
  - and he shall die
  - must die
  lexicon: HALOT
  rationale: In legal context the qatal here carries prescriptive force as the consequence
    of the case. English idiom requires making the legal result explicit; 'shall die'
    preserves the judicial register.
- source_word: לְבַדּוֹ
  chosen: only
  alternatives:
  - alone
  - by himself
  lexicon: HALOT
  rationale: 'The adverb marks exclusivity: the death penalty applies to the man alone,
    not to the woman. ''Only'' expresses this clearly in natural English.'
