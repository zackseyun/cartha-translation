id: DEU.22.26
reference: Deuteronomy 22:26
source:
  edition: WLC
  text: ו/ל/נער לֹא תַעֲשֶׂ֣ה דָבָ֔ר אֵ֥ין ל/נער חֵ֣טְא מָ֑וֶת כִּ֡י כַּ/אֲשֶׁר֩ יָק֨וּם
    אִ֤ישׁ עַל רֵעֵ֨/הוּ֙ וּ/רְצָח֣/וֹ נֶ֔פֶשׁ כֵּ֖ן הַ/דָּבָ֥ר הַ/זֶּֽה־־׃
translation:
  text: But to the young woman you shall do nothing; the young woman has committed
    no sin deserving death. For this case is like when a man rises against his neighbor
    and murders him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the young woman is guilty of no capital offense.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'so is this matter'—that is, this case is comparable to murder committed
      by assault.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלַנַּעַר
  chosen: But to the young woman
  alternatives:
  - And to the young woman
  - But to the girl
  lexicon: HALOT
  rationale: נַעַר/נַעֲרָה in this legal context refers to the betrothed young woman
    of the preceding verse. English 'young woman' is clearer and more natural than
    'girl' while preserving age/youth nuance. Initial ו is rendered 'But' to mark
    the contrast with the man's punishment in the previous verse.
- source_word: לֹא תַעֲשֶׂה דָבָר
  chosen: you shall do nothing
  alternatives:
  - you shall not do a thing
  - do nothing to her
  lexicon: HALOT
  rationale: A straightforward legal prohibition. 'You shall do nothing' preserves
    the second-person singular legal address and the absolute sense of no punitive
    action.
- source_word: אֵין לַנַּעַר חֵטְא מָוֶת
  chosen: the young woman has committed no sin deserving death
  alternatives:
  - there is in the young woman no sin of death
  - the young woman is guilty of no capital offense
  lexicon: HALOT
  rationale: Literally, 'there is not for the young woman a sin of death.' The idiom
    denotes absence of guilt warranting the death penalty. 'Deserving death' communicates
    the legal force in natural English without over-paraphrasing.
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the rationale for the legal ruling.
- source_word: כַּאֲשֶׁר יָקוּם אִישׁ עַל רֵעֵהוּ
  chosen: when a man rises against his neighbor
  alternatives:
  - as when a man rises up against his fellow
  - when a man attacks his neighbor
  lexicon: HALOT
  rationale: Keeps the comparative structure and the vivid legal analogy. 'Neighbor'
    is a standard rendering of רֵעַ here in interpersonal legal context.
- source_word: וּרְצָחוֹ נֶפֶשׁ
  chosen: and murders him
  alternatives:
  - and kills him
  - and murders a person
  lexicon: HALOT
  rationale: רצח denotes unlawful killing, so 'murders' is more precise than 'kills.'
    The pronominal suffix on the verb points to the neighbor as the victim; נֶפֶשׁ
    intensifies/personifies the victim and is idiomatically absorbed in English.
- source_word: כֵּן הַדָּבָר הַזֶּה
  chosen: this case is like
  alternatives:
  - so is this matter
  - so it is with this case
  lexicon: HALOT
  rationale: The phrase concludes the analogy. 'This case' fits legal English and
    reflects דָּבָר as 'matter/case' in judicial context.
