theological_decisions:
- issue: Whether to render the act with an explicitly interpretive term such as 'rape'
    in the main text
  chosen_reading: Retain the lexical wording 'seizes her and lies with her' rather
    than collapsing the clause into a single interpretive label.
  alternative_readings:
  - rapes her
  - takes her
  rationale: This verse is debated in relation to nearby laws and the force of תפשׂ.
    The translation should not flatten the Hebrew into a narrower or softer English
    term than the text itself supplies. 'Seizes her' preserves the physical-force
    component more transparently than 'takes her,' while avoiding importing a full
    legal interpretation into the main text. Because the interpretive question is
    significant, an alternative is preserved in a footnote.
  doctrine_reference: 'Translation philosophy items 1 and 3: original-language primacy;
    preserve theological tension rather than resolve it.'
