id: DEU.22.28
reference: Deuteronomy 22:28
source:
  edition: WLC
  text: כִּֽי יִמְצָ֣א אִ֗ישׁ נער בְתוּלָה֙ אֲשֶׁ֣ר לֹא אֹרָ֔שָׂה וּ/תְפָשָׂ֖/הּ וְ/שָׁכַ֣ב
    עִמָּ֑/הּ וְ/נִמְצָֽאוּ־־׃
translation:
  text: If a man finds a young woman, a virgin who is not engaged, and seizes her
    and lies with her, and they are discovered,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who is not betrothed.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb can mean 'seize,' 'grasp,' or 'take hold of.' Some understand
      the clause here as implying rape; others argue the legal nuance must be inferred
      from the wider context rather than from this verb alone.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a casuistic law clause. 'If' fits English legal style well,
    though 'when' is also possible.
- source_word: יִמְצָא
  chosen: finds
  alternatives:
  - comes upon
  lexicon: HALOT
  rationale: The verb commonly means 'find.' 'Comes upon' is possible contextually,
    but 'finds' is the more direct and consistent rendering.
- source_word: אִישׁ
  chosen: a man
  lexicon: HALOT
  rationale: Gender-specific singular noun; rendered gender-accurately per translation
    philosophy.
- source_word: נער בְתוּלָה
  chosen: a young woman, a virgin
  alternatives:
  - a girl, a virgin
  - a maiden
  lexicon: HALOT
  rationale: The Hebrew combines youth and virginity. 'Young woman, a virgin' preserves
    both elements without archaic diction. 'Girl' may sound too juvenile in modern
    English; 'maiden' is archaic.
- source_word: אֲשֶׁר לֹא אֹרָשָׂה
  chosen: who is not engaged
  alternatives:
  - who is not betrothed
  lexicon: HALOT
  rationale: Refers to a woman not legally pledged in betrothal. 'Engaged' is more
    readable modern English; 'betrothed' is a more formal alternative preserved in
    the footnote.
- source_word: וּתְפָשָׂהּ
  chosen: and seizes her
  alternatives:
  - and takes hold of her
  - and grasps her
  lexicon: HALOT
  rationale: The verb תפשׂ commonly means to seize, grasp, or take hold. 'Seizes her'
    best preserves the force of the Hebrew without softening it. This wording avoids
    importing a more specific legal conclusion than the verb itself states, while
    still reflecting coercive physical action.
- source_word: וְשָׁכַב עִמָּהּ
  chosen: and lies with her
  alternatives:
  - and has sexual relations with her
  lexicon: HALOT
  rationale: Hebrew idiom for sexual intercourse. 'Lies with her' is the standard,
    sufficiently clear biblical idiom in English; the more explicit alternative is
    possible but less formally aligned.
- source_word: וְנִמְצָאוּ
  chosen: and they are discovered
  alternatives:
  - and they are found out
  lexicon: HALOT
  rationale: Passive plural indicates the act becomes known. 'They are discovered'
    is natural and preserves the passive sense.
