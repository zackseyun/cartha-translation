id: DEU.22.27
reference: Deuteronomy 22:27
source:
  edition: WLC
  text: כִּ֥י בַ/שָּׂדֶ֖ה מְצָאָ֑/הּ צָעֲקָ֗ה ה/נער הַ/מְאֹ֣רָשָׂ֔ה וְ/אֵ֥ין מוֹשִׁ֖יעַ
    לָֽ/הּ׃ס
translation:
  text: For he found her in the field; the betrothed young woman cried out, but there
    was no one to rescue her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the open country.' The Hebrew phrase refers to a rural, isolated
      setting.
    reason: lexical_alternative
  - marker: b
    text: Or 'there was no one to save her.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the explanation for the prior legal judgment. 'For' preserves
    the explanatory force in natural English; 'because' would also fit but is slightly
    heavier syntactically here.
- source_word: בַשָּׂדֶה
  chosen: in the field
  alternatives:
  - in the countryside
  - in the open country
  lexicon: HALOT
  rationale: The phrase denotes an open rural setting, important to the legal logic
    that no help was available. 'In the field' is the most direct and traditional
    rendering while remaining clear.
- source_word: מְצָאָהּ
  chosen: he found her
  alternatives:
  - he came upon her
  lexicon: HALOT
  rationale: The verb מצא normally means 'find.' In context it refers to the man encountering
    the woman in the field. 'He found her' is formally close and idiomatic.
- source_word: צָעֲקָה
  chosen: cried out
  alternatives:
  - screamed
  - called for help
  lexicon: HALOT
  rationale: The verb צעק conveys a cry for help or distress. 'Cried out' preserves
    the lexical sense without over-specifying volume or modern connotations. 'Called
    for help' is interpretive; 'screamed' is possible but narrower.
- source_word: הנער
  chosen: young woman
  alternatives:
  - girl
  - maiden
  lexicon: HALOT
  rationale: Though the consonantal form can be read from נער, the referent is clearly
    female from context and agreement. 'Young woman' is gender-accurate, natural modern
    English, and avoids the childish sense of 'girl' and the archaic tone of 'maiden'.
- source_word: המארשה
  chosen: betrothed
  alternatives:
  - engaged
  - pledged in marriage
  lexicon: HALOT
  rationale: The passive participial form denotes a woman legally pledged for marriage.
    'Betrothed' best preserves the ancient legal force more precisely than modern
    'engaged.'
- source_word: וְאֵין מוֹשִׁיעַ לָהּ
  chosen: but there was no one to rescue her
  alternatives:
  - and there was no one to save her
  - and no one delivered her
  lexicon: HALOT
  rationale: The clause states the absence of any rescuer. 'Rescue' communicates the
    situational sense clearly in modern English; 'save' is possible but can sound
    theologically loaded in English beyond the immediate legal context.
