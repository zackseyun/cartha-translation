theological_decisions:
- issue: Rendering of the legal-social status of הַמְאֹרָשָׂה
  chosen_reading: betrothed
  alternative_readings:
  - engaged
  - pledged in marriage
  rationale: The verse depends on the woman's formal covenantal status in Israelite
    law. 'Betrothed' preserves that legal seriousness without importing later doctrinal
    claims.
  doctrine_reference: Translation philosophy §1, §6
- issue: Gender rendering of הַנַּעַר in context
  chosen_reading: young woman
  alternative_readings:
  - girl
  - maiden
  rationale: The context and agreement identify the referent as female, so the English
    should reflect that directly. This follows the project's gender-accurate principle
    rather than reproducing a potentially ambiguous form woodenly.
  doctrine_reference: Translation philosophy §4
