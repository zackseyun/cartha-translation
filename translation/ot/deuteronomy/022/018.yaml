id: DEU.22.18
reference: Deuteronomy 22:18
source:
  edition: WLC
  text: וְ/לָֽקְח֛וּ זִקְנֵ֥י הָֽ/עִיר הַ/הִ֖וא אֶת הָ/אִ֑ישׁ וְ/יִסְּר֖וּ אֹתֽ/וֹ־־׃
translation:
  text: Then the elders of that city shall take the man and discipline him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'chastise him,' 'punish him,' or possibly 'flog him.' The Hebrew verb
      is broad for disciplinary correction; the exact form of punishment is clarified
      by the surrounding legal context rather than by the verb alone.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקְחוּ
  chosen: shall take
  alternatives:
  - shall seize
  - shall apprehend
  lexicon: HALOT
  rationale: Qal of לקח commonly means 'take.' In this legal context, 'take' is sufficiently
    formal and natural in English without over-specifying force as 'seize' unless
    the context explicitly demands it.
- source_word: זִקְנֵי
  chosen: the elders
  alternatives:
  - the older men
  lexicon: HALOT
  rationale: In civic-legal contexts זקנים refers to recognized community leaders
    rather than merely elderly males. 'The elders' best captures the institutional
    role.
- source_word: הָעִיר הַהִוא
  chosen: of that city
  alternatives:
  - of that town
  lexicon: HALOT
  rationale: עיר denotes the local settlement/jurisdiction. 'City' is the standard
    rendering and fits the legal setting; 'that city' preserves the demonstrative
    specificity.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - that man
  - the husband
  lexicon: HALOT
  rationale: איש can mean 'man' or, by context, 'husband.' Here the immediate legal
    referent is the accused husband from the prior context, but 'the man' more closely
    follows the Hebrew wording while still referring to him.
- source_word: וְיִסְּרוּ אֹתוֹ
  chosen: and discipline him
  alternatives:
  - and chastise him
  - and punish him
  - and flog him
  lexicon: HALOT
  rationale: יסר broadly denotes chastening, disciplining, or correcting. Since the
    next verse specifies a monetary penalty and the term itself does not explicitly
    state the mode of punishment here, 'discipline him' preserves the lexical breadth
    without prematurely narrowing it to corporal punishment.
