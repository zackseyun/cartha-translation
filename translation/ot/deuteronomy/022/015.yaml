id: DEU.22.15
reference: Deuteronomy 22:15
source:
  edition: WLC
  text: וְ/לָקַ֛ח אֲבִ֥י ה/נער וְ/אִמָּ֑/הּ וְ/הוֹצִ֜יאוּ אֶת בְּתוּלֵ֧י ה/נער אֶל
    זִקְנֵ֥י הָ/עִ֖יר הַ/שָּֽׁעְרָ/ה־־׃
translation:
  text: then the young woman’s father and her mother shall take and bring out the
    evidence of the young woman’s virginity to the elders of the city at the gate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the virginities of the young woman,' an idiom for the proof
      or tokens presented as evidence of virginity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַח
  chosen: shall take
  alternatives:
  - is to take
  - must take
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in legal sequence functions with
    injunctive/future force in context; English 'shall take' fits legal style and
    preserves the procedural sense.
- source_word: אֲבִי הַנַּעַר וְאִמָּהּ
  chosen: the young woman’s father and her mother
  alternatives:
  - the girl’s father and her mother
  - the maiden’s father and her mother
  lexicon: HALOT
  rationale: נַעֲרָה refers to a young woman of marriageable age. 'Young woman' is
    natural modern English and avoids the potentially childish sense of 'girl' and
    the archaic tone of 'maiden'.
- source_word: וְהוֹצִיאוּ
  chosen: bring out
  alternatives:
  - produce
  - bring forth
  lexicon: HALOT
  rationale: Hiphil of יצא here means to cause to be brought out/presented. 'Bring
    out' is transparent and concrete; in context it implies formal presentation before
    authorities.
- source_word: אֶת בְּתוּלֵי הַנַּעַר
  chosen: the evidence of the young woman’s virginity
  alternatives:
  - the tokens of the young woman’s virginity
  - the proofs of the young woman’s virginity
  lexicon: HALOT
  rationale: Literally 'the virginities of the young woman,' an idiom referring to
    physical proof/tokens of virginity in this legal case. A more literal rendering
    like 'tokens' is possible, but 'evidence of ... virginity' best communicates the
    idiomatic sense to modern readers without obscuring the legal context.
- source_word: אֶל זִקְנֵי הָעִיר
  chosen: to the elders of the city
  alternatives:
  - before the elders of the city
  lexicon: HALOT
  rationale: אֶל marks direction toward the judicial body. 'To the elders of the city'
    is straightforward; the judicial nuance is clear from context.
- source_word: הַשַּׁעְרָה
  chosen: at the gate
  alternatives:
  - to the gate
  - at the city gate
  lexicon: HALOT
  rationale: The directional ending on 'gate' can be rendered 'to the gate,' but in
    context the city gate is the place where elders sit in judgment. 'At the gate'
    communicates the functional location naturally in English.
