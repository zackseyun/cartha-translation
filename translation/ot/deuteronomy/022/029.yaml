id: DEU.22.29
reference: Deuteronomy 22:29
source:
  edition: WLC
  text: וְ֠/נָתַן הָ/אִ֨ישׁ הַ/שֹּׁכֵ֥ב עִמָּ֛/הּ לַ/אֲבִ֥י ה/נער חֲמִשִּׁ֣ים כָּ֑סֶף
    וְ/לֽ/וֹ תִהְיֶ֣ה לְ/אִשָּׁ֗ה תַּ֚חַת אֲשֶׁ֣ר עִנָּ֔/הּ לֹא יוּכַ֥ל שַׁלְּחָ֖/ה
    כָּל יָמָֽי/ו־־־׃ס
translation:
  text: Then the man who lay with her shall give fifty shekels of silver to the young
    woman's father, and she shall become his wife because he has violated her. He
    may not send her away all his days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because he has humbled/debased her.' The Hebrew verb can be rendered
      more literally this way, but in this context it refers to sexual violation.
    reason: lexical_alternative
  - marker: b
    text: '''Send her away'' refers to dismissing or divorcing her.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַן
  chosen: Then ... shall give
  alternatives:
  - and ... shall give
  lexicon: HALOT
  rationale: Consecutive waw with perfect in legal material advances the prescription.
    'Then' makes the legal sequence clear in natural English while preserving the
    mandatory force with 'shall give'.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the האיש/individual
  lexicon: HALOT
  rationale: Standard rendering of אִישׁ in this legal context; specific male offender
    is in view, not a generic person.
- source_word: הַשֹּׁכֵב עִמָּהּ
  chosen: who lay with her
  alternatives:
  - who slept with her
  - lying with her
  lexicon: HALOT
  rationale: A relative-participial construction describing the man by the sexual
    act. 'Lay with' is idiomatic, clear, and appropriately restrained for biblical
    legal style; 'slept with' is more colloquial.
- source_word: לַאֲבִי הַנַּעֲרָ
  chosen: to the young woman's father
  alternatives:
  - to the girl's father
  - to the father of the young woman
  lexicon: HALOT
  rationale: נַעֲרָה denotes a young woman/girl of marriageable age. 'Young woman'
    is more natural and less potentially infantilizing in English while preserving
    age/status implications.
- source_word: חֲמִשִּׁים כָּסֶף
  chosen: fifty shekels of silver
  alternatives:
  - fifty silver pieces
  - fifty pieces of silver
  lexicon: HALOT
  rationale: The Hebrew literally says 'fifty silver.' In legal/economic contexts
    this denotes a weight standard, conventionally 'shekels of silver.' Supplying
    'shekels' communicates the actual sense better than the vaguer 'pieces of silver'.
- source_word: וְלוֹ תִהְיֶה לְאִשָּׁה
  chosen: and she shall become his wife
  alternatives:
  - and she shall be his wife
  - and she shall belong to him as wife
  lexicon: HALOT
  rationale: The clause states resultant marital status. 'Become his wife' reads naturally
    in English and reflects the future/resultative force without implying ownership
    beyond the marital relation.
- source_word: תַּחַת אֲשֶׁר
  chosen: because
  alternatives:
  - because of the fact that
  - in return for that
  lexicon: HALOT
  rationale: In this causal legal formula, תַּחַת אֲשֶׁר introduces the reason/grounds
    for the ruling. 'Because' is the clearest idiomatic equivalent.
- source_word: עִנָּהּ
  chosen: has violated her
  alternatives:
  - has humbled her
  - has afflicted her
  - has debased her
  lexicon: HALOT
  rationale: ענה in the piel here denotes the man's degrading/violating treatment
    of the woman in a sexual context. 'Violated her' communicates the seriousness
    of the act in contemporary English better than the traditional but opaque 'humbled
    her.'
- source_word: לֹא יוּכַל שַׁלְּחָהּ
  chosen: He may not send her away
  alternatives:
  - He cannot divorce her
  - He shall not dismiss her
  lexicon: HALOT
  rationale: The Hebrew literally says he is not able to send her away. In marital
    legal context this refers to dismissing/divorcing her. 'Send her away' preserves
    the source wording while remaining understandable; 'divorce her' is interpretive
    but plausible.
- source_word: כָּל יָמָיו
  chosen: all his days
  alternatives:
  - all his life
  - for the rest of his life
  lexicon: HALOT
  rationale: A common Hebrew idiom meaning lifelong duration. 'All his days' is transparent
    and preserves the idiomatic flavor.
