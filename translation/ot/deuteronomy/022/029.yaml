theological_decisions:
- issue: Rendering the sexual-violence term עִנָּהּ in a way that neither minimizes
    nor over-specifies beyond the immediate wording
  chosen_reading: has violated her
  alternative_readings:
  - has humbled her
  - has debased her
  - has raped her
  rationale: The immediate verse uses ענה rather than the more explicit verb for seizing/forcing
    found in the preceding context, though the broader law unit is closely related.
    'Violated her' conveys serious sexual wrongdoing without flattening the lexical
    distinction or importing more specificity than this clause alone states. Traditional
    'humbled her' is too weak/opaque in modern English; 'raped her' may reflect the
    larger context but is more interpretive than the wording of this clause by itself.
  doctrine_reference: Translation philosophy §§1, 3, 6
