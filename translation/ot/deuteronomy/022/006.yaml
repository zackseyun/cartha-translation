id: DEU.22.6
reference: Deuteronomy 22:6
source:
  edition: WLC
  text: כִּ֣י יִקָּרֵ֣א קַן צִפּ֣וֹר לְ/פָנֶ֡י/ךָ בַּ/דֶּ֜רֶךְ בְּ/כָל עֵ֣ץ א֣וֹ עַל
    הָ/אָ֗רֶץ אֶפְרֹחִים֙ א֣וֹ בֵיצִ֔ים וְ/הָ/אֵ֤ם רֹבֶ֨צֶת֙ עַל הָֽ/אֶפְרֹחִ֔ים א֖וֹ
    עַל הַ/בֵּיצִ֑ים לֹא תִקַּ֥ח הָ/אֵ֖ם עַל הַ/בָּנִֽים־׀־׀־־־־־׃
translation:
  text: If a bird’s nest happens to be before you on the way, in any tree or on the
    ground, with young ones or eggs, and the mother is sitting on the young ones or
    on the eggs, you shall not take the mother along with the young.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'When a bird’s nest is encountered before you.' The Hebrew verb suggests
      a chance finding rather than a deliberate search.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the mother upon the young.' The idiom means taking the mother
      together with her offspring.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a casuistic law condition. 'If' fits English legal style naturally,
    though 'when' is also possible.
- source_word: יִקָּרֵא
  chosen: happens to be
  alternatives:
  - comes upon
  - is encountered
  lexicon: HALOT
  rationale: The Niphal of קרא here conveys a chance encounter rather than deliberate
    seeking. 'Happens to be' preserves the incidental nature of finding the nest.
- source_word: קַן צִפּוֹר
  chosen: a bird’s nest
  alternatives:
  - a nest of a bird
  lexicon: HALOT
  rationale: Natural English rendering of the construct phrase, without loss of meaning.
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - in front of you
  - before you come
  lexicon: HALOT
  rationale: A fairly literal rendering that preserves the sense of something appearing
    in one's path. It works idiomatically with 'happens to be.'
- source_word: בַּדֶּרֶךְ
  chosen: on the way
  alternatives:
  - along the road
  - on the road
  lexicon: HALOT
  rationale: Broader than a paved road; refers to one's course of travel. 'On the
    way' is idiomatic and suitably general.
- source_word: בְּכָל עֵץ אוֹ עַל הָאָרֶץ
  chosen: in any tree or on the ground
  alternatives:
  - in any tree or on the land
  lexicon: HALOT
  rationale: '''In any tree'' fits nest location idiomatically in English; ''earth/land''
    here refers concretely to the ground.'
- source_word: אֶפְרֹחִים
  chosen: young ones
  alternatives:
  - young birds
  - nestlings
  - chicks
  lexicon: HALOT
  rationale: A general term for the young in the nest. 'Young ones' avoids over-specifying
    species or developmental stage, while remaining clear.
- source_word: בֵיצִים
  chosen: eggs
  lexicon: HALOT
  rationale: Direct and unambiguous rendering.
- source_word: וְהָאֵם
  chosen: the mother
  alternatives:
  - the mother bird
  lexicon: HALOT
  rationale: The Hebrew simply says 'the mother.' English readers can infer the avian
    context; this also preserves the concise wording of the source.
- source_word: רֹבֶצֶת
  chosen: is sitting
  alternatives:
  - is lying
  - is brooding
  - is crouching
  lexicon: HALOT
  rationale: Describes the mother positioned upon the young or eggs. 'Is sitting'
    is natural in English for a bird on a nest; 'brooding' is interpretive and slightly
    narrower.
- source_word: לֹא תִקַּח
  chosen: you shall not take
  alternatives:
  - do not take
  lexicon: HALOT
  rationale: A standard rendering for legal prohibition in biblical law, preserving
    the prescriptive force.
- source_word: הָאֵם עַל הַבָּנִים
  chosen: the mother along with the young
  alternatives:
  - the mother with the children
  - the mother over the young
  lexicon: HALOT
  rationale: Here עַל in this idiom is best rendered as accompaniment rather than
    spatial 'upon/over.' 'Young' reflects the offspring in context and avoids the
    potentially misleading 'children' for birds.
- source_word: הַבָּנִים
  chosen: the young
  alternatives:
  - the offspring
  - the children
  lexicon: HALOT
  rationale: Though literally 'sons/children,' in animal context it refers to offspring
    generally. 'The young' is idiomatic and contextually precise.
