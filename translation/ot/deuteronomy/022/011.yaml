id: DEU.22.11
reference: Deuteronomy 22:11
source:
  edition: WLC
  text: לֹ֤א תִלְבַּשׁ֙ שַֽׁעַטְנֵ֔ז צֶ֥מֶר וּ/פִשְׁתִּ֖ים יַחְדָּֽו׃ס
translation:
  text: You shall not wear cloth made of wool and linen together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''shaatnez, wool and linen together.'' The rare word ''shaatnez''
      refers to cloth made from this mixed combination.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Standard negation introducing the prohibition.
- source_word: תִלְבַּשׁ
  chosen: you shall wear
  alternatives:
  - you may wear
  - you are to wear
  lexicon: HALOT
  rationale: Qal imperfect 2ms of לבש in legal material is well rendered as an English
    prohibition with 'shall not' plus the verb 'wear.'
- source_word: שַׁעַטְנֵז
  chosen: cloth made of wool and linen
  alternatives:
  - mixed fabric
  - shaatnez
  lexicon: HALOT
  rationale: This rare term refers specifically to a forbidden mixed material, clarified
    by the following apposition 'wool and linen together.' Rendering the sense in
    English is clearer than transliterating the Hebrew term.
- source_word: צֶמֶר
  chosen: wool
  lexicon: HALOT
  rationale: Standard meaning of the noun in textile contexts.
- source_word: וּפִשְׁתִּים
  chosen: and linen
  alternatives:
  - and flax
  lexicon: HALOT
  rationale: Though the Hebrew term can denote flax, in clothing context 'linen' best
    conveys the resulting textile to modern readers.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - mixed together
  lexicon: HALOT
  rationale: Adverb indicating combination of the two materials in one garment; 'together'
    is natural and sufficient in English.
