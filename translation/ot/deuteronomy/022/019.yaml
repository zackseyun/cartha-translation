theological_decisions:
- issue: Legal idiom for marital dissolution
  chosen_reading: send her away
  alternative_readings:
  - divorce her
  rationale: The verse is legal material, and the Hebrew idiom can denote divorce.
    The main text preserves the source-language expression, while the more explicit
    legal interpretation is preserved in a footnote for clarity. This follows the
    project's preference for original-language primacy while documenting context-driven
    alternatives.
  doctrine_reference: Translation philosophy 1, 3, 5
