id: DEU.22.19
reference: Deuteronomy 22:19
source:
  edition: WLC
  text: וְ/עָנְשׁ֨וּ אֹת֜/וֹ מֵ֣אָה כֶ֗סֶף וְ/נָתְנוּ֙ לַ/אֲבִ֣י הַֽ/נַּעֲרָ֔ה כִּ֤י
    הוֹצִיא֙ שֵׁ֣ם רָ֔ע עַ֖ל בְּתוּלַ֣ת יִשְׂרָאֵ֑ל וְ/לֽ/וֹ תִהְיֶ֣ה לְ/אִשָּׁ֔ה
    לֹא יוּכַ֥ל לְ/שַּׁלְּחָ֖/הּ כָּל יָמָֽי/ו־־־׃ס
translation:
  text: Then they shall fine him one hundred shekels of silver and give them to the
    father of the young woman, because he has brought a bad name upon a virgin of
    Israel. And she shall be his wife; he may not send her away all his days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'divorce her'; the Hebrew literally says 'send her away,' a common expression
      for marital dismissal in legal contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָנְשׁוּ
  chosen: they shall fine
  alternatives:
  - they shall punish
  - they shall amerce
  lexicon: HALOT
  rationale: In this legal context the verb refers specifically to imposing a monetary
    penalty, not punishment in a general sense. 'Fine' best captures the juridical
    force in natural English.
- source_word: מֵאָה כֶסֶף
  chosen: one hundred shekels of silver
  alternatives:
  - a hundred silver pieces
  - a hundred of silver
  lexicon: HALOT
  rationale: The Hebrew literally says 'one hundred silver.' In legal/economic contexts
    this elliptical construction refers to a weight of silver, conventionally rendered
    'shekels of silver.' Supplying 'shekels' makes the monetary amount intelligible
    in English without distorting the sense.
- source_word: לַאֲבִי הַנַּעֲרָה
  chosen: to the father of the young woman
  alternatives:
  - to the girl's father
  - to the father of the maiden
  lexicon: HALOT
  rationale: נַעֲרָה denotes a young woman of marriageable age. 'Young woman' is clear
    modern English and avoids the archaic tone of 'maiden' while preserving the referent.
- source_word: כִּי הוֹצִיא שֵׁם רָע
  chosen: because he has brought a bad name
  alternatives:
  - because he has brought an evil report
  - because he has defamed her
  - because he has slandered
  lexicon: HALOT
  rationale: The idiom literally means to bring out a bad name/reputation. 'Brought
    a bad name' preserves the Hebrew imagery more closely than the more interpretive
    'slandered,' while remaining understandable.
- source_word: עַל בְּתוּלַת יִשְׂרָאֵל
  chosen: upon a virgin of Israel
  alternatives:
  - against an Israelite virgin
  - upon the virgin of Israel
  lexicon: HALOT
  rationale: בְּתוּלָה ordinarily denotes a virgin here in the legal accusation context.
    'Of Israel' preserves the genitival construction and covenant-community framing.
    'Upon' matches the idiom with 'bring a bad name upon' in English.
- source_word: וְלוֹ תִהְיֶה לְאִשָּׁה
  chosen: And she shall be his wife
  alternatives:
  - and she shall become his wife
  - and she must remain his wife
  lexicon: HALOT
  rationale: The clause states the resulting legal-marital status. 'Shall be his wife'
    is a straightforward rendering of the Hebrew and fits the legal register.
- source_word: לֹא יוּכַל
  chosen: he may not
  alternatives:
  - he cannot
  - he shall not be able to
  lexicon: HALOT
  rationale: In legal material this construction expresses prohibition/legal incapacity
    rather than mere physical inability. 'May not' communicates that force idiomatically.
- source_word: לְשַׁלְּחָהּ
  chosen: send her away
  alternatives:
  - divorce her
  - dismiss her
  lexicon: HALOT
  rationale: The verb literally means 'send away.' In marital law it can function
    as a divorce expression, but 'send her away' preserves the Hebrew wording while
    allowing readers to hear the legal idiom. The more explicit 'divorce her' is a
    valid interpretive alternative preserved in a footnote.
- source_word: כָּל יָמָיו
  chosen: all his days
  alternatives:
  - all his life
  - for the rest of his life
  lexicon: HALOT
  rationale: This is a common Hebrew idiom meaning lifelong duration. 'All his days'
    is both literal and clear in English.
