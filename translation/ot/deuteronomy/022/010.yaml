id: DEU.22.10
reference: Deuteronomy 22:10
source:
  edition: WLC
  text: לֹֽא תַחֲרֹ֥שׁ בְּ/שׁוֹר וּ/בַ/חֲמֹ֖ר יַחְדָּֽו־־׃ס
translation:
  text: You shall not plow with an ox and a donkey together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Do not plow with an ox and a donkey together.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Standard negation introducing a prohibition.
- source_word: תַחֲרֹשׁ
  chosen: you shall plow
  alternatives:
  - you are not to plow
  - do not plow
  lexicon: HALOT
  rationale: Qal imperfect 2ms in legal material commonly functions as an injunction/prohibition.
    'You shall not plow' preserves the legal-register force in natural English.
- source_word: בְּשׁוֹר
  chosen: with an ox
  alternatives:
  - with a bull
  - by an ox
  lexicon: HALOT
  rationale: שׁוֹר is the general term for bovine draft animal; 'ox' best fits the
    agricultural context of plowing.
- source_word: וּבַחֲמֹר
  chosen: and a donkey
  alternatives:
  - and an ass
  lexicon: HALOT
  rationale: חֲמוֹר is the ordinary term for donkey. 'Donkey' is clear modern English
    and avoids archaic or potentially distracting wording.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - as one team
  - jointly
  lexicon: HALOT
  rationale: The adverb marks the two animals as paired in the same act of plowing.
    'Together' is the most direct and idiomatic rendering.
