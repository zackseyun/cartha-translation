id: DEU.33.28
reference: Deuteronomy 33:28
source:
  edition: WLC
  text: וַ/יִּשְׁכֹּן֩ יִשְׂרָאֵ֨ל בֶּ֤טַח בָּדָד֙ עֵ֣ין יַעֲקֹ֔ב אֶל אֶ֖רֶץ דָּגָ֣ן
    וְ/תִיר֑וֹשׁ אַף שָׁמָ֖י/ו יַֽעַרְפוּ טָֽל־־׃
translation:
  text: So Israel lived in safety, alone; Jacob’s fountain was in a land of grain
    and new wine; even his heavens dripped dew.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the eye of Jacob.' The Hebrew word can mean either 'eye' or 'spring/fountain';
      the main text follows the sense that best fits the imagery of agricultural abundance.
    reason: lexical_alternative
  - marker: b
    text: Or 'dwelt securely, by itself.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁכֹּן
  chosen: lived
  alternatives:
  - dwelt
  - settled
  lexicon: HALOT
  rationale: The verb שׁכן means to dwell or reside. In smooth modern English, 'lived'
    best conveys settled habitation here without sounding wooden; 'dwelt' is more
    formal but less natural.
- source_word: בֶּטַח
  chosen: in safety
  alternatives:
  - securely
  - safely
  lexicon: HALOT
  rationale: בטח here functions adverbially, describing Israel's secure condition.
    'In safety' preserves the nominal force and common biblical idiom.
- source_word: בָּדָד
  chosen: alone
  alternatives:
  - by itself
  - apart
  lexicon: HALOT
  rationale: בדד denotes separateness or solitary security. 'Alone' is concise and
    preserves the sense of distinct, untroubled dwelling, not necessarily loneliness.
- source_word: עֵין יַעֲקֹב
  chosen: Jacob’s fountain
  alternatives:
  - the fountain of Jacob
  - the eye of Jacob
  lexicon: HALOT
  rationale: עין can mean 'eye' or 'spring/fountain.' In this context, with the following
    reference to a fertile land, 'fountain' best fits the imagery and the likely idiom
    for Jacob/Israel as a life-source or well-supplied people. The more literal 'eye
    of Jacob' is possible but obscure in English and likely not the intended sense.
- source_word: אֶל אֶרֶץ
  chosen: was in a land
  alternatives:
  - toward a land
  - to a land
  lexicon: HALOT
  rationale: Although אֶל often means 'to/toward,' in poetic usage it can mark relation
    or orientation. Given the verbless/poetic structure, rendering the phrase idiomatically
    as 'was in a land' communicates the sense of location and possession of fertile
    territory.
- source_word: דָּגָן
  chosen: grain
  alternatives:
  - corn
  lexicon: HALOT
  rationale: דגן is a general term for grain/cereal produce. 'Grain' is accurate modern
    English; 'corn' would be misleading for many readers.
- source_word: תִּירוֹשׁ
  chosen: new wine
  alternatives:
  - wine
  - fresh wine
  lexicon: HALOT
  rationale: תירוש commonly refers to fresh or new wine, not generic wine in every
    context. 'New wine' preserves the agricultural abundance imagery.
- source_word: אַף
  chosen: even
  alternatives:
  - also
  - indeed
  lexicon: HALOT
  rationale: 'אַף adds emphasis: not only the land but even the heavens contribute
    blessing. ''Even'' captures that climactic force.'
- source_word: שָׁמָיו
  chosen: his heavens
  alternatives:
  - the heavens above him
  - his skies
  lexicon: HALOT
  rationale: The 3ms suffix is retained. 'His heavens' is slightly unusual but reflects
    the Hebrew possessive and poetic style; it likely refers to the heavens belonging
    to or over Israel/Jacob.
- source_word: יַעַרְפוּ
  chosen: dripped
  alternatives:
  - dropped
  - distilled
  lexicon: HALOT
  rationale: The verb ערף in this stem is used of dripping or distilling, especially
    in poetic descriptions of rain/dew. 'Dripped' is vivid and natural.
- source_word: טָל
  chosen: dew
  lexicon: HALOT
  rationale: Straightforward lexical rendering; dew is a standard image of divine
    blessing and agricultural fertility.
