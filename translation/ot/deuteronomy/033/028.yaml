theological_decisions:
- issue: Interpretation of עֵין יַעֲקֹב
  chosen_reading: Rendered as 'Jacob’s fountain'
  alternative_readings:
  - Rendered as 'the eye of Jacob'
  rationale: This is primarily a lexical-poetic decision rather than a doctrinal one.
    The fertility context ('land of grain and new wine,' 'heavens dripped dew') favors
    the sense 'fountain/spring' over the anatomical 'eye.' The translation preserves
    the abundance imagery without importing extra theological claims.
  doctrine_reference: Translation philosophy §1, §3
- issue: Force of בָּדָד
  chosen_reading: Rendered as secure separateness ('alone') rather than isolation
    in a negative sense
  alternative_readings:
  - by itself
  - apart
  rationale: The blessing context indicates peaceful, distinct security under divine
    favor, not abandonment. The wording preserves the text's tension and avoids over-interpretation.
  doctrine_reference: Translation philosophy §3
