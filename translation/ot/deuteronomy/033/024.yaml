id: DEU.33.24
reference: Deuteronomy 33:24
source:
  edition: WLC
  text: וּ/לְ/אָשֵׁ֣ר אָמַ֔ר בָּר֥וּךְ מִ/בָּנִ֖ים אָשֵׁ֑ר יְהִ֤י רְצוּי֙ אֶחָ֔י/ו
    וְ/טֹבֵ֥ל בַּ/שֶּׁ֖מֶן רַגְלֽ/וֹ׃
translation:
  text: 'And of Asher he said: “Most blessed among sons is Asher; may he be favored
    by his brothers, and may he dip his foot in oil.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Blessed above sons is Asher.” The Hebrew comparison may be read as comparative
      or superlative.
    reason: lexical_alternative
  - marker: b
    text: “His brothers” likely refers to the other tribes of Israel.
    reason: cultural_note
  - marker: c
    text: The image “dip his foot in oil” likely conveys abundance or prosperity,
      but the Hebrew is left literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְאָשֵׁר
  chosen: And of Asher
  alternatives:
  - And for Asher
  - And concerning Asher
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition introduce the next tribal blessing.
    'Of Asher' is idiomatic in English in this blessing formula and matches the discourse
    structure of the surrounding verses.
- source_word: אָמַר
  chosen: he said
  alternatives:
  - he declared
  lexicon: HALOT
  rationale: Standard narrative/reporting verb in Moses' blessing formula. 'He said'
    is the plain sense and keeps the formal cadence.
- source_word: בָּרוּךְ מִבָּנִים
  chosen: Most blessed among sons
  alternatives:
  - Blessed above sons
  - Blessed more than sons
  - Blessed among children
  lexicon: HALOT
  rationale: The construction expresses comparison or superlative force. 'Most blessed
    among sons' communicates that Asher is especially blessed relative to the sons/tribes.
    'Sons' is retained as gender-accurate and reflects the Hebrew more closely than
    'children'.
- source_word: אָשֵׁר
  chosen: is Asher
  alternatives:
  - Asher
  lexicon: HALOT
  rationale: Repeating the tribal name in English preserves the emphatic apposition
    of the Hebrew poetic line.
- source_word: יְהִי
  chosen: may he be
  alternatives:
  - let him be
  lexicon: HALOT
  rationale: 'Jussive nuance in a blessing context is best rendered as a wish-prayer:
    ''may he be.'''
- source_word: רְצוּי
  chosen: favored
  alternatives:
  - acceptable
  - pleasing
  - beloved
  lexicon: HALOT
  rationale: The adjective denotes being received with favor or accepted. 'Favored'
    is natural modern English and fits the relational context with his brothers.
- source_word: אֶחָיו
  chosen: his brothers
  alternatives:
  - his kin
  - his brothers and sisters
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine plural with tribal/familial reference.
    Per gender-accurate policy, 'brothers' is retained; in context it refers to the
    fellow tribes descended from Jacob.
- source_word: וְטֹבֵל
  chosen: and may he dip
  alternatives:
  - and let him dip
  - and dipping
  lexicon: HALOT
  rationale: The participial form in poetic parallelism carries a jussive-like sense
    coordinated with the previous wish. Rendering it as 'may he dip' preserves the
    blessing force and parallel structure.
- source_word: בַּשֶּׁמֶן
  chosen: in oil
  alternatives:
  - in olive oil
  - in rich oil
  lexicon: HALOT
  rationale: שׁמן commonly means oil, often olive oil in Israelite context, but the
    text does not specify olive explicitly. 'Oil' preserves the literal image and
    possible connotations of abundance.
- source_word: רַגְלוֹ
  chosen: his foot
  alternatives:
  - his feet
  lexicon: HALOT
  rationale: The Hebrew singular with 3ms suffix is best kept as singular. The image
    likely conveys abundance or prosperity, but the translation should preserve the
    concrete metaphor rather than interpret it.
