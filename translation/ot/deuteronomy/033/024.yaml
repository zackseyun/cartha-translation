theological_decisions:
- issue: Interpretation of the blessing image 'dip his foot in oil'
  chosen_reading: Retain the literal metaphor of abundance/prosperity without specifying
    a symbolic meaning in the main text.
  alternative_readings:
  - A reference to agricultural richness, especially olive oil
  - A figurative reference to security, luxury, or territorial prosperity
  rationale: The Hebrew image is vivid but not fully explicit. To preserve theological
    and poetic tension, the main text keeps the literal metaphor and leaves fuller
    interpretation to readers and notes rather than importing a doctrinally loaded
    explanation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
