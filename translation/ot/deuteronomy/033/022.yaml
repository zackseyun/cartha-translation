id: DEU.33.22
reference: Deuteronomy 33:22
source:
  edition: WLC
  text: וּ/לְ/דָ֣ן אָמַ֔ר דָּ֖ן גּ֣וּר אַרְיֵ֑ה יְזַנֵּ֖ק מִן הַ/בָּשָֽׁן־׃
translation:
  text: 'And of Dan he said: “Dan is a lion’s cub; he leaps out from Bashan.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “he springs forth from Bashan.” The Hebrew verb suggests a sudden leaping
      movement.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְדָן
  chosen: And of Dan
  alternatives:
  - And to Dan
  - Concerning Dan
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition introduce the next tribal blessing.
    In this formulaic context, English idiom is best served by 'And of Dan,' matching
    the blessing sequence while preserving the sense 'with regard to Dan.'
- source_word: אָמַר
  chosen: he said
  alternatives:
  - he declared
  lexicon: HALOT
  rationale: Standard rendering of אמר in narrative/reporting speech. 'He said' keeps
    the formula simple and transparent.
- source_word: דָּן
  chosen: Dan
  rationale: Proper tribal/personal name, transliterated according to the translation
    philosophy.
- source_word: גּוּר אַרְיֵה
  chosen: a lion’s cub
  alternatives:
  - a lion whelp
  - a young lion
  lexicon: HALOT
  rationale: The construct phrase denotes a young lion. 'Lion’s cub' is natural modern
    English and preserves the image without archaic diction. 'Young lion' is possible,
    but 'cub' better reflects the age nuance of גּוּר.
- source_word: יְזַנֵּק
  chosen: he leaps out
  alternatives:
  - he springs forth
  - he pounces
  - he jumps
  lexicon: HALOT
  rationale: The verb conveys a sudden springing or darting movement. 'Leaps out'
    is vivid, readable modern English, and fits the lion imagery. 'Springs forth'
    is slightly more formal; 'pounces' is more interpretive than the Hebrew requires.
- source_word: מִן הַבָּשָׁן
  chosen: from Bashan
  alternatives:
  - out of Bashan
  lexicon: HALOT
  rationale: מן marks source/origin. 'From Bashan' is straightforward and idiomatic.
    Bashan is a place name and is transliterated.
