id: DEU.33.2
reference: Deuteronomy 33:2
source:
  edition: WLC
  text: וַ/יֹּאמַ֗ר יְהוָ֞ה מִ/סִּינַ֥י בָּא֙ וְ/זָרַ֤ח מִ/שֵּׂעִיר֙ לָ֔/מוֹ הוֹפִ֨יעַ֙
    מֵ/הַ֣ר פָּארָ֔ן וְ/אָתָ֖ה מֵ/רִבְבֹ֣ת קֹ֑דֶשׁ מִֽ/ימִינ֕/וֹ אשדת לָֽ/מוֹ׃
translation:
  text: 'And he said: “The LORD came from Sinai and dawned from Seir upon them; he
    shone forth from Mount Paran, and came from myriads of holiness; from his right
    hand came a fiery law for them.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from myriads of holy ones.' The Hebrew phrase may refer to holy attendants
      rather than abstract holiness.
    reason: alternative_reading
  - marker: b
    text: Hebrew אשדת is difficult and uncertain; traditionally rendered 'a fiery
      law,' but it may also denote fiery flashes or fire proceeding from his right
      hand.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: מִסִּינַי בָּא
  chosen: came from Sinai
  alternatives:
  - came from Sinai forth
  lexicon: HALOT
  rationale: בּוֹא in the qatal here describes YHWH's advent/appearance. 'Came from
    Sinai' is natural English and preserves the directional force of מִן.
- source_word: וְזָרַח מִשֵּׂעִיר לָמוֹ
  chosen: and dawned from Seir upon them
  alternatives:
  - and rose from Seir for them
  - and shone from Seir upon them
  lexicon: HALOT
  rationale: זָרַח commonly refers to the rising/shining of light, especially like
    the sun. 'Dawned' preserves the poetic imagery better than a flatter 'rose.' לָמוֹ
    is rendered 'upon them' here to fit the theophanic imagery of light breaking over
    the people.
- source_word: הוֹפִיעַ
  chosen: he shone forth
  alternatives:
  - he appeared in splendor
  - he beamed forth
  lexicon: HALOT
  rationale: The hiphil of יפע carries the sense of shining forth or appearing radiantly.
    'Shone forth' keeps both the visual and the poetic force.
- source_word: מֵהַר פָּארָן
  chosen: from Mount Paran
  alternatives:
  - from the hill country of Paran
  lexicon: HALOT
  rationale: הַר is straightforwardly 'mountain/mount.' 'Mount Paran' is the conventional
    and clear rendering for the place name construction.
- source_word: וְאָתָה
  chosen: and came
  alternatives:
  - and advanced
  - and arrived
  lexicon: HALOT
  rationale: The verb denotes coming/approaching. 'Came' maintains the parallel sequence
    of divine advent verbs in the verse.
- source_word: מֵרִבְבֹת קֹדֶשׁ
  chosen: from myriads of holiness
  alternatives:
  - from myriads of holy ones
  - from ten thousands of holy ones
  - from holy myriads
  lexicon: HALOT
  rationale: The Hebrew construction is difficult. קֹדֶשׁ can denote holiness or,
    by implication, holy beings/holy ones. Because the phrase is ambiguous and the
    following clause is also textually difficult, the main text keeps a more formally
    transparent rendering, while a footnote preserves the common interpretive alternative
    'myriads of holy ones.'
- source_word: מִימִינוֹ
  chosen: from his right hand
  alternatives:
  - at his right hand
  lexicon: HALOT
  rationale: The preposition מִן most naturally means 'from.' 'From his right hand'
    fits the imagery of what proceeds from YHWH in the next phrase.
- source_word: אשדת
  chosen: a fiery law
  alternatives:
  - fire of law
  - flashing fire
  - firebrand
  lexicon: HALOT
  rationale: This is a notoriously difficult form. The traditional Jewish/English
    rendering understands it as related to 'fire' plus 'law/decree' and fits the Sinai
    context. Because the form is uncertain, the choice is retained in the main text
    for readability and tradition-consciousness, with lexical uncertainty documented
    and alternatives footnoted.
- source_word: לָמוֹ
  chosen: for them
  alternatives:
  - to them
  lexicon: HALOT
  rationale: The pronominal form indicates third person plural. 'For them' reads naturally
    in English and suits the sense of something given on Israel's behalf.
