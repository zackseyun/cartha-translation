theological_decisions:
- issue: Identity of the divine subject in a poetic theophany
  chosen_reading: Render the subject as the covenant God, 'the LORD,' without importing
    later christological interpretation into the translation.
  alternative_readings:
  - Some Christian readings see typological anticipation of later divine revelation.
  rationale: The verse is a Mosaic blessing describing YHWH's theophanic coming from
    Sinai/Seir/Paran. The translation should preserve the OT context and not embed
    later theological interpretation into the wording itself.
  doctrine_reference: Affirmations; Translation philosophy items 1 and 3
- issue: Interpretation of מֵרִבְבֹת קֹדֶשׁ
  chosen_reading: Keep an ambiguous main-text rendering ('myriads of holiness') and
    preserve 'myriads of holy ones' in a footnote.
  alternative_readings:
  - from myriads of holy ones
  - from holy myriads
  rationale: The Hebrew permits more than one construal, and the phrase has interpretive
    significance for whether the scene includes angelic attendants. Per the translation
    philosophy, genuine ambiguity should be preserved rather than over-resolved.
  doctrine_reference: Translation philosophy item 3
- issue: Interpretation of אשדת
  chosen_reading: Use 'a fiery law' in the main text, with a footnote noting lexical
    uncertainty.
  alternative_readings:
  - fire of law
  - flashing fire from his right hand
  rationale: The form is obscure and has generated multiple explanations. 'A fiery
    law' is the longstanding and contextually coherent rendering in a Sinai setting,
    but the uncertainty should remain auditable and visible.
  doctrine_reference: Translation philosophy items 1, 3, and 5
