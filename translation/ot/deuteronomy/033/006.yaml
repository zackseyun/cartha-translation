id: DEU.33.6
reference: Deuteronomy 33:6
source:
  edition: WLC
  text: יְחִ֥י רְאוּבֵ֖ן וְ/אַל יָמֹ֑ת וִ/יהִ֥י מְתָ֖י/ו מִסְפָּֽר־׃ס
translation:
  text: May Reuben live and not die, and may his men be few.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and may his men be numbered.' The Hebrew of the final clause is difficult
      and has also been understood as a prayer that Reuben not become insignificant
      or excluded from the tribal count.
    reason: alternative_reading
lexical_decisions:
- source_word: יְחִי
  chosen: May ... live
  alternatives:
  - Let ... live
  - May ... survive
  lexicon: HALOT
  rationale: Qal jussive of חיה expresses a wish/blessing. 'May ... live' preserves
    the volitional force in natural English.
- source_word: רְאוּבֵן
  chosen: Reuben
  rationale: Personal tribal name is transliterated by standard English convention,
    in keeping with the translation philosophy to transliterate names.
- source_word: וְ/אַל יָמֹת
  chosen: and not die
  alternatives:
  - and may he not die
  - and not perish
  lexicon: HALOT
  rationale: אַל with jussive conveys prohibition/negative wish. 'And not die' is
    concise English paired with the preceding jussive blessing. 'Perish' is possible
    but 'die' matches the plain lexical sense of מות.
- source_word: וִ/יהִי
  chosen: and may ... be
  alternatives:
  - and let ... be
  lexicon: HALOT
  rationale: A second jussive introduces another wish/blessing. Rendering with 'and
    may ... be' keeps the parallel structure.
- source_word: מְתָיו
  chosen: his men
  alternatives:
  - his people
  - his number
  - his dead
  lexicon: HALOT
  rationale: The noun is difficult and traditionally understood here as 'men' or 'people
    of the tribe,' likely from a sense related to persons/men rather than corpses
    in this blessing context. 'His men' fits the syntax with the following 'number/few'
    and avoids the implausible sense 'may his dead be a number.' Because the term
    is debated, alternatives are preserved in a footnote.
- source_word: מִסְפָּר
  chosen: few
  alternatives:
  - numbered
  - a number
  - countable
  lexicon: HALOT
  rationale: Literally 'number.' In this idiom the sense is commonly 'few in number'
    or 'not numerous.' English requires an idiomatic completion; 'be few' best conveys
    the likely sense in context, though the Hebrew is terse enough to allow other
    construals.
