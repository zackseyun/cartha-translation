theological_decisions:
- issue: Interpretation of the final clause וִיהִי מְתָיו מִסְפָּר
  chosen_reading: 'A modestly negative/realistic blessing: ''may his men be few,''
    i.e., may Reuben survive though small in number.'
  alternative_readings:
  - '''yet let his men be numbered'' (i.e., not excluded from the census/tribal roll)'
  - '''though his men are few'''
  - text-critical proposals adding לא/לו to yield 'and let his men not be few'
  rationale: The Masoretic Text as given is terse and difficult. The most straightforward
    reading of מִסְפָּר with היה is that Reuben's men are 'few/numberable.' This fits
    the tribe-blessing context as a prayer for continued existence despite diminished
    size. More favorable readings often depend on emendation or a less natural sense
    of מִסְפָּר. To preserve the ambiguity without overresolving it, the main text
    follows the MT's likely sense and a footnote records the principal alternative.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
