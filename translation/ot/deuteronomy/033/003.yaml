theological_decisions:
- issue: Referent and pronoun shifts in the poem
  chosen_reading: 'Retain the Hebrew''s poetic shift: ''he loves ... his holy ones
    ... in your hand ... at your feet ... your words.'''
  alternative_readings:
  - Regularize all pronouns to third person
  - Regularize all pronouns to second person
  rationale: The Hebrew text appears to shift person within the poetic blessing. Smoothing
    the pronouns would make the verse easier but would suppress a significant feature
    of the source text. Preserving the tension aligns with the translation philosophy
    of not resolving genuine ambiguity unnecessarily.
  doctrine_reference: Translation philosophy §3
- issue: Meaning of 'holy ones'
  chosen_reading: Render as 'holy ones' without specifying angels or Israel alone
  alternative_readings:
  - saints
  - angels
  - Israel's holy people
  rationale: The term can be understood in more than one way in context, and the verse
    itself does not force a narrower identification. The translation therefore preserves
    the broader wording rather than importing a specific theological interpretation.
  doctrine_reference: Translation philosophy §3
