id: DEU.33.3
reference: Deuteronomy 33:3
source:
  edition: WLC
  text: אַ֚ף חֹבֵ֣ב עַמִּ֔ים כָּל קְדֹשָׁ֖י/ו בְּ/יָדֶ֑/ךָ וְ/הֵם֙ תֻּכּ֣וּ לְ/רַגְלֶ֔/ךָ
    יִשָּׂ֖א מִ/דַּבְּרֹתֶֽי/ךָ־׃
translation:
  text: Indeed, he loves the peoples; all his holy ones are in your hand, and they
    sit down at your feet; each receives your words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'they sit down' is uncertain; the verb has also been understood as
      'they were gathered,' 'they crouch,' or even 'they were struck down.'
    reason: alternative_reading
  - marker: b
    text: Or 'each takes up from your words' / 'bears your sayings'; the Hebrew expression
      is rare and difficult.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף
  chosen: Indeed
  alternatives:
  - Surely
  - 'Yes'
  - Even
  lexicon: HALOT
  rationale: Here אַף functions as an asseverative/emphatic particle introducing or
    reinforcing the statement, not primarily as the additive 'also/even.' 'Indeed'
    conveys the emphatic force in natural English.
- source_word: חֹבֵב
  chosen: loves
  alternatives:
  - is one who loves
  - cherishes
  lexicon: HALOT
  rationale: The participle denotes ongoing disposition. 'Loves' is the most natural
    English rendering and preserves the relational sense without over-paraphrasing.
- source_word: עַמִּים
  chosen: the peoples
  alternatives:
  - peoples
  - nations
  lexicon: HALOT
  rationale: The plural עמים commonly means 'peoples' or 'nations.' 'The peoples'
    preserves the plural collective sense and avoids prematurely narrowing the reference
    to Gentile nations alone.
- source_word: כָּל קְדֹשָׁיו
  chosen: all his holy ones
  alternatives:
  - all his saints
  - all his consecrated ones
  lexicon: HALOT
  rationale: קְדֹשִׁים refers to those set apart as holy. 'Holy ones' is transparent
    and avoids importing later ecclesiastical connotations of 'saints.' The suffix
    is best taken as 3ms, 'his.'
- source_word: בְּיָדֶךָ
  chosen: in your hand
  alternatives:
  - in your power
  - under your hand
  lexicon: HALOT
  rationale: The idiom literally reads 'in your hand.' Because the verse shifts between
    third- and second-person reference in poetic address, the literal rendering best
    preserves the Hebrew texture while remaining intelligible.
- source_word: תֻּכּוּ
  chosen: they sit down
  alternatives:
  - they were gathered
  - they were struck down
  - they crouch
  lexicon: HALOT
  rationale: This form is notoriously difficult and has been understood in several
    ways. In context with 'at your feet' and the following reception of words, a sense
    like 'sit/crouch down' best fits the poetic scene of disciples or attendants before
    the divine speaker. Because of the uncertainty, alternatives are preserved in
    a footnote.
- source_word: לְרַגְלֶךָ
  chosen: at your feet
  alternatives:
  - to your feet
  - by your foot
  lexicon: HALOT
  rationale: The prepositional phrase is idiomatically rendered 'at your feet,' fitting
    both posture and submission/listening imagery in English.
- source_word: יִשָּׂא
  chosen: receives
  alternatives:
  - lifts up
  - bears
  - takes up
  lexicon: HALOT
  rationale: Although the verb's basic sense is 'lift/carry,' in this context with
    'your words' an idiomatic sense of taking up or receiving is most coherent in
    English. This avoids a wooden rendering that obscures the likely sense.
- source_word: מִדַּבְּרֹתֶיךָ
  chosen: your words
  alternatives:
  - your sayings
  - your utterances
  - from your words
  lexicon: HALOT
  rationale: The noun is rare and difficult, likely related to speech/utterance. 'Your
    words' is the clearest natural rendering. The prefixed מ may be partitive ('from
    your words') or lexicalized in the form; English smooths this to 'your words'
    while preserving the speech sense.
