id: DEU.33.5
reference: Deuteronomy 33:5
source:
  edition: WLC
  text: וַ/יְהִ֥י בִ/ישֻׁר֖וּן מֶ֑לֶךְ בְּ/הִתְאַסֵּף֙ רָ֣אשֵׁי עָ֔ם יַ֖חַד שִׁבְטֵ֥י
    יִשְׂרָאֵֽל׃
translation:
  text: And he became king in Jeshurun, when the heads of the people gathered together,
    the tribes of Israel as one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And the LORD became king in Jeshurun'; others understand, 'And he [Moses]
      became king in Jeshurun.' The Hebrew does not explicitly identify the subject.
    reason: alternative_reading
  - marker: b
    text: '''Jeshurun'' is a poetic name for Israel.'
    reason: cultural_note
  - marker: c
    text: Or, 'the heads of the people assembled together, the tribes of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And he became
  alternatives:
  - And there was
  - And he was
  lexicon: HALOT
  rationale: The waw-consecutive form of היה can mean 'and he was/came to be.' Here,
    with the predicate 'king,' 'became' best conveys the onset or manifestation of
    kingship in context, while remaining natural English.
- source_word: בִישֻׁרוּן
  chosen: in Jeshurun
  alternatives:
  - among Jeshurun
  lexicon: HALOT
  rationale: Jeshurun is a poetic name for Israel and should be transliterated as
    a proper name per translation philosophy. The preposition ב is rendered 'in' as
    the most straightforward locative/corporate sense.
- source_word: מֶלֶךְ
  chosen: king
  lexicon: HALOT
  rationale: Standard rendering of the noun. The verse does not specify the referent
    explicitly in the noun itself, so the simple title 'king' is retained.
- source_word: בְּהִתְאַסֵּף
  chosen: when ... gathered
  alternatives:
  - at the gathering of
  - in the assembling of
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב commonly introduces a temporal
    clause, so 'when ... gathered' gives clear English while preserving the temporal
    force.
- source_word: רָאשֵׁי עָם
  chosen: the heads of the people
  alternatives:
  - the chiefs of the people
  - the leaders of the people
  lexicon: HALOT
  rationale: Literally 'heads of the people.' This idiom refers to leaders/chiefs.
    'Heads' preserves the Hebrew imagery; the leadership sense is clear from context.
- source_word: יַחַד
  chosen: together
  alternatives:
  - as one
  - altogether
  lexicon: HALOT
  rationale: The adverb denotes unity or togetherness. 'Together' fits the clause
    naturally; the corporate-unity nuance is preserved further by the appositional
    phrase 'the tribes of Israel as one' in English.
- source_word: שִׁבְטֵי יִשְׂרָאֵל
  chosen: the tribes of Israel as one
  alternatives:
  - together with the tribes of Israel
  - the tribes of Israel together
  lexicon: HALOT
  rationale: The Hebrew sequence after יַחַד is compressed. Rendering it appositionally
    as 'the tribes of Israel as one' captures the sense that the tribal units are
    assembled in unity, rather than leaving an awkwardly literal English phrase.
