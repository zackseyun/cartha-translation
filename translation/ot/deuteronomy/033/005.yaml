theological_decisions:
- issue: Referent of 'he' and 'king'
  chosen_reading: The main text leaves the subject as 'he' without identifying him
    explicitly.
  alternative_readings:
  - the LORD became king in Jeshurun
  - Moses became king in Jeshurun
  rationale: The Hebrew text does not name the subject explicitly, and interpreters
    differ whether the referent is the LORD or Moses. To preserve the text's ambiguity
    rather than resolve it interpretively, the translation retains the pronoun and
    generic title. This follows the doctrine's principle of preserving theological
    tension where the source is genuinely ambiguous.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Corporate unity of Israel
  chosen_reading: The gathering is rendered to emphasize unified assembly without
    over-specifying political structure.
  alternative_readings:
  - a formal enthronement scene
  - a covenant assembly scene
  rationale: The verse depicts a united gathering of Israel's leaders and tribes,
    but the exact political or liturgical setting is not explicit. The translation
    reflects the assembly and unity without importing a more developed theory of kingship
    or covenant ceremony than the text states.
