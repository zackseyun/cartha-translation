id: DEU.33.7
reference: Deuteronomy 33:7
source:
  edition: WLC
  text: וְ/זֹ֣את לִֽ/יהוּדָה֮ וַ/יֹּאמַר֒ שְׁמַ֤ע יְהוָה֙ ק֣וֹל יְהוּדָ֔ה וְ/אֶל עַמּ֖/וֹ תְּבִיאֶ֑/נּוּ יָדָי/ו֙ רָ֣ב ל֔/וֹ וְ/עֵ֥זֶר מִ/צָּרָ֖י/ו תִּהְיֶֽה־׃ס
translation:
  text: 'And this he said for Judah: “Hear, Yahweh, the voice of Judah, and bring him to his people. Let his hands strive for him, and be a help against his adversaries.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'May his hands be sufficient for him.' The Hebrew clause is difficult and has been understood in more than one way.
    reason: alternative_reading
lexical_decisions:
- source_word: וְזֹאת
  chosen: And this
  alternatives:
  - And this is
  - Now this
  lexicon: HALOT
  rationale: Introduces the next tribal blessing succinctly. The conjunction plus demonstrative functions as a discourse transition.
- source_word: לִיהוּדָה
  chosen: for Judah
  alternatives:
  - concerning Judah
  - to Judah
  lexicon: HALOT
  rationale: The preposition marks reference/topic in the blessing formula; 'for Judah' is natural English in context.
- source_word: וַיֹּאמַר
  chosen: he said
  alternatives:
  - and he said
  lexicon: HALOT
  rationale: Narrative wayyiqtol introducing Moses' speech. English can omit the repeated conjunction for smoother style while retaining the sense in the opening 'And this.'
- source_word: שְׁמַע יְהוָה
  chosen: Hear, LORD
  alternatives:
  - Listen, O LORD
  lexicon: HALOT
  rationale: Imperative prayer addressed to YHWH. Per doctrine, יְהוָה is rendered 'the LORD'; in direct address, 'LORD' is idiomatic.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name. In vocative position, English idiom omits the article.
- source_word: קוֹל יְהוּדָה
  chosen: the voice of Judah
  alternatives:
  - Judah's voice
  - the cry of Judah
  lexicon: HALOT
  rationale: קוֹל literally means 'voice/sound'; in a prayer context it can imply cry, but 'voice' preserves the Hebrew image without over-interpreting.
- source_word: וְאֶל עַמּוֹ תְּבִיאֶנּוּ
  chosen: and bring him to his people
  alternatives:
  - and bring him back to his people
  - and lead him to his people
  lexicon: HALOT
  rationale: The Hiphil of בוא means 'bring/lead in.' 'Bring him to his people' preserves the Hebrew while leaving open whether the sense is reunion after battle or incorporation among the tribes.
- source_word: יָדָיו רָב לוֹ
  chosen: Let his hands contend for him
  alternatives:
  - May his hands be sufficient for him
  - His hands have contended for him
  lexicon: HALOT
  rationale: This clause is difficult. The consonantal text allows understanding רָב from ריב/רב in the sense of striving/contending, yielding a coherent parallel with the following plea for help against enemies. This avoids a less natural reading 'his hands are enough for him' while staying close to the Hebrew.
- source_word: וְעֵזֶר מִצָּרָיו תִּהְיֶה
  chosen: and be a help against his adversaries
  alternatives:
  - and may you be a help from his adversaries
  - and be his help against his foes
  lexicon: HALOT
  rationale: 'The preposition מִן after ''help'' is best taken in a separative/adversative sense: help against or deliverance from enemies. ''Adversaries'' reflects the root צרר/צר in context.'
