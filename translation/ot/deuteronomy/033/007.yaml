theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - the LORD
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpretation of the difficult clause יָדָיו רָב לוֹ
  chosen_reading: Let his hands contend for him
  alternative_readings:
  - May his hands be sufficient for him
  - Though his hands are few for him
  rationale: The Hebrew is syntactically compressed and has generated multiple interpretations. The chosen rendering fits the military-prayer context and parallels the request for divine help against enemies, while avoiding importing a more speculative textual emendation into the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: preserve theological tension rather than resolve it'
