theological_decisions:
- issue: Interpretation of the blessing imagery
  chosen_reading: The verse promises durable security and sustaining strength for
    the tribe/person addressed.
  alternative_readings:
  - The verse describes sturdy footwear for difficult terrain and continued vigor.
  - The final clause may refer to rest or ease proportionate to one's days rather
    than strength.
  rationale: No major doctrinal issue is at stake, but the imagery is debated. The
    chosen reading best accounts for 'iron and bronze' with 'bars' and for the blessing
    context in Moses' final words.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it; ambiguity preserved in footnotes where significant.'
