id: DEU.33.25
reference: Deuteronomy 33:25
source:
  edition: WLC
  text: בַּרְזֶ֥ל וּ/נְחֹ֖שֶׁת מִנְעָלֶ֑י/ךָ וּ/כְ/יָמֶ֖י/ךָ דָּבְאֶֽ/ךָ׃
translation:
  text: Your bars shall be iron and bronze, and as your days, so shall your strength
    be.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Your sandals/shoes shall be iron and bronze.' The Hebrew noun can refer
      to footwear, though many understand it here as bars or bolts in view of the
      metal imagery and the context of security.
    reason: lexical_alternative
  - marker: b
    text: Or 'so shall your rest/security be.' The final Hebrew term is rare and uncertain;
      'strength' is a traditional rendering that fits the blessing context.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּרְזֶל
  chosen: iron
  alternatives:
  - ironwork
  lexicon: HALOT
  rationale: Standard sense of the metal; paired with נְחֹשֶׁת in a material description.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: In biblical contexts נְחֹשֶׁת often denotes bronze/copper broadly. 'Bronze'
    is the more idiomatic pairing with 'iron' in English and fits traditional material
    imagery.
- source_word: מִנְעָלֶיךָ
  chosen: your bars
  alternatives:
  - your sandals
  - your shoes
  - your locks
  lexicon: HALOT
  rationale: Though the noun can denote a sandal/shoe, in this blessing context 'iron
    and bronze' more naturally describes defensive bars/bolts. This yields coherent
    imagery of security for Asher's territory. Because the lexical sense is debated,
    alternatives are preserved in a footnote.
- source_word: וּכְיָמֶיךָ
  chosen: and as your days
  alternatives:
  - and according to your days
  lexicon: HALOT
  rationale: 'כ marks comparison: ''as/according to.'' The idiom introduces a proportional
    statement linking lifespan or daily course with what follows.'
- source_word: דָּבְאֶךָ
  chosen: your strength
  alternatives:
  - your rest
  - your security
  - your sorrow
  lexicon: HALOT
  rationale: This rare term is difficult. Traditional and contextually fitting sense
    is 'strength' or sustaining power, especially in a blessing promising enduring
    support. Because the lexical value is uncertain, alternatives are preserved in
    a footnote.
