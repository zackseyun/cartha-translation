id: DEU.33.27
reference: Deuteronomy 33:27
source:
  edition: WLC
  text: מְעֹנָה֙ אֱלֹ֣הֵי קֶ֔דֶם וּ/מִ/תַּ֖חַת זְרֹעֹ֣ת עוֹלָ֑ם וַ/יְגָ֧רֶשׁ מִ/פָּנֶ֛י/ךָ
    אוֹיֵ֖ב וַ/יֹּ֥אמֶר הַשְׁמֵֽד׃
translation:
  text: The God of old is a dwelling place, and underneath are everlasting arms. He
    drove out the enemy before you, and said, ‘Destroy!’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “The eternal God is your refuge.” The Hebrew can be understood more
      interpretively in that traditional sense, though the more direct wording is
      “The God of old is a dwelling place.”
    reason: alternative_reading
lexical_decisions:
- source_word: מְעֹנָה
  chosen: dwelling place
  alternatives:
  - refuge
  - habitation
  lexicon: HALOT
  rationale: The noun denotes a habitation or sheltering place. 'Dwelling place' preserves
    the image without overinterpreting it as purely metaphorical 'refuge,' though
    that sense is contextually present.
- source_word: אֱלֹהֵי קֶדֶם
  chosen: The God of old
  alternatives:
  - the eternal God
  - the ancient God
  lexicon: HALOT
  rationale: קֶדֶם can denote ancient time, former days, or what is before/east. Here
    the temporal sense fits best. 'The God of old' reflects the Hebrew more directly
    than the traditional 'eternal God,' while still conveying venerable antiquity.
    Because 'eternal God' is a longstanding viable interpretation, it is preserved
    in a footnote.
- source_word: וּמִתַּחַת
  chosen: and underneath
  alternatives:
  - and beneath
  - from underneath
  lexicon: HALOT
  rationale: The prepositional phrase is spatial. 'Underneath' is natural English
    and preserves the poetic parallel with the preceding clause.
- source_word: זְרֹעֹת עוֹלָם
  chosen: everlasting arms
  alternatives:
  - eternal arms
  - arms of old
  lexicon: HALOT
  rationale: זְרֹעֹת is literally 'arms,' a metaphor for strength/support. עוֹלָם
    here most naturally carries the sense of enduring perpetuity. 'Everlasting arms'
    is both accurate and idiomatic.
- source_word: וַיְגָרֶשׁ
  chosen: He drove out
  alternatives:
  - he thrust out
  - he expelled
  lexicon: HALOT
  rationale: The verb גרש commonly means to drive out or expel. 'Drove out' is clear,
    forceful, and fits military context.
- source_word: מִפָּנֶיךָ
  chosen: before you
  alternatives:
  - from before you
  - ahead of you
  lexicon: HALOT
  rationale: Literally 'from your face/presence,' but in context it means from before
    Israel's advance. 'Before you' is the most natural equivalent.
- source_word: אוֹיֵב
  chosen: the enemy
  alternatives:
  - enemy
  lexicon: HALOT
  rationale: Although formally singular, the noun can function collectively. 'The
    enemy' preserves the singular form while allowing collective force.
- source_word: וַיֹּאמֶר
  chosen: and said
  alternatives:
  - and he said
  - saying
  lexicon: HALOT
  rationale: Simple narrative continuation. The subject is best understood as God
    from the preceding clause.
- source_word: הַשְׁמֵד
  chosen: Destroy!
  alternatives:
  - Annihilate!
  - Exterminate!
  lexicon: HALOT
  rationale: The Hiphil imperative of שמד calls for complete destruction. 'Destroy!'
    is strong and idiomatic without importing more specificity than the Hebrew itself.
