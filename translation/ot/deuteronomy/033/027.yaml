theological_decisions:
- issue: Whether קֶדֶם in אֱלֹהֵי קֶדֶם should be rendered temporally as 'of old'
    or theologically as 'eternal'
  chosen_reading: The God of old
  alternative_readings:
  - the eternal God
  - the ancient God
  rationale: The Hebrew term primarily denotes what is ancient or from former time;
    while 'eternal' is a traditional interpretive rendering, the source text more
    directly supports 'of old/ancient.' To preserve the theological and translational
    tension, the traditional alternative is retained in a footnote rather than elevated
    to the main text.
  doctrine_reference: Translation philosophy §1, §3
