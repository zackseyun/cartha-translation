theological_decisions:
- issue: Referent and force of אֵל in a poetic comparison
  chosen_reading: common divine title rendered 'God'
  alternative_readings:
  - proper name 'El'
  - title 'the Mighty One'
  rationale: The verse praises Israel's God in incomparable terms. Rendering אֵל as
    'God' is the most natural English equivalent here and avoids implying a separate
    named deity while preserving monotheistic force.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; translate titles, transliterate names.'
