id: DEU.33.26
reference: Deuteronomy 33:26
source:
  edition: WLC
  text: אֵ֥ין כָּ/אֵ֖ל יְשֻׁר֑וּן רֹכֵ֤ב שָׁמַ֨יִם֙ בְ/עֶזְרֶ֔/ךָ וּ/בְ/גַאֲוָת֖/וֹ
    שְׁחָקִֽים׃
translation:
  text: There is none like God, O Jeshurun, who rides through the heavens to help
    you, and in his majesty through the skies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jeshurun is a poetic name for Israel.
    reason: cultural_note
  - marker: b
    text: Or 'for your help.'
    reason: lexical_alternative
  - marker: c
    text: Or 'through the clouds.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין
  chosen: There is none
  alternatives:
  - There is no one
  - None is
  lexicon: HALOT
  rationale: Existential negative introducing an absolute comparison; 'There is none'
    is idiomatic and preserves the elevated poetic force.
- source_word: כָּאֵל
  chosen: like God
  alternatives:
  - like the Mighty One
  - like El
  lexicon: HALOT
  rationale: The prefixed כ marks comparison, and אֵל here functions as the common
    divine designation rather than a proper name to be transliterated. 'Like God'
    communicates the sense naturally in English.
- source_word: יְשֻׁרוּן
  chosen: Jeshurun
  alternatives:
  - upright one
  lexicon: HALOT
  rationale: This is a poetic proper name for Israel, so by the translation philosophy
    names are transliterated rather than translated. The vocative force is reflected
    by 'O Jeshurun' in English punctuation.
- source_word: רֹכֵב
  chosen: who rides
  alternatives:
  - rider of
  - riding
  lexicon: HALOT
  rationale: The participle describes God's characteristic action. Rendering it as
    a relative clause gives clear English while preserving the ongoing, exalted portrayal.
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the skies
  lexicon: HALOT
  rationale: The plural form is well represented by 'the heavens' in elevated poetic
    context, and it pairs well with the following poetic synonym 'skies.'
- source_word: בְעֶזְרֶךָ
  chosen: to help you
  alternatives:
  - for your help
  - in your help
  - as your help
  lexicon: HALOT
  rationale: The preposition ב with עֵזֶר can be rendered woodenly as 'for your help,'
    but in context it expresses purpose/benefit. 'To help you' is the clearest optimal-equivalence
    rendering.
- source_word: וּבְגַאֲוָתוֹ
  chosen: and in his majesty
  alternatives:
  - and in his exaltation
  - and in his pride
  lexicon: HALOT
  rationale: גַּאֲוָה can denote exaltation or majesty when used of God; 'pride' would
    mislead in English. 'Majesty' fits the divine and poetic context.
- source_word: שְׁחָקִים
  chosen: the skies
  alternatives:
  - the clouds
  - the heights
  lexicon: HALOT
  rationale: A poetic term for the upper heavens/sky realm. 'The skies' preserves
    the parallelism with 'the heavens' without over-specifying meteorological clouds.
