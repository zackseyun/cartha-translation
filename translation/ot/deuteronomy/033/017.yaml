theological_decisions:
- issue: Referent of the animal imagery in Joseph's blessing
  chosen_reading: The verse uses bovine imagery metaphorically for Joseph's strength,
    culminating in the military fruitfulness of Ephraim and Manasseh.
  alternative_readings:
  - The 'firstborn bull' could be taken more specifically of Ephraim as preeminent
    among Joseph's descendants.
  rationale: The Hebrew blessing addresses Joseph, then identifies the imagery with
    Ephraim and Manasseh in the final line. The translation keeps the metaphor without
    over-specifying the referent in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
