id: DEU.33.17
reference: Deuteronomy 33:17
source:
  edition: WLC
  text: בְּכ֨וֹר שׁוֹר֜/וֹ הָדָ֣ר ל֗/וֹ וְ/קַרְנֵ֤י רְאֵם֙ קַרְנָ֔י/ו בָּ/הֶ֗ם עַמִּ֛ים
    יְנַגַּ֥ח יַחְדָּ֖ו אַפְסֵי אָ֑רֶץ וְ/הֵם֙ רִבְב֣וֹת אֶפְרַ֔יִם וְ/הֵ֖ם אַלְפֵ֥י
    מְנַשֶּֽׁה־׃ס
translation:
  text: His firstborn bull has majesty, and his horns are the horns of a wild ox;
    with them he will gore peoples together to the ends of the earth. These are the
    myriads of Ephraim, and these are the thousands of Manasseh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the horns of a wild bull.' The Hebrew רְאֵם likely refers to a powerful
      wild bovine, traditionally rendered 'unicorn' in older English versions.
    reason: lexical_alternative
  - marker: b
    text: Or 'ten thousands of Ephraim.' The Hebrew רִבְבֹות denotes very large numbers
      and is contrasted with 'thousands of Manasseh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּכֹור
  chosen: firstborn
  alternatives:
  - firstling
  lexicon: HALOT
  rationale: The noun denotes the firstborn offspring. 'Firstborn' is the standard
    clear English equivalent and preserves the metaphorical force in the blessing
    over Joseph.
- source_word: שׁוֹרוֹ
  chosen: his bull
  alternatives:
  - his ox
  lexicon: HALOT
  rationale: שׁוֹר refers to bovine livestock; 'bull' fits the masculine singular
    image and pairs naturally with the horn imagery. 'Ox' is possible but can sound
    more generic or castrated in English.
- source_word: הָדָר לוֹ
  chosen: has majesty
  alternatives:
  - is majestic
  - has splendor
  lexicon: HALOT
  rationale: הָדָר conveys majesty/splendor/honor. Rendering the verbless clause as
    'has majesty' preserves the nominal force while remaining natural English.
- source_word: קַרְנֵי רְאֵם
  chosen: the horns of a wild ox
  alternatives:
  - the horns of a wild bull
  - the horns of a buffalo
  - the horns of a unicorn
  lexicon: HALOT
  rationale: רְאֵם most likely refers to a wild bovine (often identified with the
    aurochs), not the traditional but zoologically misleading 'unicorn.' 'Wild ox'
    is the clearest accessible rendering that reflects current lexical judgment.
- source_word: קַרְנָיו
  chosen: his horns
  lexicon: HALOT
  rationale: 'Straightforward possessive repetition that intensifies the simile: his
    horns are like those of a wild ox.'
- source_word: יְנַגַּח
  chosen: he will gore
  alternatives:
  - he will push
  - he will thrust
  lexicon: HALOT
  rationale: The verb נָגַח is used of horned animals butting or goring. 'Gore' best
    preserves the concrete horn imagery in context.
- source_word: עַמִּים
  chosen: peoples
  alternatives:
  - nations
  lexicon: HALOT
  rationale: The plural refers to multiple peoples/groups. 'Peoples' is slightly more
    literal than 'nations' and fits the poetic blessing.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - all at once
  lexicon: HALOT
  rationale: The adverb indicates collective action or simultaneous scope. 'Together'
    is concise and natural.
- source_word: אַפְסֵי אָרֶץ
  chosen: to the ends of the earth
  alternatives:
  - to the ends of the land
  lexicon: HALOT
  rationale: This idiom commonly denotes the farthest reaches of the earth/world.
    'Earth' is preferable here because the scope is expansive and poetic, not merely
    local territory.
- source_word: רִבְבֹות
  chosen: myriads
  alternatives:
  - ten thousands
  - multitudes
  lexicon: HALOT
  rationale: The term denotes very large numbers, often ten-thousands. 'Myriads' preserves
    the elevated poetic register and numerical contrast with 'thousands' in the next
    colon.
- source_word: אַלְפֵי
  chosen: thousands
  alternatives:
  - clans of
  lexicon: HALOT
  rationale: 'Though אֶלֶף can in some contexts denote a clan-unit, here the parallel
    with רִבְבֹות strongly favors a numerical sense: ''thousands.'''
- source_word: אֶפְרַיִם / מְנַשֶּׁה
  chosen: Ephraim / Manasseh
  lexicon: HALOT
  rationale: These are standard English transliterations of the tribal names and should
    be preserved as names, not translated.
