theological_decisions:
- issue: Rendering of תּוֹרָה in covenantal context
  chosen_reading: law
  alternative_readings:
  - instruction
  rationale: The verse describes Levi's priestly role in teaching Israel God's covenant
    requirements. 'Law' preserves the legal-covenantal force familiar in English Bible
    usage, while 'instruction' remains a viable lexical alternative and is preserved
    in a footnote.
  doctrine_reference: Translation philosophy §1, §5
- issue: Interpretation of anthropomorphic בְּאַפֶּךָ
  chosen_reading: before you
  alternative_readings:
  - at your nostril
  - before your face
  rationale: A hyper-literal rendering ('at your nose/nostril') would sound opaque
    or misleading in English. The phrase refers to incense presented to God in accepted
    worship. 'Before you' preserves the sense without importing extra theology.
  doctrine_reference: Translation philosophy §6
