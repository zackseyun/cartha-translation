id: DEU.33.10
reference: Deuteronomy 33:10
source:
  edition: WLC
  text: יוֹר֤וּ מִשְׁפָּטֶ֨י/ךָ֙ לְ/יַעֲקֹ֔ב וְ/תוֹרָתְ/ךָ֖ לְ/יִשְׂרָאֵ֑ל יָשִׂ֤ימוּ
    קְטוֹרָה֙ בְּ/אַפֶּ֔/ךָ וְ/כָלִ֖יל עַֽל מִזְבְּחֶֽ/ךָ־׃
translation:
  text: They will teach your judgments to Jacob and your law to Israel; they will
    place incense before you and a whole burnt offering on your altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your instruction' for 'your law' (תּוֹרָה).
    reason: lexical_alternative
  - marker: b
    text: Literally 'at your nose/nostril,' an anthropomorphic expression for incense
      presented before God.
    reason: cultural_note
lexical_decisions:
- source_word: יוֹרוּ
  chosen: they will teach
  alternatives:
  - they shall teach
  - they will instruct
  lexicon: HALOT
  rationale: Hiphil of ירה commonly means 'teach/instruct' in legal or priestly contexts.
    'Teach' is clear modern English and fits the object 'your judgments.'
- source_word: מִשְׁפָּטֶיךָ
  chosen: your judgments
  alternatives:
  - your ordinances
  - your rules
  lexicon: HALOT
  rationale: מִשְׁפָּט can denote judgments, ordinances, or legal decisions. 'Judgments'
    preserves the juridical sense and matches the covenant-law context without over-paraphrasing.
- source_word: לְיַעֲקֹב
  chosen: to Jacob
  alternatives:
  - for Jacob
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object. 'To Jacob' is the most direct
    rendering and preserves the poetic parallel with 'to Israel.'
- source_word: וְתוֹרָתְךָ
  chosen: and your law
  alternatives:
  - and your instruction
  lexicon: HALOT
  rationale: תּוֹרָה can mean instruction broadly, but in covenantal context 'law'
    remains a strong and recognizable rendering. 'Instruction' is possible, but 'law'
    better matches the parallel with 'judgments' here.
- source_word: לְיִשְׂרָאֵל
  chosen: to Israel
  alternatives:
  - for Israel
  lexicon: HALOT
  rationale: As with 'to Jacob,' the preposition is best rendered straightforwardly
    to preserve the poetic structure.
- source_word: יָשִׂימוּ
  chosen: they will place
  alternatives:
  - they will put
  - they will set
  lexicon: HALOT
  rationale: שׂים is a common verb meaning put/place/set. 'Place' is idiomatic in
    sacrificial context and slightly more formal than 'put.'
- source_word: קְטוֹרָה
  chosen: incense
  alternatives:
  - incense offering
  lexicon: HALOT
  rationale: The noun denotes incense. Since the sacrificial sense is already clear
    from context, 'incense' is sufficient in the main text.
- source_word: בְּאַפֶּךָ
  chosen: before you
  alternatives:
  - in your nostril
  - at your nose
  - to your anger
  lexicon: HALOT
  rationale: Literally 'in/at your nose,' using אַף in anthropomorphic idiom. In sacrificial
    context this refers to the offering presented before God as a pleasing aroma,
    not to divine anger here. 'Before you' communicates the sense naturally in English
    while avoiding misleading literalism.
- source_word: וְכָלִיל
  chosen: and a whole burnt offering
  alternatives:
  - and whole offering
  - and an offering wholly burned
  lexicon: HALOT
  rationale: כָּלִיל denotes an offering wholly consumed on the altar. 'Whole burnt
    offering' makes the cultic sense explicit and is standard, accurate English.
- source_word: עַל מִזְבְּחֶךָ
  chosen: on your altar
  alternatives:
  - upon your altar
  lexicon: HALOT
  rationale: A direct and natural rendering of the preposition plus noun in sacrificial
    context.
