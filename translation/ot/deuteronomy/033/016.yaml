id: DEU.33.16
reference: Deuteronomy 33:16
source:
  edition: WLC
  text: וּ/מִ/מֶּ֗גֶד אֶ֚רֶץ וּ/מְלֹאָ֔/הּ וּ/רְצ֥וֹן שֹׁכְנִ֖י סְנֶ֑ה תָּב֨וֹאתָ/ה֙
    לְ/רֹ֣אשׁ יוֹסֵ֔ף וּ/לְ/קָדְקֹ֖ד נְזִ֥יר אֶחָֽי/ו׃
translation:
  text: and with the choicest things of the earth and its fullness, and the favor
    of the one who dwelt in the bush—may it come on the head of Joseph, and on the
    crown of the head of the one set apart from his brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the goodwill of him who dwelt in the bush.' The Hebrew phrase alludes
      to God's appearance to Moses in the burning bush.
    reason: lexical_alternative
  - marker: b
    text: Or 'the prince among his brothers' or 'the consecrated one among his brothers.'
      The Hebrew נְזִיר emphasizes being set apart, and in Joseph's case may also
      imply preeminence.
    reason: alternative_reading
lexical_decisions:
- source_word: מִמֶּגֶד
  chosen: with the choicest things of
  alternatives:
  - from the choicest things of
  - with the precious things of
  lexicon: HALOT
  rationale: מֶגֶד in this blessing context denotes choice or precious produce/things.
    Because the verse continues the series of blessings from the previous lines, English
    'with the choicest things of' best conveys the sense of bestowed bounty while
    remaining natural.
- source_word: אֶרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'earth' or 'land.' Here, paired with 'its fullness,' the
    broader sense 'earth' fits the poetic expression better than a narrower territorial
    'land,' though the blessing still concerns Joseph's territory.
- source_word: מְלֹאָהּ
  chosen: its fullness
  alternatives:
  - all that fills it
  - all it contains
  lexicon: HALOT
  rationale: The noun denotes that which fills the earth/land. 'Its fullness' preserves
    the compact poetic formulation and echoes established biblical idiom without becoming
    archaic.
- source_word: רְצוֹן
  chosen: the favor
  alternatives:
  - the goodwill
  - the acceptance
  lexicon: HALOT
  rationale: In context this refers to the benevolent pleasure of God toward Joseph.
    'Favor' is concise, idiomatic, and theologically appropriate.
- source_word: שֹׁכְנִי סְנֶה
  chosen: the one who dwelt in the bush
  alternatives:
  - him who dwelt in the bush
  - the dweller in the bush
  lexicon: HALOT
  rationale: This alludes to the divine self-revelation at the burning bush. The participial
    form is best represented by a relative expression in English. 'Bush' rather than
    'thornbush' preserves the recognizable allusion while staying close to the Hebrew.
- source_word: תָּבֹואתָה
  chosen: may it come
  alternatives:
  - let it come
  - may these come
  lexicon: HALOT
  rationale: The verb is 3fs, naturally agreeing with the composite blessing just
    mentioned, treated collectively. 'May it come' preserves the jussive/blessing
    force. Although the referents are multiple, Hebrew can use a singular verb for
    a collective blessing.
- source_word: לְרֹאשׁ יוֹסֵף
  chosen: on the head of Joseph
  alternatives:
  - upon Joseph's head
  lexicon: HALOT
  rationale: This is a standard blessing idiom. 'On the head of Joseph' is clear and
    formally close.
- source_word: קָדְקֹד
  chosen: the crown of the head
  alternatives:
  - the crown
  - the scalp
  lexicon: HALOT
  rationale: The noun refers literally to the top/crown of the head. Because 'head'
    already appears in the prior colon, 'the crown of the head' preserves the Hebrew
    parallelism and specificity.
- source_word: נְזִיר אֶחָיו
  chosen: the one set apart from his brothers
  alternatives:
  - the prince among his brothers
  - the consecrated one among his brothers
  - the one separated from his brothers
  lexicon: HALOT
  rationale: נָזִיר fundamentally denotes one consecrated or set apart. In Joseph
    traditions it can carry the sense of distinction/exaltation among his brothers.
    'The one set apart from his brothers' preserves the lexical core without overcommitting
    to the interpretive gloss 'prince.'
