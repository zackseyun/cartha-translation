theological_decisions:
- issue: Identification of 'the one who dwelt in the bush'
  chosen_reading: A divine title referring to God as revealed to Moses at the burning
    bush
  alternative_readings:
  - A more generic reference to a divine manifestation associated with Sinai/Horeb
  rationale: The phrase strongly evokes Exodus 3 and functions here as a reverent
    circumlocution for God. Translating it descriptively preserves the allusion without
    importing a later doctrinal expansion not explicit in the text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
