id: DEU.33.18
reference: Deuteronomy 33:18
source:
  edition: WLC
  text: וְ/לִ/זְבוּלֻ֣ן אָמַ֔ר שְׂמַ֥ח זְבוּלֻ֖ן בְּ/צֵאתֶ֑/ךָ וְ/יִשָּׂשכָ֖ר בְּ/אֹהָלֶֽי/ךָ׃
translation:
  text: And of Zebulun he said, “Rejoice, Zebulun, in your going out, and Issachar,
    in your tents.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “when you go out.” The Hebrew expression may denote the sphere of Zebulun’s
      activity or prosperity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לִ/זְבוּלֻן
  chosen: And of Zebulun
  alternatives:
  - And to Zebulun
  - Concerning Zebulun
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition introduce the next tribal blessing.
    'Of Zebulun' is idiomatic in English in this blessing formula and matches the
    sense of introducing what was said regarding Zebulun.
- source_word: אָמַר
  chosen: he said
  alternatives:
  - he declared
  lexicon: HALOT
  rationale: Standard rendering of אמר in narrative and speech-introduction contexts.
    'Said' is natural and sufficiently formal here.
- source_word: שְׂמַח
  chosen: Rejoice
  alternatives:
  - Be glad
  lexicon: HALOT
  rationale: Imperative addressed to Zebulun. 'Rejoice' preserves the elevated tone
    of the blessing and the volitional force better than the flatter 'be glad.'
- source_word: זְבוּלֻן
  chosen: Zebulun
  rationale: Personal/tribal name is transliterated per translation philosophy.
- source_word: בְּ/צֵאתֶךָ
  chosen: in your going out
  alternatives:
  - when you go out
  - in your ventures
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב conveys circumstance or sphere.
    'In your going out' keeps the Hebrew imagery and parallelism with 'in your tents,'
    while remaining understandable. More interpretive options like 'in your ventures'
    are possible but go beyond the immediate wording.
- source_word: וְ/יִשָּׂשכָר
  chosen: and Issachar
  rationale: Coordinates Issachar with Zebulun as the second tribe addressed in the
    blessing line.
- source_word: בְּ/אֹהָלֶיךָ
  chosen: in your tents
  alternatives:
  - in your tent-dwellings
  - at home
  lexicon: HALOT
  rationale: Plural 'tents' is retained to reflect the Hebrew form and the tribal,
    collective setting. 'At home' would be smoother but less concrete and less parallel
    to the source imagery.
