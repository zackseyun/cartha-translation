id: DEU.33.15
reference: Deuteronomy 33:15
source:
  edition: WLC
  text: וּ/מֵ/רֹ֖אשׁ הַרְרֵי קֶ֑דֶם וּ/מִ/מֶּ֖גֶד גִּבְע֥וֹת עוֹלָֽם־׃
translation:
  text: and from the choicest things of the ancient mountains, and from the abundance
    of the everlasting hills,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the top of the ancient mountains.' The Hebrew phrase may be read
      spatially ('top/head of') or qualitatively ('chief/best of').
    reason: lexical_alternative
  - marker: b
    text: Or 'from the precious things of the everlasting hills.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵרֹאשׁ
  chosen: from the choicest things of
  alternatives:
  - from the top of
  - from the chief part of
  - from the best of
  lexicon: HALOT
  rationale: 'Although רֹאשׁ literally means ''head'' or ''top,'' in blessing/catalog
    contexts the idiom מֵרֹאשׁ can denote what is foremost or best. Here a strictly
    spatial rendering (''from the top of'') is possible, but the parallel with מִמֶּגֶד
    (''from the abundance/precious yield of'') in a list of blessings favors a qualitative
    sense: the finest produce associated with the mountains.'
- source_word: הַרְרֵי
  chosen: mountains
  alternatives:
  - hills
  lexicon: HALOT
  rationale: Plural construct of הַר, straightforwardly 'mountains.' Kept distinct
    from the following גִּבְעוֹת ('hills').
- source_word: קֶדֶם
  chosen: ancient
  alternatives:
  - east
  - former times
  - primeval
  lexicon: HALOT
  rationale: 'קֶדֶם can mean ''east'' or ''antiquity.'' In this poetic blessing, paired
    with עוֹלָם (''everlasting''), the temporal sense is more natural than the directional
    one: mountains of old/ancient mountains.'
- source_word: מִמֶּגֶד
  chosen: from the abundance of
  alternatives:
  - from the precious things of
  - from the choicest yield of
  - from the excellence of
  lexicon: HALOT
  rationale: מֶגֶד often denotes precious produce or rich yield. 'Abundance' communicates
    the sense of rich bounty in accessible English, while fitting the blessing context.
    'Precious things' is possible and traditional, but can sound vague in modern English.
- source_word: גִּבְעוֹת
  chosen: hills
  alternatives:
  - heights
  lexicon: HALOT
  rationale: Standard rendering of גִּבְעָה in contrast to the larger 'mountains'
    of the previous colon.
- source_word: עוֹלָם
  chosen: everlasting
  alternatives:
  - ancient
  - age-old
  - eternal
  lexicon: HALOT
  rationale: In poetic descriptions of landscape, עוֹלָם commonly conveys enduring
    antiquity or perpetual duration. 'Everlasting' preserves the elevated poetic force
    and pairs well with 'ancient' in the previous colon without collapsing the two
    terms into identical English.
