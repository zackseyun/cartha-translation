id: DEU.33.13
reference: Deuteronomy 33:13
source:
  edition: WLC
  text: וּ/לְ/יוֹסֵ֣ף אָמַ֔ר מְבֹרֶ֥כֶת יְהֹוָ֖ה אַרְצ֑/וֹ מִ/מֶּ֤גֶד שָׁמַ֨יִם֙ מִ/טָּ֔ל וּ/מִ/תְּה֖וֹם רֹבֶ֥צֶת תָּֽחַת׃
translation:
  text: And of Joseph he said, “Blessed by Yahweh be his land, with the choicest things of heaven, with dew, and from the deep lying beneath,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the precious things of heaven.'
    reason: lexical_alternative
  - marker: b
    text: '''The deep'' likely refers to subterranean waters beneath the land.'
    reason: cultural_note
lexical_decisions:
- source_word: וּלְיוֹסֵף
  chosen: And of Joseph
  alternatives:
  - And for Joseph
  - Concerning Joseph
  lexicon: HALOT
  rationale: The preposition ל with a tribal/personal name in blessing formulas is naturally rendered 'of' or 'for.' 'And of Joseph' preserves the formal structure of the tribal blessings and matches the introductory pattern of the surrounding context.
- source_word: אָמַר
  chosen: he said
  alternatives:
  - he declared
  lexicon: HALOT
  rationale: Standard rendering of אמר in narrative/blessing introduction. 'He said' is simple and idiomatic, preserving the direct-speech frame.
- source_word: מְבֹרֶכֶת
  chosen: Blessed ... be
  alternatives:
  - May ... be blessed
  - His land is blessed
  lexicon: HALOT
  rationale: The passive participle functions predicatively in a blessing formula. English idiom is best captured by an optative-like expression, 'Blessed ... be,' which preserves the elevated blessing style without over-paraphrase.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אַרְצוֹ
  chosen: his land
  alternatives:
  - his country
  - his territory
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the land allotted to Joseph's tribes. 'Land' is the most natural and biblically consistent rendering.
- source_word: מִמֶּגֶד
  chosen: with the choicest gifts of
  alternatives:
  - from the precious things of
  - from the best of
  lexicon: HALOT
  rationale: מֶגֶד denotes excellence, precious produce, or choice bounty, especially in blessing contexts. 'Choicest gifts' communicates both value and bestowed bounty in contemporary English. The preposition מן here is rendered idiomatically with 'with' to fit the blessing construction in English.
- source_word: שָׁמַיִם
  chosen: heaven
  alternatives:
  - the heavens
  - the sky
  lexicon: HALOT
  rationale: In this agricultural blessing context, the singular collective 'heaven' works naturally in English while retaining the source sense of the celestial source of blessing. 'The heavens' is possible but slightly less idiomatic here.
- source_word: מִטָּל
  chosen: with dew
  alternatives:
  - from dew
  lexicon: HALOT
  rationale: The repeated מן phrases list sources/components of blessing. English idiom prefers 'with dew' in coordination with the previous phrase, while still reflecting dew as a gift from heaven.
- source_word: וּמִתְּהוֹם
  chosen: and from the deep
  alternatives:
  - and from the abyss
  - and from the subterranean waters
  lexicon: HALOT
  rationale: תְּהוֹם refers to the primeval deep or the deep waters, here likely subterranean waters that nourish the land. 'The deep' is the established and sufficiently transparent rendering without importing later theological connotations of 'abyss.'
- source_word: רֹבֶצֶת תָּחַת
  chosen: lying beneath
  alternatives:
  - crouching below
  - resting underneath
  lexicon: HALOT
  rationale: The participle רֹבֶצֶת literally means 'lying down' or 'crouching,' used vividly of something situated below. For English readability in a geographic/agricultural image, 'lying beneath' preserves the metaphor without sounding awkward or animalistic inappropriately.
