theological_decisions:
- issue: Referent of 'your faithful man' in Levi's blessing
  chosen_reading: Render the phrase generically as referring to the faithful representative
    associated with Levi, without specifying Aaron, Levi, or the tribe as a whole.
  alternative_readings:
  - Aaron specifically
  - Levi as ancestor
  - the Levitical tribe collectively
  rationale: The Hebrew singular permits several interpretive possibilities, and the
    verse alludes to wilderness testing traditions connected with priestly/Levitical
    identity. To preserve the text's ambiguity rather than resolve it, the translation
    keeps the singular expression without interpretive identification.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
