id: DEU.33.8
reference: Deuteronomy 33:8
source:
  edition: WLC
  text: וּ/לְ/לֵוִ֣י אָמַ֔ר תֻּמֶּ֥י/ךָ וְ/אוּרֶ֖י/ךָ לְ/אִ֣ישׁ חֲסִידֶ֑/ךָ אֲשֶׁ֤ר
    נִסִּית/וֹ֙ בְּ/מַסָּ֔ה תְּרִיבֵ֖/הוּ עַל מֵ֥י מְרִיבָֽה־׃
translation:
  text: 'And of Levi he said: “Your Thummim and your Urim belong to your faithful
    man, whom you tested at Massah, with whom you contended at the waters of Meribah.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for your godly man' or 'for your loyal one.' The Hebrew expression can
      denote one marked by covenant loyalty.
    reason: lexical_alternative
  - marker: b
    text: Massah means 'testing,' and Meribah is associated with 'quarreling/contention'
      (see Exod 17:1–7; Num 20:1–13).
    reason: cross_reference
lexical_decisions:
- source_word: וּלְלֵוִי
  chosen: And of Levi
  alternatives:
  - And to Levi
  - Concerning Levi
  lexicon: HALOT
  rationale: The preposition ל with a tribal name after a sequence of blessing formulas
    is naturally rendered as introducing the tribe under discussion. 'Of Levi' is
    idiomatic in English and fits the blessing context, while preserving the Hebrew
    construction.
- source_word: אָמַר
  chosen: he said
  alternatives:
  - he said concerning him
  lexicon: HALOT
  rationale: Simple narrative introduction to Moses' blessing speech; no expansion
    beyond the Hebrew is needed.
- source_word: תֻּמֶּיךָ
  chosen: your Thummim
  alternatives:
  - your perfections
  lexicon: HALOT
  rationale: Thummim is a technical cultic term paired with Urim and best transliterated
    rather than flattened, since the exact object/function is specialized and uncertain.
    The 2ms suffix is retained as 'your.'
- source_word: וְאוּרֶיךָ
  chosen: and your Urim
  alternatives:
  - and your lights
  lexicon: HALOT
  rationale: Urim, like Thummim, is a technical priestly term. Transliteration preserves
    the historical-religious specificity better than a literal gloss.
- source_word: לְאִישׁ חֲסִידֶךָ
  chosen: belong to your faithful man
  alternatives:
  - for your godly man
  - for your loyal one
  - for the man of your covenant loyalty
  lexicon: HALOT
  rationale: The phrase indicates the person to whom the Urim and Thummim pertain.
    חָסִיד carries the sense of one marked by covenant loyalty/faithfulness. 'Faithful
    man' is readable modern English and preserves the masculine singular. 'Belong
    to' is supplied in English to make the verbless Hebrew clause intelligible.
- source_word: אֲשֶׁר נִסִּיתוֹ
  chosen: whom you tested
  alternatives:
  - whom you proved
  lexicon: HALOT
  rationale: נסה in the piel commonly means 'test, try, prove.' 'Tested' is the clearest
    modern rendering and fits the wilderness episode alluded to.
- source_word: בְּמַסָּה
  chosen: at Massah
  alternatives:
  - at testing
  lexicon: HALOT
  rationale: Massah is a place name derived from 'testing.' Because the Hebrew here
    uses the proper name, transliteration is preferred in the main text.
- source_word: תְּרִיבֵהוּ
  chosen: with whom you contended
  alternatives:
  - whom you contended with
  - whom you accused
  - with whom you strove
  lexicon: HALOT
  rationale: ריב in this stem denotes contending or disputing. English idiom prefers
    'with whom you contended.' This preserves the direct divine-human conflict implied
    by the wilderness narrative.
- source_word: עַל מֵי מְרִיבָה
  chosen: at the waters of Meribah
  alternatives:
  - over the waters of Meribah
  - at Meribah's waters
  lexicon: HALOT
  rationale: The phrase names the location/event associated with contention. 'At the
    waters of Meribah' is natural English and preserves the place-name allusion. Although
    עַל often means 'upon/over,' in this locative-event context 'at' communicates
    the sense best.
