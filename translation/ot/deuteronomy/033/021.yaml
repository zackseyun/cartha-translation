id: DEU.33.21
reference: Deuteronomy 33:21
source:
  edition: WLC
  text: וַ/יַּ֤רְא רֵאשִׁית֙ ל֔/וֹ כִּי שָׁ֛ם חֶלְקַ֥ת מְחֹקֵ֖ק סָפ֑וּן וַ/יֵּתֵא֙ רָ֣אשֵׁי עָ֔ם צִדְקַ֤ת יְהוָה֙ עָשָׂ֔ה וּ/מִשְׁפָּטָ֖י/ו עִם יִשְׂרָאֵֽל־־׃ס
translation:
  text: He chose the first part for himself, because there the portion of the lawgiver was reserved. He came with the heads of the people; he carried out the righteousness of Yahweh, and his judgments with Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the portion of the lawgiver was reserved.' The Hebrew term can mean 'ruler' or 'lawgiver,' and some take it as a reference to Moses.
    reason: alternative_reading
  - marker: b
    text: Or 'the justice of the LORD' or 'the righteous acts of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: chose
  alternatives:
  - saw
  - provided
  lexicon: HALOT
  rationale: Although the verb is literally 'saw,' in context 'saw for himself' idiomatically conveys selecting or choosing. English 'chose' best captures the sense without woodenness.
- source_word: רֵאשִׁית
  chosen: the best land
  alternatives:
  - first part
  - firstfruits
  - beginning
  lexicon: HALOT
  rationale: Here the noun refers to the foremost or choicest portion of territory allotted to Gad, not temporal 'beginning.' 'Best land' communicates the territorial sense in context.
- source_word: חֶלְקַת
  chosen: the portion
  alternatives:
  - share
  - allotment
  lexicon: HALOT
  rationale: The term denotes an allotted share of land or inheritance. 'Portion' is concise and natural.
- source_word: מְחֹקֵק
  chosen: the ruler
  alternatives:
  - lawgiver
  - commander
  lexicon: HALOT
  rationale: The word can mean 'lawgiver' or 'ruler.' In this territorial-poetic context, 'ruler' better fits the idea of a leader's allotted portion, while preserving the dignity of the term. The alternative is preserved in a footnote because the phrase is debated.
- source_word: סָפוּן
  chosen: was reserved
  alternatives:
  - was hidden
  - was stored up
  - was concealed
  lexicon: HALOT
  rationale: The passive participial idea is that the portion was set aside or kept in store. 'Reserved' communicates this clearly in English.
- source_word: וַיֵּתֵא
  chosen: He came
  alternatives:
  - he went out
  - he marched out
  lexicon: HALOT
  rationale: The verb means 'went out/came.' Given the following phrase 'with the heads of the people,' 'came' reads naturally in English while retaining the movement sense.
- source_word: רָאשֵׁי עָם
  chosen: the heads of the people
  alternatives:
  - the leaders of the people
  - the chiefs of the people
  lexicon: HALOT
  rationale: Literally 'heads of the people.' This likely refers to leaders or chiefs, but the literal image is transparent enough in English and preserves the Hebrew flavor.
- source_word: צִדְקַת יְהוָה
  chosen: the righteousness of the LORD
  alternatives:
  - the justice of the LORD
  - the righteous acts of the LORD
  lexicon: HALOT
  rationale: The construct can denote righteousness or righteous acts. Here it likely refers to carrying out what was right according to the LORD's covenantal standard. 'Righteousness of the LORD' keeps the Hebrew wording closest; 'justice' and 'righteous acts' are viable alternatives preserved in a footnote.
- source_word: וּמִשְׁפָּטָיו
  chosen: his judgments
  alternatives:
  - his ordinances
  - his justice
  - his judgments
  lexicon: HALOT
  rationale: The plural with suffix refers to the LORD's judicial decisions or ordinances. 'Judgments' is a direct and weighty rendering.
- source_word: עִם יִשְׂרָאֵל
  chosen: with Israel
  alternatives:
  - for Israel
  - alongside Israel
  lexicon: HALOT
  rationale: The preposition is straightforwardly 'with.' This likely means Gad acted in concert with the rest of Israel, and the simple rendering preserves that.
