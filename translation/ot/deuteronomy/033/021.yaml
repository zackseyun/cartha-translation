theological_decisions:
- issue: Identity and sense of 'מְחֹקֵק' in the phrase 'חלקת מחקק ספון'
  chosen_reading: Rendered generically as 'the ruler' rather than specifying Moses or using the more traditional 'lawgiver.'
  alternative_readings:
  - '''lawgiver'' (possibly referring to Moses)'
  - '''commander'' or ''leader'''
  rationale: The Hebrew phrase is compressed and debated. The verse blesses Gad and likely refers to a reserved territorial portion associated with leadership or authority. A generic rendering avoids importing a specific identification not demanded by the text while preserving the honorific sense.
  doctrine_reference: Preserve theological tension rather than resolve it.
