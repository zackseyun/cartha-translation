theological_decisions:
- issue: Rendering the gendered collective בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  - the children of Israel
  rationale: The source text uses the masculine plural construct 'sons of.' Per the
    doctrine's gender-accurate principle, the translation preserves the familial and
    gendered form rather than neutralizing it. Because English readers may take 'sons'
    more narrowly than the Hebrew collective intends, an explanatory footnote preserves
    the broader referential sense.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4 (Gender-accurate over
    gender-neutral)
