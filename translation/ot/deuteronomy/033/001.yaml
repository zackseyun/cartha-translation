id: DEU.33.1
reference: Deuteronomy 33:1
source:
  edition: WLC
  text: וְ/זֹ֣את הַ/בְּרָכָ֗ה אֲשֶׁ֨ר בֵּרַ֥ךְ מֹשֶׁ֛ה אִ֥ישׁ הָ/אֱלֹהִ֖ים אֶת בְּנֵ֣י
    יִשְׂרָאֵ֑ל לִ/פְנֵ֖י מוֹתֽ/וֹ־׃
translation:
  text: 'Now this is the blessing with which Moses, the man of God, blessed the sons
    of Israel before his death:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the sons of Israel,' a standard collective expression for the people
      of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזֹאת
  chosen: Now this
  alternatives:
  - And this
  - This
  lexicon: HALOT
  rationale: The conjunction plus demonstrative introduces a new section. 'Now this'
    is natural modern English that preserves the discourse-shifting force better than
    a bare 'This,' while avoiding an overly wooden 'And this.'
- source_word: הַבְּרָכָה
  chosen: the blessing
  alternatives:
  - this blessing
  lexicon: HALOT
  rationale: The noun denotes a formal blessing/pronouncement. The definite article
    is preserved with 'the blessing.'
- source_word: אֲשֶׁר בֵּרַךְ
  chosen: with which ... blessed
  alternatives:
  - that ... blessed
  - which ... pronounced
  lexicon: HALOT
  rationale: The relative clause modifies 'the blessing.' English idiom is improved
    by 'with which Moses ... blessed,' which makes explicit the instrumental sense
    inherent in the Hebrew construction without adding content.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - God's man
  lexicon: HALOT
  rationale: This is a recognized Hebrew title for a prophet or divinely commissioned
    figure. 'The man of God' is the standard and most transparent rendering; it preserves
    the masculine singular title as written.
- source_word: אֶת בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' In keeping with the project's
    gender-accurate principle, the familial expression is retained rather than flattened
    to 'people' or 'Israelites.' 'Children of Israel' is traditional but less precise
    to the masculine plural form.
- source_word: לִפְנֵי מוֹתוֹ
  chosen: before his death
  alternatives:
  - before he died
  lexicon: HALOT
  rationale: A straightforward temporal phrase. 'Before his death' is more formally
    parallel to the Hebrew nominal construction than the verbal alternative.
