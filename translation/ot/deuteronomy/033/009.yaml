id: DEU.33.9
reference: Deuteronomy 33:9
source:
  edition: WLC
  text: הָ/אֹמֵ֞ר לְ/אָבִ֤י/ו וּ/לְ/אִמּ/וֹ֙ לֹ֣א רְאִיתִ֔י/ו וְ/אֶת אֶחָי/ו֙ לֹ֣א
    הִכִּ֔יר וְ/אֶת בנ/ו לֹ֣א יָדָ֑ע כִּ֤י שָֽׁמְרוּ֙ אִמְרָתֶ֔/ךָ וּ/בְרִֽיתְ/ךָ֖
    יִנְצֹֽרוּ־־׃
translation:
  text: who said of his father and his mother, ‘I have not regarded him,’ and did
    not acknowledge his brothers or know his sons; for they kept your word and guarded
    your covenant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'I have not seen him.' Here the sense is likely 'I have
      not regarded him' or 'taken notice of him' in the context of covenant loyalty
      over family ties.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֹמֵר
  chosen: who said
  alternatives:
  - the one who said
  - who says
  lexicon: HALOT
  rationale: Substantival participle functioning relative to the preceding subject
    (Levi). English relative clause is the most natural equivalent.
- source_word: לְאָבִיו וּלְאִמּוֹ
  chosen: of his father and his mother
  alternatives:
  - to his father and his mother
  - concerning his father and his mother
  lexicon: HALOT
  rationale: The preposition ל with אמר can introduce the person spoken of or addressed.
    In this context, the sense is that he spoke with reference to his closest kin;
    'of' is idiomatic in English and fits the following denials.
- source_word: לֹא רְאִיתִיו
  chosen: I have not regarded him
  alternatives:
  - I have not seen him
  - I have not looked at him
  lexicon: HALOT
  rationale: Although ראה literally means 'see,' in this context of renouncing family
    claims for covenant loyalty, the idiomatic force is closer to 'regard' or 'take
    notice of' rather than mere physical sight. This avoids an implausibly literal
    reading while preserving the sharpness of the statement.
- source_word: הִכִּיר
  chosen: acknowledge
  alternatives:
  - recognize
  - regard
  lexicon: HALOT
  rationale: The Hiphil of נכר here conveys recognizing or acknowledging relationally.
    'Acknowledge' best captures refusal to give familial recognition.
- source_word: אֶחָיו
  chosen: his brothers
  alternatives:
  - his kinsmen
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural 'brothers.' Per gender-accurate
    policy, the masculine familial term is retained rather than generalized.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew specifically says 'sons,' not a gender-neutral term. The translation
    preserves that specificity.
- source_word: יָדָע
  chosen: know
  alternatives:
  - acknowledge
  - take notice of
  lexicon: HALOT
  rationale: ידע often means 'know,' but here in parallel with 'regarded' and 'acknowledge'
    it denotes relational recognition. 'Know' preserves the Hebrew wording while remaining
    intelligible in context.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the preceding renunciation. 'For' is concise
    and natural in elevated English.
- source_word: שָׁמְרוּ
  chosen: kept
  alternatives:
  - observed
  - obeyed
  lexicon: HALOT
  rationale: שׁמר commonly means keep/observe. 'Kept' is a standard covenantal rendering
    and pairs well with the following clause.
- source_word: אִמְרָתֶךָ
  chosen: your word
  alternatives:
  - your utterance
  - your command
  lexicon: HALOT
  rationale: אמרה can mean word/utterance. 'Your word' is the most natural covenantal
    expression here without over-specifying as a single command.
- source_word: בְּרִיתְךָ
  chosen: your covenant
  alternatives:
  - your pact
  lexicon: HALOT
  rationale: Standard rendering for ברית in covenantal contexts.
- source_word: יִנְצֹרוּ
  chosen: guarded
  alternatives:
  - kept
  - watched over
  - observed
  lexicon: HALOT
  rationale: נצר overlaps with שׁמר but often has the nuance of guarding or preserving.
    Rendering it differently from שׁמר preserves the parallelism without flattening
    the lexical distinction.
