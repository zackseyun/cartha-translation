theological_decisions:
- issue: Referent of the singular and plural pronouns in the verse
  chosen_reading: The verse speaks corporately of Levi/the Levites, using singular
    forms in the relative clauses and plural verbs in the rationale.
  alternative_readings:
  - The verse speaks of Levi as a singular ancestor only
  - The verse shifts from an individual Levite to the tribe
  rationale: The Hebrew moves from singular ('who said... I have not regarded him...
    did not acknowledge... did not know') to plural ('they kept... guarded'). This
    is best represented without smoothing it away, since the blessing concerns Levi
    corporately while using a representative singular.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
