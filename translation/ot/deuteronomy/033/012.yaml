theological_decisions:
- issue: Referent of the pronouns in the verse
  chosen_reading: The main text reads Benjamin/the beloved as dwelling securely near
    the LORD, with the LORD shielding him; the final clause retains the Hebrew ambiguity
    with 'he dwells between his shoulders.'
  alternative_readings:
  - The LORD dwells over Benjamin and between Benjamin's shoulders
  - Benjamin dwells between the LORD's shoulders
  rationale: The Hebrew suffixes and poetic compression allow more than one construal.
    The most common sense is that Benjamin, as the LORD's beloved, dwells securely
    under divine protection. The closing clause is left formally close to the Hebrew
    rather than resolving the ambiguity beyond what the text warrants.
  doctrine_reference: Preserve theological tension rather than resolve it.
