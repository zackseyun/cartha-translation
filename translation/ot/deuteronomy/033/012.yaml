id: DEU.33.12
reference: Deuteronomy 33:12
source:
  edition: WLC
  text: לְ/בִנְיָמִ֣ן אָמַ֔ר יְדִ֣יד יְהֹוָ֔ה יִשְׁכֹּ֥ן לָ/בֶ֖טַח עָלָ֑י/ו חֹפֵ֤ף
    עָלָי/ו֙ כָּל הַ/יּ֔וֹם וּ/בֵ֥ין כְּתֵיפָ֖י/ו שָׁכֵֽן־׃ס
translation:
  text: 'And of Benjamin he said: “The beloved of the LORD dwells in safety by him;
    he shields him all the day, and he dwells between his shoulders.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dwells securely beside him,' or 'dwells securely under him/over him';
      the Hebrew preposition is compact and may express nearness or protective oversight.
    reason: lexical_alternative
  - marker: b
    text: Literally 'between his shoulders.' Some understand this figuratively of
      protective closeness; others take it topographically of Benjamin's hill country
      or the sanctuary located in Benjamin's territory.
    reason: alternative_reading
lexical_decisions:
- source_word: לְבִנְיָמִן
  chosen: of Benjamin
  alternatives:
  - to Benjamin
  - for Benjamin
  lexicon: HALOT
  rationale: In the blessing formula introducing each tribe, English idiom is best
    served by 'of Benjamin he said,' though the preposition could more literally be
    'to/for.' This preserves the tribal heading sense without awkwardness.
- source_word: יְדִיד
  chosen: the beloved
  alternatives:
  - beloved one
  - dear one
  lexicon: HALOT
  rationale: The adjective/noun denotes one loved or cherished. 'The beloved' is concise,
    natural, and preserves the covenantal warmth of the expression.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name is rendered 'the LORD' rather
    than transliterated.
- source_word: יִשְׁכֹּן
  chosen: dwells
  alternatives:
  - shall dwell
  - lives
  - rests
  lexicon: HALOT
  rationale: The verb שכן commonly means 'dwell, reside.' Present tense works well
    in poetic blessing context in English, expressing the enduring state promised/blessed.
- source_word: לָבֶטַח
  chosen: in safety
  alternatives:
  - securely
  - in security
  lexicon: HALOT
  rationale: The noun/adverbial expression conveys security and safety. 'In safety'
    is idiomatic and slightly more concrete than 'securely.'
- source_word: עָלָיו
  chosen: by him
  alternatives:
  - beside him
  - upon him
  - over him
  lexicon: HALOT
  rationale: The preposition על with pronominal suffix here is difficult in context.
    Given the parallel protective imagery in the next clause, 'by him' communicates
    nearness to the LORD while avoiding overcommitting to a more spatially rigid gloss.
    The ambiguity is preserved in a footnote.
- source_word: חֹפֵף
  chosen: he shields
  alternatives:
  - he covers
  - hovering over
  - protecting
  lexicon: HALOT
  rationale: The participle conveys protective covering. 'He shields' brings out the
    protective sense in clear modern English; 'covers' is possible but less explicit,
    and 'hovering' may suggest motion not required here.
- source_word: כָּל הַיּוֹם
  chosen: all the day
  alternatives:
  - all day
  lexicon: HALOT
  rationale: '''All the day'' preserves the poetic register of the Hebrew while remaining
    understandable.'
- source_word: וּבֵין כְּתֵיפָיו
  chosen: between his shoulders
  alternatives:
  - on his shoulders
  - between his mountain slopes
  lexicon: HALOT
  rationale: כתף literally means 'shoulder/side.' The anthropomorphic image 'between
    his shoulders' is the most direct rendering and preserves the poetic metaphor.
    Some interpret it topographically of Benjamin's territory, but the literal image
    should stand in the main text, with the alternative preserved in a footnote.
- source_word: שָׁכֵן
  chosen: he dwells
  alternatives:
  - he rests
  - he tabernacles
  lexicon: HALOT
  rationale: The final verb repeats the dwelling motif. Rendering it again as 'he
    dwells' preserves the Hebrew repetition and poetic cohesion.
