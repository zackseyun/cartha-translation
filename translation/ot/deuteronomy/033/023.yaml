id: DEU.33.23
reference: Deuteronomy 33:23
source:
  edition: WLC
  text: וּ/לְ/נַפְתָּלִ֣י אָמַ֔ר נַפְתָּלִי֙ שְׂבַ֣ע רָצ֔וֹן וּ/מָלֵ֖א בִּרְכַּ֣ת יְהוָ֑ה יָ֥ם וְ/דָר֖וֹם יְרָֽשָׁ/ה׃ס
translation:
  text: 'And of Naphtali he said: “Naphtali, satisfied with favor and full of the blessing of Yahweh, possess the sea and the south.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly “the west and the south,” since “sea” can function as a directional term for the west in Hebrew.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְנַפְתָּלִי
  chosen: And of Naphtali
  alternatives:
  - And to Naphtali
  - Concerning Naphtali
  lexicon: HALOT
  rationale: The prefixed ל with the tribal name in this blessing formula is naturally rendered as introducing the addressee/topic of the saying. 'And of Naphtali' fits the parallel structure of the surrounding tribal blessings in English.
- source_word: אָמַר
  chosen: he said
  alternatives:
  - he declared
  lexicon: HALOT
  rationale: Standard rendering of אמר in narrative/blessing introduction. 'Said' is clear and preserves the simple verbal force.
- source_word: נַפְתָּלִי
  chosen: Naphtali
  rationale: Proper tribal name is transliterated per translation philosophy.
- source_word: שְׂבַע
  chosen: satisfied with
  alternatives:
  - filled with
  - sated with
  lexicon: HALOT
  rationale: As an adjective, the term denotes being replete or satisfied. 'Satisfied with' is idiomatic modern English and fits the blessing context better than the more wooden 'sated'.
- source_word: רָצוֹן
  chosen: favor
  alternatives:
  - good pleasure
  - acceptance
  - delight
  lexicon: HALOT
  rationale: רָצוֹן here most naturally denotes favor/acceptance bestowed, likely divine favor in parallel with 'the blessing of the LORD.' 'Favor' is concise and natural.
- source_word: וּמָלֵא
  chosen: and full of
  alternatives:
  - and filled with
  lexicon: HALOT
  rationale: Predicate adjective parallel to שׂבע. 'Full of' is the most natural English expression in this coordinate blessing line.
- source_word: בִּרְכַּת יְהוָה
  chosen: the blessing of the LORD
  alternatives:
  - the LORD's blessing
  lexicon: HALOT
  rationale: Construct phrase rendered straightforwardly. The divine name follows project policy as 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יָם
  chosen: the sea
  alternatives:
  - the west
  lexicon: HALOT
  rationale: The noun literally means 'sea.' In some contexts it can function directionally for 'west' because of the Mediterranean, but here the plain lexical sense is retained in the main text, with the directional possibility preserved in a footnote because the phrase may describe territorial extent.
- source_word: וְדָרוֹם
  chosen: and the south
  alternatives:
  - and the southland
  lexicon: HALOT
  rationale: דָרוֹם denotes 'south' or 'south region.' 'The south' is the clearest rendering in parallel with 'the sea.'
- source_word: יְרָשָׁה
  chosen: possess
  alternatives:
  - take possession of
  - inherit
  lexicon: HALOT
  rationale: Imperative/jussive-like blessing language from ירשׁ conveys taking possession of territory. 'Possess' is concise and fits the blessing style; 'inherit' could suggest passive reception more than territorial occupation in English.
