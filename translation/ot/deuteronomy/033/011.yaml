id: DEU.33.11
reference: Deuteronomy 33:11
source:
  edition: WLC
  text: בָּרֵ֤ךְ יְהוָה֙ חֵיל֔/וֹ וּ/פֹ֥עַל יָדָ֖י/ו תִּרְצֶ֑ה מְחַ֨ץ מָתְנַ֧יִם קָמָ֛י/ו וּ/מְשַׂנְאָ֖י/ו מִן יְקוּמֽוּ/ן־׃ס
translation:
  text: Bless, O Yahweh, his strength, and accept the work of his hands. Crush the loins of those who rise against him, and of those who hate him, so that they do not rise again.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his wealth' or 'his army' for 'his strength'; the Hebrew term can denote strength, resources, or military force.
    reason: lexical_alternative
  - marker: b
    text: Literally 'Crush the loins of those who rise against him.' 'Loins' is a Hebrew image for strength.
    reason: cultural_note
lexical_decisions:
- source_word: בָּרֵךְ
  chosen: Bless
  alternatives:
  - Prosper
  lexicon: HALOT
  rationale: Imperative addressed to YHWH. 'Bless' is the direct and natural rendering; 'prosper' is a contextual implication but too interpretive for the main text.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: חֵילוֹ
  chosen: his strength
  alternatives:
  - his substance
  - his wealth
  - his army
  lexicon: HALOT
  rationale: חַיִל can denote strength, wealth, or military force. In this blessing on Levi, the broader request includes divine favor on his capacity and service; 'his strength' best preserves the breadth without narrowing to material wealth or army alone.
- source_word: וּפֹעַל יָדָיו
  chosen: the work of his hands
  alternatives:
  - the labor of his hands
  - what his hands have done
  lexicon: HALOT
  rationale: A common Hebrew expression for one's deeds or labor. 'Work of his hands' is idiomatic in English and preserves the concrete imagery.
- source_word: תִּרְצֶה
  chosen: accept
  alternatives:
  - be pleased with
  - favor
  lexicon: HALOT
  rationale: The verb here asks for divine approval of Levi's service. 'Accept' is concise and fits sacrificial/service contexts without over-specifying.
- source_word: מְחַץ
  chosen: Crush
  alternatives:
  - Strike down
  - Smash
  lexicon: HALOT
  rationale: Imperative of a violent verb meaning to shatter or crush. 'Crush' preserves the force and poetic terseness.
- source_word: מָתְנַיִם
  chosen: the loins
  alternatives:
  - the hips
  - the lower back
  lexicon: HALOT
  rationale: Literally 'loins.' This is a conventional Hebrew image for strength or generative power. Retaining 'loins' preserves the metaphor and the poetic vividness.
- source_word: קָמָיו
  chosen: those who rise against him
  alternatives:
  - his adversaries
  - his attackers
  lexicon: HALOT
  rationale: From קום, 'to rise.' The participial form depicts opponents standing up against him. The fuller phrase preserves the verbal imagery better than the abstract 'adversaries.'
- source_word: וּמְשַׂנְאָיו
  chosen: those who hate him
  alternatives:
  - his haters
  - his enemies
  lexicon: HALOT
  rationale: The participle directly denotes haters. 'Those who hate him' is natural English and keeps the personal hostility explicit.
- source_word: מִן יְקוּמוּן
  chosen: so that they do not rise again
  alternatives:
  - from rising
  - that they may never rise
  lexicon: HALOT
  rationale: 'The construction is elliptical and idiomatic after the prior imperative: the sense is that the enemies be so crushed that they cannot rise again. This makes the implied result explicit in clear English while staying close to the Hebrew sense.'
