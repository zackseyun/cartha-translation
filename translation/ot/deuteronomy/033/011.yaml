theological_decisions:
- issue: Referent of the pronoun 'his/him' in the verse
  chosen_reading: The pronouns refer to Levi, the tribe just blessed in the immediate context.
  alternative_readings:
  - The pronouns could be taken more generally of the priestly servant or of Levi's representative ministry.
  rationale: The immediate literary context is Moses' blessing on Levi (vv. 8–11). Rendering with singular pronouns preserves the Hebrew form without forcing a broader interpretive expansion into the main text.
