id: DEU.33.4
reference: Deuteronomy 33:4
source:
  edition: WLC
  text: תּוֹרָ֥ה צִוָּה לָ֖/נוּ מֹשֶׁ֑ה מוֹרָשָׁ֖ה קְהִלַּ֥ת יַעֲקֹֽב־׃
translation:
  text: Moses commanded a law for us, an inheritance for the assembly of Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Moses commanded us a law, the inheritance of the assembly of Jacob.'
      The Hebrew syntax is compressed and may be read with 'inheritance' in close
      apposition to 'law.'
    reason: alternative_reading
  - marker: b
    text: '''Law'' may also be rendered ''instruction,'' and ''inheritance'' may also
      be rendered ''heritage'' or ''possession.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹרָה
  chosen: law
  alternatives:
  - instruction
  - Torah
  lexicon: HALOT
  rationale: תּוֹרָה can denote instruction broadly or the law more specifically.
    In this covenantal setting, with Moses as the mediator and Israel as the recipient,
    'law' best captures the public, covenantal sense in idiomatic English. 'Torah'
    is possible as a transliteration, but the project prefers translation over transliteration
    for common nouns.
- source_word: צִוָּה
  chosen: commanded
  alternatives:
  - gave
  - charged
  lexicon: HALOT
  rationale: The verb from צוה ordinarily means 'to command.' Although English style
    might prefer 'gave' with 'law,' the Hebrew verb is stronger and should be preserved.
    'Commanded' keeps the force of authoritative transmission.
- source_word: לָנוּ
  chosen: for us
  alternatives:
  - to us
  lexicon: HALOT
  rationale: The preposition ל can be rendered 'to' or 'for' depending on context.
    Here 'for us' reads naturally with 'commanded a law' and conveys that the law
    was given for Israel's possession and obligation.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: מוֹרָשָׁה
  chosen: an inheritance
  alternatives:
  - a possession
  - a heritage
  lexicon: HALOT
  rationale: מוֹרָשָׁה denotes something possessed by hereditary right. 'Inheritance'
    is the most transparent English equivalent and preserves the covenantal sense
    of a received possession. 'Heritage' is possible but slightly more interpretive
    and less concrete.
- source_word: קְהִלַּת
  chosen: the assembly of
  alternatives:
  - the congregation of
  - the community of
  lexicon: HALOT
  rationale: קְהִלָּה refers to the gathered community. 'Assembly' preserves the corporate,
    gathered sense without sounding overly ecclesiastical. 'Congregation' is traditional
    but can suggest later religious institutions in English.
- source_word: יַעֲקֹב
  chosen: Jacob
  alternatives:
  - Israel
  rationale: The Hebrew text explicitly says 'Jacob.' This should be retained rather
    than interpreted as 'Israel,' even though the referent is the covenant people
    descended from Jacob.
