theological_decisions:
- issue: Syntactic relation of the two nominal clauses
  chosen_reading: 'The verse is rendered as two linked assertions: Moses commanded
    a law for Israel, and that law is an inheritance for Jacob''s assembly.'
  alternative_readings:
  - '''Moses commanded us a law, the inheritance of the assembly of Jacob'''
  - '''A law Moses commanded for us, an inheritance for the assembly of Jacob'''
  rationale: 'The Hebrew is verbless in the second half and somewhat compressed. Rendering
    מוֹרָשָׁה as appositional to תּוֹרָה makes good sense: the law is characterized
    as Israel''s inheritance. This preserves the poetic terseness without over-resolving
    the syntax.'
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
