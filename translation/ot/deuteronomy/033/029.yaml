theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: Nuance of גַּאֲוָתֶךָ
  chosen_reading: your majesty
  alternative_readings:
  - your pride
  - your exaltation
  - your glory
  rationale: Because English 'pride' often carries a negative moral sense, 'majesty' better preserves the positive sense of exalted honor in this blessing without importing sinful connotations.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern English'
