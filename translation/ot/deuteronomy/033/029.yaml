id: DEU.33.29
reference: Deuteronomy 33:29
source:
  edition: WLC
  text: אַשְׁרֶ֨י/ךָ יִשְׂרָאֵ֜ל מִ֣י כָמ֗וֹ/ךָ עַ֚ם נוֹשַׁ֣ע בַּֽ/יהוָ֔ה מָגֵ֣ן עֶזְרֶ֔/ךָ וַ/אֲשֶׁר חֶ֖רֶב גַּאֲוָתֶ֑/ךָ וְ/יִכָּֽחֲשׁ֤וּ אֹיְבֶ֨י/ךָ֙ לָ֔/ךְ וְ/אַתָּ֖ה עַל בָּמוֹתֵ֥י/מוֹ תִדְרֹֽךְ־־׃ס
translation:
  text: Blessed are you, Israel! Who is like you, a people saved by Yahweh, the shield of your help and the sword of your majesty? Your enemies will come cringing to you, and you will tread on their high places.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Your enemies will submit deceitfully to you'; the Hebrew verb can suggest forced or feigned submission.
    reason: lexical_alternative
  - marker: b
    text: Or 'you will tread on their heights/strongholds'; some understand 'their backs' here, but 'high places' is the more direct rendering of the Hebrew noun.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֶיךָ
  chosen: Blessed are you
  alternatives:
  - Happy are you
  - How blessed you are
  lexicon: HALOT
  rationale: The plural exclamation אַשְׁרֵי expresses a state of blessedness or enviable happiness. 'Blessed are you' preserves the elevated covenantal tone better than the more colloquial 'happy are you.'
- source_word: מִי כָמוֹךָ
  chosen: Who is like you
  alternatives:
  - Who is like you?
  - Who compares to you
  lexicon: HALOT
  rationale: A conventional rhetorical expression of incomparability. The direct rendering is clear and idiomatic in English.
- source_word: עַם נוֹשַׁע בַּיהוָה
  chosen: a people saved by the LORD
  alternatives:
  - a people being saved by the LORD
  - a people delivered by the LORD
  lexicon: HALOT
  rationale: נוֹשַׁע is a Niphal participle/passive sense, describing Israel as a people characterized by having been saved/delivered by YHWH. 'Saved' is concise and natural; 'delivered' is possible but narrower in English. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מָגֵן עֶזְרֶךָ
  chosen: the shield of your help
  alternatives:
  - your helping shield
  - the shield that helps you
  - your shield and helper
  lexicon: HALOT
  rationale: The construct chain is somewhat compressed. 'The shield of your help' stays close to the Hebrew while remaining intelligible, conveying that the LORD is the protective source of Israel's help. 'Your shield and helper' is smoother but adds coordination not explicit in the text.
- source_word: וַאֲשֶׁר חֶרֶב גַּאֲוָתֶךָ
  chosen: and the sword of your majesty
  alternatives:
  - and who is the sword of your majesty
  - and your majestic sword
  - and the sword of your exaltation
  lexicon: HALOT
  rationale: 'The relative particle with nominal phrase is elliptical. The sense parallels the prior apposition to the LORD: he is also the sword associated with Israel''s exaltation/majesty. גַּאֲוָה can denote exaltation, majesty, or pride; ''majesty'' avoids the negative English sense of ''pride'' and fits the celebratory context.'
- source_word: וְיִכָּחֲשׁוּ אֹיְבֶיךָ לָךְ
  chosen: Your enemies will come cringing to you
  alternatives:
  - Your enemies will submit deceitfully to you
  - Your enemies will cower before you
  lexicon: HALOT
  rationale: כחשׁ in this stem can convey feigned obedience, cringing submission, or coming in denial/deception. In conquest contexts it often implies forced, abject submission. 'Come cringing to you' captures the posture without overexplaining; the nuance of insincere submission is preserved in a footnote.
- source_word: עַל בָּמוֹתֵימוֹ תִדְרֹךְ
  chosen: you will tread on their high places
  alternatives:
  - you will trample their heights
  - you will tread on their backs
  lexicon: HALOT
  rationale: בָּמוֹת usually means high places/heights. In military poetry it can denote the enemy's heights or strongholds; some take it metaphorically as 'backs.' 'High places' is the most direct lexical rendering and preserves the imagery, with the military nuance suitable in context.
