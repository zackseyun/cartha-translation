id: DEU.33.19
reference: Deuteronomy 33:19
source:
  edition: WLC
  text: עַמִּים֙ הַר יִקְרָ֔אוּ שָׁ֖ם יִזְבְּח֣וּ זִבְחֵי צֶ֑דֶק כִּ֣י שֶׁ֤פַע יַמִּים֙
    יִינָ֔קוּ וּ/שְׂפוּנֵ֖י טְמ֥וּנֵי חֽוֹל־־׃ס
translation:
  text: They will call peoples to the mountain; there they will sacrifice righteous
    sacrifices, for they will draw from the abundance of the seas and from the hidden
    treasures of the sand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They will summon peoples to a mountain.' The Hebrew does not specify
      the mountain's identity.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'they will suck the abundance of the seas,' a metaphor for drawing
      sustenance or wealth from the sea.
    reason: lexical_alternative
  - marker: c
    text: Or 'the hidden things/hidden riches of the sand.' The phrase likely refers
      to resources associated with the seashore or sandy regions.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמִּים
  chosen: peoples
  alternatives:
  - nations
  - peoples/tribes
  lexicon: HALOT
  rationale: Plural of עַם refers to multiple peoples/groups, not merely individuals.
    'Peoples' preserves the collective ethnic sense better than 'people' and is more
    neutral than 'nations'.
- source_word: הַר
  chosen: the mountain
  alternatives:
  - a mountain
  - hill-country
  lexicon: HALOT
  rationale: The singular noun with no article in Hebrew can still be definite in
    English by context. 'The mountain' fits the likely cultic or regional reference
    and matches the directional force of the clause better than the more generic 'a
    mountain'.
- source_word: יִקְרָאוּ
  chosen: will call
  alternatives:
  - will summon
  - will invite
  - will proclaim
  lexicon: HALOT
  rationale: קרא commonly means 'call' or 'summon.' 'Will call' is broad enough to
    preserve the ambiguity of whether the sense is invitation, summons, or proclamation.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Simple locative adverb; 'there' is the natural modern English equivalent.
- source_word: יִזְבְּחוּ
  chosen: will sacrifice
  alternatives:
  - will offer
  lexicon: HALOT
  rationale: The verb זבח specifically denotes sacrificial slaughter/offerings. 'Will
    sacrifice' keeps the cultic specificity clearer than the broader 'offer'.
- source_word: זִבְחֵי צֶדֶק
  chosen: righteous sacrifices
  alternatives:
  - sacrifices of righteousness
  - right sacrifices
  lexicon: HALOT
  rationale: The construct phrase can be rendered woodenly as 'sacrifices of righteousness,'
    but 'righteous sacrifices' is clearer in modern English while preserving the idea
    that the sacrifices are fitting/right before God.
- source_word: שֶׁפַע יַמִּים
  chosen: the abundance of the seas
  alternatives:
  - the bounty of the seas
  - the wealth of the seas
  lexicon: HALOT
  rationale: שׁפע denotes abundance/plenty. 'Abundance' is broad enough to include
    produce, trade, and wealth derived from the sea without over-specifying.
- source_word: יִינָקוּ
  chosen: will draw from
  alternatives:
  - will suck
  - will nurse from
  lexicon: HALOT
  rationale: The literal image is 'suck' or 'nurse,' but in English that is awkward
    here. 'Will draw from' preserves the metaphorical sense of deriving sustenance/benefit
    from the seas.
- source_word: וּשְׂפוּנֵי
  chosen: and from the hidden
  alternatives:
  - and the hidden things of
  - and hidden
  lexicon: HALOT
  rationale: From the root צפַן, 'to hide/store up.' In construct with the following
    phrase it points to things concealed or stored up. Rendering with 'from the hidden'
    fits the parallel with 'draw from' and supplies the implied prepositional force
    in English.
- source_word: טְמֻנֵי חוֹל
  chosen: treasures of the sand
  alternatives:
  - hidden things of the sand
  - buried riches of the sand
  lexicon: HALOT
  rationale: טמן conveys hidden/buried things; together with חוֹל ('sand') the phrase
    likely refers to resources associated with the shore or sand. 'Treasures of the
    sand' is idiomatic and preserves the poetic sense without forcing a specific identification.
