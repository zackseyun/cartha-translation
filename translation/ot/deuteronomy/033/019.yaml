theological_decisions:
- issue: Nature of 'righteous sacrifices'
  chosen_reading: Cultically acceptable/right sacrifices, without importing later
    doctrinal categories.
  alternative_readings:
  - sacrifices offered in righteousness
  - victorious/just sacrifices
  rationale: The phrase describes the character of the sacrifices in covenantal worship.
    The translation avoids reading in later theological systems while preserving the
    moral/cultic quality indicated by צֶדֶק.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Referent of 'the mountain'
  chosen_reading: Left generic as 'the mountain' rather than identifying it explicitly
    as Zion, Sinai, or a tribal high place.
  alternative_readings:
  - Mount Zion
  - a mountain sanctuary
  - their mountain territory
  rationale: The Hebrew text itself does not specify which mountain. Naming a specific
    mountain in the main text would over-interpret the blessing.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    ambiguity where the source is not explicit.
