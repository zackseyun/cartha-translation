id: DEU.33.20
reference: Deuteronomy 33:20
source:
  edition: WLC
  text: וּ/לְ/גָ֣ד אָמַ֔ר בָּר֖וּךְ מַרְחִ֣יב גָּ֑ד כְּ/לָבִ֣יא שָׁכֵ֔ן וְ/טָרַ֥ף
    זְר֖וֹעַ אַף קָדְקֹֽד־׃
translation:
  text: 'And of Gad he said: “Blessed is the one who enlarges Gad. He dwells like
    a lioness, and tears off arm, even scalp.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Blessed be he who enlarges Gad'; the subject may be understood implicitly
      as God, though the Hebrew does not state it explicitly.
    reason: alternative_reading
  - marker: b
    text: '''Like a lioness'' may also be rendered ''like a lion''; the Hebrew term
      can denote a powerful lion more generally.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'arm, even crown of the head.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְגָד
  chosen: And of Gad
  alternatives:
  - And for Gad
  - Concerning Gad
  lexicon: HALOT
  rationale: Introduces the tribal oracle directed toward Gad. 'Of Gad' is idiomatic
    in English for the formula 'and to/of Gad he said.'
- source_word: אָמַר
  chosen: he said
  alternatives:
  - he declared
  lexicon: HALOT
  rationale: Standard narrative introduction to Moses' blessing speech.
- source_word: בָּרוּךְ
  chosen: Blessed
  alternatives:
  - May ... be blessed
  lexicon: HALOT
  rationale: Predicate adjective/exclamation introducing a blessing. Kept as a declarative
    blessing rather than converting to a wish-prayer.
- source_word: מַרְחִיב
  chosen: the one who enlarges
  alternatives:
  - he who makes room for
  - the one who broadens
  lexicon: HALOT
  rationale: From רחב in the Hiphil, conveying making spacious, enlarging, or giving
    room. The participial sense suits 'the one who enlarges.'
- source_word: גָּד
  chosen: Gad
  lexicon: HALOT
  rationale: Proper tribal name, transliterated per translation philosophy.
- source_word: כְּלָבִיא
  chosen: like a lioness
  alternatives:
  - like a lion
  - like a lioness/lion
  lexicon: HALOT
  rationale: לָבִיא commonly denotes a lion/lioness; many contexts suggest a mature,
    powerful lion, often specifically lioness. 'Lioness' preserves the lexical nuance
    more closely, while the simile emphasizes predatory strength.
- source_word: שָׁכֵן
  chosen: He dwells
  alternatives:
  - He lies down
  - He settles
  lexicon: HALOT
  rationale: The verb can mean dwell, settle, or lie/rest in place. 'Dwells' fits
    the tribal-territorial imagery while still allowing the lion simile.
- source_word: וְטָרַף
  chosen: and tears off
  alternatives:
  - and tears
  - and preys upon
  lexicon: HALOT
  rationale: טרף is predatory tearing. 'Tears off' captures the violent image and
    works naturally with the following body parts.
- source_word: זְרוֹעַ
  chosen: arm
  alternatives:
  - forearm
  - strength
  lexicon: HALOT
  rationale: Literal body-part imagery is most likely here in parallel with 'scalp/head-crown,'
    not a metaphorical abstraction.
- source_word: אַף
  chosen: even
  alternatives:
  - yes, even
  - also
  lexicon: HALOT
  rationale: 'Used as an additive/intensifying particle, heightening the image: not
    only arm but even scalp.'
- source_word: קָדְקֹד
  chosen: scalp
  alternatives:
  - crown of the head
  - head
  lexicon: HALOT
  rationale: Refers specifically to the crown/top of the head. 'Scalp' preserves the
    violent predatory imagery in concise modern English.
