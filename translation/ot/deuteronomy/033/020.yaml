theological_decisions:
- issue: Referent of 'the one who enlarges Gad'
  chosen_reading: A general blessing on the one who gives Gad spacious territory or
    expansion, without specifying God explicitly in the English wording.
  alternative_readings:
  - Blessed be he who enlarges Gad, with God understood as the subject
  - Blessed is Gad, the enlarged one
  rationale: The Hebrew participle מַרְחִיב can be read as referring implicitly to
    God as the blesser/enlarger, but the text does not name the subject explicitly.
    The translation preserves that openness rather than resolving it into an explicit
    divine title not present in the Hebrew.
  doctrine_reference: Preserve theological tension rather than resolve it.
