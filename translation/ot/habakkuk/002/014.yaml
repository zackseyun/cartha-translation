- issue: Scope of הָאָרֶץ
  chosen_reading: universal 'earth' rather than localized 'land'
  alternative_readings:
  - the land
  rationale: The verse presents an expansive eschatological vision of the LORD's glory being known universally. Rendering אֶרֶץ as 'earth' preserves that scope and avoids artificially narrowing the promise to a regional referent.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve the source text''s plain sense.'
