id: HAB.2.14
reference: Habakkuk 2:14
source:
  edition: WLC
  text: כִּ֚י תִּמָּלֵ֣א הָ/אָ֔רֶץ לָ/דַ֖עַת אֶת כְּב֣וֹד יְהוָ֑ה כַּ/מַּ֖יִם יְכַסּ֥וּ עַל יָֽם־־׃ס
translation:
  text: For the earth will be filled with the knowledge of the glory of Yahweh, as the waters cover the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land,' if taken in a more localized sense; here 'the earth' is preferred because the verse's scope appears universal.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding judgment context. 'For' preserves the connective force in natural English better than the more emphatic 'Indeed' or the more narrowly causal 'Because'.
- source_word: תִּמָּלֵא
  chosen: will be filled
  alternatives:
  - shall be full
  - will become full
  lexicon: HALOT
  rationale: 'Niphal imperfect of מלא is best rendered as a future passive/resultative: ''will be filled.'' This is idiomatic and preserves the verbal sense without over-paraphrase.'
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: Although אֶרֶץ can mean 'land,' the scope here is universal, especially in the comparison with waters covering the sea and in the broader prophetic vision. 'The earth' best reflects the intended global horizon.
- source_word: לָדַעַת
  chosen: with the knowledge of
  alternatives:
  - with knowledge of
  - to know
  lexicon: HALOT
  rationale: The infinitive construct with ל after 'be filled' yields the sense 'be filled with the knowledge of.' Including the article in English ('the knowledge of') reflects the construct phrase naturally and preserves the substantive force of דעת.
- source_word: כְּבוֹד
  chosen: glory
  alternatives:
  - honor
  - majesty
  lexicon: HALOT
  rationale: '''Glory'' is the standard and most theologically resonant rendering for כבוד in reference to the LORD. ''Honor'' or ''majesty'' capture aspects of meaning but are narrower here.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כַּמַּיִם
  chosen: as the waters
  alternatives:
  - like waters
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'As the waters' gives a smooth and elevated English simile while preserving the definite noun.
- source_word: יְכַסּוּ
  chosen: cover
  alternatives:
  - will cover
  - flood over
  lexicon: HALOT
  rationale: 'The imperfect in the simile can be rendered generically in English: ''as the waters cover the sea.'' This avoids an awkward future-within-comparison while preserving the ongoing, characteristic sense.'
- source_word: עַל יָם
  chosen: the sea
  alternatives:
  - over the sea
  - upon the sea
  lexicon: HALOT
  rationale: The Hebrew literally has 'upon/over the sea,' but in English the idiom is simply 'cover the sea.' This is a minimal smoothing for readability, not a substantive change.
