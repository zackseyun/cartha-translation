id: HAB.2.20
reference: Habakkuk 2:20
source:
  edition: WLC
  text: וַֽ/יהוָ֖ה בְּ/הֵיכַ֣ל קָדְשׁ֑/וֹ הַ֥ס מִ/פָּנָ֖י/ו כָּל הָ/אָֽרֶץ־׃פ
translation:
  text: But the LORD is in his holy temple; let all the earth be silent before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Yahweh' for 'the LORD.'
    reason: alternative_reading
  - marker: b
    text: Or 'keep silence' or 'hush' before him.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'all the earth'; possibly 'the whole land' in a narrower contextual
      sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיהוָה
  chosen: But the LORD
  alternatives:
  - And the LORD
  - Now the LORD
  - But Yahweh
  lexicon: HALOT
  rationale: The prefixed conjunction can be rendered in context as adversative ('but'),
    contrasting the LORD with the lifeless idols described in the preceding verse.
    Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: בְּהֵיכַל קָדְשׁוֹ
  chosen: is in his holy temple
  alternatives:
  - is in his sacred palace
  - is in his holy sanctuary
  lexicon: HALOT
  rationale: הֵיכָל can denote temple, palace, or sanctuary; here 'temple' best fits
    prophetic worship language and the contrast with idol shrines. קָדְשׁוֹ is a genitive
    construction with suffix, naturally rendered 'his holy temple.' The verbless clause
    is idiomatically supplied with 'is' in English.
- source_word: הַס
  chosen: be silent
  alternatives:
  - hush
  - keep silence
  - be still
  lexicon: HALOT
  rationale: This interjection functions as a command for reverent silence. 'Be silent'
    is clear modern English and preserves the solemn force better than the more abrupt
    'hush' or potentially broader 'be still.'
- source_word: מִפָּנָיו
  chosen: before him
  alternatives:
  - before his face
  - from before him
  lexicon: HALOT
  rationale: The idiom literally involves 'face/presence,' but in English 'before
    him' naturally conveys standing in his presence. This preserves the relational
    and reverential sense without awkward literalism.
- source_word: כָּל הָאָרֶץ
  chosen: all the earth
  alternatives:
  - the whole earth
  - all the land
  lexicon: HALOT
  rationale: אָרֶץ here is best taken globally, not as 'land' of Israel alone, since
    the summons is universal in scope and climactic in the oracle. 'All the earth'
    is the most natural and traditional English rendering.
