theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of הֵיכָל in relation to God's dwelling
  chosen_reading: temple
  alternative_readings:
  - palace
  - sanctuary
  rationale: The verse emphasizes the LORD's enthroned holiness over against mute
    idols. 'Temple' preserves the cultic and reverential setting without forcing a
    narrower denominational reading about a specific heavenly or earthly locale.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it'
