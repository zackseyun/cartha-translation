theological_decisions:
- issue: Nature of the denunciation
  chosen_reading: A prophetic woe against violent and unjust empire-building
  alternative_readings:
  - A general lament over civic corruption
  rationale: The verse condemns constructing and securing civic power through bloodshed
    and injustice. The translation preserves the moral indictment without narrowing
    it to a specific later theological system or softening the violence.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    without importing doctrinal claims'
