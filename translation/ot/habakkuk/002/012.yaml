id: HAB.2.12
reference: Habakkuk 2:12
source:
  edition: WLC
  text: ה֛וֹי בֹּנֶ֥ה עִ֖יר בְּ/דָמִ֑ים וְ/כוֹנֵ֥ן קִרְיָ֖ה בְּ/עַוְלָֽה׃
translation:
  text: Woe to him who builds a city with bloodshed and establishes a town by injustice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'with bloods,' an idiom for bloodshed or bloodguilt.
    reason: lexical_alternative
  - marker: b
    text: Or 'founds a city' for 'establishes a town.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  chosen: Woe
  alternatives:
  - Alas
  lexicon: HALOT
  rationale: An interjection of denunciation or lament introducing an oracle of judgment.
    'Woe' is the standard concise English equivalent and preserves the prophetic force
    better than the softer 'Alas.'
- source_word: בֹּנֶה
  chosen: builds
  alternatives:
  - is building
  - buildeth
  lexicon: HALOT
  rationale: 'Qal participle functioning substantivally/descriptively: ''the one who
    builds.'' English idiom is best served by ''who builds'' after the implied referent
    introduced by ''Woe to him.'''
- source_word: עִיר
  chosen: city
  alternatives:
  - town
  lexicon: HALOT
  rationale: Standard term for a city. Since the following קִרְיָה is a near-synonym,
    varying the English there helps reflect the Hebrew parallelism without obscuring
    meaning.
- source_word: בְּדָמִים
  chosen: with bloodshed
  alternatives:
  - by blood
  - with blood
  - through bloodshed
  lexicon: HALOT
  rationale: The plural 'bloods' in Hebrew often denotes bloodguilt or acts of violence.
    'With bloodshed' communicates the instrumental sense and the idiomatic meaning
    more clearly than the overly literal 'with blood.'
- source_word: וְכוֹנֵן
  chosen: and establishes
  alternatives:
  - and founds
  - and sets up
  - and makes secure
  lexicon: HALOT
  rationale: The verb carries the sense of setting up firmly or establishing. 'Establishes'
    fits the parallel with 'builds' and conveys durable civic construction.
- source_word: קִרְיָה
  chosen: town
  alternatives:
  - city
  - settlement
  lexicon: HALOT
  rationale: A near-synonym of עִיר. Rendering it as 'town' preserves the poetic parallelism
    in natural English while signaling lexical variation in the Hebrew.
- source_word: בְּעַוְלָה
  chosen: by injustice
  alternatives:
  - by wrong
  - by unrighteousness
  - through injustice
  lexicon: HALOT
  rationale: The noun denotes injustice, wrong, or unrighteousness. 'By injustice'
    is clear modern English and matches the instrumental preposition, highlighting
    the corrupt means by which the town is established.
