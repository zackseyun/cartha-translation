id: HAB.2.9
reference: Habakkuk 2:9
source:
  edition: WLC
  text: ה֗וֹי בֹּצֵ֛עַ בֶּ֥צַע רָ֖ע לְ/בֵית֑/וֹ לָ/שׂ֤וּם בַּ/מָּרוֹם֙ קִנּ֔/וֹ לְ/הִנָּצֵ֖ל
    מִ/כַּף רָֽע־׃
translation:
  text: Woe to him who gains evil profit for his house, to set his nest on high, to
    escape from the grasp of harm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unjust gain,' 'dishonest gain,' or 'wicked gain.' The Hebrew expression
      refers to profit acquired through wrongdoing.
    reason: lexical_alternative
  - marker: b
    text: Literally 'his nest.' The image is of making oneself unreachable, like a
      bird nesting high above danger.
    reason: cultural_note
  - marker: c
    text: Literally 'from the palm/hand of harm'—that is, from the reach or power
      of disaster.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  chosen: Woe
  alternatives:
  - Ah
  - Alas
  lexicon: HALOT
  rationale: Introduces a prophetic denunciation. 'Woe' is the standard and suitably
    weighty English equivalent in judgment oracles.
- source_word: בֹּצֵעַ
  chosen: gains
  alternatives:
  - cuts off for oneself
  - gets by plundering
  - covets
  lexicon: HALOT
  rationale: From בצע in the sense of acquiring by unjust gain. 'Gains' is idiomatic
    in English and pairs naturally with the following noun while preserving the active
    participial force.
- source_word: בֶּצַע רָע
  chosen: evil profit
  alternatives:
  - unjust gain
  - dishonest gain
  - wicked gain
  lexicon: HALOT
  rationale: The collocation denotes profit obtained through wrongdoing. 'Evil profit'
    stays close to the Hebrew while remaining intelligible; the moral quality belongs
    to the gain itself, not merely to the manner.
- source_word: לְבֵיתוֹ
  chosen: for his house
  alternatives:
  - for his household
  - for his dynasty
  lexicon: HALOT
  rationale: בַּיִת can mean house, household, or dynasty. Here the immediate sense
    is building security and advantage for one's own house; 'house' preserves the
    Hebrew's breadth and allows both household and estate overtones.
- source_word: לָשׂוּם
  chosen: to set
  alternatives:
  - to place
  - to establish
  lexicon: HALOT
  rationale: Infinitive of purpose. 'To set' is simple and natural before 'his nest
    on high.'
- source_word: בַּמָּרוֹם
  chosen: on high
  alternatives:
  - in the height
  - in a high place
  lexicon: HALOT
  rationale: Expresses elevated placement for security. 'On high' is idiomatic and
    preserves the metaphorical elevation.
- source_word: קִנּוֹ
  chosen: his nest
  alternatives:
  - his lair
  - his dwelling
  lexicon: HALOT
  rationale: The Hebrew literally means 'nest,' evoking a bird placing its nest beyond
    reach. The metaphor should be preserved rather than flattened.
- source_word: לְהִנָּצֵל
  chosen: to escape
  alternatives:
  - to be delivered
  - to save himself
  lexicon: HALOT
  rationale: Niphal infinitive expressing intended result or purpose. 'To escape'
    fits the context of seeking safety by elevation.
- source_word: מִכַּף
  chosen: from the grasp of
  alternatives:
  - from the hand of
  - from the power of
  lexicon: HALOT
  rationale: כַּף literally means 'palm/hand,' but in this idiom it denotes controlling
    power or reach. 'Grasp of' communicates the image clearly in modern English.
- source_word: רָע
  chosen: harm
  alternatives:
  - evil
  - disaster
  - calamity
  lexicon: HALOT
  rationale: In this context the sense is the threatening evil or disaster from which
    the oppressor seeks protection. 'Harm' reads naturally with 'grasp of' and avoids
    implying abstract moral evil alone.
