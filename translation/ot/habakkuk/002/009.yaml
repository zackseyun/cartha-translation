theological_decisions:
- issue: Scope of 'house' (בַּיִת)
  chosen_reading: Rendered 'house' rather than narrowing to 'household' or 'dynasty.'
  alternative_readings:
  - household
  - dynasty
  rationale: The verse condemns unjust gain used to secure one's own sphere of safety
    and status. 'House' preserves the Hebrew's semantic range and avoids over-interpreting
    the social unit in view.
  doctrine_reference: Translation philosophy §5
- issue: Metaphorical imagery of 'nest'
  chosen_reading: Preserved the metaphor 'his nest on high.'
  alternative_readings:
  - his home in a high place
  - his stronghold aloft
  rationale: Optimal equivalence favors retaining vivid source-language imagery where
    understandable. The metaphor is central to the taunt against false security and
    should not be paraphrased away.
  doctrine_reference: Translation philosophy §1, §6
