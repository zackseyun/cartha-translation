id: HAB.2.4
reference: Habakkuk 2:4
source:
  edition: WLC
  text: הִנֵּ֣ה עֻפְּלָ֔ה לֹא יָשְׁרָ֥ה נַפְשׁ֖/וֹ בּ֑/וֹ וְ/צַדִּ֖יק בֶּ/אֱמוּנָת֥/וֹ
    יִחְיֶֽה־׃
translation:
  text: 'Look: his soul is puffed up; it is not upright within him, but the righteous
    will live by his faithfulness.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the righteous will live by his faith.' The Hebrew אֱמוּנָה can denote
      faithfulness, steadfastness, or faith.
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces an emphatic deictic attention marker. 'Look' is natural modern
    English and preserves the force without archaic tone.
- source_word: עֻפְּלָה
  chosen: is puffed up
  alternatives:
  - is swollen
  - is proud
  lexicon: HALOT
  rationale: The form conveys swelling or puffing up, metaphorically arrogance. 'Is
    puffed up' preserves the image better than the more interpretive 'is proud'.
- source_word: לֹא יָשְׁרָה
  chosen: it is not upright
  alternatives:
  - it is not straight
  - it is not right
  lexicon: HALOT
  rationale: The predicate describes moral straightness/uprightness. 'Upright' captures
    the ethical sense more clearly than the more literal 'straight'.
- source_word: נַפְשׁוֹ
  chosen: his soul
  alternatives:
  - his life
  - his inner self
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote soul, life, or self. Here, in parallel with inward
    moral condition, 'soul' best preserves the anthropological and moral force, while
    alternatives are viable.
- source_word: בּוֹ
  chosen: within him
  alternatives:
  - in him
  lexicon: HALOT
  rationale: The preposition marks internal location. 'Within him' makes the inward
    sense idiomatic in English.
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - the righteous one
  - the just
  lexicon: HALOT
  rationale: Substantival adjective referring to a righteous person or class. 'The
    righteous' is idiomatic and preserves the representative singular/class sense.
- source_word: בֶּאֱמוּנָתוֹ
  chosen: by his faithfulness
  alternatives:
  - by his faith
  - by his steadfastness
  lexicon: HALOT
  rationale: אֱמוּנָה can denote faithfulness, steadiness, or faith. In Hebrew usage
    here, the sense of steadfast fidelity is strong, and this best fits the contrast
    with the puffed-up one. Because of later interpretive significance and possible
    ambiguity, 'faith' is preserved in a footnote.
- source_word: יִחְיֶה
  chosen: will live
  alternatives:
  - will survive
  - will have life
  lexicon: HALOT
  rationale: The verb broadly denotes living. 'Will live' preserves the concise Hebrew
    and allows both immediate and broader theological resonance without over-specifying.
