theological_decisions:
- issue: Meaning of אֱמוּנָה in the righteous person's manner of life
  chosen_reading: faithfulness
  alternative_readings:
  - faith
  rationale: The Hebrew term commonly carries the sense of firmness, fidelity, or
    steadfastness, and in this prophetic contrast it naturally opposes the arrogant,
    unstable person. At the same time, because the phrase is later cited in ways that
    foreground 'faith,' the alternative should be preserved in a footnote rather than
    erased. This follows the instruction to preserve theological tension rather than
    resolve genuine ambiguity.
  doctrine_reference: DOCTRINE.md Translation philosophy §3; Contested terms table
    for πίστις by analogy of faith/faithfulness tension
