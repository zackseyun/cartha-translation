theological_decisions:
- issue: Referent of the pronouns in the second half of the verse
  chosen_reading: The pronouns refer primarily to the vision and its fulfillment,
    rendered as 'it.'
  alternative_readings:
  - The pronouns may be read more personally ('him'), as reflected in some ancient
    versions and in Hebrews 10:37's application.
  rationale: In the Hebrew context, the nearest antecedent is חָזוֹן ('vision'), a
    masculine singular noun, so 'it' best reflects the source text in context. A personal
    rendering has theological significance in later reception history, but the translation
    should not import that into Habakkuk's main text. The alternative is preserved
    in a footnote to maintain transparency.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
