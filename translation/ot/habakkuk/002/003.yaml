id: HAB.2.3
reference: Habakkuk 2:3
source:
  edition: WLC
  text: כִּ֣י ע֤וֹד חָזוֹן֙ לַ/מּוֹעֵ֔ד וְ/יָפֵ֥חַ לַ/קֵּ֖ץ וְ/לֹ֣א יְכַזֵּ֑ב אִם
    יִתְמַהְמָהּ֙ חַכֵּה ל֔/וֹ כִּֽי בֹ֥א יָבֹ֖א לֹ֥א יְאַחֵֽר־־־׃
translation:
  text: For the vision is still for the appointed time; it hastens toward the end
    and will not lie. If it delays, wait for it, for it will surely come; it will
    not be late.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If he delays, wait for him.' The Hebrew pronoun can be rendered personally,
      though in context it most naturally refers to 'the vision.' Hebrews 10:37 applies
      the line in a personal way.
    reason: alternative_reading
  - marker: b
    text: Or 'it pants toward the end' / 'it speaks of the end.' The Hebrew verb is
      difficult; the main text conveys the sense that the vision moves urgently toward
      its appointed fulfillment.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָזוֹן
  chosen: vision
  alternatives:
  - revelation
  - oracle
  lexicon: HALOT
  rationale: Standard rendering for prophetic sight/revelation. 'Vision' fits the
    immediate context of what Habakkuk is to write and await.
- source_word: לַמּוֹעֵד
  chosen: for the appointed time
  alternatives:
  - for the appointed time/season
  - for the set time
  lexicon: HALOT
  rationale: מוֹעֵד denotes a fixed or appointed time. 'Appointed time' preserves
    the sense of divine scheduling better than a vaguer 'time.'
- source_word: וְיָפֵחַ
  chosen: it hastens
  alternatives:
  - it pants toward
  - it speaks of
  - it presses on toward
  lexicon: HALOT
  rationale: The verb is difficult and has been understood as breathing/panting toward
    an end, hence moving urgently toward fulfillment. 'It hastens' gives clear modern
    English while preserving the sense of eager movement toward completion.
- source_word: לַקֵּץ
  chosen: toward the end
  alternatives:
  - for the end
  - to the end
  lexicon: HALOT
  rationale: קֵץ here refers to the point of fulfillment/termination. 'Toward the
    end' works naturally with the motion implied by ויפח.
- source_word: וְלֹא יְכַזֵּב
  chosen: and will not lie
  alternatives:
  - and will not prove false
  - and will not disappoint
  lexicon: HALOT
  rationale: The Hebrew verb means to lie or prove deceptive/false. 'Will not lie'
    is direct and preserves the personified force of the vision.
- source_word: אִם יִתְמַהְמָהּ
  chosen: If it delays
  alternatives:
  - If it lingers
  - If it seems slow
  lexicon: HALOT
  rationale: The verb conveys tarrying or delaying. 'If it delays' is concise and
    idiomatic, matching the apparent postponement of fulfillment.
- source_word: חַכֵּה לוֹ
  chosen: wait for it
  alternatives:
  - wait for him
  - await it
  lexicon: HALOT
  rationale: The pronominal suffix is masculine singular and most naturally refers
    back to 'the vision.' English uses 'it' for this antecedent. Because some interpreters
    take the referent more personally or messianically, that alternative is preserved
    in a footnote.
- source_word: כִּי בֹא יָבֹא
  chosen: for it will surely come
  alternatives:
  - for coming it will come
  - for it will indeed come
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies certainty. 'Will
    surely come' is the standard English way to preserve that emphasis.
- source_word: לֹא יְאַחֵר
  chosen: it will not be late
  alternatives:
  - it will not delay
  - it will not tarry
  lexicon: HALOT
  rationale: The verb means to be late/delay. Since the previous clause already used
    'delay,' 'be late' avoids awkward repetition while preserving the sense that the
    fulfillment will arrive exactly on time.
