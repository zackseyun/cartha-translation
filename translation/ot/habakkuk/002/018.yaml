theological_decisions:
- issue: Nature of the idol as 'teacher of lies'
  chosen_reading: The idol is described metaphorically as instructing falsehood through
    its deceptive religious function.
  alternative_readings:
  - The craftsman/false prophet is the teacher of lies rather than the image itself.
  rationale: The syntax most naturally apposes 'a cast image' and 'a teacher of lies,'
    both describing the idol. This preserves the prophetic mockery without importing
    a broader doctrinal claim.
