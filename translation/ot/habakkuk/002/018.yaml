id: HAB.2.18
reference: Habakkuk 2:18
source:
  edition: WLC
  text: מָֽה הוֹעִ֣יל פֶּ֗סֶל כִּ֤י פְסָל/וֹ֙ יֹֽצְר֔/וֹ מַסֵּכָ֖ה וּ/מ֣וֹרֶה שָּׁ֑קֶר
    כִּ֣י בָטַ֞ח יֹצֵ֤ר יִצְר/וֹ֙ עָלָ֔י/ו לַ/עֲשׂ֖וֹת אֱלִילִ֥ים אִלְּמִֽים־׃ס
translation:
  text: What profit is an idol when its maker has carved it— a cast image, and a teacher
    of lies? For its maker trusts in his own handiwork, making mute idols.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a carved image'; 'idol' makes explicit that the carved object is an
      object of false worship.
    reason: lexical_alternative
  - marker: b
    text: Or 'a molten image.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'teacher of lies,' likely personifying the idol as something that
      misleads its worshipers.
    reason: lexical_alternative
  - marker: d
    text: אֱלִילִים can carry the sense 'worthless idols' or 'nothings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה הוֹעִיל
  chosen: What profit is
  alternatives:
  - What use is
  - What benefit is
  lexicon: HALOT
  rationale: The interrogative plus Hiphil of יעל asks about usefulness or benefit.
    'What profit is' is idiomatic, concise, and preserves the rhetorical force of
    the Hebrew.
- source_word: פֶּסֶל
  chosen: an idol
  alternatives:
  - a carved image
  - a graven image
  lexicon: HALOT
  rationale: פֶּסֶל denotes an idol-image, often carved. 'Idol' communicates the referent
    clearly in modern English; the carving aspect is then expressed explicitly by
    the following verb.
- source_word: כִּי פְסָלוֹ יֹצְרוֹ
  chosen: when its maker has carved it
  alternatives:
  - for its maker carved it
  - since its maker formed it
  lexicon: HALOT
  rationale: Here כִּי is best taken as explanatory, introducing the absurdity of
    the idol's origin. 'When' works naturally in English after the rhetorical question,
    while 'maker has carved it' preserves the artisan-source emphasis.
- source_word: יֹצְרוֹ
  chosen: its maker
  alternatives:
  - its shaper
  - its former
  lexicon: HALOT
  rationale: The participial/noun form from יצר refers to the one who forms or fashions.
    'Maker' is natural English and fits the polemical contrast between creator and
    created object.
- source_word: מַסֵּכָה
  chosen: a cast image
  alternatives:
  - a molten image
  - an image of metal
  lexicon: HALOT
  rationale: מַסֵּכָה commonly refers to an image made by casting metal. 'Cast image'
    is accurate and readable; 'molten image' is more traditional but less natural
    in contemporary English.
- source_word: וּמוֹרֶה שָּׁקֶר
  chosen: and a teacher of lies
  alternatives:
  - and a false teacher
  - and a lie-teacher
  - and a teacher of falsehood
  lexicon: HALOT
  rationale: The phrase personifies the idol as instructing falsely. 'Teacher of lies'
    preserves the metaphor and the genitive force better than flattening it to 'false
    teacher.'
- source_word: כִּי בָטַח
  chosen: For ... trusts
  alternatives:
  - Because ... trusts
  - For ... has trusted
  lexicon: HALOT
  rationale: This כִּי introduces the reason for the denunciation. 'For' preserves
    the explanatory connection and suits the prophetic style.
- source_word: יֹצֵר יִצְרוֹ
  chosen: its maker ... in his own handiwork
  alternatives:
  - the one who formed it ... in what he formed
  - its fashioner ... in his creation
  lexicon: HALOT
  rationale: 'The Hebrew uses cognate terms to stress irony: the former trusts in
    the thing formed. Rendering the second term as ''handiwork'' avoids awkward repetition
    while preserving the wordplay in sense.'
- source_word: עָלָיו
  chosen: in
  alternatives:
  - upon it
  - on it
  lexicon: HALOT
  rationale: With בטח, English idiom is 'trust in.' The Hebrew preposition is retained
    in sense rather than woodenly reproduced.
- source_word: לַעֲשׂוֹת
  chosen: making
  alternatives:
  - to make
  - so as to make
  lexicon: HALOT
  rationale: The infinitive expresses result or purpose. 'Making' fits the English
    sentence flow and keeps the ongoing artisan action in view.
- source_word: אֱלִילִים
  chosen: idols
  alternatives:
  - worthless idols
  - nothings
  lexicon: HALOT
  rationale: אֱלִילִים often carries the sense of worthless gods/idols. 'Idols' is
    the clearest main-text rendering; the pejorative nuance is already reinforced
    by the context and can be noted as an alternative.
- source_word: אִלְּמִים
  chosen: mute
  alternatives:
  - speechless
  - dumb
  lexicon: HALOT
  rationale: The adjective means unable to speak. 'Mute' is accurate and avoids the
    misleading modern connotations of 'dumb.'
