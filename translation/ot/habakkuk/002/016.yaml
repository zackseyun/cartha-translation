id: HAB.2.16
reference: Habakkuk 2:16
source:
  edition: WLC
  text: שָׂבַ֤עְתָּ קָלוֹן֙ מִ/כָּב֔וֹד שְׁתֵ֥ה גַם אַ֖תָּה וְ/הֵֽעָרֵ֑ל תִּסּ֣וֹב
    עָלֶ֗י/ךָ כּ֚וֹס יְמִ֣ין יְהוָ֔ה וְ/קִיקָל֖וֹן עַל כְּבוֹדֶֽ/ךָ־־׃
translation:
  text: You have had your fill of shame instead of glory. Drink, you also, and show
    your uncircumcision! The cup from the LORD’s right hand will come around to you,
    and utter disgrace will be upon your glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be exposed as uncircumcised'; the Hebrew likely uses bodily/covenantal
      shame imagery of public exposure.
    reason: lexical_alternative
  - marker: b
    text: The rare term rendered 'utter disgrace' may carry the more graphic sense
      'shameful spewing' or 'vomit-disgrace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂבַעְתָּ
  chosen: have had your fill
  alternatives:
  - are filled
  - have been sated
  lexicon: HALOT
  rationale: The verb שׂבע in the qal commonly means to be sated or filled. In context
    it is idiomatic with an abstract object ('shame'), so 'have had your fill' conveys
    completed saturation in natural English while preserving the metaphor.
- source_word: קָלוֹן
  chosen: shame
  alternatives:
  - disgrace
  - dishonor
  lexicon: HALOT
  rationale: קָלוֹן denotes public shame/disgrace. 'Shame' fits the contrast with
    'glory' and keeps the terse force of the Hebrew.
- source_word: מִכָּבוֹד
  chosen: instead of glory
  alternatives:
  - rather than glory
  - more than glory
  - from glory
  lexicon: HALOT
  rationale: 'The preposition מִן here marks contrast rather than source, yielding
    ''instead of glory.'' This best captures the reversal theme: the addressee receives
    shame in place of the honor sought.'
- source_word: שְׁתֵה גַם אַתָּה
  chosen: Drink, you also
  alternatives:
  - Drink, even you
  - Drink, you too
  lexicon: HALOT
  rationale: An imperative of drinking continues the cup/judgment imagery from the
    context. 'You also' preserves the emphatic inclusion of the oppressor in the judgment
    he imposed on others.
- source_word: וְהֵעָרֵל
  chosen: show your uncircumcision
  alternatives:
  - be exposed as uncircumcised
  - stagger in nakedness
  lexicon: HALOT
  rationale: The Niphal/related form from ערל is difficult, but in context it points
    to exposure in shame, literally in terms of uncircumcision. 'Show your uncircumcision'
    preserves the concrete, humiliating imagery without over-paraphrasing. Because
    the phrase is culturally loaded and has interpretive alternatives, an explanatory
    footnote preserves the nuance.
- source_word: תִּסּוֹב עָלֶיךָ
  chosen: will come around to you
  alternatives:
  - will turn upon you
  - will pass to you
  lexicon: HALOT
  rationale: סבב here describes the cup turning or coming around to the addressee.
    'Will come around to you' preserves the image of a cup passed in sequence while
    implying reversal of judgment.
- source_word: כּוֹס יְמִין יְהוָה
  chosen: the cup from the LORD’s right hand
  alternatives:
  - the cup of the LORD’s right hand
  - the cup in the LORD’s right hand
  lexicon: HALOT
  rationale: The phrase denotes the cup administered by the LORD in judgment. 'From
    the LORD’s right hand' makes the source and agency clear in idiomatic English.
    Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name.
- source_word: וְקִיקָלוֹן
  chosen: utter disgrace
  alternatives:
  - vomit-shame
  - foul disgrace
  - shameful spewing
  lexicon: HALOT
  rationale: This rare noun is commonly understood as an intensive or compound expression
    associated with disgrace, possibly with imagery of vomit. 'Utter disgrace' gives
    a readable main-text rendering, while a footnote preserves the more graphic lexical
    alternative.
- source_word: עַל כְּבוֹדֶךָ
  chosen: will be upon your glory
  alternatives:
  - upon your honor
  - over your glory
  lexicon: HALOT
  rationale: Retaining 'glory' preserves the deliberate contrast with the earlier
    'shame instead of glory.' The preposition עַל is rendered straightforwardly as
    'upon.'
