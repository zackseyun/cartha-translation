theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render the covenant name as 'the LORD,' following
    the stated doctrine and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Retention of circumcision imagery in judgment language
  chosen_reading: show your uncircumcision
  alternative_readings:
  - be exposed as uncircumcised
  - stagger in nakedness
  rationale: The Hebrew uses culturally and covenantally charged bodily shame imagery.
    The translation preserves the concrete wording rather than softening it, while
    a footnote notes the exposure/shame nuance. This avoids importing later theological
    conclusions while keeping the prophetic force.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
