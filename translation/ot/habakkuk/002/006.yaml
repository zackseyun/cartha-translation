theological_decisions:
- issue: Interpretation of the rare term עַבְטִיט
  chosen_reading: 'economic image: ''pledged goods'''
  alternative_readings:
  - '''thick clay'''
  rationale: This is primarily a lexical-contextual decision rather than a doctrinal
    one. In context, the woe targets exploitative accumulation and debt-like exactions,
    so an economic rendering best fits the oracle. Because 'thick clay' has a long
    translation history and may preserve a wordplay about burdensome accumulation,
    it is retained in a footnote rather than adopted in the main text.
  doctrine_reference: Translation philosophy §3, §5
