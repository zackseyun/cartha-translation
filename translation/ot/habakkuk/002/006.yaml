id: HAB.2.6
reference: Habakkuk 2:6
source:
  edition: WLC
  text: הֲ/לוֹא אֵ֣לֶּה כֻלָּ֗/ם עָלָי/ו֙ מָשָׁ֣ל יִשָּׂ֔אוּ וּ/מְלִיצָ֖ה חִיד֣וֹת
    ל֑/וֹ וְ/יֹאמַ֗ר ה֚וֹי הַ/מַּרְבֶּ֣ה לֹּא ל֔/וֹ עַד מָתַ֕י וּ/מַכְבִּ֥יד עָלָ֖י/ו
    עַבְטִֽיט־־־׃
translation:
  text: Will not all of these take up a taunt against him, with mockery and riddles
    about him, and say, “Woe to him who heaps up what is not his—how long?—and loads
    himself with pledged goods!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'loads himself with thick clay.' The Hebrew term is rare and may carry
      a wordplay between debt taken in pledge and a heavy mass that burdens the one
      who gathers it.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָשָׁל
  chosen: taunt
  alternatives:
  - proverb
  - parable
  - taunting song
  lexicon: HALOT
  rationale: In prophetic judgment contexts, מָשָׁל often denotes a derisive saying
    or taunt rather than a wisdom proverb. Here the nations' speech against the oppressor
    is mocking and condemnatory, so 'taunt' best fits the discourse function.
- source_word: יִשָּׂאוּ
  chosen: take up
  alternatives:
  - raise
  - utter
  lexicon: HALOT
  rationale: The idiom 'take up a taunt' is a natural English equivalent for נשׂא
    with מָשָׁל, preserving the image of lifting up or beginning a formal saying.
- source_word: מְלִיצָה
  chosen: mockery
  alternatives:
  - satire
  - taunting speech
  - interpretive saying
  lexicon: HALOT
  rationale: The term here parallels מָשָׁל and introduces derisive speech. 'Mockery'
    communicates the scornful tone in accessible English.
- source_word: חִידוֹת
  chosen: riddles
  alternatives:
  - enigmas
  - puzzling sayings
  lexicon: HALOT
  rationale: The plural denotes enigmatic or pointed sayings. 'Riddles' is the most
    direct and idiomatic rendering, preserving the sharp, cryptic quality of the taunt.
- source_word: הוֹי
  chosen: Woe
  alternatives:
  - Alas
  - Ah
  lexicon: HALOT
  rationale: Standard prophetic interjection of denunciation and lament. 'Woe' preserves
    both the solemnity and the judgment-oracle flavor.
- source_word: הַמַּרְבֶּה לֹּא לוֹ
  chosen: him who heaps up what is not his
  alternatives:
  - him who increases what is not his
  - him who multiplies what does not belong to him
  lexicon: HALOT
  rationale: The participle from רבה conveys accumulation or increase. 'Heaps up'
    captures rapacious acquisition in vivid modern English, while 'what is not his'
    preserves the moral point of unjust gain.
- source_word: עַד מָתַי
  chosen: how long?
  alternatives:
  - until when?
  lexicon: HALOT
  rationale: This idiom is a conventional cry of exasperation or protest. Rendering
    it as an inserted question preserves the abrupt rhetorical force.
- source_word: וּמַכְבִּיד עָלָיו
  chosen: loads himself
  alternatives:
  - makes heavy for himself
  - burdens himself
  - loads up against himself
  lexicon: HALOT
  rationale: The Hiphil of כבד with עָלָיו is difficult but conveys making a heavy
    burden upon oneself. 'Loads himself' is concise and fits the image of piling up
    ill-gotten wealth that becomes a burden.
- source_word: עַבְטִיט
  chosen: pledged goods
  alternatives:
  - pledges
  - security taken in pledge
  - thick clay
  lexicon: HALOT
  rationale: This rare noun is commonly understood from the root idea of pledging/debt,
    fitting the context of extortion and unjust gain. 'Pledged goods' makes the economic
    image clear. The traditional alternative 'thick clay' is likely interpretive wordplay
    and is preserved in a footnote because of its history and possible rhetorical
    force.
