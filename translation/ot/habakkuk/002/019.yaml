id: HAB.2.19
reference: Habakkuk 2:19
source:
  edition: WLC
  text: ה֣וֹי אֹמֵ֤ר לָ/עֵץ֙ הָקִ֔יצָ/ה ע֖וּרִי לְ/אֶ֣בֶן דּוּמָ֑ם ה֣וּא יוֹרֶ֔ה הִנֵּה
    ה֗וּא תָּפוּשׂ֙ זָהָ֣ב וָ/כֶ֔סֶף וְ/כָל ר֖וּחַ אֵ֥ין בְּ/קִרְבּֽ/וֹ־־׃
translation:
  text: Woe to the one who says to wood, “Wake up!” and to silent stone, “Arise!”
    Can it teach? Look— it is overlaid with gold and silver, yet there is no breath
    at all within it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''spirit'': the Hebrew word can mean ''breath,'' ''wind,'' or ''spirit.''
      Here it emphasizes that the idol has no life within it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  chosen: Woe
  alternatives:
  - Alas
  lexicon: HALOT
  rationale: Introduces a prophetic denunciation. 'Woe' best preserves the oracular
    force and judgment tone of the interjection.
- source_word: אֹמֵר
  chosen: to the one who says
  alternatives:
  - to him who says
  - to whoever says
  lexicon: HALOT
  rationale: The participle functions substantivally, referring to the idolater characterized
    by this speech. 'The one who says' is natural modern English and preserves the
    singular reference.
- source_word: לָעֵץ
  chosen: to wood
  alternatives:
  - to a piece of wood
  - to the wood
  lexicon: HALOT
  rationale: The noun refers to wooden idol material rather than merely a tree. 'Wood'
    keeps the material sense concise and matches the parallel with stone.
- source_word: הָקִיצָה
  chosen: Wake up!
  alternatives:
  - Awake!
  - Rouse yourself!
  lexicon: HALOT
  rationale: Imperative addressed mockingly to an idol. 'Wake up' is idiomatic modern
    English while preserving the absurdity of addressing an inanimate object as though
    sleeping.
- source_word: עוּרִי
  chosen: Arise!
  alternatives:
  - Wake up!
  - Rouse yourself!
  lexicon: HALOT
  rationale: A second imperative parallel to 'Wake up.' Rendering it 'Arise!' preserves
    the poetic variation rather than flattening both commands into the same English
    verb.
- source_word: לְאֶבֶן דּוּמָם
  chosen: to silent stone
  alternatives:
  - to a mute stone
  - to a dumb stone
  lexicon: HALOT
  rationale: דּוּמָם denotes silence or muteness. 'Silent stone' is clear, natural,
    and preserves the irony that the object cannot speak or respond.
- source_word: הוּא יוֹרֶה
  chosen: Can it teach?
  alternatives:
  - Will it teach?
  - It teaches?
  - Shall it instruct?
  lexicon: HALOT
  rationale: The clause is best taken as a rhetorical question in context, exposing
    the folly of expecting instruction from an idol. 'Teach' is the most accessible
    rendering of the Hiphil of ירה here ('instruct').
- source_word: הִנֵּה
  chosen: Look—
  alternatives:
  - Behold,
  - See,
  lexicon: HALOT
  rationale: Draws attention to the visible absurdity of the idol. 'Look—' is readable
    modern English and preserves the deictic force.
- source_word: תָּפוּשׂ זָהָב וָכֶסֶף
  chosen: it is overlaid with gold and silver
  alternatives:
  - it is covered with gold and silver
  - it is plated with gold and silver
  lexicon: HALOT
  rationale: The passive/participial sense indicates the idol is encased or overlaid
    with precious metals. 'Overlaid' is a standard and precise rendering for crafted
    idols.
- source_word: וְכָל רוּחַ אֵין בְּקִרְבּוֹ
  chosen: yet there is no breath at all within it
  alternatives:
  - and there is no breath in it
  - and there is no spirit within it
  lexicon: HALOT
  rationale: רוּחַ can mean breath, wind, or spirit. Here the contrast is between
    lifeless idol and living being, so 'breath' best conveys animating life without
    importing theological claims about a personal spirit. 'At all' reflects כָל for
    emphasis.
