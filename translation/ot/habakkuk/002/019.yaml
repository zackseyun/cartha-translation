theological_decisions:
- issue: Meaning of רוּחַ in the final clause
  chosen_reading: breath
  alternative_readings:
  - spirit
  rationale: In this anti-idol polemic, the point is the idol's lifelessness, not
    the absence of an immaterial spirit in a metaphysical sense. 'Breath' best matches
    the Hebrew idiom for life and preserves the contrast with living creatures animated
    by breath.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity where present.
