id: HAB.2.11
reference: Habakkuk 2:11
source:
  edition: WLC
  text: כִּי אֶ֖בֶן מִ/קִּ֣יר תִּזְעָ֑ק וְ/כָפִ֖יס מֵ/עֵ֥ץ יַעֲנֶֽ/נָּה־׃פ
translation:
  text: For a stone will cry out from the wall, and a beam from the woodwork will
    answer it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a rafter from the timber will answer it.' The Hebrew term כָפִיס is
      rare and may denote a beam, rafter, or another structural wooden element.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces the reason or ground for the preceding woe/judgment
    statement, so 'For' best fits the discourse flow in English.
- source_word: אֶבֶן
  chosen: a stone
  alternatives:
  - stone
  lexicon: HALOT
  rationale: The singular noun is indefinite in Hebrew and refers generically to a
    building stone; 'a stone' preserves that sense naturally in English.
- source_word: מִקִּיר
  chosen: from the wall
  alternatives:
  - from a wall
  lexicon: HALOT
  rationale: 'קִיר means ''wall.'' The prefixed preposition מִן marks source: the
    stone cries out from within/out of the wall of the house built by injustice.'
- source_word: תִּזְעָק
  chosen: will cry out
  alternatives:
  - cries out
  - will cry
  lexicon: HALOT
  rationale: 'The imperfect here is best rendered with a future nuance in this prophetic
    context: the built structure itself is personified as testifying against the oppressor.'
- source_word: כָפִיס
  chosen: a beam
  alternatives:
  - rafter
  - crossbeam
  - capital
  lexicon: HALOT
  rationale: כָפִיס is a rare architectural term. 'Beam' is the most broadly defensible
    and readable rendering for a structural wooden element. More specific options
    such as 'rafter' are possible but less certain.
- source_word: מֵעֵץ
  chosen: from the woodwork
  alternatives:
  - from the timber
  - from the wood
  lexicon: HALOT
  rationale: Literally 'from wood/timber.' In context it refers to the wooden part
    of the building corresponding to the stone in the wall. 'Woodwork' communicates
    the architectural sense idiomatically without over-specifying.
- source_word: יַעֲנֶנָּה
  chosen: will answer it
  alternatives:
  - will answer
  - will respond to it
  lexicon: HALOT
  rationale: ענה in the Qal commonly means 'answer/respond.' The pronominal suffix
    is feminine singular, most naturally referring back to 'stone' (אֶבֶן, feminine),
    so 'answer it' preserves the reciprocal personification between stone and beam.
