theological_decisions:
- issue: Rendering of שְׁאוֹל
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the underworld
  rationale: The Hebrew term is not merely a burial place but the realm of the dead
    in Israelite idiom. Retaining 'Sheol' preserves the source-world imagery and avoids
    interpretive reduction.
