id: HAB.2.5
reference: Habakkuk 2:5
source:
  edition: WLC
  text: וְ/אַף֙ כִּֽי הַ/יַּ֣יִן בּוֹגֵ֔ד גֶּ֥בֶר יָהִ֖יר וְ/לֹ֣א יִנְוֶ֑ה אֲשֶׁר֩
    הִרְחִ֨יב כִּ/שְׁא֜וֹל נַפְשׁ֗/וֹ וְ/ה֤וּא כַ/מָּ֨וֶת֙ וְ/לֹ֣א יִשְׂבָּ֔ע וַ/יֶּאֱסֹ֤ף
    אֵלָי/ו֙ כָּל הַ/גּוֹיִ֔ם וַ/יִּקְבֹּ֥ץ אֵלָ֖י/ו כָּל הָ/עַמִּֽים־־־׃
translation:
  text: Moreover, wine betrays; an arrogant man does not remain at rest. He enlarges
    his appetite like Sheol, and he is like death and is never satisfied. He gathers
    to himself all the nations and collects to himself all the peoples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wine is treacherous' or 'wine deceives.' The Hebrew is concise and somewhat
      difficult; some interpreters also connect the line more broadly with the proud
      conqueror's intoxicated arrogance.
    reason: lexical_alternative
  - marker: b
    text: Or 'does not stay at home' or 'does not abide.' The Hebrew verb is difficult;
      the main text reflects the sense of restless instability in context.
    reason: lexical_alternative
  - marker: c
    text: Sheol is the realm of the dead; alternatively, 'the grave.'
    reason: cultural_note
lexical_decisions:
- source_word: וְאַף כִּי
  chosen: Moreover
  alternatives:
  - Indeed
  - Furthermore
  - And moreover
  lexicon: HALOT
  rationale: The opening combination is idiomatic and transitional/emphatic rather
    than strictly causal. 'Moreover' captures the additive force introducing a further
    indictment.
- source_word: הַיַּיִן
  chosen: wine
  lexicon: HALOT
  rationale: Straightforward lexical rendering of the noun for wine. Retained in the
    main text despite interpretive difficulty because the Hebrew text plainly includes
    it.
- source_word: בּוֹגֵד
  chosen: betrays
  alternatives:
  - is treacherous
  - deceives
  lexicon: HALOT
  rationale: The participle denotes acting treacherously or faithlessly. 'Betrays'
    is concise, natural English and fits the personified subject 'wine.' 'Is treacherous'
    is possible but less vivid.
- source_word: גֶּבֶר
  chosen: man
  alternatives:
  - strong man
  - warrior
  lexicon: HALOT
  rationale: The noun often denotes a man in his strength, but here functions generically
    for the proud individual under judgment. 'Man' is the most natural English equivalent.
- source_word: יָהִיר
  chosen: arrogant
  alternatives:
  - proud
  - haughty
  lexicon: HALOT
  rationale: The adjective conveys insolence or presumptuous pride. 'Arrogant' best
    captures the moral tone in contemporary English.
- source_word: וְלֹא יִנְוֶה
  chosen: does not remain at rest
  alternatives:
  - does not stay home
  - does not abide
  - does not rest
  lexicon: HALOT
  rationale: The verb is difficult and has been understood as dwelling, abiding, or
    resting. In context of restless acquisitiveness, 'does not remain at rest' best
    fits the flow without overcommitting to the narrower sense 'stay at home.'
- source_word: אֲשֶׁר
  chosen: He
  alternatives:
  - who
  - the one who
  lexicon: HALOT
  rationale: Rendered as a resumptive relative in smooth English. Starting a new sentence
    with 'He' preserves the referent while avoiding awkwardness.
- source_word: הִרְחִיב
  chosen: enlarges
  alternatives:
  - widens
  - makes broad
  lexicon: HALOT
  rationale: The hiphil means to make wide or enlarge. 'Enlarges' works idiomatically
    with 'appetite' and preserves the metaphor.
- source_word: כִּשְׁאוֹל
  chosen: like Sheol
  alternatives:
  - like the grave
  - like the underworld
  lexicon: HALOT
  rationale: Sheol is best preserved as 'Sheol' rather than flattened to 'grave,'
    since the comparison invokes the realm of the dead with its insatiability. This
    is a lexical/cultural term worth retaining.
- source_word: נַפְשׁוֹ
  chosen: his appetite
  alternatives:
  - his soul
  - his desire
  - himself
  lexicon: HALOT
  rationale: While nephesh often literally means 'soul' or 'life,' here the image
    is of voracious desire. 'Appetite' communicates the metaphor in natural English
    and matches the context of insatiability.
- source_word: וְהוּא כַמָּוֶת
  chosen: and he is like death
  alternatives:
  - and he is as death
  - and like death he is
  lexicon: HALOT
  rationale: A direct comparison. 'Death' is personified as insatiable; the simile
    is preserved straightforwardly.
- source_word: וְלֹא יִשְׂבָּע
  chosen: and is never satisfied
  alternatives:
  - and is not satisfied
  - and cannot be satisfied
  lexicon: HALOT
  rationale: The imperfect expresses ongoing reality. 'Never satisfied' is idiomatic
    and conveys habitual insatiability.
- source_word: וַיֶּאֱסֹף אֵלָיו
  chosen: He gathers to himself
  alternatives:
  - He assembles to himself
  - He sweeps up for himself
  lexicon: HALOT
  rationale: The verb means gather/collect. 'To himself' preserves the reflexive acquisitive
    force of אֵלָיו.
- source_word: כָּל הַגּוֹיִם
  chosen: all the nations
  alternatives:
  - all the Gentiles
  lexicon: HALOT
  rationale: In this prophetic judgment context, 'nations' is the standard and clearest
    rendering for גוים.
- source_word: וַיִּקְבֹּץ אֵלָיו
  chosen: and collects to himself
  alternatives:
  - and gathers to himself
  - and heaps up to himself
  lexicon: HALOT
  rationale: Though near-synonymous with the previous verb, a slight variation avoids
    wooden repetition while preserving the parallelism. The acquisitive sense remains.
- source_word: כָּל הָעַמִּים
  chosen: all the peoples
  alternatives:
  - all the nations
  - all the peoples of the earth
  lexicon: HALOT
  rationale: Rendered distinctly from גוים to preserve the Hebrew parallel pair 'nations/peoples'
    rather than collapsing both into one English term.
