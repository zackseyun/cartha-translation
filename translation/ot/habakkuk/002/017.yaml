id: HAB.2.17
reference: Habakkuk 2:17
source:
  edition: WLC
  text: כִּ֣י חֲמַ֤ס לְבָנוֹן֙ יְכַסֶּ֔/ךָּ וְ/שֹׁ֥ד בְּהֵמ֖וֹת יְחִיתַ֑/ן מִ/דְּמֵ֤י
    אָדָם֙ וַ/חֲמַס אֶ֔רֶץ קִרְיָ֖ה וְ/כָל יֹ֥שְׁבֵי בָֽ/הּ־־׃ס
translation:
  text: For the violence done to Lebanon will cover you, and the destruction of beasts
    will terrify them, because of the blood of man and the violence done to the land,
    to the city, and to all who dwell in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of human bloodshed.' The Hebrew says literally 'because of the
      blood of man,' with 'man' functioning representatively.
    reason: lexical_alternative
  - marker: b
    text: Or 'will overwhelm you' for 'will cover you'; the Hebrew preserves the image
      of being covered or engulfed.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲמַס
  chosen: violence done to
  alternatives:
  - violence against
  - wrong done to
  - outrage against
  lexicon: HALOT
  rationale: חָמָס commonly denotes violence, wrongdoing, or ruthless injustice. Here
    it governs Lebanon and later the land/city/inhabitants as victims, so 'violence
    done to' makes the object relation explicit in natural English without weakening
    the term.
- source_word: לְבָנוֹן
  chosen: Lebanon
  lexicon: HALOT
  rationale: Proper name retained by transliteration. In context it may evoke both
    the region and its famed forests, but the text names Lebanon directly.
- source_word: יְכַסֶּךָּ
  chosen: will cover you
  alternatives:
  - will overwhelm you
  - will engulf you
  lexicon: HALOT
  rationale: The verb כסה is literally 'cover.' Here it is metaphorical for retributive
    consequences overtaking the addressee. The formal image is preserved rather than
    replaced with a more interpretive gloss.
- source_word: שֹׁד
  chosen: destruction
  alternatives:
  - devastation
  - plundering
  - violence
  lexicon: HALOT
  rationale: שֹׁד often denotes violent devastation or ruin. 'Destruction' fits the
    parallel with violence and the effect on the beasts, while avoiding over-specification
    to military plunder.
- source_word: בְּהֵמוֹת
  chosen: beasts
  alternatives:
  - animals
  - cattle
  lexicon: HALOT
  rationale: The plural refers broadly to animals. 'Beasts' preserves the elevated
    prophetic register and avoids narrowing the reference to domesticated cattle only.
- source_word: יְחִיתַן
  chosen: will terrify them
  alternatives:
  - will shatter them
  - will dismay them
  - will make them cower
  lexicon: HALOT
  rationale: From חתת in the Hiphil, the sense is to terrify, dismay, or break. The
    suffix most naturally refers to the beasts, yielding 'the destruction of beasts
    will terrify them'—that is, the memory or spectacle of such destruction will strike
    terror. This keeps the Hebrew syntax without over-resolving the object.
- source_word: מִדְּמֵי אָדָם
  chosen: because of the blood of man
  alternatives:
  - because of human bloodshed
  - from the blood of man
  lexicon: HALOT
  rationale: 'The preposition מִן here is causal: ''because of/on account of.'' דָּמִים
    with אדם points to bloodshed. Per doctrine, אָדָם is rendered gender-accurately;
    here singular ''man'' matches the Hebrew form and prophetic style, while functioning
    representatively.'
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - humanity
  lexicon: HALOT
  rationale: The Hebrew singular can be representative. Following the project's gender-accurate
    policy, 'man' is retained in the main text as matching the source form and idiom;
    a more inclusive sense is possible contextually but not required in the main line.
- source_word: וַחֲמַס אֶרֶץ
  chosen: and the violence done to the land
  alternatives:
  - and violence against the land
  - and the violence of the land
  lexicon: HALOT
  rationale: The repeated חמס is best taken as violence inflicted on the land, parallel
    to violence done to Lebanon. This preserves the likely victim-oriented sense in
    the woe oracle.
- source_word: קִרְיָה
  chosen: the city
  alternatives:
  - a city
  - town
  lexicon: HALOT
  rationale: קִרְיָה denotes a city/town. The singular here likely functions collectively
    or points to the city built by bloodshed in the immediate context (cf. v. 12),
    so 'the city' is the most natural English rendering.
- source_word: יֹשְׁבֵי בָהּ
  chosen: all who dwell in it
  alternatives:
  - all its inhabitants
  - everyone living in it
  lexicon: HALOT
  rationale: A participial expression meaning the inhabitants. 'All who dwell in it'
    preserves the verbal nuance and prophetic cadence.
