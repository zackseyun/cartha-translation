theological_decisions:
- issue: Representative sense of אָדָם
  chosen_reading: man
  alternative_readings:
  - humankind
  - humanity
  rationale: The Hebrew singular is representative, but the project's doctrine prefers
    gender-accurate renderings matching the source form unless context clearly demands
    otherwise. Here 'man' preserves the Hebrew idiom while still allowing readers
    to understand a broader human reference.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם'
