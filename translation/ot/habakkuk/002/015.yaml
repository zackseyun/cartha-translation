theological_decisions:
- issue: Second-person suffix in חֲמָתְךָ within a third-person woe oracle
  chosen_reading: Retain the shift with 'your wrath' in the main text
  alternative_readings:
  - Emend or interpret as 'his wrath/bottle' to smooth the grammar
  - Translate more idiomatically without preserving the person shift
  rationale: The Masoretic text contains a striking shift to second person. Rather
    than smoothing it away, the translation preserves the textual form and rhetorical
    sharpness. Because the Hebrew is difficult, an alternative understanding is noted
    in footnotes rather than adopted silently.
  doctrine_reference: 'Translation philosophy #1 and #3'
- issue: Sexual-shame imagery
  chosen_reading: 'Render the purpose clause as voyeuristic exposure: ''in order to
    look on their nakedness'''
  alternative_readings:
  - '''to gaze on their shame'''
  - '''to look on their private parts'''
  rationale: The verse condemns humiliating intoxication for the sake of exposed nakedness.
    The translation preserves the moral force without importing additional doctrinal
    or sexual detail beyond the Hebrew.
  doctrine_reference: 'Translation philosophy #1 and #6'
