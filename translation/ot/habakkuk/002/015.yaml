id: HAB.2.15
reference: Habakkuk 2:15
source:
  edition: WLC
  text: ה֚וֹי מַשְׁקֵ֣ה רֵעֵ֔/הוּ מְסַפֵּ֥חַ חֲמָתְ/ךָ֖ וְ/אַ֣ף שַׁכֵּ֑ר לְמַ֥עַן
    הַבִּ֖יט עַל מְעוֹרֵי/הֶֽם־׃
translation:
  text: Woe to him who makes his neighbor drink—pouring out your wrath and even making
    him drunk—in order to look on their nakedness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pouring out your venom'; the Hebrew term for 'wrath' can also carry
      the sense of heat or venom in context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew is difficult; some understand this clause differently, such as 'adding
      your bottle' or smoothing the person shift to 'his wrath.'
    reason: alternative_reading
  - marker: c
    text: Or 'their private parts'; the Hebrew refers to exposed nakedness in a shameful
      sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  chosen: Woe
  alternatives:
  - Ah
  - Alas
  lexicon: HALOT
  rationale: Prophetic interjection introducing a denunciation; 'Woe' is the standard
    and most natural English equivalent in judgment oracles.
- source_word: מַשְׁקֵה
  chosen: who makes ... drink
  alternatives:
  - who gives drink to
  - who causes to drink
  lexicon: HALOT
  rationale: Hiphil participle of שׁקה indicates causing someone to drink. 'Makes
    ... drink' is concise and preserves the coercive nuance better than the softer
    'gives drink to.'
- source_word: רֵעֵהוּ
  chosen: his neighbor
  alternatives:
  - his companion
  - his friend
  lexicon: HALOT
  rationale: רֵעַ commonly denotes a fellow person, neighbor, or associate. 'Neighbor'
    fits prophetic ethical language and preserves the interpersonal violation.
- source_word: מְסַפֵּחַ
  chosen: pouring out
  alternatives:
  - adding
  - mixing in
  - attaching
  lexicon: HALOT
  rationale: The form is difficult and has been understood in context as adding or
    pouring something onto the drink. Given the following object 'your wrath' and
    the image of intoxicating another, 'pouring out' communicates the hostile, active
    sense in idiomatic English while staying close to the metaphorical force.
- source_word: חֲמָתְךָ
  chosen: your wrath
  alternatives:
  - your venom
  - your rage
  - your heat
  lexicon: HALOT
  rationale: חֵמָה often means wrath, rage, or heat; in some contexts it can shade
    toward venom/poison. Here the image may intentionally blend fury and intoxicating
    poison. Main text uses 'wrath' as the most common lexical value, while a footnote
    preserves 'venom' as a plausible contextual alternative.
- source_word: וְאַף
  chosen: and even
  alternatives:
  - and also
  - indeed
  - yes, even
  lexicon: HALOT
  rationale: אַף as an adverbial intensifier adds escalation. 'And even' captures
    the climactic force in readable English.
- source_word: שַׁכֵּר
  chosen: making him drunk
  alternatives:
  - getting him drunk
  - causing drunkenness
  lexicon: HALOT
  rationale: The verb denotes causing intoxication. 'Making him drunk' is direct and
    matches the participial flow from the previous clause.
- source_word: לְמַעַן
  chosen: in order to
  alternatives:
  - so that
  - for the purpose of
  lexicon: HALOT
  rationale: Marks purpose. 'In order to' is clear modern English and preserves the
    intentionality of the act.
- source_word: הַבִּיט
  chosen: to look on
  alternatives:
  - to gaze at
  - to stare at
  - to see
  lexicon: HALOT
  rationale: The verb means to look or gaze. 'Look on' is natural and leaves the morally
    charged voyeurism to be supplied by context.
- source_word: מְעוֹרֵיהֶם
  chosen: their nakedness
  alternatives:
  - their private parts
  - their shame
  lexicon: HALOT
  rationale: The noun refers to exposed nakedness or genitals. 'Their nakedness' is
    idiomatic biblical English, sufficiently explicit without becoming clinically
    crude; a footnote preserves the more anatomical alternative.
