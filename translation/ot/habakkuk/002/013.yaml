theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is 'the LORD' for YHWH, following Jewish reverence
    tradition and longstanding English Bible practice while remaining transparent
    in documentation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the verse's causation
  chosen_reading: The verse states that this reality is from the LORD of hosts, namely
    that the nations' oppressive building projects end in destruction and futility.
  alternative_readings:
  - A weaker reading that merely asks whether this is known by the LORD
  - A deterministic reading that directly attributes evil desire to the LORD
  rationale: The Hebrew מֵאֵת with the rhetorical question indicates source/ordination
    of the outcome under divine judgment, not moral authorship of the nations' evil.
    The translation preserves that tension without overexplaining in the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
