id: HAB.2.13
reference: Habakkuk 2:13
source:
  edition: WLC
  text: הֲ/ל֣וֹא הִנֵּ֔ה מֵ/אֵ֖ת יְהוָ֣ה צְבָא֑וֹת וְ/יִֽיגְע֤וּ עַמִּים֙ בְּ/דֵי
    אֵ֔שׁ וּ/לְאֻמִּ֖ים בְּ/דֵי רִ֥יק יִעָֽפוּ־־׃
translation:
  text: Is it not indeed from the LORD of hosts that peoples labor for fire, and nations
    weary themselves for emptiness?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the fire,' that is, for what will be consumed by fire.
    reason: lexical_alternative
  - marker: b
    text: Or 'for nothing' or 'for vanity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלוֹא
  chosen: Is it not
  alternatives:
  - Surely
  - Is it not true that
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting affirmation. 'Is it not' preserves
    the interrogative force better than a flat asseveration.
- source_word: הִנֵּה
  chosen: indeed
  alternatives:
  - behold
  - look
  lexicon: HALOT
  rationale: Adds emphatic force without archaic tone. 'Behold' is more formal but
    less natural in modern English.
- source_word: מֵאֵת
  chosen: from
  alternatives:
  - from the hand of
  - comes from
  lexicon: HALOT
  rationale: Marks source/origin. 'From' is sufficient and idiomatic here.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  - of heavenly armies
  lexicon: HALOT
  rationale: Traditional but still intelligible title preserving the breadth of 'hosts'
    rather than narrowing it to merely military forces.
- source_word: וְיִיגְעוּ
  chosen: labor
  alternatives:
  - toil
  - work hard
  lexicon: HALOT
  rationale: Conveys strenuous exertion in a concise, natural way. Present tense works
    well in English within the rhetorical statement of general principle.
- source_word: עַמִּים
  chosen: peoples
  alternatives:
  - nations
  - peoples groups
  lexicon: HALOT
  rationale: Keeps distinction from לְאֻמִּים in the next clause by rendering this
    term as 'peoples'.
- source_word: בְּדֵי אֵשׁ
  chosen: for fire
  alternatives:
  - for the fire
  - for fuel for fire
  - only for fire
  lexicon: HALOT
  rationale: The idiom denotes labor whose end is consumption by fire. 'For fire'
    is concise and preserves the image; the sense is that their work ends up feeding
    destruction.
- source_word: לְאֻמִּים
  chosen: nations
  alternatives:
  - peoples
  - ethnic groups
  lexicon: HALOT
  rationale: Provides a natural counterpart to 'peoples' while maintaining lexical
    distinction between the two parallel nouns.
- source_word: בְּדֵי רִיק
  chosen: for emptiness
  alternatives:
  - for vanity
  - for nothing
  - for what is empty
  lexicon: HALOT
  rationale: Captures the result/purpose idiom and avoids the archaic feel of 'vanity.'
    'Emptiness' preserves the futility motif.
- source_word: יִעָפוּ
  chosen: weary themselves
  alternatives:
  - grow weary
  - be exhausted
  lexicon: HALOT
  rationale: 'Expresses the reflexive/resultative sense in context: the nations exhaust
    themselves in futile effort.'
