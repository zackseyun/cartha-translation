id: HAB.2.10
reference: Habakkuk 2:10
source:
  edition: WLC
  text: יָעַ֥צְתָּ בֹּ֖שֶׁת לְ/בֵיתֶ֑/ךָ קְצוֹת עַמִּ֥ים רַבִּ֖ים וְ/חוֹטֵ֥א נַפְשֶֽׁ/ךָ־׃
translation:
  text: You have devised shame for your house by cutting off many peoples, and you
    have sinned against your own life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your soul' or 'yourself' for 'your own life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָעַצְתָּ
  chosen: you have devised
  alternatives:
  - you have planned
  - you have counseled
  lexicon: HALOT
  rationale: Qal perfect 2ms of יעץ, here in the sense of planning or devising a course
    of action. 'Devised' fits the hostile, intentional context better than the more
    neutral 'counseled.'
- source_word: בֹּשֶׁת
  chosen: shame
  alternatives:
  - disgrace
  lexicon: HALOT
  rationale: The noun denotes shame/disgrace. 'Shame' is concise and idiomatic in
    English, while preserving the moral and public-honor dimension.
- source_word: לְבֵיתֶךָ
  chosen: for your house
  alternatives:
  - for your household
  - upon your house
  lexicon: HALOT
  rationale: בַּיִת can mean house, household, or dynasty. In this woe context it
    likely includes the offender's house as estate/line, but 'house' best preserves
    the Hebrew breadth without over-specifying.
- source_word: קְצוֹת
  chosen: by cutting off
  alternatives:
  - by destroying
  - to cut off
  lexicon: HALOT
  rationale: From קצה/קצץ in this form and context, the sense is to bring to an end,
    cut off, or exterminate. 'By cutting off' captures both the verbal force and the
    likely instrumental nuance with the following object.
- source_word: עַמִּים רַבִּים
  chosen: many peoples
  alternatives:
  - many nations
  - many peoples groups
  lexicon: HALOT
  rationale: עַמִּים commonly means peoples/nations. 'Many peoples' is slightly more
    literal and preserves the plural collective sense without importing modern nation-state
    connotations.
- source_word: וְחוֹטֵא
  chosen: and you have sinned
  alternatives:
  - thus sinning
  - and sinning
  lexicon: HALOT
  rationale: Qal participle masculine singular from חטא following a finite verb can
    function verbally in sequence. Rendering it as a second finite clause in English
    is natural and preserves the accusation.
- source_word: נַפְשֶׁךָ
  chosen: your own life
  alternatives:
  - your soul
  - yourself
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean soul, life, self, or person. In this judgment context,
    'your own life' best conveys that the oppressor's actions recoil upon himself,
    without importing later dualistic associations of 'soul'.
