theological_decisions:
- issue: Meaning of נֶפֶשׁ in prophetic judgment context
  chosen_reading: life
  alternative_readings:
  - soul
  - self
  rationale: The verse condemns self-destructive violence; 'life' communicates the
    concrete consequence and avoids reading a later technical anthropology into the
    text. The alternatives remain viable lexically but are less contextually precise
    here.
  doctrine_reference: Translation philosophy §1, §3, §6
