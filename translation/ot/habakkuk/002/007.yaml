id: HAB.2.7
reference: Habakkuk 2:7
source:
  edition: WLC
  text: הֲ/ל֣וֹא פֶ֗תַע יָק֨וּמוּ֙ נֹשְׁכֶ֔י/ךָ וְ/יִקְצ֖וּ מְזַעְזְעֶ֑י/ךָ וְ/הָיִ֥יתָ
    לִ/מְשִׁסּ֖וֹת לָֽ/מוֹ׃
translation:
  text: Will not your creditors suddenly rise, and those who make you tremble awake?
    Then you will become plunder for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'those who bite you.' The wording may intentionally echo
      both biting attackers and creditors exacting payment.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלוֹא
  chosen: Will not
  alternatives:
  - Surely
  - Is it not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. 'Will
    not' fits the future verbal sequence and natural English style.
- source_word: פֶתַע
  chosen: suddenly
  alternatives:
  - in an instant
  - abruptly
  lexicon: HALOT
  rationale: Adverbial noun indicating suddenness. 'Suddenly' is idiomatic and concise.
- source_word: יָקוּמוּ
  chosen: rise
  alternatives:
  - arise
  - stand up
  lexicon: HALOT
  rationale: Basic sense of קום in context is to rise up against someone. 'Rise' is
    natural in English and preserves the hostile movement implied by the woe oracle.
- source_word: נֹשְׁכֶיךָ
  chosen: your creditors
  alternatives:
  - those who bite you
  - your biters
  lexicon: HALOT
  rationale: 'From נשׁך, literally ''to bite,'' but in economic/judgment contexts
    it can denote exacting interest or acting as a creditor. In this taunt against
    the plunderer who amassed what was not his, ''creditors'' best captures the reversal:
    those to whom payment is owed will rise against him. The more literal ''biters''
    is preserved in a footnote because the metaphor may be intentional.'
- source_word: וְיִקְצוּ
  chosen: awake
  alternatives:
  - rouse themselves
  - arise
  lexicon: HALOT
  rationale: Likely from יקץ, 'to awake.' In parallel with 'rise,' it depicts sudden
    activation of the attackers. 'Awake' preserves the imagery and the poetic parallelism.
- source_word: מְזַעְזְעֶיךָ
  chosen: those who make you tremble
  alternatives:
  - your tormentors
  - those who shake you
  lexicon: HALOT
  rationale: From זוע/זעזע, conveying shaking, agitation, or causing terror. 'Those
    who make you tremble' keeps the causative force and vividness without overinterpreting.
- source_word: וְהָיִיתָ
  chosen: Then you will become
  alternatives:
  - and you will be
  lexicon: HALOT
  rationale: Simple future/resultative sense. 'Then' makes the consequence relation
    explicit in English.
- source_word: לִמְשִׁסּוֹת
  chosen: plunder
  alternatives:
  - spoil
  - booty
  lexicon: HALOT
  rationale: Denotes something seized as spoil. 'Plunder' is clear modern English
    and suits the reversal theme of the verse.
- source_word: לָמוֹ
  chosen: for them
  alternatives:
  - to them
  lexicon: HALOT
  rationale: Pronominal suffix referring to the attackers. 'For them' is idiomatic
    with 'become plunder' in English.
