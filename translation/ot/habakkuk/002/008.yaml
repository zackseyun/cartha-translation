id: HAB.2.8
reference: Habakkuk 2:8
source:
  edition: WLC
  text: כִּֽי אַתָּ֤ה שַׁלּ֨וֹתָ֙ גּוֹיִ֣ם רַבִּ֔ים יְשָׁלּ֖וּ/ךָ כָּל יֶ֣תֶר עַמִּ֑ים
    מִ/דְּמֵ֤י אָדָם֙ וַ/חֲמַס אֶ֔רֶץ קִרְיָ֖ה וְ/כָל יֹ֥שְׁבֵי בָֽ/הּ־־־׃פ
translation:
  text: Because you have plundered many nations, all the remnant of the peoples will
    plunder you—because of the blood of man and violence done to the land, to the
    city, and to all who dwell in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “because of human bloodshed.”
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁלּוֹתָ
  chosen: have plundered
  alternatives:
  - have spoiled
  - have despoiled
  lexicon: HALOT
  rationale: The verb from שלל in this context refers to taking spoil by force. 'Plundered'
    is clear modern English and fits the woe-oracle context better than the more archaic
    'spoiled' or 'despoiled'.
- source_word: גּוֹיִם רַבִּים
  chosen: many nations
  alternatives:
  - many peoples
  lexicon: HALOT
  rationale: גּוֹיִם commonly denotes nations in an international/political sense.
    'Many nations' best matches the imperial setting of Habakkuk.
- source_word: יְשָׁלּוּךָ
  chosen: will plunder you
  alternatives:
  - will spoil you
  - will despoil you
  lexicon: HALOT
  rationale: 'Using the same English gloss as the earlier cognate verb preserves the
    reversal: the plunderer becomes the plundered.'
- source_word: כָּל יֶתֶר עַמִּים
  chosen: all the remnant of the peoples
  alternatives:
  - all the rest of the peoples
  - all who remain from the peoples
  lexicon: HALOT
  rationale: יֶתֶר means what is left over or remains. 'Remnant' preserves the sense
    of survivors/rest without over-paraphrasing. 'Peoples' is retained here rather
    than 'nations' to reflect the lexical shift from גּוֹיִם to עַמִּים.
- source_word: מִדְּמֵי אָדָם
  chosen: because of the blood of man
  alternatives:
  - because of human bloodshed
  - for shedding human blood
  lexicon: HALOT
  rationale: The preposition מִן here is causal ('because of'). דְּמֵי אָדָם is literally
    'blood of man.' Because DOCTRINE.md prefers gender-accurate rendering where the
    source intends representative humanity, 'man' is retained in the main text as
    a collective singular, while a more idiomatic alternative is preserved in a footnote.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - humanity
  lexicon: HALOT
  rationale: In this context אָדָם is collective/generic. Per doctrine, gender-accurate
    rendering is preferred over flattening to a neutral abstraction, while the generic
    human sense remains clear from context.
- source_word: וַחֲמַס
  chosen: and violence done to
  alternatives:
  - and violence against
  - and for the violence against
  lexicon: HALOT
  rationale: חָמָס denotes violence, wrongdoing, or ruthless injustice. The phrase
    is elliptical in Hebrew; 'violence done to' makes the object relation explicit
    in natural English without adding new content.
- source_word: אֶרֶץ
  chosen: the land
  alternatives:
  - the earth
  - the country
  lexicon: HALOT
  rationale: In this judgment context, 'land' is the most natural rendering, referring
    to the territory ravaged by imperial violence rather than the whole earth.
- source_word: קִרְיָה
  chosen: the city
  alternatives:
  - the town
  lexicon: HALOT
  rationale: קִרְיָה denotes a city or urban settlement. 'City' is the standard and
    fitting rendering here.
- source_word: וְכָל יֹשְׁבֵי בָהּ
  chosen: and to all who dwell in it
  alternatives:
  - and all its inhabitants
  - and all who live in it
  lexicon: HALOT
  rationale: The Hebrew literally says 'and all the dwellers in it.' 'All who dwell
    in it' is readable and preserves the verbal force of the participle.
