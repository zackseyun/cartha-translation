theological_decisions:
- issue: Rendering of אָדָם in a generic-human expression
  chosen_reading: man
  alternative_readings:
  - humankind
  - humanity
  rationale: The phrase דְּמֵי אָדָם is a generic-human expression, not a male-specific
    one. Following the project's gender-accurate policy, 'man' is retained in the
    main text because it matches the source form and representative force, while a
    more explicitly inclusive alternative is preserved in a footnote.
