theological_decisions:
- issue: Interpretation of the purpose clause לְמַעַן יָרוּץ קֹרֵא בוֹ
  chosen_reading: so that one who reads it may run
  alternative_readings:
  - so that the one who reads it may run with it
  - so that a herald may run who reads it
  - so that one may read it at a run
  rationale: The Hebrew is syntactically compact and has been interpreted in several ways. The most straightforward reading takes the reader as the subject of 'run.' This preserves the vivid urgency of the message without importing an object ('with it') or restructuring the clause beyond the Hebrew. Alternative understandings are preserved in a footnote because the phrase is genuinely ambiguous.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
