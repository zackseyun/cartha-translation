id: HAB.2.2
reference: Habakkuk 2:2
source:
  edition: WLC
  text: וַ/יַּעֲנֵ֤/נִי יְהוָה֙ וַ/יֹּ֔אמֶר כְּת֣וֹב חָז֔וֹן וּ/בָאֵ֖ר עַל הַ/לֻּח֑וֹת לְמַ֥עַן יָר֖וּץ ק֥וֹרֵא בֽ/וֹ־׃
translation:
  text: 'Then Yahweh answered me and said: “Write the vision; make it plain on tablets, so that one who reads it may run.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “so that the one who reads it may run with it,” or “so that one may read it quickly/at a run.” The Hebrew phrase is compact and allows more than one plausible sense.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיַּעֲנֵנִי
  chosen: answered me
  alternatives:
  - answered me back
  - replied to me
  lexicon: HALOT
  rationale: The verb ענה in this context naturally means 'answer, reply.' 'Answered me' is direct and idiomatic, and the 1cs suffix is preserved with 'me.'
- source_word: וַיֹּאמֶר
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Standard narrative continuation after 'answered me'; preserves the Hebrew sequence without awkwardness.
- source_word: כְּתוֹב
  chosen: Write
  alternatives:
  - Record
  - Write down
  lexicon: HALOT
  rationale: Imperative of כתב is straightforwardly 'write.' 'Write' is the most direct equivalent.
- source_word: חָזוֹן
  chosen: the vision
  alternatives:
  - a vision
  - the revelation
  lexicon: HALOT
  rationale: חזון commonly denotes a prophetic vision/oracle. The article is not explicit in Hebrew here, but English idiom with a specific prophetic message favors 'the vision' in context.
- source_word: וּבָאֵר
  chosen: make it plain
  alternatives:
  - explain it clearly
  - inscribe it clearly
  lexicon: HALOT
  rationale: The piel of באר here carries the sense of making something clear or distinct. 'Make it plain' is idiomatic English and fits the following phrase about writing on tablets.
- source_word: עַל הַלֻּחוֹת
  chosen: on tablets
  alternatives:
  - on the tablets
  - on tablets of stone
  lexicon: HALOT
  rationale: לוחות are writing tablets. English omits the article naturally here, since the emphasis is on the medium rather than previously identified tablets. 'Tablets of stone' would over-specify what the Hebrew does not state.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the purpose that
  lexicon: HALOT
  rationale: Introduces purpose/result. 'So that' is natural modern English.
- source_word: יָרוּץ
  chosen: may run
  alternatives:
  - may run swiftly
  - may hurry
  lexicon: HALOT
  rationale: רץ means 'run.' The modal 'may run' reflects the purpose clause introduced by לְמַעַן.
- source_word: קֹרֵא בוֹ
  chosen: one who reads it
  alternatives:
  - the reader of it
  - whoever reads it
  - one reading it
  lexicon: HALOT
  rationale: The participle קרא with בּוֹ is rendered as a substantival participle, 'one who reads it.' This preserves the Hebrew sense while remaining idiomatic.
