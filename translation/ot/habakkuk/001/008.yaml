id: HAB.1.8
reference: Habakkuk 1:8
source:
  edition: WLC
  text: וְ/קַלּ֨וּ מִ/נְּמֵרִ֜ים סוּסָ֗י/ו וְ/חַדּוּ֙ מִ/זְּאֵ֣בֵי עֶ֔רֶב וּ/פָ֖שׁוּ
    פָּֽרָשָׁ֑י/ו וּ/פָֽרָשָׁי/ו֙ מֵ/רָח֣וֹק יָבֹ֔אוּ יָעֻ֕פוּ כְּ/נֶ֖שֶׁר חָ֥שׁ לֶ/אֱכֽוֹל׃
translation:
  text: His horses are swifter than leopards and fiercer than wolves at dusk. His
    horsemen spread out; his horsemen come from far away. They fly like an eagle rushing
    to devour.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a vulture rushing to devour.' The Hebrew נֶשֶׁר can refer more
      broadly to a large carrion bird or raptor, not necessarily the modern eagle.
    reason: lexical_alternative
lexical_decisions:
- source_word: קַלּוּ
  chosen: are swifter
  alternatives:
  - are lighter
  - are faster
  lexicon: HALOT
  rationale: From קלל in the sense of being swift/light. In comparison with animals
    known for speed, 'are swifter' best conveys the idiom in natural English.
- source_word: מִנְּמֵרִים
  chosen: than leopards
  alternatives:
  - than panthers
  lexicon: HALOT
  rationale: נמר commonly denotes the leopard/panther. 'Leopards' is the more standard
    and recognizable English rendering.
- source_word: סוּסָיו
  chosen: his horses
  lexicon: HALOT
  rationale: 'Straightforward possessive plural: the invading nation''s horses.'
- source_word: חַדּוּ
  chosen: fiercer
  alternatives:
  - keener
  - more savage
  lexicon: HALOT
  rationale: From חדד/חדה in a figurative sense of sharpness or ferocity. In context
    of predatory animals, 'fiercer' communicates the comparative force better than
    the more literal 'sharper' or 'keener'.
- source_word: מִזְּאֵבֵי עֶרֶב
  chosen: than wolves at dusk
  alternatives:
  - than evening wolves
  - than wolves of the evening
  lexicon: HALOT
  rationale: The phrase refers to wolves active and ravenous in the evening. 'At dusk'
    is idiomatic modern English and preserves the temporal image.
- source_word: וּפָשׁוּ
  chosen: spread out
  alternatives:
  - charge ahead
  - range widely
  lexicon: HALOT
  rationale: The verb likely conveys spreading out or deploying widely. 'Spread out'
    fits cavalry movement and avoids overinterpreting the exact military nuance.
- source_word: פָּרָשָׁיו
  chosen: his horsemen
  alternatives:
  - his cavalry
  - his riders
  lexicon: HALOT
  rationale: פָּרָשׁ denotes horseman/cavalryman. 'Horsemen' preserves the concrete
    image and matches the repeated noun in the verse.
- source_word: מֵרָחוֹק יָבֹאוּ
  chosen: come from far away
  alternatives:
  - come from afar
  lexicon: HALOT
  rationale: A simple spatial statement. 'From far away' is clear modern English;
    'from afar' is possible but slightly more literary.
- source_word: יָעֻפוּ
  chosen: They fly
  alternatives:
  - They swoop
  lexicon: HALOT
  rationale: The verb means to fly or dart through the air. 'They fly' keeps the simile
    direct; the predatory nuance is supplied by the eagle image and following participle.
- source_word: כְּנֶשֶׁר
  chosen: like an eagle
  alternatives:
  - like a vulture
  lexicon: HALOT
  rationale: נשר can denote a large bird of prey, sometimes argued to be vulture.
    The traditional and still plausible 'eagle' is retained in the main text because
    it fits common biblical usage and the swift predatory imagery; the zoological
    alternative is preserved in a footnote.
- source_word: חָשׁ לֶאֱכוֹל
  chosen: rushing to devour
  alternatives:
  - hastening to eat
  - speeding to consume
  lexicon: HALOT
  rationale: The participle plus infinitive expresses urgent movement toward prey.
    'Rushing to devour' is vivid, natural English and preserves the violent force
    better than the more literal 'hastening to eat'.
