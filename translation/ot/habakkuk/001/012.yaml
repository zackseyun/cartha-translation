id: HAB.1.12
reference: Habakkuk 1:12
source:
  edition: WLC
  text: הֲ/ל֧וֹא אַתָּ֣ה מִ/קֶּ֗דֶם יְהוָ֧ה אֱלֹהַ֛/י קְדֹשִׁ֖/י לֹ֣א נָמ֑וּת יְהוָה֙
    לְ/מִשְׁפָּ֣ט שַׂמְתּ֔/וֹ וְ/צ֖וּר לְ/הוֹכִ֥יחַ יְסַדְתּֽ/וֹ׃
translation:
  text: Are you not from of old, O LORD, my God, my Holy One? We will not die.[a]
    O LORD, you have appointed him for judgment, and you, O Rock, have established
    him for reproof.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '[a]'
    text: 'Or, following an alternative reading preserved in some traditions: “You
      do not die.” The Hebrew Masoretic Text reads “We will not die.”'
    reason: alternative_reading
lexical_decisions:
- source_word: הֲלֹוא
  chosen: Are you not
  alternatives:
  - Are you not indeed
  - Surely you are
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. Rendering
    it as an interrogative preserves the force of Habakkuk's appeal.
- source_word: מִקֶּדֶם
  chosen: from of old
  alternatives:
  - from everlasting
  - from ancient times
  lexicon: HALOT
  rationale: The phrase denotes ancient or primordial existence. 'From of old' preserves
    the temporal depth without overstating it to an explicit metaphysical claim like
    'from everlasting,' though that is a plausible contextual alternative.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the divine name יְהוָה is rendered 'the LORD' rather than
    transliterated.
- source_word: אֱלֹהַי
  chosen: my God
  lexicon: HALOT
  rationale: Straightforward first-person singular possessive; preserves the personal
    covenantal address.
- source_word: קְדֹשִׁי
  chosen: my Holy One
  alternatives:
  - my Holy God
  lexicon: HALOT
  rationale: The adjective used substantivally with first-person suffix is well represented
    by 'my Holy One,' a reverential title addressed to God.
- source_word: לֹא נָמוּת
  chosen: We will not die
  alternatives:
  - You do not die
  - We shall not die
  lexicon: HALOT
  rationale: The consonantal text points to first person plural ('we will not die').
    This is the plain sense of the MT and fits Habakkuk's expression of confidence
    that Judah will not be utterly destroyed. Because some ancient scribal and interpretive
    traditions prefer 'You do not die' to avoid possible theological difficulty or
    to make the line refer directly to God's eternity, that alternative is preserved
    in a footnote.
- source_word: לְמִשְׁפָּט
  chosen: for judgment
  alternatives:
  - for justice
  lexicon: HALOT
  rationale: מִשְׁפָּט here refers to judicial purpose or function. 'Judgment' fits
    the immediate context of God appointing the Chaldean instrument for punitive judgment.
- source_word: שַׂמְתּוֹ
  chosen: you have appointed him
  alternatives:
  - you have set him
  - you have placed him
  lexicon: HALOT
  rationale: The verb שׂים commonly means 'set, place, appoint.' In this context of
    divine commissioning, 'appointed' best conveys purposeful assignment.
- source_word: צוּר
  chosen: Rock
  lexicon: HALOT
  rationale: A common divine title emphasizing stability and strength. Capitalized
    in English to mark it as a title for God.
- source_word: לְהוֹכִיחַ
  chosen: for reproof
  alternatives:
  - for correction
  - for rebuke
  - to punish
  lexicon: HALOT
  rationale: The infinitive of יכח can denote rebuke, correction, or proving wrong.
    'For reproof' preserves the disciplinary and judicial nuance without narrowing
    it to mere punishment.
- source_word: יְסַדְתּוֹ
  chosen: have established him
  alternatives:
  - have founded him
  - have ordained him
  lexicon: HALOT
  rationale: יסד conveys establishing or founding. In context it refers to God's firm
    ordaining of the agent for a purpose.
