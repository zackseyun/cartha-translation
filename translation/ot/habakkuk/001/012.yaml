theological_decisions:
- issue: Subject and sense of לֹא נָמוּת
  chosen_reading: We will not die
  alternative_readings:
  - You do not die
  rationale: The Masoretic vocalization and morphology support first person plural,
    and optimal equivalence favors the source text's plain sense. This yields Habakkuk's
    confession that God's people will not be annihilated, even amid judgment. Because
    'You do not die' has been adopted in some traditions, likely to emphasize divine
    eternality or reflect a scribal sensitivity, it is preserved in a footnote rather
    than adopted in the main text.
  doctrine_reference: 'Translation philosophy 1 and 3: original-language primacy;
    preserve theological tension rather than resolve it'
