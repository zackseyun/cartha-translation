  chosen_reading: man
  alternative_readings:
  - humankind
  - mankind
  rationale: The Hebrew is grammatically singular masculine with representative force.
    Following the doctrine's gender-accurate principle, 'man' best matches the source
    form while still conveying collective humanity in context.
