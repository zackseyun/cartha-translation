id: HAB.1.14
reference: Habakkuk 1:14
source:
  edition: WLC
  text: וַ/תַּעֲשֶׂ֥ה אָדָ֖ם כִּ/דְגֵ֣י הַ/יָּ֑ם כְּ/רֶ֖מֶשׂ לֹא מֹשֵׁ֥ל בּֽ/וֹ־׃
translation:
  text: You make man like the fish of the sea, like creeping things that have no ruler
    over them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'humankind.' The Hebrew אָדָם is singular ('man') but can represent humanity
      collectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעֲשֶׂה
  chosen: You make
  alternatives:
  - And you make
  - You have made
  lexicon: HALOT
  rationale: From עשה, here a waw-prefixed imperfect in direct address to God. In
    prophetic discourse it can function as a present description within the complaint,
    so 'You make' is natural modern English while preserving the direct accusation.
    'And you make' is possible but unnecessary in English style.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - mankind
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered according to context. Here it denotes
    humanity collectively, but the singular representative sense is retained well
    by 'man,' matching the Hebrew's gender-accurate generic usage. Inclusive force
    is clear from context.
- source_word: כִּדְגֵי הַיָּם
  chosen: like the fish of the sea
  alternatives:
  - like sea fish
  - like the fish in the sea
  lexicon: HALOT
  rationale: A straightforward comparative phrase. 'Fish of the sea' preserves the
    Hebrew construction and the poetic register better than the flatter 'sea fish.'
- source_word: כְּרֶמֶשׂ
  chosen: like creeping things
  alternatives:
  - like swarming things
  - like crawling creatures
  lexicon: HALOT
  rationale: רֶמֶשׂ refers broadly to small creeping or crawling creatures. 'Creeping
    things' is a familiar biblical-natural term that fits the imagery and avoids over-specifying
    the class of animals.
- source_word: לֹא מֹשֵׁל בּוֹ
  chosen: that have no ruler over them
  alternatives:
  - with no one ruling over them
  - that has no ruler over it
  lexicon: HALOT
  rationale: 'מֹשֵׁל is a participle, ''one ruling'' or ''ruler.'' Although בּוֹ is
    morphologically singular (''over him/it''), the phrase refers back collectively
    to humanity likened to fish/creeping things; idiomatic English uses plural agreement:
    ''them.'' ''Ruler'' is preferable to the verbal paraphrase because it preserves
    the nominal force of the participle.'
