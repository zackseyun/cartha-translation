id: HAB.1.17
reference: Habakkuk 1:17
source:
  edition: WLC
  text: הַ֥/עַל כֵּ֖ן יָרִ֣יק חֶרְמ֑/וֹ וְ/תָמִ֛יד לַ/הֲרֹ֥ג גּוֹיִ֖ם לֹ֥א יַחְמֽוֹל׃ס
translation:
  text: Will he therefore keep emptying his net and continually slaughter nations
    without mercy?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and not spare.' The Hebrew verb can be rendered more literally as 'spare'
      or 'have pity.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'his dragnet.' The noun refers to fishing gear; 'net' is used here for
      natural English within the extended fishing metaphor of the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַעַל כֵּן
  chosen: Will he therefore
  alternatives:
  - Therefore will he
  - For this reason will he
  lexicon: HALOT
  rationale: The interrogative הֲ with עַל־כֵּן introduces a rhetorical question flowing
    from the previous verse. 'Will he therefore' preserves both the inferential sense
    ('therefore') and the interrogative force.
- source_word: יָרִיק
  chosen: keep emptying
  alternatives:
  - empty
  - pour out
  lexicon: HALOT
  rationale: The Hiphil of ריק commonly means 'empty out' or 'pour out.' In context
    of a fisherman's net, 'empty' is the natural image. 'Keep emptying' brings out
    the imperfect's ongoing/habitual nuance in this rhetorical question.
- source_word: חֶרְמוֹ
  chosen: his net
  alternatives:
  - his dragnet
  - his fishing net
  lexicon: HALOT
  rationale: In context (vv. 15–16) the imagery is explicitly fishing. 'Net' is the
    most natural and readable English rendering. 'Dragnet' is possible, but the broader
    fishing metaphor has already used multiple net terms in the context, so the simpler
    'net' avoids overprecision not demanded by this specific noun.
- source_word: וְתָמִיד
  chosen: and continually
  alternatives:
  - continually
  - and constantly
  - and always
  lexicon: HALOT
  rationale: תָמִיד denotes ongoing continuity. 'And continually' preserves the conjunction
    and the adverbial force, emphasizing relentless repeated action.
- source_word: לַהֲרֹג
  chosen: slaughter
  alternatives:
  - kill
  - put to death
  lexicon: HALOT
  rationale: The infinitive 'to kill' in this military-imperial context refers to
    mass killing of peoples. 'Slaughter' better conveys the brutality implied by the
    context without adding content beyond the source.
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - peoples
  - Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם here refers to political/ethnic groups conquered by the Chaldean
    oppressor, so 'nations' fits the context best. 'Gentiles' would be misleading
    in this prophetic setting.
- source_word: לֹא יַחְמֹל
  chosen: without mercy
  alternatives:
  - and not spare
  - and have no pity
  lexicon: HALOT
  rationale: The verb חמל means 'spare' or 'have compassion.' Rendered adverbially
    in English, 'without mercy' is idiomatic and captures the sense of pitiless ongoing
    violence. The negative is thus preserved in natural English.
