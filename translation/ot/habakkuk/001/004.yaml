id: HAB.1.4
reference: Habakkuk 1:4
source:
  edition: WLC
  text: עַל כֵּן֙ תָּפ֣וּג תּוֹרָ֔ה וְ/לֹֽא יֵצֵ֥א לָ/נֶ֖צַח מִשְׁפָּ֑ט כִּ֤י רָשָׁע֙
    מַכְתִּ֣יר אֶת הַ/צַּדִּ֔יק עַל כֵּ֛ן יֵצֵ֥א מִשְׁפָּ֖ט מְעֻקָּֽל־־־־׃
translation:
  text: Therefore the law grows numb, and justice never goes forth. For the wicked
    surrounds the righteous; therefore justice goes forth twisted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'grows slack,' 'becomes feeble,' or 'is paralyzed.'
    reason: lexical_alternative
  - marker: b
    text: Or 'justice never comes forth forever'; the Hebrew expression is idiomatic
      for justice not emerging at all.
    reason: lexical_alternative
  - marker: c
    text: Or 'encircles' or 'hems in.' The verb can also mean 'crowns' in other contexts,
      but here it likely describes the wicked enclosing the righteous.
    reason: lexical_alternative
  - marker: d
    text: Or 'perverted' or 'crooked.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּפוּג
  chosen: grows numb
  alternatives:
  - grows slack
  - becomes feeble
  - is paralyzed
  lexicon: HALOT
  rationale: The verb from פוג conveys becoming weak, numb, or ineffective. With תּוֹרָה
    as subject, the sense is not that the law ceases to exist but that it loses force
    or efficacy. 'Grows numb' preserves the vivid metaphor and communicates functional
    paralysis in modern English.
- source_word: תּוֹרָה
  chosen: law
  alternatives:
  - instruction
  lexicon: HALOT
  rationale: Torah can mean instruction broadly, but in this prophetic justice context
    it refers to the operative legal/moral order. 'Law' is the most natural concise
    rendering here.
- source_word: לָנֶצַח
  chosen: never
  alternatives:
  - forever
  - continually
  - perpetually
  lexicon: HALOT
  rationale: Though literally 'for perpetuity/forever,' in the negated clause וְלֹא
    ... לָנֶצַח it idiomatically means justice does not ever emerge. 'Never' gives
    the idiomatic force in clear English.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - legal decision
  lexicon: HALOT
  rationale: In this context of social corruption and oppression, mishpat refers to
    just judgment or justice in public life. 'Justice' better captures the ethical-judicial
    sense than the narrower 'judgment.'
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - a wicked man
  - the guilty
  lexicon: HALOT
  rationale: The singular adjective functions collectively or representatively. 'The
    wicked' is idiomatic English and matches the contrast with 'the righteous.'
- source_word: מַכְתִּיר
  chosen: surrounds
  alternatives:
  - encircles
  - hem in
  - crowns
  lexicon: HALOT
  rationale: The Hiphil of כתר here is best understood as 'surround/hem in,' describing
    the wicked enclosing the righteous. 'Crowns' is lexically possible in other contexts
    but does not fit the parallelism or sense here.
- source_word: הַצַּדִּיק
  chosen: the righteous
  alternatives:
  - the just person
  - the innocent
  lexicon: HALOT
  rationale: The singular likely has a representative sense. 'The righteous' preserves
    the moral contrast and remains idiomatic.
- source_word: מְעֻקָּל
  chosen: twisted
  alternatives:
  - perverted
  - distorted
  - crooked
  lexicon: HALOT
  rationale: The passive participle from עקל denotes something bent or perverted from
    what is straight. 'Twisted' is vivid, accessible, and preserves the metaphor of
    distorted justice.
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - so
  - for this reason
  lexicon: HALOT
  rationale: The phrase appears twice and marks consequence in the prophet's complaint.
    Rendering both instances as 'therefore' preserves the rhetorical structure.
- source_word: יֵצֵא
  chosen: goes forth
  alternatives:
  - comes forth
  - issues
  lexicon: HALOT
  rationale: 'The repeated verb creates deliberate contrast: justice does not go forth
    rightly, then does go forth in a twisted form. ''Goes forth'' preserves the repetition
    and formal texture.'
