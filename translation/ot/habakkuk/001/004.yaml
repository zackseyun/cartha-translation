theological_decisions:
- issue: Scope of תּוֹרָה in prophetic complaint
  chosen_reading: Rendered as 'law' referring to the operative legal-moral order in
    Judah, without narrowing it to a specific codified statute or broadening it to
    generic teaching.
  alternative_readings:
  - instruction
  - Torah as covenant teaching
  rationale: The verse laments societal breakdown and failed justice. 'Law' best fits
    the immediate judicial context while leaving open the covenantal background.
