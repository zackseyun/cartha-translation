theological_decisions:
- issue: Divine relation to evil in the opening colon
  chosen_reading: Render the prophet's claim as a rhetorical assertion about God's
    moral purity and incompatibility with evil, without turning it into a philosophical
    absolute that God cannot in any sense see evil.
  alternative_readings:
  - A stricter literal reading that could imply God does not see evil at all
  - A looser interpretive reading such as 'you cannot tolerate wrongdoing'
  rationale: The verse is part of Habakkuk's complaint and uses poetic idiom. The
    translation preserves the rhetoric ('too pure to look on evil') while avoiding
    doctrinal overstatement beyond the text's immediate force. The next line itself
    asks why God does in fact 'look on' the treacherous, showing the language is phenomenological
    and rhetorical rather than a denial of divine omniscience.
  doctrine_reference: Preserve theological tension rather than resolve it.
