id: HAB.1.13
reference: Habakkuk 1:13
source:
  edition: WLC
  text: טְה֤וֹר עֵינַ֨יִם֙ מֵ/רְא֣וֹת רָ֔ע וְ/הַבִּ֥יט אֶל עָמָ֖ל לֹ֣א תוּכָ֑ל לָ֤/מָּה
    תַבִּיט֙ בּֽוֹגְדִ֔ים תַּחֲרִ֕ישׁ בְּ/בַלַּ֥ע רָשָׁ֖ע צַדִּ֥יק מִמֶּֽ/נּוּ־׃
translation:
  text: Your eyes are too pure to look on evil, and you cannot gaze at wrongdoing.
    Why then do you look on the treacherous and keep silent when the wicked swallows
    up one more righteous than he?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to see evil'; the Hebrew idiom is literally 'too pure of eyes from seeing
      evil.'
    reason: lexical_alternative
  - marker: b
    text: Or 'misery,' 'trouble,' or 'mischief' for 'wrongdoing.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the wicked swallows up one more righteous than he'—a comparative
      statement, not necessarily a claim of absolute righteousness.
    reason: lexical_alternative
lexical_decisions:
- source_word: טְהוֹר עֵינַיִם
  chosen: Your eyes are too pure
  alternatives:
  - You are of purer eyes
  - Your eyes are pure
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of 'pure of eyes.' In natural English,
    'Your eyes are too pure' preserves the metaphor and the comparative force implied
    by the following infinitive construction.
- source_word: מֵרְאוֹת רָע
  chosen: to look on evil
  alternatives:
  - from seeing evil
  - to see evil
  lexicon: HALOT
  rationale: The preposition מִן with the infinitive after 'pure' expresses separation/inability
    with respect to seeing evil. 'To look on evil' is idiomatic and fits the parallel
    with the next colon.
- source_word: וְהַבִּיט אֶל עָמָל
  chosen: and you cannot gaze at wrongdoing
  alternatives:
  - and to look at trouble
  - and to behold misery
  lexicon: HALOT
  rationale: עָמָל often denotes trouble, mischief, or wrongdoing, especially moral
    evil that produces misery. Here, in parallel with רָע and in a complaint about
    injustice, 'wrongdoing' best captures the ethical sense. 'Gaze at' reflects the
    contemplative nuance of נבט.
- source_word: לֹא תוּכָל
  chosen: you cannot
  alternatives:
  - you are not able
  - you cannot endure
  lexicon: HALOT
  rationale: The verb יכל denotes ability. 'You cannot' is the most direct rendering;
    the context implies moral incompatibility rather than mere physical inability,
    but that implication need not be expanded in translation.
- source_word: לָמָּה תַבִּיט
  chosen: Why then do you look on
  alternatives:
  - Why do you behold
  - Why do you watch
  lexicon: HALOT
  rationale: The interrogative introduces the prophet's complaint. 'Then' helps convey
    the rhetorical contrast with the previous assertion without adding substantial
    interpretation.
- source_word: בּוֹגְדִים
  chosen: the treacherous
  alternatives:
  - traitors
  - those who deal treacherously
  lexicon: HALOT
  rationale: The participle describes people acting faithlessly or treacherously.
    'The treacherous' is concise, natural, and preserves the moral characterization.
- source_word: תַּחֲרִישׁ
  chosen: keep silent
  alternatives:
  - are silent
  - remain silent
  lexicon: HALOT
  rationale: The Hiphil of חרש here means to be silent or say nothing. 'Keep silent'
    conveys ongoing divine non-intervention as perceived by the prophet.
- source_word: בְּבַלַּע
  chosen: when ... swallows up
  alternatives:
  - while ... devours
  - at the swallowing up of
  lexicon: HALOT
  rationale: The preposition with infinitive construct marks the circumstance in which
    God is silent. 'When ... swallows up' gives clear English syntax while preserving
    the vivid predatory image.
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - a wicked man
  - the guilty
  lexicon: HALOT
  rationale: The singular adjective functions substantivally. 'The wicked' is a standard
    and accurate English equivalent.
- source_word: צַדִּיק מִמֶּנּוּ
  chosen: one more righteous than he
  alternatives:
  - the righteous who is more righteous than he
  - someone more righteous than him
  lexicon: HALOT
  rationale: The comparative מן indicates relative righteousness, not absolute innocence.
    'One more righteous than he' preserves the comparison and avoids overstating the
    case as if the swallowed party were perfectly righteous.
