theological_decisions:
- issue: Idolatrous language applied to military/fishing instruments
  chosen_reading: The verse is rendered straightforwardly as the conqueror worshiping
    his own means of success ('his net' and 'his dragnet').
  alternative_readings:
  - The language could be taken more figuratively as excessive trust in military power
    rather than literal cultic acts.
  rationale: The Hebrew uses explicit sacrificial and incense terminology, so the
    main text should preserve the cultic imagery rather than flatten it into mere
    'trust.' The figurative implication is real, but it arises from the literal wording
    of worship language.
  doctrine_reference: Translation philosophy §1, §3
