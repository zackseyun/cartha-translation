id: HAB.1.16
reference: Habakkuk 1:16
source:
  edition: WLC
  text: עַל כֵּן֙ יְזַבֵּ֣חַ לְ/חֶרְמ֔/וֹ וִֽ/יקַטֵּ֖ר לְ/מִכְמַרְתּ֑/וֹ כִּ֤י בָ/הֵ֨מָּה֙
    שָׁמֵ֣ן חֶלְק֔/וֹ וּ/מַאֲכָל֖/וֹ בְּרִאָֽה־׃
translation:
  text: Therefore he sacrifices to his net and burns incense to his dragnet, because
    by them his portion is rich and his food is plentiful.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his share is fat, and his food is rich/choice.' The Hebrew uses imagery
      of fatness to express abundance and prosperity.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Marks logical/resultative connection with the preceding description of
    the conqueror's success; 'therefore' is natural modern English and preserves the
    inferential force.
- source_word: יְזַבֵּחַ
  chosen: he sacrifices
  alternatives:
  - he offers sacrifice
  - he slaughters as a sacrifice
  lexicon: HALOT
  rationale: Piel of זבח here denotes offering sacrifice, not merely slaughtering.
    'He sacrifices' is concise and idiomatic.
- source_word: לְחֶרְמוֹ
  chosen: to his net
  alternatives:
  - to his fishing net
  lexicon: HALOT
  rationale: חֵרֶם here refers to a net used for catching, in the immediate fishing
    metaphor of the context. 'Net' is the most natural English equivalent; 'fishing'
    is implied by context and need not be added in the main text.
- source_word: וִיקַטֵּר
  chosen: and burns incense
  alternatives:
  - and makes offerings of incense
  - and offers smoke
  lexicon: HALOT
  rationale: קטר in the Piel commonly refers to burning incense or making a smoke
    offering in cultic worship. 'Burns incense' clearly conveys the idolatrous worship
    imagery.
- source_word: לְמִכְמַרְתּוֹ
  chosen: to his dragnet
  alternatives:
  - to his seine
  - to his net
  lexicon: HALOT
  rationale: מִכְמֶרֶת denotes a larger enclosing net, distinct from חֵרֶם. 'Dragnet'
    preserves the distinction between the two implements better than repeating 'net'.
- source_word: כִּי בָהֵמָּה
  chosen: because by them
  alternatives:
  - for by them
  - because through them
  lexicon: HALOT
  rationale: 'The preposition ב plus 3mp pronoun is instrumental: his prosperity comes
    by means of these tools. ''By them'' is the clearest concise rendering.'
- source_word: שָׁמֵן חֶלְקוֹ
  chosen: his portion is rich
  alternatives:
  - his share is fat
  - his allotment is prosperous
  lexicon: HALOT
  rationale: שָׁמֵן literally means 'fat,' but idiomatically conveys abundance/prosperity.
    'Rich' communicates the metaphor's sense in readable modern English while preserving
    the idea of abundance.
- source_word: וּמַאֲכָלוֹ בְּרִיאָה
  chosen: and his food is plentiful
  alternatives:
  - and his food is fat
  - and his food is choice
  lexicon: HALOT
  rationale: בְּרִיאָה describes something fat/plump, hence abundant or choice. With
    'food,' 'plentiful' best conveys the result of successful exploitation in natural
    English.
