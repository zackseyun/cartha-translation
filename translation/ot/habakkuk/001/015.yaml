theological_decisions:
- issue: Referent of the fishing imagery
  chosen_reading: The verse continues the metaphor of the Chaldean conqueror as a
    fisherman capturing peoples like fish, without making the imagery literal.
  alternative_readings:
  - Literal fishing imagery without political referent
  rationale: The immediate context (Hab 1:14–17) applies fishing language metaphorically
    to imperial violence. The translation preserves the metaphor without over-explaining
    it in the main text.
