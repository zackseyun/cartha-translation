id: HAB.1.15
reference: Habakkuk 1:15
source:
  edition: WLC
  text: כֻּלֹּ/ה֙ בְּ/חַכָּ֣ה הֵֽעֲלָ֔ה יְגֹרֵ֣/הוּ בְ/חֶרְמ֔/וֹ וְ/יַאַסְפֵ֖/הוּ
    בְּ/מִכְמַרְתּ֑/וֹ עַל כֵּ֖ן יִשְׂמַ֥ח וְ/יָגִֽיל־׃
translation:
  text: He brings all of them up with a hook; he drags him away with his net, and
    gathers him in with his dragnet. Therefore he rejoices and exults.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'draws him out with his net.' The Hebrew shifts between collective and
      singular imagery for the captured prey.
    reason: lexical_alternative
  - marker: b
    text: 'Two different Hebrew words for fishing nets are used here: ''net'' and
      ''dragnet.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כֻּלֹּה
  chosen: all of them
  alternatives:
  - all of it
  - every one of them
  lexicon: HALOT
  rationale: Though morphologically singular with suffix, in context it refers collectively
    to the prey/fish/human victims just mentioned. English plural 'all of them' best
    conveys the collective sense without flattening the imagery.
- source_word: בְּחַכָּה
  chosen: with a hook
  alternatives:
  - with a fishhook
  - with an angle
  lexicon: HALOT
  rationale: חַכָּה denotes a hook used for catching fish. 'Hook' is natural modern
    English and preserves the fishing metaphor.
- source_word: הֶעֱלָה
  chosen: brings ... up
  alternatives:
  - pulls up
  - lifts up
  lexicon: HALOT
  rationale: The Hiphil of עלה here describes causing the catch to come up from the
    water. 'Brings up' is idiomatic and slightly more formal than 'pulls up,' fitting
    the poetic line.
- source_word: יְגֹרֵהוּ
  chosen: he drags him away
  alternatives:
  - draws him out
  - drags him
  lexicon: HALOT
  rationale: The verb conveys drawing/dragging the prey. Singular object is retained
    as 'him' to reflect the Hebrew shift from collective to singular individual prey
    within the poetic imagery.
- source_word: בְחֶרְמוֹ
  chosen: with his net
  alternatives:
  - with his seine
  - with his fishing net
  lexicon: HALOT
  rationale: חֵרֶם in this context is a fishing net. 'Net' is the clearest general
    rendering; the possessive 'his' is retained.
- source_word: וְיַאַסְפֵהוּ
  chosen: and gathers him in
  alternatives:
  - and collects him
  - and gathers him
  lexicon: HALOT
  rationale: אָסַף means gather/collect. 'Gathers him in' fits the image of hauling
    prey into the catching device and reads naturally in English.
- source_word: בְּמִכְמַרְתּוֹ
  chosen: with his dragnet
  alternatives:
  - with his fishing net
  - with his seine
  lexicon: HALOT
  rationale: מִכְמֶרֶת refers to a net, often a dragnet or enclosing net. Rendering
    it differently from חֵרֶם preserves the Hebrew's use of two related but distinct
    terms.
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: 'This marks result: because his predatory campaign succeeds, he responds
    with joy. ''Therefore'' preserves the logical connection.'
- source_word: יִשְׂמַח
  chosen: he rejoices
  alternatives:
  - he is glad
  - he delights
  lexicon: HALOT
  rationale: שׂמח is standard 'rejoice/be glad.' 'Rejoices' matches the elevated prophetic
    tone.
- source_word: וְיָגִיל
  chosen: and exults
  alternatives:
  - and is jubilant
  - and rejoices
  lexicon: HALOT
  rationale: גיל denotes exultant joy. 'Exults' preserves the intensification and
    avoids collapsing it into the same English gloss as the previous verb.
