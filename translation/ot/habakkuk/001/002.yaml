id: HAB.1.2
reference: Habakkuk 1:2
source:
  edition: WLC
  text: עַד אָ֧נָה יְהוָ֛ה שִׁוַּ֖עְתִּי וְ/לֹ֣א תִשְׁמָ֑ע אֶזְעַ֥ק אֵלֶ֛י/ךָ חָמָ֖ס
    וְ/לֹ֥א תוֹשִֽׁיעַ־׃
translation:
  text: How long, O LORD, have I cried for help and you do not hear? I cry out to
    you, “Violence!” and you do not save.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “Until when, O LORD, have I cried for help…?”
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד אָנָה
  chosen: How long
  alternatives:
  - Until when
  lexicon: HALOT
  rationale: Idiomatic temporal lament formula in Hebrew; 'How long' is the natural
    English equivalent and preserves the complaint's force better than the more literal
    but less idiomatic 'Until when.'
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible convention.
- source_word: שִׁוַּעְתִּי
  chosen: have I cried for help
  alternatives:
  - I have cried out
  - I have pleaded
  lexicon: HALOT
  rationale: The verb שׁוע commonly denotes crying for help or aid in distress. The
    English perfect 'have I cried for help' fits the lament's sense of ongoing prior
    appeal up to the present question.
- source_word: וְלֹא תִשְׁמָע
  chosen: and you do not hear
  alternatives:
  - but you do not hear
  - and you do not listen
  lexicon: HALOT
  rationale: Retains the Hebrew coordination with simple 'and,' while natural English
    still conveys the adversative force in context. 'Hear' is preferred over 'listen'
    because שמע in prayer contexts often carries the sense of hearing/responding to
    petition.
- source_word: אֶזְעַק
  chosen: I cry out
  alternatives:
  - I call out
  - I shout
  lexicon: HALOT
  rationale: זעק expresses a strong cry of distress. 'I cry out' is idiomatic and
    preserves the intensity without overstating volume.
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - unto you
  lexicon: HALOT
  rationale: Standard modern English rendering of the preposition plus pronominal
    suffix.
- source_word: חָמָס
  chosen: Violence
  alternatives:
  - Wrongdoing
  - Outrage
  lexicon: HALOT
  rationale: חָמָס denotes violence, brutality, or violent injustice. 'Violence' is
    the most direct and established rendering here, matching the prophet's alarm over
    social evil.
- source_word: וְלֹא תוֹשִׁיעַ
  chosen: and you do not save
  alternatives:
  - but you do not save
  - and you do not deliver
  lexicon: HALOT
  rationale: The Hiphil of ישׁע means to save/deliver. 'Save' is concise and theologically
    resonant without importing more than the Hebrew states. The present 'do not save'
    matches the lament's immediacy.
