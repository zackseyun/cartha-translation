theological_decisions:
- issue: Rendering of prophetic superscription מַשָּׂא
  chosen_reading: oracle
  alternative_readings:
  - burden
  - pronouncement
  rationale: This is primarily a lexical decision, but it also affects tone and genre.
    'Oracle' best conveys a prophetic revelation without importing a subjective emotional
    burden into the text. The verse itself does not specify whether the message is
    exclusively judgment, so a broader prophetic heading is preferable.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English; preserve source sense without paraphrase.'
