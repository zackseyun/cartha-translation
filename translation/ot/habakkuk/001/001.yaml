id: HAB.1.1
reference: Habakkuk 1:1
source:
  edition: WLC
  text: הַ/מַּשָׂא֙ אֲשֶׁ֣ר חָזָ֔ה חֲבַקּ֖וּק הַ/נָּבִֽיא׃
translation:
  text: 'The oracle that Habakkuk the prophet saw:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'burden' or 'pronouncement.' Hebrew massaʾ is a prophetic heading for
      a weighty message.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּשָׂא
  chosen: the oracle
  alternatives:
  - the burden
  - the pronouncement
  lexicon: HALOT
  rationale: מַשָּׂא in prophetic superscriptions commonly denotes an utterance/oracle,
    often weighty or concerning judgment. 'Oracle' is idiomatic modern English and
    preserves the prophetic-technical sense better than the more literal but potentially
    misleading 'burden.'
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: The relative particle simply links the heading to what follows. 'That'
    is natural in English superscription style.
- source_word: חָזָה
  chosen: saw
  alternatives:
  - envisioned
  - received in a vision
  lexicon: HALOT
  rationale: The verb literally means 'saw' and is standard prophetic language for
    receiving revelation. Retaining 'saw' preserves the source metaphor and avoids
    over-interpreting the mode of revelation.
- source_word: חֲבַקּוּק
  chosen: Habakkuk
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: The title identifies Habakkuk's role. Translating rather than transliterating
    preserves meaning and matches normal English biblical style.
