id: HAB.1.7
reference: Habakkuk 1:7
source:
  edition: WLC
  text: אָיֹ֥ם וְ/נוֹרָ֖א ה֑וּא מִמֶּ֕/נּוּ מִשְׁפָּט֥/וֹ וּ/שְׂאֵת֖/וֹ יֵצֵֽא׃
translation:
  text: It is dreadful and fearsome; its justice and its dignity proceed from itself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its judgment and its majesty come from itself.'
    reason: lexical_alternative
  - marker: b
    text: The sense is that this nation's standards of rule and claims to honor arise
      from itself, not from any authority above it.
    reason: cultural_note
lexical_decisions:
- source_word: אָיֹם
  chosen: dreadful
  alternatives:
  - terrible
  - awesome
  lexicon: HALOT
  rationale: Conveys something inspiring dread or terror. 'Dreadful' fits the threatening
    context of the Chaldeans better than modern 'awesome,' and avoids implying mere
    bad quality as in some uses of 'terrible'.
- source_word: וְנוֹרָא
  chosen: fearsome
  alternatives:
  - terrifying
  - to be feared
  lexicon: HALOT
  rationale: Paired with אָיֹם for intensification. 'Fearsome' preserves the adjectival
    force in natural English and avoids overtranslation.
- source_word: הוּא
  chosen: it is
  alternatives:
  - he is
  lexicon: HALOT
  rationale: Although grammatically masculine singular, the referent is the nation/people
    just described, best represented in English as a collective 'it' here rather than
    a personal 'he'.
- source_word: מִמֶּנּוּ
  chosen: from itself
  alternatives:
  - from him
  - from them
  - of itself
  lexicon: HALOT
  rationale: The preposition marks source/origin. 'From itself' captures the sense
    that this nation's standards arise internally rather than from any higher authority.
- source_word: מִשְׁפָּטוֹ
  chosen: its justice
  alternatives:
  - its judgment
  - its legal claim
  - its justice-system
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment or justice. Here it refers to the nation's
    exercise of judicial/political authority. 'Justice' is concise and idiomatic,
    though the sense includes its self-derived judgment.
- source_word: וּשְׂאֵתוֹ
  chosen: its dignity
  alternatives:
  - its majesty
  - its exaltation
  - its eminence
  lexicon: HALOT
  rationale: The noun denotes elevation, exaltation, or dignity/status. In context
    it parallels מִשְׁפָּטוֹ as a self-originating claim to rank or authority. 'Dignity'
    communicates elevated status without overstating royal splendor.
- source_word: יֵצֵא
  chosen: proceed
  alternatives:
  - goes out
  - comes forth
  - issues
  lexicon: HALOT
  rationale: A singular verb governing the paired nouns expresses emergence or derivation.
    'Proceed' is natural English for authority/status arising from oneself.
