theological_decisions:
- issue: Divine agency in relation to the rise of Babylon
  chosen_reading: I am raising up the Chaldeans
  alternative_readings:
  - I am stirring up the Chaldeans
  rationale: The Hebrew explicitly attributes the Chaldeans' rise to God's action.
    The translation preserves this theological claim without softening it, while avoiding
    over-specification about the mode of causation.
  doctrine_reference: Translation philosophy §1, §3
