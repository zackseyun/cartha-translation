id: HAB.1.6
reference: Habakkuk 1:6
source:
  edition: WLC
  text: כִּֽי הִנְ/נִ֤י מֵקִים֙ אֶת הַ/כַּשְׂדִּ֔ים הַ/גּ֖וֹי הַ/מַּ֣ר וְ/הַ/נִּמְהָ֑ר
    הַֽ/הוֹלֵךְ֙ לְ/מֶרְחֲבֵי אֶ֔רֶץ לָ/רֶ֖שֶׁת מִשְׁכָּנ֥וֹת לֹּא לֽ/וֹ־־־־׃
translation:
  text: For look, I am raising up the Chaldeans, that bitter and hasty nation, which
    marches through the broad places of the earth to seize dwelling places not its
    own.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Babylonians.' The Hebrew reads 'the Chaldeans,' the historical people
      associated with Neo-Babylonian power.
    reason: lexical_alternative
  - marker: b
    text: Or 'stirring up' for 'raising up.' The Hebrew can express causing a power
      to arise or be roused for action.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - For behold
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding divine response. 'For' best
    preserves the causal/explanatory force in natural English.
- source_word: הִנְנִי
  chosen: look, I am
  alternatives:
  - behold, I am
  - here I am
  lexicon: HALOT
  rationale: The particle-plus-pronoun construction is deictic and emphatic. 'Look,
    I am' preserves the attention-getting force without archaic 'behold.'
- source_word: מֵקִים
  chosen: raising up
  alternatives:
  - stirring up
  - causing to arise
  lexicon: HALOT
  rationale: From קום in the Hiphil, indicating causing to arise or appointing. 'Raising
    up' is idiomatic and preserves divine agency. 'Stirring up' is possible in context
    but slightly more interpretive.
- source_word: הַכַּשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: HALOT
  rationale: The ethnonym is literally 'Chaldeans.' Since names/peoples are transliterated
    rather than translated where possible, the main text keeps 'Chaldeans'; 'Babylonians'
    is a contextual equivalent worth preserving as an alternative.
- source_word: הַגּוֹי
  chosen: nation
  alternatives:
  - people
  lexicon: HALOT
  rationale: גוֹי here denotes a political/ethnic nation. 'Nation' is the most direct
    rendering.
- source_word: הַמַּר
  chosen: bitter
  alternatives:
  - fierce
  - ruthless
  lexicon: HALOT
  rationale: The adjective literally means 'bitter.' In context it describes harsh,
    cruel character. 'Bitter' preserves the lexical form while allowing the reader
    to infer severity.
- source_word: וְהַנִּמְהָר
  chosen: hasty
  alternatives:
  - impetuous
  - swift
  lexicon: HALOT
  rationale: From מהר, conveying haste or impetuosity. 'Hasty' captures both speed
    and rash aggressiveness better than merely 'swift.'
- source_word: הַהוֹלֵךְ
  chosen: which marches
  alternatives:
  - that goes
  - that sweeps
  lexicon: HALOT
  rationale: The participle 'going/walking' describes characteristic action of the
    nation. 'Marches' fits military context without over-paraphrasing.
- source_word: לְמֶרְחֲבֵי אֶרֶץ
  chosen: through the broad places of the earth
  alternatives:
  - across the breadth of the earth
  - through wide regions of the earth
  lexicon: HALOT
  rationale: Literally 'to/through the broad places of the earth.' This phrase conveys
    expansive territorial reach. The chosen rendering stays close to the Hebrew while
    remaining readable.
- source_word: לָרֶשֶׁת
  chosen: to seize
  alternatives:
  - to possess
  - to dispossess and occupy
  lexicon: HALOT
  rationale: ירשׁ can mean possess/inherit/take possession of, often by conquest.
    'To seize' foregrounds the violent military sense in this context.
- source_word: מִשְׁכָּנוֹת
  chosen: dwelling places
  alternatives:
  - habitations
  - homes
  lexicon: HALOT
  rationale: The noun denotes places of dwelling/settlement. 'Dwelling places' is
    clear and slightly more formal than 'homes,' fitting prophetic diction.
- source_word: לֹא לוֹ
  chosen: not its own
  alternatives:
  - that are not theirs
  - not belonging to it
  lexicon: HALOT
  rationale: The phrase marks illegitimate possession. Because the antecedent is the
    singular collective 'nation,' singular English 'its own' matches the grammar and
    reads naturally.
