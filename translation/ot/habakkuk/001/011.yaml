id: HAB.1.11
reference: Habakkuk 1:11
source:
  edition: WLC
  text: אָ֣ז חָלַ֥ף ר֛וּחַ וַֽ/יַּעֲבֹ֖ר וְ/אָשֵׁ֑ם ז֥וּ כֹח֖/וֹ לֵ/אלֹהֽ/וֹ׃
translation:
  text: Then he sweeps by like the wind and passes on—he becomes guilty; this strength
    of his is his god.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he becomes guilty, attributing this strength to his god,' or 'his strength
      belongs to his god.' The Hebrew final clause is terse and can be understood
      in more than one way.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'wind' can also mean 'spirit'; here the context favors the image
      of swift, forceful movement like the wind.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal adverb marking the next stage in the description; 'Then' is
    natural and sufficiently formal.
- source_word: חָלַף
  chosen: sweeps by
  alternatives:
  - changes
  - passes by
  lexicon: HALOT
  rationale: With רוּחַ following, the sense is movement like a gust or sweeping force
    rather than simple abstract change. 'Sweeps by' captures the violent momentum
    of the invader in context.
- source_word: רוּחַ
  chosen: like the wind
  alternatives:
  - wind
  - spirit
  lexicon: HALOT
  rationale: רוּחַ can mean 'wind' or 'spirit.' Here the imagery of rapid passing
    fits 'wind' best. Because the syntax is compressed, English supplies 'like the'
    to make the comparison intelligible.
- source_word: וַיַּעֲבֹר
  chosen: and passes on
  alternatives:
  - and passes through
  - and goes on
  lexicon: HALOT
  rationale: Continues the picture of swift advance. 'Passes on' reads naturally in
    English and preserves the sequential force of the waw-consecutive.
- source_word: וְאָשֵׁם
  chosen: he becomes guilty
  alternatives:
  - and is guilty
  - and incurs guilt
  - and offends
  lexicon: HALOT
  rationale: The verb denotes becoming culpable or incurring guilt. 'He becomes guilty'
    preserves the verbal force better than a static adjective alone.
- source_word: זוּ
  chosen: this
  alternatives:
  - such
  - that
  lexicon: HALOT
  rationale: Demonstrative/resumptive particle pointing to what follows; 'this' is
    the most straightforward English equivalent.
- source_word: כֹחוֹ
  chosen: strength of his
  alternatives:
  - his strength
  - his power
  lexicon: HALOT
  rationale: Refers to the military might just described. 'Strength' avoids over-abstracting
    while still conveying force; the possessive is retained explicitly.
- source_word: לֵאלֹהוֹ
  chosen: is his god
  alternatives:
  - belongs to his god
  - for his god
  - to his god
  lexicon: HALOT
  rationale: The lamed construction here is terse and difficult. In context it most
    plausibly means that he treats his own strength as his god, an accusation of idolatrous
    self-deification. This yields coherent sense with the guilt statement and matches
    many contextual readings.
