theological_decisions:
- issue: Interpretation of the final clause זוּ כֹחוֹ לֵאלֹהוֹ
  chosen_reading: The Chaldean is guilty because he regards his own strength as his
    god.
  alternative_readings:
  - He becomes guilty, attributing this strength to his god.
  - He passes on, and his strength belongs to his god.
  rationale: The Hebrew is compressed and admits multiple construals. In the immediate
    context of arrogant imperial violence, the reading that his own might functions
    as his god best explains the guilt charge and preserves the prophetic critique
    of idolatrous self-reliance. Because the alternatives remain plausible, they are
    preserved in a footnote rather than erased.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
