id: HAB.1.5
reference: Habakkuk 1:5
source:
  edition: WLC
  text: רְא֤וּ בַ/גּוֹיִם֙ וְֽ/הַבִּ֔יטוּ וְ/הִֽתַּמְּה֖וּ תְּמָ֑הוּ כִּי פֹ֨עַל֙
    פֹּעֵ֣ל בִּֽ/ימֵי/כֶ֔ם לֹ֥א תַאֲמִ֖ינוּ כִּ֥י יְסֻפָּֽר־׃
translation:
  text: Look among the nations and see; stare in astonishment, be utterly amazed.
    For I am doing a work in your days that you would not believe if it were told.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Look at the nations and see; be astonished, be astonished.' The Hebrew
      repeats the astonishment verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or, 'For a deed is being done in your days that you would not believe if
      it were recounted.'
    reason: alternative_reading
lexical_decisions:
- source_word: רְאוּ
  chosen: Look
  alternatives:
  - See
  lexicon: HALOT
  rationale: Imperative plural of ראה. 'Look' works well with the following prepositional
    phrase 'among the nations' and preserves the summons to observe.
- source_word: בַגּוֹיִם
  chosen: among the nations
  alternatives:
  - at the nations
  - among the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם commonly means 'nations.' The preposition with article here is
    best taken in the sense 'among' or 'at/among.' 'Nations' is preferable to 'Gentiles'
    in this prophetic context because the reference is to peoples/political entities,
    not primarily an ethnic-religious contrast.
- source_word: וְהַבִּיטוּ
  chosen: and see
  alternatives:
  - and look
  - and observe
  lexicon: HALOT
  rationale: הביט overlaps with ראה but adds focused looking. Rendering it 'and see'
    avoids awkward repetition while preserving the paired imperatives.
- source_word: וְהִתַּמְּהוּ תְּמָהוּ
  chosen: stare in astonishment, be utterly amazed
  alternatives:
  - and be astonished, astonished
  - and wonder, wonder
  lexicon: HALOT
  rationale: The doubled forms from תמה intensify the command. Rather than woodenly
    repeating the same English word twice, the translation expresses the emphatic
    force with a two-part phrase in natural English.
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the ground for the astonishment command. 'For' fits the explanatory
    flow.
- source_word: פֹעַל פֹּעֵל
  chosen: I am doing a work
  alternatives:
  - a deed I am doing
  - I am working a work
  lexicon: HALOT
  rationale: The noun + participle construction is emphatic. English idiom is best
    served by 'I am doing a work,' which preserves both the action and the object.
    The first-person subject is implicit from context and required in English.
- source_word: בִּימֵיכֶם
  chosen: in your days
  alternatives:
  - in your lifetime
  - in your time
  lexicon: HALOT
  rationale: Literal and idiomatic. It preserves the temporal immediacy addressed
    to the audience.
- source_word: לֹא תַאֲמִינוּ
  chosen: you would not believe
  alternatives:
  - you will not believe
  - you do not believe
  lexicon: HALOT
  rationale: Though morphologically imperfect, in this context with the following
    conditional-like clause it expresses what would be unbelievable to the hearers.
    'Would not believe' best captures the sense in idiomatic English.
- source_word: כִּי יְסֻפָּר
  chosen: if it were told
  alternatives:
  - when it is told
  - though it is recounted
  - if someone told it
  lexicon: HALOT
  rationale: 'The conjunction plus passive can be rendered idiomatically as a conditional
    statement in English: ''if it were told.'' This matches the sense that the coming
    act is so astonishing that mere report would strain belief.'
