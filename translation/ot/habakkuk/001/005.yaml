theological_decisions:
- issue: Implicit divine subject in 'doing a work'
  chosen_reading: For I am doing a work
  alternative_readings:
  - For a work is being done
  - For one is doing a work
  rationale: The Hebrew clause lacks an explicit subject, but the prophetic context
    presents the speaker as the LORD (cf. surrounding context). Supplying 'I' is necessary
    for clear English and reflects the discourse setting rather than importing new
    theology.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering the emphatic astonishment commands
  chosen_reading: stare in astonishment, be utterly amazed
  alternative_readings:
  - be astonished, be astonished
  - wonder marvelously
  rationale: The translation preserves the rhetorical shock of the Hebrew without
    archaic or unnatural duplication. This maintains the text's force while remaining
    readable modern English.
  doctrine_reference: Translation philosophy §6
