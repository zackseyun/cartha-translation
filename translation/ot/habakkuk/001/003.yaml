theological_decisions:
- issue: Whether the complaint should imply divine culpability or divine permission
    in the opening verbs
  chosen_reading: 'Retain the direct address and causative force: ''Why do you make
    me see ... and why do you look at ...'''
  alternative_readings:
  - Why do you let me see ... and merely look at ...
  - Why do you show me ... and tolerate ...
  rationale: The Hebrew directly addresses God with a causative Hiphil ('make me see')
    and a simple verb of looking. The translation preserves the prophet's raw lament
    without softening it into a doctrinal explanation of God's relation to evil. This
    follows the principle of preserving theological tension rather than resolving
    it.
  doctrine_reference: Translation philosophy §3
