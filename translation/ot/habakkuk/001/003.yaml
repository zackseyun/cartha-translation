id: HAB.1.3
reference: Habakkuk 1:3
source:
  edition: WLC
  text: לָ֣/מָּה תַרְאֵ֤/נִי אָ֨וֶן֙ וְ/עָמָ֣ל תַּבִּ֔יט וְ/שֹׁ֥ד וְ/חָמָ֖ס לְ/נֶגְדִּ֑/י
    וַ/יְהִ֧י רִ֦יב וּ/מָד֖וֹן יִשָּֽׂא׃
translation:
  text: Why do you make me see wrongdoing, and why do you look at trouble? Destruction
    and violence are before me; strife comes to be, and contention rises up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Why do you show me iniquity, and why do you behold trouble?'
    reason: lexical_alternative
  - marker: b
    text: '''Destruction'' may also be rendered ''devastation'' or ''plunder.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'strife arises, and contention is lifted up / breaks out.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Standard interrogative of reason; concise English 'Why' best matches
    the lament form.
- source_word: תַרְאֵנִי
  chosen: do you make me see
  alternatives:
  - do you show me
  - do you let me see
  lexicon: HALOT
  rationale: Hiphil of ראה with 1cs suffix is causative, not merely 'you see me.'
    'Make me see' preserves the force that God causes the prophet to witness these
    evils.
- source_word: אָוֶן
  chosen: wrongdoing
  alternatives:
  - iniquity
  - evil
  - trouble
  lexicon: HALOT
  rationale: אָוֶן can denote wickedness or iniquity; 'wrongdoing' is clear modern
    English and fits the moral sense here.
- source_word: וְעָמָל
  chosen: trouble
  alternatives:
  - misery
  - toil
  - troublemaking
  lexicon: HALOT
  rationale: In prophetic complaint עָמָל often denotes trouble, misery, or oppressive
    harm rather than neutral labor. 'Trouble' is idiomatic with 'look at' and suits
    the context of social evil.
- source_word: תַּבִּיט
  chosen: do you look at
  alternatives:
  - do you behold
  - do you gaze upon
  lexicon: HALOT
  rationale: נבט commonly means to look at or regard. 'Look at' is natural English
    and preserves the complaint that God appears to observe without intervening.
- source_word: שֹׁד
  chosen: Destruction
  alternatives:
  - devastation
  - plunder
  - ruin
  lexicon: HALOT
  rationale: שֹׁד can denote violent devastation or plunder. In parallel with 'violence,'
    'destruction' best captures the result of predatory oppression.
- source_word: חָמָס
  chosen: violence
  alternatives:
  - wrong
  - outrage
  lexicon: HALOT
  rationale: A common prophetic term for violent injustice; 'violence' is the standard
    and most transparent rendering.
- source_word: לְנֶגְדִּי
  chosen: are before me
  alternatives:
  - are in front of me
  - are before my eyes
  lexicon: HALOT
  rationale: The prepositional phrase indicates what is set before the prophet. 'Before
    me' is concise and idiomatic.
- source_word: וַיְהִי
  chosen: comes to be
  alternatives:
  - there is
  - arises
  lexicon: HALOT
  rationale: The wayyiqtol of היה marks the emergence or occurrence of the following
    state. 'Comes to be' preserves the verbal force better than a flat existential
    'there is.'
- source_word: רִיב
  chosen: strife
  alternatives:
  - quarreling
  - lawsuit
  - dispute
  lexicon: HALOT
  rationale: רִיב can mean legal dispute or general contention. In parallel with מָדוֹן,
    the broader social sense 'strife' fits best.
- source_word: מָדוֹן
  chosen: contention
  alternatives:
  - discord
  - conflict
  - quarreling
  lexicon: HALOT
  rationale: A near-synonym to רִיב, but 'contention' preserves a slight distinction
    and avoids flattening the parallelism.
- source_word: יִשָּׂא
  chosen: rises up
  alternatives:
  - is lifted up
  - breaks out
  - prevails
  lexicon: HALOT
  rationale: Literally 'is lifted/carried.' In context of contention, the idiomatic
    sense is that it rises or escalates. 'Rises up' preserves the imagery and reads
    naturally.
