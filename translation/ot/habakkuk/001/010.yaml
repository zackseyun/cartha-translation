id: HAB.1.10
reference: Habakkuk 1:10
source:
  edition: WLC
  text: וְ/הוּא֙ בַּ/מְּלָכִ֣ים יִתְקַלָּ֔ס וְ/רֹזְנִ֖ים מִשְׂחָ֣ק ל֑/וֹ ה֚וּא לְ/כָל
    מִבְצָ֣ר יִשְׂחָ֔ק וַ/יִּצְבֹּ֥ר עָפָ֖ר וַֽ/יִּלְכְּדָֽ/הּ־׃
translation:
  text: He mocks kings, and rulers are a laughingstock to him. He laughs at every
    fortress; he heaps up earth and captures it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'he heaps up dust/earth'; the image is of piling up an earthen
      siege ramp to take a fortified place.
    reason: cultural_note
lexical_decisions:
- source_word: יִתְקַלָּס
  chosen: mocks
  alternatives:
  - scoffs at
  - derides
  lexicon: HALOT
  rationale: The Hitpael here conveys contemptuous mockery. 'Mocks' is concise, natural
    English and fits the parallel with rulers being a laughingstock.
- source_word: רֹזְנִים
  chosen: rulers
  alternatives:
  - princes
  - dignitaries
  lexicon: HALOT
  rationale: The term refers to high officials or potentates. 'Rulers' is broad and
    clear in modern English, matching the political sense without sounding archaic
    like 'princes'.
- source_word: מִשְׂחָק לוֹ
  chosen: are a laughingstock to him
  alternatives:
  - are a joke to him
  - are mockery to him
  lexicon: HALOT
  rationale: The noun denotes an object of laughter or derision. 'A laughingstock'
    preserves the contemptuous force and reads idiomatically in English.
- source_word: מִבְצָר
  chosen: fortress
  alternatives:
  - stronghold
  - fortified city
  lexicon: HALOT
  rationale: The word denotes a fortified place. 'Fortress' is a natural singular
    collective after 'every' and keeps the military sense.
- source_word: יִשְׂחָק
  chosen: laughs at
  alternatives:
  - scoffs at
  - mocks
  lexicon: HALOT
  rationale: The Qal of שׂחק here expresses derisive laughter. 'Laughs at' preserves
    the imagery and avoids over-interpretation.
- source_word: וַיִּצְבֹּר עָפָר
  chosen: he heaps up earth
  alternatives:
  - he piles up dust
  - he mounds up soil
  lexicon: HALOT
  rationale: The idiom refers to building a siege ramp against a city or fortress.
    'Heaps up earth' is a transparent rendering that preserves the literal image rather
    than importing 'siege ramp' into the main text.
- source_word: וַיִּלְכְּדָהּ
  chosen: captures it
  alternatives:
  - takes it
  - seizes it
  lexicon: HALOT
  rationale: The verb means to capture or seize, with the feminine suffix referring
    back to the fortress/city. 'Captures it' best fits the military context.
- source_word: הוּא
  chosen: He
  alternatives:
  - it
  lexicon: HALOT
  rationale: The pronoun refers back to the singular collective invader described
    in context. English naturally renders this personified singular as 'he,' preserving
    the Hebrew discourse pattern.
