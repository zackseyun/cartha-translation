id: HAB.3.17
reference: Habakkuk 3:17
source:
  edition: WLC
  text: כִּֽי תְאֵנָ֣ה לֹֽא תִפְרָ֗ח וְ/אֵ֤ין יְבוּל֙ בַּ/גְּפָנִ֔ים כִּחֵשׁ֙ מַעֲשֵׂה
    זַ֔יִת וּ/שְׁדֵמ֖וֹת לֹא עָ֣שָׂה אֹ֑כֶל גָּזַ֤ר מִ/מִּכְלָה֙ צֹ֔אן וְ/אֵ֥ין בָּקָ֖ר
    בָּ/רְפָתִֽים־־־־׃
translation:
  text: Though the fig tree does not blossom, and there is no produce on the vines;
    the yield of the olive fails, and the fields produce no food; the flock is cut
    off from the fold, and there is no herd in the stalls,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For the fig tree does not blossom ...' The Hebrew opening particle can
      be read causally ('for') or concessively ('though'); the concessive sense fits
      the flow into the declaration of joy in the following verse.
    reason: alternative_reading
  - marker: b
    text: Literally, 'the work/product of the olive proves false,' an idiom meaning
      that the olive crop fails.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: Though
  alternatives:
  - For
  - Indeed
  - Even if
  lexicon: HALOT
  rationale: In this poetic context introducing a concessive series that sets up the
    resolve of v. 18, 'though' best captures the sense in natural English. A strictly
    causal 'for' is possible lexically, but the discourse function here is concessive/conditional.
- source_word: תְאֵנָה
  chosen: fig tree
  alternatives:
  - fig
  lexicon: HALOT
  rationale: The noun denotes the fig tree itself, not merely the fruit. 'Fig tree'
    is the standard and contextually precise rendering.
- source_word: תִפְרָח
  chosen: does not blossom
  alternatives:
  - does not bud
  - does not flower
  lexicon: HALOT
  rationale: The verb means to sprout or blossom. 'Does not blossom' is idiomatic
    for a tree and preserves the agricultural image.
- source_word: יְבוּל
  chosen: produce
  alternatives:
  - yield
  - crop
  lexicon: HALOT
  rationale: '''Produce'' is clear modern English for agricultural output. ''Yield''
    is also possible, but ''produce'' avoids repetition with the later clause where
    a different Hebrew construction is rendered ''produce no food.'''
- source_word: גְּפָנִים
  chosen: vines
  alternatives:
  - grapevines
  lexicon: HALOT
  rationale: The plural refers to grapevines. 'Vines' is concise and natural; the
    grape context is obvious from the agricultural pairing.
- source_word: כִּחֵשׁ
  chosen: fails
  alternatives:
  - deceives
  - proves false
  - disappoints
  lexicon: HALOT
  rationale: The verb literally can mean 'deceive' or 'prove false,' but in this agricultural
    context it describes the olive crop failing to deliver. 'Fails' communicates the
    sense without awkward literalism.
- source_word: מַעֲשֵׂה זַיִת
  chosen: the yield of the olive
  alternatives:
  - the produce of the olive
  - the fruit of the olive tree
  - the olive crop
  lexicon: HALOT
  rationale: Literally 'the work/product of the olive.' This idiom refers to what
    the olive tree produces. 'The yield of the olive' preserves the concrete agricultural
    sense with moderate formality.
- source_word: שְׁדֵמוֹת
  chosen: the fields
  alternatives:
  - fieldlands
  - cultivated fields
  lexicon: HALOT
  rationale: The plural denotes cultivated fields or terraces. 'The fields' is the
    most natural English equivalent.
- source_word: עָשָׂה אֹכֶל
  chosen: produce no food
  alternatives:
  - yield no food
  - make no food
  lexicon: HALOT
  rationale: The idiom is literally 'do not make food.' In English, 'produce no food'
    best conveys agricultural production.
- source_word: גָּזַר
  chosen: is cut off
  alternatives:
  - is removed
  - is severed
  - perishes from
  lexicon: HALOT
  rationale: The verb means to cut off or sever. A passive English rendering fits
    the clause well and preserves the starkness of loss.
- source_word: מִכְלָה
  chosen: the fold
  alternatives:
  - the pen
  - the enclosure
  lexicon: HALOT
  rationale: The noun denotes an enclosure for animals. 'Fold' is the conventional
    and fitting term for sheep/goats in biblical English without sounding overly archaic
    here.
- source_word: צֹאן
  chosen: the flock
  alternatives:
  - sheep
  - small livestock
  lexicon: HALOT
  rationale: The collective noun can include sheep and goats. 'The flock' preserves
    the collective sense better than the narrower 'sheep.'
- source_word: בָּקָר
  chosen: herd
  alternatives:
  - cattle
  - oxen
  lexicon: HALOT
  rationale: The noun refers collectively to cattle. 'Herd' works well in parallel
    with 'flock' and keeps the collective force.
- source_word: רְפָתִים
  chosen: stalls
  alternatives:
  - stables
  - cattle stalls
  lexicon: HALOT
  rationale: The term denotes stalls or feeding places for cattle. 'Stalls' is concise
    and accurate.
