id: HAB.3.3
reference: Habakkuk 3:3
source:
  edition: WLC
  text: אֱל֨וֹהַ֙ מִ/תֵּימָ֣ן יָב֔וֹא וְ/קָד֥וֹשׁ מֵֽ/הַר פָּארָ֖ן סֶ֑לָה כִּסָּ֤ה
    שָׁמַ֨יִם֙ הוֹד֔/וֹ וּ/תְהִלָּת֖/וֹ מָלְאָ֥ה הָ/אָֽרֶץ־׃
translation:
  text: God comes from Teman, and the Holy One from Mount Paran. Selah. His splendor
    covers the heavens, and his praise fills the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Teman may also be understood more generally as 'the south,' though here
      it is likely the place name, parallel to Mount Paran.
    reason: lexical_alternative
  - marker: b
    text: Selah is a liturgical or musical term of uncertain meaning, traditionally
      left untranslated.
    reason: cultural_note
  - marker: c
    text: Or 'his majesty' or 'his glory' covers the heavens.
    reason: lexical_alternative
  - marker: d
    text: Or 'his praise has filled the earth.' The Hebrew verbal form may also be
      rendered as past or future in this poetic context.
    reason: alternative_reading
lexical_decisions:
- source_word: אֱלוֹהַ
  chosen: God
  alternatives:
  - God Almighty
  - Deity
  lexicon: HALOT
  rationale: The singular noun straightforwardly denotes God. 'God' is the natural
    modern English equivalent and avoids adding nuance not explicit in the text.
- source_word: מִתֵּימָן
  chosen: from Teman
  alternatives:
  - from the south
  lexicon: HALOT
  rationale: Teman can denote a southern region/direction, but here it is best taken
    as the place name Teman, parallel to Mount Paran in the next colon. Transliteration
    preserves the geographic-poetic force.
- source_word: יָבוֹא
  chosen: comes
  alternatives:
  - will come
  - came
  lexicon: HALOT
  rationale: The imperfect in this poetic theophany can be rendered as a vivid present
    in English. 'Comes' fits the hymn-like immediacy better than a simple future,
    while not forcing a past reading.
- source_word: וְקָדוֹשׁ
  chosen: and the Holy One
  alternatives:
  - and the Holy One of God
  - and the holy one
  lexicon: HALOT
  rationale: Used substantivally, the adjective refers to God as 'the Holy One.' Capitalization
    reflects that it is a divine title in context.
- source_word: מֵהַר פָּארָן
  chosen: from Mount Paran
  alternatives:
  - from the hill country of Paran
  lexicon: HALOT
  rationale: A straightforward geographic expression. 'Mount Paran' is the conventional
    and clear rendering.
- source_word: סֶלָה
  chosen: Selah
  alternatives:
  - Interlude
  - Pause
  lexicon: HALOT
  rationale: The term's precise meaning is uncertain; transliteration is the most
    transparent approach and avoids over-interpreting its liturgical function.
- source_word: כִּסָּה
  chosen: covers
  alternatives:
  - has covered
  - covered
  lexicon: HALOT
  rationale: The verb describes the extent of divine splendor in the poetic scene.
    Present tense in English matches the vivid present established earlier in the
    verse.
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - the sky
  - heaven
  lexicon: HALOT
  rationale: The plural form in Hebrew is well represented by 'the heavens,' which
    preserves the elevated poetic register better than 'sky.'
- source_word: הוֹדוֹ
  chosen: his splendor
  alternatives:
  - his majesty
  - his glory
  lexicon: HALOT
  rationale: הוֹד often denotes majesty, splendor, or radiance. 'Splendor' fits the
    visual imagery of covering the heavens. 'Glory' is possible but less specific
    to the poetic image here.
- source_word: וּתְהִלָּתוֹ
  chosen: and his praise
  alternatives:
  - and his renown
  - and his praiseworthiness
  lexicon: HALOT
  rationale: The noun normally means praise. In context it can imply the praise directed
    to him or the praise due to him; 'his praise' preserves the Hebrew wording without
    over-resolving the nuance.
- source_word: מָלְאָה הָאָרֶץ
  chosen: fills the earth
  alternatives:
  - has filled the earth
  - filled the land
  lexicon: HALOT
  rationale: The feminine verb agrees with 'his praise.' 'The earth' is preferable
    to 'the land' because the scope is cosmic, matching 'the heavens' in the prior
    colon.
