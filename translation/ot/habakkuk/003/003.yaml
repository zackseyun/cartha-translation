theological_decisions:
- issue: Temporal portrayal of the theophany
  chosen_reading: Rendered the Hebrew verbal forms as vivid present ('comes,' 'covers,'
    'fills')
  alternative_readings:
  - past narrative ('came,' 'covered,' 'filled')
  - future expectation ('will come,' 'will cover,' 'will fill')
  rationale: Habakkuk 3 is poetic theophany that recalls and re-presents God's appearing.
    English present tense best preserves the liturgical immediacy without collapsing
    the verse into only past recollection or only future expectation.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
- issue: Referent of 'the Holy One'
  chosen_reading: A divine title parallel to 'God'
  alternative_readings:
  - a separate holy figure
  rationale: The parallelism strongly indicates the same divine referent in synonymous
    poetic lines. Rendering it as a title avoids introducing unnecessary distinction
    not warranted by the Hebrew.
