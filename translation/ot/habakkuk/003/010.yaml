theological_decisions:
- issue: Personified cosmic imagery in a theophany
  chosen_reading: Retain the personification of mountains and the deep as reacting
    to God rather than flattening into purely meteorological description.
  alternative_readings:
  - Interpret the imagery more naturalistically, e.g., mountains trembled and waves
    rose
  rationale: The verse is poetic theophany. Preserving the personified response of
    creation best reflects the Hebrew imagery and avoids reducing the text to prose
    description.
  doctrine_reference: Translation philosophy §1, §3, §6
