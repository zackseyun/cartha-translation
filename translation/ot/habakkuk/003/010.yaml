id: HAB.3.10
reference: Habakkuk 3:10
source:
  edition: WLC
  text: רָא֤וּ/ךָ יָחִ֨ילוּ֙ הָרִ֔ים זֶ֥רֶם מַ֖יִם עָבָ֑ר נָתַ֤ן תְּהוֹם֙ קוֹל֔/וֹ
    ר֖וֹם יָדֵ֥י/הוּ נָשָֽׂא׃
translation:
  text: The mountains saw you and writhed; a torrent of waters swept by. The deep
    gave its voice; it lifted its hands on high.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'trembled,' 'were in anguish,' or 'quaked' for 'writhed.' The Hebrew
      verb can suggest shaking or labor-like writhing.
    reason: lexical_alternative
  - marker: b
    text: Or 'passed by.' The Hebrew verb is the common word for passing over or by;
      'swept by' brings out the force of the torrent imagery.
    reason: lexical_alternative
  - marker: c
    text: Literally 'it lifted its hands on high.' Some understand 'hands' metaphorically
      of the deep's surging waves.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאוּךָ
  chosen: saw you
  alternatives:
  - looked on you
  - beheld you
  lexicon: HALOT
  rationale: Qal perfect of ראה with 2ms suffix straightforwardly means 'saw you.'
    'Saw' is the plainest English and preserves the vivid personification of creation
    reacting to God's appearance.
- source_word: יָחִילוּ
  chosen: writhed
  alternatives:
  - trembled
  - were in anguish
  - quaked
  lexicon: HALOT
  rationale: From חול/חיל, the verb can denote trembling, writhing, or being in labor-like
    anguish. In poetic theophany context with mountains personified, 'writhed' captures
    both shaking and convulsive distress better than the flatter 'trembled.'
- source_word: הָרִים
  chosen: the mountains
  lexicon: HALOT
  rationale: Direct rendering of the plural noun; the article is naturally represented
    in English.
- source_word: זֶרֶם מַיִם
  chosen: a torrent of waters
  alternatives:
  - an overflowing of waters
  - a flood of waters
  - a rainstorm
  lexicon: HALOT
  rationale: זֶרֶם denotes a rushing flood, downpour, or torrent. Combined with 'waters,'
    the phrase emphasizes overwhelming rushing water. 'Torrent of waters' is vivid
    and natural in English while staying close to the Hebrew imagery.
- source_word: עָבָר
  chosen: swept by
  alternatives:
  - passed by
  - overflowed
  - crossed over
  lexicon: HALOT
  rationale: עבר basically means 'passed over/by.' Given the subject 'torrent of waters,'
    'swept by' conveys the motion idiomatically and preserves the force of the scene
    better than the more neutral 'passed by.'
- source_word: נָתַן תְּהוֹם קוֹלוֹ
  chosen: The deep gave its voice
  alternatives:
  - the deep uttered its sound
  - the abyss gave forth its voice
  lexicon: HALOT
  rationale: The idiom 'gave its voice' is retained because it is intelligible in
    English and preserves the poetic personification. תְּהוֹם is rendered 'the deep,'
    the standard English equivalent for the primeval/deep waters.
- source_word: תְּהוֹם
  chosen: the deep
  alternatives:
  - the abyss
  - the depths
  lexicon: HALOT
  rationale: '''The deep'' is the most established and contextually fitting rendering
    for the cosmic waters in Hebrew poetry, without importing later theological connotations
    of ''abyss'' unless context requires it.'
- source_word: רוֹם
  chosen: on high
  alternatives:
  - aloft
  - upward
  - height
  lexicon: HALOT
  rationale: As a noun meaning 'height/exaltation,' here functioning adverbially with
    the following gesture, it is best rendered 'on high' in idiomatic English.
- source_word: יָדֵיהוּ נָשָׂא
  chosen: it lifted its hands
  alternatives:
  - it raised its hands
  - its waves were lifted up
  lexicon: HALOT
  rationale: Literally 'it lifted its hands.' The singular verb with the personified
    subject 'the deep' supports keeping the anthropomorphic image. 'Hands' is retained
    rather than interpreting metaphorically as 'waves,' since the Hebrew itself states
    'hands' and the poetry thrives on personification.
