id: HAB.3.19
reference: Habakkuk 3:19
source:
  edition: WLC
  text: יְהוִ֤הּ אֲדֹנָ/י֙ חֵילִ֔/י וַ/יָּ֤שֶׂם רַגְלַ/י֙ כָּֽ/אַיָּל֔וֹת וְ/עַ֥ל
    בָּמוֹתַ֖/י יַדְרִכֵ֑/נִי לַ/מְנַצֵּ֖חַ בִּ/נְגִינוֹתָֽי׃
translation:
  text: 'The LORD, my Lord, is my strength; he makes my feet like the deer’s, and
    he causes me to tread on my heights.


    For the choir director: with my stringed instruments.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, traditionally, ''The Lord GOD is my strength.'' The Hebrew more literally
      has two titles: ''YHWH, my Lord.'''
    reason: alternative_reading
  - marker: b
    text: Literally 'like does'; the image is of sure-footed agility on steep terrain.
    reason: lexical_alternative
  - marker: c
    text: Or 'my high places.' The phrase may refer to elevated places of security
      or triumph.
    reason: lexical_alternative
  - marker: d
    text: 'This closing line functions as a musical subscription: ''For the choir
      director; with my stringed instruments.'''
    reason: cultural_note
lexical_decisions:
- source_word: יְהוִה + אֲדֹנָי
  chosen: The LORD, my Lord
  alternatives:
  - The Lord GOD
  - Yahweh, my Lord
  lexicon: HALOT
  rationale: The verse contains the divine name YHWH followed by אֲדֹנָי with 1cs
    suffix. Per doctrine, יְהוָה is rendered 'the LORD.' Retaining both elements preserves
    the Hebrew emphasis rather than collapsing them into the traditional 'Lord GOD.'
    'my Lord' reflects the suffix on אֲדֹנָי.
- source_word: חֵילִי
  chosen: my strength
  alternatives:
  - my might
  - my power
  lexicon: HALOT
  rationale: חַיִל/חֵיל can denote strength, might, or capacity. In this poetic confession,
    'my strength' is the most natural and established sense, expressing God as the
    source of the prophet's ability to endure.
- source_word: וַיָּשֶׂם רַגְלַי כָּאַיָּלוֹת
  chosen: he makes my feet like the deer’s
  alternatives:
  - he sets my feet like does
  - he makes my feet like hinds' feet
  lexicon: HALOT
  rationale: The idiom compares the speaker's feet to those of swift, sure-footed
    deer. 'The deer’s' is readable modern English and preserves the simile without
    archaic 'hinds' feet.' Singular collective 'deer' works idiomatically in English.
- source_word: אַיָּלוֹת
  chosen: the deer’s
  alternatives:
  - does
  - female deer
  lexicon: HALOT
  rationale: The Hebrew form is feminine plural ('does'). English commonly uses 'deer'
    generically in such similes. This avoids awkwardness while preserving the image
    of agility and sure-footedness.
- source_word: בָּמוֹתַי
  chosen: my heights
  alternatives:
  - my high places
  - the heights
  lexicon: HALOT
  rationale: בָּמוֹת literally means high places/heights. In this poetic context it
    likely refers metaphorically to elevated terrain or places of triumph/security.
    'My heights' preserves the first-person suffix and the vivid imagery better than
    flattening to 'high places' alone.
- source_word: יַדְרִכֵנִי
  chosen: he causes me to tread
  alternatives:
  - he makes me walk
  - he leads me
  lexicon: HALOT
  rationale: The Hiphil of דרך here conveys causing someone to step/tread. 'Causes
    me to tread' preserves the causative nuance more closely than the smoother but
    less precise 'leads me'.
- source_word: לַמְנַצֵּחַ
  chosen: For the choir director
  alternatives:
  - To the choirmaster
  - For the music director
  lexicon: HALOT
  rationale: This superscription term is commonly rendered 'choirmaster' or 'chief
    musician.' 'Choir director' is clear modern English and fits the musical subscription
    function.
- source_word: בִּנְגִינוֹתָי
  chosen: with my stringed instruments
  alternatives:
  - with my music
  - with stringed instruments
  lexicon: HALOT
  rationale: נְגִינוֹת refers to stringed music/instruments. The 1cs suffix is preserved
    with 'my.' 'Stringed instruments' is more concrete than simply 'music.'
