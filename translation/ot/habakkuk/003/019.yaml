theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies the default rendering of YHWH as 'the
    LORD.' The second title אֲדֹנָי is translated separately as 'my Lord' to preserve
    the double address in the Hebrew.
