id: HAB.3.4
reference: Habakkuk 3:4
source:
  edition: WLC
  text: וְ/נֹ֨גַהּ֙ כָּ/א֣וֹר תִּֽהְיֶ֔ה קַרְנַ֥יִם מִ/יָּד֖/וֹ ל֑/וֹ וְ/שָׁ֖ם חֶבְי֥וֹן
    עֻזֹּֽ/ה׃
translation:
  text: His brightness was like the light; rays flashed from his hand, and there his
    power was hidden.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'horns from his hand.' Here 'horns' is understood metaphorically
      as rays or beams of light.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹגַהּ
  chosen: brightness
  alternatives:
  - radiance
  - splendor
  - shining
  lexicon: HALOT
  rationale: נֹגַהּ denotes brightness or radiance. 'Brightness' is natural English
    and fits the poetic parallel with 'like the light' without overstating the term.
- source_word: כָּאוֹר
  chosen: like the light
  alternatives:
  - like sunlight
  - like light
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. אוֹר is 'light'; with the article-like
    force in context, 'the light' gives a vivid poetic comparison and preserves the
    simile.
- source_word: תִּהְיֶה
  chosen: was
  alternatives:
  - will be
  - became
  lexicon: HALOT
  rationale: Although formally imperfect, in this poetic theophany it functions well
    as a descriptive past in English within the surrounding vision report. 'Was' reads
    naturally in context.
- source_word: קַרְנַיִם
  chosen: rays
  alternatives:
  - horns
  - beams
  lexicon: HALOT
  rationale: Literally 'horns,' but in this context the image is of projecting shafts
    of light from the divine appearance. 'Rays' communicates the sense in clear modern
    English while respecting the metaphor. The literal alternative is preserved in
    a footnote because it is a notable traditional rendering.
- source_word: מִיָּדוֹ
  chosen: from his hand
  alternatives:
  - from his side
  lexicon: HALOT
  rationale: 'יָד normally means ''hand.'' The preposition מִן gives source: the rays
    issue ''from his hand.'' This is the plain lexical sense.'
- source_word: לוֹ
  chosen: his
  alternatives:
  - to him
  - for him
  lexicon: HALOT
  rationale: The pronominal element is syntactically difficult, but in context it
    is best taken as referring back to the divine figure, yielding idiomatic English
    with possession/reference rather than a wooden 'to him.'
- source_word: וְשָׁם
  chosen: and there
  alternatives:
  - there
  lexicon: HALOT
  rationale: 'The conjunction plus adverb is retained. ''And there'' preserves the
    poetic progression: from visible radiance to the hiddenness of power.'
- source_word: חֶבְיוֹן
  chosen: was hidden
  alternatives:
  - hiding place
  - concealment
  lexicon: HALOT
  rationale: The noun denotes hiding or concealment. In English, converting the nominal
    expression into the verbal clause 'was hidden' yields natural style while preserving
    the meaning.
- source_word: עֻזּוֹ
  chosen: his power
  alternatives:
  - his strength
  - his might
  lexicon: HALOT
  rationale: עֹז commonly means strength or might. 'Power' fits the theophanic context
    and pairs well with the idea of hidden divine potency.
