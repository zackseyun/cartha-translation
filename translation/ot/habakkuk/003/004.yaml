theological_decisions:
- issue: Anthropomorphic imagery in the theophany
  chosen_reading: Retain 'his hand' as the source of the rays without demythologizing
    the image.
  alternative_readings:
  - Render more abstractly as 'from beside him' to avoid anthropomorphism
  rationale: The Hebrew text uses bodily imagery in a poetic theophany. Preserving
    it respects the source text and does not require a doctrinally loaded interpretation
    beyond the imagery itself.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
