id: HAB.3.18
reference: Habakkuk 3:18
source:
  edition: WLC
  text: וַ/אֲנִ֖י בַּ/יהוָ֣ה אֶעְל֑וֹזָה אָגִ֖ילָה בֵּ/אלֹהֵ֥י יִשְׁעִֽ/י׃
translation:
  text: Yet I will rejoice in Yahweh; I will exult in the God of my salvation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''But/And as for me''; the opening words emphasize Habakkuk''s personal resolve in contrast to the devastation described in the previous verse.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I will be glad' for 'I will exult.' The two Hebrew verbs are near-synonyms, expressing intensified joy.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: Yet I
  alternatives:
  - But I
  - As for me, I
  - And I
  lexicon: HALOT
  rationale: The conjunction with independent pronoun marks strong contrast with the preceding collapse described in v. 17. 'Yet I' captures the adversative force in natural English while preserving the emphatic first-person stance.
- source_word: בַּיהוָה
  chosen: in the LORD
  alternatives:
  - in Yahweh
  lexicon: HALOT
  rationale: The preposition ב marks the sphere/object of rejoicing. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: אֶעְלֹוזָה
  chosen: I will rejoice
  alternatives:
  - I will triumph
  - I will exult
  lexicon: HALOT
  rationale: עלה/עלז in this stem denotes exultant rejoicing. 'Rejoice' is idiomatic and pairs well with the following near-synonym without sounding overly inflated.
- source_word: אָגִילָה
  chosen: I will exult
  alternatives:
  - I will rejoice
  - I will be glad
  lexicon: HALOT
  rationale: גיל conveys jubilant gladness or exultation. Rendering it as 'exult' preserves the poetic intensification and avoids flattening both verbs into the same English word.
- source_word: בֵּאלֹהֵי
  chosen: in the God of
  alternatives:
  - in God, the
  - in my God, the God of
  lexicon: HALOT
  rationale: The preposition ב is repeated and should be represented again in English. 'The God of' preserves the construct relationship with the following noun.
- source_word: יִשְׁעִי
  chosen: my salvation
  alternatives:
  - my deliverance
  - my rescue
  lexicon: HALOT
  rationale: The noun ישׁע can denote salvation or deliverance. 'My salvation' best fits the theological and poetic register here while remaining faithful to the Hebrew.
