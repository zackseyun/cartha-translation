theological_decisions:
- issue: Interpretation of the difficult clause שְׁבֻעוֹת מַטּוֹת אֹמֶר
  chosen_reading: the rods are sworn by command
  alternative_readings:
  - sworn were the rods of the word
  - oaths to the tribes were spoken
  - your arrows were sworn according to the word
  rationale: The Hebrew is notoriously compressed and disputed. The chosen rendering
    preserves the core lexical elements ('oaths/ sworn,' 'rods,' 'word/command') without
    importing a more specific theological claim than the text warrants. Alternatives
    are preserved in a footnote because the ambiguity is genuine and should not be
    hidden.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
