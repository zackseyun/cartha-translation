id: HAB.3.9
reference: Habakkuk 3:9
source:
  edition: WLC
  text: עֶרְיָ֤ה תֵעוֹר֙ קַשְׁתֶּ֔/ךָ שְׁבֻע֥וֹת מַטּ֖וֹת אֹ֣מֶר סֶ֑לָה נְהָר֖וֹת
    תְּבַקַּע אָֽרֶץ־׃
translation:
  text: Your bow is laid bare; the rods are sworn by command. Selah. You split the
    earth with rivers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew of 'the rods are sworn by command' is difficult and may also
      be understood as 'oaths to the tribes were spoken' or similarly, preserving
      the ideas of oaths, rods/tribes, and spoken word.
    reason: alternative_reading
  - marker: b
    text: Or 'tribes' for 'rods'; the Hebrew מַטּוֹת can be understood either way
      in this poetic context.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶרְיָה
  chosen: laid bare
  alternatives:
  - naked
  - bare
  lexicon: HALOT
  rationale: The noun/adverbial form conveys bareness or exposure. In context with
    the bow, idiomatic English is 'laid bare' rather than the more wooden 'naked.'
- source_word: תֵעוֹר
  chosen: is laid bare
  alternatives:
  - is uncovered
  - is awakened
  lexicon: HALOT
  rationale: From עור in the Niphal, likely 'be uncovered/exposed' here rather than
    'be roused.' With the preceding עֶרְיָה and following 'your bow,' the sense is
    that the bow is unsheathed or made ready.
- source_word: קַשְׁתֶּךָ
  chosen: your bow
  lexicon: HALOT
  rationale: Straightforward rendering of 'your bow,' preserving the martial imagery
    addressed to God.
- source_word: שְׁבֻעוֹת
  chosen: sworn
  alternatives:
  - oaths
  - sevenfold
  lexicon: HALOT
  rationale: The plural noun normally means 'oaths.' Because the clause is elliptical,
    rendering it adjectivally in English ('sworn') produces a readable line while
    preserving the oath idea. The alternative connection to 'seven' is less likely
    here.
- source_word: מַטּוֹת
  chosen: the rods
  alternatives:
  - tribes
  - staffs
  lexicon: HALOT
  rationale: The consonantal form can denote rods/staffs and has also been taken as
    'tribes' in some interpretations. In this poetic theophany, 'rods' fits the weapon
    imagery better, but the alternative is significant enough to preserve in a footnote.
- source_word: אֹמֶר
  chosen: by command
  alternatives:
  - word
  - utterance
  lexicon: HALOT
  rationale: Literally 'word/utterance.' In English, 'by command' captures the force
    of a spoken decree in this compressed poetic line.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: Conventionally transliterated because its precise force is uncertain;
    translation would overstate certainty.
- source_word: נְהָרוֹת
  chosen: with rivers
  alternatives:
  - into rivers
  - rivers
  lexicon: HALOT
  rationale: The plural noun 'rivers' is retained. English 'with rivers' reflects
    the instrumental sense in relation to the following verb and object.
- source_word: תְּבַקַּע
  chosen: you split
  alternatives:
  - you cleave
  - you break open
  lexicon: HALOT
  rationale: 'Piel 2ms from בקע, addressed to God: ''you split/cleave.'' ''Split''
    is clear modern English and preserves the force.'
- source_word: אָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: Either 'earth' or 'land' is possible. In the cosmic theophany of Habakkuk
    3, 'earth' better matches the scale of the imagery.
