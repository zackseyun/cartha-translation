id: HAB.3.13
reference: Habakkuk 3:13
source:
  edition: WLC
  text: יָצָ֨אתָ֙ לְ/יֵ֣שַׁע עַמֶּ֔/ךָ לְ/יֵ֖שַׁע אֶת מְשִׁיחֶ֑/ךָ מָחַ֤צְתָּ רֹּאשׁ֙
    מִ/בֵּ֣ית רָשָׁ֔ע עָר֛וֹת יְס֥וֹד עַד צַוָּ֖אר סֶֽלָה־־׃פ
translation:
  text: You went out for the salvation of your people, for the salvation of your anointed
    one; you crushed the head of the house of the wicked, laying bare the foundation
    up to the neck. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the salvation of your anointed'; the Hebrew repeats 'for salvation'
      in parallel with 'your people.'
    reason: lexical_alternative
  - marker: b
    text: '''Your anointed one'' may refer to the Davidic ruler, to the people in
      representative form, or typologically to the Messiah; the Hebrew does not force
      a single interpretation here.'
    reason: alternative_reading
  - marker: c
    text: Or 'stripping bare the foundation up to the neck.' The Hebrew imagery is
      difficult and may mix the picture of demolishing a house with exposing a body.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָצָאתָ
  chosen: You went out
  alternatives:
  - You came out
  - You marched out
  lexicon: HALOT
  rationale: Qal perfect 2ms of יצא, describing Yahweh's decisive emergence for action.
    'Went out' is the most direct English equivalent; 'marched out' is possible in
    martial context but slightly interpretive.
- source_word: לְיֵשַׁע
  chosen: for the salvation
  alternatives:
  - for deliverance
  - to save
  lexicon: HALOT
  rationale: The noun יֵשַׁע denotes salvation/deliverance. 'Salvation' preserves
    the theological weight and matches the repeated parallelism in the verse.
- source_word: עַמֶּךָ
  chosen: your people
  lexicon: HALOT
  rationale: Straightforward construct with 2ms suffix; covenantal collective sense
    is best preserved by 'your people'.
- source_word: לְיֵשַׁע אֶת מְשִׁיחֶךָ
  chosen: for the salvation of your anointed one
  alternatives:
  - to save your anointed
  - for the victory of your anointed
  lexicon: HALOT
  rationale: The second לְיֵשַׁע parallels the first. Although English could compress
    to an infinitival clause, retaining 'for the salvation of' preserves the Hebrew
    repetition. אֶת marks the object. מְשִׁיחֶךָ is literally 'your anointed one,'
    not the title 'Messiah' here, since the immediate referent is contextually ambiguous
    between the Davidic king, the representative leader, or the people personified;
    the lower-case descriptive rendering avoids over-specification while preserving
    messianic resonance.
- source_word: מְשִׁיחֶךָ
  chosen: your anointed one
  alternatives:
  - your anointed
  - your Messiah
  lexicon: HALOT
  rationale: From משיח, 'anointed one.' Because this is Hebrew rather than Greek Χριστός
    and the context does not unambiguously identify an eschatological title, 'your
    anointed one' is the most transparent rendering. 'Your Messiah' would import a
    more determinate christological reading than the verse itself requires.
- source_word: מָחַצְתָּ
  chosen: you crushed
  alternatives:
  - you shattered
  - you struck down
  lexicon: HALOT
  rationale: Qal perfect of מחץ, commonly used for crushing or smashing in battle
    contexts. 'Crushed' fits the violent imagery and pairs naturally with 'head'.
- source_word: רֹאשׁ
  chosen: the head
  alternatives:
  - the chief
  - the top
  lexicon: HALOT
  rationale: Literal 'head' is preferable here because the verse uses body/building
    imagery and may echo head-crushing motifs. More abstract renderings flatten the
    imagery.
- source_word: מִבֵּית רָשָׁע
  chosen: of the house of the wicked
  alternatives:
  - from the house of the wicked one
  - of the house of the wicked man
  lexicon: HALOT
  rationale: The phrase can be construed with the head belonging to 'the house of
    the wicked' or as striking from within it. In English, 'the head of the house
    of the wicked' best reflects the Hebrew sequence while preserving the ambiguity
    of whether 'head' is architectural or personal. רָשָׁע is rendered generically
    as 'the wicked' rather than 'the wicked one' to avoid over-personalizing the referent.
- source_word: עָרוֹת
  chosen: laying bare
  alternatives:
  - stripping bare
  - uncovering
  lexicon: HALOT
  rationale: Infinitive absolute/verb from ערה, 'to lay bare, uncover.' It likely
    expresses attendant circumstance or result following the crushing. 'Laying bare'
    is vivid and idiomatic.
- source_word: יְסוֹד
  chosen: the foundation
  alternatives:
  - the base
  - the foundation stones
  lexicon: HALOT
  rationale: Literal 'foundation' fits the house imagery. 'Foundation stones' is possible
    but adds specificity not explicit in the text.
- source_word: עַד צַוָּאר
  chosen: up to the neck
  alternatives:
  - to the neck
  - as far as the neck
  lexicon: HALOT
  rationale: Literal rendering preserves the striking image. The phrase is difficult,
    but 'up to the neck' best reflects the Hebrew without over-interpreting whether
    the image is of total exposure or near-total destruction.
- source_word: סֶלָה
  chosen: Selah
  lexicon: HALOT
  rationale: Traditional transliteration is retained because the term's precise force
    remains uncertain; translating it would imply more certainty than the evidence
    warrants.
