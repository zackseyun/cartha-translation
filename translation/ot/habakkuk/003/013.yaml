theological_decisions:
- issue: Referent of 'your anointed one'
  chosen_reading: Rendered descriptively as 'your anointed one' without identifying
    the referent more specifically.
  alternative_readings:
  - the Davidic king
  - the people collectively
  - a messianic/typological figure pointing forward to the Messiah
  rationale: The Hebrew משיחך carries royal and theological resonance, but the immediate
    context does not require a single narrowed referent. In keeping with the translation
    philosophy, the rendering preserves the theological tension rather than resolving
    it into a fully messianic title in the main text.
  doctrine_reference: Translation philosophy §3; §2 on translating titles while avoiding
    overstatement beyond the source text
