id: HAB.3.15
reference: Habakkuk 3:15
source:
  edition: WLC
  text: דָּרַ֥כְתָּ בַ/יָּ֖ם סוּסֶ֑י/ךָ חֹ֖מֶר מַ֥יִם רַבִּֽים׃
translation:
  text: You marched through the sea with your horses, through the churning of mighty
    waters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through the surging mass of many waters.' The Hebrew term rendered 'churning'
      is difficult and may denote the heaped or turbulent mass of the waters.
    reason: lexical_alternative
lexical_decisions:
- source_word: דָּרַכְתָּ
  chosen: you marched
  alternatives:
  - you trod
  - you trampled
  - you strode
  lexicon: HALOT
  rationale: The verb דרך literally denotes treading or marching. In this theophanic-poetic
    context, 'marched' communicates purposeful divine advance more naturally in modern
    English than the more wooden 'trod,' while preserving the image of movement underfoot.
- source_word: בַיָּם
  chosen: through the sea
  alternatives:
  - in the sea
  - into the sea
  lexicon: HALOT
  rationale: The preposition ב commonly means 'in,' but with verbs of motion it can
    be rendered idiomatically as 'through' to reflect traversal. This fits the imagery
    of God advancing across the sea.
- source_word: סוּסֶיךָ
  chosen: with your horses
  alternatives:
  - your horses
  lexicon: HALOT
  rationale: The noun means 'your horses.' English idiom prefers 'with your horses'
    after 'marched through the sea,' making explicit the accompanying means of divine
    advance without changing the sense.
- source_word: חֹמֶר
  chosen: the churning
  alternatives:
  - heap
  - surging mass
  - foam
  - mire
  lexicon: HALOT
  rationale: חֹמֶר here is difficult and likely denotes a mass or tumult of water
    rather than literal clay/mortar. In parallel with 'many waters,' the sense is
    the stirred-up, heaped, or turbulent mass of the sea. 'Churning' best captures
    the poetic image in clear modern English. Because the term is lexically difficult,
    an alternative is preserved in a footnote.
- source_word: מַיִם רַבִּים
  chosen: mighty waters
  alternatives:
  - many waters
  - great waters
  - abundant waters
  lexicon: HALOT
  rationale: Literally 'many waters.' In English poetry, 'mighty waters' conveys both
    quantity and force, fitting the theophanic context while remaining faithful to
    the image.
