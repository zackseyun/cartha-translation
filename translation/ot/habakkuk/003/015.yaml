theological_decisions:
- issue: Divine warrior imagery in poetic theophany
  chosen_reading: Retain the imagery of God advancing through the sea with horses
    without allegorizing or softening it.
  alternative_readings:
  - Interpret the horses metaphorically as clouds or angelic hosts
  - Flatten the image into a generic statement of divine power over the sea
  rationale: The verse belongs to a poetic depiction of the LORD as a warrior-king.
    The translation preserves the concrete imagery present in the Hebrew rather than
    resolving it into a doctrinal abstraction.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
