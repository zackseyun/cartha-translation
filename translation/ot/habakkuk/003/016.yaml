id: HAB.3.16
reference: Habakkuk 3:16
source:
  edition: WLC
  text: שָׁמַ֣עְתִּי וַ/תִּרְגַּ֣ז בִּטְנִ֗/י לְ/קוֹל֙ צָלֲל֣וּ שְׂפָתַ֔/י יָב֥וֹא
    רָקָ֛ב בַּ/עֲצָמַ֖/י וְ/תַחְתַּ֣/י אֶרְגָּ֑ז אֲשֶׁ֤ר אָנ֨וּחַ֙ לְ/י֣וֹם צָרָ֔ה
    לַ/עֲל֖וֹת לְ/עַ֥ם יְגוּדֶֽ/נּוּ׀׃
translation:
  text: I heard, and my inward parts trembled; at the sound my lips quivered. Rot
    enters into my bones, and beneath me I tremble, as I wait quietly for the day
    of distress, for the coming up of the people who will invade us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that I may rest for the day of distress.' The Hebrew verb can mean 'rest'
      or 'settle/be quiet'; here it is rendered 'wait quietly' because the context
      emphasizes hushed expectation before coming trouble.
    reason: alternative_reading
  - marker: b
    text: Or 'the people who attack us' or 'the raiding people.' The Hebrew verb refers
      to invading or raiding.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַעְתִּי
  chosen: I heard
  alternatives:
  - I have heard
  lexicon: HALOT
  rationale: Simple first-person perfect of שמע, introducing the prophet's reaction
    to the theophany/report. English simple past fits the poetic narrative context.
- source_word: וַתִּרְגַּז בִּטְנִי
  chosen: my inward parts trembled
  alternatives:
  - my belly trembled
  - my body trembled
  lexicon: HALOT
  rationale: בטן literally means 'belly/womb,' but in poetic usage it often denotes
    the inner being or visceral center. 'Inward parts' preserves the embodied, visceral
    sense without sounding overly anatomical in modern English.
- source_word: לְקוֹל
  chosen: at the sound
  alternatives:
  - at the voice
  - at the report
  lexicon: HALOT
  rationale: קול can mean sound or voice. Here the immediate context is auditory reaction
    to the divine manifestation; 'sound' is broad and natural.
- source_word: צָלֲלוּ שְׂפָתַי
  chosen: my lips quivered
  alternatives:
  - my lips trembled
  - my lips tingled
  lexicon: HALOT
  rationale: צלל here describes a shaking/quivering response. 'Quivered' captures
    the physical effect in idiomatic English better than the less clear 'tingled,'
    while retaining the bodily imagery.
- source_word: יָבֹא רָקָב בַּעֲצָמַי
  chosen: Rot enters into my bones
  alternatives:
  - decay comes into my bones
  - rottenness enters my bones
  lexicon: HALOT
  rationale: רקב denotes rot/decay/rottenness. 'Rot enters into my bones' preserves
    the vivid metaphor of bodily collapse and fear.
- source_word: וְתַחְתַּי אֶרְגָּז
  chosen: and beneath me I tremble
  alternatives:
  - and where I stand I tremble
  - and my legs tremble beneath me
  lexicon: HALOT
  rationale: תחתַי literally 'under me/beneath me.' The phrase conveys instability
    in the prophet's stance. 'Beneath me I tremble' keeps the Hebrew image while remaining
    readable.
- source_word: אֲשֶׁר אָנֻוּחַ
  chosen: as I wait quietly
  alternatives:
  - that I may rest
  - that I may wait
  - while I rest
  lexicon: HALOT
  rationale: נוח can mean rest, settle down, or be quiet. In this context, with expectation
    of the coming day of trouble, the sense is not relaxed repose but hushed waiting/submission.
    'Wait quietly' best fits the clause in context.
- source_word: לְיוֹם צָרָה
  chosen: for the day of distress
  alternatives:
  - for the day of trouble
  - for the day of calamity
  lexicon: HALOT
  rationale: צרה commonly denotes distress/trouble. 'Distress' preserves the gravity
    without over-specifying the nature of the event.
- source_word: לַעֲלוֹת
  chosen: for the coming up
  alternatives:
  - when ... comes up
  - for the attack of
  lexicon: HALOT
  rationale: עלה literally means 'to go up/come up.' In military context it can describe
    an advancing force. 'Coming up' preserves the Hebrew verbal image and links naturally
    with the following people.
- source_word: לְעַם יְגוּדֶנּוּ
  chosen: of the people who will invade us
  alternatives:
  - of the people who attack us
  - of the people who raid him/it
  lexicon: HALOT
  rationale: 'גדד refers to raiding or invading. The suffix is first person plural
    in the provided morphology, yielding ''us.'' Rendering the clause relatively in
    English makes the sense clear: the people are the invaders.'
