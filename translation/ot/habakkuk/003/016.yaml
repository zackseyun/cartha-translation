theological_decisions:
- issue: Interpretation of אֲשֶׁר אָנֻוּחַ in context
  chosen_reading: The prophet speaks of quiet waiting for the appointed day of distress
    rather than restful relief.
  alternative_readings:
  - that I may rest in the day of distress
  - yet I will have rest in the day of distress
  rationale: The immediate context is bodily terror before impending judgment, followed
    by faithful waiting. Rendering the verb as 'wait quietly' preserves the tension
    of fear and trust without importing a stronger promise of relief than the clause
    itself states.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
