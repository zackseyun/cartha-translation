theological_decisions:
- issue: Possible mythological background of רֶשֶׁף
  chosen_reading: Render as a common noun ('plague') rather than as the proper name
    'Resheph' in the main text.
  alternative_readings:
  - Resheph
  rationale: The verse is poetic and may echo ancient Near Eastern imagery, but the
    Hebrew text as pointed presents a common noun and the immediate parallel with
    דָּבֶר favors rendering the term as a destructive force rather than importing
    a named deity into the main text. This preserves the text's imagery without overstating
    a mythological identification.
