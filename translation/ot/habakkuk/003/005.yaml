id: HAB.3.5
reference: Habakkuk 3:5
source:
  edition: WLC
  text: לְ/פָנָ֖י/ו יֵ֣לֶךְ דָּ֑בֶר וְ/יֵצֵ֥א רֶ֖שֶׁף לְ/רַגְלָֽי/ו׃
translation:
  text: Before him goes pestilence, and plague comes out at his feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'burning plague,' 'fever,' or possibly 'Resheph,' the name of a plague
      deity alluded to in poetic imagery.
    reason: lexical_alternative
  - marker: b
    text: Literally 'at his feet'; the phrase may also suggest 'behind him' or 'in
      his train.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְפָנָיו
  chosen: Before him
  alternatives:
  - Ahead of him
  - In front of him
  lexicon: HALOT
  rationale: The preposition ל with פָּנִים plus pronominal suffix idiomatically denotes
    position in front of or before someone. 'Before him' is natural English and preserves
    the spatial imagery of attendants preceding the divine warrior.
- source_word: יֵלֶךְ
  chosen: goes
  alternatives:
  - walks
  - proceeds
  lexicon: HALOT
  rationale: הלך in the imperfect here describes ongoing or vivid poetic action. 'Goes'
    is the most straightforward English equivalent and fits the parallel with 'comes
    out' in the next colon.
- source_word: דָּבֶר
  chosen: pestilence
  alternatives:
  - plague
  - disease
  lexicon: HALOT
  rationale: דבר commonly denotes pestilence or plague, often in judgment contexts.
    'Pestilence' preserves the elevated poetic register and avoids collapsing it with
    the following רֶשֶׁף if that is rendered 'plague.'
- source_word: וְיֵצֵא
  chosen: and ... comes out
  alternatives:
  - and ... goes forth
  - and ... comes forth
  lexicon: HALOT
  rationale: יצא means to go out/come out. In English, with the following phrase 'at
    his feet,' 'comes out' reads naturally while retaining the image of something
    issuing forth from his advance.
- source_word: רֶשֶׁף
  chosen: plague
  alternatives:
  - burning plague
  - fever
  - Resheph
  lexicon: HALOT
  rationale: רשף can denote flame, burning heat, fever, plague, or possibly the name
    of the plague-deity Resheph in mythic-poetic contexts. Here, in parallel with
    דָּבֶר and within a theophanic march, 'plague' best communicates the destructive
    force without over-mythologizing the line. The more specific or mythological alternatives
    are preserved in a footnote.
- source_word: לְרַגְלָיו
  chosen: at his feet
  alternatives:
  - after him
  - at his footsteps
  - behind him
  lexicon: HALOT
  rationale: Literally 'to/at his feet.' In context of a divine march, the phrase
    can suggest what follows in his train. 'At his feet' keeps the concrete Hebrew
    image while allowing readers to sense the attendant imagery. The interpretive
    alternative 'behind him' is worth preserving in a footnote.
