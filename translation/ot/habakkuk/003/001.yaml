id: HAB.3.1
reference: Habakkuk 3:1
source:
  edition: WLC
  text: תְּפִלָּ֖ה לַ/חֲבַקּ֣וּק הַ/נָּבִ֑יא עַ֖ל שִׁגְיֹנֽוֹת׃
translation:
  text: A prayer of Habakkuk the prophet, according to Shigionoth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'with/on shigionoth,' likely a musical or liturgical term referring
      to a style, tune, or passionate song.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּפִלָּה
  chosen: A prayer
  alternatives:
  - Prayer
  lexicon: HALOT
  rationale: 'The noun denotes a prayer or prayer-song. English idiom in a superscription
    naturally takes the indefinite article: ''A prayer.'''
- source_word: לַחֲבַקּוּק
  chosen: of Habakkuk
  alternatives:
  - for Habakkuk
  - belonging to Habakkuk
  lexicon: HALOT
  rationale: The prefixed ל in superscriptions commonly marks authorship or association.
    'Of Habakkuk' is the most natural English rendering in this heading context.
- source_word: הַנָּבִיא
  chosen: the prophet
  alternatives:
  - the prophet Habakkuk
  lexicon: HALOT
  rationale: The appositional title identifies Habakkuk's role. Retaining 'the prophet'
    preserves the formal superscription style and the definiteness of the Hebrew.
- source_word: עַל
  chosen: according to
  alternatives:
  - 'on'
  - with
  - set to
  lexicon: HALOT
  rationale: In musical/liturgical superscriptions, עַל can indicate tune, style,
    or performance direction. 'According to' preserves that heading-like function
    without over-specifying the exact relation.
- source_word: שִׁגְיֹנוֹת
  chosen: Shigionoth
  alternatives:
  - wild, passionate melody
  - musical setting
  - lament style
  lexicon: HALOT
  rationale: The term is rare and uncertain, likely a musical or liturgical notation
    related to the singular שִׁגָּיוֹן in Psalm 7:1. Because the precise sense is
    disputed, transliteration best preserves the source without false precision; an
    explanatory alternative is preserved in a footnote.
