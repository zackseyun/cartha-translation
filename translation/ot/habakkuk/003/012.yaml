theological_decisions:
- issue: Scope of אָרֶץ in a theophanic judgment context
  chosen_reading: the earth
  alternative_readings:
  - the land
  rationale: The verse belongs to a cosmic portrayal of God's march in judgment. Rendering
    אָרֶץ as 'the earth' preserves that wider scope and avoids narrowing the scene
    to a local territory unless the context clearly demands it.
  doctrine_reference: Translation philosophy §1, §3, §5
