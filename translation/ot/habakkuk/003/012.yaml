id: HAB.3.12
reference: Habakkuk 3:12
source:
  edition: WLC
  text: בְּ/זַ֖עַם תִּצְעַד אָ֑רֶץ בְּ/אַ֖ף תָּד֥וּשׁ גּוֹיִֽם־׃
translation:
  text: In wrath you marched through the earth; in anger you threshed the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land'; Hebrew אֶרֶץ can refer either to the earth generally or to
      a particular land.
    reason: lexical_alternative
  - marker: b
    text: Or 'you trampled the nations'; the Hebrew verb evokes threshing, often by
      trampling.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּזַעַם
  chosen: In wrath
  alternatives:
  - With wrath
  - In indignation
  lexicon: HALOT
  rationale: The preposition ב plus זַעַם is best rendered adverbially/instrumentally,
    describing the manner of the divine action. 'Wrath' is concise, natural English
    and preserves the force of divine fury without over-paraphrase.
- source_word: תִּצְעַד
  chosen: you marched through
  alternatives:
  - you stepped through
  - you strode through
  - you marched
  lexicon: HALOT
  rationale: The verb צעד denotes stepping or marching. In this poetic theophany context,
    'marched' conveys purposeful, forceful movement better than the more wooden 'stepped.'
    'Through' is supplied idiomatically in English to express movement across the
    object domain.
- source_word: אָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: אָרֶץ can mean either 'earth' or 'land.' In this cosmic hymn context,
    paired with 'nations,' the broader 'earth' better fits the scope of the imagery,
    though 'land' remains a viable lexical alternative.
- source_word: בְּאַף
  chosen: in anger
  alternatives:
  - with anger
  - in fury
  lexicon: HALOT
  rationale: אַף literally refers to 'nose' and idiomatically to anger. 'In anger'
    is the natural English equivalent and preserves the parallelism with 'in wrath'
    while avoiding awkward literalism.
- source_word: תָּדוּשׁ
  chosen: you threshed
  alternatives:
  - you trampled
  - you crushed
  lexicon: HALOT
  rationale: The verb דושׁ commonly refers to threshing, often by trampling. 'Threshed'
    preserves the agricultural metaphor and the vividness of the Hebrew better than
    flattening it to 'trampled,' though that sense is contextually related.
- source_word: גּוֹיִם
  chosen: the nations
  alternatives:
  - nations
  - peoples
  - Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם ordinarily means 'nations' or 'peoples.' 'The nations' is the
    most direct and contextually fitting rendering here, referring to the peoples
    judged by God. 'Gentiles' would import a later covenantal contrast not explicit
    in this verse.
