theological_decisions:
- issue: Anthropomorphic and cosmic-theophanic language
  chosen_reading: Render the verse as a poetic description of God's appearing and
    acting in history/cosmos without reducing it to mere metaphor or over-systematizing
    it.
  alternative_readings:
  - Treat all actions as purely metaphorical national-political imagery
  - Intensify into a strictly literal cosmological event description
  rationale: Habakkuk 3 is elevated theophanic poetry. The translation should preserve
    the grandeur and tension of divine action affecting both nations and creation,
    without forcing a narrower interpretive scheme.
  doctrine_reference: Translation philosophy §3
