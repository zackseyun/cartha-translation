id: HAB.3.6
reference: Habakkuk 3:6
source:
  edition: WLC
  text: עָמַ֣ד וַ/יְמֹ֣דֶד אֶ֗רֶץ רָאָה֙ וַ/יַּתֵּ֣ר גּוֹיִ֔ם וַ/יִּתְפֹּֽצְצוּ֙ הַרְרֵי
    עַ֔ד שַׁח֖וּ גִּבְע֣וֹת עוֹלָ֑ם הֲלִיכ֥וֹת עוֹלָ֖ם לֽ/וֹ׀־׃
translation:
  text: He stood and measured the earth; he looked and made nations tremble. The ancient
    mountains were shattered; the everlasting hills sank low. His ways are everlasting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and startled the nations,' or possibly 'and scattered the nations.'
      The Hebrew verb here is difficult, and the exact nuance is debated.
    reason: lexical_alternative
  - marker: b
    text: Or 'His goings are everlasting' or 'His paths are eternal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָמַד
  chosen: He stood
  alternatives:
  - He took his stand
  lexicon: HALOT
  rationale: Basic sense is 'stand.' In this theophanic context it conveys the divine
    warrior's arresting presence without adding interpretive force beyond the Hebrew.
- source_word: וַיְמֹדֶד אֶרֶץ
  chosen: and measured the earth
  alternatives:
  - and shook the earth
  - and made the earth tremble
  lexicon: HALOT
  rationale: The consonantal text and common meaning of מדד support 'measure.' Some
    versions reflect an interpretive tradition of 'shook' or 'made to tremble,' likely
    influenced by context, but the source text most plainly says 'measured the earth.'
- source_word: רָאָה
  chosen: he looked
  alternatives:
  - he saw
  lexicon: HALOT
  rationale: Either is possible; 'looked' fits the sequence of divine actions in vivid
    poetic style.
- source_word: וַיַּתֵּר גּוֹיִם
  chosen: and made nations tremble
  alternatives:
  - and startled the nations
  - and scattered the nations
  lexicon: HALOT
  rationale: The verb is difficult and context-sensitive. In this poetic theophany,
    the sense is that the nations are thrown into agitation or alarm by God's appearance.
    'Made nations tremble' captures that effect in natural English. Because the lexical
    sense is debated, alternatives are preserved in a footnote.
- source_word: וַיִּתְפֹּצְצוּ
  chosen: were shattered
  alternatives:
  - burst apart
  - were broken to pieces
  lexicon: HALOT
  rationale: The reflexive form conveys violent breaking apart. 'Were shattered' is
    idiomatic and suitably forceful for mountains in a cosmic theophany.
- source_word: הַרְרֵי עַד
  chosen: the ancient mountains
  alternatives:
  - the everlasting mountains
  - the mountains of old
  lexicon: HALOT
  rationale: עַד here denotes enduring antiquity/perpetuity. 'Ancient mountains' is
    natural English and pairs well with the next colon's 'everlasting hills' without
    unnecessary repetition.
- source_word: שַׁחוּ
  chosen: sank low
  alternatives:
  - bowed down
  - collapsed
  lexicon: HALOT
  rationale: The verb can denote sinking or bowing low. For hills, 'sank low' preserves
    the physical imagery while still allowing the poetic sense of subjugation before
    God.
- source_word: גִּבְעוֹת עוֹלָם
  chosen: the everlasting hills
  alternatives:
  - the ancient hills
  - the eternal hills
  lexicon: HALOT
  rationale: עוֹלָם in parallel with עַד emphasizes age-old permanence. 'Everlasting
    hills' is a conventional but accurate rendering in this poetic context.
- source_word: הֲלִיכוֹת עוֹלָם לוֹ
  chosen: His ways are everlasting
  alternatives:
  - His goings are from ancient times
  - His paths are eternal
  lexicon: HALOT
  rationale: הלך noun can mean 'goings,' 'ways,' or 'marchings.' In context, after
    describing God's movement in theophany, the clause summarizes his enduring manner/course.
    'His ways are everlasting' is clear modern English and preserves the theological
    point of God's eternal activity. A more literal alternative is preserved in a
    footnote.
