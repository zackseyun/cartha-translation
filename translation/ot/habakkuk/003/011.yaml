id: HAB.3.11
reference: Habakkuk 3:11
source:
  edition: WLC
  text: שֶׁ֥מֶשׁ יָרֵ֖חַ עָ֣מַד זְבֻ֑לָ/ה לְ/א֤וֹר חִצֶּ֨י/ךָ֙ יְהַלֵּ֔כוּ לְ/נֹ֖גַהּ
    בְּרַ֥ק חֲנִיתֶֽ/ךָ׃
translation:
  text: Sun and moon stood in their lofty place; at the light of your arrows they
    went, at the brightness of the flash of your spear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Sun and moon stood in their habitation'; the Hebrew זְבֻלָה refers to
      a lofty dwelling or exalted place.
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew is compressed: ''they went'' may refer to the heavenly bodies,
      or more likely to the flight of God''s arrows and spear.'
    reason: alternative_reading
  - marker: c
    text: Or 'the lightning of your spear.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׁמֶשׁ יָרֵחַ
  chosen: Sun and moon
  alternatives:
  - The sun and the moon
  lexicon: HALOT
  rationale: A hendiadys-like pairing naming the heavenly luminaries. English omits
    articles for poetic force while preserving the two distinct nouns.
- source_word: עָמַד
  chosen: stood
  alternatives:
  - stopped
  - took their stand
  lexicon: HALOT
  rationale: The Qal of עמד commonly means 'stand' or 'remain standing.' In this poetic
    theophany it conveys cessation or fixed position without overinterpreting the
    mechanism.
- source_word: זְבֻלָה
  chosen: in their lofty place
  alternatives:
  - in its habitation
  - in the heavens
  - in his exalted abode
  lexicon: HALOT
  rationale: זְבוּל denotes an elevated dwelling or lofty abode. Because the subject
    is the paired 'sun and moon,' English idiom is best served by 'their lofty place.'
    This preserves the elevated spatial sense without forcing a technical cosmological
    term.
- source_word: לְאוֹר
  chosen: at the light of
  alternatives:
  - by the light of
  - for the light of
  lexicon: HALOT
  rationale: The preposition ל with אוֹר here is best taken in a poetic directional/circumstantial
    sense. 'At the light of' fits the parallelism with the following colon and avoids
    implying mere instrumentality too strongly.
- source_word: חִצֶּיךָ
  chosen: your arrows
  lexicon: HALOT
  rationale: Straightforward plural construct with 2ms suffix. Retained literally
    because the martial imagery is central to the verse.
- source_word: יְהַלֵּכוּ
  chosen: they went
  alternatives:
  - they moved
  - they marched
  lexicon: HALOT
  rationale: הלך in the Piel here likely intensifies motion in poetic style. 'They
    went' is simple and natural, preserving movement without specifying whether the
    subject is the arrows, the luminaries, or the divine weapons beyond what the Hebrew
    leaves somewhat compressed.
- source_word: לְנֹגַהּ
  chosen: at the brightness of
  alternatives:
  - by the brightness of
  - at the gleam of
  lexicon: HALOT
  rationale: נֹגַהּ denotes brightness or radiance. 'At the brightness of' mirrors
    the previous colon's structure and preserves the poetic parallelism.
- source_word: בְּרַק
  chosen: the flash of
  alternatives:
  - lightning of
  - gleam of
  lexicon: HALOT
  rationale: בָּרָק can mean lightning or flashing brightness. In construct with 'your
    spear,' 'flash of' best captures the visual effect of a gleaming weapon without
    introducing meteorological ambiguity.
- source_word: חֲנִיתֶךָ
  chosen: your spear
  alternatives:
  - your lance
  lexicon: HALOT
  rationale: Standard rendering of חֲנִית as a thrusting weapon. 'Spear' is the clearest
    modern English equivalent.
