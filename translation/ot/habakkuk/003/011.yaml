theological_decisions:
- issue: Subject reference of 'they went' in the second colon
  chosen_reading: The motion is left intentionally compressed in English, most naturally
    referring to the divine arrows/spear imagery rather than explicitly to the sun
    and moon.
  alternative_readings:
  - The sun and moon moved at the light of your arrows
  - The arrows flew at the light/brightness
  rationale: The Hebrew poetic sequence is terse and allows some ambiguity in what
    exactly 'went' refers to. To preserve theological tension and poetic compression,
    the translation avoids adding an explicit subject not present in the text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
