id: HAB.3.7
reference: Habakkuk 3:7
source:
  edition: WLC
  text: תַּ֣חַת אָ֔וֶן רָאִ֖יתִי אָהֳלֵ֣י כוּשָׁ֑ן יִרְגְּז֕וּ/ן יְרִיע֖וֹת אֶ֥רֶץ
    מִדְיָֽן׃ס
translation:
  text: I saw the tents of Cushan under affliction; the tent curtains of the land
    of Midian were trembling.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under trouble'; אָוֶן can denote trouble, calamity, or in some contexts
      wickedness/iniquity.
    reason: lexical_alternative
  - marker: b
    text: Cushan may refer to Cush or may be associated by some with Cushan-Rishathaim
      (Judg 3:8), but the Hebrew here simply reads 'Cushan.'
    reason: alternative_reading
lexical_decisions:
- source_word: תַּחַת
  chosen: under
  alternatives:
  - in place of
  - beneath
  lexicon: HALOT
  rationale: The preposition commonly means 'under/beneath.' In this poetic context,
    paired with אָוֶן, it idiomatically conveys being under a condition or burden,
    hence 'under.'
- source_word: אָוֶן
  chosen: affliction
  alternatives:
  - trouble
  - wickedness
  - iniquity
  lexicon: HALOT
  rationale: Although אָוֶן can denote wickedness or trouble, here the context is
    the nations' fearful reaction to the divine march. 'Affliction' best fits the
    sense of distress or calamity rather than moral evil.
- source_word: רָאִיתִי
  chosen: I saw
  alternatives:
  - I have seen
  lexicon: HALOT
  rationale: Simple past works naturally in English and suits the prophet's visionary
    report in the poem.
- source_word: אָהֳלֵי
  chosen: tents
  alternatives:
  - tabernacles
  - encampments
  lexicon: HALOT
  rationale: The construct plural of 'tent' is straightforwardly rendered 'tents.'
    'Encampments' is possible by extension, but 'tents' preserves the concrete imagery.
- source_word: כוּשָׁן
  chosen: Cushan
  alternatives:
  - Cushan-Rishathaim
  - Cush
  lexicon: HALOT
  rationale: This is best treated as a proper name and transliterated per translation
    philosophy. Its exact identification is uncertain, so the simple transliteration
    is preferable in the main text.
- source_word: יִרְגְּזוּן
  chosen: were trembling
  alternatives:
  - trembled
  - were agitated
  - quaked
  lexicon: HALOT
  rationale: The verb denotes shaking or trembling. The progressive English form reflects
    the vivid poetic scene and matches the parallelism with the first colon's visionary
    perspective.
- source_word: יְרִיעוֹת
  chosen: tent curtains
  alternatives:
  - curtains
  - tent coverings
  lexicon: HALOT
  rationale: The noun refers to tent cloths or curtains. 'Tent curtains' makes the
    image explicit in English and preserves the parallel with 'tents' in the first
    colon.
- source_word: אֶרֶץ מִדְיָן
  chosen: the land of Midian
  alternatives:
  - Midian
  - the country of Midian
  lexicon: HALOT
  rationale: The construct phrase is most naturally rendered 'the land of Midian,'
    preserving the Hebrew expression rather than reducing it to the bare proper name.
