theological_decisions:
- issue: Identification of כוּשָׁן
  chosen_reading: Treat as the proper name 'Cushan' without harmonizing it to another
    figure or region in the main text.
  alternative_readings:
  - Understand as Cush/Ethiopia
  - Identify with Cushan-Rishathaim of Judges 3:8
  rationale: The verse itself names כוּשָׁן, and the translation should preserve the
    Hebrew proper name rather than importing a debated identification. Because the
    referent is uncertain, alternatives are better preserved in a footnote than resolved
    in translation.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; translate titles, transliterate names; preserve theological tension
    rather than resolve it.'
