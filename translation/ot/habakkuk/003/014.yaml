theological_decisions:
- issue: Interpretation of the difficult noun פְּרָזָיו in a martial context
  chosen_reading: his warriors
  alternative_readings:
  - his villages
  - his hordes
  rationale: The verse depicts hostile attackers rushing in to scatter the speaker
    and devour the poor. A military referent best suits the immediate context. Because
    the Hebrew form is difficult and has been understood differently, the alternative
    is preserved in a footnote rather than suppressed.
  doctrine_reference: Translation philosophy §3, preserve theological/interpreive
    tension where the source is genuinely ambiguous.
