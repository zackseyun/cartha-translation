id: HAB.3.14
reference: Habakkuk 3:14
source:
  edition: WLC
  text: נָקַ֤בְתָּ בְ/מַטָּי/ו֙ רֹ֣אשׁ פרז/ו יִסְעֲר֖וּ לַ/הֲפִיצֵ֑/נִי עֲלִ֣יצֻתָ֔/ם
    כְּמוֹ לֶ/אֱכֹ֥ל עָנִ֖י בַּ/מִּסְתָּֽר־׃
translation:
  text: You pierced the head of his warriors with his own staffs; they stormed out
    to scatter me, their exultation like one about to devour the poor in secret.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the head of his villages' / 'the head of his hordes'; the Hebrew term
      is difficult, and many understand it more generally of the enemy's bands or
      leaders.
    reason: alternative_reading
lexical_decisions:
- source_word: נָקַבְתָּ
  chosen: you pierced
  alternatives:
  - you bored through
  - you struck through
  lexicon: HALOT
  rationale: The verb נקב in the qal commonly conveys piercing or boring through.
    'Pierced' is natural English and preserves the violent, martial image.
- source_word: בְמַטָּיו
  chosen: with his own staffs
  alternatives:
  - with his rods
  - with his spears
  lexicon: HALOT
  rationale: מַטֶּה usually means staff/rod. In battle context some take it as weaponry,
    but 'staffs' keeps the lexical base while allowing the irony that the enemy is
    defeated by his own implements. 'His own' makes the 3ms suffix explicit.
- source_word: רֹאשׁ
  chosen: the head
  alternatives:
  - the leader
  - the chief
  lexicon: HALOT
  rationale: ראשׁ can be literal or figurative. Here it may point either to the leader
    or to the collective head/forefront of the attackers. 'The head' preserves the
    Hebrew image and leaves the figurative force open.
- source_word: פְּרָזָיו
  chosen: his warriors
  alternatives:
  - his villages
  - his hordes
  - his rulers
  lexicon: HALOT
  rationale: This form is difficult and disputed. In context of military assault,
    many understand it as referring to his warriors or bands rather than literal villages.
    'His warriors' best fits the immediate martial imagery, while the alternative
    is preserved in a footnote.
- source_word: יִסְעֲרוּ
  chosen: they stormed out
  alternatives:
  - they came like a whirlwind
  - they raged
  lexicon: HALOT
  rationale: From סער, the sense is storming, raging, or rushing tempestuously. 'Stormed
    out' gives vivid motion in idiomatic English without losing the storm imagery.
- source_word: לַהֲפִיצֵנִי
  chosen: to scatter me
  alternatives:
  - to disperse me
  - to shatter me
  lexicon: HALOT
  rationale: פוץ in the hiphil means to scatter or disperse. 'Scatter me' is the most
    direct and readable rendering.
- source_word: עֲלִיצוּתָם
  chosen: their exultation
  alternatives:
  - their rejoicing
  - their triumph
  lexicon: HALOT
  rationale: The noun denotes jubilant exultation. 'Exultation' preserves the heightened,
    arrogant joy of the attackers.
- source_word: כְּמוֹ לֶאֱכֹל
  chosen: like one about to devour
  alternatives:
  - as if to eat up
  - like devouring
  lexicon: HALOT
  rationale: The comparison introduces predatory intent. 'About to devour' captures
    the infinitive's forward-looking force in smooth English.
- source_word: עָנִי
  chosen: the poor
  alternatives:
  - the afflicted
  - the needy
  lexicon: HALOT
  rationale: עָנִי often denotes the poor or afflicted. 'The poor' fits the social-oppression
    imagery and is concise.
- source_word: בַּמִּסְתָּר
  chosen: in secret
  alternatives:
  - in hiding
  - in a secret place
  lexicon: HALOT
  rationale: The noun means hiding place or secrecy. 'In secret' is idiomatic and
    conveys covert predation.
