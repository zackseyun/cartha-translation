id: HAB.3.2
reference: Habakkuk 3:2
source:
  edition: WLC
  text: יְהוָ֗ה שָׁמַ֣עְתִּי שִׁמְעֲ/ךָ֮ יָרֵאתִי֒ יְהוָ֗ה פָּֽעָלְ/ךָ֙ בְּ/קֶ֤רֶב שָׁנִים֙ חַיֵּ֔י/הוּ בְּ/קֶ֥רֶב שָׁנִ֖ים תּוֹדִ֑יעַ בְּ/רֹ֖גֶז רַחֵ֥ם תִּזְכּֽוֹר׃
translation:
  text: Yahweh, I have heard the report of you; I stand in awe. Yahweh, revive your work in the midst of the years; in the midst of the years make it known; in wrath remember mercy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your fame' or 'the hearing of you.' The Hebrew expression refers to what has been heard concerning the LORD.
    reason: lexical_alternative
  - marker: b
    text: Or 'I feared' / 'I was afraid.' The Hebrew can express fear or reverential awe.
    reason: lexical_alternative
  - marker: c
    text: Or 'preserve it alive' or 'renew it.' The Hebrew literally has 'make it live.'
    reason: lexical_alternative
  - marker: d
    text: Or 'in turmoil' or 'in rage.'
    reason: lexical_alternative
  - marker: e
    text: 'Hebrew: ''remember compassion'' or ''remember to have mercy.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Rendered as 'LORD' per project default for the divine name YHWH, following established English convention that signals the covenant name without transliteration.
- source_word: שָׁמַעְתִּי
  chosen: I have heard
  alternatives:
  - I heard
  lexicon: HALOT
  rationale: Perfect 1cs can be rendered as simple past or present perfect in English. 'I have heard' fits the prayerful immediacy of the verse and naturally introduces the following response.
- source_word: שִׁמְעֲךָ
  chosen: the report of you
  alternatives:
  - your report
  - your fame
  - the hearing of you
  lexicon: HALOT
  rationale: The noun from שמע can denote report, message, or what has been heard. 'The report of you' best captures that Habakkuk has heard an account concerning the LORD, without reducing it merely to reputation.
- source_word: יָרֵאתִי
  chosen: I stand in awe
  alternatives:
  - I feared
  - I was afraid
  lexicon: HALOT
  rationale: The verb ירא can denote fear, dread, or reverential awe. In this worship-prayer context, 'I stand in awe' communicates reverent fear in idiomatic modern English without flattening the solemnity.
- source_word: פָּעָלְךָ
  chosen: your work
  alternatives:
  - your deed
  - your action
  lexicon: HALOT
  rationale: The noun denotes deed or work. 'Your work' is broad enough to include God's mighty acts in history, which suits the context and traditional interpretive range.
- source_word: בְּקֶרֶב שָׁנִים
  chosen: in the midst of the years
  alternatives:
  - within these years
  - in our time
  - during the years
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the Hebrew idiom and its poetic force. More interpretive options like 'in our time' are possible but go beyond the wording.
- source_word: חַיֵּהוּ
  chosen: revive
  alternatives:
  - preserve it alive
  - renew it
  - give it life
  lexicon: HALOT
  rationale: Piel imperative of חיה with 3ms suffix likely means to make God's work live again, i.e., renew or revive it. 'Revive' is concise and preserves the life-giving imagery.
- source_word: תּוֹדִיעַ
  chosen: make it known
  alternatives:
  - cause it to be known
  - reveal it
  lexicon: HALOT
  rationale: Hiphil of ידע means to make known. 'Make it known' is the most direct and natural rendering.
- source_word: בְּרֹגֶז
  chosen: in wrath
  alternatives:
  - in turmoil
  - in trembling
  - in rage
  lexicon: HALOT
  rationale: The noun can denote agitation or rage. In context of divine action and the plea for mercy, 'wrath' best conveys the likely sense of divine anger while remaining concise.
- source_word: רַחֵם
  chosen: mercy
  alternatives:
  - compassion
  lexicon: HALOT
  rationale: 'Although the Hebrew form is verbal (''have compassion''), English idiom after ''remember'' is smoother with the object noun: ''remember mercy.'' This preserves the sense without awkwardness.'
- source_word: תִּזְכּוֹר
  chosen: remember
  alternatives:
  - call to mind
  lexicon: HALOT
  rationale: The verb commonly means remember. In prayer language, 'remember mercy' is both faithful and idiomatic.
