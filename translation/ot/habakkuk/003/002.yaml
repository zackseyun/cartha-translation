theological_decisions:
- issue: Nature of the prophet's response to hearing of the LORD
  chosen_reading: reverential awe rather than mere terror
  alternative_readings:
  - fear
  - dread
  rationale: The context is a prayer addressed to the LORD and a plea for renewed divine action mixed with mercy. Rendering יָרֵאתִי as 'I stand in awe' preserves the theological tension of fear and worship without reducing it to panic.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of the plea concerning God's work
  chosen_reading: a request that God renew/revive his historical saving work
  alternative_readings:
  - preserve your work alive
  - revive the prophet's own work
  rationale: The suffix on 'your work' points to God's work, and the prayer context favors a plea for renewed manifestation of God's acts in history. The translation avoids over-specifying exactly which acts are in view.
  doctrine_reference: Original-language primacy over translation tradition.
