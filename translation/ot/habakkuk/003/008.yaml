theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD,' following the stated doctrine
    and common reverential English convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of יְשׁוּעָה in a martial theophany
  chosen_reading: salvation
  alternative_readings:
  - victory
  - deliverance
  rationale: In this context the term can denote saving victory, but 'salvation' best
    preserves the broader theological sense of divine rescue without narrowing it
    to battlefield success alone.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #5'
