id: HAB.3.8
reference: Habakkuk 3:8
source:
  edition: WLC
  text: הֲ/בִ/נְהָרִים֙ חָרָ֣ה יְהוָ֔ה אִ֤ם בַּ/נְּהָרִים֙ אַפֶּ֔/ךָ אִם בַּ/יָּ֖ם
    עֶבְרָתֶ֑/ךָ כִּ֤י תִרְכַּב֙ עַל סוּסֶ֔י/ךָ מַרְכְּבֹתֶ֖י/ךָ יְשׁוּעָֽה־־׃
translation:
  text: Was your anger against the rivers, LORD? Was your wrath against the rivers,
    or your fury against the sea, that you rode on your horses, on your chariots of
    salvation?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for you rode on your horses, on your victorious chariots.' The Hebrew
      יְשׁוּעָה can also carry the sense of deliverance or victory in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/בִ/נְהָרִים
  chosen: Was your anger against the rivers
  alternatives:
  - Was it against the rivers that you burned
  - Were you enraged at the rivers
  lexicon: HALOT
  rationale: The interrogative הֲ with בְּ marks a question about the object of divine
    anger. 'Against the rivers' is idiomatic English for בְּ here. 'Rivers' is retained
    literally.
- source_word: חָרָה
  chosen: anger
  alternatives:
  - burned
  - was kindled
  lexicon: HALOT
  rationale: The verb literally denotes burning/kindling in anger. In English, rendering
    the sense as 'anger' produces a natural question while preserving the idiom's
    force.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'
    rather than a transliteration.
- source_word: אַפֶּךָ
  chosen: your wrath
  alternatives:
  - your anger
  lexicon: HALOT
  rationale: אַף literally means 'nose' and idiomatically 'anger.' Here 'wrath' provides
    variation alongside the previous clause while preserving the poetic parallelism.
- source_word: עֶבְרָתֶךָ
  chosen: your fury
  alternatives:
  - your rage
  - your wrath
  lexicon: HALOT
  rationale: עֶבְרָה is an intensified term for overflowing anger. 'Fury' captures
    the heightened poetic force and distinguishes it from אַף in the parallel line.
- source_word: יָם
  chosen: the sea
  lexicon: HALOT
  rationale: Literal rendering fits the theophanic imagery and preserves the parallel
    with 'rivers.'
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the explanatory ground for the rhetorical questions.
    'That' works smoothly in English after the final question, though the sense is
    explanatory.
- source_word: תִרְכַּב עַל סוּסֶיךָ
  chosen: you rode on your horses
  alternatives:
  - you mounted your horses
  - you were riding on your horses
  lexicon: HALOT
  rationale: The verb רכב is straightforwardly 'ride.' Past tense suits the poetic
    recollection of divine intervention.
- source_word: מַרְכְּבֹתֶיךָ יְשׁוּעָה
  chosen: your chariots of salvation
  alternatives:
  - your victorious chariots
  - your chariots bring salvation
  lexicon: HALOT
  rationale: The construct-like juxtaposition is concise and poetic. 'Of salvation'
    preserves the noun יְשׁוּעָה without over-interpreting it as merely military victory,
    while still fitting the context of divine deliverance.
