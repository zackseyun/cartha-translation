theological_decisions:
- issue: Nature of the cannibalistic language
  chosen_reading: Metaphorical depiction of ruthless exploitation and violence by
    Israel's leaders
  alternative_readings:
  - Literal cannibalism
  rationale: The verse uses anatomical and cooking imagery to portray predatory oppression.
    The translation preserves the metaphor's brutality without softening it or implying
    an actual historical claim of cannibalism beyond what the prophetic rhetoric states.
  doctrine_reference: Translation philosophy §1, §3
