id: MIC.3.3
reference: Micah 3:3
source:
  edition: WLC
  text: וַ/אֲשֶׁ֣ר אָכְלוּ֮ שְׁאֵ֣ר עַמִּ/י֒ וְ/עוֹרָ/ם֙ מֵ/עֲלֵי/הֶ֣ם הִפְשִׁ֔יטוּ
    וְ/אֶת עַצְמֹֽתֵי/הֶ֖ם פִּצֵּ֑חוּ וּ/פָרְשׂוּ֙ כַּ/אֲשֶׁ֣ר בַּ/סִּ֔יר וּ/כְ/בָשָׂ֖ר
    בְּ/ת֥וֹךְ קַלָּֽחַת־׃
translation:
  text: who eat the flesh of my people, strip their skin from them, break their bones
    in pieces, and chop them up like what is in a pot, like meat within a cauldron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'flay their skin from them.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'flesh' earlier in the verse; here 'meat' fits the cooking image.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲשֶׁר
  chosen: who
  alternatives:
  - and those who
  - who also
  lexicon: HALOT
  rationale: Introduces the relative clause continuing the accusation from the previous
    verse. In English, simple 'who' is the most natural connector.
- source_word: אָכְלוּ
  chosen: eat
  alternatives:
  - have eaten
  - devour
  lexicon: HALOT
  rationale: The verb literally means 'eat.' Present tense in English fits the prophetic
    denunciation and vivid ongoing portrayal better than a completed past; 'devour'
    is interpretive and stronger than the Hebrew requires.
- source_word: שְׁאֵר עַמִּי
  chosen: the flesh of my people
  alternatives:
  - the remnant of my people
  - the body of my people
  lexicon: HALOT
  rationale: In this context שְׁאֵר refers to flesh/body tissue, not 'remnant.' The
    surrounding references to skin, bones, and cooking imagery make the anatomical
    sense certain.
- source_word: וְעוֹרָם
  chosen: their skin
  alternatives:
  - their hide
  - their flesh
  lexicon: HALOT
  rationale: עוֹר is literally 'skin/hide.' 'Skin' is the natural human referent in
    English; 'hide' sounds animal-like and overly stylized, though the metaphor is
    brutal.
- source_word: מֵעֲלֵיהֶם הִפְשִׁיטוּ
  chosen: strip ... from off them
  alternatives:
  - flay ... from them
  - tear ... off them
  lexicon: HALOT
  rationale: The hiphil of פשט here means to strip off skin. 'Strip their skin from
    off them' preserves the violent concreteness without using the less common 'flay'
    in the main text.
- source_word: וְאֶת עַצְמֹתֵיהֶם פִּצֵּחוּ
  chosen: break their bones in pieces
  alternatives:
  - crush their bones
  - break open their bones
  lexicon: HALOT
  rationale: The phrase depicts violent smashing of bones. 'Break ... in pieces' captures
    the intensive sense and remains idiomatic.
- source_word: וּפָרְשׂוּ
  chosen: chop them up
  alternatives:
  - spread them out
  - divide them up
  - cut them apart
  lexicon: HALOT
  rationale: Given the cooking simile that follows, the sense is cutting up the victims
    like butchered meat. A more wooden 'spread out' would obscure the imagery in English.
- source_word: כַּאֲשֶׁר בַּסִּיר
  chosen: like what is in a pot
  alternatives:
  - as in a pot
  - like meat in a pot
  lexicon: HALOT
  rationale: 'The Hebrew is elliptical: literally ''as/in the pot.'' Supplying ''what
    is'' makes the comparison intelligible while avoiding importing ''meat'' before
    the next phrase explicitly states it.'
- source_word: וּכְבָשָׂר
  chosen: like meat
  alternatives:
  - and like flesh
  lexicon: HALOT
  rationale: בָּשָׂר can mean 'flesh' or 'meat.' In the cooking image, 'meat' is the
    clearest English choice, while earlier 'flesh' was retained for the human body
    imagery.
- source_word: בְּתוֹךְ קַלָּחַת
  chosen: in the middle of a cauldron
  alternatives:
  - inside a kettle
  - in a cooking pot
  - in a caldron
  lexicon: HALOT
  rationale: קַלָּחַת denotes a cooking vessel. 'Cauldron' preserves the larger, boiling-pot
    imagery and the grim force of the metaphor; 'middle of' reflects בְּתוֹךְ.
