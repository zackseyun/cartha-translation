id: MIC.3.6
reference: Micah 3:6
source:
  edition: WLC
  text: לָ/כֵ֞ן לַ֤יְלָה לָ/כֶם֙ מֵֽ/חָז֔וֹן וְ/חָשְׁכָ֥ה לָ/כֶ֖ם מִ/קְּסֹ֑ם וּ/בָ֤אָה
    הַ/שֶּׁ֨מֶשׁ֙ עַל הַ/נְּבִיאִ֔ים וְ/קָדַ֥ר עֲלֵי/הֶ֖ם הַ/יּֽוֹם־׃
translation:
  text: Therefore it will be night for you, without vision, and darkness for you,
    without divination; the sun will go down on the prophets, and the day will grow
    dark over them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''from vision'' / ''from divination''; the Hebrew preposition can be
      rendered more literally, but here likely means deprivation: ''without vision''
      and ''without divination.'''
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the sun will come on the prophets'; the idiomatic sense is that
      it will set or go down on them.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks the verse as a consequence of the preceding indictment; 'Therefore'
    best preserves the prophetic judgment logic in natural English.
- source_word: לַיְלָה
  chosen: it will be night
  alternatives:
  - night
  - nighttime
  lexicon: HALOT
  rationale: 'The verbless Hebrew clause is rendered idiomatically with an implied
    future sense from context of judgment: not merely ''night,'' but a coming state
    of darkness.'
- source_word: מֵחָזוֹן
  chosen: without vision
  alternatives:
  - from vision
  - instead of vision
  lexicon: HALOT
  rationale: 'The preposition מִן here is privative in sense: the false prophets will
    be deprived of revelatory vision. ''Without vision'' communicates the loss more
    clearly than a wooden ''from vision.'''
- source_word: וְחָשְׁכָה
  chosen: and darkness
  alternatives:
  - and it will grow dark
  - and it will be dark
  lexicon: HALOT
  rationale: Though formally verbal, it parallels the preceding nominal judgment expression.
    Rendering as 'and darkness' keeps the poetic balance with 'it will be night' while
    preserving the sense of encroaching obscurity.
- source_word: מִקְּסֹם
  chosen: without divination
  alternatives:
  - from divination
  - instead of divination
  - without omen-reading
  lexicon: HALOT
  rationale: As with מֵחָזוֹן, the preposition is best taken privatively. 'Divination'
    is the standard English rendering for קֶסֶם/קסם in prophetic polemic contexts.
- source_word: וּבָאָה הַשֶּׁמֶשׁ עַל הַנְּבִיאִים
  chosen: the sun will go down on the prophets
  alternatives:
  - the sun will set on the prophets
  - the sun will come upon the prophets
  lexicon: HALOT
  rationale: Though בוא literally means 'come,' with 'sun' the idiomatic sense is
    sunset. 'Go down' is natural English and fits the judgment image of prophetic
    illumination ending.
- source_word: הַנְּבִיאִים
  chosen: the prophets
  alternatives:
  - these prophets
  lexicon: HALOT
  rationale: Refers to the prophets under indictment in context. The simple definite
    form is sufficient in English without adding interpretive emphasis.
- source_word: וְקָדַר עֲלֵיהֶם הַיּוֹם
  chosen: and the day will grow dark over them
  alternatives:
  - and the day will be black over them
  - and daylight will darken over them
  lexicon: HALOT
  rationale: קדר conveys darkening/gloom. 'Grow dark' is readable modern English and
    preserves the image of judgment reversing normal daylight.
