theological_decisions:
- issue: Nature of the judgment imagery
  chosen_reading: The verse describes divine judgment on corrupt prophets by portraying
    the removal of revelatory access through imagery of night, darkness, sunset, and
    darkened day.
  alternative_readings:
  - A merely metaphorical description of social disgrace
  - A literal astronomical event
  rationale: The immediate context concerns prophets and divination, so the darkness
    imagery primarily signifies the cessation of prophetic revelation and exposure
    under God's judgment, without requiring a literal cosmic event.
