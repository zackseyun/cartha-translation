id: MIC.3.4
reference: Micah 3:4
source:
  edition: WLC
  text: אָ֚ז יִזְעֲק֣וּ אֶל יְהוָ֔ה וְ/לֹ֥א יַעֲנֶ֖ה אוֹתָ֑/ם וְ/יַסְתֵּ֨ר פָּנָ֤י/ו מֵ/הֶם֙ בָּ/עֵ֣ת הַ/הִ֔יא כַּ/אֲשֶׁ֥ר הֵרֵ֖עוּ מַעַלְלֵי/הֶֽם־׃פ
translation:
  text: Then they will cry out to Yahweh, but he will not answer them; he will hide his face from them at that time, because they made their deeds evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'because they acted wickedly in their deeds.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal adverb marking the consequence that follows from the preceding indictment. 'Then' is natural English and preserves the forward-looking judgment sequence.
- source_word: יִזְעֲקוּ
  chosen: they will cry out
  alternatives:
  - they will call out
  lexicon: HALOT
  rationale: The verb זעק conveys a strong cry for help, often in distress. 'Cry out' best preserves the urgency without overparaphrasing.
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: 'Per doctrine, יְהוָה is rendered ''the LORD'' rather than transliterated. The preposition אֶל is straightforwardly directional: they cry out to him.'
- source_word: וְלֹא יַעֲנֶה אוֹתָם
  chosen: but he will not answer them
  alternatives:
  - and he will not answer them
  lexicon: HALOT
  rationale: 'ענה here means ''answer/respond.'' English idiom prefers ''answer them.'' Although the conjunction is formally ''and,'' ''but'' rightly brings out the adversative force in context: they cry out, yet receive no answer.'
- source_word: וְיַסְתֵּר פָּנָיו מֵהֶם
  chosen: he will hide his face from them
  alternatives:
  - he will conceal his face from them
  lexicon: HALOT
  rationale: The idiom 'hide his face' is a standard biblical expression for withdrawing favor or refusing regard. It should be preserved rather than paraphrased away.
- source_word: בָּעֵת הַהִיא
  chosen: at that time
  alternatives:
  - in that time
  lexicon: HALOT
  rationale: A temporal phrase specifying the occasion of judgment. 'At that time' is idiomatic modern English.
- source_word: כַּאֲשֶׁר
  chosen: because
  alternatives:
  - just as
  - inasmuch as
  lexicon: HALOT
  rationale: Here the particle introduces the ground for the judgment rather than a mere comparison. 'Because' best communicates the causal sense in context.
- source_word: הֵרֵעוּ
  chosen: they made ... evil
  alternatives:
  - they acted wickedly
  - they did evil
  lexicon: HALOT
  rationale: The Hiphil of רעע is causative, literally 'they made evil/bad.' To preserve the relation to the following noun, the translation keeps the causative idea rather than flattening it entirely to 'acted wickedly.'
- source_word: מַעַלְלֵיהֶם
  chosen: their deeds
  alternatives:
  - their actions
  - their practices
  lexicon: HALOT
  rationale: Refers to their acts or dealings. 'Deeds' is concise, readable, and morally weighty in context.
