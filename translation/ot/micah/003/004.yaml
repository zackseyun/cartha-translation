theological_decisions:
- issue: Anthropomorphic idiom of divine withdrawal
  chosen_reading: Retain the idiom 'he will hide his face from them' in the main text
  alternative_readings:
  - he will turn away from them
  - he will withhold his favor from them
  rationale: The Hebrew uses a well-established covenantal idiom for divine judgment. Preserving the image maintains the theological texture and avoids interpretive reduction, while the meaning remains clear in English.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it
- issue: Rendering the causal clause with moral emphasis
  chosen_reading: Translate כַּאֲשֶׁר הֵרֵעוּ מַעַלְלֵיהֶם as 'because they made their deeds evil'
  alternative_readings:
  - because their deeds were evil
  - because they acted wickedly
  rationale: The chosen rendering preserves the causative force of הֵרֵעוּ and the explicit object מַעַלְלֵיהֶם. This avoids smoothing the clause into a generic statement and keeps the text's emphasis on culpable conduct.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation tradition
