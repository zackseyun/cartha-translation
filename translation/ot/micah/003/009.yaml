id: MIC.3.9
reference: Micah 3:9
source:
  edition: WLC
  text: שִׁמְעוּ נָ֣א זֹ֗את רָאשֵׁי֙ בֵּ֣ית יַעֲקֹ֔ב וּ/קְצִינֵ֖י בֵּ֣ית יִשְׂרָאֵ֑ל
    הַֽ/מֲתַעֲבִ֣ים מִשְׁפָּ֔ט וְ/אֵ֥ת כָּל הַ/יְשָׁרָ֖ה יְעַקֵּֽשׁוּ־־׃
translation:
  text: 'Hear this, please, heads of the house of Jacob and rulers of the house of
    Israel, who detest justice and make crooked all that is straight:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Listen now' for 'Hear this, please'; the particle נָא can express urgency
      as well as entreaty.
    reason: lexical_alternative
  - marker: b
    text: Or 'everything that is right.' The Hebrew literally says 'all that is straight,'
      preserving the contrast with 'make crooked.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen
  lexicon: HALOT
  rationale: Imperative plural of שׁמע. 'Hear' preserves the prophetic summons and
    covenantal resonance better than the more colloquial 'listen.'
- source_word: נָא
  chosen: please
  alternatives:
  - now
  lexicon: HALOT
  rationale: Particle of entreaty or urgency. 'Please' best reflects the particle's
    softening/appealing force here; 'now' can sound merely temporal in English.
- source_word: זֹאת
  chosen: this
  alternatives:
  - this word
  - this message
  lexicon: HALOT
  rationale: Demonstrative object of the imperative. The simple 'this' is closest
    to the Hebrew; more explicit expansions would add content not stated.
- source_word: רָאשֵׁי בֵּית יַעֲקֹב
  chosen: heads of the house of Jacob
  alternatives:
  - leaders of the house of Jacob
  - chiefs of the house of Jacob
  lexicon: HALOT
  rationale: רָאשֵׁי literally means 'heads of.' Retaining 'heads' preserves the metaphor
    and formal parallelism with the following phrase, while remaining intelligible
    in English.
- source_word: וּקְצִינֵי בֵּית יִשְׂרָאֵל
  chosen: and rulers of the house of Israel
  alternatives:
  - and officials of the house of Israel
  - and commanders of the house of Israel
  lexicon: HALOT
  rationale: קצין denotes a leader, ruler, or official. 'Rulers' fits the civic-judicial
    context of Micah 3 and pairs naturally with the accusation that follows.
- source_word: הַמֲתַעֲבִים
  chosen: who detest
  alternatives:
  - who abhor
  - who make detestable
  lexicon: HALOT
  rationale: The participle from תעב here describes the leaders' attitude toward justice.
    'Detest' is strong, natural English; 'abhor' is possible but more archaic in tone.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  lexicon: HALOT
  rationale: In prophetic denunciation of corrupt leaders, מִשְׁפָּט commonly refers
    to justice in the judicial and social sense. 'Justice' is the clearest modern
    rendering.
- source_word: וְאֵת כָּל הַיְשָׁרָה
  chosen: all that is straight
  alternatives:
  - all uprightness
  - everything that is right
  lexicon: HALOT
  rationale: The noun/adjectival form from ישר denotes straightness/uprightness. 'All
    that is straight' preserves the metaphor that is then inverted by the following
    verb; 'everything that is right' captures sense but loses the wordplay.
- source_word: יְעַקֵּשׁוּ
  chosen: make crooked
  alternatives:
  - twist
  - pervert
  lexicon: HALOT
  rationale: From עקשׁ, 'to make crooked/pervert.' 'Make crooked' best preserves the
    vivid contrast with 'straight' and reflects the Hebrew imagery directly.
