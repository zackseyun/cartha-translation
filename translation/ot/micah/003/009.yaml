theological_decisions:
- issue: Rendering of covenantal people designations
  chosen_reading: house of Jacob ... house of Israel
  alternative_readings:
  - Jacob ... Israel
  - people of Jacob ... people of Israel
  rationale: The Hebrew repeats בֵּית ('house of') in both phrases. Preserving it
    maintains the poetic parallelism and the corporate/covenantal sense without importing
    additional theological interpretation.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; consistency of key terms, or documented exception.'
