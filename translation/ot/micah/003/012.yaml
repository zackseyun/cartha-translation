id: MIC.3.12
reference: Micah 3:12
source:
  edition: WLC
  text: לָ/כֵן֙ בִּ/גְלַלְ/כֶ֔ם צִיּ֖וֹן שָׂדֶ֣ה תֵֽחָרֵ֑שׁ וִ/ירוּשָׁלִַ֨ם֙ עִיִּ֣ין
    תִּֽהְיֶ֔ה וְ/הַ֥ר הַ/בַּ֖יִת לְ/בָמ֥וֹת יָֽעַר׃פ
translation:
  text: Therefore, because of you, Zion will be plowed like a field, and Jerusalem
    will become ruins, and the mountain of the house will become wooded heights.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the temple mount'' or ''the mountain of the temple.'' Hebrew: ''the
      mountain of the house.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'high places of a forest' / 'forest heights.' The Hebrew likely depicts
      the temple mount becoming wild and overgrown.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks the verse as the consequence of the leaders' sins described in
    the preceding context; 'Therefore' preserves the prophetic judgment force.
- source_word: בִּגְלַלְכֶם
  chosen: because of you
  alternatives:
  - on account of you
  - for your sake
  lexicon: HALOT
  rationale: Directly assigns blame to the addressed group. 'Because of you' is idiomatic
    and preserves the causal force without softening the accusation.
- source_word: צִיּוֹן
  chosen: Zion
  lexicon: HALOT
  rationale: Standard transliteration of the place name, in keeping with the policy
    to transliterate names.
- source_word: שָׂדֶה
  chosen: field
  lexicon: HALOT
  rationale: The noun denotes open farmland or cultivated land. 'Field' is the natural
    English equivalent in the simile 'plowed like a field.'
- source_word: תֵחָרֵשׁ
  chosen: will be plowed
  alternatives:
  - will be plowed up
  - will be tilled
  lexicon: HALOT
  rationale: Nifal imperfect from חרשׁ in the agricultural sense. 'Will be plowed'
    best captures the passive/resultative sense and the image of the city reduced
    to arable ground.
- source_word: וִירוּשָׁלִַם
  chosen: and Jerusalem
  lexicon: HALOT
  rationale: Standard transliteration of the city name; conjunction retained for the
    cumulative judgment sequence.
- source_word: עִיִּין
  chosen: ruins
  alternatives:
  - heaps of ruins
  - rubble heaps
  lexicon: HALOT
  rationale: Plural noun referring to ruins or heaps. 'Ruins' is clear modern English;
    the plural sense is preserved conceptually though not woodenly.
- source_word: תִּהְיֶה
  chosen: will become
  alternatives:
  - will be
  lexicon: HALOT
  rationale: Though formally 'will be,' in English 'will become ruins' better conveys
    the transformation implied by the judgment oracle.
- source_word: וְהַר הַבַּיִת
  chosen: and the mountain of the house
  alternatives:
  - and the temple mount
  - and the mountain of the temple
  lexicon: HALOT
  rationale: Literally 'the mountain of the house,' referring to the temple mount.
    The more literal rendering preserves the Hebrew expression and its resonance with
    'the house' as the temple; a more interpretive alternative is preserved in a footnote.
- source_word: לְבָמוֹת
  chosen: wooded heights
  alternatives:
  - high places
  - heights
  lexicon: HALOT
  rationale: While במות often means 'high places,' here the following noun 'forest/woodland'
    shapes the sense toward overgrown heights rather than cultic shrines. 'Wooded
    heights' communicates the image of the temple mount becoming wild and overgrown.
- source_word: יָעַר
  chosen: wooded
  alternatives:
  - forest
  - woodland
  lexicon: HALOT
  rationale: The noun means 'forest/woodland.' In English, rendering the phrase idiomatically
    as 'wooded heights' avoids awkwardness while preserving the image of desolation
    and overgrowth.
