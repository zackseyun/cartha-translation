theological_decisions:
- issue: Whether to render הַבַּיִת explicitly as 'temple' in the main text
  chosen_reading: Retain the more literal 'the house' within 'the mountain of the
    house'
  alternative_readings:
  - the temple mount
  - the mountain of the temple
  rationale: The Hebrew says 'the house,' a common designation for the temple, but
    the literal wording preserves the diction of the prophetic text and avoids over-interpreting
    beyond what the source explicitly states. The referent is clear enough and the
    interpretive alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §1, §5
- issue: Whether לְבָמוֹת should be rendered with cultic overtones ('high places')
    or as topographical desolation
  chosen_reading: Render as 'wooded heights' in context
  alternative_readings:
  - high places
  - forest heights
  rationale: In this judgment context, the phrase describes the temple mount reduced
    to wild overgrowth, not necessarily functioning cult sites. The following יער
    strongly colors the phrase toward a topographical image of desolation. A lexical
    alternative is preserved in a footnote because 'high places' is a plausible traditional
    rendering.
  doctrine_reference: Translation philosophy §1, §5
