id: MIC.3.11
reference: Micah 3:11
source:
  edition: WLC
  text: רָאשֶׁ֣י/הָ בְּ/שֹׁ֣חַד יִשְׁפֹּ֗טוּ וְ/כֹהֲנֶ֨י/הָ֙ בִּ/מְחִ֣יר יוֹר֔וּ וּ/נְבִיאֶ֖י/הָ בְּ/כֶ֣סֶף יִקְסֹ֑מוּ וְ/עַל יְהוָה֙ יִשָּׁעֵ֣נוּ לֵ/אמֹ֔ר הֲ/ל֤וֹא יְהוָה֙ בְּ/קִרְבֵּ֔/נוּ לֹֽא תָב֥וֹא עָלֵ֖י/נוּ רָעָֽה׀־־׃
translation:
  text: Her leaders judge for a bribe, and her priests teach for a price, and her prophets practice divination for silver; yet they lean on Yahweh, saying, “Is not Yahweh in our midst? No disaster will come upon us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “rely on the LORD.” The Hebrew verb carries the image of leaning on someone for support.
    reason: lexical_alternative
  - marker: b
    text: Or “No calamity will come upon us.” The Hebrew word can mean evil in a broad sense, but here it refers to coming disaster or judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאשֶׁיהָ
  chosen: her leaders
  alternatives:
  - her heads
  - her chiefs
  - its leaders
  lexicon: HALOT
  rationale: The plural construct of רֹאשׁ with 3fs suffix refers to the city's/society's leading officials. 'Leaders' communicates the idiomatic sense in natural English better than the overly literal 'heads,' while preserving the political authority in view.
- source_word: בְּשֹׁחַד
  chosen: for a bribe
  alternatives:
  - for bribery
  - by bribery
  lexicon: HALOT
  rationale: שֹׁחַד denotes a bribe. With בְּ, the phrase expresses the corrupt inducement motivating judgment. 'For a bribe' is idiomatic and clearly conveys venality.
- source_word: יִשְׁפֹּטוּ
  chosen: judge
  alternatives:
  - give judgment
  - render judgment
  lexicon: HALOT
  rationale: The verb שׁפט in this context refers to judicial decision-making by civic rulers. 'Judge' is concise and accurate.
- source_word: כֹהֲנֶיהָ
  chosen: her priests
  alternatives:
  - its priests
  lexicon: HALOT
  rationale: Straightforward rendering of the noun with 3fs suffix, parallel to 'her leaders' and 'her prophets.'
- source_word: בִּמְחִיר
  chosen: for a price
  alternatives:
  - for payment
  - for hire
  lexicon: HALOT
  rationale: מְחִיר denotes a price or payment. 'For a price' preserves the commercialized corruption of priestly instruction and matches the parallel structure.
- source_word: יוֹרוּ
  chosen: teach
  alternatives:
  - give instruction
  - render legal instruction
  lexicon: HALOT
  rationale: From ירה in the Hiphil, often 'instruct/teach,' especially of priestly torah-instruction. 'Teach' is readable; the legal-cultic nuance is real but not necessary to over-specify in the main text.
- source_word: נְבִיאֶיהָ
  chosen: her prophets
  alternatives:
  - its prophets
  lexicon: HALOT
  rationale: Direct rendering, maintaining the triad of corrupt offices.
- source_word: בְּכֶסֶף
  chosen: for silver
  alternatives:
  - for money
  lexicon: HALOT
  rationale: כֶּסֶף literally means 'silver' and often functions as money. 'For silver' preserves the concrete Hebrew image and the rhetorical parallelism with 'bribe' and 'price.'
- source_word: יִקְסֹמוּ
  chosen: practice divination
  alternatives:
  - divine
  - tell fortunes
  lexicon: HALOT
  rationale: קסם refers to divination, a practice associated with illicit revelation. 'Practice divination' is explicit and avoids the possible ambiguity of the English verb 'divine.'
- source_word: וְעַל־יְהוָה יִשָּׁעֵנוּ
  chosen: yet they lean on the LORD
  alternatives:
  - and they rely on the LORD
  - and they rest on the LORD
  lexicon: HALOT
  rationale: The Niphal of שׁען means to lean on/rely on. 'Lean on' preserves the metaphor, while 'yet' brings out the ironic contrast between their corruption and their claimed confidence in God.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הֲלוֹא
  chosen: Is not
  alternatives:
  - Surely
  - Isn't
  lexicon: HALOT
  rationale: Introduces a rhetorical question expressing false confidence. 'Is not' is natural and suitably formal for prophetic speech.
- source_word: בְּקִרְבֵּנוּ
  chosen: in our midst
  alternatives:
  - among us
  - within us
  lexicon: HALOT
  rationale: '''In our midst'' best captures the communal-presence sense and echoes biblical idiom without sounding archaic.'
- source_word: לֹא תָבוֹא עָלֵינוּ רָעָה
  chosen: No disaster will come upon us
  alternatives:
  - No evil will come upon us
  - Calamity will not come on us
  lexicon: HALOT
  rationale: רָעָה here denotes calamity/disaster rather than moral evil. 'Disaster' communicates the threatened judgment clearly in contemporary English.
