theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of the final clause רָעָה
  chosen_reading: disaster
  alternative_readings:
  - evil
  - calamity
  rationale: The speakers deny impending judgment, so the term refers to harmful calamity rather than moral evil. This avoids importing a theological claim that God authors moral evil while preserving the prophetic warning of judgment.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
