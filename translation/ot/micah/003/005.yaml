id: MIC.3.5
reference: Micah 3:5
source:
  edition: WLC
  text: כֹּ֚ה אָמַ֣ר יְהוָ֔ה עַל הַ/נְּבִיאִ֖ים הַ/מַּתְעִ֣ים אֶת עַמִּ֑/י הַ/נֹּשְׁכִ֤ים
    בְּ/שִׁנֵּי/הֶם֙ וְ/קָרְא֣וּ שָׁל֔וֹם וַ/אֲשֶׁר֙ לֹא יִתֵּ֣ן עַל פִּי/הֶ֔ם וְ/קִדְּשׁ֥וּ
    עָלָ֖י/ו מִלְחָמָֽה־־־־׃
translation:
  text: Thus says the LORD concerning the prophets who lead my people astray, who
    bite with their teeth and cry, “Peace,” but against anyone who does not put something
    into their mouths, they consecrate war.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, “who bite with their teeth.” The image likely depicts predatory
      prophets who announce well-being when they are fed or paid.
    reason: lexical_alternative
  - marker: b
    text: Literally, “who does not put on their mouth.” The sense is to give them
      food or payment.
    reason: lexical_alternative
  - marker: c
    text: Or “they declare holy war against him.” The Hebrew says “they consecrate
      war,” using cultic language for preparing an attack.
    reason: alternative_reading
  - marker: d
    text: Or 'but against anyone who does not put something into their mouths, they
      consecrate war.'.
    reason: previous_rendering
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name, following established English
    convention that reflects the Hebrew covenant name without transliteration in the
    main text.
- source_word: עַל
  chosen: concerning
  alternatives:
  - against
  - about
  lexicon: HALOT
  rationale: 'Here introduces the subject of the oracle: what the LORD says regarding
    the prophets. ''Against'' is possible in prophetic judgment contexts, but ''concerning''
    better matches the syntax while the negative stance is carried by the content
    of the verse itself.'
- source_word: הַנְּבִיאִים
  chosen: the prophets
  lexicon: HALOT
  rationale: Straightforward rendering of the plural noun with article.
- source_word: הַמַּתְעִים
  chosen: who lead ... astray
  alternatives:
  - who mislead
  - who cause ... to wander
  lexicon: HALOT
  rationale: The Hiphil participle of תעה denotes causing someone to go astray. 'Lead
    astray' is idiomatic and preserves the active causative sense.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Standard covenantal expression; possessive retained.
- source_word: הַנֹּשְׁכִים בְּשִׁנֵּיהֶם
  chosen: who bite with their teeth
  alternatives:
  - who bite with their mouths
  - who gnaw with their teeth
  lexicon: HALOT
  rationale: A vivid metaphor for predatory exploitation. Retaining 'teeth' preserves
    the concrete imagery rather than smoothing it into a generalized idiom.
- source_word: וְקָרְאוּ שָׁלוֹם
  chosen: and cry, “Peace,”
  alternatives:
  - and proclaim, 'Peace,'
  - and call out, 'Peace,'
  lexicon: HALOT
  rationale: קרא with direct speech is naturally 'cry/proclaim.' 'Peace' renders שָׁלוֹם
    here as a message of well-being/security, likely falsely announced for gain.
- source_word: וַאֲשֶׁר לֹא יִתֵּן עַל פִּיהֶם
  chosen: but against anyone who does not put something into their mouths
  alternatives:
  - but whoever does not feed them
  - but whoever does not put into their mouth
  lexicon: HALOT
  rationale: The idiom literally refers to placing food in their mouth, i.e., paying
    or feeding them. 'Put something into their mouths' keeps the metaphor and clarifies
    the implied object with 'something' for natural English.
- source_word: וְקִדְּשׁוּ עָלָיו מִלְחָמָה
  chosen: they consecrate war against him
  alternatives:
  - they declare holy war against him
  - they prepare war against him
  lexicon: HALOT
  rationale: קדשׁ in the Piel can mean to consecrate/set apart, including preparing
    for sacred war. 'Consecrate war' preserves the cultic force; English is adjusted
    slightly in the sentence to 'they consecrate war' while keeping the striking Hebrew
    imagery.
