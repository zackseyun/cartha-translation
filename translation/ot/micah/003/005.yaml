theological_decisions:
- issue: Rendering of prophetic accusation without softening the economic exploitation
    imagery
  chosen_reading: Retain the concrete metaphors of biting, putting into their mouths,
    and consecrating war
  alternative_readings:
  - Interpret all three idiomatically as generic bribery and hostility
  rationale: The verse condemns corrupt prophets whose messages are conditioned by
    what they receive. Preserving the metaphors keeps the prophetic rhetoric and avoids
    importing a narrower modern category while still making the sense intelligible.
  doctrine_reference: Translation philosophy §§1, 3, 6
