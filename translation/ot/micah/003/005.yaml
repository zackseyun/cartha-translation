  from: but against anyone who does not put something into their mouths, they consecrate
    war.
  to: but they consecrate war against anyone who does not put something into their
    mouths.
  rationale: The current word order, which fronts a long prepositional phrase ('against
    anyone who...'), is a bit cumbersome in English. While it reflects a possible
    reading of the Hebrew syntax (topicalizing the object of the preposition 'עָלָיו'),
    reordering the clause to a more standard Subject-Verb-Object structure ('they
    consecrate war against anyone...') improves readability and flow without altering
    the meaning.
