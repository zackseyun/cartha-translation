theological_decisions:
- issue: Nature of the accusation in prophetic rhetoric
  chosen_reading: The verse indicts the city's leaders for establishing Zion/Jerusalem
    through violent and unjust means, not literally constructing with blood.
  alternative_readings:
  - A more literal 'with blood' could be retained without explicating the idiom.
  rationale: The Hebrew idiom 'bloods' in this context points to bloodshed/bloodguilt.
    Rendering the idiomatic sense avoids misleading literalism while preserving the
    prophetic charge.
