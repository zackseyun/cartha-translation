id: MIC.3.10
reference: Micah 3:10
source:
  edition: WLC
  text: בֹּנֶ֥ה צִיּ֖וֹן בְּ/דָמִ֑ים וִ/ירוּשָׁלִַ֖ם בְּ/עַוְלָֽה׃
translation:
  text: who builds Zion with bloodshed and Jerusalem with injustice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with blood'—the Hebrew plural often refers idiomatically to bloodshed
      or bloodguilt.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֹּנֶה
  chosen: who builds
  alternatives:
  - building
  - he builds
  lexicon: HALOT
  rationale: The masculine singular participle functions here in apposition to the
    prior denunciation context ('hear this...'), describing the kind of ruler/city-builder
    in view. Rendering it as the relative clause 'who builds' gives natural English
    while preserving the participial force better than a bare participle.
- source_word: צִיּוֹן
  chosen: Zion
  lexicon: HALOT
  rationale: Standard transliteration of the place name, in keeping with the policy
    to transliterate names rather than translate them.
- source_word: בְּדָמִים
  chosen: with bloodshed
  alternatives:
  - with blood
  - by bloodshed
  - with bloodguilt
  lexicon: HALOT
  rationale: The plural 'bloods' in Hebrew often carries the sense of bloodshed or
    bloodguilt rather than literal blood as a building material. 'With bloodshed'
    is idiomatic and conveys violent means used to establish the city.
- source_word: וִירוּשָׁלִַם
  chosen: and Jerusalem
  lexicon: HALOT
  rationale: Proper name transliterated in standard English form; conjunction retained
    explicitly.
- source_word: בְּעַוְלָה
  chosen: with injustice
  alternatives:
  - with wrong
  - with unrighteousness
  - with iniquity
  lexicon: HALOT
  rationale: עַוְלָה denotes injustice, wrong, or unrighteousness. 'Injustice' best
    fits the social-judicial condemnation in Micah 3 and is clear modern English without
    unnecessary archaism.
