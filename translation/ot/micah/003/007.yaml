theological_decisions:
- issue: Whether to render the final clause as divine silence or as absence of any
    valid oracle
  chosen_reading: there is no answer from God
  alternative_readings:
  - God gives no answer
  - there is no divine answer
  rationale: 'The Hebrew permits either a more literal nominal clause or a slightly
    more dynamic verbal paraphrase. The chosen wording preserves the theological point
    without adding interpretive detail: these practitioners are shamed because no
    genuine response comes from God.'
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
