id: MIC.3.7
reference: Micah 3:7
source:
  edition: WLC
  text: וּ/בֹ֣שׁוּ הַ/חֹזִ֗ים וְ/חָֽפְרוּ֙ הַ/קֹּ֣סְמִ֔ים וְ/עָט֥וּ עַל שָׂפָ֖ם כֻּלָּ֑/ם
    כִּ֛י אֵ֥ין מַעֲנֵ֖ה אֱלֹהִֽים־׃
translation:
  text: The seers will be put to shame, and the diviners will be disgraced; all of
    them will cover their lips, because there is no answer from God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cover the upper lip' or 'cover the mustache,' likely a gesture of shame,
      mourning, or uncleanness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבֹשׁוּ
  chosen: will be put to shame
  alternatives:
  - will be ashamed
  - will be disappointed
  lexicon: HALOT
  rationale: בוש commonly denotes shame or being put to shame. The passive-like English
    expression fits the prophetic judgment context better than the more internal 'be
    ashamed' while preserving the resultative sense.
- source_word: הַחֹזִים
  chosen: the seers
  alternatives:
  - the visionaries
  - those who see visions
  lexicon: HALOT
  rationale: חֹזִים is the standard term for visionary figures, often parallel to
    prophets. 'Seers' is concise, established, and preserves the technical sense without
    over-paraphrase.
- source_word: וְחָפְרוּ
  chosen: will be disgraced
  alternatives:
  - will be ashamed
  - will be humiliated
  lexicon: HALOT
  rationale: חפר in this stem can express shame or humiliation. 'Disgraced' gives
    a natural English parallel to the previous clause while preserving the public-honor
    dimension.
- source_word: הַקֹּסְמִים
  chosen: the diviners
  alternatives:
  - the soothsayers
  - those who practice divination
  lexicon: HALOT
  rationale: קסם refers specifically to divination. 'Diviners' is the most direct
    and readable rendering, and it preserves the negative religious connotation in
    context.
- source_word: וְעָטוּ עַל שָׂפָם
  chosen: will cover their lips
  alternatives:
  - will cover their mustache
  - will cover the upper lip
  lexicon: HALOT
  rationale: The idiom literally refers to covering the lip/upper lip, likely a gesture
    of shame, mourning, or uncleanness. 'Cover their lips' keeps the Hebrew image
    in the main text without over-interpreting the gesture. A more specific anatomical
    rendering is preserved in a footnote.
- source_word: כֻּלָּם
  chosen: all of them
  alternatives:
  - all
  - every one of them
  lexicon: HALOT
  rationale: The explicit pronoun suffix intensifies the totality. 'All of them' preserves
    the emphasis more clearly than a bare 'all' in English.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for their shame. 'Because' is the clearest
    modern English causal connector.
- source_word: אֵין מַעֲנֵה אֱלֹהִים
  chosen: there is no answer from God
  alternatives:
  - there is no answer of God
  - God gives no answer
  - there is no divine answer
  lexicon: HALOT
  rationale: 'מענה means answer/response. The construct with אֱלֹהִים is best expressed
    idiomatically in English as source: ''from God.'' This preserves the sense that
    their claimed revelations are exposed as false because no divine response comes.'
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - gods
  - the divine
  lexicon: HALOT
  rationale: Although morphologically plural, אֱלֹהִים here takes singular sense in
    context, referring to the true God whose silence exposes the false prophets and
    diviners.
