id: MIC.3.1
reference: Micah 3:1
source:
  edition: WLC
  text: וָ/אֹמַ֗ר שִׁמְעוּ נָא֙ רָאשֵׁ֣י יַעֲקֹ֔ב וּ/קְצִינֵ֖י בֵּ֣ית יִשְׂרָאֵ֑ל
    הֲ/ל֣וֹא לָ/כֶ֔ם לָ/דַ֖עַת אֶת הַ/מִּשְׁפָּֽט־־׃
translation:
  text: 'And I said, “Hear now, heads of Jacob and rulers of the house of Israel:
    is it not for you to know justice?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “judgment.” The Hebrew mishpat can denote legal judgment, justice, or
      what is right.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  chosen: And I said
  alternatives:
  - Then I said
  - I said
  lexicon: HALOT
  rationale: The waw-consecutive with אמר advances the discourse. 'And I said' preserves
    the narrative linkage without overinterpreting sequence as strictly temporal ('then').
- source_word: שִׁמְעוּ נָא
  chosen: Hear now
  alternatives:
  - Listen, please
  - Hear, please
  lexicon: HALOT
  rationale: שׁמע in imperative is naturally 'hear/listen.' נָא adds urgency or entreaty
    rather than politeness in modern English; 'now' captures the rhetorical force
    better than 'please' in prophetic address.
- source_word: רָאשֵׁי יַעֲקֹב
  chosen: heads of Jacob
  alternatives:
  - leaders of Jacob
  - chiefs of Jacob
  lexicon: HALOT
  rationale: The literal image is 'heads,' a common metaphor for leaders. Retaining
    'heads' preserves the Hebrew metaphor and pairs well with the parallel term 'rulers.'
    'Jacob' is kept as the covenantal name for the people.
- source_word: וּקְצִינֵי בֵּית יִשְׂרָאֵל
  chosen: and rulers of the house of Israel
  alternatives:
  - and officials of the house of Israel
  - and commanders of the house of Israel
  lexicon: HALOT
  rationale: קצין denotes a leader, ruler, or official. 'Rulers' best fits the context
    of civic/judicial authority. 'House of Israel' is preserved formally because it
    is a standard covenantal-national designation, not merely 'Israel.'
- source_word: הֲלוֹא לָכֶם
  chosen: is it not for you
  alternatives:
  - is it not yours
  - does it not belong to you
  lexicon: HALOT
  rationale: The interrogative הלא expects an affirmative answer. The ל construction
    here expresses obligation or proper responsibility; 'is it not for you' idiomatically
    conveys that this duty belongs to them.
- source_word: לָדַעַת
  chosen: to know
  alternatives:
  - to understand
  - to recognize
  lexicon: HALOT
  rationale: ידע fundamentally means 'to know.' In context it includes practical understanding
    appropriate to rulers, but 'to know' is broad enough to preserve that range.
- source_word: הַמִּשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - what is just
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment, legal decision, justice, or ordinance. In
    this rebuke of leaders for failing in their governing role, 'justice' best communicates
    the ethical-juridical sense in natural English.
