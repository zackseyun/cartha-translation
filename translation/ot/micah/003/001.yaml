theological_decisions:
- issue: Rendering of מִשְׁפָּט in a leadership/judicial context
  chosen_reading: justice
  alternative_readings:
  - judgment
  rationale: The verse rebukes Israel's leaders for failing in their duty to administer
    what is right. 'Justice' better captures the public, ethical, and judicial responsibility
    implied here than the narrower English 'judgment,' while remaining faithful to
    the Hebrew semantic range.
  doctrine_reference: Translation philosophy §1, §5
