theological_decisions:
- issue: Metaphorical violence describing corrupt rulers
  chosen_reading: Retain the graphic skin-and-bones imagery as a metaphor of extreme
    oppression rather than softening it into abstract exploitation language.
  alternative_readings:
  - Paraphrase as 'who utterly exploit them'
  rationale: The Hebrew intentionally uses shocking bodily imagery to portray predatory
    leadership. Optimal equivalence here favors preserving the metaphor's force rather
    than resolving it into a less vivid abstraction.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
