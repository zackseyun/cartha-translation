id: MIC.3.2
reference: Micah 3:2
source:
  edition: WLC
  text: שֹׂ֥נְאֵי ט֖וֹב וְ/אֹ֣הֲבֵי רעה גֹּזְלֵ֤י עוֹרָ/ם֙ מֵֽ/עֲלֵי/הֶ֔ם וּ/שְׁאֵרָ֖/ם
    מֵ/עַ֥ל עַצְמוֹתָֽ/ם׃
translation:
  text: you who hate good and love evil, who strip their skin from off them and their
    flesh from off their bones—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tear off their skin from them and their flesh from their bones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׂנְאֵי
  chosen: hate
  alternatives:
  - those who hate
  lexicon: HALOT
  rationale: Qal participle plural functioning substantivally/predicatively in direct
    address. English finite verb 'hate' is most natural in continuation of the prior
    vocative context ('you who...').
- source_word: טוֹב
  chosen: good
  alternatives:
  - what is good
  lexicon: HALOT
  rationale: Common adjective/substantive meaning 'good.' Bare 'good' preserves the
    concise moral contrast with 'evil'; 'what is good' is possible but slightly more
    expansive.
- source_word: אֹהֲבֵי
  chosen: love
  alternatives:
  - those who love
  lexicon: HALOT
  rationale: Qal participle plural parallel to שֹׂנְאֵי. Rendered with finite verb
    for smooth English in the same direct-address construction.
- source_word: רעה
  chosen: evil
  alternatives:
  - what is evil
  - harm
  lexicon: HALOT
  rationale: In this moral contrast with טוֹב, 'evil' is the best rendering. 'Harm'
    is too narrow and would weaken the ethical indictment.
- source_word: גֹּזְלֵי
  chosen: strip
  alternatives:
  - tear off
  - rob
  - pluck off
  lexicon: HALOT
  rationale: The participle from גזל can denote seizing/tearing away. In the vivid
    cannibalistic metaphor with skin and flesh, 'strip' communicates violent removal
    idiomatically in English.
- source_word: עוֹרָם
  chosen: their skin
  alternatives:
  - their hide
  lexicon: HALOT
  rationale: Literal body-part term in a graphic metaphor of exploitation. 'Skin'
    is standard and readable; 'hide' sounds dehumanizing in English beyond what the
    Hebrew itself requires.
- source_word: מֵעֲלֵיהֶם
  chosen: from off them
  alternatives:
  - from them
  - off them
  lexicon: HALOT
  rationale: The double prepositional sense is spatial and forceful. 'From off them'
    preserves the graphic imagery better than the flatter 'from them.'
- source_word: וּשְׁאֵרָם
  chosen: their flesh
  alternatives:
  - their meat
  - their body
  lexicon: HALOT
  rationale: שְׁאֵר can mean flesh/body, often kin or bodily flesh in context. Here,
    paired with skin and bones, 'flesh' is the clearest anatomical sense.
- source_word: מֵעַל עַצְמוֹתָם
  chosen: from off their bones
  alternatives:
  - off their bones
  lexicon: HALOT
  rationale: Retains the gruesome but deliberate metaphor of butchery/exploitation.
    'From off their bones' mirrors the previous phrase and preserves Hebrew parallelism.
