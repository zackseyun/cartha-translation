theological_decisions:
- issue: Whether רוּחַ יְהוָה refers to God's Spirit personally or merely an impersonal divine impulse
  chosen_reading: the Spirit of Yahweh
  alternative_readings:
  - the spirit of the LORD
  rationale: In prophetic empowerment contexts, the phrase naturally denotes God's Spirit rather than a mere disposition. Capitalization in English signals this theological and contextual reading without adding content beyond the Hebrew.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: How to render the sequence כֹחַ אֶת רוּחַ יְהוָה וּמִשְׁפָּט וּגְבוּרָה
  chosen_reading: '''filled with power, with the Spirit of Yahweh, and with justice and might'''
  alternative_readings:
  - '''filled with power by the Spirit of the LORD, with justice and might'''
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'Translation philosophy #3'
