id: MIC.2.6
reference: Micah 2:6
source:
  edition: WLC
  text: אַל תַּטִּ֖פוּ יַטִּיפ֑וּ/ן לֹֽא יַטִּ֣פוּ לָ/אֵ֔לֶּה לֹ֥א יִסַּ֖ג כְּלִמּֽוֹת־־׃
translation:
  text: “Do not preach,” they preach. “One should not preach about these things; disgrace
    will not overtake us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Do not prophesy,' they say; 'they should not prophesy to these people.'
      The Hebrew verb literally means 'drip,' used metaphorically for prophetic speech.
    reason: lexical_alternative
  - marker: b
    text: Or, 'to these people' instead of 'about these things.'
    reason: alternative_reading
  - marker: c
    text: The final clause is difficult Hebrew; more literally, 'disgraces will not
      turn back' or 'reproaches will not depart.'
    reason: textual_variant
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not let
  - Never
  lexicon: HALOT
  rationale: אַל with the following imperfect/jussive form functions as a prohibition.
    'Do not' is the most natural English imperative equivalent.
- source_word: תַּטִּפוּ
  chosen: preach
  alternatives:
  - drip
  - prophesy
  - prattle
  lexicon: HALOT
  rationale: The verb נָטַף literally means 'drip,' but in prophetic contexts it is
    used metaphorically for speech, especially prophetic utterance. 'Preach' captures
    the hostile command against prophetic proclamation in readable modern English.
    'Prophesy' is possible, but the repetition in context sounds like a broader denunciation
    of preaching/speaking forth.
- source_word: יַטִּיפוּן
  chosen: they preach
  alternatives:
  - they prophesy
  - they keep preaching
  lexicon: HALOT
  rationale: 'The repeated form creates an ironic echo: ''Do not preach,'' they preach.
    Rendering it as ''they preach'' preserves the rhetorical repetition and the mocking
    tone directed at the prophet(s).'
- source_word: לֹא יַטִּפוּ
  chosen: One should not preach
  alternatives:
  - They should not preach
  - They do not preach
  lexicon: HALOT
  rationale: The clause is syntactically terse and ambiguous. A generic English subject
    ('One should not') best reflects the impersonal force of the prohibition in context,
    where the opponents are laying down what ought not to be proclaimed.
- source_word: לָאֵלֶּה
  chosen: about these things
  alternatives:
  - to these people
  - of these things
  - to such as these
  lexicon: HALOT
  rationale: The preposition ל plus demonstrative can be taken either as indirect
    object ('to these') or topic/reference ('about these things'). In context, the
    opponents object to the content of judgment preaching; 'about these things' best
    fits the flow. The alternative 'to these people' is preserved in a footnote because
    the Hebrew permits it.
- source_word: לֹא יִסַּג
  chosen: will not overtake
  alternatives:
  - will not turn back
  - will not be removed
  - will not recede
  lexicon: HALOT
  rationale: From נסג/שׂוג, the sense here is that reproaches/disgraces will not move
    away from or cease from someone, but in idiomatic English 'will not overtake'
    conveys the threatened arrival of shame/judgment more clearly. Because the Hebrew
    is difficult, a more literal alternative is footnoted.
- source_word: כְּלִמּוֹת
  chosen: disgrace
  alternatives:
  - shames
  - reproaches
  - humiliations
  lexicon: HALOT
  rationale: The plural noun denotes shame, reproach, or humiliations. Singular collective
    'disgrace' reads naturally in English while preserving the force of the warning.
