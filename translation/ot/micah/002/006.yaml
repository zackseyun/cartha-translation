theological_decisions:
- issue: Interpretation of the speakers in the verse
  chosen_reading: The verse is rendered as the opponents' rejection of prophetic proclamation,
    with the final clause expressing their denial that shame/judgment will come upon
    them.
  alternative_readings:
  - The final clause may be read as the prophet's assertion that reproaches will not
    depart from those who silence prophecy.
  - The middle clause may be taken more woodenly as 'They shall not prophesy to these
    people.'
  rationale: Micah 2:6 is notoriously compressed and rhetorically difficult. The immediate
    context favors hearing the people's resistance to judgment preaching. This rendering
    preserves that discourse flow without over-resolving every ambiguity; key alternatives
    are retained in footnotes.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
