id: MIC.2.13
reference: Micah 2:13
source:
  edition: WLC
  text: עָלָ֤ה הַ/פֹּרֵץ֙ לִ/פְנֵי/הֶ֔ם פָּֽרְצוּ֙ וַֽ/יַּעֲבֹ֔רוּ שַׁ֖עַר וַ/יֵּ֣צְאוּ
    ב֑/וֹ וַ/יַּעֲבֹ֤ר מַלְכָּ/ם֙ לִ/פְנֵי/הֶ֔ם וַ/יהוָ֖ה בְּ/רֹאשָֽׁ/ם׃פ
translation:
  text: The one who breaks through has gone up before them; they have broken through
    and passed through the gate, and gone out by it. Their king passes on before them,
    and the LORD is at their head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the breaker.' The Hebrew participle can function as a title-like designation
      for one who breaches an obstacle or opens the way.
    reason: lexical_alternative
  - marker: b
    text: 'The identity of ''the one who breaks through'' is debated: some understand
      a military leader, some the king, and some the LORD himself. The Hebrew leaves
      the relationship implicit.'
    reason: alternative_reading
  - marker: c
    text: Hebrew 'YHWH'; rendered 'the LORD' in keeping with the translation's standard
      practice.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַפֹּרֵץ
  chosen: the one who breaks through
  alternatives:
  - the breaker
  - the one who breaches
  lexicon: HALOT
  rationale: From פרץ, 'to break through/breach.' The participial form with article
    functions substantivally. 'The one who breaks through' is more transparent in
    modern English than the traditional 'the breaker,' while preserving the imagery
    of opening a way through an obstacle.
- source_word: עָלָה
  chosen: has gone up
  alternatives:
  - goes up
  - went up
  lexicon: HALOT
  rationale: Qal perfect 3ms. In prophetic discourse the perfect can describe a vivid
    or certain action. 'Has gone up' preserves the completed verbal form while fitting
    the sequence of actions.
- source_word: לִפְנֵיהֶם
  chosen: before them
  alternatives:
  - ahead of them
  - in front of them
  lexicon: HALOT
  rationale: Standard spatial idiom meaning in front of or ahead of. 'Before them'
    is concise and suits both occurrences in the verse.
- source_word: פָּרְצוּ
  chosen: they have broken through
  alternatives:
  - they break through
  - they burst through
  lexicon: HALOT
  rationale: Repeats the same root פרץ, creating verbal cohesion with הַפֹּרֵץ. 'Broken
    through' preserves that lexical link and the completed aspect.
- source_word: וַיַּעֲבֹרוּ
  chosen: passed through
  alternatives:
  - went through
  - crossed through
  lexicon: HALOT
  rationale: עבר commonly means pass over/through. Here with 'gate' the sense is movement
    through an opening. 'Passed through' is idiomatic English.
- source_word: שַׁעַר
  chosen: the gate
  alternatives:
  - a gate
  lexicon: HALOT
  rationale: Although anarthrous in Hebrew, English idiom in this sequential scene
    naturally takes 'the gate' as the specific gate being breached and traversed.
- source_word: וַיֵּצְאוּ בוֹ
  chosen: gone out by it
  alternatives:
  - gone out through it
  - come out by it
  lexicon: HALOT
  rationale: יצא means go out/come out; with בּוֹ referring back to the gate, 'gone
    out by it' is a natural rendering. 'Through it' is possible, but 'by it' more
    directly reflects the preposition while still making sense in English.
- source_word: מַלְכָּם
  chosen: their king
  alternatives:
  - their ruler
  lexicon: HALOT
  rationale: The noun plainly means 'king.' 'Ruler' would weaken the royal sense and
    obscure the parallel with the LORD leading them.
- source_word: וַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: בְּרֹאשָׁם
  chosen: at their head
  alternatives:
  - as their leader
  - before them
  lexicon: HALOT
  rationale: Literally 'at/in their head,' an idiom for leading position. 'At their
    head' preserves the metaphor and avoids flattening it into interpretation.
