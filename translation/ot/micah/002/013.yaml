theological_decisions:
- issue: Identity of הַפֹּרֵץ ('the one who breaks through')
  chosen_reading: Render descriptively without identifying the figure in the main
    text.
  alternative_readings:
  - a human military leader
  - the king/Messianic ruler
  - the LORD himself as the one opening the way
  rationale: 'The verse presents multiple leading figures in close relation: ''the
    one who breaks through,'' ''their king,'' and ''the LORD.'' Because the Hebrew
    does not explicitly equate or distinguish them beyond the sequence, the translation
    preserves the imagery and ambiguity rather than resolving it into a specific messianic
    or theophanic identification.'
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Relationship between 'their king' and 'the LORD'
  chosen_reading: Keep both expressions distinct in the main text.
  alternative_readings:
  - treat them as appositional references to the same figure
  - collapse the two into a single referent in translation
  rationale: The Hebrew coordinates 'their king' and 'the LORD' as separate expressions
    in the procession. The translation should not erase the distinction, even if interpreters
    see theological overlap or typology.
  doctrine_reference: Preserve theological tension rather than resolve it.
