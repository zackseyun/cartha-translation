id: MIC.2.10
reference: Micah 2:10
source:
  edition: WLC
  text: ק֣וּמוּ וּ/לְכ֔וּ כִּ֥י לֹא זֹ֖את הַ/מְּנוּחָ֑ה בַּ/עֲב֥וּר טָמְאָ֛ה תְּחַבֵּ֖ל
    וְ/חֶ֥בֶל נִמְרָֽץ־׃
translation:
  text: Rise and go, for this is not the resting place; because it is defiled, it
    brings destruction—indeed, grievous destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for this is not the place of rest.' The Hebrew noun can mean 'rest'
      or 'resting place,' and here likely refers to the land as Israel's place of
      settled repose.
    reason: lexical_alternative
  - marker: b
    text: Or 'it destroys—yes, a severe destruction.' The Hebrew uses a verb and cognate
      noun from the same root for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֣וּמוּ
  chosen: Rise
  alternatives:
  - Get up
  - Arise
  lexicon: HALOT
  rationale: Imperative plural of קום. 'Rise' is concise, natural English and preserves
    the force of a command without sounding archaic like 'Arise.'
- source_word: וּ/לְכ֔וּ
  chosen: and go
  alternatives:
  - and depart
  - and walk
  lexicon: HALOT
  rationale: Imperative plural of הלך with conjunction. In context of expulsion from
    the land, 'go' is broad and idiomatic; 'depart' is possible but slightly more
    interpretive.
- source_word: כִּ֥י לֹא זֹ֖את הַ/מְּנוּחָ֑ה
  chosen: for this is not the resting place
  alternatives:
  - for this is not the place of rest
  - for this is not rest
  lexicon: HALOT
  rationale: מְנוּחָה denotes rest/resting place. Given the demonstrative 'this' and
    the context of land as a place of settled repose, 'the resting place' best captures
    the concrete sense.
- source_word: בַּ/עֲב֥וּר
  chosen: because
  alternatives:
  - on account of
  - for
  lexicon: HALOT
  rationale: Introduces the reason clause. 'Because' is the clearest modern English
    connector here.
- source_word: טָמְאָ֛ה
  chosen: it is defiled
  alternatives:
  - it has become unclean
  - she is defiled
  lexicon: HALOT
  rationale: From טמא, feminine singular, likely referring to the land/resting place.
    English can naturally use impersonal 'it' for the land. 'Defiled' preserves moral/cultic
    force better than merely 'unclean' in this prophetic context.
- source_word: תְּחַבֵּ֖ל
  chosen: it brings destruction
  alternatives:
  - it destroys
  - it ruins
  lexicon: HALOT
  rationale: Piel of חבל can mean ruin, destroy, bring to destruction. With the feminine
    subject ('it' = the defiled land/defilement), 'it brings destruction' reads smoothly
    and leaves the agentive nuance broad.
- source_word: וְ/חֶ֥בֶל
  chosen: indeed, destruction
  alternatives:
  - and destruction
  - with destruction
  - even destruction
  lexicon: HALOT
  rationale: The noun is cognate with the preceding verb and intensifies the statement.
    Rendering with 'indeed' reflects the emphatic/additive force while avoiding a
    wooden repetition.
- source_word: נִמְרָֽץ
  chosen: grievous
  alternatives:
  - violent
  - severe
  - utter
  lexicon: HALOT
  rationale: נמרץ conveys strength/intensity. 'Grievous' fits the prophetic register
    and modifies 'destruction' naturally in English, expressing severity without over-specifying
    the manner.
