theological_decisions:
- issue: Referent of the feminine verbs/adjectives in the causal clause
  chosen_reading: The clause refers to the land/resting place as defiled and therefore
    destructive.
  alternative_readings:
  - The clause refers more abstractly to defilement itself causing destruction.
  - The subject is left deliberately impersonal in English.
  rationale: The feminine forms align naturally with מְנוּחָה ('resting place,' feminine),
    and in Micah's context the land as Israel's place of rest is in view. The English
    keeps 'it' to avoid over-interpretation while still reflecting the likely referent.
- issue: Force of the final phrase וְחבל נמרץ
  chosen_reading: 'An emphatic intensification: ''indeed, grievous destruction.'''
  alternative_readings:
  - '''and painful destruction'''
  - '''with violent destruction'''
  rationale: The Hebrew uses a cognate noun after the verb for emphasis, followed
    by an adjective of intensity. The chosen rendering preserves the rhetorical escalation
    without becoming awkwardly literal.
