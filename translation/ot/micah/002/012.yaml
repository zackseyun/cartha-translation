id: MIC.2.12
reference: Micah 2:12
source:
  edition: WLC
  text: אָסֹ֨ף אֶאֱסֹ֜ף יַעֲקֹ֣ב כֻּלָּ֗/ךְ קַבֵּ֤ץ אֲקַבֵּץ֙ שְׁאֵרִ֣ית יִשְׂרָאֵ֔ל
    יַ֥חַד אֲשִׂימֶ֖/נּוּ כְּ/צֹ֣אן בָּצְרָ֑ה כְּ/עֵ֨דֶר֙ בְּ/ת֣וֹךְ הַ/דָּֽבְר֔/וֹ
    תְּהִימֶ֖נָה מֵ/אָדָֽם׃
translation:
  text: I will surely gather all of you, Jacob; I will surely collect the remnant
    of Israel. Together I will set them like the sheep of Bozrah, like a flock in
    the midst of its pasture; they will be noisy with men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like sheep in a fold.' The Hebrew בָּצְרָה is traditionally read as
      the place name 'Bozrah,' but some take it as related to a word for an enclosure
      or sheepfold.
    reason: lexical_alternative
  - marker: b
    text: Or 'they will be noisy because of people' / 'they will throng with people.'
      The Hebrew expression is difficult.
    reason: alternative_reading
  - marker: c
    text: Hebrew 'men'; here the sense is human beings generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָסֹף אֶאֱסֹף
  chosen: I will surely gather
  alternatives:
  - I will indeed gather
  - I will completely gather
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the action. 'Surely
    gather' preserves the emphatic force without sounding wooden.
- source_word: יַעֲקֹב כֻּלָּךְ
  chosen: all of you, Jacob
  alternatives:
  - all of you, O Jacob
  - all of Jacob
  lexicon: HALOT
  rationale: The singular suffix on 'all of you' addresses Jacob/Israel corporately.
    'All of you, Jacob' keeps the direct address and collective sense.
- source_word: קַבֵּץ אֲקַבֵּץ
  chosen: I will surely collect
  alternatives:
  - I will surely assemble
  - I will surely gather
  lexicon: HALOT
  rationale: A second infinitive absolute + finite verb pair parallels the first clause.
    'Collect' provides slight variation while retaining the sense of assembling a
    scattered people.
- source_word: שְׁאֵרִית יִשְׂרָאֵל
  chosen: the remnant of Israel
  alternatives:
  - the remainder of Israel
  lexicon: HALOT
  rationale: '''Remnant'' is the established and contextually appropriate rendering
    for the surviving/restored portion of the people, carrying the prophetic nuance
    of those left over.'
- source_word: יַחַד
  chosen: Together
  alternatives:
  - altogether
  - as one
  lexicon: HALOT
  rationale: The adverb modifies the act of placing/assembling them and is naturally
    rendered 'Together' in English.
- source_word: אֲשִׂימֶנּוּ
  chosen: I will set them
  alternatives:
  - I will place them
  - I will put them
  lexicon: HALOT
  rationale: Although the form is singular-suffixed in spelling, the sense in context
    is collective, referring to the remnant. English plural 'them' best reflects the
    referent.
- source_word: כְּצֹאן בָּצְרָה
  chosen: like the sheep of Bozrah
  alternatives:
  - like sheep in a fold
  - like the flock of Bozrah
  lexicon: HALOT
  rationale: The consonantal text points to Bozrah, likely the place name. This is
    retained in the main text because of original-language primacy. Since many understand
    a wordplay with 'sheepfold,' that alternative is preserved in a footnote.
- source_word: כְּעֵדֶר בְּתוֹךְ הַדָּבְרוֹ
  chosen: like a flock in the midst of its pasture
  alternatives:
  - like a flock in the midst of its fold
  - like a herd in its grazing land
  lexicon: HALOT
  rationale: דָּבָר here is best taken in the pastoral sense 'pasture/open grazing
    land' rather than the common sense 'word/matter.' 'In the midst of its pasture'
    fits the sheep imagery and parallelism.
- source_word: תְּהִימֶנָה
  chosen: they will be noisy
  alternatives:
  - they will make a din
  - they will resound
  - they will be in tumult
  lexicon: HALOT
  rationale: The verb conveys loud commotion or tumult. In this restoration image,
    the sense is of a crowded, bustling flock/people, not necessarily hostile uproar.
- source_word: מֵאָדָם
  chosen: with men
  alternatives:
  - because of people
  - from mankind
  - with people
  lexicon: HALOT
  rationale: 'The preposition is difficult. ''With men'' most naturally expresses
    the cause/content of the noise: the place is loud because of the multitude of
    people. ''Men'' follows the gender-accurate policy for אָדָם where human beings
    are in view, while an inclusive alternative is footnoted.'
