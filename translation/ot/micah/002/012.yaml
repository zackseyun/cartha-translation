theological_decisions:
- issue: Restoration oracle addressed to Jacob/Israel
  chosen_reading: The verse is rendered as a divine promise of regathering the whole
    of Jacob and the remnant of Israel without narrowing the referent beyond the text.
  alternative_readings:
  - A purely metaphorical promise of spiritual restoration
  - An exclusively end-time reading detached from the historical people Israel
  rationale: The Hebrew directly speaks of Jacob/Israel and uses remnant/restoration
    imagery. The translation preserves that covenantal-national reference without
    importing a later theological system.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
