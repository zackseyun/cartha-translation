theological_decisions:
- issue: Interpretation of the difficult final phrase שׁוּבֵי מִלְחָמָה
  chosen_reading: those returning from war
  alternative_readings:
  - those who shrink from war
  - those turned away from battle
  rationale: 'This is not a major doctrinal issue, but it is a significant interpretive
    crux. The chosen reading follows the most straightforward sense of שוב + מלחמה
    and yields coherent sense in context: even travelers returning from war are robbed
    as though by enemies. Because the phrase is debated, the alternative is preserved
    in a footnote rather than silently excluded, in keeping with the project''s commitment
    to preserve genuine ambiguity where relevant.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
