id: MIC.2.8
reference: Micah 2:8
source:
  edition: WLC
  text: וְ/אֶתְמ֗וּל עַמִּ/י֙ לְ/אוֹיֵ֣ב יְקוֹמֵ֔ם מִ/מּ֣וּל שַׂלְמָ֔ה אֶ֖דֶר תַּפְשִׁט֑וּ/ן
    מֵ/עֹבְרִ֣ים בֶּ֔טַח שׁוּבֵ֖י מִלְחָמָֽה׃
translation:
  text: But lately my people have risen up like an enemy; you strip the robe from
    the garment of those who pass by securely, those returning from war.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'those who shrink from war' / 'those turned away from battle.' The Hebrew
      final phrase is difficult and may describe peaceful noncombatants rather than
      soldiers returning home.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאֶתְמוּל
  chosen: But lately
  alternatives:
  - But yesterday
  - Recently
  lexicon: HALOT
  rationale: The adverb literally refers to 'yesterday' or the recent past, but in
    prophetic discourse it idiomatically means 'recently' or 'of late.' 'But lately'
    preserves the temporal contrast and the adversative force of waw in context.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Straightforward possessive construction; retains covenantal tone.
- source_word: לְאוֹיֵב
  chosen: like an enemy
  alternatives:
  - as an enemy
  - into an enemy
  lexicon: HALOT
  rationale: 'The preposition ל here is best taken predicatively/comparatively with
    the following verb: the people have arisen ''as/like an enemy.'' ''Like an enemy''
    is idiomatic English and avoids overstating ontological transformation.'
- source_word: יְקוֹמֵם
  chosen: have risen up
  alternatives:
  - rises up
  - has set himself up
  lexicon: HALOT
  rationale: The verb קום in this context conveys hostile rising or standing up against.
    Perfective English 'have risen up' fits the prophetic accusation and the temporal
    marker 'lately.'
- source_word: מִמּוּל
  chosen: from
  alternatives:
  - from before
  - 'off'
  lexicon: HALOT
  rationale: In the phrase 'from before/opposite the garment,' the sense is removal
    from the person/clothing. English 'from' communicates the stripping action naturally.
- source_word: שַׂלְמָה
  chosen: robe
  alternatives:
  - cloak
  - mantle
  lexicon: HALOT
  rationale: Refers to an outer garment. 'Robe' distinguishes it from the following
    term and sounds natural in modern English.
- source_word: אֶדֶר
  chosen: garment
  alternatives:
  - cloak
  - splendor
  - ornament
  lexicon: HALOT
  rationale: Though the noun can denote magnificence or a stately covering, in this
    collocation it most plausibly refers to a garment/cloak. Rendering the pair as
    'robe ... garment' preserves the image of stripping clothing without forcing a
    highly technical distinction.
- source_word: תַּפְשִׁטוּן
  chosen: you strip
  alternatives:
  - you tear off
  - you remove
  lexicon: HALOT
  rationale: Hiphil of פשט commonly means to strip off clothing. 'You strip' is direct
    and vivid.
- source_word: מֵעֹבְרִים
  chosen: from those who pass by
  alternatives:
  - from passersby
  - from travelers
  lexicon: HALOT
  rationale: Participle of עבר denotes people passing along. 'Those who pass by' is
    clear and preserves the verbal nuance.
- source_word: בֶּטַח
  chosen: securely
  alternatives:
  - in safety
  - trustingly
  - without fear
  lexicon: HALOT
  rationale: The term denotes security/safety. 'Securely' modifies the passersby naturally
    in English and conveys their unsuspecting state.
- source_word: שׁוּבֵי מִלְחָמָה
  chosen: those returning from war
  alternatives:
  - those turned back from battle
  - those averse to war
  lexicon: HALOT
  rationale: The construct is difficult. The most common reading takes it as people
    returning from war, likely vulnerable travelers whom one would not expect to be
    attacked. This fits the context of predatory injustice. An alternative construal,
    'those who shrink from war' or peaceful noncombatants, is worth preserving in
    a footnote because the Hebrew is debated.
