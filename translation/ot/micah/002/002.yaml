id: MIC.2.2
reference: Micah 2:2
source:
  edition: WLC
  text: וְ/חָמְד֤וּ שָׂדוֹת֙ וְ/גָזָ֔לוּ וּ/בָתִּ֖ים וְ/נָשָׂ֑אוּ וְ/עָֽשְׁקוּ֙ גֶּ֣בֶר
    וּ/בֵית֔/וֹ וְ/אִ֖ישׁ וְ/נַחֲלָתֽ/וֹ׃פ
translation:
  text: They covet fields and seize them, and houses and take them away; they oppress
    a man and his house, a man and his inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rob' / 'take by force' for 'seize.'
    reason: lexical_alternative
  - marker: b
    text: Or 'carry them off' for 'take them away.'
    reason: lexical_alternative
  - marker: c
    text: '''His inheritance'' can refer especially to inherited land or patrimony,
      not merely possessions in general.'
    reason: cultural_note
lexical_decisions:
- source_word: חָמְדוּ
  chosen: covet
  alternatives:
  - desire
  - lust after
  lexicon: HALOT
  rationale: The verb חמד commonly denotes coveting or desiring what belongs to another.
    'Covet' preserves the moral weight of wrongful desire that leads into the acts
    that follow.
- source_word: שָׂדוֹת
  chosen: fields
  alternatives:
  - farms
  - land
  lexicon: HALOT
  rationale: A straightforward rendering of the plural noun for cultivated land parcels.
    'Fields' is natural and sufficiently concrete.
- source_word: גָזָלוּ
  chosen: seize
  alternatives:
  - rob
  - plunder
  - take by force
  lexicon: HALOT
  rationale: The verb conveys violent or wrongful taking. 'Seize' fits the direct
    object 'fields' well in English and preserves the force of dispossession without
    over-specifying the manner.
- source_word: בָתִּים
  chosen: houses
  alternatives:
  - homes
  lexicon: HALOT
  rationale: '''Houses'' is the direct lexical equivalent and keeps the concrete property
    focus of the verse.'
- source_word: נָשָׂאוּ
  chosen: take them away
  alternatives:
  - carry them off
  - take away
  lexicon: HALOT
  rationale: Here נשׂא in context means to carry off or remove after seizure. 'Take
    them away' is idiomatic modern English and communicates forcible appropriation
    of houses.
- source_word: עָשְׁקוּ
  chosen: oppress
  alternatives:
  - defraud
  - extort from
  - exploit
  lexicon: HALOT
  rationale: The verb can include economic oppression or defrauding. 'Oppress' best
    captures the broad social injustice in context, while allowing the property-focused
    objects that follow.
- source_word: גֶּבֶר
  chosen: a man
  alternatives:
  - a strong man
  - a person
  lexicon: HALOT
  rationale: Although גבר can emphasize a male individual or strong man, here it functions
    as a singular victim parallel to אישׁ. Per the gender-accurate policy, 'a man'
    is preferred over gender-neutral smoothing.
- source_word: בֵיתוֹ
  chosen: his house
  alternatives:
  - his household
  - his home
  lexicon: HALOT
  rationale: The noun may denote either the physical house or household. In this verse's
    sequence of seized fields and houses, 'his house' preserves the property dimension
    while still implying the family sphere.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a person
  - each man
  lexicon: HALOT
  rationale: The parallelism with גבר supports a second singular representative victim.
    'A man' maintains the Hebrew's masculine singular form in line with the translation
    philosophy.
- source_word: נַחֲלָתוֹ
  chosen: his inheritance
  alternatives:
  - his heritage
  - his property
  - his allotted land
  lexicon: HALOT
  rationale: נחלה often refers to inherited land or patrimony. 'Inheritance' preserves
    both the legal and covenantal resonance better than the flatter 'property.'
