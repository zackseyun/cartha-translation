theological_decisions:
- issue: Gendered singular nouns גבר and איש
  chosen_reading: a man ... a man
  alternative_readings:
  - a person ... a person
  - people ... their inheritance
  rationale: The Hebrew uses masculine singular nouns in representative parallelism.
    Following the doctrine's gender-accurate policy, the translation retains 'man'
    rather than neutralizing to 'person' or pluralizing.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
