theological_decisions:
- issue: Interpretation of the difficult phrase לְשׁוֹבֵב
  chosen_reading: to the apostate
  alternative_readings:
  - to a rebel
  - to the captor/one who turns back
  rationale: The Hebrew is lexically and syntactically difficult. The chosen rendering
    follows the likely adjectival/substantival sense from שובב, 'one who turns away/back,'
    yielding 'apostate' or 'rebel.' Because the phrase is genuinely ambiguous, the
    main text adopts one plausible reading while preserving alternatives in a footnote,
    in keeping with the instruction to preserve interpretive tension rather than over-resolve
    it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
