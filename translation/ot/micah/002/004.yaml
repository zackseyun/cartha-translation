id: MIC.2.4
reference: Micah 2:4
source:
  edition: WLC
  text: בַּ/יּ֨וֹם הַ/ה֜וּא יִשָּׂ֧א עֲלֵי/כֶ֣ם מָשָׁ֗ל וְ/נָהָ֨ה נְהִ֤י נִֽהְיָה֙
    אָמַר֙ שָׁד֣וֹד נְשַׁדֻּ֔נוּ חֵ֥לֶק עַמִּ֖/י יָמִ֑יר אֵ֚יךְ יָמִ֣ישׁ לִ֔/י לְ/שׁוֹבֵ֥ב
    שָׂדֵ֖י/נוּ יְחַלֵּֽק׃
translation:
  text: On that day one will take up a taunt against you and lament a lament, saying,
    “We are utterly ruined! He changes the portion of my people. How he removes it
    from me! To the apostate he divides our fields.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and wail a wailing,' or 'and chant a dirge.' The Hebrew repeats cognate
      mourning terms for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to the apostate'; the phrase may also be understood as 'to a rebel'
      or, less likely, 'to the captor/one who turns back.'
    reason: alternative_reading
lexical_decisions:
- source_word: יִשָּׂא ... מָשָׁל
  chosen: will take up a taunt
  alternatives:
  - will raise a proverb
  - will utter a byword
  lexicon: HALOT
  rationale: The idiom 'take up a mashal' often introduces a stylized saying, proverb,
    taunt, or lament. In this judgment context directed 'against you,' 'taunt' best
    captures the derisive, public nature of the speech without losing the formal idiom
    'take up'.
- source_word: וְנָהָה נְהִי נִהְיָה
  chosen: and lament a lament
  alternatives:
  - and wail a wailing
  - and chant a dirge
  lexicon: HALOT
  rationale: The cluster intensifies mourning language. 'Lament a lament' preserves
    the Hebrew repetition and solemnity better than a flattened single verb. A more
    idiomatic English option like 'chant a dirge' is possible, but the chosen rendering
    keeps the rhetorical force and lexical transparency.
- source_word: שָׁדוֹד נְשַׁדֻּנוּ
  chosen: We are utterly ruined
  alternatives:
  - We are completely devastated
  - We are plundered—yes, plundered
  lexicon: HALOT
  rationale: The infinitive absolute plus finite/passive form intensifies the verbal
    idea. 'Utterly ruined' communicates the emphatic devastation in natural English.
    'Plundered' is lexically close, but the broader context includes dispossession,
    so 'ruined' better carries the totality of the loss.
- source_word: חֵלֶק עַמִּי
  chosen: the portion of my people
  alternatives:
  - my people's share
  - the inheritance of my people
  lexicon: HALOT
  rationale: '''Portion'' is the most direct rendering of חֵלֶק and fits land-allotment
    language. ''Inheritance'' is interpretively possible, but the text does not use
    the more explicit inheritance term; ''portion'' preserves the lexical specificity.'
- source_word: יָמִיר
  chosen: He changes
  alternatives:
  - He exchanges
  - He transfers
  lexicon: HALOT
  rationale: The Hiphil of מוּר commonly means to change or exchange. 'Changes' is
    broad and natural; the object is the people's allotted portion, implying transfer
    of possession without over-specifying the mechanism.
- source_word: אֵיךְ יָמִישׁ לִי
  chosen: How he removes it from me
  alternatives:
  - How he takes it away from me
  - How it departs from me
  lexicon: HALOT
  rationale: The exclamatory אֵיךְ introduces shocked complaint. The Hiphil of מוּשׁ
    here conveys causing removal. Supplying 'it' in English is necessary for clarity,
    referring back to the portion/land.
- source_word: לְשׁוֹבֵב
  chosen: to the apostate
  alternatives:
  - to the rebel
  - to the turncoat
  - to the captor
  lexicon: HALOT
  rationale: This form is difficult and debated. Taken from שובב, it can denote one
    who turns away/back, hence 'apostate' or 'rebel.' The immediate sense is that
    the land is handed over to an unfaithful or hostile party. 'Apostate' preserves
    the moral-religious nuance of turning away, while a footnote preserves the alternative
    understanding.
- source_word: שָׂדֵינוּ יְחַלֵּק
  chosen: he divides our fields
  alternatives:
  - he apportions our fields
  - he parcels out our fields
  lexicon: HALOT
  rationale: The verb means divide/apportion. 'Divides our fields' is straightforward
    and vivid, fitting the land-seizure context.
