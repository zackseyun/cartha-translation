id: MIC.2.5
reference: Micah 2:5
source:
  edition: WLC
  text: לָ/כֵן֙ לֹֽא יִֽהְיֶ֣ה לְ/ךָ֔ מַשְׁלִ֥יךְ חֶ֖בֶל בְּ/גוֹרָ֑ל בִּ/קְהַ֖ל יְהוָֽה־׃
translation:
  text: Therefore you will have no one to cast the measuring line by lot in the assembly of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'line,' 'cord,' or 'allotment line.' The Hebrew term refers to the cord used in measuring out inherited land.
    reason: lexical_alternative
  - marker: b
    text: That is, in the gathered covenant community when land is apportioned.
    reason: cultural_note
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks a consequential judgment flowing from the preceding accusation and sentence; 'Therefore' preserves the prophetic inferential force in natural English.
- source_word: לֹא יִהְיֶה לְךָ
  chosen: you will have no one
  alternatives:
  - there will not be for you
  - you will not have
  lexicon: HALOT
  rationale: The Hebrew is literally 'there will not be for you,' addressed to a masculine singular referent. 'You will have no one' is idiomatic English that preserves the direct second-person judgment.
- source_word: מַשְׁלִיךְ
  chosen: to cast
  alternatives:
  - throwing
  - one who casts
  lexicon: HALOT
  rationale: The participle functions substantivally for a person performing the action. 'To cast' after 'no one' gives clear English while retaining the image of casting lots.
- source_word: חֶבֶל
  chosen: the measuring line
  alternatives:
  - line
  - cord
  - allotment line
  lexicon: HALOT
  rationale: In land-allotment contexts חבל can denote a measuring cord or boundary line. 'Measuring line' makes the allotment imagery explicit without over-paraphrasing.
- source_word: בְּגוֹרָל
  chosen: by lot
  alternatives:
  - by allotment
  - in the lot
  lexicon: HALOT
  rationale: The phrase evokes distribution of land by lot. 'By lot' is the standard concise English rendering and preserves the juridical-allotment sense.
- source_word: בִּקְהַל יְהוָה
  chosen: in the assembly of the LORD
  alternatives:
  - in the congregation of the LORD
  - among the assembly of the LORD
  lexicon: HALOT
  rationale: קהל denotes the gathered covenant community. 'Assembly' is readable modern English and preserves the formal communal setting. יְהוָה is rendered 'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
