theological_decisions:
- issue: Referent of the second-person singular judgment
  chosen_reading: Addressed to the dispossessed oppressor/group represented as a singular 'you,' announcing exclusion from future covenant land allotment.
  alternative_readings:
  - A more general statement that no one from them will participate in the allotment
  - An ironic declaration against false prophets or leaders specifically
  rationale: The singular pronoun and immediate context of judgment on land-grabbers support a direct address. The translation keeps the singular 'you' without over-specifying the exact subgroup beyond what the context warrants.
