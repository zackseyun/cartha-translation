theological_decisions:
- issue: Referent of 'my' in 'my people' and 'my splendor'
  chosen_reading: The speaker is the LORD, so 'my people' and 'my splendor' are retained
    as divine first-person speech.
  alternative_readings:
  - '''my splendor'' understood as the people''s dignity given by God rather than
    God''s own glory directly'
  rationale: In Micah's prophetic discourse, first-person divine speech is active
    in the surrounding context. Retaining 'my' without interpretive expansion preserves
    the text's theological force while allowing the phrase to denote the dignity/glory
    God bestowed on the children.
  doctrine_reference: Preserve theological tension rather than resolve it.
