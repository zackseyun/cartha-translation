id: MIC.2.9
reference: Micah 2:9
source:
  edition: WLC
  text: נְשֵׁ֤י עַמִּ/י֙ תְּגָ֣רְשׁ֔וּ/ן מִ/בֵּ֖ית תַּֽעֲנֻגֶ֑י/הָ מֵ/עַל֙ עֹֽלָלֶ֔י/הָ
    תִּקְח֥וּ הֲדָרִ֖/י לְ/עוֹלָֽם׃
translation:
  text: You drive the women of my people out from their delightful houses; from their
    children you take away my splendor forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wives of my people.' The Hebrew can refer either to women generally
      or to wives specifically.
    reason: lexical_alternative
  - marker: b
    text: Or 'my glory' for 'my splendor.' The Hebrew term can denote splendor, glory,
      majesty, or honor.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְשֵׁי עַמִּי
  chosen: the women of my people
  alternatives:
  - the wives of my people
  lexicon: HALOT
  rationale: נְשֵׁי is the construct plural of אִשָּׁה and can mean either 'women'
    or 'wives.' In this prophetic accusation, the broader social class of vulnerable
    women is likely in view rather than specifically married status, so 'the women
    of my people' best fits the context.
- source_word: תְּגָרְשׁוּן
  chosen: you drive out
  alternatives:
  - you cast out
  - you expel
  lexicon: HALOT
  rationale: From גרשׁ in the Piel, conveying forceful removal or expulsion. 'Drive
    out' preserves the coercive sense in natural English.
- source_word: מִבֵּית תַּעֲנֻגֶיהָ
  chosen: from their delightful houses
  alternatives:
  - from their pleasant houses
  - from the house of her delights
  lexicon: HALOT
  rationale: בַּיִת is 'house/home.' תַּעֲנֻגִים denotes delights, pleasures, or pleasant
    things. The 3fs suffix is distributive/collective in context, referring back to
    the women as a class. 'Their delightful houses' communicates homes characterized
    by comfort and security without over-literal awkwardness.
- source_word: מֵעַל עֹלָלֶיהָ
  chosen: from their children
  alternatives:
  - from upon their little children
  - from their infants
  lexicon: HALOT
  rationale: עוֹלָל refers to small children/infants. The preposition מֵעַל is literally
    'from upon,' but idiomatically here indicates removal from the children. 'From
    their children' is clear and preserves the sense.
- source_word: תִּקְחוּ
  chosen: you take away
  alternatives:
  - you take
  - you seize
  lexicon: HALOT
  rationale: לקח commonly means 'take'; in this context of deprivation, 'take away'
    makes the harmful action explicit in idiomatic English.
- source_word: הֲדָרִי
  chosen: my splendor
  alternatives:
  - my glory
  - my majesty
  - my honor
  lexicon: HALOT
  rationale: הָדָר denotes splendor, majesty, or honor. 'My splendor' preserves the
    elevated register and avoids importing later technical theological associations
    that 'glory' can carry, though 'glory' remains a viable alternative.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - permanently
  lexicon: HALOT
  rationale: עוֹלָם here expresses enduring or indefinite duration. 'Forever' is the
    most natural modern English rendering in prophetic denunciation.
