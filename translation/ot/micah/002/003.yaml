id: MIC.2.3
reference: Micah 2:3
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּ֚ה אָמַ֣ר יְהוָ֔ה הִנְ/נִ֥י חֹשֵׁ֛ב עַל הַ/מִּשְׁפָּחָ֥ה הַ/זֹּ֖את
    רָעָ֑ה אֲ֠שֶׁר לֹֽא תָמִ֨ישׁוּ מִ/שָּׁ֜ם צַוְּארֹֽתֵי/כֶ֗ם וְ/לֹ֤א תֵֽלְכוּ֙ רוֹמָ֔ה
    כִּ֛י עֵ֥ת רָעָ֖ה הִֽיא־־׃
translation:
  text: 'Therefore, this is what the LORD says: Look, I am planning disaster against
    this clan, from which you will not remove your necks, and you will not walk haughtily,
    for it is an evil time.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'family.' The Hebrew מִשְׁפָּחָה can denote a household, family line,
      or larger clan-group.
    reason: lexical_alternative
  - marker: b
    text: Literally 'from there you will not remove your necks,' an image of being
      unable to escape an imposed yoke or burden.
    reason: cultural_note
  - marker: c
    text: Or 'you will not walk proudly' / 'with head held high.'
    reason: lexical_alternative
  - marker: d
    text: The Hebrew repeats the word רָעָה ('evil/disaster') earlier in the verse,
      creating a wordplay between the announced judgment and the coming time.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Standard inferential conjunction introducing YHWH's response to the injustices
    described in the preceding context.
- source_word: כֹּה אָמַר יְהוָה
  chosen: this is what the LORD says
  alternatives:
  - thus says the LORD
  lexicon: HALOT
  rationale: Natural modern English for the prophetic messenger formula. יְהוָה follows
    the doctrinal default 'the LORD'.
- source_word: הִנְנִי
  chosen: Look, I am
  alternatives:
  - Behold, I am
  - See, I am
  lexicon: HALOT
  rationale: Introduces emphatic divine announcement. 'Look' preserves the deictic
    force in readable modern English better than archaic 'Behold.'
- source_word: חֹשֵׁב
  chosen: planning
  alternatives:
  - devising
  - thinking
  lexicon: HALOT
  rationale: Echoes the same root used in the previous verse for the wicked who 'devise'
    evil; here YHWH in turn 'plans' judgment. 'Planning' is idiomatic and preserves
    the deliberate sense.
- source_word: עַל הַמִּשְׁפָּחָה הַזֹּאת
  chosen: against this clan
  alternatives:
  - against this family
  - against this household
  - against this people-group
  lexicon: HALOT
  rationale: מִשְׁפָּחָה can mean family, clan, or social grouping. In this judgment
    context it likely refers to the broader kin-group/community rather than a single
    household. 'Clan' best captures the collective sense.
- source_word: רָעָה
  chosen: disaster
  alternatives:
  - evil
  - calamity
  lexicon: HALOT
  rationale: When predicated of YHWH's announced judgment, רָעָה refers to calamity/disaster
    rather than moral evil. 'Disaster' avoids implying that God commits moral evil.
- source_word: אֲשֶׁר לֹא תָמִישׁוּ מִשָּׁם צַוְּארֹתֵיכֶם
  chosen: from which you will not remove your necks
  alternatives:
  - from which you will not take your necks away
  - from which you will not free your necks
  lexicon: HALOT
  rationale: The image is of an imposed yoke or burden from which they cannot withdraw
    their necks. A relatively literal rendering preserves the metaphor and its force.
- source_word: וְלֹא תֵלְכוּ רוֹמָה
  chosen: and you will not walk haughtily
  alternatives:
  - and you will not walk upright
  - and you will not go with head held high
  - and you will not walk proudly
  lexicon: HALOT
  rationale: רוֹמָה literally denotes height/exaltation; in context it idiomatically
    conveys proud or lofty bearing. 'Walk haughtily' preserves the metaphorical sense
    of arrogant self-exaltation.
- source_word: כִּי עֵת רָעָה הִיא
  chosen: for it is an evil time
  alternatives:
  - for it is a time of disaster
  - for it is a bad time
  lexicon: HALOT
  rationale: The phrase summarizes the coming period of judgment. 'Evil time' is more
    literal and preserves the rhetorical parallel with רָעָה earlier in the verse,
    though in English it denotes a calamitous time rather than moral evil.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's doctrinal default for the divine name.
