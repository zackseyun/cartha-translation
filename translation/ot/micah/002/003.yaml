theological_decisions:
- issue: Rendering רָעָה in relation to divine action
  chosen_reading: Rendered as 'disaster' in the first occurrence and 'evil time' in
    the closing phrase, with the latter understood as a calamitous time of judgment.
  alternative_readings:
  - '''evil'' in both places'
  - '''calamity'' in both places'
  rationale: The Hebrew repeats רָעָה, creating deliberate wordplay with the people's
    evil and the disaster YHWH plans. English must avoid suggesting moral evil in
    God while still preserving the lexical connection as much as possible. Using 'disaster'
    for the planned judgment and 'evil time' at the end retains some of the repetition
    without making an unorthodox theological claim about God's moral character.
  doctrine_reference: Translation philosophy §3; Affirmations (historic orthodoxy)
