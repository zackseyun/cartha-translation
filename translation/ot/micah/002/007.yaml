theological_decisions:
- issue: Whether רוּחַ יְהוָה should be rendered impersonally ('patience/temper of the LORD') or personally ('Spirit of the LORD')
  chosen_reading: Spirit of Yahweh
  alternative_readings:
  - patience of the LORD
  - temper of the LORD
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: Translation philosophy §1, §3; Contested terms table for יְהוָה
