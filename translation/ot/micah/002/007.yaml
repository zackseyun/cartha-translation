id: MIC.2.7
reference: Micah 2:7
source:
  edition: WLC
  text: הֶ/אָמ֣וּר בֵּֽית יַעֲקֹ֗ב הֲ/קָצַר֙ ר֣וּחַ יְהוָ֔ה אִם אֵ֖לֶּה מַעֲלָלָ֑י/ו הֲ/ל֤וֹא דְבָרַ֨/י יֵיטִ֔יבוּ עִ֖ם הַ/יָּשָׁ֥ר הוֹלֵֽךְ־־׃
translation:
  text: Should it be said, O house of Jacob, “Is the Spirit of Yahweh impatient? Are these his deeds?” Do not my words do good to the one who walks uprightly?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Is the Spirit of the LORD shortened?' The Hebrew idiom can also suggest, 'Is the LORD's patience short?'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶאָמ֣וּר
  chosen: Should it be said
  alternatives:
  - Is it being said
  - Shall it be said
  lexicon: HALOT
  rationale: The form introduces a rhetorical quotation or reported saying. English idiom is best captured by an impersonal passive question, preserving the prophetic challenge without over-paraphrase.
- source_word: בֵּית יַעֲקֹב
  chosen: O house of Jacob
  alternatives:
  - house of Jacob
  lexicon: HALOT
  rationale: A direct vocative fits the prophetic address. 'Jacob' is transliterated as a personal name per translation philosophy.
- source_word: הֲקָצַר רוּחַ יְהוָה
  chosen: Has the Spirit of the LORD become impatient
  alternatives:
  - Is the Spirit of the LORD shortened
  - Has the Spirit of the LORD become constrained
  - Is the patience of the LORD short
  lexicon: HALOT
  rationale: קצר with רוח literally suggests 'shortened spirit,' an idiom for impatience or limited forbearance. Rendering it idiomatically as 'become impatient' communicates the sense in natural English. רוּחַ is taken as 'Spirit' rather than merely 'breath' or 'temper' because the construct with YHWH most naturally refers to the LORD's Spirit, while still carrying the idiomatic force of disposition.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: אִם אֵלֶּה מַעֲלָלָיו
  chosen: Are these his deeds
  alternatives:
  - Are these his actions
  - Would he do such things
  lexicon: HALOT
  rationale: מַעֲלָלִים refers to deeds or actions. The clause is rendered as a rhetorical question parallel to the previous one, preserving the challenge to the audience's accusation against God.
- source_word: הֲלוֹא
  chosen: Do not
  alternatives:
  - Do not indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Do not' preserves the interrogative force in smooth English.
- source_word: דְבָרַי
  chosen: my words
  alternatives:
  - my word
  - what I say
  lexicon: HALOT
  rationale: The plural is retained because the Hebrew is plural and refers to the LORD's spoken messages generally.
- source_word: יֵיטִיבוּ
  chosen: do good
  alternatives:
  - benefit
  - bring good
  lexicon: HALOT
  rationale: The Hiphil of יטב here conveys doing good or benefiting. 'Do good' is concise and preserves the moral and practical sense.
- source_word: עִם הַיָּשָׁר הוֹלֵךְ
  chosen: to the one who walks uprightly
  alternatives:
  - with him who walks uprightly
  - for the upright walker
  - to the upright one who walks
  lexicon: HALOT
  rationale: The phrase describes a person characterized by upright conduct. 'The one who walks uprightly' is natural English and preserves the participial sense of ongoing manner of life.
