theological_decisions:
- issue: Meaning of לְאֵל in the final clause
  chosen_reading: idiomatic 'power' rather than a reference to God/god
  alternative_readings:
  - because their hand is their god
  - because God is with their hand/power
  rationale: 'In context the clause explains why they act at daybreak: they possess
    the ability to carry out their schemes. Reading אֵל as ''power'' is a recognized
    Hebrew usage and best fits the immediate logic. The alternative theological reading
    that their hand is their god is possible rhetorically but is less direct in this
    syntax and is better preserved in a footnote rather than adopted in the main text.'
  doctrine_reference: Preserve theological tension rather than resolve it; render
    one in the main text and preserve the alternative in a footnote where ambiguity
    is genuine.
