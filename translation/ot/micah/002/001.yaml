id: MIC.2.1
reference: Micah 2:1
source:
  edition: WLC
  text: ה֧וֹי חֹֽשְׁבֵי אָ֛וֶן וּ/פֹ֥עֲלֵי רָ֖ע עַל מִשְׁכְּבוֹתָ֑/ם בְּ/א֤וֹר הַ/בֹּ֨קֶר֙
    יַעֲשׂ֔וּ/הָ כִּ֥י יֶשׁ לְ/אֵ֖ל יָדָֽ/ם־־־׃
translation:
  text: Woe to those who devise wickedness and work out evil on their beds! At the
    light of morning they do it, because it is in the power of their hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'because their hand is their god,' taking 'god' as a figurative description
      of their self-exalting power.
    reason: alternative_reading
lexical_decisions:
- source_word: הוֹי
  chosen: Woe
  alternatives:
  - Ah
  - Alas
  lexicon: HALOT
  rationale: Prophetic interjection introducing denunciation or lament. 'Woe' best
    preserves the oracular force in English.
- source_word: חֹשְׁבֵי
  chosen: those who devise
  alternatives:
  - those who plan
  - those who think up
  lexicon: HALOT
  rationale: Participle of חשב here denotes intentional planning or scheming, not
    mere thinking. 'Devise' captures deliberate plotting.
- source_word: אָוֶן
  chosen: wickedness
  alternatives:
  - trouble
  - iniquity
  - evil
  lexicon: HALOT
  rationale: אָוֶן can denote trouble, wrongdoing, or iniquity. In parallel with 'evil'
    in the next colon, 'wickedness' avoids redundancy while preserving moral evil.
- source_word: וּפֹעֲלֵי רָע
  chosen: and work out evil
  alternatives:
  - and do evil
  - and practice evil
  lexicon: HALOT
  rationale: The participial phrase parallels 'devise wickedness' and emphasizes carrying
    plans into action. 'Work out evil' preserves the progression from planning to
    execution.
- source_word: עַל מִשְׁכְּבוֹתָם
  chosen: on their beds
  alternatives:
  - upon their beds
  - in their beds
  lexicon: HALOT
  rationale: Literal spatial rendering fits the image of nighttime plotting. 'On their
    beds' is natural and close to the Hebrew preposition.
- source_word: בְּאוֹר הַבֹּקֶר
  chosen: At the light of morning
  alternatives:
  - At dawn
  - In the morning light
  lexicon: HALOT
  rationale: The Hebrew is more vivid than simply 'in the morning'; it evokes first
    light. 'At the light of morning' preserves that imagery.
- source_word: יַעֲשׂוּהָ
  chosen: they do it
  alternatives:
  - they carry it out
  - they accomplish it
  lexicon: HALOT
  rationale: The feminine suffix likely refers back to the planned wickedness/evil
    as a conceived scheme. 'They do it' is concise and faithful; the object is represented
    without over-specifying.
- source_word: כִּי יֶשׁ לְאֵל יָדָם
  chosen: because it is in the power of their hand
  alternatives:
  - because their hand has power
  - because it is in their power
  - because their god is their hand
  lexicon: HALOT
  rationale: The idiom most naturally means they have the power to do so. Rendering
    אֵל here as 'power' fits Hebrew idiom and context better than the less likely
    reading 'god.' 'In the power of their hand' preserves the hand imagery while remaining
    intelligible.
