theological_decisions:
- issue: Rendering of prophetic verb נטף in an ironic denunciation context
  chosen_reading: preach / preacher
  alternative_readings:
  - prophesy / prophet
  rationale: The verse mocks the kind of religious speaker the people prefer. 'Preach'
    is accessible modern English and captures public religious proclamation without
    implying true prophetic authority. Because the Hebrew verb is a known prophetic
    term, the alternative 'prophesy' is preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §§1, 3, 6
