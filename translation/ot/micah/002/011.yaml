id: MIC.2.11
reference: Micah 2:11
source:
  edition: WLC
  text: לוּ אִ֞ישׁ הֹלֵ֥ךְ ר֨וּחַ֙ וָ/שֶׁ֣קֶר כִּזֵּ֔ב אַטִּ֣ף לְ/ךָ֔ לַ/יַּ֖יִן וְ/לַ/שֵּׁכָ֑ר
    וְ/הָיָ֥ה מַטִּ֖יף הָ/עָ֥ם הַ/זֶּֽה־׃
translation:
  text: If a man should go about with wind and falsehood, lying, ‘I will preach to
    you of wine and strong drink,’ he would be the preacher for this people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “I will prophesy to you of wine and strong drink … he
      would be the prophet for this people.” The Hebrew verb is the same in both clauses
      and is often used for prophetic speech, here with biting irony.
    reason: lexical_alternative
lexical_decisions:
- source_word: לוּ
  chosen: If
  alternatives:
  - If only
  - Suppose
  lexicon: HALOT
  rationale: Introduces a hypothetical or conditional scenario. In this context a
    simple conditional 'If' best fits the satire of the verse without adding the wish
    nuance of 'if only.'
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: The Hebrew is singular masculine. Per the translation philosophy, gender-accurate
    rendering is preferred where the source uses masculine generic language. Here
    'a man' preserves the form and rhetorical force.
- source_word: הֹלֵךְ רוּחַ וָשֶׁקֶר
  chosen: should go about with wind and falsehood
  alternatives:
  - walk in wind and falsehood
  - goes after wind and lies
  - is a windbag and liar
  lexicon: HALOT
  rationale: The idiom is difficult. 'Wind' conveys emptiness or insubstantiality,
    and 'falsehood' names deceit. 'Go about with wind and falsehood' preserves the
    imagery without over-paraphrasing into an interpretive idiom like 'windbag.'
- source_word: כִּזֵּב
  chosen: lying
  alternatives:
  - and lie
  - deceiving
  lexicon: HALOT
  rationale: A participial or verbal idea of speaking falsely. 'Lying' works smoothly
    with the preceding description and keeps the deceit explicit.
- source_word: אַטִּף
  chosen: I will preach
  alternatives:
  - I will prophesy
  - I will drip forth words
  lexicon: HALOT
  rationale: The verb נטף is used in Micah for prophetic speech, often ironically.
    'Preach' communicates public religious speech in readable English, while the footnote
    preserves the more literal/technical alternative 'prophesy.'
- source_word: לְךָ
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: Direct object of the promised speech addressed to the audience. 'To you'
    is the most natural English rendering.
- source_word: לַיַּיִן וְלַשֵּׁכָר
  chosen: of wine and strong drink
  alternatives:
  - about wine and beer
  - for wine and liquor
  lexicon: HALOT
  rationale: The preposition with these nouns indicates the content or theme of the
    message. 'Wine and strong drink' is a standard, accurate rendering; 'strong drink'
    preserves the broader category beyond wine.
- source_word: וְהָיָה מַטִּיף
  chosen: he would be the preacher
  alternatives:
  - he would be the one to preach
  - he would be the prophet
  lexicon: HALOT
  rationale: 'The clause gives the result of the hypothetical: such a deceiver would
    suit the people as their speaker. Using ''preacher'' maintains the verbal link
    with the earlier ''I will preach'' and preserves the irony.'
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this people here
  - these people
  lexicon: HALOT
  rationale: '''This people'' is slightly more formal but closely reflects the Hebrew
    singular collective and carries prophetic rebuke better than the flatter ''these
    people.'''
