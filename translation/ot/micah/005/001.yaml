id: MIC.5.1
reference: Micah 5:1
source:
  edition: WLC
  text: וְ/אַתָּ֞ה בֵּֽית לֶ֣חֶם אֶפְרָ֗תָה צָעִיר֙ לִֽ/הְיוֹת֙ בְּ/אַלְפֵ֣י יְהוּדָ֔ה
    מִמְּ/ךָ֙ לִ֣/י יֵצֵ֔א לִֽ/הְי֥וֹת מוֹשֵׁ֖ל בְּ/יִשְׂרָאֵ֑ל וּ/מוֹצָאֹתָ֥י/ו מִ/קֶּ֖דֶם
    מִ/ימֵ֥י עוֹלָֽם־׃
translation:
  text: But you, Bethlehem Ephrathah, small among the clans of Judah, from you one
    will come out for me to be ruler in Israel, whose goings forth are from of old,
    from the days of eternity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'too small to be among the clans of Judah'; literally, 'little among
      the thousands of Judah.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'whose origins are from ancient times, from days of old.' The Hebrew
      can also be understood more strongly as pointing to existence 'from everlasting.'
    reason: alternative_reading
lexical_decisions:
- source_word: בֵּית לֶחֶם אֶפְרָתָה
  chosen: Bethlehem Ephrathah
  alternatives:
  - Bethlehem Ephrath
  - Bethlehem of Ephrathah
  lexicon: HALOT
  rationale: Transliterates the place name and retains אֶפְרָתָה as the identifying
    epithet to distinguish this Bethlehem from others. Keeping both names reflects
    the Hebrew directly and preserves the prophetic specificity.
- source_word: צָעִיר לִהְיוֹת בְּאַלְפֵי יְהוּדָה
  chosen: small among the clans of Judah
  alternatives:
  - too small to be among the clans of Judah
  - little among the thousands of Judah
  lexicon: HALOT
  rationale: צָעִיר means 'small/little.' אַלְפֵי can literally be 'thousands,' but
    in tribal-administrative contexts commonly refers to clan groupings. 'Among the
    clans of Judah' communicates the social-political sense more clearly in modern
    English while staying close to the Hebrew.
- source_word: מִמְּךָ לִי יֵצֵא
  chosen: from you one will come out for me
  alternatives:
  - from you will come forth for me
  - out of you shall come to me
  lexicon: HALOT
  rationale: יָצָא is rendered with the concrete 'come out'/'come forth.' 'For me'
    preserves לִי straightforwardly, indicating divine commissioning or relation without
    over-interpreting it.
- source_word: לִהְיוֹת מוֹשֵׁל בְּיִשְׂרָאֵל
  chosen: to be ruler in Israel
  alternatives:
  - to be ruler over Israel
  - to rule in Israel
  lexicon: HALOT
  rationale: מוֹשֵׁל denotes one who rules/governs. 'Ruler in Israel' follows the
    preposition ב closely; 'over Israel' is possible idiomatic English, but 'in Israel'
    better preserves the Hebrew wording while remaining natural enough.
- source_word: מוֹצָאֹתָיו
  chosen: whose goings forth
  alternatives:
  - whose origins
  - whose comings forth
  lexicon: HALOT
  rationale: The noun can denote 'goings out,' 'goings forth,' or by extension 'origin.'
    Because the phrase is theologically contested, the main text keeps the more formally
    transparent 'goings forth,' while preserving 'origins' in a footnote.
- source_word: מִקֶּדֶם
  chosen: from of old
  alternatives:
  - from ancient times
  - from the east/foretime
  lexicon: HALOT
  rationale: In temporal contexts קֶדֶם commonly means ancient time or former days.
    'From of old' is concise, idiomatic biblical English that preserves the temporal
    sense without forcing a stronger metaphysical claim.
- source_word: מִימֵי עוֹלָם
  chosen: from the days of eternity
  alternatives:
  - from ancient days
  - from days of old
  - from everlasting
  lexicon: HALOT
  rationale: עוֹלָם can denote long duration, antiquity, or eternity depending on
    context. Given the messianic and theologically weighty context, 'days of eternity'
    preserves the full semantic range and tension better than flattening it to merely
    'ancient days' or resolving it fully as 'everlasting'.
