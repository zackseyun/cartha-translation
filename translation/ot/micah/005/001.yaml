theological_decisions:
- issue: Whether the final clause should be rendered in a way that explicitly asserts
    eternal preexistence or more modestly ancient origin
  chosen_reading: Render מוֹצָאֹתָיו מִקֶּדֶם מִימֵי עוֹלָם as 'whose goings forth
    are from of old, from the days of eternity'
  alternative_readings:
  - whose origins are from ancient times, from days of old
  - whose origin is from of old, from everlasting
  rationale: The Hebrew permits a range from ancient/historic origin language to stronger
    eternal-preexistence language. In keeping with the translation philosophy, the
    rendering preserves the theological tension rather than collapsing it. This avoids
    understating a text long read christologically while also avoiding importing a
    dogmatic conclusion more explicit than the Hebrew itself.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it
