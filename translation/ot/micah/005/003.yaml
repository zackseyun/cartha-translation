id: MIC.5.3
reference: Micah 5:3
source:
  edition: WLC
  text: וְ/עָמַ֗ד וְ/רָעָה֙ בְּ/עֹ֣ז יְהוָ֔ה בִּ/גְא֕וֹן שֵׁ֖ם יְהוָ֣ה אֱלֹהָ֑י/ו
    וְ/יָשָׁ֕בוּ כִּֽי עַתָּ֥ה יִגְדַּ֖ל עַד אַפְסֵי אָֽרֶץ־־־׃
translation:
  text: And he will stand and shepherd in the strength of the LORD, in the majesty
    of the name of the LORD his God. And they will dwell secure, for now he will be
    great to the ends of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And they will live securely.' The Hebrew verb literally means 'dwell'
      or 'sit,' with security implied by the context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'for now'; some translations render this 'for then' to smooth the
      prophetic sequence, but the Hebrew adverb is 'now.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְעָמַד
  chosen: And he will stand
  alternatives:
  - And he shall stand
  - And he will arise
  lexicon: HALOT
  rationale: The verb עמד literally means 'stand.' In this royal/shepherd context
    it conveys taking one's place or remaining established in rule. 'Will stand' preserves
    the concrete image and avoids over-interpreting it as merely 'arise' or 'take
    his stand.'
- source_word: וְרָעָה
  chosen: and shepherd
  alternatives:
  - and feed
  - and tend
  lexicon: HALOT
  rationale: רעה in the Qal commonly means to pasture, tend, or shepherd. Given the
    ruler imagery in the surrounding context, 'shepherd' best preserves both the pastoral
    and royal nuance better than the flatter 'feed.'
- source_word: בְּעֹז יְהוָה
  chosen: in the strength of the LORD
  alternatives:
  - by the strength of the LORD
  - with the strength of the LORD
  lexicon: HALOT
  rationale: עֹז denotes strength or might. The preposition ב here is well rendered
    'in,' expressing the sphere or means of his shepherding. YHWH is rendered 'the
    LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered 'the LORD' in keeping with the project's
    stated default for יְהוָה.
- source_word: בִּגְאוֹן שֵׁם יְהוָה אֱלֹהָיו
  chosen: in the majesty of the name of the LORD his God
  alternatives:
  - in the majesty of the LORD his God's name
  - in the exaltation of the name of the LORD his God
  lexicon: HALOT
  rationale: גאון can denote exaltation, majesty, or grandeur. 'Majesty' is idiomatic
    and fitting in a royal context. The construct chain is preserved straightforwardly
    as 'the name of the LORD his God,' retaining the theological force of acting under
    divine authority and reputation.
- source_word: וְיָשָׁבוּ
  chosen: And they will dwell secure
  alternatives:
  - And they will remain
  - And they will live securely
  - And they will sit/dwell
  lexicon: HALOT
  rationale: ישב means dwell, sit, remain. In context of restored safety under the
    ruler, English idiom favors 'dwell secure' or 'live securely.' 'Dwell secure'
    keeps closer to the Hebrew verb while making the implied security explicit from
    context.
- source_word: כִּי עַתָּה
  chosen: for now
  alternatives:
  - for then
  - because now
  - indeed now
  lexicon: HALOT
  rationale: כִּי introduces the reason, and עתה normally means 'now.' Some translations
    render this adverbially as 'then' for discourse flow, but the Hebrew plainly says
    'now.' 'For now' preserves the source text's wording while allowing prophetic
    immediacy.
- source_word: יִגְדַּל
  chosen: he will be great
  alternatives:
  - he will become great
  - he will be magnified
  - he will grow great
  lexicon: HALOT
  rationale: גדל here expresses greatness or exaltation. 'He will be great' is natural
    English and avoids the potentially misleading developmental nuance of 'grow great.'
- source_word: עַד אַפְסֵי אָרֶץ
  chosen: to the ends of the earth
  alternatives:
  - to the farthest parts of the earth
  - to earth's ends
  lexicon: HALOT
  rationale: This idiom denotes the extremities or farthest reaches of the earth.
    'To the ends of the earth' is both accurate and idiomatic in English.
