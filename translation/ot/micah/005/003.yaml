theological_decisions:
- issue: Referent of the singular verbs and pronouns
  chosen_reading: The subject is the coming ruler from the preceding context, rendered
    simply as 'he' without importing an explicit messianic title into this verse.
  alternative_readings:
  - A generic future Davidic ruler
  - The Messiah/Christ explicitly named in translation
  rationale: The immediate literary context points to the promised ruler, traditionally
    understood messianically in Christian reading. However, this verse itself uses
    only third-person singular verbs, so the translation preserves the pronoun 'he'
    and does not add 'Messiah' or 'king' into the text. This maintains theological
    coherence without importing more than the Hebrew states.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Rendering of אֱלֹהָיו in relation to the ruler
  chosen_reading: '''his God'' retained as written'
  alternative_readings:
  - Paraphrasing to avoid perceived christological tension
  rationale: The Hebrew explicitly says 'the LORD his God.' The translation preserves
    this wording without adjustment. This respects the source text and avoids resolving
    theological questions by translation smoothing.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it.
