theological_decisions:
- issue: Identity of the subject in 'he will be peace'
  chosen_reading: The subject is the ruler from the immediate messianic context, rendered
    personally as 'he.'
  alternative_readings:
  - The demonstrative could be rendered more formally as 'this one' without making
    the messianic identification explicit in the clause itself.
  rationale: The broader context of Micah 5 speaks of a coming ruler from Bethlehem.
    Rendering the demonstrative personally reflects the discourse flow without importing
    additional doctrinal claims beyond the text.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
- issue: Meaning of the number pair 'seven ... and eight'
  chosen_reading: Taken as a Hebrew idiom for an ample or complete sufficiency of
    leaders, while translated literally.
  alternative_readings:
  - A strictly literal numerical count without idiomatic force
  rationale: The translation preserves the numbers in the main text and does not flatten
    the idiom into paraphrase. The idiomatic force can be noted without altering the
    wording.
  doctrine_reference: 'Translation philosophy #1 and #5'
