id: MIC.5.4
reference: Micah 5:4
source:
  edition: WLC
  text: וְ/הָיָ֥ה זֶ֖ה שָׁל֑וֹם אַשּׁ֣וּר כִּֽי יָב֣וֹא בְ/אַרְצֵ֗/נוּ וְ/כִ֤י יִדְרֹךְ֙
    בְּ/אַרְמְנֹתֵ֔י/נוּ וַ/הֲקֵמֹ֤נוּ עָלָי/ו֙ שִׁבְעָ֣ה רֹעִ֔ים וּ/שְׁמֹנָ֖ה נְסִיכֵ֥י
    אָדָֽם׀־׃
translation:
  text: And he will be peace. When Assyria comes into our land and treads in our citadels,
    then we will raise up against him seven shepherds and eight princes of men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Assyrian.' The Hebrew אַשּׁוּר can denote Assyria as a nation or
      the Assyrian invader personally.
    reason: alternative_reading
  - marker: b
    text: Or 'palaces' for 'citadels'; the Hebrew term can refer to royal palaces
      or fortified strongholds.
    reason: lexical_alternative
  - marker: c
    text: '''Seven ... and eight'' is a Hebrew numerical expression suggesting an
      abundant or sufficient number.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיָה
  chosen: And he will be
  alternatives:
  - And he shall be
  - And this one will be
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse commonly
    carries future sense. Rendered with explicit subject supplied from context ('he')
    rather than a wooden 'this' alone, since זֶה immediately follows and points back
    to the ruler of the preceding context.
- source_word: זֶה
  chosen: he
  alternatives:
  - this one
  - this
  lexicon: HALOT
  rationale: Demonstrative pronoun used anaphorically for the coming ruler. English
    idiom prefers 'he' in the main line; 'this one' is a viable more formal alternative.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - wholeness
  lexicon: HALOT
  rationale: The noun denotes more than absence of conflict, but 'peace' is the standard
    concise rendering and fits the messianic-protective context. Broader senses are
    not excluded.
- source_word: אַשּׁוּר
  chosen: Assyria
  alternatives:
  - the Assyrian
  lexicon: HALOT
  rationale: The form can denote the nation or, by metonymy, the Assyrian invader.
    Main text uses the geopolitical name for natural English after 'comes into our
    land'; the personalizing alternative is preserved in a footnote because many translations
    take it as 'the Assyrian.'
- source_word: כִּי יָבוֹא
  chosen: When Assyria comes
  alternatives:
  - For Assyria will come
  - If Assyria comes
  lexicon: HALOT
  rationale: כִּי here is best taken temporally in context, introducing the invasion
    scenario. 'When' fits the parallel clause and avoids an overly causal reading.
- source_word: בְאַרְצֵנוּ
  chosen: into our land
  alternatives:
  - in our land
  lexicon: HALOT
  rationale: With verb of motion ב can be rendered naturally as 'into' in English,
    expressing entry into the land.
- source_word: וְכִי יִדְרֹךְ
  chosen: and treads
  alternatives:
  - and tramples
  - and marches
  lexicon: HALOT
  rationale: The verb literally means 'tread.' In military context it can imply trampling
    or marching through. 'Treads' preserves the concrete image without overinterpreting.
- source_word: בְאַרְמְנֹתֵינוּ
  chosen: in our citadels
  alternatives:
  - in our palaces
  - in our fortresses
  lexicon: HALOT
  rationale: אַרְמוֹן can mean palace or fortified stronghold. In an invasion context,
    'citadels' captures defended royal/urban strongholds better than the domestic-sounding
    'palaces.' Alternative retained in footnote because 'palaces' is traditional.
- source_word: וַהֲקֵמֹנוּ
  chosen: then we will raise up
  alternatives:
  - and we will raise up
  - we will appoint
  lexicon: HALOT
  rationale: Hiphil of קום here means to cause to arise, i.e., raise up or appoint
    leaders. 'Then' brings out the sequential force in context.
- source_word: עָלָיו
  chosen: against him
  alternatives:
  - against it
  lexicon: HALOT
  rationale: Singular pronominal suffix most naturally refers to the invader conceived
    personally. Since אַשּׁוּר may be read as either nation or personified enemy,
    'him' fits the chosen reading and the military response.
- source_word: שִׁבְעָה רֹעִים
  chosen: seven shepherds
  alternatives:
  - seven rulers
  - seven leaders
  lexicon: HALOT
  rationale: The participial noun literally means 'shepherds' and is often used metaphorically
    for rulers. The metaphor is preserved in the main text.
- source_word: וּשְׁמֹנָה נְסִיכֵי אָדָם
  chosen: and eight princes of men
  alternatives:
  - and eight leaders among men
  - and eight anointed rulers of mankind
  lexicon: HALOT
  rationale: נְסִיכִים denotes princes, chiefs, or installed rulers. אָדָם here is
    best taken generically as 'men' rather than all humanity in an abstract sense.
    'Princes of men' is somewhat formal but preserves the Hebrew construction and
    gender-accurate wording.
