id: MIC.5.8
reference: Micah 5:8
source:
  edition: WLC
  text: תָּרֹ֥ם יָדְ/ךָ֖ עַל צָרֶ֑י/ךָ וְ/כָל אֹיְבֶ֖י/ךָ יִכָּרֵֽתוּ־־׃פ
translation:
  text: May your hand be lifted up over your adversaries, and may all your enemies
    be cut off.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''Your hand will be lifted up over your adversaries, and all your enemies
      will be cut off.'' The Hebrew imperfects may also be read as future statements.'
    reason: alternative_reading
lexical_decisions:
- source_word: תָּרֹם
  chosen: be lifted up
  alternatives:
  - be exalted
  - rise
  lexicon: HALOT
  rationale: From רוּם in the Qal imperfect 3fs, agreeing with the feminine subject
    'your hand.' In context with 'hand' and 'over your adversaries,' the idiom conveys
    victorious elevation or dominance. 'Be lifted up' preserves the concrete image
    better than the more abstract 'be exalted.'
- source_word: יָדְךָ
  chosen: your hand
  lexicon: HALOT
  rationale: Literal rendering of 'your hand.' In Hebrew this commonly symbolizes
    power or military strength; the literal expression is retained because it is natural
    in English and preserves the imagery.
- source_word: עַל
  chosen: over
  alternatives:
  - against
  - upon
  lexicon: HALOT
  rationale: '''Over'' best fits the image of the hand being raised in superiority
    over foes. ''Against'' is possible but weakens the vertical/victory nuance of
    the Hebrew preposition in this construction.'
- source_word: צָרֶיךָ
  chosen: your adversaries
  alternatives:
  - your foes
  - those who oppress you
  - your enemies
  lexicon: HALOT
  rationale: From צַר, denoting an opponent, enemy, or one who is hostile/distressing.
    'Adversaries' distinguishes it from the following אֹיְבֶיךָ and avoids flattening
    the parallelism by using 'enemies' twice.
- source_word: וְכָל
  chosen: and all
  alternatives:
  - and every
  lexicon: HALOT
  rationale: Straightforward rendering preserving the comprehensiveness of the statement.
- source_word: אֹיְבֶיךָ
  chosen: your enemies
  alternatives:
  - those who hate you
  - your foes
  lexicon: HALOT
  rationale: Standard rendering of אֹיֵב. Keeping 'enemies' here preserves the common
    lexical sense and maintains a slight distinction from 'adversaries' in the previous
    colon.
- source_word: יִכָּרֵתוּ
  chosen: be cut off
  alternatives:
  - be destroyed
  - be wiped out
  lexicon: HALOT
  rationale: Niphal imperfect of כרת, commonly 'be cut off.' This preserves the covenantal/judicial
    and military resonance of the Hebrew without over-specifying the mode of destruction.
    More dynamic options like 'be destroyed' are interpretive and less textually transparent.
