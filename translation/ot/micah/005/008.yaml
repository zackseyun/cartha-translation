theological_decisions:
- issue: Verbal force of the imperfects in this prophetic context
  chosen_reading: 'Render as a wish/prayer-like jussive: ''May your hand... and may
    all your enemies...'''
  alternative_readings:
  - 'Future prediction: ''Your hand will be lifted up... and all your enemies will
    be cut off'''
  rationale: Although the forms are morphologically imperfect, in this context they
    can function with jussive nuance, especially in prophetic discourse expressing
    desired or assured triumph. The English 'may' preserves the volitional flavor
    without denying the prophetic certainty. A simple future is also possible, but
    the chosen rendering better reflects the Hebrew mood-like force.
