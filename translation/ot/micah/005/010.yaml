id: MIC.5.10
reference: Micah 5:10
source:
  edition: WLC
  text: וְ/הִכְרַתִּ֖י עָרֵ֣י אַרְצֶ֑/ךָ וְ/הָרַסְתִּ֖י כָּל מִבְצָרֶֽי/ךָ־׃
translation:
  text: And I will cut off the cities of your land, and I will tear down all your
    strongholds.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְהִכְרַתִּי
  chosen: I will cut off
  alternatives:
  - I will destroy
  - I will cut down
  lexicon: HALOT
  rationale: The verb כרת in the Hiphil commonly means 'cut off,' often with the sense
    of removing or eliminating. 'Cut off' preserves the Hebrew imagery and prophetic
    force better than the more generalized 'destroy.' Future sense is appropriate
    in context.
- source_word: עָרֵי
  chosen: the cities of
  alternatives:
  - the towns of
  lexicon: HALOT
  rationale: עִיר ordinarily means 'city.' 'Cities' is the most direct and standard
    rendering; 'towns' is possible but less precise.
- source_word: אַרְצְךָ
  chosen: your land
  alternatives:
  - your country
  lexicon: HALOT
  rationale: אֶרֶץ can mean land, earth, or country depending on context. Here 'your
    land' best fits the covenantal-territorial sense and pairs naturally with 'cities.'
- source_word: וְהָרַסְתִּי
  chosen: I will tear down
  alternatives:
  - I will destroy
  - I will demolish
  lexicon: HALOT
  rationale: הרס means to pull down or tear down. 'Tear down' preserves the concrete
    image of dismantling fortified structures better than the broader 'destroy.'
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: כָּל straightforwardly means 'all' or 'every.' 'All' fits naturally with
    the plural noun that follows.
- source_word: מִבְצָרֶיךָ
  chosen: your strongholds
  alternatives:
  - your fortresses
  - your fortified places
  lexicon: HALOT
  rationale: מִבְצָר denotes a fortified place or stronghold. 'Strongholds' is concise,
    natural English and preserves the military-defensive sense. 'Fortresses' is also
    possible, but 'strongholds' better covers the plural category broadly.
