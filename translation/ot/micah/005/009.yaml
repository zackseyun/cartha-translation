id: MIC.5.9
reference: Micah 5:9
source:
  edition: WLC
  text: וְ/הָיָ֤ה בַ/יּוֹם הַ/הוּא֙ נְאֻם יְהוָ֔ה וְ/הִכְרַתִּ֥י סוּסֶ֖י/ךָ מִ/קִּרְבֶּ֑/ךָ וְ/הַאֲבַדְתִּ֖י מַרְכְּבֹתֶֽי/ךָ־־׃
translation:
  text: And in that day, declares Yahweh, I will cut off your horses from among you, and I will destroy your chariots.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from your midst.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And in that day
  alternatives:
  - And it shall happen
  - And it will be
  lexicon: HALOT
  rationale: The clause introduces a future event formula. In English, the temporal phrase carries the force naturally, so the existential verb is not rendered woodenly as a separate 'it shall be' but absorbed into 'And in that day' for readable, source-faithful English.
- source_word: בַיּוֹם הַהוּא
  chosen: in that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: A standard prophetic temporal formula. 'In that day' is idiomatic in English prophetic discourse and preserves the eschatological/literary resonance.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This is a prophetic speech formula marking divine utterance. 'Declares the LORD' is natural modern English and preserves the solemn prophetic force. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and alignment with the stated doctrine.
- source_word: וְהִכְרַתִּי
  chosen: I will cut off
  alternatives:
  - I will cut down
  - I will remove
  lexicon: HALOT
  rationale: כרת in the Hiphil commonly means to cut off, remove, or eliminate. 'Cut off' preserves the concrete metaphor and the force of decisive removal better than the more interpretive 'remove'.
- source_word: סוּסֶיךָ
  chosen: your horses
  lexicon: HALOT
  rationale: Direct rendering of the plural noun with second masculine singular suffix, addressed to Zion/Israel/Jacob as a collective singular.
- source_word: מִקִּרְבֶּךָ
  chosen: from among you
  alternatives:
  - from your midst
  - out of your midst
  lexicon: HALOT
  rationale: Literally 'from your midst.' 'From among you' is smooth modern English while preserving the sense of removal from within the community.
- source_word: וְהַאֲבַדְתִּי
  chosen: I will destroy
  alternatives:
  - I will make perish
  - I will wipe out
  lexicon: HALOT
  rationale: The Hiphil of אבד here conveys causing to perish/destroy. 'Destroy' is the clearest natural equivalent in context.
- source_word: מַרְכְּבֹתֶיךָ
  chosen: your chariots
  lexicon: HALOT
  rationale: Straightforward rendering of the plural noun with second masculine singular suffix; in context it refers to military power and instruments of war.
