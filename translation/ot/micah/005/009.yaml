theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpretive force of the removal of horses and chariots
  chosen_reading: A straightforward statement of the LORD's removal of military assets
  alternative_readings:
  - An implicit judgment against misplaced trust in military strength
  - A purification of God's people from reliance on warfare
  rationale: The translation keeps the concrete wording of the Hebrew rather than importing a fuller theological interpretation into the main text. The broader context may suggest judgment on military reliance, but the verse itself states the action plainly.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension rather than resolve it'
