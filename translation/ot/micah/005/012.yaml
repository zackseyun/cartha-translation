theological_decisions:
- issue: Rendering of cultic objects in an anti-idolatry context
  chosen_reading: Translate the specific Hebrew terms as 'carved images' and 'pillars'
    rather than collapsing both into the generic 'idols.'
  alternative_readings:
  - your idols and your sacred stones
  - your graven images and your sacred pillars
  rationale: The verse denounces distinct forms of illicit worship objects. Preserving
    the lexical distinction better reflects the Hebrew text and avoids importing a
    less precise summary term where the source is more concrete.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of the final clause
  chosen_reading: 'Render the result as cessation of physical-religious prostration:
    ''you will no longer bow down to the work of your hands.'''
  alternative_readings:
  - you will no longer worship the work of your hands
  rationale: The Hebrew verb specifically denotes bowing/prostration, often in worship.
    Keeping 'bow down' preserves theological and embodied tension without reducing
    the act to an abstract concept of worship.
  doctrine_reference: Translation philosophy §3
