id: MIC.5.12
reference: Micah 5:12
source:
  edition: WLC
  text: וְ/הִכְרַתִּ֧י פְסִילֶ֛י/ךָ וּ/מַצֵּבוֹתֶ֖י/ךָ מִ/קִּרְבֶּ֑/ךָ וְ/לֹֽא תִשְׁתַּחֲוֶ֥ה
    ע֖וֹד לְ/מַעֲשֵׂ֥ה יָדֶֽי/ךָ־׃
translation:
  text: And I will cut off your carved images and your pillars from your midst, and
    you will no longer bow down to the work of your hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your sacred pillars' or 'your standing stones.' The Hebrew term refers
      to upright cultic stones used in worship contexts.
    reason: lexical_alternative
  - marker: b
    text: Or 'you will no longer worship the work of your hands.' The Hebrew more
      literally speaks of bowing down, preserving the physical act of worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִכְרַתִּי
  chosen: And I will cut off
  alternatives:
  - And I will destroy
  - And I will eliminate
  lexicon: HALOT
  rationale: The Hiphil of כרת commonly means 'cut off,' often in the sense of removing
    or destroying. 'Cut off' preserves the concrete Hebrew idiom while remaining natural
    English.
- source_word: פְסִילֶיךָ
  chosen: your carved images
  alternatives:
  - your idols
  - your graven images
  lexicon: HALOT
  rationale: פסל refers to an idol/image shaped by carving. 'Carved images' is more
    transparent to the Hebrew than the broader 'idols,' while avoiding the archaic
    feel of 'graven images.'
- source_word: וּמַצֵּבוֹתֶיךָ
  chosen: your pillars
  alternatives:
  - your sacred pillars
  - your standing stones
  lexicon: HALOT
  rationale: מַצֵּבָה denotes a standing stone or cultic pillar. 'Pillars' is concise
    and readable; the cultic sense is clear from the context of carved images and
    forbidden worship. The more explicit alternatives are viable but slightly more
    interpretive.
- source_word: מִקִּרְבֶּךָ
  chosen: from your midst
  alternatives:
  - from among you
  - out of your midst
  lexicon: HALOT
  rationale: The phrase literally means 'from your midst.' This preserves the Hebrew
    imagery of removal from within the community or land.
- source_word: וְלֹא תִשְׁתַּחֲוֶה עוֹד
  chosen: and you will no longer bow down
  alternatives:
  - and you will not bow down anymore
  - and you will no more worship
  lexicon: HALOT
  rationale: שׁחה in the Hishtaphel/Hishtafel stem commonly means to bow down in worship.
    'Bow down' keeps the physical and religious sense together; 'worship' alone would
    flatten the embodied imagery.
- source_word: לְמַעֲשֵׂה יָדֶיךָ
  chosen: to the work of your hands
  alternatives:
  - to what your hands have made
  - to your handmade works
  lexicon: HALOT
  rationale: This is a common biblical expression for human-made idols. 'The work
    of your hands' is a natural and recognizable English rendering that preserves
    the idiom and its polemical force.
