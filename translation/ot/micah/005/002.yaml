theological_decisions:
- issue: Identity of 'she who is in labor'
  chosen_reading: Left unspecified in the main text
  alternative_readings:
  - Zion/Judah personified
  - the mother of the promised ruler
  - a more immediate historical referent
  rationale: The Hebrew does not explicitly identify the woman. To preserve theological
    tension and avoid importing a specific interpretive tradition into the translation,
    the wording remains non-specific.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Scope of 'his brothers'
  chosen_reading: Retained as 'his brothers' without interpretive expansion
  alternative_readings:
  - fellow Israelites
  - kinsmen of the coming ruler
  - members of the divided nation reunited
  rationale: The phrase likely relates to the ruler mentioned in the surrounding context,
    but the verse itself does not define the relationship more precisely. The translation
    keeps the familial term and leaves fuller interpretation to notes or commentary.
  doctrine_reference: Translation philosophy §§1, 3, 4.
