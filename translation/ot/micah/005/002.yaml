id: MIC.5.2
reference: Micah 5:2
source:
  edition: WLC
  text: לָ/כֵ֣ן יִתְּנֵ֔/ם עַד עֵ֥ת יוֹלֵדָ֖ה יָלָ֑דָה וְ/יֶ֣תֶר אֶחָ֔י/ו יְשׁוּב֖וּ/ן
    עַל בְּנֵ֥י יִשְׂרָאֵֽל־־׃
translation:
  text: Therefore he will give them up until the time when she who is in labor has
    given birth; then the rest of his brothers will return to the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he will hand them over' or 'he will abandon them.'
    reason: lexical_alternative
  - marker: b
    text: '''She who is in labor'' is not explicitly identified in the Hebrew; interpreters
      variously understand her as Zion/Judah personified, the mother of the promised
      ruler, or another figure.'
    reason: alternative_reading
  - marker: c
    text: Or 'the children of Israel.' The Hebrew is literally 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks an inference from the preceding context; 'Therefore' preserves
    the logical connection clearly in modern English.
- source_word: יִתְּנֵם
  chosen: he will give them up
  alternatives:
  - he will hand them over
  - he will abandon them
  lexicon: HALOT
  rationale: From נתן with 3mp suffix, here idiomatically meaning to hand over or
    give up. 'Give them up' best captures the judicial/disciplinary sense without
    overinterpreting as total abandonment.
- source_word: עַד עֵת
  chosen: until the time
  alternatives:
  - until
  - until the time that
  lexicon: HALOT
  rationale: The combination is slightly fuller than simple 'until'; 'until the time'
    preserves the Hebrew phrasing while remaining natural.
- source_word: יוֹלֵדָה
  chosen: she who is in labor
  alternatives:
  - the woman in labor
  - she who labors
  lexicon: HALOT
  rationale: The participial form denotes a woman giving birth/in labor. 'She who
    is in labor' preserves the participial force and avoids prematurely specifying
    identity.
- source_word: יָלָדָה
  chosen: has given birth
  alternatives:
  - gives birth
  - bears a child
  lexicon: HALOT
  rationale: Perfect verb after the temporal clause is well represented in English
    by 'has given birth,' indicating the birth as the event terminating the prior
    condition.
- source_word: וְיֶתֶר
  chosen: then the rest
  alternatives:
  - and the remainder
  - and the remnant
  lexicon: HALOT
  rationale: Refers to those remaining. 'The rest' is the most natural English here;
    'remnant' could import technical theological overtones not explicit in this noun
    by itself.
- source_word: אֶחָיו
  chosen: of his brothers
  alternatives:
  - of his kinsmen
  - of his brothers and sisters
  lexicon: HALOT
  rationale: Masculine plural 'brothers' should be retained per gender-accurate policy.
    'Kinsmen' is possible contextually, but 'brothers' preserves the lexical form
    and possible familial/messianic resonance.
- source_word: יְשׁוּבוּן
  chosen: will return
  alternatives:
  - will turn back
  - will come back
  lexicon: HALOT
  rationale: From שוב, here most naturally 'return.' This keeps both spatial and covenantal
    resonance without forcing one nuance.
- source_word: עַל
  chosen: to
  alternatives:
  - unto
  - over
  - toward
  lexicon: HALOT
  rationale: Although the preposition is literally 'upon/over,' in this idiom with
    שוב and a people group, English 'to' best conveys movement/joining. A more literal
    'upon' would be obscure.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the people of Israel
  lexicon: HALOT
  rationale: Rendered gender-accurately as 'sons of Israel' in keeping with the Hebrew
    phrase. 'Children of Israel' is traditional, but 'sons' more closely matches the
    source; 'people of Israel' is interpretive.
