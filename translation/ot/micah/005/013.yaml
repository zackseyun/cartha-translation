theological_decisions:
- issue: Referent of אֲשֵׁירֶיךָ
  chosen_reading: cultic objects associated with Asherah worship ('Asherah poles')
  alternative_readings:
  - the goddess Asherah herself ('your Asherahs')
  - generic sacred poles
  rationale: The immediate context concerns the removal of idolatrous practices and
    objects. Rendering the term as 'Asherah poles' communicates the likely concrete
    referent while retaining the specific religious background. Because the Hebrew
    term can be understood more broadly, an alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
