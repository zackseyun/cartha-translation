id: MIC.5.13
reference: Micah 5:13
source:
  edition: WLC
  text: וְ/נָתַשְׁתִּ֥י אֲשֵׁירֶ֖י/ךָ מִ/קִּרְבֶּ֑/ךָ וְ/הִשְׁמַדְתִּ֖י עָרֶֽי/ךָ׃
translation:
  text: And I will uproot your Asherah poles from your midst, and I will destroy your
    cities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your Asherim' or 'your sacred poles.' The Hebrew term can refer to cultic
      objects associated with the goddess Asherah.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַשְׁתִּי
  chosen: I will uproot
  alternatives:
  - I will pluck up
  - I will tear out
  lexicon: HALOT
  rationale: נתשׁ commonly conveys pulling up or tearing out what is planted or established.
    'Uproot' is natural modern English and fits the imagery of removing cultic objects.
- source_word: אֲשֵׁירֶיךָ
  chosen: your Asherah poles
  alternatives:
  - your Asherim
  - your sacred poles
  lexicon: HALOT
  rationale: אֲשֵׁרָה can refer either to the goddess Asherah or, in many contexts,
    the cultic wooden object/pole associated with her worship. Here, in a list of
    idolatrous objects to be removed, 'Asherah poles' best captures the likely referent
    while preserving the specific term rather than flattening it to a generic 'idols'.
- source_word: מִקִּרְבֶּךָ
  chosen: from your midst
  alternatives:
  - from among you
  - out of your midst
  lexicon: HALOT
  rationale: The phrase literally means 'from your midst.' This preserves the covenantal/judgment
    tone and is idiomatic enough in English.
- source_word: וְהִשְׁמַדְתִּי
  chosen: I will destroy
  alternatives:
  - I will annihilate
  - I will wipe out
  lexicon: HALOT
  rationale: The Hiphil of שׁמד denotes causing to perish or destroying. 'Destroy'
    is strong and clear without overstating beyond the context.
- source_word: עָרֶיךָ
  chosen: your cities
  alternatives:
  - your towns
  lexicon: HALOT
  rationale: The normal sense of עִיר is 'city.' 'Cities' is the most direct rendering.
