id: MIC.5.5
reference: Micah 5:5
source:
  edition: WLC
  text: וְ/רָע֞וּ אֶת אֶ֤רֶץ אַשּׁוּר֙ בַּ/חֶ֔רֶב וְ/אֶת אֶ֥רֶץ נִמְרֹ֖ד בִּ/פְתָחֶ֑י/הָ
    וְ/הִצִּיל֙ מֵֽ/אַשּׁ֔וּר כִּֽי יָב֣וֹא בְ/אַרְצֵ֔/נוּ וְ/כִ֥י יִדְרֹ֖ךְ בִּ/גְבוּלֵֽ/נוּ־־־׃ס
translation:
  text: They will shepherd the land of Assyria with the sword, and the land of Nimrod
    at its entrances; and he will deliver us from Assyria when he comes into our land,
    and when he treads within our border.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Assyrian' in the final clause; the Hebrew can personify Assyria
      as the invading enemy.
    reason: alternative_reading
  - marker: b
    text: Or 'in its gates'; Hebrew 'at its entrances/openings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָעוּ
  chosen: they will shepherd
  alternatives:
  - they will rule
  - they will pasture
  - they will devastate
  lexicon: HALOT
  rationale: The verb רעה normally means 'to pasture, shepherd.' In this context with
    hostile nations and the instrument 'with the sword,' it carries a force of subduing
    rule through conquest, but 'shepherd' preserves the lexical image and the connection
    to the ruler/shepherd theme in the context better than flattening it to 'rule'
    or overinterpreting it as 'devastate'.
- source_word: אֶרֶץ אַשּׁוּר
  chosen: the land of Assyria
  alternatives:
  - Assyria
  lexicon: HALOT
  rationale: A formal rendering preserves the repeated 'land of' construction and
    the territorial sense of אֶרֶץ.
- source_word: בַּחֶרֶב
  chosen: with the sword
  alternatives:
  - by the sword
  lexicon: HALOT
  rationale: Instrumental beth is naturally rendered 'with.' 'Sword' is retained literally
    as the means of military conquest.
- source_word: אֶרֶץ נִמְרֹד
  chosen: the land of Nimrod
  alternatives:
  - Nimrod's land
  lexicon: HALOT
  rationale: Keeps the Hebrew construct-like apposition in natural English while preserving
    the allusive name 'Nimrod,' commonly associated with Mesopotamia/Babylonia.
- source_word: בִּפְתָחֶיהָ
  chosen: at its entrances
  alternatives:
  - in its gates
  - with drawn swords at its gates
  - in its openings
  lexicon: HALOT
  rationale: פתח means 'opening, entrance.' 'At its entrances' is the most direct
    rendering of the plural with 3fs suffix referring back to 'land.' 'Gates' is interpretive
    and common in translations, but the Hebrew does not use the usual word for gate
    (שׁער).
- source_word: וְהִצִּיל
  chosen: and he will deliver us
  alternatives:
  - and he will rescue us
  - thus he will deliver
  lexicon: HALOT
  rationale: The Hiphil of נצל means 'deliver, rescue.' The singular subject is retained
    as 'he,' most naturally referring back to the ruler figure in the immediate context,
    while the conjunction is kept as simple 'and.'
- source_word: מֵאַשּׁוּר
  chosen: from Assyria
  alternatives:
  - from the Assyrian
  lexicon: HALOT
  rationale: Given the earlier territorial references and the parallel with 'land
    of Assyria,' the national/geographical sense is preferable here, though the singular
    could also be personified as 'the Assyrian' in context.
- source_word: כִּי יָבוֹא בְאַרְצֵנוּ
  chosen: when he comes into our land
  alternatives:
  - for he will come into our land
  - if he comes into our land
  lexicon: HALOT
  rationale: 'כִּי here is best taken temporally in context: deliverance occurs at
    the time of invasion. ''When'' communicates this clearly in English.'
- source_word: וְכִי יִדְרֹךְ בִּגְבוּלֵנוּ
  chosen: and when he treads within our border
  alternatives:
  - and when he marches in our territory
  - and when he steps on our border
  lexicon: HALOT
  rationale: דרך literally means 'tread, march.' 'Treads within our border' preserves
    the concrete imagery while making clear that גבול refers to territorial boundary/region.
    'Within our border' is smoother than the overly literal 'in our border.'
