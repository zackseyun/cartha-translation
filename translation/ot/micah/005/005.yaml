theological_decisions:
- issue: Subject shift from plural to singular in the verse
  chosen_reading: 'Retain the Hebrew shift: ''They will shepherd ... and he will deliver
    us'''
  alternative_readings:
  - Smooth to a single plural subject ('they will deliver us')
  - Smooth to a single singular royal subject throughout
  rationale: The Hebrew text intentionally shifts from plural action (likely the leaders/shepherds
    of the preceding context) to a singular deliverer (the ruler figure). Preserving
    the tension is preferable to harmonizing it, in keeping with the translation philosophy
    of not resolving genuine textual ambiguity unnecessarily.
  doctrine_reference: Translation philosophy §3
- issue: Referent of the singular invader/Assyria
  chosen_reading: Render as 'Assyria' in the main text while allowing personified
    'the Assyrian' as an alternative
  alternative_readings:
  - the Assyrian
  rationale: The verse uses both territorial language ('land of Assyria') and invasion
    language that can personify the enemy. Because the Hebrew form אַשּׁוּר can denote
    either the nation or the Assyrian power/personified invader, the main text keeps
    the national name, and the personified alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §3
