id: MIC.5.14
reference: Micah 5:14
source:
  edition: WLC
  text: וְ/עָשִׂ֜יתִי בְּ/אַ֧ף וּ/בְ/חֵמָ֛ה נָקָ֖ם אֶת הַ/גּוֹיִ֑ם אֲשֶׁ֖ר לֹ֥א שָׁמֵֽעוּ־׃ס
translation:
  text: And I will execute vengeance in anger and wrath on the nations that did not
    listen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not obey' or 'did not heed.' The Hebrew verb can mean both hearing
      and responding obediently.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתִי
  chosen: And I will execute
  alternatives:
  - And I will do
  - And I will carry out
  lexicon: HALOT
  rationale: The verb עשה is broad ('do/make'), but with the object נָקָם ('vengeance')
    the idiom means to carry out or execute vengeance. 'Execute' is natural English
    and preserves the judicial force without paraphrase.
- source_word: בְּאַף
  chosen: in anger
  alternatives:
  - with anger
  - in fury
  lexicon: HALOT
  rationale: אַף literally refers to 'nose' and idiomatically to anger. 'In anger'
    fits the preposition and keeps the emotional/judicial sense concise.
- source_word: וּבְחֵמָה
  chosen: and wrath
  alternatives:
  - and fury
  - and rage
  lexicon: HALOT
  rationale: חֵמָה overlaps with אַף but intensifies it. 'Wrath' preserves elevated
    prophetic diction and distinguishes it from the preceding 'anger' without sounding
    archaic.
- source_word: נָקָם
  chosen: vengeance
  alternatives:
  - vengeance/avenging
  - punishment
  lexicon: HALOT
  rationale: נָקָם denotes vengeance or avenging, especially in judicial-divine contexts.
    'Vengeance' is the most direct nominal rendering here; 'punishment' would weaken
    the retributive nuance.
- source_word: אֶת הַגּוֹיִם
  chosen: on the nations
  alternatives:
  - against the nations
  - the nations
  lexicon: HALOT
  rationale: Although אֶת normally marks a direct object, English idiom with 'execute
    vengeance' commonly takes 'on' or 'against.' 'On the nations' is smooth and preserves
    the target of judgment.
- source_word: אֲשֶׁר לֹא שָׁמֵעוּ
  chosen: that did not listen
  alternatives:
  - that did not obey
  - who have not listened
  lexicon: HALOT
  rationale: שׁמע can mean hear, listen, or obey. In prophetic covenantal contexts
    it often carries the sense of heeding/obeying. Here 'did not listen' preserves
    the lexical base while allowing the implied refusal to heed; 'obey' is possible
    but slightly more interpretive.
