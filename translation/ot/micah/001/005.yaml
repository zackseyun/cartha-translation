id: MIC.1.5
reference: Micah 1:5
source:
  edition: WLC
  text: בְּ/פֶ֤שַׁע יַֽעֲקֹב֙ כָּל זֹ֔את וּ/בְ/חַטֹּ֖אות בֵּ֣ית יִשְׂרָאֵ֑ל מִֽי פֶ֣שַׁע
    יַעֲקֹ֗ב הֲ/לוֹא֙ שֹֽׁמְר֔וֹן וּ/מִי֙ בָּמ֣וֹת יְהוּדָ֔ה הֲ/ל֖וֹא יְרוּשָׁלִָֽם־־׃
translation:
  text: All this is because of Jacob’s transgression, and because of the sins of the
    house of Israel. What is Jacob’s transgression? Is it not Samaria? And what are
    the high places of Judah? Are they not Jerusalem?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rebellion' for 'transgression' in both occurrences of פשע.
    reason: lexical_alternative
  - marker: b
    text: '''High places'' refers to elevated worship sites, often associated with
      unauthorized or idolatrous worship.'
    reason: cultural_note
lexical_decisions:
- source_word: בְּ/פֶשַׁע
  chosen: because of ... transgression
  alternatives:
  - for ... transgression
  - in ... transgression
  - on account of ... rebellion
  lexicon: HALOT
  rationale: The preposition ב here is causal in context, introducing the reason for
    the announced judgment ('all this'). פשע denotes rebellion/transgression against
    God; 'transgression' is a clear, natural rendering that preserves moral and covenantal
    force without over-paraphrasing.
- source_word: יַעֲקֹב
  chosen: Jacob
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: Retained as the proper name 'Jacob' rather than assimilating to 'Israel,'
    since the Hebrew explicitly uses Jacob and then distinguishes 'the house of Israel'
    in parallel. This preserves the poetic parallelism and rhetorical force.
- source_word: כָּל זֹאת
  chosen: All this
  alternatives:
  - All these things
  - All this judgment
  lexicon: HALOT
  rationale: A straightforward rendering of the demonstrative phrase referring back
    to the preceding theophanic judgment imagery. 'All this' is idiomatic and sufficiently
    broad without importing an interpretive noun like 'judgment' into the main text.
- source_word: וּ/בְ/חַטֹּאות
  chosen: and because of the sins
  alternatives:
  - and for the sins
  - and because of the sin offerings
  lexicon: HALOT
  rationale: The conjunction plus preposition mirrors the first clause and is likewise
    causal. חטאות here clearly means 'sins,' not 'sin offerings,' given the context
    of indictment.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: Rendered formally to preserve the covenantal-national expression and
    the parallelism with 'Jacob.'
- source_word: מִי
  chosen: What is
  alternatives:
  - Who is
  - What constitutes
  lexicon: HALOT
  rationale: Although literally 'who?' the interrogative here introduces an identification
    of the source/embodiment of transgression. In English, 'What is Jacob’s transgression?'
    best conveys the rhetorical question. A more literal 'Who is' would sound unnatural
    and obscure the sense.
- source_word: פֶשַׁע
  chosen: transgression
  alternatives:
  - rebellion
  - crime
  lexicon: HALOT
  rationale: Kept consistent with the first occurrence for lexical transparency. 'Rebellion'
    is possible, but 'transgression' fits the rhetorical repetition and remains accessible.
- source_word: הֲ/לוֹא
  chosen: Is it not / Are they not
  alternatives:
  - Is it not indeed
  - Surely it is not?
  lexicon: HALOT
  rationale: This particle expects an affirmative answer. English negative rhetorical
    questions ('Is it not...?' / 'Are they not...?') preserve the force naturally.
- source_word: שֹׁמְרוֹן
  chosen: Samaria
  lexicon: HALOT
  rationale: Standard English transliteration of the place name, here representing
    the capital city as the embodiment/source of northern Israel's rebellion.
- source_word: וּ/מִי
  chosen: And what are
  alternatives:
  - And who are
  - And what is
  lexicon: HALOT
  rationale: The second interrogative parallels the first. Because the predicate noun
    is plural ('high places'), English plural agreement ('what are') is the most natural
    way to express the rhetorical identification.
- source_word: בָּמוֹת
  chosen: the high places
  alternatives:
  - the shrines
  - the cultic high places
  lexicon: HALOT
  rationale: במות refers to elevated worship sites, often associated with illicit
    or syncretistic worship. 'High places' is the established and sufficiently transparent
    rendering; 'shrines' is possible but loses the topographical and intertextual
    resonance.
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Standard English transliteration of the tribal/kingdom name.
- source_word: יְרוּשָׁלִָם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Standard English transliteration of the place name, here functioning
    as the southern counterpart to Samaria.
