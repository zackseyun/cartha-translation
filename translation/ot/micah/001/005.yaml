theological_decisions:
- issue: Referent of 'Jacob’s transgression' and 'the high places of Judah'
  chosen_reading: The city names Samaria and Jerusalem are rendered as metonymic identifications
    of the centers/source of the people's rebellion and illicit worship.
  alternative_readings:
  - The verse could be taken as saying Samaria and Jerusalem are themselves the transgression/high
    places in a more abstract sense.
  - Some translations smooth the second clause to singular ('What is the high place
    of Judah?').
  rationale: The Hebrew uses rhetorical questions answered by the capital cities,
    likely identifying them as the representative centers of corruption. The English
    preserves the rhetorical structure without over-explaining the metonymy in the
    main text.
