theological_decisions:
- issue: Addressee of the feminine singular verb
  chosen_reading: The verse addresses Judah/Jerusalem/Zion personified as a woman.
  alternative_readings:
  - The verb could address the city Moresheth-gath itself personified.
  rationale: The feminine singular verbal form requires a feminine singular addressee.
    In Micah's surrounding context, cities/land are personified, and English can preserve
    this without making the referent explicit in the main text.
  doctrine_reference: 'Translation philosophy: preserve ambiguity where genuine; do
    not import claims the text does not make.'
