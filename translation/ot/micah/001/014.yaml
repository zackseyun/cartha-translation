id: MIC.1.14
reference: Micah 1:14
source:
  edition: WLC
  text: לָ/כֵן֙ תִּתְּנִ֣י שִׁלּוּחִ֔ים עַ֖ל מוֹרֶ֣שֶׁת גַּ֑ת בָּתֵּ֤י אַכְזִיב֙ לְ/אַכְזָ֔ב
    לְ/מַלְכֵ֖י יִשְׂרָאֵֽל׃
translation:
  text: Therefore you will give parting gifts to Moresheth-gath; the houses of Achzib
    will prove deceptive to the kings of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "farewell gifts"; the Hebrew may also carry the sense of gifts given
      when sending someone away, possibly with an echo of divorce imagery.
    reason: lexical_alternative
  - marker: b
    text: 'Achzib sounds like the Hebrew word for "deception" or "disappointment,"
      creating a wordplay: the town''s houses will prove deceptive to Israel''s kings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Standard inferential particle introducing the consequence of the preceding
    judgment sayings.
- source_word: תִּתְּנִי
  chosen: you will give
  alternatives:
  - you shall give
  lexicon: HALOT
  rationale: Qal imperfect 2fs of נתן, addressed to a feminine singular referent,
    likely daughter Zion/Judah personified. Future-like English fits the prophetic
    announcement.
- source_word: שִׁלּוּחִים
  chosen: parting gifts
  alternatives:
  - farewell gifts
  - dismissal gifts
  - divorce gifts
  lexicon: HALOT
  rationale: Plural noun from שלח in a context of sending away. 'Parting gifts' preserves
    the sense of gifts given at departure without overcommitting to a technical divorce
    sense, though that nuance may echo in the background.
- source_word: עַל
  chosen: to
  alternatives:
  - for
  - concerning
  - upon
  lexicon: HALOT
  rationale: Though literally 'upon/over,' in this idiom with giving gifts and a destination/person,
    English 'to' best conveys the relational force.
- source_word: מוֹרֶשֶׁת גַּת
  chosen: Moresheth-gath
  alternatives:
  - Moresheth of Gath
  lexicon: HALOT
  rationale: Place name transliterated per translation philosophy. Hyphenated form
    reflects the conventional understanding of a compound toponym.
- source_word: בָּתֵּי אַכְזִיב
  chosen: the houses of Achzib
  alternatives:
  - the houses in Achzib
  - the clans of Achzib
  lexicon: HALOT
  rationale: Construct phrase literally 'houses of Achzib.' 'Houses' may denote households/settlements,
    but the literal rendering preserves the wordplay and local reference.
- source_word: לְאַכְזָב
  chosen: will prove deceptive
  alternatives:
  - will become a deception
  - will be a lie
  - will be disappointing
  lexicon: HALOT
  rationale: Wordplay with אַכְזִיב/Achzib and noun אַכְזָב ('deception, lie, disappointing
    thing'). Rendering as a verbal predicate communicates the sense naturally in English
    while preserving the irony.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  chosen: to the kings of Israel
  alternatives:
  - for the kings of Israel
  lexicon: HALOT
  rationale: 'Dative relation after the predicate: Achzib''s houses will be deceptive
    ''to/for'' the kings of Israel. ''To'' is the more natural English complement
    here.'
