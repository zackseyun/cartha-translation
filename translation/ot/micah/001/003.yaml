id: MIC.1.3
reference: Micah 1:3
source:
  edition: WLC
  text: כִּֽי הִנֵּ֥ה יְהוָ֖ה יֹצֵ֣א מִ/מְּקוֹמ֑/וֹ וְ/יָרַ֥ד וְ/דָרַ֖ךְ עַל במותי אָֽרֶץ־־׃
translation:
  text: For behold, Yahweh is coming out from his place; he will come down and tread on the high places of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from his dwelling place' or 'from his holy place.' The Hebrew reads simply 'from his place.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the heights of the earth.' 'High places' may evoke elevated places associated with worship, but the phrase can also be understood more broadly as the earth's heights.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - For behold
  lexicon: HALOT
  rationale: Introduces the reason or ground for the preceding announcement. 'For' best preserves the connective force in context.
- source_word: הִנֵּה
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: An attention-getting particle. 'Look' is natural modern English and preserves the deictic force without archaic tone.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יֹצֵא
  chosen: is coming out
  alternatives:
  - goes out
  - comes forth
  lexicon: HALOT
  rationale: The participle presents imminent or vivid action. 'Is coming out' captures the present vividness in English better than a simple present while remaining faithful to the imagery.
- source_word: מִמְּקוֹמוֹ
  chosen: from his place
  alternatives:
  - from his dwelling place
  - from his holy place
  lexicon: HALOT
  rationale: The Hebrew says simply 'from his place.' Adding 'holy' would import an idea not explicit in the text, though context may imply a heavenly dwelling.
- source_word: וְיָרַד
  chosen: he will come down
  alternatives:
  - and descend
  - and go down
  lexicon: HALOT
  rationale: Sequential perfect in prophetic discourse is well rendered as future in English. 'Come down' is idiomatic and preserves the downward movement.
- source_word: וְדָרַךְ
  chosen: tread
  alternatives:
  - trample
  - walk
  lexicon: HALOT
  rationale: The verb means to tread/step on. 'Tread' preserves the imagery without over-intensifying to 'trample,' though judgment overtones remain in context.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: Standard preposition here; 'on' is the most natural rendering with 'tread.'
- source_word: במותי ארץ
  chosen: the high places of the earth
  alternatives:
  - the heights of the earth
  - the high places of the land
  lexicon: HALOT
  rationale: במות often means 'high places,' including elevated sites and, in many contexts, cultic heights. Here the cosmic scope favors 'high places of the earth' rather than restricting to 'land.' 'Heights' is possible, but 'high places' preserves the established biblical imagery.
