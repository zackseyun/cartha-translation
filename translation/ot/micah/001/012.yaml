id: MIC.1.12
reference: Micah 1:12
source:
  edition: WLC
  text: כִּֽי חָ֥לָֽה לְ/ט֖וֹב יוֹשֶׁ֣בֶת מָר֑וֹת כִּֽי יָ֤רַד רָע֙ מֵ/אֵ֣ת יְהוָ֔ה לְ/שַׁ֖עַר יְרוּשָׁלִָֽם־־׃
translation:
  text: For the inhabitant of Maroth waits anxiously for good, because disaster has come down from Yahweh to the gate of Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'waits anxiously for good,' 'is in anguish for good,' or 'is sick for good.' The Hebrew verb carries the sense of painful longing or distress.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָלָה
  chosen: writhes
  alternatives:
  - waits anxiously
  - is sick
  - suffers
  - is in anguish
  lexicon: HALOT
  rationale: The verb can denote being weak/sick or being in painful anguish. In this judgment context, with the following phrase 'for good,' the sense is not simple illness but pained longing or writhing expectation. 'Writhes' preserves the bodily distress and fits the wordplay with Maroth ('bitternesses').
- source_word: לְטוֹב
  chosen: for good
  alternatives:
  - for prosperity
  - for relief
  - for what is good
  lexicon: HALOT
  rationale: A fairly literal rendering is best. The phrase expresses longing/hope directed toward good or well-being, likely in contrast to the evil/disaster that actually comes. 'For good' keeps the Hebrew terseness and ambiguity.
- source_word: יוֹשֶׁבֶת מָרוֹת
  chosen: the inhabitant of Maroth
  alternatives:
  - the one dwelling in Maroth
  - the daughter of Maroth
  - the residents of Maroth
  lexicon: HALOT
  rationale: The feminine singular participle is a common personification for a town/city and its population. English idiom favors singular collective 'the inhabitant of Maroth' rather than a wooden 'she who dwells.' This also aligns with the surrounding city-laments in Micah 1.
- source_word: מָרוֹת
  chosen: Maroth
  alternatives:
  - Bitternesses (as a glossed place-name)
  lexicon: HALOT
  rationale: As a place-name it should be transliterated per project philosophy. Its likely association with bitterness is better preserved in rationale than forced into the main text.
- source_word: יָרַד
  chosen: has come down
  alternatives:
  - came down
  - descended
  lexicon: HALOT
  rationale: The verb literally means 'went down/came down.' 'Has come down' gives natural English while preserving the directional imagery, likely from the LORD and/or from the highlands toward Jerusalem.
- source_word: רָע
  chosen: disaster
  alternatives:
  - evil
  - calamity
  - harm
  lexicon: HALOT
  rationale: In prophetic judgment contexts, רָע often denotes calamity or disaster rather than moral evil. 'Disaster' avoids implying that moral evil originates in the LORD while still conveying severe judgment.
- source_word: מֵאֵת יְהוָה
  chosen: from the LORD
  alternatives:
  - from Yahweh
  lexicon: HALOT
  rationale: The source of the judgment is explicitly the covenant God. Per doctrine guidelines, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: לשער ירושלם
  chosen: to the gate of Jerusalem
  alternatives:
  - to Jerusalem's gate
  - as far as the gate of Jerusalem
  lexicon: HALOT
  rationale: The singular 'gate' likely functions collectively or representatively for the city's entrance/defenses. 'To the gate of Jerusalem' is the most direct rendering and preserves the image of disaster reaching the capital itself.
