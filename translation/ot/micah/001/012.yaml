theological_decisions:
- issue: Rendering רָע in relation to the LORD
  chosen_reading: disaster
  alternative_readings:
  - evil
  - calamity
  - harm
  rationale: The Hebrew term can denote either moral evil or experiential calamity. Given the immediate context of announced judgment on towns and Jerusalem, the sense is punitive disaster, not moral evil in God. This preserves the text's assertion of divine sovereignty in judgment without importing a claim that the LORD commits moral evil.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; original-language primacy'
