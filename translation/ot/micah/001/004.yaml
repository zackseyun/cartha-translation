theological_decisions:
- issue: Referent of the pronoun in 'beneath him'
  chosen_reading: The pronoun refers to the LORD described in the preceding context,
    portraying creation's response to his coming.
  alternative_readings:
  - A more generic divine presence without explicit repetition of the name
  rationale: The immediate context (Mic 1:3) speaks of the LORD coming forth and treading
    on the high places of the earth. Retaining 'him' rather than substituting 'the
    LORD' preserves the Hebrew cohesion while keeping the referent clear from context.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
