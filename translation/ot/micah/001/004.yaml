id: MIC.1.4
reference: Micah 1:4
source:
  edition: WLC
  text: וְ/נָמַ֤סּוּ הֶֽ/הָרִים֙ תַּחְתָּ֔י/ו וְ/הָ/עֲמָקִ֖ים יִתְבַּקָּ֑עוּ כַּ/דּוֹנַג֙
    מִ/פְּנֵ֣י הָ/אֵ֔שׁ כְּ/מַ֖יִם מֻגָּרִ֥ים בְּ/מוֹרָֽד׃
translation:
  text: And the mountains will melt beneath him, and the valleys will split open,
    like wax before the fire, like waters poured down a slope.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְנָמַסּוּ
  chosen: will melt
  alternatives:
  - will dissolve
  - will liquefy
  lexicon: HALOT
  rationale: נמס commonly denotes melting or dissolving. 'Will melt' is the most natural
    English equivalent here and fits the simile with wax in the next colon.
- source_word: הֶהָרִים
  chosen: the mountains
  alternatives:
  - mountains
  lexicon: HALOT
  rationale: Straightforward rendering of the definite plural noun; the article is
    naturally represented in English as 'the mountains.'
- source_word: תַּחְתָּיו
  chosen: beneath him
  alternatives:
  - under him
  - below him
  lexicon: HALOT
  rationale: The preposition plus 3ms suffix refers back to the LORD in the prior
    verse. 'Beneath him' is idiomatic and preserves the imagery of creation reacting
    under his presence.
- source_word: וְהָעֲמָקִים
  chosen: the valleys
  alternatives:
  - the lowlands
  - the ravines
  lexicon: HALOT
  rationale: עמקים literally denotes valleys/deep places. 'Valleys' is the broad,
    natural English equivalent and pairs well with 'mountains.'
- source_word: יִתְבַּקָּעוּ
  chosen: will split open
  alternatives:
  - will be split
  - will burst apart
  - will be cleft
  lexicon: HALOT
  rationale: The hitpael/imperfect conveys being split apart or bursting open. 'Will
    split open' is vivid, readable, and preserves the dramatic physical imagery.
- source_word: כַּדּוֹנַג
  chosen: like wax
  alternatives:
  - as wax
  lexicon: HALOT
  rationale: דונג is wax. 'Like wax' preserves the simile plainly.
- source_word: מִפְּנֵי הָאֵשׁ
  chosen: before the fire
  alternatives:
  - from before the fire
  - at the presence of the fire
  lexicon: HALOT
  rationale: The phrase literally means 'from before the fire,' an idiom for exposure
    to the fire's presence. 'Before the fire' is concise and idiomatic in English.
- source_word: כְּמַיִם
  chosen: like waters
  alternatives:
  - like water
  lexicon: HALOT
  rationale: The Hebrew plural is retained as 'waters' to preserve the poetic register
    and the image of flowing masses rather than an abstract substance.
- source_word: מֻגָּרִים
  chosen: poured down
  alternatives:
  - poured out
  - made to flow
  - spilled
  lexicon: HALOT
  rationale: From נגר, the passive participle denotes something caused to flow or
    be poured. In context with the following noun, 'poured down' best captures downhill
    movement.
- source_word: בְּמוֹרָד
  chosen: down a slope
  alternatives:
  - on a slope
  - down a steep place
  - down an incline
  lexicon: HALOT
  rationale: מורד denotes a descent or slope. 'Down a slope' expresses the directional
    force of the image in natural English.
