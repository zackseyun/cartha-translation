id: MIC.1.13
reference: Micah 1:13
source:
  edition: WLC
  text: רְתֹ֧ם הַ/מֶּרְכָּבָ֛ה לָ/רֶ֖כֶשׁ יוֹשֶׁ֣בֶת לָכִ֑ישׁ רֵאשִׁ֨ית חַטָּ֥את הִיא֙
    לְ/בַת צִיּ֔וֹן כִּי בָ֥/ךְ נִמְצְא֖וּ פִּשְׁעֵ֥י יִשְׂרָאֵֽל־־׃
translation:
  text: Harness the chariot to the swift horse, inhabitant of Lachish; she was the
    beginning of sin for daughter Zion, for in you were found the transgressions of
    Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'O inhabitress of Lachish' or 'you who dwell in Lachish'; the Hebrew
      uses a feminine singular form addressing the city as a woman.
    reason: lexical_alternative
  - marker: b
    text: Or 'she was the first cause of sin for daughter Zion.' The phrase may indicate
      that Lachish was an originating point from which Judah adopted Israel's rebellion.
    reason: alternative_reading
  - marker: c
    text: '''Daughter Zion'' is a Hebrew poetic personification of Zion/Jerusalem.'
    reason: cultural_note
  - marker: d
    text: Or 'the rebellions of Israel'; the Hebrew word can emphasize willful revolt,
      not merely wrongdoing in general.
    reason: lexical_alternative
lexical_decisions:
- source_word: רְתֹם
  chosen: Harness
  alternatives:
  - Yoke
  - Bind
  lexicon: HALOT
  rationale: Imperative masculine singular from רתם, a command to hitch or harness
    animals for a vehicle. 'Harness' is natural modern English and fits the military-flight
    context.
- source_word: הַמֶּרְכָּבָה
  chosen: the chariot
  alternatives:
  - the chariot-team
  - the war chariot
  lexicon: HALOT
  rationale: מֶרְכָּבָה commonly denotes a chariot or chariotry. Singular is retained
    as in Hebrew; English idiom allows this as a representative singular.
- source_word: לָרֶכֶשׁ
  chosen: to the swift horse
  alternatives:
  - to the steed
  - to the team of horses
  lexicon: HALOT
  rationale: רֶכֶשׁ refers to a swift riding animal/steed. 'Swift horse' makes the
    sense clear in contemporary English and preserves the likely wordplay with Lachish's
    military reputation.
- source_word: יוֹשֶׁבֶת לָכִישׁ
  chosen: inhabitant of Lachish
  alternatives:
  - O inhabitress of Lachish
  - you who dwell in Lachish
  lexicon: HALOT
  rationale: A feminine singular participle used vocatively for the city/personified
    population. 'Inhabitant of Lachish' keeps the personification concise; the feminine
    nuance is reflected by later 'she'.
- source_word: רֵאשִׁית חַטָּאת הִיא
  chosen: she was the beginning of sin
  alternatives:
  - she was the first cause of sin
  - she was the beginning of the sin
  lexicon: HALOT
  rationale: רֵאשִׁית means beginning/first part; חַטָּאת here is best taken as sin
    rather than sin offering. The clause states that Lachish was an originating point
    of sin for Zion, not merely an example of it.
- source_word: לְבַת צִיּוֹן
  chosen: for daughter Zion
  alternatives:
  - for the daughter of Zion
  - for Zion
  lexicon: HALOT
  rationale: The construct phrase is a standard personification for Jerusalem/Zion.
    'Daughter Zion' preserves the Hebrew idiom more transparently than flattening
    it to simply 'Zion'.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding accusation. 'For' works smoothly
    in English while preserving the explanatory force.
- source_word: בָךְ
  chosen: in you
  alternatives:
  - within you
  - among you
  lexicon: HALOT
  rationale: Second feminine singular, addressing Lachish as a city. 'In you' preserves
    the direct address and personification.
- source_word: נִמְצְאוּ
  chosen: were found
  alternatives:
  - were discovered
  - were present
  lexicon: HALOT
  rationale: Niphal perfect plural of מצא, passive/reflexive sense. 'Were found' is
    the most straightforward rendering.
- source_word: פִּשְׁעֵי יִשְׂרָאֵל
  chosen: the transgressions of Israel
  alternatives:
  - the rebellions of Israel
  - Israel's acts of rebellion
  lexicon: HALOT
  rationale: פֶּשַׁע denotes rebellion/transgression, often covenantal revolt. 'Transgressions'
    is clear and suitably weighty; 'of Israel' is retained rather than paraphrased.
