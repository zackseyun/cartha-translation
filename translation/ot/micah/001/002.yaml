id: MIC.1.2
reference: Micah 1:2
source:
  edition: WLC
  text: שִׁמְעוּ֙ עַמִּ֣ים כֻּלָּ֔/ם הַקְשִׁ֖יבִי אֶ֣רֶץ וּ/מְלֹאָ֑/הּ וִ/יהִי֩ אֲדֹנָ֨/י
    יְהוִ֤ה בָּ/כֶם֙ לְ/עֵ֔ד אֲדֹנָ֖/י מֵ/הֵיכַ֥ל קָדְשֽׁ/וֹ׃
translation:
  text: Hear, all you peoples; pay attention, O earth, and all that fills it. And
    let the Lord GOD be a witness against you, the Lord from his holy temple.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all peoples.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the Lord YHWH'; traditionally rendered 'the Lord GOD' in this compound
      title.
    reason: lexical_alternative
  - marker: c
    text: 'Or ''let the Lord GOD be a witness among you,'' though in context the sense
      is likely judicial: ''against you.'''
    reason: alternative_reading
  - marker: d
    text: Or 'from his holy palace' or 'from his holy sanctuary.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen
  lexicon: HALOT
  rationale: Imperative plural of שׁמע, a standard summons to hear attentively. 'Hear'
    preserves the prophetic/juridical tone better than the more colloquial 'listen.'
- source_word: עַמִּים כֻּלָּם
  chosen: all you peoples
  alternatives:
  - all peoples
  - all nations
  lexicon: HALOT
  rationale: Plural עַמִּים addresses multiple peoples collectively. 'All you peoples'
    preserves the direct address and the plural force better than 'all nations,' which
    can over-politicize the term.
- source_word: הַקְשִׁיבִי
  chosen: pay attention
  alternatives:
  - give ear
  - listen attentively
  lexicon: HALOT
  rationale: Hiphil imperative feminine singular addressed to the earth. 'Pay attention'
    is clear modern English while retaining the force of a formal summons; 'give ear'
    is more traditional but archaic.
- source_word: אֶרֶץ וּמְלֹאָהּ
  chosen: O earth, and all that fills it
  alternatives:
  - O earth, and its fullness
  - O land, and all that is in it
  lexicon: HALOT
  rationale: אֶרֶץ here is best taken globally as 'earth' in parallel with 'all you
    peoples.' מְלֹא means fullness/full content. 'All that fills it' is idiomatic
    and preserves the sense of everything contained within the earth.
- source_word: וִיהִי
  chosen: And let ... be
  alternatives:
  - and may ... be
  lexicon: HALOT
  rationale: Jussive of היה introducing a solemn wish/declaration. 'Let ... be' is
    the most natural English equivalent for the jussive force.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Sovereign LORD
  lexicon: HALOT
  rationale: The compound divine title אֲדֹנָי יְהוִה is conventionally rendered 'Lord
    GOD' in English to avoid 'Lord LORD' while preserving both elements. Per doctrine,
    YHWH is rendered 'the LORD'; in this compound, small-caps convention is commonly
    represented as 'GOD.'
- source_word: בָּכֶם
  chosen: against you
  alternatives:
  - among you
  - with you
  lexicon: HALOT
  rationale: 'With לְעֵד (''for a witness''), the preposition here carries adversative/judicial
    force in context: the Lord is testifying against the addressed peoples/earth.
    ''Against you'' best captures the courtroom setting.'
- source_word: לְעֵד
  chosen: a witness
  alternatives:
  - for a witness
  - as witness
  lexicon: HALOT
  rationale: עֵד is a legal term. 'A witness' preserves the juridical imagery central
    to the prophetic accusation.
- source_word: אֲדֹנָי מֵהֵיכַל קָדְשׁוֹ
  chosen: the Lord from his holy temple
  alternatives:
  - the Lord from his holy palace
  - the Lord from his holy sanctuary
  lexicon: HALOT
  rationale: הֵיכָל can denote temple/palace. In reference to God's holy dwelling,
    'temple' is the most recognizable and contextually fitting English rendering,
    while preserving the imagery of divine testimony issuing from the heavenly/holy
    sanctuary.
