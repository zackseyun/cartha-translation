theological_decisions:
- issue: Rendering the divine name יְהוָה in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - the Sovereign LORD
  rationale: The doctrine excerpt specifies יְהוָה → 'the LORD' as the default. In
    the fixed Hebrew compound אֲדֹנָי יְהוִה, English convention avoids the awkward
    'Lord LORD' by rendering the second element as 'GOD.' This preserves reverential
    convention and signals the underlying divine name without transliterating it in
    the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Scope of אֶרֶץ
  chosen_reading: earth
  alternative_readings:
  - land
  rationale: Because the verse addresses 'all you peoples' and then 'earth and all
    that fills it,' the broader cosmic/judicial scope is more likely than a narrower
    reference to the land of Israel alone. This preserves the universal summons without
    importing a narrower national frame.
