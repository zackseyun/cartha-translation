id: MIC.1.11
reference: Micah 1:11
source:
  edition: WLC
  text: עִבְרִ֥י לָ/כֶ֛ם יוֹשֶׁ֥בֶת שָׁפִ֖יר עֶרְיָה בֹ֑שֶׁת לֹ֤א יָֽצְאָה֙ יוֹשֶׁ֣בֶת
    צַֽאֲנָ֔ן מִסְפַּד֙ בֵּ֣ית הָאֵ֔צֶל יִקַּ֥ח מִ/כֶּ֖ם עֶמְדָּתֽ/וֹ־׃
translation:
  text: Pass on, naked and in shame, inhabitant of Shaphir. The inhabitant of Zaanan
    has not come out. The lamentation of Beth-ezel will take away from you its support.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Shaphir, Zaanan, and Beth-ezel are place names. Micah likely uses wordplay
      on their sounds or meanings: Shaphir may suggest beauty, Zaanan sounds like
      ''come out,'' and Beth-ezel may suggest a nearby house or place at one''s side.'
    reason: cultural_note
  - marker: b
    text: Or 'Pass by' instead of 'Pass on.' The command may imply going away into
      exile.
    reason: lexical_alternative
  - marker: c
    text: Or 'The mourning of Beth-ezel takes away from you its standing place.' The
      final clause is difficult; the Hebrew may refer to the loss of nearby support
      or refuge.
    reason: lexical_alternative
lexical_decisions:
- source_word: עִבְרִי
  chosen: Pass on
  alternatives:
  - Pass by
  - Go on
  lexicon: HALOT
  rationale: Imperative feminine singular from עבר, addressed to the feminine personified
    'inhabitant/daughter' of the town. 'Pass on' fits the context of forced movement/exile
    better than a neutral 'pass by.'
- source_word: לָכֶם
  chosen: (implicit in the address)
  alternatives:
  - for yourselves
  - to you
  lexicon: HALOT
  rationale: The preposition plus pronoun is difficult in context and often treated
    idiomatically with the imperative. English reads more naturally without a separate
    explicit rendering; the sense is absorbed into the command addressed to the inhabitants.
- source_word: יוֹשֶׁבֶת שָׁפִיר
  chosen: inhabitant of Shaphir
  alternatives:
  - O inhabitant of Shaphir
  - daughter of Shaphir
  lexicon: HALOT
  rationale: The feminine singular participle personifies the town as a female inhabitant.
    'Inhabitant of Shaphir' preserves the personification without over-paraphrasing.
- source_word: שָׁפִיר
  chosen: Shaphir
  alternatives:
  - Shaphir (beautiful/fair)
  lexicon: HALOT
  rationale: Place name is transliterated per philosophy. Its likely association with
    'beauty/fairness' contributes to the wordplay but should not be forced into the
    main text.
- source_word: עֶרְיָה בֹשֶׁת
  chosen: naked and in shame
  alternatives:
  - naked in shame
  - stripped bare in disgrace
  lexicon: HALOT
  rationale: The pair expresses exposure and humiliation. 'Naked and in shame' is
    natural English and preserves both elements without excessive expansion.
- source_word: לֹא יָצְאָה
  chosen: has not come out
  alternatives:
  - did not come out
  - does not come out
  lexicon: HALOT
  rationale: The perfect is rendered with present relevance in English. The phrase
    likely implies failure to come out either for battle, aid, or mourning; the more
    literal wording preserves the ambiguity.
- source_word: יוֹשֶׁבֶת צַאֲנָן
  chosen: the inhabitant of Zaanan
  alternatives:
  - O inhabitant of Zaanan
  - daughter of Zaanan
  lexicon: HALOT
  rationale: Same personified-town construction as earlier. The definite form in English
    helps the line read smoothly.
- source_word: צַאֲנָן
  chosen: Zaanan
  alternatives:
  - Zaanan (echoing 'come out')
  lexicon: HALOT
  rationale: Transliterated place name. The probable sound-play with יצא ('come out')
    is preserved only by note, not imported into the main text.
- source_word: מִסְפַּד בֵּית הָאֵצֶל
  chosen: The lamentation of Beth-ezel
  alternatives:
  - The mourning of Beth-ezel
  - The wailing of Beth-ezel
  lexicon: HALOT
  rationale: מִסְפַּד denotes lamentation/mourning, likely either the mourning taking
    place in Beth-ezel or mourning over it. 'Lamentation' is broad enough to preserve
    the ambiguity.
- source_word: בֵּית הָאֵצֶל
  chosen: Beth-ezel
  alternatives:
  - Beth-ezel ('house beside/nearby')
  lexicon: HALOT
  rationale: Place name transliterated. The likely meaning 'house at the side/nearby
    house' underlies the wordplay but is better preserved in a footnote.
- source_word: יִקַּח
  chosen: will take away
  alternatives:
  - takes away
  - will receive
  lexicon: HALOT
  rationale: לקח commonly means 'take.' In this context, with מן and the following
    noun, 'take away' best conveys removal or deprivation.
- source_word: מִכֶּם
  chosen: from you
  alternatives:
  - from you all
  lexicon: HALOT
  rationale: Second masculine plural refers to the people addressed collectively.
    Standard English 'from you' is sufficient.
- source_word: עֶמְדָּתוֹ
  chosen: its support
  alternatives:
  - its standing place
  - its shelter
  - its place to stand
  lexicon: HALOT
  rationale: From עמד, denoting standing-place/support. The sense is that Beth-ezel's
    lament/removal deprives the hearers of a nearby support or refuge. 'Its support'
    is concise and contextually fitting, though the exact nuance is difficult.
