id: MIC.1.16
reference: Micah 1:16
source:
  edition: WLC
  text: קָרְחִ֣י וָ/גֹ֔זִּי עַל בְּנֵ֖י תַּעֲנוּגָ֑יִ/ךְ הַרְחִ֤בִי קָרְחָתֵ/ךְ֙ כַּ/נֶּ֔שֶׁר
    כִּ֥י גָל֖וּ מִמֵּֽ/ךְ־׃ס
translation:
  text: Make yourself bald and shave your head for the children of your delight; enlarge
    your baldness like the eagle, for they have gone from you into exile.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like the vulture.' The Hebrew נֶשֶׁר may refer to a large carrion bird
      rather than specifically an eagle; the image in either case is of conspicuous
      baldness.
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרְחִי
  chosen: Make yourself bald
  alternatives:
  - Shave yourself bald
  - Become bald
  lexicon: HALOT
  rationale: Imperative feminine singular from קרח, an idiom of mourning. 'Make yourself
    bald' preserves the directness and the causative sense without over-paraphrasing.
- source_word: וָגֹזִּי
  chosen: and shave your head
  alternatives:
  - and shear yourself
  - and cut off your hair
  lexicon: HALOT
  rationale: From גזז, literally 'shear/cut.' In parallel with קָרְחִי and in a mourning
    context, 'shave your head' communicates the intended action clearly in modern
    English.
- source_word: עַל
  chosen: for
  alternatives:
  - because of
  - over
  lexicon: HALOT
  rationale: Here עַל introduces the cause/object of lament. 'For' is concise and
    natural in English, while still conveying mourning on account of the following
    phrase.
- source_word: בְּנֵי תַּעֲנוּגָיִךְ
  chosen: the children of your delight
  alternatives:
  - your delightful children
  - your cherished children
  - the sons of your delights
  lexicon: HALOT
  rationale: The construct phrase is literally 'sons/children of your delights.' 'Children
    of your delight' preserves the Hebrew relational idiom and avoids narrowing בנים
    to males only where offspring generally are meant.
- source_word: הַרְחִבִי
  chosen: enlarge
  alternatives:
  - make wide
  - widen
  lexicon: HALOT
  rationale: Imperative from רחב. In context it means to make the bald patch broader.
    'Enlarge' is idiomatic and retains the imperative force.
- source_word: קָרְחָתֵךְ
  chosen: your baldness
  alternatives:
  - your bald patch
  - the baldness of your head
  lexicon: HALOT
  rationale: Noun for baldness/bald spot. 'Your baldness' is slightly more formal
    but matches the Hebrew noun and works with 'enlarge.'
- source_word: כַּנֶּשֶׁר
  chosen: like the eagle
  alternatives:
  - like the vulture
  - like a great bird of prey
  lexicon: HALOT
  rationale: נשר traditionally denotes 'eagle,' though some argue for a vulture species.
    'Eagle' remains the standard rendering and is intelligible; the zoological alternative
    is worth preserving in a footnote because the comparison concerns conspicuous
    baldness.
- source_word: כִּי גָלוּ
  chosen: for they have gone ... into exile
  alternatives:
  - for they are exiled
  - because they have been taken away
  lexicon: HALOT
  rationale: גלה in the Qal commonly means 'go into exile' or 'be carried away.' The
    perfect here states the reason for mourning. 'Have gone ... into exile' preserves
    the exile motif explicitly.
- source_word: מִמֵּךְ
  chosen: from you
  alternatives:
  - away from you
  lexicon: HALOT
  rationale: The preposition marks separation from the addressed city/personified
    community. 'From you' is direct and sufficient in context.
