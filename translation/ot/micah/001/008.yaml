id: MIC.1.8
reference: Micah 1:8
source:
  edition: WLC
  text: עַל זֹאת֙ אֶסְפְּדָ֣ה וְ/אֵילִ֔ילָה אֵילְכָ֥ה שילל וְ/עָר֑וֹם אֶעֱשֶׂ֤ה מִסְפֵּד֙
    כַּ/תַּנִּ֔ים וְ/אֵ֖בֶל כִּ/בְנ֥וֹת יַעֲנָֽה־׃
translation:
  text: Because of this I will lament and wail; I will go stripped and naked. I will
    make a lament like the jackals, and mourning like the daughters of the ostrich.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will go barefoot and naked.' The Hebrew term translated 'stripped'
      is difficult and may refer to going barefoot as a sign of mourning and humiliation.
    reason: lexical_alternative
  - marker: b
    text: Literally 'like the daughters of the ostrich,' a Hebrew poetic expression
      for ostriches or female ostriches.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶסְפְּדָה
  chosen: I will lament
  alternatives:
  - I will mourn
  - I will wail
  lexicon: HALOT
  rationale: The verb ספד commonly denotes lamenting, often in mourning contexts.
    'Lament' fits the parallelism with the following verb for louder wailing and avoids
    collapsing the two terms into one English gloss.
- source_word: וְאֵילִילָה
  chosen: and wail
  alternatives:
  - and howl
  - and cry out
  lexicon: HALOT
  rationale: ילל expresses a louder, more piercing cry than ספד. 'Wail' preserves
    the emotional intensity without sounding overly animalistic at this point in the
    verse.
- source_word: אֵילְכָה שילל וְעָרוֹם
  chosen: I will go stripped and naked
  alternatives:
  - I will go barefoot and naked
  - I will go plundered and naked
  lexicon: HALOT
  rationale: The phrase describes a state of public mourning and humiliation. The
    adjective עָרוֹם clearly means 'naked'; שילל is difficult, but in context is commonly
    understood as 'stripped' or possibly 'barefoot.' 'Stripped and naked' best conveys
    destitution and shame in idiomatic English while preserving the paired descriptors.
    The 'barefoot' alternative is worth preserving in a footnote because it is a common
    interpretation tied to mourning practice.
- source_word: מִסְפֵּד
  chosen: a lament
  alternatives:
  - mourning song
  - wailing
  lexicon: HALOT
  rationale: The noun denotes lamentation or mourning expression. 'A lament' is concise
    and natural, and it distinguishes this clause from the following noun אֵבֶל.
- source_word: כַּתַּנִּים
  chosen: like the jackals
  alternatives:
  - like the dragons
  lexicon: HALOT
  rationale: תַּנִּים in prophetic poetry commonly refers to jackals, known for eerie
    cries in desolate places. 'Dragons' reflects older tradition but not the likely
    zoological sense here.
- source_word: וְאֵבֶל
  chosen: and mourning
  alternatives:
  - and grief
  - and lamentation
  lexicon: HALOT
  rationale: אֵבֶל denotes mourning as a state or act. 'Mourning' pairs well with
    the previous 'lament' while preserving a slight semantic distinction.
- source_word: כִּבְנוֹת יַעֲנָה
  chosen: like the daughters of the ostrich
  alternatives:
  - like ostriches
  - like female ostriches
  lexicon: HALOT
  rationale: The Hebrew literally says 'daughters of the ostrich.' Retaining the literal
    familial expression preserves the poetic texture, while English readers can still
    understand the zoological reference. A simpler gloss is preserved in a footnote
    as a lexical alternative.
