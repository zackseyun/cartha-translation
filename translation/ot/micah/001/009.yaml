theological_decisions:
- issue: Referent of the feminine suffixes and verbs
  chosen_reading: The verse speaks of the personified afflicted city/nation (in context,
    Samaria/Zion imagery), rendered with impersonal English for the calamity.
  alternative_readings:
  - 'The subject could be taken more strictly as Samaria herself: ''her wounds are
    incurable, for she has come...'''
  - The advancing subject after the second clause could be the judgment/plague rather
    than the city.
  rationale: The Hebrew shifts through personified and impersonal expressions. English
    smooths this by rendering the disaster as 'it,' while preserving 'her wound' to
    reflect the feminine personification in context.
