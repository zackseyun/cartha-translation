id: MIC.1.9
reference: Micah 1:9
source:
  edition: WLC
  text: כִּ֥י אֲנוּשָׁ֖ה מַכּוֹתֶ֑י/הָ כִּי בָ֨אָה֙ עַד יְהוּדָ֔ה נָגַ֛ע עַד שַׁ֥עַר
    עַמִּ֖/י עַד יְרוּשָׁלִָֽם־־־־׃
translation:
  text: For her wound is incurable, for it has come as far as Judah; it has reached
    to the gate of my people, to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her wounds are incurable'; the Hebrew form for 'wounds' is plural, though
      the sense may be collective.
    reason: lexical_alternative
  - marker: b
    text: Or 'it has touched the gate of my people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲנוּשָׁה
  chosen: incurable
  alternatives:
  - grievous
  - desperate
  lexicon: HALOT
  rationale: The adjective from אנשׁ in this form conveys a condition that is beyond
    healing or desperately sick. 'Incurable' best fits the prophetic context of judgment
    and pairs naturally with 'wound.'
- source_word: מַכּוֹתֶיהָ
  chosen: her wound
  alternatives:
  - her wounds
  - her blow
  lexicon: HALOT
  rationale: Although the form is morphologically plural, Hebrew often uses plural
    forms for an abstract or collective sense. In English, singular 'wound' reads
    naturally with 'is incurable' and matches the sense of the nation's affliction
    as a single calamity. The feminine suffix refers back to the city/nation personified
    in context, likely Samaria.
- source_word: בָאָה
  chosen: it has come
  alternatives:
  - she has come
  - it came
  lexicon: HALOT
  rationale: 'The feminine singular verb agrees with the personified subject of the
    calamity/wound. English idiom favors impersonal ''it has come'' for the advancing
    disaster. The perfect is rendered with present relevance: ''has come.'''
- source_word: עַד יְהוּדָה
  chosen: as far as Judah
  alternatives:
  - to Judah
  - up to Judah
  lexicon: HALOT
  rationale: עַד marks extent or limit. 'As far as Judah' clearly expresses the spread
    of the judgment from Samaria into the southern kingdom.
- source_word: נָגַע
  chosen: it has reached
  alternatives:
  - it has touched
  - he has struck
  lexicon: HALOT
  rationale: נגע commonly means 'touch, reach, strike.' In this context of an advancing
    calamity, 'has reached' best conveys arrival at a boundary without over-specifying
    the manner. The masculine form may be impersonal or shift to the disaster/judgment
    as subject.
- source_word: שַׁעַר
  chosen: the gate
  alternatives:
  - the city gate
  - the entrance
  lexicon: HALOT
  rationale: '''Gate'' is the straightforward rendering and preserves the concrete
    image of the threat arriving at the city''s threshold.'
- source_word: עַמִּי
  chosen: my people
  alternatives:
  - my nation
  lexicon: HALOT
  rationale: The first-person suffix is retained. 'My people' preserves the covenantal
    and prophetic tone better than 'my nation.'
- source_word: יְרוּשָׁלִָם
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name.
