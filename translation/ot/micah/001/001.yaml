id: MIC.1.1
reference: Micah 1:1
source:
  edition: WLC
  text: דְּבַר יְהוָ֣ה אֲשֶׁ֣ר הָיָ֗ה אֶל מִיכָה֙ הַ/מֹּ֣רַשְׁתִּ֔י בִּ/ימֵ֥י יוֹתָ֛ם אָחָ֥ז יְחִזְקִיָּ֖ה מַלְכֵ֣י יְהוּדָ֑ה אֲשֶׁר חָזָ֥ה עַל שֹׁמְר֖וֹן וִ/ירֽוּשָׁלִָֽם־׀־־־׃
translation:
  text: The word of Yahweh that came to Micah the Morashtite in the days of Jotham, Ahaz, and Hezekiah, kings of Judah, which he saw concerning Samaria and Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the Morashtite,' that is, a man from Moresheth.
    reason: cultural_note
  - marker: b
    text: Or 'which he saw against Samaria and Jerusalem.' The preposition can mark the subject matter or, in context, an adversative sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּבַר יְהוָה
  chosen: The word of the LORD
  alternatives:
  - The message of the LORD
  - The word from the LORD
  lexicon: HALOT
  rationale: דְּבַר in prophetic superscriptions commonly introduces a prophetic word/message. 'The word of the LORD' preserves the established prophetic formula while remaining natural English. יְהוָה is rendered 'the LORD' per doctrine guidance for the divine name.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲשֶׁר הָיָה אֶל
  chosen: that came to
  alternatives:
  - which was to
  - that was directed to
  lexicon: HALOT
  rationale: The idiom 'was to' with אֶל in prophetic headings is naturally rendered in English as 'came to,' expressing reception of divine revelation rather than mere existence.
- source_word: מִיכָה
  chosen: Micah
  rationale: Personal name transliterated by standard English convention, in keeping with the translation philosophy.
- source_word: הַמֹּרַשְׁתִּי
  chosen: the Morashtite
  alternatives:
  - from Moresheth
  - the man from Moresheth
  lexicon: HALOT
  rationale: The gentilic form identifies Micah by origin. 'The Morashtite' is concise and formally close to the Hebrew; 'from Moresheth' is possible but less directly reflects the gentilic adjective.
- source_word: בִּימֵי
  chosen: in the days of
  alternatives:
  - during the reigns of
  lexicon: HALOT
  rationale: The Hebrew phrase literally means 'in the days of' and is idiomatic in regnal dating formulas. It also allows the following list of kings to stand naturally.
- source_word: יוֹתָם אָחָז יְחִזְקִיָּה
  chosen: Jotham, Ahaz, and Hezekiah
  rationale: Standard English transliterations of the royal names; 'and' added before the final name for natural English list style.
- source_word: מַלְכֵי יְהוּדָה
  chosen: kings of Judah
  alternatives:
  - the kings of Judah
  lexicon: HALOT
  rationale: Construct phrase rendered straightforwardly. English omits the article naturally in apposition after the list of names.
- source_word: אֲשֶׁר חָזָה
  chosen: which he saw
  alternatives:
  - that he saw
  - which he envisioned
  lexicon: HALOT
  rationale: חָזָה is the standard prophetic verb 'to see' in the sense of receiving visionary revelation. 'Which he saw' preserves the prophetic imagery and links back to 'word' without over-interpreting.
- source_word: עַל
  chosen: concerning
  alternatives:
  - about
  - against
  - over
  lexicon: HALOT
  rationale: In this superscription עַל introduces the subject matter of the vision. 'Concerning' is broad enough to include both judgment and subject reference without prematurely narrowing it to 'against.'
- source_word: שֹׁמְרוֹן וִירוּשָׁלָם
  chosen: Samaria and Jerusalem
  rationale: Standard English place-name forms. These cities stand metonymically for the northern and southern kingdoms, but the text names the cities themselves, so the translation preserves that wording.
