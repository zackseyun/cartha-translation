theological_decisions:
- issue: Personification of the city with feminine suffixes
  chosen_reading: Use 'her' for Samaria
  alternative_readings:
  - Use 'its' for Samaria
  rationale: The Hebrew suffixes are feminine singular, matching the city as personified.
    Rendering them as 'her' preserves the prophetic rhetoric and imagery of a city
    brought low, while remaining natural in English.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
