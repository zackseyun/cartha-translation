id: MIC.1.6
reference: Micah 1:6
source:
  edition: WLC
  text: וְ/שַׂמְתִּ֥י שֹׁמְר֛וֹן לְ/עִ֥י הַ/שָּׂדֶ֖ה לְ/מַטָּ֣עֵי כָ֑רֶם וְ/הִגַּרְתִּ֤י
    לַ/גַּי֙ אֲבָנֶ֔י/הָ וִ/יסֹדֶ֖י/הָ אֲגַלֶּֽה׃
translation:
  text: So I will make Samaria a heap in the open country, a place for planting vineyards;
    I will pour her stones down into the valley and uncover her foundations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a ruin heap in the field.' The Hebrew phrase is compact and may be rendered
      more formally.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will hurl her stones into the ravine.' The verb literally conveys
      causing them to flow or pour down.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתִּי
  chosen: So I will make
  alternatives:
  - And I will make
  - Therefore I will make
  lexicon: HALOT
  rationale: Qal perfect 1cs with prefixed conjunction in prophetic discourse functions
    as a future declaration. 'Make' is the plain sense of שׂוּם here. 'So' captures
    the discourse connection naturally in English without overstating causation.
- source_word: שֹׁמְרוֹן
  chosen: Samaria
  lexicon: HALOT
  rationale: Proper place name; standard English transliteration is appropriate.
- source_word: לְעִי
  chosen: a heap
  alternatives:
  - a ruin heap
  - a mound of ruins
  lexicon: HALOT
  rationale: עִי denotes a ruin-heap or heap of rubble. 'A heap' is concise and idiomatic,
    while the following imagery clarifies the destructive sense.
- source_word: הַשָּׂדֶה
  chosen: the open country
  alternatives:
  - the field
  - the countryside
  lexicon: HALOT
  rationale: שָׂדֶה literally means 'field,' but with עיר reduced to ruins the phrase
    describes a site out in open land rather than an urban center. 'Open country'
    communicates the contrast more naturally in English.
- source_word: לְמַטָּעֵי כָרֶם
  chosen: a place for planting vineyards
  alternatives:
  - for vineyard plantings
  - for planting a vineyard
  lexicon: HALOT
  rationale: 'The phrase is purpose/result language: the city site becomes suitable
    for vineyard planting. ''A place for planting vineyards'' is readable and preserves
    the agricultural image.'
- source_word: וְהִגַּרְתִּי
  chosen: I will pour
  alternatives:
  - I will hurl
  - I will cause to flow down
  lexicon: HALOT
  rationale: The Hiphil of נגר conveys causing to flow/pour down. With stones as object,
    the image is of stones being poured or tumbled downhill. 'Pour' preserves the
    vivid metaphor better than flattening it to 'throw.'
- source_word: לַגַּי
  chosen: into the valley
  alternatives:
  - into the ravine
  - into the wadi
  lexicon: HALOT
  rationale: גַּי refers to a valley or ravine. 'Valley' is the most accessible default;
    'ravine' is possible but narrower.
- source_word: אֲבָנֶיהָ
  chosen: her stones
  alternatives:
  - its stones
  lexicon: HALOT
  rationale: The feminine singular suffix refers to the city Samaria. English may
    use 'it' for a city, but 'her' preserves the common biblical personification of
    cities.
- source_word: וִיסֹדֶיהָ
  chosen: her foundations
  alternatives:
  - its foundations
  - her foundation stones
  lexicon: HALOT
  rationale: יְסוֹד denotes foundation(s). Plural in Hebrew is best kept in English.
    'Her' continues the city personification.
- source_word: אֲגַלֶּה
  chosen: uncover
  alternatives:
  - lay bare
  - expose
  lexicon: HALOT
  rationale: גלה in the Piel means to uncover or lay bare. 'Uncover' is direct and
    idiomatic, preserving the image of total demolition down to the foundations.
