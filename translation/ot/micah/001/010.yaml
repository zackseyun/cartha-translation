id: MIC.1.10
reference: Micah 1:10
source:
  edition: WLC
  text: בְּ/גַת֙ אַל תַּגִּ֔ידוּ בָּכ֖וֹ אַל תִּבְכּ֑וּ בְּ/בֵ֣ית לְעַפְרָ֔ה עָפָ֖ר
    התפלשתי־־׃
translation:
  text: In Gath, do not tell it; in Acco, do not weep. In Beth-leaphrah, roll yourself
    in the dust.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Weep not at all' or 'Do not weep.' The Hebrew wording
      is difficult; the main text follows a common place-name wordplay reading ('Acco').
    reason: alternative_reading
  - marker: b
    text: Beth-leaphrah likely sounds like 'house of dust,' matching the following
      word 'dust.'
    reason: cultural_note
  - marker: c
    text: The Hebrew form behind 'roll yourself' is written as first person ('I have
      rolled myself') in the consonantal text; many take it as an imperative here
      because of the context.
    reason: textual_variant
lexical_decisions:
- source_word: בְּגַת
  chosen: In Gath
  alternatives:
  - At Gath
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated, following the
    philosophy for names. The preposition ב is naturally rendered 'in' here.
- source_word: אַל תַּגִּידוּ
  chosen: do not tell it
  alternatives:
  - do not announce it
  - do not declare it
  lexicon: HALOT
  rationale: נגד in Hiphil means to tell, report, or declare. 'Tell it' preserves
    the terse allusive force and echoes the likely intertextual resonance with 2 Samuel
    1:20 without over-expanding the implied object.
- source_word: בָּכוֹ אַל תִּבְכּוּ
  chosen: in Acco, do not weep
  alternatives:
  - weep not at all
  - do not weep bitterly
  - at Beth-le-aphrah, weep not
  lexicon: HALOT
  rationale: The consonantal text can be read as an infinitive absolute plus imperfect
    from בכה ('weep, do not weep'), yielding an emphatic prohibition. However, many
    interpreters understand בָּכוֹ as a place-name wordplay ('in Acco'), likely reflected
    in the ancient allusion 'Tell it not in Gath; weep not at Acco.' Because the Hebrew
    spelling permits this interpretive rendering and it preserves the sequence of
    town-name puns in the context, the main text adopts the place-name reading, while
    preserving the more literal verbal reading in a footnote.
- source_word: בְּבֵית לְעַפְרָה
  chosen: In Beth-leaphrah
  alternatives:
  - In Beth-le-aphrah
  - At House of Dust
  lexicon: HALOT
  rationale: Proper place name transliterated. The name likely means 'house of dust,'
    which sets up the wordplay with the following עָפָר ('dust'), but the main text
    keeps the name as a name rather than translating it.
- source_word: עָפָר
  chosen: dust
  alternatives:
  - dirt
  lexicon: HALOT
  rationale: Standard gloss is 'dust.' This preserves the wordplay with Beth-leaphrah
    and the mourning/humiliation imagery.
- source_word: התפלשתי
  chosen: roll yourself
  alternatives:
  - wallow yourself
  - I have rolled myself
  lexicon: HALOT
  rationale: The ketiv form appears first person singular ('I have rolled myself'),
    but the context strongly favors an imperative addressed to the town/personified
    inhabitants, and many understand this as a scribal/orthographic issue behind the
    traditional imperative sense. 'Roll yourself' best fits the prophetic taunt and
    parallel imperatives. The first-person reading is preserved in a footnote as a
    textual alternative.
