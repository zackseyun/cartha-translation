id: MIC.7.8
reference: Micah 7:8
source:
  edition: WLC
  text: אַֽל תִּשְׂמְחִ֤י אֹיַ֨בְתִּ/י֙ לִ֔/י כִּ֥י נָפַ֖לְתִּי קָ֑מְתִּי כִּֽי אֵשֵׁ֣ב
    בַּ/חֹ֔שֶׁךְ יְהוָ֖ה א֥וֹר לִֽ/י־־׃ס
translation:
  text: Do not rejoice over me, my enemy; though I have fallen, I will rise. Though
    I sit in darkness, the LORD will be a light to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Do not gloat over me, my enemy.' The Hebrew verb means 'rejoice/be
      glad'; 'gloat' brings out the hostile context but is more interpretive.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew perfect verbs here are used in poetic context for confident reversal:
      literally, ''I have fallen, I have arisen.'' Many translators render the second
      verb with future sense: ''I will rise.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not let yourself
  - Never
  lexicon: HALOT
  rationale: Negative particle used for prohibition; straightforwardly rendered as
    an imperative prohibition in English.
- source_word: תִּשְׂמְחִי
  chosen: rejoice
  alternatives:
  - gloat
  - be glad
  lexicon: HALOT
  rationale: From שׂמח, 'rejoice/be glad.' 'Rejoice' preserves the lexical sense;
    'gloat' is interpretive and stronger than the Hebrew, though contextually related.
- source_word: אֹיַבְתִּי
  chosen: my enemy
  alternatives:
  - my foe
  lexicon: HALOT
  rationale: Singular feminine form with 1cs suffix, directly addressed. 'My enemy'
    is the most natural and transparent rendering.
- source_word: לִי
  chosen: over me
  alternatives:
  - at me
  - because of me
  lexicon: HALOT
  rationale: The preposition ל after verbs of rejoicing can indicate the object/target
    of rejoicing. In idiomatic English, 'rejoice over me' best conveys hostile triumph.
- source_word: כִּי
  chosen: though
  alternatives:
  - for
  - because
  - when
  lexicon: HALOT
  rationale: 'Here כִּי introduces a concessive sense in context: the enemy should
    not rejoice despite the speaker''s fall. English ''though'' captures the discourse
    force better than a wooden ''for''.'
- source_word: נָפַלְתִּי
  chosen: I have fallen
  alternatives:
  - I fell
  lexicon: HALOT
  rationale: Perfect 1cs of נפל. English present perfect fits the current state resulting
    from the fall while remaining natural.
- source_word: קָמְתִּי
  chosen: I will rise
  alternatives:
  - I have risen
  - I rise
  lexicon: HALOT
  rationale: Although morphologically perfect, in this poetic parallelism it expresses
    confident future restoration after falling. English future best communicates the
    sense in context.
- source_word: אֵשֵׁב
  chosen: I sit
  alternatives:
  - I dwell
  - I remain
  lexicon: HALOT
  rationale: From ישׁב, 'sit/dwell.' 'Sit' preserves the concrete image and matches
    the poetic contrast with darkness and light.
- source_word: בַּחֹשֶׁךְ
  chosen: in darkness
  alternatives:
  - in the darkness
  lexicon: HALOT
  rationale: The phrase is idiomatic and metaphorical; English commonly omits the
    article here for naturalness while preserving the image of affliction or obscurity.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and LXX-influenced usage.
- source_word: אוֹר
  chosen: a light
  alternatives:
  - light
  lexicon: HALOT
  rationale: Predicate noun describing what the LORD is for the speaker. 'A light'
    is idiomatic in English and preserves the metaphor of guidance/deliverance.
- source_word: לִי
  chosen: to me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The preposition marks relation/benefit. 'To me' is a natural rendering
    with 'be a light,' though 'for me' is also possible.
