theological_decisions:
- issue: Referent of the 3ms suffix in אַרְאֶנּוּ
  chosen_reading: Maintain the grammatical singular 'him' in the main text, understood
    as referring to Israel/Jacob as a collective singular in context.
  alternative_readings:
  - Render as 'them' to reflect the people collectively
  rationale: The Hebrew form is singular, and preserving that form best reflects the
    source text. Because the surrounding context addresses the covenant people, the
    singular likely functions collectively. The translation preserves the grammatical
    tension rather than resolving it by pluralizing.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
