id: MIC.7.15
reference: Micah 7:15
source:
  edition: WLC
  text: כִּ/ימֵ֥י צֵאתְ/ךָ֖ מֵ/אֶ֣רֶץ מִצְרָ֑יִם אַרְאֶ֖/נּוּ נִפְלָאֽוֹת׃
translation:
  text: As in the days when you came out from the land of Egypt, I will show him wondrous
    things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will show them wondrous things.' The Hebrew suffix is singular ('him'),
      but it may refer collectively to Israel.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּימֵי
  chosen: As in the days
  alternatives:
  - Like the days of
  - As in the days of
  lexicon: HALOT
  rationale: The prefixed כ plus ימי introduces a comparison to a past period. 'As
    in the days' is natural English and preserves the comparative force without over-paraphrasing.
- source_word: צֵאתְךָ
  chosen: when you came out
  alternatives:
  - of your coming out
  - when you went out
  lexicon: HALOT
  rationale: The infinitive construct with 2ms suffix literally means 'your going
    out/coming out.' In English, a temporal clause is the clearest rendering here.
    'Came out' fits the exodus context idiomatically.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of Egypt
  - from Egypt
  lexicon: HALOT
  rationale: The phrase is a standard exodus expression. 'From the land of Egypt'
    preserves the full Hebrew wording and solemnity better than the shorter alternatives.
- source_word: אַרְאֶנּוּ
  chosen: I will show him
  alternatives:
  - I will let him see
  - I will show them
  lexicon: HALOT
  rationale: Hiphil of ראה commonly means 'cause to see, show.' The suffix is 3ms
    singular, so 'him' is the most direct rendering. Some interpreters understand
    a collective singular referring to Israel/Jacob; the English keeps the grammatical
    singular rather than smoothing it to plural.
- source_word: נִפְלָאוֹת
  chosen: wondrous things
  alternatives:
  - marvels
  - wonderful things
  - miracles
  lexicon: HALOT
  rationale: The noun/participle form denotes extraordinary acts that evoke wonder.
    'Wondrous things' preserves the broad sense without narrowing it to 'miracles'
    alone, while echoing exodus language.
