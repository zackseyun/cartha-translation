id: MIC.7.4
reference: Micah 7:4
source:
  edition: WLC
  text: טוֹבָ֣/ם כְּ/חֵ֔דֶק יָשָׁ֖ר מִ/מְּסוּכָ֑ה י֤וֹם מְצַפֶּ֨י/ךָ֙ פְּקֻדָּתְ/ךָ֣
    בָ֔אָה עַתָּ֥ה תִהְיֶ֖ה מְבוּכָתָֽ/ם׃
translation:
  text: The best of them is like a brier; the upright is worse than a thorn hedge.
    The day of your watchmen—your punishment—has come; now their confusion will be.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your visitation.' The Hebrew term can denote an act of visitation, oversight,
      or punishment; here it refers to the day when judgment falls.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹבָם
  chosen: the best of them
  alternatives:
  - their best one
  - the good among them
  lexicon: HALOT
  rationale: טוֹב with 3mp suffix refers comparatively to the best member(s) among
    the people just described. English idiom favors 'the best of them' over a more
    wooden 'their best one.'
- source_word: כְּחֵדֶק
  chosen: like a brier
  alternatives:
  - like a thornbush
  - like a briar
  lexicon: HALOT
  rationale: חֵדֶק denotes a thorny plant; 'brier' is a concise literary-natural equivalent
    that preserves the image of something harmful and obstructive.
- source_word: יָשָׁר
  chosen: the upright
  alternatives:
  - the straight
  - the honest one
  lexicon: HALOT
  rationale: Here the adjective is substantival, referring to the one considered morally
    upright. 'The upright' is standard and clear English.
- source_word: מִמְּסוּכָה
  chosen: worse than a thorn hedge
  alternatives:
  - than a hedge
  - than a thorn fence
  - more than a thorn hedge
  lexicon: HALOT
  rationale: The comparative מִן after 'upright' indicates comparison. מְסוּכָה is
    a hedge/fence, likely thorny in context. 'Worse than a thorn hedge' makes explicit
    the hostile image and the implied negative comparison in idiomatic English.
- source_word: יוֹם
  chosen: the day
  alternatives:
  - a day
  lexicon: HALOT
  rationale: 'Construct-like use introducing a specific announced time of judgment:
    ''the day'' is more natural and definite in context.'
- source_word: מְצַפֶּיךָ
  chosen: your watchmen
  alternatives:
  - your watchers
  - those watching for you
  lexicon: HALOT
  rationale: From צפה, likely prophetic watchmen who announce coming judgment. 'Watchmen'
    is the established and contextually apt rendering.
- source_word: פְּקֻדָּתְךָ
  chosen: your punishment
  alternatives:
  - your visitation
  - your reckoning
  - your appointed judgment
  lexicon: HALOT
  rationale: פְּקֻדָּה can mean visitation, oversight, or punishment. In this judgment
    context, 'punishment' communicates the sense directly for modern readers, while
    the broader term 'visitation' is preserved in a footnote.
- source_word: בָאָה
  chosen: has come
  alternatives:
  - comes
  - is coming
  lexicon: HALOT
  rationale: Perfect verb used prophetically for an event now certain/arrived. 'Has
    come' reflects the completed aspect in English.
- source_word: עַתָּה
  chosen: now
  alternatives:
  - at that time
  lexicon: HALOT
  rationale: Temporal adverb marking the immediate consequence of the announced day.
- source_word: תִהְיֶה מְבוּכָתָם
  chosen: their confusion will be
  alternatives:
  - their bewilderment will come
  - they will be thrown into confusion
  - their panic will come
  lexicon: HALOT
  rationale: The Hebrew is literally 'their confusion/bewilderment will be.' This
    preserves the nominal form rather than converting too freely to a verbal paraphrase,
    while still reading naturally enough in English.
