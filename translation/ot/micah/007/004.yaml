theological_decisions:
- issue: Meaning of פְּקֻדָּתְךָ in a judgment oracle
  chosen_reading: your punishment
  alternative_readings:
  - your visitation
  - your reckoning
  rationale: The context is denunciation of societal corruption followed by announced
    calamity. Rendering as 'punishment' makes the judicial force explicit without
    importing extra theology. Because 'visitation' is a viable, more formal alternative,
    it is preserved in a footnote.
  doctrine_reference: Translation philosophy §3, §6
