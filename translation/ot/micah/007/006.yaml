id: MIC.7.6
reference: Micah 7:6
source:
  edition: WLC
  text: כִּֽי בֵן֙ מְנַבֵּ֣ל אָ֔ב בַּ֚ת קָמָ֣ה בְ/אִמָּ֔/הּ כַּלָּ֖ה בַּ/חֲמֹתָ֑/הּ
    אֹיְבֵ֥י אִ֖ישׁ אַנְשֵׁ֥י בֵיתֽ/וֹ־׃
translation:
  text: For a son treats his father with contempt; a daughter rises up against her
    mother; a daughter-in-law against her mother-in-law; a man's enemies are the men
    of his own house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'dishonors his father.' The Hebrew verb can denote treating someone
      shamefully or with contempt.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the men of his house.' The phrase can idiomatically refer to
      household members more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding lament; 'for' fits the discourse
    flow naturally in English.
- source_word: בֵן
  chosen: a son
  alternatives:
  - the son
  - son
  lexicon: HALOT
  rationale: Anarthrous singular used generically; 'a son' preserves the representative
    force without over-particularizing.
- source_word: מְנַבֵּל
  chosen: treats ... with contempt
  alternatives:
  - dishonors
  - despises
  - acts shamefully toward
  lexicon: HALOT
  rationale: The piel participle of נבל conveys treating someone with contempt or
    disgrace. 'Treats ... with contempt' captures the active relational insult more
    clearly than the more formal 'dishonors,' while preserving the severity.
- source_word: אָב
  chosen: his father
  alternatives:
  - father
  lexicon: HALOT
  rationale: Direct object of the son's contempt; English idiom naturally supplies
    the possessive relation.
- source_word: בַּת
  chosen: a daughter
  alternatives:
  - the daughter
  - daughter
  lexicon: HALOT
  rationale: Like 'a son,' this is generic and representative.
- source_word: קָמָה
  chosen: rises up against
  alternatives:
  - stands against
  - rebels against
  lexicon: HALOT
  rationale: Qal participle of קום in hostile relational context commonly means to
    rise up against. 'Rises up against' preserves the vividness without overstating
    to 'rebels'.
- source_word: בְאִמָּהּ
  chosen: her mother
  alternatives:
  - against her mother
  lexicon: HALOT
  rationale: The preposition ב here functions adversatively after קום; in English
    the adversative sense is best expressed with 'against her mother' in the full
    clause.
- source_word: כַּלָּה
  chosen: a daughter-in-law
  alternatives:
  - bride
  - young wife
  lexicon: HALOT
  rationale: In this household-relations context, 'daughter-in-law' is the clear sense,
    not the more general 'bride'.
- source_word: בַּחֲמֹתָהּ
  chosen: against her mother-in-law
  alternatives:
  - against her husband's mother
  lexicon: HALOT
  rationale: חמות specifically denotes mother-in-law; the adversative force of ב is
    again brought out by 'against'.
- source_word: אֹיְבֵי
  chosen: enemies
  alternatives:
  - foes
  lexicon: HALOT
  rationale: Standard rendering of the plural construct; straightforward and natural.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a person
  - one
  lexicon: HALOT
  rationale: Gender-accurate rendering is preferred by the translation philosophy.
    Here אִישׁ is singular representative, and 'a man' matches the Hebrew form and
    idiom.
- source_word: אַנְשֵׁי בֵיתוֹ
  chosen: the men of his own house
  alternatives:
  - the people of his household
  - his household members
  lexicon: HALOT
  rationale: אַנְשֵׁי literally means 'men of.' Although it can idiomatically denote
    members of a household, the translation philosophy prefers gender-accurate renderings
    where the source is masculine. 'His own house' preserves the idiom and intensifies
    the betrayal.
