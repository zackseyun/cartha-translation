theological_decisions:
- issue: Gendered household language
  chosen_reading: Retain masculine terms 'a man' and 'the men of his own house' in
    the main text.
  alternative_readings:
  - a person's enemies are the members of his household
  - one's enemies are those of one's own house
  rationale: The Hebrew uses explicitly masculine forms אִישׁ and אַנְשֵׁי. Per the
    translation philosophy, gender-accurate renderings are preferred over gender-neutral
    smoothing unless context clearly demands otherwise. The verse's force lies in
    the collapse of family loyalty, and the masculine idiom should be preserved rather
    than neutralized.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
