theological_decisions:
- issue: Generic אדם rendering
  chosen_reading: among mankind
  alternative_readings:
  - among humanity
  - among people
  rationale: The Hebrew is grammatically masculine but generic, referring to humankind
    rather than males only. The chosen rendering preserves the source's representative
    force in line with the doctrine's gender-accurate principle.
