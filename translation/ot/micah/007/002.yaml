id: MIC.7.2
reference: Micah 7:2
source:
  edition: WLC
  text: אָבַ֤ד חָסִיד֙ מִן הָ/אָ֔רֶץ וְ/יָשָׁ֥ר בָּ/אָדָ֖ם אָ֑יִן כֻּלָּ/ם֙ לְ/דָמִ֣ים
    יֶאֱרֹ֔בוּ אִ֥ישׁ אֶת אָחִ֖י/הוּ יָצ֥וּדוּ חֵֽרֶם־־׃
translation:
  text: The faithful has perished from the land, and there is no upright man among
    mankind. All of them lie in wait for blood; each hunts his brother with a net.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the earth.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his brother'; the term can extend beyond a literal sibling to a
      fellow member of the community.
    reason: lexical_alternative
  - marker: c
    text: Or 'with a snare.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָבַד
  chosen: has perished
  alternatives:
  - is gone
  - has vanished
  lexicon: HALOT
  rationale: Qal perfect 3ms expresses completed loss/destruction. 'Has perished'
    preserves the stark, lament-like force better than the weaker 'is gone.'
- source_word: חָסִיד
  chosen: the faithful
  alternatives:
  - the godly
  - the loyal one
  - the pious
  lexicon: HALOT
  rationale: Refers to one characterized by covenant loyalty/devotion. 'The faithful'
    is natural English and captures ethical-religious fidelity without sounding archaic
    like 'godly' or overly inward like 'pious.' Singular functions representatively.
- source_word: מִן הָאָרֶץ
  chosen: from the land
  alternatives:
  - from the earth
  lexicon: HALOT
  rationale: '''Land'' fits prophetic social critique in an Israelite setting and
    is more contextually concrete than the broader ''earth.'''
- source_word: וְיָשָׁר
  chosen: upright
  alternatives:
  - straight
  - honest
  lexicon: HALOT
  rationale: Describes moral rectitude. 'Upright' is the standard ethical equivalent
    in prophetic literature.
- source_word: בָּאָדָם
  chosen: among mankind
  alternatives:
  - among man
  - among humanity
  - among people
  lexicon: HALOT
  rationale: The phrase means within humankind/among people generally. Because אָדָם
    is generic here, 'among mankind' preserves the representative force while remaining
    readable. This follows the doctrine's gender-accurate principle for generic אדם.
- source_word: אָיִן
  chosen: there is no
  alternatives:
  - there is none
  lexicon: HALOT
  rationale: Idiomatic existential negation in English.
- source_word: כֻּלָּם
  chosen: all of them
  alternatives:
  - they all
  lexicon: HALOT
  rationale: Explicitly preserves the distributive totality before the following plural
    verbs.
- source_word: לְדָמִים
  chosen: for blood
  alternatives:
  - for bloodshed
  - for bloodguilt
  lexicon: HALOT
  rationale: The plural 'bloods' often denotes bloodshed or violent killing. 'For
    blood' keeps the Hebrew's terseness and works idiomatically with 'lie in wait';
    the sense is murderous violence.
- source_word: יֶאֱרֹבוּ
  chosen: lie in wait
  alternatives:
  - ambush
  - lurk
  lexicon: HALOT
  rationale: Common idiom for predatory ambush. 'Lie in wait' preserves the verbal
    nuance and literary tone.
- source_word: אִישׁ
  chosen: each
  alternatives:
  - a man
  - every man
  lexicon: HALOT
  rationale: Distributive singular in context. 'Each' communicates the sense smoothly
    in English while retaining individual responsibility.
- source_word: אָחִיהוּ
  chosen: his brother
  alternatives:
  - his fellow
  - his neighbor
  lexicon: HALOT
  rationale: Literal 'his brother' should be retained unless context clearly broadens
    it. Here it heightens the horror of social betrayal; broader implications can
    be noted in a footnote rather than flattened in the main text.
- source_word: יָצ֥וּדוּ
  chosen: hunts
  alternatives:
  - captures
  - sets a trap for
  lexicon: HALOT
  rationale: The verb denotes hunting/trapping. Singular English 'hunts' matches the
    distributive subject 'each.'
- source_word: חֵרֶם
  chosen: with a net
  alternatives:
  - with a ban
  - to destruction
  lexicon: HALOT
  rationale: In this context the noun is best taken as a hunting implement/snare parallel
    to 'lie in wait' and 'hunts.' Rendering it as 'ban' would not fit the immediate
    imagery. 'Net' is the most coherent contextual sense, though 'snare' is possible.
