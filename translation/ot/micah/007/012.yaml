id: MIC.7.12
reference: Micah 7:12
source:
  edition: WLC
  text: י֥וֹם הוּא֙ וְ/עָדֶ֣י/ךָ יָב֔וֹא לְ/מִנִּ֥י אַשּׁ֖וּר וְ/עָרֵ֣י מָצ֑וֹר וּ/לְ/מִנִּ֤י
    מָצוֹר֙ וְ/עַד נָהָ֔ר וְ/יָ֥ם מִ/יָּ֖ם וְ/הַ֥ר הָ/הָֽר־׃
translation:
  text: That day—they will come to you from Assyria and the cities of Egypt, and from
    Egypt to the River, from sea to sea, and from mountain to mountain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew מָצוֹר may also be understood as 'fortress,' 'siege,' or 'fortified
      city/cities' rather than as a name for Egypt.
    reason: lexical_alternative
  - marker: b
    text: '''The River'' likely refers to the Euphrates.'
    reason: cross_reference
lexical_decisions:
- source_word: י֥וֹם הוּא֙
  chosen: That day
  alternatives:
  - In that day
  - A day
  lexicon: HALOT
  rationale: Idiomatic prophetic temporal expression. 'That day' is natural modern
    English and preserves the eschatological/prophetic force without unnecessary archaism.
- source_word: וְעָדֶיךָ יָבוֹא
  chosen: they will come to you
  alternatives:
  - he will come to you
  - one will come to you
  lexicon: HALOT
  rationale: Although יָבֹוא is morphologically singular, the surrounding list of
    regions strongly suggests a collective sense ('people will come'). English plural
    best conveys the sense of returning/gathering from many lands. The 2ms suffix
    is retained as 'to you,' likely addressing daughter Zion/Jerusalem or the people/city
    corporately.
- source_word: למני אשור
  chosen: from Assyria
  alternatives:
  - even from Assyria
  - from the land of Assyria
  lexicon: HALOT
  rationale: The prepositional phrase marks point of origin. 'Assyria' is the standard
    English transliteration of the place name אַשּׁוּר.
- source_word: וערי מצור
  chosen: and the cities of Egypt
  alternatives:
  - and the cities of siege/fortress
  - and the fortified cities
  lexicon: HALOT
  rationale: מָצוֹר here is best taken as a place-name variant for Egypt (cf. poetic/prophetic
    usage), especially since the next phrase also uses מָצוֹר in geographic parallelism.
    Rendering 'Egypt' fits the sequence of world regions from which people come. The
    lexical alternative 'fortress/siege' is preserved in a footnote because the consonants
    can support that sense.
- source_word: ולמני מצור
  chosen: and from Egypt
  alternatives:
  - and from siege/fortress
  - and from Matzor
  lexicon: HALOT
  rationale: 'Parallel to the previous phrase and best understood as another reference
    to Egypt. This yields a coherent geographic progression: Assyria, Egypt, the River,
    sea to sea, mountain to mountain.'
- source_word: ועד נהר
  chosen: to the River
  alternatives:
  - to the Euphrates River
  - as far as the river
  lexicon: HALOT
  rationale: With the article absent in Hebrew but the noun used absolutely in a geopolitical
    list, 'the River' is a conventional shorthand for the Euphrates in biblical usage.
    Capitalizing 'River' signals this likely referent while preserving the Hebrew's
    terseness.
- source_word: וים מים
  chosen: from sea to sea
  alternatives:
  - and sea from sea
  - from one sea to another
  lexicon: HALOT
  rationale: An idiomatic merism expressing broad extent. 'From sea to sea' is the
    most natural and recognizable English rendering.
- source_word: והר ההר
  chosen: and from mountain to mountain
  alternatives:
  - and mountain to mountain
  - and hill to hill
  lexicon: HALOT
  rationale: Likely another merism of expansive range. Supplying 'from' in English
    clarifies the parallel structure with the preceding phrase.
