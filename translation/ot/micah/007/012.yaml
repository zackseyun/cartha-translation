theological_decisions:
- issue: Referent of the singular verb יָבֹוא in a context of multiple source regions
  chosen_reading: 'Collective plural sense: ''they will come to you'''
  alternative_readings:
  - 'Singular: ''he will come to you'' (possibly an individual messenger or the dispersed
    people personified collectively)'
  rationale: The verse catalogs multiple lands and boundaries from which arrivals
    come, so idiomatic English plural best represents the likely collective subject.
    This preserves sense without forcing a wooden singular that would sound misleading
    in English.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Meaning of מָצוֹר in this verse
  chosen_reading: Place-name reference to Egypt
  alternative_readings:
  - Common noun sense 'siege/fortress/fortified city'
  rationale: The parallelism with Assyria and 'the River' favors geographic names
    rather than military nouns. Because the lexical ambiguity is real and discussed
    in scholarship, the alternative is preserved in a footnote rather than erased.
  doctrine_reference: Translation philosophy §1, §3, §5
