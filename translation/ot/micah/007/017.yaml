id: MIC.7.17
reference: Micah 7:17
source:
  edition: WLC
  text: יְלַחֲכ֤וּ עָפָר֙ כַּ/נָּחָ֔שׁ כְּ/זֹחֲלֵ֣י אֶ֔רֶץ יִרְגְּז֖וּ מִ/מִּסְגְּרֹֽתֵי/הֶ֑ם
    אֶל יְהוָ֤ה אֱלֹהֵ֨י/נוּ֙ יִפְחָ֔דוּ וְ/יִֽרְא֖וּ מִמֶּֽ/ךָּ־׃
translation:
  text: They will lick the dust like a snake; like crawling things of the earth they
    will come trembling out of their strongholds. To the LORD our God they will come
    in dread, and they will fear you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their fortresses,' 'their enclosures,' or 'their hiding places' for
      'their strongholds.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they will fear you' / 'they will stand in awe of you.' The Hebrew can
      express fear before God, with possible overtones of awe.
    reason: lexical_alternative
  - marker: c
    text: '''the LORD'' renders the divine name YHWH.'
    reason: alternative_reading
  - marker: d
    text: Or 'they will come in fear'.
    reason: previous_rendering
lexical_decisions:
- source_word: יְלַחֲכוּ
  chosen: they will lick
  alternatives:
  - they shall lick
  - they will lick up
  lexicon: HALOT
  rationale: Piel imperfect of לחך, literally 'lick.' The concrete image should be
    preserved rather than paraphrased away, echoing humiliation imagery.
- source_word: עָפָר
  chosen: the dust
  alternatives:
  - dust
  lexicon: HALOT
  rationale: Common noun for dust/loose earth. With the simile 'like a snake,' 'the
    dust' is idiomatic in English and evokes the curse imagery of Gen 3:14.
- source_word: כַּנָּחָשׁ
  chosen: like a snake
  alternatives:
  - like the serpent
  lexicon: HALOT
  rationale: נָחָשׁ is the ordinary word for 'snake/serpent.' 'Snake' is more natural
    modern English here; 'serpent' remains a viable literary alternative but is not
    required by the context.
- source_word: כְּזֹחֲלֵי אֶרֶץ
  chosen: like crawling things of the earth
  alternatives:
  - like reptiles of the earth
  - like creatures that crawl on the ground
  lexicon: HALOT
  rationale: זֹחֲלֵי denotes crawling creatures. 'Crawling things of the earth' preserves
    the lowly, creeping imagery without over-specifying zoological categories.
- source_word: יִרְגְּזוּ
  chosen: they will come trembling out of
  alternatives:
  - they will tremble out of
  - they will quake from
  lexicon: HALOT
  rationale: The verb רגז conveys trembling, quaking, agitation. In context with מִמִּסְגְּרֹתֵיהֶם,
    the sense is movement from confinement accompanied by fear; 'come trembling out
    of' makes the implied motion explicit in idiomatic English.
- source_word: מִמִּסְגְּרֹתֵיהֶם
  chosen: their strongholds
  alternatives:
  - their fortresses
  - their enclosures
  - their hiding places
  lexicon: HALOT
  rationale: מִסְגֶּרֶת can denote enclosure or place of confinement. In this context
    of nations emerging in fear, 'strongholds' best captures protected places without
    narrowing to literal prison cells.
- source_word: אֶל יְהוָה אֱלֹהֵינוּ
  chosen: To the LORD our God
  alternatives:
  - to Yahweh our God
  lexicon: HALOT
  rationale: Direct movement toward Israel's God is retained with 'to.' Per doctrine,
    יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: יִפְחָדוּ
  chosen: they will come in fear
  alternatives:
  - they will fear
  - they will be in dread
  lexicon: HALOT
  rationale: The verb means 'fear, be afraid.' Because English already has a second
    fear verb immediately after, this rendering avoids awkward repetition while preserving
    the sense of fearful approach.
- source_word: וְיִרְאוּ
  chosen: they will be afraid
  alternatives:
  - they will fear
  - they will stand in awe
  lexicon: HALOT
  rationale: ירא can denote fear or awe. Here, in parallel with יִפְחָדוּ and with
    מִמֶּךָּ, the dominant sense is dread before God's power rather than worshipful
    reverence.
- source_word: מִמֶּךָּ
  chosen: because of you
  alternatives:
  - before you
  - of you
  lexicon: HALOT
  rationale: The preposition מן after fear verbs can mark source/cause ('because of,
    on account of') or object. 'Because of you' is clear modern English and fits the
    sense of fear provoked by God's action/presence.
