theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for the Tetragrammaton, preserving
    reverential convention and broad Christian readability.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of fear language in the final cola
  chosen_reading: fear/dread rather than reverential awe
  alternative_readings:
  - awe
  - reverence
  rationale: Although ירא can include reverence, the immediate parallel with פחד and
    the context of humbled nations support a primary sense of dread-filled fear before
    God's power.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: preserve theological
    tension rather than resolve it'
revisions:
- timestamp: '2026-04-21T12:44:03Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/micah/007/017.json
  category: awkward_english
  tier: 1
  from: they will come in fear
  to: they will turn in dread
  rationale: The current rendering of the two clauses results in the repetition of
    'come' ('come trembling' and 'come in fear'), a word supplied by the translator
    in both cases for dynamic effect. While effective, this repetition is slightly
    awkward. Translating אֶל...יִפְחָדוּ as 'they will turn in dread to...' avoids
    this, maintains the directional sense of 'אֶל', and uses a distinct synonym ('dread'
    for פחד) that contrasts well with 'be afraid' (for ירא) in the final clause.
