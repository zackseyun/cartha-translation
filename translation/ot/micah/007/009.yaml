theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines specify 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Meaning of בְּצִדְקָתוֹ in context of vindication
  chosen_reading: his righteousness
  alternative_readings:
  - his justice
  rationale: The verse speaks of the LORD taking up the speaker's legal cause and
    bringing vindication. The Hebrew term can encompass both righteousness and justice.
    To preserve theological tension without collapsing the semantic range, 'righteousness'
    is kept in the main text and 'justice' is preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §3; Contested terms principle
    analogous to δικαιοσύνη
