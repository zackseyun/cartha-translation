id: MIC.7.9
reference: Micah 7:9
source:
  edition: WLC
  text: זַ֤עַף יְהוָה֙ אֶשָּׂ֔א כִּ֥י חָטָ֖אתִי ל֑/וֹ עַד֩ אֲשֶׁ֨ר יָרִ֤יב רִיבִ/י֙
    וְ/עָשָׂ֣ה מִשְׁפָּטִ֔/י יוֹצִיאֵ֣/נִי לָ/א֔וֹר אֶרְאֶ֖ה בְּ/צִדְקָתֽ/וֹ׃
translation:
  text: I will bear the indignation of the LORD, because I have sinned against him,
    until he pleads my case and executes justice for me. He will bring me out to the
    light; I will look upon his righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "his justice." The Hebrew term can denote both righteousness and justice,
      especially in a legal-vindication context.
    reason: lexical_alternative
lexical_decisions:
- source_word: זַעַף יְהוָה
  chosen: the indignation of the LORD
  alternatives:
  - the anger of the LORD
  - the wrath of the LORD
  lexicon: HALOT
  rationale: זַעַף denotes anger/indignation/wrath. 'Indignation' preserves the moral
    and judicial nuance without overstating beyond the context of deserved covenant
    discipline. יְהוָה follows the doctrinal default 'the LORD' rather than 'Yahweh.'
- source_word: אֶשָּׂא
  chosen: I will bear
  alternatives:
  - I will endure
  - I will carry
  lexicon: HALOT
  rationale: נשא here idiomatically means to bear/endure a burden or consequence.
    'Bear' is both natural English and closer to the Hebrew image than the more interpretive
    'endure.'
- source_word: כִּי חָטָאתִי לוֹ
  chosen: because I have sinned against him
  alternatives:
  - for I have sinned against him
  lexicon: HALOT
  rationale: כִּי is causal here. The preposition ל with חטא commonly conveys the
    object offended; in English 'sinned against him' is the idiomatic equivalent and
    makes the relational offense explicit.
- source_word: עַד אֲשֶׁר
  chosen: until
  alternatives:
  - until the time when
  lexicon: HALOT
  rationale: The sequence marks the limit of the speaker's bearing of divine indignation.
    Simple 'until' is sufficient and idiomatic.
- source_word: יָרִיב רִיבִי
  chosen: he pleads my case
  alternatives:
  - he contends for my cause
  - he argues my lawsuit
  lexicon: HALOT
  rationale: The verb and cognate noun form a legal idiom of conducting or taking
    up someone's case. 'Pleads my case' communicates the forensic sense in readable
    modern English.
- source_word: וְעָשָׂה מִשְׁפָּטִי
  chosen: and executes justice for me
  alternatives:
  - and does justice for me
  - and secures my judgment
  lexicon: HALOT
  rationale: מִשְׁפָּט in this context is judicial vindication rather than abstract
    'judgment.' 'Executes justice for me' preserves the legal action and the favorable
    outcome implied by the context.
- source_word: יוֹצִיאֵנִי לָאוֹר
  chosen: He will bring me out to the light
  alternatives:
  - He will bring me into the light
  - He will lead me forth to the light
  lexicon: HALOT
  rationale: The Hiphil of יצא is causative, 'bring out.' 'To the light' preserves
    the Hebrew image of emergence from darkness/affliction into vindication.
- source_word: אֶרְאֶה
  chosen: I will look upon
  alternatives:
  - I will see
  - I will behold
  lexicon: HALOT
  rationale: ראה can be simply 'see,' but 'look upon' fits the elevated poetic context
    while remaining accessible. It also avoids implying merely physical sight without
    overinterpreting.
- source_word: בְּצִדְקָתוֹ
  chosen: his righteousness
  alternatives:
  - his justice
  - his saving justice
  lexicon: HALOT
  rationale: צדקה can denote righteousness or justice. Here it refers to the LORD's
    righteous action in vindicating the speaker. 'Righteousness' is chosen for main-text
    consistency with a footnote preserving 'justice' as a viable contextual alternative.
