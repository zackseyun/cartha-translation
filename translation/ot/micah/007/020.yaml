id: MIC.7.20
reference: Micah 7:20
source:
  edition: WLC
  text: תִּתֵּ֤ן אֱמֶת֙ לְ/יַֽעֲקֹ֔ב חֶ֖סֶד לְ/אַבְרָהָ֑ם אֲשֶׁר נִשְׁבַּ֥עְתָּ לַ/אֲבֹתֵ֖י/נוּ
    מִ֥/ימֵי קֶֽדֶם־׃
translation:
  text: You will show faithfulness to Jacob and steadfast love to Abraham, which you
    swore to our fathers from days of old.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'truth to Jacob.' Here 'faithfulness' reflects the covenant sense of
      the Hebrew term in parallel with 'steadfast love.'
    reason: lexical_alternative
  - marker: b
    text: Or 'our ancestors.' The Hebrew reads 'our fathers.'
    reason: lexical_alternative
  - marker: c
    text: Or 'from ancient days' or 'from long ago.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּתֵּן
  chosen: You will show
  alternatives:
  - you will give
  - you give
  lexicon: HALOT
  rationale: נתן literally means 'give,' but in English 'show faithfulness/steadfast
    love' is the most natural collocation with the following abstract nouns while
    preserving the future sense of the imperfect.
- source_word: אֱמֶת
  chosen: faithfulness
  alternatives:
  - truth
  - reliability
  lexicon: HALOT
  rationale: In covenantal parallelism with חֶסֶד, אֱמֶת carries the sense of fidelity/reliability
    rather than abstract propositional 'truth.' 'Faithfulness' best fits the relational
    context.
- source_word: לְיַעֲקֹב
  chosen: to Jacob
  alternatives:
  - for Jacob
  rationale: The preposition ל marks the indirect object/beneficiary. 'To Jacob' is
    the most straightforward rendering and preserves the poetic parallel with 'to
    Abraham.'
- source_word: חֶסֶד
  chosen: steadfast love
  alternatives:
  - covenant loyalty
  - lovingkindness
  - mercy
  lexicon: HALOT
  rationale: חֶסֶד is a key covenant term denoting loyal, gracious love. 'Steadfast
    love' is established, readable modern English that preserves both affection and
    covenant durability.
- source_word: לְאַבְרָהָם
  chosen: to Abraham
  alternatives:
  - for Abraham
  rationale: As with לְיַעֲקֹב, the preposition marks the beneficiary. 'To Abraham'
    keeps the parallel structure.
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  rationale: Introduces the relative clause referring back to the covenant commitments
    just named. 'Which' reads smoothly in English.
- source_word: נִשְׁבַּעְתָּ
  chosen: you swore
  alternatives:
  - you have sworn
  - you pledged with an oath
  lexicon: HALOT
  rationale: The Niphal of שׁבע means 'swear, take an oath.' Simple past 'you swore'
    fits the completed patriarchal oath in context.
- source_word: לַאֲבֹתֵינוּ
  chosen: to our fathers
  alternatives:
  - to our ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural 'our fathers.' Per the translation
    philosophy, gender-accurate rendering is preferred. 'Ancestors' is possible but
    less exact.
- source_word: מִימֵי קֶדֶם
  chosen: from days of old
  alternatives:
  - from ancient days
  - from long ago
  lexicon: HALOT
  rationale: This idiom denotes ancient time. 'From days of old' preserves the poetic
    register and temporal sense without sounding archaic beyond readability.
