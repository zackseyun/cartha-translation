theological_decisions:
- issue: Covenantal sense of אֱמֶת and חֶסֶד
  chosen_reading: Render the pair as 'faithfulness' and 'steadfast love' to express
    covenant fidelity and loyal love.
  alternative_readings:
  - truth and mercy
  - truth and lovingkindness
  rationale: The verse recalls God's oath to the patriarchs; in this context the paired
    nouns function relationally and covenantally, not merely as abstract qualities.
    The chosen rendering preserves that theological texture without over-paraphrase.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Gender rendering of אֲבֹתֵינוּ
  chosen_reading: Translate as 'our fathers.'
  alternative_readings:
  - our ancestors
  rationale: The source text is grammatically masculine and specifically evokes the
    patriarchal forefathers. The project's policy prefers gender-accurate renderings
    unless context clearly demands a generic term.
  doctrine_reference: Translation philosophy §4
