id: MIC.7.13
reference: Micah 7:13
source:
  edition: WLC
  text: וְ/הָיְתָ֥ה הָ/אָ֛רֶץ לִ/שְׁמָמָ֖ה עַל יֹֽשְׁבֶ֑י/הָ מִ/פְּרִ֖י מַֽעַלְלֵי/הֶֽם־׃ס
translation:
  text: But the land will become a desolation because of its inhabitants, because
    of the fruit of their deeds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the earth will be a desolation.' The Hebrew אֶרֶץ can mean 'land' or
      'earth'; here 'land' best fits the immediate judgment context.
    reason: lexical_alternative
  - marker: b
    text: Literally 'from the fruit of their deeds,' a Hebrew expression for the consequences
      produced by what they have done.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  chosen: will become
  alternatives:
  - will be
  - shall become
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic context functions
    futurally; 'will become' captures the transition into a ruined state better than
    the stative 'will be'.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  - the country
  lexicon: HALOT
  rationale: '''Land'' best fits Micah''s judgment context, likely referring to the
    territory under judgment rather than the whole earth in an abstract sense.'
- source_word: לִשְׁמָמָה
  chosen: a desolation
  alternatives:
  - desolate
  - waste
  - ruin
  lexicon: HALOT
  rationale: The noun denotes a state of devastation; 'a desolation' preserves the
    nominal force and the severity of covenant-judgment language.
- source_word: עַל
  chosen: because of
  alternatives:
  - on account of
  - upon
  - for
  lexicon: HALOT
  rationale: Here the preposition introduces the cause or basis of the judgment, not
    a spatial sense; 'because of' is the clearest modern English rendering.
- source_word: יֹשְׁבֶיהָ
  chosen: its inhabitants
  alternatives:
  - those who dwell in it
  - its dwellers
  lexicon: HALOT
  rationale: The participial form with suffix refers to the people living in the land;
    'its inhabitants' is natural English and preserves the referent.
- source_word: מִפְּרִי
  chosen: because of the fruit of
  alternatives:
  - from the fruit of
  - for the fruit of
  lexicon: HALOT
  rationale: The preposition marks source/causal basis; in context it explains the
    reason for desolation. Retaining 'fruit' preserves the metaphor of consequences
    proceeding from conduct.
- source_word: מַעַלְלֵיהֶם
  chosen: their deeds
  alternatives:
  - their actions
  - their practices
  lexicon: HALOT
  rationale: The noun refers to acts or doings, often with moral weight in judgment
    contexts. 'Deeds' is concise and suitably weighty.
