theological_decisions:
- issue: Causal structure of judgment
  chosen_reading: The land's desolation is presented as a consequence of the inhabitants
    and of the outcome of their deeds.
  alternative_readings:
  - 'The verse could be read more tersely as a simple statement: ''the land shall
    be desolate on account of its inhabitants, from the fruit of their deeds.'''
  rationale: The Hebrew stacks causal phrases. Rendering both with 'because of' makes
    the logic explicit in natural English without adding doctrinal content beyond
    the text's moral-causal judgment framework.
  doctrine_reference: Translation philosophy §3, §6
