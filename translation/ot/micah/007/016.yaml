id: MIC.7.16
reference: Micah 7:16
source:
  edition: WLC
  text: יִרְא֤וּ גוֹיִם֙ וְ/יֵבֹ֔שׁוּ מִ/כֹּ֖ל גְּבֽוּרָתָ֑/ם יָשִׂ֤ימוּ יָד֙ עַל
    פֶּ֔ה אָזְנֵי/הֶ֖ם תֶּחֱרַֽשְׁנָה־׃
translation:
  text: Nations will see and be ashamed of all their might; they will put their hand
    over their mouth; their ears will become deaf.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be put to shame because of all their might.' The Hebrew phrase may indicate
      shame in relation to, or because of, the power they possess.
    reason: lexical_alternative
  - marker: b
    text: The gesture 'put their hand over their mouth' is an idiom for silence, astonishment,
      or submission.
    reason: cultural_note
  - marker: c
    text: Or 'their ears will be stopped' / 'their ears will grow dull.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאוּ
  chosen: will see
  alternatives:
  - shall see
  - look
  lexicon: HALOT
  rationale: Qal imperfect 3mp of ראה denotes seeing/perceiving. Future English fits
    the prophetic context.
- source_word: גוֹיִם
  chosen: Nations
  alternatives:
  - the nations
  - Gentiles
  lexicon: HALOT
  rationale: גוֹיִם commonly means nations/peoples. 'Nations' is preferred here over
    'Gentiles' because the context is geopolitical rather than specifically Jew/Gentile
    contrast.
- source_word: וְיֵבֹשׁוּ
  chosen: and be ashamed
  alternatives:
  - and be put to shame
  - and be confounded
  lexicon: HALOT
  rationale: בוש in Qal commonly expresses shame/disgrace. 'Be ashamed' is natural
    modern English; 'be put to shame' is possible but slightly more interpretive.
- source_word: מִכֹּל גְּבוּרָתָם
  chosen: of all their might
  alternatives:
  - because of all their might
  - despite all their might
  - from all their power
  lexicon: HALOT
  rationale: The preposition מִן with כֹּל plus גְּבוּרָה can mark source/cause or
    relation. In context, the sense is that the nations are shamed with respect to
    all the might they possess or boast in. 'Of all their might' preserves the compact
    Hebrew without overresolving the nuance. 'Might' fits גְּבוּרָה as strength/power.
- source_word: יָשִׂימוּ יָד עַל־פֶּה
  chosen: they will put their hand over their mouth
  alternatives:
  - they will lay a hand on their mouth
  - they will cover their mouth with the hand
  lexicon: HALOT
  rationale: This idiom conveys stunned silence, submission, or speechlessness. Singular
    'hand' is retained because Hebrew uses singular יָד idiomatically.
- source_word: אָזְנֵיהֶם תֶּחֱרַשְׁנָה
  chosen: their ears will become deaf
  alternatives:
  - their ears will be deaf
  - their ears will be stopped
  - their ears will grow dull
  lexicon: HALOT
  rationale: חרשׁ in this stem/form with 'ears' indicates becoming deaf or unhearing.
    'Will become deaf' is a clear, literal rendering that preserves the image without
    importing a more interpretive idiom.
