id: MIC.7.14
reference: Micah 7:14
source:
  edition: WLC
  text: רְעֵ֧ה עַמְּ/ךָ֣ בְ/שִׁבְטֶ֗/ךָ צֹ֚אן נַֽחֲלָתֶ֔/ךָ שֹׁכְנִ֣י לְ/בָדָ֔ד יַ֖עַר
    בְּ/ת֣וֹךְ כַּרְמֶ֑ל יִרְע֥וּ בָשָׁ֛ן וְ/גִלְעָ֖ד כִּ/ימֵ֥י עוֹלָֽם׃
translation:
  text: Shepherd your people with your staff, the flock of your inheritance, dwelling
    alone in a forest in the midst of Carmel; let them graze in Bashan and Gilead
    as in days of old.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the midst of pastureland' / 'in fertile land'; Hebrew Carmel can
      refer either to the region Carmel or to fruitful land.
    reason: lexical_alternative
lexical_decisions:
- source_word: רְעֵה
  chosen: Shepherd
  alternatives:
  - Pasture
  - Tend
  lexicon: HALOT
  rationale: Imperative of רעה addressed to God. 'Shepherd' preserves the pastoral
    metaphor and naturally governs both protection and feeding, better than the narrower
    'pasture' or flatter 'tend'.
- source_word: בְשִׁבְטֶךָ
  chosen: with your staff
  alternatives:
  - with your rod
  lexicon: HALOT
  rationale: שֵׁבֶט can mean rod, staff, scepter, or tribe depending on context. Here,
    with the shepherding imperative, the pastoral sense 'staff' fits best. 'Rod' is
    possible but can sound primarily punitive in English, whereas the context is guidance
    and care.
- source_word: צֹאן נַחֲלָתֶךָ
  chosen: the flock of your inheritance
  alternatives:
  - the sheep of your inheritance
  - your inherited flock
  lexicon: HALOT
  rationale: Construct phrase identifying the people as God's flock and possession.
    'Flock' is collective and idiomatic; 'inheritance' preserves covenantal ownership
    language better than paraphrases like 'possession'.
- source_word: שֹׁכְנִי לְבָדָד
  chosen: dwelling alone
  alternatives:
  - living alone
  - dwelling by itself
  lexicon: HALOT
  rationale: Participle plus adverb/noun conveys a settled condition of isolated dwelling.
    'Dwelling alone' is concise and preserves the participial feel.
- source_word: יַעַר
  chosen: in a forest
  alternatives:
  - forest
  lexicon: HALOT
  rationale: 'Taken with the preceding participial phrase: the flock is dwelling alone
    ''in a forest.'' This preserves the Hebrew imagery of relative isolation or rough
    terrain.'
- source_word: בְּתוֹךְ כַּרְמֶל
  chosen: in the midst of Carmel
  alternatives:
  - in the midst of pastureland
  - in fertile land
  lexicon: HALOT
  rationale: כַּרְמֶל may denote Carmel specifically or fruitful land/pastureland
    more generally. Because Bashan and Gilead follow as named regions, retaining 'Carmel'
    as a place name best preserves the geographic-poetic texture. The broader sense
    is worth preserving in a footnote.
- source_word: יִרְעוּ
  chosen: let them graze
  alternatives:
  - may they graze
  - let them feed
  lexicon: HALOT
  rationale: Jussive-like imperfect continuing the prayer/wish. 'Let them graze' captures
    the petitionary force and keeps the pastoral image.
- source_word: בָשָׁן וְגִלְעָד
  chosen: in Bashan and Gilead
  lexicon: HALOT
  rationale: These are well-known fertile regions east/northeast of the Jordan, fitting
    the prayer for abundant pasture. Transliteration preserves the place names.
- source_word: כִּימֵי עוֹלָם
  chosen: as in days of old
  alternatives:
  - as in ancient days
  - as in the days of long ago
  lexicon: HALOT
  rationale: עוֹלָם here refers to antiquity/long duration rather than metaphysical
    eternity. 'Days of old' is idiomatic and appropriately historical.
