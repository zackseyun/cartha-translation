theological_decisions:
- issue: Imagery of divine care versus discipline in שֵׁבֶט
  chosen_reading: pastoral 'staff' within shepherd imagery
  alternative_readings:
  - '''rod'' emphasizing authority or discipline'
  rationale: The immediate context is a prayer for God to shepherd and provide pasture
    for his people. Rendering שֵׁבֶט as 'staff' preserves the coherent shepherd metaphor
    without importing a disciplinary emphasis not foregrounded here.
