theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name of God. Following the project's
    stated default, it is rendered 'the LORD' rather than transliterated, aligning
    with Jewish reverence tradition and longstanding English Bible practice while
    remaining source-aware.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to make the hope nuance of אוֹחִילָה explicit in the main text
  chosen_reading: I will wait
  alternative_readings:
  - I will hope
  - I will wait expectantly
  rationale: The Hebrew verb can express both waiting and hoping. Because the preceding
    אֲצַפֶּה already conveys expectancy, 'I will wait' avoids redundancy while preserving
    the parallelism. The hope nuance is preserved in a footnote rather than resolved
    away.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
