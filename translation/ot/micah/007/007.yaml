id: MIC.7.7
reference: Micah 7:7
source:
  edition: WLC
  text: וַ/אֲנִי֙ בַּ/יהוָ֣ה אֲצַפֶּ֔ה אוֹחִ֖ילָה לֵ/אלֹהֵ֣י יִשְׁעִ֑/י יִשְׁמָעֵ֖/נִי
    אֱלֹהָֽ/י׃
translation:
  text: But as for me, I will watch for the LORD; I will wait for the God of my salvation.
    My God will hear me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will hope in the God of my salvation.' The Hebrew verb can carry the
      sense of waiting with hope.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: But as for me
  alternatives:
  - But I
  - As for me
  lexicon: HALOT
  rationale: The conjunction with the independent pronoun marks contrast with the
    preceding context of social corruption and unreliability. 'But as for me' brings
    out the emphatic contrast more clearly than a bare 'But I.'
- source_word: בַּיהוָה
  chosen: for the LORD
  alternatives:
  - in the LORD
  - to the LORD
  lexicon: HALOT
  rationale: With צפה in this context, the preposition conveys the object toward whom
    one looks expectantly. English idiom is best captured by 'watch for the LORD'
    rather than the more awkward 'look in/to the LORD.' 'the LORD' follows the doctrinal
    default for YHWH.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms, YHWH is rendered 'the LORD' rather than
    transliterated forms.
- source_word: אֲצַפֶּה
  chosen: I will watch
  alternatives:
  - I will look
  - I will keep watch
  - I will wait expectantly
  lexicon: HALOT
  rationale: צפה denotes watching or looking out with expectation. 'Watch' preserves
    the vivid metaphor, while the following verb carries the waiting nuance.
- source_word: אוֹחִילָה
  chosen: I will wait
  alternatives:
  - I will hope
  - I will wait expectantly
  lexicon: HALOT
  rationale: The verb יחל can mean wait or hope. Here, paired with 'watch,' 'wait'
    gives a natural English progression while retaining expectant trust. The hope
    nuance is implicit and worth preserving in a footnote.
- source_word: לֵאלֹהֵי יִשְׁעִי
  chosen: for the God of my salvation
  alternatives:
  - for my saving God
  - for the God who saves me
  lexicon: HALOT
  rationale: This construct phrase is rendered fairly literally to preserve its theological
    weight and poetic force. 'God of my salvation' is natural English and keeps the
    genitival structure.
- source_word: יִשְׁמָעֵנִי
  chosen: will hear me
  alternatives:
  - will listen to me
  - will answer me
  lexicon: HALOT
  rationale: שׁמע fundamentally means hear/listen. 'Will hear me' is the most direct
    rendering; in prayer contexts it can imply favorable response, but 'answer' would
    over-interpret.
- source_word: אֱלֹהָי
  chosen: My God
  alternatives:
  - my God
  lexicon: HALOT
  rationale: Placed at the end for emphasis in Hebrew, this is brought forward in
    the final English clause for natural syntax while preserving the personal confession.
