id: MIC.7.1
reference: Micah 7:1
source:
  edition: WLC
  text: אַ֣לְלַי לִ֗/י כִּ֤י הָיִ֨יתִי֙ כְּ/אָסְפֵּי קַ֔יִץ כְּ/עֹלְלֹ֖ת בָּצִ֑יר
    אֵין אֶשְׁכּ֣וֹל לֶ/אֱכ֔וֹל בִּכּוּרָ֖ה אִוְּתָ֥ה נַפְשִֽׁ/י־־׃
translation:
  text: 'Woe is me! For I have become like the gatherers of summer fruit, like the
    gleanings of the grape harvest: there is no cluster to eat, no first-ripe fig
    that my soul desires.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Alas for me!'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'first-ripe'; likely referring to the prized early fig.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַלְלַי לִי
  chosen: Woe is me!
  alternatives:
  - Alas for me!
  - Woe to me!
  lexicon: HALOT
  rationale: An interjection of lament. 'Woe is me' preserves the forceful cry of
    distress in idiomatic but still elevated English. 'Alas for me' is possible but
    softer; 'woe to me' is less natural here.
- source_word: כִּי הָיִיתִי
  chosen: For I have become
  alternatives:
  - For I am
  - For I was
  lexicon: HALOT
  rationale: The perfect of היה here expresses a resultant state entered into by the
    speaker. 'Have become' captures the transition and present condition better than
    a simple past or present.
- source_word: כְאָסְפֵּי קַיִץ
  chosen: like the gatherers of summer fruit
  alternatives:
  - like the gatherings of summer fruit
  - like one gathering summer fruit
  lexicon: HALOT
  rationale: אָסף in this nominal form likely refers to those engaged in collecting
    produce, or by extension the condition after collection. 'Gatherers of summer
    fruit' communicates the image clearly in English and fits the parallel with post-harvest
    scarcity.
- source_word: קַיִץ
  chosen: summer fruit
  alternatives:
  - summer produce
  - ripe fruit
  lexicon: HALOT
  rationale: In prophetic usage קַיִץ commonly denotes summer fruit, especially late-season
    produce. This is the conventional and contextually apt rendering.
- source_word: כְעֹלְלֹת בָּצִיר
  chosen: like the gleanings of the grape harvest
  alternatives:
  - like grape gleanings
  - like the leftovers of the vintage
  lexicon: HALOT
  rationale: עֹלְלוֹת are the small remaining bits left after harvesting, especially
    gleanings. 'Of the grape harvest' makes explicit the viticultural setting of בָּצִיר
    and reads naturally.
- source_word: אֵין אֶשְׁכּוֹל לֶאֱכֹל
  chosen: there is no cluster to eat
  alternatives:
  - there is not a grape cluster to eat
  - there is no bunch to eat
  lexicon: HALOT
  rationale: אֶשְׁכּוֹל is a cluster, especially of grapes. 'Cluster' is concise and
    preserves the agricultural image; the context already signals grapes through 'grape
    harvest.'
- source_word: בִּכּוּרָה
  chosen: first-ripe fig
  alternatives:
  - first-ripe fruit
  - early fig
  lexicon: HALOT
  rationale: Though literally 'first-ripe' or 'firstfruits,' in this context and in
    common Hebrew usage it often refers specifically to the prized early fig. Rendering
    it as 'first-ripe fig' preserves the likely referent and the sense of desirability.
- source_word: אִוְּתָה נַפְשִׁי
  chosen: that my soul desires
  alternatives:
  - that I desire
  - which my appetite longs for
  lexicon: HALOT
  rationale: נֶפֶשׁ here expresses the speaker's inner appetite/desire. 'My soul desires'
    keeps the Hebrew anthropological term visible without becoming obscure; 'I desire'
    would be smoother but less transparent.
