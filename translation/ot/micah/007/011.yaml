theological_decisions:
- issue: Meaning of חֹק in the final clause
  chosen_reading: spatial boundary/limit rather than legal decree
  alternative_readings:
  - decree
  - statute
  rationale: 'The immediate imagery is architectural and territorial (''building your
    walls''), so reading חֹק as a boundary or limit coheres with the verse''s restoration
    theme: the limiting line is moved far away. Rendering it as ''decree'' is lexically
    possible but less contextually integrated in this verse. This is an interpretive,
    not doctrinal, decision; the alternative is preserved in a footnote.'
