id: MIC.7.11
reference: Micah 7:11
source:
  edition: WLC
  text: י֖וֹם לִ/בְנ֣וֹת גְּדֵרָ֑יִ/ךְ י֥וֹם הַ/ה֖וּא יִרְחַק חֹֽק־׃
translation:
  text: A day for building your walls—on that day the boundary will be far removed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the decree will be far removed.' The Hebrew word can mean 'boundary/limit'
      or 'decree/statute.'
    reason: lexical_alternative
lexical_decisions:
- source_word: י֖וֹם
  chosen: A day
  alternatives:
  - The day
  - A day is coming
  lexicon: HALOT
  rationale: יוֹם here introduces an exclamatory/elliptical prophetic announcement
    rather than simply functioning as a bare temporal noun. 'A day' preserves the
    terseness of the Hebrew while remaining natural in English. 'A day is coming'
    is interpretive and adds words not present.
- source_word: לִ/בְנ֣וֹת
  chosen: for building
  alternatives:
  - to build
  - for rebuilding
  lexicon: HALOT
  rationale: The preposition ל with the infinitive construct of בנה naturally yields
    'for building' or 'to build.' 'For building' fits the verbless prophetic style.
    'Rebuilding' is contextually plausible but not explicit in the verb itself.
- source_word: גְּדֵרָ֑יִ/ךְ
  chosen: your walls
  alternatives:
  - your wall
  - your fences
  - your fortifications
  lexicon: HALOT
  rationale: From גדר, the plural/suffixed form refers to enclosing walls or barriers.
    'Walls' is the most idiomatic rendering in this restoration context. 'Fences'
    is too weak; 'fortifications' is possible but more specific than the Hebrew requires.
- source_word: י֥וֹם הַ/ה֖וּא
  chosen: on that day
  alternatives:
  - that day
  - in that day
  lexicon: HALOT
  rationale: This common prophetic temporal expression is best rendered idiomatically
    as 'on that day.' It marks the specific future time just announced.
- source_word: יִרְחַק
  chosen: will be far removed
  alternatives:
  - will be far away
  - will recede
  - will be extended far
  lexicon: HALOT
  rationale: The verb רחק means 'be far, become distant, remove far away.' In this
    context it most naturally describes the removal or distancing of the following
    noun. The passive-like English 'will be far removed' captures the result without
    over-specifying agency.
- source_word: חֹֽק
  chosen: the boundary
  alternatives:
  - the decree
  - the limit
  - the appointed boundary
  lexicon: HALOT
  rationale: חֹק can mean statute/decree, but in this restoration context and with
    רחק it is commonly understood as a boundary/limit being pushed far away. 'Boundary'
    best fits the imagery of walls and territorial expansion. Because 'decree' is
    a viable lexical alternative, it is preserved in a footnote.
