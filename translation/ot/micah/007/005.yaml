id: MIC.7.5
reference: Micah 7:5
source:
  edition: WLC
  text: אַל תַּאֲמִ֣ינוּ בְ/רֵ֔עַ אַֽל תִּבְטְח֖וּ בְּ/אַלּ֑וּף מִ/שֹּׁכֶ֣בֶת חֵיקֶ֔/ךָ
    שְׁמֹ֖ר פִּתְחֵי פִֽי/ךָ־־־׃
translation:
  text: Do not trust in a neighbor; do not put confidence in a close companion. From
    the woman who lies in your bosom, guard the doors of your mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'friend' for 'neighbor' (רֵעַ).
    reason: lexical_alternative
  - marker: b
    text: Or 'intimate friend' for 'close companion' (אַלּוּף).
    reason: lexical_alternative
  - marker: c
    text: Literally 'the woman lying in your bosom'; that is, the most intimate companion,
      likely one's wife.
    reason: cultural_note
  - marker: d
    text: Or 'embrace' for 'bosom.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רֵעַ
  chosen: neighbor
  alternatives:
  - friend
  - companion
  lexicon: HALOT
  rationale: רֵעַ commonly denotes another person in close social relation, ranging
    from 'friend' to 'neighbor.' 'Neighbor' preserves the broader relational sense
    without overstating intimacy, and fits the escalating parallelism of the verse.
- source_word: אַלּוּף
  chosen: close companion
  alternatives:
  - friend
  - confidant
  - intimate friend
  lexicon: HALOT
  rationale: In this context אַלּוּף refers to a familiar associate or intimate companion,
    not a military 'chief.' 'Close companion' communicates trusted personal closeness
    and distinguishes it from the preceding רֵעַ.
- source_word: תַּאֲמִינוּ
  chosen: trust
  alternatives:
  - believe
  lexicon: HALOT
  rationale: The Hifil of אמן with ב marks placing trust in someone. 'Trust' is the
    natural English equivalent here, not mere intellectual belief.
- source_word: תִּבְטְחוּ
  chosen: put confidence in
  alternatives:
  - trust in
  - rely on
  lexicon: HALOT
  rationale: בטח overlaps with 'trust,' but varying the English avoids awkward repetition
    while preserving the synonymous parallelism. 'Put confidence in' reflects reliance
    placed in a person.
- source_word: מִשֹּׁכֶבֶת חֵיקֶךָ
  chosen: From the woman who lies in your bosom
  alternatives:
  - Even from her who lies in your embrace
  - From the wife in your arms
  lexicon: HALOT
  rationale: 'The phrase literally refers to the woman lying in one''s bosom/embrace,
    an idiom for the most intimate domestic relationship. ''Woman who lies in your
    bosom'' stays close to the Hebrew while remaining intelligible. ''From'' reflects
    the prefixed מִן as indicating source/separation: even from such an intimate person
    one must withhold speech.'
- source_word: חֵיק
  chosen: bosom
  alternatives:
  - embrace
  - arms
  lexicon: HALOT
  rationale: '''Bosom'' is the most direct lexical equivalent and preserves the idiomatic
    intimacy of the Hebrew expression. Because it may sound slightly formal in modern
    English, an alternative is preserved in a footnote.'
- source_word: שְׁמֹר
  chosen: guard
  alternatives:
  - keep watch over
  - watch
  lexicon: HALOT
  rationale: The imperative calls for careful protection. 'Guard' is concise and forceful,
    fitting the warning tone.
- source_word: פִּתְחֵי פִיךָ
  chosen: the doors of your mouth
  alternatives:
  - the openings of your mouth
  - what comes out of your mouth
  lexicon: HALOT
  rationale: The Hebrew is a vivid metaphor, literally 'the doors/openings of your
    mouth.' Retaining 'doors of your mouth' preserves the imagery of controlling speech
    rather than flattening it into paraphrase.
