theological_decisions:
- issue: Subject and force of the rhetorical question
  chosen_reading: The speaker is God, asking whether he can declare innocent a person
    who uses dishonest measures.
  alternative_readings:
  - The speaker asks whether he himself could be pure while such injustice exists.
  rationale: 'Within Micah 6, the LORD is prosecuting a covenant lawsuit against his
    people. The first-person singular verb is therefore best understood as divine
    forensic speech: God will not acquit those practicing economic fraud. This preserves
    the legal-moral force of the context without over-paraphrasing.'
