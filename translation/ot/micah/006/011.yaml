id: MIC.6.11
reference: Micah 6:11
source:
  edition: WLC
  text: הַ/אֶזְכֶּ֖ה בְּ/מֹ֣אזְנֵי רֶ֑שַׁע וּ/בְ/כִ֖יס אַבְנֵ֥י מִרְמָֽה׃
translation:
  text: Shall I acquit one with wicked scales and with a bag of deceptive weights?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Shall I be pure with wicked scales and with a bag of false weights?'
      The Hebrew verb can be understood as 'be pure' or 'be acquitted/count as innocent';
      the context favors the forensic sense.
    reason: alternative_reading
  - marker: b
    text: Literally, 'stones of deceit,' referring to stone weights used in trade.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַ/אֶזְכֶּה
  chosen: Shall I acquit
  alternatives:
  - Shall I be pure
  - Shall I count as innocent
  - Can I tolerate
  lexicon: HALOT
  rationale: From זכה in the Qal imperfect 1cs with interrogative ה, expressing whether
    the speaker can regard someone as innocent or acquit them. In context of covenant
    lawsuit and dishonest commerce, 'acquit' best captures forensic force in natural
    English. 'Be pure' is too self-referential in English, and 'tolerate' is interpretive
    rather than lexical.
- source_word: בְּ/מֹאזְנֵי
  chosen: with ... scales
  alternatives:
  - with ... balances
  lexicon: HALOT
  rationale: מֹאזְנַיִם denotes scales/balances used for weighing. 'Scales' is more
    idiomatic in modern English for commercial fraud contexts.
- source_word: רֶשַׁע
  chosen: wicked
  alternatives:
  - evil
  - unjust
  lexicon: HALOT
  rationale: רֶשַׁע denotes wickedness/guilt. As an attributive genitive with 'scales,'
    'wicked scales' is concise and preserves the moral charge. 'Unjust scales' is
    possible but slightly narrows the broader ethical sense.
- source_word: וּ/בְ/כִיס
  chosen: and with a bag
  alternatives:
  - and with a pouch
  lexicon: HALOT
  rationale: כִּיס is a bag/purse, here likely a merchant's bag holding weights. 'Bag'
    is straightforward modern English.
- source_word: אַבְנֵי
  chosen: weights
  alternatives:
  - stones
  lexicon: HALOT
  rationale: Literally 'stones,' but in commercial context these are stone weights
    used on scales. Rendering 'weights' communicates the referent directly without
    obscuring the sense.
- source_word: מִרְמָה
  chosen: deceptive
  alternatives:
  - 'false'
  - fraudulent
  - deceitful
  lexicon: HALOT
  rationale: מִרְמָה means deceit, treachery, fraud. 'Deceptive weights' is idiomatic
    and clearly conveys fraudulent measuring practices. 'False weights' is traditional
    and viable, but 'deceptive' better reflects the noun's semantic force.
