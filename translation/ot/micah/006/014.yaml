theological_decisions:
- issue: Interpretation of the obscure clause וְיֶשְׁחֲךָ בְּקִרְבֶּךָ
  chosen_reading: internal emptiness/hunger as part of covenant judgment
  alternative_readings:
  - humiliation in your midst
  - sickness/sinking within you
  rationale: 'The Hebrew is lexically difficult, but the immediate context is deprivation:
    eating without satisfaction, failed escape, and loss to the sword. Rendering the
    clause as internal emptiness preserves the judgment motif without importing a
    more specific doctrine than the text warrants.'
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
