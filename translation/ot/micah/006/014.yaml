id: MIC.6.14
reference: Micah 6:14
source:
  edition: WLC
  text: אַתָּ֤ה תֹאכַל֙ וְ/לֹ֣א תִשְׂבָּ֔ע וְ/יֶשְׁחֲ/ךָ֖ בְּ/קִרְבֶּ֑/ךָ וְ/תַסֵּג֙
    וְ/לֹ֣א תַפְלִ֔יט וַ/אֲשֶׁ֥ר תְּפַלֵּ֖ט לַ/חֶ֥רֶב אֶתֵּֽן׃
translation:
  text: You will eat, but you will not be satisfied, and your emptiness will remain
    within you; you will move away, but you will not rescue anything, and what you
    do rescue I will give to the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew clause rendered 'your emptiness will remain within you' is difficult.
      It may also be understood as 'your humiliation will be in your midst' or 'your
      sinking will be within you.'
    reason: alternative_reading
lexical_decisions:
- source_word: תֹאכַל
  chosen: you will eat
  alternatives:
  - you shall eat
  lexicon: HALOT
  rationale: Qal imperfect 2ms of אכל, straightforward future/predictive sense in
    an oracle of judgment.
- source_word: תִשְׂבָּע
  chosen: you will be satisfied
  alternatives:
  - you will be full
  - you will be sated
  lexicon: HALOT
  rationale: שׂבע commonly denotes being satisfied/full from eating. 'Be satisfied'
    is natural modern English and preserves the deprivation contrast.
- source_word: יֶשְׁחֲךָ
  chosen: your emptiness will remain within you
  alternatives:
  - your humiliation will be in your midst
  - your sinking will be within you
  - your emptiness will be in your inward parts
  lexicon: HALOT
  rationale: This form is difficult and has been understood in several ways from a
    rare noun/root. In context of frustrated consumption and loss, a sense of internal
    emptiness/hunger best fits the parallelism. 'Will remain within you' makes the
    verbless Hebrew phrase idiomatic while preserving the internal affliction.
- source_word: בְּקִרְבֶּךָ
  chosen: within you
  alternatives:
  - in your midst
  - in your inward parts
  lexicon: HALOT
  rationale: קֶרֶב can mean inward part or midst. Here the judgment is personal and
    internal, so 'within you' best captures the sense.
- source_word: תַסֵּג
  chosen: you will move away
  alternatives:
  - you will remove
  - you will carry away
  - you will withdraw
  lexicon: HALOT
  rationale: Hiphil of סוג can mean move back/remove/carry away. In this context,
    with the following 'but you will not rescue,' it likely refers to attempting to
    remove possessions or family to safety. 'Move away' is cautious and readable without
    over-specifying the object.
- source_word: תַפְלִיט
  chosen: you will not rescue anything
  alternatives:
  - you will not save
  - you will not deliver
  lexicon: HALOT
  rationale: Hiphil of פלט means cause to escape, rescue, deliver. 'Rescue' fits the
    concrete context of trying to preserve something from disaster. 'Anything' is
    supplied in English because the Hebrew leaves the object implicit.
- source_word: תְּפַלֵּט
  chosen: you do rescue
  alternatives:
  - you save
  - you deliver
  lexicon: HALOT
  rationale: The verb repeats פלט. Rendering it consistently as 'rescue' preserves
    the wordplay and judgment sequence.
- source_word: לַחֶרֶב
  chosen: to the sword
  alternatives:
  - to the blade
  - to warfare
  lexicon: HALOT
  rationale: Standard idiom for violent destruction by war. 'The sword' preserves
    the prophetic diction and metonymy.
- source_word: אֶתֵּן
  chosen: I will give
  alternatives:
  - I will hand over
  lexicon: HALOT
  rationale: Qal imperfect 1cs of נתן. 'I will give' is literal and preserves the
    divine agency in judgment; the object is what the hearer manages to rescue.
