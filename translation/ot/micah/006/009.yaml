id: MIC.6.9
reference: Micah 6:9
source:
  edition: WLC
  text: ק֤וֹל יְהוָה֙ לָ/עִ֣יר יִקְרָ֔א וְ/תוּשִׁיָּ֖ה יִרְאֶ֣ה שְׁמֶ֑/ךָ שִׁמְע֥וּ מַטֶּ֖ה וּ/מִ֥י יְעָדָֽ/הּ׃
translation:
  text: 'The voice of Yahweh cries out to the city, and sound wisdom sees your name: hear the rod and him who appointed it.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and wisdom sees your name,' or 'and it is sound wisdom to fear your name.' The Hebrew of this clause is difficult.
    reason: alternative_reading
lexical_decisions:
- source_word: ק֤וֹל יְהוָה֙
  chosen: The voice of the LORD
  alternatives:
  - The LORD's voice
  lexicon: HALOT
  rationale: Construct phrase literally means 'voice of YHWH.' Rendered with 'the LORD' per doctrine for יְהוָה, and kept as 'voice' rather than smoothing to 'the LORD calls' so the poetic personification is preserved.
- source_word: יְהוָה֙
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of יְהוָה as 'the LORD.'
- source_word: לָ/עִ֣יר
  chosen: to the city
  alternatives:
  - against the city
  - in the city
  lexicon: HALOT
  rationale: The preposition ל commonly marks direction or indirect object. 'To the city' is the most straightforward sense here with יִקְרָא ('cries/calls'). 'Against the city' is interpretive and possible by context, but not required by the preposition itself.
- source_word: יִקְרָ֔א
  chosen: cries out
  alternatives:
  - calls
  - proclaims
  lexicon: HALOT
  rationale: קרא can mean 'call' or 'cry out.' In prophetic context with 'voice,' 'cries out' best conveys the force and urgency while remaining close to the Hebrew.
- source_word: וְ/תוּשִׁיָּ֖ה
  chosen: sound wisdom
  alternatives:
  - wisdom
  - success
  - true wisdom
  lexicon: HALOT
  rationale: תושיה can denote sound wisdom, practical wisdom, or resourcefulness. 'Sound wisdom' preserves the noun's moral-intellectual force better than the flatter 'wisdom.'
- source_word: יִרְאֶ֣ה
  chosen: fears
  alternatives:
  - sees
  - has regard for
  lexicon: HALOT
  rationale: Although the consonants could suggest 'see,' the Masoretic pointing and common interpretation take this from ירא, 'to fear/revere.' In context with 'your name,' 'fears' expresses reverent response to the LORD. The alternative is preserved in a footnote because the line is famously difficult.
- source_word: שְׁמֶ֑/ךָ
  chosen: your name
  lexicon: HALOT
  rationale: Retained literally. In Hebrew, 'name' often signifies revealed character and authority; no expansion is added to avoid over-interpretation.
- source_word: שִׁמְע֥וּ
  chosen: hear
  alternatives:
  - listen to
  lexicon: HALOT
  rationale: Imperative plural of שמע. 'Hear' is concise and preserves the prophetic summons; English readers can infer the sense of attentive listening.
- source_word: מַטֶּ֖ה
  chosen: the rod
  alternatives:
  - the staff
  - the scepter
  lexicon: HALOT
  rationale: מַטֶּה can mean rod, staff, or tribe depending on context. Here the following clause about appointment and the judgment setting favor 'rod' as an instrument of discipline.
- source_word: וּ/מִ֥י
  chosen: and him who
  alternatives:
  - and who
  - and the one who
  lexicon: HALOT
  rationale: The interrogative/relative מי functions here idiomatically as a relative expression. 'Him who' gives natural English while preserving the personal referent.
- source_word: יְעָדָֽ/הּ
  chosen: appointed it
  alternatives:
  - has appointed it
  - summoned it
  - set it
  lexicon: HALOT
  rationale: From יעד, 'appoint, fix, designate.' The 3fs suffix most naturally refers back to 'rod' as a feminine noun in Hebrew usage. 'Appointed it' fits the context of divinely commissioned judgment.
