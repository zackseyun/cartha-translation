theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This verse does not require deviation from that policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether מָרוֹם should be rendered as a title ('Most High')
  chosen_reading: God on high
  alternative_readings:
  - God Most High
  - the exalted God
  rationale: The Hebrew phrase is descriptive rather than the more standard fixed
    divine title עֶלְיוֹן. Rendering it descriptively preserves the wording without
    importing a title the text does not explicitly use.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #3, #5'
