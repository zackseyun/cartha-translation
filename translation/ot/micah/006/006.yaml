id: MIC.6.6
reference: Micah 6:6
source:
  edition: WLC
  text: בַּ/מָּה֙ אֲקַדֵּ֣ם יְהוָ֔ה אִכַּ֖ף לֵ/אלֹהֵ֣י מָר֑וֹם הַ/אֲקַדְּמֶ֣/נּוּ
    בְ/עוֹל֔וֹת בַּ/עֲגָלִ֖ים בְּנֵ֥י שָׁנָֽה׃
translation:
  text: With what shall I come before the LORD, and bow myself before God on high?
    Shall I come before him with burnt offerings, with year-old calves?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before God Most High.' The Hebrew says literally 'before God of height/on
      high.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּמָּה
  chosen: With what
  alternatives:
  - By what means
  - With what thing
  lexicon: HALOT
  rationale: Interrogative phrase introducing the speaker's question about the appropriate
    means of approach; 'With what' is idiomatic and preserves the instrumental sense.
- source_word: אֲקַדֵּם
  chosen: shall I come before
  alternatives:
  - shall I meet
  - shall I approach
  lexicon: HALOT
  rationale: From קדם in the sense of going to meet or coming before someone. 'Come
    before' fits the worship context and pairs naturally with the following question.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible practice.
- source_word: אִכַּף
  chosen: bow myself
  alternatives:
  - bend low
  - humble myself
  lexicon: HALOT
  rationale: The Niphal of כף here denotes the act of bowing or stooping in reverence.
    'Bow myself' preserves the bodily posture implied by the verb without overinterpreting
    it as inward humility alone.
- source_word: לֵאלֹהֵי מָרוֹם
  chosen: before God on high
  alternatives:
  - before the God of the height
  - before the exalted God
  - before God Most High
  lexicon: HALOT
  rationale: The phrase identifies God as exalted/high. 'God on high' is natural English
    and preserves the spatial-exalted imagery. 'God Most High' is possible but can
    sound like a fixed title not explicit here.
- source_word: הַאֲקַדְּמֶנּוּ
  chosen: Shall I come before him
  alternatives:
  - Shall I approach him
  - Shall I present myself before him
  lexicon: HALOT
  rationale: Repetition of קדם is retained with similar English wording for rhetorical
    effect and lexical consistency. The pronominal suffix is represented by 'him.'
- source_word: בְעוֹלוֹת
  chosen: with burnt offerings
  alternatives:
  - with whole burnt offerings
  lexicon: HALOT
  rationale: עוֹלָה is the standard sacrificial term 'burnt offering.' The plural
    is preserved, and 'with' reflects the beth of accompaniment/instrument.
- source_word: בַּעֲגָלִים בְּנֵי שָׁנָה
  chosen: with year-old calves
  alternatives:
  - with calves a year old
  - with one-year-old calves
  lexicon: HALOT
  rationale: This phrase specifies the sacrificial animals as calves in their first
    year. 'Year-old calves' is concise, natural English that preserves the age qualification.
