id: MIC.6.7
reference: Micah 6:7
source:
  edition: WLC
  text: הֲ/יִרְצֶ֤ה יְהוָה֙ בְּ/אַלְפֵ֣י אֵילִ֔ים בְּ/רִֽבְב֖וֹת נַֽחֲלֵי שָׁ֑מֶן
    הַ/אֶתֵּ֤ן בְּכוֹרִ/י֙ פִּשְׁעִ֔/י פְּרִ֥י בִטְנִ֖/י חַטַּ֥את נַפְשִֽׁ/י־׃
translation:
  text: Will the LORD be pleased with thousands of rams, with ten thousands of streams
    of oil? Shall I give my firstborn for my transgression, the fruit of my body for
    the sin of my soul?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with myriads of torrents/rivers of oil.' The Hebrew expression is hyperbolic,
      describing an immense abundance of oil.
    reason: lexical_alternative
  - marker: b
    text: Or 'the fruit of my womb.' Hebrew 'fruit of my body' is an idiom for one's
      offspring.
    reason: lexical_alternative
  - marker: c
    text: Or 'for the sin offering of my soul/life,' though 'sin' fits the parallel
      with 'my transgression' more naturally here.
    reason: alternative_reading
lexical_decisions:
- source_word: הֲיִרְצֶה
  chosen: Will ... be pleased
  alternatives:
  - Will ... accept
  - Will ... delight in
  lexicon: HALOT
  rationale: The interrogative with רצה asks whether YHWH would take pleasure in or
    accept such offerings. 'Be pleased' is idiomatic modern English and preserves
    the evaluative sense better than a flatter 'accept.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name יְהוָה is rendered 'the LORD' rather
    than transliterated.
- source_word: בְּאַלְפֵי אֵילִים
  chosen: with thousands of rams
  alternatives:
  - in thousands of rams
  lexicon: HALOT
  rationale: The beth here is rendered instrumentally/associatively in natural English.
    'Rams' is the standard sense of אֵילִים in sacrificial context.
- source_word: בְּרִבְבוֹת נַחֲלֵי שָׁמֶן
  chosen: with ten thousands of streams of oil
  alternatives:
  - with myriads of torrents of oil
  - with ten thousand rivers of oil
  lexicon: HALOT
  rationale: רִבְבוֹת denotes an immense number, often 'ten thousands'; נַחֲלֵי literally
    means wadis/streams/torrents. 'Streams of oil' preserves the vivid hyperbole while
    remaining readable. Singular 'oil' is a mass noun.
- source_word: הַאֶתֵּן
  chosen: Shall I give
  alternatives:
  - Should I give
  lexicon: HALOT
  rationale: A second rhetorical question continues the escalating logic of the verse.
    'Shall I give' fits the solemn register and parallels the first question.
- source_word: בְּכוֹרִי
  chosen: my firstborn
  alternatives:
  - my firstborn son
  lexicon: HALOT
  rationale: בכור means firstborn; 'son' is implicit but not explicit in the Hebrew,
    so 'my firstborn' is the more textually restrained rendering.
- source_word: פִּשְׁעִי
  chosen: my transgression
  alternatives:
  - my rebellion
  lexicon: HALOT
  rationale: פשע often carries the sense of rebellion/breach, but 'transgression'
    is a standard and sufficiently weighty rendering here, especially in sacrificial
    context.
- source_word: פְּרִי בִטְנִי
  chosen: the fruit of my body
  alternatives:
  - the fruit of my womb
  - my offspring
  lexicon: HALOT
  rationale: The idiom refers to one's offspring. 'Fruit of my body' preserves the
    concrete Hebrew expression without over-specifying 'womb,' which would be less
    natural from a first-person speaker not explicitly gendered here.
- source_word: חַטַּאת נַפְשִׁי
  chosen: the sin of my soul
  alternatives:
  - the sin of my life
  - my sin
  lexicon: HALOT
  rationale: חטאת can denote sin or sin offering; here the parallel with 'my transgression'
    favors 'sin' rather than 'sin offering.' נֶפֶשׁ is retained as 'soul' to preserve
    the personal, inward dimension and the poetic parallelism.
