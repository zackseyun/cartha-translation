id: MIC.6.12
reference: Micah 6:12
source:
  edition: WLC
  text: אֲשֶׁ֤ר עֲשִׁירֶ֨י/הָ֙ מָלְא֣וּ חָמָ֔ס וְ/יֹשְׁבֶ֖י/הָ דִּבְּרוּ שָׁ֑קֶר וּ/לְשׁוֹנָ֖/ם
    רְמִיָּ֥ה בְּ/פִי/הֶֽם־׃
translation:
  text: whose rich men are full of violence, and her inhabitants speak lies; their
    tongue is deceitful in their mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''their tongue is deceit in their mouth.'' The translation renders
      the idiom as ''their tongue is deceitful in their mouth'' for natural English.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: whose
  alternatives:
  - for which
  - because
  lexicon: HALOT
  rationale: Here the relative particle links this verse back to the city addressed
    in the surrounding context; 'whose' naturally conveys possession with the following
    suffixed nouns ('her rich men,' 'her inhabitants').
- source_word: עֲשִׁירֶיהָ
  chosen: her rich men
  alternatives:
  - her wealthy ones
  - her rich people
  lexicon: HALOT
  rationale: The masculine plural form with 3fs suffix refers to the city's wealthy
    male elites in a representative social sense. 'Rich men' is gender-accurate to
    the Hebrew form and fits the social-judicial critique of the context better than
    the more neutral 'rich people.'
- source_word: מָלְאוּ חָמָס
  chosen: are full of violence
  alternatives:
  - have filled themselves with violence
  - are filled with wrongdoing
  lexicon: HALOT
  rationale: The idiom literally means 'have filled violence,' but in English 'are
    full of violence' best captures the stative/resultative sense. חָמָס commonly
    denotes violence, oppression, or ruthless wrongdoing; 'violence' is the most direct
    and established rendering here.
- source_word: וְיֹשְׁבֶיהָ
  chosen: and her inhabitants
  alternatives:
  - and those who dwell in her
  - and her residents
  lexicon: HALOT
  rationale: A participial form functioning substantivally. 'Inhabitants' is concise,
    natural English and preserves the collective sense of those living in the city.
- source_word: דִּבְּרוּ שָׁקֶר
  chosen: speak lies
  alternatives:
  - have spoken falsehood
  - speak deceit
  lexicon: HALOT
  rationale: Although the Hebrew perfect can be rendered as past, the verse presents
    characteristic conduct in a prophetic accusation; present English communicates
    that force well. 'Lies' is more idiomatic than the abstract 'falsehood' here.
- source_word: וּלְשׁוֹנָם רְמִיָּה
  chosen: their tongue is deceitful
  alternatives:
  - their tongue is treacherous
  - their tongue is deceit
  lexicon: HALOT
  rationale: רְמִיָּה denotes deceit, treachery, or fraud. Predicative 'is deceitful'
    yields clear English while preserving the metaphor of the tongue as the instrument
    of deception.
- source_word: בְּפִיהֶם
  chosen: in their mouth
  alternatives:
  - in their mouths
  - on their lips
  lexicon: HALOT
  rationale: The Hebrew uses singular 'mouth' with plural suffix, a common collective
    idiom. 'In their mouth' preserves the singular form and the concrete imagery;
    'on their lips' would be smoother but less literal.
