id: MIC.6.15
reference: Micah 6:15
source:
  edition: WLC
  text: אַתָּ֥ה תִזְרַ֖ע וְ/לֹ֣א תִקְצ֑וֹר אַתָּ֤ה תִדְרֹֽךְ זַ֨יִת֙ וְ/לֹא תָס֣וּךְ
    שֶׁ֔מֶן וְ/תִיר֖וֹשׁ וְ/לֹ֥א תִשְׁתֶּה יָּֽיִן־־־׃
translation:
  text: You will sow, but you will not reap; you will tread olives, but you will not
    anoint yourself with oil; and you will tread out new wine, but you will not drink
    wine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'you will tread olives ... and new wine,' with the second
      clause likely carrying over the verb 'tread/press' from the first.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִזְרַע
  chosen: you will sow
  alternatives:
  - you will plant
  lexicon: HALOT
  rationale: The verb זרע commonly means 'to sow' seed. 'Sow' preserves the agricultural
    imagery and pairs naturally with 'reap' in English.
- source_word: תִקְצוֹר
  chosen: you will not reap
  alternatives:
  - you will not harvest
  lexicon: HALOT
  rationale: קצר is the standard verb for reaping/harvesting grain. 'Reap' is chosen
    for its tight lexical pairing with 'sow' and its idiomatic force in judgment contexts.
- source_word: תִדְרֹךְ זַיִת
  chosen: you will tread olives
  alternatives:
  - you will press olives
  lexicon: HALOT
  rationale: דרך literally means 'to tread.' Since olives were commonly crushed by
    treading/pressing, 'tread olives' keeps the concrete image of the Hebrew while
    remaining understandable.
- source_word: תָסוּךְ שֶׁמֶן
  chosen: you will not anoint yourself with oil
  alternatives:
  - you will not rub yourself with oil
  - you will not use the oil
  lexicon: HALOT
  rationale: 'סוך refers to smearing or anointing with oil, often on the body. ''Anoint
    yourself with oil'' best reflects the reflexive sense implied by the context:
    the produced oil will not be enjoyed personally.'
- source_word: תִירוֹשׁ
  chosen: new wine
  alternatives:
  - fresh wine
  - grape juice
  lexicon: HALOT
  rationale: תירוש denotes freshly produced wine/must. 'New wine' is the standard
    and most natural rendering in prophetic and agricultural contexts; 'grape juice'
    is too restrictive and can understate the fermented-wine sense often present in
    the term.
- source_word: וְתִירוֹשׁ
  chosen: and you will tread out new wine
  alternatives:
  - and new wine
  - and you will press grapes for new wine
  lexicon: HALOT
  rationale: 'The Hebrew lacks an explicit second verb before תירוש, but the syntax
    strongly carries over the preceding תדרך: ''you will tread [for] olives ... and
    [for] new wine.'' English requires the ellipsis to be made explicit for clarity.'
- source_word: תִשְׁתֶּה יָּיִן
  chosen: you will not drink wine
  alternatives:
  - you will not drink the wine
  lexicon: HALOT
  rationale: יין is the ordinary word for wine. Rendering it simply as 'wine' preserves
    the contrast with 'new wine' and communicates the deprivation of final enjoyment.
- source_word: אַתָּה
  chosen: you
  alternatives:
  - you yourself
  lexicon: HALOT
  rationale: The repeated pronoun adds emphasis to the direct address. English 'you'
    carries the sense adequately without overloading the line; the repetition is preserved
    structurally across the clauses.
