theological_decisions:
- issue: Nature of the judgment imagery
  chosen_reading: Covenantal judgment expressed as frustrated agricultural labor and
    denied enjoyment of produce
  alternative_readings:
  - General misfortune without covenantal overtones
  rationale: 'The verse depicts a curse pattern: labor without harvest, production
    without enjoyment. The translation preserves this stark judgment language without
    adding interpretive expansion beyond the text.'
  doctrine_reference: Preserve theological tension rather than resolve it
