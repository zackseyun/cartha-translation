id: MIC.6.2
reference: Micah 6:2
source:
  edition: WLC
  text: שִׁמְע֤וּ הָרִים֙ אֶת רִ֣יב יְהוָ֔ה וְ/הָ/אֵתָנִ֖ים מֹ֣סְדֵי אָ֑רֶץ כִּ֣י
    רִ֤יב לַֽ/יהוָה֙ עִם עַמּ֔/וֹ וְ/עִם יִשְׂרָאֵ֖ל יִתְוַכָּֽח־־־׃
translation:
  text: Hear, O mountains, the case of the LORD, and you enduring foundations of the
    earth; for the LORD has a case against his people, and he will contend with Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dispute,' 'lawsuit,' or 'controversy' for 'case' (Hebrew רִיב), a term
      often used for a covenant-legal accusation.
    reason: lexical_alternative
  - marker: b
    text: Literally 'with his people'; in this legal context, the sense is 'against
      his people.'
    reason: lexical_alternative
  - marker: c
    text: Or 'strong' or 'ancient' foundations of the earth' for 'enduring foundations
      of the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen
  lexicon: HALOT
  rationale: Imperative plural of שׁמע. 'Hear' is concise and preserves the prophetic
    summons; 'listen' is possible but slightly more interpretive in tone.
- source_word: הָרִים
  chosen: O mountains
  alternatives:
  - mountains
  lexicon: HALOT
  rationale: Direct address to creation as covenant witnesses. Adding 'O' reflects
    vocative force naturally in English prophetic style.
- source_word: רִיב
  chosen: case
  alternatives:
  - dispute
  - lawsuit
  - controversy
  lexicon: HALOT
  rationale: רִיב here carries forensic/covenantal dispute language. 'Case' preserves
    the legal sense in readable modern English without overtechnicality; 'lawsuit'
    is possible but more formal and potentially too specific.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: הָאֵתָנִים
  chosen: enduring
  alternatives:
  - strong
  - everlasting
  - ancient
  lexicon: HALOT
  rationale: The adjective denotes firmness, permanence, or enduring strength. 'Enduring'
    fits the imagery of long-standing geological witnesses and reads naturally with
    'foundations of the earth.'
- source_word: מֹסְדֵי אָרֶץ
  chosen: foundations of the earth
  alternatives:
  - foundations of the land
  - earth's foundations
  lexicon: HALOT
  rationale: Construct phrase meaning the foundational parts of the earth/land. 'Earth'
    best matches the cosmic witness imagery alongside 'mountains.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the summons to hear. 'For' is the most straightforward
    connective in English.
- source_word: עִם עַמּוֹ
  chosen: against his people
  alternatives:
  - with his people
  lexicon: HALOT
  rationale: 'Although עִם literally means ''with,'' in the context of רִיב it expresses
    adversative legal relation: the LORD has a case with/against his people. English
    ''against'' makes the forensic sense explicit.'
- source_word: יִתְוַכָּח
  chosen: he will contend
  alternatives:
  - he will argue
  - he will dispute
  - he will plead his case
  lexicon: HALOT
  rationale: Hitpael of יכח can denote entering into argument, dispute, or legal contention.
    'He will contend' preserves the formal, judicial tone and parallels the preceding
    רִיב language.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Standard transliteration of the covenant people/name.
