theological_decisions:
- issue: Referent and nuance of 'the reproach of my people'
  chosen_reading: Rendered literally as 'the reproach of my people' without resolving
    whether it means reproach directed at God's people, reproach formerly borne by
    God's people, or reproach that God's people now bear because of judgment.
  alternative_readings:
  - the reproach against my people
  - the disgrace of my people
  - the reproach my people bear
  rationale: The Hebrew construct chain is concise and somewhat ambiguous. To preserve
    theological and interpretive tension, the main text stays close to the source
    rather than specifying one interpretive direction beyond the grammar.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
