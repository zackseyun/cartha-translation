id: MIC.6.16
reference: Micah 6:16
source:
  edition: WLC
  text: וְ/יִשְׁתַּמֵּ֞ר חֻקּ֣וֹת עָמְרִ֗י וְ/כֹל֙ מַעֲשֵׂ֣ה בֵית אַחְאָ֔ב וַ/תֵּלְכ֖וּ
    בְּ/מֹֽעֲצוֹתָ֑/ם לְמַעַן֩ תִּתִּ֨/י אֹתְ/ךָ֜ לְ/שַׁמָּ֗ה וְ/יֹשְׁבֶ֨י/הָ֙ לִ/שְׁרֵקָ֔ה
    וְ/חֶרְפַּ֥ת עַמִּ֖/י תִּשָּֽׂאוּ־׃פ
translation:
  text: The statutes of Omri are kept, and all the works of the house of Ahab; and
    you walk in their counsels, so that I may make you a desolation, and her inhabitants
    an object of hissing, and you will bear the reproach of my people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the practices of the house of Ahab.'
    reason: lexical_alternative
  - marker: b
    text: Or 'her inhabitants a hissing,' that is, something people hiss at in derision.
    reason: cultural_note
  - marker: c
    text: Or 'the disgrace of my people,' or 'the reproach against my people.' The
      Hebrew phrase is compact and may be understood in more than one way.
    reason: alternative_reading
lexical_decisions:
- source_word: וְיִשְׁתַּמֵּר
  chosen: are kept
  alternatives:
  - is kept
  - has been kept
  - one keeps
  lexicon: HALOT
  rationale: 'Nifal/imperfect of שׁמר here is best taken as an impersonal/passive-like
    statement: ''the statutes ... are kept.'' Although the verb is 3ms while the subject
    חֻקּוֹת is plural, Hebrew often uses such agreement patterns in impersonal or
    collective constructions. Rendering as passive English is the most natural and
    preserves the sense that Omri''s statutes are being observed.'
- source_word: חֻקּוֹת
  chosen: statutes
  alternatives:
  - decrees
  - ordinances
  lexicon: HALOT
  rationale: חֻקּוֹת commonly denotes prescribed statutes or enactments. 'Statutes'
    preserves the formal, legal nuance and fits the prophetic indictment of following
    royal policy contrary to the LORD.
- source_word: עָמְרִי
  chosen: Omri
  rationale: Personal name transliterated per project philosophy.
- source_word: מַעֲשֵׂה בֵית אַחְאָב
  chosen: the works of the house of Ahab
  alternatives:
  - the practices of the house of Ahab
  - the deeds of Ahab's house
  lexicon: HALOT
  rationale: מַעֲשֵׂה can mean deed, work, or practice. 'Works' is slightly more formal
    and pairs well with 'statutes,' while 'of the house of Ahab' preserves the dynastic
    reference.
- source_word: וַתֵּלְכוּ
  chosen: you walk
  alternatives:
  - you have walked
  - you follow
  lexicon: HALOT
  rationale: Though morphologically a wayyiqtol 2mp, in prophetic discourse it can
    function with present/resultative force in English. 'You walk' conveys ongoing
    conduct and matches the accusation of habitual behavior.
- source_word: בְּמֹעֲצוֹתָם
  chosen: in their counsels
  alternatives:
  - by their counsels
  - according to their plans
  - in their advice
  lexicon: HALOT
  rationale: מוֹעֵצָה/עֵצָה here refers to counsel, plan, or policy. 'In their counsels'
    keeps the metaphor of walking and preserves the plural suffix referring back to
    Omri/Ahab's house.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - therefore
  - with the result that
  lexicon: HALOT
  rationale: לְמַעַן normally expresses purpose or intended result. 'So that' preserves
    the Hebrew linkage between Judah/Israel's conduct and the announced judgment without
    over-interpreting causality.
- source_word: תִּתִּי
  chosen: I may make
  alternatives:
  - I will make
  - I give
  lexicon: HALOT
  rationale: From נתן, in this construction 'give/make' into a state. With לְמַעַן,
    'I may make' reflects the purpose/result nuance. English idiom prefers 'make'
    rather than 'give' here.
- source_word: אֹתְךָ
  chosen: you
  alternatives:
  - you (singular)
  rationale: Second masculine singular object likely addresses the city/people corporately.
    English 'you' is sufficient in the main text; the singular force is not easily
    represented without awkwardness.
- source_word: לְשַׁמָּה
  chosen: a desolation
  alternatives:
  - an appalling ruin
  - a horror
  - a wasteland
  lexicon: HALOT
  rationale: שַׁמָּה denotes desolation/devastation, often with overtones of horror.
    'A desolation' is concise and standard without becoming archaic.
- source_word: וְיֹשְׁבֶיהָ
  chosen: her inhabitants
  alternatives:
  - its inhabitants
  - those who dwell in her
  lexicon: HALOT
  rationale: The feminine singular suffix naturally refers to the city/land personified.
    'Her inhabitants' preserves the feminine personification better than 'its inhabitants.'
- source_word: לִשְׁרֵקָה
  chosen: an object of hissing
  alternatives:
  - a hissing
  - something to be hissed at
  - an object of scorn
  lexicon: HALOT
  rationale: The noun refers to derisive hissing or whistling at a ruined place. 'An
    object of hissing' is idiomatic enough while preserving the concrete image better
    than the more interpretive 'scorn.'
- source_word: וְחֶרְפַּת עַמִּי
  chosen: the reproach of my people
  alternatives:
  - the disgrace of my people
  - the taunt against my people
  lexicon: HALOT
  rationale: חֶרְפָּה is reproach, disgrace, or taunt. 'Reproach' keeps the broad
    semantic range and allows either objective or subjective nuance. The phrase is
    syntactically difficult, so a more literal rendering is preferable in the main
    text.
- source_word: תִּשָּׂאוּ
  chosen: you will bear
  alternatives:
  - you shall carry
  - you will endure
  lexicon: HALOT
  rationale: נשא with חֶרְפָּה commonly means to bear or carry reproach. 'Bear' is
    natural English and preserves the metaphor.
