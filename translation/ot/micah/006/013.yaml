theological_decisions:
- issue: Divine judgment phrasing in הֶחֱלֵיתִי הַכּוֹתֶךָ
  chosen_reading: 'Rendered as an inceptive judgment formula: ''have begun to strike
    you'''
  alternative_readings:
  - '''have made you sick by striking you'''
  - '''I have wounded you, striking you'''
  rationale: The Hebrew permits a causative sense from חלה, but the idiomatic sequence
    with the infinitive of נכה is widely taken as 'begin to strike.' This preserves
    the force of escalating divine judgment without over-specifying physical illness
    where the context emphasizes punitive devastation.
  doctrine_reference: Translation philosophy §1, §3, §6
