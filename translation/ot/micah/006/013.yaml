id: MIC.6.13
reference: Micah 6:13
source:
  edition: WLC
  text: וְ/גַם אֲנִ֖י הֶחֱלֵ֣יתִי הַכּוֹתֶ֑/ךָ הַשְׁמֵ֖ם עַל חַטֹּאתֶֽ/ךָ־־׃
translation:
  text: Therefore I too have begun to strike you, making you desolate because of your
    sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I have made you sick by striking you.' The Hebrew verb can also carry
      the sense of causing sickness or weakness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: Therefore ... too
  alternatives:
  - And also
  - So also
  lexicon: HALOT
  rationale: The conjunction plus adverb marks continuation with emphatic addition
    in light of the preceding accusations and judgments. 'Therefore' brings out the
    inferential force in context, while 'too' preserves the additive emphasis of גַם.
- source_word: אֲנִי
  chosen: I
  lexicon: HALOT
  rationale: 'Explicit pronoun is retained for emphasis: the speaker himself is acting
    in judgment.'
- source_word: הֶחֱלֵיתִי
  chosen: have begun
  alternatives:
  - have made sick
  - have made weak
  - have wounded
  lexicon: HALOT
  rationale: 'From חלה in the Hiphil, the form can denote causing sickness/weakness
    or beginning. In this construction with the following infinitive ''to strike you,''
    the idiom is commonly understood as inceptive: ''I have begun to strike you.''
    This best fits the syntax and avoids an awkward double-causative reading.'
- source_word: הַכּוֹתֶךָ
  chosen: to strike you
  alternatives:
  - to smite you
  - to beat you
  lexicon: HALOT
  rationale: Infinitive construct of נכה with 2ms suffix. 'Strike' is clear modern
    English and preserves the judicial/punitive force without archaic tone.
- source_word: הַשְׁמֵם
  chosen: making you desolate
  alternatives:
  - laying you waste
  - devastating you
  - causing desolation
  lexicon: HALOT
  rationale: 'From שמם in the Hiphil, expressing the result of the striking: bringing
    devastation/desolation. ''Making you desolate'' is natural English and keeps the
    severe covenant-judgment sense.'
- source_word: עַל
  chosen: because of
  alternatives:
  - for
  - on account of
  lexicon: HALOT
  rationale: Here עַל introduces the ground or cause of judgment. 'Because of' communicates
    the causal sense most clearly in contemporary English.
- source_word: חַטֹּאתֶךָ
  chosen: your sins
  alternatives:
  - your sin
  lexicon: HALOT
  rationale: 'Although the form can be understood collectively, the plural ''sins''
    best reflects the likely distributive sense in context: multiple covenant violations
    just listed in the preceding verses.'
