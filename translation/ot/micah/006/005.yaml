id: MIC.6.5
reference: Micah 6:5
source:
  edition: WLC
  text: עַמִּ֗/י זְכָר נָא֙ מַה יָּעַ֗ץ בָּלָק֙ מֶ֣לֶךְ מוֹאָ֔ב וּ/מֶה עָנָ֥ה אֹת֖/וֹ בִּלְעָ֣ם בֶּן בְּע֑וֹר מִן הַ/שִּׁטִּים֙ עַד הַ/גִּלְגָּ֔ל לְמַ֕עַן דַּ֖עַת צִדְק֥וֹת יְהוָֽה־־־־־־׃
translation:
  text: My people, please remember what Balak king of Moab planned, and what Balaam son of Beor answered him—from Shittim to Gilgal—so that you may know the righteous acts of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what Balak king of Moab counseled/devised.'
    reason: lexical_alternative
  - marker: b
    text: Shittim and Gilgal are place names recalling Israel's journey from the plains of Moab into the land.
    reason: cultural_note
  - marker: c
    text: Or 'the saving acts of the LORD' or 'the acts of righteousness of the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: עַמִּי
  chosen: My people
  alternatives:
  - My nation
  lexicon: HALOT
  rationale: Vocative address from God to Israel. 'My people' is the natural covenantal rendering in English and preserves the relational force better than 'my nation.'
- source_word: זְכָר נָא
  chosen: please remember
  alternatives:
  - remember now
  - do remember
  lexicon: HALOT
  rationale: Imperative זְכָר with particle נָא softens or urges the command. 'Please remember' captures the appeal without archaic tone; 'now' is possible but less idiomatic here.
- source_word: מַה יָּעַץ
  chosen: what ... planned
  alternatives:
  - what ... counseled
  - what ... devised
  lexicon: HALOT
  rationale: יעץ in this context refers to Balak's counsel/plot against Israel. 'Planned' is clear modern English and fits the hostile intent better than the more wooden 'counseled.'
- source_word: בָּלָק מֶלֶךְ מוֹאָב
  chosen: Balak king of Moab
  alternatives:
  - Balak, the king of Moab
  lexicon: HALOT
  rationale: Standard transliteration of the proper names; appositional title rendered directly.
- source_word: וּמֶה עָנָה אֹתוֹ
  chosen: and what ... answered him
  alternatives:
  - and how ... answered him
  - and what reply ... gave him
  lexicon: HALOT
  rationale: ענה with direct object here means 'answer, reply to.' 'Answered him' is the most direct rendering; 'how' is interpretive, while the Hebrew uses 'what.'
- source_word: בִּלְעָם בֶּן בְּעוֹר
  chosen: Balaam son of Beor
  lexicon: HALOT
  rationale: Standard transliteration of the personal names, preserving the patronymic construction.
- source_word: מִן הַשִּׁטִּים עַד הַגִּלְגָּל
  chosen: from Shittim to Gilgal
  alternatives:
  - from Acacia Grove to Gilgal
  lexicon: HALOT
  rationale: These are place names marking Israel's movement from the plains of Moab into the land. Transliteration is preferred for proper names; a more interpretive gloss like 'Acacia Grove' is possible for Shittim but less standard.
- source_word: לְמַעַן דַּעַת
  chosen: so that you may know
  alternatives:
  - in order that you may know
  - so that one may know
  lexicon: HALOT
  rationale: Purpose clause with infinitive construct of ידע. English supplies the implied second-person subject from the direct address ('My people').
- source_word: צִדְקוֹת
  chosen: the righteous acts
  alternatives:
  - the saving acts
  - the acts of righteousness
  - the righteous deeds
  lexicon: HALOT
  rationale: Plural of צדקה here refers to the LORD's covenant-faithful, just acts on Israel's behalf. 'Righteous acts' preserves the lexical link to righteousness while fitting the historical context. 'Saving acts' captures part of the sense but narrows the term.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
