theological_decisions:
- issue: Meaning of צִדְקוֹת יְהוָה
  chosen_reading: Yahweh's righteous acts
  alternative_readings:
  - the LORD's saving acts
  - the LORD's acts of justice/righteousness
  rationale: The phrase can denote God's just and covenant-faithful deeds in history, especially his deliverance and guidance of Israel. Rendering it 'righteous acts' preserves the broader theological range without reducing it only to salvation or only to forensic justice.
