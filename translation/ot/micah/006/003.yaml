theological_decisions:
- issue: Covenantal/juridical tone of the divine address
  chosen_reading: Retain the direct, personal challenge of the LORD to Israel without
    adding explicit lawsuit terminology in the main text.
  alternative_readings:
  - My people, what have I done against you?
  - Answer against me / testify against me
  rationale: The verse stands within a covenant lawsuit context, but the Hebrew here
    does not require explicitly adversative wording. The translation preserves the
    tension by rendering the questions and command plainly, while noting the possible
    juridical nuance in a footnote.
