id: MIC.6.3
reference: Micah 6:3
source:
  edition: WLC
  text: עַמִּ֛/י מֶה עָשִׂ֥יתִי לְ/ךָ֖ וּ/מָ֣ה הֶלְאֵתִ֑י/ךָ עֲנֵ֥ה בִּֽ/י־׃
translation:
  text: My people, what have I done to you? How have I wearied you? Answer me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “How have I burdened you?”
    reason: lexical_alternative
  - marker: b
    text: Or “Answer against me” or “Testify against me,” reflecting the possible
      courtroom setting of the passage.
    reason: alternative_reading
lexical_decisions:
- source_word: עַמִּי
  chosen: My people
  alternatives:
  - My nation
  - O my people
  lexicon: HALOT
  rationale: Vocative with 1cs suffix; 'My people' is the natural covenantal address
    in prophetic discourse. 'O my people' is possible but not required in contemporary
    English.
- source_word: מֶה
  chosen: what
  lexicon: HALOT
  rationale: Straightforward interrogative pronoun introducing the first question.
- source_word: עָשִׂיתִי לְךָ
  chosen: have I done to you
  alternatives:
  - did I do to you
  lexicon: HALOT
  rationale: Qal perfect 1cs of עשה with ל marks action directed toward the hearer.
    Present perfect English fits the rhetorical review of past dealings with present
    relevance.
- source_word: וּמָה
  chosen: How
  alternatives:
  - And in what way
  - And what
  lexicon: HALOT
  rationale: Though formally 'and what,' idiomatic English in parallel with the following
    verb is best expressed as 'How,' preserving the sense of manner in the accusation-challenge.
- source_word: הֶלְאֵתִיךָ
  chosen: have I wearied you
  alternatives:
  - have I burdened you
  - have I made you weary
  lexicon: HALOT
  rationale: Hiphil perfect 1cs + 2ms suffix from לאה, causative sense 'cause to be
    weary.' 'Wearied' is concise, idiomatic, and preserves the rhetorical force.
- source_word: עֲנֵה
  chosen: Answer
  alternatives:
  - Testify
  - Respond
  lexicon: HALOT
  rationale: Imperative 2ms from ענה. In context YHWH summons the people to reply
    to his questions. 'Answer' best fits the immediate discourse, while 'testify'
    is a possible juridical nuance.
- source_word: בִּי
  chosen: me
  alternatives:
  - against me
  - to me
  lexicon: HALOT
  rationale: With ענה, the preposition can indicate responding to or concerning someone.
    Here 'Answer me' is the most natural English equivalent. The context of covenant
    lawsuit allows a possible adversative nuance, but that is not necessary in the
    main text.
