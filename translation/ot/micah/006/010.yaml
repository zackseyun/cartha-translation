theological_decisions:
- issue: Interpretation of the opening clause as interrogative despite textual difficulty
  chosen_reading: 'A rhetorical question: ''Are there still...?'''
  alternative_readings:
  - A declarative statement about the continued presence of unjust gain in the wicked
    house
  rationale: The immediate context in Micah 6 contains a sequence of divine accusations
    framed as questions (cf. following verse), so the interrogative reading best fits
    the discourse flow. This is a translational and contextual decision rather than
    a doctrinally loaded one.
