id: MIC.6.10
reference: Micah 6:10
source:
  edition: WLC
  text: ע֗וֹד הַ/אִשׁ֙ בֵּ֣ית רָשָׁ֔ע אֹצְר֖וֹת רֶ֑שַׁע וְ/אֵיפַ֥ת רָז֖וֹן זְעוּמָֽה׃
translation:
  text: Are there still in the house of the wicked treasures of wickedness, and a
    scant measure that is accursed?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'ephah,' a standard dry measure; here it refers to a merchant's measuring
      container.
    reason: lexical_alternative
  - marker: b
    text: Or 'a deficient ephah that is accursed.'
    reason: alternative_reading
lexical_decisions:
- source_word: עוֹד
  chosen: still
  alternatives:
  - yet
  - again
  lexicon: HALOT
  rationale: 'Adverb indicating continuance: the prophet asks whether these unjust
    practices persist. ''Still'' is natural modern English and preserves the sense
    of ongoing presence.'
- source_word: הַאִשׁ
  chosen: Are there
  alternatives:
  - Is there still
  - Still is there
  lexicon: HALOT
  rationale: This form is difficult and commonly understood as an interrogative particle
    in context, yielding a rhetorical question. Rendering it as 'Are there' produces
    idiomatic English while reflecting the interrogative force of the Hebrew clause.
- source_word: בֵּית רָשָׁע
  chosen: the house of the wicked
  alternatives:
  - the house of the wicked man
  - the house of a wicked man
  lexicon: HALOT
  rationale: Construct phrase meaning the household or house belonging to a wicked
    person. 'The wicked' is concise and idiomatic, and can represent the singular
    class-like use without over-specifying 'man' in English.
- source_word: אֹצְרוֹת רֶשַׁע
  chosen: treasures of wickedness
  alternatives:
  - stores of wickedness
  - treasures gained by wickedness
  - wicked treasures
  lexicon: HALOT
  rationale: Literally 'treasures/stores of wickedness.' The phrase likely refers
    to wealth amassed unjustly, but the Hebrew expression itself is retained rather
    than expanded interpretively. 'Treasures of wickedness' preserves both the concrete
    and moral force.
- source_word: אֵיפַת
  chosen: measure
  alternatives:
  - ephah
  lexicon: HALOT
  rationale: An ephah is a dry measure. For readable modern English, 'measure' communicates
    the function in context; the more technical 'ephah' is preserved in a footnote
    as a lexical alternative.
- source_word: רָזוֹן
  chosen: scant
  alternatives:
  - lean
  - short
  - deficient
  lexicon: HALOT
  rationale: Describes the measure as undersized or deficient. 'Scant' is idiomatic
    in English for a short measure and fits the commercial injustice being condemned.
- source_word: זְעוּמָה
  chosen: accursed
  alternatives:
  - abominable
  - detestable
  - under condemnation
  lexicon: HALOT
  rationale: Conveys something denounced or cursed because it is morally offensive.
    'Accursed' preserves the strong evaluative force without flattening it to mere
    dislike.
