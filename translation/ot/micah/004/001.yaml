id: MIC.4.1
reference: Micah 4:1
source:
  edition: WLC
  text: וְ/הָיָ֣ה בְּ/אַחֲרִ֣ית הַ/יָּמִ֗ים יִ֠הְיֶה הַ֣ר בֵּית יְהוָ֤ה נָכוֹן֙ בְּ/רֹ֣אשׁ
    הֶ/הָרִ֔ים וְ/נִשָּׂ֥א ה֖וּא מִ/גְּבָע֑וֹת וְ/נָהֲר֥וּ עָלָ֖י/ו עַמִּֽים׀־׃
translation:
  text: And it will happen in the latter days that the mountain of the house of the
    LORD will be established as the chief of the mountains, and it will be lifted
    up above the hills, and peoples will stream to it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the last days' or 'in days to come.'
    reason: alternative_reading
  - marker: b
    text: Hebrew 'at the head of the mountains'; the phrase may denote highest prominence
      rather than merely physical location.
    reason: lexical_alternative
  - marker: c
    text: The verb pictures peoples 'flowing' like a stream to the mountain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it will happen
  alternatives:
  - And it shall come to pass
  - And it will be
  lexicon: HALOT
  rationale: Introduces a future prophetic circumstance. 'It will happen' preserves
    the eventive force in readable modern English better than the archaic 'it shall
    come to pass.'
- source_word: בְּאַחֲרִית הַיָּמִים
  chosen: in the latter days
  alternatives:
  - in the last days
  - in days to come
  lexicon: HALOT
  rationale: A standard prophetic expression referring to a future climactic period.
    'Latter days' is more formally precise and avoids over-specifying eschatological
    systems, while remaining natural English.
- source_word: הַר בֵּית יְהוָה
  chosen: the mountain of the house of the LORD
  alternatives:
  - the mountain of the LORD's house
  lexicon: HALOT
  rationale: A construct chain referring to the mountain associated with the temple/house
    of YHWH. The chosen wording is transparent to the Hebrew structure while still
    readable. YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and alignment with the stated doctrine policy.
- source_word: נָכוֹן
  chosen: established
  alternatives:
  - set firm
  - fixed
  - made firm
  lexicon: HALOT
  rationale: Conveys firmness and secure placement. In context of exalted Zion, 'established'
    communicates both stability and recognized prominence.
- source_word: בְּרֹאשׁ הֶהָרִים
  chosen: as the chief of the mountains
  alternatives:
  - at the head of the mountains
  - on the top of the mountains
  - above the mountains
  lexicon: HALOT
  rationale: The phrase is spatial-metaphorical and can suggest rank or prominence,
    not merely physical location. 'As the chief of the mountains' captures the comparative
    exaltation implied by the context and parallel line.
- source_word: וְנִשָּׂא הוּא מִגְּבָעוֹת
  chosen: and it will be lifted up above the hills
  alternatives:
  - and it will be raised above the hills
  - and it will be exalted above the hills
  lexicon: HALOT
  rationale: The passive participial form with pronoun emphasizes the mountain's exalted
    status. 'Lifted up above' preserves the imagery without over-allegorizing it.
- source_word: וְנָהֲרוּ
  chosen: will stream
  alternatives:
  - will flow
  - will flock
  lexicon: HALOT
  rationale: The verb literally evokes flowing like a river, strikingly applied to
    peoples moving uphill. 'Stream' preserves the metaphor in idiomatic English better
    than the more literal but potentially awkward 'flow.'
- source_word: עַמִּים
  chosen: peoples
  alternatives:
  - nations
  - peoples of the nations
  lexicon: HALOT
  rationale: The plural refers to multiple ethnic groups. 'Peoples' preserves the
    lexical distinction from a more political term like 'nations' and fits the universal
    scope of the prophecy.
- source_word: עָלָיו
  chosen: to it
  alternatives:
  - to him
  - upon it
  lexicon: HALOT
  rationale: Refers to the mountain in context. English idiom with verbs of movement
    prefers 'to it,' even though the Hebrew preposition is literally 'upon/to him-it.'
