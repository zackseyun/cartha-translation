theological_decisions:
- issue: Eschatological expression in prophetic formula
  chosen_reading: in the latter days
  alternative_readings:
  - in the last days
  - in days to come
  rationale: The Hebrew phrase can be rendered in several ways, but the chosen wording
    preserves the prophetic and potentially eschatological openness of the text without
    forcing a specific millennial or covenantal framework.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Nature of the mountain's exaltation
  chosen_reading: The language is rendered as both spatial and honorific exaltation
    without deciding between literal topographical change and symbolic supremacy.
  alternative_readings:
  - strictly literal elevation
  - purely metaphorical prominence
  rationale: The verse's imagery may encompass both physical and symbolic dimensions.
    The translation keeps the imagery intact rather than narrowing it to one theological
    interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
