theological_decisions:
- issue: Personification of Zion/Jerusalem as a woman addressed in the second feminine
    singular
  chosen_reading: Preserved implicitly through second-person feminine imagery and
    explicit childbirth comparison, without adding 'Daughter Zion' or another interpretive
    identifier not present in this verse.
  alternative_readings:
  - Make the referent explicit in the main text as 'Daughter Zion'
  - Neutralize the feminine imagery into a generic national address
  rationale: The verse itself uses second feminine singular forms and compares the
    addressee to a woman giving birth. The translation preserves that imagery without
    importing a fuller identification from the surrounding context into the verse
    text.
  doctrine_reference: Translation philosophy §§1, 3, 6
