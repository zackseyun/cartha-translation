id: MIC.4.9
reference: Micah 4:9
source:
  edition: WLC
  text: עַתָּ֕ה לָ֥/מָּה תָרִ֖יעִי רֵ֑עַ הֲ/מֶ֣לֶךְ אֵֽין בָּ֗/ךְ אִֽם יוֹעֲצֵ/ךְ֙
    אָבָ֔ד כִּֽי הֶחֱזִיקֵ֥/ךְ חִ֖יל כַּ/יּוֹלֵדָֽה־־־׃
translation:
  text: Now why do you cry out so loudly? Is there no king in you? Has your counselor
    perished, that labor pains have seized you like a woman giving birth?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'raise a loud shout' / 'cry aloud.' The Hebrew verb can denote a loud
      outcry or shout; here it likely expresses anguished crying.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'Is there no king in you?'
    reason: lexical_alternative
  - marker: c
    text: Or 'have taken hold of you' or 'have gripped you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָרִיעִי
  chosen: cry out so loudly
  alternatives:
  - raise a shout
  - shout aloud
  - cry aloud
  lexicon: HALOT
  rationale: Hiphil of רוע/ריע can denote raising a loud cry or shout. In this context
    of distress, 'cry out so loudly' captures both the volume and lament-like force
    better than a neutral 'shout.'
- source_word: רֵעַ
  chosen: so loudly
  alternatives:
  - with a loud noise
  - a loud cry
  lexicon: HALOT
  rationale: The noun functions adverbially with תָרִיעִי, indicating the manner/intensity
    of the crying. Rendering it adverbially produces natural English while preserving
    the emphasis on loud outcry.
- source_word: הֲמֶלֶךְ אֵין בָּךְ
  chosen: Is there no king in you?
  alternatives:
  - Do you have no king?
  - Is your king not there?
  lexicon: HALOT
  rationale: The Hebrew literally says 'Is there no king in you?' The idiom likely
    refers to Zion/Jerusalem personified as a woman. Retaining 'in you' preserves
    the metaphor and the source wording better than flattening it to mere possession.
- source_word: יוֹעֲצֵךְ
  chosen: your counselor
  alternatives:
  - your adviser
  lexicon: HALOT
  rationale: The participial form from יעץ denotes one who gives counsel. 'Counselor'
    is the most direct and idiomatic rendering here.
- source_word: אָבָד
  chosen: has ... perished
  alternatives:
  - is gone
  - has been destroyed
  lexicon: HALOT
  rationale: The verb commonly means perish/be lost. 'Has perished' preserves the
    starkness of the Hebrew rhetorical question without over-specifying the manner
    of loss.
- source_word: הֶחֱזִיקֵךְ
  chosen: have seized you
  alternatives:
  - have taken hold of you
  - have gripped you
  lexicon: HALOT
  rationale: The Hiphil of חזק here conveys taking hold forcefully. Because the subject
    is 'labor pains,' English idiom favors the plural 'have seized you,' even though
    the Hebrew verb is singular with a collective noun.
- source_word: חִיל
  chosen: labor pains
  alternatives:
  - writhing
  - anguish
  - travail
  lexicon: HALOT
  rationale: In this context, especially with the following comparison to a woman
    giving birth, the noun denotes birth pangs/labor pains rather than generic strength
    or army. This is the clearest contextual sense.
- source_word: כַּיּוֹלֵדָה
  chosen: like a woman giving birth
  alternatives:
  - like a woman in labor
  - like a woman bearing a child
  lexicon: HALOT
  rationale: The participial form explicitly refers to a woman in the act of childbirth.
    'Like a woman giving birth' is vivid, natural, and closely aligned with the Hebrew
    image.
- source_word: עַתָּה לָמָּה
  chosen: Now why
  alternatives:
  - Why now
  - And now why
  lexicon: HALOT
  rationale: This opening combines temporal transition and rhetorical challenge. 'Now
    why' preserves both the discourse shift and the interrogative force in natural
    English.
