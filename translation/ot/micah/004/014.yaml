id: MIC.4.14
reference: Micah 4:14
source:
  edition: WLC
  text: עַתָּה֙ תִּתְגֹּדְדִ֣י בַת גְּד֔וּד מָצ֖וֹר שָׂ֣ם עָלֵ֑י/נוּ בַּ/שֵּׁ֨בֶט֙
    יַכּ֣וּ עַֽל הַ/לְּחִ֔י אֵ֖ת שֹׁפֵ֥ט יִשְׂרָאֵֽל־־׃ס
translation:
  text: Now muster yourself in troops, daughter of troops; a siege is set against
    us. With a rod they strike the judge of Israel on the cheek.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gash yourself' or 'cut yourself,' if the verb is taken in the sense
      of self-laceration rather than mustering troops.
    reason: lexical_alternative
  - marker: b
    text: Or 'they will strike'; the Hebrew imperfect may be read with future force
      in prophetic context.
    reason: lexical_alternative
  - marker: c
    text: '''Judge of Israel'' may refer generally to Israel''s ruler or leader; some
      interpreters also see a messianic foreshadowing in context.'
    reason: alternative_reading
lexical_decisions:
- source_word: תִּתְגֹּדְדִי
  chosen: muster yourself in troops
  alternatives:
  - gash yourself
  - gather yourself in bands
  - cut yourself
  lexicon: HALOT
  rationale: The hitpolel of גדד can denote cutting/gashing oneself or gathering in
    bands. In this military context, followed immediately by 'daughter of troops'
    and 'a siege is set against us,' the sense of mustering or massing troops best
    fits the discourse. The reflexive English 'muster yourself' preserves the stem's
    reflexive nuance.
- source_word: בַת גְּדוּד
  chosen: daughter of troops
  alternatives:
  - daughter of a troop
  - troop-city
  lexicon: HALOT
  rationale: A literal filial construction is retained because 'daughter of X' is
    a common Hebrew personification for a city/community. 'Troops' reflects גְּדוּד
    in the military sense and matches the surrounding siege imagery.
- source_word: מָצוֹר
  chosen: a siege
  alternatives:
  - siegeworks
  - fortification
  - besieging force
  lexicon: HALOT
  rationale: In context this noun refers to siege conditions or siegeworks set against
    the city. 'A siege' is idiomatic and captures the military pressure without over-specifying
    the exact apparatus.
- source_word: שָׂם עָלֵינוּ
  chosen: is set against us
  alternatives:
  - he has placed against us
  - one has set against us
  lexicon: HALOT
  rationale: The Hebrew uses a singular perfect 'has set/placed' with an unspecified
    subject. English idiom prefers the passive here, which preserves the sense without
    forcing an explicit subject absent from the text.
- source_word: בַּשֵּׁבֶט
  chosen: with a rod
  alternatives:
  - with the staff
  - with the scepter
  lexicon: HALOT
  rationale: שֵׁבֶט can mean rod, staff, or scepter. In a striking context, 'rod'
    is the most natural instrument. 'Scepter' would foreground royal symbolism more
    than the immediate action warrants, though the humiliation of a ruler may echo
    that nuance.
- source_word: יַכּוּ
  chosen: they strike
  alternatives:
  - they will strike
  - they smite
  lexicon: HALOT
  rationale: The imperfect can be rendered as present or future in prophetic discourse.
    Here an English present gives vividness and fits the immediate siege scene; the
    future sense remains possible and is preserved in a footnote.
- source_word: עַל הַלְּחִי
  chosen: on the cheek
  alternatives:
  - on the jaw
  lexicon: HALOT
  rationale: לְחִי denotes cheek or jaw. 'Cheek' better conveys the humiliating insult
    implied by striking a ruler in the face.
- source_word: שֹׁפֵט יִשְׂרָאֵל
  chosen: the judge of Israel
  alternatives:
  - Israel's ruler
  - the ruler of Israel
  lexicon: HALOT
  rationale: The participial noun from שׁפט is rendered straightforwardly as 'judge.'
    Although in context it may function broadly for a ruler/leader, retaining 'judge'
    stays closer to the Hebrew and preserves possible resonance with earlier Israelite
    leadership terminology.
