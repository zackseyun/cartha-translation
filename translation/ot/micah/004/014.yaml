theological_decisions:
- issue: Potential messianic significance of 'the judge of Israel'
  chosen_reading: Render the phrase non-interpretively as 'the judge of Israel' without
    making an explicit messianic identification in the main text.
  alternative_readings:
  - a contemporary king/ruler of Judah
  - a messianic ruler foreshadowing the Messiah
  rationale: The immediate context concerns siege and humiliation of Israel/Judah's
    leader. Some Christian interpretation sees typological or messianic significance,
    especially in light of the following verse's ruler from Bethlehem, but this verse
    itself does not unambiguously identify the figure as the Messiah. To preserve
    theological tension and avoid importing a doctrinal claim the text does not make
    explicitly, the translation remains lexical and non-interpretive.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
