theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD.' This also preserves continuity with Jewish reverence tradition while
    still distinguishing the covenant name from generic 'God.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered distributive אִישׁ
  chosen_reading: each
  alternative_readings:
  - each man
  - every man
  - each one
  rationale: The source is grammatically masculine, but here it functions distributively
    with collective 'all the peoples,' not as a statement about male persons specifically.
    Rendering it as 'each' preserves the source intent rather than flattening it into
    an unnecessarily male-specific English phrase.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
