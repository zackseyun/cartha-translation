id: MIC.4.5
reference: Micah 4:5
source:
  edition: WLC
  text: כִּ֚י כָּל הָ֣/עַמִּ֔ים יֵלְכ֕וּ אִ֖ישׁ בְּ/שֵׁ֣ם אֱלֹהָ֑י/ו וַ/אֲנַ֗חְנוּ
    נֵלֵ֛ךְ בְּ/שֵׁם יְהוָ֥ה אֱלֹהֵ֖י/נוּ לְ/עוֹלָ֥ם וָ/עֶֽד־־׃פ
translation:
  text: For all the peoples walk, each in the name of his god, but we will walk in
    the name of the LORD our God forever and ever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the nations.' The Hebrew עַמִּים can denote peoples or nations;
      'peoples' was chosen to preserve the plural ethnic-group sense.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'each man in the name of his god.' The translation uses 'each' because
      אִישׁ functions distributively here with 'all the peoples.'
    reason: lexical_alternative
  - marker: c
    text: '''The LORD'' renders the divine name YHWH. Alternative English forms include
      ''Yahweh'' and ''Jehovah.'''
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces an explanatory or grounding statement for the preceding
    promise, so 'For' best preserves the discourse connection in natural English.
- source_word: כָּל הָעַמִּים
  chosen: all the peoples
  alternatives:
  - all the nations
  - all peoples
  lexicon: HALOT
  rationale: עַמִּים commonly means 'peoples' or 'nations.' 'Peoples' preserves the
    plural ethnic-group sense more formally than the flatter 'people,' and keeps distinction
    from Israel/Judah.
- source_word: יֵלְכוּ
  chosen: walk
  alternatives:
  - go
  - live
  lexicon: HALOT
  rationale: הלך with בְּשֵׁם in covenantal/religious contexts often carries the sense
    of conduct or allegiance, not mere motion. 'Walk' preserves the Hebrew idiom and
    its ethical-religious nuance.
- source_word: אִישׁ
  chosen: each
  alternatives:
  - every man
  - each one
  lexicon: HALOT
  rationale: Although literally 'man,' here אִישׁ distributively modifies the plural
    subject ('all the peoples'). 'Each' conveys the distributive force in idiomatic
    English without implying only males; this is a context-driven exception documented
    per the translation philosophy.
- source_word: בְּשֵׁם
  chosen: in the name of
  alternatives:
  - by the name of
  - under the name of
  lexicon: HALOT
  rationale: The phrase denotes allegiance, invocation, or authority. 'In the name
    of' is the standard and sufficiently transparent rendering, preserving the repeated
    parallelism in both halves of the verse.
- source_word: אֱלֹהָיו
  chosen: his god
  alternatives:
  - its god
  - his gods
  lexicon: HALOT
  rationale: 'The singular with 3ms suffix matches the distributive אִישׁ: each people/person
    walks in the name of its own deity. ''His god'' preserves the singular form and
    the distributive syntax most directly.'
- source_word: וַאֲנַחְנוּ
  chosen: but we
  alternatives:
  - and we
  - as for us, we
  lexicon: HALOT
  rationale: Though the conjunction is formally 'and,' the context is contrastive
    between the nations and the covenant people. 'But we' brings out the adversative
    force naturally in English.
- source_word: נֵלֵךְ
  chosen: will walk
  alternatives:
  - walk
  - will go
  lexicon: HALOT
  rationale: The imperfect here expresses resolve or future commitment. 'Will walk'
    preserves both the verbal parallel with יֵלְכוּ and the covenantal sense of ongoing
    conduct.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the pattern reflected
    in many English translations.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: This construct with suffix expresses covenant relationship. 'Our God'
    is the direct and natural rendering.
- source_word: לְעוֹלָם וָעֶד
  chosen: forever and ever
  alternatives:
  - forever
  - for evermore
  - to eternity and beyond
  lexicon: HALOT
  rationale: The paired expression intensifies enduring perpetuity. 'Forever and ever'
    is idiomatic, weighty, and preserves the emphatic force better than the simpler
    'forever'.
