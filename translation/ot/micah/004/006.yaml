id: MIC.4.6
reference: Micah 4:6
source:
  edition: WLC
  text: בַּ/יּ֨וֹם הַ/ה֜וּא נְאֻם יְהוָ֗ה אֹֽסְפָה֙ הַ/צֹּ֣לֵעָ֔ה וְ/הַ/נִּדָּחָ֖ה אֲקַבֵּ֑צָה וַ/אֲשֶׁ֖ר הֲרֵעֹֽתִי־׃
translation:
  text: In that day, declares Yahweh, I will gather the lame, and I will assemble the outcast, even those whom I have afflicted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the limping' for 'the lame.' The Hebrew uses a feminine singular participle with collective force.
    reason: lexical_alternative
  - marker: b
    text: Or 'the driven away' or 'the banished' for 'the outcast.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and those whom I have brought to grief.' The Hebrew explicitly attributes the prior affliction to the LORD.
    reason: alternative_reading
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  chosen: In that day
  alternatives:
  - On that day
  - At that time
  lexicon: HALOT
  rationale: Standard prophetic temporal formula. 'In that day' is idiomatic English and preserves the eschatological-prophetic register without over-paraphrase.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: נְאֻם is a prophetic utterance formula. 'Declares the LORD' is natural modern English and preserves the solemn prophetic force. YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered according to the project's default for יְהוָה, following the stated doctrine table.
- source_word: אֹסְפָה
  chosen: I will gather
  alternatives:
  - I will collect
  - I will bring together
  lexicon: HALOT
  rationale: אָסַף commonly means gather/collect. 'Gather' fits restoration language and pairs well with the following verb without sounding mechanical.
- source_word: הַצֹּלֵעָה
  chosen: the lame
  alternatives:
  - the limping
  - the crippled
  lexicon: HALOT
  rationale: The participle denotes one who limps/is lame. 'The lame' is the most idiomatic collective rendering in English and matches the likely collective-singular force here for a group characterized by weakness.
- source_word: וְהַנִּדָּחָה
  chosen: the outcast
  alternatives:
  - the driven away
  - the banished
  - the scattered
  lexicon: HALOT
  rationale: From נדח, 'driven away/banished.' 'The outcast' is concise, idiomatic, and suits the restoration context. 'Scattered' is possible in some contexts but less precise here because the passive sense of being driven away is prominent.
- source_word: אֲקַבֵּצָה
  chosen: I will assemble
  alternatives:
  - I will gather
  - I will bring together
  lexicon: HALOT
  rationale: קבץ overlaps with אסף, but using 'assemble' preserves some lexical distinction while keeping natural English. The two verbs together intensify the promise of restoration rather than requiring identical glosses.
- source_word: וַאֲשֶׁר
  chosen: even those whom
  alternatives:
  - and those whom
  - including those whom
  lexicon: HALOT
  rationale: Introduces an additional group linked to the previous objects. 'Even those whom' brings out the climactic inclusion of persons already under affliction.
- source_word: הֲרֵעֹתִי
  chosen: I have afflicted
  alternatives:
  - I have harmed
  - I have brought to misery
  - I have caused grief to
  lexicon: HALOT
  rationale: Hiphil of רעע here indicates causing calamity/distress. 'I have afflicted' is theologically and contextually appropriate, preserving divine agency in judgment without overstating malicious intent. Present perfect in English fits the prior action whose effects remain relevant.
