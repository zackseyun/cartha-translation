theological_decisions:
- issue: Divine agency in the clause 'those whom I have afflicted'
  chosen_reading: 'Retain explicit first-person divine agency: ''those whom I have afflicted'''
  alternative_readings:
  - those whom I have brought to grief
  - those I have allowed to be afflicted
  rationale: The Hebrew Hiphil first-person singular explicitly attributes the affliction to the LORD. The translation should preserve this theological tension of judgment followed by restoration, rather than softening divine agency. This aligns with the project's principle of preserving tension rather than resolving it.
  doctrine_reference: Translation philosophy §3
