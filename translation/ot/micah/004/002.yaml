id: MIC.4.2
reference: Micah 4:2
source:
  edition: WLC
  text: וְֽ/הָלְכ֞וּ גּוֹיִ֣ם רַבִּ֗ים וְ/אָֽמְרוּ֙ לְכ֣וּ וְ/נַעֲלֶ֣ה אֶל הַר יְהוָ֗ה וְ/אֶל בֵּית֙ אֱלֹהֵ֣י יַעֲקֹ֔ב וְ/יוֹרֵ֨/נוּ֙ מִ/דְּרָכָ֔י/ו וְ/נֵלְכָ֖ה בְּ/אֹֽרְחֹתָ֑י/ו כִּ֤י מִ/צִּיּוֹן֙ תֵּצֵ֣א תוֹרָ֔ה וּ/דְבַר יְהוָ֖ה מִ/ירוּשָׁלִָֽם׀־־־־׃
translation:
  text: And many nations will come and say, “Come, let us go up to the mountain of Yahweh, to the house of the God of Jacob, that he may teach us his ways and that we may walk in his paths.” For from Zion Torah will go out, and the word of Yahweh from Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “law” or “instruction” for “Torah.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָלְכוּ
  chosen: will come
  alternatives:
  - will go
  - will walk
  lexicon: HALOT
  rationale: הלך literally means 'go/walk,' but with nations moving toward Zion in this pilgrimage context, idiomatic English prefers 'come' from the deictic perspective of the destination. This preserves the movement sense without woodenly saying 'walk.'
- source_word: גּוֹיִם רַבִּים
  chosen: many nations
  alternatives:
  - many peoples
  lexicon: HALOT
  rationale: גּוֹיִם normally denotes nations/Gentile peoples. 'Many nations' is the most direct rendering here and fits the international scope of the vision.
- source_word: לְכוּ וְנַעֲלֶה
  chosen: Come, let us go up
  alternatives:
  - Come, let us ascend
  lexicon: HALOT
  rationale: The imperative plus cohortative invites shared action. 'Go up' preserves the ascent language associated with going to Jerusalem while remaining natural English.
- source_word: הַר יְהוָה
  chosen: the mountain of the LORD
  alternatives:
  - the hill of the LORD
  lexicon: HALOT
  rationale: הַר is 'mountain.' יְהוָה is rendered 'the LORD' per doctrine guidance for the divine name.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בֵּית אֱלֹהֵי יַעֲקֹב
  chosen: the house of the God of Jacob
  alternatives:
  - the temple of the God of Jacob
  lexicon: HALOT
  rationale: '''House'' is the literal term and preserves the biblical idiom. Although the referent is temple-like, ''temple'' would interpret beyond the wording.'
- source_word: וְיוֹרֵנוּ
  chosen: that he may teach us
  alternatives:
  - and he will teach us
  - that he will instruct us
  lexicon: HALOT
  rationale: The Hiphil of ירה here expresses desired/resulting instruction after the cohortative invitation. English 'that he may teach us' captures the purpose nuance naturally.
- source_word: מִדְּרָכָיו
  chosen: his ways
  alternatives:
  - from his ways
  lexicon: HALOT
  rationale: Although the preposition מן is present, in this idiom with ירה it often marks the content/source of instruction. English omits a wooden 'from' and renders the sense as 'teach us his ways.'
- source_word: וְנֵלְכָה
  chosen: that we may walk
  alternatives:
  - and let us walk
  - that we may live
  lexicon: HALOT
  rationale: The cohortative continues the purpose/result sequence. 'Walk' preserves the common biblical metaphor for conduct without over-interpreting it as merely 'live.'
- source_word: בְּאֹרְחֹתָיו
  chosen: in his paths
  alternatives:
  - in his ways
  - in his tracks
  lexicon: HALOT
  rationale: אֹרַח overlaps with 'way' language but is distinct enough to justify 'paths,' preserving the poetic parallelism with דְּרָכָיו as 'ways.'
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: כִּי introduces the reason the nations seek instruction. 'For' fits the explanatory connection in elevated but readable English.
- source_word: מִצִּיּוֹן
  chosen: from Zion
  alternatives: []
  lexicon: HALOT
  rationale: Direct and standard rendering of the place name with the preposition preserved.
- source_word: תֵּצֵא
  chosen: will go out
  alternatives:
  - shall go forth
  - will come forth
  lexicon: HALOT
  rationale: יצא means 'go out/come out.' 'Will go out' is clear modern English; 'go forth' is traditional but more archaic.
- source_word: תּוֹרָה
  chosen: Torah
  alternatives:
  - law
  - instruction
  lexicon: HALOT
  rationale: תּוֹרָה can mean instruction or law, but in this Zion-centered prophetic context 'Torah' preserves the covenantal and scriptural resonance without flattening it to merely legal code. The untranslated Hebrew term is sufficiently familiar in English and more precise than 'law.'
- source_word: וּדְבַר יְהוָה
  chosen: and the word of the LORD
  alternatives:
  - and the message of the LORD
  lexicon: HALOT
  rationale: דָּבָר can mean word/message/matter. 'Word of the LORD' is the standard prophetic expression and best preserves its theological and literary force.
- source_word: מִירוּשָׁלִָם
  chosen: from Jerusalem
  alternatives: []
  lexicon: HALOT
  rationale: Straightforward rendering of the place name with the preposition preserved.
