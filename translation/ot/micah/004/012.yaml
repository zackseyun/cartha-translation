id: MIC.4.12
reference: Micah 4:12
source:
  edition: WLC
  text: וְ/הֵ֗מָּה לֹ֤א יָֽדְעוּ֙ מַחְשְׁב֣וֹת יְהוָ֔ה וְ/לֹ֥א הֵבִ֖ינוּ עֲצָת֑/וֹ כִּ֥י קִבְּצָ֖/ם כֶּ/עָמִ֥יר גֹּֽרְנָ/ה׃
translation:
  text: But they do not know the thoughts of Yahweh, and they do not understand his plan, for he has gathered them like sheaves to the threshing floor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his counsel' or 'his purpose.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'like sheaves to the threshing floor,' an image of being gathered for threshing and judgment.
    reason: cultural_note
lexical_decisions:
- source_word: וְהֵמָּה
  chosen: But they
  alternatives:
  - And they
  - Yet they
  lexicon: HALOT
  rationale: The pronoun is explicit and contrastive in context; 'But they' brings out the adversative force naturally in English, though the conjunction is formally 'and.'
- source_word: יָדְעוּ
  chosen: do not know
  alternatives:
  - have not known
  lexicon: HALOT
  rationale: The perfect is rendered with present force in English because the statement expresses their current lack of understanding, not merely a past event.
- source_word: מַחְשְׁבוֹת
  chosen: thoughts
  alternatives:
  - plans
  - intentions
  lexicon: HALOT
  rationale: The noun can denote thoughts, plans, or intentions. 'Thoughts' preserves the lexical sense here, while the following עֲצָה is rendered 'plan' to avoid flattening the distinction between the two terms.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הֵבִינוּ
  chosen: do not understand
  alternatives:
  - have not understood
  - do not discern
  lexicon: HALOT
  rationale: The verb בִּין emphasizes understanding or discernment. 'Do not understand' is clear modern English and pairs well with 'do not know' without becoming redundant because the objects differ.
- source_word: עֲצָתוֹ
  chosen: his plan
  alternatives:
  - his counsel
  - his purpose
  lexicon: HALOT
  rationale: עֵצָה often means counsel, plan, or purpose. 'Plan' is more readable than 'counsel' in modern English and fits the context of divine intention toward the nations.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the reason they fail to understand the LORD's plan. 'For' is concise and natural in elevated narrative-prophetic style.
- source_word: קִבְּצָם
  chosen: he has gathered them
  alternatives:
  - he gathered them
  - he is gathering them
  lexicon: HALOT
  rationale: The subject is best understood as the LORD from context, and the suffix refers to the hostile nations. The perfect is rendered as present-resultative ('has gathered') to connect the action with the current situation.
- source_word: כֶּעָמִיר
  chosen: like sheaves
  alternatives:
  - like a heap of grain
  - like cut grain
  lexicon: HALOT
  rationale: עָמִיר refers to a sheaf or heap of cut grain. 'Like sheaves' is the most idiomatic image in English and suits the threshing metaphor.
- source_word: גֹּרְנָה
  chosen: to the threshing floor
  alternatives:
  - onto the threshing floor
  - at the threshing floor
  lexicon: HALOT
  rationale: The directional ending indicates motion toward the threshing floor. 'To the threshing floor' preserves that sense clearly.
