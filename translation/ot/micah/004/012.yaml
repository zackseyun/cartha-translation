theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Identifying the subject of 'he has gathered them'
  chosen_reading: The implied subject is the LORD, gathering the nations for judgment.
  alternative_readings:
  - An unspecified subject
  - Zion as the gatherer
  rationale: The nearest and most coherent antecedent in context is the LORD, whose thoughts and plan the nations do not understand. The agricultural image points to divine gathering for threshing judgment, not merely human action.
