id: MIC.4.7
reference: Micah 4:7
source:
  edition: WLC
  text: וְ/שַׂמְתִּ֤י אֶת הַ/צֹּֽלֵעָה֙ לִ/שְׁאֵרִ֔ית וְ/הַ/נַּהֲלָאָ֖ה לְ/ג֣וֹי עָצ֑וּם
    וּ/מָלַ֨ךְ יְהוָ֤ה עֲלֵי/הֶם֙ בְּ/הַ֣ר צִיּ֔וֹן מֵ/עַתָּ֖ה וְ/עַד עוֹלָֽם־־׃פ
translation:
  text: And I will make the lame a remnant, and the one driven away a strong nation;
    and the LORD will reign over them on Mount Zion from now and forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the outcast.' The Hebrew term can denote one who has been removed or
      banished; 'driven away' highlights the exile context.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''from now on and forever.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתִּי
  chosen: And I will make
  alternatives:
  - And I will set
  - And I will appoint
  lexicon: HALOT
  rationale: שׂוּם commonly means 'put, set, make.' In this predicative construction
    with לְ ('make ... into/as'), 'make' is the most natural English rendering.
- source_word: הַצֹּלֵעָה
  chosen: the lame
  alternatives:
  - the limping one
  - the crippled one
  lexicon: HALOT
  rationale: From צלע, 'to limp/be lame.' The feminine singular likely personifies
    the afflicted community, but English can preserve the collective/personified sense
    with 'the lame' without over-specifying gender.
- source_word: לִשְׁאֵרִית
  chosen: a remnant
  alternatives:
  - for a remnant
  - into a remnant
  lexicon: HALOT
  rationale: שְׁאֵרִית is a key prophetic term for what remains after judgment. In
    English, 'make ... a remnant' best conveys the resultative force of לְ here.
- source_word: הַנַּהֲלָאָה
  chosen: the one driven away
  alternatives:
  - the outcast
  - the one removed
  - the one led away
  lexicon: HALOT
  rationale: The form denotes one who has been caused to depart or removed. 'Driven
    away' fits the exile/restoration context and avoids importing later ecclesial
    connotations of 'outcast.'
- source_word: לְגוֹי עָצוּם
  chosen: a strong nation
  alternatives:
  - a mighty nation
  - a powerful people
  lexicon: HALOT
  rationale: גּוֹי is straightforwardly 'nation/people'; עָצוּם means 'strong, mighty.'
    'Strong nation' is clear modern English and preserves the political-corporate
    sense.
- source_word: וּמָלַךְ יְהוָה
  chosen: and the LORD will reign
  alternatives:
  - and the LORD will be king
  - and the LORD shall rule as king
  lexicon: HALOT
  rationale: מלך in the Qal can mean 'reign' or 'be king.' 'Will reign' is idiomatic
    and preserves the royal action. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD,' following Jewish reverence tradition and LXX pattern.
- source_word: עֲלֵיהֶם
  chosen: over them
  alternatives:
  - upon them
  lexicon: HALOT
  rationale: With מלך, עַל indicates rule over a people. 'Over them' is the natural
    English expression for kingship.
- source_word: בְּהַר צִיּוֹן
  chosen: on Mount Zion
  alternatives:
  - in Mount Zion
  - at Mount Zion
  lexicon: HALOT
  rationale: The phrase denotes the location of the LORD's reign. 'On Mount Zion'
    is standard and idiomatic for a mountain.
- source_word: מֵעַתָּה וְעַד עוֹלָם
  chosen: from now and forever
  alternatives:
  - from now on and forever
  - from this time forth and forever
  lexicon: HALOT
  rationale: The expression marks an unending future duration. 'From now and forever'
    is concise, natural English, though 'from now on and forever' is slightly more
    formal.
