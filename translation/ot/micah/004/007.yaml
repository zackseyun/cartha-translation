theological_decisions:
- issue: Rendering the restoration figures as singular personifications or explicit
    collectives
  chosen_reading: Retain singular expressions ('the lame,' 'the one driven away')
    while allowing them to represent the restored community.
  alternative_readings:
  - 'Render as plurals: ''the lame ones ... those driven away'''
  rationale: The Hebrew uses feminine singular forms, likely personifying Zion's afflicted
    people. Preserving the singular keeps closer to the source while still making
    sense in English as representative language.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence.
