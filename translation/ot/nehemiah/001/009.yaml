theological_decisions:
- issue: Divine-presence formula in the sanctuary clause
  chosen_reading: to make my name dwell there
  alternative_readings:
  - to set my name there
  rationale: 'The Hebrew uses the established covenant-sanctuary expression about
    God''s name dwelling in the chosen place. Rendering it literally preserves the
    theological tension: God identifies the place with his name without implying that
    his being is spatially confined there. A flatter rendering like ''set my name
    there'' is possible but loses the dwelling imagery.'
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
