id: NEH.1.9
reference: Nehemiah 1:9
source:
  edition: WLC
  text: וְ/שַׁבְתֶּ֣ם אֵלַ֔/י וּ/שְׁמַרְתֶּם֙ מִצְוֺתַ֔/י וַ/עֲשִׂיתֶ֖ם אֹתָ֑/ם אִם
    יִהְיֶ֨ה נִֽדַּחֲ/כֶ֜ם בִּ/קְצֵ֤ה הַ/שָּׁמַ֨יִם֙ מִ/שָּׁ֣ם אֲקַבְּצֵ֔/ם ו/הבואתי/ם
    אֶל הַ/מָּק֔וֹם אֲשֶׁ֣ר בָּחַ֔רְתִּי לְ/שַׁכֵּ֥ן אֶת שְׁמִ֖/י שָֽׁם־־־׃
translation:
  text: but if you return to me and keep my commandments and do them, though your
    outcasts are at the end of the heavens, from there I will gather them and bring
    them to the place that I have chosen, to make my name dwell there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your banished ones' or 'your dispersed ones.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'at the end of the heavens,' an idiom for the farthest possible distance.
    reason: cultural_note
  - marker: c
    text: Or 'to set my name there.' The Hebrew preserves the imagery of God's name
      dwelling at the chosen place.
    reason: alternative_reading
lexical_decisions:
- source_word: וְשַׁבְתֶּם אֵלַי
  chosen: but if you return to me
  alternatives:
  - and you return to me
  - if you turn back to me
  lexicon: HALOT
  rationale: שׁוּב with אֶל commonly means 'return/turn back to.' In context this
    continues the conditional statement from the previous verse, so English supplies
    'if' and uses 'but if' to reflect the discourse contrast and flow.
- source_word: וּשְׁמַרְתֶּם מִצְוֺתַי
  chosen: and keep my commandments
  alternatives:
  - and observe my commandments
  lexicon: HALOT
  rationale: שׁמר with commandments is idiomatically 'keep' in English and preserves
    covenantal obedience language.
- source_word: וַעֲשִׂיתֶם אֹתָם
  chosen: and do them
  alternatives:
  - and carry them out
  - and practice them
  lexicon: HALOT
  rationale: The Hebrew explicitly distinguishes guarding/keeping from doing; 'do
    them' preserves that repetition rather than collapsing the clauses.
- source_word: נִדַּחֲכֶם
  chosen: your outcasts
  alternatives:
  - your banished ones
  - your dispersed ones
  lexicon: HALOT
  rationale: The noun/participle from נדח refers to those driven away or scattered.
    'Outcasts' is concise and fits the exile context, while preserving the passive
    sense of being driven away.
- source_word: בִּקְצֵה הַשָּׁמַיִם
  chosen: at the end of the heavens
  alternatives:
  - at the farthest part of heaven
  - at the ends of the heavens
  - under the farthest heavens
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the cosmic idiom for extreme distance.
    Plural 'heavens' reflects Hebrew שָׁמַיִם better than singular 'heaven'.
- source_word: מִשָּׁם אֲקַבְּצֵם
  chosen: from there I will gather them
  alternatives:
  - from there I will collect them
  lexicon: HALOT
  rationale: קבץ is the standard verb for regathering scattered people; 'gather' is
    the natural covenant-restoration term in English.
- source_word: וַהֲבֹאתִים
  chosen: and bring them
  alternatives:
  - and cause them to come
  lexicon: HALOT
  rationale: Hiphil of בוא is causative, but idiomatic English expresses this simply
    as 'bring them.'
- source_word: הַמָּקוֹם אֲשֶׁר בָּחַרְתִּי
  chosen: the place that I have chosen
  alternatives:
  - the place which I chose
  lexicon: HALOT
  rationale: בחר denotes divine election of the sanctuary location. Present perfect
    in English fits the continuing relevance of the choice.
- source_word: לְשַׁכֵּן אֶת שְׁמִי שָׁם
  chosen: to make my name dwell there
  alternatives:
  - for my name to dwell there
  - to set my name there
  lexicon: HALOT
  rationale: The causative of שכן with 'my name' reflects the Deuteronomic formula
    of God's name dwelling at the chosen place. 'Make my name dwell' preserves the
    wording without overinterpreting it as mere memorial or as full divine localization.
