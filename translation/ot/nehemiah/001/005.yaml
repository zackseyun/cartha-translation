id: NEH.1.5
reference: Nehemiah 1:5
source:
  edition: WLC
  text: וָ/אֹמַ֗ר אָֽנָּ֤א יְהוָה֙ אֱלֹהֵ֣י הַ/שָּׁמַ֔יִם הָ/אֵ֥ל הַ/גָּד֖וֹל וְ/הַ/נּוֹרָ֑א
    שֹׁמֵ֤ר הַ/בְּרִית֙ וָ/חֶ֔סֶד לְ/אֹהֲבָ֖י/ו וּ/לְ/שֹׁמְרֵ֥י מִצְוֺתָֽי/ו׃
translation:
  text: And I said, “Please, O LORD, God of heaven, the great and awe-inspiring God,
    who keeps the covenant and steadfast love for those who love him and keep his
    commandments,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the great and fearsome God.”
    reason: lexical_alternative
  - marker: b
    text: Or “who keeps the covenant and covenant faithfulness / lovingkindness.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  chosen: And I said
  alternatives:
  - Then I said
  - So I said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces Nehemiah's prayer speech. 'And I said' preserves
    the narrative sequence without overinterpreting the conjunction.
- source_word: אָֽנָּא
  chosen: Please
  alternatives:
  - I pray
  - Ah
  lexicon: HALOT
  rationale: Polite entreaty particle in prayer. 'Please' is natural modern English
    and preserves the supplicatory tone better than archaic 'I pray.'
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common covenantal usage in English Bibles.
- source_word: אֱלֹהֵי הַשָּׁמַיִם
  chosen: God of heaven
  alternatives:
  - God of the heavens
  lexicon: HALOT
  rationale: Construct phrase meaning 'God of heaven.' Singular 'heaven' is idiomatic
    in English for this Hebrew expression.
- source_word: הָאֵל
  chosen: God
  alternatives:
  - the God
  - the Mighty One
  lexicon: HALOT
  rationale: Appositional divine title following 'God of heaven.' Rendering as 'God'
    keeps the parallel titles clear and natural in English; 'Mighty One' is possible
    but less idiomatic here.
- source_word: הַגָּדוֹל
  chosen: great
  alternatives:
  - mighty
  lexicon: HALOT
  rationale: Basic adjectival sense is 'great.' 'Mighty' would add a nuance not explicit
    in this adjective.
- source_word: וְהַנּוֹרָא
  chosen: awe-inspiring
  alternatives:
  - awesome
  - fearsome
  - terrible
  lexicon: HALOT
  rationale: From ירא in the Niphal participial/adjectival form, describing God as
    one who evokes reverent fear. 'Awe-inspiring' communicates this better in contemporary
    English than the weakened modern sense of 'awesome' or the misleading harshness
    of 'terrible.'
- source_word: שֹׁמֵר
  chosen: who keeps
  alternatives:
  - keeping
  - who guards
  - who preserves
  lexicon: HALOT
  rationale: Participial form functioning attributively of God. 'Who keeps' is smooth
    English and fits covenant language.
- source_word: הַבְּרִית
  chosen: the covenant
  alternatives:
  - his covenant
  - the treaty
  lexicon: HALOT
  rationale: Definite noun with well-established theological sense in biblical Hebrew.
    'The covenant' preserves the formal covenantal category.
- source_word: וָחֶסֶד
  chosen: and steadfast love
  alternatives:
  - and lovingkindness
  - and covenant faithfulness
  - and mercy
  lexicon: HALOT
  rationale: חסד in covenant contexts often denotes loyal, steadfast love. 'Steadfast
    love' is both readable and theologically weighty, preserving the covenantal nuance
    better than bare 'mercy.'
- source_word: לְאֹהֲבָיו
  chosen: for those who love him
  alternatives:
  - to those who love him
  - for his lovers
  lexicon: HALOT
  rationale: Dative/prepositional phrase marking the beneficiaries/objects of God's
    covenant-keeping. 'For those who love him' reads naturally in English and matches
    the following parallel phrase.
- source_word: וּלְשֹׁמְרֵי מִצְוֺתָיו
  chosen: and keep his commandments
  alternatives:
  - and for those who keep his commandments
  - and observe his commandments
  lexicon: HALOT
  rationale: Parallel participial phrase. In English, folding it into the relative
    clause after 'those who love him' avoids awkward repetition while preserving the
    sense. 'Commandments' is the standard rendering of מצות in covenantal contexts.
