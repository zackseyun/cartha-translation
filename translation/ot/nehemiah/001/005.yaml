theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This also fits the prayer's covenantal register in English.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering חֶסֶד in covenant context
  chosen_reading: steadfast love
  alternative_readings:
  - lovingkindness
  - covenant faithfulness
  - mercy
  rationale: The verse pairs covenant and חסד, so the translation should preserve
    covenant loyalty without becoming overly technical. 'Steadfast love' balances
    readability and theological depth.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
