id: NEH.1.6
reference: Nehemiah 1:6
source:
  edition: WLC
  text: תְּהִ֣י נָ֣א אָזְנְ/ךָֽ קַשֶּׁ֣בֶת וְֽ/עֵינֶ֪י/ךָ פְתֻוּח֟וֹת לִ/שְׁמֹ֣עַ
    אֶל תְּפִלַּ֣ת עַבְדְּ/ךָ֡ אֲשֶׁ֣ר אָנֹכִי֩ מִתְפַּלֵּ֨ל לְ/פָנֶ֤י/ךָ הַ/יּוֹם֙
    יוֹמָ֣ם וָ/לַ֔יְלָה עַל בְּנֵ֥י יִשְׂרָאֵ֖ל עֲבָדֶ֑י/ךָ וּ/מִתְוַדֶּ֗ה עַל חַטֹּ֤אות
    בְּנֵֽי יִשְׂרָאֵל֙ אֲשֶׁ֣ר חָטָ֣אנוּ לָ֔/ךְ וַ/אֲנִ֥י וּ/בֵית אָבִ֖/י חָטָֽאנוּ־־־־־־׃
translation:
  text: Please let your ear be attentive and your eyes open to hear the prayer of
    your servant that I am now praying before you day and night for the sons of Israel,
    your servants, while confessing the sins of the sons of Israel that we have sinned
    against you. I and my father's house have sinned.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the people of Israel' / 'the Israelites.' The Hebrew reads 'the sons
      of Israel,' preserving the familial covenant expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּהִי נָא
  chosen: Please let ... be
  alternatives:
  - May ... be
  - Let ... be, please
  lexicon: HALOT
  rationale: The jussive of היה with נָא expresses a polite plea or entreaty. 'Please
    let' captures both the volitional force and the supplicatory tone in natural English.
- source_word: אָזְנְךָ קַשֶּׁבֶת
  chosen: your ear be attentive
  alternatives:
  - your ear be listening
  - your ear pay attention
  lexicon: HALOT
  rationale: This is a conventional anthropomorphic prayer formula. Singular 'ear'
    is retained because the Hebrew is singular and idiomatic in prayer language; 'attentive'
    best conveys קַשֶּׁבֶת.
- source_word: וְעֵינֶיךָ פְתֻוּחוֹת
  chosen: and your eyes open
  alternatives:
  - and your eyes be open
  lexicon: HALOT
  rationale: The Hebrew uses plural 'eyes' with a passive participial adjective 'open.'
    The concise English phrase preserves the anthropomorphic parallelism with 'ear
    be attentive.'
- source_word: לִשְׁמֹעַ אֶל
  chosen: to hear
  alternatives:
  - to listen to
  lexicon: HALOT
  rationale: '''Hear'' is the more direct equivalent of שׁמע and works idiomatically
    with ''the prayer.'' The preposition אֶל is absorbed in natural English.'
- source_word: תְּפִלַּת עַבְדְּךָ
  chosen: the prayer of your servant
  alternatives:
  - your servant's prayer
  lexicon: HALOT
  rationale: Both are possible; the more formal genitival phrasing better matches
    the elevated register of the prayer while remaining readable. Here עבד is rendered
    'servant,' not 'slave,' because the context is reverential address in prayer rather
    than bonded-status emphasis.
- source_word: אֲשֶׁר אָנֹכִי מִתְפַּלֵּל לְפָנֶיךָ
  chosen: that I am now praying before you
  alternatives:
  - which I am praying before you
  - that I pray before you
  lexicon: HALOT
  rationale: The participle מִתְפַּלֵּל indicates ongoing action. 'Am now praying'
    brings out the present durative sense in context. 'Before you' preserves לְפָנֶיךָ
    without over-paraphrase.
- source_word: הַיּוֹם יוֹמָם וָלַיְלָה
  chosen: day and night
  alternatives:
  - today, by day and by night
  - continually day and night
  lexicon: HALOT
  rationale: The phrase as a whole expresses continual prayer. 'Day and night' is
    the clearest idiomatic rendering. הַיּוֹם literally 'today' likely functions adverbially
    with the present prayer setting; 'now' earlier in the clause helps preserve that
    temporal force without awkwardness.
- source_word: עַל בְּנֵי יִשְׂרָאֵל עֲבָדֶיךָ
  chosen: for the sons of Israel, your servants
  alternatives:
  - concerning the sons of Israel, your servants
  - for the people of Israel, your servants
  lexicon: HALOT
  rationale: עַל here is best taken as 'for/on behalf of' in prayer. 'Sons of Israel'
    preserves the source expression and its familial-covenantal texture; 'your servants'
    appositionally identifies them before God.
- source_word: וּמִתְוַדֶּה
  chosen: while confessing
  alternatives:
  - and confessing
  - as I confess
  lexicon: HALOT
  rationale: A participle coordinated with the previous participle describes concurrent
    action. 'While confessing' makes the simultaneity explicit in smooth English.
- source_word: חַטֹּאות
  chosen: the sins
  alternatives:
  - the offenses
  lexicon: HALOT
  rationale: Standard rendering of חטאות in a penitential context. 'Sins' preserves
    the theological and moral weight of the confession.
- source_word: אֲשֶׁר חָטָאנוּ לָךְ
  chosen: that we have sinned against you
  alternatives:
  - which we have sinned against you
  lexicon: HALOT
  rationale: English requires a smoother relative clause. 'Against you' correctly
    expresses the ethical direction of the offense marked by ל in this context.
- source_word: וַאֲנִי וּבֵית אָבִי
  chosen: I and my father's house
  alternatives:
  - both I and my father's house
  - I and my ancestral house
  lexicon: HALOT
  rationale: The phrase includes Nehemiah personally and his wider family line/household.
    'My father's house' is the standard biblical idiom and should be preserved.
- source_word: חָטָאנוּ
  chosen: have sinned
  alternatives:
  - sinned
  lexicon: HALOT
  rationale: The perfect is naturally rendered in English here as present perfect
    in a confession context, linking past acts with present guilt.
