theological_decisions:
- issue: Anthropomorphic language for God ('ear,' 'eyes')
  chosen_reading: Retained as direct anthropomorphic prayer language
  alternative_readings:
  - Paraphrase to 'pay attention' without body-part imagery
  rationale: The Hebrew prayer intentionally uses embodied imagery for divine attentiveness.
    Preserving it maintains the text's rhetoric without implying a crude corporealism.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
- issue: Rendering בְּנֵי יִשְׂרָאֵל
  chosen_reading: '''the sons of Israel'''
  alternative_readings:
  - the people of Israel
  - the Israelites
  rationale: The Hebrew is explicitly filial and masculine plural. Per the gender-accurate
    guideline, the translation preserves the source form rather than flattening it
    to a neutral collective, while still being understandable in context.
  doctrine_reference: 'Translation philosophy: gender-accurate over gender-neutral.'
