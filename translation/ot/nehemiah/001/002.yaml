id: NEH.1.2
reference: Nehemiah 1:2
source:
  edition: WLC
  text: וַ/יָּבֹ֨א חֲנָ֜נִי אֶחָ֧ד מֵ/אַחַ֛/י ה֥וּא וַ/אֲנָשִׁ֖ים מִֽ/יהוּדָ֑ה וָ/אֶשְׁאָלֵ֞/ם
    עַל הַ/יְּהוּדִ֧ים הַ/פְּלֵיטָ֛ה אֲשֶֽׁר נִשְׁאֲר֥וּ מִן הַ/שֶּׁ֖בִי וְ/עַל יְרוּשָׁלִָֽם־־־־׃
translation:
  text: Hanani, one of my brothers, came—he and some men from Judah—and I asked them
    about the Jews who had escaped, who were left from the captivity, and about Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Judeans.' The Hebrew term can refer to the people of Judah or to
      the Jewish people more broadly.
    reason: lexical_alternative
  - marker: b
    text: Or 'the survivors' or 'the remnant' for 'who had escaped.'
    reason: lexical_alternative
  - marker: c
    text: Or 'from the exile.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: Wayyiqtol of בוא narrates simple past movement. 'Came' is the most natural
    English narrative equivalent.
- source_word: חֲנָנִי
  chosen: Hanani
  rationale: Personal name is transliterated per translation philosophy.
- source_word: אֶחָד מֵאַחַי הוּא
  chosen: one of my brothers
  alternatives:
  - one of my kinsmen
  - a brother of mine
  lexicon: HALOT
  rationale: The idiom identifies Hanani as one among Nehemiah's brothers. 'Brothers'
    preserves the masculine familial term and is natural English; 'kinsmen' is broader
    than the Hebrew.
- source_word: וַאֲנָשִׁים מִיהוּדָה
  chosen: he and some men from Judah
  alternatives:
  - with men from Judah
  - and men from Judah
  lexicon: HALOT
  rationale: The clause apposes companions to Hanani. Supplying 'some' makes idiomatic
    English without overstating number. 'From Judah' reflects geographic origin.
- source_word: וָאֶשְׁאָלֵם
  chosen: I asked them
  alternatives:
  - I inquired of them
  - I questioned them
  lexicon: HALOT
  rationale: שׁאל in this context means to ask/inquire. 'I asked them' is clear modern
    English.
- source_word: עַל
  chosen: about
  alternatives:
  - concerning
  - regarding
  lexicon: HALOT
  rationale: Here עַל introduces the topic of inquiry; 'about' is the most natural
    English preposition.
- source_word: הַיְּהוּדִים
  chosen: the Jews
  alternatives:
  - the Judeans
  lexicon: HALOT
  rationale: In the Persian-period context, the term can denote the Jewish people
    or Judeans. 'The Jews' is the conventional and likely broader ethnoreligious sense
    here, since the concern is for the returned community, not merely residents of
    the province.
- source_word: הַפְּלֵיטָה
  chosen: who had escaped
  alternatives:
  - the remnant
  - the survivors
  lexicon: HALOT
  rationale: Though formally a noun ('the escaped group' / 'the survivors'), in English
    it is best rendered in relation to 'the Jews' as 'who had escaped.' This preserves
    the sense without awkwardness.
- source_word: אֲשֶׁר נִשְׁאֲרוּ
  chosen: who were left
  alternatives:
  - who remained
  lexicon: HALOT
  rationale: The relative clause further describes the escaped Jews. 'Who were left'
    is idiomatic and keeps the passive/resultative nuance.
- source_word: מִן הַשֶּׁבִי
  chosen: from the captivity
  alternatives:
  - from the exile
  - from the captives
  lexicon: HALOT
  rationale: שׁבי denotes captivity/exile. 'Captivity' closely matches the noun form
    and fits the historical setting; 'exile' is possible but slightly more interpretive.
- source_word: וְעַל יְרוּשָׁלִָם
  chosen: and about Jerusalem
  alternatives:
  - and concerning Jerusalem
  rationale: Parallel to the earlier עַל phrase, this marks Jerusalem as the second
    topic of inquiry.
