theological_decisions:
- issue: Covenantal nuance of מעל in the conditional clause
  chosen_reading: If you act unfaithfully
  alternative_readings:
  - If you are unfaithful
  - If you trespass
  rationale: The verse recalls covenant sanctions given through Moses. Rendering מעל
    as 'act unfaithfully' preserves the breach-of-faith nuance without overinterpreting
    the exact legal category.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
