id: NEH.1.8
reference: Nehemiah 1:8
source:
  edition: WLC
  text: זְכָר נָא֙ אֶת הַ/דָּבָ֔ר אֲשֶׁ֥ר צִוִּ֛יתָ אֶת מֹשֶׁ֥ה עַבְדְּ/ךָ֖ לֵ/אמֹ֑ר
    אַתֶּ֣ם תִּמְעָ֔לוּ אֲנִ֕י אָפִ֥יץ אֶתְ/כֶ֖ם בָּ/עַמִּֽים־־־׃
translation:
  text: Please remember the word that you commanded your servant Moses, saying, ‘If
    you act unfaithfully, I will scatter you among the peoples.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If you are unfaithful' or 'If you break faith.'
    reason: lexical_alternative
  - marker: b
    text: Or 'among the nations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זְכָר נָא
  chosen: Please remember
  alternatives:
  - Remember, please
  - Do remember
  lexicon: HALOT
  rationale: זְכָר is an imperative ('remember'), and נָא adds a particle of entreaty/politeness
    rather than mere emphasis. 'Please remember' conveys Nehemiah's respectful appeal
    in natural English.
- source_word: הַדָּבָר
  chosen: the word
  alternatives:
  - the matter
  - the promise
  lexicon: HALOT
  rationale: דָּבָר has a broad range including 'word,' 'matter,' or 'thing.' Here
    it refers to the specific statement/command God gave through Moses. 'The word'
    preserves the lexical form while remaining idiomatic.
- source_word: צִוִּיתָ
  chosen: you commanded
  alternatives:
  - you gave as a command
  - you charged
  lexicon: HALOT
  rationale: The verb צוה normally means 'command.' Although the content includes
    a conditional warning, the Hebrew explicitly frames it as something God commanded
    Moses. 'Commanded' best reflects the source.
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: While עבד can denote slave or servant, in reference to Moses as God's
    covenant servant the established relational sense is official service rather than
    chattel status. 'Your servant' fits the context and English usage.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Standard rendering of the quotative infinitive, introducing the content
    of the command.
- source_word: תִּמְעָלוּ
  chosen: act unfaithfully
  alternatives:
  - are unfaithful
  - break faith
  - trespass
  lexicon: HALOT
  rationale: מעל often carries the sense of acting unfaithfully or committing a breach
    of faith, especially in covenantal contexts. 'Act unfaithfully' captures the verbal
    force and covenant nuance better than the more generic 'sin'.
- source_word: אָפִיץ
  chosen: I will scatter
  alternatives:
  - I will disperse
  lexicon: HALOT
  rationale: The Hiphil of פוץ means to scatter or disperse. 'Scatter' is the most
    direct and idiomatic rendering in covenant-judgment language.
- source_word: בָּעַמִּים
  chosen: among the peoples
  alternatives:
  - among the nations
  lexicon: HALOT
  rationale: עַמִּים literally means 'peoples.' 'Among the peoples' preserves the
    plural ethnic sense. 'Nations' is possible, but 'peoples' more closely matches
    the Hebrew form here.
