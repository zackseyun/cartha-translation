id: NEH.1.1
reference: Nehemiah 1:1
source:
  edition: WLC
  text: דִּבְרֵ֥י נְחֶמְיָ֖ה בֶּן חֲכַלְיָ֑ה וַ/יְהִ֤י בְ/חֹֽדֶשׁ כסלו שְׁנַ֣ת עֶשְׂרִ֔ים
    וַ/אֲנִ֥י הָיִ֖יתִי בְּ/שׁוּשַׁ֥ן הַ/בִּירָֽה־־׃
translation:
  text: The words of Nehemiah son of Hacaliah. Now it happened in the month of Kislev,
    in the twentieth year, while I was in Susa the citadel,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The account of Nehemiah son of Hacaliah.' The Hebrew heading 'The words
      of' can introduce a memoir or narrative record.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in the twentieth year'; the verse does not explicitly state whose
      regnal year is meant, though the context later identifies Artaxerxes.
    reason: cultural_note
  - marker: c
    text: Or 'Susa the fortress.' The Hebrew term refers to a fortified royal complex.
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּבְרֵי
  chosen: The words of
  alternatives:
  - The account of
  - The records of
  lexicon: HALOT
  rationale: The construct plural of דָּבָר can introduce a written account or the
    words/deeds associated with a person. 'The words of' preserves the Hebrew heading
    idiom without over-interpreting it as strictly 'account' or 'memoirs.'
- source_word: נְחֶמְיָה
  chosen: Nehemiah
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Standard genealogical expression; 'son of' is natural English and accurately
    reflects the construct relationship.
- source_word: חֲכַלְיָה
  chosen: Hacaliah
  alternatives:
  - Hakaliah
  rationale: Personal name transliterated. 'Hacaliah' follows common English biblical
    convention; 'Hakaliah' is a plausible closer transliteration but less standard.
- source_word: וַיְהִי
  chosen: Now it happened
  alternatives:
  - And it happened
  - It came to pass
  lexicon: HALOT
  rationale: This waw-consecutive narrative formula marks transition into the narrative.
    'Now it happened' preserves the discourse function in readable modern English
    without archaic phrasing.
- source_word: בְּחֹדֶשׁ
  chosen: in the month of
  alternatives:
  - in the month
  lexicon: HALOT
  rationale: The preposition plus noun introduces a date formula. Adding 'of' is idiomatic
    in English before the month name.
- source_word: כִּסְלֵו
  chosen: Kislev
  alternatives:
  - Chislev
  rationale: Hebrew month name is best transliterated. 'Kislev' is the standard modern
    scholarly/biblical English form.
- source_word: שְׁנַת עֶשְׂרִים
  chosen: in the twentieth year
  alternatives:
  - in year twenty
  - in the twentieth year of the king
  lexicon: HALOT
  rationale: Hebrew date formula literally 'year twenty.' English idiom prefers 'in
    the twentieth year.' The referent of the regnal year is not stated in this verse,
    so it should not be supplied in the main text.
- source_word: וַאֲנִי הָיִיתִי
  chosen: while I was
  alternatives:
  - and I was
  - as I was
  lexicon: HALOT
  rationale: The clause gives the narrator's circumstance at the time. 'While I was'
    communicates the temporal setting more naturally than a bare 'and I was,' while
    staying close to the Hebrew.
- source_word: בְּשׁוּשַׁן
  chosen: in Susa
  alternatives:
  - in Shushan
  lexicon: HALOT
  rationale: Place name rendered by the standard English form 'Susa,' which is more
    familiar in contemporary usage than the older transliteration 'Shushan.'
- source_word: הַבִּירָה
  chosen: the citadel
  alternatives:
  - the fortress
  - the capital
  lexicon: HALOT
  rationale: בִּירָה denotes a fortified palace complex or citadel. 'The citadel'
    best captures the architectural-political sense without reducing it merely to
    'capital.'
