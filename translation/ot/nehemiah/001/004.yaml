id: NEH.1.4
reference: Nehemiah 1:4
source:
  edition: WLC
  text: וַ/יְהִ֞י כְּ/שָׁמְעִ֣/י אֶת הַ/דְּבָרִ֣ים הָ/אֵ֗לֶּה יָשַׁ֨בְתִּי֙ וָֽ/אֶבְכֶּ֔ה
    וָ/אֶתְאַבְּלָ֖/ה יָמִ֑ים וָֽ/אֱהִ֥י צָם֙ וּ/מִתְפַּלֵּ֔ל לִ/פְנֵ֖י אֱלֹהֵ֥י הַ/שָּׁמָֽיִם׀־׃
translation:
  text: And when I heard these words, I sat down and wept and mourned for days, and
    I was fasting and praying before the God of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'these things.' The Hebrew דְּבָרִים can mean 'words,' 'matters,' or
      'things.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I fasted and prayed.' The Hebrew form can be rendered more simply, but
      'I was fasting and praying' reflects the ongoing sense of היה with participles.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כְּשָׁמְעִי
  chosen: And when I heard
  alternatives:
  - Now when I heard
  - And it happened, when I heard
  lexicon: HALOT
  rationale: The waw-consecutive with היה plus temporal כְּ + infinitive construct
    is a common narrative-temporal construction. In natural English, 'And when I heard'
    preserves the sequence without the wooden 'and it happened.'
- source_word: הַדְּבָרִים הָאֵלֶּה
  chosen: these words
  alternatives:
  - these things
  - this report
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'thing.' Here Nehemiah responds to
    the content just reported, so 'these words' is a sufficiently literal and natural
    rendering, while still allowing that the phrase refers to the reported matters.
- source_word: יָשַׁבְתִּי
  chosen: I sat down
  alternatives:
  - I sat
  lexicon: HALOT
  rationale: The verb ישׁב literally means 'sit, dwell, remain.' In this emotional
    context, 'I sat down' best conveys the sudden physical response of collapse into
    sitting.
- source_word: וָאֶבְכֶּה
  chosen: and wept
  alternatives:
  - and I wept
  - and cried
  lexicon: HALOT
  rationale: בכה is the ordinary verb 'to weep.' 'Wept' is more precise and dignified
    than 'cried' in this lament context.
- source_word: וָאֶתְאַבְּלָה
  chosen: and mourned
  alternatives:
  - and lamented
  - and grieved
  lexicon: HALOT
  rationale: אבל denotes mourning, often with formal or sustained grief. 'Mourned'
    best matches the lexical sense and pairs naturally with the following duration
    phrase.
- source_word: יָמִים
  chosen: for days
  alternatives:
  - days
  lexicon: HALOT
  rationale: 'The plural ''days'' here functions adverbially to indicate duration.
    English idiom normally supplies ''for'': ''mourned for days.'''
- source_word: וָאֱהִי צָם וּמִתְפַּלֵּל
  chosen: and I was fasting and praying
  alternatives:
  - and I fasted and prayed
  - and I continued fasting and praying
  lexicon: HALOT
  rationale: The construction with היה plus participles presents an ongoing or durative
    action. 'I was fasting and praying' captures the progressive aspect better than
    simple past.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: לפני literally means 'before' or 'in the presence of.' 'Before' is concise
    and idiomatic in prayer language while preserving the relational sense.
- source_word: אֱלֹהֵי הַשָּׁמָיִם
  chosen: the God of heaven
  alternatives:
  - God of heaven
  lexicon: HALOT
  rationale: 'The construct phrase is a standard title for God in Ezra-Nehemiah. Including
    the article reflects the Hebrew and yields natural English: ''the God of heaven.'''
