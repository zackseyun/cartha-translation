theological_decisions:
- issue: Rendering the divine title אֱלֹהֵי הַשָּׁמָיִם
  chosen_reading: the God of heaven
  alternative_readings:
  - God of heaven
  rationale: This is a title for Israel's God, not the divine name YHWH. Therefore
    the contested-term policy for YHWH ('the LORD') does not apply here. The translation
    preserves the title as written without importing covenant-name language not present
    in the verse.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 5; Contested terms
    entry for יְהוָה
