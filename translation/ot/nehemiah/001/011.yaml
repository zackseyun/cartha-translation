id: NEH.1.11
reference: Nehemiah 1:11
source:
  edition: WLC
  text: אָנָּ֣א אֲדֹנָ֗/י תְּהִ֣י נָ֣א אָזְנְ/ךָֽ קַ֠שֶּׁבֶת אֶל תְּפִלַּ֨ת עַבְדְּ/ךָ֜
    וְ/אֶל תְּפִלַּ֣ת עֲבָדֶ֗י/ךָ הַֽ/חֲפֵצִים֙ לְ/יִרְאָ֣ה אֶת שְׁמֶ֔/ךָ וְ/הַצְלִֽיחָ/ה
    נָּ֤א לְ/עַבְדְּ/ךָ֙ הַ/יּ֔וֹם וּ/תְנֵ֣/הוּ לְ/רַחֲמִ֔ים לִ/פְנֵ֖י הָ/אִ֣ישׁ הַ/זֶּ֑ה
    וַ/אֲנִ֛י הָיִ֥יתִי מַשְׁקֶ֖ה לַ/מֶּֽלֶךְ־־־־־׃פ
translation:
  text: Please, Lord, let your ear be attentive to the prayer of your servant and
    to the prayer of your servants who delight to fear your name, and please give
    success to your servant today and grant him compassion before this man. Now I
    was cupbearer to the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who desire to revere your name' or 'who delight to stand in awe of your
      name.'
    reason: lexical_alternative
  - marker: b
    text: Or 'grant him favor before this man.' The Hebrew idiom literally speaks
      of being given 'for compassion/mercies.'
    reason: lexical_alternative
  - marker: c
    text: '''This man'' refers to the king, whom Nehemiah identifies in the next clause
      as the one he served as cupbearer.'
    reason: cross_reference
lexical_decisions:
- source_word: אָנָּא
  chosen: Please
  alternatives:
  - Ah
  - I pray
  lexicon: HALOT
  rationale: A particle of entreaty. 'Please' conveys urgent supplication in natural
    modern English without archaic tone.
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - my Lord
  - Lord GOD
  lexicon: HALOT
  rationale: Here a divine title in direct address. 'Lord' is the standard title rendering
    and fits the prayer context. It is not the Tetragrammaton, so 'the LORD' is not
    used.
- source_word: תְּהִי נָא אָזְנְךָ קַשֶּׁבֶת
  chosen: let your ear be attentive
  alternatives:
  - let your ear be listening
  - may your ear be attentive
  lexicon: HALOT
  rationale: This idiom asks God to listen favorably. 'Be attentive' preserves the
    metaphor of the ear while reading naturally in English.
- source_word: תְּפִלַּת עַבְדְּךָ
  chosen: the prayer of your servant
  alternatives:
  - your servant's prayer
  lexicon: HALOT
  rationale: Construct chain rendered straightforwardly. 'Servant' is preferable here
    because the social-bonded nuance of 'slave' is not foregrounded; the term functions
    as a humble self-designation before God.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - those who serve you
  lexicon: HALOT
  rationale: Plural of the same term. 'Servants' keeps lexical consistency with the
    singular and reflects a group devoted to God.
- source_word: הַחֲפֵצִים
  chosen: who delight
  alternatives:
  - who take pleasure
  - who desire
  lexicon: HALOT
  rationale: The participle denotes taking pleasure or delight. 'Who delight' is concise
    and idiomatic.
- source_word: לְיִרְאָה אֶת שְׁמֶךָ
  chosen: to fear your name
  alternatives:
  - to revere your name
  - to stand in awe of your name
  lexicon: HALOT
  rationale: The infinitive with 'fear' expresses reverent worship. 'Fear your name'
    preserves the biblical idiom and theological weight; 'your name' stands for God's
    revealed person and reputation.
- source_word: וְהַצְלִיחָה נָּא
  chosen: and please give success
  alternatives:
  - and please prosper
  - and make successful, please
  lexicon: HALOT
  rationale: Hiphil imperative of צלח asks God to cause success. 'Give success' is
    natural English and keeps God as the one granting favorable outcome.
- source_word: לְעַבְדְּךָ הַיּוֹם
  chosen: to your servant today
  alternatives:
  - for your servant today
  - your servant this day
  lexicon: HALOT
  rationale: The dative sense is well conveyed by 'to your servant today.' 'Today'
    fits modern style better than 'this day' while preserving immediacy.
- source_word: וּתְנֵהוּ לְרַחֲמִים
  chosen: and grant him compassion
  alternatives:
  - and give him mercy
  - and grant him favor
  - and cause him to find compassion
  lexicon: HALOT
  rationale: Literally 'give him for compassion/mercies,' an idiom for causing someone
    to receive compassionate treatment. 'Grant him compassion' preserves the mercy
    nuance better than the more generalized 'favor.' The pronoun refers to Nehemiah,
    though he speaks of himself in the third person as 'your servant.'
- source_word: לִפְנֵי הָאִישׁ הַזֶּה
  chosen: before this man
  alternatives:
  - in the presence of this man
  - with this man
  lexicon: HALOT
  rationale: The phrase indicates standing before or in relation to a specific person.
    'This man' preserves the somewhat distancing expression, likely referring to the
    king without naming him in the prayer.
- source_word: וַאֲנִי הָיִיתִי מַשְׁקֶה לַמֶּלֶךְ
  chosen: Now I was cupbearer to the king
  alternatives:
  - I was the king's cupbearer
  - Now I had been cupbearer to the king
  lexicon: HALOT
  rationale: A narrative note identifying Nehemiah's office. 'Cupbearer to the king'
    is a clear, conventional rendering; 'Now' marks the transition from prayer to
    narrative aside.
