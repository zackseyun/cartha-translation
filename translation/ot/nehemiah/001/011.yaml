theological_decisions:
- issue: Rendering of עבד in prayer language
  chosen_reading: servant
  alternative_readings:
  - slave
  rationale: Although עבד can denote a slave or servant, in this prayer context it
    functions as a humble covenantal self-designation before God rather than emphasizing
    legal bondage. Following the translation philosophy, 'slave' is reserved for contexts
    where bonded status is theologically salient.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    for δοῦλος by analogy of bonded nuance
- issue: Rendering of ירא with God's name
  chosen_reading: fear your name
  alternative_readings:
  - revere your name
  - stand in awe of your name
  rationale: The Hebrew idiom combines reverence and fear. The main text preserves
    the canonical wording 'fear' rather than softening it, while alternatives are
    preserved as lexical possibilities.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
