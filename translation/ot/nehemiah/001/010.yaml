id: NEH.1.10
reference: Nehemiah 1:10
source:
  edition: WLC
  text: וְ/הֵ֥ם עֲבָדֶ֖י/ךָ וְ/עַמֶּ֑/ךָ אֲשֶׁ֤ר פָּדִ֨יתָ֙ בְּ/כֹחֲ/ךָ֣ הַ/גָּד֔וֹל
    וּ/בְ/יָדְ/ךָ֖ הַ/חֲזָקָֽה׃
translation:
  text: But they are your servants and your people, whom you redeemed by your great
    power and by your strong hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ransomed' or 'delivered'; the Hebrew verb carries the sense of securing
      release by an act of deliverance.
    reason: lexical_alternative
  - marker: b
    text: Or 'mighty hand'; the Hebrew reads literally 'strong hand,' a common expression
      for God's powerful action.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵם
  chosen: But they
  alternatives:
  - And they
  - Now they
  lexicon: HALOT
  rationale: 'The conjunction links this verse to the preceding appeal and is mildly
    contrastive/resumptive in context: despite Israel''s sin and exile, they still
    belong to God. ''But they'' captures the discourse force better than a bare ''And
    they'' in natural English.'
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, here the covenantal relationship
    to God is foregrounded rather than bonded social status. 'Servants' is the most
    natural and contextually fitting rendering in this prayer.
- source_word: וְעַמֶּךָ
  chosen: and your people
  alternatives:
  - even your people
  lexicon: HALOT
  rationale: עם in covenant contexts commonly means 'people' in the collective sense
    of God's covenant community. The possessive is retained explicitly.
- source_word: אֲשֶׁר
  chosen: whom
  alternatives:
  - that
  lexicon: HALOT
  rationale: A personal relative pronoun fits the human referent ('servants'/'people')
    and reads naturally in English.
- source_word: פָּדִיתָ
  chosen: you redeemed
  alternatives:
  - you ransomed
  - you delivered
  lexicon: HALOT
  rationale: פדה often carries the sense of redeeming/ransoming by an act of deliverance.
    'Redeemed' preserves the covenantal and theological resonance, especially recalling
    the exodus, better than the more generic 'delivered'.
- source_word: בכחך הגדול
  chosen: by your great power
  alternatives:
  - with your great power
  lexicon: HALOT
  rationale: כח denotes strength/power. 'Power' is the most idiomatic collocation
    in English here, and 'by' appropriately expresses means.
- source_word: ובידך החזקה
  chosen: and by your strong hand
  alternatives:
  - and by your mighty hand
  - and with your strong hand
  lexicon: HALOT
  rationale: יד + adjective is a common anthropomorphic idiom for effective divine
    action. 'Strong hand' is a transparent rendering of the Hebrew; 'mighty hand'
    is traditional and possible, but 'strong' more directly reflects חזקה.
