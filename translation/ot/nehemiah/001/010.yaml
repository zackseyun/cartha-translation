theological_decisions:
- issue: Redemptive language in Nehemiah's prayer
  chosen_reading: redeemed
  alternative_readings:
  - delivered
  - ransomed
  rationale: The verse recalls God's historical act of covenant deliverance, likely
    echoing exodus language. 'Redeemed' preserves that theological weight without
    importing later doctrinal specifics not explicit in the text.
  doctrine_reference: Translation philosophy §§1, 3, 5
