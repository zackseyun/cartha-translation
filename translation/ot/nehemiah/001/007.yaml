theological_decisions:
- issue: Rendering the triad of Torah terms distinctly
  chosen_reading: commandments, statutes, and judgments
  alternative_readings:
  - commands, decrees, and ordinances
  - commandments, statutes, and rules
  rationale: The Hebrew uses three distinct legal terms, and the translation preserves
    that distinction rather than flattening them into near-synonyms. This reflects
    the source text's legal-covenantal texture without importing a narrower doctrinal
    scheme.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
