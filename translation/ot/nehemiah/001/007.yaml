id: NEH.1.7
reference: Nehemiah 1:7
source:
  edition: WLC
  text: חֲבֹ֖ל חָבַ֣לְנוּ לָ֑/ךְ וְ/לֹא שָׁמַ֣רְנוּ אֶת הַ/מִּצְוֺ֗ת וְ/אֶת הַֽ/חֻקִּים֙
    וְ/אֶת הַ/מִּשְׁפָּטִ֔ים אֲשֶׁ֥ר צִוִּ֖יתָ אֶת מֹשֶׁ֥ה עַבְדֶּֽ/ךָ־־־־־׃
translation:
  text: We have acted very corruptly against you and have not kept the commandments,
    the statutes, and the judgments that you commanded your servant Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'We have dealt very corruptly with you.' The Hebrew uses an infinitive
      absolute with the finite verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: '''Judgments'' may also be rendered ''ordinances'' or ''rules''; the Hebrew
      term can refer to legal decisions or case laws.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲבֹל חָבַלְנוּ
  chosen: have acted very corruptly
  alternatives:
  - have dealt corruptly
  - have acted wickedly
  - have surely corrupted ourselves
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verbal idea.
    The root חבל in this stem here conveys corrupt or ruinous conduct rather than
    physical destruction. 'Have acted very corruptly' preserves the emphatic force
    in natural English better than a wooden repetition.
- source_word: לָךְ
  chosen: against you
  alternatives:
  - to you
  - toward you
  lexicon: HALOT
  rationale: With this verb in a confessional context, the preposition marks offense
    directed toward God. 'Against you' communicates relational violation more clearly
    than the more literal but less idiomatic 'to you'.
- source_word: שָׁמַרְנוּ
  chosen: have not kept
  alternatives:
  - have not observed
  - have not guarded
  lexicon: HALOT
  rationale: שׁמר with commandments commonly means to keep or observe them. 'Kept'
    is the most natural and standard English rendering in covenant-law contexts.
- source_word: הַמִּצְוֺת
  chosen: the commandments
  alternatives:
  - the commands
  lexicon: HALOT
  rationale: מצות refers to commanded obligations. 'Commandments' preserves the covenantal
    and legal register appropriate to this penitential prayer.
- source_word: הַחֻקִּים
  chosen: the statutes
  alternatives:
  - the decrees
  - the ordinances
  lexicon: HALOT
  rationale: חקים often denotes prescribed enactments or fixed statutes. 'Statutes'
    is a conventional and precise legal term that distinguishes it from the other
    law terms in the verse.
- source_word: הַמִּשְׁפָּטִים
  chosen: the judgments
  alternatives:
  - the rules
  - the ordinances
  - the judgments/justice requirements
  lexicon: HALOT
  rationale: משפטים can denote legal judgments, case laws, or ordinances. 'Judgments'
    keeps the lexical distinction from 'statutes' and reflects the judicial nuance,
    though 'ordinances' is possible.
- source_word: צִוִּיתָ
  chosen: you commanded
  alternatives:
  - you gave
  - you ordered
  lexicon: HALOT
  rationale: The verb is straightforwardly 'command.' Retaining this wording preserves
    the direct link to divine authority.
- source_word: עַבְדֶּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can mean slave or servant, for Moses in relation to God
    'servant' is the established and contextually appropriate title, emphasizing commissioned
    service rather than bonded-status imagery.
