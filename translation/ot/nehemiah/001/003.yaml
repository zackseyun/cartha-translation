id: NEH.1.3
reference: Nehemiah 1:3
source:
  edition: WLC
  text: וַ/יֹּאמְרוּ֮ לִ/י֒ הַֽ/נִּשְׁאָרִ֞ים אֲשֶֽׁר נִשְׁאֲר֤וּ מִן הַ/שְּׁבִי֙
    שָׁ֣ם בַּ/מְּדִינָ֔ה בְּ/רָעָ֥ה גְדֹלָ֖ה וּ/בְ/חֶרְפָּ֑ה וְ/חוֹמַ֤ת יְרוּשָׁלִַ֨ם֙
    מְפֹרָ֔צֶת וּ/שְׁעָרֶ֖י/הָ נִצְּת֥וּ בָ/אֵֽשׁ־־׃
translation:
  text: And they said to me, “The remnant there in the province who survived the captivity
    are in great trouble and disgrace, and the wall of Jerusalem is broken down, and
    its gates have been burned with fire.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the exile.” The Hebrew phrase may be rendered “from the captivity” or
      “from the exile.”
    reason: lexical_alternative
  - marker: b
    text: Or “in great distress and reproach.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנִּשְׁאָרִים / נִשְׁאֲרוּ
  chosen: the remnant ... who survived
  alternatives:
  - those who remained
  - the survivors ... who were left
  lexicon: HALOT
  rationale: The repeated forms from שׁאר emphasize those left over after catastrophe.
    'The remnant' captures the collective sense of the survivors, while 'who survived'
    renders the following verb naturally in English without losing the repetition's
    force.
- source_word: מִן הַשְּׁבִי
  chosen: the captivity
  alternatives:
  - the exile
  - the captives
  lexicon: HALOT
  rationale: The phrase denotes the state/event from which they remained or survived.
    'The captivity' is a natural rendering here; 'the exile' is also possible, but
    'captivity' fits the noun form and the context of those returned from deportation.
- source_word: בַּמְּדִינָה
  chosen: in the province
  alternatives:
  - in the district
  - in the province there
  lexicon: HALOT
  rationale: מְדִינָה in Persian-period usage refers to an administrative province.
    'Province' is the most straightforward historical equivalent.
- source_word: בְּרָעָה גְדֹלָה
  chosen: in great trouble
  alternatives:
  - in great distress
  - in great misery
  lexicon: HALOT
  rationale: רָעָה here refers not to moral evil but to severe adversity or calamity.
    'In great trouble' is idiomatic modern English and preserves the sense of affliction.
- source_word: וּבְחֶרְפָּה
  chosen: and disgrace
  alternatives:
  - and reproach
  - and shame
  lexicon: HALOT
  rationale: חֶרְפָּה denotes public shame or reproach. 'Disgrace' communicates the
    social dishonor clearly in contemporary English.
- source_word: חוֹמַת יְרוּשָׁלִַם
  chosen: the wall of Jerusalem
  alternatives:
  - Jerusalem's wall
  lexicon: HALOT
  rationale: The singular construct is best rendered straightforwardly as 'the wall
    of Jerusalem,' referring collectively to the city's fortification.
- source_word: מְפֹרָצֶת
  chosen: is broken down
  alternatives:
  - is breached
  - is broken through
  lexicon: HALOT
  rationale: The passive participle from פרץ indicates a wall that has been breached
    or broken open. 'Broken down' is the standard idiomatic English rendering for
    ruined city walls.
- source_word: וּשְׁעָרֶיהָ נִצְּתוּ בָאֵשׁ
  chosen: and its gates have been burned with fire
  alternatives:
  - and its gates were burned with fire
  - and its gates have been destroyed by fire
  lexicon: HALOT
  rationale: The verb indicates destruction by burning. 'Have been burned with fire'
    preserves the Hebrew expression and presents the condition as current and resulting
    from a past event.
- source_word: וַיֹּאמְרוּ לִי
  chosen: And they said to me
  alternatives:
  - Then they said to me
  lexicon: HALOT
  rationale: A simple narrative wayyiqtol introducing the report. 'And they said to
    me' preserves the flow without adding interpretive nuance.
