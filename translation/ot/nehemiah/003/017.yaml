id: NEH.3.17
reference: Nehemiah 3:17
source:
  edition: WLC
  text: אַחֲרָ֛י/ו הֶחֱזִ֥יקוּ הַ/לְוִיִּ֖ם רְח֣וּם בֶּן בָּנִ֑י עַל יָד֣/וֹ הֶחֱזִ֗יק
    חֲשַׁבְיָ֛ה שַׂר חֲצִי פֶ֥לֶךְ קְעִילָ֖ה לְ/פִלְכּֽ/וֹ־־־־׃ס
translation:
  text: 'After him the Levites carried out repairs: Rehum son of Bani. Next to him
    Hashabiah, ruler of half the district of Keilah, carried out repairs for his district.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'repaired'; the Hebrew verb literally means 'made strong' but in Nehemiah
      3 refers to repair work on the wall.
    reason: lexical_alternative
  - marker: b
    text: Literally 'at his hand,' an idiom here meaning 'next to him' or 'beside
      him.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for his section.' The Hebrew may refer either to the district under
      Hashabiah's authority or to the portion assigned to him.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרָיו
  chosen: After him
  alternatives:
  - Afterward
  - Behind him
  lexicon: HALOT
  rationale: In the wall-building list, the phrase marks sequence/location relative
    to the previous worker. 'After him' is the standard idiomatic English rendering
    that preserves both succession and adjacency.
- source_word: הֶחֱזִיקוּ
  chosen: carried out repairs
  alternatives:
  - repaired
  - strengthened
  lexicon: HALOT
  rationale: The hiphil of חזק in Nehemiah 3 is an idiom for undertaking repair work
    on the wall. 'Carried out repairs' makes the construction activity explicit while
    reflecting the repeated formula in the chapter.
- source_word: הַלְוִיִּם
  chosen: the Levites
  alternatives:
  - the Levitical workers
  lexicon: HALOT
  rationale: This is the standard designation for members of the tribe/clan serving
    as Levites. The translational choice preserves the ethnic-religious identity without
    paraphrase.
- source_word: רְחוּם בֶּן־בָּנִי
  chosen: Rehum son of Bani
  alternatives:
  - Rehum the son of Bani
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy; 'son of' is
    retained as the normal genealogical marker.
- source_word: עַל יָדוֹ
  chosen: Next to him
  alternatives:
  - At his side
  - Beside him
  lexicon: HALOT
  rationale: Literally 'at his hand,' but in this chapter the phrase denotes adjoining
    work location. 'Next to him' is natural English and fits the construction-list
    context.
- source_word: הֶחֱזִיק
  chosen: carried out repairs
  alternatives:
  - repaired
  - strengthened
  lexicon: HALOT
  rationale: Same idiom as earlier in the verse; consistency within the chapter favors
    the same rendering.
- source_word: חֲשַׁבְיָה
  chosen: Hashabiah
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
- source_word: שַׂר חֲצִי פֶלֶךְ קְעִילָה
  chosen: ruler of half the district of Keilah
  alternatives:
  - official of half the district of Keilah
  - leader of half the province of Keilah
  lexicon: HALOT
  rationale: שַׂר is a governing official or ruler; פֶלֶךְ in this administrative
    context is best rendered 'district.' 'Half the district of Keilah' reflects the
    genitival chain straightforwardly.
- source_word: לְפִלְכּוֹ
  chosen: for his district
  alternatives:
  - for his section
  - in his district
  lexicon: HALOT
  rationale: 'The prefixed ל likely indicates responsibility or sphere: he repaired
    on behalf of / within the area under his jurisdiction. ''For his district'' preserves
    the administrative sense and avoids over-specifying the exact nuance.'
