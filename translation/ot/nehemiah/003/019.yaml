id: NEH.3.19
reference: Nehemiah 3:19
source:
  edition: WLC
  text: וַ/יְחַזֵּ֨ק עַל יָד֜/וֹ עֵ֧זֶר בֶּן יֵשׁ֛וּעַ שַׂ֥ר הַ/מִּצְפָּ֖ה מִדָּ֣ה
    שֵׁנִ֑ית מִ/נֶּ֕גֶד עֲלֹ֥ת הַ/נֶּ֖שֶׁק הַ/מִּקְצֹֽעַ־־׃ס
translation:
  text: Next to him Ezer son of Jeshua, official of Mizpah, repaired another section
    opposite the ascent to the armory at the angle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a second section.” The Hebrew phrase may emphasize that Ezer repaired
      an additional stretch of wall.
    reason: lexical_alternative
  - marker: b
    text: Or “the arsenal” or “the weapons.” The Hebrew likely refers here to a place
      associated with stored weapons, hence “the armory.”
    reason: lexical_alternative
  - marker: c
    text: Or “the corner.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחַזֵּק
  chosen: repaired
  alternatives:
  - strengthened
  - made strong
  lexicon: HALOT
  rationale: In Nehemiah 3 this verb functions idiomatically for participating in
    rebuilding work on the wall. 'Repaired' best fits the construction context in
    natural English, rather than the more wooden 'strengthened.'
- source_word: עַל יָדוֹ
  chosen: Next to him
  alternatives:
  - at his hand
  - beside him
  lexicon: HALOT
  rationale: This recurring phrase in the chapter marks adjacency in the building
    sequence. 'Next to him' is the clearest idiomatic English rendering.
- source_word: שַׂר הַמִּצְפָּה
  chosen: official of Mizpah
  alternatives:
  - ruler of Mizpah
  - chief of Mizpah
  - prince of Mizpah
  lexicon: HALOT
  rationale: שַׂר denotes a leader or administrative officer. In this civic rebuilding
    list, 'official' communicates a governmental role without implying monarchy.
- source_word: מִדָּה שֵׁנִית
  chosen: another section
  alternatives:
  - a second section
  - a second measure
  lexicon: HALOT
  rationale: The phrase likely refers to a second stretch of wall assigned for repair,
    as elsewhere in Nehemiah 3. 'Another section' is natural English and conveys the
    sense of an additional segment under his responsibility.
- source_word: מִנֶּגֶד
  chosen: opposite
  alternatives:
  - in front of
  - facing
  lexicon: HALOT
  rationale: The preposition indicates location across from or facing a landmark.
    'Opposite' is concise and spatially precise.
- source_word: עֲלֹת
  chosen: the ascent to
  alternatives:
  - the going up to
  - the ascent of
  lexicon: HALOT
  rationale: The infinitive construct from עלה here functions substantivally for an
    upward approach or ascent. 'The ascent to' gives clear English sense in topographical
    description.
- source_word: הַנֶּשֶׁק
  chosen: the armory
  alternatives:
  - the arsenal
  - the weapons
  lexicon: HALOT
  rationale: While the noun can denote weaponry, in this construction with a topographical
    marker it most likely refers to a place where weapons were kept. 'Armory' fits
    the setting and reads naturally.
- source_word: הַמִּקְצֹעַ
  chosen: the angle
  alternatives:
  - the corner
  - the turning
  lexicon: HALOT
  rationale: The term denotes a corner or angular turning in the wall. 'Angle' preserves
    the geometric/topographical nuance and matches the likely architectural reference.
