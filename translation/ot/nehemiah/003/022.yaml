id: NEH.3.22
reference: Nehemiah 3:22
source:
  edition: WLC
  text: וְ/אַחֲרָ֛י/ו הֶחֱזִ֥יקוּ הַ/כֹּהֲנִ֖ים אַנְשֵׁ֥י הַ/כִּכָּֽר׃
translation:
  text: After him the priests, the men of the surrounding region, made repairs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the plain' or 'the district' for 'the surrounding region.' The Hebrew
      כִּכָּר can denote a plain or circular district; the exact local reference here
      is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַחֲרָיו
  chosen: After him
  alternatives:
  - And after him
  - After him
  lexicon: HALOT
  rationale: The prefixed conjunction plus prepositional form literally means 'and
    after him.' In this chapter's repetitive building list, English reads naturally
    with 'After him' while preserving the sequential sense.
- source_word: הֶחֱזִיקוּ
  chosen: made repairs
  alternatives:
  - repaired
  - strengthened
  - took hold
  lexicon: HALOT
  rationale: In Nehemiah 3 this verb is an idiomatic term for participating in repair
    work on the wall. 'Made repairs' captures the construction context better than
    the more wooden 'strengthened' or the overly bare 'repaired.'
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Straightforward rendering of the definite plural noun.
- source_word: אַנְשֵׁי
  chosen: the men of
  alternatives:
  - the people of
  - the inhabitants of
  lexicon: HALOT
  rationale: The construct form literally means 'men of.' Because the Hebrew is explicitly
    masculine/plural and likely denotes members from a locality, 'the men of' best
    preserves the source wording in line with the gender-accurate policy.
- source_word: הַכִּכָּר
  chosen: the surrounding region
  alternatives:
  - the plain
  - the district
  - the circle
  lexicon: HALOT
  rationale: כִּכָּר can denote a round district or plain, often the Jordan plain,
    but here in Jerusalem's repair list it most likely refers to the surrounding district/region
    from which these priests came. 'Surrounding region' communicates the geographic
    sense clearly in modern English; 'plain' is possible but less certain in this
    context.
