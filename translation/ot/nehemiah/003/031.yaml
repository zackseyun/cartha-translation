id: NEH.3.31
reference: Nehemiah 3:31
source:
  edition: WLC
  text: אחרי הֶחֱזִ֗יק מַלְכִּיָּה֙ בֶּן הַ/צֹּ֣רְפִ֔י עַד בֵּ֥ית הַ/נְּתִינִ֖ים וְ/הָ/רֹכְלִ֑ים
    נֶ֚גֶד שַׁ֣עַר הַ/מִּפְקָ֔ד וְ/עַ֖ד עֲלִיַּ֥ת הַ/פִּנָּֽה־־׃
translation:
  text: After him Malkijah son of the goldsmith repaired as far as the house of the
    temple servants and the merchants, opposite the Inspection Gate, and as far as
    the upper room of the corner.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the house of the Nethinim'; this is a technical term for temple servants.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Muster Gate' or 'the Gate of Muster.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the ascent of the corner.' The Hebrew phrase may refer either to an
      upper chamber or to an upward approach at the corner.
    reason: lexical_alternative
lexical_decisions:
- source_word: אחרי
  chosen: After him
  alternatives:
  - Afterward
  - After him
  lexicon: HALOT
  rationale: In the Nehemiah 3 building list, this adverb/preposition regularly marks
    sequence from one repair section to the next. 'After him' best reflects the relational
    progression in context rather than mere temporal succession.
- source_word: הֶחֱזִיק
  chosen: repaired
  alternatives:
  - strengthened
  - made repairs
  lexicon: HALOT
  rationale: Though the verb literally relates to strengthening or taking hold, in
    Nehemiah 3 it idiomatically refers to undertaking repair work on a section of
    wall or adjacent structures. 'Repaired' is the clearest natural English equivalent
    in this chapter's repeated formula.
- source_word: מַלְכִּיָּה
  chosen: Malkijah
  alternatives:
  - Malchijah
  rationale: Personal names are transliterated by standard convention. 'Malkijah'
    closely reflects the Hebrew form.
- source_word: בֶּן הַצֹּרְפִי
  chosen: son of the goldsmith
  alternatives:
  - son of the refiner
  - son of the metalworker
  lexicon: HALOT
  rationale: צֹרֵף commonly denotes a refiner or smith working precious metals. 'Goldsmith'
    fits the likely occupational sense here and matches the guild-like identifications
    in the chapter.
- source_word: עַד
  chosen: as far as
  alternatives:
  - up to
  - until
  lexicon: HALOT
  rationale: This preposition marks the extent of the repaired section. 'As far as'
    is idiomatic in English for spatial extent.
- source_word: בֵּית הַנְּתִינִים
  chosen: the house of the temple servants
  alternatives:
  - the house of the Nethinim
  - the house of the given ones
  lexicon: HALOT
  rationale: נְתִינִים is a technical term for temple personnel traditionally called
    'Nethinim.' To preserve meaning for modern readers, 'temple servants' is used
    in the main text rather than transliteration.
- source_word: וְהָרֹכְלִים
  chosen: and the merchants
  alternatives:
  - and the traders
  - and the peddlers
  lexicon: HALOT
  rationale: The participial/noun form denotes traders or merchants. 'Merchants' is
    concise and natural in this urban setting.
- source_word: נֶגֶד
  chosen: opposite
  alternatives:
  - in front of
  - facing
  lexicon: HALOT
  rationale: The term indicates location directly across from or facing a landmark.
    'Opposite' is precise and compact.
- source_word: שַׁעַר הַמִּפְקָד
  chosen: the Inspection Gate
  alternatives:
  - the Muster Gate
  - the Gate of Muster
  - the Gate of Inspection
  lexicon: HALOT
  rationale: מִפְקָד can denote mustering, numbering, or inspection. 'Inspection Gate'
    communicates the likely functional sense in accessible English, while preserving
    the administrative nuance.
- source_word: עֲלִיַּת הַפִּנָּה
  chosen: the upper room of the corner
  alternatives:
  - the ascent of the corner
  - the upper chamber at the corner
  - the corner upper room
  lexicon: HALOT
  rationale: עֲלִיָּה often refers to an upper room/chamber, though it can also denote
    an ascent. Given the architectural context, 'upper room of the corner' is a plausible
    and readable rendering, but the phrase is somewhat uncertain and merits a footnote
    preserving the alternative.
