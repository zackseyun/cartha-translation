id: NEH.3.1
reference: Nehemiah 3:1
source:
  edition: WLC
  text: וַ/יָּ֡קָם אֶלְיָשִׁיב֩ הַ/כֹּהֵ֨ן הַ/גָּד֜וֹל וְ/אֶחָ֣י/ו הַ/כֹּהֲנִ֗ים וַ/יִּבְנוּ֙
    אֶת שַׁ֣עַר הַ/צֹּ֔אן הֵ֣מָּה קִדְּשׁ֔וּ/הוּ וַֽ/יַּעֲמִ֖ידוּ דַּלְתֹתָ֑י/ו וְ/עַד
    מִגְדַּ֤ל הַ/מֵּאָה֙ קִדְּשׁ֔וּ/הוּ עַ֖ד מִגְדַּ֥ל חֲנַנְאֵֽל־־׃ס
translation:
  text: Then Eliashib the high priest rose up with his brothers the priests, and they
    built the Sheep Gate. They themselves consecrated it and set up its doors; they
    consecrated it as far as the Tower of the Hundred, as far as the Tower of Hananel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dedicated it.' The Hebrew verb can denote setting something apart as
      holy or specially dedicated.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: rose up
  alternatives:
  - arose
  - set to work
  lexicon: HALOT
  rationale: The verb קום in wayyiqtol here marks the beginning of action by Eliashib.
    'Rose up' preserves the Hebrew idiom and narrative force better than the more
    interpretive 'set to work,' while remaining natural enough in English.
- source_word: הַכֹּהֵן הַגָּדוֹל
  chosen: the high priest
  alternatives:
  - the great priest
  - the chief priest
  lexicon: HALOT
  rationale: This is the standard Hebrew title for the chief priest. 'High priest'
    is the established and accurate English equivalent.
- source_word: וְאֶחָיו הַכֹּהֲנִים
  chosen: with his brothers the priests
  alternatives:
  - and his brothers, the priests
  - and his fellow priests
  lexicon: HALOT
  rationale: The phrase identifies his brothers specifically as priests. 'With his
    brothers the priests' reflects the Hebrew appositional structure and keeps the
    familial term rather than flattening it to 'fellow priests.'
- source_word: שַׁעַר הַצֹּאן
  chosen: the Sheep Gate
  alternatives:
  - the Sheepgate
  - the gate of the sheep
  lexicon: HALOT
  rationale: As a named city gate, 'Sheep Gate' is the clearest modern English rendering.
    It preserves the concrete noun and functions naturally as a proper designation.
- source_word: הֵמָּה
  chosen: They themselves
  alternatives:
  - they
  - it was they who
  lexicon: HALOT
  rationale: The independent pronoun is emphatic. 'They themselves' preserves that
    emphasis, highlighting that these priests personally consecrated the gate.
- source_word: קִדְּשׁוּהוּ
  chosen: consecrated it
  alternatives:
  - sanctified it
  - dedicated it
  lexicon: HALOT
  rationale: קדשׁ in this context refers to setting the gate apart as holy or specially
    dedicated. 'Consecrated' best preserves the cultic-religious nuance; 'dedicated'
    is possible but weaker.
- source_word: וַיַּעֲמִידוּ דַּלְתֹתָיו
  chosen: set up its doors
  alternatives:
  - installed its doors
  - hung its doors
  lexicon: HALOT
  rationale: The idiom means to put the gate doors in place. 'Set up its doors' is
    a close, readable rendering that avoids over-specifying the mechanics.
- source_word: מִגְדַּל הַמֵּאָה
  chosen: the Tower of the Hundred
  alternatives:
  - the Hundred Tower
  lexicon: HALOT
  rationale: The construct phrase is rendered transparently. Because this is a place
    designation, either form is possible, but 'Tower of the Hundred' more directly
    reflects the Hebrew wording.
- source_word: מִגְדַּל חֲנַנְאֵל
  chosen: the Tower of Hananel
  alternatives:
  - the Hananel Tower
  lexicon: HALOT
  rationale: This is a proper place name. 'Tower of Hananel' is a straightforward
    transliteration-plus-title rendering consistent with translating titles and transliterating
    names.
- source_word: וְעַד ... עַד
  chosen: as far as ... as far as
  alternatives:
  - up to ... up to
  - even to ... even to
  lexicon: HALOT
  rationale: The repeated עַד marks extent. 'As far as ... as far as' communicates
    the measured span of consecration/building activity in idiomatic English.
