theological_decisions:
- issue: Cultic sense of קדשׁ for the gate
  chosen_reading: Rendered as 'consecrated' to preserve the religious act of setting
    apart the gate.
  alternative_readings:
  - dedicated
  rationale: The priests' action is not merely civic construction but includes a sacred
    setting-apart. The translation preserves that theological-cultic nuance without
    overstating beyond the text.
  doctrine_reference: Translation philosophy §1, §5
