id: NEH.3.3
reference: Nehemiah 3:3
source:
  edition: WLC
  text: וְ/אֵת֙ שַׁ֣עַר הַ/דָּגִ֔ים בָּנ֖וּ בְּנֵ֣י הַ/סְּנָאָ֑ה הֵ֣מָּה קֵר֔וּ/הוּ
    וַֽ/יַּעֲמִ֨ידוּ֙ דַּלְתֹתָ֔י/ו מַנְעוּלָ֖י/ו וּ/בְרִיחָֽי/ו׃ס
translation:
  text: The sons of Hassenaah built the Fish Gate; they themselves roofed it and set
    up its doors, its bolts, and its bars.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'covered it' or 'laid its beams.' The Hebrew verb refers to covering
      a structure in a building context.
    reason: lexical_alternative
  - marker: b
    text: '''Sons of'' may denote a family or clan group, that is, ''descendants of
      Hassenaah.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁעַר הַדָּגִים
  chosen: the Fish Gate
  alternatives:
  - the gate of the fish
  - the Fish-gate
  lexicon: HALOT
  rationale: Construct phrase with article denotes a specific city gate associated
    with fish; idiomatic English for named Jerusalem gates is 'the Fish Gate.'
- source_word: בָּנוּ
  chosen: built
  alternatives:
  - rebuilt
  - repaired
  lexicon: HALOT
  rationale: The verb בנה normally means 'build.' In Nehemiah 3 the broader context
    is restoration work, but this clause itself uses the straightforward verb rather
    than a more specific 'repair' term, so 'built' best reflects the source.
- source_word: בְּנֵי הַסְּנָאָה
  chosen: The sons of Hassenaah
  alternatives:
  - The descendants of Hassenaah
  - The sons of Senaah
  lexicon: HALOT
  rationale: בני can denote literal sons or clan descendants; in this register it
    commonly identifies a family group, but 'sons of' preserves the Hebrew form transparently.
    The proper name is transliterated rather than translated, following project policy
    for names. 'Hassenaah' reflects the consonantal form with article in the name
    as represented here.
- source_word: הֵמָּה
  chosen: they themselves
  alternatives:
  - they
  - it was they who
  lexicon: HALOT
  rationale: The independent pronoun is emphatic and not required for simple subject
    marking, so English should reflect the emphasis with 'they themselves.'
- source_word: קֵרֻהוּ
  chosen: roofed it
  alternatives:
  - covered it
  - laid its beams
  lexicon: HALOT
  rationale: From קרה in building contexts, the sense is to cover or roof a structure.
    'Roofed it' is concise and natural in English. Because gates could have an overhead
    structure, this is preferable to the less specific 'covered it.'
- source_word: וַיַּעֲמִידוּ דַּלְתֹתָיו
  chosen: set up its doors
  alternatives:
  - hung its doors
  - installed its doors
  lexicon: HALOT
  rationale: The idiom literally means caused its doors to stand. In context of gate
    construction, 'set up' communicates erection/installation without over-specifying
    the mechanism.
- source_word: מַנְעוּלָיו
  chosen: its bolts
  alternatives:
  - its locks
  - its fastenings
  lexicon: HALOT
  rationale: In gate-building contexts this term refers to the fastening hardware.
    'Bolts' fits the paired mention with bars and is standard in English translations
    of such architectural lists.
- source_word: וּבְרִיחָיו
  chosen: and its bars
  alternatives:
  - and its crossbars
  - and its beams
  lexicon: HALOT
  rationale: בריח commonly denotes a bar used to secure doors or gates. 'Bars' is
    the most direct and idiomatic rendering here.
