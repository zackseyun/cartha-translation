id: NEH.3.11
reference: Nehemiah 3:11
source:
  edition: WLC
  text: מִדָּ֣ה שֵׁנִ֗ית הֶחֱזִיק֙ מַלְכִּיָּ֣ה בֶן חָרִ֔ם וְ/חַשּׁ֖וּב בֶּן פַּחַ֣ת
    מוֹאָ֑ב וְ/אֵ֖ת מִגְדַּ֥ל הַ/תַּנּוּרִֽים־־׃ס
translation:
  text: Malchijah son of Harim and Hasshub son of Pahath-moab repaired another section,
    and also the Tower of the Ovens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a second section.' The Hebrew phrase can be rendered more formally this
      way; here it refers to an additional portion assigned for repair.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Furnace Tower.' The Hebrew term can refer to ovens or furnaces.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִדָּה שֵׁנִית
  chosen: another section
  alternatives:
  - a second section
  - a second measured portion
  lexicon: HALOT
  rationale: In Nehemiah 3 this phrase functions idiomatically for an additional stretch
    of wall assigned for repair. 'Another section' is natural English and fits the
    recurring construction, while preserving the sense of a distinct portion.
- source_word: הֶחֱזִיק
  chosen: repaired
  alternatives:
  - strengthened
  - took hold of
  - made repairs to
  lexicon: HALOT
  rationale: In the wall-building context of Nehemiah 3, the verb commonly denotes
    repairing or strengthening a section of the wall. 'Repaired' is the clearest contextual
    rendering in modern English.
- source_word: מַלְכִּיָּה
  chosen: Malchijah
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: בֶן חָרִם
  chosen: son of Harim
  rationale: Standard filial construction; rendered formally and clearly.
- source_word: וְחַשּׁוּב
  chosen: and Hasshub
  rationale: Conjunction plus personal name; name is transliterated.
- source_word: בֶּן פַּחַת מוֹאָב
  chosen: son of Pahath-moab
  alternatives:
  - son of Pahath-Moab
  rationale: Proper family/clan name preserved by transliteration. Hyphenation reflects
    the compound name in standard English convention.
- source_word: וְאֵת
  chosen: and also
  alternatives:
  - and
  - including
  lexicon: HALOT
  rationale: The object marker with conjunction introduces an additional repaired
    item beyond the section itself. 'And also' makes the additive force explicit in
    idiomatic English.
- source_word: מִגְדַּל הַתַּנּוּרִים
  chosen: the Tower of the Ovens
  alternatives:
  - the Furnace Tower
  - the Tower of Furnaces
  lexicon: HALOT
  rationale: מִגְדָּל is straightforwardly 'tower.' תַּנּוּרִים refers to ovens/furnaces.
    'Tower of the Ovens' is a transparent, place-name-like rendering that preserves
    the concrete imagery without overinterpreting the exact industrial function.
