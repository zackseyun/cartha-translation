id: NEH.3.6
reference: Nehemiah 3:6
source:
  edition: WLC
  text: וְ/אֵת֩ שַׁ֨עַר הַיְשָׁנָ֜ה הֶחֱזִ֗יקוּ יֽוֹיָדָע֙ בֶּן פָּסֵ֔חַ וּ/מְשֻׁלָּ֖ם
    בֶּן בְּסֽוֹדְיָ֑ה הֵ֣מָּה קֵר֔וּ/הוּ וַֽ/יַּעֲמִ֨ידוּ֙ דַּלְתֹתָ֔י/ו וּ/מַנְעֻלָ֖י/ו
    וּ/בְרִיחָֽי/ו־־׃ס
translation:
  text: And Joiada son of Paseah and Meshullam son of Besodeiah repaired the Old Gate.
    They laid its beams and set up its doors, its bolts, and its bars.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly “the Jeshanah Gate,” taking the second term as a place-name
      rather than the adjective “old.”
    reason: alternative_reading
lexical_decisions:
- source_word: הֶחֱזִיקוּ
  chosen: repaired
  alternatives:
  - strengthened
  - made repairs to
  lexicon: HALOT
  rationale: In Nehemiah 3 this verb is the standard work-report formula for taking
    hold of a section in order to restore it. 'Repaired' is idiomatic English and
    fits the construction context better than the more wooden 'strengthened.'
- source_word: שַׁעַר הַיְשָׁנָה
  chosen: the Old Gate
  alternatives:
  - the Jeshanah Gate
  - the gate of the old city
  lexicon: HALOT
  rationale: The phrase most naturally reads as a gate-name meaning 'Old Gate.' Because
    the following noun is a common noun 'gate' and the second element can function
    adjectivally/name-like, this rendering is clearer for modern readers. The transliterated
    alternative is preserved in a footnote because some take הַיְשָׁנָה as a proper
    place-name.
- source_word: קֵרֻהוּ
  chosen: laid its beams
  alternatives:
  - roofed it
  - covered it
  lexicon: HALOT
  rationale: The verb from קרה refers to covering or roofing with beams. For a gate
    structure, 'laid its beams' best captures the likely carpentry action without
    implying a full house-roof; 'roofed it' is possible but less precise in English
    for a city gate.
- source_word: וַיַּעֲמִידוּ
  chosen: set up
  alternatives:
  - installed
  - erected
  lexicon: HALOT
  rationale: The verb literally means caused to stand/placed in position. 'Set up'
    is natural English for putting gate components in place and avoids overtechnical
    wording.
- source_word: דַּלְתֹתָיו
  chosen: its doors
  alternatives:
  - its door-leaves
  - its gates
  lexicon: HALOT
  rationale: Plural 'doors' fits the paired leaves of a city gate. 'Gates' would be
    too broad here because the larger gate structure is already the referent.
- source_word: מַנְעֻלָיו
  chosen: its bolts
  alternatives:
  - its locks
  - its fastenings
  lexicon: HALOT
  rationale: In gate-building context this term denotes the fastening mechanism. 'Bolts'
    is the most concrete and common rendering in English; 'locks' is possible but
    can sound anachronistically specific.
- source_word: בְרִיחָיו
  chosen: its bars
  alternatives:
  - its crossbars
  - its beams
  lexicon: HALOT
  rationale: This term commonly refers to bars used to secure doors or gates. 'Bars'
    is standard and distinct from the earlier beam-related verb.
- source_word: הֵמָּה
  chosen: They
  alternatives:
  - these men
  - they themselves
  lexicon: HALOT
  rationale: The pronoun adds emphasis to the named builders as the ones who performed
    the subsequent actions. English normally does not require explicit emphasis here,
    so simple 'They' is sufficient.
- source_word: יֽוֹיָדָע ... וּמְשֻׁלָּם
  chosen: Joiada ... and Meshullam
  rationale: Personal names are transliterated per project philosophy.
- source_word: פָּסֵחַ / בְּסוֹדְיָה
  chosen: Paseah / Besodeiah
  rationale: Patronymic personal names are transliterated rather than translated.
