id: NEH.3.37
reference: Nehemiah 3:37
source:
  edition: WLC
  text: וְ/אַל תְּכַס֙ עַל עֲוֺנָ֔/ם וְ/חַטָּאתָ֖/ם מִ/לְּ/פָנֶ֣י/ךָ אַל תִּמָּחֶ֑ה
    כִּ֥י הִכְעִ֖יסוּ לְ/נֶ֥גֶד הַ/בּוֹנִֽים־־־׃
translation:
  text: And do not cover over their guilt, and do not let their sin be blotted out
    from before you, for they have provoked anger in the presence of the builders.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not forgive their iniquity'; the Hebrew image is 'do not cover over
      their guilt.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for they have angered you before the builders.' The Hebrew does not
      state the object explicitly, but the sense is that their actions provoked anger
      publicly in front of those rebuilding.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּכַס ... עַל עֲוֺנָם
  chosen: do not cover over their guilt
  alternatives:
  - do not forgive their iniquity
  - do not cover their guilt
  lexicon: HALOT
  rationale: כסה with עַל can mean 'cover over' in the sense of concealing or pardoning
    sin. Here the prayer asks God not to overlook or pardon the offense. 'Cover over'
    preserves the Hebrew imagery while remaining intelligible; 'guilt' for עָוֹן captures
    both the wrongdoing and its culpability.
- source_word: עֲוֺנָם
  chosen: their guilt
  alternatives:
  - their iniquity
  - their wrongdoing
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or punishment for guilt. In this parallel
    with 'their sin,' 'guilt' best distinguishes the term while preserving its moral
    weight.
- source_word: חַטָּאתָם
  chosen: their sin
  alternatives:
  - their offense
  lexicon: HALOT
  rationale: חַטָּאת commonly means 'sin.' The straightforward rendering fits the
    parallelism and avoids unnecessary paraphrase.
- source_word: מִלְּפָנֶיךָ
  chosen: from before you
  alternatives:
  - from your presence
  - before you
  lexicon: HALOT
  rationale: 'The phrase is spatially and relationally vivid: the sin is not to be
    erased from before God''s face/presence. ''From before you'' is a natural English
    rendering that stays close to the Hebrew.'
- source_word: תִּמָּחֶה
  chosen: be blotted out
  alternatives:
  - be wiped away
  - be erased
  lexicon: HALOT
  rationale: מחה in contexts of records or remembrance often means 'blot out.' This
    is a standard and accurate rendering for the removal of sin from divine notice.
- source_word: הִכְעִיסוּ
  chosen: have provoked anger
  alternatives:
  - have angered
  - have provoked you to anger
  lexicon: HALOT
  rationale: The Hiphil of כעס means to provoke to anger or cause offense. The object
    is not explicit in Hebrew, so 'have provoked anger' preserves the terseness without
    over-specifying, while still conveying the causative sense.
- source_word: לְנֶגֶד הַבּוֹנִים
  chosen: in the presence of the builders
  alternatives:
  - before the builders
  - against the builders
  lexicon: HALOT
  rationale: לְנֶגֶד most naturally means 'before, in front of, in the presence of.'
    Given the context of public taunting of those rebuilding the wall, 'in the presence
    of the builders' best captures the sense. 'Against the builders' is possible as
    an interpretive extension but is less lexically direct.
