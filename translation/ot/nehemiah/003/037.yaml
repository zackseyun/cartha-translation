theological_decisions:
- issue: Imprecatory prayer language regarding enemies' sin
  chosen_reading: Retain the direct petition that God not forgive or erase their guilt,
    without softening the force.
  alternative_readings:
  - Paraphrase to a less severe request such as 'do not ignore their wrongdoing'
  rationale: The Hebrew is an explicit imprecatory appeal. In keeping with optimal
    equivalence and the instruction not to import doctrinal softening, the translation
    preserves the severity of the prayer while rendering it in clear English.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
