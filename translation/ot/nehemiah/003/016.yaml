id: NEH.3.16
reference: Nehemiah 3:16
source:
  edition: WLC
  text: אַחֲרָ֤י/ו הֶחֱזִיק֙ נְחֶמְיָ֣ה בֶן עַזְבּ֔וּק שַׂ֕ר חֲצִ֖י פֶּ֣לֶךְ בֵּֽית
    צ֑וּר עַד נֶ֨גֶד֙ קִבְרֵ֣י דָוִ֔יד וְ/עַד הַ/בְּרֵכָה֙ הָ/עֲשׂוּיָ֔ה וְ/עַ֖ד בֵּ֥ית
    הַ/גִּבֹּרִֽים־־־־׃ס
translation:
  text: After him Nehemiah son of Azbuk, ruler of half the district of Beth-zur, made
    repairs as far as opposite the tombs of David, and as far as the pool that was
    made, and as far as the house of the mighty men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Next to him,' if the phrase is taken spatially rather than sequentially
      within the repair list.
    reason: lexical_alternative
  - marker: b
    text: Or 'the house of the warriors.' The Hebrew expression may refer to a military
      building, but the exact identification is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרָיו
  chosen: After him
  alternatives:
  - Afterward
  - Next to him
  lexicon: HALOT
  rationale: In the wall-building list, אַחֲרָיו regularly marks sequence in relation
    to the previous worker or section. 'After him' preserves the narrative progression
    more directly than the looser 'afterward.' 'Next to him' is possible in this chapter's
    spatial context, but here the repeated עַד phrases emphasize extent of repair,
    so sequential 'After him' is preferred.
- source_word: הֶחֱזִיק
  chosen: made repairs
  alternatives:
  - strengthened
  - repaired
  lexicon: HALOT
  rationale: The Hiphil of חזק in Nehemiah 3 is an idiomatic term for repairing or
    restoring sections of the wall. 'Made repairs' captures the construction activity
    in natural English while reflecting the chapter's repeated formula.
- source_word: שַׂר חֲצִי פֶּלֶךְ
  chosen: ruler of half the district
  alternatives:
  - official of half the district
  - leader of half the province
  lexicon: HALOT
  rationale: שַׂר is a governing official or ruler; פֶּלֶךְ in this Persian-period
    administrative context refers to a district. 'Ruler of half the district' is clear
    and suitably formal. 'Province' would overstate the scale.
- source_word: בֵּית צּוּר
  chosen: Beth-zur
  alternatives:
  - Beth Zur
  lexicon: HALOT
  rationale: This is a place name and should be transliterated rather than translated,
    following the project's policy for names.
- source_word: עַד נֶגֶד קִבְרֵי דָוִיד
  chosen: as far as opposite the tombs of David
  alternatives:
  - as far as in front of the tombs of David
  - up to a point opposite the tombs of David
  lexicon: HALOT
  rationale: נֶגֶד denotes being opposite, in front of, or facing. 'Opposite' best
    conveys spatial correspondence without implying entry into the tomb area. 'Tombs'
    is the normal rendering of קִבְרֵי.
- source_word: הַבְּרֵכָה הָעֲשׂוּיָה
  chosen: the pool that was made
  alternatives:
  - the constructed pool
  - the artificial pool
  lexicon: HALOT
  rationale: The phrase is literally 'the made pool.' 'The pool that was made' preserves
    the Hebrew's passive/resultative sense and avoids over-interpreting the exact
    engineering nuance.
- source_word: בֵּית הַגִּבֹּרִים
  chosen: the house of the mighty men
  alternatives:
  - the house of the warriors
  - the barracks
  lexicon: HALOT
  rationale: גִּבֹּרִים commonly means mighty men or warriors. Because the exact referent
    of the building is uncertain, a more literal rendering is preferable to the interpretive
    'barracks.'
