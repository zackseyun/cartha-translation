id: NEH.3.21
reference: Nehemiah 3:21
source:
  edition: WLC
  text: אַחֲרָ֣י/ו הֶחֱזִ֗יק מְרֵמ֧וֹת בֶּן אוּרִיָּ֛ה בֶּן הַקּ֖וֹץ מִדָּ֣ה שֵׁנִ֑ית
    מִ/פֶּ֨תַח֙ בֵּ֣ית אֶלְיָשִׁ֔יב וְ/עַד תַּכְלִ֖ית בֵּ֥ית אֶלְיָשִֽׁיב־־־׃ס
translation:
  text: After him, Meremoth son of Uriah, son of Hakkoz, repaired another section,
    from the entrance of the house of Eliashib to the end of the house of Eliashib.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a second section.' The Hebrew phrase can denote either an additional
      stretch assigned to Meremoth or, more formally, 'a second measure/length.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרָיו
  chosen: After him
  alternatives:
  - After him/on his behalf
  - Next to him
  lexicon: HALOT
  rationale: In the Nehemiah 3 building list, the phrase marks sequence in the work
    assignments. 'After him' preserves the narrative progression more directly than
    'next to him,' which can imply only spatial adjacency.
- source_word: הֶחֱזִיק
  chosen: repaired
  alternatives:
  - strengthened
  - made repairs
  lexicon: HALOT
  rationale: Although the verb literally relates to strengthening, in Nehemiah 3 it
    idiomatically refers to participating in repair work on the wall or associated
    structures. 'Repaired' is the clearest natural English rendering in context.
- source_word: מְרֵמוֹת בֶּן אוּרִיָּה בֶּן הַקּוֹץ
  chosen: Meremoth son of Uriah, son of Hakkoz
  rationale: Personal names are transliterated per project philosophy. The patronymic
    chain is preserved formally for transparency and identification.
- source_word: מִדָּה שֵׁנִית
  chosen: another section
  alternatives:
  - a second section
  - a second measure/length
  lexicon: HALOT
  rationale: The phrase likely indicates that Meremoth repaired an additional assigned
    stretch beyond an earlier one (cf. his appearance in v. 4). 'Another section'
    communicates this idiomatically in English while preserving the sense of a second
    work segment.
- source_word: מִפֶּתַח בֵּית אֶלְיָשִׁיב
  chosen: from the entrance of the house of Eliashib
  alternatives:
  - from the doorway of the house of Eliashib
  lexicon: HALOT
  rationale: פֶּתַח commonly denotes an opening, doorway, or entrance. 'Entrance'
    reads naturally in English and fits a building description.
- source_word: בֵּית אֶלְיָשִׁיב
  chosen: the house of Eliashib
  alternatives:
  - Eliashib's house
  lexicon: HALOT
  rationale: The construct phrase is rendered transparently. 'House of Eliashib' preserves
    the formal flavor of the Hebrew while remaining understandable.
- source_word: וְעַד תַּכְלִית בֵּית אֶלְיָשִׁיב
  chosen: to the end of the house of Eliashib
  alternatives:
  - to the far end of the house of Eliashib
  - to the completion/limit of the house of Eliashib
  lexicon: HALOT
  rationale: תַּכְלִית here denotes extremity, end point, or limit rather than abstract
    'completion.' 'End' best fits the spatial description of the repaired stretch.
