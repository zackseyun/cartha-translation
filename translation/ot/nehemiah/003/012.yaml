id: NEH.3.12
reference: Nehemiah 3:12
source:
  edition: WLC
  text: וְ/עַל יָד֣/וֹ הֶחֱזִ֗יק שַׁלּוּם֙ בֶּן הַלּוֹחֵ֔שׁ שַׂ֕ר חֲצִ֖י פֶּ֣לֶךְ
    יְרוּשָׁלִָ֑ם ה֖וּא וּ/בְנוֹתָֽי/ו־־׃ס
translation:
  text: Next to him Shallum son of Hallohesh, ruler of half the district of Jerusalem,
    made repairs—he and his daughters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “And beside him … repaired.” The Hebrew idiom literally refers to work
      done ‘at/next to his hand,’ meaning adjacent to the previous worker’s section.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל יָדוֹ
  chosen: Next to him
  alternatives:
  - And beside him
  - And at his hand
  lexicon: HALOT
  rationale: In Nehemiah 3 this construction is an idiom marking adjacent workers
    on the wall. 'Next to him' is natural modern English and preserves the sequential/topographical
    sense better than a more literal but opaque 'at his hand.'
- source_word: הֶחֱזִיק
  chosen: made repairs
  alternatives:
  - strengthened
  - repaired
  lexicon: HALOT
  rationale: In this chapter חזק in the hiphil is used repeatedly for participating
    in rebuilding sections of the wall. 'Made repairs' best captures the contextual
    sense in readable English; 'strengthened' is too literal here and may sound misleading.
- source_word: שַׁלּוּם
  chosen: Shallum
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: בֶּן הַלּוֹחֵשׁ
  chosen: son of Hallohesh
  alternatives:
  - son of Hallochesh
  rationale: Patronymic with a proper name; transliterated rather than translated.
    Spelling 'Hallohesh' reflects a standard English representation of the Hebrew
    consonants and vowels.
- source_word: שַׂר חֲצִי פֶּלֶךְ יְרוּשָׁלִָם
  chosen: ruler of half the district of Jerusalem
  alternatives:
  - official of half the district of Jerusalem
  - leader of half the province of Jerusalem
  lexicon: HALOT
  rationale: שַׂר denotes a ruler/official; פֶּלֶךְ in Nehemiah refers to an administrative
    district. 'Ruler of half the district of Jerusalem' is both accurate and idiomatic.
    'Province' would overstate the scale of the unit.
- source_word: הוּא וּבְנֹתָיו
  chosen: he and his daughters
  alternatives:
  - he together with his daughters
  lexicon: HALOT
  rationale: The pronoun adds emphasis or apposition after the title, identifying
    the workers themselves. The straightforward rendering preserves the notable mention
    that his daughters also participated.
