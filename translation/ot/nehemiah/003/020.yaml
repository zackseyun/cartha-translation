id: NEH.3.20
reference: Nehemiah 3:20
source:
  edition: WLC
  text: אַחֲרָ֨י/ו הֶחֱרָ֧ה הֶחֱזִ֛יק בָּר֥וּךְ בֶּן זבי מִדָּ֣ה שֵׁנִ֑ית מִן הַ֨/מִּקְצ֔וֹעַ
    עַד פֶּ֨תַח֙ בֵּ֣ית אֶלְיָשִׁ֔יב הַ/כֹּהֵ֖ן הַ/גָּדֽוֹל־־־׃ס
translation:
  text: After him, Baruch son of Zabbai zealously repaired a second section, from
    the angle to the entrance of the house of Eliashib the high priest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Baruch son of Zaccai,' following an alternative name tradition reflected
      in some versions.
    reason: alternative_reading
  - marker: b
    text: The Hebrew expression behind 'zealously repaired' is unusual and likely
      emphasizes Baruch's fervor or exceptional diligence in the work.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרָיו
  chosen: After him
  alternatives:
  - After him/afterward
  lexicon: HALOT
  rationale: In the wall-building list, the phrase regularly marks sequence and location
    relative to the previous worker. 'After him' preserves both the narrative succession
    and spatial adjacency better than a purely temporal 'afterward.'
- source_word: הֶחֱרָה הֶחֱזִיק
  chosen: zealously repaired
  alternatives:
  - earnestly repaired
  - repaired with burning zeal
  - strengthened vigorously
  lexicon: HALOT
  rationale: הֶחֱזִיק in this chapter commonly means 'repair/strengthen.' The preceding
    הֶחֱרָה is unusual here and intensifies the action, likely conveying ardor or
    zeal. 'Zealously repaired' captures the idiomatic force in natural English without
    obscuring the construction.
- source_word: בָּרוּךְ בֶּן זבי
  chosen: Baruch son of Zabbai
  alternatives:
  - Baruch son of Zaccai
  lexicon: HALOT
  rationale: Personal names are transliterated. The consonantal form זבי supports
    'Zabbai' as a straightforward transliteration from the Hebrew here; an alternative
    tradition reflected in some English versions is preserved in a footnote.
- source_word: מִדָּה שֵׁנִית
  chosen: a second section
  alternatives:
  - another section
  - a second measure/portion
  lexicon: HALOT
  rationale: In Nehemiah 3 this expression denotes an additional assigned stretch
    of wall rather than a literal measurement. 'A second section' is clear and fits
    the chapter's repeated work-allotment formula.
- source_word: מִן הַמִּקְצוֹעַ
  chosen: from the angle
  alternatives:
  - from the corner
  - from the turning
  lexicon: HALOT
  rationale: The noun refers to a corner, angle, or turning point in the wall. 'Angle'
    is slightly more architectural in English and fits the description of a wall segment.
- source_word: עַד פֶּתַח בֵּית
  chosen: to the entrance of the house of
  alternatives:
  - to the doorway of the house of
  - to the entrance of the household of
  lexicon: HALOT
  rationale: פֶּתַח is 'entrance/opening/doorway.' 'Entrance of the house of' is natural
    English and likely refers to the physical residence or compound associated with
    Eliashib, not merely his household in an abstract sense.
- source_word: אֶלְיָשִׁיב הַכֹּהֵן הַגָּדוֹל
  chosen: Eliashib the high priest
  alternatives:
  - Eliashib the great priest
  lexicon: HALOT
  rationale: הַכֹּהֵן הַגָּדוֹל is the standard title 'the high priest.' This is the
    established and accurate English rendering of the office.
