id: NEH.3.38
reference: Nehemiah 3:38
source:
  edition: WLC
  text: וַ/נִּבְנֶה֙ אֶת הַ֣/חוֹמָ֔ה וַ/תִּקָּשֵׁ֥ר כָּל הַ/חוֹמָ֖ה עַד חֶצְיָ֑/הּ
    וַ/יְהִ֧י לֵ֦ב לָ/עָ֖ם לַ/עֲשֽׂוֹת־־־׃פ
translation:
  text: So we rebuilt the wall, and the whole wall was joined together up to half
    its height, for the people had a heart to work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the people had a heart to do.' The expression means they
      were inwardly resolved and willing for the work.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנִּבְנֶה
  chosen: So we rebuilt
  alternatives:
  - And we built
  - So we built
  lexicon: HALOT
  rationale: Qal wayyiqtol 1cp of בנה narrates the next event in sequence. 'Rebuilt'
    fits the context of repairing Jerusalem's existing wall, while 'So' captures the
    narrative continuation of waw without sounding wooden.
- source_word: הַחוֹמָה
  chosen: the wall
  lexicon: HALOT
  rationale: חוֹמָה refers straightforwardly to a city wall; singular with article
    is best rendered 'the wall.'
- source_word: וַתִּקָּשֵׁר
  chosen: was joined together
  alternatives:
  - was connected
  - was knit together
  lexicon: HALOT
  rationale: From קשר in the Niphal, the sense is that the wall's sections were connected
    into a continuous whole. 'Was joined together' is idiomatic and preserves the
    passive/resultative force.
- source_word: כָּל הַחוֹמָה
  chosen: the whole wall
  alternatives:
  - all the wall
  lexicon: HALOT
  rationale: כָּל with the definite noun expresses totality. 'The whole wall' is natural
    English.
- source_word: עַד חֶצְיָהּ
  chosen: up to half its height
  alternatives:
  - up to its half
  - to half of it
  lexicon: HALOT
  rationale: Literally 'up to its half.' In context of construction progress, English
    normally makes explicit that the half refers to the wall's built extent/height.
    'Up to half its height' conveys the intended sense without over-paraphrase.
- source_word: וַיְהִי לֵב לָעָם
  chosen: for the people had a heart
  alternatives:
  - and the people had a heart
  - for the people had the will
  - for the people were wholehearted
  lexicon: HALOT
  rationale: 'The idiom ''there was a heart to the people'' expresses inner resolve
    or willingness. Rendering it as ''had a heart'' preserves the Hebrew metaphor
    better than flattening it to mere willingness. ''For'' reflects the causal sense
    in context: their resolve explains the progress.'
- source_word: לַעֲשׂוֹת
  chosen: to work
  alternatives:
  - to do
  - to accomplish
  lexicon: HALOT
  rationale: עשה is broad ('do/make'), but here in a building context it refers to
    carrying out the work. 'To work' is the most natural contextual rendering.
