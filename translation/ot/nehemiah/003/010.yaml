id: NEH.3.10
reference: Nehemiah 3:10
source:
  edition: WLC
  text: וְ/עַל יָדָ֧/ם הֶחֱזִ֛יק יְדָיָ֥ה בֶן חֲרוּמַ֖ף וְ/נֶ֣גֶד בֵּית֑/וֹ וְ/עַל
    יָד֣/וֹ הֶחֱזִ֔יק חַטּ֖וּשׁ בֶּן חֲשַׁבְנְיָֽה־־ס־־׃
translation:
  text: Next to them Jedaiah son of Harumaph made repairs opposite his house, and
    next to him Hattush son of Hashabneiah made repairs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in front of his house' for 'opposite his house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל יָדָם
  chosen: Next to them
  alternatives:
  - And at their hand
  - And beside them
  lexicon: HALOT
  rationale: The idiom עַל יָד with pronominal suffix in Nehemiah 3 marks adjacency
    in the work list. 'Next to them' is natural English and preserves the sequential/topographical
    sense better than a more literal but opaque 'at their hand.'
- source_word: הֶחֱזִיק
  chosen: made repairs
  alternatives:
  - repaired
  - strengthened
  lexicon: HALOT
  rationale: In Nehemiah 3 the Hiphil of חזק is a technical expression for participating
    in rebuilding/repair work on the wall. 'Made repairs' fits the chapter's repeated
    formula and communicates the construction sense more clearly than the overly literal
    'strengthened.'
- source_word: יְדָיָה
  chosen: Jedaiah
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: בֶן חֲרוּמַף
  chosen: son of Harumaph
  rationale: Standard genealogical construction rendered straightforwardly; personal
    name transliterated.
- source_word: וְנֶגֶד בֵּיתוֹ
  chosen: opposite his house
  alternatives:
  - in front of his house
  - facing his house
  lexicon: HALOT
  rationale: נֶגֶד denotes what is in front of or opposite something. 'Opposite his
    house' preserves the spatial relation in the repair list and is idiomatic in English.
- source_word: וְעַל יָדוֹ
  chosen: and next to him
  alternatives:
  - and beside him
  - and at his hand
  lexicon: HALOT
  rationale: Same adjacency idiom as earlier in the verse, now with singular suffix
    referring to Jedaiah. 'Next to him' keeps the repetitive structure of the chapter
    while remaining readable.
- source_word: חַטּוּשׁ
  chosen: Hattush
  rationale: Personal name transliterated by standard convention.
- source_word: בֶּן חֲשַׁבְנְיָה
  chosen: son of Hashabneiah
  rationale: Standard filial expression; name transliterated.
