id: NEH.3.29
reference: Nehemiah 3:29
source:
  edition: WLC
  text: אַחֲרָ֧י/ו הֶחֱזִ֛יק צָד֥וֹק בֶּן אִמֵּ֖ר נֶ֣גֶד בֵּית֑/וֹ וְ/אַחֲרָ֤י/ו הֶחֱזִיק֙
    שְׁמַֽעְיָ֣ה בֶן שְׁכַנְיָ֔ה שֹׁמֵ֖ר שַׁ֥עַר הַ/מִּזְרָֽח־ס־׃ס
translation:
  text: After him Zadok son of Immer made repairs opposite his house, and after him
    Shemaiah son of Shecaniah, keeper of the East Gate, made repairs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'repaired' for 'made repairs'; the Hebrew verb is literally 'strengthened,'
      but in this chapter it refers to repair work on the wall and gates.
    reason: lexical_alternative
  - marker: b
    text: Or 'opposite his own house' / 'in front of his house.'
    reason: lexical_alternative
  - marker: c
    text: Or 'guard of the East Gate.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרָיו
  chosen: After him
  alternatives:
  - Next to him
  - Afterward, following him
  lexicon: HALOT
  rationale: In Nehemiah 3 this formula marks sequence/location in the repair list.
    'After him' is the most natural and sufficiently literal rendering in English.
- source_word: הֶחֱזִיק
  chosen: made repairs
  alternatives:
  - repaired
  - strengthened
  lexicon: HALOT
  rationale: The hiphil of חזק in Nehemiah 3 idiomatically refers to undertaking repair
    work on the wall/gates. 'Made repairs' preserves the construction-list sense better
    than the overly literal 'strengthened.'
- source_word: צָדוֹק
  chosen: Zadok
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: בֶּן אִמֵּר
  chosen: son of Immer
  rationale: Standard genealogical expression; 'son of' is retained formally.
- source_word: נֶגֶד בֵּיתוֹ
  chosen: opposite his house
  alternatives:
  - in front of his house
  - across from his house
  lexicon: HALOT
  rationale: נֶגֶד commonly means 'in front of, opposite.' 'Opposite his house' is
    concise and fits the topographical description.
- source_word: שְׁמַעְיָה
  chosen: Shemaiah
  rationale: Personal name transliterated by standard convention.
- source_word: בֶן שְׁכַנְיָה
  chosen: son of Shecaniah
  alternatives:
  - son of Shechaniah
  rationale: Standard transliteration of the personal name; English spelling varies,
    but 'Shecaniah' is a common convention.
- source_word: שֹׁמֵר
  chosen: keeper
  alternatives:
  - guard
  - watchman
  lexicon: HALOT
  rationale: As a participle modifying Shemaiah, it denotes his role/office. 'Keeper'
    is a natural rendering in administrative context and pairs well with 'gate.'
- source_word: שַׁעַר הַמִּזְרָח
  chosen: the East Gate
  alternatives:
  - the eastern gate
  - the gate of the east
  lexicon: HALOT
  rationale: A specific gate name is intended. 'East Gate' is idiomatic English and
    preserves the directional designation.
