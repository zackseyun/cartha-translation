theological_decisions:
- issue: Referent of 'their lords'
  chosen_reading: human superiors/officials connected with the rebuilding effort
  alternative_readings:
  - the singular abstract sense 'the Lord's work' by interpretive smoothing
  rationale: The Hebrew text is plural ('their lords') and should not be harmonized
    into a singular divine reference. The verse criticizes local nobles for refusing
    assigned communal labor under human authorities.
  doctrine_reference: Translation philosophy §1, §3
