id: NEH.3.5
reference: Nehemiah 3:5
source:
  edition: WLC
  text: וְ/עַל יָדָ֖/ם הֶחֱזִ֣יקוּ הַ/תְּקוֹעִ֑ים וְ/אַדִּֽירֵי/הֶם֙ לֹא הֵבִ֣יאוּ
    צַוָּרָ֔/ם בַּ/עֲבֹדַ֖ת אֲדֹנֵי/הֶֽם־־׃ס
translation:
  text: And next to them the Tekoites made repairs, but their nobles would not put
    their necks to the work of their lords.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their leading men' for 'their nobles.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'did not bring their neck to the work of their lords,' an idiom
      for refusing to submit to or take up the labor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל־יָדָם
  chosen: And next to them
  alternatives:
  - And beside them
  - And at their hand
  lexicon: HALOT
  rationale: The idiom עַל־יָד in Nehemiah's wall-building list marks adjacency in
    the sequence of repairs. 'Next to them' is natural modern English and preserves
    the spatial sense better than a more literal but opaque 'at their hand.'
- source_word: הֶחֱזִיקוּ
  chosen: made repairs
  alternatives:
  - repaired
  - strengthened
  lexicon: HALOT
  rationale: In Nehemiah 3 this verb repeatedly refers to undertaking repair work
    on the wall. Although the root can mean 'strengthen' or 'take hold,' the contextual
    sense is repairing/restoring a section. 'Made repairs' fits the construction-list
    style and reads naturally.
- source_word: הַתְּקוֹעִים
  chosen: the Tekoites
  alternatives:
  - the men of Tekoa
  lexicon: HALOT
  rationale: This gentilic refers to inhabitants of Tekoa. 'The Tekoites' is concise,
    standard, and preserves the place-based identity.
- source_word: וְאַדִּירֵיהֶם
  chosen: their nobles
  alternatives:
  - their noblesmen
  - their leading men
  - their mighty ones
  lexicon: HALOT
  rationale: אַדִּיר can denote prominent, powerful, or noble persons. In this civic
    context, 'their nobles' best captures local elites or leading men who refused
    the labor.
- source_word: לֹא הֵבִיאוּ צַוָּרָם
  chosen: would not put their necks
  alternatives:
  - did not bring their necks
  - would not bend their necks
  - would not submit themselves
  lexicon: HALOT
  rationale: The Hebrew is an idiom literally involving the neck, evoking submission
    to a yoke or willingness to labor. 'Would not put their necks' preserves the metaphor
    while remaining intelligible in English. The modal 'would not' reflects refusal
    rather than mere non-participation.
- source_word: בַּעֲבֹדַת
  chosen: to the work
  alternatives:
  - in the service
  - for the labor
  lexicon: HALOT
  rationale: עֲבֹדָה here refers to the labor of rebuilding rather than abstract service.
    'To the work' fits the neck/yoke idiom in English ('put one's neck to the work').
- source_word: אֲדֹנֵיהֶם
  chosen: their lords
  alternatives:
  - their masters
  - their overseers
  - their governors
  lexicon: HALOT
  rationale: The plural of אָדוֹן can mean lords, masters, or superiors. 'Their lords'
    is the most direct rendering and preserves the social hierarchy implied. It likely
    refers to those directing the communal rebuilding, not a divine title.
