id: NEH.3.8
reference: Nehemiah 3:8
source:
  edition: WLC
  text: עַל יָד֣/וֹ הֶחֱזִ֗יק עֻזִּיאֵ֤ל בֶּֽן חַרְהֲיָה֙ צֽוֹרְפִ֔ים וְ/עַל יָד֣/וֹ
    הֶחֱזִ֔יק חֲנַנְיָ֖ה בֶּן הָ/רַקָּחִ֑ים וַ/יַּֽעַזְבוּ֙ יְר֣וּשָׁלִַ֔ם עַ֖ד הַ/חוֹמָ֥ה
    הָ/רְחָבָֽה־־ס־־׃ס
translation:
  text: Next to him Uzziel son of Harhaiah, one of the goldsmiths, made repairs; and
    next to him Hananiah, one of the perfumers, made repairs. And they restored Jerusalem
    as far as the Broad Wall.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they left Jerusalem as far as the Broad Wall.' The Hebrew verb usually
      means 'left,' but in this rebuilding context it is commonly understood as 'restored'
      or 'repaired.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל יָדוֹ
  chosen: Next to him
  alternatives:
  - At his hand
  - Beside him
  lexicon: HALOT
  rationale: In Nehemiah 3 this idiom regularly marks adjacency in the rebuilding
    sequence. 'Next to him' is natural English and preserves the spatial sense better
    than a more literal but opaque 'at his hand.'
- source_word: הֶחֱזִיק
  chosen: made repairs
  alternatives:
  - strengthened
  - repaired
  lexicon: HALOT
  rationale: In this chapter the verb is used idiomatically for participating in repair
    work on the wall. 'Made repairs' best captures the construction context in clear
    English; 'strengthened' is too wooden here.
- source_word: צֹרְפִים
  chosen: one of the goldsmiths
  alternatives:
  - goldsmiths
  - metalworkers
  - refiners
  lexicon: HALOT
  rationale: The plural denotes the trade guild/class to which Uzziel belonged. 'One
    of the goldsmiths' makes explicit the appositional occupational sense in idiomatic
    English.
- source_word: הָרַקָּחִים
  chosen: one of the perfumers
  alternatives:
  - ointment-makers
  - apothecaries
  - perfumers
  lexicon: HALOT
  rationale: The term refers to makers of perfumes/ointments. 'Perfumers' is the clearest
    modern rendering; 'apothecaries' is archaic and potentially misleading.
- source_word: וַיַּעַזְבוּ
  chosen: they restored
  alternatives:
  - they left
  - they repaired
  - they fortified
  lexicon: HALOT
  rationale: Although the root commonly means 'leave,' in this context and construction
    it is widely understood to mean that they restored/rebuilt that section of Jerusalem's
    walling. Rendering it as 'left' would not fit the chapter's repair list. 'Restored'
    communicates the larger result, while the object 'Jerusalem' suggests the city's
    defenses by metonymy.
- source_word: יְרוּשָׁלַםִ
  chosen: Jerusalem
  alternatives:
  - the wall of Jerusalem
  lexicon: HALOT
  rationale: The text names the city itself, likely by metonymy for its fortifications.
    The translation keeps 'Jerusalem' rather than supplying 'wall' into the main text.
- source_word: עַד הַחוֹמָה הָרְחָבָה
  chosen: as far as the Broad Wall
  alternatives:
  - up to the broad wall
  - to the wide wall
  lexicon: HALOT
  rationale: This appears to be a known feature of Jerusalem's fortifications. Capitalizing
    'Broad Wall' treats it as a recognized designation, while preserving the Hebrew
    adjective's sense.
