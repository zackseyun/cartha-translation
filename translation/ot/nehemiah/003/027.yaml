id: NEH.3.27
reference: Nehemiah 3:27
source:
  edition: WLC
  text: אַחֲרָ֛י/ו הֶחֱזִ֥יקוּ הַ/תְּקֹעִ֖ים מִדָּ֣ה שֵׁנִ֑ית מִ/נֶּ֜גֶד הַ/מִּגְדָּ֤ל
    הַ/גָּדוֹל֙ הַ/יּוֹצֵ֔א וְ/עַ֖ד חוֹמַ֥ת הָ/עֹֽפֶל׃
translation:
  text: After him the Tekoites repaired another section, opposite the great projecting
    tower and as far as the wall of Ophel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a second section.' The Hebrew phrase can emphasize that the Tekoites
      repaired an additional portion beyond their earlier assignment.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרָיו
  chosen: After him
  alternatives:
  - After him/it
  - Next to him
  lexicon: HALOT
  rationale: In the Nehemiah 3 building list, אַחֲרָיו regularly marks sequence in
    the work assignment, best rendered idiomatically as 'After him' rather than the
    more spatial 'next to him' here. The 3ms suffix refers back to the previous worker/group.
- source_word: הֶחֱזִיקוּ
  chosen: repaired
  alternatives:
  - strengthened
  - made repairs
  lexicon: HALOT
  rationale: Though the verb literally means 'made strong/strengthened,' in Nehemiah
    3 it is a technical term for participating in rebuilding the wall. 'Repaired'
    is clear modern English and fits the construction context without over-literal
    awkwardness.
- source_word: הַתְּקֹעִים
  chosen: the Tekoites
  alternatives:
  - the men of Tekoa
  lexicon: HALOT
  rationale: A gentillic referring to inhabitants of Tekoa. 'The Tekoites' is concise
    and standard English for the group identity.
- source_word: מִדָּה שֵׁנִית
  chosen: another section
  alternatives:
  - a second section
  - a second measure/portion
  lexicon: HALOT
  rationale: The phrase denotes an additional assigned stretch of work. 'Another section'
    is smoother English in this construction, while preserving the sense that this
    is a second portion repaired by the same group.
- source_word: מִנֶּגֶד
  chosen: opposite
  alternatives:
  - in front of
  - facing
  lexicon: HALOT
  rationale: The preposition indicates position across from or facing a landmark.
    'Opposite' is the most natural concise rendering in this topographical description.
- source_word: הַמִּגְדָּל הַגָּדוֹל
  chosen: the great ... tower
  alternatives:
  - the large tower
  lexicon: HALOT
  rationale: מִגְדָּל is 'tower' and גָּדוֹל is 'great/large.' 'Great tower' is a
    natural collocation in English and preserves the prominence of the structure.
- source_word: הַיּוֹצֵא
  chosen: projecting
  alternatives:
  - jutting out
  - that extends outward
  lexicon: HALOT
  rationale: The participle from יצא literally means 'going out.' In architectural
    context it describes a tower that protrudes from the wall line. 'Projecting' is
    precise and idiomatic.
- source_word: וְעַד
  chosen: and as far as
  alternatives:
  - and up to
  - even to
  lexicon: HALOT
  rationale: Marks the endpoint of the repaired section. 'And as far as' reads naturally
    in English while preserving the boundary sense.
- source_word: חוֹמַת
  chosen: the wall of
  alternatives:
  - the wall at
  lexicon: HALOT
  rationale: Construct form of 'wall' governing the place name Ophel; straightforwardly
    rendered 'the wall of Ophel.'
- source_word: הָעֹפֶל
  chosen: Ophel
  alternatives: []
  lexicon: HALOT
  rationale: A proper place name in Jerusalem, so it is transliterated rather than
    translated, in keeping with the translation philosophy for names.
