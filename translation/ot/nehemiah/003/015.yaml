id: NEH.3.15
reference: Nehemiah 3:15
source:
  edition: WLC
  text: וְ/אֵת֩ שַׁ֨עַר הָ/עַ֜יִן הֶ֠חֱזִיק שַׁלּ֣וּן בֶּן כָּל חֹזֶה֮ שַׂ֣ר פֶּ֣לֶךְ
    הַ/מִּצְפָּה֒ ה֤וּא יִבְנֶ֨/נּוּ֙ וִ/יטַֽלְלֶ֔/נּוּ ו/יעמידו דַּלְתֹתָ֔י/ו מַנְעֻלָ֖י/ו
    וּ/בְרִיחָ֑י/ו וְ֠/אֵת חוֹמַ֞ת בְּרֵכַ֤ת הַ/שֶּׁ֨לַח֙ לְ/גַן הַ/מֶּ֔לֶךְ וְ/עַד
    הַֽ/מַּעֲל֔וֹת הַ/יּוֹרְד֖וֹת מֵ/עִ֥יר דָּוִֽיד־־־־׃ס
translation:
  text: And Shallun son of Col-hozeh, official of the district of Mizpah, repaired
    the Fountain Gate. He rebuilt it and roofed it, and set up its doors, its bolts,
    and its bars, and repaired the wall of the Pool of Shelah by the king’s garden,
    as far as the stairs that go down from the City of David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Pool of Siloah' (traditionally associated with Siloam). The Hebrew
      place-name here is Shelah.
    reason: alternative_reading
lexical_decisions:
- source_word: שַׁעַר הָעַיִן
  chosen: the Fountain Gate
  alternatives:
  - the Spring Gate
  - the Gate of the Spring
  lexicon: HALOT
  rationale: עַיִן can denote a spring or fountain as a water source. 'Fountain Gate'
    is a natural English rendering and fits the topographical context of Jerusalem's
    waterworks. 'Spring Gate' is possible but less idiomatic in English.
- source_word: הֶחֱזִיק
  chosen: repaired
  alternatives:
  - strengthened
  - made repairs to
  lexicon: HALOT
  rationale: In Nehemiah 3 this verb functions idiomatically for participating in
    repair work on a section of wall or gate. 'Repaired' captures the construction
    context better than the more wooden 'strengthened'.
- source_word: שַׂר פֶּלֶךְ הַמִּצְפָּה
  chosen: official of the district of Mizpah
  alternatives:
  - ruler of the district of Mizpah
  - governor of the district of Mizpah
  lexicon: HALOT
  rationale: שַׂר is a leader/official, and פֶּלֶךְ denotes an administrative district.
    'Official of the district' is clear modern English without overstating the office
    as a full governor.
- source_word: הוּא יִבְנֶנּוּ
  chosen: He rebuilt it
  alternatives:
  - He built it
  - He repaired it
  lexicon: HALOT
  rationale: 'The pronoun adds emphasis: this man himself undertook the work. In context
    of restoration, ''rebuilt'' better reflects the sense than a simple ''built''.'
- source_word: וִיטַלְלֶנּוּ
  chosen: roofed it
  alternatives:
  - covered it
  - put its roof on
  lexicon: HALOT
  rationale: The verb from טלל here refers to covering the gate structure, likely
    with beams or roofing. 'Roofed it' is concise and fits the architectural context.
- source_word: ויעמידו דַּלְתֹתָיו מַנְעֻלָיו וּבְרִיחָיו
  chosen: and set up its doors, its bolts, and its bars
  alternatives:
  - and installed its doors, its locks, and its bars
  lexicon: HALOT
  rationale: The sequence describes fitting the gate with its functional components.
    'Set up' matches the causative sense of עמד in context. מַנְעֻלִים likely refers
    to fastening devices; 'bolts' is a good contextual rendering, while בְּרִיחִים
    are bars/crossbars.
- source_word: חוֹמַת בְּרֵכַת הַשֶּׁלַח
  chosen: the wall of the Pool of Shelah
  alternatives:
  - the wall of the Pool of Siloah
  - the wall of the canal pool
  lexicon: HALOT
  rationale: בְּרֵכָה is 'pool.' הַשֶּׁלַח is a place-name/form associated with the
    water system later known as Siloam/Siloah. Because the Hebrew form here is שׁלח,
    'Shelah' preserves the name more directly, while the more familiar traditional
    identification can be noted in a footnote.
- source_word: לְגַן הַמֶּלֶךְ
  chosen: by the king’s garden
  alternatives:
  - toward the king’s garden
  - at the king’s garden
  lexicon: HALOT
  rationale: The preposition לְ in topographical description can indicate relation
    or direction. 'By' reads naturally in English and suits the description of the
    wall's location adjacent to the garden.
- source_word: וְעַד הַמַּעֲלוֹת הַיּוֹרְדוֹת
  chosen: as far as the stairs that go down
  alternatives:
  - up to the steps descending
  - and to the ascent that goes down
  lexicon: HALOT
  rationale: Though מַעֲלוֹת can literally mean 'ascents/steps,' the participle 'going
    down' clarifies these are descending stairs. 'As far as the stairs that go down'
    is idiomatic and preserves the topographical detail.
- source_word: מֵעִיר דָּוִיד
  chosen: from the City of David
  alternatives:
  - out of the City of David
  lexicon: HALOT
  rationale: The preposition מִן marks origin/source. 'From the City of David' is
    the most straightforward rendering in this geographical description.
