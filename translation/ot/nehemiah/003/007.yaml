id: NEH.3.7
reference: Nehemiah 3:7
source:
  edition: WLC
  text: וְ/עַל יָדָ֨/ם הֶחֱזִ֜יק מְלַטְיָ֣ה הַ/גִּבְעֹנִ֗י וְ/יָדוֹן֙ הַ/מֵּרֹ֣נֹתִ֔י
    אַנְשֵׁ֥י גִבְע֖וֹן וְ/הַ/מִּצְפָּ֑ה לְ/כִסֵּ֕א פַּחַ֖ת עֵ֥בֶר הַ/נָּהָֽר־׃ס
translation:
  text: And next to them Melatiah the Gibeonite and Jadon the Meronothite made repairs,
    along with the men of Gibeon and Mizpah, as far as the seat of the governor of
    the province Beyond the River.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'to the seat of the governor of Beyond the River.' The phrase may
      refer either to the governor's official seat/residence or, less likely, to his
      jurisdictional authority in that district.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל יָדָם
  chosen: And next to them
  alternatives:
  - And at their hand
  - And beside them
  lexicon: HALOT
  rationale: The idiom עַל־יָד commonly marks adjacency in Nehemiah 3's building list.
    'Next to them' is natural English and preserves the spatial sense better than
    a more literal but opaque rendering.
- source_word: הֶחֱזִיק
  chosen: made repairs
  alternatives:
  - strengthened
  - repaired
  lexicon: HALOT
  rationale: In Nehemiah 3 this verb repeatedly refers to participating in rebuilding
    sections of the wall. 'Made repairs' captures the construction context idiomatically
    while remaining close to the Hebrew usage.
- source_word: מְלַטְיָה
  chosen: Melatiah
  rationale: Personal name transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: הַגִּבְעֹנִי
  chosen: the Gibeonite
  alternatives:
  - from Gibeon
  lexicon: HALOT
  rationale: The gentilic is best rendered as an ethnic/geographic designation, 'the
    Gibeonite,' modifying Melatiah.
- source_word: וְיָדוֹן
  chosen: and Jadon
  rationale: Personal name transliterated. The conjunction is retained straightforwardly.
- source_word: הַמֵּרֹנֹתִי
  chosen: the Meronothite
  alternatives:
  - from Meronoth
  lexicon: HALOT
  rationale: Gentilic adjective rendered with the standard English suffix '-ite' to
    match the Hebrew form and parallel 'Gibeonite.'
- source_word: אַנְשֵׁי גִבְעוֹן וְהַמִּצְפָּה
  chosen: along with the men of Gibeon and Mizpah
  alternatives:
  - the men of Gibeon and of Mizpah
  - men from Gibeon and Mizpah
  lexicon: HALOT
  rationale: אַנְשֵׁי plus place names denotes the people/men belonging to those towns.
    'Along with' makes clear these groups joined the named individuals in the work.
- source_word: לְכִסֵּא
  chosen: as far as the seat of
  alternatives:
  - to the throne of
  - to the official seat of
  lexicon: HALOT
  rationale: כִּסֵּא literally means 'seat' or 'throne.' In this administrative context,
    'seat of' likely refers to the governor's official seat or jurisdictional center
    rather than a royal throne. 'As far as' supplies the spatial force in context.
- source_word: פַּחַת
  chosen: the governor of
  alternatives:
  - the prefect of
  lexicon: HALOT
  rationale: פַּחַת is a Persian-period administrative title. 'Governor' is the clearest
    modern equivalent.
- source_word: עֵבֶר הַנָּהָר
  chosen: the province Beyond the River
  alternatives:
  - Beyond the River
  - Trans-Euphrates
  lexicon: HALOT
  rationale: This is a known Persian administrative designation for the region west
    of the Euphrates. Adding 'province' clarifies the title-governed genitive in English;
    capitalization marks it as a proper regional title.
