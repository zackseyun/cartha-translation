id: NEH.3.36
reference: Nehemiah 3:36
source:
  edition: WLC
  text: שְׁמַ֤ע אֱלֹהֵ֨י/נוּ֙ כִּֽי הָיִ֣ינוּ בוּזָ֔ה וְ/הָשֵׁ֥ב חֶרְפָּתָ֖/ם אֶל
    רֹאשָׁ֑/ם וּ/תְנֵ֥/ם לְ/בִזָּ֖ה בְּ/אֶ֥רֶץ שִׁבְיָֽה־־׃
translation:
  text: Hear, our God, for we have become despised. Turn their reproach back on their
    own heads, and give them over as plunder in a land of captivity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we have become an object of scorn.' The Hebrew is literally 'we have
      become contempt.'
    reason: lexical_alternative
  - marker: b
    text: Or 'give them for plunder' or 'make them spoil.'
    reason: lexical_alternative
  - marker: c
    text: Or 'in the land of captivity.' The Hebrew may be read either indefinitely
      or more specifically depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמַע
  chosen: Hear
  alternatives:
  - Listen
  - Hear us
  lexicon: HALOT
  rationale: Imperative 2ms of שׁמע addressed to God. 'Hear' is the standard prayer
    idiom and avoids adding the object 'us,' which is implied by context but not explicit.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  alternatives:
  - O our God
  lexicon: HALOT
  rationale: Construct form with 1cp suffix. 'Our God' is direct and natural in English
    prayer address. The vocative force is clear without needing to add 'O,' though
    that would also be possible.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the plea. 'For' fits the prayer style and connects
    smoothly to the imperative.
- source_word: הָיִינוּ בוּזָה
  chosen: we have become despised
  alternatives:
  - we are despised
  - we have become a contempt
  - we have become an object of scorn
  lexicon: HALOT
  rationale: 'The verb is perfect 1cp (''we have been/have become'') with the noun
    בוּזָה (''contempt, scorn''). English idiom prefers an adjectival rendering: ''have
    become despised.'' This preserves the resultant state without the awkward literal
    ''have become contempt.'''
- source_word: וְהָשֵׁב
  chosen: Turn ... back
  alternatives:
  - Return
  - Bring back
  lexicon: HALOT
  rationale: Hiphil imperative of שוב with causative/return sense. In the idiom with
    reproach and 'onto their head,' 'turn back' is the most natural English equivalent.
- source_word: חֶרְפָּתָם
  chosen: their reproach
  alternatives:
  - their disgrace
  - their taunt
  - their insult
  lexicon: HALOT
  rationale: חרפה denotes reproach, disgrace, or taunt. 'Reproach' preserves the moral
    and shame-laden sense and fits the imprecatory prayer context.
- source_word: אֶל רֹאשָׁם
  chosen: on their own heads
  alternatives:
  - upon their heads
  - back on their heads
  lexicon: HALOT
  rationale: Hebrew literally 'to their head.' In English the idiom is 'on their own
    heads,' expressing retributive reversal. 'Own' is supplied for natural emphasis
    inherent in the idiom.
- source_word: וּתְנֵם
  chosen: give them over
  alternatives:
  - give them
  - hand them over
  - deliver them
  lexicon: HALOT
  rationale: Imperative of נתן with 3mp suffix. Because the complement is 'as plunder,'
    'give them over' communicates handing enemies over to judgment more clearly than
    the bare 'give them.'
- source_word: לְבִזָּה
  chosen: as plunder
  alternatives:
  - for plunder
  - to plunder
  - as spoil
  lexicon: HALOT
  rationale: 'The noun ביזה means spoil/plunder. ''As plunder'' best reflects the
    predicative sense after נתן: make them into plunder.'
- source_word: בְּאֶרֶץ שִׁבְיָה
  chosen: in a land of captivity
  alternatives:
  - in the land of captivity
  - in a land of exile
  - in a captive land
  lexicon: HALOT
  rationale: The phrase is literally 'in a land of captivity.' The absence of the
    article in Hebrew supports the indefinite 'a land,' and 'captivity' preserves
    the concrete noun rather than interpreting more loosely as 'exile.'
