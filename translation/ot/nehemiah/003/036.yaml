theological_decisions:
- issue: Imprecatory petition against enemies
  chosen_reading: Retain the prayer for retributive justice in direct form
  alternative_readings:
  - Soften to a general request for justice
  - Interpret metaphorically rather than as a real petition
  rationale: The Hebrew text explicitly asks God to reverse the enemies' reproach
    and hand them over as plunder. The translation should preserve the force of the
    imprecation without muting it for theological discomfort.
  doctrine_reference: Translation philosophy §1, §3
