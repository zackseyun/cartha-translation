id: NEH.3.32
reference: Nehemiah 3:32
source:
  edition: WLC
  text: וּ/בֵ֨ין עֲלִיַּ֤ת הַ/פִּנָּה֙ לְ/שַׁ֣עַר הַ/צֹּ֔אן הֶחֱזִ֥יקוּ הַ/צֹּרְפִ֖ים
    וְ/הָ/רֹכְלִֽים׃פ
translation:
  text: And between the upper room of the corner and the Sheep Gate, the goldsmiths
    and the merchants made repairs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the ascent of the corner' or 'the upper chamber of the corner.' The
      Hebrew עֲלִיָּה can refer to an upper room/chamber or an ascent, and the exact
      architectural feature is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבֵין
  chosen: And between
  alternatives:
  - And from between
  - Now between
  lexicon: HALOT
  rationale: The conjunction plus preposition introduces the final segment of the
    circuit around the wall. 'And between' preserves the connective force and the
    spatial sense.
- source_word: עֲלִיַּת
  chosen: the upper room
  alternatives:
  - the ascent
  - the upper chamber
  - the upper story
  lexicon: HALOT
  rationale: The noun can denote an upper room/chamber or upper structure. In this
    architectural context, 'upper room' is a natural English rendering that preserves
    the idea of an elevated built feature without over-specifying.
- source_word: הַפִּנָּה
  chosen: the corner
  alternatives:
  - the Corner
  - the angle
  - the corner tower
  lexicon: HALOT
  rationale: The term means 'corner' and likely refers to a known corner structure
    of the wall. Lowercase 'corner' is retained in the main text because the Hebrew
    itself is a common noun with article, though it may function quasi-toponymically.
- source_word: לְשַׁעַר הַצֹּאן
  chosen: the Sheep Gate
  alternatives:
  - the gate of the flock
  - the Sheepgate
  lexicon: HALOT
  rationale: This is a recognized gate name in the Jerusalem wall narrative. 'Sheep
    Gate' is clear modern English and consistent with the surrounding chapter.
- source_word: הֶחֱזִיקוּ
  chosen: made repairs
  alternatives:
  - repaired
  - strengthened
  - worked on
  lexicon: HALOT
  rationale: In Nehemiah 3 this verb repeatedly refers to repair work on sections
    of the wall/gates. 'Made repairs' fits the chapter's idiom and avoids the misleadingly
    literal 'strengthened' in English.
- source_word: הַצֹּרְפִים
  chosen: the goldsmiths
  alternatives:
  - the refiners
  - the metalworkers
  lexicon: HALOT
  rationale: The participial noun refers to those who refine or work precious metals.
    'Goldsmiths' is the conventional and contextually apt occupational rendering.
- source_word: וְהָרֹכְלִים
  chosen: the merchants
  alternatives:
  - the traders
  - the peddlers
  lexicon: HALOT
  rationale: The term denotes traders/merchants. 'Merchants' is idiomatic and suitably
    broad for the occupational group mentioned here.
