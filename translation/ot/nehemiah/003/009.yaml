id: NEH.3.9
reference: Nehemiah 3:9
source:
  edition: WLC
  text: וְ/עַל יָדָ֤/ם הֶחֱזִיק֙ רְפָיָ֣ה בֶן ח֔וּר שַׂ֕ר חֲצִ֖י פֶּ֥לֶךְ יְרוּשָׁלִָֽם־־׃ס
translation:
  text: Next to them, Rephaiah son of Hur, ruler of half the district of Jerusalem,
    made repairs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'strengthened'; the Hebrew verb literally means 'made strong,' but in
      this chapter it is used idiomatically for repair work.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל־יָדָם
  chosen: Next to them
  alternatives:
  - And beside them
  - At their side
  lexicon: HALOT
  rationale: In Nehemiah 3 this idiom regularly marks adjacent workers along the wall.
    'Next to them' is natural modern English and preserves the sequential building-list
    sense better than a more literal 'at their hand/side.'
- source_word: הֶחֱזִיק
  chosen: made repairs
  alternatives:
  - strengthened
  - repaired
  lexicon: HALOT
  rationale: Though the Hiphil of חזק literally means 'made strong/strengthened,'
    in Nehemiah 3 it functions idiomatically for participating in repair work on the
    wall. 'Made repairs' best captures the contextual sense in readable English.
- source_word: רְפָיָה
  chosen: Rephaiah
  rationale: Personal name is transliterated according to the project's policy to
    transliterate names rather than translate them.
- source_word: בֶן־חוּר
  chosen: son of Hur
  rationale: Standard genealogical expression identifying Rephaiah by patronymic.
- source_word: שַׂר
  chosen: ruler
  alternatives:
  - official
  - prince
  - governor
  lexicon: HALOT
  rationale: שַׂר denotes an official or leader. 'Ruler' fits the administrative context
    and reads naturally with the following territorial designation.
- source_word: חֲצִי פֶּלֶךְ
  chosen: half the district
  alternatives:
  - half the province
  - half the region
  lexicon: HALOT
  rationale: פֶּלֶךְ in this context refers to an administrative district. 'District'
    is clearer than 'province' for a subdivision, and 'half the district' reflects
    the construct phrase straightforwardly.
- source_word: יְרוּשָׁלִָם
  chosen: of Jerusalem
  rationale: Standard English form of the place name; the genitive relation indicates
    the district associated with Jerusalem.
