id: NEH.3.23
reference: Nehemiah 3:23
source:
  edition: WLC
  text: אַחֲרָ֨י/ו הֶחֱזִ֧יק בִּנְיָמִ֛ן וְ/חַשּׁ֖וּב נֶ֣גֶד בֵּיתָ֑/ם אַחֲרָ֣י/ו
    הֶחֱזִ֗יק עֲזַרְיָ֧ה בֶן מַעֲשֵׂיָ֛ה בֶּן עֲנָֽנְיָ֖ה אֵ֥צֶל בֵּיתֽ/וֹס־־׃ס
translation:
  text: After him Benjamin and Hasshub made repairs opposite their house. After him
    Azariah son of Maaseiah, son of Ananiah, made repairs beside his house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Hashub' for Hasshub.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרָיו
  chosen: After him
  alternatives:
  - Next to him
  - Afterward
  lexicon: HALOT
  rationale: In Nehemiah 3 this recurring construction marks sequence along the wall-building
    list, not merely time. 'After him' is the standard and natural English rendering
    that preserves the narrative progression.
- source_word: הֶחֱזִיק
  chosen: made repairs
  alternatives:
  - repaired
  - strengthened
  lexicon: HALOT
  rationale: The Hiphil of חזק in this chapter is an idiomatic term for participating
    in repair work on the wall. 'Made repairs' captures the construction activity
    more clearly than the overly literal 'strengthened' while remaining close to the
    Hebrew.
- source_word: בִּנְיָמִן
  chosen: Benjamin
  rationale: Personal name transliterated according to standard English convention,
    following the project's policy to transliterate names.
- source_word: חַשּׁוּב
  chosen: Hasshub
  alternatives:
  - Hashub
  rationale: Personal name transliterated. 'Hasshub' reflects a common English representation
    of the Hebrew spelling; 'Hashub' is a viable alternate transliteration.
- source_word: נֶגֶד
  chosen: opposite
  alternatives:
  - in front of
  - facing
  lexicon: HALOT
  rationale: The preposition indicates position directly across from or in front of
    something. 'Opposite' is concise and idiomatic in this topographical context.
- source_word: בֵּיתָם
  chosen: their house
  alternatives:
  - their homes
  lexicon: HALOT
  rationale: Singular 'house' with plural suffix is best rendered literally as 'their
    house,' likely referring to a shared household or residence. This preserves the
    Hebrew number rather than smoothing it to plural.
- source_word: עֲזַרְיָה
  chosen: Azariah
  rationale: Personal name transliterated by standard convention.
- source_word: בֶן מַעֲשֵׂיָה בֶּן עֲנָנְיָה
  chosen: son of Maaseiah, son of Ananiah
  rationale: The genealogy is rendered straightforwardly and formally to preserve
    the Hebrew patronymic structure.
- source_word: אֵצֶל
  chosen: beside
  alternatives:
  - next to
  - at
  lexicon: HALOT
  rationale: The preposition denotes proximity. 'Beside' is natural English and distinguishes
    this phrase slightly from the repeated sequential marker 'after him.'
- source_word: בֵּיתוֹ
  chosen: his house
  alternatives:
  - his home
  lexicon: HALOT
  rationale: Literal rendering preserves the concrete topographical reference in the
    repair list.
