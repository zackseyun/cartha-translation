id: NEH.3.33
reference: Nehemiah 3:33
source:
  edition: WLC
  text: וַ/יְהִ֞י כַּ/אֲשֶׁ֧ר שָׁמַ֣ע סַנְבַלַּ֗ט כִּֽי אֲנַ֤חְנוּ בוֹנִים֙ אֶת הַ֣/חוֹמָ֔ה
    וַ/יִּ֣חַר ל֔/וֹ וַ/יִּכְעַ֖ס הַרְבֵּ֑ה וַ/יַּלְעֵ֖ג עַל הַ/יְּהוּדִֽים־־־׃
translation:
  text: Now when Sanballat heard that we were rebuilding the wall, he became angry
    and very enraged, and he mocked the Jews.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Judeans.' The Hebrew term can refer to the people of Judah in a
      regional sense as well as to the Jews more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַּאֲשֶׁר
  chosen: Now when
  alternatives:
  - And it happened when
  - When
  lexicon: HALOT
  rationale: The narrative formula introduces a new development in the story. 'Now
    when' preserves the discourse-shift function in natural modern English without
    over-literal awkwardness.
- source_word: שָׁמַע
  chosen: heard
  alternatives:
  - learned
  lexicon: HALOT
  rationale: The verb commonly means 'hear.' In context it refers to receiving news,
    but 'heard' is both accurate and idiomatic.
- source_word: סַנְבַלַּט
  chosen: Sanballat
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: כִּי אֲנַחְנוּ בוֹנִים
  chosen: that we were rebuilding
  alternatives:
  - that we were building
  - that we were rebuilding again
  lexicon: HALOT
  rationale: The participle בוֹנִים denotes ongoing action. 'Were rebuilding' fits
    the context of restoring Jerusalem's damaged wall better than the more generic
    'were building.'
- source_word: הַחוֹמָה
  chosen: the wall
  alternatives:
  - the city wall
  lexicon: HALOT
  rationale: חוֹמָה means 'wall,' and in Nehemiah the referent is clearly Jerusalem's
    fortification wall. The simpler 'the wall' is sufficient in context.
- source_word: וַיִּחַר לוֹ
  chosen: he became angry
  alternatives:
  - it burned to him
  - his anger burned
  lexicon: HALOT
  rationale: This idiom literally refers to burning anger. 'He became angry' communicates
    the sense clearly in contemporary English.
- source_word: וַיִּכְעַס הַרְבֵּה
  chosen: and very enraged
  alternatives:
  - and was greatly provoked
  - and became very angry
  lexicon: HALOT
  rationale: The second anger verb intensifies the first. Rendering it as 'very enraged'
    preserves the escalation rather than flattening both verbs into the same English
    expression.
- source_word: וַיַּלְעֵג
  chosen: he mocked
  alternatives:
  - he ridiculed
  - he jeered at
  lexicon: HALOT
  rationale: The verb denotes derisive speech or scorn. 'Mocked' is concise, natural,
    and suitably forceful.
- source_word: עַל הַיְּהוּדִים
  chosen: the Jews
  alternatives:
  - the Judeans
  lexicon: HALOT
  rationale: יְהוּדִים can denote either ethnic-religious 'Jews' or regional 'Judeans.'
    In Nehemiah, the people opposed in Jerusalem are commonly referred to as 'the
    Jews'; this is the most recognizable and contextually fitting rendering, while
    the regional nuance is worth preserving in a footnote.
