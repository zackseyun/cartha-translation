id: NEH.3.24
reference: Nehemiah 3:24
source:
  edition: WLC
  text: אַחֲרָ֣י/ו הֶחֱזִ֗יק בִּנּ֛וּי בֶּן חֵנָדָ֖ד מִדָּ֣ה שֵׁנִ֑ית מִ/בֵּ֣ית עֲזַרְיָ֔ה
    עַד הַ/מִּקְצ֖וֹעַ וְ/עַד הַ/פִּנָּֽה־־־׃
translation:
  text: After him, Binnui son of Henadad repaired another section, from the house
    of Azariah as far as the angle and as far as the corner.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a second section.' The Hebrew phrase may indicate either an additional
      stretch repaired by Binnui or simply a second measured portion.
    reason: lexical_alternative
  - marker: b
    text: The two terms rendered 'angle' and 'corner' are related but not identical
      in Hebrew; the wording likely distinguishes two nearby architectural features.
    reason: cultural_note
lexical_decisions:
- source_word: אַחֲרָיו
  chosen: After him
  alternatives:
  - After him in sequence
  - Next to him
  lexicon: HALOT
  rationale: In the Nehemiah 3 building list, the term marks sequential order in the
    work report. 'After him' is the most natural and sufficiently formal rendering;
    'next to him' would suggest immediate spatial adjacency more strongly than the
    Hebrew requires here.
- source_word: הֶחֱזִיק
  chosen: repaired
  alternatives:
  - strengthened
  - made repairs
  lexicon: HALOT
  rationale: Though the verb literally relates to strengthening or making firm, in
    Nehemiah 3 it idiomatically refers to carrying out repair work on the wall. 'Repaired'
    is the standard contextual sense and reads naturally in English.
- source_word: בִּנּוּי בֶּן־חֵנָדָד
  chosen: Binnui son of Henadad
  rationale: Personal names are transliterated per project philosophy. The patronymic
    construction is rendered straightforwardly as 'son of.'
- source_word: מִדָּה שֵׁנִית
  chosen: another section
  alternatives:
  - a second section
  - a second measured portion
  lexicon: HALOT
  rationale: The phrase likely indicates that this worker or family group repaired
    an additional stretch beyond one already mentioned. 'Another section' communicates
    the discourse function clearly in modern English, while 'a second section' is
    possible but slightly stiffer. The underlying noun can denote a measure/extent,
    hence 'section' in context.
- source_word: מִבֵּית עֲזַרְיָה
  chosen: from the house of Azariah
  alternatives:
  - from Azariah's house
  lexicon: HALOT
  rationale: Both are accurate. 'From the house of Azariah' preserves the Hebrew structure
    while remaining natural English.
- source_word: עַד הַמִּקְצוֹעַ
  chosen: as far as the angle
  alternatives:
  - to the turning
  - to the corner-buttress
  lexicon: HALOT
  rationale: The noun denotes an angle, turning, or corner-point in the wall. Since
    the next term is also a corner-related word, retaining some distinction is helpful;
    'angle' preserves that distinction better than using 'corner' for both.
- source_word: וְעַד הַפִּנָּה
  chosen: and as far as the corner
  alternatives:
  - and to the corner
  - and to the tower corner
  lexicon: HALOT
  rationale: פִּנָּה commonly means 'corner' or a corner-point/structure. 'And as
    far as the corner' mirrors the repeated עַד and keeps the topographical progression
    explicit.
