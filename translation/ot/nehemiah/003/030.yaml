id: NEH.3.30
reference: Nehemiah 3:30
source:
  edition: WLC
  text: אחר/י הֶחֱזִ֜יק חֲנַנְיָ֣ה בֶן שֶׁלֶמְיָ֗ה וְ/חָנ֧וּן בֶּן צָלָ֛ף הַ/שִּׁשִּׁ֖י
    מִדָּ֣ה שֵׁנִ֑י אַחֲרָ֣י/ו הֶחֱזִ֗יק מְשֻׁלָּם֙ בֶּן בֶּ֣רֶכְיָ֔ה נֶ֖גֶד נִשְׁכָּתֽ/וֹ־־ס־׃ס
translation:
  text: After him Hananiah son of Shelemiah and Hanun the sixth son of Zalaph repaired
    another section. After him Meshullam son of Berechiah repaired opposite his chamber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally has 'a second measure'; in Nehemiah 3 this idiom refers
      to an additional section assigned for repair.
    reason: lexical_alternative
  - marker: b
    text: The first phrase is traditionally understood in context as 'After him,'
      matching the repeated sequence formula in this chapter.
    reason: textual_variant
lexical_decisions:
- source_word: אַחֲרַי / אַחֲרָיו
  chosen: After him
  alternatives:
  - Next to him
  - After me/after him
  lexicon: HALOT
  rationale: In the wall-building list, the phrase marks sequence/location relative
    to the previous worker. Although the ketiv/qere-like tradition reflected in the
    morphology shows first-person in the first occurrence, the contextual sense throughout
    Nehemiah 3 is the recurring formula 'after him,' and English should reflect the
    narrative sequence rather than a literal but contextually disruptive 'after me.'
- source_word: הֶחֱזִיק
  chosen: repaired
  alternatives:
  - strengthened
  - made repairs
  lexicon: HALOT
  rationale: In Nehemiah 3 this verb consistently refers to participating in restoration
    work on the wall or gates. 'Repaired' is idiomatic and contextually precise, while
    preserving the construction activity denoted by the Hebrew.
- source_word: הַשִּׁשִּׁי
  chosen: the sixth son
  alternatives:
  - the sixth
  - a sixth
  lexicon: HALOT
  rationale: 'The ordinal most naturally identifies Hanun within Zalaph''s family
    line: ''Hanun son of Zalaph, the sixth.'' Supplying ''son'' in English clarifies
    the elliptical Hebrew and matches the genealogical style.'
- source_word: מִדָּה שֵׁנִי
  chosen: another section
  alternatives:
  - a second section
  - a second measure
  lexicon: HALOT
  rationale: In this chapter the expression denotes an additional stretch of wall
    assigned for repair. 'Another section' is natural English and fits the repeated
    usage in Nehemiah 3 better than the overly literal 'second measure.'
- source_word: נֶגֶד
  chosen: opposite
  alternatives:
  - in front of
  - facing
  lexicon: HALOT
  rationale: The preposition indicates location directly across from or in front of
    a reference point. 'Opposite' is concise and suits the topographical description.
- source_word: נִשְׁכָּתוֹ
  chosen: his chamber
  alternatives:
  - his room
  - his cell
  - his office
  lexicon: HALOT
  rationale: The noun refers to a chamber or room, often an official or residential
    room. 'Chamber' preserves the slightly formal architectural sense without over-specifying
    its function.
- source_word: חֲנַנְיָה / שֶׁלֶמְיָה / חָנוּן / צָלָף / מְשֻׁלָּם / בֶּרֶכְיָה
  chosen: Hananiah / Shelemiah / Hanun / Zalaph / Meshullam / Berechiah
  rationale: Personal names are transliterated rather than translated, following project
    policy.
