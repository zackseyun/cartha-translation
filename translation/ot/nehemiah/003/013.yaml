id: NEH.3.13
reference: Nehemiah 3:13
source:
  edition: WLC
  text: אֵת֩ שַׁ֨עַר הַ/גַּ֜יְא הֶחֱזִ֣יק חָנוּן֮ וְ/יֹשְׁבֵ֣י זָנוֹחַ֒ הֵ֣מָּה בָנ֔וּ/הוּ
    וַֽ/יַּעֲמִ֨ידוּ֙ דַּלְתֹתָ֔י/ו מַנְעֻלָ֖י/ו וּ/בְרִיחָ֑י/ו וְ/אֶ֤לֶף אַמָּה֙
    בַּ/חוֹמָ֔ה עַ֖ד שַׁ֥עַר הָ/שֲׁפֽוֹת׃
translation:
  text: Hanun and the inhabitants of Zanoah repaired the Valley Gate. They built it
    and set up its doors, its bolts, and its bars, and repaired a thousand cubits
    of the wall, as far as the Dung Gate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'strengthened' the Valley Gate; the Hebrew verb can mean 'made firm'
      or 'repaired' in this chapter's rebuilding context.
    reason: lexical_alternative
  - marker: b
    text: A thousand cubits is roughly 1,500 feet (about 457 meters).
    reason: cultural_note
  - marker: c
    text: Or 'Refuse Gate.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶחֱזִיק
  chosen: repaired
  alternatives:
  - strengthened
  - made repairs to
  lexicon: HALOT
  rationale: In Nehemiah 3 this verb is used repeatedly for taking responsibility
    for a section of rebuilding/repair. 'Repaired' best fits the chapter's construction
    context in natural English, though the verb more literally suggests strengthening
    or making firm.
- source_word: שַׁעַר הַגַּיְא
  chosen: the Valley Gate
  alternatives:
  - the gate of the valley
  lexicon: HALOT
  rationale: A construct phrase naming a city gate. 'Valley Gate' is the standard
    natural English rendering while preserving the place-name sense.
- source_word: יֹשְׁבֵי זָנוֹחַ
  chosen: the inhabitants of Zanoah
  alternatives:
  - those living in Zanoah
  - the residents of Zanoah
  lexicon: HALOT
  rationale: The participial form from ישב denotes those dwelling in the town. 'Inhabitants'
    is concise and idiomatic.
- source_word: הֵמָּה בָנוּהוּ
  chosen: They built it
  alternatives:
  - They rebuilt it
  lexicon: HALOT
  rationale: The clause explicitly states that they built the gate. Because the broader
    context is repair/restoration, 'rebuilt' is possible, but 'built it' stays closer
    to the Hebrew while still fitting the context.
- source_word: וַיַּעֲמִידוּ
  chosen: set up
  alternatives:
  - installed
  - erected
  lexicon: HALOT
  rationale: The verb literally means caused to stand/placed in position. For doors
    and hardware, 'set up' is a natural, sufficiently literal rendering.
- source_word: דַּלְתֹתָיו
  chosen: its doors
  alternatives:
  - its door-leaves
  lexicon: HALOT
  rationale: Plural of 'door' referring to the gate's leaves/panels. 'Doors' is standard
    English for gate leaves.
- source_word: מַנְעֻלָיו
  chosen: its bolts
  alternatives:
  - its locks
  - its fastenings
  lexicon: HALOT
  rationale: In gate-building contexts this term refers to fastening hardware. 'Bolts'
    fits the architectural setting better than the more modern-sounding 'locks'.
- source_word: בְרִיחָיו
  chosen: its bars
  alternatives:
  - its crossbars
  lexicon: HALOT
  rationale: Refers to the bars securing the gate. 'Bars' is clear and conventional.
- source_word: אֶלֶף אַמָּה
  chosen: a thousand cubits
  alternatives:
  - 1,000 cubits
  lexicon: HALOT
  rationale: Retains the ancient unit rather than converting it, preserving textual
    specificity and avoiding interpretive precision.
- source_word: בַּחוֹמָה
  chosen: of the wall
  alternatives:
  - in the wall
  - along the wall
  lexicon: HALOT
  rationale: Given the repair context and the extent phrase 'as far as,' the sense
    is the stretch of wall they repaired. English idiom prefers 'of the wall' here.
- source_word: שַׁעַר הָאַשְׁפֹּת/הַשֲׁפוֹת
  chosen: the Dung Gate
  alternatives:
  - the Refuse Gate
  - the Ash-heap Gate
  lexicon: HALOT
  rationale: The traditional and most likely sense is a gate associated with refuse/dung
    disposal. 'Dung Gate' is the established, direct rendering and matches the probable
    meaning of the place-name.
