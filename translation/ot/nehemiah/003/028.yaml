id: NEH.3.28
reference: Nehemiah 3:28
source:
  edition: WLC
  text: מֵ/עַ֣ל שַׁ֣עַר הַ/סּוּסִ֗ים הֶחֱזִ֨יקוּ֙ הַ/כֹּ֣הֲנִ֔ים אִ֖ישׁ לְ/נֶ֥גֶד
    בֵּיתֽ/וֹ׀׃ס
translation:
  text: Above the Horse Gate, the priests made repairs, each one opposite his own
    house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the gate of the horses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵעַל
  chosen: Above
  alternatives:
  - From above
  - Beyond
  lexicon: HALOT
  rationale: The preposition indicates location relative to the previous section of
    wall work, naturally rendered 'above' in this building list context.
- source_word: שַׁעַר הַסּוּסִים
  chosen: the Horse Gate
  alternatives:
  - the gate of the horses
  lexicon: HALOT
  rationale: A construct chain with article on the second noun; 'Horse Gate' is idiomatic
    English and preserves the place-name sense.
- source_word: הֶחֱזִיקוּ
  chosen: made repairs
  alternatives:
  - repaired
  - strengthened
  lexicon: HALOT
  rationale: In Nehemiah 3 this verb regularly refers to undertaking repair work on
    the wall or gates. 'Made repairs' captures the construction context better than
    the more wooden 'strengthened.'
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Straightforward rendering of the noun with article.
- source_word: אִישׁ
  chosen: each one
  alternatives:
  - each man
  - man by man
  lexicon: HALOT
  rationale: Although grammatically singular masculine, here it has a distributive
    sense referring to individual members of the group. 'Each one' conveys the distributive
    force in natural English while avoiding an unnecessarily wooden repetition.
- source_word: לְנֶגֶד
  chosen: opposite
  alternatives:
  - in front of
  - facing
  lexicon: HALOT
  rationale: The preposition denotes position directly before or opposite something;
    'opposite' fits the description of repair sections aligned with residences.
- source_word: בֵּיתוֹ
  chosen: his own house
  alternatives:
  - his house
  - their house
  lexicon: HALOT
  rationale: 'The singular with 3ms suffix follows the distributive אִישׁ, so English
    singular is appropriate: each priest worked opposite his own house.'
