id: NEH.3.14
reference: Nehemiah 3:14
source:
  edition: WLC
  text: וְ/אֵ֣ת שַׁ֣עַר הָ/אַשְׁפּ֗וֹת הֶחֱזִיק֙ מַלְכִּיָּ֣ה בֶן רֵכָ֔ב שַׂ֖ר פֶּ֣לֶךְ
    בֵּית הַכָּ֑רֶם ה֣וּא יִבְנֶ֔/נּוּ וְ/יַעֲמִיד֙ דַּלְתֹתָ֔י/ו מַנְעֻלָ֖י/ו וּ/בְרִיחָֽי/ו׀־־׃ס
translation:
  text: And Malchijah son of Rechab, ruler of the district of Beth-haccherem, repaired
    the Dung Gate. He rebuilt it and set up its doors, its bolts, and its bars.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Refuse Gate.' The Hebrew name refers to dung or refuse.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶחֱזִיק
  chosen: repaired
  alternatives:
  - strengthened
  - made repairs to
  lexicon: HALOT
  rationale: In Nehemiah 3 this verb is a technical term in the wall-building list
    for taking responsibility for repair work on a section. 'Repaired' is idiomatic
    modern English and fits the construction context better than the more literal
    'strengthened.'
- source_word: שַׁעַר הָאַשְׁפּוֹת
  chosen: the Dung Gate
  alternatives:
  - the Refuse Gate
  - the Garbage Gate
  lexicon: HALOT
  rationale: אַשְׁפּוֹת refers to refuse/dung. 'Dung Gate' is the established and
    sufficiently clear rendering for the Jerusalem gate name; it preserves the concrete
    sense without unnecessary paraphrase.
- source_word: שַׂר פֶּלֶךְ
  chosen: ruler of the district
  alternatives:
  - official of the district
  - chief of the district
  lexicon: HALOT
  rationale: שַׂר is a leader/official, and פֶּלֶךְ denotes an administrative district.
    'Ruler of the district' is natural English and reflects the governmental role.
- source_word: בֵּית הַכָּרֶם
  chosen: Beth-haccherem
  alternatives:
  - Beth-hakkerem
  - house of the vineyard
  lexicon: HALOT
  rationale: Per translation philosophy, place names are transliterated rather than
    translated. The form 'Beth-haccherem' is a standard English transliteration of
    the Hebrew place name.
- source_word: הוּא יִבְנֶנּוּ
  chosen: He rebuilt it
  alternatives:
  - he built it
  - he constructed it
  lexicon: HALOT
  rationale: Though בנה is simply 'build,' in this repair list the context is restoration
    of existing gates and walls, so 'rebuilt it' best conveys the sense in English.
    The pronoun הוּא adds emphasis, naturally represented by an explicit 'He' at the
    start of the sentence.
- source_word: וְיַעֲמִיד
  chosen: set up
  alternatives:
  - installed
  - erected
  lexicon: HALOT
  rationale: The hiphil of עמד here means to set in place or install the gate components.
    'Set up' is clear, natural, and broad enough to cover the action.
- source_word: דַּלְתֹתָיו
  chosen: its doors
  alternatives:
  - its door leaves
  - its gates
  lexicon: HALOT
  rationale: The plural refers to the gate's doors/panels. 'Its doors' is the most
    straightforward rendering in modern English.
- source_word: מַנְעֻלָיו
  chosen: its bolts
  alternatives:
  - its locks
  - its fastenings
  lexicon: HALOT
  rationale: The term denotes locking or fastening hardware. In the recurring Nehemiah
    gate formula, 'bolts' is the most idiomatic pairing with 'bars' and best fits
    gate construction.
- source_word: וּבְרִיחָיו
  chosen: its bars
  alternatives:
  - its crossbars
  - its beams
  lexicon: HALOT
  rationale: בְּרִיחַ commonly denotes a bar used to secure a door or gate. 'Bars'
    is concise and conventional in this context.
