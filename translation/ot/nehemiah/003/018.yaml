id: NEH.3.18
reference: Nehemiah 3:18
source:
  edition: WLC
  text: אַחֲרָי/ו֙ הֶחֱזִ֣יקוּ אֲחֵי/הֶ֔ם בַּוַּ֖י בֶּן חֵנָדָ֑ד שַׂ֕ר חֲצִ֖י פֶּ֥לֶךְ
    קְעִילָֽה־׃ס
translation:
  text: 'After him their brothers repaired: Bavvai son of Henadad, ruler of half the
    district of Keilah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some textual traditions read the name as 'Binnui' instead of 'Bavvai.'
    reason: textual_variant
lexical_decisions:
- source_word: אַחֲרָיו
  chosen: After him
  alternatives:
  - After him/it
  - Next to him
  lexicon: HALOT
  rationale: Spatial/sequential marker in the repair list. 'After him' is the most
    natural English rendering here, indicating the next section in sequence. 'Next
    to him' is possible in context but less directly reflects the preposition plus
    pronominal suffix.
- source_word: הֶחֱזִיקוּ
  chosen: repaired
  alternatives:
  - strengthened
  - made repairs
  lexicon: HALOT
  rationale: In Nehemiah 3 this verb is used idiomatically for participating in wall
    restoration. Although the root literally means 'to make strong/strengthen,' 'repaired'
    best conveys the construction context in clear English.
- source_word: אֲחֵיהֶם
  chosen: their brothers
  alternatives:
  - their kin
  - their fellow Judeans
  lexicon: HALOT
  rationale: The Hebrew literally says 'their brothers.' In this administrative/workforce
    context it likely refers to associated countrymen or colleagues rather than biological
    siblings, but the translation preserves the source wording per the gender-accurate
    principle.
- source_word: בַּוַּי
  chosen: Bavvai
  alternatives:
  - Binnui
  lexicon: HALOT
  rationale: The WLC consonantal-vocalized form here is Bavvai, so the main text follows
    the provided source text and transliterates the personal name. A variant tradition
    reads Binnui in some witnesses and translations; that is preserved in a footnote
    as a textual variant.
- source_word: בֶּן חֵנָדָד
  chosen: son of Henadad
  lexicon: HALOT
  rationale: Standard patronymic construction; 'son of' is the natural and transparent
    rendering.
- source_word: שַׂר
  chosen: ruler
  alternatives:
  - official
  - chief
  - commander
  lexicon: HALOT
  rationale: In this civic-administrative context, 'ruler' best fits an official over
    a district. 'Commander' would sound overly military here.
- source_word: חֲצִי פֶּלֶךְ
  chosen: half the district
  alternatives:
  - half the province
  - half the region
  lexicon: HALOT
  rationale: The phrase denotes an administrative subdivision. 'District' is a clear
    modern equivalent; 'province' may suggest a larger unit than intended.
- source_word: קְעִילָה
  chosen: Keilah
  lexicon: HALOT
  rationale: Place name transliterated according to the translation philosophy of
    transliterating names.
