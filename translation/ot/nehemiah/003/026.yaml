id: NEH.3.26
reference: Nehemiah 3:26
source:
  edition: WLC
  text: וְ/הַ֨/נְּתִינִ֔ים הָי֥וּ יֹשְׁבִ֖ים בָּ/עֹ֑פֶל עַ֠ד נֶ֜גֶד שַׁ֤עַר הַ/מַּ֨יִם֙
    לַ/מִּזְרָ֔ח וְ/הַ/מִּגְדָּ֖ל הַ/יּוֹצֵֽא׃ס
translation:
  text: Now the temple servants were living on the Ophel, as far as opposite the Water
    Gate to the east, and the projecting tower.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew נְתִינִים (Nethinim), a recognized class of temple servants.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנְּתִינִים
  chosen: the temple servants
  alternatives:
  - the Nethinim
  - the given ones
  lexicon: HALOT
  rationale: נְתִינִים refers to the class of temple personnel traditionally known
    as the Nethinim, likely subordinate servants assigned to temple duties. Translating
    the role rather than transliterating improves clarity in modern English while
    preserving the cultic sense with 'temple servants.'
- source_word: הָיוּ יֹשְׁבִים
  chosen: were living
  alternatives:
  - dwelt
  - were dwelling
  - were residing
  lexicon: HALOT
  rationale: The periphrastic construction with היה + participle expresses ongoing
    state or customary residence. 'Were living' is natural modern English and captures
    durative residence better than the more archaic 'dwelt.'
- source_word: בָּעֹפֶל
  chosen: on the Ophel
  alternatives:
  - in Ophel
  - on the hill of Ophel
  lexicon: HALOT
  rationale: עֹפֶל here is a place name/designation for the raised fortified area
    in Jerusalem. Retaining 'Ophel' as a transliterated toponym follows the principle
    of transliterating names. 'On' fits the elevated topographical sense.
- source_word: עַד נֶגֶד
  chosen: as far as opposite
  alternatives:
  - up to opposite
  - as far as in front of
  - up to the area opposite
  lexicon: HALOT
  rationale: The combination marks extent up to a point facing or opposite a landmark.
    'As far as opposite' is slightly formal but preserves both the boundary sense
    of עַד and the spatial relation of נֶגֶד without over-interpreting.
- source_word: שַׁעַר הַמַּיִם
  chosen: the Water Gate
  alternatives:
  - the gate of the waters
  lexicon: HALOT
  rationale: A straightforward construct chain naming a city gate. 'Water Gate' is
    idiomatic English and standard for such gate names.
- source_word: לַמִּזְרָח
  chosen: to the east
  alternatives:
  - eastward
  - on the east
  lexicon: HALOT
  rationale: This indicates direction/location relative to the Water Gate. 'To the
    east' is clear modern English.
- source_word: הַמִּגְדָּל הַיּוֹצֵא
  chosen: the projecting tower
  alternatives:
  - the protruding tower
  - the tower that juts out
  - the outgoing tower
  lexicon: HALOT
  rationale: יֹצֵא literally means 'going out' and in this architectural context describes
    a tower extending outward. 'Projecting tower' is concise and idiomatic while preserving
    the physical image.
