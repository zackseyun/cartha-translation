id: NEH.3.25
reference: Nehemiah 3:25
source:
  edition: WLC
  text: פָּלָ֣ל בֶּן אוּזַי֮ מִ/נֶּ֣גֶד הַ/מִּקְצוֹעַ֒ וְ/הַ/מִּגְדָּ֗ל הַ/יּוֹצֵא֙
    מִ/בֵּ֤ית הַ/מֶּ֨לֶךְ֙ הָֽ/עֶלְי֔וֹן אֲשֶׁ֖ר לַ/חֲצַ֣ר הַ/מַּטָּרָ֑ה אַחֲרָ֖י/ו
    פְּדָיָ֥ה בֶן פַּרְעֹֽשׁ־־׃ס
translation:
  text: Palal son of Uzai repaired opposite the angle and the tower projecting from
    the upper house of the king, which is by the court of the guard. After him Pedaiah
    son of Parosh repaired.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the corner.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from the upper palace.' The Hebrew is literally 'from the upper house
      of the king.'
    reason: lexical_alternative
  - marker: c
    text: Or 'court of the prison.' The term likely refers to a guarded detention
      court.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנֶּגֶד
  chosen: opposite
  alternatives:
  - in front of
  - facing
  lexicon: HALOT
  rationale: In Nehemiah 3 this preposition commonly marks a section repaired across
    from or facing a landmark. 'Opposite' is natural English and preserves the spatial
    sense without overinterpreting exact distance.
- source_word: הַמִּקְצוֹעַ
  chosen: the angle
  alternatives:
  - the corner
  - the turning
  lexicon: HALOT
  rationale: The noun denotes an angle or corner in a wall or structure. 'Angle' fits
    the likely architectural reference and avoids implying a freestanding corner tower.
    'Corner' is possible and preserved as an alternative.
- source_word: הַמִּגְדָּל הַיּוֹצֵא
  chosen: the tower projecting
  alternatives:
  - the projecting tower
  - the tower that juts out
  lexicon: HALOT
  rationale: The participle from יצא here describes a tower extending outward from
    the wall or palace complex. 'Projecting' is concise and architectural in tone.
- source_word: מִבֵּית הַמֶּלֶךְ הָעֶלְיוֹן
  chosen: from the upper house of the king
  alternatives:
  - from the upper king's house
  - from the upper palace
  lexicon: HALOT
  rationale: בית can mean 'house' broadly, including a royal building or palace sector.
    Retaining 'house of the king' stays closer to the Hebrew, while 'upper' likely
    distinguishes this royal structure from another lower section. 'Palace' is interpretive,
    so kept as an alternative rather than main text.
- source_word: אֲשֶׁר לַחֲצַר הַמַּטָּרָה
  chosen: which is by the court of the guard
  alternatives:
  - which is at the court of the guard
  - which is by the court of the prison
  lexicon: HALOT
  rationale: The relative clause most naturally modifies the preceding royal structure/tower
    location. מטרה in this context refers to a guarded court, often associated with
    detention. 'Court of the guard' is the standard contextual sense and avoids importing
    a stronger penal nuance than necessary.
- source_word: אַחֲרָיו
  chosen: After him
  alternatives:
  - next to him
  - afterward
  lexicon: HALOT
  rationale: In the repair list this formula introduces the next worker or section
    in sequence. 'After him' is the conventional and contextually precise rendering.
- source_word: פָּלָל
  chosen: Palal
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: אוּזַי
  chosen: Uzai
  rationale: Personal name transliterated.
- source_word: פְּדָיָה
  chosen: Pedaiah
  rationale: Personal name transliterated.
- source_word: פַּרְעֹשׁ
  chosen: Parosh
  rationale: Personal name transliterated.
- source_word: '[ellipsis of verb with פְּדָיָה בֶן פַּרְעֹשׁ]'
  chosen: repaired
  alternatives:
  - worked
  - made repairs
  lexicon: contextual syntax
  rationale: The second clause lacks an explicit verb in Hebrew, but throughout Nehemiah
    3 the repair verb is frequently understood from context. Supplying 'repaired'
    in English is necessary for a complete sentence and matches the chapter's repeated
    pattern.
