id: NEH.3.34
reference: Nehemiah 3:34
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר לִ/פְנֵ֣י אֶחָ֗י/ו וְ/חֵיל֙ שֹֽׁמְר֔וֹן וַ/יֹּ֕אמֶר מָ֛ה הַ/יְּהוּדִ֥ים
    הָ/אֲמֵלָלִ֖ים עֹשִׂ֑ים הֲ/יַעַזְב֨וּ לָ/הֶ֤ם הֲ/יִזְבָּ֨חוּ֙ הַ/יְכַלּ֣וּ בַ/יּ֔וֹם
    הַ/יְחַיּ֧וּ אֶת הָ/אֲבָנִ֛ים מֵ/עֲרֵמ֥וֹת הֶ/עָפָ֖ר וְ/הֵ֥מָּה שְׂרוּפֽוֹת׀־׃
translation:
  text: And he said before his brothers and the army of Samaria, and said, “What are
    these feeble Jews doing? Will they restore it for themselves? Will they sacrifice?
    Will they finish in a day? Will they revive the stones from the heaps of dust,
    though they are burned?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Will they restore it for themselves?' The underlying phrase is difficult;
      alternatives include 'Will they rebuild it by themselves?' or, more literally,
      'Will they leave it to themselves?'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְנֵי אֶחָיו
  chosen: before his brothers
  alternatives:
  - in the presence of his brothers
  - before his companions
  lexicon: HALOT
  rationale: לִפְנֵי marks speaking in someone's presence. אֶחָיו is literally 'his
    brothers'; in this taunting political/military setting it likely refers to associates
    or fellow officials, but the literal 'brothers' is retained as natural English
    and auditable to the Hebrew.
- source_word: וְחֵיל שֹׁמְרוֹן
  chosen: and the army of Samaria
  alternatives:
  - and the force of Samaria
  - and the host of Samaria
  lexicon: HALOT
  rationale: חֵיל commonly denotes military force, army, or troops. 'Army' best fits
    the public, martial setting and is idiomatic modern English.
- source_word: הָאֲמֵלָלִים
  chosen: feeble
  alternatives:
  - wretched
  - miserable
  - weak
  lexicon: HALOT
  rationale: The adjective is derogatory, expressing weakness and pitiable condition.
    'Feeble' preserves the insult and fits the rhetorical mockery better than the
    more emotional 'miserable'.
- source_word: הֲיַעַזְבוּ לָהֶם
  chosen: Will they restore it for themselves?
  alternatives:
  - Will they leave it to themselves?
  - Will they be left alone?
  - Will they rebuild it by themselves?
  lexicon: HALOT
  rationale: עזב normally means 'leave, forsake,' but in this difficult idiom the
    sense is disputed. In context of mocking the rebuilding effort, the line most
    plausibly asks whether the Jews will 'restore/rebuild' the wall on their own behalf
    or by themselves. This follows the contextual sense reflected in many translations
    while acknowledging lexical difficulty.
- source_word: הֲיִזְבָּחוּ
  chosen: Will they sacrifice?
  alternatives:
  - Will they offer sacrifices?
  lexicon: HALOT
  rationale: The verb זבח refers to sacrificial offering. The concise 'sacrifice'
    is natural in English and preserves the taunt's rapid-fire rhetorical style.
- source_word: הַיְכַלּוּ בַיּוֹם
  chosen: Will they finish in a day?
  alternatives:
  - Will they complete it in a day?
  - Can they finish in a day?
  lexicon: HALOT
  rationale: כלה in the piel means complete/finish. The interrogative sequence is
    preserved with a direct future-style English question.
- source_word: הַיְחַיּוּ אֶת הָאֲבָנִים
  chosen: Will they revive the stones
  alternatives:
  - Will they bring the stones to life
  - Will they restore the stones
  lexicon: HALOT
  rationale: חיה literally means 'make live, revive.' Because the mockery personifies
    the ruined building materials, 'revive the stones' preserves the vivid metaphor
    better than flattening it to 'restore'.
- source_word: מֵעֲרֵמוֹת הֶעָפָר
  chosen: from the heaps of dust
  alternatives:
  - from heaps of rubble
  - from piles of dust
  lexicon: HALOT
  rationale: עֲרֵמוֹת are heaps/piles; עָפָר is dust/loose earth. 'Heaps of dust'
    is formally close, while the context of ruined masonry lets the image remain vivid
    without over-interpreting as 'rubble'.
- source_word: וְהֵמָּה שְׂרוּפוֹת
  chosen: though they are burned
  alternatives:
  - when they are burned
  - and they are burned
  lexicon: HALOT
  rationale: 'The clause comments on the condition of the stones. English ''though
    they are burned'' brings out the adversative force implied in the taunt: the stones
    are not only buried but fire-damaged.'
