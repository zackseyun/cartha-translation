id: NEH.3.35
reference: Nehemiah 3:35
source:
  edition: WLC
  text: וְ/טוֹבִיָּ֥ה הָ/עַמֹּנִ֖י אֶצְל֑/וֹ וַ/יֹּ֗אמֶר גַּ֚ם אֲשֶׁר הֵ֣ם בּוֹנִ֔ים
    אִם יַעֲלֶ֣ה שׁוּעָ֔ל וּ/פָרַ֖ץ חוֹמַ֥ת אַבְנֵי/הֶֽם־־׃פ
translation:
  text: And Tobiah the Ammonite was beside him, and he said, “Even what they are building—if
    a fox climbs up on it, he will break through their stone wall!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “he will break down their wall of stones.” The Hebrew verb can suggest
      breaching or breaking down, and the phrase is part of Tobiah’s mockery of the
      wall’s weakness.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew word for “fox” can in some contexts refer more broadly to a fox-like
      canid, though “fox” is the standard rendering here.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶצְלוֹ
  chosen: was beside him
  alternatives:
  - was next to him
  - was at his side
  lexicon: HALOT
  rationale: The preposition אצל with pronominal suffix indicates proximity. 'Was
    beside him' is natural English and preserves the sense that Tobiah was standing
    with Sanballat.
- source_word: גַּם אֲשֶׁר הֵם בּוֹנִים
  chosen: Even what they are building
  alternatives:
  - Also, what they are building
  - What they are building as well
  lexicon: HALOT
  rationale: 'גַּם adds an emphatic or additive force. Here it heightens the mockery:
    ''Even what they are building...'' is idiomatic and captures the derisive tone.'
- source_word: אִם
  chosen: if
  alternatives:
  - even if
  lexicon: HALOT
  rationale: The particle introduces a conditional clause. In context it is part of
    a taunt; simple 'if' is sufficient, while the mocking force is conveyed by the
    whole sentence.
- source_word: יַעֲלֶה שׁוּעָל
  chosen: a fox climbs up on it
  alternatives:
  - a fox goes up on it
  - a jackal climbs up on it
  lexicon: HALOT
  rationale: שׁוּעָל commonly denotes 'fox,' though some contexts may overlap with
    jackal. 'Fox' is the standard and best-known rendering here. 'Climbs up on it'
    makes explicit the implied object in English.
- source_word: וּפָרַץ
  chosen: he will break through
  alternatives:
  - it will break down
  - he will breach
  lexicon: HALOT
  rationale: The verb פרץ means to break through, breach, or burst down. The singular
    verb naturally takes the preceding singular subject 'fox' in the taunt. 'Break
    through' preserves the vividness of the insult, though the sense is effectively
    that the wall would be easily broken.
- source_word: חוֹמַת אַבְנֵיהֶם
  chosen: their stone wall
  alternatives:
  - their wall of stones
  - their stonework wall
  lexicon: HALOT
  rationale: The construct phrase literally means 'wall of their stones.' 'Their stone
    wall' is idiomatic English and preserves the material reference without awkwardness.
