id: NEH.3.2
reference: Nehemiah 3:2
source:
  edition: WLC
  text: וְ/עַל יָד֥/וֹ בָנ֖וּ אַנְשֵׁ֣י יְרֵח֑וֹ וְ/עַל יָד֣/וֹ בָנָ֔ה זַכּ֖וּר בֶּן
    אִמְרִֽי־ס־־׃ס
translation:
  text: And next to him the men of Jericho built, and next to them Zaccur the son
    of Imri built.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''next to him'' also in the second clause; the English ''next to
      them'' makes explicit the relation to the preceding group, the men of Jericho.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל יָדוֹ
  chosen: and next to him
  alternatives:
  - and at his hand
  - and beside him
  lexicon: HALOT
  rationale: The idiom עַל יָד with pronominal suffix in this chapter marks adjacency
    in the wall-building sequence. 'Next to him' is natural modern English and preserves
    the spatial sense better than a more literal but opaque 'at his hand.'
- source_word: בָּנוּ
  chosen: built
  alternatives:
  - rebuilt
  lexicon: HALOT
  rationale: The verb בנה means 'build.' Although the broader context is repair of
    Jerusalem's wall, this verse itself uses the ordinary verb without an explicit
    restorative prefix or object, so 'built' is the most textually restrained rendering.
- source_word: אַנְשֵׁי יְרֵחוֹ
  chosen: the men of Jericho
  alternatives:
  - the people of Jericho
  - the men from Jericho
  lexicon: HALOT
  rationale: אַנְשֵׁי is literally 'men of.' In this register it denotes the group
    identified with Jericho. 'The men of Jericho' is gender-accurate to the Hebrew
    form and idiomatic in English.
- source_word: וְעַל יָדוֹ
  chosen: and next to them
  alternatives:
  - and next to him
  - and beside them
  lexicon: HALOT
  rationale: Although the Hebrew suffix is singular ('next to him'), English discourse
    is clearer if the second adjacency is rendered relative to the immediately preceding
    plural group, 'the men of Jericho.' This reflects the sequential sense of the
    list without changing the underlying spatial relation.
- source_word: בָּנָה
  chosen: built
  alternatives:
  - rebuilt
  lexicon: HALOT
  rationale: 'Same lexical choice as earlier in the verse: the simple qal perfect
    of בנה is best rendered ''built.'''
- source_word: זַכּוּר בֶּן אִמְרִי
  chosen: Zaccur the son of Imri
  alternatives:
  - Zakkur son of Imri
  rationale: Personal names are transliterated per project philosophy. 'The son of'
    preserves the Hebrew patronymic construction in readable English.
