id: NEH.3.4
reference: Nehemiah 3:4
source:
  edition: WLC
  text: וְ/עַל יָדָ֣/ם הֶחֱזִ֗יק מְרֵמ֤וֹת בֶּן אוּרִיָּה֙ בֶּן הַקּ֔וֹץ וְ/עַל יָדָ֣/ם
    הֶחֱזִ֔יק מְשֻׁלָּ֥ם בֶּן בֶּרֶכְיָ֖ה בֶּן מְשֵׁיזַבְאֵ֑ל וְ/עַל יָדָ֣/ם הֶֽחֱזִ֔יק
    צָד֖וֹק בֶּֽן בַּעֲנָֽא־־־ס־־־ס־־׃ס
translation:
  text: And next to them Meremoth son of Uriah, son of Hakkoz, made repairs; and next
    to them Meshullam son of Berechiah, son of Meshezabel, made repairs; and next
    to them Zadok son of Baana made repairs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'repaired' or more literally 'strengthened.' The Hebrew verb in this
      chapter is a stock term for carrying out repair work on a section of the wall.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'and next to their hand,' an idiom meaning 'next to them' or 'beside
      them.'
    reason: lexical_alternative
  - marker: c
    text: Baana may also be spelled 'Baanah' in English transliteration.
    reason: alternative_reading
lexical_decisions:
- source_word: וְעַל יָדָם
  chosen: and next to them
  alternatives:
  - and at their hand
  - and beside them
  lexicon: HALOT
  rationale: In Nehemiah 3 this idiom marks adjacency in the rebuilding sequence,
    not literal hand/side anatomy. 'Next to them' is natural English and preserves
    the spatial sense.
- source_word: הֶחֱזִיק
  chosen: made repairs
  alternatives:
  - repaired
  - strengthened
  lexicon: HALOT
  rationale: The verb literally has the sense of strengthening/repairing in this construction,
    but throughout Nehemiah 3 it refers to participating in rebuilding a section of
    wall or gate. 'Made repairs' captures the iterative work formula and reads smoothly
    in English.
- source_word: מְרֵמוֹת
  chosen: Meremoth
  rationale: 'Personal name transliterated according to the translation philosophy:
    names are transliterated rather than translated.'
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: The immediate genealogical notices in this list are most naturally rendered
    'son of.' While Hebrew can sometimes mean descendant, there is no contextual pressure
    here to broaden it.
- source_word: אוּרִיָּה
  chosen: Uriah
  rationale: Personal name transliterated by standard English convention.
- source_word: הַקּוֹץ
  chosen: Hakkoz
  alternatives:
  - Koz
  rationale: Proper name with article incorporated in conventional transliteration.
    'Hakkoz' reflects the Hebrew form as written.
- source_word: מְשֻׁלָּם
  chosen: Meshullam
  rationale: Personal name transliterated by standard English convention.
- source_word: בֶּרֶכְיָה
  chosen: Berechiah
  rationale: Personal name transliterated by standard English convention.
- source_word: מְשֵׁיזַבְאֵל
  chosen: Meshezabel
  alternatives:
  - Meshezabeel
  rationale: Personal name transliterated; spelling chosen follows a common English
    convention while staying close to the Hebrew consonants and vowels.
- source_word: צָדוֹק
  chosen: Zadok
  rationale: Personal name transliterated by standard English convention.
- source_word: בַּעֲנָא
  chosen: Baana
  alternatives:
  - Baanah
  rationale: Personal name transliterated. 'Baana' stays close to the given Hebrew
    form; 'Baanah' is a familiar alternative reflected in some English traditions.
