id: NEH.10.14
reference: Nehemiah 10:14
source:
  edition: WLC
  text: הוֹדִיָּ֥ה בָנִ֖י בְּנִֽינוּ׃ס
translation:
  text: Hodiah, Bani, Beninu.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'Binnui,' following a more traditional harmonizing rendering
      found for similar names elsewhere.
    reason: alternative_reading
lexical_decisions:
- source_word: הוֹדִיָּה
  chosen: Hodiah
  alternatives:
  - Hodijah
  rationale: Proper personal name in a list of covenant signatories/clan leaders.
    Per translation philosophy, personal names are transliterated rather than translated.
    'Hodiah' reflects a standard English transliteration of the Hebrew form.
- source_word: בָנִי
  chosen: Bani
  rationale: Proper personal name. Transliterated directly into standard English form
    'Bani'.
- source_word: בְּנִינוּ
  chosen: Beninu
  alternatives:
  - Binnui
  rationale: Proper personal name. The consonantal/vocalized form here supports a
    transliteration like 'Beninu.' An alternative traditional rendering 'Binnui' may
    reflect comparison with similar names elsewhere, but this verse's form is best
    represented transparently as 'Beninu'.
