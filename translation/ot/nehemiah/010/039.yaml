id: NEH.10.39
reference: Nehemiah 10:39
source:
  edition: WLC
  text: וְ/הָיָ֨ה הַ/כֹּהֵ֧ן בֶּֽן אַהֲרֹ֛ן עִם הַ/לְוִיִּ֖ם בַּ/עְשֵׂ֣ר הַ/לְוִיִּ֑ם
    וְ/הַ/לְוִיִּ֞ם יַעֲל֨וּ אֶת מַעֲשַׂ֤ר הַֽ/מַּעֲשֵׂר֙ לְ/בֵ֣ית אֱלֹהֵ֔י/נוּ אֶל
    הַ/לְּשָׁכ֖וֹת לְ/בֵ֥ית הָ/אוֹצָֽר־־־־׃
translation:
  text: And the priest, a son of Aaron, shall be with the Levites when the Levites
    collect the tithe, and the Levites shall bring up the tithe of the tithe to the
    house of our God, to the chambers of the storehouse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a tenth of the tithe.' The Hebrew expression is literally 'the tithe
      of the tithe,' referring to the portion the Levites themselves give from the
      tithe they receive.
    reason: lexical_alternative
  - marker: b
    text: Or 'treasury.' Here the sense is likely a storage area for tithes and offerings
      rather than a money treasury specifically.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: shall be
  alternatives:
  - must be
  - is to be
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this covenantal/legal context
    functions prospectively, expressing what is to be the case rather than simple
    past narrative; 'shall be' fits the stipulatory tone.
- source_word: הַכֹּהֵן בֶּן־אַהֲרֹן
  chosen: the priest, a son of Aaron
  alternatives:
  - the priest, son of Aaron
  - an Aaronic priest
  lexicon: HALOT
  rationale: The phrase identifies the priest as belonging to the Aaronic line. 'A
    son of Aaron' is more transparent to the Hebrew wording than the more interpretive
    'Aaronic priest.'
- source_word: עִם
  chosen: with
  alternatives:
  - alongside
  lexicon: HALOT
  rationale: 'Simple accompaniment is in view: the priest is present with the Levites
    during the tithing process.'
- source_word: בַּעְשֵׂר
  chosen: when ... collect
  alternatives:
  - in the tithing of
  - while ... take the tenth
  lexicon: HALOT
  rationale: 'The infinitive construct of עשר here denotes the act of taking/collecting
    tithes. English idiom is clearer with a temporal clause: ''when the Levites collect
    the tithe.'''
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of the tribal/ministerial group; repeated consistently
    in both clauses.
- source_word: יַעֲלוּ
  chosen: shall bring up
  alternatives:
  - shall bring
  - shall carry up
  lexicon: HALOT
  rationale: עלה in Hiphil commonly means 'bring up.' Because the destination is the
    temple store chambers, the upward nuance may reflect movement to the sanctuary;
    retaining 'bring up' preserves that nuance better than simply 'bring.'
- source_word: מַעֲשַׂר הַמַּעֲשֵׂר
  chosen: the tithe of the tithe
  alternatives:
  - a tenth of the tithe
  - the tithe from the tithe
  lexicon: HALOT
  rationale: The Hebrew construction is literal and technical, referring to the portion
    the Levites themselves give from what they receive. 'The tithe of the tithe' preserves
    the formal wording while remaining understandable.
- source_word: לְבֵית אֱלֹהֵינוּ
  chosen: to the house of our God
  alternatives:
  - to our God's house
  - to the temple of our God
  lexicon: HALOT
  rationale: '''House of our God'' is the standard literal rendering for the temple
    and preserves the covenantal phrasing of the Hebrew.'
- source_word: הַלְּשָׁכוֹת
  chosen: the chambers
  alternatives:
  - the rooms
  - the side chambers
  lexicon: HALOT
  rationale: Refers to temple storage rooms/chambers. 'Chambers' is a conventional
    and sufficiently clear rendering in this cultic context.
- source_word: לְבֵית הָאוֹצָר
  chosen: of the storehouse
  alternatives:
  - for the storehouse
  - of the treasury house
  lexicon: HALOT
  rationale: The phrase appositionally/specifically identifies the chambers as belonging
    to the storage facility. 'Storehouse' is clearer and less misleading than 'treasury,'
    since produce and tithes are in view.
