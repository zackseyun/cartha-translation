theological_decisions:
- issue: Cultic terminology for temple storage areas
  chosen_reading: storehouse
  alternative_readings:
  - treasury
  rationale: The context concerns agricultural tithes and priestly/Levitical administration,
    not primarily money. Rendering אוֹצָר as 'storehouse' better reflects the material
    being stored without importing later financial connotations.
