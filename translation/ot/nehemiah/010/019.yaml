  text: הוֹדִיָּ֥ה חָשֻׁ֖ם בֵּצָֽי׃
translation:
  text: Hodiah, Hashum, Bezai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Hodijah.' The Hebrew spelling can be represented in English either way.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹדִיָּה
  chosen: Hodiah
  alternatives:
  - Hodijah
  rationale: Proper personal name (HNp). Following the translation philosophy, personal
    names are transliterated rather than translated. 'Hodiah' reflects a standard
    English transliteration of the Hebrew form; 'Hodijah' is a possible alternative
    reflecting the final יה element more explicitly.
- source_word: חָשֻׁם
  chosen: Hashum
  rationale: Proper personal name (HNp). Transliterated directly into standard English
    form.
- source_word: בֵּצָי
  chosen: Bezai
  alternatives:
  - Bezai/Bezay
  rationale: Proper personal name (HNp). Transliterated into conventional English
    spelling 'Bezai.' Because this is a name list, preserving recognizable name forms
    is preferable to over-precise phonetic rendering.
