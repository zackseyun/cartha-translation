id: NEH.10.16
reference: Nehemiah 10:16
source:
  edition: WLC
  text: בֻּנִּ֥י עַזְגָּ֖ד בֵּבָֽי׃
translation:
  text: Bunni, Azgad, Bebai.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בֻּנִּי
  chosen: Bunni
  alternatives:
  - Bunnii
  rationale: Proper personal name (HNp). Following the translation philosophy, personal
    names are transliterated rather than translated. 'Bunni' is the standard English
    transliteration from the Hebrew form.
- source_word: עַזְגָּד
  chosen: Azgad
  alternatives:
  - Azgad
  rationale: Proper personal name (HNp). Transliterated directly into standard English
    form. No translation of meaning is attempted because this is a personal name in
    a list.
- source_word: בֵּבָי
  chosen: Bebai
  alternatives:
  - Bebay
  rationale: Proper personal name (HNp). Transliterated according to conventional
    English biblical usage. As with the other names in this verse, the function is
    identificatory, not semantic.
