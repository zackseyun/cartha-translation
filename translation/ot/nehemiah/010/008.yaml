id: NEH.10.8
reference: Nehemiah 10:8
source:
  edition: WLC
  text: מְשֻׁלָּ֥ם אֲבִיָּ֖ה מִיָּמִֽן׃
translation:
  text: Meshullam, Abijah, Mijamin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew spellings may also be represented in English as 'Mesullam,' 'Abiah,'
      or 'Miamin/Miniamin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְשֻׁלָּם
  chosen: Meshullam
  alternatives:
  - Mesullam
  rationale: Proper personal name; per translation philosophy, personal names are
    transliterated rather than translated. 'Meshullam' is the standard English transliteration.
- source_word: אֲבִיָּה
  chosen: Abijah
  alternatives:
  - Abiah
  rationale: Proper personal name; transliterated by standard English convention.
    The final theophoric element is commonly represented in English as '-jah'.
- source_word: מִיָּמִן
  chosen: Mijamin
  alternatives:
  - Miamin
  - Miniamin
  rationale: Proper personal name in a list of signatories/priests; transliterated
    rather than translated. 'Mijamin' preserves the consonantal shape of the Hebrew
    name in a readable English form.
