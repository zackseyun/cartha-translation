id: NEH.10.11
reference: Nehemiah 10:11
source:
  edition: WLC
  text: וַ/אֲחֵי/הֶ֑ם שְׁבַנְיָ֧ה הֽוֹדִיָּ֛ה קְלִיטָ֖א פְּלָאיָ֥ה חָנָֽן׃
translation:
  text: 'and their brothers: Shebaniah, Hodiah, Kelita, Pelaiah, Hanan.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַ/אֲחֵי/הֶם
  chosen: and their brothers
  alternatives:
  - and their kinsmen
  - and their brethren
  lexicon: HALOT
  rationale: The conjunction ו plus אֲחֵי with 3mp suffix is most naturally rendered
    'and their brothers.' In this covenant-signatory list, the term denotes male familial/group
    associates rather than a generic mixed-gender collective, so the gender-accurate
    'brothers' fits the source and the project's philosophy better than the more interpretive
    'kinsmen.'
- source_word: שְׁבַנְיָה
  chosen: Shebaniah
  alternatives:
  - Shebaniah
  rationale: Proper name; transliterated rather than translated, following the project's
    policy for personal names. 'Shebaniah' is a standard English transliteration.
- source_word: הוֹדִיָּה
  chosen: Hodiah
  alternatives:
  - Hodiah
  rationale: Proper name; transliterated by standard convention. The form 'Hodiah'
    is familiar and readable in English biblical style.
- source_word: קְלִיטָא
  chosen: Kelita
  alternatives:
  - Kelitah
  rationale: Proper name; transliterated. 'Kelita' reflects the Hebrew form cleanly
    in English.
- source_word: פְּלָאיָה
  chosen: Pelaiah
  alternatives:
  - Pelaia
  rationale: Proper name; transliterated. 'Pelaiah' preserves the conventional English
    representation of the final theophoric/iah-like ending.
- source_word: חָנָן
  chosen: Hanan
  rationale: Proper name; transliterated directly. 'Hanan' is the standard English
    form.
