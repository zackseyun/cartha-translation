id: NEH.10.10
reference: Nehemiah 10:10
source:
  edition: WLC
  text: וְֽ/הַ/לְוִיִּ֑ם וְ/יֵשׁ֨וּעַ֙ בֶּן אֲזַנְיָ֔ה בִּנּ֕וּי מִ/בְּנֵ֥י חֵנָדָ֖ד
    קַדְמִיאֵֽל־׃
translation:
  text: 'and the Levites: Jeshua son of Azaniah, Binnui from the sons of Henadad,
    Kadmiel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of the sons of Henadad'; the phrase may identify Binnui as belonging
      to the Henadad clan.
    reason: lexical_alternative
  - marker: b
    text: Many English versions spell the final name 'Kadmiel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַלְוִיִּם
  chosen: and the Levites
  alternatives:
  - and the Levites were
  - also the Levites
  lexicon: HALOT
  rationale: The conjunction וְ is carried over as 'and,' linking this verse with
    the preceding list of signatories. הַלְוִיִּם is the definite plural noun 'the
    Levites,' introducing the Levitical names that follow. No finite verb is present,
    so none is supplied in the translation.
- source_word: וְיֵשׁוּעַ
  chosen: Jeshua
  alternatives:
  - and Jeshua
  lexicon: HALOT
  rationale: Personal name transliterated per project policy. The prefixed conjunction
    is not repeated separately in English because the initial 'and the Levites:' already
    governs the ensuing list naturally.
- source_word: בֶּן אֲזַנְיָה
  chosen: son of Azaniah
  alternatives:
  - the son of Azaniah
  lexicon: HALOT
  rationale: Standard genealogical construction rendered formally as 'son of Azaniah.'
    The article is unnecessary in English list style.
- source_word: בִּנּוּי
  chosen: Binnui
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
- source_word: מִבְּנֵי חֵנָדָד
  chosen: from the sons of Henadad
  alternatives:
  - of the sons of Henadad
  - from the descendants of Henadad
  lexicon: HALOT
  rationale: The preposition מִן is preserved as 'from,' and בְּנֵי is rendered literally
    as 'sons of' in a genealogical/clan sense. 'Descendants of' is possible, but 'sons
    of' better reflects the Hebrew form while remaining understandable.
- source_word: קַדְמִיאֵל
  chosen: Kadmiel
  alternatives:
  - Kadmiel
  lexicon: HALOT
  rationale: Personal name transliterated. The spelling 'Kadmiel' more directly reflects
    the Hebrew qamets/qoph-based form than the more familiar Anglicized 'Kadmiel,'
    though either is recognizable.
