id: NEH.10.2
reference: Nehemiah 10:2
source:
  edition: WLC
  text: וְ/עַ֖ל הַ/חֲתוּמִ֑ים נְחֶמְיָ֧ה הַ/תִּרְשָׁ֛תָא בֶּן חֲכַלְיָ֖ה וְ/צִדְקִיָּֽה־׃
translation:
  text: And on the sealed document were Nehemiah the governor, son of Hacaliah, and
    Zedekiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the sealed ones'; the Hebrew likely refers to those
      whose names were on the sealed covenant document.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the Tirshatha,' a Persian-period administrative title, traditionally
      transliterated rather than translated.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  chosen: And on
  alternatives:
  - Now on
  - Upon
  lexicon: HALOT
  rationale: The conjunction plus preposition introduces the list of signatories attached
    to the covenant document. 'And on' preserves the connective force and the spatial/associative
    sense of עַל in this administrative context.
- source_word: הַחֲתוּמִים
  chosen: the sealed document
  alternatives:
  - those who sealed
  - the sealed ones
  - the signatories
  lexicon: HALOT
  rationale: Although formally a passive participle plural ('the sealed ones' / 'those
    sealed'), in context introducing the names attached to the covenant, it refers
    metonymically to the sealed instrument or those represented on it. English reads
    most naturally with 'the sealed document were ...' to convey that the following
    names are those on the sealed covenant. 'Signatories' is possible but more interpretive;
    this rendering stays closer to the Hebrew administrative idiom while remaining
    readable.
- source_word: נְחֶמְיָה
  chosen: Nehemiah
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: הַתִּרְשָׁתָא
  chosen: the governor
  alternatives:
  - the Tirshatha
  lexicon: HALOT
  rationale: This is an official Persian-period administrative title. Per translation
    philosophy, titles are translated rather than transliterated when meaning can
    be conveyed. 'Governor' communicates the office clearly in modern English; the
    more traditional 'Tirshatha' is preserved in a footnote as an alternative.
- source_word: בֶּן
  chosen: son of
  lexicon: HALOT
  rationale: Standard genealogical marker; 'son of' is the natural and accurate English
    equivalent.
- source_word: חֲכַלְיָה
  chosen: Hacaliah
  alternatives:
  - Hakaliah
  rationale: Personal name transliterated into standard English biblical form. Spelling
    variation exists in English transliteration; 'Hacaliah' aligns with common convention.
- source_word: וְצִדְקִיָּה
  chosen: and Zedekiah
  rationale: The conjunction joins a second named signatory. The name is transliterated
    in standard English form.
