id: NEH.10.26
reference: Nehemiah 10:26
source:
  edition: WLC
  text: רְח֥וּם חֲשַׁבְנָ֖ה מַעֲשֵׂיָֽה׃
translation:
  text: Rehum, Hashabnah, Maaseiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew consists solely of three personal names in a larger list of signatories.
    reason: cultural_note
lexical_decisions:
- source_word: רְחוּם
  chosen: Rehum
  alternatives:
  - Rechum
  lexicon: HALOT
  rationale: Proper noun in a list of covenant signatories/names. Standard English
    transliteration favors 'Rehum.' An alternate transliteration 'Rechum' reflects
    a more explicit representation of the guttural consonant, but standard conventions
    usually simplify it.
- source_word: חֲשַׁבְנָה
  chosen: Hashabnah
  alternatives:
  - Hashabna
  lexicon: HALOT
  rationale: Proper noun. Rendered by transliteration rather than translation, following
    the project's policy for personal names. Final he is represented in the conventional
    English form 'Hashabnah.'
- source_word: מַעֲשֵׂיָה
  chosen: Maaseiah
  alternatives:
  - Maaseya
  - Maasejah
  lexicon: HALOT
  rationale: Proper noun. Transliterated in a conventional biblical-English form as
    'Maaseiah.' Although the name is theophoric in origin, personal names are transliterated
    rather than translated under project policy.
