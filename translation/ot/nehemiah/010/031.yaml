theological_decisions:
- issue: Rendering the marriage prohibition without importing ethnic or racial ideology
  chosen_reading: Retain the covenantal-social wording 'the peoples of the land' and
    the reciprocal marriage language without explanatory expansion.
  alternative_readings:
  - the pagan peoples of the land
  - the foreign peoples of the land
  - the inhabitants of the land
  rationale: The verse itself states a prohibition of intermarriage with surrounding
    peoples in the context of covenant fidelity. Adding 'pagan' or 'foreign' would
    interpret beyond the immediate wording, while singular 'inhabitants' would flatten
    the Hebrew plural. The chosen rendering preserves the text's own formulation and
    leaves broader theological interpretation to context.
  doctrine_reference: Translation philosophy §§1, 3, 4, 6
