id: NEH.10.31
reference: Nehemiah 10:31
source:
  edition: WLC
  text: וַ/אֲשֶׁ֛ר לֹא נִתֵּ֥ן בְּנֹתֵ֖י/נוּ לְ/עַמֵּ֣י הָ/אָ֑רֶץ וְ/אֶת בְּנֹ֣תֵי/הֶ֔ם
    לֹ֥א נִקַּ֖ח לְ/בָנֵֽי/נוּ־־׃
translation:
  text: and that we will not give our daughters to the peoples of the land, nor take
    their daughters for our sons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the people of the land.' The Hebrew is plural ('peoples'), though some
      English versions smooth it to the singular.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'take'; in this context, 'take' refers to taking in marriage.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲשֶׁר
  chosen: and that
  alternatives:
  - and
  - that
  - and that if
  lexicon: HALOT
  rationale: In this covenant-renewal context, וַאֲשֶׁר introduces another pledged
    stipulation dependent on the preceding oath formula. 'And that' best carries the
    connective plus subordinating force into natural English.
- source_word: נִתֵּן
  chosen: we will not give
  alternatives:
  - we do not give
  - let us not give
  lexicon: HALOT
  rationale: Although morphologically a yiqtol/imperfect form, in context it expresses
    the community's future commitment under oath. English future 'will not give' best
    reflects the promissory sense.
- source_word: בְּנֹתֵינוּ
  chosen: our daughters
  lexicon: HALOT
  rationale: Straightforward possessive plural; retained literally because the verse
    concerns marriage arrangements involving daughters.
- source_word: לְעַמֵּי הָאָרֶץ
  chosen: to the peoples of the land
  alternatives:
  - to the people of the land
  - to the peoples of the הארץ/land
  lexicon: HALOT
  rationale: The plural construct עַמֵּי is best represented by 'peoples,' not singular
    'people.' 'Of the land' preserves the Hebrew expression without over-interpreting
    it as specifically 'the local population' or 'foreign nations' in the main text.
- source_word: וְאֶת בְּנֹתֵיהֶם
  chosen: nor take their daughters
  alternatives:
  - and their daughters we will not take
  - nor will we take their daughters
  lexicon: HALOT
  rationale: English idiom prefers the negative parallel clause 'nor take their daughters,'
    preserving the reciprocal marriage prohibition.
- source_word: נִקַּח
  chosen: take
  alternatives:
  - marry
  - take in marriage
  lexicon: HALOT
  rationale: Hebrew לָקַח in marriage contexts often means 'take' a wife. 'Take' preserves
    the lexical form and the parallelism with 'give'; the marital sense is clear from
    context.
- source_word: לְבָנֵינוּ
  chosen: for our sons
  alternatives:
  - for our children
  - for our male children
  lexicon: HALOT
  rationale: The Hebrew specifically says 'our sons,' and the translation follows
    the gender-specific wording in keeping with the gender-accurate policy.
