id: NEH.10.22
reference: Nehemiah 10:22
source:
  edition: WLC
  text: מְשֵׁיזַבְאֵ֥ל צָד֖וֹק יַדּֽוּעַ׃
translation:
  text: Meshezabel, Zadok, Jaddua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew text consists only of three personal names in a list: Meshezabel,
      Zadok, Jaddua. English punctuation is supplied for readability.'
    reason: cultural_note
  - marker: b
    text: 'Jaddua: alternatively, ''Jaddua.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מְשֵׁיזַבְאֵל
  chosen: Meshezabel
  alternatives:
  - Meshizabel
  rationale: Proper personal name (HNp). Per translation philosophy, personal names
    are transliterated rather than translated. 'Meshezabel' follows a standard English
    transliteration convention for this Hebrew name; a slightly more letter-close
    form such as 'Meshizabel' is possible but less conventional in English Bible usage.
- source_word: צָדוֹק
  chosen: Zadok
  alternatives:
  - Sadok
  rationale: Proper personal name (HNp). Transliterated by standard convention. 'Zadok'
    is the established English form and best reflects the Hebrew name in readable
    modern English.
- source_word: יַדּוּעַ
  chosen: Jaddua
  alternatives:
  - Jaddua
  rationale: Proper personal name (HNp). Transliterated rather than translated. The
    doubled 'd' reflects the dagesh in the Hebrew spelling and is a defensible transliteration
    choice; 'Jaddua' is also seen in English tradition.
