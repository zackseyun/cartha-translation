id: NEH.10.7
reference: Nehemiah 10:7
source:
  edition: WLC
  text: דָּנִיֵּ֥אל גִּנְּת֖וֹן בָּרֽוּךְ׃
translation:
  text: Daniel, Ginnethon, Baruch.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: דָּנִיֵּאל
  chosen: Daniel
  alternatives:
  - Daniyel
  lexicon: HALOT
  rationale: Proper personal name (HNp). Following the translation philosophy, personal
    names are transliterated by standard English convention rather than translated
    etymologically ('God is my judge'). 'Daniel' is the established English form.
- source_word: גִּנְּתוֹן
  chosen: Ginnethon
  alternatives:
  - Ginnethon/Ginneton
  lexicon: HALOT
  rationale: Proper personal name (HNp). Rendered by transliteration. The doubled
    consonant is preserved in the standard English form 'Ginnethon' to reflect the
    Hebrew spelling as closely as readable English allows.
- source_word: בָּרוּךְ
  chosen: Baruch
  alternatives:
  - Barukh
  lexicon: HALOT
  rationale: Proper personal name (HNp). Transliterated by standard English convention
    as 'Baruch' rather than translated as the adjective/passive participle 'blessed,'
    since in this context it is clearly a personal name in a list.
