id: NEH.10.21
reference: Nehemiah 10:21
source:
  edition: WLC
  text: מַגְפִּיעָ֥שׁ מְשֻׁלָּ֖ם חֵזִֽיר׃
translation:
  text: Magpiash, Meshullam, Hezir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Magpias.' English tradition varies in how this name is transliterated.
    reason: lexical_alternative
  - marker: b
    text: Or 'Hesir.' This reflects a minor transliteration variation for the Hebrew
      name.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַגְפִּיעָשׁ
  chosen: Magpiash
  alternatives:
  - Magpias
  rationale: Proper name (HNp). Following the translation philosophy, personal names
    are transliterated rather than translated. 'Magpiash' closely reflects the consonantal
    Hebrew form in standard English transliteration; 'Magpias' is a possible alternate
    based on other English traditions.
- source_word: מְשֻׁלָּם
  chosen: Meshullam
  rationale: Proper name (HNp). Transliterated directly from Hebrew. This is a common
    biblical personal name, and the established English form 'Meshullam' accurately
    represents the Hebrew.
- source_word: חֵזִיר
  chosen: Hezir
  alternatives:
  - Hesir
  rationale: Proper name (HNp). Transliterated from Hebrew as a personal/family name
    in this covenant-signers list. 'Hezir' is the standard English form; 'Hesir' is
    a less common transliteration variant.
