id: NEH.10.9
reference: Nehemiah 10:9
source:
  edition: WLC
  text: מַֽעַזְיָ֥ה בִלְגַּ֖י שְׁמַֽעְיָ֑ה אֵ֖לֶּה הַ/כֹּהֲנִֽים׃ס
translation:
  text: Maaziah, Bilgai, Shemaiah—these were the priests.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: מַֽעַזְיָה
  chosen: Maaziah
  alternatives:
  - Maaziahh
  - Maazya
  rationale: Proper personal name; transliterated rather than translated per project
    philosophy. 'Maaziah' follows standard English convention for this Hebrew name.
- source_word: בִלְגַּי
  chosen: Bilgai
  alternatives:
  - Bilgaiy
  - Bilgai
  rationale: Proper personal name; transliterated by standard convention. No translation
    of meaning is appropriate in a list of signatories/personnel.
- source_word: שְׁמַעְיָה
  chosen: Shemaiah
  alternatives:
  - Shema'yah
  - Shemayah
  rationale: Proper personal name; transliterated according to common English biblical
    usage.
- source_word: אֵלֶּה
  chosen: these
  alternatives:
  - these men
  - these are
  lexicon: HALOT
  rationale: Demonstrative plural meaning 'these.' The simple demonstrative is sufficient;
    adding 'men' would overtranslate, and 'these are' is absorbed idiomatically into
    the English clause.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  alternatives:
  - priests
  - the priestly men
  lexicon: HALOT
  rationale: Definite article is present in Hebrew, so 'the priests' is the most direct
    rendering. In context this identifies the listed names as belonging to the priestly
    group.
