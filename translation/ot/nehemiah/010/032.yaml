theological_decisions:
- issue: Interpretation of sabbatical-year obligation in the final clause
  chosen_reading: The verse includes both letting the seventh year lie fallow and
    remitting debts/claims, rendered succinctly as 'we will forego the seventh year
    and every debt.'
  alternative_readings:
  - '''we will leave the seventh year and the exaction of every hand'''
  - '''we will forego the seventh year and every claim'''
  rationale: The language echoes sabbatical legislation and likely combines agricultural
    rest with release from financial claims. Rendering the final phrase as 'every
    debt' communicates the likely legal-economic sense without importing later doctrinal
    claims. Because the Hebrew idiom מַשָּׁא כָל יָד is terse and debated, an alternative
    is preserved in a footnote.
  doctrine_reference: Translation philosophy §3, preserve theological/interpretive
    tension where ambiguity is genuine.
