id: NEH.10.32
reference: Nehemiah 10:32
source:
  edition: WLC
  text: וְ/עַמֵּ֣י הָ/אָ֡רֶץ הַֽ/מְבִיאִים֩ אֶת הַ/מַּקָּח֨וֹת וְ/כָל שֶׁ֜בֶר בְּ/י֤וֹם
    הַ/שַּׁבָּת֙ לִ/מְכּ֔וֹר לֹא נִקַּ֥ח מֵ/הֶ֛ם בַּ/שַּׁבָּ֖ת וּ/בְ/י֣וֹם קֹ֑דֶשׁ
    וְ/נִטֹּ֛שׁ אֶת הַ/שָּׁנָ֥ה הַ/שְּׁבִיעִ֖ית וּ/מַשָּׁ֥א כָל יָֽד־־־־־׃
translation:
  text: As for the peoples of the land who bring goods and any grain on the Sabbath
    day to sell, we will not buy from them on the Sabbath or on a holy day; and we
    will forego the seventh year and every debt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every claim' or 'every exaction'; the Hebrew phrase is literally 'the
      burden/exaction of every hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמֵּי הָאָרֶץ
  chosen: the peoples of the land
  alternatives:
  - the people of the land
  - the peoples of the countries
  lexicon: HALOT
  rationale: Plural עַמֵּי with singular הָאָרֶץ is a conventional expression for
    the surrounding non-Judean populations/local inhabitants. 'Peoples of the land'
    preserves the plural and avoids flattening to a singular collective.
- source_word: הַמְבִיאִים
  chosen: who bring
  alternatives:
  - who are bringing
  lexicon: HALOT
  rationale: Hiphil participle functions attributively, describing the peoples by
    their customary action. English simple present fits the covenantal stipulation.
- source_word: הַמַּקָּחוֹת
  chosen: goods
  alternatives:
  - wares
  - merchandise
  lexicon: HALOT
  rationale: The noun refers to articles of trade or merchandise. 'Goods' is natural
    modern English and broad enough for market items.
- source_word: שֶׁבֶר
  chosen: grain
  alternatives:
  - produce
  - food
  lexicon: HALOT
  rationale: In commercial contexts שֶׁבֶר commonly denotes grain/corn as a staple
    commodity. 'Grain' is more precise than the broader 'produce' or 'food'.
- source_word: בְּיוֹם הַשַּׁבָּת ... לִמְכּוֹר
  chosen: on the Sabbath day to sell
  alternatives:
  - on the Sabbath to sell
  lexicon: HALOT
  rationale: Retains the temporal phrase plus infinitive of purpose. 'Sabbath day'
    is idiomatic English and preserves the marked wording.
- source_word: לֹא נִקַּח מֵהֶם
  chosen: we will not buy from them
  alternatives:
  - we will not take from them
  lexicon: HALOT
  rationale: Though לקח is broadly 'take,' in this market context with goods brought
    'to sell' the sense is specifically 'buy.' This makes the commercial prohibition
    explicit in English.
- source_word: וּבְיוֹם קֹדֶשׁ
  chosen: or on a holy day
  alternatives:
  - and on a holy day
  - or on a sacred day
  lexicon: HALOT
  rationale: After the negative prohibition, English idiom prefers 'or' to express
    the extension of the ban to any holy day. 'Holy day' is a transparent rendering
    of יום קדשׁ.
- source_word: וְנִטֹּשׁ
  chosen: we will forego
  alternatives:
  - we will let rest
  - we will leave alone
  - we will remit
  lexicon: HALOT
  rationale: The verb here refers to refraining from cultivation/claim in observance
    of sabbatical legislation. 'Forego' captures voluntary relinquishment without
    over-specifying agricultural details not repeated in the Hebrew clause.
- source_word: הַשָּׁנָה הַשְּׁבִיעִית
  chosen: the seventh year
  alternatives:
  - the sabbatical year
  lexicon: HALOT
  rationale: A direct rendering preserves the Hebrew wording; the sabbatical sense
    is clear from context and can be noted in interpretation without importing it
    into the main text.
- source_word: מַשָּׁא כָל יָד
  chosen: every debt
  alternatives:
  - every claim
  - every exaction
  - the burden of every hand
  lexicon: HALOT
  rationale: This compressed phrase likely refers to the remission of debts/claims
    in the sabbatical year (cf. Deut 15). 'Every debt' gives the probable sense in
    clear English, while alternatives are preserved because the Hebrew idiom is difficult.
