id: NEH.10.12
reference: Nehemiah 10:12
source:
  edition: WLC
  text: מִיכָ֥א רְח֖וֹב חֲשַׁבְיָֽה׃
translation:
  text: Mica, Rehob, Hashabiah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: מִיכָא
  chosen: Mica
  alternatives:
  - Mikha
  - Micah
  lexicon: HALOT
  rationale: Proper personal name (HNp). Following the translation philosophy, personal
    names are transliterated rather than translated. 'Mica' is a standard English
    transliteration of the Hebrew form מִיכָא, distinct from the longer form מִיכָיָה/מִיכָיָהוּ
    ('Micaiah').
- source_word: רְחוֹב
  chosen: Rehob
  alternatives:
  - Rechob
  lexicon: HALOT
  rationale: Proper personal name (HNp). Transliterated directly into standard English
    form 'Rehob.' The consonantal value ח is commonly represented by 'h' in conventional
    biblical English transliteration here rather than a more technical 'ḥ'.
- source_word: חֲשַׁבְיָה
  chosen: Hashabiah
  alternatives:
  - Hashabyah
  lexicon: HALOT
  rationale: Proper personal name (HNp). Transliterated by standard English convention
    as 'Hashabiah.' The final theophoric element -iah reflects common English representation
    of Hebrew -yāh in personal names.
