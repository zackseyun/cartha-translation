id: NEH.10.18
reference: Nehemiah 10:18
source:
  edition: WLC
  text: אָטֵ֥ר חִזְקִיָּ֖ה עַזּֽוּר׃
translation:
  text: Ater, Hezekiah, Azzur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew consists of three personal names in sequence, likely members of the
      covenant-signing list.
    reason: cultural_note
lexical_decisions:
- source_word: אָטֵר
  chosen: Ater
  alternatives:
  - Atar
  lexicon: HALOT
  rationale: Proper personal name in a list of signatories/names; per translation
    philosophy, personal names are transliterated rather than translated. 'Ater' follows
    standard English convention for this Hebrew name.
- source_word: חִזְקִיָּה
  chosen: Hezekiah
  alternatives:
  - Hizkiah
  - Hizqiyah
  lexicon: HALOT
  rationale: Proper personal name; transliterated by established English convention
    as 'Hezekiah.' Although the Hebrew form could be represented more closely as 'Hizkiah/Hizqiyah,'
    the conventional biblical English form is clearer and standard.
- source_word: עַזּוּר
  chosen: Azzur
  alternatives:
  - Azur
  lexicon: HALOT
  rationale: Proper personal name in the same list; transliterated rather than translated.
    'Azzur' preserves the doubled consonant indicated in the Hebrew better than the
    simplified 'Azur.'
