id: NEH.10.29
reference: Nehemiah 10:29
source:
  edition: WLC
  text: וּ/שְׁאָ֣ר הָ/עָ֡ם הַ/כֹּהֲנִ֣ים הַ֠/לְוִיִּם הַ/שּׁוֹעֲרִ֨ים הַ/מְשֹׁרְרִ֜ים
    הַ/נְּתִינִ֗ים וְֽ/כָל הַ/נִּבְדָּ֞ל מֵ/עַמֵּ֤י הָ/אֲרָצוֹת֙ אֶל תּוֹרַ֣ת הָ/אֱלֹהִ֔ים
    נְשֵׁי/הֶ֖ם בְּנֵי/הֶ֣ם וּ/בְנֹתֵי/הֶ֑ם כֹּ֖ל יוֹדֵ֥עַ מֵבִֽין־־׃
translation:
  text: and the rest of the people—the priests, the Levites, the gatekeepers, the
    singers, the temple servants, and everyone who had separated himself from the
    peoples of the lands to the law of God—their wives, their sons, and their daughters,
    everyone who knew and understood—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Nethinim,” a traditional transliteration for a class of temple servants.
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew uses masculine singular forms with collective force: “everyone
      who had separated himself … everyone who knew and understood.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁאָר הָעָם
  chosen: and the rest of the people
  alternatives:
  - and the remainder of the people
  - and the rest of the nation
  lexicon: HALOT
  rationale: שְׁאָר denotes the remainder/rest. 'People' fits עָם in this covenant-community
    context better than 'nation,' since the verse lists groups within Judah.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֲנִים; no contextual reason to vary.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of לְוִיִּם as the Levitical class.
- source_word: הַשּׁוֹעֲרִים
  chosen: the gatekeepers
  alternatives:
  - the doorkeepers
  lexicon: HALOT
  rationale: '''Gatekeepers'' is the usual and clearest English equivalent for temple
    personnel guarding entrances.'
- source_word: הַמְשֹׁרְרִים
  chosen: the singers
  alternatives:
  - the musicians
  lexicon: HALOT
  rationale: The participial form from שׁיר refers specifically to singers; 'musicians'
    is broader than the Hebrew.
- source_word: הַנְּתִינִים
  chosen: the temple servants
  alternatives:
  - the Nethinim
  lexicon: HALOT
  rationale: A translated title is clearer for modern readers than the transliteration
    'Nethinim.' In context these are temple personnel assigned to service.
- source_word: וְכָל הַנִּבְדָּל
  chosen: and everyone who had separated himself
  alternatives:
  - and all who had separated themselves
  - and everyone set apart
  lexicon: HALOT
  rationale: The singular participle with כָל has collective force. 'Everyone who
    had separated himself' preserves the gender-accurate singular form while functioning
    collectively. The reflexive sense fits the covenantal act of separation from surrounding
    peoples.
- source_word: מֵעַמֵּי הָאֲרָצוֹת
  chosen: from the peoples of the lands
  alternatives:
  - from the peoples of the countries
  - from the peoples of the surrounding lands
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the plural 'peoples' and 'lands,'
    reflecting the various neighboring populations rather than one generic populace.
- source_word: אֶל תּוֹרַת הָאֱלֹהִים
  chosen: to the law of God
  alternatives:
  - to God's law
  - for the law of God
  lexicon: HALOT
  rationale: The preposition אֶל after 'separated' is awkward in English if rendered
    woodenly; 'to the law of God' preserves the directional sense of joining/aligning
    with God's Torah.
- source_word: נְשֵׁיהֶם בְּנֵיהֶם וּבְנוֹתֵיהֶם
  chosen: their wives, their sons, and their daughters
  alternatives:
  - their women, their children
  lexicon: HALOT
  rationale: The Hebrew explicitly lists wives, sons, and daughters; the translation
    preserves that specificity rather than collapsing to 'families' or 'children.'
- source_word: כֹּל יוֹדֵעַ מֵבִין
  chosen: everyone who knew and understood
  alternatives:
  - all who had knowledge and understanding
  - everyone able to know and understand
  lexicon: HALOT
  rationale: The paired participles indicate those possessing sufficient comprehension
    to participate knowingly in the covenant. 'Knew and understood' is natural and
    close to the Hebrew.
