theological_decisions:
- issue: Gendered singular in collective expression הַנִּבְדָּל / יוֹדֵעַ מֵבִין
  chosen_reading: Use 'everyone who had separated himself' and 'everyone who knew
    and understood' in the main text, while retaining explicit mention of wives, sons,
    and daughters.
  alternative_readings:
  - everyone who had separated themselves
  - all who were informed and discerning
  rationale: The Hebrew uses grammatically masculine singular forms with collective
    force. Per doctrine, gender-accurate rendering is preferred over flattening to
    gender-neutral language, while the surrounding explicit family terms make clear
    the mixed-group reference.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering נְתִינִים
  chosen_reading: Translate as 'temple servants' rather than transliterate 'Nethinim.'
  alternative_readings:
  - Nethinim
  rationale: The translation philosophy prefers meaning-bearing English where possible.
    Since this is a class of temple personnel, a translated term serves readability
    without importing extra doctrinal content.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
