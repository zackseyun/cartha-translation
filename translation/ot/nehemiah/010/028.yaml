id: NEH.10.28
reference: Nehemiah 10:28
source:
  edition: WLC
  text: מַלּ֥וּךְ חָרִ֖ם בַּעֲנָֽה׃
translation:
  text: Malluk, Harim, Baanah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Malluch.' English spellings of this Hebrew name vary in transliteration
      tradition.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלּוּךְ
  chosen: Malluk
  alternatives:
  - Malluch
  rationale: Proper name (HNp). Following the translation philosophy, personal names
    are transliterated rather than translated. 'Malluk' reflects a straightforward
    English transliteration of the Hebrew form; 'Malluch' is a common alternative
    influenced by older conventions.
- source_word: חָרִם
  chosen: Harim
  rationale: Proper name (HNp). Transliterated directly as a personal or family name
    in this list context.
- source_word: בַּעֲנָה
  chosen: Baanah
  alternatives:
  - Baana
  rationale: Proper name (HNp). Transliterated directly. 'Baanah' preserves the long
    vowel sequence represented in the Hebrew; 'Baana' is a possible simplified English
    form but is less standard.
