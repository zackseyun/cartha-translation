id: NEH.10.38
reference: Nehemiah 10:38
source:
  edition: WLC
  text: וְ/אֶת רֵאשִׁ֣ית עֲרִיסֹתֵ֣י/נוּ וּ֠/תְרוּמֹתֵי/נוּ וּ/פְרִ֨י כָל עֵ֜ץ תִּיר֣וֹשׁ
    וְ/יִצְהָ֗ר נָבִ֤יא לַ/כֹּהֲנִים֙ אֶל לִשְׁכ֣וֹת בֵּית אֱלֹהֵ֔י/נוּ וּ/מַעְשַׂ֥ר
    אַדְמָתֵ֖/נוּ לַ/לְוִיִּ֑ם וְ/הֵם֙ הַ/לְוִיִּ֔ם הַֽ/מְעַשְּׂרִ֔ים בְּ/כֹ֖ל עָרֵ֥י
    עֲבֹדָתֵֽ/נוּ־־־־׃
translation:
  text: And we will bring the first of our dough, our contributions, the fruit of
    every tree, the new wine, and the oil to the priests, to the chambers of the house
    of our God, and the tithe of our land to the Levites; for they, the Levites, are
    the ones who collect the tithes in all the cities where we labor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our offerings'; the Hebrew term can denote a sacred contribution set
      apart for priestly use.
    reason: lexical_alternative
  - marker: b
    text: Or 'storerooms' for 'chambers.' The Hebrew refers to rooms in the temple
      complex, often used for storage.
    reason: lexical_alternative
  - marker: c
    text: Or 'in all the cities of our service/work.' The Hebrew expression is somewhat
      compressed and may refer to the towns associated with the people's agricultural
      labor.
    reason: alternative_reading
lexical_decisions:
- source_word: רֵאשִׁית עֲרִיסֹתֵינוּ
  chosen: the first of our dough
  alternatives:
  - the firstfruits of our dough
  - the first of our kneading troughs/batches
  lexicon: HALOT
  rationale: רֵאשִׁית denotes the first portion, and עֲרִיסָה refers to dough or kneaded
    mass rather than a generalized 'firstfruits.' 'The first of our dough' is idiomatic
    and preserves the concrete offering language.
- source_word: תְּרוּמֹתֵינוּ
  chosen: our contributions
  alternatives:
  - our offerings
  - our heave offerings
  lexicon: HALOT
  rationale: תְּרוּמָה is a contribution/set-apart offering. 'Contributions' is clear
    modern English and avoids the archaic technical term 'heave offerings,' while
    still signaling designated sacred gifts.
- source_word: פְּרִי כָל עֵץ
  chosen: the fruit of every tree
  alternatives:
  - all the fruit of the trees
  lexicon: HALOT
  rationale: A straightforward formal rendering of the construct phrase; singular
    'every tree' communicates the distributive force of כָל.
- source_word: תִּירוֹשׁ
  chosen: the new wine
  alternatives:
  - wine
  - fresh wine
  lexicon: HALOT
  rationale: תִּירוֹשׁ commonly refers to freshly produced wine/new wine rather than
    wine in general. 'New wine' preserves the agricultural specificity.
- source_word: יִצְהָר
  chosen: the oil
  alternatives:
  - fresh oil
  - olive oil
  lexicon: HALOT
  rationale: In agricultural lists this term refers to oil, typically olive oil. 'The
    oil' is concise and natural; 'olive oil' is possible but slightly more interpretive
    than the Hebrew requires.
- source_word: נָבִיא
  chosen: we will bring
  alternatives:
  - let us bring
  - we shall bring
  lexicon: HALOT
  rationale: Hiphil of בוא with first person plural here expresses the community's
    pledge. 'We will bring' fits the covenantal commitment context in Nehemiah 10.
- source_word: לִשְׁכוֹת
  chosen: the chambers
  alternatives:
  - the storerooms
  - the rooms
  lexicon: HALOT
  rationale: לִשְׁכּוֹת refers to temple chambers/rooms. 'Chambers' preserves the
    architectural sense without over-specifying storage, though storage is part of
    the function.
- source_word: מַעְשַׂר אַדְמָתֵנוּ
  chosen: the tithe of our land
  alternatives:
  - the tithe of our ground
  - the tenth from our land's produce
  lexicon: HALOT
  rationale: The phrase denotes the tenth due from the produce of the land. 'The tithe
    of our land' is a natural compact rendering that preserves the genitival relation.
- source_word: הַמְעַשְּׂרִים
  chosen: collect the tithes
  alternatives:
  - receive the tithes
  - take the tithes
  lexicon: HALOT
  rationale: The participle from עשר in this context means taking/collecting tithes.
    'Collect the tithes' best fits the administrative role of the Levites in the towns.
- source_word: בְּכָל עָרֵי עֲבֹדָתֵנוּ
  chosen: in all the cities where we labor
  alternatives:
  - in all the cities of our service
  - in all the cities of our cultivation
  lexicon: HALOT
  rationale: עֲבֹדָה can mean work, service, or labor. Here, with land and tithes
    in view, it likely refers to the places connected with the people's agricultural
    work. 'Where we labor' makes the sense clear in modern English while preserving
    the work-related nuance.
