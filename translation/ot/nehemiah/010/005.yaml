id: NEH.10.5
reference: Nehemiah 10:5
source:
  edition: WLC
  text: חַטּ֥וּשׁ שְׁבַנְיָ֖ה מַלּֽוּךְ׃
translation:
  text: Hattush, Shebaniah, Malluk.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Malluk is traditionally rendered Malluch in some English versions.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַטּוּשׁ
  chosen: Hattush
  alternatives:
  - Hattush
  rationale: Proper personal name (HNp). Following the translation philosophy, personal
    names are transliterated rather than translated. Standard English transliteration
    preserves the familiar form 'Hattush'.
- source_word: שְׁבַנְיָה
  chosen: Shebaniah
  alternatives:
  - Shebaniah
  - Shebaniah
  rationale: Proper personal name (HNp). Transliterated as 'Shebaniah' by standard
    convention. The shorter spelling 'Shebaniah' is a plausible English variant, but
    'Shebaniah' more directly reflects the Hebrew consonantal form with -niyah.
- source_word: מַלּוּךְ
  chosen: Malluk
  alternatives:
  - Malluk
  - Malluch
  rationale: Proper personal name (HNp). Transliterated as 'Malluk' to reflect the
    Hebrew vowel pattern and final kaf sound. 'Malluch' is a common traditional English
    variant and is preserved in a footnote as a lexical alternative.
