id: NEH.10.27
reference: Nehemiah 10:27
source:
  edition: WLC
  text: וַ/אֲחִיָּ֥ה חָנָ֖ן עָנָֽן׃
translation:
  text: and Ahijah, Hanan, Anan.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַ/אֲחִיָּה
  chosen: and Ahijah
  alternatives:
  - and Ahiah
  rationale: The prefixed conjunction וַ is rendered as 'and,' appropriate for a list
    of names. The proper name is transliterated rather than translated, following
    the translation philosophy for personal names. 'Ahijah' is the standard English
    transliteration of אֲחִיָּה.
- source_word: חָנָן
  chosen: Hanan
  rationale: Proper name transliterated directly into standard English form. No translation
    of the name's meaning is warranted in a list context.
- source_word: עָנָן
  chosen: Anan
  alternatives:
  - Aanan
  rationale: Proper name transliterated into its conventional English form 'Anan.'
    Although the consonants could invite slightly different transliteration conventions,
    'Anan' is the standard concise rendering in English Bible tradition.
