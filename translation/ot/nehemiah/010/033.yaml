id: NEH.10.33
reference: Nehemiah 10:33
source:
  edition: WLC
  text: וְ/הֶעֱמַ֤דְנוּ עָלֵ֨י/נוּ֙ מִצְוֺ֔ת לָ/תֵ֥ת עָלֵ֛י/נוּ שְׁלִשִׁ֥ית הַ/שֶּׁ֖קֶל
    בַּ/שָּׁנָ֑ה לַ/עֲבֹדַ֖ת בֵּ֥ית אֱלֹהֵֽי/נוּ׃
translation:
  text: We also laid on ourselves the commandment to give on ourselves yearly a third
    of a shekel for the service of the house of our God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'We imposed on ourselves obligations to give one-third of a shekel each
      year.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֶעֱמַדְנוּ
  chosen: we also laid
  alternatives:
  - we imposed
  - we established
  - we undertook
  lexicon: HALOT
  rationale: Hiphil of עמד here has the sense of setting or imposing something upon
    oneself. 'Laid' in the idiom 'laid on ourselves' preserves the concrete Hebrew
    construction while remaining natural enough in English. The prefixed conjunction
    is represented by 'also' in context.
- source_word: עָלֵינוּ
  chosen: on ourselves
  alternatives:
  - upon us
  lexicon: HALOT
  rationale: The preposition על with 1cp suffix is repeated in the verse and is best
    preserved as 'on ourselves' to reflect the self-imposed nature of the obligation.
- source_word: מִצְוֺת
  chosen: the commandment
  alternatives:
  - commands
  - obligation
  - ordinance
  lexicon: HALOT
  rationale: Although morphologically plural in form, this noun can function as an
    abstract or collective expression. In this context it refers to a specific binding
    requirement they are placing on themselves, so singular 'the commandment' best
    matches the following infinitive clause.
- source_word: לָתֵת
  chosen: to give
  alternatives:
  - to pay
  lexicon: HALOT
  rationale: The infinitive of נתן is straightforwardly 'to give.' 'Pay' would be
    interpretive; 'give' preserves the source wording while fitting the temple contribution
    context.
- source_word: שְׁלִשִׁית הַשֶּׁקֶל
  chosen: a third of a shekel
  alternatives:
  - one-third of a shekel
  lexicon: HALOT
  rationale: This is a fractional monetary amount. 'A third of a shekel' is idiomatic
    modern English and accurately reflects the Hebrew construct.
- source_word: בַּשָּׁנָה
  chosen: yearly
  alternatives:
  - in the year
  - each year
  - per year
  lexicon: HALOT
  rationale: The phrase denotes annual recurrence. 'Yearly' is concise and natural,
    though equivalent to 'each year.'
- source_word: לַעֲבֹדַת
  chosen: for the service
  alternatives:
  - for the work
  - for the ministry
  lexicon: HALOT
  rationale: עֲבֹדָה in temple context refers to the service or work associated with
    worship and maintenance. 'Service' best captures cultic function without overtechnical
    language.
- source_word: בֵּית אֱלֹהֵינוּ
  chosen: the house of our God
  alternatives:
  - our God's house
  - the temple of our God
  lexicon: HALOT
  rationale: Literally 'house of our God.' This preserves the Hebrew expression and
    its covenantal tone. 'Temple' is contextually correct but less formally aligned
    with the source wording.
