theological_decisions:
- issue: Nature of the obligation in מִצְוֺת
  chosen_reading: a self-imposed commandment/requirement
  alternative_readings:
  - self-imposed obligations
  - ordinances
  rationale: The verse describes the community binding itself to a specific annual
    temple contribution. The translation preserves this as a commandment laid on themselves
    rather than softening it to a mere custom.
  doctrine_reference: Translation philosophy §1, §5
