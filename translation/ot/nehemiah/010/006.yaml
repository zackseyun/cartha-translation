id: NEH.10.6
reference: Nehemiah 10:6
source:
  edition: WLC
  text: חָרִ֥ם מְרֵמ֖וֹת עֹֽבַדְיָֽה׃
translation:
  text: Harim, Meremoth, Obadiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew consists of three personal names in sequence, likely members of the
      covenant-signing list.
    reason: cultural_note
lexical_decisions:
- source_word: חָרִם
  chosen: Harim
  alternatives:
  - Harem
  rationale: Proper noun in a list of signatories/names; per translation philosophy,
    personal names are transliterated rather than translated. 'Harim' follows standard
    English convention.
- source_word: מְרֵמוֹת
  chosen: Meremoth
  alternatives:
  - Meremot
  rationale: Proper noun; transliterated according to standard English biblical convention.
    The form is a personal name, not translated for meaning in this context.
- source_word: עֹבַדְיָה
  chosen: Obadiah
  alternatives:
  - Obadya
  - Obadiahu
  rationale: Proper noun; standard English transliteration is 'Obadiah.' Although
    the name is theophoric in Hebrew, names are transliterated rather than translated.
