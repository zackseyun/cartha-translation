theological_decisions:
- issue: Gendered covenantal group labels
  chosen_reading: the sons of Israel ... the sons of Levi
  alternative_readings:
  - the Israelites ... the Levites
  rationale: The Hebrew uses masculine plural filial expressions, and the translation
    philosophy prefers gender-accurate renderings where they match the source's intent.
    Here the formal parallelism is significant, so the more literal phrasing is retained
    rather than neutralizing both expressions.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Sense of abandoning the house of God
  chosen_reading: we will not neglect the house of our God
  alternative_readings:
  - we will not forsake the house of our God
  rationale: The statement concerns covenantal support for temple worship and provisions,
    not merely physical departure. 'Neglect' preserves that practical-theological
    force without overstating literal abandonment.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
