id: NEH.10.40
reference: Nehemiah 10:40
source:
  edition: WLC
  text: כִּ֣י אֶל הַ֠/לְּשָׁכוֹת יָבִ֨יאוּ בְנֵי יִשְׂרָאֵ֜ל וּ/בְנֵ֣י הַ/לֵּוִ֗י
    אֶת תְּרוּמַ֣ת הַ/דָּגָן֮ הַ/תִּיר֣וֹשׁ וְ/הַ/יִּצְהָר֒ וְ/שָׁם֙ כְּלֵ֣י הַ/מִּקְדָּ֔שׁ
    וְ/הַ/כֹּהֲנִים֙ הַ/מְשָׁ֣רְתִ֔ים וְ/הַ/שּׁוֹעֲרִ֖ים וְ/הַ/מְשֹׁרְרִ֑ים וְ/לֹ֥א
    נַעֲזֹ֖ב אֶת בֵּ֥ית אֱלֹהֵֽי/נוּ־־־־׃
translation:
  text: For the sons of Israel and the sons of Levi will bring the contribution of
    the grain, the new wine, and the oil to the chambers; and there are the vessels
    of the sanctuary, and the priests who minister, and the gatekeepers, and the singers.
    So we will not neglect the house of our God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites and the Levites.' The Hebrew more literally reads 'the
      sons of Israel and the sons of Levi.'
    reason: lexical_alternative
  - marker: b
    text: Or 'we will not forsake the house of our God.'
    reason: alternative_reading
lexical_decisions:
- source_word: לְּשָׁכוֹת
  chosen: the chambers
  alternatives:
  - the storerooms
  - the rooms
  lexicon: HALOT
  rationale: Refers to the temple side-rooms/storage chambers. 'Chambers' preserves
    the architectural sense without over-specifying storage, though that nuance is
    present in context.
- source_word: יָבִיאוּ
  chosen: will bring
  alternatives:
  - shall bring
  lexicon: HALOT
  rationale: Hiphil imperfect of בוא here means to bring in/deliver. 'Will bring'
    is natural modern English and fits the covenantal pledge context.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: A more formal rendering preserves the Hebrew expression and its parallel
    with 'the sons of Levi.' 'Israelites' is possible, but the paired phrasing is
    rhetorically important here.
- source_word: בְנֵי הַלֵּוִי
  chosen: the sons of Levi
  alternatives:
  - the Levites
  lexicon: HALOT
  rationale: Rendered formally to match 'the sons of Israel' and preserve the parallel
    structure. 'Levites' is idiomatic but slightly less transparent to the source
    wording.
- source_word: תְּרוּמַת
  chosen: the contribution
  alternatives:
  - the offering
  - the heave offering
  lexicon: HALOT
  rationale: תְּרוּמָה denotes a contribution set apart for sacred use. 'Contribution'
    is clear and broad enough for the produce listed; 'heave offering' is too technical
    for modern readers.
- source_word: דָּגָן
  chosen: grain
  alternatives:
  - corn
  lexicon: HALOT
  rationale: Generic cereal produce; 'grain' is standard modern English. 'Corn' would
    be misleading in many English contexts.
- source_word: תִּירוֹשׁ
  chosen: new wine
  alternatives:
  - wine
  - fresh wine
  lexicon: HALOT
  rationale: Commonly refers to freshly produced wine/must. 'New wine' preserves the
    agricultural nuance better than the generic 'wine'.
- source_word: יִצְהָר
  chosen: oil
  alternatives:
  - olive oil
  lexicon: HALOT
  rationale: In this triad the referent is olive oil. 'Oil' is the conventional concise
    rendering; the olive sense is culturally understood from the setting.
- source_word: שָׁם
  chosen: there are
  alternatives:
  - there
  - where
  lexicon: HALOT
  rationale: The adverb points to what is located in the chambers. English requires
    a fuller expression for smooth sense; 'there are' makes explicit the locative
    force in context.
- source_word: כְּלֵי הַמִּקְדָּשׁ
  chosen: the vessels of the sanctuary
  alternatives:
  - the articles of the sanctuary
  - the utensils of the holy place
  lexicon: HALOT
  rationale: Refers to temple implements. 'Vessels' is a standard biblical-English
    term that remains understandable; 'sanctuary' fits מִקְדָּשׁ well here.
- source_word: הַכֹּהֲנִים הַמְשָׁרְתִים
  chosen: the priests who minister
  alternatives:
  - the ministering priests
  - the priests serving there
  lexicon: HALOT
  rationale: The participle describes the priests in active service. 'Who minister'
    is readable and preserves the functional sense.
- source_word: הַשּׁוֹעֲרִים
  chosen: the gatekeepers
  alternatives:
  - the doorkeepers
  lexicon: HALOT
  rationale: Standard rendering for temple personnel guarding/attending the gates.
- source_word: הַמְשֹׁרְרִים
  chosen: the singers
  alternatives:
  - the musicians
  - the chanters
  lexicon: HALOT
  rationale: The term specifically denotes singers in temple service; 'musicians'
    is too broad.
- source_word: לֹא נַעֲזֹב
  chosen: we will not neglect
  alternatives:
  - we will not forsake
  - we will not abandon
  lexicon: HALOT
  rationale: In this covenant-renewal context the sense is not literal desertion of
    the building but failure to support and maintain temple worship. 'Neglect' best
    captures the practical force.
- source_word: בֵּית אֱלֹהֵינוּ
  chosen: the house of our God
  alternatives:
  - our God's house
  - the temple of our God
  lexicon: HALOT
  rationale: A transparent and traditional rendering that preserves the covenantal
    phrasing. 'Temple' is interpretive but accurate; 'house of our God' better reflects
    the Hebrew idiom.
