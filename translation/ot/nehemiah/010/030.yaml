theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Retention of masculine kinship term אֲחֵיהֶם
  chosen_reading: their brothers
  alternative_readings:
  - their kin
  - their fellow Israelites
  rationale: The source uses a masculine plural kinship term. Per translation philosophy, gender-accurate rendering is preferred over neutralization unless context requires otherwise.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering עֶבֶד for Moses as 'servant' rather than 'slave'
  chosen_reading: the servant of God
  alternative_readings:
  - the slave of God
  rationale: Although the project often prefers 'slave' where bonded status is salient, in established honorific titles for Moses the idiomatic and contextual sense is 'servant.' This is a documented contextual exception.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §1 and §5; Contested terms: δοῦλος servant/slave (context-dependent)'
