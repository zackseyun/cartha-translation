id: NEH.10.30
reference: Nehemiah 10:30
source:
  edition: WLC
  text: מַחֲזִיקִ֣ים עַל אֲחֵי/הֶם֮ אַדִּירֵי/הֶם֒ וּ/בָאִ֞ים בְּ/אָלָ֣ה וּ/בִ/שְׁבוּעָ֗ה לָ/לֶ֨כֶת֙ בְּ/תוֹרַ֣ת הָ/אֱלֹהִ֔ים אֲשֶׁ֣ר נִתְּנָ֔ה בְּ/יַ֖ד מֹשֶׁ֣ה עֶֽבֶד הָֽ/אֱלֹהִ֑ים וְ/לִ/שְׁמ֣וֹר וְ/לַ/עֲשׂ֗וֹת אֶת כָּל מִצְוֺת֙ יְהוָ֣ה אֲדֹנֵ֔י/נוּ וּ/מִשְׁפָּטָ֖י/ו וְ/חֻקָּֽי/ו־־־־׃
translation:
  text: They join with their brothers, their nobles, and enter into a curse and an oath, to walk in the law of God, which was given by the hand of Moses the servant of God, and to keep and to do all the commandments of Yahweh our Lord, and his judgments and his statutes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bind themselves to their brothers, their nobles.' The Hebrew idiom can suggest attaching oneself firmly to the leading members of the community in covenant solidarity.
    reason: lexical_alternative
  - marker: b
    text: '''A curse and an oath'' refers to a self-maledictory covenant pledge: they swear obedience and accept covenant sanctions if they break it.'
    reason: cultural_note
  - marker: c
    text: Or 'which was given through Moses.' Literally, 'which was given by the hand of Moses.'
    reason: lexical_alternative
  - marker: d
    text: '''Judgments'' may also be rendered ''ordinances'' or ''rules''; ''statutes'' may also be rendered ''decrees.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מַחֲזִיקִים עַל
  chosen: join with
  alternatives:
  - bind themselves to
  - support
  - hold fast to
  lexicon: HALOT
  rationale: The idiom חזק על in this covenant context conveys attaching oneself to or aligning with others, not merely physical strengthening. 'Join with' is natural English and fits the public covenant-renewal setting.
- source_word: אֲחֵיהֶם
  chosen: their brothers
  alternatives:
  - their kin
  - their fellow Israelites
  lexicon: HALOT
  rationale: The Hebrew is literally 'their brothers.' Per gender-accurate philosophy, the masculine familial term is retained rather than neutralized, while context may imply the broader covenant community.
- source_word: אַדִּירֵיהֶם
  chosen: their nobles
  alternatives:
  - their leaders
  - their mighty ones
  lexicon: HALOT
  rationale: In this social-political context the term refers to prominent persons of status within the community. 'Nobles' best captures rank and public standing.
- source_word: וּבָאִים
  chosen: enter into
  alternatives:
  - come into
  - undertake
  lexicon: HALOT
  rationale: With the following בְאָלָה וּבִשְׁבוּעָה, the verb means entering into a binding covenantal obligation.
- source_word: בְּאָלָה
  chosen: a curse
  alternatives:
  - a covenant curse
  - an imprecation
  lexicon: HALOT
  rationale: אָלָה denotes the self-maledictory sanction attached to covenant violation. 'A curse' is the plain lexical sense; the covenantal nuance is clear from context.
- source_word: וּבִשְׁבוּעָה
  chosen: an oath
  alternatives:
  - a sworn oath
  lexicon: HALOT
  rationale: Standard rendering for שְׁבוּעָה. Paired with 'curse,' it expresses a solemn covenant commitment under sanction.
- source_word: לָלֶכֶת בְּתוֹרַת הָאֱלֹהִים
  chosen: to walk in the law of God
  alternatives:
  - to live by the law of God
  - to walk according to the instruction of God
  lexicon: HALOT
  rationale: '''Walk in'' preserves the Hebrew covenantal metaphor for conduct. תּוֹרָה can mean ''instruction,'' but in this legal-covenantal setting ''law'' is appropriate and idiomatic.'
- source_word: אֲשֶׁר נִתְּנָה בְּיַד מֹשֶׁה
  chosen: which was given by the hand of Moses
  alternatives:
  - which was given through Moses
  lexicon: HALOT
  rationale: The Hebrew idiom 'by the hand of' is preserved because it is clear in English and reflects mediated divine giving through Moses.
- source_word: עֶבֶד הָאֱלֹהִים
  chosen: the servant of God
  alternatives:
  - the slave of God
  lexicon: HALOT
  rationale: Although עֶבֶד can denote slave/servant, here it functions as an honorific title for Moses. 'Servant' is the most idiomatic and contextually fitting rendering.
- source_word: וְלִשְׁמוֹר וְלַעֲשׂוֹת
  chosen: to keep and to do
  alternatives:
  - to observe and to do
  - to keep and carry out
  lexicon: HALOT
  rationale: This common covenant formula is best rendered with two verbs to preserve the Hebrew emphasis on both guarding/observing and performing.
- source_word: כָּל מִצְוֺת
  chosen: all the commandments
  alternatives:
  - every commandment
  - all the commands
  lexicon: HALOT
  rationale: Formal plural retained; 'commandments' matches covenant-law diction.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲדֹנֵינוּ
  chosen: our Lord
  alternatives:
  - our master
  lexicon: HALOT
  rationale: The noun means 'lord/master'; 'our Lord' is the most natural reverential rendering in this prayer-covenant context.
- source_word: וּמִשְׁפָּטָיו
  chosen: his judgments
  alternatives:
  - his rules
  - his ordinances
  lexicon: HALOT
  rationale: מִשְׁפָּטִים are legal decisions/regulations. 'Judgments' is somewhat formal but preserves the juridical flavor and pairs well with 'statutes.'
- source_word: וְחֻקָּיו
  chosen: his statutes
  alternatives:
  - his decrees
  - his prescribed statutes
  lexicon: HALOT
  rationale: A standard rendering for חֻקִּים in legal contexts; it preserves distinction from commandments and judgments.
