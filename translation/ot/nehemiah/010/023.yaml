    transliteration convention in biblical usage.
- source_word: חָנָן
  chosen: Hanan
  rationale: Hebrew proper name (HNp). Rendered by straightforward transliteration
    into standard English biblical form.
- source_word: עֲנָיָה
  chosen: Anaiah
  alternatives:
  - Aniah
  rationale: Hebrew proper name (HNp). Transliterated rather than translated; 'Anaiah'
    reflects the conventional English biblical form and preserves distinction from
    other similar names.
