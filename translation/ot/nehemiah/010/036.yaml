id: NEH.10.36
reference: Nehemiah 10:36
source:
  edition: WLC
  text: וּ/לְ/הָבִ֞יא אֶת בִּכּוּרֵ֣י אַדְמָתֵ֗/נוּ וּ/בִכּוּרֵ֛י כָּל פְּרִ֥י כָל
    עֵ֖ץ שָׁנָ֣ה בְ/שָׁנָ֑ה לְ/בֵ֖ית יְהוָֽה־־־׃
translation:
  text: and to bring the firstfruits of our soil and the firstfruits of all the fruit
    of every tree, year by year, to the house of the LORD,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our land' or 'our ground' for 'our soil.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'the house of the LORD'; that is, the temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/הָבִיא
  chosen: and to bring
  alternatives:
  - and to carry
  - and to present
  lexicon: HALOT
  rationale: The prefixed conjunction plus infinitive construct continues the covenant
    obligations listed in context. 'Bring' is the most natural English rendering for
    הביא in cultic contexts of bringing offerings to the temple.
- source_word: בִּכּוּרֵי
  chosen: the firstfruits
  alternatives:
  - the first produce
  - the earliest produce
  lexicon: HALOT
  rationale: בכורים refers to first produce offered to God. 'Firstfruits' is the established
    and accurate cultic term in English and preserves the sacrificial/ritual sense
    better than a flatter paraphrase.
- source_word: אַדְמָתֵנוּ
  chosen: our soil
  alternatives:
  - our land
  - our ground
  lexicon: HALOT
  rationale: אדמה denotes ground/soil/arable land. 'Soil' best fits the agricultural
    context of produce, while 'land' could sound broader or territorial.
- source_word: וּ/בִכּוּרֵי כָּל פְּרִי כָל עֵץ
  chosen: and the firstfruits of all the fruit of every tree
  alternatives:
  - and the firstfruits of every kind of fruit from every tree
  - and the first produce of all fruit of every tree
  lexicon: HALOT
  rationale: 'The Hebrew piles up genitives for comprehensiveness: firstfruits belonging
    to all fruit of every tree. The chosen rendering stays close to the structure
    while remaining readable.'
- source_word: פְּרִי
  chosen: fruit
  alternatives:
  - produce
  lexicon: HALOT
  rationale: Here פרי refers specifically to tree fruit, so 'fruit' is more precise
    than the broader 'produce'.
- source_word: כָל עֵץ
  chosen: every tree
  alternatives:
  - all trees
  lexicon: HALOT
  rationale: The distributive sense is well conveyed by 'every tree,' matching the
    Hebrew construction and sounding natural in English.
- source_word: שָׁנָה בְשָׁנָה
  chosen: year by year
  alternatives:
  - every year
  - from year to year
  lexicon: HALOT
  rationale: This idiom expresses regular annual repetition. 'Year by year' preserves
    the Hebrew rhythm and iterative force.
- source_word: לְבֵית יְהוָה
  chosen: to the house of the LORD
  alternatives:
  - to the temple of the LORD
  - to the house of Yahweh
  lexicon: HALOT
  rationale: בֵּית יְהוָה is literally 'house of YHWH.' Per doctrine, יְהוָה is rendered
    'the LORD.' 'House' preserves the source wording; 'temple' is interpretive though
    contextually true.
