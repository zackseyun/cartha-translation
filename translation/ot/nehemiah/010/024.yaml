lexical_decisions:
- source_word: הוֹשֵׁעַ
  chosen: Hosea
  alternatives:
  - Hoshea
  lexicon: HALOT
  rationale: Proper personal name (HNp). Standard English transliteration is preferred
    for readability and consistency with common biblical naming conventions. 'Hoshea'
    is a closer transliteration of the Hebrew form and is preserved as an alternative.
- source_word: חֲנַנְיָה
  chosen: Hananiah
  lexicon: HALOT
  rationale: Proper personal name (HNp). Transliterated rather than translated, following
    the project's policy to transliterate personal names. The form 'Hananiah' is the
    conventional English representation.
- source_word: חַשּׁוּב
  chosen: Hasshub
  alternatives:
  - Hashub
  lexicon: HALOT
  rationale: Proper personal name (HNp). Transliterated into standard English form.
    Because English spellings vary for the doubled consonant, 'Hashub' is preserved
    as an alternative spelling.
