id: NEH.10.4
reference: Nehemiah 10:4
source:
  edition: WLC
  text: פַּשְׁח֥וּר אֲמַרְיָ֖ה מַלְכִּיָּֽה׃
translation:
  text: Pashhur, Amariah, Malkijah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Pashur.' English spellings of this name vary by transliteration convention.
    reason: lexical_alternative
  - marker: b
    text: Or 'Malchijah' or 'Malkiah.' English spellings vary for this Hebrew name.
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּשְׁחוּר
  chosen: Pashhur
  alternatives:
  - Pashur
  lexicon: HALOT
  rationale: Proper personal name (HNp). Following the translation philosophy, personal
    names are transliterated rather than translated. 'Pashhur' closely reflects the
    Hebrew consonants and common English biblical usage; 'Pashur' is a possible simplified
    transliteration.
- source_word: אֲמַרְיָה
  chosen: Amariah
  alternatives:
  - Amaria
  lexicon: HALOT
  rationale: Proper personal name (HNp). Transliterated in standard English biblical
    form. The final theophoric element is conventionally represented in English as
    '-iah.'
- source_word: מַלְכִּיָּה
  chosen: Malkijah
  alternatives:
  - Malchijah
  - Malkiah
  lexicon: HALOT
  rationale: Proper personal name (HNp). Transliterated rather than translated. 'Malkijah'
    preserves the Hebrew consonantal shape well in readable modern English; alternate
    English spellings exist due to different conventions for representing כ and the
    final divine element.
