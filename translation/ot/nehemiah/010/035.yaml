id: NEH.10.35
reference: Nehemiah 10:35
source:
  edition: WLC
  text: וְ/הַ/גּוֹרָל֨וֹת הִפַּ֜לְנוּ עַל קֻרְבַּ֣ן הָ/עֵצִ֗ים הַ/כֹּהֲנִ֣ים הַ/לְוִיִּם֮
    וְ/הָ/עָם֒ לְ֠/הָבִיא לְ/בֵ֨ית אֱלֹהֵ֧י/נוּ לְ/בֵית אֲבֹתֵ֛י/נוּ לְ/עִתִּ֥ים מְזֻמָּנִ֖ים
    שָׁנָ֣ה בְ/שָׁנָ֑ה לְ/בַעֵ֗ר עַל מִזְבַּח֙ יְהוָ֣ה אֱלֹהֵ֔י/נוּ כַּ/כָּת֖וּב בַּ/תּוֹרָֽה־־־׃
translation:
  text: We cast lots concerning the wood offering—the priests, the Levites, and the
    people—to bring it to the house of our God, according to our fathers’ houses,
    at appointed times year by year, to burn on the altar of the LORD our God, as
    it is written in the Law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the wood offering.' The Hebrew preposition can be rendered either
      way; the sense is that lots were cast to assign responsibility for supplying
      the wood.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַגּוֹרָלוֹת הִפַּלְנוּ
  chosen: We cast lots
  alternatives:
  - we caused the lots to fall
  - we drew lots
  lexicon: HALOT
  rationale: The Hiphil of נפל with גּוֹרָלוֹת is the standard idiom for casting lots.
    'We cast lots' is idiomatic modern English while remaining close to the Hebrew.
- source_word: עַל קֻרְבַּן הָעֵצִים
  chosen: concerning the wood offering
  alternatives:
  - for the wood offering
  - about the offering of wood
  lexicon: HALOT
  rationale: עַל here introduces the matter decided by lot. קֻרְבַּן is 'offering'
    and הָעֵצִים specifies that the offering consists of wood supplied for altar use.
    'Concerning' best captures the administrative sense without implying the lots
    themselves were the offering.
- source_word: הַכֹּהֲנִים הַלְוִיִּם וְהָעָם
  chosen: the priests, the Levites, and the people
  lexicon: HALOT
  rationale: These are the three participating groups in apposition to the subject.
    The explicit listing should be preserved rather than compressed.
- source_word: לְהָבִיא
  chosen: to bring it
  alternatives:
  - to bring
  - to supply
  lexicon: HALOT
  rationale: The infinitive gives the purpose of the lot-casting. English naturally
    supplies 'it' referring back to the wood offering.
- source_word: לְבֵית אֱלֹהֵינוּ
  chosen: to the house of our God
  alternatives:
  - to the temple of our God
  lexicon: HALOT
  rationale: בַּיִת with God commonly refers to the temple, but 'house of our God'
    preserves the Hebrew expression and remains clear in context.
- source_word: לְבֵית אֲבֹתֵינוּ
  chosen: according to our fathers’ houses
  alternatives:
  - by our ancestral houses
  - by our family houses
  lexicon: HALOT
  rationale: The phrase denotes clan/family divisions. 'According to our fathers’
    houses' is a fairly literal rendering that preserves the social structure behind
    the assignment.
- source_word: לְעִתִּים מְזֻמָּנִים
  chosen: at appointed times
  alternatives:
  - at fixed times
  - at designated times
  lexicon: HALOT
  rationale: The phrase refers to scheduled occasions. 'Appointed times' is natural
    English and fits the cultic-administrative context.
- source_word: שָׁנָה בְשָׁנָה
  chosen: year by year
  alternatives:
  - from year to year
  - every year
  lexicon: HALOT
  rationale: The distributive expression indicates regular annual recurrence. 'Year
    by year' preserves the cadence and sense.
- source_word: לְבַעֵר עַל מִזְבַּח
  chosen: to burn on the altar
  alternatives:
  - to keep burning on the altar
  - to consume on the altar
  lexicon: HALOT
  rationale: בער in this context refers to burning the wood on the altar. 'To burn
    on the altar' is straightforward; 'keep burning' is possible but slightly more
    interpretive than the immediate syntax requires.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD' rather than a transliteration.
- source_word: כַּכָּתוּב בַּתּוֹרָה
  chosen: as it is written in the Law
  alternatives:
  - as written in the law
  - according to what is written in the Law
  lexicon: HALOT
  rationale: This formula appeals to scriptural prescription. Capitalizing 'Law' is
    appropriate here because the reference is to the Torah as a recognized body of
    instruction.
