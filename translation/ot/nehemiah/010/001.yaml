id: NEH.10.1
reference: Nehemiah 10:1
source:
  edition: WLC
  text: וּ/בְ/כָל זֹ֕את אֲנַ֛חְנוּ כֹּרְתִ֥ים אֲמָנָ֖ה וְ/כֹתְבִ֑ים וְ/עַל֙ הֶֽ/חָת֔וּם
    שָׂרֵ֥י/נוּ לְוִיֵּ֖/נוּ כֹּהֲנֵֽי/נוּ־׃
translation:
  text: And because of all this, we are making a binding agreement in writing, and
    on the sealed document are our officials, our Levites, and our priests.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And in all this we are cutting a firm agreement and writing it.' The
      Hebrew uses covenant-making language literally, 'cutting,' and the noun may
      be rendered 'firm agreement' or 'faithful pledge.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'on the sealed document' / 'upon the sealed deed.' The Hebrew likely
      refers to the written agreement as formally sealed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְכָל זֹאת
  chosen: And because of all this
  alternatives:
  - And in all this
  - And for all this
  lexicon: HALOT
  rationale: The preposition ב with כָּל זֹאת here is idiomatic and points back to
    the preceding confession and circumstances. 'Because of all this' best captures
    the causal force in natural English while preserving the backward reference.
- source_word: כֹּרְתִים
  chosen: are making
  alternatives:
  - cut
  - are cutting
  lexicon: HALOT
  rationale: The verb כרת with a covenant/agreement object is a standard idiom meaning
    'make/cut a covenant/agreement.' English normally uses 'make' rather than the
    literal 'cut' here.
- source_word: אֲמָנָה
  chosen: a binding agreement
  alternatives:
  - a sure covenant
  - a faithful pledge
  - a firm agreement
  lexicon: HALOT
  rationale: אֲמָנָה denotes a firm, trustworthy commitment or pledge. 'Binding agreement'
    communicates both the formal and obligatory nature of the act in clear modern
    English.
- source_word: וְכֹתְבִים
  chosen: in writing
  alternatives:
  - and writing it
  - and putting it in writing
  lexicon: HALOT
  rationale: The participle indicates the agreement is being committed to writing.
    'In writing' is concise, idiomatic English that preserves the sense without unnecessary
    expansion.
- source_word: וְעַל הֶחָתוּם
  chosen: and on the sealed document
  alternatives:
  - and on the sealed deed
  - and on the sealed text
  - and upon the sealed thing
  lexicon: HALOT
  rationale: The phrase refers to the written instrument as sealed. 'Document' is
    a natural modern equivalent for the written, sealed record; 'sealed document'
    preserves the legal/formal nuance.
- source_word: שָׂרֵינוּ
  chosen: our officials
  alternatives:
  - our princes
  - our leaders
  - our chiefs
  lexicon: HALOT
  rationale: שָׂרִים can mean princes, rulers, or officials. In this postexilic administrative
    context, 'officials' best conveys recognized civic leaders without implying royalty.
- source_word: לְוִיֵּינוּ
  chosen: our Levites
  lexicon: HALOT
  rationale: Standard transliteration of the tribal/cultic group name is appropriate.
- source_word: כֹּהֲנֵינוּ
  chosen: our priests
  lexicon: HALOT
  rationale: Straightforward rendering of the priestly group.
