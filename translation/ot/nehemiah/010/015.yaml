id: NEH.10.15
reference: Nehemiah 10:15
source:
  edition: WLC
  text: רָאשֵׁ֖י הָ/עָ֑ם פַּרְעֹשׁ֙ פַּחַ֣ת מוֹאָ֔ב עֵילָ֥ם זַתּ֖וּא בָּנִֽי׃
translation:
  text: 'the heads of the people: Parosh, Pahath-moab, Elam, Zattu, Bani.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'chiefs of the people' or 'leaders of the people.' The Hebrew literally
      says 'heads of the people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאשֵׁי
  chosen: the heads of
  alternatives:
  - chiefs of
  - leaders of
  lexicon: HALOT
  rationale: Construct plural of רֹאשׁ used idiomatically for persons in leading position.
    'Heads of' is a close, transparent rendering that preserves the Hebrew metaphor
    better than the more interpretive 'leaders.'
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: עם here refers to the community of Judah/Jerusalem represented in the
    covenant list. 'The people' is the standard and most natural rendering in this
    administrative/genealogical context.
- source_word: פַּרְעֹשׁ
  chosen: Parosh
  rationale: Proper personal/family name; transliterated in keeping with the translation
    philosophy to transliterate names rather than translate them.
- source_word: פַּחַת מוֹאָב
  chosen: Pahath-moab
  alternatives:
  - Pahath-Moab
  rationale: Proper name conventionally represented as a compound name. Hyphenation
    helps English readers recognize the two-part form while preserving the Hebrew
    name rather than translating it.
- source_word: עֵילָם
  chosen: Elam
  rationale: Proper personal/family name in this list; transliterated directly. Although
    'Elam' can denote a region elsewhere, here the context is a roster of signatories/clan
    heads, so it is best taken as the name.
- source_word: זַתּוּא
  chosen: Zattu
  alternatives:
  - Zatthu
  rationale: Proper personal/family name; transliterated according to standard English
    biblical convention.
- source_word: בָּנִי
  chosen: Bani
  alternatives:
  - Binnui
  rationale: The consonantal form here supports 'Bani.' Some nearby genealogical contexts
    feature similar names, but this verse's form is best rendered 'Bani' without harmonization.
