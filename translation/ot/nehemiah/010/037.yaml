id: NEH.10.37
reference: Nehemiah 10:37
source:
  edition: WLC
  text: וְ/אֶת בְּכֹר֤וֹת בָּנֵ֨י/נוּ֙ וּ/בְהֶמְתֵּ֔י/נוּ כַּ/כָּת֖וּב בַּ/תּוֹרָ֑ה
    וְ/אֶת בְּכוֹרֵ֨י בְקָרֵ֜י/נוּ וְ/צֹאנֵ֗י/נוּ לְ/הָבִיא֙ לְ/בֵ֣ית אֱלֹהֵ֔י/נוּ
    לַ/כֹּ֣הֲנִ֔ים הַ/מְשָׁרְתִ֖ים בְּ/בֵ֥ית אֱלֹהֵֽי/נוּ־־׃
translation:
  text: and the firstborn of our sons and of our livestock, as it is written in the
    Law, and the firstborn of our herds and of our flocks, to bring to the house of
    our God, to the priests who minister in the house of our God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, in keeping with the Torah's commands concerning the firstborn of
      people and animals.
    reason: cross_reference
  - marker: b
    text: Or 'the firstborn of our cattle and of our sheep/goats.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּכֹרוֹת בָּנֵינוּ
  chosen: the firstborn of our sons
  alternatives:
  - the firstborn among our sons
  lexicon: HALOT
  rationale: בְּכֹרוֹת denotes firstborn ones; with בָּנֵינוּ the sense is the firstborn
    males from among their sons. 'Of our sons' is natural English and preserves the
    genitival relation without over-specifying beyond the Hebrew.
- source_word: וּבְהֶמְתֵּינוּ
  chosen: and of our livestock
  alternatives:
  - and of our cattle
  - and of our animals
  lexicon: HALOT
  rationale: בְּהֵמָה can refer broadly to domestic animals/livestock. 'Livestock'
    best captures the collective sense here, especially since the verse then specifies
    herds and flocks more particularly.
- source_word: כַּכָּתוּב בַּתּוֹרָה
  chosen: as it is written in the Law
  alternatives:
  - as written in the law
  - according to what is written in the Law
  lexicon: HALOT
  rationale: This formula appeals to written Torah instruction. Capitalizing 'Law'
    reflects the specific reference to the Torah, not law in general.
- source_word: בְּכוֹרֵי בְקָרֵינוּ וְצֹאנֵינוּ
  chosen: the firstborn of our herds and of our flocks
  alternatives:
  - the firstborn of our cattle and our sheep
  - the firstborn of our cattle and of our flocks
  lexicon: HALOT
  rationale: בָּקָר refers to herd animals, especially cattle; צֹאן refers small livestock,
    sheep/goats. 'Herds and flocks' is idiomatic and preserves the distinction without
    awkward repetition.
- source_word: לְהָבִיא
  chosen: to bring
  alternatives:
  - for bringing
  lexicon: HALOT
  rationale: The infinitive expresses purpose/result in continuation of the covenant
    commitment. 'To bring' is the most straightforward rendering in English.
- source_word: לְבֵית אֱלֹהֵינוּ
  chosen: to the house of our God
  alternatives:
  - to our God's house
  - to the temple of our God
  lexicon: HALOT
  rationale: '''House of our God'' is the standard literal expression for the temple.
    ''Temple'' would be interpretive; the more formal phrase preserves the Hebrew
    wording and covenantal tone.'
- source_word: לַכֹּהֲנִים הַמְשָׁרְתִים
  chosen: to the priests who minister
  alternatives:
  - to the ministering priests
  - to the priests serving
  lexicon: HALOT
  rationale: הַמְשָׁרְתִים is a participle describing the priests' ongoing service.
    'Who minister' is clear modern English and retains the cultic sense.
- source_word: בְּבֵית אֱלֹהֵינוּ
  chosen: in the house of our God
  alternatives:
  - in our God's house
  lexicon: HALOT
  rationale: Repeating the phrase mirrors the Hebrew emphasis and keeps the temple
    reference explicit.
- source_word: וְאֶת ... וְאֶת
  chosen: and ... and
  alternatives:
  - also ... and
  lexicon: HALOT
  rationale: The repeated object marker with conjunction links items in a list of
    covenant obligations. English does not represent the object marker directly, so
    simple coordination is the best equivalent.
