theological_decisions:
- issue: Whether to render בֵּית אֱלֹהֵינוּ as 'house of our God' or interpretively
    as 'temple'
  chosen_reading: house of our God
  alternative_readings:
  - temple of our God
  rationale: The Hebrew literally says 'house of our God.' While the referent is the
    temple, retaining 'house' preserves the source wording and avoids unnecessary
    interpretive expansion.
  doctrine_reference: Translation philosophy §1, §6
- issue: Whether 'firstborn' of sons and animals should be made explicitly sacrificial/redeemable
    in the main text
  chosen_reading: retain the broader term 'firstborn' without adding explanatory wording
  alternative_readings:
  - firstborn to be redeemed
  - firstborn offerings
  rationale: The verse alludes to Torah requirements but does not itself spell out
    redemption versus sacrifice. The translation preserves that textual restraint
    rather than importing legal detail from elsewhere.
  doctrine_reference: Translation philosophy §1, §3
