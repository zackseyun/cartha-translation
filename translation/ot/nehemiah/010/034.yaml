id: NEH.10.34
reference: Nehemiah 10:34
source:
  edition: WLC
  text: לְ/לֶ֣חֶם הַֽ/מַּעֲרֶ֡כֶת וּ/מִנְחַ֣ת הַ/תָּמִ֣יד וּ/לְ/עוֹלַ֣ת הַ֠/תָּמִיד
    הַ/שַּׁבָּת֨וֹת הֶ/חֳדָשִׁ֜ים לַ/מּוֹעֲדִ֗ים וְ/לַ/קֳּדָשִׁים֙ וְ/לַ֣/חַטָּא֔וֹת
    לְ/כַפֵּ֖ר עַל יִשְׂרָאֵ֑ל וְ/כֹ֖ל מְלֶ֥אכֶת בֵּית אֱלֹהֵֽי/נוּ־־׃ס
translation:
  text: for the bread of the arrangement, and for the regular grain offering, and
    for the regular burnt offering of the Sabbaths, the new moons, the appointed times,
    and the holy things, and for the sin offerings to make atonement for Israel, and
    for all the work of the house of our God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the showbread' or 'the bread set out.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the continual grain offering' and 'the continual burnt offering.'
    reason: lexical_alternative
  - marker: c
    text: '''Appointed times'' can include the set festival occasions.'
    reason: lexical_alternative
  - marker: d
    text: Or 'the holy offerings' or 'the consecrated things.'
    reason: lexical_alternative
  - marker: e
    text: '''Sin offerings'' may also be understood in some contexts as ''purification
      offerings.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶחֶם הַמַּעֲרֶכֶת
  chosen: the bread of the arrangement
  alternatives:
  - the showbread
  - the bread set out
  lexicon: HALOT
  rationale: Literally 'bread of the arrangement/setting in order.' Chosen wording
    stays close to the Hebrew while remaining intelligible. 'Showbread' is traditional
    but archaic and less transparent; 'bread set out' is possible but more interpretive.
- source_word: מִנְחַת הַתָּמִיד
  chosen: the regular grain offering
  alternatives:
  - the continual grain offering
  - the daily grain offering
  lexicon: HALOT
  rationale: מִנְחָה in cultic context commonly denotes a grain offering. תָּמִיד
    indicates regular/continual recurrence. 'Regular' is clear modern English and
    fits optimal equivalence.
- source_word: עֹלַת הַתָּמִיד
  chosen: the regular burnt offering
  alternatives:
  - the continual burnt offering
  - the daily burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard whole burnt offering. תָּמִיד again marks the recurring
    prescribed offering. 'Regular burnt offering' preserves the cultic term while
    reading naturally.
- source_word: הַשַּׁבָּתוֹת הֶחֳדָשִׁים לַמּוֹעֲדִים
  chosen: of the Sabbaths, the new moons, the appointed times
  alternatives:
  - for the Sabbaths, the new moons, and the festivals
  lexicon: HALOT
  rationale: These terms likely specify the occasions associated with the regular
    burnt offering. 'Appointed times' is preferred for מוֹעֲדִים because it is broader
    and more literal than 'festivals,' though festival days are included.
- source_word: וְלַקֳּדָשִׁים
  chosen: and the holy things
  alternatives:
  - and the holy offerings
  - and the consecrated things
  lexicon: HALOT
  rationale: The plural of קֹדֶשׁ here broadly denotes holy/consecrated items or matters
    connected with temple service. 'Holy things' preserves the breadth of the Hebrew
    without narrowing it to offerings alone.
- source_word: וְלַחַטָּאוֹת
  chosen: and for the sin offerings
  alternatives:
  - and for the sin sacrifices
  - and for the purification offerings
  lexicon: HALOT
  rationale: חַטָּאת in sacrificial contexts commonly refers to a sin offering. 'Purification
    offering' is argued by some in priestly contexts, but here 'sin offerings' remains
    the most recognizable and sufficiently accurate rendering.
- source_word: לְכַפֵּר עַל יִשְׂרָאֵל
  chosen: to make atonement for Israel
  alternatives:
  - to atone for Israel
  - to make expiation for Israel
  lexicon: HALOT
  rationale: כפר in sacrificial context is conventionally and accurately rendered
    'make atonement.' This preserves the theological and cultic force without importing
    a narrower doctrinal explanation.
- source_word: וְכֹל מְלֶאכֶת בֵּית אֱלֹהֵינוּ
  chosen: and for all the work of the house of our God
  alternatives:
  - and for all the service of the house of our God
  - and for all the labor of the house of our God
  lexicon: HALOT
  rationale: מְלָאכָה is broad 'work/labor.' 'Work' best preserves the general scope
    of temple-related responsibilities and expenses in context. 'Service' would narrow
    the sense toward liturgical ministry alone.
