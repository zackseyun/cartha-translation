theological_decisions:
- issue: Rendering sacrificial terminology without over-interpretation
  chosen_reading: Retain established cultic terms such as 'grain offering,' 'burnt
    offering,' 'sin offerings,' and 'make atonement.'
  alternative_readings:
  - Use more interpretive renderings such as 'gift offering,' 'whole offering,' or
    'purification offerings'
  rationale: The verse is an inventory of temple provisions and sacrificial obligations.
    Traditional-but-clear cultic terminology best preserves the Hebrew categories
    without importing later doctrinal precision beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Scope of קֳּדָשִׁים
  chosen_reading: Translate broadly as 'the holy things.'
  alternative_readings:
  - '''holy offerings'''
  - '''consecrated gifts'''
  rationale: The Hebrew expression is not specific enough to justify narrowing the
    reference. Preserving breadth maintains the textual ambiguity rather than resolving
    it.
  doctrine_reference: Translation philosophy §3
