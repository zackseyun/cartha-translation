id: NEH.10.20
reference: Nehemiah 10:20
source:
  edition: WLC
  text: חָרִ֥יף עֲנָת֖וֹת נובי׃
translation:
  text: Hariph, Anathoth, Nobai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Anathoth is also the name of a town; here it is retained as a proper name/designation
      in the list of covenant signers.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָרִיף
  chosen: Hariph
  alternatives:
  - Harif
  rationale: Proper name in a covenant-signers list; transliterated rather than translated
    per translation philosophy. English form 'Hariph' follows a straightforward consonantal
    transliteration of the Hebrew name.
- source_word: עֲנָתוֹת
  chosen: Anathoth
  rationale: Although elsewhere this form is the place name Anathoth, here in a list
    of signatories it functions as a proper name/designation and is best preserved
    by transliteration. No article or other marker requires translating it as a common
    noun.
- source_word: נובי
  chosen: Nobai
  alternatives:
  - Nobi
  rationale: Proper name in the list; transliterated. 'Nobai' reflects the likely
    conventional English representation of the final yod in this name.
