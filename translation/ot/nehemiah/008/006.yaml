id: NEH.8.6
reference: Nehemiah 8:6
source:
  edition: WLC
  text: וַ/יְבָ֣רֶךְ עֶזְרָ֔א אֶת יְהוָ֥ה הָ/אֱלֹהִ֖ים הַ/גָּד֑וֹל וַ/יַּֽעֲנ֨וּ כָל הָ/עָ֜ם אָמֵ֤ן אָמֵן֙ בְּ/מֹ֣עַל יְדֵי/הֶ֔ם וַ/יִּקְּד֧וּ וַ/יִּשְׁתַּחֲוֻּ֛ לַ/יהוָ֖ה אַפַּ֥יִם אָֽרְצָ/ה־־׀׃
translation:
  text: And Ezra blessed Yahweh, the great God, and all the people answered, “Amen, Amen,” while lifting up their hands. Then they bowed down and worshiped Yahweh with their faces to the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: “Amen, Amen,” a repeated liturgical response of assent.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיְבָרֶךְ
  chosen: blessed
  alternatives:
  - praised
  lexicon: HALOT
  rationale: ברך in the piel with God as object commonly means to bless in the sense of speaking blessing/praise toward God. 'Blessed' preserves the lexical form and traditional biblical idiom better than the more interpretive 'praised.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הָאֱלֹהִים הַגָּדוֹל
  chosen: the great God
  alternatives:
  - God the great one
  - the God, the great one
  lexicon: HALOT
  rationale: The phrase appositionally identifies YHWH as 'the great God.' Smooth English drops the repeated article while preserving the emphasis of גדול.
- source_word: וַיַּעֲנוּ
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: ענה in this context introduces the people's spoken response. 'Answered' is the most direct equivalent.
- source_word: אָמֵן אָמֵן
  chosen: Amen, Amen
  alternatives:
  - Truly, truly
  - So be it, so be it
  lexicon: HALOT
  rationale: אָמֵן is best preserved by transliteration in liturgical response. Repetition conveys emphatic assent and should remain in the main text.
- source_word: בְּמֹעַל יְדֵיהֶם
  chosen: while lifting up their hands
  alternatives:
  - with the lifting of their hands
  - as they raised their hands
  lexicon: HALOT
  rationale: The prepositional phrase denotes accompanying action or manner. 'While lifting up their hands' is natural English that preserves the gesture without over-literal awkwardness.
- source_word: וַיִּקְּדוּ
  chosen: bowed down
  alternatives:
  - knelt
  - stooped low
  lexicon: HALOT
  rationale: קדד denotes bowing/bending low. 'Bowed down' fits the worship setting and pairs naturally with the following verb without collapsing the two actions.
- source_word: וַיִּשְׁתַּחֲווּ
  chosen: worshiped
  alternatives:
  - prostrated themselves
  - bowed in worship
  lexicon: HALOT
  rationale: The verb commonly denotes prostration as an act of worship. Since the previous verb already expresses bodily bowing, 'worshiped' preserves the devotional force and avoids redundancy while keeping both actions distinct.
- source_word: אַפַּיִם אָרְצָה
  chosen: with their faces to the ground
  alternatives:
  - with their nostrils to the earth
  - face-down to the ground
  lexicon: HALOT
  rationale: Literally 'nostrils/faces earthward,' an idiom for full prostration. 'With their faces to the ground' is the standard natural equivalent that communicates the posture clearly.
