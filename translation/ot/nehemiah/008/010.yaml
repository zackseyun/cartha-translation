id: NEH.8.10
reference: Nehemiah 8:10
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר לָ/הֶ֡ם לְכוּ֩ אִכְל֨וּ מַשְׁמַנִּ֜ים וּ/שְׁת֣וּ מַֽמְתַקִּ֗ים וְ/שִׁלְח֤וּ מָנוֹת֙ לְ/אֵ֣ין נָכ֣וֹן ל֔/וֹ כִּֽי קָד֥וֹשׁ הַ/יּ֖וֹם לַ/אֲדֹנֵ֑י/נוּ וְ/אַל תֵּ֣עָצֵ֔בוּ כִּֽי חֶדְוַ֥ת יְהוָ֖ה הִ֥יא מָֽעֻזְּ/כֶֽם־־־׃
translation:
  text: Then he said to them, “Go, eat rich food and drink sweet drinks, and send portions to anyone for whom nothing is prepared, for this day is holy to our Lord. And do not be grieved, for the joy of Yahweh is your stronghold.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'send portions to him for whom nothing is prepared.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'for the joy in the LORD is your stronghold.'
    reason: alternative_reading
  - marker: c
    text: Hebrew 'the joy of YHWH'; rendered 'the LORD' according to the project standard for the divine name.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשְׁמַנִּים
  chosen: rich food
  alternatives:
  - fat things
  - choice foods
  lexicon: HALOT
  rationale: The noun refers literally to fat/rich things, idiomatically rich or choice foods suitable for celebration. 'Rich food' preserves the festive sense in natural English without woodenly foregrounding 'fat.'
- source_word: מַֽמְתַקִּים
  chosen: sweet drinks
  alternatives:
  - sweet things
  - sweet wine
  lexicon: HALOT
  rationale: The term denotes sweet things; in parallel with 'drink' it is best specified as sweet drinks. 'Sweet wine' is possible in some contexts, but the Hebrew here is broader and need not be narrowed.
- source_word: מָנוֹת
  chosen: portions
  alternatives:
  - shares
  - portions of food
  lexicon: HALOT
  rationale: In a feast context the word refers to portions distributed to others, especially food portions. 'Portions' is concise and idiomatic.
- source_word: לְאֵין נָכוֹן לוֹ
  chosen: to anyone who has nothing prepared
  alternatives:
  - to him for whom nothing is prepared
  - to anyone who has nothing ready
  lexicon: HALOT
  rationale: נָכוֹן conveys something prepared or made ready. The phrase refers to those unable to prepare festive provisions. Rendering with 'anyone' communicates the indefinite singular naturally in English.
- source_word: קָדוֹשׁ
  chosen: holy
  alternatives:
  - set apart
  - sacred
  lexicon: HALOT
  rationale: '''Holy'' is the standard and theologically weighty rendering for קדושׁ, fitting a day consecrated to God.'
- source_word: לַאֲדֹנֵינוּ
  chosen: to our Lord
  alternatives:
  - to our master
  lexicon: HALOT
  rationale: אדון here refers to God in a reverential sense. 'Lord' matches the doctrinal default for divine title language and fits the cultic context.
- source_word: תֵּעָצֵבוּ
  chosen: do not be grieved
  alternatives:
  - do not sorrow
  - do not be sad
  lexicon: HALOT
  rationale: The verb denotes being pained, hurt, or grieved. 'Do not be grieved' best captures the emotional force while remaining natural English.
- source_word: חֶדְוַת יְהוָה
  chosen: the joy of the LORD
  alternatives:
  - the LORD's joy
  - joy in the LORD
  lexicon: HALOT
  rationale: The construct can be understood as 'the joy of the LORD.' This preserves the Hebrew form and the traditional theological tension. 'Joy in the LORD' is interpretive and is therefore preserved as an alternative in a footnote rather than adopted in the main text.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מָעֻזְּכֶם
  chosen: your stronghold
  alternatives:
  - your strength
  - your refuge
  lexicon: HALOT
  rationale: The noun commonly denotes a place or source of strength, a fortress or stronghold. 'Stronghold' preserves the concrete metaphor better than the flatter 'strength,' while still making sense in English.
