id: NEH.8.9
reference: Nehemiah 8:9
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר נְחֶמְיָ֣ה ה֣וּא הַ/תִּרְשָׁ֡תָא וְ/עֶזְרָ֣א הַ/כֹּהֵ֣ן הַ/סֹּפֵ֡ר וְ/הַ/לְוִיִּם֩ הַ/מְּבִינִ֨ים אֶת הָ/עָ֜ם לְ/כָל הָ/עָ֗ם הַ/יּ֤וֹם קָדֹֽשׁ הוּא֙ לַ/יהוָ֣ה אֱלֹהֵי/כֶ֔ם אַל תִּֽתְאַבְּל֖וּ וְ/אַל תִּבְכּ֑וּ כִּ֤י בוֹכִים֙ כָּל הָ/עָ֔ם כְּ/שָׁמְעָ֖/ם אֶת דִּבְרֵ֥י הַ/תּוֹרָֽה׀־־־־־־־׃
translation:
  text: Then Nehemiah the governor, Ezra the priest and scribe, and the Levites who were instructing the people said to all the people, “This day is holy to Yahweh your God. Do not mourn or weep.” For all the people were weeping as they heard the words of the law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Tirshatha,” a Persian administrative title.
    reason: lexical_alternative
  - marker: b
    text: Or “the words of the Torah.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הַתִּרְשָׁתָא
  chosen: the governor
  alternatives:
  - the Tirshatha
  lexicon: HALOT
  rationale: An official Persian-period title. Translating the title communicates its function in clear English better than transliterating an obscure administrative term.
- source_word: הַכֹּהֵן הַסֹּפֵר
  chosen: the priest and scribe
  alternatives:
  - the priest, the scribe
  - the priestly scribe
  lexicon: HALOT
  rationale: Both nouns are appositional titles for Ezra. 'The priest and scribe' preserves both roles without overcompressing them.
- source_word: הַלְוִיִּם הַמְּבִינִים אֶת־הָעָם
  chosen: the Levites who were instructing the people
  alternatives:
  - the Levites who were giving understanding to the people
  - the Levites who made the people understand
  lexicon: HALOT
  rationale: The Hiphil participle of בין here denotes causing understanding or giving instruction. 'Instructing' is natural English while preserving the educational function.
- source_word: הַיּוֹם קָדֹשׁ הוּא
  chosen: This day is holy
  alternatives:
  - Today is holy
  - This day is sacred
  lexicon: HALOT
  rationale: A straightforward predication. 'Holy' preserves the cultic-religious sense better than the broader 'sacred.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' The preposition ל here can be expressed as 'to' or 'for'; 'to the LORD' closely reflects the Hebrew while remaining idiomatic.
- source_word: תִּתְאַבְּלוּ
  chosen: mourn
  alternatives:
  - grieve
  - lament
  lexicon: HALOT
  rationale: The verb denotes mourning, often with outward signs of grief. 'Mourn' pairs well with the following 'weep' and preserves the distinction between general mourning and crying.
- source_word: תִּבְכּוּ / בוֹכִים
  chosen: weep / were weeping
  alternatives:
  - cry / were crying
  lexicon: HALOT
  rationale: '''Weep'' better matches the solemn emotional register of the scene than the more colloquial ''cry.'''
- source_word: כְּשָׁמְעָם
  chosen: as they heard
  alternatives:
  - when they heard
  - upon hearing
  lexicon: HALOT
  rationale: The prefixed כ marks contemporaneous action; 'as they heard' captures the ongoing response during the reading.
- source_word: דִּבְרֵי הַתּוֹרָה
  chosen: the words of the law
  alternatives:
  - the words of the Torah
  - the words of the instruction
  lexicon: HALOT
  rationale: תּוֹרָה can mean instruction broadly, but in this public covenant-reading context 'the law' is the most natural and contextually established rendering. 'Torah' is a viable alternative but less transparent for general English readers.
