id: NEH.8.1
reference: Nehemiah 8:1
source:
  edition: WLC
  text: וַ/יֵּאָסְפ֤וּ כָל הָ/עָם֙ כְּ/אִ֣ישׁ אֶחָ֔ד אֶל הָ֣/רְח֔וֹב אֲשֶׁ֖ר לִ/פְנֵ֣י שַֽׁעַר הַ/מָּ֑יִם וַ/יֹּֽאמְרוּ֙ לְ/עֶזְרָ֣א הַ/סֹּפֵ֔ר לְ/הָבִ֗יא אֶת סֵ֨פֶר֙ תּוֹרַ֣ת מֹשֶׁ֔ה אֲשֶׁר צִוָּ֥ה יְהוָ֖ה אֶת יִשְׂרָאֵֽל־־־־־־׃
translation:
  text: And all the people gathered as one man at the square that was before the Water Gate, and they told Ezra the scribe to bring the Book of the Law of Moses, which Yahweh had commanded Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''as one man,'' an idiom meaning ''as one'' or ''with one accord.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּאָסְפוּ
  chosen: gathered
  alternatives:
  - assembled
  lexicon: HALOT
  rationale: Niphal wayyiqtol of אסף here denotes the people coming together. 'Gathered' is natural modern English and preserves the collective action without overinterpreting formality.
- source_word: כָל הָעָם
  chosen: all the people
  alternatives:
  - the whole people
  lexicon: HALOT
  rationale: The phrase is distributive/collective, referring to the gathered community. 'All the people' is the most idiomatic English equivalent.
- source_word: כְּאִישׁ אֶחָד
  chosen: as one man
  alternatives:
  - as one
  - with one accord
  lexicon: HALOT
  rationale: This idiom emphasizes unified action. Because the translation philosophy is gender-accurate over gender-neutral, and the Hebrew uses 'man' in the idiom, 'as one man' is retained in the main text. A footnote preserves the smoother English alternative 'as one.'
- source_word: הָרְחוֹב
  chosen: the square
  alternatives:
  - the open square
  - the plaza
  lexicon: HALOT
  rationale: The term denotes an open public place in a city, not a street in the modern sense. 'The square' is concise and idiomatic.
- source_word: לִפְנֵי שַׁעַר הַמָּיִם
  chosen: before the Water Gate
  alternatives:
  - in front of the Water Gate
  lexicon: HALOT
  rationale: This is a straightforward locative expression. 'Before' preserves the Hebrew phrasing while remaining clear in English.
- source_word: וַיֹּאמְרוּ לְעֶזְרָא
  chosen: they told Ezra
  alternatives:
  - they said to Ezra
  - they asked Ezra
  lexicon: HALOT
  rationale: The verb is simply 'said,' but in English with an infinitive complement ('to bring') 'told' is the most natural rendering. 'Asked' would add politeness/request nuance not explicit in the Hebrew.
- source_word: הַסֹּפֵר
  chosen: the scribe
  alternatives:
  - the scholar
  lexicon: HALOT
  rationale: The title identifies Ezra in his recognized role as a learned copyist/expert in the law. 'Scribe' is the standard and sufficiently transparent rendering.
- source_word: לְהָבִיא
  chosen: to bring
  alternatives:
  - to bring out
  lexicon: HALOT
  rationale: The Hiphil infinitive of בוא here means to cause to come, i.e., bring. 'Bring out' is possible contextually but adds a directional nuance not explicit in the text.
- source_word: סֵפֶר תּוֹרַת מֹשֶׁה
  chosen: the Book of the Law of Moses
  alternatives:
  - the scroll of the law of Moses
  - the book of Moses' law
  lexicon: HALOT
  rationale: סֵפֶר can denote a scroll/book; 'Book' is conventional and understandable. 'Law of Moses' accurately renders the construct phrase without implying authorship beyond the Hebrew expression.
- source_word: אֲשֶׁר צִוָּה יְהוָה אֶת יִשְׂרָאֵל
  chosen: which the LORD had commanded for Israel
  alternatives:
  - which the LORD had commanded Israel
  - which the LORD commanded concerning Israel
  lexicon: HALOT
  rationale: The Hebrew object marker with Israel after צוה is somewhat compressed. In context, the sense is that this law is what the LORD commanded for Israel, i.e., laid upon them. 'For Israel' avoids the awkwardness of English 'commanded Israel' with 'book' as the direct object while preserving the covenantal sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
