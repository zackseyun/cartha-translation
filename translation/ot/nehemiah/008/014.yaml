id: NEH.8.14
reference: Nehemiah 8:14
source:
  edition: WLC
  text: וַֽ/יִּמְצְא֖וּ כָּת֣וּב בַּ/תּוֹרָ֑ה אֲשֶׁ֨ר צִוָּ֤ה יְהוָה֙ בְּ/יַד מֹשֶׁ֔ה אֲשֶׁר֩ יֵשְׁב֨וּ בְנֵֽי יִשְׂרָאֵ֧ל בַּ/סֻּכּ֛וֹת בֶּ/חָ֖ג בַּ/חֹ֥דֶשׁ הַ/שְּׁבִיעִֽי־־׃
translation:
  text: And they found it written in the Law that Yahweh had commanded through Moses that the sons of Israel should dwell in booths during the feast, in the seventh month.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or 'the children of Israel'; Hebrew 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְצְאוּ
  chosen: they found
  alternatives:
  - they discovered
  lexicon: HALOT
  rationale: Wayyiqtol of מצא narrates a past event; 'found' is the most natural and direct rendering in context.
- source_word: כָּתוּב
  chosen: written
  alternatives:
  - recorded
  lexicon: HALOT
  rationale: Passive participle functioning predicatively after 'found'; 'found it written' preserves the Hebrew construction better than a looser paraphrase.
- source_word: בַּתּוֹרָה
  chosen: in the Law
  alternatives:
  - in the Torah
  - in the instruction
  lexicon: HALOT
  rationale: תּוֹרָה here refers to the Mosaic legal corpus. 'Law' is standard and clear in English, while still reflecting the covenantal written instruction.
- source_word: צִוָּה יְהוָה
  chosen: the LORD had commanded
  alternatives:
  - the LORD commanded
  lexicon: HALOT
  rationale: YHWH is rendered 'the LORD' per doctrine. The pluperfect-like English 'had commanded' fits the sense of a prior command now being found in the written Law.
- source_word: בְּיַד מֹשֶׁה
  chosen: through Moses
  alternatives:
  - by the hand of Moses
  - by Moses
  lexicon: HALOT
  rationale: The idiom 'by the hand of' commonly denotes agency or mediation. 'Through Moses' is idiomatic modern English and preserves Moses' mediating role.
- source_word: יֵשְׁבוּ
  chosen: should dwell
  alternatives:
  - should live
  - should sit
  - should stay
  lexicon: HALOT
  rationale: ישב in this festival context refers to residing or dwelling in temporary shelters. 'Dwell' best matches the formal cultic instruction.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'sons of Israel.' Per gender-accurate philosophy, this is preserved rather than neutralized to 'Israelites,' while still functioning corporately.
- source_word: בַּסֻּכּוֹת
  chosen: in booths
  alternatives:
  - in shelters
  - in tabernacles
  lexicon: HALOT
  rationale: סֻכּוֹת denotes temporary leafy shelters/booths used for the festival. 'Booths' is the standard, concrete rendering and avoids the archaic or misleading 'tabernacles'.
- source_word: בֶּחָג
  chosen: during the feast
  alternatives:
  - at the feast
  - during the festival
  lexicon: HALOT
  rationale: With the article, this likely refers to the known feast contextually, namely the festival being discussed. 'During the feast' reads naturally in English.
- source_word: בַּחֹדֶשׁ הַשְּׁבִיעִי
  chosen: in the seventh month
  alternatives:
  - during the seventh month
  lexicon: HALOT
  rationale: A straightforward temporal phrase; 'in the seventh month' is the most direct rendering.
