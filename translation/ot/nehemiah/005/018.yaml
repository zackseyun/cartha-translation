theological_decisions:
- issue: Socio-economic nuance of Nehemiah's refusal of official support
  chosen_reading: Nehemiah declined the governor's entitled provisions out of concern
    for the people's burden
  alternative_readings:
  - Nehemiah simply did not request bread from the governor
  - Nehemiah refused a tax or levy associated with the office
  rationale: The verse is not primarily theological in a doctrinal sense, but it does
    present an ethical posture. Rendering לֶחֶם הַפֶּחָה as 'food allowance' and לֹא
    בִקַּשְׁתִּי as 'I did not demand' preserves the sense that he waived an official
    entitlement because the people were already heavily burdened, without importing
    broader claims beyond the text.
  doctrine_reference: Translation philosophy §§1, 5, 6
