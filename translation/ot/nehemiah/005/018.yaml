id: NEH.5.18
reference: Nehemiah 5:18
source:
  edition: WLC
  text: וַ/אֲשֶׁר֩ הָיָ֨ה נַעֲשֶׂ֜ה לְ/י֣וֹם אֶחָ֗ד שׁ֣וֹר אֶחָ֞ד צֹ֠אן שֵׁשׁ בְּרֻר֤וֹת
    וְ/צִפֳּרִים֙ נַֽעֲשׂוּ לִ֔/י וּ/בֵ֨ין עֲשֶׂ֧רֶת יָמִ֛ים בְּ/כָל יַ֖יִן לְ/הַרְבֵּ֑ה
    וְ/עִם זֶ֗ה לֶ֤חֶם הַ/פֶּחָה֙ לֹ֣א בִקַּ֔שְׁתִּי כִּֽי כָֽבְדָ֥ה הָ/עֲבֹדָ֖ה עַל
    הָ/עָ֥ם הַ/זֶּֽה־־־־־־׃
translation:
  text: Now what was prepared for each day was one ox and six choice sheep; also birds
    were prepared for me, and every ten days an abundance of every kind of wine. Yet
    even with this, I did not demand the governor’s food allowance, because the service
    was heavy on this people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the governor’s bread' or 'the governor’s provisions.' The Hebrew literally
      says 'the bread of the governor,' likely referring to the official food allotment
      or allowance attached to the office.
    reason: lexical_alternative
  - marker: b
    text: Or 'the labor was burdensome' or 'the work was severe.' The Hebrew phrase
      emphasizes the weight of the people's burden.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲשֶׁר הָיָה נַעֲשֶׂה
  chosen: Now what was prepared
  alternatives:
  - And what was made
  - Now what used to be prepared
  lexicon: HALOT
  rationale: The clause introduces a summary of daily provisions. נַעֲשֶׂה from עשה
    in the passive is best rendered 'was prepared' in food context rather than the
    more wooden 'was made.' The prefixed וַאֲשֶׁר is discourse-linking, here naturally
    rendered 'Now what.'
- source_word: לְיוֹם אֶחָד
  chosen: for each day
  alternatives:
  - for one day
  - daily
  lexicon: HALOT
  rationale: Literally 'for one day,' but in context of recurring provisions it denotes
    the amount for a single day, hence 'for each day' is the clearest optimal-equivalence
    rendering.
- source_word: שׁוֹר אֶחָד
  chosen: one ox
  alternatives:
  - one bull
  - one head of cattle
  lexicon: HALOT
  rationale: שׁוֹר is a bovine animal; 'ox' is a natural general rendering in provisioning
    context and avoids over-specifying sex as 'bull' where the text's emphasis is
    quantity.
- source_word: צֹאן שֵׁשׁ בְּרֻרוֹת
  chosen: six choice sheep
  alternatives:
  - six select sheep
  - six choice animals from the flock
  lexicon: HALOT
  rationale: צֹאן can denote small livestock collectively, but with the numeral and
    food context, 'sheep' is a natural English specification. בְּרֻרוֹת conveys selected/choice
    quality, so 'choice sheep' communicates both number and quality succinctly.
- source_word: וְצִפֳּרִים נַעֲשׂוּ לִי
  chosen: also birds were prepared for me
  alternatives:
  - and birds were made ready for me
  - and fowl were prepared for me
  lexicon: HALOT
  rationale: צִפֳּרִים is a broad term for birds/fowl. In a meal-provision context,
    'birds' is straightforward modern English; 'prepared' carries over the culinary
    sense from the earlier passive verb.
- source_word: וּבֵין עֲשֶׂרֶת יָמִים
  chosen: and every ten days
  alternatives:
  - and between ten days
  - and at intervals of ten days
  lexicon: HALOT
  rationale: The idiom indicates a recurring interval, not a vague span 'between ten
    days.' 'Every ten days' best captures the temporal sense in idiomatic English.
- source_word: בְּכָל יַיִן לְהַרְבֵּה
  chosen: an abundance of every kind of wine
  alternatives:
  - all kinds of wine in abundance
  - much wine of every sort
  lexicon: HALOT
  rationale: The phrase combines comprehensiveness (בְּכָל) with quantity (לְהַרְבֵּה).
    'An abundance of every kind of wine' preserves both ideas in readable English.
- source_word: וְעִם זֶה
  chosen: Yet even with this
  alternatives:
  - And with this
  - Besides this
  lexicon: HALOT
  rationale: 'The phrase marks concession/contrast with what precedes: despite these
    provisions, Nehemiah did not claim an official allowance. ''Yet even with this''
    makes that contrast explicit.'
- source_word: לֶחֶם הַפֶּחָה
  chosen: the governor’s food allowance
  alternatives:
  - the governor's bread
  - the governor's provisions
  lexicon: HALOT
  rationale: Literally 'the bread of the governor,' but לֶחֶם often stands metonymically
    for food/provisions. In context of official entitlement, 'food allowance' best
    conveys the sense of the governor's ration or provision due to office.
- source_word: לֹא בִקַּשְׁתִּי
  chosen: I did not demand
  alternatives:
  - I did not ask for
  - I did not require
  lexicon: HALOT
  rationale: בקשׁ can mean ask/seek/request, but here in administrative context of
    an entitled allowance, 'demand' or 'require' better reflects declining a legitimate
    claim rather than merely failing to ask.
- source_word: כִּי כָבְדָה הָעֲבֹדָה
  chosen: because the service was heavy
  alternatives:
  - because the labor was burdensome
  - because the work was severe
  lexicon: HALOT
  rationale: עֲבֹדָה can mean work, labor, service, or burden. In this socio-economic
    context, it refers to the people's imposed labor/burden. 'The service was heavy'
    stays close to the Hebrew while conveying oppressive weight.
- source_word: עַל הָעָם הַזֶּה
  chosen: on this people
  alternatives:
  - upon this people
  - on these people
  lexicon: HALOT
  rationale: The singular collective עָם is best preserved as 'this people,' a natural
    biblical-English collective that reflects the Hebrew number and demonstrative.
