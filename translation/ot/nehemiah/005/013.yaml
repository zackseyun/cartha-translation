id: NEH.5.13
reference: Nehemiah 5:13
source:
  edition: WLC
  text: גַּם חָצְנִ֣/י נָעַ֗רְתִּי וָֽ/אֹמְרָ֡/ה כָּ֣כָה יְנַעֵ֪ר הָֽ/אֱלֹהִ֟ים אֶת כָּל הָ/אִישׁ֩ אֲשֶׁ֨ר לֹֽא יָקִ֜ים אֶת הַ/דָּבָ֣ר הַ/זֶּ֗ה מִ/בֵּית/וֹ֙ וּ/מִ֣/יגִיע֔/וֹ וְ/כָ֛כָה יִהְיֶ֥ה נָע֖וּר וָ/רֵ֑ק וַ/יֹּאמְר֨וּ כָֽל הַ/קָּהָ֜ל אָמֵ֗ן וַֽ/יְהַלְלוּ֙ אֶת יְהוָ֔ה וַ/יַּ֥עַשׂ הָ/עָ֖ם כַּ/דָּבָ֥ר הַ/זֶּֽה־־־־־־־׃
translation:
  text: I also shook out the fold of my garment and said, “So may God shake out every man who does not fulfill this promise, from his house and from his labor; so may he be shaken out and emptied.” And all the assembly said, “Amen,” and praised Yahweh. And the people did according to this promise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my lap' or 'the front fold of my garment.' The Hebrew refers to the fold of a robe used to hold items; Nehemiah's gesture symbolizes being shaken out and stripped of possessions.
    reason: lexical_alternative
  - marker: b
    text: Or 'carry out this matter' or 'perform this word.' The Hebrew expression means to establish or fulfill what has been pledged.
    reason: lexical_alternative
  - marker: c
    text: Or 'from his house and from the fruit of his labor.' The Hebrew may refer either to his labor itself or to what his labor has produced.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָצְנִי
  chosen: the fold of my garment
  alternatives:
  - my lap
  - my bosom
  - the front of my garment
  lexicon: HALOT
  rationale: חָצֶן refers to the fold or bosom of a garment, the part that can hold items. In this enacted oath-gesture, 'the fold of my garment' is more concrete and idiomatic in English than 'bosom' and more precise than simply 'lap'.
- source_word: נָעַרְתִּי / יְנַעֵר / נָעוּר
  chosen: shook out / shake out / be shaken out
  alternatives:
  - shake
  - shake loose
  - cast out
  lexicon: HALOT
  rationale: The repeated use of נער creates a wordplay between Nehemiah's symbolic action and the invoked curse. 'Shake out' preserves the physical image of emptying a garment fold and carries the force of dispossession better than the more generic 'shake'.
- source_word: כָּכָה
  chosen: So may
  alternatives:
  - Thus
  - In this way
  lexicon: HALOT
  rationale: In the context of an oath-curse accompanying a symbolic act, כָּכָה introduces the imprecation. 'So may' brings out the performative force in natural English better than the more wooden 'thus'.
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the God
  lexicon: HALOT
  rationale: Although formally definite, הָאֱלֹהִים here functions as the standard reference to Israel's God in direct speech. English idiom normally uses 'God' rather than 'the God' in this setting.
- source_word: כָּל הָאִישׁ
  chosen: every man
  alternatives:
  - everyone
  - every person
  lexicon: HALOT
  rationale: The Hebrew is grammatically singular masculine with representative force. Per the translation philosophy, a gender-accurate rendering is preferred where the source uses masculine singular generically.
- source_word: יָקִים אֶת הַדָּבָר הַזֶּה
  chosen: uphold this promise
  alternatives:
  - perform this word
  - carry out this matter
  - confirm this agreement
  lexicon: HALOT
  rationale: הקים דבר in covenantal/oath contexts means to establish, fulfill, or uphold what has been pledged. Since the surrounding scene is an oath to restore what was taken, 'uphold this promise' communicates the force clearly in modern English.
- source_word: מִבֵּיתוֹ וּמִיגִיעוֹ
  chosen: from his house and from his labor
  alternatives:
  - from his house and from his property
  - from his house and from his earnings
  - from his house and from what he has acquired
  lexicon: HALOT
  rationale: יְגִיעַ commonly denotes labor, toil, or the product of labor. Here the curse concerns loss of household standing and the fruits of one's work. 'From his labor' preserves the connection to what his work has produced without over-specifying.
- source_word: וָרֵק
  chosen: emptied
  alternatives:
  - empty
  - left empty
  - made empty
  lexicon: HALOT
  rationale: The adjective רֵק means empty, vain, or devoid. In parallel with 'shaken out,' 'emptied' captures the image of being stripped of possessions and standing.
- source_word: הַקָּהָל
  chosen: the assembly
  alternatives:
  - the congregation
  - the gathered community
  lexicon: HALOT
  rationale: קָהָל denotes the assembled community. 'Assembly' is natural English and avoids denominational overtones that 'congregation' may carry.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כַדָּבָר הַזֶּה
  chosen: according to this promise
  alternatives:
  - according to this word
  - according to this matter
  lexicon: HALOT
  rationale: The phrase refers back to the sworn commitment just made. Rendering דָּבָר here as 'promise' makes the referent explicit in idiomatic English while remaining within the semantic range demanded by the oath context.
