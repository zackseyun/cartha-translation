id: NEH.5.3
reference: Nehemiah 5:3
source:
  edition: WLC
  text: וְ/יֵשׁ֙ אֲשֶׁ֣ר אֹמְרִ֔ים שְׂדֹתֵ֛י/נוּ וּ/כְרָמֵ֥י/נוּ וּ/בָתֵּ֖י/נוּ אֲנַ֣חְנוּ
    עֹרְבִ֑ים וְ/נִקְחָ֥ה דָגָ֖ן בָּ/רָעָֽב׃
translation:
  text: And there were others who said, “We are mortgaging our fields, our vineyards,
    and our houses so that we may get grain during the famine.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “We are pledging our fields, our vineyards, and our houses.” The Hebrew
      verb refers to giving property as security for debt.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֵשׁ אֲשֶׁר אֹמְרִים
  chosen: And there were others who said
  alternatives:
  - And some said
  - And there were those who were saying
  lexicon: HALOT
  rationale: The idiom וְיֵשׁ אֲשֶׁר introduces another group in the complaint sequence.
    'There were others who said' is natural English and preserves the discourse function
    of adding a further class of speakers.
- source_word: שְׂדֹתֵינוּ וּכְרָמֵינוּ וּבָתֵּינוּ
  chosen: our fields, our vineyards, and our houses
  alternatives:
  - our lands, our vineyards, and our homes
  lexicon: HALOT
  rationale: These are straightforward property terms. 'Fields' fits שָׂדוֹת better
    than the broader 'lands'; 'houses' is more concrete and formally closer than 'homes'.
- source_word: אֲנַחְנוּ עֹרְבִים
  chosen: We are mortgaging
  alternatives:
  - We are giving as security
  - We are pledging
  lexicon: HALOT
  rationale: The participle עֹרְבִים from ערב in this context refers to putting property
    up as pledge/security for debt. 'Mortgaging' communicates the economic sense clearly
    in modern English, while remaining faithful to the underlying idea of pledged
    property.
- source_word: וְנִקְחָה
  chosen: so that we may get
  alternatives:
  - and let us get
  - that we might obtain
  - and we may buy
  lexicon: HALOT
  rationale: 'The cohortative-like form after the statement of pledged property expresses
    purpose/result: they are mortgaging assets in order to obtain food. ''So that
    we may get'' captures the practical aim in idiomatic English. ''Buy'' is possible
    in context, but the verb itself is simply ''take/get,'' and the means of acquisition
    is not explicit in the Hebrew.'
- source_word: דָגָן
  chosen: grain
  alternatives:
  - food
  - corn
  lexicon: HALOT
  rationale: דָגָן denotes grain/cereal produce. 'Grain' is the most precise and standard
    modern rendering; 'food' is too broad, and 'corn' is regionally misleading in
    contemporary English.
- source_word: בָּרָעָב
  chosen: during the famine
  alternatives:
  - because of the famine
  - in the famine
  lexicon: HALOT
  rationale: The preposition with רָעָב marks the circumstance under which they need
    grain. 'During the famine' reads naturally and preserves the situational force
    without overinterpreting causation.
