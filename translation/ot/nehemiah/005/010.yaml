id: NEH.5.10
reference: Nehemiah 5:10
source:
  edition: WLC
  text: וְ/גַם אֲנִי֙ אַחַ֣/י וּ/נְעָרַ֔/י נֹשִׁ֥ים בָּ/הֶ֖ם כֶּ֣סֶף וְ/דָגָ֑ן נַֽעַזְבָה
    נָּ֖א אֶת הַ/מַּשָּׁ֥א הַ/זֶּֽה־־־׃
translation:
  text: And I also, my brothers and my young men, are lending them money and grain.
    Please, let us stop this burden.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my servants' / 'my attendants' for 'my young men.'
    reason: lexical_alternative
  - marker: b
    text: Or 'are exacting loans from them'; the Hebrew verb can carry the sense of
      acting as a creditor, not merely lending neutrally.
    reason: lexical_alternative
  - marker: c
    text: Or 'this exaction' or 'this debt'; the Hebrew literally means 'this burden.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: And I also
  alternatives:
  - Also I
  - Moreover, I
  lexicon: HALOT
  rationale: Conveys the additive/emphatic force of וְ plus גַם, linking Nehemiah's
    own practice to the accusation just made.
- source_word: אַחַי
  chosen: my brothers
  alternatives:
  - my kinsmen
  - my relatives
  lexicon: HALOT
  rationale: Literal familial term is retained. In context it may include close associates
    or fellow Judeans, but 'brothers' best preserves the Hebrew wording and social
    solidarity.
- source_word: וּנְעָרַי
  chosen: my young men
  alternatives:
  - my servants
  - my attendants
  lexicon: HALOT
  rationale: נְעָרִים can denote youths or attendants/servants. 'Young men' keeps
    the lexical form while remaining natural; the context suggests members of Nehemiah's
    household or retinue.
- source_word: נֹשִׁים
  chosen: are lending
  alternatives:
  - are exacting loans from
  - are creditors to
  lexicon: HALOT
  rationale: From נשׁה in the sense of lending on credit / acting as creditor. The
    immediate context concerns loans and interest; 'are lending' is the clearest idiomatic
    English, while the more negative nuance of exacting is reflected by the following
    appeal to stop the practice.
- source_word: בָּהֶם
  chosen: them
  alternatives:
  - from them
  - among them
  lexicon: HALOT
  rationale: With נשׁה the preposition marks the persons involved in the lending relationship.
    English idiom prefers direct object 'them' after 'lend'.
- source_word: כֶּסֶף וְדָגָן
  chosen: money and grain
  alternatives:
  - silver and grain
  lexicon: HALOT
  rationale: כֶּסֶף can mean silver or money. In a loan context, 'money' communicates
    the economic sense more clearly in modern English.
- source_word: נַעַזְבָה נָּא
  chosen: Please, let us stop
  alternatives:
  - Please, let us leave off
  - Please, let us abandon
  lexicon: HALOT
  rationale: Cohortative with particle נָא expresses an exhortation/request. 'Let
    us stop' is natural English and fits the call to cease the exploitative practice.
- source_word: הַמַּשָּׁא הַזֶּה
  chosen: this burden
  alternatives:
  - this debt
  - this exaction
  lexicon: HALOT
  rationale: מַשָּׂא literally means burden/load, but in this context refers to the
    oppressive financial burden imposed on the people. 'Burden' preserves the metaphor
    while fitting the social-economic setting.
