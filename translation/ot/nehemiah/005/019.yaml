id: NEH.5.19
reference: Nehemiah 5:19
source:
  edition: WLC
  text: זָכְרָ/ה לִּ֥/י אֱלֹהַ֖/י לְ/טוֹבָ֑ה כֹּ֥ל אֲשֶׁר עָשִׂ֖יתִי עַל הָ/עָ֥ם הַ/זֶּֽה־־־׃פ
translation:
  text: Remember me for good, my God, for all that I have done for this people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'remember me favorably.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זָכְרָה
  chosen: Remember
  alternatives:
  - Remember me
  - Take notice
  lexicon: HALOT
  rationale: 'Imperative/jussive-like appeal from זכר, functioning as a prayer request
    addressed to God. English supplies the object through the following לִי, yielding
    natural prayer language: ''Remember me.'''
- source_word: לִּי
  chosen: me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: 'Dative pronoun with זכר in prayer idiom is best rendered as the direct
    object in English: ''remember me,'' not the less idiomatic ''remember for me.'''
- source_word: אֱלֹהַי
  chosen: my God
  alternatives:
  - O my God
  lexicon: HALOT
  rationale: Construct form with 1cs suffix expresses direct address. 'My God' preserves
    the personal prayer tone; 'O' is possible but not required in contemporary English.
- source_word: לְטוֹבָה
  chosen: for good
  alternatives:
  - for my good
  - favorably
  lexicon: HALOT
  rationale: The preposition ל plus טוֹבָה expresses beneficial remembrance or remembrance
    with favorable result. 'For good' is concise and preserves the Hebrew idiom without
    over-interpreting it as merely subjective benefit.
- source_word: כֹּל אֲשֶׁר
  chosen: all that
  alternatives:
  - everything that
  - all which
  lexicon: HALOT
  rationale: Standard relative construction meaning 'all that/whatever.' 'All that'
    is both natural and sufficiently formal.
- source_word: עָשִׂיתִי
  chosen: I have done
  alternatives:
  - I did
  - I accomplished
  lexicon: HALOT
  rationale: Past action viewed from the speaker's present prayer. English present
    perfect fits the retrospective sense in context better than simple past, while
    remaining faithful to the Hebrew perfect.
- source_word: עַל
  chosen: for
  alternatives:
  - on behalf of
  - concerning
  lexicon: HALOT
  rationale: With עשה and a people-object, עַל here conveys action done for the benefit
    of or on behalf of the people. 'For' is the most natural concise rendering in
    English.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - these people
  - this nation
  lexicon: HALOT
  rationale: Singular 'people' matches the Hebrew noun עָם. 'This people' preserves
    the demonstrative force and collective singular better than 'these people.'
