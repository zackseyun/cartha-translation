theological_decisions:
- issue: Financial terminology of נֹשִׁים in a social-justice context
  chosen_reading: rendered as 'have been exacting from them' rather than a narrower
    technical term like 'charging interest'
  alternative_readings:
  - charging them interest
  - lending to them on usury
  rationale: The immediate context concerns oppressive debt practices, and the Hebrew
    verb can point to creditor action broadly. The chosen rendering preserves the
    moral force of the rebuke while avoiding over-specification where the syntax may
    include both the hundredth part and the produce taken from them.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; consistency of key terms, or documented exception.'
