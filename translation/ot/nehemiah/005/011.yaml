id: NEH.5.11
reference: Nehemiah 5:11
source:
  edition: WLC
  text: הָשִׁיבוּ֩ נָ֨א לָ/הֶ֜ם כְּ/הַ/יּ֗וֹם שְׂדֹתֵי/הֶ֛ם כַּרְמֵי/הֶ֥ם זֵיתֵי/הֶ֖ם
    וּ/בָתֵּי/הֶ֑ם וּ/מְאַ֨ת הַ/כֶּ֤סֶף וְ/הַ/דָּגָן֙ הַ/תִּיר֣וֹשׁ וְ/הַ/יִּצְהָ֔ר
    אֲשֶׁ֥ר אַתֶּ֖ם נֹשִׁ֥ים בָּ/הֶֽם׃
translation:
  text: Please restore to them this very day their fields, their vineyards, their
    olive orchards, and their houses, and the hundredth part of the money, the grain,
    the new wine, and the oil that you have been exacting from them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the hundredth' / 'one percent' of the money, grain, new wine, and oil;
      the Hebrew likely refers to the portion being exacted from them.
    reason: lexical_alternative
  - marker: b
    text: Or 'that you are charging them' or 'that you are lending to them at interest.'
    reason: alternative_reading
lexical_decisions:
- source_word: הָשִׁיבוּ
  chosen: restore
  alternatives:
  - give back
  - return
  lexicon: HALOT
  rationale: 'Imperative plural of שוב in the causative sense: to cause to return,
    hence ''restore'' or ''give back.'' ''Restore'' fits both property and financial
    exactions in natural English.'
- source_word: נָא
  chosen: Please
  alternatives:
  - now
  - I pray
  lexicon: HALOT
  rationale: Polite particle softening the command. 'Please' conveys the exhortatory
    force in contemporary English better than archaic 'I pray' or temporally misleading
    'now'.
- source_word: כְּהַיּוֹם
  chosen: this very day
  alternatives:
  - today
  - as of today
  lexicon: HALOT
  rationale: Idiomatic urgency marker. 'This very day' preserves the immediacy and
    emphasis better than the flatter 'today.'
- source_word: שְׂדֹתֵיהֶם
  chosen: their fields
  lexicon: HALOT
  rationale: Straightforward agricultural land term; 'fields' is the standard equivalent.
- source_word: כַּרְמֵיהֶם
  chosen: their vineyards
  lexicon: HALOT
  rationale: Standard rendering for כרם in landed-property lists.
- source_word: זֵיתֵיהֶם
  chosen: their olive orchards
  alternatives:
  - their oliveyards
  - their olive groves
  - their olive trees
  lexicon: HALOT
  rationale: In a list parallel to fields and vineyards, the term refers to cultivated
    olive holdings rather than individual trees. 'Olive orchards' communicates landed
    property clearly in modern English.
- source_word: וּבָתֵּיהֶם
  chosen: and their houses
  lexicon: HALOT
  rationale: Standard rendering; completes the list of seized properties.
- source_word: וּמְאַת
  chosen: the hundredth part
  alternatives:
  - one percent
  - the hundredth
  lexicon: HALOT
  rationale: Literally 'a hundredth.' Retaining the fractional expression is slightly
    more formal and matches the likely reference to interest/usury without over-interpreting
    the exact financial mechanism.
- source_word: הַכֶּסֶף
  chosen: the money
  alternatives:
  - silver
  lexicon: HALOT
  rationale: כסף can mean 'silver' or 'money.' In a list of loaned commodities and
    exactions, 'money' best reflects economic function in idiomatic English.
- source_word: הַדָּגָן
  chosen: the grain
  alternatives:
  - corn
  lexicon: HALOT
  rationale: Generic cereal produce; 'grain' is the clear modern equivalent.
- source_word: הַתִּירוֹשׁ
  chosen: the new wine
  alternatives:
  - wine
  - fresh wine
  lexicon: HALOT
  rationale: Tirosh commonly denotes fresh/new wine rather than wine in general. 'New
    wine' preserves the lexical distinction.
- source_word: הַיִּצְהָר
  chosen: the oil
  alternatives:
  - olive oil
  lexicon: HALOT
  rationale: Usually fresh oil, especially olive oil. 'The oil' is sufficiently literal;
    the olive source is already implied by the agrarian context.
- source_word: אֲשֶׁר אַתֶּם נֹשִׁים בָּהֶם
  chosen: that you have been exacting from them
  alternatives:
  - that you are charging them
  - that you are lending to them at interest
  - that you are claiming from them
  lexicon: HALOT
  rationale: The participle of נשה here refers to imposing or exacting debt/interest
    from the people. 'Have been exacting from them' captures the ongoing abusive practice
    in context without narrowing too specifically to one technical financial term.
