id: NEH.5.2
reference: Nehemiah 5:2
source:
  edition: WLC
  text: וְ/יֵשׁ֙ אֲשֶׁ֣ר אֹמְרִ֔ים בָּנֵ֥י/נוּ וּ/בְנֹתֵ֖י/נוּ אֲנַ֣חְנוּ רַבִּ֑ים
    וְ/נִקְחָ֥ה דָגָ֖ן וְ/נֹאכְלָ֥ה וְ/נִחְיֶֽה׃
translation:
  text: And there were those who said, “We, our sons, and our daughters are many.
    Let us get grain, so that we may eat and live.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more smoothly, 'We have many sons and daughters.' The Hebrew more literally
      stacks the family members with 'we' and 'are many.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֵשׁ אֲשֶׁר אֹמְרִים
  chosen: And there were those who said
  alternatives:
  - And some said
  - There were those saying
  lexicon: HALOT
  rationale: The idiom וְיֵשׁ אֲשֶׁר introduces a subgroup within the larger complaint
    narrative. 'There were those who said' preserves the existential construction
    and the sense that this is one category of speakers among several.
- source_word: בָּנֵינוּ וּבְנֹתֵינוּ אֲנַחְנוּ רַבִּים
  chosen: We, our sons, and our daughters are many
  alternatives:
  - Our sons and our daughters are many
  - We have many sons and daughters
  lexicon: HALOT
  rationale: The Hebrew sequence is compressed and appositional. Including 'We' reflects
    אֲנַחְנוּ explicitly, while 'our sons and our daughters' preserves the family-unit
    emphasis. 'Are many' is more literal than smoothing to 'we have many children,'
    though that sense is implicit.
- source_word: וְנִקְחָה
  chosen: Let us get
  alternatives:
  - Let us take
  - We must obtain
  lexicon: HALOT
  rationale: Qal cohortative 1cp expresses resolve/request. 'Let us get' is idiomatic
    in English and fits the context of acquiring food under distress better than the
    more wooden 'take.'
- source_word: דָגָן
  chosen: grain
  alternatives:
  - food
  - corn
  lexicon: HALOT
  rationale: דָגָן refers specifically to grain/cereal produce, not food in general.
    'Grain' is the clearest modern equivalent; 'corn' would be misleading in contemporary
    English.
- source_word: וְנֹאכְלָה וְנִחְיֶה
  chosen: so that we may eat and live
  alternatives:
  - and let us eat and live
  - that we may eat and stay alive
  lexicon: HALOT
  rationale: 'The consecutive cohortatives express purpose/result in context: obtaining
    grain in order to survive. ''So that we may eat and live'' communicates the urgent
    purpose naturally while preserving both verbs distinctly.'
