id: NEH.5.14
reference: Nehemiah 5:14
source:
  edition: WLC
  text: גַּ֞ם מִ/יּ֣וֹם אֲשֶׁר צִוָּ֣ה אֹתִ֗/י לִ/הְי֣וֹת פֶּחָ/ם֮ בְּ/אֶ֣רֶץ יְהוּדָה֒
    מִ/שְּׁנַ֣ת עֶשְׂרִ֗ים וְ֠/עַד שְׁנַ֨ת שְׁלֹשִׁ֤ים וּ/שְׁתַּ֨יִם֙ לְ/אַרְתַּחְשַׁ֣סְתְּא
    הַ/מֶּ֔לֶךְ שָׁנִ֖ים שְׁתֵּ֣ים עֶשְׂרֵ֑ה אֲנִ֣י וְ/אַחַ֔/י לֶ֥חֶם הַ/פֶּ֖חָה לֹ֥א
    אָכַֽלְתִּי׀־׃
translation:
  text: Also, from the day that he appointed me to be their governor in the land of
    Judah, from the twentieth year until the thirty-second year of King Artaxerxes—twelve
    years—I and my brothers did not eat the governor’s food allowance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the governor’s bread,” that is, the provisions or allowance customarily
      taken by the governor.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Also
  alternatives:
  - Moreover
  - Even
  lexicon: HALOT
  rationale: Introduces an additional point in Nehemiah's defense. 'Also' is natural
    modern English and preserves the additive force.
- source_word: מִיּוֹם אֲשֶׁר
  chosen: from the day that
  alternatives:
  - since the day that
  - from the time when
  lexicon: HALOT
  rationale: This idiom marks the starting point of a continuing period. 'From the
    day that' is sufficiently formal while remaining readable.
- source_word: צִוָּה אֹתִי
  chosen: he appointed me
  alternatives:
  - he commanded me
  - he commissioned me
  lexicon: HALOT
  rationale: Although the verb often means 'command,' in this administrative context
    with an infinitive of office it carries the sense of official appointment. 'Appointed
    me' best fits the context of being made governor.
- source_word: לִהְיוֹת פֶּחָם
  chosen: to be their governor
  alternatives:
  - to be governor over them
  - to be his governor
  lexicon: HALOT
  rationale: פֶּחָה denotes a Persian provincial governor. The suffix on פֶּחָם is
    best taken as referring to the people of Judah ('their governor'), matching the
    context. 'Governor' translates the title rather than transliterating it.
- source_word: בְּאֶרֶץ יְהוּדָה
  chosen: in the land of Judah
  alternatives:
  - in the province of Judah
  - in Judah
  lexicon: HALOT
  rationale: A straightforward geographical expression. 'Land of Judah' preserves
    the Hebrew wording; 'province' would be interpretive, though contextually plausible
    under Persian administration.
- source_word: מִשְּׁנַת עֶשְׂרִים וְעַד שְׁנַת שְׁלֹשִׁים וּשְׁתַּיִם לְאַרְתַּחְשַׁסְתְּא
    הַמֶּלֶךְ
  chosen: from the twentieth year until the thirty-second year of King Artaxerxes
  alternatives:
  - from the twentieth year to the thirty-second year of Artaxerxes the king
  lexicon: HALOT
  rationale: This is a regnal-year dating formula. The chosen rendering is idiomatic
    English while preserving the chronological precision.
- source_word: שָׁנִים שְׁתֵּים עֶשְׂרֵה
  chosen: twelve years
  alternatives:
  - for twelve years
  lexicon: HALOT
  rationale: An appositional summary of the preceding date range. Rendered as an em-dash
    apposition in English for clarity.
- source_word: אֲנִי וְאַחַי
  chosen: I and my brothers
  alternatives:
  - I and my kinsmen
  - I and my associates
  lexicon: HALOT
  rationale: אַחַי literally means 'my brothers.' In context it may include close
    associates or fellow Jews, but the literal rendering should be retained per gender-accurate
    policy, without flattening to a gender-neutral term.
- source_word: לֶחֶם הַפֶּחָה
  chosen: the governor’s food allowance
  alternatives:
  - the governor's bread
  - the food of the governor
  - the governor's provisions
  lexicon: HALOT
  rationale: לֶחֶם can mean 'bread' literally, but in administrative/economic contexts
    it often stands for food or provisions. Here the sense is the official allowance
    or provisions due to the governor, not merely bread. 'Food allowance' communicates
    the idiomatic sense clearly.
- source_word: לֹא אָכַלְתִּי
  chosen: did not eat
  alternatives:
  - have not eaten
  - did not partake of
  lexicon: HALOT
  rationale: The perfect here reports Nehemiah's practice over the stated period.
    English simple past fits the narrative summary. 'Eat' is retained rather than
    paraphrasing away the concrete metaphor of consuming the allowance.
