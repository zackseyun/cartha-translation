theological_decisions:
- issue: Rendering אַחַי in a potentially representative sense
  chosen_reading: my brothers
  alternative_readings:
  - my fellow Jews
  - my associates
  rationale: The Hebrew is explicitly masculine plural with first-person suffix. In
    keeping with the translation philosophy's gender-accurate principle, the main
    text preserves 'brothers.' Broader social implications can be inferred from context
    without neutralizing the term in translation.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Whether to render לֶחֶם הַפֶּחָה literally or idiomatically
  chosen_reading: the governor’s food allowance
  alternative_readings:
  - the governor's bread
  - the governor's provisions
  rationale: The phrase refers to the material support/customary provisions due to
    the governor, as clarified by the surrounding context in Nehemiah 5. An idiomatic
    rendering best communicates the plain sense while remaining anchored to the Hebrew
    expression.
  doctrine_reference: DOCTRINE.md §Translation philosophy, optimal equivalence
