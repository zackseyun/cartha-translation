theological_decisions:
- issue: Ethnic term יְהוּדִים
  chosen_reading: Jewish
  alternative_readings:
  - Judean
  rationale: The term can denote either ethnic-religious identity ('Jewish') or regional
    identity ('Judean'). In Nehemiah 5 the complaint is within the returned covenant
    community, and 'Jewish brothers' communicates the in-group solidarity and injustice
    clearly in contemporary English. The alternative is preserved in a footnote because
    the distinction can matter historically.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
