id: NEH.5.1
reference: Nehemiah 5:1
source:
  edition: WLC
  text: וַ/תְּהִ֨י צַעֲקַ֥ת הָ/עָ֛ם וּ/נְשֵׁי/הֶ֖ם גְּדוֹלָ֑ה אֶל אֲחֵי/הֶ֖ם הַ/יְּהוּדִֽים־׃
translation:
  text: Now there arose a great outcry from the people and their wives against their
    Jewish brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "their Judean brothers." The Hebrew term can refer to Jews/Judeans, depending
      on whether the emphasis is ethnic or regional.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּהִי
  chosen: Now there arose
  alternatives:
  - And there was
  - Then there was
  lexicon: HALOT
  rationale: The wayyiqtol of היה introduces a new development in the narrative. 'There
    arose' is idiomatic English for the emergence of a situation, while 'Now' marks
    discourse progression naturally.
- source_word: צַעֲקַת
  chosen: outcry
  alternatives:
  - cry
  - complaint
  lexicon: HALOT
  rationale: The noun denotes a cry of distress or protest. 'Outcry' captures both
    the emotional intensity and the public/social character better than the flatter
    'cry' or the weaker 'complaint'.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the common people
  - the populace
  lexicon: HALOT
  rationale: The term broadly denotes the people. In context it refers to the community
    suffering economic oppression; 'the people' is accurate without over-specifying
    social class in the main text.
- source_word: וּנְשֵׁיהֶם
  chosen: and their wives
  alternatives:
  - and their women
  lexicon: HALOT
  rationale: The noun אשה in this plural construct with pronominal suffix most naturally
    means 'their wives.' This preserves the explicit mention that women were also
    raising the complaint.
- source_word: גְּדוֹלָה
  chosen: great
  alternatives:
  - loud
  - serious
  lexicon: HALOT
  rationale: The adjective modifies the outcry and indicates magnitude/intensity.
    'Great' is the most direct rendering and preserves the Hebrew emphasis without
    interpretive expansion.
- source_word: אֶל
  chosen: against
  alternatives:
  - to
  - toward
  lexicon: HALOT
  rationale: Although literally 'to/toward,' in this complaint context it indicates
    the target of protest. 'Against' best conveys the adversative force in idiomatic
    English.
- source_word: אֲחֵיהֶם
  chosen: brothers
  alternatives:
  - kinsmen
  - fellow countrymen
  lexicon: HALOT
  rationale: The Hebrew literally says 'their brothers.' Per the translation philosophy,
    gender-accurate language is preferred over flattening to a neutral term. Here
    it denotes fellow Judeans in covenant/community solidarity.
- source_word: הַיְּהוּדִים
  chosen: Jewish
  alternatives:
  - Judean
  lexicon: HALOT
  rationale: As an attributive ethnic identifier modifying 'brothers,' 'Jewish' is
    natural modern English. 'Judean' is possible and can stress geographic identity,
    but in this context the broader ethnic/community sense is adequately conveyed
    by 'Jewish'.
