id: NEH.5.16
reference: Nehemiah 5:16
source:
  edition: WLC
  text: וְ֠/גַם בִּ/מְלֶ֜אכֶת הַ/חוֹמָ֤ה הַ/זֹּאת֙ הֶחֱזַ֔קְתִּי וְ/שָׂדֶ֖ה לֹ֣א קָנִ֑ינוּ
    וְ/כָל נְעָרַ֔/י קְבוּצִ֥ים שָׁ֖ם עַל הַ/מְּלָאכָֽה־־׃
translation:
  text: And I also devoted myself to the work on this wall, and we did not buy any
    field, and all my young men were gathered there for the work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I took hold in the work on this wall,' that is, 'I personally applied
      myself to it.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my servants' or 'my attendants' for 'my young men.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: And I also
  alternatives:
  - Also
  - Moreover
  lexicon: HALOT
  rationale: Conveys the additive force linking this statement to the preceding context,
    with 'also' preserving גַם and 'And' reflecting the conjunction.
- source_word: בִּמְלֶאכֶת
  chosen: to the work on
  alternatives:
  - in the work of
  - in the labor on
  lexicon: HALOT
  rationale: מְלָאכָה denotes work/labor/task. With בְּ and the following noun phrase,
    idiomatic English is 'to the work on this wall' rather than a more wooden 'in
    the work of this wall.'
- source_word: הַחוֹמָה הַזֹּאת
  chosen: this wall
  alternatives:
  - the wall, this one
  - this city wall
  lexicon: HALOT
  rationale: Straightforward demonstrative construction. 'Wall' is sufficient; 'city
    wall' is possible from context but not explicit in the verse.
- source_word: הֶחֱזַקְתִּי
  chosen: devoted myself
  alternatives:
  - took hold
  - strengthened myself
  - worked hard
  lexicon: HALOT
  rationale: Hiphil of חזק here likely means taking hold of or applying oneself to
    the work, not physically strengthening the wall by oneself. 'Devoted myself' captures
    Nehemiah's personal engagement in the labor in natural English.
- source_word: וְשָׂדֶה לֹא קָנִינוּ
  chosen: and we did not buy any field
  alternatives:
  - and I did not acquire land
  - and we bought no field
  lexicon: HALOT
  rationale: שָׂדֶה is singular collective in sense; 'any field' is idiomatic English.
    The verb is 1cp ('we did not buy'), which should be preserved rather than harmonized
    to singular.
- source_word: קָנִינוּ
  chosen: we did not buy
  alternatives:
  - we did not acquire
  - we did not purchase
  lexicon: HALOT
  rationale: The qal of קנה commonly means buy/acquire. 'Buy' is the plainest modern
    English equivalent; 'acquire' is possible but less direct.
- source_word: נְעָרַי
  chosen: my young men
  alternatives:
  - my servants
  - my attendants
  - my men
  lexicon: HALOT
  rationale: נַעַר can denote a young man, servant, or attendant depending on context.
    Here it refers to Nehemiah's own personnel engaged in the project. 'My young men'
    preserves the lexical sense without over-specifying servile status.
- source_word: קְבוּצִים שָׁם
  chosen: were gathered there
  alternatives:
  - were assembled there
  - were collected there
  lexicon: HALOT
  rationale: Passive participle from קבץ indicates being gathered/assembled. 'There'
    preserves שָׁם and likely points to the worksite.
- source_word: עַל הַמְּלָאכָה
  chosen: for the work
  alternatives:
  - at the work
  - on the work
  lexicon: HALOT
  rationale: עַל with labor context can indicate engagement in or assignment to the
    work. 'For the work' is idiomatic and communicates purpose/occupation.
