id: NEH.5.17
reference: Nehemiah 5:17
source:
  edition: WLC
  text: וְ/הַ/יְּהוּדִ֨ים וְ/הַ/סְּגָנִ֜ים מֵאָ֧ה וַ/חֲמִשִּׁ֣ים אִ֗ישׁ וְ/הַ/בָּאִ֥ים
    אֵלֵ֛י/נוּ מִן הַ/גּוֹיִ֥ם אֲשֶׁר סְבִיבֹתֵ֖י/נוּ עַל שֻׁלְחָנִֽ/י־־־׃
translation:
  text: Now the Jews and the officials, a hundred and fifty men, and those who came
    to us from the nations that were around us, were at my table.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Judeans' for 'the Jews.'
    reason: lexical_alternative
  - marker: b
    text: '''At my table'' implies that Nehemiah provided food for them as part of
      his hospitality and administration.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהַיְּהוּדִים
  chosen: the Jews
  alternatives:
  - the Judeans
  lexicon: HALOT
  rationale: In Nehemiah, the term can denote the Jewish people generally rather than
    only inhabitants of Judah. 'The Jews' is the most natural English rendering here,
    though 'the Judeans' is a possible geographically tinged alternative.
- source_word: וְהַסְּגָנִים
  chosen: the officials
  alternatives:
  - the deputies
  - the prefects
  - the rulers
  lexicon: HALOT
  rationale: The term refers to subordinate civil leaders or administrators. 'Officials'
    communicates the administrative role in clear modern English without over-specifying
    a Persian title.
- source_word: מֵאָה וַחֲמִשִּׁים אִישׁ
  chosen: a hundred and fifty men
  alternatives:
  - one hundred fifty men
  lexicon: HALOT
  rationale: This is a straightforward numerical expression with אִישׁ marking persons/men.
    'Men' is retained as gender-accurate and formally close to the Hebrew.
- source_word: וְהַבָּאִים אֵלֵינוּ
  chosen: and those who came to us
  alternatives:
  - and those who were coming to us
  - and the ones coming to us
  lexicon: HALOT
  rationale: The participle literally means 'the ones coming,' but in context it functions
    substantivally for visiting persons. English idiom is smoother with the simple
    past 'those who came to us,' especially in a retrospective description.
- source_word: מִן הַגּוֹיִם
  chosen: from the nations
  alternatives:
  - from the Gentiles
  - from the peoples
  lexicon: HALOT
  rationale: גּוֹיִם here denotes surrounding non-Jewish peoples. 'Nations' is the
    broad, source-near rendering; 'Gentiles' is interpretive and more theologically
    loaded than the context requires.
- source_word: אֲשֶׁר סְבִיבֹתֵינוּ
  chosen: that were around us
  alternatives:
  - who were around us
  - surrounding us
  lexicon: HALOT
  rationale: This relative phrase identifies the neighboring peoples geographically.
    'That were around us' is natural and preserves the spatial sense.
- source_word: עַל שֻׁלְחָנִי
  chosen: were at my table
  alternatives:
  - were at my dining table
  - were provided for at my table
  lexicon: HALOT
  rationale: Literally 'upon my table,' an idiom for eating at one's provision. 'Were
    at my table' preserves the image and implies hospitality without adding explanatory
    wording into the main text.
