id: NEH.5.15
reference: Nehemiah 5:15
source:
  edition: WLC
  text: וְ/הַ/פַּחוֹת֩ הָ/רִאשֹׁנִ֨ים אֲשֶׁר לְ/פָנַ֜/י הִכְבִּ֣ידוּ עַל הָ/עָ֗ם וַ/יִּקְח֨וּ
    מֵ/הֶ֜ם בְּ/לֶ֤חֶם וָ/יַ֨יִן֙ אַחַר֙ כֶּֽסֶף שְׁקָלִ֣ים אַרְבָּעִ֔ים גַּ֥ם נַעֲרֵי/הֶ֖ם
    שָׁלְט֣וּ עַל הָ/עָ֑ם וַ/אֲנִי֙ לֹא עָשִׂ֣יתִי כֵ֔ן מִ/פְּנֵ֖י יִרְאַ֥ת אֱלֹהִֽים־־־־־׃
translation:
  text: But the former governors who were before me laid heavy burdens on the people,
    and took from them bread and wine, besides forty shekels of silver. Even their
    servants ruled over the people. But I did not do so, because of the fear of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in addition to forty shekels of silver.' The Hebrew phrase may indicate
      an added monetary levy on top of the bread and wine.
    reason: lexical_alternative
  - marker: b
    text: Or 'attendants' or 'young men' for 'servants.' The Hebrew can refer to subordinate
      officials in service to the governors.
    reason: lexical_alternative
  - marker: c
    text: Or 'out of reverence for God.' The Hebrew idiom is literally 'because of
      the fear of God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַפַּחוֹת
  chosen: governors
  alternatives:
  - officials
  - provincial governors
  lexicon: HALOT
  rationale: פֶּחָה refers to a governor or provincial administrator in the Persian
    period. 'Governors' is the most natural and historically fitting English rendering
    here.
- source_word: הָרִאשֹׁנִים
  chosen: former
  alternatives:
  - previous
  - earlier
  lexicon: HALOT
  rationale: In context this distinguishes Nehemiah's predecessors from his own administration;
    'former' is concise and idiomatic.
- source_word: אֲשֶׁר לְפָנַי
  chosen: who were before me
  alternatives:
  - who preceded me
  - before my time
  lexicon: HALOT
  rationale: The phrase marks prior officeholders. 'Who were before me' preserves
    the Hebrew image while remaining clear English.
- source_word: הִכְבִּידוּ עַל הָעָם
  chosen: laid heavy burdens on the people
  alternatives:
  - oppressed the people
  - made demands on the people
  lexicon: HALOT
  rationale: The Hiphil of כבד conveys making something heavy; here it refers to burdensome
    exactions. 'Laid heavy burdens on' preserves the metaphor better than the more
    interpretive 'oppressed.'
- source_word: וַיִּקְחוּ מֵהֶם
  chosen: took from them
  alternatives:
  - collected from them
  - exacted from them
  lexicon: HALOT
  rationale: לקח is the ordinary verb 'take.' In this fiscal context 'exacted' is
    possible, but 'took from them' stays closer to the source while still fitting
    the context.
- source_word: בְּלֶחֶם וָיַיִן
  chosen: bread and wine
  alternatives:
  - food and wine
  lexicon: HALOT
  rationale: The Hebrew names the items specifically. 'Bread and wine' preserves the
    concrete wording rather than generalizing to 'food and wine.'
- source_word: אַחַר כֶּסֶף שְׁקָלִים אַרְבָּעִים
  chosen: besides forty shekels of silver
  alternatives:
  - in addition to forty shekels of silver
  - after forty shekels of silver
  lexicon: HALOT
  rationale: אַחַר here is best understood idiomatically as 'in addition to/besides,'
    indicating that the bread and wine were taken on top of a monetary levy. 'After'
    would be misleading in English.
- source_word: נַעֲרֵיהֶם
  chosen: servants
  alternatives:
  - young men
  - attendants
  lexicon: HALOT
  rationale: Though נער can mean 'young man,' in administrative context it often refers
    to subordinates or attendants. 'Servants' best conveys their dependent role under
    the governors.
- source_word: שָׁלְטוּ עַל הָעָם
  chosen: ruled over the people
  alternatives:
  - lorded it over the people
  - exercised authority over the people
  lexicon: HALOT
  rationale: שׁלט denotes exercising dominion or authority. 'Ruled over' is straightforward
    and preserves the force without adding excessive interpretation.
- source_word: וַאֲנִי לֹא עָשִׂיתִי כֵן
  chosen: But I did not do so
  alternatives:
  - But I did not act that way
  - But I did not do likewise
  lexicon: HALOT
  rationale: This is a direct contrast with the conduct of previous governors. 'Did
    not do so' is simple and close to the Hebrew.
- source_word: מִפְּנֵי יִרְאַת אֱלֹהִים
  chosen: because of the fear of God
  alternatives:
  - out of reverence for God
  - because I feared God
  lexicon: HALOT
  rationale: The construct phrase literally denotes 'the fear of God.' This wording
    preserves the biblical idiom and its theological weight, while remaining understandable
    in modern English.
