theological_decisions:
- issue: Rendering of יִרְאַת אֱלֹהִים
  chosen_reading: because of the fear of God
  alternative_readings:
  - out of reverence for God
  - because I feared God
  rationale: The phrase expresses covenantal reverence and accountability before God
    as Nehemiah's motive. Retaining 'fear of God' preserves the biblical theological
    idiom rather than softening it to mere respect, while still not implying craven
    terror.
  doctrine_reference: Translation philosophy §3, §6
