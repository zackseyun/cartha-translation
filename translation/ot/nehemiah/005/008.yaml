theological_decisions:
- issue: Gendered kinship term אַחֵי/אַחֵינוּ / אַחֵיכֶם
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - fellow Jews
  rationale: The Hebrew uses a masculine plural kinship term in a covenant-community
    setting. Per the translation philosophy, the main text remains gender-accurate
    rather than neutralized, while the broader communal referent can be noted in a
    footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
