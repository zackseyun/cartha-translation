id: NEH.5.8
reference: Nehemiah 5:8
source:
  edition: WLC
  text: וָ/אֹמְרָ֣/ה לָ/הֶ֗ם אֲנַ֣חְנוּ קָ֠נִינוּ אֶת אַחֵ֨י/נוּ הַ/יְּהוּדִ֜ים הַ/נִּמְכָּרִ֤ים
    לַ/גּוֹיִם֙ כְּ/דֵ֣י בָ֔/נוּ וְ/גַם אַתֶּ֛ם תִּמְכְּר֥וּ אֶת אֲחֵי/כֶ֖ם וְ/נִמְכְּרוּ
    לָ֑/נוּ וַֽ/יַּחֲרִ֔ישׁוּ וְ/לֹ֥א מָצְא֖וּ דָּבָֽר־־־־׃ס
translation:
  text: And I said to them, “We have bought back our Jewish brothers who were sold
    to the nations as much as we were able. But now you yourselves are even selling
    your brothers, and they must be sold to us!” Then they were silent and found nothing
    to say.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “our fellow Jews.” The Hebrew says “our brothers, the Jews,” using a
      masculine kinship term for fellow members of the community.
    reason: lexical_alternative
  - marker: b
    text: 'Or “and should they be sold to us?” The Hebrew clause is terse and may
      be understood as a rhetorical consequence: their brothers end up being sold
      back to their own people.'
    reason: alternative_reading
lexical_decisions:
- source_word: קָנִינוּ
  chosen: have bought back
  alternatives:
  - have redeemed
  - have acquired
  lexicon: HALOT
  rationale: In this context of ransoming fellow Judeans from foreign bondage, 'bought
    back' best conveys repurchase/liberation in natural English without importing
    the fuller theological freight of 'redeemed.'
- source_word: אַחֵינוּ הַיְּהוּדִים
  chosen: our Jewish brothers
  alternatives:
  - our fellow Jews
  - our Jewish brothers and sisters
  lexicon: HALOT
  rationale: '''Brothers'' preserves the masculine kinship term and covenant-solidarity
    language; ''Jewish'' renders הַיְּהוּדִים directly. A more inclusive expansion
    is avoided in the main text per gender-accurate policy, though the referent is
    communal.'
- source_word: הַנִּמְכָּרִים לַגּוֹיִם
  chosen: who were sold to the nations
  alternatives:
  - who had been sold to the Gentiles
  - who were being sold to foreign peoples
  lexicon: HALOT
  rationale: '''Nations'' is the most direct rendering of גּוֹיִם in this Hebrew narrative
    context. ''Gentiles'' is possible but sounds more NT-coded in English. Passive
    ''were sold'' matches the participial description.'
- source_word: כְּדֵי בָנוּ
  chosen: as much as we were able
  alternatives:
  - according to our means
  - to the extent that it was in us
  lexicon: HALOT
  rationale: The idiom expresses extent of ability/resources. 'As much as we were
    able' is idiomatic modern English and preserves the sense of acting within available
    means.
- source_word: וְגַם אַתֶּם
  chosen: But now you yourselves are even
  alternatives:
  - and even you
  - and also you
  lexicon: HALOT
  rationale: The combination heightens the accusation. 'But now' is supplied for natural
    adversative force in English discourse, while 'yourselves' and 'even' preserve
    the emphatic contrast.
- source_word: תִּמְכְּרוּ
  chosen: are ... selling
  alternatives:
  - sell
  - would sell
  lexicon: HALOT
  rationale: English progressive fits the rhetorical rebuke of present conduct. A
    simple present is possible, but the progressive better captures the immediate
    accusation.
- source_word: וְנִמְכְּרוּ לָנוּ
  chosen: and they must be sold to us
  alternatives:
  - and should they be sold to us?
  - and they are to be sold to us
  lexicon: HALOT
  rationale: The clause is difficult and elliptical. The sense is that their actions
    would result in fellow Judeans being sold back to their own community, an absurdity
    in Nehemiah's rebuke. 'Must be sold to us' captures the rhetorical consequence
    without over-paraphrasing.
- source_word: וַיַּחֲרִישׁוּ
  chosen: they were silent
  alternatives:
  - they kept quiet
  - they said nothing
  lexicon: HALOT
  rationale: A standard rendering of the verb in this context; concise and natural.
- source_word: וְלֹא מָצְאוּ דָּבָר
  chosen: found nothing to say
  alternatives:
  - found no word
  - had no answer
  lexicon: HALOT
  rationale: This idiom means they had no response. 'Found nothing to say' is idiomatic
    English while remaining close to the Hebrew expression.
