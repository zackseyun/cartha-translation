theological_decisions:
- issue: Ethical metaphor of הלך in covenantal context
  chosen_reading: Retain 'walk' rather than flattening to 'live'
  alternative_readings:
  - live
  - conduct yourselves
  rationale: The verse exhorts covenant-faithful conduct before God and surrounding
    nations. Preserving 'walk' maintains the biblical moral metaphor and theological
    texture without obscuring meaning.
  doctrine_reference: Translation philosophy §5 (consistency of key terms) and §6
    (readable modern English, not archaic or academic)
