id: NEH.5.9
reference: Nehemiah 5:9
source:
  edition: WLC
  text: ו/יאמר לֹא ט֥וֹב הַ/דָּבָ֖ר אֲשֶׁר אַתֶּ֣ם עֹשִׂ֑ים הֲ/ל֞וֹא בְּ/יִרְאַ֤ת
    אֱלֹהֵ֨י/נוּ֙ תֵּלֵ֔כוּ מֵ/חֶרְפַּ֖ת הַ/גּוֹיִ֥ם אוֹיְבֵֽי/נוּ־־׃
translation:
  text: So I said, “What you are doing is not good. Should you not walk in the fear
    of our God, because of the reproach of the nations, our enemies?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to avoid the reproach of the nations, our enemies.' The Hebrew preposition
      may be understood as expressing motive or intended avoidance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: So I said
  alternatives:
  - And I said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So I said' is natural modern
    English while preserving the sequential force; 'And I said' is more formally literal
    but less idiomatic here.
- source_word: לֹא טוֹב
  chosen: is not good
  alternatives:
  - is not right
  - is not acceptable
  lexicon: HALOT
  rationale: A straightforward rendering of the evaluative phrase. 'Not good' preserves
    the Hebrew wording and moral force without overinterpreting.
- source_word: הַדָּבָר אֲשֶׁר אַתֶּם עֹשִׂים
  chosen: What you are doing
  alternatives:
  - the thing that you are doing
  - this matter that you are doing
  lexicon: HALOT
  rationale: This compresses the Hebrew nominal expression into natural English while
    retaining the direct reference to their present conduct.
- source_word: הֲלוֹא
  chosen: Should you not
  alternatives:
  - Is it not that you should
  - Ought you not to
  lexicon: HALOT
  rationale: Introduces a rhetorical question with exhortational force. 'Should you
    not' captures both the interrogative and moral appeal.
- source_word: בְּיִרְאַת אֱלֹהֵינוּ
  chosen: in the fear of our God
  alternatives:
  - with reverence for our God
  - in reverent fear of our God
  lexicon: HALOT
  rationale: '''Fear'' is the standard and theologically weighty rendering of יִרְאָה
    in covenantal contexts. It preserves the biblical idiom better than paraphrastic
    alternatives.'
- source_word: תֵּלֵכוּ
  chosen: walk
  alternatives:
  - live
  - conduct yourselves
  lexicon: HALOT
  rationale: '''Walk'' preserves the Hebrew ethical metaphor of conduct. Although
    ''live'' or ''conduct yourselves'' would be clearer dynamically, the metaphor
    remains intelligible in English and is biblically resonant.'
- source_word: מֵחֶרְפַּת
  chosen: because of the reproach of
  alternatives:
  - to avoid the reproach of
  - because of the taunts of
  - on account of the disgrace before
  lexicon: HALOT
  rationale: 'The preposition מִן here is best taken in a causal or motive sense in
    context: they should walk rightly in view of, or because of, the reproach brought
    by hostile nations. ''Because of the reproach of'' preserves the noun חרפה and
    avoids adding too much interpretive specificity, though ''to avoid'' is a plausible
    contextual expansion.'
- source_word: הַגּוֹיִם אֹיְבֵינוּ
  chosen: the nations, our enemies
  alternatives:
  - the Gentiles, our enemies
  - the nations that are our enemies
  lexicon: HALOT
  rationale: גּוֹיִם in this context refers to surrounding foreign peoples, best rendered
    'nations.' Apposition with 'our enemies' is preserved by the comma. 'Gentiles'
    would sound overly NT-shaped and less natural here.
