id: NEH.5.12
reference: Nehemiah 5:12
source:
  edition: WLC
  text: וַ/יֹּאמְר֣וּ נָשִׁ֗יב וּ/מֵ/הֶם֙ לֹ֣א נְבַקֵּ֔שׁ כֵּ֣ן נַעֲשֶׂ֔ה כַּ/אֲשֶׁ֖ר
    אַתָּ֣ה אוֹמֵ֑ר וָ/אֶקְרָא֙ אֶת הַ/כֹּ֣הֲנִ֔ים וָֽ/אַשְׁבִּיעֵ֔/ם לַ/עֲשׂ֖וֹת
    כַּ/דָּבָ֥ר הַ/זֶּֽה־׃
translation:
  text: And they said, “We will restore it, and from them we will require nothing;
    we will do as you say.” Then I called the priests and made them swear to do according
    to this promise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to do according to this word/matter.” The Hebrew דָּבָר can mean “word,”
      “matter,” or, in context, a pledged commitment.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָשִׁיב
  chosen: we will restore it
  alternatives:
  - we will give back
  - we will return
  lexicon: HALOT
  rationale: Hiphil of שוב here has the causative sense of returning what had been
    taken or exacted. In context of Nehemiah's demand to stop usury and restore fields
    and produce, 'restore it' best captures restitution in natural English. The object
    is implicit from the prior verse, so 'it' is supplied.
- source_word: וּמֵהֶם לֹא נְבַקֵּשׁ
  chosen: from them we will require nothing
  alternatives:
  - we will demand nothing from them
  - we will seek nothing from them
  lexicon: HALOT
  rationale: בקש can mean seek, ask, demand, or require. In this economic/legal context,
    the sense is ceasing to exact repayment or interest. 'Require nothing' is concise
    and idiomatic while preserving the force of renouncing claims.
- source_word: כֵּן נַעֲשֶׂה
  chosen: we will do
  alternatives:
  - so we will do
  - thus we will act
  lexicon: HALOT
  rationale: The adverb כֵּן intensifies agreement with Nehemiah's demand. English
    can express this naturally with 'we will do' following the prior clauses; the
    sense of 'so/thus' is carried by the surrounding quotation.
- source_word: כַּאֲשֶׁר אַתָּה אוֹמֵר
  chosen: as you say
  alternatives:
  - just as you are saying
  - according to what you say
  lexicon: HALOT
  rationale: A straightforward comparative clause affirming compliance with Nehemiah's
    instruction. 'As you say' is idiomatic modern English and sufficiently formal.
- source_word: וָאֶקְרָא אֶת־הַכֹּהֲנִים
  chosen: Then I called the priests
  alternatives:
  - So I summoned the priests
  lexicon: HALOT
  rationale: קרא with direct object commonly means call/summon. 'Called the priests'
    is clear; 'Then' reflects the narrative waw sequence.
- source_word: וָאַשְׁבִּיעֵם
  chosen: made them swear
  alternatives:
  - put them under oath
  - adjured them
  lexicon: HALOT
  rationale: Hiphil of שבע means to cause someone to swear, i.e., administer an oath.
    'Made them swear' is direct and readable. The pronoun most naturally refers to
    the nobles/officials who had just spoken, with the priests serving as witnesses/administrators
    of the oath.
- source_word: לַעֲשׂוֹת כַּדָּבָר הַזֶּה
  chosen: to do according to this promise
  alternatives:
  - to do according to this word
  - to do this thing
  lexicon: HALOT
  rationale: דבר can mean word, matter, or promise. Since the preceding speech is
    a public commitment now ratified by oath, 'this promise' brings out the performative
    force in idiomatic English. 'According to' preserves כ.
