id: NEH.5.7
reference: Nehemiah 5:7
source:
  edition: WLC
  text: וַ/יִּמָּלֵ֨ךְ לִבִּ֜/י עָלַ֗/י וָ/אָרִ֨יבָ/ה֙ אֶת הַ/חֹרִ֣ים וְ/אֶת הַ/סְּגָנִ֔ים
    וָ/אֹמְרָ֣/ה לָ/הֶ֔ם מַשָּׁ֥א אִישׁ בְּ/אָחִ֖י/ו אַתֶּ֣ם נשאים וָ/אֶתֵּ֥ן עֲלֵי/הֶ֖ם
    קְהִלָּ֥ה גְדוֹלָֽה־־־׃
translation:
  text: Then I took counsel with myself, and I brought charges against the nobles
    and the officials, and I said to them, “You are exacting interest, each from his
    brother.” And I assembled a great gathering against them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I contended with the nobles and the officials.” The Hebrew verb can
      carry either a legal-accusatory nuance (“brought charges”) or a more general
      sense of contention.
    reason: lexical_alternative
  - marker: b
    text: Or “You are charging interest, each from his fellow.” Literally, “a man
      against his brother you are exacting [it],” preserving the kinship language
      of fellow Israelites.
    reason: lexical_alternative
  - marker: c
    text: Or “I called a great assembly against them.” The Hebrew literally says,
      “I set/gave against them a great assembly,” an idiom for convening public opposition.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמָּלֵךְ לִבִּי עָלַי
  chosen: I took counsel with myself
  alternatives:
  - my heart consulted within me
  - I deliberated with myself
  - I was very angry
  lexicon: HALOT
  rationale: The Niphal of מלך here is idiomatic, describing internal deliberation
    rather than emotion. 'Took counsel with myself' preserves the reflexive sense
    of Nehemiah considering the matter internally before acting. 'I was very angry'
    belongs more to the previous verse and is not the plain sense of this clause.
- source_word: וָאָרִיבָה
  chosen: I brought charges against
  alternatives:
  - I contended with
  - I rebuked
  - I confronted
  lexicon: HALOT
  rationale: The verb ריב commonly denotes contending or bringing a case. In this
    context of public accusation against leaders, 'brought charges against' captures
    both the confrontational and quasi-judicial force better than the more generic
    'contended with.'
- source_word: הַחֹרִים
  chosen: the nobles
  alternatives:
  - the noblesmen
  - the aristocrats
  lexicon: HALOT
  rationale: A standard rendering for Judean social elites; 'nobles' is idiomatic
    modern English and fits the social setting.
- source_word: הַסְּגָנִים
  chosen: the officials
  alternatives:
  - the rulers
  - the deputies
  - the prefects
  lexicon: HALOT
  rationale: The term refers to subordinate administrators or officials. 'Officials'
    is clear modern English without over-specifying an exact bureaucratic title.
- source_word: מַשָּׁא
  chosen: interest
  alternatives:
  - usury
  - debt-load
  - loan burden
  lexicon: HALOT
  rationale: In this economic context the noun refers to the burden imposed in lending,
    conventionally understood as interest. 'Usury' is possible but in modern English
    can imply illegally excessive interest; 'interest' is clearer and broader.
- source_word: אִישׁ בְּאָחִיו
  chosen: each from his brother
  alternatives:
  - each from his fellow
  - a man from his brother
  lexicon: HALOT
  rationale: The distributive איש plus 'his brother' emphasizes one Israelite exacting
    interest from another covenant kinsman. 'Each from his brother' preserves the
    distributive force and the familial/covenantal language.
- source_word: נשאים
  chosen: are exacting
  alternatives:
  - are charging
  - are imposing
  - are lending on interest
  lexicon: HALOT
  rationale: The participle from נשׁא in this context means imposing or exacting a
    debt-burden/interest. 'Are exacting' fits the accusatory tone and pairs naturally
    with 'interest.'
- source_word: וָאֶתֵּן עֲלֵיהֶם קְהִלָּה גְדוֹלָה
  chosen: I assembled a great gathering against them
  alternatives:
  - I called a great assembly against them
  - I set a great congregation over them
  lexicon: HALOT
  rationale: Although נתן literally means 'gave/set,' the idiom here is that Nehemiah
    convened or set in place a large public assembly in opposition to them. 'Assembled
    a great gathering against them' communicates the action in natural English while
    retaining the adversative force of עֲלֵיהֶם.
