id: NEH.5.5
reference: Nehemiah 5:5
source:
  edition: WLC
  text: וְ/עַתָּ֗ה כִּ/בְשַׂ֤ר אַחֵ֨י/נוּ֙ בְּשָׂרֵ֔/נוּ כִּ/בְנֵי/הֶ֖ם בָּנֵ֑י/נוּ
    וְ/הִנֵּ֣ה אֲנַ֣חְנוּ כֹ֠בְשִׁים אֶת בָּנֵ֨י/נוּ וְ/אֶת בְּנֹתֵ֜י/נוּ לַ/עֲבָדִ֗ים
    וְ/יֵ֨שׁ מִ/בְּנֹתֵ֤י/נוּ נִכְבָּשׁוֹת֙ וְ/אֵ֣ין לְ/אֵ֣ל יָדֵ֔/נוּ וּ/שְׂדֹתֵ֥י/נוּ
    וּ/כְרָמֵ֖י/נוּ לַ/אֲחֵרִֽים־־׃
translation:
  text: And now, our flesh is like the flesh of our brothers, our children like their
    children; yet here we are, forcing our sons and our daughters into slavery, and
    some of our daughters have already been enslaved. But it is not in our power to
    stop it, because our fields and our vineyards belong to others.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'we are of the same flesh as our brothers.' The Hebrew keeps the concrete
      image of shared flesh to stress common humanity and kinship.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'there is not to our hand power.' The clause expresses that they
      have no means or power, especially since their fields and vineyards are in the
      possession of others.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּבְשַׂר אַחֵינוּ בְּשָׂרֵנוּ
  chosen: our flesh is like the flesh of our brothers
  alternatives:
  - our bodies are like the bodies of our brothers
  - we are of the same flesh as our brothers
  lexicon: HALOT
  rationale: בָּשָׂר literally means 'flesh.' In this social-kinship complaint, the
    idiom expresses shared humanity/kinship with fellow Jews. 'Our flesh is like the
    flesh of our brothers' preserves the concrete Hebrew while remaining natural English.
- source_word: אַחֵינוּ
  chosen: our brothers
  alternatives:
  - our kin
  - our fellow Jews
  lexicon: HALOT
  rationale: The noun is literally 'our brothers.' Per gender-accurate policy, the
    masculine kinship term is retained rather than neutralized, while context implies
    fellow community members more broadly.
- source_word: כִּבְנֵיהֶם בָּנֵינוּ
  chosen: our children like their children
  alternatives:
  - our sons like their sons
  lexicon: HALOT
  rationale: בנים can mean 'sons' specifically or 'children' collectively. Because
    the comparison is corporate and later the verse explicitly distinguishes sons
    and daughters, 'children' best captures the representative sense here.
- source_word: כֹבְשִׁים
  chosen: forcing ... into slavery
  alternatives:
  - subduing
  - subjecting
  - enslaving
  lexicon: HALOT
  rationale: The verb כבשׁ has the sense of subduing or bringing into bondage. In
    this context, with לַעֲבָדִים immediately following, the meaning is specifically
    coercive enslavement. 'Forcing ... into slavery' makes the causative social reality
    explicit in idiomatic English.
- source_word: לַעֲבָדִים
  chosen: into slavery
  alternatives:
  - as slaves
  - for slaves
  lexicon: HALOT
  rationale: The phrase marks the result/state of being made עבדים. 'Into slavery'
    is natural English and preserves the bonded nature of the term, in line with the
    project's preference to avoid softening slavery language where salient.
- source_word: מִבְּנֹתֵינוּ נִכְבָּשׁוֹת
  chosen: some of our daughters have already been enslaved
  alternatives:
  - some of our daughters are enslaved
  - some of our daughters have been subdued
  lexicon: HALOT
  rationale: 'The Niphal participle indicates a passive state: the daughters are already
    in a condition of having been brought into bondage. ''Have already been enslaved''
    conveys both the passive force and the lament that this has already happened.'
- source_word: וְאֵין לְאֵל יָדֵנוּ
  chosen: it is not in our power to stop it
  alternatives:
  - it is not in our power
  - our hand is not to God
  - we are powerless
  lexicon: HALOT
  rationale: The idiom 'there is not to our hand power' expresses inability/lack of
    means. The word אֵל here is best taken in the sense of 'power, might' rather than
    as the divine name/title. 'It is not in our power to stop it' renders the idiom
    clearly in context.
- source_word: וּשְׂדֹתֵינוּ וּכְרָמֵינוּ לַאֲחֵרִים
  chosen: because our fields and our vineyards belong to others
  alternatives:
  - while our fields and vineyards are in the hands of others
  - and our fields and vineyards are another's
  lexicon: HALOT
  rationale: 'The verbless clause explains their powerlessness: their productive property
    has passed to others. Supplying ''belong to'' makes the English sentence complete
    and captures the possessive force.'
