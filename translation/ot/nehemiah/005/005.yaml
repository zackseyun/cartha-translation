theological_decisions:
- issue: Rendering of kinship language in a social-justice complaint
  chosen_reading: Retain 'brothers' while using 'children' in the comparative clause
  alternative_readings:
  - Use fully gender-neutral 'kinsmen/relatives' and 'children' throughout
  - Use fully formal 'brothers' and 'sons' throughout
  rationale: This preserves the Hebrew's masculine kinship term אַחֵינוּ and the representative
    sense of בנים in the first comparison, while later explicitly rendering both 'sons'
    and 'daughters' where the Hebrew does so. This follows the project's gender-accurate
    rather than gender-neutral policy.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Strength of slavery language
  chosen_reading: Use 'slavery/enslaved' rather than softer 'servitude/servants'
  alternative_readings:
  - servitude
  - bond-service
  rationale: The verse concerns debt bondage severe enough that children are being
    compelled into slave status. The project's philosophy prefers stronger slavery
    language where the bonded nature is salient.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 1; Contested terms
    table on δοῦλος/slave-servant principle
