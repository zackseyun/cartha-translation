id: NEH.5.6
reference: Nehemiah 5:6
source:
  edition: WLC
  text: וַ/יִּ֥חַר לִ֖/י מְאֹ֑ד כַּ/אֲשֶׁ֤ר שָׁמַ֨עְתִּי֙ אֶת זַֽעֲקָתָ֔/ם וְ/אֵ֖ת
    הַ/דְּבָרִ֥ים הָ/אֵֽלֶּה־׃
translation:
  text: I became very angry when I heard their outcry and these words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and these matters.' The Hebrew word can refer either to spoken words
      or to the matters being reported.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר לִי
  chosen: I became angry
  alternatives:
  - it burned to me
  - I was enraged
  lexicon: HALOT
  rationale: The idiom חרה + ל expresses anger kindling within a person. 'I became
    angry' renders the Hebrew idiom in natural English without losing the emotional
    force. 'It burned to me' is too literal for English, while 'I was enraged' may
    overstate the register.
- source_word: מְאֹד
  chosen: very
  alternatives:
  - greatly
  - exceedingly
  lexicon: HALOT
  rationale: מְאֹד intensifies the emotion. 'Very' is clear, natural modern English
    and adequately conveys the degree.
- source_word: כַּאֲשֶׁר
  chosen: when
  alternatives:
  - as
  - after
  lexicon: HALOT
  rationale: In context this conjunction introduces the time/circumstance of Nehemiah's
    anger upon hearing the complaint. 'When' best captures the temporal sense in idiomatic
    English.
- source_word: שָׁמַעְתִּי
  chosen: I heard
  alternatives:
  - I listened to
  lexicon: HALOT
  rationale: The verb שמע here denotes hearing the complaint. 'I heard' is the straightforward
    and contextually appropriate rendering.
- source_word: זַעֲקָתָם
  chosen: their outcry
  alternatives:
  - their cry
  - their complaint
  lexicon: HALOT
  rationale: זעקה denotes a cry of distress or protest. 'Outcry' preserves both the
    emotional intensity and the public/social grievance context better than the flatter
    'complaint.'
- source_word: וְאֵת הַדְּבָרִים הָאֵלֶּה
  chosen: and these words
  alternatives:
  - and these matters
  - and these charges
  lexicon: HALOT
  rationale: דברים can mean 'words,' 'matters,' or 'affairs' depending on context.
    Since Nehemiah has just heard the people's cry and what they were saying, 'these
    words' is the most direct rendering. 'These matters' is possible but less concrete;
    'charges' is too interpretive.
