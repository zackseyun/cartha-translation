id: NEH.5.4
reference: Nehemiah 5:4
source:
  edition: WLC
  text: וְ/יֵשׁ֙ אֲשֶׁ֣ר אֹמְרִ֔ים לָוִ֥ינוּ כֶ֖סֶף לְ/מִדַּ֣ת הַ/מֶּ֑לֶךְ שְׂדֹתֵ֖י/נוּ
    וּ/כְרָמֵֽי/נוּ׃
translation:
  text: And there were those who said, “We have borrowed money for the king’s tax
    on our fields and our vineyards.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “for the king’s tribute.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “silver”; that is, money.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֵשׁ
  chosen: And there were
  alternatives:
  - And some there were
  - And there are
  lexicon: HALOT
  rationale: Introduces another group within the larger complaint. English idiom prefers
    existential 'there were' here, matching the narrative past context rather than
    a wooden 'and there is.'
- source_word: אֲשֶׁר אֹמְרִים
  chosen: those who said
  alternatives:
  - who were saying
  - who say
  lexicon: HALOT
  rationale: The participle marks ongoing/reportive speech, but in English narrative
    this is most naturally rendered as 'those who said.' 'Those who' makes explicit
    the implied group referenced by the existential opening.
- source_word: לָוִינוּ
  chosen: we have borrowed
  alternatives:
  - we borrowed
  - we have taken a loan
  lexicon: HALOT
  rationale: The verb means to borrow/take a loan. Present perfect English fits the
    present consequences in the complaint, though simple past would also be possible.
- source_word: כֶסֶף
  chosen: money
  alternatives:
  - silver
  lexicon: HALOT
  rationale: While literally 'silver,' in economic contexts it commonly denotes money.
    'Money' communicates the sense clearly in modern English without loss.
- source_word: לְמִדַּת הַמֶּלֶךְ
  chosen: for the king’s tax
  alternatives:
  - for the king’s tribute
  - for the king’s levy
  lexicon: HALOT
  rationale: The phrase refers to an assessed payment due to the king. 'Tax' is the
    clearest modern equivalent; 'tribute' is possible but can sound more archaic or
    politically narrower.
- source_word: שְׂדֹתֵינוּ וּכְרָמֵינוּ
  chosen: on our fields and our vineyards
  alternatives:
  - against our fields and our vineyards
  - for our fields and our vineyards
  lexicon: HALOT
  rationale: The final nouns likely indicate the property on account of which the
    tax is owed. 'On our fields and our vineyards' best conveys taxation assessed
    upon landholdings in natural English.
