id: NEH.9.24
reference: Nehemiah 9:24
source:
  edition: WLC
  text: וַ/יָּבֹ֤אוּ הַ/בָּנִים֙ וַ/יִּֽירְשׁ֣וּ אֶת הָ/אָ֔רֶץ וַ/תַּכְנַ֨ע לִ/פְנֵי/הֶ֜ם
    אֶת יֹשְׁבֵ֤י הָ/אָ֨רֶץ֙ הַ/כְּנַ֣עֲנִ֔ים וַֽ/תִּתְּנֵ֖/ם בְּ/יָדָ֑/ם וְ/אֶת מַלְכֵי/הֶם֙
    וְ/אֶת עַֽמְמֵ֣י הָ/אָ֔רֶץ לַ/עֲשׂ֥וֹת בָּ/הֶ֖ם כִּ/רְצוֹנָֽ/ם־־־־׃
translation:
  text: So the sons came in and took possession of the land, and you subdued before
    them the inhabitants of the land, the Canaanites, and gave them into their hand,
    both their kings and the peoples of the land, to do with them according to their
    will.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the children' or more interpretively 'the Israelites.' The Hebrew is
      literally 'the sons.'
    reason: lexical_alternative
  - marker: b
    text: Or 'delivered them into their power.' The Hebrew reads literally 'gave them
      into their hand.'
    reason: lexical_alternative
  - marker: c
    text: Or 'to deal with them as they pleased.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבָּנִים
  chosen: the sons
  alternatives:
  - the children
  - their sons
  - the Israelites
  lexicon: HALOT
  rationale: Literally 'the sons.' In context this refers to the descendants of Israel
    who entered Canaan. 'The sons' preserves the familial/genealogical language of
    the Hebrew better than the more interpretive 'the Israelites.'
- source_word: וַיִּירְשׁוּ
  chosen: took possession of
  alternatives:
  - inherited
  - possessed
  lexicon: HALOT
  rationale: ירשׁ in land contexts commonly means to take possession/inherit. 'Took
    possession of' is idiomatic modern English and preserves the concrete land-tenure
    sense without implying merely passive receipt.
- source_word: וַתַּכְנַע
  chosen: you subdued
  alternatives:
  - you humbled
  - you brought into subjection
  lexicon: HALOT
  rationale: כנע here describes God's action in bringing the Canaanite inhabitants
    under Israel's power. 'Subdued' fits the military-political context better than
    the more general 'humbled.'
- source_word: יֹשְׁבֵי הָאָרֶץ
  chosen: the inhabitants of the land
  alternatives:
  - those dwelling in the land
  - the dwellers in the land
  lexicon: HALOT
  rationale: A standard rendering of the participial construction that is clear and
    natural in English.
- source_word: הַכְּנַעֲנִים
  chosen: the Canaanites
  alternatives:
  - the people of Canaan
  lexicon: HALOT
  rationale: The ethnic designation should be retained directly.
- source_word: וַתִּתְּנֵם בְּיָדָם
  chosen: gave them into their hand
  alternatives:
  - gave them into their power
  - delivered them into their hand
  lexicon: HALOT
  rationale: The idiom 'into their hand' is preserved because it is transparent in
    English and reflects the Hebrew imagery of power/control.
- source_word: מַלְכֵיהֶם
  chosen: their kings
  alternatives:
  - the kings of the Canaanites
  lexicon: HALOT
  rationale: The suffix naturally refers back to the inhabitants/Canaanites. 'Their
    kings' is concise and faithful.
- source_word: עַמְמֵי הָאָרֶץ
  chosen: the peoples of the land
  alternatives:
  - the peoples of the country
  - the nations of the land
  lexicon: HALOT
  rationale: Plural 'peoples' reflects עמים and preserves the sense of multiple ethnic
    groups within the land.
- source_word: לַעֲשׂוֹת בָּהֶם כִּרְצוֹנָם
  chosen: to do with them according to their will
  alternatives:
  - to deal with them as they pleased
  - to do to them as they desired
  lexicon: HALOT
  rationale: This rendering stays close to the Hebrew while remaining natural. 'According
    to their will' preserves the sense of acting in line with Israel's desire/pleasure
    without over-paraphrasing.
