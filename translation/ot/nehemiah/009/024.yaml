theological_decisions:
- issue: Referent of 'the sons'
  chosen_reading: The phrase refers to the descendants of Israel who entered and occupied
    Canaan.
  alternative_readings:
  - A more generalized reference to 'the Israelites'
  rationale: The Hebrew uses familial covenant language rather than the ethnic label.
    Preserving 'sons' maintains the narrative continuity with the fathers mentioned
    earlier in the prayer.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
- issue: Degree of literalness in conquest language
  chosen_reading: Retain the strong language of subduing and giving peoples into Israel's
    hand.
  alternative_readings:
  - Softer renderings such as 'enabled them to overcome'
  rationale: The verse explicitly attributes Israel's conquest success to God's action.
    The translation should not mute the force of the Hebrew military language.
