theological_decisions:
- issue: Divine compassion language
  chosen_reading: Retained plural 'mercies' rather than collapsing to singular 'compassion.'
  alternative_readings:
  - in your great compassion
  rationale: The Hebrew plural רַחֲמִים is significant and conveys the richness of
    God's compassionate acts. Preserving the plural avoids unnecessary flattening
    while remaining intelligible.
  doctrine_reference: Translation philosophy §5 (consistency of key terms) and §6
    (readable modern English)
