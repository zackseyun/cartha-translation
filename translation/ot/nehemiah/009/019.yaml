id: NEH.9.19
reference: Nehemiah 9:19
source:
  edition: WLC
  text: וְ/אַתָּה֙ בְּ/רַחֲמֶ֣י/ךָ הָֽ/רַבִּ֔ים לֹ֥א עֲזַבְתָּ֖/ם בַּ/מִּדְבָּ֑ר אֶת
    עַמּ֣וּד הֶ֠/עָנָן לֹא סָ֨ר מֵ/עֲלֵי/הֶ֤ם בְּ/יוֹמָם֙ לְ/הַנְחֹתָ֣/ם בְּ/הַ/דֶּ֔רֶךְ
    וְ/אֶת עַמּ֨וּד הָ/אֵ֤שׁ בְּ/לַ֨יְלָה֙ לְ/הָאִ֣יר לָ/הֶ֔ם וְ/אֶת הַ/דֶּ֖רֶךְ אֲשֶׁ֥ר
    יֵֽלְכוּ בָֽ/הּ־־־־־׃
translation:
  text: But you, in your abundant mercies, did not abandon them in the wilderness.
    The pillar of cloud did not depart from above them by day, to lead them on the
    way, nor the pillar of fire by night, to give them light and the way in which
    they should go.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in your great compassion.' The Hebrew uses a plural noun, literally
      'in your many mercies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרַחֲמֶיךָ הָרַבִּים
  chosen: in your abundant mercies
  alternatives:
  - in your great compassion
  - because of your many mercies
  lexicon: HALOT
  rationale: רַחֲמִים commonly denotes compassion/mercy in the plural. 'Abundant mercies'
    preserves both the plural form and the modifying adjective הָרַבִּים ('many/great'),
    while remaining natural English.
- source_word: עֲזַבְתָּם
  chosen: did not abandon them
  alternatives:
  - did not forsake them
  - did not leave them
  lexicon: HALOT
  rationale: עזב often means 'leave, forsake, abandon.' 'Abandon' communicates covenantal
    non-desertion clearly in modern English without archaic tone.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר can be rendered 'wilderness' or 'desert.' 'Wilderness' better
    matches biblical usage for Israel's wandering context and avoids overly narrow
    geographic imagery.
- source_word: עַמּוּד הֶעָנָן
  chosen: the pillar of cloud
  alternatives:
  - the cloud pillar
  lexicon: HALOT
  rationale: This is the standard and transparent rendering of the construct phrase,
    matching the Exodus narrative allusion.
- source_word: לֹא סָר מֵעֲלֵיהֶם
  chosen: did not depart from above them
  alternatives:
  - did not turn aside from over them
  - did not move away from above them
  lexicon: HALOT
  rationale: סוּר means 'turn aside, depart, remove oneself.' 'Depart from above them'
    preserves the spatial sense of מֵעֲלֵי and the ongoing divine guidance imagery.
- source_word: בְּיוֹמָם
  chosen: by day
  alternatives:
  - in the daytime
  lexicon: HALOT
  rationale: Idiomatic temporal expression in English; concise and standard in this
    narrative context.
- source_word: לְהַנְחֹתָם בְּהַדֶּרֶךְ
  chosen: to lead them on the way
  alternatives:
  - to guide them in the way
  - to lead them along the road
  lexicon: HALOT
  rationale: נחה in the Hiphil means 'lead, guide.' 'On the way' reflects בְּהַדֶּרֶךְ
    naturally and keeps the Exodus-travel motif.
- source_word: עַמּוּד הָאֵשׁ
  chosen: the pillar of fire
  alternatives:
  - the fire pillar
  lexicon: HALOT
  rationale: Standard rendering of the construct phrase; preserves the parallel with
    'pillar of cloud.'
- source_word: בַּלַּיְלָה
  chosen: by night
  alternatives:
  - in the night
  lexicon: HALOT
  rationale: Idiomatic temporal counterpart to 'by day,' preserving the verse's parallelism.
- source_word: לְהָאִיר לָהֶם
  chosen: to give them light
  alternatives:
  - to shine for them
  - to illumine them
  lexicon: HALOT
  rationale: אור in the Hiphil means 'give light, illumine.' 'Give them light' is
    clear, natural, and close to the Hebrew.
- source_word: וְאֶת הַדֶּרֶךְ אֲשֶׁר יֵלְכוּ בָהּ
  chosen: and the way in which they should go
  alternatives:
  - and the way they were to go
  - and the road on which they should walk
  lexicon: HALOT
  rationale: 'The direct-object marker with ''the way'' is best taken as coordinated
    with the infinitive phrase: the pillar of fire gave light both to them and to
    the way. ''Should go'' expresses the modal sense naturally in English without
    overstating command.'
