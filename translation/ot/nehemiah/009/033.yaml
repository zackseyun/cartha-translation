theological_decisions:
- issue: Description of God's character in relation to judgment
  chosen_reading: God is declared righteous in the calamities that have come upon
    Israel, without softening the statement or implying injustice.
  alternative_readings:
  - God is just in punishing us
  - You are right about everything that happened to us
  rationale: The Hebrew affirms God's righteousness with respect to the judgments
    experienced by the people. The translation preserves the confession's theological
    tension and covenantal accountability without over-specifying punitive mechanics
    beyond the text.
  doctrine_reference: Translation philosophy §3; Contested terms table for δικαιοσύνη
    by analogy of preserving 'righteous' language where theologically weighty.
