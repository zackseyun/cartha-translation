id: NEH.9.33
reference: Nehemiah 9:33
source:
  edition: WLC
  text: וְ/אַתָּ֣ה צַדִּ֔יק עַ֖ל כָּל הַ/בָּ֣א עָלֵ֑י/נוּ כִּֽי אֱמֶ֥ת עָשִׂ֖יתָ וַ/אֲנַ֥חְנוּ
    הִרְשָֽׁעְנוּ־־׃
translation:
  text: Yet you are righteous in all that has come upon us, for you have acted faithfully,
    but we have acted wickedly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you have done truth,' that is, 'you have acted in faithfulness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתָּה
  chosen: Yet you
  alternatives:
  - And you
  - But you
  lexicon: HALOT
  rationale: The conjunction with the pronoun marks a contrast with Israel's guilt
    in the surrounding confession. 'Yet you' brings out the adversative force naturally
    in English while preserving the direct address.
- source_word: צַדִּיק
  chosen: righteous
  alternatives:
  - just
  lexicon: HALOT
  rationale: צַדִּיק here describes God's moral rightness in relation to the judgments
    that have befallen the people. 'Righteous' best preserves the covenantal and theological
    weight; 'just' is possible but slightly narrower in English.
- source_word: עַל כָּל הַבָּא עָלֵינוּ
  chosen: in all that has come upon us
  alternatives:
  - over all that has come upon us
  - concerning all that has come upon us
  lexicon: HALOT
  rationale: The phrase expresses the sphere or respect in which God is righteous
    regarding the calamities experienced by the people. 'In all that has come upon
    us' is idiomatic and close to the Hebrew construction.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'Introduces the ground for the preceding assertion: God is righteous
    because of his own faithful action and Israel''s wickedness. ''For'' is concise
    and natural.'
- source_word: אֱמֶת
  chosen: faithfully
  alternatives:
  - truly
  - in faithfulness
  lexicon: HALOT
  rationale: Although אֱמֶת often means 'truth,' in this collocation with עשה it conveys
    acting in faithfulness/reliability. Rendering adverbially as 'faithfully' produces
    natural English while preserving the covenantal sense.
- source_word: עָשִׂיתָ
  chosen: you have acted
  alternatives:
  - you have done
  lexicon: HALOT
  rationale: Combined with אֱמֶת, the verb refers not merely to doing something but
    to God's conduct toward the people. 'You have acted' better fits English idiom
    in this context than the more wooden 'you have done.'
- source_word: וַאֲנַחְנוּ
  chosen: but we
  alternatives:
  - and we
  lexicon: HALOT
  rationale: The conjunction is contrastive in context, setting Israel's conduct against
    God's. 'But we' makes the contrast explicit and natural.
- source_word: הִרְשָׁעְנוּ
  chosen: have acted wickedly
  alternatives:
  - have done wickedly
  - have been wicked
  lexicon: HALOT
  rationale: The Hiphil form here denotes acting wickedly or doing wrong. 'Have acted
    wickedly' matches the verbal force and balances the earlier 'you have acted faithfully.'
