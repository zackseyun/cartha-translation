id: NEH.9.26
reference: Nehemiah 9:26
source:
  edition: WLC
  text: וַ/יַּמְר֨וּ וַֽ/יִּמְרְד֜וּ בָּ֗/ךְ וַ/יַּשְׁלִ֤כוּ אֶת תּוֹרָֽתְ/ךָ֙ אַחֲרֵ֣י
    גַוָּ֔/ם וְ/אֶת נְבִיאֶ֣י/ךָ הָרָ֔גוּ אֲשֶׁר הֵעִ֥ידוּ בָ֖/ם לַ/הֲשִׁיבָ֣/ם אֵלֶ֑י/ךָ
    וַֽ/יַּעֲשׂ֔וּ נֶאָצ֖וֹת גְּדוֹלֹֽת־־־׃
translation:
  text: But they acted presumptuously and rebelled against you, and they threw your
    law behind their backs. They killed your prophets, who had warned them in order
    to bring them back to you, and they committed great blasphemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were disobedient,' 'acted arrogantly,' or 'provoked'; the Hebrew verb
      suggests defiant resistance.
    reason: lexical_alternative
  - marker: b
    text: Or 'your instruction' for 'your law.'
    reason: lexical_alternative
  - marker: c
    text: Or 'testified against them'; the Hebrew can carry the sense of solemn warning
      or witness.
    reason: lexical_alternative
  - marker: d
    text: Or 'great contempts,' 'great insults,' or 'great provocations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּמְרוּ
  chosen: acted presumptuously
  alternatives:
  - were disobedient
  - acted arrogantly
  - provoked
  lexicon: HALOT
  rationale: The verb from מרה can denote rebellious or defiant conduct. In this context,
    paired with וַיִּמְרְדוּ, a more nuanced rendering avoids flattening the two verbs
    into simple repetition. 'Acted presumptuously' captures insolent defiance preceding
    explicit rebellion.
- source_word: וַיִּמְרְדוּ בָּךְ
  chosen: rebelled against you
  alternatives:
  - revolted against you
  lexicon: HALOT
  rationale: מרד is the more explicit term for rebellion. 'Against you' preserves
    the personal object marked by בָּךְ.
- source_word: וַיַּשְׁלִכוּ ... אַחֲרֵי גַוָּם
  chosen: they threw your law behind their backs
  alternatives:
  - cast your law behind their backs
  - flung your instruction behind their backs
  lexicon: HALOT
  rationale: The idiom vividly expresses contemptuous rejection. 'Behind their backs'
    preserves the concrete Hebrew image better than a paraphrase such as 'ignored.'
- source_word: תּוֹרָתְךָ
  chosen: your law
  alternatives:
  - your instruction
  lexicon: HALOT
  rationale: תּוֹרָה can mean instruction broadly, but in this covenantal-historical
    confession 'law' is the most natural and recognizable rendering while still faithful
    to the Hebrew.
- source_word: נְבִיאֶיךָ
  chosen: your prophets
  lexicon: HALOT
  rationale: Standard rendering with no contextual pressure for variation.
- source_word: הֵעִידוּ בָם
  chosen: had warned them
  alternatives:
  - testified against them
  - admonished them
  lexicon: HALOT
  rationale: The hiphil of עוּד often means to testify or warn solemnly. Because the
    following infinitive states the restorative purpose ('to bring them back to you'),
    'warned them' communicates the force naturally in English while preserving the
    prophetic covenant-warning sense.
- source_word: לַהֲשִׁיבָם אֵלֶיךָ
  chosen: in order to bring them back to you
  alternatives:
  - to turn them back to you
  - to restore them to you
  lexicon: HALOT
  rationale: 'The hiphil of שוב here is causative: the prophets'' warnings aimed to
    bring the people back to God. ''Bring them back'' is clear, idiomatic, and preserves
    the relational direction.'
- source_word: נֶאָצוֹת גְּדוֹלֹת
  chosen: great blasphemies
  alternatives:
  - great contempts
  - great insults
  - great provocations
  lexicon: HALOT
  rationale: The noun denotes acts of contempt or scorn directed toward God. 'Great
    blasphemies' best conveys the theological gravity of these God-dishonoring acts
    in context, though the Hebrew is broader than spoken blasphemy alone.
