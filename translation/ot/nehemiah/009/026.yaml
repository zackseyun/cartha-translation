theological_decisions:
- issue: Rendering the paired rebellion verbs וַיַּמְרוּ / וַיִּמְרְדוּ
  chosen_reading: Differentiate them as 'acted presumptuously and rebelled'
  alternative_readings:
  - '''were disobedient and rebelled'''
  - '''provoked and rebelled'''
  rationale: The Hebrew uses two related but distinct verbs. Differentiating them
    preserves the rhetorical intensification rather than collapsing them into a single
    idea. This is a lexical-stylistic decision, not a doctrinal one, but it affects
    how the people's sin is portrayed.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
- issue: Rendering נֶאָצוֹת as 'blasphemies'
  chosen_reading: Use 'blasphemies' in the main text
  alternative_readings:
  - '''contempts'''
  - '''provocations'''
  - '''insults'''
  rationale: The context is direct covenantal offense against God, not merely social
    wrongdoing. 'Blasphemies' communicates that vertical dimension clearly in modern
    English, while a footnote preserves broader lexical alternatives.
  doctrine_reference: Translation philosophy §6 (readable modern English, not archaic
    or academic)
