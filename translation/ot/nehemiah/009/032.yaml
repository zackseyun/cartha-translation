id: NEH.9.32
reference: Nehemiah 9:32
source:
  edition: WLC
  text: וְ/עַתָּ֣ה אֱ֠לֹהֵי/נוּ הָ/אֵ֨ל הַ/גָּד֜וֹל הַ/גִּבּ֣וֹר וְ/הַ/נּוֹרָא֮ שׁוֹמֵ֣ר
    הַ/בְּרִ֣ית וְ/הַ/חֶסֶד֒ אַל יִמְעַ֣ט לְ/פָנֶ֡י/ךָ אֵ֣ת כָּל הַ/תְּלָאָ֣ה אֲֽשֶׁר
    מְ֠צָאַתְ/נוּ לִ/מְלָכֵ֨י/נוּ לְ/שָׂרֵ֧י/נוּ וּ/לְ/כֹהֲנֵ֛י/נוּ וְ/לִ/נְבִיאֵ֥/נוּ
    וְ/לַ/אֲבֹתֵ֖י/נוּ וּ/לְ/כָל עַמֶּ֑/ךָ מִ/ימֵי֙ מַלְכֵ֣י אַשּׁ֔וּר עַ֖ד הַ/יּ֥וֹם
    הַ/זֶּֽה־־־־׃
translation:
  text: 'And now, our God—the great, mighty, and fearsome God, who keeps the covenant
    and steadfast love—do not let all the hardship that has come upon us seem small
    before you: upon our kings, our officials, our priests, our prophets, our fathers,
    and all your people, from the days of the kings of Assyria until this day.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'awesome' for 'fearsome.' The Hebrew term conveys that God inspires reverent
      fear.
    reason: lexical_alternative
  - marker: b
    text: Or 'our ancestors' for 'our fathers.' The Hebrew is masculine and refers
      to the forefathers of the people.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֵל
  chosen: God
  alternatives:
  - the Mighty God
  - the divine one
  lexicon: HALOT
  rationale: In apposition to 'our God' and followed by adjectival titles, אֵל is
    best rendered simply 'God' in English rather than repeating a more wooden 'the
    God.' This preserves the vocative force and natural English style.
- source_word: הַגָּדוֹל הַגִּבּוֹר וְהַנּוֹרָא
  chosen: the great, mighty, and fearsome
  alternatives:
  - the great, the mighty, and the awesome
  - great, powerful, and terrifying
  lexicon: HALOT
  rationale: These are covenantal divine epithets. 'Fearsome' preserves the sense
    of inspiring dread/reverence in נורא without importing modern casual connotations
    of 'awesome.' The article is carried naturally in English as a coordinated series.
- source_word: שׁוֹמֵר
  chosen: who keeps
  alternatives:
  - keeping
  - guardian of
  lexicon: HALOT
  rationale: The participle functions attributively of God. 'Who keeps' gives clear
    English relative-clause force while preserving the ongoing covenantal sense.
- source_word: הַבְּרִית וְהַחֶסֶד
  chosen: the covenant and steadfast love
  alternatives:
  - the covenant and mercy
  - the covenant and lovingkindness
  lexicon: HALOT
  rationale: חסד in covenant contexts often denotes loyal covenant love. 'Steadfast
    love' is a well-established and accurate rendering that preserves theological
    weight without archaic tone.
- source_word: אַל יִמְעַט לְפָנֶיךָ
  chosen: do not let ... seem small before you
  alternatives:
  - do not let ... be little before you
  - do not regard ... as insignificant
  lexicon: HALOT
  rationale: The idiom asks God not to treat or view their affliction as something
    small. 'Seem small before you' preserves the relational idiom לְפָנֶיךָ while
    reading naturally in English.
- source_word: כָּל הַתְּלָאָה
  chosen: all the hardship
  alternatives:
  - all the trouble
  - all the distress
  - all the suffering
  lexicon: HALOT
  rationale: תלאה denotes toil, hardship, or trouble experienced. 'Hardship' fits
    the collective historical suffering in view and avoids sounding either too mild
    ('trouble') or too narrow.
- source_word: אֲשֶׁר מְצָאַתְנוּ
  chosen: that has come upon us
  alternatives:
  - that has found us
  - that has overtaken us
  lexicon: HALOT
  rationale: The Hebrew literally says 'has found us,' an idiom for adversity befalling
    someone. 'Has come upon us' communicates the sense idiomatically in modern English.
- source_word: לִמְלָכֵינוּ לְשָׂרֵינוּ וּלְכֹהֲנֵינוּ וְלִנְבִיאֵינוּ וְלַאֲבֹתֵינוּ
  chosen: upon our kings, our officials, our priests, our prophets, our fathers
  alternatives:
  - to our kings ...
  - our leaders ... our ancestors
  lexicon: HALOT
  rationale: The prefixed ל marks those affected by the hardship; in English, repeating
    'upon' once and then listing recipients is natural. שׂרים is rendered 'officials'
    rather than 'princes' for clarity. אבותינו is kept as 'our fathers' per gender-accurate
    policy and because it refers to forefathers/ancestors in Israel's history.
- source_word: וּלְכָל עַמֶּךָ
  chosen: and all your people
  alternatives:
  - and upon all your people
  lexicon: HALOT
  rationale: The phrase extends the list from leaders and ancestors to the whole covenant
    community. English omits a second 'upon' smoothly after the prior list structure.
- source_word: מִימֵי מַלְכֵי אַשּׁוּר
  chosen: from the days of the kings of Assyria
  alternatives:
  - since the days of the Assyrian kings
  lexicon: HALOT
  rationale: A temporal expression marking the beginning of the period of affliction.
    'Kings of Assyria' is the most direct rendering of the construct chain.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: until this day
  alternatives:
  - to this day
  - until the present day
  lexicon: HALOT
  rationale: Standard temporal idiom. 'Until this day' preserves the sense of an unbroken
    span from Assyrian times to the speaker's present.
