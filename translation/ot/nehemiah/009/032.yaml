theological_decisions:
- issue: Rendering of covenantal divine epithets
  chosen_reading: the great, mighty, and fearsome God
  alternative_readings:
  - the great, mighty, and awesome God
  rationale: The verse invokes God with language echoing covenantal confession. 'Fearsome'
    better preserves the reverential dread in נורא than the contemporary English 'awesome,'
    which can sound weakened or colloquial.
  doctrine_reference: Translation philosophy §6 (readable modern English, not flattening
    theological weight)
- issue: Rendering אבותינו
  chosen_reading: our fathers
  alternative_readings:
  - our ancestors
  rationale: The Hebrew is grammatically masculine and refers to the forefathers of
    the people. Per gender-accurate policy, the masculine form is retained in the
    main text rather than neutralizing it, while an alternative may be noted for readers.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
