theological_decisions:
- issue: Rendering the divine-character formula חַנּוּן וְרַחוּם
  chosen_reading: gracious and compassionate
  alternative_readings:
  - gracious and merciful
  - merciful and compassionate
  rationale: This preserves the lexical distinction between the paired adjectives
    in a well-known covenantal description of God's character without importing extra
    doctrinal nuance. It also avoids flattening both terms into near-identical English
    words.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Force of the opening waw
  chosen_reading: adversative ('But')
  alternative_readings:
  - simple connective ('And')
  rationale: In the prayer's flow, the clause contrasts God's mercy with the people's
    repeated rebellion and deserved judgment. 'But' communicates the discourse function
    more clearly in modern English while remaining faithful to the Hebrew conjunction's
    contextual range.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
