id: NEH.9.8
reference: Nehemiah 9:8
source:
  edition: WLC
  text: וּ/מָצָ֣אתָ אֶת לְבָב/וֹ֮ נֶאֱמָ֣ן לְ/פָנֶי/ךָ֒ וְ/כָר֨וֹת עִמּ֜/וֹ הַ/בְּרִ֗ית
    לָ/תֵ֡ת אֶת אֶרֶץ֩ הַ/כְּנַעֲנִ֨י הַ/חִתִּ֜י הָ/אֱמֹרִ֧י וְ/הַ/פְּרִזִּ֛י וְ/הַ/יְבוּסִ֥י
    וְ/הַ/גִּרְגָּשִׁ֖י לָ/תֵ֣ת לְ/זַרְע֑/וֹ וַ/תָּ֨קֶם֙ אֶת דְּבָרֶ֔י/ךָ כִּ֥י צַדִּ֖יק
    אָֽתָּה־־־׃
translation:
  text: You found his heart faithful before you, and made a covenant with him to give
    the land of the Canaanite, the Hittite, the Amorite, the Perizzite, the Jebusite,
    and the Girgashite—to give it to his offspring. And you have fulfilled your words,
    for you are righteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to his descendants'; Hebrew 'seed/offspring' is a collective singular.
    reason: lexical_alternative
  - marker: b
    text: Or 'you established/confirmed your words.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for you are just.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּמָצָאתָ
  chosen: You found
  alternatives:
  - You discovered
  - You saw
  lexicon: HALOT
  rationale: The verb מצא in Qal commonly means 'find.' 'You found' preserves the
    directness of the Hebrew and fits the idiom of God discerning Abraham's inner
    disposition.
- source_word: לְבָבוֹ
  chosen: his heart
  alternatives:
  - his inner self
  - his mind
  lexicon: HALOT
  rationale: לֵבָב/לֵב in Hebrew denotes the inner person, including will and disposition.
    'Heart' is the standard and most transparent rendering in biblical English.
- source_word: נֶאֱמָן
  chosen: faithful
  alternatives:
  - trustworthy
  - steadfast
  lexicon: HALOT
  rationale: נֶאֱמָן conveys reliability or faithfulness. 'Faithful' best captures
    covenantal loyalty/disposition here and matches common biblical usage without
    overinterpreting.
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - in your presence
  lexicon: HALOT
  rationale: Literally 'before your face/presence.' 'Before you' is natural English
    and preserves the relational and evaluative sense.
- source_word: וְכָרוֹת עִמּוֹ הַבְּרִית
  chosen: and made a covenant with him
  alternatives:
  - and cut a covenant with him
  - and established the covenant with him
  lexicon: HALOT
  rationale: כרת ברית is the standard idiom 'cut/make a covenant.' 'Made a covenant'
    is optimal-equivalence English; 'cut' is more formal but less natural, while 'established'
    would blur the specific idiom.
- source_word: לָתֵת
  chosen: to give
  alternatives:
  - to grant
  lexicon: HALOT
  rationale: The infinitive expresses the covenant purpose/content. 'To give' is straightforward
    and preserves the repeated Hebrew wording.
- source_word: אֶרֶץ
  chosen: the land
  alternatives:
  - the territory
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the promised land/territory. 'The land' is the standard
    biblical rendering and fits the covenant context.
- source_word: הַכְּנַעֲנִי ... הַגִּרְגָּשִׁי
  chosen: the Canaanite, the Hittite, the Amorite, the Perizzite, the Jebusite, and
    the Girgashite
  lexicon: HALOT
  rationale: These are ethnonyms in singular collective form after 'land of.' Rendering
    each with the singular gentilic preserves the Hebrew structure and traditional
    identification of the peoples.
- source_word: לְזַרְעוֹ
  chosen: to his offspring
  alternatives:
  - to his seed
  - to his descendants
  lexicon: HALOT
  rationale: זֶרַע is a collective noun meaning 'seed/offspring.' 'Offspring' preserves
    the singular collective force better than 'descendants' while remaining natural
    modern English. 'Seed' is more formal but less transparent to many readers.
- source_word: וַתָּקֶם
  chosen: you have fulfilled
  alternatives:
  - you established
  - you confirmed
  - you carried out
  lexicon: HALOT
  rationale: In context קום with 'words' means to establish/confirm by bringing to
    pass. English perfect 'have fulfilled' communicates completed realization of the
    promise in a prayer of praise.
- source_word: דְּבָרֶיךָ
  chosen: your words
  alternatives:
  - your word
  - your promises
  lexicon: HALOT
  rationale: The Hebrew is plural. 'Your words' is formally accurate; while 'your
    promises' is interpretive and contextually true, the text itself says 'words.'
- source_word: כִּי צַדִּיק אָתָּה
  chosen: for you are righteous
  alternatives:
  - because you are righteous
  - for you are just
  lexicon: HALOT
  rationale: צַדִּיק can mean 'righteous' or 'just.' 'Righteous' is the default for
    consistency and because the statement grounds God's covenant faithfulness in his
    moral rectitude. 'For' fits the explanatory force of כִּי.
