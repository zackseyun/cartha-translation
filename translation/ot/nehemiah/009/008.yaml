theological_decisions:
- issue: Rendering of צַדִּיק in reference to God
  chosen_reading: righteous
  alternative_readings:
  - just
  rationale: Both are lexically possible. 'Righteous' preserves a broader covenantal
    and moral sense, while 'just' narrows toward judicial connotations. The verse
    praises God's faithfulness in keeping covenant promises, so 'righteous' best fits
    the context while preserving theological breadth.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη default ''righteousness''
    with ''justice'' preserved where relevant; by analogy, Hebrew צדק-family language
    is best rendered consistently unless context demands otherwise.'
