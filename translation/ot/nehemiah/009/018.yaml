theological_decisions:
- issue: Rendering of idolatrous אֱלֹהֶיךָ
  chosen_reading: your god
  alternative_readings:
  - your God
  rationale: Because the referent is the golden calf, lowercase 'god' avoids implying
    legitimacy or identity with the LORD, while still reflecting the people's claim.
    This preserves the polemical force of the narrative without importing extra interpretation.
- issue: Force of נֶאָצוֹת in relation to God
  chosen_reading: blasphemies
  alternative_readings:
  - provocations
  - contemptuous acts
  rationale: The verse recounts direct affronts against God in the golden calf episode.
    'Blasphemies' foregrounds the vertical, God-dishonoring dimension of the sin.
    This is a contextual choice, documented because the Hebrew term can be rendered
    more broadly.
  doctrine_reference: Translation philosophy §5
