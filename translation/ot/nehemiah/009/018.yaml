id: NEH.9.18
reference: Nehemiah 9:18
source:
  edition: WLC
  text: אַ֗ף כִּֽי עָשׂ֤וּ לָ/הֶם֙ עֵ֣גֶל מַסֵּכָ֔ה וַ/יֹּ֣אמְר֔וּ זֶ֣ה אֱלֹהֶ֔י/ךָ
    אֲשֶׁ֥ר הֶעֶלְ/ךָ֖ מִ/מִּצְרָ֑יִם וַֽ/יַּעֲשׂ֔וּ נֶאָצ֖וֹת גְּדֹלֽוֹת־׃
translation:
  text: Even when they made for themselves a cast metal calf and said, ‘This is your
    god who brought you up out of Egypt,’ and committed great blasphemies,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a molten calf.”
    reason: lexical_alternative
  - marker: b
    text: Or “great provocations” or “great contemptuous acts.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף כִּי
  chosen: Even when
  alternatives:
  - even though
  - although
  lexicon: HALOT
  rationale: In context this introduces a concessive clause within the prayer's recounting
    of Israel's rebellion despite God's mercy. 'Even when' is natural modern English
    and preserves the concessive force without sounding overly formal.
- source_word: עָשׂוּ לָהֶם
  chosen: they made for themselves
  alternatives:
  - they made themselves
  - they made
  lexicon: HALOT
  rationale: 'The reflexive nuance of לָהֶם is significant: the calf was made for
    their own use/worship. ''For themselves'' preserves that nuance more clearly than
    a bare ''made''.'
- source_word: עֵגֶל מַסֵּכָה
  chosen: a cast metal calf
  alternatives:
  - a molten calf
  - an image of a calf
  - a cast calf
  lexicon: HALOT
  rationale: מַסֵּכָה denotes something cast in metal, often an idol-image. 'Cast
    metal calf' communicates both the calf form and the manufactured-idol sense in
    readable English. 'Molten calf' is traditional but less natural in current English.
- source_word: זֶה אֱלֹהֶיךָ
  chosen: This is your god
  alternatives:
  - This is your God
  - These are your gods
  lexicon: HALOT
  rationale: The singular demonstrative זֶה and singular suffix on אֱלֹהֶיךָ support
    a singular rendering here. Lowercase 'god' fits the idolatrous referent rather
    than the true God. The plural alternative reflects Exodus 32 translation tradition
    but is less aligned with the immediate Hebrew form here.
- source_word: אֲשֶׁר הֶעֶלְךָ מִמִּצְרַיִם
  chosen: who brought you up out of Egypt
  alternatives:
  - who brought you up from Egypt
  lexicon: HALOT
  rationale: The idiom עלה + מן in exodus contexts is conventionally and clearly rendered
    'brought up out of Egypt.' This preserves the exodus formula echoed in the golden
    calf episode.
- source_word: וַיַּעֲשׂוּ
  chosen: and committed
  alternatives:
  - and did
  - and performed
  lexicon: HALOT
  rationale: With נֶאָצוֹת, English idiom prefers 'committed' rather than the more
    wooden 'did.' This is an optimal-equivalence adjustment for naturalness while
    preserving the verbal force.
- source_word: נֶאָצוֹת גְּדֹלוֹת
  chosen: great blasphemies
  alternatives:
  - great provocations
  - great contempts
  - great insults
  lexicon: HALOT
  rationale: The noun denotes acts of contempt or scorn directed against God; in this
    context of idolatry, 'blasphemies' best captures the Godward offense. 'Provocations'
    is possible, but 'blasphemies' more directly conveys the theological gravity of
    their speech and action.
