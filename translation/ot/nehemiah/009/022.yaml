id: NEH.9.22
reference: Nehemiah 9:22
source:
  edition: WLC
  text: וַ/תִּתֵּ֨ן לָ/הֶ֤ם מַמְלָכוֹת֙ וַ/עֲמָמִ֔ים וַֽ/תַּחְלְקֵ֖/ם לְ/פֵאָ֑ה וַ/יִּֽירְשׁ֞וּ
    אֶת אֶ֣רֶץ סִיח֗וֹן וְ/אֶת אֶ֨רֶץ֙ מֶ֣לֶךְ חֶשְׁבּ֔וֹן וְ/אֶת אֶ֖רֶץ ע֥וֹג מֶֽלֶךְ
    הַ/בָּשָֽׁן־־־־׃
translation:
  text: You gave them kingdoms and peoples, and allotted them to every corner. So
    they took possession of the land of Sihon, that is, the land of the king of Heshbon,
    and the land of Og king of Bashan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'divided them by districts,' 'apportioned them portion by portion,' or
      'to the edge.' The Hebrew phrase is difficult and may describe distribution
      by regions or to every extremity.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew ''the land of Sihon, and the land of the king of Heshbon.'' Since
      Sihon was the king of Heshbon, the phrase may function appositionally: ''the
      land of Sihon, that is, the land of the king of Heshbon.'''
    reason: alternative_reading
lexical_decisions:
- source_word: מַמְלָכוֹת
  chosen: kingdoms
  alternatives:
  - realms
  lexicon: HALOT
  rationale: The plural noun denotes political domains or royal territories. 'Kingdoms'
    is the most direct and natural rendering in English.
- source_word: עֲמָמִים
  chosen: peoples
  alternatives:
  - nations
  lexicon: HALOT
  rationale: The term refers to ethnic or political groups. 'Peoples' fits the parallel
    with 'kingdoms' and avoids implying only modern nation-states.
- source_word: וַתַּחְלְקֵם
  chosen: allotted them
  alternatives:
  - divided them
  - apportioned them
  lexicon: HALOT
  rationale: The verb means to divide or apportion. In context, God is distributing
    conquered territories/peoples to Israel, so 'allotted them' captures both division
    and grant.
- source_word: לְפֵאָה
  chosen: to every corner
  alternatives:
  - by districts
  - portion by portion
  - to the edge
  lexicon: HALOT
  rationale: Literally related to 'edge/corner/side.' In this context it likely means
    distribution in all directions or by extremities/sections. 'To every corner' is
    idiomatic English that preserves the spatial sense without over-specifying an
    uncertain nuance.
- source_word: וַיִּירְשׁוּ
  chosen: took possession of
  alternatives:
  - inherited
  - possessed
  lexicon: HALOT
  rationale: The verb often means to possess, dispossess, or inherit. Here it refers
    to Israel's acquisition of territory through conquest and divine gift; 'took possession
    of' expresses that concrete historical sense better than the more passive 'inherited'.
- source_word: אֶרֶץ
  chosen: land
  alternatives:
  - country
  - territory
  lexicon: HALOT
  rationale: '''Land'' is the standard rendering and works naturally for each occurrence
    in the verse, referring to territorial domain.'
- source_word: סִיחוֹן
  chosen: Sihon
  rationale: Standard English transliteration of the personal name.
- source_word: מֶלֶךְ חֶשְׁבּוֹן
  chosen: the king of Heshbon
  alternatives:
  - king Heshbon
  lexicon: HALOT
  rationale: The construct chain identifies Sihon as ruler of Heshbon. Rendering it
    explicitly as 'the king of Heshbon' is clear English and reflects the Hebrew syntax.
- source_word: עוֹג מֶלֶךְ הַבָּשָׁן
  chosen: Og king of Bashan
  alternatives:
  - Og, the king of Bashan
  lexicon: HALOT
  rationale: This is a straightforward name-title-place sequence. The chosen wording
    is concise and natural while preserving the Hebrew identification.
