theological_decisions:
- issue: Referent of the allotted objects in 'kingdoms and peoples' with following
    singular pronominal suffix
  chosen_reading: God gave Israel kingdoms and peoples and apportioned them as territorial
    inheritances in every region.
  alternative_readings:
  - God divided the kingdoms and peoples themselves into portions
  - God allotted Israel by districts/regions
  rationale: The syntax is compressed and somewhat difficult, but the broader context
    recounts God's gift of conquered territories to Israel. The translation reflects
    that historical sense without adding doctrinal interpretation beyond the narrative.
  doctrine_reference: Translation philosophy §1, §3, §5
