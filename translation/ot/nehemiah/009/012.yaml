theological_decisions:
- issue: Divine guidance imagery in wilderness tradition
  chosen_reading: Render the verse straightforwardly as God's historical guidance
    of Israel by cloud and fire, without importing additional typological interpretation
    into the main text.
  alternative_readings:
  - A more interpretive rendering that foregrounds divine presence rather than guidance
  rationale: The Hebrew text emphasizes God's leading and illuminating Israel's route.
    The translation preserves that concrete historical sense and leaves broader theological
    inferences to readers and notes rather than embedding them in the wording.
  doctrine_reference: Translation philosophy §1, §3
