id: NEH.9.12
reference: Nehemiah 9:12
source:
  edition: WLC
  text: וּ/בְ/עַמּ֣וּד עָנָ֔ן הִנְחִיתָ֖/ם יוֹמָ֑ם וּ/בְ/עַמּ֥וּד אֵשׁ֙ לַ֔יְלָה לְ/הָאִ֣יר
    לָ/הֶ֔ם אֶת הַ/דֶּ֖רֶךְ אֲשֶׁ֥ר יֵֽלְכוּ בָֽ/הּ־־׃
translation:
  text: By a pillar of cloud you led them by day, and by a pillar of fire by night,
    to give them light on the way in which they should go.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to illumine the way for them'; the Hebrew literally says 'to give light
      to them [regarding] the way.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/עַמּוּד עָנָן
  chosen: By a pillar of cloud
  alternatives:
  - In a pillar of cloud
  - With a pillar of cloud
  lexicon: HALOT
  rationale: The preposition ב with עַמּוּד is instrumental/local. 'By a pillar of
    cloud' is idiomatic English and preserves the means by which God guided them without
    over-specifying spatial nuance.
- source_word: הִנְחִיתָם
  chosen: you led them
  alternatives:
  - you guided them
  - you caused them to rest
  lexicon: HALOT
  rationale: From נחה in the Hiphil, the sense here is guiding/leading. 'Led' is concise
    and natural in context of wilderness guidance. 'Caused them to rest' is a possible
    nuance in some contexts but does not fit the parallel with illuminating the path.
- source_word: יוֹמָם
  chosen: by day
  alternatives:
  - in the daytime
  - daytime
  lexicon: HALOT
  rationale: Adverbial temporal expression; 'by day' matches the paired structure
    with 'by night' and traditional English usage while remaining clear.
- source_word: וּ/בְ/עַמּוּד אֵשׁ
  chosen: and by a pillar of fire
  alternatives:
  - and in a pillar of fire
  - and with a pillar of fire
  lexicon: HALOT
  rationale: Parallel to the first phrase; 'by' preserves the instrumental sense and
    keeps the Hebrew symmetry.
- source_word: לַיְלָה
  chosen: by night
  alternatives:
  - at night
  - in the night
  lexicon: HALOT
  rationale: Temporal counterpart to יוֹמָם. 'By night' preserves the balanced cadence
    of the Hebrew.
- source_word: לְהָאִיר לָהֶם
  chosen: to give them light
  alternatives:
  - to shine for them
  - to illumine for them
  - to light for them
  lexicon: HALOT
  rationale: Infinitive of אור in Hiphil expresses purpose/result. 'To give them light'
    is idiomatic modern English and conveys the benefactive sense of לָהֶם.
- source_word: אֶת הַדֶּרֶךְ
  chosen: on the way
  alternatives:
  - the way
  - the path
  lexicon: HALOT
  rationale: Although the direct object marker marks 'the way' as the object of illumination,
    English idiom prefers 'give them light on the way.' This preserves the sense without
    wooden phrasing. 'Way' is retained over 'path' for consistency with common biblical
    route imagery.
- source_word: אֲשֶׁר יֵלְכוּ בָהּ
  chosen: in which they should go
  alternatives:
  - that they should walk in
  - where they were to go
  - in which they were to walk
  lexicon: HALOT
  rationale: The relative clause specifies the route to be taken. 'Should go' communicates
    intended direction without implying mere possibility. 'Walk' is more literal for
    הלך but 'go' is more natural in English for route guidance.
