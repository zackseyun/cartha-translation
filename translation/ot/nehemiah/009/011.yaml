id: NEH.9.11
reference: Nehemiah 9:11
source:
  edition: WLC
  text: וְ/הַ/יָּם֙ בָּקַ֣עְתָּ לִ/פְנֵי/הֶ֔ם וַ/יַּֽעַבְר֥וּ בְ/תוֹךְ הַ/יָּ֖ם בַּ/יַּבָּשָׁ֑ה
    וְֽ/אֶת רֹ֨דְפֵי/הֶ֜ם הִשְׁלַ֧כְתָּ בִ/מְצוֹלֹ֛ת כְּמוֹ אֶ֖בֶן בְּ/מַ֥יִם עַזִּֽים־־־׃
translation:
  text: You split the sea before them, and they passed through the midst of the sea
    on dry ground; and you threw their pursuers into the depths like a stone into
    mighty waters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'divided the sea.'
    reason: lexical_alternative
  - marker: b
    text: Or 'into the deeps.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּקַעְתָּ
  chosen: split
  alternatives:
  - divided
  - cleft open
  lexicon: HALOT
  rationale: The verb בקע commonly means to split or cleave. 'Split' is vivid, natural
    modern English, and avoids the slightly traditionalized feel of 'divided' while
    still matching the physical action described.
- source_word: לִפְנֵיהֶם
  chosen: before them
  alternatives:
  - in front of them
  lexicon: HALOT
  rationale: The preposition plus פָּנִים idiomatically means 'before' or 'in front
    of.' 'Before them' is concise and idiomatic in elevated narrative/prayer style.
- source_word: וַיַּעַבְרוּ
  chosen: they passed through
  alternatives:
  - they crossed over
  lexicon: HALOT
  rationale: עבר in this context refers to traversing the sea. 'Passed through' fits
    the following phrase 'the midst of the sea' better than 'crossed over,' which
    can sound more destination-focused.
- source_word: בְתוֹךְ הַיָּם
  chosen: the midst of the sea
  alternatives:
  - the middle of the sea
  - through the sea
  lexicon: HALOT
  rationale: תוֹךְ means midst/interior. 'The midst of the sea' preserves the concrete
    imagery and the formal force of the Hebrew better than the more compressed 'through
    the sea.'
- source_word: בַּיַּבָּשָׁה
  chosen: on dry ground
  alternatives:
  - on the dry land
  - on dry land
  lexicon: HALOT
  rationale: This phrase is conventionally and accurately rendered 'on dry ground.'
    It conveys the miraculous condition of the seabed without sounding awkward.
- source_word: רֹדְפֵיהֶם
  chosen: their pursuers
  alternatives:
  - those pursuing them
  - their persecutors
  lexicon: HALOT
  rationale: The participle from רדף denotes those chasing after them. 'Pursuers'
    is the most direct and contextually appropriate rendering in the exodus setting.
- source_word: הִשְׁלַכְתָּ
  chosen: threw
  alternatives:
  - cast
  - hurled
  lexicon: HALOT
  rationale: The hiphil of שלך means to throw/cast. 'Threw' is straightforward modern
    English; 'cast' is more traditional, and 'hurled' may over-intensify the action.
- source_word: בִמְצוֹלֹת
  chosen: into the depths
  alternatives:
  - into the deep places
  - into the deeps
  lexicon: HALOT
  rationale: מְצוֹלוֹת refers to depths, especially sea depths. 'Into the depths'
    is idiomatic and preserves the image of sinking into deep waters.
- source_word: כְּמוֹ אֶבֶן
  chosen: like a stone
  alternatives:
  - as a stone
  lexicon: HALOT
  rationale: The simile is simple and forceful. 'Like a stone' is natural contemporary
    English and preserves the comparison exactly.
- source_word: בְּמַיִם עַזִּים
  chosen: into mighty waters
  alternatives:
  - in mighty waters
  - in strong waters
  - in raging waters
  lexicon: HALOT
  rationale: 'The preposition ב here is retained in sense, but English idiom works
    best by linking the simile to motion: a stone thrown ''into mighty waters.'' עַזִּים
    means strong/mighty; ''mighty waters'' preserves the elevated tone without adding
    interpretive color like ''raging.'''
