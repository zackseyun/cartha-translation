theological_decisions:
- issue: Divine action in the exodus recollection
  chosen_reading: Retain direct second-person address ('You split... you threw') as
    a confession of God's historical saving act.
  alternative_readings:
  - More impersonal renderings that obscure direct address
  rationale: The verse is part of a communal prayer recounting God's acts. Preserving
    the second-person verbs maintains the theological force of praise and remembrance
    without adding interpretation.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    and theological tension without paraphrase.'
