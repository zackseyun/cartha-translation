id: NEH.9.16
reference: Nehemiah 9:16
source:
  edition: WLC
  text: וְ/הֵ֥ם וַ/אֲבֹתֵ֖י/נוּ הֵזִ֑ידוּ וַ/יַּקְשׁוּ֙ אֶת עָרְפָּ֔/ם וְ/לֹ֥א שָׁמְע֖וּ
    אֶל מִצְוֺתֶֽי/ךָ־־׃
translation:
  text: But they, our fathers, acted presumptuously and stiffened their neck, and
    did not listen to your commandments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'acted arrogantly' or 'were presumptuous.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''stiffened their neck,'' meaning they became stubborn or
      rebellious.'
    reason: cultural_note
  - marker: c
    text: Or 'did not heed' or 'did not obey.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵם
  chosen: But they
  alternatives:
  - And they
  - Yet they
  lexicon: HALOT
  rationale: The conjunction with independent pronoun marks a contrast with God's
    prior gracious acts in the context; 'But they' brings out the adversative force
    naturally in English.
- source_word: וַאֲבֹתֵינוּ
  chosen: our fathers
  alternatives:
  - our ancestors
  lexicon: HALOT
  rationale: The Hebrew is literally 'our fathers.' This is the established kinship
    term and fits the prayer's corporate identification with prior generations. 'Ancestors'
    is possible but less formally aligned with the source.
- source_word: הֵזִידוּ
  chosen: acted presumptuously
  alternatives:
  - acted arrogantly
  - were presumptuous
  - became insolent
  lexicon: HALOT
  rationale: The verb זיד conveys acting proudly, presumptuously, or insolently. 'Acted
    presumptuously' preserves both the behavioral sense and the moral-religious nuance
    better than the flatter 'were arrogant.'
- source_word: וַיַּקְשׁוּ אֶת־עָרְפָּם
  chosen: stiffened their neck
  alternatives:
  - hardened their neck
  - made their neck stubborn
  lexicon: HALOT
  rationale: This is a Hebrew idiom for stubborn rebellion. 'Stiffened their neck'
    keeps the metaphor transparent in English while remaining readable. Singular 'neck'
    follows the collective singular in Hebrew idiom.
- source_word: וְלֹא שָׁמְעוּ אֶל
  chosen: did not listen to
  alternatives:
  - did not obey
  - would not heed
  lexicon: HALOT
  rationale: שׁמע with אֶל is literally 'listen to' or 'heed.' 'Did not listen to'
    preserves the lexical sense, while the object 'your commandments' implies the
    disobedient result. 'Obey' would be interpretive rather than strictly lexical.
- source_word: מִצְוֺתֶיךָ
  chosen: your commandments
  alternatives:
  - your commands
  lexicon: HALOT
  rationale: The noun denotes commands/commandments. 'Commandments' preserves the
    covenantal and legal register appropriate to the prayer's recounting of Israel's
    history.
