theological_decisions:
- issue: Corporate identification with prior sinful generations
  chosen_reading: Retain 'our fathers' in the main text
  alternative_readings:
  - our ancestors
  rationale: The prayer explicitly identifies the present community with earlier generations.
    Keeping 'our fathers' preserves the source wording and the covenantal-historical
    solidarity without importing a narrower doctrinal claim.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
