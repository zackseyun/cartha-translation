id: NEH.9.4
reference: Nehemiah 9:4
source:
  edition: WLC
  text: וַ/יָּ֜קָם עַֽל מַֽעֲלֵ֣ה הַ/לְוִיִּ֗ם יֵשׁ֨וּעַ וּ/בָנִ֜י קַדְמִיאֵ֧ל שְׁבַנְיָ֛ה בֻּנִּ֥י שֵׁרֵבְיָ֖ה בָּנִ֣י כְנָ֑נִי וַֽ/יִּזְעֲקוּ֙ בְּ/ק֣וֹל גָּד֔וֹל אֶל יְהוָ֖ה אֱלֹהֵי/הֶֽם־־׃
translation:
  text: Then Jeshua, Bani, Kadmiel, Shebaniah, Bunni, Sherebiah, Bani, and Kenani stood on the platform of the Levites, and they cried out with a loud voice to Yahweh their God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the ascent/steps of the Levites''; the phrase may refer to an elevated place or stairway associated with the Levites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: stood
  alternatives:
  - arose
  - stood up
  lexicon: HALOT
  rationale: The verb קום in the wayyiqtol here introduces the action of taking a standing position. English 'stood' is smoother than 'arose' and fits the following location phrase.
- source_word: מַעֲלֵה
  chosen: platform
  alternatives:
  - stair
  - ascent
  - steps
  lexicon: HALOT
  rationale: The noun can denote an ascent or stairway, but in this public assembly context it likely refers to an elevated place from which the Levites spoke. 'Platform' communicates the functional sense in natural English while remaining close to the setting.
- source_word: הַלְוִיִּם
  chosen: of the Levites
  alternatives:
  - for the Levites
  - belonging to the Levites
  lexicon: HALOT
  rationale: The construct phrase מעלה הלוים is most naturally rendered 'the platform of the Levites,' indicating the place associated with them.
- source_word: יֵשׁוּעַ וּבָנִי קַדְמִיאֵל שְׁבַנְיָה בֻּנִּי שֵׁרֵבְיָה בָּנִי כְנָנִי
  chosen: Jeshua, Bani, Kadmiel, Shebaniah, Bunni, Sherebiah, Bani, and Kenani
  rationale: Personal names are transliterated per project philosophy. The repeated Bani is retained as in the Hebrew text rather than harmonized away.
- source_word: וַיִּזְעֲקוּ
  chosen: they cried out
  alternatives:
  - they called out
  - they shouted
  lexicon: HALOT
  rationale: זעק commonly conveys a strong cry, often in appeal to God. 'Cried out' preserves both intensity and prayerful direction.
- source_word: בְּקוֹל גָּדוֹל
  chosen: with a loud voice
  alternatives:
  - in a loud voice
  - loudly
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom. 'With a loud voice' is a clear, fairly formal rendering that preserves the concrete imagery.
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: אֱלֹהֵיהֶם
  chosen: their God
  lexicon: HALOT
  rationale: The suffix marks possession/covenant relation. 'Their God' is the natural and direct rendering.
