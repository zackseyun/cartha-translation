id: NEH.9.1
reference: Nehemiah 9:1
source:
  edition: WLC
  text: וּ/בְ/יוֹם֩ עֶשְׂרִ֨ים וְ/אַרְבָּעָ֜ה לַ/חֹ֣דֶשׁ הַ/זֶּ֗ה נֶאֶסְפ֤וּ בְנֵֽי
    יִשְׂרָאֵל֙ בְּ/צ֣וֹם וּ/בְ/שַׂקִּ֔ים וַ/אֲדָמָ֖ה עֲלֵי/הֶֽם־׃
translation:
  text: Now on the twenty-fourth day of this month, the sons of Israel were assembled
    with fasting, in sackcloth, and with dirt upon them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or traditionally 'the children of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'earth upon them'; that is, dirt or soil placed on themselves
      as a sign of mourning and repentance.
    reason: cultural_note
lexical_decisions:
- source_word: וּבְיוֹם
  chosen: Now on the ... day
  alternatives:
  - And on the ... day
  - On the ... day
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition literally means 'and/on the
    day.' In English narrative flow, 'Now on' naturally marks continuation from the
    prior context while preserving the temporal sense.
- source_word: עֶשְׂרִים וְאַרְבָּעָה
  chosen: twenty-fourth
  alternatives:
  - twenty and four
  - twenty-four
  lexicon: HALOT
  rationale: English idiom expresses the date ordinally as 'twenty-fourth day.' This
    is a natural equivalent of the Hebrew cardinal construction in dating formulae.
- source_word: לַחֹדֶשׁ הַזֶּה
  chosen: of this month
  alternatives:
  - for this month
  - in this month
  lexicon: HALOT
  rationale: In a date expression, the phrase identifies the month currently in view.
    'Of this month' is the most idiomatic English rendering.
- source_word: נֶאֶסְפוּ
  chosen: were assembled
  alternatives:
  - gathered together
  - assembled themselves
  - were gathered
  lexicon: HALOT
  rationale: 'The Niphal form is passive/reflexive in sense: the people came together
    as an assembly. ''Were assembled'' preserves the formal tone and communal action
    without overinterpreting agency.'
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Following the gender-accurate philosophy, the construct phrase is rendered
    literally as 'sons of Israel.' 'Israelites' is smoother but loses the familial
    wording present in the Hebrew; 'children of Israel' is traditional but less precise
    to the masculine plural form.
- source_word: בְּצוֹם
  chosen: with fasting
  alternatives:
  - in fasting
  - with a fast
  lexicon: HALOT
  rationale: The preposition marks attendant circumstance. 'With fasting' is idiomatic
    and conveys the penitential practice accompanying the assembly.
- source_word: וּבְשַׂקִּים
  chosen: in sackcloth
  alternatives:
  - with sackcloth
  - wearing sackcloth
  lexicon: HALOT
  rationale: Sackcloth is a conventional sign of mourning and repentance. 'In sackcloth'
    is a standard, natural English rendering of the prepositional phrase.
- source_word: וַאֲדָמָה עֲלֵיהֶם
  chosen: and with dirt upon them
  alternatives:
  - and earth on them
  - and dust on them
  - with soil on their heads
  lexicon: HALOT
  rationale: אֲדָמָה normally means 'ground, soil, earth.' Here it refers to earth/dirt
    placed on the body as a mourning sign. 'Dirt upon them' is clear modern English
    and avoids specifying 'heads,' which the Hebrew does not state explicitly.
