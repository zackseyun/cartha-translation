id: NEH.9.30
reference: Nehemiah 9:30
source:
  edition: WLC
  text: וַ/תִּמְשֹׁ֤ךְ עֲלֵי/הֶם֙ שָׁנִ֣ים רַבּ֔וֹת וַ/תָּ֨עַד בָּ֧/ם בְּ/רוּחֲ/ךָ֛
    בְּ/יַד נְבִיאֶ֖י/ךָ וְ/לֹ֣א הֶאֱזִ֑ינוּ וַֽ/תִּתְּנֵ֔/ם בְּ/יַ֖ד עַמֵּ֥י הָ/אֲרָצֹֽת־׃
translation:
  text: For many years you were patient with them, and warned them by your Spirit
    through your prophets, but they would not listen. So you gave them into the hand
    of the peoples of the lands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and testified against them by your Spirit through your prophets.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּמְשֹׁךְ
  chosen: you were patient
  alternatives:
  - you prolonged
  - you bore with
  - you drew out
  lexicon: HALOT
  rationale: The verb משׁך in this idiom with עַל can denote extending time over someone,
    i.e., delaying judgment or bearing with them over a long period. 'You were patient'
    captures the contextual sense in this penitential prayer better than the more
    wooden 'you prolonged over them,' while remaining faithful to the idea of extended
    forbearance.
- source_word: עֲלֵיהֶם
  chosen: with them
  alternatives:
  - over them
  - toward them
  lexicon: HALOT
  rationale: 'With the idiom formed by משׁך, English ''with them'' expresses the relational
    sense naturally: God was patient with them.'
- source_word: שָׁנִים רַבּוֹת
  chosen: for many years
  alternatives:
  - many years
  lexicon: HALOT
  rationale: A straightforward temporal phrase; 'for many years' fits idiomatic English
    and preserves the duration emphasis.
- source_word: וַתָּעַד בָּם
  chosen: and warned them
  alternatives:
  - and testified against them
  - and admonished them
  lexicon: HALOT
  rationale: The Hifil of עוד commonly means to bear witness, warn, or testify. In
    context, through prophets and by the Spirit, the sense is covenantal warning/testimony.
    'Warned them' is clear modern English; the stronger forensic nuance is preserved
    in a footnote alternative.
- source_word: בְּרוּחֲךָ
  chosen: by your Spirit
  alternatives:
  - by your רוח
  - by your breath/spirit
  lexicon: HALOT
  rationale: Given the prophetic context, רוּחַ here refers to God's Spirit as the
    means of prophetic warning, not mere breath or disposition. Capitalizing 'Spirit'
    reflects this referent in English.
- source_word: בְּיַד נְבִיאֶיךָ
  chosen: through your prophets
  alternatives:
  - by the hand of your prophets
  lexicon: HALOT
  rationale: The idiom 'by the hand of' regularly means agency/instrumentality. 'Through
    your prophets' is the natural English equivalent.
- source_word: וְלֹא הֶאֱזִינוּ
  chosen: but they would not listen
  alternatives:
  - but they did not listen
  - but they did not give ear
  lexicon: HALOT
  rationale: האזין means to listen attentively or give ear. 'Would not listen' conveys
    not merely failure but refusal, which suits the context of repeated prophetic
    warning.
- source_word: וַתִּתְּנֵם
  chosen: So you gave them
  alternatives:
  - and you gave them
  - therefore you gave them over
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative consequence. 'So you gave
    them' makes the result relation explicit without overinterpreting.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  - to the hand of
  lexicon: HALOT
  rationale: '''Into the hand of'' preserves the common Hebrew idiom of being delivered
    into another''s power. It is still understandable in English and retains biblical
    texture.'
- source_word: עַמֵּי הָאֲרָצוֹת
  chosen: the peoples of the lands
  alternatives:
  - the peoples of the countries
  - the peoples of the earth
  lexicon: HALOT
  rationale: The plural 'lands' most naturally refers to surrounding nations/territories,
    not the whole earth. 'Peoples of the lands' preserves the plural and the likely
    regional-political sense.
