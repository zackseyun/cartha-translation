theological_decisions:
- issue: Referent of 'your Spirit'
  chosen_reading: A reference to God's Spirit as the agent of prophetic warning
  alternative_readings:
  - your spirit as disposition or breath
  rationale: In the collocation 'by your Spirit through your prophets,' the most coherent
    reading is divine agency in prophetic speech. This does not import later doctrinal
    detail beyond the text, but it does recognize the personal divine source of prophetic
    testimony.
  doctrine_reference: Affirmations; Translation philosophy §3
