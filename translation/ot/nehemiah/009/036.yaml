id: NEH.9.36
reference: Nehemiah 9:36
source:
  edition: WLC
  text: הִנֵּ֛ה אֲנַ֥חְנוּ הַ/יּ֖וֹם עֲבָדִ֑ים וְ/הָ/אָ֜רֶץ אֲשֶׁר נָתַ֣תָּה לַ/אֲבֹתֵ֗י/נוּ
    לֶ/אֱכֹ֤ל אֶת פִּרְיָ/הּ֙ וְ/אֶת טוּבָ֔/הּ הִנֵּ֛ה אֲנַ֥חְנוּ עֲבָדִ֖ים עָלֶֽי/הָ־־־׃
translation:
  text: Look, today we are slaves; and in the land that you gave to our fathers to
    eat its fruit and its good things, look, we are slaves on it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servants' instead of 'slaves'; the Hebrew term denotes people in subjection,
      and here likely emphasizes Judah's bondage under imperial rule.
    reason: lexical_alternative
  - marker: b
    text: Or 'its bounty' for 'its good things.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew literally 'slaves on it,' that is, on the very land God gave to their
      fathers.
    reason: cultural_note
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: An attention-getting particle introducing lament and emphasis. 'Look'
    is natural modern English while preserving the deictic force better than a flat
    omission.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  - now
  lexicon: HALOT
  rationale: Temporal adverbial use here contrasts present condition with past gift.
    'Today' is idiomatic modern English.
- source_word: עֲבָדִים
  chosen: slaves
  alternatives:
  - servants
  - bondmen
  lexicon: HALOT
  rationale: 'The term denotes subjection/bondage, and in this context the bonded
    nature is salient: though in their own land, they are under foreign domination.
    This aligns with the project''s guidance to use ''slave'' where bonded status
    matters.'
- source_word: וְהָאָרֶץ
  chosen: and in the land
  alternatives:
  - and the land
  lexicon: HALOT
  rationale: 'The clause is elliptical in Hebrew and the following עָלֶיהָ (''on it'')
    shows the sense is locative: they are slaves in/on the very land given to them.
    Supplying ''in'' makes the English coherent without over-paraphrasing.'
- source_word: אֲשֶׁר נָתַתָּה לַאֲבֹתֵינוּ
  chosen: that you gave to our fathers
  alternatives:
  - which you gave to our ancestors
  lexicon: HALOT
  rationale: Retains direct address to God and the covenantal reference to the patriarchal
    forefathers. 'Fathers' is gender-accurate and reflects the Hebrew wording.
- source_word: לֶאֱכֹל
  chosen: to eat
  alternatives:
  - for eating
  - so that they might eat
  lexicon: HALOT
  rationale: 'Infinitive of purpose after ''gave'': the land was given for enjoyment
    of its produce. ''To eat'' is the most direct rendering.'
- source_word: פִּרְיָהּ
  chosen: its fruit
  alternatives:
  - its produce
  lexicon: HALOT
  rationale: Literal agricultural imagery is appropriate and clear. 'Fruit' also echoes
    covenant-land language.
- source_word: טוּבָהּ
  chosen: its good things
  alternatives:
  - its bounty
  - its goodness
  lexicon: HALOT
  rationale: The noun denotes the land's goodness/abundance. 'Good things' preserves
    the broad sense without narrowing it only to produce; 'bounty' is possible but
    slightly more interpretive.
- source_word: עָלֶיהָ
  chosen: on it
  alternatives:
  - in it
  - over it
  lexicon: HALOT
  rationale: The preposition is literally 'upon/on it.' In English, 'on it' sounds
    marked but preserves the rhetorical irony of being enslaved upon the very land
    given by God. 'In it' is smoother but less literal; the locative sense is already
    clarified earlier with 'in the land'.
