theological_decisions:
- issue: Rendering עֲבָדִים in a covenant-lament context
  chosen_reading: slaves
  alternative_readings:
  - servants
  rationale: The verse laments Israel's political bondage in the promised land. 'Slaves'
    better conveys loss of freedom and foreign subjection than the softer 'servants.'
    This follows the project's stated practice of using 'slave' where bonded nature
    is salient.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    for δοῦλος by analogy of bonded-status rendering
- issue: Gendered covenantal reference לַאֲבֹתֵינוּ
  chosen_reading: our fathers
  alternative_readings:
  - our ancestors
  rationale: The Hebrew explicitly says 'our fathers.' Per the project's gender-accurate
    policy, the translation keeps the masculine familial term rather than neutralizing
    it.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
