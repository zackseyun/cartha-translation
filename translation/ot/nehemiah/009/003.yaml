id: NEH.9.3
reference: Nehemiah 9:3
source:
  edition: WLC
  text: וַ/יָּק֨וּמוּ֙ עַל עָמְדָ֔/ם וַֽ/יִּקְרְא֗וּ בְּ/סֵ֨פֶר תּוֹרַ֧ת יְהוָ֛ה אֱלֹהֵי/הֶ֖ם
    רְבִעִ֣ית הַ/יּ֑וֹם וּ/רְבִעִית֙ מִתְוַדִּ֣ים וּ/מִֽשְׁתַּחֲוִ֔ים לַ/יהוָ֖ה אֱלֹהֵי/הֶֽם־׃פ
translation:
  text: And they stood up in their place, and they read from the Book of the Law of
    the LORD their God for a fourth of the day; and for another fourth they were confessing
    and bowing down to the LORD their God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at their standing place' or possibly 'on their platform.' The Hebrew
      expression is somewhat compressed.
    reason: lexical_alternative
  - marker: b
    text: Literally 'a fourth of the day' ... 'and a fourth'; that is, one quarter
      of the day was spent reading, and another quarter in confession and bowing down.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּק֨וּמוּ
  chosen: they stood up
  alternatives:
  - they arose
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום, straightforward narrative past. 'Stood up' is natural
    modern English and preserves the physical action.
- source_word: עַל עָמְדָם
  chosen: in their place
  alternatives:
  - at their standing place
  - on their platform
  lexicon: HALOT
  rationale: Literally 'upon their standing-place/standing.' In context this refers
    to the place where they stood, likely an assigned station. 'In their place' is
    idiomatic and fits the scene without over-specifying architecture.
- source_word: וַיִּקְרְאוּ
  chosen: they read
  alternatives:
  - they called out
  - they proclaimed
  lexicon: HALOT
  rationale: With בְּסֵפֶר, the verb clearly means reading from a written text rather
    than calling out generally.
- source_word: בְּסֵפֶר תּוֹרַת
  chosen: from the Book of the Law
  alternatives:
  - in the book of the law
  - from the scroll of the law
  lexicon: HALOT
  rationale: ב with קרא can indicate reading from a book. 'Book of the Law' is the
    standard and clear rendering; 'scroll' is possible historically but not required
    by the Hebrew.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: אֱלֹהֵיהֶם
  chosen: their God
  lexicon: HALOT
  rationale: Construct with pronominal suffix, straightforward possessive rendering.
- source_word: רְבִעִית הַיּוֹם
  chosen: for a fourth of the day
  alternatives:
  - a quarter of the day
  lexicon: HALOT
  rationale: The phrase denotes one fourth part of the day. 'A fourth of the day'
    is slightly more formal and mirrors the Hebrew structure closely.
- source_word: וּרְבִעִית
  chosen: for another fourth
  alternatives:
  - and for a fourth
  - and another quarter
  lexicon: HALOT
  rationale: The second occurrence is elliptical but clearly parallels the first time
    expression. 'Another fourth' makes the parallel explicit in natural English.
- source_word: מִתְוַדִּים
  chosen: they were confessing
  alternatives:
  - they confessed
  lexicon: HALOT
  rationale: Hitpael participle conveys ongoing or durative action in coordination
    with the following participle. 'Were confessing' reflects the aspect better than
    a simple past.
- source_word: וּמִשְׁתַּחֲוִים
  chosen: and bowing down
  alternatives:
  - and worshiping
  - and prostrating themselves
  lexicon: HALOT
  rationale: The Hishtaphel/Sht stem of שׁחה often denotes physical bowing in worship.
    'Bowing down' preserves the bodily posture while allowing the worship sense to
    remain implicit in context.
- source_word: לַיהוָה אֱלֹהֵיהֶם
  chosen: to the LORD their God
  alternatives:
  - before the LORD their God
  lexicon: HALOT
  rationale: The lamed marks the object/direction of worship. 'To the LORD their God'
    is a direct and idiomatic rendering.
