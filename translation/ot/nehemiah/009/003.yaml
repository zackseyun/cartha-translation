theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Following the project's stated
    default, it is rendered 'the LORD' rather than transliterated forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to render מִשְׁתַּחֲוִים as explicit 'worshiping' or more literal
    bodily action
  chosen_reading: bowing down
  alternative_readings:
  - worshiping
  rationale: The Hebrew verb includes the physical act of prostration/bowing, especially
    in worship contexts. 'Bowing down' preserves the concrete imagery and avoids importing
    a more abstract term than the text requires, while the object 'to the LORD their
    God' makes the worship context clear.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy;
    do not paraphrase beyond the source'
