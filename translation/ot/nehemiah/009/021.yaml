id: NEH.9.21
reference: Nehemiah 9:21
source:
  edition: WLC
  text: וְ/אַרְבָּעִ֥ים שָׁנָ֛ה כִּלְכַּלְתָּ֥/ם בַּ/מִּדְבָּ֖ר לֹ֣א חָסֵ֑רוּ שַׂלְמֹֽתֵי/הֶם֙
    לֹ֣א בָל֔וּ וְ/רַגְלֵי/הֶ֖ם לֹ֥א בָצֵֽקוּ׃
translation:
  text: For forty years you sustained them in the wilderness; they lacked nothing.
    Their clothes did not wear out, and their feet did not swell.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their garments did not wear out.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their feet did not become swollen.' Compare Deuteronomy 8:4.
    reason: cross_reference
lexical_decisions:
- source_word: כִּלְכַּלְתָּם
  chosen: you sustained them
  alternatives:
  - you provided for them
  - you nourished them
  - you supported them
  lexicon: HALOT
  rationale: The verb כלכל in the pilpel/polel stem conveys sustaining, providing
    for, or supporting. 'Sustained' captures God's ongoing provision over the forty-year
    period without narrowing the sense merely to food.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/desert terrain. 'Wilderness' is
    the more biblically resonant and standard rendering for Israel's wandering context.
- source_word: לֹא חָסֵרוּ
  chosen: they lacked nothing
  alternatives:
  - they did not lack
  - they were not in need
  lexicon: HALOT
  rationale: The idiomatic English 'they lacked nothing' naturally renders the absolute
    negation plus verb חסר, expressing complete sufficiency.
- source_word: שַׂלְמֹתֵיהֶם
  chosen: their clothes
  alternatives:
  - their garments
  - their cloaks
  lexicon: HALOT
  rationale: שַׂלְמָה refers to clothing/garments, often an outer garment. 'Clothes'
    is clear modern English and fits the collective plural sense here.
- source_word: לֹא בָלוּ
  chosen: did not wear out
  alternatives:
  - did not become worn
  - did not decay
  lexicon: HALOT
  rationale: בלה describes wearing out or deteriorating. 'Did not wear out' is the
    most natural English expression for clothing in this context.
- source_word: וְרַגְלֵיהֶם לֹא בָצֵקוּ
  chosen: and their feet did not swell
  alternatives:
  - and their feet did not become swollen
  lexicon: HALOT
  rationale: The verb בצק here refers to swelling or puffing up. 'Their feet did not
    swell' is concise and matches the physical preservation described.
- source_word: וְאַרְבָּעִים שָׁנָה
  chosen: For forty years
  alternatives:
  - And for forty years
  lexicon: HALOT
  rationale: The prefixed conjunction can be rendered simply by beginning the sentence
    with 'For,' which reads naturally in English while preserving the temporal continuation
    from the prior context.
