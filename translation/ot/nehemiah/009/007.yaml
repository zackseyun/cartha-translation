id: NEH.9.7
reference: Nehemiah 9:7
source:
  edition: WLC
  text: אַתָּה הוּא֙ יְהוָ֣ה הָ/אֱלֹהִ֔ים אֲשֶׁ֤ר בָּחַ֨רְתָּ֙ בְּ/אַבְרָ֔ם וְ/הוֹצֵאת֖/וֹ מֵ/א֣וּר כַּשְׂדִּ֑ים וְ/שַׂ֥מְתָּ שְּׁמ֖/וֹ אַבְרָהָֽם־׃
translation:
  text: You are Yahweh God, who chose Abram, brought him out from Ur of the Chaldeans, and gave him the name Abraham.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Yahweh God.' The Hebrew uses the divine name YHWH.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the God
  lexicon: HALOT
  rationale: With יְהוָה in apposition, the phrase is best rendered naturally in English as 'the LORD God.' Retaining both elements preserves the Hebrew identification without awkwardness.
- source_word: אַתָּה הוּא
  chosen: You are
  alternatives:
  - You, he are
  - You yourself are
  lexicon: HALOT
  rationale: The pronoun plus independent pronoun construction is emphatic, identifying God directly. English 'You are' conveys the predication clearly; added emphasis is not required in this context.
- source_word: בָּחַרְתָּ
  chosen: chose
  alternatives:
  - selected
  - elected
  lexicon: HALOT
  rationale: '''Chose'' is the plain and idiomatic rendering for בחר here, preserving the covenantal sense without importing later theological terminology.'
- source_word: בְּאַבְרָם
  chosen: Abram
  lexicon: HALOT
  rationale: The preposition marks the object of choosing with this verb in Hebrew usage; English idiom simply uses the direct object 'Abram.' The earlier name should be preserved because the verse contrasts it with 'Abraham' later.
- source_word: וְהוֹצֵאתוֹ
  chosen: brought him out
  alternatives:
  - led him out
  - brought him forth
  lexicon: HALOT
  rationale: The Hiphil of יצא commonly means 'bring out' or 'lead out.' 'Brought him out' is natural English and preserves the exodus-like force of divine deliverance.
- source_word: מֵאוּר כַּשְׂדִּים
  chosen: from Ur of the Chaldeans
  alternatives:
  - out of Ur of the Chaldeans
  - from Ur of the Chaldees
  lexicon: HALOT
  rationale: This is the standard geographical designation. 'Chaldeans' is preferred over archaic 'Chaldees' for modern readability.
- source_word: וְשַׂמְתָּ שְׁמוֹ
  chosen: gave him the name
  alternatives:
  - set his name
  - made his name
  lexicon: HALOT
  rationale: Literally 'set his name,' but idiomatic English for renaming is 'gave him the name.' This preserves the sense without wooden phrasing.
- source_word: אַבְרָהָם
  chosen: Abraham
  lexicon: HALOT
  rationale: The renamed form must be preserved distinctly from 'Abram' to reflect the narrative and covenant significance of the name change.
