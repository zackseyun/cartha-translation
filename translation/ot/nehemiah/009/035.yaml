theological_decisions:
- issue: Rendering עבד with respect to God
  chosen_reading: serve you
  alternative_readings:
  - worship you
  rationale: The Hebrew verb encompasses worshipful service and covenant obedience.
    'Serve you' preserves that theological breadth rather than reducing it to cultic
    worship alone.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering שׁוּבוּ מִן in a moral context
  chosen_reading: did not turn from their evil deeds
  alternative_readings:
  - did not repent of their evil deeds
  rationale: The text speaks concretely of turning from evil actions. Using 'turn
    from' preserves the source wording and theological tension without importing a
    more developed repentance formula.
  doctrine_reference: Translation philosophy §1, §3
