id: NEH.9.35
reference: Nehemiah 9:35
source:
  edition: WLC
  text: וְ/הֵ֣ם בְּ/מַלְכוּתָ/ם֩ וּ/בְ/טוּבְ/ךָ֨ הָ/רָ֜ב אֲשֶׁר נָתַ֣תָּ לָ/הֶ֗ם וּ/בְ/אֶ֨רֶץ
    הָ/רְחָבָ֧ה וְ/הַ/שְּׁמֵנָ֛ה אֲשֶׁר נָתַ֥תָּ לִ/פְנֵי/הֶ֖ם לֹ֣א עֲבָד֑וּ/ךָ וְֽ/לֹא
    שָׁ֔בוּ מִ/מַּֽעַלְלֵי/הֶ֖ם הָ/רָעִֽים־־־׃
translation:
  text: Even while they were in their kingdom, and amid your great goodness that you
    gave to them, and in the broad and fertile land that you set before them, they
    did not serve you and did not turn from their evil deeds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in your abundant goodness' or 'with your great bounty.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the broad and fat land,' an idiom for a spacious and fertile
      land.
    reason: cultural_note
  - marker: c
    text: Or 'they did not worship you'; the Hebrew verb can include both worship
      and service.
    reason: lexical_alternative
  - marker: d
    text: Or 'did not repent of their evil deeds'; literally, 'did not turn from their
      evil deeds.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּמַלְכוּתָם
  chosen: in their kingdom
  alternatives:
  - in their kingship
  - under their rule
  lexicon: HALOT
  rationale: מַלְכוּת commonly denotes kingdom, reign, or royal rule. Here the sense
    is their settled national sovereignty/state, so 'in their kingdom' is the most
    natural English rendering.
- source_word: וּבְטוּבְךָ הָרָב
  chosen: amid your great goodness
  alternatives:
  - in your abundant goodness
  - with your great bounty
  lexicon: HALOT
  rationale: טוּב can mean goodness, bounty, or prosperity. Because the phrase refers
    to God's beneficent provision, 'great goodness' preserves both moral and beneficent
    nuance; 'amid' reflects the repeated בְ in a natural way.
- source_word: אֲשֶׁר נָתַתָּ לָהֶם
  chosen: that you gave to them
  alternatives:
  - which you had given them
  lexicon: HALOT
  rationale: Simple past best fits the prayer's retrospective narration. 'Gave to
    them' is slightly more formal but transparent and close to the Hebrew syntax.
- source_word: אֶרֶץ הָרְחָבָה וְהַשְּׁמֵנָה
  chosen: the broad and fertile land
  alternatives:
  - the wide and rich land
  - the spacious and fruitful land
  lexicon: HALOT
  rationale: רְחָבָה is spatially 'broad/spacious'; שְׁמֵנָה literally 'fat,' idiomatically
    fertile/rich. 'Broad and fertile land' is idiomatic modern English while preserving
    the concrete imagery.
- source_word: אֲשֶׁר נָתַתָּ לִפְנֵיהֶם
  chosen: that you set before them
  alternatives:
  - that you gave before them
  - that you placed before them
  lexicon: HALOT
  rationale: לִפְנֵי literally 'before/in front of.' In context of granting land,
    'set before them' communicates both presentation and provision more naturally
    than a wooden 'gave before them.'
- source_word: לֹא עֲבָדוּךָ
  chosen: they did not serve you
  alternatives:
  - they did not worship you
  lexicon: HALOT
  rationale: עבד in relation to God can include worship, but its broader covenantal
    sense is 'serve.' 'Serve you' preserves the fuller obedience-and-worship range
    without narrowing it.
- source_word: וְלֹא שָׁבוּ
  chosen: and did not turn
  alternatives:
  - and did not return
  - and did not repent
  lexicon: HALOT
  rationale: שׁוּב literally means turn/return. Here it governs מִן plus evil deeds,
    so 'turn from' is the clearest idiomatic rendering; 'repent' would be interpretive
    rather than lexical.
- source_word: מִמַּעַלְלֵיהֶם הָרָעִים
  chosen: from their evil deeds
  alternatives:
  - from their evil practices
  - from their wicked acts
  lexicon: HALOT
  rationale: מַעֲלָלִים refers to deeds, actions, or practices. 'Evil deeds' is straightforward,
    natural, and preserves the moral evaluation in הָרָעִים.
