id: NEH.9.23
reference: Nehemiah 9:23
source:
  edition: WLC
  text: וּ/בְנֵי/הֶ֣ם הִרְבִּ֔יתָ כְּ/כֹכְבֵ֖י הַ/שָּׁמָ֑יִם וַ/תְּבִיאֵ/ם֙ אֶל הָ/אָ֔רֶץ
    אֲשֶׁר אָמַ֥רְתָּ לַ/אֲבֹתֵי/הֶ֖ם לָ/ב֥וֹא לָ/רָֽשֶׁת־־׃
translation:
  text: You multiplied their children like the stars of the heavens, and you brought
    them into the land that you had told their fathers to enter and possess.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their sons' or 'their descendants.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'like the stars of the heavens,' echoing God's promise to the patriarchs.
    reason: cross_reference
  - marker: c
    text: Or 'and take possession of'; the verb can also be rendered 'inherit' in
      some contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵיהֶם
  chosen: their children
  alternatives:
  - their sons
  - their descendants
  lexicon: HALOT
  rationale: בנים can mean sons in a narrow sense, but in this context of national
    multiplication it naturally refers to offspring/children more broadly. 'Children'
    is idiomatic and preserves the familial sense without over-specifying males.
- source_word: הִרְבִּיתָ
  chosen: you multiplied
  alternatives:
  - you made numerous
  - you increased
  lexicon: HALOT
  rationale: The Hiphil of רבה here expresses causing to become many. 'You multiplied'
    is concise, natural, and preserves the direct divine agency.
- source_word: כְּכֹכְבֵי הַשָּׁמָיִם
  chosen: like the stars of the heavens
  alternatives:
  - as the stars of heaven
  - like the stars in the sky
  lexicon: HALOT
  rationale: This echoes the patriarchal promise language. 'The heavens' is slightly
    more formal and closer to the Hebrew than 'sky,' while remaining readable.
- source_word: וַתְּבִיאֵם
  chosen: you brought them
  alternatives:
  - you led them in
  - you caused them to enter
  lexicon: HALOT
  rationale: The verb בוא in Hiphil means to bring/cause to enter. 'You brought them'
    is the most natural English rendering in this context.
- source_word: אֶל הָאָרֶץ
  chosen: into the land
  alternatives:
  - to the land
  lexicon: HALOT
  rationale: With the motion verb, 'into the land' better conveys entry than the more
    ambiguous 'to the land.'
- source_word: אֲשֶׁר אָמַרְתָּ לַאֲבֹתֵיהֶם
  chosen: that you had told their fathers
  alternatives:
  - which you had spoken to their fathers about
  - that you had said to their fathers
  lexicon: HALOT
  rationale: The clause introduces the land in relation to God's prior word to the
    ancestors. 'Had told' gives good English sequence and keeps the addressees explicit.
- source_word: לָבוֹא
  chosen: to enter
  alternatives:
  - to go in
  lexicon: HALOT
  rationale: Infinitive of בוא here expresses the purpose/content of what was said
    regarding the land. 'To enter' is idiomatic in English for taking possession of
    a land.
- source_word: לָרָשֶׁת
  chosen: and possess
  alternatives:
  - and take possession of
  - and inherit
  lexicon: HALOT
  rationale: ירשׁ can mean possess, dispossess, or inherit depending on context. Here
    the focus is Israel's taking possession of the promised land. 'Possess' is concise
    and faithful; 'inherit' is possible but less direct in this immediate context.
