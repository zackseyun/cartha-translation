theological_decisions:
- issue: Promise-language echo to the patriarchs
  chosen_reading: Retained the allusive wording 'like the stars of the heavens' and
    'their fathers' to preserve the connection to God's covenant promise without expanding
    it interpretively.
  alternative_readings:
  - Smoother contemporary renderings that weaken the intertextual echo, such as 'like
    the stars in the sky' or 'their ancestors'
  rationale: The verse rehearses God's covenant faithfulness in language intentionally
    recalling the Abrahamic promise. The translation preserves that theological resonance
    while remaining readable.
  doctrine_reference: Translation philosophy §§1, 5
