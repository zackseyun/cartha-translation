id: NEH.9.37
reference: Nehemiah 9:37
source:
  edition: WLC
  text: וּ/תְבוּאָתָ֣/הּ מַרְבָּ֗ה לַ/מְּלָכִ֛ים אֲשֶׁר נָתַ֥תָּה עָלֵ֖י/נוּ בְּ/חַטֹּאותֵ֑י/נוּ
    וְ/עַ֣ל גְּ֠וִיֹּתֵי/נוּ מֹשְׁלִ֤ים וּ/בִ/בְהֶמְתֵּ֨/נוּ֙ כִּ/רְצוֹנָ֔/ם וּ/בְ/צָרָ֥ה
    גְדוֹלָ֖ה אֲנָֽחְנוּ־׃פ
translation:
  text: Its abundant produce goes to the kings whom you have set over us because of
    our sins. They rule over our bodies and over our livestock as they please, and
    we are in great distress.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its yield' or 'its harvest'; the suffix refers to the land mentioned
      in the previous verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'our persons'; Hebrew 'our bodies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּתְבוּאָתָהּ
  chosen: Its ... produce
  alternatives:
  - its yield
  - its harvest
  lexicon: HALOT
  rationale: תְּבוּאָה denotes produce/yield of the land. The 3fs suffix refers back
    to the land in the previous verse, so 'its produce' makes the referent clear in
    English.
- source_word: מַרְבָּה
  chosen: abundant
  alternatives:
  - multiplies
  - is plentiful
  lexicon: HALOT
  rationale: The form conveys increase/abundance. In English, attributive 'abundant'
    naturally modifies 'produce' while preserving the sense that the land's yield
    is great.
- source_word: לַמְּלָכִים
  chosen: to the kings
  alternatives:
  - for the kings
  lexicon: HALOT
  rationale: The preposition ל marks direction/benefit; 'goes to the kings' idiomatically
    expresses that the produce accrues to foreign rulers.
- source_word: אֲשֶׁר נָתַתָּה עָלֵינוּ
  chosen: whom you have set over us
  alternatives:
  - whom you have given over us
  - whom you have placed over us
  lexicon: HALOT
  rationale: נתן with עַל commonly means appointing or setting someone over others.
    'Set over us' is natural English and preserves divine agency in their subjection.
- source_word: בְּחַטֹּאותֵינוּ
  chosen: because of our sins
  alternatives:
  - for our sins
  - on account of our sins
  lexicon: HALOT
  rationale: The preposition ב here is causal/instrumental in context. 'Because of
    our sins' clearly communicates the reason for their subjugation.
- source_word: גְּוִיֹּתֵינוּ
  chosen: our bodies
  alternatives:
  - our persons
  - our corpses
  lexicon: HALOT
  rationale: גְּוִיָּה can denote body. Here, in parallel with livestock and oppressive
    rule, it refers to their physical persons/bodies under foreign domination, not
    dead bodies.
- source_word: מֹשְׁלִים
  chosen: They rule
  alternatives:
  - they dominate
  - they govern
  lexicon: HALOT
  rationale: The participle expresses ongoing rule. 'They rule' is the most direct
    rendering and fits the lament context without overinterpreting.
- source_word: וּבִבְהֶמְתֵּנוּ
  chosen: over our livestock
  alternatives:
  - over our cattle
  - over our animals
  lexicon: HALOT
  rationale: בְּהֵמָה here refers collectively to domesticated animals/livestock.
    'Livestock' is modern and suitably broad.
- source_word: כִּרְצוֹנָם
  chosen: as they please
  alternatives:
  - according to their will
  - as they desire
  lexicon: HALOT
  rationale: The phrase indicates arbitrary exercise of power according to the rulers'
    own will. 'As they please' is concise and idiomatic.
- source_word: וּבְצָרָה גְדוֹלָה אֲנָחְנוּ
  chosen: we are in great distress
  alternatives:
  - we are in great trouble
  - we are in great anguish
  lexicon: HALOT
  rationale: צָרָה denotes distress/trouble. 'Great distress' preserves the gravity
    of the communal lament and reads naturally in English.
