theological_decisions:
- issue: Divine agency in foreign domination
  chosen_reading: The verse states that God has set these kings over the people because
    of their sins, without implying moral approval of the kings' oppression.
  alternative_readings:
  - God merely permitted these kings to rule
  - The statement implies divine endorsement of all the kings do
  rationale: The Hebrew נָתַתָּה עָלֵינוּ directly attributes their subjection to
    God's judicial action in response to sin. The translation preserves that agency
    while not importing a claim that God approves the rulers' abuses.
  doctrine_reference: Translation philosophy §1, §3
