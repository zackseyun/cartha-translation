theological_decisions:
- issue: Divine abandonment language
  chosen_reading: you abandoned them into the hand of their enemies
  alternative_readings:
  - you forsook them to their enemies
  - you left them in the power of their enemies
  rationale: The verse describes covenantal judgment by withdrawal of protection,
    not absolute divine desertion. The chosen wording preserves the severity of the
    act while remaining within the immediate historical context of repeated judgment
    and rescue.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Iterative verbal sense in the final clause
  chosen_reading: you heard from heaven and delivered them many times
  alternative_readings:
  - you would hear from heaven and deliver them many times
  rationale: The Hebrew imperfects in this summary context can express repeated past
    action. English simple past with 'many times' communicates the iterative sense
    clearly and readably without awkwardness.
  doctrine_reference: Translation philosophy §6
