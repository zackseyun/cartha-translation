id: NEH.9.28
reference: Nehemiah 9:28
source:
  edition: WLC
  text: וּ/כְ/נ֣וֹחַ לָ/הֶ֔ם יָשׁ֕וּבוּ לַ/עֲשׂ֥וֹת רַ֖ע לְ/פָנֶ֑י/ךָ וַ/תַּֽעַזְבֵ֞/ם
    בְּ/יַ֤ד אֹֽיְבֵי/הֶם֙ וַ/יִּרְדּ֣וּ בָ/הֶ֔ם וַ/יָּשׁ֨וּבוּ֙ וַ/יִּזְעָק֔וּ/ךָ
    וְ/אַתָּ֞ה מִ/שָּׁמַ֧יִם תִּשְׁמַ֛ע וְ/תַצִּילֵ֥/ם כְּֽ/רַחֲמֶ֖י/ךָ רַבּ֥וֹת עִתִּֽים׃
translation:
  text: But as soon as they had rest, they turned back to do evil before you, and
    you abandoned them into the hand of their enemies, who ruled over them. Then they
    turned back and cried out to you, and you heard from heaven and delivered them
    many times according to your mercies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when they had rest.' The Hebrew temporal clause can be rendered more
      literally that way; 'as soon as they had rest' brings out the immediate relapse
      implied by the context.
    reason: lexical_alternative
  - marker: b
    text: Literally 'into the hand of their enemies,' a Hebrew idiom for being given
      over to another's power.
    reason: cultural_note
  - marker: c
    text: Or 'according to your great compassion.' The Hebrew uses a plural noun,
      'your mercies/compassions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְנוֹחַ
  chosen: But as soon as they had rest
  alternatives:
  - and when they had rest
  - but when they were at rest
  lexicon: HALOT
  rationale: The prefixed conjunction plus כְּ with infinitive construct of נוח introduces
    a temporal clause. 'As soon as they had rest' captures the sense that relief immediately
    led to relapse, fitting the narrative flow better than a flatter 'when they had
    rest.'
- source_word: יָשׁוּבוּ
  chosen: they turned back
  alternatives:
  - they returned
  - they again
  lexicon: HALOT
  rationale: שׁוּב here denotes repeated return to prior behavior. 'Turned back' preserves
    the cyclical moral relapse more clearly than simple 'returned.'
- source_word: לַעֲשׂוֹת רַע
  chosen: to do evil
  alternatives:
  - to do what was evil
  - to act wickedly
  lexicon: HALOT
  rationale: A standard Hebrew idiom for morally evil action. 'To do evil' is concise
    and natural while preserving the ethical force.
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - in your sight
  - against you
  lexicon: HALOT
  rationale: Literally 'before your face/presence.' 'Before you' keeps the relational
    and covenantal dimension without overinterpreting it as merely visual ('in your
    sight') or adversative ('against you').
- source_word: וַתַּעַזְבֵם
  chosen: you abandoned them
  alternatives:
  - you forsook them
  - you left them
  lexicon: HALOT
  rationale: עזב in this context means giving them over rather than permanently rejecting
    them. 'Abandoned' conveys judicial withdrawal of protection in response to their
    sin.
- source_word: בְּיַד אֹיְבֵיהֶם
  chosen: into the hand of their enemies
  alternatives:
  - to the power of their enemies
  - into the control of their enemies
  lexicon: HALOT
  rationale: The idiom 'into the hand' is common in Hebrew for transfer into another's
    power. Retaining 'hand' preserves the biblical idiom while remaining intelligible.
- source_word: וַיִּרְדּוּ בָהֶם
  chosen: who ruled over them
  alternatives:
  - and they subjugated them
  - and they oppressed them
  lexicon: HALOT
  rationale: רדד/רדה in context refers to exercising dominion. 'Ruled over them' is
    the most direct rendering; oppression is implied by context but not the core lexical
    meaning.
- source_word: וַיָּשׁוּבוּ
  chosen: Then they turned back
  alternatives:
  - and they returned
  - then they returned
  lexicon: HALOT
  rationale: Here the verb marks a return from rebellion to appeal for help. 'Then
    they turned back' preserves the repeated-cycle motif and links with the earlier
    use of שׁוּב.
- source_word: וַיִּזְעָקוּךָ
  chosen: cried out to you
  alternatives:
  - called to you for help
  - cried to you
  lexicon: HALOT
  rationale: זעק often denotes a desperate cry for help. 'Cried out to you' communicates
    urgency without adding words absent from the text.
- source_word: מִשָּׁמַיִם תִּשְׁמַע
  chosen: you heard from heaven
  alternatives:
  - you would hear from heaven
  - you heard them from heaven
  lexicon: HALOT
  rationale: Though the imperfect can have iterative force in past narrative, English
    simple past works naturally in this summary of repeated acts. 'From heaven' preserves
    God's transcendent vantage point.
- source_word: וְתַצִּילֵם
  chosen: and delivered them
  alternatives:
  - and rescued them
  - and saved them
  lexicon: HALOT
  rationale: נצל in this context is deliverance from enemies. 'Delivered' fits the
    historical setting and avoids importing fuller soteriological overtones that 'saved'
    may carry in English.
- source_word: כְּרַחֲמֶיךָ רַבּוֹת
  chosen: according to your mercies
  alternatives:
  - according to your great compassion
  - in keeping with your abundant mercies
  lexicon: HALOT
  rationale: The plural 'mercies/compassions' reflects the Hebrew plural noun and
    emphasizes repeated acts of pity. 'According to' preserves the proportional sense
    of כְּ.
- source_word: עִתִּים
  chosen: many times
  alternatives:
  - at many times
  - repeatedly
  lexicon: HALOT
  rationale: In idiomatic English, 'many times' best conveys the repeated historical
    pattern summarized by the verse.
