theological_decisions:
- issue: Whether רוּחֲךָ הַטּוֹבָה should be rendered with capitalized 'Spirit'
  chosen_reading: your good Spirit
  alternative_readings:
  - your good spirit
  rationale: The verse speaks of God's empowering and instructing presence given to
    Israel. In context, this is best understood as God's Spirit rather than merely
    a good disposition. Capitalization is an English interpretive convention, so the
    alternative is preserved in a footnote-worthy lexical note.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
