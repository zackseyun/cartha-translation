id: NEH.9.20
reference: Nehemiah 9:20
source:
  edition: WLC
  text: וְ/רוּחֲ/ךָ֨ הַ/טּוֹבָ֔ה נָתַ֖תָּ לְ/הַשְׂכִּילָ֑/ם וּ/מַנְ/ךָ֙ לֹא מָנַ֣עְתָּ
    מִ/פִּי/הֶ֔ם וּ/מַ֛יִם נָתַ֥תָּה לָ/הֶ֖ם לִ/צְמָאָֽ/ם־׃
translation:
  text: You gave your good Spirit to instruct them, and you did not withhold your
    manna from their mouth, and you gave them water for their thirst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your good spirit.' The Hebrew רוּחַ can be rendered either way; here
      it likely refers to God's Spirit given to guide and teach Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: רוּחֲךָ הַטּוֹבָה
  chosen: your good Spirit
  alternatives:
  - your good spirit
  lexicon: HALOT
  rationale: רוּחַ can mean 'spirit,' 'wind,' or 'breath.' In this context of divine
    guidance and instruction, 'Spirit' best fits. Capitalization reflects the likely
    reference to God's Spirit rather than a mere disposition, while preserving the
    Hebrew adjective 'good' directly.
- source_word: לְהַשְׂכִּילָם
  chosen: to instruct them
  alternatives:
  - to give them insight
  - to make them understand
  lexicon: HALOT
  rationale: The Hiphil of שׂכל conveys causing understanding, giving insight, or
    instructing wisely. 'To instruct them' is natural English and captures the causative
    sense without over-paraphrase.
- source_word: מַנְךָ
  chosen: your manna
  lexicon: HALOT
  rationale: The noun refers specifically to the wilderness provision known as manna;
    retaining the established term is both accurate and clear.
- source_word: מָנַעְתָּ מִפִּיהֶם
  chosen: you did not withhold ... from their mouth
  alternatives:
  - you did not withhold ... from them
  lexicon: HALOT
  rationale: מנע means 'withhold.' The phrase 'from their mouth' is somewhat concrete
    in Hebrew; preserving it in English maintains the vividness of the source rather
    than smoothing it away.
- source_word: מַיִם
  chosen: water
  lexicon: HALOT
  rationale: Straightforward lexical equivalent.
- source_word: לִצְמָאָם
  chosen: for their thirst
  alternatives:
  - in their thirst
  - because of their thirst
  lexicon: HALOT
  rationale: The noun צָמָא means 'thirst.' 'For their thirst' expresses provision
    meeting their need and reads naturally in English.
