id: NEH.9.14
reference: Nehemiah 9:14
source:
  edition: WLC
  text: וְ/אֶת שַׁבַּ֥ת קָדְשְׁ/ךָ֖ הוֹדַ֣עַתָ לָ/הֶ֑ם וּ/מִצְו֤וֹת וְ/חֻקִּים֙ וְ/תוֹרָ֔ה
    צִוִּ֣יתָ לָ/הֶ֔ם בְּ/יַ֖ד מֹשֶׁ֥ה עַבְדֶּֽ/ךָ־׃
translation:
  text: You made your holy Sabbath known to them, and you commanded them commandments
    and statutes and law by the hand of Moses your servant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'instruction' for 'law' (תוֹרָה), highlighting teaching as well as legal
      obligation.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'by the hand of Moses your servant,' an idiom meaning 'through
      Moses your servant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁבַּת קָדְשְׁךָ
  chosen: your holy Sabbath
  alternatives:
  - your holy sabbath day
  - your sacred Sabbath
  lexicon: HALOT
  rationale: 'שַׁבַּת is ''Sabbath''; קָדְשְׁךָ is a noun with 2ms suffix, literally
    ''your holiness/holy thing,'' functioning attributively here: ''your holy Sabbath.''
    Retaining ''Sabbath'' preserves the covenantal and cultic specificity better than
    a more generic ''day of rest.'''
- source_word: הוֹדַעַתָ
  chosen: made ... known
  alternatives:
  - revealed
  - instructed them about
  lexicon: HALOT
  rationale: Hiphil of ידע commonly means 'make known' or 'cause to know.' 'Made known'
    is the most natural English rendering and preserves the causative force.
- source_word: מִצְוֹת
  chosen: commandments
  alternatives:
  - commands
  lexicon: HALOT
  rationale: מִצְוֹת denotes commands/commandments. 'Commandments' fits the legal-covenantal
    register of the verse and pairs naturally with the following legal terms.
- source_word: חֻקִּים
  chosen: statutes
  alternatives:
  - decrees
  - ordinances
  lexicon: HALOT
  rationale: חֻקִּים often refers to prescribed enactments or statutes. 'Statutes'
    is a standard and precise legal rendering in this triad.
- source_word: תוֹרָה
  chosen: law
  alternatives:
  - instruction
  lexicon: HALOT
  rationale: תוֹרָה can mean 'instruction' broadly, but in this legal sequence with
    'commandments and statutes' the sense 'law' is contextually strongest and idiomatic
    in English. The broader nuance 'instruction' is worth preserving as an alternative.
- source_word: צִוִּיתָ
  chosen: you commanded them
  alternatives:
  - you gave them
  - you charged them with
  lexicon: HALOT
  rationale: Piel of צוה means 'command.' Rendering it verbally keeps the direct force
    of divine command rather than softening it to 'gave.'
- source_word: בְּיַד מֹשֶׁה עַבְדֶּךָ
  chosen: by the hand of Moses your servant
  alternatives:
  - through Moses your servant
  - by Moses your servant
  lexicon: HALOT
  rationale: בְּיַד is an idiom for agency or mediation, literally 'by the hand of.'
    Retaining the idiom is transparent and faithful, while still understandable in
    English. 'Your servant' accurately renders עַבְדֶּךָ without importing later technical
    connotations.
