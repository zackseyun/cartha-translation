theological_decisions:
- issue: Rendering the legal triad מִצְוֹת וְחֻקִּים וְתוֹרָה
  chosen_reading: commandments and statutes and law
  alternative_readings:
  - commands and decrees and instruction
  - commandments, statutes, and teachings
  rationale: The verse emphasizes God's covenantal revelation and legislation through
    Moses. A more formal rendering preserves the distinct legal categories rather
    than collapsing them into smoother but less differentiated English.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
