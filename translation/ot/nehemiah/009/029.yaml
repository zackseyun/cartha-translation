id: NEH.9.29
reference: Nehemiah 9:29
source:
  edition: WLC
  text: וַ/תָּ֨עַד בָּ/הֶ֜ם לַ/הֲשִׁיבָ֣/ם אֶל תּוֹרָתֶ֗/ךָ וְ/הֵ֨מָּה הֵזִ֜ידוּ וְ/לֹא
    שָׁמְע֤וּ לְ/מִצְוֺתֶ֨י/ךָ֙ וּ/בְ/מִשְׁפָּטֶ֣י/ךָ חָֽטְאוּ בָ֔/ם אֲשֶׁר יַעֲשֶׂ֥ה
    אָדָ֖ם וְ/חָיָ֣ה בָ/הֶ֑ם וַ/יִּתְּנ֤וּ כָתֵף֙ סוֹרֶ֔רֶת וְ/עָרְפָּ֥/ם הִקְשׁ֖וּ
    וְ/לֹ֥א שָׁמֵֽעוּ־־־־׃
translation:
  text: You warned them in order to bring them back to your law, but they acted presumptuously
    and did not listen to your commandments; they sinned against your judgments, which
    if a man does, he shall live by them. They gave a stubborn shoulder, stiffened
    their neck, and would not listen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which if a person does, he shall live by them.' Hebrew 'man' is generic
      here, referring to any human being.
    reason: lexical_alternative
  - marker: b
    text: 'An allusion to Leviticus 18:5: obedience to God''s statutes is described
      as the path of life.'
    reason: cross_reference
lexical_decisions:
- source_word: וַתָּעַד בָּהֶם
  chosen: You warned them
  alternatives:
  - You testified against them
  - You admonished them
  lexicon: HALOT
  rationale: The Hifil of עוד here carries the sense of giving solemn warning or admonition.
    In context of covenantal appeals through prophets and discipline, 'warned them'
    is natural modern English while preserving the force of divine testimony against
    them.
- source_word: לַהֲשִׁיבָם אֶל תּוֹרָתֶךָ
  chosen: in order to bring them back to your law
  alternatives:
  - to turn them back to your law
  - to restore them to your instruction
  lexicon: HALOT
  rationale: שׁוּב in Hifil means cause to return/bring back. תּוֹרָה can mean instruction,
    but in this covenantal setting 'law' is the most idiomatic and contextually fitting
    rendering.
- source_word: הֵזִידוּ
  chosen: they acted presumptuously
  alternatives:
  - they were arrogant
  - they acted proudly
  lexicon: HALOT
  rationale: The verb זיד conveys insolence/presumption rather than mere internal
    pride. 'Acted presumptuously' best matches the covenantal rebellion described.
- source_word: לֹא שָׁמְעוּ לְמִצְוֺתֶיךָ
  chosen: did not listen to your commandments
  alternatives:
  - did not obey your commandments
  lexicon: HALOT
  rationale: שׁמע often implies obedient hearing. 'Listen to' preserves the Hebrew
    idiom while still implying refusal of obedience in context.
- source_word: וּבְמִשְׁפָּטֶיךָ חָטְאוּ בָם
  chosen: they sinned against your judgments
  alternatives:
  - they sinned in regard to your ordinances
  - they sinned against them, your judgments
  lexicon: HALOT
  rationale: מִשְׁפָּטִים here refers to God's legal rulings/ordinances. 'Judgments'
    is a standard rendering and keeps the juridical tone. The pronoun בָם is represented
    by 'against your judgments' rather than repeated separately in awkward English.
- source_word: אֲשֶׁר יַעֲשֶׂה אָדָם וְחָיָה בָהֶם
  chosen: which if a man does, he shall live by them
  alternatives:
  - which if a person does, he shall live by them
  - which a man shall do and live by them
  lexicon: HALOT
  rationale: This clause echoes Lev 18:5. Per doctrine, אָדָם is rendered gender-accurately.
    'Man' preserves the representative generic force, and 'live by them' keeps the
    covenantal idiom.
- source_word: וַיִּתְּנוּ כָתֵף סוֹרֶרֶת
  chosen: They gave a stubborn shoulder
  alternatives:
  - They turned a stubborn shoulder
  - They presented a rebellious shoulder
  lexicon: HALOT
  rationale: This is an idiom for obstinate resistance. 'Gave a stubborn shoulder'
    is slightly formal but preserves the metaphor better than flattening it to 'turned
    away'.
- source_word: וְעָרְפָּם הִקְשׁוּ
  chosen: stiffened their neck
  alternatives:
  - hardened their neck
  - made their neck stiff
  lexicon: HALOT
  rationale: A common Hebrew idiom for obstinacy. 'Stiffened their neck' is idiomatic
    English and preserves the metaphor.
- source_word: וְלֹא שָׁמֵעוּ
  chosen: would not listen
  alternatives:
  - did not listen
  - would not obey
  lexicon: HALOT
  rationale: The final clause summarizes persistent refusal. 'Would not listen' conveys
    volitional resistance more clearly than a simple past.
