theological_decisions:
- issue: Rendering of אָדָם in the life-by-the-commandments clause
  chosen_reading: a man
  alternative_readings:
  - a person
  - humankind
  rationale: The Hebrew singular generic אָדָם is grammatically masculine with representative
    force. Following the doctrine's gender-accurate principle, 'a man' is retained
    in the main text rather than neutralizing to 'a person,' while the generic sense
    is noted in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table
    for אָדָם
