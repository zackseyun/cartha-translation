theological_decisions:
- issue: Rendering human agents called מֹשִׁיעִים
  chosen_reading: deliverers
  alternative_readings:
  - saviors
  rationale: The Hebrew term is from the same root as 'save,' but in this historical
    context it refers to human rescuers whom God gives. 'Deliverers' preserves the
    meaning while avoiding unnecessary theological confusion between divine salvation
    and human instruments of rescue.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
