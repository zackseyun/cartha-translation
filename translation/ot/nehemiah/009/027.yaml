id: NEH.9.27
reference: Nehemiah 9:27
source:
  edition: WLC
  text: וַֽ/תִּתְּנֵ/ם֙ בְּ/יַ֣ד צָֽרֵי/הֶ֔ם וַ/יָּצֵ֖רוּ לָ/הֶ֑ם וּ/בְ/עֵ֤ת צָֽרָתָ/ם֙
    יִצְעֲק֣וּ אֵלֶ֔י/ךָ וְ/אַתָּה֙ מִ/שָּׁמַ֣יִם תִּשְׁמָ֔ע וּֽ/כְ/רַחֲמֶ֣י/ךָ הָֽ/רַבִּ֗ים
    תִּתֵּ֤ן לָ/הֶם֙ מֽוֹשִׁיעִ֔ים וְ/יוֹשִׁיע֖וּ/ם מִ/יַּ֥ד צָרֵי/הֶֽם׃
translation:
  text: So you gave them into the hand of their adversaries, who oppressed them. But
    in the time of their distress they cried out to you, and you heard from heaven;
    and according to your abundant mercies you gave them deliverers, who saved them
    from the hand of their adversaries.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'saviors.' The Hebrew word is from the verb 'to save' and refers here
      to human agents God raised up to rescue them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּתְּנֵם
  chosen: you gave them
  alternatives:
  - you handed them over
  lexicon: HALOT
  rationale: נתן in this context means to give over into another's power. 'You gave
    them' is straightforward and preserves the idiom when followed by 'into the hand
    of.'
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  lexicon: HALOT
  rationale: The Hebrew idiom 'into the hand of' is common and transparent enough
    in English here; it preserves the concrete imagery of power and control.
- source_word: צָרֵיהֶם
  chosen: their adversaries
  alternatives:
  - their enemies
  - their oppressors
  lexicon: HALOT
  rationale: צרר/צר can denote enemies or hostile opponents. 'Adversaries' fits the
    parallelism and avoids collapsing this term into the following verb of oppression.
- source_word: וַיָּצֵרוּ לָהֶם
  chosen: who oppressed them
  alternatives:
  - and they distressed them
  - and they harassed them
  lexicon: HALOT
  rationale: The verb from צרר/צור in this stem conveys pressing, hemming in, or causing
    distress. 'Oppressed' is idiomatic and matches the covenant-history context of
    subjugation.
- source_word: וּבְעֵת צָרָתָם
  chosen: But in the time of their distress
  alternatives:
  - And at the time of their trouble
  - And in the time of their affliction
  lexicon: HALOT
  rationale: עֵת + צָרָה is naturally rendered temporally. 'Distress' echoes the root
    family already present while remaining readable modern English. 'But' brings out
    the narrative contrast implied by the sequence.
- source_word: יִצְעֲקוּ אֵלֶיךָ
  chosen: they cried out to you
  alternatives:
  - they called to you
  lexicon: HALOT
  rationale: זעק/צעק in distress contexts is stronger than a neutral 'call'; 'cried
    out' preserves urgency.
- source_word: מִשָּׁמַיִם תִּשְׁמָע
  chosen: you heard from heaven
  alternatives:
  - you would hear from heaven
  lexicon: HALOT
  rationale: Though the yiqtol can have iterative force in this historical recital,
    simple past English best fits the sequence of remembered acts. 'From heaven' preserves
    the source location rather than paraphrasing as 'in heaven.'
- source_word: וּכְרַחֲמֶיךָ הָרַבִּים
  chosen: according to your abundant mercies
  alternatives:
  - according to your great compassion
  - in keeping with your many mercies
  lexicon: HALOT
  rationale: רחמים in the plural often denotes compassion/mercies. 'Abundant mercies'
    preserves both the plural nuance and the modifier הָרַבִּים.
- source_word: מֹשִׁיעִים
  chosen: deliverers
  alternatives:
  - saviors
  - rescuers
  lexicon: HALOT
  rationale: The participial noun from ישׁע refers here to human agents raised up
    to bring rescue, as in Judges. 'Deliverers' avoids possible confusion with ultimate/divine
    Savior language while preserving the saving function.
- source_word: וְיוֹשִׁיעוּם
  chosen: who saved them
  alternatives:
  - and they delivered them
  lexicon: HALOT
  rationale: Rendering the waw + verb as a relative clause in English links the action
    naturally to 'deliverers.' 'Saved' is a faithful gloss of ישׁע and works well
    with the following 'from the hand of.'
- source_word: מִיַּד צָרֵיהֶם
  chosen: from the hand of their adversaries
  alternatives:
  - from the power of their enemies
  lexicon: HALOT
  rationale: This repeats the earlier idiom and should be rendered consistently. Repeating
    'their adversaries' preserves the lexical recurrence in Hebrew.
