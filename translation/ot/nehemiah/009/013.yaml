id: NEH.9.13
reference: Nehemiah 9:13
source:
  edition: WLC
  text: וְ/עַ֤ל הַר סִינַי֙ יָרַ֔דְתָּ וְ/דַבֵּ֥ר עִמָּ/הֶ֖ם מִ/שָּׁמָ֑יִם וַ/תִּתֵּ֨ן
    לָ/הֶ֜ם מִשְׁפָּטִ֤ים יְשָׁרִים֙ וְ/תוֹר֣וֹת אֱמֶ֔ת חֻקִּ֥ים וּ/מִצְוֺ֖ת טוֹבִֽים־׃
translation:
  text: You came down on Mount Sinai and spoke with them from heaven, and you gave
    them upright judgments, true laws, good statutes and commandments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spoke to them from heaven.' The Hebrew preposition is literally 'with,'
      but English often uses 'to' with this verb.
    reason: lexical_alternative
  - marker: b
    text: Or 'right judgments' for 'upright judgments.'
    reason: lexical_alternative
  - marker: c
    text: Or 'laws of truth' or 'true instruction' for 'true laws.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל הַר סִינַי
  chosen: on Mount Sinai
  alternatives:
  - upon Mount Sinai
  - on the mountain of Sinai
  lexicon: HALOT
  rationale: The preposition עַל with הַר is naturally rendered 'on' here in English.
    'Mount Sinai' is the standard English form for the proper name construction and
    reads naturally while preserving the location.
- source_word: יָרַדְתָּ
  chosen: You came down
  alternatives:
  - You descended
  lexicon: HALOT
  rationale: The verb ירד means 'go down/come down.' 'Came down' is idiomatic in direct
    address to God and preserves the vividness of divine descent better than the more
    formal 'descended.'
- source_word: וְדַבֵּר עִמָּהֶם מִשָּׁמָיִם
  chosen: and spoke with them from heaven
  alternatives:
  - and spoke to them from heaven
  lexicon: HALOT
  rationale: The piel of דבר with עִם commonly means 'speak with.' Retaining 'with'
    reflects the preposition in the Hebrew, though English could also say 'to them.'
    'From heaven' straightforwardly renders מִשָּׁמָיִם and preserves the Sinai theophany's
    transcendence.
- source_word: וַתִּתֵּן לָהֶם
  chosen: and you gave them
  alternatives:
  - and gave to them
  lexicon: HALOT
  rationale: A direct and natural rendering of נתן + ל. The explicit subject 'you'
    is retained for the prayer's second-person address.
- source_word: מִשְׁפָּטִים יְשָׁרִים
  chosen: upright judgments
  alternatives:
  - right judgments
  - just ordinances
  lexicon: HALOT
  rationale: מִשְׁפָּטִים can denote judgments, ordinances, or legal decisions. 'Judgments'
    keeps the legal sense close to the Hebrew. יְשָׁרִים means straight/upright/right;
    'upright' preserves the moral-legal nuance without overinterpreting as merely
    forensic 'just.'
- source_word: וְתוֹרוֹת אֱמֶת
  chosen: true laws
  alternatives:
  - laws of truth
  - true instruction
  lexicon: HALOT
  rationale: 'תּוֹרָה in the plural can refer broadly to laws/instructions. In this
    legal list, ''laws'' fits the context better than the broader ''instruction.''
    אֱמֶת functions attributively: laws characterized by truth/reliability. ''True
    laws'' is clear modern English; ''laws of truth'' is more literal but less natural.'
- source_word: חֻקִּים
  chosen: statutes
  alternatives:
  - decrees
  - ordinances
  lexicon: HALOT
  rationale: A standard rendering for חֹק/חֻקִּים in legal contexts, preserving distinction
    from מִשְׁפָּטִים and מִצְוֺת.
- source_word: וּמִצְוֺת
  chosen: commandments
  alternatives:
  - commands
  lexicon: HALOT
  rationale: '''Commandments'' is the conventional and accurate rendering for מִצְוָה
    in covenant-law contexts and preserves the formal legal-religious register.'
- source_word: טוֹבִים
  chosen: good
  alternatives:
  - beneficial
  - excellent
  lexicon: HALOT
  rationale: טוֹבִים modifies both 'statutes' and 'commandments' in the final pair.
    'Good' is the plain sense and preserves the evaluative force without expanding
    it to a specific nuance such as usefulness.
