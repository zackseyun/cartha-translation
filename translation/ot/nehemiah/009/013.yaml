theological_decisions:
- issue: Rendering the legal terms with differentiated English equivalents
  chosen_reading: Distinguish the four legal nouns as 'judgments,' 'laws,' 'statutes,'
    and 'commandments.'
  alternative_readings:
  - Compress the list into fewer near-synonyms such as 'laws and commands'
  - Render תּוֹרוֹת as 'instructions' rather than 'laws'
  rationale: The Hebrew intentionally piles up several legal terms to emphasize the
    richness and reliability of God's revelation at Sinai. Preserving differentiated
    renderings reflects the source text's texture and avoids flattening the legal
    vocabulary. 'Laws' for תּוֹרוֹת is preferred here because the immediate context
    is a list of covenantal legal categories rather than general teaching.
  doctrine_reference: 'Translation philosophy §5: Consistency of key terms, or documented
    exception.'
