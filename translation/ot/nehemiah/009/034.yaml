id: NEH.9.34
reference: Nehemiah 9:34
source:
  edition: WLC
  text: וְ/אֶת מְלָכֵ֤י/נוּ שָׂרֵ֨י/נוּ֙ כֹּהֲנֵ֣י/נוּ וַ/אֲבֹתֵ֔י/נוּ לֹ֥א עָשׂ֖וּ
    תּוֹרָתֶ֑/ךָ וְ/לֹ֤א הִקְשִׁ֨יבוּ֙ אֶל מִצְוֺתֶ֔י/ךָ וּ/לְ/עֵ֣דְוֺתֶ֔י/ךָ אֲשֶׁ֥ר
    הַעִידֹ֖תָ בָּ/הֶֽם־־׃
translation:
  text: Even our kings, our officials, our priests, and our fathers did not keep your
    law, and they did not pay attention to your commandments and your testimonies
    with which you warned them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our ancestors.' The Hebrew is literally 'our fathers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'did not listen to' or 'did not heed.'
    reason: lexical_alternative
  - marker: c
    text: '''Testimonies'' refers to God''s covenantal witness and solemn charges;
      the clause may also be rendered, ''which you testified against them with.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת
  chosen: Even
  alternatives:
  - And
  - As for
  lexicon: HALOT
  rationale: The conjunction plus object marker introduces an additional group in
    the confession ('even our kings...'). Rendering with 'Even' brings out the additive/emphatic
    force in natural English better than a wooden 'And'.
- source_word: מְלָכֵינוּ
  chosen: our kings
  lexicon: HALOT
  rationale: Straightforward plural construct with 1cp suffix; 'kings' is the natural
    gloss.
- source_word: שָׂרֵינוּ
  chosen: our officials
  alternatives:
  - our princes
  - our leaders
  lexicon: HALOT
  rationale: שָׂרִים denotes rulers/administrators. 'Officials' fits the civic context
    and modern English better than the archaic 'princes,' while remaining more specific
    than 'leaders'.
- source_word: כֹּהֲנֵינוּ
  chosen: our priests
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן.
- source_word: וַאֲבֹתֵינוּ
  chosen: our fathers
  alternatives:
  - our ancestors
  lexicon: HALOT
  rationale: אָבוֹת literally means 'fathers.' Because the phrase refers to prior
    generations in Israel's history, 'our fathers' preserves the source wording and
    biblical idiom; 'our ancestors' is a viable contextual alternative but less formally
    aligned.
- source_word: לֹא עָשׂוּ תּוֹרָתֶךָ
  chosen: did not keep your law
  alternatives:
  - did not do your law
  - did not obey your instruction
  lexicon: HALOT
  rationale: עשה with תּוֹרָה idiomatically means to observe/keep rather than merely
    'do.' 'Law' is appropriate here for תּוֹרָה in covenantal context, though 'instruction'
    is lexically possible.
- source_word: הִקְשִׁיבוּ
  chosen: did not pay attention to
  alternatives:
  - did not listen to
  - did not heed
  lexicon: HALOT
  rationale: The Hiphil of קשׁב means to attend, listen attentively, heed. 'Pay attention
    to' captures the volitional attentiveness implied, in readable modern English.
    'Heed' is concise but slightly less common.
- source_word: מִצְוֺתֶיךָ
  chosen: your commandments
  alternatives:
  - your commands
  lexicon: HALOT
  rationale: Standard covenantal term; 'commandments' preserves the formal register
    and distinction from broader 'law'.
- source_word: וּלְעֵדְוֺתֶיךָ
  chosen: and your testimonies
  alternatives:
  - and your statutes
  - and your solemn warnings
  lexicon: HALOT
  rationale: עֵדוֹת often refers to covenantal testimonies/witnesses. 'Testimonies'
    is the most direct rendering and preserves distinction from commandments. Because
    the following verb is from the same root family ('testify/warn'), the English
    keeps the lexical link as much as possible.
- source_word: אֲשֶׁר הַעִידֹתָ בָהֶם
  chosen: with which you warned them
  alternatives:
  - which you testified against them with
  - which you bore witness to them
  lexicon: HALOT
  rationale: The Hiphil of עוּד here carries the sense of solemnly warning/admonishing,
    often with covenantal witness overtones. 'Warned them' communicates the sense
    clearly in English; adding 'with which' preserves the instrumental relation to
    'testimonies.'
