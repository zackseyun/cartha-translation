theological_decisions:
- issue: Rendering of תּוֹרָה
  chosen_reading: your law
  alternative_readings:
  - your instruction
  rationale: In this national covenant-confession context, תּוֹרָה refers to God's
    covenantal law rather than generic teaching. 'Law' best matches the context while
    remaining faithful to the Hebrew.
- issue: Rendering of אָבוֹת
  chosen_reading: our fathers
  alternative_readings:
  - our ancestors
  rationale: Following the gender-accurate principle, the masculine plural is preserved
    as 'fathers' rather than neutralized, while recognizing that the referent is the
    forefathers/generations of Israel.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
