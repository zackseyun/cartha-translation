theological_decisions:
- issue: Corporate confession of ancestral wrongdoing
  chosen_reading: the people confessed both their own sins and the iniquities of their
    fathers
  alternative_readings:
  - the people confessed only the consequences of their fathers' guilt
  - the phrase refers merely to historical acknowledgment rather than confession
  rationale: The syntax joins two direct objects under 'confessed,' indicating acknowledgment
    before God of both present and ancestral covenant unfaithfulness. The translation
    preserves this corporate dimension without importing a doctrine of inherited personal
    culpability beyond what the verse states.
  doctrine_reference: Preserve theological tension rather than resolve it.
