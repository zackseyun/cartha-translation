id: NEH.9.2
reference: Nehemiah 9:2
source:
  edition: WLC
  text: וַ/יִּבָּֽדְלוּ֙ זֶ֣רַע יִשְׂרָאֵ֔ל מִ/כֹּ֖ל בְּנֵ֣י נֵכָ֑ר וַ/יַּעַמְד֗וּ
    וַ/יִּתְוַדּוּ֙ עַל חַטֹּ֣אתֵי/הֶ֔ם וַ/עֲוֺנ֖וֹת אֲבֹתֵי/הֶֽם־׃
translation:
  text: Then the offspring of Israel separated themselves from all foreigners, and
    they stood and confessed their sins and the iniquities of their fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the seed of Israel' or 'the descendants of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the iniquities of their fathers'; this may refer to ancestral wrongdoing
      acknowledged in corporate confession.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּבָּדְלוּ
  chosen: separated themselves
  alternatives:
  - set themselves apart
  - were separated
  lexicon: HALOT
  rationale: Niphal wayyiqtol of בדל is reflexive/passive in form; in this context
    with a human subject it naturally conveys deliberate separation. 'Separated themselves'
    preserves both the action and the reflexive sense better than a simple passive.
- source_word: זֶרַע יִשְׂרָאֵל
  chosen: the offspring of Israel
  alternatives:
  - the seed of Israel
  - the descendants of Israel
  lexicon: HALOT
  rationale: זֶרַע literally means 'seed,' but in English 'offspring' communicates
    collective descent naturally while preserving the genealogical sense. 'Descendants'
    is possible, but 'offspring' stays closer to the Hebrew imagery without sounding
    awkward.
- source_word: מִכֹּל בְּנֵי נֵכָר
  chosen: from all foreigners
  alternatives:
  - from all the sons of a foreign land
  - from all foreign peoples
  - from all those of foreign descent
  lexicon: HALOT
  rationale: בְּנֵי נֵכָר is an idiom for foreigners/people of foreign origin, not
    merely literal male children. 'From all foreigners' is concise and idiomatic in
    English while preserving the separation from non-Israelites.
- source_word: וַיַּעַמְדוּ
  chosen: they stood
  alternatives:
  - they took their stand
  - they stood up
  lexicon: HALOT
  rationale: The verb עמד commonly means 'stand.' Here it likely introduces the posture
    accompanying confession. 'They stood' is sufficiently literal and readable.
- source_word: וַיִּתְוַדּוּ
  chosen: confessed
  alternatives:
  - made confession
  - openly confessed
  lexicon: HALOT
  rationale: Hitpael of ידה in this context means to confess. 'Confessed' is the natural
    English equivalent and does not over-specify manner beyond the Hebrew.
- source_word: עַל
  chosen: their sins and the iniquities of their fathers
  alternatives:
  - concerning their sins and the iniquities of their fathers
  - over their sins and the iniquities of their fathers
  lexicon: HALOT
  rationale: With התודה, עַל marks the matter confessed. English normally omits a
    separate preposition after 'confessed,' so the object is rendered directly for
    natural style.
- source_word: חַטֹּאתֵיהֶם
  chosen: their sins
  alternatives:
  - their offenses
  lexicon: HALOT
  rationale: חטאת in the plural straightforwardly denotes sins. 'Sins' is the standard
    and clearest rendering.
- source_word: עֲוֺנוֹת אֲבֹתֵיהֶם
  chosen: the iniquities of their fathers
  alternatives:
  - the guilt of their fathers
  - the sins of their fathers
  lexicon: HALOT
  rationale: עון can denote iniquity, guilt, or punishment depending on context. Here,
    in parallel with 'their sins,' 'iniquities' preserves the distinct lexical choice
    and moral weight without collapsing it into the same English term.
