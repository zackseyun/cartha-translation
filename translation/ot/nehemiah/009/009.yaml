id: NEH.9.9
reference: Nehemiah 9:9
source:
  edition: WLC
  text: וַ/תֵּ֛רֶא אֶת עֳנִ֥י אֲבֹתֵ֖י/נוּ בְּ/מִצְרָ֑יִם וְ/אֶת זַעֲקָתָ֥/ם שָׁמַ֖עְתָּ
    עַל יַם סֽוּף־־־־׃
translation:
  text: You saw the affliction of our fathers in Egypt, and you heard their cry at
    the Red Sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Sea of Reeds.'' Traditionally rendered ''Red Sea.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּרֶא
  chosen: you saw
  alternatives:
  - you looked upon
  - you took notice of
  lexicon: HALOT
  rationale: The verb ראה in this context denotes God's seeing in the sense of taking
    cognizance of Israel's condition. 'You saw' is the most direct and natural English
    rendering and preserves the personal address of the prayer.
- source_word: עֳנִי
  chosen: affliction
  alternatives:
  - misery
  - oppression
  lexicon: HALOT
  rationale: עֳנִי commonly refers to affliction, misery, or suffering. 'Affliction'
    fits the covenant-prayer register and captures the distress of Israel in Egypt
    without over-specifying the cause.
- source_word: אֲבֹתֵינוּ
  chosen: our fathers
  alternatives:
  - our ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural construct with first person
    plural suffix, referring to the forefathers of the community. Per the gender-accurate
    philosophy, 'our fathers' is retained rather than neutralizing to 'our ancestors,'
    though the latter is a possible interpretive gloss.
- source_word: בְּמִצְרַיִם
  chosen: in Egypt
  lexicon: HALOT
  rationale: Straightforward locative phrase indicating the place of Israel's affliction.
- source_word: זַעֲקָתָם
  chosen: their cry
  alternatives:
  - their outcry
  lexicon: HALOT
  rationale: זעקה denotes a cry for help or outcry in distress. 'Their cry' is idiomatic
    and sufficiently weighty; 'outcry' is possible but slightly less natural here.
- source_word: שָׁמַעְתָּ
  chosen: you heard
  alternatives:
  - you listened to
  lexicon: HALOT
  rationale: The verb שמע here means hearing in the sense of responding to a plea.
    'You heard' is the standard and faithful rendering in prayer language.
- source_word: עַל
  chosen: at
  alternatives:
  - by
  - concerning
  lexicon: HALOT
  rationale: With a place name, עַל can denote position at or by a location. Here
    it refers to the setting of Israel's cry in relation to the sea; 'at' is the most
    natural English choice.
- source_word: יַם סוּף
  chosen: the Red Sea
  alternatives:
  - the Sea of Reeds
  lexicon: HALOT
  rationale: Although the Hebrew literally reads 'Sea of Reeds,' 'Red Sea' is the
    established English geographical rendering and is widely recognized by readers.
    Because 'Sea of Reeds' reflects the lexical components more transparently, it
    is preserved in a footnote as a lexical alternative.
