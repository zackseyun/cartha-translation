theological_decisions:
- issue: Referent of 'them' in 'they acted arrogantly against them'
  chosen_reading: The Egyptians/Pharaoh acted arrogantly against Israel.
  alternative_readings:
  - The arrogance was directed more generally against God
  - The pronoun is left somewhat implicit in Hebrew style
  rationale: In the Exodus context recalled here, Pharaoh and the Egyptians treated
    Israel presumptuously and oppressively; the plural pronoun most naturally refers
    to God's people. The translation keeps the pronoun 'them' rather than replacing
    it with 'your people' so as not to over-interpret beyond the text, while the rationale
    documents the likely referent.
