id: NEH.9.10
reference: Nehemiah 9:10
source:
  edition: WLC
  text: וַ֠/תִּתֵּן אֹתֹ֨ת וּ/מֹֽפְתִ֜ים בְּ/פַרְעֹ֤ה וּ/בְ/כָל עֲבָדָי/ו֙ וּ/בְ/כָל
    עַ֣ם אַרְצ֔/וֹ כִּ֣י יָדַ֔עְתָּ כִּ֥י הֵזִ֖ידוּ עֲלֵי/הֶ֑ם וַ/תַּֽעַשׂ לְ/ךָ֥
    שֵׁ֖ם כְּ/הַ/יּ֥וֹם הַ/זֶּֽה־־־׃
translation:
  text: You performed signs and wonders against Pharaoh, against all his servants,
    and against all the people of his land, for you knew that they acted arrogantly
    against them. So you made a name for yourself, as it is to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dealt presumptuously against them.' The Hebrew verb can denote acting
      proudly, insolently, or presumptuously.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּתֵּן
  chosen: You performed
  alternatives:
  - You gave
  - You set
  lexicon: HALOT
  rationale: Although the verb is literally 'gave,' in English with 'signs and wonders'
    the idiomatic sense is that God performed or displayed them. 'Performed' preserves
    the action without wooden phrasing.
- source_word: אֹתֹת וּמֹפְתִים
  chosen: signs and wonders
  alternatives:
  - signs and miracles
  - signs and portents
  lexicon: HALOT
  rationale: This is a standard paired expression for extraordinary divine acts. 'Signs
    and wonders' is both accurate and natural, preserving the dual nuance of evidential
    signs and astonishing acts.
- source_word: בְּפַרְעֹה
  chosen: against Pharaoh
  alternatives:
  - on Pharaoh
  - with Pharaoh
  lexicon: HALOT
  rationale: The preposition ב here marks the objects upon whom the signs were inflicted
    or displayed in judgment. 'Against Pharaoh' best conveys the adversative force
    in context.
- source_word: וּבְכָל עֲבָדָיו
  chosen: against all his servants
  alternatives:
  - against all his officials
  - against all his slaves
  lexicon: HALOT
  rationale: עֲבָדִים can mean servants, officials, or slaves depending on context.
    In royal context, 'servants' commonly refers to Pharaoh's court attendants/officials.
    'Servants' is broad and conventional without over-specifying rank.
- source_word: וּבְכָל עַם אַרְצוֹ
  chosen: against all the people of his land
  alternatives:
  - against all the people of his country
  - against all the people of his land Egypt
  lexicon: HALOT
  rationale: A fairly literal rendering that preserves the possessive structure. 'Land'
    is closer to אֶרֶץ than 'country,' while still natural English.
- source_word: כִּי יָדַעְתָּ
  chosen: for you knew
  alternatives:
  - because you knew
  - for you had known
  lexicon: HALOT
  rationale: כִּי here introduces the reason for God's actions. 'For you knew' is
    natural and preserves the causal connection.
- source_word: הֵזִידוּ
  chosen: acted arrogantly
  alternatives:
  - dealt presumptuously
  - acted proudly
  - behaved insolently
  lexicon: HALOT
  rationale: The Hiphil of זוּד conveys acting presumptuously or arrogantly. 'Acted
    arrogantly' is readable modern English and captures the moral tone without archaic
    diction.
- source_word: עֲלֵיהֶם
  chosen: against them
  alternatives:
  - toward them
  - over them
  lexicon: HALOT
  rationale: Refers to Israel, the people oppressed by Pharaoh and Egypt. 'Against
    them' best conveys hostile action.
- source_word: וַתַּעַשׂ לְךָ שֵׁם
  chosen: you made a name for yourself
  alternatives:
  - you made for yourself a name
  - you gained renown for yourself
  lexicon: HALOT
  rationale: This idiom means to establish renown or reputation. 'Made a name for
    yourself' preserves the Hebrew idiom while remaining understandable in English.
- source_word: כְּהַיּוֹם הַזֶּה
  chosen: as it is to this day
  alternatives:
  - as on this day
  - as at this day
  lexicon: HALOT
  rationale: An idiomatic temporal expression meaning that the result endures into
    the present. 'As it is to this day' is standard, clear English.
