theological_decisions:
- issue: Oath idiom in reference to God's promise of the land
  chosen_reading: Retain the anthropomorphic oath image 'lifted up your hand' in the
    main text
  alternative_readings:
  - Render idiomatically as 'swore'
  rationale: The Hebrew idiom denotes swearing an oath, but preserving the image maintains
    source-language texture and avoids flattening the covenantal language. The idiomatic
    meaning is important enough to preserve in a footnote.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it where ambiguity
    or idiom invites multiple viable renderings.'
