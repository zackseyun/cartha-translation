id: NEH.9.15
reference: Nehemiah 9:15
source:
  edition: WLC
  text: וְ֠/לֶחֶם מִ/שָּׁמַ֜יִם נָתַ֤תָּה לָ/הֶם֙ לִ/רְעָבָ֔/ם וּ/מַ֗יִם מִ/סֶּ֛לַע
    הוֹצֵ֥אתָ לָ/הֶ֖ם לִ/צְמָאָ֑/ם וַ/תֹּ֣אמֶר לָ/הֶ֗ם לָ/בוֹא֙ לָ/רֶ֣שֶׁת אֶת הָ/אָ֔רֶץ
    אֲשֶׁר נָשָׂ֥אתָ אֶת יָדְ/ךָ֖ לָ/תֵ֥ת לָ/הֶֽם־־־׃
translation:
  text: You gave them bread from heaven for their hunger, and you brought out water
    from the rock for their thirst, and you told them to go in to possess the land
    that you had lifted up your hand to give them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'that you had sworn to give them.' The Hebrew literally
      says 'lifted up your hand,' an oath-taking expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶחֶם מִשָּׁמַיִם
  chosen: bread from heaven
  alternatives:
  - food from heaven
  lexicon: HALOT
  rationale: Formal image retained. Although the referent is manna, the Hebrew says
    'bread,' and this preserves the allusive force without over-paraphrasing.
- source_word: לִרְעָבָם
  chosen: for their hunger
  alternatives:
  - in their hunger
  - when they were hungry
  lexicon: HALOT
  rationale: The lamed + noun with suffix expresses relation/purpose; 'for their hunger'
    is concise and natural while staying close to the Hebrew.
- source_word: מַיִם מִסֶּלַע
  chosen: water from the rock
  alternatives:
  - water from a rock
  lexicon: HALOT
  rationale: The article is absent on 'rock' in Hebrew, but English idiom and the
    likely reference to the known wilderness event favor 'the rock' without materially
    changing sense.
- source_word: הוֹצֵאתָ
  chosen: you brought out
  alternatives:
  - you caused to come out
  - you brought forth
  lexicon: HALOT
  rationale: Hiphil of יצא is causative; 'brought out' is natural modern English and
    preserves the causative sense.
- source_word: לִצְמָאָם
  chosen: for their thirst
  alternatives:
  - in their thirst
  - when they were thirsty
  lexicon: HALOT
  rationale: Parallel to 'for their hunger,' preserving the Hebrew structure and poetic
    balance.
- source_word: וַתֹּאמֶר לָהֶם
  chosen: you told them
  alternatives:
  - you said to them
  - you commanded them
  lexicon: HALOT
  rationale: The verb is literally 'said,' but in English 'told them' better introduces
    the infinitival content clause. 'Commanded' would overstate the lexical force.
- source_word: לָבוֹא
  chosen: to go in
  alternatives:
  - to enter
  lexicon: HALOT
  rationale: Both are possible; 'go in' reflects the motion nuance of בוא and reads
    naturally before 'possess the land.'
- source_word: לָרֶשֶׁת
  chosen: to possess
  alternatives:
  - to take possession of
  - to inherit
  lexicon: HALOT
  rationale: ירשׁ in land contexts commonly means taking possession. 'Inherit' is
    possible but can sound overly passive in English here.
- source_word: נָשָׂאתָ אֶת יָדְךָ
  chosen: you had lifted up your hand
  alternatives:
  - you had sworn
  - you had raised your hand
  lexicon: HALOT
  rationale: The idiom refers to oath-taking. The main text keeps the concrete Hebrew
    image for transparency; the idiomatic sense is preserved in a footnote.
- source_word: לָתֵת לָהֶם
  chosen: to give them
  alternatives:
  - to give to them
  lexicon: HALOT
  rationale: Standard English rendering of the infinitive phrase; no nuance is lost.
