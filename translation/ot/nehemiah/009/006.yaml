theological_decisions:
- issue: Divine uniqueness in relation to YHWH
  chosen_reading: You alone are the LORD
  alternative_readings:
  - You are the LORD alone
  rationale: The Hebrew emphasis joins the pronouns with לְבַדֶּךָ to stress that
    YHWH alone is God. The chosen English is the most natural and emphatic formulation
    in modern English.
  doctrine_reference: 'DOCTRINE.md: YHWH -> ''the LORD''; preserve source-text emphasis
    without paraphrase'
- issue: Meaning of God's ongoing action toward creation in מְחַיֶּה
  chosen_reading: and you preserve all of them alive
  alternative_readings:
  - and you give life to all of them
  - and you keep them all alive
  rationale: The verse moves from creation to providential sustenance. 'Preserve all
    of them alive' highlights God's continuing life-sustaining action without excluding
    that he is also the giver of life.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than over-resolve;
    optimal equivalence'
