id: NEH.9.6
reference: Nehemiah 9:6
source:
  edition: WLC
  text: אַתָּה ה֣וּא יְהוָה֮ לְ/בַדֶּ/ךָ֒ את עָשִׂ֡יתָ אֶֽת הַ/שָּׁמַיִם֩ שְׁמֵ֨י
    הַ/שָּׁמַ֜יִם וְ/כָל צְבָאָ֗/ם הָ/אָ֜רֶץ וְ/כָל אֲשֶׁ֤ר עָלֶ֨י/הָ֙ הַ/יַּמִּים֙
    וְ/כָל אֲשֶׁ֣ר בָּ/הֶ֔ם וְ/אַתָּ֖ה מְחַיֶּ֣ה אֶת כֻּלָּ֑/ם וּ/צְבָ֥א הַ/שָּׁמַ֖יִם
    לְ/ךָ֥ מִשְׁתַּחֲוִֽים־־־־־־׃
translation:
  text: You alone are the LORD. You made the heavens, the highest heavens and all
    their host, the earth and all that is on it, the seas and all that is in them;
    and you preserve all of them alive, and the host of heaven bows down to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the heavens of heavens,'' an idiom meaning ''the highest heavens.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'you give life to all of them' / 'you keep them all alive.'
    reason: alternative_reading
  - marker: c
    text: Or 'the heavenly host bows down to you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name YHWH as
    'the LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: אַתָּה הוּא
  chosen: You ... are
  alternatives:
  - You are he
  - You yourself are
  lexicon: HALOT
  rationale: The pronoun plus independent pronoun construction is emphatic. English
    idiom is best served by 'You ... are,' with the emphasis carried by word order
    and the following 'alone.'
- source_word: לְבַדֶּךָ
  chosen: alone
  alternatives:
  - by yourself
  - you alone
  lexicon: HALOT
  rationale: This adverbial form stresses exclusivity. 'Alone' is concise and natural;
    combined with the fronted 'You' it yields the emphatic 'You alone are the LORD.'
- source_word: עָשִׂיתָ
  chosen: made
  alternatives:
  - did
  - fashioned
  - created
  lexicon: HALOT
  rationale: The common verb עשה here refers to God's making of the cosmos. 'Made'
    is the most direct and contextually appropriate rendering without importing the
    more specific verb 'created,' which is not the lexical form used here.
- source_word: הַשָּׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the sky
  lexicon: HALOT
  rationale: The plural Hebrew form is best represented by 'the heavens' in this cosmic
    context.
- source_word: שְׁמֵי הַשָּׁמַיִם
  chosen: the highest heavens
  alternatives:
  - heaven of heavens
  - the heavens of heavens
  lexicon: HALOT
  rationale: The Hebrew superlative-like expression literally means 'heavens of heavens.'
    'The highest heavens' communicates the sense in readable modern English while
    preserving the layered cosmological expression.
- source_word: צְבָאָם
  chosen: their host
  alternatives:
  - their army
  - all their stars
  - their array
  lexicon: HALOT
  rationale: צָבָא in heavenly contexts denotes the heavenly host, including celestial
    bodies and/or angelic beings. 'Host' preserves the breadth of the Hebrew better
    than narrowing it to stars alone.
- source_word: הָאָרֶץ וְכָל אֲשֶׁר עָלֶיהָ
  chosen: the earth and all that is on it
  alternatives:
  - the land and all that is upon it
  lexicon: HALOT
  rationale: In this creation list, אֶרֶץ refers to the earth as a whole, not merely
    a particular land. 'On it' is natural English for עָלֶיהָ.
- source_word: הַיַּמִּים וְכָל אֲשֶׁר בָּהֶם
  chosen: the seas and all that is in them
  alternatives:
  - the oceans and all that is in them
  lexicon: HALOT
  rationale: '''Seas'' is the standard rendering of יַמִּים and fits the triadic creation
    catalog of heavens, earth, and seas.'
- source_word: מְחַיֶּה
  chosen: preserve ... alive
  alternatives:
  - give life to
  - keep alive
  - make alive
  lexicon: HALOT
  rationale: The piel participle of חיה can mean to keep alive or give life. In context,
    after the statement of creation, the emphasis is on God's ongoing sustaining of
    all things, so 'preserve all of them alive' best captures the durative force.
- source_word: אֶת כֻּלָּם
  chosen: all of them
  alternatives:
  - them all
  - all
  lexicon: HALOT
  rationale: The explicit object marker plus pronominal suffix points to the totality
    of the created order just listed. 'All of them' preserves that comprehensiveness.
- source_word: וּצְבָא הַשָּׁמַיִם
  chosen: the host of heaven
  alternatives:
  - the heavenly host
  - the army of heaven
  lexicon: HALOT
  rationale: This singular collective expression refers to heaven's host as a body.
    'The host of heaven' is slightly more formal and echoes biblical diction without
    becoming archaic.
- source_word: לְךָ מִשְׁתַּחֲוִים
  chosen: bows down to you
  alternatives:
  - worships you
  - prostrates itself before you
  lexicon: HALOT
  rationale: The verb means to bow down/prostrate oneself. 'Bows down to you' preserves
    the physical posture and avoids prematurely narrowing the act to an abstract term,
    though worship is clearly involved.
