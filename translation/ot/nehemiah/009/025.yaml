id: NEH.9.25
reference: Nehemiah 9:25
source:
  edition: WLC
  text: וַֽ/יִּלְכְּד֞וּ עָרִ֣ים בְּצֻרוֹת֮ וַ/אֲדָמָ֣ה שְׁמֵנָה֒ וַ/יִּֽירְשׁ֡וּ
    בָּתִּ֣ים מְלֵֽאִים כָּל ט֠וּב בֹּר֨וֹת חֲצוּבִ֜ים כְּרָמִ֧ים וְ/זֵיתִ֛ים וְ/עֵ֥ץ
    מַאֲכָ֖ל לָ/רֹ֑ב וַ/יֹּאכְל֤וּ וַֽ/יִּשְׂבְּעוּ֙ וַ/יַּשְׁמִ֔ינוּ וַ/יִּֽתְעַדְּנ֖וּ
    בְּ/טוּבְ/ךָ֥ הַ/גָּדֽוֹל־־׃
translation:
  text: They captured fortified cities and fertile land, and took possession of houses
    full of every good thing, cisterns already hewn out, vineyards, olive trees, and
    fruit trees in abundance. So they ate and were filled and grew fat, and they delighted
    themselves in your great goodness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rich land'; literally 'fat land.'
    reason: lexical_alternative
  - marker: b
    text: Or 'were satisfied.'
    reason: lexical_alternative
  - marker: c
    text: Or 'they luxuriated in your great bounty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלְכְּדוּ
  chosen: captured
  alternatives:
  - took
  - seized
  lexicon: HALOT
  rationale: The verb לכד commonly means to capture or seize, especially of taking
    cities. 'Captured' fits the military context with 'fortified cities' more precisely
    than the broader 'took'.
- source_word: עָרִים בְּצֻרוֹת
  chosen: fortified cities
  alternatives:
  - strong cities
  - fortress cities
  lexicon: HALOT
  rationale: בצר denotes fortification. 'Fortified cities' is standard, clear modern
    English and preserves the military sense.
- source_word: אֲדָמָה שְׁמֵנָה
  chosen: fertile land
  alternatives:
  - rich land
  - fat land
  lexicon: HALOT
  rationale: Literally 'fat land,' an idiom for rich/productive soil. 'Fertile land'
    communicates the Hebrew idiom naturally without unnecessary archaism.
- source_word: וַיִּירְשׁוּ
  chosen: took possession of
  alternatives:
  - inherited
  - possessed
  lexicon: HALOT
  rationale: ירשׁ can mean inherit, dispossess, or take possession. Here the focus
    is entering and possessing what God gave after conquest, so 'took possession of'
    best captures the action in context.
- source_word: בָּתִּים מְלֵאִים כָּל טוּב
  chosen: houses full of every good thing
  alternatives:
  - houses full of all good things
  - houses filled with every good thing
  lexicon: HALOT
  rationale: כָּל טוּב is a broad expression for all kinds of good/prosperous provisions.
    'Every good thing' is idiomatic and preserves the comprehensive sense.
- source_word: בֹּרוֹת חֲצוּבִים
  chosen: cisterns already hewn out
  alternatives:
  - hewn cisterns
  - dug cisterns
  lexicon: HALOT
  rationale: בּוֹר here refers to water-storage pits/cisterns, and חצוב means hewn
    or cut out. 'Already hewn out' makes explicit that these were prepared for them,
    matching the context of inherited provision.
- source_word: כְּרָמִים
  chosen: vineyards
  alternatives:
  - vineyards of grapes
  lexicon: HALOT
  rationale: Standard rendering for כרמים.
- source_word: זֵיתִים
  chosen: olive trees
  alternatives:
  - olives
  - olive groves
  lexicon: HALOT
  rationale: In a list of landed agricultural assets, 'olive trees' is the most natural
    concrete rendering.
- source_word: עֵץ מַאֲכָל
  chosen: fruit trees
  alternatives:
  - trees for food
  - food-bearing trees
  lexicon: HALOT
  rationale: The phrase means trees producing edible fruit. 'Fruit trees' is the natural
    English equivalent.
- source_word: לָרֹב
  chosen: in abundance
  alternatives:
  - in great number
  - abundantly
  lexicon: HALOT
  rationale: This phrase modifies the agricultural provisions as plentiful. 'In abundance'
    is idiomatic and clear.
- source_word: וַיֹּאכְלוּ וַיִּשְׂבְּעוּ
  chosen: they ate and were filled
  alternatives:
  - they ate and were satisfied
  - they ate and had their fill
  lexicon: HALOT
  rationale: שׂבע means to be sated/satisfied. 'Were filled' preserves the concrete
    imagery and echoes biblical diction without sounding archaic.
- source_word: וַיַּשְׁמִינוּ
  chosen: grew fat
  alternatives:
  - became prosperous
  - became fat
  lexicon: HALOT
  rationale: The verb is literally 'became fat.' In this context it signifies abundance
    and prosperity, not necessarily moral judgment. 'Grew fat' keeps the vivid Hebrew
    image.
- source_word: וַיִּתְעַדְּנוּ
  chosen: they delighted themselves
  alternatives:
  - they luxuriated
  - they enjoyed themselves
  lexicon: HALOT
  rationale: The hitpael of עדן conveys taking exquisite delight or enjoying luxury/delight.
    'Delighted themselves' preserves the reflexive nuance and avoids over-paraphrase.
- source_word: בְּטוּבְךָ הַגָּדוֹל
  chosen: in your great goodness
  alternatives:
  - in your great bounty
  - in your abundant goodness
  lexicon: HALOT
  rationale: טוּב can mean goodness or bounty. Because the verse emphasizes God's
    beneficence expressed in material blessing, 'great goodness' preserves both moral
    and beneficent overtones while staying close to the Hebrew.
