theological_decisions:
- issue: Nuance of divine beneficence in בְּטוּבְךָ הַגָּדוֹל
  chosen_reading: in your great goodness
  alternative_readings:
  - in your great bounty
  - through your great goodness
  rationale: The phrase attributes Israel's enjoyment to God's generous goodness.
    'Goodness' is broader and theologically richer than merely material 'bounty,'
    while still fitting the context of provision. The preposition ב is rendered instrumentally/locatively
    in idiomatic English as 'in,' preserving the Hebrew imagery of delighting within
    God's beneficence rather than narrowing it to a single causal gloss.
  doctrine_reference: Translation philosophy §1, §3, §6
