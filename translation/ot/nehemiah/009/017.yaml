id: NEH.9.17
reference: Nehemiah 9:17
source:
  edition: WLC
  text: וַ/יְמָאֲנ֣וּ לִ/שְׁמֹ֗עַ וְ/לֹא זָכְר֤וּ נִפְלְאֹתֶ֨י/ךָ֙ אֲשֶׁ֣ר עָשִׂ֣יתָ
    עִמָּ/הֶ֔ם וַ/יַּקְשׁוּ֙ אֶת עָרְפָּ֔/ם וַ/יִּתְּנוּ רֹ֛אשׁ לָ/שׁ֥וּב לְ/עַבְדֻתָ֖/ם
    בְּ/מִרְיָ֑/ם וְ/אַתָּה֩ אֱל֨וֹהַּ סְלִיח֜וֹת חַנּ֧וּן וְ/רַח֛וּם אֶֽרֶךְ אַפַּ֥יִם
    וְ/רַב ו/חסד וְ/לֹ֥א עֲזַבְתָּֽ/ם־־־־־׃
translation:
  text: But they refused to listen and did not remember your wonders that you had
    done among them. They stiffened their neck and appointed a leader to return to
    their slavery in their rebellion. But you are a God of forgivenesses, gracious
    and compassionate, slow to anger and abundant in steadfast love, and you did not
    forsake them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'a God of forgivenesses'; the plural likely intensifies the idea
      of abundant forgiveness. Many translations smooth this to 'a forgiving God'
      or 'a God ready to forgive.'
    reason: lexical_alternative
  - marker: b
    text: Or 'appointed a chief' or more literally 'set a head' to return to their
      slavery.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמָאֲנוּ לִשְׁמֹעַ
  chosen: they refused to listen
  alternatives:
  - they refused to obey
  - they were unwilling to hear
  lexicon: HALOT
  rationale: מָאֵן conveys refusal or unwillingness. With שׁמע, the sense can shade
    toward obedience, but 'listen' preserves the Hebrew wording while allowing the
    implied disobedience to remain contextually evident.
- source_word: נִפְלְאֹתֶיךָ
  chosen: your wonders
  alternatives:
  - your wondrous deeds
  - your marvelous acts
  lexicon: HALOT
  rationale: The noun denotes extraordinary acts that evoke wonder. 'Wonders' is concise
    and idiomatic, while retaining the theological resonance of God's mighty acts.
- source_word: עָשִׂיתָ עִמָּהֶם
  chosen: you had done among them
  alternatives:
  - you did for them
  - you had done with them
  lexicon: HALOT
  rationale: The preposition עִם can mean 'with' or 'among/in relation to.' Here 'among
    them' best fits the communal experience of God's acts in Israel's midst and avoids
    over-narrowing to merely benefactive action.
- source_word: וַיַּקְשׁוּ אֶת־עָרְפָּם
  chosen: they stiffened their neck
  alternatives:
  - they hardened their neck
  - they became stiff-necked
  lexicon: HALOT
  rationale: This is a Hebrew idiom for stubborn rebellion. 'Stiffened their neck'
    preserves the metaphor more directly than the adjectival paraphrase 'became stiff-necked.'
- source_word: וַיִּתְּנוּ רֹאשׁ
  chosen: appointed a leader
  alternatives:
  - set a head
  - appointed a chief
  lexicon: HALOT
  rationale: Literally 'gave a head,' an idiom for setting someone in leadership.
    'Appointed a leader' communicates the idiomatic sense in natural English without
    obscuring the action.
- source_word: לָשׁוּב לְעַבְדֻתָם
  chosen: to return to their slavery
  alternatives:
  - to return to their bondage
  - to go back to serving as slaves
  lexicon: HALOT
  rationale: עַבְדוּת denotes servitude or slavery. 'Slavery' is the clearest modern
    rendering and fits the Exodus context.
- source_word: בְּמִרְיָם
  chosen: in their rebellion
  alternatives:
  - in their rebelliousness
  - through their rebellion
  lexicon: HALOT
  rationale: The noun denotes rebellion or defiance. The prefixed ב is taken in a
    circumstantial sense, describing the manner or condition in which they acted.
- source_word: אֱלוֹהַּ סְלִיחוֹת
  chosen: a God of forgivenesses
  alternatives:
  - a forgiving God
  - a God ready to forgive
  lexicon: HALOT
  rationale: The plural noun 'forgivenesses' is unusual in English but reflects the
    Hebrew plural of abundance/intensity. Retaining it makes the phrase more auditable,
    while still understandable. The smoother alternatives are possible but less formally
    transparent.
- source_word: חַנּוּן וְרַחוּם
  chosen: gracious and compassionate
  alternatives:
  - gracious and merciful
  lexicon: HALOT
  rationale: This common divine pair emphasizes favor and tender mercy. 'Compassionate'
    captures רחום well in contemporary English and avoids flattening both terms into
    near-synonyms.
- source_word: אֶרֶךְ אַפַּיִם
  chosen: slow to anger
  alternatives:
  - long of nostrils
  - patient
  lexicon: HALOT
  rationale: This is the standard idiomatic rendering of the Hebrew expression, preserving
    meaning rather than the opaque literal image.
- source_word: רַב־חֶסֶד
  chosen: abundant in steadfast love
  alternatives:
  - great in covenant love
  - rich in loyal love
  lexicon: HALOT
  rationale: חסד is a theologically weighty covenant term. 'Steadfast love' is a well-established
    English rendering that preserves both affection and loyalty; 'abundant in' reflects
    רַב idiomatically.
- source_word: וְלֹא עֲזַבְתָּם
  chosen: and you did not forsake them
  alternatives:
  - and you did not abandon them
  lexicon: HALOT
  rationale: עזב means leave, abandon, forsake. 'Forsake' carries the covenantal and
    relational force well in this context.
