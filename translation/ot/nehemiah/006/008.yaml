id: NEH.6.8
reference: Nehemiah 6:8
source:
  edition: WLC
  text: וָ/אֶשְׁלְחָ֤/ה אֵלָי/ו֙ לֵ/אמֹ֔ר לֹ֤א נִֽהְיָה֙ כַּ/דְּבָרִ֣ים הָ/אֵ֔לֶּה
    אֲשֶׁ֖ר אַתָּ֣ה אוֹמֵ֑ר כִּ֥י מִֽ/לִּבְּ/ךָ֖ אַתָּ֥ה בוֹדָֽא/ם׃
translation:
  text: So I sent to him, saying, “These things that you are saying have not happened,
    for you are inventing them out of your own heart.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “you are making them up out of your own heart.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁלְחָה
  chosen: So I sent
  alternatives:
  - Then I sent
  - And I sent
  lexicon: HALOT
  rationale: Wayyiqtol of שׁלח introduces the next narrative action. 'So I sent' gives
    natural English narrative progression while preserving the sequential force.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - unto him
  lexicon: HALOT
  rationale: Standard directional phrase with אל; 'to him' is idiomatic modern English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Common quotative infinitive rendered naturally as 'saying' before direct
    speech.
- source_word: לֹא נִהְיָה
  chosen: have not happened
  alternatives:
  - have not been
  - there is nothing to
  lexicon: HALOT
  rationale: The verb היה here denies the reality or occurrence of the reported matters.
    'Have not happened' communicates that the allegations are false events, more idiomatic
    than 'have not been.'
- source_word: כַּדְּבָרִים הָאֵלֶּה
  chosen: These things
  alternatives:
  - such things
  - these matters
  - these words
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'thing.' In context of reported accusations,
    'these things' captures the content broadly and reads naturally in English.
- source_word: אֲשֶׁר אַתָּה אוֹמֵר
  chosen: that you are saying
  alternatives:
  - that you say
  - which you are saying
  lexicon: HALOT
  rationale: The participle אוֹמֵר has present/imperfective force. 'Are saying' reflects
    the ongoing assertion in the accusation.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - rather
  lexicon: HALOT
  rationale: Introduces the reason for Nehemiah's denial. 'For' fits the direct rebuttal
    style.
- source_word: מִלִּבְּךָ
  chosen: out of your own heart
  alternatives:
  - from your own heart
  - from your own mind
  lexicon: HALOT
  rationale: לֵב in Hebrew often denotes the inner person, including thought and intention.
    'Out of your own heart' preserves the Hebrew anthropological imagery; 'own' is
    supplied from the 2ms suffix.
- source_word: בּוֹדָאם
  chosen: you are inventing them
  alternatives:
  - you are making them up
  - you are devising them
  lexicon: HALOT
  rationale: From בדא, 'to invent/fabricate.' 'Inventing them' is clear, dignified
    modern English and avoids overly colloquial phrasing while preserving the sense
    of fabrication.
