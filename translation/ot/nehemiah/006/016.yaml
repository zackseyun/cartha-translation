id: NEH.6.16
reference: Nehemiah 6:16
source:
  edition: WLC
  text: וַ/יְהִ֗י כַּ/אֲשֶׁ֤ר שָֽׁמְעוּ֙ כָּל א֣וֹיְבֵ֔י/נוּ וַ/יִּֽרְא֗וּ כָּל הַ/גּוֹיִם֙
    אֲשֶׁ֣ר סְבִֽיבֹתֵ֔י/נוּ וַ/יִּפְּל֥וּ מְאֹ֖ד בְּ/עֵינֵי/הֶ֑ם וַ/יֵּ֣דְע֔וּ כִּ֚י
    מֵ/אֵ֣ת אֱלֹהֵ֔י/נוּ נֶעֶשְׂתָ֖ה הַ/מְּלָאכָ֥ה הַ/זֹּֽאת־־׃
translation:
  text: And it happened that when all our enemies heard, and all the nations around
    us saw, they fell greatly in their own eyes, and they knew that this work had
    been done by our God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they lost much confidence in themselves' / 'they were greatly cast
      down in their own eyes.' The Hebrew preserves the image of falling in one's
      own estimation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Then it happened
  lexicon: HALOT
  rationale: Retains the narrative transition formula without archaic diction. 'And
    it happened' reflects the Hebrew idiom more transparently than omitting it entirely.
- source_word: כַּאֲשֶׁר
  chosen: when
  alternatives:
  - as soon as
  - after
  lexicon: HALOT
  rationale: Introduces the temporal clause naturally in English; 'when' best fits
    the sequence without over-specifying immediacy.
- source_word: שָׁמְעוּ
  chosen: heard
  alternatives:
  - heard about
  - came to hear
  lexicon: HALOT
  rationale: Simple 'heard' matches the Hebrew verb directly; the object is implied
    by context (the completion of the wall) and need not be expanded.
- source_word: כָּל אֹיְבֵינוּ
  chosen: all our enemies
  alternatives:
  - all of our enemies
  lexicon: HALOT
  rationale: Straightforward rendering of the construct phrase with possessive suffix.
- source_word: וַיִּרְאוּ
  chosen: saw
  alternatives:
  - looked on
  - perceived
  lexicon: HALOT
  rationale: The verb is the common verb 'to see'; here it likely means they observed
    the result, but 'saw' preserves the lexical simplicity.
- source_word: כָּל הַגּוֹיִם אֲשֶׁר סְבִיבֹתֵינוּ
  chosen: all the nations around us
  alternatives:
  - all the peoples around us
  - all the Gentiles around us
  lexicon: HALOT
  rationale: גּוֹיִם here refers to surrounding peoples/nations, not specifically
    'Gentiles' in a later theological sense. 'Nations' is the most contextually appropriate
    and consistent gloss.
- source_word: וַיִּפְּלוּ מְאֹד בְּעֵינֵיהֶם
  chosen: they fell greatly in their own eyes
  alternatives:
  - they were much cast down in their own esteem
  - they lost much confidence in themselves
  - they were greatly lowered in their own eyes
  lexicon: HALOT
  rationale: This idiom is difficult. Literally, they 'fell very much in their eyes,'
    meaning they were humbled or lost self-confidence. The main text keeps the Hebrew
    image with minimal smoothing; the idiomatic sense is worth preserving in a footnote.
- source_word: וַיֵּדְעוּ
  chosen: and they knew
  alternatives:
  - and they recognized
  - and they realized
  lexicon: HALOT
  rationale: '''Knew'' is the direct rendering and preserves the force of acknowledgment.'
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Introduces the content of what they knew.
- source_word: מֵאֵת אֱלֹהֵינוּ
  chosen: by our God
  alternatives:
  - from our God
  - through our God
  lexicon: HALOT
  rationale: The preposition marks source or agency. 'By our God' communicates that
    the work's accomplishment was attributable to God's action, which fits the context
    of divine enablement. 'From our God' is possible but less natural in English here.
- source_word: נֶעֶשְׂתָה
  chosen: had been done
  alternatives:
  - was done
  - had been accomplished
  lexicon: HALOT
  rationale: The Niphal form is passive/reflexive. 'Had been done' gives a natural
    English passive and fits the completed action now recognized by the nations.
- source_word: הַמְּלָאכָה הַזֹּאת
  chosen: this work
  alternatives:
  - this task
  - this undertaking
  lexicon: HALOT
  rationale: '''Work'' is broad and natural, referring to the wall-building project
    without narrowing it too much.'
