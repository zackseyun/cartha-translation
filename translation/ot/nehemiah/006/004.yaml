id: NEH.6.4
reference: Nehemiah 6:4
source:
  edition: WLC
  text: וַ/יִּשְׁלְח֥וּ אֵלַ֛/י כַּ/דָּבָ֥ר הַ/זֶּ֖ה אַרְבַּ֣ע פְּעָמִ֑ים וָ/אָשִׁ֥יב
    אוֹתָ֖/ם כַּ/דָּבָ֥ר הַ/זֶּֽה׃ס
translation:
  text: They sent to me four times with this same message, and I answered them in
    the same way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'according to this word' in both clauses; the phrase refers to
      the same message being sent and the same kind of answer being returned.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלְחוּ
  chosen: They sent
  alternatives:
  - they sent word
  - they sent messengers
  lexicon: HALOT
  rationale: The verb שלח means 'to send.' In context, the object is implicit and
    the following phrase 'to me' indicates repeated attempts at communication. 'They
    sent' is the most direct rendering and leaves the implied object unstated as in
    Hebrew.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - against me
  lexicon: HALOT
  rationale: The preposition אֶל with 1cs suffix normally means 'to me/toward me.'
    There is no contextual basis here for an adversative sense.
- source_word: כַּדָּבָר הַזֶּה
  chosen: with this same message
  alternatives:
  - according to this word
  - like this
  - in this manner
  lexicon: HALOT
  rationale: Literally 'according to this word/thing.' In this narrative context it
    refers back to the content of their prior invitation, so 'with this same message'
    communicates the referential force naturally in English while preserving the repetition
    marked by the phrase.
- source_word: אַרְבַּע פְּעָמִים
  chosen: four times
  lexicon: HALOT
  rationale: A straightforward idiom meaning repeated occurrence on four occasions.
- source_word: וָאָשִׁיב
  chosen: and I answered
  alternatives:
  - and I replied
  - and I sent back an answer
  lexicon: HALOT
  rationale: The Hiphil of שוב can mean 'cause to return' and in correspondence contexts
    'return an answer.' 'I answered' is idiomatic English and fits the communicative
    setting.
- source_word: אוֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct object pronoun referring to the senders or their representatives.
- source_word: כַּדָּבָר הַזֶּה
  chosen: in the same way
  alternatives:
  - with this same message
  - according to this word
  lexicon: HALOT
  rationale: 'The repeated Hebrew phrase likely points to Nehemiah''s repeated response
    matching his earlier refusal. English style favors slight variation here: ''in
    the same way'' preserves the sense of repeated identical response without awkward
    repetition.'
