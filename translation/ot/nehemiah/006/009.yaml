id: NEH.6.9
reference: Nehemiah 6:9
source:
  edition: WLC
  text: כִּ֣י כֻלָּ֗/ם מְיָֽרְאִ֤ים אוֹתָ֨/נוּ֙ לֵ/אמֹ֔ר יִרְפּ֧וּ יְדֵי/הֶ֛ם מִן
    הַ/מְּלָאכָ֖ה וְ/לֹ֣א תֵעָשֶׂ֑ה וְ/עַתָּ֖ה חַזֵּ֥ק אֶת יָדָֽ/י־־׃
translation:
  text: For all of them were trying to frighten us, saying, “Their hands will drop
    from the work, and it will not be done.” But now, strengthen my hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their hands will become weak from the work.' The Hebrew idiom literally
      speaks of hands slackening or dropping.
    reason: lexical_alternative
  - marker: b
    text: 'The final clause is a brief prayer: ''But now, strengthen my hands.'' Some
      have understood it differently, but the Hebrew vocalization supports a direct
      appeal to God.'
    reason: alternative_reading
lexical_decisions:
- source_word: מְיָרְאִים
  chosen: were trying to frighten
  alternatives:
  - were making afraid
  - were intimidating
  lexicon: HALOT
  rationale: The participle of ירא in the Hiphil conveys causing fear. 'Trying to
    frighten' captures the ongoing, purposive sense in context better than a stative
    English rendering.
- source_word: אוֹתָנוּ
  chosen: us
  alternatives:
  - me
  lexicon: HALOT
  rationale: The consonantal text reads first person common plural, fitting Nehemiah's
    identification with the community and workforce. Some translations smooth to singular
    because the prayer turns singular at the end, but the Hebrew object here is plural.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - thinking
  - with the thought
  lexicon: HALOT
  rationale: Standard quotative infinitive construct introducing the content of their
    intent or speech.
- source_word: יִרְפּוּ יְדֵיהֶם
  chosen: Their hands will drop
  alternatives:
  - their hands will become weak
  - their hands will slacken
  lexicon: HALOT
  rationale: The idiom literally speaks of hands slackening or dropping, a metaphor
    for loss of strength or resolve. 'Will drop' preserves the imagery while remaining
    intelligible.
- source_word: מִן הַמְּלָאכָה
  chosen: from the work
  alternatives:
  - from the task
  - from the labor
  lexicon: HALOT
  rationale: מְלָאכָה here refers to the rebuilding project. 'Work' is the most natural
    and sufficiently concrete rendering.
- source_word: וְלֹא תֵעָשֶׂה
  chosen: and it will not be done
  alternatives:
  - and it will not be completed
  - and it will not be made
  lexicon: HALOT
  rationale: The Niphal imperfect of עשה is passive/reflexive. 'It will not be done'
    is a close and natural rendering, referring to the work/project.
- source_word: וְעַתָּה
  chosen: But now
  alternatives:
  - And now
  - So now
  lexicon: HALOT
  rationale: Marks a turn from reporting the opponents' intent to Nehemiah's direct
    prayer. 'But now' makes the contrast explicit in good English.
- source_word: חַזֵּק אֶת יָדַי
  chosen: strengthen my hands
  alternatives:
  - make my hands strong
  - strengthen my resolve
  lexicon: HALOT
  rationale: The imperative plus 'my hands' is an idiom for giving strength for the
    task. The literal image should be preserved because it echoes the opponents' wish
    that hands would slacken.
