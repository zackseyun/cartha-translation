theological_decisions:
- issue: Nature of Shemaiah's prophetic claim
  chosen_reading: He was not sent by God, and his prophetic message was a false, hostile
    utterance prompted by payment from Tobiah and Sanballat.
  alternative_readings:
  - He merely spoke a prophecy concerning Nehemiah without the stronger adversarial
    nuance of 'against me'.
  rationale: The verse itself explicitly denies divine sending and links the prophecy
    to payment by Nehemiah's opponents. The translation preserves that theological
    and narrative judgment without adding further doctrinal claims about prophecy
    beyond the text.
  doctrine_reference: Translation philosophy §1, §3
