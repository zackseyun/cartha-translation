id: NEH.6.12
reference: Nehemiah 6:12
source:
  edition: WLC
  text: וָ/אַכִּ֕ירָ/ה וְ/הִנֵּ֥ה לֹֽא אֱלֹהִ֖ים שְׁלָח֑/וֹ כִּ֤י הַ/נְּבוּאָה֙ דִּבֶּ֣ר
    עָלַ֔/י וְ/טוֹבִיָּ֥ה וְ/סַנְבַלַּ֖ט שְׂכָרֽ/וֹ־׃
translation:
  text: Then I recognized, and behold, God had not sent him; rather, he had spoken
    the prophecy against me because Tobiah and Sanballat had hired him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he had spoken the prophecy concerning me.' The Hebrew preposition can
      be read more neutrally as 'concerning,' though the context favors 'against me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאַכִּירָה
  chosen: Then I recognized
  alternatives:
  - Then I realized
  - So I understood
  lexicon: HALOT
  rationale: From נכר in the Hifil/wayyiqtol-like form with 1cs sense, expressing
    Nehemiah's coming to discern the truth. 'Recognized' preserves the sense of perception/discernment
    without over-paraphrasing.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - indeed
  lexicon: HALOT
  rationale: הִנֵּה is a discourse particle drawing attention to what Nehemiah perceived.
    'Behold' is slightly formal but still readable and preserves the rhetorical force
    better than omitting it.
- source_word: לֹא אֱלֹהִים שְׁלָחוֹ
  chosen: God had not sent him
  alternatives:
  - it was not God who had sent him
  - God did not send him
  lexicon: HALOT
  rationale: The clause straightforwardly denies divine commissioning. Using past
    perfect ('had not sent') fits the narrative retrospect after Nehemiah's realization.
- source_word: כִּי
  chosen: rather
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the corrective explanation of the previous clause.
    'Rather' captures the adversative-explanatory force in natural English better
    than a wooden 'for'.
- source_word: הַנְּבוּאָה דִּבֶּר עָלַי
  chosen: he had spoken the prophecy against me
  alternatives:
  - he uttered the prophecy concerning me
  - he prophesied against me
  lexicon: HALOT
  rationale: Literally 'the prophecy he spoke concerning/against me.' Retaining 'spoken
    the prophecy' reflects the nominal הַנְּבוּאָה plus דִּבֶּר. 'Against me' fits
    the hostile context and the preceding attempt to frighten Nehemiah.
- source_word: עָלַי
  chosen: against me
  alternatives:
  - concerning me
  - about me
  lexicon: HALOT
  rationale: עַל can mean 'concerning,' but in this context of intimidation and false
    prophecy, 'against me' best conveys the adversarial sense.
- source_word: וְטוֹבִיָּה וְסַנְבַלַּט
  chosen: Tobiah and Sanballat
  rationale: Personal names are transliterated per translation philosophy.
- source_word: שְׂכָרוֹ
  chosen: had hired him
  alternatives:
  - had paid him
  - had bribed him
  lexicon: HALOT
  rationale: From שׂכר 'to hire/wage.' 'Had hired him' is the most direct rendering.
    'Bribed' is interpretive and stronger than the lexical evidence requires, though
    the context implies corrupt intent.
