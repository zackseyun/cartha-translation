id: NEH.6.3
reference: Nehemiah 6:3
source:
  edition: WLC
  text: וָ/אֶשְׁלְחָ֨/ה עֲלֵי/הֶ֤ם מַלְאָכִים֙ לֵ/אמֹ֔ר מְלָאכָ֤ה גְדוֹלָה֙ אֲנִ֣י
    עֹשֶׂ֔ה וְ/לֹ֥א אוּכַ֖ל לָ/רֶ֑דֶת לָ֣/מָּה תִשְׁבַּ֤ת הַ/מְּלָאכָה֙ כַּ/אֲשֶׁ֣ר
    אַרְפֶּ֔/הָ וְ/יָרַדְתִּ֖י אֲלֵי/כֶֽם׃
translation:
  text: So I sent messengers to them, saying, “I am doing a great work, and I cannot
    come down. Why should the work stop while I leave it and come down to you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Why should the work cease while I leave it and go down to you?'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁלְחָה
  chosen: So I sent
  alternatives:
  - Then I sent
  - And I sent
  lexicon: HALOT
  rationale: Wayyiqtol of שׁלח narrates the next action. 'So I sent' gives natural
    English narrative progression while preserving the sequential force.
- source_word: עֲלֵיהֶם
  chosen: to them
  alternatives:
  - against them
  - upon them
  lexicon: HALOT
  rationale: With שׁלח plus messengers, עַל commonly functions idiomatically for direction
    toward persons; 'to them' is the natural English equivalent here, not adversative
    'against them'.
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - envoys
  - angels
  lexicon: HALOT
  rationale: In this political/narrative context the word denotes human agents carrying
    a message, not heavenly beings. 'Messengers' is the clearest and most standard
    rendering.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - with this message
  - to say
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing the content of the message.
- source_word: מְלָאכָה גְדוֹלָה
  chosen: a great work
  alternatives:
  - an important work
  - a large project
  lexicon: HALOT
  rationale: מְלָאכָה is 'work/task/project'; 'great work' preserves both the lexical
    sense and Nehemiah's emphasis on the significance of the rebuilding effort.
- source_word: אֲנִי עֹשֶׂה
  chosen: I am doing
  alternatives:
  - I am engaged in
  - I am carrying out
  lexicon: HALOT
  rationale: The participle with pronoun expresses ongoing present activity. 'I am
    doing' is simple and faithful.
- source_word: וְלֹא אוּכַל לָרֶדֶת
  chosen: and I cannot come down
  alternatives:
  - and I am not able to go down
  - and I cannot go down
  lexicon: HALOT
  rationale: ירד literally means 'go down/come down.' Because the invitation is to
    leave Jerusalem and go to them, 'come down' fits the deictic perspective of the
    quoted speech in English and is idiomatic.
- source_word: לָמָּה תִשְׁבַּת הַמְּלָאכָה
  chosen: Why should the work stop
  alternatives:
  - Why should the work cease
  - Why should the work be interrupted
  lexicon: HALOT
  rationale: שׁבת here means cease/stop rather than Sabbath observance. 'Stop' is
    clear modern English; 'should' reflects the rhetorical question.
- source_word: כַּאֲשֶׁר
  chosen: while
  alternatives:
  - when
  - as soon as
  lexicon: HALOT
  rationale: 'In context it introduces the circumstance under which the work would
    stop. ''While'' best captures the temporal overlap: the work would cease during
    Nehemiah''s departure.'
- source_word: אַרְפֶּהָ
  chosen: I leave it
  alternatives:
  - I let go of it
  - I neglect it
  lexicon: HALOT
  rationale: From רפה in Hiphil, 'let drop/relax/leave off.' The 3fs suffix refers
    back to מְלָאכָה ('the work'). 'I leave it' is concise and idiomatic, preserving
    the idea of abandoning the task temporarily.
- source_word: וְיָרַדְתִּי אֲלֵיכֶם
  chosen: and come down to you
  alternatives:
  - and go down to you
  lexicon: HALOT
  rationale: Repeated ירד maintains the spatial movement downward from Jerusalem.
    'Come down to you' reads naturally in direct speech addressed to the recipients.
