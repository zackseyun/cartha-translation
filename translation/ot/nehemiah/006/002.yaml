id: NEH.6.2
reference: Nehemiah 6:2
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֨ח סַנְבַלַּ֤ט וְ/גֶ֨שֶׁם֙ אֵלַ֣/י לֵ/אמֹ֔ר לְכָ֞/ה וְ/נִֽוָּעֲדָ֥ה
    יַחְדָּ֛ו בַּ/כְּפִירִ֖ים בְּ/בִקְעַ֣ת אוֹנ֑וֹ וְ/הֵ֨מָּה֙ חֹֽשְׁבִ֔ים לַ/עֲשׂ֥וֹת
    לִ֖/י רָעָֽה׃
translation:
  text: So Sanballat and Geshem sent to me, saying, “Come, and let us meet together
    in the villages in the plain of Ono.” But they were planning to do me harm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly “in Chephirim,” taking the Hebrew as a place-name rather than
      “in the villages.”
    reason: alternative_reading
  - marker: b
    text: “Plain” may also be rendered “valley.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - sent word
  - sent a message
  lexicon: HALOT
  rationale: The singular verb with compound subject is idiomatic Hebrew; English
    naturally renders the action as plural with the compound subject, 'Sanballat and
    Geshem sent.' The object 'message' is implied by the following infinitive 'saying'
    and need not be supplied in the main text.
- source_word: סַנְבַלַּט וְגֶשֶׁם
  chosen: Sanballat and Geshem
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - with this message
  - to say
  lexicon: HALOT
  rationale: Standard rendering introducing direct discourse; preserves the Hebrew
    narrative formula without unnecessary expansion.
- source_word: לְכָה
  chosen: Come
  alternatives:
  - Come now
  - Go
  lexicon: HALOT
  rationale: Though from the verb 'go/walk,' this imperative in invitation idiom is
    best rendered 'Come' in English direct speech.
- source_word: וְנִוָּעֲדָה יַחְדָּו
  chosen: let us meet together
  alternatives:
  - let us meet
  - let us appoint a meeting together
  lexicon: HALOT
  rationale: The Niphal of יעד here conveys arranging or meeting by appointment. 'Meet
    together' preserves the reciprocal sense and the adverb יַחְדָּו.
- source_word: בַּכְּפִירִים
  chosen: in the villages
  alternatives:
  - in Chephirim
  - among the hamlets
  lexicon: HALOT
  rationale: The form is commonly understood as the common noun 'villages/hamlets'
    rather than a place-name. This fits the syntax with 'in the plain of Ono.' Because
    some take it as a toponym, that alternative is preserved in a footnote.
- source_word: בְּבִקְעַת אוֹנוֹ
  chosen: in the plain of Ono
  alternatives:
  - in the valley of Ono
  lexicon: HALOT
  rationale: בִּקְעָה denotes a broad valley/plain. 'Plain' best captures the topographical
    sense in accessible English; 'valley' is possible and worth noting as a lexical
    alternative.
- source_word: וְהֵמָּה חֹשְׁבִים
  chosen: But they were planning
  alternatives:
  - and they were thinking
  - while they intended
  lexicon: HALOT
  rationale: The clause is adversative in sense relative to their invitation, so English
    'But' makes the discourse relation clear. חֹשְׁבִים here means devising/intending,
    not mere cognition.
- source_word: לַעֲשׂוֹת לִי רָעָה
  chosen: to do me harm
  alternatives:
  - to do evil to me
  - to injure me
  lexicon: HALOT
  rationale: רָעָה in this context refers to intended harm against Nehemiah. 'Do me
    harm' is natural modern English and preserves the hostile intent without overinterpreting
    the exact form of harm.
