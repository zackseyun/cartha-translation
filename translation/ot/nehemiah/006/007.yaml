id: NEH.6.7
reference: Nehemiah 6:7
source:
  edition: WLC
  text: וְ/גַם נְבִיאִ֡ים הֶעֱמַ֣דְתָּ לִ/קְרֹא֩ עָלֶ֨י/ךָ בִֽ/ירוּשָׁלִַ֜ם לֵ/אמֹ֗ר
    מֶ֚לֶךְ בִּֽ/יהוּדָ֔ה וְ/עַתָּה֙ יִשָּׁמַ֣ע לַ/מֶּ֔לֶךְ כַּ/דְּבָרִ֣ים הָ/אֵ֑לֶּה
    וְ/עַתָּ֣ה לְכָ֔/ה וְ/נִֽוָּעֲצָ֖ה יַחְדָּֽו־׃ס
translation:
  text: And you have even appointed prophets to proclaim about you in Jerusalem, saying,
    ‘There is a king in Judah!’ And now these reports will be heard by the king. So
    now, come, and let us consult together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'these things' or 'such words.' The Hebrew can refer broadly to words,
      matters, or reports.
    reason: lexical_alternative
  - marker: b
    text: The quoted accusation is literally 'king in Judah,' a terse Hebrew report
      that implies a claim of kingship without explicitly naming Nehemiah in the quotation
      itself.
    reason: alternative_reading
lexical_decisions:
- source_word: וְגַם
  chosen: And you have even
  alternatives:
  - And also
  - Moreover, you have
  lexicon: HALOT
  rationale: Combines conjunction and additive particle with an emphatic nuance fitting
    the accusatory tone of the letter.
- source_word: נְבִיאִים
  chosen: prophets
  alternatives:
  - spokesmen
  lexicon: HALOT
  rationale: The ordinary sense is actual prophets; no contextual warrant exists to
    weaken it to generic messengers.
- source_word: הֶעֱמַדְתָּ
  chosen: have appointed
  alternatives:
  - have set up
  - have stationed
  lexicon: HALOT
  rationale: Hiphil of עמד here conveys causing persons to stand in an assigned role;
    'appointed' is idiomatic in English for assigning prophets to a public function.
- source_word: לִקְרֹא עָלֶיךָ
  chosen: to proclaim about you
  alternatives:
  - to call out concerning you
  - to make proclamation about you
  - to proclaim you
  lexicon: HALOT
  rationale: קרא with על can mean proclaim concerning someone. 'About you' preserves
    the preposition better than the smoother but more interpretive 'proclaim you.'
- source_word: בִירוּשָׁלַם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Straightforward locative rendering.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard quotation introducer.
- source_word: מֶלֶךְ בִּיהוּדָה
  chosen: There is a king in Judah!
  alternatives:
  - A king is in Judah!
  - King in Judah!
  - He is king in Judah!
  lexicon: HALOT
  rationale: The Hebrew is verbless and report-like. 'There is a king in Judah' best
    captures the content of the alleged proclamation without over-specifying that
    Nehemiah himself is explicitly named in the quote.
- source_word: וְעַתָּה יִשָּׁמַע לַמֶּלֶךְ
  chosen: And now these reports will be heard by the king
  alternatives:
  - And now it will be heard by the king
  - And now the king will hear
  lexicon: HALOT
  rationale: The passive/Niphal of שמע is retained with an English passive. 'These
    reports' is supplied from context because the following phrase specifies the content
    being reported.
- source_word: כַּדְּבָרִים הָאֵלֶּה
  chosen: these reports
  alternatives:
  - these things
  - such words
  - these matters
  lexicon: HALOT
  rationale: דברים can mean words, matters, or reports. In this political context,
    'reports' communicates the sense of allegations reaching the Persian king.
- source_word: וְעַתָּה לְכָה
  chosen: So now, come
  alternatives:
  - And now, come
  - Now then, come
  lexicon: HALOT
  rationale: Imperative invitation with discourse transition; 'So now' reflects the
    rhetorical move from accusation to proposed meeting.
- source_word: וְנִוָּעֲצָה
  chosen: and let us consult
  alternatives:
  - and let us take counsel
  - and let us confer
  lexicon: HALOT
  rationale: Niphal cohortative/volitional form of יָעַץ expresses mutual deliberation.
    'Consult' is readable modern English while preserving the formal sense.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - with one another
  lexicon: HALOT
  rationale: Adverb of joint action; 'together' is the natural English equivalent.
