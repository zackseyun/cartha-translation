theological_decisions:
- issue: Nature of the accusation about kingship
  chosen_reading: Render the alleged proclamation as an accusation of a royal claim
    without explicitly inserting Nehemiah's name into the quoted words.
  alternative_readings:
  - '''You are king in Judah!'''
  - '''Nehemiah is king in Judah!'''
  rationale: 'The Hebrew quote is terse and verbless: ''king in Judah.'' The surrounding
    context makes Nehemiah the target, but the text itself does not explicitly name
    him within the quotation. The translation preserves the accusation''s force without
    adding detail not present in the source.'
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never paraphrase beyond what the source text warrants.'
