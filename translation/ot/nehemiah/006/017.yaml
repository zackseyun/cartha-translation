id: NEH.6.17
reference: Nehemiah 6:17
source:
  edition: WLC
  text: גַּ֣ם בַּ/יָּמִ֣ים הָ/הֵ֗ם מַרְבִּ֞ים חֹרֵ֤י יְהוּדָה֙ אִגְּרֹ֣תֵי/הֶ֔ם הוֹלְכ֖וֹת
    עַל טוֹבִיָּ֑ה וַ/אֲשֶׁ֥ר לְ/טוֹבִיָּ֖ה בָּא֥וֹת אֲלֵי/הֶֽם׀־׃
translation:
  text: Also, in those days the nobles of Judah were sending many letters to Tobiah,
    and those from Tobiah were coming to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'their letters were going to Tobiah, and those belonging
      to Tobiah were coming to them.' The second clause likely implies 'letters' from
      the parallel first clause.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Also
  alternatives:
  - Moreover
  - Even
  lexicon: HALOT
  rationale: Introduces an additional circumstance connected to the surrounding narrative;
    'Also' is natural modern English and preserves the additive force.
- source_word: בַּיָּמִים הָהֵם
  chosen: in those days
  alternatives:
  - at that time
  lexicon: HALOT
  rationale: A standard temporal expression. 'In those days' is idiomatic and sufficiently
    formal.
- source_word: מַרְבִּים
  chosen: were sending many
  alternatives:
  - multiplied
  - sent many
  lexicon: HALOT
  rationale: With the following object 'their letters' and participial construction,
    the sense is iterative/frequentative rather than a bare stative 'were many.' Rendering
    as 'were sending many' captures ongoing repeated action in context.
- source_word: חֹרֵי יְהוּדָה
  chosen: the nobles of Judah
  alternatives:
  - the officials of Judah
  - the free men of Judah
  lexicon: HALOT
  rationale: In Nehemiah this term refers to socially prominent leaders/aristocrats.
    'Nobles' best fits the political-social context.
- source_word: אִגְּרֹתֵיהֶם
  chosen: letters
  alternatives:
  - their letters
  - dispatches
  lexicon: HALOT
  rationale: The possessive is implicit in English once the direction is stated; 'letters'
    is the natural rendering of the noun for written correspondence.
- source_word: הוֹלְכוֹת עַל טוֹבִיָּה
  chosen: to Tobiah
  alternatives:
  - were going to Tobiah
  - were being sent to Tobiah
  lexicon: HALOT
  rationale: Literally 'were going upon/to Tobiah,' an idiom for correspondence being
    sent to someone. 'To Tobiah' avoids awkward literalism while preserving the destination.
- source_word: וַאֲשֶׁר לְטוֹבִיָּה
  chosen: those from Tobiah
  alternatives:
  - those belonging to Tobiah
  - what was Tobiah's
  lexicon: HALOT
  rationale: The relative construction refers elliptically to letters originating
    with Tobiah. 'Those from Tobiah' makes the implied noun clear in English from
    the parallelism.
- source_word: בָּאוֹת אֲלֵיהֶם
  chosen: were coming to them
  alternatives:
  - were arriving to them
  - came to them
  lexicon: HALOT
  rationale: Participial form indicates ongoing/repeated action; 'were coming to them'
    mirrors the reciprocal correspondence and matches the narrative flow.
