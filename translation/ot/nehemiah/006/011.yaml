theological_decisions:
- issue: Implication of entering the temple
  chosen_reading: Nehemiah rejects entering the temple as an illegitimate act for
    him, not merely as a tactical refusal.
  alternative_readings:
  - Nehemiah simply refuses to hide there without explicit cultic implication
  rationale: In context (cf. Neh 6:10–13), the proposal appears designed to make Nehemiah
    sin and discredit himself. Rendering הֵיכָל as 'temple' in the main text keeps
    the statement broad, while the footnote preserves the likely cultic significance
    without overloading the translation.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it); §6 (readable modern English)
