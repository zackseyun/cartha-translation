id: NEH.6.11
reference: Nehemiah 6:11
source:
  edition: WLC
  text: וָ/אֹמְרָ֗/ה הַ/אִ֤ישׁ כָּמ֨וֹ/נִי֙ יִבְרָ֔ח וּ/מִ֥י כָמ֛וֹ/נִי אֲשֶׁר יָב֥וֹא
    אֶל הַ/הֵיכָ֖ל וָ/חָ֑י לֹ֖א אָבֽוֹא־־׃
translation:
  text: But I said, “Should a man like me flee? And who is like me that he should
    go into the temple and live? I will not go in.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sanctuary.' The point is likely not merely hiding indoors but entering
      a restricted temple area in a way that would be improper for Nehemiah, which
      explains the force of 'and live.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמְרָה
  chosen: But I said
  alternatives:
  - And I said
  - So I said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'But' fits the adversative
    sense in context, since Nehemiah is rejecting the proposal just made to him.
- source_word: הָאִישׁ
  chosen: a man
  alternatives:
  - the man
  - someone
  lexicon: HALOT
  rationale: Used generically in the rhetorical question, not to identify a specific
    male individual. 'A man' preserves the singular masculine form and the dignity/honor
    nuance of Nehemiah's self-reference.
- source_word: כָּמוֹנִי
  chosen: like me
  alternatives:
  - such as I
  - a man like me
  lexicon: HALOT
  rationale: Idiomatic comparison expressing Nehemiah's status and calling. Rendered
    naturally in English while preserving the rhetorical force.
- source_word: יִבְרָח
  chosen: flee
  alternatives:
  - run away
  - take flight
  lexicon: HALOT
  rationale: The verb denotes fleeing in fear or retreat. 'Flee' best preserves the
    moral and rhetorical force of Nehemiah's refusal.
- source_word: וּמִי כָמוֹנִי
  chosen: And who is like me
  alternatives:
  - And who, being like me
  - Who is there like me
  lexicon: HALOT
  rationale: Retains the rhetorical parallelism with the first clause and preserves
    the emphatic self-reference.
- source_word: אֲשֶׁר יָבוֹא
  chosen: that he should go
  alternatives:
  - who would go
  - and enter
  lexicon: HALOT
  rationale: The relative clause is somewhat elliptical in Hebrew. 'That he should
    go' captures the rhetorical, almost incredulous force rather than a simple future
    statement.
- source_word: הַהֵיכָל
  chosen: the temple
  alternatives:
  - the sanctuary
  - the nave/temple hall
  lexicon: HALOT
  rationale: הֵיכָל here refers to the temple building/sanctuary area. 'Temple' is
    the clearest natural English rendering; 'sanctuary' is possible but less immediately
    accessible. The cultic restriction implied by the context is preserved in a footnote.
- source_word: וָחָי
  chosen: and live
  alternatives:
  - and survive
  - so as to live
  lexicon: HALOT
  rationale: 'The clause expresses the supposed result of entering: preservation of
    life. ''And live'' is formally close and idiomatic enough in English.'
- source_word: לֹא אָבוֹא
  chosen: I will not go in
  alternatives:
  - I will not enter
  - I am not going in
  lexicon: HALOT
  rationale: The first-person verb repeats the entry idea from the prior clause. 'Go
    in' is natural English and preserves the spatial force of entering the temple.
