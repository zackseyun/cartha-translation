id: NEH.6.13
reference: Nehemiah 6:13
source:
  edition: WLC
  text: לְמַ֤עַן שָׂכוּר֙ ה֔וּא לְמַֽעַן אִירָ֥א וְ/אֶֽעֱשֶׂה כֵּ֖ן וְ/חָטָ֑אתִי וְ/הָיָ֤ה
    לָ/הֶם֙ לְ/שֵׁ֣ם רָ֔ע לְמַ֖עַן יְחָֽרְפֽוּ/נִי־־׃פ
translation:
  text: 'He was hired for this purpose: that I should become afraid and act that way
    and sin, so that they would have grounds for an evil report, in order that they
    might reproach me.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He was paid for this' or 'He was bribed for this.' The Hebrew participle
      שָׂכוּר most directly means 'hired' or 'paid'; 'bribed' makes the corrupt intent
      more explicit.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and it would be to them for an evil name.' The phrase likely
      means that Nehemiah's sin would give his enemies material for slander or a bad
      reputation to attach to him.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  chosen: for this purpose
  alternatives:
  - so that
  - in order that
  lexicon: HALOT
  rationale: The verse uses לְמַעַן three times to mark purpose/result. Rendering
    the first instance as 'for this purpose' gives clear discourse force in English
    and avoids repetitive monotony while preserving purposive sense.
- source_word: שָׂכוּר
  chosen: hired
  alternatives:
  - bribed
  - paid
  lexicon: HALOT
  rationale: The passive participial form means 'hired' or 'paid.' 'Hired' best matches
    the plain lexical sense while allowing the context to imply corrupt payment without
    overtranslating to 'bribed' in the main text.
- source_word: הוּא
  chosen: he
  lexicon: HALOT
  rationale: 'Explicit pronoun retained for emphasis: Nehemiah is identifying Shemaiah
    as the one who had been hired.'
- source_word: אִירָא
  chosen: I should become afraid
  alternatives:
  - I would fear
  - I might be afraid
  lexicon: HALOT
  rationale: The imperfect after לְמַעַן expresses intended result. 'Should become
    afraid' captures the intended effect on Nehemiah rather than a simple stative
    description.
- source_word: וְאֶעֱשֶׂה כֵן
  chosen: and act that way
  alternatives:
  - and do so
  - and act accordingly
  lexicon: HALOT
  rationale: The idiom literally means 'and I would do thus/so.' 'Act that way' is
    natural modern English and makes clear that the feared action is the improper
    conduct proposed in context.
- source_word: וְחָטָאתִי
  chosen: and sin
  alternatives:
  - and I would sin
  - and thereby sin
  lexicon: HALOT
  rationale: The perfect with prefixed conjunction follows the purposive sequence
    and is best represented in English as the intended consequence of the action.
    'And sin' is concise and clear.
- source_word: וְהָיָה לָהֶם לְשֵׁם רָע
  chosen: so that they would have grounds for an evil report
  alternatives:
  - and it would become for them a bad name
  - and it would be to them for an evil name
  - and they would have an evil name/report
  lexicon: HALOT
  rationale: The Hebrew expression is somewhat idiomatic. Literally, 'and it would
    be to them for an evil name.' In context, the sense is that Nehemiah's sin would
    furnish his opponents with damaging material against him. 'Grounds for an evil
    report' conveys the functional meaning without flattening the idiom entirely.
- source_word: שֵׁם רָע
  chosen: an evil report
  alternatives:
  - a bad name
  - evil repute
  - disgrace
  lexicon: HALOT
  rationale: While שֵׁם is literally 'name,' the collocation with רָע in this context
    points to bad reputation or defamatory report. 'Evil report' preserves the lexical
    link to 'name' more than 'disgrace' would, while sounding natural enough in context.
- source_word: יְחָרְפוּנִי
  chosen: they might reproach me
  alternatives:
  - they might taunt me
  - they might disgrace me
  - they might revile me
  lexicon: HALOT
  rationale: The verb חרף commonly denotes reproach, taunt, or scorn. 'Reproach me'
    is a strong but not overly colloquial rendering that fits the hostile public-shaming
    context.
