id: NEH.6.5
reference: Nehemiah 6:5
source:
  edition: WLC
  text: וַ/יִּשְׁלַח֩ אֵלַ֨/י סַנְבַלַּ֜ט כַּ/דָּבָ֥ר הַ/זֶּ֛ה פַּ֥עַם חֲמִישִׁ֖ית
    אֶֽת נַעֲר֑/וֹ וְ/אִגֶּ֥רֶת פְּתוּחָ֖ה בְּ/יָדֽ/וֹ־׃
translation:
  text: Then Sanballat sent his servant to me a fifth time in this way, with an open
    letter in his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with an unsealed letter in his hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: Then ... sent
  alternatives:
  - And ... sent
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative progression while preserving the sequential force of the Hebrew verb
    שלח, 'send'.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - against me
  lexicon: HALOT
  rationale: 'The preposition אֶל with 1cs suffix normally indicates direction toward
    the speaker. Here it marks the recipient of the messenger: ''to me.'''
- source_word: סַנְבַלַּט
  chosen: Sanballat
  rationale: Personal name is transliterated per translation philosophy.
- source_word: כַּדָּבָר הַזֶּה
  chosen: in this way
  alternatives:
  - according to this word
  - like this
  lexicon: HALOT
  rationale: The idiom literally means 'according to this matter/word' and refers
    back to the repeated pattern just described. 'In this way' is idiomatic English
    that preserves the anaphoric sense without wooden wording.
- source_word: פַּעַם חֲמִישִׁית
  chosen: a fifth time
  alternatives:
  - the fifth time
  lexicon: HALOT
  rationale: This Hebrew expression denotes repetition count. 'A fifth time' is the
    most natural English rendering in context.
- source_word: אֶת נַעֲרוֹ
  chosen: his servant
  alternatives:
  - his young man
  - his attendant
  lexicon: HALOT
  rationale: נַעַר can mean 'young man,' but in messenger/service contexts it often
    denotes a servant or attendant. Since the figure is functioning as Sanballat's
    emissary, 'his servant' best conveys role rather than age.
- source_word: וְאִגֶּרֶת פְּתוּחָה
  chosen: with an open letter
  alternatives:
  - and an open letter
  - with an unsealed letter
  lexicon: HALOT
  rationale: 'The conjunction plus the following prepositional phrase indicates accompaniment:
    the servant came carrying an open/unsealed letter. ''Open letter'' is concise
    and idiomatic, while preserving the public, unsealed nature of the document.'
- source_word: פְּתוּחָה
  chosen: open
  alternatives:
  - unsealed
  lexicon: HALOT
  rationale: The adjective literally means 'opened/open.' In context of a letter,
    'open' implies not sealed and thus publicly readable. The more interpretive 'unsealed'
    is preserved as an alternative.
- source_word: בְּיָדוֹ
  chosen: in his hand
  alternatives:
  - with him
  lexicon: HALOT
  rationale: The phrase is literal and vivid, indicating the letter was physically
    carried by the servant. 'In his hand' preserves the concrete imagery.
