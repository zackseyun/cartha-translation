id: NEH.6.19
reference: Nehemiah 6:19
source:
  edition: WLC
  text: גַּ֣ם טוֹבֹתָ֗י/ו הָי֤וּ אֹמְרִים֙ לְ/פָנַ֔/י וּ/דְבָרַ֕/י הָי֥וּ מוֹצִיאִ֖ים
    ל֑/וֹ אִגְּר֛וֹת שָׁלַ֥ח טוֹבִיָּ֖ה לְ/יָֽרְאֵֽ/נִי׃
translation:
  text: Also they kept speaking of his good deeds in my presence, and they kept reporting
    my words to him. Tobiah sent letters to frighten me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his good qualities' or 'the good things about him'; the Hebrew phrase
      is broader than deeds alone, but here it refers to favorable commendation of
      Tobiah before Nehemiah.
    reason: lexical_alternative
  - marker: b
    text: Literally 'they were bringing out my words to him,' an idiom for relaying
      or reporting Nehemiah's words to Tobiah.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Also
  alternatives:
  - Moreover
  - Even
  lexicon: HALOT
  rationale: Adds the final element in the narrative sequence; 'Also' is natural and
    preserves the additive force.
- source_word: טוֹבֹתָיו
  chosen: his good deeds
  alternatives:
  - his good things
  - his merits
  lexicon: HALOT
  rationale: Plural of 'good' used substantivally; in context it refers to favorable
    reports about Tobiah's actions or qualities. 'Good deeds' is idiomatic English
    and fits the political commendation being described.
- source_word: הָיוּ אֹמְרִים
  chosen: they kept speaking
  alternatives:
  - they were saying
  - they kept telling
  lexicon: HALOT
  rationale: Qal perfect of היה with participle often conveys ongoing past action.
    'Kept speaking' captures the iterative/continuous sense in readable English.
- source_word: לְפָנַי
  chosen: in my presence
  alternatives:
  - before me
  - to my face
  lexicon: HALOT
  rationale: Literally 'before me'; 'in my presence' communicates the sense clearly
    in modern English without losing the directness.
- source_word: וּדְבָרַי
  chosen: my words
  alternatives:
  - what I said
  - my matters
  lexicon: HALOT
  rationale: The noun דבר commonly means 'word(s)' or 'matter(s)'; here the context
    is speech being relayed, so 'my words' is the most direct rendering.
- source_word: הָיוּ מוֹצִיאִים לוֹ
  chosen: they kept reporting ... to him
  alternatives:
  - they were bringing out ... to him
  - they kept conveying ... to him
  lexicon: HALOT
  rationale: Hiphil of יצא literally 'bring out,' but in this context it means to
    carry information out to someone. 'Reporting' best captures the sense of relaying
    Nehemiah's words to Tobiah.
- source_word: אִגְּרוֹת
  chosen: letters
  alternatives:
  - written messages
  - epistles
  lexicon: HALOT
  rationale: Standard term for letters/correspondence; 'letters' is the natural modern
    equivalent.
- source_word: שָׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Simple narrative verb; 'sent' is straightforward and sufficient.
- source_word: לְיָרְאֵנִי
  chosen: to frighten me
  alternatives:
  - to make me afraid
  - to intimidate me
  lexicon: HALOT
  rationale: 'From ירא in a causative/resultative sense with lamed purpose: Tobiah''s
    purpose in sending the letters was to induce fear. ''To frighten me'' is concise
    and natural.'
