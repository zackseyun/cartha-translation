id: NEH.6.10
reference: Nehemiah 6:10
source:
  edition: WLC
  text: וַ/אֲנִי בָ֗אתִי בֵּ֣ית שְֽׁמַֽעְיָ֧ה בֶן דְּלָיָ֛ה בֶּן מְהֵֽיטַבְאֵ֖ל וְ/ה֣וּא
    עָצ֑וּר וַ/יֹּ֡אמֶר נִוָּעֵד֩ אֶל בֵּ֨ית הָ/אֱלֹהִ֜ים אֶל תּ֣וֹךְ הַֽ/הֵיכָ֗ל
    וְ/נִסְגְּרָה֙ דַּלְת֣וֹת הַ/הֵיכָ֔ל כִּ֚י בָּאִ֣ים לְ/הָרְגֶ֔/ךָ וְ/לַ֖יְלָה
    בָּאִ֥ים לְ/הָרְגֶֽ/ךָ־־־־־׃
translation:
  text: Then I went to the house of Shemaiah son of Delaiah, son of Mehetabel, who
    was confined, and he said, “Let us meet at the house of God, inside the temple,
    and let us shut the doors of the temple, for they are coming to kill you—yes,
    at night they are coming to kill you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “inside the sanctuary.” The Hebrew heikhal can refer specifically to
      the temple building or sanctuary, not merely the larger temple precincts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: Then I
  alternatives:
  - And I
  - Now I
  lexicon: HALOT
  rationale: The conjunction plus pronoun marks narrative continuation with slight
    emphasis on the subject. 'Then I' reads naturally in English narrative while preserving
    sequence better than a bare 'I.'
- source_word: בָאתִי
  chosen: went
  alternatives:
  - came
  - entered
  lexicon: HALOT
  rationale: Hebrew בוא often means 'come/go' depending on viewpoint. In English narrative
    from Nehemiah's perspective, 'went to the house' is the most natural idiom.
- source_word: בֵּית
  chosen: the house of
  alternatives:
  - the home of
  lexicon: HALOT
  rationale: Construct form with a personal name indicates residence/household. 'House
    of' is slightly more formal and fits the narrative register.
- source_word: שְׁמַעְיָה ... דְּלָיָה ... מְהֵיטַבְאֵל
  chosen: Shemaiah son of Delaiah, son of Mehetabel
  rationale: Personal names are transliterated per project philosophy; patronymics
    are rendered straightforwardly.
- source_word: וְהוּא עָצוּר
  chosen: who was confined
  alternatives:
  - who was shut in
  - who was restrained
  - while he was confined
  lexicon: HALOT
  rationale: עָצוּר can denote being shut up, confined, or restrained. 'Confined'
    preserves the ambiguity of why he was unable or unwilling to go out without over-interpreting
    whether this was ceremonial seclusion, self-imposed isolation, or detention.
- source_word: נִוָּעֵד
  chosen: Let us meet
  alternatives:
  - Let us meet by appointment
  - Let us assemble together
  lexicon: HALOT
  rationale: The Niphal/cohortative-like form expresses a proposal for a meeting.
    'Let us meet' is idiomatic and sufficient without importing the nuance of formal
    appointment.
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - God's house
  lexicon: HALOT
  rationale: This is the standard designation for the temple complex. Retaining 'house
    of God' preserves the Hebrew expression and prepares for the more specific term
    that follows.
- source_word: אֶל תּוֹךְ הַהֵיכָל
  chosen: inside the temple
  alternatives:
  - into the inner part of the temple
  - into the sanctuary
  lexicon: HALOT
  rationale: הֵיכָל here likely refers not merely to the broader temple complex but
    the temple building/sanctuary proper, especially since Nehemiah later objects
    that he should not enter. 'Inside the temple' communicates entry into the sacred
    structure without over-specifying technical cultic zones in the main text.
- source_word: וְנִסְגְּרָה דַּלְתוֹת הַהֵיכָל
  chosen: and let us shut the doors of the temple
  alternatives:
  - and let us close the temple doors
  lexicon: HALOT
  rationale: The cohortative sense continues the proposal. 'Shut the doors' preserves
    the verbal force and the concrete imagery.
- source_word: כִּי בָּאִים לְהָרְגֶךָ
  chosen: for they are coming to kill you
  alternatives:
  - for men are coming to kill you
  - for they are about to kill you
  lexicon: HALOT
  rationale: The plural participle has an indefinite subject. English naturally supplies
    'they.' The infinitive with suffix is rendered directly as intended purpose.
- source_word: וְלַיְלָה
  chosen: yes, at night
  alternatives:
  - indeed, at night
  - and at night
  - tonight
  lexicon: HALOT
  rationale: The phrase adds emphasis and timing. 'At night' is the plain sense; 'yes'
    reflects the rhetorical intensification better than a simple repeated 'and.' 'Tonight'
    would be too specific, since the Hebrew says 'at night,' not necessarily 'this
    very night,' though context points to imminence.
- source_word: בָּאִים לְהָרְגֶךָ
  chosen: they are coming to kill you
  alternatives:
  - they will come to kill you
  lexicon: HALOT
  rationale: The repetition is retained for urgency and rhetorical force rather than
    smoothed away.
