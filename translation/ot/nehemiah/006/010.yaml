theological_decisions:
- issue: Rendering הֵיכָל in a context involving restricted sacred space
  chosen_reading: temple
  alternative_readings:
  - sanctuary
  - inner sanctuary
  rationale: The narrative context in the following verse suggests entry into a restricted
    holy area, but the term itself can be rendered more broadly as 'temple' or more
    specifically as 'sanctuary.' The main text uses 'temple' for readability while
    a footnote preserves 'sanctuary' as a plausible, and contextually weighty, alternative.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
