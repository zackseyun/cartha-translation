id: NEH.6.1
reference: Nehemiah 6:1
source:
  edition: WLC
  text: וַ/יְהִ֣י כַ/אֲשֶׁ֣ר נִשְׁמַ֣ע לְ/סַנְבַלַּ֣ט וְ֠/טוֹבִיָּה וּ/לְ/גֶ֨שֶׁם
    הָֽ/עַרְבִ֜י וּ/לְ/יֶ֣תֶר אֹֽיְבֵ֗י/נוּ כִּ֤י בָנִ֨יתִי֙ אֶת הַ֣/חוֹמָ֔ה וְ/לֹא
    נ֥וֹתַר בָּ֖/הּ פָּ֑רֶץ גַּ֚ם עַד הָ/עֵ֣ת הַ/הִ֔יא דְּלָת֖וֹת לֹא הֶעֱמַ֥דְתִּי
    בַ/שְּׁעָרִֽים־־־־׃
translation:
  text: Now when Sanballat, Tobiah, Geshem the Arab, and the rest of our enemies heard
    that I had rebuilt the wall and that no breach was left in it—though up to that
    time I had not set up the doors in the gates—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I had built the wall.' The Hebrew verb is simply 'built'; 'rebuilt'
      is used here because the context is the restoration of an existing wall.
    reason: lexical_alternative
  - marker: b
    text: Or 'Geshem the Arabian.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַאֲשֶׁר
  chosen: Now when
  alternatives:
  - And it happened when
  - When
  lexicon: HALOT
  rationale: Introduces a new narrative development. 'Now when' preserves the Hebrew
    narrative transition without sounding wooden in English.
- source_word: נִשְׁמַע
  chosen: heard
  alternatives:
  - it was heard
  - came to hear of
  lexicon: HALOT
  rationale: The Niphal can be rendered passively ('it was heard'), but English idiom
    naturally supplies the personal subject with 'heard' after the named recipients.
- source_word: סַנְבַלַּט ... טוֹבִיָּה ... גֶשֶׁם הָעַרְבִי
  chosen: Sanballat, Tobiah, Geshem the Arab
  alternatives:
  - Geshem the Arabian
  rationale: Personal names are transliterated. הָעַרְבִי is an ethnic designation;
    'the Arab' is the most direct and natural rendering.
- source_word: יֶתֶר אֹיְבֵינוּ
  chosen: the rest of our enemies
  alternatives:
  - the remainder of our enemies
  - the rest of our foes
  lexicon: HALOT
  rationale: יֶתֶר means what remains or the rest. 'Enemies' matches the common sense
    of אֹיֵב here.
- source_word: כִּי
  chosen: that
  alternatives:
  - because
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the content of what they heard, so 'that' is preferable
    to causal renderings.
- source_word: בָנִיתִי אֶת־הַחוֹמָה
  chosen: I had rebuilt the wall
  alternatives:
  - I had built the wall
  - I rebuilt the wall
  lexicon: HALOT
  rationale: Given the context of restoration work on Jerusalem's existing fortifications,
    'rebuilt' better conveys the sense in idiomatic English, though the Hebrew verb
    itself is simply 'built.'
- source_word: לֹא נוֹתַר בָּהּ פָּרֶץ
  chosen: no breach was left in it
  alternatives:
  - there was no gap left in it
  - no opening remained in it
  lexicon: HALOT
  rationale: פָּרֶץ in wall-building context refers to a breach or gap. 'No breach
    was left in it' is both accurate and natural.
- source_word: גַּם עַד הָעֵת הַהִיא
  chosen: though up to that time
  alternatives:
  - however, up to that time
  - even until that time
  lexicon: HALOT
  rationale: גַּם here functions concessively in context, introducing an important
    qualification. 'Though up to that time' captures the sense smoothly in English.
- source_word: דְּלָתוֹת
  chosen: the doors
  alternatives:
  - door leaves
  - gates
  lexicon: HALOT
  rationale: Refers specifically to the gate doors, not the gates as structures. 'Doors'
    preserves the distinction.
- source_word: לֹא הֶעֱמַדְתִּי
  chosen: I had not set up
  alternatives:
  - I had not installed
  - I had not hung
  lexicon: HALOT
  rationale: The Hiphil of עמד here means to set in place or install. 'Set up' is
    broad enough to fit the context without over-specifying the method.
- source_word: בַּשְּׁעָרִים
  chosen: in the gates
  alternatives:
  - at the gates
  - in the gate openings
  lexicon: HALOT
  rationale: The doors are placed in the gate structures; 'in the gates' is the most
    direct rendering.
