id: NEH.6.18
reference: Nehemiah 6:18
source:
  edition: WLC
  text: כִּי רַבִּ֣ים בִּֽ/יהוּדָ֗ה בַּעֲלֵ֤י שְׁבוּעָה֙ ל֔/וֹ כִּי חָתָ֥ן ה֖וּא לִ/שְׁכַנְיָ֣ה
    בֶן אָרַ֑ח וִֽ/יהוֹחָנָ֣ן בְּנ֔/וֹ לָקַ֕ח אֶת בַּת מְשֻׁלָּ֖ם בֶּ֥ן בֶּֽרֶכְיָֽה־־־־־׃
translation:
  text: For many in Judah were bound by oath to him, because he was the son-in-law
    of Shecaniah son of Arah, and Jehohanan his son had taken the daughter of Meshullam
    son of Berechiah as his wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'many in Judah were possessors of an oath to him,' that
      is, they were obligated to him by oath.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'had taken the daughter of Meshullam son of Berechiah'; this is a
      standard idiom for marrying her.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבִּים בִּיהוּדָה
  chosen: many in Judah
  alternatives:
  - many of Judah
  - many in Judea
  lexicon: HALOT
  rationale: רַבִּים means 'many,' and בִּיהוּדָה is best rendered locatively here
    as 'in Judah,' referring to people within the province/community rather than the
    territory as such.
- source_word: בַּעֲלֵי שְׁבוּעָה לוֹ
  chosen: were bound by oath to him
  alternatives:
  - were sworn to him
  - were under oath to him
  - were oath-bound to him
  lexicon: HALOT
  rationale: The construct phrase literally means 'masters/possessors of an oath to
    him,' an idiom indicating persons obligated by oath. 'Were bound by oath to him'
    communicates the covenantal/political obligation naturally in English without
    flattening the force.
- source_word: כִּי
  chosen: For / because
  alternatives:
  - indeed
  - that
  lexicon: HALOT
  rationale: The first כִּי introduces the explanation for the previous verse ('For
    many...'); the second gives the reason ('because he was...'). English requires
    different but related renderings according to discourse function.
- source_word: חָתָן הוּא לִשְׁכַנְיָה
  chosen: he was the son-in-law of Shecaniah
  alternatives:
  - he was related by marriage to Shecaniah
  - he was a bridegroom to Shecaniah
  lexicon: HALOT
  rationale: חָתָן in kinship contexts commonly denotes 'son-in-law' or a marriage
    relation. Given the following marriage notice, 'son-in-law of Shecaniah' is the
    clearest and most idiomatic rendering.
- source_word: לָקַח אֶת בַּת
  chosen: had taken the daughter ... as his wife
  alternatives:
  - married the daughter of
  - took the daughter of
  lexicon: HALOT
  rationale: The Hebrew idiom לָקַח אֶת־בַּת in marriage contexts means to take a
    woman as wife. Rendering the marital sense explicitly avoids ambiguity in English
    while staying close to the source.
- source_word: וִיהוֹחָנָן בְּנוֹ
  chosen: and Jehohanan his son
  alternatives:
  - and his son Jehohanan
  lexicon: HALOT
  rationale: The phrase identifies Jehohanan as the son of the previously named Shecaniah.
    English can preserve the appositional structure naturally as 'and Jehohanan his
    son,' though the alternative word order is also possible.
- source_word: בַּת מְשֻׁלָּם בֶּן בֶּרֶכְיָה
  chosen: the daughter of Meshullam son of Berechiah
  alternatives:
  - Meshullam's daughter, the daughter of Berechiah's son
  lexicon: HALOT
  rationale: This is a straightforward patronymic chain. 'The daughter of Meshullam
    son of Berechiah' is the clearest English representation.
