id: NEH.6.14
reference: Nehemiah 6:14
source:
  edition: WLC
  text: זָכְרָ֧/ה אֱלֹהַ֛/י לְ/טוֹבִיָּ֥ה וּ/לְ/סַנְבַלַּ֖ט כְּ/מַעֲשָׂ֣י/ו אֵ֑לֶּה
    וְ/גַ֨ם לְ/נוֹעַדְיָ֤ה הַ/נְּבִיאָה֙ וּ/לְ/יֶ֣תֶר הַ/נְּבִיאִ֔ים אֲשֶׁ֥ר הָי֖וּ
    מְיָֽרְאִ֥ים אוֹתִֽ/י׃
translation:
  text: Remember Tobiah and Sanballat, my God, according to these deeds of theirs,
    and also Noadiah the prophetess and the rest of the prophets who were trying to
    make me afraid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who were seeking to intimidate me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זָכְרָה
  chosen: Remember
  alternatives:
  - Call to mind
  - Take note of
  lexicon: HALOT
  rationale: Imperative/jussive-like prayer address to God. In context Nehemiah appeals
    for divine remembrance in response to opponents' actions; 'Remember' is the natural
    English prayer form and preserves the directness of the Hebrew.
- source_word: אֱלֹהַי
  chosen: my God
  lexicon: HALOT
  rationale: Construct with 1cs suffix, a personal address to God. 'My God' is the
    standard and transparent rendering.
- source_word: לְטוֹבִיָּה וּלְסַנְבַלַּט
  chosen: Tobiah and Sanballat
  rationale: Personal names are transliterated per project philosophy. The prefixed
    ל marks the objects of remembrance after the imperative 'Remember' and is not
    separately represented in English.
- source_word: כְּמַעֲשָׂיו אֵלֶּה
  chosen: according to these deeds of theirs
  alternatives:
  - for these deeds of theirs
  - in keeping with these deeds of theirs
  lexicon: HALOT
  rationale: 'כְּ here indicates correspondence or measure: God is asked to remember
    them in accordance with what they have done. Because the suffix on מַעֲשָׂיו is
    singular while referring to two named opponents, English smooths to the distributive/plural
    sense ''of theirs,'' which best reflects the collective reference in context.'
- source_word: וְגַם
  chosen: and also
  alternatives:
  - also
  - and
  lexicon: HALOT
  rationale: Adds further persons to the prayer's scope. 'And also' preserves the
    additive force clearly.
- source_word: לְנוֹעַדְיָה הַנְּבִיאָה
  chosen: Noadiah the prophetess
  alternatives:
  - Noadiah the female prophet
  lexicon: HALOT
  rationale: Name transliterated; הַנְּבִיאָה specifically marks her as a female prophet.
    'Prophetess' is idiomatic modern English and preserves the gendered designation
    present in the Hebrew.
- source_word: וּלְיֶתֶר הַנְּבִיאִים
  chosen: and the rest of the prophets
  alternatives:
  - and the remainder of the prophets
  lexicon: HALOT
  rationale: יֶתֶר means what remains or the rest. 'The rest of the prophets' is natural
    English and accurately conveys the group beyond Noadiah.
- source_word: אֲשֶׁר הָיוּ מְיָרְאִים אוֹתִי
  chosen: who were trying to make me afraid
  alternatives:
  - who were frightening me
  - who were seeking to intimidate me
  lexicon: HALOT
  rationale: The participial construction with היה expresses ongoing action in past
    time. From ירא in the causative sense, the idea is not merely that Nehemiah felt
    fear but that they were acting to induce fear/intimidate him. 'Trying to make
    me afraid' captures both the causative nuance and the imperfective aspect.
