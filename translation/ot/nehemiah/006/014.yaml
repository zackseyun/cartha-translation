theological_decisions:
- issue: Tone of the prayer for divine remembrance against opponents
  chosen_reading: Render as an appeal for God to remember the opponents in accordance
    with their deeds, without expanding into explicit judgment language not stated
    in the Hebrew.
  alternative_readings:
  - Remember ... for judgment
  - Hold ... accountable
  rationale: The verse is an imprecatory-style prayer, but the Hebrew says only 'Remember
    ... according to these deeds.' English should preserve the moral seriousness without
    importing a fuller judicial formula absent from the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
