id: NEH.6.15
reference: Nehemiah 6:15
source:
  edition: WLC
  text: וַ/תִּשְׁלַם֙ הַֽ/חוֹמָ֔ה בְּ/עֶשְׂרִ֥ים וַ/חֲמִשָּׁ֖ה לֶ/אֱל֑וּל לַ/חֲמִשִּׁ֥ים
    וּ/שְׁנַ֖יִם יֽוֹם׃פ
translation:
  text: So the wall was finished on the twenty-fifth day of Elul, in fifty-two days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was completed.'
    reason: lexical_alternative
  - marker: b
    text: Elul is the sixth month of the Hebrew calendar.
    reason: cultural_note
lexical_decisions:
- source_word: וַתִּשְׁלַם
  chosen: was finished
  alternatives:
  - was completed
  - came to completion
  lexicon: HALOT
  rationale: From שלם in the qal/wayyiqtol with feminine singular subject ('the wall').
    An English passive best conveys the eventive sense with the wall as subject in
    natural English. 'Was finished' is idiomatic and suitably formal; 'was completed'
    is possible but slightly less natural here.
- source_word: הַחוֹמָה
  chosen: the wall
  lexicon: HALOT
  rationale: Definite noun referring to Jerusalem's wall in the immediate narrative
    context. 'Wall' is the straightforward lexical equivalent.
- source_word: בְּעֶשְׂרִים וַחֲמִשָּׁה
  chosen: on the twenty-fifth day
  alternatives:
  - on the twenty-fifth
  - on day twenty-five
  lexicon: HALOT
  rationale: 'The preposition with the cardinal numbers functions idiomatically as
    a date expression. English normally supplies ''day'' for clarity: ''on the twenty-fifth
    day.'''
- source_word: לֶאֱלוּל
  chosen: of Elul
  alternatives:
  - in Elul
  lexicon: HALOT
  rationale: Elul is a month name and should be transliterated rather than translated.
    In English date style, 'of Elul' fits naturally with 'the twenty-fifth day.'
- source_word: לַחֲמִשִּׁים וּשְׁנַיִם יוֹם
  chosen: in fifty-two days
  alternatives:
  - after fifty-two days
  - within fifty-two days
  lexicon: HALOT
  rationale: The lamed with the numeral phrase is best taken as indicating duration/resulting
    total time. 'In fifty-two days' is the most natural English rendering and matches
    the narrative sense that the project was completed within that span. 'After fifty-two
    days' could suggest mere sequence rather than duration.
