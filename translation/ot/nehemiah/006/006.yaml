id: NEH.6.6
reference: Nehemiah 6:6
source:
  edition: WLC
  text: כָּת֣וּב בָּ֗/הּ בַּ/גּוֹיִ֤ם נִשְׁמָע֙ וְ/גַשְׁמ֣וּ אֹמֵ֔ר אַתָּ֤ה וְ/הַ/יְּהוּדִים֙
    חֹשְׁבִ֣ים לִ/מְר֔וֹד עַל כֵּ֛ן אַתָּ֥ה בוֹנֶ֖ה הַ/חוֹמָ֑ה וְ/אַתָּ֗ה הֹוֶ֤ה לָ/הֶם֙
    לְ/מֶ֔לֶךְ כַּ/דְּבָרִ֖ים הָ/אֵֽלֶּה־׃
translation:
  text: It was written in it, “It is being reported among the nations—and Geshem says
    it—that you and the Jews are planning to rebel. Therefore you are rebuilding the
    wall, and according to these reports you are to become their king.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Gashmu'; many English versions render the name as 'Geshem.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּתוּב בָּהּ
  chosen: It was written in it
  alternatives:
  - It is written in it
  - Written in it was
  lexicon: HALOT
  rationale: Passive participial construction introducing the contents of the letter.
    Past English fits the narrative frame of a received letter better than a present-tense
    proverbial 'it is written.'
- source_word: בַּגּוֹיִם נִשְׁמָע
  chosen: It is being reported among the nations
  alternatives:
  - It is heard among the nations
  - A report is circulating among the nations
  lexicon: HALOT
  rationale: נשמע from שׁמע in the Niphal conveys something being heard/reported.
    'Reported' communicates circulating rumor more naturally in English while preserving
    the passive sense. 'Among the nations' keeps גוים in its broad ethnic-political
    sense, not specifically 'Gentiles' here.
- source_word: וְגַשְׁמוּ אֹמֵר
  chosen: and Geshem says it
  alternatives:
  - and Geshem says
  - and Gashmu says
  lexicon: HALOT
  rationale: The clause adds Geshem as corroborating the rumor. 'Says it' makes explicit
    in English that he is affirming the report. The name is rendered by the more familiar
    transliteration 'Geshem,' while preserving the consonantal form's relation in
    a footnote.
- source_word: חֹשְׁבִים לִמְרוֹד
  chosen: are planning to rebel
  alternatives:
  - are thinking to rebel
  - intend to rebel
  - are plotting rebellion
  lexicon: HALOT
  rationale: חשב + infinitive here denotes intention or plan. 'Planning to rebel'
    is idiomatic and preserves the accusation of deliberate revolt without over-intensifying
    to 'plotting'.
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - That is why
  lexicon: HALOT
  rationale: Marks the alleged inference from the accusation to the rebuilding activity.
    'Therefore' is concise and natural.
- source_word: בּוֹנֶה הַחוֹמָה
  chosen: you are rebuilding the wall
  alternatives:
  - you are building the wall
  lexicon: HALOT
  rationale: In Nehemiah's context the wall is being restored, so 'rebuilding' better
    reflects the situational sense of בנה without departing from the core meaning.
- source_word: וְאַתָּה הֹוֶה לָהֶם לְמֶלֶךְ
  chosen: you are to become their king
  alternatives:
  - you will become their king
  - you are becoming their king
  - you would be their king
  lexicon: HALOT
  rationale: הוה with ל + noun can express becoming. In this hostile report, the sense
    is projected intention/result rather than simple present existence. 'Are to become'
    captures the alleged aim without overstating certainty.
- source_word: כַּדְּבָרִים הָאֵלֶּה
  chosen: according to these reports
  alternatives:
  - according to these words
  - in accordance with these matters
  - as these things say
  lexicon: HALOT
  rationale: דברים here refers to the content of the allegations/rumors just cited.
    'Reports' fits the epistolary accusation context better than the overly literal
    'words' while remaining faithful to the sense.
