id: NEH.4.16
reference: Nehemiah 4:16
source:
  edition: WLC
  text: גַּ֣ם בָּ/עֵ֤ת הַ/הִיא֙ אָמַ֣רְתִּי לָ/עָ֔ם אִ֣ישׁ וְ/נַעֲר֔/וֹ יָלִ֖ינוּ
    בְּ/ת֣וֹךְ יְרוּשָׁלִָ֑ם וְ/הָֽיוּ לָ֧/נוּ הַ/לַּ֛יְלָה מִשְׁמָ֖ר וְ/הַ/יּ֥וֹם
    מְלָאכָֽה־׃
translation:
  text: Also at that time I said to the people, “Let each man and his young servant
    spend the night within Jerusalem, so that they may be a guard for us by night
    and workers by day.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “each man and his servant”; the Hebrew נַעַר can mean a youth, servant,
      attendant, or subordinate worker depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or “that they might be a watch for us at night and for work by day.”
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Also
  alternatives:
  - Moreover
  - Even
  lexicon: HALOT
  rationale: Discourse particle linking this instruction with the preceding measures;
    'Also' is natural modern English and preserves the additive force.
- source_word: בָּעֵת הַהִיא
  chosen: at that time
  alternatives:
  - in that time
  - at that same time
  lexicon: HALOT
  rationale: Idiomatic temporal expression. 'At that time' is the standard English
    equivalent without unnecessary stiffness.
- source_word: אָמַרְתִּי לָעָם
  chosen: I said to the people
  alternatives:
  - I told the people
  lexicon: HALOT
  rationale: אָמַר commonly means 'say.' 'Said to the people' stays closer to the
    Hebrew while remaining readable.
- source_word: אִישׁ וְנַעֲרוֹ
  chosen: each man and his young servant
  alternatives:
  - each man and his servant
  - each man and his young man
  - each man and his attendant
  lexicon: HALOT
  rationale: אִישׁ distributively with singular force is well represented by 'each
    man.' נַעַר can denote a youth, servant, attendant, or subordinate. In this labor-and-guard
    context, 'young servant' preserves both the age nuance and the subordinate relationship
    better than the flatter 'servant' or the ambiguous 'young man.'
- source_word: יָלִינוּ
  chosen: spend the night
  alternatives:
  - lodge
  - stay overnight
  lexicon: HALOT
  rationale: From לון/לין, to lodge or remain overnight. 'Spend the night' is clear
    contemporary English and fits the military/work context.
- source_word: בְּתוֹךְ יְרוּשָׁלִָם
  chosen: within Jerusalem
  alternatives:
  - inside Jerusalem
  - in the midst of Jerusalem
  lexicon: HALOT
  rationale: בְּתוֹךְ marks location within the city. 'Within Jerusalem' is concise
    and suitably formal.
- source_word: וְהָיוּ לָנוּ
  chosen: so that they may be for us
  alternatives:
  - and they shall be for us
  - and let them be for us
  lexicon: HALOT
  rationale: Though formally a waw + qatal, in context it expresses the intended result/purpose
    of the command. Rendering with 'so that they may be for us' communicates the function
    naturally in English.
- source_word: הַלַּיְלָה מִשְׁמָר
  chosen: a guard for us by night
  alternatives:
  - a watch for us at night
  - night watch for us
  lexicon: HALOT
  rationale: מִשְׁמָר denotes guard duty, watch, or place of guarding. 'A guard for
    us by night' captures the protective function and balances the parallel with daytime
    labor.
- source_word: וְהַיּוֹם מְלָאכָה
  chosen: workers by day
  alternatives:
  - labor by day
  - work by day
  - for work by day
  lexicon: HALOT
  rationale: 'מְלָאכָה is ''work/labor.'' Because the subject is the people themselves,
    English idiom prefers a personal rendering: they are ''workers by day.'' This
    preserves the night/day parallel more naturally than the abstract ''work by day.'''
