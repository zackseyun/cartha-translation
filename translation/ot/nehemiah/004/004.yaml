id: NEH.4.4
reference: Nehemiah 4:4
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוּדָ֗ה כָּשַׁל֙ כֹּ֣חַ הַ/סַּבָּ֔ל וְ/הֶ/עָפָ֖ר הַרְבֵּ֑ה וַ/אֲנַ֨חְנוּ֙
    לֹ֣א נוּכַ֔ל לִ/בְנ֖וֹת בַּ/חוֹמָֽה׃
translation:
  text: And Judah said, “The strength of the burden-bearer has failed, and there is
    much rubble; and we are not able to build on the wall.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the people of Judah said.' The singular proper name 'Judah' likely represents
      the community collectively.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'dust'; in context, likely the debris or rubble from the ruined city.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוּדָה
  chosen: Judah
  alternatives:
  - the people of Judah
  - Judahites
  lexicon: HALOT
  rationale: Proper name is transliterated per project philosophy. In context it likely
    stands metonymically for the community of Judah, but the Hebrew singular proper
    noun is retained as 'Judah' rather than expanding interpretively in the main text.
- source_word: כָּשַׁל
  chosen: has failed
  alternatives:
  - stumbles
  - has become weak
  - has given way
  lexicon: HALOT
  rationale: The verb denotes stumbling or failing. With 'strength' as subject in
    English, 'has failed' is the most natural and accurate rendering of the idiom
    without over-paraphrase.
- source_word: כֹּחַ
  chosen: strength
  alternatives:
  - power
  - force
  lexicon: HALOT
  rationale: Standard rendering for physical capacity here; the context is labor exhaustion,
    so 'strength' best fits.
- source_word: הַסַּבָּל
  chosen: the burden-bearer
  alternatives:
  - the porter
  - the laborer
  - the carrier
  lexicon: HALOT
  rationale: The noun refers specifically to one who carries loads. 'Burden-bearer'
    preserves that concrete sense better than the broader 'laborer.' Singular is retained
    as in Hebrew, likely collective in force.
- source_word: הֶעָפָר
  chosen: rubble
  alternatives:
  - dust
  - loose earth
  - debris
  lexicon: HALOT
  rationale: Although the noun commonly means 'dust' or 'earth,' in a wall-rebuilding
    context it refers to the accumulated debris from ruins. 'Rubble' communicates
    the contextual sense in natural English.
- source_word: הַרְבֵּה
  chosen: there is much
  alternatives:
  - is abundant
  - is great
  lexicon: HALOT
  rationale: This adverb/adjectival form indicates abundance. 'There is much' yields
    idiomatic English with the preceding noun phrase.
- source_word: לֹא נוּכַל
  chosen: we are not able
  alternatives:
  - we cannot
  - we will not be able
  lexicon: HALOT
  rationale: Expresses inability rather than unwillingness. 'We are not able' is slightly
    more formal and transparent to the Hebrew than contracted 'we cannot,' while remaining
    natural.
- source_word: לִבְנוֹת
  chosen: to build
  alternatives:
  - to rebuild
  lexicon: HALOT
  rationale: The infinitive is simply 'to build.' Although 'rebuild' fits the broader
    context, the Hebrew verb itself does not explicitly mark repetition, so 'build'
    is preferred.
- source_word: בַּחוֹמָה
  chosen: on the wall
  alternatives:
  - the wall
  - at the wall
  lexicon: HALOT
  rationale: The preposition ב here is best represented as 'on' in the sense of working
    on the wall. 'Build the wall' would smooth the English but omit the prepositional
    nuance present in the Hebrew.
