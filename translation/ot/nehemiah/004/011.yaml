id: NEH.4.11
reference: Nehemiah 4:11
source:
  edition: WLC
  text: הַ/בּוֹנִ֧ים בַּ/חוֹמָ֛ה וְ/הַ/נֹּשְׂאִ֥ים בַּ/סֶּ֖בֶל עֹמְשִׂ֑ים בְּ/אַחַ֤ת
    יָד/וֹ֙ עֹשֶׂ֣ה בַ/מְּלָאכָ֔ה וְ/אַחַ֖ת מַחֲזֶ֥קֶת הַ/שָּֽׁלַח׃
translation:
  text: The builders on the wall, and those who carried burdens, loaded themselves
    so that with one hand each did the work, and with the other held his weapon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those bearing loads were loaded'; the Hebrew participle עֹמְשִׂים is
      rare, and its precise nuance is difficult, but the sense is that the laborers
      handled materials while remaining armed.
    reason: lexical_alternative
  - marker: b
    text: Hebrew הַשָּׁלַח may refer more specifically to a spear, dart, or other
      weapon.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבּוֹנִים
  chosen: the builders
  alternatives:
  - those building
  lexicon: HALOT
  rationale: Qal participle plural of בנה used substantivally; 'the builders' is natural
    English and preserves the occupational sense.
- source_word: בַּחוֹמָה
  chosen: on the wall
  alternatives:
  - at the wall
  lexicon: HALOT
  rationale: חוֹמָה is 'wall'; with ב here, 'on the wall' fits the construction context
    better than the more static 'at the wall.'
- source_word: וְהַנֹּשְׂאִים בַּסֶּבֶל
  chosen: those who carried burdens
  alternatives:
  - those bearing loads
  - the burden-bearers
  lexicon: HALOT
  rationale: נשא with סבל refers to carrying loads/materials. 'Burdens' is idiomatic
    and concrete in context.
- source_word: עֹמְשִׂים
  chosen: loaded themselves
  alternatives:
  - were loading
  - carried loads
  lexicon: HALOT
  rationale: This rare participial form is commonly understood in context as referring
    to being loaded/encumbered with materials. 'Loaded themselves' best connects the
    carriers with the following description of one-handed labor.
- source_word: בְּאַחַת יָדוֹ
  chosen: with one hand
  alternatives:
  - with one of his hands
  lexicon: HALOT
  rationale: The singular suffix is distributive in context, referring to each worker
    individually. English idiom naturally renders this distributively as 'with one
    hand.'
- source_word: עֹשֶׂה בַמְּלָאכָה
  chosen: did the work
  alternatives:
  - worked
  - was doing the work
  lexicon: HALOT
  rationale: עשה + מלאכה means performing the labor/task. 'Did the work' preserves
    the verbal structure while remaining natural.
- source_word: וְאַחַת מַחֲזֶקֶת
  chosen: and with the other held
  alternatives:
  - and the other was holding
  - while the other hand held
  lexicon: HALOT
  rationale: 'The feminine singular participle agrees with the implied ''hand.'' English
    must supply this sense for clarity: the other hand was occupied in holding a weapon.'
- source_word: הַשָּׁלַח
  chosen: his weapon
  alternatives:
  - the missile
  - the dart
  - the spear
  lexicon: HALOT
  rationale: שׁלח can denote a weapon or missile. In this context of defensive readiness
    during building, the broader 'weapon' avoids over-specifying the exact implement
    while conveying the sense.
