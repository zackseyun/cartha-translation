id: NEH.4.7
reference: Nehemiah 4:7
source:
  edition: WLC
  text: וָֽ/אַעֲמִ֞יד מִֽ/תַּחְתִּיּ֧וֹת לַ/מָּק֛וֹם מֵ/אַחֲרֵ֥י לַ/חוֹמָ֖ה ב/צחחיים
    וָֽ/אַעֲמִ֤יד אֶת הָ/עָם֙ לְ/מִשְׁפָּח֔וֹת עִם חַרְבֹתֵי/הֶ֛ם רָמְחֵי/הֶ֖ם וְ/קַשְּׁתֹתֵי/הֶֽם־־׃
translation:
  text: Then I stationed men in the lowest parts of the place, behind the wall, in
    the exposed areas; and I stationed the people by families, with their swords,
    their spears, and their bows.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the bare/open places.' The Hebrew term is rare and may refer to exposed
      or uncovered sections vulnerable to attack.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאַעֲמִיד
  chosen: I stationed
  alternatives:
  - I set
  - I posted
  - I made stand
  lexicon: HALOT
  rationale: Hiphil of עמד here is causative, referring to placing people in defensive
    positions. 'Stationed' fits the military context better than the more wooden 'made
    stand' or the broader 'set.'
- source_word: מִתַּחְתִּיּוֹת
  chosen: the lowest parts
  alternatives:
  - the lower places
  - the low-lying areas
  - the uncovered lower parts
  lexicon: HALOT
  rationale: The plural adjective/noun from תחת denotes lower or lowest areas. In
    context of wall defense, it likely refers to low points or vulnerable lower sections
    of the site. 'Lowest parts' preserves the spatial sense without overinterpreting.
- source_word: לַמָּקוֹם
  chosen: of the place
  alternatives:
  - of the site
  - at the place
  lexicon: HALOT
  rationale: מקום is a general term for place/site. The construct-like English 'of
    the place' reflects the Hebrew sequence with the preceding term, while allowing
    the following locational phrases to specify where.
- source_word: מֵאַחֲרֵי לַחוֹמָה
  chosen: behind the wall
  alternatives:
  - at the rear of the wall
  - on the far side of the wall
  lexicon: HALOT
  rationale: The preposition expresses position at the back/rear of the wall. 'Behind
    the wall' is the most natural modern English rendering and suits the defensive
    arrangement.
- source_word: בצחחיים
  chosen: in the exposed areas
  alternatives:
  - in the bare places
  - in the open places
  - in the dry/barren places
  lexicon: HALOT
  rationale: This rare plural likely denotes bare, exposed, or open places. In the
    context of fortification and threat, 'exposed areas' best captures the tactical
    vulnerability implied, without reducing it merely to dryness or barrenness.
- source_word: וָאַעֲמִיד אֶת־הָעָם
  chosen: and I stationed the people
  alternatives:
  - and I set the people
  - and I posted the people
  lexicon: HALOT
  rationale: The repeated verb is retained in English to reflect the Hebrew repetition
    and the deliberate organization of defenses.
- source_word: לְמִשְׁפָּחוֹת
  chosen: by families
  alternatives:
  - according to their families
  - by clans
  lexicon: HALOT
  rationale: משפחות can mean family groups or clans. 'By families' is clear, natural,
    and preserves the social-unit organization without sounding overly technical.
- source_word: עִם חַרְבֹתֵיהֶם
  chosen: with their swords
  lexicon: HALOT
  rationale: חרב is the standard term for sword; no special nuance requires deviation.
- source_word: רָמְחֵיהֶם
  chosen: their spears
  alternatives:
  - their lances
  lexicon: HALOT
  rationale: רמח denotes spear/lance. 'Spears' is the more common and accessible English
    term in this military inventory.
- source_word: וְקַשְּׁתֹתֵיהֶם
  chosen: and their bows
  lexicon: HALOT
  rationale: קשת is 'bow'; the plural with suffix is straightforward. Retaining the
    triad of weapons reflects the Hebrew list faithfully.
