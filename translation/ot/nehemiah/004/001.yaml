id: NEH.4.1
reference: Nehemiah 4:1
source:
  edition: WLC
  text: וַ/יְהִ֣י כַ/אֲשֶׁ֣ר שָׁמַ֣ע סַנְבַלַּ֡ט וְ֠/טוֹבִיָּה וְ/הָ/עַרְבִ֨ים וְ/הָ/עַמֹּנִ֜ים
    וְ/הָ/אַשְׁדּוֹדִ֗ים כִּֽי עָלְתָ֤ה אֲרוּכָה֙ לְ/חֹמ֣וֹת יְרוּשָׁלִַ֔ם כִּי הֵחֵ֥לּוּ
    הַ/פְּרֻצִ֖ים לְ/הִסָּתֵ֑ם וַ/יִּ֥חַר לָ/הֶ֖ם מְאֹֽד־־׃
translation:
  text: Now when Sanballat and Tobiah and the Arabs and the Ammonites and the Ashdodites
    heard that the repair of Jerusalem’s walls had gone up, that the breaches had
    begun to be closed, they became very angry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the restoration of Jerusalem’s walls had advanced.' The Hebrew uses
      a term often associated with healing or restoration metaphorically for repair
      work.
    reason: lexical_alternative
  - marker: b
    text: Or 'the gaps' instead of 'the breaches.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַאֲשֶׁר
  chosen: Now when
  alternatives:
  - And it happened when
  - When
  lexicon: HALOT
  rationale: Narrative wayyiqtol plus temporal particle introduces a new scene. 'Now
    when' preserves the discourse shift in readable modern English without the wooden
    'and it happened.'
- source_word: שָׁמַע
  chosen: heard
  alternatives:
  - learned
  lexicon: HALOT
  rationale: Standard sense is auditory reception or receiving news. 'Heard' is the
    most direct and natural rendering in context.
- source_word: סַנְבַלַּט וְטוֹבִיָּה
  chosen: Sanballat and Tobiah
  rationale: Personal names are transliterated by standard English conventions per
    translation philosophy.
- source_word: הָעַרְבִים
  chosen: the Arabs
  alternatives:
  - the Arabians
  lexicon: HALOT
  rationale: Refers to the Arab peoples/groups. 'Arabs' is the clearest contemporary
    ethnonym; 'Arabians' is possible but less natural here.
- source_word: הָעַמֹּנִים
  chosen: the Ammonites
  lexicon: HALOT
  rationale: Standard gentilic for the people of Ammon.
- source_word: הָאַשְׁדּוֹדִים
  chosen: the Ashdodites
  alternatives:
  - the people of Ashdod
  lexicon: HALOT
  rationale: Gentilic from Ashdod. 'Ashdodites' is concise and standard, though the
    alternative is possible.
- source_word: עָלְתָה אֲרוּכָה
  chosen: the repair ... had gone up
  alternatives:
  - healing had gone up
  - restoration had advanced
  - the wall was being repaired
  lexicon: HALOT
  rationale: אֲרוּכָה can denote healing, restoration, or repair; with walls, it is
    metaphorically the restoration/repair work. 'Had gone up' preserves עָלְתָה ('went
    up/advanced') rather than flattening it entirely, while 'repair' fits the wall
    context.
- source_word: לְחֹמוֹת יְרוּשָׁלִַם
  chosen: of Jerusalem’s walls
  alternatives:
  - for the walls of Jerusalem
  - on Jerusalem’s walls
  lexicon: HALOT
  rationale: The lamed marks relation to the walls; in idiomatic English, 'the repair
    of Jerusalem’s walls' best expresses the construction.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here introduces reported content after 'heard,' so 'that' is preferable.
- source_word: הֵחֵלּוּ
  chosen: had begun
  alternatives:
  - began
  lexicon: HALOT
  rationale: Pluperfect-like English fits the sequence after 'heard that...' and smooths
    the reported circumstance.
- source_word: הַפְּרֻצִים
  chosen: the breaches
  alternatives:
  - the gaps
  - the broken places
  lexicon: HALOT
  rationale: Refers to breaks in the wall. 'Breaches' is the most precise architectural
    term in English.
- source_word: לְהִסָּתֵם
  chosen: to be closed
  alternatives:
  - to be stopped up
  - to be sealed
  lexicon: HALOT
  rationale: Niphal infinitive of סתם conveys being shut/closed up. 'Closed' is natural
    and accurate for breaches in a wall.
- source_word: וַיִּחַר לָהֶם מְאֹד
  chosen: they became very angry
  alternatives:
  - it burned to them greatly
  - they were exceedingly enraged
  lexicon: HALOT
  rationale: Although the verb is singular, the idiom with לָהֶם refers collectively
    to the listed opponents. 'They became very angry' renders the Hebrew idiom clearly
    in modern English.
