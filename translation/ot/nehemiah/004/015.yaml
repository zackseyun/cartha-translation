id: NEH.4.15
reference: Nehemiah 4:15
source:
  edition: WLC
  text: וַ/אֲנַ֖חְנוּ עֹשִׂ֣ים בַּ/מְּלָאכָ֑ה וְ/חֶצְיָ֗/ם מַחֲזִיקִים֙ בָּֽ/רְמָחִ֔ים
    מֵ/עֲל֣וֹת הַ/שַּׁ֔חַר עַ֖ד צֵ֥את הַ/כּוֹכָבִֽים׃
translation:
  text: So we kept doing the work, while half of them held the spears from the rising
    of the dawn until the coming out of the stars.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'from daybreak until the stars came out.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹשִׂים
  chosen: kept doing
  alternatives:
  - were doing
  - worked
  lexicon: HALOT
  rationale: The participle with waw and the surrounding narrative context conveys
    ongoing action. 'Kept doing' captures the durative sense more naturally than a
    simple English present.
- source_word: בַּמְּלָאכָה
  chosen: the work
  alternatives:
  - the labor
  - the construction work
  lexicon: HALOT
  rationale: מְלָאכָה commonly means 'work' or 'labor.' 'The work' is concise and
    fits the rebuilding context without over-specifying beyond the Hebrew.
- source_word: וְחֶצְיָם
  chosen: while half of them
  alternatives:
  - and half of them
  - with half of them
  lexicon: HALOT
  rationale: 'The conjunction links simultaneous action: one group worked while another
    stood armed. ''While half of them'' makes the coordination clear in idiomatic
    English.'
- source_word: מַחֲזִיקִים
  chosen: held
  alternatives:
  - were holding
  - gripped
  - stood holding
  lexicon: HALOT
  rationale: The participle denotes ongoing holding or bearing. 'Held' works smoothly
    in English with the durative sense already conveyed by the clause structure.
- source_word: בָּרְמָחִים
  chosen: the spears
  alternatives:
  - spears
  - lances
  lexicon: HALOT
  rationale: רְמָחִים refers to spears/lances. 'The spears' reflects the article in
    the Hebrew preposition-plus-noun form and suits the military setting.
- source_word: מֵעֲלוֹת הַשַּׁחַר
  chosen: from the rising of the dawn
  alternatives:
  - from daybreak
  - from the break of dawn
  - from dawn's rising
  lexicon: HALOT
  rationale: Literally the phrase is 'from the rising of the dawn.' This rendering
    preserves the imagery while remaining understandable. A more idiomatic 'from daybreak'
    is possible but slightly less transparent.
- source_word: עַד צֵאת הַכּוֹכָבִים
  chosen: until the coming out of the stars
  alternatives:
  - until the stars came out
  - until nightfall
  lexicon: HALOT
  rationale: Literally, 'until the going out/appearance of the stars.' 'Until the
    coming out of the stars' preserves the concrete Hebrew expression better than
    the interpretive 'until nightfall.'
