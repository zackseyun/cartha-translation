id: NEH.4.13
reference: Nehemiah 4:13
source:
  edition: WLC
  text: וָ/אֹמַ֞ר אֶל הַ/חֹרִ֤ים וְ/אֶל הַ/סְּגָנִים֙ וְ/אֶל יֶ֣תֶר הָ/עָ֔ם הַ/מְּלָאכָ֥ה
    הַרְבֵּ֖ה וּ/רְחָבָ֑ה וַ/אֲנַ֗חְנוּ נִפְרָדִים֙ עַל הַ֣/חוֹמָ֔ה רְחוֹקִ֖ים אִ֥ישׁ
    מֵ/אָחִֽי/ו־־־־׃
translation:
  text: And I said to the nobles, to the officials, and to the rest of the people,
    “The work is great and spread out, and we are separated along the wall, far from
    one another.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'each man from his brother,' a Hebrew idiom meaning 'one from
      another.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֹרִים
  chosen: the nobles
  alternatives:
  - the free men
  - the aristocrats
  lexicon: HALOT
  rationale: In Nehemiah this term refers to the social elite or leading men, not
    merely 'free men' in contrast to slaves. 'Nobles' is the most natural contextual
    rendering in English.
- source_word: הַסְּגָנִים
  chosen: the officials
  alternatives:
  - the deputies
  - the rulers
  lexicon: HALOT
  rationale: The term denotes subordinate leaders or administrators. 'Officials' communicates
    civic leadership clearly in modern English without over-specifying rank.
- source_word: יֶתֶר הָעָם
  chosen: the rest of the people
  alternatives:
  - the remainder of the people
  lexicon: HALOT
  rationale: A straightforward idiomatic rendering of the construct phrase indicating
    everyone else beyond the named leaders.
- source_word: הַמְּלָאכָה
  chosen: the work
  alternatives:
  - the labor
  - the task
  lexicon: HALOT
  rationale: Refers here to the rebuilding effort. 'Work' is broad, natural, and fits
    the construction context.
- source_word: הַרְבֵּה
  chosen: great
  alternatives:
  - much
  - extensive
  lexicon: HALOT
  rationale: Predicative use describing the magnitude of the task. 'Great' is idiomatic
    in English for a large undertaking.
- source_word: וּרְחָבָה
  chosen: spread out
  alternatives:
  - broad
  - wide
  lexicon: HALOT
  rationale: Although literally 'broad/wide,' in context it describes the work as
    extended over a large area. 'Spread out' best conveys the practical sense in readable
    English.
- source_word: נִפְרָדִים
  chosen: separated
  alternatives:
  - scattered
  - divided
  lexicon: HALOT
  rationale: The passive participle indicates that the workers are positioned apart
    from each other along the wall. 'Separated' preserves the spatial sense without
    implying hostility.
- source_word: עַל הַחוֹמָה
  chosen: along the wall
  alternatives:
  - on the wall
  - upon the wall
  lexicon: HALOT
  rationale: Although עַל often means 'on,' here the sense is distributive location
    over the extent of the wall. 'Along the wall' better reflects the spatial arrangement
    in English.
- source_word: רְחוֹקִים
  chosen: far
  alternatives:
  - distant
  lexicon: HALOT
  rationale: Simple adjectival description of distance between workers; 'far' is concise
    and idiomatic.
- source_word: אִישׁ מֵאָחִיו
  chosen: from one another
  alternatives:
  - each man from his brother
  - each from his brother
  lexicon: HALOT
  rationale: Literally 'a man from his brother,' a Hebrew idiom for mutual separation.
    Because the phrase is reciprocal rather than emphasizing maleness, 'from one another'
    conveys the sense naturally. The underlying masculine singular idiom is not individually
    foregrounded in English.
