id: NEH.4.8
reference: Nehemiah 4:8
source:
  edition: WLC
  text: וָ/אֵ֣רֶא וָ/אָק֗וּם וָ/אֹמַ֞ר אֶל הַ/חֹרִ֤ים וְ/אֶל הַ/סְּגָנִים֙ וְ/אֶל
    יֶ֣תֶר הָ/עָ֔ם אַל תִּֽירְא֖וּ מִ/פְּנֵי/הֶ֑ם אֶת אֲדֹנָ֞/י הַ/גָּד֤וֹל וְ/הַ/נּוֹרָא֙
    זְכֹ֔רוּ וְ/הִֽלָּחֲמ֗וּ עַל אֲחֵי/כֶם֙ בְּנֵי/כֶ֣ם וּ/בְנֹתֵי/כֶ֔ם נְשֵׁי/כֶ֖ם
    וּ/בָתֵּי/כֶֽם־־־־־־׃פ
translation:
  text: Then I looked, rose up, and said to the nobles, to the officials, and to the
    rest of the people, “Do not be afraid of them. Remember the Lord, who is great
    and fearsome, and fight for your brothers, your sons, your daughters, your wives,
    and your houses.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “great and awesome.” The Hebrew adjective can denote what inspires awe
      or dread; “fearsome” is used here to preserve that stronger sense.
    reason: lexical_alternative
  - marker: b
    text: “Your brothers” translates a masculine plural kinship term. The verse then
      separately names sons, daughters, and wives.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֵרֶא
  chosen: Then I looked
  alternatives:
  - Then I saw
  - When I saw
  lexicon: HALOT
  rationale: The verb ראה in the wayyiqtol sequence introduces Nehemiah's responsive
    action. 'Looked' fits the immediate narrative movement well. 'Saw' is possible,
    but 'looked' better preserves the active observational sense before 'rose up'
    and 'said.'
- source_word: וָאָקוּם
  chosen: rose up
  alternatives:
  - stood up
  - arose
  lexicon: HALOT
  rationale: From קום, the idiom marks decisive action. 'Rose up' is natural modern
    English and preserves the narrative force without sounding archaic like 'arose.'
- source_word: הַחֹרִים
  chosen: the nobles
  alternatives:
  - the noblesmen
  - the aristocrats
  lexicon: HALOT
  rationale: חֹרִים refers to social leaders of rank. 'Nobles' is the standard and
    clearest English equivalent in this administrative context.
- source_word: הַסְּגָנִים
  chosen: the officials
  alternatives:
  - the deputies
  - the prefects
  - the rulers
  lexicon: HALOT
  rationale: סְגָנִים denotes subordinate rulers or administrators. 'Officials' is
    accurate and readable; 'deputies' is more formal but less natural for contemporary
    readers.
- source_word: יֶתֶר הָעָם
  chosen: the rest of the people
  alternatives:
  - the remainder of the people
  - the rest of the populace
  lexicon: HALOT
  rationale: This phrase distinguishes the broader populace from the leaders already
    named. 'The rest of the people' is idiomatic and transparent.
- source_word: אַל תִּירְאוּ מִפְּנֵיהֶם
  chosen: Do not be afraid of them
  alternatives:
  - Do not fear them
  - Do not be frightened before them
  lexicon: HALOT
  rationale: The idiom with ירא plus מִפְּנֵי means fearing in the face of opponents.
    'Do not be afraid of them' is natural English and preserves the prohibition's
    force.
- source_word: אֶת אֲדֹנָי
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: HALOT
  rationale: אֲדֹנָי here is the divine title for God. Per doctrine, the default rendering
    for this title is 'Lord.' Since the Hebrew is אֲדֹנָי rather than יהוה, 'the Lord'
    is appropriate, not 'the LORD.'
- source_word: הַגָּדוֹל וְהַנּוֹרָא
  chosen: who is great and fearsome
  alternatives:
  - the great and awesome one
  - great and terrible
  - great and awesome
  lexicon: HALOT
  rationale: נורא derives from ירא and denotes that which inspires awe or dread. 'Fearsome'
    preserves the stronger sense of awe-inspiring dread better than the now-weakened
    English 'awesome.' The relative clause 'who is' makes the English flow naturally
    while keeping the adjectival force.
- source_word: זְכֹרוּ
  chosen: Remember
  alternatives:
  - Keep in mind
  - Call to mind
  lexicon: HALOT
  rationale: The imperative is direct and covenantally weighty. 'Remember' is both
    literal and idiomatic.
- source_word: וְהִלָּחֲמוּ עַל
  chosen: and fight for
  alternatives:
  - and fight on behalf of
  - and fight concerning
  lexicon: HALOT
  rationale: The Niphal/imperatival form with עַל in context conveys fighting in defense
    of or for the sake of others. 'Fight for' is concise and contextually precise.
- source_word: אֲחֵיכֶם
  chosen: your brothers
  alternatives:
  - your kin
  - your brothers and sisters
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine plural and specifically names male
    kin, followed by sons, daughters, wives, and houses. Per gender-accurate policy,
    'brothers' should be retained rather than expanded.
- source_word: בְּנֵיכֶם וּבְנֹתֵיכֶם נְשֵׁיכֶם וּבָתֵּיכֶם
  chosen: your sons, your daughters, your wives, and your houses
  alternatives:
  - your children, your wives, and your homes
  lexicon: HALOT
  rationale: The list is concrete and cumulative. 'Sons' and 'daughters' preserve
    the explicit family terms; 'houses' is retained rather than 'homes' because the
    Hebrew term can denote households and dwellings, and the more literal rendering
    preserves the breadth.
