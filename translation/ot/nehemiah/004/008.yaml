theological_decisions:
- issue: Rendering the divine title אֲדֹנָי
  chosen_reading: the Lord
  alternative_readings:
  - the Master
  rationale: The verse uses the divine title אֲדֹנָי, not the Tetragrammaton. Following
    the doctrine's default for κύριος/Lord-type divine titles and avoiding confusion
    with יהוה, the translation uses 'the Lord.'
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; יְהוָה → the LORD'
- issue: Rendering הַנּוֹרָא
  chosen_reading: fearsome
  alternative_readings:
  - awesome
  - terrible
  rationale: The text emphasizes God's awe-inspiring, fear-evoking majesty as motivation
    against human fear. 'Fearsome' preserves that theological tension more clearly
    in contemporary English than 'awesome,' which can sound weakened or casual.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #6'
