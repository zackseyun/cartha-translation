id: NEH.4.14
reference: Nehemiah 4:14
source:
  edition: WLC
  text: בִּ/מְק֗וֹם אֲשֶׁ֤ר תִּשְׁמְעוּ֙ אֶת ק֣וֹל הַ/שּׁוֹפָ֔ר שָׁ֖מָּ/ה תִּקָּבְצ֣וּ
    אֵלֵ֑י/נוּ אֱלֹהֵ֖י/נוּ יִלָּ֥חֶם לָֽ/נוּ־׃
translation:
  text: At the place where you hear the sound of the trumpet, gather there to us.
    Our God will fight for us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sound of the ram's horn.' The Hebrew shofar refers specifically
      to a horn trumpet.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּמְקוֹם
  chosen: At the place
  alternatives:
  - In the place
  - Where
  lexicon: HALOT
  rationale: The preposition ב plus מָקוֹם is most naturally locative, 'at/in the
    place.' 'At the place' preserves the concrete spatial sense while reading naturally
    in English.
- source_word: אֲשֶׁר
  chosen: where
  alternatives:
  - that
  - in which
  lexicon: HALOT
  rationale: Here אֲשֶׁר introduces a relative clause tied to location, so 'where'
    is the most idiomatic and semantically precise rendering in English.
- source_word: תִּשְׁמְעוּ
  chosen: you hear
  alternatives:
  - you hear of
  - you listen to
  lexicon: HALOT
  rationale: Qal of שׁמע commonly means 'hear.' The simple present in English fits
    the instruction's general force.
- source_word: קוֹל הַשּׁוֹפָר
  chosen: the sound of the trumpet
  alternatives:
  - the sound of the ram's horn
  - the trumpet blast
  lexicon: HALOT
  rationale: קוֹל is explicitly present, so 'sound' should be retained rather than
    collapsed entirely into 'blast.' שׁוֹפָר can be more specifically 'ram's horn,'
    but 'trumpet' is standard, clear modern English and suitable here; the more specific
    alternative is worth preserving in a footnote.
- source_word: שָׁמָּה
  chosen: there
  alternatives:
  - to that place
  lexicon: HALOT
  rationale: The adverb points to the indicated location. 'There' is concise and natural;
    the directional nuance is adequately conveyed in context with the command to gather.
- source_word: תִּקָּבְצוּ
  chosen: gather
  alternatives:
  - assemble
  - be gathered
  lexicon: HALOT
  rationale: Niphal of קבץ here functions as an intransitive/passive-like command
    to come together. 'Gather' is idiomatic in English and avoids awkwardness while
    preserving the imperative force.
- source_word: אֵלֵינוּ
  chosen: to us
  alternatives:
  - to me
  - with us
  lexicon: HALOT
  rationale: The form is clearly first person common plural, 'to us,' not singular.
    This likely reflects the speaker together with his command structure or leadership
    group; the plural should be preserved rather than harmonized away.
- source_word: אֱלֹהֵינוּ
  chosen: Our God
  alternatives:
  - God
  - our God
  lexicon: HALOT
  rationale: The possessive suffix is significant rhetorically and covenantally, so
    it should be retained.
- source_word: יִלָּחֶם לָנוּ
  chosen: will fight for us
  alternatives:
  - will battle for us
  - will fight on our behalf
  lexicon: HALOT
  rationale: Niphal of לחם in this context means to engage in battle, and ל plus pronoun
    indicates advantage/benefit. 'Will fight for us' is the clearest natural rendering.
