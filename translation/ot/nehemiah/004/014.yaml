theological_decisions:
- issue: Divine warfare language
  chosen_reading: Our God will fight for us
  alternative_readings:
  - God will help us fight
  - Our God fights with us
  rationale: The Hebrew attributes the decisive fighting action to God himself, not
    merely assistance. The translation preserves that theological emphasis without
    softening it.
  doctrine_reference: Translation philosophy §1, §3
