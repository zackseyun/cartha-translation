id: NEH.4.2
reference: Nehemiah 4:2
source:
  edition: WLC
  text: וַ/יִּקְשְׁר֤וּ כֻלָּ/ם֙ יַחְדָּ֔ו לָ/ב֖וֹא לְ/הִלָּחֵ֣ם בִּ/ירוּשָׁלִָ֑ם
    וְ/לַ/עֲשׂ֥וֹת ל֖/וֹ תּוֹעָֽה׃
translation:
  text: And all of them conspired together to come and fight against Jerusalem and
    to cause confusion in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to bring about disorder/trouble in it.' The Hebrew noun can denote confusion,
      disturbance, or disarray.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְשְׁרוּ
  chosen: conspired
  alternatives:
  - plotted together
  - banded together
  lexicon: HALOT
  rationale: The verb קשר in the qal commonly carries the sense of forming a conspiracy
    or alliance. 'Conspired' best captures the hostile, coordinated intent in context.
- source_word: כֻלָּם
  chosen: all of them
  alternatives:
  - all
  - every one of them
  lexicon: HALOT
  rationale: The pronominal form emphasizes the totality of the group previously mentioned.
    'All of them' preserves that emphasis naturally in English.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - as one
  - jointly
  lexicon: HALOT
  rationale: This adverb reinforces coordinated action. 'Together' is the most natural
    concise rendering and preserves the collective force.
- source_word: לָבוֹא
  chosen: to come
  alternatives:
  - to go
  - to advance
  lexicon: HALOT
  rationale: The infinitive literally means 'to come.' Although English might idiomatically
    say 'to attack,' the source includes the motion verb before 'to fight,' so 'to
    come' is retained.
- source_word: לְהִלָּחֵם
  chosen: fight against
  alternatives:
  - make war against
  - attack
  lexicon: HALOT
  rationale: The nifal of לחם means to engage in battle. 'Fight against' is clear,
    direct, and avoids overstating beyond the Hebrew.
- source_word: בִּירוּשָׁלָם
  chosen: against Jerusalem
  alternatives:
  - at Jerusalem
  - in Jerusalem
  lexicon: HALOT
  rationale: With verbs of hostile action, the preposition here is best represented
    idiomatically in English as 'against Jerusalem,' expressing the city's role as
    the target.
- source_word: וְלַעֲשׂוֹת
  chosen: and to cause
  alternatives:
  - and to make
  - and to bring about
  lexicon: HALOT
  rationale: עשה is broad ('do/make'), but with the following noun it forms an idiom
    meaning to produce or bring about a condition. 'Cause' is natural English here.
- source_word: לוֹ
  chosen: in it
  alternatives:
  - to it
  - for it
  - in Jerusalem
  lexicon: HALOT
  rationale: The pronoun is singular masculine, referring back to Jerusalem as a city-name
    with grammatical gender not strictly matching English expectations. 'In it' conveys
    the locative/resultative sense of the clause in idiomatic English.
- source_word: תּוֹעָה
  chosen: confusion
  alternatives:
  - disturbance
  - trouble
  - error
  lexicon: HALOT
  rationale: The noun denotes confusion, disorder, or disarray. In this military-opposition
    context, 'confusion' best fits the aim of disrupting the rebuilding effort without
    importing a more specific idea not explicit in the text.
