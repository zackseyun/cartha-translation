id: NEH.4.12
reference: Nehemiah 4:12
source:
  edition: WLC
  text: וְ/הַ֨/בּוֹנִ֔ים אִ֥ישׁ חַרְבּ֛/וֹ אֲסוּרִ֥ים עַל מָתְנָ֖י/ו וּ/בוֹנִ֑ים וְ/הַ/תּוֹקֵ֥עַ
    בַּ/שּׁוֹפָ֖ר אֶצְלִֽ/י־׃
translation:
  text: And the builders each had his sword strapped at his side while they built,
    and the one blowing the trumpet was beside me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the one blowing the shofar.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבּוֹנִים / וּבוֹנִים
  chosen: the builders / while they built
  alternatives:
  - those who were building
  - and were building
  lexicon: HALOT
  rationale: The participle from בנה functions first substantivally ('the builders')
    and then verbally in context ('while they built'). Rendering both with natural
    English preserves the repeated Hebrew root without awkwardness.
- source_word: אִישׁ
  chosen: each
  alternatives:
  - a man
  - each man
  lexicon: HALOT
  rationale: Here אִישׁ is distributive, indicating each individual among the builders.
    'Each' conveys the sense idiomatically in English without unnecessary repetition.
- source_word: חַרְבּוֹ
  chosen: his sword
  lexicon: HALOT
  rationale: Straightforward possessive noun; 'sword' is the normal gloss.
- source_word: אֲסוּרִים
  chosen: strapped
  alternatives:
  - bound
  - girded on
  - fastened
  lexicon: HALOT
  rationale: The passive participle of אסר means bound or fastened. In the context
    of a sword worn for readiness, 'strapped' is clear modern English and fits the
    military image.
- source_word: עַל מָתְנָיו
  chosen: at his side
  alternatives:
  - on his loins
  - at his waist
  - on his hips
  lexicon: HALOT
  rationale: Literally 'upon his loins/waist.' 'At his side' is a natural English
    idiom for a sword worn ready, preserving the sense without archaic body-language.
- source_word: וְהַתּוֹקֵעַ בַּשּׁוֹפָר
  chosen: the one blowing the trumpet
  alternatives:
  - the trumpeter
  - the one sounding the horn
  lexicon: HALOT
  rationale: The participle of תקע with שופר denotes sounding a ram's horn/trumpet.
    'The one blowing the trumpet' stays close to the Hebrew verbal form while remaining
    readable. 'Trumpet' is more immediately intelligible than 'horn,' though the instrument
    is specifically a shofar.
- source_word: אֶצְלִי
  chosen: beside me
  alternatives:
  - at my side
  - near me
  lexicon: HALOT
  rationale: The prepositional form indicates close proximity. 'Beside me' is the
    most natural rendering in context.
