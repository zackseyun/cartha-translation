id: NEH.4.17
reference: Nehemiah 4:17
source:
  edition: WLC
  text: וְ/אֵ֨ין אֲנִ֜י וְ/אַחַ֣/י וּ/נְעָרַ֗/י וְ/אַנְשֵׁ֤י הַ/מִּשְׁמָר֙ אֲשֶׁ֣ר
    אַחֲרַ֔/י אֵין אֲנַ֥חְנוּ פֹשְׁטִ֖ים בְּגָדֵ֑י/נוּ אִ֖ישׁ שִׁלְח֥/וֹ הַ/מָּֽיִם־׃ס
translation:
  text: And neither I, nor my brothers, nor my young men, nor the men of the guard
    who were behind me, took off our clothes; each kept his weapon at his right hand,
    even for water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew text of the final clause is difficult: literally, ''each his shelaḥ
      the water.'' It may mean ''each kept his weapon at his right hand, even for
      water,'' or ''each went with his weapon for water.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין ... אֵין
  chosen: neither ... took off
  alternatives:
  - there was not ... stripping off
  - none of us took off
  lexicon: HALOT
  rationale: 'The negative particle אֵין with the participle פֹשְׁטִים expresses ongoing
    negated action/state: ''we were not taking off'' or idiomatically ''we did not
    take off.'' Rendering the first אֵין with ''neither'' coordinates the listed subjects
    naturally in English, while the second is absorbed into the finite verbal sense.'
- source_word: אַחַי
  chosen: my brothers
  alternatives:
  - my kinsmen
  lexicon: HALOT
  rationale: Literal familial term is retained. In context it may include close associates,
    but 'brothers' best preserves the Hebrew wording and the translation philosophy's
    gender-accurate preference.
- source_word: נְעָרַי
  chosen: my young men
  alternatives:
  - my servants
  - my attendants
  lexicon: HALOT
  rationale: נַעַר can denote a youth, servant, or attendant. In Nehemiah's administrative/military
    context, 'my young men' preserves the lexical form without over-specifying servile
    status.
- source_word: אַנְשֵׁי הַמִּשְׁמָר
  chosen: the men of the guard
  alternatives:
  - the men of the watch
  - the guardsmen
  lexicon: HALOT
  rationale: מִשְׁמָר denotes a guard, watch, or duty-post. 'Men of the guard' is
    clear modern English and preserves the military/security sense.
- source_word: אֲשֶׁר אַחֲרַי
  chosen: who were behind me
  alternatives:
  - who followed me
  - who were after me
  lexicon: HALOT
  rationale: The phrase likely identifies those stationed or coming after Nehemiah.
    'Who were behind me' is the most spatially literal and fits the guard context.
- source_word: פֹשְׁטִים בְּגָדֵינוּ
  chosen: took off our clothes
  alternatives:
  - removed our garments
  - stripped off our clothes
  lexicon: HALOT
  rationale: פשט with בגדים means to remove clothing. 'Took off our clothes' is idiomatic,
    clear, and not overly colloquial.
- source_word: אִישׁ
  chosen: each
  alternatives:
  - every man
  lexicon: HALOT
  rationale: Though literally 'man,' distributive אִישׁ here functions idiomatically
    as 'each.' This preserves the sense in natural English.
- source_word: שִׁלְחוֹ
  chosen: his weapon at his right hand
  alternatives:
  - his missile weapon
  - his spear/dart
  lexicon: HALOT
  rationale: שֶׁלַח can denote a weapon, often a missile or spear-like implement.
    In this difficult clause, many understand the sense to be that each kept his weapon
    ready at hand. 'Weapon at his right hand' captures the likely practical meaning
    without overcommitting to a specific implement.
- source_word: הַמָּיִם
  chosen: even for water
  alternatives:
  - for water
  - to the water
  lexicon: HALOT
  rationale: The final phrase is terse and difficult. It likely means they remained
    armed even when going for water or in relation to water needs. 'Even for water'
    preserves the brevity while conveying that not even water-related necessity led
    them to disarm.
