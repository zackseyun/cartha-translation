id: NEH.4.5
reference: Nehemiah 4:5
source:
  edition: WLC
  text: וַ/יֹּאמְר֣וּ צָרֵ֗י/נוּ לֹ֤א יֵדְעוּ֙ וְ/לֹ֣א יִרְא֔וּ עַ֛ד אֲשֶׁר נָב֥וֹא
    אֶל תּוֹכָ֖/ם וַ/הֲרַגְנ֑וּ/ם וְ/הִשְׁבַּ֖תְנוּ אֶת הַ/מְּלָאכָֽה־־־׃
translation:
  text: And our adversaries said, “They will not know, and they will not see, until
    we come into their midst and kill them and stop the work.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among them' for 'into their midst.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צָרֵינוּ
  chosen: our adversaries
  alternatives:
  - our enemies
  - those hostile to us
  lexicon: HALOT
  rationale: צַר commonly denotes an enemy/opponent in a hostile sense. 'Adversaries'
    is natural modern English and fits the military/oppositional context without overstating
    beyond the Hebrew.
- source_word: יֵדְעוּ
  chosen: they will not know
  alternatives:
  - they will not realize
  - they will not become aware
  lexicon: HALOT
  rationale: יָדַע here refers to awareness/perception. 'Know' preserves the Hebrew's
    straightforward wording; the context supplies the sense of becoming aware.
- source_word: יִרְאוּ
  chosen: they will not see
  alternatives:
  - they will not notice
  - they will not perceive
  lexicon: HALOT
  rationale: רָאָה is literally 'see.' Keeping 'see' preserves the parallelism with
    'know' and the vividness of the threat, while English readers can infer the idiomatic
    sense of noticing.
- source_word: עַד אֲשֶׁר
  chosen: until
  alternatives:
  - before
  - up to the point when
  lexicon: HALOT
  rationale: 'The combination marks the temporal limit: they remain unaware until
    the attackers arrive. ''Until'' is the most idiomatic concise rendering.'
- source_word: נָבֹא
  chosen: we come
  alternatives:
  - we arrive
  - we enter
  lexicon: HALOT
  rationale: בּוֹא broadly means come/enter. 'Come' works well with the following
    prepositional phrase and preserves the direct speech's immediacy.
- source_word: אֶל תּוֹכָם
  chosen: into their midst
  alternatives:
  - among them
  - into the middle of them
  lexicon: HALOT
  rationale: תּוֹךְ means midst/interior. 'Into their midst' captures both spatial
    penetration and the threatening force of the planned surprise attack.
- source_word: וַהֲרַגְנוּם
  chosen: and kill them
  alternatives:
  - and strike them down
  - and slay them
  lexicon: HALOT
  rationale: הָרַג is the ordinary verb for kill/slay. 'Kill them' is the clearest
    modern equivalent and matches the blunt force of the Hebrew.
- source_word: וְהִשְׁבַּתְנוּ
  chosen: and stop
  alternatives:
  - and put an end to
  - and cause to cease
  lexicon: HALOT
  rationale: Hiphil of שׁבת means cause to cease/stop. 'Stop' is concise and idiomatic,
    with the object 'the work' making the causative sense clear.
- source_word: הַמְּלָאכָה
  chosen: the work
  alternatives:
  - the labor
  - the project
  lexicon: HALOT
  rationale: מְלָאכָה here refers to the rebuilding work. 'The work' is the standard
    and sufficiently broad rendering in context.
