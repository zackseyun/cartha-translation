id: NEH.4.3
reference: Nehemiah 4:3
source:
  edition: WLC
  text: וַ/נִּתְפַּלֵּ֖ל אֶל אֱלֹהֵ֑י/נוּ וַ/נַּעֲמִ֨יד מִשְׁמָ֧ר עֲלֵי/הֶ֛ם יוֹמָ֥ם
    וָ/לַ֖יְלָה מִ/פְּנֵי/הֶֽם־׃
translation:
  text: So we prayed to our God and stationed a guard against them day and night because
    of them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'posted a watch against them.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'from before them'; here meaning 'because of them' or 'on account
      of them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנִּתְפַּלֵּל
  chosen: we prayed
  alternatives:
  - we prayed earnestly
  - we interceded
  lexicon: HALOT
  rationale: Hitpael of פלל commonly means 'to pray.' 'We prayed' is the plain and
    natural English equivalent without adding intensity not explicit in the verb.
- source_word: אֶל אֱלֹהֵינוּ
  chosen: to our God
  alternatives:
  - to God
  - to our God
  lexicon: HALOT
  rationale: The preposition אֶל is naturally expressed with 'to,' and the 1cp suffix
    on אֱלֹהֵינוּ should be preserved as 'our God,' reflecting covenantal relationship.
- source_word: וַנַּעֲמִיד
  chosen: we stationed
  alternatives:
  - we set
  - we posted
  lexicon: HALOT
  rationale: Hiphil of עמד here means to cause to stand or set in position. In military/watch
    context, 'stationed' best conveys deliberate placement of personnel.
- source_word: מִשְׁמָר
  chosen: a guard
  alternatives:
  - a watch
  - a watchman force
  lexicon: HALOT
  rationale: מִשְׁמָר can denote a guard, watch, or watch-post. 'A guard' is concise
    modern English and fits the collective sense of protective watchkeeping.
- source_word: עֲלֵיהֶם
  chosen: against them
  alternatives:
  - over them
  - concerning them
  lexicon: HALOT
  rationale: Although עַל often means 'over/on,' in this hostile context with enemies
    in view it idiomatically carries the sense of opposition or protection directed
    against them. 'Against them' best fits the narrative situation.
- source_word: יוֹמָם וָלַיְלָה
  chosen: day and night
  alternatives:
  - by day and by night
  lexicon: HALOT
  rationale: This is a standard merism for continual vigilance. 'Day and night' is
    the most natural English rendering.
- source_word: מִפְּנֵיהֶם
  chosen: because of them
  alternatives:
  - on account of them
  - for fear of them
  lexicon: HALOT
  rationale: Literally 'from before them/from their presence,' but in context it gives
    the reason for the guard. 'Because of them' preserves the causal force without
    overinterpreting the motive as explicit fear.
