theological_decisions:
- issue: Rendering the response to opposition
  chosen_reading: Both prayer and practical defense are stated without privileging
    one over the other.
  alternative_readings:
  - Emphasize only prayer
  - Emphasize only military preparedness
  rationale: 'The Hebrew presents two coordinated actions: prayer to God and posting
    a guard. The translation preserves this theological-practical tension rather than
    collapsing it into a purely spiritual or purely strategic response.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
