id: NEH.4.6
reference: Nehemiah 4:6
source:
  edition: WLC
  text: וַֽ/יְהִי֙ כַּ/אֲשֶׁר בָּ֣אוּ הַ/יְּהוּדִ֔ים הַ/יֹּשְׁבִ֖ים אֶצְלָ֑/ם וַ/יֹּ֤אמְרוּ
    לָ֨/נוּ֙ עֶ֣שֶׂר פְּעָמִ֔ים מִ/כָּל הַ/מְּקֹמ֖וֹת אֲשֶׁר תָּשׁ֥וּבוּ עָלֵֽי/נוּ־־־׃
translation:
  text: And when the Jews who lived near them came and told us ten times, “From all
    the places where you turn, they will come up against us,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “wherever you return.” The Hebrew verb can mean 'turn back/return,'
      but in context it likely means turning in any direction.
    reason: lexical_alternative
  - marker: b
    text: The warning implies hostile attackers approaching from every direction;
      the verb 'will come up' is supplied in English for clarity from the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַּאֲשֶׁר
  chosen: And when
  alternatives:
  - Now it happened when
  - And it happened when
  lexicon: HALOT
  rationale: Narrative wayyiqtol plus temporal particle introduces a new development.
    'And when' preserves the temporal sense in natural English without over-literal
    stiffness.
- source_word: בָּאוּ
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: Standard motion verb; 'came' fits the narrative context and English idiom.
- source_word: הַיְּהוּדִים
  chosen: the Jews
  alternatives:
  - the Judeans
  lexicon: HALOT
  rationale: In Nehemiah this term can denote the Jewish people/community rather than
    strictly inhabitants of Judah. 'The Jews' is the most natural contextual rendering,
    though 'Judeans' is lexically possible.
- source_word: הַיֹּשְׁבִים אֶצְלָם
  chosen: who lived near them
  alternatives:
  - who lived beside them
  - who dwelt among them
  - who lived by them
  lexicon: HALOT
  rationale: The participle with אֵצֶל indicates residing in proximity to the hostile
    neighbors. 'Near them' communicates local closeness better than the more ambiguous
    'with them' or 'by them'.
- source_word: וַיֹּאמְרוּ לָנוּ
  chosen: came and told us
  alternatives:
  - said to us
  - kept saying to us
  lexicon: HALOT
  rationale: The sequence 'came ... and told us' is smooth English and reflects the
    report brought to Nehemiah's group. 'Told us' fits reported warning speech.
- source_word: עֶשֶׂר פְּעָמִים
  chosen: ten times
  alternatives:
  - repeatedly
  - again and again
  lexicon: HALOT
  rationale: The Hebrew is explicit and should be preserved rather than generalized.
    It may be idiomatic for repeated warning, but the numeric expression is retained
    in the main text.
- source_word: מִכָּל הַמְּקֹמוֹת
  chosen: From all the places
  alternatives:
  - from every place
  - out of all the places
  lexicon: HALOT
  rationale: Keeps the distributive force of the phrase and prepares for the following
    relative clause.
- source_word: אֲשֶׁר תָּשׁוּבוּ
  chosen: where you turn
  alternatives:
  - wherever you turn
  - to which you return
  lexicon: HALOT
  rationale: The verb שוב here is difficult in context. Many understand it idiomatically
    as movement/turning in any direction rather than literal 'return.' 'Where you
    turn' gives a coherent warning sense while staying close to the Hebrew.
- source_word: עָלֵינוּ
  chosen: against us
  alternatives:
  - upon us
  - to us
  lexicon: HALOT
  rationale: With hostile context, על conveys attack directed against the speakers.
    'Against us' makes the adversarial force explicit in idiomatic English.
