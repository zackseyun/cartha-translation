id: NEH.4.10
reference: Nehemiah 4:10
source:
  edition: WLC
  text: וַ/יְהִ֣י מִן הַ/יּ֣וֹם הַ/ה֗וּא חֲצִ֣י נְעָרַ/י֮ עֹשִׂ֣ים בַּ/מְּלָאכָה֒
    וְ/חֶצְיָ֗/ם מַחֲזִיקִים֙ וְ/הָ/רְמָחִ֣ים הַ/מָּגִנִּ֔ים וְ/הַ/קְּשָׁת֖וֹת וְ/הַ/שִּׁרְיֹנִ֑ים
    וְ/הַ֨/שָּׂרִ֔ים אַחֲרֵ֖י כָּל בֵּ֥ית יְהוּדָֽה׀־־׃
translation:
  text: And from that day on, half of my young men were doing the work, and half of
    them were holding the spears, the shields, the bows, and the armor; and the officers
    stood behind all the house of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my servants' or 'my attendants' for 'my young men' (נְעָרַי), since
      the Hebrew term can refer to youths, servants, or retainers depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'the coats of mail' or 'the breastplates' for 'the armor'; the Hebrew
      term refers to body armor.
    reason: lexical_alternative
  - marker: c
    text: '''The officers stood behind all the house of Judah'' may imply military
      support or supervisory positioning behind the Judean workers.'
    reason: cultural_note
lexical_decisions:
- source_word: נְעָרַי
  chosen: my young men
  alternatives:
  - my servants
  - my attendants
  - my men
  lexicon: HALOT
  rationale: נַעַר can denote a youth, servant, attendant, or retainer depending on
    context. Here Nehemiah refers to his own workforce/retinue in a military-labor
    setting. 'My young men' preserves the lexical sense while fitting the context
    better than the more domesticated 'servants.'
- source_word: עֹשִׂים בַּמְּלָאכָה
  chosen: were doing the work
  alternatives:
  - were working on the labor
  - were engaged in the work
  lexicon: HALOT
  rationale: The participle plus בְּ + מְלָאכָה describes active engagement in the
    construction task. 'Doing the work' is natural English and keeps the concrete
    sense.
- source_word: מַחֲזִיקִים
  chosen: were holding
  alternatives:
  - were grasping
  - were taking hold of
  - were equipped with
  lexicon: HALOT
  rationale: The Hiphil participle of חזק here means to hold or take up weapons. 'Were
    holding' is straightforward and leaves the object list to specify what they held.
- source_word: הָרְמָחִים
  chosen: the spears
  alternatives:
  - the lances
  - the javelins
  lexicon: HALOT
  rationale: רֹמַח refers to a spear or lance. 'Spears' is the most standard and accessible
    rendering in this military inventory.
- source_word: הַמָּגִנִּים
  chosen: the shields
  alternatives:
  - the bucklers
  lexicon: HALOT
  rationale: מָגֵן is the common term for shield. 'Bucklers' is archaic and too specific.
- source_word: הַקְּשָׁתוֹת
  chosen: the bows
  alternatives:
  - the archery equipment
  lexicon: HALOT
  rationale: קֶשֶׁת means bow. The plural here is straightforwardly rendered 'bows.'
- source_word: הַשִּׁרְיֹנִים
  chosen: the armor
  alternatives:
  - the coats of mail
  - the breastplates
  lexicon: HALOT
  rationale: שִׁרְיוֹן denotes body armor, often scale armor or a coat of mail. 'Armor'
    is broad but accurate and readable; more specific options may overstate precision.
- source_word: הַשָּׂרִים
  chosen: the officers stood
  alternatives:
  - the leaders were
  - the commanders were
  lexicon: HALOT
  rationale: שַׂר can mean prince, official, leader, or commander. In this military-organizational
    context, 'officers' best conveys function without implying royalty.
- source_word: אַחֲרֵי כָּל בֵּית יְהוּדָה
  chosen: behind all the house of Judah
  alternatives:
  - behind the whole house of Judah
  - supporting all the house of Judah
  lexicon: HALOT
  rationale: אַחֲרֵי is spatially 'behind/after.' Here it likely indicates the officers
    were positioned behind the Judean workers as support/oversight. 'All the house
    of Judah' preserves the corporate expression בֵּית יְהוּדָה rather than reducing
    it to simply 'the people of Judah.'
