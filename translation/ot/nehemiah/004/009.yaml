theological_decisions:
- issue: Reference of 'God' in the narrative
  chosen_reading: The verse attributes the frustrating of the enemies' plan directly
    to God.
  alternative_readings:
  - The event could be described more impersonally as providential circumstance.
  rationale: The Hebrew explicitly states 'God had frustrated their plan'; the translation
    preserves this direct theological attribution rather than softening it into mere
    circumstance.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
- issue: Gendered distributive expression אִישׁ
  chosen_reading: each man
  alternative_readings:
  - each one
  - each person
  rationale: The Hebrew uses the masculine singular distributively. Following the
    stated gender-accurate policy, the translation keeps 'man' rather than neutralizing
    it, while the sense remains representative of the workers collectively.
  doctrine_reference: Translation philosophy §4
