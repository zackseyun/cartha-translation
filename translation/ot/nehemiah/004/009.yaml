id: NEH.4.9
reference: Nehemiah 4:9
source:
  edition: WLC
  text: וַ/יְהִ֞י כַּֽ/אֲשֶׁר שָׁמְע֤וּ אוֹיְבֵ֨י/נוּ֙ כִּי נ֣וֹדַֽע לָ֔/נוּ וַ/יָּ֥פֶר
    הָ/אֱלֹהִ֖ים אֶת עֲצָתָ֑/ם ו/נשוב כֻּלָּ֨/נוּ֙ אֶל הַ֣/חוֹמָ֔ה אִ֖ישׁ אֶל מְלַאכְתּֽ/וֹ־־־־־׃
translation:
  text: And it happened that when our enemies heard that it had become known to us,
    and that God had frustrated their plan, we all returned to the wall, each man
    to his work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that we had learned of it.' The Hebrew literally says 'that it had become
      known to us.'
    reason: lexical_alternative
  - marker: b
    text: Or 'had thwarted their counsel.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'each man to his work,' a distributive expression for the workers
      individually.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new development. 'And it happened'
    preserves the Hebrew discourse marker without archaic phrasing like 'came to pass.'
- source_word: כַּאֲשֶׁר
  chosen: when
  alternatives:
  - as
  - after
  lexicon: HALOT
  rationale: Temporal conjunction here introducing the circumstance under which the
    following action occurred; 'when' is the most natural English equivalent.
- source_word: אוֹיְבֵינוּ
  chosen: our enemies
  alternatives:
  - those hostile to us
  lexicon: HALOT
  rationale: Standard rendering of אויב with 1cp suffix; straightforward and contextually
    appropriate.
- source_word: כִּי נוֹדַע לָנוּ
  chosen: that it had become known to us
  alternatives:
  - that we had learned of it
  - that it was known to us
  lexicon: HALOT
  rationale: The Niphal of ידע is passive/reflexive, 'be known.' The phrase indicates
    that the enemies heard that their plot had become known to Nehemiah's group. 'Had
    become known to us' preserves the passive sense better than the more interpretive
    'we had learned of it.'
- source_word: וַיָּפֶר
  chosen: had frustrated
  alternatives:
  - had thwarted
  - had broken up
  - had nullified
  lexicon: HALOT
  rationale: הפר in this context means to frustrate or thwart a plan/counsel. 'Frustrated'
    is idiomatic modern English and fits the object 'their plan.' The pluperfect sense
    in English is supplied for smooth narrative sequence after 'heard that.'
- source_word: הָאֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Definite האלהים refers to the God of Israel in context. English normally
    omits the article with the proper referent 'God.'
- source_word: עֲצָתָם
  chosen: their plan
  alternatives:
  - their counsel
  - their scheme
  lexicon: HALOT
  rationale: עצה can mean counsel, plan, or purpose. In this military-oppositional
    context, 'plan' is clear and natural; 'scheme' would add a slightly more pejorative
    nuance than the Hebrew requires.
- source_word: וְנָשׁוּב
  chosen: we all returned
  alternatives:
  - we turned back
  - we went back
  lexicon: HALOT
  rationale: שוב commonly means return/turn back. With כֻּלָּנוּ following, English
    reads most naturally as 'we all returned.'
- source_word: הַחוֹמָה
  chosen: the wall
  lexicon: HALOT
  rationale: Refers to Jerusalem's wall under reconstruction; the simple definite
    rendering is sufficient.
- source_word: אִישׁ אֶל מְלַאכְתּוֹ
  chosen: each man to his work
  alternatives:
  - each to his work
  - each man to his task
  lexicon: HALOT
  rationale: איש distributively means 'each man.' Per translation philosophy, the
    gendered form is retained where it matches the source's representative wording.
    מלאכה is 'work' or 'task'; 'work' is the more general and natural choice here.
