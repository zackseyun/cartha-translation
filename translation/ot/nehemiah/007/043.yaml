id: NEH.7.43
reference: Nehemiah 7:43
source:
  edition: WLC
  text: הַ/לְוִיִּ֑ם בְּנֵֽי יֵשׁ֧וּעַ לְ/קַדְמִיאֵ֛ל לִ/בְנֵ֥י לְ/הוֹדְוָ֖ה שִׁבְעִ֥ים
    וְ/אַרְבָּעָֽה־׃ס
translation:
  text: 'The Levites: the sons of Jeshua, of Kadmiel, of the sons of Hodvah, seventy-four.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the descendants of Hodvah.' The Hebrew literally reads 'the sons of
      Hodvah,' a genealogical expression that can denote a wider family line, not
      only immediate sons.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַלְוִיִּם
  chosen: The Levites
  alternatives:
  - The Levites were
  lexicon: HALOT
  rationale: Definite plural noun introducing the subgroup in the census list. Rendered
    as a heading-like nominative, matching the list style of the surrounding verses
    rather than supplying an unnecessary verb.
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the members of
  lexicon: HALOT
  rationale: In genealogical/census contexts, בְּנֵי commonly marks clan or family
    descent. 'The sons of' preserves the formal structure of the Hebrew while still
    being understandable in English.
- source_word: יֵשׁוּעַ
  chosen: Jeshua
  alternatives:
  - Joshua
  lexicon: HALOT
  rationale: Proper name transliterated according to standard English convention for
    the postexilic figure יֵשׁוּעַ, distinct in English usage from the fuller form
    Joshua.
- source_word: לְקַדְמִיאֵל
  chosen: of Kadmiel
  alternatives:
  - belonging to Kadmiel
  lexicon: HALOT
  rationale: The prefixed ל in this list functions relationally, linking the family
    line. 'Of Kadmiel' is idiomatic and preserves the genealogical connection.
- source_word: לִבְנֵי לְהוֹדְוָה
  chosen: of the sons of Hodvah
  alternatives:
  - of the descendants of Hodvah
  - namely the sons of Hodvah
  lexicon: HALOT
  rationale: The repeated ל with construct chain is best represented by another genealogical
    phrase. Retaining 'sons' reflects the Hebrew structure and avoids flattening the
    layered lineage reference.
- source_word: שִׁבְעִים וְאַרְבָּעָה
  chosen: seventy-four
  alternatives:
  - seventy and four
  lexicon: HALOT
  rationale: Cardinal number giving the census total. Rendered in standard modern
    English as 'seventy-four' rather than the more literal but less natural 'seventy
    and four'.
