id: NEH.7.53
reference: Nehemiah 7:53
source:
  edition: WLC
  text: בְּנֵי בַקְבּ֥וּק בְּנֵֽי חֲקוּפָ֖א בְּנֵ֥י חַרְחֽוּר־־׃
translation:
  text: the sons of Bakbuk, the sons of Hakupha, the sons of Harhur—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of' in this genealogical list can denote descendants or a family/clan
      group, not only immediate sons.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - descendants of
  - members of the clan of
  lexicon: HALOT
  rationale: In this returnee/genealogical list, בְּנֵי is the standard construct
    expression for a family or descendant group. 'The sons of' preserves the formal
    structure and matches the list style, while allowing that the referent may be
    a broader descendant group rather than only immediate male children.
- source_word: בַקְבּוּק
  chosen: Bakbuk
  lexicon: HALOT
  rationale: Proper name; transliterated rather than translated in keeping with the
    translation philosophy for personal/family names.
- source_word: חֲקוּפָא
  chosen: Hakupha
  alternatives:
  - Haqupha
  lexicon: HALOT
  rationale: Proper name; transliterated. 'Hakupha' is a standard English form reflecting
    the Hebrew consonants, while 'Haqupha' is a possible more strictly phonetic alternative.
- source_word: חַרְחוּר
  chosen: Harhur
  lexicon: HALOT
  rationale: Proper name; transliterated rather than translated. The name's lexical
    meaning is uncertain or not contextually relevant here, so a name form is preferred.
