id: NEH.7.37
reference: Nehemiah 7:37
source:
  edition: WLC
  text: בְּנֵי לֹד֙ חָדִ֣יד וְ/אוֹנ֔וֹ שְׁבַ֥ע מֵא֖וֹת וְ/עֶשְׂרִ֥ים וְ/אֶחָֽד־׃ס
translation:
  text: the sons of Lod, Hadid, and Ono, seven hundred twenty-one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the descendants of Lod, Hadid, and Ono.' In genealogical lists, 'sons
      of' can denote a broader clan or community associated with these places.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the men of
  lexicon: HALOT
  rationale: In these returnee/genealogical lists, בְּנֵי commonly introduces a clan
    or the people associated with a place. 'The sons of' preserves the formal structure
    and the idiomatic genealogical register better than the more interpretive 'descendants
    of' or 'men of'.
- source_word: לֹד
  chosen: Lod
  alternatives:
  - Lydda
  lexicon: HALOT
  rationale: This is a place name and should be transliterated rather than translated.
    'Lod' follows the Hebrew form directly; 'Lydda' reflects a later Greek/English
    form and is less appropriate here.
- source_word: חָדִיד
  chosen: Hadid
  lexicon: HALOT
  rationale: Proper place name; transliterated directly from the Hebrew.
- source_word: וְאוֹנוֹ
  chosen: and Ono
  lexicon: HALOT
  rationale: The conjunction וְ is rendered with 'and,' and the place name אוֹנוֹ
    is transliterated 'Ono.' This yields a straightforward list of towns associated
    with the group.
- source_word: שְׁבַע מֵאוֹת וְעֶשְׂרִים וְאֶחָד
  chosen: seven hundred twenty-one
  alternatives:
  - '721'
  lexicon: HALOT
  rationale: The Hebrew cardinal number is rendered in standard readable English words
    rather than numerals in the main text. This preserves the census/list style while
    remaining natural in modern English.
