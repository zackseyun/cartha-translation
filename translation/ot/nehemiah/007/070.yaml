id: NEH.7.70
reference: Nehemiah 7:70
source:
  edition: WLC
  text: וּ/מֵֽ/רָאשֵׁ֣י הָֽ/אָב֗וֹת נָֽתְנוּ֙ לְ/אוֹצַ֣ר הַ/מְּלָאכָ֔ה זָהָ֕ב דַּרְכְּמוֹנִ֖ים
    שְׁתֵּ֣י רִבּ֑וֹת וְ/כֶ֕סֶף מָנִ֖ים אַלְפַּ֥יִם וּ/מָאתָֽיִם׃
translation:
  text: 'And some of the heads of the fathers’ houses gave to the treasury for the
    work: twenty thousand gold darics and two thousand two hundred minas of silver.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A daric was a Persian gold coin.
    reason: cultural_note
  - marker: b
    text: Or, more literally, 'from the heads of the fathers’ houses.'
    reason: lexical_alternative
  - marker: c
    text: A mina was an ancient unit of weight, and by extension of monetary value.
    reason: cultural_note
lexical_decisions:
- source_word: וּמֵרָאשֵׁי הָאָבוֹת
  chosen: And some of the heads of the fathers’ houses
  alternatives:
  - And from the heads of the fathers’ houses
  - And some of the family heads
  lexicon: HALOT
  rationale: The prefixed מִן with רָאשֵׁי indicates 'from among the heads,' yielding
    the idiomatic sense 'some of the heads.' הָאָבוֹת in this genealogical-administrative
    context refers to ancestral households/clans; 'fathers’ houses' preserves the
    Hebrew social structure better than flattening to 'families,' while 'heads' reflects
    רָאשֵׁי.
- source_word: נָתְנוּ
  chosen: gave
  alternatives:
  - contributed
  - donated
  lexicon: HALOT
  rationale: Simple past 'gave' matches the straightforward qal perfect and avoids
    adding interpretive nuance beyond the text.
- source_word: לְאוֹצַר הַמְּלָאכָה
  chosen: to the treasury for the work
  alternatives:
  - to the treasury of the work
  - for the storehouse of the work
  lexicon: HALOT
  rationale: אוֹצָר denotes a treasury/store of valuables; in this contribution context
    'treasury' is the most natural English. הַמְּלָאכָה here refers to the project/work
    being funded, so 'for the work' communicates purpose clearly in English.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Direct material term; no expansion needed.
- source_word: דַּרְכְּמוֹנִים
  chosen: darics
  alternatives:
  - drachmas
  - gold coins
  lexicon: HALOT
  rationale: This denotes the Persian gold coin commonly called the daric. 'Darics'
    preserves the historical specificity better than the generic 'gold coins.' 'Drachmas'
    is less precise here.
- source_word: שְׁתֵּי רִבּוֹת
  chosen: twenty thousand
  alternatives:
  - two myriads
  lexicon: HALOT
  rationale: The Hebrew numeral phrase literally means 'two ten-thousands'; standard
    English number style is 'twenty thousand.'
- source_word: וְכֶסֶף
  chosen: and ... of silver
  alternatives:
  - and silver
  lexicon: HALOT
  rationale: Rendered with 'of silver' after the measure term in English ('minas of
    silver') for natural syntax while preserving the material specified by the Hebrew.
- source_word: מָנִים
  chosen: minas
  alternatives:
  - pounds
  - manehs
  lexicon: HALOT
  rationale: A mina is an ancient weight/monetary unit. 'Minas' preserves the historical
    unit without substituting an inexact modern equivalent.
- source_word: אַלְפַּיִם וּמָאתָיִם
  chosen: two thousand two hundred
  alternatives:
  - two thousand and two hundred
  lexicon: HALOT
  rationale: Standard contemporary English rendering of the numeral sequence.
