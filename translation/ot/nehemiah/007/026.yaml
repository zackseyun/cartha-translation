id: NEH.7.26
reference: Nehemiah 7:26
source:
  edition: WLC
  text: אַנְשֵׁ֤י בֵֽית לֶ֨חֶם֙ וּ/נְטֹפָ֔ה מֵאָ֖ה שְׁמֹנִ֥ים וּ/שְׁמֹנָֽה־׃ס
translation:
  text: the men of Bethlehem and Netophah, one hundred eighty-eight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the people of Bethlehem and Netophah.' The Hebrew literally says 'the
      men of,' a standard expression in census and return lists.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי
  chosen: the men of
  alternatives:
  - the people of
  - the sons of
  lexicon: HALOT
  rationale: Construct plural of אִישׁ here introduces a clan/locality list item and
    is most naturally rendered 'the men of.' This preserves the masculine form present
    in the Hebrew and matches the census/list style of the context better than the
    broader 'people of.'
- source_word: בֵית לֶחֶם
  chosen: Bethlehem
  alternatives:
  - Beth-lehem
  lexicon: HALOT
  rationale: A place name; per translation philosophy, names are transliterated by
    standard English convention rather than translated literally as 'house of bread.'
- source_word: וּנְטֹפָה
  chosen: and Netophah
  alternatives:
  - and Netophahh
  - and the people of Netophah
  lexicon: HALOT
  rationale: Conjunction plus place name. The verse groups Bethlehem and Netophah
    together under one total, so the simple coordinate rendering is best.
- source_word: מֵאָה שְׁמֹנִים וּשְׁמֹנָה
  chosen: one hundred eighty-eight
  alternatives:
  - a hundred and eighty-eight
  - one hundred and eighty-eight
  lexicon: HALOT
  rationale: The Hebrew cardinal sequence totals 188. Modern English style favors
    'one hundred eighty-eight' for readability, while accurately reflecting the number.
