id: NEH.7.39
reference: Nehemiah 7:39
source:
  edition: WLC
  text: הַֽ/כֹּהֲנִ֑ים בְּנֵ֤י יְדַֽעְיָה֙ לְ/בֵ֣ית יֵשׁ֔וּעַ תְּשַׁ֥ע מֵא֖וֹת שִׁבְעִ֥ים
    וּ/שְׁלֹשָֽׁה׃ס
translation:
  text: 'The priests: the sons of Jedaiah, of the house of Jeshua, nine hundred seventy-three.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of' can denote descendants or members of a family line, not
      only immediate sons.
    reason: lexical_alternative
  - marker: b
    text: Or 'Jeshua' could be rendered 'Joshua,' but 'Jeshua' better reflects the
      Hebrew form used in this post-exilic context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֹּהֲנִים
  chosen: The priests
  alternatives:
  - The priestly families
  - The priests were
  lexicon: HALOT
  rationale: Definite plural noun introducing a subgroup within the census list. 'The
    priests' is the plain sense and fits the list format better than supplying a verb.
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the members of
  lexicon: HALOT
  rationale: In genealogical/census contexts, בְּנֵי commonly denotes lineage or clan
    membership. 'The sons of' preserves the formal structure of the Hebrew while still
    being understandable in English.
- source_word: יְדַעְיָה
  chosen: Jedaiah
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: לְבֵית יֵשׁוּעַ
  chosen: of the house of Jeshua
  alternatives:
  - belonging to the house of Jeshua
  - for the house of Jeshua
  lexicon: HALOT
  rationale: בַּיִת in construct with a personal name denotes a household or family
    line. The prefixed ל here functions idiomatically in the list to specify affiliation.
    'Of the house of Jeshua' is natural English and preserves the clan/household sense.
- source_word: יֵשׁוּעַ
  chosen: Jeshua
  alternatives:
  - Joshua
  rationale: This is the post-exilic personal name יֵשׁוּעַ, conventionally rendered
    'Jeshua' in English Ezra-Nehemiah contexts. 'Joshua' is a possible equivalent
    but would obscure the distinct form used here.
- source_word: תְּשַׁע מֵאוֹת שִׁבְעִים וּשְׁלֹשָׁה
  chosen: nine hundred seventy-three
  alternatives:
  - nine hundred and seventy-three
  lexicon: HALOT
  rationale: Cardinal number sequence totaling 973. The hyphenated modern English
    form is clear and readable; omission of 'and' follows contemporary style.
