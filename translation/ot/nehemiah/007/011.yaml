id: NEH.7.11
reference: Nehemiah 7:11
source:
  edition: WLC
  text: בְּנֵֽי פַחַ֥ת מוֹאָ֛ב לִ/בְנֵ֥י יֵשׁ֖וּעַ וְ/יוֹאָ֑ב אַלְפַּ֕יִם וּ/שְׁמֹנֶ֥ה
    מֵא֖וֹת שְׁמֹנָ֥ה עָשָֽׂר־׃ס
translation:
  text: the sons of Pahath-moab, of the sons of Jeshua and Joab, 2,818.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descendants of Pahath-moab ... descendants of Jeshua and Joab.' The
      Hebrew 'sons of' often denotes a wider family line, not only immediate sons.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: In this census/genealogical context, בְּנֵי introduces a family/clan
    grouping. 'The sons of' preserves the formal Hebrew idiom and matches the register
    of returnee lists better than the more interpretive 'descendants of,' though that
    broader sense is implicit.
- source_word: פַחַת מוֹאָב
  chosen: Pahath-moab
  alternatives:
  - Pahath Moab
  lexicon: HALOT
  rationale: This is a proper name and should be transliterated rather than translated,
    per project philosophy. The hyphenated form is a standard English convention for
    this name.
- source_word: לִבְנֵי
  chosen: of the sons of
  alternatives:
  - belonging to the sons of
  - namely the sons of
  lexicon: HALOT
  rationale: 'The prefixed ל here is best taken as marking sub-classification within
    the clan name: ''Pahath-moab, of the sons of Jeshua and Joab.'' Rendering it with
    ''of'' gives clear English while preserving the genealogical relationship.'
- source_word: יֵשׁוּעַ
  chosen: Jeshua
  alternatives:
  - Joshua
  lexicon: HALOT
  rationale: As a postexilic personal name, יֵשׁוּעַ is conventionally transliterated
    'Jeshua.' 'Joshua' would translate toward the fuller Hebrew form rather than reflect
    the form actually present.
- source_word: וְיוֹאָב
  chosen: and Joab
  lexicon: HALOT
  rationale: Simple conjunction plus proper name; transliterated in standard English
    form.
- source_word: אַלְפַּיִם וּשְׁמֹנֶה מֵאוֹת שְׁמֹנָה עָשָׂר
  chosen: 2,818
  alternatives:
  - two thousand eight hundred eighteen
  - two thousand and eight hundred and eighteen
  lexicon: HALOT
  rationale: The Hebrew number is straightforwardly 'two thousand and eight hundred
    eighteen.' Using numerals improves readability in a census list while preserving
    exact quantity.
