id: NEH.7.8
reference: Nehemiah 7:8
source:
  edition: WLC
  text: בְּנֵ֣י פַרְעֹ֔שׁ אַלְפַּ֕יִם מֵאָ֖ה וְ/שִׁבְעִ֥ים וּ/שְׁנָֽיִם׃ס
translation:
  text: the sons of Parosh, 2,172.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the descendants of Parosh." The Hebrew literally says "the sons of Parosh,"
      a clan designation in this register.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: Construct plural of בֵּן introducing a family/clan list. 'The sons of'
    is the standard, formally transparent rendering in genealogical/register contexts,
    while English readers can understand it corporately rather than as only immediate
    male offspring.
- source_word: פַרְעֹשׁ
  chosen: Parosh
  lexicon: HALOT
  rationale: Proper name; per translation philosophy, personal names are transliterated
    rather than translated.
- source_word: אַלְפַּיִם מֵאָה וְשִׁבְעִים וּשְׁנָיִם
  chosen: 2,172
  alternatives:
  - two thousand one hundred seventy-two
  - two thousand, one hundred and seventy-two
  lexicon: HALOT
  rationale: The Hebrew cardinal sequence totals 2,172. Numerals are rendered as digits
    for readability in a census-style list, without changing the sense.
