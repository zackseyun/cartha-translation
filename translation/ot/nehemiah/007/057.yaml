id: NEH.7.57
reference: Nehemiah 7:57
source:
  edition: WLC
  text: בְּנֵ֖י עַבְדֵ֣י שְׁלֹמֹ֑ה בְּנֵי סוֹטַ֥י בְּנֵי סוֹפֶ֖רֶת בְּנֵ֥י פְרִידָֽא־־׃
translation:
  text: 'The sons of Solomon’s servants: the sons of Sotai, the sons of Sophereth,
    the sons of Perida.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descendants of Solomon’s servants.' The Hebrew 'sons of' in genealogical
      lists can denote a broader family line, not only immediate sons.
    reason: lexical_alternative
  - marker: b
    text: Or 'Peridah.' English transliterations of this name vary slightly.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - descendants of
  - members of
  lexicon: HALOT
  rationale: In genealogical and returnee lists, בְּנֵי commonly denotes a family
    line or clan affiliation. 'The sons of' preserves the formal structure of the
    Hebrew list and is standard English for this genre, while allowing that the referent
    may include descendants rather than only immediate sons.
- source_word: עַבְדֵי
  chosen: servants
  alternatives:
  - slaves
  lexicon: HALOT
  rationale: The construct phrase עַבְדֵי שְׁלֹמֹה is a recognized administrative/genealogical
    designation, 'Solomon's servants.' Although עֶבֶד can mean 'slave,' here the expression
    functions as a hereditary class label in the post-exilic lists, and 'servants'
    is the most natural and established rendering without overstating the bonded nuance
    in this context.
- source_word: שְׁלֹמֹה
  chosen: Solomon
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names rather than translate them.
- source_word: סוֹטַי
  chosen: Sotai
  alternatives:
  - Sotay
  rationale: Proper name transliterated into standard English form. Vocalization supports
    'Sotai'; minor spelling variation is possible in English transliteration.
- source_word: סוֹפֶרֶת
  chosen: Sophereth
  alternatives:
  - Sofereth
  rationale: Proper name transliterated rather than translated. Although the consonants
    relate to the root for writing/counting, in this context it is a family name,
    not a common noun, so transliteration is preferable.
- source_word: פְרִידָא
  chosen: Perida
  alternatives:
  - Peridah
  rationale: Proper name transliterated. English versions vary slightly because of
    final vowel representation; 'Perida' follows the consonantal form here and keeps
    the name concise in modern English.
