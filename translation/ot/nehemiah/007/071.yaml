id: NEH.7.71
reference: Nehemiah 7:71
source:
  edition: WLC
  text: וַ/אֲשֶׁ֣ר נָתְנוּ֮ שְׁאֵרִ֣ית הָ/עָם֒ זָהָ֗ב דַּרְכְּמוֹנִים֙ שְׁתֵּ֣י רִבּ֔וֹא
    וְ/כֶ֖סֶף מָנִ֣ים אַלְפָּ֑יִם וְ/כָתְנֹ֥ת כֹּֽהֲנִ֖ים שִׁשִּׁ֥ים וְ/שִׁבְעָֽה׃פ
translation:
  text: And what the rest of the people gave was twenty thousand gold darics, two
    thousand minas of silver, and sixty-seven priests’ tunics.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the remnant of the people gave.' Here 'the rest of the people' is chosen
      because the phrase functions administratively to distinguish the remaining populace
      from previously listed donors, not to make a theological point about a faithful
      remnant.
    reason: lexical_alternative
  - marker: b
    text: A daric was a Persian gold coin.
    reason: cultural_note
  - marker: c
    text: A mina was an ancient unit of weight, and by extension of monetary value.
    reason: cultural_note
lexical_decisions:
- source_word: וַאֲשֶׁר
  chosen: And what
  alternatives:
  - And that which
  - Now what
  lexicon: HALOT
  rationale: Introduces a new item in the list by resumptive relative construction.
    'And what' is natural English while preserving the sense of 'and/as for that which.'
- source_word: נָתְנוּ
  chosen: gave
  alternatives:
  - contributed
  - donated
  lexicon: HALOT
  rationale: Common verb 'give'; in this inventory context 'gave' is sufficiently
    clear and avoids over-interpreting as a formal donation term.
- source_word: שְׁאֵרִית הָעָם
  chosen: the rest of the people
  alternatives:
  - the remnant of the people
  - the remainder of the people
  lexicon: HALOT
  rationale: Although שְׁאֵרִית can mean 'remnant,' here in an administrative donation
    list it most naturally distinguishes the remaining populace from previously named
    groups. 'The rest of the people' is idiomatic and contextually precise.
- source_word: זָהָב דַּרְכְּמוֹנִים
  chosen: gold darics
  alternatives:
  - gold coins
  - darics of gold
  lexicon: HALOT
  rationale: דַּרְכְּמוֹנִים refers to darics, a known Persian gold coin. Retaining
    the specific term preserves historical precision better than the generic 'gold
    coins.'
- source_word: שְׁתֵּי רִבּוֹא
  chosen: twenty thousand
  alternatives:
  - two myriads
  lexicon: HALOT
  rationale: Hebrew idiom literally 'two ten-thousands'; standard English number expression
    is 'twenty thousand.'
- source_word: וְכֶסֶף מָנִים אַלְפָּיִם
  chosen: two thousand minas of silver
  alternatives:
  - two thousand manehs of silver
  - two thousand silver minas
  lexicon: HALOT
  rationale: מָנִים is the plural of a weight/money unit commonly rendered 'mina.'
    Using 'minas' preserves the ancient unit rather than forcing a modern equivalent.
    English order is adjusted for readability.
- source_word: וְכָתְנֹת כֹּהֲנִים
  chosen: priests’ tunics
  alternatives:
  - priestly tunics
  - garments for the priests
  - coats of the priests
  lexicon: HALOT
  rationale: כָּתְנֹת are tunics/long shirts. 'Priests’ tunics' is concise and reflects
    the genitive relation without over-specifying liturgical function.
- source_word: שִׁשִּׁים וְשִׁבְעָה
  chosen: sixty-seven
  alternatives:
  - sixty and seven
  lexicon: HALOT
  rationale: Standard modern English rendering of the number.
