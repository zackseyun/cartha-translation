id: NEH.7.58
reference: Nehemiah 7:58
source:
  edition: WLC
  text: בְּנֵי יַעְלָ֥א בְנֵי דַרְק֖וֹן בְּנֵ֥י גִדֵּֽל־־׃
translation:
  text: the sons of Jaala, the sons of Darkon, the sons of Giddel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some English versions spell the first name 'Jaalah,' reflecting a variant
      spelling tradition and comparison with the parallel list in Ezra 2:56.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: In post-exilic genealogical lists, בְּנֵי commonly introduces a family
    or clan line. 'The sons of' is the most formally accurate and conventional rendering,
    while still understandable in English. Alternatives such as 'descendants of' are
    possible interpretively, but the Hebrew wording itself is literally filial and
    should be preserved here.
- source_word: יַעְלָא
  chosen: Jaala
  alternatives:
  - Jaalah
  lexicon: HALOT
  rationale: This is a proper name and should be transliterated rather than translated,
    per project philosophy. 'Jaala' follows a straightforward transliteration of the
    consonantal form here. An alternative English spelling 'Jaalah' appears in some
    traditions due to orthographic variation and comparison with parallel lists.
- source_word: דַרְקוֹן
  chosen: Darkon
  lexicon: HALOT
  rationale: Proper name transliterated directly from the Hebrew. No translation is
    appropriate.
- source_word: גִדֵּל
  chosen: Giddel
  lexicon: HALOT
  rationale: Proper name transliterated directly from the Hebrew. No translation is
    appropriate.
