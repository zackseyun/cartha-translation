id: NEH.7.72
reference: Nehemiah 7:72
source:
  edition: WLC
  text: וַ/יֵּשְׁב֣וּ הַ/כֹּהֲנִ֣ים וְ/הַ/לְוִיִּ֡ם וְ/הַ/שּׁוֹעֲרִים֩ וְ/הַ/מְשֹׁרְרִ֨ים
    וּ/מִן הָ/עָ֧ם וְ/הַ/נְּתִינִ֛ים וְ/כָל יִשְׂרָאֵ֖ל בְּ/עָרֵי/הֶ֑ם וַ/יִּגַּע֙
    הַ/חֹ֣דֶשׁ הַ/שְּׁבִיעִ֔י וּ/בְנֵ֥י יִשְׂרָאֵ֖ל בְּ/עָרֵי/הֶֽם־־׃
translation:
  text: So the priests, the Levites, the gatekeepers, the singers, some of the people,
    the temple servants, and all Israel lived in their cities. When the seventh month
    arrived, the sons of Israel were in their cities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Nethinim,' a traditional transliteration of the name for this class
      of temple servants.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Israelites' / 'the people of Israel.' The Hebrew reads 'the sons
      of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשְׁבוּ
  chosen: lived
  alternatives:
  - settled
  - dwelt
  lexicon: HALOT
  rationale: ישׁב commonly means to sit, dwell, or live. In this resettlement context,
    'lived' gives natural English while preserving the sense of taking up residence.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering for כהנים; no contextual reason to vary.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard transliterated tribal/clerical designation in English Bible
    usage.
- source_word: הַשּׁוֹעֲרִים
  chosen: the gatekeepers
  alternatives:
  - the porters
  lexicon: HALOT
  rationale: Refers to those assigned to guard/watch the gates. 'Gatekeepers' is clear
    modern English; 'porters' is archaic and potentially misleading.
- source_word: הַמְשֹׁרְרִים
  chosen: the singers
  alternatives:
  - the musicians
  lexicon: HALOT
  rationale: The participial form denotes those who sing, especially in temple service.
    'Singers' is the most direct rendering.
- source_word: וּמִן הָעָם
  chosen: some of the people
  alternatives:
  - and from the people
  - and some of the common people
  lexicon: HALOT
  rationale: The phrase literally means 'and from the people,' idiomatically indicating
    a portion of the non-specialist populace in contrast to the listed temple personnel.
    'Some of the people' captures that partitive sense in natural English.
- source_word: הַנְּתִינִים
  chosen: the temple servants
  alternatives:
  - the Nethinim
  lexicon: HALOT
  rationale: נתינים refers to a recognized class attached to temple service. Translating
    the function ('temple servants') is clearer for modern readers, while the traditional
    transliteration is preserved in a footnote.
- source_word: וְכָל יִשְׂרָאֵל
  chosen: and all Israel
  lexicon: HALOT
  rationale: Conventional and accurate rendering for the collective covenant people.
- source_word: בְּעָרֵיהֶם
  chosen: in their cities
  alternatives:
  - in their towns
  lexicon: HALOT
  rationale: עיר can be rendered 'city' or 'town'; 'cities' matches common biblical
    English and suits the settlement list context.
- source_word: וַיִּגַּע
  chosen: arrived
  alternatives:
  - came
  - drew near
  lexicon: HALOT
  rationale: נגע literally means 'touched/reached,' but with a time expression it
    idiomatically means the month arrived or came. 'Arrived' is natural and preserves
    the temporal transition.
- source_word: הַחֹדֶשׁ הַשְּׁבִיעִי
  chosen: the seventh month
  lexicon: HALOT
  rationale: Direct rendering of the calendrical expression.
- source_word: וּבְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Following the project's gender-accurate principle, בני is rendered 'sons'
    rather than neutralizing it. In context it denotes the covenant people broadly,
    so an alternative is preserved in a footnote for readability.
