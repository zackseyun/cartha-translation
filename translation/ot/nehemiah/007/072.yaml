theological_decisions:
- issue: Gendered collective expression בני ישראל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the people of Israel
  - the Israelites
  rationale: The Hebrew is explicitly masculine plural construct. Per the translation
    philosophy, gender-accurate renderings are preferred over gender-neutral ones
    unless context demands otherwise. Here the phrase functions as a collective ethnonym,
    but the source wording is still preserved in the main text, with a more idiomatic
    alternative noted in a footnote.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Rendering of נתינים
  chosen_reading: temple servants
  alternative_readings:
  - Nethinim
  rationale: This is not a doctrinally contested term, but it is a culturally specific
    institutional designation. Translating its function improves readability while
    preserving the traditional transliteration in a footnote for auditability and
    cross-version comparison.
  doctrine_reference: DOCTRINE.md § Translation philosophy, points 1 and 6
