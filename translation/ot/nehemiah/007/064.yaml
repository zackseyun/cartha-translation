id: NEH.7.64
reference: Nehemiah 7:64
source:
  edition: WLC
  text: אֵ֗לֶּה בִּקְשׁ֧וּ כְתָבָ֛/ם הַ/מִּתְיַחְשִׂ֖ים וְ/לֹ֣א נִמְצָ֑א וַ/יְגֹֽאֲל֖וּ
    מִן הַ/כְּהֻנָּֽה־׃
translation:
  text: These sought their record among those enrolled by genealogy, but it was not
    found, so they were excluded from the priesthood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their genealogical record'; the Hebrew refers to a written document
      establishing lineage.
    reason: lexical_alternative
  - marker: b
    text: Or 'they were disqualified from the priesthood.' The Hebrew verb here conveys
      exclusion from priestly status because their ancestry could not be verified.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These
  alternatives:
  - These men
  - These people
  lexicon: HALOT
  rationale: Demonstrative plural referring back to the group under discussion. 'These'
    is sufficiently clear and avoids adding nouns not present in the Hebrew.
- source_word: בִּקְשׁוּ
  chosen: sought
  alternatives:
  - searched for
  - looked for
  lexicon: HALOT
  rationale: The verb בקשׁ commonly means 'seek' or 'look for.' 'Sought' is concise
    and fits the formal narrative style.
- source_word: כְתָבָם
  chosen: their record
  alternatives:
  - their document
  - their written record
  - their register
  lexicon: HALOT
  rationale: כְּתָב is a writing or written document. In this genealogical-administrative
    context, 'record' best conveys an official written entry without over-specifying
    the exact format.
- source_word: הַמִּתְיַחְשִׂים
  chosen: among those enrolled by genealogy
  alternatives:
  - in the genealogical register
  - among those reckoning themselves by genealogy
  - among those registered by ancestry
  lexicon: HALOT
  rationale: The hitpael participle of יחס refers to establishing or registering lineage.
    The phrase modifies the kind of record being sought. 'Among those enrolled by
    genealogy' communicates the administrative-genealogical sense in readable English.
- source_word: וְלֹא נִמְצָא
  chosen: but it was not found
  alternatives:
  - but they were not found
  - but no record was found
  lexicon: HALOT
  rationale: 'The singular passive/nihal verb naturally takes the sought record as
    the implied subject: ''it was not found.'' This is more textually precise than
    making the people themselves the subject.'
- source_word: וַיְגֹאֲלוּ
  chosen: they were excluded
  alternatives:
  - they were disqualified
  - they were deemed unclean
  - they were defiled
  lexicon: HALOT
  rationale: From גאל in the passive/converted form here, the sense in context is
    being treated as unfit or excluded from priestly status because genealogy could
    not be verified. 'Excluded' captures the practical result without importing ritual
    terminology too strongly. 'Defiled' would be too literal and potentially misleading
    in English here.
- source_word: מִן הַכְּהֻנָּה
  chosen: from the priesthood
  alternatives:
  - from serving as priests
  - from the priestly office
  lexicon: HALOT
  rationale: כְּהֻנָּה denotes priesthood or priestly office. 'From the priesthood'
    is the most direct rendering and preserves the institutional sense.
