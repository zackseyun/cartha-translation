id: NEH.7.21
reference: Nehemiah 7:21
source:
  edition: WLC
  text: בְּנֵֽי אָטֵ֥ר לְ/חִזְקִיָּ֖ה תִּשְׁעִ֥ים וּ/שְׁמֹנָֽה־׃ס
translation:
  text: 'the sons of Ater, of Hezekiah: ninety-eight.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'the descendants of Ater, namely of Hezekiah,' indicating a
      specific branch of the Ater clan.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the members of
  lexicon: HALOT
  rationale: Construct plural of בֵּן in genealogical/census contexts commonly denotes
    a family line or clan membership. 'The sons of' preserves the formal structure
    and conventional register of these returnee lists, while still being understandable
    in modern English.
- source_word: אָטֵר
  chosen: Ater
  rationale: Proper personal/family name; transliterated according to the translation
    philosophy to transliterate names rather than translate them.
- source_word: לְחִזְקִיָּה
  chosen: of Hezekiah
  alternatives:
  - belonging to Hezekiah
  - for Hezekiah
  lexicon: HALOT
  rationale: 'The prefixed ל here most naturally marks affiliation/subdivision within
    the family line: ''Ater, of Hezekiah,'' distinguishing this branch from others.
    ''Of Hezekiah'' is concise and idiomatic in an English census list.'
- source_word: תִּשְׁעִים וּשְׁמֹנָה
  chosen: ninety-eight
  lexicon: HALOT
  rationale: Cardinal number rendered in standard contemporary English form. Hyphenation
    follows normal English style for compound numbers from twenty-one to ninety-nine.
