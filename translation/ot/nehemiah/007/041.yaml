lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: In this census/list context, בְּנֵי introduces a family or clan grouping.
    'The sons of' is the standard, formally transparent rendering, while readers can
    understand it corporately rather than as only immediate male offspring.
- source_word: פַשְׁחוּר
  chosen: Pashhur
  rationale: Personal name; per translation philosophy, names are transliterated rather
    than translated.
- source_word: אֶלֶף מָאתַיִם אַרְבָּעִים וְשִׁבְעָה
  chosen: 1,247
  alternatives:
  - one thousand two hundred forty-seven
  - a thousand two hundred and forty-seven
  lexicon: HALOT
  rationale: The Hebrew cardinal sequence totals 1,247. Numerals are rendered in modern
    English figure style for readability in a census list, without changing the meaning.
