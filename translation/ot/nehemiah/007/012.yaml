id: NEH.7.12
reference: Nehemiah 7:12
source:
  edition: WLC
  text: בְּנֵ֣י עֵילָ֔ם אֶ֕לֶף מָאתַ֖יִם חֲמִשִּׁ֥ים וְ/אַרְבָּעָֽה׃ס
translation:
  text: the sons of Elam, 1,254.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: Construct plural of בֵּן in genealogical/register contexts commonly denotes
    a family line or clan membership. 'The sons of' preserves the formal structure
    and the male-line/genealogical idiom of the Hebrew, while remaining natural in
    English.
- source_word: עֵילָם
  chosen: Elam
  lexicon: HALOT
  rationale: 'Proper name transliterated according to the translation philosophy:
    names are transliterated rather than translated. In this context it refers to
    the family/clan name Elam in the returnee list, not the geopolitical region as
    such.'
- source_word: אֶלֶף מָאתַיִם חֲמִשִּׁים וְאַרְבָּעָה
  chosen: 1,254
  alternatives:
  - one thousand two hundred fifty-four
  - 1,254 persons
  lexicon: HALOT
  rationale: The Hebrew cardinal sequence totals 1,254. Numerals are rendered in standard
    modern English numeric form for readability in a census/list context. 'Persons'
    is not explicit in the Hebrew and is therefore omitted from the main text.
