id: NEH.7.55
reference: Nehemiah 7:55
source:
  edition: WLC
  text: בְּנֵי בַרְק֥וֹס בְּֽנֵי סִֽיסְרָ֖א בְּנֵי תָֽמַח־־־׃
translation:
  text: the sons of Barkos, the sons of Sisera, the sons of Temah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Tamah.”
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of בֵּן and in genealogical/list contexts
    commonly denotes a family line or clan membership. 'The sons of' is the most direct
    and conventional rendering, preserving the formal structure of the register. Alternatives
    such as 'descendants of' are possible interpretively, but the Hebrew wording itself
    is retained in English.
- source_word: בַרְקוֹס
  chosen: Barkos
  rationale: Proper name; transliterated rather than translated in keeping with the
    translation philosophy for personal or family names.
- source_word: סִיסְרָא
  chosen: Sisera
  rationale: Proper name; transliterated by standard English convention. Although
    the name is known elsewhere in Scripture, here it functions simply as a family
    designation within a list.
- source_word: תָמַח
  chosen: Temah
  alternatives:
  - Tamah
  rationale: Proper name; transliterated. The consonantal form here supports 'Temah'
    as a straightforward transliteration. 'Tamah' reflects a possible alternate vocalized/transliterated
    form seen in some English traditions, so it is preserved in a footnote as a lexical
    alternative.
