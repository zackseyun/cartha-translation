id: NEH.7.59
reference: Nehemiah 7:59
source:
  edition: WLC
  text: בְּנֵ֧י שְׁפַטְיָ֣ה בְנֵֽי חַטִּ֗יל בְּנֵ֛י פֹּכֶ֥רֶת הַצְּבָיִ֖ים בְּנֵ֥י
    אָמֽוֹן־׃
translation:
  text: the sons of Shephatiah, the sons of Hattil, the sons of Pochereth-hazzebaim,
    the sons of Amon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'the descendants of' throughout the verse; Hebrew 'sons of'
      often denotes a family line in genealogical lists.
    reason: lexical_alternative
  - marker: b
    text: Pochereth-hazzebaim may also be represented as 'Pochereth of Zebaim'; the
      Hebrew is preserved here as a proper name.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: Construct plural of בֵּן in a genealogical/list context. 'The sons of'
    is the most direct and conventional rendering in returnee lists, preserving the
    formal structure of the Hebrew while allowing that the phrase can denote a family
    line rather than only immediate male offspring.
- source_word: שְׁפַטְיָה
  chosen: Shephatiah
  alternatives:
  - Shephatya
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention, following
    the translation philosophy to transliterate personal names rather than translate
    them.
- source_word: חַטִּיל
  chosen: Hattil
  lexicon: HALOT
  rationale: Proper name transliterated directly. No translation is attempted because
    this is a personal/family name in a list.
- source_word: פֹּכֶרֶת הַצְּבָיִים
  chosen: Pochereth-hazzebaim
  alternatives:
  - Pochereth of Zebaim
  - Pokereth-hazzebaim
  lexicon: HALOT
  rationale: The expression functions here as a proper family name and is best preserved
    by transliteration rather than being broken into a translated phrase. The maqqeph-like
    linkage in English with a hyphen helps signal that the two Hebrew elements belong
    together as one name. An alternative would be to render it more analytically ('Pochereth
    of Zebaim'), but the list format favors name preservation.
- source_word: אָמֽוֹן
  chosen: Amon
  alternatives:
  - Amon
  lexicon: HALOT
  rationale: Proper name transliterated in standard English form. This is a family
    designation in the list, not the common noun 'artisan' or a theological term.
