id: NEH.7.3
reference: Nehemiah 7:3
source:
  edition: WLC
  text: ו/יאמר לָ/הֶ֗ם לֹ֣א יִפָּֽתְח֞וּ שַׁעֲרֵ֤י יְרוּשָׁלִַ֨ם֙ עַד חֹ֣ם הַ/שֶּׁ֔מֶשׁ
    וְ/עַ֨ד הֵ֥ם עֹמְדִ֛ים יָגִ֥יפוּ הַ/דְּלָת֖וֹת וֶ/אֱחֹ֑זוּ וְ/הַעֲמֵ֗יד מִשְׁמְרוֹת֙
    יֹשְׁבֵ֣י יְרוּשָׁלִַ֔ם אִ֚ישׁ בְּ/מִשְׁמָר֔/וֹ וְ/אִ֖ישׁ נֶ֥גֶד בֵּיתֽ/וֹ־׃
translation:
  text: And I said to them, “The gates of Jerusalem must not be opened until the sun
    is hot. While they are still standing guard, let them shut the doors and secure
    them. And appoint guards from the inhabitants of Jerusalem, each at his watch
    and each opposite his own house.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “until the sun grows hot,” that is, not merely at sunrise but later in
      the morning.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “hold them”; in context this means to fasten or secure the doors
      after shutting them.
    reason: lexical_alternative
  - marker: c
    text: Or “appoint watches from among the inhabitants of Jerusalem.” The Hebrew
      term can refer either to guards or to guard-duties/watches.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִפָּתְחוּ
  chosen: must not be opened
  alternatives:
  - are not to be opened
  - should not be opened
  lexicon: HALOT
  rationale: Niphal imperfect of פתח is passive/reflexive in sense here; English passive
    best matches 'the gates ... be opened.' The prohibitive לא with imperfect is rendered
    as an instruction with force stronger than mere prediction.
- source_word: שַׁעֲרֵי יְרוּשָׁלִַם
  chosen: the gates of Jerusalem
  alternatives:
  - Jerusalem’s gates
  lexicon: HALOT
  rationale: Construct chain straightforwardly denotes the city gates; retained in
    natural English.
- source_word: עַד חֹם הַשֶּׁמֶשׁ
  chosen: until the sun is hot
  alternatives:
  - until the sun grows hot
  - until broad daylight
  lexicon: HALOT
  rationale: חֹם is 'heat'; the phrase refers not merely to sunrise but to the sun
    becoming warm/high, implying later in the morning for security. 'Until the sun
    is hot' preserves the concrete Hebrew image better than the interpretive 'broad
    daylight.'
- source_word: וְעַד הֵם עֹמְדִים
  chosen: while they are still standing guard
  alternatives:
  - while they are standing
  - while these men are at their posts
  lexicon: HALOT
  rationale: עמד literally means 'stand,' but in guard context it implies being on
    duty/at post. 'Standing guard' makes the idiomatic force clear without over-paraphrasing.
- source_word: יָגִיפוּ
  chosen: let them shut
  alternatives:
  - they shall shut
  - let them close
  lexicon: HALOT
  rationale: הגיף commonly means shut/close (especially doors). Given the instructional
    sequence, an English jussive-like imperative ('let them shut') fits the context
    better than a simple future.
- source_word: הַדְּלָתוֹת
  chosen: the doors
  alternatives:
  - the door-leaves
  - the gate-doors
  lexicon: HALOT
  rationale: Refers to the actual doors/leaves of the gates. 'Doors' is natural English
    and sufficient in context with 'gates of Jerusalem' already stated.
- source_word: וֶאֱחֹזוּ
  chosen: secure them
  alternatives:
  - bar them
  - fasten them
  lexicon: HALOT
  rationale: From אחז, literally 'grasp/hold.' In context after shutting doors, it
    denotes making them fast/secure. 'Secure them' captures the practical sense without
    specifying a mechanism not explicit in the Hebrew.
- source_word: וְהַעֲמֵיד
  chosen: appoint
  alternatives:
  - station
  - set
  lexicon: HALOT
  rationale: Hiphil of עמד means cause to stand/set in place. With משמרות, the sense
    is to assign or station guards. 'Appoint' fits the administrative command; the
    guarding function is then expressed in the object phrase.
- source_word: מִשְׁמְרוֹת
  chosen: guards
  alternatives:
  - watches
  - guard-posts
  - watchmen
  lexicon: HALOT
  rationale: The noun can denote watches/guard duties. Here, with 'from the inhabitants
    of Jerusalem' and 'each at his watch,' rendering the first occurrence as 'guards'
    avoids awkward repetition while preserving the second as 'watch' for the assigned
    duty.
- source_word: יֹשְׁבֵי יְרוּשָׁלִַם
  chosen: from the inhabitants of Jerusalem
  alternatives:
  - from the residents of Jerusalem
  lexicon: HALOT
  rationale: 'Partitive sense is implied: guards are to be appointed from among the
    city''s residents.'
- source_word: אִישׁ בְּמִשְׁמָרוֹ
  chosen: each at his watch
  alternatives:
  - each at his post
  - each in his guard-duty
  lexicon: HALOT
  rationale: איש distributive 'each'; משמר can mean watch/post/duty. 'At his watch'
    preserves the lexical link to משמרות while remaining readable.
- source_word: וְאִישׁ נֶגֶד בֵּיתוֹ
  chosen: and each opposite his own house
  alternatives:
  - and each in front of his own house
  - and each near his own house
  lexicon: HALOT
  rationale: נגד means opposite/in front of. The instruction likely places defenders
    near their homes; 'opposite his own house' is the most literal and leaves the
    exact spatial nuance intact.
