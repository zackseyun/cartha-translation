id: NEH.7.44
reference: Nehemiah 7:44
source:
  edition: WLC
  text: הַֽ/מְשֹׁרְרִ֑ים בְּנֵ֣י אָסָ֔ף מֵאָ֖ה אַרְבָּעִ֥ים וּ/שְׁמֹנָֽה׃ס
translation:
  text: 'The singers: the sons of Asaph, one hundred forty-eight.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the descendants of Asaph.' The Hebrew 'sons of' can denote a family
      line or guild membership, not only immediate sons.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְשֹׁרְרִים
  chosen: the singers
  alternatives:
  - the singing men
  - the musicians
  lexicon: HALOT
  rationale: The participial form from שׁיר denotes those who sing. In this census-style
    list, 'the singers' is the most natural and established English rendering, more
    precise than the broader 'musicians' and more idiomatic than 'the singing men'.
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the members of
  lexicon: HALOT
  rationale: In genealogical and clan designations, בְּנֵי commonly means 'sons of'
    and can extend to descendants or members of a guild/family line. Here 'the sons
    of Asaph' preserves the formal lineage expression used throughout the register.
- source_word: אָסָף
  chosen: Asaph
  rationale: 'Personal name transliterated according to the translation philosophy:
    names are transliterated rather than translated.'
- source_word: מֵאָה אַרְבָּעִים וּשְׁמֹנָה
  chosen: one hundred forty-eight
  alternatives:
  - a hundred and forty-eight
  lexicon: HALOT
  rationale: The Hebrew cardinal number sequence is straightforward. 'One hundred
    forty-eight' is clear modern English; 'a hundred and forty-eight' is a stylistic
    alternative but less consistent for formal census totals.
