id: NEH.7.6
reference: Nehemiah 7:6
source:
  edition: WLC
  text: אֵ֣לֶּה בְּנֵ֣י הַ/מְּדִינָ֗ה הָ/עֹלִים֙ מִ/שְּׁבִ֣י הַ/גּוֹלָ֔ה אֲשֶׁ֣ר הֶגְלָ֔ה נְבוּכַדְנֶצַּ֖ר מֶ֣לֶךְ בָּבֶ֑ל וַ/יָּשׁ֧וּבוּ לִֽ/ירוּשָׁלִַ֛ם וְ/לִ/יהוּדָ֖ה אִ֥ישׁ לְ/עִירֽ/וֹ׀׃
translation:
  text: 'These are the sons of the province who came up from the captivity of the exiles, whom Nebuchadnezzar king of Babylon had carried away, and who returned to Jerusalem and to Judah, each man to his city:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more smoothly, 'from the exile.' The Hebrew more literally reads 'from the captivity of the exiles,' preserving both related nouns.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'each man to his city,' a distributive expression referring to the returnees by household or family units.
    reason: lexical_alternative
  - marker: c
    text: Or 'and they returned'.
    reason: previous_rendering
lexical_decisions:
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - people of
  - members of
  lexicon: HALOT
  rationale: Literally 'sons of.' In this genealogical/list context, the Hebrew idiom marks those belonging to or descended from the province. 'Sons of' preserves the source form and fits the register of a returnee list better than a flattened 'people of.'
- source_word: הַמְּדִינָה
  chosen: the province
  alternatives:
  - the district
  - the state
  lexicon: HALOT
  rationale: מְדִינָה in Persian-period administrative contexts refers to a province or administrative district. 'Province' is the most natural historical equivalent in English.
- source_word: הָעֹלִים
  chosen: who came up
  alternatives:
  - who went up
  - the ones going up
  lexicon: HALOT
  rationale: עלה is the standard verb for going up to the land/Jerusalem. 'Came up' works idiomatically from the narrator's perspective while preserving the conventional ascent language.
- source_word: מִשְּׁבִי הַגּוֹלָה
  chosen: from the captivity of the exiles
  alternatives:
  - from the captivity of the deportation
  - from the exile
  - from the captive exiles
  lexicon: HALOT
  rationale: The paired nouns emphasize the state of being taken captive/exiled. 'Captivity of the exiles' preserves both terms without over-paraphrasing. A smoother but less explicit option would be simply 'from the exile.'
- source_word: אֲשֶׁר הֶגְלָה
  chosen: whom ... had carried away
  alternatives:
  - whom ... had exiled
  - whom ... had deported
  lexicon: HALOT
  rationale: The relative clause refers to the exiles as the object of Nebuchadnezzar's action. 'Had carried away' is idiomatic English for forced removal and matches the historical sense; 'deported' is possible but more bureaucratic in tone.
- source_word: נְבוּכַדְנֶצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  rationale: Standard English transliteration and the familiar biblical form.
- source_word: וַיָּשׁוּבוּ
  chosen: and they returned
  alternatives:
  - and they came back
  lexicon: HALOT
  rationale: שׁוּב commonly means 'return.' 'Returned' suits the formal narrative style.
- source_word: לִירוּשָׁלַם וְלִיהוּדָה
  chosen: to Jerusalem and to Judah
  alternatives:
  - to Jerusalem and Judah
  lexicon: HALOT
  rationale: The repeated preposition is represented for clarity and rhythm. Judah here denotes the wider region/province, not merely the tribe.
- source_word: אִישׁ לְעִירוֹ
  chosen: each man to his city
  alternatives:
  - each to his city
  - every man to his town
  lexicon: HALOT
  rationale: This distributive expression is literally 'a man to his city.' Because the Hebrew uses masculine singular representative language, 'each man' best reflects the form and the list-oriented style; it is not intended to exclude households.
