theological_decisions:
- issue: Gendered representative language in אִישׁ
  chosen_reading: each man to his city
  alternative_readings:
  - each to his city
  - each person to his city
  rationale: Per the translation philosophy's gender-accurate principle, the masculine singular representative form is preserved rather than neutralized. In context it functions distributively for returnees/households, but the Hebrew form is still masculine.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
revisions:
- timestamp: '2026-04-21T12:34:42Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/nehemiah/007/006.json
  category: awkward_english
  tier: 1
  from: and they returned
  to: and who returned
  rationale: The current rendering creates a compound sentence where the second main clause ('and they returned') feels tacked on after a long series of subordinate clauses, making the sentence structure clunky. Rephrasing this as a second relative clause ('and who returned') creates a parallel structure with the earlier 'who came up'. This is more elegant in English and arguably better reflects the Hebrew syntax, where both the participle (הָעֹלִים) and the finite verb (וַיָּשׁוּבוּ) function to describe the 'sons of the province'.
