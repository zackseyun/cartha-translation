id: NEH.7.36
reference: Nehemiah 7:36
source:
  edition: WLC
  text: בְּנֵ֣י יְרֵח֔וֹ שְׁלֹ֥שׁ מֵא֖וֹת אַרְבָּעִ֥ים וַ/חֲמִשָּֽׁה׃ס
translation:
  text: the sons of Jericho, three hundred forty-five.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the men of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'sons.' In genealogical/census contexts
    it can denote descendants or members of a group, but 'sons of' preserves the Hebrew
    form most transparently and is natural in this register.
- source_word: יְרֵחוֹ
  chosen: Jericho
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard English convention as required
    by the translation philosophy.
- source_word: שְׁלֹשׁ מֵאוֹת אַרְבָּעִים וַחֲמִשָּׁה
  chosen: three hundred forty-five
  alternatives:
  - three hundred and forty-five
  lexicon: HALOT
  rationale: The Hebrew cardinal sequence straightforwardly totals 345. The main text
    uses contemporary readable English style without 'and,' consistent with modern
    Bible English.
