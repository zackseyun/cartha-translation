id: NEH.7.47
reference: Nehemiah 7:47
source:
  edition: WLC
  text: בְּנֵי קֵירֹ֥ס בְּנֵי סִיעָ֖א בְּנֵ֥י פָדֽוֹן־־׃
translation:
  text: the sons of Keros, the sons of Sia, the sons of Padon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descendants of' for each occurrence of 'sons of'; the Hebrew genealogical
      formula can denote a broader family line, not only immediate male children.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - descendants of
  - members of the family of
  lexicon: HALOT
  rationale: Construct plural of בֵּן in this genealogical/list context denotes a
    family line or clan affiliation. 'The sons of' preserves the formal structure
    and conventional register of returnee lists while remaining natural English.
- source_word: קֵירֹס
  chosen: Keros
  alternatives:
  - Qeros
  rationale: Proper name transliterated rather than translated, following the translation
    philosophy for personal/family names. 'Keros' reflects a standard English transliteration
    from the Hebrew form.
- source_word: סִיעָא
  chosen: Sia
  alternatives:
  - Siaa
  - Siah
  rationale: Proper name transliterated. 'Sia' gives a readable standard English form
    from the Hebrew spelling without adding interpretive meaning.
- source_word: פָדוֹן
  chosen: Padon
  alternatives:
  - Pedon
  rationale: Proper name transliterated. 'Padon' is a straightforward rendering of
    the Hebrew consonants and vowels in English form.
