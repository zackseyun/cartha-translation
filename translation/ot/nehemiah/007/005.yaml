id: NEH.7.5
reference: Nehemiah 7:5
source:
  edition: WLC
  text: וַ/יִּתֵּ֤ן אֱלֹהַ/י֙ אֶל לִבִּ֔/י וָ/אֶקְבְּצָ֞/ה אֶת הַ/חֹרִ֧ים וְ/אֶת הַ/סְּגָנִ֛ים
    וְ/אֶת הָ/עָ֖ם לְ/הִתְיַחֵ֑שׂ וָֽ/אֶמְצָ֗א סֵ֤פֶר הַ/יַּ֨חַשׂ֙ הָ/עוֹלִ֣ים בָּ/רִאשׁוֹנָ֔ה
    וָ/אֶמְצָ֖א כָּת֥וּב בּֽ/וֹ־־־־׃פ
translation:
  text: 'Then my God put it into my heart to gather the nobles, the officials, and
    the people to be enrolled by genealogy. And I found the book of the genealogy
    of those who came up first, and I found written in it:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to register by genealogy.' The Hebrew refers to official enrollment
      according to family lineage.
    reason: lexical_alternative
  - marker: b
    text: Or 'the genealogical record of those who came up at the first.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן אֱלֹהַי אֶל לִבִּי
  chosen: Then my God put it into my heart
  alternatives:
  - Then my God gave it to my heart
  - Then my God laid it on my heart
  lexicon: HALOT
  rationale: The idiom literally reads 'my God gave to my heart.' In English, 'put
    it into my heart' preserves both the divine initiative and the inward prompting
    without sounding unnatural. 'Laid it on my heart' is idiomatic but slightly more
    interpretive and contemporary.
- source_word: וָאֶקְבְּצָה
  chosen: to gather
  alternatives:
  - and I gathered
  - that I should gather
  lexicon: HALOT
  rationale: 'Following the preceding idiom, the cohortative-like form is best represented
    as the content of what God prompted Nehemiah to do: ''to gather.'' This avoids
    an awkward sequence while preserving purpose/intention.'
- source_word: הַחֹרִים
  chosen: the nobles
  alternatives:
  - the free men
  - the aristocrats
  lexicon: HALOT
  rationale: In Nehemiah this term commonly refers to social leaders or nobles, not
    merely 'free men.' 'Nobles' is the clearest contextual rendering in administrative
    and civic settings.
- source_word: הַסְּגָנִים
  chosen: the officials
  alternatives:
  - the deputies
  - the prefects
  - the rulers
  lexicon: HALOT
  rationale: The term denotes subordinate rulers or administrative officials. 'Officials'
    is readable modern English and fits the civic context better than the more technical
    'deputies' or 'prefects.'
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the populace
  lexicon: HALOT
  rationale: Standard rendering for עם in this context; it naturally contrasts with
    the nobles and officials.
- source_word: לְהִתְיַחֵשׂ
  chosen: to be enrolled by genealogy
  alternatives:
  - to register by genealogy
  - to be reckoned by ancestry
  lexicon: HALOT
  rationale: The hitpael of יחס refers to establishing or registering one's lineage.
    'Enrolled by genealogy' communicates an official registration process tied to
    family descent, fitting the post-exilic census context.
- source_word: סֵפֶר הַיַּחַשׂ
  chosen: the book of the genealogy
  alternatives:
  - the genealogical record
  - the book of the genealogical record
  lexicon: HALOT
  rationale: A fairly formal rendering is appropriate because this refers to an actual
    written register. 'Book of the genealogy' stays close to the Hebrew while remaining
    understandable.
- source_word: הָעוֹלִים
  chosen: those who came up
  alternatives:
  - the returnees
  - those who went up
  lexicon: HALOT
  rationale: The participle refers to those who went up from exile to Jerusalem/Judah.
    'Those who came up' preserves the biblical idiom of ascent to the land/city without
    over-paraphrasing to 'returnees,' though that sense is present.
- source_word: בָּרִאשׁוֹנָה
  chosen: first
  alternatives:
  - at the first
  - formerly
  lexicon: HALOT
  rationale: Here it modifies the earlier group of returnees, i.e., the first wave.
    'First' is concise and natural in English.
- source_word: וָאֶמְצָא כָּתוּב בּוֹ
  chosen: 'and I found written in it:'
  alternatives:
  - 'and I found in it written:'
  - 'and I found this written in it:'
  lexicon: HALOT
  rationale: This introduces the document's contents in the following verses. The
    English keeps the Hebrew sequence and prepares for the quotation/list that follows.
