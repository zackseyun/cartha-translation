theological_decisions:
- issue: Divine prompting language in Nehemiah's leadership
  chosen_reading: Then my God put it into my heart
  alternative_readings:
  - Then my God gave it to my heart
  - Then God inspired me
  rationale: The Hebrew presents God's action as an inward prompting without specifying
    a mode of revelation. The chosen rendering preserves that theological tension
    and avoids overstating it as formal inspiration or reducing it to mere personal
    reflection.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
