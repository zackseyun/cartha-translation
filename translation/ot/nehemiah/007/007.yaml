id: NEH.7.7
reference: Nehemiah 7:7
source:
  edition: WLC
  text: הַ/בָּאִ֣ים עִם זְרֻבָּבֶ֗ל יֵשׁ֡וּעַ נְחֶמְיָ֡ה עֲ֠זַרְיָה רַֽעַמְיָ֨ה נַחֲמָ֜נִי
    מָרְדֳּכַ֥י בִּלְשָׁ֛ן מִסְפֶּ֥רֶת בִּגְוַ֖י נְח֣וּם בַּעֲנָ֑ה מִסְפַּ֕ר אַנְשֵׁ֖י
    עַ֥ם יִשְׂרָאֵֽל־׃ס
translation:
  text: 'those who came with Zerubbabel were Jeshua, Nehemiah, Azariah, Raamiah, Nahamani,
    Mordecai, Bilshan, Mispereth, Bigvai, Nehum, and Baanah. The number of the men
    of the people of Israel:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: In the parallel list at Ezra 2:2, the name appears as Reelaiah.
    reason: alternative_reading
  - marker: b
    text: In the parallel list at Ezra 2:2, the name appears as Rehum.
    reason: alternative_reading
  - marker: c
    text: This clause introduces the census total that continues in the next verse.
    reason: cross_reference
lexical_decisions:
- source_word: הַבָּאִים
  chosen: those who came
  alternatives:
  - the ones coming
  - those who were coming
  lexicon: HALOT
  rationale: The participle with article functions substantivally, referring to a
    defined group. English idiom prefers the relative clause 'those who came' in this
    list-introduction context.
- source_word: עִם
  chosen: with
  lexicon: HALOT
  rationale: Standard accompaniment preposition; no contextual reason to expand.
- source_word: זְרֻבָּבֶל
  chosen: Zerubbabel
  rationale: Personal name transliterated by standard English convention per translation
    philosophy.
- source_word: יֵשׁוּעַ
  chosen: Jeshua
  alternatives:
  - Joshua
  rationale: This postexilic personal name is conventionally rendered 'Jeshua' in
    Ezra-Nehemiah to distinguish it from other figures commonly called Joshua in English
    tradition, while remaining a faithful transliteration.
- source_word: נְחֶמְיָה
  chosen: Nehemiah
  rationale: Standard transliteration of the personal name.
- source_word: עֲזַרְיָה
  chosen: Azariah
  rationale: Standard transliteration of the personal name.
- source_word: רַעַמְיָה
  chosen: Raamiah
  alternatives:
  - Reelaiah
  rationale: The MT here reads Raamiah; the parallel list in Ezra 2:2 has a different
    name form. The main text follows the Hebrew of Nehemiah, while the parallel is
    worth preserving in a footnote as an alternative reading across traditions.
- source_word: נַחֲמָנִי
  chosen: Nahamani
  rationale: Standard transliteration of the personal name as pointed in the MT.
- source_word: מָרְדֳּכַי
  chosen: Mordecai
  rationale: Standard transliteration of the personal name; not necessarily the same
    individual as the better-known Mordecai in Esther.
- source_word: בִּלְשָׁן
  chosen: Bilshan
  rationale: Standard transliteration of the personal name.
- source_word: מִסְפֶּרֶת
  chosen: Mispereth
  alternatives:
  - Mispereth/Misperet
  rationale: The proper noun is transliterated; English convention varies slightly
    in final consonant representation, but 'Mispereth' reflects the MT form well.
- source_word: בִּגְוַי
  chosen: Bigvai
  rationale: Standard transliteration of the personal name.
- source_word: נְחוּם
  chosen: Nehum
  alternatives:
  - Rehum
  rationale: The MT of Nehemiah reads Nehum, while the parallel in Ezra 2:2 reads
    Rehum. The main text follows the present Hebrew text; the parallel form is preserved
    in a footnote.
- source_word: בַּעֲנָה
  chosen: Baanah
  rationale: Standard transliteration of the personal name.
- source_word: מִסְפַּר
  chosen: The number
  alternatives:
  - the total number
  lexicon: HALOT
  rationale: Introduces the census total that follows in the next verse. 'The number'
    is the most direct rendering.
- source_word: אַנְשֵׁי
  chosen: the men of
  alternatives:
  - the people of
  - the men from
  lexicon: HALOT
  rationale: Construct form of אִישׁ here is explicitly masculine plural. Per gender-accurate
    philosophy, 'men of' is retained rather than neutralized, while the broader phrase
    still denotes the Israelite populace represented in the census.
- source_word: עַם יִשְׂרָאֵל
  chosen: the people of Israel
  alternatives:
  - Israel's people
  lexicon: HALOT
  rationale: Standard construct phrase for the national community; rendered naturally
    in English.
