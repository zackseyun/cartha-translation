theological_decisions:
- issue: Gendered census language in אַנְשֵׁי עַם יִשְׂרָאֵל
  chosen_reading: the men of the people of Israel
  alternative_readings:
  - the people of Israel
  - the men of Israel
  rationale: The Hebrew uses an explicitly masculine plural construct ('men of') followed
    by 'the people of Israel.' To preserve source-form accuracy without overinterpreting,
    the translation keeps the masculine term rather than flattening it to a generic
    collective. This is a lexical-gender decision, not a theological claim about exclusion.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
- issue: Name forms differing from Ezra 2:2
  chosen_reading: Follow the MT forms in Nehemiah (Raamiah, Nehum) in the main text
  alternative_readings:
  - Reelaiah
  - Rehum
  rationale: The translation follows the source text of the verse being translated,
    while preserving notable parallel-list differences in footnotes rather than harmonizing
    across books.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    Preserve theological tension rather than resolve it'
