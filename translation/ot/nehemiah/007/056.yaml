id: NEH.7.56
reference: Nehemiah 7:56
source:
  edition: WLC
  text: בְּנֵ֥י נְצִ֖יחַ בְּנֵ֥י חֲטִיפָֽא׃
translation:
  text: the sons of Neziah, the sons of Hatipha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descendants of Neziah ... descendants of Hatipha.' The Hebrew idiom
      'sons of' often denotes a family line or clan in genealogical lists.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - descendants of
  - members of the clan of
  lexicon: HALOT
  rationale: In these post-exilic genealogical lists, בְּנֵי literally means 'sons
    of' but functions as a standard clan/descendant formula. 'The sons of' preserves
    the formal list structure and matches the source wording, while readers can understand
    it corporately.
- source_word: נְצִיחַ
  chosen: Neziah
  alternatives:
  - Netsiah
  - Netsiakh
  lexicon: HALOT
  rationale: This is a proper name and should be transliterated rather than translated,
    following the project's policy for personal names. 'Neziah' is a conventional
    English transliteration for this Hebrew form.
- source_word: חֲטִיפָא
  chosen: Hatipha
  alternatives:
  - Hatifa
  - Chatipha
  lexicon: HALOT
  rationale: This is a proper name in a genealogical register and is best represented
    by transliteration. 'Hatipha' reflects a standard English form while remaining
    close to the Hebrew consonants and vowels.
