id: NEH.7.51
reference: Nehemiah 7:51
source:
  edition: WLC
  text: בְּנֵי גַזָּ֥ם בְּנֵי עֻזָּ֖א בְּנֵ֥י פָסֵֽחַ־־׃
translation:
  text: the sons of Gazzam, the sons of Uzza, the sons of Paseah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descendants of' for each occurrence of 'sons of'; the Hebrew genealogical
      formula can denote a broader family line, not only immediate male children.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - members of the clan of
  lexicon: HALOT
  rationale: Construct plural of בֵּן in a genealogical/list context commonly denotes
    descendants or members of a family line. 'The sons of' is the most transparent
    and formally faithful rendering in this register, while still natural in English
    for this kind of census list.
- source_word: גַזָּם
  chosen: Gazzam
  lexicon: HALOT
  rationale: Proper name; per translation philosophy, personal names are transliterated
    rather than translated.
- source_word: עֻזָּא
  chosen: Uzza
  lexicon: HALOT
  rationale: Proper name; transliterated by standard English convention.
- source_word: פָסֵחַ
  chosen: Paseah
  alternatives:
  - Phaseah
  lexicon: HALOT
  rationale: Proper name; transliterated. 'Paseah' reflects a standard English transliteration
    from the Hebrew consonants and vowels. 'Phaseah' is a possible alternate spelling
    in some traditions, but 'Paseah' is more straightforward for modern readers.
