id: NEH.7.34
reference: Nehemiah 7:34
source:
  edition: WLC
  text: בְּנֵי֙ עֵילָ֣ם אַחֵ֔ר אֶ֕לֶף מָאתַ֖יִם חֲמִשִּׁ֥ים וְ/אַרְבָּעָֽה׃ס
translation:
  text: the sons of the other Elam, 1,254.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "another Elam." The Hebrew adjective can be rendered either way; here
      "the other Elam" was chosen because it most clearly marks distinction from the
      earlier Elam listed in this chapter.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: Construct plural of בֵּן introducing a clan/family list. In these census/genealogical
    contexts, 'sons of' is the standard and sufficiently transparent rendering, preserving
    the formal linkage to the named ancestor/group better than the more interpretive
    'descendants of.'
- source_word: עֵילָם
  chosen: Elam
  lexicon: HALOT
  rationale: Proper name, transliterated according to the translation philosophy.
    Here it refers to a family/group name in the returnee list, not translated.
- source_word: אַחֵר
  chosen: the other
  alternatives:
  - another
  - a second
  lexicon: HALOT
  rationale: Adjective meaning 'other/another.' In this context it distinguishes this
    Elam from a previous Elam entry in the list; 'the other' best captures the differentiating
    force in idiomatic English.
- source_word: אֶלֶף מָאתַיִם חֲמִשִּׁים וְאַרְבָּעָה
  chosen: 1,254
  alternatives:
  - one thousand two hundred fifty-four
  lexicon: HALOT
  rationale: 'Cardinal number sequence: ''one thousand, two hundred, fifty, and four.''
    Rendered as a numeral for readability in a census list while preserving the exact
    quantity.'
