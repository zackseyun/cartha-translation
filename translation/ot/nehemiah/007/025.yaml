id: NEH.7.25
reference: Nehemiah 7:25
source:
  edition: WLC
  text: בְּנֵ֥י גִבְע֖וֹן תִּשְׁעִ֥ים וַ/חֲמִשָּֽׁה׃ס
translation:
  text: the sons of Gibeon, ninety-five.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the descendants of Gibeon.' The Hebrew literally says 'the sons of Gibeon,'
      a standard genealogical/list formula that can denote a broader clan or community
      group, not only immediate male children.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the men of
  lexicon: HALOT
  rationale: Construct plural of בֵּן in genealogical/census context commonly denotes
    members of a family or settlement group. 'The sons of' preserves the formal structure
    and recurring register of these returnee lists better than the more interpretive
    'descendants of' or 'men of'.
- source_word: גִבְעוֹן
  chosen: Gibeon
  lexicon: HALOT
  rationale: Proper place name; transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
- source_word: תִּשְׁעִים וַחֲמִשָּׁה
  chosen: ninety-five
  alternatives:
  - ninety and five
  lexicon: HALOT
  rationale: Cardinal number expression meaning 95. Modern English normally compresses
    this to 'ninety-five'; 'ninety and five' would be overly literal and less natural.
