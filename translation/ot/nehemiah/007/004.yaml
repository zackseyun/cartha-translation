id: NEH.7.4
reference: Nehemiah 7:4
source:
  edition: WLC
  text: וְ/הָ/עִ֞יר רַחֲבַ֤ת יָדַ֨יִם֙ וּ/גְדוֹלָ֔ה וְ/הָ/עָ֥ם מְעַ֖ט בְּ/תוֹכָ֑/הּ
    וְ/אֵ֥ין בָּתִּ֖ים בְּנוּיִֽם׃
translation:
  text: Now the city was wide and large, but the people within it were few, and no
    houses had been rebuilt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And the city was broad and large ... and the people were few in it,
      and there were no houses built.' The Hebrew is more formally coordinate; the
      main text smooths the syntax into natural English while preserving the sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָעִיר
  chosen: Now the city
  alternatives:
  - And the city
  lexicon: HALOT
  rationale: הָעִיר is straightforwardly 'the city.' The prefixed conjunction וְ can
    be rendered simply 'and,' but in English narrative flow 'now' naturally signals
    a descriptive aside following the preceding context without overstating coordination.
- source_word: רַחֲבַת יָדַיִם
  chosen: wide
  alternatives:
  - broad on both sides
  - spacious
  lexicon: HALOT
  rationale: This idiom literally means 'broad of hands,' conveying breadth or spacious
    extent. 'Wide' preserves the spatial sense in natural English; the fuller idea
    of size is complemented by the following וּגְדוֹלָה.
- source_word: וּגְדוֹלָה
  chosen: and large
  alternatives:
  - and great
  - and extensive
  lexicon: HALOT
  rationale: גדול here describes the city's size, not greatness in status. 'Large'
    is the clearest modern English equivalent and pairs naturally with 'wide.'
- source_word: וְהָעָם מְעַט
  chosen: but the people ... were few
  alternatives:
  - and the people were few
  - but the population was small
  lexicon: HALOT
  rationale: 'מְעַט denotes smallness in number. Rendering with ''were few'' is idiomatic
    and keeps the focus on the people rather than abstract population. ''But'' brings
    out the contrast implied by the verse: a large city with few inhabitants.'
- source_word: בְּתוֹכָהּ
  chosen: within it
  alternatives:
  - in it
  - inside it
  lexicon: HALOT
  rationale: The phrase means 'in its midst/within it.' 'Within it' is slightly more
    vivid and suits the description of sparse inhabitants inside the city.
- source_word: וְאֵין בָּתִּים בְּנוּיִם
  chosen: and no houses had been rebuilt
  alternatives:
  - and there were no houses built
  - and houses were not built
  lexicon: HALOT
  rationale: אֵין marks nonexistence ('there were no'), בָּתִּים means 'houses,' and
    בְּנוּיִם is the passive participle 'built.' In Nehemiah's post-exilic context,
    'had been rebuilt' best captures the likely sense that the city's residential
    structures were not yet restored, not merely that no houses had ever been constructed.
