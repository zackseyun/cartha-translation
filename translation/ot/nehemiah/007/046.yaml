id: NEH.7.46
reference: Nehemiah 7:46
source:
  edition: WLC
  text: הַ/נְּתִינִ֑ים בְּנֵי צִחָ֥א בְנֵי חֲשֻׂפָ֖א בְּנֵ֥י טַבָּעֽוֹת־־׃
translation:
  text: 'The temple servants: the sons of Ziha, the sons of Hasupha, the sons of Tabbaoth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew נְתִינִים (traditionally 'Nethinim'), a technical term for a class
      assigned to temple service.
    reason: lexical_alternative
  - marker: b
    text: Or 'Hashupha' for Hasupha.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנְּתִינִים
  chosen: the temple servants
  alternatives:
  - the Nethinim
  - the given ones
  - the servants
  lexicon: HALOT
  rationale: נְתִינִים is a technical term for a class attached to temple service
    in postexilic texts. Rendering it as 'the temple servants' translates the function
    rather than merely transliterating the Hebrew, which fits the project's preference
    to favor source sense over translation tradition while remaining readable. 'Nethinim'
    is preserved as an alternative because it is traditional and recognizable in some
    English versions.
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - descendants of
  - members of the clan of
  lexicon: HALOT
  rationale: In these genealogical/list contexts, בְּנֵי literally means 'sons of'
    and commonly introduces family or clan groupings. 'The sons of' preserves the
    formal structure of the register better than a more interpretive 'descendants
    of' or 'clan of'.
- source_word: צִחָא
  chosen: Ziha
  alternatives:
  - Zihah
  rationale: Proper name transliterated by standard English convention, following
    the project's policy to transliterate names rather than translate them.
- source_word: חֲשֻׂפָא
  chosen: Hasupha
  alternatives:
  - Hashupha
  rationale: Proper name transliterated. The initial consonant is represented with
    'H'; an alternative spelling with 'Hashupha' reflects a different way of representing
    the Hebrew consonant cluster and is worth preserving as a lexical alternative.
- source_word: טַבָּעוֹת
  chosen: Tabbaoth
  alternatives:
  - Tabaoth
  rationale: Proper name transliterated in a form that reflects the doubled consonant
    in Hebrew. A simplified spelling is possible in English tradition, but the fuller
    transliteration better mirrors the source form.
