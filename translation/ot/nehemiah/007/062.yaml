id: NEH.7.62
reference: Nehemiah 7:62
source:
  edition: WLC
  text: בְּנֵי דְלָיָ֥ה בְנֵֽי טוֹבִיָּ֖ה בְּנֵ֣י נְקוֹדָ֑א שֵׁ֥שׁ מֵא֖וֹת וְ/אַרְבָּעִ֥ים
    וּ/שְׁנָֽיִם־־׃ס
translation:
  text: 'the sons of Delaiah, the sons of Tobiah, the sons of Nekoda: six hundred
    forty-two.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: In this census/genealogical context, בְּנֵי introduces family-group membership
    by male lineage. 'The sons of' is the standard, sufficiently literal rendering
    and fits the repeated list structure better than broader alternatives like 'descendants
    of.'
- source_word: דְלָיָה
  chosen: Delaiah
  rationale: Proper name; transliterated according to the project's policy to transliterate
    personal names rather than translate them.
- source_word: טוֹבִיָּה
  chosen: Tobiah
  alternatives:
  - Tobijah
  rationale: Proper name; transliterated in conventional English form. 'Tobiah' is
    the established and readable standard transliteration.
- source_word: נְקוֹדָא
  chosen: Nekoda
  alternatives:
  - Nekodah
  rationale: Proper name; transliterated rather than translated. 'Nekoda' follows
    the consonantal form and common English biblical usage.
- source_word: שֵׁשׁ מֵאוֹת וְאַרְבָּעִים וּשְׁנָיִם
  chosen: six hundred forty-two
  alternatives:
  - six hundred and forty-two
  lexicon: HALOT
  rationale: This cardinal number totals the listed family group. 'Six hundred forty-two'
    uses clear modern English style; inclusion of 'and' is stylistic in English, not
    required by the Hebrew.
