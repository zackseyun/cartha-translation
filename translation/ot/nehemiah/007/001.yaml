id: NEH.7.1
reference: Nehemiah 7:1
source:
  edition: WLC
  text: וַ/יְהִ֗י כַּ/אֲשֶׁ֤ר נִבְנְתָה֙ הַ/חוֹמָ֔ה וָ/אַעֲמִ֖יד הַ/דְּלָת֑וֹת וַ/יִּפָּֽקְד֛וּ
    הַ/שּׁוֹעֲרִ֥ים וְ/הַ/מְשֹׁרְרִ֖ים וְ/הַ/לְוִיִּֽם׃
translation:
  text: Now when the wall had been built and I had set up the doors, the gatekeepers,
    the singers, and the Levites were appointed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were assigned' or 'were enrolled'; the Hebrew verb can carry a broader
      administrative sense than formal appointment alone.
    reason: lexical_alternative
  - marker: b
    text: '''Had been built'' could also be rendered ''was built.'' The English pluperfect
      reflects the sequence within the narrative.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַּאֲשֶׁר
  chosen: Now when
  alternatives:
  - And it happened when
  - When
  lexicon: HALOT
  rationale: The waw + היה with כַּאֲשֶׁר introduces a new narrative circumstance.
    'Now when' preserves the discourse shift in natural modern English without the
    wooden 'and it happened.'
- source_word: נִבְנְתָה
  chosen: had been built
  alternatives:
  - was built
  - had been rebuilt
  lexicon: HALOT
  rationale: 'Niphal perfect of בנה is passive: ''had been built.'' The pluperfect
    fits the English sequence after the introductory temporal clause. ''Rebuilt''
    is contextually possible in Nehemiah but not explicit in this verb, so it is not
    chosen for the main text.'
- source_word: הַחוֹמָה
  chosen: the wall
  alternatives:
  - the city wall
  lexicon: HALOT
  rationale: חוֹמָה means 'wall,' here referring to Jerusalem's defensive wall. 'The
    wall' is sufficient and closest to the Hebrew; 'city wall' adds specificity not
    overtly present.
- source_word: וָאַעֲמִיד
  chosen: I had set up
  alternatives:
  - I set up
  - I installed
  - I stationed
  lexicon: HALOT
  rationale: Hiphil of עמד here means to cause to stand/set in place. With דְּלָתוֹת
    ('doors'), 'set up' is a natural rendering for hanging/placing the doors. Pluperfect
    matches the temporal sequence.
- source_word: הַדְּלָתוֹת
  chosen: the doors
  alternatives:
  - the doors of the gates
  - the gate doors
  lexicon: HALOT
  rationale: דְּלָתוֹת are literal doors/leaves. Since the verse immediately moves
    to gatekeepers, these are the gate doors, but the Hebrew simply says 'the doors,'
    so that is retained.
- source_word: וַיִּפָּקְדוּ
  chosen: were appointed
  alternatives:
  - were assigned
  - were enrolled
  - were mustered
  lexicon: HALOT
  rationale: פקד in the Niphal can denote being appointed, assigned, or enrolled.
    In this context of organizing temple/city personnel after the wall's completion,
    'were appointed' best captures the administrative sense in idiomatic English.
- source_word: הַשּׁוֹעֲרִים
  chosen: the gatekeepers
  alternatives:
  - the doorkeepers
  - the guards at the gates
  lexicon: HALOT
  rationale: The standard sense is gatekeepers, especially in temple/city administration
    contexts. 'Doorkeepers' is possible but less natural here.
- source_word: הַמְשֹׁרְרִים
  chosen: the singers
  alternatives:
  - the musicians
  - the chanters
  lexicon: HALOT
  rationale: From שׁיר, this term denotes singers, often liturgical singers. 'Singers'
    is the most direct and established rendering.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard transliteration of the tribal/clan designation is appropriate;
    this is a proper ethnoreligious group name rather than a title to translate.
