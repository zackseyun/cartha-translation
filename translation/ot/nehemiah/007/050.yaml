id: NEH.7.50
reference: Nehemiah 7:50
source:
  edition: WLC
  text: בְּנֵי רְאָיָ֥ה בְנֵי רְצִ֖ין בְּנֵ֥י נְקוֹדָֽא־־׃
translation:
  text: the sons of Reaiah, the sons of Rezin, the sons of Nekoda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descendants of' / 'members of the family of' for each occurrence of
      'sons of' in this genealogical list.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - descendants of
  - members of the family of
  lexicon: HALOT
  rationale: Construct plural of בֵּן in this genealogical/list context denotes lineage
    or clan membership. 'The sons of' preserves the formal structure of the Hebrew
    list and is standard, while alternatives are possible interpretive smoothings.
- source_word: רְאָיָה
  chosen: Reaiah
  alternatives:
  - Raiah
  lexicon: HALOT
  rationale: Proper name transliterated rather than translated, following the translation
    philosophy for personal names. 'Reaiah' reflects a conventional English transliteration
    of the Hebrew form.
- source_word: רְצִין
  chosen: Rezin
  lexicon: HALOT
  rationale: Proper name transliterated by standard convention. 'Rezin' is the established
    English form corresponding to the Hebrew name.
- source_word: נְקוֹדָא
  chosen: Nekoda
  alternatives:
  - Nekodah
  lexicon: HALOT
  rationale: Proper name transliterated rather than translated. 'Nekoda' closely follows
    the consonantal/vocalized Hebrew form; 'Nekodah' is a possible alternative English
    spelling.
