id: NEH.7.52
reference: Nehemiah 7:52
source:
  edition: WLC
  text: בְּנֵי בֵסַ֥י בְּנֵי מְעוּנִ֖ים בְּנֵ֥י נפושסים־־׃
translation:
  text: the sons of Besai, the sons of Meunim, the sons of Nephushesim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Bessai.” English spellings vary because of differing transliteration
      conventions and comparison with parallel textual traditions.
    reason: lexical_alternative
  - marker: b
    text: Or “Meunites,” if understood as an ethnic or group designation rather than
      a simple transliterated family name.
    reason: lexical_alternative
  - marker: c
    text: Or “Nephusim” in some English traditions; the Hebrew spelling here is represented
      more directly by “Nephushesim.”
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - descendants of
  - members of the family of
  lexicon: HALOT
  rationale: In this returnee/genealogical list, בְּנֵי is the standard construct
    expression introducing a clan or family line. 'The sons of' is the conventional
    and sufficiently transparent rendering, preserving the formal list structure better
    than the more interpretive 'descendants of' or 'members of the family of.'
- source_word: בֵסַי
  chosen: Besai
  alternatives:
  - Bessai
  lexicon: HALOT
  rationale: This is a proper name and is therefore transliterated rather than translated,
    following the project's policy for names. 'Besai' closely reflects the Hebrew
    form; 'Bessai' reflects a common English tradition influenced by other textual
    traditions/transliterations.
- source_word: מְעוּנִים
  chosen: Meunim
  alternatives:
  - Meunites
  lexicon: HALOT
  rationale: Although the form can denote a people-group, in this list it functions
    as a name within the repeated genealogical formula 'the sons of ...'. Transliteration
    preserves the source form and avoids over-interpreting it as an ethnic label in
    English. 'Meunites' is possible but more interpretive.
- source_word: נפושסים
  chosen: Nephushesim
  alternatives:
  - Nephusim
  - Nefushesim
  lexicon: HALOT
  rationale: The consonantal form here supports a transliteration like 'Nephushesim.'
    Because this is a proper/group name in a list, transliteration is preferable.
    Alternative English spellings reflect different ways of representing the Hebrew
    consonants and comparison with parallel list traditions.
