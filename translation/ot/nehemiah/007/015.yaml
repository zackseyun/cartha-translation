id: NEH.7.15
reference: Nehemiah 7:15
source:
  edition: WLC
  text: בְּנֵ֣י בִנּ֔וּי שֵׁ֥שׁ מֵא֖וֹת אַרְבָּעִ֥ים וּ/שְׁמֹנָֽה׃ס
translation:
  text: The sons of Binnui, six hundred forty-eight.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  - The children of
  lexicon: HALOT
  rationale: In this census/genealogical context, בְּנֵי literally means 'sons of'
    and is the standard formula for a family/clan line. 'Sons of' preserves the formal
    genealogical style better than the more interpretive 'descendants of,' though
    that broader sense is contextually implied.
- source_word: בִנּוּי
  chosen: Binnui
  alternatives:
  - Binnui (family of)
  rationale: This is a personal/family name and should be transliterated rather than
    translated, following the translation philosophy for names.
- source_word: שֵׁשׁ מֵאוֹת אַרְבָּעִים וּשְׁמֹנָה
  chosen: six hundred forty-eight
  alternatives:
  - '648'
  - six hundred and forty-eight
  lexicon: HALOT
  rationale: 'The Hebrew cardinal number sequence is straightforward: 6 + 100s, 40,
    and 8 = 648. Spelling out the number fits readable modern English Bible style.
    ''Forty-eight'' is preferred over numerals for literary consistency.'
