id: NEH.7.54
reference: Nehemiah 7:54
source:
  edition: WLC
  text: בְּנֵי בַצְלִ֥ית בְּנֵֽי מְחִידָ֖א בְּנֵ֥י חַרְשָֽׁא־־׃
translation:
  text: the sons of Bazlith, the sons of Mehida, the sons of Harsha—
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: In this genealogical/list context, בְּנֵי introduces a family or clan
    designation. 'The sons of' is the standard, formally transparent rendering in
    English Bible lists, while still naturally conveying descent/group membership.
- source_word: בַצְלִית
  chosen: Bazlith
  alternatives:
  - Bazlit
  - Bazlith
  lexicon: HALOT
  rationale: This is a proper name and should be transliterated rather than translated,
    per project philosophy. 'Bazlith' follows a conventional English transliteration
    that preserves the final ת as 'th'.
- source_word: מְחִידָא
  chosen: Mehida
  alternatives:
  - Mechida
  lexicon: HALOT
  rationale: Proper name transliterated into standard English form. 'Mehida' is a
    straightforward representation of the Hebrew consonants and vowels.
- source_word: חַרְשָׁא
  chosen: Harsha
  alternatives:
  - Charsha
  lexicon: HALOT
  rationale: Proper name transliterated rather than translated. 'Harsha' is the conventional
    English form and avoids implying a lexical meaning in a context where the term
    functions as a name.
