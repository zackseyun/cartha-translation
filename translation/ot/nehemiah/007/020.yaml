id: NEH.7.20
reference: Nehemiah 7:20
source:
  edition: WLC
  text: בְּנֵ֣י עָדִ֔ין שֵׁ֥שׁ מֵא֖וֹת חֲמִשִּׁ֥ים וַ/חֲמִשָּֽׁה׃ס
translation:
  text: the sons of Adin, six hundred fifty-five.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - descendants of
  - members of the family of
  lexicon: HALOT
  rationale: In this census/list context, בְּנֵי literally means 'sons of' and functions
    as a clan/family designation. 'The sons of' preserves the formal structure of
    the register while remaining natural in English.
- source_word: עָדִין
  chosen: Adin
  rationale: Personal/family name; transliterated according to the translation philosophy's
    preference to transliterate names rather than translate them.
- source_word: שֵׁשׁ מֵאוֹת
  chosen: six hundred
  lexicon: HALOT
  rationale: Standard cardinal number construction in Hebrew; rendered straightforwardly
    in idiomatic English.
- source_word: חֲמִשִּׁים וַחֲמִשָּׁה
  chosen: fifty-five
  alternatives:
  - fifty and five
  lexicon: HALOT
  rationale: The Hebrew expresses the remainder after the hundreds as 'fifty and five.'
    Modern English normally compresses this to 'fifty-five' for readability while
    preserving the exact number.
