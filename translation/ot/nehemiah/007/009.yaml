id: NEH.7.9
reference: Nehemiah 7:9
source:
  edition: WLC
  text: בְּנֵ֣י שְׁפַטְיָ֔ה שְׁלֹ֥שׁ מֵא֖וֹת שִׁבְעִ֥ים וּ/שְׁנָֽיִם׃ס
translation:
  text: The sons of Shephatiah, three hundred seventy-two.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  - The children of
  lexicon: HALOT
  rationale: In post-exilic census/genealogical lists, בְּנֵי commonly introduces
    a family or clan line. 'The sons of' is the standard, sufficiently literal rendering
    and fits the list format, while readers may understand it corporately rather than
    as immediate male offspring.
- source_word: שְׁפַטְיָה
  chosen: Shephatiah
  alternatives:
  - Shephatya
  lexicon: HALOT
  rationale: Personal names are transliterated rather than translated, following the
    project philosophy. 'Shephatiah' is the conventional English transliteration of
    this Hebrew name.
- source_word: שְׁלֹשׁ מֵאוֹת שִׁבְעִים וּשְׁנָיִם
  chosen: three hundred seventy-two
  alternatives:
  - three hundred and seventy-two
  lexicon: HALOT
  rationale: The Hebrew cardinal number sequence is rendered in clear modern English.
    The form without 'and' is natural contemporary style and preserves the census
    total accurately.
