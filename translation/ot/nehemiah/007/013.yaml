id: NEH.7.13
reference: Nehemiah 7:13
source:
  edition: WLC
  text: בְּנֵ֣י זַתּ֔וּא שְׁמֹנֶ֥ה מֵא֖וֹת אַרְבָּעִ֥ים וַ/חֲמִשָּֽׁה׃ס
translation:
  text: the sons of Zattu, eight hundred forty-five.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: In post-exilic census/genealogical lists, בְּנֵי commonly introduces
    a family or clan grouping. 'The sons of' preserves the formal genealogical idiom
    of the Hebrew while remaining natural in English. Alternatives such as 'descendants
    of' are interpretive and slightly broader.
- source_word: זַתּוּא
  chosen: Zattu
  alternatives:
  - Zatthu
  lexicon: HALOT
  rationale: Personal names are transliterated rather than translated, following project
    policy. 'Zattu' is the standard English transliteration for this name in Ezra-Nehemiah
    contexts.
- source_word: שְׁמֹנֶה מֵאוֹת אַרְבָּעִים וַחֲמִשָּׁה
  chosen: eight hundred forty-five
  alternatives:
  - eight hundred and forty-five
  lexicon: HALOT
  rationale: The Hebrew cardinal sequence literally gives 'eight, hundreds, forty,
    and five,' yielding 845. The main text uses streamlined modern English number
    style without 'and' for readability, while preserving the exact value.
