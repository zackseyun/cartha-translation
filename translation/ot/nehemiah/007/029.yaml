id: NEH.7.29
reference: Nehemiah 7:29
source:
  edition: WLC
  text: אַנְשֵׁ֨י קִרְיַ֤ת יְעָרִים֙ כְּפִירָ֣ה וּ/בְאֵר֔וֹת שְׁבַ֥ע מֵא֖וֹת אַרְבָּעִ֥ים
    וּ/שְׁלֹשָֽׁה׃ס
translation:
  text: 'the men of Kiriath-jearim, Kephirah, and Beeroth: 743'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Chephirah.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי
  chosen: the men of
  alternatives:
  - the people of
  - the inhabitants of
  lexicon: HALOT
  rationale: Construct plural of אִישׁ here introduces the male heads/representative
    members associated with the listed towns in a census-style return list. 'The men
    of' is the most direct and conventional rendering for this formula, preserving
    the gendered Hebrew form per the translation philosophy.
- source_word: קִרְיַת יְעָרִים
  chosen: Kiriath-jearim
  alternatives:
  - Kiriath Jearim
  lexicon: HALOT
  rationale: Place name is transliterated rather than translated, following the policy
    to transliterate names. Hyphenation reflects standard English convention for this
    toponym.
- source_word: כְּפִירָה
  chosen: Kephirah
  alternatives:
  - Chephirah
  lexicon: HALOT
  rationale: Place name transliterated from Hebrew. 'Kephirah' closely reflects the
    consonants of the Hebrew; 'Chephirah' is a traditional English form worth preserving
    as an alternative.
- source_word: וּבְאֵרוֹת
  chosen: and Beeroth
  alternatives:
  - and Be-eroth
  lexicon: HALOT
  rationale: Conjunction plus place name. The name is transliterated; 'Beeroth' is
    the standard English form.
- source_word: שְׁבַע מֵאוֹת אַרְבָּעִים וּשְׁלֹשָׁה
  chosen: '743'
  alternatives:
  - seven hundred forty-three
  lexicon: HALOT
  rationale: The Hebrew cardinal number totals 743. Numerals are used for readability
    in this census context while preserving exact quantity.
