id: NEH.7.49
reference: Nehemiah 7:49
source:
  edition: WLC
  text: בְּנֵי חָנָ֥ן בְּנֵי גִדֵּ֖ל בְּנֵי גָֽחַר־־־׃
translation:
  text: the sons of Hanan, the sons of Giddel, the sons of Gahar—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descendants of' for each repeated 'sons of'; the Hebrew genealogical
      formula can denote a clan or family line, not only immediate male offspring.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: Construct plural of בֵּן in this genealogical/list context regularly
    denotes a family group or descendants. 'The sons of' preserves the formal list
    structure and matches the source wording, while readers can understand it corporately.
- source_word: חָנָן
  chosen: Hanan
  rationale: Proper personal or clan name; transliterated according to the translation
    philosophy to transliterate names rather than translate them.
- source_word: גִדֵּל
  chosen: Giddel
  rationale: Proper name in a returnee/temple-servant list; transliterated directly.
- source_word: גָחַר
  chosen: Gahar
  rationale: Proper name in the list; transliterated directly. English spelling follows
    a straightforward representation of the Hebrew consonants and vowels.
