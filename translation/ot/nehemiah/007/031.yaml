id: NEH.7.31
reference: Nehemiah 7:31
source:
  edition: WLC
  text: אַנְשֵׁ֣י מִכְמָ֔ס מֵאָ֖ה וְ/עֶשְׂרִ֥ים וּ/שְׁנָֽיִם׃ס
translation:
  text: 'The men of Mikmas: 122.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Michmas,” following the traditional English place-name form.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי
  chosen: The men of
  alternatives:
  - The people of
  - The men from
  lexicon: HALOT
  rationale: Construct plural of אִישׁ here functions in a census/list formula meaning
    the male members or households associated with the place named. 'The men of' is
    the most natural and consistent rendering in these returnee lists, more formal
    than 'people of' and more idiomatic than a bare apposition.
- source_word: מִכְמָס
  chosen: Mikmas
  alternatives:
  - Michmas
  lexicon: HALOT
  rationale: Proper place name, so transliteration is preferred per translation philosophy.
    'Mikmas' closely reflects the Hebrew consonants; 'Michmas' is a familiar traditional
    English form and is preserved as an alternative.
- source_word: מֵאָה וְעֶשְׂרִים וּשְׁנָיִם
  chosen: '122'
  alternatives:
  - one hundred twenty-two
  lexicon: HALOT
  rationale: The Hebrew cardinal sequence literally reads 'a hundred and twenty and
    two.' Rendering as digits suits the census style of the chapter and communicates
    the number clearly in modern English without loss of meaning.
