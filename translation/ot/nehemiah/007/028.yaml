id: NEH.7.28
reference: Nehemiah 7:28
source:
  edition: WLC
  text: אַנְשֵׁ֥י בֵית עַזְמָ֖וֶת אַרְבָּעִ֥ים וּ/שְׁנָֽיִם־׃ס
translation:
  text: the men of Beth-azmaveth, forty-two.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the house of Azmaveth,' if taken more literally; in this census context
      the expression functions as a place name.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי
  chosen: the men of
  alternatives:
  - the people of
  - the men from
  lexicon: HALOT
  rationale: Construct plural of אִישׁ here introduces a clan/locality list item and
    is most naturally rendered 'the men of.' This preserves the masculine form and
    the census-style formula used in the surrounding verses.
- source_word: בֵית עַזְמָוֶת
  chosen: Beth-azmaveth
  alternatives:
  - the house of Azmaveth
  - Beth Azmaveth
  lexicon: HALOT
  rationale: This is a place name in the returnees list, not a literal reference to
    a household in this context. Following the translation philosophy, names are transliterated
    rather than translated; the hyphen reflects the compound toponym 'Beth-azmaveth.'
- source_word: אַרְבָּעִים וּשְׁנָיִם
  chosen: forty-two
  alternatives:
  - forty and two
  lexicon: HALOT
  rationale: Standard modern English rendering of the cardinal number; this keeps
    the census total clear and readable without archaic phrasing.
