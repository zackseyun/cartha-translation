id: NEH.7.2
reference: Nehemiah 7:2
source:
  edition: WLC
  text: וָ/אֲצַוֶּ֞ה אֶת חֲנָ֣נִי אָחִ֗/י וְ/אֶת חֲנַנְיָ֛ה שַׂ֥ר הַ/בִּירָ֖ה עַל
    יְרוּשָׁלִָ֑ם כִּי הוּא֙ כְּ/אִ֣ישׁ אֱמֶ֔ת וְ/יָרֵ֥א אֶת הָ/אֱלֹהִ֖ים מֵ/רַבִּֽים־־־־־׃
translation:
  text: Then I put my brother Hanani and Hananiah, the commander of the fortress,
    in charge over Jerusalem, because he was a faithful man and feared God more than
    many.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a man of truth' or 'a trustworthy man.'
    reason: lexical_alternative
  - marker: b
    text: The singular 'he' most naturally refers to Hananiah, though some understand
      the commendation to support the appointment more generally.
    reason: alternative_reading
lexical_decisions:
- source_word: וָאֲצַוֶּה
  chosen: I put ... in charge
  alternatives:
  - I commanded
  - I appointed
  lexicon: HALOT
  rationale: The verb צוה commonly means 'command,' but in this administrative context
    with named direct objects and the following עַל יְרוּשָׁלַ͏ִם, the sense is effectively
    commissioning/assigning responsibility. 'Put ... in charge' conveys the functional
    force in natural English without over-paraphrasing.
- source_word: חֲנָנִי אָחִי
  chosen: my brother Hanani
  alternatives:
  - Hanani my brother
  lexicon: HALOT
  rationale: The construct with 1cs suffix identifies Hanani as Nehemiah's brother.
    English idiom prefers 'my brother Hanani,' though 'Hanani my brother' is possible.
- source_word: חֲנַנְיָה
  chosen: Hananiah
  rationale: Personal name transliterated per translation philosophy.
- source_word: שַׂר הַבִּירָה
  chosen: the commander of the fortress
  alternatives:
  - the governor of the citadel
  - the official of the fortress
  lexicon: HALOT
  rationale: שַׂר is a leader/official/commander, and בִּירָה refers to a fortified
    complex or citadel. 'Commander of the fortress' best fits an administrative-military
    role in accessible English. 'Fortress' is preferred over 'citadel' for readability.
- source_word: עַל יְרוּשָׁלַ͏ִם
  chosen: in charge over Jerusalem
  alternatives:
  - over Jerusalem
  - concerning Jerusalem
  lexicon: HALOT
  rationale: עַל after an appointing verb indicates authority or responsibility over
    a place. 'In charge over Jerusalem' makes the governance sense explicit in English.
- source_word: כִּי הוּא
  chosen: because he was
  alternatives:
  - for he was
  lexicon: HALOT
  rationale: כִּי introduces the reason for the appointment. 'Because' is clear modern
    English. The singular pronoun most naturally refers to Hananiah, the nearer antecedent,
    though the commendation may also support the joint appointment contextually.
- source_word: כְּאִישׁ אֱמֶת
  chosen: a faithful man
  alternatives:
  - a man of truth
  - a trustworthy man
  lexicon: HALOT
  rationale: אֱמֶת can denote truth, reliability, or faithfulness. In describing fitness
    for office, 'faithful' captures the ethical sense better than the more wooden
    'man of truth,' while remaining close to the Hebrew.
- source_word: וְיָרֵא אֶת־הָאֱלֹהִים
  chosen: and feared God
  alternatives:
  - and was God-fearing
  lexicon: HALOT
  rationale: The Qal participial/adjectival sense here describes reverent fear toward
    God. 'Feared God' preserves the directness and biblical idiom.
- source_word: מֵרַבִּים
  chosen: more than many
  alternatives:
  - more than most
  - beyond many others
  lexicon: HALOT
  rationale: The comparative מן with רַבִּים yields a straightforward comparison.
    'More than many' is formally close and avoids the interpretive tightening of 'more
    than most.'
