id: NEH.7.30
reference: Nehemiah 7:30
source:
  edition: WLC
  text: אַנְשֵׁ֤י הָֽ/רָמָה֙ וָ/גָ֔בַע שֵׁ֥שׁ מֵא֖וֹת עֶשְׂרִ֥ים וְ/אֶחָֽד׃ס
translation:
  text: the men of Ramah and Geba, six hundred twenty-one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Geba''; some translations read ''Gibeah,'' influenced by the
      parallel list in Ezra 2:26 or by confusion between the similar place names.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַנְשֵׁי
  chosen: the men of
  alternatives:
  - the people of
  - the inhabitants of
  lexicon: HALOT
  rationale: Construct plural of אִישׁ used in this census/list formula to denote
    the male members associated with the place. 'The men of' is the most direct and
    conventional rendering here, preserving the gendered form of the Hebrew rather
    than neutralizing it.
- source_word: הָרָמָה
  chosen: Ramah
  lexicon: HALOT
  rationale: Proper place name; per translation philosophy, names are transliterated
    rather than translated.
- source_word: וָגָבַע
  chosen: and Geba
  alternatives:
  - and Gibeah
  lexicon: HALOT
  rationale: The consonantal form here is גבע, which corresponds to Geba rather than
    גבעה ('Gibeah'). The straightforward transliteration of the attested form is therefore
    preferred.
- source_word: שֵׁשׁ מֵאוֹת עֶשְׂרִים וְאֶחָד
  chosen: six hundred twenty-one
  alternatives:
  - '621'
  lexicon: HALOT
  rationale: Cardinal number sequence rendered in standard readable English words.
    Spelling out the number fits the literary style of English Bible translation better
    than numerals.
