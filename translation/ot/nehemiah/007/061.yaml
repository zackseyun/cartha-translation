id: NEH.7.61
reference: Nehemiah 7:61
source:
  edition: WLC
  text: וְ/אֵ֗לֶּה הָֽ/עוֹלִים֙ מִ/תֵּ֥ל מֶ֨לַח֙ תֵּ֣ל חַרְשָׁ֔א כְּר֥וּב אַדּ֖וֹן
    וְ/אִמֵּ֑ר וְ/לֹ֣א יָכְל֗וּ לְ/הַגִּ֤יד בֵּית אֲבוֹתָ/ם֙ וְ/זַרְעָ֔/ם אִ֥ם מִ/יִּשְׂרָאֵ֖ל
    הֵֽם־׃
translation:
  text: 'And these were the ones who came up from Tel-melah, Tel-harsha, Kerub, Addon,
    and Immer, but they were not able to declare their fathers’ houses or their offspring,
    whether they were from Israel:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ezra 2:59 reads 'Addan' where Nehemiah here has 'Addon.'
    reason: textual_variant
  - marker: b
    text: Or 'their ancestral houses'; the Hebrew idiom is literally 'their fathers’
      houses.'
    reason: lexical_alternative
  - marker: c
    text: Or 'whether they were Israelites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: And these were
  alternatives:
  - Now these were
  - And these are
  lexicon: HALOT
  rationale: Introduces a new subgroup within the list. Past-tense English fits the
    narrative/list context better than a present-tense rendering.
- source_word: הָעוֹלִים
  chosen: the ones who came up
  alternatives:
  - those who went up
  - the returnees
  lexicon: HALOT
  rationale: עלה in this post-exilic context refers to those ascending/returning from
    exile. 'Came up' preserves the idiom without over-paraphrasing to 'returnees'.
- source_word: מִתֵּל מֶלַח תֵּל חַרְשָׁא כְּרוּב אַדּוֹן וְאִמֵּר
  chosen: from Tel-melah, Tel-harsha, Kerub, Addon, and Immer
  alternatives:
  - from Tel Melah, Tel Harsha, Cherub, Addan, and Immer
  lexicon: HALOT
  rationale: These are place or clan names and are therefore transliterated per translation
    philosophy. Hyphenation in Tel-melah and Tel-harsha improves readability for compound
    names. 'Addon' follows the consonantal Hebrew here; Ezra 2:59 has the variant
    Addan.
- source_word: וְלֹא יָכְלוּ
  chosen: but they were not able
  alternatives:
  - and they could not
  - but they could not
  lexicon: HALOT
  rationale: The clause marks inability; 'but' brings out the contrast between their
    origin points and their inability to prove lineage.
- source_word: לְהַגִּיד
  chosen: to declare
  alternatives:
  - to tell
  - to show
  - to prove
  lexicon: HALOT
  rationale: נגד in the Hiphil means to make known or declare. 'Declare' stays close
    to the Hebrew while fitting the genealogical/legal setting. 'Prove' is interpretive
    and therefore avoided in the main text.
- source_word: בֵּית אֲבוֹתָם
  chosen: their fathers’ houses
  alternatives:
  - their ancestral houses
  - their family houses
  - their fathers' families
  lexicon: HALOT
  rationale: A standard genealogical expression for paternal household/clan identity.
    'Fathers’ houses' preserves the source idiom; more interpretive alternatives are
    possible but less transparent.
- source_word: וְזַרְעָם
  chosen: or their offspring
  alternatives:
  - or their seed
  - or their descendants
  lexicon: HALOT
  rationale: זֶרַע can mean seed, offspring, or descendants. 'Offspring' is natural
    modern English and keeps the genealogical sense without sounding overly technical.
- source_word: אִם מִיִּשְׂרָאֵל הֵם
  chosen: whether they were from Israel
  alternatives:
  - whether they were of Israel
  - whether they belonged to Israel
  - whether they were Israelites
  lexicon: HALOT
  rationale: The phrase expresses uncertainty about Israelite lineage. 'From Israel'
    is a clear, minimally interpretive rendering. 'Were Israelites' is possible but
    slightly more compressed than the Hebrew wording.
