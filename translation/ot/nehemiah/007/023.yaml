id: NEH.7.23
reference: Nehemiah 7:23
source:
  edition: WLC
  text: בְּנֵ֣י בֵצָ֔י שְׁלֹ֥שׁ מֵא֖וֹת עֶשְׂרִ֥ים וְ/אַרְבָּעָֽה׃ס
translation:
  text: the sons of Bezai, three hundred twenty-four.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: Construct plural of בֵּן in genealogical/list context commonly denotes
    a family line or clan membership. 'The sons of' preserves the formal structure
    of the register while remaining natural in English.
- source_word: בֵצָי
  chosen: Bezai
  rationale: Proper name transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: שְׁלֹשׁ מֵאוֹת עֶשְׂרִים וְאַרְבָּעָה
  chosen: three hundred twenty-four
  alternatives:
  - three hundred and twenty-four
  lexicon: HALOT
  rationale: The Hebrew cardinal number sequence is rendered in standard modern English
    as 'three hundred twenty-four.' The alternative with 'and' is acceptable in some
    English styles, but the chosen form is more concise and contemporary.
