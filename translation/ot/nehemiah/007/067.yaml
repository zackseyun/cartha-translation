id: NEH.7.67
reference: Nehemiah 7:67
source:
  edition: WLC
  text: מִ֠/לְּ/בַד עַבְדֵי/הֶ֤ם וְ/אַמְהֹֽתֵי/הֶם֙ אֵ֔לֶּה שִׁבְעַ֣ת אֲלָפִ֔ים שְׁלֹ֥שׁ
    מֵא֖וֹת שְׁלֹשִׁ֣ים וְ/שִׁבְעָ֑ה וְ/לָ/הֶ֗ם מְשֹֽׁרֲרִים֙ וּ/מְשֹׁ֣רֲר֔וֹת מָאתַ֖יִם
    וְ/אַרְבָּעִ֥ים וַ/חֲמִשָּֽׁה׃ס
translation:
  text: besides their male and female slaves, of whom there were 7,337; and they had
    245 male and female singers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servants' / 'maidservants.' The Hebrew terms can be rendered more generally,
      but in this census context they likely refer to male and female slaves attached
      to the households.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִלְּבַד
  chosen: besides
  alternatives:
  - apart from
  - in addition to
  lexicon: HALOT
  rationale: Introduces an exception/addition to the preceding total. 'Besides' is
    concise and idiomatic in English for a census-style notation.
- source_word: עַבְדֵיהֶם
  chosen: their male slaves
  alternatives:
  - their servants
  - their male servants
  lexicon: HALOT
  rationale: The noun עֶבֶד can mean servant or slave depending on context. In a property/counting
    context paired with female slaves, the bonded status is foregrounded, so 'slaves'
    best reflects the social reality. 'Male' is supplied for clarity because the next
    term is explicitly feminine and English benefits from the matched pair.
- source_word: אַמְהֹתֵיהֶם
  chosen: their female slaves
  alternatives:
  - their maidservants
  - their female servants
  lexicon: HALOT
  rationale: אָמָה denotes a female slave/maidservant. Because the verse is counting
    persons in household possession alongside עַבְדֵיהֶם, 'female slaves' gives the
    clearest gender-accurate and socially accurate rendering.
- source_word: אֵלֶּה
  chosen: of whom there were
  alternatives:
  - these were
  - these
  lexicon: HALOT
  rationale: Literally 'these,' but in English census style the demonstrative points
    forward to the number. 'Of whom there were' makes the syntax natural without changing
    the sense.
- source_word: שִׁבְעַת אֲלָפִים שְׁלֹשׁ מֵאוֹת שְׁלֹשִׁים וְשִׁבְעָה
  chosen: 7,337
  alternatives:
  - seven thousand three hundred thirty-seven
  lexicon: HALOT
  rationale: A numeral in modern English is clear and natural in a census list. The
    value is preserved exactly.
- source_word: וְלָהֶם
  chosen: and they had
  alternatives:
  - and there were to them
  - and belonging to them were
  lexicon: HALOT
  rationale: The prepositional possession construction is idiomatically rendered 'they
    had' in English.
- source_word: מְשֹׁרֲרִים וּמְשֹׁרֲרוֹת
  chosen: male and female singers
  alternatives:
  - singers, both men and women
  - singing men and singing women
  lexicon: HALOT
  rationale: The paired masculine and feminine participial forms explicitly distinguish
    gender. 'Male and female singers' preserves that distinction in smooth modern
    English.
- source_word: מָאתַיִם וְאַרְבָּעִים וַחֲמִשָּׁה
  chosen: '245'
  alternatives:
  - two hundred forty-five
  lexicon: HALOT
  rationale: Modern numeral formatting is appropriate in a numerical register and
    preserves the exact count.
