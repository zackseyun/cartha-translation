id: NEH.7.48
reference: Nehemiah 7:48
source:
  edition: WLC
  text: בְּנֵי לְבָנָ֥ה בְנֵי חֲגָבָ֖ה בְּנֵ֥י שַׁלְמָֽי־־׃
translation:
  text: the sons of Lebanah, the sons of Hagabah, the sons of Shalmai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descendants of' for each occurrence of 'sons of'; the Hebrew genealogical
      formula can denote a family line or clan membership, not only immediate male
      children.
    reason: lexical_alternative
  - marker: b
    text: Some parallel list traditions spell the final name 'Salmai.' Here the Hebrew
      form in Nehemiah reads Shalmai.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - descendants of
  - members of the clan of
  lexicon: HALOT
  rationale: Construct plural of בֵּן in a genealogical/list context. 'The sons of'
    is the most direct and conventional rendering in English for these returnee/family
    lists, preserving the formal structure of the Hebrew without over-interpreting
    it as broader clan language in the main text.
- source_word: לְבָנָה
  chosen: Lebanah
  alternatives:
  - Lebana
  lexicon: HALOT
  rationale: Proper name; per translation philosophy, personal names are transliterated
    rather than translated. 'Lebanah' follows a standard English transliteration of
    the Hebrew form.
- source_word: חֲגָבָה
  chosen: Hagabah
  alternatives:
  - Hagaba
  lexicon: HALOT
  rationale: Proper name in a list of temple servants/families. Transliterated directly
    from Hebrew; the final he is represented with final 'h' in standard convention.
- source_word: שַׁלְמָי
  chosen: Shalmai
  alternatives:
  - Salmai
  - Shalmi
  lexicon: HALOT
  rationale: Proper name; transliterated from the consonantal/vocalized Hebrew. 'Shalmai'
    reflects the initial שׁ as 'Sh' and preserves the Masoretic vocalization. An alternative
    spelling appears in related list traditions, but this verse's form is best represented
    as 'Shalmai' in the main text.
