lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  - The children of
  lexicon: HALOT
  rationale: Construct plural of בֵּן in genealogical/census contexts commonly denotes
    a family line or clan membership. 'The sons of' is the most direct and conventional
    rendering, preserving the Hebrew form while remaining natural in English.
- source_word: חָרִם
  chosen: Harim
  lexicon: HALOT
  rationale: Proper personal/family name; per translation philosophy, names are transliterated
    rather than translated.
- source_word: אֶלֶף שִׁבְעָה עָשָׂר
  chosen: 1,017
  alternatives:
  - one thousand seventeen
  lexicon: HALOT
  rationale: The Hebrew cardinal sequence literally reads 'a thousand, seven, ten,'
    idiomatically 'one thousand seventeen.' Numerals are rendered in standard English
    numeric form for readability in a census list.
