id: NEH.7.45
reference: Nehemiah 7:45
source:
  edition: WLC
  text: הַ/שֹּֽׁעֲרִ֗ים בְּנֵֽי שַׁלּ֤וּם בְּנֵֽי אָטֵר֙ בְּנֵֽי טַלְמֹ֣ן בְּנֵֽי
    עַקּ֔וּב בְּנֵ֥י חֲטִיטָ֖א בְּנֵ֣י שֹׁבָ֑י מֵאָ֖ה שְׁלֹשִׁ֥ים וּ/שְׁמֹנָֽה־־־־׃ס
translation:
  text: 'The gatekeepers: the sons of Shallum, the sons of Ater, the sons of Talmon,
    the sons of Akkub, the sons of Hatita, the sons of Shobai, 138.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of' may denote a broader family line or clan, not only immediate
      male children.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשֹּׁעֲרִים
  chosen: The gatekeepers
  alternatives:
  - The guards at the gates
  - The doorkeepers
  lexicon: HALOT
  rationale: The noun denotes those responsible for guarding/keeping the gates, especially
    in temple or communal service contexts. 'Gatekeepers' is the standard clear English
    rendering and fits the list context.
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the family of
  lexicon: HALOT
  rationale: In post-exilic genealogical and census lists, בְּנֵי literally means
    'sons of' and can function more broadly for a clan or family line. 'The sons of'
    preserves the formal structure of the Hebrew list while allowing readers to recognize
    a genealogical grouping.
- source_word: שַׁלּוּם
  chosen: Shallum
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: אָטֵר
  chosen: Ater
  rationale: Personal name transliterated rather than translated.
- source_word: טַלְמֹן
  chosen: Talmon
  rationale: Personal name transliterated rather than translated.
- source_word: עַקּוּב
  chosen: Akkub
  alternatives:
  - Aqqub
  rationale: Personal name transliterated. 'Akkub' follows common English biblical
    convention; 'Aqqub' is a possible more phonetic alternative but less familiar.
- source_word: חֲטִיטָא
  chosen: Hatita
  alternatives:
  - Hatitah
  rationale: Personal name transliterated. The shorter conventional English form 'Hatita'
    is preferred for readability; some traditions add a final 'h' to reflect the mater
    ending.
- source_word: שֹׁבָי
  chosen: Shobai
  alternatives:
  - Shobi
  rationale: Personal name transliterated according to standard English convention.
    'Shobai' better reflects the final vowel pattern in the Hebrew spelling.
- source_word: מֵאָה שְׁלֹשִׁים וּשְׁמֹנָה
  chosen: '138'
  alternatives:
  - one hundred thirty-eight
  lexicon: HALOT
  rationale: The Hebrew cardinal number sequence totals 138. Numerals are natural
    and readable in an English census list; this preserves the count without unnecessary
    stiffness.
