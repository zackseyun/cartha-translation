id: NEH.7.38
reference: Nehemiah 7:38
source:
  edition: WLC
  text: בְּנֵ֣י סְנָאָ֔ה שְׁלֹ֣שֶׁת אֲלָפִ֔ים תְּשַׁ֥ע מֵא֖וֹת וּ/שְׁלֹשִֽׁים׃פ
translation:
  text: the sons of Senaah, three thousand nine hundred and thirty.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: In this census/list context, בְּנֵי introduces a family or clan designation.
    'The sons of' is the standard, formally transparent rendering, while English readers
    can understand it corporately rather than as only immediate male offspring.
- source_word: סְנָאָה
  chosen: Senaah
  alternatives:
  - Senaa
  lexicon: HALOT
  rationale: This is a proper name and should be transliterated rather than translated,
    following the project's policy for names. 'Senaah' reflects the Hebrew form in
    English transliteration.
- source_word: שְׁלֹשֶׁת אֲלָפִים תְּשַׁע מֵאוֹת וּשְׁלֹשִׁים
  chosen: three thousand nine hundred and thirty
  alternatives:
  - 3,930
  lexicon: HALOT
  rationale: The Hebrew cardinal number sequence is rendered in standard readable
    English words rather than numerals, preserving the formal sense while sounding
    natural in a genealogical register.
