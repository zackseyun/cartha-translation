id: NEH.7.32
reference: Nehemiah 7:32
source:
  edition: WLC
  text: אַנְשֵׁ֤י בֵֽית אֵל֙ וְ/הָ/עָ֔י מֵאָ֖ה עֶשְׂרִ֥ים וּ/שְׁלֹשָֽׁה־׃ס
translation:
  text: the men of Bethel and Ai, one hundred twenty-three.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the people of Bethel and Ai.' The Hebrew literally says 'the men of
      Bethel and Ai.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי
  chosen: the men of
  alternatives:
  - the people of
  - the inhabitants of
  lexicon: HALOT
  rationale: Construct plural of אִישׁ, here introducing a group identified by place.
    'Men of' is the most direct rendering and preserves the masculine form of the
    Hebrew, in keeping with the gender-accurate policy. 'People of' or 'inhabitants
    of' would smooth the sense but are less formally tied to the source.
- source_word: בֵית אֵל
  chosen: Bethel
  alternatives:
  - Beth-el
  lexicon: HALOT
  rationale: Place name transliterated by standard English convention. As a proper
    name, it is transliterated rather than translated ('house of God').
- source_word: וְהָעָי
  chosen: and Ai
  alternatives:
  - and the Ai
  lexicon: HALOT
  rationale: Proper place name with conjunction. Although the Hebrew includes the
    article on עַי, English idiom for place names normally omits it, so 'and Ai' is
    the natural equivalent.
- source_word: מֵאָה עֶשְׂרִים וּשְׁלֹשָׁה
  chosen: one hundred twenty-three
  alternatives:
  - a hundred and twenty-three
  - one hundred and twenty-three
  lexicon: HALOT
  rationale: Cardinal number giving the census total. Rendered in standard modern
    English without 'and' for readability, while preserving the exact quantity.
