  text: בְּנֵ֣י אִמֵּ֔ר אֶ֖לֶף חֲמִשִּׁ֥ים וּ/שְׁנָֽיִם׃ס
translation:
  text: 'The sons of Immer: 1,052.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  - The members of
  lexicon: HALOT
  rationale: Construct plural of בֵּן in genealogical/census contexts commonly denotes
    a family line or clan membership. 'The sons of' preserves the formal structure
    and standard register of these returnee lists, while still being understandable
    in English.
- source_word: אִמֵּר
  chosen: Immer
  lexicon: HALOT
  rationale: Proper name; per translation philosophy, personal names are transliterated
    rather than translated.
- source_word: אֶלֶף חֲמִשִּׁים וּשְׁנָיִם
  chosen: 1,052
  alternatives:
  - one thousand fifty-two
  lexicon: HALOT
  rationale: The Hebrew cardinal sequence literally reads 'a thousand, fifty, and
    two.' Rendering as a numeral is natural and clear in an English census list while
    preserving the exact quantity.
