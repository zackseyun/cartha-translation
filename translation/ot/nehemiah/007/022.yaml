id: NEH.7.22
reference: Nehemiah 7:22
source:
  edition: WLC
  text: בְּנֵ֣י חָשֻׁ֔ם שְׁלֹ֥שׁ מֵא֖וֹת עֶשְׂרִ֥ים וּ/שְׁמֹנָֽה׃ס
translation:
  text: the sons of Hashum, three hundred twenty-eight.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: Construct plural of בֵּן in a genealogical/register context commonly
    denotes a family line or clan membership. 'The sons of' is the most direct and
    conventional rendering in these census lists, preserving the formal structure
    of the Hebrew.
- source_word: חָשֻׁם
  chosen: Hashum
  lexicon: HALOT
  rationale: Proper personal/family name; transliterated according to the translation
    philosophy's preference to transliterate names rather than translate them.
- source_word: שְׁלֹשׁ מֵאוֹת עֶשְׂרִים וּשְׁמֹנָה
  chosen: three hundred twenty-eight
  alternatives:
  - three hundred and twenty-eight
  lexicon: HALOT
  rationale: 'The Hebrew cardinal number sequence is straightforward: ''three hundreds,
    twenty, and eight.'' Rendered in standard modern English as ''three hundred twenty-eight''
    for readability while preserving the exact total.'
