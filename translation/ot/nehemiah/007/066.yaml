id: NEH.7.66
reference: Nehemiah 7:66
source:
  edition: WLC
  text: כָּל הַ/קָּהָ֖ל כְּ/אֶחָ֑ד אַרְבַּ֣ע רִבּ֔וֹא אַלְפַּ֖יִם שְׁלֹשׁ מֵא֥וֹת
    וְ/שִׁשִּֽׁים־־׃
translation:
  text: The whole assembly together was forty-two thousand three hundred sixty,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'as one.' The phrase means the assembly counted as a single total.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: The whole
  alternatives:
  - all
  lexicon: HALOT
  rationale: כָּל with the article on the following noun gives a totalizing sense.
    'The whole' is natural English and preserves the comprehensiveness of the phrase.
- source_word: הַקָּהָל
  chosen: assembly
  alternatives:
  - congregation
  - community
  lexicon: HALOT
  rationale: קָהָל denotes the gathered community. 'Assembly' fits the census/list
    context better than the more overtly worship-oriented 'congregation,' while still
    reflecting a gathered body.
- source_word: כְּאֶחָד
  chosen: together
  alternatives:
  - as one
  - in one body
  lexicon: HALOT
  rationale: Literally 'as one.' In this numerical summary it idiomatically means
    the group taken as a single total. 'Together' communicates that the whole is being
    counted collectively; 'as one' is possible but less idiomatic in modern English.
- source_word: אַרְבַּע רִבּוֹא
  chosen: forty thousand
  lexicon: HALOT
  rationale: The Hebrew number expression is literally 'four ten-thousands,' i.e.,
    40,000.
- source_word: אַלְפַּיִם
  chosen: two thousand
  lexicon: HALOT
  rationale: Standard cardinal number.
- source_word: שְׁלֹשׁ מֵאוֹת
  chosen: three hundred
  lexicon: HALOT
  rationale: Standard cardinal number construction.
- source_word: וְשִׁשִּׁים
  chosen: sixty
  lexicon: HALOT
  rationale: Final element of the summed total. English style presents the full number
    as 'forty-two thousand three hundred sixty.'
