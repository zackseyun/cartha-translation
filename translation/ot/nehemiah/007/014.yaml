id: NEH.7.14
reference: Nehemiah 7:14
source:
  edition: WLC
  text: בְּנֵ֣י זַכָּ֔י שְׁבַ֥ע מֵא֖וֹת וְ/שִׁשִּֽׁים׃ס
translation:
  text: the sons of Zaccai, seven hundred and sixty.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: Construct plural of בֵּן introducing a genealogical/family list entry.
    In this census context, 'the sons of' is the standard and sufficiently broad idiom
    for members/descendants of a family line, while staying close to the Hebrew form.
- source_word: זַכָּי
  chosen: Zaccai
  alternatives:
  - Zakkai
  lexicon: HALOT
  rationale: Personal name transliterated rather than translated, following the translation
    philosophy for names. 'Zaccai' reflects a conventional English biblical spelling.
- source_word: שְׁבַע מֵאוֹת וְשִׁשִּׁים
  chosen: seven hundred and sixty
  alternatives:
  - '760'
  lexicon: HALOT
  rationale: Cardinal number phrase composed of 'seven,' 'hundreds,' and 'sixty.'
    Rendered in words for natural literary English and to match the style of numbered
    family totals in this context.
