id: NEH.7.17
reference: Nehemiah 7:17
source:
  edition: WLC
  text: בְּנֵ֣י עַזְגָּ֔ד אַלְפַּ֕יִם שְׁלֹ֥שׁ מֵא֖וֹת עֶשְׂרִ֥ים וּ/שְׁנָֽיִם׃ס
translation:
  text: 'The sons of Azgad: 2,322.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  - The children of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'sons' and in genealogical/census contexts
    commonly denotes a family line or clan membership. 'The sons of' preserves the
    formal wording while remaining natural in English.
- source_word: עַזְגָּד
  chosen: Azgad
  rationale: Proper personal/family name; transliterated according to the translation
    philosophy to transliterate names rather than translate them.
- source_word: אַלְפַּיִם שְׁלֹשׁ מֵאוֹת עֶשְׂרִים וּשְׁנָיִם
  chosen: 2,322
  alternatives:
  - two thousand three hundred twenty-two
  - 2,300 and 22
  lexicon: HALOT
  rationale: The Hebrew cardinal number sequence literally reads 'two thousand, three
    hundred, twenty and two.' Rendering as a standard English numeral communicates
    the census total clearly and accurately in modern English. The conjunction before
    the final unit is idiomatic in Hebrew number formation and does not require separate
    representation beyond the English total.
