id: NEH.7.63
reference: Nehemiah 7:63
source:
  edition: WLC
  text: וּ/מִן הַ/כֹּ֣הֲנִ֔ים בְּנֵ֥י חֳבַיָּ֖ה בְּנֵ֣י הַקּ֑וֹץ בְּנֵ֣י בַרְזִלַּ֗י
    אֲשֶׁ֣ר לָ֠קַח מִ/בְּנ֞וֹת בַּרְזִלַּ֤י הַ/גִּלְעָדִי֙ אִשָּׁ֔ה וַ/יִּקָּרֵ֖א
    עַל שְׁמָֽ/ם־־׃
translation:
  text: 'And from the priests: the sons of Hobaiah, the sons of Hakkoz, the sons of
    Barzillai, who had taken a wife from the daughters of Barzillai the Gileadite
    and was called by their name.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who took one of the daughters of Barzillai the Gileadite as a wife
      and was named after them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִן הַכֹּהֲנִים
  chosen: And from the priests
  alternatives:
  - And of the priests
  - Also from the priests
  lexicon: HALOT
  rationale: Introduces a subgroup within the returnees, specifically among priestly
    families. 'From the priests' is natural English while preserving the partitive
    sense of מִן.
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the family of
  lexicon: HALOT
  rationale: In genealogical/register contexts, בְּנֵי commonly denotes a family line
    or clan. 'The sons of' preserves the formal register and the repeated structure
    of the Hebrew list.
- source_word: חֳבַיָּה
  chosen: Hobaiah
  alternatives:
  - Hobajah
  rationale: Standard English transliteration of the personal/family name.
- source_word: הַקּוֹץ
  chosen: Hakkoz
  alternatives:
  - Koz
  rationale: Conventional transliteration of the priestly family name with the article
    incorporated in the established English form 'Hakkoz.'
- source_word: בַרְזִלַּי
  chosen: Barzillai
  rationale: Standard transliteration of the proper name, retained consistently for
    both the family designation and the Gileadite ancestor.
- source_word: אֲשֶׁר לָקַח
  chosen: who had taken
  alternatives:
  - who took
  lexicon: HALOT
  rationale: The relative clause refers back to Barzillai. English past perfect clarifies
    the prior action in relation to the naming result without adding content.
- source_word: מִבְּנוֹת ... אִשָּׁה
  chosen: a wife from the daughters of
  alternatives:
  - one of the daughters of ... as a wife
  - a woman from the daughters of
  lexicon: HALOT
  rationale: This idiom denotes marriage into that family. 'A wife from the daughters
    of' is slightly formal but accurately reflects the Hebrew construction.
- source_word: הַגִּלְעָדִי
  chosen: the Gileadite
  alternatives:
  - of Gilead
  lexicon: HALOT
  rationale: Gentilic adjective identifying Barzillai's regional origin; 'the Gileadite'
    is the standard concise rendering.
- source_word: וַיִּקָּרֵא עַל שְׁמָם
  chosen: and was called by their name
  alternatives:
  - and was named after them
  - and took their name
  lexicon: HALOT
  rationale: Passive/niphal sense of קרא with עַל שֵׁם indicates being designated
    by another family's name. 'Was called by their name' stays close to the Hebrew
    while remaining intelligible. The plural suffix 'their' refers to the daughters'
    family, i.e., Barzillai's line.
