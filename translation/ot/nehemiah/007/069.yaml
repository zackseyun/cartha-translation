id: NEH.7.69
reference: Nehemiah 7:69
source:
  edition: WLC
  text: וּ/מִ/קְצָת֙ רָאשֵׁ֣י הָֽ/אָב֔וֹת נָתְנ֖וּ לַ/מְּלָאכָ֑ה הַ/תִּרְשָׁ֜תָא נָתַ֣ן
    לָ/אוֹצָ֗ר זָהָ֞ב דַּרְכְּמֹנִ֥ים אֶ֨לֶף֙ מִזְרָק֣וֹת חֲמִשִּׁ֔ים כָּתְנוֹת֙ כֹּֽהֲנִ֔ים
    שְׁלֹשִׁ֖ים וַ/חֲמֵ֥שׁ מֵאֽוֹת׃
translation:
  text: And some of the heads of the fathers’ houses gave to the work. The governor
    gave to the treasury one thousand gold darics, fifty basins, and five hundred
    thirty-five priests’ tunics.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew reads 'five hundred thirty-five priests’ tunics.' The parallel in
      Ezra 2:69 reads 'one hundred priests’ tunics,' and some translations harmonize
      or reflect a different textual tradition.
    reason: textual_variant
  - marker: b
    text: Or 'the Tirshatha,' a Persian administrative title.
    reason: lexical_alternative
  - marker: c
    text: That is, Persian gold darics.
    reason: cultural_note
lexical_decisions:
- source_word: וּמִקְצָת
  chosen: And some of
  alternatives:
  - And from some of
  - And part of
  lexicon: HALOT
  rationale: The compound conjunction/preposition with קְצָת introduces a subset of
    the group. 'And some of' is natural English and preserves the partitive sense
    without awkwardness.
- source_word: רָאשֵׁי הָאָבוֹת
  chosen: the heads of the fathers’ houses
  alternatives:
  - the heads of the ancestral houses
  - the family heads
  lexicon: HALOT
  rationale: A standard postexilic social designation for clan leaders. 'Fathers’
    houses' preserves the idiom more formally; 'heads' reflects רָאשֵׁי. This is more
    transparent to the Hebrew than the smoother 'family heads,' which is preserved
    as an alternative.
- source_word: לַמְּלָאכָה
  chosen: to the work
  alternatives:
  - for the work
  - for the project
  lexicon: HALOT
  rationale: מְלָאכָה here refers to the rebuilding effort or associated temple/civic
    project. 'To the work' is a close rendering and idiomatic enough in context.
- source_word: הַתִּרְשָׁתָא
  chosen: the governor
  alternatives:
  - the Tirshatha
  lexicon: HALOT
  rationale: This Persian administrative title is best translated for clarity per
    the project's philosophy to translate titles. 'Governor' communicates the office;
    the transliterated form is preserved as an alternative.
- source_word: לָאוֹצָר
  chosen: to the treasury
  alternatives:
  - to the storehouse
  - to the treasury store
  lexicon: HALOT
  rationale: אוֹצָר can denote a treasury or storehouse. In a list of donated valuables,
    'treasury' best fits the context of deposited wealth.
- source_word: זָהָב דַּרְכְּמֹנִים אֶלֶף
  chosen: one thousand gold darics
  alternatives:
  - one thousand gold drachmas
  - a thousand gold coins
  lexicon: HALOT
  rationale: דַּרְכְּמֹנִים refers to Persian darics, a known gold coin. 'Darics'
    is historically precise; 'gold' is retained from the Hebrew. 'Drachmas' reflects
    some traditional renderings but is less precise for the Persian context.
- source_word: מִזְרָקוֹת
  chosen: basins
  alternatives:
  - bowls
  - sprinkling bowls
  lexicon: HALOT
  rationale: The term denotes vessels/bowls used in cultic settings. 'Basins' is a
    clear, conventional rendering; more specific cultic nuance is possible but not
    demanded here.
- source_word: כָּתְנוֹת כֹּהֲנִים
  chosen: priests’ tunics
  alternatives:
  - priestly garments
  - tunics for the priests
  - coats for the priests
  lexicon: HALOT
  rationale: כָּתְנוֹת are tunic-like garments; with כֹּהֲנִים the phrase means garments
    for priests. 'Priests’ tunics' is concise and reasonably precise.
- source_word: שְׁלֹשִׁים וַחֲמֵשׁ מֵאוֹת
  chosen: five hundred thirty-five
  alternatives:
  - three hundred thirty-five
  lexicon: HALOT
  rationale: The Hebrew as pointed reads 'thirty and five hundred' = 535. This differs
    from the parallel in Ezra 2:69, which likely explains why some versions harmonize
    to 335. The translation should follow the MT here and note the variant.
