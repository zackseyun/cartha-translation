id: NEH.7.60
reference: Nehemiah 7:60
source:
  edition: WLC
  text: כָּל הַ֨/נְּתִינִ֔ים וּ/בְנֵ֖י עַבְדֵ֣י שְׁלֹמֹ֑ה שְׁלֹ֥שׁ מֵא֖וֹת תִּשְׁעִ֥ים
    וּ/שְׁנָֽיִם־׃פ
translation:
  text: All the temple servants and the sons of Solomon’s servants were three hundred
    ninety-two.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Nethinim,” a traditional transliteration for a class of temple servants.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - The whole number of
  lexicon: HALOT
  rationale: כָּל introduces the total sum of the groups named; 'All' is the most
    natural concise English equivalent in a census context.
- source_word: הַנְּתִינִים
  chosen: the temple servants
  alternatives:
  - the Nethinim
  - the given ones
  lexicon: HALOT
  rationale: הַנְּתִינִים refers to a recognized class attached to temple service
    in the postexilic community. 'Temple servants' communicates function clearly in
    modern English, while 'Nethinim' is a less transparent transliteration. The transliterated
    alternative is preserved in a footnote because it is a conventional biblical term.
- source_word: וּבְנֵי
  chosen: and the sons of
  alternatives:
  - and the descendants of
  lexicon: HALOT
  rationale: בְּנֵי is formally 'sons of.' In genealogical/list contexts it can denote
    descendants, but here the traditional administrative designation 'sons of Solomon’s
    servants' is best preserved because it reflects the source wording and likely
    a recognized group name.
- source_word: עַבְדֵי
  chosen: servants
  alternatives:
  - slaves
  lexicon: HALOT
  rationale: עֶבֶד can mean 'servant' or 'slave.' In this fixed expression referring
    to Solomon’s dependents/servants, 'servants' is the most idiomatic and least misleading
    choice in English, since the verse is naming a social-administrative class rather
    than emphasizing conditions of bondage.
- source_word: שְׁלֹמֹה
  chosen: Solomon’s
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention, with possessive
    form required by English syntax.
- source_word: שְׁלֹשׁ מֵאוֹת תִּשְׁעִים וּשְׁנָיִם
  chosen: three hundred ninety-two
  alternatives:
  - '392'
  lexicon: HALOT
  rationale: The Hebrew cardinal number is rendered in standard readable English words
    rather than numerals for running biblical text.
