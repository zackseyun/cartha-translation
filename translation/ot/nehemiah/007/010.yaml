id: NEH.7.10
reference: Nehemiah 7:10
source:
  edition: WLC
  text: בְּנֵ֣י אָרַ֔ח שֵׁ֥שׁ מֵא֖וֹת חֲמִשִּׁ֥ים וּ/שְׁנָֽיִם׃ס
translation:
  text: 'The sons of Arah: six hundred fifty-two.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  - The children of
  lexicon: HALOT
  rationale: In this census/genealogical context, בְּנֵי literally means 'sons of'
    and functions as a clan designation. 'Sons of' preserves the formal structure
    of the Hebrew while remaining natural in English; alternatives like 'descendants
    of' are possible but slightly more interpretive.
- source_word: אָרַח
  chosen: Arah
  lexicon: HALOT
  rationale: Proper personal/clan name; transliterated according to the translation
    philosophy to transliterate names rather than translate them.
- source_word: שֵׁשׁ מֵאוֹת חֲמִשִּׁים וּשְׁנָיִם
  chosen: six hundred fifty-two
  alternatives:
  - six hundred and fifty-two
  lexicon: HALOT
  rationale: The Hebrew cardinal number sequence is rendered in standard modern English
    as 'six hundred fifty-two.' The form without 'and' fits readable modern English
    while accurately conveying the total.
