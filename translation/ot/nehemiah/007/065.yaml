id: NEH.7.65
reference: Nehemiah 7:65
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר הַ/תִּרְשָׁ֨תָא֙ לָ/הֶ֔ם אֲשֶׁ֥ר לֹא יֹאכְל֖וּ מִ/קֹּ֣דֶשׁ הַ/קֳּדָשִׁ֑ים
    עַ֛ד עֲמֹ֥ד הַ/כֹּהֵ֖ן לְ/אוּרִ֥ים וְ/תוּמִּֽים־׃
translation:
  text: And the governor said to them that they were not to eat from the most holy
    things until a priest should arise with Urim and Thummim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Tirshatha,' a Persian administrative title.
    reason: lexical_alternative
  - marker: b
    text: That is, the sacred priestly portions classed as 'most holy'; not the inner
      sanctuary ('the Holy of Holies').
    reason: cultural_note
lexical_decisions:
- source_word: הַתִּרְשָׁתָא
  chosen: the governor
  alternatives:
  - the Tirshatha
  - the governor of the province
  lexicon: HALOT
  rationale: The Persian administrative title is best translated for modern readability
    under the project's philosophy to translate titles rather than merely transliterate
    them. 'Governor' captures the office clearly; the transliterated form is preserved
    as an alternative.
- source_word: אֲשֶׁר לֹא יֹאכְלוּ
  chosen: that they were not to eat
  alternatives:
  - that they should not eat
  - that they must not eat
  lexicon: HALOT
  rationale: This clause reports the content of the governor's directive. 'Were not
    to eat' conveys prohibition in natural English without overstating it beyond the
    Hebrew imperfect in context.
- source_word: מִקֹּדֶשׁ הַקֳּדָשִׁים
  chosen: from the most holy things
  alternatives:
  - from the holy of holies
  - from the most holy food
  - from the sacred offerings
  lexicon: HALOT
  rationale: The phrase literally means 'from the holiness of holinesses,' an idiom
    for what is most holy. In this context of priestly entitlement, it refers to holy
    portions/offerings rather than the inner sanctuary itself, so 'the most holy things'
    preserves the superlative force while avoiding the misleading sanctuary sense
    of 'holy of holies.'
- source_word: עַד עֲמֹד הַכֹּהֵן
  chosen: until a priest should arise
  alternatives:
  - until the priest stood up
  - until a priest arose
  - until there should arise a priest
  lexicon: HALOT
  rationale: 'The infinitive construct with עַד marks a future point: the restriction
    remains until a priest arises. ''A priest'' is preferable to ''the priest'' in
    English because the Hebrew article can be generic here, referring to the needed
    priestly office-bearer rather than a previously identified individual.'
- source_word: לְאוּרִים וְתוּמִּים
  chosen: with Urim and Thummim
  alternatives:
  - for Urim and Thummim
  - by means of Urim and Thummim
  lexicon: HALOT
  rationale: These are the traditional names of the priestly means of discernment
    and are best transliterated as established cultic terms. 'With' is idiomatic in
    English for possession or use of these instruments, while preserving the Hebrew
    preposition's broad sense.
