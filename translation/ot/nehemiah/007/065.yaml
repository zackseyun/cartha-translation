theological_decisions:
- issue: Referent of 'most holy things'
  chosen_reading: priestly holy portions/offerings, not the inner sanctuary
  alternative_readings:
  - the Holy of Holies sanctuary
  rationale: In context, the issue is whether certain men of uncertain priestly genealogy
    may eat priestly portions. The phrase therefore concerns access to sacred food,
    not entry into the sanctuary. This avoids importing a temple-access meaning the
    text does not require.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of the Persian title
  chosen_reading: translate as 'governor'
  alternative_readings:
  - retain as 'Tirshatha'
  rationale: The project's philosophy prefers translating titles to preserve meaning.
    Since this is an administrative title rather than a personal name, 'governor'
    is the clearest main-text rendering.
  doctrine_reference: Translation philosophy §2
