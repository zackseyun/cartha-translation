id: NEH.7.18
reference: Nehemiah 7:18
source:
  edition: WLC
  text: בְּנֵי֙ אֲדֹ֣נִיקָ֔ם שֵׁ֥שׁ מֵא֖וֹת שִׁשִּׁ֥ים וְ/שִׁבְעָֽה׃ס
translation:
  text: the sons of Adonikam, six hundred sixty-seven.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: In these returnee lists, בְּנֵי introduces a family/clan grouping descended
    from the named ancestor. 'The sons of' is the most direct and conventional rendering,
    preserving the Hebrew form while still being understandable in English.
- source_word: אֲדֹנִיקָם
  chosen: Adonikam
  lexicon: HALOT
  rationale: Personal names are transliterated rather than translated, following the
    project's stated philosophy.
- source_word: שֵׁשׁ מֵאוֹת שִׁשִּׁים וְשִׁבְעָה
  chosen: six hundred sixty-seven
  alternatives:
  - six hundred and sixty-seven
  lexicon: HALOT
  rationale: The Hebrew cardinal number sequence is rendered as a standard English
    number expression. 'Sixty-seven' accurately reflects שִׁשִּׁים וְשִׁבְעָה. The
    form without 'and' is preferred for clean modern English.
