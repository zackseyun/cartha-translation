theological_decisions:
- issue: Divine providence expressed through the idiom 'the good hand of my God upon
    me'
  chosen_reading: Retain the anthropomorphic idiom rather than flattening it to a
    purely abstract statement of favor.
  alternative_readings:
  - because God favored me
  - because God was helping me
  rationale: The Hebrew idiom is theologically meaningful in Ezra-Nehemiah, emphasizing
    God's active providential involvement. Preserving 'hand' maintains the text's
    imagery and theological texture without importing additional doctrinal claims.
  doctrine_reference: Translation philosophy §1, §3, §6
