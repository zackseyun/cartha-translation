id: NEH.2.8
reference: Nehemiah 2:8
source:
  edition: WLC
  text: וְ/אִגֶּ֡רֶת אֶל אָסָף֩ שֹׁמֵ֨ר הַ/פַּרְדֵּ֜ס אֲשֶׁ֣ר לַ/מֶּ֗לֶךְ אֲשֶׁ֣ר
    יִתֶּן לִ֣/י עֵצִ֡ים לְ֠/קָרוֹת אֶת שַׁעֲרֵ֨י הַ/בִּירָ֤ה אֲשֶׁר לַ/בַּ֨יִת֙ וּ/לְ/חוֹמַ֣ת
    הָ/עִ֔יר וְ/לַ/בַּ֖יִת אֲשֶׁר אָב֣וֹא אֵלָ֑י/ו וַ/יִּתֶּן לִ֣/י הַ/מֶּ֔לֶךְ כְּ/יַד
    אֱלֹהַ֖/י הַ/טּוֹבָ֥ה עָלָֽ/י־־־־־־־׃
translation:
  text: and a letter to Asaph, the keeper of the king’s forest, that he should give
    me timber to make beams for the gates of the fortress by the temple, and for the
    wall of the city, and for the house that I will occupy. And the king gave them
    to me, according to the good hand of my God upon me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the king’s park' or 'the king’s orchard'; the Hebrew pardes denotes
      a royal preserve or managed woodland.
    reason: lexical_alternative
  - marker: b
    text: Or 'the gates of the citadel.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'the house'; here likely referring to the temple.
    reason: lexical_alternative
  - marker: d
    text: Literally 'according to the good hand of my God upon me,' an idiom for God’s
      favorable providence.
    reason: cultural_note
lexical_decisions:
- source_word: אִגֶּרֶת
  chosen: a letter
  alternatives:
  - an official letter
  - a document
  lexicon: HALOT
  rationale: The noun denotes a written letter or official document. 'A letter' is
    the most natural English rendering here and fits the sequence of Nehemiah's requests
    to the king.
- source_word: שֹׁמֵר הַפַּרְדֵּס
  chosen: the keeper of the king’s forest
  alternatives:
  - the keeper of the king’s park
  - the keeper of the king’s orchard
  lexicon: HALOT
  rationale: פַּרְדֵּס can denote a park, preserve, or forested royal estate. In this
    context Asaph is asked to supply construction timber, so 'forest' best conveys
    the source-text function in context, while preserving the idea of a royal managed
    woodland.
- source_word: יִתֶּן לִי עֵצִים
  chosen: he should give me timber
  alternatives:
  - he should give me wood
  - he should give me trees
  lexicon: HALOT
  rationale: עֵצִים literally means 'trees/wood,' but in a building context the intended
    sense is construction wood. 'Timber' is idiomatic and suitably specific without
    overtranslating.
- source_word: לְקָרוֹת
  chosen: to make beams
  alternatives:
  - to beam
  - to roof
  - for beams
  lexicon: HALOT
  rationale: The infinitive from קרה is associated with laying beams or roofing. 'To
    make beams' communicates the practical purpose of the timber in clear English.
    A more literal 'to beam' is unnatural, while 'to roof' may be too narrow for all
    the listed structures.
- source_word: שַׁעֲרֵי הַבִּירָה
  chosen: the gates of the fortress
  alternatives:
  - the gates of the citadel
  - the gates of the temple complex
  lexicon: HALOT
  rationale: בִּירָה refers to a fortified structure or citadel. Since it is further
    qualified as 'by the temple/house,' 'fortress' is a clear rendering. 'Citadel'
    is possible but less common in contemporary English.
- source_word: אֲשֶׁר לַבַּיִת
  chosen: by the temple
  alternatives:
  - that belongs to the temple
  - of the house
  lexicon: HALOT
  rationale: 'בַּיִת here likely refers to the temple (''the house'' par excellence
    in this context). Rendering it ''the temple'' makes the referent clear for modern
    readers. The relation expressed by אֲשֶׁר לַ can be represented idiomatically
    as proximity/association: ''by the temple.'''
- source_word: חוֹמַת הָעִיר
  chosen: the wall of the city
  alternatives:
  - the city wall
  lexicon: HALOT
  rationale: Both are accurate. 'The wall of the city' stays closer to the Hebrew
    construct chain while remaining natural English.
- source_word: הַבַּיִת אֲשֶׁר אָבוֹא אֵלָיו
  chosen: the house that I will occupy
  alternatives:
  - the house into which I will enter
  - the house where I will stay
  lexicon: HALOT
  rationale: Literally, 'the house that I will enter into.' In context this refers
    to Nehemiah's residence. 'Occupy' expresses intended use in natural English without
    excessive paraphrase; 'enter into' is too wooden.
- source_word: וַיִּתֶּן לִי הַמֶּלֶךְ
  chosen: the king gave them to me
  alternatives:
  - the king gave me what I asked
  - the king granted them to me
  lexicon: HALOT
  rationale: The Hebrew says simply 'the king gave to me.' English normally supplies
    the implied object from the preceding requests; 'them' refers to the requested
    letters/material provisions and avoids awkward ellipsis.
- source_word: כְּיַד אֱלֹהַי הַטּוֹבָה עָלַי
  chosen: according to the good hand of my God upon me
  alternatives:
  - because the good hand of my God was upon me
  - in keeping with the gracious hand of my God on me
  lexicon: HALOT
  rationale: This is a common idiom in Ezra-Nehemiah for divine favor and providential
    help. 'According to the good hand of my God upon me' preserves the metaphor closely
    while remaining intelligible. 'Gracious hand' is interpretive and less literal
    than the Hebrew adjective 'good'.
