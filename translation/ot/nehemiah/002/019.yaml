theological_decisions:
- issue: Rendering of עֶבֶד in Tobiah's designation
  chosen_reading: slave
  alternative_readings:
  - servant
  - official
  rationale: No major doctrinal issue is at stake, but the project's translation philosophy
    prefers 'slave' over 'servant' where the bonded sense is present. Because this
    is part of a personal designation and some readers may understand it as an official
    title, the alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §1; Contested terms table for δοῦλος
    by analogy of bonded-status language
