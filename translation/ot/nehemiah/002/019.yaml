id: NEH.2.19
reference: Nehemiah 2:19
source:
  edition: WLC
  text: וַ/יִּשְׁמַע֩ סַנְבַלַּ֨ט הַ/חֹרֹנִ֜י וְ/טֹבִיָּ֣ה הָ/עֶ֣בֶד הָֽ/עַמּוֹנִ֗י
    וְ/גֶ֨שֶׁם֙ הָֽ/עַרְבִ֔י וַ/יַּלְעִ֣גוּ לָ֔/נוּ וַ/יִּבְז֖וּ עָלֵ֑י/נוּ וַ/יֹּאמְר֗וּ
    מָֽה הַ/דָּבָ֤ר הַ/זֶּה֙ אֲשֶׁ֣ר אַתֶּ֣ם עֹשִׂ֔ים הַ/עַ֥ל הַ/מֶּ֖לֶךְ אַתֶּ֥ם
    מֹרְדִֽים׀־׃
translation:
  text: But when Sanballat the Horonite, Tobiah the Ammonite slave, and Geshem the
    Arab heard, they mocked us and despised us, and said, “What is this thing that
    you are doing? Are you rebelling against the king?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Tobiah the Ammonite servant”; some take the designation more broadly
      as an official title.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: when ... heard
  alternatives:
  - and ... heard
  - but when ... heard
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. In English, 'when ... heard'
    best connects the hearing with the following hostile response; 'But' is supplied
    at clause level to mark contrast with the prior progress in the narrative.
- source_word: הַחֹרֹנִי
  chosen: the Horonite
  alternatives:
  - the man from Horon
  lexicon: HALOT
  rationale: A gentilic/title is best preserved by transliteration as an ethnic/geographic
    designation attached to the personal name.
- source_word: הָעֶבֶד
  chosen: slave
  alternatives:
  - servant
  - official
  lexicon: HALOT
  rationale: The noun normally denotes a servant/slave. Following the project's philosophy,
    'slave' is preferred where bonded status is foregrounded. Here it functions as
    a designation for Tobiah; 'official' is interpretive and less transparent to the
    Hebrew.
- source_word: הָעַמּוֹנִי
  chosen: the Ammonite
  alternatives:
  - an Ammonite
  lexicon: HALOT
  rationale: 'The gentilic with article is naturally rendered as an identifying title:
    ''the Ammonite.'''
- source_word: הָעַרְבִי
  chosen: the Arab
  alternatives:
  - the Arabian
  lexicon: HALOT
  rationale: The gentilic is best rendered straightforwardly as an ethnic/regional
    designation. 'The Arab' is concise and natural in modern English.
- source_word: וַיַּלְעִגוּ לָנוּ
  chosen: they mocked us
  alternatives:
  - they laughed at us
  - they ridiculed us
  lexicon: HALOT
  rationale: The verb conveys derision or mockery. 'Mocked us' is idiomatic and preserves
    the hostile scorn.
- source_word: וַיִּבְזוּ עָלֵינוּ
  chosen: despised us
  alternatives:
  - held us in contempt
  - showed contempt for us
  lexicon: HALOT
  rationale: The verb denotes treating with contempt. 'Despised us' is compact and
    strong, while preserving the parallel escalation with 'mocked us.'
- source_word: מָה הַדָּבָר הַזֶּה
  chosen: What is this thing
  alternatives:
  - What is this matter
  - What is this that
  lexicon: HALOT
  rationale: A relatively formal but clear rendering preserves the concrete phrasing
    of the Hebrew rather than smoothing it into a paraphrase.
- source_word: אֲשֶׁר אַתֶּם עֹשִׂים
  chosen: that you are doing
  alternatives:
  - which you are doing
  - that you are making
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the relative clause with עשׂה in context.
- source_word: הַעַל הַמֶּלֶךְ אַתֶּם מֹרְדִים
  chosen: Are you rebelling against the king?
  alternatives:
  - Is it against the king that you are rebelling?
  - You are rebelling against the king!
  lexicon: HALOT
  rationale: The construction is best taken as an accusatory question. 'Against the
    king' captures על in this context, and the participle מֹרְדִים conveys ongoing/rebellious
    action.
