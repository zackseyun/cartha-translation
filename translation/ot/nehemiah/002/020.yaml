id: NEH.2.20
reference: Nehemiah 2:20
source:
  edition: WLC
  text: וָ/אָשִׁ֨יב אוֹתָ֜/ם דָּבָ֗ר וָ/אוֹמַ֤ר לָ/הֶם֙ אֱלֹהֵ֣י הַ/שָּׁמַ֔יִם ה֚וּא
    יַצְלִ֣יחַֽ לָ֔/נוּ וַ/אֲנַ֥חְנוּ עֲבָדָ֖י/ו נָק֣וּם וּ/בָנִ֑ינוּ וְ/לָ/כֶ֗ם אֵֽין
    חֵ֧לֶק וּ/צְדָקָ֛ה וְ/זִכָּר֖וֹן בִּ/ירוּשָׁלִָֽם־׃
translation:
  text: Then I answered them and said, “The God of heaven—he will make us prosper,
    and we his servants will arise and build. But you have no share or claim or memorial
    in Jerusalem.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “will give us success.”
    reason: lexical_alternative
  - marker: b
    text: Or “no share or right or memorial in Jerusalem.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וָ/אָשִׁיב ... דָּבָר
  chosen: Then I answered
  alternatives:
  - Then I returned an answer
  - Then I replied
  lexicon: HALOT
  rationale: The idiom שׁוּב + דָּבָר means to give an answer or reply, not literally
    'return a word.' 'Answered' is natural English and preserves the responsive force.
- source_word: וָ/אוֹמַר לָ/הֶם
  chosen: and said
  alternatives:
  - and I said to them
  lexicon: HALOT
  rationale: Standard narrative continuation. 'Said' is sufficient in English since
    'them' is already implied by the prior clause, but retained explicitly in the
    full sentence structure.
- source_word: אֱלֹהֵי הַשָּׁמַיִם
  chosen: The God of heaven
  alternatives:
  - The God of the heavens
  lexicon: HALOT
  rationale: This is a common post-exilic title for God. Singular 'heaven' is idiomatic
    in English while accurately representing the Hebrew expression.
- source_word: הוּא
  chosen: he
  alternatives:
  - he himself
  lexicon: HALOT
  rationale: The pronoun is emphatic. English can reflect this with word order and
    punctuation rather than an overly heavy 'he himself.'
- source_word: יַצְלִיחַ לָנוּ
  chosen: will make us prosper
  alternatives:
  - will give us success
  - will cause us to succeed
  lexicon: HALOT
  rationale: Hiphil of צלח here means to grant success/prosperity in the undertaking.
    'Make us prosper' preserves the causative nuance and fits the rebuilding context.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, here the emphasis is covenantal
    service to God rather than bonded social status. 'Servants' is the more contextually
    fitting rendering.
- source_word: נָקוּם
  chosen: will arise
  alternatives:
  - will rise up
  - will get up
  lexicon: HALOT
  rationale: The verb conveys determined action to begin the work. 'Arise' preserves
    the formal resolve of the statement.
- source_word: וּבָנִינוּ
  chosen: and build
  alternatives:
  - and we will build
  - and rebuild
  lexicon: HALOT
  rationale: The Hebrew form is a simple first person plural perfect with prefixed
    conjunction in context functioning prospectively after 'we will arise.' English
    smooths this as coordinated future action. 'Build' is closer to the Hebrew than
    the interpretive 'rebuild,' though the context makes the object clear.
- source_word: אֵין חֵלֶק
  chosen: no share
  alternatives:
  - no portion
  - no part
  lexicon: HALOT
  rationale: חלק denotes an allotted portion or share. 'Share' is clear modern English
    and suits the triad that follows.
- source_word: וּצְדָקָה
  chosen: or claim
  alternatives:
  - or right
  - or righteousness
  lexicon: HALOT
  rationale: In this context צדקה does not mean moral righteousness but a rightful
    claim, entitlement, or just cause regarding Jerusalem. 'Claim' communicates the
    legal-relational sense most clearly.
- source_word: וְזִכָּרוֹן
  chosen: or memorial
  alternatives:
  - or remembrance
  - or commemorative right
  lexicon: HALOT
  rationale: The term refers to remembered standing or commemorative association.
    'Memorial' is concise and preserves the public/covenantal nuance better than the
    more subjective 'remembrance.'
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  alternatives:
  - at Jerusalem
  lexicon: HALOT
  rationale: Standard locative rendering.
