theological_decisions:
- issue: Rendering of divine servant terminology
  chosen_reading: his servants
  alternative_readings:
  - his slaves
  rationale: The project prefers 'slave' where bonded status is theologically salient,
    but here Nehemiah's point is allegiance and authorized service to God in contrast
    to opponents' lack of standing in Jerusalem. 'Servants' better fits the discourse
    without softening a key theological claim elsewhere.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    for δοῦλος by analogy of bonded-service language
- issue: Sense of צְדָקָה in the exclusion formula
  chosen_reading: claim
  alternative_readings:
  - right
  - righteousness
  rationale: The verse denies Sanballat and his allies any legitimate standing in
    Jerusalem. Translating as 'righteousness' would import a moral/theological category
    not demanded by this legal-political context.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
