id: NEH.2.17
reference: Nehemiah 2:17
source:
  edition: WLC
  text: וָ/אוֹמַ֣ר אֲלֵ/הֶ֗ם אַתֶּ֤ם רֹאִים֙ הָ/רָעָה֙ אֲשֶׁ֣ר אֲנַ֣חְנוּ בָ֔/הּ אֲשֶׁ֤ר
    יְרוּשָׁלִַ֨ם֙ חֲרֵבָ֔ה וּ/שְׁעָרֶ֖י/הָ נִצְּת֣וּ בָ/אֵ֑שׁ לְכ֗וּ וְ/נִבְנֶה֙
    אֶת חוֹמַ֣ת יְרוּשָׁלִַ֔ם וְ/לֹא נִהְיֶ֥ה ע֖וֹד חֶרְפָּֽה־־׃
translation:
  text: 'Then I said to them, “You see the trouble we are in: Jerusalem lies in ruins,
    and its gates have been burned with fire. Come, let us rebuild the wall of Jerusalem,
    so that we may no longer be a reproach.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the distress' or 'the misery' for 'the trouble.' The Hebrew term can
      denote calamity or adversity rather than moral evil in this context.
    reason: lexical_alternative
  - marker: b
    text: Or 'Jerusalem is desolate.'
    reason: lexical_alternative
  - marker: c
    text: Or 'we will no longer be a disgrace' or 'an object of scorn.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרָעָה
  chosen: the trouble
  alternatives:
  - the distress
  - the evil
  - the misery
  lexicon: HALOT
  rationale: Though רָעָה can denote evil or calamity, here the context is the community's
    damaged condition and vulnerability, so 'trouble' naturally conveys their plight
    without implying moral evil.
- source_word: אֲשֶׁר אֲנַחְנוּ בָהּ
  chosen: we are in
  alternatives:
  - in which we are
  - that has come upon us
  lexicon: HALOT
  rationale: This idiom expresses the condition presently experienced by the speakers.
    'We are in' is concise, natural English that preserves the sense of being situated
    in distress.
- source_word: חֲרֵבָה
  chosen: lies in ruins
  alternatives:
  - is desolate
  - is ruined
  lexicon: HALOT
  rationale: The adjective describes Jerusalem as devastated. 'Lies in ruins' is idiomatic
    English and vividly reflects the city's physical state.
- source_word: נִצְּתוּ בָאֵשׁ
  chosen: have been burned with fire
  alternatives:
  - have been burned
  - were set on fire
  lexicon: HALOT
  rationale: The Niphal verb indicates the gates were burned, and the phrase בָאֵשׁ
    is retained as 'with fire' to preserve the Hebrew emphasis rather than reducing
    it to a bare passive.
- source_word: לְכוּ
  chosen: Come
  alternatives:
  - Go
  - Come now
  lexicon: HALOT
  rationale: Though literally 'go,' in exhortative discourse it functions as an appeal
    to action. 'Come' is the natural English equivalent in this invitational setting.
- source_word: וְנִבְנֶה
  chosen: let us rebuild
  alternatives:
  - and let us build
  - that we may build
  lexicon: HALOT
  rationale: The cohortative expresses shared resolve. 'Let us rebuild' fits the context
    because the wall previously existed and is now to be restored.
- source_word: חוֹמַת יְרוּשָׁלִַם
  chosen: the wall of Jerusalem
  alternatives:
  - Jerusalem's wall
  lexicon: HALOT
  rationale: A straightforward construct rendering preserves the formal relation and
    keeps the focus on the city's fortification.
- source_word: וְלֹא נִהְיֶה עוֹד חֶרְפָּה
  chosen: so that we may no longer be a reproach
  alternatives:
  - and we will no longer be a disgrace
  - that we may no longer be an object of scorn
  lexicon: HALOT
  rationale: חֶרְפָּה denotes public shame, disgrace, or reproach. 'Be a reproach'
    preserves the covenantal and communal shame dimension without over-paraphrasing.
    The clause is rendered with 'so that' to express the purpose/result force naturally
    in English.
