  chosen_reading: the God of heaven
  alternative_readings:
  - God of heaven
  rationale: This is a reverential title for Israel's God in post-exilic context.
    The translation preserves the title without importing additional theological interpretation.
    No contested doctrinal term from the provided table is involved.
