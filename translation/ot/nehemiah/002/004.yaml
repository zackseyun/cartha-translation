id: NEH.2.4
reference: Nehemiah 2:4
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר לִ/י֙ הַ/מֶּ֔לֶךְ עַל מַה זֶּ֖ה אַתָּ֣ה מְבַקֵּ֑שׁ וָֽ/אֶתְפַּלֵּ֔ל
    אֶל אֱלֹהֵ֖י הַ/שָּׁמָֽיִם־־־׃
translation:
  text: Then the king said to me, “What is it that you are seeking?” So I prayed to
    the God of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “What are you asking for?”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative progression while preserving sequence better than a bare 'and.'
- source_word: לִי
  chosen: to me
  lexicon: HALOT
  rationale: Straightforward dative pronoun indicating the king's speech is addressed
    to Nehemiah.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun referring to the previously identified Persian king; standard
    rendering.
- source_word: עַל־מַה זֶּה
  chosen: What is it that
  alternatives:
  - For what is this that
  - About what is this that
  - What is this that
  lexicon: HALOT
  rationale: The idiom introduces the content of the request. 'What is it that' is
    idiomatic English that preserves the interrogative force without woodenly reproducing
    the preposition.
- source_word: אַתָּה מְבַקֵּשׁ
  chosen: you are seeking
  alternatives:
  - you seek
  - you are asking for
  - you want
  lexicon: HALOT
  rationale: בקש commonly means 'seek' or 'request.' Here, in court context, it refers
    to what Nehemiah is requesting from the king. 'You are seeking' preserves the
    lexical sense while remaining natural; 'asking for' is possible but slightly more
    interpretive.
- source_word: וָאֶתְפַּלֵּל
  chosen: So I prayed
  alternatives:
  - And I prayed
  - Then I prayed
  lexicon: HALOT
  rationale: 'The verb denotes prayer, and the waw marks the next action. ''So'' fits
    the immediate responsive sense in context: upon the king''s question, Nehemiah
    prayed.'
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: With verbs of prayer, English idiom normally uses 'to' rather than the
    more spatially literal 'toward.'
- source_word: אֱלֹהֵי הַשָּׁמַיִם
  chosen: the God of heaven
  alternatives:
  - God of heaven
  lexicon: HALOT
  rationale: Construct phrase with definite article on 'heaven' functioning as a divine
    title. Including 'the' yields standard English for the title and reflects the
    definiteness of the Hebrew expression.
