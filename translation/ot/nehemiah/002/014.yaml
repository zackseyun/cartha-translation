id: NEH.2.14
reference: Nehemiah 2:14
source:
  edition: WLC
  text: וָ/אֶֽעֱבֹר֙ אֶל שַׁ֣עַר הָ/עַ֔יִן וְ/אֶל בְּרֵכַ֖ת הַ/מֶּ֑לֶךְ וְ/אֵין מָק֥וֹם
    לַ/בְּהֵמָ֖ה לַ/עֲבֹ֥ר תַּחְתָּֽ/י־־־׃
translation:
  text: Then I went on to the Fountain Gate and to the King’s Pool, but there was
    no place for the animal under me to pass.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Spring Gate.' The Hebrew word can denote a spring or fountain.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'for the animal under me to pass,' referring to the animal Nehemiah
      was riding.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶעֱבֹר
  chosen: Then I went on
  alternatives:
  - Then I passed on
  - Then I went across
  lexicon: HALOT
  rationale: The verb עבר broadly means 'pass, go by, go through.' In this narrative
    of nighttime inspection, idiomatic English favors 'went on' to express continued
    movement from one location to another without implying a literal crossing of water
    or a boundary.
- source_word: שַׁעַר הָעַיִן
  chosen: the Fountain Gate
  alternatives:
  - the Spring Gate
  - the Gate of the Spring
  lexicon: HALOT
  rationale: עַיִן can denote an eye or a spring/fountain. In topographical context
    with Jerusalem gates, the water-source sense is required. 'Fountain Gate' is a
    familiar and natural rendering, though 'Spring Gate' is also possible.
- source_word: בְּרֵכַת הַמֶּלֶךְ
  chosen: the King’s Pool
  alternatives:
  - the royal pool
  - the king's reservoir
  lexicon: HALOT
  rationale: בְּרֵכָה refers to a pool or reservoir. 'King’s Pool' is a straightforward
    construct rendering and suits the likely named location.
- source_word: וְאֵין מָקוֹם
  chosen: but there was no place
  alternatives:
  - and there was no place
  - but there was no room
  lexicon: HALOT
  rationale: The clause states lack of space. Rendering the conjunction as 'but' brings
    out the adversative sense in English narrative, since the lack of room hindered
    further movement.
- source_word: לַבְּהֵמָה
  chosen: for the animal
  alternatives:
  - for the beast
  - for my mount
  lexicon: HALOT
  rationale: בְּהֵמָה is a general term for beast/animal. Since the specific species
    is not named here, 'animal' preserves the Hebrew's generality. 'My mount' is interpretive,
    though context implies a ridden animal.
- source_word: לַעֲבֹר
  chosen: to pass
  alternatives:
  - to get through
  - to go through
  lexicon: HALOT
  rationale: The infinitive of עבר is best kept with the simple verbal idea 'to pass,'
    matching the spatial obstruction described.
- source_word: תַּחְתָּי
  chosen: under me
  alternatives:
  - beneath me
  - that was under me
  lexicon: HALOT
  rationale: The preposition with 1cs suffix is literally 'under me.' In context it
    refers to the animal Nehemiah was riding. Keeping the literal expression preserves
    the Hebrew wording while remaining intelligible in English.
