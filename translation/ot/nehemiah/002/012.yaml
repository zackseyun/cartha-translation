id: NEH.2.12
reference: Nehemiah 2:12
source:
  edition: WLC
  text: וָ/אָק֣וּם לַ֗יְלָה אֲנִי֮ וַ/אֲנָשִׁ֣ים מְעַט֮ עִמִּ/י֒ וְ/לֹא הִגַּ֣דְתִּי
    לְ/אָדָ֔ם מָ֗ה אֱלֹהַ/י֙ נֹתֵ֣ן אֶל לִבִּ֔/י לַ/עֲשׂ֖וֹת לִ/ירוּשָׁלִָ֑ם וּ/בְהֵמָה֙
    אֵ֣ין עִמִּ֔/י כִּ֚י אִם הַ/בְּהֵמָ֔ה אֲשֶׁ֥ר אֲנִ֖י רֹכֵ֥ב בָּֽ/הּ׀׀־־־׃
translation:
  text: So I arose in the night, I and a few men with me, and I had not told any man
    what my God was putting into my heart to do for Jerusalem. And there was no animal
    with me except the animal on which I was riding.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I had told no one.' The Hebrew says literally 'I had not told any man.'
    reason: lexical_alternative
  - marker: b
    text: Or 'what my God had put into my heart' or 'what my God was prompting in
      my heart.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'animal' (or 'beast'), a general term for a riding animal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאָקוּם
  chosen: So I arose
  alternatives:
  - Then I arose
  - I got up
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום, narrative past. 'Arose' preserves the formal narrative
    tone better than the more colloquial 'got up.' 'So' reflects the connective force
    in context.
- source_word: לַיְלָה
  chosen: in the night
  alternatives:
  - by night
  - at night
  lexicon: HALOT
  rationale: The noun here marks the time of action. 'In the night' is a natural rendering
    that preserves the nocturnal setting without sounding archaic like 'by night.'
- source_word: וַאֲנָשִׁים מְעַט עִמִּי
  chosen: I and a few men with me
  alternatives:
  - and a few men with me
  - I, along with a few men
  lexicon: HALOT
  rationale: The Hebrew explicitly includes the pronoun אֲנִי followed by the accompanying
    group. Rendering the pronoun keeps Nehemiah's self-reference explicit. 'Men' is
    retained as gender-accurate to אֲנָשִׁים per translation philosophy.
- source_word: וְלֹא הִגַּדְתִּי לְאָדָם
  chosen: and I had not told any man
  alternatives:
  - and I had told no one
  - and I did not tell anyone
  lexicon: HALOT
  rationale: הגיד means 'tell, declare, make known.' לְאָדָם is literally 'to a man/any
    man.' Because אָדָם here refers to any person individually, 'any man' preserves
    the Hebrew wording; 'anyone/no one' is smoother but less gender-accurate to the
    source form.
- source_word: לְאָדָם
  chosen: any man
  alternatives:
  - anyone
  - a person
  lexicon: HALOT
  rationale: This uses אָדָם in an indefinite singular sense. Following the doctrine's
    gender-accurate principle, 'man' is preferred where the source uses the singular
    masculine form with representative force.
- source_word: מָה אֱלֹהַי נֹתֵן אֶל לִבִּי
  chosen: what my God was putting into my heart
  alternatives:
  - what my God had put into my heart
  - what my God was giving to my heart
  - what my God was prompting in my heart
  lexicon: HALOT
  rationale: נֹתֵן is a participle, suggesting ongoing or vivid action rather than
    a simple completed past. 'Was putting into my heart' captures the idiom and preserves
    divine prompting without over-interpreting it as a technical revelation formula.
- source_word: אֱלֹהַי
  chosen: my God
  lexicon: HALOT
  rationale: Straightforward possessive rendering of the common noun with first-person
    suffix.
- source_word: אֶל לִבִּי
  chosen: into my heart
  alternatives:
  - in my heart
  - on my heart
  - into my mind
  lexicon: HALOT
  rationale: Hebrew לב often denotes the inner thought/will center. 'Into my heart'
    preserves the Hebrew idiom and its affective-volitional nuance better than reducing
    it to 'mind.'
- source_word: לַעֲשׂוֹת לִירוּשָׁלִָם
  chosen: to do for Jerusalem
  alternatives:
  - to do in Jerusalem
  - to act for Jerusalem
  - to accomplish for Jerusalem
  lexicon: HALOT
  rationale: The infinitive plus preposition is somewhat open-ended. 'To do for Jerusalem'
    preserves the Hebrew's broadness and avoids prematurely specifying rebuilding
    or reform, which the context will unfold.
- source_word: וּבְהֵמָה אֵין עִמִּי
  chosen: And there was no animal with me
  alternatives:
  - And I had no animal with me
  - And there was no beast with me
  lexicon: HALOT
  rationale: בְּהֵמָה here refers generally to a riding animal/beast. 'Animal' is
    clear modern English; 'beast' sounds archaic or overly harsh. The existential
    אֵין is naturally rendered 'there was no.'
- source_word: כִּי אִם הַבְּהֵמָה
  chosen: except the animal
  alternatives:
  - except for the animal
  - but only the animal
  lexicon: HALOT
  rationale: כִּי אִם introduces an exception. 'Except the animal' is concise and
    natural in English.
- source_word: אֲשֶׁר אֲנִי רֹכֵב בָּהּ
  chosen: on which I was riding
  alternatives:
  - that I was riding
  - which I rode on
  lexicon: HALOT
  rationale: The participle רֹכֵב again suggests ongoing action in the scene. 'On
    which I was riding' is idiomatic and preserves the relative clause structure.
