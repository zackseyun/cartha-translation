theological_decisions:
- issue: Divine prompting in Nehemiah's inner resolve
  chosen_reading: Rendered נֹתֵן אֶל לִבִּי as 'was putting into my heart' without
    expanding it into explicit revelation language.
  alternative_readings:
  - what my God had put into my heart
  - what my God was prompting me to do
  rationale: The verse attributes Nehemiah's plan to God's initiative, but the Hebrew
    idiom does not require a stronger claim such as verbal revelation. The chosen
    wording preserves the theological tension between divine prompting and human agency.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
