theological_decisions:
- issue: Rendering the divine-action idiom 'the hand of my God was good upon me'
  chosen_reading: Preserve the metaphor of God's hand rather than interpret it as
    mere providential favor
  alternative_readings:
  - the favor of my God was upon me
  - my God had been gracious to me
  rationale: The verse attributes Nehemiah's success both to divine agency and royal
    support. Keeping 'hand' preserves the theological texture of God's active involvement
    without over-interpreting the exact mode of action.
  doctrine_reference: Translation philosophy §1, §3
