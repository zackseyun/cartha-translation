id: NEH.2.18
reference: Nehemiah 2:18
source:
  edition: WLC
  text: וָ/אַגִּ֨יד לָ/הֶ֜ם אֶת יַ֣ד אֱלֹהַ֗/י אֲשֶׁר הִיא֙ טוֹבָ֣ה עָלַ֔/י וְ/אַף
    דִּבְרֵ֥י הַ/מֶּ֖לֶךְ אֲשֶׁ֣ר אָֽמַר לִ֑/י וַ/יֹּֽאמְרוּ֙ נָק֣וּם וּ/בָנִ֔ינוּ
    וַ/יְחַזְּק֥וּ יְדֵי/הֶ֖ם לַ/טּוֹבָֽה־־־־׃פ
translation:
  text: So I told them that the hand of my God was good upon me, and also the words
    of the king that he had spoken to me. And they said, “Let us rise up and build.”
    So they strengthened their hands for the good work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'was favorable to me' or 'was gracious toward me.' The Hebrew literally
      says, 'was good upon me.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'Let us arise and build.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'they strengthened their hands for good.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאַגִּיד
  chosen: So I told
  alternatives:
  - And I told
  - Then I declared
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Told' is natural modern
    English for נגד in this context of reporting to the people; 'So' captures the
    consequential flow from the preceding events.
- source_word: יַד אֱלֹהַי
  chosen: the hand of my God
  alternatives:
  - my God's hand
  lexicon: HALOT
  rationale: A common Hebrew idiom for God's active favor or power. Kept formally
    as 'hand' rather than paraphrasing to 'favor' so the metaphor remains visible.
- source_word: אֲשֶׁר הִיא טוֹבָה עָלַי
  chosen: was good upon me
  alternatives:
  - had been favorable to me
  - was gracious toward me
  lexicon: HALOT
  rationale: Retains the Hebrew idiom closely. 'Good upon me' sounds slightly marked
    in English but remains intelligible and preserves the concrete phrasing better
    than a fuller paraphrase.
- source_word: וְאַף
  chosen: and also
  alternatives:
  - and even
  - also
  lexicon: HALOT
  rationale: 'Adds the second item Nehemiah reported: not only God''s hand, but also
    the king''s words.'
- source_word: דִּבְרֵי הַמֶּלֶךְ אֲשֶׁר אָמַר לִי
  chosen: the words of the king that he had spoken to me
  alternatives:
  - what the king had said to me
  lexicon: HALOT
  rationale: Slightly fuller and more formal, preserving both 'words' and the relative
    clause. Past perfect 'had spoken' fits the prior speech relative to Nehemiah's
    telling.
- source_word: נָקוּם וּבָנִינוּ
  chosen: Let us rise up and build
  alternatives:
  - Let us arise and build
  - We will rise up and build
  lexicon: HALOT
  rationale: Though morphologically first person plural forms, in context this is
    a cohortative-like exhortation. 'Let us rise up and build' best captures the communal
    resolve.
- source_word: וַיְחַזְּקוּ יְדֵיהֶם
  chosen: So they strengthened their hands
  alternatives:
  - And they strengthened their hands
  - They took courage
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of strengthening the hands. Preserved
    in translation rather than reduced to an abstract paraphrase, since the image
    is clear enough in English.
- source_word: לַטּוֹבָה
  chosen: for the good work
  alternatives:
  - for good
  - for what was good
  lexicon: HALOT
  rationale: The phrase likely points to the rebuilding task as a good undertaking.
    'For the good work' makes the implied object explicit enough for English while
    staying close to the sense of the Hebrew.
