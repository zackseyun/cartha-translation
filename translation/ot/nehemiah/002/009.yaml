id: NEH.2.9
reference: Nehemiah 2:9
source:
  edition: WLC
  text: וָֽ/אָב֗וֹא אֶֽל פַּֽחֲווֹת֙ עֵ֣בֶר הַ/נָּהָ֔ר וָ/אֶתְּנָ֣/ה לָ/הֶ֔ם אֵ֖ת
    אִגְּר֣וֹת הַ/מֶּ֑לֶךְ וַ/יִּשְׁלַ֤ח עִמִּ/י֙ הַ/מֶּ֔לֶךְ שָׂ֥רֵי חַ֖יִל וּ/פָרָשִֽׁים־׃פ
translation:
  text: So I came to the governors of the province Beyond the River and gave them
    the king’s letters. Now the king had sent with me army officers and horsemen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to the governors Beyond the River.” The Hebrew expression likely refers
      to the Persian administrative region west of the Euphrates, often called Trans-Euphrates.
    reason: cultural_note
  - marker: b
    text: Or “military officers and cavalry.”
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּחֲווֹת
  chosen: governors
  alternatives:
  - satraps
  - provincial governors
  lexicon: HALOT
  rationale: Refers to Persian imperial officials governing districts. 'Governors'
    is clear modern English; 'satraps' is historically possible but more technical
    and less accessible.
- source_word: עֵבֶר הַנָּהָר
  chosen: the province Beyond the River
  alternatives:
  - Beyond the River
  - Trans-Euphrates
  lexicon: HALOT
  rationale: This is a Persian administrative designation, not merely a directional
    phrase. Adding 'the province' makes the sense explicit in English while preserving
    the title-like force of the expression.
- source_word: אִגְּרוֹת
  chosen: letters
  alternatives:
  - documents
  - official letters
  lexicon: HALOT
  rationale: The term denotes written correspondence; in context these are royal letters
    of authorization. 'Letters' is the most natural and sufficiently precise rendering.
- source_word: שָׂרֵי חַיִל
  chosen: army officers
  alternatives:
  - commanders of the army
  - military officers
  lexicon: HALOT
  rationale: The construct phrase denotes military leaders. 'Army officers' is concise,
    natural English and preserves the official military sense.
- source_word: פָרָשִׁים
  chosen: horsemen
  alternatives:
  - cavalry
  lexicon: HALOT
  rationale: Literally mounted riders/horsemen. 'Horsemen' stays closer to the Hebrew
    than the more collective and interpretive 'cavalry'.
- source_word: וַיִּשְׁלַח עִמִּי הַמֶּלֶךְ
  chosen: the king had sent with me
  alternatives:
  - the king sent with me
  - the king had dispatched with me
  lexicon: HALOT
  rationale: Although formally a wayyiqtol, the clause functions backgroundingly after
    the main narrative actions, explaining the escort accompanying Nehemiah. English
    past perfect communicates that explanatory sense naturally.
- source_word: וָאָבוֹא
  chosen: So I came
  alternatives:
  - Then I came
  - And I came
  lexicon: HALOT
  rationale: The prefixed waw continues the narrative sequence. 'So' gives smooth
    English narrative flow without losing the consecutive sense.
