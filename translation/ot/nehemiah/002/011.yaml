id: NEH.2.11
reference: Nehemiah 2:11
source:
  edition: WLC
  text: וָ/אָב֖וֹא אֶל יְרוּשָׁלִָ֑ם וָ/אֱהִי שָׁ֖ם יָמִ֥ים שְׁלֹשָֽׁה־־׃
translation:
  text: So I came to Jerusalem and was there three days.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וָ/אָב֖וֹא
  chosen: So I came
  alternatives:
  - And I came
  - Then I came
  lexicon: HALOT
  rationale: The waw-consecutive with בוא narrates the next event in sequence. 'So
    I came' gives natural English narrative flow while preserving the simple first-person
    arrival.
- source_word: אֶל
  chosen: to
  alternatives:
  - into
  lexicon: HALOT
  rationale: With verbs of motion, אֶל commonly marks destination. 'To' is the most
    natural English equivalent here.
- source_word: יְרוּשָׁלִָם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Standard English transliteration of the place name, following the translation
    philosophy to transliterate names.
- source_word: וָ/אֱהִי
  chosen: and was
  alternatives:
  - and stayed
  - and remained
  lexicon: HALOT
  rationale: The verb היה is semantically broad ('be, become, happen'). Here with
    שָׁם and a time expression it denotes being/staying in a place. 'Was there' stays
    close to the Hebrew while remaining idiomatic.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Straightforward locative adverb referring to Jerusalem.
- source_word: יָמִים שְׁלֹשָׁה
  chosen: three days
  alternatives:
  - for three days
  lexicon: HALOT
  rationale: The Hebrew accusative of duration indicates the length of time. 'Three
    days' is idiomatic English; the durative sense is naturally understood after 'was
    there'.
