id: NEH.2.2
reference: Nehemiah 2:2
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ לִ֨/י הַ/מֶּ֜לֶךְ מַדּ֣וּעַ פָּנֶ֣י/ךָ רָעִ֗ים וְ/אַתָּה֙ אֵֽינְ/ךָ֣
    חוֹלֶ֔ה אֵ֣ין זֶ֔ה כִּי אִ֖ם רֹ֣עַֽ לֵ֑ב וָ/אִירָ֖א הַרְבֵּ֥ה מְאֹֽד׀־׃
translation:
  text: And the king said to me, “Why is your face sad, since you are not sick? This
    is nothing but sadness of heart.” Then I was very much afraid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'your face is bad'—an idiom for a sad or troubled expression.
    reason: lexical_alternative
  - marker: b
    text: Or 'sorrow of heart' or 'trouble of heart'; Hebrew literally, 'evil/badness
      of heart,' here referring to inner distress rather than moral evil.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - Why is it that
  - For what reason
  lexicon: HALOT
  rationale: Standard interrogative of reason; simple 'Why' is natural and sufficiently
    precise.
- source_word: פָּנֶיךָ רָעִים
  chosen: your face sad
  alternatives:
  - your face troubled
  - your face downcast
  - your face bad
  lexicon: HALOT
  rationale: Hebrew literally says 'your face(s) evil/bad,' an idiom for a sad or
    troubled countenance. 'Sad' best captures the idiomatic sense in readable English
    without over-paraphrase.
- source_word: חוֹלֶה
  chosen: sick
  alternatives:
  - ill
  - unwell
  lexicon: HALOT
  rationale: Straightforward adjective/participle for being ill. 'Sick' is the most
    natural modern English equivalent.
- source_word: אֵין זֶה כִּי אִם
  chosen: This is nothing but
  alternatives:
  - This is only
  - This can be nothing except
  lexicon: HALOT
  rationale: The construction excludes other explanations and introduces the king's
    conclusion. 'Nothing but' preserves the exclusivity idiomatically.
- source_word: רֹעַ לֵב
  chosen: sadness of heart
  alternatives:
  - sorrow of heart
  - trouble of heart
  - evil of heart
  lexicon: HALOT
  rationale: Literally 'badness/evil of heart,' but in context the king contrasts
    physical sickness with inner distress. 'Sadness of heart' communicates emotional
    anguish without suggesting moral evil, which would misread the idiom.
- source_word: וָאִירָא
  chosen: Then I was ... afraid
  alternatives:
  - So I became afraid
  - And I feared
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative. 'Then I was afraid' is natural English
    and preserves the sequence.
- source_word: הַרְבֵּה מְאֹד
  chosen: very much
  alternatives:
  - greatly
  - exceedingly
  - very greatly
  lexicon: HALOT
  rationale: The paired intensifiers heighten Nehemiah's fear. 'Very much' is idiomatic
    modern English and preserves the emphasis.
