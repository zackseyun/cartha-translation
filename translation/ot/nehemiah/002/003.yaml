id: NEH.2.3
reference: Nehemiah 2:3
source:
  edition: WLC
  text: וָ/אֹמַ֣ר לַ/מֶּ֔לֶךְ הַ/מֶּ֖לֶךְ לְ/עוֹלָ֣ם יִחְיֶ֑ה מַדּ֜וּעַ לֹא יֵרְע֣וּ
    פָנַ֗/י אֲשֶׁ֨ר הָ/עִ֜יר בֵּית קִבְר֤וֹת אֲבֹתַ/י֙ חֲרֵבָ֔ה וּ/שְׁעָרֶ֖י/הָ אֻכְּל֥וּ
    בָ/אֵֽשׁ־־׃ס
translation:
  text: I said to the king, “May the king live forever! Why should my face not be
    sad, when the city, the place of my fathers’ tombs, lies in ruins and its gates
    have been consumed by fire?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the house of the tombs of my fathers,' an idiom referring
      to the place associated with his ancestors’ burial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  chosen: I said
  alternatives:
  - Then I said
  lexicon: HALOT
  rationale: Simple wayyiqtol of אמר, best rendered as past narrative 'I said.' The
    conjunction is carried naturally in English without needing 'then.'
- source_word: לַמֶּלֶךְ / הַמֶּלֶךְ
  chosen: to the king / the king
  lexicon: HALOT
  rationale: The first instance is indirect object ('to the king'); the second is
    vocative-like repetition for courtly address, preserved as 'the king.'
- source_word: לְעוֹלָם יִחְיֶה
  chosen: May the king live forever!
  alternatives:
  - Let the king live forever!
  lexicon: HALOT
  rationale: Standard royal acclamation and wish formula. 'May ... live forever' is
    idiomatic, natural, and preserves the deferential tone.
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - Why is it that
  lexicon: HALOT
  rationale: Direct interrogative introducing Nehemiah's explanation.
- source_word: לֹא יֵרְעוּ פָנַי
  chosen: should my face not be sad
  alternatives:
  - should my face not look troubled
  - should my face not be downcast
  lexicon: HALOT
  rationale: The verb רעע with 'face' expresses appearing sad or distressed. 'Be sad'
    is clear modern English while retaining the facial-expression idiom.
- source_word: אֲשֶׁר
  chosen: when
  alternatives:
  - since
  - because
  lexicon: HALOT
  rationale: Here the relative/conjunction introduces the circumstance explaining
    Nehemiah's sadness. 'When' preserves the explanatory force without over-interpreting
    causation.
- source_word: הָעִיר
  chosen: the city
  lexicon: HALOT
  rationale: Definite noun referring to Jerusalem, but the Hebrew does not name it
    here, so 'the city' should be retained.
- source_word: בֵּית קִבְרוֹת אֲבֹתַי
  chosen: the place of my fathers’ tombs
  alternatives:
  - the house of my fathers’ tombs
  - the city of my fathers’ tombs
  lexicon: HALOT
  rationale: Literally 'house of the graves/tombs of my fathers,' an idiom for the
    place associated with ancestral burial. 'The place of my fathers’ tombs' communicates
    the sense in natural English without forcing an opaque literalism.
- source_word: חֲרֵבָה
  chosen: lies in ruins
  alternatives:
  - is desolate
  - is ruined
  lexicon: HALOT
  rationale: Predicate adjective describing devastation. 'Lies in ruins' is idiomatic
    and vivid in English.
- source_word: וּשְׁעָרֶיהָ
  chosen: and its gates
  lexicon: HALOT
  rationale: Straightforward possessive plural referring to the city's gates.
- source_word: אֻכְּלוּ בָאֵשׁ
  chosen: have been consumed by fire
  alternatives:
  - have been burned with fire
  - have been devoured by fire
  lexicon: HALOT
  rationale: Passive of אכל used figuratively of fire destroying something. 'Consumed
    by fire' is natural English and preserves the imagery.
