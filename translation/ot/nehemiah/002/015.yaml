id: NEH.2.15
reference: Nehemiah 2:15
source:
  edition: WLC
  text: וָ/אֱהִ֨י עֹלֶ֤ה בַ/נַּ֨חַל֙ לַ֔יְלָה וָ/אֱהִ֥י שֹׂבֵ֖ר בַּ/חוֹמָ֑ה וָ/אָשׁ֗וּב
    וָ/אָב֛וֹא בְּ/שַׁ֥עַר הַ/גַּ֖יְא וָ/אָשֽׁוּב׃
translation:
  text: So I went up by the wadi at night, and I was inspecting the wall. Then I turned
    back and entered by the Valley Gate, and returned.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was examining' or 'was surveying' the wall. The Hebrew verb here normally
      means 'breaking,' but in this context it is widely understood to describe Nehemiah's
      inspection of the damaged wall.
    reason: lexical_alternative
  - marker: b
    text: '''Wadi'' refers to a ravine or seasonal watercourse; some translations
      render it ''valley'' or ''brook.'''
    reason: cultural_note
lexical_decisions:
- source_word: עֹלֶה
  chosen: went up
  alternatives:
  - was going up
  - ascended
  lexicon: HALOT
  rationale: עלה with היה in this narrative sequence functions as a progressive/descriptive
    action; idiomatic English prefers the simple past 'went up' rather than the more
    wooden 'was going up' or elevated 'ascended'.
- source_word: בַנַּחַל
  chosen: by the wadi
  alternatives:
  - through the valley
  - by the brook
  - by the ravine
  lexicon: HALOT
  rationale: נחל commonly denotes a wadi/ravine rather than a broad valley. 'Wadi'
    best preserves the topographical sense, while 'by' reflects the preposition ב
    in a route description without over-specifying movement within it.
- source_word: לַיְלָה
  chosen: at night
  alternatives:
  - by night
  - in the night
  lexicon: HALOT
  rationale: A natural modern English temporal expression; it preserves the nocturnal
    setting without archaic phrasing.
- source_word: שֹׂבֵר
  chosen: was inspecting
  alternatives:
  - was examining
  - was surveying
  - was breaking
  lexicon: HALOT
  rationale: Although שבר ordinarily means 'break,' in this context Nehemiah is recounting
    his nighttime examination of Jerusalem's ruined walls, not damaging them. The
    narrative context strongly supports a sense like 'inspect/examine,' a recognized
    contextual extension in this passage.
- source_word: בַּחוֹמָה
  chosen: the wall
  alternatives:
  - the city wall
  - the walls
  lexicon: HALOT
  rationale: The singular with article is retained. English singular 'the wall' is
    natural and reflects the Hebrew form, while context makes clear it refers to Jerusalem's
    fortification.
- source_word: וָאָשׁוּב
  chosen: I turned back
  alternatives:
  - I returned
  - I went back
  lexicon: HALOT
  rationale: For the first occurrence of שוב in this verse, 'turned back' captures
    the immediate reversal of direction in the route narrative and avoids flattening
    both occurrences into identical English where the context slightly differs.
- source_word: וָאָבֹוא
  chosen: entered
  alternatives:
  - came
  - went in
  lexicon: HALOT
  rationale: בוא with the gate phrase is most naturally rendered 'entered' in English,
    indicating movement through the gate.
- source_word: בְּשַׁעַר הַגַּיְא
  chosen: by the Valley Gate
  alternatives:
  - through the Valley Gate
  - at the Valley Gate
  lexicon: HALOT
  rationale: This is a named city gate. 'Valley Gate' is the standard transparent
    rendering of שער הגיא. 'By' is acceptable with 'entered by the gate' in English
    route description.
- source_word: וָאָשׁוּב
  chosen: returned
  alternatives:
  - turned back
  - went back
  lexicon: HALOT
  rationale: For the final שוב, 'returned' reads naturally as the concluding summary
    of the excursion after re-entering through the gate.
