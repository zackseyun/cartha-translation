id: NEH.2.6
reference: Nehemiah 2:6
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ לִ֨/י הַ/מֶּ֜לֶךְ וְ/הַ/שֵּׁגַ֣ל יוֹשֶׁ֣בֶת אֶצְל֗/וֹ עַד מָתַ֛י
    יִהְיֶ֥ה מַֽהֲלָכֲ/ךָ֖ וּ/מָתַ֣י תָּשׁ֑וּב וַ/יִּיטַ֤ב לִ/פְנֵֽי הַ/מֶּ֨לֶךְ֙
    וַ/יִּשְׁלָחֵ֔/נִי וָֽ/אֶתְּנָ֥/ה ל֖/וֹ זְמָֽן׀־־׃
translation:
  text: Then the king said to me, while the queen was sitting beside him, “How long
    will your journey be, and when will you return?” So it pleased the king to send
    me, and I gave him a time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the consort” or “the royal wife.” The Hebrew term refers to the king’s
      royal consort.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Standard rendering of מֶלֶךְ as the royal ruler in narrative context.
- source_word: הַשֵּׁגַל
  chosen: the queen
  alternatives:
  - the consort
  - the royal wife
  lexicon: HALOT
  rationale: שֵׁגַל denotes the king's consort/queen. 'Queen' is the most natural
    and contextually fitting English rendering here, while preserving her royal status.
    Because the term is relatively uncommon and can be understood more specifically
    as consort, an alternative is preserved in a footnote.
- source_word: יוֹשֶׁבֶת אֶצְלוֹ
  chosen: was sitting beside him
  alternatives:
  - was seated next to him
  - sat beside him
  lexicon: HALOT
  rationale: The participle plus prepositional phrase gives a circumstantial scene-setting
    detail. 'Was sitting beside him' captures the ongoing posture and proximity naturally
    in English.
- source_word: עַד מָתַי
  chosen: How long
  alternatives:
  - Until when
  lexicon: HALOT
  rationale: Idiomatic temporal question in English; 'How long' best conveys the sense.
- source_word: יִהְיֶה מַהֲלָכֲךָ
  chosen: will your journey be
  alternatives:
  - will your trip be
  - will your going be
  lexicon: HALOT
  rationale: מַהֲלָךְ literally relates to going or journeying. In this context of
    official travel duration, 'journey' is the clearest optimal-equivalence rendering.
- source_word: וּמָתַי תָּשׁוּב
  chosen: and when will you return
  alternatives:
  - and when will you come back
  lexicon: HALOT
  rationale: שׁוּב commonly means return. 'Return' fits the formal audience and narrative
    tone.
- source_word: וַיִּיטַב לִפְנֵי הַמֶּלֶךְ
  chosen: So it pleased the king
  alternatives:
  - And it was good before the king
  - And the matter seemed good to the king
  lexicon: HALOT
  rationale: Hebrew idiom meaning the proposal met with the king's approval. 'So it
    pleased the king' is concise and idiomatic.
- source_word: וַיִּשְׁלָחֵנִי
  chosen: to send me
  alternatives:
  - and he sent me
  lexicon: HALOT
  rationale: 'Following וַיִּיטַב, the infinitive-like English construction ''to send
    me'' expresses the result naturally: it pleased the king to send me. A more formally
    sequential ''and he sent me'' is possible, but the chosen rendering reads more
    smoothly in English while preserving the sense.'
- source_word: וָאֶתְּנָה לוֹ זְמָן
  chosen: and I gave him a time
  alternatives:
  - and I set him a time
  - and I gave him a definite time
  lexicon: HALOT
  rationale: זְמָן denotes an appointed time or fixed term. 'Gave him a time' is a
    close rendering; the context implies a specified period without overtranslating.
