id: NEH.2.16
reference: Nehemiah 2:16
source:
  edition: WLC
  text: וְ/הַ/סְּגָנִ֗ים לֹ֤א יָדְעוּ֙ אָ֣נָה הָלַ֔כְתִּי וּ/מָ֖ה אֲנִ֣י עֹשֶׂ֑ה וְ/לַ/יְּהוּדִ֨ים
    וְ/לַ/כֹּהֲנִ֜ים וְ/לַ/חֹרִ֣ים וְ/לַ/סְּגָנִ֗ים וּ/לְ/יֶ֨תֶר֙ עֹשֵׂ֣ה הַ/מְּלָאכָ֔ה
    עַד כֵּ֖ן לֹ֥א הִגַּֽדְתִּי־׃
translation:
  text: But the officials did not know where I had gone or what I was doing, and until
    then I had not told the Jews, the priests, the nobles, the officials, or the rest
    who were doing the work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Judeans' for 'the Jews.' The Hebrew יְהוּדִים can denote the people
      of Judah regionally or the Jewish community more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַסְּגָנִים
  chosen: the officials
  alternatives:
  - the deputies
  - the prefects
  - the rulers
  lexicon: HALOT
  rationale: סְגָנִים denotes subordinate rulers or officials. 'Officials' is clear
    modern English and fits both occurrences in the verse without over-specifying
    a Persian administrative title.
- source_word: יָדְעוּ
  chosen: did not know
  alternatives:
  - were not aware
  lexicon: HALOT
  rationale: ידע in the qal commonly means 'know.' The simple past 'did not know'
    matches the narrative style and plain sense.
- source_word: אָנה
  chosen: where
  alternatives:
  - to where
  - whither
  lexicon: HALOT
  rationale: The adverb asks destination. In idiomatic modern English after 'know,'
    'where I had gone' is the most natural equivalent.
- source_word: הָלַכְתִּי
  chosen: I had gone
  alternatives:
  - I went
  lexicon: HALOT
  rationale: 'A past perfect in English fits the retrospective narration: the officials
    did not know the destination of Nehemiah''s prior movement.'
- source_word: וּמָה אֲנִי עֹשֶׂה
  chosen: or what I was doing
  alternatives:
  - and what I was doing
  - or what I was about to do
  lexicon: HALOT
  rationale: The participle עֹשֶׂה can express ongoing action. 'What I was doing'
    best captures the sense in context. The conjunction is rendered 'or' because English
    idiom with 'did not know where... or what...' is smoother, though Hebrew waw can
    be simply conjunctive.
- source_word: לַיְּהוּדִים
  chosen: the Jews
  alternatives:
  - the Judeans
  lexicon: HALOT
  rationale: יְהוּדִים can mean either ethnic-religious 'Jews' or regional 'Judeans.'
    In Nehemiah, both are possible, but 'Jews' remains the more standard and broadly
    intelligible rendering here for the community group distinct from priests and
    officials.
- source_word: לַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Straightforward rendering of כֹּהֲנִים.
- source_word: לַחֹרִים
  chosen: the nobles
  alternatives:
  - the free men
  - the aristocrats
  lexicon: HALOT
  rationale: חֹרִים in this administrative-social context refers to nobles or leading
    men. 'Nobles' is the established and contextually fitting English gloss.
- source_word: וּלְיֶתֶר
  chosen: the rest
  alternatives:
  - the remainder
  - the others
  lexicon: HALOT
  rationale: יֶתֶר means what remains. 'The rest' is natural English in a list.
- source_word: עֹשֵׂה הַמְּלָאכָה
  chosen: who were doing the work
  alternatives:
  - who did the work
  - the workers
  lexicon: HALOT
  rationale: The singular participle with collective force refers to those engaged
    in the task. 'Who were doing the work' preserves the verbal nuance better than
    the compressed noun 'workers.'
- source_word: עַד כֵּן
  chosen: until then
  alternatives:
  - up to that point
  lexicon: HALOT
  rationale: This temporal phrase marks the point before which Nehemiah had kept silent.
    'Until then' is concise and idiomatic.
- source_word: הִגַּדְתִּי
  chosen: I had not told
  alternatives:
  - I had not reported
  - I had not made known
  lexicon: HALOT
  rationale: נגד in the hiphil means to tell, declare, or make known. 'Told' is the
    most natural English in this context of withholding information from named groups.
