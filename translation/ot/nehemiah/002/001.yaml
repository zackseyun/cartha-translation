id: NEH.2.1
reference: Nehemiah 2:1
source:
  edition: WLC
  text: וַ/יְהִ֣י בְּ/חֹ֣דֶשׁ נִיסָ֗ן שְׁנַ֥ת עֶשְׂרִ֛ים לְ/אַרְתַּחְשַׁ֥סְתְּא הַ/מֶּ֖לֶךְ
    יַ֣יִן לְ/פָנָ֑י/ו וָ/אֶשָּׂ֤א אֶת הַ/יַּ֨יִן֙ וָ/אֶתְּנָ֣/ה לַ/מֶּ֔לֶךְ וְ/לֹא
    הָיִ֥יתִי רַ֖ע לְ/פָנָֽי/ו׀־־׃
translation:
  text: And it happened in the month of Nisan, in the twentieth year of King Artaxerxes,
    when wine was before him, that I took up the wine and gave it to the king. Now
    I had never been sad in his presence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'and I was not sad before him.' The Hebrew literally
      says 'I was not bad before him,' an idiom for appearing sad or displeased in
      the king's presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Introduces the narrative sequence with standard Hebrew wayyiqtol of היה.
    'And it happened' preserves the narrative force without archaic diction.
- source_word: בְּחֹדֶשׁ נִיסָן
  chosen: in the month of Nisan
  alternatives:
  - in Nisan
  - in the month Nisan
  lexicon: HALOT
  rationale: Retains the formal dating expression and transliterates the month name
    as a proper name.
- source_word: שְׁנַת עֶשְׂרִים
  chosen: in the twentieth year
  alternatives:
  - in year twenty
  - the twentieth year
  lexicon: HALOT
  rationale: Idiomatic English rendering of the construct phrase for regnal dating.
- source_word: לְאַרְתַּחְשַׁסְתְּא הַמֶּלֶךְ
  chosen: of King Artaxerxes
  alternatives:
  - to King Artaxerxes
  - belonging to King Artaxerxes
  lexicon: HALOT
  rationale: In context the lamed marks the regnal reference, best rendered in English
    as 'of King Artaxerxes.' The royal title is translated and the personal name transliterated.
- source_word: יַיִן לְפָנָיו
  chosen: when wine was before him
  alternatives:
  - with wine before him
  - while wine was before him
  lexicon: HALOT
  rationale: This verbless clause sets the scene at the royal table. 'Before him'
    is kept literally enough to preserve court setting, while 'when' makes the clause
    read naturally in English.
- source_word: וָאֶשָּׂא אֶת־הַיַּיִן
  chosen: I took up the wine
  alternatives:
  - I lifted the wine
  - I carried the wine
  lexicon: HALOT
  rationale: נשא here refers to taking up the cup/wine for service to the king. 'Took
    up' is natural and fits the cupbearer context without over-specifying 'cup,' which
    is not in the Hebrew.
- source_word: וָאֶתְּנָה לַמֶּלֶךְ
  chosen: and gave it to the king
  alternatives:
  - and gave it to the king to drink
  - and presented it to the king
  lexicon: HALOT
  rationale: Simple rendering of נתן with the object understood from the previous
    clause. 'Presented' is possible in court context, but 'gave' stays closer to the
    Hebrew.
- source_word: וְלֹא הָיִיתִי רַע לְפָנָיו
  chosen: Now I had never been sad in his presence
  alternatives:
  - and I was not sad before him
  - but I had not been gloomy in his presence
  lexicon: HALOT
  rationale: 'רַע literally means ''bad/evil,'' but with היה and ''before him'' in
    this context it refers to a downcast or sad appearance. The pluperfect sense fits
    the narrative logic: Nehemiah notes this had not happened previously. ''In his
    presence'' communicates the idiom לְפָנָיו clearly.'
