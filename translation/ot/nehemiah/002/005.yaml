id: NEH.2.5
reference: Nehemiah 2:5
source:
  edition: WLC
  text: וָ/אֹמַ֣ר לַ/מֶּ֔לֶךְ אִם עַל הַ/מֶּ֣לֶךְ ט֔וֹב וְ/אִם יִיטַ֥ב עַבְדְּ/ךָ֖
    לְ/פָנֶ֑י/ךָ אֲשֶׁ֧ר תִּשְׁלָחֵ֣/נִי אֶל יְהוּדָ֗ה אֶל עִ֛יר קִבְר֥וֹת אֲבֹתַ֖/י
    וְ/אֶבְנֶֽ/נָּה־־־־־׃
translation:
  text: Then I said to the king, "If it seems good to the king, and if your servant
    has found favor before you, send me to Judah, to the city of my fathers' graves,
    so that I may rebuild it."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If it pleases the king.' The Hebrew is a courtly idiom of royal approval.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'to the city of the graves of my fathers.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew verb is 'build'; 'rebuild' makes explicit the context that the
      city lies in ruins.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  chosen: Then I said
  alternatives:
  - And I said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then I said' gives natural
    English narrative flow while preserving sequence.
- source_word: אִם עַל־הַמֶּלֶךְ טוֹב
  chosen: If it seems good to the king
  alternatives:
  - If it is good for the king
  - If it pleases the king
  lexicon: HALOT
  rationale: This is a courtly idiom expressing royal pleasure or approval. 'Seems
    good to the king' preserves the deferential tone without sounding archaic.
- source_word: וְאִם יִיטַב עַבְדְּךָ לְפָנֶיךָ
  chosen: and if your servant has found favor before you
  alternatives:
  - and if your servant is pleasing before you
  - and if it is good for your servant before you
  lexicon: HALOT
  rationale: The idiom with ייטב + לפני commonly conveys favorable standing with someone.
    'Has found favor before you' communicates the sense idiomatically in English and
    matches the court setting.
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although the noun can denote a slave/servant, in royal address it functions
    as a conventional self-designation of humility and service. 'Your servant' best
    fits the social register here.
- source_word: תִּשְׁלָחֵנִי
  chosen: send me
  alternatives:
  - dispatch me
  lexicon: HALOT
  rationale: The verb means 'send.' 'Send me' is the plain and natural rendering in
    this petition.
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: אֶל־עִיר קִבְרוֹת אֲבֹתַי
  chosen: to the city of my fathers' graves
  alternatives:
  - to the city of my fathers' tombs
  - to the city where my fathers are buried
  lexicon: HALOT
  rationale: The construct chain is literally 'city of the graves of my fathers.'
    'Graves' is a direct rendering; 'fathers' here refers to ancestors, not merely
    immediate parents.
- source_word: וְאֶבְנֶנָּה
  chosen: so that I may rebuild it
  alternatives:
  - and I will rebuild it
  - that I may build it
  lexicon: HALOT
  rationale: The cohortative expresses Nehemiah's purpose/request. Because the feminine
    suffix refers back to 'city,' English requires 'it.' 'Rebuild' fits the context
    of Jerusalem's ruined state, though the base verb is simply 'build.'
