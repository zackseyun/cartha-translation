id: NEH.2.7
reference: Nehemiah 2:7
source:
  edition: WLC
  text: וָ/אוֹמַר֮ לַ/מֶּלֶךְ֒ אִם עַל הַ/מֶּ֣לֶךְ ט֔וֹב אִגְּרוֹת֙ יִתְּנוּ לִ֔/י
    עַֽל פַּחֲו֖וֹת עֵ֣בֶר הַ/נָּהָ֑ר אֲשֶׁר֙ יַעֲבִיר֔וּ/נִי עַ֥ד אֲשֶׁר אָב֖וֹא
    אֶל יְהוּדָֽה־־־־־־׃
translation:
  text: Then I said to the king, “If it seems good to the king, let letters be given
    to me for the governors Beyond the River, so that they may let me pass through
    until I come to Judah.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “If it pleases the king.”
    reason: lexical_alternative
  - marker: b
    text: “Beyond the River” is the Persian administrative term for the region west
      of the Euphrates.
    reason: cultural_note
  - marker: c
    text: Or “that they may grant me passage.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  chosen: Then I said
  alternatives:
  - And I said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then I said' gives natural
    English sequence while preserving the simple verbal sense.
- source_word: אִם עַל־הַמֶּלֶךְ טוֹב
  chosen: If it seems good to the king
  alternatives:
  - If it is good to the king
  - If it pleases the king
  lexicon: HALOT
  rationale: This is a standard courtly formula. 'If it seems good to the king' preserves
    the deferential idiom without sounding wooden; 'pleases' is possible but slightly
    more interpretive.
- source_word: אִגְּרוֹת
  chosen: letters
  alternatives:
  - official letters
  - documents
  lexicon: HALOT
  rationale: The noun refers to written communications. 'Letters' is the most direct
    and sufficiently clear in context; the official nature is implied by the royal
    setting.
- source_word: יִתְּנוּ לִי
  chosen: let letters be given to me
  alternatives:
  - may they give me letters
  - letters may be given to me
  lexicon: HALOT
  rationale: The 3mp verb functions idiomatically in a request. An English passive
    with 'let' best reflects the polite petition directed to the king.
- source_word: פַּחֲוֹת
  chosen: governors
  alternatives:
  - provincial governors
  - officials
  lexicon: HALOT
  rationale: The term denotes Persian provincial administrators. 'Governors' is the
    standard concise equivalent.
- source_word: עֵבֶר הַנָּהָר
  chosen: Beyond the River
  alternatives:
  - the province Beyond the River
  - across the River
  lexicon: HALOT
  rationale: This is a recognized Persian administrative designation for the region
    west of the Euphrates. Capitalizing 'Beyond the River' signals it as a proper
    regional title rather than a mere directional phrase.
- source_word: אֲשֶׁר יַעֲבִירוּנִי
  chosen: so that they may let me pass through
  alternatives:
  - that they may bring me across
  - that they may grant me passage
  lexicon: HALOT
  rationale: In the Hiphil, עבר can mean cause to pass, here in context granting safe
    transit through their jurisdictions. 'Let me pass through' is natural and fits
    the request for travel authorization.
- source_word: עַד אֲשֶׁר אָבוֹא
  chosen: until I come
  alternatives:
  - until I arrive
  - until I reach
  lexicon: HALOT
  rationale: A straightforward temporal clause. 'Come' is slightly more literal than
    'arrive' and reads naturally in English.
- source_word: יְהוּדָה
  chosen: Judah
  alternatives:
  - the province of Judah
  - Judea
  lexicon: HALOT
  rationale: The proper name is best transliterated as 'Judah.' 'Judea' would be anachronistic
    here, and 'province of Judah' adds specificity not explicit in the Hebrew.
