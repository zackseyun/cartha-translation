id: NEH.2.10
reference: Nehemiah 2:10
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֞ע סַנְבַלַּ֣ט הַ/חֹרֹנִ֗י וְ/טֽוֹבִיָּה֙ הָ/עֶ֣בֶד הָֽ/עַמֹּנִ֔י
    וַ/יֵּ֥רַע לָ/הֶ֖ם רָעָ֣ה גְדֹלָ֑ה אֲשֶׁר בָּ֥א אָדָ֔ם לְ/בַקֵּ֥שׁ טוֹבָ֖ה לִ/בְנֵ֥י
    יִשְׂרָאֵֽל־׃
translation:
  text: When Sanballat the Horonite and Tobiah the Ammonite slave heard this, it greatly
    displeased them that a man had come to seek the good of the children of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it was a great evil to them'; the Hebrew repeats the רע ('bad/evil')
      word-group for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or 'to seek the welfare of the children of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: heard this
  alternatives:
  - heard
  lexicon: HALOT
  rationale: The verb means 'heard.' English idiom naturally supplies 'this' from
    context, referring to Nehemiah's arrival and commission in the preceding verse.
- source_word: הַחֹרֹנִי
  chosen: the Horonite
  alternatives:
  - the man from Horon
  lexicon: HALOT
  rationale: A gentilicial title identifying Sanballat by place of origin; transliterated
    in standard English form rather than paraphrased.
- source_word: הָעֶבֶד
  chosen: slave
  alternatives:
  - servant
  - official
  lexicon: HALOT
  rationale: The noun ordinarily means 'slave/servant.' Following the project's guidance,
    'slave' is preferred where the bonded status is foregrounded. Here it functions
    as a social designation for Tobiah; 'official' is interpretive and less transparent
    to the Hebrew.
- source_word: הָעַמֹּנִי
  chosen: the Ammonite
  alternatives:
  - the man of Ammon
  lexicon: HALOT
  rationale: Gentilic adjective identifying Tobiah ethnically/nationally; standard
    English rendering is 'Ammonite.'
- source_word: וַיֵּרַע לָהֶם רָעָה גְדֹלָה
  chosen: it greatly displeased them
  alternatives:
  - it was a great evil to them
  - it seemed very bad to them
  - they were very upset
  lexicon: HALOT
  rationale: The Hebrew uses the רעע wordplay ('it was evil/bad to them, a great evil').
    In idiomatic English, the sense is strong displeasure or offense. 'It greatly
    displeased them' preserves the intensity without wooden repetition.
- source_word: אָדָם
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: The singular noun is grammatically masculine and refers here to an individual
    human being, namely Nehemiah in context. Per doctrine, gender-accurate rendering
    is preferred over neutralizing to 'someone' or 'person.'
- source_word: לְבַקֵּשׁ טוֹבָה
  chosen: to seek the good
  alternatives:
  - to seek welfare
  - to seek prosperity
  - to seek benefit
  lexicon: HALOT
  rationale: The phrase denotes seeking benefit or welfare for others. 'Seek the good'
    is natural English and preserves the lexical connection to טוב ('good').
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: of the children of Israel
  alternatives:
  - for the Israelites
  - of the sons of Israel
  lexicon: HALOT
  rationale: The phrase literally means 'for the sons/children of Israel.' 'Children
    of Israel' is a well-established and accurate English rendering here, preserving
    the covenantal-national designation without over-literalizing to 'sons.'
