id: NEH.2.13
reference: Nehemiah 2:13
source:
  edition: WLC
  text: וָ/אֵצְאָ֨/ה בְ/שַֽׁעַר הַ/גַּ֜יא לַ֗יְלָה וְ/אֶל פְּנֵי֙ עֵ֣ין הַתַּנִּ֔ין
    וְ/אֶל שַׁ֖עַר הָ/אַשְׁפֹּ֑ת וָ/אֱהִ֨י שֹׂבֵ֜ר בְּ/חוֹמֹ֤ת יְרוּשָׁלִַ֨ם֙ אֲשֶׁר
    ה/מפרוצים וּ/שְׁעָרֶ֖י/הָ אֻכְּל֥וּ בָ/אֵֽשׁ־־־־׃
translation:
  text: So I went out by night through the Valley Gate, toward the Dragon Spring and
    toward the Dung Gate, and I was inspecting the walls of Jerusalem that had been
    broken down and its gates that had been consumed by fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Serpent Spring' or 'Jackal Spring'; the Hebrew place name uses tannin,
      a term with a range including dragon, serpent, or similar creature.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew expression traditionally rendered 'I viewed' is literally more
      difficult; here it is understood in context as 'I was inspecting' the damaged
      walls.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֵצְאָה
  chosen: So I went out
  alternatives:
  - And I went out
  - Then I went out
  lexicon: HALOT
  rationale: Wayyiqtol of יצא, first person singular. English narrative style can
    render the waw consecutives as 'so/then/and'; 'So I went out' gives natural narrative
    flow while preserving sequence.
- source_word: בְּשַׁעַר הַגַּיְא
  chosen: through the Valley Gate
  alternatives:
  - by the Valley Gate
  - at the Valley Gate
  lexicon: HALOT
  rationale: The preposition ב with 'gate' in a movement context is naturally rendered
    'through.' הַגַּיְא refers to the valley/ravine; 'Valley Gate' is the established
    topographical sense.
- source_word: לַיְלָה
  chosen: by night
  alternatives:
  - at night
  - in the night
  lexicon: HALOT
  rationale: Adverbial accusative of time. 'By night' is concise and idiomatic in
    English narrative.
- source_word: וְאֶל־פְּנֵי עֵין הַתַּנִּין
  chosen: toward the Dragon Spring
  alternatives:
  - toward the Serpent Spring
  - toward the Jackal Spring
  - in front of the Dragon Spring
  lexicon: HALOT
  rationale: עַיִן here denotes a spring/fountain, not the anatomical 'eye.' תַּנִּין
    can denote dragon/serpent/sea monster; in a place name, 'Dragon Spring' best preserves
    the lexical force without overinterpreting. פְּנֵי with אֶל in route description
    is idiomatically 'toward/in the direction of,' not strictly 'before the face of.'
- source_word: שַׁעַר הָאַשְׁפֹּת
  chosen: the Dung Gate
  alternatives:
  - the Refuse Gate
  - the Garbage Gate
  lexicon: HALOT
  rationale: אַשְׁפֹּת refers to refuse/dung heaps. 'Dung Gate' is the conventional
    and sufficiently transparent rendering for the gate name.
- source_word: וָאֱהִי שֹׂבֵר
  chosen: and I was inspecting
  alternatives:
  - and I was examining
  - and I was viewing
  - and I was breaking
  lexicon: HALOT
  rationale: Although שבר commonly means 'break,' in this context with walls and Nehemiah's
    nocturnal survey, the participial construction is idiomatic for carefully looking
    over/inspecting the breaches. Rendering it woodenly as 'breaking' would misstate
    the action. 'Was inspecting' captures the ongoing sense of the participle with
    היה.
- source_word: בְּחוֹמֹת יְרוּשָׁלַםִ
  chosen: the walls of Jerusalem
  alternatives:
  - Jerusalem's walls
  lexicon: HALOT
  rationale: Direct object of the inspection activity; English idiom prefers 'the
    walls of Jerusalem.'
- source_word: אֲשֶׁר הַמְּפֹרָצִים
  chosen: that had been broken down
  alternatives:
  - that were breached
  - that were in ruins
  lexicon: HALOT
  rationale: Passive participial form from פרץ indicates walls made broken/opened
    up, i.e., breached or broken down. 'Broken down' is clear modern English and fits
    city walls.
- source_word: וּשְׁעָרֶיהָ אֻכְּלוּ בָאֵשׁ
  chosen: and its gates that had been consumed by fire
  alternatives:
  - and its gates had been burned with fire
  - and its gates had been devoured by fire
  lexicon: HALOT
  rationale: אכל in passive with fire is a vivid idiom meaning 'consumed/burned up.'
    'Consumed by fire' preserves the metaphor naturally in English.
