id: NEH.12.47
reference: Nehemiah 12:47
source:
  edition: WLC
  text: וְ/כָל יִשְׂרָאֵל֩ בִּ/ימֵ֨י זְרֻבָּבֶ֜ל וּ/בִ/ימֵ֣י נְחֶמְיָ֗ה נֹֽתְנִ֛ים
    מְנָי֛וֹת הַ/מְשֹׁרְרִ֥ים וְ/הַ/שֹּׁעֲרִ֖ים דְּבַר י֣וֹם בְּ/יוֹמ֑/וֹ וּ/מַקְדִּשִׁים֙
    לַ/לְוִיִּ֔ם וְ/הַ/לְוִיִּ֔ם מַקְדִּשִׁ֖ים לִ/בְנֵ֥י אַהֲרֹֽן־־׃פ
translation:
  text: And all Israel, in the days of Zerubbabel and in the days of Nehemiah, gave
    the portions for the singers and the gatekeepers, as each day required; and they
    set apart the consecrated portions for the Levites, and the Levites set apart
    the consecrated portions for the sons of Aaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the assigned portions' for the singers and gatekeepers.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''the matter of a day on its day,'' that is, what each day required.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the Aaronic priests.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל יִשְׂרָאֵל
  chosen: And all Israel
  alternatives:
  - And all the Israelites
  lexicon: HALOT
  rationale: Retains the collective covenantal expression as in the Hebrew rather
    than expanding to 'the Israelites.' 'All Israel' is a standard and natural English
    rendering for the national whole.
- source_word: בִּימֵי זְרֻבָּבֶל וּבִימֵי נְחֶמְיָה
  chosen: in the days of Zerubbabel and in the days of Nehemiah
  alternatives:
  - during the time of Zerubbabel and Nehemiah
  lexicon: HALOT
  rationale: Keeps the repeated prepositional phrase, which gives a slightly formal
    historical framing in Hebrew. Repetition is preserved because it is not awkward
    in English and reflects the source emphasis.
- source_word: נֹתְנִים
  chosen: gave
  alternatives:
  - were giving
  - provided
  lexicon: HALOT
  rationale: Although the Hebrew participle is formally durative, in this historical
    summary context English simple past reads most naturally. 'Gave' captures the
    customary action being described.
- source_word: מְנָיוֹת
  chosen: the portions
  alternatives:
  - the assigned portions
  - the shares
  - the allotments
  lexicon: HALOT
  rationale: The term refers to apportioned provisions or shares assigned to temple
    personnel. 'Portions' is concise and idiomatic, while 'assigned portions' is preserved
    as a possible nuance.
- source_word: הַמְשֹׁרְרִים וְהַשֹּׁעֲרִים
  chosen: the singers and the gatekeepers
  alternatives:
  - the singers and the guards at the gates
  lexicon: HALOT
  rationale: These are established temple-service roles. 'Gatekeepers' is the conventional
    and accurate rendering for שֹׁעֲרִים in this cultic context.
- source_word: דְּבַר יוֹם בְּיוֹמוֹ
  chosen: as each day required
  alternatives:
  - the matter of each day on its day
  - day by day
  - each day's portion on its day
  lexicon: HALOT
  rationale: The idiom denotes the due provision or requirement for each day. 'As
    each day required' communicates the sense clearly in modern English while preserving
    the daily regularity.
- source_word: וּמַקְדִּשִׁים
  chosen: and they set apart the consecrated portions
  alternatives:
  - and they consecrated for
  - and they set apart
  lexicon: HALOT
  rationale: The Hiphil of קדשׁ here likely means setting apart as holy, specifically
    portions dedicated to the next group. Because English otherwise lacks an explicit
    object, 'the consecrated portions' is supplied to make the sense clear from context
    and parallelism.
- source_word: לַלְוִיִּם
  chosen: for the Levites
  alternatives:
  - to the Levites
  lexicon: HALOT
  rationale: The preposition marks the recipients of what is set apart. 'For the Levites'
    reads naturally in English in this distributive context.
- source_word: וְהַלְוִיִּם מַקְדִּשִׁים לִבְנֵי אַהֲרֹן
  chosen: and the Levites set apart the consecrated portions for the sons of Aaron
  alternatives:
  - and the Levites consecrated for the sons of Aaron
  - and the Levites set apart for the Aaronic priests
  lexicon: HALOT
  rationale: The parallel structure suggests that the Levites in turn set apart designated
    holy portions for the priestly line. 'Sons of Aaron' is retained rather than interpreted
    directly as 'priests,' though that sense is implicit.
- source_word: בְּנֵי אַהֲרֹן
  chosen: the sons of Aaron
  alternatives:
  - the Aaronic priests
  lexicon: HALOT
  rationale: A formally closer rendering is preferred here. Since the phrase is a
    standard designation for the priestly descendants of Aaron, the more interpretive
    alternative is noted but not used in the main text.
