theological_decisions:
- issue: Meaning of הקדישׁ/מקדישים in temple-support context
  chosen_reading: The verb is rendered as setting apart consecrated portions, referring
    to dedicated shares for Levites and then for the Aaronic priests.
  alternative_readings:
  - The verb could be read more generally as 'contributed to' or 'gave to' the Levites
    and priests.
  rationale: In this cultic-administrative context, קדשׁ retains its holiness/set-apart
    sense rather than becoming a mere synonym for ordinary giving. The parallelism
    and temple setting support the idea of dedicated portions. This avoids flattening
    the sacred nuance while still making the administrative action intelligible.
