id: NEH.12.11
reference: Nehemiah 12:11
source:
  edition: WLC
  text: וְ/יוֹיָדָע֙ הוֹלִ֣יד אֶת יוֹנָתָ֔ן וְ/יוֹנָתָ֖ן הוֹלִ֥יד אֶת יַדּֽוּעַ־־׃
translation:
  text: And Joiada fathered Jonathan, and Jonathan fathered Jaddua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts and translations read 'Johanan' instead of 'Jonathan.'
      The Hebrew text used here reads 'Jonathan.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְ
  chosen: And
  alternatives:
  - Now
  lexicon: HALOT
  rationale: The prefixed conjunction simply links this genealogical notice to the
    preceding line. 'And' preserves the straightforward connective force in a genealogy
    better than a more interpretive 'now'.
- source_word: יוֹיָדָע
  chosen: Joiada
  alternatives:
  - Jehoiada
  lexicon: HALOT
  rationale: This is a personal name and is therefore transliterated rather than translated,
    following the project's policy for names. 'Joiada' closely reflects the Hebrew
    form here; 'Jehoiada' is a familiar English variant but less directly aligned
    to this spelling.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: The Hiphil of ילד in genealogical contexts means 'to father, beget.'
    'Fathered' is concise, natural modern English, and preserves the male genealogical
    sense better than the more cumbersome 'became the father of.' 'Begot' is traditional
    but archaic.
- source_word: אֶת
  chosen: '[not translated]'
  lexicon: HALOT
  rationale: This is the direct-object marker in Hebrew and normally has no direct
    English equivalent. Its function is represented by English word order.
- source_word: יוֹנָתָן
  chosen: Jonathan
  alternatives:
  - Johanan
  lexicon: HALOT
  rationale: The consonantal form here is יוֹנָתָן, which is most naturally rendered
    'Jonathan.' Some textual traditions and English versions reflect 'Johanan' in
    this genealogical context, but the given Hebrew text supports 'Jonathan,' so that
    is retained in the main text.
- source_word: וְ
  chosen: and
  lexicon: HALOT
  rationale: The second prefixed conjunction continues the genealogy in simple sequence,
    so 'and' is the most transparent rendering.
- source_word: יוֹנָתָן
  chosen: Jonathan
  alternatives:
  - Johanan
  lexicon: HALOT
  rationale: Repeated proper name; rendered consistently with the earlier occurrence
    in the verse.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: Repeated genealogical verb; rendered consistently for clarity and style.
- source_word: יַדּוּעַ
  chosen: Jaddua
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention from the Hebrew
    form.
