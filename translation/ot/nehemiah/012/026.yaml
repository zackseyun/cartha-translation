id: NEH.12.26
reference: Nehemiah 12:26
source:
  edition: WLC
  text: אֵ֕לֶּה בִּ/ימֵ֛י יוֹיָקִ֥ים בֶּן יֵשׁ֖וּעַ בֶּן יוֹצָדָ֑ק וּ/בִ/ימֵי֙ נְחֶמְיָ֣ה
    הַ/פֶּחָ֔ה וְ/עֶזְרָ֥א הַ/כֹּהֵ֖ן הַ/סּוֹפֵֽר־־׃פ
translation:
  text: These were in the days of Joiakim son of Jeshua, son of Jozadak, and in the
    days of Nehemiah the governor and Ezra the priest, the scribe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''and Ezra the priest-scribe.'' The Hebrew gives Ezra two appositional
      titles: ''the priest'' and ''the scribe.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These were
  alternatives:
  - These
  - These men were
  lexicon: HALOT
  rationale: Demonstrative plural referring back to the previously listed persons.
    Supplying 'were' makes the verbless Hebrew clause natural in English without adding
    new content.
- source_word: בִּימֵי
  chosen: in the days of
  alternatives:
  - during the time of
  - in the time of
  lexicon: HALOT
  rationale: Standard idiom for locating persons/events within a historical period.
    'In the days of' preserves the Hebrew expression and remains natural English.
- source_word: יוֹיָקִים
  chosen: Joiakim
  alternatives:
  - Jehoiakim
  lexicon: HALOT
  rationale: Personal name transliterated according to standard English convention
    for this postexilic priestly figure; distinct from the king Jehoiakim.
- source_word: בֶּן יֵשׁוּעַ בֶּן יוֹצָדָק
  chosen: son of Jeshua, son of Jozadak
  alternatives:
  - descendant of Jeshua, descendant of Jozadak
  lexicon: HALOT
  rationale: בֶּן normally means 'son of' in genealogical notices. No contextual need
    to broaden to 'descendant' here.
- source_word: וּבִימֵי
  chosen: and in the days of
  alternatives:
  - and during the time of
  lexicon: HALOT
  rationale: The repeated prepositional phrase is retained rather than compressed,
    reflecting the Hebrew structure and emphasizing the additional chronological reference.
- source_word: נְחֶמְיָה הַפֶּחָה
  chosen: Nehemiah the governor
  alternatives:
  - Nehemiah the prefect
  lexicon: HALOT
  rationale: פֶּחָה denotes a provincial governor under imperial administration. 'Governor'
    is the clearest and most idiomatic English equivalent.
- source_word: וְעֶזְרָא הַכֹּהֵן הַסֹּפֵר
  chosen: and Ezra the priest, the scribe
  alternatives:
  - and Ezra the priest-scribe
  - and Ezra the priest and scribe
  lexicon: HALOT
  rationale: The appositional double title is best represented by 'the priest, the
    scribe,' preserving both offices/descriptions distinctly. A comma reflects apposition
    without implying two separate people.
