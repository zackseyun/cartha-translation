id: NEH.12.27
reference: Nehemiah 12:27
source:
  edition: WLC
  text: וּ/בַ/חֲנֻכַּ֞ת חוֹמַ֣ת יְרוּשָׁלִַ֗ם בִּקְשׁ֤וּ אֶת הַ/לְוִיִּם֙ מִ/כָּל
    מְק֣וֹמֹתָ֔/ם לַ/הֲבִיאָ֖/ם לִֽ/ירוּשָׁלִָ֑ם לַ/עֲשֹׂ֨ת חֲנֻכָּ֤ה וְ/שִׂמְחָה֙
    וּ/בְ/תוֹד֣וֹת וּ/בְ/שִׁ֔יר מְצִלְתַּ֖יִם נְבָלִ֥ים וּ/בְ/כִנֹּרֽוֹת־־׃
translation:
  text: At the dedication of the wall of Jerusalem, they sought the Levites from all
    their places, to bring them to Jerusalem to celebrate the dedication with gladness
    and with thanksgivings and with song, with cymbals, harps, and lyres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they looked for the Levites' or, contextually, 'they summoned the Levites.'
      The Hebrew verb primarily means 'sought.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally 'to do a dedication.'
    reason: lexical_alternative
  - marker: c
    text: The exact distinction between the instruments rendered 'harps' and 'lyres'
      is uncertain; the Hebrew names two different stringed instruments.
    reason: cultural_note
lexical_decisions:
- source_word: וּבַחֲנֻכַּת
  chosen: At the dedication of
  alternatives:
  - And at the dedication of
  - During the dedication of
  lexicon: HALOT
  rationale: The prefixed conjunction plus beth is best rendered idiomatically as
    a temporal setting, 'At the dedication of.' 'Dedication' preserves the nominal
    sense of חנכה rather than paraphrasing as 'celebration.'
- source_word: חוֹמַת יְרוּשָׁלַםִ
  chosen: the wall of Jerusalem
  alternatives:
  - Jerusalem's wall
  lexicon: HALOT
  rationale: Construct chain straightforwardly denotes the city wall belonging to
    Jerusalem. 'The wall of Jerusalem' is clear and suitably formal.
- source_word: בִּקְשׁוּ
  chosen: they sought
  alternatives:
  - they looked for
  - they summoned
  lexicon: HALOT
  rationale: The verb בקשׁ fundamentally means 'seek.' In context it refers to locating
    and gathering the Levites. 'Sought' keeps the lexical force without overinterpreting
    as an official summons, though that nuance is contextually implied.
- source_word: אֶת־הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Direct object marker plus definite noun; standard rendering.
- source_word: מִכָּל מְקֹמֹתָם
  chosen: from all their places
  alternatives:
  - from all their settlements
  - from all the places where they lived
  lexicon: HALOT
  rationale: מקום is broadly 'place.' Here it refers to the various locations where
    the Levites were residing. 'Places' is sufficiently literal; more specific options
    are interpretive.
- source_word: לַהֲבִיאָם לִירוּשָׁלָם
  chosen: to bring them to Jerusalem
  alternatives:
  - to have them come to Jerusalem
  lexicon: HALOT
  rationale: Hiphil of בוא is causative, so 'bring them' is preferable to the less
    explicit 'have them come,' while still natural in English.
- source_word: לַעֲשׂוֹת חֲנֻכָּה
  chosen: to celebrate the dedication
  alternatives:
  - to perform the dedication
  - to hold the dedication
  lexicon: HALOT
  rationale: Literally 'to do/make a dedication,' but idiomatic English prefers 'celebrate
    the dedication.' This preserves the event sense without wooden phrasing.
- source_word: וְשִׂמְחָה
  chosen: with gladness
  alternatives:
  - and rejoicing
  - with joy
  lexicon: HALOT
  rationale: The noun denotes joy/rejoicing. 'With gladness' fits the prepositional
    sequence that follows and reads smoothly with the ceremonial context.
- source_word: וּבְתוֹדוֹת
  chosen: with thanksgivings
  alternatives:
  - with songs of thanksgiving
  - with praises
  lexicon: HALOT
  rationale: תודות is plural of thanksgiving/confession of thanks. 'Thanksgivings'
    preserves the lexical content without importing 'songs' from the following term.
- source_word: וּבְשִׁיר
  chosen: and with song
  alternatives:
  - and with singing
  lexicon: HALOT
  rationale: שׁיר is a song/song-performance term. Singular collective 'song' works
    idiomatically in English and preserves the noun form.
- source_word: מְצִלְתַּיִם
  chosen: cymbals
  lexicon: HALOT
  rationale: Standard rendering of the musical instrument.
- source_word: נְבָלִים
  chosen: harps
  alternatives:
  - lyres
  - harp-like instruments
  lexicon: HALOT
  rationale: נבל denotes a stringed instrument. English tradition often renders it
    'harp,' while כינור is commonly 'lyre.' Since both appear here, distinguishing
    them as 'harps' and 'lyres' preserves the two-instrument list, even though exact
    ancient equivalence is uncertain.
- source_word: וּבְכִנֹּרוֹת
  chosen: and lyres
  alternatives:
  - and harps
  lexicon: HALOT
  rationale: כינור is another stringed instrument, often rendered 'lyre.' Rendering
    it differently from נבלים avoids collapsing two distinct Hebrew terms into one
    English term.
