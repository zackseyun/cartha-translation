id: NEH.12.41
reference: Nehemiah 12:41
source:
  edition: WLC
  text: וְ/הַ/כֹּהֲנִ֡ים אֶלְיָקִ֡ים מַעֲשֵׂיָ֡ה מִ֠נְיָמִין מִיכָיָ֧ה אֶלְיוֹעֵינַ֛י
    זְכַרְיָ֥ה חֲנַנְיָ֖ה בַּ/חֲצֹצְרֽוֹת׃
translation:
  text: 'and the priests: Eliakim, Maaseiah, Miniamin, Micaiah, Elioenai, Zechariah,
    and Hananiah, with trumpets.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the trumpets.' The Hebrew may simply mark that these priests were
      accompanied by or assigned to the trumpets.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הַ/כֹּהֲנִים
  chosen: and the priests
  alternatives:
  - and the priestly men
  lexicon: HALOT
  rationale: The conjunction וְ is carried as 'and,' linking this list to the preceding
    procession participants. הַכֹּהֲנִים is the standard term for 'the priests,' and
    there is no contextual reason to paraphrase more dynamically.
- source_word: אֶלְיָקִים
  chosen: Eliakim
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: מַעֲשֵׂיָה
  chosen: Maaseiah
  alternatives:
  - Maaseya
  rationale: Personal name transliterated in a conventional English biblical form.
    Alternative spellings exist, but 'Maaseiah' best matches common English usage.
- source_word: מִנְיָמִין
  chosen: Miniamin
  alternatives:
  - Mijamin
  rationale: The proper name is rendered 'Miniamin' in line with the consonantal form
    here. Some English traditions use 'Mijamin,' but this form more directly reflects
    the present Hebrew spelling.
- source_word: מִיכָיָה
  chosen: Micaiah
  alternatives:
  - Mikayah
  rationale: Standard English transliteration of the Hebrew personal name.
- source_word: אֶלְיוֹעֵינַי
  chosen: Elioenai
  alternatives:
  - Elyoenai
  rationale: Personal name transliterated according to established English biblical
    convention.
- source_word: זְכַרְיָה
  chosen: Zechariah
  alternatives:
  - Zekaryah
  rationale: Standard English transliteration of the Hebrew proper name.
- source_word: חֲנַנְיָה
  chosen: Hananiah
  alternatives:
  - Chananiah
  rationale: Standard English transliteration of the Hebrew proper name.
- source_word: בַּ/חֲצֹצְרֽוֹת
  chosen: with trumpets
  alternatives:
  - on the trumpets
  - with the trumpets
  lexicon: HALOT
  rationale: The preposition ב plus the plural noun 'trumpets' here most naturally
    indicates accompaniment or instrumentality in this list of priests participating
    in the dedication procession. 'With trumpets' is idiomatic English and fits the
    immediate context of musical/liturgical participants.
