id: NEH.12.21
reference: Nehemiah 12:21
source:
  edition: WLC
  text: לְ/חִלְקִיָּ֣ה חֲשַׁבְיָ֔ה לִֽ/ידַֽעְיָ֖ה נְתַנְאֵֽל׃
translation:
  text: for Hilkiah, Hashabiah; for Jedaiah, Nethanel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of Hilkiah ... of Jedaiah.' The Hebrew preposition ל may denote association
      or representation in this list.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/חִלְקִיָּה
  chosen: for Hilkiah
  alternatives:
  - of Hilkiah
  - belonging to Hilkiah
  lexicon: HALOT
  rationale: The prefixed ל in this priestly list marks association/representation
    within the roster, best rendered idiomatically as 'for' in English, as in the
    surrounding verses naming the representative under each family head. The personal
    name is transliterated per project policy.
- source_word: חֲשַׁבְיָה
  chosen: Hashabiah
  alternatives:
  - Hasabiah
  lexicon: HALOT
  rationale: Proper name; transliterated rather than translated. Standard English
    convention favors 'Hashabiah' for חֲשַׁבְיָה.
- source_word: לִֽ/ידַֽעְיָה
  chosen: for Jedaiah
  alternatives:
  - of Jedaiah
  - belonging to Jedaiah
  lexicon: HALOT
  rationale: As with the first phrase, ל marks the family or house represented in
    the list. 'For Jedaiah' preserves the elliptical list style while remaining natural
    in English. The name is transliterated.
- source_word: נְתַנְאֵל
  chosen: Nethanel
  alternatives:
  - Nethaneel
  lexicon: HALOT
  rationale: Proper name; transliterated by standard convention. 'Nethanel' is the
    common English form and fits the list format.
