id: NEH.12.34
reference: Nehemiah 12:34
source:
  edition: WLC
  text: יְהוּדָה֙ וּ/בִנְיָמִ֔ן וּֽ/שְׁמַֽעְיָ֖ה וְ/יִרְמְיָֽה׃ס
translation:
  text: Judah, Benjamin, Shemaiah, and Jeremiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, if יְהוּדָה were taken geographically in another context, 'Judea'; here
      the personal/tribal name 'Judah' fits the list better.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוּדָה
  chosen: Judah
  alternatives:
  - Judea
  lexicon: HALOT
  rationale: Here the form is a proper personal/tribal name in a list of participants,
    not the geographic region. Standard transliteration of the name best matches the
    source and the translation philosophy of transliterating personal names.
- source_word: בִנְיָמִן
  chosen: Benjamin
  lexicon: HALOT
  rationale: Proper name in a coordinate list. Standard English transliteration preserves
    the Hebrew name.
- source_word: שְׁמַעְיָה
  chosen: Shemaiah
  alternatives:
  - Shema'yah
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard convention rather than
    translated.
- source_word: יִרְמְיָה
  chosen: Jeremiah
  alternatives:
  - Yirmeyah
  lexicon: HALOT
  rationale: Proper personal name; standard English biblical transliteration is preferred
    for readability and recognizability.
- source_word: וְ / וּ
  chosen: and
  alternatives:
  - ', (asyndetic-style English punctuation)'
  rationale: The repeated conjunction links the names in a simple list. In natural
    English, commas plus a final 'and' best represent the Hebrew coordination without
    wooden repetition.
