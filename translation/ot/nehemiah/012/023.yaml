id: NEH.12.23
reference: Nehemiah 12:23
source:
  edition: WLC
  text: בְּנֵ֤י לֵוִי֙ רָאשֵׁ֣י הָֽ/אָב֔וֹת כְּתוּבִ֕ים עַל סֵ֖פֶר דִּבְרֵ֣י הַ/יָּמִ֑ים
    וְ/עַד יְמֵ֖י יֽוֹחָנָ֥ן בֶּן אֶלְיָשִֽׁיב־־־׃
translation:
  text: The sons of Levi, heads of fathers’ houses, were recorded in the book of the
    chronicles, up to the days of Yohanan son of Eliashib.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Johanan.” The Hebrew name יוֹחָנָן may be transliterated either way
      in English.
    reason: lexical_alternative
  - marker: b
    text: “The book of the chronicles” refers to an official historical record or
      annals, not necessarily the biblical books of Chronicles.
    reason: cultural_note
lexical_decisions:
- source_word: בְּנֵי לֵוִי
  chosen: The sons of Levi
  alternatives:
  - The Levites
  lexicon: HALOT
  rationale: Formally the construct phrase is 'sons of Levi.' Although 'Levites' is
    a natural English equivalent, the Hebrew wording is retained because the verse
    immediately specifies a subset ('heads of fathers’ houses'), and the more literal
    rendering preserves that structure.
- source_word: רָאשֵׁי הָאָבוֹת
  chosen: heads of fathers’ houses
  alternatives:
  - heads of ancestral houses
  - chiefs of the fathers
  lexicon: HALOT
  rationale: This idiom refers to clan or family heads. 'Fathers’ houses' is a standard,
    transparent rendering that preserves the underlying household/lineage concept
    better than the more interpretive 'clans,' while remaining readable.
- source_word: כְּתוּבִים
  chosen: were recorded
  alternatives:
  - were written
  - were inscribed
  lexicon: HALOT
  rationale: The passive participle from כתב indicates that these names were set down
    in writing. 'Were recorded' communicates the administrative/register sense in
    context more naturally than the bare 'were written.'
- source_word: עַל סֵפֶר דִּבְרֵי הַיָּמִים
  chosen: in the book of the chronicles
  alternatives:
  - in the book of the annals
  - in the book of the daily records
  lexicon: HALOT
  rationale: The phrase denotes a written historical record. Although עַל is literally
    'on/upon,' English idiom prefers 'in' for inclusion within a written register.
    'Chronicles' fits the established sense of דִּבְרֵי הַיָּמִים here as annalistic
    records.
- source_word: וְעַד יְמֵי
  chosen: up to the days of
  alternatives:
  - and until the days of
  lexicon: HALOT
  rationale: This phrase marks the temporal limit of the record. 'Up to the days of'
    is idiomatic modern English and preserves the chronological boundary.
- source_word: יֽוֹחָנָן
  chosen: Yohanan
  alternatives:
  - Johanan
  lexicon: HALOT
  rationale: Personal names are transliterated by standard conventions per project
    philosophy. 'Yohanan' more directly reflects the Hebrew form, while 'Johanan'
    is a familiar Anglicized alternative worth preserving in a footnote.
- source_word: בֶּן אֶלְיָשִׁיב
  chosen: son of Eliashib
  lexicon: HALOT
  rationale: A straightforward patronymic construction; 'son of Eliashib' is the natural
    and formal rendering.
