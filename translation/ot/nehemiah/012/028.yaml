id: NEH.12.28
reference: Nehemiah 12:28
source:
  edition: WLC
  text: וַ/יֵּאָ֣סְפ֔וּ בְּנֵ֖י הַ/מְשֹׁרְרִ֑ים וּ/מִן הַ/כִּכָּר֙ סְבִיב֣וֹת יְרוּשָׁלִַ֔ם
    וּ/מִן חַצְרֵ֖י נְטֹפָתִֽי־־׃
translation:
  text: And the sons of the singers were gathered from the district around Jerusalem
    and from the settlements of the Netophathites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the plain around Jerusalem.' The Hebrew כִּכָּר can denote a plain,
      circle, or district depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'villages of the Netophathites.' The Hebrew חַצְרֵי often refers to small
      settlements or unwalled villages.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּאָסְפוּ
  chosen: were gathered
  alternatives:
  - assembled
  - gathered themselves
  lexicon: HALOT
  rationale: The Niphal wayyiqtol of אסף is naturally rendered as a passive/reflexive
    gathering. 'Were gathered' preserves the Hebrew form and avoids over-interpreting
    whether they gathered themselves or were summoned.
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - members of
  - descendants of
  lexicon: HALOT
  rationale: Formally this is 'sons of.' In context it denotes the members belonging
    to the guild/class of singers. Retaining 'sons of' best reflects the Hebrew construction
    while remaining understandable in English.
- source_word: הַמְשֹׁרְרִים
  chosen: the singers
  alternatives:
  - those who sang
  - the musicians
  lexicon: HALOT
  rationale: The participial noun refers specifically to singers, not musicians in
    general. 'The singers' is the most direct and accurate rendering.
- source_word: הַכִּכָּר סְבִיבוֹת יְרוּשָׁלִַם
  chosen: the district around Jerusalem
  alternatives:
  - the plain around Jerusalem
  - the circle around Jerusalem
  lexicon: HALOT
  rationale: כִּכָּר can denote a round district/plain. Here, with 'around Jerusalem,'
    it refers to the surrounding region rather than a specific flat plain. 'District
    around Jerusalem' communicates the geographic sense in natural English.
- source_word: חַצְרֵי
  chosen: the settlements of
  alternatives:
  - villages of
  - courtyards of
  lexicon: HALOT
  rationale: Though חָצֵר can literally mean 'court' or 'enclosure,' in geographic
    contexts it commonly refers to unwalled villages or settlements. 'Settlements'
    fits the place-list context well.
- source_word: נְטֹפָתִי
  chosen: the Netophathites
  alternatives:
  - Netophah
  - the people of Netophah
  lexicon: HALOT
  rationale: The gentilic form points to inhabitants associated with Netophah rather
    than the place-name alone. 'The Netophathites' preserves that ethnic/geographic
    nuance.
