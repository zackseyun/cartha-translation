id: NEH.12.43
reference: Nehemiah 12:43
source:
  edition: WLC
  text: וַ/יִּזְבְּח֣וּ בַ/יּוֹם הַ֠/הוּא זְבָחִ֨ים גְּדוֹלִ֜ים וַ/יִּשְׂמָ֗חוּ כִּ֤י
    הָ/אֱלֹהִים֙ שִׂמְּחָ/ם֙ שִׂמְחָ֣ה גְדוֹלָ֔ה וְ/גַ֧ם הַ/נָּשִׁ֛ים וְ/הַ/יְלָדִ֖ים
    שָׂמֵ֑חוּ וַ/תִּשָּׁמַ֛ע שִׂמְחַ֥ת יְרוּשָׁלִַ֖ם מֵ/רָחֽוֹק־׃
translation:
  text: On that day they offered great sacrifices and rejoiced, because God had made
    them rejoice with great joy. And also the women and the children rejoiced, and
    the joy of Jerusalem was heard from far away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they sacrificed great sacrifices.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'God had given them great joy.' The Hebrew more literally says that
      God caused them to rejoice with great joy.
    reason: lexical_alternative
  - marker: c
    text: Or, 'the wives and the children,' since the Hebrew word can mean either
      'women' or 'wives' depending on context.
    reason: lexical_alternative
  - marker: d
    text: Or, 'was heard from afar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְבְּחוּ
  chosen: they offered
  alternatives:
  - they sacrificed
  lexicon: HALOT
  rationale: The verb זבח in this cultic context refers to presenting sacrificial
    offerings. 'Offered' is natural modern English and fits the following object 'sacrifices'
    without awkward repetition, while still preserving the sacrificial sense.
- source_word: זְבָחִים גְּדוֹלִים
  chosen: great sacrifices
  alternatives:
  - large sacrifices
  - many sacrifices
  lexicon: HALOT
  rationale: זְבָחִים denotes sacrifices/slaughter offerings; גְּדוֹלִים here most
    naturally describes their greatness or magnitude. 'Great sacrifices' preserves
    the Hebrew wording and can encompass both size and significance better than the
    narrower 'many sacrifices'.
- source_word: וַיִּשְׂמָחוּ
  chosen: rejoiced
  alternatives:
  - were glad
  lexicon: HALOT
  rationale: The root שׂמח consistently denotes joy/rejoicing. 'Rejoiced' matches
    the verbal force and preserves the repeated joy language in the verse.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for their rejoicing. 'Because' is clearer
    in contemporary English than 'for' while preserving the causal sense.
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the God
  lexicon: HALOT
  rationale: Although the Hebrew has the article, English idiom normally renders הָאֱלֹהִים
    simply as 'God' when referring to Israel's God in narrative prose.
- source_word: שִׂמְּחָם שִׂמְחָה גְדוֹלָה
  chosen: had made them rejoice with great joy
  alternatives:
  - had made them very glad
  - had given them great joy
  lexicon: HALOT
  rationale: 'The piel verb plus cognate accusative intensifies the idea: God caused
    them to rejoice, and the joy was great. ''Had made them rejoice with great joy''
    preserves both the causative force and the Hebrew''s emphatic repetition better
    than a flattened rendering.'
- source_word: וְגַם
  chosen: And also
  alternatives:
  - also
  - even
  lexicon: HALOT
  rationale: וְגַם adds an emphatic inclusion. 'And also' preserves the additive force
    and the sentence flow in English.
- source_word: הַנָּשִׁים וְהַיְלָדִים
  chosen: the women and the children
  alternatives:
  - the wives and the children
  lexicon: HALOT
  rationale: נָשִׁים can mean 'women' or 'wives'; without possessive specification,
    'women' is the broader and safer rendering. יְלָדִים is straightforwardly 'children'
    here.
- source_word: שָׂמֵחוּ
  chosen: rejoiced
  alternatives:
  - were glad
  lexicon: HALOT
  rationale: Repeating 'rejoiced' maintains the lexical cohesion of the verse, which
    repeatedly uses the שׂמח root.
- source_word: וַתִּשָּׁמַע
  chosen: was heard
  alternatives:
  - could be heard
  lexicon: HALOT
  rationale: The nifal form is passive/reflexive in sense. 'Was heard' is the most
    direct rendering; 'could be heard' is possible but adds modal nuance not explicit
    in the Hebrew.
- source_word: שִׂמְחַת יְרוּשָׁלִַם
  chosen: the joy of Jerusalem
  alternatives:
  - Jerusalem's rejoicing
  - the rejoicing of Jerusalem
  lexicon: HALOT
  rationale: The construct phrase can denote the city's joy or the joy associated
    with its people. 'The joy of Jerusalem' is concise and preserves the Hebrew genitive
    without over-interpreting.
- source_word: מֵרָחוֹק
  chosen: from far away
  alternatives:
  - from afar
  - far off
  lexicon: HALOT
  rationale: מִן plus רָחוֹק indicates distance. 'From far away' is clear modern English;
    'from afar' is more traditional but less contemporary.
