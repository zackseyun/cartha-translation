theological_decisions:
- issue: Agency of joy
  chosen_reading: God is explicitly presented as the one who caused the people's rejoicing.
  alternative_readings:
  - God gave them great joy
  rationale: The Hebrew piel verb שִׂמְּחָם is causative ('made them rejoice'). The
    translation preserves divine agency without softening it into a less direct statement,
    while still using natural English.
  doctrine_reference: Translation philosophy §1, §3
- issue: Scope of the rejoicing community
  chosen_reading: The verse explicitly includes women and children in the communal
    celebration.
  rationale: The Hebrew names these groups directly, so the translation retains them
    rather than subsuming them under a generic collective. This reflects the text's
    emphasis on the breadth of the community's joy.
  doctrine_reference: Translation philosophy §4
