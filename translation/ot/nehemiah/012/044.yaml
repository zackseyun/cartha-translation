id: NEH.12.44
reference: Nehemiah 12:44
source:
  edition: WLC
  text: וַ/יִּפָּקְד֣וּ בַ/יּוֹם֩ הַ/ה֨וּא אֲנָשִׁ֜ים עַל הַ/נְּשָׁכ֗וֹת לָ/א֨וֹצָר֥וֹת
    לַ/תְּרוּמוֹת֮ לָ/רֵאשִׁ֣ית וְ/לַ/מַּֽעַשְׂרוֹת֒ לִ/כְנ֨וֹס בָּ/הֶ֜ם לִ/שְׂדֵ֤י
    הֶ/עָרִים֙ מְנָא֣וֹת הַ/תּוֹרָ֔ה לַ/כֹּהֲנִ֖ים וְ/לַ/לְוִיִּ֑ם כִּ֚י שִׂמְחַ֣ת
    יְהוּדָ֔ה עַל הַ/כֹּהֲנִ֥ים וְ/עַל הַ/לְוִיִּ֖ם הָ/עֹמְדִֽים־־־׃
translation:
  text: On that day men were appointed over the storerooms for the treasuries, for
    the contributions, for the firstfruits, and for the tithes, to gather into them
    from the fields of the cities the portions required by the law for the priests
    and for the Levites, for Judah rejoiced over the priests and over the Levites
    who were serving.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the chambers' for 'the storerooms.' The Hebrew term can denote rooms
      or chambers, but here the storage function is prominent.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the portions of the law,' that is, the shares prescribed by the
      Torah for the priests and Levites.
    reason: lexical_alternative
  - marker: c
    text: Literally 'who were standing.' In this temple context, the expression refers
      to standing in attendance, that is, serving or ministering.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפָּקְדוּ
  chosen: were appointed
  alternatives:
  - were assigned
  - were appointed/put in charge
  lexicon: HALOT
  rationale: From פקד in the Niphal/related passive sense here, indicating that certain
    men were designated for an administrative role. 'Were appointed' captures the
    formal commissioning better than a bare 'were assigned.'
- source_word: אֲנָשִׁים
  chosen: men
  alternatives:
  - people
  - certain men
  lexicon: HALOT
  rationale: The Hebrew explicitly uses the masculine plural 'men.' Per gender-accurate
    philosophy, 'men' is retained rather than neutralizing to 'people.' The indefiniteness
    is conveyed without needing 'certain' in the main text.
- source_word: הַנְּשָׁכוֹת
  chosen: the storerooms
  alternatives:
  - the chambers
  - the rooms
  lexicon: HALOT
  rationale: In temple-administrative context, these are chambers used for storage.
    'Storerooms' makes the function clear in modern English better than the more opaque
    'chambers.'
- source_word: לָאֹצָרוֹת
  chosen: for the treasuries
  alternatives:
  - for the stores
  - for the supplies
  lexicon: HALOT
  rationale: אוצר denotes store/treasury. Because the verse lists categories connected
    with collected sacred goods, 'treasuries' fits the institutional setting and distinguishes
    this term from the physical 'storerooms.'
- source_word: לַתְּרוּמוֹת
  chosen: for the contributions
  alternatives:
  - for the offerings
  - for the heave offerings
  lexicon: HALOT
  rationale: תרומות refers to contributions set apart for sacred use. 'Contributions'
    is clear and broad enough here; 'heave offerings' is too technical for the target
    style, while 'offerings' could blur the administrative collection sense.
- source_word: לָרֵאשִׁית
  chosen: for the firstfruits
  alternatives:
  - for the first portion
  lexicon: HALOT
  rationale: A standard cultic term for the first produce given to God. 'Firstfruits'
    is the established and accurate English equivalent.
- source_word: וְלַמַּעַשְׂרוֹת
  chosen: and for the tithes
  alternatives:
  - and for the tenth portions
  lexicon: HALOT
  rationale: מעשרות is the regular term for tithes; 'tithes' is both accurate and
    natural.
- source_word: לִכְנוֹס בָּהֶם
  chosen: to gather into them
  alternatives:
  - to collect in them
  - to bring into them
  lexicon: HALOT
  rationale: The infinitive plus pronoun refers to collecting produce into the storerooms/treasuries.
    'Gather into them' preserves the directional sense without over-specifying transport.
- source_word: לִשְׂדֵי הֶעָרִים
  chosen: from the fields of the cities
  alternatives:
  - from the rural lands of the towns
  - from the fields belonging to the cities
  lexicon: HALOT
  rationale: The phrase points to agricultural lands associated with the towns. 'From
    the fields of the cities' is formally close and understandable, even if 'cities'
    here includes town territories.
- source_word: מְנָאוֹת הַתּוֹרָה
  chosen: the portions required by the law
  alternatives:
  - the portions of the law
  - the legal portions
  - the prescribed portions
  lexicon: HALOT
  rationale: The phrase denotes the shares prescribed in Torah for priests and Levites.
    'Required by the law' makes the genitive relation explicit in idiomatic English.
- source_word: לַכֹּהֲנִים וְלַלְוִיִּם
  chosen: for the priests and for the Levites
  alternatives:
  - for the priests and Levites
  lexicon: HALOT
  rationale: The repeated preposition is preserved in English for clarity and slight
    emphasis on the two recipient groups.
- source_word: כִּי שִׂמְחַת יְהוּדָה
  chosen: for Judah rejoiced
  alternatives:
  - for the joy of Judah was great
  - for Judah's joy was
  lexicon: HALOT
  rationale: Literally 'for the joy of Judah [was]...' followed by the object. Rendering
    as a verbal clause gives natural English while preserving the causal sense. 'Judah'
    here refers to the Judean community.
- source_word: עַל הַכֹּהֲנִים וְעַל הַלְוִיִּם
  chosen: over the priests and over the Levites
  alternatives:
  - because of the priests and the Levites
  - concerning the priests and the Levites
  lexicon: HALOT
  rationale: עַל after a joy noun/verb can indicate the object or cause of rejoicing.
    'Over' is idiomatic in English and preserves the celebratory sense.
- source_word: הָעֹמְדִים
  chosen: who were serving
  alternatives:
  - who were standing
  - who stood
  lexicon: HALOT
  rationale: עמד literally means 'stand,' but in priestly/Levitical context it commonly
    denotes standing in attendance, i.e., ministering or serving. 'Who were serving'
    communicates the functional sense in context.
