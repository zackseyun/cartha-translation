id: NEH.12.32
reference: Nehemiah 12:32
source:
  edition: WLC
  text: וַ/יֵּ֤לֶךְ אַחֲרֵי/הֶם֙ הוֹשַׁ֣עְיָ֔ה וַ/חֲצִ֖י שָׂרֵ֥י יְהוּדָֽה׃
translation:
  text: Hoshaiah and half of the officials of Judah went behind them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after them.' The Hebrew can denote following in sequence; 'behind them'
      makes the procession imagery explicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - walked
  - proceeded
  lexicon: HALOT
  rationale: The waw-consecutive imperfect of הלך narrates simple past movement. 'Went'
    is the most natural modern English rendering in this procession context.
- source_word: אַחֲרֵיהֶם
  chosen: behind them
  alternatives:
  - after them
  lexicon: HALOT
  rationale: The preposition אַחֲרֵי with pronominal suffix denotes position or movement
    following others. 'Behind them' is clearer in English for the physical order of
    a procession, though 'after them' is a close alternative.
- source_word: הוֹשַׁעְיָה
  chosen: Hoshaiah
  rationale: Personal names are transliterated rather than translated, following project
    policy.
- source_word: וַחֲצִי
  chosen: and half of
  alternatives:
  - with half of
  lexicon: HALOT
  rationale: 'The noun חֲצִי means ''half.'' With the prefixed conjunction, the phrase
    coordinates Hoshaiah with another group: ''and half of.'''
- source_word: שָׂרֵי
  chosen: officials
  alternatives:
  - princes
  - leaders
  - chiefs
  lexicon: HALOT
  rationale: שַׂר can denote a ruler, chief, prince, or official. In this administrative
    and ceremonial context, 'officials' best conveys civic leadership without implying
    royal sons ('princes').
- source_word: יְהוּדָה
  chosen: Judah
  rationale: Standard English form of the place/tribal name יְהוּדָה.
