id: NEH.12.42
reference: Nehemiah 12:42
source:
  edition: WLC
  text: וּ/מַעֲשֵׂיָ֨ה וּֽ/שְׁמַֽעְיָ֜ה וְ/אֶלְעָזָ֧ר וְ/עֻזִּ֛י וִֽ/יהוֹחָנָ֥ן וּ/מַלְכִּיָּ֖ה
    וְ/עֵילָ֣ם וָ/עָ֑זֶר וַ/יַּשְׁמִ֨יעוּ֙ הַ/מְשֹׁ֣רְרִ֔ים וְ/יִֽזְרַחְיָ֖ה הַ/פָּקִֽיד׃
translation:
  text: and Maaseiah, Shemaiah, Eleazar, Uzzi, Jehohanan, Malkijah, Elam, and Ezer.
    And the singers made themselves heard, with Izrahiah the overseer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the singers made their voice heard'' / ''sang loudly.'' The Hebrew
      verb is causative: ''caused to be heard.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'with Izrahiah the officer' or 'supervisor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעֲשֵׂיָה
  chosen: Maaseiah
  alternatives:
  - Maaseyah
  rationale: Proper personal name; transliterated rather than translated per project
    philosophy.
- source_word: שְׁמַעְיָה
  chosen: Shemaiah
  alternatives:
  - Shemayah
  rationale: Proper personal name; standard English transliteration used.
- source_word: אֶלְעָזָר
  chosen: Eleazar
  rationale: Proper personal name; standard transliteration.
- source_word: עֻזִּי
  chosen: Uzzi
  rationale: Proper personal name; standard transliteration.
- source_word: יְהוֹחָנָן
  chosen: Jehohanan
  alternatives:
  - Johanan
  rationale: Proper personal name; a fuller transliteration matching the consonantal
    form is preferred, though 'Johanan' is a common English alternative.
- source_word: מַלְכִּיָּה
  chosen: Malkijah
  alternatives:
  - Malchijah
  rationale: Proper personal name; transliterated with a readable modern English form.
- source_word: עֵילָם
  chosen: Elam
  rationale: Proper personal name here, not the region; transliterated accordingly.
- source_word: עָזֶר
  chosen: Ezer
  rationale: Proper personal name; standard transliteration.
- source_word: וַיַּשְׁמִיעוּ
  chosen: made themselves heard
  alternatives:
  - sang loudly
  - caused to be heard
  - made their voice heard
  lexicon: HALOT
  rationale: From שמע in the Hiphil, literally 'caused to hear' or 'made heard.' In
    context of singers, the idiom indicates audible, prominent singing rather than
    merely the act of singing. 'Made themselves heard' preserves the causative nuance
    in natural English.
- source_word: הַמְשֹׁרְרִים
  chosen: the singers
  alternatives:
  - the song leaders
  lexicon: HALOT
  rationale: Participial/noun form from שׁיר referring to those who sing. 'The singers'
    is the most direct and natural rendering in this temple-procession context.
- source_word: יִזְרַחְיָה
  chosen: Izrahiah
  alternatives:
  - Jizrahiah
  rationale: Proper personal name; transliterated by standard convention.
- source_word: הַפָּקִיד
  chosen: the overseer
  alternatives:
  - the officer
  - the supervisor
  - the leader
  lexicon: HALOT
  rationale: פקיד denotes one appointed over others in an administrative or supervisory
    role. 'Overseer' best fits the immediate context of musical leadership without
    overstating rank.
