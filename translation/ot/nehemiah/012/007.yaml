id: NEH.12.7
reference: Nehemiah 12:7
source:
  edition: WLC
  text: סַלּ֣וּ עָמ֔וֹק חִלְקִיָּ֖ה יְדַֽעְיָ֑ה אֵ֣לֶּה רָאשֵׁ֧י הַ/כֹּהֲנִ֛ים וַ/אֲחֵי/הֶ֖ם
    בִּ/ימֵ֥י יֵשֽׁוּעַ׃פ
translation:
  text: Sallu, Amok, Hilkiah, Jedaiah—these were the heads of the priests and their
    brothers in the days of Jeshua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'leaders of the priests.' The Hebrew literally says 'heads of the priests.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their kinsmen' or 'their fellow priests.' The Hebrew reads 'their brothers.'
    reason: lexical_alternative
  - marker: c
    text: Jeshua is the postexilic form of the name also related to 'Joshua.'
    reason: cultural_note
lexical_decisions:
- source_word: סַלּוּ
  chosen: Sallu
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to standard English convention
    rather than translated, following the philosophy of transliterating names.
- source_word: עָמוֹק
  chosen: Amok
  lexicon: HALOT
  rationale: Proper personal name in a list; transliterated directly.
- source_word: חִלְקִיָּה
  chosen: Hilkiah
  lexicon: HALOT
  rationale: Proper personal name; standard English transliteration retained.
- source_word: יְדַעְיָה
  chosen: Jedaiah
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated.
- source_word: אֵלֶּה
  chosen: these
  alternatives:
  - these men
  lexicon: HALOT
  rationale: Simple demonstrative pronoun referring back to the named individuals.
    'These' is sufficient in English without adding 'men,' which is not explicit in
    the Hebrew.
- source_word: רָאשֵׁי
  chosen: heads of
  alternatives:
  - chiefs of
  - leaders of
  lexicon: HALOT
  rationale: Construct form of 'heads' used idiomatically for persons in leading position.
    'Heads of' preserves the Hebrew image while remaining natural enough in context.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Straightforward rendering of the definite plural noun.
- source_word: וַאֲחֵיהֶם
  chosen: and their brothers
  alternatives:
  - and their kinsmen
  - and their fellow priests
  lexicon: HALOT
  rationale: The Hebrew literally says 'their brothers.' In this genealogical/priestly
    context it likely refers to fellow members of their priestly families or associated
    groups, but the literal familial term should be preserved per the gender-accurate
    philosophy.
- source_word: בִּימֵי
  chosen: in the days of
  alternatives:
  - during the time of
  lexicon: HALOT
  rationale: Standard temporal idiom in Hebrew; 'in the days of' is both accurate
    and idiomatic in English biblical narrative.
- source_word: יֵשׁוּעַ
  chosen: Jeshua
  alternatives:
  - Joshua
  lexicon: HALOT
  rationale: The postexilic personal name יֵשׁוּעַ is conventionally rendered 'Jeshua'
    in English Ezra-Nehemiah contexts, distinguishing it from the fuller form יְהוֹשֻׁעַ
    often rendered 'Joshua.'
