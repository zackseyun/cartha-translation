theological_decisions:
- issue: Rendering of אֲחֵיהֶם in a representative male plural context
  chosen_reading: their brothers
  alternative_readings:
  - their kinsmen
  - their fellow priests
  rationale: The Hebrew uses the masculine plural noun 'brothers.' In context it may
    function corporately for related priestly associates, but the translation philosophy
    prefers gender-accurate rendering where the source is masculine. No doctrinal
    issue is at stake, but the lexical nuance is preserved rather than neutralized.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering of רָאשֵׁי as a leadership term
  chosen_reading: heads of the priests
  alternative_readings:
  - leaders of the priests
  - chief priests
  rationale: The phrase denotes leading figures among the priests, not necessarily
    the later technical office 'chief priests.' 'Heads of the priests' best preserves
    the Hebrew wording without importing later institutional connotations.
