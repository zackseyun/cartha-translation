id: NEH.12.33
reference: Nehemiah 12:33
source:
  edition: WLC
  text: וַ/עֲזַרְיָ֥ה עֶזְרָ֖א וּ/מְשֻׁלָּֽם׃
translation:
  text: and Azariah, Ezra, and Meshullam.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַ/עֲזַרְיָה
  chosen: and Azariah
  alternatives:
  - Azariah
  lexicon: HALOT
  rationale: The prefixed conjunction וַ is rendered as 'and,' continuing the list
    of names in the procession. עֲזַרְיָה is a personal name and is therefore transliterated
    rather than translated, per translation philosophy.
- source_word: עֶזְרָא
  chosen: Ezra
  lexicon: HALOT
  rationale: Personal proper name, transliterated by standard English convention.
    No conjunction precedes this name in Hebrew, but English style in a simple list
    does not require repeating conjunctions before every item.
- source_word: וּ/מְשֻׁלָּם
  chosen: and Meshullam
  alternatives:
  - Meshullam
  lexicon: HALOT
  rationale: The prefixed conjunction וּ is rendered as 'and,' marking the final named
    person in the list. מְשֻׁלָּם is a personal name and is transliterated.
