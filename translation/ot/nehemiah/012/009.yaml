id: NEH.12.9
reference: Nehemiah 12:9
source:
  edition: WLC
  text: וּ/בַקְבֻּֽקְיָ֨ה ו/ענו אֲחֵי/הֶ֛ם לְ/נֶגְדָּ֖/ם לְ/מִשְׁמָרֽוֹת׃
translation:
  text: And Bakbukiah and Unno, their brothers, stood opposite them in the divisions
    of service.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'and his brothers answered them by divisions,' if וענו is read
      as a verb rather than the proper name Unno.
    reason: alternative_reading
lexical_decisions:
- source_word: וּבַקְבֻּקְיָה
  chosen: And Bakbukiah
  rationale: Proper name; transliterated according to the translation philosophy for
    personal names. The prefixed conjunction is rendered 'And'.
- source_word: וַעֻנּוֹ
  chosen: Unno
  alternatives:
  - and his brothers answered
  lexicon: HALOT
  rationale: Taken as a proper name in line with the morphology table (proper noun)
    and the parallel list structure of names in this section. Some construe the consonants
    verbally ('answered'), but the onomastic reading best fits the immediate context
    of named Levites.
- source_word: אֲחֵיהֶם
  chosen: their brothers
  alternatives:
  - their kinsmen
  lexicon: HALOT
  rationale: Literal plural construct with 3mp suffix. 'Brothers' preserves the Hebrew
    kinship term and matches the likely guild/family context; 'kinsmen' is possible
    but less direct.
- source_word: לְנֶגְדָּם
  chosen: stood opposite them
  alternatives:
  - were opposite them
  - corresponding to them
  - facing them
  lexicon: HALOT
  rationale: The prepositional phrase means 'opposite/in front of/corresponding to
    them.' English idiom benefits from supplying 'stood' from the context of arranged
    temple service, making the line readable without over-paraphrasing.
- source_word: לְמִשְׁמָרוֹת
  chosen: in the divisions of service
  alternatives:
  - for the watches
  - by divisions
  - in the guard-posts
  lexicon: HALOT
  rationale: מִשְׁמָרוֹת commonly denotes service divisions, watches, or appointed
    duties, especially in cultic organization. 'Divisions of service' best conveys
    the temple-ministry setting here more clearly than the narrower 'watches'.
