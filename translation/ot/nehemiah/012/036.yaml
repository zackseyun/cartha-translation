id: NEH.12.36
reference: Nehemiah 12:36
source:
  edition: WLC
  text: וְֽ/אֶחָ֡י/ו שְֽׁמַעְיָ֡ה וַ/עֲזַרְאֵ֡ל מִֽלֲלַ֡י גִּֽלֲלַ֡י מָעַ֞י נְתַנְאֵ֤ל
    וִֽ/יהוּדָה֙ חֲנָ֔נִי בִּ/כְלֵי שִׁ֥יר דָּוִ֖יד אִ֣ישׁ הָ/אֱלֹהִ֑ים וְ/עֶזְרָ֥א
    הַ/סּוֹפֵ֖ר לִ/פְנֵי/הֶֽם־׃
translation:
  text: and his brothers—Shemaiah, Azarel, Milalai, Gilalai, Maai, Nethanel, Judah,
    and Hanani—with the musical instruments of David the man of God, and Ezra the
    scribe before them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with instruments of song.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶחָיו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  - and his fellow Levites
  lexicon: HALOT
  rationale: אֶחָיו literally means 'his brothers.' In this procession/list context
    it may denote close associates from the same Levitical group, but the base sense
    'brothers' should be preserved per gender-accurate policy rather than generalized.
- source_word: שְׁמַעְיָה ... חֲנָנִי
  chosen: Shemaiah, Azarel, Milalai, Gilalai, Maai, Nethanel, Judah, and Hanani
  rationale: These are personal names and are transliterated rather than translated,
    following the stated philosophy for names.
- source_word: בִּכְלֵי שִׁיר
  chosen: with the musical instruments
  alternatives:
  - with instruments of song
  - with song-instruments
  lexicon: HALOT
  rationale: כְּלֵי are implements/instruments; שִׁיר is song/music. 'Musical instruments'
    is natural modern English and accurately conveys the phrase without archaic wording.
- source_word: דָּוִיד אִישׁ הָאֱלֹהִים
  chosen: of David the man of God
  alternatives:
  - of David, the man of God
  lexicon: HALOT
  rationale: The construct chain identifies the instruments as associated with David,
    who is further appositionally described as 'the man of God.' The phrase is retained
    because it is a meaningful honorific in biblical usage.
- source_word: וְעֶזְרָא הַסּוֹפֵר
  chosen: and Ezra the scribe
  alternatives:
  - with Ezra the scribe
  lexicon: HALOT
  rationale: A simple coordination best reflects the Hebrew waw. 'The scribe' is the
    standard rendering of הַסּוֹפֵר and fits Ezra's known role.
- source_word: לִפְנֵיהֶם
  chosen: before them
  alternatives:
  - in front of them
  - ahead of them
  lexicon: HALOT
  rationale: לִפְנֵי indicates position in front of the group. 'Before them' is concise
    and idiomatic in a procession context.
