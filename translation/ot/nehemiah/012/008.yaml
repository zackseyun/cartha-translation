theological_decisions:
- issue: Referent of the singular pronoun הוּא in a list of Levites
  chosen_reading: The singular refers specifically to Mattaniah, the last named Levite,
    who together with his brothers oversaw the thanksgiving songs.
  alternative_readings:
  - The singular could be taken more loosely after the list, referring collectively
    to the named Levites.
  rationale: The Hebrew shifts from a plural list to singular הוּא, which is best
    explained by singling out Mattaniah for a specific duty. This also aligns with
    the parallel listing of Levitical responsibilities in the surrounding context.
  doctrine_reference: Preserve theological tension rather than resolve it; ambiguity
    is limited here, so the main text adopts the most syntactically natural reading
    while preserving the alternative in a footnote.
