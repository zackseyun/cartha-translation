id: NEH.12.8
reference: Nehemiah 12:8
source:
  edition: WLC
  text: וְ/הַ/לְוִיִּ֗ם יֵשׁ֧וּעַ בִּנּ֛וּי קַדְמִיאֵ֥ל שֵׁרֵבְיָ֖ה יְהוּדָ֣ה מַתַּנְיָ֑ה
    עַֽל הֻיְּד֖וֹת ה֥וּא וְ/אֶחָֽי/ו־׃
translation:
  text: And the Levites were Jeshua, Binnui, Kadmiel, Sherebiah, Judah, and Mattaniah,
    who, with his brothers, was over the songs of thanksgiving.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he and his brothers were over the thanksgivings'; the Hebrew may be
      understood more collectively, though the singular pronoun most naturally points
      to Mattaniah.
    reason: alternative_reading
  - marker: b
    text: The Hebrew 'thanksgivings' likely refers to liturgical songs or expressions
      of praise offered in thanksgiving.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַלְוִיִּם
  chosen: And the Levites were
  alternatives:
  - 'And the Levites:'
  - Now the Levites were
  lexicon: HALOT
  rationale: The conjunction plus article+noun introduces the next group in the list.
    English idiom often supplies 'were' in such catalogues to make the verbless Hebrew
    clause natural.
- source_word: יֵשׁוּעַ בִּנּוּי קַדְמִיאֵל שֵׁרֵבְיָה יְהוּדָה מַתַּנְיָה
  chosen: Jeshua, Binnui, Kadmiel, Sherebiah, Judah, and Mattaniah
  rationale: These are personal names, so per translation philosophy they are transliterated
    rather than translated. 'And' is added before the final name for normal English
    list style.
- source_word: עַל
  chosen: over
  alternatives:
  - in charge of
  - responsible for
  lexicon: HALOT
  rationale: The preposition here marks supervisory responsibility. 'Over' is concise
    and preserves the formal sense, while still reading naturally in English.
- source_word: הֻיְּדוֹת
  chosen: the songs of thanksgiving
  alternatives:
  - the thanksgivings
  - the praises
  - the thanksgiving hymns
  lexicon: HALOT
  rationale: The noun refers to acts or expressions of thanksgiving/praise in liturgical
    context. Because the phrase is governed by 'over' and concerns Levitical duty,
    'songs of thanksgiving' makes the cultic-musical sense clear in readable English.
- source_word: הוּא
  chosen: who ... was
  alternatives:
  - he was
  lexicon: HALOT
  rationale: 'The pronoun is singular and most naturally refers to Mattaniah as the
    final named individual, introducing a relative-style clause in English: ''who
    ... was over...''.'
- source_word: וְאֶחָיו
  chosen: with his brothers
  alternatives:
  - and his brothers
  - along with his brothers
  lexicon: HALOT
  rationale: The phrase indicates Mattaniah's associated fellow Levites. 'With his
    brothers' reads smoothly with the singular pronoun and preserves the masculine
    familial term rather than flattening it to a gender-neutral expression.
