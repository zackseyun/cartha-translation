id: NEH.12.18
reference: Nehemiah 12:18
source:
  edition: WLC
  text: לְ/בִלְגָּ֣ה שַׁמּ֔וּעַ לִֽ/שְׁמַעְיָ֖ה יְהוֹנָתָֽן׃
translation:
  text: for Bilgah, Shammua; for Shemaiah, Jehonathan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of Bilgah ... of Shemaiah.' The Hebrew preposition can be rendered more
      formally this way in genealogical or representative lists.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Jehonathan'; some English versions shorten the name to 'Jonathan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/בִלְגָּה
  chosen: for Bilgah
  alternatives:
  - of Bilgah
  - for Bilga
  lexicon: HALOT
  rationale: The prefixed לְ in this priestly list marks association or assignment
    within the sequence of names, best rendered idiomatically as 'for.' 'Bilgah' is
    a personal/family name and is transliterated rather than translated, following
    the policy to transliterate names.
- source_word: שַׁמּוּעַ
  chosen: Shammua
  alternatives:
  - Shammuah
  lexicon: HALOT
  rationale: Proper name of the representative corresponding to the preceding house/clan
    name. Standard English transliteration is retained.
- source_word: לִֽ/שְׁמַעְיָה
  chosen: for Shemaiah
  alternatives:
  - of Shemaiah
  lexicon: HALOT
  rationale: As with the first לְ phrase, the preposition functions list-wise to indicate
    the person or house for whom the following named representative stands. 'For'
    gives natural English in this roster context. 'Shemaiah' is transliterated as
    a proper name.
- source_word: יְהוֹנָתָן
  chosen: Jehonathan
  alternatives:
  - Jonathan
  lexicon: HALOT
  rationale: The Hebrew form here is the fuller name יְהוֹנָתָן, so 'Jehonathan' more
    closely reflects the source than the shortened conventional English 'Jonathan.'
    This follows original-language primacy over translation tradition.
