id: NEH.12.14
reference: Nehemiah 12:14
source:
  edition: WLC
  text: ל/מלוכי יֽוֹנָתָ֔ן לִ/שְׁבַנְיָ֖ה יוֹסֵֽף׃
translation:
  text: for Malluchi, Jonathan; for Shebaniah, Joseph.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of Malluchi ... of Shebaniah,' if the ל-prefixed names are taken more
      genealogically than representationally.
    reason: lexical_alternative
lexical_decisions:
- source_word: ל/מלוכי
  chosen: for Malluchi
  alternatives:
  - of Malluchi
  - for Melicu
  lexicon: HALOT
  rationale: The prefixed ל in this priestly list marks correspondence within the
    formula 'for [clan/father's house], [head/representative].' 'For Malluchi' best
    reflects the list structure in natural English. The proper name is transliterated
    from the Hebrew consonantal form מלוכי as 'Malluchi'; alternate English spellings
    exist depending on vocalization and comparison with parallel lists.
- source_word: יונתן
  chosen: Jonathan
  alternatives:
  - Jehonathan
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name יוֹנָתָן. 'Jonathan'
    is the conventional and recognizable form.
- source_word: ל/שבניה
  chosen: for Shebaniah
  alternatives:
  - of Shebaniah
  - for Shebaniah
  lexicon: HALOT
  rationale: 'As with the first phrase, the prefixed ל indicates representation in
    the list: ''for Shebaniah.'' The name is transliterated in a standard English
    form as ''Shebaniah.'''
- source_word: יוסף
  chosen: Joseph
  alternatives:
  - Josef
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name יוֹסֵף.
