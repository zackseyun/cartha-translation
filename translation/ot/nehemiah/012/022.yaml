id: NEH.12.22
reference: Nehemiah 12:22
source:
  edition: WLC
  text: הַ/לְוִיִּם֩ בִּ/ימֵ֨י אֶלְיָשִׁ֜יב יוֹיָדָ֤ע וְ/יוֹחָנָן֙ וְ/יַדּ֔וּעַ כְּתוּבִ֖ים
    רָאשֵׁ֣י אָב֑וֹת וְ/הַ/כֹּ֣הֲנִ֔ים עַל מַלְכ֖וּת דָּרְיָ֥וֶשׁ הַ/פָּֽרְסִֽי־׃פ
translation:
  text: In the days of Eliashib, Joiada, Johanan, and Jaddua, the Levites were recorded
    as heads of fathers’ houses, and so were the priests, during the reign of Darius
    the Persian.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'heads of fathers’ houses,' a clan or ancestral-household designation.
    reason: cultural_note
  - marker: b
    text: Or 'were written down' / 'were registered.'
    reason: lexical_alternative
  - marker: c
    text: Some English traditions read 'Jonathan' here, but the Hebrew text has 'Johanan.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַלְוִיִּם
  chosen: the Levites
  alternatives:
  - the Levitical men
  lexicon: HALOT
  rationale: Standard designation for members of the tribe/clan serving Levitical
    functions; 'Levites' is the natural English equivalent.
- source_word: בִּימֵי
  chosen: In the days of
  alternatives:
  - During the time of
  lexicon: HALOT
  rationale: Common temporal idiom in Hebrew narrative; 'In the days of' preserves
    the formal flavor while remaining clear.
- source_word: אֶלְיָשִׁיב יוֹיָדָע וְיוֹחָנָן וְיַדּוּעַ
  chosen: Eliashib, Joiada, Johanan, and Jaddua
  alternatives:
  - Eliashib, Jehoiada, Jonathan, and Jaddua
  rationale: Personal names are transliterated per project philosophy. The Hebrew
    here supports Johanan rather than Jonathan. 'Joiada' reflects the shorter conventional
    transliteration of יוֹיָדָע.
- source_word: כְּתוּבִים
  chosen: were recorded
  alternatives:
  - were written down
  - were registered
  lexicon: HALOT
  rationale: Passive participle from כתב indicates written inscription/recording.
    'Were recorded' fits administrative/genealogical context naturally.
- source_word: רָאשֵׁי אָבוֹת
  chosen: heads of fathers’ houses
  alternatives:
  - heads of ancestral houses
  - family heads
  - chiefs of the fathers
  lexicon: HALOT
  rationale: This is a technical genealogical-administrative expression. 'Heads of
    fathers’ houses' preserves the source structure better than the smoother but less
    precise 'family heads.'
- source_word: וְהַכֹּהֲנִים
  chosen: and so were the priests
  alternatives:
  - and the priests
  - as were the priests
  lexicon: HALOT
  rationale: The Hebrew is elliptical after 'were recorded'; English supplies the
    sense. 'And so were the priests' makes explicit that the priests too were recorded,
    without over-paraphrasing.
- source_word: עַל מַלְכוּת
  chosen: during the reign of
  alternatives:
  - under the kingdom of
  - in the reign of
  lexicon: HALOT
  rationale: Idiomatic rendering of the preposition plus 'kingship/reign' in chronological
    notation.
- source_word: דָּרְיָוֶשׁ הַפָּרְסִי
  chosen: Darius the Persian
  alternatives:
  - Darius of Persia
  lexicon: HALOT
  rationale: Appositional ethnic designation is most naturally rendered 'the Persian.'
