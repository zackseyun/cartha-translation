id: NEH.12.38
reference: Nehemiah 12:38
source:
  edition: WLC
  text: וְ/הַ/תּוֹדָ֧ה הַ/שֵּׁנִ֛ית הַ/הוֹלֶ֥כֶת לְ/מ֖וֹאל וַ/אֲנִ֣י אַחֲרֶ֑י/הָ וַ/חֲצִ֨י
    הָ/עָ֜ם מֵ/עַ֣ל לְ/הַ/חוֹמָ֗ה מֵ/עַל֙ לְ/מִגְדַּ֣ל הַ/תַּנּוּרִ֔ים וְ/עַ֖ד הַ/חוֹמָ֥ה
    הָ/רְחָבָֽה׃
translation:
  text: And the second thanksgiving choir was going to the left, and I followed behind
    it, with half of the people on the wall, from above the Tower of the Ovens as
    far as the Broad Wall.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the second choir of thanksgiving' or 'the second thanksgiving procession.'
      The Hebrew term can denote a thanksgiving company in a ceremonial procession,
      not only singing considered in isolation.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַתּוֹדָה
  chosen: thanksgiving choir
  alternatives:
  - choir of thanksgiving
  - thanksgiving procession
  lexicon: HALOT
  rationale: In this context of two organized groups in a dedication procession on
    the wall, תּוֹדָה refers not merely to abstract thanksgiving but to a thanksgiving
    company/choir. 'Thanksgiving choir' is concise and fits the immediate ceremonial
    setting (cf. preceding verse).
- source_word: הַשֵּׁנִית
  chosen: second
  lexicon: HALOT
  rationale: Straightforward ordinal modifying the thanksgiving choir.
- source_word: הַהוֹלֶכֶת
  chosen: was going
  alternatives:
  - went
  - was proceeding
  lexicon: HALOT
  rationale: The participle marks ongoing movement in the narrative scene. 'Was going'
    preserves the descriptive force better than a simple preterite, while remaining
    natural English.
- source_word: לְמוֹאל
  chosen: to the left
  alternatives:
  - to the opposite side
  lexicon: HALOT
  rationale: מוֹאל denotes the left side/direction. Given the paired processions moving
    in opposite directions, 'to the left' is the plain directional sense.
- source_word: אַחֲרֶיהָ
  chosen: behind it
  alternatives:
  - after it
  lexicon: HALOT
  rationale: Spatial following is intended in the procession. 'Behind it' is clearer
    in modern English than the more literal 'after it.' The feminine suffix refers
    back to the thanksgiving choir/company.
- source_word: חֲצִי הָעָם
  chosen: half of the people
  alternatives:
  - half the people
  lexicon: HALOT
  rationale: A simple construct phrase indicating one half of the assembled people
    accompanying this procession.
- source_word: מֵעַל לְהַחוֹמָה
  chosen: on the wall
  alternatives:
  - upon the wall
  - above the wall
  lexicon: HALOT
  rationale: Although literally 'from/upon the wall,' the idiomatic sense in context
    is location along the top of the wall where the procession moved. 'On the wall'
    is natural and accurate.
- source_word: מִגְדַּל הַתַּנּוּרִים
  chosen: the Tower of the Ovens
  alternatives:
  - the Tower of Furnaces
  - the Tower of Baking Ovens
  lexicon: HALOT
  rationale: A place-name built from 'tower' plus 'ovens/furnaces.' 'Tower of the
    Ovens' is a transparent, fairly literal rendering that preserves the toponymic
    character.
- source_word: הַחוֹמָה הָרְחָבָה
  chosen: the Broad Wall
  alternatives:
  - the wide wall
  lexicon: HALOT
  rationale: Likely a known section of Jerusalem's wall; capitalizing as a place designation
    is appropriate. 'Broad Wall' is the conventional and semantically precise rendering.
