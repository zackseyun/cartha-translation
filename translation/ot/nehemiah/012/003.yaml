id: NEH.12.3
reference: Nehemiah 12:3
source:
  edition: WLC
  text: שְׁכַנְיָ֥ה רְחֻ֖ם מְרֵמֹֽת׃
translation:
  text: Shecaniah, Rehum, Meremoth.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: שְׁכַנְיָה
  chosen: Shecaniah
  alternatives:
  - Shekaniah
  - Shechaniah
  lexicon: HALOT
  rationale: Proper noun in a priestly list; transliterated rather than translated
    in keeping with the philosophy to transliterate personal names. English form 'Shecaniah'
    follows a standard convention for שְׁכַנְיָה.
- source_word: רְחֻם
  chosen: Rehum
  alternatives:
  - Rechum
  lexicon: HALOT
  rationale: Proper noun; transliterated as a personal name. 'Rehum' is the conventional
    English representation of the Hebrew name in this context.
- source_word: מְרֵמֹת
  chosen: Meremoth
  alternatives:
  - Meremot
  lexicon: HALOT
  rationale: Proper noun; transliterated rather than translated. 'Meremoth' is the
    established and phonetically suitable English form for this Hebrew name.
