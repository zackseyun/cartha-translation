id: NEH.12.10
reference: Nehemiah 12:10
source:
  edition: WLC
  text: וְ/יֵשׁ֖וּעַ הוֹלִ֣יד אֶת יֽוֹיָקִ֑ים וְ/יֽוֹיָקִים֙ הוֹלִ֣יד אֶת אֶלְיָשִׁ֔יב
    וְ/אֶלְיָשִׁ֖יב אֶת יוֹיָדָֽע־־־׃
translation:
  text: Jeshua fathered Joiakim, and Joiakim fathered Eliashib, and Eliashib fathered
    Joiada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew genealogical formula: literally ''Jeshua caused Joiakim to be born
      ...'' The English ''fathered'' conveys the idiomatic sense.'
    reason: lexical_alternative
  - marker: b
    text: Joiakim may also be rendered 'Jehoiakim,' and Joiada may also be rendered
      'Jehoiada' in English tradition.
    reason: alternative_reading
lexical_decisions:
- source_word: יֵשׁוּעַ
  chosen: Jeshua
  alternatives:
  - Jeshuaʿ
  - Joshua
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated per project
    philosophy. 'Joshua' is a possible anglicized equivalent of the same Hebrew name,
    but in postexilic genealogical contexts 'Jeshua' is the standard English form
    and better distinguishes this figure from earlier Joshua son of Nun.
- source_word: הוֹלִיד
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: HALOT
  rationale: The Hiphil of ילד in genealogical formula denotes causing to be born,
    idiomatically 'fathered' in English. 'Begot' is traditional but archaic; 'became
    the father of' is accurate but less concise. 'Fathered' preserves the male genealogical
    sense in readable modern English.
- source_word: אֶת
  chosen: '[not translated]'
  lexicon: HALOT
  rationale: Direct-object marker with no independent lexical meaning in English;
    represented implicitly by English word order.
- source_word: יוֹיָקִים
  chosen: Joiakim
  alternatives:
  - Jehoiakim
  lexicon: HALOT
  rationale: Proper name transliterated from the form present in the Hebrew text.
    'Jehoiakim' reflects a fuller English conventional form associated with other
    biblical figures, but 'Joiakim' more directly matches this spelling and avoids
    conflation.
- source_word: אֶלְיָשִׁיב
  chosen: Eliashib
  lexicon: HALOT
  rationale: Proper name transliterated by standard convention.
- source_word: יוֹיָדָע
  chosen: Joiada
  alternatives:
  - Jehoiada
  lexicon: HALOT
  rationale: Proper name transliterated from the Hebrew form as given. 'Jehoiada'
    is a familiar alternative English form, but 'Joiada' more closely reflects the
    spelling in this context and maintains consistency with adjacent names rendered
    with 'Joi-'.
