id: NEH.12.46
reference: Nehemiah 12:46
source:
  edition: WLC
  text: כִּֽי בִ/ימֵ֥י דָוִ֛יד וְ/אָסָ֖ף מִ/קֶּ֑דֶם ראש הַ/מְשֹׁ֣רְרִ֔ים וְ/שִׁיר
    תְּהִלָּ֥ה וְ/הֹד֖וֹת לֵֽ/אלֹהִֽים־־׃
translation:
  text: For in the days of David and Asaph, from ancient times, there were heads of
    the singers, and songs of praise and thanksgiving to God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of old' or 'formerly' for 'from ancient times.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'head of the singers' may also be rendered 'leaders of the singers'
      or 'chiefs of the singers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the explanatory ground for the preceding statement; 'For'
    fits the discourse function in English better than the more causal 'because' here.
- source_word: בִּימֵי
  chosen: in the days of
  alternatives:
  - during the time of
  lexicon: HALOT
  rationale: A standard temporal idiom; 'in the days of' preserves the Hebrew form
    naturally in English.
- source_word: דָוִיד וְאָסָף
  chosen: David and Asaph
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy. The conjunction
    joins the two figures as temporal reference points.
- source_word: מִקֶּדֶם
  chosen: from ancient times
  alternatives:
  - formerly
  - of old
  - from of old
  lexicon: HALOT
  rationale: The term marks antiquity or former times. 'From ancient times' communicates
    the sense clearly in modern English while preserving the temporal emphasis. It
    likely apposes or reinforces 'in the days of David and Asaph' rather than introducing
    a separate clause.
- source_word: רֹאשׁ
  chosen: heads
  alternatives:
  - chiefs
  - leaders
  lexicon: HALOT
  rationale: The singular noun functions collectively here. 'Heads' is somewhat formal
    but reflects the Hebrew closely; in context it denotes leading figures over the
    singers.
- source_word: הַמְשֹׁרְרִים
  chosen: the singers
  alternatives:
  - the musicians
  lexicon: HALOT
  rationale: From the root 'to sing'; 'singers' is more precise than the broader 'musicians'.
- source_word: וְשִׁיר
  chosen: and songs
  alternatives:
  - and song
  lexicon: HALOT
  rationale: Although singular in form, it is naturally rendered as a collective plural
    in English in coordination with the following worship expressions.
- source_word: תְּהִלָּה
  chosen: of praise
  alternatives:
  - praise
  lexicon: HALOT
  rationale: 'Construct-like sense with ''song(s)'': ''songs of praise'' is idiomatic
    and reflects the relationship between the nouns.'
- source_word: וְהֹדוֹת
  chosen: and thanksgiving
  alternatives:
  - and thanksgivings
  - and praises
  lexicon: HALOT
  rationale: The form denotes acts or expressions of thanks/confession. 'Thanksgiving'
    is the most natural English rendering in this worship context.
- source_word: לֵאלֹהִים
  chosen: to God
  alternatives:
  - for God
  lexicon: HALOT
  rationale: The preposition marks direction or object of praise and thanksgiving;
    'to God' is the clearest idiomatic rendering.
