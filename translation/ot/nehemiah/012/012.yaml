id: NEH.12.12
reference: Nehemiah 12:12
source:
  edition: WLC
  text: וּ/בִ/ימֵי֙ יֽוֹיָקִ֔ים הָי֥וּ כֹהֲנִ֖ים רָאשֵׁ֣י הָ/אָב֑וֹת לִ/שְׂרָיָ֣ה
    מְרָיָ֔ה לְ/יִרְמְיָ֖ה חֲנַנְיָֽה׃
translation:
  text: 'And in the days of Joiakim, there were priests, heads of the fathers’ houses:
    for Seraiah, Meraiah; for Jeremiah, Hananiah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'heads of the ancestral houses' or 'family heads.' The Hebrew idiom refers
      to leaders of extended family clans.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בִ/ימֵי
  chosen: And in the days of
  alternatives:
  - Now in the days of
  - During the days of
  lexicon: HALOT
  rationale: The compound conjunction and preposition with 'days' introduces a temporal
    setting. 'And in the days of' preserves the narrative linkage and the Hebrew idiom
    naturally in English.
- source_word: יֽוֹיָקִים
  chosen: Joiakim
  alternatives:
  - Jehoiakim
  lexicon: HALOT
  rationale: Personal names are transliterated. 'Joiakim' reflects the form used for
    this postexilic priestly figure in English Bible tradition and distinguishes him
    from the king Jehoiakim.
- source_word: הָיוּ
  chosen: there were
  alternatives:
  - were
  lexicon: HALOT
  rationale: Existential 'there were' reads naturally in English and fits the list-introducing
    function of the clause.
- source_word: כֹהֲנִים
  chosen: priests
  lexicon: HALOT
  rationale: Straightforward rendering of the common noun for priests.
- source_word: רָאשֵׁי הָאָבוֹת
  chosen: heads of the fathers’ houses
  alternatives:
  - heads of the ancestral houses
  - family heads
  - chiefs of the fathers’ houses
  lexicon: HALOT
  rationale: This construct phrase refers to clan or family-house leaders. 'Heads
    of the fathers’ houses' stays close to the Hebrew while remaining intelligible;
    'ancestral houses' is possible but slightly more interpretive.
- source_word: לִ/שְׂרָיָה
  chosen: for Seraiah
  alternatives:
  - of Seraiah
  - belonging to Seraiah
  lexicon: HALOT
  rationale: The prefixed ל introduces the family or priestly division to which the
    following named head belongs. 'For Seraiah' is concise and idiomatic in this list
    structure.
- source_word: מְרָיָה
  chosen: Meraiah
  lexicon: HALOT
  rationale: Personal name transliterated directly.
- source_word: לְ/יִרְמְיָה
  chosen: for Jeremiah
  alternatives:
  - of Jeremiah
  - belonging to Jeremiah
  lexicon: HALOT
  rationale: As with the previous ל phrase, this marks the priestly house or division
    represented by the following individual.
- source_word: חֲנַנְיָה
  chosen: Hananiah
  lexicon: HALOT
  rationale: Personal name transliterated directly.
