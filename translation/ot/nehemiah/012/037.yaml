id: NEH.12.37
reference: Nehemiah 12:37
source:
  edition: WLC
  text: וְ/עַל֩ שַׁ֨עַר הָ/עַ֜יִן וְ/נֶגְדָּ֗/ם עָלוּ֙ עַֽל מַעֲלוֹת֙ עִ֣יר דָּוִ֔יד
    בַּֽ/מַּעֲלֶ֖ה לַ/חוֹמָ֑ה מֵ/עַל֙ לְ/בֵ֣ית דָּוִ֔יד וְ/עַ֛ד שַׁ֥עַר הַ/מַּ֖יִם
    מִזְרָֽח־׃
translation:
  text: And by the Fountain Gate, in front of them, they went up by the stairs of
    the city of David, at the ascent to the wall, above the house of David, and as
    far as the Water Gate on the east.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Spring Gate.' The Hebrew term for 'fountain' can also denote a spring
      or source of water.
    reason: lexical_alternative
  - marker: b
    text: Or 'the steps of the city of David.' The Hebrew may refer either to stairs
      as a built structure or, more broadly, to ascents.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁעַר הָעַיִן
  chosen: the Fountain Gate
  alternatives:
  - the Spring Gate
  - the Gate of the Spring
  lexicon: HALOT
  rationale: שַׁעַר is 'gate' and עַיִן can denote a spring/fountain. 'Fountain Gate'
    is a natural English place-name and fits the likely topographical sense in Jerusalem.
- source_word: וְנֶגְדָּם
  chosen: in front of them
  alternatives:
  - opposite them
  - before them
  lexicon: HALOT
  rationale: נֶגֶד commonly means 'in front of, opposite, before.' With the 3mp suffix
    it refers to the procession's relative position. 'In front of them' is the clearest
    idiomatic rendering in context.
- source_word: עָלוּ
  chosen: they went up
  alternatives:
  - they ascended
  - they climbed
  lexicon: HALOT
  rationale: עלה in the qal commonly means 'go up/ascend.' 'Went up' is straightforward
    and preserves the movement imagery without sounding overly formal.
- source_word: מַעֲלוֹת עִיר דָּוִיד
  chosen: the stairs of the city of David
  alternatives:
  - the steps of the city of David
  - the ascent of the city of David
  lexicon: HALOT
  rationale: מַעֲלוֹת is the plural form meaning 'steps/stairs, ascents.' Given the
    urban topography, 'stairs' best conveys a built feature rather than an abstract
    ascent.
- source_word: בַּמַּעֲלֶה לַחוֹמָה
  chosen: at the ascent to the wall
  alternatives:
  - by the ascent of the wall
  - on the ascent to the wall
  lexicon: HALOT
  rationale: מַעֲלֶה is singular 'ascent.' The phrase likely specifies the route taken.
    'At the ascent to the wall' preserves the local/topographical sense while remaining
    readable.
- source_word: מֵעַל לְבֵית דָּוִיד
  chosen: above the house of David
  alternatives:
  - past the house of David on the upper side
  - over the house of David
  lexicon: HALOT
  rationale: מֵעַל means 'from above/above/over.' In a route description, 'above the
    house of David' most naturally indicates passing at a higher elevation relative
    to that landmark.
- source_word: שַׁעַר הַמַּיִם מִזְרָח
  chosen: the Water Gate on the east
  alternatives:
  - the eastward Water Gate
  - the Water Gate eastward
  lexicon: HALOT
  rationale: מִזְרָח denotes east/eastward. English idiom favors attaching it adverbially
    or adjectivally to the gate location; 'on the east' is clear and natural.
- source_word: וְעַל
  chosen: And by
  alternatives:
  - And at
  - And upon
  lexicon: HALOT
  rationale: The preposition עַל in topographical narrative can mark location near
    or at a point. 'By' reads naturally with a gate in English while preserving the
    locative force.
