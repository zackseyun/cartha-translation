id: NEH.12.16
reference: Nehemiah 12:16
source:
  edition: WLC
  text: ל/עדיא זְכַרְיָ֖ה לְ/גִנְּת֥וֹן מְשֻׁלָּֽם׃
translation:
  text: for Adaiah, Zechariah; for Ginnethon, Meshullam.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Hebrew uses the preposition ל (''to/for/of'') before the clan names
      in this list. Here it is rendered ''for'' to convey representation: Zechariah
      was the representative for Adaiah, and Meshullam for Ginnethon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ל/עדיא
  chosen: for Adaiah
  alternatives:
  - of Adaiah
  - to Adaiah
  lexicon: HALOT
  rationale: 'The prefixed ל in this priestly list marks association or representation
    within the sequence of names, best rendered idiomatically as ''for'' in English:
    ''for Adaiah, Zechariah.'' ''Adaiah'' is a personal name and is therefore transliterated
    rather than translated.'
- source_word: זְכַרְיָה
  chosen: Zechariah
  alternatives:
  - Zekariah
  lexicon: HALOT
  rationale: Personal name; standard English transliteration is preferred. In context
    this is the name corresponding to the family/clan named first in the pair.
- source_word: לְ/גִנְּתוֹן
  chosen: for Ginnethon
  alternatives:
  - of Ginnethon
  - to Ginnethon
  lexicon: HALOT
  rationale: As with the first ל-prefixed name, the preposition functions list-wise
    to indicate the house or clan represented by the following individual. 'Ginnethon'
    is transliterated as a proper name.
- source_word: מְשֻׁלָּם
  chosen: Meshullam
  alternatives:
  - Mesullam
  lexicon: HALOT
  rationale: Personal name; standard English biblical transliteration is used. The
    verse is a compact list entry naming the representative for Ginnethon.
