id: NEH.12.19
reference: Nehemiah 12:19
source:
  edition: WLC
  text: וּ/לְ/יוֹיָרִ֣יב מַתְּנַ֔י לִֽ/ידַֽעְיָ֖ה עֻזִּֽי׃
translation:
  text: for Joiarib, Mattenai; for Jedaiah, Uzzi.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and for Joiarib, Mattenai; for Jedaiah, Uzzi.' The Hebrew begins with
      a conjunction attached to 'for Joiarib,' but English may leave the conjunction
      implicit in a list.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/יוֹיָרִיב
  chosen: for Joiarib
  alternatives:
  - and for Joiarib
  - belonging to Joiarib
  lexicon: HALOT
  rationale: 'The prefixed conjunction plus preposition (וּ + לְ) introduces another
    item in the list: ''and/for Joiarib.'' In English list style, the conjunction
    can be left implicit while preserving the sense with ''for Joiarib.'' The proper
    name is transliterated rather than translated, per translation philosophy.'
- source_word: מַתְּנַי
  chosen: Mattenai
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard English convention.
- source_word: לִֽ/ידַֽעְיָה
  chosen: for Jedaiah
  alternatives:
  - belonging to Jedaiah
  lexicon: HALOT
  rationale: The preposition לְ marks association within this priestly list, indicating
    the representative or head for the house of Jedaiah. 'For Jedaiah' is concise
    and matches the list structure in context.
- source_word: עֻזִּי
  chosen: Uzzi
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated.
