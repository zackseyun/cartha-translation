id: NEH.12.40
reference: Nehemiah 12:40
source:
  edition: WLC
  text: וַֽ/תַּעֲמֹ֛דְנָה שְׁתֵּ֥י הַ/תּוֹדֹ֖ת בְּ/בֵ֣ית הָ/אֱלֹהִ֑ים וַ/אֲנִ֕י וַ/חֲצִ֥י
    הַ/סְּגָנִ֖ים עִמִּֽ/י׃
translation:
  text: So the two thanksgiving choirs took their stand in the house of God, and I,
    and half of the officials with me,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the two thanksgivings.' In context this refers to the
      two thanksgiving groups or choirs.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעֲמֹדְנָה
  chosen: took their stand
  alternatives:
  - stood
  - came to a stop
  lexicon: HALOT
  rationale: From עמד in the wayyiqtol 3fp, referring to the two feminine groups.
    'Took their stand' captures both the physical standing and the sense of assuming
    a position in the ceremony, more naturally than a bare 'stood' while remaining
    close to the Hebrew.
- source_word: שְׁתֵּי הַתּוֹדוֹת
  chosen: the two thanksgiving choirs
  alternatives:
  - the two thanksgivings
  - the two thanksgiving processions
  lexicon: HALOT
  rationale: Literally 'the two thanksgivings.' In this context of Nehemiah 12, the
    term refers metonymically to the two organized groups formed for thanksgiving
    on the wall procession. 'Thanksgiving choirs' makes the referent clear in English
    and fits the immediate context of singers, while preserving the thanksgiving function.
- source_word: בְּבֵית הָאֱלֹהִים
  chosen: in the house of God
  alternatives:
  - at the house of God
  - in the temple of God
  lexicon: HALOT
  rationale: בית האלהים is a standard expression for the temple, but 'house of God'
    is the more direct rendering and preserves the Hebrew idiom. 'In' fits the locative
    preposition בְּ naturally.
- source_word: וַאֲנִי
  chosen: and I
  alternatives:
  - I also
  lexicon: HALOT
  rationale: The conjunction plus pronoun is retained straightforwardly. The Hebrew
    coordinates Nehemiah himself with the preceding clause and the following officials.
- source_word: וַחֲצִי הַסְּגָנִים
  chosen: and half of the officials
  alternatives:
  - and half of the deputies
  - and half of the prefects
  lexicon: HALOT
  rationale: סגנים denotes officials/rulers/administrators. 'Officials' is clear modern
    English and suitably broad. 'Half of the officials' follows the construct phrase
    directly.
- source_word: עִמִּי
  chosen: with me
  alternatives:
  - beside me
  lexicon: HALOT
  rationale: Simple accompaniment preposition with first person singular suffix; 'with
    me' is the natural equivalent.
