id: NEH.12.25
reference: Nehemiah 12:25
source:
  edition: WLC
  text: מַתַּנְיָ֧ה וּ/בַקְבֻּֽקְיָ֛ה עֹבַדְיָ֥ה מְשֻׁלָּ֖ם טַלְמ֣וֹן עַקּ֑וּב שֹׁמְרִ֤ים
    שֽׁוֹעֲרִים֙ מִשְׁמָ֔ר בַּ/אֲסֻפֵּ֖י הַ/שְּׁעָרִֽים׃
translation:
  text: Mattaniah, Bakbukiah, Obadiah, Meshullam, Talmon, and Akkub were guards, gatekeepers,
    keeping watch at the storehouses of the gates.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'keeping watch at the gathering places by the gates.' The Hebrew term
      behind 'storehouses' can more broadly denote places of gathering or collection.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַתַּנְיָה
  chosen: Mattaniah
  rationale: Proper personal name; transliterated by standard English convention per
    translation philosophy.
- source_word: וּבַקְבֻּקְיָה
  chosen: Bakbukiah
  rationale: Proper personal name with conjunction; rendered as the next item in the
    list and transliterated rather than translated.
- source_word: עֹבַדְיָה
  chosen: Obadiah
  rationale: Proper personal name; standard transliteration.
- source_word: מְשֻׁלָּם
  chosen: Meshullam
  rationale: Proper personal name; standard transliteration.
- source_word: טַלְמוֹן
  chosen: Talmon
  rationale: Proper personal name; standard transliteration.
- source_word: עַקּוּב
  chosen: Akkub
  alternatives:
  - Akub
  rationale: Proper personal name; 'Akkub' reflects common English transliteration
    of the doubled consonant.
- source_word: שֹׁמְרִים
  chosen: were guards
  alternatives:
  - were keeping watch
  - were watchmen
  lexicon: HALOT
  rationale: Participle from שמר denotes guarding/keeping watch. Because it follows
    a list of names and is paired with שוערים, an English predicate expression is
    needed. 'Were guards' gives the role succinctly while allowing the following participial
    nuance to be expressed with 'keeping watch.'
- source_word: שׁוֹעֲרִים
  chosen: gatekeepers
  alternatives:
  - doorkeepers
  - porters
  lexicon: HALOT
  rationale: Standard term for those stationed at gates. 'Gatekeepers' is clear modern
    English and fits the temple/city context better than archaic 'porters.'
- source_word: מִשְׁמָר
  chosen: keeping watch
  alternatives:
  - on guard duty
  - a watch
  lexicon: HALOT
  rationale: The noun denotes a watch, guard, or duty. Rendered verbally in English
    to avoid stiffness and to reflect the functional sense in context.
- source_word: בַּאֲסֻפֵּי
  chosen: at the storehouses of
  alternatives:
  - at the collections of
  - at the gathering places of
  lexicon: HALOT
  rationale: The plural construct of אסף here likely refers to places where items
    were gathered or stored. In this temple-administrative context, 'storehouses'
    is the most natural and contextually plausible rendering, though the underlying
    sense is 'places of gathering.'
- source_word: הַשְּׁעָרִים
  chosen: the gates
  lexicon: HALOT
  rationale: Straightforward plural noun; rendered literally.
