id: NEH.12.15
reference: Nehemiah 12:15
source:
  edition: WLC
  text: לְ/חָרִ֣ם עַדְנָ֔א לִ/מְרָי֖וֹת חֶלְקָֽי׃
translation:
  text: for Harim, Adna; for Meraioth, Helkai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literally, the repeated preposition is ''to/for'': ''to Harim, Adna; to
      Meraioth, Helkai.'' In this list it functions idiomatically to identify the
      representative for each priestly house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/חָרִם
  chosen: for Harim
  alternatives:
  - of Harim
  - as for Harim
  lexicon: HALOT
  rationale: The prefixed ל in this priestly list marks association/reference within
    the succession formula ('for X, Y' = for the house/clan of X, the representative
    was Y). 'Harim' is a proper name and is transliterated per project policy.
- source_word: עַדְנָא
  chosen: Adna
  alternatives:
  - Adnah
  lexicon: HALOT
  rationale: Proper personal name; transliterated in a standard English form. 'Adna'
    is the common rendering in this context.
- source_word: לִ/מְרָיוֹת
  chosen: for Meraioth
  alternatives:
  - of Meraioth
  - as for Meraioth
  lexicon: HALOT
  rationale: Again, prefixed ל introduces the priestly family or division to which
    the following name corresponds in this roster. 'Meraioth' is a proper name and
    is transliterated.
- source_word: חֶלְקָי
  chosen: Helkai
  alternatives:
  - Helkiai
  lexicon: HALOT
  rationale: Proper personal name; transliterated. 'Helkai' is the conventional English
    form for this name in Nehemiah 12:15.
