id: NEH.12.17
reference: Nehemiah 12:17
source:
  edition: WLC
  text: לַ/אֲבִיָּ֖ה זִכְרִ֑י לְ/מִ֨נְיָמִ֔ין לְ/מוֹעַדְיָ֖ה פִּלְטָֽי׃
translation:
  text: for Abijah, Zichri; for Miniamin, for Moadiah, Piltai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Moadiah is rendered by some as Maadiah, reflecting a variant spelling of
      the same name in related textual traditions.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַ/אֲבִיָּה
  chosen: for Abijah
  alternatives:
  - of Abijah
  - belonging to Abijah
  lexicon: HALOT
  rationale: 'The prefixed ל marks association in this list of priestly heads and
    their representatives. In this context, English ''for Abijah'' best conveys the
    elliptical list structure: a named representative corresponding to the house or
    division of Abijah.'
- source_word: זִכְרִי
  chosen: Zichri
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to the translation philosophy
    rather than translated.
- source_word: לְ/מִנְיָמִין
  chosen: for Miniamin
  alternatives:
  - of Miniamin
  - belonging to Miniamin
  lexicon: HALOT
  rationale: Again the prefixed ל indicates association within the list. 'For Miniamin'
    preserves the terse register style of the Hebrew genealogy/list.
- source_word: לְ/מוֹעַדְיָה
  chosen: for Moadiah
  alternatives:
  - for Maadiah
  lexicon: HALOT
  rationale: The consonantal form here points to Moadiah. Since this is a proper name,
    it is transliterated. An alternative English form 'Maadiah' reflects a related
    spelling tradition and is worth preserving in a footnote.
- source_word: פִּלְטָי
  chosen: Piltai
  lexicon: HALOT
  rationale: Proper personal name; transliterated. In the list structure, Piltai is
    the representative corresponding to Moadiah.
