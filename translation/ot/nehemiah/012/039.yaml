id: NEH.12.39
reference: Nehemiah 12:39
source:
  edition: WLC
  text: וּ/מֵ/עַ֣ל לְ/שַֽׁעַר אֶ֠פְרַיִם וְ/עַל שַׁ֨עַר הַיְשָׁנָ֜ה וְ/עַל שַׁ֣עַר
    הַ/דָּגִ֗ים וּ/מִגְדַּ֤ל חֲנַנְאֵל֙ וּ/מִגְדַּ֣ל הַ/מֵּאָ֔ה וְ/עַ֖ד שַׁ֣עַר הַ/צֹּ֑אן
    וְ/עָ֣מְד֔וּ בְּ/שַׁ֖עַר הַ/מַּטָּרָֽה־־־׃
translation:
  text: and above the Gate of Ephraim, and by the Old Gate, and by the Fish Gate,
    and the Tower of Hananel, and the Tower of the Hundred, and as far as the Sheep
    Gate; and they stopped at the Gate of the Guard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they stood at the Gate of the Guard.' The Hebrew verb can mean either
      'stood' or, in context, 'stopped.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the Prison Gate' or 'the Gate of the Watch' for 'the Gate of the Guard.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֵעַל
  chosen: and above
  alternatives:
  - and from above
  - and over
  lexicon: HALOT
  rationale: The compound conjunction and preposition literally means 'and from above/upon.'
    In this procession/topographical context, 'and above' best preserves the spatial
    sense without overcomplicating the English. It likely continues the route description
    from the previous verse.
- source_word: לשׁער אפרים
  chosen: the Gate of Ephraim
  alternatives:
  - the Ephraim Gate
  lexicon: HALOT
  rationale: שׁער is 'gate,' and אפרים is the proper name Ephraim. 'Gate of Ephraim'
    is a transparent rendering of the construct relationship and preserves the place-name.
- source_word: ועל
  chosen: and by
  alternatives:
  - and on
  - and over
  - and past
  lexicon: HALOT
  rationale: Although עַל often means 'on/upon,' in a route listing of landmarks it
    can naturally be rendered 'by' in English to indicate passing along or at these
    points. This avoids awkward repetition of 'upon' with gates and towers.
- source_word: שׁער הישׁנה
  chosen: the Old Gate
  alternatives:
  - the Gate of the Old City
  - the Jeshanah Gate
  lexicon: HALOT
  rationale: The traditional and most straightforward sense is 'Old Gate.' Since הישׁנה
    is likely adjectival/substantival from 'old,' this rendering is preferable to
    transliterating or expanding beyond the text.
- source_word: שׁער הדגים
  chosen: the Fish Gate
  lexicon: HALOT
  rationale: 'A simple construct phrase: ''gate of the fish.'' ''Fish Gate'' is idiomatic
    English and standard for this Jerusalem landmark.'
- source_word: ומגדל חננאל
  chosen: the Tower of Hananel
  alternatives:
  - the Hananel Tower
  lexicon: HALOT
  rationale: מגדל means 'tower'; חננאל is a proper name. 'Tower of Hananel' preserves
    the Hebrew structure and the proper name.
- source_word: ומגדל המאה
  chosen: the Tower of the Hundred
  alternatives:
  - the Hundred Tower
  lexicon: HALOT
  rationale: The phrase is formally 'tower of the hundred.' Retaining the literal
    expression is preferable because the exact referent of 'hundred' is uncertain,
    and paraphrase would import interpretation.
- source_word: ועד שׁער הצאן
  chosen: and as far as the Sheep Gate
  alternatives:
  - and to the Sheep Gate
  lexicon: HALOT
  rationale: עַד marks extent or limit. 'As far as' clearly conveys the endpoint of
    the route.
- source_word: ועמדו
  chosen: they stopped
  alternatives:
  - they stood
  - they took their stand
  lexicon: HALOT
  rationale: The verb עמד literally means 'stood,' but in narrative movement it often
    indicates coming to a stop or stationing oneself. 'They stopped' fits the procession
    context in natural English while preserving the sense of halting at a location.
- source_word: בשׁער המטרה
  chosen: at the Gate of the Guard
  alternatives:
  - at the Prison Gate
  - at the Gate of the Watch
  lexicon: HALOT
  rationale: מטרה can denote guard duty, watch, or a guardhouse/prison context. 'Gate
    of the Guard' is a cautious rendering that preserves the security-related sense
    without overcommitting to 'prison' if the exact nuance here is debated.
