id: NEH.12.6
reference: Nehemiah 12:6
source:
  edition: WLC
  text: שְׁמַֽעְיָ֥ה וְ/יוֹיָרִ֖יב יְדַֽעְיָֽה׃
translation:
  text: Shemayah, and Joiarib, Jedaiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew personal names are transliterated here: Shemayah may also be rendered
      ''Shemaiah,'' and Joiarib may also be rendered ''Jehoiarib'' in some English
      traditions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמַעְיָה
  chosen: Shemayah
  alternatives:
  - Shemaiah
  rationale: Proper personal name; transliterated rather than translated per translation
    philosophy. 'Shemayah' more directly reflects the Hebrew form, while 'Shemaiah'
    is a common anglicized alternative.
- source_word: וְ
  chosen: and
  rationale: Standard rendering of the conjunction linking the names in the list.
- source_word: יוֹיָרִיב
  chosen: Joiarib
  alternatives:
  - Jehoiarib
  rationale: Proper personal name; transliterated by standard English convention.
    'Joiarib' reflects the shorter form present here; 'Jehoiarib' is a related fuller
    anglicized form but is not the exact form in this verse.
- source_word: יְדַעְיָה
  chosen: Jedaiah
  rationale: Proper personal name; transliterated according to standard English biblical
    convention.
