id: NEH.12.20
reference: Nehemiah 12:20
source:
  edition: WLC
  text: לְ/סַלַּ֥י קַלָּ֖י לְ/עָמ֥וֹק עֵֽבֶר׃
translation:
  text: for Sallai, Kallai; for Amok, Eber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of Sallai, Kallai; of Amok, Eber.' The Hebrew preposition ל may be rendered
      in this list as 'for,' 'of,' or 'belonging to,' marking association with the
      named priestly house.
    reason: lexical_alternative
  - marker: b
    text: Eber is traditionally rendered 'Heber' in some English versions.
    reason: alternative_reading
lexical_decisions:
- source_word: לְ/סַלַּי
  chosen: for Sallai
  alternatives:
  - of Sallai
  - belonging to Sallai
  lexicon: HALOT
  rationale: The prefixed ל in this priestly list marks association or heading, naturally
    rendered 'for' in English list style ('for Sallai...'). The proper name is transliterated
    as 'Sallai' per the policy to transliterate names.
- source_word: קַלָּי
  chosen: Kallai
  alternatives:
  - Kallay
  lexicon: HALOT
  rationale: Proper name rendered by transliteration. 'Kallai' is a standard English
    form that reflects the doubled consonant and final -ai sound.
- source_word: לְ/עָמ֥וֹק
  chosen: for Amok
  alternatives:
  - of Amok
  - belonging to Amok
  lexicon: HALOT
  rationale: As with the first phrase, prefixed ל introduces the family or priestly
    house in this roster and is best represented as 'for' in concise English. The
    name is transliterated 'Amok'.
- source_word: עֵבֶר
  chosen: Eber
  alternatives:
  - Heber
  lexicon: HALOT
  rationale: Proper name transliterated. 'Eber' closely reflects the Hebrew consonants
    ע־ב־ר; 'Heber' is a traditional alternative but less directly tied to this spelling
    in English transliteration.
