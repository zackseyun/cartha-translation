id: NEH.12.5
reference: Nehemiah 12:5
source:
  edition: WLC
  text: מִיָּמִ֥ין מַֽעַדְיָ֖ה בִּלְגָּֽה׃
translation:
  text: Mijamin, Maadiah, Bilgah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Miamin.' English transliterations of this name vary slightly.
    reason: lexical_alternative
  - marker: b
    text: Or 'Maadya.' The Hebrew name is transliterated here by standard English
      convention as 'Maadiah.'
    reason: lexical_alternative
  - marker: c
    text: Or 'Bilga.' The final 'h' reflects a common English transliteration of the
      Hebrew ending.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִיָּמִין
  chosen: Mijamin
  alternatives:
  - Miamin
  rationale: Proper name in a list of priestly names; per translation philosophy,
    personal names are transliterated rather than translated. The consonantal form
    supports the standard English transliteration 'Mijamin.'
- source_word: מַעַדְיָה
  chosen: Maadiah
  alternatives:
  - Maadya
  rationale: Proper name; transliterated directly from Hebrew. Retaining the familiar
    ending '-iah' reflects standard English convention for names containing the divine
    element.
- source_word: בִּלְגָּה
  chosen: Bilgah
  alternatives:
  - Bilga
  rationale: Proper name; transliterated from Hebrew. 'Bilgah' is the conventional
    English form for this priestly family name.
