id: NEH.12.29
reference: Nehemiah 12:29
source:
  edition: WLC
  text: וּ/מִ/בֵּית֙ הַגִּלְגָּ֔ל וּ/מִ/שְּׂד֥וֹת גֶּ֖בַע וְ/עַזְמָ֑וֶת כִּ֣י חֲצֵרִ֗ים
    בָּנ֤וּ לָ/הֶם֙ הַ/מְשֹׁ֣רֲרִ֔ים סְבִיב֖וֹת יְרוּשָׁלִָֽם׃
translation:
  text: and from Beth-gilgal, and from the fields of Geba and Azmaveth, for the singers
    had built villages for themselves around Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'settlements' for 'villages'; the Hebrew term can denote enclosed habitation
      areas and in context refers to places where the singers lived around Jerusalem.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִבֵּית הַגִּלְגָּל
  chosen: and from Beth-gilgal
  alternatives:
  - and from the house of Gilgal
  - and from Beth Gilgal
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition mean 'and from.' בֵּית before
    a place-name commonly forms a toponym ('Beth-...') rather than meaning a literal
    'house of.' Retaining the place-name avoids misleading readers into thinking of
    a building.
- source_word: וּמִשְּׂדוֹת גֶּבַע וְעַזְמָוֶת
  chosen: and from the fields of Geba and Azmaveth
  alternatives:
  - and from the countryside of Geba and Azmaveth
  - and from the open country of Geba and Azmaveth
  lexicon: HALOT
  rationale: שָׂדוֹת is the plural of 'field' and here refers to the surrounding agricultural
    lands or district associated with the named towns. 'Fields' is the most direct
    rendering, while still making sense in English with the following place-names.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the reason the singers came from these places. 'For'
    preserves the explanatory force in a natural, concise way.
- source_word: חֲצֵרִים
  chosen: villages
  alternatives:
  - settlements
  - courtyards
  - hamlets
  lexicon: HALOT
  rationale: Although חָצֵר can denote an enclosure or courtyard, in this context
    with בָּנוּ and geographic reference around Jerusalem it refers to small settlements
    or villages. 'Villages' best fits the sense of inhabited places established by
    the singers.
- source_word: בָּנוּ לָהֶם
  chosen: had built for themselves
  alternatives:
  - built for themselves
  - had established for themselves
  lexicon: HALOT
  rationale: The verb means 'built.' English past perfect ('had built') fits the explanatory
    clause describing an existing situation that accounts for the singers' presence
    from these areas.
- source_word: הַמְשֹׁרֲרִים
  chosen: the singers
  alternatives:
  - the musicians
  lexicon: HALOT
  rationale: The participial form from שׁיר denotes those who sing. 'Singers' is more
    precise than the broader 'musicians' and matches the temple-worship context.
- source_word: סְבִיבוֹת יְרוּשָׁלִָם
  chosen: around Jerusalem
  alternatives:
  - in the vicinity of Jerusalem
  - surrounding Jerusalem
  lexicon: HALOT
  rationale: The noun/adverbial expression indicates the area surrounding the city.
    'Around Jerusalem' is natural modern English and preserves the spatial sense.
