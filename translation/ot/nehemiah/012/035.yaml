id: NEH.12.35
reference: Nehemiah 12:35
source:
  edition: WLC
  text: וּ/מִ/בְּנֵ֥י הַ/כֹּהֲנִ֖ים בַּ/חֲצֹצְר֑וֹת זְכַרְיָ֨ה בֶן יֽוֹנָתָ֜ן בֶּן
    שְׁמַֽעְיָ֗ה בֶּן מַתַּנְיָה֙ בֶּן מִ֣יכָיָ֔ה בֶּן זַכּ֖וּר בֶּן אָסָֽף־־־־־־׃
translation:
  text: 'and some of the sons of the priests, with trumpets: Zechariah son of Jonathan,
    son of Shemaiah, son of Mattaniah, son of Micaiah, son of Zaccur, son of Asaph.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and from the sons of the priests, with trumpets.' The Hebrew expression
      is partitive and may be rendered more formally.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/בְּנֵי
  chosen: and some of the sons of
  alternatives:
  - and from the sons of
  - and of the sons of
  lexicon: HALOT
  rationale: The conjunction ו plus preposition מן with construct בנים is most naturally
    rendered 'and from/some of the sons of.' In English, 'and some of the sons of'
    communicates the partitive sense smoothly while preserving the Hebrew idea that
    this is a subset of the priests.
- source_word: הַ/כֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of כהנים in this cultic/processional context.
- source_word: בַּ/חֲצֹצְר֑וֹת
  chosen: with trumpets
  alternatives:
  - with the trumpets
  - on trumpets
  lexicon: HALOT
  rationale: 'The prefixed ב here is instrumental: the priests are characterized as
    participating with trumpets. English ''with trumpets'' is idiomatic and fits the
    procession context better than the more wooden ''in the trumpets'' or overly specific
    ''with the trumpets.'''
- source_word: זְכַרְיָה
  chosen: Zechariah
  alternatives:
  - Zekariah
  rationale: Personal names are transliterated by standard English convention.
- source_word: בֶן
  chosen: son of
  lexicon: HALOT
  rationale: Repeated genealogical marker rendered consistently as 'son of' to preserve
    the lineage structure.
- source_word: יֽוֹנָתָן
  chosen: Jonathan
  alternatives:
  - Jehonathan
  rationale: Standard English transliteration of the personal name.
- source_word: שְׁמַֽעְיָה
  chosen: Shemaiah
  rationale: Standard English transliteration of the personal name.
- source_word: מַתַּנְיָה
  chosen: Mattaniah
  rationale: Standard English transliteration of the personal name.
- source_word: מִיכָיָה
  chosen: Micaiah
  alternatives:
  - Michaiah
  rationale: Standard English biblical transliteration; preserves distinction from
    the shorter form 'Micah.'
- source_word: זַכּוּר
  chosen: Zaccur
  alternatives:
  - Zakkur
  rationale: Standard English transliteration of the personal name.
- source_word: אָסָף
  chosen: Asaph
  rationale: Standard English transliteration of the personal name; likely the well-known
    Levitical ancestor, but the verse itself only states the genealogy.
