theological_decisions:
- issue: Genealogical relation to Asaph
  chosen_reading: Render the lineage straightforwardly without adding interpretive
    material about guild membership or authorship.
  alternative_readings:
  - Understand 'son of Asaph' more broadly as descendant of the Asaphite line
  rationale: The Hebrew uses repeated 'son of' in a genealogy. English should preserve
    the stated lineage without importing broader historical conclusions into the main
    text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
