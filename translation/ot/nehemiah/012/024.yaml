id: NEH.12.24
reference: Nehemiah 12:24
source:
  edition: WLC
  text: וְ/רָאשֵׁ֣י הַ֠/לְוִיִּם חֲשַׁבְיָ֨ה שֵֽׁרֵבְיָ֜ה וְ/יֵשׁ֤וּעַ בֶּן קַדְמִיאֵל֙
    וַ/אֲחֵי/הֶ֣ם לְ/נֶגְדָּ֔/ם לְ/הַלֵּ֣ל לְ/הוֹד֔וֹת בְּ/מִצְוַ֖ת דָּוִ֣יד אִישׁ
    הָ/אֱלֹהִ֑ים מִשְׁמָ֖ר לְ/עֻמַּ֥ת מִשְׁמָֽר־־׃
translation:
  text: And the heads of the Levites were Hashabiah, Sherebiah, and Jeshua son of
    Kadmiel, with their brothers opposite them, to praise and to give thanks according
    to the command of David the man of God, watch corresponding to watch.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “facing them” or “corresponding to them.” The phrase likely describes
      opposing or matching Levitical groups in worship.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: “watch corresponding to watch,” probably referring to matched service
      divisions or alternating liturgical stations.'
    reason: cultural_note
lexical_decisions:
- source_word: רָאשֵׁי
  chosen: heads of
  alternatives:
  - chiefs of
  - leaders of
  lexicon: HALOT
  rationale: Construct plural of רֹאשׁ used idiomatically for those in leading position.
    'Heads of' preserves the Hebrew image while remaining natural enough in English.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard ethnic/tribal-cultic designation; definite article retained.
- source_word: חֲשַׁבְיָה שֵׁרֵבְיָה וְיֵשׁוּעַ בֶּן־קַדְמִיאֵל
  chosen: Hashabiah, Sherebiah, and Jeshua son of Kadmiel
  alternatives:
  - Jeshua the son of Kadmiel
  rationale: Personal names are transliterated per project philosophy. 'Son of' is
    retained rather than reduced to a patronymic form.
- source_word: וַאֲחֵיהֶם
  chosen: with their brothers
  alternatives:
  - and their brothers
  lexicon: HALOT
  rationale: The conjunction plus noun introduces the associated group accompanying
    the named leaders. 'With their brothers' makes the relation clear in English while
    preserving the masculine kinship term.
- source_word: לְנֶגְדָּם
  chosen: opposite them
  alternatives:
  - facing them
  - corresponding to them
  lexicon: HALOT
  rationale: The preposition indicates position over against or corresponding to another
    group, fitting the antiphonal liturgical setting.
- source_word: לְהַלֵּל לְהוֹדוֹת
  chosen: to praise and to give thanks
  alternatives:
  - to offer praise and thanksgiving
  lexicon: HALOT
  rationale: Two infinitives are kept distinctly rather than merged, preserving the
    paired liturgical actions.
- source_word: בְּמִצְוַת
  chosen: according to the command of
  alternatives:
  - by the command of
  - in accordance with the command of
  lexicon: HALOT
  rationale: ב plus noun here expresses conformity to an authoritative directive.
- source_word: דָּוִיד אִישׁ הָאֱלֹהִים
  chosen: David the man of God
  alternatives:
  - David, the man of God
  lexicon: HALOT
  rationale: Traditional biblical title indicating divine commission; retained straightforwardly
    without expansion.
- source_word: מִשְׁמָר לְעֻמַּת מִשְׁמָר
  chosen: watch corresponding to watch
  alternatives:
  - division opposite division
  - guard alongside guard
  - course corresponding to course
  lexicon: HALOT
  rationale: The phrase is elliptical and likely denotes ordered liturgical service
    in matched or alternating groups. 'Watch corresponding to watch' preserves the
    repetition and structural parallelism without over-interpreting.
