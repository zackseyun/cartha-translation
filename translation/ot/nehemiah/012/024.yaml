theological_decisions:
- issue: Gendered kinship term אֲחֵיהֶם
  chosen_reading: brothers
  alternative_readings:
  - fellow Levites
  - kinsmen
  rationale: The Hebrew is grammatically masculine plural and refers to associated
    male Levites in temple service. Per doctrine, gender-accurate rendering is preferred
    over neutralization.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Elliptical cultic phrase מִשְׁמָר לְעֻמַּת מִשְׁמָר
  chosen_reading: watch corresponding to watch
  alternative_readings:
  - one division corresponding to another
  - antiphonal service group facing service group
  rationale: The text describes ordered Levitical arrangement but does not explicitly
    state 'antiphonal singing' or another fuller interpretation. The translation preserves
    the structural tension rather than resolving it beyond the wording supplied.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
