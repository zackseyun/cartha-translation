theological_decisions:
- issue: Nature of הַטָּהֳרָה in temple-service context
  chosen_reading: purification
  alternative_readings:
  - purity
  - cleansing
  rationale: The verse concerns Levitical and liturgical duties, so the term is best
    understood in its cultic sense rather than as a generalized moral purity. 'Purification'
    preserves that ritual dimension without importing later doctrinal categories.
