id: NEH.12.45
reference: Nehemiah 12:45
source:
  edition: WLC
  text: וַֽ/יִּשְׁמְר֞וּ מִשְׁמֶ֤רֶת אֱלֹֽהֵי/הֶם֙ וּ/מִשְׁמֶ֣רֶת הַֽ/טָּהֳרָ֔ה וְ/הַ/מְשֹׁרְרִ֖ים
    וְ/הַ/שֹּׁעֲרִ֑ים כְּ/מִצְוַ֥ת דָּוִ֖יד שְׁלֹמֹ֥ה בְנֽ/וֹ׃
translation:
  text: And they kept the charge of their God and the charge of purification, as did
    the singers and the gatekeepers, according to the command of David and Solomon
    his son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the duty of cleansing' or 'the duty of purity.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew phrase about 'the singers and the gatekeepers' is elliptical;
      it likely means that these groups also kept their assigned duties.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמְרוּ
  chosen: they kept
  alternatives:
  - they observed
  - they guarded
  lexicon: HALOT
  rationale: The verb שׁמר commonly means keep, guard, or observe. Here with מִשְׁמֶרֶת
    it forms an idiom for carrying out an assigned duty. 'Kept' preserves the Hebrew
    linkage and remains natural English.
- source_word: מִשְׁמֶרֶת
  chosen: the charge
  alternatives:
  - the duty
  - the service
  - the obligation
  lexicon: HALOT
  rationale: מִשְׁמֶרֶת denotes a charge, duty, or appointed responsibility. 'Charge'
    best preserves the formal sense of an entrusted religious duty and allows repetition
    with the second occurrence.
- source_word: אֱלֹהֵיהֶם
  chosen: their God
  alternatives:
  - God
  lexicon: HALOT
  rationale: The pronominal suffix is explicit in Hebrew and should be retained. 'Their
    God' reflects covenantal possession without adding emphasis beyond the text.
- source_word: וּמִשְׁמֶרֶת הַטָּהֳרָה
  chosen: and the charge of purification
  alternatives:
  - and the duty of cleansing
  - and the duty of purity
  lexicon: HALOT
  rationale: הַטָּהֳרָה refers to ritual purity/cleansing in temple context. 'Purification'
    communicates the cultic sense more clearly than the abstract 'purity' while remaining
    close to the Hebrew.
- source_word: וְהַמְשֹׁרְרִים וְהַשֹּׁעֲרִים
  chosen: as did the singers and the gatekeepers
  alternatives:
  - with the singers and the gatekeepers
  - including the singers and the gatekeepers
  lexicon: HALOT
  rationale: The verbless phrase is elliptical. In context it most naturally apposes
    or extends the statement to these groups as also keeping their duties. Supplying
    'as did' makes the Hebrew sense intelligible in English without over-paraphrasing.
- source_word: שֹׁעֲרִים
  chosen: gatekeepers
  alternatives:
  - doorkeepers
  - guards
  lexicon: HALOT
  rationale: In temple context, 'gatekeepers' is the standard and precise rendering
    for those assigned to the gates.
- source_word: כְּמִצְוַת
  chosen: according to the command
  alternatives:
  - according to the ordinance
  - according to the commandment
  lexicon: HALOT
  rationale: מִצְוָה here refers to an authoritative directive from David and Solomon
    regarding temple service. 'Command' is clear modern English and suitably formal.
- source_word: דָּוִיד שְׁלֹמֹה בְנוֹ
  chosen: David and Solomon his son
  alternatives:
  - David and his son Solomon
  lexicon: HALOT
  rationale: The Hebrew places the names in sequence followed by 'his son,' referring
    to Solomon. 'David and Solomon his son' is a close rendering, though slightly
    less idiomatic than the alternative.
