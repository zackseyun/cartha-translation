theological_decisions:
- issue: Nature of purification language
  chosen_reading: ritual purification
  alternative_readings:
  - general ceremonial cleansing
  rationale: The verb טהר in this temple-dedication context refers to ceremonial/ritual
    purification rather than merely physical cleaning or moral purification. The translation
    uses 'purified' to preserve that cultic sense without over-specifying the exact
    rite.
