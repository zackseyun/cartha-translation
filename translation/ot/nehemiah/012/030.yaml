id: NEH.12.30
reference: Nehemiah 12:30
source:
  edition: WLC
  text: וַ/יִּֽטַּהֲר֔וּ הַ/כֹּהֲנִ֖ים וְ/הַ/לְוִיִּ֑ם וַֽ/יְטַהֲרוּ֙ אֶת הָ/עָ֔ם
    וְ/אֶת הַ/שְּׁעָרִ֖ים וְ/אֶֽת הַ/חוֹמָֽה־־־׃
translation:
  text: And the priests and the Levites purified themselves, and they purified the
    people, the gates, and the wall.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cleansed themselves ... cleansed the people, the gates, and the wall.'
      The Hebrew uses the same root for both actions, first reflexively and then transitively.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּטַּהֲרוּ
  chosen: purified themselves
  alternatives:
  - cleansed themselves
  - made themselves clean
  lexicon: HALOT
  rationale: The hitpael form is reflexive, indicating that the priests and Levites
    underwent ritual purification themselves before purifying others. 'Purified themselves'
    is natural English and preserves the ritual sense better than the more generic
    'cleaned themselves.'
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֲנִים in cultic context; no reason to vary
    here.
- source_word: וְהַלְוִיִּם
  chosen: and the Levites
  lexicon: HALOT
  rationale: Standard rendering of לְוִיִּם as the Levitical temple servants/officials.
    Transliteration is conventional for this tribal designation.
- source_word: וַיְטַהֲרוּ
  chosen: they purified
  alternatives:
  - they cleansed
  - they made clean
  lexicon: HALOT
  rationale: The piel form is causative/factitive, distinct from the earlier reflexive
    form. 'They purified' preserves the ritual/cultic nuance and the verbal contrast
    with 'purified themselves.'
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the assembly
  lexicon: HALOT
  rationale: The ordinary sense is 'the people.' 'Assembly' is possible in some contexts,
    but here the broader populace involved in the dedication is more likely.
- source_word: הַשְּׁעָרִים
  chosen: the gates
  alternatives:
  - the gatehouses
  lexicon: HALOT
  rationale: The common meaning is 'gates.' While the term can imply gate structures,
    'gates' is the most direct and idiomatic rendering in this city-wall context.
- source_word: הַחוֹמָה
  chosen: the wall
  alternatives:
  - the city wall
  lexicon: HALOT
  rationale: The singular refers to Jerusalem's wall in context. 'The wall' is sufficiently
    clear and closely follows the Hebrew; 'city wall' would be slightly more explicit
    but less formally aligned.
