id: NEH.12.1
reference: Nehemiah 12:1
source:
  edition: WLC
  text: וְ/אֵ֨לֶּה֙ הַ/כֹּהֲנִ֣ים וְ/הַ/לְוִיִּ֔ם אֲשֶׁ֥ר עָל֛וּ עִם זְרֻבָּבֶ֥ל בֶּן
    שְׁאַלְתִּיאֵ֖ל וְ/יֵשׁ֑וּעַ שְׂרָיָ֥ה יִרְמְיָ֖ה עֶזְרָֽא־־׃
translation:
  text: 'Now these were the priests and the Levites who came up with Zerubbabel son
    of Shealtiel, and Jeshua: Seraiah, Jeremiah, Ezra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Jeshua'; alternatively 'Joshua' if the name is normalized rather
      than transliterated.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: Now these were
  alternatives:
  - And these were
  - These were
  lexicon: HALOT
  rationale: The conjunction plus demonstrative introduces a new list section. 'Now
    these were' gives natural English paragraph progression while preserving the discourse-linking
    force of the initial waw better than a bare 'These were.'
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֲנִים in this genealogical/list context.
- source_word: וְהַלְוִיִּם
  chosen: and the Levites
  lexicon: HALOT
  rationale: Straightforward rendering of the coordinate group named alongside the
    priests.
- source_word: אֲשֶׁר עָלוּ
  chosen: who came up
  alternatives:
  - who went up
  lexicon: HALOT
  rationale: עלה in return-from-exile contexts commonly refers to going up to Jerusalem/Judah.
    'Came up' is idiomatic from the narrator's perspective and suits established biblical
    usage in pilgrimage/return contexts.
- source_word: עִם
  chosen: with
  lexicon: HALOT
  rationale: Simple accompaniment marker.
- source_word: זְרֻבָּבֶל בֶּן שְׁאַלְתִּיאֵל
  chosen: Zerubbabel son of Shealtiel
  alternatives:
  - Zerubbabel the son of Shealtiel
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy; filial relation
    is rendered directly.
- source_word: וְיֵשׁוּעַ
  chosen: and Jeshua
  alternatives:
  - and Joshua
  lexicon: HALOT
  rationale: The Hebrew form here is יֵשׁוּעַ, conventionally transliterated 'Jeshua'
    in post-exilic contexts. This preserves the specific form of the name rather than
    normalizing it to 'Joshua.'
- source_word: שְׂרָיָה יִרְמְיָה עֶזְרָא
  chosen: Seraiah, Jeremiah, Ezra
  lexicon: HALOT
  rationale: These are proper names beginning the list of priestly heads/families.
    They are best represented as a simple name list following the introductory clause.
