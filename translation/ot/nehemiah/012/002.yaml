id: NEH.12.2
reference: Nehemiah 12:2
source:
  edition: WLC
  text: אֲמַרְיָ֥ה מַלּ֖וּךְ חַטּֽוּשׁ׃
translation:
  text: Amariah, Malluk, Hattush.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Malluk may also be spelled 'Malluch' in English transliteration.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲמַרְיָה
  chosen: Amariah
  alternatives:
  - Amaryah
  lexicon: HALOT
  rationale: Proper personal name; per translation philosophy, personal names are
    transliterated rather than translated. 'Amariah' is the standard English transliteration
    in biblical usage.
- source_word: מַלּוּךְ
  chosen: Malluk
  alternatives:
  - Malluch
  lexicon: HALOT
  rationale: Proper personal name; transliterated. The consonantal form can be represented
    in English as either 'Malluk' or 'Malluch'; 'Malluk' more directly reflects the
    final kaf sound without importing a more traditional but less transparent spelling.
- source_word: חַטּוּשׁ
  chosen: Hattush
  alternatives:
  - Hattush
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard convention. No translation
    is appropriate because the text is a list of names.
