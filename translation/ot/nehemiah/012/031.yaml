id: NEH.12.31
reference: Nehemiah 12:31
source:
  edition: WLC
  text: וָ/אַעֲלֶה֙ אֶת שָׂרֵ֣י יְהוּדָ֔ה מֵ/עַ֖ל לַ/חוֹמָ֑ה וָ/אַעֲמִ֡ידָ/ה שְׁתֵּ֣י
    תוֹדֹת֩ גְּדוֹלֹ֨ת וְ/תַהֲלֻכֹ֤ת לַ/יָּמִין֙ מֵ/עַ֣ל לַ/חוֹמָ֔ה לְ/שַׁ֖עַר הָ/אַשְׁפֹּֽת־׃
translation:
  text: Then I brought the leaders of Judah up onto the wall, and I stationed two
    great thanksgiving choirs and processions, one going to the right on the wall
    toward the Dung Gate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'two great thanksgivings'; the phrase likely refers to organized
      thanksgiving groups or choirs in procession rather than abstract acts of thanks.
    reason: lexical_alternative
  - marker: b
    text: Or 'to the Dung Gate.' The preposition can be rendered either 'to' or 'toward'
      in this directional context.
    reason: alternative_reading
lexical_decisions:
- source_word: וָ/אַעֲלֶה
  chosen: Then I brought ... up
  alternatives:
  - Then I made ... go up
  - Then I led ... up
  lexicon: HALOT
  rationale: 'From עלה in Hiphil, first person singular: causative sense, ''cause
    to go up/bring up.'' ''Brought ... up'' is natural English and preserves the causative
    force.'
- source_word: שָׂרֵי יְהוּדָה
  chosen: the leaders of Judah
  alternatives:
  - the princes of Judah
  - the officials of Judah
  lexicon: HALOT
  rationale: שָׂרִים can denote princes, officials, or leaders. In this civic-liturgical
    context, 'leaders' is clear modern English without implying royal sons.
- source_word: מֵעַל לַחוֹמָה
  chosen: onto the wall
  alternatives:
  - upon the wall
  - on top of the wall
  lexicon: HALOT
  rationale: The phrase indicates movement up to and onto the top/surface of the wall.
    'Onto the wall' is idiomatic and fits the procession setting.
- source_word: וָאַעֲמִידָה
  chosen: I stationed
  alternatives:
  - I appointed
  - I set in place
  - I made stand
  lexicon: HALOT
  rationale: From עמד in Hiphil, 'cause to stand, set, station.' Here Nehemiah arranges
    groups ceremonially; 'stationed' captures deliberate placement.
- source_word: שְׁתֵּי
  chosen: two
  lexicon: HALOT
  rationale: Straightforward numeral modifying the following feminine plural noun.
- source_word: תוֹדֹת גְּדוֹלֹת
  chosen: great thanksgiving choirs
  alternatives:
  - two great thanksgivings
  - two great thanksgiving processions
  - two large choirs giving thanks
  lexicon: HALOT
  rationale: תוֹדוֹת literally means 'thanksgivings,' but in this context of dedication
    on the wall it refers metonymically to organized thanksgiving groups/choirs. 'Great
    thanksgiving choirs' communicates the liturgical sense in readable English while
    preserving the thanksgiving emphasis.
- source_word: וְתַהֲלֻכֹת
  chosen: and processions
  alternatives:
  - and marching groups
  - and companies
  lexicon: HALOT
  rationale: הלך-derived noun denotes a going, procession, or marching movement. Since
    the verse describes movement along the wall, 'processions' best fits.
- source_word: לַיָּמִין
  chosen: to the right
  alternatives:
  - on the right side
  - southward
  lexicon: HALOT
  rationale: Literally 'to the right.' Some infer a southern direction from orientation,
    but the text itself says 'to the right,' so that wording is retained.
- source_word: לְשַׁעַר הָאַשְׁפֹּת
  chosen: toward the Dung Gate
  alternatives:
  - to the Dung Gate
  - toward the Refuse Gate
  lexicon: HALOT
  rationale: Proper gate name in Jerusalem. 'Dung Gate' is the standard transparent
    rendering of אַשְׁפֹּת ('refuse/dung'). 'Toward' fits the directional force of
    ל in this movement description.
