id: NEH.12.13
reference: Nehemiah 12:13
source:
  edition: WLC
  text: לְ/עֶזְרָ֣א מְשֻׁלָּ֔ם לַ/אֲמַרְיָ֖ה יְהוֹחָנָֽן׃
translation:
  text: for Ezra, Meshullam; for Amariah, Jehohanan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of Ezra ... of Amariah.' The Hebrew preposition can be rendered more
      literally this way, but in this list it likely indicates the representative
      corresponding to each priestly house.
    reason: lexical_alternative
  - marker: b
    text: Jehohanan is elsewhere often rendered 'Johanan' in English versions.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/עֶזְרָא
  chosen: for Ezra
  alternatives:
  - of Ezra
  - to Ezra
  lexicon: HALOT
  rationale: 'The prefixed ל in this priestly list marks association or representation
    within the sequence of family heads: ''for Ezra'' = the representative from the
    house/clan of Ezra. ''Of Ezra'' is possible in a compressed genealogical sense,
    but ''for'' better reflects the recurring list structure in context.'
- source_word: מְשֻׁלָּם
  chosen: Meshullam
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to the translation philosophy
    to preserve the Hebrew name rather than translate its possible meaning.
- source_word: לַ/אֲמַרְיָה
  chosen: for Amariah
  alternatives:
  - of Amariah
  - to Amariah
  lexicon: HALOT
  rationale: As with the first phrase, ל marks the family or priestly house represented
    in the list. 'For Amariah' communicates that Jehohanan is the corresponding head/representative.
- source_word: יְהוֹחָנָן
  chosen: Jehohanan
  alternatives:
  - Johanan
  lexicon: HALOT
  rationale: Proper personal name, transliterated. 'Johanan' is a common English simplification,
    but 'Jehohanan' more transparently reflects the Hebrew form יְהוֹ- and preserves
    the fuller name shape.
