id: NEH.13.7
reference: Nehemiah 13:7
source:
  edition: WLC
  text: וָ/אָב֖וֹא לִֽ/ירוּשָׁלִָ֑ם וָ/אָבִ֣ינָ/ה בָ/רָעָ֗ה אֲשֶׁ֨ר עָשָׂ֤ה אֶלְיָשִׁיב֙
    לְ/ט֣וֹבִיָּ֔ה לַ/עֲשׂ֥וֹת ל/וֹ֙ נִשְׁכָּ֔ה בְּ/חַצְרֵ֖י בֵּ֥ית הָ/אֱלֹהִֽים׃
translation:
  text: When I came to Jerusalem, I understood the evil that Eliashib had done for
    Tobiah by making a room for him in the courts of the house of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a chamber'; the Hebrew term can refer to a room or chamber within the
      temple complex.
    reason: lexical_alternative
  - marker: b
    text: '''The house of God'' refers to the temple.'
    reason: cultural_note
lexical_decisions:
- source_word: וָאָב֖וֹא
  chosen: When I came
  alternatives:
  - And I came
  - So I came
  lexicon: HALOT
  rationale: Qal wayyiqtol of בוא, narrating the next event in sequence. 'When I came'
    fits smooth English while preserving the temporal force in context.
- source_word: לִירוּשָׁלִָם
  chosen: to Jerusalem
  lexicon: HALOT
  rationale: Standard rendering of the place name with directional ל preposition.
- source_word: וָאָבִינָה
  chosen: I understood
  alternatives:
  - I learned
  - I came to understand
  - I perceived
  lexicon: HALOT
  rationale: From בין, 'to understand/perceive.' Here Nehemiah is reporting his realization
    upon arrival. 'I understood' is concise and preserves the cognitive sense better
    than the more interpretive 'I learned'.
- source_word: בָרָעָה
  chosen: the evil
  alternatives:
  - the wrong
  - the harm
  - the wicked thing
  lexicon: HALOT
  rationale: רָעָה here denotes a morally bad act, not merely inconvenience or damage.
    'The evil' preserves the moral weight of Nehemiah's judgment.
- source_word: אֲשֶׁר עָשָׂה
  chosen: that ... had done
  alternatives:
  - that ... did
  - which ... had done
  lexicon: HALOT
  rationale: Relative clause with עשה. English past perfect clarifies that Eliashib's
    action preceded Nehemiah's realization.
- source_word: אֶלְיָשִׁיב
  chosen: Eliashib
  rationale: Personal name transliterated per translation philosophy.
- source_word: לְטוֹבִיָּה
  chosen: for Tobiah
  alternatives:
  - on behalf of Tobiah
  - to Tobiah
  rationale: 'The ל marks advantage/benefit here: Eliashib acted in Tobiah''s favor.
    ''For Tobiah'' captures that sense naturally.'
- source_word: לַעֲשׂוֹת לוֹ
  chosen: by making a room for him
  alternatives:
  - to make for him
  - by preparing for him
  lexicon: HALOT
  rationale: Infinitive construct with ל expresses the content/result of the evil
    act. Rendering with 'by making' communicates means/result in idiomatic English.
- source_word: נִשְׁכָּה
  chosen: a room
  alternatives:
  - a chamber
  - a storeroom
  lexicon: HALOT
  rationale: The noun refers to a chamber/room in temple precincts. 'Room' is readable
    modern English; 'chamber' is more traditional but less natural. 'Storeroom' may
    be too specific for this verse alone, though the broader context involves storage
    use.
- source_word: בְּחַצְרֵי
  chosen: in the courts
  alternatives:
  - in the courtyards
  - in the court areas
  lexicon: HALOT
  rationale: Plural of חָצֵר, referring to temple courts/courtyards. 'Courts' is the
    standard and suitably concise rendering in temple context.
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - the temple of God
  - God's house
  lexicon: HALOT
  rationale: Literally 'house of God.' This phrase often refers to the temple, but
    the more literal rendering preserves the Hebrew expression while remaining clear.
