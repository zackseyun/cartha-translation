theological_decisions:
- issue: Moral characterization of Eliashib's action
  chosen_reading: Render רָעָה as 'the evil' rather than a softer term
  alternative_readings:
  - the wrong
  - the harm
  rationale: Nehemiah explicitly evaluates the act as morally evil in relation to
    the sanctity of the house of God. The translation should preserve that ethical
    force without adding further interpretation.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological weight without paraphrase.'
