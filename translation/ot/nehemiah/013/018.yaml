id: NEH.13.18
reference: Nehemiah 13:18
source:
  edition: WLC
  text: הֲ/ל֨וֹא כֹ֤ה עָשׂוּ֙ אֲבֹ֣תֵי/כֶ֔ם וַ/יָּבֵ֨א אֱלֹהֵ֜י/נוּ עָלֵ֗י/נוּ אֵ֚ת
    כָּל הָ/רָעָ֣ה הַ/זֹּ֔את וְ/עַ֖ל הָ/עִ֣יר הַ/זֹּ֑את וְ/אַתֶּ֞ם מוֹסִיפִ֤ים חָרוֹן֙
    עַל יִשְׂרָאֵ֔ל לְ/חַלֵּ֖ל אֶת הַ/שַּׁבָּֽת־־־׃פ
translation:
  text: Did not your fathers do this, and our God brought all this evil on us and
    on this city? Yet you are adding wrath against Israel by profaning the Sabbath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all this disaster' or 'all this calamity.' The Hebrew רָעָה can denote
      calamity in contexts of divine judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹוא
  chosen: Did not
  alternatives:
  - Is it not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Did not' fits
    natural English with the following perfect verb sequence.
- source_word: כֹה
  chosen: this
  alternatives:
  - thus
  - so
  lexicon: HALOT
  rationale: In context it points to the kind of action just described; 'this' is
    idiomatic in English after 'Did not your fathers do...'.
- source_word: עָשׂוּ
  chosen: do
  alternatives:
  - act
  - make
  lexicon: HALOT
  rationale: With כֹה, the idiom means 'do thus/this.' English 'do this' is the most
    natural equivalent.
- source_word: אֲבֹתֵיכֶם
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: HALOT
  rationale: Retains the masculine plural familial term and matches the Hebrew form.
    'Ancestors' is possible but less direct; the source specifically says 'fathers.'
- source_word: וַיָּבֵא
  chosen: brought
  alternatives:
  - caused to come
  - brought upon
  lexicon: HALOT
  rationale: The hiphil of בוא here means 'bring' in the sense of bringing calamity
    upon someone. English can express the object and target naturally as 'brought
    ... on us.'
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Straightforward possessive construction; no need to expand or soften
    the subject of divine judgment.
- source_word: אֵת כָּל הָרָעָה הַזֹּאת
  chosen: all this evil
  alternatives:
  - all this disaster
  - all this calamity
  lexicon: HALOT
  rationale: רָעָה in judgment contexts can denote calamity/disaster, but 'evil' preserves
    the broader moral-disaster sense and reflects common biblical usage without denying
    that the referent is punitive calamity.
- source_word: עָלֵינוּ
  chosen: on us
  alternatives:
  - upon us
  lexicon: HALOT
  rationale: Natural modern English preposition for hostile consequence.
- source_word: וְעַל הָעִיר הַזֹּאת
  chosen: and on this city
  alternatives:
  - and against this city
  - and upon this city
  lexicon: HALOT
  rationale: Keeps the repeated preposition explicit and preserves the parallelism
    between 'on us' and 'on this city.'
- source_word: וְאַתֶּם
  chosen: Yet you
  alternatives:
  - and you
  lexicon: HALOT
  rationale: 'The conjunction marks contrast in context: despite that history, they
    continue the offense. ''Yet'' brings out the adversative force naturally.'
- source_word: מוֹסִיפִים
  chosen: are adding
  alternatives:
  - add
  - increase
  lexicon: HALOT
  rationale: Participle conveys ongoing action; progressive English best reflects
    the sense of continuing to heap up offense.
- source_word: חָרוֹן
  chosen: wrath
  alternatives:
  - burning anger
  - fury
  lexicon: HALOT
  rationale: Standard rendering for divine anger/wrath. 'Wrath' is concise and weighty
    without overparaphrase.
- source_word: עַל יִשְׂרָאֵל
  chosen: against Israel
  alternatives:
  - upon Israel
  - on Israel
  lexicon: HALOT
  rationale: With חָרוֹן, English idiom prefers 'against' to express wrath directed
    toward a people.
- source_word: לְחַלֵּל
  chosen: by profaning
  alternatives:
  - by desecrating
  - to profane
  lexicon: HALOT
  rationale: 'The infinitive expresses means or attendant circumstance: they are adding
    wrath by their profanation. ''Profaning'' preserves the cultic-moral force better
    than the more general ''violating.'''
- source_word: אֶת הַשַּׁבָּת
  chosen: the Sabbath
  alternatives:
  - the sabbath day
  lexicon: HALOT
  rationale: Standard English rendering of the definite noun; 'day' is not explicit
    in the Hebrew and is unnecessary.
