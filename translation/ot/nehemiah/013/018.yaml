theological_decisions:
- issue: Rendering רָעָה in reference to what God brought on the people and city
  chosen_reading: evil
  alternative_readings:
  - disaster
  - calamity
  rationale: The Hebrew term can denote calamity in judgment contexts, but 'evil'
    preserves the lexical form and the moral seriousness of covenant judgment without
    implying that God committed moral evil. The context makes clear this is punitive
    disaster brought because of sin.
  doctrine_reference: Translation philosophy §1, §5
- issue: Whether to soften divine judgment language in חָרוֹן
  chosen_reading: wrath
  alternative_readings:
  - anger
  - burning anger
  rationale: The verse presents covenantal divine judgment directly. 'Wrath' preserves
    that theological weight and should not be diluted to a merely emotional term where
    the text speaks of judicial anger against Israel.
  doctrine_reference: Translation philosophy §1
