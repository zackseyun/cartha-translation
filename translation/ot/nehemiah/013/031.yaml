id: NEH.13.31
reference: Nehemiah 13:31
source:
  edition: WLC
  text: וּ/לְ/קֻרְבַּ֧ן הָ/עֵצִ֛ים בְּ/עִתִּ֥ים מְזֻמָּנ֖וֹת וְ/לַ/בִּכּוּרִ֑ים זָכְרָ/ה
    לִּ֥/י אֱלֹהַ֖/י לְ/טוֹבָֽה־׃
translation:
  text: And for the offering of wood at appointed times, and for the firstfruits—remember
    me, my God, for good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the wood offering." The Hebrew refers to the scheduled provision of
      wood for temple use.
    reason: lexical_alternative
lexical_decisions:
- source_word: קֻרְבַּן
  chosen: offering
  alternatives:
  - presentation
  - oblation
  lexicon: HALOT
  rationale: The noun denotes an offering brought near/presented. 'Offering' is the
    most natural modern English equivalent and fits the cultic context without unnecessary
    archaism.
- source_word: הָעֵצִים
  chosen: wood
  alternatives:
  - firewood
  - the wood
  lexicon: HALOT
  rationale: In context this refers to the temple wood supply/wood offering. 'Wood'
    keeps the Hebrew wording concise; the cultic sense is clarified by 'offering of
    wood.'
- source_word: בְּעִתִּים מְזֻמָּנוֹת
  chosen: at appointed times
  alternatives:
  - at fixed times
  - at designated times
  lexicon: HALOT
  rationale: The phrase indicates scheduled or designated occasions. 'Appointed times'
    is idiomatic, clear, and preserves the sense of formally set times.
- source_word: בִּכּוּרִים
  chosen: firstfruits
  alternatives:
  - first fruits
  lexicon: HALOT
  rationale: Standard English rendering for produce offered first to God. The closed
    form 'firstfruits' is common and readable.
- source_word: זָכְרָה לִּי
  chosen: remember me
  alternatives:
  - remember for me
  - take thought of me
  lexicon: HALOT
  rationale: This is Nehemiah's recurring prayer formula asking God to remember him
    favorably. 'Remember me' is the direct and established sense.
- source_word: אֱלֹהַי
  chosen: my God
  lexicon: HALOT
  rationale: Straightforward possessive form; 'my God' preserves the personal address.
- source_word: לְטוֹבָה
  chosen: for good
  alternatives:
  - favorably
  - for my good
  lexicon: HALOT
  rationale: The phrase asks for favorable remembrance/result. 'For good' is concise
    and preserves the Hebrew idiom better than a more interpretive paraphrase.
