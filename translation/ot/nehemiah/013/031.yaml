theological_decisions:
- issue: Cultic phrase קֻרְבַּן הָעֵצִים
  chosen_reading: the offering of wood
  alternative_readings:
  - the wood offering
  rationale: The phrase refers to the temple provision of wood for the altar, not
    a generic gift of timber. The chosen wording is transparent and natural in English
    while preserving the sacrificial/cultic frame.
- issue: Final petition לְטוֹבָה
  chosen_reading: for good
  alternative_readings:
  - favorably
  - for my benefit
  rationale: The Hebrew is brief and idiomatic. 'For good' preserves the theological
    restraint of the text by not over-specifying whether the good is moral approval,
    blessing, or beneficial outcome.
  doctrine_reference: Preserve theological tension rather than resolve it.
