id: NEH.13.6
reference: Nehemiah 13:6
source:
  edition: WLC
  text: וּ/בְ/כָל זֶ֕ה לֹ֥א הָיִ֖יתִי בִּֽ/ירוּשָׁלִָ֑ם כִּ֡י בִּ/שְׁנַת֩ שְׁלֹשִׁ֨ים
    וּ/שְׁתַּ֜יִם לְ/אַרְתַּחְשַׁ֤סְתְּא מֶֽלֶךְ בָּבֶל֙ בָּ֣אתִי אֶל הַ/מֶּ֔לֶךְ
    וּ/לְ/קֵ֥ץ יָמִ֖ים נִשְׁאַ֥לְתִּי מִן הַ/מֶּֽלֶךְ־־־־׃
translation:
  text: But during all this I was not in Jerusalem, for in the thirty-second year
    of Artaxerxes king of Babylon I went to the king, and after some time I asked
    leave from the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''king of Babylon.'' The text is translated as written rather than
      harmonized to the broader Persian imperial setting.'
    reason: textual_variant
  - marker: b
    text: Or 'at the end of some days' / 'after a period of time.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְכָל זֶה
  chosen: But during all this
  alternatives:
  - And in all this
  - Now through all this
  lexicon: HALOT
  rationale: The phrase marks a temporal setting for the events just described, not
    merely a logical conjunction. 'But during all this' captures both the waw connection
    and the sense that Nehemiah was absent throughout that period.
- source_word: לֹא הָיִיתִי בִּירוּשָׁלִָם
  chosen: I was not in Jerusalem
  alternatives:
  - I had not been in Jerusalem
  lexicon: HALOT
  rationale: A straightforward past statement of absence fits the narrative. English
    simple past is the most natural rendering here.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the explanation for his absence. 'For' preserves the explanatory
    force in a concise narrative style.
- source_word: בִּשְׁנַת שְׁלֹשִׁים וּשְׁתַּיִם
  chosen: in the thirty-second year
  alternatives:
  - in year thirty-two
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the regnal-year expression.
- source_word: לְאַרְתַּחְשַׁסְתְּא
  chosen: of Artaxerxes
  lexicon: HALOT
  rationale: Personal name is transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: מֶלֶךְ בָּבֶל
  chosen: king of Babylon
  alternatives:
  - the Babylonian king
  lexicon: HALOT
  rationale: Formal genitive construction is best preserved. Although Artaxerxes was
    a Persian king, the Hebrew text here reads 'king of Babylon,' so the translation
    follows the source text rather than harmonizing historically.
- source_word: בָּאתִי אֶל הַמֶּלֶךְ
  chosen: I went to the king
  alternatives:
  - I came to the king
  lexicon: HALOT
  rationale: Hebrew בוא can be rendered 'come' or 'go' depending on viewpoint. In
    English narrative from Nehemiah's perspective, 'went to the king' is more natural.
- source_word: וּלְקֵץ יָמִים
  chosen: after some time
  alternatives:
  - at the end of some days
  - after a period of time
  lexicon: HALOT
  rationale: The idiom literally means 'at the end of days' but functions here as
    an indefinite span. 'After some time' conveys the idiomatic sense in readable
    modern English.
- source_word: נִשְׁאַלְתִּי מִן הַמֶּלֶךְ
  chosen: I asked leave from the king
  alternatives:
  - I requested permission from the king
  - I was granted leave by the king
  lexicon: HALOT
  rationale: The Niphal of שאל in this context refers to requesting leave/permission.
    'Asked leave from the king' preserves the subject's action without over-interpreting
    the result; 'was granted leave' would go beyond the form's plain sense here.
