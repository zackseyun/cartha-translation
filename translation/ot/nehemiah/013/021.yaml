id: NEH.13.21
reference: Nehemiah 13:21
source:
  edition: WLC
  text: וָ/אָעִ֣ידָ/ה בָ/הֶ֗ם וָ/אֹמְרָ֤/ה אֲלֵי/הֶם֙ מַדּ֜וּעַ אַתֶּ֤ם לֵנִים֙ נֶ֣גֶד
    הַ/חוֹמָ֔ה אִם תִּשְׁנ֕וּ יָ֖ד אֶשְׁלַ֣ח בָּ/כֶ֑ם מִן הָ/עֵ֣ת הַ/הִ֔יא לֹא בָ֖אוּ
    בַּ/שַּׁבָּֽת־־־׃ס
translation:
  text: So I warned them and said to them, “Why are you spending the night in front
    of the wall? If you do it again, I will lay hands on you.” From that time on they
    did not come on the Sabbath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “If you repeat this, I will use force against you.” The Hebrew idiom
      is literally “I will send a hand against you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאָעִידָה
  chosen: I warned
  alternatives:
  - I testified against
  - I admonished
  lexicon: HALOT
  rationale: The Hifil of עוד here carries the sense of giving a solemn warning or
    protest against someone's behavior. In context Nehemiah is confronting merchants;
    'I warned' is natural modern English and preserves the force without sounding
    overly formal. 'Testified against' is more literal but less idiomatic in this
    setting.
- source_word: וָאֹמְרָה אֲלֵיהֶם
  chosen: and said to them
  alternatives:
  - and I said to them
  lexicon: HALOT
  rationale: Standard narrative sequence. English can omit the explicit subject pronoun
    while preserving the sense.
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Direct interrogative; 'Why' is the natural equivalent.
- source_word: לֵנִים
  chosen: are you spending the night
  alternatives:
  - are you lodging
  - are you staying overnight
  lexicon: HALOT
  rationale: From לון/לין, 'to lodge, spend the night.' 'Spending the night' is clear
    contemporary English and fits the merchants camping outside Jerusalem before Sabbath
    restrictions lifted.
- source_word: נֶגֶד הַחוֹמָה
  chosen: in front of the wall
  alternatives:
  - opposite the wall
  - before the wall
  - outside the wall
  lexicon: HALOT
  rationale: נֶגֶד denotes being in front of or opposite. 'In front of the wall' is
    the most straightforward rendering. 'Outside the wall' is interpretive; while
    likely implied, the Hebrew more specifically locates them opposite the city wall.
- source_word: אִם תִּשְׁנוּ
  chosen: If you do it again
  alternatives:
  - If you repeat this
  - If you do so a second time
  lexicon: HALOT
  rationale: The verb שנה in this form means 'repeat, do again.' Because the object
    is implicit from context, English supplies 'it' for clarity.
- source_word: יָד אֶשְׁלַח בָּכֶם
  chosen: I will lay hands on you
  alternatives:
  - I will send a hand against you
  - I will use force against you
  lexicon: HALOT
  rationale: This idiom threatens direct action or force. 'Lay hands on you' preserves
    the idiomatic threat in natural English without over-specifying the exact punishment.
    A more literal 'send a hand against you' is awkward in English.
- source_word: מִן הָעֵת הַהִיא
  chosen: From that time on
  alternatives:
  - From that time
  - Since that time
  lexicon: HALOT
  rationale: Idiomatic temporal transition indicating the result of Nehemiah's warning.
- source_word: לֹא בָאוּ
  chosen: they did not come
  alternatives:
  - they no longer came
  lexicon: HALOT
  rationale: Simple negated perfect in narrative result. 'They did not come' is direct;
    the following temporal phrase already implies ongoing cessation.
- source_word: בַּשַּׁבָּת
  chosen: on the Sabbath
  alternatives:
  - on the sabbath day
  lexicon: HALOT
  rationale: Standard rendering of שַׁבָּת. 'On the Sabbath' is concise and idiomatic.
