id: NEH.13.19
reference: Nehemiah 13:19
source:
  edition: WLC
  text: וַ/יְהִ֡י כַּ/אֲשֶׁ֣ר צָֽלֲלוּ֩ שַׁעֲרֵ֨י יְרוּשָׁלִַ֜ם לִ/פְנֵ֣י הַ/שַּׁבָּ֗ת
    וָ/אֹֽמְרָ/ה֙ וַ/יִּסָּגְר֣וּ הַ/דְּלָת֔וֹת וָ/אֹ֣מְרָ֔/ה אֲשֶׁר֙ לֹ֣א יִפְתָּח֔וּ/ם
    עַ֖ד אַחַ֣ר הַ/שַּׁבָּ֑ת וּ/מִ/נְּעָרַ֗/י הֶֽעֱמַ֨דְתִּי֙ עַל הַ/שְּׁעָרִ֔ים לֹא
    יָב֥וֹא מַשָּׂ֖א בְּ/י֥וֹם הַ/שַּׁבָּֽת־־׃
translation:
  text: And it happened that, when the gates of Jerusalem began to grow dark before
    the Sabbath, I said that the doors should be shut, and I said that they should
    not open them until after the Sabbath. And I stationed some of my young men at
    the gates so that no load might come in on the Sabbath day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'when the gates of Jerusalem cast shadows before the
      Sabbath,' an idiom referring to the approach of evening.
    reason: lexical_alternative
  - marker: b
    text: Or 'some of my servants' or 'some of my attendants'; the Hebrew can refer
      to members of Nehemiah's personal retinue.
    reason: lexical_alternative
  - marker: c
    text: '''Load'' may refer specifically to goods being carried in for trade, as
      the surrounding context concerns Sabbath commerce.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צָֽלֲלוּ
  chosen: began to grow dark
  alternatives:
  - cast shadows
  - grew dim
  - were shaded
  lexicon: HALOT
  rationale: The verb refers to the onset of evening/darkness. In context with 'before
    the Sabbath,' it marks the approach of sundown at which Sabbath observance begins.
    'Began to grow dark' is idiomatic English and preserves the temporal nuance better
    than the more literal but opaque 'cast shadows.'
- source_word: שַׁעֲרֵי יְרוּשָׁלִַם
  chosen: the gates of Jerusalem
  alternatives:
  - Jerusalem's gates
  lexicon: HALOT
  rationale: A straightforward construct chain; 'the gates of Jerusalem' is natural
    and clear.
- source_word: לִפְנֵי הַשַּׁבָּת
  chosen: before the Sabbath
  alternatives:
  - in advance of the Sabbath
  lexicon: HALOT
  rationale: Temporal phrase indicating the time just prior to Sabbath onset.
- source_word: וָאֹמְרָה
  chosen: I said
  alternatives:
  - I commanded
  - I gave orders
  lexicon: HALOT
  rationale: The base verb is 'say.' In this administrative context it functions as
    an order, but 'I said' preserves the Hebrew wording while the subordinate clauses
    make the directive force clear.
- source_word: וַיִּסָּגְרוּ הַדְּלָתוֹת
  chosen: the doors should be shut
  alternatives:
  - they shut the doors
  - the doors were shut
  lexicon: HALOT
  rationale: After 'I said,' the clause expresses the content of Nehemiah's order.
    English idiom prefers a passive-like complement here. This avoids overcommitting
    to an explicit subject not stated in the Hebrew.
- source_word: אֲשֶׁר לֹא יִפְתָּחוּם
  chosen: that they should not open them
  alternatives:
  - that they were not to open them
  - that they should not be opened
  lexicon: HALOT
  rationale: The plural verb with object suffix most naturally means 'they should
    not open them,' referring to the doors. This keeps the active verbal force present
    in Hebrew.
- source_word: עַד אַחַר הַשַּׁבָּת
  chosen: until after the Sabbath
  alternatives:
  - until the Sabbath was over
  lexicon: HALOT
  rationale: A direct temporal rendering that is both clear and close to the source.
- source_word: וּמִנְּעָרַי
  chosen: some of my young men
  alternatives:
  - some of my servants
  - some of my attendants
  lexicon: HALOT
  rationale: נַעַר can denote a young man, servant, or attendant depending on context.
    Here Nehemiah refers to members of his own retinue assigned to guard duty. 'Young
    men' is the more literal default, while 'some of' reflects the partitive sense
    of מן.
- source_word: הֶעֱמַדְתִּי
  chosen: I stationed
  alternatives:
  - I set
  - I posted
  lexicon: HALOT
  rationale: In this security/administrative context, 'stationed' best conveys placing
    personnel on duty.
- source_word: עַל הַשְּׁעָרִים
  chosen: at the gates
  alternatives:
  - over the gates
  - by the gates
  lexicon: HALOT
  rationale: Although the preposition is literally 'upon/over,' with personnel and
    city gates the idiomatic sense is assignment at the gates.
- source_word: לֹא יָבֹא מַשָּׂא
  chosen: so that no load might come in
  alternatives:
  - that no burden should enter
  - that no merchandise should be brought in
  lexicon: HALOT
  rationale: מַשָּׂא is literally 'load, burden, carrying.' In this chapter the concern
    is commercial transport on the Sabbath. 'Load' preserves the concrete sense without
    narrowing it too specifically to 'merchandise,' while 'come in' reflects the singular
    verb of entry.
- source_word: בְּיוֹם הַשַּׁבָּת
  chosen: on the Sabbath day
  alternatives:
  - on the Sabbath
  lexicon: HALOT
  rationale: A natural rendering of the phrase that preserves the explicit mention
    of 'day' present in Hebrew.
