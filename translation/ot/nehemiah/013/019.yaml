theological_decisions:
- issue: Rendering of שַׁבָּת
  chosen_reading: Sabbath
  alternative_readings:
  - rest day
  rationale: The term refers specifically to the covenantal weekly Sabbath in Israel's
    law and practice, not merely a generic day of rest. The established English term
    'Sabbath' preserves that theological and historical specificity.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English'
