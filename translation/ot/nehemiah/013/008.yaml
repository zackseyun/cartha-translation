id: NEH.13.8
reference: Nehemiah 13:8
source:
  edition: WLC
  text: וַ/יֵּ֥רַֽע לִ֖/י מְאֹ֑ד וָֽ/אַשְׁלִ֜יכָ/ה אֶֽת כָּל כְּלֵ֧י בֵית טוֹבִיָּ֛ה
    הַ/ח֖וּץ מִן הַ/לִּשְׁכָּֽה־־־־׃
translation:
  text: And it displeased me greatly, and I threw all the household goods of Tobiah
    out of the chamber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the vessels of Tobiah's house.' The Hebrew term can refer broadly
      to articles, utensils, furnishings, or goods.
    reason: lexical_alternative
  - marker: b
    text: '''Chamber'' refers to a room in the temple complex.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּרַע לִי מְאֹד
  chosen: it displeased me greatly
  alternatives:
  - it was very evil to me
  - I was very upset
  - it grieved me greatly
  lexicon: HALOT
  rationale: The idiom with רעע plus ל plus pronominal suffix expresses something
    being bad/displeasing to someone. 'It displeased me greatly' preserves the impersonal
    Hebrew construction while sounding natural in English. 'Grieved me' is possible
    but slightly more interpretive emotionally.
- source_word: וָאַשְׁלִיכָה
  chosen: I threw
  alternatives:
  - I cast
  - I hurled
  lexicon: HALOT
  rationale: The verb שלך in Hiphil means to throw/cast. 'Threw' is clear modern English
    and preserves the forceful action without archaic tone.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: The term is comprehensive; 'all' is the most natural rendering with the
    following plural noun.
- source_word: כְּלֵי בֵית טוֹבִיָּה
  chosen: the household goods of Tobiah
  alternatives:
  - all the vessels of Tobiah's house
  - all the belongings of Tobiah's household
  - all the furnishings of Tobiah's house
  lexicon: HALOT
  rationale: כְּלִי can denote articles, vessels, utensils, equipment, or goods. In
    this context Nehemiah is expelling Tobiah's stored possessions from a temple room,
    so 'household goods' best captures the likely sense in readable English. 'Vessels'
    is too narrow and may sound cultic here; 'belongings' is possible but less concrete.
- source_word: הַחוּץ
  chosen: out
  alternatives:
  - outside
  - to the outside
  lexicon: HALOT
  rationale: With the verb of throwing and the preposition מן, the adverbial sense
    is movement outward. 'Out' is idiomatic in English in this construction.
- source_word: מִן הַלִּשְׁכָּה
  chosen: of the chamber
  alternatives:
  - from the room
  - from the storeroom
  - from the cell
  lexicon: HALOT
  rationale: לשכה refers to a chamber/room, often a temple chamber in this context.
    'Chamber' preserves the architectural and temple-related nuance better than the
    generic 'room.'
