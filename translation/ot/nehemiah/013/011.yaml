id: NEH.13.11
reference: Nehemiah 13:11
source:
  edition: WLC
  text: וָ/אָרִ֨יבָ/ה֙ אֶת הַ/סְּגָנִ֔ים וָ/אֹ֣מְרָ֔/ה מַדּ֖וּעַ נֶעֱזַ֣ב בֵּית הָ/אֱלֹהִ֑ים
    וָֽ/אֶ֨קְבְּצֵ֔/ם וָֽ/אַעֲמִדֵ֖/ם עַל עָמְדָֽ/ם־־־׃
translation:
  text: So I contended with the officials and said, “Why has the house of God been
    neglected?” Then I gathered them and stationed them at their posts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Why has the house of God been abandoned?' The Hebrew passive verb can
      denote being left or forsaken; here the context favors 'neglected' because Nehemiah
      is addressing failure to maintain temple service and support.
    reason: lexical_alternative
  - marker: b
    text: Or 'set them in their place.' The phrase refers to restoring the Levites
      and related personnel to their assigned duties.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאָרִיבָה
  chosen: I contended
  alternatives:
  - I rebuked
  - I disputed with
  - I confronted
  lexicon: HALOT
  rationale: From ריב, indicating entering into a dispute or contention. 'Contended'
    preserves the adversarial force without over-specifying the speech act as merely
    verbal rebuke.
- source_word: הַסְּגָנִים
  chosen: the officials
  alternatives:
  - the deputies
  - the prefects
  - the rulers
  lexicon: HALOT
  rationale: סְגָנִים refers to subordinate civil leaders or officials. 'Officials'
    is clear modern English and fits the administrative context better than the more
    technical 'deputies' or potentially misleading 'rulers.'
- source_word: וָאֹמְרָה
  chosen: and said
  alternatives:
  - and I said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר. English omits the repeated subject
    naturally while preserving sequence.
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Direct interrogative best rendered simply as 'Why' in natural English.
- source_word: נֶעֱזַב
  chosen: has been neglected
  alternatives:
  - has been abandoned
  - was forsaken
  - has been left
  lexicon: HALOT
  rationale: Passive of עזב. In context the temple service had not been utterly deserted
    but left uncared for and unsupported; 'neglected' best captures the practical
    sense while retaining seriousness.
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - God's house
  - the temple of God
  lexicon: HALOT
  rationale: A literal rendering preserves the Hebrew expression and its covenantal-religious
    weight. 'Temple of God' is interpretive but possible; 'house of God' stays closer
    to the source.
- source_word: וָאֶקְבְּצֵם
  chosen: I gathered them
  alternatives:
  - I assembled them
  - I brought them together
  lexicon: HALOT
  rationale: From קבץ, to gather or assemble. 'Gathered' is straightforward and idiomatic.
- source_word: וָאַעֲמִדֵם
  chosen: stationed them
  alternatives:
  - set them
  - made them stand
  - appointed them
  lexicon: HALOT
  rationale: Hiphil of עמד here means to cause to stand in place, i.e., to set or
    station for duty. 'Stationed' captures the practical administrative action in
    context.
- source_word: עַל עָמְדָם
  chosen: at their posts
  alternatives:
  - in their place
  - at their station
  - in their standing
  lexicon: HALOT
  rationale: Idiomatic expression indicating restoration to assigned positions or
    duties. 'At their posts' communicates the functional sense in clear English.
