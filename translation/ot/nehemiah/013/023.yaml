id: NEH.13.23
reference: Nehemiah 13:23
source:
  edition: WLC
  text: גַּ֣ם בַּ/יָּמִ֣ים הָ/הֵ֗ם רָאִ֤יתִי אֶת הַ/יְּהוּדִים֙ הֹשִׁ֗יבוּ נָשִׁים֙
    אשדודיות עמוניות מוֹאֲבִיּֽוֹת׀־׃
translation:
  text: Also in those days I saw the Jews who had married women of Ashdod, Ammonite
    women, and Moabite women.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Judeans.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'had settled women'; the Hebrew idiom here means they had married
      or taken these women as wives.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Also
  alternatives:
  - Moreover
  - Even
  lexicon: HALOT
  rationale: Introduces an additional observation in Nehemiah's reform report. 'Also'
    is natural modern English and preserves the additive force.
- source_word: בַּיָּמִים הָהֵם
  chosen: in those days
  alternatives:
  - at that time
  lexicon: HALOT
  rationale: A common temporal expression meaning the period under discussion. 'In
    those days' is idiomatic and sufficiently formal.
- source_word: רָאִיתִי
  chosen: I saw
  alternatives:
  - I observed
  lexicon: HALOT
  rationale: The verb is the ordinary verb 'to see.' 'I saw' preserves the firsthand
    eyewitness tone of Nehemiah's account.
- source_word: אֶת הַיְּהוּדִים
  chosen: the Jews
  alternatives:
  - the Judeans
  lexicon: HALOT
  rationale: While the ethnogeographic sense 'Judeans' is possible, in Ezra-Nehemiah
    English tradition and context this refers to the Jewish community as an ethnic-religious
    group. 'The Jews' is the most natural and recognizable rendering here.
- source_word: הֹשִׁיבוּ
  chosen: had married
  alternatives:
  - had settled with
  - had caused to dwell
  - were living with
  lexicon: HALOT
  rationale: The Hiphil of ישׁב literally means 'caused to dwell' or 'settled,' but
    in this context with 'women' it is an idiom for taking wives. 'Had married' conveys
    the intended sense clearly in English without wooden obscurity.
- source_word: נָשִׁים
  chosen: women
  alternatives:
  - wives
  lexicon: HALOT
  rationale: The Hebrew noun is 'women,' but because the idiom already conveys marriage
    through הֹשִׁיבוּ, retaining 'women' avoids overtranslation while still making
    the marital sense clear in the clause.
- source_word: אשדודיות
  chosen: women of Ashdod
  alternatives:
  - Ashdodite women
  - Ashdodite wives
  lexicon: HALOT
  rationale: This denotes women from Ashdod. 'Women of Ashdod' is clear and readable
    modern English; 'Ashdodite women' is possible but slightly less natural.
- source_word: עמוניות
  chosen: Ammonite women
  alternatives:
  - women of Ammon
  lexicon: HALOT
  rationale: An adjectival gentilic rendered naturally in English as 'Ammonite women.'
- source_word: מוֹאֲבִיּוֹת
  chosen: Moabite women
  alternatives:
  - women of Moab
  lexicon: HALOT
  rationale: An adjectival gentilic rendered naturally in English as 'Moabite women.'
