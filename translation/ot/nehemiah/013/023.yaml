theological_decisions:
- issue: Ethnographic rendering of הַיְּהוּדִים
  chosen_reading: the Jews
  alternative_readings:
  - the Judeans
  rationale: This verse concerns covenant-community identity and intermarriage within
    the postexilic Jewish community. 'The Jews' best communicates the communal referent
    in idiomatic English, while 'the Judeans' remains a viable more geographically
    focused alternative.
  doctrine_reference: Translation philosophy §1, §6
- issue: Idiomatic force of הֹשִׁיבוּ נָשִׁים
  chosen_reading: had married women
  alternative_readings:
  - had settled with women
  - had taken wives from
  rationale: The Hebrew expression is more idiomatic than literal in this context.
    Rendering it as 'had married' communicates the actual offense under discussion
    in Nehemiah 13 without importing extra doctrinal interpretation.
  doctrine_reference: Translation philosophy §1, §6
