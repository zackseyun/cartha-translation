theological_decisions:
- issue: Reference to Solomon's sin and its cause
  chosen_reading: The verse states that foreign women caused Solomon to sin, without
    expanding the mechanism beyond the text.
  alternative_readings:
  - The women tempted him
  - His marriages politically compromised covenant fidelity
  rationale: The Hebrew causative verb explicitly attributes a role in leading him
    into sin, but the translation avoids importing explanatory detail from 1 Kings
    11 beyond what this verse itself says.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Rendering אֱלֹהִים here
  chosen_reading: God
  alternative_readings:
  - his God appointed him king
  rationale: The clause shifts from 'his God' in the previous phrase to the noun אֱלֹהִים
    without suffix. English repeats 'God' naturally while preserving the sense. No
    covenant name is present, so 'the LORD' would be unwarranted.
  doctrine_reference: 'Contested terms: יְהוָה YHWH → the LORD (not applicable here)'
