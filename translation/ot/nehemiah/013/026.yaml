id: NEH.13.26
reference: Nehemiah 13:26
source:
  edition: WLC
  text: הֲ/ל֣וֹא עַל אֵ֣לֶּה חָטָֽא שְׁלֹמֹ֣ה מֶ֣לֶךְ יִשְׂרָאֵ֡ל וּ/בַ/גּוֹיִ֣ם הָ/רַבִּים֩
    לֹֽא הָיָ֨ה מֶ֜לֶךְ כָּמֹ֗/הוּ וְ/אָה֤וּב לֵֽ/אלֹהָי/ו֙ הָיָ֔ה וַ/יִּתְּנֵ֣/הוּ
    אֱלֹהִ֔ים מֶ֖לֶךְ עַל כָּל יִשְׂרָאֵ֑ל גַּם אוֹת֣/וֹ הֶחֱטִ֔יאוּ הַ/נָּשִׁ֖ים
    הַ/נָּכְרִיּֽוֹת־־־־־־׃
translation:
  text: Was it not because of these things that Solomon king of Israel sinned? Yet
    among the many nations there was no king like him, and he was loved by his God,
    and God made him king over all Israel. Even him the foreign women caused to sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the foreign wives.' The Hebrew says 'the foreign women'; 'wives' is
      a contextually informed alternative from Solomon's story but is not explicit
      in this verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Was it not
  alternatives:
  - Did not
  - Surely
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. 'Was
    it not' preserves the rhetorical force in natural English.
- source_word: עַל אֵלֶּה
  chosen: because of these things
  alternatives:
  - on account of these things
  - for these things
  lexicon: HALOT
  rationale: The preposition עַל with חטא here expresses cause/occasion. 'Because
    of these things' is idiomatic and fits the argument about intermarriage.
- source_word: חָטָא
  chosen: sinned
  alternatives:
  - missed the mark
  - offended
  lexicon: HALOT
  rationale: Standard rendering for חטא in moral/religious contexts; clear and consistent.
- source_word: שְׁלֹמֹה
  chosen: Solomon
  rationale: Standard English transliteration of the personal name.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: king of Israel
  lexicon: HALOT
  rationale: Straightforward construct chain; formal title preserved.
- source_word: וּבַגּוֹיִם הָרַבִּים
  chosen: Yet among the many nations
  alternatives:
  - And among the many nations
  - even among the many nations
  lexicon: HALOT
  rationale: 'The conjunction links the next clause, and ''among the many nations''
    reflects the comparative setting. ''Yet'' brings out the contrastive force in
    context: despite many nations, none had a king like him.'
- source_word: לֹא הָיָה מֶלֶךְ כָּמֹהוּ
  chosen: there was no king like him
  alternatives:
  - no king was like him
  lexicon: HALOT
  rationale: Natural English rendering of the existential/comparative clause.
- source_word: וְאָהוּב לֵאלֹהָיו הָיָה
  chosen: and he was loved by his God
  alternatives:
  - and he was beloved of his God
  - and he was one loved by his God
  lexicon: HALOT
  rationale: Passive/adjectival sense of אָהוּב is best conveyed by 'loved.' 'His
    God' reflects the pronominal suffix without importing covenant-name language absent
    here.
- source_word: וַיִּתְּנֵהוּ אֱלֹהִים מֶלֶךְ
  chosen: and God made him king
  alternatives:
  - and God gave him as king
  - and God appointed him king
  lexicon: HALOT
  rationale: נתן with object plus predicate accusative here means appointing/placing
    in office. 'Made him king' is concise and idiomatic.
- source_word: עַל כָּל יִשְׂרָאֵל
  chosen: over all Israel
  alternatives:
  - over the whole of Israel
  lexicon: HALOT
  rationale: Standard rendering of rule/governance over the nation.
- source_word: גַּם אֹתוֹ
  chosen: Even him
  alternatives:
  - Even he
  - Even this man
  lexicon: HALOT
  rationale: Fronted object gives emphasis. 'Even him' preserves the emphatic shock
    that Solomon too was affected.
- source_word: הֶחֱטִיאוּ
  chosen: caused to sin
  alternatives:
  - led into sin
  - made sin
  lexicon: HALOT
  rationale: Hiphil of חטא is causative. 'Caused to sin' is the most transparent rendering.
- source_word: הַנָּשִׁים הַנָּכְרִיּוֹת
  chosen: the foreign women
  alternatives:
  - the foreign wives
  - the alien women
  lexicon: HALOT
  rationale: נָכְרִי denotes foreign/outsider status. 'Foreign women' follows the
    Hebrew wording directly; 'wives' is contextually true from Solomon's story but
    not explicitly stated in this verse, so it is not used in the main text.
