id: NEH.13.16
reference: Nehemiah 13:16
source:
  edition: WLC
  text: וְ/הַ/צֹּרִים֙ יָ֣שְׁבוּ בָ֔/הּ מְבִיאִ֥ים דָּ֖אג וְ/כָל מֶ֑כֶר וּ/מֹכְרִ֧ים
    בַּ/שַּׁבָּ֛ת לִ/בְנֵ֥י יְהוּדָ֖ה וּ/בִ/ירוּשָׁלִָֽם־׃
translation:
  text: Also the Tyrians lived in it, bringing in fish and every kind of merchandise,
    and selling them on the Sabbath to the sons of Judah, and in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the people of Judah' or 'to the Judeans.' The Hebrew reads literally
      'to the sons of Judah.'
    reason: lexical_alternative
  - marker: b
    text: 'The final phrase ''and in Jerusalem'' may be understood emphatically: ''even
      in Jerusalem.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַצֹּרִים
  chosen: Also the Tyrians
  alternatives:
  - And the Tyrians
  - The people of Tyre
  lexicon: HALOT
  rationale: Refers to people from Tyre. The prefixed conjunction is rendered 'Also'
    to continue Nehemiah's list of Sabbath violations in context, while 'Tyrians'
    is a concise natural English ethnonym.
- source_word: יָשְׁבוּ בָהּ
  chosen: lived in it
  alternatives:
  - dwelt there
  - settled in it
  lexicon: HALOT
  rationale: The verb ישׁב commonly means 'sit, dwell, live.' Here it indicates residence
    within Jerusalem. 'In it' preserves the feminine pronominal suffix referring back
    to the city.
- source_word: מְבִיאִים
  chosen: bringing in
  alternatives:
  - bringing
  - importing
  lexicon: HALOT
  rationale: The Hiphil participle of בוא here has a causative/ingressive sense of
    bringing goods into the city. 'Bringing in' captures the movement into Jerusalem
    more clearly than simple 'bringing.'
- source_word: דָּאג
  chosen: fish
  alternatives:
  - fish catch
  lexicon: HALOT
  rationale: The noun denotes fish. 'Fish' is the natural English rendering in a market
    context.
- source_word: וְכָל מֶכֶר
  chosen: and every kind of merchandise
  alternatives:
  - and all wares
  - and every article for sale
  lexicon: HALOT
  rationale: מֶכֶר refers to goods for sale or merchandise. 'Every kind of merchandise'
    communicates the commercial sense idiomatically in modern English.
- source_word: וּמֹכְרִים
  chosen: and selling them
  alternatives:
  - and they sold
  - and selling
  lexicon: HALOT
  rationale: The participle continues the description of ongoing activity. 'Them'
    is supplied in English to refer back to the fish and merchandise being sold.
- source_word: בַּשַּׁבָּת
  chosen: on the Sabbath
  alternatives:
  - on Sabbath
  lexicon: HALOT
  rationale: Definite article is preserved naturally in English. The phrase marks
    the prohibited time of commerce.
- source_word: לִבְנֵי יְהוּדָה
  chosen: to the sons of Judah
  alternatives:
  - to the people of Judah
  - to the Judeans
  lexicon: HALOT
  rationale: The Hebrew is literally 'to the sons of Judah.' Following the project's
    gender-accurate principle, the filial expression is retained rather than flattened
    to a neutral collective. In context it denotes the Judahite population.
- source_word: וּבִירוּשָׁלִָם
  chosen: and in Jerusalem
  alternatives:
  - even in Jerusalem
  lexicon: HALOT
  rationale: The phrase likely adds emphasis that this selling was happening in Jerusalem
    itself. 'And in Jerusalem' preserves the Hebrew coordination without overinterpreting
    it.
