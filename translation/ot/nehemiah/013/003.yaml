theological_decisions:
- issue: Referent of 'Israel' in a postexilic communal-purity context
  chosen_reading: Retain 'Israel' as the covenant-community term without paraphrasing
    or softening.
  alternative_readings:
  - from the Israelites
  - from the assembly of Israel
  rationale: The Hebrew uses the proper name יִשְׂרָאֵל, and the verse describes a
    communal act in response to the law. Keeping 'Israel' preserves the covenantal
    and corporate identity language without importing later theological conclusions.
  doctrine_reference: Translation philosophy §1, §5
