id: NEH.13.3
reference: Nehemiah 13:3
source:
  edition: WLC
  text: וַ/יְהִ֖י כְּ/שָׁמְעָ֣/ם אֶת הַ/תּוֹרָ֑ה וַ/יַּבְדִּ֥ילוּ כָל עֵ֖רֶב מִ/יִּשְׂרָאֵֽל־־׃
translation:
  text: And when they heard the law, they separated from Israel all the mixed multitude.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all those of mixed descent' or 'the mixed company.' The Hebrew עֵרֶב
      is a collective term for a mixed group.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ...
  alternatives:
  - Now it happened
  - And it happened
  lexicon: HALOT
  rationale: The waw-consecutive on היה introduces the next event in narrative sequence.
    In natural English, the idiom is best carried by a simple connective rather than
    the more wooden 'and it happened.'
- source_word: כְּשָׁמְעָם
  chosen: when they heard
  alternatives:
  - as soon as they heard
  - upon their hearing
  lexicon: HALOT
  rationale: The preposition כ with infinitive construct plus suffix marks a temporal
    clause. 'When they heard' is clear, natural, and sufficiently formal.
- source_word: הַתּוֹרָה
  chosen: the law
  alternatives:
  - the instruction
  - the Torah
  lexicon: HALOT
  rationale: תּוֹרָה can mean instruction broadly, but in this postexilic covenantal
    setting it refers to the authoritative Mosaic law being read publicly. 'The law'
    is the most idiomatic and contextually precise main-text rendering; 'Torah' remains
    a viable alternative but is less transparent for general readers.
- source_word: וַיַּבְדִּילוּ
  chosen: they separated
  alternatives:
  - they set apart
  - they excluded
  lexicon: HALOT
  rationale: בדל means to divide or separate. Here the object is 'all the mixed multitude'
    and the phrase מִיִּשְׂרָאֵל marks separation from Israel, so 'they separated'
    preserves the action without overinterpreting motive. 'Excluded' is possible but
    slightly more interpretive.
- source_word: כָל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: כָל with a collective noun naturally means the whole group. 'All' is
    the standard rendering.
- source_word: עֵרֶב
  chosen: the mixed multitude
  alternatives:
  - every mixed person
  - all those of mixed descent
  - the mixed company
  lexicon: HALOT
  rationale: עֵרֶב denotes a mixed group or admixture, echoing usage such as 'mixed
    multitude.' In this context it refers collectively to those of foreign mixture
    among the community. 'The mixed multitude' preserves the collective force and
    biblical intertextual resonance better than the awkwardly literal 'every mixed
    person.'
- source_word: מִיִּשְׂרָאֵל
  chosen: from Israel
  alternatives:
  - out of Israel
  - away from Israel
  lexicon: HALOT
  rationale: The preposition מן marks separation from the covenant community. 'From
    Israel' is the most direct rendering and leaves 'Israel' as the community designation
    rather than paraphrasing it as 'the Israelites.'
