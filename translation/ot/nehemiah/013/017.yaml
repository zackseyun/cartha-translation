theological_decisions:
- issue: Rendering of Sabbath violation language
  chosen_reading: profaning the Sabbath day
  alternative_readings:
  - violating the Sabbath day
  - desecrating the Sabbath day
  rationale: The Hebrew verb emphasizes treating something holy as profane/common.
    'Profaning' best preserves the theological weight of Sabbath holiness in the text
    rather than reducing it to mere rule-breaking.
  doctrine_reference: Translation philosophy §1, §5
