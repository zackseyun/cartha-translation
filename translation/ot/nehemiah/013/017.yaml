id: NEH.13.17
reference: Nehemiah 13:17
source:
  edition: WLC
  text: וָ/אָרִ֕יבָ/ה אֵ֖ת חֹרֵ֣י יְהוּדָ֑ה וָ/אֹמְרָ֣/ה לָ/הֶ֗ם מָֽה הַ/דָּבָ֨ר הָ/רָ֤ע
    הַ/זֶּה֙ אֲשֶׁ֣ר אַתֶּ֣ם עֹשִׂ֔ים וּֽ/מְחַלְּלִ֖ים אֶת י֥וֹם הַ/שַּׁבָּֽת־־׃
translation:
  text: So I contended with the nobles of Judah and said to them, “What is this evil
    thing that you are doing, profaning the Sabbath day?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “violating” or “desecrating the Sabbath day.” The Hebrew verb carries
      the sense of treating what is holy as common.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאָרִיבָה
  chosen: So I contended
  alternatives:
  - So I rebuked
  - So I argued
  lexicon: HALOT
  rationale: ריב in the Hiphil/Qal narrative context can denote contending, bringing
    a charge, or rebuking. 'Contended' preserves the adversarial force without over-specifying
    a formal legal proceeding. 'So' reflects the narrative waw-consecutive.
- source_word: חֹרֵי יְהוּדָה
  chosen: the nobles of Judah
  alternatives:
  - the officials of Judah
  - the leading men of Judah
  lexicon: HALOT
  rationale: חֹרִים commonly refers to nobles or prominent men. 'Nobles' is the most
    established and contextually fitting rendering for Judah's social leaders here.
- source_word: וָאֹמְרָה לָהֶם
  chosen: and said to them
  alternatives:
  - and I said to them
  lexicon: HALOT
  rationale: Straightforward narrative continuation. English omits the repeated subject
    naturally, since it is already clear from the previous clause.
- source_word: מָה הַדָּבָר הָרָע הַזֶּה
  chosen: What is this evil thing
  alternatives:
  - What is this wicked thing
  - What is this bad thing
  lexicon: HALOT
  rationale: דבר here means 'thing/matter,' and רָע carries moral force. 'Evil thing'
    best preserves the ethical condemnation in Nehemiah's question.
- source_word: אֲשֶׁר אַתֶּם עֹשִׂים
  chosen: that you are doing
  alternatives:
  - which you are doing
  lexicon: HALOT
  rationale: Natural English relative clause preserving the ongoing action implied
    by the participle.
- source_word: וּמְחַלְּלִים
  chosen: profaning
  alternatives:
  - desecrating
  - violating
  lexicon: HALOT
  rationale: חלל in this stem means to profane or treat as common what is holy. 'Profaning'
    preserves the holiness contrast more explicitly than 'violating.'
- source_word: אֶת יוֹם הַשַּׁבָּת
  chosen: the Sabbath day
  alternatives:
  - the day of the Sabbath
  - the Sabbath
  lexicon: HALOT
  rationale: Idiomatic English for the Hebrew phrase. 'Sabbath day' preserves both
    יוֹם and שַׁבָּת without sounding wooden.
