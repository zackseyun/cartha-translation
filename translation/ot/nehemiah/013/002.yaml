theological_decisions:
- issue: Gendered covenantal designation
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The Hebrew explicitly uses a masculine filial expression. Per the project's
    gender-accurate policy, the translation preserves that form rather than neutralizing
    it, while still using natural English.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Collective singular versus English distributive plural in the curse clause
  chosen_reading: to curse them
  alternative_readings:
  - to curse him
  rationale: The Hebrew singular suffix likely treats Israel as a collective singular,
    but English readers would naturally understand the object as the people of Israel
    in the plural. The main text uses clear English while preserving the more formal
    singular in a footnote to maintain transparency.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
