id: NEH.13.2
reference: Nehemiah 13:2
source:
  edition: WLC
  text: כִּ֣י לֹ֧א קִדְּמ֛וּ אֶת בְּנֵ֥י יִשְׂרָאֵ֖ל בַּ/לֶּ֣חֶם וּ/בַ/מָּ֑יִם וַ/יִּשְׂכֹּ֨ר
    עָלָ֤י/ו אֶת בִּלְעָם֙ לְ/קַֽלְל֔/וֹ וַ/יַּהֲפֹ֧ךְ אֱלֹהֵ֛י/נוּ הַ/קְּלָלָ֖ה לִ/בְרָכָֽה־־׃
translation:
  text: because they did not meet the sons of Israel with bread and water, and he
    hired Balaam against them to curse them, but our God turned the curse into a blessing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''to curse him,'' with Israel treated as a collective singular.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קִדְּמוּ
  chosen: did not meet
  alternatives:
  - did not come before
  - did not welcome
  - did not provide for
  lexicon: HALOT
  rationale: The verb קדמ in this context refers to going out to meet or receive someone.
    'Did not meet' preserves the concrete action and fits the following instrumental
    phrase 'with bread and water.' 'Welcome' is interpretive; 'provide for' is too
    narrow.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: A more formal rendering preserves the Hebrew expression and follows the
    project's gender-accurate principle. 'Israelites' is idiomatic but loses the explicit
    filial wording.
- source_word: בַּלֶּחֶם וּבַמָּיִם
  chosen: with bread and water
  alternatives:
  - with food and water
  lexicon: HALOT
  rationale: The Hebrew names the staple provisions specifically. 'Bread and water'
    is natural English and preserves the allusion to Deuteronomy 23:4.
- source_word: וַיִּשְׂכֹּר עָלָיו אֶת בִּלְעָם
  chosen: he hired Balaam against them
  alternatives:
  - they hired Balaam against them
  - he hired Balaam to oppose them
  lexicon: HALOT
  rationale: The singular verb with singular pronominal object is best represented
    by 'he hired Balaam,' likely referring to Balak in the underlying historical episode.
    Since the verse summarizes a collective offense by Ammon and Moab, English can
    retain the singular without forcing an explanatory plural.
- source_word: לְקַלְלוֹ
  chosen: to curse them
  alternatives:
  - to curse him
  lexicon: HALOT
  rationale: The Hebrew suffix is singular ('to curse him'), but the referent is the
    collective Israel represented as a singular entity. In English, 'them' communicates
    the intended object more clearly in this summary context. The singular alternative
    is worth preserving in a footnote because it reflects the Hebrew form more directly.
- source_word: וַיַּהֲפֹךְ
  chosen: turned
  alternatives:
  - reversed
  - changed
  lexicon: HALOT
  rationale: '''Turned'' is the most direct and idiomatic rendering for the verb in
    this construction, preserving the sense of transformation.'
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: The possessive suffix is explicit and should be retained.
- source_word: הַקְּלָלָה לִבְרָכָה
  chosen: the curse into a blessing
  alternatives:
  - the curse to blessing
  lexicon: HALOT
  rationale: This is a standard Hebrew transformation expression. 'Into a blessing'
    is idiomatic English and preserves the contrast.
