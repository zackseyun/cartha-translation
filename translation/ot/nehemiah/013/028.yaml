id: NEH.13.28
reference: Nehemiah 13:28
source:
  edition: WLC
  text: וּ/מִ/בְּנֵ֨י יוֹיָדָ֤ע בֶּן אֶלְיָשִׁיב֙ הַ/כֹּהֵ֣ן הַ/גָּד֔וֹל חָתָ֖ן לְ/סַנְבַלַּ֣ט
    הַ/חֹרֹנִ֑י וָ/אַבְרִיחֵ֖/הוּ מֵ/עָלָֽ/י־׃
translation:
  text: And one of the sons of Joiada son of Eliashib the high priest was a son-in-law
    of Sanballat the Horonite, so I drove him away from me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more broadly, 'was related by marriage to Sanballat.' The Hebrew term
      can denote a marriage relation, but in this context 'son-in-law' is the most
      specific natural reading.
    reason: lexical_alternative
  - marker: b
    text: Or 'I chased him away' or 'I banished him.' The Hebrew verb emphasizes forcible
      removal; the exact administrative form of the action is not specified.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִבְּנֵי
  chosen: And one of the sons of
  alternatives:
  - And from the sons of
  - And one from among the sons of
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition with בנים yields an idiom meaning
    'and one of the sons of' rather than a strictly spatial 'from the sons of.' This
    is the most natural English equivalent while preserving the partitive sense.
- source_word: יוֹיָדָע
  chosen: Joiada
  alternatives:
  - Jehoiada
  rationale: Personal name transliterated by standard English convention. 'Joiada'
    closely reflects the Hebrew form here.
- source_word: בֶּן אֶלְיָשִׁיב
  chosen: son of Eliashib
  lexicon: HALOT
  rationale: Straightforward filial construction; retained formally for genealogical
    clarity.
- source_word: הַכֹּהֵן הַגָּדוֹל
  chosen: the high priest
  alternatives:
  - the great priest
  lexicon: HALOT
  rationale: Established and accurate rendering of the Hebrew title for Israel's chief
    priest. 'Great priest' would be overly literal and unnatural in English.
- source_word: חָתָן לְסַנְבַלַּט
  chosen: was a son-in-law of Sanballat
  alternatives:
  - was related by marriage to Sanballat
  lexicon: HALOT
  rationale: חתן in this construction denotes a marriage relation, specifically 'son-in-law'
    in context. This is more precise than the broader 'related by marriage.'
- source_word: הַחֹרֹנִי
  chosen: the Horonite
  rationale: Gentilic/title retained by transliteration, as with place-based identifiers
    elsewhere in narrative texts.
- source_word: וָאַבְרִיחֵהוּ
  chosen: so I drove him away
  alternatives:
  - and I chased him away
  - and I banished him
  lexicon: HALOT
  rationale: The Hiphil of ברח here conveys causing someone to flee or sending him
    away forcibly. 'Drove him away' captures the force without overstating a formal
    legal banishment.
- source_word: מֵעָלָי
  chosen: from me
  alternatives:
  - from my presence
  - away from me
  lexicon: HALOT
  rationale: Literally 'from upon me,' idiomatically meaning removal from Nehemiah's
    presence or sphere. 'From me' is concise and faithful; the expulsion nuance is
    already carried by the verb.
