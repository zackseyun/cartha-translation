id: NEH.13.9
reference: Nehemiah 13:9
source:
  edition: WLC
  text: וָ/אֹ֣מְרָ֔/ה וַֽ/יְטַהֲר֖וּ הַ/לְּשָׁכ֑וֹת וָ/אָשִׁ֣יבָ/ה שָּׁ֗ם כְּלֵי֙
    בֵּ֣ית הָ/אֱלֹהִ֔ים אֶת הַ/מִּנְחָ֖ה וְ/הַ/לְּבוֹנָֽה־׃פ
translation:
  text: Then I gave the order, and they cleansed the chambers; and I brought back
    there the vessels of the house of God, with the grain offering and the frankincense.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Then I said' or 'Then I commanded.' The Hebrew verb is simply 'I said,'
      but in context it introduces an order that was carried out.
    reason: lexical_alternative
  - marker: b
    text: '''Cleansed'' may also be rendered ''purified,'' reflecting the ritual as
      well as physical sense of the Hebrew verb.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמְרָה
  chosen: Then I gave the order
  alternatives:
  - Then I said
  - Then I commanded
  lexicon: HALOT
  rationale: From אמר in first person with prefixed waw. In context Nehemiah is issuing
    an instruction that results in action, so 'gave the order' makes the force explicit
    in natural English without overparaphrasing. 'Then' reflects the narrative waw
    sequence.
- source_word: וַיְטַהֲרוּ
  chosen: they cleansed
  alternatives:
  - they purified
  - they cleaned
  lexicon: HALOT
  rationale: From טהר, commonly used for ritual or ceremonial cleansing as well as
    removal of impurity. 'Cleansed' preserves both physical and cultic nuance better
    than merely 'cleaned.'
- source_word: הַלְּשָׁכוֹת
  chosen: the chambers
  alternatives:
  - the rooms
  - the storerooms
  lexicon: HALOT
  rationale: לשכה refers to temple chambers/rooms. 'Chambers' is a standard and suitably
    formal rendering for temple precinct rooms; 'storerooms' is possible from context
    but slightly too specific for the noun itself here.
- source_word: וָאָשִׁיבָה שָּׁם
  chosen: and I brought back there
  alternatives:
  - and I restored there
  - and I returned there
  lexicon: HALOT
  rationale: From שוב in the causative sense, 'bring back/restore.' Because the direct
    object is temple items previously displaced, 'brought back there' best captures
    the concrete action and the adverb שם.
- source_word: כְּלֵי בֵּית הָאֱלֹהִים
  chosen: the vessels of the house of God
  alternatives:
  - the articles of the house of God
  - the utensils of the house of God
  - the vessels of God's house
  lexicon: HALOT
  rationale: כְּלִי is a broad term for implements/articles/vessels. In temple context,
    'vessels' is idiomatic and preserves cultic register. 'House of God' is retained
    rather than simplified to 'temple' to reflect the Hebrew expression.
- source_word: אֶת הַמִּנְחָה
  chosen: with the grain offering
  alternatives:
  - the grain offering
  - the offering
  lexicon: HALOT
  rationale: 'מִנְחָה in cultic context specifically denotes a grain offering/tribute
    offering. ''Grain offering'' is the clearest established English equivalent. Rendering
    with ''with'' in English reflects the appositional/additional sense after the
    vessels: the vessels were brought back along with the grain offering.'
- source_word: וְהַלְּבוֹנָה
  chosen: and the frankincense
  alternatives:
  - and the incense
  lexicon: HALOT
  rationale: לְבוֹנָה specifically denotes frankincense, not incense generically.
    The more precise term should be preserved.
