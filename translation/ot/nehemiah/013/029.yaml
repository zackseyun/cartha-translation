theological_decisions:
- issue: Whether the prayer asks God to remember the offenders favorably or unfavorably
  chosen_reading: Unfavorable remembrance in view of their defilement
  alternative_readings:
  - A neutral 'remember them' without explicit judgment
  rationale: In Nehemiah, appeals for God to 'remember' can be positive or negative
    depending on context. Here the following accusation of defiling the priesthood
    and covenant makes the sense judicial rather than favorable. The translation preserves
    this by adding a causal clause rather than altering the imperative itself.
  doctrine_reference: Translation philosophy §1, §3
- issue: Scope of 'the covenant of the priesthood and the Levites'
  chosen_reading: A covenant pertaining to the priesthood and the Levites together
  alternative_readings:
  - The covenant of the priesthood, and separately the Levites
  - The covenant with the priests and Levites
  rationale: The Hebrew syntax most naturally links 'the Levites' with 'the covenant
    of the priesthood,' but the exact genitival nuance is compressed. The main text
    keeps the structure close to the Hebrew without overresolving the relationship.
  doctrine_reference: Translation philosophy §3, §5
