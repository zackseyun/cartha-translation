id: NEH.13.29
reference: Nehemiah 13:29
source:
  edition: WLC
  text: זָכְרָ֥/ה לָ/הֶ֖ם אֱלֹהָ֑/י עַ֚ל גָּאֳלֵ֣י הַ/כְּהֻנָּ֔ה וּ/בְרִ֥ית הַ/כְּהֻנָּ֖ה
    וְ/הַ/לְוִיִּֽם׃
translation:
  text: Remember them, my God, because they have defiled the priesthood and the covenant
    of the priesthood and the Levites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Remember them, my God, concerning the defilers of the
      priesthood and the covenant of the priesthood and the Levites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זָכְרָה
  chosen: Remember
  alternatives:
  - Remember against them
  - Take note of them
  lexicon: HALOT
  rationale: Imperative/jussive-like appeal to God, common in Nehemiah's prayers.
    English imperative 'Remember' best preserves the direct petition. The prepositional
    phrase that follows can make the sense negative, but the verb itself remains 'remember.'
- source_word: לָהֶם
  chosen: them
  alternatives:
  - against them
  - for them
  lexicon: HALOT
  rationale: The preposition ל with pronoun after זכר can be rendered simply 'them,'
    but in this context of judgment it carries an adverse sense. That negative force
    is brought out in English by the following causal clause rather than by overtranslating
    the pronoun itself.
- source_word: אֱלֹהַי
  chosen: my God
  lexicon: HALOT
  rationale: Construct form with first-person singular suffix; Nehemiah's characteristic
    prayer address is naturally rendered 'my God.'
- source_word: עַל
  chosen: because
  alternatives:
  - for
  - concerning
  - on account of
  lexicon: HALOT
  rationale: 'Here עַל introduces the grounds for the prayer: God is asked to remember
    them on account of their offense. ''Because'' communicates the causal force in
    natural English.'
- source_word: גָּאֳלֵי
  chosen: they have defiled
  alternatives:
  - defilers of
  - polluters of
  - those who have desecrated
  lexicon: HALOT
  rationale: From גאל in the sense 'defile, pollute' (not the distinct root 'redeem').
    Because the Hebrew form is a participle functioning substantivally, English can
    render either nominally ('defilers of') or verbally. A verbal clause is clearer
    and more natural in context.
- source_word: הַכְּהֻנָּה
  chosen: the priesthood
  alternatives:
  - the priestly office
  - the priests
  lexicon: HALOT
  rationale: Abstract noun referring to the institution/status of priesthood, not
    merely individual priests. 'Priesthood' best matches the Hebrew.
- source_word: וּבְרִית הַכְּהֻנָּה
  chosen: the covenant of the priesthood
  alternatives:
  - the priestly covenant
  - the covenant with the priests
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the genitival relationship and avoids
    prematurely specifying whether the covenant is with priests or pertains to priesthood
    as an institution. 'Priestly covenant' is possible but slightly more interpretive.
- source_word: וְהַלְוִיִּם
  chosen: and the Levites
  alternatives:
  - and of the Levites
  lexicon: HALOT
  rationale: The phrase is coordinated with 'the covenant of the priesthood,' likely
    meaning 'the covenant of the priesthood and the Levites.' English retains the
    coordination straightforwardly. The repeated 'of' is implicit in English syntax.
