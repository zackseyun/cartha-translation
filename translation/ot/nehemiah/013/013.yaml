theological_decisions:
- issue: Gendered kinship term אֲחֵיהֶם
  chosen_reading: their brothers
  alternative_readings:
  - their fellow Israelites
  - their kinsmen
  rationale: The source uses a masculine plural kinship term. Following the project's
    gender-accurate policy, the translation retains 'brothers' rather than flattening
    to a gender-neutral collective. The broader referent can be inferred from context,
    but the wording should reflect the Hebrew form.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
