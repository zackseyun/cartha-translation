id: NEH.13.13
reference: Nehemiah 13:13
source:
  edition: WLC
  text: וָ/אוֹצְרָ֣/ה עַל א֠וֹצָרוֹת שֶׁלֶמְיָ֨ה הַ/כֹּהֵ֜ן וְ/צָד֣וֹק הַ/סּוֹפֵ֗ר
    וּ/פְדָיָה֙ מִן הַ/לְוִיִּ֔ם וְ/עַל יָדָ֔/ם חָנָ֥ן בֶּן זַכּ֖וּר בֶּן מַתַּנְיָ֑ה
    כִּ֤י נֶאֱמָנִים֙ נֶחְשָׁ֔בוּ וַ/עֲלֵי/הֶ֖ם לַ/חֲלֹ֥ק לַ/אֲחֵי/הֶֽם־־־־־׃פ
translation:
  text: And I appointed over the storerooms Shelemiah the priest, Zadok the scribe,
    and Pedaiah from the Levites, and at their side Hanan son of Zaccur, son of Mattaniah,
    because they were considered faithful; and it was upon them to distribute to their
    brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under their direction' for 'at their side'; the Hebrew idiom can indicate
      close association or subordinate service.
    reason: lexical_alternative
  - marker: b
    text: Or 'regarded as trustworthy' for 'considered faithful.'
    reason: lexical_alternative
  - marker: c
    text: '''Brothers'' renders the masculine Hebrew term; here it refers to their
      fellow members of the community.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹצְרָה
  chosen: I appointed
  alternatives:
  - I made treasurers
  - I put in charge
  lexicon: HALOT
  rationale: The form is from אצר in the causative/appointive sense here, governing
    עַל אֹצָרוֹת ('over the storerooms'). In context Nehemiah is assigning officials,
    not merely storing goods. 'I appointed' is clear modern English and fits the administrative
    action.
- source_word: עַל אֹצָרוֹת
  chosen: over the storerooms
  alternatives:
  - over the treasuries
  - in charge of the storehouses
  lexicon: HALOT
  rationale: אֹצָרוֹת can denote treasuries, storehouses, or storerooms. Given the
    immediate context of tithes and provisions being gathered and distributed, 'storerooms'
    best conveys physical storage rooms in the temple complex.
- source_word: שֶׁלֶמְיָה הַכֹּהֵן
  chosen: Shelemiah the priest
  rationale: Personal name transliterated; title translated per project philosophy.
- source_word: צָדוֹק הַסֹּפֵר
  chosen: Zadok the scribe
  alternatives:
  - Zadok the secretary
  lexicon: HALOT
  rationale: סֹפֵר can mean scribe or secretary/official. 'Scribe' is the standard
    and sufficiently broad rendering, preserving the formal title without over-specifying
    bureaucratic function.
- source_word: וּפְדָיָה מִן הַלְוִיִּם
  chosen: and Pedaiah from the Levites
  alternatives:
  - and Pedaiah, one of the Levites
  - and Pedaiah the Levite
  lexicon: HALOT
  rationale: The Hebrew literally says 'from the Levites.' This likely identifies
    his group membership. 'From the Levites' stays close to the wording while remaining
    natural.
- source_word: וְעַל יָדָם
  chosen: and at their side
  alternatives:
  - and under them
  - and alongside them
  - and by their hand
  lexicon: HALOT
  rationale: The idiom עַל יָד can indicate being at someone's side, under someone's
    direction, or in association with them. Here Hanan appears as an assistant or
    subordinate associate to the named officials. 'At their side' preserves the relational
    nuance without overcommitting to hierarchy.
- source_word: חָנָן בֶּן זַכּוּר בֶּן מַתַּנְיָה
  chosen: Hanan son of Zaccur, son of Mattaniah
  rationale: Names are transliterated by standard convention; genealogy rendered straightforwardly.
- source_word: כִּי נֶאֱמָנִים נֶחְשָׁבוּ
  chosen: because they were considered faithful
  alternatives:
  - for they were regarded as trustworthy
  - because they were counted reliable
  lexicon: HALOT
  rationale: נֶאֱמָנִים denotes reliability/faithfulness; נֶחְשָׁבוּ adds the sense
    of being reckoned or regarded as such. 'Considered faithful' preserves both the
    evaluative and character dimensions.
- source_word: וַעֲלֵיהֶם
  chosen: and it was upon them
  alternatives:
  - and they were responsible
  - and upon them was the duty
  lexicon: HALOT
  rationale: The prepositional phrase marks assigned responsibility. The chosen rendering
    keeps the Hebrew structure while remaining intelligible in English.
- source_word: לַחֲלֹק
  chosen: to distribute
  alternatives:
  - to divide
  - to apportion
  lexicon: HALOT
  rationale: In this provisioning context, חלק means distributing shares or portions,
    not merely dividing abstractly. 'Distribute' is the most natural contextual equivalent.
- source_word: לַאֲחֵיהֶם
  chosen: to their brothers
  alternatives:
  - to their fellow Levites
  - to their kinsmen
  - to their brothers and companions
  lexicon: HALOT
  rationale: The Hebrew literally says 'their brothers.' Per gender-accurate philosophy,
    the masculine kinship term is retained. In context it refers to fellow community
    members/ministering kin, but the text itself does not specify Levites only here,
    so the more literal 'brothers' is preferred.
