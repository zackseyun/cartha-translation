id: NEH.13.30
reference: Nehemiah 13:30
source:
  edition: WLC
  text: וְ/טִֽהַרְתִּ֖י/ם מִ/כָּל נֵכָ֑ר וָ/אַעֲמִ֧ידָ/ה מִשְׁמָר֛וֹת לַ/כֹּהֲנִ֥ים
    וְ/לַ/לְוִיִּ֖ם אִ֥ישׁ בִּ/מְלַאכְתּֽ/וֹ־׃
translation:
  text: So I cleansed them from everything foreign, and I assigned duties for the
    priests and for the Levites, each in his work,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'watches' or 'service assignments' for the priests and Levites.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְטִהַרְתִּים
  chosen: So I cleansed them
  alternatives:
  - And I purified them
  - And I cleansed them
  lexicon: HALOT
  rationale: טהר in the piel commonly means to cleanse/purify. 'Cleansed' is natural
    modern English and fits Nehemiah's reform context. The prefixed conjunction is
    rendered 'So' to reflect narrative/resultative flow from the preceding actions,
    though 'and' is also possible. The 3mp suffix indicates a direct object 'them,'
    referring most naturally to the priestly/Levitical community or broader community
    just discussed.
- source_word: מִכָּל נֵכָר
  chosen: from everything foreign
  alternatives:
  - from all foreignness
  - from every foreign thing
  - from all that was foreign
  lexicon: HALOT
  rationale: נֵכָר denotes what is foreign/alien. In context it refers broadly to
    foreign contamination or foreign elements rather than necessarily foreign people
    alone. 'Everything foreign' preserves the breadth of the Hebrew and avoids over-specifying
    the object.
- source_word: וָאַעֲמִידָה
  chosen: and I assigned
  alternatives:
  - and I appointed
  - and I established
  lexicon: HALOT
  rationale: 'The hiphil of עמד here has a causative/administrative sense: to set
    in place, appoint, establish. ''Assigned'' fits the following object ''duties/watches''
    and communicates Nehemiah''s administrative ordering in idiomatic English.'
- source_word: מִשְׁמָרוֹת
  chosen: duties
  alternatives:
  - watches
  - divisions
  - service assignments
  lexicon: HALOT
  rationale: מִשְׁמָרוֹת can mean watches, charges, divisions, or appointed duties.
    In priestly/Levitical context it refers to ordered service responsibilities. 'Duties'
    is clear and readable; 'watches' is more literal but less transparent in modern
    English, so it is preserved in a footnote.
- source_word: לַכֹּהֲנִים וְלַלְוִיִּם
  chosen: for the priests and for the Levites
  alternatives:
  - for the priests and the Levites
  lexicon: HALOT
  rationale: The paired groups are retained explicitly. Repeating 'for' reflects the
    Hebrew prepositions and keeps the structure clear.
- source_word: אִישׁ
  chosen: each
  alternatives:
  - each man
  - every one
  lexicon: HALOT
  rationale: Although אִישׁ is formally masculine singular, here it distributively
    marks each individual within the priestly and Levitical groups. 'Each' conveys
    the distributive force naturally in English without awkwardness; the representative
    masculine sense is not individually salient here.
- source_word: בִּמְלַאכְתּוֹ
  chosen: in his work
  alternatives:
  - in his service
  - at his task
  lexicon: HALOT
  rationale: מְלָאכָה is work, occupation, task, or service. 'In his work' is a close
    rendering and suits the distributive phrase 'each in his work,' referring to each
    person's assigned sphere of service.
