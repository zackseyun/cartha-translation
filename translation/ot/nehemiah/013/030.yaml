theological_decisions:
- issue: Scope of 'them' and 'everything foreign'
  chosen_reading: The verse speaks of cleansing the relevant community from foreign
    elements/defilement in the context of Nehemiah's covenant reforms, without specifying
    ethnicity alone.
  alternative_readings:
  - I cleansed them from all foreigners
  - I purified the priests and Levites from every foreign woman
  rationale: The Hebrew object and complement are broader than these narrower interpretations.
    Given the immediate context of mixed marriages and priestly compromise, the reform
    concerns covenantal purity, but the wording here should not be narrowed beyond
    the text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve what the text says without importing more specific doctrinal
    or interpretive claims.'
- issue: Rendering of distributive masculine אִישׁ
  chosen_reading: each in his work
  alternative_readings:
  - each man in his work
  rationale: This follows the gender-accurate principle by conveying the distributive
    force without forcing an unnecessarily marked English masculine noun where the
    sense is role-distributive.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
