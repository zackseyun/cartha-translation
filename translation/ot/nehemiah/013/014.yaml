theological_decisions:
- issue: Rendering of חֲסָדַי in a first-person prayer
  chosen_reading: my acts of covenant faithfulness
  alternative_readings:
  - my good deeds
  - my kindnesses
  - my loyal deeds
  rationale: The verse is not making a doctrine of meritorious works before God, but
    Nehemiah is asking God to remember his loyal actions in relation to temple reform.
    Rendering חסד with covenantal nuance preserves the Hebrew's theological weight
    without overstating self-righteous merit.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Potentially self-meritorious tone of the prayer
  chosen_reading: Retain the direct appeal for remembrance without softening it
  alternative_readings:
  - Paraphrasing to reduce apparent self-reference
  rationale: The Hebrew plainly presents Nehemiah asking God to remember what he has
    done. The translation should preserve that tension rather than mute it for theological
    comfort.
  doctrine_reference: Translation philosophy §3
