id: NEH.13.14
reference: Nehemiah 13:14
source:
  edition: WLC
  text: זָכְרָ/ה לִּ֥/י אֱלֹהַ֖/י עַל זֹ֑את וְ/אַל תֶּ֣מַח חֲסָדַ֗/י אֲשֶׁ֥ר עָשִׂ֛יתִי
    בְּ/בֵ֥ית אֱלֹהַ֖/י וּ/בְ/מִשְׁמָרָֽי/ו־־־׃
translation:
  text: Remember me for this, my God, and do not wipe out my acts of covenant faithfulness
    that I have done for the house of my God and for its services.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not blot out my loyal deeds' or 'my kindnesses.' The Hebrew word
      can carry the sense of kindness, loyalty, or covenant faithfulness.
    reason: lexical_alternative
  - marker: b
    text: Or 'and for its duties/charges,' referring to the responsibilities connected
      with the house of God.
    reason: lexical_alternative
lexical_decisions:
- source_word: זָכְרָה לִּי
  chosen: Remember me
  alternatives:
  - Remember for me
  - Call me to mind
  lexicon: HALOT
  rationale: Imperative/jussive prayer addressed to God with ל marking the person
    remembered; idiomatic English is 'Remember me.'
- source_word: אֱלֹהַי
  chosen: my God
  lexicon: HALOT
  rationale: First-person singular suffix makes the personal address explicit; retained
    in direct prayer.
- source_word: עַל זֹאת
  chosen: for this
  alternatives:
  - concerning this
  - because of this
  lexicon: HALOT
  rationale: עַל with demonstrative here points to the matter just described; 'for
    this' is natural and preserves the causal/referential sense.
- source_word: וְאַל תֶּמַח
  chosen: and do not wipe out
  alternatives:
  - and do not blot out
  - and do not erase
  lexicon: HALOT
  rationale: מחה commonly means wipe/blot out. 'Wipe out' is readable modern English
    while preserving the metaphor of removal from record or remembrance.
- source_word: חֲסָדַי
  chosen: my acts of covenant faithfulness
  alternatives:
  - my loyal deeds
  - my good deeds
  - my kindnesses
  lexicon: HALOT
  rationale: חסד can denote covenant loyalty, kindness, or faithful love. With first-person
    suffix and relative clause describing what Nehemiah has done, the plural refers
    to deeds expressing loyalty. 'Acts of covenant faithfulness' preserves the covenantal
    nuance better than the flatter 'good deeds.'
- source_word: אֲשֶׁר עָשִׂיתִי
  chosen: that I have done
  alternatives:
  - which I did
  lexicon: HALOT
  rationale: Straightforward relative clause modifying חֲסָדַי; present perfect English
    fits the prayerful retrospective context.
- source_word: בְּבֵית אֱלֹהַי
  chosen: for the house of my God
  alternatives:
  - in the house of my God
  - at the house of my God
  lexicon: HALOT
  rationale: Though בְ is formally 'in/at,' with עשה and temple-related service the
    sense is work done on behalf of or in connection with the temple. 'For the house
    of my God' communicates purpose and involvement more clearly in English.
- source_word: וּבְמִשְׁמָרָיו
  chosen: and for its services
  alternatives:
  - and for its duties
  - and for its observances
  - and for its charges
  lexicon: HALOT
  rationale: מִשְׁמָר can mean charge, duty, obligation, or service. In temple context
    it refers to the ordered responsibilities connected with the house of God. 'Its
    services' is natural English and fits the cultic context; 'its duties' is possible
    but less idiomatic here.
