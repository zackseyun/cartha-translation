theological_decisions:
- issue: Rendering of חסד in a prayer for mercy
  chosen_reading: steadfast love
  alternative_readings:
  - lovingkindness
  - covenant love
  - mercy
  rationale: The verse appeals to God's loyal, abundant covenantal mercy. 'Steadfast
    love' preserves both affection and covenant constancy without narrowing the term
    to mere emotion or generic mercy.
  doctrine_reference: Translation philosophy §5; readable modern English with theological
    weight preserved
