id: NEH.13.22
reference: Nehemiah 13:22
source:
  edition: WLC
  text: וָ/אֹמְרָ֣/ה לַ/לְוִיִּ֗ם אֲשֶׁ֨ר יִֽהְי֤וּ מִֽטַּהֲרִים֙ וּ/בָאִים֙ שֹׁמְרִ֣ים
    הַ/שְּׁעָרִ֔ים לְ/קַדֵּ֖שׁ אֶת י֣וֹם הַ/שַּׁבָּ֑ת גַּם זֹאת֙ זָכְרָ/ה לִּ֣/י אֱלֹהַ֔/י
    וְ/ח֥וּסָ/ה עָלַ֖/י כְּ/רֹ֥ב חַסְדֶּֽ/ךָ־־־׃פ
translation:
  text: And I told the Levites that they should purify themselves and come to guard
    the gates, to keep the Sabbath day holy. Remember this also in my favor, my God,
    and spare me according to the greatness of your steadfast love.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Remember me for this also, my God.' The Hebrew idiom can attach the
      benefactive sense either to Nehemiah himself or to the deed just mentioned.
    reason: lexical_alternative
  - marker: b
    text: '''Steadfast love'' translates Hebrew hesed, often referring to God''s loyal
      covenant love and mercy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמְרָה
  chosen: And I told
  alternatives:
  - And I said
  - And I commanded
  lexicon: HALOT
  rationale: Qal wayyiqtol of אמר introduces Nehemiah's direct action. 'Told' is natural
    modern English and fits the following content clause without overstating the force
    as 'commanded,' though the context is administrative instruction.
- source_word: לַלְוִיִּם
  chosen: the Levites
  alternatives:
  - to the Levites
  lexicon: HALOT
  rationale: Definite direct object/indirect object phrase referring to the Levitical
    personnel. English idiom after 'told' can omit the preposition while preserving
    sense.
- source_word: אֲשֶׁר יִהְיוּ מִטַּהֲרִים
  chosen: that they should purify themselves
  alternatives:
  - who were to purify themselves
  - that they were to be purified
  lexicon: HALOT
  rationale: The relative particle plus היה with participle expresses intended or
    expected action. Hitpael participle of טהר is reflexive/middle here, so 'purify
    themselves' best captures the sense.
- source_word: וּבָאִים
  chosen: and come
  alternatives:
  - and enter
  - and then come
  lexicon: HALOT
  rationale: Simple participial continuation of the Levites' action sequence. 'Come'
    is the broadest and most natural rendering in context.
- source_word: שֹׁמְרִים הַשְּׁעָרִים
  chosen: to guard the gates
  alternatives:
  - keeping the gates
  - watching the gates
  lexicon: HALOT
  rationale: Though literally 'guarding the gates,' English smoothness favors an infinitival
    expression after 'come.' 'Guard' conveys active custodial responsibility better
    than merely 'watch.'
- source_word: לְקַדֵּשׁ אֶת יוֹם הַשַּׁבָּת
  chosen: to keep the Sabbath day holy
  alternatives:
  - to sanctify the Sabbath day
  - to consecrate the Sabbath day
  lexicon: HALOT
  rationale: קדשׁ means make/set apart as holy. In English, with 'Sabbath day,' 'keep
    ... holy' is idiomatic and accurately conveys the purpose of guarding the gates
    so that the day remains sanctified.
- source_word: גַּם זֹאת
  chosen: this also
  alternatives:
  - this too
  - also this
  lexicon: HALOT
  rationale: Nehemiah adds this deed to prior acts for which he asks divine remembrance.
    'This also' preserves the additive emphasis.
- source_word: זָכְרָה לִּי
  chosen: Remember this also in my favor
  alternatives:
  - Remember me for this also
  - Remember this also for me
  lexicon: HALOT
  rationale: The idiom 'remember for me' in this prayer context asks God to take note
    beneficially of Nehemiah's action. 'In my favor' makes the benefactive nuance
    explicit in natural English.
- source_word: אֱלֹהַי
  chosen: my God
  lexicon: HALOT
  rationale: Straightforward possessive form in direct address.
- source_word: וְחוּסָה עָלַי
  chosen: and spare me
  alternatives:
  - and have compassion on me
  - and pity me
  lexicon: HALOT
  rationale: חוס in prayer language can mean spare, have pity, or show compassion.
    'Spare me' fits the penitential/request-for-mercy tone and pairs well with the
    following measure phrase.
- source_word: כְּרֹב חַסְדֶּךָ
  chosen: according to the greatness of your steadfast love
  alternatives:
  - according to your abundant lovingkindness
  - according to the abundance of your covenant love
  lexicon: HALOT
  rationale: רב with חסד expresses abundance/ greatness. 'Steadfast love' is a well-established
    and accurate rendering of חסד, preserving covenantal mercy without archaic 'lovingkindness.'
