id: NEH.13.27
reference: Nehemiah 13:27
source:
  edition: WLC
  text: וְ/לָ/כֶ֣ם הֲ/נִשְׁמַ֗ע לַ/עֲשֹׂת֙ אֵ֣ת כָּל הָ/רָעָ֤ה הַ/גְּדוֹלָה֙ הַ/זֹּ֔את
    לִ/מְעֹ֖ל בֵּֽ/אלֹהֵ֑י/נוּ לְ/הֹשִׁ֖יב נָשִׁ֥ים נָכְרִיּֽוֹת־׃
translation:
  text: Should we then listen to you and do all this great evil, acting unfaithfully
    against our God by marrying foreign women?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'obey you.' The Hebrew verb can carry the sense of heeding or complying
      with someone.
    reason: lexical_alternative
  - marker: b
    text: Literally 'causing foreign women to dwell'; in context this refers to taking
      them as wives.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲנִשְׁמַע
  chosen: Should we then listen to you
  alternatives:
  - Should we obey you
  - Should it be heard of you
  lexicon: HALOT
  rationale: The Niphal of שׁמע here is idiomatic and rhetorically asks whether the
    community should heed or comply with such behavior. 'Listen to you' preserves
    the verbal sense while fitting the rebuke. 'Obey you' is possible as an interpretive
    sharpening; 'Should it be heard of you' reflects another possible construal but
    fits the context less well than direct address.
- source_word: וְלָכֶם
  chosen: then ... to you
  alternatives:
  - and to you
  - concerning you
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition with 2mp pronoun likely functions
    in the rhetorical question as a dative/object of heeding, with the conjunction
    carried idiomatically as 'then' in English to mark continuation from the previous
    argument.
- source_word: לַעֲשׂוֹת אֵת כָּל
  chosen: and do all
  alternatives:
  - to do all
  - to commit all
  lexicon: HALOT
  rationale: עשה is the common verb 'do/make.' In this moral context 'do' is natural
    English; 'commit' would be more interpretive and is unnecessary since 'evil' already
    carries the moral force.
- source_word: הָרָעָה הַגְּדוֹלָה הַזֹּאת
  chosen: this great evil
  alternatives:
  - this great wrong
  - all this great evil
  lexicon: HALOT
  rationale: The phrase denotes a serious moral offense. 'This great evil' is a close
    and idiomatic rendering. Because כָּל precedes the phrase, the full English expression
    is 'all this great evil,' preserving the totalizing force.
- source_word: לִמְעֹל
  chosen: acting unfaithfully
  alternatives:
  - being unfaithful
  - committing trespass
  - breaking faith
  lexicon: HALOT
  rationale: מעל conveys breach of faith or treachery, often in covenantal contexts.
    'Acting unfaithfully' communicates the ongoing covenantal disloyalty in accessible
    English without importing overly technical terminology.
- source_word: בֵּאלֹהֵינוּ
  chosen: against our God
  alternatives:
  - with respect to our God
  - toward our God
  lexicon: HALOT
  rationale: With מעל, the preposition plus 'our God' is best rendered relationally
    as offense against God. 'Against our God' clearly expresses covenant violation.
- source_word: לְהֹשִׁיב
  chosen: by marrying
  alternatives:
  - by causing to dwell
  - by bringing in to live with us
  lexicon: HALOT
  rationale: The Hiphil of ישׁב literally means 'cause to dwell/settle,' but in this
    context with 'foreign women' it refers to taking them into the household as wives.
    'By marrying' gives the plain sense in natural English.
- source_word: נָשִׁים נָכְרִיּוֹת
  chosen: foreign women
  alternatives:
  - foreign wives
  - women from foreign peoples
  lexicon: HALOT
  rationale: The Hebrew is literally 'foreign women.' Since the marital sense is already
    conveyed by לְהֹשִׁיב, retaining 'foreign women' avoids redundancy while preserving
    the source wording.
