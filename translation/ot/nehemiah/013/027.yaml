theological_decisions:
- issue: Nature of the offense in לִמְעֹל בֵּאלֹהֵינוּ
  chosen_reading: covenantal unfaithfulness against God
  alternative_readings:
  - general wrongdoing against God
  - ritual trespass against God
  rationale: The verb מעל regularly carries the sense of breach of faith/treachery,
    often in covenantal settings. Rendering it as 'acting unfaithfully against our
    God' preserves the theological weight of covenant disloyalty without narrowing
    it to a merely ritual category.
  doctrine_reference: Translation philosophy §3, §6
