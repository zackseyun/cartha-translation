id: NEH.13.5
reference: Nehemiah 13:5
source:
  edition: WLC
  text: וַ/יַּ֨עַשׂ ל֜/וֹ לִשְׁכָּ֣ה גְדוֹלָ֗ה וְ/שָׁ֣ם הָי֪וּ לְ/פָנִ֟ים נֹ֠תְנִים
    אֶת הַ/מִּנְחָ֨ה הַ/לְּבוֹנָ֜ה וְ/הַ/כֵּלִ֗ים וּ/מַעְשַׂ֤ר הַ/דָּגָן֙ הַ/תִּיר֣וֹשׁ
    וְ/הַ/יִּצְהָ֔ר מִצְוַת֙ הַ/לְוִיִּ֔ם וְ/הַ/מְשֹׁרְרִ֖ים וְ/הַ/שֹּׁעֲרִ֑ים וּ/תְרוּמַ֖ת
    הַ/כֹּהֲנִֽים־׃
translation:
  text: He made for him a large chamber, where formerly they had put the grain offering,
    the frankincense, the vessels, and the tithe of grain, new wine, and oil—the portions
    commanded for the Levites, the singers, and the gatekeepers—and the contribution
    for the priests.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a large storeroom.' The Hebrew term can denote a chamber used for storage
      within the temple complex.
    reason: lexical_alternative
  - marker: b
    text: Or 'there they used to put formerly,' expressing customary past practice.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the commandment of the Levites, the singers, and the gatekeepers';
      the sense is the portions prescribed for them.
    reason: lexical_alternative
  - marker: d
    text: Or 'the heave offering for the priests.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִשְׁכָּה גְדוֹלָה
  chosen: a large chamber
  alternatives:
  - a large room
  - a large storeroom
  lexicon: HALOT
  rationale: לִשְׁכָּה denotes a chamber/room, often within temple precincts. 'Chamber'
    preserves the architectural/temple setting better than the more generic 'room';
    'large' straightforwardly renders גְדוֹלָה.
- source_word: וַיַּעַשׂ לוֹ
  chosen: He made for him
  alternatives:
  - He prepared for him
  - He provided for him
  lexicon: HALOT
  rationale: עשה with ל + pronoun naturally means 'made/prepared for him.' 'Made for
    him' is direct and preserves the concrete action; context implies preparation
    of space without over-paraphrasing.
- source_word: וְשָׁם הָיוּ לְפָנִים נֹתְנִים
  chosen: where formerly they had put
  alternatives:
  - and there formerly they used to put
  - where previously they placed
  lexicon: HALOT
  rationale: לְפָנִים here means 'formerly/previously.' The periphrastic sense with
    היה + participle conveys customary past action. 'Where formerly they had put'
    reads naturally in English while preserving the retrospective description.
- source_word: הַמִּנְחָה
  chosen: the grain offering
  alternatives:
  - the offering
  - the tribute offering
  lexicon: HALOT
  rationale: In temple-cult context, מִנְחָה is best rendered 'grain offering,' the
    standard cultic sense, rather than the broader 'offering' or the contextually
    less likely 'tribute.'
- source_word: הַלְּבוֹנָה
  chosen: the frankincense
  lexicon: HALOT
  rationale: לבונה specifically denotes frankincense in sacrificial/temple contexts.
- source_word: הַכֵּלִים
  chosen: the vessels
  alternatives:
  - the utensils
  - the articles
  lexicon: HALOT
  rationale: כֵּלִים in temple context refers to implements/articles used in service.
    'Vessels' is a conventional but still understandable rendering that fits sacred
    furnishings better than 'utensils'.
- source_word: מַעְשַׂר
  chosen: the tithe
  alternatives:
  - the tenth
  lexicon: HALOT
  rationale: מעשר is the established term for the tenth portion given under the law.
    'Tithe' is the clearest idiomatic equivalent.
- source_word: הַדָּגָן הַתִּירוֹשׁ וְהַיִּצְהָר
  chosen: grain, new wine, and oil
  alternatives:
  - grain, wine, and fresh oil
  lexicon: HALOT
  rationale: This triad is standard in the Hebrew Bible. דגן is grain; תירוש is commonly
    'new wine' rather than generic wine; יצהר denotes fresh oil, usually olive oil,
    but 'oil' is sufficient in English here.
- source_word: מִצְוַת הַלְוִיִּם וְהַמְשֹׁרְרִים וְהַשֹּׁעֲרִים
  chosen: the portions commanded for the Levites, the singers, and the gatekeepers
  alternatives:
  - the due prescribed for the Levites, the singers, and the gatekeepers
  - the commandment concerning the Levites, the singers, and the gatekeepers
  lexicon: HALOT
  rationale: 'The construct מִצְוַת here is elliptical: it refers to what was commanded/prescribed
    for these groups, not merely an abstract ''commandment.'' ''Portions commanded
    for'' makes explicit the sense demanded by the list of stored provisions.'
- source_word: תְרוּמַת הַכֹּהֲנִים
  chosen: the contribution for the priests
  alternatives:
  - the heave offering for the priests
  - the priests' contribution portion
  lexicon: HALOT
  rationale: תרומה is a contribution/offering set apart. 'Contribution' is accessible
    modern English; 'heave offering' is traditional but obscure for many readers and
    reflects ritual background not explicit in the immediate syntax.
