id: NEH.13.20
reference: Nehemiah 13:20
source:
  edition: WLC
  text: וַ/יָּלִ֨ינוּ הָ/רֹכְלִ֜ים וּ/מֹכְרֵ֧י כָל מִמְכָּ֛ר מִ/ח֥וּץ לִ/ירוּשָׁלִָ֖ם
    פַּ֥עַם וּ/שְׁתָּֽיִם־׃
translation:
  text: Then the merchants and sellers of every kind of goods spent the night outside
    Jerusalem once or twice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lodged outside Jerusalem once or twice.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'once and twice,' an idiom meaning 'once or twice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּלִינוּ
  chosen: spent the night
  alternatives:
  - lodged
  - stayed overnight
  lexicon: HALOT
  rationale: The verb from לון refers to passing the night or lodging. 'Spent the
    night' is natural modern English and preserves the temporal sense without implying
    permanent residence.
- source_word: הָרֹכְלִים
  chosen: the merchants
  alternatives:
  - the traders
  - the peddlers
  lexicon: HALOT
  rationale: רֹכֵל denotes a trader or merchant. 'Merchants' fits the commercial context
    and pairs well with the following participle for sellers.
- source_word: וּמֹכְרֵי כָל מִמְכָּר
  chosen: and sellers of every kind of goods
  alternatives:
  - and sellers of all merchandise
  - and vendors of every sort of wares
  lexicon: HALOT
  rationale: 'The phrase intensifies the commercial scope: sellers of any saleable
    item. ''Every kind of goods'' is idiomatic modern English while retaining the
    breadth of כָל מִמְכָּר.'
- source_word: מִחוּץ לִירוּשָׁלָם
  chosen: outside Jerusalem
  alternatives:
  - outside of Jerusalem
  - at the outside of Jerusalem
  lexicon: HALOT
  rationale: מִחוּץ marks location outside the city. 'Outside Jerusalem' is the clearest
    idiomatic rendering.
- source_word: פַּעַם וּשְׁתָּיִם
  chosen: once or twice
  alternatives:
  - one time and two
  - time and again
  lexicon: HALOT
  rationale: This idiom means 'once or twice,' referring to repeated occurrence on
    one or two occasions. 'Time and again' would overstate the frequency.
