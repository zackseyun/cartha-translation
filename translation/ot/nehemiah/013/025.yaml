id: NEH.13.25
reference: Nehemiah 13:25
source:
  edition: WLC
  text: וָ/אָרִ֤יב עִמָּ/ם֙ וָ/אֲקַֽלְלֵ֔/ם וָ/אַכֶּ֥ה מֵ/הֶ֛ם אֲנָשִׁ֖ים וָֽ/אֶמְרְטֵ֑/ם
    וָ/אַשְׁבִּיעֵ֣/ם בֵּֽ/אלֹהִ֗ים אִם תִּתְּנ֤וּ בְנֹֽתֵי/כֶם֙ לִ/בְנֵי/הֶ֔ם וְ/אִם
    תִּשְׂאוּ֙ מִ/בְּנֹ֣תֵי/הֶ֔ם לִ/בְנֵי/כֶ֖ם וְ/לָ/כֶֽם־־׃
translation:
  text: 'So I contended with them and cursed them, and I struck some of the men and
    pulled out their hair, and I made them swear by God: “You shall not give your
    daughters to their sons, nor take any of their daughters for your sons or for
    yourselves.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I put them under oath before God.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew, ''if you give ... and if you take ...''; in this oath context the
      sense is prohibitive: ''you shall not give ... nor take.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאָרִיב
  chosen: I contended
  alternatives:
  - I rebuked
  - I argued
  lexicon: HALOT
  rationale: ריב in this stem commonly denotes striving, contending, or bringing a
    case against someone. 'Contended' preserves the confrontational/judicial nuance
    better than the softer 'rebuked,' while remaining natural English.
- source_word: וָאֲקַלְלֵם
  chosen: cursed them
  alternatives:
  - pronounced a curse on them
  - reviled them
  lexicon: HALOT
  rationale: קלל here most naturally means to utter a curse against them, not merely
    to insult them. 'Cursed them' is the plainest rendering, though the exact force
    may include denunciation rather than magical imprecation.
- source_word: וָאַכֶּה מֵהֶם אֲנָשִׁים
  chosen: I struck some of the men
  alternatives:
  - I beat some of them
  - I struck men among them
  lexicon: HALOT
  rationale: 'The construction with מן indicates a subset: ''from them, men'' = ''some
    of the men among them.'' ''Struck'' is more literal and slightly less interpretively
    loaded than ''beat,'' while still conveying physical violence.'
- source_word: וָאֶמְרְטֵם
  chosen: pulled out their hair
  alternatives:
  - tore out their hair
  - plucked them
  lexicon: HALOT
  rationale: 'מרט refers to pulling/plucking hair. The object suffix likely refers
    to the offenders, with the implied object being hair. English requires the implied
    object to be made explicit: ''pulled out their hair.'''
- source_word: וָאַשְׁבִּיעֵם בֵּאלֹהִים
  chosen: I made them swear by God
  alternatives:
  - I put them under oath before God
  - I adjured them by God
  lexicon: HALOT
  rationale: The hiphil of שבע means to cause someone to swear, i.e., place under
    oath. The beth with 'God' is naturally rendered 'by God' in oath language. This
    is idiomatic and faithful.
- source_word: אִם תִּתְּנוּ
  chosen: You shall not give
  alternatives:
  - If you give
  - Do not give
  lexicon: HALOT
  rationale: After 'I made them swear,' אם introduces the oath content in a prohibitive
    sense rather than a simple conditional. English idiom is best represented by 'You
    shall not give,' reflecting oath formulation.
- source_word: בְּנֹתֵיכֶם לִבְנֵיהֶם
  chosen: your daughters to their sons
  alternatives:
  - your daughters for their sons
  lexicon: HALOT
  rationale: A straightforward marriage-giving formula. 'To their sons' is idiomatic
    English and preserves the directionality of the alliance.
- source_word: וְאִם תִּשְׂאוּ מִבְּנֹתֵיהֶם
  chosen: nor take any of their daughters
  alternatives:
  - nor marry any of their daughters
  - nor take wives from their daughters
  lexicon: HALOT
  rationale: נשא in marriage contexts means to take a wife. 'Take any of their daughters'
    preserves the Hebrew wording while making the marital sense clear from context.
- source_word: לִבְנֵיכֶם וְלָכֶם
  chosen: for your sons or for yourselves
  alternatives:
  - for your sons and for yourselves
  lexicon: HALOT
  rationale: The final phrase extends the prohibition both to arranging marriages
    for sons and to marrying such women personally. 'Or' fits the distributive force
    in English prohibition better than a wooden 'and.'
