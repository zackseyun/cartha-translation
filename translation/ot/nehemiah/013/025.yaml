theological_decisions:
- issue: Rendering Nehemiah's violent disciplinary actions without softening or amplifying
    them
  chosen_reading: Retain the direct report of cursing, striking, and pulling out hair
    in plain English
  alternative_readings:
  - Soften to verbal rebuke only
  - Amplify to severe beating beyond the text
  rationale: The verse narrates harsh covenant enforcement by Nehemiah. The translation
    should neither sanitize the violence nor intensify it beyond the Hebrew. This
    follows original-language primacy and avoids importing moral commentary into the
    translation itself.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Force of the oath formula introduced by אִם
  chosen_reading: 'Render as a prohibition within the oath: ''You shall not...'''
  alternative_readings:
  - Retain a literal 'if' clause in English
  - Render as simple imperative 'Do not...'
  rationale: In oath contexts, Hebrew אִם can introduce the sworn content elliptically.
    'You shall not...' best communicates the solemn oath force in readable modern
    English without obscuring the syntax's function.
  doctrine_reference: Translation philosophy §§1, 6
