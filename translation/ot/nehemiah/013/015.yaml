id: NEH.13.15
reference: Nehemiah 13:15
source:
  edition: WLC
  text: בַּ/יָּמִ֣ים הָ/הֵ֡מָּה רָאִ֣יתִי בִֽ/יהוּדָ֣ה דֹּֽרְכִֽים גִּתּ֣וֹת בַּ/שַּׁבָּ֡ת
    וּ/מְבִיאִ֣ים הָ/עֲרֵמ֣וֹת וְֽ/עֹמְסִ֪ים עַל הַ/חֲמֹרִ֟ים וְ/אַף יַ֜יִן עֲנָבִ֤ים
    וּ/תְאֵנִים֙ וְ/כָל מַשָּׂ֔א וּ/מְבִיאִ֥ים יְרוּשָׁלִַ֖ם בְּ/י֣וֹם הַ/שַּׁבָּ֑ת
    וָ/אָעִ֕יד בְּ/י֖וֹם מִכְרָ֥/ם צָֽיִד׀־׀־־־׃
translation:
  text: In those days I saw in Judah people treading winepresses on the Sabbath, and
    bringing in heaps of grain and loading them on donkeys—and also wine, grapes,
    figs, and every kind of load—and bringing them into Jerusalem on the Sabbath day.
    So I testified against them on the day they sold food.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'heaps' or 'piles'; the Hebrew does not explicitly say 'of grain,' though
      the context of harvest transport suggests produce.
    reason: lexical_alternative
  - marker: b
    text: Or 'I warned them' or 'I protested'; the Hebrew verb can carry the sense
      of solemn warning or testimony against wrongdoing.
    reason: lexical_alternative
  - marker: c
    text: Or 'provisions' or 'game'; the Hebrew word can refer more specifically to
      hunted food, but here likely means food being sold.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיָּמִים הָהֵמָּה
  chosen: In those days
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Idiomatic temporal frame; plural 'days' in Hebrew is naturally rendered
    'In those days' in English narrative.
- source_word: רָאִיתִי
  chosen: I saw
  alternatives:
  - I observed
  lexicon: HALOT
  rationale: Simple past perception verb; 'I saw' preserves the directness of Nehemiah's
    eyewitness report.
- source_word: בִּיהוּדָה
  chosen: in Judah
  alternatives:
  - throughout Judah
  lexicon: HALOT
  rationale: Locative preposition with the province/region name; 'in Judah' is the
    most straightforward rendering.
- source_word: דֹּרְכִים גִּתּוֹת
  chosen: people treading winepresses
  alternatives:
  - treading presses
  - pressing grapes in winepresses
  lexicon: HALOT
  rationale: The participle plus object denotes the activity of trampling in winepresses.
    'Winepresses' makes the agricultural context explicit in natural English.
- source_word: בַּשַּׁבָּת
  chosen: on the Sabbath
  alternatives:
  - on Sabbath
  lexicon: HALOT
  rationale: Standard rendering of the temporal phrase; the article is naturally represented
    in English as 'the Sabbath'.
- source_word: וּמְבִיאִים הָעֲרֵמוֹת
  chosen: and bringing in heaps of grain
  alternatives:
  - and bringing in heaps
  - and bringing in piles
  lexicon: HALOT
  rationale: עֲרֵמוֹת means heaps/piles. Because the next clause loads them on donkeys,
    the context suggests harvested produce; 'of grain' clarifies the referent idiomatically
    without changing the sense.
- source_word: וְעֹמְסִים עַל הַחֲמֹרִים
  chosen: and loading them on donkeys
  alternatives:
  - and putting loads on the donkeys
  - and burdening the donkeys with them
  lexicon: HALOT
  rationale: The participle means loading/burdening, and the object is understood
    from the previous phrase. 'Loading them on donkeys' is concise and natural.
- source_word: וְאַף
  chosen: and also
  alternatives:
  - and even
  - also
  lexicon: HALOT
  rationale: Adds further items to the list with mild emphasis; 'and also' captures
    the additive force.
- source_word: יַיִן עֲנָבִים וּתְאֵנִים
  chosen: wine, grapes, figs
  alternatives:
  - wine and grapes and figs
  lexicon: HALOT
  rationale: A straightforward list of commodities. Commas communicate the Hebrew
    asyndetic/serial listing naturally in English.
- source_word: וְכָל מַשָּׂא
  chosen: and every kind of load
  alternatives:
  - and every burden
  - and all kinds of goods
  lexicon: HALOT
  rationale: מַשָּׂא is a load/burden carried. 'Every kind of load' preserves the
    concrete commercial sense better than the more abstract 'burden.'
- source_word: וּמְבִיאִים יְרוּשָׁלִַם
  chosen: and bringing them into Jerusalem
  alternatives:
  - and bringing them to Jerusalem
  lexicon: HALOT
  rationale: The verb of motion with the city name implies entry into the city; 'into
    Jerusalem' fits the context of market activity at the gates.
- source_word: בְּיוֹם הַשַּׁבָּת
  chosen: on the Sabbath day
  alternatives:
  - on the Sabbath
  lexicon: HALOT
  rationale: The repeated phrase is retained with slight English variation for readability
    while preserving the emphasis on the day.
- source_word: וָאָעִיד
  chosen: So I testified against them
  alternatives:
  - and I warned them
  - and I protested
  lexicon: HALOT
  rationale: The Hifil of עוּד here carries the sense of giving warning/testimony
    against wrongdoing. 'Testified against them' preserves the judicial-prophetic
    force; 'So' reflects the narrative consequence.
- source_word: בְּיוֹם מִכְרָם
  chosen: on the day they sold
  alternatives:
  - when they sold
  - on the day of their selling
  lexicon: HALOT
  rationale: Infinitive construct with pronominal suffix denotes the occasion of their
    selling. 'On the day they sold' is clear and close to the Hebrew structure.
- source_word: צָיִד
  chosen: food
  alternatives:
  - provisions
  - game
  - victuals
  lexicon: HALOT
  rationale: Though often 'game/prey,' in this commercial context the noun can denote
    food/provisions being sold in the market. 'Food' is the broadest natural English
    term that fits the context.
