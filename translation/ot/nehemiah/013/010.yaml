id: NEH.13.10
reference: Nehemiah 13:10
source:
  edition: WLC
  text: וָ/אֵ֣דְעָ֔/ה כִּֽי מְנָי֥וֹת הַ/לְוִיִּ֖ם לֹ֣א נִתָּ֑נָה וַ/יִּבְרְח֧וּ אִישׁ
    לְ/שָׂדֵ֛/הוּ הַ/לְוִיִּ֥ם וְ/הַ/מְשֹׁרְרִ֖ים עֹשֵׂ֥י הַ/מְּלָאכָֽה־־׃
translation:
  text: And I learned that the portions for the Levites had not been given, so the
    Levites and the singers who did the work had each fled to his field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the prescribed portions' for the Levites.
    reason: lexical_alternative
  - marker: b
    text: Literally 'each to his field.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֵדְעָה
  chosen: And I learned
  alternatives:
  - And I found out
  - And I knew
  lexicon: HALOT
  rationale: The verb ידע in this wayyiqtol context introduces Nehemiah's discovery
    of a situation. 'Learned' captures the sense of coming to know better than the
    stative-sounding 'knew.'
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the content of what Nehemiah learned, so 'that'
    is the most natural English complementizer.
- source_word: מְנָיוֹת
  chosen: the portions
  alternatives:
  - the shares
  - the allotments
  - the prescribed portions
  lexicon: HALOT
  rationale: The noun refers to assigned provisions/support due to the Levites. 'Portions'
    is concise and idiomatic in temple-support contexts.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of the tribal/cultic group; repeated in the verse
    and kept consistent.
- source_word: לֹא נִתָּנָה
  chosen: had not been given
  alternatives:
  - were not given
  - had not been provided
  lexicon: HALOT
  rationale: Passive of נתן. Although the subject 'portions' is formally plural, the
    verb is singular, likely treating the provision collectively. English idiom prefers
    plural agreement with 'portions,' but 'had not been given' avoids awkwardness
    while preserving the passive sense.
- source_word: וַיִּבְרְחוּ
  chosen: had each fled
  alternatives:
  - fled
  - had run away
  lexicon: HALOT
  rationale: ברח means 'flee.' The distributive sense is reinforced by אִישׁ, so 'had
    each fled' brings that out naturally in English.
- source_word: אִישׁ לְשָׂדֵהוּ
  chosen: to his field
  alternatives:
  - each to his own field
  - to his farmland
  lexicon: HALOT
  rationale: Literally 'a man to his field,' an idiom meaning each person returned
    to his own agricultural land. The distributive force is represented in the sentence
    by 'each.'
- source_word: וְהַמְשֹׁרְרִים
  chosen: and the singers
  alternatives:
  - and the temple singers
  lexicon: HALOT
  rationale: Refers to the liturgical singers associated with temple service. 'Singers'
    is sufficient in context without adding words not explicit in the Hebrew.
- source_word: עֹשֵׂי הַמְּלָאכָה
  chosen: who did the work
  alternatives:
  - who were doing the work
  - the workers
  lexicon: HALOT
  rationale: This participial phrase modifies 'the Levites and the singers.' 'Who
    did the work' preserves the relative sense and avoids over-specifying the nature
    of the work beyond the Hebrew.
