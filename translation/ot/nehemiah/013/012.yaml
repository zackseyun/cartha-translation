id: NEH.13.12
reference: Nehemiah 13:12
source:
  edition: WLC
  text: וְ/כָל יְהוּדָ֗ה הֵבִ֜יאוּ מַעְשַׂ֧ר הַ/דָּגָ֛ן וְ/הַ/תִּיר֥וֹשׁ וְ/הַ/יִּצְהָ֖ר
    לָ/אוֹצָרֽוֹת־׃
translation:
  text: And all Judah brought the tithe of the grain, the new wine, and the oil into
    the storehouses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'storerooms.' The Hebrew term can denote storage chambers or treasuries;
      here the context of grain, wine, and oil favors 'storehouses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כָל יְהוּדָה
  chosen: And all Judah
  alternatives:
  - And all of Judah
  - Then all Judah
  lexicon: HALOT
  rationale: כָּל with the proper noun יְהוּדָה denotes the whole community of Judah.
    'All Judah' is a natural English rendering that preserves the collective sense
    without over-specifying geography versus populace.
- source_word: הֵבִיאוּ
  chosen: brought
  alternatives:
  - brought in
  - delivered
  lexicon: HALOT
  rationale: The Hiphil of בוא commonly means 'bring' or 'bring in.' 'Brought' fits
    the direct object and destination phrase smoothly; the sense of movement into
    the storage area is already conveyed by 'into the storehouses.'
- source_word: מַעְשַׂר
  chosen: the tithe
  alternatives:
  - the tenth part
  - tithes
  lexicon: HALOT
  rationale: מַעְשַׂר is the standard term for 'tithe.' Singular is retained because
    the Hebrew is singular and functions collectively for the required tenth of produce.
- source_word: הַ/דָּגָן
  chosen: the grain
  alternatives:
  - the cereal
  - the corn
  lexicon: HALOT
  rationale: דָּגָן refers broadly to grain produce. 'Grain' is the clearest modern
    English equivalent; 'corn' would be misleading in contemporary English.
- source_word: וְ/הַ/תִּירוֹשׁ
  chosen: the new wine
  alternatives:
  - the wine
  - the fresh wine
  lexicon: HALOT
  rationale: תִּירוֹשׁ commonly denotes fresh or new wine, distinct from the more
    general יַיִן. 'New wine' preserves that lexical distinction.
- source_word: וְ/הַ/יִּצְהָר
  chosen: the oil
  alternatives:
  - the olive oil
  - the fresh oil
  lexicon: HALOT
  rationale: יִצְהָר usually refers to fresh oil, typically olive oil, in agricultural/tithe
    lists. 'Oil' is idiomatic and sufficiently precise in this stock triad; 'olive
    oil' is possible but slightly more interpretive than necessary.
- source_word: לָ/אוֹצָרוֹת
  chosen: into the storehouses
  alternatives:
  - to the storerooms
  - into the treasuries
  lexicon: HALOT
  rationale: אוֹצָרוֹת here refers to storage chambers for temple provisions. 'Storehouses'
    best matches the material context of grain, wine, and oil; 'treasuries' could
    suggest money rather than produce.
