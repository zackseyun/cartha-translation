id: NEH.13.24
reference: Nehemiah 13:24
source:
  edition: WLC
  text: וּ/בְנֵי/הֶ֗ם חֲצִי֙ מְדַבֵּ֣ר אַשְׁדּוֹדִ֔ית וְ/אֵינָ֥/ם מַכִּירִ֖ים לְ/דַבֵּ֣ר
    יְהוּדִ֑ית וְ/כִ/לְשׁ֖וֹן עַ֥ם וָ/עָֽם׃
translation:
  text: And half of their children spoke Ashdodite, and they were not able to speak
    Judean, but only the language of one people or another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and they did not know how to speak Judean, but spoke according to the
      language of each people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵיהֶם
  chosen: And their children
  alternatives:
  - And their sons
  lexicon: HALOT
  rationale: בנים can mean 'sons' more narrowly, but in context it refers to offspring
    generally in mixed families; 'children' best conveys the referent in natural English
    without implying only males.
- source_word: חֲצִי
  chosen: half
  alternatives:
  - half of them
  lexicon: HALOT
  rationale: The noun/adverb indicates that only a portion of the children are in
    view. English idiom expresses this as 'half of their children.'
- source_word: מְדַבֵּר
  chosen: spoke
  alternatives:
  - was speaking
  - speaking
  lexicon: HALOT
  rationale: The participle describes characteristic speech ability/state. Simple
    past 'spoke' communicates the narrative sense naturally in English.
- source_word: אַשְׁדּוֹדִית
  chosen: Ashdodite
  alternatives:
  - the language of Ashdod
  - Ashdodian
  lexicon: HALOT
  rationale: The feminine gentilic here denotes the speech associated with Ashdod.
    'Ashdodite' is concise and preserves the ethnic-linguistic label.
- source_word: וְאֵינָם מַכִּירִים
  chosen: and they were not able
  alternatives:
  - and they did not know how
  - and they did not recognize
  lexicon: HALOT
  rationale: הכיר with an infinitive here means having the knowledge/ability to do
    something, not mere recognition. 'Were not able' captures the practical inability
    in idiomatic English.
- source_word: לְדַבֵּר יְהוּדִית
  chosen: to speak Judean
  alternatives:
  - to speak Jewish
  - to speak Judahite
  - to speak Hebrew
  lexicon: HALOT
  rationale: יְהוּדִית refers to the language of Judah/Judeans. 'Judean' is more precise
    than 'Jewish' and avoids anachronistically specifying 'Hebrew,' which the text
    itself does not say.
- source_word: וְכִלְשׁוֹן עַם וָעָם
  chosen: but only the language of one people or another
  alternatives:
  - but according to the language of each people
  - but in the language of people and people
  lexicon: HALOT
  rationale: The phrase means 'according to the language of each people,' emphasizing
    a mixture of surrounding ethnic languages rather than Judean speech. 'One people
    or another' renders the distributive sense in readable English.
