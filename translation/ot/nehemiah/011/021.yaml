id: NEH.11.21
reference: Nehemiah 11:21
source:
  edition: WLC
  text: וְ/הַ/נְּתִינִ֖ים יֹשְׁבִ֣ים בָּ/עֹ֑פֶל וְ/צִיחָ֥א וְ/גִשְׁפָּ֖א עַל הַ/נְּתִינִֽים־׃פ
translation:
  text: And the temple servants were living on the Ophel, and Ziha and Gishpa were
    over the temple servants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew נְתִינִים (Nethinim), a technical term for a class assigned to temple
      service.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנְּתִינִים
  chosen: the temple servants
  alternatives:
  - the Nethinim
  - the given ones
  - the servants
  lexicon: HALOT
  rationale: נְתִינִים is a technical postexilic term for a class attached to temple
    service. Translating it as 'temple servants' communicates function in clear English
    better than transliterating 'Nethinim,' while preserving the institutional sense.
- source_word: יֹשְׁבִים
  chosen: were living
  alternatives:
  - dwelt
  - were dwelling
  - lived
  lexicon: HALOT
  rationale: The participle of ישב denotes ongoing residence. 'Were living' gives
    natural modern English while retaining the durative sense better than a simple
    past.
- source_word: בָּעֹפֶל
  chosen: on the Ophel
  alternatives:
  - in Ophel
  - at the Ophel
  lexicon: HALOT
  rationale: עֹפֶל is a place-name/topographical term, commonly rendered 'Ophel.'
    The preposition with article is best represented idiomatically as 'on the Ophel,'
    fitting an elevated fortified ridge.
- source_word: צִיחָא
  chosen: Ziha
  rationale: Proper name; transliterated according to standard English convention.
- source_word: גִשְׁפָּא
  chosen: Gishpa
  rationale: Proper name; transliterated according to standard English convention.
- source_word: עַל
  chosen: were over
  alternatives:
  - were in charge of
  - supervised
  - were appointed over
  lexicon: HALOT
  rationale: In this administrative context, עַל indicates authority or oversight.
    'Were over' is concise and close to the Hebrew, while still intelligible in English.
