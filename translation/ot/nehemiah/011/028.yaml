id: NEH.11.28
reference: Nehemiah 11:28
source:
  edition: WLC
  text: וּ/בְ/צִֽקְלַ֥ג וּ/בִ/מְכֹנָ֖ה וּ/בִ/בְנֹתֶֽי/הָ׃
translation:
  text: and in Ziklag, and in Mekonah and its daughter villages.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'and in its daughters,' an idiom for the smaller villages or
      dependent settlements belonging to Mekonah.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/צִקְלַג
  chosen: and in Ziklag
  alternatives:
  - also in Ziklag
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition are most naturally rendered
    together as 'and in.' צִקְלַג is a place name, so it is transliterated rather
    than translated, following the translation philosophy for names.
- source_word: וּ/בִ/מְכֹנָה
  chosen: and in Mekonah
  alternatives:
  - and in Meconah
  lexicon: HALOT
  rationale: Again the conjunction plus preposition is rendered 'and in.' מְכֹנָה
    is a place name and is therefore transliterated. 'Mekonah' reflects a standard
    English transliteration of the Hebrew consonants and vowels.
- source_word: וּ/בִ/בְנֹתֶיהָ
  chosen: and its daughter villages
  alternatives:
  - and its dependent villages
  - and its towns
  - and its daughters
  lexicon: HALOT
  rationale: בְּנוֹתֶיהָ literally means 'its daughters,' a common Hebrew idiom for
    subsidiary settlements belonging to a larger town. 'Daughter villages' preserves
    the metaphor while making the sense clear in English. The 3fs suffix is rendered
    as 'its,' referring back to Mekonah.
