id: NEH.11.36
reference: Nehemiah 11:36
source:
  edition: WLC
  text: וּ/מִן הַ/לְוִיִּ֔ם מַחְלְק֥וֹת יְהוּדָ֖ה לְ/בִנְיָמִֽין־׃פ
translation:
  text: And from the Levites, divisions in Judah belonged to Benjamin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And from the Levites, divisions of Judah were for Benjamin.' The Hebrew
      is very compressed, and the exact relation between 'Judah' and 'Benjamin' is
      elliptical.
    reason: alternative_reading
lexical_decisions:
- source_word: וּמִן
  chosen: And from
  alternatives:
  - And of
  - Now from
  lexicon: HALOT
  rationale: The conjunction plus preposition links this closing note to the preceding
    list and introduces a source/origin relationship. 'And from' preserves both elements
    without overinterpreting the syntax.
- source_word: הַלְוִיִּם
  chosen: the Levites
  alternatives:
  - the Levitical families
  - the Levite clans
  lexicon: HALOT
  rationale: The noun straightforwardly denotes Levites. 'The Levites' is the most
    direct and natural rendering.
- source_word: מַחְלְקוֹת
  chosen: divisions
  alternatives:
  - sections
  - groups
  - departments
  lexicon: HALOT
  rationale: The plural commonly refers to divisions or assigned groups. 'Divisions'
    fits administrative/allotment context and remains suitably formal.
- source_word: יְהוּדָה
  chosen: in Judah
  alternatives:
  - of Judah
  lexicon: HALOT
  rationale: 'Although the construct-like sequence is terse, the sense in context
    is locative: Levitical divisions situated in the territory of Judah. English requires
    a smoother expression than a bare ''Judah'' after ''divisions.'''
- source_word: לְבִנְיָמִין
  chosen: belonged to Benjamin
  alternatives:
  - were assigned to Benjamin
  - for Benjamin
  lexicon: HALOT
  rationale: The prefixed ל marks relation/allotment. Because the Hebrew is elliptical,
    'belonged to Benjamin' makes explicit the likely sense that certain Levitical
    divisions associated with Judah were attached to Benjamin. This is clearer than
    the overly literal 'for Benjamin.'
