id: NEH.11.34
reference: Nehemiah 11:34
source:
  edition: WLC
  text: חָדִ֥יד צְבֹעִ֖ים נְבַלָּֽט׃
translation:
  text: Hadid, Zeboim, Neballat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Zeboiim.' The Hebrew place name צְבֹעִים is transliterated with slight
      variation in English traditions.
    reason: lexical_alternative
  - marker: b
    text: Or 'Nebalat.' English transliterations of נְבַלָּט vary in whether they
      reflect the doubled consonant.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָדִיד
  chosen: Hadid
  lexicon: HALOT
  rationale: Proper place name in a settlement list; transliterated rather than translated
    in keeping with the philosophy to transliterate names. English form follows standard
    convention from the Hebrew consonants/vocalization.
- source_word: צְבֹעִים
  chosen: Zeboim
  alternatives:
  - Zeboiim
  lexicon: HALOT
  rationale: Proper place name. Although the form can be represented in English as
    'Zeboiim' to reflect the doubled yod-vowel sequence, 'Zeboim' is a standard and
    readable transliteration for this Benjaminite town in context. Because this is
    a name, transliteration is preferred over any attempt to render a lexical meaning.
- source_word: נְבַלָּט
  chosen: Neballat
  alternatives:
  - Nebalat
  lexicon: HALOT
  rationale: Proper place name in the list. The doubled consonant is reflected in
    'Neballat' from the pointed Hebrew, though some English traditions simplify to
    'Nebalat.' Transliteration preserves the source form most transparently.
