id: NEH.11.26
reference: Nehemiah 11:26
source:
  edition: WLC
  text: וּ/בְ/יֵשׁ֥וּעַ וּ/בְ/מוֹלָדָ֖ה וּ/בְ/בֵ֥ית פָּֽלֶט׃
translation:
  text: and in Jeshua, and in Moladah, and in Beth-pelet;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Beth-pelet is literally 'house of Pelet' or possibly 'house of escape,'
      but as a place name it is transliterated rather than translated.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ
  chosen: and in
  alternatives:
  - also in
  - as well as in
  lexicon: HALOT
  rationale: The conjunction ו plus preposition ב is repeated before each place name
    in this settlement list. Rendering as 'and in' preserves the list structure and
    the locative sense without unnecessary expansion.
- source_word: יֵשׁוּעַ
  chosen: Jeshua
  alternatives:
  - Jeshuah
  lexicon: HALOT
  rationale: This is a proper place name, so it is transliterated rather than translated,
    following the project's policy for names. 'Jeshua' is the standard English form
    for this toponym in this context.
- source_word: מוֹלָדָה
  chosen: Moladah
  alternatives:
  - Moladath
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard convention. 'Moladah' is
    the established and phonetically straightforward English form.
- source_word: בֵית פָּלֶט
  chosen: Beth-pelet
  alternatives:
  - Beth Pelet
  - house of escape
  lexicon: HALOT
  rationale: This is a compound place name. It is best transliterated as a toponym
    rather than translated literally, in keeping with the policy to transliterate
    names. The hyphen helps modern readers recognize the compound form.
