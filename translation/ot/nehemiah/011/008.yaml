id: NEH.11.8
reference: Nehemiah 11:8
source:
  edition: WLC
  text: וְ/אַחֲרָ֖י/ו גַּבַּ֣י סַלָּ֑י תְּשַׁ֥ע מֵא֖וֹת עֶשְׂרִ֥ים וּ/שְׁמֹנָֽה׃
translation:
  text: 'And after him were Gabbai, Sallai: nine hundred twenty-eight.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, less likely in context, 'next to him,' if the phrase is taken spatially
      rather than sequentially.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַחֲרָיו
  chosen: And after him
  alternatives:
  - And after him came
  - And next to him
  lexicon: HALOT
  rationale: The prepositional phrase literally means 'and after him.' In this list
    context it marks sequence in the register of residents or clans. 'And after him'
    preserves the Hebrew ordering without adding more than necessary.
- source_word: גַּבַּי
  chosen: Gabbai
  rationale: 'Proper name transliterated according to the translation philosophy:
    names are transliterated rather than translated.'
- source_word: סַלָּי
  chosen: Sallai
  rationale: 'Proper name transliterated according to the translation philosophy:
    names are transliterated rather than translated.'
- source_word: תְּשַׁע מֵאוֹת עֶשְׂרִים וּשְׁמֹנָה
  chosen: nine hundred twenty-eight
  alternatives:
  - '928'
  - nine hundred and twenty-eight
  lexicon: HALOT
  rationale: 'The Hebrew cardinal number sequence is straightforward: 9 hundreds +
    20 + 8 = 928. Spelling out the number fits readable modern English. The conjunction
    before ''eight'' is idiomatic in Hebrew number formation and need not be separately
    represented in English.'
