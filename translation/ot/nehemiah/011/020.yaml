id: NEH.11.20
reference: Nehemiah 11:20
source:
  edition: WLC
  text: וּ/שְׁאָ֨ר יִשְׂרָאֵ֜ל הַ/כֹּהֲנִ֤ים הַ/לְוִיִּם֙ בְּ/כָל עָרֵ֣י יְהוּדָ֔ה
    אִ֖ישׁ בְּ/נַחֲלָתֽ/וֹ־׃
translation:
  text: And the rest of Israel, the priests, and the Levites were in all the cities
    of Judah, each in his inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every man in his inheritance.' The Hebrew is literally singular and
      distributive.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁאָר
  chosen: And the rest of
  alternatives:
  - And the remainder of
  lexicon: HALOT
  rationale: שְׁאָר denotes what remains or is left over. 'The rest of' is natural
    English and fits the contrast with the groups previously listed in Jerusalem.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Proper name retained by standard transliteration. In context it refers
    to the Israelite people distinct from the specifically named priests and Levites.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֲנִים for the priestly class.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of לְוִיִּם for members of the tribe/clan serving
    temple functions.
- source_word: בְּכָל עָרֵי יְהוּדָה
  chosen: in all the cities of Judah
  alternatives:
  - throughout all the cities of Judah
  lexicon: HALOT
  rationale: בְּ with 'all the cities' is locative. 'In all the cities of Judah' is
    the most direct rendering; 'throughout' is possible but slightly more interpretive.
- source_word: אִישׁ
  chosen: each
  alternatives:
  - every man
  lexicon: HALOT
  rationale: Although אִישׁ is literally 'man,' here it has a distributive force with
    the following phrase. 'Each' conveys the sense clearly in modern English without
    overstating male specificity, while preserving the distributive function.
- source_word: בְּנַחֲלָתוֹ
  chosen: in his inheritance
  alternatives:
  - on his inheritance
  - in his allotted inheritance
  - in his property
  lexicon: HALOT
  rationale: נַחֲלָה commonly denotes an inherited possession or allotted holding.
    'Inheritance' preserves the covenantal-land nuance better than the flatter 'property.'
    The singular suffix after distributive אִישׁ is naturally rendered 'his.'
