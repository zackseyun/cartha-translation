theological_decisions:
- issue: Rendering of distributive masculine language
  chosen_reading: each in his inheritance
  alternative_readings:
  - each in their inheritance
  - every man in his inheritance
  rationale: The Hebrew uses masculine singular אִישׁ with a singular suffix, functioning
    distributively. Following the project's gender-accurate policy, the translation
    preserves the singular masculine reference while rendering אִישׁ idiomatically
    as 'each.' A more inclusive 'their' would smooth the English but would move away
    from the source form; 'every man' is more formally literal but less natural in
    contemporary English.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
