id: NEH.11.27
reference: Nehemiah 11:27
source:
  edition: WLC
  text: וּ/בַ/חֲצַ֥ר שׁוּעָ֛ל וּ/בִ/בְאֵ֥ר שֶׁ֖בַע וּ/בְנֹתֶֽי/הָ׃
translation:
  text: and in Hazar-shual, and in Beer-sheba and its villages.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'and its daughters,' an idiom for a town's dependent villages
      or settlements.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַ/חֲצַר שׁוּעָל
  chosen: and in Hazar-shual
  alternatives:
  - and in Hazar Shual
  - and in Village of the Fox
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition are rendered straightforwardly
    as 'and in.' The place name חֲצַר שׁוּעָל is transliterated rather than translated,
    following the philosophy to transliterate names. A more literal etymological rendering
    ('Village of the Fox') is possible but inappropriate for a geographic name in
    this context.
- source_word: וּ/בִ/בְאֵר שֶׁבַע
  chosen: and in Beer-sheba
  alternatives:
  - and in Beersheba
  - and in Well of Seven
  - and in Well of the Oath
  lexicon: HALOT
  rationale: The conjunction plus preposition is again rendered 'and in.' בְּאֵר שֶׁבַע
    is a well-known place name and is therefore transliterated as 'Beer-sheba.' The
    spelling with hyphen preserves the compound form clearly in English. Etymological
    translations are possible but not preferred for a proper name.
- source_word: וּ/בְנֹתֶיהָ
  chosen: and its villages
  alternatives:
  - and its daughter towns
  - and its dependent settlements
  lexicon: HALOT
  rationale: The noun בנות, literally 'daughters,' commonly refers idiomatically to
    a city's dependent settlements or villages. English 'villages' best captures the
    geographic sense in readable modern English. The 3fs suffix is rendered as 'its,'
    referring back to Beer-sheba as a feminine city name.
