id: NEH.11.3
reference: Nehemiah 11:3
source:
  edition: WLC
  text: וְ/אֵ֨לֶּה֙ רָאשֵׁ֣י הַ/מְּדִינָ֔ה אֲשֶׁ֥ר יָשְׁב֖וּ בִּ/ירוּשָׁלִָ֑ם וּ/בְ/עָרֵ֣י
    יְהוּדָ֗ה יָֽשְׁב֞וּ אִ֤ישׁ בַּ/אֲחֻזָּת/וֹ֙ בְּ/עָ֣רֵי/הֶ֔ם יִשְׂרָאֵ֤ל הַ/כֹּהֲנִים֙
    וְ/הַ/לְוִיִּ֣ם וְ/הַ/נְּתִינִ֔ים וּ/בְנֵ֖י עַבְדֵ֥י שְׁלֹמֹֽה׃
translation:
  text: 'Now these are the heads of the province who lived in Jerusalem. But in the
    cities of Judah, each man lived on his own property in their cities: Israel, the
    priests, the Levites, the temple servants, and the descendants of Solomon’s servants.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew simply reads 'Israel,' likely as a collective
      designation in the list.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the Nethinim,' a class assigned to temple service.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאשֵׁי הַמְּדִינָה
  chosen: the heads of the province
  alternatives:
  - the leaders of the province
  - the chief men of the province
  lexicon: HALOT
  rationale: רָאשֵׁי is literally 'heads of,' an idiom for leading persons or chiefs.
    הַמְּדִינָה in the Persian-period context refers to the administrative province,
    not a modern 'state.' 'Heads of the province' preserves the formal sense while
    remaining intelligible.
- source_word: אֲשֶׁר יָשְׁבוּ בִּירוּשָׁלִָם
  chosen: who lived in Jerusalem
  alternatives:
  - who dwelt in Jerusalem
  - who settled in Jerusalem
  lexicon: HALOT
  rationale: יָשַׁב commonly means 'sit, dwell, live.' In narrative census/settlement
    context, 'lived' is natural modern English and adequately reflects settled residence.
- source_word: וּבְעָרֵי יְהוּדָה יָשְׁבוּ
  chosen: But in the cities of Judah, each man lived
  alternatives:
  - And in the cities of Judah they lived
  - Now in the towns of Judah they lived
  lexicon: HALOT
  rationale: The waw here marks a shift from Jerusalem to the rest of Judah. English
    'But' best signals the contrastive transition. 'Cities' is retained rather than
    'towns' for consistency with עָרִים, though either is possible.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - everyone
  lexicon: HALOT
  rationale: The Hebrew singular distributive אִישׁ means 'each man/each person.'
    Following the project's gender-accurate principle, 'each man' preserves the masculine
    representative form rather than neutralizing it.
- source_word: בַּאֲחֻזָּתוֹ
  chosen: on his own property
  alternatives:
  - in his inheritance
  - on his holding
  - on his possession
  lexicon: HALOT
  rationale: אֲחֻזָּה denotes a landed possession or hereditary property. 'On his
    own property' communicates the concrete landholding sense more clearly than the
    more abstract 'inheritance' in this settlement list.
- source_word: בְּעָרֵיהֶם
  chosen: in their cities
  alternatives:
  - in their towns
  lexicon: HALOT
  rationale: The phrase locates these groups within their respective local settlements.
    'Cities' matches the Hebrew noun and keeps continuity with the earlier phrase.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - the Israelites
  lexicon: HALOT
  rationale: The bare noun likely functions collectively as a heading in the list
    of groups residing in Judah's cities. 'Israel' is more formally aligned with the
    Hebrew; 'the Israelites' is interpretive and smoother but less literal.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֲנִים.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of לְוִיִּם.
- source_word: הַנְּתִינִים
  chosen: the temple servants
  alternatives:
  - the Nethinim
  lexicon: HALOT
  rationale: נְתִינִים refers to a recognized class attached to temple service. Translating
    the function ('temple servants') is clearer for modern readers than transliterating
    'Nethinim,' while preserving the institutional sense.
- source_word: בְּנֵי עַבְדֵי שְׁלֹמֹה
  chosen: the descendants of Solomon’s servants
  alternatives:
  - the sons of Solomon's servants
  lexicon: HALOT
  rationale: בְּנֵי can mean literal 'sons' or broader 'descendants.' In genealogical/community
    lists, 'descendants' better conveys the collective lineage group in idiomatic
    English.
