id: NEH.11.4
reference: Nehemiah 11:4
source:
  edition: WLC
  text: וּ/בִֽ/ירוּשָׁלִַ֨ם֙ יָֽשְׁב֔וּ מִ/בְּנֵ֥י יְהוּדָ֖ה וּ/מִ/בְּנֵ֣י בִנְיָמִ֑ן
    מִ/בְּנֵ֣י יְ֠הוּדָה עֲתָיָ֨ה בֶן עֻזִּיָּ֜ה בֶּן זְכַרְיָ֧ה בֶן אֲמַרְיָ֛ה בֶּן
    שְׁפַטְיָ֥ה בֶן מַהֲלַלְאֵ֖ל מִ/בְּנֵי פָֽרֶץ־־־־־־׃
translation:
  text: 'And in Jerusalem there lived some of the sons of Judah and some of the sons
    of Benjamin. Of the sons of Judah: Athaiah son of Uzziah, son of Zechariah, son
    of Amariah, son of Shephatiah, son of Mahalalel, of the sons of Perez.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dwelt' for 'there lived.' The Hebrew verb can denote residing or settling.
    reason: lexical_alternative
  - marker: b
    text: '''Sons of Judah'' and ''sons of Benjamin'' means members or descendants
      of those tribal lines.'
    reason: cultural_note
lexical_decisions:
- source_word: וּבִירוּשָׁלַם
  chosen: And in Jerusalem
  alternatives:
  - Now in Jerusalem
  - In Jerusalem
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition is naturally rendered 'And
    in Jerusalem' in narrative/list context. Retaining 'and' reflects the verse's
    continuation from the preceding context.
- source_word: יָשְׁבוּ
  chosen: there lived
  alternatives:
  - dwelt
  - lived
  - settled
  lexicon: HALOT
  rationale: The verb ישב commonly means 'sit, dwell, live.' In an English census/list
    setting, 'there lived' is idiomatic and preserves the residential sense without
    sounding archaic like 'dwelt.'
- source_word: מִבְּנֵי יְהוּדָה
  chosen: some of the sons of Judah
  alternatives:
  - from the sons of Judah
  - some of the people of Judah
  lexicon: HALOT
  rationale: בני literally means 'sons of.' Here it denotes members/descendants of
    the tribal group. 'Sons of Judah' preserves the genealogical flavor; 'some of'
    is supplied because the partitive מִן indicates a subset.
- source_word: וּמִבְּנֵי בִנְיָמִן
  chosen: and some of the sons of Benjamin
  alternatives:
  - and from the sons of Benjamin
  - and some of the people of Benjamin
  lexicon: HALOT
  rationale: Parallel to the previous phrase; the partitive sense is maintained. 'Sons
    of Benjamin' preserves the tribal-genealogical wording.
- source_word: מִבְּנֵי יְהוּדָה
  chosen: 'Of the sons of Judah:'
  alternatives:
  - 'From the sons of Judah:'
  - 'Among the sons of Judah:'
  lexicon: HALOT
  rationale: This second occurrence introduces the specific Judahite representative(s)
    in the list. 'Of the sons of Judah:' is concise and natural as a heading-like
    transition.
- source_word: עֲתָיָה
  chosen: Athaiah
  alternatives:
  - Athaiah
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name; names are transliterated
    rather than translated per project philosophy.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: In a genealogy, בן is most straightforwardly rendered 'son of.' Although
    genealogies can telescope generations, the conventional and textually transparent
    rendering is retained.
- source_word: עֻזִּיָּה
  chosen: Uzziah
  lexicon: HALOT
  rationale: Standard transliteration of the personal name.
- source_word: זְכַרְיָה
  chosen: Zechariah
  alternatives:
  - Zekariah
  lexicon: HALOT
  rationale: Standard English biblical transliteration.
- source_word: אֲמַרְיָה
  chosen: Amariah
  lexicon: HALOT
  rationale: Standard transliteration of the personal name.
- source_word: שְׁפַטְיָה
  chosen: Shephatiah
  alternatives:
  - Shephatya
  lexicon: HALOT
  rationale: Standard English biblical transliteration.
- source_word: מַהֲלַלְאֵל
  chosen: Mahalalel
  alternatives:
  - Mahalaleel
  lexicon: HALOT
  rationale: A common English form of the name; chosen for readability while remaining
    close to the Hebrew.
- source_word: מִבְּנֵי פָרֶץ
  chosen: of the sons of Perez
  alternatives:
  - from the descendants of Perez
  - of the descendants of Perez
  lexicon: HALOT
  rationale: This identifies the clan/lineage within Judah. 'Sons of Perez' preserves
    the genealogical idiom and links the named man to the Perezite line.
