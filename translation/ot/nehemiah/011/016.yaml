id: NEH.11.16
reference: Nehemiah 11:16
source:
  edition: WLC
  text: וְ/שַׁבְּתַ֨י וְ/יוֹזָבָ֜ד עַל הַ/מְּלָאכָ֤ה הַ/חִֽיצֹנָה֙ לְ/בֵ֣ית הָ/אֱלֹהִ֔ים
    מֵ/רָאשֵׁ֖י הַ/לְוִיִּֽם־׃
translation:
  text: And Shabbethai and Jozabad, from the heads of the Levites, were over the external
    work of the house of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the outer work for the house of God.' The Hebrew phrase can be understood
      as work done outside the temple proper, in contrast to internal duties.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׁבְּתַי
  chosen: And Shabbethai
  alternatives:
  - And Shabbethaih
  rationale: Proper name; transliterated rather than translated, following the policy
    to transliterate personal names. The prefixed conjunction is carried over as 'And'
    to preserve the list structure.
- source_word: וְיוֹזָבָד
  chosen: and Jozabad
  alternatives:
  - and Jehozabad
  rationale: Proper name; transliterated by standard English convention. The conjunction
    links this name with the previous one in a coordinated list.
- source_word: עַל
  chosen: were over
  alternatives:
  - were in charge of
  - were responsible for
  lexicon: HALOT
  rationale: In this administrative context, עַל indicates supervisory responsibility.
    'Were over' is concise and close to the Hebrew while remaining natural English.
- source_word: הַמְּלָאכָה
  chosen: the work
  alternatives:
  - the service
  - the duty
  - the labor
  lexicon: HALOT
  rationale: מְלָאכָה commonly denotes work or occupational task. Here it refers to
    assigned temple-related duties, and 'work' best preserves the broad sense without
    over-specifying cultic service.
- source_word: הַחִיצֹנָה
  chosen: external
  alternatives:
  - outside
  - outer
  lexicon: HALOT
  rationale: The adjective means outer/external. 'External' fits the likely contrast
    with internal temple duties and works smoothly with 'work.'
- source_word: לְבֵית הָאֱלֹהִים
  chosen: of the house of God
  alternatives:
  - for the house of God
  - in the house of God
  lexicon: HALOT
  rationale: 'The phrase modifies the work: work pertaining to the temple. English
    idiom allows either ''for'' or ''of''; ''of the house of God'' keeps the genitival
    relationship relatively formal and close to the Hebrew construction.'
- source_word: מֵרָאשֵׁי הַלְוִיִּם
  chosen: from the heads of the Levites
  alternatives:
  - from the chiefs of the Levites
  - being among the leading Levites
  lexicon: HALOT
  rationale: The phrase identifies Shabbethai and Jozabad as drawn from the leading
    Levites. 'Heads' is a transparent rendering of רָאשִׁים in an administrative sense;
    'from' preserves the prefixed מִן rather than flattening it into an apposition.
