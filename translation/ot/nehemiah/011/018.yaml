id: NEH.11.18
reference: Nehemiah 11:18
source:
  edition: WLC
  text: כָּל הַ/לְוִיִּם֙ בְּ/עִ֣יר הַ/קֹּ֔דֶשׁ מָאתַ֖יִם שְׁמֹנִ֥ים וְ/אַרְבָּעָֽה־׃פ
translation:
  text: All the Levites in the holy city were two hundred eighty-four.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - The total of
  lexicon: HALOT
  rationale: The noun quantifier introduces the total number of the group. 'All' is
    the most direct and natural rendering in English.
- source_word: הַלְוִיִּם
  chosen: the Levites
  alternatives:
  - the Levitical men
  lexicon: HALOT
  rationale: Standard rendering of the ethnoreligious/tribal designation לְוִיִּם.
    'Levites' is the conventional and precise English term.
- source_word: בְּעִיר
  chosen: in ... city
  alternatives:
  - within ... city
  lexicon: HALOT
  rationale: The preposition ב marks location. 'In' is the straightforward locative
    rendering.
- source_word: הַקֹּדֶשׁ
  chosen: the holy
  alternatives:
  - the sacred
  lexicon: HALOT
  rationale: As an attributive genitival construction with 'city,' this yields 'the
    holy city.' 'Holy' is the standard biblical equivalent and preserves the covenantal-sacral
    sense better than 'sacred.'
- source_word: מָאתַיִם שְׁמֹנִים וְאַרְבָּעָה
  chosen: two hundred eighty-four
  alternatives:
  - '284'
  - two hundred and eighty-four
  lexicon: HALOT
  rationale: The Hebrew cardinal sequence plainly gives the total number. Spelling
    out the number fits readable modern English Bible style. 'Were' is supplied idiomatically
    in English because the Hebrew is verbless.
