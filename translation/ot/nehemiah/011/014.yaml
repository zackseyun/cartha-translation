id: NEH.11.14
reference: Nehemiah 11:14
source:
  edition: WLC
  text: וַ/אֲחֵי/הֶם֙ גִּבּ֣וֹרֵי חַ֔יִל מֵאָ֖ה עֶשְׂרִ֣ים וּ/שְׁמֹנָ֑ה וּ/פָקִ֣יד
    עֲלֵי/הֶ֔ם זַבְדִּיאֵ֖ל בֶּן הַ/גְּדוֹלִֽים־׃ס
translation:
  text: And their brothers, mighty men of valor, were one hundred twenty-eight; and
    the overseer over them was Zabdiel son of Haggedolim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'son of the great men' or 'son of the nobles.' The Hebrew may be a descriptive
      phrase rather than a proper name.
    reason: alternative_reading
lexical_decisions:
- source_word: וַאֲחֵיהֶם
  chosen: And their brothers
  alternatives:
  - And their kinsmen
  - And their fellow Israelites
  lexicon: HALOT
  rationale: אֲחֵיהֶם literally means 'their brothers.' In this census/list context
    it refers to associated male members of the same broader group. 'Brothers' preserves
    the source wording and the masculine reference better than a more interpretive
    collective.
- source_word: גִּבּוֹרֵי חַיִל
  chosen: mighty men of valor
  alternatives:
  - valiant warriors
  - mighty men
  - men of ability
  lexicon: HALOT
  rationale: The phrase commonly denotes men marked by strength, courage, or military
    capability. Here, in a personnel list, 'mighty men of valor' preserves both the
    idiomatic force and the traditional military nuance without over-paraphrasing.
- source_word: מֵאָה עֶשְׂרִים וּשְׁמֹנָה
  chosen: one hundred twenty-eight
  alternatives:
  - a hundred and twenty-eight
  lexicon: HALOT
  rationale: This is the straightforward cardinal number 128. Modern English style
    favors 'one hundred twenty-eight.'
- source_word: וּפָקִיד עֲלֵיהֶם
  chosen: and the overseer over them was
  alternatives:
  - and the officer over them was
  - and the appointed leader over them was
  lexicon: HALOT
  rationale: פָקִיד denotes one appointed over others in an administrative or supervisory
    role. 'Overseer' fits the organizational setting and avoids implying a specifically
    military office more strongly than the Hebrew requires.
- source_word: זַבְדִּיאֵל
  chosen: Zabdiel
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names.
- source_word: בֶּן הַגְּדוֹלִים
  chosen: son of Haggedolim
  alternatives:
  - son of the great men
  - son of the nobles
  - son of Gedolim
  lexicon: HALOT
  rationale: Because הַגְּדוֹלִים may function here as a family name or clan designation
    rather than a descriptive phrase, the main text preserves it as a proper name,
    'Haggedolim.' The prefixed article is retained in transliteration. A descriptive
    rendering remains possible and is worth preserving in a footnote.
