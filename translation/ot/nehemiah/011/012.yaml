id: NEH.11.12
reference: Nehemiah 11:12
source:
  edition: WLC
  text: וַ/אֲחֵי/הֶ֗ם עֹשֵׂ֤י הַ/מְּלָאכָה֙ לַ/בַּ֔יִת שְׁמֹנֶ֥ה מֵא֖וֹת עֶשְׂרִ֣ים
    וּ/שְׁנָ֑יִם וַ֠/עֲדָיָה בֶּן יְרֹחָ֤ם בֶּן פְּלַלְיָה֙ בֶּן אַמְצִ֣י בֶן זְכַרְיָ֔ה
    בֶּן פַּשְׁח֖וּר בֶּן מַלְכִּיָּֽה־־־־־־׃
translation:
  text: And their brothers, doers of the work for the house, were eight hundred twenty-two;
    and Adaiah son of Jeroham, son of Pelaliah, son of Amzi, son of Zechariah, son
    of Pashhur, son of Malchijah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'workers for the temple.' The Hebrew reads literally 'doers of the work
      for the house,' with 'the house' referring contextually to the temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲחֵיהֶם
  chosen: And their brothers
  alternatives:
  - And their kinsmen
  - And their fellow priests
  lexicon: HALOT
  rationale: The noun literally means 'their brothers.' In this priestly census context
    it refers to fellow members of the same priestly group, but the text itself uses
    the kinship term, so 'brothers' best preserves the source wording. A more interpretive
    rendering such as 'fellow priests' would import context not explicit in this verse.
- source_word: עֹשֵׂי הַמְּלָאכָה
  chosen: doers of the work
  alternatives:
  - workers
  - those who did the work
  lexicon: HALOT
  rationale: The participial construction is retained with a fairly literal English
    equivalent. 'Workers' is smoother, but 'doers of the work' better reflects the
    Hebrew form while remaining understandable.
- source_word: לַבַּיִת
  chosen: for the house
  alternatives:
  - for the temple
  - in the house
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In Nehemiah this commonly refers to the
    house of God, i.e., the temple, but the Hebrew here does not explicitly say 'house
    of God.' 'For the house' preserves the wording and allows the temple reference
    to be inferred from context.
- source_word: שְׁמֹנֶה מֵאוֹת עֶשְׂרִים וּשְׁנָיִם
  chosen: eight hundred twenty-two
  alternatives:
  - eight hundred and twenty-two
  lexicon: HALOT
  rationale: This is the straightforward cardinal number. The form without 'and' is
    standard modern English and fits the project's readability aim.
- source_word: וַעֲדָיָה
  chosen: and Adaiah
  alternatives:
  - with Adaiah
  lexicon: HALOT
  rationale: The prefixed conjunction is best rendered simply as 'and,' continuing
    the list. The proper name is transliterated according to project policy.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: The genealogy formula is standard and is most naturally rendered 'son
    of' throughout. While Hebrew genealogies can sometimes skip generations, the conventional
    formula should be preserved rather than generalized to 'descendant of' without
    contextual necessity.
- source_word: יְרֹחָם / פְּלַלְיָה / אַמְצִי / זְכַרְיָה / פַּשְׁחוּר / מַלְכִּיָּה
  chosen: Jeroham / Pelaliah / Amzi / Zechariah / Pashhur / Malchijah
  lexicon: HALOT
  rationale: These are personal names and are therefore transliterated rather than
    translated, following the translation philosophy.
