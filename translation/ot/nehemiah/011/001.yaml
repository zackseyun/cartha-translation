id: NEH.11.1
reference: Nehemiah 11:1
source:
  edition: WLC
  text: וַ/יֵּשְׁב֥וּ שָׂרֵֽי הָ/עָ֖ם בִּ/ירוּשָׁלִָ֑ם וּ/שְׁאָ֣ר הָ֠/עָם הִפִּ֨ילוּ
    גוֹרָל֜וֹת לְ/הָבִ֣יא אֶחָ֣ד מִן הָ/עֲשָׂרָ֗ה לָ/שֶׁ֨בֶת֙ בִּֽ/ירוּשָׁלִַ֨ם֙ עִ֣יר
    הַ/קֹּ֔דֶשׁ וְ/תֵ֥שַׁע הַ/יָּד֖וֹת בֶּ/עָרִֽים־׀־׃
translation:
  text: Now the officials of the people lived in Jerusalem, and the rest of the people
    cast lots to bring one out of ten to live in Jerusalem, the holy city, while nine-tenths
    remained in the towns.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'and nine hands in the towns,' an idiom meaning the remaining
      nine parts out of ten stayed in the other towns.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֵי הָעָם
  chosen: the officials of the people
  alternatives:
  - the leaders of the people
  - the princes of the people
  lexicon: HALOT
  rationale: שָׂרִים denotes officials, rulers, or leaders. 'Officials' fits the administrative
    context of repopulating Jerusalem and avoids the archaic feel of 'princes'.
- source_word: וַיֵּשְׁבוּ
  chosen: lived
  alternatives:
  - dwelt
  - settled
  lexicon: HALOT
  rationale: From ישׁב, here indicating residence rather than the simple act of sitting.
    'Lived' is natural modern English and suits the ongoing residential sense.
- source_word: וּשְׁאָר הָעָם
  chosen: and the rest of the people
  alternatives:
  - and the remainder of the people
  lexicon: HALOT
  rationale: שְׁאָר means remainder/rest. 'The rest of the people' is the most idiomatic
    rendering.
- source_word: הִפִּילוּ גוֹרָלוֹת
  chosen: cast lots
  alternatives:
  - threw lots
  lexicon: HALOT
  rationale: This is the standard idiomatic rendering for the Hebrew expression and
    accurately conveys the selection process.
- source_word: לְהָבִיא
  chosen: to bring
  alternatives:
  - to cause to come
  - to bring in
  lexicon: HALOT
  rationale: The hiphil infinitive of בוא here expresses causing selected persons
    to come into Jerusalem. 'To bring' is concise and idiomatic in English.
- source_word: אֶחָד מִן הָעֲשָׂרָה
  chosen: one out of ten
  alternatives:
  - one of ten
  - a tenth
  lexicon: HALOT
  rationale: The phrase specifies selection by ratio. 'One out of ten' makes the distributive
    sense explicit and readable.
- source_word: לָשֶׁבֶת
  chosen: to live
  alternatives:
  - to dwell
  - to settle
  lexicon: HALOT
  rationale: Again from ישׁב in the sense of residing. 'To live' is clear and contemporary;
    'settle' could imply initial establishment rather than residence.
- source_word: עִיר הַקֹּדֶשׁ
  chosen: the holy city
  alternatives:
  - the sacred city
  lexicon: HALOT
  rationale: A straightforward construct phrase. 'Holy city' is the established and
    accurate English equivalent.
- source_word: וְתֵשַׁע הַיָּדוֹת
  chosen: while nine-tenths remained
  alternatives:
  - and nine parts
  - and nine portions
  lexicon: HALOT
  rationale: Literally 'and nine hands/parts,' an idiom for the remaining nine portions
    out of ten. Rendering the sense as 'nine-tenths remained' communicates the proportion
    clearly in English.
- source_word: בֶּעָרִים
  chosen: in the towns
  alternatives:
  - in the cities
  lexicon: HALOT
  rationale: עָרִים can be 'cities' or 'towns.' Here it contrasts Jerusalem with the
    other population centers of Judah; 'towns' better reflects that contrast in natural
    English without overstating their size.
