  text: עֲנָת֥וֹת נֹ֖ב עֲנָֽנְיָֽה׃
translation:
  text: Anathoth, Nob, Ananiah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: עֲנָתוֹת
  chosen: Anathoth
  lexicon: HALOT
  rationale: Proper place name (HNp). Following the translation philosophy, names
    are transliterated rather than translated. Standard English form 'Anathoth' is
    well established and reflects the Hebrew consonants adequately.
- source_word: נֹב
  chosen: Nob
  lexicon: HALOT
  rationale: Proper place name (HNp). Rendered by straightforward transliteration
    as 'Nob,' preserving the place-name list structure of the verse.
- source_word: עֲנָנְיָה
  chosen: Ananiah
  lexicon: HALOT
  rationale: Proper place name (HNp) in this context, listed alongside other settlements.
    Transliterated as 'Ananiah' rather than translated, since the verse is a geographic
    catalog and not an occasion to unpack the name's meaning.
