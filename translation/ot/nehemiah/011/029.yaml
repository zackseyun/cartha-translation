id: NEH.11.29
reference: Nehemiah 11:29
source:
  edition: WLC
  text: וּ/בְ/עֵ֥ין רִמּ֛וֹן וּ/בְ/צָרְעָ֖ה וּ/בְ/יַרְמֽוּת׃
translation:
  text: and in En-rimmon, and in Zorah, and in Jarmuth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Ain-rimmon.' The Hebrew place name may be represented in English with
      either En- or Ain-.
    reason: lexical_alternative
  - marker: b
    text: Hebrew lists place names with repeated 'and in,' marking successive settlements.
    reason: cultural_note
lexical_decisions:
- source_word: וּ/בְ/עֵין רִמּוֹן
  chosen: and in En-rimmon
  alternatives:
  - and in Ain-rimmon
  - and in En Rimmon
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition are rendered straightforwardly
    as 'and in.' עֵין רִמּוֹן is a place name, so per translation philosophy names
    are transliterated rather than translated. 'En-rimmon' is a standard English transliteration
    of the toponym.
- source_word: וּ/בְ/צָרְעָה
  chosen: and in Zorah
  alternatives:
  - and in Zareah
  lexicon: HALOT
  rationale: The form is a proper place name with prefixed conjunction and preposition.
    'Zorah' is the conventional and recognizable English transliteration for צָרְעָה.
- source_word: וּ/בְ/יַרְמוּת
  chosen: and in Jarmuth
  alternatives:
  - and in Yarmuth
  lexicon: HALOT
  rationale: This is another place name in a settlement list. The conjunction and
    preposition are rendered 'and in,' and the name is transliterated as 'Jarmuth,'
    a standard English form.
