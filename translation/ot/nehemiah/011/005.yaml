id: NEH.11.5
reference: Nehemiah 11:5
source:
  edition: WLC
  text: וּ/מַעֲשֵׂיָ֣ה בֶן בָּר֣וּךְ בֶּן כָּל חֹ֠זֶה בֶּן חֲזָיָ֨ה בֶן עֲדָיָ֧ה בֶן
    יוֹיָרִ֛יב בֶּן זְכַרְיָ֖ה בֶּן הַ/שִּׁלֹנִֽי־־־־־־־־׃
translation:
  text: and Maaseiah son of Baruch, son of Col-hozeh, son of Hazaiah, son of Adaiah,
    son of Joiarib, son of Zechariah, son of the Shilonite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the Shelonite." The Hebrew gentilic may refer to association with Shiloh
      or with the clan of Shelah/Shilon in genealogical tradition.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מַעֲשֵׂיָה
  chosen: and Maaseiah
  alternatives:
  - Maaseiah
  lexicon: HALOT
  rationale: The prefixed conjunction ו is retained as 'and' because this verse continues
    the list from the previous verse. The personal name is transliterated rather than
    translated, following the policy to transliterate names.
- source_word: בֶן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: Repeated genealogical בֶן is rendered consistently as 'son of' in this
    list. Although Hebrew genealogies can sometimes indicate broader descent, the
    immediate form is a straightforward patronymic chain, and 'son of' best preserves
    the source structure.
- source_word: בָּרוּךְ
  chosen: Baruch
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
- source_word: כָּל חֹזֶה
  chosen: Col-hozeh
  alternatives:
  - Kol-hozeh
  - All-seeing
  lexicon: HALOT
  rationale: This is treated as a proper name, not translated as a phrase. 'Col-hozeh'
    is a conventional transliteration of the compound name; a more phonetic 'Kol-hozeh'
    is possible, and a literal rendering would be inappropriate in the main text because
    the form functions as a personal name.
- source_word: חֲזָיָה
  chosen: Hazaiah
  alternatives:
  - Haziah
  lexicon: HALOT
  rationale: Personal name transliterated. 'Hazaiah' reflects the fuller conventional
    English form.
- source_word: עֲדָיָה
  chosen: Adaiah
  lexicon: HALOT
  rationale: Personal name transliterated by standard convention.
- source_word: יוֹיָרִיב
  chosen: Joiarib
  alternatives:
  - Jehoiarib
  lexicon: HALOT
  rationale: The shorter conventional English transliteration 'Joiarib' matches the
    Hebrew form here. 'Jehoiarib' reflects a fuller theophoric expansion seen in some
    English traditions, but is less directly tied to this spelling.
- source_word: זְכַרְיָה
  chosen: Zechariah
  alternatives:
  - Zekariah
  lexicon: HALOT
  rationale: Personal name transliterated according to standard English biblical convention.
- source_word: הַ/שִּׁלֹנִי
  chosen: the Shilonite
  alternatives:
  - the Shelonite
  - the descendant of Shiloh
  lexicon: HALOT
  rationale: The gentilic/nisbe form with article is best rendered 'the Shilonite,'
    indicating clan or place association. 'Shelonite' is a possible transliteration,
    but 'Shilonite' is the more familiar English form. 'Descendant of Shiloh' is interpretive
    and less precise than the adjectival gentilic.
