theological_decisions:
- issue: Gendered tribal designation in מִבְּנֵי יְהוּדָה
  chosen_reading: some of the sons of Judah
  alternative_readings:
  - some of the people of Judah
  rationale: Per the project's gender-accurate policy, the Hebrew expression is retained
    rather than neutralized. In this genealogical/tribal register, 'sons of Judah'
    functions as a standard tribal designation, not a doctrinally loaded claim about
    male-only residence.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
