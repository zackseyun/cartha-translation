id: NEH.11.25
reference: Nehemiah 11:25
source:
  edition: WLC
  text: וְ/אֶל הַ/חֲצֵרִ֖ים בִּ/שְׂדֹתָ֑/ם מִ/בְּנֵ֣י יְהוּדָ֗ה יָֽשְׁב֞וּ בְּ/קִרְיַ֤ת
    הָֽאַרְבַּע֙ וּ/בְנֹתֶ֔י/הָ וּ/בְ/דִיבֹן֙ וּ/בְנֹתֶ֔י/הָ וּ/בִֽ/יקַּבְצְאֵ֖ל וַ/חֲצֵרֶֽי/הָ־׃
translation:
  text: As for the villages in their fields, some of the sons of Judah lived in Kiriath-arba
    and its daughter villages, and in Dibon and its daughter villages, and in Jekabzeel
    and its settlements.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Kiriath-arba is the older name for Hebron; compare Joshua 14:15.
    reason: cross_reference
  - marker: b
    text: Hebrew 'its daughters,' an idiom for a town's dependent or surrounding villages.
    reason: lexical_alternative
  - marker: c
    text: Jekabzeel is also rendered 'Kabzeel' in some related traditions and passages.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאֶל
  chosen: As for
  alternatives:
  - And to
  - Now as for
  lexicon: HALOT
  rationale: The phrase introduces a new topic or category in the list rather than
    simple motion. 'As for' captures the discourse-shift function more naturally in
    English than a literal 'and to.'
- source_word: הַחֲצֵרִים
  chosen: the villages
  alternatives:
  - the settlements
  - the hamlets
  - the enclosures
  lexicon: HALOT
  rationale: In this administrative/geographical context, חֲצֵרִים refers to small
    dependent rural habitations rather than literal courtyards. 'Villages' is the
    clearest natural rendering here.
- source_word: בִּשְׂדֹתָם
  chosen: in their fields
  alternatives:
  - in their countryside
  - in their rural lands
  lexicon: HALOT
  rationale: The phrase locates these villages within the agricultural lands belonging
    to them. 'In their fields' is a fairly direct rendering that preserves the agrarian
    sense.
- source_word: מִבְּנֵי יְהוּדָה
  chosen: some of the sons of Judah
  alternatives:
  - from the sons of Judah
  - some of the people of Judah
  lexicon: HALOT
  rationale: The partitive מִן indicates that only a portion is in view. 'Sons of
    Judah' preserves the Hebrew expression and its tribal sense; 'some of' makes the
    partitive force explicit.
- source_word: יָשְׁבוּ
  chosen: lived
  alternatives:
  - dwelt
  - settled
  lexicon: HALOT
  rationale: '''Lived'' is idiomatic modern English for residence. ''Settled'' could
    imply initial establishment, which the verb does not necessarily emphasize here.'
- source_word: בְּקִרְיַת הָאַרְבַּע
  chosen: in Kiriath-arba
  alternatives:
  - in Kiriath-arba (that is, Hebron)
  lexicon: HALOT
  rationale: This is a place name and should be transliterated per project philosophy.
    The verse itself does not supply the identification with Hebron, so that is better
    preserved in a footnote rather than inserted into the main text.
- source_word: וּבְנֹתֶיהָ
  chosen: its daughter villages
  alternatives:
  - its dependent villages
  - its surrounding villages
  lexicon: HALOT
  rationale: Literally 'its daughters,' an idiom for satellite towns or villages dependent
    on a main city. 'Daughter villages' preserves the metaphor while remaining understandable.
- source_word: וּבְדִיבוֹן
  chosen: and in Dibon
  lexicon: HALOT
  rationale: Place name; transliterated.
- source_word: וּבִיקַּבְצְאֵל
  chosen: and in Jekabzeel
  alternatives:
  - and in Kabzeel
  lexicon: HALOT
  rationale: The consonantal form here supports Jekabzeel/Jeqabzeel. Because Kabzeel
    is a known alternate form in related passages/traditions, that alternative is
    worth preserving in a footnote.
- source_word: וַחֲצֵרֶיהָ
  chosen: its settlements
  alternatives:
  - its villages
  - its hamlets
  lexicon: HALOT
  rationale: Here חֲצֵרִים again denotes dependent rural habitations. To avoid awkward
    repetition after 'daughter villages' and to reflect the broader sense, 'settlements'
    is suitable.
