id: NEH.11.22
reference: Nehemiah 11:22
source:
  edition: WLC
  text: וּ/פְקִ֤יד הַ/לְוִיִּם֙ בִּ/יר֣וּשָׁלִַ֔ם עֻזִּ֤י בֶן בָּנִי֙ בֶּן חֲשַׁבְיָ֔ה
    בֶּן מַתַּנְיָ֖ה בֶּן מִיכָ֑א מִ/בְּנֵ֤י אָסָף֙ הַ/מְשֹׁ֣רְרִ֔ים לְ/נֶ֖גֶד מְלֶ֥אכֶת
    בֵּית הָ/אֱלֹהִֽים־־־־־׃
translation:
  text: And the overseer of the Levites in Jerusalem was Uzzi son of Bani, son of
    Hashabiah, son of Mattaniah, son of Mica, from the sons of Asaph, the singers,
    for the work of the house of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in charge of the work of the house of God.' The Hebrew phrase with לְנֶגֶד
      can express oversight or responsibility in relation to the temple work.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפְקִיד
  chosen: the overseer
  alternatives:
  - the officer
  - the appointed one
  - the supervisor
  lexicon: HALOT
  rationale: פְקִיד denotes one appointed to oversight or administration. 'Overseer'
    best captures an official supervisory role in clear modern English without over-specifying
    a military or bureaucratic nuance.
- source_word: הַלְוִיִּם
  chosen: of the Levites
  alternatives:
  - over the Levites
  lexicon: HALOT
  rationale: Construct relation with פקיד indicates the official connected with the
    Levites. 'Of the Levites' is a natural English rendering; the oversight sense
    is already conveyed by 'overseer.'
- source_word: בִּירוּשָׁלִַם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Straightforward locative use of בְּ.
- source_word: עֻזִּי בֶן־בָּנִי בֶן־חֲשַׁבְיָה בֶן־מַתַּנְיָה בֶן־מִיכָא
  chosen: Uzzi son of Bani, son of Hashabiah, son of Mattaniah, son of Mica
  rationale: Personal names are transliterated per project philosophy. Genealogical
    בן is rendered repeatedly as 'son of' for clarity and formal transparency.
- source_word: מִבְּנֵי אָסָף
  chosen: from the sons of Asaph
  alternatives:
  - one of the descendants of Asaph
  - from the descendants of Asaph
  lexicon: HALOT
  rationale: Literally 'from the sons of Asaph.' Since this is a genealogical/clerical
    designation, the more formal wording preserves the Hebrew structure while remaining
    understandable.
- source_word: הַמְשֹׁרְרִים
  chosen: the singers
  alternatives:
  - the song leaders
  - the musicians
  lexicon: HALOT
  rationale: The participial form identifies the Asaphites by their temple role as
    singers. 'Musicians' is broader than the Hebrew; 'the singers' is precise.
- source_word: לְנֶגֶד
  chosen: for
  alternatives:
  - in charge of
  - over
  - before
  - in relation to
  lexicon: HALOT
  rationale: In this administrative context, לְנֶגֶד with מְלֶאכֶת conveys responsibility
    or relation to the work. 'For the work' is concise and idiomatic, avoiding an
    overly literal 'before the work' that would obscure the sense.
- source_word: מְלֶאכֶת
  chosen: the work
  alternatives:
  - the service
  - the business
  - the labor
  lexicon: HALOT
  rationale: מְלָאכָה commonly denotes work or occupational task. Here it refers to
    temple duties broadly; 'the work' preserves that breadth better than the more
    interpretive 'service.'
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - the temple of God
  lexicon: HALOT
  rationale: Literally 'house of God.' While it refers to the temple, the Hebrew expression
    is transparent and natural in English, so the more literal rendering is preferred.
