id: NEH.11.31
reference: Nehemiah 11:31
source:
  edition: WLC
  text: וּ/בְנֵ֥י בִנְיָמִ֖ן מִ/גָּ֑בַע מִכְמָ֣שׂ וְ/עַיָּ֔ה וּ/בֵֽית אֵ֖ל וּ/בְנֹתֶֽי/הָ־׃
translation:
  text: And the sons of Benjamin were from Geba, Michmash, Aijah, and Bethel and its
    villages.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Ai' for 'Aijah'; the Hebrew form here is עַיָּה, which may reflect the
      same site or a closely related place-name in translation tradition.
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְנֵי בִנְיָמִן
  chosen: And the sons of Benjamin
  alternatives:
  - And the Benjamites
  - And the descendants of Benjamin
  lexicon: HALOT
  rationale: בְנֵי literally means 'sons of.' In this census/settlement context it
    denotes the members/descendants of the tribe of Benjamin. 'Sons of Benjamin' preserves
    the Hebrew form and tribal identity more transparently than the more idiomatic
    'Benjamites.'
- source_word: מִגָּבַע
  chosen: were from Geba
  alternatives:
  - from Geba
  lexicon: HALOT
  rationale: 'The prefixed מִן marks point of origin or starting place in this settlement
    list. English supplies ''were'' for a natural clause: the Benjaminites were distributed
    from Geba onward.'
- source_word: מִכְמָשׂ
  chosen: Michmash
  alternatives:
  - Mikmash
  lexicon: HALOT
  rationale: Proper place name transliterated by standard English convention as 'Michmash.'
- source_word: וְעַיָּה
  chosen: Aijah
  alternatives:
  - Ai
  - Ayyah
  lexicon: HALOT
  rationale: The consonantal form here is עַיָּה, best represented as 'Aijah/Ayyah.'
    Because the nearby site Ai is a known alternative identification/rendering in
    some translations, that alternative is preserved in a footnote rather than adopted
    in the main text.
- source_word: וּבֵית אֵל
  chosen: and Bethel
  alternatives:
  - and Beth-el
  lexicon: HALOT
  rationale: Proper place name, conventionally rendered 'Bethel.'
- source_word: וּבְנֹתֶיהָ
  chosen: and its villages
  alternatives:
  - and its daughters
  - and its dependent towns
  lexicon: HALOT
  rationale: Literally 'and its daughters,' an idiom for satellite settlements or
    dependent villages associated with a main town. 'Its villages' communicates the
    sense in clear modern English without wooden literalism.
