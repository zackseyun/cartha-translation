id: NEH.11.30
reference: Nehemiah 11:30
source:
  edition: WLC
  text: זָנֹ֤חַ עֲדֻלָּם֙ וְ/חַצְרֵי/הֶ֔ם לָכִישׁ֙ וּ/שְׂדֹתֶ֔י/הָ עֲזֵקָ֖ה וּ/בְנֹתֶ֑י/הָ
    וַ/יַּחֲנ֥וּ מִ/בְּאֵֽר שֶׁ֖בַע עַד גֵּֽיא הִנֹּֽם־־־׃
translation:
  text: Zanoah, Adullam and their villages, Lachish and its fields, Azekah and its
    daughter towns. So they camped from Beer-sheba as far as the Valley of Hinnom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its villages' / 'its dependent towns' for 'its daughter towns.'
    reason: lexical_alternative
  - marker: b
    text: The verb can also be rendered 'they encamped' or, by extension in this context,
      'they settled.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זָנֹחַ
  chosen: Zanoah
  lexicon: HALOT
  rationale: Proper place name; transliterated according to the translation philosophy
    for names.
- source_word: עֲדֻלָּם
  chosen: Adullam
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated.
- source_word: חַצְרֵיהֶם
  chosen: their villages
  alternatives:
  - their settlements
  - their hamlets
  - their courts/enclosures
  lexicon: HALOT
  rationale: חָצֵר in settlement lists commonly refers to dependent rural settlements
    or villages associated with a larger town. 'Villages' is idiomatic and fits the
    geographic catalog context better than the more literal but misleading 'courtyards'
    or 'enclosures'.
- source_word: לָכִישׁ
  chosen: Lachish
  lexicon: HALOT
  rationale: Proper place name; transliterated.
- source_word: שְׂדֹתֶיהָ
  chosen: its fields
  alternatives:
  - its territory
  - its open country
  lexicon: HALOT
  rationale: שָׂדֶה literally means 'field.' In a town list it can denote the agricultural
    lands belonging to the city. 'Its fields' preserves the concrete sense while naturally
    implying surrounding farmland.
- source_word: עֲזֵקָה
  chosen: Azekah
  lexicon: HALOT
  rationale: Proper place name; transliterated.
- source_word: בְנֹתֶיהָ
  chosen: its daughter towns
  alternatives:
  - its villages
  - its dependent towns
  lexicon: HALOT
  rationale: The idiom 'daughters' for subsidiary settlements is common in Hebrew
    geographic descriptions. 'Daughter towns' preserves the metaphor and remains understandable
    in English; a footnote preserves the plainer alternative.
- source_word: וַיַּחֲנוּ
  chosen: they camped
  alternatives:
  - they encamped
  - they settled
  lexicon: HALOT
  rationale: The verb חנה literally means 'to camp/encamp.' In this resettlement context
    it can imply taking up residence, but 'camped' keeps the lexical sense without
    overinterpreting. The broader settlement sense is conveyed by the geographic range
    statement.
- source_word: מִבְּאֵר שֶׁבַע
  chosen: from Beer-sheba
  alternatives:
  - from Beersheba
  lexicon: HALOT
  rationale: Standard English transliteration of the place name, retaining the familiar
    hyphenated form.
- source_word: עַד
  chosen: as far as
  alternatives:
  - to
  - up to
  lexicon: HALOT
  rationale: '''As far as'' clearly expresses geographic extent in English.'
- source_word: גֵּיא הִנֹּם
  chosen: the Valley of Hinnom
  alternatives:
  - the Hinnom Valley
  lexicon: HALOT
  rationale: Construct phrase naming a known valley near Jerusalem. 'The Valley of
    Hinnom' is a standard and transparent rendering.
