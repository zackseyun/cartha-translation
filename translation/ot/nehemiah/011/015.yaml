id: NEH.11.15
reference: Nehemiah 11:15
source:
  edition: WLC
  text: וּ/מִֽן הַ/לְוִיִּ֑ם שְׁמַעְיָ֧ה בֶן חַשּׁ֛וּב בֶּן עַזְרִיקָ֥ם בֶּן חֲשַׁבְיָ֖ה
    בֶּן בּוּנִּֽי־־־־־׃
translation:
  text: 'And from the Levites: Shemaiah son of Hasshub, son of Azrikam, son of Hashabiah,
    son of Bunni.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew בן ('son of') in genealogical lists can sometimes denote a more distant
      descendant, not necessarily an immediate father-son relationship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִן
  chosen: And from
  alternatives:
  - From
  - Now from
  lexicon: HALOT
  rationale: The conjunction prefixed to מִן naturally links this verse to the preceding
    list, so 'And from' preserves the connective force while remaining idiomatic in
    English.
- source_word: הַלְוִיִּם
  chosen: the Levites
  alternatives:
  - the Levitical men
  - the sons of Levi
  lexicon: HALOT
  rationale: The term denotes members of the Levitical tribe serving as a recognized
    group. 'The Levites' is the standard and most natural English rendering.
- source_word: שְׁמַעְיָה
  chosen: Shemaiah
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: בֶן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: In genealogical sequences בן can sometimes mean a more remote descendant,
    but in list format 'son of' is the normal formal rendering and preserves the Hebrew
    structure.
- source_word: חַשּׁוּב
  chosen: Hasshub
  alternatives:
  - Hashub
  rationale: Standard English transliteration of the personal name; doubled consonant
    is commonly represented as 'Hasshub' in English Bible tradition.
- source_word: עַזְרִיקָם
  chosen: Azrikam
  rationale: Standard transliteration of the proper name.
- source_word: חֲשַׁבְיָה
  chosen: Hashabiah
  alternatives:
  - Hashabya
  rationale: Standard transliteration of the proper name in English biblical usage.
- source_word: בּוּנִּי
  chosen: Bunni
  alternatives:
  - Buni
  rationale: Standard transliteration of the proper name; the doubled consonant is
    commonly reflected in English as 'Bunni'.
