id: NEH.11.13
reference: Nehemiah 11:13
source:
  edition: WLC
  text: וְ/אֶחָי/ו֙ רָאשִׁ֣ים לְ/אָב֔וֹת מָאתַ֖יִם אַרְבָּעִ֣ים וּ/שְׁנָ֑יִם וַ/עֲמַשְׁסַ֧י
    בֶּן עֲזַרְאֵ֛ל בֶּן אַחְזַ֥י בֶּן מְשִׁלֵּמ֖וֹת בֶּן אִמֵּֽר־־־־׃
translation:
  text: and his brothers, heads of fathers’ houses, 242; and Amashsai son of Azarel,
    son of Ahzai, son of Meshillemoth, son of Immer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'heads of ancestral houses' or 'chiefs of families.' The Hebrew literally
      refers to clan heads within fathers’ houses.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''two hundred forty-two.'''
    reason: lexical_alternative
  - marker: c
    text: The name 'Amashsai' is sometimes rendered 'Amasai' in English.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאֶחָיו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  - and his brethren
  lexicon: HALOT
  rationale: אָח in the plural with 3ms suffix commonly denotes male relatives or
    associates within a clan/priestly grouping. 'Brothers' is the most direct rendering
    and fits the administrative/genealogical context; broader 'kinsmen' is possible
    but less literal.
- source_word: רָאשִׁים לְאָבוֹת
  chosen: heads of fathers’ houses
  alternatives:
  - heads of ancestral houses
  - chiefs of families
  lexicon: HALOT
  rationale: This construct refers to clan/family heads. 'Fathers’ houses' preserves
    the Hebrew social structure more transparently than smoothing to 'families,' while
    'heads of fathers’ houses' remains understandable in English.
- source_word: מָאתַיִם אַרְבָּעִים וּשְׁנָיִם
  chosen: '242'
  alternatives:
  - two hundred forty-two
  lexicon: HALOT
  rationale: The Hebrew cardinal sequence straightforwardly totals 242. Numerals are
    rendered as digits for readability in a census/genealogical list; the meaning
    is unchanged.
- source_word: וַעֲמַשְׁסַי
  chosen: and Amashsai
  alternatives:
  - and Amasai
  lexicon: HALOT
  rationale: The proper name is transliterated from the consonantal form in Nehemiah.
    'Amashsai' reflects the Masoretic spelling here more closely; a more familiar
    harmonized form 'Amasai' is possible but would smooth over the specific Hebrew
    form.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: In genealogical notices בן normally means 'son of,' though it can sometimes
    cover a more remote descendant. Here the repeated formula is best rendered literally
    as 'son of' unless context requires otherwise.
- source_word: עֲזַרְאֵל
  chosen: Azarel
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
- source_word: אַחְזַי
  chosen: Ahzai
  alternatives:
  - Ahasai
  lexicon: HALOT
  rationale: Personal name transliterated directly from the Hebrew form in this verse.
- source_word: מְשִׁלֵּמוֹת
  chosen: Meshillemoth
  alternatives:
  - Meshillemith
  lexicon: HALOT
  rationale: Personal name transliterated from the Hebrew spelling attested here;
    alternative spellings reflect different vocalization/transliteration conventions.
- source_word: אִמֵּר
  chosen: Immer
  lexicon: HALOT
  rationale: Personal name transliterated directly; also known as a priestly family
    name, which suits the context.
