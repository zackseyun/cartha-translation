id: NEH.11.10
reference: Nehemiah 11:10
source:
  edition: WLC
  text: מִן הַֽ/כֹּהֲנִ֑ים יְדַֽעְיָ֥ה בֶן יוֹיָרִ֖יב יָכִֽין־־׃
translation:
  text: 'From the priests: Jedaiah son of Joiarib, Jakin.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or possibly the list names two priestly houses or representatives: ''Jedaiah,
      son of Joiarib; Jakin.'' The Hebrew is terse and lacks an explicit conjunction.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִן
  chosen: From
  alternatives:
  - Of
  - Among
  lexicon: HALOT
  rationale: The preposition marks membership within the larger group being listed.
    'From' is natural English introducing a subset in a census/list context.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  alternatives:
  - the priestly men
  - the priesthood
  lexicon: HALOT
  rationale: Definite plural noun referring to members of the priestly class. 'The
    priests' is the plain and idiomatic rendering in this roster context.
- source_word: יְדַעְיָה
  chosen: Jedaiah
  rationale: Personal name; per translation philosophy, names are transliterated rather
    than translated.
- source_word: בֶן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: The construct commonly denotes immediate filiation in genealogical/list
    contexts. Although Hebrew can sometimes mean 'descendant of,' 'son of' is the
    default and most transparent rendering here.
- source_word: יוֹיָרִיב
  chosen: Joiarib
  rationale: Personal name; transliterated by standard English convention.
- source_word: יָכִין
  chosen: Jakin
  rationale: Personal name; transliterated. In this compressed list, it is best taken
    as a second priestly name coordinated appositionally after 'Jedaiah son of Joiarib,'
    rather than translated as a common noun.
