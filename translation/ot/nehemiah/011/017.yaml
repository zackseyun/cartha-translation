theological_decisions:
- issue: Sense of ידה in a worship context
  chosen_reading: thanksgiving/praise rather than confession
  alternative_readings:
  - confession
  rationale: Although ידה can denote confession in some contexts, here the temple-service
    setting and the association with Asaphite worship strongly favor thanksgiving/praise.
    This is a lexical-contextual decision rather than a doctrinally contested one.
