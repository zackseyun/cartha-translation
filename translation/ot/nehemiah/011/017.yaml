id: NEH.11.17
reference: Nehemiah 11:17
source:
  edition: WLC
  text: וּ/מַתַּנְיָ֣ה בֶן מִ֠יכָה בֶּן זַבְדִּ֨י בֶן אָסָ֜ף רֹ֗אשׁ הַ/תְּחִלָּה֙
    יְהוֹדֶ֣ה לַ/תְּפִלָּ֔ה וּ/בַקְבֻּקְיָ֖ה מִשְׁנֶ֣ה מֵ/אֶחָ֑י/ו וְ/עַבְדָּא֙ בֶּן
    שַׁמּ֔וּעַ בֶּן גָּלָ֖ל בֶּן ידיתון־־־־־־׃
translation:
  text: And Mattaniah son of Micah, son of Zabdi, son of Asaph, was the head, the
    one who began the thanksgiving in prayer; and Bakbukiah was second among his brothers;
    and Abda son of Shammua, son of Galal, son of Jeduthun.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gave thanks in prayer'; the Hebrew may be rendered more literally, 'head
      of the beginning, giving thanks in prayer,' indicating that Mattaniah led or
      initiated the thanksgiving.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹאשׁ
  chosen: head
  alternatives:
  - chief
  - leader
  lexicon: HALOT
  rationale: In this administrative/genealogical list, רֹאשׁ denotes a leading position.
    'Head' preserves the concrete Hebrew metaphor while remaining natural in English.
- source_word: הַתְּחִלָּה
  chosen: the one who began
  alternatives:
  - the beginning
  - at the beginning
  - first
  lexicon: HALOT
  rationale: The noun 'beginning' functions appositionally with 'head' and is clarified
    by the following verb. Rendering it verbally in English avoids awkwardness while
    preserving the sense that Mattaniah had the initiating role.
- source_word: יְהוֹדֶה
  chosen: began the thanksgiving
  alternatives:
  - gave thanks
  - praised
  - confessed
  lexicon: HALOT
  rationale: The Hiphil of ידה in liturgical context commonly means 'give thanks'
    or 'offer praise/thanksgiving.' Because it follows 'the beginning,' the combined
    sense is that he initiated the thanksgiving. 'Thanksgiving' fits the temple-worship
    setting better than 'confessed' here.
- source_word: לַתְּפִלָּה
  chosen: in prayer
  alternatives:
  - for prayer
  - at prayer
  lexicon: HALOT
  rationale: The preposition ל here is best represented idiomatically in English as
    indicating the sphere or occasion of the thanksgiving. 'In prayer' is natural
    and preserves the liturgical context.
- source_word: מִשְׁנֶה
  chosen: second
  alternatives:
  - second in rank
  - deputy
  lexicon: HALOT
  rationale: The term indicates secondary rank or position. 'Second' is concise and
    sufficiently clear in a list of temple officials.
- source_word: מֵאֶחָיו
  chosen: among his brothers
  alternatives:
  - among his kinsmen
  - among his fellow Levites
  lexicon: HALOT
  rationale: The Hebrew literally says 'from/amid his brothers.' 'Brothers' preserves
    the familial-group language of the source; more interpretive expansions like 'fellow
    Levites' go beyond the immediate wording.
- source_word: יְהוֹדֶה לַתְּפִלָּה
  chosen: the thanksgiving in prayer
  alternatives:
  - thanks at prayer
  - praise in prayer
  lexicon: HALOT
  rationale: Taken together, the phrase points to a liturgical act of thanksgiving
    associated with prayer. 'Thanksgiving in prayer' is a balanced rendering that
    preserves both elements without overinterpreting the exact ritual form.
- source_word: יְדִיתוּן
  chosen: Jeduthun
  alternatives:
  - Jedithun
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name is 'Jeduthun.'
    Personal names are transliterated rather than translated.
