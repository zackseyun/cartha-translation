id: NEH.11.9
reference: Nehemiah 11:9
source:
  edition: WLC
  text: וְ/יוֹאֵ֥ל בֶּן זִכְרִ֖י פָּקִ֣יד עֲלֵי/הֶ֑ם וִ/יהוּדָ֧ה בֶן הַ/סְּנוּאָ֛ה
    עַל הָ/עִ֖יר מִשְׁנֶֽה־־־׃פ
translation:
  text: And Joel son of Zichri was overseer over them, and Judah son of Hassenuah
    was second over the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deputy over the city' or 'second in command over the city.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּקִיד
  chosen: overseer
  alternatives:
  - officer
  - supervisor
  - appointed leader
  lexicon: HALOT
  rationale: The noun denotes one appointed to oversight or administration. 'Overseer'
    is natural modern English and preserves the administrative sense without over-specifying
    a military or royal office.
- source_word: עֲלֵיהֶם
  chosen: over them
  alternatives:
  - in charge of them
  lexicon: HALOT
  rationale: The preposition על with pronominal suffix here indicates authority or
    supervision. 'Over them' is a straightforward rendering that matches the syntax
    and keeps the relation explicit.
- source_word: מִשְׁנֶה
  chosen: second
  alternatives:
  - second in command
  - deputy
  lexicon: HALOT
  rationale: The term commonly denotes a second-ranking person or deputy. 'Second'
    keeps the Hebrew's brevity and leaves the exact administrative nuance open, while
    the context 'over the city' implies subordinate civic authority.
- source_word: עַל הָעִיר
  chosen: over the city
  alternatives:
  - for the city
  - in charge of the city
  lexicon: HALOT
  rationale: The preposition על here marks jurisdiction or responsibility. 'Over the
    city' fits the administrative context and pairs well with 'second' to indicate
    rank within city governance.
- source_word: הַסְּנוּאָה
  chosen: Hassenuah
  alternatives:
  - Senuah
  lexicon: HALOT
  rationale: As a personal/family name, it is transliterated rather than translated,
    following the project's policy for names. 'Hassenuah' reflects the Hebrew form
    with article incorporated in the conventional transliteration.
- source_word: וְ
  chosen: And
  rationale: The conjunction links this verse to the preceding list and is best retained
    in English for continuity.
