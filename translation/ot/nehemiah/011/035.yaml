id: NEH.11.35
reference: Nehemiah 11:35
source:
  edition: WLC
  text: לֹ֥ד וְ/אוֹנ֖וֹ גֵּ֥י הַחֲרָשִֽׁים׃
translation:
  text: Lod and Ono, the Valley of the Craftsmen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Valley of the Artisans'; the Hebrew term can refer more specifically
      to craftsmen such as smiths.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹד
  chosen: Lod
  lexicon: HALOT
  rationale: Proper place name; transliterated according to the translation philosophy
    for names rather than translated.
- source_word: וְ/אוֹנוֹ
  chosen: and Ono
  lexicon: HALOT
  rationale: Conjunction plus proper place name. The conjunction is rendered straightforwardly
    as 'and,' and the place name is transliterated.
- source_word: גֵּי
  chosen: Valley of
  alternatives:
  - valley
  lexicon: HALOT
  rationale: Construct form of 'valley' governing the following noun. 'Valley of'
    best reflects the Hebrew construct relationship in natural English.
- source_word: הַחֲרָשִׁים
  chosen: the Craftsmen
  alternatives:
  - the artisans
  - the smiths
  lexicon: HALOT
  rationale: The noun can denote craftsmen or artisans generally, and in some contexts
    specifically smiths. Here, as a place name in construct with 'Valley,' the broader
    rendering 'the Craftsmen' preserves the likely toponym while remaining intelligible.
    The article is retained as part of the construct expression.
