id: NEH.11.33
reference: Nehemiah 11:33
source:
  edition: WLC
  text: חָצ֥וֹר רָמָ֖ה גִּתָּֽיִם׀׃
translation:
  text: Hazor, Ramah, Gittaim;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'Gittayim,' reflecting a more phonetic transliteration of the
      Hebrew form.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָצוֹר
  chosen: Hazor
  alternatives:
  - Hazor
  lexicon: HALOT
  rationale: Proper place name (HNp). Following the translation philosophy, personal
    and place names are transliterated rather than translated. Although the name may
    historically derive from a common noun meaning 'settlement' or 'enclosure,' in
    this context it functions simply as a toponym in a settlement list.
- source_word: רָמָה
  chosen: Ramah
  alternatives:
  - Rama
  lexicon: HALOT
  rationale: Proper place name (HNp). Transliterated in standard English biblical
    form. While the underlying noun can mean 'height' or 'high place,' here it is
    a place name and should not be translated semantically.
- source_word: גִּתַּיִם
  chosen: Gittaim
  alternatives:
  - Gittayim
  lexicon: HALOT
  rationale: Proper place name (HNp). Standard English transliteration is retained.
    The dual/plural-looking ending is part of the established toponym and is not translated.
    Since the verse is a bare list of towns, preserving recognizable place names is
    preferable to speculative semantic rendering.
