id: NEH.11.19
reference: Nehemiah 11:19
source:
  edition: WLC
  text: וְ/הַ/שּֽׁוֹעֲרִים֙ עַקּ֣וּב טַלְמ֔וֹן וַ/אֲחֵי/הֶ֖ם הַ/שֹּׁמְרִ֣ים בַּ/שְּׁעָרִ֑ים
    מֵאָ֖ה שִׁבְעִ֥ים וּ/שְׁנָֽיִם׃
translation:
  text: 'And the gatekeepers: Akkub, Talmon, and their brothers who kept watch at
    the gates, were one hundred seventy-two.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their kinsmen'; Hebrew 'their brothers' can denote close male relatives
      or fellow members of the same group.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשּׁוֹעֲרִים
  chosen: the gatekeepers
  alternatives:
  - the doorkeepers
  - the guards at the gates
  lexicon: HALOT
  rationale: The noun denotes those assigned to guard or attend the gates. 'Gatekeepers'
    is the standard and clearest English rendering in this temple/city-administration
    context, preserving the institutional role without over-paraphrase.
- source_word: עַקּוּב
  chosen: Akkub
  rationale: Proper personal name; transliterated according to the translation philosophy
    of transliterating names rather than translating them.
- source_word: טַלְמוֹן
  chosen: Talmon
  rationale: Proper personal name; transliterated by standard English convention.
- source_word: וַאֲחֵיהֶם
  chosen: and their brothers
  alternatives:
  - and their kinsmen
  - and their fellow Levites
  lexicon: HALOT
  rationale: The base sense of אָח is 'brother.' In genealogical/tribal lists it can
    extend to clan associates, but here 'brothers' best preserves the Hebrew wording
    and the source's male-group reference, in keeping with the gender-accurate policy.
- source_word: הַשֹּׁמְרִים
  chosen: who kept watch
  alternatives:
  - who were guarding
  - the ones keeping watch
  lexicon: HALOT
  rationale: The participle of שׁמר here describes ongoing duty. 'Kept watch' is idiomatic
    English for guard duty and fits the gatekeeping context better than a wooden 'keeping'
    while preserving the active sense.
- source_word: בַּשְּׁעָרִים
  chosen: at the gates
  alternatives:
  - in the gates
  - by the gates
  lexicon: HALOT
  rationale: With the article and preposition, the phrase refers to the locations
    where they served. 'At the gates' is the most natural English expression for stationed
    gatekeepers.
- source_word: מֵאָה שִׁבְעִים וּשְׁנָיִם
  chosen: one hundred seventy-two
  alternatives:
  - a hundred and seventy-two
  rationale: Cardinal number giving the total count. The modern English style without
    'and' is clear and readable.
