id: NEH.11.6
reference: Nehemiah 11:6
source:
  edition: WLC
  text: כָּל בְּנֵי פֶ֕רֶץ הַ/יֹּשְׁבִ֖ים בִּ/ירוּשָׁלִָ֑ם אַרְבַּ֥ע מֵא֛וֹת שִׁשִּׁ֥ים
    וּ/שְׁמֹנָ֖ה אַנְשֵׁי חָֽיִל־־־׃ס
translation:
  text: All the sons of Perez who lived in Jerusalem were four hundred sixty-eight
    valiant men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “men of valor.” The Hebrew phrase can denote men distinguished by strength,
      capability, or valor.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - The whole number of
  lexicon: HALOT
  rationale: The distributive/totalizing sense is straightforward here, introducing
    the full count of the group.
- source_word: בְּנֵי פֶרֶץ
  chosen: the sons of Perez
  alternatives:
  - the descendants of Perez
  lexicon: HALOT
  rationale: Literally 'sons of Perez.' In genealogical/register contexts this can
    mean descendants, but 'sons of Perez' preserves the Hebrew kinship expression
    while remaining natural enough in English.
- source_word: הַיֹּשְׁבִים
  chosen: who lived
  alternatives:
  - who dwelt
  - who were living
  lexicon: HALOT
  rationale: The participle of ישב in settlement contexts commonly means residing/living.
    'Who lived' is idiomatic modern English and fits the census-style statement.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Standard locative use with the place name.
- source_word: אַרְבַּע מֵאוֹת שִׁשִּׁים וּשְׁמֹנָה
  chosen: four hundred sixty-eight
  alternatives:
  - '468'
  lexicon: HALOT
  rationale: The Hebrew cardinal sequence is rendered in standard English number wording
    rather than numerals in the main text.
- source_word: אַנְשֵׁי חָיִל
  chosen: valiant men
  alternatives:
  - men of valor
  - capable men
  - mighty men
  lexicon: HALOT
  rationale: This phrase often denotes men marked by strength, competence, or valor.
    In this population register, 'valiant men' preserves the masculine form and the
    commendatory force without sounding archaic. 'Men of valor' is a close alternative
    worth preserving.
