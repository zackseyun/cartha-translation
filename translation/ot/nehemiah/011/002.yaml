theological_decisions:
- issue: Gender rendering of הָאֲנָשִׁים
  chosen_reading: all the men
  alternative_readings:
  - all the people
  - everyone
  rationale: The Hebrew uses the masculine noun אנשים rather than a generic collective.
    Per the translation philosophy's gender-accurate principle, the masculine reference
    is preserved unless context clearly demands a generic rendering.
