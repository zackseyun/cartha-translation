id: NEH.11.2
reference: Nehemiah 11:2
source:
  edition: WLC
  text: וַֽ/יְבָרֲכ֖וּ הָ/עָ֑ם לְ/כֹל֙ הָֽ/אֲנָשִׁ֔ים הַ/מִּֽתְנַדְּבִ֔ים לָ/שֶׁ֖בֶת
    בִּ/ירוּשָׁלִָֽם׃פ
translation:
  text: And the people blessed all the men who willingly offered themselves to live
    in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who volunteered to live in Jerusalem.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבָרֲכוּ
  chosen: blessed
  alternatives:
  - spoke well of
  - praised
  lexicon: HALOT
  rationale: The verb ברך in the piel commonly means 'bless.' Here the object is human
    rather than God, so the sense is that the people pronounced blessing or approval
    on them. 'Blessed' preserves the lexical link without flattening it to mere praise.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the populace
  lexicon: HALOT
  rationale: עם is the standard collective term 'people.' 'The people' is natural
    and formally close.
- source_word: לְכֹל הָאֲנָשִׁים
  chosen: all the men
  alternatives:
  - all the people
  - everyone
  lexicon: HALOT
  rationale: אנשים is grammatically and lexically 'men' here, not the more generic
    'people.' In keeping with the gender-accurate policy, the masculine form is retained
    rather than neutralized.
- source_word: הַמִּתְנַדְּבִים
  chosen: who willingly offered themselves
  alternatives:
  - who volunteered
  - who freely offered themselves
  lexicon: HALOT
  rationale: The hitpael of נדב conveys voluntary self-offering or willingness. 'Volunteered'
    is possible, but 'willingly offered themselves' better preserves the reflexive
    nuance and the formal dignity of the context.
- source_word: לָשֶׁבֶת
  chosen: to live
  alternatives:
  - to dwell
  - to settle
  lexicon: HALOT
  rationale: ישב can mean sit, dwell, remain, or live. In this context of taking up
    residence in Jerusalem, 'to live' is idiomatic modern English; 'dwell' is more
    formal but less natural.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Standard locative rendering of the place name.
