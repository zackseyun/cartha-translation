id: NEH.11.7
reference: Nehemiah 11:7
source:
  edition: WLC
  text: וְ/אֵ֖לֶּה בְּנֵ֣י בִנְיָמִ֑ן סַלֻּ֡א בֶּן מְשֻׁלָּ֡ם בֶּן יוֹעֵ֡ד בֶּן פְּדָיָה֩
    בֶן ק֨וֹלָיָ֧ה בֶן מַעֲשֵׂיָ֛ה בֶּן אִֽיתִיאֵ֖ל בֶּן יְשַֽׁעְיָֽה־־־־־־־׃
translation:
  text: 'And these were the sons of Benjamin: Sallu son of Meshullam, son of Joed,
    son of Pedaiah, son of Kolaiah, son of Maaseiah, son of Ithiel, son of Jeshaiah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of Benjamin' may also be understood more broadly as 'descendants
      of Benjamin' or 'Benjamites.'
    reason: lexical_alternative
  - marker: b
    text: The name 'Joed' follows the Masoretic Text here. A parallel genealogy in
      1 Chronicles 9:7 reads 'Hodaviah.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: And these were
  alternatives:
  - Now these were
  - And these are
  lexicon: HALOT
  rationale: The conjunction plus demonstrative introduces the next list item in a
    narrative/register context. English past tense ('were') fits the surrounding genealogical
    listing better than a wooden present-tense rendering.
- source_word: בְּנֵי בִנְיָמִן
  chosen: the sons of Benjamin
  alternatives:
  - the descendants of Benjamin
  - the Benjamites
  lexicon: HALOT
  rationale: Literally 'sons of Benjamin.' In genealogical and tribal listings this
    can denote descendants/tribesmen, but 'sons of Benjamin' preserves the Hebrew
    form and lineage emphasis without over-paraphrase.
- source_word: סַלֻּא
  chosen: Sallu
  alternatives:
  - Sallu
  rationale: Standard English transliteration of the personal name.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: In this genealogy chain, 'son of' is the normal and most transparent
    rendering. While Hebrew ben can sometimes mean descendant, there is no need to
    generalize here beyond the conventional genealogical formula.
- source_word: מְשֻׁלָּם
  chosen: Meshullam
  rationale: Standard transliteration of the personal name.
- source_word: יוֹעֵד
  chosen: Joed
  alternatives:
  - Joiada
  rationale: The consonantal form here supports 'Joed.' An alternative harmonizing
    reading appears in some traditions/comparison passages, but the MT form is retained
    in the main text.
- source_word: פְּדָיָה
  chosen: Pedaiah
  rationale: Standard transliteration of the personal name.
- source_word: קוֹלָיָה
  chosen: Kolaiah
  alternatives:
  - Koliah
  rationale: Standard transliteration preserving the medial vowel as commonly represented
    in English biblical names.
- source_word: מַעֲשֵׂיָה
  chosen: Maaseiah
  alternatives:
  - Maasiah
  rationale: Standard transliteration of the personal name; the fuller form better
    reflects the Hebrew vocalization.
- source_word: אִיתִיאֵל
  chosen: Ithiel
  alternatives:
  - Ittiel
  rationale: Conventional English transliteration of the personal name.
- source_word: יְשַׁעְיָה
  chosen: Jeshaiah
  alternatives:
  - Isaiah
  rationale: In this genealogical context, the personal name is best transliterated
    distinctly as 'Jeshaiah' rather than assimilated to the more familiar prophetic
    name 'Isaiah,' preserving the Hebrew form more closely.
