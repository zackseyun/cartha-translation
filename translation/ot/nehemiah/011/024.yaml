id: NEH.11.24
reference: Nehemiah 11:24
source:
  edition: WLC
  text: וּ/פְתַֽחְיָ֨ה בֶּן מְשֵֽׁיזַבְאֵ֜ל מִ/בְּנֵי זֶ֤רַח בֶּן יְהוּדָה֙ לְ/יַ֣ד
    הַ/מֶּ֔לֶךְ לְ/כָל דָּבָ֖ר לָ/עָֽם־־־־׃
translation:
  text: And Pethahiah son of Meshezabel, from the sons of Zerah son of Judah, was
    at the king’s hand for every matter concerning the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was the king’s agent' or 'was at the king’s side'; the Hebrew literally
      reads 'was at the hand of the king.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for the people.' The Hebrew may mean matters concerning the people or
      matters handled on the people’s behalf.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/פְתַֽחְיָה
  chosen: And Pethahiah
  alternatives:
  - Now Pethahiah
  - Pethahiah
  lexicon: HALOT
  rationale: The prefixed conjunction is carried over as 'And' to preserve the verse’s
    connection to the surrounding administrative list. The personal name is transliterated
    per translation philosophy.
- source_word: בֶּן מְשֵֽׁיזַבְאֵל
  chosen: son of Meshezabel
  lexicon: HALOT
  rationale: Standard genealogical construction; 'son of' is retained formally rather
    than reduced to a possessive.
- source_word: מִ/בְּנֵי זֶרַח בֶּן יְהוּדָה
  chosen: from the sons of Zerah son of Judah
  alternatives:
  - from the descendants of Zerah son of Judah
  - of the sons of Zerah son of Judah
  lexicon: HALOT
  rationale: מִן with 'sons of' indicates lineage/source. 'From the sons of' preserves
    the Hebrew structure, while still communicating descent. 'Zerah son of Judah'
    is kept explicit to preserve the genealogical chain.
- source_word: לְ/יַד הַ/מֶּלֶךְ
  chosen: was at the king’s hand
  alternatives:
  - was at the king’s side
  - was the king’s agent
  - was in the king’s service
  lexicon: HALOT
  rationale: Literally 'at the hand of the king.' The phrase is idiomatic for being
    under royal authority or serving as an official representative. The main text
    keeps the concrete Hebrew image with minimal smoothing; more interpretive alternatives
    are preserved because the exact nuance may be either proximity, authority, or
    agency.
- source_word: לְ/כָל דָּבָר
  chosen: for every matter
  alternatives:
  - for every affair
  - for all business
  lexicon: HALOT
  rationale: דָּבָר here refers broadly to an administrative matter or affair, not
    merely a spoken 'word.' 'Every matter' is natural English and suitably broad.
- source_word: לָ/עָם
  chosen: concerning the people
  alternatives:
  - for the people
  - with regard to the people
  lexicon: HALOT
  rationale: 'The lamed here is best taken in relation to the preceding phrase: matters
    pertaining to the people. ''Concerning the people'' avoids implying that Pethahiah
    acted only for the people''s benefit, while still allowing that sense contextually.'
