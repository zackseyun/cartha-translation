id: NEH.11.11
reference: Nehemiah 11:11
source:
  edition: WLC
  text: שְׂרָיָ֨ה בֶן חִלְקִיָּ֜ה בֶּן מְשֻׁלָּ֣ם בֶּן צָד֗וֹק בֶּן מְרָיוֹת֙ בֶּן
    אֲחִיט֔וּב נְגִ֖ד בֵּ֥ית הָ/אֱלֹהִֽים־־־־־׃
translation:
  text: Seraiah son of Hilkiah, son of Meshullam, son of Zadok, son of Meraioth, son
    of Ahitub, leader of the house of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'chief' or 'overseer' of the house of God.
    reason: lexical_alternative
  - marker: b
    text: That is, the temple.
    reason: cultural_note
lexical_decisions:
- source_word: שְׂרָיָה
  chosen: Seraiah
  rationale: Proper personal name; transliterated according to standard English convention
    rather than translated, following the policy to transliterate names.
- source_word: בֶן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: The repeated genealogical formula most naturally reads 'son of.' While
    Hebrew genealogies can sometimes telescope and imply 'descendant of,' there is
    no contextual pressure here to generalize the term in the main text.
- source_word: נְגִיד
  chosen: leader
  alternatives:
  - chief
  - overseer
  - ruler
  lexicon: HALOT
  rationale: נְגִיד denotes one placed in charge or a leader. 'Leader' is clear modern
    English and fits the administrative-priestly context without overstating royal
    connotations that 'ruler' might suggest.
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - the temple of God
  lexicon: HALOT
  rationale: Literally 'house of God.' Although this refers to the temple, the Hebrew
    expression is transparent and the formal wording is natural in English, so it
    is preserved rather than interpreted as 'temple' in the main text.
- source_word: הָאֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here אֱלֹהִים refers to the God of Israel, not 'gods'; singular 'God'
    is required by the construct phrase 'house of God.'
