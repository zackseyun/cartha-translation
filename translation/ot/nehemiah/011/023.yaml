id: NEH.11.23
reference: Nehemiah 11:23
source:
  edition: WLC
  text: כִּֽי מִצְוַ֥ת הַ/מֶּ֖לֶךְ עֲלֵי/הֶ֑ם וַ/אֲמָנָ֥ה עַל הַ/מְשֹׁרְרִ֖ים דְּבַר
    י֥וֹם בְּ/יוֹמֽ/וֹ־־־׃
translation:
  text: For the king’s command was upon them, and a fixed provision for the singers,
    each day’s matter on its day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the daily requirement,” that is, what was needed for each day.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term rendered “a fixed provision” can also denote a firm arrangement
      or established obligation.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding statement; 'for' fits the
    discourse flow in English better than the more explicit 'because' here.
- source_word: מִצְוַת הַמֶּלֶךְ
  chosen: the king’s command
  alternatives:
  - the king’s order
  - the king’s commandment
  lexicon: HALOT
  rationale: מִצְוָה here refers to an authoritative directive from the king. 'Command'
    is natural modern English and preserves the force without sounding overly archaic.
- source_word: עֲלֵיהֶם
  chosen: was upon them
  alternatives:
  - was over them
  - concerned them
  lexicon: HALOT
  rationale: The preposition עַל with this idiom conveys authority or obligation resting
    on them. 'Was upon them' preserves the Hebrew image while remaining understandable.
- source_word: וַאֲמָנָה
  chosen: a fixed provision
  alternatives:
  - a sure arrangement
  - a settled duty
  - an assignment
  lexicon: HALOT
  rationale: In this administrative context, אֲמָנָה most likely denotes a firm arrangement
    or established provision. 'Fixed provision' captures the sense of an officially
    established support or allocation better than the vaguer 'arrangement.'
- source_word: עַל הַמְשֹׁרְרִים
  chosen: for the singers
  alternatives:
  - over the singers
  - concerning the singers
  lexicon: HALOT
  rationale: Although עַל is literally 'upon/over,' in context the phrase indicates
    what the provision pertained to. 'For the singers' is the clearest idiomatic English
    rendering.
- source_word: דְּבַר יוֹם בְּיוֹמוֹ
  chosen: each day’s matter on its day
  alternatives:
  - the daily requirement
  - a portion for every day
  - the matter of a day in its day
  lexicon: HALOT
  rationale: This Hebrew idiom expresses a day-by-day requirement or allotment. The
    chosen rendering stays close to the source wording while still readable, preserving
    the administrative rhythm of the phrase.
