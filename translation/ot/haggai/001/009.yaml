theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering צְבָאוֹת
  chosen_reading: of Armies
  alternative_readings:
  - of Hosts
  rationale: The Hebrew title denotes armies/forces. 'Of Armies' translates the meaning transparently for modern readers while retaining the martial force of the title.
  doctrine_reference: DOCTRINE.md Translation philosophy §2, §6
- issue: Gender representation in אִישׁ לְבֵיתוֹ
  chosen_reading: each of you runs to his own house
  alternative_readings:
  - each of you runs to your own house
  - everyone runs to their own house
  rationale: The Hebrew uses distributive masculine singular ('a man to his house'). Per the gender-accurate guideline, the translation preserves this representative masculine force rather than neutralizing it.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
