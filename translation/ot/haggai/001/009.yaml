id: HAG.1.9
reference: Haggai 1:9
source:
  edition: WLC
  text: פָּנֹ֤ה אֶל הַרְבֵּה֙ וְ/הִנֵּ֣ה לִ/מְעָ֔ט וַ/הֲבֵאתֶ֥ם הַ/בַּ֖יִת וְ/נָפַ֣חְתִּי ב֑/וֹ יַ֣עַן מֶ֗ה נְאֻם֙ יְהוָ֣ה צְבָא֔וֹת יַ֗עַן בֵּיתִ/י֙ אֲשֶׁר ה֣וּא חָרֵ֔ב וְ/אַתֶּ֥ם רָצִ֖ים אִ֥ישׁ לְ/בֵיתֽ/וֹ־־׃
translation:
  text: You looked for much, but behold, it was little; and when you brought it home, I blew it away. Why? declares Yahweh of Armies. Because of my house, which lies in ruins, while each of you runs to his own house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I blew on it.' The Hebrew verb literally means 'to blow/breathe'; here it likely implies that the produce was blown away or reduced by God's judgment.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: ''the LORD of Hosts.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּנֹה אֶל הַרְבֵּה
  chosen: You looked for much
  alternatives:
  - You turned toward much
  - You expected much
  lexicon: HALOT
  rationale: The idiom combines פנה ('turn/look') with אֶל plus הַרְבֵּה ('much, abundance'). In context of disappointed harvest expectations, 'looked for much' best captures the sense of hoping for or expecting abundance without over-paraphrasing.
- source_word: וְהִנֵּה לִמְעָט
  chosen: but behold, it was little
  alternatives:
  - and behold, it came to little
  - but see, it was little
  lexicon: HALOT
  rationale: הִנֵּה marks vivid attention ('behold'), and לִמְעָט expresses result/amount ('to little' = 'it was little'). Supplying 'it was' is required in English and reflects the implied result.
- source_word: וַהֲבֵאתֶם הַבַּיִת
  chosen: and when you brought it home
  alternatives:
  - and you brought it into the house
  - and you brought it to the house
  lexicon: HALOT
  rationale: הַבַּיִת here most naturally refers to one's house/home in the agricultural setting, not the temple, since the contrast later is with 'my house' versus 'his own house.' 'Brought it home' is idiomatic English and contextually precise.
- source_word: וְנָפַחְתִּי בוֹ
  chosen: I blew it away
  alternatives:
  - I blew on it
  - I scattered it with a breath
  lexicon: HALOT
  rationale: נפח literally means 'blow/breathe.' In this judgment context, the effect is not merely blowing on the produce but causing it to vanish or be dispersed. 'Blew it away' communicates the idiomatic force in natural English.
- source_word: יַעַן מֶה
  chosen: Why?
  alternatives:
  - For what reason?
  - Because of what?
  lexicon: HALOT
  rationale: The phrase introduces a rhetorical question asking the reason for the judgment. 'Why?' is concise and natural while preserving the force.
- source_word: נְאֻם יְהוָה צְבָאוֹת
  chosen: declares the LORD of Armies
  alternatives:
  - oracle of the LORD of Hosts
  - says the LORD of Hosts
  lexicon: HALOT
  rationale: נְאֻם is a prophetic declaration formula best rendered 'declares.' Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is translated rather than transliterated; 'of Armies' preserves the martial/plural sense more transparently than traditional 'Hosts.'
- source_word: יַעַן בֵּיתִי אֲשֶׁר הוּא חָרֵב
  chosen: Because of my house, which lies in ruins
  alternatives:
  - Because my house is desolate
  - Because of my house, which is ruined
  lexicon: HALOT
  rationale: חָרֵב denotes being ruined, desolate, laid waste. 'Lies in ruins' is vivid, idiomatic, and fits the neglected temple context.
- source_word: וְאַתֶּם רָצִים אִישׁ לְבֵיתוֹ
  chosen: while each of you runs to his own house
  alternatives:
  - while you each hurry to your own house
  - while every man runs to his own house
  lexicon: HALOT
  rationale: רָצִים is literally 'running,' conveying eagerness and misplaced priority. אִישׁ לְבֵיתוֹ is distributive ('each man to his house'). Following the gender-accurate guideline, 'each of you ... his own house' preserves the masculine singular distributive force better than a flattened plural.
