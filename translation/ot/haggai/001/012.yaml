theological_decisions:
- issue: Rendering of שְׁאֵרִית in a prophetic context
  chosen_reading: the remnant of the people
  alternative_readings:
  - the rest of the people
  rationale: The term often bears theological significance in the prophets, referring
    not merely to those left over numerically but to the surviving covenant community.
    'Remnant' preserves that resonance without adding interpretation beyond the lexical
    range.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
- issue: Nuance of וַיִּשְׁמַע in relation to prophetic authority
  chosen_reading: listened
  alternative_readings:
  - obeyed
  - heard
  rationale: The verse depicts a response to both the LORD's voice and Haggai's words
    as his sent prophet. 'Listened' preserves the text's emphasis on receptive response
    while avoiding the stronger interpretive claim of explicit obedience in the verb
    itself.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
