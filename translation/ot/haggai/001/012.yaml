id: HAG.1.12
reference: Haggai 1:12
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֣ע זְרֻבָּבֶ֣ל בֶּֽן שַׁלְתִּיאֵ֡ל וִ/יהוֹשֻׁ֣עַ בֶּן יְהוֹצָדָק֩
    הַ/כֹּהֵ֨ן הַ/גָּד֜וֹל וְ/כֹ֣ל שְׁאֵרִ֣ית הָ/עָ֗ם בְּ/קוֹל֙ יְהוָ֣ה אֱלֹֽהֵי/הֶ֔ם
    וְ/עַל דִּבְרֵי֙ חַגַּ֣י הַ/נָּבִ֔יא כַּ/אֲשֶׁ֥ר שְׁלָח֖/וֹ יְהוָ֣ה אֱלֹהֵי/הֶ֑ם
    וַ/יִּֽירְא֥וּ הָ/עָ֖ם מִ/פְּנֵ֥י יְהוָֽה׀־־׀־׃
translation:
  text: Then Zerubbabel son of Shealtiel, and Joshua son of Jehozadak, the high priest,
    and all the remnant of the people, listened to the voice of the LORD their God
    and to the words of Haggai the prophet, just as the LORD their God had sent him;
    and the people feared before the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'heard' or 'obeyed'; the Hebrew verb can carry the sense of hearing with
      responsive heed.
    reason: lexical_alternative
  - marker: b
    text: Or 'the rest of the people'; 'remnant' preserves the prophetic resonance
      of the surviving covenant community.
    reason: lexical_alternative
  - marker: c
    text: Or 'because the LORD their God had sent him.'
    reason: alternative_reading
  - marker: d
    text: Or 'stood in awe before the LORD'; the Hebrew can express reverent fear
      as well as dread.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: listened
  alternatives:
  - heard
  - obeyed
  lexicon: HALOT
  rationale: שׁמע can mean hear, listen, or obey depending on context. Here the following
    response of reverent fear and later action suggests responsive hearing, but 'obeyed'
    would over-interpret since the object is explicitly 'the voice... and the words.'
    'Listened' preserves both hearing and heeding without paraphrase.
- source_word: זְרֻבָּבֶל
  chosen: Zerubbabel
  rationale: Personal name transliterated per project philosophy.
- source_word: שַׁלְתִּיאֵל
  chosen: Shealtiel
  alternatives:
  - Salathiel
  rationale: Standard English transliteration of the Hebrew name.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  alternatives:
  - Jeshua
  rationale: The Hebrew form here is יְהוֹשֻׁעַ, which is most naturally rendered
    'Joshua.' 'Jeshua' reflects a shortened form not used in this verse.
- source_word: יְהוֹצָדָק
  chosen: Jehozadak
  alternatives:
  - Josedech
  rationale: Standard transliteration of the Hebrew proper name.
- source_word: הַכֹּהֵן הַגָּדוֹל
  chosen: the high priest
  alternatives:
  - the great priest
  lexicon: HALOT
  rationale: Established and accurate rendering of the Hebrew title for the chief
    priest; 'great priest' is too wooden in English.
- source_word: שְׁאֵרִית הָעָם
  chosen: the remnant of the people
  alternatives:
  - the rest of the people
  - the surviving remnant of the people
  lexicon: HALOT
  rationale: שְׁאֵרִית often carries the sense of a remnant, especially in prophetic
    literature. Retaining 'remnant' preserves the theological and historical nuance
    of the returned community.
- source_word: בְּקוֹל יְהוָה
  chosen: to the voice of the LORD
  alternatives:
  - to the sound of the LORD
  - to the LORD's voice
  lexicon: HALOT
  rationale: קוֹל with שׁמע is idiomatically 'listen to the voice of.' The divine
    name follows the project's default rendering 'the LORD' for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: דִּבְרֵי חַגַּי הַנָּבִיא
  chosen: the words of Haggai the prophet
  alternatives:
  - the message of Haggai the prophet
  lexicon: HALOT
  rationale: דָּבָר can mean word, matter, or message. The plural construct here is
    best rendered 'words,' preserving the parallel with 'the voice of the LORD' and
    avoiding unnecessary abstraction.
- source_word: כַּאֲשֶׁר שְׁלָחוֹ יְהוָה אֱלֹהֵיהֶם
  chosen: just as the LORD their God had sent him
  alternatives:
  - because the LORD their God had sent him
  - since the LORD their God had sent him
  lexicon: HALOT
  rationale: 'כַּאֲשֶׁר here most naturally introduces correspondence: they listened
    to Haggai''s words as those of one commissioned by the LORD. ''Because'' is possible,
    but ''just as'' stays closer to the syntax while remaining intelligible.'
- source_word: וַיִּירְאוּ
  chosen: feared
  alternatives:
  - were afraid
  - stood in awe
  lexicon: HALOT
  rationale: ירא can denote fear, reverence, or awe. In this prophetic covenant context,
    'feared' preserves the biblical idiom and allows both dread and reverence to remain
    in tension.
- source_word: מִפְּנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - from before the LORD
  - in the presence of the LORD
  lexicon: HALOT
  rationale: The idiom literally involves 'from/before the face of,' but in English
    'before the LORD' best captures reverential stance without awkwardness.
