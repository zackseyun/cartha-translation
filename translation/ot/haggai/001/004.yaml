theological_decisions:
- issue: Referent of 'this house'
  chosen_reading: the temple of the LORD
  alternative_readings:
  - a generic house
  rationale: In the immediate context (Hag 1:2, 8-9), 'this house' clearly refers
    to the temple. The translation retains 'this house' rather than inserting 'temple'
    into the main text, preserving the Hebrew wording while allowing the context to
    identify the referent.
