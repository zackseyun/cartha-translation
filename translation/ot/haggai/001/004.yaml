id: HAG.1.4
reference: Haggai 1:4
source:
  edition: WLC
  text: הַ/עֵ֤ת לָ/כֶם֙ אַתֶּ֔ם לָ/שֶׁ֖בֶת בְּ/בָתֵּי/כֶ֣ם סְפוּנִ֑ים וְ/הַ/בַּ֥יִת
    הַ/זֶּ֖ה חָרֵֽב׃
translation:
  text: Is it a time for you yourselves to live in your paneled houses while this
    house lies in ruins?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ceiled houses'—that is, houses finished or lined with paneling.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַעֵת
  chosen: Is it a time
  alternatives:
  - Is it time
  - Is this the time
  lexicon: HALOT
  rationale: The phrase is interrogative in context, echoing the people's claim in
    v.2 that 'the time has not come.' Rendering with 'Is it a time' preserves the
    noun עֵת ('time/season') while producing natural English.
- source_word: לָכֶם אַתֶּם
  chosen: for you yourselves
  alternatives:
  - for you
  - for you, O you
  lexicon: HALOT
  rationale: The independent pronoun אַתֶּם adds emphasis beyond the pronominal suffix
    in לָכֶם. 'You yourselves' preserves the rhetorical force of the Hebrew emphasis.
- source_word: לָשֶׁבֶת
  chosen: to live
  alternatives:
  - to sit
  - to dwell
  lexicon: HALOT
  rationale: Although ישׁב literally means 'sit,' in infinitive form with a house/location
    it commonly means 'dwell/live.' 'Live' is idiomatic modern English and fits the
    domestic context.
- source_word: בְּבָתֵּיכֶם
  chosen: in your houses
  alternatives:
  - in your homes
  lexicon: HALOT
  rationale: '''Houses'' keeps the concrete image and aligns with the contrast to
    ''this house'' (the temple) later in the verse.'
- source_word: סְפוּנִים
  chosen: paneled
  alternatives:
  - ceiled
  - finished
  - covered with paneling
  lexicon: HALOT
  rationale: The passive participle from ספן refers to being covered or lined, especially
    with wood paneling. 'Paneled' is concise, natural, and preserves the implication
    of comfort and expense.
- source_word: וְהַבַּיִת הַזֶּה
  chosen: while this house
  alternatives:
  - and this house
  - but this house
  lexicon: HALOT
  rationale: The conjunction marks contrast in context rather than simple addition.
    'While this house' captures the rhetorical juxtaposition between their houses
    and the temple.
- source_word: חָרֵב
  chosen: lies in ruins
  alternatives:
  - is desolate
  - is ruined
  - remains waste
  lexicon: HALOT
  rationale: The adjective denotes a devastated or ruined state. 'Lies in ruins' is
    idiomatic English that conveys ongoing neglect and fits the prophetic rebuke.
