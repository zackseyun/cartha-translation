id: HAG.1.3
reference: Haggai 1:3
source:
  edition: WLC
  text: וַֽ/יְהִי֙ דְּבַר יְהוָ֔ה בְּ/יַד חַגַּ֥י הַ/נָּבִ֖יא לֵ/אמֹֽר־־׃
translation:
  text: Then the word of Yahweh came by the hand of Haggai the prophet, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''through Haggai the prophet.'' The Hebrew literally says ''by the hand of Haggai,'' an idiom for mediated agency.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Then ... came
  alternatives:
  - And it happened
  - And it was
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the next event in narrative sequence. In English, 'Then ... came' communicates the discourse progression naturally while preserving the eventive sense better than the overly literal 'and it happened.'
- source_word: דְּבַר
  chosen: the word
  alternatives:
  - the message
  - the matter
  lexicon: HALOT
  rationale: In prophetic formulae, דָּבָר commonly denotes the divine word/message. 'The word' preserves the established prophetic idiom and keeps the connection to revelation language.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּיַד
  chosen: by the hand of
  alternatives:
  - through
  - by
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'by the hand of' and indicates agency/instrumentality. Retaining the idiom in English is still readable here and preserves the prophetic mediation more transparently than flattening it to simply 'through.'
- source_word: חַגַּי
  chosen: Haggai
  rationale: Personal names are transliterated by standard English convention.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: The appositional title identifies Haggai's role and authority; 'the prophet' is the direct and natural rendering.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - thus saying
  - to say
  lexicon: HALOT
  rationale: This infinitive introduces the following divine speech in standard Hebrew style. 'Saying' is the conventional and sufficiently transparent English equivalent.
