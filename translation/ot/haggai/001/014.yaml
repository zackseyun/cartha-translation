id: HAG.1.14
reference: Haggai 1:14
source:
  edition: WLC
  text: וַ/יָּ֣עַר יְהוָ֡ה אֶת רוּחַ֩ זְרֻבָּבֶ֨ל בֶּן שַׁלְתִּיאֵ֜ל פַּחַ֣ת יְהוּדָ֗ה
    וְ/אֶת ר֨וּחַ֙ יְהוֹשֻׁ֤עַ בֶּן יְהוֹצָדָק֙ הַ/כֹּהֵ֣ן הַ/גָּד֔וֹל וְֽ/אֶת ר֔וּחַ
    כֹּ֖ל שְׁאֵרִ֣ית הָ/עָ֑ם וַ/יָּבֹ֨אוּ֙ וַ/יַּעֲשׂ֣וּ מְלָאכָ֔ה בְּ/בֵית יְהוָ֥ה
    צְבָא֖וֹת אֱלֹהֵי/הֶֽם־־־־־־׃פ
translation:
  text: And the LORD stirred up the spirit of Zerubbabel son of Shealtiel, governor
    of Judah, and the spirit of Joshua son of Jehozadak, the high priest, and the
    spirit of all the remnant of the people; and they came and did work on the house
    of the LORD of Armies, their God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the LORD of hosts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּעַר
  chosen: stirred up
  alternatives:
  - roused
  - awakened
  - aroused
  lexicon: HALOT
  rationale: The verb denotes inciting or awakening someone to action. 'Stirred up'
    is idiomatic modern English and fits the context of motivating leaders and people
    to resume temple work.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name, 'the LORD' follows established
    reverential convention and reflects the covenant name without transliteration.
- source_word: רוּחַ
  chosen: spirit
  alternatives:
  - mind
  - inner disposition
  lexicon: HALOT
  rationale: Here רוּחַ refers to the inner disposition or motivating spirit of Zerubbabel,
    Joshua, and the remnant. 'Spirit' preserves the Hebrew term and its theological
    resonance without over-specifying psychology.
- source_word: פַּחַת יְהוּדָה
  chosen: governor of Judah
  alternatives:
  - prefect of Judah
  lexicon: HALOT
  rationale: פַּחַת is a Persian-period administrative title. 'Governor' is the clearest
    natural English equivalent.
- source_word: הַכֹּהֵן הַגָּדוֹל
  chosen: the high priest
  alternatives:
  - the great priest
  - the chief priest
  lexicon: HALOT
  rationale: This is the standard and accurate rendering of the title in English.
- source_word: כֹּל שְׁאֵרִית הָעָם
  chosen: all the remnant of the people
  alternatives:
  - all the rest of the people
  - the whole remnant of the people
  lexicon: HALOT
  rationale: שְׁאֵרִית often carries the important theological sense of a surviving
    remnant. 'Remnant' preserves that resonance better than merely 'rest.'
- source_word: וַיָּבֹאוּ
  chosen: they came
  alternatives:
  - they went in
  - they came forward
  lexicon: HALOT
  rationale: A straightforward narrative wayyiqtol. 'They came' is the plain sense
    and works well with the following action.
- source_word: וַיַּעֲשׂוּ מְלָאכָה
  chosen: did work
  alternatives:
  - worked
  - performed work
  - began work
  lexicon: HALOT
  rationale: The Hebrew is literally 'did work.' This preserves the verbal-nominal
    construction without adding aspect such as 'began' that the text does not explicitly
    state.
- source_word: בְּבֵית
  chosen: on the house
  alternatives:
  - in the house
  - at the house
  lexicon: HALOT
  rationale: Given the context of rebuilding the temple, English idiom favors 'work
    on the house' rather than 'in the house,' which could imply interior activity
    rather than construction/restoration.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of hosts
  lexicon: HALOT
  rationale: '''Armies'' communicates the meaning of צְבָאוֹת in accessible modern
    English, while preserving the divine warrior title. ''Hosts'' is traditional but
    less transparent to contemporary readers.'
- source_word: אֱלֹהֵיהֶם
  chosen: their God
  alternatives:
  - God of them
  lexicon: HALOT
  rationale: Standard possessive rendering in natural English, preserving the covenantal
    relationship expressed by the suffix.
