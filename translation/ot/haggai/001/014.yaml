theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering שְׁאֵרִית with theological resonance
  chosen_reading: remnant
  alternative_readings:
  - rest
  rationale: The prophetic literature often uses 'remnant' with covenantal and theological
    significance. The context supports preserving that resonance rather than flattening
    it to 'rest.'
  doctrine_reference: DOCTRINE.md Translation philosophy §5
- issue: Rendering יְהוָה צְבָאוֹת
  chosen_reading: the LORD of Armies
  alternative_readings:
  - the LORD of hosts
  rationale: This follows optimal equivalence by preserving the title's meaning in
    readable modern English. 'Hosts' is retained as a viable traditional alternative
    but is less transparent for contemporary readers.
  doctrine_reference: DOCTRINE.md Translation philosophy §6
