id: HAG.1.1
reference: Haggai 1:1
source:
  edition: WLC
  text: בִּ/שְׁנַ֤ת שְׁתַּ֨יִם֙ לְ/דָרְיָ֣וֶשׁ הַ/מֶּ֔לֶךְ בַּ/חֹ֨דֶשׁ֙ הַ/שִּׁשִּׁ֔י בְּ/י֥וֹם אֶחָ֖ד לַ/חֹ֑דֶשׁ הָיָ֨ה דְבַר יְהוָ֜ה בְּ/יַד חַגַּ֣י הַ/נָּבִ֗יא אֶל זְרֻבָּבֶ֤ל בֶּן שְׁאַלְתִּיאֵל֙ פַּחַ֣ת יְהוּדָ֔ה וְ/אֶל יְהוֹשֻׁ֧עַ בֶּן יְהוֹצָדָ֛ק הַ/כֹּהֵ֥ן הַ/גָּד֖וֹל לֵ/אמֹֽר־־־־־־׃
translation:
  text: 'In the second year of King Darius, in the sixth month, on the first day of the month, the word of Yahweh came by the hand of Haggai the prophet to Zerubbabel son of Shealtiel, governor of Judah, and to Joshua son of Jehozadak, the high priest, saying:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through Haggai the prophet.' The Hebrew idiom is literally 'by the hand of Haggai.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּ/שְׁנַת שְׁתַּיִם
  chosen: In the second year
  alternatives:
  - In year two
  lexicon: HALOT
  rationale: Construct phrase with ordinal sense in regnal dating; standard English idiom is 'in the second year.'
- source_word: לְ/דָרְיָוֶשׁ הַמֶּלֶךְ
  chosen: of King Darius
  alternatives:
  - of Darius the king
  lexicon: HALOT
  rationale: Both are accurate; 'of King Darius' is smoother modern English while preserving the regnal formula.
- source_word: בַּ/חֹדֶשׁ הַשִּׁשִּׁי
  chosen: in the sixth month
  lexicon: HALOT
  rationale: Straightforward temporal phrase; month is left numeric rather than supplied with a later Jewish month name not present in the text.
- source_word: בְּ/יוֹם אֶחָד לַ/חֹדֶשׁ
  chosen: on the first day of the month
  alternatives:
  - on day one of the month
  lexicon: HALOT
  rationale: Hebrew cardinal 'one' commonly functions ordinally in dates; English idiom requires 'first day.'
- source_word: הָיָה דְבַר יְהוָה
  chosen: the word of the LORD came
  alternatives:
  - the word of the LORD was
  lexicon: HALOT
  rationale: Prophetic formula often uses 'came' idiomatically in English to express the onset of divine revelation; this reflects normal usage without over-paraphrase.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by doctrine table for the divine name YHWH.
- source_word: בְּ/יַד חַגַּי הַנָּבִיא
  chosen: by the hand of Haggai the prophet
  alternatives:
  - through Haggai the prophet
  - by Haggai the prophet
  lexicon: HALOT
  rationale: The Hebrew idiom literally means agency 'by the hand of.' Retaining it preserves the source texture while remaining intelligible in English.
- source_word: אֶל זְרֻבָּבֶל
  chosen: to Zerubbabel
  lexicon: HALOT
  rationale: Direct object of prophetic address.
- source_word: בֶּן שְׁאַלְתִּיאֵל
  chosen: son of Shealtiel
  lexicon: HALOT
  rationale: Standard patronymic rendering.
- source_word: פַּחַת יְהוּדָה
  chosen: governor of Judah
  alternatives:
  - prefect of Judah
  lexicon: HALOT
  rationale: פַּחַת denotes a Persian-period provincial governor; 'governor' is the clearest natural English equivalent.
- source_word: וְ/אֶל יְהוֹשֻׁעַ
  chosen: and to Joshua
  lexicon: HALOT
  rationale: Coordinates the second addressee.
- source_word: בֶּן יְהוֹצָדָק
  chosen: son of Jehozadak
  lexicon: HALOT
  rationale: Standard patronymic transliteration.
- source_word: הַכֹּהֵן הַגָּדוֹל
  chosen: the high priest
  alternatives:
  - the great priest
  lexicon: HALOT
  rationale: Established and accurate rendering of the title for the chief priestly office.
- source_word: לֵאמֹר
  chosen: 'saying:'
  alternatives:
  - 'as follows:'
  lexicon: HALOT
  rationale: Standard speech-introduction formula; colon prepares for the quoted message in the next verse.
