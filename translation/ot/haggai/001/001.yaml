- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Agency phrase בְּיַד in prophetic formula
  chosen_reading: by the hand of Haggai the prophet
  alternative_readings:
  - through Haggai the prophet
  rationale: This is not a doctrinally contested phrase, but preserving the idiom maintains the text's prophetic mediation language without adding theological claims beyond the Hebrew.
