- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering of הַבָּיִת in temple context
  chosen_reading: the house
  alternative_readings:
  - the temple
  rationale: Although the referent is the temple, the Hebrew says 'the house.' Preserving 'house' maintains the source-text idiom and avoids unnecessary interpretive expansion, while the context makes the referent clear.
