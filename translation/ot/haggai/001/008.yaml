id: HAG.1.8
reference: Haggai 1:8
source:
  edition: WLC
  text: עֲל֥וּ הָ/הָ֛ר וַ/הֲבֵאתֶ֥ם עֵ֖ץ וּ/בְנ֣וּ הַ/בָּ֑יִת וְ/אֶרְצֶה בּ֥/וֹ ו/אכבד אָמַ֥ר יְהוָֽה־׃
translation:
  text: Go up into the hills, bring wood, and build the house, so that I may take pleasure in it and be glorified, says Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the mountain' or 'the hill country.' The Hebrew הָהָר can refer to a mountain, hill, or upland region.
    reason: lexical_alternative
  - marker: b
    text: That is, the temple; Hebrew 'the house.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and I will be honored.' The Hebrew verb can mean either 'be glorified' or 'be honored.'
    reason: alternative_reading
lexical_decisions:
- source_word: עֲלוּ
  chosen: Go up
  alternatives:
  - Ascend
  lexicon: HALOT
  rationale: Qal imperative plural of עלה, a straightforward command to go upward. 'Go up' is natural modern English and preserves the imperative force.
- source_word: הָהָר
  chosen: into the hills
  alternatives:
  - the mountain
  - the hill country
  lexicon: HALOT
  rationale: הַר can denote a mountain, hill, or hill country depending on context. Here the command is to obtain timber, so 'into the hills' communicates the likely sense idiomatically in English better than the more wooden 'the mountain,' while staying close to the Hebrew.
- source_word: וַהֲבֵאתֶם עֵץ
  chosen: bring wood
  alternatives:
  - bring timber
  - bring lumber
  lexicon: HALOT
  rationale: The Hiphil of בוא with עֵץ means to bring wood/timber. 'Wood' is broad and natural; 'timber' is possible but slightly more specialized. The singular עֵץ functions as a material/mass noun.
- source_word: וּבְנוּ
  chosen: and build
  alternatives:
  - and rebuild
  lexicon: HALOT
  rationale: Qal imperative plural of בנה. Although the temple is being restored, the Hebrew verb itself is simply 'build'; 'rebuild' would add interpretive specificity not explicit in the form.
- source_word: הַבָּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In Haggai's context it clearly refers to the LORD's temple, but 'the house' preserves the source wording and the covenantal idiom for the temple.
- source_word: וְאֶרְצֶה בוֹ
  chosen: so that I may take pleasure in it
  alternatives:
  - and I will be pleased with it
  - that I may delight in it
  lexicon: HALOT
  rationale: רצה in the Qal commonly means to take pleasure in, be pleased with, or accept favorably. The prefixed conjunction here is rendered with purpose nuance ('so that') to reflect the sequence of commands leading to divine response. 'In it' follows the pronominal suffix בוֹ referring to the house.
- source_word: וְאֶכָּבֵד
  chosen: and be glorified
  alternatives:
  - and I will show my glory
  - and I will be honored
  lexicon: HALOT
  rationale: Niphal of כבד is best taken as passive/reflexive, 'be glorified' or 'be honored.' 'Be glorified' preserves the theological weight of the root and fits temple context. 'Show my glory' would shift the voice and over-interpret.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
