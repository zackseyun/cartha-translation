id: HAG.1.15
reference: Haggai 1:15
source:
  edition: WLC
  text: בְּ/י֨וֹם עֶשְׂרִ֧ים וְ/אַרְבָּעָ֛ה לַ/חֹ֖דֶשׁ בַּ/שִּׁשִּׁ֑י בִּ/שְׁנַ֥ת
    שְׁתַּ֖יִם לְ/דָרְיָ֥וֶשׁ הַ/מֶּֽלֶךְ׃
translation:
  text: on the twenty-fourth day of the sixth month, in the second year of King Darius.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Darius the king.'' Rendered ''King Darius'' for natural English
      while preserving the same regnal title.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיוֹם
  chosen: on the ... day
  alternatives:
  - in the day
  lexicon: HALOT
  rationale: The preposition ב with יוֹם in date formulas is idiomatically temporal,
    best rendered 'on the ... day' in natural English rather than the more wooden
    'in the day.'
- source_word: עֶשְׂרִים וְאַרְבָּעָה
  chosen: twenty-fourth
  alternatives:
  - twenty and four
  lexicon: HALOT
  rationale: English date style normally uses the ordinal 'twenty-fourth day' for
    the Hebrew cardinal expression in calendrical notation.
- source_word: לַחֹדֶשׁ
  chosen: of the ... month
  alternatives:
  - for the month
  lexicon: HALOT
  rationale: In Hebrew dating formulas, ל with חֹדֶשׁ marks the month specification;
    'of the month' is the idiomatic English equivalent in this construction.
- source_word: בַּשִּׁשִּׁי
  chosen: the sixth
  alternatives:
  - the sixth month
  lexicon: HALOT
  rationale: Because 'month' is already supplied by the previous word, 'the sixth'
    completes the phrase smoothly as 'the sixth month.'
- source_word: בִּשְׁנַת שְׁתַּיִם
  chosen: in the second year
  alternatives:
  - in year two
  - in the year two
  lexicon: HALOT
  rationale: This is the standard regnal-year formula. English idiom prefers the ordinal
    expression 'in the second year.'
- source_word: לְדָרְיָוֶשׁ
  chosen: of Darius
  alternatives:
  - belonging to Darius
  lexicon: HALOT
  rationale: The lamed here marks the ruler whose regnal year is in view; English
    expresses this naturally with 'of Darius.' The personal name is transliterated
    per project policy.
- source_word: הַמֶּלֶךְ
  chosen: King
  alternatives:
  - the king
  lexicon: HALOT
  rationale: In English regnal dating, 'King Darius' is more natural than the more
    literal 'Darius the king,' while preserving the title's force.
