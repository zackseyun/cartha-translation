id: HAG.1.7
reference: Haggai 1:7
source:
  edition: WLC
  text: כֹּ֥ה אָמַ֖ר יְהוָ֣ה צְבָא֑וֹת שִׂ֥ימוּ לְבַבְ/כֶ֖ם עַל דַּרְכֵי/כֶֽם־׃
translation:
  text: 'Thus says Yahweh of hosts: Set your heart on your ways.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Set your heart on your ways.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is what
  - So
  lexicon: HALOT
  rationale: Introduces a prophetic messenger formula. 'Thus' preserves the formal prophetic tone in natural English.
- source_word: אָמַר
  chosen: says
  alternatives:
  - said
  lexicon: HALOT
  rationale: 'Although morphologically perfect, in the formula כֹּה אָמַר it functions idiomatically as a present-tense speech introduction in English prophetic style: ''Thus says.'''
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and established English Bible practice.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  - of heavenly armies
  lexicon: HALOT
  rationale: Traditional but still intelligible rendering of the divine title יְהוָה צְבָאוֹת. 'Hosts' preserves the breadth of the term, which can include heavenly and earthly armies, without over-specifying.
- source_word: שִׂימוּ
  chosen: Consider
  alternatives:
  - Set
  - Pay attention to
  lexicon: HALOT
  rationale: The verb literally means 'set/place,' but in the idiom שִׂים לֵב/לְבָב עַל it means to direct one's heart or attention toward something. 'Consider' captures the exhortation idiomatically and clearly.
- source_word: לְבַבְכֶם
  chosen: your
  alternatives:
  - your heart
  - your mind
  lexicon: HALOT
  rationale: In combination with שִׂימוּ ... עַל, the noun 'heart' is absorbed into the English idiom 'consider.' Rendering it explicitly as 'set your heart' would be more formal but less natural here. Its semantic force is preserved in the chosen idiomatic translation.
- source_word: עַל
  chosen: —
  alternatives:
  - 'on'
  - upon
  - to
  lexicon: HALOT
  rationale: The preposition is part of the larger Hebrew idiom 'set your heart on/upon.' It is not translated separately because the English idiom 'consider' already incorporates its function.
- source_word: דַּרְכֵיכֶם
  chosen: your ways
  alternatives:
  - your conduct
  - your paths
  lexicon: HALOT
  rationale: '''Ways'' is the most natural and contextually appropriate rendering, preserving both the literal metaphor and the moral sense of one''s course of life or conduct.'
