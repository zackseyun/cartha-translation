theological_decisions:
- issue: Rendering מַלְאַךְ in relation to Haggai
  chosen_reading: human 'messenger' rather than 'angel'
  alternative_readings:
  - the angel of the LORD
  rationale: Because Haggai is explicitly named and identified as YHWH's envoy, the text refers to the prophet's role, not to a distinct angelic figure. Translating 'angel' here would create a misleading theological impression not warranted by the syntax or context.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3 (preserve tension without importing claims)
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
