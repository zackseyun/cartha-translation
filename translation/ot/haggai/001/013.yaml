theological_decisions:
- issue: Rendering מַלְאַךְ in relation to Haggai
  chosen_reading: human 'messenger' rather than 'angel'
  alternative_readings:
  - the angel of the LORD
  rationale: Because Haggai is explicitly named and identified as YHWH's envoy, the
    text refers to the prophet's role, not to a distinct angelic figure. Translating
    'angel' here would create a misleading theological impression not warranted by
    the syntax or context.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3
    (preserve tension without importing claims)
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This is followed consistently here.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH → the LORD'
