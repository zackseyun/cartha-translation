id: HAG.1.13
reference: Haggai 1:13
source:
  edition: WLC
  text: וַ֠/יֹּאמֶר חַגַּ֞י מַלְאַ֧ךְ יְהוָ֛ה בְּ/מַלְאֲכ֥וּת יְהוָ֖ה לָ/עָ֣ם לֵ/אמֹ֑ר אֲנִ֥י אִתְּ/כֶ֖ם נְאֻם יְהוָֽה־׃
translation:
  text: Then Haggai, the messenger of Yahweh, spoke to the people with Yahweh’s message, saying, “I am with you,” declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “by the commission of the LORD” or “as the LORD’s messenger.” The Hebrew phrase can denote the capacity or commission in which Haggai spoke.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “messenger of the LORD.” Here it refers to Haggai as the LORD’s envoy, not to an angelic being.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The verb is the common 'say.' In English, 'spoke ... saying' reads more naturally with the following indirect setup and direct quotation, while preserving the speech act introduced by the Hebrew wayyiqtol.
- source_word: מַלְאַךְ יְהוָה
  chosen: the messenger of the LORD
  alternatives:
  - the angel of the LORD
  lexicon: HALOT
  rationale: Here the apposition with the proper name Haggai identifies a human envoy, not a heavenly being. 'Messenger' best fits the immediate context and avoids importing the technical sense 'angel' where the text refers to the prophet as YHWH's envoy.
- source_word: בְּמַלְאֲכוּת יְהוָה
  chosen: with the LORD’s message
  alternatives:
  - by the commission of the LORD
  - in the LORD’s commission
  - as the LORD’s messenger
  lexicon: HALOT
  rationale: The noun denotes messenger-function, commission, or message. In this context it most naturally explains the capacity/content in which Haggai spoke. 'With the LORD’s message' is clear modern English and preserves the sense that his speech came as YHWH's commissioned word.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לָעָם
  chosen: to the people
  alternatives:
  - to the people group
  - to the nation
  lexicon: HALOT
  rationale: In context this refers to the covenant community addressed by the prophet. 'The people' is the most natural and sufficiently specific rendering.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - thus
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing the direct speech; 'saying' preserves the structure straightforwardly.
- source_word: אֲנִי אִתְּכֶם
  chosen: I am with you
  alternatives:
  - I am with all of you
  lexicon: HALOT
  rationale: The phrase is covenantally significant and should remain simple and direct. The plural object is adequately conveyed by English 'you' in context.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - utterance of the LORD
  lexicon: HALOT
  rationale: This prophetic formula is idiomatically rendered 'declares the LORD' in contemporary English. It preserves divine authority without archaic stiffness.
