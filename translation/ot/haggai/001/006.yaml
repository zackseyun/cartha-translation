id: HAG.1.6
reference: Haggai 1:6
source:
  edition: WLC
  text: זְרַעְתֶּ֨ם הַרְבֵּ֜ה וְ/הָבֵ֣א מְעָ֗ט אָכ֤וֹל וְ/אֵין לְ/שָׂבְעָה֙ שָׁת֣וֹ
    וְ/אֵין לְ/שָׁכְרָ֔ה לָב֖וֹשׁ וְ/אֵין לְ/חֹ֣ם ל֑/וֹ וְ/הַ֨/מִּשְׂתַּכֵּ֔ר מִשְׂתַּכֵּ֖ר
    אֶל צְר֥וֹר נָקֽוּב־־־־׃פ
translation:
  text: You have sown much, but brought in little. You eat, but there is not enough
    to be satisfied; you drink, but there is not enough to become drunk; you clothe
    yourselves, but no one is warm; and the one who earns wages earns them for a bag
    with holes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'but harvested little.' The Hebrew is literally 'but brought in little,'
      an idiom for meager agricultural return.
    reason: lexical_alternative
  - marker: b
    text: Or 'you drink, but not to drunkenness.' The Hebrew specifically refers to
      becoming intoxicated, not merely to thirst being quenched.
    reason: lexical_alternative
  - marker: c
    text: Literally 'but there is no warmth for him.' The singular pronoun has a generic
      sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: זְרַעְתֶּם
  chosen: You have sown
  alternatives:
  - You sowed
  lexicon: HALOT
  rationale: Qal perfect 2mp, addressing the people directly. Present perfect in English
    captures the completed action with present consequence in the prophetic accusation.
- source_word: הַרְבֵּה
  chosen: much
  alternatives:
  - abundantly
  - a great deal
  lexicon: HALOT
  rationale: Adverbial accusative intensifying the amount sown. 'Much' is concise
    and idiomatic.
- source_word: וְהָבֵא מְעָט
  chosen: but brought in little
  alternatives:
  - but harvested little
  - but the yield was little
  lexicon: HALOT
  rationale: The idiom is literally 'bring in little,' referring to agricultural return.
    'Brought in little' preserves the Hebrew wording better than the more interpretive
    'harvested little,' while still being clear.
- source_word: אָכוֹל וְאֵין לְשָׂבְעָה
  chosen: You eat, but there is not enough to be satisfied
  alternatives:
  - You eat, but not to satisfaction
  - There is food to eat, but not enough to be filled
  lexicon: HALOT
  rationale: 'Infinitive absolute-like verbal form used predicatively in a terse sequence.
    The phrase expresses ongoing deprivation: eating without reaching fullness. ''To
    be satisfied'' communicates the result clause naturally.'
- source_word: שָׁתוֹ וְאֵין לְשָׁכְרָה
  chosen: you drink, but there is not enough to become drunk
  alternatives:
  - you drink, but not to drunkenness
  - you drink, but never have your fill
  lexicon: HALOT
  rationale: The Hebrew noun/verb from שכר denotes intoxication or becoming drunk,
    not merely quenching thirst. The translation preserves the stronger lexical sense
    without softening it.
- source_word: לָבוֹשׁ וְאֵין לְחֹם לוֹ
  chosen: you clothe yourselves, but no one is warm
  alternatives:
  - you put on clothing, but no one is warm enough
  - there is clothing, but it does not keep one warm
  lexicon: HALOT
  rationale: The sequence continues the pattern of frustrated provision. Although
    the Hebrew has singular 'to him,' English idiom prefers an indefinite/general
    expression; 'no one is warm' preserves the generic force.
- source_word: וְהַמִּשְׂתַּכֵּר מִשְׂתַּכֵּר
  chosen: and the one who earns wages earns them
  alternatives:
  - and the wage-earner earns wages
  - and he who hires himself out earns wages
  lexicon: HALOT
  rationale: The hitpael participle/verb pair emphasizes the laborer receiving pay.
    'The one who earns wages' is clear modern English and keeps the repetitive emphasis
    by repeating 'earns.'
- source_word: אֶל צְרוֹר נָקוּב
  chosen: for a bag with holes
  alternatives:
  - into a pierced pouch
  - for a purse full of holes
  lexicon: HALOT
  rationale: The image is of wages disappearing as if placed into a perforated money
    bag. 'Bag with holes' is vivid, natural, and faithful to the metaphor.
