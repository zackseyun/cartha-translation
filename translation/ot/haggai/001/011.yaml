id: HAG.1.11
reference: Haggai 1:11
source:
  edition: WLC
  text: וָ/אֶקְרָ֨א חֹ֜רֶב עַל הָ/אָ֣רֶץ וְ/עַל הֶ/הָרִ֗ים וְ/עַל הַ/דָּגָן֙ וְ/עַל
    הַ/תִּיר֣וֹשׁ וְ/עַל הַ/יִּצְהָ֔ר וְ/עַ֛ל אֲשֶׁ֥ר תּוֹצִ֖יא הָ/אֲדָמָ֑ה וְ/עַל
    הָֽ/אָדָם֙ וְ/עַל הַ/בְּהֵמָ֔ה וְ/עַ֖ל כָּל יְגִ֥יעַ כַּפָּֽיִם־־־־־־־־׃ס
translation:
  text: And I called for a drought on the land and on the mountains, on the grain,
    on the new wine, on the fresh oil, on what the ground produces, on man and on
    beast, and on all the labor of the hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'humankind' for 'man.' The Hebrew אָדָם here is a generic singular for
      human beings.
    reason: alternative_reading
  - marker: b
    text: Or 'fresh oil'; the Hebrew likely refers specifically to olive oil as an
      agricultural product.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶקְרָא
  chosen: I called for
  alternatives:
  - I summoned
  - I proclaimed
  lexicon: HALOT
  rationale: קרא in this context takes on the sense of summoning or calling forth
    a condition/judgment. 'Called for' is idiomatic in English and preserves divine
    agency without over-paraphrasing.
- source_word: חֹרֶב
  chosen: drought
  alternatives:
  - dryness
  - desolation
  lexicon: HALOT
  rationale: In this agricultural judgment context, חֹרֶב most naturally denotes drought
    or parching dryness. 'Drought' best fits the listed targets (land, crops, produce,
    people, animals, labor).
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  - the country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the local agricultural land under judgment, not
    the whole globe. 'The land' is the most natural contextual rendering.
- source_word: הֶהָרִים
  chosen: the mountains
  alternatives:
  - the hills
  lexicon: HALOT
  rationale: A straightforward rendering of הָרִים. 'Mountains' preserves the formal
    sense and matches common prophetic diction.
- source_word: הַדָּגָן
  chosen: the grain
  alternatives:
  - the cereal crops
  - the corn
  lexicon: HALOT
  rationale: דָּגָן is a general term for grain produce. 'Grain' is standard modern
    English and avoids region-specific 'corn.'
- source_word: הַתִּירוֹשׁ
  chosen: the new wine
  alternatives:
  - the wine
  - the fresh wine
  lexicon: HALOT
  rationale: תִּירוֹשׁ commonly refers to freshly produced wine/must. 'New wine' is
    a conventional and sufficiently clear rendering.
- source_word: הַיִּצְהָר
  chosen: the fresh oil
  alternatives:
  - the olive oil
  - the oil
  lexicon: HALOT
  rationale: יִצְהָר refers to fresh oil, usually olive oil, as an agricultural product.
    'Fresh oil' preserves the lexical distinction from generic 'oil,' though 'olive
    oil' is a possible interpretive expansion.
- source_word: אֲשֶׁר תּוֹצִיא הָאֲדָמָה
  chosen: what the ground produces
  alternatives:
  - whatever the soil brings forth
  - what the land yields
  lexicon: HALOT
  rationale: The clause is broad and summarizes all produce from the soil. 'What the
    ground produces' is natural English and retains the concrete agricultural image.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - people
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered according to context. Here it stands
    in paired contrast with beast/animal and refers to human beings generically. 'Man'
    preserves the Hebrew's representative singular and the human-animal pairing.
- source_word: הַבְּהֵמָה
  chosen: beast
  alternatives:
  - livestock
  - animals
  lexicon: HALOT
  rationale: בְּהֵמָה can denote beast/animal, often domesticated animals in agrarian
    contexts. 'Beast' preserves the formal prophetic register and pairs well with
    'man.'
- source_word: כָּל יְגִיעַ כַּפָּיִם
  chosen: all the labor of the hands
  alternatives:
  - all the work of their hands
  - all the toil of the hands
  lexicon: HALOT
  rationale: This idiom refers to human labor and its products. 'Labor of the hands'
    is a fairly literal rendering that remains readable and preserves the Hebrew imagery.
