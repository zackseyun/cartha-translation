theological_decisions:
- issue: Rendering of הָאָדָם in a generic human sense
  chosen_reading: man
  alternative_readings:
  - humankind
  - people
  rationale: The doctrine excerpt specifies gender-accurate rendering and lists אָדָם
    as 'man / humankind (context).' In this verse the singular generic stands in a
    stylized pair with 'beast,' so 'man' best preserves the source form and rhetorical
    balance, while an inclusive alternative is worth preserving in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #4; Contested terms table
    for אָדָם'
