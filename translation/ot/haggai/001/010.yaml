id: HAG.1.10
reference: Haggai 1:10
source:
  edition: WLC
  text: עַל כֵּ֣ן עֲלֵי/כֶ֔ם כָּלְא֥וּ שָמַ֖יִם מִ/טָּ֑ל וְ/הָ/אָ֖רֶץ כָּלְאָ֥ה יְבוּלָֽ/הּ־׃
translation:
  text: Therefore the heavens above you have withheld the dew, and the earth has withheld
    its produce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land has withheld its yield.' The Hebrew אֶרֶץ can mean 'earth'
      or 'land,' and יְבוּל can be rendered 'produce' or 'yield.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: A standard inferential phrase linking this verse to the prior rebuke
    and consequences. 'Therefore' is natural and preserves the causal force.
- source_word: עֲלֵיכֶם
  chosen: above you
  alternatives:
  - over you
  - concerning you
  lexicon: HALOT
  rationale: 'With ''the heavens,'' the spatial sense is most natural: the heavens
    are ''above/over'' the people. ''Above you'' reads smoothly in English and reflects
    the Hebrew preposition.'
- source_word: כָּלְאוּ
  chosen: have withheld
  alternatives:
  - have restrained
  - have shut up
  - have been withheld
  lexicon: HALOT
  rationale: The verb כלא in this context conveys restraining or holding back. 'Have
    withheld' is idiomatic in English for rain/dew and produce, and it works consistently
    for both occurrences in the verse.
- source_word: שָמַיִם
  chosen: the heavens
  alternatives:
  - the sky
  - heaven
  lexicon: HALOT
  rationale: The Hebrew plural commonly refers to the skies/heavens. 'The heavens'
    preserves the biblical register better than 'the sky' while remaining clear.
- source_word: מִטָּל
  chosen: the dew
  alternatives:
  - dew
  lexicon: HALOT
  rationale: 'The preposition מן after כלא marks what is being withheld: ''from dew''
    in Hebrew idiom, best rendered in English as ''withheld the dew.'' The article
    is supplied naturally in English.'
- source_word: וְהָאָרֶץ
  chosen: and the earth
  alternatives:
  - and the land
  lexicon: HALOT
  rationale: Both 'earth' and 'land' are possible for אֶרֶץ. Here the pairing with
    'the heavens' favors the cosmic counterpart 'the earth,' matching the poetic balance
    of the verse.
- source_word: יְבוּלָהּ
  chosen: its produce
  alternatives:
  - its yield
  - its crops
  - its increase
  lexicon: HALOT
  rationale: יְבוּל denotes agricultural produce or yield. 'Its produce' is clear,
    natural, and broad enough to cover the harvest generally without over-specifying.
