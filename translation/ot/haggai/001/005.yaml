id: HAG.1.5
reference: Haggai 1:5
source:
  edition: WLC
  text: וְ/עַתָּ֕ה כֹּ֥ה אָמַ֖ר יְהוָ֣ה צְבָא֑וֹת שִׂ֥ימוּ לְבַבְ/כֶ֖ם עַל דַּרְכֵי/כֶֽם־׃
translation:
  text: 'Now therefore, thus says the LORD of hosts: Consider your ways.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'Set your heart on your ways.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now therefore
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: The conjunction plus temporal adverb introduces an inferential transition
    from the previous rebuke, not merely a time marker. 'Now therefore' captures both
    the discourse shift and the exhortational force.
- source_word: כֹּה אָמַר
  chosen: thus says
  alternatives:
  - this is what ... says
  - thus has said
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. Present-tense English is idiomatic
    for ongoing authoritative proclamation.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the divine name יְהוָה is rendered 'the LORD' rather than
    transliterated.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  - of heavenly armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'of hosts' preserves the established sense
    of the divine warrior-king over heavenly and earthly forces without over-specifying
    one domain.
- source_word: שִׂימוּ לְבַבְכֶם
  chosen: Consider
  alternatives:
  - Set your heart
  - Take to heart
  - Pay attention
  lexicon: HALOT
  rationale: Literally 'set your heart.' In this idiom, the sense is to direct serious
    thought and reflection. 'Consider' is concise, natural English and fits the prophetic
    call to self-examination; the more literal alternative is preserved in a footnote.
- source_word: עַל דַּרְכֵיכֶם
  chosen: your ways
  alternatives:
  - upon your ways
  - to your ways
  - your conduct
  lexicon: HALOT
  rationale: דֶּרֶךְ here is metaphorical for course of life or conduct. 'Your ways'
    preserves the Hebrew image and common prophetic usage better than the more interpretive
    'your conduct.'
