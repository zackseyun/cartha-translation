theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Nuance of הָעָם הַזֶּה
  chosen_reading: These people
  alternative_readings:
  - This people
  rationale: The phrase can signal divine distance from the community's present attitude. 'These people' preserves that rhetorical edge without archaic English.
  doctrine_reference: DOCTRINE.md Translation philosophy §6
- issue: Historical specificity of לְהִבָּנוֹת
  chosen_reading: to be rebuilt
  alternative_readings:
  - to be built
  rationale: Given the post-exilic context, the intended sense is restoration of the temple rather than first construction. This is an interpretive but contextually warranted clarification under optimal equivalence.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
