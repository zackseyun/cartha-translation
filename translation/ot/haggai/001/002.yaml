id: HAG.1.2
reference: Haggai 1:2
source:
  edition: WLC
  text: כֹּ֥ה אָמַ֛ר יְהוָ֥ה צְבָא֖וֹת לֵ/אמֹ֑ר הָ/עָ֤ם הַ/זֶּה֙ אָֽמְר֔וּ לֹ֥א עֶת בֹּ֛א עֶת בֵּ֥ית יְהוָ֖ה לְ/הִבָּנֽוֹת־־׃פ
translation:
  text: 'Thus says Yahweh of hosts: These people say, “The time has not come, the time for the house of Yahweh to be rebuilt.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “This people says.” The Hebrew wording may carry a tone of distance or rebuke.
    reason: lexical_alternative
  - marker: b
    text: Or “to be built.” The Hebrew infinitive itself does not explicitly include the prefix re-, but the post-exilic context indicates rebuilding.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is what
  - So
  lexicon: HALOT
  rationale: Introduces a prophetic messenger formula. 'Thus' preserves the formal prophetic tone in natural English.
- source_word: אָמַר
  chosen: says
  alternatives:
  - said
  lexicon: HALOT
  rationale: 'Although morphologically perfect, in prophetic formulae it functions as a present performative in English: ''Thus says...'' rather than the less idiomatic ''Thus said...''.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: The title יְהוָה צְבָאוֹת is conventionally and accurately rendered 'the LORD of hosts.' 'Hosts' preserves the breadth of heavenly and earthly armies without over-specifying.
- source_word: לֵאמֹר
  chosen: ':'
  alternatives:
  - saying
  lexicon: HALOT
  rationale: In English this quotative infinitive is naturally represented by punctuation after the messenger formula rather than by an explicit 'saying.'
- source_word: הָעָם הַזֶּה
  chosen: These people
  alternatives:
  - This people
  - This nation
  lexicon: HALOT
  rationale: The demonstrative carries a distancing or mildly disapproving force. 'These people' preserves that nuance better than the wooden 'this people' while remaining natural English.
- source_word: אָמְרוּ
  chosen: say
  alternatives:
  - have said
  - are saying
  lexicon: HALOT
  rationale: English present fits the quoted complaint in context and matches the ongoing attitude being reported.
- source_word: לֹא עֶת בֹּא עֶת
  chosen: The time has not come, the time
  alternatives:
  - It is not time, the time
  - The time has not yet come
  lexicon: HALOT
  rationale: The Hebrew is terse and somewhat emphatic through repetition of עֶת. Rendering both occurrences preserves the rhetorical force. 'Has not come' reflects בֹּא naturally in English.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the LORD's house
  - the temple of the LORD
  lexicon: HALOT
  rationale: '''House of the LORD'' closely reflects the Hebrew and leaves the temple reference explicit without replacing the metaphorical covenantal term with the interpretive ''temple''.'
- source_word: לְהִבָּנוֹת
  chosen: to be rebuilt
  alternatives:
  - to be built
  lexicon: HALOT
  rationale: The Niphal infinitive is passive/reflexive, 'to be built.' In Haggai's post-exilic setting the referent is the rebuilding of the temple, so 'to be rebuilt' makes the historical sense explicit without distorting the syntax.
