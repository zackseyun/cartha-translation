theological_decisions:
- issue: Meaning of 'this house' and its 'latter glory'
  chosen_reading: Render the phrase straightforwardly as a promise about the glory
    of this house/temple without specifying in the main text whether the contrast
    is between successive temples, successive states of the same temple, or an eschatological
    fulfillment.
  alternative_readings:
  - A comparison between the second temple and Solomon's temple
  - A comparison between the future glory of the same temple site and its former state
  - An eschatological reading tied to messianic fulfillment
  rationale: The Hebrew itself states the comparative promise but does not explicitly
    resolve the historical/theological referent. To preserve theological tension,
    the translation remains text-near and does not import a specific interpretive
    scheme into the main text.
  doctrine_reference: Translation philosophy §3
- issue: Rendering of the divine name
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: DOCTRINE.md specifies the default rendering of יְהוָה as 'the LORD.'
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
