id: HAG.2.9
reference: Haggai 2:9
source:
  edition: WLC
  text: גָּד֣וֹל יִֽהְיֶ֡ה כְּבוֹד֩ הַ/בַּ֨יִת הַ/זֶּ֤ה הָ/אַֽחֲרוֹן֙ מִן הָ֣/רִאשׁ֔וֹן
    אָמַ֖ר יְהוָ֣ה צְבָא֑וֹת וּ/בַ/מָּק֤וֹם הַ/זֶּה֙ אֶתֵּ֣ן שָׁל֔וֹם נְאֻ֖ם יְהוָ֥ה
    צְבָאֽוֹת־׃פ
translation:
  text: The latter glory of this house will be greater than the former, says the LORD
    of Armies; and in this place I will give peace, declares the LORD of Armies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD of hosts.'
    reason: lexical_alternative
  - marker: b
    text: '''Peace'' (shalom) can also carry the sense of well-being or wholeness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּדוֹל יִהְיֶה
  chosen: will be greater
  alternatives:
  - will be great
  - will become great
  lexicon: HALOT
  rationale: The adjective גָּדוֹל with היה functions predicatively. In comparison
    with מִן הָרִאשׁוֹן, English idiom calls for the comparative 'greater' rather
    than the wooden 'great ... than.'
- source_word: כְּבוֹד
  chosen: glory
  alternatives:
  - honor
  - splendor
  lexicon: HALOT
  rationale: כָּבוֹד commonly denotes weighty honor, splendor, or glory. 'Glory' best
    preserves the theological and cultic resonance in a temple context.
- source_word: הַבַּיִת הַזֶּה
  chosen: this house
  alternatives:
  - this temple
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In Haggai the referent is the temple,
    but 'house' preserves the Hebrew wording and its covenantal resonance as the house
    of the LORD.
- source_word: הָאַחֲרוֹן
  chosen: the latter
  alternatives:
  - the later
  - the final
  lexicon: HALOT
  rationale: אַחֲרוֹן here contrasts with הָרִאשׁוֹן ('the former/first'). 'The latter'
    is the most natural paired English rendering.
- source_word: מִן הָרִאשׁוֹן
  chosen: than the former
  alternatives:
  - than the first
  lexicon: HALOT
  rationale: The comparison is between latter and former states/phases. 'Former' reads
    more naturally in English than 'first' in this contrast.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of hosts
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is translated rather
    than transliterated; 'of Armies' communicates the martial/plural force more transparently
    to modern readers than the traditional 'of hosts.'
- source_word: וּבַמָּקוֹם הַזֶּה
  chosen: and in this place
  alternatives:
  - and at this place
  - and in this location
  lexicon: HALOT
  rationale: מָקוֹם is straightforwardly 'place.' 'In this place' is idiomatic and
    preserves the demonstrative emphasis.
- source_word: אֶתֵּן
  chosen: I will give
  alternatives:
  - I will grant
  - I will bestow
  lexicon: HALOT
  rationale: נָתַן is the common verb 'give.' 'Grant' is possible with abstract objects,
    but 'give' is the plainest and most direct rendering.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - wholeness
  lexicon: HALOT
  rationale: שָׁלוֹם has a broad semantic range including peace, welfare, and wholeness.
    'Peace' is the standard rendering and fits both the prophetic promise and broader
    biblical usage, while the fuller sense can be preserved in a footnote.
- source_word: נְאֻם
  chosen: declares
  alternatives:
  - oracle of
  - utterance of
  lexicon: HALOT
  rationale: נְאֻם introduces a solemn divine pronouncement. 'Declares' is clear modern
    English and preserves prophetic force without archaic stiffness.
