id: HAG.2.14
reference: Haggai 2:14
source:
  edition: WLC
  text: וַ/יַּ֨עַן חַגַּ֜י וַ/יֹּ֗אמֶר כֵּ֣ן הָֽ/עָם הַ֠/זֶּה וְ/כֵן הַ/גּ֨וֹי הַ/זֶּ֤ה לְ/פָנַ/י֙ נְאֻם יְהוָ֔ה וְ/כֵ֖ן כָּל מַעֲשֵׂ֣ה יְדֵי/הֶ֑ם וַ/אֲשֶׁ֥ר יַקְרִ֛יבוּ שָׁ֖ם טָמֵ֥א הֽוּא־־־־׃
translation:
  text: Then Haggai answered and said, “So is this people, and so is this nation before me,” declares Yahweh, “and so is every work of their hands; and what they offer there is unclean.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Thus is this people ... and thus is this nation.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'this people,' a marked expression that can sound distancing or reproachful.
    reason: cultural_note
lexical_decisions:
- source_word: כֵּן
  chosen: so is
  alternatives:
  - thus is
  - such is
  lexicon: HALOT
  rationale: Used repetitively to mirror the Hebrew demonstrative-comparative force in the priestly analogy from the preceding verses. 'So is' preserves the judgment formula better than the flatter 'thus' in contemporary English.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this people here
  - these people
  lexicon: HALOT
  rationale: Retains the marked, somewhat distancing expression of the Hebrew. 'These people' is smoother English but weakens the singular collective and prophetic tone.
- source_word: הַגּוֹי הַזֶּה
  chosen: this nation
  alternatives:
  - this people-group
  - this Gentile nation
  lexicon: HALOT
  rationale: גּוֹי commonly means 'nation.' Here it parallels 'this people' and refers to the covenant community in its corporate identity, not specifically to Gentiles, so 'nation' is the most natural rendering.
- source_word: לְפָנַי
  chosen: before me
  alternatives:
  - in my sight
  - before my face
  lexicon: HALOT
  rationale: '''Before me'' is the standard idiomatic rendering and preserves the covenant-judicial sense of standing in God''s presence.'
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: '''Declares the LORD'' is idiomatic modern English for the prophetic formula and preserves its solemn authority.'
- source_word: כָּל מַעֲשֵׂה יְדֵיהֶם
  chosen: every work of their hands
  alternatives:
  - all the work of their hands
  - everything their hands do
  lexicon: HALOT
  rationale: This keeps the Hebrew idiom while remaining readable. 'Every work' fits the singular construct phrase and the distributive sense of כָּל.
- source_word: וַאֲשֶׁר יַקְרִיבוּ
  chosen: what they offer
  alternatives:
  - whatever they bring near
  - what they present as an offering
  lexicon: HALOT
  rationale: The Hiphil of קרב in sacrificial context means to present/offer. 'What they offer' is concise and contextually clear without over-paraphrasing.
- source_word: שָׁם
  chosen: there
  alternatives:
  - at that place
  - there on the altar
  lexicon: HALOT
  rationale: The adverb is spatially deictic and likely refers to the cultic site under discussion. 'There' preserves the Hebrew without specifying more than the text states.
- source_word: טָמֵא הוּא
  chosen: is unclean
  alternatives:
  - it is defiled
  - it is impure
  lexicon: HALOT
  rationale: In this ritual context, 'unclean' best matches the purity terminology developed in the preceding verses. 'Defiled' is possible but can imply the process rather than the resulting status.
