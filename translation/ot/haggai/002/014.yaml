theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Reference of 'this nation'
  chosen_reading: refers to Judah/the returned covenant community corporately, not to foreign Gentile nations
  alternative_readings:
  - a broader reference to the surrounding nations
  rationale: In context Haggai is addressing the post-exilic community and applying priestly impurity logic to them and their offerings. Rendering 'nation' without importing 'Gentile' preserves the intended rebuke.
