theological_decisions:
- issue: Meaning of ritual impurity language
  chosen_reading: Render as ceremonial/ritual uncleanness tied to corpse contact,
    not moral defilement in itself.
  alternative_readings:
  - Translate more literally as 'unclean of soul/person'
  rationale: In this context Haggai is invoking priestly purity categories from Torah.
    The idiom טְמֵא נֶפֶשׁ refers specifically to corpse impurity. Translating the
    idiom functionally prevents readers from importing a psychological or purely moral
    sense into the phrase.
