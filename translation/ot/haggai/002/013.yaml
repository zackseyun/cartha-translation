id: HAG.2.13
reference: Haggai 2:13
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר חַגַּ֔י אִם יִגַּ֧ע טְמֵא נֶ֛פֶשׁ בְּ/כָל אֵ֖לֶּה הֲ/יִטְמָ֑א
    וַ/יַּעֲנ֧וּ הַ/כֹּהֲנִ֛ים וַ/יֹּאמְר֖וּ יִטְמָֽא־־־׃
translation:
  text: Then Haggai said, “If one who is unclean by contact with a dead body touches
    any of these, does it become unclean?” And the priests answered and said, “It
    becomes unclean.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'unclean of a person/soul,' an idiom meaning unclean through contact
      with a dead body.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving the sequential force.
- source_word: חַגַּי
  chosen: Haggai
  rationale: Personal name is transliterated according to the project's policy to
    transliterate names rather than translate them.
- source_word: אִם
  chosen: If
  alternatives:
  - Suppose
  lexicon: HALOT
  rationale: Introduces a conditional case posed to the priests. 'If' is the most
    direct rendering.
- source_word: יִגַּע
  chosen: touches
  alternatives:
  - comes into contact with
  lexicon: HALOT
  rationale: נגע commonly denotes physical touching/contact. 'Touches' is concise
    and fits the ritual-purity context.
- source_word: טְמֵא נֶפֶשׁ
  chosen: one who is unclean by contact with a dead body
  alternatives:
  - a person made unclean by a corpse
  - one unclean because of a dead person
  lexicon: HALOT
  rationale: This expression is an idiom for corpse impurity, not merely an inward
    or abstract uncleanness. Rendering the idiomatic sense avoids ambiguity around
    'soul' and reflects Levitical purity usage.
- source_word: בְּכָל אֵלֶּה
  chosen: any of these
  alternatives:
  - all these things
  - these
  lexicon: HALOT
  rationale: The phrase refers back to the items just mentioned in the prior verse.
    'Any of these' fits the distributive sense in the conditional question.
- source_word: הֲיִטְמָא
  chosen: does it become unclean?
  alternatives:
  - is it made unclean?
  - will it be unclean?
  lexicon: HALOT
  rationale: The verb asks whether impurity is transmitted to the touched item. 'Become
    unclean' is clear, idiomatic, and preserves the ritual state change.
- source_word: וַיַּעֲנוּ
  chosen: answered
  alternatives:
  - replied
  lexicon: HALOT
  rationale: Standard narrative response verb; 'answered' matches the formal exchange.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Direct rendering of the definite plural noun; these are the authoritative
    respondents on purity law.
- source_word: וַיֹּאמְרוּ
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Retained because the Hebrew uses both 'answered' and 'said'; preserving
    both reflects the source's narrative style without awkwardness.
- source_word: יִטְמָא
  chosen: It becomes unclean
  alternatives:
  - It is unclean
  - Yes, it becomes unclean
  lexicon: HALOT
  rationale: Echoes the wording of the question and preserves the priests' legal judgment
    that impurity is transmitted.
