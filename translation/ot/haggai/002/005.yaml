id: HAG.2.5
reference: Haggai 2:5
source:
  edition: WLC
  text: אֶֽת הַ/דָּבָ֞ר אֲשֶׁר כָּרַ֤תִּי אִתְּ/כֶם֙ בְּ/צֵאתְ/כֶ֣ם מִ/מִּצְרַ֔יִם
    וְ/רוּחִ֖/י עֹמֶ֣דֶת בְּ/תוֹכְ/כֶ֑ם אַל תִּירָֽאוּ־־־׃ס
translation:
  text: As for the promise that I made with you when you came out of Egypt, and my
    Spirit is standing in your midst—do not fear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the word that I cut with you,' that is, covenant language; compare the
      idiom 'cut a covenant.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my Spirit remains among you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶת הַדָּבָר
  chosen: As for the promise
  alternatives:
  - the word
  - the matter
  - this is the word
  lexicon: HALOT
  rationale: The verse begins with an accusative marker plus 'the word/thing,' functioning
    elliptically and linking back to the exhortation of v. 4. In English, a bare 'the
    word' is awkward here. 'As for the promise' captures the covenantal sense in context,
    since what follows is explicitly what God 'cut' with them at the exodus.
- source_word: אֲשֶׁר כָּרַתִּי אִתְּכֶם
  chosen: that I made with you
  alternatives:
  - that I covenanted with you
  - that I cut with you
  lexicon: HALOT
  rationale: כרת with דבר can evoke covenant-making language. English idiom prefers
    'made with you'; 'cut with you' is too wooden, while 'covenanted with you' is
    possible but less natural. The covenantal force is retained by rendering דָּבָר
    here as 'promise' and noting the alternative.
- source_word: בְּצֵאתְכֶם מִמִּצְרַיִם
  chosen: when you came out of Egypt
  alternatives:
  - at your coming out from Egypt
  - when you went out from Egypt
  lexicon: HALOT
  rationale: 'The infinitive construct with prefixed ב marks time: ''when/in your
    coming out.'' ''Came out of Egypt'' is natural modern English and preserves the
    exodus reference.'
- source_word: וְרוּחִי
  chosen: and my Spirit
  alternatives:
  - and my רוח
  - and my breath
  lexicon: HALOT
  rationale: רוּחַ here refers to God's Spirit in covenantal presence among the people,
    not mere wind or breath. Capitalizing 'Spirit' reflects the personal divine referent
    in context without importing later doctrinal detail beyond the text.
- source_word: עֹמֶדֶת
  chosen: is standing
  alternatives:
  - remains
  - abides
  - stands
  lexicon: HALOT
  rationale: The participle denotes ongoing presence. 'Is standing' preserves the
    verbal image and durative force more closely than the smoother but more interpretive
    'remains' or 'abides'.
- source_word: בְּתוֹכְכֶם
  chosen: in your midst
  alternatives:
  - among you
  - within you
  lexicon: HALOT
  rationale: '''In your midst'' best conveys corporate presence among the community.
    ''Within you'' could suggest individual interiority not demanded by the Hebrew.'
- source_word: אַל תִּירָאוּ
  chosen: do not fear
  alternatives:
  - do not be afraid
  lexicon: HALOT
  rationale: A standard negative imperative. 'Do not fear' is concise and preserves
    the solemn tone.
