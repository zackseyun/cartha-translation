theological_decisions:
- issue: Rendering רוּחִי in a context of divine presence
  chosen_reading: my Spirit
  alternative_readings:
  - my breath
  rationale: In this covenant-exodus context, the referent is God's active presence
    among his people. 'Spirit' best reflects that theological and contextual sense.
    Capitalization signals divine referent in English style, not a denial of the Hebrew
    lexeme's broader semantic range.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Whether to make covenant language explicit in דָּבָר ... כָּרַתִּי
  chosen_reading: the promise that I made with you
  alternative_readings:
  - the covenant that I made with you
  - the word that I covenanted with you
  rationale: The Hebrew uses 'the word/thing' rather than the noun 'covenant,' so
    the main text should not over-specify beyond what the source says. Yet because
    כרת strongly evokes covenant-making, 'promise' in context communicates the covenantal
    commitment without replacing the source noun with a more technical term.
  doctrine_reference: 'Translation philosophy #1 and #5'
