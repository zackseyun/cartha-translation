id: HAG.2.4
reference: Haggai 2:4
source:
  edition: WLC
  text: וְ/עַתָּ֣ה חֲזַ֣ק זְרֻבָּבֶ֣ל נְאֻם יְהוָ֡ה וַ/חֲזַ֣ק יְהוֹשֻׁ֣עַ בֶּן יְהוֹצָדָק֩
    הַ/כֹּהֵ֨ן הַ/גָּד֜וֹל וַ/חֲזַ֨ק כָּל עַ֥ם הָ/אָ֛רֶץ נְאֻם יְהוָ֖ה וַֽ/עֲשׂ֑וּ
    כִּֽי אֲנִ֣י אִתְּ/כֶ֔ם נְאֻ֖ם יְהוָ֥ה צְבָאֽוֹת׀־־־־־׃
translation:
  text: But now, be strong, Zerubbabel, declares the LORD, and be strong, Joshua son
    of Jehozadak, the high priest, and be strong, all the people of the land, declares
    the LORD, and work, for I am with you, declares the LORD of Armies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the LORD of hosts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: But now
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Introduces a transition from prior discouragement to present exhortation.
    'But now' best captures the adversative force in context while remaining natural
    English.
- source_word: חֲזַק / וַחֲזַק / וַחֲזַק
  chosen: be strong
  alternatives:
  - take courage
  - be courageous
  - be firm
  lexicon: HALOT
  rationale: The repeated imperative from חזק calls for strength/courage. 'Be strong'
    preserves the lexical form and rhetorical repetition better than the more interpretive
    'take courage.'
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: A standard prophetic formula. 'Declares the LORD' is idiomatic, weighty,
    and more natural in modern English than 'oracle of the LORD,' while preserving
    the formal prophetic register.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and alignment with the stated doctrine policy.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: In this genealogical identification, 'son of' is the plain and expected
    rendering.
- source_word: הַכֹּהֵן הַגָּדוֹל
  chosen: the high priest
  alternatives:
  - the great priest
  - the chief priest
  lexicon: HALOT
  rationale: Established and accurate rendering of the office; 'high priest' best
    communicates the recognized cultic role in English.
- source_word: כָּל עַם הָאָרֶץ
  chosen: all the people of the land
  alternatives:
  - all the people of the earth
  - all the people of this land
  lexicon: HALOT
  rationale: In this post-exilic context, הָאָרֶץ most naturally refers to the local
    land/community rather than the whole earth. 'People of the land' preserves the
    Hebrew expression without overinterpreting it as merely 'everyone.'
- source_word: וַעֲשׂוּ
  chosen: and work
  alternatives:
  - and do it
  - and act
  - and get to work
  lexicon: HALOT
  rationale: The imperative of עשה here calls the hearers to action in rebuilding/obedience.
    'And work' fits the immediate temple-building context and remains concise; 'do
    it' is too vague, while 'get to work' is too colloquial.
- source_word: כִּי אֲנִי אִתְּכֶם
  chosen: for I am with you
  alternatives:
  - because I am with you
  lexicon: HALOT
  rationale: Straightforward covenantal assurance. 'For' connects the command with
    the divine ground for obedience.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of hosts
  lexicon: HALOT
  rationale: The Hebrew צְבָאוֹת denotes armies/hosts. 'LORD of Armies' translates
    the title rather than preserving a traditional but less transparent form. 'Hosts'
    is preserved as an alternative because of its familiarity in English Bible tradition.
