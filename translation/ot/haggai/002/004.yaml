theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering of
    YHWH, following Jewish reverence tradition and the Septuagintal pattern. This
    verse contains the divine name repeatedly, so consistency is especially important.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering יְהוָה צְבָאוֹת
  chosen_reading: the LORD of Armies
  alternative_readings:
  - the LORD of hosts
  rationale: The title is translated for meaning and readability. 'Armies' makes the
    martial/plenitude sense transparent to modern readers, while 'hosts' is preserved
    in a footnote as a traditional alternative.
  doctrine_reference: DOCTRINE.md Translation philosophy §2 (Translate titles; transliterate
    names)
