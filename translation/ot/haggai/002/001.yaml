id: HAG.2.1
reference: Haggai 2:1
source:
  edition: WLC
  text: בַּ/שְּׁבִיעִ֕י בְּ/עֶשְׂרִ֥ים וְ/אֶחָ֖ד לַ/חֹ֑דֶשׁ הָיָה֙ דְּבַר יְהוָ֔ה בְּ/יַד חַגַּ֥י הַ/נָּבִ֖יא לֵ/אמֹֽר־־׃
translation:
  text: On the twenty-first day of the seventh month, the word of Yahweh came by the hand of Haggai the prophet, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''by the hand of Haggai,'' an idiom meaning ''through Haggai'' or ''by Haggai''s agency.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּשְּׁבִיעִי
  chosen: of the seventh
  alternatives:
  - in the seventh
  - on the seventh
  lexicon: HALOT
  rationale: With the following date expression, this denotes the seventh month rather than the seventh day. English idiom is completed by rendering the whole phrase as 'of the seventh month.'
- source_word: בְּעֶשְׂרִים וְאֶחָד
  chosen: the twenty-first day
  alternatives:
  - on the twenty-first
  - in twenty-one
  lexicon: HALOT
  rationale: The cardinal construction with the month phrase functions as a calendar date. Supplying 'day' is required in natural English and reflects the implied sense.
- source_word: לַחֹדֶשׁ
  chosen: of the ... month
  alternatives:
  - of the moon/month
  lexicon: HALOT
  rationale: 'In dating formulas חֹדֶשׁ means ''month.'' The preposition and article are absorbed into idiomatic English date style: ''the twenty-first day of the seventh month.'''
- source_word: הָיָה דְּבַר יְהוָה
  chosen: the word of the LORD came
  alternatives:
  - the word of the LORD was
  - the word of the LORD happened
  lexicon: HALOT
  rationale: This is a standard prophetic formula. 'Came' is the established and natural English equivalent for היה with 'word of YHWH' in this context, better conveying the event of divine revelation than a wooden 'was.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּיַד
  chosen: by the hand of
  alternatives:
  - through
  - by
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'by the hand of' and denotes agency/instrumentality. Retaining the idiom preserves the prophetic mediation while remaining intelligible in English.
- source_word: חַגַּי
  chosen: Haggai
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: The title identifies Haggai's role and is naturally rendered 'the prophet.'
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - to say,
  - 'as follows:'
  lexicon: HALOT
  rationale: This infinitive introduces the ensuing divine speech. 'Saying,' is a conventional and accurate discourse marker in English.
