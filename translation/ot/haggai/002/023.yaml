id: HAG.2.23
reference: Haggai 2:23
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֣וּא נְאֻם יְהוָ֣ה צְבָא֡וֹת אֶ֠קָּחֲ/ךָ זְרֻבָּבֶ֨ל בֶּן שְׁאַלְתִּיאֵ֤ל
    עַבְדִּ/י֙ נְאֻם יְהוָ֔ה וְ/שַׂמְתִּ֖י/ךָ כַּֽ/חוֹתָ֑ם כִּֽי בְ/ךָ֣ בָחַ֔רְתִּי
    נְאֻ֖ם יְהוָ֥ה צְבָאֽוֹת־־־־׃
translation:
  text: On that day, declares the LORD of Armies, I will take you, Zerubbabel son
    of Shealtiel, my servant, declares the LORD, and I will make you like a signet
    ring, for I have chosen you, declares the LORD of Armies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, 'the LORD of Hosts.'
    reason: lexical_alternative
  - marker: b
    text: The image of a 'signet ring' suggests valued authority, ownership, and authentication;
      compare Jeremiah 22:24.
    reason: cross_reference
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  chosen: On that day
  alternatives:
  - In that day
  lexicon: HALOT
  rationale: Temporal prophetic formula. 'On that day' is idiomatic modern English
    and preserves the eschatological/prophetic force without archaism.
- source_word: נְאֻם יְהוָה צְבָאוֹת
  chosen: declares the LORD of Armies
  alternatives:
  - oracle of the LORD of Hosts
  - says the LORD of Hosts
  lexicon: HALOT
  rationale: נְאֻם is best rendered as a prophetic declaration formula, not as a bare
    speech verb. יְהוָה follows the doctrinal default 'the LORD.' צְבָאוֹת is translated
    rather than transliterated; 'of Armies' is more transparent to modern readers
    than 'of Hosts' while preserving the martial/cosmic sense.
- source_word: אֶקָּחֲךָ
  chosen: I will take you
  alternatives:
  - I will receive you
  - I will seize you
  lexicon: HALOT
  rationale: לקח commonly means 'take.' Here it introduces YHWH's act of selecting/exalting
    Zerubbabel. 'Take you' preserves the verbal imagery and avoids over-interpreting
    it as merely 'choose,' since choosing is stated explicitly later.
- source_word: זְרֻבָּבֶל בֶּן שְׁאַלְתִּיאֵל
  chosen: Zerubbabel son of Shealtiel
  alternatives:
  - Zerubbabel, the son of Shealtiel
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention. Appositional
    'son of' is retained straightforwardly.
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in royal-prophetic address to
    a chosen Davidic figure 'my servant' is the established and contextually fitting
    rendering, emphasizing commissioned service rather than bonded status.
- source_word: וְשַׂמְתִּיךָ כַּחוֹתָם
  chosen: and I will make you like a signet ring
  alternatives:
  - and I will set you as a seal
  - and I will make you as a signet
  lexicon: HALOT
  rationale: חותם denotes a seal/signet, often specifically a signet ring in royal-administrative
    usage. 'Make you like a signet ring' communicates the simile introduced by כ and
    preserves the image of valued authority and authentication.
- source_word: כִּי בְךָ בָחַרְתִּי
  chosen: for I have chosen you
  alternatives:
  - because I have chosen you
  - for in you I have chosen
  lexicon: HALOT
  rationale: בחר with ב marks the object chosen. 'For I have chosen you' is natural
    English and preserves the causal force of כִּי. The perfect is rendered as present-resultative
    in English ('have chosen') to reflect completed divine choice with ongoing significance.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - says the LORD
  - oracle of the LORD
  lexicon: HALOT
  rationale: Repeated prophetic formula retained consistently. 'Declares' better reflects
    the solemn oracle style than simple 'says.'
