theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for YHWH, aligning with Jewish reverence
    tradition and longstanding English Bible convention while distinguishing the covenant
    name typographically.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering צְבָאוֹת
  chosen_reading: of Armies
  alternative_readings:
  - of Hosts
  rationale: The Hebrew title evokes YHWH's command over heavenly and earthly forces.
    'Of Armies' is more semantically transparent in contemporary English than the
    traditional but opaque 'of Hosts.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: Messianic/royal implication of 'signet ring'
  chosen_reading: Preserve the metaphor without making its Davidic-messianic significance
    explicit in the main text
  alternative_readings:
  - Interpretively expand to 'my royal signet ring'
  rationale: The verse likely carries royal-restoration significance, especially in
    light of Jeremiah 22:24 and Zerubbabel's Davidic line, but the Hebrew text itself
    states only the signet image and divine choice. The translation preserves theological
    tension and leaves fuller interpretation to footnote/cross-reference rather than
    importing it into the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
