id: HAG.2.21
reference: Haggai 2:21
source:
  edition: WLC
  text: אֱמֹ֕ר אֶל זְרֻבָּבֶ֥ל פַּֽחַת יְהוּדָ֖ה לֵ/אמֹ֑ר אֲנִ֣י מַרְעִ֔ישׁ אֶת הַ/שָּׁמַ֖יִם
    וְ/אֶת הָ/אָֽרֶץ־־־־׃
translation:
  text: 'Speak to Zerubbabel, governor of Judah, saying: I am about to shake the heavens
    and the earth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will shake the heavens and the earth.' The Hebrew participle can
      be rendered as an imminent future or a simple future.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱמֹר
  chosen: Speak
  alternatives:
  - Say
  lexicon: HALOT
  rationale: Imperative of אמר introducing a prophetic command. 'Speak' is slightly
    more natural in English before the indirect object ('to Zerubbabel'), while preserving
    the force of the command.
- source_word: זְרֻבָּבֶל
  chosen: Zerubbabel
  rationale: Personal name is transliterated per translation philosophy.
- source_word: פַּחַת יְהוּדָה
  chosen: governor of Judah
  alternatives:
  - prefect of Judah
  lexicon: HALOT
  rationale: פַּחַת denotes a provincial governor under imperial administration. 'Governor'
    is the clearest modern equivalent; 'prefect' is possible but less idiomatic.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and say
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing the content of the speech.
    'Saying' preserves the Hebrew structure cleanly in English.
- source_word: אֲנִי
  chosen: I
  rationale: Explicit pronoun retained for emphasis in the divine declaration.
- source_word: מַרְעִישׁ
  chosen: am about to shake
  alternatives:
  - am shaking
  - will shake
  lexicon: HALOT
  rationale: Hiphil participle of רעשׁ can express imminent future in prophetic discourse.
    'Am about to shake' captures the participial aspect and near-future force better
    than a simple future, while remaining natural English.
- source_word: הַשָּׁמַיִם
  chosen: the heavens
  alternatives:
  - the sky
  - heaven
  lexicon: HALOT
  rationale: Plural form commonly denotes the heavens. 'The heavens' preserves the
    elevated cosmic scope of the prophecy better than 'sky'.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In parallel with 'the heavens,' the cosmic sense is primary here, so
    'the earth' is preferable to the more local 'land'.
