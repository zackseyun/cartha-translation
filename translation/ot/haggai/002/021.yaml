theological_decisions:
- issue: Scope of the shaking imagery
  chosen_reading: cosmic judgment language affecting the whole created order
  alternative_readings:
  - primarily political upheaval among nations
  rationale: The immediate wording 'the heavens and the earth' is cosmic in scope,
    though the following verses apply this in historical-political terms. The translation
    preserves the broader imagery without narrowing it to only political events.
