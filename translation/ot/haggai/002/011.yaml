id: HAG.2.11
reference: Haggai 2:11
source:
  edition: WLC
  text: כֹּ֥ה אָמַ֖ר יְהוָ֣ה צְבָא֑וֹת שְׁאַל נָ֧א אֶת הַ/כֹּהֲנִ֛ים תּוֹרָ֖ה לֵ/אמֹֽר־־׃
translation:
  text: 'Thus says the LORD of hosts: Ask the priests for a ruling, saying,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'about the law' or 'instruction.' The Hebrew torah here likely means
      a priestly legal ruling or instruction, not necessarily the Torah as a book.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is what
  lexicon: HALOT
  rationale: Introduces a prophetic formula. 'Thus' preserves the formal prophetic
    register in natural English.
- source_word: אָמַר
  chosen: says
  alternatives:
  - said
  lexicon: HALOT
  rationale: Prophetic messenger formula is conventionally and contextually rendered
    with the present tense in English ('Thus says...'), even though the Hebrew perfect
    is used.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: Standard rendering of the divine title יְהוָה צְבָאוֹת. 'Hosts' preserves
    the breadth of heavenly/earthly armies without over-specifying.
- source_word: שְׁאַל
  chosen: Ask
  alternatives:
  - Inquire of
  - Consult
  lexicon: HALOT
  rationale: Direct imperative to Haggai. 'Ask' is the plain sense and fits the following
    object.
- source_word: נָא
  chosen: —
  alternatives:
  - please
  - now
  lexicon: HALOT
  rationale: Particle of entreaty or softening. It is not naturally represented in
    this prophetic command in English; its force is absorbed into the imperative without
    adding awkwardness.
- source_word: אֶת הַכֹּהֲנִים
  chosen: the priests
  alternatives:
  - the priesthood
  lexicon: HALOT
  rationale: Definite direct object referring to the priests as those responsible
    to answer matters of Torah.
- source_word: תּוֹרָה
  chosen: for a ruling
  alternatives:
  - about the law
  - instruction
  lexicon: HALOT
  rationale: Here תּוֹרָה refers not to the Torah corpus in general but to priestly
    instruction/decision on a legal-ritual question, as the following verses show.
    'For a ruling' captures the functional sense in context.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - and say,
  lexicon: HALOT
  rationale: Introduces the content of the question in the next verse; 'saying' is
    the standard and concise rendering.
