id: HAG.2.8
reference: Haggai 2:8
source:
  edition: WLC
  text: לִ֥/י הַ/כֶּ֖סֶף וְ/לִ֣/י הַ/זָּהָ֑ב נְאֻ֖ם יְהוָ֥ה צְבָאֽוֹת׃
translation:
  text: The silver is mine, and the gold is mine, declares Yahweh of Armies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the LORD of hosts.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'The silver is mine, and the gold is mine,' an emphatic assertion of the LORD's ownership of both.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִי
  chosen: is mine
  alternatives:
  - belongs to me
  - is for me
  lexicon: HALOT
  rationale: The preposition with first-person singular suffix expresses possession. In English, an implied copula is required; 'is mine' is the most natural and direct rendering, preserving the emphatic possessive structure.
- source_word: הַכֶּסֶף
  chosen: the silver
  alternatives:
  - silver
  - the money
  lexicon: HALOT
  rationale: The noun commonly denotes silver, and in some contexts money. Here paired with 'the gold,' the material sense is primary, so 'the silver' best preserves the parallelism and concreteness.
- source_word: וְלִי
  chosen: and ... is mine
  alternatives:
  - and belongs to me
  lexicon: HALOT
  rationale: 'The conjunction plus repeated possessive phrase is retained to preserve the Hebrew emphasis: both precious metals are explicitly claimed by YHWH.'
- source_word: הַזָּהָב
  chosen: the gold
  alternatives:
  - gold
  lexicon: HALOT
  rationale: Rendered straightforwardly as the precious metal, matching the parallel with 'the silver.' The article is naturally represented in English as 'the gold' in this balanced poetic assertion.
- source_word: נְאֻם
  chosen: declares
  alternatives:
  - oracle of
  - utterance of
  - says
  lexicon: HALOT
  rationale: In prophetic formulae, this noun functions idiomatically to introduce a solemn divine pronouncement. 'Declares' is idiomatic modern English and preserves prophetic weight without archaic stiffness.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of hosts
  - of heavenly armies
  lexicon: HALOT
  rationale: The title denotes armies/hosts. 'Of Armies' translates the meaning more transparently for modern readers than the traditional but opaque 'of hosts,' while preserving the martial and sovereign sense of the title.
