theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This preserves continuity with Jewish reverence practice and common
    English Bible convention while avoiding a speculative vocalization in the main
    text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering יְהוָה צְבָאוֹת
  chosen_reading: the LORD of Armies
  alternative_readings:
  - the LORD of hosts
  - Yahweh of Armies
  rationale: The title is translated rather than left in traditional ecclesiastical
    form to align with source-language primacy and readable modern English. 'Of Armies'
    communicates the semantic content of צְבָאוֹת more clearly than 'of hosts.'
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6; Contested terms for
    יְהוָה
