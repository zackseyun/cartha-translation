id: HAG.2.7
reference: Haggai 2:7
source:
  edition: WLC
  text: וְ/הִרְעַשְׁתִּי֙ אֶת כָּל הַ/גּוֹיִ֔ם וּ/בָ֖אוּ חֶמְדַּ֣ת כָּל הַ/גּוֹיִ֑ם וּ/מִלֵּאתִ֞י אֶת הַ/בַּ֤יִת הַ/זֶּה֙ כָּב֔וֹד אָמַ֖ר יְהוָ֥ה צְבָאֽוֹת־־־־׃
translation:
  text: And I will shake all the nations, and the treasures of all the nations will come, and I will fill this house with glory, says Yahweh of Armies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, following a traditional rendering, 'the desire of all the nations will come.' The Hebrew may also mean 'the desirable things' or 'treasures' of the nations; the plural verb favors a collective sense.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִרְעַשְׁתִּי
  chosen: I will shake
  alternatives:
  - I will cause to tremble
  - I will shake violently
  lexicon: HALOT
  rationale: Hiphil of רעשׁ conveys causing shaking or trembling. 'I will shake' is natural English and preserves the active divine causation without over-intensifying beyond the Hebrew.
- source_word: כָּל־הַגּוֹיִם
  chosen: all the nations
  alternatives:
  - all the peoples
  - all the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם commonly means 'nations.' In this prophetic context it refers to the nations broadly, not specifically 'Gentiles' as a theological category.
- source_word: וּבָאוּ
  chosen: will come
  alternatives:
  - shall come
  lexicon: HALOT
  rationale: 'Simple qatal with prefixed conjunction in prophetic sequence is well represented by future English here: ''will come.'''
- source_word: חֶמְדַּת כָּל־הַגּוֹיִם
  chosen: the treasures of all the nations
  alternatives:
  - the desire of all the nations
  - the desirable things of all the nations
  lexicon: HALOT
  rationale: חֶמְדַּת is singular in form but can function collectively, referring to precious or desirable things. Because the accompanying verb is plural (וּבָאוּ), a collective/material sense fits the grammar better than a singular personal messianic reading. 'Treasures' communicates the likely sense of valued wealth brought by the nations.
- source_word: וּמִלֵּאתִי
  chosen: I will fill
  alternatives:
  - I will make full
  lexicon: HALOT
  rationale: Piel of מלא means to fill. The direct object plus complement 'with glory' is straightforwardly rendered.
- source_word: הַבַּיִת הַזֶּה
  chosen: this house
  alternatives:
  - this temple
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In Haggai the referent is the temple, but 'this house' preserves the prophet's wording while remaining clear in context.
- source_word: כָּבוֹד
  chosen: glory
  alternatives:
  - honor
  - splendor
  lexicon: HALOT
  rationale: כָּבוֹד in temple and divine-presence contexts is best rendered 'glory,' preserving both majesty and theological resonance.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of hosts
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is translated rather than transliterated; 'of Armies' is more transparent modern English than the traditional 'of hosts,' while preserving the martial/cosmic force of the title.
