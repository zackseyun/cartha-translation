theological_decisions:
- issue: Meaning of חֶמְדַּת כָּל־הַגּוֹיִם
  chosen_reading: 'collective/material: ''the treasures of all the nations'''
  alternative_readings:
  - 'personal/messianic: ''the desire of all nations'''
  - 'material: ''the desirable things of all the nations'''
  rationale: The Hebrew noun can denote desirable/precious things, and the plural verb וּבָאוּ strongly supports a collective plural sense rather than a singular individual. This avoids importing a christological claim the text does not unambiguously make, while preserving the traditional messianic rendering in a footnote because of its historical significance.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
