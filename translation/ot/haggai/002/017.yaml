id: HAG.2.17
reference: Haggai 2:17
source:
  edition: WLC
  text: הִכֵּ֨יתִי אֶתְ/כֶ֜ם בַּ/שִּׁדָּפ֤וֹן וּ/בַ/יֵּֽרָקוֹן֙ וּ/בַ/בָּרָ֔ד אֵ֖ת
    כָּל מַעֲשֵׂ֣ה יְדֵי/כֶ֑ם וְ/אֵין אֶתְ/כֶ֥ם אֵלַ֖/י נְאֻם יְהוָֽה־־־׃
translation:
  text: I struck you with blight and mildew and hail—all the work of your hands—yet
    you did not turn to me, declares the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and you were not to me' or 'and none of you was toward
      me'; the sense in context is that they did not return to the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִכֵּיתִי
  chosen: I struck
  alternatives:
  - I smote
  - I afflicted
  - I struck down
  lexicon: HALOT
  rationale: From נכה, a verb of striking/blow. 'I struck' is direct, natural English
    and preserves divine agency without adding interpretive nuance beyond the Hebrew.
- source_word: בַּשִּׁדָּפוֹן
  chosen: with blight
  alternatives:
  - with scorching
  - with blasting
  lexicon: HALOT
  rationale: שִׁדָּפוֹן denotes an agricultural blight/scorching disease affecting
    crops. 'Blight' is clear modern English and fits the crop-judgment context.
- source_word: וּבַיֵּרָקוֹן
  chosen: and mildew
  alternatives:
  - and yellowing
  - and blight
  lexicon: HALOT
  rationale: יֵרָקוֹן refers to a plant disease associated with yellowing/paleness.
    'Mildew' is the conventional and contextually apt rendering for agricultural devastation.
- source_word: וּבַבָּרָד
  chosen: and hail
  lexicon: HALOT
  rationale: בָּרָד straightforwardly means 'hail'; no contextual reason to vary.
- source_word: אֵת כָּל מַעֲשֵׂה יְדֵיכֶם
  chosen: all the work of your hands
  alternatives:
  - everything your hands produced
  - all your handiwork
  lexicon: HALOT
  rationale: A common Hebrew idiom for human labor/produce. 'All the work of your
    hands' preserves the idiom while remaining readable.
- source_word: וְאֵין אֶתְכֶם אֵלַי
  chosen: yet you did not turn to me
  alternatives:
  - but you were not with me
  - yet none of you came to me
  - but you were not toward me
  lexicon: HALOT
  rationale: The clause is elliptical and idiomatic. In context of covenant discipline,
    the sense is that despite judgment the people did not return/turn to God. 'Yet
    you did not turn to me' best captures the intended force in idiomatic English.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is natural English and
    preserves the solemn prophetic force.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD'.
