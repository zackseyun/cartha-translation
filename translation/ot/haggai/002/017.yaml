theological_decisions:
- issue: Interpretation of the elliptical clause וְאֵין אֶתְכֶם אֵלַי
  chosen_reading: 'A covenantal failure to return/respond to God after judgment: ''yet
    you did not turn to me.'''
  alternative_readings:
  - '''yet you were not with me'''
  - '''yet none of you came to me'''
  rationale: The Hebrew lacks an explicit verb, but in prophetic judgment contexts
    this construction conveys refusal to return to the LORD despite chastisement (cf.
    similar prophetic idiom). Rendering it woodenly would obscure the sense; 'turn
    to me' communicates the covenantal call to repentance without overexpansion.
  doctrine_reference: Translation philosophy §3, §6
