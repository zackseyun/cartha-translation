id: HAG.2.10
reference: Haggai 2:10
source:
  edition: WLC
  text: בְּ/עֶשְׂרִ֤ים וְ/אַרְבָּעָה֙ לַ/תְּשִׁיעִ֔י בִּ/שְׁנַ֥ת שְׁתַּ֖יִם לְ/דָרְיָ֑וֶשׁ
    הָיָה֙ דְּבַר יְהוָ֔ה אֶל חַגַּ֥י הַ/נָּבִ֖יא לֵ/אמֹֽר־־׃
translation:
  text: On the twenty-fourth day of the ninth month, in the second year of Darius,
    the word of the LORD came to Haggai the prophet, saying,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּ/עֶשְׂרִים וְ/אַרְבָּעָה
  chosen: on the twenty-fourth day
  alternatives:
  - on the twenty-fourth
  - on day twenty-four
  lexicon: HALOT
  rationale: The Hebrew gives the date idiomatically as 'on twenty and four.' English
    normally requires 'day' to make the dating formula natural and explicit. 'Twenty-fourth'
    is the standard ordinal expression for this construction.
- source_word: לַ/תְּשִׁיעִי
  chosen: of the ninth month
  alternatives:
  - of the ninth
  lexicon: HALOT
  rationale: The ordinal refers to the ninth month in a dating formula. Supplying
    'month' is required for clear English and reflects the conventional sense of the
    Hebrew date expression.
- source_word: בִּ/שְׁנַת שְׁתַּיִם
  chosen: in the second year
  alternatives:
  - in year two
  lexicon: HALOT
  rationale: This is the standard regnal-year formula. 'Second year' is idiomatic
    English and accurately reflects the construct phrase.
- source_word: לְ/דָרְיָוֶשׁ
  chosen: of Darius
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per project
    philosophy. The lamed here marks relation within the regnal formula, naturally
    rendered 'of Darius.'
- source_word: הָיָה דְּבַר יְהוָה
  chosen: the word of the LORD came
  alternatives:
  - the word of the LORD was
  - the word of the LORD happened
  lexicon: HALOT
  rationale: This is a common prophetic formula. Rendering היה with 'came' rather
    than a bare 'was' communicates the idiomatic force in English without paraphrase.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the LXX pattern.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks the recipient of the divine word. 'To' is the natural
    modern English equivalent.
- source_word: חַגַּי
  chosen: Haggai
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
- source_word: הַ/נָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: The appositional title identifies Haggai's role. Retaining the article
    reflects the Hebrew and the conventional English prophetic formula.
- source_word: לֵ/אמֹר
  chosen: saying,
  alternatives:
  - thus saying,
  lexicon: HALOT
  rationale: This infinitive introduces the following divine speech. 'Saying' is the
    standard concise English rendering and appropriately leaves the sentence open
    into the next verse.
