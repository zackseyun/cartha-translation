id: HAG.2.22
reference: Haggai 2:22
source:
  edition: WLC
  text: וְ/הָֽפַכְתִּי֙ כִּסֵּ֣א מַמְלָכ֔וֹת וְ/הִ֨שְׁמַדְתִּ֔י חֹ֖זֶק מַמְלְכ֣וֹת
    הַ/גּוֹיִ֑ם וְ/הָפַכְתִּ֤י מֶרְכָּבָה֙ וְ/רֹ֣כְבֶ֔י/הָ וְ/יָרְד֤וּ סוּסִים֙ וְ/רֹ֣כְבֵי/הֶ֔ם
    אִ֖ישׁ בְּ/חֶ֥רֶב אָחִֽי/ו׃
translation:
  text: I will overturn the throne of kingdoms, and I will destroy the strength of
    the kingdoms of the nations. I will overturn the chariot and its rider, and horses
    and their riders will go down, each by the sword of his brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will overthrow the throne of kingdoms.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'each by the sword of his brother,' an idiom for mutual slaughter
      or civil strife among the attackers.
    reason: cultural_note
lexical_decisions:
- source_word: וְהָפַכְתִּי
  chosen: I will overturn
  alternatives:
  - I will overthrow
  - I will turn over
  lexicon: HALOT
  rationale: הפך in this judgment context conveys overturning/overthrowing established
    powers. 'Overturn' preserves the concrete imagery and works for both the throne
    and the chariot in this verse.
- source_word: כִּסֵּא מַמְלָכוֹת
  chosen: the throne of kingdoms
  alternatives:
  - the thrones of kingdoms
  - the royal throne of kingdoms
  lexicon: HALOT
  rationale: כִּסֵּא is singular in the Hebrew. The singular likely functions collectively
    or symbolically for royal rule; 'the throne of kingdoms' preserves the singular
    form without over-interpreting.
- source_word: וְהִשְׁמַדְתִּי
  chosen: I will destroy
  alternatives:
  - I will annihilate
  - I will wipe out
  lexicon: HALOT
  rationale: The Hiphil of שׁמד is a strong judgment verb. 'Destroy' is forceful and
    idiomatic without overstating beyond the text.
- source_word: חֹזֶק
  chosen: the strength
  alternatives:
  - the might
  - the power
  lexicon: HALOT
  rationale: חֹזֶק denotes strength or might. 'Strength' is a straightforward rendering
    and pairs naturally with political kingdoms.
- source_word: מַמְלְכוֹת הַגּוֹיִם
  chosen: the kingdoms of the nations
  alternatives:
  - the kingdoms of the Gentiles
  - the kingdoms of the peoples
  lexicon: HALOT
  rationale: גּוֹיִם here refers to foreign nations in a geopolitical sense. 'Nations'
    is the clearest modern English rendering in prophetic judgment context.
- source_word: מֶרְכָּבָה
  chosen: the chariot
  alternatives:
  - the war chariot
  - the chariot-force
  lexicon: HALOT
  rationale: The singular is retained. While it may stand collectively for military
    power, 'the chariot' best preserves the Hebrew image and allows the context to
    supply the military sense.
- source_word: וְרֹכְבֶיהָ
  chosen: its rider
  alternatives:
  - its riders
  lexicon: HALOT
  rationale: The form is plural construct with a 3fs suffix, literally 'its riders,'
    referring back to the singular collective 'chariot.' English often smooths such
    collective constructions; however, to match the paired singular imagery in the
    clause, 'its rider' is used. The following plural clause then broadens to 'horses
    and their riders.'
- source_word: וְיָרְדוּ
  chosen: will go down
  alternatives:
  - will fall
  - will be brought down
  lexicon: HALOT
  rationale: ירד literally means 'go down' or 'descend.' In battle context it implies
    falling in defeat, but 'go down' preserves the Hebrew wording and imagery.
- source_word: סוּסִים
  chosen: horses
  alternatives:
  - warhorses
  lexicon: HALOT
  rationale: The plain lexical sense is 'horses.' The military context is already
    clear from 'chariot' and 'riders,' so no expansion is necessary.
- source_word: וְרֹכְבֵיהֶם
  chosen: their riders
  alternatives:
  - their horsemen
  lexicon: HALOT
  rationale: '''Their riders'' is the most direct rendering. ''Horsemen'' is possible
    but slightly more interpretive.'
- source_word: אִישׁ בְּחֶרֶב אָחִיו
  chosen: each by the sword of his brother
  alternatives:
  - each by his brother's sword
  - each against his brother with the sword
  lexicon: HALOT
  rationale: This idiom expresses mutual slaughter or internecine conflict. 'Each
    by the sword of his brother' stays close to the Hebrew while remaining intelligible.
    'His brother' is retained as gender-accurate and idiomatic per translation philosophy.
