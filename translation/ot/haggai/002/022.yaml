theological_decisions:
- issue: Gendered language in אִישׁ ... אָחִיו
  chosen_reading: each by the sword of his brother
  alternative_readings:
  - each by his brother's sword
  - each by the sword of another
  rationale: The Hebrew uses masculine singular terms אִישׁ and אָחִיו in an idiomatic
    distributive expression. Per the project's gender-accurate policy, the masculine
    form is preserved rather than neutralized, while the sense remains representative
    of combatants generally.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
