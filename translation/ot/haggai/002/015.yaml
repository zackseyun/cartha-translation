id: HAG.2.15
reference: Haggai 2:15
source:
  edition: WLC
  text: וְ/עַתָּה֙ שִֽׂימוּ נָ֣א לְבַבְ/כֶ֔ם מִן הַ/יּ֥וֹם הַ/זֶּ֖ה וָ/מָ֑עְלָ/ה מִ/טֶּ֧רֶם שֽׂוּם אֶ֛בֶן אֶל אֶ֖בֶן בְּ/הֵיכַ֥ל יְהוָֽה־־־־׃
translation:
  text: 'And now, please set your heart on this from today onward: before one stone was placed upon another in the temple of Yahweh,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'consider from this day onward.' The Hebrew literally says 'set your heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Introduces an immediate exhortation with a natural discourse transition. 'And now' preserves the conjunction plus temporal adverb.
- source_word: שִׂימוּ נָא לְבַבְכֶם
  chosen: please set your heart
  alternatives:
  - set your mind
  - consider
  - take to heart
  lexicon: HALOT
  rationale: Literally 'set your heart.' This idiom calls for careful reflection or attention. 'Set your heart' preserves the Hebrew imagery better than the more interpretive 'consider,' while 'please' reflects נָא as a particle of entreaty.
- source_word: מִן הַיּוֹם הַזֶּה וָמָעְלָה
  chosen: from today onward
  alternatives:
  - from this day and upward
  - from this day forward
  lexicon: HALOT
  rationale: An idiomatic temporal expression meaning from the present day into the future. 'From today onward' is clear modern English and preserves the forward-looking force.
- source_word: מִטֶּרֶם
  chosen: before
  alternatives:
  - prior to
  - from before
  lexicon: HALOT
  rationale: Marks the time preceding the temple-building event referenced in the infinitive clause.
- source_word: שׂוּם אֶבֶן אֶל אֶבֶן
  chosen: one stone was placed upon another
  alternatives:
  - stone was laid upon stone
  - a stone was set upon a stone
  lexicon: HALOT
  rationale: The Hebrew infinitive with 'stone to stone' is an idiom for construction. 'One stone was placed upon another' is natural English while retaining the image of building.
- source_word: בְּהֵיכַל
  chosen: in the temple
  alternatives:
  - in the palace
  - in the sanctuary
  lexicon: HALOT
  rationale: In this prophetic context, הֵיכָל refers to the temple building, not a royal palace. 'Temple' is the contextually precise rendering.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
