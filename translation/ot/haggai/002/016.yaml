id: HAG.2.16
reference: Haggai 2:16
source:
  edition: WLC
  text: מִֽ/הְיוֹתָ֥/ם בָּא֙ אֶל עֲרֵמַ֣ת עֶשְׂרִ֔ים וְ/הָיְתָ֖ה עֲשָׂרָ֑ה בָּ֣א אֶל
    הַ/יֶּ֗קֶב לַ/חְשֹׂף֙ חֲמִשִּׁ֣ים פּוּרָ֔ה וְ/הָיְתָ֖ה עֶשְׂרִֽים־־׃
translation:
  text: How was it with you in those days? When one came to a heap of twenty measures,
    there were only ten; when one came to the wine vat to draw fifty measures, there
    were only twenty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'fifty purah,' a liquid measure or container of uncertain exact size.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִהְיוֹתָם
  chosen: How was it with you in those days?
  alternatives:
  - Since those days
  - From that time
  lexicon: HALOT
  rationale: The infinitive construct of היה with prefixed מ and 3mp suffix is idiomatic
    in context, introducing the prior state of affairs. Because v.15 begins with 'and
    now, please set your heart... from before a stone was placed,' this clause in
    v.16 looks back to the earlier period. Rendering it as an idiomatic question in
    English captures the sense carried by many translations and fits the following
    examples of shortage, while avoiding a wooden 'from their being' that is not natural
    English.
- source_word: בָּא
  chosen: when one came
  alternatives:
  - when someone came
  - as one came
  lexicon: HALOT
  rationale: The singular participial/verb form is used generically. 'When one came'
    preserves the indefinite singular force without over-specifying the subject.
- source_word: עֲרֵמַת עֶשְׂרִים
  chosen: a heap of twenty measures
  alternatives:
  - a heap of twenty
  - a pile expected to be twenty
  lexicon: HALOT
  rationale: עֲרֵמָה denotes a heap or pile, here of harvested produce. The numeral
    lacks an explicit unit, so 'measures' is supplied in English to make sense of
    the quantity while signaling the implied measure rather than a counted object.
- source_word: וְהָיְתָה עֲשָׂרָה
  chosen: there were only ten
  alternatives:
  - it turned out to be ten
  - it was ten
  lexicon: HALOT
  rationale: The feminine verb agrees with the implied quantity/heap. 'There were
    only ten' communicates the disappointing shortfall clearly and naturally.
- source_word: הַיֶּקֶב
  chosen: the wine vat
  alternatives:
  - the winepress vat
  - the vat
  lexicon: HALOT
  rationale: יֶקֶב refers specifically to the vat associated with wine production,
    not the whole press apparatus. 'Wine vat' is precise and readable.
- source_word: לַחְשֹׂף
  chosen: to draw
  alternatives:
  - to scoop out
  - to bale out
  lexicon: HALOT
  rationale: The infinitive here refers to drawing out liquid from the vat. 'Draw'
    is idiomatic in English for taking out a measured amount of liquid.
- source_word: חֲמִשִּׁים פּוּרָה
  chosen: fifty measures
  alternatives:
  - fifty purah
  - fifty vessel-measures
  lexicon: HALOT
  rationale: פּוּרָה is a liquid measure/container term of uncertain exact equivalence.
    For readability in the main text, 'measures' conveys the quantitative sense without
    pretending precision. The more literal term is preserved in a footnote.
- source_word: וְהָיְתָה עֶשְׂרִים
  chosen: there were only twenty
  alternatives:
  - it turned out to be twenty
  - it was twenty
  lexicon: HALOT
  rationale: As with the earlier clause, the point is the reduced yield. 'Only' brings
    out the implied disappointment and shortage.
