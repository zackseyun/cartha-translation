id: HAG.2.2
reference: Haggai 2:2
source:
  edition: WLC
  text: אֱמָר נָ֗א אֶל זְרֻבָּבֶ֤ל בֶּן שַׁלְתִּיאֵל֙ פַּחַ֣ת יְהוּדָ֔ה וְ/אֶל יְהוֹשֻׁ֥עַ
    בֶּן יְהוֹצָדָ֖ק הַ/כֹּהֵ֣ן הַ/גָּד֑וֹל וְ/אֶל שְׁאֵרִ֥ית הָ/עָ֖ם לֵ/אמֹֽר־־־־־־׃
translation:
  text: Speak now to Zerubbabel son of Shealtiel, governor of Judah, and to Joshua
    son of Jehozadak, the high priest, and to the remnant of the people, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the rest of the people.' The Hebrew term can denote those who remain
      and may also carry prophetic 'remnant' overtones.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Joshua'; some English traditions use 'Jeshua' where the shorter
      form of the name appears elsewhere.
    reason: alternative_reading
lexical_decisions:
- source_word: אֱמָר
  chosen: Speak
  alternatives:
  - Say
  lexicon: HALOT
  rationale: Imperative of אמר introducing a divine command to address specific hearers.
    'Speak' is natural English before a list of addressees, while remaining close
    to the Hebrew.
- source_word: נָא
  chosen: now
  alternatives:
  - please
  lexicon: HALOT
  rationale: Here נָא functions as a particle of urgency or immediacy rather than
    politeness. 'Now' fits prophetic discourse better than 'please' in English.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition marking the addressee.
- source_word: זְרֻבָּבֶל
  chosen: Zerubbabel
  rationale: Personal name transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: בֶּן
  chosen: son of
  lexicon: HALOT
  rationale: Standard filial construction in Hebrew genealogy and identification.
- source_word: שַׁלְתִּיאֵל
  chosen: Shealtiel
  alternatives:
  - Salathiel
  rationale: Hebrew-form transliteration preferred from the MT; 'Salathiel' reflects
    Greek/English tradition in some contexts.
- source_word: פַּחַת יְהוּדָה
  chosen: governor of Judah
  alternatives:
  - prefect of Judah
  lexicon: HALOT
  rationale: פַּחַת denotes a Persian-period provincial governor. 'Governor' is the
    clearest modern equivalent; 'prefect' is possible but less idiomatic.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  alternatives:
  - Jeshua
  rationale: The MT form here is יְהוֹשֻׁעַ, best represented as 'Joshua.' 'Jeshua'
    reflects the shorter postexilic form found elsewhere, but not this spelling here.
- source_word: יְהוֹצָדָק
  chosen: Jehozadak
  alternatives:
  - Jozadak
  rationale: Direct transliteration of the Hebrew name; 'Jozadak' is a shortened traditional
    English form.
- source_word: הַכֹּהֵן הַגָּדוֹל
  chosen: the high priest
  alternatives:
  - the great priest
  - the chief priest
  lexicon: HALOT
  rationale: Established and accurate rendering of the title for Israel's chief priest.
    'High priest' best conveys the office in natural English.
- source_word: שְׁאֵרִית הָעָם
  chosen: the remnant of the people
  alternatives:
  - the rest of the people
  - the remainder of the people
  lexicon: HALOT
  rationale: שְׁאֵרִית often carries the sense 'remnant,' including in prophetic literature.
    Here it can denote those remaining of the community; 'remnant' preserves that
    resonance without overinterpreting.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - and say,
  lexicon: HALOT
  rationale: Infinitive construct introducing the content of the speech in the next
    verse. 'Saying,' preserves the linkage to the following quotation.
