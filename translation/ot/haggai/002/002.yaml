theological_decisions:
- issue: Potential theological resonance of שְׁאֵרִית ('remnant') in prophetic literature
  chosen_reading: Render as 'the remnant of the people' in the main text
  alternative_readings:
  - the rest of the people
  rationale: The term can function both descriptively and theologically in prophetic
    contexts. Since Haggai addresses the postexilic community and the Hebrew specifically
    uses שְׁאֵרִית, 'remnant' preserves the prophetic resonance without adding doctrinal
    interpretation beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
