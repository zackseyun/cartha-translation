theological_decisions:
- issue: Transmission of holiness by contact in priestly law
  chosen_reading: The verse asks whether contact via a garment carrying holy meat
    makes other food holy, and the priests' answer is negative.
  alternative_readings:
  - The contact could be read as directly from the holy meat rather than mediated
    through the garment fold.
  rationale: The Hebrew explicitly frames a priestly legal question about ritual holiness,
    not moral holiness or inward sanctification. The translation preserves that cultic/legal
    sense without importing later theological conclusions.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
