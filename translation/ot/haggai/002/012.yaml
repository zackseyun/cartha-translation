id: HAG.2.12
reference: Haggai 2:12
source:
  edition: WLC
  text: הֵ֣ן יִשָּׂא אִ֨ישׁ בְּשַׂר קֹ֜דֶשׁ בִּ/כְנַ֣ף בִּגְד֗/וֹ וְ/נָגַ֣ע בִּ֠/כְנָפ/וֹ
    אֶל הַ/לֶּ֨חֶם וְ/אֶל הַ/נָּזִ֜יד וְ/אֶל הַ/יַּ֧יִן וְ/אֶל שֶׁ֛מֶן וְ/אֶל כָּל
    מַאֲכָ֖ל הֲ/יִקְדָּ֑שׁ וַ/יַּעֲנ֧וּ הַ/כֹּהֲנִ֛ים וַ/יֹּאמְר֖וּ לֹֽא׀־־־־־־־־׃
translation:
  text: Suppose a man carries holy meat in the fold of his garment, and with his fold
    touches bread, stew, wine, oil, or any food—does it become holy? And the priests
    answered and said, “No.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “consecrated meat”; Hebrew “holy flesh.”
    reason: lexical_alternative
  - marker: b
    text: Or “corner/skirt of his garment.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Suppose
  alternatives:
  - If
  - Look
  lexicon: HALOT
  rationale: Introduces a hypothetical case posed to the priests. 'Suppose' captures
    the conditional, illustrative force more naturally than the more wooden 'Behold'
    or a bare 'If' in contemporary English.
- source_word: יִשָּׂא אִישׁ
  chosen: a man carries
  alternatives:
  - a man bears
  - someone carries
  lexicon: HALOT
  rationale: Retains the singular masculine generic ('a man') in keeping with gender-accurate
    policy, while using the natural English verb 'carries' for נשׂא in this context.
- source_word: בְּשַׂר קֹדֶשׁ
  chosen: holy meat
  alternatives:
  - consecrated meat
  - holy flesh
  lexicon: HALOT
  rationale: Refers to sacrificial meat that is holy/consecrated. 'Holy meat' is direct
    and understandable; 'holy flesh' is more literal but less natural in English,
    while 'consecrated meat' is possible but slightly more interpretive.
- source_word: בִּכְנַף בִּגְדוֹ
  chosen: in the fold of his garment
  alternatives:
  - in the corner of his garment
  - in the skirt of his garment
  lexicon: HALOT
  rationale: כָּנָף can mean edge, corner, or skirt; here it refers to the part of
    the garment used to carry the meat. 'Fold' best conveys the functional sense in
    idiomatic English.
- source_word: וְנָגַע בִּכְנָפוֹ
  chosen: and with his fold touches
  alternatives:
  - and its fold touches
  - and he touches with his garment fold
  lexicon: HALOT
  rationale: 'The suffix refers back to the garment''s fold. This rendering keeps
    the instrumental sense clear: the contact is made by means of the fold containing
    the holy meat.'
- source_word: לֶחֶם
  chosen: bread
  lexicon: HALOT
  rationale: Standard rendering.
- source_word: נָזִיד
  chosen: stew
  alternatives:
  - boiled food
  - pottage
  lexicon: HALOT
  rationale: Refers to cooked stew or boiled dish. 'Stew' is clear modern English;
    'pottage' is archaic.
- source_word: יַיִן
  chosen: wine
  lexicon: HALOT
  rationale: Standard rendering.
- source_word: שֶׁמֶן
  chosen: oil
  alternatives:
  - olive oil
  lexicon: HALOT
  rationale: Standard rendering; likely olive oil in context, but the Hebrew says
    simply 'oil.'
- source_word: כָּל מַאֲכָל
  chosen: any food
  alternatives:
  - any kind of food
  - all food
  lexicon: HALOT
  rationale: In this list, the phrase broadens the scope to any edible item. 'Any
    food' fits the interrogative context better than the potentially overbroad 'all
    food.'
- source_word: הֲיִקְדָּשׁ
  chosen: does it become holy?
  alternatives:
  - is it made holy?
  - does it become consecrated?
  lexicon: HALOT
  rationale: The question concerns whether holiness is transmitted by contact. 'Become
    holy' is natural and preserves the passive/resultative sense without overtechnical
    wording.
- source_word: וַיַּעֲנוּ הַכֹּהֲנִים וַיֹּאמְרוּ לֹא
  chosen: And the priests answered and said, “No.”
  alternatives:
  - Then the priests answered, 'No.'
  lexicon: HALOT
  rationale: Keeps the Hebrew narrative cadence with both verbs while remaining readable
    in English.
