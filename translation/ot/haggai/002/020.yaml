id: HAG.2.20
reference: Haggai 2:20
source:
  edition: WLC
  text: וַ/יְהִ֨י דְבַר יְהוָ֤ה שֵׁנִית֙ אֶל חַגַּ֔י בְּ/עֶשְׂרִ֧ים וְ/אַרְבָּעָ֛ה לַ/חֹ֖דֶשׁ לֵ/אמֹֽר־׀־׃
translation:
  text: And the word of Yahweh came a second time to Haggai on the twenty-fourth day of the month, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Yahweh.' The Hebrew has the divine name יְהוָה.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: came
  alternatives:
  - was
  - happened
  lexicon: HALOT
  rationale: In the prophetic formula ויהי דבר־יהוה, idiomatic English is 'the word of the LORD came' rather than the more wooden 'the word of the LORD was.' This preserves the standard Hebrew revelatory formula in natural English.
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: '''Word'' preserves the conventional prophetic formula and the lexical sense of דָּבָר. ''LORD'' follows the doctrinal default for יְהוָה.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שֵׁנִית
  chosen: a second time
  alternatives:
  - again
  lexicon: HALOT
  rationale: '''A second time'' is more explicit and closely matches the adverbial force of שֵׁנִית than the less precise ''again.'''
- source_word: אֶל חַגַּי
  chosen: to Haggai
  alternatives:
  - for Haggai
  lexicon: HALOT
  rationale: אֶל with verbs of speaking/revelation is naturally rendered 'to.' The personal name is transliterated per translation philosophy.
- source_word: בְּעֶשְׂרִים וְאַרְבָּעָה לַחֹדֶשׁ
  chosen: on the twenty-fourth day of the month
  alternatives:
  - on the twenty-fourth of the month
  lexicon: HALOT
  rationale: This renders the date expression idiomatically in English while preserving the definite sense supplied by לַחֹדֶשׁ. 'Day' is implied in English date formulas and clarifies the construction.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - to say,
  lexicon: HALOT
  rationale: Standard rendering of the infinitive introducing direct speech. The comma signals continuation into the next verse.
