theological_decisions:
- issue: Rendering the divine title יְהוָה צְבָאוֹת
  chosen_reading: the LORD of Armies
  alternative_readings:
  - the LORD of hosts
  rationale: The translation follows the doctrinal default for YHWH as 'the LORD'
    and translates צְבָאוֹת in a transparent modern way. This preserves the covenant
    name plus the martial/cosmic sovereignty implied by the title without relying
    on archaic church vocabulary.
  doctrine_reference: 'DOCTRINE.md: Contested terms (יְהוָה YHWH → the LORD); Translation
    philosophy #6'
- issue: Temporal phrasing עוֹד אַחַת מְעַט הִיא
  chosen_reading: Yet once more, in a little while
  alternative_readings:
  - Yet once, it is a little while
  - One more time, after a little while
  rationale: The Hebrew phrase is syntactically compressed and can be represented
    more formally or more idiomatically. The chosen reading preserves both the 'once
    more' element and the short time reference, without importing later interpretive
    conclusions from Hebrews 12.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #1 and #3'
