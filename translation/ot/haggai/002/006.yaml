id: HAG.2.6
reference: Haggai 2:6
source:
  edition: WLC
  text: כִּ֣י כֹ֤ה אָמַר֙ יְהוָ֣ה צְבָא֔וֹת ע֥וֹד אַחַ֖ת מְעַ֣ט הִ֑יא וַ/אֲנִ֗י מַרְעִישׁ֙ אֶת הַ/שָּׁמַ֣יִם וְ/אֶת הָ/אָ֔רֶץ וְ/אֶת הַ/יָּ֖ם וְ/אֶת הֶ/חָרָבָֽה־־־־׃
translation:
  text: 'For this is what Yahweh of Armies says: Yet once more, in a little while, I will shake the heavens and the earth and the sea and the dry land.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the LORD of hosts.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew is compressed: ''Yet once more, it is a little while''; the sense is that after a short time the LORD will shake all creation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of hosts
  lexicon: HALOT
  rationale: Translated rather than left in traditional ecclesiastical form. 'Armies' communicates the concrete sense of צבאות more transparently for modern readers while preserving the title's force.
- source_word: כִּי כֹה אָמַר
  chosen: For this is what ... says
  alternatives:
  - For thus says ...
  - Because thus said ...
  lexicon: HALOT
  rationale: A standard prophetic messenger formula. 'This is what ... says' is natural modern English and preserves the formulaic introduction without archaic diction.
- source_word: עוֹד אַחַת מְעַט הִיא
  chosen: Yet once more, in a little while
  alternatives:
  - Once more, it is a little while
  - One more time, in a little while
  - Yet once, it is but a little while
  lexicon: HALOT
  rationale: 'The Hebrew is compressed and somewhat awkward literally (''yet one [time], little it is''). The chosen rendering captures both elements: repetition/finality (''yet once more'') and imminence (''in a little while''). This also fits the clause''s prophetic cadence in idiomatic English.'
- source_word: מַרְעִישׁ
  chosen: I will shake
  alternatives:
  - I am about to shake
  - I am shaking
  - I will cause to quake
  lexicon: HALOT
  rationale: The Hiphil participle with waw plus independent pronoun in prophetic discourse often has imminent/future force. 'I will shake' is the clearest English rendering in context, expressing divine future action without over-specifying aspect.
- source_word: הַשָּׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the skies
  lexicon: HALOT
  rationale: The Hebrew plural is best preserved by 'the heavens,' especially in a cosmic judgment/salvation context.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In this cosmic list paired with 'the heavens,' the global/cosmic sense 'earth' is preferable to the more local 'land.'
- source_word: הַיָּם
  chosen: the sea
  lexicon: HALOT
  rationale: Straightforward lexical rendering within the sequence of cosmic realms.
- source_word: הֶחָרָבָה
  chosen: the dry land
  alternatives:
  - the dry ground
  - the wilderness
  lexicon: HALOT
  rationale: In contrast with 'the sea,' the term denotes dry land rather than specifically wilderness here. 'Dry land' preserves the creation-echo and the sea/land pairing.
