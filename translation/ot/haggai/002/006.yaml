theological_decisions:
- issue: Rendering the divine title יְהוָה צְבָאוֹת
  chosen_reading: Yahweh of Armies
  alternative_readings:
  - the LORD of hosts
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Temporal phrasing עוֹד אַחַת מְעַט הִיא
  chosen_reading: Yet once more, in a little while
  alternative_readings:
  - Yet once, it is a little while
  - One more time, after a little while
  rationale: The Hebrew phrase is syntactically compressed and can be represented more formally or more idiomatically. The chosen reading preserves both the 'once more' element and the short time reference, without importing later interpretive conclusions from Hebrews 12.
