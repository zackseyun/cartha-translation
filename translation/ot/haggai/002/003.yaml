id: HAG.2.3
reference: Haggai 2:3
source:
  edition: WLC
  text: מִ֤י בָ/כֶם֙ הַ/נִּשְׁאָ֔ר אֲשֶׁ֤ר רָאָה֙ אֶת הַ/בַּ֣יִת הַ/זֶּ֔ה בִּ/כְבוֹד֖/וֹ
    הָ/רִאשׁ֑וֹן וּ/מָ֨ה אַתֶּ֜ם רֹאִ֤ים אֹת/וֹ֙ עַ֔תָּה הֲ/ל֥וֹא כָמֹ֛/הוּ כְּ/אַ֖יִן
    בְּ/עֵינֵי/כֶֽם־׃
translation:
  text: Who among you is left who saw this house in its former glory? And how do you
    see it now? Is it not as nothing in your eyes?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this temple.' The Hebrew literally says 'this house,' a common way to
      refer to the temple.
    reason: lexical_alternative
  - marker: b
    text: Or 'in its first glory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי בָכֶם הַנִּשְׁאָר
  chosen: Who among you is left
  alternatives:
  - Who among you remains
  - Who is left among you
  lexicon: HALOT
  rationale: The phrase asks which members of the audience remain from an earlier
    generation. 'Is left' is natural English and preserves the remnant/survivor sense
    of the Niphal participle without overinterpreting it as merely 'still alive.'
- source_word: אֲשֶׁר רָאָה
  chosen: who saw
  alternatives:
  - who has seen
  lexicon: HALOT
  rationale: 'The qatal verb refers to a completed past event: seeing the earlier
    temple. Simple past is the most natural English equivalent here.'
- source_word: הַבַּיִת הַזֶּה
  chosen: this house
  alternatives:
  - this temple
  lexicon: HALOT
  rationale: Hebrew 'house' is the literal term and commonly refers to the temple
    in this context. 'House' preserves the source wording while remaining intelligible.
- source_word: בִּכְבוֹדוֹ הָרִאשׁוֹן
  chosen: in its former glory
  alternatives:
  - in its first glory
  - in its earlier splendor
  lexicon: HALOT
  rationale: The suffix refers back to the house. 'Former glory' communicates both
    the temporal contrast and the honor/splendor sense of כבוד in context. 'First
    glory' is more literal but less idiomatic in English.
- source_word: וּמָה אַתֶּם רֹאִים אֹתוֹ עַתָּה
  chosen: And how do you see it now?
  alternatives:
  - And what do you see now?
  - And how does it look to you now?
  lexicon: HALOT
  rationale: Although literally 'and what are you seeing it now,' the idiom is evaluative,
    asking for their assessment of the present temple. 'How do you see it now?' preserves
    the directness and evaluative force better than a purely visual 'what do you see
    now?'.
- source_word: הֲלוֹא
  chosen: Is it not
  alternatives:
  - Surely it is not
  - Does it not
  lexicon: HALOT
  rationale: This particle introduces a rhetorical question expecting agreement. 'Is
    it not' is a straightforward English equivalent.
- source_word: כָמֹהוּ כְּאַיִן
  chosen: as nothing
  alternatives:
  - like nothing
  - as though it were nothing
  - as nothingness
  lexicon: HALOT
  rationale: The comparison expresses extreme insignificance by comparison with the
    former temple. 'As nothing' is concise, idiomatic, and preserves the rhetorical
    force.
- source_word: בְּעֵינֵיכֶם
  chosen: in your eyes
  alternatives:
  - in your sight
  - to you
  lexicon: HALOT
  rationale: This Hebrew idiom refers to their estimation or perception. 'In your
    eyes' keeps the metaphor and is clear in English.
