id: OBA.1.19
reference: Obadiah 1:19
source:
  edition: WLC
  text: וְ/יָרְשׁ֨וּ הַ/נֶּ֜גֶב אֶת הַ֣ר עֵשָׂ֗ו וְ/הַ/שְּׁפֵלָה֙ אֶת פְּלִשְׁתִּ֔ים
    וְ/יָרְשׁוּ֙ אֶת שְׂדֵ֣ה אֶפְרַ֔יִם וְ/אֵ֖ת שְׂדֵ֣ה שֹׁמְר֑וֹן וּ/בִנְיָמִ֖ן אֶת
    הַ/גִּלְעָֽד־־־־׃
translation:
  text: Those of the Negev will possess the hill country of Esau, and those of the
    Shephelah the land of the Philistines; they will also possess the territory of
    Ephraim and the territory of Samaria, and Benjamin will possess Gilead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the Philistines'; the translation renders the territorial sense
      explicitly as 'the land of the Philistines.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will inherit' throughout; the Hebrew verb can denote inheriting or taking
      possession of land.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָרְשׁוּ
  chosen: will possess
  alternatives:
  - will inherit
  - will take possession of
  lexicon: HALOT
  rationale: ירשׁ commonly denotes coming into possession of land, whether by inheritance
    or conquest. In this territorial context, 'will possess' is natural English and
    broad enough to preserve both nuances without over-specifying.
- source_word: הַנֶּגֶב
  chosen: those of the Negev
  alternatives:
  - the Negev
  - the south
  lexicon: HALOT
  rationale: The noun can denote the southern region, but here it stands for the people/settlers
    of that region who are the implied subject of 'will possess.' 'Those of the Negev'
    makes the metonymy explicit while preserving the geographic name rather than flattening
    it to 'the south'.
- source_word: הַר עֵשָׂו
  chosen: the hill country of Esau
  alternatives:
  - Mount Esau
  - the mountains of Esau
  lexicon: HALOT
  rationale: הַר in territorial expressions often means hill country or mountainous
    region, not a single peak. 'Hill country of Esau' best conveys the regional sense,
    referring to Edom's mountainous territory.
- source_word: הַשְּׁפֵלָה
  chosen: those of the Shephelah
  alternatives:
  - the lowland
  - those of the lowland
  lexicon: HALOT
  rationale: Like 'the Negev,' this geographic term functions metonymically for the
    inhabitants of the region. 'Shephelah' preserves the established Judean regional
    name; 'those of the Shephelah' makes the implied subject explicit.
- source_word: פְּלִשְׁתִּים
  chosen: the land of the Philistines
  alternatives:
  - Philistia
  - the Philistines
  lexicon: HALOT
  rationale: The object of possession is territorial, not personal. Although the Hebrew
    uses the ethnonym 'Philistines,' English idiom is clearer with 'the land of the
    Philistines.' 'Philistia' is possible but less transparent for many readers.
- source_word: שְׂדֵה אֶפְרַיִם
  chosen: the territory of Ephraim
  alternatives:
  - the field of Ephraim
  - the countryside of Ephraim
  lexicon: HALOT
  rationale: שָׂדֶה literally means 'field,' but in territorial formulas it can denote
    open country or region. 'Territory of Ephraim' communicates the geographic-political
    sense more clearly in English.
- source_word: שְׂדֵה שֹׁמְרוֹן
  chosen: the territory of Samaria
  alternatives:
  - the field of Samaria
  - the countryside of Samaria
  lexicon: HALOT
  rationale: As with 'territory of Ephraim,' the phrase refers to the region associated
    with Samaria, not a single field. 'Territory' best fits the land-possession context.
- source_word: בִנְיָמִן
  chosen: Benjamin
  alternatives:
  - those of Benjamin
  - the tribe of Benjamin
  lexicon: HALOT
  rationale: The tribal name stands for the tribe/people of Benjamin. Retaining 'Benjamin'
    is concise and idiomatic, with the collective sense readily understood from context.
- source_word: הַגִּלְעָד
  chosen: Gilead
  alternatives:
  - the Gilead
  - the hill country of Gilead
  lexicon: HALOT
  rationale: As a proper regional name, 'Gilead' is the standard English form. The
    article in Hebrew is normal for some place names and need not be reproduced in
    English.
