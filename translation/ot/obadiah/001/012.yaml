theological_decisions:
- issue: Familial language for Edom and Judah
  chosen_reading: your brother
  alternative_readings:
  - your kinsman
  rationale: The verse condemns Edom's conduct toward Judah by invoking brotherhood.
    Retaining 'brother' preserves the moral force of betrayal within kinship and should
    not be generalized away.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
