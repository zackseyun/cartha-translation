id: OBA.1.7
reference: Obadiah 1:7
source:
  edition: WLC
  text: עַֽד הַ/גְּב֣וּל שִׁלְּח֗וּ/ךָ כֹּ֚ל אַנְשֵׁ֣י בְרִיתֶ֔/ךָ הִשִּׁיא֛וּ/ךָ
    יָכְל֥וּ לְ/ךָ֖ אַנְשֵׁ֣י שְׁלֹמֶ֑/ךָ לַחְמְ/ךָ֗ יָשִׂ֤ימוּ מָזוֹר֙ תַּחְתֶּ֔י/ךָ
    אֵ֥ין תְּבוּנָ֖ה בּֽ/וֹ־׃
translation:
  text: All the men of your covenant have sent you to the border; the men at peace
    with you have deceived you and overpowered you. Those who eat your bread have
    set a trap under you—there is no understanding in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have driven you out to the border' or 'have escorted you to the border.'
      The Hebrew verb can carry either a neutral or hostile nuance in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'lay a snare beneath you.' The Hebrew word rendered 'trap' is rare and
      its precise nuance is uncertain.
    reason: lexical_alternative
  - marker: c
    text: Or 'there is no discernment in him,' possibly referring to Edom; some understand
      'in it' or take the line differently because the Hebrew referent is ambiguous.
    reason: alternative_reading
lexical_decisions:
- source_word: עַד הַגְּבוּל
  chosen: to the border
  alternatives:
  - as far as the border
  - to the frontier
  lexicon: HALOT
  rationale: The phrase marks the destination to which Edom is driven or escorted.
    'To the border' is idiomatic and preserves the concrete spatial image without
    overinterpreting whether this is expulsion or mere accompaniment.
- source_word: שִׁלְּחוּךָ
  chosen: have sent you
  alternatives:
  - have driven you out
  - have escorted you away
  lexicon: HALOT
  rationale: The piel of שלח can mean send away/dispatch. 'Have sent you' keeps the
    Hebrew broad enough; the hostile sense is supplied by context. Stronger options
    like 'driven you out' are plausible but somewhat interpretive, so preserved as
    alternatives.
- source_word: אַנְשֵׁי בְרִיתֶךָ
  chosen: the men of your covenant
  alternatives:
  - your allies
  - the men bound to you by treaty
  lexicon: HALOT
  rationale: Literally 'men of your covenant.' This preserves the covenant/treaty
    language rather than flattening it to 'allies,' while remaining understandable
    in English.
- source_word: הִשִּׁיאוּךָ
  chosen: have deceived you
  alternatives:
  - have misled you
  - have enticed you
  lexicon: HALOT
  rationale: The hiphil of נשׁא here carries the sense of causing someone to be deceived
    or led astray. 'Have deceived you' is the clearest English equivalent in this
    hostile political context.
- source_word: יָכְלוּ לְךָ
  chosen: have overpowered you
  alternatives:
  - have prevailed against you
  - have overcome you
  lexicon: HALOT
  rationale: The idiom יכל ל can mean to prevail against or overcome someone. 'Have
    overpowered you' communicates the adversative force clearly in modern English.
- source_word: אַנְשֵׁי שְׁלֹמֶךָ
  chosen: the men at peace with you
  alternatives:
  - your friends
  - your peaceful allies
  lexicon: HALOT
  rationale: Literally 'men of your peace.' This likely refers to those in peaceful
    relations with Edom. The chosen rendering preserves the relational nuance without
    reducing it to mere friendship.
- source_word: לַחְמְךָ
  chosen: your bread
  alternatives:
  - your food
  - your table
  lexicon: HALOT
  rationale: Retaining 'bread' preserves the Hebrew image of table fellowship and
    covenant loyalty. More interpretive renderings are possible but less transparent.
- source_word: יָשִׂימוּ מָזוֹר תַּחְתֶּיךָ
  chosen: have set a trap under you
  alternatives:
  - lay a snare beneath you
  - set an ambush under you
  lexicon: HALOT
  rationale: מָזוֹר is difficult and can denote a snare/trap. 'Have set a trap under
    you' fits the betrayal context and yields natural English. Because the noun is
    somewhat uncertain, alternatives are preserved in a footnote.
- source_word: אֵין תְּבוּנָה בּוֹ
  chosen: there is no understanding in him
  alternatives:
  - there is no discernment in him
  - he has no understanding
  - there is no understanding in it
  lexicon: HALOT
  rationale: 'The Hebrew is terse and the referent of ''in him'' is debated: Edom,
    the betrayed one, or possibly the situation. The masculine singular suffix most
    naturally yields ''in him.'' The line likely comments on Edom''s lack of discernment
    in the face of betrayal, but the ambiguity is preserved as much as possible.'
