theological_decisions:
- issue: Shift between second-person address and third-person suffixes/participles
    in the verse
  chosen_reading: 'Render the descriptive clauses in direct address to Edom: ''you
    who dwell ... whose dwelling ... who say in your heart'''
  alternative_readings:
  - 'Preserve the third-person forms more literally: ''he who dwells ... his dwelling
    ... who says in his heart'''
  rationale: The verse begins and ends with direct second-person address, and the
    third-person forms are best understood as descriptive apposition within a collective
    address to Edom. Rendering them in direct address avoids awkward English while
    preserving the prophetic force.
