id: OBA.1.3
reference: Obadiah 1:3
source:
  edition: WLC
  text: זְד֤וֹן לִבְּ/ךָ֙ הִשִּׁיאֶ֔/ךָ שֹׁכְנִ֥י בְ/חַגְוֵי סֶּ֖לַע מְר֣וֹם שִׁבְתּ֑/וֹ
    אֹמֵ֣ר בְּ/לִבּ֔/וֹ מִ֥י יוֹרִדֵ֖/נִי אָֽרֶץ־׃
translation:
  text: The pride of your heart has deceived you, you who dwell in the clefts of the
    rock, whose dwelling is on high, who say in your heart, “Who will bring me down
    to the ground?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'arrogance' or 'presumption' for 'pride.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the fissures of the rock.' The phrase evokes rocky strongholds and
      defensible cliff dwellings.
    reason: cultural_note
  - marker: c
    text: Or 'to the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זְדוֹן
  chosen: pride
  alternatives:
  - arrogance
  - presumption
  - insolence
  lexicon: HALOT
  rationale: The noun denotes proud arrogance or presumptuous self-exaltation. 'Pride'
    is the most natural English rendering here and fits the prophetic accusation directed
    at Edom.
- source_word: לִבְּךָ
  chosen: your heart
  lexicon: HALOT
  rationale: Hebrew 'heart' commonly denotes the inner self, mind, and will. Retaining
    'heart' preserves the Hebrew idiom and the verse's emphasis on inward arrogance.
- source_word: הִשִּׁיאֶךָ
  chosen: has deceived you
  alternatives:
  - has misled you
  - has beguiled you
  lexicon: HALOT
  rationale: The Hiphil of נשׁא here carries the sense of leading astray or deceiving.
    'Has deceived you' is clear, idiomatic, and reflects the completed action.
- source_word: שֹׁכְנִי
  chosen: you who dwell
  alternatives:
  - dwelling
  - inhabiting
  lexicon: HALOT
  rationale: Although formally a participle, in context it functions vocatively/appositionally,
    describing the addressee. 'You who dwell' makes the address explicit in natural
    English.
- source_word: בְחַגְוֵי סֶּלַע
  chosen: in the clefts of the rock
  alternatives:
  - in the refuges of the crag
  - in the fissures of the rock
  lexicon: HALOT
  rationale: חגוי refers to clefts, recesses, or hiding places. 'Clefts of the rock'
    is both vivid and idiomatic, likely evoking Edom's rocky strongholds.
- source_word: מְרוֹם שִׁבְתּוֹ
  chosen: whose dwelling is on high
  alternatives:
  - the height of his dwelling
  - his habitation is lofty
  lexicon: HALOT
  rationale: The phrase describes the elevated location of the addressee's habitation.
    Rendering it relatively ('whose dwelling is on high') integrates smoothly with
    the preceding participial description while preserving the sense of inaccessible
    height.
- source_word: אֹמֵר בְּלִבּוֹ
  chosen: who say in your heart
  alternatives:
  - saying in your heart
  - who says in his heart
  lexicon: HALOT
  rationale: The Hebrew shifts to a singular participle with a 3ms suffix, but the
    verse addresses Edom directly in the second person. Rendering with second person
    maintains the discourse coherence and reflects the collective singular address.
- source_word: מִי יוֹרִדֵנִי
  chosen: Who will bring me down
  alternatives:
  - Who will cast me down
  - Who will bring me down from there
  lexicon: HALOT
  rationale: The Hiphil of ירד means to cause to go down. 'Bring me down' is idiomatic
    and preserves the taunting confidence of the speaker.
- source_word: אָרֶץ
  chosen: to the ground
  alternatives:
  - to the earth
  - to the land
  lexicon: HALOT
  rationale: Here אֶרֶץ contrasts with the lofty dwelling place and refers to being
    brought low. 'To the ground' best conveys the vertical contrast in natural English.
