theological_decisions:
- issue: Potential theological nuance of שְׂרִידָיו
  chosen_reading: Rendered as 'his survivors' rather than 'his remnant.'
  alternative_readings:
  - his remnant
  rationale: Although 'remnant' can be a valid lexical option, in prophetic literature
    it may evoke a technical theological motif of a preserved faithful remnant. Here
    the verse is condemning Edom for betraying escaping Judahites; the immediate sense
    is simply those who survived the attack. The translation avoids importing a theological
    nuance not required by the context.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve theological tension rather than resolve it.'
