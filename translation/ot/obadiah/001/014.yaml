id: OBA.1.14
reference: Obadiah 1:14
source:
  edition: WLC
  text: וְ/אַֽל תַּעֲמֹד֙ עַל הַ/פֶּ֔רֶק לְ/הַכְרִ֖ית אֶת פְּלִיטָ֑י/ו וְ/אַל תַּסְגֵּ֥ר
    שְׂרִידָ֖י/ו בְּ/י֥וֹם צָרָֽה־־־־׃
translation:
  text: Do not stand at the crossroads to cut off his fugitives, and do not hand over
    his survivors in the day of distress.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the fork of the road' or 'at the mountain pass.' The Hebrew term
      refers to a place where fugitives could be intercepted.
    reason: lexical_alternative
  - marker: b
    text: Or 'deliver up' or 'surrender.' The Hebrew verb is literally 'shut/close,'
      here used in the sense of giving people over to an enemy.
    reason: lexical_alternative
  - marker: c
    text: Or 'his remnant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּעֲמֹד
  chosen: stand
  alternatives:
  - take your stand
  - stand by
  lexicon: HALOT
  rationale: The verb עמד literally means 'stand' or 'take one's stand.' In this prohibition,
    'stand' preserves the concrete image of positioning oneself to intercept escapees.
- source_word: הַפֶּרֶק
  chosen: the crossroads
  alternatives:
  - the fork of the road
  - the mountain pass
  - the place of breaking
  lexicon: HALOT
  rationale: פֶּרֶק here denotes a place where routes divide or where fugitives can
    be intercepted. 'Crossroads' is idiomatic modern English and fits the military/ambush
    context better than the more opaque 'fork' or a speculative topographical term
    like 'mountain pass.'
- source_word: לְהַכְרִית
  chosen: to cut off
  alternatives:
  - to destroy
  - to wipe out
  lexicon: HALOT
  rationale: כרת often means 'cut off,' including in contexts of eliminating persons.
    'Cut off' preserves the Hebrew imagery and suits the context of intercepting fugitives;
    'destroy' is possible but less specific.
- source_word: פְּלִיטָיו
  chosen: his fugitives
  alternatives:
  - his escapees
  - those of his who escaped
  lexicon: HALOT
  rationale: פליט refers to one who has escaped or fled. 'Fugitives' best captures
    people fleeing disaster and being pursued, while remaining concise and natural
    in English.
- source_word: תַּסְגֵּר
  chosen: hand over
  alternatives:
  - deliver up
  - shut in
  - surrender
  lexicon: HALOT
  rationale: סגר literally means 'shut/close,' but in this context it carries the
    sense of giving people over into an enemy's power. 'Hand over' communicates the
    idiomatic force clearly in modern English.
- source_word: שְׂרִידָיו
  chosen: his survivors
  alternatives:
  - his remnant
  - those remaining of his
  lexicon: HALOT
  rationale: שרד denotes those left over after catastrophe. 'Survivors' is the clearest
    contextual rendering here. 'Remnant' is possible, but in English it can carry
    theological overtones not demanded by this immediate judgment context.
- source_word: בְּיוֹם צָרָה
  chosen: in the day of distress
  alternatives:
  - in the day of trouble
  - on the day of calamity
  lexicon: HALOT
  rationale: The phrase is temporal and idiomatic. 'Day of distress' preserves the
    gravity of צרה while remaining readable. 'Trouble' is slightly weaker; 'calamity'
    is possible but overlaps with nearby disaster language in the passage.
