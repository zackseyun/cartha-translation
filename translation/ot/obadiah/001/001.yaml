id: OBA.1.1
reference: Obadiah 1:1
source:
  edition: WLC
  text: חֲז֖וֹן עֹֽבַדְיָ֑ה כֹּֽה אָמַר֩ אֲדֹנָ֨/י יְהוִ֜ה לֶ/אֱד֗וֹם שְׁמוּעָ֨ה שָׁמַ֜עְנוּ מֵ/אֵ֤ת יְהוָה֙ וְ/צִיר֙ בַּ/גּוֹיִ֣ם שֻׁלָּ֔ח ק֛וּמוּ וְ/נָק֥וּמָה עָלֶי/הָ לַ/מִּלְחָמָֽה־׃
translation:
  text: 'The vision of Obadiah. Thus says the Lord GOD concerning Edom: We have heard a report from Yahweh, and a messenger has been sent among the nations: “Rise up, and let us rise against her for battle.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an envoy' or 'an ambassador' for 'a messenger.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'against her,' referring to Edom as a nation; English could also render 'against it.'
    reason: lexical_alternative
  - marker: c
    text: The identity of 'we' and 'let us' is not specified in the Hebrew and may be understood in more than one way.
    reason: alternative_reading
lexical_decisions:
- source_word: חֲזוֹן
  chosen: vision
  alternatives:
  - oracle
  - revelation
  lexicon: HALOT
  rationale: The noun commonly denotes a prophetic vision or revelatory sight. 'Vision' is the most direct and conventional rendering here, fitting a prophetic superscription without over-interpreting the mode of revelation.
- source_word: עֹבַדְיָה
  chosen: Obadiah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention per project philosophy.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus said
  lexicon: HALOT
  rationale: Standard prophetic formula. Present-tense English idiom ('Thus says') best reflects the formulaic force in readable modern English.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord GOD
  - the Lord Yahweh
  lexicon: HALOT
  rationale: The compound title combines אֲדֹנָי with the divine name. English convention renders this as 'the Lord GOD' to distinguish it from simple 'the LORD.' 'Yahweh' is avoided because the doctrine specifies YHWH defaults to 'the LORD.' Small caps cannot be represented in plain text function output, so 'GOD' signals the underlying YHWH in this title.
- source_word: לֶאֱדוֹם
  chosen: concerning Edom
  alternatives:
  - to Edom
  - against Edom
  lexicon: HALOT
  rationale: The preposition ל here introduces the subject matter of the oracle rather than direct address. 'Concerning Edom' best fits prophetic superscription usage.
- source_word: שְׁמוּעָה
  chosen: report
  alternatives:
  - news
  - message
  - rumor
  lexicon: HALOT
  rationale: The noun denotes something heard, a report or tidings. 'Report' is suitably neutral and formal enough for prophetic diction without implying uncertainty as strongly as 'rumor.'
- source_word: שָׁמַעְנוּ
  chosen: we have heard
  alternatives:
  - we heard
  lexicon: HALOT
  rationale: The perfect can be rendered as a present-result perfect in English. 'We have heard' preserves the immediacy of received revelation and matches the discourse flow into the quoted summons.
- source_word: מֵאֵת יְהוָה
  chosen: from the LORD
  alternatives:
  - from Yahweh
  lexicon: HALOT
  rationale: Source of the report is explicitly YHWH. Per doctrine, YHWH is rendered 'the LORD.'
- source_word: וְצִיר
  chosen: and a messenger
  alternatives:
  - and an envoy
  - and an ambassador
  lexicon: HALOT
  rationale: The term can denote an envoy or messenger. 'Messenger' is broad and natural; 'ambassador' may sound overly formal or diplomatic in modern English, though the international context remains clear from the following phrase.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  - among the peoples
  lexicon: HALOT
  rationale: In prophetic literature גוים commonly refers to the nations/peoples. 'Among the nations' is the clearest and least misleading in this geopolitical context.
- source_word: שֻׁלָּח
  chosen: has been sent
  alternatives:
  - was sent
  - is sent
  lexicon: HALOT
  rationale: Passive perfect. 'Has been sent' works well with the preceding 'we have heard' and preserves the sense of a completed commissioning with present relevance.
- source_word: קוּמוּ
  chosen: Rise up
  alternatives:
  - Arise
  - Get up
  lexicon: HALOT
  rationale: Imperative plural in a martial summons. 'Rise up' is idiomatic, forceful, and suitably elevated without sounding archaic.
- source_word: וְנָקוּמָה
  chosen: and let us rise
  alternatives:
  - and let us arise
  - and we will rise
  lexicon: HALOT
  rationale: First common plural cohortative expressing exhortation/joined resolve. 'Let us rise' captures the hortatory force better than a simple future.
- source_word: עָלֶיהָ
  chosen: against her
  alternatives:
  - against it
  lexicon: HALOT
  rationale: The pronominal suffix is feminine singular, likely referring to Edom as a nation/entity, which Hebrew can construe as feminine. 'Her' preserves the grammatical form more closely than 'it,' while remaining intelligible in English prophetic style.
- source_word: לַמִּלְחָמָה
  chosen: for battle
  alternatives:
  - for war
  - to battle
  lexicon: HALOT
  rationale: The phrase marks purpose or sphere of action. 'For battle' is concise and natural in English; 'for war' is possible but slightly broader and less immediate in this summons.
