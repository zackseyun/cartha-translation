theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Referent of the first person plural in 'we have heard' / 'let us rise'
  chosen_reading: retain the Hebrew first-person plurals without specifying the speakers
  alternative_readings:
  - prophetic editorial 'we'
  - heavenly council speech
  - collective nations' speech
  rationale: The Hebrew leaves the identity of the plural speakers implicit. To preserve theological and literary ambiguity, the translation keeps the plurals rather than resolving them interpretively.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
