id: OBA.1.9
reference: Obadiah 1:9
source:
  edition: WLC
  text: וְ/חַתּ֥וּ גִבּוֹרֶ֖י/ךָ תֵּימָ֑ן לְמַ֧עַן יִכָּֽרֶת אִ֛ישׁ מֵ/הַ֥ר עֵשָׂ֖ו
    מִ/קָּֽטֶל־׃
translation:
  text: And your mighty men, Teman, will be shattered, so that every man from the
    mountain of Esau may be cut off by slaughter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be dismayed' or 'will be terrified.' The Hebrew verb can emphasize
      panic as well as ruin.
    reason: lexical_alternative
  - marker: b
    text: Teman was a region or city of Edom; the name is related to 'south.'
    reason: cultural_note
  - marker: c
    text: Or 'everyone from the mountain of Esau will be cut off in the slaughter.'
      The final phrase may be taken with slightly different nuance.
    reason: alternative_reading
lexical_decisions:
- source_word: וְחַתּוּ
  chosen: will be shattered
  alternatives:
  - will be dismayed
  - will be terrified
  - will be broken
  lexicon: HALOT
  rationale: From חתת in the passive/resultative sense. In context of military collapse,
    'will be shattered' conveys both fear and ruin better than the narrower emotional
    'dismayed.' Future English fits the prophetic announcement.
- source_word: גִבּוֹרֶיךָ
  chosen: your mighty men
  alternatives:
  - your warriors
  - your heroes
  lexicon: HALOT
  rationale: גבור often denotes strong fighting men or warriors. 'Mighty men' preserves
    the lexical force and traditional military sense without over-paraphrasing.
- source_word: תֵּימָן
  chosen: Teman
  alternatives:
  - the south
  lexicon: HALOT
  rationale: Here the term functions as a proper name, likely the Edomite region/city
    Teman, so it should be transliterated rather than translated. The appositional
    use after 'your mighty men' addresses Edom through its notable locale.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - to the end that
  lexicon: HALOT
  rationale: '''So that'' gives the purposive/resultative connection in natural modern
    English while remaining close to the Hebrew syntax.'
- source_word: יִכָּרֶת
  chosen: may be cut off
  alternatives:
  - will be cut off
  - may be destroyed
  lexicon: HALOT
  rationale: כרת in the Niphal commonly means 'be cut off.' The modal 'may be' reflects
    the dependency on לְמַעַן after the preceding clause, preserving the Hebrew flow.
- source_word: אִישׁ
  chosen: every man
  alternatives:
  - everyone
  - each one
  lexicon: HALOT
  rationale: The singular noun after the purpose clause has distributive force. Per
    the project's gender-accurate policy, 'every man' preserves the masculine singular
    form better than the gender-neutral 'everyone.'
- source_word: מֵהַר עֵשָׂו
  chosen: from the mountain of Esau
  alternatives:
  - from Mount Esau
  - from the hill country of Esau
  lexicon: HALOT
  rationale: The construct phrase is rendered straightforwardly. 'Mountain of Esau'
    preserves the singular Hebrew and the territorial sense associated with Edom;
    'Mount Esau' is possible but less transparent.
- source_word: מִקָּטֶל
  chosen: by slaughter
  alternatives:
  - by carnage
  - because of slaughter
  - in the massacre
  lexicon: HALOT
  rationale: The prefixed מ likely indicates means or attendant circumstance here.
    'By slaughter' is concise and preserves the grim instrument/result sense without
    over-interpreting the syntax.
