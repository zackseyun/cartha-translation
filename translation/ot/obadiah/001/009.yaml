theological_decisions:
- issue: Gendered singular אִישׁ in a collective judgment oracle
  chosen_reading: every man
  alternative_readings:
  - everyone
  - each person
  rationale: The Hebrew is grammatically masculine singular with distributive force.
    Following the project's gender-accurate policy, the translation keeps 'man' rather
    than neutralizing it, since the source form is part of the rhetoric of total male
    military loss in Edom.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Proper-name treatment of תֵּימָן
  chosen_reading: Teman
  alternative_readings:
  - south
  rationale: The project directs translators to transliterate names. Although the
    root can mean 'south,' in this prophetic context it functions as the Edomite place
    name Teman.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 2
