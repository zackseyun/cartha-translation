theological_decisions:
- issue: Rendering plural human agents מוֹשִׁעִים in a context of divine kingship
  chosen_reading: Deliverers
  alternative_readings:
  - Saviors
  rationale: The verse speaks of plural agents whom God uses, followed by the climactic statement that the kingdom belongs to the LORD. Rendering the term as 'Deliverers' preserves the human instrumental role without implying rivalry with God's unique saving sovereignty.
  doctrine_reference: Affirmations; Translation philosophy §1, §6
- issue: Meaning of הַמְּלוּכָה in the final clause
  chosen_reading: the kingdom will belong to the LORD
  alternative_readings:
  - the kingship will be the LORD's
  - the dominion will be the LORD's
  rationale: The Hebrew can denote either the realm or the exercise of royal rule. 'The kingdom' is retained in the main text as the most idiomatic and traditional English expression, while the broader sense of royal dominion is preserved in a footnote to avoid over-resolving the nuance.
  doctrine_reference: Translation philosophy §3, §6
