id: OBA.1.21
reference: Obadiah 1:21
source:
  edition: WLC
  text: וְ/עָל֤וּ מֽוֹשִׁעִים֙ בְּ/הַ֣ר צִיּ֔וֹן לִ/שְׁפֹּ֖ט אֶת הַ֣ר עֵשָׂ֑ו וְ/הָיְתָ֥ה לַֽ/יהוָ֖ה הַ/מְּלוּכָֽה־׃
translation:
  text: Deliverers will go up on Mount Zion to judge the hill country of Esau, and the kingdom will belong to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Saviors.' The Hebrew term refers here to agents who bring deliverance, not to a denial that ultimate salvation belongs to the LORD.
    reason: lexical_alternative
  - marker: b
    text: Or 'Mount Esau' or 'the mountain of Esau'; the phrase likely refers to the mountainous territory of Edom.
    reason: lexical_alternative
  - marker: c
    text: Or 'the kingship' or 'the dominion will be the LORD's.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָלוּ
  chosen: will go up
  alternatives:
  - shall ascend
  - and they will go up
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic sequence is naturally rendered as a future in English. 'Go up' preserves the concrete ascent language tied to Zion rather than flattening it to a mere appearance.
- source_word: מוֹשִׁעִים
  chosen: Deliverers
  alternatives:
  - saviors
  - those who bring deliverance
  lexicon: HALOT
  rationale: The participial noun denotes agents of rescue/deliverance. 'Deliverers' is clear modern English and avoids possible confusion with the uniquely theological title 'Savior' while preserving the plural human agents in context.
- source_word: בְּהַר צִיּוֹן
  chosen: on Mount Zion
  alternatives:
  - upon Mount Zion
  - in Mount Zion
  lexicon: HALOT
  rationale: Standard idiomatic rendering for the location. 'Mount Zion' preserves the proper name and topographical sense.
- source_word: לִשְׁפֹּט
  chosen: to judge
  alternatives:
  - to govern
  - to rule
  lexicon: HALOT
  rationale: The infinitive of שפט most directly means 'to judge.' In this prophetic context it may include the exercise of rule, but 'judge' best preserves the lexical core without over-interpreting.
- source_word: אֶת הַר עֵשָׂו
  chosen: the hill country of Esau
  alternatives:
  - Mount Esau
  - the mountain of Esau
  lexicon: HALOT
  rationale: Hebrew הַר can denote a mountain region or hill country, not only a single peak. Since 'Esau' stands metonymically for Edom and its territory, 'hill country of Esau' communicates the regional sense more naturally in English.
- source_word: וְהָיְתָה
  chosen: and ... will belong
  alternatives:
  - and ... will be
  - and ... will become
  lexicon: HALOT
  rationale: 'With ל plus possessor (''to the LORD''), English idiom is best expressed as possession: ''will belong to.'' This reflects the Hebrew existential/copular construction without awkwardness.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD.' The preposition is retained in sense through 'belong to the LORD.'
- source_word: הַמְּלוּכָה
  chosen: the kingdom
  alternatives:
  - the kingship
  - the royal rule
  - the dominion
  lexicon: HALOT
  rationale: The noun denotes kingship/royal rule/kingdom. 'The kingdom' is the most natural English rendering here and captures the climactic declaration of the LORD's sovereign reign, while 'kingship' remains a viable lexical alternative.
