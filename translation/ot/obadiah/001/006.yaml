id: OBA.1.6
reference: Obadiah 1:6
source:
  edition: WLC
  text: אֵ֚יךְ נֶחְפְּשׂ֣וּ עֵשָׂ֔ו נִבְע֖וּ מַצְפֻּנָֽי/ו׃
translation:
  text: How Esau has been searched out! His hidden treasures have been sought out!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Esau here refers collectively to the people or land of Edom, Esau's descendants.
    reason: cross_reference
  - marker: b
    text: Or 'How Esau has been ransacked! His secret stores have been uncovered!'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיךְ
  chosen: How
  alternatives:
  - How greatly
  - Alas, how
  lexicon: HALOT
  rationale: Introduces an exclamatory statement of astonishment rather than a request
    for information. 'How' preserves the prophetic exclamation naturally in English.
- source_word: נֶחְפְּשׂוּ
  chosen: has been searched out
  alternatives:
  - has been ransacked
  - has been thoroughly searched
  lexicon: HALOT
  rationale: Niphal perfect plural from חפשׂ conveys being searched through or examined
    thoroughly. Singular English is used because 'Esau' functions as a collective/national
    name. 'Searched out' preserves the passive/resultative sense without over-paraphrasing.
- source_word: עֵשָׂו
  chosen: Esau
  alternatives:
  - Edom
  lexicon: HALOT
  rationale: The Hebrew text reads the personal name 'Esau,' which in Obadiah stands
    metonymically for Esau's descendants/Edom. Following the translation philosophy,
    names are transliterated rather than replaced by an interpretive equivalent in
    the main text.
- source_word: נִבְעוּ
  chosen: have been sought out
  alternatives:
  - have been uncovered
  - have been laid bare
  - have been searched out
  lexicon: HALOT
  rationale: Niphal perfect plural from בעה/related root conveys being searched out
    or exposed. 'Sought out' fits the context of invaders discovering concealed valuables
    and avoids flattening the distinction from the previous verb while retaining the
    parallelism.
- source_word: מַצְפֻּנָיו
  chosen: his hidden treasures
  alternatives:
  - his hidden things
  - his secret stores
  - his treasures
  lexicon: HALOT
  rationale: From a noun for hidden or stored things with 3ms suffix. In context it
    most naturally refers to concealed valuables or storehouses. 'Hidden treasures'
    communicates both concealment and value in idiomatic English.
