id: OBA.1.8
reference: Obadiah 1:8
source:
  edition: WLC
  text: הֲ/ל֛וֹא בַּ/יּ֥וֹם הַ/ה֖וּא נְאֻם יְהוָ֑ה וְ/הַאֲבַדְתִּ֤י חֲכָמִים֙ מֵֽ/אֱד֔וֹם
    וּ/תְבוּנָ֖ה מֵ/הַ֥ר עֵשָֽׂו־׃
translation:
  text: Will I not, on that day, declares the LORD, destroy the wise men from Edom,
    and understanding from the mountain of Esau?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from Mount Esau' or 'from the hill country of Esau.' The Hebrew literally
      reads 'from the mountain of Esau.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹוא
  chosen: Will I not
  alternatives:
  - Surely
  - Indeed
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. 'Will
    I not' preserves the interrogative force better than a flat asseveration like
    'surely.'
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Standard temporal idiom. 'On that day' is natural modern English while
    remaining close to the Hebrew expression.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: A prophetic formula marking divine utterance. 'Declares the LORD' is
    idiomatic, weighty, and widely understood. 'the LORD' follows the doctrinal default
    for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible practice.
- source_word: וְהַאֲבַדְתִּי
  chosen: destroy
  alternatives:
  - wipe out
  - cause to perish
  lexicon: HALOT
  rationale: Hiphil of אבד here expresses Yahweh's active removal of Edom's wisdom.
    'Destroy' is strong, direct, and fits the judgment context without over-paraphrasing.
- source_word: חֲכָמִים
  chosen: the wise men
  alternatives:
  - wise ones
  - wise people
  lexicon: HALOT
  rationale: Masculine plural noun referring to wise persons, likely the recognized
    wise class in Edom. 'Wise men' preserves the gendered/source form and the likely
    social category; 'wise people' would flatten the masculine form without contextual
    necessity.
- source_word: מֵאֱדוֹם
  chosen: from Edom
  alternatives:
  - out of Edom
  lexicon: HALOT
  rationale: The preposition marks source/removal. 'From Edom' is the most straightforward
    rendering in English.
- source_word: וּתְבוּנָה
  chosen: understanding
  alternatives:
  - discernment
  - insight
  lexicon: HALOT
  rationale: Refers to discernment or intelligence. 'Understanding' pairs well with
    'wise men' and preserves the abstract noun form.
- source_word: מֵהַר עֵשָׂו
  chosen: from the mountain of Esau
  alternatives:
  - from Mount Esau
  - from the hill country of Esau
  lexicon: HALOT
  rationale: Literally 'from the mountain of Esau.' Although it can denote the mountainous
    region associated with Esau/Edom, retaining 'mountain of Esau' preserves the Hebrew
    imagery and parallelism with 'Edom.'
