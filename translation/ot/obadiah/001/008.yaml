theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name in a prophetic judgment formula.
    Following the stated doctrinal policy, it is rendered 'the LORD' rather than transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gender rendering of חֲכָמִים
  chosen_reading: the wise men
  alternative_readings:
  - the wise
  - the wise people
  rationale: The Hebrew is grammatically masculine plural. In keeping with the gender-accurate
    policy, the translation preserves the masculine form rather than neutralizing
    it, since the context likely refers to Edom's recognized male wise class or representative
    leadership.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
