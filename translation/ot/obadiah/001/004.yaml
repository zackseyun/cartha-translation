id: OBA.1.4
reference: Obadiah 1:4
source:
  edition: WLC
  text: אִם תַּגְבִּ֣יהַּ כַּ/נֶּ֔שֶׁר וְ/אִם בֵּ֥ין כּֽוֹכָבִ֖ים שִׂ֣ים קִנֶּ֑/ךָ מִ/שָּׁ֥ם אוֹרִֽידְ/ךָ֖ נְאֻם יְהוָֽה־־־׃
translation:
  text: Though you soar high like the eagle, and though you set your nest among the stars, from there I will bring you down, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''If you rise high like an eagle ... if you place your nest among the stars.'' The Hebrew conditional particle can be rendered ''if,'' but here it carries a concessive force: even at the greatest height, the LORD will bring Edom down.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: Though
  alternatives:
  - If
  lexicon: HALOT
  rationale: 'Here אִם introduces a concessive condition in poetic-prophetic rhetoric rather than a simple hypothetical. ''Though'' better captures the sense: even if Edom exalts itself to the highest imaginable place, YHWH will still bring it down.'
- source_word: תַּגְבִּיהַּ
  chosen: you soar high
  alternatives:
  - you make high
  - you exalt yourself
  - you rise high
  lexicon: HALOT
  rationale: Hiphil of גבה means to make high/raise. In context with 'like the eagle,' an English verb of elevated flight communicates the image naturally while preserving the idea of height. 'Exalt yourself' is possible, but the immediate simile favors the spatial image.
- source_word: כַּנֶּשֶׁר
  chosen: like the eagle
  alternatives:
  - like an eagle
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'The eagle' reflects the Hebrew article and works idiomatically in English for a class image; 'an eagle' would also be acceptable but is less direct.
- source_word: וְאִם
  chosen: and though
  alternatives:
  - and if
  lexicon: HALOT
  rationale: As with the first אִם, the conjunction introduces a second concessive clause parallel to the first. 'And though' preserves the poetic buildup.
- source_word: בֵּין כּוֹכָבִים
  chosen: among the stars
  alternatives:
  - between the stars
  lexicon: HALOT
  rationale: בֵּין can mean 'between' or more broadly 'among.' With a plural collective like 'stars,' idiomatic English prefers 'among the stars' to express an impossibly lofty location.
- source_word: שִׂים
  chosen: you set
  alternatives:
  - you place
  - you put
  lexicon: HALOT
  rationale: Qal of שׂים is the common verb 'set/place/put.' 'Set' is concise and natural with 'nest.'
- source_word: קִנֶּךָ
  chosen: your nest
  lexicon: HALOT
  rationale: Literal rendering preserves the eagle imagery and the metaphor of secure habitation.
- source_word: מִשָּׁם
  chosen: from there
  lexicon: HALOT
  rationale: Retained literally to emphasize that even from the imagined highest refuge, YHWH can act.
- source_word: אוֹרִידְךָ
  chosen: I will bring you down
  alternatives:
  - I will cast you down
  - I will lower you
  lexicon: HALOT
  rationale: 'Hiphil of ירד here is causative: ''cause to go down.'' ''Bring you down'' is natural modern English and preserves the reversal motif. ''Cast you down'' is stronger but adds force not explicit in the verb itself.'
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This standard prophetic formula is best rendered in readable modern English as 'declares the LORD.' Per doctrine, יְהוָה is rendered 'the LORD,' not transliterated.
