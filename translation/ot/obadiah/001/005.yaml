id: OBA.1.5
reference: Obadiah 1:5
source:
  edition: WLC
  text: אִם גַּנָּבִ֤ים בָּאֽוּ לְ/ךָ֙ אִם שׁ֣וֹדְדֵי לַ֔יְלָה אֵ֣יךְ נִדְמֵ֔יתָה
    הֲ/ל֥וֹא יִגְנְב֖וּ דַּיָּ֑/ם אִם בֹּֽצְרִים֙ בָּ֣אוּ לָ֔/ךְ הֲ/ל֖וֹא יַשְׁאִ֥ירוּ
    עֹלֵלֽוֹת־־־־׃
translation:
  text: If thieves came to you, if robbers by night—how you have been destroyed!—would
    they not steal only enough for themselves? If grape gatherers came to you, would
    they not leave gleanings?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'how you are cut off' / 'how you have been ruined.' The Hebrew verb
      can be rendered in several closely related ways in this context of devastation.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'would they not steal their sufficiency?'—that is, only as much
      as was enough for them.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּנָּבִים
  chosen: thieves
  alternatives:
  - stealers
  lexicon: HALOT
  rationale: Common noun for those who steal; 'thieves' is the natural modern English
    equivalent.
- source_word: שֹׁדְדֵי לַיְלָה
  chosen: robbers by night
  alternatives:
  - night raiders
  - destroyers by night
  lexicon: HALOT
  rationale: The participle from שׁדד denotes violent plunderers; 'robbers by night'
    preserves both the predatory sense and the temporal phrase.
- source_word: אֵיךְ נִדְמֵיתָה
  chosen: how you have been destroyed
  alternatives:
  - how you are cut off
  - how you have been ruined
  lexicon: HALOT
  rationale: The Niphal of דמה here is best taken in the sense of being destroyed/ruined.
    The exclamatory אֵיךְ introduces a lament-like outcry. 'Destroyed' fits the context
    of Edom's devastation better than a more literal but less clear 'cut off.'
- source_word: הֲלוֹא יִגְנְבוּ דַּיָּם
  chosen: would they not steal only enough for themselves?
  alternatives:
  - would they not steal their fill?
  - would they not steal only what they needed?
  lexicon: HALOT
  rationale: דַּיָּם derives from דַּי, 'sufficiency/enough,' with pronominal suffix.
    The sense is that ordinary thieves take only as much as suffices for them, unlike
    the total devastation in view. 'Only enough for themselves' makes the idiom clear
    in modern English.
- source_word: בֹּצְרִים
  chosen: grape gatherers
  alternatives:
  - grape pickers
  - harvesters
  lexicon: HALOT
  rationale: Specifically refers to those gathering grapes at vintage time, not harvesters
    in general.
- source_word: יַשְׁאִירוּ עֹלֵלוֹת
  chosen: would they not leave gleanings?
  alternatives:
  - would they not leave a few grapes
  - would they not leave leftovers
  lexicon: HALOT
  rationale: עֹלֵלוֹת are the remaining grapes left after the main harvest, i.e.,
    gleanings. This preserves the agricultural image and its implication that even
    grape gatherers do not strip everything bare.
- source_word: לְךָ / לָךְ
  chosen: to you
  alternatives:
  - against you
  lexicon: HALOT
  rationale: The preposition ל with verbs of coming can be rendered 'to you.' In context
    it implies hostile arrival, but 'to you' is sufficient and avoids over-interpretation.
