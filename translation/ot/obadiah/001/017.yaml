id: OBA.1.17
reference: Obadiah 1:17
source:
  edition: WLC
  text: וּ/בְ/הַ֥ר צִיּ֛וֹן תִּהְיֶ֥ה פְלֵיטָ֖ה וְ/הָ֣יָה קֹ֑דֶשׁ וְ/יָֽרְשׁוּ֙ בֵּ֣ית
    יַֽעֲקֹ֔ב אֵ֖ת מוֹרָֽשֵׁי/הֶם׃
translation:
  text: But on Mount Zion there will be deliverance, and it will be holy, and the
    house of Jacob will possess their possessions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "there will be survivors"; the Hebrew noun can denote either deliverance/escape
      or those who escape.
    reason: lexical_alternative
  - marker: b
    text: Or "will inherit their inheritance."
    reason: lexical_alternative
  - marker: c
    text: Possibly, "the house of Jacob will dispossess those who dispossessed them,"
      if the final term is taken in an agentive sense.
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/בְ/הַר צִיּוֹן
  chosen: But on Mount Zion
  alternatives:
  - And on Mount Zion
  - Yet on Mount Zion
  lexicon: HALOT
  rationale: The prefixed conjunction can be rendered simply 'and,' but in context
    it marks a strong contrast with Edom's judgment in the preceding verse, so 'But'
    best conveys the discourse flow in natural English. 'Mount Zion' is the standard
    rendering of the place name phrase.
- source_word: תִּהְיֶה
  chosen: there will be
  alternatives:
  - shall be
  lexicon: HALOT
  rationale: Imperfect of היה here expresses future existence. 'There will be' is
    idiomatic with the following abstract noun in English.
- source_word: פְלֵיטָה
  chosen: deliverance
  alternatives:
  - escape
  - survivors
  - a remnant of escape
  lexicon: HALOT
  rationale: The noun can denote escape, deliverance, or the escaped/remnant. In this
    context, with 'there will be' and followed by restoration language, 'deliverance'
    best captures the state/reality present on Zion without over-specifying either
    the people or the act. Because 'survivors' is a viable alternative, it is preserved
    in a footnote.
- source_word: וְ/הָיָה קֹדֶשׁ
  chosen: and it will be holy
  alternatives:
  - and it will be holiness
  - and it will be a holy place
  lexicon: HALOT
  rationale: The masculine singular verb with קדש most naturally refers back to Mount
    Zion as the implied subject. 'Holy' is clearer modern English than the more abstract
    'holiness,' while preserving the consecrated status of Zion.
- source_word: וְ/יָרְשׁוּ
  chosen: will possess
  alternatives:
  - will inherit
  - will dispossess
  lexicon: HALOT
  rationale: ירשׁ can mean possess, inherit, or dispossess depending on context. Here,
    with the direct object 'their possessions/possessors,' the sense is regaining
    possession of what belongs to them. 'Will possess' is broad enough to preserve
    that nuance without forcing a narrower legal sense like 'inherit.'
- source_word: בֵּית יַעֲקֹב
  chosen: the house of Jacob
  alternatives:
  - Jacob's house
  lexicon: HALOT
  rationale: This is the standard covenantal-national expression for Jacob's descendants/Israel.
    The more formal phrase preserves the prophetic register.
- source_word: אֵת מוֹרָשֵׁיהֶם
  chosen: their possessions
  alternatives:
  - their inheritance
  - those who dispossessed them
  lexicon: HALOT
  rationale: מורשׁה commonly denotes a possession or inheritance. The suffix indicates
    what belongs to the house of Jacob. Some take the form in a verbal/agentive sense
    ('their dispossessors/possessors'), yielding 'the house of Jacob will dispossess
    those who dispossessed them,' but the nominal sense 'their possessions' fits the
    morphology and the restoration context well. The alternative is worth preserving
    in a footnote because it affects interpretation.
