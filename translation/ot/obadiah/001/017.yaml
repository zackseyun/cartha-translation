theological_decisions:
- issue: Nature of Zion's promised restoration
  chosen_reading: The verse speaks of real deliverance/restoration centered on Mount
    Zion without specifying here whether the emphasis is on surviving people, the
    act of rescue, or the restored holy status of the place.
  alternative_readings:
  - The verse primarily emphasizes a surviving remnant on Zion
  - The verse primarily emphasizes Zion itself as a sanctuary
  rationale: The Hebrew allows overlapping ideas of escape/deliverance and holiness.
    The translation preserves this prophetic tension rather than narrowing the promise
    to only one dimension.
  doctrine_reference: Preserve theological tension rather than resolve it.
