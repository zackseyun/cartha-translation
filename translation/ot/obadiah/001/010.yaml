theological_decisions:
- issue: Referent of 'Jacob' and force of kinship language
  chosen_reading: '''Jacob'' is retained as the named brother, representing the people
    descended from Jacob/Israel.'
  alternative_readings:
  - Substituting 'Israel' in the main text for immediate clarity
  rationale: The Hebrew explicitly says 'your brother Jacob.' Retaining the patriarchal
    name preserves the familial accusation against Edom and avoids replacing the source
    wording with an interpretive gloss. The national referent is contextually clear
    without altering the text.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names;
    Original-language primacy over translation tradition.'
