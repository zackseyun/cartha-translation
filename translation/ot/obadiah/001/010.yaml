id: OBA.1.10
reference: Obadiah 1:10
source:
  edition: WLC
  text: מֵ/חֲמַ֛ס אָחִ֥י/ךָ יַעֲקֹ֖ב תְּכַסְּ/ךָ֣ בוּשָׁ֑ה וְ/נִכְרַ֖תָּ לְ/עוֹלָֽם׃
translation:
  text: Because of the violence done to your brother Jacob, shame will cover you,
    and you will be cut off forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'For the violence against your brother Jacob.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵ/חֲמַס
  chosen: Because of the violence done to
  alternatives:
  - For the violence against
  - Because of violence against
  lexicon: HALOT
  rationale: חָמָס commonly denotes violence, wrong, or violent injustice. The prefixed
    מִן here is causal ('because of/on account of'), not merely separative. 'Violence
    done to' makes explicit the hostile direction toward Jacob that the context implies.
- source_word: אָחִי/ךָ
  chosen: your brother
  alternatives:
  - your kinsman
  lexicon: HALOT
  rationale: אָח means 'brother.' In context it refers to kinship between Edom and
    Jacob/Israel. 'Your brother' preserves both the literal familial language and
    the covenantal/moral force better than the more generalized 'kinsman.'
- source_word: יַעֲקֹב
  chosen: Jacob
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: The Hebrew text reads the personal name Jacob. Retaining 'Jacob' preserves
    the prophetic and familial framing; readers may infer the nation represented by
    the patriarchal name from context.
- source_word: תְּכַסְּ/ךָ
  chosen: will cover you
  alternatives:
  - will overwhelm you
  - will clothe you
  lexicon: HALOT
  rationale: The verb כסה means 'cover, conceal, clothe.' With בושה as subject, the
    idiom is that shame covers or clothes the addressee. 'Will cover you' is the most
    direct and natural English rendering.
- source_word: בוּשָׁה
  chosen: shame
  alternatives:
  - disgrace
  lexicon: HALOT
  rationale: בּוּשָׁה denotes shame/disgrace. 'Shame' is concise and preserves the
    moral and public-honor dimension of the Hebrew.
- source_word: וְ/נִכְרַ֖תָּ
  chosen: and you will be cut off
  alternatives:
  - and you will be destroyed
  - and you will be wiped out
  lexicon: HALOT
  rationale: The Niphal of כרת commonly means 'be cut off.' This can imply destruction
    or removal, but 'cut off' best preserves the Hebrew idiom and leaves its full
    force to context.
- source_word: לְ/עוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - permanently
  - for the age
  lexicon: HALOT
  rationale: עוֹלָם here expresses enduring duration. 'Forever' is idiomatic modern
    English and fits the prophetic judgment context.
