id: OBA.1.15
reference: Obadiah 1:15
source:
  edition: WLC
  text: כִּֽי קָר֥וֹב יוֹם יְהוָ֖ה עַל כָּל הַ/גּוֹיִ֑ם כַּ/אֲשֶׁ֤ר עָשִׂ֨יתָ֙ יֵעָ֣שֶׂה לָּ֔/ךְ גְּמֻלְ/ךָ֖ יָשׁ֥וּב בְּ/רֹאשֶֽׁ/ךָ־־־־׃
translation:
  text: For the day of Yahweh is near upon all the nations. As you have done, it will be done to you; your recompense will return on your own head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against all the nations.' The preposition can mark judgment directed toward the nations.
    reason: lexical_alternative
  - marker: b
    text: Or 'your repayment' or 'your dealing.' The Hebrew term refers to what comes back to a person in response to his actions.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding warning; 'For' preserves the causal/explanatory force in natural English.
- source_word: קָרוֹב
  chosen: is near
  alternatives:
  - is at hand
  - draws near
  lexicon: HALOT
  rationale: Predicate adjective indicating imminence. 'Is near' is clear, direct, and idiomatic.
- source_word: יוֹם יְהוָה
  chosen: the day of the LORD
  alternatives:
  - the LORD's day
  lexicon: HALOT
  rationale: Standard prophetic expression for YHWH's decisive day of judgment. 'The day of the LORD' preserves the recognized biblical idiom while following the doctrine's default rendering of YHWH as 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: עַל כָּל הַגּוֹיִם
  chosen: upon all the nations
  alternatives:
  - against all the nations
  - over all the nations
  lexicon: HALOT
  rationale: עַל here marks the object/sphere of impending judgment. 'Upon all the nations' preserves the directional force and prophetic tone without over-interpreting it as only hostile 'against'.
- source_word: כַּאֲשֶׁר עָשִׂיתָ
  chosen: As you have done
  alternatives:
  - Just as you did
  - According to what you have done
  lexicon: HALOT
  rationale: Keeps the comparative formula that introduces the principle of retributive justice. The perfect is naturally rendered in English as 'have done'.
- source_word: יֵעָשֶׂה לָּךְ
  chosen: it will be done to you
  alternatives:
  - so it shall be done to you
  - it shall be done for you
  lexicon: HALOT
  rationale: Niphal imperfect gives a passive sense. 'It will be done to you' is the most natural English rendering and clearly mirrors the prior clause.
- source_word: גְּמֻלְךָ
  chosen: your recompense
  alternatives:
  - your repayment
  - your dealing
  - your reward
  lexicon: HALOT
  rationale: Refers here to what comes back to a person in response to his actions, especially in a judicial/retributive sense. 'Recompense' preserves that moral-judicial nuance better than the more neutral 'reward'.
- source_word: יָשׁוּב
  chosen: will return
  alternatives:
  - will come back
  - will turn back
  lexicon: HALOT
  rationale: Common verb of returning; in context it describes the consequences of Edom's actions coming back upon him.
- source_word: בְּרֹאשֶׁךָ
  chosen: on your own head
  alternatives:
  - upon your head
  - back on your head
  lexicon: HALOT
  rationale: Idiomatic expression for consequences falling on the person responsible. 'On your own head' makes the reflexive force explicit and idiomatic in English.
