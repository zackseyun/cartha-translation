theological_decisions:
- issue: Scope and force of 'the day of the LORD'
  chosen_reading: A prophetic announcement of imminent divine judgment extending beyond Edom to all the nations.
  alternative_readings:
  - A narrower judgment only on Edom in this immediate context
  rationale: The phrase 'upon all the nations' broadens the scope beyond Edom while still speaking directly to Edom in the second half of the verse. The translation preserves both the universal scope and the direct address without narrowing the theology of judgment.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it'
- issue: Retributive justice formula
  chosen_reading: 'The verse states a principle of divine recompense: what Edom has done will be done back to Edom.'
  alternative_readings:
  - A merely impersonal karmic principle
  rationale: Within the prophetic context and the mention of 'the day of the LORD,' the repayment is not abstract fate but divine judgment. The wording 'recompense will return on your own head' preserves that judicial-theological force without adding explanatory paraphrase.
