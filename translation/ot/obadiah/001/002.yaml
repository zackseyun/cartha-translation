theological_decisions:
- issue: Prophetic perfect / aspect in divine judgment declaration
  chosen_reading: Rendered with English present perfect ('I have made you') to reflect
    the Hebrew perfect as a declared act with present relevance.
  alternative_readings:
  - I will make you small among the nations
  - I make you small among the nations
  rationale: The Hebrew form is perfect 1cs with direct object suffix. In prophetic
    discourse this can express a settled divine action or decree. The English present
    perfect preserves the completed/decretive force without unnecessarily converting
    it into a future prediction.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve the source text''s plain sense.'
