id: OBA.1.2
reference: Obadiah 1:2
source:
  edition: WLC
  text: הִנֵּ֥ה קָטֹ֛ן נְתַתִּ֖י/ךָ בַּ/גּוֹיִ֑ם בָּז֥וּי אַתָּ֖ה מְאֹֽד׃
translation:
  text: Look, I have made you small among the nations; you are greatly despised.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'insignificant among the nations.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'I have given you small among the nations,' an idiom meaning
      'I have made you small among the nations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces the declaration with attention-getting force. 'Look' preserves
    the deictic and rhetorical punch in readable modern English better than the more
    archaic 'Behold.'
- source_word: קָטֹן
  chosen: small
  alternatives:
  - little
  - insignificant
  lexicon: HALOT
  rationale: The adjective denotes smallness/lowliness in status here. 'Small' is
    the most direct rendering and works naturally with the following phrase 'among
    the nations.' 'Insignificant' is interpretive and therefore left as an alternative.
- source_word: נְתַתִּיךָ
  chosen: I have made you
  alternatives:
  - I have given you
  - I set you
  lexicon: HALOT
  rationale: 'Although the verb is literally ''I have given,'' in this context with
    the predicate adjective ''small'' the idiomatic sense is causative/resultative:
    ''I have made you small.'' This best reflects the Hebrew sense in natural English
    without over-paraphrasing.'
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  - among the peoples
  lexicon: HALOT
  rationale: גּוֹיִם here refers to the nations/peoples generally, not specifically
    'Gentiles' in a later Jewish-Christian contrast. 'Among the nations' is the standard
    and contextually appropriate rendering.
- source_word: בָּזוּי
  chosen: despised
  alternatives:
  - held in contempt
  - disdained
  lexicon: HALOT
  rationale: The passive participle expresses being treated as contemptible. 'Despised'
    is concise, natural, and preserves the relational sense of contempt.
- source_word: מְאֹד
  chosen: greatly
  alternatives:
  - very
  - exceedingly
  lexicon: HALOT
  rationale: An adverb of intensity modifying 'despised.' 'Greatly' fits idiomatic
    English in this clause better than the flatter 'very,' while remaining faithful
    to the degree marker.
