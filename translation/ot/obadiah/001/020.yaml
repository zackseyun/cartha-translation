id: OBA.1.20
reference: Obadiah 1:20
source:
  edition: WLC
  text: וְ/גָלֻ֣ת הַֽ/חֵל הַ֠/זֶּה לִ/בְנֵ֨י יִשְׂרָאֵ֤ל אֲשֶֽׁר כְּנַעֲנִים֙ עַד
    צָ֣רְפַ֔ת וְ/גָלֻ֥ת יְרוּשָׁלִַ֖ם אֲשֶׁ֣ר בִּ/סְפָרַ֑ד יִֽרְשׁ֕וּ אֵ֖ת עָרֵ֥י
    הַ/נֶּֽגֶב־־־׃
translation:
  text: And the exiles of this host of the sons of Israel, who are among the Canaanites
    as far as Zarephath, and the exiles of Jerusalem who are in Sepharad, will possess
    the cities of the Negev.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this army'; the Hebrew term is difficult and has also been understood
      in other ways, including 'wealth' or similar senses.
    reason: lexical_alternative
  - marker: b
    text: Sepharad is an uncertain place name; some identify it with Spain, but the
      Hebrew name is retained here.
    reason: cultural_note
lexical_decisions:
- source_word: גָּלוּת
  chosen: exiles
  alternatives:
  - captivity
  - exile
  lexicon: HALOT
  rationale: The noun denotes the people in exile or the state of exile. Here, because
    it governs groups who will later 'possess,' rendering it as the people ('exiles')
    fits the syntax and sense better than the abstract 'captivity.'
- source_word: הַחֵל
  chosen: host
  alternatives:
  - army
  - force
  - wealth
  lexicon: HALOT
  rationale: The term is difficult and debated in this verse. 'Host' preserves the
    sense of a collected body or company without overcommitting to a military nuance
    ('army') or an emended sense. It keeps the wording relatively formal while remaining
    intelligible.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: of the sons of Israel
  alternatives:
  - belonging to the Israelites
  - of the people of Israel
  lexicon: HALOT
  rationale: This keeps the genitival relationship explicit and follows the gender-accurate
    principle. 'Sons of Israel' is a standard covenantal expression and should not
    be flattened without need.
- source_word: אֲשֶׁר כְּנַעֲנִים עַד צָרְפַת
  chosen: who are among the Canaanites as far as Zarephath
  alternatives:
  - who are in Canaan as far as Zarephath
  - who are the Canaanites up to Zarephath
  lexicon: HALOT
  rationale: 'The clause is syntactically compressed and somewhat difficult. Rendering
    ''among the Canaanites'' best explains the plural noun and yields coherent sense:
    Israelite exiles located in Phoenician/Canaanite territory up to Zarephath.'
- source_word: צָרְפַת
  chosen: Zarephath
  alternatives:
  - Sarepta
  lexicon: HALOT
  rationale: As a place name, it is transliterated by standard English convention
    from the Hebrew form.
- source_word: סְפָרַד
  chosen: Sepharad
  alternatives:
  - Spain
  lexicon: HALOT
  rationale: The location is uncertain. Following the translation philosophy, personal
    and place names are transliterated rather than replaced with a speculative identification
    such as 'Spain.'
- source_word: יִרְשׁוּ
  chosen: will possess
  alternatives:
  - will inherit
  - will take possession of
  lexicon: HALOT
  rationale: The verb often carries both inheritance and possession senses. In this
    territorial context, 'will possess' is natural English and preserves the concrete
    land-taking sense without excluding covenantal overtones.
- source_word: עָרֵי הַנֶּגֶב
  chosen: the cities of the Negev
  alternatives:
  - the towns of the South
  - the cities of the southland
  lexicon: HALOT
  rationale: Negev can function as a regional toponym or a directional term. Here
    the article and prophetic-geographical context favor the proper regional sense,
    so 'Negev' is retained rather than generalized to 'south.'
