theological_decisions:
- issue: Rendering the difficult phrase הַחֵל הַזֶּה
  chosen_reading: this host
  alternative_readings:
  - this army
  - this wealth
  - this fortress/bulwark
  rationale: The verse is textually and lexically difficult, but no doctrinal issue
    is at stake. 'This host' preserves ambiguity without forcing a speculative reconstruction.
    Alternatives are preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §3, §5
