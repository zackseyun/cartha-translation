id: AMO.8.9
reference: Amos 8:9
source:
  edition: WLC
  text: וְ/הָיָ֣ה בַּ/יּ֣וֹם הַ/ה֗וּא נְאֻם֙ אֲדֹנָ֣/י יְהוִ֔ה וְ/הֵבֵאתִ֥י הַ/שֶּׁ֖מֶשׁ בַּֽ/צָּהֳרָ֑יִם וְ/הַחֲשַׁכְתִּ֥י לָ/אָ֖רֶץ בְּ/י֥וֹם אֽוֹר׀׃
translation:
  text: And it shall happen in that day, declares the Lord GOD, that I will make the sun go down at noon, and I will darken the earth in broad daylight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land'; Hebrew אֶרֶץ can refer either to the earth generally or to a particular land.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it shall happen
  alternatives:
  - And it will be
  - And it shall come to pass
  lexicon: HALOT
  rationale: Introduces a prophetic future event formula. 'It shall happen' is natural modern English while preserving the formal prophetic tone better than the archaic 'come to pass.'
- source_word: בַּיּוֹם הַהוּא
  chosen: in that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: A standard prophetic temporal expression. 'In that day' preserves the idiomatic eschatological/prophetic resonance of the Hebrew.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  lexicon: HALOT
  rationale: נְאֻם is a prophetic declaration formula best rendered 'declares.' אֲדֹנָי יְהוִה is conventionally 'Lord GOD'; 'the LORD' is the default for YHWH alone, but here the compound title is best represented by 'Lord GOD' to avoid 'Lord LORD.' 'Yahweh' is not used per doctrine guidance.
- source_word: וְהֵבֵאתִי הַשֶּׁמֶשׁ
  chosen: that I will make the sun go down
  alternatives:
  - that I will bring the sun down
  - that I will cause the sun to set
  lexicon: HALOT
  rationale: The hiphil of בוא with 'the sun' conveys causing the sun to go down/set. 'Make the sun go down' is idiomatic and preserves divine agency without over-literal awkwardness.
- source_word: בַּצָּהֳרָיִם
  chosen: at noon
  alternatives:
  - at midday
  lexicon: HALOT
  rationale: The noun denotes midday/noon. 'At noon' is the clearest contemporary rendering.
- source_word: וְהַחֲשַׁכְתִּי
  chosen: and I will darken
  alternatives:
  - and I will make dark
  lexicon: HALOT
  rationale: Hiphil of חשׁך denotes causing darkness. 'Darken' is concise and natural.
- source_word: לָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: אָרֶץ can mean 'land' or 'earth.' Here the cosmic imagery of the sun darkened at noon favors the broader 'earth' rather than a localized 'land,' though the alternative remains possible.
- source_word: בְּיוֹם אוֹר
  chosen: in broad daylight
  alternatives:
  - in the day of light
  - on a day of light
  - in daylight
  lexicon: HALOT
  rationale: Literally 'in a day of light.' The phrase emphasizes the shocking reversal of darkness during full daylight. 'In broad daylight' captures the force idiomatically and clearly in English.
