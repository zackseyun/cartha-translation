theological_decisions:
- issue: Meaning of 'the pride of Jacob' in the oath formula
  chosen_reading: Retain the phrase 'the pride of Jacob' without interpretive expansion.
  alternative_readings:
  - '''the Glory of Jacob'' as a title for God'
  - '''the majesty/excellency of Jacob'' referring to Israel''s status or land'
  rationale: The Hebrew phrase is ambiguous and may be intentionally so. Some interpreters take it as a reverential circumlocution for God, while others read it ironically of Israel's pride or splendor. The translation preserves the tension rather than resolving it, in keeping with the stated philosophy.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
