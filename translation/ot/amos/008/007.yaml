id: AMO.8.7
reference: Amos 8:7
source:
  edition: WLC
  text: נִשְׁבַּ֥ע יְהוָ֖ה בִּ/גְא֣וֹן יַעֲקֹ֑ב אִם אֶשְׁכַּ֥ח לָ/נֶ֖צַח כָּל מַעֲשֵׂי/הֶֽם־־׃
translation:
  text: 'Yahweh has sworn by the pride of Jacob: Surely I will never forget any of their deeds.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the glory of Jacob' or 'by the excellency of Jacob.' The Hebrew phrase may refer ironically to what Jacob prides himself in, or possibly to God as Jacob's true glory.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'if I forget forever any of their deeds'—an oath formula meaning 'surely I will never forget any of their deeds.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשְׁבַּע
  chosen: has sworn
  alternatives:
  - swears
  - has taken an oath
  lexicon: HALOT
  rationale: The Niphal of שׁבע here is the standard idiom for taking an oath. English present perfect fits the prophetic declaration naturally and preserves the solemn completed force better than a simple present.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בִּגְאוֹן
  chosen: by the pride of
  alternatives:
  - by the glory of
  - by the excellency of
  - by the majesty of
  lexicon: HALOT
  rationale: גָּאוֹן can denote pride, exaltation, majesty, or glory. In Amos, 'pride of Jacob' likely carries an ironic or double-edged sense, possibly referring either to what Jacob prides himself in or to the One who is Jacob's true glory. 'Pride' is the most direct lexical rendering and preserves the ambiguity better than smoothing to 'glory'.
- source_word: יַעֲקֹב
  chosen: Jacob
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: The proper name should be transliterated. Here 'Jacob' functions as a covenantal name for the nation, and retaining it preserves the prophetic diction.
- source_word: אִם
  chosen: Surely
  alternatives:
  - if
  - indeed
  lexicon: HALOT
  rationale: 'After an oath formula, אִם introduces an elliptical self-imprecatory construction: literally ''if I forget...'' meaning ''surely I will not forget'' or ''may I be cursed if I forget.'' English normally renders the force rather than the bare conditional form. ''Surely'' signals the oath''s emphatic force.'
- source_word: אֶשְׁכַּח
  chosen: I will forget
  alternatives:
  - I forget
  lexicon: HALOT
  rationale: The verb is first person singular, with the LORD as speaker within the oath. Future English works naturally in the oath context and combines with the negating force implied by the oath formula.
- source_word: לָנֶצַח
  chosen: never
  alternatives:
  - forever
  - for eternity
  lexicon: HALOT
  rationale: 'לָנֶצַח literally means ''forever'' or ''for perpetuity.'' In English with a negated remembering/forgetting statement, ''never'' is the most idiomatic equivalent: ''I will never forget.'''
- source_word: כָּל
  chosen: any
  alternatives:
  - all
  lexicon: HALOT
  rationale: Though literally 'all,' in idiomatic English under negation 'not forget any of their deeds' best conveys the distributive sense without awkwardness. This is an optimal-equivalence adjustment, not a semantic reduction.
- source_word: מַעֲשֵׂיהֶם
  chosen: their deeds
  alternatives:
  - their actions
  - their works
  lexicon: HALOT
  rationale: מַעֲשֶׂה denotes deed, act, or work. In this judgment context, 'deeds' is natural, morally weighted English and avoids the potentially misleading theological freight of 'works'.
