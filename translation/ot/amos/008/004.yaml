id: AMO.8.4
reference: Amos 8:4
source:
  edition: WLC
  text: שִׁמְעוּ זֹ֕את הַ/שֹּׁאֲפִ֖ים אֶבְי֑וֹן וְ/לַ/שְׁבִּ֖ית ענוי אָֽרֶץ־־׃
translation:
  text: Hear this, you who trample the needy and bring the poor of the land to an
    end,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you who pant after the needy' or 'you who swallow up the needy.' The
      Hebrew participle carries a vivid image of greedy oppression.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen
  lexicon: HALOT
  rationale: Imperative plural of שׁמע, a direct summons to attend. 'Hear' preserves
    the prophetic tone and conventional force better than the slightly softer 'Listen.'
- source_word: זֹאת
  chosen: this
  lexicon: HALOT
  rationale: 'Straightforward demonstrative object of the imperative: ''Hear this.'''
- source_word: הַשֹּׁאֲפִים
  chosen: you who trample
  alternatives:
  - you who pant after
  - you who swallow up
  lexicon: HALOT
  rationale: The participle from שאף can denote panting after, snapping at, or swallowing/crushing.
    In this context of economic oppression, an idiomatic rendering that conveys exploitative
    violence is needed. 'Trample' fits the parallel with destroying the poor and communicates
    the social abuse clearly. Alternatives are preserved in a footnote because the
    Hebrew image is vivid and somewhat debated.
- source_word: אֶבְיוֹן
  chosen: the needy
  alternatives:
  - the poor
  lexicon: HALOT
  rationale: אביון commonly denotes the needy or poor. 'Needy' differentiates it slightly
    from the following ענוים and preserves the socioeconomic nuance.
- source_word: וְלַשְׁבִּית
  chosen: and bring ... to an end
  alternatives:
  - and destroy
  - and cause ... to cease
  lexicon: HALOT
  rationale: Hiphil infinitive construct of שבת with prefixed conjunction/preposition
    expresses causing to cease. 'Bring ... to an end' is a natural English rendering
    that preserves the causative sense without overinterpreting. 'Destroy' is possible
    but slightly stronger and less formally tied to the verb's core meaning.
- source_word: ענוי
  chosen: the poor
  alternatives:
  - the afflicted
  - the humble
  lexicon: HALOT
  rationale: Plural construct of עני/ענו in a context of exploitation. 'The poor'
    best matches the socioeconomic setting in Amos, though 'afflicted' is lexically
    possible.
- source_word: אָרֶץ
  chosen: the land
  alternatives:
  - the earth
  lexicon: HALOT
  rationale: In Amos, ארץ often refers to the land in a concrete social-political
    sense. 'The land' fits the immediate context of local injustice better than the
    broader 'earth.'
