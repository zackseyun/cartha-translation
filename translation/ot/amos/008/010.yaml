theological_decisions:
- issue: Referent of the feminine suffix in וְשַׂמְתִּיהָ ... וְאַחֲרִיתָהּ
  chosen_reading: Rendered with impersonal 'it' to refer to the coming national condition
    of mourning/judgment.
  alternative_readings:
  - Rendered as 'her' referring to the land
  - Rendered as 'it' referring specifically to the feast/festival
  rationale: The Hebrew feminine suffix could point to an implied feminine collective
    such as the land, city, or the whole situation just described. English 'it' best
    preserves the ambiguity without forcing a more specific referent than the text
    requires.
  doctrine_reference: Preserve theological tension rather than resolve it.
