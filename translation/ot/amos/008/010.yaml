id: AMO.8.10
reference: Amos 8:10
source:
  edition: WLC
  text: וְ/הָפַכְתִּ֨י חַגֵּי/כֶ֜ם לְ/אֵ֗בֶל וְ/כָל שִֽׁירֵי/כֶם֙ לְ/קִינָ֔ה וְ/הַעֲלֵיתִ֤י
    עַל כָּל מָתְנַ֨יִם֙ שָׂ֔ק וְ/עַל כָּל רֹ֖אשׁ קָרְחָ֑ה וְ/שַׂמְתִּ֨י/הָ֙ כְּ/אֵ֣בֶל
    יָחִ֔יד וְ/אַחֲרִיתָ֖/הּ כְּ/י֥וֹם מָֽר־־־־־׃
translation:
  text: I will turn your feasts into mourning, and all your songs into lamentation;
    I will bring sackcloth on every waist and baldness on every head; I will make
    it like mourning for an only son, and its end like a bitter day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your festivals.'
    reason: lexical_alternative
  - marker: b
    text: Or 'into a dirge' for 'into lamentation.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'like mourning for an only one'; the sense is commonly understood
      as mourning for an only son.
    reason: lexical_alternative
  - marker: d
    text: Or 'like a day of bitterness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָפַכְתִּי
  chosen: I will turn
  alternatives:
  - I will overturn
  - I will change
  lexicon: HALOT
  rationale: The verb הָפַךְ here denotes transforming one state into another. 'Turn'
    is idiomatic in English and preserves the causative shift from celebration to
    grief.
- source_word: חַגֵּיכֶם
  chosen: your feasts
  alternatives:
  - your festivals
  lexicon: HALOT
  rationale: חַג refers to festal celebrations, often pilgrimage festivals. 'Feasts'
    is concise and natural, while still conveying communal religious celebration.
- source_word: לְאֵבֶל
  chosen: into mourning
  alternatives:
  - into grief
  lexicon: HALOT
  rationale: אֵבֶל denotes mourning, especially in bereavement contexts. 'Mourning'
    best matches the ritual and emotional force.
- source_word: שִׁירֵיכֶם
  chosen: your songs
  alternatives:
  - your singing
  lexicon: HALOT
  rationale: The plural noun refers to songs generally. 'Songs' is the most direct
    rendering.
- source_word: לְקִינָה
  chosen: into lamentation
  alternatives:
  - into lament
  - into a dirge
  lexicon: HALOT
  rationale: קִינָה is a formal lament, often funeral-like. 'Lamentation' preserves
    the elevated and communal tone better than the flatter 'lament.'
- source_word: וְהַעֲלֵיתִי
  chosen: I will bring
  alternatives:
  - I will cause to come up
  - I will put
  lexicon: HALOT
  rationale: The Hiphil of עלה here is idiomatic for causing something to come upon
    someone. 'Bring' is natural English and preserves divine agency.
- source_word: עַל כָּל מָתְנַיִם שָׂק
  chosen: sackcloth on every waist
  alternatives:
  - sackcloth on every loins
  - sackcloth around every waist
  lexicon: HALOT
  rationale: מָתְנַיִם literally refers to the loins/waist area. 'Waist' is more natural
    modern English than 'loins' while retaining the image of mourning attire.
- source_word: וְעַל כָּל רֹאשׁ קָרְחָה
  chosen: baldness on every head
  alternatives:
  - a shaved head on every head
  lexicon: HALOT
  rationale: קָרְחָה denotes baldness, often as a mourning sign. 'Baldness on every
    head' preserves the stark prophetic imagery without overexplaining.
- source_word: וְשַׂמְתִּיהָ
  chosen: I will make it
  alternatives:
  - I will set it
  - I will make her
  lexicon: HALOT
  rationale: The feminine suffix most naturally refers back to the situation/land/city
    in a collective sense. English idiom prefers 'it' for this abstract or collective
    referent.
- source_word: כְּאֵבֶל יָחִיד
  chosen: like mourning for an only son
  alternatives:
  - like mourning for an only child
  - like the mourning of an only one
  lexicon: HALOT
  rationale: יָחִיד means 'only one,' and in this collocation refers to the grief
    of losing an only son. 'Only son' reflects the conventional force of the Hebrew
    mourning image.
- source_word: וְאַחֲרִיתָהּ
  chosen: its end
  alternatives:
  - its latter end
  - its outcome
  lexicon: HALOT
  rationale: אַחֲרִית denotes the end or outcome. 'Its end' is concise and preserves
    the temporal/resultative sense.
- source_word: כְּיוֹם מָר
  chosen: like a bitter day
  alternatives:
  - like a day of bitterness
  - like a grievous day
  lexicon: HALOT
  rationale: The phrase compares the outcome to a day characterized by bitterness.
    'A bitter day' is direct and idiomatic, preserving the emotional severity.
