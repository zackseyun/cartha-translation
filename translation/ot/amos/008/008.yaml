id: AMO.8.8
reference: Amos 8:8
source:
  edition: WLC
  text: הַ֤/עַל זֹאת֙ לֹֽא תִרְגַּ֣ז הָ/אָ֔רֶץ וְ/אָבַ֖ל כָּל יוֹשֵׁ֣ב בָּ֑/הּ וְ/עָלְתָ֤ה
    כָ/אֹר֙ כֻּלָּ֔/הּ וְ/נִגְרְשָׁ֥ה ו/נשקה כִּ/יא֥וֹר מִצְרָֽיִם־־׃ס
translation:
  text: Because of this, will not the land tremble, and every one who dwells in it
    mourn? All of it will rise like the Nile; it will be tossed about and sink like
    the Nile of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the earth' instead of 'the land.' The Hebrew אֶרֶץ can bear either sense;
      here the local sense is preferred because the verse focuses on the judged territory
      and its inhabitants.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'like the Nile ... like the Nile of Egypt.' The image is of the Nile's
      annual rising and subsiding, used here as a picture of overwhelming upheaval.
    reason: cultural_note
lexical_decisions:
- source_word: הַעַל זֹאת
  chosen: Because of this
  alternatives:
  - On account of this
  - For this
  lexicon: HALOT
  rationale: Introduces the reason for the coming judgment. 'Because of this' is idiomatic
    modern English and preserves the causal force of עַל with the demonstrative.
- source_word: תִרְגַּז
  chosen: will ... tremble
  alternatives:
  - be shaken
  - quake
  - be agitated
  lexicon: HALOT
  rationale: רגז can denote trembling, quaking, or agitation. With 'the land' as subject,
    'tremble' captures both physical upheaval and the terror-laden response implied
    by judgment language.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' In Amos, the immediate reference is
    the judged territory and its inhabitants, so 'land' is preferred, while the broader
    cosmic sense remains possible.
- source_word: וְאָבַל
  chosen: and ... mourn
  alternatives:
  - lament
  - wail
  lexicon: HALOT
  rationale: אבל commonly denotes mourning. 'Mourn' is the most natural English equivalent
    and fits the parallel with the land's trembling and the inhabitants' distress.
- source_word: כָּל יוֹשֵׁב בָּהּ
  chosen: every one who dwells in it
  alternatives:
  - all who live in it
  - every inhabitant in it
  lexicon: HALOT
  rationale: Literally 'every dweller in it.' 'Every one who dwells in it' preserves
    the distributive force of כָּל and the participial sense of יוֹשֵׁב without sounding
    wooden.
- source_word: וְעָלְתָה כָאֹר כֻּלָּהּ
  chosen: All of it will rise like the Nile
  alternatives:
  - It will all rise like the River
  - The whole land will surge like the Nile
  lexicon: HALOT
  rationale: יְאֹר/אֹר here refers to the Nile or Nile-channel. Given the explicit
    comparison to Egypt in the next clause, rendering it 'the Nile' makes the image
    clear in English. 'All of it' reflects כֻּלָּהּ, referring to the whole land.
- source_word: וְנִגְרְשָׁה
  chosen: it will be tossed about
  alternatives:
  - be driven away
  - be heaved up
  - be cast out
  lexicon: HALOT
  rationale: The Niphal of גרשׁ here is used in the flood simile. 'Tossed about' best
    conveys the image of waters or land being driven and churned, rather than literal
    expulsion alone.
- source_word: וְנשקה
  chosen: and sink
  alternatives:
  - subside
  - be laid low
  lexicon: HALOT
  rationale: In context with the Nile imagery, the verb describes the receding or
    sinking phase after the surge. 'Sink' is vivid and natural in English, matching
    the rise-and-fall pattern of the river.
- source_word: כִּיאוֹר מִצְרָיִם
  chosen: like the Nile of Egypt
  alternatives:
  - like the river of Egypt
  - like Egypt's Nile
  lexicon: HALOT
  rationale: The comparison is specifically to the Nile's swelling and subsiding.
    'The Nile of Egypt' is slightly formal but transparent and closely follows the
    Hebrew construction.
