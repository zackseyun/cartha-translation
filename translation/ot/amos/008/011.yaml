id: AMO.8.11
reference: Amos 8:11
source:
  edition: WLC
  text: הִנֵּ֣ה יָמִ֣ים בָּאִ֗ים נְאֻם֙ אֲדֹנָ֣/י יְהוִ֔ה וְ/הִשְׁלַחְתִּ֥י רָעָ֖ב בָּ/אָ֑רֶץ לֹֽא רָעָ֤ב לַ/לֶּ֨חֶם֙ וְ/לֹֽא צָמָ֣א לַ/מַּ֔יִם כִּ֣י אִם לִ/שְׁמֹ֔עַ אֵ֖ת דִּבְרֵ֥י יְהוָֽה׀־־־׃
translation:
  text: Behold, days are coming, declares the Lord GOD, when I will send a famine on the land—not a famine for bread, nor a thirst for water, but for hearing the words of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to hear the words of the LORD.' The Hebrew infinitive can be rendered more directly this way; 'for hearing' was chosen to preserve the parallel with 'for bread' and 'for water.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Introduces a solemn prophetic announcement. 'Behold' preserves the elevated, attention-commanding force better than flatter modern options.
- source_word: יָמִים בָּאִים
  chosen: days are coming
  alternatives:
  - the days are coming
  - days are on the way
  lexicon: HALOT
  rationale: Standard prophetic idiom announcing an impending future event. The anarthrous Hebrew is naturally rendered in English as 'days are coming.'
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord GOD
  lexicon: HALOT
  rationale: נְאֻם is a prophetic formula meaning 'declaration/utterance.' 'Declares' is idiomatic in English prophetic style. אֲדֹנָי יְהוִה is rendered 'Lord GOD,' following the convention that יְהוָה is translated 'the LORD' and, when paired with אֲדֹנָי, often appears as 'Lord GOD' to avoid 'Lord LORD'.
- source_word: וְהִשְׁלַחְתִּי
  chosen: when I will send
  alternatives:
  - and I will send
  - for I will send
  lexicon: HALOT
  rationale: The waw links the divine declaration to its content. In English, 'when I will send' smoothly connects the coming days with the announced action without losing the first-person divine agency.
- source_word: רָעָב
  chosen: a famine
  alternatives:
  - famine
  - hunger
  lexicon: HALOT
  rationale: The noun denotes famine rather than mere personal hunger. The article is absent in Hebrew, so English indefinite 'a famine' is natural.
- source_word: בָּאָרֶץ
  chosen: on the land
  alternatives:
  - in the land
  - upon the earth
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' In Amos, the judgment context most naturally points to the land/region under judgment rather than the whole globe. 'On the land' fits the idiom of sending judgment upon a territory.
- source_word: לֹא רָעָב לַלֶּחֶם
  chosen: not a famine for bread
  alternatives:
  - not a famine of bread
  - not hunger for food
  lexicon: HALOT
  rationale: Preserves the metaphor's first negated element with close formal correspondence. 'Bread' here stands for food generally, but retaining 'bread' keeps the Hebrew imagery.
- source_word: וְלֹא צָמָא לַמַּיִם
  chosen: nor a thirst for water
  alternatives:
  - and not a thirst for water
  - nor thirst for water
  lexicon: HALOT
  rationale: Parallel to the previous clause. 'Nor' gives natural English coordination while preserving the negated comparison.
- source_word: כִּי אִם
  chosen: but
  alternatives:
  - except
  - rather
  lexicon: HALOT
  rationale: This adversative expression contrasts the literal famine/thirst with the true object of deprivation. 'But' is the clearest idiomatic rendering in context.
- source_word: לִשְׁמֹעַ
  chosen: for hearing
  alternatives:
  - to hear
  - for listening to
  lexicon: HALOT
  rationale: 'The infinitive expresses the object of the metaphorical famine: deprivation with respect to hearing. ''For hearing'' preserves the parallel structure with ''for bread'' and ''for water'' better than a more interpretive paraphrase.'
- source_word: דִּבְרֵי יְהוָה
  chosen: the words of the LORD
  alternatives:
  - the word of the LORD
  - the words from the LORD
  lexicon: HALOT
  rationale: The plural construct דִּבְרֵי is best represented as 'words,' referring to divine messages/utterances. יְהוָה is rendered 'the LORD' per doctrine guidance.
