theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh / Lord GOD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nature of the announced famine
  chosen_reading: a metaphorical famine consisting in deprivation of hearing the words of the LORD
  alternative_readings:
  - a literal famine accompanied by spiritual deprivation
  rationale: The verse itself explicitly negates literal bread- and water-deprivation and identifies the true famine as one related to hearing God's words. The translation preserves that tension without expanding into a doctrinal explanation beyond the text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
