id: AMO.8.6
reference: Amos 8:6
source:
  edition: WLC
  text: לִ/קְנ֤וֹת בַּ/כֶּ֨סֶף֙ דַּלִּ֔ים וְ/אֶבְי֖וֹן בַּ/עֲב֣וּר נַעֲלָ֑יִם וּ/מַפַּ֥ל
    בַּ֖ר נַשְׁבִּֽיר׃
translation:
  text: to buy the poor for silver, and the needy for a pair of sandals, and sell
    the sweepings of the grain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the refuse of the wheat' or 'the fallen grain'; the Hebrew likely refers
      to inferior grain remnants being sold as merchandise.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִקְנוֹת
  chosen: to buy
  alternatives:
  - to acquire
  lexicon: HALOT
  rationale: Qal infinitive construct of קנה here expresses purpose/result in continuation
    of the merchants' sinful intent from the previous verse. 'Buy' is the plain economic
    sense and fits the exploitation context, likely implying purchase of persons into
    debt-slavery.
- source_word: בַּכֶּסֶף
  chosen: for silver
  alternatives:
  - with silver
  - for money
  lexicon: HALOT
  rationale: The preposition with the article marks price/payment. 'For silver' preserves
    the concrete Hebrew term and echoes prophetic diction better than the more generalized
    'for money'.
- source_word: דַּלִּים
  chosen: the poor
  alternatives:
  - the weak
  - the lowly
  lexicon: HALOT
  rationale: דַּל commonly denotes the poor or socially weak. 'The poor' is the most
    natural English rendering in this economic-justice context.
- source_word: וְאֶבְיוֹן
  chosen: and the needy
  alternatives:
  - and the poor
  - and the destitute
  lexicon: HALOT
  rationale: אֶבְיוֹן overlaps with דל but is not identical; rendering it 'the needy'
    preserves the parallelism without flattening both terms into the same English
    gloss.
- source_word: בַּעֲבוּר נַעֲלָיִם
  chosen: for a pair of sandals
  alternatives:
  - for sandals
  - for the sake of sandals
  lexicon: HALOT
  rationale: The phrase indicates the trivial price for which the needy are exploited.
    Because נַעֲלַיִם is dual, 'a pair of sandals' is idiomatic and preserves the
    sense of contemptibly small value.
- source_word: וּמַפַּל בַּר
  chosen: and the sweepings of the grain
  alternatives:
  - and the refuse of the wheat
  - and the fallen grain
  lexicon: HALOT
  rationale: מַפַּל denotes what falls off or is cast down; with בַּר ('grain' here,
    not specifically 'wheat'), the phrase refers to inferior grain remnants or sweepings
    sold dishonestly. 'Sweepings of the grain' communicates both the low quality and
    the merchants' corruption.
- source_word: נַשְׁבִּיר
  chosen: and sell
  alternatives:
  - and market
  - and offer for sale
  lexicon: HALOT
  rationale: Hiphil of שׁבר in this commercial context means to sell grain. 'Sell'
    is direct and idiomatic; the object is supplied from the preceding phrase in normal
    English.
