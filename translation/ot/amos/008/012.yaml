id: AMO.8.12
reference: Amos 8:12
source:
  edition: WLC
  text: וְ/נָעוּ֙ מִ/יָּ֣ם עַד יָ֔ם וּ/מִ/צָּפ֖וֹן וְ/עַד מִזְרָ֑ח יְשֽׁוֹטְט֛וּ לְ/בַקֵּ֥שׁ
    אֶת דְּבַר יְהוָ֖ה וְ/לֹ֥א יִמְצָֽאוּ־־־־׃
translation:
  text: They will wander from sea to sea, and from north to east; they will roam about
    seeking the word of the LORD, but they will not find it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will run to and fro' for 'they will roam about.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the word of the LORD'; that is, a divine message or revelation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָעוּ
  chosen: they will wander
  alternatives:
  - they will stagger
  - they will reel
  lexicon: HALOT
  rationale: The verb נוּעַ can denote wandering or tottering. In this context of
    desperate searching across regions, 'wander' best fits the movement motif without
    importing drunkenness imagery too strongly.
- source_word: מִיָּם עַד יָם
  chosen: from sea to sea
  alternatives:
  - from west to west
  - from one sea to another
  lexicon: HALOT
  rationale: The idiom is naturally rendered 'from sea to sea,' preserving the Hebrew
    geographic expression and its breadth. More interpretive directional renderings
    are possible but less direct.
- source_word: וּמִצָּפוֹן וְעַד מִזְרָח
  chosen: and from north to east
  alternatives:
  - and from the north to the east
  - and from north even to sunrise
  lexicon: HALOT
  rationale: מִזְרָח literally refers to the east/sunrise. 'From north to east' is
    clear modern English and preserves the directional sweep of the Hebrew.
- source_word: יְשֹׁטְטוּ
  chosen: they will roam about
  alternatives:
  - they will run to and fro
  - they will go back and forth
  lexicon: HALOT
  rationale: The verb conveys restless movement back and forth. 'Roam about' communicates
    frantic searching in readable modern English; the more formal 'run to and fro'
    is preserved as an alternative.
- source_word: לְבַקֵּשׁ
  chosen: seeking
  alternatives:
  - to seek
  - to search for
  lexicon: HALOT
  rationale: Rendered as 'seeking' to fit smoothly after 'they will roam about' while
    preserving the infinitival purpose sense.
- source_word: דְּבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  - the word from the LORD
  lexicon: HALOT
  rationale: דָּבָר can mean word, matter, or message. In prophetic context, 'the
    word of the LORD' is the standard and most theologically transparent rendering.
    YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered 'the LORD' in keeping with the project's
    stated default for יְהוָה.
- source_word: וְלֹא יִמְצָאוּ
  chosen: but they will not find it
  alternatives:
  - and they will not find it
  - but they will not find any
  lexicon: HALOT
  rationale: English idiom benefits from supplying the object 'it,' referring back
    to 'the word of the LORD.' 'But' brings out the adversative force of the outcome
    in context, though the Hebrew conjunction is simply waw.
