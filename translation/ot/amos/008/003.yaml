id: AMO.8.3
reference: Amos 8:3
source:
  edition: WLC
  text: וְ/הֵילִ֜ילוּ שִׁיר֤וֹת הֵיכָל֙ בַּ/יּ֣וֹם הַ/ה֔וּא נְאֻ֖ם אֲדֹנָ֣/י יְהוִ֑ה
    רַ֣ב הַ/פֶּ֔גֶר בְּ/כָל מָק֖וֹם הִשְׁלִ֥יךְ הָֽס־׃פ
translation:
  text: And the songs of the palace will become wailing in that day, declares the
    Lord GOD. Many will be the corpses; in every place they will throw them out—silence!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the songs of the temple will become wailing.' The Hebrew הֵיכָל can
      mean either 'palace' or 'temple.'
    reason: alternative_reading
  - marker: b
    text: Or 'hush!' / 'be silent!' The final Hebrew הָס is a sharp call for silence,
      likely expressing shock or dread.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵילִילוּ
  chosen: will become wailing
  alternatives:
  - will wail
  - will howl
  - shall lament
  lexicon: HALOT
  rationale: Hiphil of ילל conveys causing or turning into wailing/howling. With שִׁירוֹת
    as subject, the sense is that songs are transformed into lamentation, not merely
    that singers lament.
- source_word: שִׁירוֹת
  chosen: songs
  alternatives:
  - singing songs
  lexicon: HALOT
  rationale: Plural noun from שׁיר, straightforwardly 'songs.' Retained concrete image
    rather than abstract 'music'.
- source_word: הֵיכָל
  chosen: palace
  alternatives:
  - temple
  lexicon: HALOT
  rationale: הֵיכָל can mean temple or palace. In Amos 8 the context is judgment on
    the northern kingdom's elite and public life; 'palace' fits the social-judgment
    setting better here, while 'temple' remains a viable lexical alternative preserved
    in a footnote.
- source_word: בַּיּוֹם הַהוּא
  chosen: in that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Standard prophetic temporal formula. 'In that day' is idiomatic and preserves
    prophetic register.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - declares the Lord GOD
  - utterance of the Lord GOD
  lexicon: HALOT
  rationale: נְאֻם introduces a prophetic declaration formula. Rendered idiomatically
    as 'declares.' אֲדֹנָי יְהוִה is conventionally 'Lord GOD'; YHWH follows doctrine
    default as 'the LORD,' but in this compound title 'Lord GOD' is the standard equivalent
    for אֲדֹנָי יְהוִה.
- source_word: יְהוִה
  chosen: GOD
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Within the compound title אֲדֹנָי יְהוִה, English convention uses 'Lord
    GOD' to avoid 'Lord LORD.' This preserves the distinction while honoring the doctrine
    default for YHWH.
- source_word: רַב
  chosen: Many will be
  alternatives:
  - great is
  - abundant are
  lexicon: HALOT
  rationale: 'Predicate adjective used quantitatively with הַפֶּגֶר; idiomatic English
    requires an existential construction: ''Many will be the corpses.'''
- source_word: הַפֶּגֶר
  chosen: the corpses
  alternatives:
  - the dead bodies
  - the carcasses
  lexicon: HALOT
  rationale: פגר denotes a corpse/dead body. 'Corpses' is vivid and natural in modern
    English.
- source_word: בְּכָל מָקוֹם
  chosen: in every place
  alternatives:
  - everywhere
  - in every location
  lexicon: HALOT
  rationale: Kept the distributive force of the Hebrew rather than smoothing fully
    to 'everywhere.'
- source_word: הִשְׁלִיךְ
  chosen: they will throw them out
  alternatives:
  - one will cast out
  - he will throw out
  lexicon: HALOT
  rationale: Though morphologically 3ms, the verb functions impersonally/collectively
    in context. English plural best conveys the implied agents disposing of corpses.
    'Them' is supplied from context because the object is implicit in the Hebrew but
    required in English.
- source_word: הָס
  chosen: silence!
  alternatives:
  - hush!
  - be silent!
  lexicon: HALOT
  rationale: Interjection/imperative calling for silence, likely underscoring horror
    or stunned quiet after mass death. 'Silence!' preserves abruptness and force.
