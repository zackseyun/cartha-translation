theological_decisions:
- issue: Rendering of the divine name in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord the LORD
  - Lord Yahweh
  rationale: The doctrine default renders YHWH as 'the LORD.' In the fixed Hebrew
    title אֲדֹנָי יְהוִה, however, English convention 'Lord GOD' avoids the awkward
    'Lord LORD' while still signaling the two-part divine title. This is a translation
    convention, not a doctrinal alteration.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
