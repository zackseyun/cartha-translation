id: AMO.8.2
reference: Amos 8:2
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר מָֽה אַתָּ֤ה רֹאֶה֙ עָמ֔וֹס וָ/אֹמַ֖ר כְּל֣וּב קָ֑יִץ וַ/יֹּ֨אמֶר יְהוָ֜ה אֵלַ֗/י בָּ֤א הַ/קֵּץ֙ אֶל עַמִּ֣/י יִשְׂרָאֵ֔ל לֹא אוֹסִ֥יף ע֖וֹד עֲב֥וֹר לֽ/וֹ־־־׃
translation:
  text: And he said, “What do you see, Amos?” And I said, “A basket of summer fruit.” Then Yahweh said to me, “The end has come upon my people Israel; I will not again pass by them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'summer fruit' (qayits) sounds like 'the end' (qets), forming a wordplay that links the vision to the announcement of judgment.
    reason: cultural_note
  - marker: b
    text: Or 'I will not again spare them' / 'I will not again pass over them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר introducing direct speech. 'And he said' preserves Hebrew narrative flow without overinterpreting discourse sequence.
- source_word: מָה אַתָּה רֹאֶה
  chosen: What do you see
  alternatives:
  - What are you seeing
  lexicon: HALOT
  rationale: Idiomatic English present for the participle רֹאֶה in a direct question. This preserves the immediacy of the vision report.
- source_word: עָמוֹס
  chosen: Amos
  rationale: Personal name is transliterated by standard English convention, in keeping with the translation philosophy.
- source_word: כְּלוּב קָיִץ
  chosen: a basket of summer fruit
  alternatives:
  - a basket of ripe fruit
  - a fruit basket
  lexicon: HALOT
  rationale: כְּלוּב denotes a basket/cage-like container, and קָיִץ refers specifically to summer fruit. 'A basket of summer fruit' preserves the lexical sense and the wordplay with הַקֵּץ ('the end') in the following clause better than the more generic 'fruit basket'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בָּא הַקֵּץ
  chosen: The end has come
  alternatives:
  - The end is coming
  - An end has come
  lexicon: HALOT
  rationale: 'Perfect בָּא is best rendered as a completed arrival in prophetic declaration: ''has come.'' The definite noun הַקֵּץ is naturally ''the end.'' This also preserves the sound-play with קָיִץ (''summer fruit'').'
- source_word: אֶל עַמִּי יִשְׂרָאֵל
  chosen: upon my people Israel
  alternatives:
  - against my people Israel
  - to my people Israel
  lexicon: HALOT
  rationale: With בוא plus אֶל in a judgment context, English 'upon' communicates the arrival of judgment more naturally than a merely directional 'to'.
- source_word: לֹא אוֹסִיף עוֹד
  chosen: I will not again
  alternatives:
  - I will no longer
  - I will not continue to
  lexicon: HALOT
  rationale: The idiom expresses cessation of repeated action. 'I will not again' fits the following infinitive and preserves the sense of no further repetition.
- source_word: עֲבוֹר לוֹ
  chosen: pass by them
  alternatives:
  - pass over them
  - spare them
  lexicon: HALOT
  rationale: עבר with this object in prophetic judgment language can mean to pass by in the sense of withholding intervention or sparing no longer. 'Pass by them' is the more formally transparent rendering; the likely sense 'spare them' is preserved in a footnote as a lexical alternative.
