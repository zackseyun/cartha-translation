theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to make explicit the judgment nuance in עֲבוֹר לוֹ
  chosen_reading: I will not again pass by them
  alternative_readings:
  - I will not again spare them
  - I will never again overlook them
  rationale: The Hebrew idiom likely conveys the end of divine forbearance, but the more textually transparent 'pass by them' preserves the underlying metaphor and avoids importing a fuller interpretive gloss into the main text. The more explicit sense is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, preserve theological tension rather than resolve it'
