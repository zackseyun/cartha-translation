id: AMO.8.1
reference: Amos 8:1
source:
  edition: WLC
  text: כֹּ֥ה הִרְאַ֖/נִי אֲדֹנָ֣/י יְהוִ֑ה וְ/הִנֵּ֖ה כְּל֥וּב קָֽיִץ׃
translation:
  text: 'This is what the Lord GOD showed me: behold, a basket of summer fruit.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a basket of ripe fruit.' The Hebrew says 'summer fruit,' a wording that sets up the sound-play with 'end' in the next verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: This is what
  alternatives:
  - Thus
  - Like this
  lexicon: HALOT
  rationale: Introduces the visionary report idiomatically. 'This is what' is natural modern English and preserves the demonstrative force better than the more archaic 'Thus.'
- source_word: הִרְאַנִי
  chosen: showed me
  alternatives:
  - caused me to see
  - let me see
  lexicon: HALOT
  rationale: From ראה in the Hiphil, meaning 'cause to see/show.' In prophetic vision formulae, 'showed me' is the clearest and most idiomatic rendering.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD Yahweh
  lexicon: HALOT
  rationale: The compound divine title is conventionally rendered 'Lord GOD' in English when אֲדֹנָי precedes YHWH, avoiding the awkward 'Lord LORD.' This also aligns with the doctrine default of rendering YHWH as 'the LORD,' adapted here because אֲדֹנָי is already present.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - and behold
  - there was
  lexicon: HALOT
  rationale: Marks sudden presentation within the vision. 'Behold' preserves the deictic vividness and prophetic tone better than flatter alternatives.
- source_word: כְּלוּב
  chosen: basket
  alternatives:
  - cage
  - basket-like container
  lexicon: HALOT
  rationale: In context with קָיִץ ('summer fruit'), the object is best understood as a fruit basket rather than a cage. 'Basket' is the standard contextual sense here.
- source_word: קָיִץ
  chosen: summer fruit
  alternatives:
  - summer produce
  - ripe fruit
  lexicon: HALOT
  rationale: Refers to fruit gathered in summer, not merely the season 'summer.' 'Summer fruit' preserves the lexical link needed for the wordplay with the following verse's קֵץ ('end').
