id: AMO.8.13
reference: Amos 8:13
source:
  edition: WLC
  text: בַּ/יּ֨וֹם הַ/ה֜וּא תִּ֠תְעַלַּפְנָה הַ/בְּתוּלֹ֧ת הַ/יָּפ֛וֹת וְ/הַ/בַּחוּרִ֖ים
    בַּ/צָּמָֽא׃
translation:
  text: In that day the beautiful virgins and the young men will faint from thirst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will swoon from thirst.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  chosen: In that day
  alternatives:
  - On that day
  - In that time
  lexicon: HALOT
  rationale: Temporal prophetic formula. 'In that day' is idiomatic, natural English
    and preserves the demonstrative emphasis of the Hebrew.
- source_word: תִּתְעַלַּפְנָה
  chosen: will faint
  alternatives:
  - will grow faint
  - will swoon
  lexicon: HALOT
  rationale: The Hitpael of עלף conveys becoming faint or swooning from weakness.
    'Will faint' is concise and idiomatic in modern English without overstating the
    imagery.
- source_word: הַבְּתוּלֹת
  chosen: virgins
  alternatives:
  - young women
  - maidens
  lexicon: HALOT
  rationale: בְּתוּלָה ordinarily denotes a virgin/maiden rather than merely a young
    woman. 'Virgins' preserves the lexical specificity of the Hebrew; 'young women'
    would flatten the term.
- source_word: הַיָּפוֹת
  chosen: beautiful
  alternatives:
  - fair
  - lovely
  lexicon: HALOT
  rationale: Adjectival modifier describing the virgins. 'Beautiful' is clear modern
    English; 'fair' is archaic or potentially ambiguous.
- source_word: וְהַבַּחוּרִים
  chosen: and the young men
  alternatives:
  - and the youths
  - and the choice young men
  lexicon: HALOT
  rationale: בָּחוּר commonly refers to young men in the prime of life. 'Young men'
    is the most natural rendering here. 'Choice young men' is possible etymologically
    in some contexts but is not required here.
- source_word: בַּצָּמָא
  chosen: from thirst
  alternatives:
  - with thirst
  - because of thirst
  lexicon: HALOT
  rationale: The preposition with צָמָא expresses the cause or condition producing
    the fainting. 'From thirst' is idiomatic English and fits the context of deprivation
    in the surrounding passage.
