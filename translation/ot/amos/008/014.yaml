theological_decisions:
- issue: Nature of 'the guilt of Samaria'
  chosen_reading: A metonymic reference to Samaria's guilty/idolatrous cult, rendered
    'the guilt of Samaria'
  alternative_readings:
  - '''the sin of Samaria'''
  - a proper name for a deity, 'Ashimah of Samaria'
  rationale: The verse condemns oath-taking by illegitimate cultic referents. Rendering
    אַשְׁמַת as 'guilt' preserves the lexical sense and leaves the metonymic force
    intact without prematurely identifying it as a named deity.
- issue: Meaning of 'the way of Beer-sheba'
  chosen_reading: Retain the literal expression in the main text
  alternative_readings:
  - understood as the pilgrimage to Beer-sheba
  - understood as the cult/practice of Beer-sheba
  rationale: The Hebrew is somewhat idiomatic and cultic. Per translation philosophy,
    preserve the textual tension in the main text and note the interpretive alternative
    rather than resolving it too strongly.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
