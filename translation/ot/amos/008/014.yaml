id: AMO.8.14
reference: Amos 8:14
source:
  edition: WLC
  text: הַ/נִּשְׁבָּעִים֙ בְּ/אַשְׁמַ֣ת שֹֽׁמְר֔וֹן וְ/אָמְר֗וּ חֵ֤י אֱלֹהֶ֨י/ךָ֙
    דָּ֔ן וְ/חֵ֖י דֶּ֣רֶךְ בְּאֵֽר שָׁ֑בַע וְ/נָפְל֖וּ וְ/לֹא יָק֥וּמוּ עֽוֹד־־׃ס
translation:
  text: Those who swear by the guilt of Samaria and say, ‘As your god, Dan, lives,’
    and, ‘As the way of Beer-sheba lives,’ they will fall and never rise again.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the sin of Samaria'; some understand this as a reference to an idol
      or deity associated with Samaria.
    reason: lexical_alternative
  - marker: b
    text: Or 'As your god of Dan lives.'
    reason: lexical_alternative
  - marker: c
    text: '''The way of Beer-sheba'' may refer to the pilgrimage route to Beer-sheba
      or to its cultic practice.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַנִּשְׁבָּעִים
  chosen: Those who swear
  alternatives:
  - those swearing
  - the ones who swear
  lexicon: HALOT
  rationale: Rendered as a substantival participle introducing the group under judgment.
    English relative clause is the most natural equivalent.
- source_word: בְּאַשְׁמַת שֹׁמְרוֹן
  chosen: by the guilt of Samaria
  alternatives:
  - by the sin of Samaria
  - by the Ashimah of Samaria
  lexicon: HALOT
  rationale: אַשְׁמָה commonly denotes guilt or culpability. In context of oath formulas
    tied to idolatry, 'guilt of Samaria' likely refers metonymically to Samaria's
    guilty cult/object of worship. 'Sin of Samaria' is possible, and some take it
    as a deity-name, but the common noun sense best fits the Hebrew and avoids over-specifying.
- source_word: חֵי
  chosen: As ... lives
  alternatives:
  - By the life of ...
  - Surely ... lives
  lexicon: HALOT
  rationale: This is the standard oath formula 'as X lives.' Rendering it idiomatically
    preserves the force of swearing by a living deity or cultic object.
- source_word: אֱלֹהֶיךָ דָּן
  chosen: your god, Dan
  alternatives:
  - your god of Dan
  - O Dan, your god
  lexicon: HALOT
  rationale: The syntax is compressed. The most natural sense is an oath invoking
    the god associated with Dan, with Dan retained as the place-name in apposition.
    'Your god of Dan' is possible but less natural in English.
- source_word: דֶּרֶךְ בְּאֵר שָׁבַע
  chosen: the way of Beer-sheba
  alternatives:
  - the pilgrimage to Beer-sheba
  - the manner of Beer-sheba
  lexicon: HALOT
  rationale: דֶּרֶךְ literally means 'way/road/path.' In this cultic oath context
    it may refer to the pilgrimage route or cultic practice associated with Beer-sheba.
    Main text keeps the more literal 'way' and preserves the interpretive alternative
    in a footnote.
- source_word: וְנָפְלוּ
  chosen: they will fall
  alternatives:
  - and they shall fall
  lexicon: HALOT
  rationale: Simple future in English fits the prophetic judgment sequence.
- source_word: וְלֹא יָקוּמוּ עוֹד
  chosen: and never rise again
  alternatives:
  - and they will not rise again any more
  - and they shall rise no more
  lexicon: HALOT
  rationale: Compressed into natural English while preserving the finality of judgment
    expressed by לֹא ... עוֹד.
