id: AMO.5.24
reference: Amos 5:24
source:
  edition: WLC
  text: וְ/יִגַּ֥ל כַּ/מַּ֖יִם מִשְׁפָּ֑ט וּ/צְדָקָ֖ה כְּ/נַ֥חַל אֵיתָֽן׃
translation:
  text: But let justice roll on like waters, and righteousness like an ever-flowing
    stream.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like water.' The Hebrew uses the plural 'waters,' which can emphasize
      abundance or movement.
    reason: lexical_alternative
  - marker: b
    text: Or 'like a perennial stream.' The Hebrew expression refers to a stream that
      is enduring or does not dry up.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִגַּל
  chosen: let ... roll on
  alternatives:
  - let ... roll
  - let ... surge
  - let ... flow
  lexicon: HALOT
  rationale: 'The jussive/imperfect form after the adversative conjunction is best
    rendered as an exhortation or imperative-like wish: ''let ...''. The verb גלל/related
    form here conveys rolling or flowing movement. ''Roll on'' preserves the vivid
    motion and echoes the image of moving water without over-paraphrasing.'
- source_word: כַּמַּיִם
  chosen: like waters
  alternatives:
  - like water
  lexicon: HALOT
  rationale: The Hebrew noun is morphologically plural. 'Waters' is slightly more
    formal but preserves the Hebrew imagery of abundant moving water better than the
    flatter singular 'water'.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  lexicon: HALOT
  rationale: In this prophetic context, מִשְׁפָּט refers to just social and legal
    order rather than merely a judicial verdict. 'Justice' is the most natural and
    contextually accurate English rendering.
- source_word: וּצְדָקָה
  chosen: righteousness
  alternatives:
  - justice
  - right order
  lexicon: HALOT
  rationale: צְדָקָה often overlaps with justice, but pairing 'justice' and 'righteousness'
    preserves the distinct Hebrew terms and the moral-covenantal dimension of the
    second noun. This also avoids collapsing both terms into the same English word.
- source_word: כְּנַחַל
  chosen: like a ... stream
  alternatives:
  - like a wadi
  - like a torrent
  lexicon: HALOT
  rationale: נַחַל can denote a wadi, torrent-bed, or stream. In English Bible style,
    'stream' communicates the watercourse image clearly. 'Wadi' would be more technical
    and less accessible; 'torrent' may overemphasize violence.
- source_word: אֵיתָן
  chosen: ever-flowing
  alternatives:
  - perennial
  - enduring
  - mighty
  - constant
  lexicon: HALOT
  rationale: The adjective denotes something enduring, perennial, or constant. With
    נַחַל, the sense is a stream that does not dry up. 'Ever-flowing' expresses that
    idea in readable modern English better than the more technical 'perennial,' while
    'mighty' is possible but less likely in this collocation.
