theological_decisions:
- issue: Rendering the ethical pair מִשְׁפָּט / צְדָקָה
  chosen_reading: justice ... righteousness
  alternative_readings:
  - judgment ... justice
  - justice ... rightness
  rationale: The verse calls for covenantally faithful public ethics. Rendering the
    pair as 'justice ... righteousness' preserves both the social/legal and moral
    dimensions without importing a narrower doctrinal scheme. It also maintains lexical
    distinction between the two Hebrew terms.
  doctrine_reference: Translation philosophy §§3, 5
