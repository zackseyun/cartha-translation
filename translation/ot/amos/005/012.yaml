theological_decisions:
- issue: Rendering of צַדִּיק in a social-ethical prophetic context
  chosen_reading: the righteous
  alternative_readings:
  - the innocent
  - the just
  rationale: The term can denote a righteous/just person, sometimes specifically the
    innocent party in court. 'The righteous' preserves the broader moral-legal sense
    without narrowing it only to courtroom innocence.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
