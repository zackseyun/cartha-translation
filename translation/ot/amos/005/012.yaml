id: AMO.5.12
reference: Amos 5:12
source:
  edition: WLC
  text: כִּ֤י יָדַ֨עְתִּי֙ רַבִּ֣ים פִּשְׁעֵי/כֶ֔ם וַ/עֲצֻמִ֖ים חַטֹּֽאתֵי/כֶ֑ם צֹרְרֵ֤י
    צַדִּיק֙ לֹ֣קְחֵי כֹ֔פֶר וְ/אֶבְיוֹנִ֖ים בַּ/שַּׁ֥עַר הִטּֽוּ׃
translation:
  text: For I know how many your transgressions are, and how great your sins are—oppressors
    of the righteous, takers of a bribe, and those who turn aside the needy in the
    gate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"In the gate" refers to the city gate, where legal cases and public decisions
      were commonly handled.'
    reason: cultural_note
  - marker: b
    text: Or "those who deprive the needy of justice at the gate."
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the preceding warning/judgment statement. 'For'
    preserves the explanatory force in natural English.
- source_word: יָדַעְתִּי
  chosen: I know
  alternatives:
  - I have known
  - I am aware
  lexicon: HALOT
  rationale: Qal perfect 1cs of ידע expresses Yahweh's settled knowledge. Present
    English 'I know' best conveys the force here.
- source_word: רַבִּים פִּשְׁעֵיכֶם
  chosen: how many your transgressions are
  alternatives:
  - your transgressions are many
  - many are your rebellions
  lexicon: HALOT
  rationale: Retains the predicate adjective 'many' while making idiomatic English.
    'Transgressions' fits פשע as willful violations/rebellions better than the more
    general 'sins'.
- source_word: וַעֲצֻמִים חַטֹּאתֵיכֶם
  chosen: and how great your sins are
  alternatives:
  - and mighty are your sins
  - and numerous are your sins
  lexicon: HALOT
  rationale: עֲצֻמִים conveys strength/weight/magnitude rather than mere number. 'How
    great' communicates the severity/intensity of their sins in idiomatic English.
- source_word: צֹרְרֵי צַדִּיק
  chosen: oppressors of the righteous
  alternatives:
  - afflicters of the righteous
  - adversaries of the righteous
  - those who harass the righteous
  lexicon: HALOT
  rationale: The participle from צרר here describes hostile treatment. In context
    of social injustice, 'oppressors' best captures active mistreatment. צַדִּיק is
    singular collective/generic; 'the righteous' preserves that force.
- source_word: לֹקְחֵי כֹפֶר
  chosen: takers of a bribe
  alternatives:
  - those who accept a bribe
  - receivers of ransom
  lexicon: HALOT
  rationale: כֹפֶר can denote ransom/payment, but in this judicial-corruption context
    'bribe' is the clearest contextual sense. 'Takers of a bribe' mirrors the participial
    construction.
- source_word: וְאֶבְיוֹנִים
  chosen: the needy
  alternatives:
  - the poor
  - the destitute
  lexicon: HALOT
  rationale: אֶבְיוֹן often denotes the poor/needy in a vulnerable social position.
    'The needy' is natural English and fits the legal-social context.
- source_word: בַּשַּׁעַר
  chosen: in the gate
  alternatives:
  - at the gate
  - in the city gate
  lexicon: HALOT
  rationale: The city gate was the place of legal proceedings and public justice.
    'In the gate' is a fairly standard biblical idiom; the cultural sense is preserved
    and clarified in a footnote.
- source_word: הִטּוּ
  chosen: turn aside
  alternatives:
  - push aside
  - deprive of justice
  - pervert
  lexicon: HALOT
  rationale: Hiphil of נטה here means to turn aside or deny proper course, especially
    in legal settings. 'Turn aside' is formally close; the legal implication is clarified
    by context and footnote.
