id: AMO.5.1
reference: Amos 5:1
source:
  edition: WLC
  text: שִׁמְע֞וּ אֶת הַ/דָּבָ֣ר הַ/זֶּ֗ה אֲשֶׁ֨ר אָנֹכִ֜י נֹשֵׂ֧א עֲלֵי/כֶ֛ם קִינָ֖ה
    בֵּ֥ית יִשְׂרָאֵֽל־׃
translation:
  text: 'Hear this word that I am taking up over you as a lament, O house of Israel:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that I utter concerning you a dirge'; the Hebrew literally says 'that
      I am taking up over you a lament.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen to
  lexicon: HALOT
  rationale: Imperative plural of שׁמע. 'Hear' is the standard concise imperative
    in prophetic address and preserves the summons force without unnecessary expansion.
- source_word: הַדָּבָר הַזֶּה
  chosen: this word
  alternatives:
  - this message
  - this matter
  lexicon: HALOT
  rationale: דבר commonly means 'word' or 'message.' 'This word' keeps the prophetic
    formulaic feel and matches the direct object construction.
- source_word: אֲשֶׁר אָנֹכִי נֹשֵׂא
  chosen: that I am taking up
  alternatives:
  - that I lift up
  - that I utter
  - that I raise
  lexicon: HALOT
  rationale: נשא literally means 'lift/carry/take up.' In context of introducing a
    lament, 'taking up' reflects the idiom of beginning or intoning a lament better
    than the more generic 'utter,' while remaining close to the Hebrew image.
- source_word: עֲלֵיכֶם
  chosen: over you
  alternatives:
  - against you
  - concerning you
  lexicon: HALOT
  rationale: The preposition על with lament language can indicate something spoken
    over someone, often with adversative force. 'Over you' preserves the Hebrew preposition
    and the funeral-dirge nuance; 'against you' is interpretive and stronger than
    necessary in the main text.
- source_word: קִינָה
  chosen: as a lament
  alternatives:
  - a dirge
  - a funeral song
  lexicon: HALOT
  rationale: קינה denotes a lamentation, often a funeral dirge. 'Lament' is clear
    modern English; adding 'as' smooths the English syntax with 'taking up over you.'
- source_word: בֵּית יִשְׂרָאֵל
  chosen: O house of Israel
  alternatives:
  - house of Israel
  lexicon: HALOT
  rationale: Vocative force is likely here, addressing Israel directly after the lament
    formula. 'O' marks the address naturally in English and preserves prophetic solemnity.
