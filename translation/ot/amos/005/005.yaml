id: AMO.5.5
reference: Amos 5:5
source:
  edition: WLC
  text: וְ/אַֽל תִּדְרְשׁוּ֙ בֵּֽית אֵ֔ל וְ/הַ/גִּלְגָּל֙ לֹ֣א תָבֹ֔אוּ וּ/בְאֵ֥ר
    שֶׁ֖בַע לֹ֣א תַעֲבֹ֑רוּ כִּ֤י הַ/גִּלְגָּל֙ גָּלֹ֣ה יִגְלֶ֔ה וּ/בֵֽית אֵ֖ל יִהְיֶ֥ה
    לְ/אָֽוֶן־־־׃
translation:
  text: But do not seek Bethel, and do not enter Gilgal, and do not cross over to
    Beersheba; for Gilgal will surely go into exile, and Bethel will become nothingness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or possibly, “Bethel will become Beth-aven,” preserving a Hebrew wordplay:
      Bethel (“house of God”) is reduced to aven (“nothingness,” “wickedness,” or
      “disaster”).'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּדְרְשׁוּ
  chosen: seek
  alternatives:
  - inquire of
  - resort to
  lexicon: HALOT
  rationale: דרשׁ commonly means 'seek' or 'inquire.' In this prophetic context, with
    named sanctuaries as objects, 'seek' best preserves the religious sense of turning
    to a cult site for help or worship, while echoing the nearby exhortation to 'seek'
    the LORD.
- source_word: בֵּית אֵל
  chosen: Bethel
  alternatives:
  - Beth-el
  - house of God
  lexicon: HALOT
  rationale: This is a place name, so per translation philosophy names are transliterated
    rather than translated. Although the name literally means 'house of God,' the
    referent here is the sanctuary town.
- source_word: תָבֹאוּ
  chosen: enter
  alternatives:
  - come
  - go
  lexicon: HALOT
  rationale: With a named destination, 'enter' gives clear English sense for coming
    into the cult center. It is slightly more idiomatic than a bare 'come' and more
    specific than 'go.'
- source_word: הַגִּלְגָּל
  chosen: Gilgal
  lexicon: HALOT
  rationale: Proper place name; transliterated.
- source_word: תַעֲבֹרוּ
  chosen: cross over to
  alternatives:
  - go to
  - pass through to
  lexicon: HALOT
  rationale: עבר fundamentally means 'cross over/pass over.' Since Beersheba lay at
    a distance and pilgrimage is in view, 'cross over to' preserves the verb's concrete
    force better than the flatter 'go to.'
- source_word: בְאֵר שֶׁבַע
  chosen: Beersheba
  alternatives:
  - Beer-sheba
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard English convention.
- source_word: גָּלֹה יִגְלֶה
  chosen: will surely go into exile
  alternatives:
  - will certainly be exiled
  - will indeed go away captive
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies certainty. 'Will
    surely go into exile' preserves both the emphasis and the exile motif central
    to the prophets.
- source_word: יְהִיֶה לְאָוֶן
  chosen: will become nothingness
  alternatives:
  - will become wickedness
  - will become disaster
  - will become Beth-aven
  lexicon: HALOT
  rationale: אָוֶן can denote trouble, wickedness, or emptiness/vanity. Here, in parallel
    with judgment on cult centers and likely playing on Bethel/Beth-aven, 'nothingness'
    captures the sense of collapse into emptiness and worthlessness without over-specifying
    moral evil. The wordplay is worth preserving in a footnote.
