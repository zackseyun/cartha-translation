theological_decisions:
- issue: Rendering of Bethel's fate in לְאָוֶן
  chosen_reading: Bethel will become nothingness
  alternative_readings:
  - Bethel will become wickedness
  - Bethel will become disaster
  - Bethel will become Beth-aven
  rationale: The Hebrew likely carries both semantic force ('vanity/nothingness' or
    'trouble') and a polemical echo of 'Beth-aven' ('house of wickedness/vanity';
    cf. Hos 4:15; 10:5). The main text keeps readable English and the judgment's force,
    while the footnote preserves the possible wordplay rather than forcing an interpretive
    resolution into the text.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
