id: AMO.5.18
reference: Amos 5:18
source:
  edition: WLC
  text: ה֥וֹי הַ/מִּתְאַוִּ֖ים אֶת י֣וֹם יְהוָ֑ה לָ/מָּה זֶּ֥ה לָ/כֶ֛ם י֥וֹם יְהוָ֖ה
    הוּא חֹ֥שֶׁךְ וְ/לֹא אֽוֹר־־־־׃
translation:
  text: Woe to those who long for the day of the LORD! Why would you have the day
    of the LORD? It is darkness, and not light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Why do you want the day of the LORD?' The Hebrew expression is idiomatic
      and rhetorical.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  chosen: Woe
  alternatives:
  - Ah
  - Alas
  lexicon: HALOT
  rationale: Introduces a prophetic lament/oracle of doom. 'Woe' best preserves the
    force of denunciation in prophetic English without softening it.
- source_word: הַמִּתְאַוִּים
  chosen: those who long for
  alternatives:
  - those who desire
  - those who crave
  lexicon: HALOT
  rationale: The Hitpael participle denotes people characterized by eager desire.
    'Long for' communicates sustained yearning in natural English and fits the ironic
    rebuke.
- source_word: אֶת יּוֹם יְהוָה
  chosen: for the day of the LORD
  alternatives:
  - the day of the LORD
  lexicon: HALOT
  rationale: The object marker with the verb of desire is naturally rendered in English
    with 'for.' 'The day of the LORD' is the established and accurate rendering of
    the prophetic phrase.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    covenantal reference in standard English Bible style.
- source_word: לָמָּה זֶּה לָכֶם
  chosen: Why would you have
  alternatives:
  - Why is this for you
  - Why do you want
  lexicon: HALOT
  rationale: 'The Hebrew is idiomatic and somewhat elliptical. ''Why would you have''
    captures the rhetorical challenge directed at the audience: what benefit do they
    imagine this day will bring them?'
- source_word: יּוֹם יְהוָה הוּא חֹשֶׁךְ וְלֹא אוֹר
  chosen: It is darkness, and not light
  alternatives:
  - It is darkness and not light
  - That day is darkness, not light
  lexicon: HALOT
  rationale: The pronoun הוּא is resumptive/emphatic; rendering it as 'It is' gives
    clear English while preserving the stark contrast. 'Darkness' and 'light' should
    remain literal because the prophetic metaphor is central and transparent.
