id: AMO.5.25
reference: Amos 5:25
source:
  edition: WLC
  text: הַ/זְּבָחִ֨ים וּ/מִנְחָ֜ה הִֽגַּשְׁתֶּם לִ֧/י בַ/מִּדְבָּ֛ר אַרְבָּעִ֥ים שָׁנָ֖ה
    בֵּ֥ית יִשְׂרָאֵֽל־׃
translation:
  text: Did you bring me sacrifices and offerings in the wilderness for forty years,
    O house of Israel?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sacrifices and grain offerings.' The Hebrew word for 'offerings' can
      refer more specifically to a grain offering in cultic contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַזְּבָחִים
  chosen: sacrifices
  alternatives:
  - slaughter offerings
  - sacrificial offerings
  lexicon: HALOT
  rationale: זֶבַח commonly denotes a sacrifice, often involving slaughter. 'Sacrifices'
    is the most natural and sufficiently precise English rendering in this rhetorical
    question.
- source_word: וּמִנְחָה
  chosen: and offerings
  alternatives:
  - and grain offering
  - and tribute
  lexicon: HALOT
  rationale: מִנְחָה can denote a gift/tribute or specifically a grain offering in
    cultic contexts. Here, paired with sacrifices in a worship setting, 'offerings'
    preserves the broader cultic sense in readable English, while the more specific
    'grain offering' remains a viable lexical alternative.
- source_word: הִגַּשְׁתֶּם
  chosen: Did you bring
  alternatives:
  - Did you present
  - Did you offer
  lexicon: HALOT
  rationale: The Hiphil of נגשׁ here refers to bringing/presenting offerings. Because
    English idiom naturally says one 'brings' sacrifices and offerings, 'Did you bring'
    best captures both the action and the rhetorical force.
- source_word: לִי
  chosen: me
  alternatives:
  - to me
  lexicon: HALOT
  rationale: The indirect object is naturally expressed in English as 'bring me' rather
    than the more wooden 'bring to me.'
- source_word: בַמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר is conventionally and appropriately rendered 'wilderness' in
    Israel's exodus-wandering context; this also preserves biblical intertextual resonance.
- source_word: אַרְבָּעִים שָׁנָה
  chosen: for forty years
  alternatives:
  - forty years
  lexicon: HALOT
  rationale: The phrase denotes duration during the wilderness period. 'For forty
    years' expresses that duration clearly in English.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: O house of Israel
  alternatives:
  - house of Israel
  - people of Israel
  lexicon: HALOT
  rationale: בֵּית יִשְׂרָאֵל is a standard prophetic address. 'O house of Israel'
    preserves the vocative force and prophetic tone better than the flatter 'people
    of Israel.'
