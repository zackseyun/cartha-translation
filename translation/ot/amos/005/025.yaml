theological_decisions:
- issue: Rhetorical force of the verse in context
  chosen_reading: Render as a rhetorical question expecting a negative or sharply
    challenging answer, without making the implied answer explicit in translation.
  alternative_readings:
  - Render as a plain question without rhetorical sharpening
  - Paraphrase the implication as 'You did not really bring me...'
  rationale: The Hebrew interrogative construction and Amos's surrounding rebuke indicate
    a rhetorical challenge. The translation preserves that force with a direct question
    but does not import an interpretive paraphrase beyond the text itself.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; never paraphrase beyond what the source text warrants.'
