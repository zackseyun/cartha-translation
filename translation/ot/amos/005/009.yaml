theological_decisions:
- issue: Subject identification
  chosen_reading: The subject is left as the Hebrew participial expression 'He who
    ...,' implicitly referring to God from the surrounding context.
  alternative_readings:
  - An impersonal force that brings destruction
  rationale: The verse is part of a doxological description of the LORD's power in
    context (Amos 5:8–9). English capitalization is avoided to prevent importing more
    interpretation than necessary, but the syntax and context support a divine subject.
