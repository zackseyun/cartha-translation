id: AMO.5.9
reference: Amos 5:9
source:
  edition: WLC
  text: הַ/מַּבְלִ֥יג שֹׁ֖ד עַל עָ֑ז וְ/שֹׁ֖ד עַל מִבְצָ֥ר יָבֽוֹא־־׃
translation:
  text: He who flashes destruction upon the strong, so that destruction comes upon
    the fortress.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He who causes devastation to burst forth upon the mighty.' The Hebrew
      verb is rare and difficult, and some take it differently.
    reason: lexical_alternative
  - marker: b
    text: '''Fortress'' could also be rendered ''stronghold'' or ''fortified place.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּבְלִיג
  chosen: He who flashes
  alternatives:
  - He who causes to burst forth
  - He who brings suddenly
  - He who strengthens
  lexicon: HALOT
  rationale: The Hiphil participle functions substantivally ('the one who ...'). The
    verb is difficult and relatively rare; in context with שֹׁד ('destruction') and
    the following clause, it most plausibly conveys the sudden causing-forth or flashing
    forth of ruin. 'Flashes' preserves the abruptness and vividness without over-paraphrasing.
    'Strengthens' is a less likely traditional alternative because it does not fit
    the immediate parallelism with destruction coming on a fortress as well.
- source_word: שֹׁד
  chosen: destruction
  alternatives:
  - devastation
  - violence
  - plunder
  lexicon: HALOT
  rationale: The noun commonly denotes violent ruin, devastation, or spoil. Here the
    sense is not merely loot but destructive overthrow, especially in parallel with
    ruin coming upon a fortress. 'Destruction' is the clearest modern English rendering.
- source_word: עַל
  chosen: upon
  alternatives:
  - against
  - over
  lexicon: HALOT
  rationale: In both occurrences the preposition marks the object or target of the
    destructive action. 'Upon' preserves the Hebrew imagery and works idiomatically
    in English poetry.
- source_word: עָז
  chosen: the strong
  alternatives:
  - the strong one
  - the mighty
  lexicon: HALOT
  rationale: The adjective is used substantivally. 'The strong' best captures the
    class sense in concise English and fits the social/political context of powerful
    persons or powers.
- source_word: וְשֹׁד
  chosen: so that destruction
  alternatives:
  - and destruction
  - with destruction
  lexicon: HALOT
  rationale: The conjunction links a second, closely related clause. Because English
    style benefits from making the resultative force explicit, 'so that destruction'
    brings out the progression from God's action to the ruin that reaches the fortress
    while remaining close to the Hebrew.
- source_word: מִבְצָר
  chosen: the fortress
  alternatives:
  - stronghold
  - fortified place
  lexicon: HALOT
  rationale: The noun denotes a fortified stronghold. 'Fortress' is natural, vivid,
    and matches the military imagery of the verse.
- source_word: יָבֹוא
  chosen: comes
  alternatives:
  - enters
  - falls
  - overtakes
  lexicon: HALOT
  rationale: The basic sense is 'comes' or 'enters.' With 'destruction' as subject
    and 'fortress' as destination, 'comes upon' is idiomatic and preserves the Hebrew
    verbal simplicity.
