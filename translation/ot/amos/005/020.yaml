id: AMO.5.20
reference: Amos 5:20
source:
  edition: WLC
  text: הֲ/לֹא חֹ֛שֶׁךְ י֥וֹם יְהוָ֖ה וְ/לֹא א֑וֹר וְ/אָפֵ֖ל וְ/לֹא נֹ֥גַֽהּ לֽ/וֹ־־־׃
translation:
  text: Is not the day of Yahweh darkness, and not light, and gloom with no brightness in it?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and gloom, with no shining for it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Is not
  alternatives:
  - Surely
  - Indeed
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. 'Is not' preserves the interrogative force more directly than an assertive paraphrase like 'surely.'
- source_word: חֹשֶׁךְ
  chosen: darkness
  alternatives:
  - dark
  - gloom
  lexicon: HALOT
  rationale: The noun denotes darkness. 'Darkness' is the most natural English equivalent here and pairs clearly with 'light' in the antithesis.
- source_word: יוֹם יְהוָה
  chosen: the day of the LORD
  alternatives:
  - the LORD's day
  - the day of Yahweh
  lexicon: HALOT
  rationale: This is the established prophetic expression for divine judgment. 'The LORD' follows the doctrine's default rendering for יְהוָה, and 'day of the LORD' preserves the source phrase without importing later technical nuances of 'the Lord's Day.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְלֹא אוֹר
  chosen: and not light
  alternatives:
  - and no light
  lexicon: HALOT
  rationale: The Hebrew repeats the negation for emphasis. 'And not light' preserves the rhetorical parallelism more closely than smoothing to 'and no light.'
- source_word: וְאָפֵל
  chosen: even gloom
  alternatives:
  - and gloom
  - deep darkness
  lexicon: HALOT
  rationale: אָפֵל intensifies the image beyond ordinary darkness. 'Even gloom' captures the climactic force while reading naturally in English; 'deep darkness' is possible but slightly more interpretive.
- source_word: וְלֹא נֹגַהּ לוֹ
  chosen: with no brightness in it
  alternatives:
  - and no brightness for it
  - and no shining in it
  lexicon: HALOT
  rationale: נֹגַהּ denotes brightness or shining. The pronoun לוֹ refers back to 'the day.' English idiom prefers 'in it' rather than the more wooden 'for it,' while preserving the sense that the day contains no gleam of light.
