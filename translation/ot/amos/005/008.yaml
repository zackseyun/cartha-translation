id: AMO.5.8
reference: Amos 5:8
source:
  edition: WLC
  text: עֹשֵׂ֨ה כִימָ֜ה וּ/כְסִ֗יל וְ/הֹפֵ֤ךְ לַ/בֹּ֨קֶר֙ צַלְמָ֔וֶת וְ/י֖וֹם לַ֣יְלָה הֶחְשִׁ֑יךְ הַ/קּוֹרֵ֣א לְ/מֵֽי הַ/יָּ֗ם וַֽ/יִּשְׁפְּכֵ֛/ם עַל פְּנֵ֥י הָ/אָ֖רֶץ יְהוָ֥ה שְׁמֽ/וֹ־־׃ס
translation:
  text: He who made the Pleiades and Orion, and turns deep darkness into morning, and darkens day into night, who calls for the waters of the sea and pours them out over the face of the earth—Yahweh is his name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; alternatively rendered ''Yahweh.'''
    reason: alternative_reading
  - marker: b
    text: Or 'the shadow of death' for 'deep darkness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹשֵׂה
  chosen: He who made
  alternatives:
  - the one who makes
  - maker of
  lexicon: HALOT
  rationale: Qal participle masculine singular functions substantivally, introducing a descriptive clause about God. English relative clause 'He who made' is natural and preserves the participial force in context.
- source_word: כִימָה
  chosen: the Pleiades
  alternatives:
  - Kimah
  lexicon: HALOT
  rationale: The term is traditionally and plausibly identified with the star cluster Pleiades. Translating rather than transliterating best communicates the referent to English readers.
- source_word: כְסִיל
  chosen: Orion
  alternatives:
  - Kesil
  - the Fool
  lexicon: HALOT
  rationale: In this astronomical pairing with כימה, the referent is best taken as the constellation Orion. Although the lexical root can mean 'fool,' the celestial sense is demanded by context.
- source_word: וְהֹפֵךְ
  chosen: and turns
  alternatives:
  - and transforms
  - and changes
  lexicon: HALOT
  rationale: Participial form parallel to עֹשֵׂה and הַקּוֹרֵא. 'Turns' is concise and idiomatic for reversal/transformation imagery.
- source_word: צַלְמָוֶת
  chosen: deep darkness
  alternatives:
  - the shadow of death
  - gloom
  lexicon: HALOT
  rationale: The term can denote profound darkness or death-shadow. In this cosmic day/night context, 'deep darkness' fits the immediate sense better than the more traditional but potentially misleading 'shadow of death.'
- source_word: לַבֹּקֶר
  chosen: into morning
  alternatives:
  - to morning
  - into dawn
  lexicon: HALOT
  rationale: With the verb 'turns,' English idiom prefers 'into morning.' 'Morning' is broader and more natural than 'dawn' here.
- source_word: וְיוֹם לַיְלָה הֶחְשִׁיךְ
  chosen: and darkens day into night
  alternatives:
  - and makes day dark into night
  - and turns day into night
  lexicon: HALOT
  rationale: The Hiphil of חשׁך emphasizes causing darkness. 'Darkens day into night' preserves both the causative nuance and the transformation parallelism.
- source_word: הַקּוֹרֵא
  chosen: who calls for
  alternatives:
  - who summons
  - who calls to
  lexicon: HALOT
  rationale: The participle continues the chain of divine actions. 'Calls for' captures summoning the waters at God's command.
- source_word: לְמֵי הַיָּם
  chosen: the waters of the sea
  alternatives:
  - the waters of the ocean
  lexicon: HALOT
  rationale: Straightforward construct phrase. 'Sea' is the standard rendering and preserves biblical diction.
- source_word: וַיִּשְׁפְּכֵם
  chosen: and pours them out
  alternatives:
  - and spills them
  - and empties them out
  lexicon: HALOT
  rationale: The verb denotes pouring out; the 3mp suffix refers back to the waters. Present tense in English fits the ongoing descriptive style of the verse despite the Hebrew wayyiqtol form in poetic context.
- source_word: עַל־פְּנֵי הָאָרֶץ
  chosen: over the face of the earth
  alternatives:
  - upon the surface of the earth
  - over the earth
  lexicon: HALOT
  rationale: This preserves the Hebrew idiom פני הארץ while remaining clear in English. Slightly more formal wording suits the elevated poetic register.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שְׁמוֹ
  chosen: is his name
  alternatives:
  - his name is
  lexicon: HALOT
  rationale: Both are possible; 'is his name' preserves the Hebrew word order emphasis while remaining natural in English.
