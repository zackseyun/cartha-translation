id: AMO.5.14
reference: Amos 5:14
source:
  edition: WLC
  text: דִּרְשׁוּ ט֥וֹב וְ/אַל רָ֖ע לְמַ֣עַן תִּֽחְי֑וּ וִ/יהִי כֵ֞ן יְהוָ֧ה אֱלֹהֵֽי
    צְבָא֛וֹת אִתְּ/כֶ֖ם כַּ/אֲשֶׁ֥ר אֲמַרְתֶּֽם־־־־׃
translation:
  text: Seek good and not evil, so that you may live; and so the LORD, the God of
    hosts, will be with you, as you have said.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as you say.' The Hebrew perfect may refer to what they have previously
      claimed about the LORD's presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּרְשׁוּ
  chosen: Seek
  alternatives:
  - Pursue
  - Strive for
  lexicon: HALOT
  rationale: דרשׁ commonly means to seek, inquire, or pursue. In prophetic exhortation,
    'seek' is the most natural and established English equivalent, preserving both
    moral and covenantal force without over-paraphrasing.
- source_word: טוֹב
  chosen: good
  alternatives:
  - what is good
  lexicon: HALOT
  rationale: טוֹב here functions substantivally/adjectivally in contrast with רָע.
    'Good' is concise and idiomatic in English, matching the Hebrew moral contrast.
- source_word: וְאַל רָע
  chosen: and not evil
  alternatives:
  - and not what is evil
  - and not harm
  lexicon: HALOT
  rationale: אַל with the contrasting adjective/substantive gives a prohibition or
    negative counterpart to the imperative. 'And not evil' preserves the terse antithesis
    of the Hebrew better than an expanded paraphrase.
- source_word: לְמַעַן תִּחְיוּ
  chosen: so that you may live
  alternatives:
  - that you may live
  - in order that you may live
  lexicon: HALOT
  rationale: למען marks purpose/result. 'So that you may live' is clear modern English
    and preserves the purpose nuance. 'Live' here likely includes covenantal flourishing
    and survival under judgment, but the text itself simply says 'live.'
- source_word: וִיהִי כֵן
  chosen: and so ... will be
  alternatives:
  - and thus ... shall be
  - then ... will indeed be
  lexicon: HALOT
  rationale: 'The jussive/imperfect form with כֵן expresses the desired or consequent
    state: if they seek good, then it will indeed be so. In English, ''and so ...
    will be'' best captures the consequential force in a readable way.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of YHWH is 'the LORD.' This follows
    the stated translation policy and standard English Bible convention.
- source_word: אֱלֹהֵי צְבָאוֹת
  chosen: the God of hosts
  alternatives:
  - God of armies
  - God of heavenly armies
  lexicon: HALOT
  rationale: This title is traditionally and accurately rendered 'God of hosts.' 'Hosts'
    preserves the breadth of צבאות, which may include heavenly and earthly armies,
    without narrowing the referent.
- source_word: אִתְּכֶם
  chosen: with you
  alternatives:
  - among you
  lexicon: HALOT
  rationale: The preposition את with pronominal suffix here indicates presence 'with
    you.' 'Among you' is possible in some contexts, but 'with you' is the more direct
    rendering.
- source_word: כַּאֲשֶׁר אֲמַרְתֶּם
  chosen: as you have said
  alternatives:
  - as you say
  - just as you have claimed
  lexicon: HALOT
  rationale: The perfect verb points to their prior claim that the LORD was with them.
    'As you have said' preserves that retrospective nuance better than the more generic
    present 'as you say.'
