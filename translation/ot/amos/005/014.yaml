theological_decisions:
- issue: Whether the promise 'the LORD ... will be with you' should be rendered as
    an unconditional declaration or as contingent on the imperative
  chosen_reading: 'Rendered as a contingent consequence of seeking good: ''and so
    ... will be with you'''
  alternative_readings:
  - 'Rendered more statively: ''and thus the LORD ... is with you'''
  rationale: In context, Amos is calling Israel to repentance and linking life and
    divine presence to their response. The Hebrew sequence supports a consequential
    reading rather than an unconditional affirmation of their current status. This
    also fits the final clause, which alludes to their claim that God is with them.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
