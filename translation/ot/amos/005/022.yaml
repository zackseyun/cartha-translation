theological_decisions:
- issue: Rendering Israel's sacrificial terms in a way that preserves their cultic
    specificity without importing later doctrinal interpretation
  chosen_reading: 'Specific sacrificial categories are retained: ''burnt offerings,''
    ''grain offerings,'' and ''peace offerings.'''
  alternative_readings:
  - More generalized renderings such as 'sacrifices' or 'offerings'
  rationale: The verse critiques worship not by rejecting sacrifice in the abstract
    but by rejecting specific covenantal offerings offered hypocritically. Retaining
    the categories preserves the prophetic force and avoids flattening the text.
  doctrine_reference: Translation philosophy §§1, 5, 6
