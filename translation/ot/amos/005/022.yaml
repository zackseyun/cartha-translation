id: AMO.5.22
reference: Amos 5:22
source:
  edition: WLC
  text: כִּ֣י אִם תַּעֲלוּ לִ֥/י עֹל֛וֹת וּ/מִנְחֹתֵי/כֶ֖ם לֹ֣א אֶרְצֶ֑ה וְ/שֶׁ֥לֶם
    מְרִיאֵי/כֶ֖ם לֹ֥א אַבִּֽיט־־׃
translation:
  text: For even if you offer up to me burnt offerings and your grain offerings, I
    will not accept them; and I will not look upon the peace offerings of your fattened
    animals.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fellowship offerings' for 'peace offerings.' The Hebrew term denotes
      a specific sacrificial category associated with well-being and communion.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: For even if
  alternatives:
  - Even if
  - Though
  lexicon: HALOT
  rationale: The combination introduces a concessive sense in context, linking back
    to the preceding denunciation. 'For even if' preserves both the connective force
    and the concessive nuance better than a bare 'if.'
- source_word: תַּעֲלוּ לִי
  chosen: you offer up to me
  alternatives:
  - you bring to me
  - you present to me
  lexicon: HALOT
  rationale: The Hiphil of עלה with sacrificial objects commonly means to offer up
    sacrificially, especially by causing to ascend on the altar. 'Offer up' preserves
    the sacrificial idiom better than the more generic 'bring' or 'present.'
- source_word: עֹלוֹת
  chosen: burnt offerings
  alternatives:
  - whole burnt offerings
  lexicon: HALOT
  rationale: Standard cultic term for offerings wholly burned. 'Burnt offerings' is
    the clearest established English equivalent.
- source_word: וּמִנְחֹתֵיכֶם
  chosen: and your grain offerings
  alternatives:
  - and your offerings
  - and your tribute offerings
  lexicon: HALOT
  rationale: מִנְחָה in sacrificial contexts commonly denotes a grain offering rather
    than a generic gift. 'Grain offerings' makes the cultic reference explicit and
    readable.
- source_word: לֹא אֶרְצֶה
  chosen: I will not accept them
  alternatives:
  - I will not be pleased
  - I will not favor
  lexicon: HALOT
  rationale: The verb רצה here conveys favorable acceptance of a sacrifice. 'Accept
    them' communicates the sacrificial sense naturally in English; 'them' is supplied
    for idiomatic clarity from the plural offerings.
- source_word: וְשֶׁלֶם
  chosen: and ... the peace offerings
  alternatives:
  - and ... the fellowship offerings
  - and ... the shared offerings
  lexicon: HALOT
  rationale: שֶׁלֶם/שְׁלָמִים denotes a well-known category of sacrifice traditionally
    rendered 'peace offerings.' Although 'fellowship offerings' is possible, 'peace
    offerings' better preserves lexical continuity with the Hebrew sacrificial system.
- source_word: מְרִיאֵיכֶם
  chosen: of your fattened animals
  alternatives:
  - of your fatlings
  - of your stall-fed beasts
  lexicon: HALOT
  rationale: The noun refers to fattened livestock. 'Fattened animals' is accurate
    and accessible modern English, avoiding archaic 'fatlings.'
- source_word: לֹא אַבִּיט
  chosen: I will not look upon
  alternatives:
  - I will not regard
  - I will not pay attention to
  lexicon: HALOT
  rationale: נבט in this context means to look at with regard or attention. 'Look
    upon' preserves the visual metaphor and the sense of refusing regard.
