theological_decisions:
- issue: Gender rendering of הַמַּשְׂכִּיל
  chosen_reading: the prudent man
  alternative_readings:
  - the prudent one
  - the wise person
  rationale: The Hebrew is grammatically masculine singular and likely representative.
    Per translation philosophy, gender-accurate rendering is preferred over flattening
    to a gender-neutral expression, while the representative sense can be noted in
    a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
