id: AMO.5.13
reference: Amos 5:13
source:
  edition: WLC
  text: לָ/כֵ֗ן הַ/מַּשְׂכִּ֛יל בָּ/עֵ֥ת הַ/הִ֖יא יִדֹּ֑ם כִּ֛י עֵ֥ת רָעָ֖ה הִֽיא׃
translation:
  text: Therefore the prudent man keeps silent at that time, for it is an evil time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wise person' or 'the discerning one'; the Hebrew is masculine singular,
      used here in a representative sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - Thus
  lexicon: HALOT
  rationale: Marks an inferential conclusion from the preceding indictment; 'Therefore'
    preserves the logical force clearly in English.
- source_word: הַמַּשְׂכִּיל
  chosen: the prudent man
  alternatives:
  - the wise man
  - the discerning man
  - the one with insight
  lexicon: HALOT
  rationale: From שכל in the Hiphil participial form, denoting one who acts with insight
    or prudence. 'Prudent' fits the practical sense in context. 'Man' is retained
    because the Hebrew form is grammatically masculine singular and the translation
    philosophy prefers gender-accurate rendering where representative force is present.
- source_word: בָּעֵת הַהִיא
  chosen: at that time
  alternatives:
  - in that time
  - in that season
  lexicon: HALOT
  rationale: A temporal phrase referring to the specific moment or period under discussion.
    'At that time' is idiomatic and sufficiently precise.
- source_word: יִדֹּם
  chosen: keeps silent
  alternatives:
  - is silent
  - falls silent
  - is still
  lexicon: HALOT
  rationale: From דמם, to be silent or still. 'Keeps silent' conveys both the action
    and the ongoing restraint implied in context better than a merely stative English
    form.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the silence. 'For' is concise and natural in
    English biblical style without sounding archaic here.
- source_word: עֵת רָעָה
  chosen: an evil time
  alternatives:
  - a bad time
  - a time of evil
  - a disastrous time
  lexicon: HALOT
  rationale: The phrase denotes a time characterized by evil, not merely inconvenience.
    'Evil time' preserves the moral and societal weight of רָעָה better than 'bad
    time.'
- source_word: הִיא
  chosen: it is
  alternatives:
  - this is
  lexicon: HALOT
  rationale: 'The feminine pronoun refers back to עֵת (''time''). English requires
    an impersonal rendering: ''it is.'''
