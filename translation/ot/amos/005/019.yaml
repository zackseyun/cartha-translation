id: AMO.5.19
reference: Amos 5:19
source:
  edition: WLC
  text: כַּ/אֲשֶׁ֨ר יָנ֥וּס אִישׁ֙ מִ/פְּנֵ֣י הָ/אֲרִ֔י וּ/פְגָע֖/וֹ הַ/דֹּ֑ב וּ/בָ֣א
    הַ/בַּ֔יִת וְ/סָמַ֤ךְ יָד/וֹ֙ עַל הַ/קִּ֔יר וּ/נְשָׁכ֖/וֹ הַ/נָּחָֽשׁ־׃
translation:
  text: It will be as when a man flees from before the lion, and the bear meets him;
    then he enters the house and leans his hand on the wall, and the snake bites him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the bear encounters him' or 'the bear falls upon him.' The Hebrew verb
      can denote meeting, encountering, or striking upon, depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'serpent.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  chosen: as when
  alternatives:
  - like when
  - just as when
  lexicon: HALOT
  rationale: Introduces a comparison/simile tied to the previous verse's description
    of the day of the LORD. 'As when' is idiomatic and preserves the comparative force.
- source_word: יָנוּס
  chosen: flees
  alternatives:
  - runs away
  - escapes
  lexicon: HALOT
  rationale: The verb denotes fleeing in fear or danger. 'Flees' is concise and preserves
    the urgency better than the more general 'runs away.'
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: The Hebrew is singular masculine and generic. Per gender-accurate policy,
    'a man' best matches the source form and representative force.
- source_word: מִפְּנֵי
  chosen: from before
  alternatives:
  - from
  - away from
  lexicon: HALOT
  rationale: Literally 'from before/from the presence of.' 'From before' preserves
    the vivid Hebrew idiom in readable English.
- source_word: הָאֲרִי
  chosen: the lion
  lexicon: HALOT
  rationale: Straightforward lexical rendering.
- source_word: וּפְגָעוֹ
  chosen: the bear meets him
  alternatives:
  - the bear encounters him
  - the bear falls upon him
  lexicon: HALOT
  rationale: פגע can mean meet, encounter, or strike upon depending on context. Here
    the sequence of dangers is vivid without requiring an explicitly violent gloss
    in English; 'meets him' preserves the irony and menace, with the dangerous context
    supplying the threat.
- source_word: הַדֹּב
  chosen: the bear
  lexicon: HALOT
  rationale: Straightforward lexical rendering.
- source_word: וּבָא הַבַּיִת
  chosen: then he enters the house
  alternatives:
  - and he goes into the house
  - and he comes into the house
  lexicon: HALOT
  rationale: בוא with 'house' here means entering the house. 'Then' helps English
    narrative flow while reflecting the sequential waw-consecutive.
- source_word: וְסָמַךְ יָדוֹ
  chosen: and leans his hand
  alternatives:
  - and rests his hand
  - and supports himself with his hand
  lexicon: HALOT
  rationale: סמך means to lean, support, or rest upon. 'Leans his hand' fits the scene
    of apparent safety and keeps the action concrete.
- source_word: עַל הַקִּיר
  chosen: on the wall
  alternatives:
  - against the wall
  lexicon: HALOT
  rationale: Either 'on' or 'against' is possible in English; 'on the wall' is natural
    with 'leans his hand' and closely follows the preposition עַל.
- source_word: וּנְשָׁכוֹ
  chosen: and the snake bites him
  alternatives:
  - and a snake bites him
  - and the serpent bites him
  lexicon: HALOT
  rationale: The verb means 'bite' with 3ms object suffix. Rendering the subject explicitly
    in English after the verb gives natural word order while preserving the sudden
    final danger.
- source_word: הַנָּחָשׁ
  chosen: the snake
  alternatives:
  - the serpent
  lexicon: HALOT
  rationale: נחשׁ can be 'snake' or 'serpent.' 'Snake' is more accessible modern English
    and suits the concrete imagery here; 'serpent' is preserved as an alternative
    lexical possibility.
