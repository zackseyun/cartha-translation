id: AMO.5.17
reference: Amos 5:17
source:
  edition: WLC
  text: וּ/בְ/כָל כְּרָמִ֖ים מִסְפֵּ֑ד כִּֽי אֶעֱבֹ֥ר בְּ/קִרְבְּ/ךָ֖ אָמַ֥ר יְהוָֽה־־׃ס
translation:
  text: And in all the vineyards there will be wailing, for I will pass through your
    midst," says the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mourning' or 'lamentation' for 'wailing.' The Hebrew term refers to
      public grieving, often expressed audibly.
    reason: lexical_alternative
  - marker: b
    text: '''I will pass through your midst'' may echo earlier biblical language of
      divine visitation in judgment; compare Exodus 12:12. The verse itself does not
      make the allusion explicit.'
    reason: cross_reference
lexical_decisions:
- source_word: וּ/בְ/כָל
  chosen: And in all
  alternatives:
  - And through all
  - And in every
  lexicon: HALOT
  rationale: 'The conjunction plus preposition and quantifier naturally introduces
    the next locale in the series of lament scenes: ''and in all.'' ''All'' is retained
    rather than smoothing to a less explicit collective.'
- source_word: כְּרָמִים
  chosen: the vineyards
  alternatives:
  - vineyards
  lexicon: HALOT
  rationale: The plural noun denotes vineyard areas. English idiom prefers the definite
    form here in a distributive sense after 'in all.'
- source_word: מִסְפֵּד
  chosen: there will be wailing
  alternatives:
  - lamentation
  - mourning
  lexicon: HALOT
  rationale: The noun refers to lamentation or mourning, often public mourning with
    audible grief. 'Wailing' best conveys the sound and emotional force in readable
    modern English. 'There will be' is supplied idiomatically since Hebrew often omits
    the copula in such verbless clauses.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here it introduces the reason for the wailing. 'For' preserves the explanatory
    force concisely.
- source_word: אֶעֱבֹר
  chosen: I will pass through
  alternatives:
  - I will pass by
  - I will go through
  lexicon: HALOT
  rationale: The verb עבר with the following prepositional phrase indicates movement
    through the people's midst. 'Pass through' preserves the likely allusion to divine
    visitation in judgment, echoing Exodus language without overinterpreting it.
- source_word: בְּ/קִרְבְּ/ךָ
  chosen: your midst
  alternatives:
  - among you
  - in your midst
  lexicon: HALOT
  rationale: The singular suffix likely addresses Israel collectively. 'Your midst'
    keeps the second-person singular and the spatial imagery. 'In' is absorbed into
    the English idiom after 'pass through.'
- source_word: אָמַר יְהוָה
  chosen: says the LORD
  alternatives:
  - said the LORD
  - declares the LORD
  lexicon: HALOT
  rationale: The prophetic formula is conventionally rendered in present tense in
    English to mark divine utterance. Per doctrine, יְהוָה is rendered 'the LORD'
    rather than a transliteration.
