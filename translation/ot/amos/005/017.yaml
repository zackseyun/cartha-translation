theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of divine movement in judgment
  chosen_reading: I will pass through your midst
  alternative_readings:
  - I will pass by in your midst
  rationale: The phrase is left as a direct statement of divine presence in judgment,
    preserving the tension of possible Exodus resonance without making the allusion
    explicit in the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
