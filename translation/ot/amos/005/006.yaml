id: AMO.5.6
reference: Amos 5:6
source:
  edition: WLC
  text: דִּרְשׁ֥וּ אֶת יְהוָ֖ה וִֽ/חְי֑וּ פֶּן יִצְלַ֤ח כָּ/אֵשׁ֙ בֵּ֣ית יוֹסֵ֔ף וְ/אָכְלָ֥ה וְ/אֵין מְכַבֶּ֖ה לְ/בֵֽית אֵֽל־־־־׃
translation:
  text: Seek Yahweh and live, lest he break out like fire in the house of Joseph, and it consume, with no one to quench it for Bethel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lest it break out like fire'; the Hebrew verb's subject is implicit, though the LORD is the most likely referent from the preceding clause.
    reason: alternative_reading
  - marker: b
    text: Bethel was a major sanctuary in the northern kingdom; the Hebrew can be rendered very literally 'and there is no one to quench for Bethel.'
    reason: cultural_note
lexical_decisions:
- source_word: דִּרְשׁוּ
  chosen: Seek
  alternatives:
  - Seek after
  - Inquire of
  lexicon: HALOT
  rationale: Imperative plural of דרשׁ in covenantal/prophetic context commonly means to seek God, not merely to ask about him. 'Seek' is concise and idiomatic in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וִחְיוּ
  chosen: and live
  alternatives:
  - so that you may live
  - and you will live
  lexicon: HALOT
  rationale: The conjunction plus imperative/jussive-like sequence after an imperative can express result or consequence. 'And live' preserves the Hebrew terseness while naturally conveying the promised outcome.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - or else
  lexicon: HALOT
  rationale: Introduces a warning of undesirable consequence. 'Lest' is compact and fits prophetic warning style.
- source_word: יִצְלַח
  chosen: he break out
  alternatives:
  - it break out
  - rush forth
  - prosper
  lexicon: HALOT
  rationale: In this context with 'like fire,' the verb cannot mean 'prosper'; it carries the sense of bursting forth or rushing upon. The subject is best taken as the LORD from the prior clause, yielding 'he break out like fire.'
- source_word: כָּאֵשׁ
  chosen: like fire
  alternatives:
  - as fire
  lexicon: HALOT
  rationale: Straightforward comparative phrase; 'like fire' is idiomatic modern English.
- source_word: בֵּית יוֹסֵף
  chosen: the house of Joseph
  alternatives:
  - Joseph's house
  lexicon: HALOT
  rationale: Retains the prophetic designation for the northern kingdom/Ephraim while preserving the Hebrew construct form.
- source_word: וְאָכְלָה
  chosen: and it consume
  alternatives:
  - and devour it
  - and consume it
  lexicon: HALOT
  rationale: Feminine verb agrees with 'fire.' The object is implied by context (the house of Joseph). 'Consume' matches fire imagery and avoids over-specifying beyond the Hebrew's ellipsis.
- source_word: וְאֵין מְכַבֶּה
  chosen: with no one to quench it
  alternatives:
  - and there is no one to quench it
  - and none can extinguish it
  lexicon: HALOT
  rationale: Expresses the absence of anyone able/present to extinguish the fire. 'Quench' is the standard English collocation with fire.
- source_word: לְבֵית אֵל
  chosen: for Bethel
  alternatives:
  - in Bethel
  - for the house of God
  lexicon: HALOT
  rationale: Bethel is a place name here, not the common noun 'house of God.' The preposition is difficult; 'for Bethel' preserves the Hebrew closely while allowing the sense that no one in/for Bethel can quench the blaze. The place is especially relevant in Amos as a cultic center of the northern kingdom.
