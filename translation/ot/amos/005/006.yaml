theological_decisions:
- issue: Referent of the subject in 'lest he break out like fire'
  chosen_reading: The implied subject is the LORD.
  alternative_readings:
  - 'The fire itself is the subject: ''lest it break out like fire'''
  rationale: The nearest and most coherent antecedent is the LORD in the preceding clause, and prophetic judgment language often depicts the LORD as breaking out in fire against his people. This preserves divine agency in the warning without adding doctrinal content beyond the text.
- issue: Meaning of 'Bethel'
  chosen_reading: Bethel is the place name, the cult center in the northern kingdom.
  alternative_readings:
  - '''house of God'' as a common noun phrase'
  rationale: In Amos, Bethel is a prominent geographic-religious site under judgment. Translating it as a place name avoids obscuring the historical setting.
