theological_decisions:
- issue: Rendering of צדקה in prophetic ethical context
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The term can overlap with 'justice,' especially in prophetic literature,
    but the Hebrew pairing of משפט and צדקה often benefits from preserving two related
    concepts rather than flattening them into one. Main text keeps 'righteousness';
    the alternative is preserved in a footnote for auditability and to reflect the
    semantic range.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (δικαιοσύνη analogy: righteousness
    / justice preserved where relevant); Translation philosophy #3 and #5'
