id: AMO.5.7
reference: Amos 5:7
source:
  edition: WLC
  text: הַ/הֹפְכִ֥ים לְ/לַעֲנָ֖ה מִשְׁפָּ֑ט וּ/צְדָקָ֖ה לָ/אָ֥רֶץ הִנִּֽיחוּ׃
translation:
  text: 'you who turn justice into wormwood and cast righteousness down to the earth:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bitterness' for 'wormwood'; the Hebrew names a bitter plant and uses
      it metaphorically here.
    reason: lexical_alternative
  - marker: b
    text: Or 'and throw justice to the ground,' since 'righteousness' and 'justice'
      overlap in the semantic range of the Hebrew term.
    reason: alternative_reading
lexical_decisions:
- source_word: הַהֹפְכִים
  chosen: you who turn
  alternatives:
  - those who turn
  - who turn
  lexicon: HALOT
  rationale: The participle with article functions vocatively in context, continuing
    the woe/oracle address. Rendering with second person ('you who turn') preserves
    the prophetic direct address better than a detached third-person relative clause.
- source_word: לַעֲנָה
  chosen: wormwood
  alternatives:
  - bitterness
  lexicon: HALOT
  rationale: לענה denotes wormwood, a bitter plant, and is often used metaphorically
    for bitterness/poison. 'Wormwood' preserves the concrete prophetic image; the
    metaphorical sense is clear from context.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  lexicon: HALOT
  rationale: In this social-ethical prophetic context, 'justice' best conveys the
    sense of proper legal and communal order. 'Judgment' is possible but sounds narrower
    or more event-focused in modern English.
- source_word: וּצְדָקָה
  chosen: righteousness
  alternatives:
  - justice
  - what is right
  lexicon: HALOT
  rationale: צדקה can denote righteousness or justice. Here paired with משפט, 'righteousness'
    preserves the distinct but related moral dimension rather than collapsing both
    terms into 'justice.' This also aligns with the project's default handling of
    righteousness/justice tensions by preserving alternatives in a footnote where
    relevant.
- source_word: לָאָרֶץ
  chosen: to the earth
  alternatives:
  - to the ground
  lexicon: HALOT
  rationale: The phrase expresses abasement or throwing down. 'To the earth' is a
    natural formal rendering and preserves the imagery of casting righteousness down
    from its proper place.
- source_word: הִנִּיחוּ
  chosen: cast ... down
  alternatives:
  - have laid
  - have set down
  - have abandoned
  lexicon: HALOT
  rationale: 'The hiphil of נוח here means to lay/place down, with a negative force
    in context: they have brought righteousness low. ''Cast down'' makes the idiomatic
    force clear in English while staying close to the image. ''Abandoned'' is interpretive
    and less tied to the spatial phrase ''to the earth.'''
