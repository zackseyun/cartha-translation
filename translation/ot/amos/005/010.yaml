id: AMO.5.10
reference: Amos 5:10
source:
  edition: WLC
  text: שָׂנְא֥וּ בַ/שַּׁ֖עַר מוֹכִ֑יחַ וְ/דֹבֵ֥ר תָּמִ֖ים יְתָעֵֽבוּ׃
translation:
  text: They hate the one who reproves in the gate, and they abhor the one who speaks
    with integrity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"In the gate" refers to the city gate, the customary place for legal proceedings
      and public judgment.'
    reason: cultural_note
  - marker: b
    text: Or "the one who speaks what is blameless" / "the one who speaks uprightly."
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂנְאוּ
  chosen: They hate
  alternatives:
  - They have hated
  lexicon: HALOT
  rationale: Qal perfect 3cp of שׂנא, here functioning in prophetic description of
    present characteristic behavior. English present best conveys the ongoing social
    reality in context.
- source_word: בַשַּׁעַר
  chosen: in the gate
  alternatives:
  - at the gate
  lexicon: HALOT
  rationale: The city gate was the public place of judgment and civic deliberation.
    'In the gate' preserves the Hebrew idiom and its legal-social setting more closely
    than a more interpretive expansion.
- source_word: מוֹכִיחַ
  chosen: the one who reproves
  alternatives:
  - the reprover
  - the one who rebukes
  lexicon: HALOT
  rationale: Participle of יכח, referring to one who brings correction or legal reproof.
    'The one who reproves' is natural English while retaining the participial force
    and likely judicial nuance.
- source_word: וְדֹבֵר
  chosen: and the one who speaks
  alternatives:
  - and whoever speaks
  - and the speaker of
  lexicon: HALOT
  rationale: Participle of דבר coordinated with the previous participle. Rendering
    with 'the one who speaks' keeps the parallel structure with 'the one who reproves.'
- source_word: תָּמִים
  chosen: with integrity
  alternatives:
  - what is blameless
  - uprightly
  - blamelessly
  lexicon: HALOT
  rationale: תמים denotes wholeness, blamelessness, or integrity. In this context
    of truthful public speech, 'with integrity' communicates moral uprightness in
    idiomatic modern English without over-narrowing to sinlessness.
- source_word: יְתָעֵבוּ
  chosen: they abhor
  alternatives:
  - they detest
  - they treat as abominable
  lexicon: HALOT
  rationale: Piel imperfect 3mp of תעב expresses strong revulsion. 'Abhor' preserves
    the intensity and moral disgust better than the flatter 'hate,' while also avoiding
    redundancy with the first clause.
