theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This preserves reverential convention without obscuring that the covenant
    God is speaking.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of צְבָאוֹת in the divine title
  chosen_reading: hosts
  alternative_readings:
  - armies
  - heavenly armies
  rationale: The Hebrew can denote armies/hosts, but 'hosts' best preserves the title's
    traditional breadth and avoids narrowing the referent beyond what the text states.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
