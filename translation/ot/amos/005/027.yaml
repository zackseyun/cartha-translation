theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of צְבָאוֹת in the divine title
  chosen_reading: hosts
  alternative_readings:
  - armies
  - heavenly armies
  rationale: The Hebrew can denote armies/hosts, but 'hosts' best preserves the title's traditional breadth and avoids narrowing the referent beyond what the text states.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
