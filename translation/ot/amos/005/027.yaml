id: AMO.5.27
reference: Amos 5:27
source:
  edition: WLC
  text: וְ/הִגְלֵיתִ֥י אֶתְ/כֶ֖ם מֵ/הָ֣לְאָה לְ/דַמָּ֑שֶׂק אָמַ֛ר יְהוָ֥ה אֱלֹהֵֽי צְבָא֖וֹת שְׁמֽ/וֹ־׃פ
translation:
  text: Therefore I will send you into exile beyond Damascus,” says Yahweh, whose name is the God of hosts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will exile you beyond Damascus.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הִגְלֵיתִי
  chosen: I will send into exile
  alternatives:
  - I will exile
  - I will carry away
  lexicon: HALOT
  rationale: The Hiphil of גלה means to cause to go into exile. 'Send into exile' is idiomatic modern English and preserves the causative force better than a bare 'go.' The prefixed conjunction is rendered contextually as 'Therefore' in continuity with the preceding judgment statement.
- source_word: אֶתְ/כֶם
  chosen: you
  rationale: Direct-object marker plus 2mp suffix; straightforwardly rendered 'you.' English does not mark the masculine plural here.
- source_word: מֵ/הָלְאָה
  chosen: beyond
  alternatives:
  - far beyond
  - from here onward beyond
  lexicon: HALOT
  rationale: The adverb with prefixed מ conveys movement to a place farther than Damascus. 'Beyond' is the standard concise rendering in context.
- source_word: לְ/דַמָּשֶׂק
  chosen: Damascus
  rationale: Proper place name, transliterated by standard English convention. With מֵהָלְאָה it yields 'beyond Damascus.'
- source_word: אָמַר
  chosen: says
  alternatives:
  - said
  - declares
  lexicon: HALOT
  rationale: In prophetic formulae, the qatal often functions performatively in English as a present speech tag. 'Says' is natural and keeps the oracle vivid. 'Declares' is possible but less directly tied to the simple verb 'said/says.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי צְבָאוֹת
  chosen: the God of hosts
  alternatives:
  - God of armies
  - God of heavenly armies
  lexicon: HALOT
  rationale: This construct title is conventionally and accurately rendered 'the God of hosts.' 'Hosts' preserves the breadth of the Hebrew צבאות without over-specifying earthly or heavenly armies.
- source_word: שְׁמוֹ
  chosen: is his name
  alternatives:
  - is his Name
  - his name
  lexicon: HALOT
  rationale: 'The nominal clause is explicit in Hebrew and should be retained: ''is his name.'' Capitalizing ''Name'' would import later theological convention not demanded by the text.'
