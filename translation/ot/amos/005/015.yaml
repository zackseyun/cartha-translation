id: AMO.5.15
reference: Amos 5:15
source:
  edition: WLC
  text: שִׂנְאוּ רָע֙ וְ/אֶ֣הֱבוּ ט֔וֹב וְ/הַצִּ֥יגוּ בַ/שַּׁ֖עַר מִשְׁפָּ֑ט אוּלַ֗י
    יֶֽחֱנַ֛ן יְהוָ֥ה אֱלֹהֵֽי צְבָא֖וֹת שְׁאֵרִ֥ית יוֹסֵֽף־־׃ס
translation:
  text: Hate evil, and love good, and establish justice in the gate; perhaps the LORD,
    the God of hosts, will be gracious to the remnant of Joseph.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The gate was the public place where elders and officials heard legal cases
      and administered civic justice.
    reason: cultural_note
  - marker: b
    text: Or 'at the gate.' The Hebrew idiom refers to the place of public judgment
      in the city.
    reason: lexical_alternative
  - marker: c
    text: Joseph here refers to the people descended from Joseph, especially the northern
      kingdom; 'the remnant of Joseph' means those left after judgment.
    reason: cross_reference
lexical_decisions:
- source_word: שִׂנְאוּ
  chosen: Hate
  alternatives:
  - Reject
  - Despise
  lexicon: HALOT
  rationale: Qal imperative plural of שׂנא, a strong command to oppose what is evil.
    'Hate' preserves the force better than softer options like 'reject'.
- source_word: רָע
  chosen: evil
  alternatives:
  - what is evil
  - bad
  lexicon: HALOT
  rationale: Adjectival substantive referring to moral evil in parallel with 'good.'
    'Evil' best preserves the ethical contrast.
- source_word: אֶהֱבוּ
  chosen: love
  alternatives:
  - embrace
  - desire
  lexicon: HALOT
  rationale: Qal imperative plural of אהב. 'Love' is the direct and standard rendering,
    matching the antithetical pair 'hate... love.'
- source_word: טוֹב
  chosen: good
  alternatives:
  - what is good
  lexicon: HALOT
  rationale: Substantival adjective in ethical contrast with רָע. 'Good' is concise
    and natural in English.
- source_word: הַצִּיגוּ
  chosen: establish
  alternatives:
  - set up
  - present
  - set
  lexicon: HALOT
  rationale: Hiphil imperative plural of יצג/יצב-related form used here with משפט.
    In context of public legal order at the city gate, 'establish' conveys causing
    justice to stand or be firmly in place, better than the more wooden 'set' or the
    misleading 'present.'
- source_word: בַשַּׁעַר
  chosen: in the gate
  alternatives:
  - at the gate
  - in the city gate
  lexicon: HALOT
  rationale: The city gate was the place of legal proceedings and civic judgment.
    'In the gate' preserves the Hebrew idiom while remaining intelligible; the cultural
    sense can be clarified in a footnote.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - just judgment
  lexicon: HALOT
  rationale: Here the term refers to equitable legal order in civic adjudication.
    'Justice' communicates the social-legal sense more naturally than 'judgment' in
    modern English.
- source_word: אוּלַי
  chosen: perhaps
  alternatives:
  - it may be that
  - possibly
  lexicon: HALOT
  rationale: Marks hope without presumption. 'Perhaps' preserves the prophetic tension
    and conditional tone.
- source_word: יֶחֱנַן
  chosen: will be gracious
  alternatives:
  - may show favor
  - will show mercy
  lexicon: HALOT
  rationale: From חנן, denoting gracious favor. 'Will be gracious' closely reflects
    the verbal idea without over-specifying emotional nuance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: אֱלֹהֵי צְבָאוֹת
  chosen: the God of hosts
  alternatives:
  - God of armies
  - God of heavenly hosts
  lexicon: HALOT
  rationale: A fixed divine title. 'God of hosts' is the established and sufficiently
    transparent rendering, preserving the breadth of 'hosts' rather than narrowing
    it to only military or heavenly beings.
- source_word: שְׁאֵרִית
  chosen: the remnant
  alternatives:
  - the survivors
  - the remainder
  lexicon: HALOT
  rationale: A key prophetic term for those left after judgment. 'Remnant' preserves
    both lexical continuity and theological resonance.
- source_word: יוֹסֵף
  chosen: Joseph
  lexicon: HALOT
  rationale: Proper name used metonymically for the northern kingdom/descendants of
    Joseph. The transliterated name should be retained in the text.
