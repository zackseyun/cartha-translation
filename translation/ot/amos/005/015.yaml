theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This preserves covenantal significance while following the project's
    stated convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of אוּלַי with יֶחֱנַן
  chosen_reading: perhaps the LORD ... will be gracious
  alternative_readings:
  - that the LORD ... may be gracious
  rationale: The Hebrew expresses hope without certainty. The translation preserves
    this tension rather than implying a guaranteed outcome from repentance.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
