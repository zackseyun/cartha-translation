id: AMO.5.4
reference: Amos 5:4
source:
  edition: WLC
  text: כִּ֣י כֹ֥ה אָמַ֛ר יְהוָ֖ה לְ/בֵ֣ית יִשְׂרָאֵ֑ל דִּרְשׁ֖וּ/נִי וִֽ/חְיֽוּ׃
translation:
  text: 'For thus says the LORD to the house of Israel: Seek me and live.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Seek me so that you may live,' or 'Seek me, and you will live.' The
      Hebrew can be understood as an urgent command with a promised result.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding lament/oracle
    context. 'For' best preserves the connective force in natural English.
- source_word: כֹה
  chosen: thus
  alternatives:
  - this is what
  - so
  lexicon: HALOT
  rationale: Standard prophetic messenger formula כֹה אָמַר is idiomatically rendered
    'thus says.' This preserves the formal prophetic tone.
- source_word: אָמַר
  chosen: says
  alternatives:
  - has said
  - said
  lexicon: HALOT
  rationale: 'Although morphologically perfect, in the fixed prophetic formula it
    functions performatively in present time in English: ''thus says.'''
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: לְבֵית יִשְׂרָאֵל
  chosen: to the house of Israel
  alternatives:
  - to Israel
  - to the people of Israel
  lexicon: HALOT
  rationale: Retains the covenantal/corporate expression 'house of Israel' rather
    than flattening it to simply 'Israel.' 'To' reflects the dative/addressee force
    of לְ.
- source_word: דִּרְשׁוּנִי
  chosen: Seek me
  alternatives:
  - Inquire of me
  - Seek after me
  lexicon: HALOT
  rationale: דרש in this prophetic context carries the sense of turning to and seeking
    the LORD, not merely asking for information. 'Seek me' is concise, idiomatic,
    and theologically weighty.
- source_word: וִחְיוּ
  chosen: and live
  alternatives:
  - so that you may live
  - and you will live
  lexicon: HALOT
  rationale: 'The imperative followed by waw + imperative is naturally rendered as
    a second imperative in English: ''Seek me and live.'' This preserves the urgent
    summons without over-specifying whether the nuance is result or command.'
