theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name of God. Following the doctrinal
    guideline for contested terms, it is rendered 'the LORD' in the main text rather
    than a transliteration.
  doctrine_reference: 'Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of 'Seek me and live'
  chosen_reading: A direct covenantal summons with life as the promised outcome, rendered
    without narrowing it to either purely physical survival or purely spiritual life
  alternative_readings:
  - Seek me so that you may live
  - Seek me, and you will live
  rationale: The Hebrew permits an urgent appeal whose result is life, but the text
    itself does not specify the full scope in this verse alone. The translation preserves
    that theological breadth rather than resolving it.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it'
