theological_decisions:
- issue: Rendering of the divine name/title combination אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine default for YHWH is 'the LORD,' but the combined title אֲדֹנָי
    יְהוִה would produce awkward English if rendered mechanically. 'The Lord GOD'
    is the established equivalent that preserves reverence and distinguishes the two
    elements without implying a doctrinal nuance beyond the Hebrew title.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
