id: AMO.5.3
reference: Amos 5:3
source:
  edition: WLC
  text: כִּ֣י כֹ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה הָ/עִ֛יר הַ/יֹּצֵ֥את אֶ֖לֶף תַּשְׁאִ֣יר
    מֵאָ֑ה וְ/הַ/יּוֹצֵ֥את מֵאָ֛ה תַּשְׁאִ֥יר עֲשָׂרָ֖ה לְ/בֵ֥ית יִשְׂרָאֵֽל׃ס
translation:
  text: 'For thus says the Lord GOD: The city that marches out a thousand will have
    a hundred left, and the one that marches out a hundred will have ten left, for
    the house of Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that goes out a thousand ... that goes out a hundred.' The Hebrew verb
      is literally 'goes out,' likely referring to going out for battle; 'marches
      out' makes that military sense explicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The compound divine title combines אֲדֹנָי with YHWH. Per doctrine, YHWH
    is rendered 'the LORD'; however, in the conventional Hebrew title אֲדֹנָי יְהוִה,
    English translations commonly avoid 'Lord LORD' by rendering 'Lord GOD.' This
    preserves both elements and communicates the solemn divine title naturally in
    English.
- source_word: הָעִיר
  chosen: The city
  alternatives:
  - A city
  - the town
  lexicon: HALOT
  rationale: With the article, the noun is definite. 'City' is the straightforward
    gloss and fits the prophetic context of civic/military muster.
- source_word: הַיֹּצֵאת
  chosen: that marches out
  alternatives:
  - that goes out
  - that sends out
  lexicon: HALOT
  rationale: The feminine singular participle agrees with 'city.' In context of numbered
    troops, 'goes out' refers to going out to battle or military deployment. 'Marches
    out' makes the military sense explicit without overparaphrasing.
- source_word: אֶלֶף
  chosen: a thousand
  lexicon: HALOT
  rationale: Standard cardinal number; here the size of the force going out.
- source_word: תַּשְׁאִיר
  chosen: will have ... left
  alternatives:
  - will leave
  - will remain with
  lexicon: HALOT
  rationale: Hiphil of שׁאר means 'leave, let remain.' Since the subject is the city,
    idiomatic English is 'will have a hundred left' rather than the less natural 'will
    leave a hundred.' This preserves the resultative sense.
- source_word: מֵאָה
  chosen: a hundred
  lexicon: HALOT
  rationale: Standard cardinal number; the remnant from the thousand.
- source_word: וְהַיֹּצֵאת מֵאָה
  chosen: and the one that marches out a hundred
  alternatives:
  - and the city that marches out a hundred
  lexicon: HALOT
  rationale: The second clause omits the repeated noun 'city,' so 'the one' is supplied
    in English to avoid awkward repetition while preserving the feminine singular
    referent back to 'city.'
- source_word: עֲשָׂרָה
  chosen: ten
  lexicon: HALOT
  rationale: Standard cardinal number; the remnant from the hundred.
- source_word: לְבֵית יִשְׂרָאֵל
  chosen: for the house of Israel
  alternatives:
  - of the house of Israel
  - in the house of Israel
  lexicon: HALOT
  rationale: The prefixed ל marks relation or reference. 'For the house of Israel'
    best captures that this devastation pertains to Israel as a whole. 'House of Israel'
    is retained as a covenantal-national designation rather than flattened to simply
    'Israel.'
- source_word: כִּי כֹה אָמַר
  chosen: For thus says
  alternatives:
  - For thus said
  - Indeed, thus says
  lexicon: HALOT
  rationale: This is the standard prophetic messenger formula. 'For thus says' is
    natural, present-tense English for prophetic declaration and preserves the causal/discourse-linking
    force of כִּי.
