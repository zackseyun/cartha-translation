theological_decisions:
- issue: Tone of divine rejection of worship
  chosen_reading: The verse is rendered as a direct divine repudiation of hypocritical
    worship practices, without softening the negative force.
  alternative_readings:
  - A less pejorative rendering of הֲמוֹן as 'sound' or 'multitude'
  rationale: The immediate context in Amos 5 condemns Israel’s worship divorced from
    justice. Rendering הֲמוֹן as 'noise' and לֹא אֶשְׁמָע as 'I will not listen' preserves
    the prophetic force without adding theological interpretation beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
