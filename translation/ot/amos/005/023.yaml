id: AMO.5.23
reference: Amos 5:23
source:
  edition: WLC
  text: הָסֵ֥ר מֵ/עָלַ֖/י הֲמ֣וֹן שִׁרֶ֑י/ךָ וְ/זִמְרַ֥ת נְבָלֶ֖י/ךָ לֹ֥א אֶשְׁמָֽע׃
translation:
  text: Take away from me the noise of your songs, and I will not listen to the melody
    of your harps.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lyres' for 'harps'; the Hebrew names an ancient stringed instrument,
      and the exact modern equivalent is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָסֵר
  chosen: Take away
  alternatives:
  - Remove
  - Take away
  lexicon: HALOT
  rationale: Imperative of סור/הסר used as a command to remove something from before
    the speaker. 'Take away' is idiomatic modern English and preserves the force of
    the imperative.
- source_word: מֵעָלַי
  chosen: from me
  alternatives:
  - from upon me
  - away from me
  lexicon: HALOT
  rationale: Literally 'from upon me,' but in English 'from me' naturally conveys
    the personal rejection while avoiding awkwardness.
- source_word: הֲמוֹן
  chosen: the noise
  alternatives:
  - the din
  - the multitude
  - the roar
  lexicon: HALOT
  rationale: In context of rejected worship music, the noun denotes a loud, tumultuous
    sound rather than a neutral 'multitude.' 'Noise' captures the pejorative force
    of God’s rejection.
- source_word: שִׁרֶיךָ
  chosen: your songs
  alternatives:
  - your singing
  lexicon: HALOT
  rationale: Plural construct of 'song.' 'Your songs' is the most direct and natural
    rendering in English.
- source_word: וְזִמְרַת
  chosen: the melody
  alternatives:
  - the music
  - the song
  lexicon: HALOT
  rationale: Refers to musical sound or song. 'Melody' fits the parallel with instruments
    and distinguishes it from the previous 'songs' while preserving the musical sense.
- source_word: נְבָלֶיךָ
  chosen: your harps
  alternatives:
  - your lyres
  - your stringed instruments
  lexicon: HALOT
  rationale: נבל denotes a stringed instrument, often rendered 'harp' or 'lyre.' 'Harps'
    is familiar and traditional, but the exact instrument is not certain enough to
    press beyond a general ancient stringed instrument.
- source_word: לֹא אֶשְׁמָע
  chosen: I will not listen
  alternatives:
  - I will not hear
  - I do not listen
  lexicon: HALOT
  rationale: The imperfect with negation expresses Yahweh’s refusal to attend to their
    music. 'I will not listen' communicates volitional rejection more clearly than
    the more passive 'hear.'
