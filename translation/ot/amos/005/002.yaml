theological_decisions:
- issue: Metaphorical designation of Israel as 'virgin' in a judgment oracle
  chosen_reading: Retain the metaphor directly as 'virgin Israel' rather than interpretively
    softening it.
  alternative_readings:
  - maiden Israel
  - dear Israel
  rationale: The text personifies the nation in lament language. Preserving 'virgin'
    maintains the prophetic imagery of vulnerability, former honor, and tragic downfall
    without importing additional doctrinal claims.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Finality of judgment in לֹא תוֹסִיף קוּם
  chosen_reading: Express as 'will not rise again' in the main text.
  alternative_readings:
  - will rise no more
  rationale: The Hebrew idiom communicates decisive collapse in this oracle. This
    rendering preserves the force of judgment while avoiding paraphrase beyond the
    text.
  doctrine_reference: Translation philosophy §§1, 6
