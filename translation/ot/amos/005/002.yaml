id: AMO.5.2
reference: Amos 5:2
source:
  edition: WLC
  text: נָֽפְלָה֙ לֹֽא תוֹסִ֣יף ק֔וּם בְּתוּלַ֖ת יִשְׂרָאֵ֑ל נִטְּשָׁ֥ה עַל אַדְמָתָ֖/הּ
    אֵ֥ין מְקִימָֽ/הּ־־׃
translation:
  text: Fallen, virgin Israel will not rise again; abandoned on her own land, she
    has no one to raise her up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will rise no more.' The Hebrew idiom literally says 'she will not again
      rise.'
    reason: lexical_alternative
  - marker: b
    text: '''Virgin Israel'' is a poetic personification of the nation, not a statement
      about literal sexual status.'
    reason: cultural_note
lexical_decisions:
- source_word: נָפְלָה
  chosen: Fallen
  alternatives:
  - She has fallen
  - Has fallen
  lexicon: HALOT
  rationale: Qal perfect 3fs of נפל, introducing the lament with a stative/resultative
    sense. Rendered as the fronted participial-like 'Fallen' to preserve the abrupt
    dirge style of the Hebrew while remaining natural in English.
- source_word: לֹא תוֹסִיף קוּם
  chosen: will not rise again
  alternatives:
  - will rise no more
  - will not continue to rise
  - will not get up again
  lexicon: HALOT
  rationale: 'The Hiphil of יסף with infinitive קום forms an idiom meaning ''to do
    again/continue to do'' with negation: ''she will not again rise.'' ''Will not
    rise again'' is idiomatic modern English and preserves the finality of the judgment.'
- source_word: בְּתוּלַת יִשְׂרָאֵל
  chosen: virgin Israel
  alternatives:
  - the virgin Israel
  - maiden Israel
  lexicon: HALOT
  rationale: בְּתוּלָה literally means 'virgin/young woman.' In prophetic poetry it
    functions as a personified title for the nation. 'Virgin Israel' preserves the
    metaphor and traditional prophetic diction better than the softer 'maiden Israel.'
    The article is omitted in Hebrew construct, so English also omits 'the' for a
    more title-like expression.
- source_word: נִטְּשָׁה
  chosen: abandoned
  alternatives:
  - forsaken
  - cast down
  - thrown down
  lexicon: HALOT
  rationale: Niphal perfect of נטש conveys being left, abandoned, or forsaken. 'Abandoned'
    is clear modern English and fits the image of the nation lying helpless on the
    ground.
- source_word: עַל אַדְמָתָהּ
  chosen: on her own land
  alternatives:
  - upon her land
  - on her soil
  - on the ground of her land
  lexicon: HALOT
  rationale: אַדָמָה can mean ground/soil/land. Here the possessive suffix and national
    context favor 'land' rather than merely 'ground.' Adding 'own' brings out the
    possessive force naturally in English without overtranslation.
- source_word: אֵין מְקִימָהּ
  chosen: she has no one to raise her up
  alternatives:
  - there is no one to raise her up
  - none raises her up
  - with no one to lift her up
  lexicon: HALOT
  rationale: Existential אֵין plus Hiphil participle of קום with suffix means there
    is no raiser/restorer for her. 'She has no one to raise her up' is idiomatic and
    keeps the personal helplessness of the image. 'Raise her up' also echoes the earlier
    'rise again,' preserving the Hebrew wordplay on קום.
