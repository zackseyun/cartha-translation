theological_decisions:
- issue: Rendering the divine titles יְהוָה אֱלֹהֵי צְבָאוֹת אֲדֹנָי
  chosen_reading: the LORD, the God of hosts, the Lord
  alternative_readings:
  - the LORD God of hosts, the Lord
  - the Lord GOD, the God of hosts
  rationale: The verse stacks divine titles for solemnity. The chosen rendering preserves
    each title distinctly without collapsing them. 'the LORD' follows the doctrinal
    default for YHWH; 'the Lord' renders Adonai separately to reflect the Hebrew emphasis.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD; κύριος/Kyrios
    principle analogously supports ''Lord'' for divine title'
