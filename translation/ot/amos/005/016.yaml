id: AMO.5.16
reference: Amos 5:16
source:
  edition: WLC
  text: לָ֠/כֵן כֹּֽה אָמַ֨ר יְהוָ֜ה אֱלֹהֵ֤י צְבָאוֹת֙ אֲדֹנָ֔/י בְּ/כָל רְחֹב֣וֹת
    מִסְפֵּ֔ד וּ/בְ/כָל חוּצ֖וֹת יֹאמְר֣וּ הוֹ ה֑וֹ וְ/קָרְא֤וּ אִכָּר֙ אֶל אֵ֔בֶל
    וּ/מִסְפֵּ֖ד אֶל י֥וֹדְעֵי נֶֽהִי־־־־־־׃
translation:
  text: 'Therefore, thus says the LORD, the God of hosts, the Lord: In all the squares
    there will be wailing, and in all the streets they will say, “Alas! Alas!” They
    will call the farmer to mourning, and to wailing those who know lamentation.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Woe! Woe!” The Hebrew cry הוֹ הוֹ is an exclamation of lament; “Alas!
      Alas!” was chosen to emphasize mourning rather than denunciation.
    reason: lexical_alternative
  - marker: b
    text: Literally “those who know lamentation,” likely referring to skilled or professional
      mourners.
    reason: cultural_note
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks an inferential conclusion from the preceding indictment and warning;
    'Therefore' preserves the prophetic logic clearly in English.
- source_word: כֹּה אָמַר
  chosen: thus says
  alternatives:
  - this is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; 'thus says' is concise and preserves
    the formal register.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the doctrinal default for the divine name, preserving covenantal
    force while matching established English convention.
- source_word: אֱלֹהֵי צְבָאוֹת
  chosen: the God of hosts
  alternatives:
  - God of armies
  - God of heavenly armies
  lexicon: HALOT
  rationale: A conventional but still transparent rendering of the construct phrase;
    'hosts' preserves the breadth of the term without over-specifying earthly or heavenly
    armies.
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - my Lord
  - Lord
  lexicon: HALOT
  rationale: Here appositional to the preceding divine titles. The form is written
    with 1cs suffix historically, but functions as the divine title Adonai; 'the Lord'
    is the natural English rendering.
- source_word: בְּכָל רְחֹבוֹת
  chosen: In all the squares
  alternatives:
  - In every open place
  - In all the plazas
  lexicon: HALOT
  rationale: רְחֹבוֹת refers to broad public spaces within a town. 'Squares' communicates
    urban public gathering places better than the more generic 'streets'.
- source_word: מִסְפֵּד
  chosen: wailing
  alternatives:
  - lamentation
  - mourning
  lexicon: HALOT
  rationale: The noun denotes public mourning expression. 'Wailing' fits the audible,
    communal scene described here better than the more abstract 'mourning,' while
    remaining natural English.
- source_word: חוּצוֹת
  chosen: streets
  alternatives:
  - outside places
  - open streets
  lexicon: HALOT
  rationale: Refers to the town's streets or outside thoroughfares. 'Streets' provides
    a clear contrast with 'squares' in the previous phrase.
- source_word: הוֹ הוֹ
  chosen: Alas! Alas!
  alternatives:
  - Woe! Woe!
  - Oh! Oh!
  lexicon: HALOT
  rationale: An interjection of lament. 'Alas! Alas!' best conveys grief rather than
    prophetic denunciation; 'Woe' could suggest an oracle against someone rather than
    a cry of mourning.
- source_word: וְקָרְאוּ
  chosen: They will call
  alternatives:
  - They will summon
  - They will invite
  lexicon: HALOT
  rationale: The verb indicates summoning persons into the mourning rite. 'Call' is
    straightforward and idiomatic.
- source_word: אִכָּר
  chosen: the farmer
  alternatives:
  - the plowman
  - the cultivator
  lexicon: HALOT
  rationale: Refers to an agricultural laborer. 'Farmer' is the clearest modern equivalent;
    singular in Hebrew is used generically/collectively here.
- source_word: אֶל אֵבֶל
  chosen: to mourning
  alternatives:
  - for mourning
  - into mourning
  lexicon: HALOT
  rationale: The preposition marks movement toward participation in mourning. 'To
    mourning' keeps the Hebrew structure and sense of being summoned into lament.
- source_word: וּמִסְפֵּד
  chosen: and to wailing
  alternatives:
  - and lamentation
  - and mourning
  lexicon: HALOT
  rationale: Parallel to the earlier noun but here as the object of summoning. Repeating
    'wailing' preserves the sonic emphasis of the verse.
- source_word: יֹדְעֵי נֶהִי
  chosen: those who know lamentation
  alternatives:
  - professional mourners
  - those skilled in mourning songs
  lexicon: HALOT
  rationale: Literally 'those who know lamentation.' This likely refers to skilled
    mourners, but the more literal rendering preserves the Hebrew expression without
    importing too much cultural interpretation into the main text.
