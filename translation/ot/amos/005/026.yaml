theological_decisions:
- issue: Whether מַלְכְּכֶם should be rendered as the common noun 'your king' or identified
    with the deity Molech/Moloch
  chosen_reading: your king
  alternative_readings:
  - your Molech
  - Moloch your king
  rationale: The Masoretic Text reads 'your king' and does not explicitly spell the
    divine name Molech here. Because the Hebrew permits a straightforward reading,
    the main text preserves it. Since a long-standing interpretive tradition, reflected
    in Acts 7:43 and some translations, understands a reference to Molech, that alternative
    is preserved in a footnote rather than imported into the main text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
- issue: Whether סִכּוּת and כִּיּוּן should be interpreted or transliterated
  chosen_reading: transliterate both as proper names
  alternative_readings:
  - render סִכּוּת as 'shrine'
  - identify the names directly with specific astral deities
  rationale: Both terms are rare and uncertain. Transliteration avoids overstating
    lexical certainty while preserving the likely proper-name force of the Hebrew.
    This is more auditable and less interpretively loaded than choosing speculative
    identifications in the main text.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names;
    Original-language primacy over translation tradition.'
