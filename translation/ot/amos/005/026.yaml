id: AMO.5.26
reference: Amos 5:26
source:
  edition: WLC
  text: וּ/נְשָׂאתֶ֗ם אֵ֚ת סִכּ֣וּת מַלְכְּ/כֶ֔ם וְ/אֵ֖ת כִּיּ֣וּן צַלְמֵי/כֶ֑ם כּוֹכַב֙
    אֱלֹ֣הֵי/כֶ֔ם אֲשֶׁ֥ר עֲשִׂיתֶ֖ם לָ/כֶֽם׃
translation:
  text: And you carried Sikkuth your king, and Kiyyun your images, the star of your
    god, which you made for yourselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your Molech'; the Hebrew reads 'your king,' but many interpreters understand
      a reference to the deity Molech/Moloch here, reflected also in Acts 7:43.
    reason: alternative_reading
  - marker: b
    text: Sikkuth and Kiyyun are rare names, likely associated with astral worship;
      their precise identification is uncertain.
    reason: cultural_note
  - marker: c
    text: Or possibly 'the star of your gods,' though the Masoretic pointing supports
      the singular 'your god.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְשָׂאתֶם
  chosen: And you carried
  alternatives:
  - But you carried
  - And you bore
  lexicon: HALOT
  rationale: Qal perfect 2mp of נשׂא, here with vav conjunction. In context it continues
    the accusation, describing Israel's bearing/carrying cultic objects. 'Carried'
    is the most natural modern English rendering; 'bore' is more formal.
- source_word: סִכּוּת
  chosen: Sikkuth
  alternatives:
  - Sakkuth
  - the shrine
  lexicon: HALOT
  rationale: A rare and difficult proper noun. Given the parallel with כִּיּוּן and
    the likely reference to a deity or cultic name, transliteration best preserves
    the Hebrew rather than forcing an uncertain interpretation such as 'shrine.' This
    follows the philosophy of transliterating names.
- source_word: מַלְכְּכֶם
  chosen: your king
  alternatives:
  - your Molech
  - your ruler
  lexicon: HALOT
  rationale: The consonantal text straightforwardly reads 'your king.' Some understand
    this as a title for the deity Molech/Moloch, influenced by ancient versions and
    Acts 7:43, but the Hebrew form here is best represented directly in the main text
    as 'your king,' with the alternative preserved in a footnote.
- source_word: כִּיּוּן
  chosen: Kiyyun
  alternatives:
  - Kaiwan
  - Chiun
  lexicon: HALOT
  rationale: Another rare proper noun, likely the name of an astral deity associated
    with Saturn in ancient Near Eastern tradition. Transliteration is preferable to
    speculative interpretation. Standard English transliteration from Hebrew is 'Kiyyun.'
- source_word: צַלְמֵיכֶם
  chosen: your images
  alternatives:
  - your idols
  - your statues
  lexicon: HALOT
  rationale: From צֶלֶם, 'image, statue.' 'Images' is the broadest and most textually
    precise rendering; 'idols' is interpretive though contextually plausible.
- source_word: כּוֹכַב אֱלֹהֵיכֶם
  chosen: the star of your god
  alternatives:
  - the star-god you worshiped
  - the star of your gods
  lexicon: HALOT
  rationale: 'Construct relationship: ''star of your god.'' Singular ''god'' matches
    the suffix form as pointed in the MT. The phrase likely apposes or further identifies
    the preceding cultic referents, but English can preserve the Hebrew wording without
    over-interpreting.'
- source_word: אֲשֶׁר עֲשִׂיתֶם לָכֶם
  chosen: which you made for yourselves
  alternatives:
  - that you made for yourselves
  - which you made for your own use
  lexicon: HALOT
  rationale: Relative clause modifying the idolatrous objects. 'For yourselves' captures
    לָכֶם naturally and preserves the reflexive force of self-made objects of worship.
