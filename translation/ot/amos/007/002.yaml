id: AMO.7.2
reference: Amos 7:2
source:
  edition: WLC
  text: וְ/הָיָ֗ה אִם כִּלָּה֙ לֶֽ/אֱכוֹל֙ אֶת עֵ֣שֶׂב הָ/אָ֔רֶץ וָ/אֹמַ֗ר אֲדֹנָ֤/י
    יְהוִה֙ סְֽלַֽח נָ֔א מִ֥י יָק֖וּם יַֽעֲקֹ֑ב כִּ֥י קָטֹ֖ן הֽוּא־־־׃
translation:
  text: And when it had finished eating the vegetation of the land, I said, “Lord
    GOD, please forgive! How can Jacob stand? For he is small.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Who will raise up Jacob?”
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה אִם
  chosen: And when
  alternatives:
  - And it happened, if
  - And it came to pass, when
  lexicon: HALOT
  rationale: The sequence introduces the next event in the vision narrative. In context,
    אִם after וְהָיָה functions idiomatically in a temporal sense ('when') rather
    than a simple conditional 'if.' 'And when' preserves the narrative flow in natural
    English without archaic padding.
- source_word: כִּלָּה לֶאֱכוֹל
  chosen: it had finished eating
  alternatives:
  - it finished consuming
  - it was done devouring
  lexicon: HALOT
  rationale: כלה + infinitive expresses completion of an action. The subject is the
    devouring swarm from the prior verse, so 'it had finished eating' is a clear English
    rendering that preserves the completed action.
- source_word: עֵשֶׂב הָאָרֶץ
  chosen: the vegetation of the land
  alternatives:
  - the grass of the land
  - the plants of the earth
  lexicon: HALOT
  rationale: עֵשֶׂב can denote grass/herbage/vegetation broadly. 'Vegetation' best
    fits the agricultural devastation in context without narrowing the term too much.
    הָאָרֶץ here is best taken as 'the land' in Amos's national setting rather than
    the whole globe.
- source_word: וָאֹמַר
  chosen: I said
  alternatives:
  - then I said
  lexicon: HALOT
  rationale: Simple narrative preterite; 'I said' is sufficient and natural.
- source_word: אֲדֹנָי יְהוִה
  chosen: Lord GOD
  alternatives:
  - Lord Yahweh
  - Lord GOD
  lexicon: HALOT
  rationale: Following the doctrine standard, יְהוָה is rendered 'the LORD' by default;
    however, in the fixed combination אֲדֹנָי יְהוִה, English convention avoids 'Lord
    LORD.' 'Lord GOD' preserves both elements reverently and clearly.
- source_word: סְלַח נָא
  chosen: please forgive
  alternatives:
  - forgive, please
  - pardon, please
  lexicon: HALOT
  rationale: An urgent plea for pardon/intervention. 'Please forgive' is natural modern
    English and retains the supplicatory force of נָא.
- source_word: מִי יָקוּם יַעֲקֹב
  chosen: How can Jacob stand?
  alternatives:
  - Who will raise up Jacob?
  - Who can make Jacob stand?
  lexicon: HALOT
  rationale: Though literally 'Who will arise/stand Jacob?' the idiom in context is
    a lament over Jacob's inability to endure after judgment. 'How can Jacob stand?'
    communicates the rhetorical force and likely sense of survival/endurance. The
    alternative 'Who will raise up Jacob?' is lexically possible and worth preserving
    in a footnote because קום can carry a causative/restorative nuance in context.
- source_word: יַעֲקֹב
  chosen: Jacob
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: The Hebrew uses the covenant name 'Jacob'; it should be transliterated
    rather than interpreted as 'Israel,' though the referent is the nation.
- source_word: כִּי קָטֹן הוּא
  chosen: For he is small
  alternatives:
  - for he is insignificant
  - for he is weak
  lexicon: HALOT
  rationale: 'קָטֹן denotes smallness, littleness, or insignificance. ''Small'' preserves
    the metaphorical breadth: Jacob is numerically, politically, or existentially
    diminished.'
