theological_decisions:
- issue: Rendering the divine name in אֲדֹנָי יְהוִה
  chosen_reading: Lord GOD
  alternative_readings:
  - Lord Yahweh
  rationale: The project default renders יְהוָה as 'the LORD.' In the compound title
    אֲדֹנָי יְהוִה, 'Lord GOD' is the standard way to preserve both titles without
    the awkward 'Lord LORD.' This is a translation-convention decision, not a doctrinal
    alteration.
  doctrine_reference: 'Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of מִי יָקוּם יַעֲקֹב
  chosen_reading: How can Jacob stand?
  alternative_readings:
  - Who will raise up Jacob?
  rationale: The verse is Amos's intercession after seeing devastation. The rhetorical
    question most naturally expresses Jacob's inability to survive or remain standing
    because he is small. The alternative restorative sense is possible from the verb
    קום and is preserved in a footnote to maintain interpretive transparency.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
