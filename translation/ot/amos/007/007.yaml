id: AMO.7.7
reference: Amos 7:7
source:
  edition: WLC
  text: כֹּ֣ה הִרְאַ֔/נִי וְ/הִנֵּ֧ה אֲדֹנָ֛/י נִצָּ֖ב עַל חוֹמַ֣ת אֲנָ֑ךְ וּ/בְ/יָד֖/וֹ
    אֲנָֽךְ־׃
translation:
  text: 'This is what he showed me: behold, the Lord was standing beside a wall built
    with a plumb line, with a plumb line in his hand.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on a wall of plumb line'; the Hebrew phrase is difficult. The noun אֲנָךְ
      likely refers to a plumb line or plummet, though some have proposed the material
      'lead' or 'tin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: This is what
  alternatives:
  - Thus
  - Like this
  lexicon: HALOT
  rationale: Introduces the visionary report idiomatically. 'This is what' is natural
    modern English while preserving the demonstrative force of the Hebrew.
- source_word: הִרְאַנִי
  chosen: he showed me
  alternatives:
  - he caused me to see
  - he let me see
  lexicon: HALOT
  rationale: Hiphil of ראה commonly means 'show.' English 'he showed me' best captures
    the causative sense in a vision report.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - and behold
  lexicon: HALOT
  rationale: Marks sudden visual presentation in the vision. 'Behold' preserves the
    deictic force and solemnity better than the more colloquial 'look.'
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: HALOT
  rationale: Title for God, translated rather than transliterated, in keeping with
    the project's policy on divine titles. The article in English is natural here
    after 'behold.'
- source_word: נִצָּב
  chosen: was standing
  alternatives:
  - stood
  - was stationed
  lexicon: HALOT
  rationale: Participial form conveys a scene in progress; 'was standing' reflects
    the visual immediacy of the vision.
- source_word: עַל
  chosen: beside
  alternatives:
  - 'on'
  - upon
  - by
  lexicon: HALOT
  rationale: Although עַל often means 'on/upon,' in this context with a wall and the
    following instrument imagery, English 'beside' better conveys the likely spatial
    sense of the Lord positioned for inspection. This avoids the awkward image of
    literally standing on top of a wall while remaining close to the Hebrew sense.
- source_word: חוֹמַת אֲנָךְ
  chosen: a wall built with a plumb line
  alternatives:
  - a plumb-line wall
  - a wall of plumb line
  - a wall made true
  lexicon: HALOT
  rationale: The phrase is difficult because אֲנָךְ likely denotes 'plumb line' (or
    related lead/plummet instrument). The construct is rendered to express a wall
    measured or built true by such an instrument, which fits the immediate repetition
    'with a plumb line in his hand.'
- source_word: אֲנָךְ
  chosen: plumb line
  alternatives:
  - plumb bob
  - tin
  - lead
  lexicon: HALOT
  rationale: Best contextual sense is a measuring instrument used to test vertical
    alignment. Some propose the material ('lead' or 'tin'), but the repeated use here
    strongly favors the instrument sense in context.
- source_word: וּבְיָדוֹ
  chosen: with a plumb line in his hand
  alternatives:
  - and in his hand was a plumb line
  lexicon: HALOT
  rationale: English fronting of the instrument phrase yields smoother style while
    preserving the Hebrew image of the Lord holding the object.
