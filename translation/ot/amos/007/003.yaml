id: AMO.7.3
reference: Amos 7:3
source:
  edition: WLC
  text: נִחַ֥ם יְהוָ֖ה עַל זֹ֑את לֹ֥א תִהְיֶ֖ה אָמַ֥ר יְהוָֽה־׃
translation:
  text: 'The LORD relented concerning this: “It will not happen,” said the LORD.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “The LORD changed his mind concerning this” or “The LORD was sorry about
      this.” The Hebrew verb can express relenting, regret, or a change in intended
      action depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִחַם
  chosen: relented
  alternatives:
  - was sorry
  - changed his mind
  - had compassion
  lexicon: HALOT
  rationale: In this prophetic-intercessory context, the Niphal of נחם describes YHWH
    withdrawing the announced judgment. 'Relented' best captures reversal of intended
    action without implying moral error or ignorance. Alternatives such as 'changed
    his mind' are possible but can overstate the anthropomorphic expression; 'had
    compassion' captures motive more than the action.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name YHWH is rendered 'the LORD'
    rather than transliterated, following established reverential convention and the
    pattern reflected in the Septuagint tradition.
- source_word: עַל זֹאת
  chosen: concerning this
  alternatives:
  - about this
  - regarding this
  - over this
  lexicon: HALOT
  rationale: The preposition עַל with the demonstrative points back to the just-described
    judgment vision. 'Concerning this' is natural English and preserves the referential
    force without overinterpreting the relation.
- source_word: לֹא תִהְיֶה
  chosen: It will not happen
  alternatives:
  - It shall not be
  - It will not come to pass
  lexicon: HALOT
  rationale: The feminine singular verb refers to the threatened event/disaster implied
    by the vision. 'It will not happen' is clear modern English and preserves the
    predictive negation. 'It shall not be' is more formal but less idiomatic for contemporary
    readers.
- source_word: אָמַר יְהוָה
  chosen: said the LORD
  alternatives:
  - declares the LORD
  - oracle of the LORD
  lexicon: HALOT
  rationale: The clause is a simple qatal of אמר introducing direct speech. 'Said
    the LORD' reflects the Hebrew straightforwardly. 'Declares the LORD' is common
    in English tradition but is stronger and more formulaic than the source here.
