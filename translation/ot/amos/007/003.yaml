theological_decisions:
- issue: Anthropopathic language for God in נִחַם יְהוָה
  chosen_reading: Render the verb as 'relented' and preserve the text's portrayal
    of God withdrawing announced judgment in response to intercession.
  alternative_readings:
  - The LORD repented
  - The LORD changed his mind
  - The LORD had compassion
  rationale: The verse uses humanly comprehensible language for divine action. To
    preserve theological tension without implying divine sinfulness or error, 'relented'
    is preferred. This keeps the text's force while avoiding a misleading English
    sense of 'repented.'
  doctrine_reference: Preserve theological tension rather than resolve it; יְהוָה
    default rendering 'the LORD'.
