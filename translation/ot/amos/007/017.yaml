id: AMO.7.17
reference: Amos 7:17
source:
  edition: WLC
  text: לָ/כֵ֞ן כֹּה אָמַ֣ר יְהוָ֗ה אִשְׁתְּ/ךָ֞ בָּ/עִ֤יר תִּזְנֶה֙ וּ/בָנֶ֤י/ךָ
    וּ/בְנֹתֶ֨י/ךָ֙ בַּ/חֶ֣רֶב יִפֹּ֔לוּ וְ/אַדְמָתְ/ךָ֖ בַּ/חֶ֣בֶל תְּחֻלָּ֑ק וְ/אַתָּ֗ה
    עַל אֲדָמָ֤ה טְמֵאָה֙ תָּמ֔וּת וְ/יִ֨שְׂרָאֵ֔ל גָּלֹ֥ה יִגְלֶ֖ה מֵ/עַ֥ל אַדְמָתֽ/וֹ־־׃ס
translation:
  text: 'Therefore, this is what the LORD says: ‘Your wife will prostitute herself
    in the city, and your sons and your daughters will fall by the sword, and your
    land will be divided by measuring line; and you yourself will die on unclean land,
    and Israel will surely go into exile away from its land.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “will play the prostitute.” The Hebrew verb can be rendered more literally
      this way; “will prostitute herself” is chosen for clear modern English.
    reason: lexical_alternative
  - marker: b
    text: Literally, “will be divided by line/cord,” referring to the measuring line
      used to apportion conquered land.
    reason: lexical_alternative
  - marker: c
    text: “Will surely go into exile” renders an infinitive absolute with a finite
      verb in Hebrew, expressing emphasis or certainty.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Introduces the judicial consequence of Amaziah's opposition; 'Therefore'
    preserves the inferential force in natural English.
- source_word: כֹּה אָמַר יְהוָה
  chosen: this is what the LORD says
  alternatives:
  - thus says the LORD
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. Chosen wording is readable modern
    English while preserving the formal declaration. YHWH rendered 'the LORD' per
    doctrine.
- source_word: אִשְׁתְּךָ
  chosen: Your wife
  lexicon: HALOT
  rationale: Direct possessive address to Amaziah; straightforward familial term.
- source_word: בָּעִיר
  chosen: in the city
  alternatives:
  - in the town
  lexicon: HALOT
  rationale: עִיר commonly means 'city.' The prefixed article is preserved.
- source_word: תִּזְנֶה
  chosen: will prostitute herself
  alternatives:
  - will become a prostitute
  - will commit prostitution
  - will play the prostitute
  lexicon: HALOT
  rationale: The verb זנה denotes sexual prostitution/whoredom. 'Will prostitute herself'
    is direct and idiomatic in modern English, avoiding archaic 'play the harlot'
    while keeping the starkness of the judgment.
- source_word: וּבָנֶיךָ וּבְנֹתֶיךָ
  chosen: and your sons and your daughters
  alternatives:
  - and your children
  lexicon: HALOT
  rationale: Retains the explicit gendered pair in the Hebrew rather than collapsing
    to 'children,' in keeping with gender-accurate translation.
- source_word: בַּחֶרֶב יִפֹּלוּ
  chosen: will fall by the sword
  alternatives:
  - will die by the sword
  - will be killed by the sword
  lexicon: HALOT
  rationale: A common Hebrew idiom for violent death in war/judgment. 'Fall by the
    sword' preserves the idiom and solemn tone.
- source_word: וְאַדְמָתְךָ
  chosen: and your land
  alternatives:
  - and your ground
  - and your soil
  lexicon: HALOT
  rationale: אֲדָמָה here refers to landed property/territory rather than soil in
    a physical sense.
- source_word: בַּחֶבֶל
  chosen: by measuring line
  alternatives:
  - with a line
  - by cord
  lexicon: HALOT
  rationale: חֶבֶל can denote a cord/line used for measuring land. In this context
    of land division, 'measuring line' makes the sense explicit without over-paraphrasing.
- source_word: תְּחֻלָּק
  chosen: will be divided
  alternatives:
  - will be apportioned
  - will be parceled out
  lexicon: HALOT
  rationale: Passive sense of division/allotment of land under conquest; 'divided'
    is clear and sufficiently formal.
- source_word: וְאַתָּה
  chosen: and you yourself
  alternatives:
  - and you
  - but you
  lexicon: HALOT
  rationale: The pronoun is explicit in Hebrew and carries emphasis; 'you yourself'
    reflects that emphasis.
- source_word: עַל אֲדָמָה טְמֵאָה
  chosen: on unclean land
  alternatives:
  - in an unclean land
  - upon impure soil
  lexicon: HALOT
  rationale: Refers to foreign land rendered ritually/morally unclean from Israelite
    covenant perspective. 'On unclean land' is a close rendering of עַל + אֲדָמָה.
- source_word: תָּמוּת
  chosen: will die
  lexicon: HALOT
  rationale: Simple future prediction of death; no need to intensify beyond the Hebrew.
- source_word: וְיִשְׂרָאֵל גָּלֹה יִגְלֶה
  chosen: and Israel will surely go into exile
  alternatives:
  - and Israel will certainly be exiled
  - and Israel will indeed go into exile
  lexicon: HALOT
  rationale: The infinitive absolute + finite verb intensifies the certainty of exile.
    'Will surely go into exile' preserves both the verbal idea and emphatic force.
- source_word: מֵעַל אַדְמָתוֹ
  chosen: away from its land
  alternatives:
  - from upon its land
  - from its soil
  lexicon: HALOT
  rationale: מֵעַל literally 'from upon' often functions idiomatically as removal
    from the land. 'Away from its land' is natural English that preserves the sense
    of displacement.
