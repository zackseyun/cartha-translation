theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for YHWH and aligns with the prophetic
    formula's established covenantal sense without transliterating the name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of 'unclean land'
  chosen_reading: foreign land described as unclean from Israel's covenantal/ritual
    perspective
  alternative_readings:
  - morally defiled land in a general sense
  rationale: The phrase most naturally refers to dying in exile outside the holy land,
    matching the verse's final clause about Israel's exile. The translation preserves
    the text's wording without expanding it in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension
    rather than resolve it
