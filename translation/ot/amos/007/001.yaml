id: AMO.7.1
reference: Amos 7:1
source:
  edition: WLC
  text: כֹּ֤ה הִרְאַ֨/נִי֙ אֲדֹנָ֣/י יְהוִ֔ה וְ/הִנֵּה֙ יוֹצֵ֣ר גֹּבַ֔י בִּ/תְחִלַּ֖ת עֲל֣וֹת הַ/לָּ֑קֶשׁ וְ/הִ֨נֵּה לֶ֔קֶשׁ אַחַ֖ר גִּזֵּ֥י הַ/מֶּֽלֶךְ־׃
translation:
  text: 'This is what the Lord GOD showed me: behold, he was forming locusts at the beginning of the spring crop''s coming up, and behold, it was the spring crop after the king''s mowings.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the late crop' or 'the latter growth.' The Hebrew term refers to the later spring growth after an earlier cutting.
    reason: lexical_alternative
  - marker: b
    text: '''The king''s mowings'' likely refers to an initial cutting of grass or fodder claimed as royal due, after which the later crop would grow.'
    reason: cultural_note
lexical_decisions:
- source_word: כֹּה
  chosen: This is what
  alternatives:
  - Thus
  - Like this
  lexicon: HALOT
  rationale: Introduces a visionary report formula. 'This is what' is natural modern English and preserves the demonstrative force better than the more archaic 'Thus.'
- source_word: הִרְאַנִי
  chosen: showed me
  alternatives:
  - caused me to see
  lexicon: HALOT
  rationale: Hiphil of ראה here introduces prophetic vision. 'Showed me' is idiomatic and accurately conveys causative perception.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: For יְהוָה, DOCTRINE.md specifies the default 'the LORD.' In the compound title אֲדֹנָי יְהוִה, standard English convention avoids 'Lord LORD' by rendering 'Lord GOD,' which preserves both elements while respecting the covenant-name policy.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - and see
  lexicon: HALOT
  rationale: Marks vivid presentation within the vision. 'Behold' retains the prophetic immediacy and solemnity better than more colloquial alternatives.
- source_word: יוֹצֵר
  chosen: was forming
  alternatives:
  - was shaping
  - formed
  lexicon: HALOT
  rationale: Participle of יצר depicts ongoing action in the vision. 'Was forming' preserves the progressive sense better than a simple past.
- source_word: גֹּבַי
  chosen: locusts
  alternatives:
  - grasshoppers
  - locust swarm
  lexicon: HALOT
  rationale: The noun refers to locusts/devouring insects in an agricultural judgment context. 'Locusts' is the clearest and most contextually fitting English rendering.
- source_word: בִּתְחִלַּת עֲלוֹת
  chosen: at the beginning of ... coming up
  alternatives:
  - when ... first began to sprout
  - at the start of the growth of
  lexicon: HALOT
  rationale: The phrase marks the initial stage of crop emergence. Rendering both temporal and verbal elements preserves the Hebrew sequence.
- source_word: הַלָּקֶשׁ / לֶקֶשׁ
  chosen: the spring crop / the spring crop
  alternatives:
  - the late crop
  - the second crop
  lexicon: HALOT
  rationale: לקש refers to the later growth/crop, traditionally 'latter growth.' 'Spring crop' communicates the agricultural sense in accessible English, while avoiding the potentially opaque 'latter growth.' The repeated noun is reflected both times for coherence.
- source_word: אַחַר
  chosen: after
  alternatives:
  - following
  lexicon: HALOT
  rationale: Simple temporal/sequential preposition; 'after' is direct and natural.
- source_word: גִּזֵּי הַמֶּלֶךְ
  chosen: the king's mowings
  alternatives:
  - the king's shearings
  - the king's cuttings
  lexicon: HALOT
  rationale: Refers to the first cut of fodder/grass reserved for the king. 'Mowings' best fits the agricultural context in English, though the underlying noun is related to cutting/shearing.
