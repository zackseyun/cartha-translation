theological_decisions:
- issue: Whether Amos denies being a prophet absolutely or denies being a professional/guild
    prophet
  chosen_reading: The main text preserves the literal denial ('I am not a prophet
    ... nor a son of a prophet') without resolving whether Amos means 'not by profession'
    or 'not by status/origin.'
  alternative_readings:
  - Amos denies being a prophet in the institutional or professional sense, not his
    actual prophetic calling
  - Amos speaks only of his prior occupation before divine commissioning
  rationale: The immediate context shows Amos does in fact speak God's word, so the
    statement is best left as the Hebrew presents it, allowing the tension to stand
    rather than paraphrasing it away.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
