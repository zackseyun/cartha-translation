id: AMO.7.14
reference: Amos 7:14
source:
  edition: WLC
  text: וַ/יַּ֤עַן עָמוֹס֙ וַ/יֹּ֣אמֶר אֶל אֲמַצְיָ֔ה לֹא נָבִ֣יא אָנֹ֔כִי וְ/לֹ֥א
    בֶן נָבִ֖יא אָנֹ֑כִי כִּֽי בוֹקֵ֥ר אָנֹ֖כִי וּ/בוֹלֵ֥ס שִׁקְמִֽים־־־־׃
translation:
  text: Then Amos answered and said to Amaziah, “I am not a prophet, nor am I a son
    of a prophet; rather, I am a herdsman and one who tends sycamore figs.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'nor am I a prophet’s son'; the Hebrew idiom may refer to membership
      in a prophetic guild rather than literal descent.
    reason: lexical_alternative
  - marker: b
    text: Or 'a dresser of sycamore figs' or 'one who pierces sycamore figs'; the
      Hebrew likely refers to cultivating or preparing the fruit of the sycamore-fig
      tree.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: The verb ענה in this narrative formula commonly means 'answer/respond.'
    'Answered' fits the Hebrew idiom and pairs naturally with the following 'said.'
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard rendering for אמר in direct speech introduction. Keeping both
    verbs ('answered and said') preserves the Hebrew narrative cadence.
- source_word: לֹא נָבִיא אָנֹכִי
  chosen: I am not a prophet
  alternatives:
  - I am no prophet
  lexicon: HALOT
  rationale: A straightforward predicative clause. 'I am not a prophet' is clear modern
    English and preserves the explicit pronoun emphasis without overtranslating it.
- source_word: וְלֹא בֶן נָבִיא אָנֹכִי
  chosen: nor am I a son of a prophet
  alternatives:
  - nor am I a prophet's son
  lexicon: HALOT
  rationale: The Hebrew idiom 'son of a prophet' likely refers to membership in a
    prophetic guild or prophetic lineage. The more literal rendering preserves the
    idiom and its possible institutional nuance better than the smoother 'prophet's
    son.'
- source_word: כִּי
  chosen: rather
  alternatives:
  - for
  - but
  lexicon: HALOT
  rationale: Here כִּי introduces Amos's contrasting self-description after two denials.
    'Rather' communicates the adversative/explanatory force in natural English better
    than a wooden 'for.'
- source_word: בוֹקֵר
  chosen: herdsman
  alternatives:
  - cattleman
  - shepherd
  lexicon: HALOT
  rationale: בוקר denotes one involved with cattle/herds rather than specifically
    sheep. 'Herdsman' is broader and more accurate than the traditional 'shepherd.'
- source_word: וּבוֹלֵס שִׁקְמִים
  chosen: one who tends sycamore figs
  alternatives:
  - a dresser of sycamore figs
  - one who pierces sycamore figs
  lexicon: HALOT
  rationale: The participle בולס is traditionally understood of caring for or preparing
    sycamore figs, possibly by pinching/slitting them to ripen. 'One who tends sycamore
    figs' communicates the agricultural occupation in readable English without forcing
    a more technical interpretation into the main text.
- source_word: שִׁקְמִים
  chosen: sycamore figs
  alternatives:
  - sycamore fruit
  - fig-mulberries
  lexicon: HALOT
  rationale: This refers to the fruit of the sycamore-fig tree, not the modern North
    American sycamore. 'Sycamore figs' is the clearest concise rendering.
