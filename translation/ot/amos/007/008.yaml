theological_decisions:
- issue: Divine names/titles distinction
  chosen_reading: Render יְהוָה as 'the LORD' and אֲדֹנָי as 'the Lord'
  alternative_readings:
  - Render both simply as 'the Lord'
  - Render יְהוָה as 'Yahweh'
  rationale: The verse contains both the covenant name and the title. Distinguishing
    them in English preserves the source-text nuance while following the project's
    stated default for YHWH.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Judgment idiom in לֹא אוֹסִיף עוֹד עֲבוֹר לוֹ
  chosen_reading: Retain the idiom 'pass by them' in the main text, with the sense
    'spare/overlook' preserved in a footnote
  alternative_readings:
  - I will spare them no longer
  - I will no longer overlook them
  rationale: This preserves theological tension and the Hebrew metaphor rather than
    resolving it entirely into interpretation. The context clearly concerns impending
    judgment, but the idiom itself is worth retaining in the text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
