id: AMO.7.8
reference: Amos 7:8
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֵלַ֗/י מָֽה אַתָּ֤ה רֹאֶה֙ עָמ֔וֹס וָ/אֹמַ֖ר אֲנָ֑ךְ
    וַ/יֹּ֣אמֶר אֲדֹנָ֗/י הִנְ/נִ֨י שָׂ֤ם אֲנָךְ֙ בְּ/קֶ֨רֶב֙ עַמִּ֣/י יִשְׂרָאֵ֔ל
    לֹֽא אוֹסִ֥יף ע֖וֹד עֲב֥וֹר לֽ/וֹ־־׃
translation:
  text: And the LORD said to me, “What do you see, Amos?” And I said, “A plumb line.”
    Then the Lord said, “Look, I am setting a plumb line in the midst of my people
    Israel; I will not again pass by them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, possibly, 'tin,' 'lead,' or 'plummet'; the Hebrew term likely refers
      to a measuring device or material associated with a plumb line.
    reason: lexical_alternative
  - marker: b
    text: '''I will not again pass by them'' likely means ''I will no longer spare
      them'' or ''I will no longer overlook their sin.'''
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name YHWH, rendered 'the LORD' rather
    than transliteration, following established reverential convention and the project's
    contested-terms guidance.
- source_word: מָה אַתָּה רֹאֶה
  chosen: What do you see
  alternatives:
  - What are you seeing
  lexicon: HALOT
  rationale: Natural English present-tense question reflecting the participle רֹאֶה
    in context of an immediate vision report.
- source_word: אֲנָךְ
  chosen: plumb line
  alternatives:
  - tin
  - lead
  - plummet
  lexicon: HALOT
  rationale: In Amos 7:7-8 the object is used for measuring vertical straightness
    in a vision of judgment; 'plumb line' best fits the contextual sense in standard
    modern English. The noun's precise etymological reference is debated, with some
    proposing a metal such as tin or lead, but the functional meaning in context is
    most likely the measuring tool or its weighted line.
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord GOD
  - my Lord
  lexicon: HALOT
  rationale: Here אֲדֹנָי refers to God in direct speech. Rendered 'the Lord' in readable
    modern English. Since the Hebrew form is not יְהוָה here, small-caps 'LORD' is
    not used.
- source_word: הִנְנִי
  chosen: Look, I am
  alternatives:
  - Behold, I am
  - Here I am, setting
  lexicon: HALOT
  rationale: Introduces divine declaration with deictic force. 'Look' preserves the
    attention-getting function without archaic 'behold.'
- source_word: שָׂם
  chosen: setting
  alternatives:
  - placing
  - putting
  lexicon: HALOT
  rationale: Present progressive fits the participial form and the vividness of the
    vision scene.
- source_word: בְּקֶרֶב
  chosen: in the midst of
  alternatives:
  - among
  - within
  lexicon: HALOT
  rationale: '''In the midst of'' preserves the spatial and covenantal force of God
    placing the measuring standard within Israel itself, while remaining natural English.'
- source_word: לֹא אוֹסִיף עוֹד עֲבוֹר לוֹ
  chosen: I will not again pass by them
  alternatives:
  - I will no longer spare them
  - I will not continue to pass over him/it
  lexicon: HALOT
  rationale: The idiom with עבר in this prophetic context means no longer passing
    over in forbearance, i.e., no longer overlooking judgment. 'Pass by them' keeps
    the Hebrew image in the main text while allowing the implied sense of sparing
    to remain in a footnote. The pronominal suffix is singular in form but refers
    collectively to Israel as a people; English plural 'them' communicates the referent
    clearly.
