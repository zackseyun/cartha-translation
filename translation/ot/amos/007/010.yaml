theological_decisions:
- issue: Nature of Amaziah's accusation against Amos
  chosen_reading: 'Rendered קָשַׁר as a political accusation: ''has conspired against
    you'''
  alternative_readings:
  - has plotted against you
  rationale: The verse reports Amaziah's hostile characterization of Amos before the
    king, not the narrator's endorsement that Amos truly engaged in treason. The translation
    preserves the accusation without importing judgment beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
