id: AMO.7.10
reference: Amos 7:10
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֗ח אֲמַצְיָה֙ כֹּהֵ֣ן בֵּֽית אֵ֔ל אֶל יָרָבְעָ֥ם מֶֽלֶךְ יִשְׂרָאֵ֖ל
    לֵ/אמֹ֑ר קָשַׁ֨ר עָלֶ֜י/ךָ עָמ֗וֹס בְּ/קֶ֨רֶב֙ בֵּ֣ית יִשְׂרָאֵ֔ל לֹא תוּכַ֣ל
    הָ/אָ֔רֶץ לְ/הָכִ֖יל אֶת כָּל דְּבָרָֽי/ו־־־־־־׃
translation:
  text: Then Amaziah, the priest of Bethel, sent word to Jeroboam king of Israel,
    saying, “Amos has conspired against you in the midst of the house of Israel; the
    land is not able to bear all his words.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has plotted against you.' The Hebrew verb can denote conspiracy or plotting,
      especially in political settings.
    reason: lexical_alternative
  - marker: b
    text: Or 'among the house of Israel.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the land is not able to contain/endure all his words.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent word
  alternatives:
  - sent
  - dispatched
  lexicon: HALOT
  rationale: The verb means 'sent,' but in English the object of the sending is implicit
    here since the following לֵאמֹר introduces the message. 'Sent word' makes the
    communicative action natural without adding content beyond the Hebrew.
- source_word: כֹּהֵן בֵּית אֵל
  chosen: the priest of Bethel
  alternatives:
  - priest of Beth-el
  - priest at Bethel
  lexicon: HALOT
  rationale: Construct chain identifying Amaziah's office and cultic location. 'Of
    Bethel' is the most natural English rendering and preserves the institutional
    association.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard messenger formula introducing direct speech.
- source_word: קָשַׁר
  chosen: has conspired
  alternatives:
  - has plotted
  - has formed a conspiracy
  lexicon: HALOT
  rationale: The verb commonly denotes conspiracy or plotting, often political. 'Has
    conspired' best captures Amaziah's accusatory framing to the king.
- source_word: עָלֶיךָ
  chosen: against you
  alternatives:
  - against you personally
  - concerning you
  lexicon: HALOT
  rationale: With קָשַׁר, עַל marks the target of the alleged conspiracy. 'Against
    you' is the idiomatic and direct rendering.
- source_word: בְּקֶרֶב
  chosen: in the midst of
  alternatives:
  - among
  - within
  lexicon: HALOT
  rationale: Literally 'in the midst of.' This preserves the spatial/social sense
    that Amos is operating from within Israel itself. A smoother alternative is 'among,'
    but the fuller phrase retains the Hebrew force.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: This covenantal-national expression is retained rather than flattened
    to 'Israel,' since the phrase is common and meaningful in prophetic discourse.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ/earth
  - the country
  lexicon: HALOT
  rationale: In context this most naturally refers to the land/country of Israel rather
    than the whole earth. 'Land' also fits the political complaint being made to the
    king.
- source_word: לְהָכִיל
  chosen: to bear
  alternatives:
  - to contain
  - to endure
  lexicon: HALOT
  rationale: The infinitive from כול here conveys capacity to contain/endure. 'Bear'
    is idiomatic in English for tolerating weighty words and matches the rhetorical
    force of Amaziah's complaint.
- source_word: כָּל דְּבָרָיו
  chosen: all his words
  alternatives:
  - everything he says
  - all his sayings
  lexicon: HALOT
  rationale: A fairly literal rendering that preserves the plural 'words' and the
    totalizing 'all.' 'Everything he says' is possible but less formally tied to the
    Hebrew wording.
