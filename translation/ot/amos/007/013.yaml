id: AMO.7.13
reference: Amos 7:13
source:
  edition: WLC
  text: וּ/בֵֽית אֵ֔ל לֹֽא תוֹסִ֥יף ע֖וֹד לְ/הִנָּבֵ֑א כִּ֤י מִקְדַּשׁ מֶ֨לֶךְ֙ ה֔וּא
    וּ/בֵ֥ית מַמְלָכָ֖ה הֽוּא־־־׃ס
translation:
  text: But at Bethel you must not continue to prophesy any longer, for it is the
    king’s sanctuary, and it is a royal house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not prophesy again' / 'you shall no longer prophesy.' The Hebrew
      literally says 'do not add any more to prophesy.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the house of the kingdom.' The phrase likely refers to Bethel as an
      institution of the royal regime.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בֵית אֵל
  chosen: But at Bethel
  alternatives:
  - And at Bethel
  - and Bethel
  lexicon: HALOT
  rationale: 'The conjunction ו here continues Amaziah’s speech with adversative force
    in English given the preceding command to flee to Judah (v. 12). ''Bethel'' is
    transliterated as a place name. The prefixed ב on ''house of El'' functions idiomatically
    as the place name ''Bethel,'' and the sense here is locative: ''at Bethel.'''
- source_word: לֹא תוֹסִיף עוֹד לְהִנָּבֵא
  chosen: you must not continue to prophesy any longer
  alternatives:
  - do not prophesy again
  - you shall no longer prophesy
  lexicon: HALOT
  rationale: 'The Hiphil of יסף with עוד plus infinitive conveys continuation or repetition:
    ''do not add/continue any more to prophesy.'' ''Continue to prophesy any longer''
    captures both the verbal construction and natural English. ''Must not'' reflects
    the force of Amaziah’s prohibition in direct speech.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the prohibition. 'For' is concise and fits
    the explanatory clause.
- source_word: מִקְדַּשׁ מֶלֶךְ
  chosen: the king’s sanctuary
  alternatives:
  - a royal sanctuary
  - the sanctuary of the king
  lexicon: HALOT
  rationale: 'מִקְדַּשׁ denotes a holy place or sanctuary. The construct with ''king''
    most naturally means possession or association: a sanctuary belonging to or controlled
    by the king. ''The king’s sanctuary'' is the most direct rendering.'
- source_word: וּ/בֵית מַמְלָכָה
  chosen: a royal house
  alternatives:
  - the house of the kingdom
  - a kingdom house
  - a state temple
  lexicon: HALOT
  rationale: בֵּית in construct with מַמְלָכָה literally means 'house of the kingdom/royal
    power.' In context, Amaziah is stressing Bethel’s status as an institution of
    the monarchy. 'A royal house' preserves the metaphor while remaining readable.
    More interpretive renderings like 'state temple' explain the sense but go beyond
    the lexical form.
- source_word: הוּא ... הוּא
  chosen: it is ... and it is
  alternatives:
  - it belongs to ... and belongs to
  - this is ... and this is
  lexicon: HALOT
  rationale: 'The repeated pronoun gives emphatic predication: ''it is ... and it
    is ...'' Preserving both clauses reflects the Hebrew emphasis.'
