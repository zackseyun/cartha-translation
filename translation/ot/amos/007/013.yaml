theological_decisions:
- issue: Nature of Bethel’s designation in Amaziah’s speech
  chosen_reading: Render the political-religious claim descriptively as 'the king’s
    sanctuary' and 'a royal house' without endorsing its legitimacy as true worship.
  alternative_readings:
  - Translate more interpretively as 'state sanctuary/temple'
  rationale: The verse reports Amaziah’s rationale for silencing Amos. The translation
    should preserve the institutional and political claim without importing theological
    approval of Bethel’s cult. A more interpretive rendering like 'state sanctuary'
    is possible but less textually transparent.
  doctrine_reference: Translation philosophy §§1, 3, 5
