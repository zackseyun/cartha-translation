id: AMO.7.16
reference: Amos 7:16
source:
  edition: WLC
  text: וְ/עַתָּ֖ה שְׁמַ֣ע דְּבַר יְהוָ֑ה אַתָּ֣ה אֹמֵ֗ר לֹ֤א תִנָּבֵא֙ עַל יִשְׂרָאֵ֔ל
    וְ/לֹ֥א תַטִּ֖יף עַל בֵּ֥ית יִשְׂחָֽק־־־׃
translation:
  text: 'And now, hear the word of the LORD: You say, ‘Do not prophesy against Israel,
    and do not preach against the house of Isaac.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not pour out words against the house of Isaac.' The Hebrew verb behind
      'preach' is literally 'drip' and is used idiomatically for prophetic speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  - So now
  lexicon: HALOT
  rationale: Introduces a direct, immediate transition in Amos's reply. 'And now'
    preserves the conjunction plus temporal adverb without sounding wooden.
- source_word: שְׁמַע
  chosen: hear
  alternatives:
  - listen
  - hear now
  lexicon: HALOT
  rationale: Imperative singular addressed to Amaziah. 'Hear' is direct and idiomatic
    in prophetic speech.
- source_word: דְּבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Word' preserves the covenantal and revelatory
    weight of דָּבָר. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: אַתָּה אֹמֵר
  chosen: You say
  alternatives:
  - you are saying
  - you keep saying
  lexicon: HALOT
  rationale: The pronoun plus participle marks Amaziah's stated command. Simple present
    English best captures the force in context.
- source_word: לֹא תִנָּבֵא עַל יִשְׂרָאֵל
  chosen: Do not prophesy against Israel
  alternatives:
  - You must not prophesy against Israel
  - Do not prophesy to Israel
  lexicon: HALOT
  rationale: The negative plus imperfect is best represented as a prohibition in reported
    speech. עַל in this hostile context is better rendered 'against' rather than merely
    'concerning' or 'to'.
- source_word: וְלֹא תַטִּיף
  chosen: and do not preach
  alternatives:
  - and do not speak
  - and do not drip words
  - and do not prophesy
  lexicon: HALOT
  rationale: The Hiphil of נטף is a prophetic idiom for uttering or pouring forth
    speech, especially prophetic speech. 'Preach' communicates the idiomatic force
    in natural English while distinguishing it slightly from the previous verb 'prophesy.'
- source_word: עַל בֵּית יִשְׂחָק
  chosen: against the house of Isaac
  alternatives:
  - to the house of Isaac
  - concerning the house of Isaac
  lexicon: HALOT
  rationale: '''House of Isaac'' is a poetic designation for the northern kingdom/Israel
    in Amos. ''Against'' matches the adversative force of עַל in context and parallels
    the previous clause.'
- source_word: בֵּית יִשְׂחָק
  chosen: the house of Isaac
  alternatives:
  - the family of Isaac
  lexicon: HALOT
  rationale: Retains the prophetic and covenantal expression rather than flattening
    it to 'family.'
