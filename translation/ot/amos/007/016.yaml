theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render the Tetragrammaton as 'the LORD,' following
    the stated doctrine and established reverential convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Relation of Amos's speech to Israel
  chosen_reading: against Israel / against the house of Isaac
  alternative_readings:
  - to Israel / to the house of Isaac
  - concerning Israel / concerning the house of Isaac
  rationale: In this context Amaziah is forbidding hostile prophetic denunciation.
    Rendering עַל as 'against' preserves the confrontational force of Amos's message
    without importing extra theology.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy
    over translation tradition'
