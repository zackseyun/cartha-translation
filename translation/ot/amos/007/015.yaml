theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, preserving reverential convention and broad ecclesial readability.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the prophetic commission toward Israel
  chosen_reading: to my people Israel
  alternative_readings:
  - against my people Israel
  rationale: The Hebrew preposition אֶל most naturally means 'to.' Since the text
    does not explicitly use a hostile preposition here, the translation preserves
    the wording without importing the judgment nuance from the broader context into
    this verse itself.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
