id: AMO.7.15
reference: Amos 7:15
source:
  edition: WLC
  text: וַ/יִּקָּחֵ֣/נִי יְהוָ֔ה מֵ/אַחֲרֵ֖י הַ/צֹּ֑אן וַ/יֹּ֤אמֶר אֵלַ/י֙ יְהוָ֔ה
    לֵ֥ךְ הִנָּבֵ֖א אֶל עַמִּ֥/י יִשְׂרָאֵֽל־׃
translation:
  text: But the LORD took me from following the flock, and the LORD said to me, “Go,
    prophesy to my people Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from behind the flock,” more literally reflecting the Hebrew idiom.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says “to my people Israel”; in context the prophetic message
      includes judgment, but the verse itself does not explicitly say “against.”
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקָּחֵנִי
  chosen: took me
  alternatives:
  - seized me
  - took hold of me
  lexicon: HALOT
  rationale: לקח commonly means 'take.' In this context it describes the LORD's taking
    Amos from his prior occupation into prophetic service. 'Took me' is natural English
    and preserves the directness without overinterpreting it as forceful seizure.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.' This also matches established English convention for the Tetragrammaton.
- source_word: מֵאַחֲרֵי הַצֹּאן
  chosen: from following the flock
  alternatives:
  - from behind the flock
  - from tending the sheep
  lexicon: HALOT
  rationale: The phrase is literally 'from after the flock.' 'From following the flock'
    preserves the pastoral image and the Hebrew idiom better than the more interpretive
    'from tending the sheep,' while remaining readable.
- source_word: הַצֹּאן
  chosen: the flock
  alternatives:
  - the sheep
  lexicon: HALOT
  rationale: צאן can denote small livestock collectively, often sheep/goats. 'Flock'
    is the best collective English equivalent here and fits the occupational setting.
- source_word: וַיֹּאמֶר אֵלַי
  chosen: said to me
  alternatives:
  - told me
  lexicon: HALOT
  rationale: A straightforward rendering of אמר + אל. 'Said to me' is slightly more
    formal and preserves the speech-act wording.
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Go on
  - Depart
  lexicon: HALOT
  rationale: The imperative of הלך is best rendered simply as 'Go,' preserving the
    commissioning force.
- source_word: הִנָּבֵא
  chosen: prophesy
  alternatives:
  - speak as a prophet
  - declare prophetically
  lexicon: HALOT
  rationale: The Niphal imperative of נבא is the standard verb for prophetic proclamation.
    'Prophesy' is concise, accurate, and idiomatic.
- source_word: אֶל עַמִּי יִשְׂרָאֵל
  chosen: to my people Israel
  alternatives:
  - against my people Israel
  - to Israel my people
  lexicon: HALOT
  rationale: The preposition is אֶל, normally 'to,' not 'against.' Although prophetic
    speech often contains judgment, the Hebrew here does not itself specify hostility.
    'To my people Israel' preserves both the covenantal claim and the direction of
    the commission.
