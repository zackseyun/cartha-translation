theological_decisions:
- issue: Anthropopathic language for God in נִחַם
  chosen_reading: Retain relational language with 'relented' rather than paraphrasing
    away the expression.
  alternative_readings:
  - The LORD changed his mind
  - The LORD had compassion
  rationale: The Hebrew presents God as responding to prophetic intercession. The
    translation should preserve that tension without importing a full doctrinal explanation
    of divine immutability or denying the text's plain sense. 'Relented' best preserves
    the wording while avoiding misleading implications of error or ignorance in God.
  doctrine_reference: Preserve theological tension rather than resolve it.
