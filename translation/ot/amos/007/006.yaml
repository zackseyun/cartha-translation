id: AMO.7.6
reference: Amos 7:6
source:
  edition: WLC
  text: נִחַ֥ם יְהוָ֖ה עַל זֹ֑את גַּם הִיא֙ לֹ֣א תִֽהְיֶ֔ה אָמַ֖ר אֲדֹנָ֥/י יְהוִֽה־־׃ס
translation:
  text: 'The LORD relented concerning this also: “It too shall not happen,” said the
    Lord GOD.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “changed his mind concerning this”; Hebrew anthropopathic language describing
      the LORD’s response to intercession.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִחַם
  chosen: relented
  alternatives:
  - was sorry
  - changed his mind
  - had compassion
  lexicon: HALOT
  rationale: In the Niphal, נחם can denote relenting or changing course in response
    to intercession. 'Relented' fits the immediate context of Amos's plea and avoids
    implying moral fault in God while preserving the anthropopathic force of the Hebrew.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established English convention and the stated policy for יְהוָה.
- source_word: עַל זֹאת
  chosen: concerning this
  alternatives:
  - about this
  - regarding this
  - over this
  lexicon: HALOT
  rationale: The preposition עַל with זֹאת here marks the matter under discussion,
    namely the announced judgment vision. 'Concerning this' is natural English and
    semantically precise.
- source_word: גַּם הִיא
  chosen: It too
  alternatives:
  - This also
  - It also
  lexicon: HALOT
  rationale: The feminine pronoun refers back to the envisioned judgment/disaster.
    'It too' preserves the anaphoric pronoun and the additive force of גַּם in concise
    English.
- source_word: לֹא תִהְיֶה
  chosen: shall not happen
  alternatives:
  - shall not be
  - will not come to pass
  lexicon: HALOT
  rationale: Although literally 'shall not be,' in context the clause refers to the
    non-occurrence of the announced event. 'Shall not happen' communicates the idiomatic
    sense clearly in modern English.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - Lord GOD
  - the Sovereign LORD
  lexicon: HALOT
  rationale: This title combines אֲדֹנָי with the divine name. 'The Lord GOD' is a
    standard, transparent rendering that distinguishes the title from the earlier
    standalone יְהוָה while avoiding interpretive expansion such as 'Sovereign LORD.'
