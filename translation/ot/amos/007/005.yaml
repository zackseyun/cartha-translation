id: AMO.7.5
reference: Amos 7:5
source:
  edition: WLC
  text: וָ/אֹמַ֗ר אֲדֹנָ֤/י יְהוִה֙ חֲדַל נָ֔א מִ֥י יָק֖וּם יַעֲקֹ֑ב כִּ֥י קָטֹ֖ן הֽוּא־׃
translation:
  text: Then I said, “Lord GOD, please cease. How can Jacob stand? For he is small.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Lord YHWH'' (אֲדֹנָי יְהוִה); English ''Lord GOD'' reflects the combined title and avoids ''Lord LORD.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'Who can Jacob stand?' / 'Who will raise up Jacob?' The Hebrew phrase is terse; the main text takes it as a plea that Jacob cannot endure on his own.
    reason: alternative_reading
lexical_decisions:
- source_word: וָאֹמַר
  chosen: Then I said
  alternatives:
  - And I said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then I said' gives natural English narrative flow while preserving sequence.
- source_word: אֲדֹנָי יְהוִה
  chosen: Lord GOD
  alternatives:
  - Lord GOD
  - Lord Yahweh
  - Lord the LORD
  lexicon: HALOT
  rationale: This compound divine title combines אֲדֹנָי with YHWH. Following the doctrine default, YHWH is rendered 'the LORD'; in the fixed English convention for this combination, 'Lord GOD' avoids the awkward 'Lord LORD' and signals both elements of the Hebrew title.
- source_word: חֲדַל נָא
  chosen: please stop
  alternatives:
  - cease, please
  - please cease
  - forbear, please
  lexicon: HALOT
  rationale: The imperative חֲדַל means 'stop/cease,' and נָא adds entreaty ('please'). 'Please stop' is clear, direct, and fits Amos's intercessory plea.
- source_word: מִי יָקוּם
  chosen: How can ... stand?
  alternatives:
  - Who will raise up ...?
  - Who can stand ...?
  - How will ... arise?
  lexicon: HALOT
  rationale: Although literally 'who will arise/stand up,' in context this is a rhetorical question about Jacob's ability to endure after judgment. English idiom is best captured by 'How can Jacob stand?' preserving the sense of survival rather than introducing an unnamed agent who would 'raise up' Jacob.
- source_word: יַעֲקֹב
  chosen: Jacob
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: The Hebrew names Jacob explicitly. It functions as a covenantal/national designation for Israel, but the translation should preserve the proper name used in the source text.
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the plea. 'For' preserves the explanatory force in a concise literary register.
- source_word: קָטֹן הוּא
  chosen: he is small
  alternatives:
  - he is little
  - he is weak
  - it is small
  lexicon: HALOT
  rationale: The adjective denotes smallness/littleness. With Jacob personified as a singular masculine entity, 'he is small' preserves the metaphor and the Hebrew grammar. 'Weak' is interpretive and therefore not preferred in the main text.
