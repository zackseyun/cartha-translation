id: AMO.7.11
reference: Amos 7:11
source:
  edition: WLC
  text: כִּי כֹה֙ אָמַ֣ר עָמ֔וֹס בַּ/חֶ֖רֶב יָמ֣וּת יָרָבְעָ֑ם וְ/יִ֨שְׂרָאֵ֔ל גָּלֹ֥ה
    יִגְלֶ֖ה מֵ/עַ֥ל אַדְמָתֽ/וֹ־׃ס
translation:
  text: 'For this is what Amos has said: ‘Jeroboam will die by the sword, and Israel
    will surely go into exile away from its land.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “will certainly be exiled” or “will surely be carried away into exile.”
      The Hebrew uses an infinitive absolute with a finite verb for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces Amaziah's explanation/report of the charge. 'For' fits the
    discourse flow in English, linking this verse to the preceding accusation.
- source_word: כֹה אָמַר
  chosen: this is what ... has said
  alternatives:
  - thus said
  - this is what ... said
  lexicon: HALOT
  rationale: The idiom כֹה אָמַר is commonly rendered 'thus says/said.' Because Amaziah
    is reporting a prior prophetic statement, English present-perfect 'has said' naturally
    conveys the reported utterance while preserving the formulaic force.
- source_word: עָמוֹס
  chosen: Amos
  rationale: Standard transliteration of the personal name, in keeping with the policy
    to transliterate names.
- source_word: בַּחֶרֶב
  chosen: by the sword
  alternatives:
  - with the sword
  lexicon: HALOT
  rationale: Standard idiom for death by violent warfare or execution. 'By the sword'
    is the most natural English equivalent and preserves the instrumental sense.
- source_word: יָמוּת
  chosen: will die
  alternatives:
  - shall die
  lexicon: HALOT
  rationale: Simple future sense of מות in context.
- source_word: יָרָבְעָם
  chosen: Jeroboam
  rationale: Standard English transliteration of the royal name.
- source_word: וְיִשְׂרָאֵל
  chosen: and Israel
  lexicon: HALOT
  rationale: Refers here to the northern kingdom/people collectively; 'Israel' preserves
    the source term without over-specifying in the main text.
- source_word: גָּלֹה יִגְלֶה
  chosen: will surely go into exile
  alternatives:
  - will certainly be exiled
  - will surely be carried away into exile
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verbal idea.
    'Will surely go into exile' preserves both the exile motif and the emphatic force
    in readable English.
- source_word: מֵעַל אַדְמָתוֹ
  chosen: away from its land
  alternatives:
  - from upon its land
  - from its soil
  lexicon: HALOT
  rationale: מֵעַל literally means 'from upon,' but idiomatic English prefers 'away
    from.' אַדָמָה can mean 'ground/soil/land'; here 'land' best fits national exile.
    The 3ms suffix is rendered by English neuter possessive 'its' for the corporate
    entity Israel.
