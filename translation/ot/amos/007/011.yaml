theological_decisions:
- issue: Referent of 'Israel' and possessive suffix in 'its land'
  chosen_reading: Corporate/national Israel, rendered with neuter singular 'its land'
  alternative_readings:
  - the people of Israel ... their land
  rationale: The Hebrew treats Israel as a singular collective entity. Rendering with
    'its land' preserves the grammatical and political-corporate sense without importing
    a more individualized reading.
  doctrine_reference: Translation philosophy §5 (consistency of key terms) and §6
    (readable modern English)
