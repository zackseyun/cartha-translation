id: AMO.7.12
reference: Amos 7:12
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֲמַצְיָה֙ אֶל עָמ֔וֹס חֹזֶ֕ה לֵ֥ךְ בְּרַח לְ/ךָ֖ אֶל אֶ֣רֶץ יְהוּדָ֑ה
    וֶ/אֱכָל שָׁ֣ם לֶ֔חֶם וְ/שָׁ֖ם תִּנָּבֵֽא־־־־׃
translation:
  text: Then Amaziah said to Amos, “Seer, go—flee away to the land of Judah, and eat
    bread there, and prophesy there.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'earn your bread there' / 'make your living there'; the phrase 'eat bread'
      likely carries the sense of making one's livelihood there.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֹזֶה
  chosen: Seer
  alternatives:
  - visionary
  - prophet
  lexicon: HALOT
  rationale: חֹזֶה is a specific term for one who sees visions, distinct from the
    more common נָבִיא. 'Seer' preserves the direct force of Amaziah's address and
    the prophetic nuance without flattening it to 'prophet.'
- source_word: לֵךְ
  chosen: go
  alternatives:
  - be off
  - depart
  lexicon: HALOT
  rationale: The imperative of הלך is straightforward. 'Go' is the natural English
    equivalent and works well with the following imperative 'flee away.'
- source_word: בְּרַח לְךָ
  chosen: flee away
  alternatives:
  - flee
  - run away for yourself
  lexicon: HALOT
  rationale: ברח means 'flee.' The added לְךָ gives an idiomatic sense of personal
    departure ('be off,' 'get yourself away'). 'Flee away' captures both the urgency
    and the personal force without overtranslating.
- source_word: אֶרֶץ יְהוּדָה
  chosen: the land of Judah
  alternatives:
  - Judah
  - the country of Judah
  lexicon: HALOT
  rationale: אֶרֶץ literally means 'land.' Retaining 'the land of Judah' preserves
    the geographic-political sense of the Hebrew.
- source_word: וֶאֱכָל שָׁם לֶחֶם
  chosen: and eat bread there
  alternatives:
  - and earn your bread there
  - and make your living there
  lexicon: HALOT
  rationale: Literally the phrase is 'eat bread there.' In context Amaziah likely
    implies making a living by prophesying, but the Hebrew idiom itself should be
    preserved in the main text. The more interpretive alternatives are worth preserving
    in a footnote.
- source_word: תִּנָּבֵא
  chosen: prophesy
  alternatives:
  - act as a prophet
  lexicon: HALOT
  rationale: The Niphal of נבא is the standard verb for prophetic speaking. 'Prophesy'
    is the clearest and most idiomatic English rendering.
- source_word: וַיֹּאמֶר
  chosen: Then Amaziah said
  alternatives:
  - And Amaziah said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
