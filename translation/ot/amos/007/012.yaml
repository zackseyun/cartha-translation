theological_decisions:
- issue: Whether to make Amaziah's accusation explicit by rendering 'eat bread' idiomatically
    as earning a living from prophecy
  chosen_reading: Keep the literal expression 'eat bread there' in the main text
  alternative_readings:
  - Render idiomatically as 'earn your living there' or 'make your living there'
  rationale: 'The context suggests contempt: Amaziah treats Amos as a professional
    prophet who should go make his living in Judah. However, the Hebrew text itself
    says ''eat bread.'' Optimal equivalence favors preserving the source wording in
    the main text while noting the idiomatic implication in a footnote, thus avoiding
    importing more accusation than the text explicitly states while still exposing
    the likely sense.'
  doctrine_reference: Translation philosophy §1, §3, §5
