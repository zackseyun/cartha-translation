theological_decisions:
- issue: Referent of 'Isaac'
  chosen_reading: Retain 'Isaac' in the main text as a poetic designation for the
    people/land associated with the northern kingdom.
  alternative_readings:
  - Replace with 'Israel' for clarity
  rationale: The Hebrew text intentionally uses 'Isaac,' likely as a poetic or covenantal
    designation. Replacing it with 'Israel' would flatten the literary texture and
    go beyond translation into interpretation.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; translate what the source says without paraphrastic expansion.'
- issue: Nature of divine action in 'I will rise against'
  chosen_reading: Render as direct divine opposition and judgment.
  alternative_readings:
  - Render more weakly as 'I will act against'
  rationale: The phrase presents God as personally taking a stance against Jeroboam's
    house. A weaker rendering would undersell the force of the Hebrew judicial-war
    imagery.
  doctrine_reference: 'Translation philosophy: readable modern English without flattening
    theological weight.'
