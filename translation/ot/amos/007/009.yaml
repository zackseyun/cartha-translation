id: AMO.7.9
reference: Amos 7:9
source:
  edition: WLC
  text: וְ/נָשַׁ֨מּוּ֙ בָּמ֣וֹת יִשְׂחָ֔ק וּ/מִקְדְּשֵׁ֥י יִשְׂרָאֵ֖ל יֶחֱרָ֑בוּ וְ/קַמְתִּ֛י
    עַל בֵּ֥ית יָרָבְעָ֖ם בֶּ/חָֽרֶב־׃פ
translation:
  text: The high places of Isaac will be made desolate, and the sanctuaries of Israel
    will be laid waste; and I will rise against the house of Jeroboam with the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will become desolate.'
    reason: lexical_alternative
  - marker: b
    text: '''Isaac'' is a poetic designation here for the northern covenant people;
      some translations simplify it to ''Israel.'''
    reason: alternative_reading
  - marker: c
    text: Or 'by the sword.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָשַׁמּוּ
  chosen: will be made desolate
  alternatives:
  - will be desolated
  - will become desolate
  lexicon: HALOT
  rationale: From שׁמם in the Niphal, indicating becoming desolate or being devastated.
    'Will be made desolate' captures the passive/resultative force in natural English
    and fits the judgment context.
- source_word: בָּמוֹת
  chosen: high places
  alternatives:
  - cultic heights
  - shrines on the heights
  lexicon: HALOT
  rationale: Standard rendering for bamot, referring to elevated cult sites. 'High
    places' is both accurate and idiomatic in English Bible usage.
- source_word: יִשְׂחָק
  chosen: Isaac
  rationale: Proper name transliterated per translation philosophy. Here it stands
    poetically for the northern covenant people, but the text names Isaac specifically
    and should be preserved.
- source_word: וּמִקְדְּשֵׁי
  chosen: and the sanctuaries of
  alternatives:
  - and the holy places of
  - and the shrines of
  lexicon: HALOT
  rationale: מקדשׁ denotes a holy place or sanctuary. 'Sanctuaries' preserves the
    cultic/religious sense better than the more generic 'holy places.'
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Proper name transliterated. In context it refers to the northern kingdom,
    but the text itself says 'Israel.'
- source_word: יֶחֱרָבוּ
  chosen: will be laid waste
  alternatives:
  - will be ruined
  - will be devastated
  lexicon: HALOT
  rationale: From חרב, 'to be ruined/desolate.' 'Laid waste' gives a strong judgment
    sense and varies naturally from the previous clause while preserving the semantic
    overlap.
- source_word: וְקַמְתִּי
  chosen: and I will rise against
  alternatives:
  - and I will arise against
  - and I will stand up against
  lexicon: HALOT
  rationale: From קום, here in a hostile judicial/military sense. 'Rise against' is
    idiomatic and conveys active opposition by God.
- source_word: עַל
  chosen: against
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: In this context with קום, the preposition carries adversative force;
    'against' best reflects the sense.
- source_word: בֵּית יָרָבְעָם
  chosen: the house of Jeroboam
  alternatives:
  - Jeroboam's house
  - the dynasty of Jeroboam
  lexicon: HALOT
  rationale: '''House of Jeroboam'' preserves the dynastic/familial idiom of בית while
    remaining clear in English. ''Dynasty'' is interpretive and therefore left as
    an alternative.'
- source_word: בֶּחָרֶב
  chosen: with the sword
  alternatives:
  - by the sword
  lexicon: HALOT
  rationale: Standard idiom for violent judgment through warfare or execution. 'With
    the sword' is a direct and familiar rendering.
