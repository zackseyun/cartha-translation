theological_decisions:
- issue: Interpretation of Israel's relation to Edom and the nations in a restoration
    oracle
  chosen_reading: Retain the direct wording 'possess the remnant of Edom and all the
    nations' without softening it into a purely spiritualized or metaphorical paraphrase.
  alternative_readings:
  - '''inherit'' instead of ''possess'' to foreground covenantal inheritance'
  - rendering toward inclusion language based on Acts 15/LXX ('seek the Lord' / 'the
    rest of mankind')
  rationale: The MT of Amos 9:12 plainly speaks of possessing the remnant of Edom
    and the nations called by the LORD's name. The translation should reflect the
    Hebrew text directly rather than importing the interpretive trajectory of the
    Greek form cited in Acts 15 into the main text. The theological tension between
    judgment, restoration, and inclusion is preserved by keeping the MT wording and
    noting the alternative tradition in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
