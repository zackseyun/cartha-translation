id: AMO.9.12
reference: Amos 9:12
source:
  edition: WLC
  text: לְמַ֨עַן יִֽירְשׁ֜וּ אֶת שְׁאֵרִ֤ית אֱדוֹם֙ וְ/כָל הַ/גּוֹיִ֔ם אֲשֶׁר נִקְרָ֥א
    שְׁמִ֖/י עֲלֵי/הֶ֑ם נְאֻם יְהוָ֖ה עֹ֥שֶׂה זֹּֽאת־־־־׃פ
translation:
  text: so that they may possess the remnant of Edom and all the nations who are called
    by my name,” declares the LORD, who does this.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, “over whom my name is called.” This Hebrew idiom expresses
      belonging to or being claimed by the LORD.
    reason: lexical_alternative
  - marker: b
    text: The Greek form of this verse cited in Acts 15:17 differs notably, reading
      along the lines of “so that the remnant of mankind may seek the Lord, and all
      the nations upon whom my name has been called.”
    reason: textual_variant
lexical_decisions:
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: HALOT
  rationale: Marks purpose/result for the restoration described in the preceding context.
    'So that' is natural modern English and preserves the purposive force.
- source_word: יִירְשׁוּ
  chosen: they may possess
  alternatives:
  - they may inherit
  - they may take possession of
  lexicon: HALOT
  rationale: ירשׁ commonly denotes possessing/inheriting land or peoples. 'Possess'
    fits the object 'the remnant of Edom and all the nations' better than the more
    estate-oriented 'inherit,' while still preserving the covenantal-conquest nuance.
- source_word: שְׁאֵרִית
  chosen: the remnant
  alternatives:
  - what remains
  - the survivors
  lexicon: HALOT
  rationale: A key prophetic term for what remains after judgment. 'Remnant' preserves
    the theological and literary resonance better than a flatter paraphrase.
- source_word: אֱדוֹם
  chosen: Edom
  lexicon: HALOT
  rationale: Standard transliteration of the place/people name.
- source_word: וְכָל הַגּוֹיִם
  chosen: and all the nations
  alternatives:
  - and all the Gentiles
  - even all the nations
  lexicon: HALOT
  rationale: גּוֹיִם here refers to the nations/peoples beyond Israel. 'Nations' is
    the broad, contextually appropriate rendering in an OT prophetic setting; 'Gentiles'
    is possible but more tradition-shaped and narrower in English usage.
- source_word: אֲשֶׁר נִקְרָא שְׁמִי עֲלֵיהֶם
  chosen: who are called by my name
  alternatives:
  - over whom my name is called
  - upon whom my name has been called
  lexicon: HALOT
  rationale: This idiom denotes belonging to or being claimed by someone, especially
    by the LORD. The chosen rendering is idiomatic English while preserving the passive
    sense. A more literal alternative is preserved in a footnote.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - utterance of the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is clear, contemporary,
    and widely intelligible. 'the LORD' follows the project's default for YHWH.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: 'Required by the doctrine''s contested-terms table: YHWH is rendered
    ''the LORD.'''
- source_word: עֹשֶׂה זֹּאת
  chosen: who does this
  alternatives:
  - who is doing this
  - who will do this
  - the one doing this
  lexicon: HALOT
  rationale: The participle presents the LORD as the one effecting this promised act.
    'Who does this' is concise and natural in English, preserving the active, declarative
    force.
