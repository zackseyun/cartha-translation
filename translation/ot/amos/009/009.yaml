id: AMO.9.9
reference: Amos 9:9
source:
  edition: WLC
  text: כִּֽי הִנֵּ֤ה אָֽנֹכִי֙ מְצַוֶּ֔ה וַ/הֲנִע֥וֹתִי בְ/כָֽל הַ/גּוֹיִ֖ם אֶת בֵּ֣ית
    יִשְׂרָאֵ֑ל כַּ/אֲשֶׁ֤ר יִנּ֨וֹעַ֙ בַּ/כְּבָרָ֔ה וְ/לֹֽא יִפּ֥וֹל צְר֖וֹר אָֽרֶץ־־־־׃
translation:
  text: For look, I am commanding, and I will shake the house of Israel among all
    the nations, as one shakes with a sieve, yet not a pebble will fall to the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'as grain is shaken in a sieve.' The Hebrew comparison is compact and
      can be expressed in several natural English ways.
    reason: lexical_alternative
  - marker: b
    text: Or, 'not a kernel,' 'not a stone,' or 'not a pebble.' The Hebrew צְרוֹר
      denotes a small compact object; the exact image is debated.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding statement. 'For'
    best preserves the connective force in context.
- source_word: הִנֵּה
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: Marks vivid attention. 'Look' preserves the deictic force in readable
    modern English better than the archaic 'behold.'
- source_word: מְצַוֶּה
  chosen: am commanding
  alternatives:
  - command
  - am giving the command
  lexicon: HALOT
  rationale: The participle with explicit pronoun conveys imminent, active divine
    initiative. Rendering it progressively keeps the present force.
- source_word: וַהֲנִעוֹתִי
  chosen: I will shake
  alternatives:
  - I will cause to shake
  - I will sift
  lexicon: HALOT
  rationale: Hiphil of נוע here denotes causing movement/shaking. 'I will shake' is
    idiomatic and preserves the metaphor, while 'sift' is reserved for the following
    sieve image rather than imported here.
- source_word: בְכָל הַגּוֹיִם
  chosen: among all the nations
  alternatives:
  - through all the nations
  - in all the nations
  lexicon: HALOT
  rationale: The preposition with 'all the nations' most naturally indicates dispersion
    among the nations rather than merely location in them. 'Among' fits the exile/judgment
    context.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - Israel
  - the household of Israel
  lexicon: HALOT
  rationale: Retains the covenantal-corporate expression rather than flattening it
    to simply 'Israel.'
- source_word: כַּאֲשֶׁר יִנּוֹעַ בַּכְּבָרָה
  chosen: as one shakes with a sieve
  alternatives:
  - as grain is shaken in a sieve
  - as it is shaken in a sieve
  lexicon: HALOT
  rationale: The Hebrew is somewhat impersonal. This rendering makes the comparison
    natural in English while preserving the simile and the instrument 'sieve.'
- source_word: כְּבָרָה
  chosen: sieve
  alternatives:
  - screen
  lexicon: HALOT
  rationale: Standard concrete rendering for the agricultural implement used in shaking/sifting.
- source_word: וְלֹא יִפּוֹל
  chosen: yet not ... will fall
  alternatives:
  - but not ... will fall
  - and not ... will fall
  lexicon: HALOT
  rationale: The conjunction here is mildly adversative in sense, highlighting the
    surprising preservation amid shaking. 'Yet' captures that contrast well.
- source_word: צְרוֹר
  chosen: pebble
  alternatives:
  - kernel
  - stone
  - grain
  lexicon: HALOT
  rationale: The noun can denote a small stone, pebble, or compact particle. In the
    sieve image, 'pebble' best fits the idea of even the smallest solid piece not
    being lost, without over-specifying agricultural grain terminology.
- source_word: אָרֶץ
  chosen: the ground
  alternatives:
  - the earth
  - the land
  lexicon: HALOT
  rationale: In this immediate physical image, 'ground' is more natural than the broader
    'earth' or 'land.'
