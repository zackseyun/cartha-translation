theological_decisions:
- issue: Interpretation of the sieve metaphor
  chosen_reading: The verse depicts divine judgment by dispersal and shaking among
    the nations while also preserving every intended member/object from being lost.
  alternative_readings:
  - The verse emphasizes that no sinner escapes judgment
  - The verse emphasizes that no righteous remnant is lost
  rationale: The Hebrew image itself states shaking among the nations and that not
    even a small particle falls to the ground. The metaphor's precise referent is
    clarified in the following verse, so this verse should preserve the tension of
    judgment and preservation without prematurely resolving whether the retained elements
    are the righteous remnant or the objects reserved for judgment.
  doctrine_reference: Preserve theological tension rather than resolve it.
