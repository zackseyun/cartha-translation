id: AMO.9.5
reference: Amos 9:5
source:
  edition: WLC
  text: וַ/אדֹנָ֨/י יְהוִ֜ה הַ/צְּבָא֗וֹת הַ/נּוֹגֵ֤עַ בָּ/אָ֨רֶץ֙ וַ/תָּמ֔וֹג וְ/אָבְל֖וּ כָּל י֣וֹשְׁבֵי בָ֑/הּ וְ/עָלְתָ֤ה כַ/יְאֹר֙ כֻּלָּ֔/הּ וְ/שָׁקְעָ֖ה כִּ/יאֹ֥ר מִצְרָֽיִם־
translation:
  text: And the Lord GOD of hosts is the one who touches the earth, and it melts, and all who dwell in it mourn; and all of it rises like the Nile and sinks like the Nile of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the Lord YHWH of hosts.'' English ''Lord GOD'' avoids the awkward repetition ''Lord LORD'' while representing the divine name YHWH.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: אֲדֹנָי + YHWH is the standard compound divine title. Following the doctrine default, YHWH is rendered with a reverential substitute rather than transliterated. 'GOD' in small caps conventionally distinguishes the following divine name from 'Lord.'
- source_word: הַצְּבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  - of heavenly armies
  lexicon: HALOT
  rationale: The title denotes YHWH's command over heavenly and earthly forces. 'Of hosts' preserves the established semantic breadth without over-specifying only military imagery.
- source_word: הַנּוֹגֵעַ
  chosen: is the one who touches
  alternatives:
  - who touches
  - who strikes
  lexicon: HALOT
  rationale: The participle presents an ongoing characteristic description of God. 'Touches' is the plain lexical sense of נגע here; the devastating effect is supplied by the following verbs, so 'strikes' would import more than the word itself states.
- source_word: בָּאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' In this cosmic-theophanic context, with all its inhabitants and imagery of the Nile's swelling, 'earth' better fits the scope than a localized 'land.'
- source_word: וַתָּמוֹג
  chosen: it melts
  alternatives:
  - it trembles
  - it dissolves
  lexicon: HALOT
  rationale: מוּג commonly conveys melting, dissolving, or collapsing in fear/disintegration. 'Melts' preserves the vivid metaphor and matches prophetic theophany language.
- source_word: וְאָבְלוּ
  chosen: mourn
  alternatives:
  - lament
  - wail
  lexicon: HALOT
  rationale: אבל denotes mourning, often in response to calamity. 'Mourn' is natural modern English and does not over-intensify beyond the Hebrew.
- source_word: יֹשְׁבֵי בָהּ
  chosen: all who dwell in it
  alternatives:
  - all its inhabitants
  - all who live in it
  lexicon: HALOT
  rationale: The participial construction literally means 'those dwelling in it.' 'All who dwell in it' preserves the verbal nuance and remains readable.
- source_word: וְעָלְתָה כַיְאֹר כֻּלָּהּ
  chosen: all of it rises like the Nile
  alternatives:
  - it all rises like the Nile
  - the whole of it rises like the River
  lexicon: HALOT
  rationale: The feminine singular verbs continue to refer to the earth/land. יְאֹר in this context points to the Nile's annual swelling; 'the Nile' is clearer than the generic 'river.' 'All of it' reflects כֻּלָּהּ.
- source_word: וְשָׁקְעָה
  chosen: sinks
  alternatives:
  - subsides
  - is submerged
  lexicon: HALOT
  rationale: The verb denotes sinking or subsiding. In parallel with the Nile imagery, 'sinks' is concise and vivid; 'subsides' is possible but less forceful.
- source_word: כִּיאֹר מִצְרָיִם
  chosen: like the Nile of Egypt
  alternatives:
  - like the river of Egypt
  - like Egypt's Nile
  lexicon: HALOT
  rationale: The comparison is specifically to the Nile associated with Egypt. Rendering it explicitly as 'the Nile of Egypt' makes the referent unmistakable for modern readers.
