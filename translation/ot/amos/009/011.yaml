id: AMO.9.11
reference: Amos 9:11
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֔וּא אָקִ֛ים אֶת סֻכַּ֥ת דָּוִ֖יד הַ/נֹּפֶ֑לֶת וְ/גָדַרְתִּ֣י
    אֶת פִּרְצֵי/הֶ֗ן וַ/הֲרִֽסֹתָי/ו֙ אָקִ֔ים וּ/בְנִיתִ֖י/הָ כִּ/ימֵ֥י עוֹלָֽם־־׃
translation:
  text: In that day I will raise up the fallen shelter of David, and I will wall up
    its breaches, and I will raise up its ruins and rebuild it as in the days of old.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'booth of David'; traditionally, 'tabernacle of David.' The Hebrew image
      is of a temporary shelter, used here metaphorically for David's fallen house
      or dynasty.
    reason: lexical_alternative
  - marker: b
    text: Or 'close up its breaches' or 'repair its gaps.'
    reason: lexical_alternative
  - marker: c
    text: '''As in the days of old'' refers to former days or ancient times, not necessarily
      to eternity in an abstract sense.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  chosen: In that day
  alternatives:
  - On that day
  lexicon: HALOT
  rationale: Standard prophetic temporal formula. 'In that day' is idiomatic in English
    and preserves the eschatological-prophetic register without overinterpreting timing.
- source_word: אָקִים
  chosen: I will raise up
  alternatives:
  - I will restore
  - I will establish
  lexicon: HALOT
  rationale: Hiphil of קום commonly means to cause to stand, raise up, or establish.
    'Raise up' preserves the concrete metaphor and matches the repeated use later
    in the verse.
- source_word: סֻכַּת דָּוִיד
  chosen: the shelter of David
  alternatives:
  - the booth of David
  - the tabernacle of David
  - the house of David
  lexicon: HALOT
  rationale: סֻכָּה denotes a booth, hut, or shelter. 'Shelter' communicates the image
    in natural modern English without importing later ecclesiastical associations
    of 'tabernacle.' 'House of David' is too interpretive because the Hebrew uses
    a more fragile image.
- source_word: הַנֹּפֶלֶת
  chosen: fallen
  alternatives:
  - that is falling
  - collapsing
  lexicon: HALOT
  rationale: The participle literally means 'falling,' but in apposition to 'shelter
    of David' in this restoration context, 'fallen' is the most natural English adjectival
    rendering and conveys the state resulting from collapse.
- source_word: וְגָדַרְתִּי
  chosen: I will wall up
  alternatives:
  - I will fence up
  - I will repair
  - I will close up
  lexicon: HALOT
  rationale: The verb גדר is to wall, fence, or enclose. With 'breaches' as object,
    'wall up' preserves the building/restoration imagery more concretely than the
    generalized 'repair.'
- source_word: פִּרְצֵיהֶן
  chosen: its breaches
  alternatives:
  - its gaps
  - its breaks
  lexicon: HALOT
  rationale: 'Though the suffix is morphologically plural feminine, the sense is the
    breaches/openings belonging to the fallen structure. English idiom prefers singular
    collective reference to the structure: ''its breaches.'' ''Breaches'' best matches
    architectural damage.'
- source_word: וַהֲרִסֹתָיו
  chosen: its ruins
  alternatives:
  - its demolished places
  - its wreckage
  lexicon: HALOT
  rationale: From הריסה, 'ruin' or 'demolished place.' 'Its ruins' is concise, idiomatic,
    and keeps the restoration imagery. The suffix variation in the Hebrew tradition
    does not materially change the sense in English.
- source_word: וּבְנִיתִיהָ
  chosen: and rebuild it
  alternatives:
  - and build it
  - and I will rebuild her
  lexicon: HALOT
  rationale: English idiom prefers 'rebuild' in a context of restoration after ruin,
    even though the base verb is simply 'build.' The suffix refers back to the structure;
    'it' is appropriate for English.
- source_word: כִּימֵי עוֹלָם
  chosen: as in the days of old
  alternatives:
  - as in ancient days
  - as in days long ago
  - as in the days of eternity
  lexicon: HALOT
  rationale: עוֹלָם here refers to antiquity/long duration, not metaphysical eternity.
    'As in the days of old' is a natural English rendering that preserves the backward-looking
    restoration comparison.
