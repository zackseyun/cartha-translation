theological_decisions:
- issue: Referent of 'the shelter of David'
  chosen_reading: A metaphor for the Davidic dynasty/kingdom in a humbled, collapsed
    state, expressed with the concrete image of a fragile shelter.
  alternative_readings:
  - A literal cultic tent/tabernacle associated with David
  - A generalized symbol for Israel without specific Davidic royal focus
  rationale: The phrase evokes Davidic rule and restoration through the image of a
    collapsed booth/shelter. The translation keeps the metaphor rather than resolving
    it into a doctrinally loaded interpretation such as a direct messianic paraphrase
    or a literal cultic structure.
  doctrine_reference: Preserve theological tension rather than resolve it.
