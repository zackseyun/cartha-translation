theological_decisions:
- issue: Force of the comparison between Israel and the Cushites
  chosen_reading: The verse states that Israel enjoys no automatic privileged status before the LORD merely by ethnicity or exodus tradition.
  alternative_readings:
  - The comparison is only about geographic displacement, not status before God.
  rationale: The rhetorical question 'Are you not like the Cushites to me?' relativizes Israel's presumed exceptionalism, and the following clause broadens divine providence to other nations as well. The translation preserves this tension without softening the comparison.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: O sons of Israel
  alternative_readings:
  - O people of Israel
  - O children of Israel
  rationale: The Hebrew is grammatically masculine plural and functions as a national designation. Per project policy, the translation keeps the gender-accurate form rather than flattening it to a neutral collective in the main text.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
