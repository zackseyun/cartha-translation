id: AMO.9.7
reference: Amos 9:7
source:
  edition: WLC
  text: הֲ/ל֣וֹא כִ/בְנֵי֩ כֻשִׁיִּ֨ים אַתֶּ֥ם לִ֛/י בְּנֵ֥י יִשְׂרָאֵ֖ל נְאֻם יְהוָ֑ה הֲ/ל֣וֹא אֶת יִשְׂרָאֵ֗ל הֶעֱלֵ֨יתִי֙ מֵ/אֶ֣רֶץ מִצְרַ֔יִם וּ/פְלִשְׁתִּיִּ֥ים מִ/כַּפְתּ֖וֹר וַ/אֲרָ֥ם מִ/קִּֽיר־־׃
translation:
  text: Are you not like the Cushites to me, O sons of Israel? declares Yahweh. Did I not bring up Israel from the land of Egypt, and the Philistines from Caphtor, and Aram from Kir?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like Ethiopians'; Hebrew 'Cushites,' referring to the people of Cush.
    reason: lexical_alternative
  - marker: b
    text: Caphtor is a place name traditionally associated by many with Crete, though its exact identification is debated.
    reason: cultural_note
  - marker: c
    text: Or 'the Arameans from Kir.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלוֹא
  chosen: Are ... not / Did ... not
  alternatives:
  - Surely ...
  - Is it not ...
  lexicon: HALOT
  rationale: Used as a rhetorical interrogative expecting an affirmative answer. English idiom is best conveyed by 'Are you not' in the first clause and 'Did I not' in the second.
- source_word: כִּבְנֵי כֻשִׁיִּים
  chosen: like the Cushites
  alternatives:
  - as the sons of the Cushites
  - like Ethiopians
  lexicon: HALOT
  rationale: The prefixed כ marks comparison, and בְּנֵי here functions idiomatically for a people group. 'Cushites' is preferred over 'Ethiopians' because it transliterates the ethnogeographic term more directly from Hebrew rather than importing a later Greek/modern geographic label.
- source_word: אַתֶּם לִי
  chosen: are you ... to me
  alternatives:
  - are you ... in my sight
  - do you count as ... to me
  lexicon: HALOT
  rationale: The dative לִי expresses relation from YHWH's perspective. 'To me' preserves the directness of the Hebrew without overinterpreting it as merely 'in my sight.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: O sons of Israel
  alternatives:
  - people of Israel
  - children of Israel
  lexicon: HALOT
  rationale: Kept the vocative force and the gender-accurate form 'sons' in line with the translation philosophy. 'Children of Israel' is traditional but less precise here; 'people of Israel' is smoother but loses the lexical form.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is natural modern English and preserves the solemn prophetic force.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: הֶעֱלֵיתִי
  chosen: bring up
  alternatives:
  - bring out
  - lead up
  lexicon: HALOT
  rationale: The Hiphil of עלה commonly denotes causing to go up, especially in exodus/deliverance contexts. 'Bring up' preserves the Hebrew verb and allows the parallel with the Philistines and Aram; 'bring out' would fit Egypt well but less naturally the other two clauses.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of Egypt
  lexicon: HALOT
  rationale: Retains the explicit noun 'land,' matching the Hebrew phrase and preserving the formal parallelism.
- source_word: פְלִשְׁתִּיִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard English ethnonym for the people group.
- source_word: כַּפְתּוֹר
  chosen: Caphtor
  alternatives:
  - Crete
  lexicon: HALOT
  rationale: Transliterated because the identification is debated. 'Crete' may be related historically, but the Hebrew proper name should stand in the main text.
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - the Arameans
  - Syria
  lexicon: HALOT
  rationale: The Hebrew can denote the region or the people. 'Aram' preserves the proper name and avoids importing the later geopolitical term 'Syria.'
- source_word: קִיר
  chosen: Kir
  lexicon: HALOT
  rationale: Proper place name best represented by transliteration.
