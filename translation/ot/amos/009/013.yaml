theological_decisions:
- issue: Prophetic restoration imagery
  chosen_reading: Render the verse as hyperbolic agricultural abundance in Israel's
    restoration without importing a narrower millennial or purely spiritualized scheme.
  alternative_readings:
  - strictly literal agricultural prediction
  - purely metaphorical spiritual blessing
  rationale: The Hebrew presents poetic restoration imagery. The translation should
    preserve the concrete agricultural language and let interpreters debate the scope
    of fulfillment rather than resolving it in translation.
  doctrine_reference: Preserve theological tension rather than resolve it.
