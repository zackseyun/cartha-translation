id: AMO.9.13
reference: Amos 9:13
source:
  edition: WLC
  text: הִנֵּ֨ה יָמִ֤ים בָּאִים֙ נְאֻם יְהוָ֔ה וְ/נִגַּ֤שׁ חוֹרֵשׁ֙ בַּ/קֹּצֵ֔ר וְ/דֹרֵ֥ךְ
    עֲנָבִ֖ים בְּ/מֹשֵׁ֣ךְ הַ/זָּ֑רַע וְ/הִטִּ֤יפוּ הֶֽ/הָרִים֙ עָסִ֔יס וְ/כָל הַ/גְּבָע֖וֹת
    תִּתְמוֹגַֽגְנָה־־׃
translation:
  text: Behold, days are coming, declares the LORD, when the plowman will overtake
    the reaper, and the one who treads grapes the one who draws out the seed; the
    mountains will drip sweet wine, and all the hills will melt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one who sows seed.' The Hebrew literally says 'the one who draws
      out the seed,' likely an idiom for sowing.
    reason: lexical_alternative
  - marker: b
    text: Or 'new wine.'
    reason: lexical_alternative
  - marker: c
    text: The image is of such abundance that one season's work begins before the
      previous one has ended.
    reason: cultural_note
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Retains the prophetic attention-getter with elevated but still intelligible
    English. 'Behold' fits prophetic discourse better than the more colloquial 'look'
    or 'see'.
- source_word: יָמִים בָּאִים
  chosen: days are coming
  alternatives:
  - the days are coming
  - days are on the way
  lexicon: HALOT
  rationale: Standard prophetic idiom announcing a future act of God. The anarthrous
    form is naturally rendered without 'the' in English, though either is possible.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Idiomatic rendering of the prophetic formula. 'Declares' preserves the
    solemn force of נְאֻם. 'the LORD' follows the project's default for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: 'Required by doctrine table: covenant name rendered ''the LORD'' rather
    than transliterated forms.'
- source_word: וְנִגַּשׁ
  chosen: will overtake
  alternatives:
  - will come near to
  - will draw near to
  - will press close upon
  lexicon: HALOT
  rationale: In context of hyper-abundant harvest cycles, the sense is not mere proximity
    but one agricultural task catching up to the next before it is finished. 'Will
    overtake' communicates the compressed seasons implied by the imagery.
- source_word: חוֹרֵשׁ
  chosen: the plowman
  alternatives:
  - the one who plows
  - the plower
  lexicon: HALOT
  rationale: Concrete agricultural agent; 'plowman' is natural and concise in English.
- source_word: בַּקֹּצֵר
  chosen: the reaper
  alternatives:
  - the one reaping
  - the harvester
  lexicon: HALOT
  rationale: Best contextual counterpart to 'plowman' in the abundance image.
- source_word: וְדֹרֵךְ עֲנָבִים
  chosen: the one who treads grapes
  alternatives:
  - the grape treader
  - the one trampling grapes
  lexicon: HALOT
  rationale: Keeps the vivid participial image of grape-treading for wine production.
- source_word: בְּמֹשֵׁךְ הַזָּרַע
  chosen: the one who draws out the seed
  alternatives:
  - the sower
  - the one who sows seed
  - the one who drags the seed-bag
  lexicon: HALOT
  rationale: The Hebrew literally speaks of 'drawing/pulling' the seed, likely an
    idiom for sowing. To remain auditable and not over-paraphrase, the main text keeps
    the more literal expression while allowing readers to infer sowing activity from
    context.
- source_word: וְהִטִּיפוּ
  chosen: will drip
  alternatives:
  - will drop
  - will flow
  lexicon: HALOT
  rationale: 'Common prophetic abundance imagery: the mountains are pictured as dripping
    with produce. ''Drip'' is vivid and close to the Hebrew.'
- source_word: עָסִיס
  chosen: sweet wine
  alternatives:
  - new wine
  - fresh wine
  - juice
  lexicon: HALOT
  rationale: Refers to freshly pressed or sweet wine. 'Sweet wine' communicates abundance
    and richness without implying mere unfermented juice.
- source_word: תִּתְמוֹגַגְנָה
  chosen: will melt
  alternatives:
  - will flow
  - will dissolve
  lexicon: HALOT
  rationale: The verb literally suggests melting/dissolving. In context it is metaphorical
    for overflowing fertility. 'Will melt' preserves the Hebrew image, even if somewhat
    startling in English.
