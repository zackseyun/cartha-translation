theological_decisions:
- issue: Rendering הָרָעָה in a divine-judgment context
  chosen_reading: the disaster
  alternative_readings:
  - the calamity
  - the evil
  rationale: The verse speaks of impending judgment denied by the sinners of Israel.
    Rendering רָעָה as 'disaster' preserves the concrete sense of coming judgment
    without suggesting that God is morally evil. This is a lexical-contextual decision,
    not a doctrinal softening.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    meaning without importing doctrinal claims.'
