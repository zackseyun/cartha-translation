id: AMO.9.10
reference: Amos 9:10
source:
  edition: WLC
  text: בַּ/חֶ֣רֶב יָמ֔וּתוּ כֹּ֖ל חַטָּאֵ֣י עַמִּ֑/י הָ/אֹמְרִ֗ים לֹֽא תַגִּ֧ישׁ
    וְ/תַקְדִּ֛ים בַּעֲדֵ֖י/נוּ הָ/רָעָֽה־׃
translation:
  text: By the sword all the sinners of my people will die—those who say, ‘The disaster
    will not overtake us or come against us.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The calamity will not come near or confront us.' The two Hebrew verbs
      both describe approaching judgment, and the exact nuance of each is difficult
      to reproduce in concise English.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחֶרֶב
  chosen: By the sword
  alternatives:
  - With the sword
  lexicon: HALOT
  rationale: 'Instrumental beth is most naturally rendered as means: death comes by
    the sword. ''By the sword'' is idiomatic and preserves the judgment imagery.'
- source_word: יָמוּתוּ
  chosen: will die
  alternatives:
  - shall die
  lexicon: HALOT
  rationale: Simple future sense in context of prophetic judgment. 'Will die' is clear
    modern English.
- source_word: כֹּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Distributive/collective force is best captured by 'all' with the following
    plural noun phrase.
- source_word: חַטָּאֵי עַמִּי
  chosen: the sinners of my people
  alternatives:
  - the sinful ones of my people
  - my people's sinners
  lexicon: HALOT
  rationale: Construct phrase identifies a subset within Israel. 'Sinners of my people'
    is the most direct and natural rendering.
- source_word: הָאֹמְרִים
  chosen: those who say
  alternatives:
  - who say
  - the ones saying
  lexicon: HALOT
  rationale: Substantival participle refers to the specific group just mentioned.
    'Those who say' makes the appositional identification explicit in English.
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Standard negation.
- source_word: תַגִּישׁ
  chosen: will overtake
  alternatives:
  - will come near
  - will reach
  lexicon: HALOT
  rationale: From נגשׁ in the sense of drawing near/approaching. In this judgment
    context, 'overtake' communicates hostile approach more idiomatically than the
    wooden 'come near,' while still fitting the parallel with the next verb.
- source_word: וְתַקְדִּים
  chosen: or come against
  alternatives:
  - or confront
  - or meet
  - or come before
  lexicon: HALOT
  rationale: From קדם, 'to come before/meet.' With בַּעֲדֵינוּ and in parallel with
    תגישׁ, the sense is that calamity will not advance to meet them or confront them.
    'Come against' captures the adversative force in context.
- source_word: בַּעֲדֵינוּ
  chosen: against us
  alternatives:
  - before us
  - up to us
  - upon us
  lexicon: HALOT
  rationale: The preposition here is difficult, but in this context of denied judgment
    it most likely means movement in relation to the speakers with hostile effect.
    'Against us' yields natural English and fits the paired verbs of approaching calamity.
- source_word: הָרָעָה
  chosen: the disaster
  alternatives:
  - the evil
  - the calamity
  lexicon: HALOT
  rationale: In prophetic judgment contexts רָעָה commonly denotes calamity/disaster
    rather than moral evil. 'Disaster' is accessible modern English and avoids implying
    moral evil in God.
