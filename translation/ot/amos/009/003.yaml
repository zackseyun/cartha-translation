id: AMO.9.3
reference: Amos 9:3
source:
  edition: WLC
  text: וְ/אִם יֵחָֽבְאוּ֙ בְּ/רֹ֣אשׁ הַ/כַּרְמֶ֔ל מִ/שָּׁ֥ם אֲחַפֵּ֖שׂ וּ/לְקַחְתִּ֑י/ם
    וְ/אִם יִסָּ֨תְר֜וּ מִ/נֶּ֤גֶד עֵינַ/י֙ בְּ/קַרְקַ֣ע הַ/יָּ֔ם מִ/שָּׁ֛ם אֲצַוֶּ֥ה
    אֶת הַ/נָּחָ֖שׁ וּ/נְשָׁכָֽ/ם־־־׃
translation:
  text: And if they hide themselves on the summit of Carmel, from there I will search
    them out and take them; and if they conceal themselves from before my eyes on
    the floor of the sea, from there I will command the serpent, and it will bite
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the bottom of the sea' for 'on the floor of the sea.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the snake.' The Hebrew noun can denote either 'snake' or 'serpent.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵחָבְאוּ
  chosen: hide themselves
  alternatives:
  - are hidden
  - hide
  lexicon: HALOT
  rationale: Niphal imperfect of חבא conveys reflexive/passive hiding. 'Hide themselves'
    best captures deliberate attempted concealment in context.
- source_word: בְּרֹאשׁ הַכַּרְמֶל
  chosen: on the summit of Carmel
  alternatives:
  - on top of Carmel
  - at the head of Carmel
  - on Mount Carmel
  lexicon: HALOT
  rationale: רֹאשׁ literally 'head/top' here denotes the highest point. 'Summit' is
    natural English and preserves the spatial image. 'Carmel' is retained as the place
    name rather than expanded to 'Mount Carmel,' since the Hebrew itself names Carmel
    directly.
- source_word: אֲחַפֵּשׂ
  chosen: I will search them out
  alternatives:
  - I will search for them
  - I will seek them out
  lexicon: HALOT
  rationale: חפשׂ in the piel has the sense of searching thoroughly. 'Search them
    out' conveys active, exhaustive pursuit better than the flatter 'search for them.'
- source_word: וּלְקַחְתִּים
  chosen: and take them
  alternatives:
  - and seize them
  - and capture them
  lexicon: HALOT
  rationale: לקח is broadly 'take.' In this judgment context it implies apprehension,
    but 'take them' preserves the Hebrew's lexical breadth without over-specifying
    the manner.
- source_word: יִסָּתְרוּ
  chosen: conceal themselves
  alternatives:
  - hide themselves
  - be hidden
  lexicon: HALOT
  rationale: From סתר, another hiding verb. Rendering it as 'conceal themselves' preserves
    some lexical distinction from יֵחָבְאוּ earlier in the verse while still sounding
    natural.
- source_word: מִנֶּגֶד עֵינַי
  chosen: from before my eyes
  alternatives:
  - from my sight
  - out of my sight
  - from in front of my eyes
  lexicon: HALOT
  rationale: The idiom is literally 'from before my eyes.' This more formal rendering
    preserves the vivid anthropomorphic expression of divine sight better than the
    more idiomatic 'out of my sight.'
- source_word: בְּקַרְקַע הַיָּם
  chosen: on the floor of the sea
  alternatives:
  - at the bottom of the sea
  - on the seabed
  lexicon: HALOT
  rationale: קַרְקַע denotes ground/floor. 'Floor of the sea' is vivid and close to
    the Hebrew image; 'bottom of the sea' is possible but less concrete, while 'seabed'
    is more technical.
- source_word: אֲצַוֶּה
  chosen: I will command
  alternatives:
  - I will order
  lexicon: HALOT
  rationale: צוה is standard 'command.' This keeps the direct assertion of Yahweh's
    sovereign authority over the creature.
- source_word: הַנָּחָשׁ
  chosen: the serpent
  alternatives:
  - the snake
  lexicon: HALOT
  rationale: נחשׁ can mean snake/serpent. 'Serpent' better fits the elevated prophetic
    register and the threatening imagery, without necessarily invoking Genesis symbolism
    as the primary sense.
- source_word: וּנְשָׁכָם
  chosen: and it will bite them
  alternatives:
  - and it shall bite them
  lexicon: HALOT
  rationale: The verb נשׁך means 'bite.' The subject is the singular serpent, so 'it
    will bite them' makes the syntax explicit in English.
