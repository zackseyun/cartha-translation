theological_decisions:
- issue: Divine omniscience and inescapable judgment expressed through anthropomorphic
    language
  chosen_reading: Retain the concrete expression 'from before my eyes' rather than
    smoothing it to a purely abstract paraphrase.
  alternative_readings:
  - from my sight
  - out of my sight
  rationale: The verse emphasizes that no location escapes God's searching presence
    and judicial reach. Preserving the anthropomorphic idiom maintains the force of
    the Hebrew without importing speculative theology beyond the text.
  doctrine_reference: Translation philosophy §3, §6
- issue: Rendering of the divine speech without adding the covenant name in this verse
  chosen_reading: Use first-person divine speech ('I will...') without inserting 'the
    LORD' into the verse text.
  alternative_readings:
  - Explicitly repeat 'the LORD' in English for clarity
  rationale: The Hebrew verse continues divine speech from the surrounding context;
    adding the subject here would exceed what this verse itself states. This preserves
    source-text primacy and avoids unnecessary expansion.
  doctrine_reference: Translation philosophy §1
