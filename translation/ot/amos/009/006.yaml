id: AMO.9.6
reference: Amos 9:6
source:
  edition: WLC
  text: הַ/בּוֹנֶ֤ה בַ/שָּׁמַ֨יִם֙ מעלות/ו וַ/אֲגֻדָּת֖/וֹ עַל אֶ֣רֶץ יְסָדָ֑/הּ הַ/קֹּרֵ֣א לְ/מֵֽי הַ/יָּ֗ם וַֽ/יִּשְׁפְּכֵ֛/ם עַל פְּנֵ֥י הָ/אָ֖רֶץ יְהוָ֥ה שְׁמֽ/וֹ־־־׃
translation:
  text: He who builds his upper chambers in the heavens, and has founded his vault upon the earth, who calls for the waters of the sea and pours them out upon the face of the earth—Yahweh is his name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his ascents' or 'his steps' for 'his upper chambers.' The Hebrew term can denote heights, stairways, or upper rooms; here it likely refers to elevated heavenly structures.
    reason: lexical_alternative
  - marker: b
    text: Or 'his band,' 'his structure,' or 'his dome' for 'his vault.' The Hebrew word refers to something bound together and is used here in cosmic architecture imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבּוֹנֶה
  chosen: He who builds
  alternatives:
  - the one building
  - he who is building
  lexicon: HALOT
  rationale: Qal participle with article functions substantivally, describing YHWH by characteristic action. English relative clause 'He who builds' preserves the descriptive force and fits the doxological style.
- source_word: מַעֲלוֹתָיו
  chosen: his upper chambers
  alternatives:
  - his ascents
  - his steps
  - his stories
  lexicon: HALOT
  rationale: The noun can denote steps, ascents, or upper rooms/chambers. In this cosmological context, it refers to elevated heavenly structures rather than literal stairways; 'upper chambers' is idiomatic and matches the architectural imagery.
- source_word: וַאֲגֻדָּתוֹ
  chosen: his vault
  alternatives:
  - his band
  - his dome
  - his structure
  lexicon: HALOT
  rationale: The term denotes something bound together, a bundle or band; in Amos 9:6 it is used cosmologically for the world-structure set over/against earth. 'Vault' best conveys a firm, overarching structure in natural English without overcommitting to a specific ancient cosmology.
- source_word: יְסָדָהּ
  chosen: has founded
  alternatives:
  - founded
  - established
  - laid the foundation of it
  lexicon: HALOT
  rationale: From יסד, 'to found/establish.' Perfect verb after participial clauses is well rendered as a completed characteristic act. 'Has founded' keeps the connection to creation imagery and reads smoothly in English.
- source_word: הַקֹּרֵא
  chosen: who calls for
  alternatives:
  - who summons
  - who calls to
  lexicon: HALOT
  rationale: Participial clause parallel to הַבּוֹנֶה. With לְ plus 'waters of the sea,' the sense is summoning them for action. 'Calls for' is natural English and preserves divine sovereignty over the waters.
- source_word: לְמֵי הַיָּם
  chosen: the waters of the sea
  alternatives:
  - the sea's waters
  lexicon: HALOT
  rationale: Straightforward construct relationship. Retained in a natural but close English form.
- source_word: וַיִּשְׁפְּכֵם
  chosen: and pours them out
  alternatives:
  - and spills them out
  - and empties them out
  lexicon: HALOT
  rationale: From שפך, 'to pour out.' The waw-consecutive continues the description of divine action. 'Pours them out' preserves the vivid image, likely of rain/judgment waters spread over the earth.
- source_word: עַל פְּנֵי הָאָרֶץ
  chosen: upon the face of the earth
  alternatives:
  - over the surface of the earth
  - upon the earth
  lexicon: HALOT
  rationale: A common Hebrew idiom. 'Upon the face of the earth' is slightly more formal but preserves the imagery and cadence of the Hebrew.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שְׁמוֹ
  chosen: is his name
  alternatives:
  - his name is
  lexicon: HALOT
  rationale: The Hebrew nominal clause is commonly rendered 'the LORD is his name.' This preserves the climactic self-identification at the end of the verse.
