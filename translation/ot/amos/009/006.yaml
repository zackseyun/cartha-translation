theological_decisions:
- issue: Cosmological imagery in מעלותיו / אגודתו
  chosen_reading: Render with architectural/cosmic imagery ('upper chambers' / 'vault') without forcing a modern scientific description.
  alternative_readings:
  - Render more literally as 'ascents' / 'band'
  - Render interpretively as 'heavenly palace' / 'dome'
  rationale: The verse praises YHWH as creator and sovereign over the cosmos using ancient architectural imagery. The translation should preserve that imagery rather than flatten it into either wooden literalism or modern cosmology.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
