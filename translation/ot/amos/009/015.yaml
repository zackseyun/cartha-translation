theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Pronoun in אֱלֹהֶיךָ
  chosen_reading: your God
  alternative_readings:
  - their God
  rationale: The Hebrew consonantal/Masoretic form is singular 'your God.' Although 'their God' would align more smoothly with the plural referents in the verse, the translation should not emend the text in the main line without textual warrant. The alternative is preserved in a footnote because readers may notice the shift.
