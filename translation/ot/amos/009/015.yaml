id: AMO.9.15
reference: Amos 9:15
source:
  edition: WLC
  text: וּ/נְטַעְתִּ֖י/ם עַל אַדְמָתָ֑/ם וְ/לֹ֨א יִנָּתְשׁ֜וּ ע֗וֹד מֵ/עַ֤ל אַדְמָתָ/ם֙ אֲשֶׁ֣ר נָתַ֣תִּי לָ/הֶ֔ם אָמַ֖ר יְהוָ֥ה אֱלֹהֶֽי/ךָ־׃
translation:
  text: I will plant them on their land, and they will never again be uprooted from the land that I have given them, says Yahweh your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew reads “your God” (singular); some understand this as an address to Israel as a people, while “their God” is a smoothing alternative.
    reason: alternative_reading
lexical_decisions:
- source_word: וּנְטַעְתִּים
  chosen: I will plant them
  alternatives:
  - I will plant them firmly
  - I will settle them
  lexicon: HALOT
  rationale: נטע literally means 'plant.' In this restoration context the agricultural metaphor is prominent and should be preserved rather than flattened to 'settle,' though 'settle' captures the implied permanence.
- source_word: עַל אַדְמָתָם
  chosen: on their land
  alternatives:
  - upon their soil
  - on their ground
  lexicon: HALOT
  rationale: אדמה can mean soil/ground/land. 'Land' fits the covenant-restoration context better in English while still reflecting the Hebrew term. 'Their land' preserves the possessive suffix.
- source_word: וְלֹא יִנָּתְשׁוּ עוֹד
  chosen: and they will never again be uprooted
  alternatives:
  - and they will no longer be torn up
  - and they will not again be plucked up
  lexicon: HALOT
  rationale: The Niphal of נתש conveys being uprooted or torn out. 'Uprooted' preserves the planting metaphor established by נטע and communicates forced removal from the land.
- source_word: מֵעַל אַדְמָתָם
  chosen: from the land
  alternatives:
  - from upon their land
  - off their land
  lexicon: HALOT
  rationale: The preposition מֵעַל is literally 'from upon,' but idiomatic English prefers 'from.' Repeating 'land' maintains the thematic link with the earlier phrase.
- source_word: אֲשֶׁר נָתַתִּי לָהֶם
  chosen: that I have given them
  alternatives:
  - which I gave them
  - that I gave to them
  lexicon: HALOT
  rationale: The perfect can be rendered as either simple past or present perfect in English. 'Have given' highlights the abiding validity of the divine gift in this promise context.
- source_word: אָמַר יְהוָה
  chosen: says the LORD
  alternatives:
  - declares the LORD
  - said the LORD
  lexicon: HALOT
  rationale: Prophetic formulae are commonly rendered with an English present to convey the force of divine declaration. Per doctrine, יְהוָה is rendered 'the LORD,' not transliterated.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  alternatives:
  - their God
  lexicon: HALOT
  rationale: The Masoretic Text reads second masculine singular suffix, 'your God,' even though the surrounding pronouns are plural. This is best retained in the main text as the received reading; the more expected 'their God' is worth preserving in a footnote as a likely smoothing or interpretive alternative.
