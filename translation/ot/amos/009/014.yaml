id: AMO.9.14
reference: Amos 9:14
source:
  edition: WLC
  text: וְ/שַׁבְתִּי֮ אֶת שְׁב֣וּת עַמִּ֣/י יִשְׂרָאֵל֒ וּ/בָנ֞וּ עָרִ֤ים נְשַׁמּוֹת֙
    וְ/יָשָׁ֔בוּ וְ/נָטְע֣וּ כְרָמִ֔ים וְ/שָׁת֖וּ אֶת יֵינָ֑/ם וְ/עָשׂ֣וּ גַנּ֔וֹת
    וְ/אָכְל֖וּ אֶת פְּרִי/הֶֽם־־־׃
translation:
  text: I will restore the fortunes of my people Israel, and they will rebuild ruined
    cities and live in them; they will plant vineyards and drink their wine; they
    will make gardens and eat their fruit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will bring back the captives of my people Israel' / 'I will restore
      the captivity of my people Israel.' The Hebrew restoration formula can denote
      both return from captivity and a broader reversal of distress.
    reason: alternative_reading
lexical_decisions:
- source_word: וְשַׁבְתִּי
  chosen: I will restore
  alternatives:
  - I will bring back
  - I will return
  lexicon: HALOT
  rationale: From שוב in a causative/restorative idiom with שְׁבוּת. In this collocation,
    the sense is not simply 'I will return' but 'I will restore/bring back.' 'Restore'
    is idiomatic and clear in English while preserving the divine action.
- source_word: שְׁבוּת
  chosen: the fortunes
  alternatives:
  - the captivity
  - the exiles
  lexicon: HALOT
  rationale: In the phrase שׁוּב שְׁבוּת, this noun can denote a reversal of plight,
    often traditionally rendered 'restore the fortunes,' though it can also evoke
    return from captivity. Here the broader restoration context includes rebuilding
    and planting, so 'fortunes' best captures the comprehensive reversal without over-specifying
    literal captivity.
- source_word: עַמִּי יִשְׂרָאֵל
  chosen: my people Israel
  alternatives:
  - my people, Israel
  lexicon: HALOT
  rationale: Directly preserves the covenantal designation and appositional structure.
    Comma omitted in the main text for smoother English, but the sense remains appositional.
- source_word: וּבָנוּ
  chosen: they will rebuild
  alternatives:
  - they will build
  lexicon: HALOT
  rationale: Although the verb is simply 'build,' English idiom with previously devastated
    cities is better expressed as 'rebuild,' making explicit the restorative context
    already signaled by 'ruined cities.' This is an optimal-equivalence clarification
    rather than paraphrase.
- source_word: עָרִים נְשַׁמּוֹת
  chosen: ruined cities
  alternatives:
  - desolate cities
  - devastated cities
  lexicon: HALOT
  rationale: נְשַׁמּוֹת denotes places laid waste or desolated. 'Ruined' is natural
    modern English and fits the restoration imagery.
- source_word: וְיָשָׁבוּ
  chosen: live in them
  alternatives:
  - inhabit them
  - settle in them
  lexicon: HALOT
  rationale: The verb ישׁב commonly means dwell/sit/live. 'Live in them' is readable
    modern English and clearly refers back to the rebuilt cities.
- source_word: וְנָטְעוּ כְרָמִים
  chosen: they will plant vineyards
  alternatives:
  - they will plant vine-gardens
  lexicon: HALOT
  rationale: Standard agricultural expression; 'vineyards' is the natural English
    equivalent of כְרָמִים.
- source_word: וְשָׁתוּ אֶת יֵינָם
  chosen: drink their wine
  alternatives:
  - drink the wine from them
  - drink its wine
  lexicon: HALOT
  rationale: The suffix most naturally refers to the vineyards just planted, expressed
    idiomatically in English as 'their wine.' This preserves the image of enjoying
    the produce of one's labor.
- source_word: וְעָשׂוּ גַנּוֹת
  chosen: they will make gardens
  alternatives:
  - they will cultivate gardens
  - they will prepare gardens
  lexicon: HALOT
  rationale: עשה with gardens is literally 'make.' 'Make gardens' is slightly more
    literal than 'cultivate' and still acceptable English; it preserves the sequence
    of productive restoration.
- source_word: וְאָכְלוּ אֶת פְּרִיהֶם
  chosen: eat their fruit
  alternatives:
  - eat the fruit from them
  - eat their produce
  lexicon: HALOT
  rationale: The suffix refers to the gardens. 'Fruit' is the direct lexical equivalent
    of פְּרִי and can broadly denote produce in this context.
