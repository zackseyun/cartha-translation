theological_decisions:
- issue: Rendering the restoration formula שׁוּב שְׁבוּת
  chosen_reading: restore the fortunes
  alternative_readings:
  - restore the captivity
  - bring back the captives
  rationale: The phrase can carry both literal-return and broader-restoration overtones.
    In Amos 9:14 the following clauses emphasize comprehensive renewal of land, cities,
    and agricultural life, so 'restore the fortunes' best preserves the wider restorative
    sense without denying possible exile resonance. Alternative more literal renderings
    are preserved in a footnote.
  doctrine_reference: Translation philosophy §3, §5
