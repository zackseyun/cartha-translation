theological_decisions:
- issue: Divine title in prophetic vision
  chosen_reading: the Lord
  alternative_readings:
  - the Master
  rationale: The verse presents a vision of Israel's sovereign judge. 'The Lord' best
    reflects אֲדֹנָי as a divine title without importing the covenant-name rendering
    reserved for YHWH in the project's doctrine.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος/Kyrios → Lord; YHWH → the
    LORD'
