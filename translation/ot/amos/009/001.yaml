id: AMO.9.1
reference: Amos 9:1
source:
  edition: WLC
  text: רָאִ֨יתִי אֶת אֲדֹנָ֜/י נִצָּ֣ב עַֽל הַ/מִּזְבֵּ֗חַ וַ/יֹּאמֶר֩ הַ֨ךְ הַ/כַּפְתּ֜וֹר
    וְ/יִרְעֲשׁ֣וּ הַ/סִּפִּ֗ים וּ/בְצַ֨עַ/ם֙ בְּ/רֹ֣אשׁ כֻּלָּ֔/ם וְ/אַחֲרִיתָ֖/ם
    בַּ/חֶ֣רֶב אֶהֱרֹ֑ג לֹֽא יָנ֤וּס לָ/הֶם֙ נָ֔ס וְ/לֹֽא יִמָּלֵ֥ט לָ/הֶ֖ם פָּלִֽיט־־־־׃
translation:
  text: 'I saw the Lord standing beside the altar, and he said: Strike the capital,
    so that the thresholds may shake; shatter them on the heads of all of them. And
    I will kill their survivors with the sword; not one who flees among them will
    get away, and not one who escapes among them will be delivered.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'standing on the altar.' The Hebrew preposition can be rendered 'on'
      or 'upon,' but the scene may also imply standing at or beside the altar in readiness
      to judge.
    reason: lexical_alternative
  - marker: b
    text: Or 'the pillar-cap' or 'the knob/capital.' The Hebrew term refers to the
      top architectural feature of the structure.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew is difficult: ''and cut/break them on the head of all of them.''
      The sense is that the shattered structure falls on everyone present.'
    reason: lexical_alternative
  - marker: d
    text: Or 'their remnant.' Here the context favors those left alive after the initial
      destruction rather than a hopeful remnant.
    reason: alternative_reading
lexical_decisions:
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: HALOT
  rationale: Rendered as the title 'the Lord' in keeping with the project's default
    for divine/sovereign title language and the immediate vision context. This is
    not the Tetragrammaton here, so not 'the LORD.'
- source_word: נִצָּב
  chosen: standing beside
  alternatives:
  - standing on
  - stationed at
  lexicon: HALOT
  rationale: The participle denotes being stationed/standing. With עַל הַמִּזְבֵּחַ,
    English 'beside the altar' fits the judgment-scene imagery more naturally than
    'on the altar' while preserving proximity rather than enthronement.
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Standard rendering for מזבח.
- source_word: הַךְ
  chosen: Strike
  alternatives:
  - Smite
  - Hit
  lexicon: HALOT
  rationale: Imperative of נכה in a judgment oracle; 'Strike' is forceful and natural
    modern English without archaic tone.
- source_word: הַכַּפְתּוֹר
  chosen: the capital
  alternatives:
  - the pillar-cap
  - the knob/capital
  lexicon: HALOT
  rationale: Likely the top architectural element of the sanctuary structure. 'Capital'
    best conveys an architectural feature in readable English.
- source_word: הַסִּפִּים
  chosen: the thresholds
  alternatives:
  - the doorposts
  - the sills
  lexicon: HALOT
  rationale: The noun refers to threshold/sill structures. 'Thresholds' fits the paired
    architectural collapse imagery with 'capital' and the shaking of the building.
- source_word: וְיִרְעֲשׁוּ
  chosen: so that the thresholds may shake
  alternatives:
  - and the thresholds will shake
  - that the thresholds may quake
  lexicon: HALOT
  rationale: 'Rendered with purposive/result nuance after the imperative: strike the
    top so the lower structural elements shake.'
- source_word: וּבְצַעַם
  chosen: shatter them
  alternatives:
  - break them off
  - cut them down
  lexicon: HALOT
  rationale: The verb בצע here is difficult; in context of architectural destruction
    followed by death, it likely means to break off/shatter. 'Them' refers to the
    collapsing structural elements/fragments.
- source_word: בְּרֹאשׁ כֻּלָּם
  chosen: on the heads of all of them
  alternatives:
  - upon the head of them all
  lexicon: HALOT
  rationale: Preserves the concrete image of the structure falling onto the people
    beneath.
- source_word: וְאַחֲרִיתָם
  chosen: their survivors
  alternatives:
  - their remnant
  - their posterity
  - their latter end
  lexicon: HALOT
  rationale: In this context of total judgment, the phrase refers to those remaining
    after the initial collapse, not a hopeful remnant. 'Survivors' makes the sense
    explicit in idiomatic English.
- source_word: בַּחֶרֶב אֶהֱרֹג
  chosen: I will kill ... with the sword
  alternatives:
  - I will slay ... by the sword
  lexicon: HALOT
  rationale: Direct first-person divine judgment statement; 'kill with the sword'
    is clear modern English.
- source_word: לֹא יָנוּס לָהֶם נָס
  chosen: not one who flees among them will get away
  alternatives:
  - flight will fail them
  - no fugitive of theirs will flee
  lexicon: HALOT
  rationale: The Hebrew uses cognate wording for fleeing/fugitive. English recasts
    it idiomatically while preserving the emphatic denial of escape.
- source_word: וְלֹא יִמָּלֵט לָהֶם פָּלִיט
  chosen: not one who escapes among them will be delivered
  alternatives:
  - no survivor of theirs will escape
  - no escapee among them will be rescued
  lexicon: HALOT
  rationale: The Niphal of מלט can mean escape/be delivered. 'Will be delivered' preserves
    the passive nuance and avoids flattening the parallelism into mere repetition.
