id: AMO.9.4
reference: Amos 9:4
source:
  edition: WLC
  text: וְ/אִם יֵלְכ֤וּ בַ/שְּׁבִי֙ לִ/פְנֵ֣י אֹֽיבֵי/הֶ֔ם מִ/שָּׁ֛ם אֲצַוֶּ֥ה אֶת
    הַ/חֶ֖רֶב וַ/הֲרָגָ֑תַ/ם וְ/שַׂמְתִּ֨י עֵינִ֧/י עֲלֵי/הֶ֛ם לְ/רָעָ֖ה וְ/לֹ֥א לְ/טוֹבָֽה־־׃
translation:
  text: And if they go into captivity before their enemies, from there I will command
    the sword, and it will kill them; and I will set my eyes on them for harm and
    not for good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for disaster and not for good.' The Hebrew רָעָה here denotes calamity
      or harmful judgment, not moral evil.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: And if
  alternatives:
  - Even if
  - If
  lexicon: HALOT
  rationale: Introduces a further conditional scenario in the sequence of inescapable
    judgments. 'And if' preserves the connective force from the prior verse while
    remaining natural in English.
- source_word: יֵלְכוּ
  chosen: they go
  alternatives:
  - they walk
  - they are taken
  lexicon: HALOT
  rationale: הלך literally means 'go/walk.' Here 'go' is idiomatic with the following
    phrase 'into captivity.' A passive like 'are taken' would over-interpret the verb
    itself, though captivity implies coercion.
- source_word: בַשְּׁבִי
  chosen: into captivity
  alternatives:
  - in captivity
  - as captives
  lexicon: HALOT
  rationale: The noun שבי denotes captivity/captive state. With the motion verb, 'into
    captivity' best reflects movement into exile or prisoner status.
- source_word: לִפְנֵי אֹיְבֵיהֶם
  chosen: before their enemies
  alternatives:
  - in front of their enemies
  - before the face of their enemies
  lexicon: HALOT
  rationale: A standard idiom meaning in the presence/power of their enemies. 'Before
    their enemies' is concise and faithful without woodenly reproducing 'face.'
- source_word: מִשָּׁם
  chosen: from there
  alternatives:
  - even from there
  lexicon: HALOT
  rationale: Emphasizes that even the place of exile does not remove them from divine
    judgment. The simple rendering is sufficient; the intensifying sense is carried
    by context.
- source_word: אֲצַוֶּה אֶת־הַחֶרֶב
  chosen: I will command the sword
  alternatives:
  - I will appoint the sword
  - I will order the sword
  lexicon: HALOT
  rationale: The idiom personifies the sword as an agent under God's command. 'Command
    the sword' preserves the vivid metaphor and divine agency better than flattening
    it to a mere event.
- source_word: וַהֲרָגָתַם
  chosen: and it will kill them
  alternatives:
  - and it shall slay them
  - to kill them
  lexicon: HALOT
  rationale: The feminine singular verbal form agrees with 'the sword.' 'It will kill
    them' makes the Hebrew personification explicit in natural English. 'Slay' is
    possible but less contemporary.
- source_word: וְשַׂמְתִּי עֵינִי עֲלֵיהֶם
  chosen: and I will set my eyes on them
  alternatives:
  - and I will fix my eyes on them
  - and I will keep my eye on them
  lexicon: HALOT
  rationale: A Hebrew idiom for directed divine attention. 'Set my eyes on them' preserves
    the metaphor and allows the following phrase to specify that this attention is
    for judgment, not blessing.
- source_word: לְרָעָה וְלֹא לְטוֹבָה
  chosen: for harm and not for good
  alternatives:
  - for evil and not for good
  - for disaster and not for good
  lexicon: HALOT
  rationale: רעה here refers to calamity/judgment rather than moral evil. 'Harm' communicates
    adverse action without implying that God commits moral evil. 'Disaster' is also
    possible, but 'harm' fits the personal object 'on them' well.
