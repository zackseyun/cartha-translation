theological_decisions:
- issue: Rendering רָעָה in relation to divine action
  chosen_reading: for harm
  alternative_readings:
  - for evil
  - for disaster
  rationale: The context is covenant judgment. Rendering רעה as 'evil' in English
    could suggest moral evil rather than punitive calamity. 'Harm' preserves the negative
    judicial sense while avoiding doctrinal misunderstanding not warranted by the
    Hebrew.
  doctrine_reference: 'Translation philosophy: preserve the source''s plain sense
    without importing doctrinal claims the text does not make.'
