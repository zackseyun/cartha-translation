id: AMO.9.8
reference: Amos 9:8
source:
  edition: WLC
  text: הִנֵּ֞ה עֵינֵ֣י אֲדֹנָ֣/י יְהוִ֗ה בַּ/מַּמְלָכָה֙ הַֽ/חַטָּאָ֔ה וְ/הִשְׁמַדְתִּ֣י אֹתָ֔/הּ מֵ/עַ֖ל פְּנֵ֣י הָ/אֲדָמָ֑ה אֶ֗פֶס כִּ֠י לֹ֣א הַשְׁמֵ֥יד אַשְׁמִ֛יד אֶת בֵּ֥ית יַעֲקֹ֖ב נְאֻם יְהוָֽה׀־־׃
translation:
  text: Look, the eyes of the Lord GOD are on the sinful kingdom, and I will destroy it from the face of the earth. Yet I will not utterly destroy the house of Jacob," declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Nevertheless, I will not completely destroy the house of Jacob.' The Hebrew uses an infinitive absolute with the finite verb for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic particle introducing a solemn announcement. 'Look' is natural modern English while preserving the force of attention-getting proclamation.
- source_word: עֵינֵי
  chosen: the eyes of
  alternatives:
  - the gaze of
  lexicon: HALOT
  rationale: Literal plural is retained because the Hebrew idiom communicates focused divine attention, here in judgment.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - Lord GOD
  lexicon: HALOT
  rationale: Standard rendering of the compound divine title. 'Lord' translates אֲדֹנָי and 'GOD' signals the following divine name to avoid 'Lord LORD' in English. This also aligns with the project's default of rendering YHWH as 'the LORD' while preserving readability in the compound title.
- source_word: בַּמַּמְלָכָה הַחַטָּאָה
  chosen: on the sinful kingdom
  alternatives:
  - against the sinful kingdom
  - on the kingdom that sins
  - on the sinful realm
  lexicon: HALOT
  rationale: The preposition with 'eyes' idiomatically indicates directed attention; in this context it is attention for judgment. 'Sinful kingdom' is a concise rendering of the adjectival phrase.
- source_word: וְהִשְׁמַדְתִּי אֹתָהּ
  chosen: and I will destroy it
  alternatives:
  - and I will wipe it out
  - and I will exterminate it
  lexicon: HALOT
  rationale: Hiphil of שׁמד denotes destruction/removal. 'Destroy' is strong without over-specifying the manner.
- source_word: מֵעַל פְּנֵי הָאֲדָמָה
  chosen: from the face of the earth
  alternatives:
  - from the surface of the ground
  - from upon the face of the land
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for removal from the inhabited world/land. 'Earth' fits the broad scope of judgment language better than 'ground,' while preserving the idiom with 'face of.'
- source_word: אֶפֶס כִּי
  chosen: Yet
  alternatives:
  - Except that
  - Nevertheless
  - But
  lexicon: HALOT
  rationale: The phrase marks a strong qualification to the preceding judgment. 'Yet' captures the adversative turn in idiomatic English.
- source_word: לֹא הַשְׁמֵיד אַשְׁמִיד
  chosen: I will not utterly destroy
  alternatives:
  - I will certainly not completely destroy
  - I will not destroy completely
  lexicon: HALOT
  rationale: Infinitive absolute plus finite verb intensifies the verbal idea. In a negated clause, 'not utterly destroy' naturally conveys the emphatic sense that total annihilation is denied.
- source_word: אֶת בֵּית יַעֲקֹב
  chosen: the house of Jacob
  alternatives:
  - the household of Jacob
  - Jacob's house
  lexicon: HALOT
  rationale: A standard covenantal-national expression for the people descended from Jacob/Israel. Retaining the traditional phrase preserves intertextual resonance.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Prophetic formula best rendered in contemporary readable English as 'declares the LORD.' YHWH follows the project's default rendering.
