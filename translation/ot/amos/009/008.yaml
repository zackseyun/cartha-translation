theological_decisions:
- issue: Rendering the divine name יְהוָה in two different constructions within the verse
  chosen_reading: Use 'the Lord GOD' for אֲדֹנָי יְהוִה and 'Yahweh' for נְאֻם יְהוָה
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD ... says Yahweh
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Scope of judgment versus preservation
  chosen_reading: Translate the verse to affirm destruction of the sinful kingdom but not the total destruction of the house of Jacob
  alternative_readings:
  - Read the second clause as merely less severe judgment without covenantal preservation emphasis
  rationale: The Hebrew explicitly juxtaposes severe judgment on the kingdom with a denial of total annihilation for Jacob's house. The translation preserves that theological tension rather than flattening either side.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
