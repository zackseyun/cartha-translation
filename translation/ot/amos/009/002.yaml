theological_decisions:
- issue: Rendering שְׁאוֹל
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the realm of the dead
  rationale: The verse uses cosmological extremes (Sheol / the heavens) to express
    the impossibility of escaping God's judgment. Retaining 'Sheol' preserves the
    Hebrew worldview and avoids narrowing the term to mere burial or overdefining
    it in later theological categories.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
