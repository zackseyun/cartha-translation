id: AMO.9.2
reference: Amos 9:2
source:
  edition: WLC
  text: אִם יַחְתְּר֣וּ בִ/שְׁא֔וֹל מִ/שָּׁ֖ם יָדִ֣/י תִקָּחֵ֑/ם וְ/אִֽם יַעֲלוּ֙
    הַ/שָּׁמַ֔יִם מִ/שָּׁ֖ם אוֹרִידֵֽ/ם־־׃
translation:
  text: Though they dig into Sheol, from there my hand will take them; and though
    they climb up to the heavens, from there I will bring them down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the grave' or 'the realm of the dead' for 'Sheol.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחְתְּרוּ
  chosen: dig
  alternatives:
  - break through
  - dig through
  lexicon: HALOT
  rationale: The verb חתר commonly denotes digging or burrowing through, often with
    the sense of breaking through a wall. In this poetic context of attempted escape
    to the underworld, 'dig into' is vivid and natural English while preserving the
    concrete imagery.
- source_word: בִּשְׁאוֹל
  chosen: into Sheol
  alternatives:
  - into the grave
  - into the realm of the dead
  lexicon: HALOT
  rationale: Sheol is best retained as 'Sheol' rather than flattened to 'grave,' since
    the Hebrew denotes the underworld / realm of the dead more broadly. Transliteration
    preserves the Hebrew concept without importing a more specific later doctrinal
    notion.
- source_word: יָדִי
  chosen: my hand
  lexicon: HALOT
  rationale: A literal rendering preserves the anthropomorphic idiom of divine reach
    and power. Replacing it with 'I' or 'my power' would lose the concrete force of
    the Hebrew.
- source_word: תִּקָּחֵם
  chosen: will take them
  alternatives:
  - will seize them
  - will fetch them
  lexicon: HALOT
  rationale: לקח has a broad range including take, seize, receive. 'Will take them'
    is the most neutral and direct here, fitting the image of inescapable divine apprehension.
- source_word: יַעֲלוּ
  chosen: climb up
  alternatives:
  - go up
  - ascend
  lexicon: HALOT
  rationale: '''Climb up'' matches the parallel vividness of ''dig into'' and communicates
    deliberate movement to an unreachable height. ''Ascend'' is possible but sounds
    more elevated than the context requires.'
- source_word: הַשָּׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the sky
  lexicon: HALOT
  rationale: The Hebrew plural is naturally represented by 'the heavens' in elevated
    biblical English. 'Sky' is too mundane for the cosmic merism with Sheol, and singular
    'heaven' is less formally aligned with the Hebrew form.
- source_word: אוֹרִידֵם
  chosen: I will bring them down
  alternatives:
  - I will bring them down from there
  - I will cast them down
  lexicon: HALOT
  rationale: The Hiphil of ירד means to cause to go down. 'Bring them down' is a clear
    causative rendering and preserves the parallel with 'from there' without overstating
    violence as 'cast down' might.
- source_word: אִם ... וְאִם
  chosen: Though ... and though
  alternatives:
  - If ... and if
  - Even if ... and even if
  lexicon: HALOT
  rationale: In this context the clauses are not simple conditions but concessive
    statements emphasizing that no attempted escape can succeed. 'Though ... and though'
    communicates the force more idiomatically in English.
