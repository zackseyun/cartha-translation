id: AMO.6.14
reference: Amos 6:14
source:
  edition: WLC
  text: כִּ֡י הִנְ/נִי֩ מֵקִ֨ים עֲלֵי/כֶ֜ם בֵּ֣ית יִשְׂרָאֵ֗ל נְאֻם יְהוָ֛ה אֱלֹהֵ֥י הַ/צְּבָא֖וֹת גּ֑וֹי וְ/לָחֲצ֥וּ אֶתְ/כֶ֛ם מִ/לְּב֥וֹא חֲמָ֖ת עַד נַ֥חַל הָ/עֲרָבָֽה־־׃ס
translation:
  text: For behold, I am raising up against you a nation, O house of Israel, declares Yahweh, the God of hosts, and they will oppress you from Lebo-hamath to the Wadi of the Arabah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from the entrance of Hamath.” The Hebrew expression may be understood either as the place name Lebo-hamath or as a descriptive boundary phrase.
    reason: alternative_reading
  - marker: b
    text: Or “the brook of the Arabah.”
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding judgment statement; 'for' best preserves the causal connection in context.
- source_word: הִנְנִי
  chosen: behold, I am
  alternatives:
  - look, I am
  - here I am, about to
  lexicon: HALOT
  rationale: The particle-plus-pronoun construction is an attention-getting announcement of imminent divine action. 'Behold' preserves the prophetic force without over-paraphrasing.
- source_word: מֵקִים
  chosen: raising up
  alternatives:
  - stirring up
  - causing to arise
  lexicon: HALOT
  rationale: From קום in the Hiphil, here meaning to cause to arise or bring onto the scene. 'Raising up' is idiomatic and preserves divine agency in bringing a nation against Israel.
- source_word: עֲלֵיכֶם
  chosen: against you
  alternatives:
  - upon you
  - over you
  lexicon: HALOT
  rationale: In this hostile military/judicial context, 'against you' best conveys the adversative force of על.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: O house of Israel
  alternatives:
  - house of Israel
  lexicon: HALOT
  rationale: Direct address is explicit in context; adding 'O' reflects prophetic vocative force in natural English.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is clear modern English and preserves the solemnity. 'the LORD' follows the project's default rendering for יְהוָה.
- source_word: אֱלֹהֵי הַצְּבָאוֹת
  chosen: the God of hosts
  alternatives:
  - God of armies
  - God of heavenly hosts
  lexicon: HALOT
  rationale: Traditional but still intelligible rendering that preserves the military/cosmic breadth of צבאות without narrowing it to only earthly or heavenly armies.
- source_word: גּוֹי
  chosen: a nation
  alternatives:
  - a people
  lexicon: HALOT
  rationale: The singular indefinite refers to a foreign national power raised up as an instrument of judgment. 'Nation' is the most direct rendering.
- source_word: וְלָחֲצוּ
  chosen: and they will oppress
  alternatives:
  - and they will afflict
  - and they will press hard upon
  lexicon: HALOT
  rationale: The verb conveys oppressive pressure or affliction. 'Oppress' captures sustained national subjugation better than the more generic 'afflict.'
- source_word: מִלְּבוֹא חֲמָת
  chosen: from Lebo-hamath
  alternatives:
  - from the entrance of Hamath
  - from Hamath's approach
  lexicon: HALOT
  rationale: This is a known geographic expression functioning as a place name or boundary marker. Retaining the transliterated toponym avoids misleading readers into taking it as a mere common noun phrase.
- source_word: נַחַל הָעֲרָבָה
  chosen: the Wadi of the Arabah
  alternatives:
  - the brook of the Arabah
  - the valley stream of the Arabah
  lexicon: HALOT
  rationale: נחל often denotes a wadi/seasonal watercourse. 'Wadi' is geographically precise; 'Arabah' is best transliterated as the regional name rather than flattened to 'desert plain' here.
