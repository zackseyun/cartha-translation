id: AMO.6.11
reference: Amos 6:11
source:
  edition: WLC
  text: כִּֽי הִנֵּ֤ה יְהוָה֙ מְצַוֶּ֔ה וְ/הִכָּ֛ה הַ/בַּ֥יִת הַ/גָּד֖וֹל רְסִיסִ֑ים וְ/הַ/בַּ֥יִת הַ/קָּטֹ֖ן בְּקִעִֽים־׃
translation:
  text: For behold, Yahweh commands, and the great house will be struck into fragments, and the small house into pieces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and he will strike the great house [into] fragments, and the small house [into] fissures/pieces.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the explanation or ground for the preceding statement. 'For' fits the discourse connection naturally in English.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: HALOT
  rationale: Marks vivid attention to what follows. 'Behold' preserves the prophetic force without paraphrase, though slightly elevated in tone.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving covenantal reference in standard English Bible style.
- source_word: מְצַוֶּה
  chosen: commands
  alternatives:
  - is commanding
  - gives the command
  lexicon: HALOT
  rationale: The participle conveys imminent or ongoing authoritative action. 'Commands' is concise, natural English and preserves the force of divine decree.
- source_word: וְהִכָּה
  chosen: will be struck
  alternatives:
  - and he will strike
  - so that he strikes
  lexicon: HALOT
  rationale: The verb is 3ms with an unspecified striker in context after 'the LORD commands.' English idiom naturally renders the houses as receiving the blow. This avoids awkward ambiguity while preserving the sense of divinely ordered judgment.
- source_word: הַבַּיִת הַגָּדוֹל
  chosen: the great house
  alternatives:
  - the large house
  - the great palace
  lexicon: HALOT
  rationale: '''House'' should be retained rather than paraphrased. ''Great'' can denote size and social prominence; it may imply elite households, but the Hebrew noun itself remains ''house.'''
- source_word: רְסִיסִים
  chosen: fragments
  alternatives:
  - splinters
  - shattered bits
  lexicon: HALOT
  rationale: Conveys violent breaking into many small broken parts. 'Fragments' is clear modern English and suitably weighty.
- source_word: וְהַבַּיִת הַקָּטֹן
  chosen: the small house
  alternatives:
  - the little house
  - the lesser house
  lexicon: HALOT
  rationale: Maintains the parallelism with 'the great house.' 'Small' is the most straightforward rendering.
- source_word: בְּקִעִים
  chosen: pieces
  alternatives:
  - cracks
  - clefts
  - broken pieces
  lexicon: HALOT
  rationale: The noun can denote splits, fissures, or broken sections. In this judgment context, 'pieces' communicates the result of destructive breaking and pairs well with 'fragments' while preserving the poetic distinction.
