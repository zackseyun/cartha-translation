theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Agency in וְהִכָּה
  chosen_reading: the houses are rendered as receiving the strike ('will be struck')
  alternative_readings:
  - the LORD will strike the great house ...
  - one will strike the great house ...
  rationale: The Hebrew form after 'the LORD commands' leaves the immediate agent implicit in the clause. English passive best preserves the judgment outcome without over-specifying the syntax, while the broader context still attributes the judgment to the LORD.
