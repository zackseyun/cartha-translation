id: AMO.6.10
reference: Amos 6:10
source:
  edition: WLC
  text: וּ/נְשָׂא֞/וֹ דּוֹד֣/וֹ וּ/מְסָרְפ֗/וֹ לְ/הוֹצִ֣יא עֲצָמִים֮ מִן הַ/בַּיִת֒ וְ/אָמַ֞ר לַ/אֲשֶׁ֨ר בְּ/יַרְכְּתֵ֥י הַ/בַּ֛יִת הַ/ע֥וֹד עִמָּ֖/ךְ וְ/אָמַ֣ר אָ֑פֶס וְ/אָמַ֣ר הָ֔ס כִּ֛י לֹ֥א לְ/הַזְכִּ֖יר בְּ/שֵׁ֥ם יְהוָֽה־׃
translation:
  text: Then his uncle, the one who burns him, will carry him out to bring the bones out of the house, and he will say to the one who is in the innermost part of the house, “Is there still anyone with you?” And he will say, “No one.” Then he will say, “Hush! For we must not mention the name of Yahweh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'his kinsman'; the Hebrew term can denote a close male relative, though 'uncle' fits the context well.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'the one who burns him.' The wording is unusual and may refer to burning associated with corpse disposal in a time of judgment.
    reason: cultural_note
  - marker: c
    text: Or, 'Do not mention the name of the LORD.' The Hebrew expression is terse and may be heard either as a direct prohibition or as a statement of necessity.
    reason: alternative_reading
lexical_decisions:
- source_word: דּוֹדוֹ
  chosen: his uncle
  alternatives:
  - his beloved
  - his kinsman
  lexicon: HALOT
  rationale: In context of corpse removal and family responsibility, דּוֹד most naturally refers to a close male relative, commonly 'uncle,' rather than 'beloved.' 'Kinsman' is possible but less specific than the likely familial sense.
- source_word: וּמְסָרְפוֹ
  chosen: the one who burns him
  alternatives:
  - his burner
  - the one who prepares him for burial
  lexicon: HALOT
  rationale: The participle from שׂרף means 'burn.' Because cremation is unusual in Israelite practice, the phrase is difficult, but the Hebrew explicitly refers to burning. Rendering it transparently preserves the strangeness of the judgment scene rather than smoothing it into general burial language.
- source_word: לְהוֹצִיא עֲצָמִים
  chosen: to bring the bones out
  alternatives:
  - to remove the bones
  - to carry out the remains
  lexicon: HALOT
  rationale: עֲצָמִים literally means 'bones.' 'Bring the bones out' is slightly more idiomatic with הוציא while retaining the concrete imagery. 'Remains' would be smoother but less literal.
- source_word: בְּיַרְכְּתֵי הַבַּיִת
  chosen: in the innermost part of the house
  alternatives:
  - in the recesses of the house
  - in the farthest part of the house
  lexicon: HALOT
  rationale: יַרְכָּה denotes the remote or inner recesses. 'Innermost part' communicates the spatial sense clearly in modern English.
- source_word: הַעוֹד עִמָּךְ
  chosen: Is there still anyone with you?
  alternatives:
  - Is there yet any with you?
  - Are there any more with you?
  lexicon: HALOT
  rationale: The Hebrew asks whether anyone remains present. Supplying 'anyone' makes the English natural while preserving the sense of survivors being sought.
- source_word: אָפֶס
  chosen: No one
  alternatives:
  - None
  - Nobody
  lexicon: HALOT
  rationale: אָפֶס here functions elliptically as a denial that anyone remains. 'No one' is natural and fits the dialogue.
- source_word: הָס
  chosen: Hush!
  alternatives:
  - Silence!
  - Be quiet!
  lexicon: HALOT
  rationale: An abrupt interjection calling for silence best fits the fearful tone. 'Hush!' preserves the immediacy.
- source_word: לֹא לְהַזְכִּיר בְּשֵׁם יְהוָה
  chosen: we must not mention the name of the LORD
  alternatives:
  - do not mention the name of the LORD
  - the name of the LORD must not be invoked
  lexicon: HALOT
  rationale: The infinitive construction after כִּי לֹא expresses prohibition or necessity in context. 'We must not mention' conveys the force naturally in English. 'The LORD' follows the project's default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
