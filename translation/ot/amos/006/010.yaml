theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of the prohibition in כִּי לֹא לְהַזְכִּיר בְּשֵׁם יְהוָה
  chosen_reading: For we must not mention the name of Yahweh
  alternative_readings:
  - For do not mention the name of the LORD
  - For the name of the LORD is not to be mentioned
  rationale: The Hebrew is terse and somewhat elliptical. The chosen rendering preserves the prohibition without overinterpreting why the name must not be mentioned. It avoids importing a theological explanation beyond the text's fearful setting.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
