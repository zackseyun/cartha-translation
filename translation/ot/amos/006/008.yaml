theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh / GOD in the compound title 'The Lord GOD'
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of גְּאוֹן יַעֲקֹב
  chosen_reading: 'negative: ''the pride of Jacob'''
  alternative_readings:
  - the majesty of Jacob
  rationale: Although the noun can denote majesty in some contexts, the immediate context is condemnation and revulsion, so the negative moral sense is most likely. The alternative is preserved because the Hebrew term can bear either nuance elsewhere.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
