id: AMO.6.8
reference: Amos 6:8
source:
  edition: WLC
  text: נִשְׁבַּע֩ אֲדֹנָ֨/י יְהוִ֜ה בְּ/נַפְשׁ֗/וֹ נְאֻם יְהוָה֙ אֱלֹהֵ֣י צְבָא֔וֹת מְתָאֵ֤ב אָֽנֹכִי֙ אֶת גְּא֣וֹן יַֽעֲקֹ֔ב וְ/אַרְמְנֹתָ֖י/ו שָׂנֵ֑אתִי וְ/הִסְגַּרְתִּ֖י עִ֥יר וּ/מְלֹאָֽ/הּ־־׃
translation:
  text: 'The Lord GOD has sworn by himself—oracle of Yahweh, the God of Armies: I abhor the pride of Jacob, and I hate his citadels; and I will hand over the city and all that fills it.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the majesty of Jacob.' The Hebrew word can denote either exalted majesty or arrogant pride; here the judgment context favors the negative sense.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: ''the God of hosts.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'his palaces.' The Hebrew term can refer to palatial strongholds.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: The Lord GOD
  alternatives:
  - The Lord Yahweh
  - Lord GOD
  lexicon: HALOT
  rationale: Rendered the compound divine title in standard English form. 'Lord' translates אֲדֹנָי and 'GOD' represents YHWH in small-caps convention when paired with Adonai, preserving the distinction without using the divine name directly, in line with doctrine for יְהוָה → 'the LORD'.
- source_word: נִשְׁבַּע ... בְּנַפְשׁוֹ
  chosen: has sworn by himself
  alternatives:
  - has sworn by his life
  - swears by himself
  lexicon: HALOT
  rationale: 'The idiom ''swear by his soul/life'' means to swear by oneself. ''By himself'' is natural English and preserves the force of divine self-oath better than the more wooden ''by his life.'' Perfect rendered with present relevance: a solemn declared oath.'
- source_word: נְאֻם יְהוָה אֱלֹהֵי צְבָאוֹת
  chosen: oracle of the LORD, the God of Armies
  alternatives:
  - declares the LORD, the God of hosts
  - utterance of the LORD, God of Armies
  lexicon: HALOT
  rationale: נְאֻם is a prophetic formula meaning 'oracle/utterance.' 'Oracle of' is concise and weighty. צְבָאוֹת is translated 'Armies' rather than traditional 'hosts' for readability while retaining martial imagery.
- source_word: מְתָאֵב
  chosen: I abhor
  alternatives:
  - I detest
  - I loathe
  lexicon: HALOT
  rationale: The participle conveys strong revulsion. 'Abhor' is forceful and suitably elevated without being archaic.
- source_word: גְּאוֹן יַעֲקֹב
  chosen: the pride of Jacob
  alternatives:
  - the arrogance of Jacob
  - the majesty of Jacob
  lexicon: HALOT
  rationale: גָּאוֹן can denote pride/arrogance or exalted majesty depending on context. Here, in a judgment oracle paired with hatred, the negative sense 'pride' fits best. 'Jacob' stands metonymically for Israel.
- source_word: אַרְמְנֹתָיו
  chosen: his citadels
  alternatives:
  - his palaces
  - his fortresses
  lexicon: HALOT
  rationale: אַרְמוֹן often means palace, but in prophetic judgment contexts it can denote fortified strongholds/palatial complexes. 'Citadels' captures both grandeur and defensibility, fitting the denunciation of elite urban power.
- source_word: שָׂנֵאתִי
  chosen: I hate
  alternatives:
  - I have hated
  - I reject
  lexicon: HALOT
  rationale: The perfect here expresses Yahweh's settled stance. Simple present English best conveys the direct force in context.
- source_word: וְהִסְגַּרְתִּי
  chosen: so I will hand over
  alternatives:
  - and I will deliver up
  - and I will shut up
  - and I will give over
  lexicon: HALOT
  rationale: Hiphil of סגר commonly means to hand over/deliver into another's power in judgment contexts. 'Hand over' is idiomatic and avoids the misleadingly literal 'shut up' here.
- source_word: עִיר וּמְלֹאָהּ
  chosen: the city and all that fills it
  alternatives:
  - the city and its fullness
  - the city and all that is in it
  lexicon: HALOT
  rationale: מְלֹא refers to that which fills something, i.e., all its contents/inhabitants/wealth. 'All that fills it' stays close to the Hebrew while remaining understandable.
