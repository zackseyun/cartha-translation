id: AMO.4.9
reference: Amos 4:9
source:
  edition: WLC
  text: הִכֵּ֣יתִי אֶתְ/כֶם֮ בַּ/שִּׁדָּפ֣וֹן וּ/בַ/יֵּרָקוֹן֒ הַרְבּ֨וֹת גַּנּוֹתֵי/כֶ֧ם וְ/כַרְמֵי/כֶ֛ם וּ/תְאֵנֵי/כֶ֥ם וְ/זֵיתֵי/כֶ֖ם יֹאכַ֣ל הַ/גָּזָ֑ם וְ/לֹֽא שַׁבְתֶּ֥ם עָדַ֖/י נְאֻם יְהוָֽה־־׃ס
translation:
  text: I struck you with blight and mildew; your many gardens and your vineyards, your fig trees and your olive trees, the locust devoured; yet you did not return to me, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the cutting locust' (or 'gnawing locust'); the Hebrew names a crop-devouring insect, traditionally understood as a kind of locust.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִכֵּיתִי
  chosen: I struck
  alternatives:
  - I smote
  - I afflicted
  - I struck down
  lexicon: HALOT
  rationale: The Hiphil of נכה commonly means 'to strike' or 'to smite.' 'I struck' is direct, natural modern English, and preserves the active divine judgment without archaic diction.
- source_word: בַּשִּׁדָּפוֹן
  chosen: with blight
  alternatives:
  - with scorching
  - with blasting
  lexicon: HALOT
  rationale: שִׁדָּפוֹן denotes a crop-damaging blight or scorching east-wind effect. 'Blight' is accessible and fits the agricultural judgment context better than the less transparent 'blasting.'
- source_word: וּבַיֵּרָקוֹן
  chosen: and mildew
  alternatives:
  - and yellowing
  - and paleness
  lexicon: HALOT
  rationale: יֵרָקוֹן in agricultural contexts refers to mildew or a yellowing disease affecting plants. 'Mildew' is the established and clearest English rendering here.
- source_word: הַרְבּוֹת
  chosen: your many
  alternatives:
  - the multitude of
  - many of
  lexicon: HALOT
  rationale: The infinitive/construct-like form functions adverbially or quantitatively with the following nouns, indicating abundance. Rendering it as 'your many' captures the sense that even numerous cultivated holdings were affected.
- source_word: גַּנּוֹתֵיכֶם
  chosen: gardens
  alternatives:
  - orchards
  lexicon: HALOT
  rationale: גַּנָּה is 'garden.' Although some cultivated plots may overlap conceptually with orchards, 'gardens' is the more direct lexical equivalent and preserves the source imagery.
- source_word: כַרְמֵיכֶם
  chosen: vineyards
  lexicon: HALOT
  rationale: כֶּרֶם straightforwardly means 'vineyard.'
- source_word: תְאֵנֵיכֶם
  chosen: fig trees
  alternatives:
  - figs
  lexicon: HALOT
  rationale: The plural of תְּאֵנָה can denote fig trees in context. Since the list is of cultivated plants/trees being consumed, 'fig trees' is more precise than simply 'figs.'
- source_word: זֵיתֵיכֶם
  chosen: olive trees
  alternatives:
  - olives
  lexicon: HALOT
  rationale: זַיִת can mean olive or olive tree; here, in parallel with fig trees and vineyards, 'olive trees' best fits the agricultural inventory.
- source_word: יֹאכַל
  chosen: devoured
  alternatives:
  - ate
  - consumed
  lexicon: HALOT
  rationale: Though formally imperfect singular ('will/does eat'), in English the clause is best rendered as a past event in this retrospective series of judgments. 'Devoured' conveys destructive consumption vividly and naturally.
- source_word: הַגָּזָם
  chosen: the locust
  alternatives:
  - the cutting locust
  - the gnawing locust
  - the caterpillar
  lexicon: HALOT
  rationale: גָּזָם denotes a crop-devouring insect, traditionally identified as a kind of locust. 'The locust' is clear modern English; the more specific nuance 'cutting locust' is possible but less idiomatic and uncertain enough to preserve in a footnote.
- source_word: שַׁבְתֶּם עָדַי
  chosen: you did not return to me
  alternatives:
  - you did not turn back to me
  - you did not repent to me
  lexicon: HALOT
  rationale: שׁוּב with עַד in prophetic literature commonly means returning to God in covenantal response. 'Return to me' preserves the relational and covenantal force without narrowing it to inward repentance alone.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This prophetic formula is idiomatically rendered 'declares the LORD' in contemporary English. It preserves solemnity and the formal speech-act force of נְאֻם.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
