id: AMO.4.4
reference: Amos 4:4
source:
  edition: WLC
  text: בֹּ֤אוּ בֵֽית אֵל֙ וּ/פִשְׁע֔וּ הַ/גִּלְגָּ֖ל הַרְבּ֣וּ לִ/פְשֹׁ֑עַ וְ/הָבִ֤יאוּ
    לַ/בֹּ֨קֶר֙ זִבְחֵי/כֶ֔ם לִ/שְׁלֹ֥שֶׁת יָמִ֖ים מַעְשְׂרֹֽתֵי/כֶֽם־׃
translation:
  text: Come to Bethel—and transgress; to Gilgal—and multiply transgression. Bring
    your sacrifices every morning, your tithes every three days,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the third day' or 'after three days' for 'every three days.'
    reason: alternative_reading
lexical_decisions:
- source_word: בֹּאוּ
  chosen: Come
  alternatives:
  - Go
  - Enter
  lexicon: HALOT
  rationale: Imperative plural of בוא. 'Come' preserves the prophetic summons in vivid
    direct address; in English prophetic rhetoric this works naturally even though
    the motion is toward cult sites.
- source_word: בֵית אֵל
  chosen: Bethel
  alternatives:
  - Beth-el
  lexicon: HALOT
  rationale: Proper place name, so transliterated per translation philosophy rather
    than translated as 'house of God.'
- source_word: וּפִשְׁעוּ
  chosen: and transgress
  alternatives:
  - and sin
  - and rebel
  lexicon: HALOT
  rationale: פשע commonly conveys rebellion/transgression, often covenantal. 'Transgress'
    fits the biting irony of the prophetic imperative better than the broader 'sin.'
- source_word: הַגִּלְגָּל
  chosen: to Gilgal
  alternatives:
  - at Gilgal
  lexicon: HALOT
  rationale: Place name with the sense of motion toward the sanctuary implied from
    the parallel with 'Come to Bethel.' English supplies 'to' for naturalness.
- source_word: הַרְבּוּ לִפְשֹׁעַ
  chosen: and multiply transgression
  alternatives:
  - and multiply your transgressing
  - and sin even more
  lexicon: HALOT
  rationale: Hiphil imperative plus infinitive expresses increase/intensification.
    'Multiply transgression' preserves the Hebrew compactness and prophetic sarcasm.
- source_word: וְהָבִיאוּ
  chosen: Bring
  alternatives:
  - And bring
  lexicon: HALOT
  rationale: Imperative plural continuing the ironic summons. English can omit the
    conjunction at the start of a clause without loss, but the imperative force is
    retained.
- source_word: לַבֹּקֶר
  chosen: every morning
  alternatives:
  - in the morning
  - by morning
  lexicon: HALOT
  rationale: The phrase likely has distributive force in context, mocking punctilious
    ritual frequency. 'Every morning' communicates the sense more clearly than the
    more ambiguous 'in the morning.'
- source_word: זִבְחֵיכֶם
  chosen: your sacrifices
  alternatives:
  - your sacrificial offerings
  lexicon: HALOT
  rationale: Standard rendering of זבח in cultic context. 'Sacrifices' is clear and
    sufficiently formal.
- source_word: לִשְׁלֹשֶׁת יָמִים
  chosen: every three days
  alternatives:
  - on the third day
  - after three days
  lexicon: HALOT
  rationale: The Hebrew expression is debated. In this sarcastic cultic context, 'every
    three days' best fits the likely hyperbolic description of frequent tithing, while
    preserving the temporal sense of the phrase.
- source_word: מַעְשְׂרֹתֵיכֶם
  chosen: your tithes
  alternatives:
  - your tenth-parts
  lexicon: HALOT
  rationale: Established and accurate rendering for cultic tenth-gifts.
