theological_decisions:
- issue: Prophetic irony in the imperatives
  chosen_reading: 'Render the commands straightforwardly while allowing the irony
    to emerge from context: ''Come ... and transgress ... multiply transgression.'''
  alternative_readings:
  - Soften into explicit sarcasm such as 'Go ahead, transgress'
  rationale: The Hebrew uses real imperatives in a mocking prophetic denunciation.
    Making the sarcasm too explicit would move from translation into interpretation;
    preserving the literal command form best maintains the text's rhetorical force.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Temporal phrase לִשְׁלֹשֶׁת יָמִים
  chosen_reading: Translate as 'every three days' in the main text.
  alternative_readings:
  - on the third day
  - after three days
  rationale: The phrase is genuinely ambiguous, and the main rendering chosen best
    fits Amos's satire of excessive ritual zeal. Alternatives are preserved in a footnote
    to maintain auditability and interpretive tension.
  doctrine_reference: Translation philosophy §3
