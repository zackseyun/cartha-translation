id: AMO.4.1
reference: Amos 4:1
source:
  edition: WLC
  text: שִׁמְע֞וּ הַ/דָּבָ֣ר הַ/זֶּ֗ה פָּר֤וֹת הַ/בָּשָׁן֙ אֲשֶׁר֙ בְּ/הַ֣ר שֹֽׁמְר֔וֹן
    הָ/עֹשְׁק֣וֹת דַּלִּ֔ים הָ/רֹצְצ֖וֹת אֶבְיוֹנִ֑ים הָ/אֹמְרֹ֥ת לַ/אֲדֹֽנֵי/הֶ֖ם
    הָבִ֥יאָ/ה וְ/נִשְׁתֶּֽה׃
translation:
  text: Hear this word, you cows of Bashan, who are on the mountain of Samaria, who
    oppress the poor, who crush the needy, who say to their masters, “Bring, so that
    we may drink.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “their husbands.” The Hebrew אֲדֹנֵיהֶם can refer to masters, lords,
      or husbands depending on context.
    reason: alternative_reading
  - marker: b
    text: Bashan was a fertile region east of the Jordan, famous for well-fed cattle;
      the image is a biting insult aimed at the luxurious and oppressive.
    reason: cultural_note
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen to
  lexicon: HALOT
  rationale: Imperative plural of שׁמע. 'Hear' is the standard prophetic summons in
    English and preserves the force and cadence of the Hebrew.
- source_word: הַדָּבָר הַזֶּה
  chosen: this word
  alternatives:
  - this message
  - this matter
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'message.' In prophetic discourse,
    'word' preserves the formal resonance of an announced oracle without over-paraphrasing.
- source_word: פָּרוֹת הַבָּשָׁן
  chosen: cows of Bashan
  alternatives:
  - cattle of Bashan
  - heifers of Bashan
  lexicon: HALOT
  rationale: פָּרוֹת is specifically female cattle, not generic cattle. 'Cows' is
    the plain and vivid English equivalent. Bashan was known for well-fed livestock,
    so the image conveys indulgent luxury and insult.
- source_word: בְּהַר שֹׁמְרוֹן
  chosen: on the mountain of Samaria
  alternatives:
  - on the hill of Samaria
  - in the hill-country of Samaria
  lexicon: HALOT
  rationale: הַר is singular 'mountain/hill.' 'Mountain of Samaria' is a close rendering;
    'on' fits the locative sense naturally in English.
- source_word: הָעֹשְׁקוֹת דַּלִּים
  chosen: who oppress the poor
  alternatives:
  - who defraud the poor
  - who exploit the poor
  lexicon: HALOT
  rationale: עשק commonly denotes oppression or exploitation, often economic. 'Oppress'
    is broad enough to include social and economic abuse and is a standard prophetic
    term.
- source_word: הָרֹצְצוֹת אֶבְיוֹנִים
  chosen: who crush the needy
  alternatives:
  - who crush the poor
  - who abuse the needy
  lexicon: HALOT
  rationale: רצץ conveys crushing or breaking. 'Crush' preserves the violent metaphor.
    אביונים is well rendered 'needy,' distinguishing it slightly from דלים ('poor').
- source_word: הָאֹמְרֹת לַאֲדֹנֵיהֶם
  chosen: who say to their masters
  alternatives:
  - who say to their lords
  - who say to their husbands
  lexicon: HALOT
  rationale: אדנים can mean masters, lords, or husbands depending on context. Here
    the women addressed as 'cows of Bashan' are speaking to the men who provide for
    their indulgence; 'masters' best reflects the lexical form while avoiding importing
    a marital interpretation into the main text. The husband sense is plausible and
    worth preserving in a footnote.
- source_word: הָבִיאָה
  chosen: Bring
  alternatives:
  - Bring it here
  - Bring us something
  lexicon: HALOT
  rationale: 'Hiphil imperative of בוא used transitively: ''bring.'' The paragogic/energic
    ending does not require expansion in English. The object is left unstated in Hebrew
    and should remain implicit.'
- source_word: וְנִשְׁתֶּה
  chosen: so that we may drink
  alternatives:
  - and let us drink
  - that we may drink
  lexicon: HALOT
  rationale: First common plural imperfect with prefixed conjunction. In context it
    expresses purpose/result following the imperative. 'So that we may drink' makes
    the relation clear in natural English.
