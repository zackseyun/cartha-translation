theological_decisions:
- issue: Referent of the feminine address 'cows of Bashan'
  chosen_reading: A prophetic metaphor addressing wealthy women of Samaria as pampered,
    oppressive 'cows of Bashan.'
  alternative_readings:
  - A broader metaphor for the luxurious elite of Samaria, not limited strictly to
    women
  rationale: The feminine plural forms throughout the verse strongly support direct
    address to women, likely elite women whose luxury is sustained by oppression.
    The translation preserves the metaphor without softening it or over-explaining
    it in the main text.
- issue: Meaning of לַאֲדֹנֵיהֶם
  chosen_reading: their masters
  alternative_readings:
  - their husbands
  - their lords
  rationale: The Hebrew noun permits several relational senses. Because the lexical
    form itself does not explicitly specify 'husbands,' the main text keeps the broader
    'masters,' while a footnote preserves the plausible marital reading.
  doctrine_reference: Preserve theological/interpretive tension rather than resolve
    it
