id: AMO.4.3
reference: Amos 4:3
source:
  edition: WLC
  text: וּ/פְרָצִ֥ים תֵּצֶ֖אנָה אִשָּׁ֣ה נֶגְדָּ֑/הּ וְ/הִשְׁלַכְתֶּ֥נָה הַ/הַרְמ֖וֹנָ/ה
    נְאֻם יְהוָֽה־׃
translation:
  text: And through the breaches you will go out, each woman straight ahead of her,
    and you will be cast out toward Harmon,” declares the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly “and you will be thrown to Harmon,” “to the fortress,” or “to
      Hermon.” The Hebrew הַהַרְמוֹנָה is obscure, and its precise referent is uncertain.
    reason: alternative_reading
  - marker: b
    text: 'Hebrew: “woman before/opposite her,” likely meaning each woman will go
      straight out through the breach in front of her.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפְרָצִים
  chosen: through the breaches
  alternatives:
  - through breaches
  - by the breaches
  lexicon: HALOT
  rationale: פְרָצִים refers to breaks or breaches, likely in a wall. Rendering with
    'through' brings out the implied movement through openings in the city wall in
    context.
- source_word: תֵּצֶאנָה
  chosen: you will go out
  alternatives:
  - you will come out
  - you will be led out
  lexicon: HALOT
  rationale: Qal imperfect 2fp of יצא normally means 'go out/come out.' The active
    sense is retained rather than making it passive, though the broader context implies
    forced exile.
- source_word: אִשָּׁה
  chosen: each woman
  alternatives:
  - woman
  - one woman
  lexicon: HALOT
  rationale: Used distributively with the following phrase; 'each woman' captures
    the individualizing force in idiomatic English.
- source_word: נֶגְדָּהּ
  chosen: straight ahead of her
  alternatives:
  - before her
  - in front of her
  - opposite her
  lexicon: HALOT
  rationale: נֶגֶד commonly denotes what is in front of or opposite someone. In this
    context of people exiting one by one through breaches, 'straight ahead of her'
    best conveys direct movement without turning aside.
- source_word: וְהִשְׁלַכְתֶּנָה
  chosen: you will be cast out
  alternatives:
  - you will be thrown out
  - you will cast [them] out
  lexicon: HALOT
  rationale: The form is difficult, but in context it is best taken as a passive-like
    or impersonal sense describing the women's expulsion/deportation. 'Be cast out'
    preserves the force without over-specifying the agent.
- source_word: הַהַרְמוֹנָה
  chosen: toward Harmon
  alternatives:
  - to Harmon
  - to the fortress
  - to Hermon
  lexicon: HALOT
  rationale: The term is obscure and likely a place name or destination. Transliteration
    as 'Harmon' avoids falsely resolving the uncertainty into a common noun such as
    'fortress.' The directional sense is represented by 'toward.'
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is natural modern English
    and follows the required rendering of יְהוָה as 'the LORD'.
