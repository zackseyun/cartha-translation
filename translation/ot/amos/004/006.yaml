theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to make the idiom נִקְיוֹן שִׁנַּיִם fully interpretive in the main text
  chosen_reading: Retain the literal image 'cleanness of teeth' in the main text
  alternative_readings:
  - hunger
  - empty stomachs
  - nothing to eat
  rationale: Optimal equivalence here favors preserving the prophetic metaphor because the immediate parallel 'lack of bread' makes the meaning accessible. A fully dynamic rendering would lose the rhetorical force of the Hebrew image.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; original-language primacy'
