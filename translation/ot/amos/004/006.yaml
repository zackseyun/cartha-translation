id: AMO.4.6
reference: Amos 4:6
source:
  edition: WLC
  text: וְ/גַם אֲנִי֩ נָתַ֨תִּי לָ/כֶ֜ם נִקְי֤וֹן שִׁנַּ֨יִם֙ בְּ/כָל עָ֣רֵי/כֶ֔ם וְ/חֹ֣סֶר לֶ֔חֶם בְּ/כֹ֖ל מְקוֹמֹֽתֵי/כֶ֑ם וְ/לֹֽא שַׁבְתֶּ֥ם עָדַ֖/י נְאֻם יְהוָֽה־־־־׃
translation:
  text: And I also gave you cleanness of teeth in all your cities, and lack of bread in all your places; yet you did not return to me, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, “cleanness of teeth,” an idiom for having nothing to eat.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם אֲנִי
  chosen: And I also
  alternatives:
  - And also I
  - Moreover, I
  lexicon: HALOT
  rationale: Preserves the emphatic additive force of וְגַם with the explicit pronoun אֲנִי, while using natural English word order.
- source_word: נָתַתִּי לָכֶם
  chosen: gave you
  alternatives:
  - have given you
  - appointed for you
  lexicon: HALOT
  rationale: Simple past best fits the prophetic recounting of covenant judgments already sent. 'Gave you' preserves the direct causative sense without overinterpreting.
- source_word: נִקְיוֹן שִׁנַּיִם
  chosen: cleanness of teeth
  alternatives:
  - clean teeth
  - emptiness of teeth
  lexicon: HALOT
  rationale: This idiom refers to having nothing to eat, hence teeth remain clean. The literal rendering is retained in the main text to preserve the vivid Hebrew imagery, while the famine sense is clarified by the following parallel phrase 'lack of bread.'
- source_word: בְּכָל עָרֵיכֶם
  chosen: in all your cities
  alternatives:
  - throughout all your cities
  lexicon: HALOT
  rationale: Straightforward locative rendering; 'cities' is the normal sense of עָרִים.
- source_word: וְחֹסֶר לֶחֶם
  chosen: and lack of bread
  alternatives:
  - and scarcity of bread
  - and famine
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the lexical components חֹסֶר + לֶחֶם. 'Famine' would be interpretive; 'lack of bread' keeps the concrete wording and explains the idiom in parallel.
- source_word: בְּכֹל מְקוֹמֹתֵיכֶם
  chosen: in all your places
  alternatives:
  - in all your settlements
  - in every place among you
  lexicon: HALOT
  rationale: מְקוֹמוֹת is broader than 'cities'; 'places' preserves the generality and avoids flattening the parallelism.
- source_word: וְלֹא שַׁבְתֶּם עָדַי
  chosen: yet you did not return to me
  alternatives:
  - but you did not turn back to me
  - and you did not repent to me
  lexicon: HALOT
  rationale: שׁוּב with עַד commonly conveys returning/turning back to God. 'Return to me' preserves covenantal resonance without narrowing the sense to inward repentance alone.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula in clear modern English. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
