theological_decisions:
- issue: Rendering the divine name יְהוָה within the title אֲדֹנָי יְהוִה
  chosen_reading: The Lord GOD
  alternative_readings:
  - the Lord Yahweh
  rationale: The doctrine specifies the default rendering of יְהוָה as 'the LORD.'
    In this compound title, 'Lord GOD' is the standard English equivalent that preserves
    reverential convention and avoids the awkward 'Lord LORD.'
  doctrine_reference: 'DOCTRINE.md: Contested terms table, יְהוָה YHWH → ''the LORD'''
