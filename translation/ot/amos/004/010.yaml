theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies the default rendering of YHWH as 'the
    LORD' in continuity with Jewish reverence tradition and the Septuagint pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Repentance language in וְלֹא שַׁבְתֶּם עָדַי
  chosen_reading: you did not return to me
  alternative_readings:
  - you did not repent and return to me
  - you did not turn back to me
  rationale: The Hebrew uses the common covenantal verb שוב, which can imply repentance,
    but the text itself says 'return.' The translation preserves the theological summons
    without importing a fuller doctrinal paraphrase.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
