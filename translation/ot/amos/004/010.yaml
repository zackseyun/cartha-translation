id: AMO.4.10
reference: Amos 4:10
source:
  edition: WLC
  text: שִׁלַּ֨חְתִּי בָ/כֶ֥ם דֶּ֨בֶר֙ בְּ/דֶ֣רֶךְ מִצְרַ֔יִם הָרַ֤גְתִּי בַ/חֶ֨רֶב֙
    בַּח֣וּרֵי/כֶ֔ם עִ֖ם שְׁבִ֣י סֽוּסֵי/כֶ֑ם וָ/אַעֲלֶ֞ה בְּאֹ֤שׁ מַחֲנֵי/כֶם֙ וּֽ/בְ/אַפְּ/כֶ֔ם
    וְ/לֹֽא שַׁבְתֶּ֥ם עָדַ֖/י נְאֻם יְהוָֽה־־׃
translation:
  text: I sent among you a plague in the manner of Egypt; I killed your young men
    with the sword, along with your captured horses, and I made the stench of your
    camps rise even into your nostrils; yet you did not return to me, declares the
    LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after the manner of Egypt,' likely alluding to the plagues/judgments
      associated with Egypt rather than a literal route.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'along with the captivity of your horses'; the phrase likely refers
      to military defeat in which their horses were taken.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁלַּחְתִּי
  chosen: I sent
  alternatives:
  - I dispatched
  lexicon: HALOT
  rationale: Basic sense of שלח in the Hiphil/Qal context here is to send forth. 'I
    sent' is the most natural and direct English rendering.
- source_word: בָכֶם
  chosen: among you
  alternatives:
  - against you
  - into you
  lexicon: HALOT
  rationale: With שלח and a calamity, ב can indicate something sent into or among
    a people. 'Among you' fits idiomatic English and the plague context without over-specifying
    hostility beyond the verse's own judgment setting.
- source_word: דֶּבֶר
  chosen: a plague
  alternatives:
  - pestilence
  lexicon: HALOT
  rationale: '''Plague'' is clear modern English for epidemic judgment; ''pestilence''
    is traditional but less natural for contemporary readers. The term denotes a deadly
    epidemic affliction.'
- source_word: בְּדֶרֶךְ מִצְרַיִם
  chosen: in the manner of Egypt
  alternatives:
  - after the manner of Egypt
  - like Egypt
  - on the way of Egypt
  lexicon: HALOT
  rationale: The phrase is idiomatic and most likely means in the way Egypt was struck,
    evoking the Egyptian plagues rather than a literal road to Egypt. 'In the manner
    of Egypt' preserves that allusive force in readable English.
- source_word: הָרַגְתִּי
  chosen: I killed
  alternatives:
  - I struck down
  lexicon: HALOT
  rationale: Straightforward rendering of הרג. 'I killed' is direct and matches the
    severity of the judgment oracle.
- source_word: בַחֶרֶב
  chosen: with the sword
  alternatives:
  - by the sword
  lexicon: HALOT
  rationale: Standard idiom for death in warfare or violent judgment. 'With the sword'
    is natural and close to the Hebrew.
- source_word: בַּחוּרֵיכֶם
  chosen: your young men
  alternatives:
  - your chosen men
  - your warriors
  lexicon: HALOT
  rationale: בחורים commonly refers to young men in their prime. In a military context
    it may imply fighting men, but 'young men' preserves the lexical sense without
    narrowing it too much.
- source_word: עִם שְׁבִי סוּסֵיכֶם
  chosen: along with your captured horses
  alternatives:
  - together with the captivity of your horses
  - when your horses were taken captive
  lexicon: HALOT
  rationale: The Hebrew is compressed. שבי can denote captivity/captured state. The
    phrase likely means that the young men were killed while their horses were taken,
    or together with the loss of their horses. 'Along with your captured horses' preserves
    the compactness and sense of military defeat.
- source_word: וָאַעֲלֶה
  chosen: and I made ... rise
  alternatives:
  - and I brought up
  - and I caused ... to ascend
  lexicon: HALOT
  rationale: 'עלה in Hiphil-like causative usage here refers to causing the stench
    to go up. English requires an object-complement structure: ''I made the stench
    ... rise.'''
- source_word: בְּאֹשׁ
  chosen: the stench
  alternatives:
  - the foul smell
  - the stink
  lexicon: HALOT
  rationale: The noun denotes foul odor. 'Stench' is vivid but still appropriately
    dignified for prophetic judgment language.
- source_word: מַחֲנֵיכֶם
  chosen: of your camps
  alternatives:
  - of your camp
  lexicon: HALOT
  rationale: Plural form in Hebrew; 'camps' reflects the morphology and likely military
    encampments after battle.
- source_word: וּבְאַפְּכֶם
  chosen: even into your nostrils
  alternatives:
  - into your nose
  - to your face
  lexicon: HALOT
  rationale: אַף literally means nose/nostril and by extension anger. Here with stench
    it clearly refers to the physical nose. 'Even into your nostrils' captures the
    vividness and the prefixed conjunction/preposition sequence.
- source_word: וְלֹא שַׁבְתֶּם עָדַי
  chosen: yet you did not return to me
  alternatives:
  - but you did not turn back to me
  lexicon: HALOT
  rationale: שוב with עד/אל in prophetic contexts commonly means repentance/return
    to God. 'Return to me' preserves the covenantal and relational force without over-paraphrasing.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. Per doctrine, יְהוָה is rendered 'the LORD.'
    'Declares' is idiomatic and suitably solemn.
