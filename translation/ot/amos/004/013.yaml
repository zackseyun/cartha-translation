theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines specify 'the LORD' as the default rendering
    for YHWH, while preserving alternatives only as needed. Here the standard covenantal
    rendering suits the prophetic doxology.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of רוּחַ in a creation context
  chosen_reading: wind
  alternative_readings:
  - spirit
  rationale: The verse stacks cosmic acts of creation and sovereignty; 'wind' best
    matches that sequence. Because רוּחַ can also mean 'spirit,' the alternative is
    preserved in a footnote rather than being dogmatically excluded.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
- issue: Rendering of לְאָדָם
  chosen_reading: to man
  alternative_readings:
  - to humankind
  rationale: The Hebrew uses the representative singular אָדָם. Per doctrine, gender-accurate
    rendering is preferred over flattening to gender-neutral language unless context
    requires otherwise.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
