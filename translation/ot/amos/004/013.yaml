id: AMO.4.13
reference: Amos 4:13
source:
  edition: WLC
  text: כִּ֡י הִנֵּה֩ יוֹצֵ֨ר הָרִ֜ים וּ/בֹרֵ֣א ר֗וּחַ וּ/מַגִּ֤יד לְ/אָדָם֙ מַה שֵּׂח֔/וֹ
    עֹשֵׂ֥ה שַׁ֨חַר֙ עֵיפָ֔ה וְ/דֹרֵ֖ךְ עַל בָּ֣מֳתֵי אָ֑רֶץ יְהוָ֥ה אֱלֹהֵֽי צְבָא֖וֹת
    שְׁמֽ/וֹ־־־׃ס
translation:
  text: For behold, the one who forms the mountains and creates the wind, and declares
    to man what his thought is, who makes dawn darkness and treads on the heights
    of the earth—the LORD, the God of hosts, is his name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'creates the spirit'; Hebrew רוּחַ can mean 'wind,' 'breath,' or 'spirit.'
    reason: lexical_alternative
  - marker: b
    text: Or 'declares to humankind'; Hebrew 'to man' uses the representative singular
      אָדָם.
    reason: lexical_alternative
  - marker: c
    text: Or 'what he is thinking' / 'what his meditation is'; the Hebrew term can
      refer to inward musing or thought.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי הִנֵּה
  chosen: For behold
  alternatives:
  - For look
  - Indeed, behold
  lexicon: HALOT
  rationale: כִּי here introduces the ground for the preceding warning ('for'), while
    הִנֵּה adds vivid deictic force ('behold'). Retaining both preserves the prophetic
    solemnity.
- source_word: יוֹצֵר
  chosen: forms
  alternatives:
  - fashiones
  - shapes
  lexicon: HALOT
  rationale: The participle of יצר commonly conveys shaping or forming, often with
    intentional craftsmanship. 'Forms' is natural English and preserves the concrete
    creative nuance.
- source_word: הָרִים
  chosen: the mountains
  alternatives:
  - mountains
  lexicon: HALOT
  rationale: The article is present in Hebrew; 'the mountains' reflects the specific,
    majestic created order in view.
- source_word: וּבֹרֵא רוּחַ
  chosen: and creates the wind
  alternatives:
  - and creates the spirit
  - and creates wind
  lexicon: HALOT
  rationale: רוּחַ can mean 'wind,' 'breath,' or 'spirit.' In this creation-theophany
    context, paired with mountains and cosmic acts, 'wind' best fits the natural-world
    imagery. The alternative 'spirit' is worth preserving because the Hebrew term
    is semantically broad.
- source_word: וּמַגִּיד לְאָדָם
  chosen: and declares to man
  alternatives:
  - and tells man
  - and declares to humankind
  lexicon: HALOT
  rationale: מגיד is a formal verb of announcing or declaring. אָדָם here is generic
    but singular; per doctrine, 'man' is retained as gender-accurate to the representative
    singular, with inclusive alternative noted.
- source_word: מַה שֵּׂחוֹ
  chosen: what his thought is
  alternatives:
  - what his meditation is
  - what his complaint is
  - what he is thinking
  lexicon: HALOT
  rationale: The noun שֵׂחַ/שִׂיחַ can denote thought, meditation, musing, or complaint/speech.
    In context, the sense is God's disclosure of a human's inner reflection or intention.
    'What his thought is' preserves the inward, cognitive nuance without over-paraphrase.
- source_word: עֹשֵׂה שַׁחַר עֵיפָה
  chosen: who makes dawn darkness
  alternatives:
  - who makes the dawn darkness
  - who makes dawn gloom
  lexicon: HALOT
  rationale: עֵיפָה denotes darkness/gloom. The phrase likely describes God's power
    to turn dawn into darkness, a reversal image fitting prophetic judgment language.
    'Makes dawn darkness' is concise and close to the Hebrew construction.
- source_word: וְדֹרֵךְ עַל בָּמֳתֵי אָרֶץ
  chosen: and treads on the heights of the earth
  alternatives:
  - and walks on the high places of the earth
  lexicon: HALOT
  rationale: דרך with על conveys trampling or treading. בָּמוֹת can mean high places/heights;
    here topographical 'heights' fits the cosmic sovereignty imagery better than cultic
    'high places.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: אֱלֹהֵי צְבָאוֹת
  chosen: the God of hosts
  alternatives:
  - God of armies
  lexicon: HALOT
  rationale: This established rendering preserves the Hebrew imagery of heavenly armies
    while remaining idiomatic in English. 'Hosts' is still understandable and suitably
    weighty.
- source_word: שְׁמוֹ
  chosen: is his name
  alternatives:
  - his name
  lexicon: HALOT
  rationale: The nominal clause is naturally completed in English with 'is.' This
    preserves the climactic identification formula.
