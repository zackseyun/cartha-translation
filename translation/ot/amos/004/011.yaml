theological_decisions:
- issue: Rendering of יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of שׁוב in prophetic covenant context
  chosen_reading: return to me
  alternative_readings:
  - turn back to me
  - repent
  rationale: The prophetic refrain emphasizes covenant return to God, not merely inward remorse. 'Return to me' preserves the theological breadth of relational restoration and repentance.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, #5'
