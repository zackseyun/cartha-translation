id: AMO.4.11
reference: Amos 4:11
source:
  edition: WLC
  text: הָפַ֣כְתִּי בָ/כֶ֗ם כְּ/מַהְפֵּכַ֤ת אֱלֹהִים֙ אֶת סְדֹ֣ם וְ/אֶת עֲמֹרָ֔ה וַ/תִּהְי֕וּ כְּ/א֖וּד מֻצָּ֣ל מִ/שְׂרֵפָ֑ה וְ/לֹֽא שַׁבְתֶּ֥ם עָדַ֖/י נְאֻם יְהוָֽה־־־־׃ס
translation:
  text: I overthrew some among you as God overthrew Sodom and Gomorrah, and you became like a brand snatched from the burning; yet you did not return to me, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among you'; the Hebrew preposition may be read without making the partitive sense explicit.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'like the overthrow of God of Sodom and Gomorrah,' that is, like the overthrow God brought on Sodom and Gomorrah.
    reason: lexical_alternative
  - marker: c
    text: Or 'a firebrand rescued from the blaze.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָפַכְתִּי
  chosen: I overthrew
  alternatives:
  - I overturned
  - I destroyed
  lexicon: HALOT
  rationale: The verb הפך in judgment contexts commonly denotes overthrowing or overturning, especially with allusion to Sodom and Gomorrah. 'Overthrew' is idiomatic in English and preserves the catastrophic sense without over-paraphrasing.
- source_word: בָכֶם
  chosen: some among you
  alternatives:
  - among you
  - in you
  lexicon: HALOT
  rationale: 'The preposition ב with plural pronominal suffix after a verb of judgment is best taken partitively here: the judgment struck persons within Israel rather than the whole nation equally. ''Some among you'' makes explicit the natural English sense.'
- source_word: כְּמַהְפֵּכַת אֱלֹהִים
  chosen: as God overthrew
  alternatives:
  - like the overthrow of God
  - like God's overthrow
  lexicon: HALOT
  rationale: The Hebrew uses a comparison with the nominal form 'overthrow' plus 'God.' In English, recasting the nominal phrase verbally ('as God overthrew') is clearer and preserves the allusion to Genesis 19. The phrase likely means an overthrow wrought by God, not merely a superlative.
- source_word: סְדֹם וְאֶת עֲמֹרָה
  chosen: Sodom and Gomorrah
  lexicon: HALOT
  rationale: Standard English transliterations of the place names.
- source_word: וַתִּהְיוּ
  chosen: you became
  alternatives:
  - you were
  lexicon: HALOT
  rationale: 'The waw-consecutive with היה here marks resultant state after the judgment: ''you became'' better reflects the transition into the compared condition.'
- source_word: כְּאוּד
  chosen: like a brand
  alternatives:
  - like a firebrand
  - like a stick
  lexicon: HALOT
  rationale: אוּד denotes a piece of wood taken from a fire, often rendered 'brand' or 'firebrand.' 'Brand' is concise and preserves the metaphor's biblical resonance.
- source_word: מֻצָּל
  chosen: snatched
  alternatives:
  - rescued
  - delivered
  lexicon: HALOT
  rationale: The passive participle from נצל conveys being delivered out of danger. 'Snatched' vividly matches the image of a brand pulled quickly from flames and echoes common biblical English usage.
- source_word: מִשְּׂרֵפָה
  chosen: from the burning
  alternatives:
  - from the fire
  - from the blaze
  lexicon: HALOT
  rationale: The noun refers to burning or conflagration rather than simply 'fire' as an object. 'From the burning' stays close to the Hebrew while remaining natural.
- source_word: וְלֹא שַׁבְתֶּם עָדַי
  chosen: yet you did not return to me
  alternatives:
  - but you did not turn back to me
  - and you did not repent to me
  lexicon: HALOT
  rationale: שׁוב with עַד expresses returning to the LORD in covenantal repentance. 'Return to me' preserves the prophetic idiom and theological nuance better than the narrower 'repent.'
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic formula. 'Declares the LORD' is idiomatic, weighty, and aligns with the project's default rendering of יְהוָה as 'the LORD'.
