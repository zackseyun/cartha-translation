id: AMO.4.12
reference: Amos 4:12
source:
  edition: WLC
  text: לָ/כֵ֕ן כֹּ֥ה אֶעֱשֶׂה לְּ/ךָ֖ יִשְׂרָאֵ֑ל עֵ֚קֶב כִּֽי זֹ֣את אֶֽעֱשֶׂה לָּ֔/ךְ
    הִכּ֥וֹן לִ/קְרַאת אֱלֹהֶ֖י/ךָ יִשְׂרָאֵֽל־־־־׃
translation:
  text: Therefore, this is what I will do to you, Israel; because I will do this to
    you, prepare to meet your God, Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'prepare to encounter your God.' In context, the meeting is a fearful
      confrontation following announced judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks an inferential conclusion from the preceding judgments; 'Therefore'
    preserves the prophetic transition naturally in English.
- source_word: כֹּה
  chosen: this is what
  alternatives:
  - thus
  - so
  lexicon: HALOT
  rationale: Introduces the content of the announced action. 'This is what' is more
    natural modern English than the more formal 'thus' while preserving the deictic
    force.
- source_word: אֶעֱשֶׂה לְּךָ
  chosen: I will do to you
  alternatives:
  - I will act against you
  - I will do this to you
  lexicon: HALOT
  rationale: The verb עשה is broad ('do/make'). Here the object is implicit and hostile
    from context, but the Hebrew itself says simply 'do to you'; this keeps the wording
    close without over-interpreting.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Proper name retained by standard transliteration.
- source_word: עֵקֶב כִּי
  chosen: because
  alternatives:
  - since
  - as a consequence that
  lexicon: HALOT
  rationale: The combination introduces the ground or consequence for the exhortation
    that follows. 'Because' is the clearest idiomatic rendering in context.
- source_word: זֹאת
  chosen: this
  alternatives:
  - such a thing
  lexicon: HALOT
  rationale: Simple demonstrative referring forward/back to the announced act of judgment.
- source_word: אֶעֱשֶׂה לָּךְ
  chosen: I will do this to you
  alternatives:
  - I will do this for you
  - I will act toward you in this way
  lexicon: HALOT
  rationale: Although the morphology table marks the suffix as feminine here, the
    sense and parallelism clearly address Israel. The preposition ל with עשה in this
    context is adversative/targeted, not benefactive; 'to you' fits the judgment context.
- source_word: הִכּוֹן
  chosen: prepare
  alternatives:
  - make ready
  - be prepared
  lexicon: HALOT
  rationale: Imperative of כון in the Niphal conveys readiness/preparation. 'Prepare'
    is concise and idiomatic.
- source_word: לִקְרַאת
  chosen: to meet
  alternatives:
  - for meeting
  - to encounter
  lexicon: HALOT
  rationale: Standard rendering of the infinitive/preposition construction indicating
    movement toward an encounter.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Covenantal address to Israel; singular 'your' matches the Hebrew suffix.
