theological_decisions:
- issue: Tone of 'prepare to meet your God'
  chosen_reading: An ominous summons to face God in judgment
  alternative_readings:
  - A neutral or hopeful call to worship/repentance
  rationale: In the immediate context Amos has rehearsed judgments and announces further
    action. The imperative therefore functions primarily as a warning of impending
    divine confrontation, though the wording itself does not specify the exact mode
    of meeting.
