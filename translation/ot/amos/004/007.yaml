theological_decisions:
- issue: Divine agency in selective rainfall and drought
  chosen_reading: Render the verbs with explicit first-person divine agency ('I withheld,'
    'I caused it to rain,' 'I did not cause it to rain')
  alternative_readings:
  - Use more impersonal English such as 'rain was withheld' or 'rain fell'
  rationale: The Hebrew repeatedly emphasizes God's direct action in covenant judgment.
    The translation should preserve that theological force rather than soften it into
    impersonal weather description.
  doctrine_reference: Translation philosophy §1, §3
