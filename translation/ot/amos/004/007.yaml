id: AMO.4.7
reference: Amos 4:7
source:
  edition: WLC
  text: וְ/גַ֣ם אָנֹכִי֩ מָנַ֨עְתִּי מִ/כֶּ֜ם אֶת הַ/גֶּ֗שֶׁם בְּ/ע֨וֹד שְׁלֹשָׁ֤ה
    חֳדָשִׁים֙ לַ/קָּצִ֔יר וְ/הִמְטַרְתִּי֙ עַל עִ֣יר אֶחָ֔ת וְ/עַל עִ֥יר אַחַ֖ת לֹ֣א
    אַמְטִ֑יר חֶלְקָ֤ה אַחַת֙ תִּמָּטֵ֔ר וְ/חֶלְקָ֛ה אֲשֶֽׁר לֹֽא תַמְטִ֥יר עָלֶ֖י/הָ
    תִּיבָֽשׁ־־־־־׃
translation:
  text: And I also withheld the rain from you when there were still three months until
    the harvest; and I caused it to rain on one city, but on another city I did not
    cause it to rain. One field received rain, but the field on which it did not rain
    dried up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'One plot was rained on, but the plot on which rain did not fall dried
      up.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: And I also
  alternatives:
  - And also I
  - Moreover I
  lexicon: HALOT
  rationale: Conveys additive emphasis linking this judgment to the preceding ones.
    Including 'also' preserves the Hebrew particle גַם.
- source_word: אָנֹכִי
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis to the verbal subject. English
    can carry this naturally with explicit 'I' after 'And ... also'; 'I myself' would
    be possible but slightly heavier than needed in context.
- source_word: מָנַעְתִּי מִכֶּם אֶת־הַגֶּשֶׁם
  chosen: withheld the rain from you
  alternatives:
  - kept back the rain from you
  - held back the rain from you
  lexicon: HALOT
  rationale: מנע with מן expresses withholding. 'Withheld' is idiomatic and preserves
    divine agency in depriving them of rain.
- source_word: בְּעוֹד שְׁלֹשָׁה חֳדָשִׁים לַקָּצִיר
  chosen: when there were still three months until the harvest
  alternatives:
  - while there were yet three months to the harvest
  - with three months still remaining until harvest
  lexicon: HALOT
  rationale: בְּעוֹד marks time still remaining. This rendering makes clear the rain
    was withheld at a crucial agricultural period before harvest.
- source_word: וְהִמְטַרְתִּי
  chosen: I caused it to rain
  alternatives:
  - I sent rain
  - I made it rain
  lexicon: HALOT
  rationale: The Hiphil of מטר is causative. 'Caused it to rain' preserves the causative
    force more explicitly than simply 'sent rain.'
- source_word: עַל עִיר אֶחָת ... וְעַל עִיר אַחַת לֹא אַמְטִיר
  chosen: on one city, but on another city I did not cause it to rain
  alternatives:
  - upon one city ... upon another city I did not send rain
  - on one city ... on another I did not make it rain
  lexicon: HALOT
  rationale: Retains the deliberate contrast between selective rainfall on neighboring
    locations. Repeating 'city' reflects the Hebrew parallelism.
- source_word: חֶלְקָה אַחַת
  chosen: One field
  alternatives:
  - One portion of land
  - One plot
  lexicon: HALOT
  rationale: חלקה here refers to a tract or plot of land, likely agricultural. 'Field'
    is the clearest natural English equivalent in context.
- source_word: תִּמָּטֵר
  chosen: received rain
  alternatives:
  - was rained on
  - was made to receive rain
  lexicon: HALOT
  rationale: The Niphal/passive sense is rendered idiomatically in English. 'Received
    rain' is natural and preserves the contrast with the dry field.
- source_word: וְחֶלְקָה אֲשֶׁר לֹא תַמְטִיר עָלֶיהָ
  chosen: but the field on which it did not rain
  alternatives:
  - but the field on which I did not cause rain to fall
  - and the field that I did not rain on
  lexicon: HALOT
  rationale: The Hebrew shifts to a relative clause with 3fs verb agreeing with 'field'
    as subject in form, but the sense is that rain did not fall on it. This English
    rendering is idiomatic while preserving the meaning.
- source_word: תִּיבָשׁ
  chosen: dried up
  alternatives:
  - withered
  - became dry
  lexicon: HALOT
  rationale: יבש denotes drying out. 'Dried up' fits land/crops naturally and reflects
    the result of withheld rain.
