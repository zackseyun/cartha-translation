id: AMO.4.8
reference: Amos 4:8
source:
  edition: WLC
  text: וְ/נָע֡וּ שְׁתַּיִם֩ שָׁלֹ֨שׁ עָרִ֜ים אֶל עִ֥יר אַחַ֛ת לִ/שְׁתּ֥וֹת מַ֖יִם
    וְ/לֹ֣א יִשְׂבָּ֑עוּ וְ/לֹֽא שַׁבְתֶּ֥ם עָדַ֖/י נְאֻם יְהוָֽה־־־׃
translation:
  text: So two or three cities wandered to one city to drink water, but they were
    not satisfied; yet you did not return to me, declares the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'staggered' or 'reeled' to one city; the Hebrew verb suggests unsteady
      movement to and fro in search of water.
    reason: lexical_alternative
  - marker: b
    text: Or 'turn back to me.' In Amos, 'return' carries the sense of covenantal
      turning back to God.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָעוּ
  chosen: wandered
  alternatives:
  - reeled
  - staggered
  - went about
  lexicon: HALOT
  rationale: From נוע, conveying movement to and fro or aimless wandering. 'Wandered'
    fits the drought context of desperate movement in search of water better than
    a simple 'went.'
- source_word: שְׁתַּיִם שָׁלֹשׁ עָרִים
  chosen: two or three cities
  alternatives:
  - two, three cities
  lexicon: HALOT
  rationale: An idiomatic Hebrew numerical pairing expressing an indefinite small
    number. English naturally renders this as 'two or three cities.'
- source_word: אֶל עִיר אַחַת
  chosen: to one city
  alternatives:
  - into one city
  - toward a single city
  lexicon: HALOT
  rationale: Straightforward directional phrase. 'To one city' is natural and preserves
    the sense of multiple cities converging on a single place with water.
- source_word: לִשְׁתּוֹת מַיִם
  chosen: to drink water
  alternatives:
  - for drinking water
  lexicon: HALOT
  rationale: Infinitive of purpose with direct object; 'to drink water' is the plain
    sense.
- source_word: וְלֹא יִשְׂבָּעוּ
  chosen: but they were not satisfied
  alternatives:
  - but they did not have enough
  - but they were not filled
  lexicon: HALOT
  rationale: שׂבע commonly means to be satisfied or filled, often with food or drink.
    'Were not satisfied' preserves the broader sense of insufficiency rather than
    merely thirst not being quenched.
- source_word: וְלֹא שַׁבְתֶּם עָדַי
  chosen: yet you did not return to me
  alternatives:
  - yet you did not turn back to me
  lexicon: HALOT
  rationale: שׁוב with עַד in prophetic literature often carries covenantal/repentance
    force. 'Return to me' preserves both the literal and theological sense without
    over-paraphrasing.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Declares the LORD' is idiomatic
    modern English and preserves prophetic solemnity.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
