theological_decisions:
- issue: Repentance nuance in שׁוב
  chosen_reading: return to me
  alternative_readings:
  - turn back to me
  rationale: The Hebrew can denote physical return or covenantal turning/repentance.
    In Amos's prophetic context the covenantal sense is clearly active, but 'return
    to me' preserves the theological force without importing a more interpretive paraphrase
    such as 'repent.'
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the LXX pattern.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH → the LORD'
