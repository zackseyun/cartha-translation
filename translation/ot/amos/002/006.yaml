theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for YHWH and aligns with established English Bible convention while signaling the covenant name through small caps styling convention.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpretation of לֹא אֲשִׁיבֶנּוּ in the Amos refrain
  chosen_reading: I will not turn it back
  alternative_readings:
  - I will not revoke it
  - I will not relent
  rationale: The Hebrew leaves the object implicit/elliptical. The chosen rendering preserves that tension rather than resolving it fully into 'punishment' or 'judgment,' while a more interpretive alternative is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
