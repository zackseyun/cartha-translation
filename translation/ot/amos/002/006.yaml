id: AMO.2.6
reference: Amos 2:6
source:
  edition: WLC
  text: כֹּ֚ה אָמַ֣ר יְהוָ֔ה עַל שְׁלֹשָׁה֙ פִּשְׁעֵ֣י יִשְׂרָאֵ֔ל וְ/עַל אַרְבָּעָ֖ה לֹ֣א אֲשִׁיבֶ֑/נּוּ עַל מִכְרָ֤/ם בַּ/כֶּ֨סֶף֙ צַדִּ֔יק וְ/אֶבְי֖וֹן בַּ/עֲב֥וּר נַעֲלָֽיִם־־־׃
translation:
  text: 'Thus says Yahweh: “For three transgressions of Israel, and for four, I will not revoke the punishment, because they sell the righteous for silver, and the needy for a pair of sandals.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I will not revoke it,” that is, I will not reverse the announced judgment.
    reason: alternative_reading
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  - Thus said the LORD
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. יְהוָה is rendered 'the LORD' per doctrine default for the divine name.
- source_word: עַל שְׁלֹשָׁה פִּשְׁעֵי ... וְעַל אַרְבָּעָה
  chosen: For three transgressions ... and for four
  alternatives:
  - Because of three transgressions ... and because of four
  - For three crimes ... even for four
  lexicon: HALOT
  rationale: Preserves the idiomatic numerical escalation formula used throughout Amos. 'Transgressions' keeps the covenantal/moral force of פֶּשַׁע better than the more generic 'crimes'.
- source_word: לֹא אֲשִׁיבֶנּוּ
  chosen: I will not turn it back
  alternatives:
  - I will not revoke it
  - I will not relent
  - I will not reverse it
  lexicon: HALOT
  rationale: The object suffix is masculine singular and elliptical; the phrase likely means YHWH will not turn back the announced judgment. 'Turn it back' stays close to the Hebrew while remaining intelligible. A smoother interpretive alternative is preserved in a footnote.
- source_word: מִכְרָם
  chosen: because they sell
  alternatives:
  - because of their selling
  - because they have sold
  lexicon: HALOT
  rationale: The infinitive construct with suffix after עַל gives the ground of judgment. Rendering as a finite clause in English is natural and preserves the causal sense.
- source_word: בַּכֶּסֶף
  chosen: for silver
  alternatives:
  - for money
  lexicon: HALOT
  rationale: '''Silver'' is the literal term and may imply payment value rather than generic currency; it should be retained unless context demands abstraction.'
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - the innocent
  - the just
  lexicon: HALOT
  rationale: צַדִּיק can denote one who is righteous or in the right. 'The righteous' preserves the lexical link to righteousness language and fits the social-judicial context.
- source_word: אֶבְיוֹן
  chosen: the needy
  alternatives:
  - the poor
  lexicon: HALOT
  rationale: אֶבְיוֹן emphasizes the destitute or needy. 'The needy' is slightly more precise than 'the poor' here, while still natural English.
- source_word: בַּעֲבוּר נַעֲלָיִם
  chosen: for a pair of sandals
  alternatives:
  - for sandals
  - for the sake of sandals
  lexicon: HALOT
  rationale: The phrase conveys exchange for something trivial and degrading. 'A pair of sandals' is idiomatic English and reflects the dual form of נַעֲלַיִם.
