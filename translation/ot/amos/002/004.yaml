id: AMO.2.4
reference: Amos 2:4
source:
  edition: WLC
  text: כֹּ֚ה אָמַ֣ר יְהוָ֔ה עַל שְׁלֹשָׁה֙ פִּשְׁעֵ֣י יְהוּדָ֔ה וְ/עַל אַרְבָּעָ֖ה לֹ֣א אֲשִׁיבֶ֑/נּוּ עַֽל מָאֳסָ֞/ם אֶת תּוֹרַ֣ת יְהוָ֗ה וְ/חֻקָּי/ו֙ לֹ֣א שָׁמָ֔רוּ וַ/יַּתְעוּ/ם֙ כִּזְבֵי/הֶ֔ם אֲשֶׁר הָלְכ֥וּ אֲבוֹתָ֖/ם אַחֲרֵי/הֶֽם־־־־־׃
translation:
  text: 'Thus says Yahweh: “For three transgressions of Judah, and for four, I will not turn it back, because they have rejected the law of Yahweh and have not kept his statutes; and their lies have led them astray, after which their fathers walked.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will not revoke it,' that is, the announced judgment or punishment.
    reason: lexical_alternative
  - marker: b
    text: '''The law of the LORD'' may also be rendered ''the instruction of the LORD.'''
    reason: lexical_alternative
  - marker: c
    text: '''Their lies'' may refer more specifically to false gods or idols—deceptive objects of worship followed by their ancestors.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: פִּשְׁעֵי
  chosen: transgressions
  alternatives:
  - rebellions
  - crimes
  lexicon: HALOT
  rationale: '''Transgressions'' preserves the covenantal and moral sense of serious offenses without over-specifying political rebellion. It fits Amos''s repeated formula.'
- source_word: לֹא אֲשִׁיבֶנּוּ
  chosen: I will not turn it back
  alternatives:
  - I will not revoke it
  - I will not relent
  - I will not turn away its punishment
  lexicon: HALOT
  rationale: The idiom with שוב in this recurring Amos formula is somewhat elliptical. 'I will not turn it back' preserves the Hebrew image and ambiguity better than interpretive expansions. The object suffix likely refers to the announced judgment/sentence rather than Judah itself.
- source_word: מָאֳסָם
  chosen: they have rejected
  alternatives:
  - they have despised
  - they have spurned
  lexicon: HALOT
  rationale: '''Rejected'' is clear modern English and adequately conveys covenantal repudiation of YHWH''s instruction.'
- source_word: תּוֹרַת יְהוָה
  chosen: the law of the LORD
  alternatives:
  - the instruction of the LORD
  - the Torah of the LORD
  lexicon: HALOT
  rationale: תּוֹרָה can mean 'instruction,' but in this prophetic covenant context 'law' is the most natural and recognizable rendering in English. 'Instruction' is a viable lexical alternative and is preserved in a footnote.
- source_word: חֻקָּיו
  chosen: his statutes
  alternatives:
  - his decrees
  - his ordinances
  lexicon: HALOT
  rationale: '''Statutes'' is a standard and suitably formal rendering for חֻקִּים in covenantal/legal contexts, while remaining readable.'
- source_word: שָׁמָרוּ
  chosen: have not kept
  alternatives:
  - have not observed
  - have not guarded
  lexicon: HALOT
  rationale: '''Kept'' is idiomatic English for covenant obedience and reflects the common legal sense of שמר in this context.'
- source_word: וַיַּתְעוּם
  chosen: have led them astray
  alternatives:
  - caused them to wander
  - made them err
  lexicon: HALOT
  rationale: The verb תעה in the causative sense indicates being misled. 'Have led them astray' is natural English and preserves the moral-religious force.
- source_word: כִּזְבֵיהֶם
  chosen: their lies
  alternatives:
  - their falsehoods
  - their idols
  lexicon: HALOT
  rationale: The noun literally means 'lies/falsehoods.' In prophetic usage it may refer metonymically to false gods or deceptive idolatries, but the Hebrew term itself is broader. The main text keeps the literal rendering, with the idol-related sense preserved in a footnote.
- source_word: אֲשֶׁר הָלְכוּ אֲבוֹתָם אַחֲרֵיהֶם
  chosen: after which their fathers walked
  alternatives:
  - which their fathers followed
  - after them their fathers went
  lexicon: HALOT
  rationale: This relative clause most naturally refers back to 'their lies,' using the common idiom 'walk after' for following false gods/practices. 'After which their fathers walked' preserves the Hebrew linkage and imagery.
