theological_decisions:
- issue: Meaning of Amos's judgment formula לֹא אֲשִׁיבֶנּוּ
  chosen_reading: Retain the idiomatic ambiguity as 'I will not turn it back' rather than specifying 'punishment' or 'wrath.'
  alternative_readings:
  - I will not revoke the punishment
  - I will not relent
  - I will not turn away from punishing
  rationale: The Hebrew formula is intentionally terse and repeated throughout Amos. Expanding it to 'punishment' interprets the object of the suffix. Preserving the ambiguity better fits the translation philosophy of not resolving what the source leaves implicit.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Referent of כִּזְבֵיהֶם
  chosen_reading: Render literally as 'their lies' in the main text.
  alternative_readings:
  - their false gods
  - their idols
  rationale: Although prophetic literature can use 'lies' for idols or deceptive idolatries, the Hebrew here does not explicitly say 'idols.' The literal rendering preserves the text's rhetorical force while allowing the likely cultic implication to be noted in a footnote.
  doctrine_reference: 'Translation philosophy §1 and §3: original-language primacy; preserve ambiguity where genuine.'
