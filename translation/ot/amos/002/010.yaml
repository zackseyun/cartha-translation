id: AMO.2.10
reference: Amos 2:10
source:
  edition: WLC
  text: וְ/אָנֹכִ֛י הֶעֱלֵ֥יתִי אֶתְ/כֶ֖ם מֵ/אֶ֣רֶץ מִצְרָ֑יִם וָ/אוֹלֵ֨ךְ אֶתְ/כֶ֤ם
    בַּ/מִּדְבָּר֙ אַרְבָּעִ֣ים שָׁנָ֔ה לָ/רֶ֖שֶׁת אֶת אֶ֥רֶץ הָ/אֱמֹרִֽי־׃
translation:
  text: Yet I brought you up from the land of Egypt, and I led you in the wilderness
    forty years, to take possession of the land of the Amorite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the land of the Amorites.' The Hebrew uses the singular 'Amorite' as
      a collective term.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָנֹכִי
  chosen: Yet I
  alternatives:
  - And I
  - But I
  lexicon: HALOT
  rationale: The conjunction with the independent pronoun is emphatic and contrastive
    in context, following the accusations against Israel. 'Yet I' captures both the
    connective force and the rhetorical emphasis better than a bare 'And I.'
- source_word: הֶעֱלֵיתִי
  chosen: brought ... up
  alternatives:
  - brought out
  - caused to go up
  lexicon: HALOT
  rationale: The Hiphil of עלה commonly refers to bringing Israel up from Egypt. 'Brought
    you up' preserves the conventional exodus idiom and the directional nuance better
    than the flatter 'brought out.'
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of Egypt
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'land,' so the translation retains it
    for formal accuracy while remaining natural English.
- source_word: וָאוֹלֵךְ
  chosen: I led
  alternatives:
  - I made walk
  - I caused to go
  lexicon: HALOT
  rationale: The Hiphil wayyiqtol of הלך with direct object means causing someone
    to go or leading them. 'I led' is idiomatic English and accurately conveys divine
    guidance through the wilderness.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - through the wilderness
  - in the desert
  lexicon: HALOT
  rationale: '''Wilderness'' is the standard rendering for מִדְבָּר in Israel''s exodus-wandering
    context. ''In'' follows the preposition directly; ''through'' is possible but
    slightly more interpretive.'
- source_word: אַרְבָּעִים שָׁנָה
  chosen: forty years
  lexicon: HALOT
  rationale: Straightforward numerical expression; idiomatic English uses the plural
    'years.'
- source_word: לָרֶשֶׁת
  chosen: to take possession of
  alternatives:
  - to possess
  - to inherit
  lexicon: HALOT
  rationale: The infinitive of ירשׁ can mean possess, dispossess, or inherit depending
    on context. Here, with the land as object and in conquest-settlement context,
    'to take possession of' best captures the active sense without overloading the
    term with later inheritance theology.
- source_word: אֶרֶץ הָאֱמֹרִי
  chosen: the land of the Amorite
  alternatives:
  - the land of the Amorites
  lexicon: HALOT
  rationale: The Hebrew noun is singular. Retaining 'the Amorite' reflects the source
    form and matches biblical usage where 'the Amorite' can stand collectively for
    the inhabitants or for the pre-Israelite population of the land.
