theological_decisions:
- issue: Collective singular in 'the Amorite'
  chosen_reading: 'Retain the singular collective: ''the land of the Amorite'''
  alternative_readings:
  - the land of the Amorites
  rationale: The verse recalls God's historical acts in the exodus and conquest. Rendering
    the singular collectively preserves the Hebrew wording and avoids unnecessary
    interpretive smoothing. No doctrinal issue is created, but the choice affects
    how closely the English mirrors the prophetic diction.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
