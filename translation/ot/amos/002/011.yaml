id: AMO.2.11
reference: Amos 2:11
source:
  edition: WLC
  text: וָ/אָקִ֤ים מִ/בְּנֵי/כֶם֙ לִ/נְבִיאִ֔ים וּ/מִ/בַּחוּרֵי/כֶ֖ם לִ/נְזִרִ֑ים הַ/אַ֥ף אֵֽין זֹ֛את בְּנֵ֥י יִשְׂרָאֵ֖ל נְאֻם יְהוָֽה־־׃
translation:
  text: And I raised up some of your sons to be prophets, and some of your young men to be Nazirites. Is this not so, O sons of Israel? declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'children of Israel' or 'people of Israel.' The Hebrew is literally 'sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: '''Nazirites'' refers to those specially consecrated to God under a Nazirite vow; alternatively, ''consecrated ones.'''
    reason: cultural_note
lexical_decisions:
- source_word: וָאָקִים
  chosen: And I raised up
  alternatives:
  - And I caused to arise
  - And I established
  lexicon: HALOT
  rationale: Hiphil of קום commonly means to raise up or cause to arise. 'Raised up' is idiomatic English and fits the context of God appointing leaders from among Israel.
- source_word: מִבְּנֵיכֶם
  chosen: some of your sons
  alternatives:
  - from your sons
  - some of your children
  lexicon: HALOT
  rationale: Literally 'from your sons.' 'Some of your sons' makes the partitive sense explicit in natural English. 'Sons' is retained rather than gender-neutralizing, in keeping with the gender-accurate policy and because the Hebrew is specifically male here.
- source_word: לִנְבִיאִים
  chosen: to be prophets
  alternatives:
  - as prophets
  - for prophets
  lexicon: HALOT
  rationale: The lamed marks result or role. 'To be prophets' communicates appointment into that role in clear English.
- source_word: וּמִבַּחוּרֵיכֶם
  chosen: and some of your young men
  alternatives:
  - and from your chosen men
  - and some of your youths
  lexicon: HALOT
  rationale: בָּחוּר in context refers to young men in the prime of life, not 'chosen ones.' 'Some of your young men' preserves the partitive sense parallel to 'some of your sons.'
- source_word: לִנְזִרִים
  chosen: to be Nazirites
  alternatives:
  - as Nazirites
  - to be consecrated ones
  lexicon: HALOT
  rationale: נָזִיר is a specific consecrated status in Israel, best preserved by the established transliteration 'Nazirite' rather than flattened to a generic description.
- source_word: הַאַף אֵין זֹאת
  chosen: Is this not so
  alternatives:
  - Is it not indeed so
  - Has this not happened
  lexicon: HALOT
  rationale: This combination introduces a rhetorical question expecting agreement. 'Is this not so' is concise and natural, capturing the force without overtranslating.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: sons of Israel
  alternatives:
  - people of Israel
  - children of Israel
  lexicon: HALOT
  rationale: The vocative is literally 'sons of Israel.' This is retained for gender-accurate fidelity and because it functions as a covenantal address to the nation descended from Israel. More idiomatic alternatives are possible but less formally transparent.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This standard prophetic formula is well rendered as 'declares the LORD.' For יְהוָה, the doctrinal default is 'the LORD,' not 'Yahweh.'
