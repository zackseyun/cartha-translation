theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to translate נְזִרִים descriptively or as a technical term
  chosen_reading: Nazirites
  alternative_readings:
  - consecrated ones
  - those under a Nazirite vow
  rationale: The Hebrew refers to a recognized consecrated class within Israel, not merely a general description of holiness. Transliteration preserves the specific institution without importing extra explanation into the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Whether to retain the male-marked covenantal address בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - children of Israel
  - people of Israel
  rationale: The Hebrew is grammatically masculine plural and here functions as a direct covenantal address. Per the gender-accurate policy, the male-marked form is retained rather than neutralized, while the national reference remains clear from context.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
