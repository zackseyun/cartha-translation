theological_decisions:
- issue: Collective singular imagery for the Amorite
  chosen_reading: Retain singular pronouns ('the Amorite ... he ... his') as a collective
    personification of the people.
  alternative_readings:
  - Pluralize throughout for smoother English ('the Amorites ... they ... their')
  rationale: The Hebrew uses singular forms, likely personifying the Amorite as a
    representative collective enemy. Preserving the singular maintains the vivid rhetoric
    and the literary metaphor of a single great tree being cut down.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
