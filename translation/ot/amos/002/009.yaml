id: AMO.2.9
reference: Amos 2:9
source:
  edition: WLC
  text: וְ/אָ֨נֹכִ֜י הִשְׁמַ֤דְתִּי אֶת הָֽ/אֱמֹרִי֙ מִ/פְּנֵי/הֶ֔ם אֲשֶׁ֨ר כְּ/גֹ֤בַהּ
    אֲרָזִים֙ גָּבְה֔/וֹ וְ/חָסֹ֥ן ה֖וּא כָּֽ/אַלּוֹנִ֑ים וָ/אַשְׁמִ֤יד פִּרְי/וֹ֙
    מִ/מַּ֔עַל וְ/שָׁרָשָׁ֖י/ו מִ/תָּֽחַת־׃
translation:
  text: Yet I destroyed the Amorite before them, whose height was like the height
    of cedars, and he was strong like the oaks; I destroyed his fruit above and his
    roots beneath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Amorites'; Hebrew uses the singular 'the Amorite' as a collective
      for the people.
    reason: lexical_alternative
  - marker: b
    text: '''Fruit'' and ''roots'' continue the tree imagery and imply total destruction
      from top to bottom.'
    reason: cultural_note
lexical_decisions:
- source_word: וְאָנֹכִי
  chosen: Yet I
  alternatives:
  - And I
  - But I
  lexicon: HALOT
  rationale: The conjunction plus emphatic pronoun marks contrastive emphasis in context.
    'Yet I' captures both the connective and the emphatic force more naturally than
    a bare 'And I.'
- source_word: הִשְׁמַדְתִּי
  chosen: destroyed
  alternatives:
  - annihilated
  - exterminated
  lexicon: HALOT
  rationale: The Hiphil of שׁמד conveys causing destruction or wiping out. 'Destroyed'
    is strong and idiomatic without overstating beyond the verse's imagery.
- source_word: הָאֱמֹרִי
  chosen: the Amorite
  alternatives:
  - the Amorites
  lexicon: HALOT
  rationale: The singular collective is retained as in the Hebrew. It refers to the
    Amorite people as a representative collective rather than one individual.
- source_word: מִפְּנֵיהֶם
  chosen: before them
  alternatives:
  - from before them
  - in front of them
  lexicon: HALOT
  rationale: The idiom means removal from the presence of Israel. 'Before them' is
    concise and preserves the Hebrew spatial idiom.
- source_word: אֲשֶׁר כְּגֹבַהּ אֲרָזִים גָּבְהוֹ
  chosen: whose height was like the height of cedars
  alternatives:
  - who was as tall as cedars
  - whose stature was like cedars
  lexicon: HALOT
  rationale: The Hebrew explicitly compares height to the height of cedars. This rendering
    preserves the doubled height language while remaining readable.
- source_word: וְחָסֹן הוּא כָּאַלּוֹנִים
  chosen: and he was strong like the oaks
  alternatives:
  - and he was mighty like the oaks
  - and he was sturdy like the terebinths
  lexicon: HALOT
  rationale: חָסֹן denotes strength or robustness. 'Strong' is clear and natural.
    אַלּוֹנִים is commonly rendered 'oaks'; 'terebinths' is possible in some contexts
    but less likely here and less accessible.
- source_word: וָאַשְׁמִיד
  chosen: I destroyed
  alternatives:
  - I wiped out
  - I annihilated
  lexicon: HALOT
  rationale: Repeats the destruction verb for rhetorical force; keeping 'destroyed'
    preserves the parallelism and consistency with the earlier verb.
- source_word: פִּרְיוֹ מִמַּעַל
  chosen: his fruit above
  alternatives:
  - his fruit from above
  - his offspring above
  lexicon: HALOT
  rationale: The arboreal metaphor continues. 'Fruit' should be retained rather than
    interpreted as 'offspring' in the main text, since the image is explicit; the
    metaphorical sense can be noted in a footnote.
- source_word: וְשָׁרָשָׁיו מִתָּחַת
  chosen: and his roots beneath
  alternatives:
  - and his roots from beneath
  lexicon: HALOT
  rationale: This completes the total-destruction tree metaphor. 'Beneath' is the
    natural counterpart to 'above' and preserves the imagery.
