id: AMO.2.12
reference: Amos 2:12
source:
  edition: WLC
  text: וַ/תַּשְׁק֥וּ אֶת הַ/נְּזִרִ֖ים יָ֑יִן וְ/עַל הַ/נְּבִיאִים֙ צִוִּיתֶ֣ם לֵ/אמֹ֔ר
    לֹ֖א תִּנָּבְאֽוּ־־׃
translation:
  text: But you made the Nazirites drink wine, and you commanded the prophets, saying,
    ‘You must not prophesy.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the consecrated ones.' Hebrew 'Nazirites' refers to those under a special
      vow of consecration, which included abstaining from wine.
    reason: lexical_alternative
  - marker: b
    text: Or 'Do not prophesy' / 'You shall not prophesy.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַתַּשְׁקוּ
  chosen: you made ... drink
  alternatives:
  - you gave ... to drink
  - you caused ... to drink
  lexicon: HALOT
  rationale: The Hiphil form of שׁקה is causative, so 'made ... drink' best captures
    the force in natural English. It also fits the accusative object plus 'wine' construction.
- source_word: הַנְּזִרִים
  chosen: the Nazirites
  alternatives:
  - the consecrated ones
  - the Nazirite-vowed men
  lexicon: HALOT
  rationale: '''Nazirites'' preserves the specific covenantal category of those under
    a Nazirite vow rather than flattening it to a generic description. As a culturally
    specific term, transliteration is preferable, with meaning inferable from context.'
- source_word: יָיִן
  chosen: wine
  lexicon: HALOT
  rationale: Standard rendering of יין. Here it is significant because giving wine
    to Nazirites violates their consecrated abstinence.
- source_word: וְעַל
  chosen: and
  alternatives:
  - and against
  - and concerning
  lexicon: HALOT
  rationale: With צוה in this construction, על introduces the persons over whom the
    command is imposed. In idiomatic English, 'and you commanded the prophets' communicates
    the sense better than a more wooden 'upon the prophets.'
- source_word: הַנְּבִיאִים
  chosen: the prophets
  lexicon: HALOT
  rationale: Standard rendering; these are YHWH's prophetic spokesmen in context.
- source_word: צִוִּיתֶם
  chosen: you commanded
  alternatives:
  - you ordered
  - you charged
  lexicon: HALOT
  rationale: '''Commanded'' is the most direct and semantically central rendering
    of צוה, preserving the force of imposed prohibition.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - by saying
  - with the words
  lexicon: HALOT
  rationale: Conventional and clear rendering of the infinitive introducing direct
    speech.
- source_word: לֹא תִּנָּבְאוּ
  chosen: You must not prophesy
  alternatives:
  - Do not prophesy
  - You shall not prophesy
  lexicon: HALOT
  rationale: The imperfect under negation here reports the content of the people's
    prohibition to the prophets. 'You must not prophesy' conveys the force of a commanded
    ban in contemporary English better than the more ambiguous simple imperative,
    while avoiding archaic 'shall not.'
