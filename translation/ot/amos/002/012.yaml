theological_decisions:
- issue: Rendering נזירים in a way that preserves the covenantal and moral force of
    Israel's offense
  chosen_reading: Nazirites
  alternative_readings:
  - consecrated ones
  rationale: The verse condemns Israel for corrupting persons specially set apart
    to God. Using the technical term 'Nazirites' preserves that theological and cultural
    specificity better than a generalized paraphrase.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English without flattening theological weight.'
