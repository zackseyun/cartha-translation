theological_decisions:
- issue: Nature of the announced fire
  chosen_reading: Render as a direct divine judgment image without specifying whether
    the fire is strictly literal, metaphorical, or mediated through military invasion.
  alternative_readings:
  - Literal conflagration
  - Metaphor for invading judgment
  rationale: The prophetic formula states that the LORD will send fire and that it
    will devour Jerusalem's citadels. The verse clearly communicates divine judgment,
    but it does not itself force a narrower explanation of the mechanism. The translation
    preserves that prophetic tension rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
