id: AMO.2.5
reference: Amos 2:5
source:
  edition: WLC
  text: וְ/שִׁלַּ֥חְתִּי אֵ֖שׁ בִּֽ/יהוּדָ֑ה וְ/אָכְלָ֖ה אַרְמְנ֥וֹת יְרוּשָׁלִָֽם׃פ
translation:
  text: So I will send fire upon Judah, and it will devour the citadels of Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'palaces' or 'strongholds' for 'citadels.' The Hebrew term can refer
      to fortified palatial buildings.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁלַּחְתִּי
  chosen: So I will send
  alternatives:
  - And I will send
  - But I will send
  lexicon: HALOT
  rationale: The verb שׁלח in the Hiphil commonly means 'send.' The prefixed conjunction
    links this judgment statement to the preceding oracle; 'So' captures the consequential
    force in readable English, while preserving the first-person future sense.
- source_word: אֵשׁ
  chosen: fire
  lexicon: HALOT
  rationale: אשׁ is straightforwardly 'fire.' In prophetic judgment contexts it can
    function both literally and as an image of destructive judgment; the text itself
    does not require specifying beyond 'fire.'
- source_word: בִּיהוּדָה
  chosen: upon Judah
  alternatives:
  - in Judah
  - against Judah
  lexicon: HALOT
  rationale: The preposition ב can be rendered in several ways depending on context.
    In judgment formulas with 'send fire,' English idiom prefers 'upon' to express
    hostile direction without overinterpreting. 'Against' is possible but slightly
    more interpretive; 'in' is more literal but less natural here.
- source_word: וְאָכְלָה
  chosen: and it will devour
  alternatives:
  - and it will consume
  - and it will eat up
  lexicon: HALOT
  rationale: אכל literally means 'eat,' but with fire as subject it idiomatically
    means 'devour' or 'consume.' 'Devour' preserves the vivid metaphor and reads naturally
    in English.
- source_word: אַרְמְנוֹת
  chosen: the citadels
  alternatives:
  - the palaces
  - the strongholds
  lexicon: HALOT
  rationale: ארמנות can denote fortified palatial structures or strongholds. 'Citadels'
    captures both the elite/royal and fortified sense in this judgment context. 'Palaces'
    is traditional and possible, but may underplay the defensive nuance; 'strongholds'
    may underplay the palatial aspect.
- source_word: יְרוּשָׁלִָם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
