id: AMO.2.13
reference: Amos 2:13
source:
  edition: WLC
  text: הִנֵּ֛ה אָנֹכִ֥י מֵעִ֖יק תַּחְתֵּי/כֶ֑ם כַּ/אֲשֶׁ֤ר תָּעִיק֙ הָ/עֲגָלָ֔ה הַֽ/מְלֵאָ֥ה
    לָ֖/הּ עָמִֽיר׃
translation:
  text: Look, I am pressing down beneath you, as a cart presses down when it is full
    of sheaves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I am weighing you down,' or 'I will press down beneath you.' The Hebrew
      verb can be understood as pressure/weight, and the verbal form allows either
      a present vivid announcement or imminent future sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'I am pressing down beneath you'.
    reason: previous_rendering
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces an emphatic announcement. 'Look' preserves the deictic force
    in readable modern English better than the more archaic 'Behold.'
- source_word: אָנֹכִי
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis to the first person subject. English
    can convey this sufficiently with normal subject position after 'Look'; 'I myself'
    would be possible but sounds heavier than the context requires.
- source_word: מֵעִיק
  chosen: am pressing down
  alternatives:
  - am weighing down
  - am causing to totter
  - will press down
  lexicon: HALOT
  rationale: From עוּק/עיק in the Hiphil, conveying pressure or compression. 'Am pressing
    down' matches the simile of a heavily loaded cart in the second colon and preserves
    the participial/imperfective sense better than a simple future. 'Causing to totter'
    reflects an interpretive extension found in some versions but is less directly
    tied to the cart image.
- source_word: תַּחְתֵּיכֶם
  chosen: beneath you
  alternatives:
  - under you
  - in your place
  lexicon: HALOT
  rationale: The spatial sense 'beneath/under you' best fits the image of pressure
    from below. 'Beneath you' is slightly more natural in English with 'pressing down.'
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - like when
  lexicon: HALOT
  rationale: Introduces the comparison succinctly. 'As' is sufficient and natural.
- source_word: תָּעִיק
  chosen: presses down
  alternatives:
  - weighs down
  - creaks under the weight
  lexicon: HALOT
  rationale: Uses the same English verb as מֵעִיק to preserve the Hebrew repetition
    and the force of the simile.
- source_word: הָעֲגָלָה
  chosen: a cart
  alternatives:
  - the cart
  - wagon
  lexicon: HALOT
  rationale: Although marked with the article, English generic comparison idiomatically
    uses 'a cart.' 'Wagon' is possible but 'cart' is the more direct equivalent.
- source_word: הַמְלֵאָה לָהּ
  chosen: when it is full
  alternatives:
  - loaded up
  - filled for itself
  - fully loaded
  lexicon: HALOT
  rationale: Expresses the state of the cart in idiomatic English. The dative pronoun
    לָהּ is retained in sense rather than woodenly represented; 'when it is full'
    communicates the condition naturally.
- source_word: עָמִיר
  chosen: sheaves
  alternatives:
  - grain sheaves
  - cut grain
  lexicon: HALOT
  rationale: Refers to gathered stalks/bundles of grain. 'Sheaves' is the standard
    and sufficiently clear rendering in this agricultural image.
