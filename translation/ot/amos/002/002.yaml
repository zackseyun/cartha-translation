id: AMO.2.2
reference: Amos 2:2
source:
  edition: WLC
  text: וְ/שִׁלַּחְתִּי אֵ֣שׁ בְּ/מוֹאָ֔ב וְ/אָכְלָ֖ה אַרְמְנ֣וֹת הַ/קְּרִיּ֑וֹת וּ/מֵ֤ת
    בְּ/שָׁאוֹן֙ מוֹאָ֔ב בִּ/תְרוּעָ֖ה בְּ/ק֥וֹל שׁוֹפָֽר־׃
translation:
  text: So I will send fire upon Moab, and it will consume the citadels of Kerioth;
    and Moab will die amid tumult, amid shouting, amid the sound of a trumpet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the palaces of Kerioth' or 'the strongholds of Kerioth.'
    reason: lexical_alternative
  - marker: b
    text: Kerioth may also be understood as 'the cities,' though it is likely a place-name
      here.
    reason: alternative_reading
  - marker: c
    text: '''Shouting'' may also be rendered ''a battle cry.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁלַּחְתִּי
  chosen: So I will send
  alternatives:
  - And I will send
  lexicon: HALOT
  rationale: First-person singular with prefixed conjunction. 'So' fits the prophetic
    judgment sequence in English while preserving the connective force; 'I will send'
    keeps the direct divine agency.
- source_word: אֵשׁ
  chosen: fire
  lexicon: HALOT
  rationale: Standard literal rendering in prophetic judgment contexts; likely denotes
    destructive warfare/judgment imagery without needing paraphrase.
- source_word: בְּמוֹאָב
  chosen: upon Moab
  alternatives:
  - against Moab
  - in Moab
  lexicon: HALOT
  rationale: The preposition ב can be rendered variously by context. With 'send fire,'
    English idiom favors 'upon' to express hostile judgment directed at the nation.
- source_word: וְאָכְלָה
  chosen: and it will consume
  alternatives:
  - and it will devour
  lexicon: HALOT
  rationale: Feminine singular verb agreeing with 'fire.' 'Consume' is natural modern
    English for fire's destructive effect while retaining the metaphor.
- source_word: אַרְמְנוֹת
  chosen: the citadels
  alternatives:
  - the palaces
  - the strongholds
  lexicon: HALOT
  rationale: The noun can denote fortified palatial structures. 'Citadels' preserves
    both elite and defensive connotations better than the narrower 'palaces' in this
    judgment oracle.
- source_word: הַקְּרִיּוֹת
  chosen: of Kerioth
  alternatives:
  - of the cities
  lexicon: HALOT
  rationale: Treated as the place-name Kerioth, a known Moabite locality, which fits
    the article-bearing proper noun usage in context and many translations. The common-noun
    sense 'the cities' is possible but less likely here.
- source_word: וּמֵת
  chosen: and Moab will die
  alternatives:
  - and Moab shall perish
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic sequence functions
    futurally. 'Die' is the direct lexical sense; the subject is the nation personified.
- source_word: בְּשָׁאוֹן
  chosen: amid tumult
  alternatives:
  - with tumult
  - in uproar
  lexicon: HALOT
  rationale: The noun denotes noise, uproar, or tumult. 'Amid tumult' conveys the
    setting of chaotic destruction.
- source_word: בִּתְרוּעָה
  chosen: amid shouting
  alternatives:
  - with a battle cry
  - with shouting
  lexicon: HALOT
  rationale: תְּרוּעָה can denote a shout, battle cry, or trumpet blast. Because the
    next phrase explicitly mentions the trumpet's sound, rendering this as 'shouting'
    avoids redundancy while preserving the likely war-cry sense.
- source_word: בְּקוֹל שׁוֹפָר
  chosen: amid the sound of a trumpet
  alternatives:
  - with the sound of a horn
  - at the sound of the trumpet
  lexicon: HALOT
  rationale: שׁוֹפָר is the ram's horn/trumpet used in war and assembly. 'Trumpet'
    is the clearest accessible English equivalent; 'sound of a trumpet' preserves
    the construct phrase.
