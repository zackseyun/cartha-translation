theological_decisions:
- issue: Whether אֱלֹהֵיהֶם should be rendered singular ('their god') or plural ('their
    gods')
  chosen_reading: their gods
  alternative_readings:
  - their god
  rationale: The Hebrew form is morphologically plural. While 'god' can sometimes
    function as a singular of majesty or refer to Israel's God, here the prophetic
    context condemns corrupt cultic practice at multiple altars, so 'their gods' best
    preserves the polemical force without importing a harmonizing singular.
  doctrine_reference: Translation philosophy §1, §3, §5
