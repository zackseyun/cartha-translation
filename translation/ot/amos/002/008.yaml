id: AMO.2.8
reference: Amos 2:8
source:
  edition: WLC
  text: וְ/עַל בְּגָדִ֤ים חֲבֻלִים֙ יַטּ֔וּ אֵ֖צֶל כָּל מִזְבֵּ֑חַ וְ/יֵ֤ין עֲנוּשִׁים֙
    יִשְׁתּ֔וּ בֵּ֖ית אֱלֹהֵי/הֶֽם־־׃
translation:
  text: And on garments taken in pledge they stretch themselves out beside every altar,
    and in the house of their gods they drink the wine of those they have fined.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on pledged garments they lie down beside every altar.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the wine of those fined' or 'the wine of the punished.'
    reason: lexical_alternative
  - marker: c
    text: 'Some translate ''in the house of their god,'' but the Hebrew form is plural:
      ''their gods.'''
    reason: alternative_reading
lexical_decisions:
- source_word: בְּגָדִים
  chosen: garments
  alternatives:
  - clothes
  - cloaks
  lexicon: HALOT
  rationale: Generic term for articles of clothing. 'Garments' is natural English
    and broad enough to avoid over-specifying a particular item, while fitting the
    legal context of pledged clothing.
- source_word: חֲבֻלִים
  chosen: taken in pledge
  alternatives:
  - pledged
  - seized as collateral
  lexicon: HALOT
  rationale: Passive participle from חבל in the sense of taking a pledge. 'Taken in
    pledge' makes the legal/economic force explicit and reflects the likely allusion
    to garments held as security contrary to covenantal ethics.
- source_word: יַטּוּ
  chosen: they stretch themselves out
  alternatives:
  - they lie down
  - they recline
  lexicon: HALOT
  rationale: The Hiphil here conveys stretching out or sprawling. 'Stretch themselves
    out' preserves the physical image and the moral tone of indulgent misuse better
    than the flatter 'lie down.'
- source_word: אֵצֶל
  chosen: beside
  alternatives:
  - near
  - by
  lexicon: HALOT
  rationale: A straightforward spatial preposition. 'Beside' is idiomatic and precise
    in context.
- source_word: כָּל מִזְבֵּחַ
  chosen: every altar
  alternatives:
  - each altar
  lexicon: HALOT
  rationale: Retains the distributive force of כָּל with singular noun and preserves
    the prophetic accusation of widespread cultic abuse.
- source_word: יֵין
  chosen: wine
  lexicon: HALOT
  rationale: Standard rendering.
- source_word: עֲנוּשִׁים
  chosen: of those they have fined
  alternatives:
  - bought with fines
  - of the punished
  - of those penalized
  lexicon: HALOT
  rationale: 'From ענשׁ, relating to monetary penalty or fine. The construct with
    ''wine'' is best represented by making explicit the people from whom the wine
    came: wine obtained through unjust fines. This avoids the less natural literalism
    ''wine of the fined'' while preserving the source relation.'
- source_word: יִשְׁתּוּ
  chosen: they drink
  lexicon: HALOT
  rationale: Simple imperfect with habitual force in context.
- source_word: בֵּית אֱלֹהֵיהֶם
  chosen: in the house of their gods
  alternatives:
  - in the house of their god
  lexicon: HALOT
  rationale: The plural form with 3mp suffix is most naturally rendered 'their gods.'
    In Amos this suits the denunciation of illegitimate worship sites and avoids smoothing
    the text toward monotheistic language not explicitly used here.
