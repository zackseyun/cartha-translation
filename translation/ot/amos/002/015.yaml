id: AMO.2.15
reference: Amos 2:15
source:
  edition: WLC
  text: וְ/תֹפֵ֤שׂ הַ/קֶּ֨שֶׁת֙ לֹ֣א יַעֲמֹ֔ד וְ/קַ֥ל בְּ/רַגְלָ֖י/ו לֹ֣א יְמַלֵּ֑ט
    וְ/רֹכֵ֣ב הַ/סּ֔וּס לֹ֥א יְמַלֵּ֖ט נַפְשֽׁ/וֹ׃
translation:
  text: And the one who grasps the bow will not stand, and the swift of foot will
    not escape, and the rider of the horse will not save his life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the archer will not stand' / 'the bowman will not stand.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will not hold his ground.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the horseman will not save his life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תֹפֵשׂ הַקֶּשֶׁת
  chosen: the one who grasps the bow
  alternatives:
  - the archer
  - the bowman
  - the one who handles the bow
  lexicon: HALOT
  rationale: Literally 'the one grasping the bow.' This participial expression denotes
    a bow-user, likely an archer, but the more transparent rendering preserves the
    Hebrew imagery and avoids over-specifying beyond the text.
- source_word: לֹא יַעֲמֹד
  chosen: will not stand
  alternatives:
  - will not hold his ground
  - will not stand firm
  lexicon: HALOT
  rationale: The verb עמד is literally 'stand.' In this military-judgment context
    it implies inability to hold position, but 'will not stand' preserves the Hebrew
    wording while allowing the contextual force to be heard.
- source_word: קַל בְּרַגְלָיו
  chosen: the swift of foot
  alternatives:
  - the swift-footed man
  - the one swift on his feet
  lexicon: HALOT
  rationale: A concise idiomatic rendering of the Hebrew adjective plus phrase, preserving
    the sense of speed in running. 'Swift of foot' is natural English and close to
    the source.
- source_word: יְמַלֵּט
  chosen: will not escape
  alternatives:
  - will not get away
  - will not deliver himself
  lexicon: HALOT
  rationale: In the second clause the verb carries the sense of escaping danger. 'Escape'
    is the most natural English equivalent in context.
- source_word: רֹכֵב הַסּוּס
  chosen: the rider of the horse
  alternatives:
  - the horseman
  - the one riding the horse
  lexicon: HALOT
  rationale: 'The Hebrew is singular and explicit: ''rider of the horse.'' This rendering
    stays close to the form of the text; ''horseman'' is possible but slightly more
    idiomatic than the source wording.'
- source_word: יְמַלֵּט נַפְשׁוֹ
  chosen: will not save his life
  alternatives:
  - will not escape with his life
  - will not deliver himself
  lexicon: HALOT
  rationale: With נֶפֶשׁ in this context, the sense is preserving one's life. 'Save
    his life' communicates the idiom clearly in modern English while remaining faithful
    to the Hebrew.
