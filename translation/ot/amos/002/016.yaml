id: AMO.2.16
reference: Amos 2:16
source:
  edition: WLC
  text: וְ/אַמִּ֥יץ לִבּ֖/וֹ בַּ/גִּבּוֹרִ֑ים עָר֛וֹם יָנ֥וּס בַּ/יּוֹם הַ/ה֖וּא נְאֻם
    יְהוָֽה־־׃פ
translation:
  text: Even the stouthearted among the warriors will flee naked on that day,” declares
    the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Even the courageous of heart among the mighty men will flee naked on
      that day.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַמִּיץ
  chosen: stouthearted
  alternatives:
  - courageous
  - strong
  - mighty
  lexicon: HALOT
  rationale: The adjective denotes strength or boldness. In construct with 'his heart'
    it idiomatically describes one who is strong in heart, i.e., brave or resolute.
    'Stouthearted' preserves the Hebrew idiom better than the flatter 'courageous'
    while remaining readable.
- source_word: לִבּוֹ
  chosen: hearted
  alternatives:
  - of heart
  - in heart
  lexicon: HALOT
  rationale: Literally 'his heart.' Combined with אַמִּיץ it forms an idiomatic expression,
    'strong of heart.' English compresses this naturally as 'stouthearted' rather
    than retaining a wooden possessive.
- source_word: בַּגִּבּוֹרִים
  chosen: among the warriors
  alternatives:
  - among the mighty men
  - among the heroes
  lexicon: HALOT
  rationale: גִּבּוֹרִים refers to strong fighting men or warriors in this judgment
    context. 'Among the warriors' is natural modern English and preserves the military
    sense better than the more traditional but potentially archaic 'mighty men.'
- source_word: עָרוֹם
  chosen: naked
  alternatives:
  - bare
  - stripped
  lexicon: HALOT
  rationale: The plain sense is 'naked.' In context it conveys panic and total disgrace
    in flight. 'Stripped' is interpretive; 'naked' keeps the stark force of the Hebrew.
- source_word: יָנוּס
  chosen: will flee
  alternatives:
  - will run away
  - will escape
  lexicon: HALOT
  rationale: The verb means to flee. 'Will flee' is the most direct and idiomatic
    rendering in a judgment oracle.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Standard temporal expression in prophetic literature. 'On that day' is
    idiomatic modern English while preserving the prophetic formula.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: A common prophetic messenger formula. 'Declares the LORD' is established,
    clear English that reflects the solemnity of נְאֻם without sounding overly technical.
    Per doctrine, יְהוָה is rendered 'the LORD'.
