id: AMO.2.1
reference: Amos 2:1
source:
  edition: WLC
  text: כֹּ֚ה אָמַ֣ר יְהוָ֔ה עַל שְׁלֹשָׁה֙ פִּשְׁעֵ֣י מוֹאָ֔ב וְ/עַל אַרְבָּעָ֖ה
    לֹ֣א אֲשִׁיבֶ֑/נּוּ עַל שָׂרְפ֛/וֹ עַצְמ֥וֹת מֶֽלֶךְ אֱד֖וֹם לַ/שִּֽׂיד־־־־׃
translation:
  text: 'Thus says the LORD: “For three transgressions of Moab, and for four, I will
    not revoke it, because he burned the bones of the king of Edom to lime.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will not turn it back,' that is, I will not reverse the announced
      judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'into lime' or 'to plaster'; the Hebrew refers to burning the bones so
      thoroughly that they were reduced to lime.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  - Thus said the LORD
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. יְהוָה is rendered 'the LORD' per
    doctrine for the divine name.
- source_word: עַל שְׁלֹשָׁה פִּשְׁעֵי מוֹאָב וְעַל אַרְבָּעָה
  chosen: For three transgressions of Moab, and for four
  alternatives:
  - Because of three transgressions of Moab, even four
  - For three crimes of Moab, and for four
  lexicon: HALOT
  rationale: Preserves the Hebrew numerical escalation formula used in Amos. 'Transgressions'
    keeps the moral/rebellious sense of פֶּשַׁע better than the more generic 'crimes.'
- source_word: לֹא אֲשִׁיבֶנּוּ
  chosen: I will not revoke it
  alternatives:
  - I will not turn it back
  - I will not relent
  - I will not reverse it
  lexicon: HALOT
  rationale: The idiom literally means 'I will not turn it back.' In Amos this refers
    to not reversing the announced judgment/sentence. 'Revoke it' communicates that
    sense in natural English while staying close to the idiom. The object suffix is
    retained with 'it' rather than paraphrasing as 'my judgment'.
- source_word: עַל שָׂרְפוֹ
  chosen: because he burned
  alternatives:
  - because they burned
  - on account of his burning
  lexicon: HALOT
  rationale: 'The preposition עַל here introduces the ground for judgment: ''because/on
    account of.'' The suffix on the infinitive is morphologically singular, so ''he
    burned'' is retained, likely representing Moab corporately/personified.'
- source_word: עַצְמוֹת מֶלֶךְ אֱדוֹם
  chosen: the bones of the king of Edom
  alternatives:
  - the bones of Edom's king
  lexicon: HALOT
  rationale: Straightforward construct chain; formal rendering preserves the object
    of desecration clearly.
- source_word: לַשִּׂיד
  chosen: to lime
  alternatives:
  - to plaster
  - into lime
  - to ashes
  lexicon: HALOT
  rationale: שִׂיד denotes lime/plaster, not merely ashes. The sense is that the bones
    were burned until reduced for lime, an act of extreme desecration. 'To lime' is
    concise and close to the Hebrew construction.
