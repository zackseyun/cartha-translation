id: AMO.2.14
reference: Amos 2:14
source:
  edition: WLC
  text: וְ/אָבַ֤ד מָנוֹס֙ מִ/קָּ֔ל וְ/חָזָ֖ק לֹא יְאַמֵּ֣ץ כֹּח֑/וֹ וְ/גִבּ֖וֹר לֹא
    יְמַלֵּ֥ט נַפְשֽׁ/וֹ־־׃
translation:
  text: Flight will perish from the swift, and the strong will not strengthen his
    power, and the warrior will not save his life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Escape will vanish from the swift.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the strong will not muster his strength.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'will not save his נפש'; here the Hebrew means 'life' or 'self,'
      not specifically 'soul.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָבַד
  chosen: will perish
  alternatives:
  - will vanish
  - will be lost
  lexicon: HALOT
  rationale: 'Qal perfect with prefixed conjunction in prophetic judgment context
    functions futurally: ''will perish'' or ''will disappear.'' ''Perish'' preserves
    the force of total loss more naturally than the abstract ''be lost.'''
- source_word: מָנוֹס
  chosen: flight
  alternatives:
  - escape
  - refuge
  lexicon: HALOT
  rationale: The noun denotes a means or possibility of fleeing. 'Flight' fits the
    idiom 'flight will perish from...' and preserves the abstract sense better than
    'escape route,' while 'refuge' is too static for this context.
- source_word: מִקָּל
  chosen: from the swift
  alternatives:
  - from the fast one
  - for the swift
  lexicon: HALOT
  rationale: 'מן marks separation/source after ''perish'': the possibility of flight
    is removed from the swift person. ''The swift'' is idiomatic English for the adjective
    used substantivally.'
- source_word: חָזָק
  chosen: the strong
  alternatives:
  - the mighty
  - the strong man
  lexicon: HALOT
  rationale: Adjective used substantivally for a strong person. 'The strong' is concise
    and natural; 'mighty' could overlap too much with the following 'warrior.'
- source_word: יְאַמֵּץ
  chosen: will not strengthen
  alternatives:
  - will not muster
  - will not make firm
  lexicon: HALOT
  rationale: Piel of אמץ commonly means to make strong/strengthen. Retaining 'strengthen'
    keeps the lexical connection with כוח. Although 'muster' is smoother in English,
    it is more interpretive.
- source_word: כֹּחוֹ
  chosen: his power
  alternatives:
  - his strength
  lexicon: HALOT
  rationale: כח can mean strength, power, capacity. 'His power' avoids awkward repetition
    with 'the strong' while still conveying personal might. 'His strength' is possible
    and idiomatic, but the chosen rendering preserves lexical distinction in English.
- source_word: גִּבּוֹר
  chosen: the warrior
  alternatives:
  - the mighty man
  - the hero
  lexicon: HALOT
  rationale: In military/judgment contexts גבור often denotes a warrior or mighty
    fighter. 'Warrior' best fits the sequence of martial incapacity in the verse.
- source_word: יְמַלֵּט
  chosen: will not save
  alternatives:
  - will not deliver
  - will not escape with
  lexicon: HALOT
  rationale: Piel of מלט means to cause to escape, deliver, save. With נפשו as object,
    'save his life' is the most natural English expression.
- source_word: נַפְשׁוֹ
  chosen: his life
  alternatives:
  - himself
  - his soul
  lexicon: HALOT
  rationale: In this context נפש refers to one's life/self in the face of danger,
    not specifically the immaterial soul. 'His life' is the clearest contextual rendering.
