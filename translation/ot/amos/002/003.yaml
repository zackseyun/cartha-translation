id: AMO.2.3
reference: Amos 2:3
source:
  edition: WLC
  text: וְ/הִכְרַתִּ֥י שׁוֹפֵ֖ט מִ/קִּרְבָּ֑/הּ וְ/כָל שָׂרֶ֛י/הָ אֶהֱר֥וֹג עִמּ֖/וֹ אָמַ֥ר יְהוָֽה־׃פ
translation:
  text: And I will cut off the judge from her midst, and I will kill all her officials with him,” says Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the judge'; the Hebrew term can denote a judicial officer or, more broadly here, a governing ruler.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִכְרַתִּי
  chosen: I will cut off
  alternatives:
  - I will destroy
  - I will remove
  lexicon: HALOT
  rationale: כרת in the Hiphil commonly means to cut off, remove, or exterminate. 'Cut off' preserves the covenant-judgment idiom and the force of decisive removal better than the flatter 'remove' or the more interpretive 'destroy'.
- source_word: שׁוֹפֵט
  chosen: the ruler
  alternatives:
  - the judge
  - the leader
  lexicon: HALOT
  rationale: Although the noun literally means 'judge,' in this context of Moab's political leadership and parallel with 'officials,' it likely denotes the governing authority broadly rather than a merely judicial office. 'Ruler' communicates the political sense in natural English while remaining close to the source.
- source_word: מִקִּרְבָּהּ
  chosen: from her midst
  alternatives:
  - from among her
  - from the midst of it
  lexicon: HALOT
  rationale: The feminine singular suffix refers to Moab as a nation/city personified. 'From her midst' preserves the feminine personification and the idiomatic sense of removal from within.
- source_word: וְכָל שָׂרֶיהָ
  chosen: all her officials
  alternatives:
  - all her princes
  - all her leaders
  lexicon: HALOT
  rationale: שָׂרִים can mean princes, officials, or leaders. In contemporary English, 'officials' best conveys members of the ruling class or governing elite without implying hereditary royalty as strongly as 'princes'.
- source_word: אֶהֱרֹג
  chosen: I will kill
  alternatives:
  - I will slay
  lexicon: HALOT
  rationale: The verb הרג straightforwardly means 'kill' or 'slay.' 'Kill' is direct, clear modern English; 'slay' is more traditional but less natural for the stated translation philosophy.
- source_word: עִמּוֹ
  chosen: with him
  alternatives:
  - along with him
  lexicon: HALOT
  rationale: The masculine singular suffix most naturally refers back to the singular שׁוֹפֵט ('ruler/judge'). 'With him' preserves the compactness of the Hebrew and indicates the officials share the ruler's fate.
- source_word: אָמַר יְהוָה
  chosen: says the LORD
  alternatives:
  - declares the LORD
  - said the LORD
  lexicon: HALOT
  rationale: The prophetic formula is naturally rendered in English as a present-tense citation frame, 'says the LORD.' Per doctrine, יְהוָה is rendered 'the LORD.'
