id: AMO.1.5
reference: Amos 1:5
source:
  edition: WLC
  text: וְ/שָֽׁבַרְתִּי֙ בְּרִ֣יחַ דַּמֶּ֔שֶׂק וְ/הִכְרַתִּ֤י יוֹשֵׁב֙ מִ/בִּקְעַת
    אָ֔וֶן וְ/תוֹמֵ֥ךְ שֵׁ֖בֶט מִ/בֵּ֣ית עֶ֑דֶן וְ/גָל֧וּ עַם אֲרָ֛ם קִ֖ירָ/ה אָמַ֥ר
    יְהוָֽה־־׃פ
translation:
  text: I will break the gate-bar of Damascus, and I will cut off the inhabitant from
    the Valley of Aven and the one who holds the scepter from Beth-eden; and the people
    of Aram will go into exile to Kir,” says the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Aven' may echo a word meaning 'wickedness' or 'trouble'; it is likely
      used here as a place name with possible prophetic wordplay.
    reason: lexical_alternative
  - marker: b
    text: Beth-eden may also be rendered 'house of Eden'; some identify it historically
      with Bit-Adini.
    reason: alternative_reading
lexical_decisions:
- source_word: וְשָׁבַרְתִּי
  chosen: I will break
  alternatives:
  - I will shatter
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse functions
    futurally after the preceding judgment context; 'break' is the plain sense and
    fits the image of destroying a city's defensive bar.
- source_word: בְּרִיחַ
  chosen: gate-bar
  alternatives:
  - bar
  - bolt
  lexicon: HALOT
  rationale: Refers to the bar securing a gate or doors. 'Gate-bar' makes the military/fortification
    image explicit in natural English without over-paraphrasing.
- source_word: דַּמֶּשֶׂק
  chosen: Damascus
  rationale: Standard English transliteration of the place name.
- source_word: וְהִכְרַתִּי
  chosen: I will cut off
  alternatives:
  - I will destroy
  - I will wipe out
  lexicon: HALOT
  rationale: The idiom commonly means to remove decisively, often by destruction.
    'Cut off' preserves the Hebrew metaphor and prophetic register.
- source_word: יוֹשֵׁב
  chosen: the inhabitant
  alternatives:
  - the one who dwells
  - the ruler
  lexicon: HALOT
  rationale: Singular participle used collectively or representatively for the population/settled
    resident. 'Inhabitant' is the most direct lexical equivalent; broader political
    implications are left to context rather than imported into the translation.
- source_word: מִבִּקְעַת אָוֶן
  chosen: from the Valley of Aven
  alternatives:
  - from Bikath-aven
  - from the valley of wickedness
  lexicon: HALOT
  rationale: בִּקְעָה means 'valley/plain.' אָוֶן can mean 'trouble, wickedness,'
    but here likely functions as a place name or prophetic wordplay on a place name.
    The main text preserves it as a toponym, with the lexical sense worth noting in
    a footnote.
- source_word: וְתוֹמֵךְ שֵׁבֶט
  chosen: the one who holds the scepter
  alternatives:
  - the scepter-holder
  - the one who wields authority
  lexicon: HALOT
  rationale: תמך is 'hold/support' and שֵׁבֶט here denotes a ruler's staff/scepter.
    The phrase likely refers to the ruler or governing authority. 'The one who holds
    the scepter' preserves the concrete image.
- source_word: מִבֵּית עֶדֶן
  chosen: from Beth-eden
  alternatives:
  - from the house of Eden
  - from Bit-Adini
  lexicon: HALOT
  rationale: Best treated in the main text as a place name. Because the historical
    identification with Bit-Adini is possible and 'house of Eden' is a transparent
    literal rendering, alternatives are preserved in a footnote rather than resolved
    in the text.
- source_word: וְגָלוּ
  chosen: will go into exile
  alternatives:
  - will be exiled
  - will be carried away
  lexicon: HALOT
  rationale: The verb denotes going into exile/deportation. 'Will go into exile' is
    idiomatic and preserves the exile theme without specifying agency not explicit
    in this clause.
- source_word: עַם אֲרָם
  chosen: the people of Aram
  alternatives:
  - the people of Syria
  - Aram's people
  lexicon: HALOT
  rationale: Aram is the Hebrew ethnogeographic name; per philosophy, names are transliterated
    rather than replaced with later geopolitical labels such as 'Syria.'
- source_word: קִירָה
  chosen: to Kir
  alternatives:
  - to Qir
  lexicon: HALOT
  rationale: Directional suffix indicates motion toward the place. 'Kir' is the conventional
    English transliteration.
- source_word: אָמַר יְהוָה
  chosen: says the LORD
  alternatives:
  - declares the LORD
  - said the LORD
  lexicon: HALOT
  rationale: Prophetic messenger formula is naturally rendered in present tense in
    English. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
