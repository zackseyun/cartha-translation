  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for the Tetragrammaton, aligning
    with Jewish reverence tradition and common English Bible practice while preserving
    covenantal force.
