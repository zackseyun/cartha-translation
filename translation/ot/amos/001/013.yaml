id: AMO.1.13
reference: Amos 1:13
source:
  edition: WLC
  text: כֹּ֚ה אָמַ֣ר יְהוָ֔ה עַל שְׁלֹשָׁה֙ פִּשְׁעֵ֣י בְנֵֽי עַמּ֔וֹן וְ/עַל אַרְבָּעָ֖ה
    לֹ֣א אֲשִׁיבֶ֑/נּוּ עַל בִּקְעָ/ם֙ הָר֣וֹת הַ/גִּלְעָ֔ד לְמַ֖עַן הַרְחִ֥יב אֶת
    גְּבוּלָֽ/ם־־־־־׃
translation:
  text: 'Thus says the LORD: “For three transgressions of the sons of Ammon, and for
    four, I will not revoke its punishment, because they ripped open the pregnant
    women of Gilead in order to enlarge their border.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will not turn it back'—that is, I will not revoke the announced judgment.
    reason: lexical_alternative
  - marker: b
    text: Or, 'the Ammonites' for 'the sons of Ammon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. יְהוָה is rendered 'the LORD' per
    doctrine guidance for the divine name.
- source_word: עַל שְׁלֹשָׁה פִּשְׁעֵי ... וְעַל אַרְבָּעָה
  chosen: For three transgressions ... and for four
  alternatives:
  - Because of three crimes ... even four
  - For three offenses ... and for four
  lexicon: HALOT
  rationale: Preserves the Hebrew numerical escalation formula used throughout Amos.
    'Transgressions' keeps the moral/rebellious force of פֶּשַׁע better than the flatter
    'offenses' or more interpretive 'crimes'.
- source_word: בְנֵי עַמּוֹן
  chosen: the sons of Ammon
  alternatives:
  - the Ammonites
  - the people of Ammon
  lexicon: HALOT
  rationale: A relatively formal rendering that preserves the Hebrew construction
    while remaining natural enough in English. 'Ammonites' is possible, but 'sons
    of Ammon' better reflects the source wording.
- source_word: לֹא אֲשִׁיבֶנּוּ
  chosen: I will not revoke its punishment
  alternatives:
  - I will not turn it back
  - I will not relent
  - I will not revoke it
  lexicon: HALOT
  rationale: The idiom in Amos refers to Yahweh not turning back the announced judgment.
    English requires an explicit object for clarity; 'its punishment' makes the implied
    referent clear without over-paraphrasing. 'Relent' is possible but can suggest
    emotional change rather than judicial sentence.
- source_word: בִּקְעָם
  chosen: they ripped open
  alternatives:
  - they split open
  - they tore open
  lexicon: HALOT
  rationale: A violent verb describing brutal disembowelment. 'Ripped open' is vivid,
    idiomatic modern English and appropriately conveys the atrocity.
- source_word: הָרוֹת
  chosen: the pregnant women
  alternatives:
  - pregnant women
  - those who were pregnant
  lexicon: HALOT
  rationale: The adjective functions substantivally here; English naturally supplies
    'women.' The article is represented by 'the' in context.
- source_word: הַגִּלְעָד
  chosen: of Gilead
  alternatives:
  - in Gilead
  lexicon: HALOT
  rationale: Attached to 'pregnant women,' the phrase most naturally identifies the
    victims as belonging to Gilead. 'In Gilead' is possible, but 'of Gilead' is the
    more direct rendering of the construct-like relationship in English.
- source_word: לְמַעַן הַרְחִיב אֶת גְּבוּלָם
  chosen: in order to enlarge their border
  alternatives:
  - so that they might widen their territory
  - to expand their boundary
  lexicon: HALOT
  rationale: Expresses purpose. 'Enlarge their border' is close to the Hebrew while
    still idiomatic; 'territory' is a valid dynamic alternative but slightly less
    literal than גְּבוּל, 'border/boundary'.
