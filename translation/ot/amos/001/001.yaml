id: AMO.1.1
reference: Amos 1:1
source:
  edition: WLC
  text: דִּבְרֵ֣י עָמ֔וֹס אֲשֶׁר הָיָ֥ה בַ/נֹּקְדִ֖ים מִ/תְּק֑וֹעַ אֲשֶׁר֩ חָזָ֨ה
    עַל יִשְׂרָאֵ֜ל בִּ/ימֵ֣י עֻזִיָּ֣ה מֶֽלֶךְ יְהוּדָ֗ה וּ/בִ/ימֵ֞י יָרָבְעָ֤ם בֶּן
    יוֹאָשׁ֙ מֶ֣לֶךְ יִשְׂרָאֵ֔ל שְׁנָתַ֖יִם לִ/פְנֵ֥י הָ/רָֽעַשׁ־־׀־־׃
translation:
  text: The words of Amos, who was among the sheep breeders from Tekoa, which he saw
    concerning Israel in the days of Uzziah king of Judah and in the days of Jeroboam
    son of Joash, king of Israel, two years before the earthquake.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among the shepherds.' The Hebrew term likely refers more specifically
      to sheep breeding than to shepherding in general.
    reason: lexical_alternative
  - marker: b
    text: Or 'against Israel.' The preposition can carry either sense in prophetic
      contexts; 'concerning' is chosen here as the broader superscriptional wording.
    reason: alternative_reading
lexical_decisions:
- source_word: דִּבְרֵי
  chosen: The words of
  alternatives:
  - The sayings of
  - The matters of
  lexicon: HALOT
  rationale: Construct plural of דבר introducing the prophetic book; 'The words of'
    is the standard and natural English equivalent for a superscription and does not
    over-interpret the content as merely sayings.
- source_word: עָמוֹס
  chosen: Amos
  rationale: Personal name is transliterated per translation philosophy.
- source_word: בַנֹּקְדִים
  chosen: among the sheep breeders
  alternatives:
  - among the shepherds
  - among the sheep raisers
  lexicon: HALOT
  rationale: נֹקֵד refers more specifically to a sheep breeder/raiser rather than
    the broader 'shepherd.' 'Among the sheep breeders' reflects both the prefixed
    preposition and the more specialized occupational sense, while remaining readable.
- source_word: מִתְּקוֹעַ
  chosen: from Tekoa
  rationale: Geographical origin marked by מן; Tekoa is transliterated as a place
    name.
- source_word: חָזָה
  chosen: saw
  alternatives:
  - received in a vision
  - beheld
  lexicon: HALOT
  rationale: The verb is the ordinary prophetic term 'see' for visionary revelation.
    'Saw' preserves the source wording; the prophetic sense is clear from context
    without expanding to 'received in a vision' in the main text.
- source_word: עַל יִשְׂרָאֵל
  chosen: concerning Israel
  alternatives:
  - against Israel
  - about Israel
  lexicon: HALOT
  rationale: עַל with prophetic revelation can mean 'concerning' or 'against.' Since
    the book includes both judgment and broader address, 'concerning Israel' is the
    less interpretively loaded superscriptional rendering.
- source_word: בִּימֵי ... וּבִימֵי
  chosen: in the days of ... and in the days of
  alternatives:
  - during the reign of ... and during the reign of
  lexicon: HALOT
  rationale: This is the idiomatic temporal formula in Hebrew superscriptions. 'In
    the days of' stays close to the source and works naturally in English.
- source_word: שְׁנָתַיִם לִפְנֵי הָרָעַשׁ
  chosen: two years before the earthquake
  alternatives:
  - two years before the quake
  lexicon: HALOT
  rationale: Straightforward temporal expression. 'Earthquake' is the normal English
    equivalent for רַעַשׁ here and preserves the definite article's reference to a
    known event.
