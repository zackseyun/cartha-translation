theological_decisions:
- issue: Prophetic superscription relation of 'which he saw' to 'words'
  chosen_reading: Retained the relative clause 'which he saw' with 'words' as in the
    Hebrew superscription, yielding 'The words ... which he saw concerning Israel.'
  alternative_readings:
  - Restructure to 'The words of Amos ... The visions he saw concerning Israel...'
  rationale: The Hebrew formally attributes 'seeing' to the 'words,' a conventional
    prophetic superscription blending spoken message and visionary reception. Preserving
    this avoids unnecessary smoothing while remaining intelligible in English.
  doctrine_reference: Translation philosophy §1, §3
