theological_decisions:
- issue: Referent shift between national Edom and singular masculine pronouns
  chosen_reading: Retain singular masculine pronouns ('he,' 'his') while naming Edom
    as a nation.
  alternative_readings:
  - Use neuter/national language throughout ('it pursued its brother...')
  - Pluralize to represent the people of Edom ('they pursued their brother...')
  rationale: The Hebrew uses singular forms, personifying Edom. Preserving the singular
    maintains the prophetic rhetoric and the familial accusation against Edom without
    flattening the imagery.
  doctrine_reference: Translation philosophy §5 (consistency of key terms) and §6
    (readable modern English)
