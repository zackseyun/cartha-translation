id: AMO.1.11
reference: Amos 1:11
source:
  edition: WLC
  text: כֹּ֚ה אָמַ֣ר יְהוָ֔ה עַל שְׁלֹשָׁה֙ פִּשְׁעֵ֣י אֱד֔וֹם וְ/עַל אַרְבָּעָ֖ה
    לֹ֣א אֲשִׁיבֶ֑/נּוּ עַל רָדְפ֨/וֹ בַ/חֶ֤רֶב אָחִי/ו֙ וְ/שִׁחֵ֣ת רַחֲמָ֔י/ו וַ/יִּטְרֹ֤ף
    לָ/עַד֙ אַפּ֔/וֹ וְ/עֶבְרָת֖/וֹ שְׁמָ֥רָ/ה נֶֽצַח־־־׃
translation:
  text: 'Thus says the LORD: “For three transgressions of Edom, and for four, I will
    not revoke its punishment, because he pursued his brother with the sword and destroyed
    his compassion; his anger kept tearing forever, and he kept his wrath forever.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will not turn it back,' that is, I will not reverse the announced
      judgment.
    reason: lexical_alternative
  - marker: b
    text: '''His brother'' likely evokes Edom''s kinship with Israel through Esau
      and Jacob.'
    reason: cross_reference
  - marker: c
    text: Or, 'he tore perpetually in his anger, and kept his wrath forever.' The
      Hebrew uses vivid predatory imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    Jewish reverence tradition and established English Bible convention.
- source_word: פִּשְׁעֵי
  chosen: transgressions
  alternatives:
  - rebellions
  - crimes
  lexicon: HALOT
  rationale: '''Transgressions'' fits Amos''s indictment formula and preserves the
    moral-covenantal sense of serious offenses without over-specifying a legal category.'
- source_word: לֹא אֲשִׁיבֶנּוּ
  chosen: I will not revoke its punishment
  alternatives:
  - I will not turn it back
  - I will not relent
  - I will not reverse it
  lexicon: HALOT
  rationale: The idiom in Amos's repeated judgment formula most naturally means that
    YHWH will not turn back the announced judgment. 'Revoke its punishment' makes
    the implied object explicit in clear English while staying close to the idiomatic
    sense.
- source_word: אֱדוֹם
  chosen: Edom
  lexicon: HALOT
  rationale: Standard transliteration of the nation name.
- source_word: רָדְפוֹ
  chosen: he pursued
  alternatives:
  - they pursued
  - it pursued
  lexicon: HALOT
  rationale: The singular verbal form is retained. Although Edom is a nation, Hebrew
    commonly personifies nations in the singular; English can preserve that personification
    here.
- source_word: אָחִיו
  chosen: his brother
  alternatives:
  - his kinsman
  - his brother nation
  lexicon: HALOT
  rationale: Literal 'his brother' preserves the familial language, likely evoking
    Edom's kinship with Israel through Esau and Jacob. More interpretive alternatives
    are better left implicit.
- source_word: שִׁחֵת רַחֲמָיו
  chosen: destroyed his compassion
  alternatives:
  - corrupted his mercies
  - stifled all pity
  - destroyed his womb-compassions
  lexicon: HALOT
  rationale: רַחֲמִים denotes compassion/mercy/pity. 'Destroyed his compassion' is
    a natural English rendering that preserves the force of violently suppressing
    natural pity.
- source_word: וַיִּטְרֹף
  chosen: kept tearing
  alternatives:
  - tore
  - raged
  - preyed
  lexicon: HALOT
  rationale: The verb literally denotes tearing like a predator. In context with anger
    as subject/object relation, 'kept tearing' preserves the vivid metaphor better
    than flattening it to 'raged'.
- source_word: לָעַד
  chosen: forever
  alternatives:
  - continually
  - without end
  lexicon: HALOT
  rationale: Standard rendering; here it emphasizes the unrelenting duration of Edom's
    anger.
- source_word: אַפּוֹ
  chosen: his anger
  alternatives:
  - his nose
  - his fury
  lexicon: HALOT
  rationale: Though literally related to 'nose,' in idiom it means anger. 'Anger'
    is the clear contextual sense.
- source_word: עֶבְרָתוֹ
  chosen: his wrath
  alternatives:
  - his fury
  - his rage
  lexicon: HALOT
  rationale: A strong term for overflowing fury. 'Wrath' pairs well with 'anger' while
    preserving elevated prophetic diction.
- source_word: שְׁמָרָה נֶצַח
  chosen: he kept his wrath forever
  alternatives:
  - he preserved it perpetually
  - he maintained his fury forever
  lexicon: HALOT
  rationale: The idiom means to keep/retain wrath continually. Rendering the object
    explicitly in English avoids awkwardness and matches the parallelism with the
    previous clause.
