theological_decisions:
- issue: Nature of the fire in prophetic judgment
  chosen_reading: fire is rendered as the image of divine judgment without specifying
    whether it is literal, military, or metaphorical beyond the text
  alternative_readings:
  - literal conflagration sent by God
  - metaphor for invading destruction
  rationale: The Hebrew states that God will send fire and that it will consume the
    city's citadels. The translation preserves the prophetic judgment language and
    does not resolve the mechanism of fulfillment beyond what the text says.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
