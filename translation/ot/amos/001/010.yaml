id: AMO.1.10
reference: Amos 1:10
source:
  edition: WLC
  text: וְ/שִׁלַּ֥חְתִּי אֵ֖שׁ בְּ/ח֣וֹמַת צֹ֑ר וְ/אָכְלָ֖ה אַרְמְנֹתֶֽי/הָ׃פ
translation:
  text: So I will send fire upon the wall of Tyre, and it will consume her citadels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "her palaces." The Hebrew term can refer to palatial buildings or fortified
      strongholds/citadels.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁלַּחְתִּי
  chosen: So I will send
  alternatives:
  - And I will send
  - Then I will send
  lexicon: HALOT
  rationale: First person singular with prefixed conjunction. Rendered with future
    'will send' to reflect prophetic announcement. 'So' captures the discourse continuation
    from the prior indictment in readable English; 'and' is possible but less natural
    in English prophetic judgment formulae.
- source_word: אֵשׁ
  chosen: fire
  lexicon: HALOT
  rationale: Standard gloss for literal fire, here functioning as an image of destructive
    judgment. No need to paraphrase beyond the Hebrew.
- source_word: בְּחוֹמַת
  chosen: upon the wall
  alternatives:
  - against the wall
  - on the wall
  lexicon: HALOT
  rationale: ב with 'wall' in this judgment formula is naturally rendered 'upon' or
    'against.' 'Upon the wall' preserves the idiom while remaining clear in English.
- source_word: צֹר
  chosen: Tyre
  lexicon: HALOT
  rationale: Standard English transliteration of the place name צור.
- source_word: וְאָכְלָה
  chosen: and it will consume
  alternatives:
  - and it shall devour
  - and it will eat up
  lexicon: HALOT
  rationale: The verb literally means 'eat,' commonly used of fire consuming. 'Consume'
    is idiomatic modern English and preserves the destructive force without archaic
    diction.
- source_word: אַרְמְנֹתֶיהָ
  chosen: her citadels
  alternatives:
  - her palaces
  - her strongholds
  lexicon: HALOT
  rationale: אַרְמוֹן can denote palace or fortified stronghold. In an oracle against
    a city wall, 'citadels' best captures prominent fortified structures within the
    city while preserving the military-royal sense. 'Palaces' is traditional and possible,
    but may sound too narrowly residential.
