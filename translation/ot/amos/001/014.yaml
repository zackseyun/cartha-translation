theological_decisions:
- issue: Nature of the judgment imagery
  chosen_reading: The verse describes literal military devastation using fire and
    storm imagery, without requiring the storm language to be read exclusively as
    a direct theophany.
  alternative_readings:
  - The storm language may also evoke divine-warrior imagery and the LORD's sovereign
    judgment.
  rationale: The Hebrew combines siege/war language ('battle cry,' 'day of war') with
    storm imagery. The translation preserves both images without resolving whether
    the storm is purely metaphorical, providential, or theophanic. This follows the
    doctrine's principle of preserving theological tension rather than over-specifying.
  doctrine_reference: Translation philosophy §3
- issue: Referent of the feminine suffix in אַרְמְנוֹתֶיהָ
  chosen_reading: The suffix is represented as 'her,' referring to the city Rabbah.
  rationale: Hebrew cities are commonly treated as feminine. Retaining 'her' preserves
    the source-language personification and avoids flattening the imagery into an
    impersonal 'its.'
  doctrine_reference: Translation philosophy §5
