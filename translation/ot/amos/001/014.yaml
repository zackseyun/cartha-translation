id: AMO.1.14
reference: Amos 1:14
source:
  edition: WLC
  text: וְ/הִצַּ֤תִּי אֵשׁ֙ בְּ/חוֹמַ֣ת רַבָּ֔ה וְ/אָכְלָ֖ה אַרְמְנוֹתֶ֑י/הָ בִּ/תְרוּעָה֙
    בְּ/י֣וֹם מִלְחָמָ֔ה בְּ/סַ֖עַר בְּ/י֥וֹם סוּפָֽה
translation:
  text: I will kindle a fire in the wall of Rabbah, and it will consume her citadels,
    with a battle cry on the day of war, with a storm on the day of tempest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her palaces' or 'her strongholds' for 'her citadels.'
    reason: lexical_alternative
  - marker: b
    text: '''Battle cry'' translates a Hebrew term that can also mean a loud shout
      of alarm, sometimes associated with a trumpet blast.'
    reason: lexical_alternative
  - marker: c
    text: The storm imagery may echo the LORD's judgment as a divine warrior, while
      still fitting the immediate picture of wartime destruction.
    reason: cross_reference
lexical_decisions:
- source_word: וְהִצַּתִּי
  chosen: I will kindle
  alternatives:
  - I will set ablaze
  - I will ignite
  lexicon: HALOT
  rationale: 'Hiphil perfect with prefixed conjunction in prophetic judgment context
    functions futurally: ''I will kindle/set on fire.'' ''Kindle'' is natural English
    and preserves the causative sense without over-paraphrase.'
- source_word: אֵשׁ
  chosen: a fire
  alternatives:
  - fire
  lexicon: HALOT
  rationale: Indefinite in English is idiomatic after the verb 'kindle'; the Hebrew
    noun denotes literal fire as an instrument of judgment.
- source_word: בְּחוֹמַת
  chosen: in the wall of
  alternatives:
  - against the wall of
  - upon the wall of
  lexicon: HALOT
  rationale: The preposition ב can be rendered variously by context. Here 'in the
    wall of' fits the idiom of fire being kindled in/within a city's fortification
    and avoids adding interpretive force beyond the Hebrew.
- source_word: רַבָּה
  chosen: Rabbah
  rationale: Proper place name of the Ammonite capital; per philosophy, names are
    transliterated rather than translated.
- source_word: וְאָכְלָה
  chosen: and it will consume
  alternatives:
  - and it will devour
  lexicon: HALOT
  rationale: Qal perfect with fire as implied feminine subject ('fire' is feminine
    in Hebrew). 'Consume' is idiomatic for fire in English and preserves the destructive
    image.
- source_word: אַרְמְנוֹתֶיהָ
  chosen: her citadels
  alternatives:
  - her palaces
  - her strongholds
  lexicon: HALOT
  rationale: אַרְמוֹן can denote palace or fortified stronghold. In an oracle against
    a city under attack, 'citadels' best captures prominent fortified structures without
    restricting the sense to royal residences alone. The feminine suffix is represented
    by 'her,' referring to the city.
- source_word: בִּתְרוּעָה
  chosen: with a battle cry
  alternatives:
  - with shouting
  - with a trumpet blast
  lexicon: HALOT
  rationale: תְּרוּעָה can denote a loud shout or alarm signal, sometimes associated
    with trumpets. In immediate parallel with 'day of war,' 'battle cry' best conveys
    martial uproar while remaining broad enough to include the alarm sense.
- source_word: בְּיוֹם מִלְחָמָה
  chosen: on the day of war
  alternatives:
  - in the day of battle
  - on a day of battle
  lexicon: HALOT
  rationale: A straightforward temporal phrase. 'War' preserves the broader conflict
    setting; 'battle' is possible but slightly narrower.
- source_word: בְּסַעַר
  chosen: with a storm
  alternatives:
  - in a storm
  - with a whirlwind
  lexicon: HALOT
  rationale: The preposition is instrumental/accompaniment here, parallel to 'with
    a battle cry.' סַעַר denotes storm, tempest, or raging wind. 'Storm' is the clearest
    general rendering.
- source_word: בְּיוֹם סוּפָה
  chosen: on the day of tempest
  alternatives:
  - on the day of storm
  - on the day of whirlwind
  lexicon: HALOT
  rationale: סוּפָה denotes tempest/storm. Rendering it as 'tempest' preserves the
    poetic intensification alongside the previous 'storm' without flattening the parallelism
    into exact repetition.
