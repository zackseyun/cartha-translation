theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of the judgment formula לֹא אֲשִׁיבֶנּוּ
  chosen_reading: I will not revoke it
  alternative_readings:
  - I will not turn it back
  - I will not relent
  - I will not revoke the punishment
  rationale: The Hebrew leaves the object implicit except for the pronoun suffix. The translation preserves that compactness with 'it' rather than importing 'punishment' into the main text, while still conveying the judicial finality of the oracle.
