id: AMO.1.3
reference: Amos 1:3
source:
  edition: WLC
  text: כֹּ֚ה אָמַ֣ר יְהוָ֔ה עַל שְׁלֹשָׁה֙ פִּשְׁעֵ֣י דַמֶּ֔שֶׂק וְ/עַל אַרְבָּעָ֖ה לֹ֣א אֲשִׁיבֶ֑/נּוּ עַל דּוּשָׁ֛/ם בַּ/חֲרֻצ֥וֹת הַ/בַּרְזֶ֖ל אֶת הַ/גִּלְעָֽד־־־־׃
translation:
  text: 'Thus says Yahweh: “For three transgressions of Damascus, and for four, I will not revoke it, because they threshed Gilead with threshing sledges of iron.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I will not turn it back,” that is, I will not reverse the judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  - So says the LORD
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. יְהוָה is rendered 'the LORD' per doctrine guidance for the divine name.
- source_word: עַל שְׁלֹשָׁה פִּשְׁעֵי ... וְעַל אַרְבָּעָה
  chosen: For three transgressions of Damascus, and for four
  alternatives:
  - Because of three transgressions of Damascus, even four
  - For three crimes of Damascus, and for four
  lexicon: HALOT
  rationale: Preserves the Hebrew numerical escalation formula used in Amos. 'Transgressions' fits פּשׁע as acts of rebellion/offense better than the more generic 'sins' or more interpretive 'crimes'.
- source_word: דַמֶּשֶׂק
  chosen: Damascus
  rationale: Standard English transliteration of the place name.
- source_word: לֹא אֲשִׁיבֶנּוּ
  chosen: I will not revoke it
  alternatives:
  - I will not turn it back
  - I will not relent
  - I will not revoke the punishment
  lexicon: HALOT
  rationale: 'The idiom is elliptical: literally ''I will not turn it back.'' In context it refers to not reversing the announced judgment/sentence. ''Revoke it'' preserves the object suffix while expressing the judicial sense without over-specifying beyond the text. ''Relent'' is possible but can suggest emotional softening rather than reversal of sentence.'
- source_word: עַל
  chosen: because
  alternatives:
  - for
  - on account of
  lexicon: HALOT
  rationale: The second עַל introduces the ground for judgment. English 'because' makes the causal force clear and natural.
- source_word: דּוּשָׁם
  chosen: they threshed
  alternatives:
  - their threshing
  - they trampled
  lexicon: HALOT
  rationale: From דושׁ, 'to thresh.' The verbal sense is retained; the metaphor depicts brutal crushing of Gilead's people/land.
- source_word: בַּחֲרֻצוֹת הַבַּרְזֶל
  chosen: with threshing sledges of iron
  alternatives:
  - with iron threshing instruments
  - with sharp iron sledges
  lexicon: HALOT
  rationale: חֲרֻצוֹת refers to threshing implements/sledges. 'Threshing sledges' is the clearest idiomatic equivalent in English; 'of iron' preserves the construct with הַבַּרְזֶל.
- source_word: אֶת הַגִּלְעָד
  chosen: Gilead
  rationale: Direct object marker omitted in English. Gilead is retained as the regional name; the text personifies/treats the region and its inhabitants collectively.
