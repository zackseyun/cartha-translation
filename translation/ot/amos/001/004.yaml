theological_decisions:
- issue: Nature of 'house of Hazael'
  chosen_reading: dynastic/royal house under judgment
  alternative_readings:
  - literal palace/building of Hazael
  rationale: In prophetic judgment language, 'house' commonly extends to a ruling
    house or dynasty, not merely a structure. The translation keeps 'house' to preserve
    that breadth rather than narrowing the referent.
- issue: Image of fire
  chosen_reading: retain literal 'fire' as prophetic judgment imagery
  alternative_readings:
  - paraphrase as military destruction or divine judgment
  rationale: The text uses the concrete image of fire; translating it literally preserves
    the prophetic force and avoids importing an interpretation into the main text.
