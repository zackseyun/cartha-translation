id: AMO.1.4
reference: Amos 1:4
source:
  edition: WLC
  text: וְ/שִׁלַּ֥חְתִּי אֵ֖שׁ בְּ/בֵ֣ית חֲזָאֵ֑ל וְ/אָכְלָ֖ה אַרְמְנ֥וֹת בֶּן הֲדָֽד־׃
translation:
  text: So I will send fire upon the house of Hazael, and it will consume the citadels
    of Ben-hadad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'palaces'; the Hebrew term can refer to palatial buildings or fortified
      strongholds.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁלַּחְתִּי
  chosen: So I will send
  alternatives:
  - And I will send
  - I will send
  lexicon: HALOT
  rationale: The verb שׁלח in the Piel with first person singular means 'send.' The
    prefixed conjunction can be rendered simply 'and,' but in prophetic judgment oracles
    English often reads more naturally with 'so,' signaling consequence from the prior
    indictment while preserving the connective force.
- source_word: אֵשׁ
  chosen: fire
  lexicon: HALOT
  rationale: אשׁ is the ordinary word for 'fire.' In this judgment context it likely
    signifies destructive warfare/judgment, but the concrete image should be retained
    rather than paraphrased.
- source_word: בְּבֵית חֲזָאֵל
  chosen: upon the house of Hazael
  alternatives:
  - against the house of Hazael
  - into the house of Hazael
  lexicon: HALOT
  rationale: בְּ with 'house' after 'send fire' idiomatically marks the target of
    judgment. 'Upon the house of Hazael' is natural English for divine judgment and
    preserves the dynastic/palatial sense of 'house' rather than reducing it to a
    literal building.
- source_word: חֲזָאֵל
  chosen: Hazael
  rationale: Personal name transliterated per translation policy.
- source_word: וְאָכְלָה
  chosen: and it will consume
  alternatives:
  - and it shall devour
  - and it will eat up
  lexicon: HALOT
  rationale: אכל literally means 'eat,' but with fire as subject it idiomatically
    means 'consume' or 'devour.' 'Consume' is clear modern English and fits the destructive
    image.
- source_word: אַרְמְנוֹת
  chosen: the citadels
  alternatives:
  - the palaces
  - the fortresses
  lexicon: HALOT
  rationale: ארמנות can denote palaces or fortified strongholds. In an oracle against
    a royal house and city defenses, 'citadels' captures both elite and fortified
    dimensions better than the narrower 'palaces,' while remaining faithful to the
    term's range.
- source_word: בֶּן הֲדָד
  chosen: Ben-hadad
  rationale: Royal personal/dynastic name transliterated by standard convention. It
    may refer to a specific king or dynastic title, but the Hebrew presents it as
    the proper name Ben-hadad.
