id: AMO.1.12
reference: Amos 1:12
source:
  edition: WLC
  text: וְ/שִׁלַּ֥חְתִּי אֵ֖שׁ בְּ/תֵימָ֑ן וְ/אָכְלָ֖ה אַרְמְנ֥וֹת בָּצְרָֽה׃פ
translation:
  text: So I will send fire upon Teman, and it will consume the citadels of Bozrah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the palaces of Bozrah.' The Hebrew term can refer to palatial residences
      or fortified strongholds.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/שִׁלַּחְתִּי
  chosen: So I will send
  alternatives:
  - And I will send
  - I will send
  lexicon: HALOT
  rationale: The verb שׁלח in the Hiphil commonly means 'send.' The prefixed conjunction
    can be rendered simply 'and,' but in prophetic judgment oracles English often
    reads more naturally with 'so,' signaling consequence from the prior indictment
    while preserving the connective force.
- source_word: אֵשׁ
  chosen: fire
  lexicon: HALOT
  rationale: Literal 'fire' is the standard sense and fits the recurring prophetic
    judgment formula in Amos. No metaphorical expansion is warranted in translation.
- source_word: בְּ/תֵימָן
  chosen: upon Teman
  alternatives:
  - in Teman
  - against Teman
  lexicon: HALOT
  rationale: Teman is a place name and should be transliterated. The preposition ב
    can be rendered 'in,' but in English prophetic judgment formulas with 'send fire'
    idiomatically take 'upon' or 'against.' 'Upon Teman' preserves the sense of directed
    judgment while remaining close to the Hebrew.
- source_word: וְ/אָכְלָה
  chosen: and it will consume
  alternatives:
  - and it shall devour
  - and it will eat up
  lexicon: HALOT
  rationale: The verb אכל literally means 'eat,' but with fire as subject it idiomatically
    means 'consume' or 'devour.' 'Consume' is natural modern English and preserves
    the destructive force.
- source_word: אַרְמְנ֥וֹת
  chosen: the citadels
  alternatives:
  - the palaces
  - the fortresses
  lexicon: HALOT
  rationale: אַרְמְנוֹת can denote fortified palatial structures or strongholds. In
    Amos's judgment oracles, the term often points to elite fortified residences.
    'Citadels' captures both the defensive and elite connotations better than the
    narrower 'palaces,' while remaining readable.
- source_word: בָּצְרָה
  chosen: of Bozrah
  alternatives:
  - in Bozrah
  lexicon: HALOT
  rationale: Bozrah is a place name and should be transliterated. In construct with
    אַרְמְנוֹת, the most straightforward rendering is 'the citadels of Bozrah.'
