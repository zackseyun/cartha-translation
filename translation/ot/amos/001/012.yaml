theological_decisions:
- issue: Prophetic judgment formula
  chosen_reading: Render the verse as a direct divine judgment announcement without
    softening the imagery.
  alternative_readings:
  - Interpret 'fire' metaphorically as general destruction
  rationale: The Hebrew presents a standard prophetic oracle of judgment in which
    God directly sends fire that consumes fortified centers. The translation preserves
    the concrete imagery rather than abstracting it.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English without flattening theological weight.'
