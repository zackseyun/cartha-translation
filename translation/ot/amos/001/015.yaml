theological_decisions:
- issue: Whether מַלְכָּם refers to a human king or the Ammonite god Milcom/Molech
  chosen_reading: 'human ruler: ''their king'''
  alternative_readings:
  - Milcom
  - Molech
  rationale: The Hebrew pointing and immediate syntax support the common noun reading
    'their king,' especially with the following phrase 'he and his officials together.'
    At the same time, because the consonants also permit the divine name Milcom and
    the context concerns Ammon, the alternative is significant and should be preserved
    in a footnote rather than erased.
  doctrine_reference: Preserve theological tension rather than resolve it; Original-language
    primacy over translation tradition
