id: AMO.1.15
reference: Amos 1:15
source:
  edition: WLC
  text: וְ/הָלַ֥ךְ מַלְכָּ֖/ם בַּ/גּוֹלָ֑ה ה֧וּא וְ/שָׂרָ֛י/ו יַחְדָּ֖ו אָמַ֥ר יְהוָֽה׃פ
translation:
  text: And their king shall go into exile, he and his officials together, says the
    LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Milcom,' the Ammonite god; some understand the line to mean that Ammon's
      god will go into exile along with his priests or officials.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָלַךְ
  chosen: shall go
  alternatives:
  - will go
  - has gone
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse commonly
    carries a future sense; 'shall go' preserves the announcement/judgment tone without
    sounding archaic beyond normal biblical style.
- source_word: מַלְכָּם
  chosen: their king
  alternatives:
  - Milcom
  - their Molech
  lexicon: HALOT
  rationale: The consonantal form can be read either as 'their king' or as the Ammonite
    deity Milcom/Molech. In this immediate syntax, the attached pronominal suffix
    naturally yields 'their king,' and this fits the parallel with 'his officials.'
    Because the deity reading is a well-known alternative in Amos 1:15, it is preserved
    in a footnote rather than adopted in the main text.
- source_word: בַּגּוֹלָה
  chosen: into exile
  alternatives:
  - into captivity
  - in exile
  lexicon: HALOT
  rationale: The phrase denotes deportation/exile as the result of conquest. 'Into
    exile' is idiomatic modern English and communicates the movement implied by the
    preposition.
- source_word: הוּא
  chosen: he
  alternatives:
  - he himself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis after 'their king.' English can
    represent this naturally with 'he,' retaining the appositional emphasis in the
    phrase 'he and his officials together.'
- source_word: וְשָׂרָיו
  chosen: and his officials
  alternatives:
  - and his princes
  - and his leaders
  lexicon: HALOT
  rationale: שָׂרִים refers to rulers, princes, or officials. 'Officials' is clear
    modern English and suits a royal court context without unnecessary archaism.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - all together
  lexicon: HALOT
  rationale: This adverb emphasizes joint deportation of the king and his officials.
    'Together' is the most direct rendering.
- source_word: אָמַר יְהוָה
  chosen: says the LORD
  alternatives:
  - declares the LORD
  - said the LORD
  lexicon: HALOT
  rationale: This prophetic messenger formula is naturally rendered in English present
    tense. Per doctrine, יְהוָה is rendered 'the LORD.'
