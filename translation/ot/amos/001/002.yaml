id: AMO.1.2
reference: Amos 1:2
source:
  edition: WLC
  text: וַ/יֹּאמַ֓ר יְהוָה֙ מִ/צִיּ֣וֹן יִשְׁאָ֔ג וּ/מִ/ירוּשָׁלִַ֖ם יִתֵּ֣ן קוֹל֑/וֹ וְ/אָֽבְלוּ֙ נְא֣וֹת הָ/רֹעִ֔ים וְ/יָבֵ֖שׁ רֹ֥אשׁ הַ/כַּרְמֶֽל׀׃פ
translation:
  text: 'And he said: Yahweh roars from Zion and gives his voice from Jerusalem; the pastures of the shepherds mourn, and the summit of Carmel dries up.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'utters his voice.' The Hebrew idiom is literally 'gives his voice.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the meadows of the shepherds mourn.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the head of Carmel,' that is, its summit or topmost height.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Rendered as 'The LORD' per doctrine default for the divine name, following established English convention that signals YHWH without transliteration.
- source_word: יִשְׁאָג
  chosen: roars
  alternatives:
  - will roar
  - growls
  lexicon: HALOT
  rationale: The verb denotes the roaring of a lion; 'roars' preserves the vivid prophetic imagery and present-like force in English.
- source_word: יִתֵּן קוֹלוֹ
  chosen: gives his voice
  alternatives:
  - utters his voice
  - raises his voice
  - thunders
  lexicon: HALOT
  rationale: A relatively literal rendering preserves the Hebrew idiom and parallelism with 'roars.' 'Thunders' is interpretive and therefore not preferred in the main text.
- source_word: נְאוֹת
  chosen: pastures
  alternatives:
  - meadows
  - habitations
  lexicon: HALOT
  rationale: In this context of shepherds and land devastation, 'pastures' best fits the sense of grazing places rather than dwellings.
- source_word: הָרֹעִים
  chosen: the shepherds
  alternatives:
  - the herdsmen
  - the pastors
  lexicon: HALOT
  rationale: The participial form refers to those who shepherd flocks. 'Shepherds' is the most natural and contextually precise English rendering.
- source_word: אָבְלוּ
  chosen: mourn
  alternatives:
  - wither
  - dry up
  - lament
  lexicon: HALOT
  rationale: The verb commonly means 'mourn' or 'lament.' Applied to the pastures, it personifies the land under judgment. A more physical gloss like 'wither' captures effect but loses the poetic force.
- source_word: רֹאשׁ
  chosen: the summit
  alternatives:
  - the top
  - the head
  lexicon: HALOT
  rationale: For a mountain or ridge, 'summit' conveys the geographical sense idiomatically in English while preserving the metaphorical 'head/top' idea.
- source_word: הַכַּרְמֶל
  chosen: Carmel
  alternatives:
  - Mount Carmel
  lexicon: HALOT
  rationale: As a proper place name, it is transliterated. 'Carmel' is sufficient in context; 'Mount Carmel' would add specificity not explicit in the Hebrew.
- source_word: וַיֹּאמַר
  chosen: And he said
  alternatives:
  - And he said this
  - He said
  lexicon: HALOT
  rationale: The narrative introduction is retained straightforwardly. Keeping 'And' reflects Hebrew discourse flow at the start of the oracle.
