theological_decisions:
- issue: Gendered pronominal suffix for the city
  chosen_reading: her citadels
  alternative_readings:
  - its citadels
  rationale: The Hebrew suffix is feminine singular, referring to the city Gaza as
    grammatically feminine. English can use either 'her' or 'its' for cities; 'her'
    preserves the source-language personification common in prophetic oracles without
    adding doctrine.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
