id: AMO.1.7
reference: Amos 1:7
source:
  edition: WLC
  text: וְ/שִׁלַּ֥חְתִּי אֵ֖שׁ בְּ/חוֹמַ֣ת עַזָּ֑ה וְ/אָכְלָ֖ה אַרְמְנֹתֶֽי/הָ׃
translation:
  text: So I will send fire against the wall of Gaza, and it will consume her citadels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her palaces.' The Hebrew term can refer to palatial buildings, often
      with a fortified or elite sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁלַּחְתִּי
  chosen: So I will send
  alternatives:
  - And I will send
  - I will send
  lexicon: HALOT
  rationale: The verb שׁלח in the Piel with first person singular conveys YHWH's direct
    action of sending. The prefixed conjunction is rendered 'So' to reflect the prophetic
    judgment sequence in context while keeping natural English; 'And' is possible
    more formally.
- source_word: אֵשׁ
  chosen: fire
  lexicon: HALOT
  rationale: Literal 'fire' is the standard sense and fits prophetic judgment imagery
    without paraphrase.
- source_word: בְּחוֹמַת
  chosen: against the wall of
  alternatives:
  - into the wall of
  - on the wall of
  lexicon: HALOT
  rationale: The preposition ב with 'wall' after 'send fire' is idiomatically rendered
    'against' in English to express hostile impact on the city fortification. 'In/on'
    would sound unnatural and less clearly convey judgment.
- source_word: עַזָּה
  chosen: Gaza
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: וְאָכְלָה
  chosen: and it will consume
  alternatives:
  - and it will devour
  - and it will eat up
  lexicon: HALOT
  rationale: The Qal perfect with feminine singular refers to the previously mentioned
    'fire' and is naturally rendered as a future consequence in this judgment oracle.
    'Consume' communicates destructive burning in clear modern English.
- source_word: אַרְמְנֹתֶיהָ
  chosen: her citadels
  alternatives:
  - her palaces
  - her strongholds
  lexicon: HALOT
  rationale: אַרְמוֹן can denote fortified palatial structures or citadels. 'Citadels'
    preserves both the elite and fortified sense in a military-judgment context. 'Palaces'
    is traditional and possible, but may underplay the defensive nuance; 'strongholds'
    may overgeneralize.
