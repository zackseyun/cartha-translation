id: AMO.1.9
reference: Amos 1:9
source:
  edition: WLC
  text: כֹּ֚ה אָמַ֣ר יְהוָ֔ה עַל שְׁלֹשָׁה֙ פִּשְׁעֵי צֹ֔ר וְ/עַל אַרְבָּעָ֖ה לֹ֣א
    אֲשִׁיבֶ֑/נּוּ עַֽל הַסְגִּירָ֞/ם גָּל֤וּת שְׁלֵמָה֙ לֶ/אֱד֔וֹם וְ/לֹ֥א זָכְר֖וּ
    בְּרִ֥ית אַחִֽים־־־־׃
translation:
  text: 'Thus says the LORD: “For three transgressions of Tyre, and for four, I will
    not revoke its punishment, because they delivered up a whole community of exiles
    to Edom and did not remember a covenant of brotherhood.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “I will not turn it back,” with the object left unstated
      in Hebrew; the sense is that the announced judgment will not be revoked.
    reason: lexical_alternative
  - marker: b
    text: Or “an entire exile community” or “a whole captivity.” The Hebrew phrase
      refers to handing over a complete group of captives/exiles.
    reason: lexical_alternative
  - marker: c
    text: Literally, “a covenant of brothers.”
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  - So says the LORD
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. יְהוָה is rendered 'the LORD' per
    doctrine for the divine name.
- source_word: עַל שְׁלֹשָׁה פִּשְׁעֵי צֹר וְעַל אַרְבָּעָה
  chosen: For three transgressions of Tyre, and for four
  alternatives:
  - Because of three transgressions of Tyre, even four
  - For three crimes of Tyre, and for four
  lexicon: HALOT
  rationale: Preserves the idiomatic numerical escalation formula used in Amos without
    over-paraphrasing. פִּשְׁעֵי is rendered 'transgressions' as a morally charged
    term fitting prophetic indictment.
- source_word: לֹא אֲשִׁיבֶנּוּ
  chosen: I will not revoke its punishment
  alternatives:
  - I will not turn it back
  - I will not relent
  - I will not reverse it
  lexicon: HALOT
  rationale: The idiom literally means 'I will not turn it back,' with the object
    likely referring to the announced judgment/sentence. 'Revoke its punishment' makes
    the sense explicit in natural English while preserving the judicial force.
- source_word: הַסְגִּירָם
  chosen: they delivered up
  alternatives:
  - they handed over
  - they surrendered
  lexicon: HALOT
  rationale: The Hiphil of סגר here denotes handing people over to another power.
    'Delivered up' preserves the formal and grave tone of the accusation.
- source_word: גָּלוּת שְׁלֵמָה
  chosen: a whole community of exiles
  alternatives:
  - an entire exile community
  - a complete captivity
  - a whole captivity
  lexicon: HALOT
  rationale: גָּלוּת can denote exiles/exile group, and שְׁלֵמָה means complete/whole.
    The phrase likely refers to the handing over of an entire population deported
    or captured together, not merely isolated individuals. 'Community of exiles' communicates
    the collective sense better than the less natural 'whole captivity.'
- source_word: לֶאֱדוֹם
  chosen: to Edom
  alternatives:
  - over to Edom
  lexicon: HALOT
  rationale: Simple directional/dative sense after the verb of handing over.
- source_word: וְלֹא זָכְרוּ
  chosen: and did not remember
  alternatives:
  - and did not keep in mind
  - and disregarded
  lexicon: HALOT
  rationale: זכר is literally 'remember.' In covenant contexts it can imply acting
    in accordance with what is remembered, but the main text keeps the lexical sense
    and lets the context carry the ethical implication.
- source_word: בְּרִית אַחִים
  chosen: a covenant of brotherhood
  alternatives:
  - the covenant of brothers
  - a brotherly covenant
  - a covenant between brothers
  lexicon: HALOT
  rationale: בְּרִית is 'covenant'; אַחִים literally 'brothers.' 'Covenant of brotherhood'
    is idiomatic English that preserves the kinship-based alliance idea without flattening
    it to mere friendship.
