theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for the Tetragrammaton and aligns
    with established English Bible convention rooted in Jewish reverence practice.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Implicit object in לֹא אֲשִׁיבֶנּוּ
  chosen_reading: make the judicial sense explicit as 'I will not revoke its punishment'
  alternative_readings:
  - retain the literal ambiguity as 'I will not turn it back'
  - '''I will not revoke it'''
  rationale: The Hebrew leaves the object implicit, but in Amos this formula refers
    to the announced judgment not being withdrawn. Making the object explicit improves
    clarity in modern English while staying within optimal equivalence.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; original-language
    primacy'
