id: AMO.1.6
reference: Amos 1:6
source:
  edition: WLC
  text: כֹּ֚ה אָמַ֣ר יְהוָ֔ה עַל שְׁלֹשָׁה֙ פִּשְׁעֵ֣י עַזָּ֔ה וְ/עַל אַרְבָּעָ֖ה לֹ֣א אֲשִׁיבֶ֑/נּוּ עַל הַגְלוֹתָ֛/ם גָּל֥וּת שְׁלֵמָ֖ה לְ/הַסְגִּ֥יר לֶ/אֱדֽוֹם־־־׃
translation:
  text: 'Thus says Yahweh: “For three transgressions of Gaza, and for four, I will not revoke it, because they carried into exile a whole people to hand them over to Edom.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''I will not turn it back''; the sense in this judgment formula is that the LORD will not revoke the announced punishment.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they exiled a whole captivity'—that is, they deported an entire population or full company of captives.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and the established pattern reflected in the doctrine excerpt.
- source_word: פִּשְׁעֵי
  chosen: transgressions
  alternatives:
  - rebellions
  - crimes
  lexicon: HALOT
  rationale: '''Transgressions'' preserves the moral and covenantal force of פשע without over-specifying a legal category. ''Rebellions'' is possible but can sound too politically narrow here.'
- source_word: עַזָּה
  chosen: Gaza
  rationale: Standard English transliteration of the place name.
- source_word: עַל שְׁלֹשָׁה ... וְעַל אַרְבָּעָה
  chosen: For three ... and for four
  alternatives:
  - For three ... even for four
  lexicon: HALOT
  rationale: Retains the Hebrew numerical escalation formula characteristic of Amos, signaling fullness or excess of guilt rather than a literal count alone.
- source_word: לֹא אֲשִׁיבֶנּוּ
  chosen: I will not revoke its punishment
  alternatives:
  - I will not turn it back
  - I will not relent
  - I will not reverse it
  lexicon: HALOT
  rationale: The idiom literally means 'I will not turn it back.' In this judgment formula, the implied object is the announced punishment/judgment. 'Revoke its punishment' makes the sense explicit in natural English while preserving the force of irreversible judgment. 'Its' refers to Gaza as the corporate entity under judgment.
- source_word: הַגְלוֹתָם
  chosen: they carried away
  alternatives:
  - they exiled
  - they deported
  lexicon: HALOT
  rationale: The infinitive construct with עַל gives the ground of judgment. 'Carried away' is idiomatic and fits the following noun גָּלוּת; 'deported' is possible but sounds more bureaucratic than the prophetic style.
- source_word: גָּלוּת שְׁלֵמָה
  chosen: an entire population into exile
  alternatives:
  - a whole captivity
  - a complete exile
  - a full company of exiles
  lexicon: HALOT
  rationale: The phrase denotes a complete deportation, not merely some captives. 'An entire population into exile' communicates the comprehensiveness of the act in clear modern English.
- source_word: לְהַסְגִּיר
  chosen: to hand them over
  alternatives:
  - to deliver them up
  - to surrender them
  lexicon: HALOT
  rationale: Conveys the sense of transferring captives into another party's control. 'Hand them over' is natural modern English and preserves the moral gravity.
- source_word: לֶאֱדוֹם
  chosen: to Edom
  rationale: Standard English transliteration of the nation name.
