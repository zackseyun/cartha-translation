theological_decisions:
- issue: Implied object of לֹא אֲשִׁיבֶנּוּ in Amos's judgment formula
  chosen_reading: The statement means the LORD will not revoke or turn back the announced punishment against Gaza.
  alternative_readings:
  - I will not turn back my wrath
  - I will not reverse it (leaving the object fully implicit)
  rationale: The Hebrew leaves the object implicit, but in Amos 1–2 the formula consistently introduces irreversible judgment. Supplying 'its punishment' in English clarifies the sense without importing extra doctrine.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Scope of גָּלוּת שְׁלֵמָה
  chosen_reading: The phrase refers to a complete deportation of a population/group, not merely isolated captives.
  alternative_readings:
  - a complete captivity
  - all the captives
  rationale: The wording emphasizes the totality of the slave raid or deportation. Rendering it as 'an entire population into exile' preserves that force in readable English.
  doctrine_reference: Translation philosophy §1, §6
