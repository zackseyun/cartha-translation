id: AMO.1.8
reference: Amos 1:8
source:
  edition: WLC
  text: וְ/הִכְרַתִּ֤י יוֹשֵׁב֙ מֵֽ/אַשְׁדּ֔וֹד וְ/תוֹמֵ֥ךְ שֵׁ֖בֶט מֵֽ/אַשְׁקְל֑וֹן
    וַ/הֲשִׁיב֨וֹתִי יָדִ֜/י עַל עֶקְר֗וֹן וְ/אָֽבְדוּ֙ שְׁאֵרִ֣ית פְּלִשְׁתִּ֔ים
    אָמַ֖ר אֲדֹנָ֥/י יְהוִֽה־׃פ
translation:
  text: And I will cut off the inhabitant from Ashdod, and the one who holds the scepter
    from Ashkelon; I will turn my hand against Ekron, and the remnant of the Philistines
    shall perish,” says the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the ruler from Ashkelon'; literally, 'the one who holds the scepter.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'I will bring back my hand against Ekron.' The Hebrew idiom conveys
      directed judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִכְרַתִּי
  chosen: I will cut off
  alternatives:
  - I will destroy
  - I will wipe out
  lexicon: HALOT
  rationale: כרת in the Hiphil commonly means to cut off, remove, or exterminate.
    'Cut off' preserves the covenant-judgment idiom and is more textually transparent
    than the more interpretive 'destroy.'
- source_word: יוֹשֵׁב
  chosen: the inhabitant
  alternatives:
  - the one who dwells
  - the ruler
  lexicon: HALOT
  rationale: Literally 'one dwelling/inhabiting.' In judgment oracles it can function
    collectively for the population or representative resident. 'The inhabitant' keeps
    the singular representative force without overinterpreting it as specifically
    'ruler.'
- source_word: מֵאַשְׁדּוֹד
  chosen: from Ashdod
  lexicon: HALOT
  rationale: Straightforward preposition plus place name; transliterated as a standard
    English form of the Philistine city.
- source_word: וְתוֹמֵךְ שֵׁבֶט
  chosen: the one who holds the scepter
  alternatives:
  - the scepter-holder
  - the ruler
  lexicon: HALOT
  rationale: The participle of תמך means 'hold, grasp, support,' and שֵׁבֶט here denotes
    a ruler's staff/scepter. The phrase is idiomatic for one exercising rule. 'The
    one who holds the scepter' preserves the imagery better than flattening it to
    'the ruler.'
- source_word: מֵאַשְׁקְלוֹן
  chosen: from Ashkelon
  lexicon: HALOT
  rationale: Straightforward preposition plus place name; transliterated in standard
    English form.
- source_word: וַהֲשִׁיבוֹתִי יָדִי עַל
  chosen: I will turn my hand against
  alternatives:
  - I will bring back my hand against
  - I will stretch out my hand against
  lexicon: HALOT
  rationale: The idiom 'turn/bring back the hand against' expresses renewed or directed
    action in judgment. 'Turn my hand against' is idiomatic English that preserves
    the metaphor without importing the distinct idiom 'stretch out my hand,' which
    is not the wording here.
- source_word: עַל עֶקְרוֹן
  chosen: against Ekron
  alternatives:
  - upon Ekron
  lexicon: HALOT
  rationale: With the hostile sense of עַל in a judgment context, 'against' is the
    most natural English rendering.
- source_word: וְאָבְדוּ
  chosen: shall perish
  alternatives:
  - will be destroyed
  - shall vanish
  lexicon: HALOT
  rationale: אבד commonly means perish, be destroyed, or disappear. 'Shall perish'
    preserves the intransitive/resultative force and the solemn tone of prophetic
    judgment.
- source_word: שְׁאֵרִית פְּלִשְׁתִּים
  chosen: the remnant of the Philistines
  alternatives:
  - what remains of the Philistines
  - the survivors of the Philistines
  lexicon: HALOT
  rationale: שְׁאֵרִית means remnant, remainder, survivors. 'Remnant' is the standard
    rendering and preserves the thematic resonance of what is left after judgment,
    here in a negative sense.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Following the doctrine's contested-terms guidance, יְהוָה is rendered
    'the LORD.' In the compound title אֲדֹנָי יְהוִה, standard English convention
    avoids 'Lord LORD' by rendering it 'Lord GOD,' preserving both elements while
    remaining readable.
