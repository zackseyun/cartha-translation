theological_decisions:
- issue: Rendering the divine name in the title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - Lord Yahweh
  - the Lord Yahweh
  rationale: The project default renders יְהוָה as 'the LORD.' In the fixed combination
    אֲדֹנָי יְהוִה, English translations commonly use 'Lord GOD' to avoid the awkward
    duplication 'Lord LORD.' This preserves reverential convention and distinguishes
    the title from a simple single divine name occurrence.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
