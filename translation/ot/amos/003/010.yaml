theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Moral inability versus mere ignorance in 'they do not know to do right'
  chosen_reading: They do not know how to do what is right
  alternative_readings:
  - They do not know to do right
  - They do not know what is right
  rationale: The Hebrew expresses more than lack of information; it indicts a society so corrupted that right action is no longer within its practiced moral knowledge. The chosen English preserves that ethical force without overstating total incapacity.
