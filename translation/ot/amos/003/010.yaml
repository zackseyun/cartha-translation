id: AMO.3.10
reference: Amos 3:10
source:
  edition: WLC
  text: וְ/לֹֽא יָדְע֥וּ עֲשׂוֹת נְכֹחָ֖ה נְאֻם יְהוָ֑ה הָ/אֽוֹצְרִ֛ים חָמָ֥ס וָ/שֹׁ֖ד בְּ/אַרְמְנֽוֹתֵי/הֶֽם־־־׃פ
translation:
  text: They do not know how to do what is right—oracle of Yahweh—those who store up violence and destruction in their citadels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'plunder' for 'devastation.'
    reason: lexical_alternative
  - marker: b
    text: Or 'palaces' for 'citadels.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדְעוּ
  chosen: do not know
  alternatives:
  - have not learned
  - do not understand
  lexicon: HALOT
  rationale: 'ידע commonly denotes knowing or understanding. Here with the infinitive עֲשׂוֹת it expresses moral incapacity/ignorance: they do not know how to act rightly.'
- source_word: עֲשׂוֹת נְכֹחָה
  chosen: to do what is right
  alternatives:
  - to act uprightly
  - to do straightness
  lexicon: HALOT
  rationale: נְכֹחָה carries the sense of straightness/uprightness/right conduct. In idiomatic English, 'to do what is right' best captures the moral sense without woodenness.
- source_word: נְאֻם יְהוָה
  chosen: oracle of the LORD
  alternatives:
  - declares the LORD
  - utterance of the LORD
  lexicon: HALOT
  rationale: נְאֻם is a prophetic formula introducing or punctuating divine speech. 'Oracle of the LORD' preserves the formal prophetic register. YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הָאֹצְרִים
  chosen: those who store up
  alternatives:
  - those who treasure up
  - those who heap up
  lexicon: HALOT
  rationale: From אצר, to store up or accumulate. The participle characterizes them as people habitually amassing what follows.
- source_word: חָמָס
  chosen: violence
  alternatives:
  - wrongdoing
  - violence/injustice
  lexicon: HALOT
  rationale: חָמָס often denotes violent wrongdoing or oppression. 'Violence' is the most direct and common rendering in prophetic denunciations.
- source_word: שֹׁד
  chosen: devastation
  alternatives:
  - plunder
  - destruction
  - spoil
  lexicon: HALOT
  rationale: שֹׁד can denote violent destruction or plunder. In parallel with חָמָס and in the image of accumulated social evil, 'devastation' captures the destructive result; the alternative 'plunder' is preserved in a footnote because it is also plausible.
- source_word: בְּאַרְמְנוֹתֵיהֶם
  chosen: in their citadels
  alternatives:
  - in their palaces
  - in their strongholds
  lexicon: HALOT
  rationale: אַרְמוֹן can refer to a palace, fortified residence, or citadel. Given Amos's critique of elite power structures, 'citadels' conveys both wealth and fortified security; 'palaces' remains a strong alternative and is preserved in a footnote.
