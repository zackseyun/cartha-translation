id: AMO.3.7
reference: Amos 3:7
source:
  edition: WLC
  text: כִּ֣י לֹ֧א יַעֲשֶׂ֛ה אֲדֹנָ֥/י יְהוִ֖ה דָּבָ֑ר כִּ֚י אִם גָּלָ֣ה סוֹד֔/וֹ אֶל עֲבָדָ֖י/ו הַ/נְּבִיאִֽים־־׃
translation:
  text: For the Lord GOD does nothing unless he reveals his secret to his servants the prophets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his secret' or 'his confidential plan.' The Hebrew word can refer to confidential counsel, intimate deliberation, or a secret matter.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Surely
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces the ground or explanation for the preceding assertion, so 'For' best fits the discourse flow in English.
- source_word: לֹא ... כִּי אִם
  chosen: does nothing unless
  alternatives:
  - does not do ... except
  - surely does not do ... unless
  lexicon: HALOT
  rationale: 'The combination of negation with כִּי אִם expresses exception: YHWH does not act without first doing the stated action. ''Does nothing unless'' is idiomatic English and preserves the force.'
- source_word: יַעֲשֶׂה
  chosen: does
  alternatives:
  - acts
  - does a thing
  lexicon: HALOT
  rationale: עשה is broad ('do, make'). With דָּבָר following, English naturally compresses the phrase to 'does nothing' rather than the wooden 'does a thing.'
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD Yahweh
  lexicon: HALOT
  rationale: The compound divine title combines אֲדֹנָי with the divine name YHWH. Following the doctrine default, YHWH is rendered 'the LORD.' Because English convention avoids 'Lord LORD,' the standard equivalent for אֲדֹנָי יְהוִה is 'the Lord GOD,' preserving both elements reverently and intelligibly.
- source_word: דָּבָר
  chosen: nothing
  alternatives:
  - a thing
  - anything
  lexicon: HALOT
  rationale: Literally 'a thing/matter.' In the negative-exception construction, English idiom prefers 'nothing' or 'anything.' 'Nothing' yields the clearest and most natural rendering.
- source_word: גָּלָה
  chosen: reveals
  alternatives:
  - has revealed
  - uncovers
  - discloses
  lexicon: HALOT
  rationale: The verb means 'uncover, reveal.' Present 'reveals' works well in English as a general principle corresponding to the Hebrew verbal sequence in this proverbial statement.
- source_word: סוֹדוֹ
  chosen: his secret counsel
  alternatives:
  - his secret
  - his plan
  - his council
  lexicon: HALOT
  rationale: סוֹד can denote confidential counsel, intimate deliberation, or secret plan. 'Secret counsel' preserves both the secrecy and deliberative nuance better than the bare 'secret.' 'Council' could be misunderstood as an assembly rather than counsel/content.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition; 'to' is the natural modern English equivalent.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in this prophetic context the emphasis is on commissioned service to God rather than bonded status. 'Servants' is the most contextually fitting rendering.
- source_word: הַנְּבִיאִים
  chosen: the prophets
  lexicon: HALOT
  rationale: Definite plural noun; 'the prophets' straightforwardly represents the Hebrew.
