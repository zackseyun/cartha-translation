theological_decisions:
- issue: Rendering the divine name YHWH within the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of סוֹד
  chosen_reading: his secret counsel
  alternative_readings:
  - his secret
  - his confidential plan
  rationale: The verse teaches divine disclosure to prophets, but the wording should not over-specify a full deterministic decree beyond the lexical range. 'Secret counsel' preserves the theological idea of God's hidden deliberation without importing later systematic categories.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
