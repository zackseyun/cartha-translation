id: AMO.3.4
reference: Amos 3:4
source:
  edition: WLC
  text: הֲ/יִשְׁאַ֤ג אַרְיֵה֙ בַּ/יַּ֔עַר וְ/טֶ֖רֶף אֵ֣ין ל֑/וֹ הֲ/יִתֵּ֨ן כְּפִ֤יר
    קוֹל/וֹ֙ מִ/מְּעֹ֣נָת֔/וֹ בִּלְתִּ֖י אִם לָכָֽד־׃
translation:
  text: Does a lion roar in the forest when it has no prey? Does a young lion raise
    its voice from its den unless it has caught something?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from its lair.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'unless it has caught.' The object is implied by context.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׁאַג
  chosen: roar
  alternatives:
  - growl
  lexicon: HALOT
  rationale: The verb denotes the loud cry of a lion. 'Roar' is the standard and most
    natural English equivalent in this rhetorical question.
- source_word: אַרְיֵה
  chosen: lion
  lexicon: HALOT
  rationale: Straightforward animal term; 'lion' fits the imagery and parallelism.
- source_word: בַּיַּעַר
  chosen: in the forest
  alternatives:
  - in the thicket
  - in the woodland
  lexicon: HALOT
  rationale: יַעַר commonly means 'forest/woodland.' 'Forest' is clear modern English
    and preserves the setting of the lion's roar.
- source_word: טֶרֶף
  chosen: prey
  alternatives:
  - food
  - something torn
  lexicon: HALOT
  rationale: The noun refers to prey or torn food. 'Prey' best matches the hunting
    context and the logic of the rhetorical question.
- source_word: אֵין לוֹ
  chosen: it has no
  alternatives:
  - there is none for it
  - it has not
  lexicon: HALOT
  rationale: This idiom expresses absence or lack. Rendering it as 'it has no' is
    idiomatic in English and fits the animal-subject construction.
- source_word: יִתֵּן קוֹלוֹ
  chosen: raise its voice
  alternatives:
  - utter its voice
  - give its voice
  - cry out
  lexicon: HALOT
  rationale: Literally 'give its voice,' a Hebrew idiom for vocalizing. 'Raise its
    voice' preserves the idiomatic force without sounding wooden.
- source_word: כְּפִיר
  chosen: young lion
  alternatives:
  - lion cub
  lexicon: HALOT
  rationale: The term denotes a young, vigorous lion rather than a tiny cub. 'Young
    lion' is the usual and best contextual rendering.
- source_word: מִמְּעֹנָתוֹ
  chosen: from its den
  alternatives:
  - from its lair
  - from its dwelling
  lexicon: HALOT
  rationale: The noun refers to an animal's habitation. 'Den' is natural English for
    a lion's place and suits the imagery.
- source_word: בִּלְתִּי אִם
  chosen: unless
  alternatives:
  - except that
  - if not
  lexicon: HALOT
  rationale: This combination introduces an exception condition. 'Unless' is the clearest
    idiomatic English equivalent.
- source_word: לָכָד
  chosen: has caught something
  alternatives:
  - has seized prey
  - has captured
  lexicon: HALOT
  rationale: The verb means to capture or seize. Supplying 'something' makes the English
    complete while staying within the implied object from context, namely prey.
