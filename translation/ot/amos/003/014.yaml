id: AMO.3.14
reference: Amos 3:14
source:
  edition: WLC
  text: כִּ֗י בְּ/י֛וֹם פָּקְדִ֥/י פִשְׁעֵֽי יִשְׂרָאֵ֖ל עָלָ֑י/ו וּ/פָֽקַדְתִּי֙
    עַל מִזְבְּח֣וֹת בֵּֽית אֵ֔ל וְ/נִגְדְּעוּ֙ קַרְנ֣וֹת הַ/מִּזְבֵּ֔חַ וְ/נָפְל֖וּ
    לָ/אָֽרֶץ־־־׃
translation:
  text: For on the day when I punish Israel for his transgressions, I will also punish
    the altars of Bethel; the horns of the altar will be cut off and fall to the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when I visit Israel for his rebellions'; the Hebrew verb can mean 'visit'
      in the sense of calling to account or punishing.
    reason: lexical_alternative
  - marker: b
    text: The 'horns' were the horn-like projections at the corners of the altar,
      associated with its sanctity and ritual use.
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Surely
  - Indeed
  - When
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding declaration. 'For'
    best preserves the causal/explanatory force in context.
- source_word: בְּיוֹם
  chosen: on the day
  alternatives:
  - in the day
  - when
  lexicon: HALOT
  rationale: A temporal expression. 'On the day' keeps the Hebrew idiom while remaining
    natural English; the clause as a whole conveys the time of judgment.
- source_word: פָּקְדִי
  chosen: when I punish
  alternatives:
  - when I visit
  - when I attend to
  - when I call to account
  lexicon: HALOT
  rationale: פקד in judgment contexts commonly means to visit with punishment or call
    to account. 'Punish' makes the judicial sense explicit in clear modern English.
- source_word: פִשְׁעֵי
  chosen: transgressions
  alternatives:
  - rebellions
  - crimes
  lexicon: HALOT
  rationale: פשע denotes acts of rebellion or transgression against rightful authority.
    'Transgressions' is a standard, accurate rendering that preserves moral and covenantal
    force.
- source_word: יִשְׂרָאֵל עָלָיו
  chosen: Israel for his transgressions
  alternatives:
  - Israel for its transgressions
  - against him
  lexicon: HALOT
  rationale: 'The prepositional phrase with pronominal suffix marks the object of
    punishment: ''upon him/it,'' i.e., upon Israel. English expresses this naturally
    as ''Israel for his transgressions.'' ''His'' follows the singular grammatical
    form of the nation; ''its'' is possible but less personal in prophetic discourse.'
- source_word: וּפָקַדְתִּי עַל
  chosen: I will also punish
  alternatives:
  - I will punish
  - I will visit judgment upon
  lexicon: HALOT
  rationale: The repeated פקד links Israel's punishment with judgment on Bethel's
    cultic apparatus. 'Also' brings out the additive force of the conjunction in context.
- source_word: מִזְבְּחוֹת בֵּית אֵל
  chosen: the altars of Bethel
  alternatives:
  - Bethel's altars
  lexicon: HALOT
  rationale: A straightforward construct chain. 'Bethel' is transliterated as a place
    name; 'the altars of Bethel' is clear and formal enough for prophetic denunciation.
- source_word: וְנִגְדְּעוּ
  chosen: will be cut off
  alternatives:
  - will be chopped off
  - will be hewn down
  lexicon: HALOT
  rationale: גדע conveys being cut down/off, often violently. 'Will be cut off' is
    idiomatic and suits the passive/resultative sense here.
- source_word: קַרְנוֹת הַמִּזְבֵּחַ
  chosen: the horns of the altar
  alternatives:
  - the altar's horns
  lexicon: HALOT
  rationale: A literal rendering is important because the 'horns' are a specific cultic
    feature of Israelite altars, not a metaphor to be flattened.
- source_word: וְנָפְלוּ לָאָרֶץ
  chosen: and fall to the ground
  alternatives:
  - and fall to the earth
  - and drop to the ground
  lexicon: HALOT
  rationale: The sequence describes the result of the horns being severed. 'To the
    ground' is the most natural English equivalent of לָאָרֶץ in this physical setting.
