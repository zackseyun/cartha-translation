theological_decisions:
- issue: Rendering the nation Israel with a singular pronoun
  chosen_reading: Israel for his transgressions
  alternative_readings:
  - Israel for its transgressions
  rationale: The Hebrew suffix is singular, referring back to the singular collective
    noun 'Israel.' Using 'his' preserves the personal, covenantal portrayal of the
    nation in prophetic speech. 'Its' is possible in English but can depersonalize
    the addressee.
  doctrine_reference: DOCTRINE.md §Translation philosophy, gender-accurate over gender-neutral
- issue: Whether to preserve cultic imagery literally
  chosen_reading: the horns of the altar
  alternative_readings:
  - the projections of the altar
  rationale: The Hebrew refers to the literal horn-like corners of the altar, a significant
    cultic detail. Preserving the image avoids interpretive flattening and keeps the
    prophetic judgment focused on the sanctuary's symbolic power being broken.
  doctrine_reference: DOCTRINE.md §Translation philosophy, original-language primacy
    over translation tradition
