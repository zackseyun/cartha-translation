id: AMO.3.13
reference: Amos 3:13
source:
  edition: WLC
  text: שִׁמְע֥וּ וְ/הָעִ֖ידוּ בְּ/בֵ֣ית יַֽעֲקֹ֑ב נְאֻם אֲדֹנָ֥/י יְהוִ֖ה אֱלֹהֵ֥י הַ/צְּבָאֽוֹת־׃
translation:
  text: Hear and testify against the house of Jacob, declares the Lord GOD, the God of hosts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bear witness against the house of Jacob'; the Hebrew verb can mean to give testimony or witness in a judicial sense.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the Lord GOD' represents the compound divine title 'Adonai YHWH.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen
  lexicon: HALOT
  rationale: Imperative plural of שׁמע. 'Hear' preserves the prophetic summons with slightly more formal force than 'listen,' fitting the courtroom/witness context.
- source_word: וְהָעִידוּ
  chosen: testify against
  alternatives:
  - bear witness against
  - warn
  lexicon: HALOT
  rationale: Hiphil imperative plural of עוד in this context carries the sense of giving witness, likely in accusation against Israel. The preposition בְּ with 'house of Jacob' is best taken here in a hostile/against sense in a judicial setting, so 'testify against' makes the implied force explicit in natural English.
- source_word: בְּבֵית יַעֲקֹב
  chosen: against the house of Jacob
  alternatives:
  - in the house of Jacob
  - to the house of Jacob
  lexicon: HALOT
  rationale: Literally 'in/against the house of Jacob.' Given the surrounding judgment context in Amos 3 and the forensic nuance of הָעִידוּ, English 'against the house of Jacob' best conveys the sense. 'House of Jacob' is retained as a covenantal designation for Israel.
- source_word: נְאֻם
  chosen: declares
  alternatives:
  - oracle of
  - utterance of
  lexicon: HALOT
  rationale: Standard prophetic formula introducing divine speech. 'Declares' is idiomatic modern English and preserves the solemn authority of the formula better than the more wooden 'oracle of' in running translation.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - Lord Yahweh
  - the Lord, the LORD
  lexicon: HALOT
  rationale: The compound divine title is conventionally rendered 'Lord GOD' in English to distinguish אֲדֹנָי + YHWH. Per doctrine, YHWH is rendered 'the LORD'; in this fixed combination, 'GOD' signals the underlying divine name without producing the awkward 'Lord LORD.'
- source_word: אֱלֹהֵי הַצְּבָאוֹת
  chosen: the God of hosts
  alternatives:
  - God of armies
  - God of heavenly armies
  lexicon: HALOT
  rationale: Traditional but still intelligible rendering of the title, preserving the breadth of צְבָאוֹת ('hosts/armies') without over-specifying earthly or heavenly referents. It carries the title's theological weight and intertextual familiarity.
