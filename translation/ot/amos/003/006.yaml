id: AMO.3.6
reference: Amos 3:6
source:
  edition: WLC
  text: אִם יִתָּקַ֤ע שׁוֹפָר֙ בְּ/עִ֔יר וְ/עָ֖ם לֹ֣א יֶחֱרָ֑דוּ אִם תִּהְיֶ֤ה רָעָה֙ בְּ/עִ֔יר וַ/יהוָ֖ה לֹ֥א עָשָֽׂה־־׃
translation:
  text: If a trumpet is blown in a city, do not the people tremble? If disaster happens in a city, has not Yahweh done it?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'calamity.' The Hebrew word can also be rendered 'evil,' but here it refers to disaster or judgment, not moral evil.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתָּקַע שׁוֹפָר
  chosen: a trumpet is blown
  alternatives:
  - a horn is blown
  - the ram's horn is sounded
  lexicon: HALOT
  rationale: שׁוֹפָר refers to a horn/trumpet used as an alarm signal. 'Trumpet' is the most natural modern English rendering in this warning context, while preserving the public alarm function. The passive-like Niphal of תקע is well represented by 'is blown.'
- source_word: בְּעִיר
  chosen: in a city
  alternatives:
  - in the city
  - in a town
  lexicon: HALOT
  rationale: עִיר is the ordinary term for a city/town. 'City' fits the repeated civic setting and keeps the parallelism clear.
- source_word: וְעָם
  chosen: the people
  alternatives:
  - a people
  - the populace
  lexicon: HALOT
  rationale: Though anarthrous in Hebrew, English idiom in this rhetorical question naturally takes 'the people,' referring to the inhabitants of the city.
- source_word: יֶחֱרָדוּ
  chosen: tremble
  alternatives:
  - are afraid
  - quake
  - shudder
  lexicon: HALOT
  rationale: חרד conveys trembling in fear or alarm. 'Tremble' preserves both the physical and emotional force and suits the rhetorical parallel.
- source_word: רָעָה
  chosen: disaster
  alternatives:
  - calamity
  - evil
  lexicon: HALOT
  rationale: In this context רָעָה refers to harmful calamity/judgment, not moral evil. 'Disaster' avoids implying that the LORD commits moral evil while preserving the text's claim that he brings judgment.
- source_word: תִּהְיֶה
  chosen: happens
  alternatives:
  - comes
  - occurs
  - is
  lexicon: HALOT
  rationale: With רָעָה in context, the sense is that disaster comes to pass in the city. 'Happens' is idiomatic modern English and fits the rhetorical question.
- source_word: וַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - the Lord
  lexicon: HALOT
  rationale: Per doctrine guidelines, יְהוָה is rendered 'the LORD,' following established reverential convention and signaling the divine name.
- source_word: עָשָׂה
  chosen: done it
  alternatives:
  - caused it
  - brought it about
  - made it
  lexicon: HALOT
  rationale: עשה is broad ('do, make'). 'Done it' is a close rendering and preserves the starkness of the Hebrew rhetorical question. The object is implicit from the prior clause and naturally supplied as 'it' in English.
