id: AMO.3.3
reference: Amos 3:3
source:
  edition: WLC
  text: הֲ/יֵלְכ֥וּ שְׁנַ֖יִם יַחְדָּ֑ו בִּלְתִּ֖י אִם נוֹעָֽדוּ־׃
translation:
  text: Do two walk together unless they have agreed to meet?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'unless they have agreed' or 'unless they have appointed a meeting.'
      The Hebrew verb carries the sense of arranging or agreeing to meet by prior
      appointment.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/יֵלְכוּ
  chosen: Do ... walk
  alternatives:
  - Will ... walk
  - Can ... walk
  lexicon: HALOT
  rationale: הלך in the imperfect with interrogative הֲ introduces a rhetorical question.
    English 'Do ... walk' best captures the gnomic, proverbial force without implying
    mere futurity.
- source_word: שְׁנַיִם
  chosen: two
  lexicon: HALOT
  rationale: Cardinal numeral referring simply to two persons; no need to specify
    gender in English.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - along together
  lexicon: HALOT
  rationale: Adverb meaning 'together, jointly.' 'Together' is the natural concise
    English equivalent.
- source_word: בִּלְתִּי אִם
  chosen: unless
  alternatives:
  - except if
  - unless indeed
  lexicon: HALOT
  rationale: The combination functions idiomatically as an exceptive condition, best
    rendered 'unless' in smooth modern English.
- source_word: נוֹעָדוּ
  chosen: have agreed to meet
  alternatives:
  - have agreed
  - have appointed a meeting
  - have met by appointment
  lexicon: HALOT
  rationale: From יעד in the Niphal, conveying mutual appointment or agreement to
    meet. 'Have agreed to meet' makes explicit the reciprocal nuance and fits the
    proverb's logic better than the vaguer 'have agreed.'
