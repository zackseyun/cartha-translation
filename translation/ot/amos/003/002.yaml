id: AMO.3.2
reference: Amos 3:2
source:
  edition: WLC
  text: רַ֚ק אֶתְ/כֶ֣ם יָדַ֔עְתִּי מִ/כֹּ֖ל מִשְׁפְּח֣וֹת הָ/אֲדָמָ֑ה עַל כֵּן֙ אֶפְקֹ֣ד
    עֲלֵי/כֶ֔ם אֵ֖ת כָּל עֲוֺנֹֽתֵי/כֶֽם־־׃
translation:
  text: You only have I known from among all the families of the earth; therefore
    I will punish you for all your iniquities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You only have I chosen/acknowledged among all the families of the earth.'
      The Hebrew 'known' can carry covenantal overtones.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'I will visit upon you all your iniquities,' that is, 'I will
      call you to account for them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  chosen: only
  alternatives:
  - alone
  - exclusively
  lexicon: HALOT
  rationale: Marks exclusivity emphatically at the front of the clause. 'Only' is
    the most natural concise English equivalent.
- source_word: יָדַעְתִּי
  chosen: have I known
  alternatives:
  - have chosen
  - have acknowledged
  - have had regard for
  lexicon: HALOT
  rationale: Hebrew ידע can denote relational knowledge, often covenantal in context.
    'Known' preserves the source wording and theological texture without prematurely
    interpreting it as 'chosen' in the main text. The covenantal nuance is important
    but better explained in documentation than substituted into the translation.
- source_word: מִכֹּל מִשְׁפְּחוֹת הָאֲדָמָה
  chosen: from among all the families of the earth
  alternatives:
  - out of all the clans of the ground
  - from all the families of the land
  lexicon: HALOT
  rationale: מִשְׁפְּחוֹת is best rendered 'families' here in a collective ethnological
    sense. הָאֲדָמָה in this context refers broadly to the earth/world of humanity
    rather than merely local 'land'; 'of the earth' is the most idiomatic and contextually
    fitting rendering.
- source_word: עַל־כֵּן
  chosen: therefore
  alternatives:
  - for that reason
  - so
  lexicon: HALOT
  rationale: Signals consequence from Israel's unique relationship to ensuing judgment.
    'Therefore' preserves the formal logical connection clearly.
- source_word: אֶפְקֹד עֲלֵיכֶם
  chosen: I will punish you
  alternatives:
  - I will visit upon you
  - I will call you to account
  - I will attend to you
  lexicon: HALOT
  rationale: פקד has a broad semantic range, but in judgment contexts with sins as
    object it commonly means to punish or call to account. 'Punish you' communicates
    the judicial force clearly in modern English, while the alternative more literal
    idiom is preserved in a footnote.
- source_word: עֲוֺנֹתֵיכֶם
  chosen: your iniquities
  alternatives:
  - your sins
  - your guilt
  lexicon: HALOT
  rationale: עָוֹן often carries the sense of guilt/iniquity rather than the more
    general 'sin.' 'Iniquities' preserves the moral and judicial weight of the Hebrew.
