theological_decisions:
- issue: Covenantal nuance of 'known' (יָדַע)
  chosen_reading: Retain 'known' in the main text with covenant-election nuance implied
    by context.
  alternative_readings:
  - translate explicitly as 'chosen'
  - translate as 'acknowledged'
  rationale: 'The verse speaks of Israel''s unique covenant relationship with the
    LORD, but the Hebrew verb is ''know.'' Preserving ''known'' maintains lexical
    transparency and theological tension: divine election is implied without importing
    a narrower doctrinal formulation into the wording itself.'
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Judicial force of פקד
  chosen_reading: Render as 'punish' in the main text.
  alternative_readings:
  - '''visit upon'''
  - '''call to account'''
  rationale: In this context the consequence of covenant privilege is judgment for
    wrongdoing. 'Punish' best conveys the plain sense in readable modern English without
    archaic idiom, while a more literal alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 6
