theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for the Tetragrammaton is 'the LORD,' following Jewish
    reverence tradition and the Septuagintal pattern, while preserving alternatives
    only as lexical possibilities rather than adopting them in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered covenant designation בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - children of Israel
  - people of Israel
  rationale: The source is grammatically masculine plural and carries a corporate
    familial sense. Per the project's gender-accurate policy, the masculine form is
    retained rather than neutralized, while an idiomatic alternative is preserved
    in a footnote for readability.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
