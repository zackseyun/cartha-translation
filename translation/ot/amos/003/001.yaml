id: AMO.3.1
reference: Amos 3:1
source:
  edition: WLC
  text: שִׁמְע֞וּ אֶת הַ/דָּבָ֣ר הַ/זֶּ֗ה אֲשֶׁ֨ר דִּבֶּ֧ר יְהוָ֛ה עֲלֵי/כֶ֖ם בְּנֵ֣י
    יִשְׂרָאֵ֑ל עַ֚ל כָּל הַ/מִּשְׁפָּחָ֔ה אֲשֶׁ֧ר הֶעֱלֵ֛יתִי מֵ/אֶ֥רֶץ מִצְרַ֖יִם
    לֵ/אמֹֽר־־׃
translation:
  text: 'Hear this word that the LORD has spoken against you, sons of Israel, against
    the whole family that I brought up from the land of Egypt, saying:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'children of Israel' or 'people of Israel.' The Hebrew reads 'sons of
      Israel,' preserving the familial covenant idiom.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen to
  lexicon: HALOT
  rationale: Imperative plural of שׁמע. 'Hear' preserves the prophetic summons and
    covenantal resonance better than the more colloquial 'listen to.'
- source_word: הַדָּבָר הַזֶּה
  chosen: this word
  alternatives:
  - this message
  - this matter
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'message.' In prophetic discourse,
    'word' is the most transparent and traditional rendering, preserving the sense
    of a divine utterance.
- source_word: דִּבֶּר יְהוָה
  chosen: the LORD has spoken
  alternatives:
  - the LORD spoke
  lexicon: HALOT
  rationale: English present perfect fits the Hebrew perfect in introducing a speech
    whose force continues into the present discourse. יְהוָה is rendered 'the LORD'
    per doctrine guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered 'the LORD' in keeping with the project's
    stated default for יְהוָה.
- source_word: עֲלֵיכֶם
  chosen: against you
  alternatives:
  - concerning you
  - about you
  lexicon: HALOT
  rationale: In this prophetic judgment context, על with דבר conveys speech directed
    adversely toward the audience; 'against you' best reflects the confrontational
    force.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: sons of Israel
  alternatives:
  - children of Israel
  - people of Israel
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural construct. 'Sons of Israel'
    is the most gender-accurate rendering and preserves the familial/covenantal idiom;
    more idiomatic alternatives are possible but less formally precise.
- source_word: עַל כָּל הַמִּשְׁפָּחָה
  chosen: against the whole family
  alternatives:
  - against the whole clan
  - concerning the whole household
  lexicon: HALOT
  rationale: מִשְׁפָּחָה here refers corporately to the kin-group descended from the
    exodus community. 'Family' is natural English and preserves the covenant-kinship
    idea. 'Against' is repeated to mirror the Hebrew preposition and maintain the
    judicial tone.
- source_word: הֶעֱלֵיתִי
  chosen: I brought up
  alternatives:
  - I brought out
  lexicon: HALOT
  rationale: עלה in the Hiphil commonly describes the exodus as 'bringing up' from
    Egypt. Retaining 'up' reflects the Hebrew idiom and intertextual exodus language.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of the land of Egypt
  lexicon: HALOT
  rationale: Both are possible; 'from the land of Egypt' is slightly more direct with
    the preceding 'brought up,' while still preserving the standard exodus formula.
- source_word: לֵאמֹר
  chosen: 'saying:'
  alternatives:
  - 'as follows:'
  lexicon: HALOT
  rationale: Standard speech-introduction formula. Since the content follows in the
    next verse, 'saying:' appropriately signals continuation.
