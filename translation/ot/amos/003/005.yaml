id: AMO.3.5
reference: Amos 3:5
source:
  edition: WLC
  text: הֲ/תִפֹּ֤ל צִפּוֹר֙ עַל פַּ֣ח הָ/אָ֔רֶץ וּ/מוֹקֵ֖שׁ אֵ֣ין לָ֑/הּ הֲ/יַֽעֲלֶה
    פַּח֙ מִן הָ֣/אֲדָמָ֔ה וְ/לָכ֖וֹד לֹ֥א יִלְכּֽוֹד־־־׃
translation:
  text: Does a bird fall into a trap on the ground when there is no snare for it?
    Does a trap spring up from the ground when it has caught nothing at all?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when there is no bait/trigger for it'; the Hebrew term behind 'snare'
      can refer more specifically to what lures or activates the trap.
    reason: lexical_alternative
  - marker: b
    text: Literally 'and to catch it does not catch,' an emphatic Hebrew construction
      meaning 'it certainly catches nothing' or 'without catching anything.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִפֹּל
  chosen: fall
  alternatives:
  - be caught
  lexicon: HALOT
  rationale: The basic sense of נפל is 'fall.' In the trap imagery, English 'fall
    into a trap' naturally conveys being ensnared without over-paraphrasing. 'Be caught'
    is interpretive and therefore kept as an alternative rather than the main rendering.
- source_word: צִפּוֹר
  chosen: bird
  alternatives:
  - birdling
  - sparrow
  lexicon: HALOT
  rationale: A general term for a bird, not a specific species in this context. 'Bird'
    preserves the generic force of the proverb-like question.
- source_word: פַּח
  chosen: trap
  alternatives:
  - snare
  - net
  lexicon: HALOT
  rationale: פַּח denotes a trap used for catching birds or animals. 'Trap' is clear
    modern English and fits both occurrences in the verse. 'Snare' is possible but
    is reserved here for מוֹקֵשׁ to preserve the distinction between the two related
    terms.
- source_word: הָאָרֶץ
  chosen: on the ground
  alternatives:
  - to the earth
  - on the earth
  lexicon: HALOT
  rationale: In this concrete hunting image, 'on the ground' is more idiomatic and
    specific than the more wooden 'on the earth.'
- source_word: מוֹקֵשׁ
  chosen: snare
  alternatives:
  - bait
  - trigger
  - trap-mechanism
  lexicon: HALOT
  rationale: מוֹקֵשׁ is the enticement or snaring device associated with the trap.
    Rendering it 'snare' preserves a distinction from פַּח ('trap'). Some interpreters
    take it as the bait or trigger; that narrower sense is preserved in a footnote.
- source_word: אֵין לָהּ
  chosen: there is no snare for it
  alternatives:
  - it has no bait
  - there is nothing set for it
  lexicon: HALOT
  rationale: The phrase denies the presence of what would make the bird fall into
    the trap. 'For it' reflects the pronominal suffix and keeps the line concise.
    Because the exact nuance of מוֹקֵשׁ is debated, alternatives are noted.
- source_word: יַעֲלֶה
  chosen: spring up
  alternatives:
  - rise up
  - come up
  lexicon: HALOT
  rationale: עלה literally means 'go up/rise.' In the context of a trap activated
    from the ground, 'spring up' captures the physical motion in natural English without
    losing the imagery.
- source_word: הָאֲדָמָה
  chosen: from the ground
  alternatives:
  - from the soil
  - from the land
  lexicon: HALOT
  rationale: אֲדָמָה here refers to the ground/soil from which the trap rises. 'Ground'
    is the most natural match in context.
- source_word: וְלָכוֹד לֹא יִלְכּוֹד
  chosen: when it has caught nothing at all
  alternatives:
  - without catching anything
  - and catches, it does not catch
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verbal idea.
    The clause means the trap does not spring without actually catching something.
    'Nothing at all' reflects the emphatic force in idiomatic English.
