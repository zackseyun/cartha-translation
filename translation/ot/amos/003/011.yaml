theological_decisions:
- issue: Rendering the divine name in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - the Lord GOD
  rationale: The doctrine excerpt sets the default rendering of יְהוָה as 'the LORD.'
    In this specific compound, using small caps 'LORD' after 'Lord' would produce
    awkward English ('Lord LORD'). 'Lord GOD' is the standard way to preserve both
    elements of the title without confusion.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for יְהוָה YHWH; Translation
    philosophy #1 and #6'
