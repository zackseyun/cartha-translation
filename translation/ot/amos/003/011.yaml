id: AMO.3.11
reference: Amos 3:11
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה צַ֖ר וּ/סְבִ֣יב הָ/אָ֑רֶץ וְ/הוֹרִ֤ד
    מִמֵּ/ךְ֙ עֻזֵּ֔/ךְ וְ/נָבֹ֖זּוּ אַרְמְנוֹתָֽיִ/ךְ׃
translation:
  text: 'Therefore, thus says the Lord GOD: An adversary shall surround the land,
    and he shall bring down your strength from you, and your citadels shall be plundered.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'enemy' for 'adversary.'
    reason: lexical_alternative
  - marker: b
    text: Or 'your palaces shall be plundered.' The Hebrew word can refer to palaces
      or fortified strongholds.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord GOD
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Rendered the title pair in the conventional English form 'the Lord GOD.'
    Per doctrine, יְהוָה is rendered 'the LORD' by default; however, in the compound
    אֲדֹנָי יְהוִה, English convention commonly uses 'Lord GOD' to avoid 'Lord LORD'
    and to preserve the sense of the double divine title.
- source_word: צַר
  chosen: an adversary
  alternatives:
  - enemy
  - foe
  - distress
  lexicon: HALOT
  rationale: Here the noun refers to a hostile oppressor/attacker, not abstract distress.
    'Adversary' preserves the singular noun and leaves open whether the referent is
    a specific invading power or a more general hostile force.
- source_word: וּסְבִיב הָאָרֶץ
  chosen: shall surround the land
  alternatives:
  - and all around the land
  - even around the land
  - is around the land
  lexicon: HALOT
  rationale: The phrase is terse and somewhat elliptical. Rendering it verbally with
    'shall surround the land' makes good English sense in context and captures the
    threat of encirclement implied by 'adversary' plus 'around the land.' 'Land' is
    preferred over 'earth' because the context is regional judgment on Israel.
- source_word: וְהוֹרִד
  chosen: he shall bring down
  alternatives:
  - he will cast down
  - he will pull down
  - he will bring low
  lexicon: HALOT
  rationale: From ירד in the Hiphil, meaning to cause to go down. 'Bring down' is
    natural English and broad enough to cover military humiliation or reduction of
    power.
- source_word: מִמֵּךְ עֻזֵּךְ
  chosen: your strength from you
  alternatives:
  - your stronghold from you
  - your might from you
  - your power from you
  lexicon: HALOT
  rationale: עֹז commonly means strength, might, or power. 'Your strength from you'
    follows the Hebrew closely and conveys the removal of national power. 'Stronghold'
    is less likely here because the next clause already speaks of fortified residences/citadels.
- source_word: וְנָבֹזּוּ
  chosen: shall be plundered
  alternatives:
  - shall be looted
  - shall be despoiled
  - shall be robbed
  lexicon: HALOT
  rationale: The Niphal form conveys being despoiled by invaders. 'Plundered' fits
    the military-judgment context and is idiomatic with buildings or cities.
- source_word: אַרְמְנוֹתָיִךְ
  chosen: your citadels
  alternatives:
  - your palaces
  - your fortresses
  lexicon: HALOT
  rationale: אַרְמוֹן can denote palace or fortified stronghold. In Amos, the term
    often carries both elite residence and defensive-security connotations. 'Citadels'
    preserves that dual sense better than 'palaces' alone, while fitting the context
    of siege and plunder.
