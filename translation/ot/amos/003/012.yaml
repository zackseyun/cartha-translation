id: AMO.3.12
reference: Amos 3:12
source:
  edition: WLC
  text: כֹּה֮ אָמַ֣ר יְהוָה֒ כַּ/אֲשֶׁר֩ יַצִּ֨יל הָ/רֹעֶ֜ה מִ/פִּ֧י הָ/אֲרִ֛י שְׁתֵּ֥י כְרָעַ֖יִם א֣וֹ בְדַל אֹ֑זֶן כֵּ֣ן יִנָּצְל֞וּ בְּנֵ֣י יִשְׂרָאֵ֗ל הַ/יֹּֽשְׁבִים֙ בְּ/שֹׁ֣מְר֔וֹן בִּ/פְאַ֥ת מִטָּ֖ה וּ/בִ/דְמֶ֥שֶׁק עָֽרֶשׂ־׃
translation:
  text: 'Thus says Yahweh: As the shepherd rescues from the mouth of the lion two legs or a piece of an ear, so will the sons of Israel who dwell in Samaria be rescued—with the corner of a bed and the cover of a couch.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' Hebrew 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: The final phrase is difficult. Hebrew reads literally 'with the corner of a bed and the couch of Damascus.' It may refer to luxurious furniture, or possibly 'a damask couch,' or 'a couch in Damascus.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כַּאֲשֶׁר ... כֵּן
  chosen: As ... so
  alternatives:
  - Just as ... so
  lexicon: HALOT
  rationale: Preserves the explicit comparative structure of the Hebrew proverb-like simile.
- source_word: יַצִּיל / יִנָּצְלוּ
  chosen: rescues / will be rescued
  alternatives:
  - delivers / will be delivered
  - snatches away / will escape
  lexicon: HALOT
  rationale: Keeps the lexical connection between the Hiphil and Niphal forms of נצל while using natural English. The future in the second clause reflects the prophetic result.
- source_word: הָרֹעֶה
  chosen: the shepherd
  alternatives:
  - a shepherd
  lexicon: HALOT
  rationale: The article is present in Hebrew; English generic singular with 'the shepherd' suits the illustrative comparison.
- source_word: מִפִּי הָאֲרִי
  chosen: from the mouth of the lion
  alternatives:
  - from the lion's mouth
  lexicon: HALOT
  rationale: A close rendering of the Hebrew construct phrase; idiomatic and vivid.
- source_word: שְׁתֵּי כְרָעַיִם
  chosen: two legs
  alternatives:
  - two leg-bones
  - two shanks
  lexicon: HALOT
  rationale: The image is of meager remains recovered to prove loss; 'two legs' is the most straightforward modern rendering.
- source_word: בְדַל אֹזֶן
  chosen: a piece of an ear
  alternatives:
  - a bit of an ear
  - a portion of an ear
  lexicon: HALOT
  rationale: בְדַל denotes a separated piece or fragment. 'Piece' communicates the grisly remnant clearly.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Retains the gender-accurate formal expression of the Hebrew while still being understandable in English. This is not merely a national label but the stock covenantal designation.
- source_word: הַיֹּשְׁבִים בְּשֹׁמְרוֹן
  chosen: who dwell in Samaria
  alternatives:
  - who live in Samaria
  - sitting in Samaria
  lexicon: HALOT
  rationale: '''Dwell'' preserves the participial sense and slightly elevated prophetic register better than the flatter ''live.'''
- source_word: בִּפְאַת מִטָּה
  chosen: with the corner of a bed
  alternatives:
  - on the corner of a bed
  - from the corner of a bed
  lexicon: HALOT
  rationale: 'The phrase is difficult, but the preposition is best taken instrumentally/associatively in the comparison: those rescued are like scant remnants, here represented by luxurious furniture fragments or positions. ''With'' keeps the Hebrew concise without overinterpreting.'
- source_word: וּבִדְמֶשֶׁק עָרֶשׂ
  chosen: and the couch of Damascus
  alternatives:
  - and on a couch of Damascus
  - and a damask couch
  - and the bed of Damascus
  lexicon: HALOT
  rationale: This clause is notoriously difficult. The consonantal text naturally reads 'Damascus.' Rather than emending to 'damask' or forcing a locative sense, the translation preserves the MT wording in the main text and explains the alternatives in a footnote. 'Couch' distinguishes עָרֶשׂ from the earlier מִטָּה and fits a luxury setting.
