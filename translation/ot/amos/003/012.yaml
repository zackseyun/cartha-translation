theological_decisions:
- issue: Whether to smooth the image into a promise of substantial deliverance or preserve the ironic sense of only a tiny remnant surviving
  chosen_reading: Preserve the stark simile of minimal rescue
  alternative_readings:
  - Render more generally as survival from judgment without emphasizing the tiny remnant
  rationale: The shepherd recovers only scraps from a lion's mouth; the comparison implies that any rescue of Samaria's elite will be pitifully partial, not triumphant. The translation keeps the concrete imagery and does not soften the judgment oracle.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: How to handle the obscure final phrase without speculative doctrinal or interpretive expansion
  chosen_reading: Retain the Masoretic wording in the main text and preserve major interpretive alternatives in a footnote
  alternative_readings:
  - Emend to 'damask couch' as a luxury-fabric reference
  - Take the phrase locatively as 'on a couch in Damascus'
  rationale: The phrase is textually and lexically uncertain, but no doctrinal issue is at stake. Transparency requires keeping the Hebrew reading visible while noting plausible alternatives rather than presenting a conjecture as certain.
  doctrine_reference: Original-language primacy over translation tradition; preserve ambiguity where genuine.
