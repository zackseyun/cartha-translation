theological_decisions:
- issue: Rendering the divine name יְהוָה within the compound title אֲדֹנָי יְהוִה
  chosen_reading: The Lord GOD
  alternative_readings:
  - the Lord Yahweh
  rationale: The doctrine excerpt specifies the default rendering of יְהוָה as 'the
    LORD.' In the compound title with אֲדֹנָי, English convention and clarity favor
    'Lord GOD' to avoid the awkward 'Lord LORD.' This preserves reverence tradition
    and the distinction of the divine name without importing extra theology.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
