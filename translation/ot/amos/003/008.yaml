id: AMO.3.8
reference: Amos 3:8
source:
  edition: WLC
  text: אַרְיֵ֥ה שָׁאָ֖ג מִ֣י לֹ֣א יִירָ֑א אֲדֹנָ֤/י יְהוִה֙ דִּבֶּ֔ר מִ֖י לֹ֥א יִנָּבֵֽא׃
translation:
  text: A lion has roared—who will not fear? The Lord GOD has spoken—who will not
    prophesy?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Lord YHWH.'' English ''Lord GOD'' reflects the customary rendering
      of the divine name in this compound title; alternatively, ''the Lord Yahweh.'''
    reason: alternative_reading
  - marker: b
    text: Or, more idiomatically, 'who can but prophesy?'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַרְיֵה
  chosen: lion
  alternatives:
  - a lion
  lexicon: HALOT
  rationale: Common noun for the animal; rendered straightforwardly as 'lion.' English
    idiom supplies the indefinite sense naturally without overformalism.
- source_word: שָׁאָג
  chosen: has roared
  alternatives:
  - roared
  lexicon: HALOT
  rationale: 'Qal perfect 3ms of ''roar.'' English present perfect fits the prophetic
    rhetorical sequence well: the roar has occurred, so fear follows. Simple past
    is possible, but present perfect better preserves the immediacy of cause and effect
    in English.'
- source_word: מִי לֹא יִירָא
  chosen: who will not fear?
  alternatives:
  - who would not fear?
  - who does not fear?
  lexicon: HALOT
  rationale: The interrogative plus negation forms a rhetorical question expecting
    universal response. The imperfect can be rendered modally/futurally in English;
    'will not fear' best captures the inevitable reaction without sounding overly
    interpretive.
- source_word: אֲדֹנָי יְהוִה
  chosen: The Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: This is the title אֲדֹנָי יְהוִה. Following the doctrine's contested-terms
    guidance, יְהוָה is rendered 'the LORD.' Because English convention avoids 'Lord
    LORD,' the established and source-sensitive equivalent is 'Lord GOD,' with small-caps
    convention typically signaling the divine name. Capitalization here preserves
    the distinction while remaining readable.
- source_word: דִּבֶּר
  chosen: has spoken
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: 'Piel perfect 3ms, ''has spoken/spoke.'' Present perfect parallels ''has
    roared'' and keeps the verse''s analogy tight: just as the lion''s roar compels
    fear, the Lord''s speech compels prophetic response.'
- source_word: מִי לֹא יִנָּבֵא
  chosen: who will not prophesy?
  alternatives:
  - who can but prophesy?
  - who would not prophesy?
  lexicon: HALOT
  rationale: Nifal imperfect 3ms from נבא, here in rhetorical parallel with fear after
    the lion's roar. 'Prophesy' is the direct lexical equivalent. More idiomatic expansions
    like 'who can but prophesy?' capture the force but add wording not present in
    the Hebrew, so they are preserved as alternatives rather than used in the main
    text.
