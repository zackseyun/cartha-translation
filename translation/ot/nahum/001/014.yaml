theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: The LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for YHWH, preserving continuity
    with Jewish reverence practice and common English Bible convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Interpretation of 'your name be sown'
  chosen_reading: Retain the metaphor in the main text
  alternative_readings:
  - Explicit dynastic interpretation such as 'you will have no descendants'
  rationale: Optimal equivalence favors preserving the Hebrew metaphor where understandable
    in English, while recognizing that the sense is likely the end of the addressee's
    line/name.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Number of אֱלֹהֶיךָ
  chosen_reading: your gods
  alternative_readings:
  - your god
  rationale: The Hebrew form is morphologically plural and in this anti-idolatry context
    likely refers to Assyria's deities rather than a singular abstract 'god.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
