id: NAM.1.14
reference: Nahum 1:14
source:
  edition: WLC
  text: וְ/צִוָּ֤ה עָלֶ֨י/ךָ֙ יְהוָ֔ה לֹֽא יִזָּרַ֥ע מִ/שִּׁמְ/ךָ֖ ע֑וֹד מִ/בֵּ֨ית
    אֱלֹהֶ֜י/ךָ אַכְרִ֨ית פֶּ֧סֶל וּ/מַסֵּכָ֛ה אָשִׂ֥ים קִבְרֶ֖/ךָ כִּ֥י קַלּֽוֹתָ־׃פ
translation:
  text: 'The LORD has commanded concerning you: No more will your name be sown. From
    the house of your gods I will cut off carved image and cast image. I will make
    your grave, for you are contemptible.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'No more offspring will be sown from your name,' that is, your line
      or dynasty will not continue.
    reason: lexical_alternative
  - marker: b
    text: Or, 'From the temple of your god.' The Hebrew form can be rendered more
      literally as 'from the house of your gods.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'for you are vile' or 'for you are insignificant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְצִוָּה
  chosen: has commanded
  alternatives:
  - commands
  - has decreed
  lexicon: HALOT
  rationale: Perfect verb with vav, reporting a completed divine decree with present
    relevance. 'Has commanded' preserves the force of an issued order better than
    a simple present.
- source_word: עָלֶיךָ
  chosen: concerning you
  alternatives:
  - against you
  - about you
  lexicon: HALOT
  rationale: The preposition עַל with צוה can mark the person/object addressed by
    the decree. 'Concerning you' is broad enough to cover the oracle's target without
    overcommitting to hostile nuance already clear from context.
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'
    rather than a transliteration.
- source_word: לֹא יִזָּרַע מִשִּׁמְךָ עוֹד
  chosen: No more will your name be sown
  alternatives:
  - Your name will no longer be propagated
  - No more offspring will be sown from your name
  lexicon: HALOT
  rationale: The Niphal of זרע literally means 'be sown.' In context it idiomatically
    refers to the continuation of a name/line. I retained the agricultural metaphor
    in the main text for transparency, while allowing the dynastic sense to be noted
    as an alternative.
- source_word: מִבֵּית אֱלֹהֶיךָ
  chosen: From the house of your gods
  alternatives:
  - From the temple of your god
  - From your gods' temple
  lexicon: HALOT
  rationale: The plural form with 2ms suffix is best rendered 'your gods,' fitting
    Assyria's polytheistic setting. 'House' is retained rather than flattened to 'temple,'
    though temple is a contextual alternative.
- source_word: אַכְרִית
  chosen: I will cut off
  alternatives:
  - I will destroy
  - I will wipe out
  lexicon: HALOT
  rationale: Hiphil of כרת commonly means to cut off, remove, or exterminate. 'Cut
    off' preserves the verbal imagery and judicial force.
- source_word: פֶּסֶל
  chosen: carved image
  alternatives:
  - idol
  - graven image
  lexicon: HALOT
  rationale: '''Carved image'' is a clear modern rendering that preserves the concrete
    sense of an idol fashioned by carving.'
- source_word: וּמַסֵּכָה
  chosen: cast image
  alternatives:
  - molten image
  - metal image
  lexicon: HALOT
  rationale: The term denotes an image made by casting metal. 'Cast image' is concise
    and pairs well with 'carved image.'
- source_word: אָשִׂים קִבְרֶךָ
  chosen: I will make your grave
  alternatives:
  - I will set your grave
  - I will prepare your grave
  lexicon: HALOT
  rationale: The idiom is terse. 'I will make your grave' preserves the starkness
    and likely means God will appoint or bring about the addressee's burial/death.
- source_word: כִּי קַלּוֹתָ
  chosen: for you are contemptible
  alternatives:
  - for you are vile
  - for you are insignificant
  - for you are lightly esteemed
  lexicon: HALOT
  rationale: From קלל in the sense of being light, slight, or contemptible. 'Contemptible'
    best fits the judgment context without sounding archaic. The clause gives the
    reason for the announced disgrace.
