id: NAM.1.3
reference: Nahum 1:3
source:
  edition: WLC
  text: יְהֹוָ֗ה אֶ֤רֶךְ אַפַּ֨יִם֙ ו/גדול כֹּ֔חַ וְ/נַקֵּ֖ה לֹ֣א יְנַקֶּ֑ה יְהוָ֗ה
    בְּ/סוּפָ֤ה וּ/בִ/שְׂעָרָה֙ דַּרְכּ֔/וֹ וְ/עָנָ֖ן אֲבַ֥ק רַגְלָֽי/ו־׃
translation:
  text: The LORD is slow to anger and great in power, and he will certainly not leave
    the guilty unpunished. The LORD—his way is in the whirlwind and the storm, and
    clouds are the dust of his feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'and he will by no means acquit' or 'and he will certainly
      not clear.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהֹוָה / יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the divine name YHWH is rendered 'the LORD' rather than
    transliterated, following established reverential convention and the pattern reflected
    in the Septuagint.
- source_word: אֶרֶךְ אַפַּיִם
  chosen: slow to anger
  alternatives:
  - long of nostrils
  - patient
  lexicon: HALOT
  rationale: This Hebrew idiom literally refers to being 'long of nose/nostrils' and
    denotes patience or slowness to anger. 'Slow to anger' is the clearest natural
    English equivalent and preserves the idiomatic sense.
- source_word: וגדול כֹּחַ
  chosen: and great in power
  alternatives:
  - and great of strength
  - and mighty in power
  lexicon: HALOT
  rationale: The phrase combines גדול ('great') with כח ('strength, power'). 'Great
    in power' is a natural and sufficiently formal rendering.
- source_word: וְנַקֵּה לֹא יְנַקֶּה
  chosen: and he will certainly not leave the guilty unpunished
  alternatives:
  - and by no means will he acquit
  - and he will surely not clear
  lexicon: HALOT
  rationale: This is an emphatic construction from נקה ('to be clean, be free, be
    acquitted; leave unpunished'). In context of divine judgment, the sense is that
    YHWH does not let guilt go unpunished. Because English 'not acquit' can sound
    overly forensic without an explicit object, 'not leave the guilty unpunished'
    makes the implied object clear while preserving the judicial force. The more formal
    alternative is preserved in a footnote.
- source_word: בְּסוּפָה וּבִשְׂעָרָה
  chosen: in the whirlwind and the storm
  alternatives:
  - in the tempest and the storm
  lexicon: HALOT
  rationale: Both nouns denote violent weather phenomena. 'Whirlwind' for סוּפָה and
    'storm' for שְׂעָרָה preserve the imagery in accessible modern English.
- source_word: דַּרְכּוֹ
  chosen: his way
  alternatives:
  - his path
  lexicon: HALOT
  rationale: דרך commonly means 'way, path, road,' and here metaphorically describes
    the sphere or course of YHWH's movement. 'His way' is the most direct rendering.
- source_word: וְעָנָן אֲבַק רַגְלָיו
  chosen: and clouds are the dust of his feet
  alternatives:
  - and cloud is the dust of his feet
  lexicon: HALOT
  rationale: The singular collective noun 'cloud' can be rendered naturally in English
    as plural 'clouds' to match idiomatic usage. The construct אֲבַק רַגְלָיו means
    'the dust of his feet,' portraying clouds as stirred up beneath the divine march.
