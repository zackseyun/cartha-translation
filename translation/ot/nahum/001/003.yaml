theological_decisions:
- issue: Rendering the divine name YHWH
  chosen_reading: The LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of יְהוָה
    as 'the LORD.' This also fits the prophetic style and English Bible convention
    without making a sectarian claim.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the judicial clause וְנַקֵּה לֹא יְנַקֶּה
  chosen_reading: he will certainly not leave the guilty unpunished
  alternative_readings:
  - he will by no means acquit
  - he will certainly not clear
  rationale: The verse holds together divine patience and uncompromising justice.
    The chosen rendering preserves that theological tension in clear English without
    softening judgment or importing a narrower doctrinal framework. Because 'acquit'
    is a viable formal alternative, it is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
