id: NAM.1.10
reference: Nahum 1:10
source:
  edition: WLC
  text: כִּ֚י עַד סִירִ֣ים סְבֻכִ֔ים וּ/כְ/סָבְאָ֖/ם סְבוּאִ֑ים אֻ֨כְּל֔וּ כְּ/קַ֥שׁ
    יָבֵ֖שׁ מָלֵֽא־׃
translation:
  text: For though they are tangled like thorns, and drenched with their drink, they
    will be consumed like fully dry stubble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew is difficult: the clause rendered ''drenched with their drink''
      may also be understood as ''like drunkards drunk with their drink'' or ''like
      their drunken revelry.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'For while they are tangled like thorns …' The opening particle and preposition
      form a compressed poetic expression.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding statement; 'For'
    fits the discourse flow better than a more emphatic particle in English.
- source_word: עַד
  chosen: though
  alternatives:
  - while
  - as far as
  - even unto
  lexicon: HALOT
  rationale: 'In this difficult poetic clause, עַד functions idiomatically with the
    following image rather than spatially. Rendering it concessively (''though'')
    best captures the sense in context: despite their tangled, intoxicated condition,
    judgment comes.'
- source_word: סִירִים
  chosen: thorns
  alternatives:
  - briers
  - thornbushes
  lexicon: HALOT
  rationale: The noun denotes thorny growth. 'Thorns' is the most natural and recognizable
    English equivalent in a simile of combustible entanglement.
- source_word: סְבֻכִים
  chosen: tangled
  alternatives:
  - interwoven
  - entangled
  lexicon: HALOT
  rationale: The passive participle describes something interlaced or caught together.
    'Tangled' is vivid, idiomatic, and suits the thorn imagery.
- source_word: וּכְסָבְאָם
  chosen: and drenched with their drink
  alternatives:
  - and like their drunkenness
  - and as with their carousing
  - and according to their drink
  lexicon: HALOT
  rationale: The form is difficult, built from the noun for drink/drunken bout with
    3mp suffix. The clause likely refers to their being saturated with drink or drunken
    revelry. 'Drenched with their drink' preserves the imagery and avoids overinterpreting
    the exact nuance.
- source_word: סְבוּאִים
  chosen: drenched
  alternatives:
  - drunk
  - sated
  - soaked
  lexicon: HALOT
  rationale: From a root meaning to drink one's fill / be sated with drink. Because
    the previous term already refers to drink, 'drenched' keeps the liquid imagery
    and avoids the awkward repetition 'drunk with their drink,' while still conveying
    intoxicated saturation.
- source_word: אֻכְּלוּ
  chosen: they will be consumed
  alternatives:
  - they are consumed
  - they will be devoured
  - they will be eaten up
  lexicon: HALOT
  rationale: In prophetic poetry the perfect can express a future certainty. 'Will
    be consumed' communicates impending judgment in natural English and fits the fire/stubble
    image.
- source_word: כְּקַשׁ
  chosen: like stubble
  alternatives:
  - like chaff
  - like straw
  lexicon: HALOT
  rationale: קשׁ commonly denotes stubble or straw-like dry plant refuse. 'Stubble'
    best matches the image of something quickly burned up.
- source_word: יָבֵשׁ
  chosen: dry
  alternatives:
  - parched
  - withered
  lexicon: HALOT
  rationale: Straightforward adjective modifying stubble; 'dry' is the plain sense
    and supports the combustion imagery.
- source_word: מָלֵא
  chosen: fully
  alternatives:
  - completely
  - thoroughly
  lexicon: HALOT
  rationale: Used adverbially/intensively with 'dry stubble' to stress total dryness.
    'Fully dry' is concise and natural English.
