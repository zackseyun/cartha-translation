id: NAM.1.12
reference: Nahum 1:12
source:
  edition: WLC
  text: כֹּ֣ה אָמַ֣ר יְהוָ֗ה אִם שְׁלֵמִים֙ וְ/כֵ֣ן רַבִּ֔ים וְ/כֵ֥ן נָגֹ֖זּוּ וְ/עָבָ֑ר
    וְ/עִ֨נִּתִ֔/ךְ לֹ֥א אֲעַנֵּ֖/ךְ עֽוֹד׀־׃
translation:
  text: 'Thus says the LORD: Though they are whole, and likewise many, even so they
    will be cut down and pass away. Though I have afflicted you, I will afflict you
    no more.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Though they are at peace and many, even so they will be cut off.' The
      Hebrew of this clause is compact and difficult, and several English renderings
      are possible.
    reason: alternative_reading
  - marker: b
    text: The 'you' is feminine singular in Hebrew, likely referring to Zion or Judah
      personified as a woman.
    reason: cultural_note
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. יְהוָה is rendered 'the LORD' per
    doctrine for the divine name.
- source_word: אִם
  chosen: Though
  alternatives:
  - If
  lexicon: HALOT
  rationale: Here אִם introduces a concessive clause rather than a simple condition;
    'though' best fits the flow of the oracle.
- source_word: שְׁלֵמִים
  chosen: whole
  alternatives:
  - at peace
  - unharmed
  - secure
  lexicon: HALOT
  rationale: From שלם, conveying completeness/intactness. In context of Assyria's
    apparent strength, 'whole' or 'unharmed' fits better than a moral sense. 'Whole'
    preserves the compact Hebrew expression.
- source_word: וְכֵן רַבִּים
  chosen: and likewise many
  alternatives:
  - and so numerous
  - even if many
  lexicon: HALOT
  rationale: 'כֵן here intensifies/continues the concessive description: they are
    not only intact but also numerous. ''Likewise many'' keeps the parallelism without
    overinterpreting.'
- source_word: וְכֵן נָגֹזּוּ
  chosen: even so they will be cut down
  alternatives:
  - so they will be shorn off
  - thus they are cut off
  lexicon: HALOT
  rationale: The verb גזז in the passive can evoke shearing/cutting off. In this judgment
    context, 'cut down' communicates decisive removal in natural English while retaining
    the metaphorical force.
- source_word: וְעָבָר
  chosen: and pass away
  alternatives:
  - and pass on
  - and he passes through
  lexicon: HALOT
  rationale: The singular verb after a plural subject is difficult, but idiomatically
    the sense is that the enemy force will disappear. 'Pass away' captures the result
    of judgment without forcing an awkward singular in English.
- source_word: וְעִנִּתִךְ
  chosen: Though I have afflicted you
  alternatives:
  - And I afflicted you
  - I humbled you
  lexicon: HALOT
  rationale: ענה in the piel commonly means afflict/humble. The conjunction is taken
    concessively/continuatively in relation to the following promise. Perfect aspect
    suits a prior affliction now being brought to an end.
- source_word: לֹא אֲעַנֵּךְ עוֹד
  chosen: I will afflict you no more
  alternatives:
  - I will humble you no longer
  lexicon: HALOT
  rationale: Direct antithetic promise reversing the prior affliction. 'No more' is
    the natural rendering of עוֹד in this context.
