theological_decisions:
- issue: Referent of the second-person feminine suffixes
  chosen_reading: Addressed to Zion/Judah as a feminine singular entity
  alternative_readings:
  - Addressed more generally to the people of God
  rationale: The feminine singular suffixes fit the common personification of Zion/Judah/Jerusalem
    as a woman. Rendering simply as 'you' preserves the direct address without importing
    a narrower identification into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Divine name rendering
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' in the main text.
  doctrine_reference: 'Contested terms: יְהוָה YHWH | the LORD'
