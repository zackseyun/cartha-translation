theological_decisions:
- issue: Referent and force of the final clause
  chosen_reading: 'The verse declares the decisiveness of the LORD''s judgment: once
    he makes a complete end, trouble will not need to arise again.'
  alternative_readings:
  - The enemy's attack against the LORD will not rise a second time
  - Affliction will not come upon God's people a second time
  rationale: The Hebrew צָרָה is terse and allows different implied subjects or perspectives.
    The chosen rendering preserves the ambiguity enough to fit the immediate context
    of divine judgment without importing a narrower doctrinal claim about either Judah
    alone or the enemy alone. The line emphasizes the finality of the LORD's action.
  doctrine_reference: Preserve theological tension rather than resolve it.
