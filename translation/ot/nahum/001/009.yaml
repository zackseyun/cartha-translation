id: NAM.1.9
reference: Nahum 1:9
source:
  edition: WLC
  text: מַה תְּחַשְּׁבוּ/ן֙ אֶל יְהוָ֔ה כָּלָ֖ה ה֣וּא עֹשֶׂ֑ה לֹֽא תָק֥וּם פַּעֲמַ֖יִם
    צָרָֽה־־־׃
translation:
  text: What are you plotting against the LORD? He will make a complete end; trouble
    will not rise up a second time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'What do you devise against the LORD?' The verb can mean 'think,' 'devise,'
      or 'plot.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'Affliction will not arise twice,' or 'Distress will not come a second
      time.' The Hebrew is concise and may refer either to the enemy's assault or
      to the need for repeated judgment.
    reason: alternative_reading
lexical_decisions:
- source_word: מַה
  chosen: What
  alternatives:
  - Why
  lexicon: HALOT
  rationale: Interrogative introducing a rhetorical question. 'What' is the most direct
    rendering; 'Why' is possible idiomatically but less formally tied to the Hebrew
    form.
- source_word: תְּחַשְּׁבוּן
  chosen: are you plotting
  alternatives:
  - do you devise
  - do you think
  lexicon: HALOT
  rationale: From חשׁב, which can mean 'think, plan, devise.' In context with אֶל
    יְהוָה and the following judgment statement, hostile scheming is in view, so 'plotting'
    best captures the adversarial nuance without over-paraphrase.
- source_word: אֶל
  chosen: against
  alternatives:
  - concerning
  - toward
  lexicon: HALOT
  rationale: Although אֶל commonly means 'to/toward,' with a verb of devising in this
    hostile context it is best rendered 'against,' reflecting the implied opposition
    to the LORD.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: כָּלָה
  chosen: a complete end
  alternatives:
  - an end
  - destruction
  - annihilation
  lexicon: HALOT
  rationale: The noun denotes completion/end, often in the sense of full destruction.
    'A complete end' preserves both the lexical sense of completion and the judgment
    context.
- source_word: הוּא עֹשֶׂה
  chosen: He will make
  alternatives:
  - he is making
  - he does
  lexicon: HALOT
  rationale: 'The participle with pronoun can express imminent or certain action.
    In prophetic discourse English future best conveys the force: the LORD is the
    one who will bring this decisive end about.'
- source_word: לֹא תָקוּם
  chosen: will not rise up
  alternatives:
  - will not arise
  - will not happen again
  lexicon: HALOT
  rationale: From קום, 'arise/stand up.' 'Rise up' keeps the metaphorical imagery
    while remaining natural English.
- source_word: פַּעֲמַיִם
  chosen: a second time
  alternatives:
  - twice
  lexicon: HALOT
  rationale: Idiomatic English prefers 'a second time' in this clause over the more
    wooden 'twice.'
- source_word: צָרָה
  chosen: trouble
  alternatives:
  - distress
  - affliction
  - adversity
  lexicon: HALOT
  rationale: The noun can denote distress, trouble, or calamity. 'Trouble' is broad
    and natural here, allowing the line to express that the affliction/judgment need
    not recur because the end is decisive.
