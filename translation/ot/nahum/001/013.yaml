theological_decisions:
- issue: Referent of the 3ms suffix in 'his yoke'
  chosen_reading: Retain the generic third-person singular 'his yoke' without specifying
    the oppressor in the translation.
  alternative_readings:
  - the yoke of Assyria
  - his bar
  rationale: The immediate context points to the oppressing power, likely Assyria/its
    king, but the Hebrew text itself uses only a third-person singular suffix. The
    translation preserves that textual restraint rather than importing an explicit
    identification into the main text.
  doctrine_reference: Original-language primacy over translation tradition; Never
    import doctrinal claims the text does not make.
