id: NAM.1.13
reference: Nahum 1:13
source:
  edition: WLC
  text: וְ/עַתָּ֕ה אֶשְׁבֹּ֥ר מֹטֵ֖/הוּ מֵֽ/עָלָ֑יִ/ךְ וּ/מוֹסְרֹתַ֖יִ/ךְ אֲנַתֵּֽק׃
translation:
  text: And now I will break his yoke from upon you, and I will tear off your bonds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his bar.' The Hebrew term can denote a rod, bar, or yoke; here 'yoke'
      best fits the paired imagery of oppression and bonds.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - But now
  - Now
  lexicon: HALOT
  rationale: Temporal discourse marker introducing imminent divine action. 'And now'
    preserves the conjunction while sounding natural in English.
- source_word: אֶשְׁבֹּר
  chosen: I will break
  alternatives:
  - I will shatter
  lexicon: HALOT
  rationale: Qal imperfect 1cs of שבר denotes breaking. 'Break' is the straightforward
    rendering and fits the yoke imagery.
- source_word: מֹטֵהוּ
  chosen: his yoke
  alternatives:
  - his bar
  - his staff
  lexicon: HALOT
  rationale: In context of oppression and paired with 'bonds,' the noun refers to
    the yoke/bar of subjugation. 'Yoke' best conveys the metaphor of imposed domination
    in English.
- source_word: מֵעָלַיִךְ
  chosen: from upon you
  alternatives:
  - from you
  - off you
  lexicon: HALOT
  rationale: The preposition plus עַל literally means 'from upon you' (2fs). Retaining
    'from upon you' preserves the vivid image of a burden resting on the addressee,
    while remaining readable.
- source_word: וּמוֹסְרֹתַיִךְ
  chosen: your bonds
  alternatives:
  - your shackles
  - your fetters
  - your restraints
  lexicon: HALOT
  rationale: Plural noun for bands/bonds used metaphorically for captivity or subjection.
    'Bonds' is idiomatic, broad enough for the metaphor, and pairs well with 'yoke.'
- source_word: אֲנַתֵּק
  chosen: I will tear off
  alternatives:
  - I will snap
  - I will break apart
  lexicon: HALOT
  rationale: Piel imperfect 1cs of נתק conveys pulling apart, tearing away, or snapping.
    'Tear off' fits the image of removing bonds from the addressee.
