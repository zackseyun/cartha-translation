id: NAM.1.4
reference: Nahum 1:4
source:
  edition: WLC
  text: גּוֹעֵ֤ר בַּ/יָּם֙ וַֽ/יַּבְּשֵׁ֔/הוּ וְ/כָל הַ/נְּהָר֖וֹת הֶֽחֱרִ֑יב אֻמְלַ֤ל
    בָּשָׁן֙ וְ/כַרְמֶ֔ל וּ/פֶ֥רַח לְבָנ֖וֹן אֻמְלָֽל־׃
translation:
  text: He rebukes the sea and dries it up; he makes all the rivers run dry. Bashan
    and Carmel wither; even the blossom of Lebanon withers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he dries up all the rivers.' The Hebrew verb can be rendered more directly
      this way.
    reason: lexical_alternative
lexical_decisions:
- source_word: גּוֹעֵר
  chosen: rebukes
  alternatives:
  - threatens
  - scolds
  lexicon: HALOT
  rationale: The participle from גער commonly denotes a forceful verbal rebuke, often
    of divine command over chaotic forces. 'Rebukes' preserves the vivid personal
    agency and intertextual resonance with God's mastery over sea and storm.
- source_word: בַּיָּם
  chosen: the sea
  alternatives:
  - the Sea
  lexicon: HALOT
  rationale: Definite singular 'the sea' is the natural rendering. Capitalizing as
    a proper name is not warranted here; the phrase functions generically/cosmically.
- source_word: וַיַּבְּשֵׁהוּ
  chosen: dries it up
  alternatives:
  - makes it dry
  - dries it
  lexicon: HALOT
  rationale: From יבשׁ, with 3ms suffix referring back to 'the sea.' 'Dries it up'
    is idiomatic English and conveys complete desiccation.
- source_word: וְכָל הַנְּהָרוֹת הֶחֱרִיב
  chosen: he makes all the rivers run dry
  alternatives:
  - he dries up all the rivers
  - he devastates all the rivers
  lexicon: HALOT
  rationale: The Hiphil of חרב here refers to causing waters to become dry/wasted.
    'Makes all the rivers run dry' is natural English while preserving the causative
    force. 'Devastates' is possible lexically but less fitting in this water context.
- source_word: אֻמְלַל
  chosen: wither
  alternatives:
  - languish
  - fade
  lexicon: HALOT
  rationale: The verb describes vegetation drooping or drying up. 'Wither' best fits
    the agricultural imagery and reads naturally in English.
- source_word: בָּשָׁן
  chosen: Bashan
  lexicon: HALOT
  rationale: Proper place name, transliterated per translation philosophy. Bashan
    evokes fertile pastureland, heightening the image of judgment.
- source_word: וְכַרְמֶל
  chosen: and Carmel
  alternatives:
  - and Mount Carmel
  lexicon: HALOT
  rationale: Proper name transliterated. 'Carmel' is sufficient in English; 'Mount'
    is interpretive and unnecessary in this poetic list.
- source_word: וּפֶרַח לְבָנוֹן
  chosen: even the blossom of Lebanon
  alternatives:
  - and the flower of Lebanon
  - and Lebanon's bloom
  lexicon: HALOT
  rationale: פֶרַח denotes blossom/flower. 'Blossom' suits the poetic singular collective
    sense. Adding 'even' brings out the climactic force of the final item without
    over-paraphrasing.
- source_word: אֻמְלָל
  chosen: withers
  alternatives:
  - languishes
  - fades
  lexicon: HALOT
  rationale: Repeated rendering maintains consistency with the earlier אֻמְלַל and
    preserves the poetic parallelism.
