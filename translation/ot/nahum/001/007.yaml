id: NAM.1.7
reference: Nahum 1:7
source:
  edition: WLC
  text: ט֣וֹב יְהוָ֔ה לְ/מָע֖וֹז בְּ/י֣וֹם צָרָ֑ה וְ/יֹדֵ֖עַ חֹ֥סֵי בֽ/וֹ׃
translation:
  text: Yahweh is good, a stronghold in the day of distress; he knows those who take refuge in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a refuge' or 'a fortress' for 'a stronghold.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the day of trouble.'
    reason: lexical_alternative
  - marker: c
    text: Or 'those who trust in him.' The Hebrew more literally speaks of taking refuge in him.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: good
  alternatives:
  - kind
  - beneficent
  lexicon: HALOT
  rationale: The adjective predicates YHWH's character in a broad moral and beneficent sense. 'Good' is the natural, standard English equivalent and preserves the concise force of the Hebrew.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְמָעוֹז
  chosen: a stronghold
  alternatives:
  - a refuge
  - a fortress
  lexicon: HALOT
  rationale: 'מָעוֹז denotes a place of safety or defense. ''Stronghold'' preserves the concrete protective imagery while remaining natural English. The prefixed ל here is best taken predicatively/appositionally: ''The LORD is good, a stronghold...'' rather than purposefully ''for a stronghold.'''
- source_word: בְּיוֹם צָרָה
  chosen: in the day of distress
  alternatives:
  - in the day of trouble
  - in a day of trouble
  lexicon: HALOT
  rationale: The phrase is temporal. 'Distress' renders צָרָה with slightly broader existential force than 'trouble,' while still fitting prophetic diction. The definite 'the day' reflects the Hebrew construction straightforwardly without requiring an eschatological technical sense.
- source_word: וְיֹדֵעַ
  chosen: he knows
  alternatives:
  - and he knows
  - he acknowledges
  - he cares for
  lexicon: HALOT
  rationale: ידע commonly means 'know,' and here conveys personal recognition and regard. English can omit the conjunction for smoother style, but 'he knows' retains the semantic core without overinterpreting it as merely cognitive or as the fuller theological paraphrase 'cares for.'
- source_word: חֹסֵי בוֹ
  chosen: those who take refuge in him
  alternatives:
  - those who trust in him
  - those who seek shelter in him
  lexicon: HALOT
  rationale: The participle from חסה denotes seeking refuge/protection. 'Take refuge in him' best preserves the metaphor of protective shelter and matches the surrounding 'stronghold' imagery better than the more abstract 'trust in him.'
