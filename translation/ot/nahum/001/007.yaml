theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether 'the day of distress' should be read as a specific eschatological day
  chosen_reading: 'generic temporal sense: ''in the day of distress'''
  alternative_readings:
  - a specific eschatological day of trouble
  rationale: Nothing in this verse alone requires a technical eschatological reading. The Hebrew idiom naturally denotes a time/day of trouble generally, so the translation preserves that broader sense and avoids importing a narrower doctrinal claim.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text does not make.'
