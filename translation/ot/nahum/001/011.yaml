id: NAM.1.11
reference: Nahum 1:11
source:
  edition: WLC
  text: מִמֵּ֣/ךְ יָצָ֔א חֹשֵׁ֥ב עַל יְהוָ֖ה רָעָ֑ה יֹעֵ֖ץ בְּלִיָּֽעַל־׃ס
translation:
  text: From you has come one who plots evil against the LORD, a counselor of worthlessness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a counselor of Belial,' if בְּלִיָּעַל is taken as a name-like term
      rather than 'worthlessness.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִמֵּךְ
  chosen: From you
  alternatives:
  - Out of you
  - From you [feminine singular]
  lexicon: HALOT
  rationale: The preposition מִן with 2fs suffix indicates source/origin. 'From you'
    is natural English. The feminine singular likely addresses Nineveh/Assyria as
    a city/entity, but English need not mark the gender in the main text.
- source_word: יָצָא
  chosen: has come
  alternatives:
  - came out
  - has gone out
  lexicon: HALOT
  rationale: The qatal form denotes completed action; in English, 'has come' works
    well with the source idea of emergence from a place and reads idiomatically with
    'from you.' 'Gone out' is more wooden here.
- source_word: חֹשֵׁב
  chosen: who plots
  alternatives:
  - who devises
  - who thinks up
  lexicon: HALOT
  rationale: The participle from חשׁב here carries the sense of devising or plotting,
    especially in hostile intent. 'Plots' best fits the context of hostile counsel
    against the LORD.
- source_word: עַל יְהוָה
  chosen: against the LORD
  alternatives:
  - concerning the LORD
  - against Yahweh
  lexicon: HALOT
  rationale: With hostile nouns/verbs, עַל commonly has adversative force, so 'against'
    is preferable to the more neutral 'concerning.' Per doctrine, יְהוָה is rendered
    'the LORD' rather than 'Yahweh' in the main text.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name, preserving
    Jewish reverence tradition and common English Bible convention.
- source_word: רָעָה
  chosen: evil
  alternatives:
  - harm
  - wickedness
  - disaster
  lexicon: HALOT
  rationale: In this context the word describes malicious intent devised against the
    LORD, so the moral sense 'evil' is stronger than 'harm' or 'disaster.'
- source_word: יֹעֵץ
  chosen: a counselor
  alternatives:
  - an adviser
  - one who counsels
  lexicon: HALOT
  rationale: The participle functions appositionally to the previous description of
    the person. 'Counselor' is concise and preserves the nominal force.
- source_word: בְּלִיָּעַל
  chosen: of worthlessness
  alternatives:
  - wicked
  - of Belial
  - base
  lexicon: HALOT
  rationale: In the Hebrew Bible this noun often denotes worthlessness or wickedness
    rather than necessarily a proper name. Here 'of worthlessness' preserves the genitival
    quality without importing the later personified sense 'Belial' into the main text.
