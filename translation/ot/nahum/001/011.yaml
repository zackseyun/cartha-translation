theological_decisions:
- issue: Rendering of בְּלִיָּעַל
  chosen_reading: common noun sense ('worthlessness') rather than proper name ('Belial')
  alternative_readings:
  - Belial
  - wickedness
  rationale: The immediate Hebrew usage supports a qualitative description of the
    counselor as worthless/wicked. Using 'Belial' in the main text could suggest a
    later demonological/proper-name development not required by this verse. The alternative
    is preserved in a footnote because readers may know the traditional rendering.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
