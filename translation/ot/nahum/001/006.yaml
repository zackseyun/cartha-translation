theological_decisions:
- issue: Rendering of divine anger terms in parallel
  chosen_reading: Different but related English terms ('indignation,' 'anger,' 'wrath')
    are used to reflect the Hebrew variety without flattening the poetry.
  alternative_readings:
  - Use a single repeated term such as 'anger' throughout
  - Use stronger terms such as 'rage' and 'fury'
  rationale: The verse stacks several Hebrew wrath terms for poetic intensity. Varying
    the English preserves that texture while remaining readable and not overstating
    beyond the source.
  doctrine_reference: Translation philosophy items 5 and 6
- issue: Force of the rhetorical questions
  chosen_reading: Translate as ability questions with 'can' ('Who can stand... who
    can rise up...?').
  alternative_readings:
  - Simple future/present 'Who stands... who rises...?'
  - Interpret more dynamically as 'Who can endure...?'
  rationale: The context is divine judgment and human inability to withstand it. 'Can'
    makes the rhetorical force explicit without paraphrasing too far.
  doctrine_reference: Translation philosophy item 1
