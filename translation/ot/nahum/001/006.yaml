id: NAM.1.6
reference: Nahum 1:6
source:
  edition: WLC
  text: לִ/פְנֵ֤י זַעְמ/וֹ֙ מִ֣י יַֽעֲמ֔וֹד וּ/מִ֥י יָק֖וּם בַּ/חֲר֣וֹן אַפּ֑/וֹ חֲמָת/וֹ֙
    נִתְּכָ֣ה כָ/אֵ֔שׁ וְ/הַ/צֻּרִ֖ים נִתְּצ֥וּ מִמֶּֽ/נּוּ׃
translation:
  text: Who can stand before his indignation? And who can rise up in the heat of his
    anger? His wrath is poured out like fire, and the rocks are shattered because
    of him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Who can endure before his indignation? And who can stand in the burning
      of his anger?'
    reason: lexical_alternative
  - marker: b
    text: Or 'the cliffs' or 'the crags' for 'the rocks.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the rocks are shattered by him' or 'from him.' The Hebrew preposition
      may express agency or source.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  - at the face of
  lexicon: HALOT
  rationale: Spatial-prepositional idiom meaning 'before/in the presence of.' 'Before'
    is the most natural English in this rhetorical question.
- source_word: זַעְמוֹ
  chosen: his indignation
  alternatives:
  - his rage
  - his fury
  lexicon: HALOT
  rationale: זַעַם denotes divine indignation/denunciation with strong anger. 'Indignation'
    preserves the moral dimension better than the more purely emotional 'rage.'
- source_word: יַעֲמוֹד
  chosen: can stand
  alternatives:
  - will stand
  - can endure
  lexicon: HALOT
  rationale: In context of rhetorical ability before divine wrath, English 'can stand'
    best conveys capacity to remain standing/endure.
- source_word: יָקוּם
  chosen: can rise up
  alternatives:
  - can stand up
  - can arise
  lexicon: HALOT
  rationale: קוּם literally means 'rise/arise.' Keeping 'rise up' preserves the parallelism
    with 'stand' while suggesting withstanding or presenting oneself.
- source_word: בַּחֲרוֹן אַפּוֹ
  chosen: in the heat of his anger
  alternatives:
  - before the burning of his anger
  - in his fierce anger
  lexicon: HALOT
  rationale: The phrase literally refers to the burning/heat of anger. 'In the heat
    of his anger' is idiomatic modern English that preserves the metaphor.
- source_word: חֲמָתוֹ
  chosen: his wrath
  alternatives:
  - his fury
  - his venom
  lexicon: HALOT
  rationale: In prophetic judgment contexts, חֵמָה commonly denotes wrath/fury. 'Wrath'
    fits the elevated register and divine-judgment context.
- source_word: נִתְּכָה
  chosen: is poured out
  alternatives:
  - is poured forth
  - is melted out
  lexicon: HALOT
  rationale: The Niphal of נתך in wrath contexts means to be poured out. This is a
    standard idiom for the outpouring of divine wrath.
- source_word: כָאֵשׁ
  chosen: like fire
  alternatives:
  - as fire
  lexicon: HALOT
  rationale: Simple comparative particle; 'like fire' is natural English and preserves
    the simile.
- source_word: הַצֻּרִים
  chosen: the rocks
  alternatives:
  - the cliffs
  - the crags
  lexicon: HALOT
  rationale: צוּר can denote rock, cliff, or crag. 'Rocks' is broad and conventional,
    fitting the cosmic imagery without over-specifying terrain.
- source_word: נִתְּצוּ
  chosen: are shattered
  alternatives:
  - are torn down
  - are broken apart
  - are demolished
  lexicon: HALOT
  rationale: The verb denotes being broken down or torn apart. 'Are shattered' best
    matches the force of divine judgment on even the strongest natural features.
- source_word: מִמֶּנּוּ
  chosen: because of him
  alternatives:
  - by him
  - from him
  - before him
  lexicon: HALOT
  rationale: The preposition can indicate source or agency. Here the sense is that
    the rocks are shattered on account of/by reason of his presence and power. 'Because
    of him' communicates the causal force clearly in English while avoiding an overly
    mechanical instrumental reading.
