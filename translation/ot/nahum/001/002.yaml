id: NAM.1.2
reference: Nahum 1:2
source:
  edition: WLC
  text: אֵ֣ל קַנּ֤וֹא וְ/נֹקֵם֙ יְהוָ֔ה נֹקֵ֥ם יְהוָ֖ה וּ/בַ֣עַל חֵמָ֑ה נֹקֵ֤ם יְהוָה֙
    לְ/צָרָ֔י/ו וְ/נוֹטֵ֥ר ה֖וּא לְ/אֹיְבָֽי/ו׃
translation:
  text: The LORD is a jealous and avenging God; the LORD is avenging and full of wrath.
    The LORD takes vengeance on his adversaries, and he keeps wrath for his enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'zealous' for 'jealous.' The Hebrew term denotes covenantal zeal and
      exclusivity.
    reason: lexical_alternative
  - marker: b
    text: Literally 'master/possessor of wrath.'
    reason: lexical_alternative
  - marker: c
    text: Or 'he reserves wrath for his enemies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵל
  chosen: God
  alternatives:
  - Mighty God
  - god
  lexicon: HALOT
  rationale: Here אֵל functions predicatively/appositionally with the following adjectives/participles
    to describe YHWH's character. 'God' is the most natural English rendering in context;
    'Mighty God' would over-specify, and lowercase 'god' would be inappropriate for
    Israel's God.
- source_word: קַנּוֹא
  chosen: jealous
  alternatives:
  - zealous
  lexicon: HALOT
  rationale: The adjective denotes exclusivity-demanding zeal in covenant context.
    'Jealous' is the established and contextually fitting rendering, especially alongside
    divine vengeance; 'zealous' is possible but weakens the relational/covenantal
    force.
- source_word: נֹקֵם / וְנֹקֵם
  chosen: avenging / takes vengeance
  alternatives:
  - vengeful
  - an avenger
  lexicon: HALOT
  rationale: The repeated participle from נקם is rendered with verbal force to preserve
    the Hebrew repetition while keeping idiomatic English. 'Avenging' and 'takes vengeance'
    communicate ongoing/dispositional action better than the more characterological
    'vengeful,' which can sound interpretively loaded.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.' This follows the project's stated convention for יְהוָה.
- source_word: וּבַעַל חֵמָה
  chosen: full of wrath
  alternatives:
  - master of wrath
  - possessor of wrath
  lexicon: HALOT
  rationale: בעל literally means 'owner/master/possessor of,' but in this idiom it
    denotes one characterized by or possessing wrath. 'Full of wrath' is idiomatic
    modern English that preserves the sense without awkward literalism.
- source_word: חֵמָה
  chosen: wrath
  alternatives:
  - rage
  - fury
  - heat
  lexicon: HALOT
  rationale: In prophetic judgment context, 'wrath' best conveys intense divine anger
    with judicial force. 'Rage' can sound uncontrolled, and 'heat' is too literal
    for English style here.
- source_word: לְצָרָיו
  chosen: on his adversaries
  alternatives:
  - against his foes
  - for his adversaries
  lexicon: HALOT
  rationale: The preposition with the participle of נקם indicates the object/target
    of vengeance. 'On his adversaries' is idiomatic with 'takes vengeance' and preserves
    the hostile sense of צררים.
- source_word: וְנוֹטֵר
  chosen: he keeps wrath
  alternatives:
  - he reserves wrath
  - he keeps watch
  - he bears a grudge
  lexicon: HALOT
  rationale: The verb נטר can mean keep, guard, or maintain, and in contexts of anger
    can imply retaining wrath. 'He keeps wrath' preserves the metaphor and parallelism
    with the previous clause. 'Bears a grudge' is too colloquial and psychologically
    narrow; 'keeps watch' does not fit the context.
- source_word: הוּא
  chosen: he
  lexicon: HALOT
  rationale: The explicit pronoun adds emphasis in Hebrew. English naturally includes
    'he' to preserve that emphasis in the final clause.
- source_word: לְאֹיְבָיו
  chosen: for his enemies
  alternatives:
  - against his enemies
  - toward his enemies
  lexicon: HALOT
  rationale: With נטר in this construction, the sense is that wrath is kept in store
    for the enemies. 'For his enemies' best captures the dative-like force in idiomatic
    English, while 'against' would flatten the nuance into simple hostility.
