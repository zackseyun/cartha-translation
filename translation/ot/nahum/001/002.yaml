theological_decisions:
- issue: Rendering divine jealousy
  chosen_reading: The LORD is described as 'jealous' in the sense of covenantal exclusivity
    and righteous zeal.
  alternative_readings:
  - The LORD is 'zealous'
  rationale: The Hebrew adjective קַנּוֹא regularly describes God's exclusive covenant
    claim and is not mere petty envy. 'Jealous' preserves the biblical-theological
    category without softening it.
- issue: Portrayal of divine vengeance and wrath
  chosen_reading: Retain strong judgment language without softening or psychologizing
    it.
  alternative_readings:
  - Use milder language such as 'punishes' or 'is angry'
  rationale: The verse emphatically repeats נקם and includes חמה; the translation
    should preserve the force of divine judicial retribution rather than reduce it
    to generic displeasure.
