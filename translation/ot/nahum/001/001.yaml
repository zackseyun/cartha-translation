id: NAM.1.1
reference: Nahum 1:1
source:
  edition: WLC
  text: מַשָּׂ֖א נִֽינְוֵ֑ה סֵ֧פֶר חֲז֛וֹן נַח֖וּם הָ/אֶלְקֹשִֽׁי׃
translation:
  text: An oracle concerning Nineveh. The book of the vision of Nahum the Elkoshite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'burden of Nineveh' or 'pronouncement concerning Nineveh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשָּׂא
  chosen: oracle
  alternatives:
  - burden
  - pronouncement
  lexicon: HALOT, BDB
  rationale: מַשָּׂא in prophetic headings commonly denotes a weighty prophetic utterance
    or pronouncement, not a literal load. 'Oracle' is established, concise modern
    English that preserves the formal prophetic sense better than the more opaque
    traditional 'burden.'
- source_word: נִינְוֵה
  chosen: Nineveh
  lexicon: HALOT, BDB
  rationale: Proper place name; transliterated by standard English convention per
    translation philosophy.
- source_word: סֵפֶר
  chosen: book
  alternatives:
  - record
  - scroll
  lexicon: HALOT, BDB
  rationale: סֵפֶר most directly means 'book/document/writing.' 'Book' is the most
    natural heading term in English and fits the construct chain with חֲזוֹן.
- source_word: חֲזֹון
  chosen: vision
  alternatives:
  - revelation
  lexicon: HALOT, BDB
  rationale: Standard prophetic term for a revealed sight/message. 'Vision' preserves
    the lexical link to prophetic revelation without over-interpreting the mode.
- source_word: נַחוּם
  chosen: Nahum
  lexicon: HALOT, BDB
  rationale: Proper personal name; transliterated by standard English convention.
- source_word: הָאֶלְקֹשִׁי
  chosen: the Elkoshite
  alternatives:
  - the man from Elkosh
  lexicon: HALOT, BDB
  rationale: Gentilic form with article, identifying Nahum by origin or association
    with Elkosh. 'The Elkoshite' is the most direct and conventional rendering.
