theological_decisions:
- issue: Relationship between the two nominal clauses in the superscription
  chosen_reading: 'Render as two short heading statements: ''An oracle concerning
    Nineveh. The book of the vision of Nahum the Elkoshite.'''
  alternative_readings:
  - 'Render as a single line: ''The oracle of Nineveh, the book of the vision of Nahum
    the Elkoshite.'''
  - Render מַשָּׂא as 'burden' and take the whole as one formal title.
  rationale: The Hebrew consists of two appositional heading elements. Dividing them
    into two English sentences improves readability while preserving the superscriptional
    structure and avoids implying that Nineveh itself authored the oracle. 'Concerning
    Nineveh' makes the object of the oracle explicit in idiomatic English.
