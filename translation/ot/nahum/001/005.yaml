id: NAM.1.5
reference: Nahum 1:5
source:
  edition: WLC
  text: הָרִים֙ רָעֲשׁ֣וּ מִמֶּ֔/נּוּ וְ/הַ/גְּבָע֖וֹת הִתְמֹגָ֑גוּ וַ/תִּשָּׂ֤א הָ/אָ֨רֶץ֙
    מִ/פָּנָ֔י/ו וְ/תֵבֵ֖ל וְ/כָל יֹ֥שְׁבֵי בָֽ/הּ־׃
translation:
  text: The mountains quake before him, and the hills melt away; the earth rises up
    before his face, the world and all who dwell in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The earth is upheaved before him' or 'The earth heaves before him.'
      The Hebrew verb can convey lifting, rising, or upheaval in this context.
    reason: lexical_alternative
  - marker: b
    text: Literally 'before his face.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרִים
  chosen: the mountains
  alternatives:
  - mountains
  lexicon: HALOT
  rationale: Common noun with article; rendered straightforwardly as 'the mountains.'
- source_word: רָעֲשׁוּ
  chosen: quake
  alternatives:
  - tremble
  - shake
  lexicon: HALOT
  rationale: Verb denotes seismic shaking or trembling. 'Quake' fits the cosmic-theophanic
    context and reads naturally in modern English.
- source_word: מִמֶּנּוּ
  chosen: before him
  alternatives:
  - from him
  - because of him
  lexicon: HALOT
  rationale: Though literally 'from him,' in context the preposition expresses causation/presence
    in a theophany. 'Before him' captures the sense of creation reacting in his presence
    and aligns with the following מִפָּנָיו.
- source_word: הַגְּבָעוֹת
  chosen: the hills
  alternatives:
  - the hillsides
  lexicon: HALOT
  rationale: Standard rendering of גבעות as 'hills.'
- source_word: הִתְמֹגָגוּ
  chosen: melt away
  alternatives:
  - dissolve
  - totter
  lexicon: HALOT
  rationale: The reflexive form conveys dissolving or melting in fear/judgment. 'Melt
    away' preserves the vivid imagery.
- source_word: וַתִּשָּׂא
  chosen: rises up
  alternatives:
  - is upheaved
  - is lifted up
  - heaves
  lexicon: HALOT
  rationale: From נשׂא, literally 'lift up/bear.' In this context of cosmic disturbance,
    the earth is pictured as heaving or being upheaved. 'Rises up' preserves the upward
    motion without over-paraphrasing.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In parallel with 'the world and all who dwell in it,' the global sense
    is intended, so 'earth' is preferable to 'land.'
- source_word: מִפָּנָיו
  chosen: before his face
  alternatives:
  - before him
  - at his presence
  lexicon: HALOT
  rationale: Literally 'from/before his face.' Rendered more formally here as 'before
    his face' to preserve the anthropomorphic Hebrew expression and the parallelism
    with the prior clause.
- source_word: תֵבֵל
  chosen: the world
  alternatives:
  - the inhabited world
  lexicon: HALOT
  rationale: Tevel commonly denotes the world as inhabited/ordered. 'The world' is
    the most natural English equivalent here.
- source_word: יֹשְׁבֵי בָהּ
  chosen: all who dwell in it
  alternatives:
  - all its inhabitants
  - all who live in it
  lexicon: HALOT
  rationale: Participial construction meaning the inhabitants of the world/earth.
    'All who dwell in it' is clear, elevated, and close to the Hebrew.
