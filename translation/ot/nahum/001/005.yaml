theological_decisions:
- issue: Cosmic-theophanic imagery in divine judgment
  chosen_reading: Render the verse as describing creation's reaction to the LORD's
    presence without softening the imagery into mere metaphor.
  alternative_readings:
  - Treat the language as purely figurative political upheaval
  rationale: The immediate context is a theophany of divine wrath and majesty. The
    translation preserves the cosmic scope of the Hebrew while not forcing a literalistic
    interpretation beyond the text.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
