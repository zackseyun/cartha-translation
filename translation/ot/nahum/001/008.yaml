theological_decisions:
- issue: Referent of the pronominal suffixes in 'her place' and 'his enemies'
  chosen_reading: '''her place'' refers to the city/power under judgment (likely Nineveh),
    while ''his enemies'' refers to the LORD''s enemies.'
  alternative_readings:
  - '''its place'' for an impersonal referent'
  - taking both suffixes with the same antecedent
  rationale: 'The Hebrew shifts from a feminine suffix on ''place'' to a masculine
    suffix on ''enemies.'' Preserving that shift best reflects the source text and
    the flow of Nahum''s oracle: the LORD destroys the place of the hostile city and
    pursues his own enemies with darkness.'
  doctrine_reference: Translation philosophy §§1, 3, 5
