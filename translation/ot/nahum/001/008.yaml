id: NAM.1.8
reference: Nahum 1:8
source:
  edition: WLC
  text: וּ/בְ/שֶׁ֣טֶף עֹבֵ֔ר כָּלָ֖ה יַעֲשֶׂ֣ה מְקוֹמָ֑/הּ וְ/אֹיְבָ֖י/ו יְרַדֶּף
    חֹֽשֶׁךְ־׃
translation:
  text: But with an overwhelming flood he will make a complete end of her place, and
    darkness will pursue his enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its place.' The Hebrew has a feminine singular suffix ('her place'),
      likely personifying the city under judgment; some translations smooth this to
      'its place.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְשֶׁטֶף
  chosen: But with an overwhelming flood
  alternatives:
  - And with a flood
  - But with a rushing torrent
  lexicon: HALOT
  rationale: The conjunction can be rendered 'and' or adversatively as 'but'; in context,
    after the LORD's protection of those who take refuge in him (v. 7), an adversative
    sense fits well. שֶׁטֶף denotes an overflowing flood/torrent; 'overwhelming flood'
    captures both the concrete image and its destructive force.
- source_word: עֹבֵר
  chosen: overwhelming
  alternatives:
  - overflowing
  - passing through
  - sweeping
  lexicon: HALOT
  rationale: As a participle modifying 'flood,' the word literally means 'passing
    over/through' or 'overflowing.' In English, 'overwhelming' idiomatically conveys
    a flood that sweeps over its target while remaining natural.
- source_word: כָּלָה
  chosen: a complete end
  alternatives:
  - an end
  - destruction
  - annihilation
  lexicon: HALOT
  rationale: כָּלָה often carries the sense of complete destruction or full end. 'A
    complete end' preserves the intensifying force better than the flatter 'an end.'
- source_word: יַעֲשֶׂה
  chosen: he will make
  alternatives:
  - he will bring about
  - he will accomplish
  lexicon: HALOT
  rationale: The common verb עשה is kept with its basic sense 'make/do,' yielding
    the idiomatic phrase 'make a complete end.'
- source_word: מְקוֹמָהּ
  chosen: her place
  alternatives:
  - its place
  - his place
  lexicon: HALOT
  rationale: The suffix is feminine singular. In context this most naturally refers
    to Nineveh/the hostile power personified as feminine, so 'her place' best reflects
    the Hebrew form. Because the antecedent is implicit and some take it differently,
    the alternative is preserved in a footnote.
- source_word: וְאֹיְבָיו
  chosen: and his enemies
  alternatives:
  - and its enemies
  lexicon: HALOT
  rationale: 'The suffix is masculine singular, most naturally referring to the LORD
    in context: those opposed to him. This yields the straightforward sense that darkness
    pursues the LORD''s enemies.'
- source_word: יְרַדֶּף
  chosen: will pursue
  alternatives:
  - will chase
  - will drive after
  lexicon: HALOT
  rationale: The piel of רדף commonly means 'pursue/chase.' 'Will pursue' is direct
    and preserves the threatening imagery.
- source_word: חֹשֶׁךְ
  chosen: darkness
  alternatives:
  - gloom
  - darkness of judgment
  lexicon: HALOT
  rationale: The noun literally means 'darkness.' In prophetic context it likely carries
    judgment overtones, but the main text should preserve the concrete term and let
    the imagery speak.
