id: NAM.3.11
reference: Nahum 3:11
source:
  edition: WLC
  text: גַּם אַ֣תְּ תִּשְׁכְּרִ֔י תְּהִ֖י נַֽעֲלָמָ֑ה גַּם אַ֛תְּ תְּבַקְשִׁ֥י מָע֖וֹז
    מֵ/אוֹיֵֽב־־׃
translation:
  text: You too will become drunk; you will be hidden. You too will seek a refuge
    from the enemy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You too will seek a stronghold from the enemy.'
    reason: lexical_alternative
  - marker: b
    text: '''Become drunk'' likely continues prophetic imagery of being overwhelmed
      and reeling under judgment, not merely literal intoxication.'
    reason: cultural_note
lexical_decisions:
- source_word: תִּשְׁכְּרִי
  chosen: will become drunk
  alternatives:
  - will be drunk
  - will be intoxicated
  lexicon: HALOT
  rationale: The Qal imperfect of שׁכר commonly means to become drunk/intoxicated.
    In prophetic judgment language it can be metaphorical for staggering under divine
    wrath, but the verse itself does not explicitly mention wrath here, so the main
    text keeps the concrete image 'become drunk' and lets the context carry the metaphorical
    force.
- source_word: תְּהִי נַעֲלָמָה
  chosen: you will be hidden
  alternatives:
  - you will be concealed
  - you will disappear
  lexicon: HALOT
  rationale: The construction with היה + passive participle/niphal-like form from
    עלם conveys coming into a state of being hidden or concealed. 'You will be hidden'
    is a natural English rendering that preserves the passive/resultative sense. 'Disappear'
    is possible interpretively, but less transparent to the Hebrew form.
- source_word: תְּבַקְשִׁי
  chosen: will seek
  alternatives:
  - will look for
  lexicon: HALOT
  rationale: בקש in the Piel commonly means seek, look for, or attempt to obtain.
    'Seek' is the standard concise rendering and fits the elevated prophetic tone.
- source_word: מָעוֹז
  chosen: a refuge
  alternatives:
  - a stronghold
  - protection
  - fortress
  lexicon: HALOT
  rationale: מָעוֹז denotes a place or means of safety/strength. In context Nineveh
    is seeking protection from attack, so 'a refuge' communicates the functional sense
    in readable English. 'Stronghold' is a strong alternative and is preserved in
    a footnote because the noun can denote a fortified place.
- source_word: מֵאוֹיֵב
  chosen: from the enemy
  alternatives:
  - because of the enemy
  - against the enemy
  lexicon: HALOT
  rationale: 'The preposition מִן with אוֹיֵב is most naturally taken as separation/protection:
    refuge from the enemy. This fits the context of seeking safety under threat.'
- source_word: גַּם אַתְּ
  chosen: You too
  alternatives:
  - Also you
  - Even you
  lexicon: HALOT
  rationale: The repeated phrase emphasizes that Nineveh, like No-amon before her,
    will suffer the same fate. 'You too' is idiomatic and preserves the rhetorical
    force of comparison and inevitability.
