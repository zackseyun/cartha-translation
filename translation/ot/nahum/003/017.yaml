id: NAM.3.17
reference: Nahum 3:17
source:
  edition: WLC
  text: מִנְּזָרַ֨יִ/ךְ֙ כָּֽ/אַרְבֶּ֔ה וְ/טַפְסְרַ֖יִ/ךְ כְּ/ג֣וֹב גֹּבָ֑י הַֽ/חוֹנִ֤ים
    בַּ/גְּדֵרוֹת֙ בְּ/י֣וֹם קָרָ֔ה שֶׁ֤מֶשׁ זָֽרְחָה֙ וְ/נוֹדַ֔ד וְ/לֹֽא נוֹדַ֥ע
    מְקוֹמ֖/וֹ אַיָּֽ/ם־׃
translation:
  text: Your guards are like locusts, and your scribes like swarms of locusts, settling
    on the walls on a cold day. The sun rises, and they fly away; no one knows where
    they are.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your crowned ones,' 'your princes,' or 'your consecrated ones' for the
      rare Hebrew term.
    reason: lexical_alternative
  - marker: b
    text: Or 'your officers' or 'your military commanders' for 'your scribes.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew may also mean 'on the fences/enclosures,' not necessarily city walls.
    reason: lexical_alternative
  - marker: d
    text: The final clause is literally something like, 'and its/their place is not
      known—where are they?'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנְּזָרַיִךְ
  chosen: your guards
  alternatives:
  - your crowned ones
  - your princes
  - your consecrated ones
  lexicon: HALOT
  rationale: The noun is rare and debated. In Nahum's taunt against Nineveh, the parallel
    with officials and the locust imagery favors a class of protected or elite personnel,
    likely military or administrative guards/watchers rather than literally 'consecrated
    ones.' 'Guards' gives a plausible contextual sense in readable English while preserving
    the social role implied by the parallelism.
- source_word: כָּאַרְבֶּה
  chosen: like locusts
  alternatives:
  - like the locust
  lexicon: HALOT
  rationale: The comparison is collective and generic; English plural 'locusts' best
    conveys the simile.
- source_word: טַפְסְרַיִךְ
  chosen: your scribes
  alternatives:
  - your marshals
  - your officers
  - your military commanders
  lexicon: HALOT
  rationale: This loanword is also debated. It can denote high officials, possibly
    military scribes or commanders in Assyrian/Babylonian administration. 'Scribes'
    preserves the likely lexical core and traditional understanding, while the footnote
    preserves the administrative/military alternatives.
- source_word: כְּגֹב גֹבָי
  chosen: like swarms of locusts
  alternatives:
  - like a swarm of grasshoppers
  - like locust hatchlings
  lexicon: HALOT
  rationale: The doubled form intensifies the image and likely refers to a massed
    locust swarm/brood. 'Swarms of locusts' communicates the collective force naturally
    in English.
- source_word: הַחוֹנִים
  chosen: settling
  alternatives:
  - encamping
  - resting
  lexicon: HALOT
  rationale: The participle from חנה commonly means 'encamp' or 'settle down.' With
    insects on walls, 'settling' fits the image idiomatically.
- source_word: בַּגְּדֵרוֹת
  chosen: on the walls
  alternatives:
  - in the enclosures
  - on the fences
  - in the hedges
  lexicon: HALOT
  rationale: The noun can denote walls, fences, or enclosures. In the urban siege
    context of Nineveh, 'walls' is the most fitting and vivid rendering, though the
    underlying image may be of insects clustering on protective structures generally.
- source_word: בְּיוֹם קָרָה
  chosen: on a cold day
  alternatives:
  - in a day of cold
  - on a chilly day
  lexicon: HALOT
  rationale: A straightforward temporal phrase; 'cold day' is natural modern English.
- source_word: שֶׁמֶשׁ זָרְחָה
  chosen: The sun rises
  alternatives:
  - the sun shines
  - the sun has risen
  lexicon: HALOT
  rationale: The perfect can be rendered vividly in English present within poetic
    description. 'Rises' matches the scene of warming that causes the insects to depart.
- source_word: וְנוֹדַד
  chosen: they fly away
  alternatives:
  - it flees away
  - they wander off
  - they move away
  lexicon: HALOT
  rationale: The verb means to flee, wander, or move away. Because the antecedent
    is the locust-like groups, English plural 'they fly away' makes the insect image
    explicit and natural.
- source_word: וְלֹא נוֹדַע מְקוֹמוֹ אַיָּם
  chosen: no one knows where they are
  alternatives:
  - its place is not known where it is
  - their place is not known—where are they?
  lexicon: HALOT
  rationale: The Hebrew closes with an idiomatic statement of disappearance. The final
    אַיָּם likely means 'where are they?' or functions adverbially to indicate unknown
    whereabouts. The chosen rendering captures the sense clearly in English while
    preserving the plural referent implied by the imagery.
