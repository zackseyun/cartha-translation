id: NAM.3.12
reference: Nahum 3:12
source:
  edition: WLC
  text: כָּ֨ל מִבְצָרַ֔יִ/ךְ תְּאֵנִ֖ים עִם בִּכּוּרִ֑ים אִם יִנּ֕וֹעוּ וְ/נָפְל֖וּ
    עַל פִּ֥י אוֹכֵֽל־־־־׃
translation:
  text: 'All your fortresses are fig trees with first-ripe figs: if they are shaken,
    they fall into the mouth of the eater.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'figs with early figs,' taking the image as fruit rather than trees;
      the main text reads 'fig trees' because it better fits the comparison to fortified
      places.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבְצָרַיִךְ
  chosen: your fortresses
  alternatives:
  - your strongholds
  - your defenses
  lexicon: HALOT
  rationale: The noun denotes fortified places or strongholds. 'Fortresses' is concrete
    and vivid in context, matching the military imagery directed at Nineveh.
- source_word: תְּאֵנִים
  chosen: fig trees
  alternatives:
  - figs
  lexicon: HALOT
  rationale: 'Though the form can denote figs, the comparison works best as ''fig
    trees'' in apposition to the fortresses: the fortresses are like fig trees. This
    also fits the following mention of first-ripe figs and shaking.'
- source_word: עִם בִּכּוּרִים
  chosen: with first-ripe figs
  alternatives:
  - with early figs
  - bearing firstfruits
  lexicon: HALOT
  rationale: בִּכּוּרִים refers to first-ripe produce, here specifically early figs.
    'With first-ripe figs' preserves the agricultural image without overinterpreting
    it cultically as 'firstfruits'.
- source_word: אִם
  chosen: if
  alternatives:
  - when
  lexicon: HALOT
  rationale: The particle is conditional. In this simile the sense approaches a vivid
    general condition ('if they are shaken'), which in English also implies expected
    result.
- source_word: יִנּוֹעוּ
  chosen: are shaken
  alternatives:
  - are jostled
  - are made to sway
  lexicon: HALOT
  rationale: From נוע, 'to shake, totter, sway.' Passive English best captures the
    implied action upon the trees/fruit in the simile.
- source_word: וְנָפְלוּ
  chosen: they fall
  alternatives:
  - they will fall
  lexicon: HALOT
  rationale: The perfect after the conditional expresses the resulting action. Present
    English in a gnomic simile is natural and preserves the immediacy of the image.
- source_word: עַל פִּי אוֹכֵל
  chosen: into the mouth of the eater
  alternatives:
  - upon the eater's mouth
  - into the mouth of the one who eats
  lexicon: HALOT
  rationale: Literally 'upon the mouth of an eater.' 'Into the mouth of the eater'
    is idiomatic English and conveys the ease and immediacy with which the figs are
    consumed, paralleling the vulnerability of Nineveh's defenses.
