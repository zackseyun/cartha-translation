id: NAM.3.8
reference: Nahum 3:8
source:
  edition: WLC
  text: הֲ/תֵֽיטְבִי֙ מִ/נֹּ֣א אָמ֔וֹן הַ/יֹּֽשְׁבָה֙ בַּ/יְאֹרִ֔ים מַ֖יִם סָבִ֣יב
    לָ֑/הּ אֲשֶׁר חֵ֣יל יָ֔ם מִ/יָּ֖ם חוֹמָתָֽ/הּ־׃
translation:
  text: Are you better than No-amon, who sat among the Nile channels, with waters
    all around her, whose rampart was the sea, whose wall was from the sea?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: No-amon is the Egyptian city better known as Thebes.
    reason: alternative_reading
  - marker: b
    text: Or 'whose strength was the sea' for 'whose rampart was the sea'; the Hebrew
      term can denote strength or defensive force.
    reason: lexical_alternative
  - marker: c
    text: That is, the surrounding waters functioned as her wall.
    reason: cultural_note
lexical_decisions:
- source_word: הֲתֵיטְבִי
  chosen: Are you better than
  alternatives:
  - Are you more favored than
  - Are you more prosperous than
  lexicon: HALOT
  rationale: Hiphil of יטב in an interrogative comparison asks whether Nineveh is
    superior to or better off than another city. 'Are you better than' is idiomatic
    and fits the taunt context.
- source_word: נֹּא אָמוֹן
  chosen: No-amon
  alternatives:
  - Thebes
  - No of Amon
  lexicon: HALOT
  rationale: The Hebrew preserves the place name rather than translating it. Following
    the philosophy to transliterate names, 'No-amon' is kept in the main text, while
    the historically familiar identification 'Thebes' is preserved in a footnote.
- source_word: הַיֹּשְׁבָה
  chosen: who sat
  alternatives:
  - who dwelt
  - who lived
  lexicon: HALOT
  rationale: Qal participle of ישב commonly means 'sit, dwell, inhabit.' In describing
    a city's settled location, 'sat' preserves the concrete imagery while remaining
    natural in English poetic-prophetic style.
- source_word: בַּיְאֹרִים
  chosen: among the Nile channels
  alternatives:
  - by the rivers
  - among the canals
  - by the Nile streams
  lexicon: HALOT
  rationale: יְאֹר often refers specifically to the Nile or its canals in Egyptian
    contexts. Since No-amon is in Egypt, 'Nile channels' best captures the local reference
    more precisely than generic 'rivers'.
- source_word: מַיִם סָבִיב לָהּ
  chosen: with waters all around her
  alternatives:
  - waters were around her
  - surrounded by waters
  lexicon: HALOT
  rationale: This phrase describes the city's defensive setting. 'With waters all
    around her' is a smooth English rendering that preserves the circumstantial force
    and feminine personification of the city.
- source_word: אֲשֶׁר חֵיל יָם
  chosen: whose rampart was the sea
  alternatives:
  - whose strength was the sea
  - whose wealth was the sea
  - whose army was the sea
  lexicon: HALOT
  rationale: חֵיל can denote strength, wealth, army, or defensive force. In parallel
    with 'wall' in the next colon and the surrounding imagery of natural defenses,
    'rampart' best fits the metaphorical sense of protective fortification.
- source_word: מִיָּם חוֹמָתָהּ
  chosen: whose wall was from the sea
  alternatives:
  - the sea was her wall
  - whose wall came from the sea
  lexicon: HALOT
  rationale: The preposition מִן is retained with 'from' to reflect the Hebrew wording,
    though the sense is that the sea functioned as her wall. The chosen rendering
    preserves the poetic parallelism without over-paraphrasing.
