id: NAM.3.9
reference: Nahum 3:9
source:
  edition: WLC
  text: כּ֥וּשׁ עָצְמָ֛/ה וּ/מִצְרַ֖יִם וְ/אֵ֣ין קֵ֑צֶה פּ֣וּט וְ/לוּבִ֔ים הָי֖וּ
    בְּ/עֶזְרָתֵֽ/ךְ׃
translation:
  text: Cush was her strength, and Egypt without end; Put and the Libyans were among
    your helpers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew shifts person within the verse: ''Cush was her strength'' (3rd person
      feminine) but ''your helpers'' (2nd person feminine). The translation preserves
      this shift rather than smoothing it out.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Cush was your strength.' Some translations smooth the pronoun to match
      the later 'your,' but the Hebrew suffix on 'strength' is third feminine singular
      ('her').
    reason: alternative_reading
  - marker: c
    text: '''Put'' is also traditionally rendered ''Phut.'''
    reason: lexical_alternative
  - marker: d
    text: Hebrew 'Lubim'; likely Libyan peoples.
    reason: cultural_note
lexical_decisions:
- source_word: כּוּשׁ
  chosen: Cush
  alternatives:
  - Ethiopia
  lexicon: HALOT
  rationale: Transliterated as a place/people name per translation philosophy ('translate
    titles; transliterate names'). 'Ethiopia' is a common interpretive equivalent
    but is more geographically interpretive than the Hebrew proper name.
- source_word: עָצְמָהּ
  chosen: was her strength
  alternatives:
  - was your strength
  - was mighty for her
  lexicon: HALOT
  rationale: From עצמה with 3fs suffix, indicating strength/might belonging to the
    feminine referent (No-ammon/Thebes in context). Rendered idiomatically as 'was
    her strength.' Because the verse later shifts to 2fs ('your helpers'), some English
    versions harmonize to 'your strength,' but the Hebrew suffix here is 3fs and should
    be preserved.
- source_word: וּמִצְרַיִם
  chosen: and Egypt
  lexicon: HALOT
  rationale: Straightforward proper name joined to Cush as allied power.
- source_word: וְאֵין קֵצֶה
  chosen: without end
  alternatives:
  - there was no end
  - endless
  lexicon: HALOT
  rationale: Idiomatic expression meaning innumerable or immeasurable extent. 'Without
    end' preserves the Hebrew compactly while remaining natural in English.
- source_word: פּוּט
  chosen: Put
  alternatives:
  - Phut
  lexicon: HALOT
  rationale: Proper name transliterated directly from Hebrew. 'Phut' reflects older
    English tradition but is less transparent to the Hebrew spelling.
- source_word: לוּבִים
  chosen: the Libyans
  alternatives:
  - Lubim
  lexicon: HALOT
  rationale: This ethnonym likely refers to Libyan peoples. Here a translated ethnic
    designation is clearer in modern English than a bare transliteration, while still
    reflecting the referent.
- source_word: הָיוּ
  chosen: were
  alternatives:
  - became
  lexicon: HALOT
  rationale: Simple copular past fits the clause naturally.
- source_word: בְּעֶזְרָתֵךְ
  chosen: among your helpers
  alternatives:
  - for your help
  - as your help
  - in your assistance
  lexicon: HALOT
  rationale: The preposition ב plus עזרה with 2fs suffix is somewhat idiomatic in
    context, describing Put and the Libyans as part of the city's supporting forces.
    'Among your helpers' communicates membership in her assistance more naturally
    than the wooden 'in your help.' The 2fs suffix is preserved as 'your,' reflecting
    the direct address to the city.
