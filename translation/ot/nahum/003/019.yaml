theological_decisions:
- issue: Rendering רָעָתְךָ in a judgment oracle against Nineveh
  chosen_reading: your evil
  alternative_readings:
  - your wickedness
  - your cruelty
  - your harm
  rationale: The context is moral indictment of Assyria/Nineveh's oppressive violence.
    'Evil' preserves the broader moral category without narrowing it only to subjective
    cruelty or merely resultant harm.
