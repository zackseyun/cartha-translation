id: NAM.3.19
reference: Nahum 3:19
source:
  edition: WLC
  text: אֵין כֵּהָ֣ה לְ/שִׁבְרֶ֔/ךָ נַחְלָ֖ה מַכָּתֶ֑/ךָ כֹּ֣ל שֹׁמְעֵ֣י שִׁמְעֲ/ךָ֗
    תָּ֤קְעוּ כַף֙ עָלֶ֔י/ךָ כִּ֗י עַל מִ֛י לֹֽא עָבְרָ֥ה רָעָתְ/ךָ֖ תָּמִֽיד־׀־־׃
translation:
  text: There is no healing for your fracture; your wound is grievous. All who hear
    the report about you clap their hands over you, for over whom has your evil not
    continually passed?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'There is no relief for your brokenness; your wound is severe.'
    reason: lexical_alternative
  - marker: b
    text: The rhetorical question means that Nineveh's evil had affected virtually
      everyone, which is why the nations rejoice at its fall.
    reason: cultural_note
lexical_decisions:
- source_word: אֵין
  chosen: There is no
  alternatives:
  - there is not
  lexicon: HALOT
  rationale: Existential negation introducing the verdict; idiomatic English requires
    'There is no' rather than a bare 'No'.
- source_word: כֵּהָה
  chosen: healing
  alternatives:
  - easing
  - diminishing
  - relief
  lexicon: HALOT
  rationale: The noun denotes a lessening or healing of injury. In context of national
    ruin, 'healing' best fits the collocation with שבר and communicates that the damage
    is beyond remedy.
- source_word: לְשִׁבְרֶךָ
  chosen: for your fracture
  alternatives:
  - for your brokenness
  - for your collapse
  - for your injury
  lexicon: HALOT
  rationale: שבר can denote breaking, fracture, or ruin. 'Fracture' preserves the
    injury metaphor while remaining natural in English and pairing well with 'wound'
    in the next colon.
- source_word: נַחְלָה
  chosen: is grievous
  alternatives:
  - is severe
  - is incurable
  - is sickening
  lexicon: HALOT
  rationale: The adjective/verb form conveys being weak, sick, or grievous. Here it
    predicates the seriousness of the wound. 'Is grievous' captures the severity without
    overtranslating to 'incurable,' which is interpretive though contextually implied.
- source_word: מַכָּתֶךָ
  chosen: your wound
  alternatives:
  - your blow
  - your injury
  - your plague
  lexicon: HALOT
  rationale: A common term for a blow or wound. 'Wound' fits the medical/injury imagery
    established in the verse.
- source_word: כֹּל שֹׁמְעֵי שִׁמְעֲךָ
  chosen: All who hear the report about you
  alternatives:
  - all who hear your news
  - all who hear of you
  - all hearing your report
  lexicon: HALOT
  rationale: The phrase refers not merely to hearing Nineveh itself but hearing the
    report/news concerning its downfall. 'The report about you' makes the object explicit
    in idiomatic English.
- source_word: תָּקְעוּ כַף
  chosen: clap their hands
  alternatives:
  - strike the palm
  - applaud
  lexicon: HALOT
  rationale: Hebrew idiom for striking the hand/palm. Here it expresses exultation
    over Nineveh's fall, not neutral applause. 'Clap their hands' is the natural English
    equivalent.
- source_word: עָלֶיךָ
  chosen: over you
  alternatives:
  - at you
  - against you
  - because of you
  lexicon: HALOT
  rationale: In this context the preposition marks hostile rejoicing directed toward
    Nineveh. 'Over you' conveys rejoicing at its downfall.
- source_word: כִּי עַל מִי לֹא עָבְרָה רָעָתְךָ תָּמִיד
  chosen: for over whom has your evil not continually passed?
  alternatives:
  - for upon whom has your wickedness not come continually?
  - for who has not suffered your cruelty continually?
  - for on whom has your evil not passed constantly?
  lexicon: HALOT
  rationale: The clause is rhetorical, explaining universal rejoicing because Nineveh's
    evil affected everyone. רעה here is moral evil expressed in oppressive harm, not
    merely 'trouble.' 'Continually passed' preserves the verbal imagery of עבר while
    keeping the rhetorical force.
