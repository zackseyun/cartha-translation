id: NAM.3.14
reference: Nahum 3:14
source:
  edition: WLC
  text: מֵ֤י מָצוֹר֙ שַֽׁאֲבִי לָ֔/ךְ חַזְּקִ֖י מִבְצָרָ֑יִ/ךְ בֹּ֧אִי בַ/טִּ֛יט וְ/רִמְסִ֥י
    בַ/חֹ֖מֶר הַחֲזִ֥יקִי מַלְבֵּֽן־׃
translation:
  text: Draw water for yourself for the siege; strengthen your fortresses. Go into
    the clay and tread the mortar; take hold of the brick mold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the brick kiln.' The Hebrew term מַלְבֵּן is rare and may refer either
      to a brick mold/form or to a brick kiln; the immediate context of working clay
      and mortar favors 'brick mold.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵי מָצוֹר
  chosen: water for ... the siege
  alternatives:
  - siege water
  - water for the besieging
  lexicon: HALOT
  rationale: Construct phrase literally 'waters of siege.' In context it refers to
    storing/drawing water in preparation for an impending siege, so 'water for the
    siege' preserves the military sense while remaining natural English.
- source_word: שַׁאֲבִי לָךְ
  chosen: Draw ... for yourself
  alternatives:
  - draw for yourself
  - draw water for yourself
  lexicon: HALOT
  rationale: Imperative feminine singular with reflexive/dative nuance. 'For yourself'
    preserves the Hebrew לך and the direct address to the city personified as a woman.
- source_word: חַזְּקִי
  chosen: strengthen
  alternatives:
  - make strong
  - fortify
  lexicon: HALOT
  rationale: Piel imperative of חזק commonly means 'strengthen' or 'fortify.' 'Strengthen'
    is chosen here and paired with 'fortresses' to keep the verbal force clear.
- source_word: מִבְצָרַיִךְ
  chosen: your fortresses
  alternatives:
  - your strongholds
  - your defenses
  lexicon: HALOT
  rationale: Plural noun for fortified places/strongholds. 'Fortresses' is concrete
    and fits the siege-preparation imagery.
- source_word: בֹּאִי בַטִּיט
  chosen: Go into the clay
  alternatives:
  - come into the mud
  - enter the clay
  lexicon: HALOT
  rationale: Imperative feminine singular. טיט can denote mud/clay. Here the following
    brickmaking imagery favors 'clay' over the more generic 'mud'.
- source_word: וְרִמְסִי בַחֹמֶר
  chosen: and tread the mortar
  alternatives:
  - and trample the clay
  - and knead the mortar
  lexicon: HALOT
  rationale: רמס literally means tread/trample. חֹמֶר can denote clay or mortar. In
    the brickmaking context, 'tread the mortar' captures the action of working the
    material underfoot without over-paraphrasing.
- source_word: הַחֲזִיקִי
  chosen: take hold of
  alternatives:
  - grasp
  - strengthen
  lexicon: HALOT
  rationale: Hiphil imperative of חזק here most naturally means 'take hold of' or
    'seize,' not 'strengthen,' because it governs the following object מַלְבֵּן.
- source_word: מַלְבֵּן
  chosen: the brick mold
  alternatives:
  - the brick kiln
  - the brickwork
  - the brick form
  lexicon: HALOT
  rationale: The noun is rare and debated. In this sequence of clay, mortar, and preparation,
    a brickmaking implement or mold best fits. 'Brick mold' is preferred over 'brick
    kiln' because the immediate commands concern manual preparation rather than firing.
