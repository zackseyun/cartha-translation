id: NAM.3.16
reference: Nahum 3:16
source:
  edition: WLC
  text: הִרְבֵּית֙ רֹֽכְלַ֔יִ/ךְ מִ/כּוֹכְבֵ֖י הַ/שָּׁמָ֑יִם יֶ֥לֶק פָּשַׁ֖ט וַ/יָּעֹֽף׃
translation:
  text: You multiplied your merchants more than the stars of the heavens; the locust
    strips bare and flies away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the young locust' or 'the hopper'; the Hebrew term refers to a particular
      kind or stage of locust.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb can also mean 'spreads out' or 'strips off'; here it likely
      describes the locust stripping the land bare before departing.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִרְבֵּית
  chosen: You multiplied
  alternatives:
  - You increased
  - You made numerous
  lexicon: HALOT
  rationale: Hiphil perfect 2fs of רבה, addressed to Nineveh as a feminine singular
    city. 'Multiplied' preserves the causative/increase sense and fits the direct
    address.
- source_word: רֹכְלַיִךְ
  chosen: your merchants
  alternatives:
  - your traders
  lexicon: HALOT
  rationale: From רכל, referring to traders/merchants. 'Merchants' is idiomatic and
    suits the economic imagery of Nineveh's commercial reach.
- source_word: מִכּוֹכְבֵי הַשָּׁמַיִם
  chosen: more than the stars of the heavens
  alternatives:
  - beyond the stars of heaven
  - than the stars of the sky
  lexicon: HALOT
  rationale: Comparative מן after רבה indicates exceeding number. 'The heavens' is
    slightly more formal and matches the Hebrew plural noun while remaining natural
    English.
- source_word: יֶלֶק
  chosen: the locust
  alternatives:
  - the young locust
  - the hopper
  lexicon: HALOT
  rationale: יֶלֶק denotes a kind/stage of locust. Since English readers generally
    do not distinguish the species/stage clearly, 'the locust' communicates the image
    without overprecision; the more specific alternative is preserved in a footnote.
- source_word: פָּשַׁט
  chosen: strips bare
  alternatives:
  - spreads out
  - strips off
  - plunders
  lexicon: HALOT
  rationale: The verb literally has senses like spread out/strip off. In this context
    of locust devastation and the immediate departure, 'strips bare' best captures
    the destructive action implied by the image.
- source_word: וַיָּעֹף
  chosen: and flies away
  alternatives:
  - then flies away
  - and flies off
  lexicon: HALOT
  rationale: Qal wayyiqtol of עוּף, 'to fly.' 'Flies away' gives the sequential sense
    naturally in English and matches the image of sudden disappearance after consuming.
