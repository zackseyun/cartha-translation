id: NAM.3.18
reference: Nahum 3:18
source:
  edition: WLC
  text: נָמ֤וּ רֹעֶ֨י/ךָ֙ מֶ֣לֶךְ אַשּׁ֔וּר יִשְׁכְּנ֖וּ אַדִּירֶ֑י/ךָ נָפֹ֧שׁוּ עַמְּ/ךָ֛
    עַל הֶ/הָרִ֖ים וְ/אֵ֥ין מְקַבֵּֽץ־׃
translation:
  text: Your shepherds slumber, O king of Assyria; your nobles lie down. Your people
    are scattered on the mountains, and there is no one to gather them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sleep' for 'slumber'; the Hebrew image may suggest negligent or incapacitated
      leaders.
    reason: lexical_alternative
  - marker: b
    text: '''Your shepherds'' is a metaphor for Assyria''s rulers or leaders.'
    reason: cultural_note
  - marker: c
    text: Or 'your mighty ones dwell/rest.' The Hebrew verb can mean 'dwell,' but
      here likely continues the image of leaders lying inactive.
    reason: alternative_reading
  - marker: d
    text: The Hebrew behind 'are scattered' is difficult; the sense is supported by
      the following line, 'there is no one to gather them.'
    reason: textual_variant
lexical_decisions:
- source_word: נָמוּ
  chosen: slumber
  alternatives:
  - sleep
  - are still
  lexicon: HALOT
  rationale: The verb from נום commonly denotes sleeping or drowsing. 'Slumber' preserves
    the metaphorical force for negligent or inactive leaders better than the flatter
    'sleep,' while still sounding natural in English.
- source_word: רֹעֶיךָ
  chosen: your shepherds
  alternatives:
  - your rulers
  - your pastors
  lexicon: HALOT
  rationale: The Hebrew literally means 'your shepherds.' In prophetic literature
    this often metaphorically refers to rulers or leaders, but the shepherd image
    is important and should be retained in the main text.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: O king of Assyria
  alternatives:
  - king of Assyria
  lexicon: HALOT
  rationale: Direct address is most natural here in context, so the vocative sense
    is brought out with 'O,' though Hebrew has no separate vocative marker.
- source_word: יִשְׁכְּנוּ
  chosen: lie down
  alternatives:
  - dwell
  - settle down
  - rest
  lexicon: HALOT
  rationale: Although שכן often means 'dwell,' in this parallel context with sleeping/slumbering
    leaders it likely carries the sense of lying down or resting. This preserves the
    poetic parallelism and the image of inactivity or deathlike helplessness.
- source_word: אַדִּירֶיךָ
  chosen: your nobles
  alternatives:
  - your majestic ones
  - your mighty men
  lexicon: HALOT
  rationale: The adjective/noun can denote mighty or noble persons. In context of
    Assyrian leadership, 'nobles' best fits the social-political reference without
    over-militarizing the term.
- source_word: נָפֹשׁוּ
  chosen: are scattered
  alternatives:
  - are dispersed
  - are spread out
  - take breath
  lexicon: HALOT
  rationale: The form is difficult, but in context with 'on the mountains' and 'no
    one to gather' it clearly points to dispersion of the populace. 'Are scattered'
    best matches the contextual sense and the following clause.
- source_word: עַמְּךָ
  chosen: your people
  alternatives:
  - your troops
  lexicon: HALOT
  rationale: The normal sense is 'your people.' While in military context it could
    be heard as the populace under the king's rule, there is insufficient warrant
    to narrow it to 'troops' in the main text.
- source_word: עַל הֶהָרִים
  chosen: on the mountains
  alternatives:
  - upon the hills
  lexicon: HALOT
  rationale: A straightforward rendering of the prepositional phrase; 'mountains'
    is the normal sense of הָרִים.
- source_word: וְאֵין מְקַבֵּץ
  chosen: and there is no one to gather them
  alternatives:
  - with none gathering
  - and no one gathers
  lexicon: HALOT
  rationale: English requires the object to be supplied from context. 'Them' refers
    back to the scattered people and makes the sense explicit without adding new content.
