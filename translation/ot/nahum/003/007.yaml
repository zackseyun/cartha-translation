id: NAM.3.7
reference: Nahum 3:7
source:
  edition: WLC
  text: וְ/הָיָ֤ה כָל רֹאַ֨יִ/ךְ֙ יִדּ֣וֹד מִמֵּ֔/ךְ וְ/אָמַר֙ שָׁדְּדָ֣ה נִֽינְוֵ֔ה
    מִ֖י יָנ֣וּד לָ֑/הּ מֵ/אַ֛יִן אֲבַקֵּ֥שׁ מְנַחֲמִ֖ים לָֽ/ךְ־׃
translation:
  text: And it will happen that all who see you will shrink from you and say, ‘Nineveh
    is devastated; who will grieve for her? Where can I seek comforters for you?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will flee from you' for 'will shrink from you.' The Hebrew verb can
      denote moving away or wandering off; here it likely expresses recoiling in horror
      at Nineveh's fall.
    reason: lexical_alternative
  - marker: b
    text: Or 'who will bemoan her?' The Hebrew can refer to showing sympathy or lamenting
      with mourning gestures.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹאַיִךְ
  chosen: all who see you
  alternatives:
  - everyone who looks at you
  - all your observers
  lexicon: HALOT
  rationale: Qal participle of ראה with 2fs suffix; denotes those who behold Nineveh.
    'All who see you' is natural and close to the Hebrew.
- source_word: יִדּוֹד מִמֵּךְ
  chosen: will shrink from you
  alternatives:
  - will flee from you
  - will move away from you
  lexicon: HALOT
  rationale: From נדד, conveying moving away or recoiling. In this judgment context,
    the sense is not merely physical travel but horrified withdrawal, so 'shrink from
    you' best captures the reaction while remaining faithful.
- source_word: שָׁדְּדָה
  chosen: is devastated
  alternatives:
  - is destroyed
  - is laid waste
  - is plundered
  lexicon: HALOT
  rationale: Passive/resultative sense from שׁדד. 'Devastated' captures ruin broadly
    without narrowing to military plunder alone, though plundering is part of the
    semantic field.
- source_word: יָנוּד לָהּ
  chosen: will grieve for her
  alternatives:
  - will bemoan her
  - will shake his head over her
  - will show sympathy for her
  lexicon: HALOT
  rationale: נוד can denote lamenting, showing sympathy, or making a gesture of mourning.
    In parallel with seeking comforters, the mourning/sympathy sense is primary here;
    'grieve for her' is idiomatic modern English.
- source_word: מֵאַיִן
  chosen: Where
  alternatives:
  - From where
  lexicon: HALOT
  rationale: Literally 'from where,' but idiomatic English in this rhetorical question
    is simply 'Where,' with the source nuance retained in context.
- source_word: אֲבַקֵּשׁ
  chosen: can I seek
  alternatives:
  - shall I seek
  - could I find
  lexicon: HALOT
  rationale: Piel imperfect 1cs of בקש, 'seek.' In the rhetorical question, 'can I
    seek' conveys practical impossibility in natural English. The speaker is indefinite/generic
    rather than a specifically identified narrator.
- source_word: מְנַחֲמִים
  chosen: comforters
  alternatives:
  - consolers
  - those who would comfort
  lexicon: HALOT
  rationale: Participle from נחם in the comforting sense. 'Comforters' preserves the
    lexical link with consolation language and fits the rhetorical lament.
