theological_decisions:
- issue: Prophetic humiliation imagery for Nineveh personified as a woman
  chosen_reading: Retain the shame/judgment imagery without softening it, while expressing
    it in readable modern English.
  alternative_readings:
  - Use more literal but archaic language such as 'cast abominable filth upon thee'
    and 'make thee vile'
  rationale: The verse is not making a doctrinal claim requiring harmonization, but
    it does employ severe judgment language. Optimal equivalence preserves the force
    of divine judgment and public disgrace without importing sexualized or doctrinally
    loaded wording beyond the Hebrew text.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source
    text''s plain sense without paraphrase'
