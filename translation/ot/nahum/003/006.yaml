id: NAM.3.6
reference: Nahum 3:6
source:
  edition: WLC
  text: וְ/הִשְׁלַכְתִּ֥י עָלַ֛יִ/ךְ שִׁקֻּצִ֖ים וְ/נִבַּלְתִּ֑י/ךְ וְ/שַׂמְתִּ֖י/ךְ
    כְּ/רֹֽאִי׃
translation:
  text: And I will throw filth upon you, and treat you with contempt, and make you
    a spectacle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'abominations' or 'detestable things' for 'filth.' The Hebrew term often
      refers to things that are ritually or morally detestable; here it likely carries
      the concrete sense of disgusting refuse used to shame Nineveh publicly.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'make you a sight' or 'set you as something to be looked at.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִשְׁלַכְתִּי
  chosen: I will throw
  alternatives:
  - I will cast
  lexicon: HALOT
  rationale: The Hiphil of שלך commonly means 'throw' or 'cast.' 'Throw' is more natural
    modern English while preserving the force of a deliberate act.
- source_word: עָלַיִךְ
  chosen: upon you
  alternatives:
  - on you
  - against you
  lexicon: HALOT
  rationale: 'The preposition על with 2fs suffix is spatial here: the filth is thrown
    ''upon'' Nineveh personified as a woman. ''Upon'' fits the elevated prophetic
    tone.'
- source_word: שִׁקֻּצִים
  chosen: filth
  alternatives:
  - abominations
  - detestable things
  lexicon: HALOT
  rationale: Although שִׁקּוּץ often denotes something detestable or abominable, in
    this humiliation context the image is of disgusting refuse being hurled on the
    city. 'Filth' best conveys the concrete, shame-inducing force in idiomatic English.
    The more formal 'abominations' is possible but sounds abstract here.
- source_word: וְנִבַּלְתִּיךְ
  chosen: treat you with contempt
  alternatives:
  - make you vile
  - dishonor you
  - humiliate you
  lexicon: HALOT
  rationale: From נבל in the Piel, the sense is to disgrace, treat shamefully, or
    make contemptible. 'Treat you with contempt' captures both the active divine action
    and the resulting dishonor in clear English.
- source_word: וְשַׂמְתִּיךְ
  chosen: make you
  alternatives:
  - set you
  - place you
  lexicon: HALOT
  rationale: שׂים is a broad verb meaning 'set, place, make.' With the following predicate
    expression, 'make you' is the most idiomatic English.
- source_word: כְּרֹאִי
  chosen: a spectacle
  alternatives:
  - something to be looked at
  - a gazingstock
  lexicon: HALOT
  rationale: The phrase literally points to 'as a sight for seeing/onlookers.' 'A
    spectacle' communicates public exposure and shame in contemporary English without
    archaic diction. A more literal rendering is preserved in a footnote.
