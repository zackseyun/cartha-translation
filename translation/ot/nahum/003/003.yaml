id: NAM.3.3
reference: Nahum 3:3
source:
  edition: WLC
  text: פָּרָ֣שׁ מַעֲלֶ֗ה וְ/לַ֤הַב חֶ֨רֶב֙ וּ/בְרַ֣ק חֲנִ֔ית וְ/רֹ֥ב חָלָ֖ל וְ/כֹ֣בֶד
    פָּ֑גֶר וְ/אֵ֥ין קֵ֨צֶה֙ לַ/גְּוִיָּ֔ה יכשלו בִּ/גְוִיָּתָֽ/ם׃
translation:
  text: Horsemen charging, and the flashing sword and the gleaming spear, and a multitude
    of slain, and heaps of corpses; and there is no end to the bodies— they stumble
    over their bodies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the flame of the sword' for the vivid Hebrew image.
    reason: lexical_alternative
  - marker: b
    text: Or 'the lightning of the spear.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'their bodies'; the suffix may refer generally to the mass of corpses
      in the scene.
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּרָשׁ
  chosen: horsemen
  alternatives:
  - horseman
  - cavalry
  lexicon: HALOT
  rationale: The singular noun is used collectively in a battle scene. English plural
    'horsemen' best conveys the collective force naturally.
- source_word: מַעֲלֶה
  chosen: charging
  alternatives:
  - advancing
  - coming up
  lexicon: HALOT
  rationale: From עלה, literally 'going up/coming up.' In this military context it
    describes the mounted attack in progress; 'charging' captures the vivid action
    without excessive paraphrase.
- source_word: לַהַב חֶרֶב
  chosen: the flashing sword
  alternatives:
  - the flame of the sword
  - the blade of the sword
  lexicon: HALOT
  rationale: לַהַב is literally 'flame/blaze,' often used metaphorically for the flashing
    or fiery appearance of a weapon. 'Flashing sword' is idiomatic English preserving
    the image.
- source_word: בְּרַק חֲנִית
  chosen: the gleaming spear
  alternatives:
  - the lightning of the spear
  - the flashing spear
  lexicon: HALOT
  rationale: בְּרַק literally denotes 'lightning' or 'flash.' With spear it refers
    to the bright, flashing appearance of the weapon. 'Gleaming spear' gives a natural
    English equivalent while retaining the visual force.
- source_word: רֹב חָלָל
  chosen: a multitude of slain
  alternatives:
  - many slain
  - abundance of wounded
  lexicon: HALOT
  rationale: חָלָל in this context refers to those slain, not merely wounded. 'A multitude
    of slain' preserves the mass-casualty emphasis of רֹב.
- source_word: כֹבֶד פָּגֶר
  chosen: heaps of corpses
  alternatives:
  - a mass of corpses
  - a weight of carcasses
  lexicon: HALOT
  rationale: כֹבֶד literally 'heaviness/weight' here idiomatically conveys a great
    mass. 'Heaps of corpses' communicates the piled-up abundance in vivid but natural
    English.
- source_word: אֵין קֵצֶה לַגְּוִיָּה
  chosen: there is no end to the bodies
  alternatives:
  - there is no end to the corpses
  - there is no limit to the carcasses
  lexicon: HALOT
  rationale: The clause stresses the endless number of dead bodies. 'Bodies' is readable
    modern English; 'corpses' is possible but would sound overly repetitive after
    'corpses' in the previous phrase.
- source_word: יכשלו
  chosen: they stumble
  alternatives:
  - they trip
  - they stagger
  lexicon: HALOT
  rationale: The Niphal of כשל means to stumble or be made to stumble. 'They stumble'
    is the most direct rendering.
- source_word: בִּגְוִיָּתָם
  chosen: over their bodies
  alternatives:
  - over the bodies
  - over their corpses
  lexicon: HALOT
  rationale: 'The 3mp suffix most naturally refers back to the slain as a collective
    scene: people stumbling over the bodies. ''Their bodies'' preserves the suffix,
    though the referent is contextual rather than possessive in a strict modern sense.'
