id: NAM.3.10
reference: Nahum 3:10
source:
  edition: WLC
  text: גַּם הִ֗יא לַ/גֹּלָה֙ הָלְכָ֣ה בַ/שֶּׁ֔בִי גַּ֧ם עֹלָלֶ֛י/הָ יְרֻטְּשׁ֖וּ
    בְּ/רֹ֣אשׁ כָּל חוּצ֑וֹת וְ/עַל נִכְבַּדֶּ֨י/הָ֙ יַדּ֣וּ גוֹרָ֔ל וְ/כָל גְּדוֹלֶ֖י/הָ
    רֻתְּק֥וּ בַ/זִּקִּֽים־־־־׃
translation:
  text: Yet she too went into exile, into captivity; her children too were dashed
    to pieces at the head of every street. They cast lots for her honored men, and
    all her great men were bound in chains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her little ones' for 'her children.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'at the head of every street'; that is, at prominent street entrances
      or corners.
    reason: cultural_note
  - marker: c
    text: Or 'her nobles' for 'her honored men.'
    reason: lexical_alternative
  - marker: d
    text: Or 'were bound with fetters.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם הִיא
  chosen: Yet she too
  alternatives:
  - She also
  - Even she
  lexicon: HALOT
  rationale: גַּם adds an emphatic 'also/too'; 'Yet' brings out the rhetorical force
    in context, comparing No-amon with Nineveh, while 'she too' preserves the feminine
    singular reference.
- source_word: לַגּוֹלָה הָלְכָה
  chosen: went into exile
  alternatives:
  - went to exile
  - went away into exile
  lexicon: HALOT
  rationale: The idiom with הלך + גולה denotes being carried off/exiled. 'Went into
    exile' is idiomatic English and preserves the sense without over-paraphrasing.
- source_word: בַּשֶּׁבִי
  chosen: into captivity
  alternatives:
  - in captivity
  - as captives
  lexicon: HALOT
  rationale: This appositional phrase intensifies the exile image. 'Into captivity'
    keeps the movement/result sense alongside the previous clause.
- source_word: עֹלָלֶיהָ
  chosen: her children
  alternatives:
  - her little ones
  - her infants
  lexicon: HALOT
  rationale: עוללים refers to very young children. 'Children' is readable modern English
    in the main text; the more specific 'little ones' is preserved in a footnote as
    a lexical alternative.
- source_word: יְרֻטְּשׁוּ
  chosen: were dashed to pieces
  alternatives:
  - were dashed apart
  - were smashed
  lexicon: HALOT
  rationale: The verb רטש in this context is violent and graphic, used of brutal killing
    of children. 'Dashed to pieces' preserves the horror more accurately than softer
    renderings.
- source_word: בְּרֹאשׁ כָּל חוּצוֹת
  chosen: at the head of every street
  alternatives:
  - at every street corner
  - at the entrance of every street
  lexicon: HALOT
  rationale: Literally 'at the head of all streets.' 'At the head of every street'
    is fairly formal and transparent; 'street corner' is a natural English alternative
    preserved in a footnote.
- source_word: נִכְבַּדֶּיהָ
  chosen: her honored men
  alternatives:
  - her nobles
  - her dignitaries
  lexicon: HALOT
  rationale: From כבד in the sense of weight/honor/status. 'Honored men' preserves
    the lexical idea of social weight more directly than the interpretive 'nobles,'
    though that is a viable alternative.
- source_word: יַדּוּ גוֹרָל
  chosen: They cast lots
  alternatives:
  - they threw lots
  lexicon: HALOT
  rationale: This is the standard idiom for apportioning persons or goods by lot.
    'Cast lots' is the natural English equivalent.
- source_word: גְּדוֹלֶיהָ
  chosen: her great men
  alternatives:
  - her leaders
  - her prominent men
  lexicon: HALOT
  rationale: גדולים denotes socially prominent or powerful persons. 'Great men' is
    concise and preserves the status nuance; 'leaders' would narrow the sense too
    much.
- source_word: רֻתְּקוּ בַזִּקִּים
  chosen: were bound in chains
  alternatives:
  - were fettered with shackles
  - were bound with fetters
  lexicon: HALOT
  rationale: The passive verb indicates being fastened/bound, and זקים denotes restraints
    such as chains/fetters. 'Bound in chains' is clear modern English and conveys
    the humiliation of captivity.
