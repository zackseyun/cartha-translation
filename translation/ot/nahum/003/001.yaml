id: NAM.3.1
reference: Nahum 3:1
source:
  edition: WLC
  text: ה֖וֹי עִ֣יר דָּמִ֑ים כֻּלָּ֗/הּ כַּ֤חַשׁ פֶּ֨רֶק֙ מְלֵאָ֔ה לֹ֥א יָמִ֖ישׁ טָֽרֶף׃
translation:
  text: Woe to the city of bloodshed, all of it full of lies and plunder; prey never
    departs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'city of bloods,' an idiom for a city marked by bloodshed and bloodguilt.
    reason: lexical_alternative
  - marker: b
    text: Or 'the bloody city.'
    reason: alternative_reading
  - marker: c
    text: '''Plunder'' may also be rendered ''robbery''; the Hebrew term evokes violent
      seizure.'
    reason: lexical_alternative
  - marker: d
    text: Or 'prey does not cease,' preserving the sense that the city's predatory
      violence is unending.
    reason: alternative_reading
lexical_decisions:
- source_word: הוֹי
  chosen: Woe
  alternatives:
  - Ah
  - Alas
  lexicon: HALOT
  rationale: An interjection of lament and denunciation. 'Woe' best preserves the
    prophetic force in English.
- source_word: עִיר דָּמִים
  chosen: the city of bloodshed
  alternatives:
  - the bloody city
  - the city of bloods
  lexicon: HALOT
  rationale: The construct phrase literally means 'city of bloods,' an idiom for bloodguilt/violence.
    'City of bloodshed' is natural modern English while preserving the sense of violent
    guilt.
- source_word: כֻּלָּהּ
  chosen: all of it
  alternatives:
  - entirely
  - wholly
  lexicon: HALOT
  rationale: Refers back to the city as a whole. 'All of it' keeps the distributive
    emphasis without sounding archaic.
- source_word: כַּחַשׁ
  chosen: lies
  alternatives:
  - deceit
  - falsehood
  lexicon: HALOT
  rationale: The noun denotes deception or falsehood. 'Lies' is vivid and readable,
    fitting the prophetic accusation.
- source_word: פֶּרֶק
  chosen: plunder
  alternatives:
  - robbery
  - rapine
  lexicon: HALOT
  rationale: The term refers to violent tearing or the spoil gained by such violence.
    'Plunder' fits the context of predatory conquest and pairs well with the following
    'prey.'
- source_word: מְלֵאָה
  chosen: full of
  alternatives:
  - filled with
  lexicon: HALOT
  rationale: Straightforward predicate adjective describing the city's condition.
- source_word: לֹא יָמִישׁ
  chosen: never departs
  alternatives:
  - does not depart
  - does not cease
  lexicon: HALOT
  rationale: From מושׁ/מישׁ, 'to depart, move away.' With the negation it expresses
    continual presence. 'Never departs' communicates the durative force idiomatically.
- source_word: טָרֶף
  chosen: prey
  alternatives:
  - booty
  - spoil
  lexicon: HALOT
  rationale: Often used for prey torn by a predator. 'Prey' preserves the predatory
    imagery that matches Nahum's portrayal of Nineveh.
