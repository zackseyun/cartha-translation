id: NAM.3.2
reference: Nahum 3:2
source:
  edition: WLC
  text: ק֣וֹל שׁ֔וֹט וְ/ק֖וֹל רַ֣עַשׁ אוֹפָ֑ן וְ/ס֣וּס דֹּהֵ֔ר וּ/מֶרְכָּבָ֖ה מְרַקֵּדָֽה׃
translation:
  text: The crack of the whip, and the rumble of the wheel, with galloping horse and
    bounding chariot!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sound of the whip, and the sound of the rattling wheel.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew piles up brief sound-images without a finite verb, heightening
      the immediacy of the battle scene.
    reason: cultural_note
lexical_decisions:
- source_word: ק֣וֹל
  chosen: the crack / the rumble
  alternatives:
  - sound
  - noise
  - voice
  lexicon: HALOT
  rationale: 'קוֹל broadly means ''sound/noise/voice.'' In this vivid battle scene,
    English idiom is best served by specifying the kind of sound from the paired nouns:
    ''the crack of the whip'' and ''the rumble of the wheel.'' This preserves the
    auditory focus while avoiding the wooden repetition ''sound of ... and sound of
    ...''.'
- source_word: שׁ֔וֹט
  chosen: whip
  alternatives:
  - lash
  - scourge
  lexicon: HALOT
  rationale: The noun denotes a whip used for driving or striking. 'Whip' is the plain,
    natural rendering in this military-chariot context.
- source_word: רַ֣עַשׁ
  chosen: rumble
  alternatives:
  - rattle
  - crash
  - noise
  lexicon: HALOT
  rationale: רַעַשׁ denotes shaking, rattling, or loud noise. With 'wheel' as its
    complement, 'rumble' captures the heavy rolling battle sound more naturally than
    the generic 'noise,' while 'rattle' is preserved as a lexical alternative.
- source_word: אוֹפָ֑ן
  chosen: wheel
  lexicon: HALOT
  rationale: Standard meaning is 'wheel,' here likely a chariot wheel. No expansion
    is needed in English because the following mention of chariot clarifies the scene.
- source_word: ס֣וּס
  chosen: horse
  alternatives:
  - war horse
  lexicon: HALOT
  rationale: The basic noun is 'horse.' Although the context is martial, the Hebrew
    does not explicitly say 'war horse,' so the simpler rendering is preferred.
- source_word: דֹּהֵ֔ר
  chosen: galloping
  alternatives:
  - rushing
  - charging
  lexicon: HALOT
  rationale: The participle conveys swift motion of the horse. 'Galloping' is vivid,
    idiomatic, and specifically suited to a horse.
- source_word: מֶרְכָּבָ֖ה
  chosen: chariot
  alternatives:
  - chariotry
  lexicon: HALOT
  rationale: The singular noun is best rendered 'chariot.' English can keep the singular
    as a representative image within the rapid sequence of battlefield sounds and
    sights.
- source_word: מְרַקֵּדָֽה
  chosen: bounding
  alternatives:
  - bouncing
  - leaping
  - dancing
  lexicon: HALOT
  rationale: From רקד, literally 'leaping/dancing.' For a chariot jolting violently
    in motion, 'bounding' conveys the physical image without suggesting festivity.
    'Dancing' is too misleading in modern English, though it reflects the root more
    literally.
