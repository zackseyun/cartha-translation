theological_decisions:
- issue: Gendered military taunt in נָשִׁים
  chosen_reading: Retain the literal 'women' in the main text as part of the prophetic
    image of military weakness.
  alternative_readings:
  - like women
  - weak as women
  rationale: The Hebrew states the noun directly without an explicit comparative particle.
    Expanding to 'like women' or 'weak as women' interprets the rhetoric beyond the
    wording. Per translation philosophy, the text's gendered expression is preserved
    rather than neutralized or paraphrased.
  doctrine_reference: DOCTRINE.md §Translation philosophy, item 4 (Gender-accurate
    over gender-neutral)
