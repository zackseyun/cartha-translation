id: NAM.3.13
reference: Nahum 3:13
source:
  edition: WLC
  text: הִנֵּ֨ה עַמֵּ֤/ךְ נָשִׁים֙ בְּ/קִרְבֵּ֔/ךְ לְ/אֹ֣יְבַ֔יִ/ךְ פָּת֥וֹחַ נִפְתְּח֖וּ
    שַׁעֲרֵ֣י אַרְצֵ֑/ךְ אָכְלָ֥ה אֵ֖שׁ בְּרִיחָֽיִ/ך׃
translation:
  text: Look, your troops are women in your midst; the gates of your land stand wide
    open to your enemies; fire has consumed your bars.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your people are women in your midst.' The Hebrew עם commonly means 'people';
      here it likely refers to Nineveh's defenders in context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'opened, they are opened'—an emphatic construction meaning 'opened
      wide' or 'completely opened.'
    reason: lexical_alternative
  - marker: c
    text: Or 'your gate-bars' or 'your bolts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic/interjection introducing an emphatic observation or announcement.
    'Look' is vivid modern English and preserves the force without archaic tone.
- source_word: עַמֵּךְ
  chosen: your troops
  alternatives:
  - your people
  - your army
  lexicon: HALOT
  rationale: Though עם commonly means 'people,' in this military judgment context
    against Nineveh it refers to the population/forces available for defense. 'Your
    troops' brings out the immediate martial sense better than the broader 'people,'
    while remaining within the semantic range contextualized by the verse.
- source_word: נָשִׁים
  chosen: women
  lexicon: HALOT
  rationale: Literal plural noun 'women.' The simile/metaphor is part of the taunt
    against military weakness and should not be softened or paraphrased.
- source_word: בקרבך
  chosen: in your midst
  alternatives:
  - within you
  lexicon: HALOT
  rationale: Idiomatic locative expression. 'In your midst' is natural and preserves
    the image of internal condition.
- source_word: לאיביך
  chosen: to your enemies
  alternatives:
  - for your enemies
  lexicon: HALOT
  rationale: The preposition marks relation/direction with respect to the enemies.
    'To your enemies' fits the following image of opened gates.
- source_word: פתוח נפתחו
  chosen: stand wide open
  alternatives:
  - are completely opened
  - have been opened wide
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verbal idea.
    'Stand wide open' captures both the passive/resultative sense and the emphatic
    force in idiomatic English.
- source_word: שערי ארצך
  chosen: the gates of your land
  alternatives:
  - the gates of your country
  - the gates of your land/territory
  lexicon: HALOT
  rationale: Construct phrase rendered straightforwardly. 'Land' is the most direct
    equivalent of ארץ here and can encompass the realm's access points.
- source_word: אכלה אש
  chosen: fire has consumed
  alternatives:
  - fire consumed
  - fire has devoured
  lexicon: HALOT
  rationale: Qal perfect with 'fire' as subject. 'Has consumed' gives a vivid completed-result
    sense in English; 'consumed' is slightly more natural than 'devoured' for fire
    and bars.
- source_word: בריחיך
  chosen: your bars
  alternatives:
  - your gate-bars
  - your bolts
  lexicon: HALOT
  rationale: Refers to the bars/bolts securing city gates. 'Bars' is concise and natural;
    the gate context is already explicit in the previous clause. 'Bolts' is possible
    but can sound more modern/mechanical.
