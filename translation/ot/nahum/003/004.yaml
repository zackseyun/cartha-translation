id: NAM.3.4
reference: Nahum 3:4
source:
  edition: WLC
  text: מֵ/רֹב֙ זְנוּנֵ֣י זוֹנָ֔ה ט֥וֹבַת חֵ֖ן בַּעֲלַ֣ת כְּשָׁפִ֑ים הַ/מֹּכֶ֤רֶת
    גּוֹיִם֙ בִּ/זְנוּנֶ֔י/הָ וּ/מִשְׁפָּח֖וֹת בִּ/כְשָׁפֶֽי/הָ׃
translation:
  text: because of the many prostitutions of the prostitute, charming in grace, mistress
    of sorceries, who sells nations by her prostitutions and clans by her sorceries.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'well-favored' or 'graceful.' The Hebrew expression describes alluring
      attractiveness.
    reason: lexical_alternative
  - marker: b
    text: Or 'families.' The Hebrew term can denote extended family groups or clans.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵרֹב
  chosen: because of the many
  alternatives:
  - from the abundance of
  - because of the abundance of
  lexicon: HALOT
  rationale: The preposition מִן with רֹב here introduces cause/ground in context,
    linking Nineveh's coming judgment to the abundance of her acts. 'Because of the
    many' is idiomatic English while preserving the quantitative force of רֹב.
- source_word: זְנוּנֵי / זוֹנָה
  chosen: prostitutions of the prostitute
  alternatives:
  - whorings of the whore
  - acts of prostitution of the prostitute
  - harlotries of the harlot
  lexicon: HALOT
  rationale: The paired noun and participial noun intensify the sexualized metaphor
    for political/religious seduction. 'Prostitute' and 'prostitutions' preserve the
    metaphor without archaic 'whore/whorings' or overly softened language.
- source_word: טוֹבַת חֵן
  chosen: charming in grace
  alternatives:
  - well-favored
  - beautiful and charming
  - graceful
  lexicon: HALOT
  rationale: Literally 'good of favor/grace,' describing attractiveness or allure.
    'Charming in grace' keeps the idiom's emphasis on seductive attractiveness while
    remaining readable. It avoids importing mere physical beauty alone.
- source_word: בַּעֲלַת כְּשָׁפִים
  chosen: mistress of sorceries
  alternatives:
  - master of sorceries
  - possessor of sorceries
  - skilled in sorceries
  lexicon: HALOT
  rationale: בעלת denotes one characterized by or possessing something. Because the
    referent is grammatically feminine, 'mistress' fits naturally in English and preserves
    the personified female imagery. 'Sorceries' is the straightforward rendering of
    כְּשָׁפִים.
- source_word: הַמֹּכֶרֶת
  chosen: who sells
  alternatives:
  - the one who sells
  - who traffics
  lexicon: HALOT
  rationale: The participle continues the description of the prostitute figure. 'Who
    sells' is direct and preserves the commercial exploitation metaphor; 'traffics'
    is possible but more interpretive.
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - peoples
  - Gentiles
  lexicon: HALOT
  rationale: In prophetic judgment oracles גּוֹיִם ordinarily means 'nations' in the
    geopolitical sense. 'Gentiles' would be misleading here.
- source_word: בִּזְנוּנֶיהָ
  chosen: by her prostitutions
  alternatives:
  - through her prostitutions
  - with her prostitutions
  lexicon: HALOT
  rationale: 'The preposition ב marks means/instrument: she sells nations by means
    of her seductive, faithless dealings. ''By'' is concise and clear.'
- source_word: וּמִשְׁפָּחוֹת
  chosen: and clans
  alternatives:
  - and families
  - and peoples
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת often denotes kinship groups or clans, broader than nuclear
    families. 'Clans' best fits the collective social units in parallel with 'nations.'
- source_word: בִּכְשָׁפֶיהָ
  chosen: by her sorceries
  alternatives:
  - through her sorceries
  - with her witchcraft
  lexicon: HALOT
  rationale: Again the preposition is instrumental. 'Sorceries' matches the earlier
    כְּשָׁפִים for consistency; 'witchcraft' is possible but less directly lexical.
