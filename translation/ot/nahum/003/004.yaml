theological_decisions:
- issue: Nature of the prostitute imagery
  chosen_reading: Maintain the metaphor of prostitution and sorcery as prophetic imagery
    for Nineveh's seductive, exploitative power without narrowing it to only sexual
    sin or only idolatry.
  alternative_readings:
  - Interpret exclusively as idolatry
  - interpret exclusively as political/economic seduction
  rationale: The verse personifies Nineveh as a prostitute whose allure and sorcery
    ensnare nations and clans. The language is metaphorical and polyvalent, likely
    encompassing political manipulation, cultural seduction, and spiritual corruption.
    The translation preserves that tension rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
