id: NAM.3.5
reference: Nahum 3:5
source:
  edition: WLC
  text: הִנְ/נִ֣י אֵלַ֗יִ/ךְ נְאֻם֙ יְהוָ֣ה צְבָא֔וֹת וְ/גִלֵּיתִ֥י שׁוּלַ֖יִ/ךְ עַל
    פָּנָ֑יִ/ךְ וְ/הַרְאֵיתִ֤י גוֹיִם֙ מַעְרֵ֔/ךְ וּ/מַמְלָכ֖וֹת קְלוֹנֵֽ/ךְ־׃
translation:
  text: Behold, I am against you, declares the LORD of hosts, and I will uncover your
    skirts over your face, and I will show nations your nakedness and kingdoms your
    shame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will expose your nakedness.' The Hebrew uses imagery of lifting a
      woman's skirts as a metaphor of public humiliation.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Introduces a solemn, attention-commanding divine announcement. 'Behold'
    preserves the prophetic force better than flatter modern options.
- source_word: אֵלַיִךְ
  chosen: I am against you
  alternatives:
  - I am coming against you
  lexicon: HALOT
  rationale: With הִנְנִי this idiom signals hostility directed toward Nineveh (feminine
    singular). 'Against you' is the plain sense.
- source_word: נְאֻם יְהוָה צְבָאוֹת
  chosen: declares the LORD of hosts
  alternatives:
  - oracle of the LORD of hosts
  - says the LORD of hosts
  lexicon: HALOT
  rationale: Standard prophetic formula. YHWH is rendered 'the LORD' per doctrine;
    'of hosts' preserves the military/cosmic title without paraphrase.
- source_word: וְגִלֵּיתִי
  chosen: I will uncover
  alternatives:
  - I will expose
  - I will lift up
  lexicon: HALOT
  rationale: The verb means to uncover or expose. 'Uncover' keeps the concrete metaphor
    of public humiliation.
- source_word: שׁוּלַיִךְ
  chosen: your skirts
  alternatives:
  - your hem
  - your train
  lexicon: HALOT
  rationale: Refers to the lower edges of a garment. 'Skirts' is the most natural
    English rendering in this shaming image.
- source_word: עַל פָּנַיִךְ
  chosen: over your face
  alternatives:
  - upon your face
  - up over your face
  lexicon: HALOT
  rationale: A literal rendering preserves the vivid image of the garment being lifted
    up in disgrace.
- source_word: וְהַרְאֵיתִי
  chosen: I will show
  alternatives:
  - I will make see
  - I will display
  lexicon: HALOT
  rationale: Hiphil of ראה here means to cause others to see; 'show' is clear and
    sufficiently direct.
- source_word: גוֹיִם
  chosen: nations
  alternatives:
  - Gentiles
  - peoples
  lexicon: HALOT
  rationale: In prophetic judgment context, 'nations' is the standard and clearest
    rendering.
- source_word: מַעְרֵךְ
  chosen: your nakedness
  alternatives:
  - your private parts
  - your genitals
  lexicon: HALOT
  rationale: The noun denotes exposed nakedness in a shame context. 'Your nakedness'
    is idiomatic, accurate, and preserves the metaphor without unnecessary explicitness.
- source_word: וּמַמְלָכוֹת
  chosen: kingdoms
  alternatives:
  - realms
  lexicon: HALOT
  rationale: Parallel to 'nations'; 'kingdoms' preserves the political scope of the
    public exposure.
- source_word: קְלוֹנֵךְ
  chosen: your shame
  alternatives:
  - your disgrace
  - your dishonor
  lexicon: HALOT
  rationale: Denotes public disgrace. 'Shame' is concise and matches the parallelism
    with 'nakedness'.
