id: NAM.2.13
reference: Nahum 2:13
source:
  edition: WLC
  text: אַרְיֵ֤ה טֹרֵף֙ בְּ/דֵ֣י גֹֽרוֹתָ֔י/ו וּ/מְחַנֵּ֖ק לְ/לִבְאֹתָ֑י/ו וַ/יְמַלֵּא
    טֶ֣רֶף חֹרָ֔י/ו וּ/מְעֹֽנֹתָ֖י/ו טְרֵפָֽה־׃
translation:
  text: The lion tore enough for his cubs and strangled prey for his lionesses; he
    filled his dens with prey and his lairs with torn flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The lion was tearing sufficient prey for his cubs.' The Hebrew participle
      can be rendered with a more continuous sense.
    reason: lexical_alternative
  - marker: b
    text: '''Torn flesh'' could also be rendered ''prey'' or ''what was torn.'' The
      translation distinguishes this term from the earlier ''prey'' to preserve the
      Hebrew poetic variation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַרְיֵה
  chosen: The lion
  alternatives:
  - A lion
  lexicon: HALOT
  rationale: Singular noun used generically or representatively in a taunt image of
    Assyria/Nineveh as a predatory lion. English definite article fits the vivid,
    emblematic portrayal.
- source_word: טֹרֵף
  chosen: tore enough
  alternatives:
  - was tearing for
  - tears for
  - preyed for
  lexicon: HALOT
  rationale: Participle from טרף denotes tearing prey. Combined with בְּדֵי, the sense
    is not merely 'tearing' but 'tearing sufficient prey' or 'tearing enough' for
    the cubs.
- source_word: בְּדֵי
  chosen: enough
  alternatives:
  - sufficiently
  - as much as was needed for
  lexicon: HALOT
  rationale: Noun meaning sufficiency/what is enough. Rendering it explicitly preserves
    the quantitative nuance often flattened in English translations.
- source_word: גֹּרוֹתָיו
  chosen: his cubs
  alternatives:
  - his whelps
  - his young
  lexicon: HALOT
  rationale: Refers to lion cubs/young ones. 'Cubs' is natural modern English and
    contextually precise.
- source_word: וּמְחַנֵּק
  chosen: and strangled prey
  alternatives:
  - and was strangling for
  - and choked
  lexicon: HALOT
  rationale: Participle from חנק, 'to strangle/choke.' The object 'prey' is implied
    by context and supplied in English for clarity, since the Hebrew immediately follows
    with the beneficiary phrase 'for his lionesses.'
- source_word: לְלִבְאֹתָיו
  chosen: for his lionesses
  alternatives:
  - for his lionesses/wives
  - for his females
  lexicon: HALOT
  rationale: Plural of לָבִיא/לְבִיאָה in the feminine, referring to lionesses. 'Lionesses'
    is the straightforward zoological image and fits the metaphor.
- source_word: וַיְמַלֵּא
  chosen: he filled
  alternatives:
  - and he filled
  - so he filled
  lexicon: HALOT
  rationale: Wayyiqtol advances the description. Simple past 'he filled' reads naturally
    in English poetic narrative.
- source_word: טֶרֶף
  chosen: prey
  alternatives:
  - plunder
  - food
  lexicon: HALOT
  rationale: טרף commonly denotes torn prey. Here 'prey' best preserves the lion metaphor,
    though in the broader oracle it also evokes plunder.
- source_word: חֹרָיו
  chosen: his dens
  alternatives:
  - his holes
  - his caves
  lexicon: HALOT
  rationale: Refers to holes/cavities used as animal dens. 'Dens' is idiomatic in
    the lion image.
- source_word: וּמְעֹנֹתָיו
  chosen: his lairs
  alternatives:
  - his habitations
  - his dwellings
  - his shelters
  lexicon: HALOT
  rationale: Parallel to 'dens' but not identical; 'lairs' preserves the predatory-animal
    nuance and maintains poetic variation.
- source_word: טְרֵפָה
  chosen: torn flesh
  alternatives:
  - what was torn
  - carcasses
  - prey
  lexicon: HALOT
  rationale: Noun for torn animal flesh/prey. To avoid flattening the parallel with
    earlier טֶרֶף, 'torn flesh' preserves the grisly result of predation and the poetic
    distinction.
