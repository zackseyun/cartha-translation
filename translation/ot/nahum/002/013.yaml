theological_decisions:
- issue: Metaphorical lion imagery for Assyria/Nineveh
  chosen_reading: Retained the literal lion imagery in the main text without explicating
    the political referent.
  alternative_readings:
  - Paraphrasing as Assyria's king plundered for his people
  rationale: The verse functions poetically within Nahum's taunt against Nineveh.
    Preserving the lion metaphor respects the Hebrew imagery and avoids importing
    interpretation into the translation itself.
  doctrine_reference: Translation philosophy §1, §3, §6
