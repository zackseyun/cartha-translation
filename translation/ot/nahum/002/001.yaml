id: NAM.2.1
reference: Nahum 2:1
source:
  edition: WLC
  text: הִנֵּ֨ה עַל הֶ/הָרִ֜ים רַגְלֵ֤י מְבַשֵּׂר֙ מַשְׁמִ֣יעַ שָׁל֔וֹם חָגִּ֧י יְהוּדָ֛ה
    חַגַּ֖יִ/ךְ שַׁלְּמִ֣י נְדָרָ֑יִ/ךְ כִּי֩ לֹ֨א יוֹסִ֥יף ע֛וֹד ל/עבור בָּ֥/ךְ בְּלִיַּ֖עַל
    כֻּלֹּ֥/ה נִכְרָֽת־־׃
translation:
  text: 'Look, on the mountains are the feet of one who brings good news, who announces
    peace: celebrate your festivals, Judah; fulfill your vows, for the worthless one
    will never again pass through you; he is completely cut off.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the feet of a messenger of good news.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the wicked one'; traditionally, 'Belial.'
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces vivid attention to the scene. 'Look' is natural modern English
    while preserving the deictic force better than the more archaic 'Behold.'
- source_word: עַל הֶהָרִים
  chosen: on the mountains
  alternatives:
  - upon the mountains
  - over the mountains
  lexicon: HALOT
  rationale: A straightforward locative rendering. 'Mountains' is retained rather
    than generalized to 'hills' to match the Hebrew noun and the elevated messenger
    imagery.
- source_word: רַגְלֵי מְבַשֵּׂר
  chosen: the feet of one who brings good news
  alternatives:
  - the feet of a messenger of good news
  - the feet of him who brings good news
  lexicon: HALOT
  rationale: Keeps the concrete image of 'feet' and renders the participle מְבַשֵּׂר
    by its semantic content, 'brings good news.' 'One who' avoids an unnecessary masculine
    limitation in English while matching the participial sense.
- source_word: מַשְׁמִיעַ שָׁלוֹם
  chosen: who announces peace
  alternatives:
  - who proclaims peace
  - who makes peace heard
  lexicon: HALOT
  rationale: The Hiphil participle of שמע here means to cause to hear, hence 'announce/proclaim.'
    'Announces peace' is idiomatic and preserves the heraldic tone.
- source_word: חָגִּי
  chosen: celebrate
  alternatives:
  - keep
  - observe
  lexicon: HALOT
  rationale: Imperative addressed to Judah. 'Celebrate your festivals' communicates
    the command naturally in English and reflects the festal sense of the verb.
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Standard transliteration of the proper name, in keeping with the policy
    to transliterate names.
- source_word: חַגַּיִךְ
  chosen: your festivals
  alternatives:
  - your feasts
  - your pilgrim feasts
  lexicon: HALOT
  rationale: Plural noun from חג. 'Festivals' is clear modern English; 'feasts' is
    possible but can suggest only meals rather than sacred observances.
- source_word: שַׁלְּמִי נְדָרַיִךְ
  chosen: fulfill your vows
  alternatives:
  - pay your vows
  - complete your vows
  lexicon: HALOT
  rationale: The idiom means to pay or fulfill vows. 'Fulfill' is natural and preserves
    the covenantal/religious obligation without sounding overly wooden.
- source_word: בְּלִיַּעַל
  chosen: the worthless one
  alternatives:
  - the wicked one
  - Belial
  lexicon: HALOT
  rationale: In this context the term functions as a common noun for a vile/worthless
    enemy rather than necessarily a proper name. 'The worthless one' preserves the
    lexical sense without importing later demonological associations. The alternative
    'Belial' is preserved in a footnote because of interpretive significance.
- source_word: לֹא יוֹסִיף עוֹד לַעֲבוֹר בָּךְ
  chosen: will never again pass through you
  alternatives:
  - will no longer pass through you
  - will not again invade you
  lexicon: HALOT
  rationale: Combines the iterative verb with עוֹד into idiomatic English. 'Pass through
    you' preserves the metaphor and can imply hostile incursion without over-paraphrasing
    to 'invade.'
- source_word: כֻּלֹּה נִכְרָת
  chosen: he is completely cut off
  alternatives:
  - he is utterly cut down
  - all of him is cut off
  lexicon: HALOT
  rationale: The phrase intensifies the totality of the enemy's destruction. 'Completely
    cut off' is both readable and close to the Hebrew idiom.
