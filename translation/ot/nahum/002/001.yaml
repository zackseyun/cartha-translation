theological_decisions:
- issue: Whether בְּלִיַּעַל should be treated as a proper name ('Belial') or a descriptive
    common noun
  chosen_reading: Render as a descriptive title, 'the worthless one,' in the main
    text
  alternative_readings:
  - Belial
  - the wicked one
  rationale: The Hebrew term in this prophetic context most naturally describes the
    enemy as vile/worthless rather than explicitly naming a personal demonic figure.
    Rendering it descriptively avoids importing later theological developments not
    demanded by the text, while preserving 'Belial' in a footnote as a recognized
    alternative.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
