id: NAM.2.6
reference: Nahum 2:6
source:
  edition: WLC
  text: יִזְכֹּר֙ אַדִּירָ֔י/ו יִכָּשְׁל֖וּ ב/הלכות/ם יְמַֽהֲרוּ֙ חֽוֹמָתָ֔/הּ וְ/הֻכַ֖ן
    הַ/סֹּכֵֽךְ׃
translation:
  text: He summons his nobles; they stumble in their march. They hurry to her wall,
    and the siege shelter is set up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He remembers his mighty men'; the Hebrew verb normally means 'remember,'
      but here likely has the contextual sense of calling up or summoning troops.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term may refer to a protective siege device such as a 'mantelet'
      or 'screen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִזְכֹּר
  chosen: summons
  alternatives:
  - remembers
  - calls to mind
  - musters
  lexicon: HALOT
  rationale: Though the verb basically means 'remember,' in military context with
    a direct object ('his nobles') it likely carries the sense of calling up or summoning
    them for action. 'Summons' communicates the contextual force in clear English
    better than the more wooden 'remembers.'
- source_word: אַדִּירָיו
  chosen: his nobles
  alternatives:
  - his mighty men
  - his nobles/majestic ones
  lexicon: HALOT
  rationale: The noun can denote mighty ones or nobles. In this siege context it refers
    to high-ranking warriors or officers. 'His nobles' preserves the social rank nuance
    while fitting the scene of a king calling his leading men.
- source_word: יִכָּשְׁלוּ
  chosen: they stumble
  alternatives:
  - they stagger
  - they falter
  lexicon: HALOT
  rationale: The Niphal of כשל commonly means to stumble or stagger. 'They stumble'
    is vivid and natural, preserving the irony of hurried troops losing footing.
- source_word: בַּהֲלִיכוֹתָם
  chosen: in their march
  alternatives:
  - in their going
  - as they walk
  - in their advance
  lexicon: HALOT
  rationale: Literally 'in their goings/walkings.' In military context, 'in their
    march' gives idiomatic English while retaining the movement imagery.
- source_word: יְמַהֲרוּ
  chosen: They hurry
  alternatives:
  - they hasten
  - they rush
  lexicon: HALOT
  rationale: The verb denotes haste. 'They hurry' is readable modern English and suits
    the urgent assault scene.
- source_word: חוֹמָתָהּ
  chosen: her wall
  alternatives:
  - its wall
  - the city wall
  lexicon: HALOT
  rationale: The feminine singular suffix likely refers to the city, personified as
    feminine. 'Her wall' preserves the Hebrew personification more closely than the
    neuter 'its wall.'
- source_word: הַסֹּכֵךְ
  chosen: the siege shelter
  alternatives:
  - the covering
  - the mantelet
  - the protective screen
  lexicon: HALOT
  rationale: The noun derives from a root meaning 'cover, screen.' In siege context
    it likely refers to a protective structure or screen used in assault. 'Siege shelter'
    is understandable modern English while reflecting the military sense. Because
    the exact ancient implement is debated, an alternative is preserved in a footnote.
- source_word: וְהֻכַן
  chosen: is set up
  alternatives:
  - is established
  - is prepared
  - is erected
  lexicon: HALOT
  rationale: The Hophal of כון indicates something being made ready or established.
    With the siege device as subject, 'is set up' best fits the immediate military
    action.
