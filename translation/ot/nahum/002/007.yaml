id: NAM.2.7
reference: Nahum 2:7
source:
  edition: WLC
  text: שַׁעֲרֵ֥י הַ/נְּהָר֖וֹת נִפְתָּ֑חוּ וְ/הַֽ/הֵיכָ֖ל נָמֽוֹג׃
translation:
  text: The gates of the rivers are opened, and the palace melts away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The gates of the canals are opened,' if the term is taken for Nineveh's
      waterways rather than rivers in the ordinary sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'the temple,' since Hebrew heikhal can refer to either a palace or a
      temple; here the context favors 'palace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁעֲרֵי
  chosen: gates of
  alternatives:
  - gates
  - gateways of
  lexicon: HALOT
  rationale: Construct plural of שַׁעַר, denoting gates/gateways. In construct with
    'the rivers,' the natural English rendering is 'the gates of the rivers.'
- source_word: הַנְּהָרוֹת
  chosen: the rivers
  alternatives:
  - the streams
  - the canals
  lexicon: HALOT
  rationale: Plural of נָהָר normally means 'river(s).' In the context of Nineveh's
    defenses and flooding imagery, some understand engineered waterways or canals,
    but 'rivers' best preserves the plain lexical sense while allowing the historical
    nuance to remain implicit.
- source_word: נִפְתָּחוּ
  chosen: are opened
  alternatives:
  - have been opened
  - are thrown open
  lexicon: HALOT
  rationale: Niphal perfect 3cp of פָּתַח, passive/reflexive sense 'be opened.' Present
    English 'are opened' gives vivid prophetic narration without over-paraphrasing.
- source_word: הַהֵיכָל
  chosen: the palace
  alternatives:
  - the temple
  - the great house
  lexicon: HALOT
  rationale: הֵיכָל can denote temple or palace/palatial hall. In Nahum's oracle against
    Nineveh, the referent is the royal/palatial complex, not a temple, so 'palace'
    fits the context best.
- source_word: נָמוֹג
  chosen: melts away
  alternatives:
  - dissolves
  - totters
  - faints
  lexicon: HALOT
  rationale: From מוּג/נמג, conveying melting, dissolving, or collapsing in fear/weakness.
    Here the image likely combines structural collapse and utter disintegration; 'melts
    away' preserves the metaphorical force most directly.
