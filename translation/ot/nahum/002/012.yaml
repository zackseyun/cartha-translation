id: NAM.2.12
reference: Nahum 2:12
source:
  edition: WLC
  text: אַיֵּה֙ מְע֣וֹן אֲרָי֔וֹת וּ/מִרְעֶ֥ה ה֖וּא לַ/כְּפִרִ֑ים אֲשֶׁ֣ר הָלַךְ֩
    אַרְיֵ֨ה לָבִ֥יא שָׁ֛ם גּ֥וּר אַרְיֵ֖ה וְ/אֵ֥ין מַחֲרִֽיד׃
translation:
  text: Where is the lions’ den, the feeding place of the young lions, where the lion
    and lioness walked, and the lion’s cub was there, with none to make them afraid?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pasture of the young lions.' The Hebrew term for 'feeding place' can
      also denote a pasture or grazing place, used here metaphorically in the lion
      image.
    reason: lexical_alternative
  - marker: b
    text: Or 'great lion' for 'lioness.' The Hebrew word לָבִיא can be understood
      in different lion-related senses, but 'lioness' best fits the sequence of lion,
      lioness, and cub.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַיֵּה
  chosen: Where is
  alternatives:
  - Where
  lexicon: HALOT
  rationale: Interrogative of location introducing a taunt over Nineveh's downfall.
    English idiom naturally supplies 'is.'
- source_word: מְעוֹן
  chosen: den
  alternatives:
  - dwelling
  - habitation
  lexicon: HALOT
  rationale: In the lion metaphor, 'den' best fits the animal imagery while preserving
    the sense of a habitation.
- source_word: אֲרָיוֹת
  chosen: lions’
  alternatives:
  - of lions
  lexicon: HALOT
  rationale: Plural construct with מְעוֹן; possessive English is the most natural
    rendering.
- source_word: וּמִרְעֶה
  chosen: the feeding place
  alternatives:
  - pasture
  - grazing place
  lexicon: HALOT
  rationale: Though often used of pastureland, here it is metaphorical for the place
    where the lions fed. 'Feeding place' preserves the imagery without implying literal
    grazing.
- source_word: הוּא
  chosen: —
  alternatives:
  - it was
  - that was
  lexicon: HALOT
  rationale: The pronoun is likely resumptive/emphatic in Hebrew style. It is not
    required in smooth English and is absorbed into the clause structure.
- source_word: לַכְּפִרִים
  chosen: of the young lions
  alternatives:
  - for the young lions
  lexicon: HALOT
  rationale: 'The preposition with the noun can be rendered in a possessive sense
    in English here: the feeding place belonging to or used by the young lions.'
- source_word: אֲשֶׁר
  chosen: where
  alternatives:
  - which
  - in which
  lexicon: HALOT
  rationale: Given the locative sense of the whole clause, 'where' is more idiomatic
    than a wooden relative pronoun.
- source_word: הָלַךְ
  chosen: walked
  alternatives:
  - went
  - prowled
  lexicon: HALOT
  rationale: The basic verb is 'went/walked.' 'Prowled' would heighten the image beyond
    the lexical warrant.
- source_word: אַרְיֵה
  chosen: the lion
  lexicon: HALOT
  rationale: Standard rendering of the singular noun; here likely the male lion in
    parallel with lioness and cub.
- source_word: לָבִיא
  chosen: lioness
  alternatives:
  - great lion
  lexicon: HALOT
  rationale: In this context, rendering as 'lioness' best suits the family grouping
    of lion, lioness, and cub, and is a common lexical value of the term.
- source_word: שָׁם
  chosen: was there
  alternatives:
  - there
  lexicon: HALOT
  rationale: English requires a finite verb for a natural clause; 'was there' expresses
    the locative adverb smoothly.
- source_word: גּוּר אַרְיֵה
  chosen: the lion’s cub
  alternatives:
  - lion cub
  - whelp of a lion
  lexicon: HALOT
  rationale: Construct chain denoting a young lion. 'The lion’s cub' keeps the familial
    imagery and reads naturally.
- source_word: וְאֵין מַחֲרִיד
  chosen: with none to make them afraid
  alternatives:
  - and none terrified them
  - with no one to disturb them
  lexicon: HALOT
  rationale: The participle from חרד in the causative sense means causing dread or
    frightening. 'Make them afraid' is clear modern English. The plural object is
    implied by the group of lions in context.
