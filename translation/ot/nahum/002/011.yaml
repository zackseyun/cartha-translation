id: NAM.2.11
reference: Nahum 2:11
source:
  edition: WLC
  text: בּוּקָ֥ה וּ/מְבוּקָ֖ה וּ/מְבֻלָּקָ֑ה וְ/לֵ֨ב נָמֵ֜ס וּ/פִ֣ק בִּרְכַּ֗יִם וְ/חַלְחָלָה֙
    בְּ/כָל מָתְנַ֔יִם וּ/פְנֵ֥י כֻלָּ֖/ם קִבְּצ֥וּ פָארֽוּר־׃
translation:
  text: Devastation, desolation, and destruction! Hearts melt, knees give way, anguish
    is in every waist, and all their faces grow pale.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'all their faces gather blackness.' The Hebrew expression
      is difficult and may describe a darkened or drained facial appearance from terror.
    reason: lexical_alternative
lexical_decisions:
- source_word: בּוּקָה
  chosen: Devastation
  alternatives:
  - Emptiness
  - Plundering
  lexicon: HALOT
  rationale: Part of a rapid alliterative triad describing Nineveh's ruin. 'Devastation'
    captures the effect in natural English better than the more wooden 'emptiness,'
    while preserving the force of collapse and stripping.
- source_word: מְבוּקָה
  chosen: desolation
  alternatives:
  - emptiness
  - waste
  lexicon: HALOT
  rationale: Chosen to continue the rhetorical triad with a near-synonymous but distinct
    term. The Hebrew intensifies the picture of being laid waste; 'desolation' communicates
    that state clearly.
- source_word: מְבֻלָּקָה
  chosen: destruction
  alternatives:
  - shattered ruin
  - devastated
  lexicon: HALOT
  rationale: The final member of the triad heightens the catastrophe. 'Destruction'
    is idiomatic and forceful in English, preserving the climactic effect of the Hebrew
    sequence.
- source_word: לֵב נָמֵס
  chosen: Hearts melt
  alternatives:
  - The heart melts
  - courage melts away
  lexicon: HALOT
  rationale: A common Hebrew idiom for fear and loss of courage. The plural 'hearts'
    fits the collective context, and 'melt' preserves the vivid metaphor rather than
    interpreting it away.
- source_word: פִק בִּרְכַּיִם
  chosen: knees give way
  alternatives:
  - tottering of knees
  - knocking knees
  lexicon: HALOT
  rationale: The noun פִק here denotes collapse, staggering, or giving way. 'Knees
    give way' is a natural English idiom that reflects physical weakness from terror.
- source_word: חַלְחָלָה בְּכָל מָתְנַיִם
  chosen: anguish is in every waist
  alternatives:
  - trembling is in every loins
  - writhing seizes every body
  lexicon: HALOT
  rationale: חַלְחָלָה denotes trembling, writhing, or anguish. 'Anguish' best captures
    the bodily distress in contemporary English. 'Waist' is used instead of the more
    literal 'loins' for readability, while retaining the bodily location.
- source_word: וּפְנֵי כֻלָּם קִבְּצוּ פָארוּר
  chosen: all their faces grow pale
  alternatives:
  - all their faces gather blackness
  - all their faces lose color
  lexicon: HALOT
  rationale: The phrase is difficult, with פָארוּר likely referring to a dark or altered
    complexion. In context of terror, the idiomatic sense is that color drains from
    the face. 'Grow pale' communicates the visible effect of fear in clear English;
    the more literal but obscure alternative is preserved in a footnote.
