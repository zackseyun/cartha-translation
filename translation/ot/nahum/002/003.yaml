theological_decisions:
- issue: Sense of גְּאוֹן in relation to Jacob/Israel
  chosen_reading: positive dignity/majesty restored by God
  alternative_readings:
  - pride restored
  rationale: Because the subject is the LORD acting favorably toward Jacob/Israel, the term is best read positively here. Rendering it as 'pride' in English would likely suggest sinful arrogance, which the context does not require.
