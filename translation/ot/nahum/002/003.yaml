id: NAM.2.3
reference: Nahum 2:3
source:
  edition: WLC
  text: כִּ֣י שָׁ֤ב יְהוָה֙ אֶת גְּא֣וֹן יַעֲקֹ֔ב כִּ/גְא֖וֹן יִשְׂרָאֵ֑ל כִּ֤י בְקָקוּ/ם֙ בֹּֽקְקִ֔ים וּ/זְמֹרֵי/הֶ֖ם שִׁחֵֽתוּ־׃
translation:
  text: For Yahweh is restoring the majesty of Jacob like the majesty of Israel, though destroyers have destroyed them and ruined their vine branches.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has restored' or 'will restore'; the Hebrew verb may express a prophetic certainty.
    reason: lexical_alternative
  - marker: b
    text: Or 'the pride of Jacob, as the pride of Israel.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'emptiers have emptied them'; that is, ravagers have thoroughly despoiled them.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁב
  chosen: is restoring
  alternatives:
  - has restored
  - restores
  - will restore
  lexicon: HALOT
  rationale: The qatal of שוב can denote completed action, present certainty, or imminent prophetic perfect in context. Given the surrounding oracle of reversal, 'is restoring' captures the vivid prophetic sense in natural English without overcommitting to simple past.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: גְּאוֹן
  chosen: majesty
  alternatives:
  - pride
  - excellence
  - glory
  lexicon: HALOT
  rationale: גְּאוֹן can be positive ('majesty, splendor') or negative ('pride, arrogance'). Here, because the LORD is said to restore it to Jacob/Israel, a positive sense fits best. 'Majesty' preserves dignity without implying sinful pride.
- source_word: יַעֲקֹב
  chosen: Jacob
  lexicon: HALOT
  rationale: Standard transliteration of the patriarchal/national name.
- source_word: כִּ/גְא֖וֹן
  chosen: like the majesty
  alternatives:
  - as the majesty
  - the majesty of
  lexicon: HALOT
  rationale: 'The prefixed כ is best taken comparatively: ''like/as the majesty of Israel.'' This avoids flattening the parallelism and reflects the consonantal text.'
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Standard transliteration of the covenant people’s name.
- source_word: בְקָקוּם ... בֹּקְקִים
  chosen: plunderers have plundered them
  alternatives:
  - emptiers have emptied them
  - ravagers have ravaged them
  lexicon: HALOT
  rationale: The verb בקק means to empty out, lay waste, despoil. The cognate construction intensifies the action. 'Plunderers have plundered them' communicates both the agent noun and the destructive force in idiomatic English.
- source_word: וּ/זְמֹרֵי/הֶם
  chosen: their vine branches
  alternatives:
  - their branches
  - their shoots
  lexicon: HALOT
  rationale: זְמוֹרָה refers specifically to vine shoots/branches. The agricultural image should be preserved rather than generalized to mere 'branches.'
- source_word: שִׁחֵתוּ
  chosen: ruined
  alternatives:
  - destroyed
  - laid waste
  lexicon: HALOT
  rationale: שׁחת in the piel conveys corrupting, ruining, destroying. 'Ruined' fits the image of damaged vine branches and keeps the poetic texture.
