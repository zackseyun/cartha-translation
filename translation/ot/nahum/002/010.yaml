id: NAM.2.10
reference: Nahum 2:10
source:
  edition: WLC
  text: בֹּ֥זּוּ כֶ֖סֶף בֹּ֣זּוּ זָהָ֑ב וְ/אֵ֥ין קֵ֨צֶה֙ לַ/תְּכוּנָ֔ה כָּבֹ֕ד מִ/כֹּ֖ל
    כְּלִ֥י חֶמְדָּֽה׃
translation:
  text: Plunder silver! Plunder gold! There is no end to the treasure—wealth from
    every precious vessel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'There is no end to the store/supply.' The Hebrew noun translated 'treasure'
      is rare and may emphasize accumulated stores rather than treasure in the abstract.
    reason: lexical_alternative
  - marker: b
    text: Or 'all kinds of precious articles.' The Hebrew phrase can refer broadly
      to desirable valuables, not only vessels in a narrow sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֹּזּוּ
  chosen: Plunder!
  alternatives:
  - Loot!
  - Spoil!
  lexicon: HALOT
  rationale: Imperative plural from בזז, a forceful command to seize goods in war.
    'Plunder' is natural modern English and preserves the military sense better than
    the archaic 'spoil.' Repetition is retained for urgency and poetic force.
- source_word: כֶסֶף
  chosen: silver
  alternatives:
  - money
  lexicon: HALOT
  rationale: Literal precious metal fits the parallel with 'gold' and the context
    of looted wealth.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Straightforward literal rendering in parallel with 'silver.'
- source_word: וְאֵין קֵצֶה
  chosen: There is no end
  alternatives:
  - There is no limit
  lexicon: HALOT
  rationale: Idiomatic rendering of the negated existential plus 'end/limit,' expressing
    immeasurable abundance.
- source_word: תְּכוּנָה
  chosen: treasure
  alternatives:
  - store
  - supply
  - prepared wealth
  lexicon: HALOT
  rationale: The noun is rare and contextually refers to accumulated stores or wealth
    available for plunder. 'Treasure' communicates stored riches clearly in English.
    Because the exact nuance may be 'store' or 'supply,' that alternative is preserved
    in a footnote.
- source_word: כָּבֹד
  chosen: wealth
  alternatives:
  - glory
  - abundance
  - splendor
  lexicon: HALOT
  rationale: Although often 'glory' or 'honor,' in this material context it denotes
    impressive wealth/splendor associated with valuables. 'Wealth' best fits the immediate
    list of plundered riches.
- source_word: מִכֹּל כְּלִי חֶמְדָּה
  chosen: from every precious vessel
  alternatives:
  - from every desirable object
  - consisting of all kinds of precious articles
  lexicon: HALOT
  rationale: כְּלִי is a broad term for vessel, article, or object; חֶמְדָּה denotes
    desirability/preciousness. The phrase likely refers to all manner of valuable
    articles. 'Every precious vessel' keeps the concrete imagery while remaining readable;
    a broader alternative is footnoted.
