id: NAM.2.5
reference: Nahum 2:5
source:
  edition: WLC
  text: בַּֽ/חוּצוֹת֙ יִתְהוֹלְל֣וּ הָ/רֶ֔כֶב יִֽשְׁתַּקְשְׁק֖וּ/ן בָּ/רְחֹב֑וֹת מַרְאֵי/הֶן֙
    כַּ/לַּפִּידִ֔ם כַּ/בְּרָקִ֖ים יְרוֹצֵֽצוּ׃
translation:
  text: In the streets the chariots race wildly; they rattle through the squares.
    Their appearance is like torches; like lightning they dart about.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they rage' for 'race wildly'; the Hebrew verb can suggest frenzied or
      mad behavior.
    reason: lexical_alternative
  - marker: b
    text: Or 'they clatter' for 'they rattle'; the rare Hebrew verb is likely onomatopoetic,
      emphasizing noisy jolting motion.
    reason: lexical_alternative
  - marker: c
    text: Or 'they race back and forth' for 'they dart about'; the Hebrew emphasizes
      rapid movement to and fro.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחוּצוֹת
  chosen: in the streets
  alternatives:
  - in the open places
  - in the outside places
  lexicon: HALOT
  rationale: חוּצוֹת refers to city streets or open areas outside/throughout the city.
    'Streets' is the most natural English fit here in parallel with 'squares' in the
    next colon.
- source_word: יִתְהוֹלְלוּ
  chosen: race wildly
  alternatives:
  - rage
  - drive madly
  - boast themselves
  lexicon: HALOT
  rationale: From הלל in a hitpolel/reflexive sense, the verb here conveys frenzied,
    reckless movement rather than praise. In context of chariots in battle, 'race
    wildly' captures the tumultuous motion.
- source_word: הָרֶכֶב
  chosen: the chariots
  alternatives:
  - the chariotry
  - the war chariots
  lexicon: HALOT
  rationale: Though morphologically singular/collective, רכב commonly functions as
    a collective for chariot forces. English plural 'the chariots' communicates the
    collective sense naturally.
- source_word: יִשְׁתַּקְשְׁקוּן
  chosen: they rattle
  alternatives:
  - they jostle noisily
  - they clatter
  - they rush to and fro
  lexicon: HALOT
  rationale: This rare verb is onomatopoetic and suggests rattling, clattering, or
    jolting movement. 'They rattle' preserves both sound and motion in concise English.
- source_word: בָּרְחֹבוֹת
  chosen: through the squares
  alternatives:
  - in the broad ways
  - in the plazas
  lexicon: HALOT
  rationale: רחבות denotes broad public spaces or plazas within a city. 'Squares'
    is idiomatic modern English and preserves the urban setting.
- source_word: מַרְאֵיהֶן
  chosen: their appearance
  alternatives:
  - their look
  - their sight
  lexicon: HALOT
  rationale: The noun refers to visible appearance. 'Their appearance' is straightforward
    and fits the similes that follow.
- source_word: כַּלַּפִּידִם
  chosen: like torches
  alternatives:
  - like flaming torches
  - like firebrands
  lexicon: HALOT
  rationale: לפידים are torches or flaming brands. 'Like torches' is vivid and sufficiently
    literal; the fiery sense is already implied.
- source_word: כַּבְּרָקִים
  chosen: like lightning
  alternatives:
  - like flashes of lightning
  lexicon: HALOT
  rationale: ברקים refers to lightning flashes. 'Like lightning' is the most natural
    English comparison.
- source_word: יְרוֹצֵצוּ
  chosen: they dart about
  alternatives:
  - they run
  - they race back and forth
  - they dash about
  lexicon: HALOT
  rationale: The verb conveys rapid movement to and fro. 'They dart about' matches
    the imagery of lightning and avoids flattening the vividness to a generic 'run'.
