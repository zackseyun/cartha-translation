id: NAM.2.9
reference: Nahum 2:9
source:
  edition: WLC
  text: וְ/נִינְוֵ֥ה כִ/בְרֵֽכַת מַ֖יִם מִ֣/ימֵי הִ֑יא וְ/הֵ֣מָּה נָסִ֔ים עִמְד֥וּ
    עֲמֹ֖דוּ וְ/אֵ֥ין מַפְנֶֽה־׃
translation:
  text: Nineveh has been like a pool of water from her earliest days, yet they are
    fleeing. “Stop! Stop!”—but no one turns back.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Stand! Stand!” The Hebrew imperatives can be rendered more literally
      this way; “Stop! Stop!” brings out the sense in a flight scene.
    reason: lexical_alternative
  - marker: b
    text: Literally, “from the days she was,” an idiom meaning from Nineveh’s earliest
      existence or long-standing past.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִינְוֵה
  chosen: Nineveh
  lexicon: HALOT
  rationale: Proper place name; transliterated per translation philosophy.
- source_word: כִּבְרֵכַת מַיִם
  chosen: like a pool of water
  alternatives:
  - like a water pool
  - like a reservoir of water
  lexicon: HALOT
  rationale: The simile compares Nineveh to a collected body of water. 'Pool' is natural
    English and preserves the image without over-specifying an engineered reservoir.
- source_word: מִימֵי הִיא
  chosen: from her earliest days
  alternatives:
  - from the days she has existed
  - from the days of her being
  lexicon: HALOT
  rationale: Literally 'from days she/it [was].' The idiom points to Nineveh's long-standing
    condition. 'From her earliest days' expresses the temporal sense idiomatically
    in English while preserving the feminine personification of the city.
- source_word: וְהֵמָּה נָסִים
  chosen: yet they are fleeing
  alternatives:
  - but they flee
  - and they are fleeing
  lexicon: HALOT
  rationale: 'The pronoun plus participle marks the people of Nineveh in action. ''Yet''
    captures the adversative force in context: despite Nineveh''s former stability,
    its inhabitants are now in flight.'
- source_word: עִמְדוּ עֲמֹדוּ
  chosen: Stop! Stop!
  alternatives:
  - Stand! Stand!
  - Hold your ground! Hold your ground!
  lexicon: HALOT
  rationale: Imperative repetition heightens urgency. In this context of fleeing troops/citizens,
    English 'Stop! Stop!' best conveys the shouted command to halt, while 'stand'
    is preserved as an alternative.
- source_word: וְאֵין מַפְנֶה
  chosen: but no one turns back
  alternatives:
  - but there is no turning
  - but no one looks back
  - but none turns around
  lexicon: HALOT
  rationale: The Hiphil participial form from פנה here denotes turning oneself around/back
    in response to the command. Rendering it personally ('no one turns back') fits
    the scene better than an abstract noun phrase.
