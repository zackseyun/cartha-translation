id: NAM.2.2
reference: Nahum 2:2
source:
  edition: WLC
  text: עָלָ֥ה מֵפִ֛יץ עַל פָּנַ֖יִ/ךְ נָצ֣וֹר מְצֻרָ֑ה צַפֵּה דֶ֨רֶךְ֙ חַזֵּ֣ק מָתְנַ֔יִם
    אַמֵּ֥ץ כֹּ֖חַ מְאֹֽד־־׃
translation:
  text: A scatterer has come up against your face. Guard the fortress; watch the road;
    strengthen your loins; muster your strength greatly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a shatterer' or 'one who dashes to pieces'; the Hebrew term can emphasize
      either scattering or smashing destruction.
    reason: lexical_alternative
  - marker: b
    text: Literally 'against your face,' an idiom meaning directly before you or against
      you.
    reason: lexical_alternative
  - marker: c
    text: Or 'the stronghold' or possibly 'the siegeworks/fortification'; the Hebrew
      noun can refer more broadly to a fortified or besieged position.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלָה
  chosen: has come up
  alternatives:
  - has advanced
  - has gone up
  lexicon: HALOT
  rationale: The qatal form presents the attacker as already on the move or arrived.
    'Has come up' preserves the common military sense of עלה for advancing against
    a place.
- source_word: מֵפִיץ
  chosen: a scatterer
  alternatives:
  - one who dashes to pieces
  - a disperser
  - a shatterer
  lexicon: HALOT
  rationale: The participial noun from פוץ/פצץ imagery can denote one who scatters
    or smashes. 'Scatterer' is concise and preserves the destructive-agent sense without
    over-specifying the exact military action. An alternative is worth preserving
    because many translations render the term more violently as 'shatterer' or 'one
    who dashes in pieces.'
- source_word: עַל פָּנַיִךְ
  chosen: against your face
  alternatives:
  - before you
  - against you
  lexicon: HALOT
  rationale: Literally 'upon your face.' In context it means direct confrontation
    or approach. 'Against your face' keeps the vivid Hebrew idiom in English, though
    the smoother contextual sense is 'against you' or 'before you.'
- source_word: נָצוֹר
  chosen: Guard
  alternatives:
  - Keep watch over
  - Protect
  lexicon: HALOT
  rationale: Imperative calling for defensive action. 'Guard' is brief and military
    in tone.
- source_word: מְצֻרָה
  chosen: the fortress
  alternatives:
  - the siegeworks
  - the stronghold
  - the fortified place
  lexicon: HALOT
  rationale: The noun can refer to a fortified place or siege situation. Here the
    command sequence favors defending a fortified position, so 'the fortress' fits
    best. Because the noun may also be understood in relation to siegeworks or fortification
    generally, an alternative is preserved in a footnote.
- source_word: צַפֵּה דֶרֶךְ
  chosen: watch the road
  alternatives:
  - watch the way
  - keep watch on the road
  lexicon: HALOT
  rationale: Imperative plus object gives a sentry-like command to observe the route
    of approach. 'Road' is concrete and natural English.
- source_word: חַזֵּק מָתְנַיִם
  chosen: strengthen your loins
  alternatives:
  - brace your loins
  - make your waist strong
  lexicon: HALOT
  rationale: A conventional Hebrew idiom for preparing resolutely for action. 'Strengthen
    your loins' preserves the bodily metaphor and martial urgency.
- source_word: אַמֵּץ כֹּחַ
  chosen: muster your strength
  alternatives:
  - fortify your power
  - make your strength firm
  lexicon: HALOT
  rationale: The imperative calls for summoning or reinforcing strength. 'Muster your
    strength' communicates active preparation in idiomatic English.
- source_word: מְאֹד
  chosen: greatly
  alternatives:
  - very much
  - exceedingly
  lexicon: HALOT
  rationale: An adverb intensifying the final command. 'Greatly' keeps the elevated
    prophetic tone better than the flatter 'very much.'
