id: NAM.2.8
reference: Nahum 2:8
source:
  edition: WLC
  text: וְ/הֻצַּ֖ב גֻּלְּתָ֣ה הֹֽעֲלָ֑תָה וְ/אַמְהֹתֶ֗י/הָ מְנַֽהֲגוֹת֙ כְּ/ק֣וֹל
    יוֹנִ֔ים מְתֹפְפֹ֖ת עַל לִבְבֵ/הֶֽן־׃
translation:
  text: 'It is fixed: she is stripped bare, she is carried away; and her slave girls
    are led off, moaning like the sound of doves, beating on their hearts.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'she is uncovered' or 'she is exiled'; the Hebrew is difficult and may
      combine humiliation and deportation imagery.
    reason: alternative_reading
  - marker: b
    text: Literally 'on their hearts'; the phrase may idiomatically refer to beating
      their breasts in mourning.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֻצַּב
  chosen: It is fixed
  alternatives:
  - She is stationed
  - It is decreed
  lexicon: HALOT
  rationale: 'The form is difficult and much discussed. Taking it as an impersonal/passive
    expression gives a natural sense in context: the matter is settled or determined.
    This avoids overcommitting to a more concrete sense like ''stationed'' that fits
    the root less well in this poetic context of judgment.'
- source_word: גֻּלְּתָה
  chosen: she is stripped bare
  alternatives:
  - she is uncovered
  - she is exiled
  lexicon: HALOT
  rationale: From גלה, the passive can denote being uncovered or laid bare. In context
    with the following 'carried away,' 'stripped bare' best captures humiliation imagery
    without collapsing it into exile alone.
- source_word: הֹעֲלָתָה
  chosen: she is carried away
  alternatives:
  - she is brought up
  - she is led away
  lexicon: HALOT
  rationale: From עלה in the Hophal, the sense here is movement under compulsion.
    'Carried away' fits the fall-of-city context and pairs well with the preceding
    humiliation language.
- source_word: אַמְהֹתֶיהָ
  chosen: her slave girls
  alternatives:
  - her maidservants
  - her female servants
  lexicon: HALOT
  rationale: אָמָה denotes a female slave/servant. 'Slave girls' preserves the social
    subordination more clearly than the softer 'maidservants,' while fitting the lament
    scene.
- source_word: מְנַהֲגוֹת
  chosen: are led off
  alternatives:
  - are driven along
  - are conducted
  lexicon: HALOT
  rationale: The participle/passive-like sense in context suggests being driven or
    led away. 'Are led off' is idiomatic and suits captives in procession.
- source_word: כְּקוֹל יוֹנִים
  chosen: like the sound of doves
  alternatives:
  - like doves
  - with the voice of doves
  lexicon: HALOT
  rationale: The simile explicitly compares their sound to doves. Retaining 'sound'
    preserves the auditory image of mourning.
- source_word: מְתֹפְפֹת
  chosen: beating
  alternatives:
  - drumming
  - striking
  lexicon: HALOT
  rationale: The verb evokes rhythmic striking, here as a mourning gesture. 'Beating'
    is the most natural English choice in collocation with the following object.
- source_word: עַל לִבְבֵהֶן
  chosen: on their hearts
  alternatives:
  - on their breasts
  - upon their hearts
  lexicon: HALOT
  rationale: Literally 'on their hearts.' In Hebrew anthropological idiom this can
    overlap with the chest/breast as the place struck in mourning. The main text keeps
    the literal image; a footnote preserves the idiomatic alternative.
