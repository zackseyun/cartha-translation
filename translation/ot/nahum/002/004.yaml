id: NAM.2.4
reference: Nahum 2:4
source:
  edition: WLC
  text: מָגֵ֨ן גִּבֹּרֵ֜י/הוּ מְאָדָּ֗ם אַנְשֵׁי חַ֨יִל֙ מְתֻלָּעִ֔ים בְּ/אֵשׁ פְּלָד֥וֹת
    הָ/רֶ֖כֶב בְּ/י֣וֹם הֲכִינ֑/וֹ וְ/הַ/בְּרֹשִׁ֖ים הָרְעָֽלוּ־־׃
translation:
  text: The shield of his mighty men is red; the men of valor are clothed in scarlet.
    The chariots flash with the fire of steel on the day of his preparation, and the
    cypress spears are brandished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the cypresses shake'; the Hebrew likely uses 'cypresses' metonymically
      for spear shafts or lances made of cypress wood.
    reason: lexical_alternative
  - marker: b
    text: Or 'the chariots are with fiery steel'; the Hebrew phrase is difficult and
      may refer to the flashing metal fittings or blades of the chariots.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָגֵן
  chosen: shield
  alternatives:
  - buckler
  lexicon: HALOT
  rationale: Standard military sense, referring to defensive equipment. 'Shield' is
    the natural modern English rendering.
- source_word: גִּבֹּרֵיהוּ
  chosen: his mighty men
  alternatives:
  - his warriors
  - his heroes
  lexicon: HALOT
  rationale: גִּבּוֹר often denotes a strong warrior or mighty man. 'His mighty men'
    preserves the martial and personal force of the construct with suffix.
- source_word: מְאָדָּם
  chosen: is red
  alternatives:
  - is made red
  - is reddened
  lexicon: HALOT
  rationale: Passive/stative sense from אדם, describing the shield's red appearance.
    English idiom favors 'is red' rather than a more wooden passive.
- source_word: אַנְשֵׁי חַיִל
  chosen: men of valor
  alternatives:
  - valiant men
  - warriors
  lexicon: HALOT
  rationale: A common Hebrew expression for capable or valiant fighting men. 'Men
    of valor' is concise and preserves the idiom's dignity.
- source_word: מְתֻלָּעִים
  chosen: are clothed in scarlet
  alternatives:
  - are in crimson
  - are scarlet-clad
  lexicon: HALOT
  rationale: The term is associated with scarlet/crimson coloration, often from dyed
    material. Since it describes the warriors, an implicit clothing sense is likely
    in context.
- source_word: בְּאֵשׁ פְּלָדוֹת
  chosen: flash with the fire of steel
  alternatives:
  - are with fiery steel
  - are like fire of steel
  - with flashing metal
  lexicon: HALOT
  rationale: A difficult phrase. אֵשׁ is 'fire,' and פְּלָדוֹת likely refers to metal/steel
    fittings or blades. The sense is visual brilliance or fiery gleam from metal on
    the chariots; 'flash with the fire of steel' captures the imagery in readable
    English.
- source_word: הָרֶכֶב
  chosen: the chariots
  alternatives:
  - the chariotry
  lexicon: HALOT
  rationale: Collective military vehicle term. 'The chariots' is more natural modern
    English than 'chariotry' while preserving the military image.
- source_word: בְּיוֹם הֲכִינוֹ
  chosen: on the day of his preparation
  alternatives:
  - on the day he prepares
  - on the day of his mustering
  lexicon: HALOT
  rationale: 'The infinitive/nominal sense with suffix points to a time reference:
    the day of his preparing or making ready. ''His preparation'' preserves the ambiguity
    of subject and action better than over-specifying.'
- source_word: וְהַבְּרֹשִׁים
  chosen: the cypress spears
  alternatives:
  - the cypresses
  - the fir shafts
  - the juniper spears
  lexicon: HALOT
  rationale: בְּרֹשִׁים literally denotes cypress/fir trees, but in this military
    context likely refers metonymically to spear shafts made from such wood. Rendering
    simply 'cypresses' would be obscure in English; 'cypress spears' makes the implied
    referent explicit.
- source_word: הָרְעָלוּ
  chosen: are brandished
  alternatives:
  - are shaken
  - are made to quake
  - are rattled
  lexicon: HALOT
  rationale: The verb is difficult, but in context it likely describes the vigorous
    shaking or brandishing of weapons. 'Are brandished' fits the battle scene and
    the likely implied object from 'cypress spears.'
