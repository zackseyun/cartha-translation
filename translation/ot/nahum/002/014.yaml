id: NAM.2.14
reference: Nahum 2:14
source:
  edition: WLC
  text: הִנְ/נִ֣י אֵלַ֗יִ/ךְ נְאֻם֙ יְהוָ֣ה צְבָא֔וֹת וְ/הִבְעַרְתִּ֤י בֶֽ/עָשָׁן֙
    רִכְבָּ֔/הּ וּ/כְפִירַ֖יִ/ךְ תֹּ֣אכַל חָ֑רֶב וְ/הִכְרַתִּ֤י מֵ/אֶ֨רֶץ֙ טַרְפֵּ֔/ךְ
    וְ/לֹֽא יִשָּׁמַ֥ע ע֖וֹד ק֥וֹל מַלְאָכֵֽ/כֵה־׃ס
translation:
  text: Behold, I am against you, declares the LORD of hosts, and I will burn up your
    chariots in smoke; the sword will devour your young lions. I will cut off your
    prey from the earth, and the voice of your messengers will no longer be heard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into smoke'; the Hebrew phrase may emphasize either the manner of burning
      ('in smoke') or the result ('into smoke').
    reason: lexical_alternative
  - marker: b
    text: '''Young lions'' continues Nineveh''s lion imagery; it likely refers metaphorically
      to her warriors or rulers.'
    reason: cultural_note
  - marker: c
    text: Or 'envoys.' The Hebrew word can denote human messengers sent on official
      business.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי אֵלַיִךְ
  chosen: Behold, I am against you
  alternatives:
  - Look, I am against you
  - See, I am against you
  lexicon: HALOT
  rationale: Idiomatic prophetic confrontation formula. 'Behold' preserves the solemn,
    attention-commanding force of הִנְנִי while remaining understandable in modern
    English; אֵלַיִךְ is adversative here, hence 'against you.'
- source_word: נְאֻם יְהוָה צְבָאוֹת
  chosen: declares the LORD of hosts
  alternatives:
  - oracle of the LORD of hosts
  - says the LORD of hosts
  lexicon: HALOT
  rationale: נְאֻם is a prophetic declaration formula best rendered 'declares.' יְהוָה
    follows the doctrinal default 'the LORD.' צְבָאוֹת is translated 'of hosts' rather
    than transliterated, preserving the title's meaning and established English sense.
- source_word: וְהִבְעַרְתִּי
  chosen: I will burn up
  alternatives:
  - I will burn
  - I will consume by fire
  lexicon: HALOT
  rationale: Hiphil of בער here conveys causing destruction by fire. 'Burn up' communicates
    both ignition and destructive result.
- source_word: בֶעָשָׁן
  chosen: in smoke
  alternatives:
  - into smoke
  - with smoke
  lexicon: HALOT
  rationale: The preposition ב plus עָשָׁן most naturally yields 'in smoke,' expressing
    the manner/result of the burning. This keeps close to the Hebrew while remaining
    idiomatic enough in English.
- source_word: רִכְבָּהּ
  chosen: your chariots
  alternatives:
  - your chariotry
  - your chariot
  lexicon: HALOT
  rationale: Though morphologically singular with suffix, the noun can function collectively.
    'Your chariots' is the most natural English rendering in context of military destruction.
- source_word: וּכְפִירַיִךְ
  chosen: your young lions
  alternatives:
  - your lion cubs
  - your fierce warriors
  lexicon: HALOT
  rationale: כְּפִירִים literally means 'young lions.' In Nahum's taunt over Nineveh,
    the lion imagery is sustained metaphorically for Assyria's rulers/warriors, but
    the translation keeps the image explicit rather than interpreting it away.
- source_word: תֹּאכַל חָרֶב
  chosen: the sword will devour
  alternatives:
  - the sword will consume
  - the sword will eat
  lexicon: HALOT
  rationale: Hebrew commonly personifies the sword as devouring. 'Devour' preserves
    the vivid metaphor and is idiomatic English.
- source_word: וְהִכְרַתִּי
  chosen: I will cut off
  alternatives:
  - I will destroy
  - I will wipe out
  lexicon: HALOT
  rationale: כרת in Hiphil often means to cut off, remove, or exterminate. 'Cut off'
    preserves the lexical image and prophetic register.
- source_word: מֵאֶרֶץ טַרְפֵּךְ
  chosen: your prey from the earth
  alternatives:
  - your plunder from the land
  - what you have torn from the earth
  lexicon: HALOT
  rationale: טֶרֶף is literally prey, fitting the lion metaphor and Assyria's predatory
    violence. 'Earth' is retained for אֶרֶץ in a broad sense rather than narrowing
    to 'land.'
- source_word: וְלֹא יִשָּׁמַע עוֹד קוֹל
  chosen: will no longer be heard
  alternatives:
  - shall be heard no more
  - will not be heard again
  lexicon: HALOT
  rationale: Passive/Niphal construction is naturally rendered in English as 'will
    no longer be heard,' preserving the durative finality of עוֹד.
- source_word: מַלְאָכֵכֵה
  chosen: your messengers
  alternatives:
  - your envoys
  - your angels
  lexicon: HALOT
  rationale: מַלְאָךְ can mean messenger, envoy, or angel depending on context. Here
    the reference is to Nineveh/Assyria's human emissaries or heralds, so 'messengers'
    is the best contextual rendering; 'angels' would be misleading.
