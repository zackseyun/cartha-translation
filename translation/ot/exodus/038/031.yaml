id: EXO.38.31
reference: Exodus 38:31
source:
  edition: WLC
  text: וְ/אֶת אַדְנֵ֤י הֶֽ/חָצֵר֙ סָבִ֔יב וְ/אֶת אַדְנֵ֖י שַׁ֣עַר הֶ/חָצֵ֑ר וְ/אֵ֨ת
    כָּל יִתְדֹ֧ת הַ/מִּשְׁכָּ֛ן וְ/אֶת כָּל יִתְדֹ֥ת הֶ/חָצֵ֖ר סָבִֽיב־־־־־׃
translation:
  text: the bases of the surrounding courtyard, the bases of the gate of the courtyard,
    all the pegs of the tabernacle, and all the pegs of the surrounding courtyard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sockets' for 'bases.'
    reason: lexical_alternative
  - marker: b
    text: Or 'stakes' for 'pegs.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַדְנֵי
  chosen: bases
  alternatives:
  - sockets
  - pedestals
  lexicon: HALOT
  rationale: In tabernacle-construction contexts, אֶדֶן refers to the metal foundation
    pieces into which frames or posts were set. 'Bases' is clear modern English and
    fits both the courtyard and gate context better than the more technical 'sockets,'
    while preserving the concrete architectural sense.
- source_word: חָצֵר
  chosen: courtyard
  alternatives:
  - court
  - enclosure
  lexicon: HALOT
  rationale: '''Courtyard'' communicates the enclosed sacred outer area in natural
    modern English. ''Court'' is possible but can sound institutional rather than
    spatial.'
- source_word: סָבִיב
  chosen: surrounding
  alternatives:
  - all around
  - around
  lexicon: HALOT
  rationale: Used attributively here with 'courtyard' to indicate the perimeter area/posts
    on every side. 'Surrounding courtyard' is concise and natural in English, preserving
    the distributive sense without awkward repetition.
- source_word: שַׁעַר
  chosen: gate
  alternatives:
  - entrance
  - gateway
  lexicon: HALOT
  rationale: The term denotes the gate/opening of the courtyard. 'Gate' is the most
    direct and conventional rendering in this construction context.
- source_word: יִתְדֹת
  chosen: pegs
  alternatives:
  - stakes
  - tent pegs
  lexicon: HALOT
  rationale: The word refers to fastening pegs used for the tabernacle and courtyard.
    'Pegs' is concise and accurate; 'stakes' is possible, but 'pegs' better matches
    portable sanctuary hardware.
- source_word: מִּשְׁכָּן
  chosen: tabernacle
  alternatives:
  - dwelling place
  - dwelling
  lexicon: HALOT
  rationale: In Exodus this term is the established designation for the sacred tent-sanctuary.
    'Tabernacle' preserves continuity and specificity better than the more generic
    'dwelling place'.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: '''All'' naturally modifies the plural nouns ''pegs'' and comprehensively
    includes the listed items.'
- source_word: וְאֵת / וְאֶת
  chosen: and
  alternatives:
  - also
  lexicon: Hebrew grammar
  rationale: The repeated direct-object marker with conjunction structures a continuing
    inventory list. In English, simple coordination with 'and' best reflects the list
    style without overtranslating the object marker.
