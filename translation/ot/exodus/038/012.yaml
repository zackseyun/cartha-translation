id: EXO.38.12
reference: Exodus 38:12
source:
  edition: WLC
  text: וְ/לִ/פְאַת יָ֗ם קְלָעִים֙ חֲמִשִּׁ֣ים בָּֽ/אַמָּ֔ה עַמּוּדֵי/הֶ֥ם עֲשָׂרָ֔ה
    וְ/אַדְנֵי/הֶ֖ם עֲשָׂרָ֑ה וָוֵ֧י הָ/עַמֻּדִ֛ים וַ/חֲשׁוּקֵי/הֶ֖ם כָּֽסֶף־׃
translation:
  text: And for the west side there were hangings of fifty cubits, with ten of their
    pillars and ten of their bases; the hooks of the pillars and their bands were
    silver.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their fillets were silver.' The Hebrew term for these pillar fittings
      is technical and may refer to bands, rods, or decorative connecting pieces.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלִפְאַת יָם
  chosen: And for the west side
  alternatives:
  - And on the west side
  - And for the seaward side
  lexicon: HALOT
  rationale: פאה denotes a side or edge, and יָם literally means 'sea' but functions
    idiomatically for the west in tabernacle descriptions. 'West side' gives the plain
    directional sense in natural English while preserving the construction's locative
    force with 'for.'
- source_word: קְלָעִים
  chosen: hangings
  alternatives:
  - curtains
  - screen hangings
  lexicon: HALOT
  rationale: In the tabernacle courtyard context, קְלָעִים refers to the fabric hangings
    forming the enclosure. 'Hangings' is a standard and sufficiently concrete rendering
    without over-specifying their exact textile form.
- source_word: חֲמִשִּׁים בָּאַמָּה
  chosen: of fifty cubits
  alternatives:
  - fifty cubits long
  lexicon: HALOT
  rationale: אַמָּה is the standard cubit measure. The Hebrew gives the measurement
    directly; 'of fifty cubits' is concise and natural, leaving the implied extent
    understood from context.
- source_word: עַמּוּדֵיהֶם עֲשָׂרָה
  chosen: with ten of their pillars
  alternatives:
  - their pillars, ten
  - ten pillars
  lexicon: HALOT
  rationale: עַמּוּדִים are structural pillars/posts. 'Pillars' fits the tabernacle
    furnishing context well. 'With' smoothly connects the inventory-style Hebrew to
    readable English.
- source_word: וְאַדְנֵיהֶם עֲשָׂרָה
  chosen: and ten of their bases
  alternatives:
  - and their ten sockets
  lexicon: HALOT
  rationale: אֶדֶן in tabernacle construction commonly denotes a base or socket. 'Bases'
    is more accessible modern English; 'sockets' is possible but more technical. The
    possessive is retained.
- source_word: וָוֵי הָעַמֻּדִים
  chosen: the hooks of the pillars
  alternatives:
  - the pegs of the pillars
  lexicon: HALOT
  rationale: וָוִים in these tabernacle passages are the hooks attached to the pillars.
    'Hooks' is the most established and contextually fitting rendering.
- source_word: וַחֲשֻׁקֵיהֶם
  chosen: and their bands
  alternatives:
  - and their fillets
  - and their connecting rods
  lexicon: HALOT
  rationale: The exact architectural referent is somewhat specialized; traditional
    'fillets' is obscure in modern English. 'Bands' preserves the idea of attached
    metal elements around or connecting the pillars without excessive technicality.
- source_word: כָּסֶף
  chosen: were silver
  alternatives:
  - were of silver
  - silver
  lexicon: HALOT
  rationale: The final noun functions predicatively, describing the material of the
    hooks and bands. Supplying 'were' is required in English and keeps the sentence
    clear.
