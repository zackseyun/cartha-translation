id: EXO.38.13
reference: Exodus 38:13
source:
  edition: WLC
  text: וְ/לִ/פְאַ֛ת קֵ֥דְמָ/ה מִזְרָ֖חָ/ה חֲמִשִּׁ֥ים אַמָּֽה׃
translation:
  text: And for the east side, toward the sunrise, fifty cubits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'for the side eastward, toward the sunrise.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לִ/פְאַת
  chosen: And for the ... side
  alternatives:
  - And on the ... side
  - And for the edge/border of
  lexicon: HALOT
  rationale: פאה denotes a side, edge, or border. In this tabernacle-court measurement
    context, 'side' is the most natural English rendering. The prefixed conjunction
    and preposition are carried as 'And for' to preserve the coordinate, descriptive
    style of the measurements.
- source_word: קֵדְמָה
  chosen: east
  alternatives:
  - front
  - eastward
  lexicon: HALOT
  rationale: The term can denote the east or the front/eastern direction. In combination
    with מִזְרָחָה, the directional sense is explicit, so 'east' is the clearest concise
    rendering.
- source_word: מִזְרָחָה
  chosen: toward the sunrise
  alternatives:
  - eastward
  - toward the east
  - sunrise
  lexicon: HALOT
  rationale: מזרח refers to the place of sunrise, hence 'east.' Because קֵדְמָה already
    supplies 'east,' rendering this second term as 'toward the sunrise' preserves
    the Hebrew's paired directional expression without awkward repetition.
- source_word: חֲמִשִּׁים
  chosen: fifty
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: אַמָּה
  chosen: cubits
  alternatives:
  - cubits long
  lexicon: HALOT
  rationale: אַמָּה is the standard linear measure 'cubit.' English idiom in measurement
    summaries allows simply 'fifty cubits' without adding an explicit measure word
    like 'long.'
