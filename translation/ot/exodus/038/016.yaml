id: EXO.38.16
reference: Exodus 38:16
source:
  edition: WLC
  text: כָּל קַלְעֵ֧י הֶ/חָצֵ֛ר סָבִ֖יב שֵׁ֥שׁ מָשְׁזָֽר־׃
translation:
  text: All the hangings of the courtyard all around were of finely twisted linen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'All the curtains of the court all around were of fine twined linen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - Every
  lexicon: HALOT
  rationale: Quantifier introducing the totality of the courtyard hangings; 'All'
    is natural English and preserves the collective sense.
- source_word: קַלְעֵי
  chosen: the hangings
  alternatives:
  - the curtains
  - the screens
  lexicon: HALOT
  rationale: Refers to the fabric hangings forming the enclosure of the tabernacle
    court. 'Hangings' best fits the cultic architectural context without implying
    interior drapery as strongly as 'curtains'.
- source_word: הֶחָצֵר
  chosen: of the courtyard
  alternatives:
  - of the court
  lexicon: HALOT
  rationale: In tabernacle context, חָצֵר denotes the enclosed outer court. 'Courtyard'
    is slightly more natural in modern English while preserving the spatial sense.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  - on every side
  lexicon: HALOT
  rationale: Adverbial term indicating the perimeter on every side. 'All around' clearly
    conveys the distributive surrounding sense.
- source_word: שֵׁשׁ
  chosen: linen
  alternatives:
  - fine linen
  lexicon: HALOT
  rationale: In tabernacle descriptions שֵׁשׁ refers to linen material, often of high
    quality. Because the following participial/adjectival term already conveys workmanship,
    rendering this simply as 'linen' avoids overloading the phrase.
- source_word: מָשְׁזָר
  chosen: finely twisted
  alternatives:
  - twisted
  - twined
  lexicon: HALOT
  rationale: Describes spun or twisted thread workmanship. 'Finely twisted' is the
    conventional and contextually appropriate rendering for tabernacle textiles, yielding
    the idiomatic phrase 'finely twisted linen'.
