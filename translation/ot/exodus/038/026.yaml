id: EXO.38.26
reference: Exodus 38:26
source:
  edition: WLC
  text: בֶּ֚קַע לַ/גֻּלְגֹּ֔לֶת מַחֲצִ֥ית הַ/שֶּׁ֖קֶל בְּ/שֶׁ֣קֶל הַ/קֹּ֑דֶשׁ לְ/כֹ֨ל
    הָ/עֹבֵ֜ר עַל הַ/פְּקֻדִ֗ים מִ/בֶּ֨ן עֶשְׂרִ֤ים שָׁנָה֙ וָ/מַ֔עְלָ/ה לְ/שֵׁשׁ
    מֵא֥וֹת אֶ֨לֶף֙ וּ/שְׁלֹ֣שֶׁת אֲלָפִ֔ים וַ/חֲמֵ֥שׁ מֵא֖וֹת וַ/חֲמִשִּֽׁים־־׃
translation:
  text: 'a beka per head—that is, half a shekel by the sanctuary shekel—for everyone
    who passed over to those counted, from twenty years old and upward: 603,550.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A beka was equal to half a shekel by the sanctuary standard.
    reason: cultural_note
  - marker: b
    text: Literally 'per skull,' a Hebrew idiom meaning each individual person counted.
    reason: lexical_alternative
  - marker: c
    text: Or 'for everyone who passed among those numbered.' The Hebrew uses census
      language with the imagery of passing over into registration.
    reason: alternative_reading
lexical_decisions:
- source_word: בֶּקַע
  chosen: beka
  alternatives:
  - half-shekel piece
  - bekah
  lexicon: HALOT
  rationale: A specific weight/coin term. Transliteration preserves the technical
    monetary unit; the appositional phrase that follows explains its value as half
    a shekel.
- source_word: לַגֻּלְגֹּלֶת
  chosen: per head
  alternatives:
  - per skull
  - for each person
  lexicon: HALOT
  rationale: Literally 'for the skull,' an idiom for counting persons individually.
    'Per head' preserves the counting idiom in natural English better than the overly
    literal 'per skull.'
- source_word: מַחֲצִית הַשֶּׁקֶל
  chosen: half a shekel
  alternatives:
  - a half-shekel
  lexicon: HALOT
  rationale: Straightforward construct phrase indicating the value of the beka.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  chosen: by the sanctuary shekel
  alternatives:
  - according to the shekel of the sanctuary
  - in sanctuary shekels
  lexicon: HALOT
  rationale: Specifies the standard of weight. 'By the sanctuary shekel' is concise
    and clear modern English while retaining the cultic reference.
- source_word: לְכֹל הָעֹבֵר עַל הַפְּקֻדִים
  chosen: for everyone who passed over to those counted
  alternatives:
  - for everyone who passed among those numbered
  - for everyone enrolled among the counted
  lexicon: HALOT
  rationale: This idiom refers to those who crossed over into the census/register.
    'Passed over to those counted' keeps the verbal imagery and census context without
    flattening it to mere abstraction.
- source_word: הַפְּקֻדִים
  chosen: those counted
  alternatives:
  - those numbered
  - the enrolled
  lexicon: HALOT
  rationale: Passive participial sense in context of census accounting. 'Those counted'
    is natural and transparent.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  chosen: from twenty years old and upward
  alternatives:
  - from twenty years old and above
  - aged twenty and up
  lexicon: HALOT
  rationale: Standard age-threshold formula in census contexts; this rendering is
    idiomatic and accurate.
- source_word: לְשֵׁשׁ מֵאוֹת אֶלֶף וּשְׁלֹשֶׁת אֲלָפִים וַחֲמֵשׁ מֵאוֹת וַחֲמִשִּׁים
  chosen: 603,550
  alternatives:
  - six hundred three thousand five hundred fifty
  lexicon: HALOT
  rationale: The Hebrew gives the total number of counted men. Numerals are rendered
    in standard English figure style for readability.
