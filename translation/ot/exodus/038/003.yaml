id: EXO.38.3
reference: Exodus 38:3
source:
  edition: WLC
  text: וַ/יַּ֜עַשׂ אֶֽת כָּל כְּלֵ֣י הַ/מִּזְבֵּ֗חַ אֶת הַ/סִּירֹ֤ת וְ/אֶת הַ/יָּעִים֙
    וְ/אֶת הַ/מִּזְרָקֹ֔ת אֶת הַ/מִּזְלָגֹ֖ת וְ/אֶת הַ/מַּחְתֹּ֑ת כָּל כֵּלָ֖י/ו עָשָׂ֥ה
    נְחֹֽשֶׁת־־־־־־־־׃
translation:
  text: 'He made all the utensils of the altar: the pots, the shovels, the basins,
    the forks, and the firepans. He made all its utensils of bronze.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'copper' for 'bronze.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term rendered 'pots' may refer more specifically to vessels used
      for removing ashes.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּלֵי הַמִּזְבֵּחַ
  chosen: the utensils of the altar
  alternatives:
  - the vessels of the altar
  - the implements of the altar
  - the articles of the altar
  lexicon: HALOT
  rationale: כְּלִי is a broad term for equipment, vessels, or utensils. 'Utensils'
    fits the list of functional altar tools in natural modern English without becoming
    overly technical.
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Standard rendering of מִזְבֵּחַ in cultic contexts.
- source_word: הַסִּירֹת
  chosen: the pots
  alternatives:
  - the pails
  - the ash pots
  lexicon: HALOT
  rationale: סִירוֹת commonly denotes pots. In altar context these may be used for
    ashes, which some English versions make explicit as 'ash pots,' but the Hebrew
    here does not itself specify ashes, so the simpler 'pots' is preferred.
- source_word: הַיָּעִים
  chosen: the shovels
  alternatives:
  - the scoops
  lexicon: HALOT
  rationale: יַע is a tool for shoveling or scooping; 'shovels' is the most idiomatic
    and contextually fitting rendering for altar service.
- source_word: הַמִּזְרָקֹת
  chosen: the basins
  alternatives:
  - the bowls
  lexicon: HALOT
  rationale: מִזְרָקֹת are vessels used in ritual handling/splashing of blood or liquids.
    'Basins' preserves cultic utility better than the more domestic-sounding 'bowls.'
- source_word: הַמִּזְלָגֹת
  chosen: the forks
  alternatives:
  - the flesh-hooks
  lexicon: HALOT
  rationale: The noun denotes fork-like implements. 'Forks' is clear modern English;
    the more interpretive 'flesh-hooks' adds specificity not present in the immediate
    wording.
- source_word: הַמַּחְתֹּת
  chosen: the firepans
  alternatives:
  - the censers
  - the pans for coals
  lexicon: HALOT
  rationale: מַחְתָּה refers to a pan for carrying coals/fire. 'Firepans' is a standard
    and sufficiently transparent rendering in tabernacle contexts.
- source_word: כָּל כֵּלָיו
  chosen: all its utensils
  alternatives:
  - all its vessels
  - all its implements
  lexicon: HALOT
  rationale: The suffix refers back to the altar. Repeating 'utensils' maintains consistency
    with the earlier כְּלֵי while sounding natural in English.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: In tabernacle-furnishing contexts, נְחֹשֶׁת is conventionally and plausibly
    rendered 'bronze.' 'Copper' is possible lexically, but 'bronze' better reflects
    likely ancient metal usage and established cultic terminology.
- source_word: וַיַּעַשׂ ... עָשָׂה
  chosen: He made ... He made
  alternatives:
  - and he made ... he made
  - he made ... fashioned
  lexicon: HALOT
  rationale: The verse uses עשה twice, first as wayyiqtol introducing the action and
    then as a resumptive/completive statement. Preserving both occurrences reflects
    the Hebrew structure, even though English could compress them.
