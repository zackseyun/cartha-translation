id: EXO.38.1
reference: Exodus 38:1
source:
  edition: WLC
  text: וַ/יַּ֛עַשׂ אֶת מִזְבַּ֥ח הָ/עֹלָ֖ה עֲצֵ֣י שִׁטִּ֑ים חָמֵשׁ֩ אַמּ֨וֹת אָרְכּ֜/וֹ
    וְ/חָֽמֵשׁ אַמּ֤וֹת רָחְבּ/וֹ֙ רָב֔וּעַ וְ/שָׁלֹ֥שׁ אַמּ֖וֹת קֹמָתֽ/וֹ־־׃
translation:
  text: He made the altar of burnt offering of acacia wood, five cubits its length
    and five cubits its width, square, and three cubits its height.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'four-square.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He made
  alternatives:
  - And he made
  - He fashioned
  lexicon: HALOT
  rationale: The waw-consecutive with עשה narrates a past action. 'He made' is natural
    modern English and preserves the straightforward narrative sense without adding
    nuance beyond the Hebrew.
- source_word: מִזְבַּח הָעֹלָה
  chosen: the altar of burnt offering
  alternatives:
  - the altar for burnt offering
  - the burnt-offering altar
  lexicon: HALOT
  rationale: The construct phrase denotes the altar associated with the עולה, the
    whole burnt offering. 'Altar of burnt offering' is clear, idiomatic, and close
    to the Hebrew.
- source_word: עֲצֵי שִׁטִּים
  chosen: of acacia wood
  alternatives:
  - of acacia-wood
  - of shittim wood
  lexicon: HALOT
  rationale: שִׁטִּים refers to acacia. 'Acacia wood' communicates the species in
    contemporary English better than the traditional transliteration 'shittim wood.'
- source_word: חָמֵשׁ אַמּוֹת
  chosen: five cubits
  alternatives:
  - five cubits long
  - five cubits
  lexicon: HALOT
  rationale: אַמָּה is the standard cubit measure. The unit is best preserved rather
    than converted, since the text gives tabernacle dimensions in cubits throughout.
- source_word: אָרְכּוֹ
  chosen: its length
  alternatives:
  - its long side
  - its length was
  lexicon: HALOT
  rationale: The suffix refers to the altar. English supplies 'its' naturally to express
    the possessed dimension.
- source_word: רָחְבּוֹ
  chosen: its width
  alternatives:
  - its breadth
  lexicon: HALOT
  rationale: '''Width'' is the most natural modern equivalent for רחב in a dimensional
    description; ''breadth'' is possible but less current.'
- source_word: רָבוּעַ
  chosen: square
  alternatives:
  - four-square
  lexicon: HALOT
  rationale: The adjective means square/foursquare. 'Square' is concise, modern, and
    fully conveys the shape. The more traditional 'foursquare' is preserved as a lexical
    alternative.
- source_word: קֹמָתוֹ
  chosen: its height
  alternatives:
  - its stature
  - its height was
  lexicon: HALOT
  rationale: In architectural context, קוֹמָה refers to height. 'Its height' is the
    clearest idiomatic rendering.
