id: EXO.38.2
reference: Exodus 38:2
source:
  edition: WLC
  text: וַ/יַּ֣עַשׂ קַרְנֹתָ֗י/ו עַ֚ל אַרְבַּ֣ע פִּנֹּתָ֔י/ו מִמֶּ֖/נּוּ הָי֣וּ קַרְנֹתָ֑י/ו
    וַ/יְצַ֥ף אֹת֖/וֹ נְחֹֽשֶׁת׃
translation:
  text: He made its horns on its four corners; its horns were of one piece with it,
    and he overlaid it with bronze.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its horns were integral with it' (literally, 'from it were its horns'),
      indicating they were not made separately and then attached.
    reason: lexical_alternative
  - marker: b
    text: Hebrew neḥoshet can refer to bronze or copper; 'bronze' is the conventional
      rendering in tabernacle contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He made
  alternatives:
  - And he made
  - He fashioned
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative verb from עשה. 'He made' is natural modern
    English and preserves the straightforward action without unnecessary expansion.
- source_word: קַרְנֹתָיו
  chosen: its horns
  alternatives:
  - its projections
  lexicon: HALOT
  rationale: קֶרֶן literally means 'horn.' In altar/tabernacle contexts this refers
    to horn-like protrusions at the corners. 'Its horns' preserves the cultic architectural
    term used consistently in English Bible tradition and matches the Hebrew concrete
    image.
- source_word: עַל אַרְבַּע פִּנֹּתָיו
  chosen: on its four corners
  alternatives:
  - at its four corners
  lexicon: HALOT
  rationale: The phrase locates the horns with respect to the altar's corners. 'On
    its four corners' is a clear, close rendering of על + 'four corners,' though 'at'
    is also possible in idiomatic English.
- source_word: מִמֶּנּוּ הָיוּ קַרְנֹתָיו
  chosen: its horns were of one piece with it
  alternatives:
  - its horns were from it
  - its horns were integral with it
  lexicon: HALOT
  rationale: Literally, 'from it were its horns.' In construction language this indicates
    the horns were made from the same piece/material as the altar rather than attached
    separately. 'Of one piece with it' communicates the plain sense in natural English.
- source_word: וַיְצַף אֹתוֹ
  chosen: and he overlaid it
  alternatives:
  - and he plated it
  - and he covered it
  lexicon: HALOT
  rationale: צפה in this tabernacle/building context means to overlay or plate an
    object with metal. 'Overlaid' is the standard and precise rendering for this construction.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: נְחֹשֶׁת can denote copper or bronze depending on context. In tabernacle
    furnishing descriptions, 'bronze' is the conventional and likely intended rendering
    for the metal used in these implements; 'copper' remains a lexical alternative
    worth preserving.
