id: EXO.38.6
reference: Exodus 38:6
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ אֶת הַ/בַּדִּ֖ים עֲצֵ֣י שִׁטִּ֑ים וַ/יְצַ֥ף אֹתָ֖/ם נְחֹֽשֶׁת־׃
translation:
  text: He made the poles of acacia wood and overlaid them with bronze.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "copper" for the final material term.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He made
  alternatives:
  - And he made
  - Then he made
  lexicon: HALOT
  rationale: Qal wayyiqtol of עשה, the standard narrative form meaning 'and/he made.'
    English can omit the conjunction for smoother style while preserving the sequential
    sense.
- source_word: הַבַּדִּים
  chosen: the poles
  alternatives:
  - the carrying poles
  - the bars
  lexicon: HALOT
  rationale: בַּדִּים in tabernacle/furnishing contexts refers to poles used for carrying
    sacred objects. 'Poles' is the most natural concise rendering; 'bars' could mislead
    toward structural crosspieces.
- source_word: עֲצֵי שִׁטִּים
  chosen: of acacia wood
  alternatives:
  - of acacia
  - of shittim wood
  lexicon: HALOT
  rationale: Construct phrase literally 'woods of acacia.' Idiomatic English is 'acacia
    wood.' 'Shittim wood' preserves older tradition but is less transparent to modern
    readers and reflects transliteration rather than translation.
- source_word: וַיְצַף
  chosen: and overlaid
  alternatives:
  - and plated
  - and covered
  lexicon: HALOT
  rationale: צפה in this craftsmanship context means to overlay or plate an object
    with metal. 'Overlaid' is standard and precise for tabernacle construction descriptions.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct-object suffix referring back to the poles.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: נְחֹשֶׁת can denote copper or bronze depending on context. In English
    Bible tradition for tabernacle furnishings, 'bronze' is the conventional and likely
    intended material designation; 'copper' remains a plausible lexical alternative.
