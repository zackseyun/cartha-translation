id: EXO.38.29
reference: Exodus 38:29
source:
  edition: WLC
  text: וּ/נְחֹ֥שֶׁת הַ/תְּנוּפָ֖ה שִׁבְעִ֣ים כִּכָּ֑ר וְ/אַלְפַּ֥יִם וְ/אַרְבַּע
    מֵא֖וֹת שָֽׁקֶל־׃
translation:
  text: And the bronze of the wave offering was seventy talents and 2,400 shekels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'copper'; Hebrew נְחֹשֶׁת can refer broadly to copper or bronze depending
      on context.
    reason: lexical_alternative
  - marker: b
    text: '''Wave offering'' is a technical term for something presented before the
      LORD by a ritual waving motion; some render more generally as ''offering presented''
      or ''contribution.'''
    reason: cultural_note
lexical_decisions:
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: נְחֹשֶׁת commonly denotes bronze/copper depending on context. In tabernacle
    inventory contexts, 'bronze' is the conventional and likely sense in English because
    it refers to worked metal used for cultic furnishings rather than raw copper.
- source_word: הַתְּנוּפָה
  chosen: the wave offering
  alternatives:
  - the presentation offering
  - the contribution that was waved
  lexicon: HALOT
  rationale: תְּנוּפָה is the standard term for an offering presented by waving before
    Yahweh. Here it modifies the metal as the bronze belonging to that offering/contribution.
    'Wave offering' preserves the cultic term while remaining readable.
- source_word: שִׁבְעִים כִּכָּר
  chosen: seventy talents
  lexicon: HALOT
  rationale: כִּכָּר is a large unit of weight, conventionally rendered 'talent.'
    Retaining the ancient unit is more transparent than converting to modern weights
    in the main text.
- source_word: וְאַלְפַּיִם וְאַרְבַּע מֵאוֹת שָׁקֶל
  chosen: and 2,400 shekels
  alternatives:
  - and two thousand four hundred shekels
  lexicon: HALOT
  rationale: שֶׁקֶל is a standard weight unit, here best retained as 'shekels.' Numerals
    are rendered in modern English style for readability without loss of meaning.
- source_word: וְ
  chosen: And
  alternatives:
  - Now
  lexicon: HALOT
  rationale: The prefixed conjunction links this verse to the preceding inventory
    totals. 'And' preserves the straightforward narrative coordination.
