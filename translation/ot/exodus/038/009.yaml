id: EXO.38.9
reference: Exodus 38:9
source:
  edition: WLC
  text: וַ/יַּ֖עַשׂ אֶת הֶ/חָצֵ֑ר לִ/פְאַ֣ת נֶ֣גֶב תֵּימָ֗נָ/ה קַלְעֵ֤י הֶֽ/חָצֵר֙
    שֵׁ֣שׁ מָשְׁזָ֔ר מֵאָ֖ה בָּ/אַמָּֽה־׀׃
translation:
  text: He made the courtyard. On the south side, toward the south, the hangings of
    the courtyard were of finely twisted linen, a hundred cubits long.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the curtains of the courtyard.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He made
  alternatives:
  - And he made
  - Then he made
  lexicon: HALOT
  rationale: Wayyiqtol of עשה narrates sequential action. 'He made' is natural modern
    English while preserving the simple verbal sense.
- source_word: הֶחָצֵר
  chosen: the courtyard
  alternatives:
  - the court
  - the enclosure
  lexicon: HALOT
  rationale: חָצֵר here refers to the tabernacle's outer court area. 'Courtyard' is
    clearer in modern English than 'court' and avoids ambiguity.
- source_word: לִפְאַת
  chosen: On the ... side
  alternatives:
  - at the edge of
  - for the side of
  lexicon: HALOT
  rationale: The term denotes a side or region. In construction with the directional
    terms, idiomatic English is 'on the ... side.'
- source_word: נֶגֶב תֵּימָנָה
  chosen: the south side, toward the south
  alternatives:
  - the Negev, southward
  - the southern side
  lexicon: HALOT
  rationale: Both terms are south-related; together they intensify/specify direction.
    Rendering both preserves the Hebrew fullness rather than collapsing them into
    a single 'south side.'
- source_word: קַלְעֵי הֶחָצֵר
  chosen: the hangings of the courtyard
  alternatives:
  - the curtains of the courtyard
  - the screens of the courtyard
  lexicon: HALOT
  rationale: קְלָעִים in tabernacle contexts refers to the fabric hangings forming
    the court boundary. 'Hangings' is a standard and suitably precise rendering.
- source_word: שֵׁשׁ מָשְׁזָר
  chosen: of finely twisted linen
  alternatives:
  - of fine twisted linen
  - of fine linen, twisted
  lexicon: HALOT
  rationale: שֵׁשׁ denotes fine linen, and מָשְׁזָר indicates twisted/spun material.
    'Finely twisted linen' communicates both quality and manufacture in readable English.
- source_word: מֵאָה בָּאַמָּה
  chosen: a hundred cubits long
  alternatives:
  - one hundred cubits
  - a hundred cubits
  lexicon: HALOT
  rationale: The phrase gives the measurement. Supplying 'long' makes the English
    complete and reflects the dimensional sense implicit in the Hebrew.
