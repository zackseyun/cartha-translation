id: EXO.38.28
reference: Exodus 38:28
source:
  edition: WLC
  text: וְ/אֶת הָ/אֶ֜לֶף וּ/שְׁבַ֤ע הַ/מֵּאוֹת֙ וַ/חֲמִשָּׁ֣ה וְ/שִׁבְעִ֔ים עָשָׂ֥ה
    וָוִ֖ים לָ/עַמּוּדִ֑ים וְ/צִפָּ֥ה רָאשֵׁי/הֶ֖ם וְ/חִשַּׁ֥ק אֹתָֽ/ם־׃
translation:
  text: And with the one thousand seven hundred and seventy-five he made hooks for
    the pillars, overlaid their tops, and made bands for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and joined them with bands'; the Hebrew verb here refers to furnishing
      the pillars with connecting bands or fillets.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת הָאֶלֶף וּשְׁבַע הַמֵּאוֹת וַחֲמִשָּׁה וְשִׁבְעִים
  chosen: with the one thousand seven hundred and seventy-five
  alternatives:
  - from the one thousand seven hundred and seventy-five
  - and the one thousand seven hundred and seventy-five
  lexicon: HALOT
  rationale: The phrase continues the accounting of the silver from the previous verse;
    the object marker אֵת here is best taken in context as introducing the amount
    used, hence 'with' rather than a bare accusative in English.
- source_word: עָשָׂה
  chosen: he made
  alternatives:
  - he fashioned
  - he used to make
  lexicon: HALOT
  rationale: Standard rendering of עשה in a construction/manufacturing context; simple
    past fits the narrative inventory style.
- source_word: וָוִים
  chosen: hooks
  alternatives:
  - pegs
  - hooks/clasps
  lexicon: HALOT
  rationale: In tabernacle construction contexts וָוִים refers to the metal hooks
    attached to pillars. 'Hooks' is the established and most precise architectural
    sense here.
- source_word: לָעַמּוּדִים
  chosen: for the pillars
  alternatives:
  - for the posts
  - belonging to the pillars
  lexicon: HALOT
  rationale: עַמּוּדִים are structural pillars/posts. 'Pillars' fits the tabernacle
    furnishing context and matches common English architectural usage.
- source_word: וְצִפָּה
  chosen: overlaid
  alternatives:
  - plated
  - covered
  lexicon: HALOT
  rationale: צפה in the piel commonly means to overlay or plate with metal. 'Overlaid'
    preserves the construction terminology without over-specifying the metal, though
    the context implies silver.
- source_word: רָאשֵׁיהֶם
  chosen: their tops
  alternatives:
  - their capitals
  - their heads
  lexicon: HALOT
  rationale: Literally 'their heads,' referring to the upper parts of the pillars.
    'Their tops' is clear modern English; 'capitals' may be too architecturally technical
    for the likely referent.
- source_word: וְחִשַּׁק אֹתָם
  chosen: and made bands for them
  alternatives:
  - and joined them with bands
  - and filleted them
  - and fastened them
  lexicon: HALOT
  rationale: The verb חִשַּׁק in this tabernacle context refers to furnishing the
    pillars with connecting bands/fillets. Because English 'fillets' is archaic/opaque,
    'made bands for them' communicates the likely sense in readable modern English
    while staying close to the source.
