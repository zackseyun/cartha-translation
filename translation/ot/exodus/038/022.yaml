id: EXO.38.22
reference: Exodus 38:22
source:
  edition: WLC
  text: וּ/בְצַלְאֵ֛ל בֶּן אוּרִ֥י בֶן ח֖וּר לְ/מַטֵּ֣ה יְהוּדָ֑ה עָשָׂ֕ה אֵ֛ת כָּל אֲשֶׁר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶֽׁה־־־־־׃
translation:
  text: And Bezalel son of Uri, son of Hur, of the tribe of Judah, made all that Yahweh had commanded Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/בְצַלְאֵל
  chosen: And Bezalel
  alternatives:
  - Now Bezalel
  - Bezalel
  lexicon: HALOT
  rationale: The prefixed conjunction is carried as 'And' to preserve the narrative linkage. The personal name is transliterated per translation philosophy ('translate titles; transliterate names').
- source_word: בֶּן ... בֶן
  chosen: son of ... son of
  alternatives:
  - descendant of ... descendant of
  lexicon: HALOT
  rationale: בן in genealogical sequence is most naturally 'son of.' Although 'descendant of' can sometimes fit broader lineage contexts, here the immediate ancestry formula favors the more formal genealogical wording.
- source_word: לְ/מַטֵּה יְהוּדָה
  chosen: of the tribe of Judah
  alternatives:
  - belonging to the tribe of Judah
  - from the tribe of Judah
  lexicon: HALOT
  rationale: מַטֶּה literally means 'staff/tribe'; in tribal affiliation contexts it denotes 'tribe.' The prefixed ל marks relation/belonging, idiomatically rendered 'of the tribe of Judah.'
- source_word: עָשָׂה
  chosen: made
  alternatives:
  - did
  - fashioned
  lexicon: HALOT
  rationale: עשה is broad ('do/make'). In the tabernacle-construction context, 'made' best fits the concrete workmanship while remaining faithful to the common verb.
- source_word: אֵת כָּל אֲשֶׁר
  chosen: all that
  alternatives:
  - everything that
  - all which
  lexicon: HALOT
  rationale: This combination introduces the totality of what follows. 'All that' is natural modern English and preserves the comprehensiveness of the Hebrew.
- source_word: צִוָּה
  chosen: had commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: 'English past perfect clarifies the sequence: the LORD''s command to Moses preceded Bezalel''s making. The Hebrew perfect itself does not require pluperfect, but English style benefits from it here.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶת מֹשֶׁה
  chosen: Moses
  alternatives:
  - to Moses
  lexicon: HALOT
  rationale: The direct-object marker אֶת is not translated independently. English expresses the sense through 'had commanded Moses,' which idiomatically means 'had commanded [through/to] Moses' in this construction.
