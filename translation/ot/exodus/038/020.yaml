id: EXO.38.20
reference: Exodus 38:20
source:
  edition: WLC
  text: וְֽ/כָל הַ/יְתֵדֹ֞ת לַ/מִּשְׁכָּ֧ן וְ/לֶ/חָצֵ֛ר סָבִ֖יב נְחֹֽשֶׁת־׃ס
translation:
  text: And all the pegs for the tabernacle and for the surrounding courtyard were
    bronze.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'copper.' The Hebrew נְחֹשֶׁת can denote copper or bronze depending on
      context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל
  chosen: And all
  alternatives:
  - And every
  lexicon: HALOT
  rationale: The conjunction ו plus כָּל naturally yields 'and all.' 'Every' is possible,
    but 'all' better fits the collective sense with the plural noun 'pegs.'
- source_word: הַיְתֵדֹת
  chosen: the pegs
  alternatives:
  - the tent pegs
  - the stakes
  lexicon: HALOT
  rationale: יָתֵד commonly denotes pegs or stakes used in securing a structure. 'Pegs'
    is concise and natural here; 'tent pegs' is slightly more explicit but unnecessary
    because the following phrases identify their use.
- source_word: לַמִּשְׁכָּן
  chosen: for the tabernacle
  alternatives:
  - for the dwelling
  - for the tent dwelling
  lexicon: HALOT
  rationale: מִשְׁכָּן is the standard term for the tabernacle in Exodus. 'Tabernacle'
    preserves established referential clarity without distorting the Hebrew sense
    of dwelling-place.
- source_word: וְלֶחָצֵר
  chosen: and for the courtyard
  alternatives:
  - and for the court
  lexicon: HALOT
  rationale: חָצֵר refers to the enclosed court area around the tabernacle. 'Courtyard'
    is clearer in modern English than 'court' while remaining accurate.
- source_word: סָבִיב
  chosen: surrounding
  alternatives:
  - all around
  - around it
  lexicon: HALOT
  rationale: Here סָבִיב modifies the courtyard as encircling the tabernacle complex.
    'Surrounding courtyard' is smooth English and captures the spatial sense. 'All
    around' is possible but less integrated into the sentence.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: In tabernacle materials contexts, נְחֹשֶׁת is conventionally rendered
    'bronze,' reflecting the likely metal/alloy intended in English Bible usage. 'Copper'
    is a possible lexical alternative, but 'bronze' best matches context and translation
    convention here.
