id: EXO.38.7
reference: Exodus 38:7
source:
  edition: WLC
  text: וַ/יָּבֵ֨א אֶת הַ/בַּדִּ֜ים בַּ/טַּבָּעֹ֗ת עַ֚ל צַלְעֹ֣ת הַ/מִּזְבֵּ֔חַ לָ/שֵׂ֥את
    אֹת֖/וֹ בָּ/הֶ֑ם נְב֥וּב לֻחֹ֖ת עָשָׂ֥ה אֹתֽ/וֹ־׃ס
translation:
  text: He put the poles into the rings on the sides of the altar, to carry it with
    them. He made it hollow, with boards.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He brought the poles into the rings.' The Hebrew verb can be rendered
      more literally as 'brought,' but in context it refers to placing the poles into
      position.
    reason: lexical_alternative
  - marker: b
    text: Literally 'hollow, boards.' The phrase likely means the altar was made as
      a hollow structure of boards.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֵא
  chosen: He put
  alternatives:
  - He brought
  - He inserted
  lexicon: HALOT
  rationale: The hiphil of בוא here describes placing the poles into the rings, not
    merely bringing them near. 'Put' is natural English and fits the construction
    with 'into the rings.'
- source_word: הַבַּדִּים
  chosen: the poles
  alternatives:
  - the carrying poles
  - the staves
  lexicon: HALOT
  rationale: בַּדִּים in tabernacle contexts refers to the poles used for carrying
    sacred furnishings. 'Poles' is clear modern English; 'staves' is archaic.
- source_word: בַּטַּבָּעֹת
  chosen: into the rings
  alternatives:
  - in the rings
  lexicon: HALOT
  rationale: The preposition with the noun indicates placement in/into the rings.
    English idiom prefers 'into the rings' after 'put.'
- source_word: עַל צַלְעֹת הַמִּזְבֵּחַ
  chosen: on the sides of the altar
  alternatives:
  - upon the sides of the altar
  - alongside the altar
  lexicon: HALOT
  rationale: צַלְעֹת literally means 'sides' or 'side-parts.' 'On the sides of the
    altar' best reflects the physical location of the rings without overinterpreting.
- source_word: לָשֵׂאת אֹתוֹ בָּהֶם
  chosen: to carry it with them
  alternatives:
  - to bear it with them
  - for carrying it by them
  lexicon: HALOT
  rationale: This infinitive clause expresses purpose. 'Carry' is the natural modern
    equivalent of נשׂא here, and 'with them' clearly refers to the poles.
- source_word: נְבוּב
  chosen: hollow
  alternatives:
  - hollowed out
  lexicon: HALOT
  rationale: נבוב describes the altar as hollow. 'Hollow' is concise and idiomatic
    in English.
- source_word: לֻחֹת
  chosen: with boards
  alternatives:
  - of boards
  - with planks
  lexicon: HALOT
  rationale: The phrase נְבוּב לֻחֹת is elliptical. 'With boards' captures that the
    altar was a hollow structure made in board-like construction, matching the likely
    sense and common tabernacle-building idiom.
- source_word: עָשָׂה אֹתוֹ
  chosen: He made it
  alternatives:
  - he fashioned it
  lexicon: HALOT
  rationale: Straightforward rendering of עשה with object suffix. Repeating 'He made
    it' preserves the Hebrew clause structure.
