id: EXO.38.14
reference: Exodus 38:14
source:
  edition: WLC
  text: קְלָעִ֛ים חֲמֵשׁ עֶשְׂרֵ֥ה אַמָּ֖ה אֶל הַ/כָּתֵ֑ף עַמּוּדֵי/הֶ֣ם שְׁלֹשָׁ֔ה
    וְ/אַדְנֵי/הֶ֖ם שְׁלֹשָֽׁה־־׃
translation:
  text: Fifteen cubits of hangings were on one side; their pillars were three, and
    their bases were three.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their sockets were three.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קְלָעִים
  chosen: hangings
  alternatives:
  - curtains
  - screen-hangings
  lexicon: HALOT
  rationale: In tabernacle-court contexts this noun refers to the linen hangings forming
    the enclosure, not interior drapes in a domestic sense. 'Hangings' is natural
    modern English and fits the architectural setting.
- source_word: חֲמֵשׁ עֶשְׂרֵה אַמָּה
  chosen: fifteen cubits
  alternatives:
  - fifteen cubits long
  - fifteen cubits of length
  lexicon: HALOT
  rationale: The Hebrew gives a measurement phrase without an explicit adjective;
    'fifteen cubits' is the most direct rendering. English readers will understand
    the dimension from context.
- source_word: אֶל הַכָּתֵף
  chosen: on one side
  alternatives:
  - for the side
  - toward the side
  - at the side
  lexicon: HALOT
  rationale: כָּתֵף literally means 'shoulder/side,' and in tabernacle descriptions
    it denotes one side or flank of the gate area. 'On one side' communicates the
    spatial sense idiomatically in English.
- source_word: עַמּוּדֵיהֶם
  chosen: their pillars
  alternatives:
  - its pillars
  - their posts
  lexicon: HALOT
  rationale: The plural suffix naturally refers to the hangings/section just mentioned.
    'Pillars' is the standard architectural term in these tabernacle passages, though
    'posts' is possible.
- source_word: אַדְנֵיהֶם
  chosen: their bases
  alternatives:
  - their sockets
  - their pedestals
  lexicon: HALOT
  rationale: The term denotes the metal bases/sockets in which the pillars stood.
    'Bases' is clear modern English; 'sockets' is more technical and remains a viable
    alternative.
