id: EXO.38.27
reference: Exodus 38:27
source:
  edition: WLC
  text: וַ/יְהִ֗י מְאַת֙ כִּכַּ֣ר הַ/כֶּ֔סֶף לָ/צֶ֗קֶת אֵ֚ת אַדְנֵ֣י הַ/קֹּ֔דֶשׁ וְ/אֵ֖ת
    אַדְנֵ֣י הַ/פָּרֹ֑כֶת מְאַ֧ת אֲדָנִ֛ים לִ/מְאַ֥ת הַ/כִּכָּ֖ר כִּכָּ֥ר לָ/אָֽדֶן׃
translation:
  text: 'The hundred talents of silver were for casting the bases of the sanctuary
    and the bases of the veil: one hundred bases for the hundred talents, a talent
    for each base.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sockets' instead of 'bases' for the tabernacle’s metal foundation pieces.
    reason: lexical_alternative
  - marker: b
    text: '''Veil'' refers to the inner curtain that separated the holy place from
      the most holy place.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי
  chosen: were
  alternatives:
  - became
  - came to be
  lexicon: HALOT
  rationale: In this accounting context, the verb introduces the disposition/use of
    the silver rather than a change of state. English 'were' is the most natural rendering.
- source_word: מְאַת כִּכַּר
  chosen: the hundred talents
  alternatives:
  - one hundred talents
  lexicon: HALOT
  rationale: This construct phrase denotes a measured quantity. 'The hundred talents'
    fits the specific inventory context, while preserving the exact number.
- source_word: הַכֶּסֶף
  chosen: of silver
  alternatives:
  - the silver
  lexicon: HALOT
  rationale: 'Rendered as ''of silver'' in English to complete the measure phrase
    naturally: ''hundred talents of silver.'''
- source_word: לָצֶקֶת
  chosen: for casting
  alternatives:
  - to cast
  - for pouring
  lexicon: HALOT
  rationale: The infinitive expresses purpose. In metalwork context, יצק refers to
    casting metal objects, not merely pouring.
- source_word: אַדְנֵי
  chosen: bases
  alternatives:
  - sockets
  - pedestals
  lexicon: HALOT
  rationale: The term refers to the metal foundation pieces under the tabernacle frames
    and veil pillars. 'Bases' is clear modern English; 'sockets' is traditional but
    less immediately transparent.
- source_word: הַקֹּדֶשׁ
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the holy place/holy area
  lexicon: HALOT
  rationale: Here it refers broadly to the tabernacle structure in contrast with the
    veil, not specifically the inner sanctum. 'Sanctuary' best captures the sacred
    structure as a whole in this construction.
- source_word: הַפָּרֹכֶת
  chosen: the veil
  alternatives:
  - the curtain
  lexicon: HALOT
  rationale: פָּרֹכֶת is the inner dividing veil of the tabernacle. 'Veil' preserves
    the cultic specificity better than the more generic 'curtain'.
- source_word: מְאַת אֲדָנִים
  chosen: one hundred bases
  alternatives:
  - a hundred bases
  lexicon: HALOT
  rationale: Repeats the counted total of the cast foundation pieces; rendered straightforwardly.
- source_word: לִמְאַת הַכִּכָּר
  chosen: for the hundred talents
  alternatives:
  - from the hundred talents
  - corresponding to the hundred talents
  lexicon: HALOT
  rationale: 'The preposition marks correspondence/distribution: the one hundred bases
    matched the one hundred talents used.'
- source_word: כִּכָּר לָאָדֶן
  chosen: a talent for each base
  alternatives:
  - a talent per base
  - one talent for a base
  lexicon: HALOT
  rationale: This expresses the distribution ratio. 'For each base' makes the sense
    explicit and idiomatic in English.
