id: EXO.38.19
reference: Exodus 38:19
source:
  edition: WLC
  text: וְ/עַמֻּֽדֵי/הֶם֙ אַרְבָּעָ֔ה וְ/אַדְנֵי/הֶ֥ם אַרְבָּעָ֖ה נְחֹ֑שֶׁת וָוֵי/הֶ֣ם
    כֶּ֔סֶף וְ/צִפּ֧וּי רָאשֵׁי/הֶ֛ם וַ/חֲשֻׁקֵי/הֶ֖ם כָּֽסֶף׃
translation:
  text: Their four pillars and their four bronze bases, their hooks of silver, and
    the overlay of their tops and their bands of silver.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sockets' for 'bases.' The Hebrew term refers to the supporting metal
      pieces at the foot of the pillars.
    reason: lexical_alternative
  - marker: b
    text: Or 'plating of their tops.' The Hebrew is literally 'the overlay of their
      heads/tops.'
    reason: lexical_alternative
  - marker: c
    text: Traditionally 'fillets.' The exact form of these silver elements is uncertain;
      'bands' is a clear modern rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמֻּדֵיהֶם
  chosen: their pillars
  alternatives:
  - their posts
  lexicon: HALOT
  rationale: עַמּוּד commonly denotes a pillar or column. In tabernacle construction
    contexts, 'pillars' is the standard architectural term and fits the repeated usage
    in Exodus.
- source_word: אַדְנֵיהֶם
  chosen: their bases
  alternatives:
  - their sockets
  lexicon: HALOT
  rationale: אֶדֶן in tabernacle descriptions refers to the supporting metal pieces
    at the bottom of pillars. 'Bases' is more natural modern English, while 'sockets'
    is a viable more formal alternative.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: In tabernacle material lists, נְחֹשֶׁת is conventionally rendered 'bronze.'
    While the term can denote copper broadly, 'bronze' best matches established understanding
    of the metalwork in this context.
- source_word: וָוֵיהֶם
  chosen: their hooks
  alternatives:
  - their pegs
  lexicon: HALOT
  rationale: וָו refers to hooks or pegs used in the tabernacle framework. 'Hooks'
    is preferred here because it is the common rendering in the courtyard-pillar descriptions
    and suits attachment hardware.
- source_word: כֶּסֶף
  chosen: silver
  lexicon: HALOT
  rationale: The material term straightforwardly denotes silver here, first modifying
    the hooks and later the bands.
- source_word: צִפּוּי רָאשֵׁיהֶם
  chosen: the overlay of their tops
  alternatives:
  - the plating of their tops
  - the capitals were overlaid
  lexicon: HALOT
  rationale: צִפּוּי denotes an overlay or plating. רָאשֵׁיהֶם literally means 'their
    heads/tops.' Because the Hebrew uses a noun phrase rather than a verbal clause,
    'the overlay of their tops' preserves the construction while remaining intelligible.
- source_word: חֲשֻׁקֵיהֶם
  chosen: their bands
  alternatives:
  - their fillets
  - their connecting rods
  lexicon: HALOT
  rationale: This tabernacle term is difficult and has been rendered traditionally
    as 'fillets.' 'Bands' is a clearer modern equivalent for the silver elements associated
    with the pillars, without over-specifying the exact form.
