id: EXO.38.15
reference: Exodus 38:15
source:
  edition: WLC
  text: וְ/לַ/כָּתֵ֣ף הַ/שֵּׁנִ֗ית מִ/זֶּ֤ה וּ/מִ/זֶּה֙ לְ/שַׁ֣עַר הֶֽ/חָצֵ֔ר קְלָעִ֕ים
    חֲמֵ֥שׁ עֶשְׂרֵ֖ה אַמָּ֑ה עַמֻּדֵי/הֶ֣ם שְׁלֹשָׁ֔ה וְ/אַדְנֵי/הֶ֖ם שְׁלֹשָֽׁה׃
translation:
  text: And for the other side, on this side and on that side of the gate of the courtyard,
    there were hangings of fifteen cubits, their pillars three, and their bases three.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on either side of the gate of the courtyard.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their sockets three' for 'their bases three.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַכָּתֵף ... הַשֵּׁנִית
  chosen: for the other side
  alternatives:
  - for the second side
  - for the other shoulder/side
  lexicon: HALOT
  rationale: כָּתֵף literally denotes 'shoulder/side.' In tabernacle-courtyard descriptions
    it refers to a side section adjoining the gate. 'Other side' is natural English
    and fits the spatial description better than the more literal 'second side.'
- source_word: מִזֶּה וּמִזֶּה
  chosen: on this side and on that side
  alternatives:
  - from here and from there
  - on either side
  lexicon: HALOT
  rationale: The phrase marks the two flanking sides of the gate area. 'On this side
    and on that side' preserves the distributive spatial sense more explicitly than
    the compressed 'on either side.'
- source_word: לְשַׁעַר הֶחָצֵר
  chosen: of the gate of the courtyard
  alternatives:
  - for the gate of the court
  - at the gate of the courtyard
  lexicon: HALOT
  rationale: The lamed here is best taken in relation to the side sections belonging
    to the courtyard gate structure. 'Of the gate of the courtyard' gives clear English
    linkage to the preceding side references.
- source_word: קְלָעִים
  chosen: hangings
  alternatives:
  - curtains
  - screen-hangings
  lexicon: HALOT
  rationale: In tabernacle contexts קְלָעִים refers to the linen hangings forming
    the courtyard enclosure. 'Hangings' is the standard, sufficiently precise architectural
    term without implying interior curtains.
- source_word: חֲמֵשׁ עֶשְׂרֵה אַמָּה
  chosen: fifteen cubits
  alternatives:
  - fifteen cubits long
  lexicon: HALOT
  rationale: The measurement is stated directly in the Hebrew. 'Cubits' preserves
    the ancient unit rather than converting it; adding 'long' is interpretive and
    unnecessary.
- source_word: עַמֻּדֵיהֶם שְׁלֹשָׁה
  chosen: their pillars three
  alternatives:
  - with three pillars
  - their posts three
  lexicon: HALOT
  rationale: עַמּוּד commonly means 'pillar' or 'column.' In this construction the
    Hebrew is verbless and inventory-like. The English sentence smooths this as 'their
    pillars three' within a descriptive clause, preserving the tabulated style. 'Pillars'
    is preferable to 'posts' for consistency in tabernacle descriptions.
- source_word: וְאַדְנֵיהֶם שְׁלֹשָׁה
  chosen: and their bases three
  alternatives:
  - and their sockets three
  lexicon: HALOT
  rationale: אֶדֶן in tabernacle construction can be rendered 'base' or 'socket.'
    'Bases' is more broadly understandable in modern English while still fitting the
    structural sense. 'Sockets' remains a viable alternative.
