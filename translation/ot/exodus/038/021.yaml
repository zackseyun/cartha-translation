id: EXO.38.21
reference: Exodus 38:21
source:
  edition: WLC
  text: אֵ֣לֶּה פְקוּדֵ֤י הַ/מִּשְׁכָּן֙ מִשְׁכַּ֣ן הָ/עֵדֻ֔ת אֲשֶׁ֥ר פֻּקַּ֖ד עַל
    פִּ֣י מֹשֶׁ֑ה עֲבֹדַת֙ הַ/לְוִיִּ֔ם בְּ/יַד֙ אִֽיתָמָ֔ר בֶּֽן אַהֲרֹ֖ן הַ/כֹּהֵֽן־־׃
translation:
  text: These are the records of the tabernacle, the tabernacle of the testimony,
    as they were recorded at the command of Moses, the service of the Levites under
    the direction of Ithamar son of Aaron the priest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'inventory' or 'accounts' of the tabernacle; the Hebrew term refers to
      an official reckoning.
    reason: lexical_alternative
  - marker: b
    text: '''The testimony'' likely refers to the covenant testimony, especially the
      tablets placed in the ark.'
    reason: cultural_note
  - marker: c
    text: Literally 'by the hand of Ithamar,' an idiom for agency or supervision.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְקוּדֵי
  chosen: records
  alternatives:
  - inventory
  - accounts
  - numbering
  lexicon: HALOT
  rationale: From פקד in a nominal form referring here to an accounting or reckoning
    of materials for the tabernacle. 'Records' fits the administrative summary context
    better than the more wooden 'numberings' and is more natural than 'accounts' while
    preserving the idea of an official reckoning.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  lexicon: HALOT
  rationale: מִשְׁכָּן is the standard term for the sanctuary structure in Exodus.
    'Tabernacle' is the established and accurate English equivalent in this cultic
    context.
- source_word: מִשְׁכַּן הָעֵדֻת
  chosen: the tabernacle of the testimony
  alternatives:
  - the tabernacle of the covenant document
  - the dwelling of the testimony
  lexicon: HALOT
  rationale: The appositional repetition identifies the tabernacle specifically as
    the one associated with the testimony, likely the covenant tablets/testimony deposited
    there. 'Testimony' preserves the Hebrew term without over-interpreting it as 'covenant'
    in the main text.
- source_word: פֻּקַּד
  chosen: were recorded
  alternatives:
  - was counted
  - was inventoried
  - was appointed
  lexicon: HALOT
  rationale: The passive of פקד here resumes the accounting sense from פְקוּדֵי. Although
    the verb is singular in form, the sense in context is that the tabernacle materials/records
    were officially reckoned. 'Were recorded' gives idiomatic English for the administrative
    action.
- source_word: עַל פִּי מֹשֶׁה
  chosen: at the command of Moses
  alternatives:
  - according to the mouth of Moses
  - according to the command of Moses
  lexicon: HALOT
  rationale: The idiom עַל־פִּי commonly means 'according to the command/word of.'
    'At the command of Moses' is natural English and preserves the authority conveyed
    by the phrase.
- source_word: עֲבֹדַת הַלְוִיִּם
  chosen: the service of the Levites
  alternatives:
  - the work of the Levites
  - the ministry of the Levites
  lexicon: HALOT
  rationale: עֲבֹדָה in tabernacle contexts often denotes assigned service or labor.
    'Service' best captures the cultic and administrative nuance without importing
    later ecclesiastical language.
- source_word: בְּיַד אִיתָמָר
  chosen: under the direction of Ithamar
  alternatives:
  - by the hand of Ithamar
  - under the hand of Ithamar
  - through Ithamar
  lexicon: HALOT
  rationale: ביד literally 'by the hand of' often denotes agency or supervision. Here
    it indicates oversight of the Levites' service. 'Under the direction of' communicates
    that supervisory sense clearly.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: A straightforward rendering of the title identifying Aaron. The definite
    article is retained in English as part of the appositional identification 'Aaron
    the priest.'
