id: EXO.38.23
reference: Exodus 38:23
source:
  edition: WLC
  text: וְ/אִתּ֗/וֹ אָהֳלִיאָ֞ב בֶּן אֲחִיסָמָ֛ךְ לְ/מַטֵּה דָ֖ן חָרָ֣שׁ וְ/חֹשֵׁ֑ב
    וְ/רֹקֵ֗ם בַּ/תְּכֵ֨לֶת֙ וּ/בָֽ/אַרְגָּמָ֔ן וּ/בְ/תוֹלַ֥עַת הַ/שָּׁנִ֖י וּ/בַ/שֵּֽׁשׁ־־׃ס
translation:
  text: And with him was Oholiab son of Ahisamach, of the tribe of Dan, an engraver,
    a designer, and an embroiderer in the blue, and in the purple, and in scarlet
    yarn, and in fine linen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Aholiab.' English transliterations of this Hebrew name vary.
    reason: lexical_alternative
  - marker: b
    text: '''Scarlet yarn'' renders a Hebrew expression for scarlet-dyed textile material;
      alternatively, simply ''scarlet.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִתּוֹ
  chosen: And with him was
  alternatives:
  - And with him
  - And with him was also
  lexicon: HALOT
  rationale: The prepositional phrase introduces Oholiab as accompanying Bezalel from
    the previous verse. Supplying 'was' is natural English and reflects the verbless
    Hebrew construction.
- source_word: אָהֳלִיאָב
  chosen: Oholiab
  alternatives:
  - Aholiab
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name; names are transliterated
    rather than translated.
- source_word: בֶּן אֲחִיסָמָךְ
  chosen: son of Ahisamach
  lexicon: HALOT
  rationale: Straightforward patronymic construction; retained formally.
- source_word: לְמַטֵּה דָן
  chosen: of the tribe of Dan
  alternatives:
  - for the tribe of Dan
  - belonging to the tribe of Dan
  lexicon: HALOT
  rationale: The phrase identifies tribal affiliation. 'Of the tribe of Dan' is idiomatic
    English and preserves the genealogical sense.
- source_word: חָרָשׁ
  chosen: an engraver
  alternatives:
  - a craftsman
  - an artisan
  lexicon: HALOT
  rationale: In this craft context, the term denotes a skilled worker. 'Engraver'
    fits the artisan list and preserves a more specific sense than the broader 'craftsman,'
    while still sounding natural in English.
- source_word: וְחֹשֵׁב
  chosen: a designer
  alternatives:
  - a skillful designer
  - a weaver of designs
  - an artistic worker
  lexicon: HALOT
  rationale: This participle often refers to devising artistic patterns, especially
    for tabernacle textiles. 'Designer' captures the conceptual and artistic aspect
    without overloading the English.
- source_word: וְרֹקֵם
  chosen: an embroiderer
  alternatives:
  - a variegator
  - a needleworker
  lexicon: HALOT
  rationale: The term denotes embroidery work in fabrics. 'Embroiderer' is the clearest
    modern equivalent.
- source_word: בַּתְּכֵלֶת
  chosen: in the blue
  alternatives:
  - in blue yarn
  - in blue material
  lexicon: HALOT
  rationale: The phrase names the material/color sphere in which he worked. 'The blue'
    mirrors the Hebrew article and tabernacle-color terminology, though the exact
    material is not repeated explicitly here.
- source_word: וּבָאַרְגָּמָן
  chosen: and in the purple
  alternatives:
  - and in purple yarn
  - and in purple material
  lexicon: HALOT
  rationale: Kept parallel with the preceding color term and consistent with tabernacle
    textile language.
- source_word: וּבְתוֹלַעַת הַשָּׁנִי
  chosen: and in scarlet yarn
  alternatives:
  - and in scarlet
  - and in crimson yarn
  lexicon: HALOT
  rationale: This expression refers to scarlet-dyed material, commonly rendered 'scarlet
    yarn' in tabernacle contexts. Adding 'yarn' makes the textile sense explicit in
    natural English.
- source_word: וּבַשֵּׁשׁ
  chosen: and in fine linen
  alternatives:
  - and in linen
  - and in byssus
  lexicon: HALOT
  rationale: שֵׁשׁ denotes fine linen in priestly/tabernacle contexts. 'Fine linen'
    is the standard clear rendering.
