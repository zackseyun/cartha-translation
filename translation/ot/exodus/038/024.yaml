id: EXO.38.24
reference: Exodus 38:24
source:
  edition: WLC
  text: כָּל הַ/זָּהָ֗ב הֶֽ/עָשׂוּי֙ לַ/מְּלָאכָ֔ה בְּ/כֹ֖ל מְלֶ֣אכֶת הַ/קֹּ֑דֶשׁ
    וַ/יְהִ֣י זְהַ֣ב הַ/תְּנוּפָ֗ה תֵּ֤שַׁע וְ/עֶשְׂרִים֙ כִּכָּ֔ר וּ/שְׁבַ֨ע מֵא֧וֹת
    וּ/שְׁלֹשִׁ֛ים שֶׁ֖קֶל בְּ/שֶׁ֥קֶל הַ/קֹּֽדֶשׁ־׀׃
translation:
  text: All the gold that was used for the work, in all the work of the sanctuary—the
    gold of the wave offering—was twenty-nine talents and seven hundred thirty shekels,
    by the sanctuary shekel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'according to the sanctuary shekel.'
    reason: lexical_alternative
  - marker: b
    text: '''Wave offering'' is the standard rendering of the Hebrew term for an offering
      presented before the LORD with a ritual motion.'
    reason: cultural_note
lexical_decisions:
- source_word: הֶעָשׂוּי
  chosen: that was used
  alternatives:
  - that was made
  - that was worked
  lexicon: HALOT
  rationale: The passive participle of עשה here modifies the gold in relation to the
    construction project. 'Used' best captures that this gold was employed in the
    making of the tabernacle items, whereas 'made' could sound as if the gold itself
    was manufactured.
- source_word: לַמְּלָאכָה
  chosen: for the work
  alternatives:
  - for the workmanship
  - for the service
  lexicon: HALOT
  rationale: מְלָאכָה in this tabernacle-accounting context refers to the skilled
    work/project. 'For the work' is natural modern English and fits the construction
    context.
- source_word: בְּכֹל מְלֶאכֶת הַקֹּדֶשׁ
  chosen: in all the work of the sanctuary
  alternatives:
  - for all the work of the holy place
  - in all the holy work
  lexicon: HALOT
  rationale: The phrase summarizes the totality of the sacred construction. Rendering
    הַקֹּדֶשׁ as 'the sanctuary' is clearer in context than the more abstract 'the
    holy place' or 'the holy thing/work.'
- source_word: זְהַב הַתְּנוּפָה
  chosen: the gold of the wave offering
  alternatives:
  - the gold of the presentation offering
  - the gold that was waved
  lexicon: HALOT
  rationale: תְּנוּפָה is the standard term for a 'wave offering.' Although the exact
    ritual motion may not be foregrounded in English, retaining the established cultic
    term preserves the connection to Israel's sacrificial vocabulary.
- source_word: תֵּשַׁע וְעֶשְׂרִים כִּכָּר
  chosen: twenty-nine talents
  alternatives:
  - nine and twenty talents
  lexicon: HALOT
  rationale: The Hebrew number order is idiomatically rendered in standard modern
    English as 'twenty-nine talents.'
- source_word: וּשְׁבַע מֵאוֹת וּשְׁלֹשִׁים שֶׁקֶל
  chosen: and seven hundred thirty shekels
  alternatives:
  - and seven hundred and thirty shekels
  lexicon: HALOT
  rationale: A straightforward rendering of the numeral phrase in readable modern
    English. The omission of 'and' within the hundreds follows contemporary style
    without loss of meaning.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  chosen: by the sanctuary shekel
  alternatives:
  - according to the sanctuary shekel
  - by the holy shekel
  lexicon: HALOT
  rationale: This phrase specifies the standard of weight used. 'By the sanctuary
    shekel' is concise and idiomatic, though 'according to the sanctuary shekel' is
    also possible.
