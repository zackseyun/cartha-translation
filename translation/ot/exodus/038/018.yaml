id: EXO.38.18
reference: Exodus 38:18
source:
  edition: WLC
  text: וּ/מָסַ֞ךְ שַׁ֤עַר הֶ/חָצֵר֙ מַעֲשֵׂ֣ה רֹקֵ֔ם תְּכֵ֧לֶת וְ/אַרְגָּמָ֛ן וְ/תוֹלַ֥עַת
    שָׁנִ֖י וְ/שֵׁ֣שׁ מָשְׁזָ֑ר וְ/עֶשְׂרִ֤ים אַמָּה֙ אֹ֔רֶךְ וְ/קוֹמָ֤ה בְ/רֹ֨חַב֙
    חָמֵ֣שׁ אַמּ֔וֹת לְ/עֻמַּ֖ת קַלְעֵ֥י הֶ/חָצֵֽר׃
translation:
  text: And the screen for the gate of the courtyard was the work of an embroiderer,
    in blue and purple and scarlet yarn, and fine twined linen, twenty cubits long,
    and five cubits high in width, corresponding to the hangings of the courtyard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'curtain for the entrance of the courtyard.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'blue and purple and scarlet'; 'yarn' is supplied in English because
      the list names textile materials/colors used in the woven screen.
    reason: lexical_alternative
  - marker: c
    text: Or 'five cubits in height, by width,' a Hebrew dimensional expression likely
      indicating that the screen matched the height of the courtyard hangings.
    reason: alternative_reading
lexical_decisions:
- source_word: מָסַךְ
  chosen: screen
  alternatives:
  - curtain
  - covering
  lexicon: HALOT
  rationale: In tabernacle/courtyard contexts this term denotes a textile barrier
    or hanging that serves as an entrance covering. 'Screen' is a clear modern English
    rendering that distinguishes it from the surrounding 'hangings' while preserving
    its function.
- source_word: שַׁעַר
  chosen: gate
  alternatives:
  - entrance
  lexicon: HALOT
  rationale: The word commonly means 'gate' or gate-area. Here it refers to the gateway
    of the courtyard. 'Gate' is retained because the phrase is conventional and spatially
    precise.
- source_word: חָצֵר
  chosen: courtyard
  alternatives:
  - court
  lexicon: HALOT
  rationale: '''Courtyard'' is more transparent in modern English than ''court'' and
    accurately describes the enclosed tabernacle area.'
- source_word: מַעֲשֵׂה רֹקֵם
  chosen: the work of an embroiderer
  alternatives:
  - embroidered work
  - work of a weaver in colors
  lexicon: HALOT
  rationale: The construction indicates craftsmanship by a skilled textile worker
    producing patterned needlework or colored weaving. 'The work of an embroiderer'
    preserves the artisan expression and matches the likely sense better than a flattened
    adjective alone.
- source_word: תְּכֵלֶת
  chosen: blue
  alternatives:
  - blue yarn
  - blue-purple
  lexicon: HALOT
  rationale: The term denotes a prestigious blue-dyed material. English versions commonly
    render the color term simply as 'blue'; 'yarn' is supplied later with the coordinated
    list for natural English.
- source_word: אַרְגָּמָן
  chosen: purple
  alternatives:
  - purple yarn
  - reddish-purple
  lexicon: HALOT
  rationale: Standard color rendering in tabernacle textile lists. The material sense
    is implicit in the coordinated series.
- source_word: תּוֹלַעַת שָׁנִי
  chosen: scarlet yarn
  alternatives:
  - scarlet
  - crimson yarn
  lexicon: HALOT
  rationale: This expression refers to scarlet-dyed material, historically associated
    with worm-derived dye. 'Scarlet yarn' communicates both color and textile sense
    in idiomatic English.
- source_word: שֵׁשׁ מָשְׁזָר
  chosen: fine twined linen
  alternatives:
  - finely twisted linen
  - fine linen, twisted
  lexicon: HALOT
  rationale: A standard tabernacle textile phrase. 'Fine twined linen' is a well-established
    and accurate rendering for high-quality spun linen.
- source_word: עֶשְׂרִים אַמָּה אֹרֶךְ
  chosen: twenty cubits long
  alternatives:
  - a length of twenty cubits
  lexicon: HALOT
  rationale: This is a straightforward dimensional phrase; 'cubits' preserves the
    ancient unit rather than approximating it.
- source_word: קוֹמָה
  chosen: high
  alternatives:
  - height
  lexicon: HALOT
  rationale: The noun means 'height.' In English dimension formulas, 'five cubits
    high' is more natural than 'a height of five cubits' while preserving the sense.
- source_word: בְּרֹחַב
  chosen: in width
  alternatives:
  - broad
  - wide
  lexicon: HALOT
  rationale: The prepositional phrase qualifies the height measurement. Rendering
    it 'in width' preserves the Hebrew wording, which likely indicates the vertical
    measure as measured across the breadth of the hanging.
- source_word: לְעֻמַּת
  chosen: corresponding to
  alternatives:
  - matching
  - opposite
  - in proportion to
  lexicon: HALOT
  rationale: The term indicates correspondence or alignment. 'Corresponding to' best
    captures the comparative relation to the courtyard hangings.
- source_word: קַלְעֵי הֶחָצֵר
  chosen: the hangings of the courtyard
  alternatives:
  - the curtains of the courtyard
  lexicon: HALOT
  rationale: This term refers to the linen hangings forming the courtyard enclosure.
    'Hangings' avoids confusion with interior curtains and matches the architectural
    setting.
