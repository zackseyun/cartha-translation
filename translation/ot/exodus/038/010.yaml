id: EXO.38.10
reference: Exodus 38:10
source:
  edition: WLC
  text: עַמּוּדֵי/הֶ֣ם עֶשְׂרִ֔ים וְ/אַדְנֵי/הֶ֥ם עֶשְׂרִ֖ים נְחֹ֑שֶׁת וָוֵ֧י הָ/עַמֻּדִ֛ים
    וַ/חֲשֻׁקֵי/הֶ֖ם כָּֽסֶף׃
translation:
  text: Their pillars were twenty, and their twenty bases were bronze; the hooks of
    the pillars and their bands were silver.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their twenty sockets were bronze.'
    reason: lexical_alternative
  - marker: b
    text: Traditionally 'their fillets were silver.' The Hebrew likely refers to bands
      or connecting elements associated with the pillars.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמּוּדֵיהֶם
  chosen: their pillars
  alternatives:
  - its pillars
  lexicon: HALOT
  rationale: עַמּוּדִים denotes structural pillars/posts. The 3mp suffix refers to
    the hangings/side just described in context; English idiom naturally renders the
    suffix as 'their.' 'Pillars' is the standard architectural term here.
- source_word: עֶשְׂרִים
  chosen: twenty
  rationale: Cardinal number, straightforwardly rendered 'twenty' in both occurrences.
- source_word: אַדְנֵיהֶם
  chosen: their twenty bases
  alternatives:
  - their twenty sockets
  lexicon: HALOT
  rationale: אֶדֶן in tabernacle contexts refers to a base/socket for a pillar or
    frame. 'Bases' is clearer in contemporary English, while 'sockets' is a viable
    more formal alternative.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: נְחֹשֶׁת can denote copper/bronze. In tabernacle-furnishing tradition
    and likely ancient alloy usage, 'bronze' is the conventional and contextually
    appropriate rendering.
- source_word: וָוֵי
  chosen: the hooks
  alternatives:
  - pegs
  - capital-hooks
  lexicon: HALOT
  rationale: וָוִים are the hooks or connecting fixtures on the pillars used with
    the hangings. 'Hooks' best matches the likely function and established tabernacle
    terminology.
- source_word: הָעַמֻּדִים
  chosen: of the pillars
  lexicon: HALOT
  rationale: Construct relationship with וָוֵי indicates the hooks belong to the pillars.
- source_word: חֲשֻׁקֵיהֶם
  chosen: their bands
  alternatives:
  - their fillets
  - their connecting rods
  lexicon: HALOT
  rationale: This tabernacle term is traditionally rendered 'fillets,' but that is
    archaic and opaque. The word refers to attached bands/connecting elements associated
    with the pillars. 'Bands' preserves the physical sense in readable modern English.
- source_word: כָּסֶף
  chosen: silver
  lexicon: HALOT
  rationale: Material term, straightforwardly rendered 'silver.'
