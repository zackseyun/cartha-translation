id: EXO.38.17
reference: Exodus 38:17
source:
  edition: WLC
  text: וְ/הָ/אֲדָנִ֣ים לָֽ/עַמֻּדִים֮ נְחֹשֶׁת֒ וָוֵ֨י הָֽ/עַמּוּדִ֜ים וַ/חֲשׁוּקֵי/הֶם֙
    כֶּ֔סֶף וְ/צִפּ֥וּי רָאשֵׁי/הֶ֖ם כָּ֑סֶף וְ/הֵם֙ מְחֻשָּׁקִ֣ים כֶּ֔סֶף כֹּ֖ל עַמֻּדֵ֥י
    הֶ/חָצֵֽר׃
translation:
  text: The bases for the pillars were bronze, but the hooks of the pillars and their
    bands were silver, and the overlay of their tops was silver; all the pillars of
    the courtyard were banded with silver.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sockets' for 'bases.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term rendered 'bands' is traditionally translated 'fillets';
      the exact architectural feature is uncertain, but it refers to silver fittings
      associated with the pillars.
    reason: cultural_note
lexical_decisions:
- source_word: אֲדָנִים
  chosen: bases
  alternatives:
  - sockets
  - pedestals
  lexicon: HALOT
  rationale: In tabernacle construction contexts, אֲדָנִים refers to the supporting
    bases or sockets for structural elements. 'Bases' is clear modern English; 'sockets'
    is traditional and possible, but 'bases' is more broadly understandable.
- source_word: עַמֻּדִים
  chosen: pillars
  alternatives:
  - posts
  - columns
  lexicon: HALOT
  rationale: The term denotes upright structural supports. 'Pillars' fits the formal
    architectural setting and matches common tabernacle terminology better than the
    more ordinary 'posts'.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: In tabernacle descriptions this metal is conventionally and plausibly
    rendered 'bronze.' 'Copper' is possible lexically, but 'bronze' better reflects
    standard English Bible usage for the alloy/metallurgical context.
- source_word: וָוֵי
  chosen: hooks
  alternatives:
  - pegs
  - pins
  lexicon: HALOT
  rationale: The noun refers to the hooks attached to the pillars in the courtyard
    structure. 'Hooks' is the most natural rendering in this construction context.
- source_word: חֲשׁוּקֵיהֶם
  chosen: their bands
  alternatives:
  - their fillets
  - their connecting rods
  - their rings
  lexicon: HALOT
  rationale: The exact architectural feature is somewhat uncertain, but it refers
    to the silver elements associated with the pillars. 'Bands' is a readable rendering
    that conveys encircling or binding ornament/support without over-specifying. Traditional
    'fillets' is archaic and unclear for modern readers.
- source_word: צִפּוּי
  chosen: overlay
  alternatives:
  - plating
  - covering
  lexicon: HALOT
  rationale: The noun denotes a covering layer of metal. 'Overlay' preserves the sense
    of a surface covering in a concise, natural way.
- source_word: רָאשֵׁיהֶם
  chosen: their tops
  alternatives:
  - their capitals
  - their heads
  lexicon: HALOT
  rationale: Literally 'their heads,' referring to the upper part of the pillars.
    'Their tops' is clear and natural; 'capitals' may be too architecturally technical
    for the likely referent.
- source_word: מְחֻשָּׁקִים
  chosen: banded
  alternatives:
  - encircled
  - fitted with bands
  - filleted
  lexicon: HALOT
  rationale: This passive participle is cognate with חֲשׁוּקֵיהֶם and indicates that
    the courtyard pillars had silver bands or encircling elements. 'Banded' preserves
    the lexical connection and reads naturally in English.
- source_word: חָצֵר
  chosen: courtyard
  alternatives:
  - court
  - enclosure
  lexicon: HALOT
  rationale: In tabernacle context, חָצֵר denotes the enclosed outer court. 'Courtyard'
    is clear modern English and suitably concrete.
