id: EXO.38.8
reference: Exodus 38:8
source:
  edition: WLC
  text: וַ/יַּ֗עַשׂ אֵ֚ת הַ/כִּיּ֣וֹר נְחֹ֔שֶׁת וְ/אֵ֖ת כַּנּ֣/וֹ נְחֹ֑שֶׁת בְּ/מַרְאֹת֙
    הַ/צֹּ֣בְאֹ֔ת אֲשֶׁ֣ר צָֽבְא֔וּ פֶּ֖תַח אֹ֥הֶל מוֹעֵֽד׃ס
translation:
  text: He made the basin of bronze and its stand of bronze from the mirrors of the
    women who served at the entrance to the tent of meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the women who assembled at the entrance to the tent of meeting.' The
      Hebrew may emphasize organized gathering as well as service.
    reason: alternative_reading
  - marker: b
    text: Or 'from the polished metal mirrors.' Ancient mirrors were typically made
      of polished bronze rather than glass.
    reason: cultural_note
lexical_decisions:
- source_word: כִּיּוֹר
  chosen: basin
  alternatives:
  - laver
  lexicon: HALOT
  rationale: Refers to the large washbasin used in tabernacle service. 'Basin' is
    clear modern English; 'laver' is traditional but archaic.
- source_word: כַּן
  chosen: stand
  alternatives:
  - base
  lexicon: HALOT
  rationale: Denotes the support or pedestal for the basin. 'Stand' is natural English
    and fits the physical object.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: In tabernacle contexts this term is conventionally and plausibly rendered
    'bronze' for the metal used in cultic furnishings, though the Hebrew can denote
    copper/bronze more broadly.
- source_word: בְּמַרְאֹת
  chosen: from the mirrors
  alternatives:
  - with the mirrors
  - from the polished metal mirrors
  lexicon: HALOT
  rationale: 'The preposition beth here is best taken as indicating material/source:
    the basin and stand were made from the mirrors. ''Mirrors'' reflects the noun''s
    common sense in context.'
- source_word: הַצֹּבְאֹת אֲשֶׁר צָבְאוּ
  chosen: the women who served
  alternatives:
  - the women who assembled
  - the women who ministered
  lexicon: HALOT
  rationale: The participle plus finite verb from צבא conveys organized gathering/service.
    In this sanctuary context, 'served' best captures purposeful attendance without
    overstating formal priestly ministry; 'assembled' is possible but weaker contextually.
- source_word: פֶּתַח אֹהֶל מוֹעֵד
  chosen: at the entrance to the tent of meeting
  alternatives:
  - at the doorway of the tent of meeting
  lexicon: HALOT
  rationale: Standard rendering for the tabernacle phrase. 'Entrance' is slightly
    more idiomatic in modern English than 'doorway' while preserving the spatial sense.
- source_word: וַיַּעַשׂ
  chosen: He made
  alternatives:
  - And he made
  lexicon: HALOT
  rationale: Simple past is sufficient in English narrative. The subject is singular
    and contextually refers to the craftsman(s) under Bezalel's direction; English
    need not preserve the Hebrew vav-consecutive with 'And'.
