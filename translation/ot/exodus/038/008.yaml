theological_decisions:
- issue: Identity and role of הַצֹּבְאֹת אֲשֶׁר צָבְאוּ
  chosen_reading: women who served at the entrance to the tent of meeting
  alternative_readings:
  - women who assembled at the entrance to the tent of meeting
  - women who ministered at the entrance to the tent of meeting
  rationale: The Hebrew root צבא can denote mustering/assembling for service. The
    verse does not specify priestly office or liturgical function in detail, so 'served'
    preserves purposeful activity without importing a more developed doctrine of female
    cultic ministry than the text itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
