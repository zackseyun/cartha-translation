id: EXO.38.11
reference: Exodus 38:11
source:
  edition: WLC
  text: וְ/לִ/פְאַ֤ת צָפוֹן֙ מֵאָ֣ה בָֽ/אַמָּ֔ה עַמּוּדֵי/הֶ֣ם עֶשְׂרִ֔ים וְ/אַדְנֵי/הֶ֥ם
    עֶשְׂרִ֖ים נְחֹ֑שֶׁת וָוֵ֧י הָֽ/עַמּוּדִ֛ים וַ/חֲשֻׁקֵי/הֶ֖ם כָּֽסֶף׃
translation:
  text: And for the north side there were a hundred cubits, their twenty pillars and
    their twenty bases of bronze, and the hooks of the pillars and their bands were
    of silver.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their fillets were of silver.' The Hebrew term refers to silver architectural
      fittings on the pillars; the precise form is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְאַת צָפוֹן
  chosen: for the north side
  alternatives:
  - on the north side
  - for the northern side
  lexicon: HALOT
  rationale: פאה denotes a side, edge, or region; with the directional noun צפון,
    the phrase refers to the north side of the court. 'For the north side' fits the
    tabernacle inventory style and parallels nearby verses.
- source_word: מֵאָה בָאַמָּה
  chosen: a hundred cubits
  alternatives:
  - one hundred cubits
  lexicon: HALOT
  rationale: The phrase gives the measured length. 'A hundred cubits' is natural modern
    English while remaining formally close.
- source_word: עַמּוּדֵיהֶם
  chosen: their twenty pillars
  alternatives:
  - its twenty pillars
  lexicon: HALOT
  rationale: עַמּוּדִים are structural pillars/posts. 'Pillars' is the conventional
    and accurate rendering in this tabernacle context. The pronominal suffix is rendered
    'their' in agreement with the Hebrew plural construction used throughout the inventory.
- source_word: אַדְנֵיהֶם
  chosen: their twenty bases
  alternatives:
  - their twenty sockets
  lexicon: HALOT
  rationale: אדן in tabernacle descriptions refers to the supporting bases/sockets
    for pillars. 'Bases' is clearer for modern readers; 'sockets' is a viable more
    technical alternative.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: In tabernacle materials, נְחֹשֶׁת commonly denotes bronze as the standard
    English rendering, though the ancient alloy composition can overlap with copper.
    'Bronze' best matches established material terminology here.
- source_word: וָוֵי הָעַמּוּדִים
  chosen: the hooks of the pillars
  alternatives:
  - the pegs of the pillars
  lexicon: HALOT
  rationale: וָוִים in tabernacle contexts are hooks attached to pillars, not tent
    pegs. 'Hooks' is the most likely sense in this construction and matches Exodus
    usage elsewhere.
- source_word: חֲשֻׁקֵיהֶם
  chosen: their bands
  alternatives:
  - their fillets
  - their connecting rods
  lexicon: HALOT
  rationale: This term in tabernacle descriptions refers to the silver elements associated
    with the tops of the pillars, traditionally 'fillets.' Because 'fillets' is archaic
    for modern readers, 'bands' preserves the idea of encircling or binding ornament/support
    in readable English. The exact architectural referent is somewhat uncertain, so
    an alternative is preserved in a footnote.
- source_word: כָּסֶף
  chosen: silver
  lexicon: HALOT
  rationale: Standard material term; here it predicates the composition of both the
    hooks and the bands.
