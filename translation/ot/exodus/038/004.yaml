id: EXO.38.4
reference: Exodus 38:4
source:
  edition: WLC
  text: וַ/יַּ֤עַשׂ לַ/מִּזְבֵּ֨חַ֙ מִכְבָּ֔ר מַעֲשֵׂ֖ה רֶ֣שֶׁת נְחֹ֑שֶׁת תַּ֧חַת
    כַּרְכֻּבּ֛/וֹ מִ/לְּ/מַ֖טָּה עַד חֶצְיֽ/וֹ־׃
translation:
  text: He made for the altar a grating, a network of bronze, under its ledge, beneath,
    reaching halfway up it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a grate, the work of a net, of bronze.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term for the altar's structural feature may also be rendered
      'rim,' 'molding,' or 'surround.'
    reason: lexical_alternative
  - marker: c
    text: Or 'from below to its middle.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He made
  alternatives:
  - And he made
  - Then he made
  lexicon: HALOT
  rationale: Wayyiqtol of עשה in narrative commonly advances the sequence. 'He made'
    is natural modern English; the conjunction nuance can be absorbed without forcing
    'and' at the start.
- source_word: לַמִּזְבֵּחַ
  chosen: for the altar
  alternatives:
  - for the altar itself
  - on the altar
  lexicon: HALOT
  rationale: The preposition ל marks the object for which the item was made. 'For
    the altar' best reflects purpose/destination rather than location.
- source_word: מִכְבָּר
  chosen: a grating
  alternatives:
  - a grate
  - a lattice
  lexicon: HALOT
  rationale: מִכְבָּר denotes a grating or grate-like structure. 'Grating' sounds
    slightly more descriptive and fits the following construct phrase.
- source_word: מַעֲשֵׂה רֶשֶׁת
  chosen: a network
  alternatives:
  - network work
  - meshwork
  - latticework
  - work of a net
  lexicon: HALOT
  rationale: The phrase literally means 'work of a net/network.' 'A network' gives
    clear modern English while preserving the idea of net-like construction. The more
    literal 'work of a net' is possible but less natural.
- source_word: נְחֹשֶׁת
  chosen: of bronze
  alternatives:
  - of copper
  lexicon: HALOT
  rationale: In tabernacle contexts נְחֹשֶׁת is traditionally and plausibly rendered
    'bronze' for the metal used in cultic furnishings. 'Copper' is lexically possible
    but less likely in this construction context.
- source_word: תַּחַת
  chosen: under
  alternatives:
  - beneath
  lexicon: HALOT
  rationale: Straightforward spatial preposition. 'Under' is concise and idiomatic.
- source_word: כַּרְכֻּבּוֹ
  chosen: its ledge
  alternatives:
  - its rim
  - its molding
  - its surround
  lexicon: HALOT
  rationale: כַּרְכֹּב/כַּרְכֻּב refers to the projecting border or ledge of the altar.
    'Ledge' best communicates a structural projection in accessible English. 'Rim'
    is possible but can sound too thin or circular.
- source_word: מִלְּמַטָּה
  chosen: beneath
  alternatives:
  - from below
  - down below
  lexicon: HALOT
  rationale: The compound adverb literally means 'from below/beneath.' Here it clarifies
    the position of the grating relative to the ledge. 'Beneath' is smoother in English
    than a more wooden 'from below.'
- source_word: עַד חֶצְיוֹ
  chosen: reaching halfway up it
  alternatives:
  - up to its middle
  - as far as its halfway point
  - to its middle
  lexicon: HALOT
  rationale: The phrase indicates extent up to the midpoint of the altar structure.
    'Reaching halfway up it' makes the spatial sense explicit in natural English.
