id: EXO.38.30
reference: Exodus 38:30
source:
  edition: WLC
  text: וַ/יַּ֣עַשׂ בָּ֗/הּ אֶת אַדְנֵי֙ פֶּ֚תַח אֹ֣הֶל מוֹעֵ֔ד וְ/אֵת֙ מִזְבַּ֣ח
    הַ/נְּחֹ֔שֶׁת וְ/אֶת מִכְבַּ֥ר הַ/נְּחֹ֖שֶׁת אֲשֶׁר ל֑/וֹ וְ/אֵ֖ת כָּל כְּלֵ֥י
    הַ/מִּזְבֵּֽחַ־־־־׃
translation:
  text: With it he made the bases for the entrance of the tent of meeting, the bronze
    altar, the bronze grating that belonged to it, and all the utensils of the altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “sockets” for the entrance of the tent of meeting.
    reason: lexical_alternative
  - marker: b
    text: Or “the bronze grate” or “the bronze network” that was for it.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: he made
  alternatives:
  - he fashioned
  - he constructed
  lexicon: HALOT
  rationale: Common verb עשה in narrative context; 'made' is the most natural and
    sufficiently formal rendering.
- source_word: בָּהּ
  chosen: With it
  alternatives:
  - from it
  - by it
  lexicon: HALOT
  rationale: Refers back to the bronze just totaled in the previous verse; instrumental
    sense fits the context of manufacturing tabernacle items better than a simple
    locative sense.
- source_word: אַדְנֵי
  chosen: bases
  alternatives:
  - sockets
  - pedestals
  lexicon: HALOT
  rationale: אַדֶן in tabernacle contexts refers to supporting metal bases/sockets.
    'Bases' is clear modern English; 'sockets' is possible but more technical.
- source_word: פֶּתַח אֹהֶל מוֹעֵד
  chosen: the entrance of the tent of meeting
  alternatives:
  - the doorway of the tent of meeting
  - the entrance to the tent of meeting
  lexicon: HALOT
  rationale: פֶּתַח denotes entrance/opening. 'Entrance of the tent of meeting' is
    natural and close to the Hebrew construct chain.
- source_word: מִזְבַּח הַנְּחֹשֶׁת
  chosen: the bronze altar
  alternatives:
  - the altar of bronze
  - the copper altar
  lexicon: HALOT
  rationale: Standard rendering for the altar made of נְחֹשֶׁת. 'Bronze' is conventional
    and contextually appropriate in English Bible translation.
- source_word: מִכְבַּר
  chosen: grating
  alternatives:
  - grate
  - network
  lexicon: HALOT
  rationale: Refers to the lattice/grill associated with the altar. 'Grating' communicates
    an object rather than an abstract pattern and fits altar hardware context.
- source_word: אֲשֶׁר לוֹ
  chosen: that belonged to it
  alternatives:
  - that was for it
  - which was on it
  lexicon: HALOT
  rationale: The relative phrase links the grating to the altar. 'Belonged to it'
    expresses possession/association clearly without over-specifying placement.
- source_word: כָּל כְּלֵי הַמִּזְבֵּחַ
  chosen: all the utensils of the altar
  alternatives:
  - all the implements of the altar
  - all the vessels of the altar
  lexicon: HALOT
  rationale: כְּלִים is a broad term for articles/tools. 'Utensils' is idiomatic for
    cultic equipment and readable in modern English.
