id: EXO.38.25
reference: Exodus 38:25
source:
  edition: WLC
  text: וְ/כֶ֛סֶף פְּקוּדֵ֥י הָ/עֵדָ֖ה מְאַ֣ת כִּכָּ֑ר וְ/אֶלֶף֩ וּ/שְׁבַ֨ע מֵא֜וֹת
    וַ/חֲמִשָּׁ֧ה וְ/שִׁבְעִ֛ים שֶׁ֖קֶל בְּ/שֶׁ֥קֶל הַ/קֹּֽדֶשׁ׃
translation:
  text: And the silver from those counted of the congregation was one hundred talents
    and one thousand seven hundred seventy-five shekels, by the sanctuary shekel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the silver of those who were counted from the assembly.'
    reason: lexical_alternative
  - marker: b
    text: That is, measured according to the sanctuary standard weight.
    reason: cultural_note
lexical_decisions:
- source_word: כֶסֶף
  chosen: silver
  alternatives:
  - money
  lexicon: HALOT
  rationale: In this tabulation context the referent is the metal collected, not money
    in the abstract, so 'silver' is the plain sense.
- source_word: פְּקוּדֵי
  chosen: those counted
  alternatives:
  - the counted ones
  - the mustered
  lexicon: HALOT
  rationale: The passive/administrative sense refers to persons registered or counted
    in the census. 'Those counted' is natural English and preserves the connection
    to the census context.
- source_word: הָעֵדָה
  chosen: the congregation
  alternatives:
  - the community
  - the assembly
  lexicon: HALOT
  rationale: In Exodus this term commonly denotes the assembled covenant people. 'Congregation'
    fits the formal register of the census/accounting context.
- source_word: מְאַת כִּכָּר
  chosen: one hundred talents
  lexicon: HALOT
  rationale: A straightforward rendering of the weight total; 'talents' is the conventional
    English equivalent for the ancient large weight unit ככר.
- source_word: וְאֶלֶף וּשְׁבַע מֵאוֹת וַחֲמִשָּׁה וְשִׁבְעִים שֶׁקֶל
  chosen: and one thousand seven hundred seventy-five shekels
  lexicon: HALOT
  rationale: The Hebrew gives an additive number sequence totaling 1,775 shekels.
    Rendering the full number in standard English is clearest.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  chosen: by the sanctuary shekel
  alternatives:
  - according to the sanctuary shekel
  - by the holy shekel
  lexicon: HALOT
  rationale: This phrase specifies the standard of weight used. 'Sanctuary shekel'
    is the established and clearest idiom in English; 'by' conveys measurement according
    to that standard.
