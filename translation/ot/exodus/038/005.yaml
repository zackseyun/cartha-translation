id: EXO.38.5
reference: Exodus 38:5
source:
  edition: WLC
  text: וַ/יִּצֹ֞ק אַרְבַּ֧ע טַבָּעֹ֛ת בְּ/אַרְבַּ֥ע הַ/קְּצָוֺ֖ת לְ/מִכְבַּ֣ר הַ/נְּחֹ֑שֶׁת
    בָּתִּ֖ים לַ/בַּדִּֽים׃
translation:
  text: He cast four rings on the four corners of the bronze grating as holders for
    the poles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the four ends' of the bronze grating.
    reason: lexical_alternative
  - marker: b
    text: Literally 'houses' for the poles, that is, receptacles or fittings to receive
      them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצֹק
  chosen: He cast
  alternatives:
  - he poured
  - he cast in metal
  lexicon: HALOT
  rationale: The verb יצק commonly refers to pouring/casting metal in tabernacle-construction
    contexts. 'He cast' is concise and idiomatic in English for producing metal fittings.
- source_word: אַרְבַּע טַבָּעֹת
  chosen: four rings
  lexicon: HALOT
  rationale: טַבָּעֹת are metal rings, especially attachment rings for carrying implements.
    'Four rings' is the straightforward formal equivalent.
- source_word: בְּאַרְבַּע הַקְּצָוֺת
  chosen: on the four corners
  alternatives:
  - at the four ends
  - in the four extremities
  lexicon: HALOT
  rationale: קָצֶה denotes an end, edge, or extremity. In the context of a rectangular
    metal grating, 'corners' best communicates the functional placement in natural
    English.
- source_word: לְמִכְבַּר הַנְּחֹשֶׁת
  chosen: of the bronze grating
  alternatives:
  - for the bronze grating
  - of the bronze network
  lexicon: HALOT
  rationale: מִכְבָּר refers to a latticework or grating; with the prefixed לְ it
    marks relation/purpose. 'Of the bronze grating' fits the syntax with the following
    placement phrase and matches the altar's grate context. 'Bronze' is preferred
    over 'brass' for modern accuracy for נְחֹשֶׁת.
- source_word: בָּתִּים
  chosen: holders
  alternatives:
  - housings
  - receptacles
  - sockets
  lexicon: HALOT
  rationale: Literally 'houses,' but here idiomatically denotes receptacles or fittings
    serving to receive the poles. 'Holders' is clear modern English and preserves
    the functional sense without overtechnical wording.
- source_word: לַבַּדִּים
  chosen: for the poles
  alternatives:
  - for the carrying poles
  - for the staves
  lexicon: HALOT
  rationale: בַּדִּים are carrying poles used for transporting tabernacle furnishings.
    'Poles' is the standard clear rendering; 'staves' is archaic.
