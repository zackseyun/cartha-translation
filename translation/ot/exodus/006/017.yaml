id: EXO.6.17
reference: Exodus 6:17
source:
  edition: WLC
  text: בְּנֵ֥י גֵרְשׁ֛וֹן לִבְנִ֥י וְ/שִׁמְעִ֖י לְ/מִשְׁפְּחֹתָֽ/ם׃
translation:
  text: 'The sons of Gershon: Libni and Shimei, by their clans.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to their families.' The Hebrew term can denote extended family
      groups or clans within a tribe.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  - The children of
  lexicon: HALOT
  rationale: Construct plural of בֵּן introducing a genealogical list. 'Sons of' is
    the most direct and natural rendering here, while alternatives like 'descendants
    of' are broader than the immediate filial sense.
- source_word: גֵרְשׁוֹן
  chosen: Gershon
  rationale: Proper personal name; transliterated according to the translation philosophy
    for names.
- source_word: לִבְנִי
  chosen: Libni
  rationale: Proper personal name; transliterated rather than translated.
- source_word: וְשִׁמְעִי
  chosen: and Shimei
  rationale: Conjunction plus proper personal name. Rendered straightforwardly as
    the second named son in the list.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their families
  - by their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in genealogical and tribal contexts commonly denotes a clan-level
    social unit. 'By their clans' is concise, natural English and fits the census/genealogical
    formula. 'Families' is possible but can sound too narrow in modern English.
