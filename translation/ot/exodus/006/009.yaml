theological_decisions:
- issue: Rendering of Israel's condition under Egypt in עֲבֹדָה קָשָׁה
  chosen_reading: harsh slavery
  alternative_readings:
  - hard labor
  - harsh labor
  rationale: Although the noun can denote labor or service broadly, the context in
    Exodus is Israel's forced bondage in Egypt. Rendering it 'slavery' reflects the
    historical and moral reality more clearly and aligns with the translation philosophy's
    preference for bonded-language where salient.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition); Contested terms table principle from δοῦλος entry applied analogically
