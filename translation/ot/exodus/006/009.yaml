id: EXO.6.9
reference: Exodus 6:9
source:
  edition: WLC
  text: וַ/יְדַבֵּ֥ר מֹשֶׁ֛ה כֵּ֖ן אֶל בְּנֵ֣י יִשְׂרָאֵ֑ל וְ/לֹ֤א שָֽׁמְעוּ֙ אֶל
    מֹשֶׁ֔ה מִ/קֹּ֣צֶר ר֔וּחַ וּ/מֵ/עֲבֹדָ֖ה קָשָֽׁה־־׃פ
translation:
  text: So Moses spoke this to the sons of Israel, but they did not listen to Moses
    because of broken spirit and harsh slavery.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'from shortness of spirit.' The phrase can also be rendered 'because
      of discouragement.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and hard labor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  - spoke
  lexicon: HALOT
  rationale: The verb דבר in the piel commonly means 'speak.' 'Spoke' is slightly
    more formal and fits the narrative report better than 'said.'
- source_word: כֵּן
  chosen: this
  alternatives:
  - thus
  - so
  lexicon: HALOT
  rationale: Here כֵּן points back to the content of the preceding divine message.
    'This' in English naturally refers to what Moses had just been told; 'thus' is
    possible but more archaic.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Following the gender-accurate principle, the formally masculine construct
    phrase is preserved as 'sons of Israel.' 'Israelites' is idiomatic but less transparent
    to the Hebrew wording; 'children of Israel' is traditional but less precise.
- source_word: שָׁמְעוּ אֶל
  chosen: did not listen to
  alternatives:
  - did not hear
  - did not heed
  lexicon: HALOT
  rationale: The idiom שמע אל commonly means to listen to or heed someone. 'Did not
    listen to' is the most natural modern English rendering; 'did not heed' is possible
    but less common.
- source_word: מִקֹּצֶר רוּחַ
  chosen: because of broken spirit
  alternatives:
  - because of shortness of spirit
  - because of discouragement
  - because of impatience
  lexicon: HALOT
  rationale: The phrase literally means 'from shortness of spirit,' an idiom for inner
    constriction, discouragement, or crushed morale. 'Broken spirit' communicates
    the emotional force in readable English without flattening it into mere impatience.
- source_word: וּמֵעֲבֹדָה קָשָׁה
  chosen: and harsh slavery
  alternatives:
  - and hard labor
  - and cruel bondage
  - and severe service
  lexicon: HALOT
  rationale: עֲבֹדָה can mean labor/service, but in Israel's Egyptian condition the
    bonded nature is salient. 'Harsh slavery' makes explicit the oppressive context
    and pairs well with the emotional cause in the previous phrase.
