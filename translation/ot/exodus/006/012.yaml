id: EXO.6.12
reference: Exodus 6:12
source:
  edition: WLC
  text: וַ/יְדַבֵּ֣ר מֹשֶׁ֔ה לִ/פְנֵ֥י יְהוָ֖ה לֵ/אמֹ֑ר הֵ֤ן בְּנֵֽי יִשְׂרָאֵל֙ לֹֽא שָׁמְע֣וּ אֵלַ֔/י וְ/אֵיךְ֙ יִשְׁמָעֵ֣/נִי פַרְעֹ֔ה וַ/אֲנִ֖י עֲרַ֥ל שְׂפָתָֽיִם־־׃פ
translation:
  text: But Moses spoke before Yahweh, saying, “Behold, the sons of Israel have not listened to me; so how will Pharaoh listen to me, since I am uncircumcised in lips?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''uncircumcised in/of lips,'' an idiom expressing impeded or inadequate speech; compare Exod 4:10.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the Israelites' for 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: But Moses spoke
  alternatives:
  - And Moses spoke
  - Then Moses spoke
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'But' fits the contrast with the preceding divine command and Moses' objection in context better than a simple 'and,' while 'spoke' preserves the basic sense of דבר.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  - to the LORD
  lexicon: HALOT
  rationale: לִפְנֵי is literally 'before/in the presence of.' 'Before the LORD' preserves the spatial-relational idiom without overinterpreting it as merely indirect discourse. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard idiomatic rendering introducing direct speech.
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  - See
  lexicon: HALOT
  rationale: הֵן is a discourse particle drawing attention. 'Look' is readable modern English and preserves the force better than archaic 'Behold.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: A more formal rendering preserves the Hebrew familial expression בני. Because the source is grammatically masculine and refers to the covenant people corporately, 'sons of Israel' is gender-accurate per project philosophy; smoother alternatives are possible but less transparent to the source form.
- source_word: לֹא שָׁמְעוּ אֵלַי
  chosen: have not listened to me
  alternatives:
  - did not listen to me
  - have not obeyed me
  lexicon: HALOT
  rationale: שׁמע with אֶל commonly means 'listen to.' In context Moses is speaking of their refusal to heed his message; 'listened to me' preserves the auditory-heeding sense without importing the stronger 'obeyed' unless context demands it.
- source_word: וְאֵיךְ
  chosen: so how
  alternatives:
  - and how
  - how then
  lexicon: HALOT
  rationale: The conjunction plus interrogative expresses inference from the prior clause. 'So how' communicates Moses' logic in natural English.
- source_word: יִשְׁמָעֵנִי
  chosen: will Pharaoh listen to me
  alternatives:
  - would Pharaoh listen to me
  - will Pharaoh hear me
  lexicon: HALOT
  rationale: Future sense fits the rhetorical objection to the command just given. 'Listen to me' keeps consistency with the earlier use of שׁמע in the verse.
- source_word: וַאֲנִי
  chosen: when I am
  alternatives:
  - and I am
  - though I am
  lexicon: HALOT
  rationale: The conjunction here introduces the ground of Moses' objection. English idiom is clearer with a subordinating sense ('when'/'since') rather than a bare coordinate 'and.'
- source_word: עֲרַל שְׂפָתָיִם
  chosen: uncircumcised in lips
  alternatives:
  - of uncircumcised lips
  - with uncircumcised lips
  - poor of speech
  lexicon: HALOT
  rationale: The Hebrew idiom is metaphorical but intentionally vivid, echoing the language of uncircumcision as impediment or unfitness. A relatively literal rendering preserves the metaphor and its rhetorical force better than an interpretive paraphrase like 'poor of speech.' 'In lips' reflects the Hebrew construction while remaining intelligible; the more idiomatic alternative is preserved in a footnote.
