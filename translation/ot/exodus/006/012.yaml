  alternative_readings:
  - of uncircumcised lips
  - poor of speech
  rationale: 'The main text preserves the Hebrew metaphor rather than resolving it into a modern diagnosis. This maintains theological and literary tension: Moses presents himself as unfit or impeded in speech, but the exact nuance is left visible to the reader.'
