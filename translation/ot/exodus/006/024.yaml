id: EXO.6.24
reference: Exodus 6:24
source:
  edition: WLC
  text: וּ/בְנֵ֣י קֹ֔רַח אַסִּ֥יר וְ/אֶלְקָנָ֖ה וַ/אֲבִיאָסָ֑ף אֵ֖לֶּה מִשְׁפְּחֹ֥ת
    הַ/קָּרְחִֽי׃
translation:
  text: 'The sons of Korah: Assir, Elkanah, and Abiasaph. These are the clans of the
    Korahites.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "families of the Korahites." The Hebrew term can denote extended family
      groupings within a tribe; "clans" is used here to reflect the genealogical setting
      more precisely.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: The sons of
  alternatives:
  - And the sons of
  - The descendants of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'sons.' In a genealogy, 'sons of' is
    the most direct and formally accurate rendering. 'Descendants of' is possible
    in broader genealogical contexts, but here the immediate listing of three named
    individuals favors the more literal 'sons of.' The prefixed conjunction is not
    carried as 'and' in English because the verse reads naturally as a new genealogical
    line without needing the connective.
- source_word: קֹרַח
  chosen: Korah
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to the translation philosophy
    for names.
- source_word: אַסִּיר
  chosen: Assir
  lexicon: HALOT
  rationale: Proper personal name; transliterated. Although the form resembles a common
    noun meaning 'prisoner/bound one' in other contexts, here morphology and context
    indicate a personal name in a genealogy.
- source_word: וְאֶלְקָנָה
  chosen: Elkanah
  lexicon: HALOT
  rationale: Proper personal name; transliterated. The conjunction is naturally represented
    by the English list punctuation and final 'and.'
- source_word: וַאֲבִיאָסָף
  chosen: Abiasaph
  alternatives:
  - Abiassaph
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard English convention.
    An alternate transliteration could reflect the doubled consonant more explicitly,
    but 'Abiasaph' is a clear and conventional form.
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These
  lexicon: HALOT
  rationale: 'The demonstrative introduces an identifying clause. English idiom normally
    supplies the copula: ''These are.'''
- source_word: מִשְׁפְּחֹת
  chosen: the clans of
  alternatives:
  - the families of
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in tribal/genealogical contexts refers to kinship subdivisions
    within a tribe, and 'clans' best captures that social structure in modern English.
    'Families' is possible but can sound too narrow or domestic.
- source_word: הַקָּרְחִי
  chosen: the Korahites
  alternatives:
  - the Korahite families
  - the Korah clan
  lexicon: HALOT
  rationale: The gentilic/adjectival form means those belonging to Korah's line. 'Korahites'
    is the concise and standard English rendering for this group designation.
