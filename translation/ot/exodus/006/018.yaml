id: EXO.6.18
reference: Exodus 6:18
source:
  edition: WLC
  text: וּ/בְנֵ֣י קְהָ֔ת עַמְרָ֣ם וְ/יִצְהָ֔ר וְ/חֶבְר֖וֹן וְ/עֻזִּיאֵ֑ל וּ/שְׁנֵי֙
    חַיֵּ֣י קְהָ֔ת שָׁלֹ֧שׁ וּ/שְׁלֹשִׁ֛ים וּ/מְאַ֖ת שָׁנָֽה׃
translation:
  text: 'The sons of Kohath: Amram, Izhar, Hebron, and Uzziel. And the years of Kohath’s
    life were one hundred thirty-three years.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּבְנֵי
  chosen: The sons of
  alternatives:
  - And the sons of
  - The descendants of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'sons.' In a genealogy it can sometimes
    extend to descendants, but here it introduces the immediate named sons of Kohath,
    so 'The sons of' is the most precise rendering. The prefixed conjunction is not
    carried with a separate 'and' at the start because English style naturally uses
    a heading-like apposition after the previous genealogy item.
- source_word: קְהָת
  chosen: Kohath
  rationale: Proper name transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: עַמְרָם וְיִצְהָר וְחֶבְרוֹן וְעֻזִּיאֵל
  chosen: Amram, Izhar, Hebron, and Uzziel
  rationale: These are four proper names in a simple list of Kohath's sons. Names
    are transliterated, and the Hebrew waw conjunctions are represented idiomatically
    in English with commas and a final 'and.'
- source_word: וּשְׁנֵי חַיֵּי
  chosen: And the years of ... life were
  alternatives:
  - And the lifespan of ... was
  - And the years of the life of ... were
  lexicon: HALOT
  rationale: The idiom שְׁנֵי חַיֵּי literally means 'the years of the life of.' In
    English genealogical style, 'the years of Kohath’s life were' preserves the Hebrew
    structure while remaining readable. 'Lifespan' is possible but slightly more interpretive
    and less formally tied to the source wording.
- source_word: שָׁלֹשׁ וּשְׁלֹשִׁים וּמְאַת שָׁנָה
  chosen: one hundred thirty-three years
  alternatives:
  - a hundred and thirty-three years
  lexicon: HALOT
  rationale: Hebrew orders the numerals as 'three and thirty and one hundred year.'
    Standard English reverses the order to 'one hundred thirty-three years.' The singular
    שָׁנָה after the compound number is a normal Hebrew usage and is rendered idiomatically
    as plural 'years' in English.
