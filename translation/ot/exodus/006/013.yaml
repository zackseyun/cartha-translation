theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for YHWH and aligns with the
    reverential convention reflected in Jewish reading practice and many English translations.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to smooth בְּנֵי יִשְׂרָאֵל into a gender-neutral collective
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The project prefers gender-accurate renderings over gender-neutral ones
    where the source uses a masculine form with representative force. Here the traditional
    Hebrew national designation is preserved rather than neutralized.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
