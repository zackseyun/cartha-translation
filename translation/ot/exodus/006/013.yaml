id: EXO.6.13
reference: Exodus 6:13
source:
  edition: WLC
  text: וַ/יְדַבֵּ֣ר יְהוָה֮ אֶל מֹשֶׁ֣ה וְ/אֶֽל אַהֲרֹן֒ וַ/יְצַוֵּ/ם֙ אֶל בְּנֵ֣י
    יִשְׂרָאֵ֔ל וְ/אֶל פַּרְעֹ֖ה מֶ֣לֶךְ מִצְרָ֑יִם לְ/הוֹצִ֥יא אֶת בְּנֵֽי יִשְׂרָאֵ֖ל
    מֵ/אֶ֥רֶץ מִצְרָֽיִם־־־־־־׃ס
translation:
  text: Then the LORD spoke to Moses and to Aaron, and he commanded them concerning
    the sons of Israel and concerning Pharaoh king of Egypt, to bring the sons of
    Israel out from the land of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the sons of Israel and to Pharaoh king of Egypt.' The Hebrew preposition
      can be taken as marking the recipients of the command, but in context it likely
      means the command given to Moses and Aaron concerned both Israel and Pharaoh.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'the sons of Israel'; also rendered 'the Israelites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: Then ... spoke
  alternatives:
  - And ... spoke
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative progression while preserving the sequential force of the Hebrew wayyiqtol.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name YHWH is rendered 'the LORD' rather than
    transliterated.
- source_word: אֶל מֹשֶׁה וְאֶל אַהֲרֹן
  chosen: to Moses and to Aaron
  alternatives:
  - with Moses and with Aaron
  lexicon: HALOT
  rationale: אֶל with דבר regularly marks the addressee; 'to' is the plain sense.
- source_word: וַיְצַוֵּם
  chosen: and he commanded them
  alternatives:
  - and he charged them
  - and he gave them instructions
  lexicon: HALOT
  rationale: צוה denotes commanding or charging. 'Commanded' best preserves the authoritative
    force. The pronominal suffix refers to Moses and Aaron.
- source_word: אֶל בְּנֵי יִשְׂרָאֵל
  chosen: concerning the sons of Israel
  alternatives:
  - to the sons of Israel
  - regarding the sons of Israel
  - concerning the people of Israel
  lexicon: HALOT
  rationale: After צוה, אֶל can indicate the party with reference to whom the command
    is given, not only the direct addressee. Since Moses and Aaron are the ones commanded,
    'concerning' avoids implying that Israel were the immediate recipients of this
    speech. 'Sons of Israel' preserves the Hebrew expression more closely than 'people
    of Israel'.
- source_word: וְאֶל פַּרְעֹה מֶלֶךְ מִצְרָיִם
  chosen: and concerning Pharaoh king of Egypt
  alternatives:
  - and to Pharaoh king of Egypt
  - and regarding Pharaoh, the king of Egypt
  lexicon: HALOT
  rationale: Parallel to the previous אֶל phrase, this most naturally indicates the
    sphere or object of the command given to Moses and Aaron. 'Concerning' keeps the
    syntax coherent in English.
- source_word: לְהוֹצִיא
  chosen: to bring ... out
  alternatives:
  - to lead ... out
  - to cause ... to go out
  lexicon: HALOT
  rationale: 'The Hiphil infinitive of יצא is causative: ''cause to go out.'' ''Bring
    ... out'' is idiomatic English and fits the exodus context.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: A consistent, transparent rendering of the Hebrew phrase is preferred
    here. Although 'Israelites' is idiomatic, 'sons of Israel' preserves the familial-national
    wording of the source.
- source_word: מֵאֶרֶץ מִצְרָיִם
  chosen: from the land of Egypt
  alternatives:
  - out of Egypt
  - from Egypt
  lexicon: HALOT
  rationale: אֶרֶץ explicitly means 'land'; retaining it preserves the concrete geographic
    expression of the Hebrew.
