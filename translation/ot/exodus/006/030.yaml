theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to preserve the metaphor 'uncircumcised of lips'
  chosen_reading: Preserve the metaphor in the main text
  alternative_readings:
  - poor of speech
  - unskilled in speaking
  rationale: This is not merely a speech-impediment gloss but a metaphor of inadequacy/unsuitability expressed through covenantal language. Preserving the metaphor maintains the Hebrew imagery and theological texture rather than flattening it into paraphrase.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
