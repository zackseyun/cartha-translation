theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render the covenant name as 'the LORD,' following
    Jewish reverence tradition and longstanding English convention while preserving
    distinction from other divine titles.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to preserve the metaphor 'uncircumcised of lips'
  chosen_reading: Preserve the metaphor in the main text
  alternative_readings:
  - poor of speech
  - unskilled in speaking
  rationale: This is not merely a speech-impediment gloss but a metaphor of inadequacy/unsuitability
    expressed through covenantal language. Preserving the metaphor maintains the Hebrew
    imagery and theological texture rather than flattening it into paraphrase.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy;
    preserve theological tension rather than resolve it'
