id: EXO.6.30
reference: Exodus 6:30
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר מֹשֶׁ֖ה לִ/פְנֵ֣י יְהוָ֑ה הֵ֤ן אֲנִי֙ עֲרַ֣ל שְׂפָתַ֔יִם וְ/אֵ֕יךְ
    יִשְׁמַ֥ע אֵלַ֖/י פַּרְעֹֽה׃פ
translation:
  text: But Moses said before the LORD, “Look, I am uncircumcised of lips; so how
    will Pharaoh listen to me?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “uncircumcised lips,” that is, lips not fit for speaking well.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: But Moses said
  alternatives:
  - And Moses said
  - Then Moses said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'But' fits the immediate
    context of objection/resistance better than a simple 'and,' while still reflecting
    the Hebrew narrative conjunction.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  - to the LORD
  lexicon: HALOT
  rationale: לִפְנֵי is spatial/relational, literally 'before' or 'in the presence
    of.' 'Before the LORD' is concise and natural. YHWH is rendered 'the LORD' per
    doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered 'the LORD' in keeping with the stated default
    for יְהוָה.
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  - See
  lexicon: HALOT
  rationale: הֵן is an attention-getting particle. 'Look' preserves the force in readable
    modern English better than archaic 'behold.'
- source_word: עֲרַל שְׂפָתַיִם
  chosen: uncircumcised of lips
  alternatives:
  - uncircumcised lips
  - poor of speech
  - unskilled in speaking
  lexicon: HALOT
  rationale: The Hebrew is a marked metaphor, literally 'uncircumcised of lips.' Retaining
    the metaphor preserves the source texture and links with Exod 6:12. Smoother interpretive
    renderings like 'poor of speech' explain rather than translate.
- source_word: וְאֵיךְ
  chosen: so how
  alternatives:
  - and how
  - how then
  lexicon: HALOT
  rationale: The conjunction plus interrogative introduces an inference from Moses's
    inadequacy. 'So how' captures the consequential sense in natural English.
- source_word: יִשְׁמַע אֵלַי
  chosen: will Pharaoh listen to me
  alternatives:
  - will Pharaoh hear me
  - will Pharaoh obey me
  lexicon: HALOT
  rationale: שׁמע with אֶל commonly means 'listen to.' 'Hear me' is possible but weaker
    in English; 'obey me' is too strong here because Moses is emphasizing being heeded,
    not Pharaoh's submission to Moses personally.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  lexicon: HALOT
  rationale: Standard English transliteration of the royal title/name.
