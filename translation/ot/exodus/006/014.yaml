id: EXO.6.14
reference: Exodus 6:14
source:
  edition: WLC
  text: אֵ֖לֶּה רָאשֵׁ֣י בֵית אֲבֹתָ֑/ם בְּנֵ֨י רְאוּבֵ֜ן בְּכֹ֣ר יִשְׂרָאֵ֗ל חֲנ֤וֹךְ
    וּ/פַלּוּא֙ חֶצְר֣וֹן וְ/כַרְמִ֔י אֵ֖לֶּה מִשְׁפְּחֹ֥ת רְאוּבֵֽן־׃
translation:
  text: 'These are the heads of their fathers’ houses: the sons of Reuben, the firstborn
    of Israel: Hanoch and Pallu, Hezron and Carmi. These are the clans of Reuben.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “families of Reuben.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These
  lexicon: HALOT
  rationale: Deictic plural introducing a list; English idiom naturally supplies the
    copula in genealogical headings.
- source_word: רָאשֵׁי
  chosen: heads of
  alternatives:
  - chiefs of
  - leaders of
  lexicon: HALOT
  rationale: In construct with 'house of their fathers,' the term denotes leading
    representatives or heads of family units. 'Heads of' preserves the concrete metaphor
    and common genealogical usage.
- source_word: בֵית אֲבֹתָם
  chosen: their fathers’ houses
  alternatives:
  - their ancestral houses
  - their family houses
  lexicon: HALOT
  rationale: A standard kinship expression for extended family households or paternal
    houses. 'Fathers’ houses' keeps the formal genealogical terminology rather than
    flattening it to a generic 'families.'
- source_word: בְּנֵי רְאוּבֵן
  chosen: the sons of Reuben
  alternatives:
  - Reuben's sons
  - the descendants of Reuben
  lexicon: HALOT
  rationale: In a genealogy introducing named immediate offspring, 'sons of Reuben'
    is the most direct rendering. 'Descendants' would be broader than the immediate
    list warrants.
- source_word: בְּכֹר יִשְׂרָאֵל
  chosen: the firstborn of Israel
  alternatives:
  - Israel's firstborn
  lexicon: HALOT
  rationale: Appositional identification of Reuben. 'Firstborn of Israel' is clear
    and preserves the formal genealogical style.
- source_word: חֲנוֹךְ
  chosen: Hanoch
  alternatives:
  - Hanokh
  lexicon: HALOT
  rationale: Standard English transliteration of the Hebrew personal name.
- source_word: וּפַלּוּא
  chosen: and Pallu
  alternatives:
  - and Phallu
  lexicon: HALOT
  rationale: Standard modern transliteration of the personal name; avoids older forms
    influenced by Greek/Latin traditions.
- source_word: חֶצְרוֹן
  chosen: Hezron
  alternatives:
  - Hetzron
  lexicon: HALOT
  rationale: Conventional English transliteration of the personal name.
- source_word: וְכַרְמִי
  chosen: and Carmi
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: מִשְׁפְּחֹת
  chosen: clans
  alternatives:
  - families
  lexicon: HALOT
  rationale: In tribal and genealogical contexts, the term denotes sub-tribal kinship
    groups. 'Clans' communicates this more precisely than the broader modern English
    'families.'
- source_word: רְאוּבֵן
  chosen: Reuben
  lexicon: HALOT
  rationale: Standard English transliteration of the tribal/personal name.
