id: EXO.6.22
reference: Exodus 6:22
source:
  edition: WLC
  text: וּ/בְנֵ֖י עֻזִּיאֵ֑ל מִֽישָׁאֵ֥ל וְ/אֶלְצָפָ֖ן וְ/סִתְרִֽי׃
translation:
  text: 'And the sons of Uzziel: Mishael, Elzaphan, and Sithri.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Elzaphan is also commonly transliterated as Elizaphan in some English traditions.
    reason: lexical_alternative
  - marker: b
    text: Sithri may also be transliterated as Zithri.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְנֵי
  chosen: And the sons of
  alternatives:
  - Now the sons of
  - The sons of
  lexicon: HALOT
  rationale: The conjunction ו is rendered as "And" to preserve the genealogical list
    structure and continuity with the surrounding verses. בְנֵי is the construct plural
    "sons of," the standard genealogical expression; retaining "sons" is gender-accurate
    and formally appropriate in this lineage context.
- source_word: עֻזִּיאֵל
  chosen: Uzziel
  rationale: Proper personal name; transliterated rather than translated in keeping
    with the translation philosophy for names.
- source_word: מִישָׁאֵל
  chosen: Mishael
  rationale: Proper personal name; standard English transliteration.
- source_word: וְ/אֶלְצָפָן
  chosen: and Elzaphan
  alternatives:
  - and Elizaphan
  rationale: Proper personal name with prefixed conjunction. "Elzaphan" closely reflects
    the Hebrew form אֶלְצָפָן. "Elizaphan" is a familiar English variant influenced
    by other transliteration traditions and is worth preserving as an alternative.
- source_word: וְ/סִתְרִי
  chosen: and Sithri
  alternatives:
  - and Zithri
  rationale: Proper personal name with prefixed conjunction. "Sithri" is a straightforward
    transliteration of סִתְרִי. Because English transliterations of samekh can vary,
    "Zithri" is a known alternative worth noting.
