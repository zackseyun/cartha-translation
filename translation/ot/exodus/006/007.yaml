theological_decisions:
- issue: Covenant formula rendering
  chosen_reading: Rendered the paired clauses as 'I will take you to be my people, and I will be your God.'
  alternative_readings:
  - I will take you for my people, and I will be God to you
  rationale: This preserves the classic covenant formula without importing later theological systematization. The wording is relational and covenantal, matching the Hebrew construction and broader biblical usage.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Divine name rendering
  chosen_reading: Rendered יְהוָה as 'Yahweh.'
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
