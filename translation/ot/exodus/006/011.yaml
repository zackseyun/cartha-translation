theological_decisions:
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: No major doctrinal issue is at stake, but the project's translation philosophy
    prefers gender-accurate renderings where the source is explicitly masculine. 'The
    sons of Israel' preserves the Hebrew familial expression and avoids unnecessary
    interpretive flattening.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
