id: EXO.6.11
reference: Exodus 6:11
source:
  edition: WLC
  text: בֹּ֣א דַבֵּ֔ר אֶל פַּרְעֹ֖ה מֶ֣לֶךְ מִצְרָ֑יִם וִֽ/ישַׁלַּ֥ח אֶת בְּנֵֽי יִשְׂרָאֵ֖ל
    מֵ/אַרְצֽ/וֹ־־־׃
translation:
  text: Go, speak to Pharaoh king of Egypt, so that he may let the sons of Israel
    go out from his land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Israelites” or “the children of Israel.” The Hebrew reads literally
      “the sons of Israel.”
    reason: lexical_alternative
lexical_decisions:
- source_word: בֹּא
  chosen: Go
  alternatives:
  - Come
  lexicon: HALOT
  rationale: Imperative of בוא. In English, 'go' fits the command to Moses to proceed
    to Pharaoh from his present location. Although the Hebrew verb can be rendered
    'come' in some contexts, here idiomatic English favors 'go.'
- source_word: דַבֵּר
  chosen: speak
  alternatives:
  - tell
  lexicon: HALOT
  rationale: Piel imperative of דבר, here introducing direct address to Pharaoh. 'Speak'
    is the most direct and formally accurate rendering; 'tell' would be slightly more
    interpretive.
- source_word: אֶל
  chosen: to
  alternatives:
  - with
  lexicon: HALOT
  rationale: Standard preposition marking the addressee of speech; 'to' is the natural
    English equivalent.
- source_word: פַּרְעֹה מֶלֶךְ מִצְרָיִם
  chosen: Pharaoh king of Egypt
  alternatives:
  - Pharaoh, the king of Egypt
  lexicon: HALOT
  rationale: A straightforward appositional rendering of the title and realm. The
    article is not present, so the compact form 'Pharaoh king of Egypt' preserves
    the Hebrew structure while remaining natural English.
- source_word: וִישַׁלַּח
  chosen: so that he may let ... go out
  alternatives:
  - and he will send away
  - that he should let ... go
  lexicon: HALOT
  rationale: 'The prefixed verb after the imperative expresses the intended result
    or content of Moses'' speech to Pharaoh. In context, the sense is not merely predictive
    (''and he will send'') but directive/resultative: Moses is to speak so that Pharaoh
    releases Israel. ''Let ... go out'' captures the exodus context and the force
    of שלח.'
- source_word: אֶת בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is literally 'the sons of Israel.' Following the project's
    gender-accurate principle, the familial expression is preserved in the main text
    rather than flattened to the ethnic label 'Israelites,' though that remains a
    viable contextual alternative.
- source_word: מֵאַרְצוֹ
  chosen: from his land
  alternatives:
  - out of his land
  - from his country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to Pharaoh's territorial domain. 'From his land' is
    a clear, direct rendering; 'out of his land' is also possible, but 'from' reads
    more smoothly with 'go out' already present.
