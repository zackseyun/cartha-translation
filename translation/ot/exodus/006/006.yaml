theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Degree of literalness in לִבְנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - children of Israel
  - Israelites
  rationale: The source is grammatically masculine plural and refers to the covenant
    people in familial terms. Per translation philosophy, gender-accurate rendering
    is preferred over neutralization unless context requires otherwise.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering עֲבֹדָה in context
  chosen_reading: slavery
  alternative_readings:
  - bondage
  - service
  rationale: In this exodus context the term denotes coerced servitude under Egyptian
    domination, not neutral work or service. 'Slavery' best reflects the social reality
    without softening it.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
