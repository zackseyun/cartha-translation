id: EXO.6.6
reference: Exodus 6:6
source:
  edition: WLC
  text: לָ/כֵ֞ן אֱמֹ֥ר לִ/בְנֵֽי יִשְׂרָאֵ֘ל אֲנִ֣י יְהוָה֒ וְ/הוֹצֵאתִ֣י אֶתְ/כֶ֗ם
    מִ/תַּ֨חַת֙ סִבְלֹ֣ת מִצְרַ֔יִם וְ/הִצַּלְתִּ֥י אֶתְ/כֶ֖ם מֵ/עֲבֹדָתָ֑/ם וְ/גָאַלְתִּ֤י
    אֶתְ/כֶם֙ בִּ/זְר֣וֹעַ נְטוּיָ֔ה וּ/בִ/שְׁפָטִ֖ים גְּדֹלִֽים־׃
translation:
  text: Therefore say to the sons of Israel, ‘I am the LORD, and I will bring you
    out from under the burdens of Egypt, and I will deliver you from their slavery,
    and I will redeem you with an outstretched arm and with great judgments.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'children of Israel' or 'Israelites.' The Hebrew reads literally 'sons
      of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'YHWH'; rendered 'the LORD' following the project's standard practice.
    reason: alternative_reading
  - marker: c
    text: Or 'from their bondage.' The Hebrew term can denote service or labor, but
      here refers to oppressive servitude.
    reason: lexical_alternative
  - marker: d
    text: Or 'with great acts of judgment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks an inferential transition from the preceding divine speech; 'Therefore'
    preserves the formal logical connection.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: to the sons of Israel
  alternatives:
  - to the children of Israel
  - to the Israelites
  lexicon: HALOT
  rationale: Literally 'to the sons of Israel.' Chosen to preserve the Hebrew familial
    expression and the gender-accurate policy; 'Israelites' is smoother but less transparent
    to the source.
- source_word: אֲנִי יְהוָה
  chosen: I am the LORD
  alternatives:
  - I am Yahweh
  lexicon: HALOT
  rationale: The divine self-identification is central. Per doctrine, יְהוָה is rendered
    'the LORD' rather than transliterated.
- source_word: וְהוֹצֵאתִי
  chosen: I will bring you out
  alternatives:
  - I will lead you out
  - I will bring you forth
  lexicon: HALOT
  rationale: Hiphil of יצא here expresses causative removal from oppression. 'Bring
    you out' is idiomatic and preserves the exodus motif.
- source_word: מִתַּחַת סִבְלֹת מִצְרַיִם
  chosen: from under the burdens of Egypt
  alternatives:
  - from under the forced labor of Egypt
  - from under the oppression of Egypt
  lexicon: HALOT
  rationale: מִתַּחַת is literally 'from under,' and סִבְלֹת denotes burdens/load-bearing
    imposed by Egypt. 'Burdens' keeps the concrete metaphor and avoids overinterpreting
    the term as only labor or oppression.
- source_word: וְהִצַּלְתִּי
  chosen: I will deliver you
  alternatives:
  - I will rescue you
  - I will save you
  lexicon: HALOT
  rationale: The Hiphil of נצל commonly means rescue/deliver from danger or domination.
    'Deliver' fits the sequence of divine redemption acts.
- source_word: מֵעֲבֹדָתָם
  chosen: from their slavery
  alternatives:
  - from their service
  - from their bondage
  lexicon: HALOT
  rationale: Though עֲבֹדָה can mean service/work, in this context it denotes oppressive
    servitude under the Egyptians. 'Slavery' best conveys the bonded nature of Israel's
    condition.
- source_word: וְגָאַלְתִּי
  chosen: I will redeem you
  alternatives:
  - I will reclaim you
  - I will ransom you
  lexicon: HALOT
  rationale: גאל is covenantally charged language of kinship redemption. 'Redeem'
    preserves both the legal and theological resonance.
- source_word: בִּזְרֹעַ נְטוּיָה
  chosen: with an outstretched arm
  alternatives:
  - with a mighty arm stretched out
  - by an outstretched arm
  lexicon: HALOT
  rationale: A standard anthropomorphic expression for Yahweh's powerful intervention.
    'Outstretched arm' is the established and accurate idiom.
- source_word: וּבִשְׁפָטִים גְּדֹלִים
  chosen: and with great judgments
  alternatives:
  - and with great acts of judgment
  - and with mighty judgments
  lexicon: HALOT
  rationale: שְׁפָטִים are judicial acts/judgments, likely referring to the plagues
    and acts against Egypt. 'Great judgments' stays close to the Hebrew while remaining
    intelligible.
