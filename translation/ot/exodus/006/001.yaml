id: EXO.6.1
reference: Exodus 6:1
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל מֹשֶׁ֔ה עַתָּ֣ה תִרְאֶ֔ה אֲשֶׁ֥ר אֶֽעֱשֶׂ֖ה לְ/פַרְעֹ֑ה
    כִּ֣י בְ/יָ֤ד חֲזָקָה֙ יְשַׁלְּחֵ֔/ם וּ/בְ/יָ֣ד חֲזָקָ֔ה יְגָרְשֵׁ֖/ם מֵ/אַרְצֽ/וֹ־׃ס
translation:
  text: Then the LORD said to Moses, “Now you will see what I will do to Pharaoh,
    for by a strong hand he will let them go, and by a strong hand he will drive them
    out from his land.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'under compulsion he will let them go, and under compulsion he will
      drive them out.' The repeated phrase 'by a strong hand' may imply Pharaoh acts
      because of overwhelming force, ultimately God's power.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name YHWH as
    'the LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence.
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - At this time
  - Now then
  lexicon: HALOT
  rationale: '''Now'' naturally conveys the temporal-emphatic force introducing the
    next stage of divine action.'
- source_word: תִרְאֶה
  chosen: you will see
  alternatives:
  - you shall see
  lexicon: HALOT
  rationale: A straightforward future sense fits the context of imminent divine demonstration.
- source_word: אֲשֶׁר אֶעֱשֶׂה
  chosen: what I will do
  alternatives:
  - that which I will do
  - what I am about to do
  lexicon: HALOT
  rationale: This is idiomatic English for the relative clause while preserving the
    future action.
- source_word: לְפַרְעֹה
  chosen: to Pharaoh
  alternatives:
  - against Pharaoh
  - for Pharaoh
  lexicon: HALOT
  rationale: The preposition ל here is best rendered 'to' with the verb 'do,' expressing
    what God will do in relation to Pharaoh without over-interpreting it as explicitly
    adversative in the main text.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: '''For'' introduces the explanation of why Moses will see God''s action:
    Pharaoh will be compelled to release and expel Israel.'
- source_word: בְיָד חֲזָקָה
  chosen: by a strong hand
  alternatives:
  - with a strong hand
  - under a strong hand
  lexicon: HALOT
  rationale: The phrase is repeated and should be preserved consistently. 'By a strong
    hand' keeps the Hebrew idiom and leaves open the implied compulsion. The expression
    likely denotes forceful constraint rather than merely willingness.
- source_word: יְשַׁלְּחֵם
  chosen: he will let them go
  alternatives:
  - he will send them out
  - he will release them
  lexicon: HALOT
  rationale: In the Exodus context, שלח with the object 'them' refers to Pharaoh releasing
    Israel. 'Let them go' is idiomatic and contextually precise.
- source_word: וּבְיָד חֲזָקָה
  chosen: and by a strong hand
  alternatives:
  - and with a strong hand
  lexicon: HALOT
  rationale: The repetition is retained in English to mirror the Hebrew emphasis and
    rhetorical parallelism.
- source_word: יְגָרְשֵׁם
  chosen: he will drive them out
  alternatives:
  - he will expel them
  - he will cast them out
  lexicon: HALOT
  rationale: גרש is stronger than merely 'send'; 'drive them out' captures the forceful
    expulsion and sharpens the progression from release to urgent expulsion.
- source_word: מֵאַרְצוֹ
  chosen: from his land
  alternatives:
  - from his country
  lexicon: HALOT
  rationale: '''Land'' is the more biblically resonant and geographically flexible
    rendering for אֶרֶץ in this context.'
