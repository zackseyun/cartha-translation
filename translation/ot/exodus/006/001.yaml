theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for YHWH and avoids introducing
    a denominationally loaded preference while preserving covenantal reference.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH | Default English:
    the LORD'
- issue: Referent of 'strong hand' in Pharaoh's actions
  chosen_reading: Retain the idiom 'by a strong hand' without making the subject of
    the force explicit in the main text
  alternative_readings:
  - under compulsion he will let them go
  - because of a mighty hand he will let them go
  rationale: The Hebrew phrase is ambiguous enough to allow the sense of compulsion
    by God's power, but the text as written places the phrase with Pharaoh's actions.
    Preserving the idiom maintains the theological tension rather than resolving it
    interpretively.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #3 — Preserve theological
    tension rather than resolve it'
