theological_decisions:
- issue: Rendering the oath idiom נָשָׂאתִי אֶת יָדִי
  chosen_reading: that I raised my hand
  alternative_readings:
  - that I swore
  rationale: The phrase is an oath idiom, but the literal imagery is important in
    covenant contexts. Optimal equivalence favors preserving the source-language metaphor
    in the main text while allowing the interpretive equivalent in a footnote.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD,' following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
