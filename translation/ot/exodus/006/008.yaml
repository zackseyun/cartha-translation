id: EXO.6.8
reference: Exodus 6:8
source:
  edition: WLC
  text: וְ/הֵבֵאתִ֤י אֶתְ/כֶם֙ אֶל הָ/אָ֔רֶץ אֲשֶׁ֤ר נָשָׂ֨אתִי֙ אֶת יָדִ֔/י לָ/תֵ֣ת
    אֹתָ֔/הּ לְ/אַבְרָהָ֥ם לְ/יִצְחָ֖ק וּֽ/לְ/יַעֲקֹ֑ב וְ/נָתַתִּ֨י אֹתָ֥/הּ לָ/כֶ֛ם
    מוֹרָשָׁ֖ה אֲנִ֥י יְהוָֽה־־׃
translation:
  text: And I will bring you into the land that I raised my hand to give to Abraham,
    to Isaac, and to Jacob, and I will give it to you as a possession. I am the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'that I swore to give.' The Hebrew literally says, 'that I raised my
      hand to give,' an oath-taking idiom.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵבֵאתִי
  chosen: And I will bring
  alternatives:
  - And I will bring in
  - And I will lead
  lexicon: HALOT
  rationale: Hiphil of בוא with first person subject and second person object naturally
    means 'bring' or 'bring in.' 'Bring' is clear modern English and preserves the
    causative sense without unnecessary expansion.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the country
  - the earth
  lexicon: HALOT
  rationale: In covenantal promise context, אֶרֶץ refers to the specific promised
    land, not the earth in general. 'Land' is the standard and most precise rendering.
- source_word: אֲשֶׁר נָשָׂאתִי אֶת יָדִי
  chosen: that I raised my hand
  alternatives:
  - that I swore
  - for which I lifted up my hand
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'raised my hand,' referring to oath-taking.
    Following optimal equivalence, the main text preserves the concrete idiom while
    remaining intelligible in English. The more interpretive 'swore' is preserved
    as an alternative.
- source_word: לָתֵת אֹתָהּ
  chosen: to give
  alternatives:
  - to grant
  lexicon: HALOT
  rationale: נתן in this construction is straightforwardly 'give.' 'Grant' is possible
    but less direct.
- source_word: לְאַבְרָהָם לְיִצְחָק וּלְיַעֲקֹב
  chosen: to Abraham, to Isaac, and to Jacob
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention, and
    the repeated preposition is represented naturally in English.
- source_word: וְנָתַתִּי אֹתָהּ לָכֶם
  chosen: and I will give it to you
  alternatives:
  - and I will place it in your possession
  lexicon: HALOT
  rationale: Simple future rendering best matches the Hebrew verbal sequence and keeps
    the promise direct.
- source_word: מוֹרָשָׁה
  chosen: as a possession
  alternatives:
  - for a possession
  - as an inheritance
  - as hereditary property
  lexicon: HALOT
  rationale: מוֹרָשָׁה denotes a possession held by right of inheritance or permanent
    tenure. 'As a possession' is natural English and preserves the idea of granted
    ownership; 'inheritance' is possible, but here the emphasis is on Israel receiving
    the land as their allotted possession from God rather than on succession from
    a human ancestor.
- source_word: אֲנִי יְהוָה
  chosen: I am the LORD
  alternatives:
  - I am Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The verbless clause functions
    as a solemn covenantal self-identification, well represented by 'I am the LORD.'
