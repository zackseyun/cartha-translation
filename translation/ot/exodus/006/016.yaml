id: EXO.6.16
reference: Exodus 6:16
source:
  edition: WLC
  text: וְ/אֵ֨לֶּה שְׁמ֤וֹת בְּנֵֽי לֵוִי֙ לְ/תֹ֣לְדֹתָ֔/ם גֵּרְשׁ֕וֹן וּ/קְהָ֖ת וּ/מְרָרִ֑י
    וּ/שְׁנֵי֙ חַיֵּ֣י לֵוִ֔י שֶׁ֧בַע וּ/שְׁלֹשִׁ֛ים וּ/מְאַ֖ת שָׁנָֽה־׃
translation:
  text: 'These are the names of Levi’s sons according to their generations: Gershon,
    Kohath, and Merari. And the years of Levi’s life were one hundred thirty-seven
    years.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: These are
  alternatives:
  - And these are
  - Now these are
  lexicon: HALOT
  rationale: Introduces the list deictically. English can omit the conjunction or
    absorb it into natural discourse; 'These are' is clear and idiomatic while preserving
    the demonstrative force.
- source_word: שְׁמוֹת
  chosen: the names
  lexicon: HALOT
  rationale: Straightforward nominal gloss in a genealogical/list context.
- source_word: בְּנֵי לֵוִי
  chosen: of Levi’s sons
  alternatives:
  - of the sons of Levi
  - of Levi’s children
  lexicon: HALOT
  rationale: Construct chain indicates filial descent. 'Sons' preserves the masculine
    genealogical wording more accurately than the broader 'children'.
- source_word: לְתֹלְדֹתָם
  chosen: according to their generations
  alternatives:
  - by their generations
  - according to their family lines
  lexicon: HALOT
  rationale: תולדות here marks descent/grouping by line of origin. 'According to their
    generations' stays close to the Hebrew while remaining understandable; 'family
    lines' is possible but slightly more interpretive.
- source_word: גֵּרְשׁוֹן
  chosen: Gershon
  rationale: Standard English transliteration of the personal name.
- source_word: קְהָת
  chosen: Kohath
  alternatives:
  - Qehath
  rationale: Standard conventional English transliteration.
- source_word: מְרָרִי
  chosen: Merari
  rationale: Standard conventional English transliteration.
- source_word: וּשְׁנֵי חַיֵּי לֵוִי
  chosen: the years of Levi’s life
  alternatives:
  - the lifespan of Levi
  - the years of the life of Levi
  lexicon: HALOT
  rationale: Hebrew idiom literally 'the years of the life of Levi.' The chosen rendering
    is natural English and preserves the idiomatic sense without unnecessary stiffness.
- source_word: שֶׁבַע וּשְׁלֹשִׁים וּמְאַת שָׁנָה
  chosen: one hundred thirty-seven years
  alternatives:
  - a hundred and thirty-seven years
  lexicon: HALOT
  rationale: Standard English rendering of the Hebrew number sequence. 'One hundred
    thirty-seven years' is clear modern English.
