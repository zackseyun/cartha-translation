theological_decisions:
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The Hebrew is literally masculine plural construct. Following the project's
    gender-accurate policy, the masculine form is preserved where it carries representative
    corporate force. A more idiomatic inclusive alternative is preserved in a footnote
    for readability.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Force of divine 'remembering'
  chosen_reading: I have remembered my covenant
  alternative_readings:
  - I remembered my covenant
  rationale: The translation preserves the biblical covenantal idiom rather than paraphrasing
    it as 'I am acting on my covenant' or similar. This maintains theological tension
    and lets the text speak in its own terms.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
