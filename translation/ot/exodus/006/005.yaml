id: EXO.6.5
reference: Exodus 6:5
source:
  edition: WLC
  text: וְ/גַ֣ם אֲנִ֣י שָׁמַ֗עְתִּי אֶֽת נַאֲקַת֙ בְּנֵ֣י יִשְׂרָאֵ֔ל אֲשֶׁ֥ר מִצְרַ֖יִם
    מַעֲבִדִ֣ים אֹתָ֑/ם וָ/אֶזְכֹּ֖ר אֶת בְּרִיתִֽ/י׀־־׃
translation:
  text: And I also have heard the groaning of the sons of Israel, whom the Egyptians
    are enslaving, and I have remembered my covenant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or 'the people of Israel.' The Hebrew reads literally
      'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: '''Remembered'' here is covenant language: not that God had forgotten, but
      that he is turning toward his covenant in action.'
    reason: cultural_note
lexical_decisions:
- source_word: וְגַם
  chosen: And also
  alternatives:
  - And indeed
  - Moreover
  lexicon: HALOT
  rationale: Conveys additive emphasis linking this statement to the preceding divine
    speech. Rendered naturally in English as 'And I also' with the pronoun following
    for emphasis.
- source_word: אֲנִי
  chosen: I
  lexicon: HALOT
  rationale: 'Explicit pronoun is retained in English because it adds emphasis to
    the divine speaker: ''I also have heard.'''
- source_word: שָׁמַעְתִּי
  chosen: have heard
  alternatives:
  - heard
  lexicon: HALOT
  rationale: Perfect verb in this context expresses a present state resulting from
    completed action within the speech; English present perfect captures the force
    better than a simple past.
- source_word: נַאֲקַת
  chosen: the groaning
  alternatives:
  - the moaning
  - the lament
  lexicon: HALOT
  rationale: '''Groaning'' best reflects the sense of anguished outcry under oppression
    and matches common biblical usage without becoming archaic.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Follows the Hebrew expression more closely. Per translation philosophy,
    gender-accurate rendering is preferred where the source uses a masculine plural
    with corporate force; here it denotes the covenant people corporately, not only
    males.
- source_word: אֲשֶׁר
  chosen: whom
  alternatives:
  - that
  lexicon: HALOT
  rationale: Introduces a relative clause referring to the people of Israel as the
    object of Egyptian oppression; 'whom' is idiomatic for persons in English.
- source_word: מִצְרַיִם
  chosen: the Egyptians
  alternatives:
  - Egypt
  lexicon: HALOT
  rationale: Although the noun is formally 'Egypt,' the plural participle 'are enslaving'
    indicates the agents are Egyptians; English personalizes the subject naturally
    as 'the Egyptians.'
- source_word: מַעֲבִדִים
  chosen: are enslaving
  alternatives:
  - are making serve
  - are forcing into labor
  - are holding in bondage
  lexicon: HALOT
  rationale: Hiphil of עבד here denotes causing to serve under oppression. 'Are enslaving'
    makes the coercive force explicit and fits the Exodus context better than the
    weaker 'are making serve.'
- source_word: וָאֶזְכֹּר
  chosen: I have remembered
  alternatives:
  - I remembered
  - I call to mind
  lexicon: HALOT
  rationale: In divine speech, 'remember' refers not to recovering forgotten information
    but to covenantal turning toward action. Present perfect in English preserves
    the discourse connection with the preceding perfect and the immediacy of divine
    response.
- source_word: בְּרִיתִי
  chosen: my covenant
  lexicon: HALOT
  rationale: Standard rendering for בְּרִית, especially in covenantal contexts central
    to Exodus.
