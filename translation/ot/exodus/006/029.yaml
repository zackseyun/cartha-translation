id: EXO.6.29
reference: Exodus 6:29
source:
  edition: WLC
  text: וַ/יְדַבֵּ֧ר יְהוָ֛ה אֶל מֹשֶׁ֥ה לֵּ/אמֹ֖ר אֲנִ֣י יְהוָ֑ה דַּבֵּ֗ר אֶל פַּרְעֹה֙ מֶ֣לֶךְ מִצְרַ֔יִם אֵ֛ת כָּל אֲשֶׁ֥ר אֲנִ֖י דֹּבֵ֥ר אֵלֶֽי/ךָ־־־׃
translation:
  text: Then Yahweh spoke to Moses, saying, “I am Yahweh. Speak to Pharaoh king of Egypt all that I speak to you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “all that I am speaking to you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: Then ... spoke
  alternatives:
  - And ... spoke
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... spoke' gives natural English narrative progression while preserving the verbal sense of דבר.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: The infinitive introduces direct speech; 'saying' is the standard concise English equivalent.
- source_word: אֲנִי יְהוָה
  chosen: I am the LORD
  alternatives:
  - I am Yahweh
  lexicon: HALOT
  rationale: The verbless clause is naturally rendered in English with 'am.' Retaining the self-identification is important in Exodus, and 'the LORD' follows the project's default for YHWH.
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Tell
  lexicon: HALOT
  rationale: The imperative of דבר is best rendered 'Speak' here, preserving the verbal link with the repeated root in the verse and the formal command structure.
- source_word: פַּרְעֹה מֶלֶךְ מִצְרַיִם
  chosen: Pharaoh king of Egypt
  alternatives:
  - Pharaoh, the king of Egypt
  lexicon: HALOT
  rationale: This closely reflects the Hebrew appositional construction while remaining idiomatic English.
- source_word: אֵת כָּל אֲשֶׁר
  chosen: all that
  alternatives:
  - everything that
  - all which
  lexicon: HALOT
  rationale: This combination marks the total content of what is to be conveyed. 'All that' is both accurate and natural.
- source_word: אֲנִי דֹּבֵר אֵלֶיךָ
  chosen: I speak to you
  alternatives:
  - I am speaking to you
  - I tell you
  lexicon: HALOT
  rationale: The participle דֹּבֵר can be progressive ('am speaking'), but in this command context an English simple present best conveys ongoing/repeated divine speech without awkwardness. 'Speak ... all that I speak to you' also preserves the repetition of דבר across the verse.
