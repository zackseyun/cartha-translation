id: EXO.6.28
reference: Exodus 6:28
source:
  edition: WLC
  text: וַ/יְהִ֗י בְּ/י֨וֹם דִּבֶּ֧ר יְהוָ֛ה אֶל מֹשֶׁ֖ה בְּ/אֶ֥רֶץ מִצְרָֽיִם־׃פ
translation:
  text: Now it happened on the day when the LORD spoke to Moses in the land of Egypt—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And it happened' / 'And it came to pass.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'YHWH'; traditionally rendered 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now it happened
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive form of היה introduces a narrative transition. 'Now
    it happened' preserves the discourse function in readable modern English without
    the archaic feel of 'it came to pass.'
- source_word: בְּיוֹם
  chosen: on the day
  alternatives:
  - when
  - in the day
  lexicon: HALOT
  rationale: Literally 'on the day.' This keeps the temporal expression close to the
    Hebrew while remaining natural in English. The following clause clarifies the
    timing.
- source_word: דִּבֶּר
  chosen: spoke
  alternatives:
  - spoke to
  - said to
  lexicon: HALOT
  rationale: The verb דבר commonly means 'speak.' The preposition אֶל with Moses supplies
    the indirect object, so English naturally renders the whole phrase as 'spoke to
    Moses.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD,'
    following established reverential convention and the stated default for this contested
    term.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: 'Standard rendering of the preposition in this verbal construction: ''spoke
    to Moses.'''
- source_word: בְּאֶרֶץ מִצְרַיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  - in the country of Egypt
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'land,' so 'in the land of Egypt' preserves
    the fuller expression rather than compressing it to simply 'in Egypt.'
