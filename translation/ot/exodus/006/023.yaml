id: EXO.6.23
reference: Exodus 6:23
source:
  edition: WLC
  text: וַ/יִּקַּ֨ח אַהֲרֹ֜ן אֶת אֱלִישֶׁ֧בַע בַּת עַמִּינָדָ֛ב אֲח֥וֹת נַחְשׁ֖וֹן
    ל֣/וֹ לְ/אִשָּׁ֑ה וַ/תֵּ֣לֶד ל֗/וֹ אֶת נָדָב֙ וְ/אֶת אֲבִיה֔וּא אֶת אֶלְעָזָ֖ר
    וְ/אֶת אִֽיתָמָֽר־־־־־־׃
translation:
  text: Aaron took Elisheba, the daughter of Amminadab and sister of Nahshon, as his
    wife, and she bore him Nadab, Abihu, Eleazar, and Ithamar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - married
  lexicon: HALOT
  rationale: The Hebrew verb לקח literally means 'took.' In marriage contexts it commonly
    means taking a woman as wife. Rendering it as 'took' preserves the source wording
    while the following phrase 'as his wife' makes the marital sense explicit.
- source_word: אֱלִישֶׁבַע
  chosen: Elisheba
  alternatives:
  - Elisabeth
  rationale: Personal names are transliterated by standard conventions rather than
    translated. 'Elisheba' closely reflects the Hebrew form.
- source_word: בַּת
  chosen: daughter of
  lexicon: HALOT
  rationale: The construct phrase marks direct filial relationship; 'daughter of'
    is the natural English equivalent.
- source_word: אֲחוֹת
  chosen: sister of
  lexicon: HALOT
  rationale: The noun straightforwardly identifies Nahshon's sibling relationship
    to Elisheba.
- source_word: לּוֹ לְאִשָּׁה
  chosen: as his wife
  alternatives:
  - for himself as a wife
  - to be his wife
  lexicon: HALOT
  rationale: This is the standard Hebrew marital expression. 'As his wife' is idiomatic
    modern English and preserves the formal marital sense.
- source_word: וַתֵּלֶד לוֹ
  chosen: and she bore him
  alternatives:
  - and she gave birth to for him
  lexicon: HALOT
  rationale: ילד with a personal indirect object is naturally rendered 'bore him,'
    meaning she bore children to him.
- source_word: נָדָב
  chosen: Nadab
  rationale: Proper name transliterated conventionally.
- source_word: אֲבִיהוּא
  chosen: Abihu
  rationale: Proper name transliterated conventionally.
- source_word: אֶלְעָזָר
  chosen: Eleazar
  rationale: Proper name transliterated conventionally.
- source_word: אִיתָמָר
  chosen: Ithamar
  rationale: Proper name transliterated conventionally.
