id: EXO.6.3
reference: Exodus 6:3
source:
  edition: WLC
  text: וָ/אֵרָ֗א אֶל אַבְרָהָ֛ם אֶל יִצְחָ֥ק וְ/אֶֽל יַעֲקֹ֖ב בְּ/אֵ֣ל שַׁדָּ֑י וּ/שְׁמִ֣/י
    יְהוָ֔ה לֹ֥א נוֹדַ֖עְתִּי לָ/הֶֽם־־־׃
translation:
  text: And I appeared to Abraham, to Isaac, and to Jacob as God Almighty, but by
    my name the LORD I was not known to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I did not make myself known to them by my name Yahweh.' The Hebrew
      may refer not to ignorance of the divine name itself, but to not yet knowing
      its full covenantal significance.
    reason: alternative_reading
  - marker: b
    text: Hebrew El Shaddai; traditionally rendered 'God Almighty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֵרָא
  chosen: And I appeared
  alternatives:
  - And I revealed myself
  lexicon: HALOT
  rationale: 'From ראה in the Niphal, first person singular: ''I appeared'' is the
    straightforward contextual sense in patriarchal theophany language. ''Revealed
    myself'' is possible as an interpretive expansion but is less direct than the
    Hebrew form warrants.'
- source_word: אֶל ... אֶל ... וְאֶל
  chosen: to Abraham, to Isaac, and to Jacob
  alternatives:
  - to Abraham, Isaac, and Jacob
  lexicon: HALOT
  rationale: The repeated preposition is naturally represented in English with repeated
    'to' for rhythm and emphasis, while remaining readable.
- source_word: בְּאֵל שַׁדָּי
  chosen: as God Almighty
  alternatives:
  - as El Shaddai
  - as God Shaddai
  lexicon: HALOT
  rationale: The preposition ב here is best rendered in a predicative/name sense,
    'as.' Following the translation philosophy to translate titles rather than transliterate
    them, אֵל שַׁדַּי is rendered 'God Almighty.' 'El Shaddai' is preserved as an
    alternative because it is familiar and more formally transparent.
- source_word: וּשְׁמִי יְהוָה
  chosen: but by my name the LORD
  alternatives:
  - but by my name YHWH
  - but by my name Yahweh
  lexicon: HALOT
  rationale: The phrase introduces the divine name as the point of contrast. Per doctrine,
    יְהוָה is rendered 'the LORD' rather than transliterated. 'By my name' preserves
    the Hebrew construction better than smoothing to 'as the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: 'This follows the stated default for the divine name in DOCTRINE.md:
    ''the LORD,'' preserving Jewish reverence tradition and the Septuagintal pattern.'
- source_word: לֹא נוֹדַעְתִּי לָהֶם
  chosen: I was not known to them
  alternatives:
  - I did not make myself known to them
  - they did not know me
  lexicon: HALOT
  rationale: The Niphal of ידע can be rendered statively/passively ('was known') or
    with a reflexive/causative nuance in context ('made myself known'). The more formally
    transparent rendering 'I was not known to them' preserves the Hebrew wording and
    leaves the interpretive tension intact. The alternative is important because the
    patriarchs do encounter the divine name elsewhere, suggesting a distinction in
    depth or mode of revelation rather than absolute ignorance.
