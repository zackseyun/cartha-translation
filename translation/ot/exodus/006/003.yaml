theological_decisions:
- issue: Meaning of the clause about the divine name in relation to the patriarchs
  chosen_reading: Retain the formal wording 'I was not known to them' without resolving
    whether this means absolute non-disclosure of the name or non-disclosure of its
    full covenantal significance.
  alternative_readings:
  - I did not make myself known to them by my name the LORD
  - they did not know me as the LORD in the fuller sense of covenant fulfillment
  rationale: The Hebrew permits a rendering that preserves tension. Since Genesis
    contains occurrences of the divine name in patriarchal contexts, the verse is
    often understood as speaking not of mere phonetic knowledge of the name but of
    experiential/covenantal knowledge of what that name signifies. The translation
    should not import that interpretation into the main text beyond what the Hebrew
    states, but it should preserve the alternative in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it; Contested terms table for יְהוָה → the LORD'
