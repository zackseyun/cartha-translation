id: EXO.6.19
reference: Exodus 6:19
source:
  edition: WLC
  text: וּ/בְנֵ֥י מְרָרִ֖י מַחְלִ֣י וּ/מוּשִׁ֑י אֵ֛לֶּה מִשְׁפְּחֹ֥ת הַ/לֵּוִ֖י לְ/תֹלְדֹתָֽ/ם׃
translation:
  text: 'And the sons of Merari: Mahli and Mushi. These are the clans of the Levite
    according to their generations.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the families of the Levite' or 'the clans of Levi.' The Hebrew singular
      'the Levite' likely functions collectively for the Levitical line.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְנֵי
  chosen: And the sons of
  alternatives:
  - And the children of
  - Now the sons of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'son' and in genealogical contexts
    is most naturally rendered 'sons of.' The prefixed conjunction is carried over
    as 'And' to preserve the list structure.
- source_word: מְרָרִי
  chosen: Merari
  rationale: Proper personal name; transliterated per translation philosophy.
- source_word: מַחְלִי
  chosen: Mahli
  rationale: Proper personal name; transliterated.
- source_word: וּ/מוּשִׁי
  chosen: and Mushi
  rationale: Proper personal name with conjunction; transliterated and linked with
    'and' in standard English list form.
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These
  lexicon: HALOT
  rationale: 'The demonstrative introduces an identifying clause. English idiom normally
    supplies the copula: ''These are.'''
- source_word: מִשְׁפְּחֹת
  chosen: the clans
  alternatives:
  - the families
  lexicon: HALOT
  rationale: In tribal/genealogical contexts מִשְׁפָּחוֹת refers to kinship subdivisions
    within a tribe. 'Clans' is more precise than the broader 'families' in English.
- source_word: הַ/לֵּוִי
  chosen: of the Levite
  alternatives:
  - of Levi
  - of the Levites
  lexicon: HALOT
  rationale: The singular with article is best taken collectively/gentilically here,
    referring to the Levitical line represented by Levi. 'Of the Levite' preserves
    the singular form of the Hebrew more closely than 'of the Levites,' while still
    making sense in context.
- source_word: לְ/תֹלְדֹתָם
  chosen: according to their generations
  alternatives:
  - by their generations
  - according to their family records
  lexicon: HALOT
  rationale: תּוֹלְדוֹת in genealogical formulas denotes lines of descent or generations.
    'According to their generations' preserves the formal genealogical register of
    the Hebrew.
