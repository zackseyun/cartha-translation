id: EXO.6.4
reference: Exodus 6:4
source:
  edition: WLC
  text: וְ/גַ֨ם הֲקִמֹ֤תִי אֶת בְּרִיתִ/י֙ אִתָּ֔/ם לָ/תֵ֥ת לָ/הֶ֖ם אֶת אֶ֣רֶץ כְּנָ֑עַן
    אֵ֛ת אֶ֥רֶץ מְגֻרֵי/הֶ֖ם אֲשֶׁר גָּ֥רוּ בָֽ/הּ־־־׃
translation:
  text: I also established my covenant with them, to give them the land of Canaan,
    the land where they lived as sojourners.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “the land of their sojournings, in which they sojourned.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: I also
  alternatives:
  - and also
  - also
  lexicon: HALOT
  rationale: Conveys the additive force of וְ plus גַם in smooth English while linking
    this statement to the preceding self-revelation.
- source_word: הֲקִמֹתִי
  chosen: established
  alternatives:
  - confirmed
  - upheld
  - set up
  lexicon: HALOT
  rationale: For קום with בְּרִית, 'establish' is standard covenantal language in
    English and fits the idiom better than the more wooden 'raised up.' 'Confirmed'
    is possible, but 'established' best preserves the covenant formula.
- source_word: בְּרִיתִי
  chosen: my covenant
  lexicon: HALOT
  rationale: Standard rendering of בְּרִית in covenant contexts; possessive suffix
    retained explicitly.
- source_word: אִתָּם
  chosen: with them
  lexicon: HALOT
  rationale: Straightforward relational preposition with pronominal suffix, referring
    to the patriarchs in context.
- source_word: לָתֵת לָהֶם
  chosen: to give them
  alternatives:
  - to give to them
  lexicon: HALOT
  rationale: Infinitive of purpose with indirect object; idiomatic English omits the
    repeated preposition.
- source_word: אֶרֶץ כְּנָעַן
  chosen: the land of Canaan
  alternatives:
  - Canaan
  - the land Canaan
  lexicon: HALOT
  rationale: Retains both the noun 'land' and the proper name, matching the Hebrew
    construct phrase.
- source_word: אֶרֶץ מְגֻרֵיהֶם
  chosen: the land where they lived as sojourners
  alternatives:
  - the land of their sojournings
  - the land of their temporary residence
  - the land of their wanderings
  lexicon: HALOT
  rationale: מָגוּר denotes sojourning/residence as an alien. A more literal 'land
    of their sojournings' is possible, but this rendering communicates the social
    status implied by the noun in natural English while preserving the idea of temporary
    alien residence.
- source_word: אֲשֶׁר גָּרוּ בָהּ
  chosen: where they lived as sojourners
  alternatives:
  - in which they sojourned
  - where they resided as foreigners
  lexicon: HALOT
  rationale: The verb גור is closely related to מָגוּר and denotes residing as an
    alien/sojourner. Rendering both noun and verb with 'sojourn' language preserves
    the lexical connection, while 'lived as sojourners' is more readable than repeating
    'sojourned' in English.
