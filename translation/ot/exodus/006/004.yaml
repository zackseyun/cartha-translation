theological_decisions:
- issue: Covenant idiom of קום + ברית
  chosen_reading: established my covenant
  alternative_readings:
  - confirmed my covenant
  rationale: The phrase refers to God's binding covenant commitment to the patriarchs.
    'Established' preserves covenantal solemnity without importing later theological
    distinctions beyond the Hebrew idiom.
