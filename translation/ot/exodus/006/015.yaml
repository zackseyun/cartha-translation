id: EXO.6.15
reference: Exodus 6:15
source:
  edition: WLC
  text: וּ/בְנֵ֣י שִׁמְע֗וֹן יְמוּאֵ֨ל וְ/יָמִ֤ין וְ/אֹ֨הַד֙ וְ/יָכִ֣ין וְ/צֹ֔חַר
    וְ/שָׁא֖וּל בֶּן הַֽ/כְּנַעֲנִ֑ית אֵ֖לֶּה מִשְׁפְּחֹ֥ת שִׁמְעֽוֹן־׃
translation:
  text: 'And the sons of Simeon: Jemuel, and Jamin, and Ohad, and Jakin, and Zohar,
    and Shaul the son of the Canaanite woman. These are the clans of Simeon.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Shaul is traditionally rendered 'Saul.' The Hebrew form here is שָׁאוּל
      (Shaul).
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - And the children of
  - Now the sons of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'son' and in genealogical lists is
    most naturally rendered 'sons of.' 'And' preserves the prefixed conjunction in
    the ongoing genealogy.
- source_word: שִׁמְעוֹן
  chosen: Simeon
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to standard English convention
    per translation philosophy.
- source_word: יְמוּאֵל
  chosen: Jemuel
  alternatives:
  - Yemuel
  lexicon: HALOT
  rationale: Proper name transliterated in its conventional English biblical form.
    'Jemuel' matches established English usage for this Hebrew name.
- source_word: וְיָמִין
  chosen: and Jamin
  alternatives:
  - and Yamin
  lexicon: HALOT
  rationale: Proper name with conjunction; transliterated in conventional English
    form while preserving the repeated waw with 'and' in the list.
- source_word: וְאֹהַד
  chosen: and Ohad
  lexicon: HALOT
  rationale: Proper name with conjunction; straightforward transliteration.
- source_word: וְיָכִין
  chosen: and Jakin
  alternatives:
  - and Yakin
  lexicon: HALOT
  rationale: Proper name with conjunction; 'Jakin' reflects standard English biblical
    transliteration.
- source_word: וְצֹחַר
  chosen: and Zohar
  alternatives:
  - and Zohar/Zochar
  lexicon: HALOT
  rationale: Proper name with conjunction; 'Zohar' is the conventional English form.
- source_word: וְשָׁאוּל
  chosen: and Shaul
  alternatives:
  - and Saul
  lexicon: HALOT
  rationale: The Hebrew name is שָׁאוּל. To follow the philosophy of transliterating
    personal names directly from Hebrew rather than defaulting to later anglicized
    forms shaped by other biblical figures, 'Shaul' is preferred. 'Saul' is a familiar
    traditional alternative worth preserving.
- source_word: בֶּן הַכְּנַעֲנִית
  chosen: the son of the Canaanite woman
  alternatives:
  - son of the Canaanitess
  - son of the Canaanite
  lexicon: HALOT
  rationale: בֶּן means 'son of.' The feminine singular gentilic/noun הַכְּנַעֲנִית
    indicates a female Canaanite, so English should make the feminine explicit. 'Canaanite
    woman' is clear modern English; 'Canaanitess' is archaic.
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These
  lexicon: HALOT
  rationale: 'The verbless Hebrew clause is naturally rendered in English with an
    implied copula: ''These are.'''
- source_word: מִשְׁפְּחֹת
  chosen: the clans of
  alternatives:
  - the families of
  lexicon: HALOT
  rationale: In tribal/genealogical contexts, מִשְׁפָּחָה refers to kinship groupings
    within a tribe. 'Clans' best captures the social structure more precisely than
    the broader modern term 'families.'
- source_word: שִׁמְעוֹן
  chosen: Simeon
  lexicon: HALOT
  rationale: Repeated tribal/personal name; transliterated consistently.
