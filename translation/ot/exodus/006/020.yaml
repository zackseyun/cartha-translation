theological_decisions:
- issue: Rendering of the close-kin term in a verse that reports a marriage later
    prohibited in Torah law
  chosen_reading: his aunt
  alternative_readings:
  - his father's sister
  rationale: The verse narrates a genealogical fact without explicit moral comment.
    The translation should not soften or intensify the relationship beyond what the
    Hebrew states. 'His aunt' communicates the kinship clearly while avoiding unnecessary
    interpretive specificity not stated in this verse alone.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
