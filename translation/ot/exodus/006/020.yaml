id: EXO.6.20
reference: Exodus 6:20
source:
  edition: WLC
  text: וַ/יִּקַּ֨ח עַמְרָ֜ם אֶת יוֹכֶ֤בֶד דֹּֽדָת/וֹ֙ ל֣/וֹ לְ/אִשָּׁ֔ה וַ/תֵּ֣לֶד
    ל֔/וֹ אֶֽת אַהֲרֹ֖ן וְ/אֶת מֹשֶׁ֑ה וּ/שְׁנֵי֙ חַיֵּ֣י עַמְרָ֔ם שֶׁ֧בַע וּ/שְׁלֹשִׁ֛ים
    וּ/מְאַ֖ת שָׁנָֽה־־־׃
translation:
  text: Amram took Jochebed, his aunt, as his wife, and she bore to him Aaron and
    Moses. The years of Amram’s life were 137 years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more specifically, 'his father’s sister,' if the kinship term is taken
      in its narrower sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - married
  lexicon: HALOT
  rationale: The verb לקח literally means 'took.' In marriage contexts English can
    say 'married,' but 'took ... as his wife' preserves the Hebrew idiom while remaining
    natural.
- source_word: דֹּדָתוֹ
  chosen: his aunt
  alternatives:
  - his father's sister
  - his kinswoman
  lexicon: HALOT
  rationale: דּוֹד can denote an uncle, and the feminine form here refers to the corresponding
    female relative. In this genealogical context 'his aunt' is the most natural concise
    rendering. More specific formulations such as 'his father's sister' are interpretive
    and not explicit in this verse.
- source_word: לְאִשָּׁה
  chosen: as his wife
  alternatives:
  - for a wife
  - as a wife
  lexicon: HALOT
  rationale: This prepositional phrase marks the marital relationship. 'As his wife'
    is idiomatic modern English and preserves the sense of formal marriage.
- source_word: וַתֵּלֶד לוֹ
  chosen: and she bore to him
  alternatives:
  - and she gave birth to
  - and she bore him
  lexicon: HALOT
  rationale: ילד in the Qal with indirect object means 'bore/gave birth to.' 'Bore
    to him' is slightly more formal but fits the genealogical register and reflects
    the Hebrew structure.
- source_word: שְׁנֵי חַיֵּי
  chosen: The years of ... life
  alternatives:
  - the lifespan of
  - the length of ... life was
  lexicon: HALOT
  rationale: This construct expression is a standard Hebrew way of stating lifespan.
    'The years of Amram’s life' preserves the form while reading naturally in English.
- source_word: שֶׁבַע וּשְׁלֹשִׁים וּמְאַת שָׁנָה
  chosen: 137 years
  alternatives:
  - a hundred and thirty-seven years
  lexicon: HALOT
  rationale: The Hebrew lists the number components in ascending order after 'hundred.'
    Rendering as '137 years' gives clear modern English while preserving the numerical
    value exactly.
- source_word: יוֹכֶבֶד / אַהֲרֹן / מֹשֶׁה / עַמְרָם
  chosen: Jochebed / Aaron / Moses / Amram
  rationale: Personal names are transliterated by standard English conventions in
    keeping with the project's philosophy.
