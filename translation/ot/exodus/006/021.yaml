id: EXO.6.21
reference: Exodus 6:21
source:
  edition: WLC
  text: וּ/בְנֵ֖י יִצְהָ֑ר קֹ֥רַח וָ/נֶ֖פֶג וְ/זִכְרִֽי׃
translation:
  text: 'And the sons of Izhar: Korah, Nepheg, and Zichri.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּ/בְנֵי
  chosen: And the sons of
  alternatives:
  - Now the sons of
  - And the descendants of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'son' and in genealogical contexts
    is most naturally rendered 'sons of.' The prefixed conjunction ו is carried as
    'And' to preserve the list structure of the genealogy. 'Descendants of' is possible
    in broader genealogical usage, but here the immediate naming of three males favors
    the more specific 'sons of.'
- source_word: יִצְהָר
  chosen: Izhar
  alternatives:
  - Jizhar
  lexicon: HALOT
  rationale: Proper personal name; per translation philosophy, names are transliterated
    rather than translated. 'Izhar' is the standard English convention in this context.
- source_word: קֹרַח
  chosen: Korah
  lexicon: HALOT
  rationale: Proper personal name, transliterated by standard convention.
- source_word: וָ/נֶפֶג
  chosen: and Nepheg
  alternatives:
  - and Nefeg
  lexicon: HALOT
  rationale: Proper personal name with prefixed conjunction. Standard English biblical
    convention favors 'Nepheg.'
- source_word: וְ/זִכְרִי
  chosen: and Zichri
  alternatives:
  - and Zikri
  lexicon: HALOT
  rationale: Proper personal name with prefixed conjunction. 'Zichri' is the conventional
    English transliteration and preserves recognizability across biblical references.
