id: EXO.6.2
reference: Exodus 6:2
source:
  edition: WLC
  text: וַ/יְדַבֵּ֥ר אֱלֹהִ֖ים אֶל מֹשֶׁ֑ה וַ/יֹּ֥אמֶר אֵלָ֖י/ו אֲנִ֥י יְהוָֽה־׃
translation:
  text: God spoke to Moses and said to him, “I am Yahweh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: YHWH; alternatively rendered ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - addressed
  - spoke with
  lexicon: HALOT
  rationale: The waw-consecutive verb from דבר introduces divine speech in standard narrative style. 'Spoke' is the most natural and sufficiently formal English rendering here.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Although morphologically plural, with singular verbal agreement here it refers to the God of Israel. 'God' is the standard singular English rendering in this context.
- source_word: אֶל
  chosen: to
  alternatives:
  - with
  lexicon: HALOT
  rationale: The preposition marks the indirect object of speech. 'To' best fits English idiom with 'spoke'.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Personal name transliterated by standard English convention, per translation philosophy.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - declared
  lexicon: HALOT
  rationale: The common verb אמר is most naturally rendered 'said.' Keeping both 'spoke' and 'said' reflects the Hebrew's two speech verbs without unnecessary paraphrase.
- source_word: אֵלָיו
  chosen: to him
  lexicon: HALOT
  rationale: The preposition plus 3ms suffix refers back to Moses. 'To him' is the straightforward rendering.
- source_word: אֲנִי
  chosen: I am
  alternatives:
  - I
  lexicon: HALOT
  rationale: Hebrew nominal clauses regularly omit the present-tense copula; English requires 'am' for natural expression. Rendering 'I am' preserves the emphatic self-identification.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
