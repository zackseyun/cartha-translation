id: EXO.6.10
reference: Exodus 6:10
source:
  edition: WLC
  text: וַ/יְדַבֵּ֥ר יְהוָ֖ה אֶל מֹשֶׁ֥ה לֵּ/אמֹֽר־׃
translation:
  text: Then the LORD spoke to Moses, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; alternatively rendered ''Yahweh'' or ''Jehovah.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: Then spoke
  alternatives:
  - And spoke
  - said
  lexicon: HALOT
  rationale: The waw-consecutive with דבר advances the narrative. In English, 'Then
    ... spoke' naturally conveys sequential progression here. 'Said' is possible,
    but דבר commonly carries the sense 'speak' rather than the more generic 'say.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the
    LORD,' following Jewish reverence tradition and longstanding English convention
    reflecting the Hebrew name distinctly.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard prepositional sense indicating direction of speech toward Moses.
    'To' is the clear modern English equivalent.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name מֹשֶׁה.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: The infinitive construct introducing direct discourse is idiomatically
    rendered 'saying' in English narrative formulae. This preserves the formal structure
    without awkwardness.
