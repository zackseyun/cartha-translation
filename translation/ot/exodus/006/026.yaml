theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: Gendered expression בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the children of Israel
  - the Israelites
  rationale: The Hebrew is grammatically masculine plural and the translation philosophy prefers gender-accurate renderings over flattening to gender-neutral language unless context clearly demands otherwise. A footnote preserves smoother alternatives for readers.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #4'
- issue: Meaning of עַל צִבְאֹתָם
  chosen_reading: according to their divisions
  alternative_readings:
  - by their hosts
  - with their armies
  rationale: The term can evoke military 'hosts,' but in this context the emphasis is on ordered departure of Israel's groups. The chosen rendering preserves the organizational sense without importing a stronger militarized nuance than the immediate context requires.
