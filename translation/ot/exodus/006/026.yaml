id: EXO.6.26
reference: Exodus 6:26
source:
  edition: WLC
  text: ה֥וּא אַהֲרֹ֖ן וּ/מֹשֶׁ֑ה אֲשֶׁ֨ר אָמַ֤ר יְהוָה֙ לָ/הֶ֔ם הוֹצִ֜יאוּ אֶת בְּנֵ֧י יִשְׂרָאֵ֛ל מֵ/אֶ֥רֶץ מִצְרַ֖יִם עַל צִבְאֹתָֽ/ם־־׃
translation:
  text: It was Aaron and Moses to whom Yahweh said, “Bring the sons of Israel out from the land of Egypt by their hosts.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “These were Aaron and Moses.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “the sons of Israel”; traditional English often has “the children of Israel,” and a contextual rendering is “the Israelites.”
    reason: lexical_alternative
  - marker: c
    text: Or “by their hosts” or “with their companies”; the Hebrew term can denote organized groups, even military-style formations.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוּא
  chosen: It was
  alternatives:
  - These were
  - This was
  lexicon: HALOT
  rationale: 'The independent pronoun functions demonstratively/emphatically, identifying the previously listed persons. English idiom commonly renders this as a cleft-like identification: ''It was Aaron and Moses.'' ''These were'' is also possible, but the singular pronoun with the compound subject is naturally handled in English by the singular introductory formula.'
- source_word: אַהֲרֹן וּמֹשֶׁה
  chosen: Aaron and Moses
  alternatives:
  - Aaron and Moshe
  rationale: Standard English transliterations of the personal names are used, following the guideline to transliterate names by standard conventions.
- source_word: אֲשֶׁר
  chosen: to whom
  alternatives:
  - whom
  - that
  lexicon: HALOT
  rationale: The relative particle introduces the clause identifying Aaron and Moses as the ones addressed by the LORD. Because the clause includes לָהֶם ('to them'), idiomatic English brings out the dative relation with 'to whom.'
- source_word: אָמַר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: The common verb 'say' is the plain sense here. 'Spoke' is possible but less direct given the quoted command that follows.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הוֹצִיאוּ
  chosen: Bring ... out
  alternatives:
  - Lead ... out
  - Take ... out
  lexicon: HALOT
  rationale: Hiphil imperative of יצא here means to cause to go out, i.e., bring/lead out. 'Bring ... out' is natural English and preserves the causative force without overformal stiffness.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: A more formally transparent rendering preserves the familial expression בני ישראל. In line with the gender-accurate principle, 'sons' reflects the masculine plural construct in the source. 'Israelites' is smoother but less explicit; 'children of Israel' is traditional but less precise to the Hebrew form.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: out from the land of Egypt
  alternatives:
  - from the land of Egypt
  - out of Egypt
  lexicon: HALOT
  rationale: The phrase marks source/origin. 'Out from the land of Egypt' preserves both the exodus movement and the explicit mention of 'land.'
- source_word: עַל צִבְאֹתָם
  chosen: according to their divisions
  alternatives:
  - by their hosts
  - according to their companies
  - with their armies
  lexicon: HALOT
  rationale: צָבָא often denotes host, army, or organized company. In the exodus context it conveys ordered groupings rather than military aggression alone. 'According to their divisions' communicates organized arrangement in readable modern English while preserving the collective-structural sense.
