id: EXO.6.25
reference: Exodus 6:25
source:
  edition: WLC
  text: וְ/אֶלְעָזָ֨ר בֶּֽן אַהֲרֹ֜ן לָקַֽח ל֨/וֹ מִ/בְּנ֤וֹת פּֽוּטִיאֵל֙ ל֣/וֹ לְ/אִשָּׁ֔ה
    וַ/תֵּ֥לֶד ל֖/וֹ אֶת פִּֽינְחָ֑ס אֵ֗לֶּה רָאשֵׁ֛י אֲב֥וֹת הַ/לְוִיִּ֖ם לְ/מִשְׁפְּחֹתָֽ/ם־־־׃
translation:
  text: And Eleazar son of Aaron took for himself a wife from the daughters of Putiel,
    and she bore him Phinehas. These are the heads of the fathers’ houses of the Levites
    by their clans.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one of the daughters of Putiel.' The Hebrew expression may denote marriage
      into Putiel’s family without specifying which daughter.
    reason: lexical_alternative
  - marker: b
    text: Literally 'heads of fathers' houses,' a kinship term for leading ancestral
      households within the Levite clans.
    reason: cultural_note
lexical_decisions:
- source_word: לָקַח לּוֹ ... לְאִשָּׁה
  chosen: took for himself a wife
  alternatives:
  - took a wife for himself
  - married
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'took for himself ... as a wife.' 'Took
    for himself a wife' preserves the marital idiom without flattening it to the more
    interpretive 'married.'
- source_word: מִבְּנוֹת פּוּטִיאֵל
  chosen: from the daughters of Putiel
  alternatives:
  - one of the daughters of Putiel
  - from among the daughters of Putiel
  lexicon: HALOT
  rationale: The preposition מִן with 'daughters' indicates source/group membership.
    'From the daughters of Putiel' is a natural English rendering that preserves the
    Hebrew genealogical style.
- source_word: וַתֵּלֶד לוֹ אֶת־פִּינְחָס
  chosen: and she bore him Phinehas
  alternatives:
  - and bore Phinehas to him
  - and gave birth to Phinehas for him
  lexicon: HALOT
  rationale: The feminine singular verb has Putiel's daughter/wife as subject. 'She
    bore him Phinehas' is idiomatic English and preserves both the maternal subject
    and the dative pronoun.
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These were
  lexicon: HALOT
  rationale: The demonstrative introduces a concluding identification in the genealogy.
    Present tense works naturally in English for this discourse function.
- source_word: רָאשֵׁי אֲבוֹת
  chosen: the heads of the fathers’ houses
  alternatives:
  - the heads of the fathers
  - the chiefs of the ancestral houses
  lexicon: HALOT
  rationale: This is a genealogical/social expression referring to clan-household
    heads, not merely biological fathers. 'Fathers’ houses' preserves the technical
    kinship structure better than a simplified rendering.
- source_word: הַלְוִיִּם
  chosen: the Levites
  alternatives:
  - the descendants of Levi
  lexicon: HALOT
  rationale: In context this refers to the tribal group descended from Levi. 'The
    Levites' is the standard and sufficiently precise English rendering.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their families
  - by their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in genealogical contexts often denotes clan groupings. 'By
    their clans' is concise, natural, and socially accurate in English.
- source_word: פּוּטִיאֵל / פִּינְחָס / אֶלְעָזָר / אַהֲרֹן
  chosen: Putiel / Phinehas / Eleazar / Aaron
  lexicon: standard transliteration conventions
  rationale: Per translation philosophy, personal names are transliterated rather
    than translated.
