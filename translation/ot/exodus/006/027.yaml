id: EXO.6.27
reference: Exodus 6:27
source:
  edition: WLC
  text: הֵ֗ם הַֽ/מְדַבְּרִים֙ אֶל פַּרְעֹ֣ה מֶֽלֶךְ מִצְרַ֔יִם לְ/הוֹצִ֥יא אֶת בְּנֵֽי
    יִשְׂרָאֵ֖ל מִ/מִּצְרָ֑יִם ה֥וּא מֹשֶׁ֖ה וְ/אַהֲרֹֽן־־־־׃
translation:
  text: These are the ones who spoke to Pharaoh king of Egypt to bring the sons of
    Israel out of Egypt—this is Moses and Aaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'They are the ones who were speaking to Pharaoh king
      of Egypt.' The Hebrew uses a participle for ongoing characterization.
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has 'the children of Israel'; Hebrew is more specifically
      'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵם
  chosen: These are the ones
  alternatives:
  - They are the ones
  - These
  lexicon: HALOT
  rationale: The independent pronoun is used demonstratively and resumptively, identifying
    the previously named persons. 'These are the ones' brings out the emphatic identification
    in natural English.
- source_word: הַמְדַבְּרִים
  chosen: who spoke
  alternatives:
  - who were speaking
  - the ones speaking
  lexicon: HALOT
  rationale: The participle functions substantivally to describe Moses and Aaron by
    their action toward Pharaoh. English idiom prefers the relative clause 'who spoke'
    here over a more wooden participial form.
- source_word: אֶל
  chosen: to
  alternatives:
  - with
  - unto
  lexicon: HALOT
  rationale: 'Standard directional sense with the verb ''speak'' in this context:
    they spoke to Pharaoh.'
- source_word: פַּרְעֹה מֶלֶךְ מִצְרַיִם
  chosen: Pharaoh king of Egypt
  alternatives:
  - Pharaoh, the king of Egypt
  lexicon: HALOT
  rationale: A close rendering of the appositional royal title. Comma omitted in the
    main text for compactness, though English punctuation could also mark apposition.
- source_word: לְהוֹצִיא
  chosen: to bring ... out
  alternatives:
  - to bring forth
  - to lead ... out
  lexicon: HALOT
  rationale: The Hiphil of יצא means to cause to go out. 'Bring ... out' is natural
    English and preserves the causative sense without overinterpreting as 'lead'.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Following the project's gender-accurate policy, the masculine plural
    construct is rendered 'sons of Israel.' 'Children of Israel' is traditional but
    less formally precise; 'Israelites' is smoother but less transparent to the Hebrew
    expression.
- source_word: מִמִּצְרָיִם
  chosen: out of Egypt
  alternatives:
  - from Egypt
  lexicon: HALOT
  rationale: With 'bring out,' English idiom naturally takes 'out of Egypt,' matching
    the exodus motif.
- source_word: הוּא
  chosen: this is
  alternatives:
  - it is
  - he is
  lexicon: HALOT
  rationale: 'The singular pronoun introduces an identifying conclusion: ''this is
    Moses and Aaron.'' Although formally singular before a compound subject, English
    uses ''this is'' idiomatically for identification.'
- source_word: מֹשֶׁה וְאַהֲרֹן
  chosen: Moses and Aaron
  lexicon: HALOT
  rationale: Standard transliteration of the personal names, in keeping with the translation
    philosophy to transliterate names rather than translate them.
