id: EXO.34.32
reference: Exodus 34:32
source:
  edition: WLC
  text: וְ/אַחֲרֵי כֵ֥ן נִגְּשׁ֖וּ כָּל בְּנֵ֣י יִשְׂרָאֵ֑ל וַ/יְצַוֵּ֕/ם אֵת֩ כָּל
    אֲשֶׁ֨ר דִּבֶּ֧ר יְהוָ֛ה אִתּ֖/וֹ בְּ/הַ֥ר סִינָֽי־־־׃
translation:
  text: Afterward all the sons of Israel came near, and he commanded them all that
    the LORD had spoken with him on Mount Sinai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of Israel'; many English versions render this national expression
      as 'Israelites' or 'children of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַחֲרֵי כֵן
  chosen: Afterward
  alternatives:
  - After that
  - Then afterward
  lexicon: HALOT
  rationale: The phrase marks subsequent sequence after the prior event. 'Afterward'
    is natural modern English and preserves the temporal transition without unnecessary
    expansion.
- source_word: נִגְּשׁוּ
  chosen: came near
  alternatives:
  - approached
  - drew near
  lexicon: HALOT
  rationale: The Niphal of נגשׁ commonly means to come near or approach. 'Came near'
    preserves the concrete movement and echoes the narrative setting in which the
    people had previously been hesitant because of Moses' radiant face.
- source_word: כָּל בְּנֵי יִשְׂרָאֵל
  chosen: all the sons of Israel
  alternatives:
  - all the Israelites
  - all the children of Israel
  lexicon: HALOT
  rationale: Following the project's gender-accurate principle, בְּנֵי is rendered
    'sons' rather than flattened to 'Israelites.' In this covenantal-national expression,
    'sons of Israel' is a transparent and formally closer rendering, while still understandable
    in English.
- source_word: וַיְצַוֵּם
  chosen: he commanded them
  alternatives:
  - he instructed them
  - he charged them
  lexicon: HALOT
  rationale: צוה denotes giving commands or charges. 'Commanded' best matches the
    force of the verb in the context of relaying divine instruction, whereas 'instructed'
    would soften the imperative sense.
- source_word: אֵת כָּל אֲשֶׁר
  chosen: all that
  alternatives:
  - everything that
  - all which
  lexicon: HALOT
  rationale: This construction introduces the full content of what follows. 'All that'
    is idiomatic and sufficiently formal; 'everything that' is possible but slightly
    more expansive.
- source_word: דִּבֶּר יְהוָה אִתּוֹ
  chosen: the LORD had spoken with him
  alternatives:
  - the LORD spoke with him
  - the LORD had said to him
  lexicon: HALOT
  rationale: The clause refers back to prior speech on Sinai. English past perfect
    ('had spoken') clarifies anterior action relative to Moses' commanding the people.
    'With him' follows אִתּוֹ straightforwardly, preserving the conversational nuance
    rather than shifting to 'to him' without necessity.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    in the main text.
- source_word: בְּהַר סִינָי
  chosen: on Mount Sinai
  alternatives:
  - at Mount Sinai
  - on the mountain of Sinai
  lexicon: HALOT
  rationale: English idiom prefers 'on Mount Sinai' for events occurring on the mountain.
    This is clear and natural while preserving the location precisely.
