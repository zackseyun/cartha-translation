theological_decisions:
- issue: Meaning of קָרַן in relation to Moses' face
  chosen_reading: radiance/shining rather than 'horned'
  alternative_readings:
  - horned
  rationale: The immediate context concerns visible glory after Moses' encounter with
    the LORD, and the following verses describe Israel's fear of approaching him.
    Rendering the verb as radiance preserves the plain contextual sense and avoids
    importing a misleading physical image.
- issue: Referent of אִתּוֹ
  chosen_reading: retain the pronoun 'him' in the main text, referring contextually
    to the LORD
  alternative_readings:
  - explicitly name 'the LORD'
  - explicitly name 'God'
  rationale: The Hebrew text leaves the referent pronominal, though context makes
    it clear. Preserving the pronoun respects the source wording while not obscuring
    the sense.
  doctrine_reference: Translation philosophy §1, §3
