id: EXO.34.29
reference: Exodus 34:29
source:
  edition: WLC
  text: וַ/יְהִ֗י בְּ/רֶ֤דֶת מֹשֶׁה֙ מֵ/הַ֣ר סִינַ֔י וּ/שְׁנֵ֨י לֻחֹ֤ת הָֽ/עֵדֻת֙
    בְּ/יַד מֹשֶׁ֔ה בְּ/רִדְתּ֖/וֹ מִן הָ/הָ֑ר וּ/מֹשֶׁ֣ה לֹֽא יָדַ֗ע כִּ֥י קָרַ֛ן
    ע֥וֹר פָּנָ֖י/ו בְּ/דַבְּר֥/וֹ אִתּֽ/וֹ־־־׃
translation:
  text: And it happened, when Moses came down from Mount Sinai with the two tablets
    of the testimony in Moses' hand as he came down from the mountain, that Moses
    did not know that the skin of his face was radiant because he had spoken with
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shone' or 'sent out rays'; the Hebrew verb can denote emitting rays.
      The traditional rendering 'was horned' is preserved here as a historical alternative
      but does not fit the context as well.
    reason: lexical_alternative
  - marker: b
    text: That is, with the LORD.
    reason: alternative_reading
  - marker: c
    text: 'The phrase ''because he had spoken with him'' may also be understood temporally:
      ''when he spoke with him.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new scene. 'And it happened'
    preserves the Hebrew discourse function without archaic excess.
- source_word: בְּרֶדֶת ... בְּרִדְתּוֹ
  chosen: when Moses came down ... as he came down
  alternatives:
  - when Moses descended
  - in Moses' coming down
  lexicon: HALOT
  rationale: From ירד, both infinitive constructions mark the temporal setting. 'Came
    down' is idiomatic modern English. The repetition is retained rather than collapsed,
    since the Hebrew repeats it for narrative framing.
- source_word: מֵהַר סִינַי
  chosen: from Mount Sinai
  alternatives:
  - from the mountain of Sinai
  lexicon: HALOT
  rationale: Standard English rendering of the place name phrase; 'Mount Sinai' is
    the natural equivalent.
- source_word: שְׁנֵי לֻחֹת הָעֵדֻת
  chosen: the two tablets of the testimony
  alternatives:
  - the two tablets of the covenant document
  - the two tablets of the witness
  lexicon: HALOT
  rationale: לֻחֹת are stone tablets; עֵדוּת commonly denotes 'testimony' in this
    covenantal context. This preserves the established covenantal sense without overinterpreting.
- source_word: בְּיַד מֹשֶׁה
  chosen: in Moses' hand
  alternatives:
  - in the hand of Moses
  - in Moses' possession
  lexicon: HALOT
  rationale: Literal 'in hand' is natural enough in English and preserves the concrete
    image. Singular 'hand' follows the Hebrew.
- source_word: לֹא יָדַע
  chosen: did not know
  alternatives:
  - was unaware
  lexicon: HALOT
  rationale: Simple negated ידע. 'Did not know' is straightforward and formally close.
- source_word: קָרַן
  chosen: was radiant
  alternatives:
  - shone
  - sent out rays
  - was horned
  lexicon: HALOT
  rationale: The verb from קרן here refers to emitting rays or shining. 'Was radiant'
    captures the result on Moses' face in clear English. 'Was horned' reflects a historically
    influential but contextually inferior rendering based on the noun 'horn'; the
    context of visible glory favors radiance.
- source_word: עוֹר פָּנָיו
  chosen: the skin of his face
  alternatives:
  - his face
  - the surface of his face
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'the skin of his face,' not merely 'his face.'
    The fuller phrase should be preserved.
- source_word: בְּדַבְּרוֹ אִתּוֹ
  chosen: because he had spoken with him
  alternatives:
  - when he spoke with him
  - in his speaking with him
  lexicon: HALOT
  rationale: The preposition ב with infinitive can be rendered temporally or causally
    here. Given the context, Moses' radiance results from his speaking with God, so
    'because he had spoken with him' best conveys the relationship in idiomatic English
    while preserving the ambiguity enough to note in a footnote.
- source_word: אִתּוֹ
  chosen: with him
  alternatives:
  - with the LORD
  - with God
  lexicon: HALOT
  rationale: The pronoun's referent is contextually the LORD from the preceding narrative,
    but the Hebrew uses a pronoun. The main text preserves the pronoun; the referent
    can be clarified in a footnote if needed.
