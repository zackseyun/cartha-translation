theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD.' This preserves established
    reverential convention without denying the underlying personal name in Hebrew.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering קַנָּא as a divine name and attribute
  chosen_reading: Jealous / jealous
  alternative_readings:
  - Zealous / zealous
  rationale: The verse explicitly says that Jealous is his name and then explains
    that he is a jealous God. Retaining 'jealous' in both places preserves the rhetorical
    force and covenant exclusivity of the Hebrew rather than softening it to 'zealous.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
