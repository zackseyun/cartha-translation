id: EXO.34.14
reference: Exodus 34:14
source:
  edition: WLC
  text: כִּ֛י לֹ֥א תִֽשְׁתַּחֲוֶ֖ה לְ/אֵ֣ל אַחֵ֑ר כִּ֤י יְהוָה֙ קַנָּ֣א שְׁמ֔/וֹ אֵ֥ל
    קַנָּ֖א הֽוּא׃
translation:
  text: For you shall not bow down to another god, for the LORD, whose name is Jealous,
    is a jealous God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you shall not worship another god.' The Hebrew verb literally refers
      to bowing down, often in worship.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''for the LORD—Jealous is his name—is a jealous God.'''
    reason: lexical_alternative
  - marker: c
    text: '''Jealous'' here expresses the LORD''s exclusive covenant claim on his
      people''s worship, not sinful envy.'
    reason: cultural_note
lexical_decisions:
- source_word: תִשְׁתַּחֲוֶה
  chosen: shall not bow down
  alternatives:
  - shall not worship
  - must not prostrate yourself before
  lexicon: HALOT
  rationale: The verb שׁחה denotes bowing/prostration, often as an act of worship.
    'Bow down' preserves the concrete action in the Hebrew while allowing the worship
    sense to remain clear in context. 'Worship' alone would be slightly more interpretive.
- source_word: לְאֵל אַחֵר
  chosen: to another god
  alternatives:
  - before another god
  - to a foreign god
  lexicon: HALOT
  rationale: אֵל means 'god,' and אַחֵר means 'another/other.' 'Another god' is the
    most direct rendering. 'Foreign god' is possible in some contexts but is not demanded
    by אַחֵר here.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name YHWH
    is 'the LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: קַנָּא
  chosen: Jealous
  alternatives:
  - zealous
  lexicon: HALOT
  rationale: The adjective describes YHWH's exclusive covenant claim and intolerance
    of rival worship. In the clause 'whose name is Jealous,' capitalization reflects
    its predicative use as a name/title. 'Zealous' softens the exclusivity emphasis
    and is less natural in this naming formula.
- source_word: שְׁמוֹ
  chosen: whose name is
  alternatives:
  - his name is
  lexicon: HALOT
  rationale: 'English idiom reads more naturally with the relative construction: ''the
    LORD, whose name is Jealous.'' This preserves the Hebrew assertion that ''Jealous''
    functions as his name/designation.'
- source_word: אֵל קַנָּא הוּא
  chosen: is a jealous God
  alternatives:
  - he is a jealous God
  lexicon: HALOT
  rationale: This clause restates and explains the divine name. 'Is a jealous God'
    is smooth modern English and preserves the predicate structure. Including 'he'
    is possible but unnecessary in English.
