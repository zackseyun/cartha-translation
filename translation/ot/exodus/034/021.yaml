id: EXO.34.21
reference: Exodus 34:21
source:
  edition: WLC
  text: שֵׁ֤שֶׁת יָמִים֙ תַּעֲבֹ֔ד וּ/בַ/יּ֥וֹם הַ/שְּׁבִיעִ֖י תִּשְׁבֹּ֑ת בֶּ/חָרִ֥ישׁ
    וּ/בַ/קָּצִ֖יר תִּשְׁבֹּֽת׃
translation:
  text: Six days you shall work, but on the seventh day you shall cease; in plowing
    time and in harvest you shall cease.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you shall rest.' The Hebrew verb means to cease or stop, and by extension
      to rest.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׁשֶׁת יָמִים
  chosen: Six days
  alternatives:
  - For six days
  lexicon: HALOT
  rationale: Construct numeral + plural noun gives the time span 'six days.' English
    can render either 'Six days' or 'For six days'; the more direct form matches the
    Hebrew terseness and pairs naturally with the following verb.
- source_word: תַּעֲבֹד
  chosen: you shall work
  alternatives:
  - you may work
  - you are to work
  lexicon: HALOT
  rationale: Qal imperfect 2ms here functions as covenantal instruction. 'You shall
    work' preserves the prescriptive force without overinterpreting as mere permission
    ('may') or softening to paraphrase.
- source_word: וּבַיּוֹם הַשְּׁבִיעִי
  chosen: but on the seventh day
  alternatives:
  - and on the seventh day
  lexicon: HALOT
  rationale: The conjunction waw can be rendered simply 'and,' but in English the
    clause is adversative in sense, contrasting six workdays with the seventh-day
    cessation. 'But' communicates the contrast clearly while remaining faithful to
    the discourse function.
- source_word: תִּשְׁבֹּת
  chosen: you shall cease
  alternatives:
  - you shall rest
  - you shall stop
  lexicon: HALOT
  rationale: From שׁבת, the core sense is to cease/stop. 'Cease' preserves the lexical
    connection to Sabbath language more transparently than 'rest,' which can import
    a narrower experiential sense. It also fits both occurrences in the verse consistently.
- source_word: בֶּחָרִישׁ
  chosen: in plowing time
  alternatives:
  - at plowing time
  - in plowing
  - during plowing
  lexicon: HALOT
  rationale: The noun חרישׁ refers to plowing/plowing season. 'In plowing time' is
    idiomatic English and conveys the temporal force of the preposition with the agricultural-season
    nuance.
- source_word: וּבַקָּצִיר
  chosen: and in harvest
  alternatives:
  - and at harvest time
  - and in harvest time
  lexicon: HALOT
  rationale: קציר denotes harvest/harvest time. 'In harvest' is concise and natural
    alongside 'in plowing time'; the temporal sense is clear from context.
- source_word: תִּשְׁבֹּת (second occurrence)
  chosen: you shall cease
  alternatives:
  - you shall rest
  - you shall stop
  lexicon: HALOT
  rationale: The repetition is emphatic in Hebrew and should be preserved in English.
    Repeating 'you shall cease' maintains lexical consistency and highlights that
    Sabbath cessation applies even during the busiest agricultural periods.
