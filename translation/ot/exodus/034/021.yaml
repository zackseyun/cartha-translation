theological_decisions:
- issue: Rendering of Sabbath-related verb שׁבת
  chosen_reading: Translate as 'cease' rather than 'rest' in both occurrences.
  alternative_readings:
  - Translate as 'rest'
  rationale: The verse emphasizes stopping labor on the seventh day, even in critical
    farming seasons. 'Cease' reflects the lexical core of שׁבת and preserves the connection
    to Sabbath as cessation from work without adding experiential implications beyond
    the text.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
