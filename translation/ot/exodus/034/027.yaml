theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for YHWH and avoids introducing
    a denominationally loaded preference while preserving standard covenantal diction.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Translation of the covenant idiom כָּרַתִּי ... בְּרִית
  chosen_reading: I have made a covenant
  alternative_readings:
  - I have cut a covenant
  rationale: The literal idiom 'cut a covenant' is transparent to specialists but
    less natural for general readers. 'Made a covenant' preserves the meaning without
    paraphrasing beyond the source text, in keeping with optimal equivalence.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
