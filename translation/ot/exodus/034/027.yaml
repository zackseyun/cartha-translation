id: EXO.34.27
reference: Exodus 34:27
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל מֹשֶׁ֔ה כְּתָב לְ/ךָ֖ אֶת הַ/דְּבָרִ֣ים הָ/אֵ֑לֶּה
    כִּ֞י עַל פִּ֣י הַ/דְּבָרִ֣ים הָ/אֵ֗לֶּה כָּרַ֧תִּי אִתְּ/ךָ֛ בְּרִ֖ית וְ/אֶת
    יִשְׂרָאֵֽל־־־־׀־׃
translation:
  text: Then the LORD said to Moses, “Write these words for yourself, because in accordance
    with these words I have made a covenant with you and with Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “cut a covenant.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name YHWH as
    'the LORD,' following Jewish reverence tradition and the LXX pattern.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: The waw-consecutive imperfect of אמר is the standard narrative form 'and/then
    he said.' 'Said' is the most natural modern English rendering in direct-speech
    introduction.
- source_word: כְּתָב
  chosen: Write
  alternatives:
  - Record
  - Write down
  lexicon: HALOT
  rationale: The Qal imperative 2ms of כתב straightforwardly commands Moses to write.
    'Write' preserves the directness of the imperative without adding interpretive
    nuance.
- source_word: לְךָ
  chosen: for yourself
  alternatives:
  - for you
  - yourself
  lexicon: HALOT
  rationale: 'The dative pronoun can be taken as an ethical dative, adding personal
    involvement: ''write for yourself.'' This preserves the Hebrew nuance better than
    omitting it, while remaining natural English.'
- source_word: הַדְּבָרִים הָאֵלֶּה
  chosen: these words
  alternatives:
  - these matters
  - these things
  lexicon: HALOT
  rationale: דברים commonly means 'words' in covenantal and legal contexts, and the
    repetition in the verse supports a consistent rendering. 'Words' also fits the
    command to write.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the command to write. 'Because' makes
    the causal force explicit in clear modern English.
- source_word: עַל פִּי
  chosen: in accordance with
  alternatives:
  - according to
  - on the basis of
  - by the mouth of
  lexicon: HALOT
  rationale: The idiom literally means 'upon the mouth of' and commonly conveys conformity
    or accordance. 'In accordance with' is idiomatic English that preserves the covenantal/legal
    sense.
- source_word: כָּרַתִּי בְּרִית
  chosen: I have made a covenant
  alternatives:
  - I have cut a covenant
  - I made a covenant
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'cut a covenant.' In English, 'make a covenant'
    is the standard natural equivalent. The present perfect 'have made' reflects the
    completed action with present relevance in the immediate discourse.
- source_word: אִתְּךָ
  chosen: with you
  lexicon: HALOT
  rationale: The preposition marks Moses as a party involved in the covenantal arrangement;
    'with you' is the direct and natural rendering.
- source_word: וְאֶת יִשְׂרָאֵל
  chosen: and with Israel
  alternatives:
  - and Israel
  lexicon: HALOT
  rationale: The repeated object marker/prepositional construction after 'made a covenant
    with you' is best carried into English as 'and with Israel' to show that Israel
    is also included as covenant partner, not merely an added object without the preposition.
