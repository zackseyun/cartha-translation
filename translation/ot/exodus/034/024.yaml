id: EXO.34.24
reference: Exodus 34:24
source:
  edition: WLC
  text: כִּֽי אוֹרִ֤ישׁ גּוֹיִם֙ מִ/פָּנֶ֔י/ךָ וְ/הִרְחַבְתִּ֖י אֶת גְּבוּלֶ֑/ךָ וְ/לֹא
    יַחְמֹ֥ד אִישׁ֙ אֶֽת אַרְצְ/ךָ֔ בַּ/עֲלֹֽתְ/ךָ֗ לֵ/רָאוֹת֙ אֶת פְּנֵי֙ יְהוָ֣ה
    אֱלֹהֶ֔י/ךָ שָׁלֹ֥שׁ פְּעָמִ֖ים בַּ/שָּׁנָֽה־־־־־׃
translation:
  text: For I will drive out nations from before you and enlarge your border, and
    no man will covet your land when you go up to appear before the LORD your God
    three times in the year.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'to see the face of the LORD your God'; the idiom means
      'to appear before' him in worship.
    reason: lexical_alternative
  - marker: b
    text: Or 'three times a year.'
    reason: lexical_alternative
  - marker: c
    text: '''No man'' renders a masculine singular Hebrew noun used representatively;
      the sense is that no one will covet the land while Israel''s males go up for
      the pilgrimage festivals.'
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground for the preceding command about pilgrimage observance;
    'for' best preserves the explanatory force in context.
- source_word: אוֹרִישׁ
  chosen: I will drive out
  alternatives:
  - I will dispossess
  - I will cause to inherit by dispossessing
  lexicon: HALOT
  rationale: Hiphil of ירשׁ here means to dispossess/remove nations from the land
    before Israel. 'Drive out' is idiomatic and clear in English while preserving
    the force of removal.
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - peoples
  - Gentiles
  lexicon: HALOT
  rationale: In this land-conquest context, 'nations' is the most natural rendering
    for foreign peoples/political groups.
- source_word: מִפָּנֶיךָ
  chosen: from before you
  alternatives:
  - from your presence
  - ahead of you
  lexicon: HALOT
  rationale: The idiom literally means 'from before your face/presence' and commonly
    denotes removal from one's path or presence. Retaining 'from before you' preserves
    the Hebrew idiom with understandable English.
- source_word: וְהִרְחַבְתִּי
  chosen: and enlarge
  alternatives:
  - and widen
  - and make broad
  lexicon: HALOT
  rationale: The verb means to make broad or enlarge. 'Enlarge' fits the promise of
    territorial expansion in natural English.
- source_word: גְּבוּלֶךָ
  chosen: your border
  alternatives:
  - your territory
  - your boundary
  lexicon: HALOT
  rationale: גְּבוּל can mean border/boundary/territory. 'Border' keeps the concrete
    territorial sense and pairs naturally with 'enlarge.'
- source_word: לֹא יַחְמֹד
  chosen: will covet
  alternatives:
  - will desire
  - will set his desire on
  lexicon: HALOT
  rationale: חמד is the same root used in the commandment against coveting; 'covet'
    preserves the strong sense of wrongful desire.
- source_word: אִישׁ
  chosen: no man
  alternatives:
  - no one
  - nobody
  lexicon: HALOT
  rationale: The singular masculine noun is retained as 'man' in keeping with the
    project's gender-accurate policy; here it has representative force but is grammatically
    singular masculine.
- source_word: אַרְצְךָ
  chosen: your land
  alternatives:
  - your country
  lexicon: HALOT
  rationale: '''Land'' is the standard covenantal-territorial term in Exodus and better
    than ''country'' for the promised land context.'
- source_word: בַּעֲלֹתְךָ
  chosen: when you go up
  alternatives:
  - when you ascend
  lexicon: HALOT
  rationale: עלה in pilgrimage contexts commonly means 'go up' to the sanctuary/appointed
    place. This is both literal and idiomatic in biblical usage.
- source_word: לֵרָאוֹת אֶת־פְּנֵי
  chosen: to appear before
  alternatives:
  - to see the face of
  - to present yourself before
  lexicon: HALOT
  rationale: Literally 'to see the face of,' but in worship/pilgrimage idiom it means
    to appear before a superior/deity. 'Appear before' communicates the idiomatic
    sense clearly.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Standard possessive rendering; preserves covenant relationship language.
- source_word: שָׁלֹשׁ פְּעָמִים בַּשָּׁנָה
  chosen: three times in the year
  alternatives:
  - three times a year
  lexicon: HALOT
  rationale: A slightly more formal rendering that closely follows the Hebrew preposition
    and article. It remains natural English and preserves the annual liturgical cadence.
