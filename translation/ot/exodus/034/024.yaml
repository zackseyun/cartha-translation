theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render the Tetragrammaton as 'the LORD,' following
    Jewish reverence tradition and longstanding biblical English convention, while
    not obscuring that the covenant name is present in the source.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered representative noun אִישׁ
  chosen_reading: no man
  alternative_readings:
  - no one
  - nobody
  rationale: The Hebrew is grammatically masculine singular with representative force.
    Per the project's gender-accurate policy, the translation retains 'man' rather
    than neutralizing the form, while the sense remains generic.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
