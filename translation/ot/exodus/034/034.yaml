id: EXO.34.34
reference: Exodus 34:34
source:
  edition: WLC
  text: וּ/בְ/בֹ֨א מֹשֶׁ֜ה לִ/פְנֵ֤י יְהוָה֙ לְ/דַבֵּ֣ר אִתּ֔/וֹ יָסִ֥יר אֶת הַ/מַּסְוֶ֖ה עַד צֵאת֑/וֹ וְ/יָצָ֗א וְ/דִבֶּר֙ אֶל בְּנֵ֣י יִשְׂרָאֵ֔ל אֵ֖ת אֲשֶׁ֥ר יְצֻוֶּֽה־־־׃
translation:
  text: But whenever Moses went in before Yahweh to speak with him, he would remove the veil until he came out; then he would come out and speak to the sons of Israel what he had been commanded.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the Israelites' / 'to the people of Israel.' The Hebrew reads 'to the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/בֹא
  chosen: But whenever ... went in
  alternatives:
  - And when ... went in
  - Whenever ... went in
  lexicon: HALOT
  rationale: 'The prefixed conjunction plus infinitive construct with ב marks a recurring circumstance: ''when/whenever Moses went in.'' ''But'' preserves the mild contrast with the previous verse, while ''whenever'' captures the iterative sense better than a simple past ''when''.'
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - before Yahweh
  - into the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before/in the presence of.' 'Before the LORD' is idiomatic and sufficiently transparent. Per doctrine, יְהוָה is rendered 'the LORD,' with 'Yahweh' preserved as an alternative only in documentation, not main text.
- source_word: לְדַבֵּר אִתּוֹ
  chosen: to speak with him
  alternatives:
  - to speak to him
  lexicon: HALOT
  rationale: The infinitive expresses purpose. With אֵת/אִתּוֹ after דבר, the sense is conversational contact, naturally rendered 'speak with him,' though 'speak to him' is possible.
- source_word: יָסִיר
  chosen: he would remove
  alternatives:
  - he removed
  - he used to remove
  lexicon: HALOT
  rationale: The imperfect here fits habitual past action in context. 'Would remove' communicates customary action in natural English.
- source_word: הַמַּסְוֶה
  chosen: the veil
  alternatives:
  - the covering
  lexicon: HALOT
  rationale: מַסְוֶה denotes the face-covering Moses wore. 'Veil' is the established and accurate English term in this context.
- source_word: עַד צֵאתוֹ
  chosen: until he came out
  alternatives:
  - until his going out
  - until he went out
  lexicon: HALOT
  rationale: The preposition plus infinitive construct marks duration up to Moses' exit. 'Until he came out' reads naturally in English from the narrator's perspective.
- source_word: וְיָצָא
  chosen: then he would come out
  alternatives:
  - and he went out
  - and he would go out
  lexicon: HALOT
  rationale: Following the habitual frame, the qatal with waw continues the customary sequence. 'Then he would come out' preserves the narrative flow and iterative sense.
- source_word: וְדִבֶּר
  chosen: and speak
  alternatives:
  - and he spoke
  - and would speak
  lexicon: HALOT
  rationale: This verb continues the sequence of repeated actions. In English, 'then he would come out and speak' avoids overloading the sentence with repeated auxiliaries while preserving habitual force.
- source_word: אֶל בְּנֵי יִשְׂרָאֵל
  chosen: to the sons of Israel
  alternatives:
  - to the people of Israel
  - to the Israelites
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'sons of Israel.' Per gender-accurate philosophy, the masculine form is retained rather than flattened to 'people' or 'Israelites,' though those are idiomatic alternatives.
- source_word: אֵת אֲשֶׁר יְצֻוֶּה
  chosen: what he had been commanded
  alternatives:
  - what he was commanded
  - that which he had been commanded
  lexicon: HALOT
  rationale: The passive Pual indicates what had been commanded to Moses, which he then relayed. English past perfect best reflects the prior action relative to his speaking to Israel.
