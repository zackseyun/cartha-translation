id: EXO.34.10
reference: Exodus 34:10
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר הִנֵּ֣ה אָנֹכִי֮ כֹּרֵ֣ת בְּרִית֒ נֶ֤גֶד כָּֽל עַמְּ/ךָ֙ אֶעֱשֶׂ֣ה נִפְלָאֹ֔ת אֲשֶׁ֛ר לֹֽא נִבְרְא֥וּ בְ/כָל הָ/אָ֖רֶץ וּ/בְ/כָל הַ/גּוֹיִ֑ם וְ/רָאָ֣ה כָל הָ֠/עָם אֲשֶׁר אַתָּ֨ה בְ/קִרְבּ֜/וֹ אֶת מַעֲשֵׂ֤ה יְהוָה֙ כִּֽי נוֹרָ֣א ה֔וּא אֲשֶׁ֥ר אֲנִ֖י עֹשֶׂ֥ה עִמָּֽ/ךְ־־־־־־־־׃
translation:
  text: And he said, “Behold, I am making a covenant. Before all your people I will do wonders such as have not been created in all the earth or among any of the nations. And all the people in whose midst you are will see the work of Yahweh, for it is an awesome thing that I am doing with you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'wonders such as have never been done.' The Hebrew verb is 'created,' which is retained in the main text to preserve the source wording's force.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Uses a natural modern English discourse marker that still preserves the deictic force and solemnity of the Hebrew announcement.
- source_word: כֹּרֵת בְּרִית
  chosen: am making a covenant
  alternatives:
  - am cutting a covenant
  - make a covenant
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'cutting a covenant,' but 'making a covenant' is standard, clear English that preserves the covenantal act without obscuring meaning. The participle with אָנֹכִי conveys imminent/present action, hence 'am making.'
- source_word: נֶגֶד כָּל עַמְּךָ
  chosen: Before all your people
  alternatives:
  - in the presence of all your people
  - in front of all your people
  lexicon: HALOT
  rationale: נֶגֶד here denotes public visibility or presence. 'Before all your people' is concise and idiomatic while preserving the public, witnessed character of the covenantal action.
- source_word: נִפְלָאֹת
  chosen: wonders
  alternatives:
  - marvels
  - wonderful deeds
  lexicon: HALOT
  rationale: '''Wonders'' is the most natural rendering in a context of divine extraordinary acts and aligns with common biblical usage without becoming archaic.'
- source_word: אֲשֶׁר לֹא נִבְרְאוּ
  chosen: such as have not been created
  alternatives:
  - which have not been done
  - such as have never been created
  lexicon: HALOT
  rationale: The verb is ברא, 'create,' not merely 'do.' Retaining 'created' preserves the unusually strong wording of unprecedented divine acts, even if English might more commonly expect 'done.'
- source_word: בְכָל הָאָרֶץ וּבְכָל הַגּוֹיִם
  chosen: in all the earth or among any of the nations
  alternatives:
  - in all the land and among all the nations
  - throughout all the earth and all the nations
  lexicon: HALOT
  rationale: הָאָרֶץ here is best taken globally as 'the earth,' especially paired with 'the nations.' The second phrase is rendered 'among any of the nations' to express the distributive sense naturally in English.
- source_word: וְרָאָה כָל הָעָם
  chosen: And all the people ... will see
  alternatives:
  - Then all the people ... shall see
  lexicon: HALOT
  rationale: Although the verb is morphologically singular, it agrees with the collective sense of עָם. Future sense fits the promise context.
- source_word: אֲשֶׁר אַתָּה בְקִרְבּוֹ
  chosen: in whose midst you are
  alternatives:
  - among whom you are
  - with whom you are
  lexicon: HALOT
  rationale: This relative clause modifies 'the people' and emphasizes Moses' presence among them. 'In whose midst you are' preserves the spatial and communal nuance of בקרב.
- source_word: מַעֲשֵׂה יְהוָה
  chosen: the work of the LORD
  alternatives:
  - the deed of the LORD
  - what the LORD has done
  lexicon: HALOT
  rationale: A straightforward rendering of the construct phrase. 'Work' is broad enough to encompass the impending mighty act while remaining idiomatic.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name.
- source_word: נוֹרָא
  chosen: awe-inspiring
  alternatives:
  - fearsome
  - awesome
  - terrible
  lexicon: HALOT
  rationale: Conveys the sense of something that evokes reverent fear without suggesting moral evil. 'Awesome' in contemporary English is weakened by colloquial use; 'terrible' is misleading.
- source_word: אֲשֶׁר אֲנִי עֹשֶׂה עִמָּךְ
  chosen: what I am doing with you
  alternatives:
  - that which I am doing with you
  - what I am doing for you
  lexicon: HALOT
  rationale: עִם naturally means 'with' here, indicating Moses as participant/beneficiary in the divine action. 'With you' preserves the relational nuance better than 'for you'.
