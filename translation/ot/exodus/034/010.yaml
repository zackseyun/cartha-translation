theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Force of ברא in the clause describing unprecedented acts
  chosen_reading: retain 'created' language
  alternative_readings:
  - render more idiomatically as 'done'
  rationale: Although English idiom might prefer 'done,' the Hebrew explicitly uses ברא, a theologically weighty verb. Retaining 'created' preserves the text's stronger claim about the uniqueness of the coming wonders without over-interpreting the mechanism.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy over translation tradition'
