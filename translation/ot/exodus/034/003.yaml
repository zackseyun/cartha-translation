id: EXO.34.3
reference: Exodus 34:3
source:
  edition: WLC
  text: וְ/אִישׁ֙ לֹֽא יַעֲלֶ֣ה עִמָּ֔/ךְ וְ/גַם אִ֥ישׁ אַל יֵרָ֖א בְּ/כָל הָ/הָ֑ר
    גַּם הַ/צֹּ֤אן וְ/הַ/בָּקָר֙ אַל יִרְע֔וּ אֶל מ֖וּל הָ/הָ֥ר הַ/הֽוּא־־־־־־־׃
translation:
  text: And no man shall go up with you, and indeed no man shall be seen anywhere
    on the mountain; even the flock and the herd must not graze in front of that mountain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'must not appear anywhere on the mountain.' The Hebrew verb can mean
      either 'be seen' or 'appear' in this passive/reflexive form.
    reason: lexical_alternative
  - marker: b
    text: '''Man'' here is grammatically masculine in Hebrew but functions generically
      for any human being.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  - anyone
  lexicon: HALOT
  rationale: The noun is grammatically masculine singular and here has generic force
    in a prohibition applying to any human individual. Per the gender-accurate policy,
    'man' preserves the source form and representative sense better than a neutral
    recasting.
- source_word: יַעֲלֶה עִמָּךְ
  chosen: shall go up with you
  alternatives:
  - come up with you
  - ascend with you
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' 'Go up with you' is natural English
    and preserves the directional sense of ascent to the mountain.
- source_word: וְגַם
  chosen: and indeed
  alternatives:
  - and also
  - moreover
  lexicon: HALOT
  rationale: The particle adds emphasis as well as continuation. 'And indeed' captures
    the strengthening force before the second prohibition.
- source_word: אַל יֵרָא
  chosen: shall be seen
  alternatives:
  - must not appear
  - must not be visible
  lexicon: HALOT
  rationale: The Niphal of ראה is passive/reflexive, 'be seen/appear.' In context
    the command is not merely that no one look, but that no one be visible anywhere
    on the mountain.
- source_word: בְּכָל הָהָר
  chosen: anywhere on the mountain
  alternatives:
  - on all the mountain
  - throughout the whole mountain
  lexicon: HALOT
  rationale: The phrase denotes the entirety of the mountain area. 'Anywhere on the
    mountain' expresses the distributive force idiomatically in English.
- source_word: הַצֹּאן וְהַבָּקָר
  chosen: the flock and the herd
  alternatives:
  - the sheep and the cattle
  - small livestock and cattle
  lexicon: HALOT
  rationale: The pair is a standard merism for livestock classes. 'Flock and herd'
    is concise, natural, and preserves the distinction between smaller and larger
    livestock.
- source_word: אַל יִרְעוּ
  chosen: must not graze
  alternatives:
  - shall not feed
  - must not pasture
  lexicon: HALOT
  rationale: רעה in the Qal with animal subjects means to graze/pasture. 'Must not
    graze' is clear modern English for the prohibition.
- source_word: אֶל מוּל
  chosen: in front of
  alternatives:
  - opposite
  - before
  - facing
  lexicon: HALOT
  rationale: מוּל with אֶל indicates position opposite or in front of something. 'In
    front of' is the most natural English in this spatial context.
- source_word: הָהָר הַהוּא
  chosen: that mountain
  alternatives:
  - the mountain there
  - that particular mountain
  lexicon: HALOT
  rationale: The demonstrative adds specificity and distance. 'That mountain' is the
    straightforward rendering.
