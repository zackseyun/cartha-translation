theological_decisions:
- issue: Nature of the prohibited object
  chosen_reading: The verse forbids manufacturing idols, rendered 'cast-metal gods.'
  alternative_readings:
  - Do not make for yourself molten images
  rationale: The Hebrew combines 'gods' with 'cast image/metal' language. Rendering
    the phrase as 'cast-metal gods' preserves both the idol referent and the material/process
    nuance without flattening it to merely 'images.' This avoids importing broader
    theological claims while keeping the anti-idolatry force explicit.
