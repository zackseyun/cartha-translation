id: EXO.34.17
reference: Exodus 34:17
source:
  edition: WLC
  text: אֱלֹהֵ֥י מַסֵּכָ֖ה לֹ֥א תַעֲשֶׂה לָּֽ/ךְ־׃
translation:
  text: You shall not make for yourself cast-metal gods.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'molten gods' or 'gods of cast metal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהֵי
  chosen: gods
  alternatives:
  - gods of
  - divine beings
  lexicon: HALOT
  rationale: Plural construct of אֱלֹהִים here is best rendered concretely as 'gods'
    in an idol-prohibition context. The construct relation is completed by the following
    noun, yielding 'gods of cast metal' or more idiomatically 'cast-metal gods.'
- source_word: מַסֵּכָה
  chosen: cast-metal
  alternatives:
  - molten
  - cast image
  - metal image
  lexicon: HALOT
  rationale: The noun denotes something cast, especially a metal image/idol. Rendering
    it attributively as 'cast-metal' preserves the material/process sense without
    adding 'image' where the Hebrew already has 'gods.' 'Molten gods' is traditional,
    but 'cast-metal gods' is clearer in modern English.
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Standard negation in a prohibition.
- source_word: תַעֲשֶׂה
  chosen: you shall make
  alternatives:
  - you must make
  - you are to make
  lexicon: HALOT
  rationale: 'Imperfect second masculine singular in legal/prohibitive context is
    naturally rendered with English ''shall'' to convey command force: ''You shall
    not make.'''
- source_word: לָּךְ
  chosen: for yourself
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The preposition with pronominal suffix marks personal interest/benefit.
    'For yourself' is idiomatic and reflects the reflexive force in context.
