id: EXO.34.19
reference: Exodus 34:19
source:
  edition: WLC
  text: כָּל פֶּ֥טֶר רֶ֖חֶם לִ֑/י וְ/כָֽל מִקְנְ/ךָ֙ תִּזָּכָ֔ר פֶּ֖טֶר שׁ֥וֹר וָ/שֶֽׂה־־׃
translation:
  text: Every firstborn of the womb is mine, and every male firstborn among your livestock,
    whether ox or sheep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'whatever opens the womb.'
    reason: lexical_alternative
  - marker: b
    text: Or 'belongs to me.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew expression specifies the male firstborn among livestock.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: Every
  alternatives:
  - All
  lexicon: HALOT
  rationale: Used distributively with the following singular construct expressions;
    'Every' reads naturally in English while preserving the universal scope.
- source_word: פֶּטֶר רֶחֶם
  chosen: firstborn of the womb
  alternatives:
  - whatever opens the womb
  - every opener of the womb
  lexicon: HALOT
  rationale: The idiom literally denotes that which opens the womb, i.e., the first
    offspring. 'Firstborn of the womb' preserves the idiomatic sense with clear English.
- source_word: לִי
  chosen: is mine
  alternatives:
  - belongs to me
  - is for me
  lexicon: HALOT
  rationale: The prepositional phrase marks possession/claim. 'Is mine' is concise
    and idiomatic, expressing YHWH's ownership claim.
- source_word: מִקְנְךָ
  chosen: your livestock
  alternatives:
  - your cattle
  - your domestic animals
  lexicon: HALOT
  rationale: A broad term for owned herd/flock animals. 'Livestock' best captures
    the collective sense in contemporary English.
- source_word: תִּזָּכָר
  chosen: male firstborn
  alternatives:
  - is to be remembered as male
  - shall be male
  - every male
  lexicon: HALOT
  rationale: The Niphal of זכר here functions elliptically in a legal/cultic context
    to specify the male offspring in view. Rendering the sense as 'male firstborn'
    avoids a misleadingly literal 'remembered' and fits the parallel with the first
    clause and the following species specification.
- source_word: פֶּטֶר שׁוֹר וָשֶׂה
  chosen: firstborn among your livestock, whether ox or sheep
  alternatives:
  - firstborn of ox and sheep
  - first issue of bull or lamb
  lexicon: HALOT
  rationale: This appositional phrase specifies the kinds of livestock intended. 'Whether
    ox or sheep' communicates the representative categories naturally in English.
