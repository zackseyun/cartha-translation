theological_decisions:
- issue: Divine ownership claim in firstborn legislation
  chosen_reading: The verse states that the firstborn belongs to the LORD without
    expanding the theology beyond the legal claim expressed here.
  alternative_readings:
  - The verse implies consecration language more explicitly than stated
  - The verse refers only to sacrificial eligibility
  rationale: The Hebrew explicitly asserts possession ('mine') and identifies male
    firstborn livestock. The translation preserves the legal-covenantal claim without
    importing later explanatory theology into the main text.
  doctrine_reference: Translation philosophy §1, §3
