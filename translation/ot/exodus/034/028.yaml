id: EXO.34.28
reference: Exodus 34:28
source:
  edition: WLC
  text: וַֽ/יְהִי שָׁ֣ם עִם יְהוָ֗ה אַרְבָּעִ֥ים יוֹם֙ וְ/אַרְבָּעִ֣ים לַ֔יְלָה לֶ֚חֶם לֹ֣א אָכַ֔ל וּ/מַ֖יִם לֹ֣א שָׁתָ֑ה וַ/יִּכְתֹּ֣ב עַל הַ/לֻּחֹ֗ת אֵ֚ת דִּבְרֵ֣י הַ/בְּרִ֔ית עֲשֶׂ֖רֶת הַ/דְּבָרִֽים־־־׃
translation:
  text: And he was there with Yahweh forty days and forty nights; he ate no bread and drank no water. And he wrote on the tablets the words of the covenant, the ten words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and the LORD wrote,' since elsewhere the writing on the tablets is attributed to the LORD (see Exod 34:1; Deut 10:4).
    reason: alternative_reading
  - marker: b
    text: Hebrew 'the ten words'; traditionally, 'the Ten Commandments.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the traditional English substitute for the Tetragrammaton rather than transliterating it.
- source_word: וַיְהִי שָׁם עִם
  chosen: And he was there with
  alternatives:
  - And he remained there with
  - And he stayed there with
  lexicon: HALOT
  rationale: The clause states Moses' presence/location with YHWH. 'Was there with' is a natural, sufficiently formal rendering of the Hebrew sequence without adding interpretive nuance beyond the text.
- source_word: אַרְבָּעִים יוֹם וְאַרְבָּעִים לַיְלָה
  chosen: forty days and forty nights
  lexicon: HALOT
  rationale: Standard and precise rendering of the duration expression.
- source_word: לֶחֶם לֹא אָכַל
  chosen: he ate no bread
  alternatives:
  - he did not eat bread
  - he ate nothing
  lexicon: HALOT
  rationale: Retains the concrete noun 'bread' rather than generalizing to 'food,' since the Hebrew explicitly says 'bread.' The idiom clearly communicates fasting without over-paraphrase.
- source_word: וּמַיִם לֹא שָׁתָה
  chosen: and drank no water
  alternatives:
  - and he did not drink water
  lexicon: HALOT
  rationale: Direct rendering of the Hebrew, preserving the parallelism with the previous clause.
- source_word: וַיִּכְתֹּב
  chosen: And he wrote
  alternatives:
  - And he inscribed
  lexicon: HALOT
  rationale: The Hebrew verb simply means 'wrote.' Although the subject has been debated in context, the verbal form here is third masculine singular with no explicit subject change; the most immediate grammatical reading is 'he wrote.' The interpretive issue is documented separately.
- source_word: עַל הַלֻּחֹת
  chosen: on the tablets
  alternatives:
  - upon the tablets
  lexicon: HALOT
  rationale: Straightforward rendering; 'tablets' is the established English equivalent for the stone covenant tablets in Exodus.
- source_word: דִּבְרֵי הַבְּרִית
  chosen: the words of the covenant
  alternatives:
  - the covenant words
  lexicon: HALOT
  rationale: Preserves the construct relationship and the covenantal significance of the phrase.
- source_word: עֲשֶׂרֶת הַדְּבָרִים
  chosen: the ten words
  alternatives:
  - the Ten Commandments
  - the ten sayings
  lexicon: HALOT
  rationale: The Hebrew literally reads 'the ten words.' This is more source-transparent than the traditional interpretive rendering 'the Ten Commandments,' which can be preserved as an explanatory alternative in a footnote.
