theological_decisions:
- issue: Subject of 'and he wrote' in the final clause
  chosen_reading: Retain the Hebrew's most immediate grammatical reading in English as 'And he wrote,' with the antecedent naturally read as Moses in the flow of this verse.
  alternative_readings:
  - 'Translate impersonally or with explicit divine subject: ''and he [the LORD] wrote'''
  rationale: The Hebrew verb is third masculine singular and does not explicitly restate the subject. In the immediate syntax, Moses is the nearest continuing subject ('he was there... he ate no bread... drank no water... and he wrote'). However, Exodus 34:1 and Deuteronomy 10:4 attribute the writing of the tablets to the LORD, so the broader canonical context creates real interpretive tension. Per the project's philosophy, the main text preserves the verse's surface grammar while the alternative is preserved in a footnote rather than harmonizing the tension away.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Rendering עֲשֶׂרֶת הַדְּבָרִים
  chosen_reading: the ten words
  alternative_readings:
  - the Ten Commandments
  rationale: The Hebrew expression is literally 'the ten words.' Using this in the main text prioritizes original-language primacy over translation tradition. Because 'Ten Commandments' is the familiar traditional designation and contextually explanatory, it is preserved in a footnote as an alternative.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation tradition)
