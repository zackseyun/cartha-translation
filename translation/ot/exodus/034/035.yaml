id: EXO.34.35
reference: Exodus 34:35
source:
  edition: WLC
  text: וְ/רָא֤וּ בְנֵֽי יִשְׂרָאֵל֙ אֶת פְּנֵ֣י מֹשֶׁ֔ה כִּ֣י קָרַ֔ן ע֖וֹר פְּנֵ֣י
    מֹשֶׁ֑ה וְ/הֵשִׁ֨יב מֹשֶׁ֤ה אֶת הַ/מַּסְוֶה֙ עַל פָּנָ֔י/ו עַד בֹּא֖/וֹ לְ/דַבֵּ֥ר
    אִתּֽ/וֹ־־־־־׃ס
translation:
  text: And the sons of Israel would see Moses’ face, that the skin of Moses’ face
    shone; and Moses would put the veil back over his face until he went in to speak
    with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the sons of Israel'; also commonly rendered 'the Israelites.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb means 'shone' or 'sent out rays'; the traditional rendering
      'was horned' reflects an old misunderstanding of the term.
    reason: lexical_alternative
  - marker: c
    text: '''With him'' refers to the LORD from the immediate context.'
    reason: cross_reference
lexical_decisions:
- source_word: וְרָאוּ
  chosen: would see
  alternatives:
  - saw
  - kept seeing
  lexicon: HALOT
  rationale: The qatal here in this narrative summary describes repeated customary
    action in the sequence of Moses' appearances before Israel, so English habitual
    'would see' best captures the sense better than a simple past.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' This preserves the Hebrew familial expression
    and aligns with the project's gender-accurate principle. 'Israelites' is smoother
    but less formally transparent.
- source_word: פְּנֵי מֹשֶׁה
  chosen: Moses’ face
  alternatives:
  - the face of Moses
  lexicon: HALOT
  rationale: English possessive is the most natural rendering of the construct chain
    while preserving the concrete focus on Moses' face.
- source_word: כִּי
  chosen: that
  alternatives:
  - because
  - for
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content/perception of what Israel observed:
    namely, that the skin of Moses'' face shone. ''That'' fits the syntax better than
    a causal ''because'' in English.'
- source_word: קָרַן
  chosen: shone
  alternatives:
  - was radiant
  - sent out rays
  - was horned
  lexicon: HALOT
  rationale: The verb denotes emitting rays or shining. 'Shone' is clear modern English
    and avoids the misleading traditional misunderstanding 'was horned.' 'Was radiant'
    is possible, but 'shone' more directly reflects the verbal imagery.
- source_word: עוֹר פְּנֵי מֹשֶׁה
  chosen: the skin of Moses’ face
  alternatives:
  - the skin of his face
  - Moses' facial skin
  lexicon: HALOT
  rationale: עוֹר specifically means 'skin,' not merely 'face.' Retaining 'skin of
    Moses' face' preserves the Hebrew's precision that the radiance affected the skin.
- source_word: וְהֵשִׁיב
  chosen: would put back
  alternatives:
  - put back
  - replaced
  - returned
  lexicon: HALOT
  rationale: The Hiphil of שוב here means to put/bring back. In context Moses replaced
    the veil after speaking. Habitual 'would put back' matches the iterative narrative
    pattern.
- source_word: הַמַּסְוֶה
  chosen: the veil
  alternatives:
  - the covering
  - the mask
  lexicon: HALOT
  rationale: '''Veil'' is the standard and contextually fitting term for the face-covering
    Moses used. ''Mask'' is too modern and potentially misleading.'
- source_word: עַל־פָּנָיו
  chosen: over his face
  alternatives:
  - upon his face
  - on his face
  lexicon: HALOT
  rationale: '''Over his face'' best conveys the function of the veil as a covering.'
- source_word: עַד בֹּאוֹ
  chosen: until he went in
  alternatives:
  - until his going in
  - until he came in
  lexicon: HALOT
  rationale: The infinitive construct with suffix after עַד marks the limit of the
    action. 'Went in' fits the repeated movement into the LORD's presence from Moses'
    perspective in the narrative.
- source_word: לְדַבֵּר אִתּוֹ
  chosen: to speak with him
  alternatives:
  - to speak with the LORD
  - to speak with him there
  lexicon: HALOT
  rationale: The pronoun's referent is the LORD from the immediate context (vv. 34–35).
    The main text preserves the Hebrew pronoun 'him' without over-specifying, while
    the referent can be clarified in a footnote.
