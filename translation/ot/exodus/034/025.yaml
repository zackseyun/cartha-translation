- issue: Rendering of covenant festival terminology without importing later doctrinal
    associations
  chosen_reading: the Passover
  alternative_readings:
  - Pesach
  rationale: The verse concerns Israel's cultic observance in its immediate Mosaic
    context. 'Passover' is a transparent English rendering that preserves the canonical
    connection without adding later theological interpretation beyond the Hebrew text.
