id: EXO.34.25
reference: Exodus 34:25
source:
  edition: WLC
  text: לֹֽא תִשְׁחַ֥ט עַל חָמֵ֖ץ דַּם זִבְחִ֑/י וְ/לֹא יָלִ֣ין לַ/בֹּ֔קֶר זֶ֖בַח
    חַ֥ג הַ/פָּֽסַח־־־־׃
translation:
  text: You shall not slaughter the blood of my sacrifice with leaven, and the sacrifice
    of the feast of the Passover shall not remain overnight until the morning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Passover sacrifice' or 'the sacrifice of the Passover festival.'
      The Hebrew expression is compact and may be rendered more concisely in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִשְׁחַט
  chosen: shall not slaughter
  alternatives:
  - shall not sacrifice
  - shall not kill
  lexicon: HALOT
  rationale: The verb שָׁחַט commonly denotes ritual slaughter, especially of sacrificial
    animals. 'Slaughter' preserves the sacrificial context better than the broader
    'kill' and is more precise than the more interpretive 'sacrifice'.
- source_word: עַל חָמֵץ
  chosen: with leaven
  alternatives:
  - upon leaven
  - while leaven is present
  - alongside leavened bread
  lexicon: HALOT
  rationale: The preposition עַל here is idiomatic in cultic prohibition. 'With leaven'
    gives the plain sense in natural English without over-specifying the exact ritual
    mechanics. It likely means in the presence of leaven or together with anything
    leavened.
- source_word: דַּם זִבְחִי
  chosen: the blood of my sacrifice
  alternatives:
  - my sacrificial blood
  - the blood of my offering
  lexicon: HALOT
  rationale: The construct chain is most naturally rendered literally. Keeping 'blood'
    explicit preserves the Hebrew wording and sacrificial imagery; 'my sacrifice'
    reflects the 1cs suffix on זִבְחִי.
- source_word: יָלִין
  chosen: shall not remain overnight
  alternatives:
  - shall not stay all night
  - shall not be left until morning
  - shall not lodge
  lexicon: HALOT
  rationale: The verb לין in this context refers to something staying through the
    night. 'Remain overnight' is idiomatic English and fits sacrificial regulations
    about leaving portions until morning.
- source_word: זֶבַח חַג הַפָּסַח
  chosen: the sacrifice of the feast of the Passover
  alternatives:
  - the Passover feast sacrifice
  - the sacrifice of the Passover festival
  - the Passover sacrifice
  lexicon: HALOT
  rationale: The threefold nominal chain is preserved rather than compressed. This
    keeps both 'sacrifice' and 'feast/festival' visible in the English, reflecting
    the Hebrew structure and cultic specificity. 'Passover' is the standard rendering
    of פֶּסַח.
- source_word: הַפָּסַח
  chosen: the Passover
  alternatives:
  - Pesach
  lexicon: HALOT
  rationale: '''Passover'' is the established and accurate English rendering for the
    festival/sacrifice term here. Transliteration is unnecessary because the meaning
    is well established in English Bible usage.'
