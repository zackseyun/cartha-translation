id: EXO.34.16
reference: Exodus 34:16
source:
  edition: WLC
  text: וְ/לָקַחְתָּ֥ מִ/בְּנֹתָ֖י/ו לְ/בָנֶ֑י/ךָ וְ/זָנ֣וּ בְנֹתָ֗י/ו אַחֲרֵי֙ אֱלֹ֣הֵי/הֶ֔ן
    וְ/הִזְנוּ֙ אֶת בָּנֶ֔י/ךָ אַחֲרֵ֖י אֱלֹהֵי/הֶֽן־׃
translation:
  text: and you take some of his daughters for your sons, and his daughters prostitute
    themselves after their gods and make your sons prostitute themselves after their
    gods.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'play the prostitute' / 'commit whoredom.' The Hebrew uses sexual-infidelity
      language metaphorically for going after other gods.
    reason: lexical_alternative
  - marker: b
    text: That is, they would lead your sons into idolatry by causing them to go after
      their gods.
    reason: cultural_note
lexical_decisions:
- source_word: וְלָקַחְתָּ
  chosen: and you take
  alternatives:
  - and you take from
  - and you marry
  lexicon: HALOT
  rationale: 'Qal perfect 2ms with prefixed conjunction in this warning sequence functions
    as a future/result clause: ''and you take.'' ''Marry'' is interpretive; the direct
    sense is taking daughters for sons in marriage arrangements.'
- source_word: מִבְּנֹתָיו
  chosen: some of his daughters
  alternatives:
  - from his daughters
  - his daughters
  lexicon: HALOT
  rationale: The preposition מִן is retained in sense as a partitive idea, indicating
    selection from among his daughters. English idiom prefers 'some of his daughters'
    rather than the more wooden 'from his daughters.'
- source_word: לְבָנֶיךָ
  chosen: for your sons
  alternatives:
  - to your sons
  lexicon: HALOT
  rationale: The ל marks advantage/destination in marriage arrangement context; 'for
    your sons' is natural English and preserves the relational sense.
- source_word: וְזָנוּ
  chosen: and his daughters prostitute themselves
  alternatives:
  - and his daughters play the prostitute
  - and his daughters commit whoredom
  - and his daughters are unfaithful
  lexicon: HALOT
  rationale: זנה here is metaphorical for cultic unfaithfulness/idolatry, but the
    sexualized metaphor is important and should be preserved. 'Prostitute themselves'
    is clear modern English without flattening the metaphor into merely 'are unfaithful.'
- source_word: אַחֲרֵי אֱלֹהֵיהֶן
  chosen: after their gods
  alternatives:
  - following their gods
  lexicon: HALOT
  rationale: The idiom 'go/prostitute oneself after' is standard in Hebrew for pursuing
    other gods. 'After their gods' preserves the Hebrew imagery and cadence.
- source_word: וְהִזְנוּ
  chosen: and make your sons prostitute themselves
  alternatives:
  - and lead your sons into prostitution
  - and cause your sons to play the prostitute
  - and make your sons be unfaithful
  lexicon: HALOT
  rationale: 'The Hiphil is causative: the daughters cause Israel''s sons to commit
    the same metaphorical cultic prostitution. The causative force should be explicit.'
- source_word: אֶת בָּנֶיךָ
  chosen: your sons
  lexicon: HALOT
  rationale: Direct object marker plus noun with 2ms suffix; rendered straightforwardly.
- source_word: אֱלֹהֵיהֶן
  chosen: their gods
  alternatives:
  - their gods
  lexicon: HALOT
  rationale: Plural noun with 3fp suffix; straightforwardly plural in context of pagan
    deities.
