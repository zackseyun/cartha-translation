theological_decisions:
- issue: Rendering זנה in an idolatry context
  chosen_reading: Preserve the metaphor with 'prostitute themselves' rather than reduce
    it to 'commit idolatry.'
  alternative_readings:
  - commit idolatry
  - be unfaithful
  rationale: The Hebrew intentionally uses sexual infidelity imagery for covenantal
    and cultic apostasy. Preserving that metaphor maintains the theological force
    of the warning without importing additional interpretation.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Gendered language in בנותיו / בניך
  chosen_reading: Use 'daughters' and 'sons' rather than gender-neutral terms.
  alternative_readings:
  - children
  - offspring
  rationale: The source text specifically names daughters and sons in a marriage context.
    Gender-accurate rendering matches the Hebrew and the stated translation philosophy.
  doctrine_reference: Translation philosophy §4
