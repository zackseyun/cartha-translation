id: EXO.34.33
reference: Exodus 34:33
source:
  edition: WLC
  text: וַ/יְכַ֣ל מֹשֶׁ֔ה מִ/דַּבֵּ֖ר אִתָּ֑/ם וַ/יִּתֵּ֥ן עַל פָּנָ֖י/ו מַסְוֶֽה־׃
translation:
  text: When Moses finished speaking with them, he put a veil over his face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ceased speaking with them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְכַל
  chosen: finished
  alternatives:
  - ceased
  - completed
  lexicon: HALOT
  rationale: From כלה in the wayyiqtol, here marking the completion of Moses' speaking.
    'Finished' is idiomatic modern English and fits the temporal clause naturally.
- source_word: מִדַּבֵּר
  chosen: speaking
  alternatives:
  - to speak
  - from speaking
  lexicon: HALOT
  rationale: 'Infinitive construct of דבר with prefixed מ after כלה expresses completion
    of the action: ''finished speaking.'' English idiom prefers the gerund here.'
- source_word: אִתָּם
  chosen: with them
  alternatives:
  - to them
  lexicon: HALOT
  rationale: The preposition את with pronominal suffix most straightforwardly means
    'with them.' Although the broader context involves Moses addressing Israel, the
    Hebrew here is best represented as 'with them,' which is also natural in English.
- source_word: וַיִּתֵּן
  chosen: put
  alternatives:
  - placed
  - set
  lexicon: HALOT
  rationale: נתן plus על commonly means 'put/place on, over.' 'Put' is the most natural
    contemporary English rendering.
- source_word: עַל פָּנָיו
  chosen: over his face
  alternatives:
  - on his face
  - upon his face
  lexicon: HALOT
  rationale: The combination with נתן and the object 'veil' indicates covering placement.
    'Over his face' communicates the function more clearly than the more wooden 'on
    his face.'
- source_word: מַסְוֶה
  chosen: veil
  alternatives:
  - covering
  lexicon: HALOT
  rationale: The noun denotes a face-covering in this context. 'Veil' is the established
    and contextually precise English term, especially given the surrounding narrative
    about Moses' radiant face.
