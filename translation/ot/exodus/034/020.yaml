id: EXO.34.20
reference: Exodus 34:20
source:
  edition: WLC
  text: וּ/פֶ֤טֶר חֲמוֹר֙ תִּפְדֶּ֣ה בְ/שֶׂ֔ה וְ/אִם לֹ֥א תִפְדֶּ֖ה וַ/עֲרַפְתּ֑/וֹ
    כֹּ֣ל בְּכ֤וֹר בָּנֶ֨י/ךָ֙ תִּפְדֶּ֔ה וְ/לֹֽא יֵרָא֥וּ פָנַ֖/י רֵיקָֽם־־׃
translation:
  text: You shall redeem the firstborn of a donkey with a lamb; and if you do not
    redeem it, then you shall break its neck. You shall redeem every firstborn of
    your sons. And none shall appear before me empty-handed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a sheep' or more broadly 'with one of the flock'; Hebrew שֶׂה can
      refer to a sheep or goat from the flock.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'before my face.' This is a Hebrew idiom for appearing in God's
      presence.
    reason: lexical_alternative
  - marker: c
    text: That is, not without a gift or offering.
    reason: cultural_note
lexical_decisions:
- source_word: פֶטֶר חֲמוֹר
  chosen: the firstborn of a donkey
  alternatives:
  - the first issue of a donkey
  - whatever first opens the womb of a donkey
  lexicon: HALOT
  rationale: פֶטֶר denotes that which first opens the womb; in this legal context
    'firstborn' is the most natural and concise English rendering. 'Of a donkey' specifies
    the animal in view.
- source_word: תִּפְדֶּה
  chosen: you shall redeem
  alternatives:
  - you must redeem
  - you shall ransom
  lexicon: HALOT
  rationale: פדה in cultic/legal contexts refers to redemption by substitution or
    payment. 'Redeem' preserves the covenantal/legal sense better than the more commercial-sounding
    'ransom' here.
- source_word: בְשֶׂה
  chosen: with a lamb
  alternatives:
  - with a sheep
  - with a head of small livestock
  lexicon: HALOT
  rationale: שֶׂה can denote one of the flock, sheep or goat, but 'lamb' is the conventional
    and contextually fitting rendering in sacrificial/redemptive settings. The broader
    sense is preserved as an alternative.
- source_word: וַעֲרַפְתּוֹ
  chosen: you shall break its neck
  alternatives:
  - you shall neck it
  - you shall behead it
  lexicon: HALOT
  rationale: The verb ערף refers specifically to breaking the neck, especially in
    prescribed ritual killing. 'Break its neck' is idiomatic and precise.
- source_word: כֹּל בְּכוֹר בָּנֶיךָ
  chosen: every firstborn of your sons
  alternatives:
  - every firstborn among your sons
  lexicon: HALOT
  rationale: This phrase refers to each male firstborn son. 'Every firstborn of your
    sons' is a close rendering of the Hebrew construction and keeps the legal register.
- source_word: יֵרָאוּ פָנַי
  chosen: shall appear before me
  alternatives:
  - shall be seen before my face
  - shall appear before my presence
  lexicon: HALOT
  rationale: The Niphal of ראה with 'my face' is an idiom for appearing before God
    in worship. 'Appear before me' communicates the sense in natural English without
    losing the personal force.
- source_word: רֵיקָם
  chosen: empty-handed
  alternatives:
  - empty
  - without an offering
  lexicon: HALOT
  rationale: In pilgrimage/worship context, ריקם means not coming without a gift or
    offering. 'Empty-handed' is the natural English idiom that captures the implied
    sense.
