theological_decisions:
- issue: Rendering the divine first-person reference in the final clause
  chosen_reading: before me
  alternative_readings:
  - before my face
  - before my presence
  rationale: Although the Hebrew literally says 'my face,' the idiom means appearing
    before God. 'Before me' preserves the direct divine speech and reads naturally
    in English without importing additional theological nuance.
  doctrine_reference: 'Translation philosophy §6; Contested terms: יְהוָה YHWH → the
    LORD (not applicable in this verse, but divine-reference handling remains source-driven).'
- issue: Gendered language in בָּנֶיךָ
  chosen_reading: your sons
  alternative_readings:
  - your children
  rationale: The Hebrew explicitly refers to sons, not children generally. Following
    the gender-accurate principle, the masculine term is preserved rather than neutralized.
  doctrine_reference: Translation philosophy §4
