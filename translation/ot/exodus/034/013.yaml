id: EXO.34.13
reference: Exodus 34:13
source:
  edition: WLC
  text: כִּ֤י אֶת מִזְבְּחֹתָ/ם֙ תִּתֹּצ֔וּ/ן וְ/אֶת מַצֵּבֹתָ֖/ם תְּשַׁבֵּר֑וּ/ן
    וְ/אֶת אֲשֵׁרָ֖י/ו תִּכְרֹתֽוּ/ן־־־׃
translation:
  text: Instead, you shall tear down their altars, shatter their pillars, and cut
    down their Asherah poles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For you shall tear down their altars…' The Hebrew conjunction can also
      be rendered 'for,' but here it functions naturally in context as a contrastive
      continuation after the previous prohibition.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'their Asherah poles'; alternatively, 'their Asherim.' The term refers
      to cult objects associated with Asherah.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: Instead
  alternatives:
  - for
  - but
  lexicon: HALOT
  rationale: In context this clause continues the prohibition of covenant with the
    inhabitants and gives the required contrary action. Although כִּי often means
    'for,' here an adversative/contrastive sense is natural in English, marking what
    Israel must do rather than what they must not do.
- source_word: מִזְבְּחֹתָם
  chosen: their altars
  lexicon: HALOT
  rationale: Standard rendering of מִזְבֵּחַ in cultic contexts; plural with 3mp suffix
    is preserved.
- source_word: תִּתֹּצוּן
  chosen: you shall tear down
  alternatives:
  - you shall break down
  - you shall demolish
  lexicon: HALOT
  rationale: נתץ commonly denotes pulling down or demolishing structures. 'Tear down'
    is natural modern English and fits altars.
- source_word: מַצֵּבֹתָם
  chosen: their pillars
  alternatives:
  - their sacred pillars
  - their standing stones
  lexicon: HALOT
  rationale: מַצֵּבָה refers to erected cultic stones/pillars. 'Pillars' is concise
    and readable; the cultic sense is clear from context. Alternatives are viable
    but slightly more interpretive.
- source_word: תְּשַׁבֵּרוּן
  chosen: shatter
  alternatives:
  - break
  - smash
  lexicon: HALOT
  rationale: The Piel of שׁבר intensifies the action. 'Shatter' conveys force better
    than the flatter 'break' while remaining idiomatic.
- source_word: אֲשֵׁרָיו
  chosen: their Asherah poles
  alternatives:
  - their Asherim
  - their Asherah images
  lexicon: HALOT
  rationale: אֲשֵׁרָה can denote either the goddess Asherah or the cult object associated
    with her. In this destruction list, the referent is best taken as cultic wooden
    objects. 'Asherah poles' is the clearest English rendering for modern readers
    while preserving the proper-name connection.
- source_word: תִּכְרֹתוּן
  chosen: cut down
  alternatives:
  - cut off
  - hew down
  lexicon: HALOT
  rationale: כרת literally means cut off/down; with Asherah objects, 'cut down' fits
    the likely wooden referent and is idiomatic.
