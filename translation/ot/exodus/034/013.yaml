theological_decisions:
- issue: Referent of אֲשֵׁרָיו
  chosen_reading: cultic objects associated with Asherah, rendered 'Asherah poles'
  alternative_readings:
  - objects rendered more formally as 'Asherim'
  - images/shrines associated with the goddess Asherah
  rationale: 'The verse lists physical items to be destroyed: altars, pillars, and
    אֲשֵׁרָיו. The destruction verb ''cut down'' strongly suggests wooden cult objects
    rather than the deity herself. Rendering with ''Asherah poles'' communicates the
    likely cultic referent without erasing the connection to Asherah as a named deity.'
