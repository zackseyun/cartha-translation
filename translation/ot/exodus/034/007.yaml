theological_decisions:
- issue: How to render the tension between divine forgiveness and justice in וְנַקֵּה
    לֹא יְנַקֶּה
  chosen_reading: Retain both full forgiveness language and the emphatic statement
    that God will not clear the guilty.
  alternative_readings:
  - Render more dynamically as 'forgiving... yet not leaving the guilty unpunished'
  - Render more formally as 'forgiving... but by no means clearing'
  rationale: The verse intentionally holds mercy and justice together. The translation
    preserves that tension rather than softening either side. Adding 'the guilty'
    clarifies the judicial object implied by the Hebrew verb without importing extra
    doctrine.
  doctrine_reference: Translation philosophy §3
- issue: Whether to specify 'generations' after 'thousands'
  chosen_reading: Do not specify 'generations' in the main text for לָאֲלָפִים.
  alternative_readings:
  - '''for a thousand generations'''
  - '''to thousands of generations'''
  rationale: Unlike Deuteronomy 7:9, this verse does not explicitly include 'generations'
    after 'thousands.' To avoid importing wording from parallel passages, the main
    text keeps the broader Hebrew expression. The likely generational sense is preserved
    in a footnote.
  doctrine_reference: Translation philosophy §1
