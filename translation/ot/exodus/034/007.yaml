id: EXO.34.7
reference: Exodus 34:7
source:
  edition: WLC
  text: נֹצֵ֥ר חֶ֨סֶד֙ לָ/אֲלָפִ֔ים נֹשֵׂ֥א עָוֺ֛ן וָ/פֶ֖שַׁע וְ/חַטָּאָ֑ה וְ/נַקֵּה֙
    לֹ֣א יְנַקֶּ֔ה פֹּקֵ֣ד עֲוֺ֣ן אָב֗וֹת עַל בָּנִים֙ וְ/עַל בְּנֵ֣י בָנִ֔ים עַל
    שִׁלֵּשִׁ֖ים וְ/עַל רִבֵּעִֽים׀־־־־׃
translation:
  text: keeping steadfast love for thousands, forgiving iniquity and transgression
    and sin, but he will by no means clear the guilty, visiting the iniquity of fathers
    on children and on children's children, to the third and to the fourth generation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a thousand generations'; the Hebrew says simply 'for thousands,'
      likely contrasting God's enduring covenant love with judgment 'to the third
      and the fourth generation.'
    reason: alternative_reading
  - marker: b
    text: Or 'he will certainly not acquit' or 'he will certainly not leave unpunished.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew says 'fathers'; this is retained because the source text is specifically
      masculine here, though the sense is generational descent.
    reason: cultural_note
lexical_decisions:
- source_word: נֹצֵר
  chosen: keeping
  alternatives:
  - preserving
  - maintaining
  lexicon: HALOT
  rationale: Qal participle of נצר conveys guarding/keeping/preserving. 'Keeping'
    is concise and idiomatic in the creedal self-declaration formula, while still
    reflecting ongoing action.
- source_word: חֶסֶד
  chosen: steadfast love
  alternatives:
  - covenant loyalty
  - lovingkindness
  lexicon: HALOT
  rationale: חסד is a weighty covenantal term. 'Steadfast love' is established, readable
    modern English that preserves both affection and loyalty better than the archaic
    'lovingkindness.'
- source_word: לָאֲלָפִים
  chosen: for thousands
  alternatives:
  - to thousands
  - for a thousand generations
  lexicon: HALOT
  rationale: The phrase literally means 'for thousands.' In this context it most naturally
    contrasts with 'to the third and fourth,' likely meaning thousands of persons/generations
    broadly. 'For thousands' preserves the Hebrew without over-specifying 'generations,'
    which is not explicit here.
- source_word: נֹשֵׂא
  chosen: forgiving
  alternatives:
  - bearing
  - carrying away
  lexicon: HALOT
  rationale: Although the verb literally means 'bearing/carrying,' in this collocation
    with sin terms it idiomatically means forgiving. 'Forgiving' communicates the
    sense in natural English without obscuring the theological force.
- source_word: עָוֺן
  chosen: iniquity
  alternatives:
  - guilt
  - wrongdoing
  lexicon: HALOT
  rationale: עון can denote both iniquity and its guilt/consequence. 'Iniquity' preserves
    the moral-theological weight and matches the triad with the following terms.
- source_word: פֶשַׁע
  chosen: transgression
  alternatives:
  - rebellion
  lexicon: HALOT
  rationale: פשע often carries the sense of breach/rebellion. 'Transgression' is the
    most standard and fits the triadic accumulation of sin terms.
- source_word: חַטָּאָה
  chosen: sin
  alternatives:
  - offense
  lexicon: HALOT
  rationale: The common and direct rendering is 'sin,' completing the threefold expression
    without unnecessary paraphrase.
- source_word: וְנַקֵּה לֹא יְנַקֶּה
  chosen: but he will by no means clear the guilty
  alternatives:
  - yet he will certainly not leave unpunished
  - but he will surely not acquit
  lexicon: HALOT
  rationale: 'This infinitive absolute + finite verb construction intensifies the
    negation: ''he will certainly not clear/acquit.'' English idiom often requires
    an object; ''the guilty'' makes explicit the implied object and avoids the misleading
    sense that no one is ever cleared. This reflects the judicial force of נקה.'
- source_word: פֹּקֵד
  chosen: visiting
  alternatives:
  - attending to
  - bringing consequences for
  - punishing
  lexicon: HALOT
  rationale: פקד has a broad semantic range. In this judgment context, 'visiting'
    is traditional and sufficiently open-ended, allowing the text's tension to stand
    without over-resolving it into a narrower term like 'punishing.'
- source_word: עֲוֺן אָבוֹת
  chosen: the iniquity of fathers
  alternatives:
  - the guilt of fathers
  - the iniquity of parents
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural 'fathers,' and the translation
    philosophy prefers gender-accurate renderings. 'Iniquity' maintains consistency
    with the earlier occurrence of עון.
- source_word: עַל בָּנִים וְעַל בְּנֵי בָנִים
  chosen: on children and on children's children
  alternatives:
  - upon sons and upon grandsons
  - on sons and on sons' sons
  lexicon: HALOT
  rationale: Although the Hebrew uses masculine forms, the referent is generational
    descendants generally. 'Children and children's children' is natural English and
    preserves the generational scope.
- source_word: עַל שִׁלֵּשִׁים וְעַל רִבֵּעִים
  chosen: to the third and to the fourth generation
  alternatives:
  - to the third and fourth
  - for three and four generations
  lexicon: HALOT
  rationale: '''Generation'' is not repeated in Hebrew but is clearly implied by the
    familial sequence. Supplying it once in English clarifies the sense. The singular
    ''generation'' after ordinals is idiomatic in English.'
