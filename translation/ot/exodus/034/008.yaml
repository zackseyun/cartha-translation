id: EXO.34.8
reference: Exodus 34:8
source:
  edition: WLC
  text: וַ/יְמַהֵ֖ר מֹשֶׁ֑ה וַ/יִּקֹּ֥ד אַ֖רְצָ/ה וַ/יִּשְׁתָּֽחוּ׃
translation:
  text: Moses quickly bowed down to the ground and worshiped.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hurried' or 'hastened.'
    reason: lexical_alternative
  - marker: b
    text: Or 'prostrated himself'; the Hebrew verb can denote bowing oneself in worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמַהֵר
  chosen: quickly
  alternatives:
  - hurried
  - hastened
  lexicon: HALOT
  rationale: The verb מהר denotes acting with haste. Rendering it adverbially with
    'quickly' produces natural English while preserving the narrative emphasis on
    Moses' immediate response.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: וַיִּקֹּד
  chosen: bowed down
  alternatives:
  - knelt
  - bent low
  lexicon: HALOT
  rationale: The verb קדד refers to bowing or inclining oneself. 'Bowed down' fits
    the physical gesture here and pairs naturally with the following verb for worship
    without collapsing the two actions into one.
- source_word: אַרְצָה
  chosen: to the ground
  alternatives:
  - earthward
  - toward the ground
  lexicon: HALOT
  rationale: The directional form of 'earth/land' indicates motion or orientation
    downward. 'To the ground' is idiomatic English and conveys the bodily posture.
- source_word: וַיִּשְׁתָּחוּ
  chosen: worshiped
  alternatives:
  - prostrated himself
  - bowed in worship
  lexicon: HALOT
  rationale: The Hishtaphel/Sht stem of שחה commonly denotes prostration in an act
    of reverence or worship. Since the previous verb already expresses the bodily
    bowing, 'worshiped' best preserves the act's devotional significance without redundant
    wording.
