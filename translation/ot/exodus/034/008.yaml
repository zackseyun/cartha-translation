theological_decisions:
- issue: Whether to render the final verb as a purely physical act or as worship
  chosen_reading: worshiped
  alternative_readings:
  - prostrated himself
  - bowed himself
  rationale: In this context Moses is responding to the self-revelation of the LORD
    in reverence. The Hebrew verb can denote bodily prostration, but here the theological
    force is worshipful response. The preceding verb already states the physical bowing,
    so 'worshiped' preserves both the distinction and the sense.
