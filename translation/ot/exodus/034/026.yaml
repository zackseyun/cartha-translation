theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for יְהוָה, following Jewish reverence tradition and the Septuagintal pattern.
    No footnote is necessary because this is not a per-verse ambiguity but a project-wide
    policy.
