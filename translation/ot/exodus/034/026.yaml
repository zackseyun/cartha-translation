id: EXO.34.26
reference: Exodus 34:26
source:
  edition: WLC
  text: רֵאשִׁ֗ית בִּכּוּרֵי֙ אַדְמָ֣תְ/ךָ֔ תָּבִ֕יא בֵּ֖ית יְהוָ֣ה אֱלֹהֶ֑י/ךָ לֹא תְבַשֵּׁ֥ל גְּדִ֖י בַּ/חֲלֵ֥ב אִמּֽ/וֹ־׃פ
translation:
  text: You shall bring the first of the firstfruits of your ground to the house of Yahweh your God. You shall not boil a young goat in its mother's milk.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the first of the firstfruits of your ground.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רֵאשִׁית
  chosen: the best of
  alternatives:
  - the first of
  - the choicest of
  - the beginning of
  lexicon: HALOT
  rationale: In the collocation רֵאשִׁית בִּכּוּרֵי, the term denotes the first and thus best/choicest portion of the first produce. 'The best of the firstfruits' captures both priority and quality in idiomatic English better than a wooden 'the first of the firstfruits.'
- source_word: בִּכּוּרֵי
  chosen: the firstfruits
  alternatives:
  - the first produce
  - the earliest produce
  lexicon: HALOT
  rationale: Standard cultic term for first yield offered to God. 'Firstfruits' is established, accurate, and still readable in modern English.
- source_word: אַדְמָתְךָ
  chosen: your ground
  alternatives:
  - your land
  - your soil
  lexicon: HALOT
  rationale: אֲדָמָה here refers to cultivated ground/soil producing crops. 'Ground' is concrete and fits the agricultural offering context better than the broader 'land.'
- source_word: תָּבִיא
  chosen: you shall bring
  alternatives:
  - you are to bring
  - you must bring
  lexicon: HALOT
  rationale: Hiphil imperfect in legal material functions as an injunction. 'You shall bring' preserves the covenant-law register without sounding archaic.
- source_word: בֵּית יְהוָה אֱלֹהֶיךָ
  chosen: to the house of the LORD your God
  alternatives:
  - to the house of Yahweh your God
  - to the temple of the LORD your God
  lexicon: HALOT
  rationale: בֵּית is literally 'house,' and the phrase denotes the sanctuary as God's house. 'Temple' would be too historically specific for Exodus. Per doctrine, יְהוָה is rendered 'the LORD,' with 'Yahweh' preserved as an alternative only in documentation, not main text.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: לֹא תְבַשֵּׁל
  chosen: You shall not boil
  alternatives:
  - You shall not cook
  - Do not boil
  lexicon: HALOT
  rationale: בשל specifically denotes boiling/cooking. 'Boil' is the more precise lexical choice and preserves the traditional legal formulation.
- source_word: גְּדִי
  chosen: a young goat
  alternatives:
  - a kid
  - a goat kid
  lexicon: HALOT
  rationale: '''Young goat'' is clear modern English. ''Kid'' is accurate but can momentarily sound ambiguous to contemporary readers.'
- source_word: בַּחֲלֵב אִמּוֹ
  chosen: in its mother's milk
  alternatives:
  - in the milk of its mother
  lexicon: HALOT
  rationale: This is the natural English rendering of the Hebrew prepositional phrase. 'Its mother's milk' is idiomatic while preserving the literal image.
