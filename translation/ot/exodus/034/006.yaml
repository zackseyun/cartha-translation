id: EXO.34.6
reference: Exodus 34:6
source:
  edition: WLC
  text: וַ/יַּעֲבֹ֨ר יְהוָ֥ה עַל פָּנָי/ו֮ וַ/יִּקְרָא֒ יְהוָ֣ה יְהוָ֔ה אֵ֥ל רַח֖וּם וְ/חַנּ֑וּן אֶ֥רֶךְ אַפַּ֖יִם וְ/רַב חֶ֥סֶד וֶ/אֱמֶֽת׀־׀־׀
translation:
  text: Then Yahweh passed before him and proclaimed, “Yahweh, Yahweh, a God compassionate and gracious, slow to anger, and abounding in steadfast love and faithfulness.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'abounding in steadfast love and truth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיַּעֲבֹר
  chosen: passed
  alternatives:
  - passed by
  - went past
  lexicon: HALOT
  rationale: The verb עבר in this narrative context denotes movement past or before someone. 'Passed' is concise and natural English; 'before him' supplied from the following phrase captures the relational sense.
- source_word: עַל פָּנָיו
  chosen: before him
  alternatives:
  - in front of him
  - before his face
  lexicon: HALOT
  rationale: Literally 'upon/before his face.' In idiomatic English, 'before him' best conveys spatial relation without awkward literalism.
- source_word: וַיִּקְרָא
  chosen: proclaimed
  alternatives:
  - called out
  - declared
  lexicon: HALOT
  rationale: In this context of divine self-declaration, קרא is more than merely 'called'; 'proclaimed' captures the solemn public announcement of the divine name and attributes.
- source_word: אֵל
  chosen: a God
  alternatives:
  - God
  - the mighty God
  lexicon: HALOT
  rationale: Here אֵל functions appositionally after the repeated divine name, introducing the list of attributes. 'A God' in English preserves the descriptive force ('God as one who is...') better than a bare adjective string, while avoiding over-interpretation.
- source_word: רַחוּם
  chosen: compassionate
  alternatives:
  - merciful
  - full of compassion
  lexicon: HALOT
  rationale: רחום denotes deep compassion or mercy. 'Compassionate' is readable modern English and pairs well with 'gracious' while preserving the emotional sense.
- source_word: חַנּוּן
  chosen: gracious
  alternatives:
  - merciful
  - favor-giving
  lexicon: HALOT
  rationale: חנון commonly denotes graciousness or the granting of favor. 'Gracious' is the standard and most precise rendering in this collocation.
- source_word: אֶרֶךְ אַפַּיִם
  chosen: slow to anger
  alternatives:
  - long of nostrils
  - patient
  lexicon: HALOT
  rationale: The Hebrew idiom literally refers to being 'long of nostrils,' meaning not quick-tempered. 'Slow to anger' is the established idiomatic equivalent and preserves the sense better than the more generalized 'patient.'
- source_word: רַב
  chosen: abounding in
  alternatives:
  - great in
  - rich in
  lexicon: HALOT
  rationale: With following abstract nouns, רַב conveys abundance. 'Abounding in' is natural English and reflects plenitude rather than mere greatness.
- source_word: חֶסֶד
  chosen: steadfast love
  alternatives:
  - lovingkindness
  - covenant loyalty
  - mercy
  lexicon: HALOT
  rationale: חסד is a theologically rich term involving loyal, covenantal love and kindness. 'Steadfast love' is the best concise English rendering in modern usage, preserving both affection and durability better than 'mercy' or the archaic 'lovingkindness.'
- source_word: אֱמֶת
  chosen: faithfulness
  alternatives:
  - truth
  - reliability
  lexicon: HALOT
  rationale: Although אֱמֶת often means 'truth,' in the collocation 'steadfast love and אֱמֶת' it commonly carries the sense of reliability or faithfulness. 'Faithfulness' best fits the covenantal description of God's character in this context.
