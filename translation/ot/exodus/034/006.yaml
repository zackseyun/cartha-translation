theological_decisions:
- issue: Rendering the repeated divine name יְהוָה
  chosen_reading: Yahweh, Yahweh
  alternative_readings:
  - Yahweh, Yahweh
  - the LORD God
  rationale: The Hebrew repeats the covenant name for emphasis. The translation preserves the repetition rather than smoothing it out. 'The LORD God' would import 'God' into the name sequence rather than leaving אֵל as the following descriptive noun.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of אֱמֶת in the pair חֶסֶד וֶאֱמֶת
  chosen_reading: faithfulness
  alternative_readings:
  - truth
  rationale: To preserve theological tension and lexical transparency, the main text uses 'faithfulness' because the pair describes God's dependable covenant character; the alternative 'truth' is preserved in a footnote because it is also lexically possible and traditional.
