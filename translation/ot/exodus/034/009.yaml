id: EXO.34.9
reference: Exodus 34:9
source:
  edition: WLC
  text: וַ/יֹּ֡אמֶר אִם נָא֩ מָצָ֨אתִי חֵ֤ן בְּ/עֵינֶ֨י/ךָ֙ אֲדֹנָ֔/י יֵֽלֶךְ נָ֥א
    אֲדֹנָ֖/י בְּ/קִרְבֵּ֑/נוּ כִּ֤י עַם קְשֵׁה עֹ֨רֶף֙ ה֔וּא וְ/סָלַחְתָּ֛ לַ/עֲוֺנֵ֥/נוּ
    וּ/לְ/חַטָּאתֵ֖/נוּ וּ/נְחַלְתָּֽ/נוּ־־־־׃
translation:
  text: And he said, “If now I have found favor in your eyes, Lord, please let the
    Lord go in our midst, for it is a stiff-necked people; and forgive our iniquity
    and our sin, and take us as your inheritance.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'go among us' or 'go with us.' The Hebrew literally says 'go in our midst.'
    reason: lexical_alternative
  - marker: b
    text: Or 'make us your possession.' The Hebrew verb can carry the sense of taking
      or assigning as an inheritance/possession.
    reason: alternative_reading
lexical_decisions:
- source_word: חֵן
  chosen: favor
  alternatives:
  - grace
  lexicon: HALOT
  rationale: In the idiom 'find favor in your eyes,' 'favor' is the most natural English
    rendering and preserves the relational sense without importing later theological
    freight that 'grace' may carry.
- source_word: בְּעֵינֶיךָ
  chosen: in your eyes
  alternatives:
  - in your sight
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom. 'In your eyes' is retained because it
    is transparent in English and preserves the source imagery.
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - my Lord
  - the Lord
  lexicon: HALOT
  rationale: The form is a title of address here, not the divine name YHWH. Following
    the doctrine's default for lordship titles, it is rendered 'Lord.' The first occurrence
    functions vocatively ('Lord'); the second, with the verb, is rendered 'the Lord'
    in English for naturalness while referring to the same addressee.
- source_word: יֵלֶךְ נָא ... בְּקִרְבֵּנוּ
  chosen: please let the Lord go in our midst
  alternatives:
  - please let the Lord go among us
  - please may the Lord go with us
  lexicon: HALOT
  rationale: הלך with בקרב conveys movement/presence 'in the midst of' the people.
    'Go in our midst' preserves the spatial imagery more closely than the smoother
    but less literal 'go with us.'
- source_word: קְשֵׁה עֹרֶף
  chosen: stiff-necked
  alternatives:
  - stubborn
  lexicon: HALOT
  rationale: This is a well-established Hebrew metaphor for obstinacy. 'Stiff-necked'
    preserves the metaphor and its covenantal resonance in Exodus.
- source_word: עַם
  chosen: people
  alternatives:
  - nation
  lexicon: HALOT
  rationale: In context Moses speaks of Israel as a covenant people, not primarily
    as a geopolitical nation.
- source_word: עָוֹן
  chosen: iniquity
  alternatives:
  - guilt
  - wrongdoing
  lexicon: HALOT
  rationale: '''Iniquity'' preserves the moral weight of עון and distinguishes it
    from the following חטאת. ''Guilt'' is possible in some contexts, but here the
    paired request for forgiveness favors the offense itself.'
- source_word: חַטָּאת
  chosen: sin
  alternatives:
  - sinfulness
  - offense
  lexicon: HALOT
  rationale: The common and direct rendering 'sin' fits the parallelism with עון and
    keeps the distinction without overcomplication.
- source_word: וּנְחַלְתָּנוּ
  chosen: take us as your inheritance
  alternatives:
  - make us your inheritance
  - possess us
  - claim us as your possession
  lexicon: HALOT
  rationale: From נחל in the causative/denominative sense of taking as a possession
    or inheritance. 'Take us as your inheritance' best captures the covenantal sense
    that Israel would belong to God as his allotted possession, while remaining readable.
