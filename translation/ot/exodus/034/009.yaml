theological_decisions:
- issue: Rendering of אֲדֹנָי in a prayer addressed to YHWH
  chosen_reading: Lord / the Lord
  alternative_readings:
  - my Lord
  - Lord GOD
  rationale: The Hebrew here uses אֲדֹנָי rather than the divine name itself in Moses'
    speech. The translation therefore renders the title as 'Lord' rather than importing
    'the LORD' (reserved for YHWH) or expanding to 'Lord GOD,' which the text does
    not state. The second occurrence is phrased 'the Lord' for idiomatic English while
    preserving the title.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; contested
    terms table for κύριος/Lord and יְהוָה/the LORD'
- issue: Sense of וּנְחַלְתָּנוּ
  chosen_reading: take us as your inheritance
  alternative_readings:
  - make us your possession
  rationale: The clause expresses covenant belonging rather than merely territorial
    inheritance. 'Take us as your inheritance' preserves the theological idea that
    Israel is being claimed by God as his own people without overinterpreting the
    exact legal nuance.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; consistency of key terms'
