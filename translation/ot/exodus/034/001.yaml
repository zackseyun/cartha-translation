id: EXO.34.1
reference: Exodus 34:1
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל מֹשֶׁ֔ה פְּסָל לְ/ךָ֛ שְׁנֵֽי לֻחֹ֥ת אֲבָנִ֖ים כָּ/רִאשֹׁנִ֑ים וְ/כָתַבְתִּי֙ עַל הַ/לֻּחֹ֔ת אֶת הַ/דְּבָרִ֔ים אֲשֶׁ֥ר הָי֛וּ עַל הַ/לֻּחֹ֥ת הָ/רִאשֹׁנִ֖ים אֲשֶׁ֥ר שִׁבַּֽרְתָּ־־־־־־׃
translation:
  text: Then Yahweh said to Moses, “Cut for yourself two stone tablets like the first ones, and I will write on the tablets the words that were on the first tablets, which you broke.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''two tablets of stone.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'Carve' or 'Hew' for yourself two stone tablets like the first ones.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: The common narrative verb אמר is most naturally rendered 'said' here in straightforward discourse introduction.
- source_word: פְּסָל
  chosen: Cut
  alternatives:
  - Carve
  - Hew
  lexicon: HALOT
  rationale: The imperative refers to shaping stone tablets. 'Cut' is natural modern English and preserves the concrete action without archaic tone; 'hew' is too archaic, and 'carve' may suggest decorative engraving rather than preparing slabs.
- source_word: לְךָ
  chosen: for yourself
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The dative pronoun is retained explicitly to reflect the Hebrew emphasis that Moses is to prepare the tablets himself.
- source_word: שְׁנֵי לֻחֹת אֲבָנִים
  chosen: two stone tablets
  alternatives:
  - two tablets of stone
  - two stone slabs
  lexicon: HALOT
  rationale: This is the standard sense of the phrase. 'Two stone tablets' is clear, idiomatic modern English and preserves the material and object.
- source_word: כָּרִאשֹׁנִים
  chosen: like the first ones
  alternatives:
  - like the former ones
  - as the first
  lexicon: HALOT
  rationale: The comparative כ plus 'first' indicates likeness to the earlier tablets. 'Like the first ones' is natural and clear.
- source_word: וְכָתַבְתִּי
  chosen: and I will write
  alternatives:
  - then I will write
  lexicon: HALOT
  rationale: The first-person verb with prefixed conjunction is best rendered straightforwardly as a future promise by the LORD.
- source_word: עַל הַלֻּחֹת
  chosen: on the tablets
  alternatives:
  - upon the tablets
  lexicon: HALOT
  rationale: עַל here indicates inscription surface. 'On' is the natural modern equivalent.
- source_word: הַדְּבָרִים
  chosen: the words
  alternatives:
  - the commandments
  - the matters
  lexicon: HALOT
  rationale: Although the referent is the covenant stipulations, the Hebrew term is simply 'words.' Rendering it as 'commandments' would interpret beyond the immediate wording.
- source_word: אֲשֶׁר הָיוּ עַל הַלֻּחֹת הָרִאשֹׁנִים
  chosen: that were on the first tablets
  alternatives:
  - which were on the former tablets
  lexicon: HALOT
  rationale: This relative clause identifies the content to be rewritten. 'First tablets' is concise and matches the earlier comparative phrase.
- source_word: אֲשֶׁר שִׁבַּרְתָּ
  chosen: which you broke
  alternatives:
  - which you shattered
  lexicon: HALOT
  rationale: שבר means to break/shatter. 'Broke' is the plain, sufficient rendering in context; 'shattered' is possible but more vivid than necessary.
