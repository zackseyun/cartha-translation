theological_decisions:
- issue: Rendering the divine name יְהוָה in a title chain with הָאָדֹן
  chosen_reading: the Lord, the LORD
  alternative_readings:
  - the Lord GOD
  - the Sovereign LORD
  - the Lord Yahweh
  rationale: The Hebrew contains both הָאָדֹן and יְהוָה. To preserve original-language
    primacy and the doctrine default for יְהוָה, both are represented distinctly in
    English. 'The Lord GOD' is a familiar traditional rendering, but 'GOD' obscures
    that the second term is specifically the covenant name YHWH, which this project
    renders as 'the LORD.'
  doctrine_reference: 'Contested terms: יְהוָה YHWH → the LORD; Translation philosophy:
    original-language primacy over translation tradition'
- issue: Gendered obligation language
  chosen_reading: all your males
  alternative_readings:
  - all your men
  - everyone among you
  rationale: The Hebrew is explicitly masculine and refers to male Israelites in the
    covenantal festival obligation. Per doctrine, gender-accurate rendering is preferred
    over gender-neutral smoothing.
  doctrine_reference: 'Translation philosophy: Gender-accurate over gender-neutral'
