id: EXO.34.23
reference: Exodus 34:23
source:
  edition: WLC
  text: שָׁלֹ֥שׁ פְּעָמִ֖ים בַּ/שָּׁנָ֑ה יֵרָאֶה֙ כָּל זְכ֣וּרְ/ךָ֔ אֶת פְּנֵ֛י הָֽ/אָדֹ֥ן
    יְהוָ֖ה אֱלֹהֵ֥י יִשְׂרָאֵֽל־־׀׃
translation:
  text: Three times in the year all your males shall appear before the Lord, the LORD,
    the God of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''before the face of.'' The phrase means ''before'' or ''in the
      presence of.'''
    reason: lexical_alternative
  - marker: b
    text: 'Traditional English often has ''the Lord GOD'' here. Hebrew distinguishes
      two terms: ''the Lord'' (ha''adon) and the divine name YHWH, rendered in this
      translation as ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: שָׁלֹשׁ פְּעָמִים
  chosen: Three times
  alternatives:
  - Three occasions
  lexicon: HALOT
  rationale: The idiom straightforwardly denotes frequency. 'Three times' is the most
    natural and direct English rendering.
- source_word: בַּשָּׁנָה
  chosen: in the year
  alternatives:
  - in a year
  - each year
  lexicon: HALOT
  rationale: With the article, the phrase is naturally rendered 'in the year,' idiomatically
    meaning within the yearly cycle. 'Each year' is possible, but 'in the year' preserves
    the Hebrew form while remaining clear.
- source_word: יֵרָאֶה
  chosen: shall appear
  alternatives:
  - shall be seen
  - shall present himself
  lexicon: HALOT
  rationale: The Niphal of ראה here is the standard cultic expression for appearing
    before God. 'Shall appear' is idiomatic and avoids the misleadingly passive-sounding
    'shall be seen.' 'Present himself' is interpretive and slightly more expansive
    than the Hebrew.
- source_word: כָּל זְכוּרְךָ
  chosen: all your males
  alternatives:
  - every male among you
  - all your men
  lexicon: HALOT
  rationale: The phrase refers specifically to the male members of Israelite households
    obligated to attend the pilgrimage festivals. 'All your males' is gender-accurate
    and closely reflects the Hebrew. 'All your men' is smoother but less formally
    tied to the lexical sense of זָכוּר.
- source_word: אֶת פְּנֵי
  chosen: before
  alternatives:
  - before the face of
  - in the presence of
  lexicon: HALOT
  rationale: The expression 'before the face of' is a common Hebrew idiom meaning
    presence before someone. English normally compresses this to 'before.' A more
    literal rendering would be awkward in the main text.
- source_word: הָאָדֹן
  chosen: the Lord
  alternatives:
  - the Master
  - the Sovereign
  lexicon: HALOT
  rationale: אָדוֹן with the article here functions as a divine title. 'The Lord'
    is the most natural English equivalent and distinguishes it from the following
    covenant name.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD.'
    Because it follows אֲדֹן here, the sequence becomes 'the Lord, the LORD' to preserve
    both titles distinctly.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  alternatives:
  - Israel's God
  lexicon: HALOT
  rationale: This construct chain identifies YHWH specifically as Israel's God. 'The
    God of Israel' is the standard, transparent rendering.
