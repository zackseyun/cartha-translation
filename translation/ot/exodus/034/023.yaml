theological_decisions:
- issue: Rendering the divine name יְהוָה in a title chain with הָאָדֹן
  chosen_reading: the Lord, Yahweh
  alternative_readings:
  - the Lord GOD
  - the Sovereign LORD
  - the Lord Yahweh
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Gendered obligation language
  chosen_reading: all your males
  alternative_readings:
  - all your men
  - everyone among you
  rationale: The Hebrew is explicitly masculine and refers to male Israelites in the covenantal festival obligation. Per doctrine, gender-accurate rendering is preferred over gender-neutral smoothing.
  doctrine_reference: 'Translation philosophy: Gender-accurate over gender-neutral'
