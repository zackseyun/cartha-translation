id: EXO.34.4
reference: Exodus 34:4
source:
  edition: WLC
  text: וַ/יִּפְסֹ֡ל שְׁנֵֽי לֻחֹ֨ת אֲבָנִ֜ים כָּ/רִאשֹׁנִ֗ים וַ/יַּשְׁכֵּ֨ם מֹשֶׁ֤ה בַ/בֹּ֨קֶר֙ וַ/יַּ֨עַל֙ אֶל הַ֣ר סִינַ֔י כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֹת֑/וֹ וַ/יִּקַּ֣ח בְּ/יָד֔/וֹ שְׁנֵ֖י לֻחֹ֥ת אֲבָנִֽים־־׃
translation:
  text: So he cut two stone tablets like the first ones, and Moses rose early in the morning and went up Mount Sinai, just as Yahweh had commanded him, and he took the two stone tablets in his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'carved' or 'hewed' two stone tablets like the first ones.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in his hand'; the singular may function idiomatically.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְסֹל
  chosen: cut
  alternatives:
  - carved
  - hewed
  lexicon: HALOT
  rationale: פסל in this context refers to shaping stone tablets. 'Cut' is natural modern English and preserves the concrete action without sounding archaic like 'hewed.'
- source_word: לֻחֹת אֲבָנִים
  chosen: stone tablets
  alternatives:
  - tablets of stone
  - stone slabs
  lexicon: HALOT
  rationale: A standard rendering for the covenant tablets. 'Stone tablets' is clear, natural, and sufficiently formal.
- source_word: כָּרִאשֹׁנִים
  chosen: like the first ones
  alternatives:
  - like the former ones
  - as the first
  lexicon: HALOT
  rationale: The comparative כ plus 'first/former' indicates similarity to the earlier tablets. 'Like the first ones' is idiomatic and precise.
- source_word: וַיַּשְׁכֵּם ... בַבֹּקֶר
  chosen: rose early in the morning
  alternatives:
  - got up early in the morning
  - started early in the morning
  lexicon: HALOT
  rationale: The idiom means to rise early. 'Rose early in the morning' preserves the narrative tone and the temporal emphasis.
- source_word: וַיַּעַל אֶל הַר סִינַי
  chosen: went up Mount Sinai
  alternatives:
  - ascended Mount Sinai
  - went up to Mount Sinai
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' 'Went up Mount Sinai' is natural English and keeps the upward motion explicit.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֹתוֹ
  chosen: just as the LORD had commanded him
  alternatives:
  - as the LORD commanded him
  lexicon: HALOT
  rationale: כַּאֲשֶׁר marks correspondence with the prior command. 'Just as' slightly sharpens the conformity implied in context; the pluperfect 'had commanded' fits the sequence in English.
- source_word: וַיִּקַּח בְּיָדוֹ
  chosen: he took in his hand
  alternatives:
  - he took in his hands
  - he carried
  lexicon: HALOT
  rationale: The Hebrew is singular, 'in his hand.' English can retain the singular idiomatically here without forcing an interpretive plural.
- source_word: שְׁנֵי לֻחֹת אֲבָנִים
  chosen: the two stone tablets
  alternatives:
  - two stone tablets
  lexicon: HALOT
  rationale: 'The phrase repeats for emphasis and specificity. Including ''the'' in English reflects the known referent: the replacement pair of covenant tablets.'
