id: EXO.34.31
reference: Exodus 34:31
source:
  edition: WLC
  text: וַ/יִּקְרָ֤א אֲלֵ/הֶם֙ מֹשֶׁ֔ה וַ/יָּשֻׁ֧בוּ אֵלָ֛י/ו אַהֲרֹ֥ן וְ/כָל הַ/נְּשִׂאִ֖ים
    בָּ/עֵדָ֑ה וַ/יְדַבֵּ֥ר מֹשֶׁ֖ה אֲלֵ/הֶֽם־׃
translation:
  text: But Moses called to them, and Aaron and all the leaders of the congregation
    returned to him, and Moses spoke to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the chiefs of the congregation' or 'the leaders of the community.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - called out
  - summoned
  lexicon: HALOT
  rationale: From קרא, here with אֲלֵהֶם ('to them'), indicating Moses addressed those
    who were afraid to come near. 'Called' is natural English and sufficiently formal;
    'summoned' could overstate authority, while 'called out' is possible but less
    smooth.
- source_word: אֲלֵהֶם
  chosen: to them
  alternatives:
  - out to them
  lexicon: HALOT
  rationale: The preposition אֶל with pronominal suffix normally means 'to/toward
    them.' In English with 'called,' 'to them' is the most direct rendering.
- source_word: וַיָּשֻׁבוּ אֵלָיו
  chosen: returned to him
  alternatives:
  - came back to him
  - turned back to him
  lexicon: HALOT
  rationale: שׁוּב commonly means 'return.' In this narrative context, Aaron and the
    leaders come back near Moses after initially drawing back because of his radiant
    face. 'Returned to him' preserves the verbal sense without unnecessary paraphrase.
- source_word: הַנְּשִׂאִים
  chosen: the leaders
  alternatives:
  - the chiefs
  - the princes
  - the officials
  lexicon: HALOT
  rationale: נָשִׂיא in the Pentateuch often denotes tribal or communal leaders. 'Leaders'
    is clear modern English and fits the social role better than the archaic 'princes'
    or the narrower 'officials.'
- source_word: בָּעֵדָה
  chosen: of the congregation
  alternatives:
  - of the community
  - in the congregation
  lexicon: HALOT
  rationale: עֵדָה refers to the assembled covenant community. Because הַנְּשִׂאִים
    is in construct-like relation with the following phrase in sense, 'leaders of
    the congregation' is the most idiomatic rendering. 'Community' is possible, but
    'congregation' preserves the corporate assembly nuance common in Exodus.
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - talked
  lexicon: HALOT
  rationale: דבר in the piel is the standard verb for speaking. 'Spoke' is the normal
    biblical English equivalent and maintains appropriate register.
- source_word: וַ
  chosen: But
  alternatives:
  - And
  - Then
  lexicon: HALOT
  rationale: The initial waw continues the narrative, but in context it also marks
    a mild contrast with the previous verse, where Aaron and the Israelites were afraid
    to come near Moses. 'But' brings out that contrast naturally in English.
