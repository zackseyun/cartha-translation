theological_decisions:
- issue: Divine speech orientation in עלה
  chosen_reading: come up
  alternative_readings:
  - go up
  rationale: The Hebrew verb itself allows either 'go up' or 'come up.' Because the
    command is issued by God from the mountain, 'come up' reflects the speaker-centered
    orientation without adding theological content.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not archaic or academic.'
