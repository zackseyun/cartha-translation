id: EXO.34.2
reference: Exodus 34:2
source:
  edition: WLC
  text: וֶ/הְיֵ֥ה נָכ֖וֹן לַ/בֹּ֑קֶר וְ/עָלִ֤יתָ בַ/בֹּ֨קֶר֙ אֶל הַ֣ר סִינַ֔י וְ/נִצַּבְתָּ֥
    לִ֛/י שָׁ֖ם עַל רֹ֥אשׁ הָ/הָֽר־־׃
translation:
  text: And be ready by the morning, and in the morning come up to Mount Sinai and
    present yourself there to me on the top of the mountain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'go up to Mount Sinai.'
    reason: lexical_alternative
  - marker: b
    text: Or 'stand there before me on the summit of the mountain.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וֶהְיֵה
  chosen: be
  alternatives:
  - become
  lexicon: HALOT
  rationale: Qal imperative/volitive sense from היה with prefixed conjunction; in
    context it functions as a command, 'be ready,' not merely existential 'become.'
- source_word: נָכוֹן
  chosen: ready
  alternatives:
  - prepared
  - established
  lexicon: HALOT
  rationale: Predicate adjective meaning prepared/ready. 'Ready' is the most natural
    modern English collocation with the preceding imperative.
- source_word: לַבֹּקֶר
  chosen: by the morning
  alternatives:
  - for the morning
  - in the morning
  lexicon: HALOT
  rationale: The preposition ל here marks readiness with reference to the coming morning;
    'by the morning' best conveys preparedness in advance of the next clause.
- source_word: וְעָלִיתָ
  chosen: come up
  alternatives:
  - go up
  - ascend
  lexicon: HALOT
  rationale: עלה commonly means 'go up/come up.' Because the command is toward God's
    presence on the mountain, 'come up' is idiomatic in English and fits the deictic
    orientation of divine speech.
- source_word: בַבֹּקֶר
  chosen: in the morning
  alternatives:
  - by morning
  - at morning
  lexicon: HALOT
  rationale: 'Temporal phrase specifying when Moses is to ascend. Distinct from the
    prior לַבֹּקֶר, so rendered differently to preserve the sequence: be ready by
    morning, then come up in the morning.'
- source_word: אֶל הַר סִינַי
  chosen: to Mount Sinai
  alternatives:
  - to the mountain of Sinai
  lexicon: HALOT
  rationale: Standard English rendering of the place name phrase; names are transliterated
    per project philosophy.
- source_word: וְנִצַּבְתָּ
  chosen: present yourself
  alternatives:
  - stand
  - station yourself
  - take your stand
  lexicon: HALOT
  rationale: Niphal of נצב can mean stand/take one's stand. 'Present yourself' captures
    the formal sense of appearing before God, which suits the dative 'to me' and the
    setting.
- source_word: לִי
  chosen: to me
  alternatives:
  - before me
  lexicon: HALOT
  rationale: The preposition is literally 'to/for me.' In English, 'present yourself
    there to me' preserves the directness of the Hebrew while implying appearance
    before God.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Simple locative adverb referring to the specified place on Sinai.
- source_word: עַל רֹאשׁ הָהָר
  chosen: on the top of the mountain
  alternatives:
  - at the top of the mountain
  - on the summit of the mountain
  lexicon: HALOT
  rationale: רֹאשׁ literally 'head' in topographical usage means top/summit. 'On the
    top of the mountain' is clear and close to the Hebrew imagery.
