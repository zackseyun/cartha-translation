id: EXO.34.22
reference: Exodus 34:22
source:
  edition: WLC
  text: וְ/חַ֤ג שָׁבֻעֹת֙ תַּעֲשֶׂ֣ה לְ/ךָ֔ בִּכּוּרֵ֖י קְצִ֣יר חִטִּ֑ים וְ/חַג֙ הָֽ/אָסִ֔יף
    תְּקוּפַ֖ת הַ/שָּׁנָֽה׃
translation:
  text: And you shall observe for yourself the Feast of Weeks, the firstfruits of
    the wheat harvest, and the Feast of Ingathering at the turn of the year.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'at the end of the year.' The Hebrew phrase literally refers to the
      year's turning or cycle.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַג
  chosen: Feast
  alternatives:
  - festival
  lexicon: HALOT
  rationale: Denotes a pilgrim feast/festival. 'Feast' is a standard and natural rendering
    in this cultic context and fits the named observances in Exodus.
- source_word: שָׁבֻעֹת
  chosen: Weeks
  lexicon: HALOT
  rationale: The proper name of the festival is literally 'Weeks'; rendering it transparently
    preserves the Hebrew designation rather than replacing it with a later traditional
    label such as 'Pentecost'.
- source_word: תַּעֲשֶׂה לְךָ
  chosen: you shall observe for yourself
  alternatives:
  - you shall keep
  - you shall celebrate
  lexicon: HALOT
  rationale: Literally 'you shall do/make for yourself.' In festival contexts עשה
    with חג idiomatically means to keep/observe a feast. 'Observe' captures the covenantal
    obligation without sounding wooden; 'for yourself' reflects לְךָ without overtranslating
    it as possession.
- source_word: בִּכּוּרֵי
  chosen: the firstfruits of
  alternatives:
  - first fruits of
  - the earliest produce of
  lexicon: HALOT
  rationale: Refers to first produce offered from the harvest. 'Firstfruits' is the
    established and precise cultic term in English.
- source_word: קְצִיר חִטִּים
  chosen: the wheat harvest
  alternatives:
  - wheat reaping
  lexicon: HALOT
  rationale: Construct phrase meaning the harvest/reaping of wheat. 'Wheat harvest'
    is idiomatic modern English.
- source_word: הָאָסִיף
  chosen: Ingathering
  alternatives:
  - the harvest
  - the gathering in
  lexicon: HALOT
  rationale: Traditional and accurate rendering for the autumn feast associated with
    gathering produce. Capitalized as part of the feast name.
- source_word: תְּקוּפַת הַשָּׁנָה
  chosen: at the turn of the year
  alternatives:
  - at the end of the year
  - at the year's circuit
  lexicon: HALOT
  rationale: The phrase refers to the year's turning/cycle. 'At the turn of the year'
    reflects תקופה more precisely than the common but potentially misleading 'end
    of the year,' since the reference is to the seasonal cycle rather than necessarily
    the final calendar day.
