id: EXO.34.12
reference: Exodus 34:12
source:
  edition: WLC
  text: הִשָּׁ֣מֶר לְ/ךָ֗ פֶּן תִּכְרֹ֤ת בְּרִית֙ לְ/יוֹשֵׁ֣ב הָ/אָ֔רֶץ אֲשֶׁ֥ר אַתָּ֖ה
    בָּ֣א עָלֶ֑י/הָ פֶּן יִהְיֶ֥ה לְ/מוֹקֵ֖שׁ בְּ/קִרְבֶּֽ/ךָ־־׃
translation:
  text: Be careful for yourself, lest you make a covenant with the inhabitants of
    the land into which you are going, lest it become a snare in your midst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Watch yourself' or 'Take care.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'cut a covenant,' an idiom meaning 'make a covenant.'
    reason: lexical_alternative
  - marker: c
    text: Or 'which you are entering.'
    reason: lexical_alternative
  - marker: d
    text: Or 'a trap.' The warning likely refers to the covenant becoming a source
      of entanglement and unfaithfulness.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשָּׁמֶר לְךָ
  chosen: Be careful for yourself
  alternatives:
  - Watch yourself
  - Take care
  lexicon: HALOT
  rationale: The Niphal imperative of שׁמר with לְךָ is a reflexive warning formula.
    'Be careful for yourself' preserves both the imperative force and the reflexive
    nuance without sounding archaic.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - so that not
  lexicon: HALOT
  rationale: פֶּן introduces a negative warning or precaution. 'Lest' is concise and
    matches the admonitory structure of the Hebrew, especially with its repetition
    in the verse.
- source_word: תִּכְרֹת בְּרִית
  chosen: you make a covenant
  alternatives:
  - you cut a covenant
  - you enter into a covenant
  lexicon: HALOT
  rationale: כרת ברית is the standard idiom 'cut/make a covenant.' 'Make a covenant'
    is natural modern English; 'cut' is more formally literal but opaque for many
    readers.
- source_word: לְיוֹשֵׁב הָאָרֶץ
  chosen: with the inhabitants of the land
  alternatives:
  - with those dwelling in the land
  - with the one dwelling in the land
  lexicon: HALOT
  rationale: The singular participle functions collectively. 'Inhabitants of the land'
    communicates the collective sense idiomatically in English.
- source_word: אֲשֶׁר אַתָּה בָּא עָלֶיהָ
  chosen: into which you are going
  alternatives:
  - which you are entering
  - upon which you are coming
  lexicon: HALOT
  rationale: The clause identifies the land Israel is about to enter. 'Into which
    you are going' is clear and reflects the motion toward/into the land conveyed
    by בוא + על.
- source_word: יִהְיֶה
  chosen: it become
  alternatives:
  - it be
  - he/one be
  lexicon: HALOT
  rationale: 'The verb is singular and its most natural antecedent is the covenant
    just mentioned. ''Become'' fits the warning sense in context: the covenant would
    turn into a danger.'
- source_word: לְמוֹקֵשׁ
  chosen: a snare
  alternatives:
  - a trap
  lexicon: HALOT
  rationale: מוֹקֵשׁ commonly denotes a snare or trap, often metaphorically for spiritual
    or moral entanglement. 'Snare' preserves the biblical metaphor well.
- source_word: בְּקִרְבֶּךָ
  chosen: in your midst
  alternatives:
  - among you
  - within you
  lexicon: HALOT
  rationale: The phrase can denote what is present among a people or in one's midst.
    'In your midst' preserves the covenant-community setting and avoids over-psychologizing
    the warning.
