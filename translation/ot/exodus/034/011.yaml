theological_decisions:
- issue: Imperative nuance of שׁמר in covenant context
  chosen_reading: Render as a command to keep/heed the commanded stipulations rather
    than as a warning formula alone.
  alternative_readings:
  - Be careful to do what I command you today
  rationale: The verse introduces covenant obligations and divine action. The Hebrew
    supports both guarding/keeping and careful observance. The chosen rendering preserves
    the lexical content of שׁמר without importing the fuller idiom 'be careful to
    do' that is not explicitly present in this verse.
  doctrine_reference: Translation philosophy §1, §5
