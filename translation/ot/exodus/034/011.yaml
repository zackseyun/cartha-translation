id: EXO.34.11
reference: Exodus 34:11
source:
  edition: WLC
  text: שְׁמָ֨ר לְ/ךָ֔ אֵ֛ת אֲשֶׁ֥ר אָנֹכִ֖י מְצַוְּ/ךָ֣ הַ/יּ֑וֹם הִנְ/נִ֧י גֹרֵ֣שׁ
    מִ/פָּנֶ֗י/ךָ אֶת הָ/אֱמֹרִי֙ וְ/הַֽ/כְּנַעֲנִ֔י וְ/הַ/חִתִּי֙ וְ/הַ/פְּרִזִּ֔י
    וְ/הַ/חִוִּ֖י וְ/הַ/יְבוּסִֽי־־׃
translation:
  text: Keep for yourself what I am commanding you today. Look, I am driving out before
    you the Amorites, the Canaanites, the Hittites, the Perizzites, the Hivites, and
    the Jebusites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Observe what I am commanding you today' or 'Be careful concerning what
      I am commanding you today.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from before you'; the phrase means removal from your presence or
      in front of you.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמָר לְךָ
  chosen: Keep for yourself
  alternatives:
  - Observe for yourself
  - Guard yourself concerning
  lexicon: HALOT
  rationale: שׁמר in the imperative can mean keep, observe, or guard. With לְךָ and
    the direct object marker introducing the commanded matter, the sense is to keep/heed
    what is commanded. 'Keep for yourself' preserves the reflexive nuance of לְךָ
    without over-paraphrasing into a mere idiom like 'be careful.'
- source_word: אֵת אֲשֶׁר אָנֹכִי מְצַוְּךָ הַיּוֹם
  chosen: what I am commanding you today
  alternatives:
  - that which I command you today
  - what I command you today
  lexicon: HALOT
  rationale: 'The clause is straightforwardly relative: ''that/what I am commanding
    you today.'' The participle מְצַוֶּה gives an ongoing present force in context;
    English progressive is natural and readable. ''What'' is smoother modern English
    than ''that which'' while preserving the object of obedience.'
- source_word: הִנְנִי
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנְנִי here introduces emphatic divine action. 'Look' conveys the deictic
    force in readable modern English better than archaic 'Behold,' while retaining
    the attention-directing function.
- source_word: גֹרֵשׁ
  chosen: am driving out
  alternatives:
  - am expelling
  - will drive out
  lexicon: HALOT
  rationale: גרש commonly means drive out/expel. The participle after הִנְנִי can
    express imminent or certain action; 'am driving out' preserves the vivid present/imminent
    force better than a simple future.
- source_word: מִפָּנֶיךָ
  chosen: before you
  alternatives:
  - from before you
  - from your presence
  lexicon: HALOT
  rationale: The idiom means removal from before someone's face/presence. 'Before
    you' is idiomatic English and fits the conquest context; 'from before you' is
    more wooden but less natural.
- source_word: הָאֱמֹרִי
  chosen: the Amorites
  lexicon: HALOT
  rationale: Collective singular ethnonym in Hebrew is naturally rendered by the English
    plural ethnonym.
- source_word: הַכְּנַעֲנִי
  chosen: the Canaanites
  lexicon: HALOT
  rationale: Collective singular ethnonym rendered as English plural for naturalness.
- source_word: הַחִתִּי
  chosen: the Hittites
  lexicon: HALOT
  rationale: Collective singular ethnonym rendered as English plural for naturalness.
- source_word: הַפְּרִזִּי
  chosen: the Perizzites
  lexicon: HALOT
  rationale: Collective singular ethnonym rendered as English plural for naturalness.
- source_word: הַחִוִּי
  chosen: the Hivites
  lexicon: HALOT
  rationale: Collective singular ethnonym rendered as English plural for naturalness.
- source_word: הַיְבוּסִי
  chosen: the Jebusites
  lexicon: HALOT
  rationale: Collective singular ethnonym rendered as English plural for naturalness.
