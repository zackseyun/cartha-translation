theological_decisions:
- issue: Idolatry expressed through sexual-infidelity metaphor
  chosen_reading: Retain the metaphor explicitly with 'prostitute themselves' rather
    than flattening to 'go astray' or 'commit idolatry.'
  alternative_readings:
  - go after their gods
  - are unfaithful to God by following their gods
  rationale: The Hebrew intentionally uses charged covenantal language linking idolatry
    with sexual infidelity. Preserving that metaphor maintains the theological force
    and literary texture of the warning.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Singular 'he invites you' after plural antecedent
  chosen_reading: Render distributively as 'one of them invites you.'
  alternative_readings:
  - he invites you
  - they invite you
  rationale: 'The Hebrew singular likely individualizes the scenario: any inhabitant
    may invite Israelite participation. English benefits from making the distributive
    sense explicit while preserving the warning''s logic.'
  doctrine_reference: Translation philosophy §5, §6
