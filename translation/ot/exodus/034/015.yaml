id: EXO.34.15
reference: Exodus 34:15
source:
  edition: WLC
  text: פֶּן תִּכְרֹ֥ת בְּרִ֖ית לְ/יוֹשֵׁ֣ב הָ/אָ֑רֶץ וְ/זָנ֣וּ אַחֲרֵ֣י אֱלֹֽהֵי/הֶ֗ם
    וְ/זָבְחוּ֙ לֵ/אלֹ֣הֵי/הֶ֔ם וְ/קָרָ֣א לְ/ךָ֔ וְ/אָכַלְתָּ֖ מִ/זִּבְחֽ/וֹ־׀׃
translation:
  text: lest you make a covenant with the inhabitants of the land, and they prostitute
    themselves after their gods and sacrifice to their gods, and one of them invites
    you and you eat from his sacrifice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they play the prostitute after their gods.' The Hebrew uses sexual-infidelity
      imagery for idolatry.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and he calls/invites you'; the singular likely has a distributive
      sense, 'one of them invites you.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'you eat of his sacrifice,' that is, food associated with his sacrificial
      offering.
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - so that you do not
  lexicon: HALOT
  rationale: Introduces a warning about a potential outcome. 'Lest' is concise and
    preserves the cautionary force better than a more paraphrastic English rendering.
- source_word: תִּכְרֹת בְּרִית
  chosen: make a covenant
  alternatives:
  - cut a covenant
  - enter into a covenant
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'cut a covenant,' but 'make a covenant'
    is standard, natural English that preserves the covenantal sense without unnecessary
    archaism. 'Enter into a covenant' is possible but slightly more interpretive.
- source_word: לְיוֹשֵׁב הָאָרֶץ
  chosen: with the inhabitants of the land
  alternatives:
  - with those who dwell in the land
  - with the residents of the land
  lexicon: HALOT
  rationale: The phrase refers collectively to the people living in the land. 'Inhabitants'
    is natural and sufficiently formal; 'of the land' preserves the Hebrew specificity.
- source_word: וְזָנוּ אַחֲרֵי אֱלֹהֵיהֶם
  chosen: and they prostitute themselves after their gods
  alternatives:
  - and they whore after their gods
  - and they play the prostitute after their gods
  - and they commit spiritual prostitution after their gods
  lexicon: HALOT
  rationale: זנה is a metaphor of sexual unfaithfulness for idolatry. 'Prostitute
    themselves' preserves the shocking covenantal metaphor without softening it to
    merely 'go after.' 'Play the prostitute' is also viable, but this wording reads
    more naturally in modern English.
- source_word: וְזָבְחוּ לֵאלֹהֵיהֶם
  chosen: and sacrifice to their gods
  alternatives:
  - and offer sacrifices to their gods
  lexicon: HALOT
  rationale: The verb denotes sacrificial worship. 'Sacrifice to their gods' is concise
    and clear; 'offer sacrifices' is slightly more expanded but not necessary.
- source_word: וְקָרָא לְךָ
  chosen: and one of them invites you
  alternatives:
  - and he calls to you
  - and he invites you
  lexicon: HALOT
  rationale: The singular verb after plural verbs is naturally distributive or indefinite
    in context. 'One of them invites you' makes the sense explicit in idiomatic English
    without changing the meaning.
- source_word: וְאָכַלְתָּ מִזִּבְחוֹ
  chosen: and you eat from his sacrifice
  alternatives:
  - and you eat of his sacrifice
  - and you eat from his sacrificial meal
  lexicon: HALOT
  rationale: The phrase warns against participation in idol-related sacrificial food.
    'From his sacrifice' stays close to the Hebrew; 'sacrificial meal' is interpretive
    and therefore left as an alternative rather than the main text.
