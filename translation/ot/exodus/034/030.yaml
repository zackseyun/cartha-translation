theological_decisions:
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - Israelites
  - children of Israel
  rationale: The Hebrew is grammatically masculine and uses a familial designation.
    Following the project's gender-accurate principle, the main text preserves 'sons
    of Israel' rather than neutralizing to 'Israelites,' while recognizing the latter
    as a smoother English alternative.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Rendering of קָרַן in relation to Moses' face
  chosen_reading: was radiant
  alternative_readings:
  - shone
  - sent out rays
  - was horned
  rationale: The context describes a visible manifestation after Moses' encounter
    with the LORD and the people's fear of approaching him. The sense is radiance,
    not literal horns. Because the 'horned' rendering is historically notable, it
    is preserved in a footnote as a lexical alternative rather than adopted in the
    main text.
  doctrine_reference: DOCTRINE.md § Translation philosophy 1, 3
