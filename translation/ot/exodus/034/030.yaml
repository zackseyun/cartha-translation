id: EXO.34.30
reference: Exodus 34:30
source:
  edition: WLC
  text: וַ/יַּ֨רְא אַהֲרֹ֜ן וְ/כָל בְּנֵ֤י יִשְׂרָאֵל֙ אֶת מֹשֶׁ֔ה וְ/הִנֵּ֥ה קָרַ֖ן
    ע֣וֹר פָּנָ֑י/ו וַ/יִּֽירְא֖וּ מִ/גֶּ֥שֶׁת אֵלָֽי/ו־־׃
translation:
  text: When Aaron and all the sons of Israel saw Moses, behold, the skin of his face
    was radiant, and they were afraid to come near him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shone' or 'sent out rays'; the Hebrew verb is rare and historically
      was also rendered 'was horned,' though the context favors radiance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - looked at
  lexicon: HALOT
  rationale: The verb ראה in the wayyiqtol narrative form is most naturally rendered
    'saw.' 'Looked at' is possible in some contexts but is less idiomatic here.
- source_word: וְכָל בְּנֵי יִשְׂרָאֵל
  chosen: and all the sons of Israel
  alternatives:
  - and all the Israelites
  - and all the children of Israel
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the Hebrew familial expression
    בְּנֵי יִשְׂרָאֵל. 'Israelites' is smoother English, but 'sons of Israel' better
    reflects the source and aligns with the project's gender-accurate principle.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - and look
  - and see
  lexicon: HALOT
  rationale: The discourse particle marks sudden attention to what is seen. 'Behold'
    preserves the deictic force and the narrative surprise without paraphrase.
- source_word: קָרַן
  chosen: was radiant
  alternatives:
  - shone
  - sent out rays
  - was horned
  lexicon: HALOT
  rationale: The rare verb from קרן here refers to emitting rays or shining. 'Was
    radiant' communicates the result clearly in natural English. 'Was horned' reflects
    a historically influential but contextually unlikely rendering based on the noun
    'horn'; the immediate context concerns visible brightness that causes fear, not
    literal horns.
- source_word: עוֹר פָּנָיו
  chosen: the skin of his face
  alternatives:
  - his face
  - the surface of his face
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'the skin of his face,' not merely 'his face.'
    Retaining 'skin' preserves the concrete wording and explains that the visible
    surface was altered.
- source_word: וַיִּירְאוּ
  chosen: they were afraid
  alternatives:
  - they feared
  lexicon: HALOT
  rationale: This rendering is idiomatic modern English and accurately conveys the
    emotional response.
- source_word: מִגֶּשֶׁת אֵלָיו
  chosen: to come near him
  alternatives:
  - from approaching him
  - to approach him
  lexicon: HALOT
  rationale: The preposition מִן with the infinitive expresses shrinking back from
    approaching. 'To come near him' is natural English and preserves the sense of
    reluctance to approach.
