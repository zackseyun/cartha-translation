theological_decisions:
- issue: Rendering of covenantal festival terminology
  chosen_reading: Use 'Feast of Unleavened Bread' as a formal covenant observance
    title
  alternative_readings:
  - festival of unleavened bread
  rationale: The verse concerns a divinely instituted sacred observance tied to Israel's
    redemption from Egypt. A title-like rendering preserves the covenantal and liturgical
    weight without importing later doctrinal claims.
  doctrine_reference: Translation philosophy §1, §5
- issue: Reference to Israel in second person singular
  chosen_reading: Retain singular 'you' throughout
  alternative_readings:
  - pluralize to 'you all' or 'Israel shall'
  rationale: The Hebrew uses second person masculine singular, addressing Israel corporately
    through the singular. English 'you' preserves this without unnecessary expansion.
    This maintains source-text form while remaining readable.
  doctrine_reference: Translation philosophy §1, §4
