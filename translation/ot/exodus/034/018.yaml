id: EXO.34.18
reference: Exodus 34:18
source:
  edition: WLC
  text: אֶת חַ֣ג הַ/מַּצּוֹת֮ תִּשְׁמֹר֒ שִׁבְעַ֨ת יָמִ֜ים תֹּאכַ֤ל מַצּוֹת֙ אֲשֶׁ֣ר
    צִוִּיתִ֔/ךָ לְ/מוֹעֵ֖ד חֹ֣דֶשׁ הָ/אָבִ֑יב כִּ֚י בְּ/חֹ֣דֶשׁ הָֽ/אָבִ֔יב יָצָ֖אתָ
    מִ/מִּצְרָֽיִם־׃
translation:
  text: You shall keep the Feast of Unleavened Bread. For seven days you shall eat
    unleavened bread, as I commanded you, at the appointed time in the month of Abib;
    for in the month of Abib you came out from Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'festival of unleavened bread.' The Hebrew חַג can denote a feast or
      festival, especially a sacred appointed observance.
    reason: lexical_alternative
  - marker: b
    text: '''Abib'' is the early spring month associated with the exodus from Egypt.'
    reason: cultural_note
  - marker: c
    text: Or 'you came out of Egypt.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַג הַמַּצּוֹת
  chosen: the Feast of Unleavened Bread
  alternatives:
  - the festival of unleavened bread
  - the pilgrimage feast of unleavened bread
  lexicon: HALOT
  rationale: חַג denotes a feast/festival, often a pilgrimage feast in Torah contexts.
    'Feast' is concise and idiomatic in English, while preserving the formal title-like
    sense. מַצּוֹת refers to unleavened bread/bread made without yeast.
- source_word: תִּשְׁמֹר
  chosen: you shall keep
  alternatives:
  - you shall observe
  - you shall guard
  lexicon: HALOT
  rationale: שׁמר in covenantal/festival contexts commonly means to keep or observe.
    'Keep' preserves the Hebrew's covenantal-observational force and is standard but
    still natural English.
- source_word: שִׁבְעַת יָמִים
  chosen: For seven days
  alternatives:
  - Seven days
  - for a period of seven days
  lexicon: HALOT
  rationale: The phrase marks the duration of the feast observance. Adding 'For' makes
    the English flow naturally while preserving the temporal sense.
- source_word: תֹּאכַל מַצּוֹת
  chosen: you shall eat unleavened bread
  alternatives:
  - you shall eat unleavened loaves
  lexicon: HALOT
  rationale: The singular collective 'unleavened bread' is more idiomatic in English
    than 'unleavened breads,' while accurately representing the Hebrew plural in sense.
- source_word: אֲשֶׁר צִוִּיתִךָ
  chosen: as I commanded you
  alternatives:
  - which I commanded you
  - just as I commanded you
  lexicon: HALOT
  rationale: This relative clause refers back to the manner/timing of observance.
    'As I commanded you' is natural English and preserves the covenant-command force.
- source_word: לְמוֹעֵד
  chosen: at the appointed time
  alternatives:
  - at the appointed season
  - at the set time
  lexicon: HALOT
  rationale: מוֹעֵד denotes an appointed time/season, often for sacred observance.
    'Appointed time' is clear and sufficiently formal.
- source_word: חֹדֶשׁ הָאָבִיב
  chosen: the month of Abib
  alternatives:
  - the month Abib
  - the month of Aviv
  lexicon: HALOT
  rationale: אָבִיב here is the proper name/designation of the month in the exodus
    calendar context. 'Abib' follows standard English biblical transliteration.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: כִּי introduces the rationale for the command. 'For' fits formal yet
    readable English and preserves the explanatory connection.
- source_word: יָצָאתָ מִמִּצְרָיִם
  chosen: you came out from Egypt
  alternatives:
  - you went out from Egypt
  - you came out of Egypt
  lexicon: HALOT
  rationale: יצא means to go/come out. 'Came out from Egypt' is natural in English
    and preserves the exodus motif without overinterpreting.
