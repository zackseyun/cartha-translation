id: EXO.34.5
reference: Exodus 34:5
source:
  edition: WLC
  text: וַ/יֵּ֤רֶד יְהוָה֙ בֶּֽ/עָנָ֔ן וַ/יִּתְיַצֵּ֥ב עִמּ֖/וֹ שָׁ֑ם וַ/יִּקְרָ֥א
    בְ/שֵׁ֖ם יְהוָֽה׃
translation:
  text: And the LORD came down in the cloud and stood there with him, and proclaimed
    the name of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and called on the name of the LORD,' or 'and proclaimed in the name
      of the LORD.' The Hebrew phrase literally includes the preposition 'in/by' with
      'name.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name יְהוָה, rendered 'the LORD'
    rather than transliterated forms, following established covenant-name convention
    while signaling the tetragrammaton.
- source_word: וַיֵּרֶד
  chosen: came down
  alternatives:
  - descended
  - went down
  lexicon: HALOT
  rationale: The verb ירד means 'go down/descend.' 'Came down' is natural modern English
    and fits the narrative perspective without losing the concrete downward movement.
- source_word: בֶּעָנָן
  chosen: in the cloud
  alternatives:
  - in a cloud
  - with the cloud
  lexicon: HALOT
  rationale: The prefixed ב marks location or accompaniment. With the article assimilated,
    the phrase is best rendered 'in the cloud,' referring to the known theophanic
    cloud associated with the LORD's presence in Exodus.
- source_word: וַיִּתְיַצֵּב
  chosen: stood
  alternatives:
  - stationed himself
  - took his stand
  lexicon: HALOT
  rationale: The hitpael of יצב conveys taking one's stand or presenting oneself.
    'Stood' is concise, idiomatic, and preserves the narrative force without overformalizing.
- source_word: עִמּוֹ
  chosen: with him
  alternatives:
  - beside him
  lexicon: HALOT
  rationale: The preposition עם plus pronominal suffix straightforwardly means 'with
    him.' The referent is Moses in context.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: 'The adverb simply locates the action: ''there.'' Retaining it preserves
    the scene-setting emphasis of the Hebrew.'
- source_word: וַיִּקְרָא
  chosen: proclaimed
  alternatives:
  - called
  - declared
  lexicon: HALOT
  rationale: Although קרא often means 'call,' in this context with 'in/by the name
    of the LORD' and followed by the content of proclamation in the next verse, 'proclaimed'
    best captures the public declarative sense.
- source_word: בְשֵׁם יְהוָה
  chosen: the name of the LORD
  alternatives:
  - by the name of the LORD
  - in the name of the LORD
  lexicon: HALOT
  rationale: The phrase literally includes the preposition 'in/by' with 'name.' In
    English, after 'proclaimed,' the most natural rendering is 'proclaimed the name
    of the LORD,' expressing that the divine name and character were announced. The
    more literal prepositional alternatives are preserved in a footnote because the
    Hebrew construction can be understood that way.
