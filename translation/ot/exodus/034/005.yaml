theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD.' This also aligns with the broader translation pattern of reverential
    substitution rather than transliteration.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Subject and sense of וַיִּקְרָא
  chosen_reading: The LORD is the subject, and the verb is rendered 'proclaimed'
  alternative_readings:
  - Moses as subject
  - rendering the verb as 'called'
  rationale: 'The immediate syntax most naturally continues the LORD as the subject
    of the wayyiqtol sequence: the LORD came down, stood with him, and proclaimed.
    This is confirmed by the content of the proclamation in the following verse. Rendering
    it ''proclaimed'' preserves the theological significance of divine self-declaration
    without importing extra interpretation.'
  doctrine_reference: Preserve theological tension rather than resolve it; here the
    syntax is sufficiently clear to translate without a main-text footnote.
