id: EXO.37.21
reference: Exodus 37:21
source:
  edition: WLC
  text: וְ/כַפְתֹּ֡ר תַּחַת֩ שְׁנֵ֨י הַ/קָּנִ֜ים מִמֶּ֗/נָּה וְ/כַפְתֹּר֙ תַּ֣חַת
    שְׁנֵ֤י הַ/קָּנִים֙ מִמֶּ֔/נָּה וְ/כַפְתֹּ֕ר תַּֽחַת שְׁנֵ֥י הַ/קָּנִ֖ים מִמֶּ֑/נָּה
    לְ/שֵׁ֨שֶׁת֙ הַ/קָּנִ֔ים הַ/יֹּצְאִ֖ים מִמֶּֽ/נָּה־׃
translation:
  text: and a bulb under two branches from it, and a bulb under two branches from
    it, and a bulb under two branches from it, for the six branches coming out from
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'knob' for 'bulb' (כפתר), referring to a rounded ornamental feature on
      the lampstand.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַפְתֹּר
  chosen: bulb
  alternatives:
  - knob
  - capital
  lexicon: HALOT
  rationale: In tabernacle/furnishing descriptions, כפתר denotes the rounded ornamental
    element on the lampstand. 'Bulb' best fits the likely shape in clear modern English,
    while 'knob' is possible but less natural and 'capital' suggests an architectural
    top-piece rather than this decorative form.
- source_word: תַּחַת
  chosen: under
  alternatives:
  - beneath
  lexicon: HALOT
  rationale: The preposition straightforwardly indicates position below the paired
    branches. 'Under' is the most natural English equivalent.
- source_word: שְׁנֵי הַקָּנִים
  chosen: two branches
  alternatives:
  - two reeds
  - two arms
  lexicon: HALOT
  rationale: In the menorah description, קנה refers to the lampstand's projecting
    shafts/arms rather than literal reeds. 'Branches' is established and contextually
    apt, conveying the plant-like imagery of the lampstand.
- source_word: מִמֶּנָּה
  chosen: from it
  alternatives:
  - from the lampstand
  - out of it
  lexicon: HALOT
  rationale: The feminine singular pronominal form refers back to the lampstand. 'From
    it' preserves the Hebrew pronoun and avoids over-specifying beyond the immediate
    syntax.
- source_word: לְשֵׁשֶׁת הַקָּנִים
  chosen: for the six branches
  alternatives:
  - corresponding to the six branches
  - belonging to the six branches
  lexicon: HALOT
  rationale: The phrase sums up the three repeated bulb placements in relation to
    the total six side branches. 'For the six branches' is concise and reflects the
    distributive/resultative sense in context.
- source_word: הַיֹּצְאִים מִמֶּנָּה
  chosen: coming out from it
  alternatives:
  - extending from it
  - going out from it
  lexicon: HALOT
  rationale: The participle describes the branches as projecting from the central
    shaft. 'Coming out from it' is a transparent rendering that preserves the verbal
    imagery.
