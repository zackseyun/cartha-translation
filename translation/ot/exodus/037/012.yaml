id: EXO.37.12
reference: Exodus 37:12
source:
  edition: WLC
  text: וַ/יַּ֨עַשׂ ל֥/וֹ מִסְגֶּ֛רֶת טֹ֖פַח סָבִ֑יב וַ/יַּ֧עַשׂ זֵר זָהָ֛ב לְ/מִסְגַּרְתּ֖/וֹ
    סָבִֽיב־׃
translation:
  text: He made for it a frame a handbreadth wide all around, and he made a gold molding
    for its frame all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a rim' or 'a border' for 'frame.'
    reason: lexical_alternative
  - marker: b
    text: Traditionally 'a crown of gold'; here 'molding' reflects an ornamental edging
      around the frame.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִסְגֶּרֶת
  chosen: frame
  alternatives:
  - rim
  - border
  lexicon: HALOT
  rationale: Refers to the structural border/frame attached to the table. 'Frame'
    is clear modern English and fits the construction context better than the less
    specific 'border.'
- source_word: טֹפַח
  chosen: a handbreadth wide
  alternatives:
  - a handbreadth
  - the width of a handbreadth
  lexicon: HALOT
  rationale: The noun denotes a handbreadth as a unit of measure. In English, supplying
    'wide' makes the measurement relation explicit and natural without adding meaning
    beyond the construction context.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  - on all sides
  lexicon: HALOT
  rationale: The term indicates surrounding on every side. 'All around' communicates
    the distributive sense idiomatically in modern English.
- source_word: זֵר
  chosen: molding
  alternatives:
  - rim
  - border
  - crown
  lexicon: HALOT
  rationale: In tabernacle-furnishing contexts this denotes a decorative edging or
    molding, likely raised and ornamental. 'Crown' is traditional but can mislead
    modern readers into thinking of a separate regal object rather than trim.
- source_word: זָהָב
  chosen: gold
  alternatives:
  - golden
  lexicon: HALOT
  rationale: 'The noun is best rendered substantivally as the material of the molding:
    ''a gold molding.'''
- source_word: לְמִסְגַּרְתּוֹ
  chosen: for its frame
  alternatives:
  - for the frame
  - on its frame
  - for its border
  lexicon: HALOT
  rationale: The preposition ל marks relation to the previously mentioned frame. 'For
    its frame' preserves the possessive suffix and the sense that the molding belonged
    to or was attached to that frame.
