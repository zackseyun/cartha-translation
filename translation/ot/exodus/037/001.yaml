id: EXO.37.1
reference: Exodus 37:1
source:
  edition: WLC
  text: וַ/יַּ֧עַשׂ בְּצַלְאֵ֛ל אֶת הָ/אָרֹ֖ן עֲצֵ֣י שִׁטִּ֑ים אַמָּתַ֨יִם וָ/חֵ֜צִי
    אָרְכּ֗/וֹ וְ/אַמָּ֤ה וָ/חֵ֨צִי֙ רָחְבּ֔/וֹ וְ/אַמָּ֥ה וָ/חֵ֖צִי קֹמָתֽ/וֹ־׃
translation:
  text: Bezalel made the ark of acacia wood. Its length was two and a half cubits,
    its width one and a half cubits, and its height one and a half cubits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the chest.' The Hebrew term can refer more generally to a box or chest,
      but in this tabernacle context 'ark' is the most contextually precise rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: made
  alternatives:
  - constructed
  - fashioned
  lexicon: HALOT
  rationale: The verb עשה is the ordinary term 'make/do.' 'Made' is the most direct
    and natural rendering here, without adding craftsmanship nuance beyond the Hebrew.
- source_word: בְּצַלְאֵל
  chosen: Bezalel
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: הָאָרֹן
  chosen: the ark
  alternatives:
  - the chest
  - the box
  lexicon: HALOT
  rationale: אָרוֹן can denote a chest or box, but in Exodus this item is the well-known
    sacred ark. 'Ark' preserves established cultic reference while remaining accurate
    in context.
- source_word: עֲצֵי שִׁטִּים
  chosen: of acacia wood
  alternatives:
  - of acacia
  - from acacia wood
  lexicon: HALOT
  rationale: The construct phrase literally means 'woods of acacia,' idiomatically
    'acacia wood.' This is standard, clear English for the material.
- source_word: אַמָּתַיִם וָחֵצִי
  chosen: two and a half cubits
  alternatives:
  - two cubits and a half
  lexicon: HALOT
  rationale: This is the natural English rendering of the measurement while preserving
    the ancient unit 'cubits' rather than converting it.
- source_word: אָרְכּוֹ
  chosen: its length
  alternatives:
  - its long side
  lexicon: HALOT
  rationale: The noun ארך with pronominal suffix denotes the ark's length; 'its length'
    is the straightforward rendering.
- source_word: וְאַמָּה וָחֵצִי
  chosen: one and a half cubits
  alternatives:
  - a cubit and a half
  lexicon: HALOT
  rationale: Both expressions occur in the verse for width and height. 'One and a
    half cubits' is idiomatic modern English; the sense is unchanged from the more
    literal 'a cubit and a half.'
- source_word: רָחְבּוֹ
  chosen: its width
  alternatives:
  - its breadth
  lexicon: HALOT
  rationale: רחב here denotes the transverse dimension. 'Width' is more natural in
    contemporary English than 'breadth.'
- source_word: קֹמָתוֹ
  chosen: its height
  alternatives:
  - its stature
  lexicon: HALOT
  rationale: קומה denotes vertical extent here. 'Height' is the clear contextual rendering
    for an object’s dimension.
