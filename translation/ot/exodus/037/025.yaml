id: EXO.37.25
reference: Exodus 37:25
source:
  edition: WLC
  text: וַ/יַּ֛עַשׂ אֶת מִזְבַּ֥ח הַ/קְּטֹ֖רֶת עֲצֵ֣י שִׁטִּ֑ים אַמָּ֣ה אָרְכּ/וֹ֩
    וְ/אַמָּ֨ה רָחְבּ֜/וֹ רָב֗וּעַ וְ/אַמָּתַ֨יִם֙ קֹֽמָת֔/וֹ מִמֶּ֖/נּוּ הָי֥וּ קַרְנֹתָֽי/ו־׃
translation:
  text: He made the altar of incense of acacia wood. Its length was one cubit, and
    its width one cubit—it was square—and its height was two cubits. Its horns were
    of one piece with it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the incense altar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He made
  alternatives:
  - And he made
  lexicon: HALOT
  rationale: The waw-consecutive verb narrates a past action. English narrative style
    can omit the initial 'and' without loss, yielding smoother modern prose while
    preserving sequence.
- source_word: מִזְבַּח הַקְּטֹרֶת
  chosen: the altar of incense
  alternatives:
  - the incense altar
  lexicon: HALOT
  rationale: Construct phrase literally means 'altar of the incense.' 'Altar of incense'
    is clear, natural English and preserves the cultic function.
- source_word: עֲצֵי שִׁטִּים
  chosen: of acacia wood
  alternatives:
  - of acacia woods
  - of shittim wood
  lexicon: HALOT
  rationale: Standard modern rendering for the material. 'Shittim wood' is a transliteration
    less accessible to modern readers; 'acacia wood' communicates the referent directly.
- source_word: אַמָּה
  chosen: cubit
  alternatives:
  - about 18 inches
  lexicon: HALOT
  rationale: Retains the ancient unit rather than converting it, preserving formal
    correspondence and avoiding interpretive precision.
- source_word: אָרְכּוֹ ... רָחְבּוֹ
  chosen: Its length ... its width
  lexicon: HALOT
  rationale: Possessive suffixes refer to the altar's dimensions. Standard dimensional
    English requires explicit possessive phrasing.
- source_word: רָבוּעַ
  chosen: it was square
  alternatives:
  - square
  lexicon: HALOT
  rationale: Predicative adjective describing shape. Rendering as a full clause fits
    English syntax and makes the description explicit.
- source_word: וְאַמָּתַיִם קֹמָתוֹ
  chosen: and its height was two cubits
  alternatives:
  - and two cubits was its height
  lexicon: HALOT
  rationale: Reordered into natural English while preserving the measurement statement.
- source_word: מִמֶּנּוּ הָיוּ קַרְנֹתָיו
  chosen: Its horns were of one piece with it
  alternatives:
  - its horns were from it
  - its horns projected from it
  lexicon: HALOT
  rationale: The phrase indicates the horns were made integrally from the altar itself,
    not attached separately. 'Of one piece with it' best conveys the construction
    sense in idiomatic English.
