id: EXO.37.26
reference: Exodus 37:26
source:
  edition: WLC
  text: וַ/יְצַ֨ף אֹת֜/וֹ זָהָ֣ב טָה֗וֹר אֶת גַּגּ֧/וֹ וְ/אֶת קִירֹתָ֛י/ו סָבִ֖יב
    וְ/אֶת קַרְנֹתָ֑י/ו וַ/יַּ֥עַשׂ ל֛/וֹ זֵ֥ר זָהָ֖ב סָבִֽיב־־־׃
translation:
  text: He overlaid it with pure gold—its top, its sides all around, and its horns—and
    he made for it a gold molding all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a gold crown all around.' The Hebrew term refers to an ornamental border
      or rim around the object.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַף
  chosen: overlaid
  alternatives:
  - covered
  - plated
  lexicon: HALOT
  rationale: The verb צפה in this tabernacle-furnishing context refers to applying
    a metal covering over a wooden object. 'Overlaid' is the standard concise English
    equivalent and fits the cultic craftsmanship setting better than the more generic
    'covered' or the more technical 'plated'.
- source_word: זָהָב טָהוֹר
  chosen: pure gold
  alternatives:
  - refined gold
  - clean gold
  lexicon: HALOT
  rationale: The phrase straightforwardly denotes gold of purity/quality. 'Pure gold'
    is idiomatic modern English and preserves the material emphasis without unnecessary
    expansion.
- source_word: גַּגּוֹ
  chosen: its top
  alternatives:
  - its roof
  - its upper surface
  lexicon: HALOT
  rationale: Although גג often means 'roof,' for a small altar/incense altar furnishing
    it refers to the top surface. 'Its top' is the most natural and contextually precise
    rendering in English.
- source_word: קִירֹתָיו
  chosen: its sides
  alternatives:
  - its walls
  lexicon: HALOT
  rationale: Literally the term can denote walls, but for a portable furnishing 'sides'
    is more natural English while still accurately reflecting the object's vertical
    surfaces.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  - round about
  lexicon: HALOT
  rationale: The adverb marks encircling extent. 'All around' is clear, natural, and
    preserves the comprehensive sense better than a bare 'around'.
- source_word: קַרְנֹתָיו
  chosen: its horns
  lexicon: HALOT
  rationale: The cultic term for the altar's projecting corner-horns should be retained
    literally. This is established biblical furniture terminology and should not be
    paraphrased away.
- source_word: זֵר
  chosen: molding
  alternatives:
  - rim
  - border
  - crown
  lexicon: HALOT
  rationale: זֵר here denotes a decorative band or edging around the object. 'Molding'
    communicates an ornamental border in accessible modern English. 'Crown' is more
    traditional but can mislead modern readers into thinking of a royal headdress
    rather than a trim piece; the alternative is preserved in a footnote because of
    translation tradition.
