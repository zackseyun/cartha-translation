id: EXO.37.14
reference: Exodus 37:14
source:
  edition: WLC
  text: לְ/עֻמַּת֙ הַ/מִּסְגֶּ֔רֶת הָי֖וּ הַ/טַּבָּעֹ֑ת בָּתִּים֙ לַ/בַּדִּ֔ים לָ/שֵׂ֖את
    אֶת הַ/שֻּׁלְחָֽן־׃
translation:
  text: The rings were beside the frame, as holders for the poles to carry the table.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'opposite the frame'; the Hebrew לְעֻמַּת can denote position corresponding
      to or facing something nearby.
    reason: lexical_alternative
  - marker: b
    text: Literally 'houses for the poles,' that is, receptacles or holders for them.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְעֻמַּת
  chosen: beside
  alternatives:
  - opposite
  - corresponding to
  - alongside
  lexicon: HALOT
  rationale: The preposition/noun combination indicates position in relation to the
    frame. 'Beside' gives clear spatial sense in natural English without over-specifying
    exact geometry. 'Opposite' is possible, but in this furnishing description 'beside'
    better fits the practical placement of the rings.
- source_word: הַמִּסְגֶּרֶת
  chosen: the frame
  alternatives:
  - the rim
  - the molding
  lexicon: HALOT
  rationale: In tabernacle furniture contexts, מִסְגֶּרֶת refers to the structural
    border/frame around the table. 'Frame' is broad enough to cover the feature without
    forcing a more decorative sense such as 'molding.'
- source_word: הָיוּ
  chosen: were
  alternatives:
  - came to be
  - existed
  lexicon: HALOT
  rationale: Simple past existential/copular sense fits the descriptive inventory
    style of the passage.
- source_word: הַטַּבָּעֹת
  chosen: the rings
  lexicon: HALOT
  rationale: Standard and contextually certain term for the carrying rings attached
    to tabernacle furnishings.
- source_word: בָּתִּים
  chosen: holders
  alternatives:
  - housings
  - receptacles
  - sockets
  lexicon: HALOT
  rationale: Literally 'houses,' but here idiomatically denotes receptacles or holders
    for the poles. 'Holders' is clear modern English and conveys function without
    sounding overly technical.
- source_word: לַבַּדִּים
  chosen: for the poles
  alternatives:
  - for the carrying poles
  - for the staves
  lexicon: HALOT
  rationale: בַּדִּים are the poles used to transport sacred furniture. 'Poles' is
    the clearest modern equivalent; their carrying function is supplied by the following
    infinitive.
- source_word: לָשֵׂאת
  chosen: to carry
  alternatives:
  - to bear
  - to lift
  lexicon: HALOT
  rationale: 'The infinitive expresses purpose: the poles were for carrying the table.
    ''Carry'' is idiomatic and precise in this context.'
- source_word: אֶת־הַשֻּׁלְחָן
  chosen: the table
  lexicon: HALOT
  rationale: Direct object marker plus noun; straightforward reference to the table
    described in this section.
