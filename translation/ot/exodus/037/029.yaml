id: EXO.37.29
reference: Exodus 37:29
source:
  edition: WLC
  text: וַ/יַּ֜עַשׂ אֶת שֶׁ֤מֶן הַ/מִּשְׁחָה֙ קֹ֔דֶשׁ וְ/אֶת קְטֹ֥רֶת הַ/סַּמִּ֖ים
    טָה֑וֹר מַעֲשֵׂ֖ה רֹקֵֽחַ־־׃פ
translation:
  text: He made the holy anointing oil and the pure fragrant incense, the work of
    a perfumer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the incense of spices' or 'the spiced incense.' The Hebrew expression
      literally refers to incense made from aromatic substances.
    reason: lexical_alternative
  - marker: b
    text: Or 'a perfumer's work' or 'blended by a perfumer.' The Hebrew highlights
      skilled preparation by a specialist.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He made
  alternatives:
  - and he made
  - then he made
  lexicon: HALOT
  rationale: Wayyiqtol of עשה narrates a completed past action. 'He made' is natural
    English and preserves the straightforward narrative sequence.
- source_word: שֶׁמֶן הַמִּשְׁחָה קֹדֶשׁ
  chosen: the holy anointing oil
  alternatives:
  - the oil of holy anointing
  - the sacred anointing oil
  lexicon: HALOT
  rationale: Construct chain plus appositional/adjectival קֹדֶשׁ denotes oil designated
    for sacred use. 'Holy anointing oil' is idiomatic, clear, and consistent with
    cultic context.
- source_word: קְטֹרֶת הַסַּמִּים
  chosen: the fragrant incense
  alternatives:
  - the incense of spices
  - the spiced incense
  lexicon: HALOT
  rationale: Literally 'incense of spices/aromatics.' 'Fragrant incense' communicates
    the sense in natural English without over-literal awkwardness, while retaining
    the aromatic aspect.
- source_word: טָהוֹר
  chosen: pure
  alternatives:
  - clean
  lexicon: HALOT
  rationale: In cultic/material context טָהוֹר commonly denotes purity. 'Pure' is
    the standard and most fitting English rendering here.
- source_word: מַעֲשֵׂה רֹקֵחַ
  chosen: the work of a perfumer
  alternatives:
  - blended by a perfumer
  - a perfumer's work
  - the work of an ointment-maker
  lexicon: HALOT
  rationale: The phrase denotes skilled compounded manufacture by a specialist mixer/perfumer.
    'The work of a perfumer' preserves the nominal expression and artisan nuance better
    than a purely verbal paraphrase.
