id: EXO.37.28
reference: Exodus 37:28
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ אֶת הַ/בַּדִּ֖ים עֲצֵ֣י שִׁטִּ֑ים וַ/יְצַ֥ף אֹתָ֖/ם זָהָֽב־׃
translation:
  text: He made the poles of acacia wood and overlaid them with gold.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He made
  alternatives:
  - And he made
  - Then he made
  lexicon: HALOT
  rationale: Qal wayyiqtol of עשה, the standard narrative form meaning 'and/he made.'
    English commonly omits the conjunction in smooth narrative while retaining the
    past action.
- source_word: הַבַּדִּים
  chosen: the poles
  alternatives:
  - the carrying poles
  - the bars
  lexicon: HALOT
  rationale: בַּדִּים in tabernacle/furnishing contexts refers to poles used for carrying
    sacred objects. 'Poles' is the clearest natural English rendering here.
- source_word: עֲצֵי שִׁטִּים
  chosen: of acacia wood
  alternatives:
  - of acacia
  - from acacia wood
  lexicon: HALOT
  rationale: Construct phrase literally 'woods of acacia,' idiomatically 'acacia wood.'
    This is standard and natural English for the material.
- source_word: וַיְצַף
  chosen: and overlaid
  alternatives:
  - and plated
  - and covered
  lexicon: HALOT
  rationale: צפה in this craftsmanship context means to overlay or plate an object
    with a material. 'Overlaid' best matches tabernacle-construction usage in English.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct-object pronoun referring back to the poles.
- source_word: זָהָב
  chosen: with gold
  alternatives:
  - in gold
  - with golden plating
  lexicon: HALOT
  rationale: The accusative material after צפה indicates the substance used for overlaying.
    English idiomatically expresses this as 'with gold.'
