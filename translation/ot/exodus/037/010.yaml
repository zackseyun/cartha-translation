id: EXO.37.10
reference: Exodus 37:10
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ אֶת הַ/שֻּׁלְחָ֖ן עֲצֵ֣י שִׁטִּ֑ים אַמָּתַ֤יִם אָרְכּ/וֹ֙ וְ/אַמָּ֣ה
    רָחְבּ֔/וֹ וְ/אַמָּ֥ה וָ/חֵ֖צִי קֹמָתֽ/וֹ־׃
translation:
  text: He made the table of acacia wood; its length was two cubits, its width one
    cubit, and its height one and a half cubits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''a cubit and a half.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He made
  alternatives:
  - And he made
  - He fashioned
  lexicon: HALOT
  rationale: The waw-consecutive with עשה narrates a past action. 'He made' is natural
    modern English and preserves the straightforward verbal sense. 'And he made' is
    possible but English style often omits repeated initial 'and' in sequential narrative
    at the verse level.
- source_word: הַשֻּׁלְחָן
  chosen: the table
  lexicon: HALOT
  rationale: The noun plainly denotes a table, here the tabernacle table. The definite
    article is preserved.
- source_word: עֲצֵי שִׁטִּים
  chosen: of acacia wood
  alternatives:
  - of acacia
  - of shittim wood
  lexicon: HALOT
  rationale: The construct phrase means 'woods of acacia,' idiomatically 'acacia wood.'
    This is standard, clear English. 'Shittim wood' is more traditional but less transparent
    for modern readers.
- source_word: אַמָּתַיִם
  chosen: two cubits
  alternatives:
  - two forearm-lengths
  lexicon: HALOT
  rationale: אַמָּה is the standard ancient unit 'cubit.' Retaining 'cubits' preserves
    the historical measurement rather than paraphrasing into an approximate modern
    unit.
- source_word: אָרְכּוֹ
  chosen: its length
  alternatives:
  - its long side
  - the length of it
  lexicon: HALOT
  rationale: The noun with 3ms suffix refers to the table's length. English idiom
    prefers 'its length.'
- source_word: וְאַמָּה רָחְבּוֹ
  chosen: its width one cubit
  alternatives:
  - and its width was one cubit
  lexicon: HALOT
  rationale: The phrase gives the second dimension. In the full sentence, 'its width
    one cubit' is smoothed to 'its width was one cubit' for readable English while
    preserving the measurement exactly.
- source_word: וְאַמָּה וָחֵצִי
  chosen: one and a half cubits
  alternatives:
  - a cubit and a half
  lexicon: HALOT
  rationale: Both are accurate. 'One and a half cubits' is slightly more natural in
    contemporary English, while preserving the exact value.
- source_word: קֹמָתוֹ
  chosen: its height
  alternatives:
  - its stature
  lexicon: HALOT
  rationale: In this object-description context, קומה refers to vertical dimension,
    best rendered 'height.'
