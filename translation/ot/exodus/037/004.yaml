id: EXO.37.4
reference: Exodus 37:4
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ בַּדֵּ֖י עֲצֵ֣י שִׁטִּ֑ים וַ/יְצַ֥ף אֹתָ֖/ם זָהָֽב׃
translation:
  text: He made poles of acacia wood and overlaid them with gold.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He made
  alternatives:
  - And he made
  lexicon: HALOT
  rationale: Qal wayyiqtol of עשה, the standard narrative form meaning 'and/he made.'
    English normally omits the initial conjunction in smooth narrative unless needed
    for emphasis.
- source_word: בַּדֵּי
  chosen: poles
  alternatives:
  - staves
  - carrying poles
  lexicon: HALOT
  rationale: בַּד in tabernacle contexts refers to the poles used for carrying sacred
    objects. 'Poles' is clear modern English; 'staves' is archaic, while 'carrying
    poles' is interpretive and more expansive than the Hebrew.
- source_word: עֲצֵי שִׁטִּים
  chosen: of acacia wood
  alternatives:
  - of acacia
  - of shittim wood
  lexicon: HALOT
  rationale: Construct chain meaning wood from the acacia tree(s). 'Acacia wood' is
    standard, natural English. 'Shittim wood' merely transliterates and is less accessible.
- source_word: וַיְצַף
  chosen: and overlaid
  alternatives:
  - and plated
  - and covered
  lexicon: HALOT
  rationale: צפה in this craftsmanship context means to overlay or plate with a material.
    'Overlaid' best matches the tabernacle-building sense and common English usage
    in these passages.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct-object pronoun referring back to the plural 'poles.'
- source_word: זָהָב
  chosen: with gold
  alternatives:
  - gold
  lexicon: HALOT
  rationale: The material used for the overlay is gold. English idiom naturally supplies
    'with' after 'overlaid.'
