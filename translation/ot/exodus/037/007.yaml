id: EXO.37.7
reference: Exodus 37:7
source:
  edition: WLC
  text: וַ/יַּ֛עַשׂ שְׁנֵ֥י כְרֻבִ֖ים זָהָ֑ב מִקְשָׁה֙ עָשָׂ֣ה אֹתָ֔/ם מִ/שְּׁנֵ֖י
    קְצ֥וֹת הַ/כַּפֹּֽרֶת׃
translation:
  text: He made two cherubim of gold; he made them of hammered work, from the two
    ends of the mercy seat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the atonement cover.” The Hebrew term refers to the ark’s cover, associated
      with atonement.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He made
  alternatives:
  - And he made
  - Then he made
  lexicon: HALOT
  rationale: The waw-consecutive with עשה narrates sequential action. 'He made' is
    natural modern English; the conjunction is not required in every English clause
    to preserve the narrative flow.
- source_word: שְׁנֵי כְרֻבִים
  chosen: two cherubim
  alternatives:
  - two cherubs
  lexicon: HALOT
  rationale: כְרֻבִים is the Hebrew plural of cherub. 'Cherubim' is the established
    English borrowing and best preserves the specific tabernacle imagery.
- source_word: זָהָב
  chosen: of gold
  alternatives:
  - gold
  lexicon: HALOT
  rationale: The noun specifies the material from which the cherubim were made. 'Of
    gold' is idiomatic English after the object noun.
- source_word: מִקְשָׁה
  chosen: hammered work
  alternatives:
  - beaten work
  - hammered metalwork
  - of one piece
  lexicon: HALOT
  rationale: מִקְשָׁה refers to something hammered out, especially metalwork shaped
    by beating. 'Hammered work' preserves the manufacturing sense without over-paraphrasing.
    'Of one piece' is an interpretive implication in context, but not the lexical
    core of the noun itself.
- source_word: עָשָׂה אֹתָם
  chosen: he made them
  alternatives:
  - he fashioned them
  lexicon: HALOT
  rationale: The repetition of עשה in Hebrew is retained in English to reflect the
    source text's emphasis on the manner of construction.
- source_word: מִשְּׁנֵי קְצוֹת
  chosen: from the two ends
  alternatives:
  - at the two ends
  - from both ends
  lexicon: HALOT
  rationale: The preposition מִן with 'two ends' most naturally indicates origin/source
    in relation to the cover, matching the idea that the cherubim arose from its two
    ends.
- source_word: הַכַּפֹּרֶת
  chosen: the mercy seat
  alternatives:
  - the atonement cover
  - the cover
  lexicon: HALOT
  rationale: כַּפֹּרֶת denotes the gold cover of the ark associated with atonement.
    'Mercy seat' is the traditional rendering and remains widely recognized in this
    cultic context. Because the term can also be understood more descriptively as
    'atonement cover,' that alternative is preserved in a footnote for transparency.
