theological_decisions:
- issue: Rendering of הַכַּפֹּרֶת in tabernacle context
  chosen_reading: the mercy seat
  alternative_readings:
  - the atonement cover
  - the cover
  rationale: This verse concerns the ark's cover with cherubim attached. 'Mercy seat'
    is a conventional English rendering for כַּפֹּרֶת in this cultic setting and preserves
    continuity with the broader canonical context, while 'atonement cover' is a viable
    more transparent alternative. No doctrinal dispute is being resolved here, so
    the alternative is preserved as a lexical footnote rather than replacing the main
    text.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic; consistency of key terms, or documented exception.'
