id: EXO.37.13
reference: Exodus 37:13
source:
  edition: WLC
  text: וַ/יִּצֹ֣ק ל֔/וֹ אַרְבַּ֖ע טַבְּעֹ֣ת זָהָ֑ב וַ/יִּתֵּן֙ אֶת הַ/טַּבָּעֹ֔ת
    עַ֚ל אַרְבַּ֣ע הַ/פֵּאֹ֔ת אֲשֶׁ֖ר לְ/אַרְבַּ֥ע רַגְלָֽי/ו־׃
translation:
  text: He cast four gold rings for it and put the rings on the four corners that
    were at its four feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "on the four corners belonging to its four legs."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצֹק
  chosen: cast
  alternatives:
  - poured
  - cast in metal
  lexicon: HALOT
  rationale: In tabernacle-construction context with metal objects, the verb refers
    to casting molten metal rather than a generic 'pouring.' 'Cast' is concise and
    idiomatic in English for metalwork.
- source_word: לוֹ
  chosen: for it
  alternatives:
  - for him
  lexicon: HALOT
  rationale: The pronominal suffix refers back to the table in the immediate context,
    so English requires the inanimate pronoun 'it.'
- source_word: טַבְּעֹת
  chosen: rings
  alternatives:
  - ring-shaped fittings
  lexicon: HALOT
  rationale: Standard and contextually precise term for the metal loops used to receive
    carrying poles.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Direct material designation; no contextual reason to expand.
- source_word: וַיִּתֵּן
  chosen: put
  alternatives:
  - set
  - placed
  lexicon: HALOT
  rationale: A natural English rendering for positioning the rings on the table; 'put'
    is clear modern English.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - at
  - upon
  lexicon: HALOT
  rationale: The preposition indicates placement on/at the corners. 'On' is idiomatic
    with 'put the rings on the four corners,' while the following relative clause
    clarifies location.
- source_word: פֵּאֹת
  chosen: corners
  alternatives:
  - edges
  - sides
  lexicon: HALOT
  rationale: In furniture/tabernacle descriptions, the noun commonly denotes extremities
    or corners. 'Corners' best fits the image of four rings, one at each extremity.
- source_word: אֲשֶׁר לְאַרְבַּע רַגְלָיו
  chosen: that were at its four feet
  alternatives:
  - belonging to its four legs
  - for its four feet
  lexicon: HALOT
  rationale: The phrase locates the corners in relation to the table's four feet/legs.
    'At its four feet' preserves the spatial sense without overexplaining. 'Feet'
    follows the Hebrew noun, though English readers may understand table legs from
    context.
