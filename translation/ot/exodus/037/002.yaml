id: EXO.37.2
reference: Exodus 37:2
source:
  edition: WLC
  text: וַ/יְצַפֵּ֛/הוּ זָהָ֥ב טָה֖וֹר מִ/בַּ֣יִת וּ/מִ/ח֑וּץ וַ/יַּ֥עַשׂ ל֛/וֹ זֵ֥ר
    זָהָ֖ב סָבִֽיב׃
translation:
  text: He overlaid it with pure gold, inside and outside, and made for it a surrounding
    rim of gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a gold molding all around' or 'a gold border around it.' The Hebrew
      זֵר denotes a decorative edging encircling the object.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַפֵּהוּ
  chosen: He overlaid it
  alternatives:
  - He covered it
  - He plated it
  lexicon: HALOT
  rationale: The piel of צפה here refers to overlaying an object with a metal covering,
    not merely covering in a general sense. 'Overlaid' is the standard precise English
    for craftsmanship contexts involving gold.
- source_word: זָהָב טָהוֹר
  chosen: with pure gold
  alternatives:
  - with refined gold
  lexicon: HALOT
  rationale: The phrase denotes gold of purity/cleanness. 'Pure gold' is the most
    natural and established rendering in English and fits the tabernacle craftsmanship
    context.
- source_word: מִבַּיִת וּמִחוּץ
  chosen: inside and outside
  alternatives:
  - from within and from without
  - on the inside and on the outside
  lexicon: HALOT
  rationale: The paired expressions indicate the inner and outer surfaces of the object.
    'Inside and outside' is clear modern English while preserving the spatial contrast.
- source_word: וַיַּעַשׂ לוֹ
  chosen: and made for it
  alternatives:
  - and made it
  - and made for him/it
  lexicon: HALOT
  rationale: 'The לֹו marks the object as indirect recipient: he made something for
    it. Since the referent is the ark/table object from context, ''for it'' is preferable
    to a bare ''made'' and avoids ambiguity.'
- source_word: זֵר
  chosen: rim
  alternatives:
  - molding
  - border
  - crown
  lexicon: HALOT
  rationale: זֵר in tabernacle furniture contexts denotes a decorative edging around
    the object. 'Rim' is accessible modern English and conveys a surrounding raised
    border without overinterpreting it as a royal 'crown.'
- source_word: זֵר זָהָב
  chosen: a ... rim of gold
  alternatives:
  - a gold molding
  - a golden border
  lexicon: HALOT
  rationale: The construct-like sequence is best rendered as the material of the rim.
    'Rim of gold' is idiomatic and transparent.
- source_word: סָבִיב
  chosen: surrounding
  alternatives:
  - all around
  - around it
  lexicon: HALOT
  rationale: The term emphasizes encircling on every side. Rendering it adjectivally
    as 'surrounding' keeps the English sentence smooth while preserving the sense
    of encirclement.
