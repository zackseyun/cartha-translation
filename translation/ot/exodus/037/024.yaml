id: EXO.37.24
reference: Exodus 37:24
source:
  edition: WLC
  text: כִּכָּ֛ר זָהָ֥ב טָה֖וֹר עָשָׂ֣ה אֹתָ֑/הּ וְ/אֵ֖ת כָּל כֵּלֶֽי/הָ־׃פ
translation:
  text: He made it and all its utensils from a talent of pure gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all its vessels' or 'all its implements.' The Hebrew כֵּלִים is a broad
      term for articles or utensils associated with the lampstand.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּכָּר
  chosen: a talent
  alternatives:
  - a round loaf
  - a disk
  - a talent-weight
  lexicon: HALOT
  rationale: In tabernacle construction contexts, כִּכָּר denotes the weight measure
    'talent,' not its more basic concrete sense. English 'a talent' is the standard
    and clear rendering for the unit of weight.
- source_word: זָהָב טָהוֹר
  chosen: pure gold
  alternatives:
  - refined gold
  - clean gold
  lexicon: HALOT
  rationale: The adjective טָהוֹר here describes ritual/material purity or cleanness
    of the gold. 'Pure gold' is idiomatic English and fits the craftsmanship context.
- source_word: עָשָׂה
  chosen: He made
  alternatives:
  - he fashioned
  - he made from
  lexicon: HALOT
  rationale: The verb is the common עשה, 'make/do.' 'He made' is sufficiently direct;
    the material source is supplied by the broader clause rather than embedded in
    the verb itself.
- source_word: אֹתָהּ
  chosen: it
  alternatives:
  - the lampstand
  - it (feminine object)
  lexicon: HALOT
  rationale: The feminine singular suffix refers back to the lampstand in the preceding
    context. English requires an explicit pronoun here; 'it' is natural, while the
    antecedent remains contextually clear.
- source_word: וְאֵת כָּל כֵּלֶיהָ
  chosen: and all its utensils
  alternatives:
  - and all its vessels
  - and all its implements
  - and all its articles
  lexicon: HALOT
  rationale: כֵּלִים is a broad term for objects/tools/vessels. In tabernacle furnishing
    contexts, 'utensils' communicates the associated implements clearly in modern
    English without sounding overly technical. The suffix refers to the lampstand's
    associated items.
