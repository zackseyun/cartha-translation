id: EXO.37.23
reference: Exodus 37:23
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ אֶת נֵרֹתֶ֖י/הָ שִׁבְעָ֑ה וּ/מַלְקָחֶ֥י/הָ וּ/מַחְתֹּתֶ֖י/הָ זָהָ֥ב
    טָהֽוֹר־׃
translation:
  text: He made its seven lamps, its tongs, and its trays of pure gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'snuffers' for 'tongs'; the Hebrew term refers to a lamp implement used
      for handling the wicks.
    reason: lexical_alternative
  - marker: b
    text: Or 'firepans.' In this context, the term likely refers to small receptacles
      or trays associated with the lampstand.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He made
  alternatives:
  - And he made
  - Then he made
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative verb from עשה, rendered with simple past
    in natural English. The conjunction is absorbed into the narrative flow rather
    than explicitly represented.
- source_word: נֵרֹתֶיהָ
  chosen: its seven lamps
  alternatives:
  - its lamps, seven
  - its lampstands' lamps
  lexicon: HALOT
  rationale: נֵרֹת are lamps, not lampstands. The 3fs suffix refers back to the lampstand
    described in context, so 'its' is appropriate. English places the number before
    the noun for natural style.
- source_word: שִׁבְעָה
  chosen: seven
  lexicon: HALOT
  rationale: Cardinal number modifying 'lamps'; moved before the noun in idiomatic
    English.
- source_word: מַלְקָחֶיהָ
  chosen: its tongs
  alternatives:
  - its snuffers
  - its wick-tongs
  lexicon: HALOT
  rationale: The term denotes an implement for handling the lamps, traditionally understood
    as tongs/snuffers. 'Tongs' is the broader and more transparent rendering; 'snuffers'
    is possible but more interpretive.
- source_word: מַחְתֹּתֶיהָ
  chosen: its trays
  alternatives:
  - its firepans
  - its censers
  - its ashtrays
  lexicon: HALOT
  rationale: In tabernacle furnishing contexts this term can denote pans or receptacles
    associated with the lamps. Here 'trays' fits the lampstand context better than
    'firepans,' which can suggest altar use, while remaining concrete and readable.
- source_word: זָהָב טָהוֹר
  chosen: of pure gold
  alternatives:
  - pure gold
  - from pure gold
  lexicon: HALOT
  rationale: Material phrase describing the lamps and implements. 'Of pure gold' is
    idiomatic English and clearly conveys composition.
