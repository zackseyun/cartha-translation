id: EXO.37.16
reference: Exodus 37:16
source:
  edition: WLC
  text: וַ/יַּ֜עַשׂ אֶֽת הַ/כֵּלִ֣ים אֲשֶׁ֣ר עַל הַ/שֻּׁלְחָ֗ן אֶת קְעָרֹתָ֤י/ו וְ/אֶת
    כַּפֹּתָי/ו֙ וְ/אֵת֙ מְנַקִּיֹּתָ֔י/ו וְ/אֶת הַ/קְּשָׂוֺ֔ת אֲשֶׁ֥ר יֻסַּ֖ךְ בָּ/הֵ֑ן
    זָהָ֖ב טָהֽוֹר־׀־־־־׃פ
translation:
  text: 'He made the utensils that were on the table: its plates, its cups, its pitchers,
    and its bowls with which the drink offering was poured out, of pure gold.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its dishes, its small bowls, its flagons, and its bowls.' Several vessel
      terms in this verse are rare or context-specific, so exact English equivalents
      are approximate.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֵּלִים
  chosen: the utensils
  alternatives:
  - the vessels
  - the articles
  lexicon: HALOT
  rationale: כְּלִים is a broad term for implements or vessels. 'Utensils' is natural
    modern English for the table implements while remaining concrete.
- source_word: אֲשֶׁר עַל הַשֻּׁלְחָן
  chosen: that were on the table
  alternatives:
  - for the table
  - belonging to the table
  lexicon: HALOT
  rationale: The phrase is literally 'which [were] on the table.' This preserves the
    Hebrew wording without overinterpreting function.
- source_word: קְעָרֹתָיו
  chosen: its plates
  alternatives:
  - its dishes
  - its trays
  lexicon: HALOT
  rationale: קְעָרָה commonly denotes a dish or plate. 'Plates' fits tableware context
    and is idiomatic in English.
- source_word: כַּפֹּתָיו
  chosen: its cups
  alternatives:
  - its pans
  - its small bowls
  lexicon: HALOT
  rationale: Though literally related to 'palm/spoon,' in tabernacle table contexts
    this term refers to a small container. 'Cups' best matches the likely cultic vessel
    function in accessible English.
- source_word: מְנַקִּיֹּתָיו
  chosen: its pitchers
  alternatives:
  - its flagons
  - its jars
  lexicon: HALOT
  rationale: This rare term is traditionally rendered 'flagons,' but that is archaic.
    'Pitchers' conveys a pouring vessel in readable modern English.
- source_word: הַקְּשָׂוֹת
  chosen: its bowls
  alternatives:
  - the bowls
  - the jars
  lexicon: HALOT
  rationale: In this list of table vessels, the term denotes another container associated
    with libation use. 'Bowls' is a standard and understandable rendering.
- source_word: אֲשֶׁר יֻסַּךְ בָּהֵן
  chosen: with which the drink offering was poured out
  alternatives:
  - with which one poured
  - for pouring out
  lexicon: HALOT
  rationale: The verb נסך in the Hofal/passive sense here refers to pouring a libation.
    Supplying 'the drink offering' makes explicit the cultic sense naturally implied
    by the verb and vessel context.
- source_word: זָהָב טָהוֹר
  chosen: of pure gold
  alternatives:
  - pure gold
  lexicon: HALOT
  rationale: This closing material phrase modifies the listed utensils. 'Of pure gold'
    is idiomatic and preserves the material emphasis.
