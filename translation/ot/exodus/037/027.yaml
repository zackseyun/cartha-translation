id: EXO.37.27
reference: Exodus 37:27
source:
  edition: WLC
  text: וּ/שְׁתֵּי֩ טַבְּעֹ֨ת זָהָ֜ב עָֽשָׂה ל֣/וֹ מִ/תַּ֣חַת לְ/זֵר֗/וֹ עַ֚ל שְׁתֵּ֣י
    צַלְעֹתָ֔י/ו עַ֖ל שְׁנֵ֣י צִדָּ֑י/ו לְ/בָתִּ֣ים לְ/בַדִּ֔ים לָ/שֵׂ֥את אֹת֖/וֹ
    בָּ/הֶֽם־׀׃
translation:
  text: And he made for it two rings of gold under its rim, on its two side panels,
    on its two sides, as holders for poles with which to carry it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under its molding.' The Hebrew זֵר refers to the decorative border or
      rim around the top.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew repeats two related expressions: ''on its two side-pieces, on its
      two sides.'' The translation preserves both rather than smoothing them away.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁתֵּי
  chosen: And... two
  alternatives:
  - and two
  lexicon: HALOT
  rationale: The conjunction plus feminine construct numeral introduces the next item
    in sequence. English naturally renders this as 'And... two' in narrative description.
- source_word: טַבְּעֹת
  chosen: rings
  alternatives:
  - ring-shaped fittings
  lexicon: HALOT
  rationale: The noun commonly denotes rings, especially metal rings used as fixtures
    for carrying sacred furniture.
- source_word: זָהָב
  chosen: of gold
  alternatives:
  - gold
  lexicon: HALOT
  rationale: 'A genitival material sense is most natural in English: ''rings of gold.'''
- source_word: עָשָׂה לּוֹ
  chosen: he made for it
  alternatives:
  - he made it
  - he made for himself
  lexicon: HALOT
  rationale: The pronominal suffix refers to the altar described in context, not to
    a person. 'For it' reflects the dative/object relation idiomatically in English.
- source_word: מִתַּחַת לְזֵרוֹ
  chosen: under its rim
  alternatives:
  - beneath its molding
  - under its border
  - under its crown
  lexicon: HALOT
  rationale: זֵר in tabernacle-furniture contexts refers to the decorative border/rim
    around the top edge. 'Rim' is clear modern English; 'crown' is more traditional
    but can mislead readers into thinking of a separate regal object.
- source_word: עַל שְׁתֵּי צַלְעֹתָיו
  chosen: on its two side panels
  alternatives:
  - on its two ribs
  - on its two sides
  lexicon: HALOT
  rationale: צלע literally can mean side, rib, or side-piece. Here it likely refers
    to the structural side pieces of the altar. 'Side panels' distinguishes it from
    the following צִדָּיו while remaining natural.
- source_word: עַל שְׁנֵי צִדָּיו
  chosen: on its two sides
  alternatives:
  - on both its sides
  lexicon: HALOT
  rationale: צד is the ordinary term for side. Retaining both phrases reflects the
    Hebrew's somewhat repetitive specification rather than collapsing them.
- source_word: לְבָתִּים
  chosen: as holders
  alternatives:
  - as housings
  - as receptacles
  lexicon: HALOT
  rationale: Literally 'as houses,' but in this construction it means receptacles
    or holders for the poles. 'Holders' is idiomatic and clear.
- source_word: לְבַדִּים
  chosen: for poles
  alternatives:
  - for carrying poles
  - for staves
  lexicon: HALOT
  rationale: בדים are the poles used to carry tabernacle furnishings. 'Poles' is standard
    modern English.
- source_word: לָשֵׂאת אֹתוֹ בָּהֶם
  chosen: with which to carry it
  alternatives:
  - to carry it by them
  - for carrying it with them
  lexicon: HALOT
  rationale: The infinitive expresses purpose. English idiom prefers 'with which to
    carry it,' making the instrumental force of בָּהֶם explicit.
