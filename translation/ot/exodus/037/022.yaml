id: EXO.37.22
reference: Exodus 37:22
source:
  edition: WLC
  text: כַּפְתֹּרֵי/הֶ֥ם וּ/קְנֹתָ֖/ם מִמֶּ֣/נָּה הָי֑וּ כֻּלָּ֛/הּ מִקְשָׁ֥ה אַחַ֖ת
    זָהָ֥ב טָהֽוֹר׃
translation:
  text: Their buds and their branches were of one piece with it; all of it was one
    hammered work of pure gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their knobs'; the Hebrew term refers to a rounded ornamental feature,
      here likely expressed with floral imagery as 'buds.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'from it'; the sense is that the buds and branches were made as
      one piece with the lampstand itself.
    reason: lexical_alternative
  - marker: c
    text: Or 'one piece of hammered work' or 'hammered from one piece.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּפְתֹּרֵיהֶם
  chosen: their buds
  alternatives:
  - their knobs
  - their calyxes
  - their capitals
  lexicon: HALOT
  rationale: In the lampstand description, כַּפְתּוֹר refers to a rounded ornamental
    feature associated with floral imagery. 'Buds' fits the immediate tabernacle-lampstand
    context better than the more architectural 'capitals' or the less natural 'knobs,'
    while remaining concrete.
- source_word: וּקְנֹתָם
  chosen: and their branches
  alternatives:
  - and their shafts
  - and their reeds
  lexicon: HALOT
  rationale: קָנֶה commonly denotes a reed or stalk, and in the menorah context it
    refers to the projecting arms/branches. 'Branches' is the most natural English
    rendering in this cultic-artistic context.
- source_word: מִמֶּנָּה
  chosen: with it
  alternatives:
  - from it
  - from the lampstand
  lexicon: HALOT
  rationale: The phrase indicates integral construction from the same piece as the
    lampstand. English idiom is best served by 'of one piece with it,' which captures
    the sense of derivation and unity better than a bare 'from it.'
- source_word: הָיוּ
  chosen: were
  alternatives:
  - came to be
  lexicon: HALOT
  rationale: Simple past 'were' appropriately renders the stative/copular sense here.
- source_word: כֻּלָּהּ
  chosen: all of it
  alternatives:
  - the whole of it
  - it all
  lexicon: HALOT
  rationale: The feminine singular suffix refers back to the lampstand as a whole.
    'All of it' preserves the comprehensive emphasis.
- source_word: מִקְשָׁה אַחַת
  chosen: one hammered work
  alternatives:
  - one piece of hammered work
  - hammered from one piece
  lexicon: HALOT
  rationale: מִקְשָׁה denotes something hammered/beaten out of metal, and אַחַת emphasizes
    unity. 'One hammered work' is concise and faithful; the preceding 'of one piece
    with it' already expresses the integrated construction.
- source_word: זָהָב טָהוֹר
  chosen: pure gold
  alternatives:
  - refined gold
  - clean gold
  lexicon: HALOT
  rationale: Standard and accurate rendering for the material description in tabernacle
    texts.
