theological_decisions:
- issue: Rendering of כַּפֹּרֶת in a cultic context
  chosen_reading: mercy seat
  alternative_readings:
  - atonement cover
  - cover
  rationale: Although the Hebrew term can denote the ark's cover/lid, in Israel's
    worship it is specifically the place associated with atonement. 'Mercy seat' preserves
    that theological-cultic significance and aligns with established biblical usage
    without importing extra doctrinal claims. Because this term is conceptually related
    to later discussions of ἱλαστήριον, the more explanatory alternative is preserved
    in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 6
