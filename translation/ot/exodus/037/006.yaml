id: EXO.37.6
reference: Exodus 37:6
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ כַּפֹּ֖רֶת זָהָ֣ב טָה֑וֹר אַמָּתַ֤יִם וָ/חֵ֨צִי֙ אָרְכָּ֔/הּ וְ/אַמָּ֥ה
    וָ/חֵ֖צִי רָחְבָּֽ/הּ׃
translation:
  text: He made the mercy seat of pure gold; its length was two and a half cubits,
    and its width a cubit and a half.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'atonement cover.' The Hebrew term refers to the gold cover of the ark
      and carries atonement associations.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He made
  alternatives:
  - And he made
  - Then he made
  lexicon: HALOT
  rationale: Wayyiqtol of עשה narrates a past sequential action. English can omit
    the conjunction for natural style while preserving the narrative sense.
- source_word: כַּפֹּרֶת
  chosen: the mercy seat
  alternatives:
  - the atonement cover
  - the cover
  lexicon: HALOT
  rationale: Traditional but still intelligible rendering for the lid of the ark associated
    with atonement. 'Mercy seat' best preserves the cultic/theological identity of
    the object in biblical usage, while 'atonement cover' is a possible more explanatory
    alternative.
- source_word: זָהָב טָהוֹר
  chosen: of pure gold
  alternatives:
  - pure gold
  - from pure gold
  lexicon: HALOT
  rationale: 'Construct-like material expression is naturally rendered in English
    as composition: ''of pure gold.'''
- source_word: אַמָּתַיִם וָחֵצִי
  chosen: two and a half cubits
  alternatives:
  - two cubits and a half
  lexicon: HALOT
  rationale: Idiomatic English measurement rendering of the Hebrew numeral plus 'half.'
- source_word: אָרְכָּהּ
  chosen: its length was
  alternatives:
  - its length
  lexicon: HALOT
  rationale: The suffix refers to the mercy seat. Supplying 'was' makes the verbless
    measurement clause natural in English.
- source_word: וְאַמָּה וָחֵצִי
  chosen: and a cubit and a half
  alternatives:
  - and one and a half cubits
  lexicon: HALOT
  rationale: Retains the singular 'cubit' after the numeral phrase in idiomatic English
    while matching the Hebrew measurement.
- source_word: רָחְבָּהּ
  chosen: its width
  alternatives:
  - its breadth
  lexicon: HALOT
  rationale: '''Width'' is clearer modern English than ''breadth'' while accurately
    representing the dimension term.'
