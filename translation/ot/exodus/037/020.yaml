id: EXO.37.20
reference: Exodus 37:20
source:
  edition: WLC
  text: וּ/בַ/מְּנֹרָ֖ה אַרְבָּעָ֣ה גְבִעִ֑ים מְשֻׁ֨קָּדִ֔ים כַּפְתֹּרֶ֖י/הָ וּ/פְרָחֶֽי/הָ׃
translation:
  text: And on the lampstand were four cups shaped like almond blossoms, with its
    buds and its flowers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "four almond-shaped cups, with its knobs and its blossoms."
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַ/מְּנֹרָה
  chosen: And on the lampstand were
  alternatives:
  - And in the lampstand were
  - Now on the lampstand were
  lexicon: HALOT
  rationale: 'The prefixed conjunction and preposition with מְנֹרָה indicate location:
    ''and/in-on the lampstand.'' English idiom prefers ''on the lampstand were'' in
    this tabernacle-furnishing context, since the decorative elements are attached
    to the lampstand rather than located inside it.'
- source_word: אַרְבָּעָה
  chosen: four
  lexicon: HALOT
  rationale: Straightforward cardinal number modifying the following masculine plural
    noun 'cups.'
- source_word: גְבִעִים
  chosen: cups
  alternatives:
  - bowls
  - goblets
  lexicon: HALOT
  rationale: The noun denotes cup-shaped decorative elements. 'Cups' is the most natural
    and sufficiently literal rendering in English; 'bowls' is possible but less precise
    for ornamental lampstand features.
- source_word: מְשֻׁקָּדִים
  chosen: shaped like almond blossoms
  alternatives:
  - almond-shaped
  - made like almond blossoms
  - decorated with almond blossoms
  lexicon: HALOT
  rationale: This passive participial form from the almond/blossom-related root describes
    the cups as fashioned in an almond-blossom pattern. 'Shaped like almond blossoms'
    makes the ornamental sense explicit in natural English.
- source_word: כַּפְתֹּרֶיהָ
  chosen: its buds
  alternatives:
  - its knobs
  - its capitals
  lexicon: HALOT
  rationale: כפתור in tabernacle descriptions refers to knob-like ornamental projections
    associated with the lampstand. 'Buds' fits the floral imagery of almond blossoms
    and communicates the decorative form more clearly for modern readers, while preserving
    the object as part of the lampstand.
- source_word: וּפְרָחֶיהָ
  chosen: and its flowers
  alternatives:
  - and its blossoms
  lexicon: HALOT
  rationale: The noun means flowers/blossoms. 'Flowers' is clear and pairs well with
    'buds'; 'blossoms' would also work but could sound repetitive alongside 'almond
    blossoms' earlier in the verse.
