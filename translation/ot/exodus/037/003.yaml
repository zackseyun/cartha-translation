id: EXO.37.3
reference: Exodus 37:3
source:
  edition: WLC
  text: וַ/יִּצֹ֣ק ל֗/וֹ אַרְבַּע֙ טַבְּעֹ֣ת זָהָ֔ב עַ֖ל אַרְבַּ֣ע פַּעֲמֹתָ֑י/ו וּ/שְׁתֵּ֣י
    טַבָּעֹ֗ת עַל צַלְע/וֹ֙ הָֽ/אֶחָ֔ת וּ/שְׁתֵּי֙ טַבָּע֔וֹת עַל צַלְע֖/וֹ הַ/שֵּׁנִֽית־־׃
translation:
  text: He cast for it four rings of gold on its four feet, with two rings on its
    one side and two rings on its second side.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on its four corners' or 'on its four supports'; the Hebrew term can
      refer to feet or lower extremities/support points.
    reason: lexical_alternative
  - marker: b
    text: Literally 'on its one side ... on its second side'; that is, two rings on
      each side.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצֹק
  chosen: He cast
  alternatives:
  - He poured
  - He molded
  lexicon: HALOT
  rationale: The verb יצק in metalworking context refers to casting molten metal.
    'He cast' is idiomatic and precise in English for making gold rings.
- source_word: לוֹ
  chosen: for it
  alternatives:
  - for him
  lexicon: HALOT
  rationale: The pronominal suffix refers to the altar described in context, an inanimate
    object in English, so 'for it' is required.
- source_word: טַבְּעֹת זָהָב
  chosen: rings of gold
  alternatives:
  - gold rings
  lexicon: HALOT
  rationale: Either English order is possible; 'rings of gold' stays slightly closer
    to the Hebrew construct while remaining natural.
- source_word: פַּעֲמֹתָיו
  chosen: its four feet
  alternatives:
  - its four corners
  - its four supports
  lexicon: HALOT
  rationale: The noun can denote feet/steps or extremities. In tabernacle-furniture
    contexts it often refers to the lower projecting parts or feet on which rings
    are placed. 'Feet' is the most direct rendering here, while alternatives are possible
    interpretive expansions.
- source_word: צַלְעוֹ
  chosen: its side
  alternatives:
  - its flank
  lexicon: HALOT
  rationale: צלע commonly means 'side' in architectural/object descriptions. 'Side'
    is the natural modern English equivalent.
- source_word: הָאֶחָת
  chosen: its one side
  alternatives:
  - the one side
  - one side
  lexicon: HALOT
  rationale: The Hebrew specifies the first of two sides. Rendering with possessive
    keeps the object reference explicit in English.
- source_word: הַשֵּׁנִית
  chosen: its second side
  alternatives:
  - the other side
  lexicon: HALOT
  rationale: Literally 'the second.' 'Its second side' preserves the formal correspondence;
    'the other side' is smoother but slightly less literal.
