id: EXO.37.11
reference: Exodus 37:11
source:
  edition: WLC
  text: וַ/יְצַ֥ף אֹת֖/וֹ זָהָ֣ב טָה֑וֹר וַ/יַּ֥עַשׂ ל֛/וֹ זֵ֥ר זָהָ֖ב סָבִֽיב׃
translation:
  text: He overlaid it with pure gold, and made for it a gold molding all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a gold rim' or traditionally 'a gold crown' all around.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַף
  chosen: overlaid
  alternatives:
  - covered
  - plated
  lexicon: HALOT
  rationale: The verb צפה in this construction refers to overlaying an object with
    a material veneer, especially metal in tabernacle-furnishing contexts. 'Overlaid'
    is the standard precise English equivalent and fits the craftsmanship setting
    better than the broader 'covered.'
- source_word: אֹתוֹ
  chosen: it
  rationale: Direct-object pronoun referring back to the table in the previous verse.
    English requires the neuter object pronoun 'it.'
- source_word: זָהָב טָהוֹר
  chosen: pure gold
  alternatives:
  - refined gold
  - clean gold
  lexicon: HALOT
  rationale: The phrase denotes gold of high purity. 'Pure gold' is the natural and
    established English rendering without sounding archaic.
- source_word: וַיַּעַשׂ לוֹ
  chosen: made for it
  alternatives:
  - made it
  - fashioned for it
  lexicon: HALOT
  rationale: 'The preposition ל with the pronoun is best represented explicitly: he
    made something for the object, not merely made the object itself. ''Made for it''
    preserves that relation clearly.'
- source_word: זֵר
  chosen: molding
  alternatives:
  - rim
  - border
  - crown
  lexicon: HALOT
  rationale: זֵר here denotes a decorative edging or raised border around the table.
    'Molding' best captures a crafted ornamental band in contemporary English. 'Crown'
    is too literal and potentially misleading in modern usage, though it reflects
    the traditional rendering.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Simple material term; rendered directly as 'gold.'
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  - round about
  lexicon: HALOT
  rationale: The adverb indicates encircling extent. 'All around' is idiomatic modern
    English and preserves the sense of a complete surrounding border.
