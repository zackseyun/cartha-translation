id: EXO.37.17
reference: Exodus 37:17
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ אֶת הַ/מְּנֹרָ֖ה זָהָ֣ב טָה֑וֹר מִקְשָׁ֞ה עָשָׂ֤ה אֶת הַ/מְּנֹרָה֙
    יְרֵכָ֣/הּ וְ/קָנָ֔/הּ גְּבִיעֶ֛י/הָ כַּפְתֹּרֶ֥י/הָ וּ/פְרָחֶ֖י/הָ מִמֶּ֥/נָּה
    הָיֽוּ־־׃
translation:
  text: He made the lampstand of pure gold. He made the lampstand of hammered work;
    its base and its shaft, its cups, its buds, and its blossoms were of one piece
    with it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'beaten work.' The Hebrew term refers to metal shaped by hammering.
    reason: lexical_alternative
  - marker: b
    text: Or 'its knobs' for 'its buds.' The Hebrew term denotes ornamental projections;
      the floral rendering is chosen because of the lampstand's plant-like design.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְּנֹרָה
  chosen: lampstand
  alternatives:
  - lamp
  lexicon: HALOT
  rationale: Refers to the cultic seven-branched stand, not merely a single lamp.
    'Lampstand' is the standard precise English equivalent.
- source_word: זָהָב טָהוֹר
  chosen: pure gold
  alternatives:
  - clean gold
  lexicon: HALOT
  rationale: The adjective טָהוֹר in material descriptions denotes purity/refinement.
    'Pure gold' is idiomatic and accurate.
- source_word: מִקְשָׁה
  chosen: hammered work
  alternatives:
  - beaten work
  - hammered piece
  lexicon: HALOT
  rationale: Describes metalwork formed by hammering from a single mass. 'Hammered
    work' preserves the manufacturing sense in natural English.
- source_word: יְרֵכָהּ
  chosen: its base
  alternatives:
  - its thigh
  - its pedestal
  lexicon: HALOT
  rationale: Literally 'thigh/side,' but in tabernacle furnishing context it denotes
    the lower supporting part of the lampstand. 'Base' best conveys the referent in
    English.
- source_word: קָנָהּ
  chosen: its shaft
  alternatives:
  - its stem
  - its branch
  lexicon: HALOT
  rationale: Here the singular names the central structural element of the lampstand.
    'Shaft' fits the object better than the more botanical 'stem'; 'branch' would
    be misleading in the singular here.
- source_word: גְּבִיעֶיהָ
  chosen: its cups
  alternatives:
  - its bowls
  lexicon: HALOT
  rationale: The decorative cup-shaped elements are best rendered 'cups'; 'bowls'
    is possible but less conventional for this furnishing description.
- source_word: כַּפְתֹּרֶיהָ
  chosen: its buds
  alternatives:
  - its knobs
  - its capitals
  lexicon: HALOT
  rationale: The term denotes knob-like ornamental projections. 'Buds' fits the floral
    imagery of the lampstand better in this immediate context, though 'knobs' is a
    viable more formal alternative.
- source_word: פְרָחֶיהָ
  chosen: its blossoms
  alternatives:
  - its flowers
  lexicon: HALOT
  rationale: Both are possible; 'blossoms' pairs naturally with 'buds' and preserves
    the floral design motif.
- source_word: מִמֶּנָּה הָיוּ
  chosen: were of one piece with it
  alternatives:
  - were from it
  - were made from the same piece
  lexicon: HALOT
  rationale: The phrase indicates that these parts were integral to the lampstand,
    not attached separately. 'Of one piece with it' expresses this clearly and idiomatically.
- source_word: וַיַּעַשׂ ... עָשָׂה
  chosen: He made ... He made
  alternatives:
  - Then he made ... made
  - He fashioned ... he made
  lexicon: HALOT
  rationale: The repetition of עשה is retained with simple 'made' to reflect the Hebrew
    structure without unnecessary stylistic variation.
