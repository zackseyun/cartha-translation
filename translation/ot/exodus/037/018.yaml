id: EXO.37.18
reference: Exodus 37:18
source:
  edition: WLC
  text: וְ/שִׁשָּׁ֣ה קָנִ֔ים יֹצְאִ֖ים מִ/צִּדֶּ֑י/הָ שְׁלֹשָׁ֣ה קְנֵ֣י מְנֹרָ֗ה מִ/צִּדָּ/הּ֙
    הָֽ/אֶחָ֔ד וּ/שְׁלֹשָׁה֙ קְנֵ֣י מְנֹרָ֔ה מִ/צִּדָּ֖/הּ הַ/שֵּׁנִֽי׀׃
translation:
  text: 'And six branches were coming out from its sides: three branches of the lampstand
    from its one side, and three branches of the lampstand from its second side.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'projecting from its sides'; the Hebrew participle describes the six
      branches as issuing outward from the lampstand.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from its one side ... from its second side'; English may also express
      this as 'from one side ... from the other side.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָנִים / קְנֵי
  chosen: branches
  alternatives:
  - reeds
  - arms
  lexicon: HALOT
  rationale: In the lampstand/tabernacle context, קנה refers to projecting branch-like
    shafts rather than botanical reeds in a literal sense. 'Branches' is the most
    natural English rendering here and matches the object’s structure. 'Arms' is possible
    but less directly tied to the imagery of the menorah.
- source_word: יֹצְאִים
  chosen: were coming out
  alternatives:
  - were going out
  - projected
  - extended out
  lexicon: HALOT
  rationale: The participle of יצא describes the branches as issuing outward from
    the lampstand. 'Were coming out' preserves the verbal, descriptive force of the
    Hebrew better than a more static paraphrase like 'there were' or a more interpretive
    'projected.'
- source_word: מִצִּדֶּיהָ / מִצִּדָּהּ
  chosen: from its sides / from its ... side
  alternatives:
  - out of its sides
  - from beside it
  lexicon: HALOT
  rationale: צד denotes side. The plural with suffix ('its sides') is followed by
    specification of one side and the second side. Rendering with 'from its sides'
    and then 'from its one side ... from its second side' reflects the Hebrew structure
    closely.
- source_word: מְנֹרָה
  chosen: lampstand
  alternatives:
  - menorah
  - lamp
  lexicon: HALOT
  rationale: The common noun denotes the tabernacle lampstand. 'Lampstand' translates
    the meaning for modern readers; 'menorah' is a possible transliteration but the
    project philosophy prefers translating common nouns rather than transliterating
    them.
- source_word: הָאֶחָד
  chosen: its one side
  alternatives:
  - the one side
  - one side
  lexicon: HALOT
  rationale: The Hebrew uses the article with 'one' in a distributive contrast with
    'the second.' 'Its one side' preserves both the possessive relation and the paired
    contrast.
- source_word: הַשֵּׁנִי
  chosen: its second side
  alternatives:
  - the other side
  - the second side
  lexicon: HALOT
  rationale: שני is literally 'second.' While English often says 'the other side,'
    'second side' better preserves the formal correspondence with the Hebrew and the
    balanced description of the two sides.
