id: EXO.37.8
reference: Exodus 37:8
source:
  edition: WLC
  text: כְּרוּב אֶחָ֤ד מִ/קָּצָה֙ מִ/זֶּ֔ה וּ/כְרוּב אֶחָ֥ד מִ/קָּצָ֖ה מִ/זֶּ֑ה מִן
    הַ/כַּפֹּ֛רֶת עָשָׂ֥ה אֶת הַ/כְּרֻבִ֖ים מִ/שְּׁנֵ֥י קצוות/ו־־־־׃
translation:
  text: one cherub from one end on this side, and one cherub from one end on that
    side; from the mercy seat he made the cherubim at its two ends.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the cover' or 'from the atonement cover'; Hebrew kapporet, the
      gold cover of the ark.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּרוּב
  chosen: cherub
  alternatives:
  - winged creature
  lexicon: HALOT
  rationale: The Hebrew term refers to the specific throne-guardian beings associated
    with the ark. 'Cherub' preserves the established referent without speculative
    paraphrase.
- source_word: מִקָּצָה מִזֶּה ... מִקָּצָה מִזֶּה
  chosen: from one end on this side ... from one end on that side
  alternatives:
  - from this end ... from that end
  - at one end on one side ... at one end on the other side
  lexicon: HALOT
  rationale: קָצֶה means 'end, extremity.' The paired demonstratives indicate the
    two opposite sides/ends. This rendering keeps the spatial distinction clear in
    natural English.
- source_word: הַכַּפֹּרֶת
  chosen: the mercy seat
  alternatives:
  - the cover
  - the atonement cover
  lexicon: HALOT
  rationale: כַּפֹּרֶת is the technical term for the ark's cover. 'Mercy seat' is
    the traditional cultic rendering and remains the clearest concise English equivalent
    in this tabernacle context; 'cover' is too flat, while 'atonement cover' is possible
    but less established. Because the term is cultically significant and potentially
    debated, an alternative is preserved in a footnote.
- source_word: עָשָׂה
  chosen: he made
  alternatives:
  - he fashioned
  lexicon: HALOT
  rationale: The common verb עשה straightforwardly means 'made' here. 'Fashioned'
    is possible but adds stylistic color not required by the source.
- source_word: מִשְּׁנֵי קְצֹוֹתָיו
  chosen: at its two ends
  alternatives:
  - from its two ends
  - on its two ends
  lexicon: HALOT
  rationale: The phrase identifies the location/origin of the cherubim in relation
    to the mercy seat. English idiom is best served by 'at its two ends,' while the
    preceding 'from the mercy seat' already conveys that they were made as part of
    it.
