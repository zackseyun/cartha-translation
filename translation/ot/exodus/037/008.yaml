theological_decisions:
- issue: Rendering of הַכַּפֹּרֶת in tabernacle context
  chosen_reading: mercy seat
  alternative_readings:
  - cover
  - atonement cover
  rationale: The term denotes the ark's cultic cover and carries sacrificial/theological
    associations. Following optimal equivalence, 'mercy seat' preserves the recognized
    theological function without overexplaining in the main text. An alternative is
    preserved in a footnote for transparency.
  doctrine_reference: Contested terms table notes ἱλαστήριον may be rendered 'mercy
    seat' as an alternative; this supports preserving the cultic connection in English
    where context warrants.
