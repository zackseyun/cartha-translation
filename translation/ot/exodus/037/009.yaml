theological_decisions:
- issue: Rendering of הַכַּפֹּרֶת in tabernacle context
  chosen_reading: mercy seat
  alternative_readings:
  - cover
  - atonement cover
  rationale: Although the Hebrew noun can be rendered more literally as 'cover,' the
    cultic significance of the ark's lid in biblical theology justifies the established
    rendering 'mercy seat' here. This is not the contested Greek term ἱλαστήριον from
    the doctrine table, but the Hebrew referent behind later theological usage. The
    alternative is preserved in a footnote for transparency.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
