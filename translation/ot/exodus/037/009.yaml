id: EXO.37.9
reference: Exodus 37:9
source:
  edition: WLC
  text: וַ/יִּהְי֣וּ הַ/כְּרֻבִים֩ פֹּרְשֵׂ֨י כְנָפַ֜יִם לְ/מַ֗עְלָ/ה סֹֽכְכִ֤ים בְּ/כַנְפֵי/הֶם֙
    עַל הַ/כַּפֹּ֔רֶת וּ/פְנֵי/הֶ֖ם אִ֣ישׁ אֶל אָחִ֑י/ו אֶל הַ/כַּפֹּ֔רֶת הָי֖וּ פְּנֵ֥י
    הַ/כְּרֻבִֽים־־־׃פ
translation:
  text: The cherubim had their wings spread upward, overshadowing the mercy seat with
    their wings, and their faces were toward one another; the faces of the cherubim
    were toward the mercy seat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “the cover” or “the atonement cover.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכְּרֻבִים
  chosen: the cherubim
  alternatives:
  - the cherubs
  lexicon: HALOT
  rationale: Retains the established transliterated term for the heavenly figures
    rather than using the less formal 'cherubs.' The Hebrew plural form is preserved
    by the English collective/plural 'cherubim.'
- source_word: פֹּרְשֵׂי כְנָפַיִם לְמַעְלָה
  chosen: had their wings spread upward
  alternatives:
  - were spreading wings upward
  - with wings spread upward
  lexicon: HALOT
  rationale: 'Combines the participial phrase with the finite verb into natural English
    while preserving the posture described: the wings are extended in an upward direction.'
- source_word: סֹכְכִים
  chosen: overshadowing
  alternatives:
  - covering
  - screening over
  lexicon: HALOT
  rationale: The participle denotes covering/protecting from above. 'Overshadowing'
    fits the cultic-artistic image of the wings extending over the cover without implying
    total concealment.
- source_word: הַכַּפֹּרֶת
  chosen: the mercy seat
  alternatives:
  - the cover
  - the atonement cover
  lexicon: HALOT
  rationale: Traditional but still intelligible rendering for the lid of the ark.
    In this tabernacle context it is the established English equivalent and best signals
    the cultic object, though literally it is a cover.
- source_word: בְּכַנְפֵיהֶם
  chosen: with their wings
  alternatives:
  - by their wings
  lexicon: HALOT
  rationale: 'Instrumental beth is naturally rendered ''with'': the cherubim overshadow
    the mercy seat by means of their wings.'
- source_word: וּפְנֵיהֶם אִישׁ אֶל אָחִיו
  chosen: and their faces were toward one another
  alternatives:
  - and their faces were each toward his brother
  - and their faces were facing each other
  lexicon: HALOT
  rationale: The idiom אִישׁ אֶל אָחִיו literally means 'each toward his brother,'
    but in English 'toward one another' communicates the reciprocal orientation clearly
    without unnecessary awkwardness.
- source_word: אֶל הַכַּפֹּרֶת הָיוּ פְּנֵי הַכְּרֻבִים
  chosen: the faces of the cherubim were toward the mercy seat
  alternatives:
  - toward the cover were the faces of the cherubim
  - the cherubim faced the mercy seat
  lexicon: HALOT
  rationale: Preserves the Hebrew emphasis on the faces and keeps the repeated reference
    to the mercy seat explicit. A more compressed rendering like 'the cherubim faced
    the mercy seat' is possible but slightly reduces the formal parallelism of the
    verse.
