id: EXO.37.19
reference: Exodus 37:19
source:
  edition: WLC
  text: שְׁלֹשָׁ֣ה גְ֠בִעִים מְֽשֻׁקָּדִ֞ים בַּ/קָּנֶ֣ה הָ/אֶחָד֮ כַּפְתֹּ֣ר וָ/פֶרַח֒
    וּ/שְׁלֹשָׁ֣ה גְבִעִ֗ים מְשֻׁקָּדִ֛ים בְּ/קָנֶ֥ה אֶחָ֖ד כַּפְתֹּ֣ר וָ/פָ֑רַח כֵּ֚ן
    לְ/שֵׁ֣שֶׁת הַ/קָּנִ֔ים הַ/יֹּצְאִ֖ים מִן הַ/מְּנֹרָֽה־׃
translation:
  text: Three almond-blossom-shaped cups were on the one branch, with bulb and flower;
    and three almond-blossom-shaped cups were on one branch, with bulb and flower.
    So it was for the six branches coming out from the lampstand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'three cups made like almond blossoms ... and three cups made like almond
      blossoms.'
    reason: lexical_alternative
  - marker: b
    text: '''Bulb'' may also be rendered ''knob,'' referring to a rounded ornamental
      feature on the lampstand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גְבִעִים
  chosen: cups
  alternatives:
  - goblets
  - calyxes
  lexicon: HALOT
  rationale: The noun denotes cup-like ornamental forms on the lampstand. 'Cups' is
    the most natural modern English rendering and matches the object description without
    overtechnical language.
- source_word: מְשֻׁקָּדִים
  chosen: almond-blossom-shaped
  alternatives:
  - almond-shaped
  - made like almond blossoms
  lexicon: HALOT
  rationale: From the root associated with almond; in tabernacle lampstand descriptions
    it refers to decoration patterned after almond blossoms. 'Almond-blossom-shaped'
    makes the floral design explicit in readable English.
- source_word: קָנֶה
  chosen: branch
  alternatives:
  - shaft
  - reed
  lexicon: HALOT
  rationale: In the menorah context, the term refers to one of the projecting arms/branches.
    'Branch' is idiomatic and contextually precise, whereas 'reed' would be misleading
    and 'shaft' too mechanical here.
- source_word: כַּפְתֹּר
  chosen: bulb
  alternatives:
  - knob
  - capital
  lexicon: HALOT
  rationale: In tabernacle furnishing descriptions this term denotes a rounded ornamental
    projection. 'Bulb' communicates the shape clearly in modern English; 'knob' is
    possible but sounds less fitting in this cultic-artistic context.
- source_word: פֶרַח
  chosen: flower
  alternatives:
  - blossom
  lexicon: HALOT
  rationale: The noun denotes a flower ornament. 'Flower' is straightforward; 'blossom'
    is possible, but since 'almond-blossom-shaped' already appears earlier, 'flower'
    avoids awkward repetition while preserving sense.
- source_word: כֵּן
  chosen: So it was
  alternatives:
  - thus
  - likewise
  lexicon: HALOT
  rationale: This adverb sums up the repeated pattern across all six branches. 'So
    it was' gives clear English linkage to the preceding description.
- source_word: הַיֹּצְאִים מִן הַמְּנֹרָה
  chosen: coming out from the lampstand
  alternatives:
  - extending from the lampstand
  - projecting from the lampstand
  lexicon: HALOT
  rationale: The participle plus preposition describes the branches as issuing from
    the central lampstand. 'Coming out from' is a transparent rendering that preserves
    the imagery.
- source_word: מְנֹרָה
  chosen: lampstand
  alternatives:
  - menorah
  lexicon: HALOT
  rationale: Per translation philosophy, common object terms are translated rather
    than transliterated when the meaning is clear. 'Lampstand' is standard and immediately
    understandable.
