id: EXO.37.15
reference: Exodus 37:15
source:
  edition: WLC
  text: וַ/יַּ֤עַשׂ אֶת הַ/בַּדִּים֙ עֲצֵ֣י שִׁטִּ֔ים וַ/יְצַ֥ף אֹתָ֖/ם זָהָ֑ב לָ/שֵׂ֖את
    אֶת הַ/שֻּׁלְחָֽן־־׃
translation:
  text: He made the poles of acacia wood and overlaid them with gold, to carry the
    table.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He made
  alternatives:
  - And he made
  - Then he made
  lexicon: HALOT
  rationale: The waw-consecutive with עשה narrates the next action in sequence. English
    can omit the conjunction for smoother narrative while preserving the sense.
- source_word: הַבַּדִּים
  chosen: the poles
  alternatives:
  - the carrying poles
  - the staves
  lexicon: HALOT
  rationale: בַּדִּים refers to the poles used for carrying sacred furniture. 'Poles'
    is clear modern English; 'staves' is archaic.
- source_word: עֲצֵי שִׁטִּים
  chosen: of acacia wood
  alternatives:
  - of acacia
  - of shittim wood
  lexicon: HALOT
  rationale: The construct phrase literally means 'woods of acacia,' idiomatically
    'acacia wood.' This is standard, natural English and preserves the material.
- source_word: וַיְצַף אֹתָם זָהָב
  chosen: and overlaid them with gold
  alternatives:
  - and plated them with gold
  - and covered them with gold
  lexicon: HALOT
  rationale: צפה in this craftsmanship context means to overlay or plate with a metal
    covering. 'Overlaid ... with gold' is both accurate and idiomatic in tabernacle
    descriptions.
- source_word: לָשֵׂאת
  chosen: to carry
  alternatives:
  - for carrying
  - to bear
  lexicon: HALOT
  rationale: 'The infinitive expresses purpose: the poles were made for carrying the
    table. ''To carry'' is the clearest modern rendering; ''bear'' is more formal
    but less natural.'
- source_word: הַשֻּׁלְחָן
  chosen: the table
  lexicon: HALOT
  rationale: A straightforward rendering of שֻׁלְחָן. In context this is the tabernacle
    table, but the Hebrew simply says 'the table,' so the translation preserves that.
