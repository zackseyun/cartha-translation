id: EXO.37.5
reference: Exodus 37:5
source:
  edition: WLC
  text: וַ/יָּבֵ֤א אֶת הַ/בַּדִּים֙ בַּ/טַּבָּעֹ֔ת עַ֖ל צַלְעֹ֣ת הָ/אָרֹ֑ן לָ/שֵׂ֖את
    אֶת הָ/אָרֹֽן־־׃
translation:
  text: And he put the poles into the rings on the sides of the ark, to carry the
    ark.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּבֵא
  chosen: put
  alternatives:
  - brought
  - inserted
  lexicon: HALOT
  rationale: The verb בוא literally means 'come/bring,' but in this construction with
    the poles and rings it idiomatically refers to placing or inserting the poles
    into the rings. 'Put' is natural modern English and accurately conveys the action
    without over-specifying.
- source_word: הַבַּדִּים
  chosen: the poles
  alternatives:
  - the carrying poles
  - the staves
  lexicon: HALOT
  rationale: בַּדִּים refers to the poles used for carrying sacred furniture. 'Poles'
    is the clearest contemporary rendering; 'staves' is traditional but archaic.
- source_word: בַּטַּבָּעֹת
  chosen: into the rings
  alternatives:
  - in the rings
  lexicon: HALOT
  rationale: The preposition ב plus 'rings' here indicates insertion/placement within
    the rings. English idiom prefers 'into the rings' to make the physical action
    clear.
- source_word: עַל צַלְעֹת הָאָרֹן
  chosen: on the sides of the ark
  alternatives:
  - along the sides of the ark
  - on the ribs/side-panels of the ark
  lexicon: HALOT
  rationale: צלעות literally can denote sides or side-structures. In the ark's construction
    context, 'sides' is the most natural and sufficiently precise English rendering.
- source_word: הָאָרֹן
  chosen: the ark
  alternatives:
  - the chest
  lexicon: HALOT
  rationale: אָרוֹן denotes the sacred chest central to the tabernacle furnishings.
    'Ark' is the established and contextually appropriate English term here.
- source_word: לָשֵׂאת
  chosen: to carry
  alternatives:
  - for carrying
  - to bear
  lexicon: HALOT
  rationale: 'נשא in this infinitive expresses purpose: the poles were placed so that
    the ark could be carried. ''To carry'' is clear modern English; ''bear'' is more
    formal but less natural.'
