id: EXO.25.22
reference: Exodus 25:22
source:
  edition: WLC
  text: וְ/נוֹעַדְתִּ֣י לְ/ךָ֮ שָׁם֒ וְ/דִבַּרְתִּ֨י אִתְּ/ךָ֜ מֵ/עַ֣ל הַ/כַּפֹּ֗רֶת
    מִ/בֵּין֙ שְׁנֵ֣י הַ/כְּרֻבִ֔ים אֲשֶׁ֖ר עַל אֲרֹ֣ן הָ/עֵדֻ֑ת אֵ֣ת כָּל אֲשֶׁ֧ר
    אֲצַוֶּ֛ה אוֹתְ/ךָ֖ אֶל בְּנֵ֥י יִשְׂרָאֵֽל־־־׃פ
translation:
  text: And there I will meet with you, and I will speak with you from above the mercy
    seat, from between the two cherubim that are over the ark of the testimony, all
    that I will command you for the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'atonement cover.' The Hebrew term refers to the gold cover of the ark;
      traditionally, 'mercy seat.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for the Israelites' or 'to the sons of Israel.' The Hebrew is literally
      'to/for the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנוֹעַדְתִּי
  chosen: I will meet with you
  alternatives:
  - I will appoint to meet with you
  - I will be present with you
  lexicon: HALOT
  rationale: The Niphal of יעד here carries the sense of meeting by appointment. In
    this cultic context, 'meet with you' is the most natural English and reflects
    the established sense without over-paraphrasing.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: A straightforward locative adverb referring to the place just described,
    namely at the ark/mercy seat.
- source_word: וְדִבַּרְתִּי אִתְּךָ
  chosen: I will speak with you
  alternatives:
  - I will speak to you
  lexicon: HALOT
  rationale: The preposition אֵת with דבר supports 'speak with,' preserving the relational
    nuance of direct address rather than flattening it to merely 'to.'
- source_word: מֵעַל
  chosen: from above
  alternatives:
  - from over
  lexicon: HALOT
  rationale: This indicates the source location of the divine speech relative to the
    cover of the ark. 'From above' is idiomatic and spatially clear.
- source_word: הַכַּפֹּרֶת
  chosen: mercy seat
  alternatives:
  - atonement cover
  - cover
  lexicon: HALOT
  rationale: Although the Hebrew denotes the cover of the ark, 'mercy seat' is the
    established cultic rendering in this context and best captures the theological-liturgical
    referent. 'Atonement cover' is possible but less natural in English; 'cover' is
    too flat for this sacred object.
- source_word: מִבֵּין שְׁנֵי הַכְּרֻבִים
  chosen: from between the two cherubim
  lexicon: HALOT
  rationale: A direct and formal rendering of the spatial phrase. 'Cherubim' is retained
    as the conventional English plural transliteration for the heavenly beings.
- source_word: הַכְּרֻבִים
  chosen: cherubim
  alternatives:
  - cherubs
  lexicon: HALOT
  rationale: The transliterated plural is standard in Bible translation and preserves
    the specific class of heavenly beings better than the colloquial 'cherubs.'
- source_word: אֲשֶׁר עַל אֲרֹן הָעֵדֻת
  chosen: that are over the ark of the testimony
  alternatives:
  - which are on the ark of the testimony
  - that are above the ark of the covenant document
  lexicon: HALOT
  rationale: עַל here is best rendered 'over' in light of the cherubim's position
    above the ark. 'Ark of the testimony' is a close rendering of the Hebrew; it refers
    to the ark associated with the covenant testimony.
- source_word: הָעֵדֻת
  chosen: the testimony
  alternatives:
  - the covenant testimony
  - the covenant tablets
  lexicon: HALOT
  rationale: The noun is rendered formally as 'testimony.' More interpretive expansions
    are possible, but the Hebrew itself does not specify tablets here.
- source_word: אֵת כָּל אֲשֶׁר אֲצַוֶּה אֹתְךָ
  chosen: all that I will command you
  alternatives:
  - everything that I will command you
  lexicon: HALOT
  rationale: This preserves the comprehensiveness of כָּל and the directness of the
    command formula without unnecessary expansion.
- source_word: אֶל בְּנֵי יִשְׂרָאֵל
  chosen: for the sons of Israel
  alternatives:
  - to the sons of Israel
  - for the people of Israel
  - for the Israelites
  lexicon: HALOT
  rationale: The preposition אֶל after 'command you' is somewhat compressed in English;
    'for the sons of Israel' conveys that Moses receives commands directed toward
    Israel. 'Sons of Israel' preserves the gender-accurate familial idiom of the Hebrew
    in keeping with project philosophy, though 'Israelites' is a viable smoother alternative.
