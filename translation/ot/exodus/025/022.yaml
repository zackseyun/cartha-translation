theological_decisions:
- issue: Rendering of הַכַּפֹּרֶת
  chosen_reading: mercy seat
  alternative_readings:
  - atonement cover
  - cover
  rationale: This verse refers to the sacred object atop the ark from which God speaks.
    While the Hebrew can be understood more literally as a cover, the cultic-theological
    referent is specific, and 'mercy seat' remains the clearest established English
    equivalent. This also preserves intertextual continuity with later biblical usage,
    while avoiding importing the NT-specific contested term ἱλαστήριον into the translation
    decision itself.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological
    weight without unnecessary jargon flattening'
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - people of Israel
  - Israelites
  rationale: The Hebrew is grammatically masculine plural in a representative national
    sense. Per the doctrine's gender-accurate principle, the familial expression is
    preserved rather than neutralized in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
