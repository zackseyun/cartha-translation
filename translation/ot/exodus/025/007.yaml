id: EXO.25.7
reference: Exodus 25:7
source:
  edition: WLC
  text: אַבְנֵי שֹׁ֕הַם וְ/אַבְנֵ֖י מִלֻּאִ֑ים לָ/אֵפֹ֖ד וְ/לַ/חֹֽשֶׁן־׃
translation:
  text: onyx stones, and stones for setting, for the ephod and for the breastpiece.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew term rendered 'onyx' may denote a different precious stone; the
      exact identification is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'stones to be mounted' or 'stones for settings.'
    reason: lexical_alternative
  - marker: c
    text: Traditionally 'breastplate.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַבְנֵי
  chosen: stones
  alternatives:
  - gems
  - precious stones
  lexicon: HALOT
  rationale: The construct plural of אֶבֶן broadly means 'stones.' In this inventory
    context the stones are valuable, but 'stones' keeps closest to the Hebrew while
    allowing the following qualifiers to specify their type or use.
- source_word: שֹׁהַם
  chosen: onyx
  alternatives:
  - bdellium
  - carnelian
  - onyx-like stone
  lexicon: HALOT
  rationale: The precise identification of שֹׁהַם is uncertain, but 'onyx' is the
    longstanding and most widely recognized rendering in tabernacle contexts. Because
    the identification is not certain, an alternative is preserved in a footnote.
- source_word: אַבְנֵי מִלֻּאִים
  chosen: stones for setting
  alternatives:
  - mounting stones
  - stones to be set
  - filling stones
  lexicon: HALOT
  rationale: מִלֻּאִים literally relates to 'fillings/settings.' In the priestly-materials
    context it refers to stones intended for mounting or setting into the ephod/breastpiece.
    'Stones for setting' is natural English and reflects the functional sense without
    over-specifying the craftsmanship.
- source_word: לָאֵפֹד
  chosen: for the ephod
  lexicon: HALOT
  rationale: אֵפוֹד is a technical term for the priestly garment and is best transliterated
    as 'ephod' rather than replaced with an uncertain descriptive equivalent.
- source_word: וְלַחֹשֶׁן
  chosen: and for the breastpiece
  alternatives:
  - and for the breastplate
  lexicon: HALOT
  rationale: חֹשֶׁן denotes the priestly chest-piece that holds stones. 'Breastpiece'
    is clearer and less potentially misleading than 'breastplate,' which can suggest
    armor in modern English.
