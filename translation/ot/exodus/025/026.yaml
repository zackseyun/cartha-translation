id: EXO.25.26
reference: Exodus 25:26
source:
  edition: WLC
  text: וְ/עָשִׂ֣יתָ לּ֔/וֹ אַרְבַּ֖ע טַבְּעֹ֣ת זָהָ֑ב וְ/נָתַתָּ֙ אֶת הַ/טַּבָּעֹ֔ת
    עַ֚ל אַרְבַּ֣ע הַ/פֵּאֹ֔ת אֲשֶׁ֖ר לְ/אַרְבַּ֥ע רַגְלָֽי/ו־׃
translation:
  text: And you shall make for it four gold rings, and you shall put the rings on
    the four corners that are at its four feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the four sides' or 'the four edges' for 'the four corners.'
    reason: lexical_alternative
  - marker: b
    text: Or 'its four legs'; the Hebrew word can mean 'feet' or 'legs' depending
      on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: And you shall make
  alternatives:
  - And make
  - And you are to make
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional sequence functions
    as an imperative/future command. 'You shall make' preserves the directive force
    in natural English.
- source_word: לּוֹ
  chosen: for it
  alternatives:
  - for him
  lexicon: HALOT
  rationale: The pronominal suffix is masculine singular, referring to the table described
    in context, so English idiom requires 'it' rather than personal 'him'.
- source_word: אַרְבַּע טַבְּעֹת זָהָב
  chosen: four gold rings
  alternatives:
  - four rings of gold
  lexicon: HALOT
  rationale: This construct-like sequence is naturally rendered 'four gold rings'
    in contemporary English, while preserving the material specification.
- source_word: וְנָתַתָּ
  chosen: and you shall put
  alternatives:
  - and you shall place
  - and you shall set
  lexicon: HALOT
  rationale: '''Put'' is the most straightforward modern rendering for נתן here in
    a construction/instruction context; ''place'' is possible but slightly more formal.'
- source_word: עַל
  chosen: 'on'
  alternatives:
  - at
  - upon
  lexicon: HALOT
  rationale: The preposition indicates placement on or at the specified locations.
    'On' is the most natural default in English, while the following phrase clarifies
    the exact position.
- source_word: אַרְבַּע הַפֵּאֹת
  chosen: the four corners
  alternatives:
  - the four sides
  - the four edges
  lexicon: HALOT
  rationale: פֵּאָה commonly denotes an extremity, side, or corner. In this furnishing
    description, 'corners' best fits the image of ring placement at the table's four
    extremities.
- source_word: אֲשֶׁר לְאַרְבַּע רַגְלָיו
  chosen: that are at its four feet
  alternatives:
  - that belong to its four legs
  - at the four legs of it
  lexicon: HALOT
  rationale: רֶגֶל can mean foot or leg. For furniture, 'feet' is idiomatic and matches
    the likely support points of the table. The relative clause identifies the corners
    associated with those four supports.
