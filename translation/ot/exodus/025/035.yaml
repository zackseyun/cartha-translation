id: EXO.25.35
reference: Exodus 25:35
source:
  edition: WLC
  text: וְ/כַפְתֹּ֡ר תַּחַת֩ שְׁנֵ֨י הַ/קָּנִ֜ים מִמֶּ֗/נָּה וְ/כַפְתֹּר֙ תַּ֣חַת
    שְׁנֵ֤י הַ/קָּנִים֙ מִמֶּ֔/נָּה וְ/כַפְתֹּ֕ר תַּחַת שְׁנֵ֥י הַ/קָּנִ֖ים מִמֶּ֑/נָּה
    לְ/שֵׁ֨שֶׁת֙ הַ/קָּנִ֔ים הַ/יֹּצְאִ֖ים מִן הַ/מְּנֹרָֽה־־׃
translation:
  text: and a knob under two branches from it, and a knob under two branches from
    it, and a knob under two branches from it, for the six branches going out from
    the lampstand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bulb' for 'knob' (כַפְתֹּר); the Hebrew refers to a rounded ornamental
      feature on the lampstand.
    reason: lexical_alternative
  - marker: b
    text: Or 'arms' for 'branches'; the Hebrew term can denote projecting members
      of the lampstand.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'from it' likely refers to the lampstand as the source from which
      the branches extend.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַפְתֹּר
  chosen: knob
  alternatives:
  - bulb
  - capital
  lexicon: HALOT
  rationale: In tabernacle-furnishing context, כפתר denotes a rounded ornamental projection
    on the lampstand. 'Knob' is concise, natural English and fits the repeated structural
    description. 'Bulb' is possible but can sound botanical here; 'capital' is too
    architectural.
- source_word: תַּחַת
  chosen: under
  alternatives:
  - beneath
  lexicon: HALOT
  rationale: The preposition marks position below each pair of branches. 'Under' is
    the most direct and idiomatic rendering.
- source_word: שְׁנֵי הַקָּנִים
  chosen: two branches
  alternatives:
  - two arms
  - two reeds
  lexicon: HALOT
  rationale: In the menorah description, קנים refers to the projecting members of
    the lampstand. 'Branches' is the standard and clearest English term in this cultic-artistic
    context; 'arms' is possible but less evocative of the lampstand's tree-like design.
- source_word: מִמֶּנָּה
  chosen: from it
  alternatives:
  - from the lampstand
  - from the shaft
  lexicon: HALOT
  rationale: The feminine singular pronominal form refers back to the menorah/lampstand.
    'From it' preserves the Hebrew anaphora and avoids over-specifying beyond the
    immediate wording.
- source_word: לְשֵׁשֶׁת הַקָּנִים
  chosen: for the six branches
  alternatives:
  - corresponding to the six branches
  - with respect to the six branches
  lexicon: HALOT
  rationale: 'The phrase sums up the arrangement: these three knobs are distributed
    for the six branches. ''For the six branches'' is compact and preserves the functional
    sense of ל in context.'
- source_word: הַיֹּצְאִים
  chosen: going out
  alternatives:
  - coming out
  - extending out
  lexicon: HALOT
  rationale: The participle describes the branches as projecting from the lampstand.
    'Going out' is a close, readable rendering of the participle.
- source_word: מִן הַמְּנֹרָה
  chosen: from the lampstand
  alternatives:
  - from the menorah
  lexicon: HALOT
  rationale: מנרה is the lampstand of the tabernacle. 'Lampstand' translates the common
    noun for clarity in English; 'menorah' is a familiar transliteration but the project's
    philosophy prefers translating common nouns rather than transliterating them as
    names.
