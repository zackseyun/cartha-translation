id: EXO.25.8
reference: Exodus 25:8
source:
  edition: WLC
  text: וְ/עָ֥שׂוּ לִ֖/י מִקְדָּ֑שׁ וְ/שָׁכַנְתִּ֖י בְּ/תוֹכָֽ/ם׃
translation:
  text: And let them make a sanctuary for me, so that I may dwell among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'in their midst.' The Hebrew says 'among them,' emphasizing God's
      presence with the people, not only within the sanctuary structure.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשׂוּ
  chosen: let them make
  alternatives:
  - and they shall make
  - and let them make
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this instructional context functions
    naturally as a directive/future injunction. 'Let them make' gives clear English
    imperative force while preserving the third-person plural sense. 'And they shall
    make' is more formally possible but less idiomatic in contemporary English.
- source_word: לִי
  chosen: for me
  alternatives:
  - to me
  lexicon: HALOT
  rationale: 'The preposition ל with first person singular suffix here indicates purpose/benefaction:
    the sanctuary is to be made for Yahweh''s use/presence. ''For me'' is the most
    natural English rendering in context.'
- source_word: מִקְדָּשׁ
  chosen: sanctuary
  alternatives:
  - holy place
  - sanctuary place
  lexicon: HALOT
  rationale: מִקְדָּשׁ denotes a holy/sacred place set apart for divine presence.
    'Sanctuary' is standard, clear modern English and fits the tabernacle context
    better than the less natural 'holy place' here.
- source_word: וְשָׁכַנְתִּי
  chosen: so that I may dwell
  alternatives:
  - and I will dwell
  - that I may dwell
  lexicon: HALOT
  rationale: From שׁכן, 'to dwell, settle, tabernacle.' In context the clause expresses
    purpose/result tied to the making of the sanctuary. 'So that I may dwell' captures
    the relationship between the two clauses in natural English, while still reflecting
    the first-person divine speech.
- source_word: בְּתוֹכָם
  chosen: among them
  alternatives:
  - in their midst
  - in the midst of them
  lexicon: HALOT
  rationale: The phrase literally means 'in their midst.' 'Among them' is a natural
    equivalent and preserves the important sense that God dwells among the people,
    not merely inside the structure. The more formal alternative is preserved in a
    footnote because it can highlight the communal emphasis.
