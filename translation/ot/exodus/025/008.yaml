theological_decisions:
- issue: Referent of God's dwelling
  chosen_reading: among them
  alternative_readings:
  - in it
  - in their midst
  rationale: The Hebrew suffix is plural ('them'), so the text states that God will
    dwell among the people, even though the sanctuary is the means by which this occurs.
    This preserves the theological emphasis of divine presence with Israel rather
    than reducing the statement to mere localization within the building.
  doctrine_reference: Translation philosophy §3, §5
