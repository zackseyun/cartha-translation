id: EXO.25.14
reference: Exodus 25:14
source:
  edition: WLC
  text: וְ/הֵֽבֵאתָ֤ אֶת הַ/בַּדִּים֙ בַּ/טַּבָּעֹ֔ת עַ֖ל צַלְעֹ֣ת הָ/אָרֹ֑ן לָ/שֵׂ֥את
    אֶת הָ/אָרֹ֖ן בָּ/הֶֽם־־׃
translation:
  text: And you shall put the poles into the rings on the sides of the ark, to carry
    the ark with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'bring the poles into the rings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הֵֽבֵאתָ
  chosen: And you shall put
  alternatives:
  - and you shall bring
  - and you shall insert
  lexicon: HALOT
  rationale: The verb בוא literally means 'bring/come,' but in this construction with
    the poles and rings, idiomatic English is better served by 'put,' conveying placement
    into the rings. 'Insert' is possible but slightly too technical for the register.
- source_word: הַ/בַּדִּים
  chosen: the poles
  alternatives:
  - the carrying poles
  - the staves
  lexicon: HALOT
  rationale: בדים refers to the poles used for carrying sacred furniture. 'Poles'
    is clear modern English; 'staves' is traditional but archaic.
- source_word: בַּ/טַּבָּעֹת
  chosen: into the rings
  alternatives:
  - in the rings
  lexicon: HALOT
  rationale: The preposition with 'rings' in this context indicates insertion/placement.
    'Into the rings' makes the action explicit in natural English.
- source_word: עַל צַלְעֹת הָ/אָרֹן
  chosen: on the sides of the ark
  alternatives:
  - upon the sides of the ark
  - on the side-panels of the ark
  lexicon: HALOT
  rationale: צלעות literally means 'sides' or 'side parts.' 'On the sides of the ark'
    is the most natural and sufficiently precise rendering here.
- source_word: הָ/אָרֹן
  chosen: the ark
  alternatives:
  - the chest
  lexicon: HALOT
  rationale: Although ארון can denote a chest/box, in this tabernacle context 'the
    ark' is the established and contextually precise term for the sacred object.
- source_word: לָ/שֵׂאת
  chosen: to carry
  alternatives:
  - to bear
  lexicon: HALOT
  rationale: נשא here denotes physical carrying. 'Carry' is clear modern English;
    'bear' is more formal but less natural.
- source_word: בָּ/הֶם
  chosen: with them
  alternatives:
  - by them
  lexicon: HALOT
  rationale: The pronoun refers to the poles as the means by which the ark is carried.
    'With them' is idiomatic English for instrumental use here; 'by them' is possible
    but less natural.
