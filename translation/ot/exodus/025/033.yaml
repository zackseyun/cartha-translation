id: EXO.25.33
reference: Exodus 25:33
source:
  edition: WLC
  text: שְׁלֹשָׁ֣ה גְ֠בִעִים מְֽשֻׁקָּדִ֞ים בַּ/קָּנֶ֣ה הָ/אֶחָד֮ כַּפְתֹּ֣ר וָ/פֶרַח֒
    וּ/שְׁלֹשָׁ֣ה גְבִעִ֗ים מְשֻׁקָּדִ֛ים בַּ/קָּנֶ֥ה הָ/אֶחָ֖ד כַּפְתֹּ֣ר וָ/פָ֑רַח
    כֵּ֚ן לְ/שֵׁ֣שֶׁת הַ/קָּנִ֔ים הַ/יֹּצְאִ֖ים מִן הַ/מְּנֹרָֽה־׃
translation:
  text: three almond-blossom-shaped cups on the one branch, with bulb and flower,
    and three almond-blossom-shaped cups on the one branch, with bulb and flower—so
    for the six branches coming out from the lampstand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'three cups made like almond blossoms on one branch ... and three cups
      made like almond blossoms on one branch.'
    reason: lexical_alternative
  - marker: b
    text: '''Bulb'' renders Hebrew כַּפְתֹּר, an ornamental rounded projection; alternatively,
      ''knob.'''
    reason: lexical_alternative
  - marker: c
    text: Hebrew מְנֹרָה is often transliterated 'menorah.' Here it is translated
      'lampstand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גְבִעִים
  chosen: cups
  alternatives:
  - bowls
  lexicon: HALOT
  rationale: The noun denotes cup-like vessels or shapes. In the lampstand description,
    'cups' fits the ornamental form better than the broader 'bowls' and aligns with
    the repeated decorative terminology.
- source_word: מְשֻׁקָּדִים
  chosen: almond-blossom-shaped
  alternatives:
  - made like almond blossoms
  - almond-shaped
  lexicon: HALOT
  rationale: From שקד ('almond'). In this tabernacle-art context it describes the
    decorative pattern of the cups. 'Almond-blossom-shaped' makes explicit that the
    reference is to blossom design, not merely the nut or a generic almond shape.
- source_word: קָּנֶה
  chosen: branch
  alternatives:
  - arm
  - reed
  lexicon: HALOT
  rationale: In the menorah description, the term refers to one projecting shaft/arm
    of the lampstand. 'Branch' is natural modern English and suits the imagery of
    floral ornamentation; 'reed' would be too literal to the base sense, and 'arm'
    is possible but less fitting in this verse's botanical design context.
- source_word: כַּפְתֹּר
  chosen: bulb
  alternatives:
  - knob
  - capital
  lexicon: HALOT
  rationale: This term in tabernacle furnishing descriptions denotes a rounded ornamental
    projection. 'Bulb' best matches the lampstand's plant-like design and reads naturally
    with 'flower.' 'Knob' is possible but less evocative of the floral motif.
- source_word: פֶרַח / פָרַח
  chosen: flower
  alternatives:
  - blossom
  lexicon: HALOT
  rationale: The noun denotes a flower or blossom. 'Flower' is chosen for readability
    and to avoid overloading the verse with repeated 'blossom' language after rendering
    מְשֻׁקָּדִים as 'almond-blossom-shaped.'
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - likewise
  lexicon: HALOT
  rationale: This adverb summarizes the pattern applying to all six branches. 'So'
    is concise, natural English that preserves the instructional force.
- source_word: לְשֵׁשֶׁת הַקָּנִים
  chosen: for the six branches
  alternatives:
  - for the six arms
  - on the six branches
  lexicon: HALOT
  rationale: The preposition plus numeral indicates that this same arrangement applies
    to all six branches. 'For the six branches' communicates distributive application
    clearly in English.
- source_word: הַיֹּצְאִים מִן הַמְּנֹרָה
  chosen: coming out from the lampstand
  alternatives:
  - extending from the lampstand
  - going out from the lampstand
  lexicon: HALOT
  rationale: The participle describes the branches as projecting from the central
    lampstand. 'Coming out from' is a transparent rendering of the Hebrew participle
    and preposition while remaining readable.
- source_word: מְנֹרָה
  chosen: lampstand
  alternatives:
  - menorah
  lexicon: HALOT
  rationale: This is a common noun for the tabernacle's lampstand, not a personal
    name. Per philosophy, meaning should be translated rather than simply transliterated
    where an established English equivalent exists.
