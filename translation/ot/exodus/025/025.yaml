id: EXO.25.25
reference: Exodus 25:25
source:
  edition: WLC
  text: וְ/עָשִׂ֨יתָ לּ֥/וֹ מִסְגֶּ֛רֶת טֹ֖פַח סָבִ֑יב וְ/עָשִׂ֧יתָ זֵר זָהָ֛ב לְ/מִסְגַּרְתּ֖/וֹ
    סָבִֽיב־׃
translation:
  text: You shall make for it a surrounding frame a handbreadth wide, and you shall
    make a gold molding around its frame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a gold crown around its frame.' The Hebrew זֵר can denote an ornamental
      border or molding; 'crown' is the traditional rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִסְגֶּרֶת
  chosen: frame
  alternatives:
  - rim
  - border
  lexicon: HALOT
  rationale: Refers to a structural border or framing piece attached to the table.
    'Frame' is natural modern English and fits the construction context better than
    the less specific 'border,' while avoiding overprecision beyond the Hebrew.
- source_word: טֹפַח
  chosen: a handbreadth wide
  alternatives:
  - a handbreadth
  - the width of a handbreadth
  lexicon: HALOT
  rationale: The noun denotes the measure 'handbreadth.' In English, the dimensional
    sense is clearer if expressed as width, since the frame is being described by
    size.
- source_word: סָבִיב
  chosen: surrounding / around
  alternatives:
  - all around
  - on all sides
  lexicon: HALOT
  rationale: The term occurs twice and indicates encircling placement. Rendered once
    adjectivally ('surrounding frame') and once adverbially/prepositionally ('around
    its frame') for readable English while preserving the repeated idea.
- source_word: זֵר
  chosen: molding
  alternatives:
  - rim
  - border
  - crown
  lexicon: HALOT
  rationale: In tabernacle furnishing contexts this term denotes a decorative edging
    or molding, likely raised and ornamental. 'Crown' is traditional but can mislead
    modern readers into imagining a separate regal object rather than an ornamental
    border; the alternative is preserved in a footnote.
- source_word: זָהָב
  chosen: gold
  alternatives:
  - golden
  lexicon: HALOT
  rationale: The material noun is best rendered directly as 'gold' in construct with
    'molding'.
- source_word: לּוֹ / לְמִסְגַּרְתּוֹ
  chosen: for it / its frame
  alternatives:
  - for the table / for its border
  lexicon: HALOT
  rationale: The pronominal suffixes refer back to the table described in context.
    English can preserve the pronouns without restating 'table,' maintaining cohesion
    with the Hebrew.
- source_word: וְעָשִׂיתָ
  chosen: You shall make
  alternatives:
  - And you shall make
  - You are to make
  lexicon: HALOT
  rationale: The repeated verb gives instruction in sequence. 'You shall make' preserves
    the directive force and formal cadence appropriate to tabernacle instructions.
