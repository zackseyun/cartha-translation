id: EXO.25.28
reference: Exodus 25:28
source:
  edition: WLC
  text: וְ/עָשִׂ֤יתָ אֶת הַ/בַּדִּים֙ עֲצֵ֣י שִׁטִּ֔ים וְ/צִפִּיתָ֥ אֹתָ֖/ם זָהָ֑ב
    וְ/נִשָּׂא בָ֖/ם אֶת הַ/שֻּׁלְחָֽן־־־׃
translation:
  text: You shall make the poles of acacia wood and overlay them with gold, and by
    them the table shall be carried.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with them the table shall be carried.' The Hebrew preposition can express
      instrumentality.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: You shall make
  alternatives:
  - and you shall make
  - you are to make
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional context functions
    as an imperative/future command. 'You shall make' fits standard English legal/instructional
    style in this tabernacle section.
- source_word: הַבַּדִּים
  chosen: the poles
  alternatives:
  - the carrying poles
  - the staves
  lexicon: HALOT
  rationale: בַּדִּים in tabernacle furniture contexts refers to poles used for carrying
    sacred objects. 'Poles' is clear modern English; 'staves' is archaic.
- source_word: עֲצֵי שִׁטִּים
  chosen: of acacia wood
  alternatives:
  - of acacia
  - of shittim wood
  lexicon: HALOT
  rationale: Construct phrase literally 'woods of acacia.' Idiomatic English is 'acacia
    wood.' 'Shittim wood' preserves older tradition but is less transparent for modern
    readers.
- source_word: וְצִפִּיתָ אֹתָם זָהָב
  chosen: and overlay them with gold
  alternatives:
  - and cover them with gold
  - and plate them with gold
  lexicon: HALOT
  rationale: צפה in this craftsmanship context means to overlay or plate with a material.
    'Overlay them with gold' is both natural and suitably precise.
- source_word: וְנִשָּׂא בָם
  chosen: and by them ... shall be carried
  alternatives:
  - and with them ... shall be carried
  - so that ... may be carried by them
  lexicon: HALOT
  rationale: נשא is passive-like here ('be carried'), with ב marking instrumentality.
    Rendering בָם as 'by them' best conveys that the poles are the means by which
    the table is carried.
- source_word: הַשֻּׁלְחָן
  chosen: the table
  lexicon: HALOT
  rationale: Refers to the table described in the immediate context, traditionally
    the table for the bread of the Presence. The simple 'the table' matches the Hebrew
    without importing explanatory material into the main text.
