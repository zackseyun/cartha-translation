id: EXO.25.19
reference: Exodus 25:19
source:
  edition: WLC
  text: וַ֠/עֲשֵׂה כְּר֨וּב אֶחָ֤ד מִ/קָּצָה֙ מִ/זֶּ֔ה וּ/כְרוּב אֶחָ֥ד מִ/קָּצָ֖ה
    מִ/זֶּ֑ה מִן הַ/כַּפֹּ֛רֶת תַּעֲשׂ֥וּ אֶת הַ/כְּרֻבִ֖ים עַל שְׁנֵ֥י קְצוֹתָֽי/ו־־־־׃
translation:
  text: Make one cherub from one end of it and one cherub from the other end of it;
    from the mercy seat you shall make the cherubim on its two ends.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'make the cherubim of one piece with the mercy seat
      at its two ends.' The Hebrew preposition 'from' indicates that the cherubim
      are to be formed from the mercy seat itself, not made separately and attached
      later.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲשֵׂה
  chosen: Make
  alternatives:
  - And make
  - You shall make
  lexicon: HALOT
  rationale: Imperative/jussive force in the instruction sequence. English drops the
    conjunction for natural style while preserving the command.
- source_word: כְּרוּב ... וּכְרוּב
  chosen: cherub ... cherub
  alternatives:
  - cherubim (collective)
  lexicon: HALOT
  rationale: Singular forms refer to each figure individually before the plural summary
    later in the verse. 'Cherub' is the standard English transliteration for this
    specific heavenly being.
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: Simple numeral retained in both occurrences to preserve the symmetry
    of the Hebrew instructions.
- source_word: מִקָּצָה מִזֶּה ... מִקָּצָה מִזֶּה
  chosen: from one end of it ... from the other end of it
  alternatives:
  - from this end ... from that end
  - at one end ... at the other end
  lexicon: HALOT
  rationale: The Hebrew literally says 'from end from this' in each clause, but idiomatic
    English expresses the contrast as 'one end' and 'the other end.' The suffix 'of
    it' makes explicit the referent implied by context.
- source_word: מִן הַכַּפֹּרֶת
  chosen: from the mercy seat
  alternatives:
  - of one piece with the mercy seat
  - from the cover
  lexicon: HALOT
  rationale: 'כַּפֹּרֶת is best rendered ''mercy seat'' in tabernacle context as the
    established referent of the ark''s cover. The preposition מִן here indicates source/material
    relation: the cherubim are to be made as arising from the mercy seat itself. This
    nuance is carried by ''from'' and clarified by the following clause.'
- source_word: תַּעֲשׂוּ
  chosen: you shall make
  alternatives:
  - make
  lexicon: HALOT
  rationale: Imperfect second masculine plural in instructional context is naturally
    rendered as directive future, addressing the craftsmen collectively.
- source_word: הַכְּרֻבִים
  chosen: the cherubim
  alternatives:
  - the cherubs
  lexicon: HALOT
  rationale: Plural transliteration preserves the technical term and matches common
    English Bible usage.
- source_word: עַל שְׁנֵי קְצוֹתָיו
  chosen: on its two ends
  alternatives:
  - at its two ends
  - on both of its ends
  lexicon: HALOT
  rationale: עַל can be rendered 'on' or 'at' here; 'on its two ends' fits the physical
    placement while staying close to the Hebrew. The singular suffix refers back to
    the mercy seat.
