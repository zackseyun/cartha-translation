id: EXO.25.31
reference: Exodus 25:31
source:
  edition: WLC
  text: וְ/עָשִׂ֥יתָ מְנֹרַ֖ת זָהָ֣ב טָה֑וֹר מִקְשָׁ֞ה תֵּעָשֶׂ֤ה הַ/מְּנוֹרָה֙ יְרֵכָ֣/הּ
    וְ/קָנָ֔/הּ גְּבִיעֶ֛י/הָ כַּפְתֹּרֶ֥י/הָ וּ/פְרָחֶ֖י/הָ מִמֶּ֥/נָּה יִהְיֽוּ׃
translation:
  text: And you shall make a lampstand of pure gold. The lampstand shall be made of
    hammered work; its base and its shaft, its cups, its buds, and its flowers shall
    be of one piece with it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'beaten work.' The Hebrew emphasizes that the lampstand was to be formed
      by hammering, apparently from a single piece rather than assembled from separate
      parts.
    reason: lexical_alternative
  - marker: b
    text: '''Its buds'' may also be rendered ''its knobs.'' The Hebrew refers to ornamental
      rounded projections in the lampstand''s floral design.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְנֹרַת
  chosen: lampstand
  alternatives:
  - menorah
  - lampstand
  lexicon: HALOT
  rationale: The Hebrew denotes the stand that holds lamps, not the lamps themselves.
    'Lampstand' is clear modern English and preserves meaning better than transliterating
    'menorah' in the main text.
- source_word: זָהָב טָהוֹר
  chosen: pure gold
  alternatives:
  - clean gold
  lexicon: HALOT
  rationale: Standard material description; 'pure gold' is the natural English equivalent
    for refined, unmixed gold.
- source_word: מִקְשָׁה
  chosen: hammered work
  alternatives:
  - beaten work
  - of one beaten piece
  lexicon: HALOT
  rationale: Refers to metalwork shaped by hammering from a single mass. 'Hammered
    work' is idiomatic and preserves the manufacturing sense.
- source_word: תֵּעָשֶׂה
  chosen: shall be made
  alternatives:
  - is to be made
  lexicon: HALOT
  rationale: The imperfect/passive-like form in instruction context is well rendered
    as a future-like command, 'shall be made.'
- source_word: יְרֵכָהּ
  chosen: its base
  alternatives:
  - its thigh
  - its pedestal
  lexicon: HALOT
  rationale: Literally 'thigh/side,' but in the context of an object's structure it
    refers to the lower supporting part. 'Base' communicates the architectural sense
    in natural English.
- source_word: וְקָנָהּ
  chosen: its shaft
  alternatives:
  - its stem
  - its branch
  lexicon: HALOT
  rationale: Here the singular names the central stem/shaft of the lampstand. 'Shaft'
    fits the object as a crafted stand; 'branch' is less suitable in this verse before
    the side branches are described later.
- source_word: גְּבִיעֶיהָ
  chosen: its cups
  alternatives:
  - its bowls
  - its calyxes
  lexicon: HALOT
  rationale: The term denotes cup-shaped elements on the lampstand. 'Cups' is the
    most straightforward and sufficiently precise rendering.
- source_word: כַּפְתֹּרֶיהָ
  chosen: its buds
  alternatives:
  - its knobs
  - its capitals
  lexicon: HALOT
  rationale: The word refers to knob-like ornamental projections. 'Buds' fits the
    floral imagery of the lampstand's design better than the more mechanical 'knobs,'
    while remaining understandable.
- source_word: וּפְרָחֶיהָ
  chosen: its flowers
  alternatives:
  - its blossoms
  lexicon: HALOT
  rationale: The floral ornamentation is explicit; 'flowers' is simple and accurate.
- source_word: מִמֶּנָּה יִהְיוּ
  chosen: shall be of one piece with it
  alternatives:
  - shall be from it
  - shall be made from the same piece
  lexicon: HALOT
  rationale: The phrase indicates that these parts are to come out of the lampstand
    itself, not be attached separately. 'Of one piece with it' expresses the intended
    construction clearly in English.
