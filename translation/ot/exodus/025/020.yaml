id: EXO.25.20
reference: Exodus 25:20
source:
  edition: WLC
  text: וְ/הָי֣וּ הַ/כְּרֻבִים֩ פֹּרְשֵׂ֨י כְנָפַ֜יִם לְ/מַ֗עְלָ/ה סֹכְכִ֤ים בְּ/כַנְפֵי/הֶם֙
    עַל הַ/כַּפֹּ֔רֶת וּ/פְנֵי/הֶ֖ם אִ֣ישׁ אֶל אָחִ֑י/ו אֶל הַ/כַּפֹּ֔רֶת יִהְי֖וּ
    פְּנֵ֥י הַ/כְּרֻבִֽים־־־׃
translation:
  text: And the cherubim shall be spreading out their wings upward, overshadowing
    the mercy seat with their wings, and their faces shall be one toward another;
    the faces of the cherubim shall be toward the mercy seat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'atonement cover.' Hebrew kapporet refers to the gold cover of the ark.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיוּ
  chosen: And ... shall be
  alternatives:
  - and ... are to be
  - and ... will be
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional context functions
    with directive/future force. 'Shall be' fits the prescriptive description of tabernacle
    construction in English.
- source_word: הַכְּרֻבִים
  chosen: the cherubim
  alternatives:
  - the cherubs
  lexicon: HALOT
  rationale: '''Cherubim'' preserves the conventional transliterated plural for the
    heavenly beings denoted by כְּרוּב. ''Cherubs'' is more colloquial and less fitting
    for the sacred-artifact context.'
- source_word: פֹּרְשֵׂי כְנָפַיִם
  chosen: spreading out their wings
  alternatives:
  - with wings spread
  - stretching out wings
  lexicon: HALOT
  rationale: The participial construction depicts the cherubim in the posture of extended
    wings. 'Spreading out their wings' is natural English and preserves the active
    sense.
- source_word: לְמַעְלָה
  chosen: upward
  alternatives:
  - above
  - on high
  lexicon: HALOT
  rationale: The adverb indicates direction/orientation of the wings. 'Upward' best
    matches the spatial sense without implying a separate object above them.
- source_word: סֹכְכִים
  chosen: overshadowing
  alternatives:
  - covering
  - screening
  lexicon: HALOT
  rationale: The participle from סכך conveys covering/protecting by overshadowing.
    'Overshadowing' captures the image of wings extended over the kapporet and aligns
    with the cultic-artistic scene better than the flatter 'covering'.
- source_word: בְּכַנְפֵיהֶם
  chosen: with their wings
  alternatives:
  - by their wings
  lexicon: HALOT
  rationale: Instrumental beth is naturally rendered 'with,' indicating the means
    by which the mercy seat is overshadowed.
- source_word: עַל הַכַּפֹּרֶת
  chosen: the mercy seat
  alternatives:
  - the atonement cover
  - the cover
  lexicon: HALOT
  rationale: כַּפֹּרֶת denotes the gold cover of the ark with expiatory/cultic significance.
    'Mercy seat' is the established English rendering for this tabernacle object and
    is contextually more precise than generic 'cover.' Because this is Hebrew כַּפֹּרֶת
    rather than Greek ἱλαστήριον, the contested-terms default for ἱλαστήριον does
    not directly govern this verse.
- source_word: וּפְנֵיהֶם אִישׁ אֶל אָחִיו
  chosen: and their faces shall be one toward another
  alternatives:
  - and their faces shall be each toward his brother
  - with their faces facing each other
  lexicon: HALOT
  rationale: The idiom literally reads 'a man toward his brother,' a distributive
    expression meaning each one facing the other. 'One toward another' preserves the
    reciprocal sense in dignified English.
- source_word: אֶל הַכַּפֹּרֶת יִהְיוּ פְּנֵי הַכְּרֻבִים
  chosen: the faces of the cherubim shall be toward the mercy seat
  alternatives:
  - the cherubim's faces shall be toward the mercy seat
  - the cherubim shall face the mercy seat
  lexicon: HALOT
  rationale: This clause specifies the orientation of the faces relative to the kapporet.
    Retaining 'faces' keeps the concrete imagery and mirrors the Hebrew syntax more
    closely than the more compressed 'shall face'.
