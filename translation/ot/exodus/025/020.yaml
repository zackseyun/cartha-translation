theological_decisions:
- issue: Rendering כַּפֹּרֶת in tabernacle instructions
  chosen_reading: mercy seat
  alternative_readings:
  - atonement cover
  - cover
  rationale: The term refers to the ark's cover as a cultically significant object
    associated with atonement. 'Mercy seat' preserves the established referential
    identity of the object in English Bible tradition while still being understandable.
    Since the doctrine file's contested term concerns Greek ἱλαστήριον, not Hebrew
    כַּפֹּרֶת directly, no mandated footnote is required; nevertheless an alternative
    is preserved for auditability.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §5; Contested terms
    entry for ἱλαστήριον noted as related but not directly controlling'
