theological_decisions:
- issue: Whether תַּבְנִית should suggest a heavenly archetype explicitly
  chosen_reading: pattern
  alternative_readings:
  - plan
  - model
  - design
  rationale: The verse states that God is showing Moses a תַּבְנִית, but it does not
    itself explicitly define the ontology of that pattern. 'Pattern' preserves the
    possibility of a revealed archetype without importing a stronger theological claim
    than the Hebrew states.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
