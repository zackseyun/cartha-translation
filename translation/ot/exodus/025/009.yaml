id: EXO.25.9
reference: Exodus 25:9
source:
  edition: WLC
  text: כְּ/כֹ֗ל אֲשֶׁ֤ר אֲנִי֙ מַרְאֶ֣ה אוֹתְ/ךָ֔ אֵ֚ת תַּבְנִ֣ית הַ/מִּשְׁכָּ֔ן
    וְ/אֵ֖ת תַּבְנִ֣ית כָּל כֵּלָ֑י/ו וְ/כֵ֖ן תַּעֲשֽׂוּ־׃ס
translation:
  text: Exactly according to all that I am showing you—the pattern of the tabernacle
    and the pattern of all its furnishings—so you shall make it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'plan,' 'model,' or 'design' for 'pattern' (תַּבְנִית).
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'you shall make' is plural, addressing Moses together with those
      responsible for the work.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּכֹל אֲשֶׁר
  chosen: Exactly according to all that
  alternatives:
  - According to all that
  - Just as all that
  lexicon: HALOT
  rationale: 'כְּ with כֹּל אֲשֶׁר introduces close correspondence: ''according to
    all that'' or ''just as everything that.'' ''Exactly according to all that'' brings
    out the precision implied by the construction in context, where detailed cultic
    instructions follow.'
- source_word: מַרְאֶה
  chosen: I am showing
  alternatives:
  - I show
  - I cause you to see
  lexicon: HALOT
  rationale: 'The form is a participle of ראה used with present/imperfective force:
    ''I am showing you.'' This fits the immediate revelatory setting better than a
    simple English present and avoids over-wooden ''causing you to see.'''
- source_word: תַּבְנִית
  chosen: pattern
  alternatives:
  - plan
  - model
  - design
  lexicon: HALOT
  rationale: תַּבְנִית denotes a form, pattern, or structural model. 'Pattern' is
    the most established and contextually fitting rendering here, especially given
    the sanctuary's heavenly/shown prototype motif. 'Plan' could imply merely verbal
    instructions; 'model' could imply a physical miniature.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  - the dwelling
  lexicon: HALOT
  rationale: מִשְׁכָּן literally relates to dwelling, but in Exodus it functions as
    the established term for the sacred tent-sanctuary. 'Tabernacle' is the clearest
    conventional English equivalent in this context.
- source_word: כָּל כֵּלָיו
  chosen: all its furnishings
  alternatives:
  - all its vessels
  - all its utensils
  - all its equipment
  lexicon: HALOT
  rationale: כֵּלִים is broad ('articles, vessels, implements'). In sanctuary context,
    'furnishings' communicates the collective cultic items naturally in modern English
    without narrowing too much to containers alone, as 'vessels' might.
- source_word: וְכֵן
  chosen: so
  alternatives:
  - and thus
  - in this way
  lexicon: HALOT
  rationale: 'וְכֵן marks the consequent manner: ''and so / thus.'' ''So'' is concise
    and natural in English while preserving the inferential force.'
- source_word: תַּעֲשׂוּ
  chosen: you shall make it
  alternatives:
  - you shall make
  - you shall do so
  lexicon: HALOT
  rationale: The Hebrew verb is 2mp, addressing Moses and/or Israel corporately. English
    often requires an object for clarity in this context; 'it' refers to the tabernacle
    project as specified by the shown pattern. This avoids an awkwardly bare 'you
    shall make.'
