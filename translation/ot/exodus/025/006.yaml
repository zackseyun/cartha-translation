id: EXO.25.6
reference: Exodus 25:6
source:
  edition: WLC
  text: שֶׁ֖מֶן לַ/מָּאֹ֑ר בְּשָׂמִים֙ לְ/שֶׁ֣מֶן הַ/מִּשְׁחָ֔ה וְ/לִ/קְטֹ֖רֶת הַ/סַּמִּֽים׃
translation:
  text: oil for the light, spices for the anointing oil and for the fragrant incense,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'incense of spices.' The Hebrew phrase is literally 'incense of the spices/aromatics.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׁמֶן
  chosen: oil
  alternatives:
  - olive oil
  lexicon: HALOT
  rationale: The noun broadly means 'oil.' In tabernacle supply contexts it would
    normally be olive oil, but the Hebrew here does not explicitly specify 'olive,'
    so 'oil' best reflects the source without over-specifying.
- source_word: לַמָּאוֹר
  chosen: for the light
  alternatives:
  - for the lamp
  - for lighting
  lexicon: HALOT
  rationale: מָאוֹר denotes a source of light or lighting. In context this refers
    to the tabernacle lamp/lighting supply. 'For the light' is a natural, sufficiently
    formal rendering that preserves the Hebrew's concise expression.
- source_word: בְּשָׂמִים
  chosen: spices
  alternatives:
  - aromatics
  - fragrant spices
  lexicon: HALOT
  rationale: The plural refers to aromatic substances used in sacred preparation.
    'Spices' is clear modern English and fits the cultic inventory context.
- source_word: לְשֶׁמֶן הַמִּשְׁחָה
  chosen: for the anointing oil
  alternatives:
  - for anointing oil
  lexicon: HALOT
  rationale: 'The phrase is a purpose construction: spices intended for preparing
    the consecrating oil. Including ''the'' reflects the Hebrew article on ''anointing''
    and the specific sacred oil in context.'
- source_word: קְטֹרֶת
  chosen: incense
  alternatives:
  - smoke offering
  - fumigation
  lexicon: HALOT
  rationale: In tabernacle context this noun refers to incense, not a general burning.
    'Incense' is the standard and contextually precise rendering.
- source_word: הַסַּמִּים
  chosen: fragrant
  alternatives:
  - of spices
  - spiced
  - aromatic
  lexicon: HALOT
  rationale: The construct phrase קְטֹרֶת הַסַּמִּים is idiomatically 'fragrant incense'
    or 'incense of spices.' 'Fragrant incense' is smoother English while preserving
    the sense of incense compounded from aromatic substances.
