theological_decisions:
- issue: Rendering of הַכַּפֹּרֶת in tabernacle context
  chosen_reading: the mercy seat
  alternative_readings:
  - the atonement cover
  - the cover
  rationale: This verse names the gold cover of the ark in a cultic context closely
    tied to atonement and divine presence. 'Mercy seat' preserves the established
    theological identity of the object, while a more transparent lexical alternative
    is preserved in a footnote for auditability. This does not invoke the NT contested
    term ἱλαστήριον directly, but the conceptual overlap makes documentation important.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic; preserve theological tension rather than resolve it'
