id: EXO.25.18
reference: Exodus 25:18
source:
  edition: WLC
  text: וְ/עָשִׂ֛יתָ שְׁנַ֥יִם כְּרֻבִ֖ים זָהָ֑ב מִקְשָׁה֙ תַּעֲשֶׂ֣ה אֹתָ֔/ם מִ/שְּׁנֵ֖י
    קְצ֥וֹת הַ/כַּפֹּֽרֶת׃
translation:
  text: And you shall make two cherubim of gold; of hammered work you shall make them,
    at the two ends of the mercy seat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the atonement cover.' The Hebrew term refers to the ark's cover and
      is traditionally rendered 'mercy seat' in this cultic context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: And you shall make
  alternatives:
  - And make
  - You are to make
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional context functions
    as an imperative/future command. 'And you shall make' preserves the sequential
    legal/instructional style of the Hebrew.
- source_word: שְׁנַיִם
  chosen: two
  lexicon: HALOT
  rationale: Straightforward cardinal numeral modifying 'cherubim'.
- source_word: כְּרֻבִים
  chosen: cherubim
  alternatives:
  - cherubs
  lexicon: HALOT
  rationale: The traditional transliteration 'cherubim' best preserves the specific
    heavenly-creature referent without flattening it into colloquial 'cherubs,' which
    can mislead modern readers.
- source_word: זָהָב
  chosen: of gold
  alternatives:
  - gold
  lexicon: HALOT
  rationale: 'Rendered as material composition: the cherubim are to be made ''of gold.''
    This is the most natural English expression here.'
- source_word: מִקְשָׁה
  chosen: of hammered work
  alternatives:
  - hammered
  - beaten work
  - of one piece hammered work
  lexicon: HALOT
  rationale: Refers to something made by hammering/beating metal into shape. 'Of hammered
    work' is clear modern English and preserves the manufacturing sense. 'Of one piece'
    is an interpretive implication in context but not the most direct lexical gloss
    here.
- source_word: תַּעֲשֶׂה אֹתָם
  chosen: you shall make them
  alternatives:
  - you are to make them
  lexicon: HALOT
  rationale: Repetition of the verb is retained rather than compressed away, since
    the Hebrew explicitly restates the making command with emphasis on manner.
- source_word: מִשְּׁנֵי קְצֹוֹת
  chosen: at the two ends of
  alternatives:
  - from the two ends of
  - on the two ends of
  lexicon: HALOT
  rationale: The preposition מן with 'two ends' in this construction indicates placement/origin
    relation to the extremities of the cover. 'At the two ends of' is idiomatic English
    that fits the spatial instruction without overcommitting to whether the figures
    are integral with or merely positioned on the ends.
- source_word: הַכַּפֹּרֶת
  chosen: the mercy seat
  alternatives:
  - the atonement cover
  - the cover
  lexicon: HALOT
  rationale: Although the underlying noun refers to the ark's cover, 'mercy seat'
    is the established cultic term in this tabernacle context and best signals the
    specific sacred object. 'Atonement cover' is possible and more transparent lexically,
    but 'mercy seat' remains the clearest canonical term for this furnishing.
