id: EXO.25.3
reference: Exodus 25:3
source:
  edition: WLC
  text: וְ/זֹאת֙ הַ/תְּרוּמָ֔ה אֲשֶׁ֥ר תִּקְח֖וּ מֵ/אִתָּ֑/ם זָהָ֥ב וָ/כֶ֖סֶף וּ/נְחֹֽשֶׁת׃
translation:
  text: 'And this is the contribution that you shall take from them: gold, silver,
    and bronze.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'copper'; the Hebrew נְחֹשֶׁת can refer broadly to copper or bronze,
      depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/זֹאת
  chosen: And this is
  alternatives:
  - Now this is
  - And this
  lexicon: HALOT
  rationale: The conjunction ו plus demonstrative זאת introduces the specification
    that follows. 'And this is' is natural English and preserves the presentational
    force of the Hebrew.
- source_word: הַ/תְּרוּמָה
  chosen: the contribution
  alternatives:
  - the offering
  - the contribution offering
  - the raised offering
  lexicon: HALOT
  rationale: תְּרוּמָה denotes a contribution set apart or lifted up for sacred use.
    'Contribution' fits the context of collecting materials for the tabernacle and
    avoids over-specifying a ritual nuance not explicit in English here. 'Offering'
    is possible, but 'contribution' better reflects the material collection from the
    people.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Standard relative pronoun introducing the clause modifying 'contribution.'
    'That' is idiomatic in modern English.
- source_word: תִּקְח֖וּ
  chosen: you shall take
  alternatives:
  - you are to take
  - you shall receive
  lexicon: HALOT
  rationale: Qal imperfect 2mp of לקח. 'You shall take' preserves the directive force
    and remains close to the Hebrew. 'Receive' is interpretive and slightly softer
    than the source verb.
- source_word: מֵ/אִתָּם
  chosen: from them
  alternatives:
  - from among them
  lexicon: HALOT
  rationale: The preposition with pronominal suffix straightforwardly means 'from
    them,' referring to the Israelites mentioned in the surrounding context.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Standard material term; no contextual reason to vary.
- source_word: וָ/כֶסֶף
  chosen: silver
  lexicon: HALOT
  rationale: Standard material term coordinated in the list of contributed metals.
- source_word: וּ/נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: נְחֹשֶׁת can denote copper or bronze depending on context. In tabernacle-material
    lists, 'bronze' is the conventional and likely sense for the worked metal intended.
    The alternative 'copper' is worth preserving because the Hebrew term can cover
    the broader copper-alloy domain.
