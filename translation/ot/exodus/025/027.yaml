id: EXO.25.27
reference: Exodus 25:27
source:
  edition: WLC
  text: לְ/עֻמַּת֙ הַ/מִּסְגֶּ֔רֶת תִּהְיֶ֖יןָ הַ/טַּבָּעֹ֑ת לְ/בָתִּ֣ים לְ/בַדִּ֔ים
    לָ/שֵׂ֖את אֶת הַ/שֻּׁלְחָֽן־׃
translation:
  text: The rings shall be opposite the frame, as holders for the poles to carry the
    table.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'alongside the frame' or 'corresponding to the frame.' The Hebrew preposition
      can indicate relative position without specifying exact geometry.
    reason: lexical_alternative
  - marker: b
    text: Literally 'for houses for the poles,' that is, receptacles or holders for
      inserting the poles.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְעֻמַּת
  chosen: opposite
  alternatives:
  - alongside
  - corresponding to
  - close by
  lexicon: HALOT
  rationale: The preposition+noun construction indicates position in relation to something
    else. 'Opposite' best captures the spatial sense here in relation to the frame,
    without overinterpreting exact placement.
- source_word: הַמִּסְגֶּרֶת
  chosen: the frame
  alternatives:
  - the rim
  - the border
  lexicon: HALOT
  rationale: In the tabernacle furniture context, מִסְגֶּרֶת refers to the structural
    framing element around the table. 'Frame' is broader and more natural in English
    than 'rim,' while still fitting the construction described.
- source_word: תִּהְיֶיןָ
  chosen: shall be
  alternatives:
  - will be
  lexicon: HALOT
  rationale: A simple future/existential verb. 'Shall be' fits the prescriptive constructional
    style of the surrounding instructions.
- source_word: הַטַּבָּעֹת
  chosen: the rings
  lexicon: HALOT
  rationale: Standard rendering for the metal rings attached to tabernacle furnishings
    for carrying poles.
- source_word: לְבָתִּים
  chosen: as holders
  alternatives:
  - as housings
  - as sockets
  - for receptacles
  lexicon: HALOT
  rationale: Literally 'for houses,' but idiomatically this denotes receptacles or
    holders. 'As holders' communicates function clearly in modern English without
    wooden literalism.
- source_word: לְבַדִּים
  chosen: for the poles
  alternatives:
  - for the carrying poles
  - for the staves
  lexicon: HALOT
  rationale: בַּדִּים in tabernacle contexts are the poles used to carry sacred objects.
    'Poles' is clear modern English; 'staves' is traditional but less accessible.
- source_word: לָשֵׂאת
  chosen: to carry
  alternatives:
  - for carrying
  - to bear
  lexicon: HALOT
  rationale: Infinitive of נשׂא expressing purpose. 'To carry' is the most natural
    English equivalent in this furnishing context.
- source_word: הַשֻּׁלְחָן
  chosen: the table
  lexicon: HALOT
  rationale: Standard rendering for the table described in this passage, traditionally
    the table of the bread of the Presence.
