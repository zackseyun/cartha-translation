theological_decisions:
- issue: Rendering of the sacred collection term תְּרוּמָה in a tabernacle context
  chosen_reading: offering
  alternative_readings:
  - contribution
  - gift
  rationale: The verse concerns material given for the sanctuary at God's command.
    'Offering' preserves the sacred and God-directed nature of the gift without importing
    later sacrificial specificity. 'Contribution' is a good lexical alternative and
    is preserved in a footnote because the context emphasizes voluntary giving.
  doctrine_reference: Translation philosophy §1, §5
