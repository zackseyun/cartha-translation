id: EXO.25.2
reference: Exodus 25:2
source:
  edition: WLC
  text: דַּבֵּר֙ אֶל בְּנֵ֣י יִשְׂרָאֵ֔ל וְ/יִקְחוּ לִ֖/י תְּרוּמָ֑ה מֵ/אֵ֤ת כָּל
    אִישׁ֙ אֲשֶׁ֣ר יִדְּבֶ֣/נּוּ לִבּ֔/וֹ תִּקְח֖וּ אֶת תְּרוּמָתִֽ/י־־־־׃
translation:
  text: Speak to the sons of Israel, so that they take an offering for me. From every
    man whose heart moves him willingly, you shall take my offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'contribution.' The Hebrew term refers to something set apart and given
      for sacred use.
    reason: lexical_alternative
  - marker: b
    text: Or 'whose heart stirs him' or 'whose heart prompts him.' The Hebrew idiom
      emphasizes voluntary inward willingness.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the sons of Israel,' a standard covenantal designation for the people
      of Israel.
    reason: cultural_note
lexical_decisions:
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Tell
  - Speak to
  lexicon: HALOT
  rationale: Piel imperative of דבר commonly means 'speak' or 'tell.' 'Speak' preserves
    the direct imperative force and pairs naturally with the following אֶל ('to').
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Per gender-accurate philosophy, the masculine
    plural familial expression is preserved rather than flattened to 'Israelites,'
    though that remains a viable idiomatic alternative.
- source_word: וְיִקְחוּ לִי
  chosen: so that they take for me
  alternatives:
  - and let them take for me
  - that they may take for me
  lexicon: HALOT
  rationale: 'The prefixed verb after the imperative functions jussively: Moses is
    to speak with the result/purpose that Israel take a contribution. ''So that they
    take'' gives clear modern English while preserving the directive sense. ''For
    me'' reflects לִי directly.'
- source_word: תְּרוּמָה
  chosen: offering
  alternatives:
  - contribution
  - gift
  - heave offering
  lexicon: HALOT
  rationale: תְּרוּמָה denotes a contribution set apart or lifted up for sacred use.
    In this tabernacle-collection context, 'offering' is natural and sufficiently
    broad. 'Contribution' is possible and highlights voluntariness, but 'offering'
    better preserves the sacred orientation.
- source_word: מֵאֵת כָּל אִישׁ
  chosen: From every man
  alternatives:
  - From each man
  - From everyone
  lexicon: HALOT
  rationale: The phrase is distributive and singular. 'Every man' preserves the masculine
    singular אִישׁ and aligns with the project's gender-accurate policy; the context
    is representative rather than excluding women, but the Hebrew wording is not neutral.
- source_word: אֲשֶׁר יִדְּבֶנּוּ לִבּוֹ
  chosen: whose heart moves him willingly
  alternatives:
  - whose heart prompts him
  - whose heart makes him willing
  - whose heart stirs him
  lexicon: HALOT
  rationale: The idiom expresses inward voluntary prompting or generosity. 'Moves
    him willingly' captures both the heart's impulse and the voluntariness central
    to the collection. 'Stirs him' is also strong and traditional, but 'moves him
    willingly' makes the voluntariness explicit.
- source_word: תִּקְחוּ אֶת תְּרוּמָתִי
  chosen: you shall take my offering
  alternatives:
  - you are to take my offering
  - you shall receive my contribution
  lexicon: HALOT
  rationale: The second-person plural addresses Moses and/or those administering the
    collection. 'Take' keeps the lexical link with לקח used earlier in the verse.
    The suffix in 'my offering' is retained directly, indicating the offering belongs
    to God.
