id: EXO.25.15
reference: Exodus 25:15
source:
  edition: WLC
  text: בְּ/טַבְּעֹת֙ הָ/אָרֹ֔ן יִהְי֖וּ הַ/בַּדִּ֑ים לֹ֥א יָסֻ֖רוּ מִמֶּֽ/נּוּ׃
translation:
  text: The poles shall remain in the rings of the ark; they shall not be removed
    from it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The poles shall be in the rings of the ark; they shall not be taken
      from it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּטַבְּעֹת
  chosen: in the rings
  alternatives:
  - through the rings
  - on the rings
  lexicon: HALOT
  rationale: טַבַּעַת refers to a ring, here the mounting rings attached to the ark.
    The preposition בְ is most naturally rendered 'in' in English for the poles' placement
    within the rings.
- source_word: הָאָרֹן
  chosen: the ark
  alternatives:
  - the chest
  lexicon: HALOT
  rationale: אָרוֹן in this tabernacle context conventionally and accurately refers
    to the sacred ark, not merely a generic chest. 'Ark' is the clearest contextual
    rendering in English.
- source_word: יִהְיוּ
  chosen: shall remain
  alternatives:
  - shall be
  - are to be
  lexicon: HALOT
  rationale: The verb היה literally means 'be,' but in this construction it conveys
    continuing placement or state. 'Shall remain' brings out the durative force in
    context, especially with the following prohibition against removal.
- source_word: הַבַּדִּים
  chosen: the poles
  alternatives:
  - the carrying poles
  - the staves
  lexicon: HALOT
  rationale: בַּדִּים are the poles used to carry the ark. 'Poles' is clear modern
    English; 'staves' is traditional but archaic.
- source_word: לֹא יָסֻרוּ
  chosen: they shall not be removed
  alternatives:
  - they shall not depart
  - they shall not be taken away
  lexicon: HALOT
  rationale: סוּר means turn aside, depart, or be removed. In this object-focused
    context, passive English best conveys the intended rule that the poles must stay
    in place.
- source_word: מִמֶּנּוּ
  chosen: from it
  alternatives:
  - from the ark
  lexicon: HALOT
  rationale: The pronominal suffix refers back to the ark. 'From it' is a natural
    English rendering that avoids unnecessary repetition while preserving the referent.
