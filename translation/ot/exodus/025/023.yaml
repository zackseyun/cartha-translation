id: EXO.25.23
reference: Exodus 25:23
source:
  edition: WLC
  text: וְ/עָשִׂ֥יתָ שֻׁלְחָ֖ן עֲצֵ֣י שִׁטִּ֑ים אַמָּתַ֤יִם אָרְכּ/וֹ֙ וְ/אַמָּ֣ה
    רָחְבּ֔/וֹ וְ/אַמָּ֥ה וָ/חֵ֖צִי קֹמָתֽ/וֹ׃
translation:
  text: You shall make a table of acacia wood, two cubits its length, one cubit its
    width, and a cubit and a half its height.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and you shall make.' The Hebrew conjunction links this
      instruction to the preceding commands.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: You shall make
  alternatives:
  - And you shall make
  - You are to make
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional sequence functions
    as an imperative/future command. 'You shall make' preserves the directive force
    in natural English; the initial 'and' is not required in English style.
- source_word: שֻׁלְחָן
  chosen: a table
  alternatives:
  - table
  lexicon: HALOT
  rationale: Standard rendering for the cultic furnishing. The indefinite article
    is natural in English when introducing the object in a sequence of instructions.
- source_word: עֲצֵי שִׁטִּים
  chosen: of acacia wood
  alternatives:
  - of acacia
  - of acacia-wood
  lexicon: HALOT
  rationale: Construct chain literally denotes 'woods of acacia,' idiomatically 'acacia
    wood.' This is the established and plain material sense.
- source_word: אַמָּתַיִם
  chosen: two cubits
  alternatives:
  - two cubits long
  lexicon: HALOT
  rationale: The measure is best kept as 'cubits' rather than converted, preserving
    the source culture and precision.
- source_word: אָרְכּוֹ
  chosen: its length
  alternatives:
  - long
  lexicon: HALOT
  rationale: Noun with 3ms suffix, literally 'its length.' Rendering as a nominal
    phrase matches the Hebrew measurement formula.
- source_word: וְאַמָּה
  chosen: one cubit
  alternatives:
  - a cubit
  lexicon: HALOT
  rationale: Cardinal measurement; 'one cubit' is slightly more explicit in a list
    of dimensions, though 'a cubit' would also be acceptable.
- source_word: רָחְבּוֹ
  chosen: its width
  alternatives:
  - wide
  lexicon: HALOT
  rationale: Noun with suffix, literally 'its width.' Keeping the noun parallels 'its
    length' and 'its height.'
- source_word: וְאַמָּה וָחֵצִי
  chosen: and a cubit and a half
  alternatives:
  - and one and a half cubits
  lexicon: HALOT
  rationale: This closely follows the Hebrew phrasing while remaining idiomatic English.
- source_word: קֹמָתוֹ
  chosen: its height
  alternatives:
  - its stature
  lexicon: HALOT
  rationale: In the context of furniture dimensions, 'height' is the natural English
    equivalent.
