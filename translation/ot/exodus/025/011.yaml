id: EXO.25.11
reference: Exodus 25:11
source:
  edition: WLC
  text: וְ/צִפִּיתָ֤ אֹת/וֹ֙ זָהָ֣ב טָה֔וֹר מִ/בַּ֥יִת וּ/מִ/ח֖וּץ תְּצַפֶּ֑/נּוּ
    וְ/עָשִׂ֧יתָ עָלָ֛י/ו זֵ֥ר זָהָ֖ב סָבִֽיב׃
translation:
  text: You shall overlay it with pure gold; from the inside and from the outside
    you shall overlay it, and you shall make on it a gold molding all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a gold rim' or 'a gold border'; traditionally, 'a crown of gold.' The
      Hebrew זֵר refers to an ornamental edging around the object.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְצִפִּיתָ / תְּצַפֶּנּוּ
  chosen: overlay / you shall overlay it
  alternatives:
  - cover
  - plate
  lexicon: HALOT
  rationale: צפה in this tabernacle-construction context refers to covering an object
    with a metal layer, not merely covering in a general sense. 'Overlay' is standard,
    precise English for plating with gold and fits the craftsmanship context.
- source_word: זָהָב טָהוֹר
  chosen: pure gold
  alternatives:
  - clean gold
  lexicon: HALOT
  rationale: The phrase denotes refined, unmixed gold suitable for sacred use. 'Pure
    gold' is idiomatic modern English and preserves the material quality without unnecessary
    archaism.
- source_word: מִבַּיִת
  chosen: from the inside
  alternatives:
  - inside
  - within
  lexicon: HALOT
  rationale: Literally 'from the house/inside,' here functioning adverbially for the
    ark's interior surface. 'From the inside' pairs naturally with the following phrase
    and reflects the prefixed preposition.
- source_word: וּמִחוּץ
  chosen: from the outside
  alternatives:
  - outside
  - on the outside
  lexicon: HALOT
  rationale: This contrasts with מִבַּיִת and indicates the exterior surface. 'From
    the outside' preserves the parallel structure of the Hebrew.
- source_word: וְעָשִׂיתָ עָלָיו
  chosen: and you shall make on it
  alternatives:
  - and make for it
  - and make upon it
  lexicon: HALOT
  rationale: The preposition עַל most naturally means 'on/upon' here, indicating attachment
    or placement on the ark. 'On it' is straightforward and avoids overinterpretation.
- source_word: זֵר
  chosen: molding
  alternatives:
  - rim
  - border
  - crown
  lexicon: HALOT
  rationale: זֵר in tabernacle-furnishing contexts denotes a decorative edging or
    raised border around the top. 'Molding' best captures a crafted ornamental trim
    in accessible modern English. 'Crown' is traditional but can mislead readers into
    imagining a regal headpiece rather than an architectural/furniture feature.
- source_word: זֵר זָהָב
  chosen: a gold molding
  alternatives:
  - a molding of gold
  - a golden rim
  lexicon: HALOT
  rationale: The construct-like sense is naturally rendered in English as 'a gold
    molding.' This is concise and idiomatic while preserving the material specification.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  - round about
  lexicon: HALOT
  rationale: The term indicates encircling on every side. 'All around' is natural
    modern English and slightly fuller than bare 'around,' preserving the distributive
    force.
