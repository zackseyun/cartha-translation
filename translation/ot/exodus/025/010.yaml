id: EXO.25.10
reference: Exodus 25:10
source:
  edition: WLC
  text: וְ/עָשׂ֥וּ אֲר֖וֹן עֲצֵ֣י שִׁטִּ֑ים אַמָּתַ֨יִם וָ/חֵ֜צִי אָרְכּ֗/וֹ וְ/אַמָּ֤ה
    וָ/חֵ֨צִי֙ רָחְבּ֔/וֹ וְ/אַמָּ֥ה וָ/חֵ֖צִי קֹמָתֽ/וֹ׃
translation:
  text: They shall make an ark of acacia wood, two and a half cubits its length, a
    cubit and a half its width, and a cubit and a half its height.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'chest' or 'box'; the Hebrew term denotes a container, but 'ark' is retained
      here because this is the sacred ark of the covenant context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'acacia wood,' traditionally 'shittim wood.'
    reason: lexical_alternative
  - marker: c
    text: A cubit was an ancient unit of length, roughly the distance from the elbow
      to the fingertips.
    reason: cultural_note
lexical_decisions:
- source_word: וְעָשׂוּ
  chosen: They shall make
  alternatives:
  - And they shall make
  - They are to make
  lexicon: HALOT
  rationale: Qal waw-consecutive/imperfect 3cp of עשה in an instructional context
    is best rendered as a future-like command, 'they shall make.' The initial conjunction
    is absorbed into natural English rather than retained as a wooden 'and.'
- source_word: אֲרוֹן
  chosen: ark
  alternatives:
  - chest
  - box
  lexicon: HALOT
  rationale: אֲרוֹן denotes a chest or box, but in this tabernacle context 'ark' is
    the established and contextually precise English term for the sacred container,
    distinguishing it from ordinary furniture.
- source_word: עֲצֵי שִׁטִּים
  chosen: of acacia wood
  alternatives:
  - of acacia-wood
  - of shittim wood
  lexicon: HALOT
  rationale: The construct phrase literally means 'woods of acacia.' Idiomatic English
    renders the material as 'acacia wood.' 'Shittim wood' is a traditional transliteration
    but is less transparent for modern readers.
- source_word: אַמָּתַיִם וָחֵצִי
  chosen: two and a half cubits
  alternatives:
  - two cubits and a half
  lexicon: HALOT
  rationale: This is the standard English way to express the measure while preserving
    the source unit 'cubits' rather than converting it.
- source_word: אָרְכּוֹ
  chosen: its length
  alternatives:
  - the length of it
  lexicon: HALOT
  rationale: The noun with 3ms suffix refers back to the ark. 'Its length' is concise,
    natural, and formally accurate.
- source_word: וְאַמָּה וָחֵצִי
  chosen: a cubit and a half
  alternatives:
  - one and a half cubits
  lexicon: HALOT
  rationale: Either English form is possible. 'A cubit and a half' more closely mirrors
    the Hebrew singular-plus-half construction and reads naturally in a list of dimensions.
- source_word: רָחְבּוֹ
  chosen: its width
  alternatives:
  - the breadth of it
  lexicon: HALOT
  rationale: רֹחַב denotes width/breadth. 'Width' is clearer modern English than 'breadth'
    while preserving the dimensional sense.
- source_word: קֹמָתוֹ
  chosen: its height
  alternatives:
  - its stature
  lexicon: HALOT
  rationale: In an object-description context, קוֹמָה refers to vertical dimension.
    'Height' is the natural English rendering.
