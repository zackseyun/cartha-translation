id: EXO.25.24
reference: Exodus 25:24
source:
  edition: WLC
  text: וְ/צִפִּיתָ֥ אֹת֖/וֹ זָהָ֣ב טָה֑וֹר וְ/עָשִׂ֥יתָ לּ֛/וֹ זֵ֥ר זָהָ֖ב סָבִֽיב׃
translation:
  text: You shall overlay it with pure gold, and you shall make for it a gold molding
    all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a gold rim' or 'a gold border'; the Hebrew term can denote an ornamental
      edging. Traditionally, some render it 'crown,' but here it refers to the decorative
      molding around the table.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְצִפִּיתָ
  chosen: you shall overlay
  alternatives:
  - you shall cover
  - you shall plate
  lexicon: HALOT
  rationale: The verb צפה in this construction refers to covering an object with a
    metal layer. 'Overlay' is standard, precise English for plating a wooden object
    with gold, preserving the craftsmanship sense better than the broader 'cover.'
- source_word: אֹתוֹ
  chosen: it
  rationale: Direct-object pronoun referring back to the table in the previous verse;
    English appropriately uses 'it.'
- source_word: זָהָב טָהוֹר
  chosen: pure gold
  alternatives:
  - refined gold
  - clean gold
  lexicon: HALOT
  rationale: The phrase denotes gold of high purity. 'Pure gold' is the natural and
    established English equivalent and is fully transparent.
- source_word: וְעָשִׂיתָ
  chosen: and you shall make
  alternatives:
  - and you shall fashion
  lexicon: HALOT
  rationale: עשה is the common verb 'make/do.' 'Make' preserves the straightforward
    imperative-future instruction without adding unnecessary stylistic color.
- source_word: לּוֹ
  chosen: for it
  alternatives:
  - on it
  rationale: The preposition ל here marks the object for which the feature is made.
    'For it' is the most direct rendering, though in English the feature is functionally
    attached to the table.
- source_word: זֵר
  chosen: molding
  alternatives:
  - rim
  - border
  - crown
  lexicon: HALOT
  rationale: זֵר here refers to a decorative edging around the table. 'Molding' best
    captures an ornamental border in furniture/tabernacle craftsmanship. 'Crown' is
    too literal and potentially misleading in modern English, though it reflects the
    raised ornamental sense; 'rim' is possible but less clearly decorative.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Simple material designation; 'gold' is direct and contextually clear.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  - round about
  lexicon: HALOT
  rationale: The adverb indicates encircling on every side. 'All around' is natural
    modern English and preserves the full distributive sense better than the simpler
    'around.'
