id: EXO.25.29
reference: Exodus 25:29
source:
  edition: WLC
  text: וְ/עָשִׂ֨יתָ קְּעָרֹתָ֜י/ו וְ/כַפֹּתָ֗י/ו וּ/קְשׂוֹתָי/ו֙ וּ/מְנַקִּיֹּתָ֔י/ו
    אֲשֶׁ֥ר יֻסַּ֖ךְ בָּ/הֵ֑ן זָהָ֥ב טָה֖וֹר תַּעֲשֶׂ֥ה אֹתָֽ/ם׃
translation:
  text: You shall make its plates and its dishes, and its pitchers and its bowls with
    which the drink offering is poured; you shall make them of pure gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'flagons' for 'pitchers'; the Hebrew term is rare, and older English
      versions often use 'flagons.'
    reason: lexical_alternative
  - marker: b
    text: Or 'cups' for 'bowls'; both terms refer to vessels used in the table's libation
      service.
    reason: lexical_alternative
lexical_decisions:
- source_word: קְּעָרֹתָיו
  chosen: its plates
  alternatives:
  - its dishes
  - its trays
  lexicon: HALOT
  rationale: קְעָרָה denotes a flat vessel or dish. In the table-of-the-bread context,
    'plates' fits the likely function and distinguishes this item from the next vessel
    term. 'Dishes' is possible but would blur the distinction with כַּפּוֹת.
- source_word: כַפֹּתָיו
  chosen: its dishes
  alternatives:
  - its pans
  - its cups
  lexicon: HALOT
  rationale: כַּף literally refers to a palm-shaped object and by extension a small
    vessel or pan. Here it likely refers to containers associated with the table service.
    'Dishes' is a natural English rendering that keeps it distinct from the more liquid-oriented
    vessels that follow.
- source_word: קְשׂוֹתָיו
  chosen: its pitchers
  alternatives:
  - its flagons
  - its jars
  lexicon: HALOT
  rationale: This rare cultic vessel term is traditionally rendered 'flagons,' but
    that is archaic. Because the following clause refers to pouring, a vessel used
    to hold and pour liquid is in view; 'pitchers' conveys that function in readable
    modern English.
- source_word: מְנַקִּיֹּתָיו
  chosen: its bowls
  alternatives:
  - its cups
  - its libation bowls
  lexicon: HALOT
  rationale: This term denotes a vessel associated with pouring or libation service.
    'Bowls' is a common and natural rendering in tabernacle-inventory contexts, while
    the following relative clause specifies their use.
- source_word: אֲשֶׁר יֻסַּךְ בָּהֵן
  chosen: with which the drink offering is poured
  alternatives:
  - by which one pours
  - with which it is poured out
  lexicon: HALOT
  rationale: The passive/imperfect form from נסך refers to pouring a libation. Supplying
    'the drink offering' makes explicit the cultic sense naturally implied by the
    verb in this context, without over-paraphrasing.
- source_word: זָהָב טָהוֹר
  chosen: pure gold
  alternatives:
  - clean gold
  lexicon: HALOT
  rationale: Standard and natural rendering for the material specification in tabernacle
    instructions.
- source_word: וְעָשִׂיתָ ... תַּעֲשֶׂה אֹתָם
  chosen: You shall make ... you shall make them
  alternatives:
  - And you shall make ... you shall make them
  lexicon: HALOT
  rationale: The repeated verb frames the list and then specifies the material. 'You
    shall make' preserves the instructional force of the Hebrew second masculine singular.
