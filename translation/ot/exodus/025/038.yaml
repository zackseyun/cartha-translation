id: EXO.25.38
reference: Exodus 25:38
source:
  edition: WLC
  text: וּ/מַלְקָחֶ֥י/הָ וּ/מַחְתֹּתֶ֖י/הָ זָהָ֥ב טָהֽוֹר׃
translation:
  text: Its tongs and its firepans shall be of pure gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its snuffers'; the Hebrew term refers to a grasping or trimming implement
      associated with the lampstand.
    reason: lexical_alternative
  - marker: b
    text: Or 'its trays' or, less likely in this context, 'its censers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְקָחֶיהָ
  chosen: its tongs
  alternatives:
  - its snuffers
  - its wick-trimmers
  lexicon: HALOT
  rationale: The noun denotes an implement for grasping or trimming in the lampstand
    context. 'Tongs' is the most natural modern English term and fits the likely function
    of handling wicks. Traditional 'snuffers' is possible but less transparent to
    modern readers and may over-specify the action.
- source_word: מַחְתֹּתֶיהָ
  chosen: its firepans
  alternatives:
  - its trays
  - its censers
  lexicon: HALOT
  rationale: The noun commonly refers to pans used for carrying coals or fire. In
    the tabernacle furnishing context, 'firepans' best preserves the cultic utensil
    sense without flattening it to the vaguer 'trays.' 'Censers' is possible in some
    contexts but is too specific here.
- source_word: זָהָב טָהוֹר
  chosen: of pure gold
  alternatives:
  - pure gold
  lexicon: HALOT
  rationale: The phrase straightforwardly describes the material composition. English
    idiom prefers 'of pure gold' after a list of objects, though 'pure gold' alone
    would also be acceptable.
- source_word: וּ
  chosen: and
  lexicon: HALOT
  rationale: The prefixed conjunction links the two utensil terms. In English, the
    coordination is naturally represented by 'and'.
- source_word: -הָ
  chosen: its
  alternatives:
  - her
  lexicon: HALOT
  rationale: The 3fs suffix refers back to the lampstand, a grammatically feminine
    noun in Hebrew. English uses the neuter possessive 'its' for an inanimate object.
