theological_decisions:
- issue: Rendering of כַּפֹּרֶת in a cultic context with later theological associations
  chosen_reading: mercy seat
  alternative_readings:
  - atonement cover
  rationale: The Hebrew denotes the ark's cover/lid, but in Israel's worship it is
    also the place associated with atonement and divine meeting. 'Mercy seat' preserves
    this established theological resonance without forcing a narrower doctrinal interpretation.
    Because the term is conceptually related to later discussions of atonement, the
    more literal alternative is preserved in a footnote for transparency.
  doctrine_reference: Translation philosophy §§1, 5, 6
