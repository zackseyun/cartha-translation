id: EXO.25.21
reference: Exodus 25:21
source:
  edition: WLC
  text: וְ/נָתַתָּ֧ אֶת הַ/כַּפֹּ֛רֶת עַל הָ/אָרֹ֖ן מִ/לְ/מָ֑עְלָ/ה וְ/אֶל הָ֣/אָרֹ֔ן
    תִּתֵּן֙ אֶת הָ֣/עֵדֻ֔ת אֲשֶׁ֥ר אֶתֵּ֖ן אֵלֶֽי/ךָ־־־־׃
translation:
  text: And you shall put the mercy seat on top of the ark, and into the ark you shall
    put the testimony that I will give you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'atonement cover.' The Hebrew term refers to the cover of the ark and
      carries sacrificial/atonement associations.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּפֹּרֶת
  chosen: mercy seat
  alternatives:
  - atonement cover
  - cover
  lexicon: HALOT
  rationale: Traditional but still intelligible rendering for the lid of the ark with
    cultic significance. 'Atonement cover' is possible and more transparent etymologically,
    but 'mercy seat' remains the most recognizable English equivalent for this tabernacle
    furnishing and fits the referential context.
- source_word: מִלְמָעְלָה
  chosen: on top of
  alternatives:
  - above
  - from above
  lexicon: HALOT
  rationale: In context this modifies placement of the mercy seat relative to the
    ark. 'On top of' expresses the spatial sense naturally in English better than
    the more ambiguous 'above'.
- source_word: עֵדֻת
  chosen: the testimony
  alternatives:
  - the covenant document
  - the tablets of the testimony
  lexicon: HALOT
  rationale: A formally close rendering that preserves the Hebrew term's covenant-witness
    sense without importing later specification not explicit in this verse. The immediate
    referent is what God will give to be placed in the ark.
- source_word: נָתַתָּ / תִּתֵּן / אֶתֵּן
  chosen: put / shall put / will give
  alternatives:
  - place / shall place / will place
  lexicon: HALOT
  rationale: English varies naturally by object and subject while preserving the core
    sense of נתן. 'Put' suits placement of cultic objects; 'give' suits God's future
    giving of the testimony.
- source_word: אֶל הָאָרֹן
  chosen: into the ark
  alternatives:
  - in the ark
  - to the ark
  lexicon: HALOT
  rationale: Though אֶל often means 'to,' with the verb 'put' and the direct object
    'the testimony,' the sense is clearly insertion into the ark.
