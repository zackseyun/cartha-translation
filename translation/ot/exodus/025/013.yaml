id: EXO.25.13
reference: Exodus 25:13
source:
  edition: WLC
  text: וְ/עָשִׂ֥יתָ בַדֵּ֖י עֲצֵ֣י שִׁטִּ֑ים וְ/צִפִּיתָ֥ אֹתָ֖/ם זָהָֽב׃
translation:
  text: You shall make poles of acacia wood and overlay them with gold.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: You shall make
  alternatives:
  - and you shall make
  - you are to make
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional sequence functions
    as an imperative/future command. 'You shall make' is natural modern English and
    preserves the directive force.
- source_word: בַדֵּי
  chosen: poles
  alternatives:
  - staves
  - carrying poles
  lexicon: HALOT
  rationale: Refers to the poles used for carrying the ark. 'Poles' is the clearest
    contemporary equivalent; 'staves' is traditional but archaic.
- source_word: עֲצֵי שִׁטִּים
  chosen: of acacia wood
  alternatives:
  - of acacia
  - of shittim wood
  lexicon: HALOT
  rationale: Construct chain meaning 'woods/wood of acacia.' 'Acacia wood' is standard,
    clear English. 'Shittim wood' merely transliterates the Hebrew and is less accessible.
- source_word: וְצִפִּיתָ
  chosen: and overlay
  alternatives:
  - and cover
  - and plate
  lexicon: HALOT
  rationale: The verb denotes covering or overlaying with a material, here gold. 'Overlay'
    best fits the craftsmanship context of applying a gold covering over wood.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct-object pronoun referring back to the plural 'poles.'
- source_word: זָהָב
  chosen: with gold
  alternatives:
  - gold
  - in gold
  lexicon: HALOT
  rationale: 'English idiom requires the material complement with the verb ''overlay'':
    ''overlay them with gold.'' This accurately conveys the Hebrew accusative of material/object
    in context.'
