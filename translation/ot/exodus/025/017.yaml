id: EXO.25.17
reference: Exodus 25:17
source:
  edition: WLC
  text: וְ/עָשִׂ֥יתָ כַפֹּ֖רֶת זָהָ֣ב טָה֑וֹר אַמָּתַ֤יִם וָ/חֵ֨צִי֙ אָרְכָּ֔/הּ וְ/אַמָּ֥ה
    וָ/חֵ֖צִי רָחְבָּֽ/הּ׃
translation:
  text: And you shall make a mercy seat of pure gold; its length shall be two cubits
    and a half, and its width a cubit and a half.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'atonement cover.' The Hebrew כַּפֹּרֶת names the gold cover placed on
      the ark and is related to the atonement root כפר.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: And you shall make
  alternatives:
  - And you are to make
  - And make
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional context functions
    as a directive/future command. 'You shall make' is natural modern English for
    tabernacle instructions and preserves the imperative force.
- source_word: כַפֹּרֶת
  chosen: mercy seat
  alternatives:
  - atonement cover
  - cover
  lexicon: HALOT
  rationale: Traditional 'mercy seat' remains the most recognizable rendering for
    the ark's gold cover in this cultic context. The noun is related to the atonement
    root כפר, so 'atonement cover' is semantically possible, but 'mercy seat' better
    identifies the specific sacred object in readable English. Because the term carries
    theological and lexical complexity, an alternative is preserved in a footnote.
- source_word: זָהָב טָהוֹר
  chosen: of pure gold
  alternatives:
  - pure gold
  lexicon: HALOT
  rationale: 'Construct-like apposition is best rendered idiomatically in English
    as material plus quality: ''of pure gold.'' This preserves both the substance
    and its ritual purity/quality.'
- source_word: אַמָּתַיִם וָחֵצִי
  chosen: two cubits and a half
  alternatives:
  - two and a half cubits
  lexicon: HALOT
  rationale: The Hebrew gives the measurement before the dimension noun phrase. 'Two
    cubits and a half' is a close and natural rendering, preserving the ancient unit
    rather than converting it.
- source_word: אָרְכָּהּ
  chosen: its length shall be
  alternatives:
  - its length
  - the length of it shall be
  lexicon: HALOT
  rationale: The 3fs suffix refers back to כפרת, a feminine noun. English requires
    an explicit predication for smoothness in the measurement clause; 'its length
    shall be' accurately conveys the sense.
- source_word: וְאַמָּה וָחֵצִי
  chosen: and a cubit and a half
  alternatives:
  - and one and a half cubits
  lexicon: HALOT
  rationale: This mirrors the Hebrew sequence and keeps the measurement style parallel
    with the previous clause.
- source_word: רָחְבָּהּ
  chosen: its width
  alternatives:
  - the width of it
  lexicon: HALOT
  rationale: The noun with 3fs suffix refers to the width of the mercy seat. 'Its
    width' is concise and accurate in English.
