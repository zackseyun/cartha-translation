theological_decisions:
- issue: Rendering of כַפֹּרֶת in a cultic/theologically loaded context
  chosen_reading: mercy seat
  alternative_readings:
  - atonement cover
  - cover
  rationale: The verse names the gold cover of the ark, a central cultic object associated
    with atonement. 'Mercy seat' is retained in the main text because it is the established
    English designation for this object and communicates more than a generic lid,
    while a more etymologically transparent alternative is preserved in a footnote
    for auditability. This does not invoke the NT contested term ἱλαστήριον directly,
    but the conceptual overlap warrants documentation.
  doctrine_reference: Translation philosophy §§1, 5, 6; preserve readability while
    documenting significant lexical-theological choices.
