id: EXO.25.4
reference: Exodus 25:4
source:
  edition: WLC
  text: וּ/תְכֵ֧לֶת וְ/אַרְגָּמָ֛ן וְ/תוֹלַ֥עַת שָׁנִ֖י וְ/שֵׁ֥שׁ וְ/עִזִּֽים׃
translation:
  text: and blue, and purple, and scarlet yarn, and fine linen, and goat hair,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'scarlet,' 'crimson yarn,' or more literally 'scarlet from worm/insect
      dye.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'goats'; in context, the material from them is intended.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּכֵלֶת
  chosen: blue
  alternatives:
  - blue cloth
  - blue yarn
  - violet
  lexicon: HALOT
  rationale: The term denotes a blue/purple-blue dyed material used in tabernacle
    textiles. In this list of contributed materials, concise color terms are natural
    English. 'Blue' is the clearest main-text rendering; the material nuance is supplied
    by context and preserved in alternatives.
- source_word: אַרְגָּמָן
  chosen: purple
  alternatives:
  - purple cloth
  - purple yarn
  - red-purple
  lexicon: HALOT
  rationale: This term refers to a costly purple-dyed textile/material. 'Purple' is
    the standard and most readable rendering in an inventory list. As with תְּכֵלֶת,
    the textile sense is implied by the surrounding items.
- source_word: תוֹלַעַת שָׁנִי
  chosen: scarlet yarn
  alternatives:
  - scarlet
  - crimson yarn
  - scarlet material
  lexicon: HALOT
  rationale: The construct phrase literally involves 'worm of scarlet,' referring
    metonymically to scarlet dye/material derived from scale insects. English should
    render the resulting textile color rather than the literal zoological expression.
    'Scarlet yarn' fits the tabernacle-material context and aligns with the likely
    implied textile substance.
- source_word: שֵׁשׁ
  chosen: fine linen
  alternatives:
  - linen
  - fine flax
  lexicon: HALOT
  rationale: In tabernacle contexts this term conventionally denotes fine linen rather
    than merely the number six. 'Fine linen' captures the textile quality and is standard
    in context.
- source_word: עִזִּים
  chosen: goat hair
  alternatives:
  - goats' hair
  - goats
  lexicon: HALOT
  rationale: Literally the plural noun is 'goats,' but in this materials list the
    intended sense is the product used for weaving tent coverings, i.e., goat hair.
    Rendering it as 'goat hair' communicates the implied material rather than the
    animal itself.
