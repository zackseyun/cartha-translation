id: EXO.25.36
reference: Exodus 25:36
source:
  edition: WLC
  text: כַּפְתֹּרֵי/הֶ֥ם וּ/קְנֹתָ֖/ם מִמֶּ֣/נָּה יִהְי֑וּ כֻּלָּ֛/הּ מִקְשָׁ֥ה אַחַ֖ת
    זָהָ֥ב טָהֽוֹר׃
translation:
  text: Their buds and their branches shall be of one piece with it, all of it a single
    hammered work of pure gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''from it'': the sense is that the buds and branches were to be formed
      integrally from the lampstand rather than attached separately.'
    reason: lexical_alternative
  - marker: b
    text: Or 'beaten work.' The Hebrew emphasizes that the whole lampstand was fashioned
      as one hammered piece of pure gold.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּפְתֹּרֵיהֶם
  chosen: their buds
  alternatives:
  - their capitals
  - their knobs
  lexicon: HALOT
  rationale: In the lampstand description, כפתר refers to a rounded ornamental feature
    associated with floral imagery. 'Buds' fits the immediate botanical design context
    better than the more traditional but less transparent 'knops/knobs,' while 'capitals'
    can sound architectural rather than floral.
- source_word: וּקְנֹתָם
  chosen: and their branches
  alternatives:
  - and their reeds
  - and their shafts
  lexicon: HALOT
  rationale: קנה commonly denotes a reed or stalk, but in the menorah context it refers
    to the projecting arms/shafts. 'Branches' is natural English and coheres with
    the plant-like imagery of the lampstand.
- source_word: מִמֶּנָּה
  chosen: with it
  alternatives:
  - from it
  - out of it
  lexicon: HALOT
  rationale: 'The preposition marks integral derivation from the lampstand itself:
    the ornamental parts are not separate attachments. ''With it'' communicates one-piece
    construction idiomatically in English; the more literal ''from it'' is preserved
    as an alternative.'
- source_word: יִהְיוּ
  chosen: shall be
  alternatives:
  - must be
  - are to be
  lexicon: HALOT
  rationale: The imperfect here functions as an instruction within the tabernacle
    specifications. 'Shall be' preserves the prescriptive force in standard English.
- source_word: כֻּלָּהּ
  chosen: all of it
  alternatives:
  - the whole of it
  - it all
  lexicon: HALOT
  rationale: The term emphasizes the entirety of the lampstand as a unified object.
    'All of it' is clear and preserves the comprehensive emphasis.
- source_word: מִקְשָׁה
  chosen: hammered work
  alternatives:
  - beaten work
  - hammered piece
  lexicon: HALOT
  rationale: This term denotes something made by hammering from one piece of metal.
    'Hammered work' is clear modern English and preserves the manufacturing sense.
- source_word: אַחַת
  chosen: a single
  alternatives:
  - one
  - one piece
  lexicon: HALOT
  rationale: The feminine numeral modifies the sense of unified construction. 'A single'
    works smoothly with 'hammered work' and highlights oneness.
- source_word: זָהָב טָהוֹר
  chosen: pure gold
  alternatives:
  - refined gold
  - clean gold
  lexicon: HALOT
  rationale: This standard collocation is best rendered 'pure gold' in natural English.
