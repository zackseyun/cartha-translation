id: EXO.25.32
reference: Exodus 25:32
source:
  edition: WLC
  text: וְ/שִׁשָּׁ֣ה קָנִ֔ים יֹצְאִ֖ים מִ/צִּדֶּ֑י/הָ שְׁלֹשָׁ֣ה קְנֵ֣י מְנֹרָ֗ה מִ/צִּדָּ/הּ֙
    הָ/אֶחָ֔ד וּ/שְׁלֹשָׁה֙ קְנֵ֣י מְנֹרָ֔ה מִ/צִּדָּ֖/הּ הַ/שֵּׁנִֽי׀׃
translation:
  text: 'And six branches shall come out from its sides: three branches of the lampstand
    from its one side, and three branches of the lampstand from its second side.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'three branches of the lampstand from its other side.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָנִים
  chosen: branches
  alternatives:
  - reeds
  - shafts
  - arms
  lexicon: HALOT
  rationale: In the tabernacle-furnishing context, קָנֶה refers to projecting stems/arms
    of the lampstand rather than botanical reeds. 'Branches' is natural English for
    the lampstand's extending members and fits the imagery of something coming out
    from the sides.
- source_word: יֹצְאִים
  chosen: shall come out
  alternatives:
  - going out
  - extending out
  - projecting
  lexicon: HALOT
  rationale: The participle describes the branches as issuing from the lampstand's
    sides. 'Shall come out' preserves the descriptive/instructional force in idiomatic
    English within the construction instructions.
- source_word: מִצִּדֶּיהָ
  chosen: from its sides
  alternatives:
  - out of its sides
  - from its side-parts
  lexicon: HALOT
  rationale: The plural with 3fs suffix refers to the lampstand's lateral sides. 'From
    its sides' is straightforward and matches the physical description.
- source_word: קְנֵי מְנֹרָה
  chosen: branches of the lampstand
  alternatives:
  - arms of the lampstand
  - shafts of the lampstand
  lexicon: HALOT
  rationale: The construct phrase specifies that these branches belong to the lampstand.
    Repeating 'branches of the lampstand' keeps the Hebrew's explicitness and avoids
    ambiguity.
- source_word: מְנֹרָה
  chosen: lampstand
  alternatives:
  - menorah
  - lamp
  lexicon: HALOT
  rationale: '''Lampstand'' translates the object rather than transliterating it,
    in keeping with the philosophy of translating common nouns. It is the standard
    and clearest English rendering in this cultic context.'
- source_word: הָאֶחָד
  chosen: its one side
  alternatives:
  - the one side
  - one side
  lexicon: HALOT
  rationale: The Hebrew says literally 'the one,' modifying 'side.' Rendering with
    the possessive implied by the suffix on 'its side' gives natural English while
    preserving the contrast with the other side.
- source_word: הַשֵּׁנִי
  chosen: its second side
  alternatives:
  - the second side
  - the other side
  lexicon: HALOT
  rationale: '''Second side'' closely reflects the Hebrew ordinal and preserves the
    formal symmetry of the description better than the more interpretive ''other side''.'
