id: EXO.25.37
reference: Exodus 25:37
source:
  edition: WLC
  text: וְ/עָשִׂ֥יתָ אֶת נֵרֹתֶ֖י/הָ שִׁבְעָ֑ה וְ/הֶֽעֱלָה֙ אֶת נֵ֣רֹתֶ֔י/הָ וְ/הֵאִ֖יר
    עַל עֵ֥בֶר פָּנֶֽי/הָ־־־׃
translation:
  text: You shall make its seven lamps, and he shall set up its lamps so that they
    give light in front of it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he shall light its lamps so that they give light toward its front.'
      The Hebrew verb can denote causing the lamps to go up, which in context may
      imply lighting as well as setting them in place.
    reason: lexical_alternative
  - marker: b
    text: The third-person singular ('he shall set up') likely refers to the priest
      who tends the lampstand, though the subject is not explicitly named in this
      verse.
    reason: cultural_note
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: You shall make
  alternatives:
  - and you shall make
  - you are to make
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional context functions
    as an imperative/future command to Moses. 'You shall make' preserves the directive
    force in natural English.
- source_word: נֵרֹתֶיהָ
  chosen: its lamps
  alternatives:
  - its lights
  - its lamp-cups
  lexicon: HALOT
  rationale: נֵר commonly denotes a lamp or lamp-flame. In the tabernacle furnishing
    context, 'lamps' is the standard and clearest rendering; the 3fs suffix refers
    to the lampstand.
- source_word: שִׁבְעָה
  chosen: seven
  lexicon: HALOT
  rationale: Cardinal number modifying 'lamps'; rendered directly.
- source_word: וְהֶעֱלָה
  chosen: he shall set up
  alternatives:
  - and one shall light
  - and he shall mount
  - and he shall cause to ascend
  lexicon: HALOT
  rationale: Hiphil of עלה literally means 'cause to go up.' With lamps in cultic
    usage it can refer to setting/lighting them. Because the subject is third masculine
    singular and the next verb expresses the result of illumination, 'he shall set
    up' preserves the distinct action without over-specifying ignition. The likely
    implied subject is the attending priest.
- source_word: וְהֵאִיר
  chosen: so that they give light
  alternatives:
  - and they shall shine
  - and it shall illuminate
  - and he shall make light
  lexicon: HALOT
  rationale: 'Hiphil of אור here expresses the purpose/result of arranging the lamps.
    English idiom is smoother with an explicit plural subject drawn from ''lamps'':
    ''so that they give light.'' This captures the functional sense.'
- source_word: עַל־עֵבֶר פָּנֶיהָ
  chosen: in front of it
  alternatives:
  - toward its front
  - across from its face
  - on the side facing it
  lexicon: HALOT
  rationale: The phrase combines על with עֵבֶר ('side/region opposite') and פָּנִים
    ('face/front'). In context it indicates the direction the lamps are to cast light
    relative to the lampstand. 'In front of it' is concise, natural, and contextually
    accurate.
