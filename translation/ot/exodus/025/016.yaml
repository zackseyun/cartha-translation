id: EXO.25.16
reference: Exodus 25:16
source:
  edition: WLC
  text: וְ/נָתַתָּ֖ אֶל הָ/אָרֹ֑ן אֵ֚ת הָ/עֵדֻ֔ת אֲשֶׁ֥ר אֶתֵּ֖ן אֵלֶֽי/ךָ־׃
translation:
  text: And you shall put into the ark the testimony that I will give you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more specifically in context, 'the tablets of the testimony.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתָּ
  chosen: And you shall put
  alternatives:
  - And you shall place
  - And you shall give
  lexicon: HALOT
  rationale: נתן has a broad semantic range including 'give,' 'put,' and 'place.'
    With אֶל plus 'the ark,' the sense is spatial placement rather than transfer of
    ownership, so 'put' is the most natural modern English rendering while remaining
    close to the Hebrew.
- source_word: אֶל
  chosen: into
  alternatives:
  - in
  - to
  lexicon: HALOT
  rationale: The preposition literally means 'to/toward,' but with the verb נתן and
    container noun 'ark,' idiomatic English requires 'into' to express insertion into
    the ark.
- source_word: הָאָרֹן
  chosen: the ark
  alternatives:
  - the chest
  - the box
  lexicon: HALOT
  rationale: אָרוֹן in this tabernacle context is the established and contextually
    appropriate term 'ark,' referring to the sacred chest. 'Chest' or 'box' would
    be semantically possible but would understate the cultic significance.
- source_word: אֵת
  chosen: '[direct object marker, untranslated]'
  lexicon: Hebrew grammar
  rationale: אֵת marks the definite direct object and is not represented by a separate
    English word.
- source_word: הָעֵדֻת
  chosen: the testimony
  alternatives:
  - the covenant document
  - the tablets of the testimony
  - the witness
  lexicon: HALOT
  rationale: עֵדוּת commonly means 'testimony' or 'witness.' In Exodus this term refers
    to the covenantal testimony God will give, ultimately associated with the tablets
    placed in the ark. 'Testimony' preserves the Hebrew term without over-specifying
    beyond the verse itself.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: Hebrew grammar
  rationale: A simple relative pronoun is required. 'That' is more natural in contemporary
    English than 'which' here.
- source_word: אֶתֵּן
  chosen: I will give
  alternatives:
  - I am giving
  - I will place
  lexicon: HALOT
  rationale: 'The Qal imperfect 1cs naturally expresses future action here: God will
    give the testimony to Moses. ''Give'' is the plain sense and should be retained.'
- source_word: אֵלֶיךָ
  chosen: you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: The indirect object is naturally expressed in English after 'give' as
    'give you.' This preserves the sense without unnecessary literalism.
