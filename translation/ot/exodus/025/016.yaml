theological_decisions:
- issue: Referent of 'the testimony'
  chosen_reading: Render generically as 'the testimony' without specifying tablets
    in the main text.
  alternative_readings:
  - Interpret as the stone tablets of the covenant testimony
  rationale: The immediate Hebrew says only 'the testimony that I will give you.'
    While the broader context clarifies that this testimony is embodied in the tablets,
    the verse itself does not explicitly name them. Optimal equivalence preserves
    the textual wording and allows context to supply fuller identification.
  doctrine_reference: Translation philosophy §§1, 3, 5
