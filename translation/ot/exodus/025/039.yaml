id: EXO.25.39
reference: Exodus 25:39
source:
  edition: WLC
  text: כִּכָּ֛ר זָהָ֥ב טָה֖וֹר יַעֲשֶׂ֣ה אֹתָ֑/הּ אֵ֥ת כָּל הַ/כֵּלִ֖ים הָ/אֵֽלֶּה־׃
translation:
  text: He shall make it, with all these utensils, from a talent of pure gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'together with all these vessels/articles.' The Hebrew term can refer
      broadly to implements or containers associated with the lampstand.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּכָּר
  chosen: a talent
  alternatives:
  - a talent-weight
  - a round measure
  lexicon: HALOT
  rationale: כִּכָּר is a standard weight measure, conventionally rendered 'talent'
    in tabernacle contexts. Retaining the traditional metrological term is more precise
    than paraphrasing as a generic quantity of gold.
- source_word: זָהָב טָהוֹר
  chosen: pure gold
  alternatives:
  - refined gold
  - clean gold
  lexicon: HALOT
  rationale: The adjective טָהוֹר here qualifies the material as ritually/materially
    pure. 'Pure gold' is the natural English rendering in craftsmanship contexts.
- source_word: יַעֲשֶׂה
  chosen: He shall make
  alternatives:
  - it shall be made
  - one shall make
  lexicon: HALOT
  rationale: The verb is Qal imperfect 3ms of עשה. In this instructional context,
    English idiom commonly uses 'shall' for prescription. The subject is indefinite/implicit
    from the surrounding instructions, but 'he shall make' best reflects the Hebrew
    verbal form without over-paraphrasing.
- source_word: אֹתָהּ
  chosen: it
  alternatives:
  - this
  - the lampstand
  lexicon: HALOT
  rationale: The feminine singular object pronoun refers back to the lampstand described
    in the preceding context. 'It' preserves the pronoun in the main text; specifying
    'the lampstand' would be interpretive expansion beyond the immediate wording.
- source_word: אֵת כָּל הַכֵּלִים הָאֵלֶּה
  chosen: with all these utensils
  alternatives:
  - together with all these vessels
  - along with all these articles
  lexicon: HALOT
  rationale: כֵּלִים is a broad term for implements/articles/vessels. In the context
    of tabernacle furnishings associated with the lampstand, 'utensils' is clear modern
    English and suitably concrete. Rendering the phrase with 'with' captures the accusative
    marker plus coordinated object sense in idiomatic English.
