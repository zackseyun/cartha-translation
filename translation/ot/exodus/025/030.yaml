id: EXO.25.30
reference: Exodus 25:30
source:
  edition: WLC
  text: וְ/נָתַתָּ֧ עַֽל הַ/שֻּׁלְחָ֛ן לֶ֥חֶם פָּנִ֖ים לְ/פָנַ֥/י תָּמִֽיד־׃פ
translation:
  text: And you shall set the bread of the Presence on the table before me continually.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''bread of the Presence''; traditionally ''showbread.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/נָתַתָּ
  chosen: And you shall set
  alternatives:
  - and you shall put
  - and you shall place
  lexicon: HALOT
  rationale: נתן is broadly 'give/put/set.' In this cultic furnishing context, 'set'
    is idiomatic modern English for placing an item in its appointed position, without
    over-paraphrasing.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: The preposition straightforwardly indicates position on the table. 'On'
    is natural modern English.
- source_word: הַשֻּׁלְחָן
  chosen: the table
  lexicon: HALOT
  rationale: Definite noun referring to the specific table described in the tabernacle
    instructions.
- source_word: לֶחֶם פָּנִים
  chosen: the bread of the Presence
  alternatives:
  - the bread of the face
  - the bread set before me
  - showbread
  lexicon: HALOT
  rationale: The construct literally means 'bread of faces/presence.' 'Bread of the
    Presence' is the clearest established English rendering that preserves the Hebrew
    sense and cultic significance. 'Showbread' is traditional but less transparent
    to modern readers. Because the following phrase לְפָנַי explicitly means 'before
    me,' rendering this phrase as 'bread of the Presence' avoids flattening the two
    related but distinct expressions into redundancy.
- source_word: לְפָנַי
  chosen: before me
  alternatives:
  - in my presence
  lexicon: HALOT
  rationale: Literally 'before my face/me.' 'Before me' is concise and natural, preserving
    the direct divine speech.
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - regularly
  - continually before me
  - always
  lexicon: HALOT
  rationale: In priestly/tabernacle contexts תמיד often denotes ongoing regularity
    or perpetual observance. 'Continually' best reflects the covenantal-liturgical
    sense here.
