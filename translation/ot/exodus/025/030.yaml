theological_decisions:
- issue: Cultic term לֶחֶם פָּנִים
  chosen_reading: the bread of the Presence
  alternative_readings:
  - showbread
  - the bread set before me
  rationale: The chosen rendering preserves the Hebrew cultic expression while remaining
    readable in modern English. It avoids importing later ecclesiastical jargon and
    keeps the theological emphasis on the bread's placement in God's presence.
