id: EXO.25.5
reference: Exodus 25:5
source:
  edition: WLC
  text: וְ/עֹרֹ֨ת אֵילִ֧ם מְאָדָּמִ֛ים וְ/עֹרֹ֥ת תְּחָשִׁ֖ים וַ/עֲצֵ֥י שִׁטִּֽים׃
translation:
  text: ram skins dyed red, fine leather skins, and acacia wood,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew תְּחָשִׁים refers to an uncertain material or animal source; possibilities
      include 'dugong skins,' 'porpoise skins,' or a kind of high-quality leather.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹרֹת
  chosen: skins
  alternatives:
  - hides
  - leather
  lexicon: HALOT
  rationale: The plural construct of עוֹר refers to animal skins/hides as materials.
    'Skins' is natural modern English in a list of tabernacle materials and avoids
    over-specifying processing level.
- source_word: אֵילִם
  chosen: ram
  alternatives:
  - rams
  lexicon: HALOT
  rationale: The plural noun means 'rams.' In English material lists, 'ram skins'
    idiomatically conveys the plural source animals without requiring 'rams' in isolation.
- source_word: מְאָדָּמִים
  chosen: dyed red
  alternatives:
  - reddened
  - made red
  - red
  lexicon: HALOT
  rationale: The passive/participle form indicates skins that have been made red,
    not merely naturally red. 'Dyed red' best captures the likely treatment in a materials
    inventory.
- source_word: עֹרֹת תְּחָשִׁים
  chosen: fine leather skins
  alternatives:
  - porpoise skins
  - dugong skins
  - goatskin leather
  - tachash skins
  lexicon: HALOT
  rationale: תְּחַשׁ is notoriously uncertain. Rather than falsely specifying an animal,
    'fine leather skins' communicates a durable covering material in readable English.
    Because the precise referent is disputed, major alternatives are preserved in
    a footnote.
- source_word: עֲצֵי
  chosen: wood
  alternatives:
  - timbers
  - boards of
  lexicon: HALOT
  rationale: The construct plural 'woods of' is idiomatically rendered by the English
    material noun 'wood' in an offering list.
- source_word: שִׁטִּים
  chosen: acacia
  alternatives:
  - shittim
  - acacia tree
  lexicon: HALOT
  rationale: This term refers to acacia, the standard and widely accepted identification.
    'Acacia wood' is clear modern English and preferable to the transliteration 'shittim.'
