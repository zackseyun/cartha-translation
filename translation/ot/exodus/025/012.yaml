id: EXO.25.12
reference: Exodus 25:12
source:
  edition: WLC
  text: וְ/יָצַ֣קְתָּ לּ֗/וֹ אַרְבַּע֙ טַבְּעֹ֣ת זָהָ֔ב וְ/נָ֣תַתָּ֔ה עַ֖ל אַרְבַּ֣ע
    פַּעֲמֹתָ֑י/ו וּ/שְׁתֵּ֣י טַבָּעֹ֗ת עַל צַלְע/וֹ֙ הָֽ/אֶחָ֔ת וּ/שְׁתֵּי֙ טַבָּעֹ֔ת
    עַל צַלְע֖/וֹ הַ/שֵּׁנִֽית־־׃
translation:
  text: 'And you shall cast for it four rings of gold and put them on its four feet:
    two rings on one side of it and two rings on its second side.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "its four corners" for "its four feet"; the Hebrew term is difficult,
      but likely refers to the ark's lower supports or footings rather than abstract
      corner points.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָצַקְתָּ
  chosen: you shall cast
  alternatives:
  - you shall pour
  - you shall cast in metal
  lexicon: HALOT
  rationale: In context of making gold fittings, the verb יצק refers to casting metal
    rather than a generic pouring. 'You shall cast' is natural English and fits the
    tabernacle-construction setting.
- source_word: טַבְּעֹת
  chosen: rings
  alternatives:
  - ring-shaped fittings
  lexicon: HALOT
  rationale: The noun denotes rings, here metal rings attached to the ark for carrying
    poles. 'Rings' is the standard and sufficiently precise rendering.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Straightforward material designation.
- source_word: וְנָתַתָּה
  chosen: and put
  alternatives:
  - and place
  - and set
  lexicon: HALOT
  rationale: נתן is broad; 'put' is idiomatic and clear in instructions for attaching
    the rings.
- source_word: פַּעֲמֹתָיו
  chosen: its four feet
  alternatives:
  - its four corners
  - its four lower parts
  - its four bases
  lexicon: HALOT
  rationale: Though the noun can be difficult, in this construction it most naturally
    refers to the ark's four feet or foot-like lower supports, where the rings would
    be mounted. This fits the immediate specification of two rings on one side and
    two on the other. 'Feet' preserves the concrete imagery better than the interpretive
    'corners.'
- source_word: צַלְעוֹ
  chosen: side of it
  alternatives:
  - rib of it
  - flank of it
  lexicon: HALOT
  rationale: צלע commonly means 'side' in architectural/object contexts. 'Side of
    it' is clear modern English for the ark's lateral sides.
- source_word: הָאֶחָת ... הַשֵּׁנִית
  chosen: one ... second
  alternatives:
  - one ... other
  lexicon: HALOT
  rationale: The Hebrew distinguishes the first and second side. English smooths this
    as 'one side ... its second side,' preserving the sequence without awkwardness.
