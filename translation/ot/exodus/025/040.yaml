theological_decisions:
- issue: Nature of the revealed model for the tabernacle items
  chosen_reading: pattern
  alternative_readings:
  - copy
  - form
  - plan
  rationale: The Hebrew תבנית indicates a model or pattern shown by God, without requiring
    the translation to specify a metaphysical theory of a heavenly archetype. 'Pattern'
    preserves the text's wording and theological openness.
  doctrine_reference: Preserve theological tension rather than resolve it.
