id: EXO.25.40
reference: Exodus 25:40
source:
  edition: WLC
  text: וּ/רְאֵ֖ה וַ/עֲשֵׂ֑ה בְּ/תַ֨בְנִיתָ֔/ם אֲשֶׁר אַתָּ֥ה מָרְאֶ֖ה בָּ/הָֽר־׃ס
translation:
  text: And see that you make them according to their pattern, which is being shown
    to you on the mountain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'See, and make them after their pattern, which was shown to you on the
      mountain.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּרְאֵה
  chosen: And see
  alternatives:
  - See
  - Take care
  lexicon: HALOT
  rationale: The imperative of ראה here functions idiomatically as an admonition to
    pay careful attention. 'And see' preserves the Hebrew coordination and imperative
    force, while allowing the following clause to express the content of the warning.
- source_word: וַעֲשֵׂה
  chosen: that you make
  alternatives:
  - and make
  - and do
  lexicon: HALOT
  rationale: עשה commonly means 'make/do.' In this context of constructing cultic
    furnishings, 'make' is the natural English equivalent. Rendering it as 'that you
    make' reflects the sense of the preceding imperative plus subordinate content
    in smooth English.
- source_word: בְּתַבְנִיתָם
  chosen: according to their pattern
  alternatives:
  - by their pattern
  - in accordance with their form
  - after their pattern
  lexicon: HALOT
  rationale: תבנית denotes a pattern, model, or form. The 3mp suffix indicates 'their
    pattern,' referring to the items just described. 'According to their pattern'
    is idiomatic English and preserves the sense of conformity to a shown model.
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  - as
  lexicon: HALOT
  rationale: The relative particle introduces the clause modifying 'pattern.' 'Which'
    is a natural English relative pronoun here.
- source_word: אַתָּה
  chosen: you
  lexicon: HALOT
  rationale: The independent pronoun is explicit in Hebrew for emphasis. English does
    not need separate emphasis here beyond the direct address, so it is carried by
    'you' in the clause.
- source_word: מָרְאֶה
  chosen: is being shown to you
  alternatives:
  - you are being shown
  - was shown to you
  - you see
  lexicon: HALOT
  rationale: The form is best taken as a Hophal participle from ראה, 'being shown.'
    This yields the sense that the pattern is being displayed to Moses. Present progressive
    English fits the participial aspect and immediate context better than a simple
    past.
- source_word: בָּהָר
  chosen: on the mountain
  alternatives:
  - in the mountain
  - at the mountain
  lexicon: HALOT
  rationale: The phrase refers to Moses' location on Sinai/Horeb. 'On the mountain'
    is the most natural English rendering for the Hebrew preposition in this context.
