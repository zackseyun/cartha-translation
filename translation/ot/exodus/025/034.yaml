id: EXO.25.34
reference: Exodus 25:34
source:
  edition: WLC
  text: וּ/בַ/מְּנֹרָ֖ה אַרְבָּעָ֣ה גְבִעִ֑ים מְשֻׁקָּדִ֔ים כַּפְתֹּרֶ֖י/הָ וּ/פְרָחֶֽי/הָ׃
translation:
  text: And on the lampstand there shall be four cups made like almond blossoms, with
    its buds and its flowers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'almond-shaped' or 'decorated with almond blossoms.' The Hebrew describes
      the cups with imagery derived from the almond tree and may emphasize shape or
      ornamentation.
    reason: lexical_alternative
  - marker: b
    text: Or 'its knobs.' The Hebrew term refers to a rounded ornamental feature on
      the lampstand.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַ/מְּנֹרָה
  chosen: And on the lampstand
  alternatives:
  - And in the lampstand
  - Now on the lampstand
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition are best rendered smoothly as
    'And on.' מְנֹרָה refers to the lampstand itself, not merely a lamp. 'On the lampstand'
    fits the construction and the tabernacle furnishing context.
- source_word: אַרְבָּעָה
  chosen: four
  lexicon: HALOT
  rationale: Straightforward cardinal numeral modifying 'cups.'
- source_word: גְבִעִים
  chosen: cups
  alternatives:
  - goblets
  - calyxes
  lexicon: HALOT
  rationale: The noun commonly denotes bowl- or cup-shaped forms. In tabernacle-description
    context, 'cups' is the most natural English rendering and matches the ornamental
    description.
- source_word: מְשֻׁקָּדִים
  chosen: made like almond blossoms
  alternatives:
  - almond-shaped
  - decorated with almond blossoms
  lexicon: HALOT
  rationale: This passive/denominative form from the almond root describes the cups
    as fashioned in an almond-blossom pattern. 'Made like almond blossoms' communicates
    the design clearly in natural English without overcommitting to either mere shape
    or engraved decoration.
- source_word: כַּפְתֹּרֶיהָ
  chosen: its buds
  alternatives:
  - its knobs
  - its capitals
  lexicon: HALOT
  rationale: כפתר in tabernacle furnishing descriptions refers to a rounded ornamental
    projection. 'Buds' fits the floral imagery of the lampstand better than the more
    architectural 'capitals,' while 'knobs' is possible but less elegant in context.
- source_word: וּפְרָחֶיהָ
  chosen: and its flowers
  alternatives:
  - and its blossoms
  lexicon: HALOT
  rationale: פֶּרַח denotes a flower or blossom. 'Flowers' is clear and pairs well
    with 'buds'; 'blossoms' is possible but could sound redundant alongside 'almond
    blossoms' earlier in the verse.
