theological_decisions:
- issue: Corporate designation בְּנֵי יִשְׂרָאֵל
  chosen_reading: from among the sons of Israel
  alternative_readings:
  - from among the Israelites
  rationale: The Hebrew uses the masculine plural construct 'sons of Israel' as the
    covenant people designation. Following the project's gender-accurate principle,
    the main text keeps the source-shaped expression rather than neutralizing it.
    Because modern English readers may naturally understand the corporate sense with
    'Israelites,' that alternative is preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
