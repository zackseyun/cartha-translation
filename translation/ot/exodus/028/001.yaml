id: EXO.28.1
reference: Exodus 28:1
source:
  edition: WLC
  text: וְ/אַתָּ֡ה הַקְרֵ֣ב אֵלֶי/ךָ֩ אֶת אַהֲרֹ֨ן אָחִ֜י/ךָ וְ/אֶת בָּנָ֣י/ו אִתּ֔/וֹ
    מִ/תּ֛וֹךְ בְּנֵ֥י יִשְׂרָאֵ֖ל לְ/כַהֲנ/וֹ לִ֑/י אַהֲרֹ֕ן נָדָ֧ב וַ/אֲבִיה֛וּא
    אֶלְעָזָ֥ר וְ/אִיתָמָ֖ר בְּנֵ֥י אַהֲרֹֽן־־־׃
translation:
  text: 'And you, bring near to yourself Aaron your brother, and his sons with him,
    from among the sons of Israel, to serve as priests for me: Aaron, Nadab and Abihu,
    Eleazar and Ithamar, Aaron’s sons.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'from among the Israelites.' The Hebrew literally says 'from among the
      sons of Israel,' a standard covenant people designation.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקְרֵב
  chosen: bring near
  alternatives:
  - present
  - bring
  lexicon: HALOT
  rationale: The Hiphil of קרב commonly means to bring near or present. 'Bring near'
    preserves the concrete cultic sense that introduces priestly consecration, without
    overinterpreting it as full ordination.
- source_word: אֵלֶיךָ
  chosen: to yourself
  alternatives:
  - to you
  lexicon: HALOT
  rationale: The phrase הַקְרֵב אֵלֶיךָ is more literally 'bring near to yourself.'
    This keeps the personal direction toward Moses explicit, matching the Hebrew more
    closely than the smoother 'to you.'
- source_word: אָחִיךָ
  chosen: your brother
  lexicon: HALOT
  rationale: Straightforward kinship term; retained explicitly to reflect the familial
    relationship emphasized in the Hebrew.
- source_word: בָּנָיו אִתּוֹ
  chosen: his sons with him
  alternatives:
  - and his sons
  - his sons along with him
  lexicon: HALOT
  rationale: The accompaniment marker אִתּוֹ is significant and is preserved as 'with
    him,' showing that Aaron and his sons are summoned together.
- source_word: מִתּוֹךְ בְּנֵי יִשְׂרָאֵל
  chosen: from among the sons of Israel
  alternatives:
  - from among the Israelites
  - out of the sons of Israel
  lexicon: HALOT
  rationale: This phrase marks selection from within the covenant people. 'Sons of
    Israel' is more formally aligned with the Hebrew and fits the project's gender-accurate
    principle, though 'Israelites' would be smoother English.
- source_word: לְכַהֲנוֹ לִי
  chosen: to serve as priests for me
  alternatives:
  - to minister as priests to me
  - to be priests for me
  lexicon: HALOT
  rationale: The infinitive of כהן denotes priestly service. 'Serve as priests for
    me' is natural modern English while preserving the vocational and cultic force.
    'For me' reflects לִי directly.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: sons of Israel
  alternatives:
  - Israelites
  lexicon: HALOT
  rationale: Rendered literally in keeping with the translation philosophy's gender-accurate
    preference where the source uses a masculine plural with corporate force. A smoother
    collective alternative is preserved in a footnote.
- source_word: בְּנֵי אַהֲרֹן
  chosen: Aaron’s sons
  alternatives:
  - the sons of Aaron
  lexicon: HALOT
  rationale: The construct phrase identifies the named men as Aaron's sons. The possessive
    form is idiomatic English and preserves the genealogical note.
- source_word: וְאַתָּה
  chosen: And you,
  alternatives:
  - Now you,
  - As for you,
  lexicon: HALOT
  rationale: The pronoun is emphatic. 'And you,' preserves the discourse shift and
    emphasis at the start of the instruction.
