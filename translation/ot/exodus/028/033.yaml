id: EXO.28.33
reference: Exodus 28:33
source:
  edition: WLC
  text: וְ/עָשִׂ֣יתָ עַל שׁוּלָ֗י/ו רִמֹּנֵי֙ תְּכֵ֤לֶת וְ/אַרְגָּמָן֙ וְ/תוֹלַ֣עַת
    שָׁנִ֔י עַל שׁוּלָ֖י/ו סָבִ֑יב וּ/פַעֲמֹנֵ֥י זָהָ֛ב בְּ/תוֹכָ֖/ם סָבִֽיב־־׃
translation:
  text: You shall make on its hem pomegranates of blue and purple and scarlet yarn,
    all around its hem, with bells of gold between them all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pomegranate-shaped ornaments.' The Hebrew literally says 'pomegranates.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: You shall make
  alternatives:
  - and you shall make
  - you are to make
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional context functions
    as an imperative/future command. 'You shall make' is natural modern English for
    legal/cultic instructions.
- source_word: שׁוּלָיו
  chosen: its hem
  alternatives:
  - its skirts
  - its edge
  lexicon: HALOT
  rationale: Refers to the lower border/hem of the robe. 'Hem' is the most idiomatic
    English term for a garment edge here.
- source_word: רִמֹּנֵי
  chosen: pomegranates
  alternatives:
  - pomegranate-shaped ornaments
  lexicon: HALOT
  rationale: The noun literally means 'pomegranates.' In this tabernacle-garment context
    it likely denotes decorative pomegranate forms, but the Hebrew itself uses the
    simple lexical item, so the main text preserves that.
- source_word: תְּכֵלֶת
  chosen: blue
  alternatives:
  - blue yarn
  - blue-purple
  lexicon: HALOT
  rationale: Denotes the prestigious blue dyed material used in tabernacle textiles.
    Because the three color/material terms modify the pomegranates, 'blue' is retained
    in the main line, with 'yarn' supplied at the end of the series for readable English.
- source_word: אַרְגָּמָן
  chosen: purple
  alternatives:
  - purple yarn
  lexicon: HALOT
  rationale: Standard textile color term in tabernacle descriptions; rendered straightforwardly
    as 'purple.'
- source_word: תוֹלַעַת שָׁנִי
  chosen: scarlet yarn
  alternatives:
  - crimson
  - scarlet
  lexicon: HALOT
  rationale: This expression refers to scarlet-dyed material/thread. 'Scarlet yarn'
    makes explicit the textile sense in context and matches the series of colored
    materials.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  - round about
  lexicon: HALOT
  rationale: Indicates encircling placement on the hem. 'All around' communicates
    the distributive sense clearly in modern English.
- source_word: וּפַעֲמֹנֵי זָהָב
  chosen: with bells of gold
  alternatives:
  - and golden bells
  - and bells of gold
  lexicon: HALOT
  rationale: The conjunction links an additional decorative element. 'Bells of gold'
    is a close rendering; 'with' smooths the English syntax while preserving the additive
    sense.
- source_word: בְּתוֹכָם
  chosen: between them
  alternatives:
  - in their midst
  - among them
  lexicon: HALOT
  rationale: Refers to the bells being placed in the midst of the pomegranates, i.e.,
    alternating with them around the hem. 'Between them' best captures the spatial
    relationship in idiomatic English.
