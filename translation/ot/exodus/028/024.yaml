id: EXO.28.24
reference: Exodus 28:24
source:
  edition: WLC
  text: וְ/נָתַתָּ֗ה אֶת שְׁתֵּי֙ עֲבֹתֹ֣ת הַ/זָּהָ֔ב עַל שְׁתֵּ֖י הַ/טַּבָּעֹ֑ת אֶל
    קְצ֖וֹת הַ/חֹֽשֶׁן־־־׃
translation:
  text: And you shall put the two braided chains of gold on the two rings, at the
    ends of the breastpiece.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'twisted chains' or the traditional 'wreathen chains.'
    reason: lexical_alternative
  - marker: b
    text: Traditional English versions often read 'breastplate'; Hebrew חֹשֶׁן here
      refers to the priestly breastpiece.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתָּה
  chosen: And you shall put
  alternatives:
  - and you shall place
  - and you shall set
  lexicon: HALOT
  rationale: Qal perfect with vav in instructional sequence functions as an imperative/future
    command. 'Put' is natural modern English for attaching an item in a construction
    procedure.
- source_word: עֲבֹתֹת
  chosen: braided chains
  alternatives:
  - cords
  - wreathen chains
  - twisted chains
  lexicon: HALOT
  rationale: In the tabernacle/vestment context this noun refers to corded or interwoven
    chainwork, especially of gold. 'Braided chains' communicates both the linked/ornamental
    nature and the twisted construction better than archaic 'wreathen chains.'
- source_word: הַזָּהָב
  chosen: of gold
  alternatives:
  - golden
  lexicon: HALOT
  rationale: The construct-like English 'chains of gold' is more natural and slightly
    more formal than 'golden chains,' while preserving the material specification.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - onto
  lexicon: HALOT
  rationale: The preposition here marks placement/attachment upon the rings. 'On'
    is idiomatic in English for fastening chains to rings.
- source_word: הַטַּבָּעֹת
  chosen: the two rings
  lexicon: HALOT
  rationale: Standard rendering for the fastening pieces used throughout the tabernacle
    instructions.
- source_word: אֶל קְצֹוֹת הַחֹשֶׁן
  chosen: at the ends of the breastpiece
  alternatives:
  - toward the ends of the breastpiece
  - on the edges of the breastpiece
  lexicon: HALOT
  rationale: קְצֹוֹת denotes extremities/ends. In context of attaching the rings on
    the breastpiece, 'at the ends' best conveys location in idiomatic English. 'Breastpiece'
    is the established rendering for חֹשֶׁן in this priestly garment context.
- source_word: הַחֹשֶׁן
  chosen: breastpiece
  alternatives:
  - breastplate
  lexicon: HALOT
  rationale: Although traditionally rendered 'breastplate,' the item is a pouch-like
    ornamental piece rather than metal armor. 'Breastpiece' better reflects the source
    referent and avoids translation-tradition inertia.
