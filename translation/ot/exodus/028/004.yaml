theological_decisions:
- issue: Rendering of priestly clothing terminology in a way that preserves cultic
    specificity without importing later ecclesiastical tradition
  chosen_reading: Use ordinary but precise English terms ('breastpiece,' 'robe,' 'tunic,'
    'turban,' 'sash') while retaining the technical term 'ephod' by transliteration.
  alternative_readings:
  - Use more traditional terms such as 'breastplate' and 'girdle'
  - Translate 'ephod' descriptively rather than transliterating
  rationale: The verse catalogs tabernacle-priestly garments. The translation aims
    for source-oriented clarity and modern readability. Technical terms are translated
    where English has a good equivalent; 'ephod' is retained because no single English
    gloss is both precise and natural.
  doctrine_reference: 'Translation philosophy: optimal equivalence; Translate titles;
    transliterate names (applied analogically to technical cultic items where no precise
    English equivalent exists).'
- issue: Gendered priestly succession
  chosen_reading: Render וּלְבָנָיו as 'and for his sons.'
  alternative_readings:
  - and for his children
  - and for his descendants
  rationale: The Hebrew is specifically male and refers to Aaron's sons as priests.
    The translation philosophy requires gender-accurate rendering rather than neutralization.
  doctrine_reference: 'Translation philosophy: Gender-accurate over gender-neutral.'
