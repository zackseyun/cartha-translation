id: EXO.28.4
reference: Exodus 28:4
source:
  edition: WLC
  text: וְ/אֵ֨לֶּה הַ/בְּגָדִ֜ים אֲשֶׁ֣ר יַעֲשׂ֗וּ חֹ֤שֶׁן וְ/אֵפוֹד֙ וּ/מְעִ֔יל וּ/כְתֹ֥נֶת
    תַּשְׁבֵּ֖ץ מִצְנֶ֣פֶת וְ/אַבְנֵ֑ט וְ/עָשׂ֨וּ בִגְדֵי קֹ֜דֶשׁ לְ/אַהֲרֹ֥ן אָחִ֛י/ךָ
    וּ/לְ/בָנָ֖י/ו לְ/כַהֲנ/וֹ לִֽ/י־־׃
translation:
  text: 'And these are the garments that they shall make: a breastpiece, an ephod,
    a robe, a woven tunic, a turban, and a sash. They shall make holy garments for
    Aaron your brother and for his sons, for him to serve as priest to me.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'breastplate.' The Hebrew term refers to the priestly chest-piece; 'breastpiece'
      avoids suggesting armor.
    reason: lexical_alternative
  - marker: b
    text: Hebrew ephod, a distinctive priestly garment with no exact English equivalent.
    reason: cultural_note
  - marker: c
    text: Or 'checkered tunic' or 'tunic of checker work'; the Hebrew likely refers
      to a patterned woven garment.
    reason: lexical_alternative
  - marker: d
    text: Or 'sacred garments.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּגָדִים
  chosen: garments
  alternatives:
  - clothes
  - vestments
  lexicon: HALOT
  rationale: '''Garments'' is the natural formal equivalent for priestly clothing
    in context. ''Vestments'' is possible but more ecclesiastical and less transparent
    for modern readers.'
- source_word: יַעֲשׂוּ
  chosen: they shall make
  alternatives:
  - they are to make
  - they will make
  lexicon: HALOT
  rationale: The imperfect here carries instructional/future force within divine commands.
    'They shall make' preserves the directive tone without sounding overly archaic
    in this context.
- source_word: חֹשֶׁן
  chosen: breastpiece
  alternatives:
  - breastplate
  lexicon: HALOT
  rationale: The item is a priestly chest ornament/pouch rather than armor. 'Breastpiece'
    better reflects cultic attire and avoids misleading martial connotations of 'breastplate.'
- source_word: אֵפוֹד
  chosen: ephod
  alternatives:
  - priestly apron
  lexicon: HALOT
  rationale: This is a technical term for a distinctive priestly garment with no precise
    English equivalent. Transliteration best preserves the referent; a descriptive
    alternative is less exact.
- source_word: מְעִיל
  chosen: robe
  alternatives:
  - mantle
  lexicon: HALOT
  rationale: '''Robe'' is the clearest modern equivalent for the long outer garment
    in priestly dress.'
- source_word: כְתֹנֶת תַּשְׁבֵּץ
  chosen: woven tunic
  alternatives:
  - checkered tunic
  - embroidered coat
  - tunic of checker work
  lexicon: HALOT
  rationale: כְתֹנֶת is a tunic. תַּשְׁבֵּץ refers to patterned or worked weaving.
    'Woven tunic' communicates the crafted textile nature in readable English without
    overcommitting to a debated specific pattern such as 'checkered.'
- source_word: מִצְנֶפֶת
  chosen: turban
  alternatives:
  - headdress
  lexicon: HALOT
  rationale: '''Turban'' is the standard and clearest rendering for the priestly headwrap.'
- source_word: אַבְנֵט
  chosen: sash
  alternatives:
  - belt
  - waistband
  lexicon: HALOT
  rationale: This denotes a wrapped cloth band worn with priestly garments. 'Sash'
    fits the ceremonial setting better than the more generic 'belt.'
- source_word: בִגְדֵי קֹדֶשׁ
  chosen: holy garments
  alternatives:
  - sacred garments
  lexicon: HALOT
  rationale: Both are viable. 'Holy garments' is slightly more literal and preserves
    the holiness language central to the priestly context.
- source_word: לְאַהֲרֹן אָחִיךָ
  chosen: for Aaron your brother
  lexicon: HALOT
  rationale: A direct rendering of the relational phrase addressed to Moses; it preserves
    the familial identification present in the Hebrew.
- source_word: וּלְבָנָיו
  chosen: and for his sons
  alternatives:
  - and for his children
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'his sons,' referring to the male priestly
    descendants. Gender-accurate rendering is required by the translation philosophy.
- source_word: לְכַהֲנוֹ
  chosen: for him to serve as priest
  alternatives:
  - to minister as priest
  - to be priest
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'Serve as priest' is clear modern English
    and preserves the verbal idea of priestly service better than the more static
    'to be priest.'
- source_word: לִי
  chosen: to me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The dative marks the LORD as the one to whom the priestly service is
    rendered. 'To me' is a transparent literal rendering, though in English it functions
    idiomatically as service rendered for God.
