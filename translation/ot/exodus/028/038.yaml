theological_decisions:
- issue: Meaning of Aaron bearing 'the iniquity of the holy things'
  chosen_reading: Aaron bears the liability/guilt associated with defects or impurity connected to the holy offerings, functioning in his priestly representative role.
  alternative_readings:
  - Aaron removes the sin of the holy things directly
  - Aaron merely carries the memory of Israel's sins symbolically
  rationale: The idiom נָשָׂא עָוֺן in priestly texts often conveys bearing guilt/liability. The translation preserves that tension without importing a full theory of atonement beyond the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Referent of 'for acceptance for them'
  chosen_reading: The phrase refers to acceptance of the people in connection with their consecrated gifts before the LORD.
  alternative_readings:
  - It refers narrowly to acceptance of the gifts alone
  rationale: The pronoun 'for them' most naturally points to the worshipers, though in context their offerings are also implicated. The English keeps the broader wording rather than narrowing the referent.
  doctrine_reference: Preserve theological tension rather than resolve it
