id: EXO.28.38
reference: Exodus 28:38
source:
  edition: WLC
  text: וְ/הָיָה֮ עַל מֵ֣צַח אַהֲרֹן֒ וְ/נָשָׂ֨א אַהֲרֹ֜ן אֶת עֲוֺ֣ן הַ/קֳּדָשִׁ֗ים אֲשֶׁ֤ר יַקְדִּ֨ישׁוּ֙ בְּנֵ֣י יִשְׂרָאֵ֔ל לְ/כָֽל מַתְּנֹ֖ת קָדְשֵׁי/הֶ֑ם וְ/הָיָ֤ה עַל מִצְח/וֹ֙ תָּמִ֔יד לְ/רָצ֥וֹן לָ/הֶ֖ם לִ/פְנֵ֥י יְהוָֽה־־־־׃
translation:
  text: It shall be on Aaron’s forehead, and Aaron shall bear the iniquity of the holy things that the sons of Israel consecrate, for all the gifts of their holy things. It shall always be on his forehead, for acceptance for them before Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'carry the guilt.' The Hebrew idiom 'bear the iniquity' can denote bearing liability for guilt associated with the holy offerings.
    reason: lexical_alternative
  - marker: b
    text: Or 'for favor for them' or 'so that they may be accepted before the LORD.'
    reason: alternative_reading
  - marker: c
    text: Hebrew 'the sons of Israel,' a standard covenantal designation for the people of Israel.
    reason: cultural_note
lexical_decisions:
- source_word: מֵצַח / מִצְחוֹ
  chosen: forehead
  alternatives:
  - frontlet
  - brow
  lexicon: HALOT
  rationale: The noun denotes the forehead/front of the head. 'Forehead' is the clearest modern English equivalent and fits the repeated placement language in the verse.
- source_word: נָשָׂא ... עֲוֺן
  chosen: bear the iniquity
  alternatives:
  - carry the guilt
  - bear the guilt
  lexicon: HALOT
  rationale: This priestly idiom commonly means to bear liability or guilt associated with something. 'Bear the iniquity' preserves the formal sacrificial/legal sense without over-interpreting it as removal or forgiveness.
- source_word: הַקֳּדָשִׁים
  chosen: the holy things
  alternatives:
  - the sacred things
  - the consecrated things
  lexicon: HALOT
  rationale: In this cultic context the plural refers to holy offerings/items. 'Holy things' is a standard and sufficiently transparent rendering that preserves the cultic category.
- source_word: יַקְדִּישׁוּ
  chosen: consecrate
  alternatives:
  - set apart as holy
  - sanctify
  lexicon: HALOT
  rationale: '''Consecrate'' best captures the act of dedicating offerings to God in worship. ''Sanctify'' is possible but less natural in modern English here.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, the formally masculine expression is retained. It refers corporately to Israel, but the source wording is literally 'sons of Israel.'
- source_word: לְכָל מַתְּנֹת קָדְשֵׁיהֶם
  chosen: for all the gifts of their holy things
  alternatives:
  - in all the gifts of their holy things
  - with respect to all their holy gifts
  - for all their sacred gifts
  lexicon: HALOT
  rationale: The phrase is syntactically difficult. The chosen rendering stays close to the Hebrew sequence and preserves the relation between 'gifts' and 'their holy things' without collapsing the expression into a smoother but more interpretive paraphrase.
- source_word: תָּמִיד
  chosen: always
  alternatives:
  - continually
  - regularly
  lexicon: HALOT
  rationale: The sense is ongoing/continual presence. 'Always' is natural modern English and adequately conveys the requirement.
- source_word: לְרָצוֹן לָהֶם
  chosen: for acceptance for them
  alternatives:
  - for favor for them
  - so that they may be accepted
  - to secure acceptance for them
  lexicon: HALOT
  rationale: The phrase expresses the result or purpose that Israel/their offerings be accepted before God. 'For acceptance for them' remains close to the Hebrew while readable. More idiomatic expansions would add interpretive material.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
