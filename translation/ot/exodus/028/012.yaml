id: EXO.28.12
reference: Exodus 28:12
source:
  edition: WLC
  text: וְ/שַׂמְתָּ֞ אֶת שְׁתֵּ֣י הָ/אֲבָנִ֗ים עַ֚ל כִּתְפֹ֣ת הָֽ/אֵפֹ֔ד אַבְנֵ֥י
    זִכָּרֹ֖ן לִ/בְנֵ֣י יִשְׂרָאֵ֑ל וְ/נָשָׂא֩ אַהֲרֹ֨ן אֶת שְׁמוֹתָ֜/ם לִ/פְנֵ֧י
    יְהוָ֛ה עַל שְׁתֵּ֥י כְתֵפָ֖י/ו לְ/זִכָּרֹֽן־־־׃ס
translation:
  text: And you shall set the two stones on the shoulder pieces of the ephod as memorial
    stones for the sons of Israel, and Aaron shall bear their names before the LORD
    on his two shoulders for remembrance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stones of remembrance.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of Israel,' a familial covenant expression often referring
      to the people of Israel as a whole.
    reason: cultural_note
lexical_decisions:
- source_word: וְשַׂמְתָּ
  chosen: And you shall set
  alternatives:
  - And you shall place
  - And you shall put
  lexicon: HALOT
  rationale: The verb שׂים commonly means 'put/place/set.' 'Set' fits the crafted
    placement of stones on priestly garments and reads naturally in English while
    preserving the imperative force of the Hebrew second masculine singular.
- source_word: שְׁתֵּי הָאֲבָנִים
  chosen: the two stones
  lexicon: HALOT
  rationale: A straightforward rendering of the numeral plus definite noun. No need
    to specify 'onyx' here because the verse itself says only 'the two stones'; the
    specific identity was given in the surrounding context, not in this clause.
- source_word: כִּתְפֹת הָאֵפֹד
  chosen: the shoulder pieces of the ephod
  alternatives:
  - the shoulders of the ephod
  lexicon: HALOT
  rationale: כָּתֵף means 'shoulder,' but in garment context the construct refers
    to the ephod's shoulder attachments/pieces rather than literal human shoulders.
    'Shoulder pieces' is more precise in English for the vestment.
- source_word: אַבְנֵי זִכָּרֹן
  chosen: memorial stones
  alternatives:
  - stones of remembrance
  - remembrance stones
  lexicon: HALOT
  rationale: The construct phrase literally means 'stones of remembrance/memorial.'
    'Memorial stones' is idiomatic modern English and preserves the commemorative
    function without unnecessary stiffness.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: for the sons of Israel
  alternatives:
  - for the people of Israel
  - for the Israelites
  lexicon: HALOT
  rationale: Following the project's gender-accurate principle, בְּנֵי is rendered
    'sons' rather than neutralized. Here it denotes the covenant tribes descended
    from Israel; the representative sense is retained without flattening the familial
    language.
- source_word: וְנָשָׂא ... אֶת שְׁמוֹתָם
  chosen: and Aaron shall bear their names
  alternatives:
  - and Aaron shall carry their names
  lexicon: HALOT
  rationale: נשא often means 'bear/carry.' 'Bear' is the more established and theologically
    resonant choice in priestly contexts, conveying representative carrying before
    God.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: The phrase means 'before/in the presence of YHWH.' Per doctrine, יְהוָה
    is rendered 'the LORD.' 'Before the LORD' is concise and standard.
- source_word: עַל שְׁתֵּי כְתֵפָיו
  chosen: on his two shoulders
  alternatives:
  - upon both his shoulders
  lexicon: HALOT
  rationale: This refers now to Aaron's own shoulders, in distinction from the ephod's
    shoulder pieces earlier in the verse. 'On his two shoulders' preserves the concrete
    imagery and the Hebrew repetition.
- source_word: לְזִכָּרֹן
  chosen: for remembrance
  alternatives:
  - as a memorial
  - for a memorial
  lexicon: HALOT
  rationale: The prepositional phrase expresses purpose/result. 'For remembrance'
    preserves the lexical link with the earlier זִכָּרֹן while avoiding over-interpretation
    of whose remembrance is in view.
