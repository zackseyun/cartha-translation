theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD,' following Jewish reverence tradition and the Septuagintal pattern.
    This is applied here without footnoting because it is the project's standard,
    not a verse-specific textual ambiguity.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered expression בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - people of Israel
  - Israelites
  rationale: The translation follows the project's gender-accurate principle. Because
    the Hebrew explicitly uses 'sons,' the main text preserves that familial wording
    rather than replacing it with a neutral collective. The phrase is covenantal and
    representative, not restricted to males only.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
