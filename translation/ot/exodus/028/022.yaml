id: EXO.28.22
reference: Exodus 28:22
source:
  edition: WLC
  text: וְ/עָשִׂ֧יתָ עַל הַ/חֹ֛שֶׁן שַֽׁרְשֹׁ֥ת גַּבְלֻ֖ת מַעֲשֵׂ֣ה עֲבֹ֑ת זָהָ֖ב
    טָהֽוֹר־׃
translation:
  text: And you shall make on the breastpiece chains of pure gold, braided work like
    cords.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'twisted chains' or 'corded chains'; the Hebrew describes chains made
      in a braided or rope-like pattern.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: And you shall make
  alternatives:
  - And make
  - You are to make
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional sequence functions
    as an imperative/future command. 'You shall make' preserves the prescriptive force
    in English.
- source_word: עַל הַחֹשֶׁן
  chosen: on the breastpiece
  alternatives:
  - for the breastpiece
  - upon the breastpiece
  lexicon: HALOT
  rationale: עַל commonly means 'on/upon,' but in craft instructions can indicate
    attachment or placement. 'On the breastpiece' is natural English and fits the
    following description of attached chains.
- source_word: שַׁרְשֹׁת
  chosen: chains
  alternatives:
  - chainlets
  - chains of links
  lexicon: HALOT
  rationale: The plural noun denotes chains or linked chains. 'Chains' is the standard
    clear rendering in this tabernacle/jewelry context.
- source_word: גַּבְלֻת
  chosen: braided
  alternatives:
  - twisted
  - corded
  - interwoven
  lexicon: HALOT
  rationale: This adjective/noun describes the chains as worked in a bound, twisted,
    or braided manner. 'Braided' communicates the crafted linked form in idiomatic
    modern English.
- source_word: מַעֲשֵׂה עֲבֹת
  chosen: work like cords
  alternatives:
  - cordwork
  - ropework
  - twisted work
  lexicon: HALOT
  rationale: The construct phrase literally indicates 'work of cord/rope-like twisting.'
    Rendering it as 'work like cords' preserves the imagery without becoming overly
    technical. It explains the manner of manufacture rather than introducing a specialized
    English term.
- source_word: זָהָב טָהוֹר
  chosen: pure gold
  alternatives:
  - refined gold
  - clean gold
  lexicon: HALOT
  rationale: Standard material description in tabernacle instructions. 'Pure gold'
    is both literal and idiomatic.
