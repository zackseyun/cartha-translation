theological_decisions:
- issue: Rendering the priestly installation idiom מִלֵּא אֶת־יָד
  chosen_reading: Translate idiomatically as 'ordain them' in the main text
  alternative_readings:
  - fill their hands
  - install them
  rationale: The Hebrew idiom refers to formal installation into priestly office,
    not a literal filling of hands. An idiomatic rendering communicates the ritual
    function clearly without importing later denominational ordination concepts beyond
    the text. A literal alternative is preserved in a footnote to maintain transparency.
  doctrine_reference: Translation philosophy §1, §3, §6
