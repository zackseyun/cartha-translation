id: EXO.28.41
reference: Exodus 28:41
source:
  edition: WLC
  text: וְ/הִלְבַּשְׁתָּ֤ אֹתָ/ם֙ אֶת אַהֲרֹ֣ן אָחִ֔י/ךָ וְ/אֶת בָּנָ֖י/ו אִתּ֑/וֹ
    וּ/מָשַׁחְתָּ֨ אֹתָ֜/ם וּ/מִלֵּאתָ֧ אֶת יָדָ֛/ם וְ/קִדַּשְׁתָּ֥ אֹתָ֖/ם וְ/כִהֲנ֥וּ
    לִֽ/י־־־׃
translation:
  text: You shall clothe them—Aaron your brother and his sons with him—and you shall
    anoint them and ordain them and consecrate them, and they shall serve as priests
    to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'fill their hands,' a Hebrew idiom for installing or ordaining
      someone into priestly service.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִלְבַּשְׁתָּ
  chosen: you shall clothe
  alternatives:
  - you shall put garments on
  - you shall dress
  lexicon: HALOT
  rationale: Hiphil of לבשׁ with object pronoun indicates causing them to be clothed,
    specifically with the priestly garments described in context. 'Clothe' is concise
    and natural while preserving the causative sense.
- source_word: אֹתָם ... אֶת אַהֲרֹן אָחִיךָ וְאֶת בָּנָיו אִתּוֹ
  chosen: them—Aaron your brother and his sons with him—
  alternatives:
  - them, Aaron your brother and his sons with him
  - Aaron your brother and his sons with him
  lexicon: HALOT
  rationale: The pronoun is resumptive/cataphoric, then specified by the accusative
    phrase. The appositional dash structure preserves the Hebrew emphasis and clarifies
    the referent in readable English.
- source_word: וּמָשַׁחְתָּ אֹתָם
  chosen: and you shall anoint them
  alternatives:
  - and you shall smear them with oil
  lexicon: HALOT
  rationale: משׁח in priestly consecration contexts is the technical term 'anoint.'
    This preserves the ritual and theological significance without overexplaining.
- source_word: וּמִלֵּאתָ אֶת יָדָם
  chosen: and ordain them
  alternatives:
  - and fill their hands
  - and install them
  lexicon: HALOT
  rationale: Literally 'fill their hand(s),' an idiom for installation into priestly
    office. Because the idiom would be opaque in English, 'ordain them' best conveys
    the function in context. The more literal alternative is preserved in a footnote
    for auditability.
- source_word: וְקִדַּשְׁתָּ אֹתָם
  chosen: and consecrate them
  alternatives:
  - and sanctify them
  - and make them holy
  lexicon: HALOT
  rationale: קדשׁ in priestly contexts denotes setting apart as holy for sacred service.
    'Consecrate' is the most idiomatic formal equivalent in English.
- source_word: וְכִהֲנוּ לִי
  chosen: and they shall serve as priests to me
  alternatives:
  - and they shall minister as priests to me
  - and they shall be priests for me
  lexicon: HALOT
  rationale: Piel of כהן means to function/serve as a priest. 'Serve as priests to
    me' preserves both the vocational sense and the dative לִי, indicating service
    rendered to God.
- source_word: לִי
  chosen: to me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The preposition marks relation to Yahweh as the one served. 'To me' is
    slightly more direct and personal in English, while remaining faithful to the
    Hebrew.
