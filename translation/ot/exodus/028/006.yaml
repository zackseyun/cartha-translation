id: EXO.28.6
reference: Exodus 28:6
source:
  edition: WLC
  text: וְ/עָשׂ֖וּ אֶת הָ/אֵפֹ֑ד זָ֠הָב תְּכֵ֨לֶת וְ/אַרְגָּמָ֜ן תּוֹלַ֧עַת שָׁנִ֛י
    וְ/שֵׁ֥שׁ מָשְׁזָ֖ר מַעֲשֵׂ֥ה חֹשֵֽׁב־׃
translation:
  text: And they shall make the ephod of gold, blue, and purple, of scarlet yarn,
    and of fine twisted linen, the work of a skillful designer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gold thread'; the Hebrew text says simply 'gold,' though in this manufacturing
      context it may refer to gold worked into the fabric.
    reason: lexical_alternative
  - marker: b
    text: Or 'the work of a designer' or 'skillful craftsman'; the Hebrew expression
      refers to artistic, patterned workmanship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשׂוּ
  chosen: And they shall make
  alternatives:
  - And they are to make
  - And they must make
  lexicon: HALOT
  rationale: 'Qal perfect with prefixed conjunction in instructional sequence functions
    as an injunctive/future: a directive for what the craftsmen are to make. ''Shall
    make'' preserves the formal legislative tone.'
- source_word: הָאֵפֹד
  chosen: the ephod
  alternatives:
  - the priestly vest
  - the ephod garment
  lexicon: HALOT
  rationale: '''Ephod'' is a technical cultic garment term with no precise English
    equivalent. Transliteration best preserves the referent without over-interpreting
    its exact form.'
- source_word: זָהָב
  chosen: gold
  alternatives:
  - gold thread
  lexicon: HALOT
  rationale: The Hebrew simply says 'gold.' In context of textile manufacture this
    likely refers to gold worked into the fabric, but 'thread' is not explicit here,
    so the main text keeps the broader term.
- source_word: תְּכֵלֶת
  chosen: blue
  alternatives:
  - blue yarn
  - blue-purple
  lexicon: HALOT
  rationale: Traditional tabernacle color term, commonly rendered 'blue.' Because
    the noun stands in a materials list, English may supply the material sense implicitly;
    'blue' is concise and natural.
- source_word: וְאַרְגָּמָן
  chosen: and purple
  alternatives:
  - and purple yarn
  - and reddish-purple
  lexicon: HALOT
  rationale: Standard rendering for the dye/color term in tabernacle contexts. As
    with 'blue,' the material component is understood from context.
- source_word: תּוֹלַעַת שָׁנִי
  chosen: scarlet yarn
  alternatives:
  - scarlet
  - crimson yarn
  - scarlet stuff
  lexicon: HALOT
  rationale: This expression denotes scarlet material/dyed yarn, literally involving
    the crimson source. 'Scarlet yarn' communicates the textile sense more clearly
    in English than bare 'scarlet'.
- source_word: שֵׁשׁ מָשְׁזָר
  chosen: fine twisted linen
  alternatives:
  - finely twisted linen
  - fine linen, twisted
  lexicon: HALOT
  rationale: שֵׁשׁ refers to fine linen; מָשְׁזָר indicates twisted/spun quality.
    The combined phrase is idiomatically rendered 'fine twisted linen.'
- source_word: מַעֲשֵׂה חֹשֵׁב
  chosen: the work of a skillful designer
  alternatives:
  - the work of a designer
  - the work of a skillful craftsman
  - embroidered work
  lexicon: HALOT
  rationale: The phrase denotes skilled artistic workmanship involving design/planning,
    not merely generic labor. 'Skillful designer' captures the intentional artistry
    without narrowing too specifically to embroidery, which may overstate the term
    here.
