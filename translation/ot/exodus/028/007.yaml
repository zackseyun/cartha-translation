id: EXO.28.7
reference: Exodus 28:7
source:
  edition: WLC
  text: שְׁתֵּ֧י כְתֵפֹ֣ת חֹֽבְרֹ֗ת יִֽהְיֶה לּ֛/וֹ אֶל שְׁנֵ֥י קְצוֹתָ֖י/ו וְ/חֻבָּֽר־־׃
translation:
  text: It shall have two shoulder pieces attached to its two ends, so that it may
    be joined together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'two shoulder straps.' The Hebrew term can denote shoulder-related parts
      of the garment rather than literal shoulders.
    reason: lexical_alternative
  - marker: b
    text: Or 'and it shall be joined.' The final clause may be rendered more formally,
      but the sense is that the garment is fastened together by these shoulder pieces.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁתֵּי
  chosen: two
  lexicon: HALOT
  rationale: Cardinal feminine construct modifying 'shoulder pieces'; straightforwardly
    rendered 'two'.
- source_word: כְתֵפֹת
  chosen: shoulder pieces
  alternatives:
  - shoulders
  - shoulder straps
  lexicon: HALOT
  rationale: In the tabernacle-garment context, the plural of כָּתֵף refers not to
    literal anatomical shoulders but to parts of the ephod that go over the shoulders.
    'Shoulder pieces' is clear modern English and fits the garment description better
    than the bare 'shoulders'.
- source_word: חֹבְרֹת
  chosen: attached
  alternatives:
  - joined
  - coupled
  lexicon: HALOT
  rationale: Participle from חבר describing the shoulder pieces as connected/connecting.
    'Attached' reads naturally with garment construction and anticipates the later
    passive 'be joined together' without awkward repetition.
- source_word: יִהְיֶה לּוֹ
  chosen: it shall have
  alternatives:
  - there shall be for it
  - it shall be with it
  lexicon: HALOT
  rationale: Hebrew existential construction with ל plus pronominal suffix idiomatically
    indicates possession. Since the referent is the ephod from the immediate context,
    English possession is the most natural rendering.
- source_word: אֶל
  chosen: to
  alternatives:
  - at
  - toward
  lexicon: HALOT
  rationale: Marks relation of the shoulder pieces to the two ends of the garment;
    'to' is the most idiomatic English preposition here.
- source_word: שְׁנֵי קְצוֹתָיו
  chosen: its two ends
  alternatives:
  - its two edges
  - both its ends
  lexicon: HALOT
  rationale: קָצֶה denotes an extremity/end. In garment construction, 'ends' is the
    clearest general rendering; 'edges' is possible but less precise for opposite
    extremities.
- source_word: וְחֻבָּר
  chosen: so that it may be joined together
  alternatives:
  - and it shall be joined
  - and it shall be fastened together
  lexicon: HALOT
  rationale: 'Passive of חבר. The prefixed conjunction here is best taken as expressing
    result/purpose in English style: the shoulder pieces are attached at the two ends
    with the result that the ephod is joined together. ''Joined together'' preserves
    the passive sense and the garment-making context.'
