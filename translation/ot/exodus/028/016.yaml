id: EXO.28.16
reference: Exodus 28:16
source:
  edition: WLC
  text: רָב֥וּעַ יִֽהְיֶ֖ה כָּפ֑וּל זֶ֥רֶת אָרְכּ֖/וֹ וְ/זֶ֥רֶת רָחְבּֽ/וֹ׃
translation:
  text: It shall be square and doubled, a span its length and a span its width.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'folded double.' The Hebrew describes the breastpiece as made in a doubled
      form, likely by folding it over.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָבוּעַ
  chosen: square
  alternatives:
  - quadrangular
  lexicon: HALOT
  rationale: The adjective denotes a four-sided square shape. 'Square' is clear modern
    English and fits the object description better than the more technical 'quadrangular'.
- source_word: יִהְיֶה
  chosen: shall be
  alternatives:
  - is to be
  - must be
  lexicon: HALOT
  rationale: The imperfect here gives the specification for how the breastpiece is
    to be made. 'Shall be' preserves the prescriptive/descriptive force in natural
    English.
- source_word: כָּפוּל
  chosen: doubled
  alternatives:
  - folded double
  - double
  lexicon: HALOT
  rationale: The passive participle indicates that the item is made in a doubled or
    folded-over form. 'Doubled' is concise and accurate; 'folded double' is a plausible
    expansion but slightly more interpretive.
- source_word: זֶרֶת
  chosen: span
  alternatives:
  - handbreadth
  lexicon: HALOT
  rationale: This is a linear measure commonly rendered 'span,' the distance across
    an outstretched hand. 'Handbreadth' is a different biblical measure and would
    be inaccurate here.
- source_word: אָרְכּוֹ
  chosen: its length
  alternatives:
  - its long side
  lexicon: HALOT
  rationale: The noun means 'length' with a 3ms suffix referring to the breastpiece.
    'Its length' is the standard and most natural rendering in measurement formulas.
- source_word: וְזֶרֶת
  chosen: and a span
  alternatives:
  - and one span
  lexicon: HALOT
  rationale: The conjunction simply links the second measurement. English idiom in
    measurement statements naturally repeats the unit as 'and a span.'
- source_word: רָחְבּוֹ
  chosen: its width
  alternatives:
  - its breadth
  lexicon: HALOT
  rationale: The noun means 'width/breadth.' 'Width' is more natural in contemporary
    English while preserving the dimensional contrast with 'length'.
