id: EXO.28.19
reference: Exodus 28:19
source:
  edition: WLC
  text: וְ/הַ/טּ֖וּר הַ/שְּׁלִישִׁ֑י לֶ֥שֶׁם שְׁב֖וֹ וְ/אַחְלָֽמָה׃
translation:
  text: 'and the third row: jacinth, agate, and amethyst.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The precise identification of the stones named here is uncertain; 'jacinth'
      translates לֶשֶׁם, traditionally rendered 'ligure.'
    reason: lexical_alternative
  - marker: b
    text: Or possibly 'onyx' for שְׁבוֹ; ancient gemstone terms do not always map
      precisely onto modern mineral names.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַטּוּר
  chosen: and the ... row
  alternatives:
  - and the setting
  - and the band
  lexicon: HALOT
  rationale: טּוּר in this breastpiece-gem context refers to a row or tier of stones.
    The prefixed conjunction וְ is carried over as 'and,' continuing the list from
    the previous verse.
- source_word: הַשְּׁלִישִׁי
  chosen: third
  lexicon: HALOT
  rationale: Ordinal adjective straightforwardly identifies the third row in the sequence.
- source_word: לֶשֶׁם
  chosen: jacinth
  alternatives:
  - ligure
  - amber
  lexicon: HALOT
  rationale: The exact identification of several breastpiece stones is uncertain.
    'Jacinth' is a common modern-English approximation for לֶשֶׁם and is more transparent
    to contemporary readers than the traditional but obscure 'ligure.' Because the
    identification is uncertain, an alternative is preserved in a footnote.
- source_word: שְׁבוֹ
  chosen: agate
  alternatives:
  - onyx
  - banded agate
  lexicon: HALOT
  rationale: שְׁבוֹ is traditionally rendered 'agate,' which remains a plausible and
    recognizable English gemstone term. Exact mineral identification is uncertain,
    so alternatives are noted.
- source_word: וְאַחְלָמָה
  chosen: and amethyst
  lexicon: HALOT
  rationale: אַחְלָמָה is commonly identified as amethyst; this rendering is standard,
    clear, and likely reflects the intended precious stone.
