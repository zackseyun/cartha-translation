theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of יְהוָה
    as 'the LORD.' This preserves covenantal reference while following the project's
    stated policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering the inscription קֹדֶשׁ לַיהוָה
  chosen_reading: Holy to the LORD
  alternative_readings:
  - Holiness to the LORD
  rationale: The Hebrew inscription is compact and can be rendered either as an adjectival
    dedication ('Holy to...') or an abstract noun ('Holiness to...'). The chosen reading
    preserves the inscriptional terseness and dedicatory sense without adding theological
    interpretation. The traditional alternative is preserved in a footnote because
    it remains a viable lexical option.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve theological
    tension where ambiguity is genuine
