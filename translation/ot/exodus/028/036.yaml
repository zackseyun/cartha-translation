theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering the inscription קֹדֶשׁ לַיהוָה
  chosen_reading: Holy to Yahweh
  alternative_readings:
  - Holiness to the LORD
  rationale: The Hebrew inscription is compact and can be rendered either as an adjectival dedication ('Holy to...') or an abstract noun ('Holiness to...'). The chosen reading preserves the inscriptional terseness and dedicatory sense without adding theological interpretation. The traditional alternative is preserved in a footnote because it remains a viable lexical option.
