id: EXO.28.36
reference: Exodus 28:36
source:
  edition: WLC
  text: וְ/עָשִׂ֥יתָ צִּ֖יץ זָהָ֣ב טָה֑וֹר וּ/פִתַּחְתָּ֤ עָלָי/ו֙ פִּתּוּחֵ֣י חֹתָ֔ם
    קֹ֖דֶשׁ לַֽ/יהוָֽה׃
translation:
  text: 'And you shall make a plate of pure gold, and engrave on it, like the engraving
    of a seal: ‘Holy to the LORD.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Holiness to the LORD.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: And you shall make
  alternatives:
  - And you must make
  - Then you shall make
  lexicon: HALOT
  rationale: Qal verb of עשׂה with prefixed conjunction, here giving an instruction
    in the sequence of priestly vestment construction. 'Shall make' preserves the
    directive force in natural English.
- source_word: צִּיץ
  chosen: plate
  alternatives:
  - rosette
  - blossom
  - frontlet
  lexicon: HALOT
  rationale: Though the noun can denote a blossom/flower in other contexts, here it
    refers to the gold ornament worn on the high priest's turban. 'Plate' best fits
    the material object in context and is clearer than the traditional but less transparent
    'plate of gold' or interpretive 'frontlet.'
- source_word: זָהָב טָהוֹר
  chosen: of pure gold
  alternatives:
  - pure gold
  - clean gold
  lexicon: HALOT
  rationale: Construct-like apposition describing the material and quality of the
    object. 'Of pure gold' is idiomatic English and preserves the emphasis on purity.
- source_word: וּפִתַּחְתָּ עָלָיו
  chosen: and engrave on it
  alternatives:
  - and inscribe on it
  - and carve on it
  lexicon: HALOT
  rationale: The verb פתח in this stem/context refers to engraving or carving an inscription
    onto a crafted object. 'Engrave' best matches metalwork and the following reference
    to seal engraving.
- source_word: פִּתּוּחֵי חֹתָם
  chosen: like the engraving of a seal
  alternatives:
  - with seal engravings
  - as a signet engraving
  - with the work of a seal engraver
  lexicon: HALOT
  rationale: This phrase specifies the manner/style of inscription. 'Like the engraving
    of a seal' communicates that the inscription is to be cut in the style of a signet
    or seal engraving, preserving the comparative sense without overexpanding.
- source_word: קֹדֶשׁ לַיהוָה
  chosen: Holy to the LORD
  alternatives:
  - Holiness to the LORD
  - Holy for the LORD
  lexicon: HALOT
  rationale: The inscription is terse and formal. 'Holy to the LORD' is the most direct
    rendering of the Hebrew phrase and sounds like an inscription. 'Holiness to the
    LORD' is traditional and possible, but the adjective/noun force of קֹדֶשׁ here
    is well represented by the concise dedicatory formula 'Holy to the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name is rendered 'the LORD' rather
    than transliterated, following the stated default and longstanding reverential
    convention.
