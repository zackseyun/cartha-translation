id: EXO.28.17
reference: Exodus 28:17
source:
  edition: WLC
  text: וּ/מִלֵּאתָ֥ ב/וֹ֙ מִלֻּ֣אַת אֶ֔בֶן אַרְבָּעָ֖ה טוּרִ֣ים אָ֑בֶן ט֗וּר אֹ֤דֶם
    פִּטְדָה֙ וּ/בָרֶ֔קֶת הַ/טּ֖וּר הָ/אֶחָֽד׃
translation:
  text: 'And you shall set in it settings of stones, four rows of stones: the first
    row shall be a ruby, a topaz, and an emerald.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The precise identification of these gemstones is uncertain. 'Ruby' may also
      be 'carnelian'; 'topaz' may also be 'chrysolite' or 'peridot'; 'emerald' may
      also be 'beryl.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִלֵּאתָ
  chosen: And you shall set
  alternatives:
  - and you shall fill
  lexicon: HALOT
  rationale: The verb מלא literally means 'fill,' but in the context of mounting gems
    in the breastpiece, idiomatic English requires 'set' to express filling the piece
    with inset stones rather than merely filling space.
- source_word: בּוֹ
  chosen: in it
  alternatives:
  - on it
  lexicon: HALOT
  rationale: The preposition ב with the pronominal suffix most naturally means 'in
    it,' fitting the idea of stones being mounted into the breastpiece.
- source_word: מִלֻּאַת אֶבֶן
  chosen: settings of stones
  alternatives:
  - a setting of stone
  - mountings of stones
  - full settings of stones
  lexicon: HALOT
  rationale: The construct phrase denotes mounted settings involving stones. 'Settings
    of stones' is natural English and reflects the technical artisan context better
    than a wooden 'fillings of stone.'
- source_word: אַרְבָּעָה טוּרִים
  chosen: four rows
  alternatives:
  - four courses
  lexicon: HALOT
  rationale: טוּר here refers to an arranged row of gemstones. 'Rows' is the clearest
    modern English equivalent.
- source_word: אֶבֶן
  chosen: of stones
  alternatives:
  - of stone
  lexicon: HALOT
  rationale: Though singular in form, אבן functions collectively here in context with
    the rows of gems; English plural best conveys the sense.
- source_word: טוּר ... הָאֶחָד
  chosen: the first row
  alternatives:
  - one row
  - row one
  lexicon: HALOT
  rationale: The phrase identifies the first in sequence among the four rows; 'the
    first row' is idiomatic and precise.
- source_word: אֹדֶם
  chosen: ruby
  alternatives:
  - carnelian
  - red stone
  lexicon: HALOT
  rationale: The exact identification is uncertain, but 'ruby' is a traditional and
    recognizable rendering for this red gemstone term. Because the mineral identification
    is debated, an alternative is preserved in a footnote.
- source_word: פִּטְדָה
  chosen: topaz
  alternatives:
  - chrysolite
  - peridot
  lexicon: HALOT
  rationale: The precise gemstone is uncertain. 'Topaz' follows longstanding translation
    tradition and remains understandable in English, while alternatives are preserved
    in a footnote.
- source_word: וּבָרֶקֶת
  chosen: and an emerald
  alternatives:
  - and a beryl
  - and a flashing stone
  lexicon: HALOT
  rationale: The term is related to the idea of flashing or gleaming. 'Emerald' is
    the conventional rendering, though the exact mineral is uncertain; alternatives
    are footnoted.
