id: EXO.28.42
reference: Exodus 28:42
source:
  edition: WLC
  text: וַ/עֲשֵׂ֤ה לָ/הֶם֙ מִכְנְסֵי בָ֔ד לְ/כַסּ֖וֹת בְּשַׂ֣ר עֶרְוָ֑ה מִ/מָּתְנַ֥יִם
    וְ/עַד יְרֵכַ֖יִם יִהְיֽוּ־־׃
translation:
  text: And make for them linen undergarments to cover their naked flesh; they shall
    extend from the hips to the thighs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'linen breeches' or 'linen shorts.' The Hebrew refers to a lower-body
      garment worn beneath the priestly vestments.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from the loins to the thighs.' 'Hips' is used here as a natural
      modern-English rendering of the garment's upper starting point.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲשֵׂה
  chosen: And make
  alternatives:
  - And you shall make
  - Make
  lexicon: HALOT
  rationale: Qal imperative/command form in instructional context. 'And make' preserves
    the sequential force of the waw and the directive tone.
- source_word: לָהֶם
  chosen: for them
  alternatives:
  - for them
  lexicon: HALOT
  rationale: Dative pronoun referring to the priests previously described; straightforward
    benefactive sense.
- source_word: מִכְנְסֵי בָד
  chosen: linen undergarments
  alternatives:
  - linen breeches
  - linen shorts
  - linen trousers
  lexicon: HALOT
  rationale: מִכְנָסַיִם denotes a lower-body garment worn under other vestments;
    'undergarments' communicates function in clear modern English better than archaic
    'breeches.' בָד is 'linen,' the priestly fabric.
- source_word: לְכַסּוֹת
  chosen: to cover
  alternatives:
  - for covering
  lexicon: HALOT
  rationale: Infinitive of purpose; 'to cover' is the natural English rendering.
- source_word: בְּשַׂר עֶרְוָה
  chosen: their naked flesh
  alternatives:
  - the flesh of nakedness
  - their bare flesh
  - their private parts
  lexicon: HALOT
  rationale: Literally 'flesh of nakedness.' The phrase refers to bodily nakedness
    requiring covering in priestly service. 'Their naked flesh' preserves the concrete
    wording without becoming either wooden or overly euphemistic. The possessive 'their'
    is implied by context in English.
- source_word: מִמָּתְנַיִם
  chosen: from the hips
  alternatives:
  - from the loins
  - from the waist
  lexicon: HALOT
  rationale: מָתְנַיִם can denote loins/waist/hips. 'Hips' fits the garment-description
    context and avoids archaic 'loins,' while still indicating the lower torso.
- source_word: וְעַד יְרֵכַיִם
  chosen: to the thighs
  alternatives:
  - to the upper legs
  - to the thighs
  lexicon: HALOT
  rationale: יָרֵךְ commonly means thigh. This gives the lower extent of the garment.
- source_word: יִהְיוּ
  chosen: they shall extend
  alternatives:
  - they shall be
  - they shall reach
  lexicon: HALOT
  rationale: Though the verb is simply 'they shall be,' idiomatic English in a measurement
    statement is better expressed as 'shall extend' or 'shall reach.' 'Extend' makes
    explicit the sense of the garment's span from one point to another.
