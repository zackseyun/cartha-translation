theological_decisions:
- issue: Nature of the penalty clause for improper priestly approach
  chosen_reading: The text states that the prescribed garments are required so the
    priests do not bear guilt and die.
  alternative_readings:
  - The clause could be rendered more dynamically as 'so that they do not incur guilt
    and die'.
  rationale: The Hebrew presents a real legal-cultic consequence tied to holiness
    violations. The translation preserves the gravity of divine holiness without softening
    the death penalty into mere ritual impropriety.
  doctrine_reference: Preserve theological tension rather than resolve it.
