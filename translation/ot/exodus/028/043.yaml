id: EXO.28.43
reference: Exodus 28:43
source:
  edition: WLC
  text: וְ/הָיוּ֩ עַל אַהֲרֹ֨ן וְ/עַל בָּנָ֜י/ו בְּ/בֹאָ֣/ם אֶל אֹ֣הֶל מוֹעֵ֗ד א֣וֹ
    בְ/גִשְׁתָּ֤/ם אֶל הַ/מִּזְבֵּ֨חַ֙ לְ/שָׁרֵ֣ת בַּ/קֹּ֔דֶשׁ וְ/לֹא יִשְׂא֥וּ עָוֺ֖ן
    וָ/מֵ֑תוּ חֻקַּ֥ת עוֹלָ֛ם ל֖/וֹ וּ/לְ/זַרְע֥/וֹ אַחֲרָֽי/ו־־׀־־־׃ס
translation:
  text: And they shall be on Aaron and on his sons when they enter the tent of meeting,
    or when they approach the altar to minister in the holy place, so that they may
    not bear guilt and die. It shall be a permanent statute for him and for his offspring
    after him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'incur guilt'; Hebrew 'bear guilt' is a legal-cultic idiom.
    reason: lexical_alternative
  - marker: b
    text: Or 'a perpetual statute.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיוּ
  chosen: And they shall be
  alternatives:
  - And they must be
  - And they are to be
  lexicon: HALOT
  rationale: Simple waw + qatal with future/injunctive force in legal instruction;
    'shall be' preserves the prescriptive sense without over-paraphrase.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: The preposition indicates the garments being worn on Aaron and his sons;
    'on' is natural modern English.
- source_word: בְּבֹאָם
  chosen: when they enter
  alternatives:
  - in their entering
  - when they come in
  lexicon: HALOT
  rationale: Infinitive construct with prefixed ב plus pronominal suffix expresses
    temporal circumstance; 'when they enter' is idiomatic and accurate.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  lexicon: HALOT
  rationale: Established and accurate rendering of the tabernacle-related phrase;
    preserves the cultic setting.
- source_word: בְגִשְׁתָּם
  chosen: when they approach
  alternatives:
  - when they come near
  lexicon: HALOT
  rationale: The verb נגשׁ in priestly context often denotes drawing near for sacred
    service; 'approach' is clear and suitably formal.
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Standard rendering for the sacrificial altar.
- source_word: לְשָׁרֵת
  chosen: to minister
  alternatives:
  - to serve
  lexicon: HALOT
  rationale: In priestly/cultic context, 'minister' better conveys sacred service
    than the broader 'serve'.
- source_word: בַּקֹּדֶשׁ
  chosen: in the holy place
  alternatives:
  - in the sanctuary
  - in the holy place/holy area
  lexicon: HALOT
  rationale: The phrase refers to the sacred precinct in which priestly ministry occurs.
    'Holy place' preserves the holiness language and fits the immediate cultic context;
    'sanctuary' is possible but slightly less transparent here.
- source_word: וְלֹא יִשְׂאוּ עָוֺן
  chosen: so that they may not bear guilt
  alternatives:
  - and they shall not bear iniquity
  - lest they incur guilt
  lexicon: HALOT
  rationale: The idiom נשׂא עון can mean bear guilt/liability for offense. 'Bear guilt'
    preserves the legal-cultic force without archaic phrasing. The purposive nuance
    is brought out in English by 'so that' in context.
- source_word: וָמֵתוּ
  chosen: and die
  alternatives:
  - lest they die
  lexicon: HALOT
  rationale: Direct consequence of improper approach. 'And die' follows the Hebrew
    sequence closely; the preceding 'so that' already conveys the preventative force.
- source_word: חֻקַּת עוֹלָם
  chosen: a permanent statute
  alternatives:
  - a perpetual statute
  - an everlasting statute
  lexicon: HALOT
  rationale: The phrase denotes an enduring prescribed ordinance. 'Permanent statute'
    is readable modern English while preserving the durative force of עוֹלָם in legal
    contexts.
- source_word: זַרְעוֹ
  chosen: his offspring
  alternatives:
  - his descendants
  - his seed
  lexicon: HALOT
  rationale: '''Offspring'' is natural modern English and preserves the singular collective
    sense of the Hebrew.'
- source_word: אַחֲרָיו
  chosen: after him
  alternatives:
  - following him
  lexicon: HALOT
  rationale: Standard temporal/genealogical expression indicating subsequent generations.
