id: EXO.28.23
reference: Exodus 28:23
source:
  edition: WLC
  text: וְ/עָשִׂ֨יתָ֙ עַל הַ/חֹ֔שֶׁן שְׁתֵּ֖י טַבְּע֣וֹת זָהָ֑ב וְ/נָתַתָּ֗ אֶת שְׁתֵּי֙
    הַ/טַּבָּע֔וֹת עַל שְׁנֵ֖י קְצ֥וֹת הַ/חֹֽשֶׁן־־־׃
translation:
  text: You shall make two gold rings on the breastpiece, and put the two rings on
    the two ends of the breastpiece.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'two rings of gold.'
    reason: lexical_alternative
  - marker: b
    text: Or 'at the two ends of the breastpiece.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: You shall make
  alternatives:
  - and you shall make
  - you are to make
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional sequence functions
    as an imperative/future command. 'You shall make' is natural modern legal/instructional
    English and preserves the directive force.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - for
  - upon
  lexicon: HALOT
  rationale: With an object being attached to the breastpiece, 'on' best reflects
    the spatial sense in context.
- source_word: הַחֹשֶׁן
  chosen: the breastpiece
  alternatives:
  - the breastpiece of judgment
  - the pouch
  lexicon: HALOT
  rationale: In Exodus 28 this term denotes the priestly breastpiece. 'Breastpiece'
    is the standard clear rendering here; the fuller phrase 'breastpiece of judgment'
    belongs to contexts where the construct expression appears explicitly.
- source_word: שְׁתֵּי טַבְּעוֹת זָהָב
  chosen: two gold rings
  alternatives:
  - two rings of gold
  lexicon: HALOT
  rationale: This is straightforward construct-like apposition/material expression.
    'Two gold rings' is idiomatic English while preserving the material specification.
- source_word: וְנָתַתָּ
  chosen: and put
  alternatives:
  - and place
  - and set
  lexicon: HALOT
  rationale: In this construction the verb means to place/put physically. 'Put' is
    simple and natural in procedural instructions.
- source_word: אֶת שְׁתֵּי הַטַּבָּעוֹת
  chosen: the two rings
  lexicon: HALOT
  rationale: Direct-object marker plus definite noun phrase; rendered directly as
    'the two rings.'
- source_word: עַל שְׁנֵי קְצֹוֹת הַחֹשֶׁן
  chosen: on the two ends of the breastpiece
  alternatives:
  - at the two ends of the breastpiece
  - on both edges of the breastpiece
  lexicon: HALOT
  rationale: קָצֶה refers to extremity/end. 'Ends' is the most direct rendering; 'two
    ends' mirrors the Hebrew repetition and suits the object’s shape and attachment
    instructions.
