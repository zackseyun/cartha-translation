id: EXO.28.35
reference: Exodus 28:35
source:
  edition: WLC
  text: וְ/הָיָ֥ה עַֽל אַהֲרֹ֖ן לְ/שָׁרֵ֑ת וְ/נִשְׁמַ֣ע ק֠וֹל/וֹ בְּ/בֹא֨/וֹ אֶל הַ/קֹּ֜דֶשׁ
    לִ/פְנֵ֧י יְהוָ֛ה וּ/בְ/צֵאת֖/וֹ וְ/לֹ֥א יָמֽוּת־־׃ס
translation:
  text: It shall be on Aaron when he ministers, and its sound shall be heard when
    he goes into the Holy Place before the LORD and when he comes out, so that he
    may not die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'and the sound of it shall be heard'; the Hebrew suffix
      likely refers to the robe with its bells.
    reason: lexical_alternative
  - marker: b
    text: Or 'into the sanctuary'; Hebrew 'the holy place' here refers to the sacred
      tabernacle space before the LORD.
    reason: lexical_alternative
  - marker: c
    text: Or 'lest he die.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  chosen: It shall be
  alternatives:
  - It must be
  - It is to be
  lexicon: HALOT
  rationale: 'Qal perfect with prefixed conjunction in instructional context functions
    prescriptively/descriptively: the garment item previously described is to be on
    Aaron. ''It shall be'' preserves the formal force without over-paraphrasing.'
- source_word: עַל אַהֲרֹן
  chosen: on Aaron
  alternatives:
  - upon Aaron
  lexicon: HALOT
  rationale: Straightforward prepositional phrase indicating the robe is worn by Aaron.
    'On Aaron' is natural modern English.
- source_word: לְשָׁרֵת
  chosen: when he ministers
  alternatives:
  - for ministering
  - to minister
  lexicon: HALOT
  rationale: Infinitive construct with ל expresses purpose or circumstance. In context,
    temporal-circumstantial English ('when he ministers') reads naturally and fits
    the priestly service setting.
- source_word: וְנִשְׁמַע קֹלוֹ
  chosen: and its sound shall be heard
  alternatives:
  - and his sound shall be heard
  - and the sound of it shall be heard
  lexicon: HALOT
  rationale: The suffix on 'sound' most naturally refers to the robe/bells just described
    rather than Aaron personally. English 'its sound' makes the antecedent explicit.
    This refers to the audible ringing of the robe's bells.
- source_word: בְּבֹאוֹ
  chosen: when he goes
  alternatives:
  - in his going
  - when he enters
  lexicon: HALOT
  rationale: Infinitive construct with preposition and suffix gives temporal sense.
    'When he goes' is kept because the destination phrase immediately specifies entry
    into the sanctuary.
- source_word: אֶל הַקֹּדֶשׁ
  chosen: into the Holy Place
  alternatives:
  - into the sanctuary
  - to the holy place
  lexicon: HALOT
  rationale: In tabernacle context, הַקֹּדֶשׁ refers to the holy sanctuary area. 'Holy
    Place' preserves cultic specificity better than the broader 'sanctuary,' while
    'into' reflects motion toward and entry.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Standard covenantal phrase for appearing in God's presence. Per doctrine,
    יְהוָה is rendered 'the LORD.'
- source_word: וּבְצֵאתוֹ
  chosen: and when he comes out
  alternatives:
  - and in his going out
  - and when he goes out
  lexicon: HALOT
  rationale: Temporal infinitive construct parallel to 'when he goes.' 'Comes out'
    is idiomatic from the perspective of exiting the sanctuary.
- source_word: וְלֹא יָמוּת
  chosen: so that he may not die
  alternatives:
  - and he will not die
  - lest he die
  lexicon: HALOT
  rationale: Though formally 'and not he will die,' in this legal-ritual context the
    clause expresses intended result or prevention. 'So that he may not die' communicates
    the purpose/result relation clearly in modern English; 'lest he die' is possible
    but more archaic.
