theological_decisions:
- issue: Referent of the audible sound
  chosen_reading: The sound is that of the robe's bells, not Aaron's voice or person
    generally.
  alternative_readings:
  - The sound refers more generally to Aaron's movement/presence.
  rationale: Immediate context (vv. 33–34) describes bells on the hem of the robe,
    making them the most natural antecedent of the suffix. This also explains the
    life-preserving ritual function in the verse.
- issue: Rendering of יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Required by the project's contested-terms policy for the divine name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
