id: EXO.28.18
reference: Exodus 28:18
source:
  edition: WLC
  text: וְ/הַ/טּ֖וּר הַ/שֵּׁנִ֑י נֹ֥פֶךְ סַפִּ֖יר וְ/יָהֲלֹֽם׃
translation:
  text: 'and the second row: turquoise, sapphire, and diamond.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The exact identification of several ancient gemstones is uncertain. נֹפֶךְ
      may be 'emerald' or 'carbuncle'; סַפִּיר may refer to 'lapis lazuli'; יָהֲלֹם
      may be 'jacinth' or 'jasper.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הַ/טּוּר
  chosen: and the row
  alternatives:
  - and the setting
  - and the course
  lexicon: HALOT
  rationale: טּוּר in this breastpiece-stone context refers to a row or tier of stones.
    The conjunction וְ is carried over as 'and.' 'Row' is the most natural English
    rendering in the list structure of vv. 17–20.
- source_word: הַ/שֵּׁנִי
  chosen: the second
  alternatives:
  - the second one
  lexicon: HALOT
  rationale: Ordinal adjective modifying 'row'; straightforwardly rendered 'the second.'
- source_word: נֹפֶךְ
  chosen: turquoise
  alternatives:
  - emerald
  - carbuncle
  lexicon: HALOT
  rationale: The precise identification of several ancient gemstones is uncertain.
    'Turquoise' is a plausible modern equivalent used by a number of contemporary
    translations for נֹפֶךְ in this context. Because certainty is limited, major alternatives
    are preserved in a footnote.
- source_word: סַפִּיר
  chosen: sapphire
  alternatives:
  - lapis lazuli
  lexicon: HALOT
  rationale: סַפִּיר is traditionally rendered 'sapphire,' though the ancient stone
    may have referred to lapis lazuli rather than the modern corundum gemstone. 'Sapphire'
    is retained in the main text for readability and continuity, with the lexical
    alternative footnoted.
- source_word: וְ/יָהֲלֹם
  chosen: and diamond
  alternatives:
  - and jacinth
  - and jasper
  lexicon: HALOT
  rationale: The noun יָהֲלֹם names a precious stone whose exact modern identification
    is debated. 'Diamond' is a common traditional rendering and fits the list format
    well in English, but uncertainty remains, so alternatives are preserved in a footnote.
