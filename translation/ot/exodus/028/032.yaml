id: EXO.28.32
reference: Exodus 28:32
source:
  edition: WLC
  text: וְ/הָיָ֥ה פִֽי רֹאשׁ֖/וֹ בְּ/תוֹכ֑/וֹ שָׂפָ֡ה יִֽהְיֶה֩ לְ/פִ֨י/ו סָבִ֜יב
    מַעֲשֵׂ֣ה אֹרֵ֗ג כְּ/פִ֥י תַחְרָ֛א יִֽהְיֶה לּ֖/וֹ לֹ֥א יִקָּרֵֽעַ־־׃
translation:
  text: Its opening for the head shall be in the middle of it; around its opening
    there shall be a woven binding, like the opening of a coat of mail, so that it
    may not be torn.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like the opening of armor' or 'like the opening of a cuirass.' The Hebrew
      term תַּחְרָא is rare, and the comparison is to a reinforced neck opening that
      will resist tearing.
    reason: lexical_alternative
lexical_decisions:
- source_word: פִי רֹאשׁוֹ
  chosen: its opening for the head
  alternatives:
  - the opening of its head
  - the hole for his head
  - its neck opening
  lexicon: HALOT
  rationale: פֶּה literally means 'mouth,' but in garment context it idiomatically
    denotes an opening. With רֹאשׁוֹ, the sense is the opening for the wearer's head.
    'Its opening for the head' is natural English while preserving the concrete garment
    imagery.
- source_word: בְּתוֹכוֹ
  chosen: in the middle of it
  alternatives:
  - in its midst
  - inside it
  lexicon: HALOT
  rationale: The phrase indicates location within the garment, specifically centrally
    placed. 'In the middle of it' communicates the practical sense for a robe opening.
- source_word: שָׂפָה
  chosen: binding
  alternatives:
  - edge
  - lip
  - border
  lexicon: HALOT
  rationale: שָׂפָה often means 'lip' or 'edge,' but here refers to the finished border
    around the opening. 'Binding' best fits a reinforced garment edge in English.
- source_word: לְפִיו סָבִיב
  chosen: around its opening
  alternatives:
  - around its edge
  - all around its opening
  lexicon: HALOT
  rationale: The repeated פֶּה again refers to the garment opening, and סָבִיב adds
    the circumferential sense. 'Around its opening' is concise and accurate.
- source_word: מַעֲשֵׂה אֹרֵג
  chosen: a woven binding
  alternatives:
  - the work of a weaver
  - weaver's work
  - woven work
  lexicon: HALOT
  rationale: The phrase describes workmanship produced by weaving. Because it modifies
    the border/binding, rendering the whole phrase as 'a woven binding' gives the
    functional sense in idiomatic English without losing the craft reference.
- source_word: כְּפִי תַחְרָא
  chosen: like the opening of a coat of mail
  alternatives:
  - like the opening of armor
  - like the opening of a cuirass
  lexicon: HALOT
  rationale: תַּחְרָא is a rare term, traditionally understood as a coat of mail or
    armored tunic. The comparison is to a reinforced opening that resists tearing.
    'Coat of mail' preserves the likely ancient referent better than the broader 'armor.'
- source_word: יִהְיֶה לּוֹ
  chosen: so that it may be
  alternatives:
  - it shall be for it
  - it shall have
  lexicon: HALOT
  rationale: The dative pronoun is awkward if rendered woodenly. In context it indicates
    that the robe is to have such a reinforced opening. This is carried forward idiomatically
    into the purpose/result clause in English.
- source_word: לֹא יִקָּרֵעַ
  chosen: so that it may not be torn
  alternatives:
  - it shall not be torn
  - so that it will not tear
  lexicon: HALOT
  rationale: 'The Niphal expresses passive/resultative sense. Given the preceding
    construction, English reads best as a purpose/result clause: the reinforced opening
    is made this way to prevent tearing.'
