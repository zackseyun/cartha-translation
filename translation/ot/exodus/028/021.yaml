theological_decisions:
- issue: Gendered covenantal expression בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - children of Israel
  - Israelites
  rationale: The Hebrew literally reads 'sons of Israel.' In keeping with the translation
    philosophy's gender-accurate principle, the formal covenantal expression is retained
    rather than neutralized, while the context clearly refers to the tribal descendants
    of Israel.
