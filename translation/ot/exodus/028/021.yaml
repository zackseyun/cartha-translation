id: EXO.28.21
reference: Exodus 28:21
source:
  edition: WLC
  text: וְ֠/הָ/אֲבָנִים תִּֽהְיֶ֜יןָ עַל שְׁמֹ֧ת בְּנֵֽי יִשְׂרָאֵ֛ל שְׁתֵּ֥ים עֶשְׂרֵ֖ה
    עַל שְׁמֹתָ֑/ם פִּתּוּחֵ֤י חוֹתָם֙ אִ֣ישׁ עַל שְׁמ֔/וֹ תִּֽהְיֶ֕יןָ לִ/שְׁנֵ֥י
    עָשָׂ֖ר שָֽׁבֶט־־־־׃
translation:
  text: And the stones shall correspond to the names of the sons of Israel, twelve
    according to their names. They shall be engraved like a signet, each with his
    name, for the twelve tribes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bearing the names of the sons of Israel'; the Hebrew literally says
      'the stones shall be upon/according to the names of the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with signet engravings' or 'engraved with the engraving of a seal.'
    reason: lexical_alternative
  - marker: c
    text: '''Sons of Israel'' is the Hebrew expression; some translations render it
      ''children of Israel'' or ''Israelites.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָאֲבָנִים
  chosen: And the stones
  alternatives:
  - Now the stones
  - The stones
  lexicon: HALOT
  rationale: Conjunction plus article and plural noun. 'And the stones' preserves
    the connective force and the definiteness established by the context of the breastpiece
    instructions.
- source_word: תִּהְיֶיןָ
  chosen: shall correspond to
  alternatives:
  - shall be
  - shall be according to
  lexicon: HALOT
  rationale: The verb is simply 'shall be,' but in English a bare 'shall be upon the
    names' is awkward. 'Correspond to' brings out the relational sense created by
    עַל + 'names' in this descriptive context without over-paraphrasing.
- source_word: עַל שְׁמֹת בְּנֵי יִשְׂרָאֵל
  chosen: to the names of the sons of Israel
  alternatives:
  - according to the names of the sons of Israel
  - bearing the names of the sons of Israel
  lexicon: HALOT
  rationale: עַל here marks relation/reference rather than physical position. 'To
    the names' works with 'correspond to' to express that each stone matches an Israelite
    tribal name. 'Sons of Israel' is retained as the formal covenantal expression
    and is gender-accurate to the Hebrew.
- source_word: שְׁתֵּים עֶשְׂרֵה
  chosen: twelve
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: עַל שְׁמֹתָם
  chosen: according to their names
  alternatives:
  - by their names
  - corresponding to their names
  lexicon: HALOT
  rationale: This phrase restates the correspondence between stones and tribal names.
    'According to their names' is idiomatic and close to the Hebrew.
- source_word: פִּתּוּחֵי חוֹתָם
  chosen: engraved like a signet
  alternatives:
  - with signet engravings
  - engraved with the engraving of a seal
  lexicon: HALOT
  rationale: The construct phrase refers to the style of engraving used on seal stones.
    'Engraved like a signet' is natural English that preserves the image of seal-style
    inscription.
- source_word: אִישׁ עַל שְׁמוֹ
  chosen: each with his name
  alternatives:
  - each according to his name
  - each one with its name
  lexicon: HALOT
  rationale: אִישׁ distributively means 'each' or 'each one.' Because the referent
    is each tribal representative/name, 'each with his name' preserves the masculine
    singular distributive force in line with the gender-accurate policy.
- source_word: תִּהְיֶיןָ לִשְׁנֵי עָשָׂר שָׁבֶט
  chosen: for the twelve tribes
  alternatives:
  - they shall be for the twelve tribes
  - belonging to the twelve tribes
  lexicon: HALOT
  rationale: 'The final clause states purpose/reference: the stones represent the
    twelve tribes. ''For the twelve tribes'' is concise and faithful.'
