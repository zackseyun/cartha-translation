id: EXO.28.9
reference: Exodus 28:9
source:
  edition: WLC
  text: וְ/לָ֣קַחְתָּ֔ אֶת שְׁתֵּ֖י אַבְנֵי שֹׁ֑הַם וּ/פִתַּחְתָּ֣ עֲלֵי/הֶ֔ם שְׁמ֖וֹת
    בְּנֵ֥י יִשְׂרָאֵֽל־־׃
translation:
  text: And you shall take two onyx stones and engrave on them the names of the sons
    of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew shoham denotes a precious stone traditionally rendered 'onyx'; its
      exact identification is uncertain, and alternatives such as 'sardonyx' or 'beryl'
      have been proposed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַחְתָּ
  chosen: And you shall take
  alternatives:
  - And you must take
  - Then you shall take
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional sequence functions
    as an imperative/future command. 'You shall take' is standard, clear English for
    the directive force, and 'And' preserves the sequential waw.
- source_word: שְׁתֵּי אַבְנֵי שֹׁהַם
  chosen: two onyx stones
  alternatives:
  - two shoham stones
  - two sardonyx stones
  - two beryl stones
  lexicon: HALOT
  rationale: שֹׁהַם is a precious stone with some uncertainty in exact mineral identification.
    'Onyx' is the traditional and most widely recognized rendering in this tabernacle
    context; the uncertainty is worth preserving in a footnote.
- source_word: וּפִתַּחְתָּ
  chosen: and engrave
  alternatives:
  - and carve
  - and inscribe
  lexicon: HALOT
  rationale: In the context of names cut onto gemstones, 'engrave' best captures the
    specialized act of incising an inscription. It is more precise than the broader
    'carve' and more concrete than 'inscribe'.
- source_word: עֲלֵיהֶם
  chosen: on them
  alternatives:
  - upon them
  lexicon: HALOT
  rationale: Straightforward prepositional phrase referring to the stones. 'On them'
    is natural modern English while preserving the spatial sense.
- source_word: שְׁמוֹת
  chosen: the names
  alternatives:
  - names
  lexicon: HALOT
  rationale: 'The object of engraving is definite in context: the specific names belonging
    to Israel''s sons. English idiom prefers the article here.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: This phrase here refers specifically to the tribal ancestors whose names
    are to be engraved, not generically to the nation as a whole. 'The sons of Israel'
    is therefore more precise than 'the Israelites' and follows the gender-accurate
    principle.
