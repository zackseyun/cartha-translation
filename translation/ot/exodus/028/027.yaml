id: EXO.28.27
reference: Exodus 28:27
source:
  edition: WLC
  text: וְ/עָשִׂיתָ֮ שְׁתֵּ֣י טַבְּע֣וֹת זָהָב֒ וְ/נָתַתָּ֣ה אֹתָ֡/ם עַל שְׁתֵּי֩
    כִתְפ֨וֹת הָ/אֵפ֤וֹד מִ/לְּ/מַ֨טָּה֙ מִ/מּ֣וּל פָּנָ֔י/ו לְ/עֻמַּ֖ת מֶחְבַּרְתּ֑/וֹ
    מִ/מַּ֕עַל לְ/חֵ֖שֶׁב הָ/אֵפֽוֹד־׃
translation:
  text: You shall make two rings of gold and put them on the two shoulder-pieces of
    the ephod, underneath, on its front side, opposite its seam, above the skillfully
    woven band of the ephod.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its joining' or 'its attachment point' for 'its seam.' The Hebrew refers
      broadly to the place where the ephod is joined together.
    reason: lexical_alternative
  - marker: b
    text: Or 'the woven waistband of the ephod.' The Hebrew חֵשֶׁב denotes the ephod's
      specially made band or binding piece.
    reason: lexical_alternative
lexical_decisions:
- source_word: טַבְּע֣וֹת
  chosen: rings
  alternatives:
  - bands
  - settings
  lexicon: HALOT
  rationale: The noun commonly denotes rings, especially metal rings used for fastening
    in tabernacle/priestly garment contexts. 'Rings' is the natural English equivalent
    here.
- source_word: כִתְפ֨וֹת
  chosen: shoulder-pieces
  alternatives:
  - shoulders
  - side-pieces
  lexicon: HALOT
  rationale: Although literally related to 'shoulders,' in garment construction this
    refers to the ephod's shoulder sections/pieces. 'Shoulder-pieces' best fits the
    crafted-object context and avoids implying anatomical shoulders directly.
- source_word: הָ/אֵפ֤וֹד
  chosen: the ephod
  lexicon: HALOT
  rationale: '''Ephod'' is a standard transliteration for the priestly garment and
    is preferable to an explanatory paraphrase because no concise English equivalent
    captures the technical cultic item.'
- source_word: מִ/לְּ/מַ֨טָּה
  chosen: underneath
  alternatives:
  - below
  - on the lower part
  lexicon: HALOT
  rationale: The compound prepositional phrase indicates placement lower down on the
    ephod. 'Underneath' is concise and natural in English while preserving the spatial
    sense.
- source_word: מִ/מּ֣וּל פָּנָ֔י/ו
  chosen: on its front side
  alternatives:
  - in front of it
  - facing its front
  lexicon: HALOT
  rationale: The phrase literally conveys 'from/in front of its face.' For an object,
    'front side' communicates the orientation idiomatically in English.
- source_word: לְ/עֻמַּ֖ת
  chosen: opposite
  alternatives:
  - adjacent to
  - corresponding to
  lexicon: HALOT
  rationale: This preposition marks correspondence or alignment in position. 'Opposite'
    preserves the spatial relationship.
- source_word: מֶחְבַּרְתּ֑/וֹ
  chosen: its seam
  alternatives:
  - its joining
  - its attachment point
  - its coupling
  lexicon: HALOT
  rationale: The noun refers to the place of joining or connection in the garment.
    'Seam' is the clearest idiomatic rendering for a garment, though the underlying
    sense is broader than stitched seam alone.
- source_word: מִ/מַּ֕עַל
  chosen: above
  alternatives:
  - higher than
  - over
  lexicon: HALOT
  rationale: This adverb/preposition indicates a position above the following reference
    point.
- source_word: לְ/חֵ֖שֶׁב הָ/אֵפֽוֹד
  chosen: the skillfully woven band of the ephod
  alternatives:
  - the decorated band of the ephod
  - the waistband of the ephod
  - the woven waistband of the ephod
  lexicon: HALOT
  rationale: In this tabernacle context חֵשֶׁב refers to the ephod's woven band/belt-like
    component, previously described as skillfully made. 'Skillfully woven band' preserves
    both the technical garment element and its crafted nature better than the less
    precise 'waistband' alone.
