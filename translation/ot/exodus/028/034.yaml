id: EXO.28.34
reference: Exodus 28:34
source:
  edition: WLC
  text: פַּעֲמֹ֤ן זָהָב֙ וְ/רִמּ֔וֹן פַּֽעֲמֹ֥ן זָהָ֖ב וְ/רִמּ֑וֹן עַל שׁוּלֵ֥י הַ/מְּעִ֖יל
    סָבִֽיב־׃
translation:
  text: a gold bell and a pomegranate, a gold bell and a pomegranate, around the hem
    of the robe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the hem of the robe all around.' The Hebrew combines the preposition
      'on/upon' with an adverb meaning 'around, all around.'
    reason: lexical_alternative
  - marker: b
    text: '''Pomegranate'' likely refers here to a pomegranate-shaped ornament attached
      between the bells.'
    reason: cultural_note
lexical_decisions:
- source_word: פַּעֲמֹן
  chosen: bell
  alternatives:
  - gong
  - ornamental bell
  lexicon: HALOT
  rationale: The noun denotes a small bell attached to the priestly garment. 'Bell'
    is the standard and most natural English equivalent in this cultic clothing context.
- source_word: זָהָב
  chosen: gold
  alternatives:
  - golden
  lexicon: HALOT
  rationale: Rendered as the noun/adjectival material term 'gold.' In English, 'gold
    bell' is more direct and closer to the Hebrew construction than 'golden bell.'
- source_word: רִמּוֹן
  chosen: pomegranate
  lexicon: HALOT
  rationale: The word normally means 'pomegranate.' In this tabernacle-garment context
    it refers to a pomegranate-shaped ornament, but the simple rendering 'pomegranate'
    preserves the Hebrew wording without over-interpreting in the main text.
- source_word: עַל
  chosen: around
  alternatives:
  - 'on'
  - upon
  - along
  lexicon: HALOT
  rationale: Although the preposition literally means 'on/upon,' with 'hem' and the
    following סָבִיב it idiomatically describes placement encircling the edge. 'Around'
    communicates the combined sense naturally in English.
- source_word: שׁוּלֵי
  chosen: hem
  alternatives:
  - skirts
  - lower edge
  lexicon: HALOT
  rationale: In garment contexts this term refers to the lower edge or hem. 'Hem'
    is concise, idiomatic, and accurate for modern readers.
- source_word: מְעִיל
  chosen: robe
  alternatives:
  - cloak
  lexicon: HALOT
  rationale: In priestly vestment contexts מְעִיל is best rendered 'robe.' 'Cloak'
    is possible more generally, but 'robe' better fits the described sacred garment.
- source_word: סָבִיב
  chosen: around
  alternatives:
  - all around
  - all around it
  lexicon: HALOT
  rationale: This adverb emphasizes encircling arrangement. Rendering it with 'around'
    yields natural English together with עַל; the repetition in Hebrew is represented
    by the overall phrase 'around the hem of the robe' rather than awkward duplication.
