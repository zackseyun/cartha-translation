id: EXO.28.2
reference: Exodus 28:2
source:
  edition: WLC
  text: וְ/עָשִׂ֥יתָ בִגְדֵי קֹ֖דֶשׁ לְ/אַהֲרֹ֣ן אָחִ֑י/ךָ לְ/כָב֖וֹד וּ/לְ/תִפְאָֽרֶת־׃
translation:
  text: And you shall make holy garments for Aaron your brother, for glory and for
    beauty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for honor and for beauty' or 'for glory and for splendor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: And you shall make
  alternatives:
  - And make
  - You are to make
  lexicon: HALOT
  rationale: Qal perfect 2ms with prefixed conjunction in instructional context functions
    as an imperative/future command. 'You shall make' preserves the directive force
    in natural English.
- source_word: בִגְדֵי
  chosen: garments
  alternatives:
  - clothes
  - vestments
  lexicon: HALOT
  rationale: Construct plural of בגד refers broadly to clothing. 'Garments' is suitably
    formal and fits priestly context without importing later ecclesiastical terminology
    like 'vestments' into the main text.
- source_word: קֹדֶשׁ
  chosen: holy
  alternatives:
  - sacred
  lexicon: HALOT
  rationale: In construct with 'garments,' the phrase denotes garments set apart for
    sacred use. 'Holy garments' is the standard and precise rendering, preserving
    the consecratory sense of קדשׁ.
- source_word: לְאַהֲרֹן
  chosen: for Aaron
  alternatives:
  - for Aharon
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention per translation
    philosophy.
- source_word: אָחִיךָ
  chosen: your brother
  lexicon: HALOT
  rationale: Literal familial designation; no reason to paraphrase. It identifies
    Aaron in relation to Moses.
- source_word: לְכָבוֹד
  chosen: for glory
  alternatives:
  - for honor
  - for splendor
  lexicon: HALOT
  rationale: כבוד commonly denotes honor, weight, glory. Here, in parallel with תפארת
    and describing the purpose/effect of the priestly garments, 'glory' best preserves
    the elevated register and visible dignity intended.
- source_word: וּלְתִפְאָרֶת
  chosen: and for beauty
  alternatives:
  - and for splendor
  - and for adornment
  lexicon: HALOT
  rationale: תפארת can mean beauty, splendor, or adornment. 'Beauty' gives clear modern
    English and pairs well with 'glory' while preserving the aesthetic dimension of
    the garments.
