theological_decisions:
- issue: Purpose phrase describing priestly garments
  chosen_reading: The garments are made 'for glory and for beauty,' expressing both
    dignity and splendor without narrowing the phrase to merely human honor or merely
    divine glory.
  alternative_readings:
  - for honor and for beauty
  - for glory and for splendor
  rationale: The Hebrew purpose clauses לְכָבוֹד וּלְתִפְאָרֶת are broad and should
    retain their full semantic range. The translation preserves the theological and
    aesthetic weight of the priestly office without over-interpreting the referent
    of 'glory.'
  doctrine_reference: Translation philosophy §3, §6
