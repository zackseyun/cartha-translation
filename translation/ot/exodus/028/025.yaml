id: EXO.28.25
reference: Exodus 28:25
source:
  edition: WLC
  text: וְ/אֵ֨ת שְׁתֵּ֤י קְצוֹת֙ שְׁתֵּ֣י הָ/עֲבֹתֹ֔ת תִּתֵּ֖ן עַל שְׁתֵּ֣י הַֽ/מִּשְׁבְּצ֑וֹת
    וְ/נָתַתָּ֛ה עַל כִּתְפ֥וֹת הָ/אֵפֹ֖ד אֶל מ֥וּל פָּנָֽי/ו־־־׃
translation:
  text: And you shall put the two ends of the two cords on the two settings, and you
    shall place them on the shoulder pieces of the ephod, at its front.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the two ends of the two chains.” The Hebrew term can refer to intertwined
      cords or chainwork; the surrounding goldwork context favors chain-like construction.
    reason: lexical_alternative
lexical_decisions:
- source_word: קְצוֹת
  chosen: ends
  alternatives:
  - extremities
  lexicon: HALOT
  rationale: The noun denotes the terminal points of the cords/chains. 'Ends' is natural
    modern English and sufficiently precise in this tabernacle-instructions context.
- source_word: הָעֲבֹתֹת
  chosen: cords
  alternatives:
  - chains
  - braided chains
  lexicon: HALOT
  rationale: In the immediate context these are the braided gold attachments for the
    breastpiece. The term can denote thick cords or intertwined chains; 'cords' keeps
    the basic image while remaining readable. Because the material context suggests
    chainwork, 'chains' is preserved in a footnote as a lexical alternative.
- source_word: הַמִּשְׁבְּצֹת
  chosen: settings
  alternatives:
  - filigree settings
  - rosettes
  lexicon: HALOT
  rationale: This term refers to the gold mountings/settings attached to the ephod.
    'Settings' is clear and avoids over-specifying the ornamental form. More technical
    renderings are possible but less transparent for modern readers.
- source_word: כִּתְפֹת
  chosen: shoulder pieces
  alternatives:
  - shoulders
  lexicon: HALOT
  rationale: Although literally 'shoulders,' in garment-construction context it refers
    to the shoulder parts/pieces of the ephod rather than Aaron's anatomical shoulders.
    'Shoulder pieces' best conveys the referent.
- source_word: אֵפֹד
  chosen: ephod
  lexicon: HALOT
  rationale: This is a specialized priestly garment with no precise English equivalent.
    Standard transliteration is preferable to an interpretive paraphrase.
- source_word: אֶל מוּל פָּנָיו
  chosen: at its front
  alternatives:
  - toward its front
  - opposite its face/front
  lexicon: HALOT
  rationale: The phrase indicates placement on the front-facing side of the ephod.
    'At its front' is concise, idiomatic English that captures the spatial instruction
    without wooden literalism.
- source_word: וְנָתַתָּה
  chosen: you shall place them
  alternatives:
  - and you shall put them
  lexicon: HALOT
  rationale: The verb נתן is repeated, and English benefits from slight variation
    for readability while preserving the same basic action. The object 'them' is supplied
    from context, referring to the attached ends/settings.
