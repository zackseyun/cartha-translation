id: EXO.28.13
reference: Exodus 28:13
source:
  edition: WLC
  text: וְ/עָשִׂ֥יתָ מִשְׁבְּצֹ֖ת זָהָֽב׃
translation:
  text: And you shall make settings of gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mountings' or 'filigree settings.' The Hebrew term denotes ornamental
      settings, likely for attaching the stones or chains described in the surrounding
      verses.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עָשִׂיתָ
  chosen: And you shall make
  alternatives:
  - And make
  - Then you shall make
  lexicon: HALOT
  rationale: The conjunction וְ is carried forward as simple coordination, and the
    qatal 2ms in this instructional sequence is naturally rendered as an English future-like
    imperative, 'you shall make,' matching the prescriptive style of the surrounding
    tabernacle instructions.
- source_word: מִשְׁבְּצֹת
  chosen: settings
  alternatives:
  - filigree settings
  - mountings
  - rosettes
  lexicon: HALOT
  rationale: The noun refers to ornamental settings or mounts, especially for attaching
    precious stones or chains in priestly garments. 'Settings' is the clearest modern
    English term that fits the immediate context without over-specifying the craftsmanship.
    Alternatives such as 'filigree settings' import detail from nearby verses or traditional
    renderings more than this word alone requires.
- source_word: זָהָב
  chosen: of gold
  alternatives:
  - gold
  lexicon: HALOT
  rationale: 'A straightforward material genitive/apposition: the settings are made
    of gold. ''Of gold'' is idiomatic and clear in English.'
