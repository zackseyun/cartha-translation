id: EXO.28.14
reference: Exodus 28:14
source:
  edition: WLC
  text: וּ/שְׁתֵּ֤י שַׁרְשְׁרֹת֙ זָהָ֣ב טָה֔וֹר מִגְבָּלֹ֛ת תַּעֲשֶׂ֥ה אֹתָ֖/ם מַעֲשֵׂ֣ה
    עֲבֹ֑ת וְ/נָתַתָּ֛ה אֶת שַׁרְשְׁרֹ֥ת הָ/עֲבֹתֹ֖ת עַל הַֽ/מִּשְׁבְּצֹֽת־־׃ס
translation:
  text: And make two chains of pure gold, braided like cords; and put the braided
    chains on the settings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'two chains of pure gold, twisted like cords, you shall make them, work
      of cordage.' The Hebrew uses two related expressions for twisted or corded workmanship.
    reason: lexical_alternative
  - marker: b
    text: '''Settings'' may also be rendered ''mountings'' or ''filigree settings,''
      referring to the gold framework attached to the priestly garment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁתֵּי
  chosen: two
  lexicon: HALOT
  rationale: Straightforward cardinal number modifying 'chains.'
- source_word: שַׁרְשְׁרֹת
  chosen: chains
  alternatives:
  - cords
  lexicon: HALOT
  rationale: Refers to chainwork used in the high priestly garments. 'Chains' is the
    most natural English equivalent here; 'cords' is possible in some contexts but
    less fitting with the gold material and jewelry setting.
- source_word: זָהָב טָהוֹר
  chosen: pure gold
  alternatives:
  - refined gold
  lexicon: HALOT
  rationale: Standard rendering for the material phrase, indicating high-quality gold
    suitable for sacred vestments.
- source_word: מִגְבָּלֹת
  chosen: braided like cords
  alternatives:
  - twisted
  - rope-like
  - corded
  lexicon: HALOT
  rationale: The term is difficult and likely describes something corded, twisted,
    or rope-like in form. 'Braided like cords' captures the probable sense while remaining
    readable and matching the following workmanship phrase.
- source_word: תַּעֲשֶׂה אֹתָם
  chosen: make
  alternatives:
  - fashion
  lexicon: HALOT
  rationale: Direct imperative-like instruction to Moses in context; 'make' is simple
    and accurate.
- source_word: מַעֲשֵׂה עֲבֹת
  chosen: braided like cords
  alternatives:
  - of twisted work
  - as corded work
  - of ropework
  lexicon: HALOT
  rationale: This construction specifies the manner of workmanship. Because both מִגְבָּלֹת
    and עֲבֹת convey a twisted/corded idea, English compresses the repetition into
    a natural phrase without losing the sense.
- source_word: שַׁרְשְׁרֹת הָעֲבֹתֹת
  chosen: the braided chains
  alternatives:
  - the corded chains
  - the twisted chains
  lexicon: HALOT
  rationale: The phrase repeats the chain noun with a descriptor from עבת, emphasizing
    their twisted or corded construction. 'Braided chains' is clear modern English.
- source_word: עַל הַמִּשְׁבְּצֹת
  chosen: on the settings
  alternatives:
  - on the filigree settings
  - on the mountings
  lexicon: HALOT
  rationale: Refers to the gold settings or mounts mentioned in the surrounding instructions
    for the ephod/breastpiece. 'Settings' is concise and idiomatic in English for
    jewelry work.
