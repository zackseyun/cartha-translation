id: EXO.28.28
reference: Exodus 28:28
source:
  edition: WLC
  text: וְ/יִרְכְּס֣וּ אֶת הַ֠/חֹשֶׁן מ/טבעת/ו אֶל טַבְּעֹ֤ת הָ/אֵפֹד֙ בִּ/פְתִ֣יל
    תְּכֵ֔לֶת לִֽ/הְי֖וֹת עַל חֵ֣שֶׁב הָ/אֵפ֑וֹד וְ/לֹֽא יִזַּ֣ח הַ/חֹ֔שֶׁן מֵ/עַ֖ל
    הָ/אֵפֽוֹד־־־־׃
translation:
  text: They shall bind the breastpiece by its rings to the rings of the ephod with
    a cord of blue yarn, so that it may rest on the skillfully woven band of the ephod,
    and the breastpiece shall not come loose from the ephod.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the breastplate.' The Hebrew term here refers to the priestly chest
      piece attached to the ephod, not body armor.
    reason: lexical_alternative
  - marker: b
    text: Or 'with a blue cord.' The Hebrew תְּכֵלֶת refers to the blue dyed material
      used in tabernacle and priestly textiles.
    reason: lexical_alternative
  - marker: c
    text: Or 'shall not be displaced from the ephod.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִרְכְּסוּ
  chosen: they shall bind
  alternatives:
  - they shall fasten
  - they shall lace
  lexicon: HALOT
  rationale: The verb denotes fastening or securing together. 'Bind' is natural English
    and fits the use of rings and cord in this garment context without over-specifying
    the exact method.
- source_word: הַחֹשֶׁן
  chosen: the breastpiece
  alternatives:
  - the breastplate
  lexicon: HALOT
  rationale: In priestly vestment contexts חֹשֶׁן refers to the ornamental pouch-like
    chest piece bearing stones, not a piece of armor. 'Breastpiece' is more precise
    and modern than the traditional 'breastplate'.
- source_word: מִטַּבְּעֹתָיו
  chosen: by its rings
  alternatives:
  - from its rings
  - with its rings
  lexicon: HALOT
  rationale: The prefixed מ marks the point of attachment from the breastpiece's rings
    to the ephod's rings. English 'by its rings' idiomatically conveys attachment
    via those rings.
- source_word: טַבְּעֹת הָאֵפֹד
  chosen: the rings of the ephod
  lexicon: HALOT
  rationale: A straightforward construct chain; retained formally for clarity in the
    vestment instructions.
- source_word: בִּפְתִיל תְּכֵלֶת
  chosen: with a cord of blue yarn
  alternatives:
  - with a blue cord
  - with a cord of blue
  lexicon: HALOT
  rationale: פְּתִיל is a cord/thread; תְּכֵלֶת denotes the blue-purple dyed material
    used in tabernacle textiles. 'Blue yarn' is clear modern English and fits the
    textile setting.
- source_word: לִהְיוֹת עַל
  chosen: so that it may rest on
  alternatives:
  - to be on
  - so that it may be upon
  lexicon: HALOT
  rationale: The infinitive expresses purpose/result. 'Rest on' communicates the intended
    stable placement of the breastpiece on the ephod's band in idiomatic English.
- source_word: חֵשֶׁב הָאֵפֹד
  chosen: the skillfully woven band of the ephod
  alternatives:
  - the woven waistband of the ephod
  - the decorated band of the ephod
  lexicon: HALOT
  rationale: חֵשֶׁב in this context refers to the ephod's woven band/belt, elsewhere
    described as skillfully worked. Including 'skillfully woven band' clarifies the
    referent for modern readers.
- source_word: וְלֹא יִזַּח
  chosen: shall not come loose
  alternatives:
  - shall not be displaced
  - shall not be removed
  lexicon: HALOT
  rationale: The Niphal here conveys being shifted away or detached. 'Come loose'
    fits the garment-fastening context and explains the practical purpose of the cord
    and rings.
- source_word: מֵעַל הָאֵפֹד
  chosen: from the ephod
  alternatives:
  - from upon the ephod
  - off the ephod
  lexicon: HALOT
  rationale: The phrase means separation from its position on the ephod. 'From the
    ephod' is concise and natural; the preceding clause already conveys the positional
    sense.
