id: EXO.28.30
reference: Exodus 28:30
source:
  edition: WLC
  text: וְ/נָתַתָּ֞ אֶל חֹ֣שֶׁן הַ/מִּשְׁפָּ֗ט אֶת הָ/אוּרִים֙ וְ/אֶת הַ/תֻּמִּ֔ים
    וְ/הָיוּ֙ עַל לֵ֣ב אַהֲרֹ֔ן בְּ/בֹא֖/וֹ לִ/פְנֵ֣י יְהוָ֑ה וְ/נָשָׂ֣א אַ֠הֲרֹן
    אֶת מִשְׁפַּ֨ט בְּנֵי יִשְׂרָאֵ֧ל עַל לִבּ֛/וֹ לִ/פְנֵ֥י יְהוָ֖ה תָּמִֽיד־־־־־־־׃ס
translation:
  text: And you shall put the Urim and the Thummim into the breastpiece of judgment,
    and they shall be on Aaron’s heart when he goes in before the LORD. Thus Aaron
    shall bear the judgment of the sons of Israel on his heart before the LORD continually.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Urim and Thummim are the Hebrew names of sacred objects associated with
      priestly judgment; their exact form and operation are uncertain. Possible etymological
      renderings include 'lights' and 'perfections.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the breastpiece for decision' / 'the breastpiece of justice.' The Hebrew
      word מִשְׁפָּט can denote judgment, decision, or justice depending on context.
    reason: alternative_reading
  - marker: c
    text: '''The sons of Israel'' is the Hebrew expression; it refers to the covenant
      people of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֹשֶׁן הַמִּשְׁפָּט
  chosen: the breastpiece of judgment
  alternatives:
  - the breastpiece for decision
  - the breastpiece of justice
  lexicon: HALOT
  rationale: חֹשֶׁן denotes the priestly breastpiece/pouch. מִשְׁפָּט here is retained
    as 'judgment' rather than reduced to 'decision' or broadened to 'justice,' because
    the term recurs in the verse and carries the idea of authoritative adjudication
    associated with the Urim and Thummim.
- source_word: הָאוּרִים
  chosen: the Urim
  alternatives:
  - lights
  lexicon: HALOT
  rationale: The term refers to a specific cultic object or device and is best transliterated
    rather than translated, since its exact form/function is uncertain. 'Lights' reflects
    a possible etymology but would overstate certainty.
- source_word: הַתֻּמִּים
  chosen: the Thummim
  alternatives:
  - perfections
  - integrities
  lexicon: HALOT
  rationale: Like אוּרִים, this is a technical cultic term of uncertain precise sense,
    so transliteration preserves the Hebrew referent without speculative interpretation.
- source_word: אֶל
  chosen: into
  alternatives:
  - in
  - 'on'
  lexicon: HALOT
  rationale: With נָתַתָּ and the breastpiece as container-like object, 'into' best
    reflects placement within or in connection with the breastpiece, matching the
    likely physical sense.
- source_word: וְהָיוּ עַל לֵב אַהֲרֹן
  chosen: and they shall be on Aaron’s heart
  alternatives:
  - and they shall be over Aaron’s heart
  lexicon: HALOT
  rationale: עַל לֵב is rendered idiomatically but still concretely as 'on Aaron’s
    heart,' preserving the imagery of the breastpiece worn over the chest and the
    representative significance.
- source_word: בְּבֹאוֹ לִפְנֵי יְהוָה
  chosen: when he goes in before the LORD
  alternatives:
  - when he comes before the LORD
  - when he enters before the LORD
  lexicon: HALOT
  rationale: The infinitive construct with preposition indicates the time of Aaron's
    approach into the divine presence. 'Goes in before' preserves the sanctuary-entry
    nuance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name יְהוָה is rendered 'the LORD' in keeping
    with established reverential convention and the LXX pattern.
- source_word: וְנָשָׂא
  chosen: shall bear
  alternatives:
  - shall carry
  lexicon: HALOT
  rationale: נשא commonly means 'bear/carry.' 'Bear' is preferred because it can express
    both physical carrying and representative responsibility, fitting the priestly
    context.
- source_word: מִשְׁפַּט בְּנֵי יִשְׂרָאֵל
  chosen: the judgment of the sons of Israel
  alternatives:
  - the decision for the sons of Israel
  - the justice of the sons of Israel
  lexicon: HALOT
  rationale: The phrase likely refers to the judicial decision/oracle concerning Israel
    that Aaron bears representationally before God. 'Judgment' preserves the lexical
    link with the breastpiece of judgment and avoids narrowing the sense too much.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Per gender-accurate policy, the masculine plural construct is retained
    as 'sons of Israel.' It is also a conventional covenantal designation and not
    merely a generic population label.
- source_word: עַל לִבּוֹ
  chosen: on his heart
  alternatives:
  - over his heart
  lexicon: HALOT
  rationale: This repeats the earlier phrase and should be rendered consistently.
    'On his heart' preserves both the physical and symbolic dimensions.
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - regularly
  - always
  lexicon: HALOT
  rationale: תָּמִיד in priestly contexts often denotes ongoing regularity before
    God. 'Continually' captures the sustained covenantal duty without implying uninterrupted
    physical action every moment.
