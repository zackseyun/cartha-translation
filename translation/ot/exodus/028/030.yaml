theological_decisions:
- issue: Whether to translate אוּרִים and תֻּמִּים semantically or transliterate them
  chosen_reading: Transliterate as 'Urim' and 'Thummim'
  alternative_readings:
  - Translate as 'lights and perfections'
  rationale: The exact nature and function of these objects are uncertain, and a semantic
    translation would present a debated etymology as settled meaning. Transliteration
    preserves transparency and avoids importing a speculative theology of revelation.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: How to render בְּנֵי יִשְׂרָאֵל
  chosen_reading: '''the sons of Israel'' in the main text'
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The Hebrew is grammatically masculine and also functions as a covenantal
    ethnonym. Per gender-accurate policy, the masculine form is retained rather than
    neutralized, while a footnote can clarify the broader referent if desired.
  doctrine_reference: Translation philosophy §4
- issue: Meaning of מִשְׁפָּט in this verse
  chosen_reading: Render as 'judgment' in both occurrences
  alternative_readings:
  - decision
  - justice
  rationale: The term likely includes the notion of authoritative decision rendered
    before God, but 'judgment' best preserves the lexical repetition and theological
    weight without over-interpreting the mechanism of the Urim and Thummim.
  doctrine_reference: Translation philosophy §5
