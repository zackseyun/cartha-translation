id: EXO.28.10
reference: Exodus 28:10
source:
  edition: WLC
  text: שִׁשָּׁה֙ מִ/שְּׁמֹתָ֔/ם עַ֖ל הָ/אֶ֣בֶן הָ/אֶחָ֑ת וְ/אֶת שְׁמ֞וֹת הַ/שִּׁשָּׁ֧ה
    הַ/נּוֹתָרִ֛ים עַל הָ/אֶ֥בֶן הַ/שֵּׁנִ֖ית כְּ/תוֹלְדֹתָֽ/ם־־׃
translation:
  text: six of their names on the one stone, and the names of the remaining six on
    the second stone, according to their generations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "according to their birth order"; the Hebrew phrase can refer to genealogical
      descent or the order arising from it.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁשָּׁה
  chosen: six
  lexicon: HALOT
  rationale: Straightforward cardinal number; retained directly.
- source_word: מִשְּׁמֹתָם
  chosen: of their names
  alternatives:
  - from their names
  lexicon: HALOT
  rationale: The partitive מן with 'names' is most naturally rendered 'of their names'
    in English here, indicating six names out of the total set.
- source_word: עַל הָאֶבֶן הָאֶחָת
  chosen: on the one stone
  alternatives:
  - upon the first stone
  - on one stone
  lexicon: HALOT
  rationale: עַל is spatial 'on/upon.' הָאֶחָת is literally 'the one,' contrasting
    with 'the second' later in the verse. 'The one stone' preserves the pairing without
    overinterpreting as ordinal 'first,' though that sense is implicit.
- source_word: וְאֶת שְׁמוֹת
  chosen: and the names
  lexicon: HALOT
  rationale: Direct object marker with conjunction introduces the second half of the
    distribution; idiomatic English omits the object marker and keeps 'and the names.'
- source_word: הַשִּׁשָּׁה הַנּוֹתָרִים
  chosen: the remaining six
  alternatives:
  - the other six
  - the six that remain
  lexicon: HALOT
  rationale: נּוֹתָרִים denotes what is left over or remaining. 'The remaining six'
    is concise and natural while preserving the sense.
- source_word: עַל הָאֶבֶן הַשֵּׁנִית
  chosen: on the second stone
  alternatives:
  - upon the second stone
  lexicon: HALOT
  rationale: הַשֵּׁנִית is ordinal 'second.' 'On' is natural modern English for the
    inscription location.
- source_word: כְּתוֹלְדֹתָם
  chosen: according to their generations
  alternatives:
  - according to their birth order
  - by their genealogical order
  - according to their family origins
  lexicon: HALOT
  rationale: תּוֹלְדוֹת commonly refers to generations/descent. In this context of
    listing sons of Israel on stones, it likely indicates arrangement by order of
    birth/descent. The more literal 'according to their generations' preserves the
    Hebrew wording and leaves the exact nuance open.
