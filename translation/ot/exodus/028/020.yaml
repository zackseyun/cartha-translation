id: EXO.28.20
reference: Exodus 28:20
source:
  edition: WLC
  text: וְ/הַ/טּוּר֙ הָ/רְבִיעִ֔י תַּרְשִׁ֥ישׁ וְ/שֹׁ֖הַם וְ/יָשְׁפֵ֑ה מְשֻׁבָּצִ֥ים
    זָהָ֛ב יִהְי֖וּ בְּ/מִלּוּאֹתָֽ/ם׃
translation:
  text: 'And the fourth row: beryl, onyx, and jasper; they shall be set in gold in
    their mountings.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The exact identification of several gemstones in the high priest's breastpiece
      is uncertain; traditional renderings include 'beryl' for תַּרְשִׁישׁ and 'onyx'
      for שֹׁהַם, but other identifications have been proposed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַטּוּר
  chosen: And the ... row
  alternatives:
  - And the setting
  - And the line
  lexicon: HALOT
  rationale: טּוּר in this gem-list context refers to a row of stones on the breastpiece.
    Rendering it as 'row' fits the immediate sequence of rows in the surrounding verses.
- source_word: הָרְבִיעִי
  chosen: fourth
  lexicon: HALOT
  rationale: Straightforward ordinal adjective modifying 'row.'
- source_word: תַּרְשִׁישׁ
  chosen: beryl
  alternatives:
  - chrysolite
  - topaz
  - tarshish-stone
  lexicon: HALOT
  rationale: The precise identification of several ancient gemstones is uncertain.
    'Beryl' is a common conventional rendering in this priestly breastpiece context
    and communicates that a specific precious stone is intended without overclaiming
    certainty.
- source_word: וְשֹׁהַם
  chosen: onyx
  alternatives:
  - lapis lazuli
  - sardonyx
  - onyx-stone
  lexicon: HALOT
  rationale: שֹׁהַם is traditionally rendered 'onyx,' especially in tabernacle materials
    texts. Although the exact mineral is debated, 'onyx' remains the most recognizable
    and established English equivalent.
- source_word: וְיָשְׁפֵה
  chosen: jasper
  alternatives:
  - jaspis
  lexicon: HALOT
  rationale: The term is commonly identified with jasper; this is the standard English
    gemstone name and fits the list naturally.
- source_word: מְשֻׁבָּצִים
  chosen: set
  alternatives:
  - mounted
  - enclosed
  lexicon: HALOT
  rationale: The passive participle describes the stones as being placed into settings.
    'Set' is idiomatic English for gemstones and preserves the passive sense.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Direct material term; no contextual reason to vary.
- source_word: יִהְיוּ
  chosen: they shall be
  alternatives:
  - they are to be
  lexicon: HALOT
  rationale: Imperfect here expresses instruction/specification for construction.
    'Shall be' captures the prescriptive force in formal but readable English.
- source_word: בְּמִלּוּאֹתָם
  chosen: in their mountings
  alternatives:
  - in their settings
  - in their fillings
  lexicon: HALOT
  rationale: In this tabernacle-craft context, מִלּוּאִים refers to the settings or
    sockets into which the stones are fitted. 'Mountings' is natural English for jewelry
    work and matches the gemstone context.
