id: EXO.28.31
reference: Exodus 28:31
source:
  edition: WLC
  text: וְ/עָשִׂ֛יתָ אֶת מְעִ֥יל הָ/אֵפ֖וֹד כְּלִ֥יל תְּכֵֽלֶת־׃
translation:
  text: You shall make the robe of the ephod entirely of blue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all of blue,' referring to the robe being made wholly from blue material.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term translated 'blue' can refer to a costly dyed fabric in the
      blue to blue-purple range.
    reason: cultural_note
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: You shall make
  alternatives:
  - And you shall make
  - You are to make
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional sequence functions
    as an imperative/future command. 'You shall make' preserves the legal-instructional
    tone in natural English.
- source_word: מְעִיל
  chosen: robe
  alternatives:
  - mantle
  lexicon: HALOT
  rationale: Refers to a garment worn over/under other priestly vestments. 'Robe'
    is the clearest modern English equivalent; 'mantle' is possible but less natural
    and potentially archaic.
- source_word: הָאֵפֹד
  chosen: the ephod
  lexicon: HALOT
  rationale: Ephod is a technical term for the priestly vestment and is best transliterated
    rather than replaced with an uncertain descriptive gloss. The construct phrase
    means the robe associated with the ephod.
- source_word: כְּלִיל
  chosen: entirely
  alternatives:
  - all of
  - whole
  - complete
  lexicon: HALOT
  rationale: 'The adjective conveys entirety/wholeness. Rendering it adverbially as
    ''entirely'' fits idiomatic English with the following material term: ''entirely
    of blue.'''
- source_word: תְּכֵלֶת
  chosen: blue
  alternatives:
  - blue yarn
  - violet
  - blue-purple
  lexicon: HALOT
  rationale: The term denotes the distinctive blue/purple-blue dyed material used
    in tabernacle and priestly contexts. 'Blue' is the standard accessible rendering;
    more technical color nuances are possible but less certain in English.
