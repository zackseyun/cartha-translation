id: EXO.28.3
reference: Exodus 28:3
source:
  edition: WLC
  text: וְ/אַתָּ֗ה תְּדַבֵּר֙ אֶל כָּל חַכְמֵי לֵ֔ב אֲשֶׁ֥ר מִלֵּאתִ֖י/ו ר֣וּחַ חָכְמָ֑ה וְ/עָשׂ֞וּ אֶת בִּגְדֵ֧י אַהֲרֹ֛ן לְ/קַדְּשׁ֖/וֹ לְ/כַהֲנ/וֹ לִֽ/י־־־־־׃
translation:
  text: And you shall speak to all the skillful of heart, whom I have filled with a spirit of wisdom, and they shall make Aaron’s garments to consecrate him to serve me as priest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Spirit of wisdom.' The Hebrew can denote a divinely given spirit or disposition of wisdom; the main text avoids making the reference more specific than the wording requires.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'wise of heart' or 'wise-hearted,' an idiom for those endowed with skill and understanding.
    reason: lexical_alternative
  - marker: c
    text: Or 'to consecrate him, for him to serve me as priest'.
    reason: previous_rendering
lexical_decisions:
- source_word: תְּדַבֵּר
  chosen: you shall speak
  alternatives:
  - you are to speak
  - you must speak
  lexicon: HALOT
  rationale: Piel imperfect 2ms of דבר in instruction context; 'shall speak' preserves the directive force in standard legal/instructional English without over-paraphrase.
- source_word: חַכְמֵי לֵב
  chosen: the skillful of heart
  alternatives:
  - the wise-hearted
  - those who are skillful
  - those who are wise of heart
  lexicon: HALOT
  rationale: A Hebrew idiom combining wisdom/skill with 'heart' as the inner seat of understanding. 'Skillful of heart' preserves the metaphor more transparently than flattening to merely 'skilled craftsmen,' while remaining readable.
- source_word: מִלֵּאתִיו רוּחַ חָכְמָה
  chosen: whom I have filled with a spirit of wisdom
  alternatives:
  - whom I have filled with the spirit of wisdom
  - whom I have filled with wisdom
  - whom I have endowed with a spirit of skill
  lexicon: HALOT
  rationale: The Hebrew lacks the article on רוּחַ, so 'a spirit of wisdom' best reflects the form without forcing a reference to the Holy Spirit. 'Filled' preserves the verbal imagery of מלא. 'Wisdom' in this context includes practical skill, but the base term should remain 'wisdom' in the main text.
- source_word: בִּגְדֵי אַהֲרֹן
  chosen: Aaron’s garments
  alternatives:
  - the garments of Aaron
  - Aaron's priestly garments
  lexicon: HALOT
  rationale: Construct phrase straightforwardly rendered. 'Priestly' is contextually true but not explicit in this phrase, so it is not added to the main text.
- source_word: לְקַדְּשׁוֹ
  chosen: to consecrate him
  alternatives:
  - to sanctify him
  - to make him holy
  lexicon: HALOT
  rationale: קדשׁ in priestly context commonly denotes consecration to sacred office. 'Consecrate' is precise and idiomatic in English for ordination-related holiness.
- source_word: לְכַהֲנוֹ לִי
  chosen: for him to serve me as priest
  alternatives:
  - that he may minister to me as priest
  - for his priesthood to me
  - to be my priest
  lexicon: HALOT
  rationale: כהן as a verb means to act/serve as priest. 'Serve me as priest' is clear modern English and preserves the dative לִי ('to me/for me') as service rendered to God.
- source_word: וְעָשׂוּ
  chosen: and they shall make
  alternatives:
  - and they are to make
  - so that they may make
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional sequence functions as a directive continuation. 'They shall make' matches the legal-register flow of the verse.
