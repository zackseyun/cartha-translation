id: EXO.28.5
reference: Exodus 28:5
source:
  edition: WLC
  text: וְ/הֵם֙ יִקְח֣וּ אֶת הַ/זָּהָ֔ב וְ/אֶת הַ/תְּכֵ֖לֶת וְ/אֶת הָֽ/אַרְגָּמָ֑ן
    וְ/אֶת תּוֹלַ֥עַת הַ/שָּׁנִ֖י וְ/אֶת הַ/שֵּֽׁשׁ־־־־־׃פ
translation:
  text: And they shall take the gold, and the blue, and the purple, and the scarlet
    yarn, and the fine linen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the blue yarn' and 'the purple yarn'; the Hebrew terms can denote dyed
      textile material, not merely the colors abstractly.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'scarlet of the worm,' an idiom for scarlet material dyed from insect
      source; hence 'scarlet yarn.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהֵם
  chosen: And they
  alternatives:
  - And they themselves
  lexicon: HALOT
  rationale: The independent pronoun adds explicit subject emphasis after the prior
    context identified the craftsmen. English normally requires the subject here;
    'And they' preserves the explicitness without overemphasizing it.
- source_word: יִקְחוּ
  chosen: shall take
  alternatives:
  - are to take
  - must take
  - will take
  lexicon: HALOT
  rationale: The imperfect here functions instructionally within the tabernacle-construction
    commands. 'Shall take' preserves the directive force in concise formal English.
- source_word: הַזָּהָב
  chosen: the gold
  alternatives:
  - gold
  lexicon: HALOT
  rationale: The article is present in Hebrew, and the list refers to the specified
    materials to be used for the priestly garments. 'The gold' reflects the Hebrew
    form and the sense of designated materials.
- source_word: הַתְּכֵלֶת
  chosen: the blue
  alternatives:
  - blue yarn
  - blue cloth
  - blue-purple
  lexicon: HALOT
  rationale: תְּכֵלֶת denotes the blue dyed material used in tabernacle textiles.
    Since the noun itself can refer to the dyed stuff rather than merely the abstract
    color, 'blue' is retained in the list for readability, with 'blue yarn' preserved
    as an alternative.
- source_word: הָאַרְגָּמָן
  chosen: the purple
  alternatives:
  - purple yarn
  - purple cloth
  - reddish-purple
  lexicon: HALOT
  rationale: אַרְגָּמָן denotes purple dyed material. 'The purple' matches the Hebrew
    list structure and traditional English rendering while remaining understandable.
- source_word: תּוֹלַעַת הַשָּׁנִי
  chosen: the scarlet yarn
  alternatives:
  - scarlet
  - scarlet thread
  - crimson yarn
  lexicon: HALOT
  rationale: This expression refers to scarlet material/thread associated with the
    kermes dye. 'Scarlet yarn' makes explicit that a textile material is meant, which
    suits the garment-making context better than the bare color term.
- source_word: הַשֵּׁשׁ
  chosen: the fine linen
  alternatives:
  - the linen
  - the fine flax
  lexicon: HALOT
  rationale: שֵׁשׁ in tabernacle contexts refers to fine linen rather than linen generically.
    'The fine linen' best captures the quality implied by the Hebrew term.
