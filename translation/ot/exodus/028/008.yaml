id: EXO.28.8
reference: Exodus 28:8
source:
  edition: WLC
  text: וְ/חֵ֤שֶׁב אֲפֻדָּת/וֹ֙ אֲשֶׁ֣ר עָלָ֔י/ו כְּ/מַעֲשֵׂ֖/הוּ מִמֶּ֣/נּוּ יִהְיֶ֑ה
    זָהָ֗ב תְּכֵ֧לֶת וְ/אַרְגָּמָ֛ן וְ/תוֹלַ֥עַת שָׁנִ֖י וְ/שֵׁ֥שׁ מָשְׁזָֽר׃
translation:
  text: 'And the skillfully woven band of his ephod, which is on it, shall be of one
    piece with it: gold, blue, and purple, and scarlet yarn, and fine twisted linen.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of the same workmanship as it; from it it shall be'—the Hebrew emphasizes
      that the band was to match the ephod's workmanship and be made integrally with
      it, not as a separate piece.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'blue, purple, and scarlet' refers to dyed textile materials used
      in the tabernacle and priestly garments.
    reason: cultural_note
lexical_decisions:
- source_word: חֵשֶׁב
  chosen: skillfully woven band
  alternatives:
  - band
  - decorated band
  - woven waistband
  lexicon: HALOT
  rationale: In priestly-tabernacle contexts, חֵשֶׁב refers not to 'thought' but to
    a woven component used for fastening or ornamentation. 'Skillfully woven band'
    captures both the textile nature and the craftsmanship implied by the term and
    context.
- source_word: אֲפֻדָּתוֹ
  chosen: his ephod
  lexicon: HALOT
  rationale: Standard rendering for the priestly garment אֵפוֹד. 'His ephod' preserves
    the possessive suffix and avoids paraphrase.
- source_word: אֲשֶׁר עָלָיו
  chosen: which is on it
  alternatives:
  - which is on him
  - which is attached to it
  lexicon: HALOT
  rationale: The suffix most naturally refers to the ephod as the immediate antecedent
    in this garment-description context. English 'on it' is literal enough while fitting
    the description of a band situated on the ephod. 'Attached to it' is interpretive
    and therefore left as an alternative.
- source_word: כְּמַעֲשֵׂהוּ
  chosen: of one piece with it
  alternatives:
  - like its workmanship
  - according to its work
  - of the same workmanship
  lexicon: HALOT
  rationale: The phrase indicates correspondence in manufacture and likely integral
    construction with the ephod. Because the next phrase מִמֶּנּוּ יִהְיֶה strengthens
    the idea of material/integral unity, 'of one piece with it' communicates the sense
    more clearly in English than the wooden 'like its workmanship'.
- source_word: מִמֶּנּוּ יִהְיֶה
  chosen: shall be of one piece with it
  alternatives:
  - shall be from it
  - shall be made from the same piece
  - shall be part of it
  lexicon: HALOT
  rationale: Literally 'from it it shall be.' In context this means the band is to
    be made integrally from/with the ephod rather than as a separate attachment. The
    English wording folds this sense together with כְּמַעֲשֵׂהוּ for natural readability
    while preserving the construction's force.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Direct material term; rendered straightforwardly.
- source_word: תְּכֵלֶת
  chosen: blue
  alternatives:
  - blue yarn
  - blue-purple
  lexicon: HALOT
  rationale: Traditional tabernacle color term, commonly rendered 'blue.' Since English
    readers may infer textile material from the list as a whole, the simple color
    term is sufficient in the main text.
- source_word: אַרְגָּמָן
  chosen: purple
  alternatives:
  - purple yarn
  - reddish-purple
  lexicon: HALOT
  rationale: Standard rendering of the dye/color term in tabernacle descriptions.
- source_word: תוֹלַעַת שָׁנִי
  chosen: scarlet yarn
  alternatives:
  - scarlet
  - crimson yarn
  lexicon: HALOT
  rationale: This expression denotes scarlet material/thread associated with the crimson
    dye. 'Scarlet yarn' makes explicit the textile sense in this materials list.
- source_word: שֵׁשׁ מָשְׁזָר
  chosen: fine twisted linen
  alternatives:
  - finely twisted linen
  - twined fine linen
  lexicon: HALOT
  rationale: שֵׁשׁ is fine linen; מָשְׁזָר indicates twisted/twined thread. 'Fine
    twisted linen' is natural modern English and preserves both elements.
