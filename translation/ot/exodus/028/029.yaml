id: EXO.28.29
reference: Exodus 28:29
source:
  edition: WLC
  text: וְ/נָשָׂ֣א אַ֠הֲרֹן אֶת שְׁמ֨וֹת בְּנֵֽי יִשְׂרָאֵ֜ל בְּ/חֹ֧שֶׁן הַ/מִּשְׁפָּ֛ט
    עַל לִבּ֖/וֹ בְּ/בֹא֣/וֹ אֶל הַ/קֹּ֑דֶשׁ לְ/זִכָּרֹ֥ן לִ/פְנֵֽי יְהוָ֖ה תָּמִֽיד־־־־־׃
translation:
  text: Aaron shall carry the names of the sons of Israel in the breastpiece of judgment
    over his heart when he goes into the Holy Place, for remembrance before the LORD
    continually.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shall bear.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the breastpiece for decision.' The Hebrew title likely refers to the
      priestly breastpiece associated with rendering judgment or decision before God.
    reason: alternative_reading
  - marker: c
    text: Hebrew 'the sons of Israel'; a genealogical expression referring to the
      tribes descended from Israel.
    reason: lexical_alternative
  - marker: d
    text: Or 'as a memorial before the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָשָׂא
  chosen: shall carry
  alternatives:
  - shall bear
  lexicon: HALOT
  rationale: נשא commonly means 'carry, bear.' 'Shall carry' is natural modern English
    while preserving the concrete sense of bearing something upon oneself in priestly
    service.
- source_word: שְׁמוֹת
  chosen: the names
  lexicon: HALOT
  rationale: A direct rendering of the plural noun; the engraved tribal names are
    in view, not merely the tribes abstractly.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: The Hebrew construct is literally 'sons of Israel.' Per gender-accurate
    philosophy, the masculine form is preserved rather than flattened to 'Israelites,'
    while still functioning corporately for the tribes descended from Israel.
- source_word: בְּחֹשֶׁן הַמִּשְׁפָּט
  chosen: in the breastpiece of judgment
  alternatives:
  - in the breastpiece for decision
  - in the breastpiece of justice
  lexicon: HALOT
  rationale: חֹשֶׁן is the priestly breastpiece. מִשְׁפָּט here is the established
    cultic designation of this object; 'of judgment' preserves the traditional and
    lexical sense without over-interpreting exactly how judgment/decision is mediated.
- source_word: עַל לִבּוֹ
  chosen: over his heart
  alternatives:
  - on his heart
  lexicon: HALOT
  rationale: The idiom is spatial and symbolic. 'Over his heart' fits the garment's
    placement and preserves the imagery of representation before God.
- source_word: בְּבֹאוֹ אֶל הַקֹּדֶשׁ
  chosen: when he goes into the Holy Place
  alternatives:
  - when he enters the sanctuary
  - when he comes into the holy place
  lexicon: HALOT
  rationale: 'The infinitive construct with prefixed ב marks the time: ''when he goes/enters.''
    הַקֹּדֶשׁ in tabernacle context refers to the holy sanctuary space; ''Holy Place''
    is a clear cultic rendering in context.'
- source_word: לְזִכָּרוֹן
  chosen: for remembrance
  alternatives:
  - as a memorial
  lexicon: HALOT
  rationale: The phrase indicates memorial purpose before God. 'For remembrance' is
    a transparent rendering of the preposition plus noun.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: A standard idiom meaning before/in the presence of YHWH. Per doctrine
    guidelines, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Required by the project's contested-terms policy for the divine name.
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - regularly
  - always
  lexicon: HALOT
  rationale: תמיד denotes ongoing regular continuity in cultic practice. 'Continually'
    best matches the ritual sense here.
