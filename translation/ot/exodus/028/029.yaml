theological_decisions:
- issue: Rendering the cultic title חֹשֶׁן הַמִּשְׁפָּט
  chosen_reading: the breastpiece of judgment
  alternative_readings:
  - the breastpiece for decision
  - the breastpiece of justice
  rationale: The phrase is retained in a relatively formal way because the object
    has a specific priestly function tied to divine judgment/decision, and the immediate
    context does not warrant narrowing it to one interpretive nuance. This preserves
    theological and ritual texture rather than resolving it.
  doctrine_reference: Translation philosophy §3, §5
- issue: Rendering בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The Hebrew is grammatically masculine and genealogical. Following the
    gender-accurate policy, the translation preserves the source form rather than
    neutralizing it, while recognizing its corporate reference to the tribes.
  doctrine_reference: Translation philosophy §4
- issue: Rendering הַקֹּדֶשׁ in tabernacle context
  chosen_reading: the Holy Place
  alternative_readings:
  - the sanctuary
  - the holy place
  rationale: In this priestly context, the phrase most naturally refers to the sacred
    tabernacle space rather than holiness in the abstract. Capitalization signals
    the cultic locale in readable English.
  doctrine_reference: Translation philosophy §6
