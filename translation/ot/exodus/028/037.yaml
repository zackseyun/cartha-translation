id: EXO.28.37
reference: Exodus 28:37
source:
  edition: WLC
  text: וְ/שַׂמְתָּ֤ אֹת/וֹ֙ עַל פְּתִ֣יל תְּכֵ֔לֶת וְ/הָיָ֖ה עַל הַ/מִּצְנָ֑פֶת אֶל
    מ֥וּל פְּנֵֽי הַ/מִּצְנֶ֖פֶת יִהְיֶֽה־־־־׃
translation:
  text: And you shall put it on a cord of blue, and it shall be on the turban; it
    shall be at the front of the turban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'thread' or 'string' of blue.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew phrase literally indicates placement 'toward/opposite the front
      of the turban,' that is, on its front side.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתָּ אֹתוֹ
  chosen: And you shall put it
  alternatives:
  - And you shall set it
  - And you shall place it
  lexicon: HALOT
  rationale: שׂים commonly means 'put, set, place.' 'Put' is the most natural modern
    English here while remaining faithful to the direct instructional sense.
- source_word: פְּתִיל
  chosen: cord
  alternatives:
  - thread
  - string
  lexicon: HALOT
  rationale: פְּתִיל denotes a cord/thread used for fastening. 'Cord' best fits the
    likely sturdier fastening function for the gold plate on the high priestly headdress.
- source_word: תְּכֵלֶת
  chosen: blue
  alternatives:
  - blue-purple
  - violet
  lexicon: HALOT
  rationale: תְּכֵלֶת refers to the distinctive costly blue dye/textile color used
    in tabernacle materials. 'Blue' is the standard and clearest English rendering;
    more specific hue proposals are possible but uncertain.
- source_word: וְהָיָה עַל הַמִּצְנָפֶת
  chosen: and it shall be on the turban
  alternatives:
  - and it shall be upon the turban
  lexicon: HALOT
  rationale: מִצְנֶפֶת is the wrapped headpiece of the high priest. 'Turban' is the
    established and accurate English term for this item, and 'on' is idiomatic for
    עַל in this context.
- source_word: אֶל מוּל פְּנֵי
  chosen: at the front of
  alternatives:
  - opposite the front of
  - toward the front of
  - in front of
  lexicon: HALOT
  rationale: The combination אֶל מוּל פְּנֵי indicates orientation toward the front/face
    of the object. In clear English, this placement instruction is best rendered 'at
    the front of,' expressing visible frontal position rather than mere proximity.
- source_word: יִהְיֶה
  chosen: it shall be
  alternatives:
  - it shall remain
  - it is to be
  lexicon: HALOT
  rationale: The final imperfect reiterates the required placement. Rendering it again
    as 'it shall be' preserves the Hebrew's emphatic repetition of location instructions.
