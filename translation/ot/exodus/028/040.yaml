id: EXO.28.40
reference: Exodus 28:40
source:
  edition: WLC
  text: וְ/לִ/בְנֵ֤י אַהֲרֹן֙ תַּעֲשֶׂ֣ה כֻתֳּנֹ֔ת וְ/עָשִׂ֥יתָ לָ/הֶ֖ם אַבְנֵטִ֑ים
    וּ/מִגְבָּעוֹת֙ תַּעֲשֶׂ֣ה לָ/הֶ֔ם לְ/כָב֖וֹד וּ/לְ/תִפְאָֽרֶת׃
translation:
  text: For Aaron’s sons you shall make tunics, and you shall make sashes for them,
    and you shall make headbands for them, for glory and for beauty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'caps,' 'turbans,' or 'headdresses' for the priestly headgear.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי אַהֲרֹן
  chosen: for Aaron’s sons
  alternatives:
  - for the sons of Aaron
  - for Aaron’s descendants
  lexicon: HALOT
  rationale: The phrase is literally 'for the sons of Aaron.' 'Aaron’s sons' is natural
    English and preserves the direct filial reference, not a broader descendant sense.
- source_word: תַּעֲשֶׂה / וְעָשִׂיתָ
  chosen: you shall make
  alternatives:
  - you are to make
  - make
  lexicon: HALOT
  rationale: The imperfect and qatal with vav in instructional context function as
    directive/future commands. 'You shall make' preserves the formal legislative tone
    better than the more colloquial 'you are to make.'
- source_word: כֻתֳּנֹת
  chosen: tunics
  alternatives:
  - coats
  - garments
  - robes
  lexicon: HALOT
  rationale: כֻּתֹּנֶת refers to a basic body garment or tunic. 'Tunics' is the most
    precise modern equivalent; 'coats' is traditional but potentially misleading in
    modern English.
- source_word: אַבְנֵטִים
  chosen: sashes
  alternatives:
  - belts
  - waistbands
  lexicon: HALOT
  rationale: The term denotes a wrapped cloth sash worn around the waist. 'Sashes'
    best captures the priestly garment context; 'belts' sounds too rigid and modern.
- source_word: מִגְבָּעוֹת
  chosen: headbands
  alternatives:
  - caps
  - turbans
  - headdresses
  lexicon: HALOT
  rationale: The word refers to priestly headgear for Aaron's sons, distinct from
    Aaron's more elaborate headdress. 'Headbands' is a cautious rendering that reflects
    a wrapped head covering without over-specifying shape. Alternatives are possible
    and worth preserving.
- source_word: לְכָבוֹד
  chosen: for glory
  alternatives:
  - for honor
  lexicon: HALOT
  rationale: כָּבוֹד commonly carries the sense of glory, honor, or splendor. 'Glory'
    preserves the elevated register and matches the paired aesthetic purpose of the
    garments.
- source_word: וּלְתִפְאָרֶת
  chosen: and for beauty
  alternatives:
  - and for splendor
  lexicon: HALOT
  rationale: תִּפְאֶרֶת denotes beauty, splendor, or adornment. 'Beauty' is clear
    modern English and pairs well with 'glory'; 'splendor' is viable but slightly
    less natural in this collocation.
