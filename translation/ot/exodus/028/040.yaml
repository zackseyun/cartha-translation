theological_decisions:
- issue: Purpose phrase describing priestly garments
  chosen_reading: for glory and for beauty
  alternative_readings:
  - for honor and for splendor
  rationale: The Hebrew presents the garments as having dignified and aesthetically
    elevated purpose. The translation preserves this without importing later theological
    symbolism beyond the text itself.
  doctrine_reference: Translation philosophy §1, §6
