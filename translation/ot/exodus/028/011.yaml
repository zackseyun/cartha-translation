theological_decisions:
- issue: Gendered familial term בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - children of Israel
  - people of Israel
  rationale: Per translation philosophy, gender-accurate renderings are preferred
    where the source is grammatically masculine and contextually refers to the tribal
    sons whose names are engraved. 'Sons of Israel' also matches the immediate genealogical
    context of the twelve tribes.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
