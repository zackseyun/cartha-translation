id: EXO.28.11
reference: Exodus 28:11
source:
  edition: WLC
  text: מַעֲשֵׂ֣ה חָרַשׁ֮ אֶבֶן֒ פִּתּוּחֵ֣י חֹתָ֗ם תְּפַתַּח֙ אֶת שְׁתֵּ֣י הָ/אֲבָנִ֔ים
    עַל שְׁמֹ֖ת בְּנֵ֣י יִשְׂרָאֵ֑ל מֻסַבֹּ֛ת מִשְׁבְּצ֥וֹת זָהָ֖ב תַּעֲשֶׂ֥ה אֹתָֽ/ם־־׃
translation:
  text: Like the work of a stone engraver, like the engravings of a signet, you shall
    engrave the two stones with the names of the sons of Israel; you shall make them
    set in settings of gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the engravings of a seal.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of Israel'; this refers to the tribal descendants of Israel
      whose names were engraved on the stones.
    reason: cultural_note
lexical_decisions:
- source_word: מַעֲשֵׂה
  chosen: Like the work of
  alternatives:
  - The work of
  - According to the workmanship of
  lexicon: HALOT
  rationale: Construct with the following artisan term introduces the manner or standard
    of workmanship. Rendering with 'Like the work of' makes the comparison explicit
    in natural English while preserving the Hebrew sense.
- source_word: חָרַשׁ אֶבֶן
  chosen: a stone engraver
  alternatives:
  - an engraver of stone
  - a stonecutter
  lexicon: HALOT
  rationale: The phrase denotes a craftsman working stone. 'Stone engraver' fits the
    immediate context of inscribing names on gemstones better than the broader 'stonecutter.'
- source_word: פִּתּוּחֵי חֹתָם
  chosen: the engravings of a signet
  alternatives:
  - signet engravings
  - engraving of a seal
  lexicon: HALOT
  rationale: The plural construct plus 'signet/seal' refers to the style of incision
    characteristic of seal engraving. 'Signet' is slightly more precise than generic
    'seal' in jewelry context.
- source_word: תְּפַתַּח
  chosen: you shall engrave
  alternatives:
  - you shall carve
  - you shall cut
  lexicon: HALOT
  rationale: In context of inscribing names into stones, 'engrave' is the most idiomatic
    and precise English equivalent.
- source_word: שְׁתֵּי הָאֲבָנִים
  chosen: the two stones
  alternatives:
  - the two gems
  lexicon: HALOT
  rationale: Hebrew says 'stones.' Although these are precious stones in context,
    the more literal rendering preserves the source wording without loss of sense.
- source_word: עַל שְׁמֹת בְּנֵי יִשְׂרָאֵל
  chosen: with the names of the sons of Israel
  alternatives:
  - according to the names of the sons of Israel
  - bearing the names of the sons of Israel
  lexicon: HALOT
  rationale: The preposition here indicates what is inscribed on the stones. 'With
    the names of' is natural English and preserves the inscriptional sense. 'Sons
    of Israel' is retained for gender-accurate fidelity to the Hebrew familial designation.
- source_word: מֻסַבֹּת
  chosen: set in
  alternatives:
  - surrounded by
  - mounted in
  lexicon: HALOT
  rationale: Passive participle describing the stones as enclosed or mounted within
    gold filigree/settings. 'Set in' is concise and idiomatic for jewelry.
- source_word: מִשְׁבְּצ֥וֹת זָהָב
  chosen: settings of gold
  alternatives:
  - gold settings
  - gold filigree settings
  lexicon: HALOT
  rationale: Refers to ornamental mountings for the stones. 'Settings of gold' preserves
    the construct relationship and avoids over-specifying the exact ancient technique.
- source_word: תַּעֲשֶׂה אֹתָם
  chosen: you shall make them
  alternatives:
  - you shall prepare them
  lexicon: HALOT
  rationale: Straightforward rendering of the command to fashion the stones in that
    mounted form.
