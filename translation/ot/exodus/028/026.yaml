id: EXO.28.26
reference: Exodus 28:26
source:
  edition: WLC
  text: וְ/עָשִׂ֗יתָ שְׁתֵּי֙ טַבְּע֣וֹת זָהָ֔ב וְ/שַׂמְתָּ֣ אֹתָ֔/ם עַל שְׁנֵ֖י קְצ֣וֹת
    הַ/חֹ֑שֶׁן עַל שְׂפָת֕/וֹ אֲשֶׁ֛ר אֶל עֵ֥בֶר הָ/אֵפֹ֖ד בָּֽיְתָ/ה־־־׃
translation:
  text: You shall make two gold rings and put them on the two ends of the breastpiece,
    on its edge that is toward the inner side of the ephod.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on its border that faces inward toward the ephod.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: You shall make
  alternatives:
  - and you shall make
  - you are to make
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional sequence functions
    as an imperative/future command. 'You shall make' fits English legal/instructional
    style and preserves the directive force.
- source_word: שְׁתֵּי טַבְּעוֹת זָהָב
  chosen: two gold rings
  alternatives:
  - two rings of gold
  lexicon: HALOT
  rationale: Straightforward construct-like sequence indicating number, object, and
    material. 'Two gold rings' is natural modern English without loss of form.
- source_word: וְשַׂמְתָּ אֹתָם
  chosen: and put them
  alternatives:
  - and place them
  - and set them
  lexicon: HALOT
  rationale: שׂים commonly means 'put/place/set.' 'Put them' is the most idiomatic
    and sufficiently precise in this craftsmanship context.
- source_word: עַל שְׁנֵי קְצוֹת הַחֹשֶׁן
  chosen: on the two ends of the breastpiece
  alternatives:
  - at the two ends of the breastpiece
  - upon the two extremities of the breastpiece
  lexicon: HALOT
  rationale: קצה denotes an end/extremity. 'Ends' is clear and natural; 'breastpiece'
    is the standard rendering for חֹשֶׁן in this priestly context.
- source_word: עַל שְׂפָתוֹ
  chosen: on its edge
  alternatives:
  - on its border
  - on its lip
  lexicon: HALOT
  rationale: שָׂפָה literally means lip, edge, or border. For a garment/object edge,
    'edge' is the clearest idiomatic English rendering.
- source_word: אֲשֶׁר אֶל עֵבֶר הָאֵפֹד בָּיְתָה
  chosen: that is toward the inner side of the ephod
  alternatives:
  - which faces the ephod inward
  - that is on the side of the ephod toward the inside
  - that is toward the house-side of the ephod
  lexicon: HALOT
  rationale: עֵבֶר indicates the side facing or opposite; בָּיְתָה is an adverb meaning
    inward/in toward the inside. In context, the phrase locates the rings on the breastpiece
    edge facing the ephod, specifically the inward-facing side. 'Toward the inner
    side of the ephod' communicates the spatial relation clearly.
