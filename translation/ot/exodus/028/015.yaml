id: EXO.28.15
reference: Exodus 28:15
source:
  edition: WLC
  text: וְ/עָשִׂ֜יתָ חֹ֤שֶׁן מִשְׁפָּט֙ מַעֲשֵׂ֣ה חֹשֵׁ֔ב כְּ/מַעֲשֵׂ֥ה אֵפֹ֖ד תַּעֲשֶׂ֑/נּוּ
    זָ֠הָב תְּכֵ֨לֶת וְ/אַרְגָּמָ֜ן וְ/תוֹלַ֧עַת שָׁנִ֛י וְ/שֵׁ֥שׁ מָשְׁזָ֖ר תַּעֲשֶׂ֥ה
    אֹתֽ/וֹ׃
translation:
  text: 'You shall make a breastpiece of judgment, the work of a skillful designer;
    like the work of the ephod you shall make it: of gold, blue, purple, scarlet yarn,
    and finely twisted linen you shall make it.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'breastpiece for judgment' or 'breastpiece of decision.'
    reason: lexical_alternative
  - marker: b
    text: Or 'skillfully woven work'; the Hebrew refers to expertly designed artisan
      work.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֹשֶׁן
  chosen: breastpiece
  alternatives:
  - breastplate
  - pouch
  lexicon: HALOT
  rationale: Refers to the ornamental/priestly chest-piece worn on the high priest's
    breast. 'Breastpiece' is more precise and less misleading than 'breastplate,'
    which can suggest armor.
- source_word: מִשְׁפָּט
  chosen: of judgment
  alternatives:
  - for judgment
  - of decision
  lexicon: HALOT
  rationale: The construct phrase חֹשֶׁן מִשְׁפָּט is traditionally 'breastpiece of
    judgment.' This preserves the formal link to judicial decision/oracular function
    without over-interpreting the exact mechanism here.
- source_word: מַעֲשֵׂה חֹשֵׁב
  chosen: the work of a skillful designer
  alternatives:
  - skillfully woven work
  - the work of a craftsman
  - the work of an embroiderer
  lexicon: HALOT
  rationale: The phrase denotes expertly designed artisan work. 'Skillful designer'
    captures the participial sense of one devising patterned work, while remaining
    readable modern English.
- source_word: כְּמַעֲשֵׂה אֵפֹד
  chosen: like the work of the ephod
  alternatives:
  - like the workmanship of the ephod
  - according to the work of the ephod
  lexicon: HALOT
  rationale: A comparative phrase indicating the same kind or standard of craftsmanship
    as the ephod. 'Like the work of the ephod' is clear and close to the Hebrew.
- source_word: אֵפֹד
  chosen: ephod
  alternatives:
  - priestly vest
  lexicon: HALOT
  rationale: A technical term for a specific priestly garment; transliteration is
    preferable because no concise English equivalent fully captures it.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Straightforward material term in the list of construction materials.
- source_word: תְּכֵלֶת
  chosen: blue
  alternatives:
  - blue yarn
  - violet-blue
  lexicon: HALOT
  rationale: Standard rendering for the dye/color term in tabernacle textiles. 'Blue'
    is idiomatic; 'yarn' is supplied at the phrase level in English for the coordinated
    list.
- source_word: אַרְגָּמָן
  chosen: purple
  alternatives:
  - purple yarn
  - reddish-purple
  lexicon: HALOT
  rationale: Standard rendering for the luxury dye/color term. As with the surrounding
    items, 'yarn' is naturally supplied in English.
- source_word: תוֹלַעַת שָׁנִי
  chosen: scarlet yarn
  alternatives:
  - scarlet
  - crimson yarn
  lexicon: HALOT
  rationale: This expression denotes scarlet material/dyed thread. 'Scarlet yarn'
    makes explicit the textile sense in the coordinated materials list.
- source_word: שֵׁשׁ מָשְׁזָר
  chosen: finely twisted linen
  alternatives:
  - fine twined linen
  - fine twisted linen
  lexicon: HALOT
  rationale: A standard tabernacle-textile phrase. 'Finely twisted linen' is natural
    modern English and preserves the sense of quality and spun workmanship.
- source_word: תַּעֲשֶׂנּוּ ... תַּעֲשֶׂה אֹתוֹ
  chosen: you shall make it ... you shall make it
  alternatives:
  - make it ... make it
  lexicon: HALOT
  rationale: The repeated verb is retained in English to reflect the Hebrew's emphatic
    instructional style rather than compressing the sentence too much.
