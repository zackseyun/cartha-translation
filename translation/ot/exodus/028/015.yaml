theological_decisions:
- issue: Function of חֹשֶׁן מִשְׁפָּט
  chosen_reading: Rendered formally as 'breastpiece of judgment' without specifying
    more than the Hebrew states.
  alternative_readings:
  - breastpiece for decision
  - breastpiece of justice
  rationale: The phrase has cultic/judicial significance, likely connected with priestly
    decision-making, but the verse itself does not explain the mechanism. Preserving
    'judgment' maintains theological and ritual resonance without importing a narrower
    interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
