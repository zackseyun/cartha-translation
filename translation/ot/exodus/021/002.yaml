theological_decisions:
- issue: Rendering of עֶבֶד in a legal slavery context
  chosen_reading: slave
  alternative_readings:
  - servant
  - bondservant
  rationale: The verse concerns a purchased person under bonded service with a fixed
    term. Per project philosophy, 'slave' is used where the bonded nature is salient
    rather than softening to 'servant.'
