id: EXO.21.2
reference: Exodus 21:2
source:
  edition: WLC
  text: כִּ֤י תִקְנֶה֙ עֶ֣בֶד עִבְרִ֔י שֵׁ֥שׁ שָׁנִ֖ים יַעֲבֹ֑ד וּ/בַ֨/שְּׁבִעִ֔ת
    יֵצֵ֥א לַֽ/חָפְשִׁ֖י חִנָּֽם׃
translation:
  text: If you buy a Hebrew slave, he shall serve six years, but in the seventh he
    shall go out free, without payment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'When you buy a Hebrew slave.' The Hebrew conditional particle can introduce
      a case law with either 'if' or 'when' in English.
    reason: lexical_alternative
  - marker: b
    text: Or 'he shall go out to freedom for nothing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a casuistic law condition. 'If' is standard and natural in
    English legal style; 'When' is possible but slightly more assumptive.
- source_word: תִקְנֶה
  chosen: you buy
  alternatives:
  - you acquire
  - you purchase
  lexicon: HALOT
  rationale: Qal of קנה commonly means 'buy/acquire.' 'Buy' best fits the legal-commercial
    context and is clear modern English.
- source_word: עֶבֶד
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: HALOT
  rationale: In keeping with the project's guidance, 'slave' is preferred where bonded
    status is salient. This law regulates purchased bonded labor, so 'slave' is more
    transparent than 'servant.'
- source_word: עִבְרִי
  chosen: Hebrew
  alternatives:
  - Israelite
  lexicon: HALOT
  rationale: The adjective/noun is specifically 'Hebrew,' not the broader ethnonym
    'Israelite.' Retaining 'Hebrew' follows the source text closely.
- source_word: שֵׁשׁ שָׁנִים
  chosen: six years
  lexicon: HALOT
  rationale: Straightforward duration phrase.
- source_word: יַעֲבֹד
  chosen: he shall serve
  alternatives:
  - he shall work
  - he shall serve as a slave
  lexicon: HALOT
  rationale: The verb עבד means 'serve/work.' 'Serve' is idiomatic in legal English
    and avoids overloading the clause since 'slave' already conveys status.
- source_word: וּבַשְּׁבִעִת
  chosen: but in the seventh
  alternatives:
  - and in the seventh
  - but in the seventh year
  lexicon: HALOT
  rationale: The conjunction plus temporal phrase marks contrast with the six-year
    term. 'But' brings out the release contrast naturally; 'year' is implied from
    context and need not be repeated.
- source_word: יֵצֵא
  chosen: he shall go out
  alternatives:
  - he shall leave
  - he shall be released
  lexicon: HALOT
  rationale: '''Go out'' preserves the Hebrew idiom of exit/release while remaining
    understandable. It also pairs naturally with the following freedom phrase.'
- source_word: לַחָפְשִׁי
  chosen: free
  alternatives:
  - to freedom
  - as a free man
  lexicon: HALOT
  rationale: The phrase denotes release into freedom. 'Free' is concise and idiomatic
    after 'go out.'
- source_word: חִנָּם
  chosen: without payment
  alternatives:
  - for nothing
  - free of charge
  lexicon: HALOT
  rationale: Clarifies that the release requires no redemption payment. 'Without payment'
    is precise and natural in contemporary English.
