theological_decisions:
- issue: Meaning of הָאֱלֹהִים in a legal setting
  chosen_reading: God
  alternative_readings:
  - the judges
  rationale: The Hebrew term most basically means 'God,' and the phrase can naturally
    describe presentation before God in a covenantal/legal rite. However, because
    some interpreters understand it metonymically as the human judges or court, that
    alternative is preserved in a footnote to maintain transparency and interpretive
    tension.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
