id: EXO.21.6
reference: Exodus 21:6
source:
  edition: WLC
  text: וְ/הִגִּישׁ֤/וֹ אֲדֹנָי/ו֙ אֶל הָ֣/אֱלֹהִ֔ים וְ/הִגִּישׁ/וֹ֙ אֶל הַ/דֶּ֔לֶת
    א֖וֹ אֶל הַ/מְּזוּזָ֑ה וְ/רָצַ֨ע אֲדֹנָ֤י/ו אֶת אָזְנ/וֹ֙ בַּ/מַּרְצֵ֔עַ וַ/עֲבָד֖/וֹ
    לְ/עֹלָֽם־־־־׃ס
translation:
  text: then his master shall bring him to God, and shall bring him to the door or
    to the doorpost, and his master shall pierce his ear with an awl; and he shall
    serve him permanently.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the judges.' The Hebrew אֱלֹהִים can in some legal contexts refer
      to human judges or a judicial authority.
    reason: alternative_reading
lexical_decisions:
- source_word: הִגִּישׁוֹ
  chosen: shall bring him
  alternatives:
  - shall present him
  - shall bring him near
  lexicon: HALOT
  rationale: The Hiphil of נגשׁ here denotes causing someone to come before an authority
    or to a designated place. 'Bring him' is natural English and preserves the procedural
    sense in this legal context.
- source_word: אֲדֹנָיו
  chosen: his master
  alternatives:
  - his lord
  - his owner
  lexicon: HALOT
  rationale: In the context of Hebrew debt-slavery law, 'master' best conveys the
    social-legal relationship without importing divine overtones that 'lord' might
    suggest. It also fits the immediate context of a slave choosing permanent service.
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the judges
  lexicon: HALOT
  rationale: The form can denote either God or human judges in some legal texts. Here
    the most straightforward reading is 'God,' likely indicating presentation before
    God in a sacred/judicial setting, with the concrete door/doorpost rite following.
    Because the alternative 'the judges' is longstanding and plausible in covenant-law
    context, it is preserved in a footnote rather than resolved silently.
- source_word: הַדֶּלֶת
  chosen: the door
  alternatives:
  - the door panel
  lexicon: HALOT
  rationale: Standard rendering for the household door. The ritual location is literal
    and should remain simple and concrete.
- source_word: הַמְּזוּזָה
  chosen: the doorpost
  alternatives:
  - the doorframe
  lexicon: HALOT
  rationale: '''Doorpost'' is the conventional and precise rendering for מזוזה in
    architectural contexts.'
- source_word: רָצַע
  chosen: shall pierce
  alternatives:
  - shall bore through
  - shall awl through
  lexicon: HALOT
  rationale: The verb refers to boring or piercing, specifically of the ear in this
    manumission-related rite. 'Pierce' is clear modern English and fits the object
    'ear'.
- source_word: אָזְנוֹ
  chosen: his ear
  lexicon: HALOT
  rationale: Literal body-part reference; no reason to paraphrase.
- source_word: בַּמַּרְצֵעַ
  chosen: with an awl
  alternatives:
  - with a piercing tool
  lexicon: HALOT
  rationale: מרצע is a pointed implement used for boring; 'awl' is the standard precise
    English equivalent.
- source_word: וַעֲבָדוֹ
  chosen: and he shall serve him
  alternatives:
  - and he shall be his slave
  - and he shall work for him
  lexicon: HALOT
  rationale: The verb עבד means 'serve/work.' Here the bonded nature is already established
    by context, but the clause states ongoing service rather than re-labeling status.
    'Serve him' is the most direct rendering.
- source_word: לְעֹלָם
  chosen: permanently
  alternatives:
  - forever
  - for life
  lexicon: HALOT
  rationale: In this legal context, עולם refers to enduring lifelong status rather
    than metaphysical endlessness. 'Permanently' communicates the practical force
    in readable modern English; 'forever' could mislead, while 'for life' is interpretive
    though close.
