theological_decisions:
- issue: Scope of the legal offense
  chosen_reading: The verse prohibits kidnapping/man-stealing, whether the victim
    has already been sold or is still found in the kidnapper's possession.
  alternative_readings:
  - 'The second clause may be read simply as an additional circumstance: ''and he
    is found in his hand'' rather than a disjunctive legal alternative.'
  rationale: The syntax links the theft of a person with either sale or continued
    possession as grounds for the death penalty. Rendering the conjunction as 'or'
    makes the legal force explicit in English and reflects the common sense of the
    case law.
