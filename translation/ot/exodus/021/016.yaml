id: EXO.21.16
reference: Exodus 21:16
source:
  edition: WLC
  text: וְ/גֹנֵ֨ב אִ֧ישׁ וּ/מְכָר֛/וֹ וְ/נִמְצָ֥א בְ/יָד֖/וֹ מ֥וֹת יוּמָֽת׃ס
translation:
  text: Whoever kidnaps a man and sells him, or he is found in his hand, shall surely
    be put to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'steals a man.' In context this refers to kidnapping or man-stealing.
    reason: lexical_alternative
  - marker: b
    text: 'Or, ''or he is found in his possession.'' Hebrew: ''in his hand,'' an idiom
      for possession or control.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גֹנֵב
  chosen: kidnaps
  alternatives:
  - steals
  - steals away
  lexicon: HALOT
  rationale: Although the participle of גנב is literally 'stealing,' with אִישׁ as
    its object and followed by selling or possession of the person, the sense is specifically
    man-stealing/kidnapping. 'Kidnaps' communicates the legal offense clearly in modern
    English without losing the underlying theft concept.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: The Hebrew is singular masculine אִישׁ. Per gender-accurate policy, 'a
    man' best matches the source form. In this legal context it likely has representative
    force, but the translation preserves the masculine wording of the Hebrew rather
    than neutralizing it.
- source_word: וּמְכָרוֹ
  chosen: and sells him
  alternatives:
  - and sells him off
  lexicon: HALOT
  rationale: The verb מכר with 3ms suffix refers to selling the kidnapped person.
    'Sells him' is direct and natural, preserving the object suffix.
- source_word: וְנִמְצָא בְיָדוֹ
  chosen: or he is found in his hand
  alternatives:
  - or he is found in his possession
  - and he is found in his hand
  lexicon: HALOT
  rationale: 'The Niphal of מצא means ''is found,'' and בידו is literally ''in his
    hand,'' an idiom for possession/control. The conjunction can be read as continuing
    the legal alternatives: whether he has sold the victim or the victim is still
    found in his possession. The main text keeps the literal idiom closely enough
    for auditability while remaining intelligible.'
- source_word: מֹות יוּמָת
  chosen: shall surely be put to death
  alternatives:
  - must certainly be put to death
  - shall surely die
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the penalty. In
    legal English, 'shall surely be put to death' best conveys the formal judicial
    sentence rather than mere prediction of death.
