id: EXO.21.18
reference: Exodus 21:18
source:
  edition: WLC
  text: וְ/כִֽי יְרִיבֻ֣/ן אֲנָשִׁ֔ים וְ/הִכָּה אִישׁ֙ אֶת רֵעֵ֔/הוּ בְּ/אֶ֖בֶן א֣וֹ
    בְ/אֶגְרֹ֑ף וְ/לֹ֥א יָמ֖וּת וְ/נָפַ֥ל לְ/מִשְׁכָּֽב־־־׃
translation:
  text: If men quarrel and one strikes his neighbor with a stone or with his fist,
    and he does not die but is confined to bed,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'falls to bed'—that is, he is laid up or confined to bed from
      the injury.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a case law scenario. 'If' is standard and natural in English
    casuistic law, though 'when' is possible.
- source_word: יְרִיבֻן
  chosen: quarrel
  alternatives:
  - fight
  - contend
  lexicon: HALOT
  rationale: The verb ריב commonly denotes disputing or contending. 'Quarrel' fits
    the legal setting and can include escalation into violence without overstating
    it as full combat.
- source_word: אֲנָשִׁים
  chosen: men
  alternatives:
  - people
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine plural and here refers to male
    parties in a legal case. Per gender-accurate policy, 'men' is preferred over a
    neutral expansion.
- source_word: וְהִכָּה אִישׁ אֶת רֵעֵהוּ
  chosen: one strikes his neighbor
  alternatives:
  - a man strikes another
  - one strikes his companion
  lexicon: HALOT
  rationale: This clause individualizes one participant in the quarrel. 'Neighbor'
    is a natural rendering of רֵעַ in interpersonal legal contexts; 'one' avoids awkward
    repetition of 'man' while preserving singular reference.
- source_word: בְּאֶבֶן
  chosen: with a stone
  alternatives:
  - by a stone
  lexicon: HALOT
  rationale: Instrumental beth is best rendered 'with.' 'Stone' is the plain sense.
- source_word: אוֹ בְאֶגְרֹף
  chosen: or with his fist
  alternatives:
  - or with the fist
  lexicon: HALOT
  rationale: אֶגְרֹף denotes a fist. Adding 'his' makes idiomatic English and reflects
    the likely personal instrument of the blow.
- source_word: וְלֹא יָמוּת
  chosen: and he does not die
  alternatives:
  - but he does not die
  lexicon: HALOT
  rationale: The clause states the immediate outcome of the assault. 'And' preserves
    the Hebrew coordination; English sense is adversative in context but does not
    require stronger recasting.
- source_word: וְנָפַל לְמִשְׁכָּב
  chosen: but is confined to bed
  alternatives:
  - and falls to bed
  - and is bedridden
  - and takes to his bed
  lexicon: HALOT
  rationale: Literally 'falls to bed,' an idiom meaning being laid up from injury.
    'Is confined to bed' communicates the result clearly in modern English while staying
    close to the sense.
