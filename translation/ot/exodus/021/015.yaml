theological_decisions:
- issue: Rendering the legal penalty formula
  chosen_reading: shall surely be put to death
  alternative_readings:
  - must die
  rationale: The verse states a judicial penalty, not merely the outcome of death.
    The passive formulation reflects execution under legal sanction rather than simple
    mortality. No doctrinally contested term is involved, but the legal force should
    be preserved.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    plain sense without paraphrase.'
