id: EXO.21.15
reference: Exodus 21:15
source:
  edition: WLC
  text: וּ/מַכֵּ֥ה אָבִ֛י/ו וְ/אִמּ֖/וֹ מ֥וֹת יוּמָֽת׃
translation:
  text: Whoever strikes his father or his mother shall surely be put to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'and his mother'; rendered 'or his mother' in English to reflect
      the legal sense that striking either parent is in view.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַכֵּה
  chosen: strikes
  alternatives:
  - hits
  - attacks
  - beats
  lexicon: HALOT
  rationale: From נכה, a participial form meaning one who strikes/smites. 'Strikes'
    is clear modern English and preserves the legal, physical-act sense without overstating
    the severity to 'beats' or narrowing it to a weapon attack.
- source_word: אָבִיו
  chosen: his father
  alternatives:
  - his parent
  lexicon: HALOT
  rationale: The Hebrew is specifically singular masculine 'his father,' not the more
    general 'parent.' Gender-accurate rendering follows the source text and preserves
    the legal formulation.
- source_word: אִמּוֹ
  chosen: his mother
  alternatives:
  - his parent
  lexicon: HALOT
  rationale: The Hebrew explicitly names 'his mother.' Rendering both parents separately
    preserves the source's coordinate structure and legal specificity.
- source_word: מוֹת יוּמָת
  chosen: shall surely be put to death
  alternatives:
  - shall certainly be put to death
  - must be put to death
  lexicon: HALOT
  rationale: This infinitive absolute + finite verb construction intensifies the passive
    causative verb and is a standard legal formula for the death penalty. 'Shall surely
    be put to death' preserves both the solemnity and the passive legal idiom better
    than the less formal 'must die.'
- source_word: וּ / וְ
  chosen: or
  alternatives:
  - and
  lexicon: Hebrew grammar
  rationale: Although the conjunction is formally 'and,' in this casuistic legal context
    English idiom requires 'or' to convey that striking either parent incurs the penalty.
    Retaining 'and' in English could misleadingly suggest both parents must be struck.
    This is an optimal-equivalence adjustment to preserve the law's plain sense.
