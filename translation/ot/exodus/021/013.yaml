id: EXO.21.13
reference: Exodus 21:13
source:
  edition: WLC
  text: וַ/אֲשֶׁר֙ לֹ֣א צָדָ֔ה וְ/הָ/אֱלֹהִ֖ים אִנָּ֣ה לְ/יָד֑/וֹ וְ/שַׂמְתִּ֤י לְ/ךָ֙
    מָק֔וֹם אֲשֶׁ֥ר יָנ֖וּס שָֽׁמָּ/ה׃ס
translation:
  text: But if he did not lie in wait, and God let it happen by his hand, then I will
    appoint for you a place to which he may flee.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and God caused it to come into his hand.' The Hebrew
      expresses providential occurrence through the killer's agency, not premeditated
      intent.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲשֶׁר
  chosen: But if
  alternatives:
  - and whoever
  - but whoever
  - and if
  lexicon: HALOT
  rationale: Introduces a contrasting conditional case relative to the previous verse.
    English idiom prefers an explicit conditional here rather than a wooden relative
    clause.
- source_word: לֹא צָדָה
  chosen: did not lie in wait
  alternatives:
  - did not hunt
  - did not intend
  - did not premeditate
  lexicon: HALOT
  rationale: The verb צדה in this legal context refers to lying in wait or premeditated
    intent rather than literal hunting. This best captures the contrast with intentional
    murder in the preceding verse.
- source_word: וְהָאֱלֹהִים
  chosen: and God
  alternatives:
  - and the judges
  - and God
  lexicon: HALOT
  rationale: Although אֱלֹהִים can in some contexts refer to judges, here the clause
    speaks of providential occurrence ('let it happen by his hand'), which fits divine
    agency rather than human judicial action.
- source_word: אִנָּה לְיָדוֹ
  chosen: let it happen by his hand
  alternatives:
  - caused it to come into his hand
  - delivered it into his hand
  - made it happen to his hand
  lexicon: HALOT
  rationale: This idiom indicates that the death occurred providentially through the
    killer's agency without premeditation. 'Let it happen by his hand' preserves both
    divine causation and human instrumentality in natural English.
- source_word: וְשַׂמְתִּי לְךָ מָקוֹם
  chosen: then I will appoint for you a place
  alternatives:
  - and I will set for you a place
  - and I will designate for you a place
  lexicon: HALOT
  rationale: In legal-administrative context, 'appoint' or 'designate' conveys establishment
    of an authorized place of refuge. 'Appoint' is concise and natural.
- source_word: אֲשֶׁר יָנוּס שָׁמָּה
  chosen: to which he may flee
  alternatives:
  - where he shall flee
  - to which he can flee
  - where he may escape
  lexicon: HALOT
  rationale: יָנוּס denotes fleeing for refuge. 'May flee' fits the legal provision
    without overstating certainty, and 'to which' reflects the directional sense of
    שָׁמָּה.
