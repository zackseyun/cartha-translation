theological_decisions:
- issue: Divine agency in accidental killing
  chosen_reading: and God let it happen by his hand
  alternative_readings:
  - and God caused it to come into his hand
  - and the judges delivered him into his hand
  rationale: 'The Hebrew presents God''s providential involvement without implying
    moral culpability for murder. The rendering preserves the text''s tension: the
    act was unpremeditated, yet it occurred under divine providence. The alternative
    ''caused it to come into his hand'' is more literal but less natural in English;
    ''judges'' is less likely in this context.'
  doctrine_reference: Preserve theological tension rather than resolve it.
