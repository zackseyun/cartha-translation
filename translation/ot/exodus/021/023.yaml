theological_decisions:
- issue: Scope of the injury described by אָסוֹן in this law
  chosen_reading: Render broadly as 'harm' without specifying whether the harm is
    to the woman, the child, or whether it is necessarily fatal.
  alternative_readings:
  - Render as 'serious injury'
  - Render as 'fatality'
  rationale: The verse itself states the legal consequence in general terms and does
    not explicitly narrow the referent or severity beyond the occurrence of אָסוֹן.
    To preserve interpretive tension and avoid importing a debated resolution from
    the surrounding passage, the translation keeps the broader term 'harm.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
