id: EXO.21.23
reference: Exodus 21:23
source:
  edition: WLC
  text: וְ/אִם אָס֖וֹן יִהְיֶ֑ה וְ/נָתַתָּ֥ה נֶ֖פֶשׁ תַּ֥חַת נָֽפֶשׁ־׃
translation:
  text: But if there is harm, then you shall give life for life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'serious injury' or 'fatality'; the Hebrew term can denote grave harm
      or disaster, and interpreters differ on whether the context implies injury in
      general or death in particular.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional contrast with the previous verse. 'But if' captures
    the adversative force in context better than a bare 'if' while remaining natural
    English.
- source_word: אָסוֹן
  chosen: harm
  alternatives:
  - serious injury
  - mischief
  - fatality
  lexicon: HALOT
  rationale: The noun denotes injury/disaster without specifying in this verse alone
    whether the outcome is fatal. 'Harm' preserves the broader lexical range and fits
    the immediate legal formulation, while narrower options like 'fatality' overinterpret.
- source_word: יִהְיֶה
  chosen: there is
  alternatives:
  - it happens
  - there occurs
  lexicon: HALOT
  rationale: 'Existential rendering is idiomatic in English and reflects the simple
    verbal clause: ''if harm is/occurs.'''
- source_word: וְנָתַתָּה
  chosen: then you shall give
  alternatives:
  - then you shall pay
  - then you shall set
  lexicon: HALOT
  rationale: נתן literally means 'give.' In this legal context it can imply exact
    requital or imposed penalty. 'Give' preserves the formal wording while remaining
    intelligible; 'pay' would tilt toward monetary compensation, which the following
    phrase does not support.
- source_word: נֶפֶשׁ
  chosen: life
  alternatives:
  - soul
  - person
  lexicon: HALOT
  rationale: In the legal formula נֶפֶשׁ תַּחַת נָפֶשׁ, the sense is life rather than
    the more abstract 'soul.' 'Life for life' is the established and contextually
    accurate English equivalent.
- source_word: תַּחַת
  chosen: for
  alternatives:
  - instead of
  - in place of
  - under
  lexicon: HALOT
  rationale: In talionic legal language, תַּחַת marks substitution/equivalence. 'For'
    is concise and idiomatic in the formula 'life for life.'
- source_word: נָפֶשׁ
  chosen: life
  alternatives:
  - soul
  - person
  lexicon: HALOT
  rationale: Repeated to preserve the lexical correspondence and legal symmetry of
    the Hebrew phrase.
