id: EXO.21.3
reference: Exodus 21:3
source:
  edition: WLC
  text: אִם בְּ/גַפּ֥/וֹ יָבֹ֖א בְּ/גַפּ֣/וֹ יֵצֵ֑א אִם בַּ֤עַל אִשָּׁה֙ ה֔וּא וְ/יָצְאָ֥ה
    אִשְׁתּ֖/וֹ עִמּֽ/וֹ־־׃
translation:
  text: If he comes in by himself, he shall go out by himself; if he is the husband
    of a wife, then his wife shall go out with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'by his גַּף' is an idiom meaning he came in alone or unaccompanied.
    reason: lexical_alternative
  - marker: b
    text: Or more idiomatically, 'if he is married.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּגַפּוֹ
  chosen: by himself
  alternatives:
  - alone
  - single
  lexicon: HALOT
  rationale: The idiom literally involves 'with his body/person' or 'with his back,'
    but in this legal context it means entering unaccompanied, without dependents.
    'By himself' is natural modern English and preserves the legal sense better than
    a wooden literalism.
- source_word: יָבֹא
  chosen: comes in
  alternatives:
  - enters
  - comes
  lexicon: HALOT
  rationale: In context of a slave entering service, 'comes in' matches the paired
    legal formula with 'go out' and reflects the Hebrew verb plainly.
- source_word: יֵצֵא
  chosen: shall go out
  alternatives:
  - shall leave
  - shall depart
  lexicon: HALOT
  rationale: In this manumission law, יצא refers to leaving service. 'Shall go out'
    preserves the formal legal parallel with 'comes in' and echoes the Hebrew structure.
- source_word: בַּעַל אִשָּׁה
  chosen: the husband of a wife
  alternatives:
  - married
  - a married man
  - the owner of a wife
  lexicon: HALOT
  rationale: בעל אשה is an idiom meaning 'married man' or 'husband.' To preserve the
    source's gendered and relational wording while remaining readable, 'the husband
    of a wife' is used in the draft. The smoother English alternative 'married' is
    possible but less formally transparent.
- source_word: וְיָצְאָה אִשְׁתּוֹ עִמּוֹ
  chosen: then his wife shall go out with him
  alternatives:
  - and his wife shall leave with him
  lexicon: HALOT
  rationale: The feminine singular verb agrees with 'his wife.' 'Go out with him'
    keeps the legal idiom consistent and clearly states that a wife who entered with
    him leaves with him.
