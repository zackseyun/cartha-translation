id: EXO.21.20
reference: Exodus 21:20
source:
  edition: WLC
  text: וְ/כִֽי יַכֶּה֩ אִ֨ישׁ אֶת עַבְדּ֜/וֹ א֤וֹ אֶת אֲמָת/וֹ֙ בַּ/שֵּׁ֔בֶט וּ/מֵ֖ת
    תַּ֣חַת יָד֑/וֹ נָקֹ֖ם יִנָּקֵֽם־־־׃
translation:
  text: And if a man strikes his male slave or his female slave with a rod, and he
    dies under his hand, he must surely be avenged.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he shall surely be punished.' The Hebrew more literally says, 'he shall
      surely be avenged,' an emphatic legal formula.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כִֽי
  chosen: And if
  alternatives:
  - If
  - Now if
  lexicon: HALOT
  rationale: Introduces a casuistic law clause. 'And if' preserves the connective
    force of ו plus conditional כִּי in context.
- source_word: יַכֶּה
  chosen: strikes
  alternatives:
  - beats
  - hits
  lexicon: HALOT
  rationale: נכה is a broad verb for striking. 'Strikes' is sufficiently literal and
    avoids over-specifying the manner, while the following 'with a rod' supplies the
    instrument.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and in legal style commonly
    means 'a man.' This follows the gender-accurate policy rather than neutralizing
    the term.
- source_word: עַבְדּוֹ
  chosen: his male slave
  alternatives:
  - his slave
  - his servant
  lexicon: HALOT
  rationale: עבד in this legal context denotes bonded status, not mere service. Following
    the project's guidance, 'slave' is preferred where the bonded nature is salient.
    'Male' is supplied for clarity because the verse explicitly pairs male and female
    slaves.
- source_word: אֲמָתוֹ
  chosen: his female slave
  alternatives:
  - his slave-girl
  - his maidservant
  lexicon: HALOT
  rationale: אָמָה denotes a female slave/maidservant. 'Female slave' is clear, modern,
    and keeps parallelism with 'male slave'.
- source_word: בַּשֵּׁבֶט
  chosen: with a rod
  alternatives:
  - with the rod
  - with a staff
  lexicon: HALOT
  rationale: שבט can mean rod, staff, or scepter depending on context. Here it is
    an instrument of beating, so 'rod' best fits.
- source_word: וּמֵת
  chosen: and he dies
  alternatives:
  - so that he dies
  - and dies
  lexicon: HALOT
  rationale: The clause is sequential/resultative. 'And he dies' is natural English
    and leaves the legal consequence to the next clause.
- source_word: תַּחַת יָדוֹ
  chosen: under his hand
  alternatives:
  - at his hand
  - while in his power
  lexicon: HALOT
  rationale: 'A fairly literal rendering preserves the idiom and its legal force:
    the slave dies while under the master''s immediate blow/control. More interpretive
    renderings were avoided in the main text.'
- source_word: נָקֹם יִנָּקֵם
  chosen: he must surely be avenged
  alternatives:
  - vengeance shall surely be taken
  - he shall surely be punished
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the certainty. The
    Niphal of נקם is most directly 'be avenged.' 'Punished' captures legal consequence
    but is less lexically precise, so it is preserved as an alternative in a footnote
    rather than the main text.
