theological_decisions:
- issue: Nature of the legal consequence in נָקֹם יִנָּקֵם
  chosen_reading: Render the clause as 'he must surely be avenged' rather than specifying
    the exact penalty in the main text.
  alternative_readings:
  - he shall surely be punished
  - vengeance shall surely be taken on him
  rationale: The Hebrew states with emphasis that avenging action must occur, but
    does not itself spell out the precise judicial mechanism in this verse. A more
    specific gloss like 'punished' is possible but less transparent to the source
    wording. The translation preserves the legal severity without importing a narrower
    interpretation than the text states.
  doctrine_reference: Translation philosophy §§1, 3, 5
