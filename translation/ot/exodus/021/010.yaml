id: EXO.21.10
reference: Exodus 21:10
source:
  edition: WLC
  text: אִם אַחֶ֖רֶת יִֽקַּֽח ל֑/וֹ שְׁאֵרָ֛/הּ כְּסוּתָ֥/הּ וְ/עֹנָתָ֖/הּ לֹ֥א יִגְרָֽע־־׃
translation:
  text: If he takes another wife for himself, he shall not diminish her food, her
    clothing, or her marital rights.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her conjugal rights.' The Hebrew term refers to the husband's obligation
      of marital intimacy.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Standard conditional particle introducing a case law condition. 'If'
    best preserves the casuistic form.
- source_word: אַחֶרֶת
  chosen: another wife
  alternatives:
  - another woman
  - a second woman
  lexicon: HALOT
  rationale: The adjective means 'another,' but in this legal context of marriage
    obligations it refers to another woman taken as a wife. Supplying 'wife' in English
    makes the legal sense explicit without over-paraphrasing.
- source_word: יִקַּח לוֹ
  chosen: he takes another wife for himself
  alternatives:
  - he takes for himself another
  - he marries another
  lexicon: HALOT
  rationale: לקח with a woman in marital contexts commonly means 'take as wife.' 'For
    himself' reflects the pronominal suffix לוֹ, though idiomatic English places it
    later in the clause.
- source_word: שְׁאֵרָהּ
  chosen: her food
  alternatives:
  - her flesh-food
  - her provision
  - her sustenance
  lexicon: HALOT
  rationale: Though שְׁאֵר can literally relate to flesh/kin, in this triad of marital
    obligations the established and contextually fitting sense is material provision,
    especially food. 'Food' is clear modern English and matches the legal obligation
    in context.
- source_word: כְּסוּתָהּ
  chosen: her clothing
  alternatives:
  - her covering
  - her garment
  lexicon: HALOT
  rationale: The noun denotes covering or clothing. 'Clothing' is the most natural
    legal-English equivalent here.
- source_word: וְעֹנָתָהּ
  chosen: her marital rights
  alternatives:
  - her conjugal rights
  - her marital duty
  - her sexual relations
  lexicon: HALOT
  rationale: This difficult term refers to the husband's duty of marital intimacy
    at the proper time. 'Marital rights' is accurate, readable, and avoids both euphemistic
    vagueness and overly clinical phrasing. The more traditional 'conjugal rights'
    is preserved in a footnote.
- source_word: לֹא יִגְרָע
  chosen: he shall not diminish
  alternatives:
  - he shall not reduce
  - he shall not withhold
  lexicon: HALOT
  rationale: The verb means to diminish, lessen, or reduce. 'Shall not diminish' preserves
    the legal register and covers all three obligations in the list.
