id: EXO.21.17
reference: Exodus 21:17
source:
  edition: WLC
  text: וּ/מְקַלֵּ֥ל אָבִ֛י/ו וְ/אִמּ֖/וֹ מ֥וֹת יוּמָֽת׃ס
translation:
  text: Whoever curses his father or his mother shall surely be put to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'and his mother'; the sense in this legal formulation
      is distributive, referring to cursing either parent.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מְקַלֵּל
  chosen: Whoever curses
  alternatives:
  - And whoever curses
  - one who reviles
  lexicon: HALOT
  rationale: The participle מקלל functions substantivally in case-law style, introducing
    a general offender class. English 'whoever curses' best captures the legal-generic
    force in natural modern English. 'Curses' is preferred over broader 'reviles'
    because קלל in this stem commonly denotes speaking a curse against someone, especially
    in legal/prohibitive contexts.
- source_word: אָבִיו
  chosen: his father
  lexicon: HALOT
  rationale: Straightforward rendering of the noun with 3ms suffix. 'His' reflects
    the singular generic offender introduced by the participle; this is gender-accurate
    to the Hebrew legal formulation.
- source_word: וְאִמּוֹ
  chosen: or his mother
  alternatives:
  - and his mother
  lexicon: HALOT
  rationale: Although the conjunction is formally 'and,' English legal idiom often
    uses 'or' in paired alternatives after 'whoever curses,' and the sense is clearly
    either parent individually or both. 'Or' better communicates the distributive
    legal force without changing the law's scope.
- source_word: מוֹת יוּמָת
  chosen: shall surely be put to death
  alternatives:
  - must be put to death
  - shall certainly be executed
  lexicon: HALOT
  rationale: 'The infinitive absolute plus finite verb intensifies the passive causative:
    a fixed death penalty is prescribed. ''Shall surely be put to death'' preserves
    both the legal register and the emphatic force better than a flatter ''must die,''
    which could imply result rather than judicial sentence.'
