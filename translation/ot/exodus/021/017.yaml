theological_decisions:
- issue: Legal force of the parent pair
  chosen_reading: The offense applies to cursing either parent individually, rendered
    with 'or his mother.'
  alternative_readings:
  - Retain a more formally literal 'and his mother'
  rationale: The Hebrew conjunction is waw, but in this casuistic context the law
    concerns cursing father or mother as protected categories. Rendering with 'or'
    communicates the distributive legal sense in idiomatic English while preserving
    the statute's meaning.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
- issue: Rendering the death-penalty formula
  chosen_reading: Use 'shall surely be put to death' to reflect a judicial sentence.
  alternative_readings:
  - '''must die'''
  - '''shall certainly die'''
  rationale: The Hebrew passive causative with infinitive absolute indicates imposed
    capital punishment, not merely the fact of death. The chosen wording preserves
    the gravity and legal precision without paraphrase.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 5, 6
