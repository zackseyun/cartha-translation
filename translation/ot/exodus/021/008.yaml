id: EXO.21.8
reference: Exodus 21:8
source:
  edition: WLC
  text: אִם רָעָ֞ה בְּ/עֵינֵ֧י אֲדֹנֶ֛י/הָ אֲשֶׁר לא יְעָדָ֖/הּ וְ/הֶפְדָּ֑/הּ לְ/עַ֥ם
    נָכְרִ֛י לֹא יִמְשֹׁ֥ל לְ/מָכְרָ֖/הּ בְּ/בִגְד/וֹ בָֽ/הּ־־־־׃
translation:
  text: If she is displeasing in the eyes of her master, who has not designated her
    for himself, then he shall let her be redeemed. He has no right to sell her to
    a foreign people, since he has dealt deceitfully with her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who has designated/betrothed her for himself.' The Hebrew clause is
      textually and interpretively difficult.
    reason: textual_variant
  - marker: b
    text: Or, 'since he has acted treacherously toward her.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָעָה בְּעֵינֵי
  chosen: is displeasing in the eyes of
  alternatives:
  - is evil in the eyes of
  - does not please
  lexicon: HALOT
  rationale: The idiom means 'to be displeasing/unacceptable to' someone, not moral
    evil in an absolute sense. Retaining 'in the eyes of' preserves the Hebrew idiom
    while remaining readable.
- source_word: אֲדֹנֶיהָ
  chosen: her master
  alternatives:
  - her lord
  - her owner
  lexicon: HALOT
  rationale: In this legal context the term refers to the girl's male authority-holder/purchaser.
    'Master' best reflects the social-legal relationship without importing divine-title
    connotations of 'Lord.'
- source_word: יְעָדָהּ
  chosen: has designated her for himself
  alternatives:
  - has betrothed her to himself
  - has appointed her
  lexicon: HALOT
  rationale: The verb in this context concerns assigning or designating the girl for
    marriage/concubinage. 'Designated ... for himself' preserves the lexical breadth
    and avoids over-specifying beyond the form itself, while still fitting the legal
    context of the passage.
- source_word: וְהֶפְדָּהּ
  chosen: he shall let her be redeemed
  alternatives:
  - he shall redeem her
  - he must allow her redemption
  lexicon: HALOT
  rationale: The Hiphil of פדה here is commonly understood as permitting or effecting
    redemption. 'Let her be redeemed' captures the legal outcome without forcing the
    sense that the master himself necessarily pays the redemption price.
- source_word: לְעַם נָכְרִי
  chosen: to a foreign people
  alternatives:
  - to a foreign nation
  - to foreigners
  lexicon: HALOT
  rationale: The phrase is collective rather than focused on a single individual.
    'Foreign people' preserves the covenantal/social distinction in the Hebrew.
- source_word: לֹא יִמְשֹׁל לְמָכְרָהּ
  chosen: He has no right to sell her
  alternatives:
  - he shall not have power to sell her
  - he must not sell her
  lexicon: HALOT
  rationale: The idiom with משל expresses authority or legal power. 'Has no right'
    communicates the juridical force in natural English.
- source_word: בְּבִגְדוֹ בָהּ
  chosen: since he has dealt deceitfully with her
  alternatives:
  - because he has betrayed her
  - in his treachery against her
  lexicon: HALOT
  rationale: The infinitive/verb from בגד denotes acting treacherously or faithlessly.
    'Dealt deceitfully' is clear modern English and fits the legal-moral accusation
    that he failed in his obligation toward her.
