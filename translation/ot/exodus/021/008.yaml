theological_decisions:
- issue: Interpretation of יְעָדָהּ with the ketiv/qere-related ambiguity in this
    clause
  chosen_reading: who has not designated her for himself
  alternative_readings:
  - who has designated her for himself
  - who has not betrothed her
  rationale: The Masoretic tradition presents a known difficulty here, and ancient
    versions/readers differ on whether the clause is negative or affirmative and whether
    the sense is 'designate' or more specifically 'betroth.' The main text follows
    the reading reflected in the provided consonantal/morphological data ('not designated
    her') and keeps the marriage-oriented alternative in a footnote because the legal
    context concerns a female sold with expectation of marital arrangement.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
