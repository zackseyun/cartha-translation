id: EXO.21.28
reference: Exodus 21:28
source:
  edition: WLC
  text: וְ/כִֽי יִגַּ֨ח שׁ֥וֹר אֶת אִ֛ישׁ א֥וֹ אֶת אִשָּׁ֖ה וָ/מֵ֑ת סָק֨וֹל יִסָּקֵ֜ל
    הַ/שּׁ֗וֹר וְ/לֹ֤א יֵאָכֵל֙ אֶת בְּשָׂר֔/וֹ וּ/בַ֥עַל הַ/שּׁ֖וֹר נָקִֽי־־־־׃
translation:
  text: And if an ox gores a man or a woman and he dies, the ox shall surely be stoned,
    and its flesh shall not be eaten; but the owner of the ox is clear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is innocent' or 'is not liable.' The Hebrew simply states that the owner
      is נָקִי, a legal term of being clear or free from penalty in this case.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  chosen: And if
  alternatives:
  - If
  - Now if
  lexicon: HALOT
  rationale: Introduces a casuistic law clause. 'And if' preserves the connective
    force of ו while remaining natural in English legal style.
- source_word: יִגַּח
  chosen: gores
  alternatives:
  - butts
  - strikes with its horns
  lexicon: HALOT
  rationale: The verb specifically denotes goring with horns, not merely striking.
    'Gores' is the most precise and idiomatic legal-English equivalent.
- source_word: שׁוֹר
  chosen: ox
  alternatives:
  - bull
  - cattle
  lexicon: HALOT
  rationale: '''Ox'' is the standard singular rendering for שׁוֹר in legal contexts
    and does not over-specify sex as ''bull'' might.'
- source_word: אֶת אִישׁ א֥וֹ אֶת אִשָּׁה
  chosen: a man or a woman
  alternatives:
  - someone, whether a man or a woman
  lexicon: HALOT
  rationale: The Hebrew explicitly names both sexes. Following the gender-accurate
    principle, the translation preserves 'man or a woman' rather than collapsing to
    a generic 'person.'
- source_word: וָמֵת
  chosen: and he dies
  alternatives:
  - and the person dies
  - so that death results
  lexicon: HALOT
  rationale: The singular verb naturally refers to the gored human victim. 'He dies'
    is a formally close rendering; context makes clear this applies whether the victim
    is male or female.
- source_word: סָקוֹל יִסָּקֵל
  chosen: shall surely be stoned
  alternatives:
  - must be stoned to death
  - shall be stoned
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the command. 'Shall
    surely be stoned' preserves both the legal register and the emphatic force.
- source_word: וְלֹא יֵאָכֵל אֶת בְּשָׂרוֹ
  chosen: and its flesh shall not be eaten
  alternatives:
  - and no one shall eat its meat
  - but its flesh must not be eaten
  lexicon: HALOT
  rationale: בָּשָׂר is literally 'flesh.' 'Its flesh shall not be eaten' keeps the
    formal wording while remaining understandable.
- source_word: וּבַעַל הַשּׁוֹר
  chosen: but the owner of the ox
  alternatives:
  - and the master of the ox
  - and the possessor of the ox
  lexicon: HALOT
  rationale: בעל here denotes the legal owner. 'Owner' is the clearest modern legal
    equivalent.
- source_word: נָקִי
  chosen: is clear
  alternatives:
  - is innocent
  - is not liable
  - is acquitted
  lexicon: HALOT
  rationale: In this legal context נָקִי indicates freedom from liability or punishment.
    'Is clear' preserves the concise legal sense without importing a narrower modern
    courtroom nuance; alternatives are viable.
