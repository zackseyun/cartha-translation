id: EXO.21.31
reference: Exodus 21:31
source:
  edition: WLC
  text: אוֹ בֵ֥ן יִגָּ֖ח אוֹ בַ֣ת יִגָּ֑ח כַּ/מִּשְׁפָּ֥ט הַ/זֶּ֖ה יֵעָ֥שֶׂה לּֽ/וֹ־־׃
translation:
  text: If it gores a son or a daughter, it shall be done to him according to this
    judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the same legal penalty stated in the previous verse applies if
      the ox gores a son or a daughter.
    reason: cross_reference
  - marker: b
    text: Or 'according to this rule' or 'according to this ordinance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹ
  chosen: If
  alternatives:
  - Or
  lexicon: HALOT
  rationale: Although אוֹ commonly means 'or,' in this casuistic legal context it
    introduces an alternative case within the same law, which English idiom expresses
    naturally as 'If.' This preserves the legal flow from the previous verse.
- source_word: בֵן
  chosen: a son
  alternatives:
  - a boy
  - someone's son
  lexicon: HALOT
  rationale: בן is literally 'son.' 'A son' preserves the gender-specific wording
    of the Hebrew and matches the paired expression with 'daughter.'
- source_word: יִגָּח
  chosen: it gores
  alternatives:
  - he gores
  - it gores with its horns
  lexicon: HALOT
  rationale: From נגח, 'to gore.' The implied subject is the ox from the preceding
    context, so English supplies 'it.' 'Gores' is the precise legal and zoological
    term.
- source_word: בַת
  chosen: a daughter
  alternatives:
  - a girl
  - someone's daughter
  lexicon: HALOT
  rationale: בת is literally 'daughter.' 'A daughter' preserves the Hebrew's gender-specific
    pair and legal symmetry with 'a son.'
- source_word: כַּמִּשְׁפָּט הַזֶּה
  chosen: according to this judgment
  alternatives:
  - according to this rule
  - according to this ordinance
  - according to this legal ruling
  lexicon: HALOT
  rationale: משפט in legal material often denotes a legal judgment, rule, or prescribed
    case-law outcome. 'According to this judgment' stays close to the Hebrew while
    remaining intelligible, referring back to the penalty just stated in the preceding
    verse.
- source_word: יֵעָשֶׂה
  chosen: it shall be done
  alternatives:
  - he shall be dealt with
  - this shall be carried out
  lexicon: HALOT
  rationale: The Niphal of עשה is passive, 'it shall be done.' Retaining the passive
    mirrors the Hebrew legal style and leaves the implied action connected to the
    prior ruling.
- source_word: לּוֹ
  chosen: to him
  alternatives:
  - for him
  - against him
  lexicon: HALOT
  rationale: The preposition with pronominal suffix here indicates the person to whom
    the legal action applies, namely the ox's owner in context. 'To him' is the most
    literal and sufficiently clear rendering.
