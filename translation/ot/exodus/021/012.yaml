id: EXO.21.12
reference: Exodus 21:12
source:
  edition: WLC
  text: מַכֵּ֥ה אִ֛ישׁ וָ/מֵ֖ת מ֥וֹת יוּמָֽת׃
translation:
  text: Whoever strikes a man so that he dies shall surely be put to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'He who strikes a man and he dies shall surely be put
      to death.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַכֵּה
  chosen: strikes
  alternatives:
  - hits
  - strikes down
  lexicon: HALOT
  rationale: 'From נכה, a participial form introducing a case law scenario: ''one
    who strikes.'' ''Strikes'' is natural modern English and preserves the legal-casuistic
    force without over-specifying the result in the verb itself.'
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: אִישׁ ordinarily means 'man' or 'male person.' In this legal context
    it refers to an individual human victim. Per the gender-accurate philosophy, 'a
    man' is retained rather than neutralizing to 'a person,' while the English opening
    'Whoever' preserves the generic legal scope of the offender.
- source_word: וָמֵת
  chosen: so that he dies
  alternatives:
  - and he dies
  - with the result that he dies
  lexicon: HALOT
  rationale: The conjunction plus qatal of מות expresses the consequence of the striking.
    'So that he dies' communicates the result relation idiomatically in English better
    than a bare 'and he dies' in this legal formulation.
- source_word: מוֹת יוּמָת
  chosen: shall surely be put to death
  alternatives:
  - must be put to death
  - shall certainly be executed
  lexicon: HALOT
  rationale: 'The infinitive absolute with passive/imperfect intensifies the penalty:
    a formal legal death sentence. ''Shall surely be put to death'' preserves both
    the solemnity and the passive legal formulation better than the more interpretive
    ''executed.'''
