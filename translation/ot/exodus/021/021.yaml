theological_decisions:
- issue: Legal rationale in a slavery law
  chosen_reading: Retain the blunt economic rationale 'for he is his money' without
    softening.
  alternative_readings:
  - for he is his property
  - for the loss is his own
  rationale: The Hebrew text states the rationale starkly in economic terms. In keeping
    with original-language primacy and avoiding doctrinal or ethical softening, the
    translation preserves the text's severity rather than paraphrasing it into a less
    offensive but less accurate form.
  doctrine_reference: Translation philosophy 1, 6
- issue: Referent of the pronouns
  chosen_reading: Translate the victim as 'he' and the owner as 'his' according to
    the masculine singular legal case.
  alternative_readings:
  - use gender-neutral forms such as 'the person' or 'the slave'
  rationale: The Hebrew legal formulation is grammatically masculine singular. Per
    the gender-accurate principle, the English should reflect that rather than neutralizing
    it.
  doctrine_reference: Translation philosophy 4
