id: EXO.21.21
reference: Exodus 21:21
source:
  edition: WLC
  text: אַ֥ךְ אִם י֛וֹם א֥וֹ יוֹמַ֖יִם יַעֲמֹ֑ד לֹ֣א יֻקַּ֔ם כִּ֥י כַסְפּ֖/וֹ הֽוּא־׃ס
translation:
  text: However, if he remains alive for a day or two, he shall not be avenged, for
    he is his money.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he shall not be punished.' The Hebrew more specifically speaks of vengeance
      or legal retribution being exacted.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'for he is his money,' expressing the slave's economic value
      to the master.
    reason: cultural_note
lexical_decisions:
- source_word: אַךְ
  chosen: However
  alternatives:
  - But
  - Nevertheless
  - Only
  lexicon: HALOT
  rationale: Introduces an exception or qualification to the preceding case law. 'However'
    captures the adversative force in natural modern English better than the more
    wooden 'only' here.
- source_word: אִם
  chosen: if
  lexicon: HALOT
  rationale: Standard conditional particle introducing the case condition.
- source_word: יוֹם א֥וֹ יוֹמַיִם
  chosen: for a day or two
  alternatives:
  - a day or two
  - one day or two days
  lexicon: HALOT
  rationale: Idiomatic temporal expression. 'For a day or two' fits the English syntax
    with the following verb 'remains alive' and preserves the limited time span indicated
    by the Hebrew.
- source_word: יַעֲמֹד
  chosen: remains alive
  alternatives:
  - survives
  - continues standing
  - recovers
  lexicon: HALOT
  rationale: Literally 'stands,' but in this legal context it refers to continuing
    alive after the beating. 'Remains alive' is clearer than the overly literal 'stands'
    and avoids implying full recovery.
- source_word: לֹא יֻקַּם
  chosen: he shall not be avenged
  alternatives:
  - he shall not be punished
  - vengeance shall not be taken
  - he shall not be executed
  lexicon: HALOT
  rationale: From נקם in the Hophal, meaning to be avenged or have vengeance exacted.
    The clause concerns legal retribution for the master, not merely generic punishment.
    'Avenged' preserves the judicial-retaliatory sense better than 'punished.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the rationale for the legal ruling. 'For' is concise and natural
    in legal prose.
- source_word: כַסְפּוֹ
  chosen: his money
  alternatives:
  - his property
  - his silver
  lexicon: HALOT
  rationale: Literally 'his silver/money.' In context it refers to the slave as the
    master's economic loss. 'His money' is the most direct rendering of the Hebrew
    wording; 'property' is interpretive and broader than the source.
- source_word: הוּא
  chosen: he is
  alternatives:
  - it is
  lexicon: HALOT
  rationale: Masculine singular pronoun agreeing with the beaten slave in the legal
    scenario. Rendering it as 'he' preserves the personal reference present in the
    Hebrew, even though the rationale given is economic.
