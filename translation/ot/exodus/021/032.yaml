id: EXO.21.32
reference: Exodus 21:32
source:
  edition: WLC
  text: אִם עֶ֛בֶד יִגַּ֥ח הַ/שּׁ֖וֹר א֣וֹ אָמָ֑ה כֶּ֣סֶף שְׁלֹשִׁ֣ים שְׁקָלִ֗ים יִתֵּן֙
    לַֽ/אדֹנָ֔י/ו וְ/הַ/שּׁ֖וֹר יִסָּקֵֽל־׀׃ס
translation:
  text: If the ox gores a male slave or a female slave, he shall give thirty shekels
    of silver to his master, and the ox shall be stoned.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a slave, male or female.' The Hebrew distinguishes a male slave (עֶבֶד)
      and a female slave (אָמָה).
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶבֶד
  chosen: male slave
  alternatives:
  - slave
  - servant
  - bondservant
  lexicon: HALOT
  rationale: In this legal context the bonded status is salient, and the paired contrast
    with אָמָה supports a sex-specific rendering. 'Male slave' preserves both the
    institution and the masculine singular form better than the softer 'servant'.
- source_word: אָמָה
  chosen: female slave
  alternatives:
  - slave girl
  - maidservant
  - female servant
  lexicon: HALOT
  rationale: Paired with עֶבֶד, this denotes a female slave. 'Female slave' is clear
    modern English and preserves the legal-social force better than 'maidservant'.
- source_word: יִגַּח
  chosen: gores
  alternatives:
  - gore
  - butts
  lexicon: HALOT
  rationale: The verb נגח in ox-law contexts specifically refers to goring with the
    horns. 'Gores' is the standard precise English equivalent.
- source_word: כֶּסֶף שְׁלֹשִׁים שְׁקָלִים
  chosen: thirty shekels of silver
  alternatives:
  - thirty silver shekels
  - the silver of thirty shekels
  lexicon: HALOT
  rationale: This phrase states the amount of compensation in silver by shekel weight.
    'Thirty shekels of silver' is idiomatic and preserves the monetary-weight sense.
- source_word: יִתֵּן
  chosen: he shall give
  alternatives:
  - he must give
  - one shall give
  lexicon: HALOT
  rationale: The imperfect in this casuistic law expresses legal obligation. 'He shall
    give' preserves the formal legal register of the Hebrew.
- source_word: לַאדֹנָיו
  chosen: to his master
  alternatives:
  - to its owner
  - to the slave's master
  - to his lord
  lexicon: HALOT
  rationale: The suffix most naturally refers to the slave just mentioned, not the
    ox. In this legal setting, 'master' accurately reflects the ownership relation;
    'lord' would sound overly theological, and 'owner' is less idiomatic for a slaveholder.
- source_word: יִסָּקֵל
  chosen: shall be stoned
  alternatives:
  - must be stoned to death
  lexicon: HALOT
  rationale: The Niphal of סקל denotes execution by stoning. 'Shall be stoned' is
    sufficient because the legal consequence already implies death, and it matches
    the concise Hebrew.
