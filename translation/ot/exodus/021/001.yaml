theological_decisions:
- issue: Rendering of מִשְׁפָּטִים in covenant-law context
  chosen_reading: judgments
  alternative_readings:
  - ordinances
  - rules
  - laws
  rationale: This is primarily a lexical and genre-sensitive decision rather than
    a doctrinally contested one. 'Judgments' best reflects the Hebrew term's legal-judicial
    nuance and preserves continuity with the covenant code that follows.
  doctrine_reference: Translation philosophy §1, §5
