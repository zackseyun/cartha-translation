id: EXO.21.1
reference: Exodus 21:1
source:
  edition: WLC
  text: וְ/אֵ֨לֶּה֙ הַ/מִּשְׁפָּטִ֔ים אֲשֶׁ֥ר תָּשִׂ֖ים לִ/פְנֵי/הֶֽם׃
translation:
  text: 'Now these are the judgments that you shall set before them:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ordinances' or 'rules.' The Hebrew term refers to legal judgments or
      case laws.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֵלֶּה
  chosen: Now these
  alternatives:
  - And these
  - These
  lexicon: HALOT
  rationale: The conjunction ו plus demonstrative naturally links this section to
    what precedes. 'Now these' preserves the discourse transition in readable English;
    'And these' is more formally literal but less idiomatic in modern English.
- source_word: הַ/מִּשְׁפָּטִים
  chosen: the judgments
  alternatives:
  - the ordinances
  - the rules
  - the laws
  lexicon: HALOT
  rationale: מִשְׁפָּטִים can denote legal decisions, judgments, or ordinances. In
    this covenant-law context, 'judgments' preserves the lexical connection to judicial
    rulings without flattening the term into a generic 'laws.' 'Ordinances' is possible
    but sounds more ecclesiastical; 'rules' is too weak.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Standard relative pronoun introducing the clause. 'That' is natural modern
    English.
- source_word: תָּשִׂים
  chosen: you shall set
  alternatives:
  - you shall place
  - you shall put
  lexicon: HALOT
  rationale: שׂוּם commonly means 'set, place, put.' 'Set' works well idiomatically
    with the following prepositional phrase and retains the formal force of the instruction
    to Moses.
- source_word: לִ/פְנֵי/הֶם
  chosen: before them
  alternatives:
  - in front of them
  - before their faces
  lexicon: HALOT
  rationale: The idiom לִפְנֵי means 'before, in the presence of.' 'Before them' is
    the standard and natural legal/instructional rendering here, conveying presentation
    to the people.
