theological_decisions:
- issue: Nature of the obligation owed to the girl designated for the son
  chosen_reading: The verse requires that she be treated with the legal standing and
    protections due a daughter.
  alternative_readings:
  - The verse refers more narrowly to customary marriage arrangements for daughters.
  rationale: The phrase כמשפט הבנות is best taken juridically, emphasizing status
    and rights rather than mere social custom. This avoids minimizing the legal protection
    embedded in the law while not importing later doctrinal claims.
  doctrine_reference: Translation philosophy §§1, 3, 4, 5
