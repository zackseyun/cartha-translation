id: EXO.21.9
reference: Exodus 21:9
source:
  edition: WLC
  text: וְ/אִם לִ/בְנ֖/וֹ יִֽיעָדֶ֑/נָּה כְּ/מִשְׁפַּ֥ט הַ/בָּנ֖וֹת יַעֲשֶׂה לָּֽ/הּ־־׃
translation:
  text: But if he designates her for his son, he shall deal with her according to
    the rights of daughters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'according to the custom for daughters.' The Hebrew phrase can denote
      established legal practice or customary treatment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional case within a legal sequence. 'But if' fits
    the casuistic flow in English and marks contrast with the previous case.
- source_word: לִבְנוֹ
  chosen: for his son
  alternatives:
  - to his son
  lexicon: HALOT
  rationale: The preposition ל here indicates designation/allocation in marriage arrangement
    context, better expressed idiomatically as 'for his son' rather than the more
    wooden 'to his son.'
- source_word: יִיעָדֶנָּה
  chosen: designates her
  alternatives:
  - appoints her
  - betroths her
  - destines her
  lexicon: HALOT
  rationale: The verb יעד in this context refers to assigning or designating the girl
    for a marital relationship. 'Designates her' preserves the legal/formal sense
    without over-specifying 'betroths,' which is interpretive though contextually
    plausible.
- source_word: כְּמִשְׁפַּט
  chosen: according to the rights of
  alternatives:
  - according to the custom of
  - according to the rule for
  - according to the judgment of
  lexicon: HALOT
  rationale: מִשְׁפָּט in legal contexts often denotes prescribed legal right or due.
    'According to the rights of' captures the juridical force better than the vaguer
    'custom.'
- source_word: הַבָּנוֹת
  chosen: daughters
  alternatives:
  - girls
  - young women
  lexicon: HALOT
  rationale: The Hebrew specifically says 'the daughters.' In context it refers to
    the treatment/right due to daughters in the household, so 'daughters' is the most
    direct and gender-accurate rendering.
- source_word: יַעֲשֶׂה לָּהּ
  chosen: he shall deal with her
  alternatives:
  - he shall do for her
  - he shall treat her
  lexicon: HALOT
  rationale: עשה + ל expresses action toward someone. 'Deal with her' is idiomatic
    legal English and broad enough to cover the obligations implied by the law; 'treat
    her' is possible but slightly less formal.
