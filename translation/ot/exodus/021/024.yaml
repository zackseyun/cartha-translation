id: EXO.21.24
reference: Exodus 21:24
source:
  edition: WLC
  text: עַ֚יִן תַּ֣חַת עַ֔יִן שֵׁ֖ן תַּ֣חַת שֵׁ֑ן יָ֚ד תַּ֣חַת יָ֔ד רֶ֖גֶל תַּ֥חַת
    רָֽגֶל׃
translation:
  text: eye for eye, tooth for tooth, hand for hand, foot for foot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'eye instead of eye, tooth instead of tooth, hand instead of hand, foot
      instead of foot.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַיִן
  chosen: eye
  alternatives:
  - an eye
  lexicon: HALOT
  rationale: The noun plainly denotes the physical eye. English omits the article
    for idiomatic legal formula style, preserving the terse parallelism of the Hebrew.
- source_word: תַּחַת
  chosen: for
  alternatives:
  - under
  - instead of
  - in place of
  lexicon: HALOT
  rationale: In this legal context, תַּחַת expresses equivalence or corresponding
    recompense rather than spatial 'under.' 'For' is the established and most natural
    English rendering in the formula, conveying proportionality without overexplaining.
- source_word: שֵׁן
  chosen: tooth
  alternatives:
  - a tooth
  lexicon: HALOT
  rationale: The noun means 'tooth.' As with the other body-part terms, the anarthrous
    English form best reflects the concise case-law formulation.
- source_word: יָד
  chosen: hand
  alternatives:
  - a hand
  lexicon: HALOT
  rationale: The common sense is the physical hand. 'Hand' preserves the lexical correspondence
    and the rhythmic sequence of the verse.
- source_word: רֶגֶל
  chosen: foot
  alternatives:
  - leg
  - a foot
  lexicon: HALOT
  rationale: Although רֶגֶל can in some contexts refer more broadly to the leg or
    lower extremity, 'foot' is the most fitting equivalent here because of the fixed
    legal formula and the parallel with traditional and contextually precise body-part
    language.
