theological_decisions:
- issue: Nature of the legal formula
  chosen_reading: 'A concise statement of proportional recompense: ''eye for eye ...
    foot for foot.'''
  alternative_readings:
  - A more interpretive rendering such as 'the penalty shall match the injury'
  rationale: The Hebrew consists only of paired body-part nouns with תַּחַת. A more
    explanatory paraphrase would import interpretation beyond the verse's wording.
    Optimal equivalence here favors preserving the compact legal formula.
  doctrine_reference: 'Translation philosophy: original-language primacy; never paraphrase
    beyond what the source text warrants.'
