id: EXO.21.25
reference: Exodus 21:25
source:
  edition: WLC
  text: כְּוִיָּה֙ תַּ֣חַת כְּוִיָּ֔ה פֶּ֖צַע תַּ֣חַת פָּ֑צַע חַבּוּרָ֕ה תַּ֖חַת חַבּוּרָֽה׃ס
translation:
  text: burn for burn, wound for wound, bruise for bruise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stripe for stripe' for חַבּוּרָה, preserving the sense of a mark left
      by a blow.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּוִיָּה
  chosen: burn
  alternatives:
  - branding mark
  - burn injury
  lexicon: HALOT
  rationale: The noun denotes a burn or burn mark. 'Burn' is concise, idiomatic in
    legal formulae, and matches the injury-for-injury pattern of the verse. 'Branding
    mark' is too specific here, and 'burn injury' is more explanatory than the Hebrew
    requires.
- source_word: תַּחַת
  chosen: for
  alternatives:
  - instead of
  - in place of
  - under
  lexicon: HALOT
  rationale: In this legal context תַּחַת expresses equivalence or recompense. 'For'
    gives the standard concise English legal rhythm ('burn for burn') better than
    the more wooden 'instead of' or the overly literal 'under'.
- source_word: פֶּצַע
  chosen: wound
  alternatives:
  - injury
  - cut
  lexicon: HALOT
  rationale: The term refers broadly to a wound. 'Wound' preserves the concrete bodily
    sense and fits the triadic parallelism. 'Injury' is broader and less vivid; 'cut'
    is too narrow.
- source_word: חַבּוּרָה
  chosen: bruise
  alternatives:
  - stripe
  - contusion
  - blow-mark
  lexicon: HALOT
  rationale: The noun denotes a stripe, welt, or bruise resulting from a blow. 'Bruise'
    is the clearest modern English equivalent. 'Stripe' is traditional but less transparent
    to contemporary readers and can sound archaic or ambiguous.
