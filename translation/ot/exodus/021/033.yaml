id: EXO.21.33
reference: Exodus 21:33
source:
  edition: WLC
  text: וְ/כִֽי יִפְתַּ֨ח אִ֜ישׁ בּ֗וֹר א֠וֹ כִּֽי יִכְרֶ֥ה אִ֛ישׁ בֹּ֖ר וְ/לֹ֣א יְכַסֶּ֑/נּוּ
    וְ/נָֽפַל שָׁ֥מָּ/ה שּׁ֖וֹר א֥וֹ חֲמֽוֹר־־־׃
translation:
  text: And if a man opens a pit, or if a man digs a pit and does not cover it, and
    an ox or a donkey falls into it,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'uncovers a pit' for the first clause; the Hebrew verb is literally 'opens,'
      which may refer to opening an existing pit rather than digging a new one.
    reason: lexical_alternative
  - marker: b
    text: '''A man'' renders the Hebrew singular masculine legal formula אישׁ, used
      generically in casuistic law.'
    reason: cultural_note
lexical_decisions:
- source_word: וְ/כִי
  chosen: And if
  alternatives:
  - If
  - When
  lexicon: HALOT
  rationale: Introduces a casuistic law condition. 'And if' preserves the connective
    waw linking this case to the preceding laws while remaining natural in English.
- source_word: יִפְתַּח
  chosen: opens
  alternatives:
  - uncovers
  lexicon: HALOT
  rationale: The verb means 'open.' In context it refers to making an existing pit
    accessible/open, distinguished from digging a new one in the following clause.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: Gender-accurate rendering follows the Hebrew singular masculine casuistic
    formulation. Here it functions generically for a legal case, but the translation
    preserves the source form per philosophy.
- source_word: בּוֹר
  chosen: a pit
  alternatives:
  - a cistern
  - a hole
  lexicon: HALOT
  rationale: '''Pit'' is the broad, contextually appropriate term in this liability
    law. ''Cistern'' is possible in some contexts, but here the focus is on an uncovered
    excavation hazardous to livestock.'
- source_word: א֠וֹ כִּי
  chosen: or if
  alternatives:
  - or when
  lexicon: HALOT
  rationale: Marks the alternative legal scenario parallel to the first clause.
- source_word: יִכְרֶה
  chosen: digs
  alternatives:
  - excavates
  lexicon: HALOT
  rationale: Plain, natural rendering for the act of digging a pit; distinguishes
    this case from merely opening one.
- source_word: וְ/לֹא יְכַסֶּנּוּ
  chosen: and does not cover it
  alternatives:
  - but does not cover it
  - and does not conceal it
  lexicon: HALOT
  rationale: The verb here means to cover physically. 'Cover it' best fits the legal
    requirement to prevent animals from falling in.
- source_word: וְ/נָפַל
  chosen: and ... falls
  alternatives:
  - and ... has fallen
  lexicon: HALOT
  rationale: Though morphologically a qatal with waw, in this casuistic sequence it
    continues the conditional scenario naturally in English as present 'falls.'
- source_word: שָׁמָּה
  chosen: into it
  alternatives:
  - there
  - into that place
  lexicon: HALOT
  rationale: Idiomatic English requires the directional sense to be expressed as 'into
    it' rather than the more wooden 'there.'
- source_word: שּׁוֹר
  chosen: an ox
  alternatives:
  - a bull
  - cattle
  lexicon: HALOT
  rationale: '''Ox'' is the standard singular rendering in legal contexts for bovine
    livestock.'
- source_word: א֥וֹ חֲמוֹר
  chosen: or a donkey
  alternatives:
  - or an ass
  lexicon: HALOT
  rationale: '''Donkey'' is clear modern English and accurately renders the common
    domestic pack animal.'
