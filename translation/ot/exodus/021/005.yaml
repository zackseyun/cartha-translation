- issue: Rendering of עבד in Israelite servitude law
  chosen_reading: slave
  alternative_readings:
  - servant
  - bondservant
  rationale: The verse concerns release from bonded labor and the voluntary renunciation
    of that release; therefore the bonded nature is central. Per project philosophy,
    'slave' is preferred where that status is salient.
