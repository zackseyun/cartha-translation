id: EXO.21.5
reference: Exodus 21:5
source:
  edition: WLC
  text: וְ/אִם אָמֹ֤ר יֹאמַר֙ הָ/עֶ֔בֶד אָהַ֨בְתִּי֙ אֶת אֲדֹנִ֔/י אֶת אִשְׁתִּ֖/י
    וְ/אֶת בָּנָ֑/י לֹ֥א אֵצֵ֖א חָפְשִֽׁי־־־־׃
translation:
  text: But if the slave plainly says, ‘I love my master, my wife, and my children;
    I will not go out free,’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'surely says' / 'explicitly says'; the Hebrew uses an infinitive absolute
      with the finite verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or 'my sons'; the Hebrew is masculine plural, but here may refer to children
      generally in the household context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional exception to the prior case. 'But if' captures
    the contrastive force in context better than a bare 'if' while remaining natural
    English.
- source_word: אָמֹר יֹאמַר
  chosen: plainly says
  alternatives:
  - surely says
  - explicitly says
  - indeed says
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the statement. 'Plainly
    says' conveys emphatic, deliberate declaration in readable modern English.
- source_word: הָעֶבֶד
  chosen: the slave
  alternatives:
  - the servant
  - the bondservant
  lexicon: HALOT
  rationale: The legal context concerns a bonded person whose freedom is at issue,
    so the bonded nature is salient. This aligns with the project's guidance to prefer
    'slave' where the term's bonded status matters.
- source_word: אָהַבְתִּי
  chosen: I love
  alternatives:
  - I have loved
  lexicon: HALOT
  rationale: The perfect here expresses the speaker's present settled affection and
    commitment. English present tense is the most natural rendering in direct speech.
- source_word: אֲדֹנִי
  chosen: my master
  alternatives:
  - my lord
  - my owner
  lexicon: HALOT
  rationale: In this household-legal setting, 'master' best reflects the authority
    relationship between slave and household head. 'Lord' would sound overly exalted
    in English here.
- source_word: אִשְׁתִּי
  chosen: my wife
  lexicon: HALOT
  rationale: Straightforward possessive rendering.
- source_word: בָּנָי
  chosen: my children
  alternatives:
  - my sons
  lexicon: HALOT
  rationale: Although the Hebrew form is morphologically masculine plural ('sons'),
    in family-reference contexts it can function generically for offspring. 'My children'
    best fits natural English unless male children are specifically in view, which
    the verse does not require.
- source_word: לֹא אֵצֵא
  chosen: I will not go out
  alternatives:
  - I will not leave
  - I do not want to go out
  lexicon: HALOT
  rationale: '''Go out'' preserves the Hebrew idiom used for release from service
    while remaining understandable in English.'
- source_word: חָפְשִׁי
  chosen: free
  alternatives:
  - as a free man
  - freely
  lexicon: HALOT
  rationale: Predicate adjective describing the state in which he would depart. 'Free'
    is concise and idiomatic.
