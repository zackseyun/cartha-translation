id: EXO.21.19
reference: Exodus 21:19
source:
  edition: WLC
  text: אִם יָק֞וּם וְ/הִתְהַלֵּ֥ךְ בַּ/ח֛וּץ עַל מִשְׁעַנְתּ֖/וֹ וְ/נִקָּ֣ה הַ/מַּכֶּ֑ה
    רַ֥ק שִׁבְתּ֛/וֹ יִתֵּ֖ן וְ/רַפֹּ֥א יְרַפֵּֽא־־׃ס
translation:
  text: If he gets up and walks about outside on his staff, then the one who struck
    him shall be cleared; he must only pay for his lost time and make sure he is fully
    healed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'leaning on his staff.' The Hebrew phrase literally reads 'on his staff,'
      indicating supported walking as evidence of partial recovery.
    reason: lexical_alternative
  - marker: b
    text: '''His lost time'' refers to compensation for the injured man''s period
      of incapacity, that is, time away from normal work.'
    reason: cultural_note
  - marker: c
    text: The Hebrew emphatic expression literally reads 'healing he shall heal,'
      meaning he must ensure complete recovery, likely by covering medical treatment.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  lexicon: HALOT
  rationale: Standard conditional particle introducing the case law condition.
- source_word: יָקוּם
  chosen: he gets up
  alternatives:
  - he rises
  - he stands up
  lexicon: HALOT
  rationale: Qal of קום here denotes recovery sufficient to rise from bed after injury.
    'Gets up' is natural modern English in legal narrative context.
- source_word: וְהִתְהַלֵּךְ
  chosen: and walks about
  alternatives:
  - and walks
  - and goes about
  lexicon: HALOT
  rationale: Hitpael conveys iterative or ambulatory movement, not merely a single
    step. 'Walks about' reflects regained mobility.
- source_word: בַּחוּץ
  chosen: outside
  alternatives:
  - outdoors
  - in the open
  lexicon: HALOT
  rationale: Literally 'in/at the outside.' In context it indicates public movement
    beyond confinement, evidencing recovery.
- source_word: עַל מִשְׁעַנְתּוֹ
  chosen: on his staff
  alternatives:
  - leaning on his staff
  - with his cane
  lexicon: HALOT
  rationale: The phrase indicates supported walking. 'On his staff' is a close rendering;
    the support nuance is naturally understood in English.
- source_word: וְנִקָּה
  chosen: shall be cleared
  alternatives:
  - shall be acquitted
  - shall be free
  lexicon: HALOT
  rationale: Niphal of נקה in legal context means to be free from liability or punishment.
    'Shall be cleared' preserves juridical force without overstating a formal courtroom
    acquittal.
- source_word: הַמַּכֶּה
  chosen: the one who struck him
  alternatives:
  - the striker
  - the assailant
  lexicon: HALOT
  rationale: Substantivized participle from נכה, referring specifically to the person
    who inflicted the blow in the preceding case law.
- source_word: רַק
  chosen: only
  alternatives:
  - except that
  - provided only that
  lexicon: HALOT
  rationale: Restrictive particle limiting the offender's remaining obligation.
- source_word: שִׁבְתּוֹ
  chosen: his lost time
  alternatives:
  - his time away from work
  - his idleness
  - his sitting
  lexicon: HALOT
  rationale: Though literally related to 'sitting/dwelling,' in this injury-law context
    it refers to the victim's period of incapacity and resulting lost labor. 'Lost
    time' is the clearest idiomatic legal equivalent.
- source_word: יִתֵּן
  chosen: he must pay
  alternatives:
  - he shall give
  - he shall compensate
  lexicon: HALOT
  rationale: נתן literally means 'give,' but in legal compensation context English
    'pay' best conveys the required restitution.
- source_word: וְרַפֹּא יְרַפֵּא
  chosen: and make sure he is fully healed
  alternatives:
  - and he shall surely heal him
  - and pay for his healing
  - and have him thoroughly healed
  lexicon: HALOT
  rationale: Infinitive absolute + finite verb intensifies the obligation. Since the
    striker is not personally the healer, the sense is causative/responsibility for
    medical care until recovery. 'Make sure he is fully healed' captures both the
    emphatic construction and the legal duty.
