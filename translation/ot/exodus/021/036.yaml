id: EXO.21.36
reference: Exodus 21:36
source:
  edition: WLC
  text: א֣וֹ נוֹדַ֗ע כִּ֠י שׁ֣וֹר נַגָּ֥ח הוּא֙ מִ/תְּמ֣וֹל שִׁלְשֹׁ֔ם וְ/לֹ֥א יִשְׁמְרֶ֖/נּוּ
    בְּעָלָ֑י/ו שַׁלֵּ֨ם יְשַׁלֵּ֥ם שׁוֹר֙ תַּ֣חַת הַ/שּׁ֔וֹר וְ/הַ/מֵּ֖ת יִֽהְיֶה
    לּֽ/וֹ־׃ס
translation:
  text: Or if it was known that the ox was in the habit of goring from yesterday and
    the day before, and its owner did not keep it in, he must surely pay ox for ox,
    and the dead animal will be his.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from yesterday and the day before,'' an idiom meaning the ox
      had previously shown this behavior.'
    reason: cultural_note
  - marker: b
    text: Or 'accustomed to gore.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the carcass will be his.'
    reason: lexical_alternative
lexical_decisions:
- source_word: א֣וֹ
  chosen: Or
  alternatives:
  - But if
  - Or if
  lexicon: HALOT
  rationale: Introduces the alternative case following the previous verse. 'Or' preserves
    the disjunctive force succinctly; the conditional sense is carried by the clause
    that follows.
- source_word: נוֹדַע
  chosen: it was known
  alternatives:
  - it became known
  - it was established
  lexicon: HALOT
  rationale: 'Niphal of ידע here is impersonal/passive: the dangerous character of
    the ox was known. ''It was known'' is natural English and preserves the legal/passive
    sense.'
- source_word: כִּי
  chosen: that
  alternatives:
  - if
  - for
  lexicon: HALOT
  rationale: 'After נוֹדַע, כִּי introduces the content of what was known: ''that
    the ox was...''. This is more precise than making כִּי itself conditional.'
- source_word: שׁוֹר
  chosen: ox
  alternatives:
  - bull
  - cattle
  lexicon: HALOT
  rationale: '''Ox'' is the standard legal-context rendering for שׁוֹר in this passage
    and matches the case law setting better than the broader ''cattle'' or the more
    specific ''bull''.'
- source_word: נַגָּח
  chosen: in the habit of goring
  alternatives:
  - a goring ox
  - dangerous to gore
  - accustomed to gore
  lexicon: HALOT
  rationale: The adjective denotes an ox characterized by goring. 'In the habit of
    goring' communicates the ongoing dangerous propensity in idiomatic modern English.
- source_word: מִתְּמוֹל שִׁלְשֹׁם
  chosen: from yesterday and the day before
  alternatives:
  - previously
  - for some time
  lexicon: HALOT
  rationale: This Hebrew idiom literally refers to prior time. Rendering it more literally
    preserves the source imagery while remaining understandable.
- source_word: וְלֹא יִשְׁמְרֶנּוּ
  chosen: did not keep it in
  alternatives:
  - did not guard it
  - did not restrain it
  lexicon: HALOT
  rationale: In context of a known dangerous ox, שמר means to keep/guard it so it
    does not harm others. 'Keep it in' is idiomatic and contextually clear.
- source_word: בְּעָלָיו
  chosen: its owner
  alternatives:
  - its master
  - the owner of it
  lexicon: HALOT
  rationale: Refers to the legal possessor of the ox. 'Owner' is the clearest modern
    legal equivalent.
- source_word: שַׁלֵּם יְשַׁלֵּם
  chosen: he must surely pay
  alternatives:
  - he shall surely make restitution
  - he must pay in full
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the obligation. 'He
    must surely pay' preserves the emphatic legal force without sounding archaic.
- source_word: שׁוֹר תַּחַת הַשּׁוֹר
  chosen: ox for ox
  alternatives:
  - an ox in place of the ox
  - one ox for the ox
  lexicon: HALOT
  rationale: תַּחַת expresses substitution/compensation. 'Ox for ox' is concise and
    preserves the legal formula.
- source_word: וְהַמֵּת יִהְיֶה לּוֹ
  chosen: and the dead animal will be his
  alternatives:
  - and the dead one shall belong to him
  - and the carcass will be his
  lexicon: HALOT
  rationale: Refers to the dead ox from the incident becoming the property of the
    liable owner. 'Dead animal' is clear and avoids possible ambiguity of 'dead one'
    in English; 'carcass' is possible but slightly more interpretive.
