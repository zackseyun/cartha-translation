id: EXO.21.35
reference: Exodus 21:35
source:
  edition: WLC
  text: וְ/כִֽי יִגֹּ֧ף שֽׁוֹר אִ֛ישׁ אֶת שׁ֥וֹר רֵעֵ֖/הוּ וָ/מֵ֑ת וּ/מָ֨כְר֜וּ אֶת
    הַ/שּׁ֤וֹר הַ/חַי֙ וְ/חָצ֣וּ אֶת כַּסְפּ֔/וֹ וְ/גַ֥ם אֶת הַ/מֵּ֖ת יֶֽחֱצֽוּ/ן־־־־־־׃
translation:
  text: And if one man's ox strikes his neighbor's ox and it dies, then they shall
    sell the live ox and divide its price, and they shall also divide the dead one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gores' for 'strikes'; the Hebrew verb can denote an ox's forceful blow.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'divide its silver/money,' meaning the sale price of the live
      ox.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'the dead one'; that is, the dead ox.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  chosen: And if
  alternatives:
  - If
  - When
  lexicon: HALOT
  rationale: Introduces a casuistic legal condition. 'And if' preserves the Hebrew
    connective plus conditional force in the flow of the law code.
- source_word: יִגֹּף
  chosen: strikes
  alternatives:
  - gores
  - hits
  lexicon: HALOT
  rationale: The verb means to strike or gore. 'Strikes' is broader and more natural
    modern English, while still fitting an ox-inflicted blow; 'gores' is possible
    but more specific than the Hebrew requires in this context.
- source_word: שׁוֹר אִישׁ
  chosen: one man's ox
  alternatives:
  - a man's ox
  - the ox of a man
  lexicon: HALOT
  rationale: Expresses possession clearly in idiomatic English while preserving the
    singular masculine legal formulation.
- source_word: שׁוֹר רֵעֵהוּ
  chosen: his neighbor's ox
  alternatives:
  - the ox of his neighbor
  - another man's ox
  lexicon: HALOT
  rationale: רֵעַ commonly means neighbor, companion, or fellow. 'His neighbor's ox'
    is the most natural legal-English rendering and preserves the interpersonal dimension.
- source_word: וָמֵת
  chosen: and it dies
  alternatives:
  - so that it dies
  - and it is dead
  lexicon: HALOT
  rationale: Simple result clause following the strike. 'And it dies' is straightforward
    and idiomatic.
- source_word: וּמָכְרוּ
  chosen: then they shall sell
  alternatives:
  - and they shall sell
  - they must sell
  lexicon: HALOT
  rationale: The Hebrew wayyiqtol continues the legal consequence. 'Then they shall
    sell' makes the procedural sequence clear in English without over-interpreting
    as direct imperative.
- source_word: הַשּׁוֹר הַחַי
  chosen: the live ox
  alternatives:
  - the living ox
  lexicon: HALOT
  rationale: '''Live ox'' is concise, natural English for the surviving animal.'
- source_word: וְחָצוּ אֶת כַּסְפּוֹ
  chosen: divide its price
  alternatives:
  - divide its money
  - split the proceeds from it
  lexicon: HALOT
  rationale: כֶּסֶף here refers to the sale money/value of the ox. 'Its price' is
    more precise and natural than the literal 'its money'.
- source_word: וְגַם אֶת הַמֵּת יֶחֱצוּן
  chosen: and they shall also divide the dead one
  alternatives:
  - and they shall also divide the carcass
  - and they shall also split the dead ox
  lexicon: HALOT
  rationale: The Hebrew literally says 'the dead one.' This refers to the dead ox.
    'The dead one' preserves the source wording while remaining understandable from
    context; 'carcass' is interpretive though contextually plausible.
