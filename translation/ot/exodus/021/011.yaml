id: EXO.21.11
reference: Exodus 21:11
source:
  edition: WLC
  text: וְ/אִם שְׁלָ֨שׁ אֵ֔לֶּה לֹ֥א יַעֲשֶׂ֖ה לָ֑/הּ וְ/יָצְאָ֥ה חִנָּ֖ם אֵ֥ין כָּֽסֶף־־׃ס
translation:
  text: And if he does not do these three things for her, then she shall go out free,
    without payment of money.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if he does not provide these three things for her.' The Hebrew literally
      says 'does not do these three for her,' referring back to the food, clothing,
      and marital rights named in the previous verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: And if
  alternatives:
  - But if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional continuation from the prior case law. 'And if'
    preserves the connective force of ו while remaining natural in English legal style.
- source_word: שְׁלָשׁ אֵלֶּה
  chosen: these three things
  alternatives:
  - these three
  - all three of these
  lexicon: HALOT
  rationale: The feminine numeral with demonstrative points back to the three obligations
    in the previous verse. Supplying 'things' makes the English explicit and readable
    without adding new content.
- source_word: לֹא יַעֲשֶׂה לָהּ
  chosen: he does not do ... for her
  alternatives:
  - he does not provide ... for her
  - he does not grant her
  lexicon: HALOT
  rationale: עשה is broadly 'do/make.' Here it refers to carrying out the three obligations
    toward the woman. 'Do ... for her' stays close to the Hebrew while fitting the
    legal context; more interpretive options like 'provide' are possible but less
    formally transparent.
- source_word: וְיָצְאָה
  chosen: then she shall go out
  alternatives:
  - then she shall leave
  - then she shall go free
  lexicon: HALOT
  rationale: יצא in slave-law contexts commonly means to go out from bonded status.
    'Shall go out' preserves the idiom and legal register; freedom is then clarified
    by חנם.
- source_word: חִנָּם
  chosen: free
  alternatives:
  - for nothing
  - without charge
  lexicon: HALOT
  rationale: In this legal context חנם denotes release without cost. 'Free' is the
    most natural concise rendering in English and matches the sense of manumission.
- source_word: אֵין כָּסֶף
  chosen: without payment of money
  alternatives:
  - without money
  - for no silver
  - without any purchase price
  lexicon: HALOT
  rationale: The phrase emphasizes that no money is to be paid for her release. 'Without
    payment of money' makes the legal-economic force explicit in idiomatic English
    while remaining close to the Hebrew.
