id: EXO.21.14
reference: Exodus 21:14
source:
  edition: WLC
  text: וְ/כִֽי יָזִ֥ד אִ֛ישׁ עַל רֵעֵ֖/הוּ לְ/הָרְג֣/וֹ בְ/עָרְמָ֑ה מֵ/עִ֣ם מִזְבְּחִ֔/י
    תִּקָּחֶ֖/נּוּ לָ/מֽוּת־־׃ס
translation:
  text: But if a man schemes against his neighbor to kill him by treachery, you shall
    take him even from my altar to die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'acts presumptuously against' or 'comes arrogantly against'; the Hebrew
      verb conveys willful, deliberate action.
    reason: lexical_alternative
  - marker: b
    text: Or 'with cunning' or 'deceitfully.'
    reason: lexical_alternative
  - marker: c
    text: That is, even if he seeks refuge at the altar, he is to be removed for execution.
    reason: cultural_note
lexical_decisions:
- source_word: וְ/כִי
  chosen: But if
  alternatives:
  - And if
  - But when
  lexicon: HALOT
  rationale: Introduces a contrasting conditional case to the previous law. 'But if'
    captures both the connective and the conditional force in natural English.
- source_word: יָזִד
  chosen: schemes against
  alternatives:
  - acts presumptuously against
  - comes arrogantly against
  - lies in wait against
  lexicon: HALOT
  rationale: The Hiphil of זיד here conveys deliberate, willful, presumptuous action
    rather than accidental harm. In this homicide context, 'schemes against' expresses
    intentional plotting in idiomatic English without losing the sense of premeditation.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: The Hebrew is singular masculine and the translation philosophy prefers
    gender-accurate rendering where representative force is present. 'A man' preserves
    the form while functioning generically in legal style.
- source_word: עַל רֵעֵהוּ
  chosen: against his neighbor
  alternatives:
  - against his fellow
  - against another man
  lexicon: HALOT
  rationale: The preposition plus רֵעַ indicates hostile action directed toward another
    member of the community. 'Neighbor' is the most established and accurate legal-ethical
    rendering here.
- source_word: לְהָרְגוֹ
  chosen: to kill him
  alternatives:
  - to slay him
  - to murder him
  lexicon: HALOT
  rationale: '''Kill'' is the direct lexical sense of הרג. Although the context is
    murder, ''murder'' would import the legal conclusion into the infinitive itself;
    the verse specifies the culpable manner separately.'
- source_word: בְעָרְמָה
  chosen: by treachery
  alternatives:
  - with cunning
  - deceitfully
  - by guile
  lexicon: HALOT
  rationale: The noun denotes crafty, deceitful intent. 'By treachery' fits the legal
    context of premeditated murder and communicates more moral weight than the flatter
    'with cunning.'
- source_word: מֵעִם מִזְבְּחִי
  chosen: even from my altar
  alternatives:
  - from beside my altar
  - away from my altar
  lexicon: HALOT
  rationale: The phrase indicates removal from proximity to the altar, likely where
    asylum might be sought. 'Even from my altar' brings out the emphatic force that
    sanctuary does not protect the intentional murderer.
- source_word: תִּקָּחֶנּוּ
  chosen: you shall take him
  alternatives:
  - you must seize him
  - you are to remove him
  lexicon: HALOT
  rationale: Second masculine singular legal instruction. 'You shall take him' preserves
    the directness and legal force of the command.
- source_word: לָמוּת
  chosen: to die
  alternatives:
  - so that he may die
  - for execution
  lexicon: HALOT
  rationale: 'The infinitive expresses purpose/result: the offender is to be taken
    for death. ''To die'' is formally close; ''for execution'' is interpretive and
    therefore kept as an alternative rather than main text.'
