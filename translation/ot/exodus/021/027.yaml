theological_decisions:
- issue: Rendering of slavery terminology in Covenant Code legislation
  chosen_reading: male slave / female slave
  alternative_readings:
  - servant / maidservant
  - slave / slave-girl
  rationale: Following the translation philosophy, bonded-status language is preferred
    where the social reality is legally salient. This verse concerns injury compensation
    within slave law, so 'slave' is more accurate than 'servant.' Gender distinction
    is preserved because the Hebrew explicitly contrasts male and female slaves.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    for δοῦλος by analogy of bonded-status rendering
