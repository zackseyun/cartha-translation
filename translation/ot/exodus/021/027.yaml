id: EXO.21.27
reference: Exodus 21:27
source:
  edition: WLC
  text: וְ/אִם שֵׁ֥ן עַבְדּ֛/וֹ אֽוֹ שֵׁ֥ן אֲמָת֖/וֹ יַפִּ֑יל לַֽ/חָפְשִׁ֥י יְשַׁלְּחֶ֖/נּוּ
    תַּ֥חַת שִׁנּֽ/וֹ־־׃פ
translation:
  text: And if he knocks out the tooth of his male slave or the tooth of his female
    slave, he shall let him go free in compensation for his tooth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he shall let them go free' in application of the law to either a male
      or a female slave; the Hebrew legal formula uses a masculine singular object
      suffix.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: And if
  alternatives:
  - But if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional case continuing the legal sequence from the
    previous verse. 'And if' preserves the connective force while remaining natural
    in English law-style discourse.
- source_word: שֵׁן
  chosen: tooth
  lexicon: HALOT
  rationale: Straightforward anatomical term; singular is retained as in the Hebrew.
- source_word: עַבְדּוֹ
  chosen: his male slave
  alternatives:
  - his slave
  - his servant
  lexicon: HALOT
  rationale: The noun עבד in Covenant Code slavery legislation refers to a bonded
    person, so 'slave' better reflects the social-legal reality than 'servant.' 'Male'
    is supplied to distinguish it from the following feminine term and to reflect
    the gendered pair in the Hebrew.
- source_word: אוֹ
  chosen: or
  lexicon: HALOT
  rationale: Standard disjunctive conjunction.
- source_word: אֲמָתוֹ
  chosen: his female slave
  alternatives:
  - his slave-girl
  - his servant
  lexicon: HALOT
  rationale: The feminine counterpart to עבד. 'Female slave' is clear modern English
    and preserves the gender distinction in the source without sounding archaic.
- source_word: יַפִּיל
  chosen: knocks out
  alternatives:
  - causes to fall out
  - makes fall out
  lexicon: HALOT
  rationale: Hiphil of נפל here means to cause the tooth to fall out. 'Knocks out'
    is idiomatic modern English for this injury and fits the legal context.
- source_word: לַחָפְשִׁי
  chosen: go free
  alternatives:
  - as free
  - to freedom
  lexicon: HALOT
  rationale: The phrase denotes release into freedom. In English, 'let him go free'
    is the most natural rendering of the legal result.
- source_word: יְשַׁלְּחֶנּוּ
  chosen: he shall let him go
  alternatives:
  - he shall send him away
  - he must release him
  lexicon: HALOT
  rationale: In this legal context שלח means to release or send away. 'He shall let
    him go' preserves the formal legal force and combines naturally with 'free.' The
    pronominal suffix is masculine singular; because the law states a general principle
    applying to either slave, the English uses the conventional singular object in
    the legal formula while the female case is already represented explicitly in the
    paired condition.
- source_word: תַּחַת
  chosen: in compensation for
  alternatives:
  - for
  - instead of
  - on account of
  lexicon: HALOT
  rationale: Here תחת expresses compensation/requital corresponding to the injury
    suffered. 'In compensation for' makes the legal sense explicit in natural English.
- source_word: שִׁנּוֹ
  chosen: his tooth
  lexicon: HALOT
  rationale: Refers to the injured slave's tooth. The singular is retained.
