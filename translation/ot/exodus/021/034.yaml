id: EXO.21.34
reference: Exodus 21:34
source:
  edition: WLC
  text: בַּ֤עַל הַ/בּוֹר֙ יְשַׁלֵּ֔ם כֶּ֖סֶף יָשִׁ֣יב לִ/בְעָלָ֑י/ו וְ/הַ/מֵּ֖ת יִֽהְיֶה
    לּֽ/וֹ־׃ס
translation:
  text: The owner of the pit shall make restitution; he shall pay money to its owner,
    and the dead animal shall be his.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'silver'; here it denotes monetary compensation.
    reason: lexical_alternative
  - marker: b
    text: Or 'and the carcass shall belong to him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּעַל
  chosen: owner
  alternatives:
  - master
  - possessor
  lexicon: HALOT
  rationale: In this legal context, בַּעַל denotes the person responsible for or possessing
    the pit. 'Owner' is the most natural modern legal equivalent.
- source_word: הַבּוֹר
  chosen: the pit
  alternatives:
  - the cistern
  - the hole
  lexicon: HALOT
  rationale: בּוֹר can denote a pit, cistern, or hole. In Exodus 21:33–34 the context
    is an uncovered excavation into which livestock falls, so 'pit' is the clearest
    and most idiomatic rendering.
- source_word: יְשַׁלֵּם
  chosen: shall make restitution
  alternatives:
  - shall surely pay
  - shall compensate
  lexicon: HALOT
  rationale: The Piel of שׁלם in legal contexts commonly means to make restitution
    or compensation. 'Shall make restitution' captures the juridical force better
    than the more generic 'shall pay'.
- source_word: כֶּסֶף
  chosen: money
  alternatives:
  - silver
  lexicon: HALOT
  rationale: Though literally 'silver,' in legal payment contexts כֶּסֶף functions
    as a standard term for monetary compensation. 'Money' communicates the sense in
    clear modern English.
- source_word: יָשִׁיב
  chosen: he shall pay
  alternatives:
  - he shall return
  - he shall restore
  lexicon: HALOT
  rationale: The Hiphil of שוב literally means 'cause to return,' but here it refers
    to restoring value to the injured party. 'He shall pay' is idiomatic in English
    and fits the legal setting, while the restitution nuance is already carried by
    יְשַׁלֵּם.
- source_word: לִבְעָלָיו
  chosen: to its owner
  alternatives:
  - to their owner
  - to the owner of it
  lexicon: HALOT
  rationale: The suffix refers to the owner of the animal that died. Singular 'its
    owner' is the most natural English rendering for the referent in context.
- source_word: וְהַמֵּת
  chosen: and the dead animal
  alternatives:
  - and the carcass
  - and the dead one
  lexicon: HALOT
  rationale: The adjective/substantive 'the dead' refers to the animal that died in
    the pit. Supplying 'animal' makes the referent explicit in English without adding
    new content. 'Carcass' is possible but slightly more interpretive and less neutral.
- source_word: יִהְיֶה לוֹ
  chosen: shall be his
  alternatives:
  - shall belong to him
  lexicon: HALOT
  rationale: This clause assigns possession of the dead animal to the pit owner as
    part of the compensation arrangement. 'Shall be his' is concise and faithful;
    'shall belong to him' is a valid fuller alternative.
