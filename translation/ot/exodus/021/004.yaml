theological_decisions:
- issue: Rendering slavery terminology in a legal context
  chosen_reading: Use 'master' and explicit belonging language without softening the
    ownership relation.
  alternative_readings:
  - Use 'lord' for אֲדוֹן
  - Use 'employer' or 'servant-master' language to reduce harshness
  rationale: The translation philosophy prioritizes original-language primacy and
    avoids paraphrastic softening. This verse regulates a bonded-servitude/slavery
    situation; the English should reflect the legal reality of the text without importing
    extra doctrinal or moral commentary.
  doctrine_reference: Translation philosophy §1, §6
