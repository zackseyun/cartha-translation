id: EXO.21.4
reference: Exodus 21:4
source:
  edition: WLC
  text: אִם אֲדֹנָי/ו֙ יִתֶּן ל֣/וֹ אִשָּׁ֔ה וְ/יָלְדָה ל֥/וֹ בָנִ֖ים א֣וֹ בָנ֑וֹת
    הָ/אִשָּׁ֣ה וִ/ילָדֶ֗י/הָ תִּהְיֶה֙ לַֽ/אדֹנֶ֔י/הָ וְ/ה֖וּא יֵצֵ֥א בְ/גַפּֽ/וֹ־־־׃
translation:
  text: If his master gives him a wife and she bears him sons or daughters, the wife
    and her children shall belong to her master, and he shall go out by himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the wife and her children shall be her master's.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'go out by himself,' that is, leave alone without the wife and children
      given during his term of service.
    reason: cultural_note
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a conditional case within the legal material. 'If' best reflects
    the casuistic form of the law.
- source_word: אֲדֹנָיו
  chosen: his master
  alternatives:
  - his lord
  - his owner
  lexicon: HALOT
  rationale: In this slavery/legal context, 'master' best conveys the authority relationship
    without importing divine-title associations that 'lord' might suggest. 'Owner'
    is possible but narrower than the broader household authority implied by אֲדוֹן.
- source_word: יִתֶּן לוֹ אִשָּׁה
  chosen: gives him a wife
  alternatives:
  - gives him a woman
  lexicon: HALOT
  rationale: Although אִשָּׁה can mean 'woman' or 'wife,' here the legal context and
    subsequent children indicate a marital union arranged by the master; 'wife' is
    the natural English rendering.
- source_word: וְיָלְדָה לוֹ
  chosen: and she bears him
  alternatives:
  - and she gives birth for him
  - and she bears for him
  lexicon: HALOT
  rationale: Idiomatic English for ילד with indirect object. 'Bears him' preserves
    the sense of childbearing within marriage.
- source_word: בָנִים אוֹ בָנוֹת
  chosen: sons or daughters
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew explicitly specifies male and female children; the translation
    preserves that gender-accurate wording rather than collapsing to 'children' in
    the main text.
- source_word: הָאִשָּׁה וִילָדֶיהָ
  chosen: the wife and her children
  alternatives:
  - the woman and her children
  lexicon: HALOT
  rationale: Maintains consistency with the earlier rendering of אִשָּׁה as 'wife'
    in this legal-marital setting.
- source_word: תִּהְיֶה לַאדֹנֶיהָ
  chosen: shall belong to her master
  alternatives:
  - shall be her master's
  - shall remain with her master
  lexicon: HALOT
  rationale: The construction expresses legal possession/status. 'Shall belong to'
    makes the ownership relation explicit and readable in modern English.
- source_word: וְהוּא יֵצֵא
  chosen: and he shall go out
  alternatives:
  - and he shall leave
  - and he shall be released
  lexicon: HALOT
  rationale: יצא literally means 'go out.' In this legal context it refers to the
    male slave's departure/release at the end of service, but 'go out' preserves the
    Hebrew idiom without over-interpreting.
- source_word: בְגַפּוֹ
  chosen: by himself
  alternatives:
  - alone
  - with his body only
  lexicon: HALOT
  rationale: This idiom means going out unaccompanied, as in v. 3. 'By himself' is
    clear modern English and matches the legal contrast with leaving with a wife.
