id: EXO.21.22
reference: Exodus 21:22
source:
  edition: WLC
  text: וְ/כִֽי יִנָּצ֣וּ אֲנָשִׁ֗ים וְ/נָ֨גְפ֜וּ אִשָּׁ֤ה הָרָה֙ וְ/יָצְא֣וּ יְלָדֶ֔י/הָ
    וְ/לֹ֥א יִהְיֶ֖ה אָס֑וֹן עָנ֣וֹשׁ יֵעָנֵ֗שׁ כַּֽ/אֲשֶׁ֨ר יָשִׁ֤ית עָלָי/ו֙ בַּ֣עַל
    הָֽ/אִשָּׁ֔ה וְ/נָתַ֖ן בִּ/פְלִלִֽים־׃
translation:
  text: When men struggle together and strike a pregnant woman so that her children
    come out, but there is no serious injury, he shall surely be fined as the woman's
    husband imposes on him, and he shall pay according to the judges.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'her children come out.' This may refer to a premature birth;
      some translations render it 'so that she gives birth prematurely,' while others
      interpret it as miscarriage.
    reason: lexical_alternative
  - marker: b
    text: Or 'harm.' The Hebrew does not specify in this verse alone whether the serious
      injury concerns the mother, the child, or either one.
    reason: alternative_reading
  - marker: c
    text: Or 'by judicial decision' / 'before the court.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  chosen: When
  alternatives:
  - If
  - And if
  lexicon: HALOT
  rationale: Introduces a case law scenario. 'When' fits English casuistic style naturally,
    though 'if' is also possible.
- source_word: יִנָּצוּ
  chosen: struggle together
  alternatives:
  - fight
  - quarrel
  lexicon: HALOT
  rationale: The Niphal of נצה denotes people engaged in a physical altercation. 'Struggle
    together' is slightly broader and less colloquial than 'fight,' while still conveying
    bodily conflict.
- source_word: אֲנָשִׁים
  chosen: men
  alternatives:
  - people
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural and in this legal setting most
    naturally refers to men. This follows the gender-accurate principle rather than
    neutralizing the term.
- source_word: וְנָגְפוּ
  chosen: strike
  alternatives:
  - hit
  - injure
  lexicon: HALOT
  rationale: The verb denotes a blow or striking. 'Strike' preserves the concrete
    physical action without overinterpreting the degree of harm.
- source_word: אִשָּׁה הָרָה
  chosen: a pregnant woman
  alternatives:
  - a woman with child
  lexicon: HALOT
  rationale: Clear modern English equivalent of the Hebrew phrase, preserving the
    woman's condition relevant to the law.
- source_word: וְיָצְאוּ יְלָדֶיהָ
  chosen: so that her children come out
  alternatives:
  - so that she gives birth prematurely
  - so that her offspring come out
  lexicon: HALOT
  rationale: The Hebrew literally says 'her children come out.' This wording preserves
    the source expression and avoids prematurely deciding whether the focus is miscarriage,
    premature live birth, or expulsion generally. Because the phrase is interpretively
    contested, a more specific alternative is preserved in a footnote.
- source_word: אָסוֹן
  chosen: serious injury
  alternatives:
  - harm
  - fatality
  - disaster
  lexicon: HALOT
  rationale: אָסוֹן denotes grave harm or serious injury. 'Serious injury' communicates
    the severity without restricting it to death alone. This also leaves open whether
    the harm concerns the mother, the child, or either, which the Hebrew does not
    explicitly specify in this verse.
- source_word: עָנוֹשׁ יֵעָנֵשׁ
  chosen: he shall surely be fined
  alternatives:
  - he shall surely be punished
  - he shall certainly pay a penalty
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the penalty. In
    context, because the next clauses specify an amount imposed and paid, 'be fined'
    best captures the legal consequence.
- source_word: כַּאֲשֶׁר יָשִׁית עָלָיו
  chosen: as ... imposes on him
  alternatives:
  - according to what ... lays upon him
  - as ... assesses against him
  lexicon: HALOT
  rationale: The idiom refers to setting or imposing a penalty upon someone. 'Imposes
    on him' is idiomatic legal English.
- source_word: בַּעַל הָאִשָּׁה
  chosen: the woman's husband
  alternatives:
  - the husband of the woman
  - the woman's master
  lexicon: HALOT
  rationale: In this context בַּעַל means husband, not owner/master. 'The woman's
    husband' is natural English and contextually precise.
- source_word: וְנָתַן
  chosen: and he shall pay
  alternatives:
  - and he shall give
  lexicon: HALOT
  rationale: In legal-financial context, 'give' is more specifically 'pay.' This makes
    the legal sense explicit in natural English.
- source_word: בִּפְלִלִים
  chosen: according to the judges
  alternatives:
  - by judicial decision
  - before the court
  lexicon: HALOT
  rationale: The noun refers to judicial authorities or legal adjudication. 'According
    to the judges' preserves the role of formal legal assessment in fixing the payment.
