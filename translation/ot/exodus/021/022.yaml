theological_decisions:
- issue: Interpretation of the injury law regarding the pregnant woman and her child(ren)
  chosen_reading: Render the Hebrew in a way that does not decide between miscarriage
    and premature birth, and does not specify whether the 'serious injury' applies
    to the mother only or to mother/child generally.
  alternative_readings:
  - Translate as 'so that she has a miscarriage'
  - Interpret 'no serious injury' as referring only to the woman
  - Interpret 'no serious injury' as including either the woman or the child(ren)
  rationale: The Hebrew wording is less specific than some traditional or doctrinally
    charged renderings. To preserve theological and ethical tension rather than resolve
    it, the main text stays close to the Hebrew ('her children come out') and uses
    the broader 'serious injury.' Alternatives are preserved in footnotes for auditability.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
