theological_decisions:
- issue: Nature of the payment in a capital liability context
  chosen_reading: Rendered the legal payment as 'ransom' and 'redemption price' without
    implying moral innocence or cultic expiation.
  alternative_readings:
  - Rendered both terms simply as 'fine'
  - Rendered the payment with stronger atonement language
  rationale: The verse concerns a judicially imposed payment that redeems the offender's
    life from the otherwise applicable penalty. The translation preserves the legal-redemptive
    terminology of the Hebrew while avoiding doctrinal overreading.
  doctrine_reference: Translation philosophy §§1, 3, 6
