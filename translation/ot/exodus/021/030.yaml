id: EXO.21.30
reference: Exodus 21:30
source:
  edition: WLC
  text: אִם כֹּ֖פֶר יוּשַׁ֣ת עָלָ֑י/ו וְ/נָתַן֙ פִּדְיֹ֣ן נַפְשׁ֔/וֹ כְּ/כֹ֥ל אֲשֶׁר
    יוּשַׁ֖ת עָלָֽי/ו־־׃
translation:
  text: If a ransom is imposed on him, then he shall give the redemption price for
    his life according to all that is imposed on him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''If a ransom payment is laid on him ... he shall pay the ransom for
      his life.'' The Hebrew uses two related but distinct terms: כֹּפֶר (''ransom'')
      and פִּדְיֹן (''redemption price'').'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - But if
  - When
  lexicon: HALOT
  rationale: Introduces a conditional case following the prior law about the ox owner’s
    liability. 'If' is the most straightforward English conditional marker.
- source_word: כֹּפֶר
  chosen: a ransom
  alternatives:
  - compensation
  - atonement payment
  lexicon: HALOT
  rationale: כֹּפֶר denotes a payment made to avert a penalty or secure release. In
    this legal context, 'ransom' best captures a compensatory payment imposed in place
    of the death penalty, without importing cultic atonement language into the main
    text.
- source_word: יוּשַׁת עָלָיו
  chosen: is imposed on him
  alternatives:
  - is laid on him
  - is set on him
  lexicon: HALOT
  rationale: The passive of שׁית with עַל conveys something being placed or imposed
    upon someone, here a legal obligation. 'Imposed on him' is idiomatic legal English.
- source_word: וְנָתַן
  chosen: then he shall give
  alternatives:
  - and he shall pay
  - and he must give
  lexicon: HALOT
  rationale: The waw + qatal continues the legal consequence. 'Then he shall give'
    preserves the formal sequence and legal force.
- source_word: פִּדְיֹן נַפְשׁוֹ
  chosen: the redemption price for his life
  alternatives:
  - the ransom for his life
  - the price of redeeming his life
  lexicon: HALOT
  rationale: פִּדְיֹן is the price of redemption/release, and נֶפֶשׁ here refers to
    the person's life. 'Redemption price for his life' preserves the lexical distinction
    from כֹּפֶר while remaining natural English.
- source_word: נַפְשׁוֹ
  chosen: his life
  alternatives:
  - his soul
  - himself
  lexicon: HALOT
  rationale: In this judicial context נֶפֶשׁ refers to the person's life rather than
    the immaterial soul. 'His life' is the clearest contextual rendering.
- source_word: כְּכֹל אֲשֶׁר יוּשַׁת עָלָיו
  chosen: according to all that is imposed on him
  alternatives:
  - according to whatever is imposed on him
  - in accordance with all that is laid on him
  lexicon: HALOT
  rationale: This clause specifies full correspondence to the assessed amount. 'According
    to all that is imposed on him' preserves the comprehensiveness of כֹּל and the
    repeated legal idiom.
