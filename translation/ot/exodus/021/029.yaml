theological_decisions:
- issue: Legal force of the owner's penalty
  chosen_reading: its owner also shall be put to death
  alternative_readings:
  - its owner also shall die
  rationale: The Hebrew legal formula יוּמָת regularly indicates imposed capital punishment.
    Rendering it as simple future death would understate the judicial sense of the
    case law. This is a legal-translation decision rather than a doctrinal one, but
    it affects how the law is understood.
  doctrine_reference: Translation philosophy §1, §5
- issue: Gendered victim language
  chosen_reading: a man or a woman
  alternative_readings:
  - someone
  rationale: The source text explicitly names both male and female victims. Per the
    gender-accurate principle, the translation preserves that wording rather than
    neutralizing it.
  doctrine_reference: Translation philosophy §4
