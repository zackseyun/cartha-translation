id: EXO.21.29
reference: Exodus 21:29
source:
  edition: WLC
  text: וְ/אִ֡ם שׁוֹר֩ נַגָּ֨ח ה֜וּא מִ/תְּמֹ֣ל שִׁלְשֹׁ֗ם וְ/הוּעַ֤ד בִּ/בְעָלָי/ו֙
    וְ/לֹ֣א יִשְׁמְרֶ֔/נּוּ וְ/הֵמִ֥ית אִ֖ישׁ א֣וֹ אִשָּׁ֑ה הַ/שּׁוֹר֙ יִסָּקֵ֔ל וְ/גַם
    בְּעָלָ֖י/ו יוּמָֽת־׃
translation:
  text: But if the ox was in the habit of goring from yesterday and the day before,
    and its owner had been warned but did not keep it in, and it kills a man or a
    woman, the ox shall be stoned, and its owner also shall be put to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "an ox accustomed to gore." The Hebrew participle describes an animal
      known for repeated goring.
    reason: lexical_alternative
  - marker: b
    text: Literally, "from yesterday and the day before," a Hebrew idiom indicating
      prior, established behavior.
    reason: cultural_note
lexical_decisions:
- source_word: שׁוֹר
  chosen: ox
  alternatives:
  - bull
  - cattle
  lexicon: HALOT
  rationale: '"Ox" is the standard singular rendering in this legal context and matches
    the conventional sense of a domesticated bovine used in case law. "Bull" is possible
    in some contexts, but the law concerns the animal generically rather than emphasizing
    sex.'
- source_word: נַגָּח
  chosen: in the habit of goring
  alternatives:
  - a goring ox
  - accustomed to gore
  - dangerous
  lexicon: HALOT
  rationale: The participial form describes a characteristic pattern, not merely a
    single act. "In the habit of goring" brings out the durative/customary force more
    clearly in natural English than the wooden "a goring ox."
- source_word: מִתְּמֹל שִׁלְשֹׁם
  chosen: from yesterday and the day before
  alternatives:
  - previously
  - for some time
  lexicon: HALOT
  rationale: The Hebrew idiom literally refers to prior days. Rendering it more literally
    preserves the legal flavor and the sense of an established prior pattern, while
    remaining understandable in English.
- source_word: וְהוּעַד בִּבְעָלָיו
  chosen: its owner had been warned
  alternatives:
  - its owner had been testified to
  - its owner had been notified
  lexicon: HALOT
  rationale: The passive of עוד in this legal setting means formal warning/testimony
    given to the owner about the ox's dangerous behavior. "Had been warned" is the
    clearest idiomatic legal English.
- source_word: וְלֹא יִשְׁמְרֶנּוּ
  chosen: did not keep it in
  alternatives:
  - did not guard it
  - did not restrain it
  lexicon: HALOT
  rationale: The verb means keep/guard/watch. In context, the point is failure to
    confine or control the dangerous animal. "Keep it in" communicates the practical
    legal sense in readable modern English.
- source_word: וְהֵמִית
  chosen: it kills
  alternatives:
  - it causes the death of
  - it puts to death
  lexicon: HALOT
  rationale: In this case-law construction, the clause states the resulting death
    caused by the ox. "It kills" is direct, natural, and sufficiently precise.
- source_word: אִישׁ אֹו אִשָּׁה
  chosen: a man or a woman
  alternatives:
  - someone
  lexicon: HALOT
  rationale: Following the gender-accurate principle, the Hebrew explicitly names
    both sexes. "A man or a woman" preserves that specificity better than the neutral
    "someone."
- source_word: יִסָּקֵל
  chosen: shall be stoned
  alternatives:
  - must be stoned to death
  lexicon: HALOT
  rationale: The Niphal here denotes the prescribed penalty by stoning. "Shall be
    stoned" is the standard legal rendering; the death outcome is implicit in the
    penalty and need not be expanded in the main text.
- source_word: וְגַם בְּעָלָיו יוּמָת
  chosen: its owner also shall be put to death
  alternatives:
  - its owner also shall die
  - its owner also shall be executed
  lexicon: HALOT
  rationale: The Hophal of מות is a causative/passive legal formula indicating judicial
    execution, not mere mortality. "Shall be put to death" best reflects the legal
    force without over-specifying the method.
