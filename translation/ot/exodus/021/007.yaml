id: EXO.21.7
reference: Exodus 21:7
source:
  edition: WLC
  text: וְ/כִֽי יִמְכֹּ֥ר אִ֛ישׁ אֶת בִּתּ֖/וֹ לְ/אָמָ֑ה לֹ֥א תֵצֵ֖א כְּ/צֵ֥את הָ/עֲבָדִֽים־־׃
translation:
  text: And if a man sells his daughter as a female slave, she shall not go out as
    the male slaves go out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as a maidservant.' The Hebrew אָמָה refers to a female in bonded service;
      'female slave' is used here to make the legal status explicit.
    reason: lexical_alternative
  - marker: b
    text: That is, she does not leave her service under the same terms as the male
      slaves.
    reason: cultural_note
lexical_decisions:
- source_word: וְ/כִי
  chosen: And if
  alternatives:
  - If
  - Now if
  lexicon: HALOT
  rationale: Introduces a conditional case within the legal material. 'And if' preserves
    the connective force of ו while remaining natural in English law-style discourse.
- source_word: יִמְכֹּר
  chosen: sells
  alternatives:
  - should sell
  lexicon: HALOT
  rationale: The verb plainly denotes sale. Present-tense English in casuistic law
    communicates the general legal scenario well without adding modal nuance not explicit
    in the Hebrew.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and in this legal context
    refers to a male household head/father. Per gender-accurate policy, 'a man' is
    preferred over a neutral substitute.
- source_word: בִּתּוֹ
  chosen: his daughter
  lexicon: HALOT
  rationale: Direct and unambiguous filial term with 3ms suffix.
- source_word: לְאָמָה
  chosen: as a female slave
  alternatives:
  - as a slave-girl
  - as a maidservant
  - as a female servant
  lexicon: HALOT
  rationale: אָמָה denotes a female slave/servant. In this legal context the bonded
    status is salient, so 'female slave' better reflects the social-legal reality
    than softer traditional renderings like 'maidservant.' 'As' captures the lamed
    of role/status.
- source_word: לֹא תֵצֵא
  chosen: she shall not go out
  alternatives:
  - she shall not leave
  - she must not go free
  lexicon: HALOT
  rationale: The idiom 'go out' is the Hebrew legal expression for release from service.
    Retaining it preserves the source wording and allows the following comparison
    to remain explicit.
- source_word: כְּצֵאת
  chosen: as ... go out
  alternatives:
  - as ... are released
  - like the going out of
  lexicon: HALOT
  rationale: Comparative infinitive construct with כ, introducing the manner of release.
    Rendering with 'as ... go out' keeps the verbal parallel with תצא.
- source_word: הָעֲבָדִים
  chosen: the male slaves
  alternatives:
  - the slaves
  - the servants
  lexicon: HALOT
  rationale: Although עבדים can generically mean 'slaves/servants,' here the contrast
    with a daughter sold as an אָמָה strongly suggests male Hebrew slaves of the preceding
    law. 'Male slaves' makes the contrast explicit in idiomatic English and avoids
    obscuring the gendered legal distinction.
