theological_decisions:
- issue: Rendering slavery terminology in covenant law
  chosen_reading: Use 'female slave' and 'male slaves' rather than 'maidservant/servants.'
  alternative_readings:
  - female servant
  - maidservant
  - servants
  rationale: The translation philosophy prefers source-language primacy and uses 'slave'
    where bonded status is salient. This verse legislates conditions of sale and release,
    so the legal bondage is central and should not be softened by traditional English
    euphemisms.
  doctrine_reference: Translation philosophy §1; Contested terms table on δοῦλος by
    analogy of bonded-status rendering
