id: EXO.21.26
reference: Exodus 21:26
source:
  edition: WLC
  text: וְ/כִֽי יַכֶּ֨ה אִ֜ישׁ אֶת עֵ֥ין עַבְדּ֛/וֹ אֽוֹ אֶת עֵ֥ין אֲמָת֖/וֹ וְ/שִֽׁחֲתָ֑/הּ
    לַֽ/חָפְשִׁ֥י יְשַׁלְּחֶ֖/נּוּ תַּ֥חַת עֵינֽ/וֹ־־־־׃ס
translation:
  text: And if a man strikes the eye of his male slave or the eye of his female slave
    and destroys it, he shall let him go free in compensation for his eye.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and blinds it.' The Hebrew verb can denote ruining or destroying the
      eye, implying permanent injury.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his male slave ... his female slave.' The law grants freedom as
      compensation for permanent injury inflicted by the master.
    reason: cultural_note
  - marker: c
    text: Or simply, 'for his eye.' The phrase means release in recompense for the
      injury to the eye.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  chosen: And if
  alternatives:
  - If
  - Now if
  lexicon: HALOT
  rationale: Introduces a casuistic law clause. 'And if' preserves the connective
    force of ו while remaining natural in English legal style.
- source_word: יַכֶּה
  chosen: strikes
  alternatives:
  - hits
  - beats
  lexicon: HALOT
  rationale: נכה commonly means 'strike/smite.' 'Strikes' is direct and suitably formal
    without overstating repeated violence as 'beats' would.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and in casuistic law often
    means an individual man. Per translation philosophy, gender-accurate rendering
    is preferred over neutralizing.
- source_word: עֵין
  chosen: the eye
  alternatives:
  - an eye
  lexicon: HALOT
  rationale: The construct with the following possessive naturally yields 'the eye
    of...' in English. This also matches the specificity of the injury described.
- source_word: עַבְדּוֹ
  chosen: his male slave
  alternatives:
  - his slave
  - his servant
  lexicon: HALOT
  rationale: עבד in this legal context denotes bonded status, so 'slave' better reflects
    the social reality than 'servant.' 'Male slave' is used here because the verse
    explicitly contrasts with אמהו, his female slave.
- source_word: אֲמָתוֹ
  chosen: his female slave
  alternatives:
  - his slave-girl
  - his maidservant
  lexicon: HALOT
  rationale: אמה denotes a female slave/maidservant. 'Female slave' is clear modern
    English and preserves the legal parallel with 'male slave.'
- source_word: וְשִׁחֲתָהּ
  chosen: and destroys it
  alternatives:
  - and ruins it
  - and blinds it
  lexicon: HALOT
  rationale: The verb שחת here refers to causing permanent damage to the eye. 'Destroys
    it' is broad enough to cover disabling the eye without narrowing the sense to
    total blindness, though that may be implied.
- source_word: לַחָפְשִׁי
  chosen: free
  alternatives:
  - for freedom
  - as free
  lexicon: HALOT
  rationale: The phrase indicates release into freedom. In idiomatic English with
    שלח, 'let go free' is the natural legal rendering.
- source_word: יְשַׁלְּחֶנּוּ
  chosen: he shall let him go
  alternatives:
  - he shall send him away
  - he must release him
  lexicon: HALOT
  rationale: In this legal context שלח means to release or let go. 'He shall let him
    go' preserves the legal force and works smoothly with 'free.' The masculine pronominal
    object is retained as the default grammatical form, though it refers generically
    to either slave mentioned.
- source_word: תַּחַת עֵינוֹ
  chosen: in compensation for his eye
  alternatives:
  - for his eye
  - because of his eye
  - in place of his eye
  lexicon: HALOT
  rationale: תחת can mean 'under, instead of, in place of,' and in legal contexts
    often expresses compensation or requital. 'In compensation for his eye' makes
    the legal sense explicit in natural English.
