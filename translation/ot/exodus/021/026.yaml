theological_decisions:
- issue: Rendering of slave terminology in Israelite case law
  chosen_reading: male slave / female slave
  alternative_readings:
  - servant / maidservant
  rationale: Following the project's guidance on bonded-status terms, this legal context
    makes the ownership and emancipation framework salient, so 'slave' is preferred
    over the softer 'servant.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    for δοῦλος by analogy of bonded-status rendering
- issue: Gendered legal subject
  chosen_reading: a man
  alternative_readings:
  - a person
  - someone
  rationale: The Hebrew uses אִישׁ, and the project's policy is gender-accurate rather
    than gender-neutral unless context clearly demands otherwise.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
