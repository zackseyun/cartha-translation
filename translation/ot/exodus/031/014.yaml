theological_decisions:
- issue: Meaning of the penalty formula וְנִכְרְתָה ... מִקֶּרֶב עַמֶּיהָ
  chosen_reading: Retain the idiom 'shall be cut off from among his people' without
    specifying whether this means execution, excommunication, childlessness, or divine
    judgment.
  alternative_readings:
  - shall be excluded from the community
  - shall be removed by divine judgment
  rationale: The Hebrew formula is theologically and legally weighty but not fully
    explicit about mechanism in this verse. Preserving the idiom maintains the textual
    tension rather than resolving it beyond the source text.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Rendering נֶפֶשׁ in a legal context
  chosen_reading: Translate as 'person' rather than 'soul.'
  alternative_readings:
  - soul
  rationale: Here נֶפֶשׁ refers to the individual offender, not to an abstract immaterial
    component of a human being. 'Person' avoids importing doctrinal claims the text
    does not make.
