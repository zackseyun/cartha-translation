id: EXO.31.14
reference: Exodus 31:14
source:
  edition: WLC
  text: וּ/שְׁמַרְתֶּם֙ אֶת הַ/שַּׁבָּ֔ת כִּ֛י קֹ֥דֶשׁ הִ֖וא לָ/כֶ֑ם מְחַֽלְלֶ֨י/הָ֙
    מ֣וֹת יוּמָ֔ת כִּ֗י כָּל הָ/עֹשֶׂ֥ה בָ/הּ֙ מְלָאכָ֔ה וְ/נִכְרְתָ֛ה הַ/נֶּ֥פֶשׁ
    הַ/הִ֖וא מִ/קֶּ֥רֶב עַמֶּֽי/הָ־־׃
translation:
  text: You shall keep the Sabbath, because it is holy to you. Whoever profanes it
    shall surely be put to death, for whoever does work on it, that person shall be
    cut off from among his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whoever desecrates it.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'shall be cut off from among his people,' a legal formula whose exact
      mode of judgment is not specified here.
    reason: alternative_reading
lexical_decisions:
- source_word: וּשְׁמַרְתֶּם
  chosen: You shall keep
  alternatives:
  - You must observe
  - You shall guard
  lexicon: HALOT
  rationale: שׁמר commonly carries the sense of keeping, observing, or guarding. 'Keep'
    is concise, idiomatic in covenantal/legal contexts, and preserves the imperative
    force without over-paraphrase.
- source_word: הַשַּׁבָּת
  chosen: the Sabbath
  alternatives:
  - the sabbath day
  lexicon: HALOT
  rationale: Standard rendering of שַׁבָּת. The Hebrew here names the institution/day
    itself; 'the Sabbath' is natural and sufficiently precise.
- source_word: קֹדֶשׁ הִוא לָכֶם
  chosen: it is holy to you
  alternatives:
  - it is holy for you
  - it is a holy thing to you
  lexicon: HALOT
  rationale: קֹדֶשׁ denotes holiness or something set apart as holy. 'Holy to you'
    preserves the dative nuance לָכֶם better than flattening to merely 'holy'.
- source_word: מְחַלְלֶיהָ
  chosen: whoever profanes it
  alternatives:
  - whoever desecrates it
  - its profaners
  lexicon: HALOT
  rationale: חלל in the piel means to profane/desecrate. Rendering the participle
    generically as 'whoever profanes it' gives clear English while preserving the
    legal-general force.
- source_word: מוֹת יוּמָת
  chosen: shall surely be put to death
  alternatives:
  - shall surely die
  - must be executed
  lexicon: HALOT
  rationale: The infinitive absolute + finite verb intensifies certainty. In legal
    contexts the hophal of מות is best rendered passively, 'be put to death,' rather
    than the less precise 'die.' 'Surely' preserves the emphatic construction.
- source_word: כָּל הָעֹשֶׂה בָהּ מְלָאכָה
  chosen: whoever does work on it
  alternatives:
  - everyone doing work on it
  - whoever does any work on it
  lexicon: HALOT
  rationale: מְלָאכָה is work/labor, especially occupational or task-oriented work.
    'Does work on it' is straightforward and preserves the general prohibition. 'Any'
    is possible but not explicit in the Hebrew here.
- source_word: וְנִכְרְתָה
  chosen: shall be cut off
  alternatives:
  - shall be removed
  - shall be cut down
  lexicon: HALOT
  rationale: כרת in the niphal in covenant/legal formulas is conventionally and accurately
    rendered 'be cut off.' The exact mechanism is not specified in the verb itself,
    so the traditional but still transparent rendering is preferable.
- source_word: הַנֶּפֶשׁ הַהִוא
  chosen: that person
  alternatives:
  - that soul
  - that life
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean soul, life, self, or person depending on context. In
    legal prose referring to the liable individual, 'that person' communicates the
    sense clearly in modern English without importing later anthropological assumptions.
- source_word: מִקֶּרֶב עַמֶּיהָ
  chosen: from among his people
  alternatives:
  - from the midst of his people
  - from among her people
  lexicon: HALOT
  rationale: The phrase means exclusion from the community. Although the suffix on
    עַמֶּיהָ is formally feminine agreeing with נֶפֶשׁ, English naturally refers back
    to 'person' with common-gender singular; 'his people' is a conventional generic
    rendering matching the source's singular reference. A more literal 'her people'
    would sound misleading in English because the referent is not specifically female.
