id: EXO.31.8
reference: Exodus 31:8
source:
  edition: WLC
  text: וְ/אֶת הַ/שֻּׁלְחָן֙ וְ/אֶת כֵּלָ֔י/ו וְ/אֶת הַ/מְּנֹרָ֥ה הַ/טְּהֹרָ֖ה וְ/אֶת
    כָּל כֵּלֶ֑י/הָ וְ/אֵ֖ת מִזְבַּ֥ח הַ/קְּטֹֽרֶת־־־־־׃
translation:
  text: and the table with its utensils, and the pure lampstand with all its utensils,
    and the altar of incense,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the menorah.' The Hebrew term refers to the sanctuary lampstand; the
      main text translates the common noun rather than transliterating it.
    reason: lexical_alternative
  - marker: b
    text: '''Pure'' may refer to ritual purity and, in this tabernacle context, likely
      also resonates with the lampstand''s being made of pure gold in related descriptions.'
    reason: cultural_note
  - marker: c
    text: Or 'the incense altar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשֻּׁלְחָן
  chosen: the table
  alternatives:
  - the table of the bread of the Presence
  lexicon: HALOT
  rationale: שֻׁלְחָן straightforwardly means 'table.' The broader tabernacle context
    identifies which table is meant, but this verse itself does not repeat the fuller
    designation, so the simple rendering is preferred.
- source_word: כֵּלָיו
  chosen: its utensils
  alternatives:
  - its vessels
  - its articles
  - its implements
  lexicon: HALOT
  rationale: כְּלִי is a broad term for objects, implements, or vessels. 'Utensils'
    is natural modern English for the table's associated service items in sanctuary
    context, without sounding overly technical.
- source_word: הַמְּנֹרָה
  chosen: the lampstand
  alternatives:
  - the menorah
  - the lamp
  lexicon: HALOT
  rationale: מְנוֹרָה denotes a lampstand. Per translation philosophy, common nouns/titles
    are translated rather than transliterated, so 'lampstand' is preferred over 'menorah'
    in the main text.
- source_word: הַטְּהֹרָה
  chosen: the pure
  alternatives:
  - the clean
  lexicon: HALOT
  rationale: טָהוֹר commonly means 'clean' or 'pure.' In cultic/tabernacle context,
    'pure' is the established and more fitting English adjective, likely also echoing
    the lampstand's pure gold composition in related passages.
- source_word: כָּל כֵּלֶיהָ
  chosen: all its utensils
  alternatives:
  - all its vessels
  - all its articles
  lexicon: HALOT
  rationale: כָּל adds totality, and כֵּלֶיהָ refers to the lampstand's associated
    implements. 'All its utensils' preserves both the comprehensiveness and the sanctuary-object
    sense.
- source_word: מִזְבַּח הַקְּטֹרֶת
  chosen: the altar of incense
  alternatives:
  - the incense altar
  lexicon: HALOT
  rationale: Construct chain meaning 'altar of incense/incense altar.' 'The altar
    of incense' is slightly more formal and transparent in English, matching common
    biblical usage.
- source_word: וְאֶת
  chosen: and
  lexicon: Hebrew grammar
  rationale: The repeated direct-object marker אֵת is not translated directly into
    English; the conjunction וְ is carried by repeated 'and' to preserve the list
    structure.
