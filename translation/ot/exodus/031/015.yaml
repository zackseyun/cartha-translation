id: EXO.31.15
reference: Exodus 31:15
source:
  edition: WLC
  text: שֵׁ֣שֶׁת יָמִים֮ יֵעָשֶׂ֣ה מְלָאכָה֒ וּ/בַ/יּ֣וֹם הַ/שְּׁבִיעִ֗י שַׁבַּ֧ת
    שַׁבָּת֛וֹן קֹ֖דֶשׁ לַ/יהוָ֑ה כָּל הָ/עֹשֶׂ֧ה מְלָאכָ֛ה בְּ/י֥וֹם הַ/שַּׁבָּ֖ת
    מ֥וֹת יוּמָֽת־׃
translation:
  text: Work may be done for six days, but on the seventh day there is a Sabbath of
    complete rest, holy to the LORD. Whoever does work on the Sabbath day shall surely
    be put to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a sabbath, a solemn rest.' The Hebrew phrase intensifies the idea of
      cessation/rest.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵעָשֶׂה מְלָאכָה
  chosen: Work may be done
  alternatives:
  - Work shall be done
  - Work is to be done
  - Labor may be done
  lexicon: HALOT
  rationale: The Niphal imperfect of עשה with מְלָאכָה is naturally rendered as passive
    ('be done'). 'May be done' fits the legal/instructional context without over-pressing
    it into a strict future. מְלָאכָה is rendered 'work' as the broad, natural English
    equivalent in Sabbath legislation.
- source_word: וּבַיּוֹם הַשְּׁבִיעִי
  chosen: but on the seventh day
  alternatives:
  - and on the seventh day
  lexicon: HALOT
  rationale: The conjunction ו can be simply 'and,' but in English the clause contrast
    between six workdays and the seventh day is best conveyed with 'but' while preserving
    the Hebrew sense.
- source_word: שַׁבַּת שַׁבָּתוֹן
  chosen: a Sabbath of complete rest
  alternatives:
  - a sabbath, a solemn rest
  - a sabbath of sabbath-observance
  - a complete rest
  lexicon: HALOT
  rationale: The collocation intensifies the idea of cessation/rest. 'A Sabbath of
    complete rest' preserves both the nominal title שַׁבַּת and the intensifying שַׁבָּתוֹן
    in readable English.
- source_word: קֹדֶשׁ לַיהוָה
  chosen: holy to the LORD
  alternatives:
  - a holy day to the LORD
  - holy for the LORD
  lexicon: HALOT
  rationale: קֹדֶשׁ here predicates sacred status, and ל marks dedication. 'Holy to
    the LORD' is concise and idiomatic, preserving covenantal orientation. Per doctrine,
    יהוה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The project default for the divine name is 'the LORD,' following the
    stated doctrine and established covenantal convention.
- source_word: כָּל הָעֹשֶׂה מְלָאכָה
  chosen: Whoever does work
  alternatives:
  - Everyone who does work
  - Anyone doing work
  lexicon: HALOT
  rationale: The participial construction with כָּל expresses a general legal category.
    'Whoever does work' is idiomatic legal English and preserves the universal force.
- source_word: בְּיוֹם הַשַּׁבָּת
  chosen: on the Sabbath day
  alternatives:
  - on the Sabbath
  lexicon: HALOT
  rationale: Including 'day' reflects the explicit יּוֹם in Hebrew and avoids flattening
    the phrase, while remaining natural in English.
- source_word: מוֹת יוּמָת
  chosen: shall surely be put to death
  alternatives:
  - must surely be put to death
  - shall surely die
  lexicon: HALOT
  rationale: The infinitive absolute plus passive/imperfect construction intensifies
    the penalty. Because the verb is Hophal ('be put to death') rather than simple
    active dying, 'shall surely be put to death' best reflects the legal/passive force.
