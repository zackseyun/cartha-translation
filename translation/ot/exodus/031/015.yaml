theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD.' This also aligns with the covenantal/liturgical register of the passage.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Strength of Sabbath terminology in שַׁבַּת שַׁבָּתוֹן
  chosen_reading: a Sabbath of complete rest
  alternative_readings:
  - a sabbath, a solemn rest
  - a sabbath of rest
  rationale: The phrase emphasizes the sanctity and total cessation associated with
    the seventh day without importing later doctrinal formulations. The translation
    preserves the intensity of the Hebrew while remaining readable.
  doctrine_reference: DOCTRINE.md Translation philosophy §§5–6
