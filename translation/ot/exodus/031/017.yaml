id: EXO.31.17
reference: Exodus 31:17
source:
  edition: WLC
  text: בֵּינִ֗/י וּ/בֵין֙ בְּנֵ֣י יִשְׂרָאֵ֔ל א֥וֹת הִ֖וא לְ/עֹלָ֑ם כִּי שֵׁ֣שֶׁת יָמִ֗ים עָשָׂ֤ה יְהוָה֙ אֶת הַ/שָּׁמַ֣יִם וְ/אֶת הָ/אָ֔רֶץ וּ/בַ/יּוֹם֙ הַ/שְּׁבִיעִ֔י שָׁבַ֖ת וַ/יִּנָּפַֽשׁ־־־׃ס
translation:
  text: It is a sign forever between me and the sons of Israel, for in six days Yahweh made the heavens and the earth, and on the seventh day he ceased and was refreshed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' for 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he rested'; the Hebrew verb more literally means 'he ceased.'
    reason: lexical_alternative
  - marker: c
    text: Or 'took breath' / 'was restored'; the Hebrew uses vivid anthropomorphic language.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּינִי וּבֵין
  chosen: between me and
  alternatives:
  - between me and between
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the correlative prepositions marking relationship between two parties.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Gender-accurate rendering preserves the Hebrew familial expression. 'Israelites' is idiomatic but less formally transparent; 'people of Israel' smooths the expression too much.
- source_word: אוֹת
  chosen: sign
  alternatives:
  - mark
  - token
  lexicon: HALOT
  rationale: Standard covenantal term indicating a visible or enduring marker of a relationship or reality.
- source_word: לְעֹלָם
  chosen: forever
  alternatives:
  - perpetually
  - for all time
  - throughout their generations
  lexicon: HALOT
  rationale: Direct and natural rendering of the Hebrew term for enduring duration. 'Throughout their generations' belongs to nearby formulations but is not the wording here.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the Sabbath as sign; 'for' fits English biblical style naturally.
- source_word: שֵׁשֶׁת יָמִים
  chosen: in six days
  alternatives:
  - six days
  lexicon: HALOT
  rationale: English idiom naturally expresses the temporal framework of creation with 'in six days'.
- source_word: עָשָׂה
  chosen: made
  alternatives:
  - did
  - fashioned
  lexicon: HALOT
  rationale: Best contextual gloss for God's creative action with heaven and earth as objects.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by doctrine table for the divine name, following established reverential convention.
- source_word: הַשָּׁמַיִם וְאֶת הָאָרֶץ
  chosen: the heavens and the earth
  alternatives:
  - heaven and earth
  - the sky and the land
  lexicon: HALOT
  rationale: Conventional merism for the created order; plural 'heavens' reflects the Hebrew form.
- source_word: וּבַיּוֹם הַשְּׁבִיעִי
  chosen: and on the seventh day
  alternatives:
  - but on the seventh day
  lexicon: HALOT
  rationale: Simple sequential conjunction with temporal phrase; no adversative force is necessary.
- source_word: שָׁבַת
  chosen: he ceased
  alternatives:
  - he rested
  - he stopped
  lexicon: HALOT
  rationale: The verb fundamentally denotes ceasing from work. 'Rested' is traditional, but 'ceased' better preserves the lexical sense and avoids implying divine fatigue.
- source_word: וַיִּנָּפַשׁ
  chosen: was refreshed
  alternatives:
  - took breath
  - restored himself
  - caught his breath
  lexicon: HALOT
  rationale: Idiomatic rendering of the Niphal form from נפשׁ in this context. 'Was refreshed' is established and natural English, while more literal options risk awkwardness or anthropomorphic overstatement.
