theological_decisions:
- issue: Anthropomorphic description of God in Sabbath language
  chosen_reading: Retain the human-like expression as 'he ceased and was refreshed' without softening it into abstraction.
  alternative_readings:
  - he rested and was refreshed
  - he ceased from work and took breath
  rationale: The Hebrew intentionally uses embodied Sabbath language. Rendering שָׁבַת as 'ceased' preserves lexical precision, while 'was refreshed' keeps the anthropomorphic force without implying creaturely weakness. This preserves theological tension rather than resolving it away.
  doctrine_reference: Translation philosophy §3
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The doctrine calls for gender-accurate rendering over gender-neutral smoothing where the source uses a masculine familial expression with representative force.
  doctrine_reference: Translation philosophy §4
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the stated default for YHWH in the doctrine table.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
