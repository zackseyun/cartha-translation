id: EXO.31.11
reference: Exodus 31:11
source:
  edition: WLC
  text: וְ/אֵ֨ת שֶׁ֧מֶן הַ/מִּשְׁחָ֛ה וְ/אֶת קְטֹ֥רֶת הַ/סַּמִּ֖ים לַ/קֹּ֑דֶשׁ כְּ/כֹ֥ל
    אֲשֶׁר צִוִּיתִ֖/ךָ יַעֲשֽׂוּ־־׃פ
translation:
  text: and the anointing oil, and the fragrant incense for the sanctuary. They shall
    make them according to all that I have commanded you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the incense of spices for the holy place.”
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׁמֶן הַמִּשְׁחָה
  chosen: the anointing oil
  alternatives:
  - the oil of anointing
  - the sacred anointing oil
  lexicon: HALOT
  rationale: A straightforward construct phrase meaning oil used for anointing. 'Anointing
    oil' is natural modern English and preserves the cultic function without adding
    'sacred,' which is not explicit in this phrase though implied by context.
- source_word: קְטֹרֶת הַסַּמִּים
  chosen: the fragrant incense
  alternatives:
  - the incense of spices
  - the spiced incense
  lexicon: HALOT
  rationale: The phrase literally denotes incense composed of aromatic spices. 'Fragrant
    incense' communicates the sense idiomatically in readable English while preserving
    the referent. A more formal alternative is preserved in a footnote.
- source_word: לַקֹּדֶשׁ
  chosen: for the sanctuary
  alternatives:
  - for the holy place
  - for the holy use
  lexicon: HALOT
  rationale: The prepositional phrase marks sacred/cultic purpose. 'For the sanctuary'
    fits the tabernacle context and reads naturally in English. 'For the holy place'
    is possible but may sound overly spatial here, whereas the phrase likely indicates
    use in the sanctuary context.
- source_word: כְּכֹל אֲשֶׁר צִוִּיתִךָ
  chosen: according to all that I have commanded you
  alternatives:
  - just as I have commanded you
  - in accordance with all that I have commanded you
  lexicon: HALOT
  rationale: This preserves the comprehensive force of כְּכֹל ('according to all')
    and the direct divine address to Moses. It is slightly more formal than 'just
    as' and better reflects the Hebrew wording.
- source_word: יַעֲשׂוּ
  chosen: They shall make them
  alternatives:
  - they shall make
  - they are to make them
  lexicon: HALOT
  rationale: The 3mp verb has an implied plural subject referring back to the craftsmen,
    and English benefits from supplying the object 'them' to gather the listed items.
    'Shall' fits the instructional/legal tone.
