id: EXO.31.1
reference: Exodus 31:1
source:
  edition: WLC
  text: וַ/יְדַבֵּ֥ר יְהוָ֖ה אֶל מֹשֶׁ֥ה לֵּ/אמֹֽר־׃
translation:
  text: Then the LORD spoke to Moses, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew YHWH, traditionally rendered 'the LORD'; alternatively, 'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: Then ... spoke
  alternatives:
  - And ... spoke
  - said
  lexicon: HALOT
  rationale: The waw-consecutive with דבר advances the narrative. 'Then ... spoke'
    gives natural modern English while preserving the sequential force better than
    a bare 'spoke.' 'Said' is possible, but דבר commonly carries the sense of speaking/addressing
    rather than the simpler אמר.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name YHWH is 'the LORD,'
    following longstanding English convention and reflecting Jewish reverence tradition
    and the Septuagintal pattern.
- source_word: אֶל
  chosen: to
  alternatives:
  - with
  lexicon: HALOT
  rationale: The preposition marks the indirect object of speech here; 'to Moses'
    is the straightforward and idiomatic rendering.
- source_word: מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names rather than translate them.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - to say
  lexicon: HALOT
  rationale: The infinitive לֵאמֹר introduces the content of the divine speech in
    a standard Hebrew formula. 'Saying' preserves the formal linkage to the following
    quotation while remaining natural in English.
