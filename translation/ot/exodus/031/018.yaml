theological_decisions:
- issue: Anthropomorphic expression in divine authorship
  chosen_reading: with the finger of God
  alternative_readings:
  - by God directly
  - by the power of God
  rationale: The Hebrew uses a concrete anthropomorphic phrase. Per translation philosophy,
    the tension and imagery should be preserved rather than explained away. This also
    maintains the text's emphasis on direct divine inscription.
  doctrine_reference: Translation philosophy §3
