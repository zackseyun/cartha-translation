id: EXO.31.18
reference: Exodus 31:18
source:
  edition: WLC
  text: וַ/יִּתֵּ֣ן אֶל מֹשֶׁ֗ה כְּ/כַלֹּת/וֹ֙ לְ/דַבֵּ֤ר אִתּ/וֹ֙ בְּ/הַ֣ר סִינַ֔י
    שְׁנֵ֖י לֻחֹ֣ת הָ/עֵדֻ֑ת לֻחֹ֣ת אֶ֔בֶן כְּתֻבִ֖ים בְּ/אֶצְבַּ֥ע אֱלֹהִֽים־׃
translation:
  text: And when he finished speaking with him on Mount Sinai, he gave Moses the two
    tablets of the testimony, tablets of stone, written with the finger of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the finger of God.' The Hebrew expression vividly attributes the
      writing directly to God.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: he gave
  alternatives:
  - and he gave
  lexicon: HALOT
  rationale: Wayyiqtol of נתן, straightforward narrative past. English omits the repeated
    initial 'and' for natural style while preserving sequence.
- source_word: כְּכַלֹּתוֹ לְדַבֵּר
  chosen: when he finished speaking
  alternatives:
  - after he finished speaking
  - as he finished speaking
  lexicon: HALOT
  rationale: 'The preposition כ with infinitive construct of כלה plus suffix marks
    completion in time: ''when/after he finished.'' ''When he finished speaking''
    is idiomatic and preserves the temporal sense.'
- source_word: אִתּוֹ
  chosen: with him
  lexicon: HALOT
  rationale: 'The pronoun most naturally refers back to Moses in context: God finished
    speaking with Moses, then gave Moses the tablets.'
- source_word: בְּהַר סִינַי
  chosen: on Mount Sinai
  alternatives:
  - at Mount Sinai
  lexicon: HALOT
  rationale: Standard English idiom for location on a mountain is 'on Mount Sinai.'
- source_word: שְׁנֵי לֻחֹת הָעֵדֻת
  chosen: the two tablets of the testimony
  alternatives:
  - the two tablets of the covenant document
  - the two tablets of the witness
  lexicon: HALOT
  rationale: לֻחֹת are stone tablets. עֵדוּת commonly denotes testimony/witness; in
    Pentateuchal covenant context it refers to the covenantal testimony deposited
    before God. 'Testimony' preserves the established covenantal sense without over-paraphrasing.
- source_word: לֻחֹת אֶבֶן
  chosen: tablets of stone
  alternatives:
  - stone tablets
  lexicon: HALOT
  rationale: Construct phrase indicating material. 'Tablets of stone' keeps the Hebrew
    appositional rhythm after 'the two tablets of the testimony.'
- source_word: כְּתֻבִים
  chosen: written
  alternatives:
  - inscribed
  lexicon: HALOT
  rationale: Passive participle from כתב. 'Written' is the plain lexical sense; 'inscribed'
    is possible but slightly more interpretive.
- source_word: בְּאֶצְבַּע אֱלֹהִים
  chosen: with the finger of God
  alternatives:
  - by the finger of God
  lexicon: HALOT
  rationale: Instrumental ב marks means/instrument. 'With the finger of God' is the
    most direct and traditional rendering, preserving the vivid anthropomorphic expression
    of divine agency.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here אֱלֹהִים refers to the God of Israel, singular in sense. 'God' is
    the natural English rendering.
