id: EXO.31.10
reference: Exodus 31:10
source:
  edition: WLC
  text: וְ/אֵ֖ת בִּגְדֵ֣י הַ/שְּׂרָ֑ד וְ/אֶת בִּגְדֵ֤י הַ/קֹּ֨דֶשׁ֙ לְ/אַהֲרֹ֣ן הַ/כֹּהֵ֔ן
    וְ/אֶת בִּגְדֵ֥י בָנָ֖י/ו לְ/כַהֵֽן־־׃
translation:
  text: and the finely woven garments, and the holy garments for Aaron the priest,
    and the garments of his sons for serving as priests,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the garments for ministry,' 'the service garments,' or 'the woven garments'
      for בִּגְדֵי הַשְּׂרָד; the Hebrew term is difficult and may emphasize either
      their workmanship or their use in tabernacle service.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּגְדֵי הַשְּׂרָד
  chosen: the finely woven garments
  alternatives:
  - the garments for ministry
  - the service garments
  - the woven garments
  lexicon: HALOT
  rationale: בִּגְדֵי means 'garments/clothes.' The difficult noun שְׂרָד in priestly
    contexts likely refers to specially worked or woven vestments rather than generic
    'service.' 'Finely woven garments' captures the probable material/craft sense
    in accessible English while avoiding overinterpretation. Because the term is debated,
    alternatives are preserved in a footnote.
- source_word: בִּגְדֵי הַקֹּדֶשׁ
  chosen: the holy garments
  alternatives:
  - the sacred garments
  lexicon: HALOT
  rationale: Literally 'the garments of holiness/holy garments.' 'Holy garments' is
    a natural and sufficiently formal rendering; 'sacred garments' is possible but
    slightly less direct.
- source_word: לְאַהֲרֹן הַכֹּהֵן
  chosen: for Aaron the priest
  alternatives:
  - for Aaron the priestly one
  lexicon: HALOT
  rationale: 'ל marks purpose/assignment here: the garments are designated for Aaron.
    ''The priest'' reflects the appositional title הַכֹּהֵן in straightforward English.'
- source_word: בִּגְדֵי בָנָיו
  chosen: the garments of his sons
  alternatives:
  - his sons' garments
  lexicon: HALOT
  rationale: Construct phrase with 3ms suffix, referring back to Aaron. 'The garments
    of his sons' preserves the formal structure and clear referent.
- source_word: לְכַהֵן
  chosen: for serving as priests
  alternatives:
  - for ministering as priests
  - to act as priests
  lexicon: HALOT
  rationale: The infinitive of כהן means 'to serve as priest/exercise priestly office.'
    'For serving as priests' is idiomatic modern English and preserves the vocational/priestly
    function without unnecessary jargon.
- source_word: וְאֵת / וְאֶת
  chosen: and
  lexicon: Hebrew syntax
  rationale: The repeated object marker אֵת is not translated directly in English;
    the conjunction וְ is represented by 'and' to preserve the list structure from
    the preceding verse.
