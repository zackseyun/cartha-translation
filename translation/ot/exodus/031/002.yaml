id: EXO.31.2
reference: Exodus 31:2
source:
  edition: WLC
  text: רְאֵ֖ה קָרָ֣אתִֽי בְ/שֵׁ֑ם בְּצַלְאֵ֛ל בֶּן אוּרִ֥י בֶן ח֖וּר לְ/מַטֵּ֥ה יְהוּדָֽה־־׃
translation:
  text: See, I have called by name Bezalel son of Uri, son of Hur, of the tribe of
    Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Look, I have summoned by name Bezalel.' The Hebrew idiom 'called by
      name' can carry the sense of specific personal designation.
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאֵה
  chosen: See,
  alternatives:
  - Look,
  lexicon: HALOT
  rationale: Imperative of ראה used discourse-pragmatically to draw attention. 'See'
    is a natural English equivalent that preserves the directness of the Hebrew better
    than a more paraphrastic rendering.
- source_word: קָרָאתִי
  chosen: I have called
  alternatives:
  - I have summoned
  - I have appointed
  lexicon: HALOT
  rationale: Qal perfect 1cs of קרא, here with בְּשֵׁם, denotes calling or designating
    someone. 'I have called' is the most direct rendering and leaves the nuance of
    selection/designation to the following phrase and context rather than importing
    'appointed' into the verb itself.
- source_word: בְּשֵׁם
  chosen: by name
  alternatives:
  - by his name
  - specifically
  lexicon: HALOT
  rationale: The idiom קרא בשם commonly means to call someone by name, often with
    the sense of specific personal designation. 'By name' preserves the Hebrew idiom
    compactly and naturally.
- source_word: בְּצַלְאֵל
  chosen: Bezalel
  rationale: 'Personal name transliterated according to the translation philosophy:
    translate titles, transliterate names.'
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: In genealogical identification בן normally means 'son of.' While it can
    more broadly denote descent, the immediate lineage formula here is best rendered
    straightforwardly as 'son of.'
- source_word: אוּרִי
  chosen: Uri
  rationale: Personal name transliterated by standard convention.
- source_word: חוּר
  chosen: Hur
  rationale: Personal name transliterated by standard convention.
- source_word: לְמַטֵּה
  chosen: of the tribe of
  alternatives:
  - belonging to the tribe of
  - for the tribe of
  lexicon: HALOT
  rationale: מַטֶּה literally means 'staff/tribe,' and in tribal-genealogical contexts
    refers to a tribe. The prefixed ל here marks affiliation. 'Of the tribe of' is
    idiomatic English and accurately conveys tribal belonging.
- source_word: יְהוּדָה
  chosen: Judah
  rationale: Proper tribal name transliterated in standard English form.
