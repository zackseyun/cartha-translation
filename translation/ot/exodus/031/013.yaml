id: EXO.31.13
reference: Exodus 31:13
source:
  edition: WLC
  text: וְ/אַתָּ֞ה דַּבֵּ֨ר אֶל בְּנֵ֤י יִשְׂרָאֵל֙ לֵ/אמֹ֔ר אַ֥ךְ אֶת שַׁבְּתֹתַ֖/י תִּשְׁמֹ֑רוּ כִּי֩ א֨וֹת הִ֜וא בֵּינִ֤/י וּ/בֵֽינֵי/כֶם֙ לְ/דֹרֹ֣תֵי/כֶ֔ם לָ/דַ֕עַת כִּ֛י אֲנִ֥י יְהוָ֖ה מְקַדִּשְׁ/כֶֽם־־׃
translation:
  text: And you, speak to the sons of Israel, saying, ‘Surely you shall keep my Sabbaths, for it is a sign between me and you throughout your generations, so that you may know that I am Yahweh who sanctifies you.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Only/Nevertheless, you shall keep my Sabbaths.' The Hebrew particle אַךְ can mark restriction or strong emphasis.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sons of Israel,' a standard covenantal designation for the people of Israel.
    reason: lexical_alternative
  - marker: c
    text: Or 'who makes you holy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה
  chosen: And you
  alternatives:
  - As for you
  - You yourself
  lexicon: HALOT
  rationale: Fronted pronoun adds emphasis and contrast with the preceding instructions; 'And you' preserves the discourse shift without over-interpreting it.
- source_word: דַּבֵּר
  chosen: speak
  alternatives:
  - tell
  - say
  lexicon: HALOT
  rationale: Imperative of דבר is well represented by 'speak'; it keeps the formal force of the command before the following indirect quotation formula.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Gender-accurate policy favors retaining the masculine familial expression where that is the source form. Here it refers corporately to Israel; a more idiomatic alternative is possible, but 'sons of Israel' best matches the Hebrew wording.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and say
  - to say
  lexicon: HALOT
  rationale: Standard quotation introducer; 'saying' preserves the Hebrew construction smoothly in English.
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - Only
  - Nevertheless
  - Indeed
  lexicon: HALOT
  rationale: אַךְ here marks strong restriction/emphasis in relation to the surrounding tabernacle instructions. 'Surely' communicates the emphatic force without suggesting an exclusive limitation as strongly as 'only' might in English.
- source_word: שַׁבְּתֹתַי
  chosen: my Sabbaths
  alternatives:
  - my Sabbath days
  - my sabbaths
  lexicon: HALOT
  rationale: Plural form is explicit in Hebrew and should be preserved. Capitalized 'Sabbaths' reflects the established name of the covenantal observance.
- source_word: תִּשְׁמֹרוּ
  chosen: you shall keep
  alternatives:
  - you must observe
  - you shall guard
  lexicon: HALOT
  rationale: שׁמר commonly means keep/observe/guard. 'Keep' is concise and traditional while still natural; it fits covenantal command language well.
- source_word: אוֹת
  chosen: a sign
  alternatives:
  - a mark
  - a token
  lexicon: HALOT
  rationale: '''Sign'' is the standard covenantal rendering and fits the theological function of the Sabbath here.'
- source_word: בֵּינִי וּבֵינֵיכֶם
  chosen: between me and you
  alternatives:
  - between me and you all
  lexicon: HALOT
  rationale: The plural addressee is clear from context; standard English 'you' is sufficient without awkward expansion.
- source_word: לְדֹרֹתֵיכֶם
  chosen: throughout your generations
  alternatives:
  - for your generations
  - from generation to generation
  lexicon: HALOT
  rationale: This idiom denotes ongoing continuity across successive generations; 'throughout your generations' is natural and precise.
- source_word: לָדַעַת
  chosen: so that you may know
  alternatives:
  - that you may know
  - for knowing
  lexicon: HALOT
  rationale: The infinitive with ל expresses purpose/result here. 'So that you may know' makes the purpose relation explicit in idiomatic English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מְקַדִּשְׁכֶם
  chosen: who sanctifies you
  alternatives:
  - who makes you holy
  - who consecrates you
  lexicon: HALOT
  rationale: The participle denotes ongoing action by YHWH. 'Sanctifies' preserves the theological vocabulary of קדשׁ while remaining understandable; 'makes you holy' is a viable dynamic alternative.
