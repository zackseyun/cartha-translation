id: EXO.31.9
reference: Exodus 31:9
source:
  edition: WLC
  text: וְ/אֶת מִזְבַּ֥ח הָ/עֹלָ֖ה וְ/אֶת כָּל כֵּלָ֑י/ו וְ/אֶת הַ/כִּיּ֖וֹר וְ/אֶת
    כַּנּֽ/וֹ־־־־־׃
translation:
  text: and the altar of burnt offering, with all its utensils, and the basin with
    its stand,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the laver with its base.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְבַּח
  chosen: altar
  alternatives:
  - sacrificial altar
  lexicon: HALOT
  rationale: The standard sense is 'altar.' 'Sacrificial altar' is more explicit but
    unnecessary here because the following construct phrase specifies its function.
- source_word: הָעֹלָה
  chosen: of burnt offering
  alternatives:
  - for burnt offering
  - of ascent offering
  lexicon: HALOT
  rationale: In construct with מִזְבַּח, this denotes the altar associated with the
    עֹלָה offering. 'Burnt offering' is the established and accurate rendering in
    cultic context; 'ascent offering' reflects etymology but is less natural in English
    and not required here.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: 'כָּל with the following plural noun naturally means the totality of
    the items: ''all its utensils.'''
- source_word: כֵּלָיו
  chosen: its utensils
  alternatives:
  - its vessels
  - its implements
  - all its equipment
  lexicon: HALOT
  rationale: כְּלִי in tabernacle contexts refers broadly to articles or implements
    used with the object named. 'Utensils' is clear modern English and suitably concrete
    for altar-related equipment.
- source_word: הַכִּיּוֹר
  chosen: the basin
  alternatives:
  - the laver
  lexicon: HALOT
  rationale: This is the wash basin in the tabernacle court. 'Basin' is more accessible
    modern English than the traditional 'laver' while preserving the referent.
- source_word: כַּנּוֹ
  chosen: its stand
  alternatives:
  - its base
  lexicon: HALOT
  rationale: The noun denotes the supporting structure for the basin. 'Stand' is natural
    English; 'base' is also possible, but 'stand' better conveys a support piece for
    a vessel.
- source_word: וְאֶת
  chosen: and
  alternatives:
  - also
  lexicon: HALOT
  rationale: In this inventory sequence, וְאֶת marks each additional direct object.
    English idiom renders this by repeating 'and' rather than preserving the object
    marker.
