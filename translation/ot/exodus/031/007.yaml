id: EXO.31.7
reference: Exodus 31:7
source:
  edition: WLC
  text: אֵ֣ת אֹ֣הֶל מוֹעֵ֗ד וְ/אֶת הָֽ/אָרֹן֙ לָֽ/עֵדֻ֔ת וְ/אֶת הַ/כַּפֹּ֖רֶת אֲשֶׁ֣ר
    עָלָ֑י/ו וְ/אֵ֖ת כָּל כְּלֵ֥י הָ/אֹֽהֶל׀־־־׃
translation:
  text: the tent of meeting, and the ark for the testimony, and the mercy seat that
    is on it, and all the furnishings of the tent—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the ark of the testimony.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the atonement cover.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the tent of appointment
  - the meeting tent
  lexicon: HALOT
  rationale: Standard rendering for the tabernacle structure where God meets with
    Israel. 'Tent of meeting' is both idiomatic and close to the Hebrew construct
    phrase.
- source_word: הָאָרֹן לָעֵדֻת
  chosen: the ark for the testimony
  alternatives:
  - the ark of the testimony
  - the ark for the covenant record
  lexicon: HALOT
  rationale: The preposition ל marks relation/purpose. 'For the testimony' preserves
    the Hebrew more directly than importing 'covenant.' 'Of the testimony' is a traditional
    alternative worth preserving.
- source_word: הַכַּפֹּרֶת
  chosen: the mercy seat
  alternatives:
  - the atonement cover
  lexicon: HALOT
  rationale: 'In tabernacle context this is the established referent: the gold cover
    atop the ark. ''Mercy seat'' is the most recognizable English equivalent, while
    ''atonement cover'' is a plausible more transparent alternative. Because this
    is Hebrew כַּפֹּרֶת rather than Greek ἱλαστήριον, the contested-terms default
    does not directly govern, but the lexical connection is acknowledged.'
- source_word: אֲשֶׁר עָלָיו
  chosen: that is on it
  alternatives:
  - which is over it
  - that is upon it
  lexicon: HALOT
  rationale: A straightforward relative clause with עַל + 3ms suffix referring back
    to the ark. 'On it' is natural modern English and sufficiently precise.
- source_word: כָּל כְּלֵי הָאֹהֶל
  chosen: all the furnishings of the tent
  alternatives:
  - all the utensils of the tent
  - all the vessels of the tent
  - all the equipment of the tent
  lexicon: HALOT
  rationale: כְּלִים is broad and contextually refers to the tabernacle's articles/items.
    'Furnishings' is readable modern English and fits sanctuary context better than
    the overly narrow 'utensils' or archaic 'vessels'.
