theological_decisions:
- issue: Rendering of כַּפֹּרֶת in sanctuary context
  chosen_reading: the mercy seat
  alternative_readings:
  - the atonement cover
  rationale: The term denotes the ark's cover in the holy place and carries sacrificial/atonement
    associations. 'Mercy seat' preserves continuity with biblical sanctuary language
    without forcing a narrower doctrinal explanation into the verse itself. A more
    transparent lexical alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 5, 6
