id: EXO.31.3
reference: Exodus 31:3
source:
  edition: WLC
  text: וָ/אֲמַלֵּ֥א אֹת֖/וֹ ר֣וּחַ אֱלֹהִ֑ים בְּ/חָכְמָ֛ה וּ/בִ/תְבוּנָ֥ה וּ/בְ/דַ֖עַת
    וּ/בְ/כָל מְלָאכָֽה־׃
translation:
  text: And I have filled him with the Spirit of God, with wisdom, with understanding,
    with knowledge, and with every kind of craftsmanship,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the spirit of God' or 'a divine spirit.' The Hebrew phrase can be understood
      more generally, but here it likely refers to God's own empowering Spirit.
    reason: alternative_reading
lexical_decisions:
- source_word: וָאֲמַלֵּא
  chosen: And I have filled
  alternatives:
  - And I filled
  - And I will fill
  lexicon: HALOT
  rationale: The verb from מלא means 'to fill.' In this context, with the preceding
    divine speech identifying Bezalel, the perfect with prefixed waw is best rendered
    as a present-result perfect in English ('have filled'), expressing God's completed
    endowment with present relevance. 'And I filled' is possible but sounds more remote
    in English; 'And I will fill' does not fit the form here.
- source_word: אֹתוֹ
  chosen: him
  lexicon: HALOT
  rationale: Direct-object pronoun referring to Bezalel in the immediate context;
    straightforwardly rendered 'him.'
- source_word: רוּחַ אֱלֹהִים
  chosen: the Spirit of God
  alternatives:
  - the spirit of God
  - a divine spirit
  lexicon: HALOT
  rationale: The construct phrase can denote God's Spirit or a divine spirit. In this
    context of divine empowerment for sacred tabernacle work, 'the Spirit of God'
    best reflects the personal, empowering sense and aligns with standard biblical
    usage. Lowercase 'spirit' is lexically possible, but the context favors the more
    specific rendering.
- source_word: בְּחָכְמָה
  chosen: with wisdom
  alternatives:
  - in wisdom
  lexicon: HALOT
  rationale: The preposition ב here marks the sphere or endowment accompanying the
    filling. English 'with wisdom' is more natural than 'in wisdom' while preserving
    the sense of bestowed capacity.
- source_word: וּבִתְבוּנָה
  chosen: with understanding
  alternatives:
  - with insight
  lexicon: HALOT
  rationale: תבונה denotes understanding, discernment, or insight. 'Understanding'
    fits the common triad with wisdom and knowledge and preserves lexical transparency.
- source_word: וּבְדַעַת
  chosen: with knowledge
  lexicon: HALOT
  rationale: דעת is the standard term for knowledge. 'Knowledge' keeps the triadic
    pattern concise and recognizable.
- source_word: וּבְכָל מְלָאכָה
  chosen: with every kind of craftsmanship
  alternatives:
  - with all craftsmanship
  - with every kind of work
  - for every kind of work
  lexicon: HALOT
  rationale: מלאכה can mean work, occupation, or craftsmanship. In the immediate context
    of artistic and skilled tabernacle construction, 'craftsmanship' best captures
    skilled manual/artistic work. 'Every kind of' idiomatically renders כל with an
    abstract singular in English.
