theological_decisions:
- issue: Whether רוּחַ אֱלֹהִים should be rendered impersonally ('a divine spirit'
    / 'the spirit of God') or personally ('the Spirit of God')
  chosen_reading: the Spirit of God
  alternative_readings:
  - the spirit of God
  - a divine spirit
  rationale: The verse describes God's direct endowment of Bezalel for holy service
    connected to the tabernacle. Within historic Christian reading and the immediate
    literary context, the phrase is best rendered as God's own Spirit empowering him,
    without importing later doctrinal precision beyond the text itself.
  doctrine_reference: Affirmations; Translation philosophy §3
