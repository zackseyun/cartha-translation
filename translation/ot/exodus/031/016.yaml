theological_decisions:
- issue: Rendering the covenant people designation בְנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The Hebrew is explicitly masculine plural in a familial expression. Per
    the translation philosophy's gender-accurate principle, the draft preserves that
    form rather than replacing it with a neutral ethnonym, while recognizing that
    the phrase refers corporately to the whole people.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering בְּרִית עוֹלָם
  chosen_reading: everlasting covenant
  alternative_readings:
  - eternal covenant
  - perpetual covenant
  rationale: The phrase should retain its covenantal and durative force without importing
    later theological conclusions beyond the verse itself. 'Everlasting' is a conventional
    and accurate rendering of עוֹלָם in this covenant context.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
