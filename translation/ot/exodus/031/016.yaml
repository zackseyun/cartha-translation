id: EXO.31.16
reference: Exodus 31:16
source:
  edition: WLC
  text: וְ/שָׁמְר֥וּ בְנֵֽי יִשְׂרָאֵ֖ל אֶת הַ/שַּׁבָּ֑ת לַ/עֲשׂ֧וֹת אֶת הַ/שַּׁבָּ֛ת
    לְ/דֹרֹתָ֖/ם בְּרִ֥ית עוֹלָֽם־־־׃
translation:
  text: So the sons of Israel shall keep the Sabbath, to observe the Sabbath throughout
    their generations as an everlasting covenant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or 'the children of Israel.' The Hebrew reads literally
      'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'to do the Sabbath'; that is, to observe or keep it.
    reason: lexical_alternative
  - marker: c
    text: Or 'an eternal covenant' or 'a perpetual covenant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמְרוּ
  chosen: shall keep
  alternatives:
  - and shall keep
  - must keep
  - shall observe
  lexicon: HALOT
  rationale: שׁמר commonly means 'keep, guard, observe.' 'Shall keep' preserves the
    covenantal/imperatival force in context while reading naturally in English. The
    prefixed conjunction is absorbed into smooth English rather than rendered woodenly
    as 'and.'
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' In keeping with the gender-accurate principle,
    the masculine familial expression is retained rather than flattened to 'Israelites,'
    while still functioning corporately for the covenant people.
- source_word: הַשַּׁבָּת
  chosen: the Sabbath
  alternatives:
  - the sabbath day
  lexicon: HALOT
  rationale: Standard rendering of שַׁבָּת. The Hebrew here names the institution/covenant
    sign, not merely a generic day of rest, so 'the Sabbath' is best.
- source_word: לַעֲשׂוֹת אֶת הַשַּׁבָּת
  chosen: to observe the Sabbath
  alternatives:
  - to do the Sabbath
  - to keep the Sabbath
  - to celebrate the Sabbath
  lexicon: HALOT
  rationale: The idiom 'do/make the Sabbath' is not natural in English. 'Observe the
    Sabbath' captures the Hebrew idiom faithfully without paraphrasing beyond the
    sense. 'Keep' was avoided here to prevent awkward repetition with שׁמר, though
    the concepts overlap.
- source_word: לְדֹרֹתָם
  chosen: throughout their generations
  alternatives:
  - for their generations
  - from generation to generation
  lexicon: HALOT
  rationale: This phrase denotes ongoing continuity across successive generations.
    'Throughout their generations' is a standard, clear rendering.
- source_word: בְּרִית עוֹלָם
  chosen: as an everlasting covenant
  alternatives:
  - an eternal covenant
  - a perpetual covenant
  lexicon: HALOT
  rationale: בְּרִית is 'covenant.' עוֹלָם often denotes enduring, perpetual duration
    in covenantal contexts. 'Everlasting covenant' is idiomatic and preserves the
    covenantal weight. The prepositionless final phrase is rendered with 'as' to express
    its predicative/appositional force in English.
