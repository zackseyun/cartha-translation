id: EXO.31.4
reference: Exodus 31:4
source:
  edition: WLC
  text: לַ/חְשֹׁ֖ב מַחֲשָׁבֹ֑ת לַ/עֲשׂ֛וֹת בַּ/זָּהָ֥ב וּ/בַ/כֶּ֖סֶף וּ/בַ/נְּחֹֽשֶׁת׃
translation:
  text: to devise designs, to work in gold and in silver and in bronze,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to plan artistic designs.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew נְחֹשֶׁת can refer to copper or bronze; here 'bronze' best fits the
      tabernacle craftsmanship context.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַחְשֹׁב
  chosen: to devise
  alternatives:
  - to think
  - to plan
  - to invent
  lexicon: HALOT
  rationale: The infinitive construct of חשׁב here refers not merely to internal thought
    but to skilled planning/designing in a craftsman context. 'Devise' captures intentional
    creative planning better than the overly generic 'think.'
- source_word: מַחֲשָׁבֹת
  chosen: designs
  alternatives:
  - plans
  - artistic designs
  - devices
  lexicon: HALOT
  rationale: In context of tabernacle craftsmanship, מחשבות denotes conceived designs
    or artistic plans. 'Designs' is concise, natural English and fits the artisan
    setting.
- source_word: לַעֲשׂוֹת
  chosen: to work
  alternatives:
  - to make
  - to fashion
  - to do
  lexicon: HALOT
  rationale: Although עשה often means 'to make/do,' in this sequence it introduces
    execution in specified materials. 'To work' idiomatically conveys craftsmanship
    in metal better than the broader 'to do' and more naturally than repeating 'to
    make' after 'designs.'
- source_word: בַּזָּהָב
  chosen: in gold
  alternatives:
  - with gold
  - using gold
  lexicon: HALOT
  rationale: The preposition ב in lists of materials can be rendered 'in' or 'with.'
    'In gold' is a conventional and natural English expression for artistic workmanship
    and preserves the material-oriented sense.
- source_word: וּבַכֶּסֶף
  chosen: and in silver
  alternatives:
  - and with silver
  lexicon: HALOT
  rationale: Kept parallel with 'in gold' for stylistic and lexical consistency across
    the material list.
- source_word: וּבַנְּחֹשֶׁת
  chosen: and in bronze
  alternatives:
  - and in copper
  lexicon: HALOT
  rationale: נחשת can denote copper or bronze depending on context. In tabernacle-furnishing
    contexts, 'bronze' is the standard and most likely referent in English Bible usage,
    referring to worked metal objects rather than raw copper.
