id: EXO.31.5
reference: Exodus 31:5
source:
  edition: WLC
  text: וּ/בַ/חֲרֹ֥שֶׁת אֶ֛בֶן לְ/מַלֹּ֖את וּ/בַ/חֲרֹ֣שֶׁת עֵ֑ץ לַ/עֲשׂ֖וֹת בְּ/כָל
    מְלָאכָֽה־׃
translation:
  text: in the cutting of stone for setting, and in the carving of wood, to do every
    kind of work,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in craftsmanship of stone for mounting' or 'in engraving of stone for
      setting.'
    reason: lexical_alternative
  - marker: b
    text: '''Stone'' is general here; in context it may include precious stones used
      in tabernacle work.'
    reason: cultural_note
lexical_decisions:
- source_word: וּבַחֲרֹשֶׁת
  chosen: in the cutting / in the carving
  alternatives:
  - in craftsmanship
  - in engraving
  - in artistic work
  lexicon: HALOT
  rationale: 'The noun from חרשׁת denotes skilled work or workmanship. Here it occurs
    twice with different materials, so varying the English by material clarifies the
    sense: ''cutting'' for stone and ''carving'' for wood. This preserves the concrete
    craft activity better than the broader ''craftsmanship''.'
- source_word: אֶבֶן
  chosen: stone
  alternatives:
  - precious stone
  - gem
  lexicon: HALOT
  rationale: The word is the ordinary term for 'stone.' In tabernacle context it can
    involve precious stones, but the verse itself does not specify that, so the more
    general 'stone' is retained.
- source_word: לְמַלֹּאת
  chosen: for setting
  alternatives:
  - for mounting
  - for inlaying
  - for filling
  lexicon: HALOT
  rationale: In this artisan context the infinitive means preparing stones to be set
    into a mounting or setting. 'For setting' is idiomatic and fits the tabernacle
    craftsmanship context better than the overly literal 'for filling.'
- source_word: עֵץ
  chosen: wood
  alternatives:
  - timber
  lexicon: HALOT
  rationale: The common material term is best rendered 'wood' in modern English for
    crafted objects.
- source_word: לַעֲשׂוֹת
  chosen: to do
  alternatives:
  - to make
  - to perform
  lexicon: HALOT
  rationale: The infinitive of עשה is broad. 'To do' matches the Hebrew's generality
    and works naturally with 'every kind of work.' 'To make' would narrow the sense
    slightly toward production alone.
- source_word: בְּכָל מְלָאכָה
  chosen: every kind of work
  alternatives:
  - all kinds of craftsmanship
  - every task
  - all workmanship
  lexicon: HALOT
  rationale: מְלָאכָה refers to work, occupation, or skilled labor. 'Every kind of
    work' preserves the comprehensiveness while remaining readable. Because the immediate
    context is artisan skill, this naturally implies skilled work without over-specifying.
