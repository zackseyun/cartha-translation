id: EXO.31.6
reference: Exodus 31:6
source:
  edition: WLC
  text: וַ/אֲנִ֞י הִנֵּ֧ה נָתַ֣תִּי אִתּ֗/וֹ אֵ֣ת אָהֳלִיאָ֞ב בֶּן אֲחִֽיסָמָךְ֙ לְ/מַטֵּה
    דָ֔ן וּ/בְ/לֵ֥ב כָּל חֲכַם לֵ֖ב נָתַ֣תִּי חָכְמָ֑ה וְ/עָשׂ֕וּ אֵ֖ת כָּל אֲשֶׁ֥ר
    צִוִּיתִֽ/ךָ־־־־־׃
translation:
  text: And I, behold, have appointed with him Oholiab son of Ahisamach, of the tribe
    of Dan; and in the heart of everyone wise of heart I have put wisdom, so that
    they may make all that I have commanded you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'and they shall make all that I have commanded you.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'wise of heart,' an idiom for those endowed with wisdom or skill.
    reason: cultural_note
lexical_decisions:
- source_word: וַאֲנִי הִנֵּה
  chosen: And I, behold,
  alternatives:
  - And I—look
  - And I myself, behold
  lexicon: HALOT
  rationale: Retains the emphatic first-person pronoun plus deictic particle. 'Behold'
    preserves the marked attention-getting force of הִנֵּה better than omitting it,
    while remaining understandable in elevated modern English.
- source_word: נָתַתִּי אִתּוֹ
  chosen: have appointed with him
  alternatives:
  - have given with him
  - have placed with him
  lexicon: HALOT
  rationale: נתן literally means 'give/put,' but with a personal object in this commissioning
    context it idiomatically conveys assigning or appointing someone alongside Bezalel.
    'With him' preserves אִתּוֹ explicitly.
- source_word: אָהֳלִיאָב
  chosen: Oholiab
  rationale: Personal name transliterated per project philosophy.
- source_word: בֶּן אֲחִיסָמָךְ
  chosen: son of Ahisamach
  rationale: Standard genealogical rendering; personal name transliterated.
- source_word: לְמַטֵּה דָן
  chosen: of the tribe of Dan
  alternatives:
  - from the tribe of Dan
  - belonging to the tribe of Dan
  lexicon: HALOT
  rationale: מַטֶּה here denotes tribal affiliation. 'Of the tribe of Dan' is natural
    English and preserves the social identity marker.
- source_word: וּבְלֵב כָּל חֲכַם לֵב
  chosen: and in the heart of everyone wise of heart
  alternatives:
  - and to all the skillful I have given skill
  - and in the mind of every wise-hearted person
  lexicon: HALOT
  rationale: The Hebrew repeats לב idiomatically. 'Wise of heart' preserves the Hebrew
    anthropology in which the heart is the seat of skill and understanding, rather
    than flattening it to merely 'skilled.' 'Everyone' captures the distributive force
    of כָּל.
- source_word: נָתַתִּי חָכְמָה
  chosen: I have put wisdom
  alternatives:
  - I have given wisdom
  - I have bestowed skill
  lexicon: HALOT
  rationale: Keeps the concrete metaphor of placing wisdom within them. חָכְמָה in
    this tabernacle context includes practical craftsmanship, but 'wisdom' preserves
    the lexical link and broader theological resonance.
- source_word: וְעָשׂוּ
  chosen: so that they may make
  alternatives:
  - and they shall make
  - and they will make
  lexicon: HALOT
  rationale: Following the preceding gift of wisdom, the clause is naturally purposive/resultative
    in English. 'May make' expresses intended outcome without overstating simple futurity.
- source_word: אֵת כָּל אֲשֶׁר צִוִּיתִךָ
  chosen: all that I have commanded you
  alternatives:
  - everything that I commanded you
  - all that I commanded you
  lexicon: HALOT
  rationale: Straightforward rendering of the totality expression. Perfect aspect
    in English as 'have commanded' fits the ongoing relevance of the prior commands
    to Moses.
