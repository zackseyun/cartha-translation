theological_decisions:
- issue: Rendering the idiom חכם לב in a craftsmanship context
  chosen_reading: wise of heart / wisdom
  alternative_readings:
  - skillful / skill
  rationale: The verse concerns artisan endowment for tabernacle work, so 'skill'
    is contextually possible. However, retaining 'heart' and 'wisdom' better preserves
    the Hebrew conception that practical craftsmanship is a divinely given form of
    wisdom, without importing a narrower modern distinction between technical skill
    and wisdom.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Force of וְעָשׂוּ after the gift of wisdom
  chosen_reading: so that they may make
  alternative_readings:
  - and they shall make
  rationale: This rendering reflects the logical relation between God's giving wisdom
    and the artisans' resulting work. It is not a doctrinally loaded choice, but it
    preserves the sense of divine enablement leading to obedience.
  doctrine_reference: Translation philosophy §1
