id: EXO.39.7
reference: Exodus 39:7
source:
  edition: WLC
  text: וַ/יָּ֣שֶׂם אֹתָ֗/ם עַ֚ל כִּתְפֹ֣ת הָ/אֵפֹ֔ד אַבְנֵ֥י זִכָּר֖וֹן לִ/בְנֵ֣י יִשְׂרָאֵ֑ל כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶֽׁה־׃פ
translation:
  text: And he set them on the shoulder pieces of the ephod as memorial stones for the sons of Israel, just as Yahweh had commanded Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stones of remembrance.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of Israel,' a standard expression referring to the people of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  chosen: And he set
  alternatives:
  - And he placed
  - And he put
  lexicon: HALOT
  rationale: The verb שׂוּם commonly means 'set/put/place.' 'Set' is natural English in a craftsmanship context and preserves the concrete action without over-paraphrase.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct-object pronoun referring back to the two onyx stones of the previous verse; 'them' is the straightforward English equivalent.
- source_word: עַל כִּתְפֹת הָאֵפֹד
  chosen: on the shoulder pieces of the ephod
  alternatives:
  - on the shoulders of the ephod
  lexicon: HALOT
  rationale: כָּתֵף literally means 'shoulder,' but in tabernacle vestment description it refers to the ephod's shoulder attachments/pieces. 'Shoulder pieces' is more precise in English for the garment construction while remaining close to the Hebrew.
- source_word: אַבְנֵי זִכָּרוֹן
  chosen: as memorial stones
  alternatives:
  - stones of remembrance
  - remembrance stones
  lexicon: HALOT
  rationale: The construct phrase literally means 'stones of memorial/remembrance.' 'Memorial stones' is idiomatic modern English and preserves the commemorative function.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: for the sons of Israel
  alternatives:
  - for the Israelites
  - for the children of Israel
  lexicon: HALOT
  rationale: בְּנֵי יִשְׂרָאֵל is formally 'sons of Israel.' Per the project's gender-accurate philosophy, the masculine form is retained where it reflects the source expression. 'Children of Israel' is traditional but less precise; 'Israelites' is possible but less formally transparent.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  chosen: just as the LORD had commanded Moses
  alternatives:
  - as the LORD commanded Moses
  lexicon: HALOT
  rationale: 'כַּאֲשֶׁר introduces comparison/conformity: ''just as/as.'' The pluperfect-like English ''had commanded'' fits the narrative sequence, since the command preceded the action. יְהוָה is rendered ''the LORD'' per doctrine.'
