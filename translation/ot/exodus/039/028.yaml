id: EXO.39.28
reference: Exodus 39:28
source:
  edition: WLC
  text: וְ/אֵת֙ הַ/מִּצְנֶ֣פֶת שֵׁ֔שׁ וְ/אֶת פַּאֲרֵ֥י הַ/מִּגְבָּעֹ֖ת שֵׁ֑שׁ וְ/אֶת
    מִכְנְסֵ֥י הַ/בָּ֖ד שֵׁ֥שׁ מָשְׁזָֽר־־׃
translation:
  text: the turban of fine linen, the ornate caps of fine linen, and the undergarments
    of finely twisted linen,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the linen undergarments, of twisted fine linen.' The Hebrew word order
      allows the final phrase 'fine linen, twisted' to be heard especially with the
      last item, though it also echoes the material description used throughout the
      priestly garments.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמִּצְנֶפֶת
  chosen: the turban
  alternatives:
  - the headwrap
  - the headdress
  lexicon: HALOT
  rationale: מִצְנֶפֶת denotes the priestly head covering, especially the high priest's
    turban. 'Turban' is the most established and sufficiently precise modern English
    rendering in this cultic context.
- source_word: שֵׁשׁ
  chosen: fine linen
  alternatives:
  - linen
  lexicon: HALOT
  rationale: שֵׁשׁ refers to fine linen rather than merely linen in general. Rendering
    it as 'fine linen' preserves the material's quality and matches tabernacle/vestment
    usage.
- source_word: פַּאֲרֵי הַמִּגְבָּעֹת
  chosen: the ornate caps
  alternatives:
  - the beautiful caps
  - the headdresses of the caps
  lexicon: HALOT
  rationale: The construct phrase combines פַּאֲרֵי ('ornamental/beautiful adornments')
    with מִגְבָּעוֹת ('caps'). In context it refers to the priestly caps as splendid
    or ornate items, not separate adornments. 'Ornate caps' captures the attributive
    force in readable English.
- source_word: מִכְנְסֵי הַבָּד
  chosen: the undergarments of linen
  alternatives:
  - the linen undergarments
  - the linen breeches
  lexicon: HALOT
  rationale: מִכְנָסַיִם are lower-body priestly undergarments. 'Undergarments' is
    clear modern English; 'breeches' is traditional but archaic. הַבָּד specifies
    linen material.
- source_word: מָשְׁזָר
  chosen: finely twisted
  alternatives:
  - twined
  - woven
  lexicon: HALOT
  rationale: מָשְׁזָר describes spun or twisted thread construction. 'Finely twisted'
    communicates the textile technique in natural English and fits the repeated tabernacle-clothing
    formula.
