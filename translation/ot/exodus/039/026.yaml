id: EXO.39.26
reference: Exodus 39:26
source:
  edition: WLC
  text: פַּעֲמֹ֤ן וְ/רִמֹּן֙ פַּעֲמֹ֣ן וְ/רִמֹּ֔ן עַל שׁוּלֵ֥י הַ/מְּעִ֖יל סָבִ֑יב לְ/שָׁרֵ֕ת כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶֽׁה־־׃ס
translation:
  text: a bell and a pomegranate, a bell and a pomegranate, around the hem of the robe, all around, for ministering, just as Yahweh had commanded Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for service' or 'for serving.' The Hebrew infinitive denotes the robe's purpose in priestly ministry.
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּעֲמֹן
  chosen: bell
  alternatives:
  - gold bell
  lexicon: HALOT
  rationale: The noun denotes a bell. 'Gold' is supplied in the broader context (vv. 24–25) but is not explicit in this verse, so the main text keeps the simple lexical sense.
- source_word: רִמּוֹן
  chosen: pomegranate
  alternatives:
  - pomegranate ornament
  lexicon: HALOT
  rationale: The word literally means 'pomegranate.' In this tabernacle-clothing context it refers to a decorative pomegranate-shaped ornament, but the literal term is clear and natural in English.
- source_word: עַל שׁוּלֵי הַמְּעִיל
  chosen: around the hem of the robe
  alternatives:
  - on the skirts of the robe
  - on the hem of the robe
  lexicon: HALOT
  rationale: שׁוּלֵי refers to the lower edges/hem, and מְעִיל is the robe. 'Hem' is idiomatic modern English; 'around' reflects the placement along the edge.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - round about
  - around
  lexicon: HALOT
  rationale: The adverb emphasizes encircling placement. Rendering it as 'all around' preserves the distributive emphasis already present in the Hebrew.
- source_word: לְשָׁרֵת
  chosen: for ministering
  alternatives:
  - for service
  - for serving
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'Ministering' fits priestly/tabernacle service better than the flatter 'serving,' while remaining understandable in modern English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צִוָּה ... אֶת מֹשֶׁה
  chosen: had commanded Moses
  alternatives:
  - commanded Moses
  lexicon: HALOT
  rationale: The clause marks conformity to a prior divine command. English past perfect is natural here because the command preceded the completed workmanship being described.
