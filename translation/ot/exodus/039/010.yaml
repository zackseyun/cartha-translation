id: EXO.39.10
reference: Exodus 39:10
source:
  edition: WLC
  text: וַ/יְמַלְאוּ ב֔/וֹ אַרְבָּעָ֖ה ט֣וּרֵי אָ֑בֶן ט֗וּר אֹ֤דֶם פִּטְדָה֙ וּ/בָרֶ֔קֶת
    הַ/טּ֖וּר הָ/אֶחָֽד־׃
translation:
  text: 'And they mounted on it four rows of stones: the first row was a ruby, a topaz,
    and an emerald.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The precise identification of these gemstones is uncertain; 'ruby,' 'topaz,'
      and 'emerald' follow common traditional renderings. Possible alternatives include
      'carnelian' for ruby, 'chrysolite' for topaz, and another bright green or flashing
      stone for emerald.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמַלְאוּ
  chosen: they mounted
  alternatives:
  - they filled
  - they set
  lexicon: HALOT
  rationale: Although the verb literally means 'they filled,' in the context of setting
    gemstones into the breastpiece, idiomatic English prefers 'mounted' or 'set.'
    This reflects the sense of placing stones into settings rather than filling empty
    space.
- source_word: בּוֹ
  chosen: on it
  alternatives:
  - in it
  lexicon: HALOT
  rationale: The preposition with pronominal suffix refers back to the breastpiece.
    English can say either 'in it' or 'on it'; 'on it' fits the imagery of stones
    mounted onto the breastpiece surface.
- source_word: אַרְבָּעָה טוּרֵי אָבֶן
  chosen: four rows of stones
  alternatives:
  - four rows of stone
  - four settings of stones
  lexicon: HALOT
  rationale: טוּרֵי denotes rows, and אָבֶן here functions collectively. 'Four rows
    of stones' is natural English and matches the inventory-like description.
- source_word: טוּר
  chosen: row
  alternatives:
  - setting
  - course
  lexicon: HALOT
  rationale: The repeated noun introduces the contents of the first row. 'Row' maintains
    consistency with the preceding phrase and the tabernacle-jewelry context.
- source_word: אֹדֶם
  chosen: ruby
  alternatives:
  - carnelian
  - red stone
  lexicon: HALOT
  rationale: The precise identification is uncertain. 'Ruby' is a familiar traditional
    rendering, but the underlying stone may have been carnelian or another red gem.
    A footnote preserves the uncertainty.
- source_word: פִּטְדָה
  chosen: topaz
  alternatives:
  - chrysolite
  lexicon: HALOT
  rationale: The exact gemstone is uncertain, but 'topaz' is the standard traditional
    rendering in English Bible translation. An alternative is preserved in a footnote
    due to lexical uncertainty.
- source_word: בָרֶקֶת
  chosen: emerald
  alternatives:
  - malachite
  - carbuncle
  lexicon: HALOT
  rationale: The term likely refers to a flashing or gleaming stone (from a root related
    to lightning/brightness). 'Emerald' is the common traditional rendering, though
    certainty is not possible; the alternative is footnoted.
- source_word: הַטּוּר הָאֶחָד
  chosen: the first row was
  alternatives:
  - one row
  - the one row
  lexicon: HALOT
  rationale: In context this phrase identifies the first of the four rows and introduces
    its three stones. English idiom requires supplying 'was' to make the list read
    naturally.
