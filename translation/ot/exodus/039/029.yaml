id: EXO.39.29
reference: Exodus 39:29
source:
  edition: WLC
  text: וְֽ/אֶת הָ/אַבְנֵ֞ט שֵׁ֣שׁ מָשְׁזָ֗ר וּ/תְכֵ֧לֶת וְ/אַרְגָּמָ֛ן וְ/תוֹלַ֥עַת
    שָׁנִ֖י מַעֲשֵׂ֣ה רֹקֵ֑ם כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶֽׁה־־׃ס
translation:
  text: and the sash of finely twisted linen, and blue and purple and scarlet yarn,
    the work of an embroiderer, just as the LORD had commanded Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the belt' or 'the waistband.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'scarlet' refers to scarlet-dyed material; 'crimson' is another possible
      rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאַבְנֵט
  chosen: the sash
  alternatives:
  - the waistband
  - the belt
  lexicon: HALOT
  rationale: אַבְנֵט denotes the priestly sash/belt worn with the garments. 'Sash'
    is natural modern English and fits the cultic garment context better than the
    more generic 'belt.'
- source_word: שֵׁשׁ מָשְׁזָר
  chosen: finely twisted linen
  alternatives:
  - fine twisted linen
  - twined linen
  lexicon: HALOT
  rationale: שֵׁשׁ refers to fine linen, and מָשְׁזָר describes it as twisted/twined.
    'Finely twisted linen' preserves both material and workmanship in idiomatic English.
- source_word: תְכֵלֶת
  chosen: blue
  alternatives:
  - blue yarn
  - blue-purple
  lexicon: HALOT
  rationale: The term denotes the prestigious blue dyed material used in tabernacle
    textiles. Since the material term is supplied by the series and English style,
    'blue' is sufficient in the main text.
- source_word: אַרְגָּמָן
  chosen: purple
  alternatives:
  - purple yarn
  - reddish-purple
  lexicon: HALOT
  rationale: Standard rendering for the dyed textile color in tabernacle contexts;
    concise and conventional without obscuring meaning.
- source_word: תוֹלַעַת שָׁנִי
  chosen: scarlet yarn
  alternatives:
  - scarlet
  - crimson yarn
  lexicon: HALOT
  rationale: This expression denotes scarlet-dyed material. 'Scarlet yarn' makes explicit
    the textile sense in context and matches the sequence of materials.
- source_word: מַעֲשֵׂה רֹקֵם
  chosen: the work of an embroiderer
  alternatives:
  - embroidered work
  - the work of a weaver of colors
  lexicon: HALOT
  rationale: The phrase describes skilled decorative needlework/textile craftsmanship.
    'The work of an embroiderer' is a clear, fairly formal rendering that preserves
    the artisan emphasis.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established English convention and the stated translation policy.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת־מֹשֶׁה
  chosen: just as the LORD had commanded Moses
  alternatives:
  - as the LORD commanded Moses
  lexicon: HALOT
  rationale: This recurring Exodus formula marks exact obedience to divine instruction.
    'Just as' slightly highlights conformity, and the English pluperfect reads naturally
    in narrative summary.
