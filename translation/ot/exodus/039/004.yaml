id: EXO.39.4
reference: Exodus 39:4
source:
  edition: WLC
  text: כְּתֵפֹ֥ת עָֽשׂוּ ל֖/וֹ חֹבְרֹ֑ת עַל שְׁנֵ֥י קצוות/ו חֻבָּֽר־־׃
translation:
  text: They made for it shoulder pieces, joined to it; at its two ends it was joined.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shoulder straps.' The Hebrew term refers to the parts of the ephod that
      lay on the shoulders and connected its sections.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּתֵפֹת
  chosen: shoulder pieces
  alternatives:
  - shoulder straps
  - shoulder-pieces
  lexicon: HALOT
  rationale: The plural noun literally relates to 'shoulders,' but in tabernacle garment
    context it denotes the constructed pieces resting on the shoulders of the ephod.
    'Shoulder pieces' is natural modern English and preserves the concrete garment
    feature better than the less certain 'straps.'
- source_word: עָשׂוּ
  chosen: they made
  alternatives:
  - they fashioned
  lexicon: HALOT
  rationale: Qal perfect 3cp of עשה is the standard verb 'make/do.' 'They made' is
    the most direct rendering and fits the sequence of construction actions in the
    chapter.
- source_word: לוֹ
  chosen: for it
  alternatives:
  - for him
  lexicon: HALOT
  rationale: Although the pronominal suffix is masculine singular and could formally
    be 'for him/it,' the referent in context is the ephod, an inanimate masculine
    noun. English therefore naturally uses 'it.'
- source_word: חֹבְרֹת
  chosen: joined to it
  alternatives:
  - attached
  - coupled
  lexicon: HALOT
  rationale: From חבר 'to join/connect.' Here the participial form describes the shoulder
    pieces as made in a joined/connecting manner. Rendering the sense verbally in
    English ('joined to it') produces clear syntax without obscuring the connection
    motif.
- source_word: עַל
  chosen: at
  alternatives:
  - 'on'
  - upon
  lexicon: HALOT
  rationale: With 'two ends' in this construction, English idiom is better expressed
    as 'at its two ends' rather than the more wooden 'upon the two ends of it.'
- source_word: שְׁנֵי קצוותו
  chosen: its two ends
  alternatives:
  - its two edges
  - its two extremities
  lexicon: HALOT
  rationale: The phrase denotes the two outer ends/extremities of the ephod. 'Ends'
    is the clearest and most idiomatic choice in English for garment construction.
- source_word: חֻבָּר
  chosen: it was joined
  alternatives:
  - it was attached
  - it was coupled together
  lexicon: HALOT
  rationale: 'Pual perfect 3ms of חבר, passive: ''it was joined.'' Repeating ''joined''
    preserves the lexical link with חֹבְרֹת and reflects the Hebrew emphasis on connection.'
