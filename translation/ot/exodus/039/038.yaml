id: EXO.39.38
reference: Exodus 39:38
source:
  edition: WLC
  text: וְ/אֵת֙ מִזְבַּ֣ח הַ/זָּהָ֔ב וְ/אֵת֙ שֶׁ֣מֶן הַ/מִּשְׁחָ֔ה וְ/אֵ֖ת קְטֹ֣רֶת
    הַ/סַּמִּ֑ים וְ/אֵ֕ת מָסַ֖ךְ פֶּ֥תַח הָ/אֹֽהֶל׃
translation:
  text: the gold altar, the anointing oil, the fragrant incense, and the screen for
    the entrance of the tent;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the golden altar.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the incense of spices.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the curtain for the entrance of the tent.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְבַּח הַזָּהָב
  chosen: the gold altar
  alternatives:
  - the golden altar
  lexicon: HALOT
  rationale: מִזְבַּח is 'altar' and הַזָּהָב is the noun 'gold' used attributively.
    'Gold altar' is a natural, concise English rendering that closely reflects the
    Hebrew construction; 'golden altar' is possible but slightly more interpretive/stylistic.
- source_word: שֶׁמֶן הַמִּשְׁחָה
  chosen: the anointing oil
  alternatives:
  - the oil of anointing
  lexicon: HALOT
  rationale: The construct phrase denotes oil used for anointing. 'The anointing oil'
    is standard, clear modern English while preserving the ritual sense.
- source_word: קְטֹרֶת הַסַּמִּים
  chosen: the fragrant incense
  alternatives:
  - the incense of spices
  - the spiced incense
  lexicon: HALOT
  rationale: קְטֹרֶת means 'incense,' and הַסַּמִּים refers to aromatic spices/substances.
    'Fragrant incense' communicates the sense idiomatically in modern English without
    over-literal awkwardness.
- source_word: מָסַךְ
  chosen: the screen
  alternatives:
  - the curtain
  - the covering
  lexicon: HALOT
  rationale: מָסַךְ in tabernacle contexts commonly refers to a screen/hanging at
    an entrance. 'Screen' distinguishes it from פָּרֹכֶת ('veil') elsewhere and preserves
    tabernacle terminology more precisely.
- source_word: פֶּתַח הָאֹהֶל
  chosen: for the entrance of the tent
  alternatives:
  - for the doorway of the tent
  - for the entrance to the tent
  lexicon: HALOT
  rationale: פֶּתַח is 'entrance/opening/doorway' and הָאֹהֶל is 'the tent,' here
    referring to the tabernacle tent. 'For the entrance of the tent' reflects the
    genitival relationship naturally in English.
- source_word: וְאֵת ... וְאֵת ... וְאֵת ... וְאֵת
  chosen: comma-separated list with final 'and'
  alternatives:
  - repeating 'and' before each item
  rationale: The repeated object marker with conjunction marks a simple inventory
    list. English style normally compresses such repetition into a smooth series while
    preserving all four items.
