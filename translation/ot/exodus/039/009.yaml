id: EXO.39.9
reference: Exodus 39:9
source:
  edition: WLC
  text: רָב֧וּעַ הָיָ֛ה כָּפ֖וּל עָשׂ֣וּ אֶת הַ/חֹ֑שֶׁן זֶ֧רֶת אָרְכּ֛/וֹ וְ/זֶ֥רֶת
    רָחְבּ֖/וֹ כָּפֽוּל־׃
translation:
  text: It was square; they made the breastpiece doubled, a span its length and a
    span its width when doubled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'folded double.' The Hebrew כָּפוּל indicates that the breastpiece was
      made in a doubled or folded-over form.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָבוּעַ
  chosen: square
  alternatives:
  - quadrangular
  lexicon: HALOT
  rationale: The adjective denotes a four-sided square shape. 'Square' is the natural
    modern English equivalent; 'quadrangular' is more technical and less readable.
- source_word: הָיָה
  chosen: it was
  alternatives:
  - it became
  lexicon: HALOT
  rationale: Here the verb functions as a simple copula describing the breastpiece's
    form, so 'it was' best fits the stative description.
- source_word: כָּפוּל
  chosen: doubled
  alternatives:
  - double
  - folded double
  lexicon: HALOT
  rationale: The term indicates that the breastpiece was made in two layers or folded
    over. 'Doubled' is concise and idiomatic; 'folded double' is possible but more
    interpretive.
- source_word: עָשׂוּ
  chosen: they made
  alternatives:
  - they fashioned
  lexicon: HALOT
  rationale: A straightforward rendering of the common verb 'make/do.' 'They made'
    preserves the plain sense without adding stylistic color.
- source_word: הַחֹשֶׁן
  chosen: the breastpiece
  alternatives:
  - the breastpiece of judgment
  - the pouch
  lexicon: HALOT
  rationale: In priestly tabernacle context, חֹשֶׁן refers to the high priest's breastpiece.
    'Breastpiece' is the standard clear rendering here. The longer traditional phrase
    adds words not present in this verse, and 'pouch' is too interpretive though the
    doubled construction may imply a pocket.
- source_word: זֶרֶת
  chosen: a span
  alternatives:
  - half a cubit
  lexicon: HALOT
  rationale: This is a specific linear measure, traditionally 'span.' Retaining the
    ancient unit is more textually transparent than converting it, while remaining
    understandable in context.
- source_word: אָרְכּוֹ
  chosen: its length
  lexicon: HALOT
  rationale: The noun with 3ms suffix refers to the breastpiece's length; 'its length'
    is the direct equivalent.
- source_word: רָחְבּוֹ
  chosen: its width
  alternatives:
  - its breadth
  lexicon: HALOT
  rationale: '''Width'' is the most natural modern English rendering; ''breadth''
    is possible but slightly more formal/archaic.'
- source_word: כָּפוּל
  chosen: when doubled
  alternatives:
  - being doubled
  - double
  lexicon: HALOT
  rationale: The repeated adjective at the end resumes and emphasizes the doubled
    construction. Rendering it as 'when doubled' makes good English while preserving
    its relation to the dimensions.
