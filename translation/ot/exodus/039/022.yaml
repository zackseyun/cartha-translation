id: EXO.39.22
reference: Exodus 39:22
source:
  edition: WLC
  text: וַ/יַּ֛עַשׂ אֶת מְעִ֥יל הָ/אֵפֹ֖ד מַעֲשֵׂ֣ה אֹרֵ֑ג כְּלִ֖יל תְּכֵֽלֶת־׃
translation:
  text: And he made the robe of the ephod, the work of a weaver, all of blue yarn.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'woven work.' The Hebrew literally reads 'work of a weaver.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term rendered 'blue yarn' refers to a prized blue dyed textile
      material used in the tabernacle and priestly garments.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: And he made
  alternatives:
  - And he fashioned
  - Then he made
  lexicon: HALOT
  rationale: The waw-consecutive with עשה narrates the next action in sequence. 'Made'
    is the most direct and natural English equivalent; 'And' preserves the simple
    narrative linkage.
- source_word: מְעִיל
  chosen: robe
  alternatives:
  - cloak
  - mantle
  lexicon: HALOT
  rationale: מְעִיל denotes an outer garment or robe. 'Robe' fits priestly vestment
    context in Exodus better than the less specific 'cloak' or more literary 'mantle'.
- source_word: הָאֵפֹד
  chosen: the ephod
  lexicon: HALOT
  rationale: אֵפֹד is a technical term for the priestly vestment and is best transliterated
    in English Bible tradition because no simple modern equivalent captures it precisely.
    The genitive relation is preserved as 'the robe of the ephod.'
- source_word: מַעֲשֵׂה אֹרֵג
  chosen: the work of a weaver
  alternatives:
  - woven work
  - the work of a skilled weaver
  lexicon: HALOT
  rationale: The construction literally means 'work of a weaver.' This preserves both
    the craft terminology and the likely sense of professionally woven workmanship
    without adding 'skilled,' which is not explicit here.
- source_word: כְּלִיל
  chosen: all of
  alternatives:
  - entirely
  - wholly
  lexicon: HALOT
  rationale: כְּלִיל conveys completeness or entirety. In garment description, 'all
    of' is idiomatic English and naturally modifies the material/color of the whole
    robe.
- source_word: תְּכֵלֶת
  chosen: blue yarn
  alternatives:
  - blue
  - blue-purple yarn
  lexicon: HALOT
  rationale: תְּכֵלֶת refers to the distinctive blue dyed material used in tabernacle
    and priestly textiles. 'Blue yarn' makes explicit that the term refers not merely
    to abstract color but to dyed textile material in this context.
