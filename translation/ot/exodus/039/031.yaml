id: EXO.39.31
reference: Exodus 39:31
source:
  edition: WLC
  text: וַ/יִּתְּנ֤וּ עָלָי/ו֙ פְּתִ֣יל תְּכֵ֔לֶת לָ/תֵ֥ת עַל הַ/מִּצְנֶ֖פֶת מִ/לְ/מָ֑עְלָ/ה כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶֽׁה־־׃ס
translation:
  text: And they attached to it a cord of blue yarn, to put it above on the turban, just as Yahweh had commanded Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a blue cord' or 'a violet cord'; the Hebrew תְּכֵלֶת refers to the distinctive blue-dyed material used in the tabernacle.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנוּ
  chosen: they attached
  alternatives:
  - they put
  - they fastened
  lexicon: HALOT
  rationale: The verb נתן literally means 'give/put,' but in this construction with עַל plus the object ('on it') and the following purpose clause, the sense is that the blue cord was affixed to the gold plate. 'Attached' expresses the functional action in natural English without over-paraphrasing.
- source_word: עָלָיו
  chosen: to it
  alternatives:
  - on it
  - upon it
  lexicon: HALOT
  rationale: Refers back to the holy diadem/plate from the previous verse. English idiom prefers 'attached to it' rather than 'gave upon it.'
- source_word: פְּתִיל
  chosen: cord
  alternatives:
  - thread
  - lace
  - string
  lexicon: HALOT
  rationale: פְּתִיל denotes a twisted thread or cord. 'Cord' best fits the likely sturdier fastening function here.
- source_word: תְּכֵלֶת
  chosen: blue yarn
  alternatives:
  - blue
  - blue-purple
  - violet
  lexicon: HALOT
  rationale: תְּכֵלֶת denotes the distinctive blue/purple-blue material used in tabernacle textiles. 'Blue yarn' communicates both color and textile substance in context, matching the fastening material.
- source_word: לָתֵת
  chosen: to put
  alternatives:
  - for placing
  - to set
  lexicon: HALOT
  rationale: 'Infinitive of purpose: the cord was attached in order to place the object on the turban. ''To put'' is simple and accurate English.'
- source_word: הַמִּצְנֶפֶת
  chosen: the turban
  alternatives:
  - the headwrap
  - the headdress
  lexicon: HALOT
  rationale: This term refers specifically to the high priestly turban. 'Turban' is the standard and clearest English rendering.
- source_word: מִלְמָעְלָה
  chosen: above
  alternatives:
  - from above
  - on the upper part
  - at the top/front
  lexicon: HALOT
  rationale: The adverb indicates upper placement. In English, 'on the turban above' naturally conveys that the plate was positioned on the upper/front part of the turban, consistent with the priestly instructions.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת־מֹשֶׁה
  chosen: just as the LORD had commanded Moses
  alternatives:
  - as the LORD commanded Moses
  lexicon: HALOT
  rationale: This recurring fulfillment formula marks conformity to divine instruction. 'Just as' preserves the emphatic correspondence. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
