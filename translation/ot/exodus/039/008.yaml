id: EXO.39.8
reference: Exodus 39:8
source:
  edition: WLC
  text: וַ/יַּ֧עַשׂ אֶת הַ/חֹ֛שֶׁן מַעֲשֵׂ֥ה חֹשֵׁ֖ב כְּ/מַעֲשֵׂ֣ה אֵפֹ֑ד זָהָ֗ב תְּכֵ֧לֶת
    וְ/אַרְגָּמָ֛ן וְ/תוֹלַ֥עַת שָׁנִ֖י וְ/שֵׁ֥שׁ מָשְׁזָֽר־׃
translation:
  text: 'He made the breastpiece, the work of a skillful designer, like the work of
    the ephod: of gold, blue, purple, scarlet yarn, and finely twisted linen.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the work of an artistic weaver" for "the work of a skillful designer."
      The Hebrew phrase emphasizes skilled patterned craftsmanship.
    reason: lexical_alternative
  - marker: b
    text: Traditionally "breastplate." "Breastpiece" is used here to avoid suggesting
      metal armor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He made
  alternatives:
  - And he made
  - Then he made
  lexicon: HALOT
  rationale: Wayyiqtol of עשה normally advances the narrative with a simple past.
    English can omit the conjunction for smoother style while preserving sequence.
- source_word: הַחֹשֶׁן
  chosen: the breastpiece
  alternatives:
  - the breastplate
  - the pouch
  lexicon: HALOT
  rationale: חֹשֶׁן denotes the priestly chest-piece associated with the ephod. 'Breastpiece'
    is accurate and readable modern English; 'breastplate' can misleadingly suggest
    armor.
- source_word: מַעֲשֵׂה חֹשֵׁב
  chosen: the work of a skillful designer
  alternatives:
  - skillfully woven work
  - the work of a craftsman
  - the work of an artistic weaver
  lexicon: HALOT
  rationale: The phrase describes crafted work involving design/patterning, not merely
    generic manufacture. 'Skillful designer' captures the participial nuance of חֹשֵׁב
    as one devising or executing artistic work.
- source_word: כְּמַעֲשֵׂה אֵפֹד
  chosen: like the work of the ephod
  alternatives:
  - like the workmanship of the ephod
  - made in the same way as the ephod
  lexicon: HALOT
  rationale: The comparison links the breastpiece's workmanship/materials to that
    of the ephod. 'Like the work of the ephod' is concise and sufficiently literal.
- source_word: אֵפֹד
  chosen: the ephod
  alternatives:
  - the priestly vest
  lexicon: HALOT
  rationale: אֵפֹד is a technical cultic term with no exact English equivalent. Retaining
    the established transliteration preserves specificity better than a generic paraphrase.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Direct material term; no contextual reason to vary.
- source_word: תְּכֵלֶת
  chosen: blue
  alternatives:
  - blue yarn
  - blue-purple
  lexicon: HALOT
  rationale: The term denotes the blue dyed material used in tabernacle textiles.
    English commonly renders the color itself; 'yarn' is supplied later for the coordinated
    list.
- source_word: וְאַרְגָּמָן
  chosen: purple
  alternatives:
  - purple yarn
  lexicon: HALOT
  rationale: Standard rendering of the dyed material/color in tabernacle contexts.
- source_word: וְתוֹלַעַת שָׁנִי
  chosen: scarlet yarn
  alternatives:
  - scarlet
  - crimson yarn
  lexicon: HALOT
  rationale: This expression refers to scarlet-dyed material, traditionally rendered
    'scarlet yarn' in textile lists. Including 'yarn' clarifies that the list names
    materials, not abstract colors alone.
- source_word: וְשֵׁשׁ מָשְׁזָר
  chosen: and finely twisted linen
  alternatives:
  - and twisted fine linen
  - and fine twined linen
  lexicon: HALOT
  rationale: שֵׁשׁ is fine linen, and מָשְׁזָר indicates twisted/spun thread. 'Finely
    twisted linen' is natural modern English while preserving the textile detail.
