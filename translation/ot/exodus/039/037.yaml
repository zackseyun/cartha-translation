id: EXO.39.37
reference: Exodus 39:37
source:
  edition: WLC
  text: אֶת הַ/מְּנֹרָ֨ה הַ/טְּהֹרָ֜ה אֶת נֵרֹתֶ֗י/הָ נֵרֹ֛ת הַ/מַּֽעֲרָכָ֖ה וְ/אֶת
    כָּל כֵּלֶ֑י/הָ וְ/אֵ֖ת שֶׁ֥מֶן הַ/מָּאֽוֹר־־־־׃
translation:
  text: the pure lampstand, its lamps—the lamps of the arrangement—and all its utensils,
    and the oil for the light,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the lamps set in order.' The Hebrew phrase נֵרֹת הַמַּעֲרָכָה emphasizes
      the prescribed arrangement of the lamps.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְּנֹרָה
  chosen: lampstand
  alternatives:
  - menorah
  - lamp
  lexicon: HALOT
  rationale: מְנוֹרָה denotes the stand or candelabrum that holds the lamps, not merely
    a single lamp. 'Lampstand' is clear modern English and preserves the cultic object
    without unnecessary transliteration.
- source_word: הַטְּהֹרָה
  chosen: pure
  alternatives:
  - clean
  lexicon: HALOT
  rationale: טָהוֹר here describes ritual/material purity of the sanctuary furnishing.
    'Pure' fits the tabernacle context and traditional description of the gold lampstand.
- source_word: נֵרֹתֶיהָ
  chosen: its lamps
  alternatives:
  - its lamps/burners
  lexicon: HALOT
  rationale: נֵר can refer to a lamp or lamp-flame; in tabernacle inventory context
    it refers to the individual lamps belonging to the lampstand. 'Its lamps' is the
    most natural English rendering.
- source_word: נֵרֹת הַמַּעֲרָכָה
  chosen: the lamps of the arrangement
  alternatives:
  - the arranged lamps
  - the lamps set in order
  - the lamps for setting in order
  lexicon: HALOT
  rationale: מַעֲרָכָה conveys arrangement or orderly setting. The phrase likely specifies
    the lamps as arranged in their prescribed order. 'The lamps of the arrangement'
    stays close to the Hebrew while remaining intelligible, preserving the formal
    inventory style.
- source_word: כָּל כֵּלֶיהָ
  chosen: all its utensils
  alternatives:
  - all its כלי, all its vessels
  - all its implements
  lexicon: HALOT
  rationale: כְּלִי is a broad term for articles, implements, or vessels. In this
    sanctuary context, 'utensils' suitably covers the associated tools without over-specifying.
- source_word: שֶׁמֶן הַמָּאוֹר
  chosen: the oil for the light
  alternatives:
  - the oil for lighting
  - the lamp oil
  lexicon: HALOT
  rationale: The construct phrase means oil used for illumination. 'The oil for the
    light' is a fairly literal rendering that matches the tabernacle inventory register;
    smoother alternatives are possible but slightly less formal.
