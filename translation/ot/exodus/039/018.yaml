id: EXO.39.18
reference: Exodus 39:18
source:
  edition: WLC
  text: וְ/אֵ֨ת שְׁתֵּ֤י קְצוֹת֙ שְׁתֵּ֣י הָֽ/עֲבֹתֹ֔ת נָתְנ֖וּ עַל שְׁתֵּ֣י הַֽ/מִּשְׁבְּצֹ֑ת
    וַֽ/יִּתְּנֻ֛/ם עַל כִּתְפֹ֥ת הָ/אֵפֹ֖ד אֶל מ֥וּל פָּנָֽי/ו־־־׃
translation:
  text: And they put the two ends of the two braided chains on the two settings, and
    put them on the shoulder pieces of the ephod, at its front.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wreathen chains,' reflecting older English for twisted or braided chainwork.
    reason: lexical_alternative
  - marker: b
    text: Or 'mountings' for 'settings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קְצוֹת
  chosen: ends
  alternatives:
  - extremities
  lexicon: HALOT
  rationale: The noun denotes the extremities or terminal points of an object. 'Ends'
    is the most natural modern English rendering in this construction.
- source_word: הָעֲבֹתֹת
  chosen: braided chains
  alternatives:
  - cords
  - wreathen chains
  lexicon: HALOT
  rationale: In tabernacle/jewelry contexts this term refers to twisted or braided
    chainwork rather than simple ropes. 'Braided chains' communicates both the material
    form and crafted nature in readable English.
- source_word: מִּשְׁבְּצֹת
  chosen: settings
  alternatives:
  - filigree settings
  - mountings
  lexicon: HALOT
  rationale: The term refers to the gold settings or mountings attached to the breastpiece.
    'Settings' is concise and idiomatic, while preserving the artisan sense.
- source_word: וַיִּתְּנֻם
  chosen: put them
  alternatives:
  - set them
  - fastened them
  lexicon: HALOT
  rationale: The verb is שוב? No, from נתן, 'to give/put/place.' Here 'put them' is
    a straightforward contextual rendering; 'fastened' would slightly over-specify
    the action.
- source_word: כִּתְפֹת
  chosen: shoulder pieces
  alternatives:
  - shoulders
  lexicon: HALOT
  rationale: In the ephod's construction this refers to its shoulder attachments/pieces,
    not merely anatomical shoulders. 'Shoulder pieces' best fits the garment context.
- source_word: אֶל מוּל פָּנָיו
  chosen: at its front
  alternatives:
  - in front of it
  - toward its front
  lexicon: HALOT
  rationale: This spatial phrase indicates placement on the front-facing side of the
    ephod. Because the suffix refers to the ephod, 'at its front' is clear and natural
    in English.
