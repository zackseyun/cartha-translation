id: EXO.39.30
reference: Exodus 39:30
source:
  edition: WLC
  text: וַֽ/יַּעֲשׂ֛וּ אֶת צִ֥יץ נֵֽזֶר הַ/קֹּ֖דֶשׁ זָהָ֣ב טָה֑וֹר וַ/יִּכְתְּב֣וּ
    עָלָ֗י/ו מִכְתַּב֙ פִּתּוּחֵ֣י חוֹתָ֔ם קֹ֖דֶשׁ לַ/יהוָֽה־־׃
translation:
  text: They made the plate, the holy crown, of pure gold, and they wrote on it, like
    the engraving of a seal, “Holy to the LORD.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Holiness to the LORD.”
    reason: alternative_reading
lexical_decisions:
- source_word: צִיץ
  chosen: plate
  alternatives:
  - rosette
  - blossom
  - frontlet
  lexicon: HALOT
  rationale: In priestly vestment contexts this noun refers to the gold plate attached
    to the turban rather than a floral object. 'Plate' is clear modern English and
    fits the material description that follows.
- source_word: נֵזֶר הַקֹּדֶשׁ
  chosen: the holy crown
  alternatives:
  - the sacred diadem
  - the consecrated crown
  lexicon: HALOT
  rationale: נֵזֶר denotes a consecrated crown/diadem. Rendering the phrase appositionally
    with 'the plate, the holy crown' preserves both nouns without collapsing one into
    the other.
- source_word: זָהָב טָהוֹר
  chosen: of pure gold
  alternatives:
  - pure gold
  lexicon: HALOT
  rationale: This is the natural English rendering of the material phrase and preserves
    the emphasis on ritual purity and quality.
- source_word: וַיִּכְתְּבוּ עָלָיו
  chosen: and they wrote on it
  alternatives:
  - and they inscribed on it
  - and they engraved on it
  lexicon: HALOT
  rationale: The verb is 'write,' while the following phrase specifies the style as
    seal engraving. Using 'wrote' here preserves the lexical distinction, with the
    engraving nuance carried by the next clause.
- source_word: מִכְתַּב פִּתּוּחֵי חוֹתָם
  chosen: like the engraving of a seal
  alternatives:
  - with the writing of seal engravings
  - as a seal is engraved
  lexicon: HALOT
  rationale: This phrase describes the manner of inscription. 'Like the engraving
    of a seal' is idiomatic English that communicates the comparison and craftsmanship.
- source_word: קֹדֶשׁ לַיהוָה
  chosen: Holy to the LORD
  alternatives:
  - Holiness to the LORD
  - Set apart to the LORD
  lexicon: HALOT
  rationale: The inscription is terse and formulaic. 'Holy to the LORD' preserves
    that compact force. 'Holiness to the LORD' is traditional and possible, but the
    adjective-like English phrase better reflects the dedicatory sense on the object.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention.
