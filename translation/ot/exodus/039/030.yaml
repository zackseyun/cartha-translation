theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines specify 'the LORD' as the default rendering
    for YHWH, with alternatives not used in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering the inscription קֹדֶשׁ לַיהוָה
  chosen_reading: Holy to the LORD
  alternative_readings:
  - Holiness to the LORD
  rationale: The Hebrew can be rendered either as a predicate-like dedication ('Holy
    to...') or as an abstract noun phrase ('Holiness to...'). The chosen reading is
    more natural in modern English while preserving the consecratory force; the traditional
    alternative is preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve theological
    tension where ambiguity is genuine
