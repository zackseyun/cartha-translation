theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering the inscription קֹדֶשׁ לַיהוָה
  chosen_reading: Holy to Yahweh
  alternative_readings:
  - Holiness to the LORD
  rationale: The Hebrew can be rendered either as a predicate-like dedication ('Holy to...') or as an abstract noun phrase ('Holiness to...'). The chosen reading is more natural in modern English while preserving the consecratory force; the traditional alternative is preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve theological tension where ambiguity is genuine
