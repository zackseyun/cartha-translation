id: EXO.39.32
reference: Exodus 39:32
source:
  edition: WLC
  text: וַ/תֵּ֕כֶל כָּל עֲבֹדַ֕ת מִשְׁכַּ֖ן אֹ֣הֶל מוֹעֵ֑ד וַֽ/יַּעֲשׂוּ֙ בְּנֵ֣י יִשְׂרָאֵ֔ל כְּ֠/כֹל אֲשֶׁ֨ר צִוָּ֧ה יְהוָ֛ה אֶת מֹשֶׁ֖ה כֵּ֥ן עָשֽׂוּ־־׃פ
translation:
  text: Thus all the work of the tabernacle, the tent of meeting, was finished, and the sons of Israel did according to all that Yahweh had commanded Moses; so they did.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the LORD'' represents the divine name YHWH; alternatively, ''Yahweh.'''
    reason: alternative_reading
  - marker: b
    text: Or 'the Israelites' for 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּכֶל
  chosen: was finished
  alternatives:
  - was completed
  - came to an end
  lexicon: HALOT
  rationale: The verb כלה in this context marks the completion of a project. The passive English 'was finished' best reflects the Hebrew sense with natural English style, while keeping the focus on the work rather than an explicit agent.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: Retains the comprehensive force of the Hebrew, emphasizing total completion.
- source_word: עֲבֹדַת
  chosen: the work
  alternatives:
  - the service
  - the labor
  lexicon: HALOT
  rationale: In this construction it refers to the work involved in making the sanctuary items, not primarily liturgical service. 'Work' fits the immediate context of construction and completion.
- source_word: מִשְׁכַּן
  chosen: tabernacle
  alternatives:
  - dwelling place
  lexicon: HALOT
  rationale: '''Tabernacle'' is the established and accurate rendering for the portable sanctuary in Exodus. Although ''dwelling place'' is more etymologically transparent, ''tabernacle'' is clearer in context and standard in English Bible usage.'
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  lexicon: HALOT
  rationale: This is the standard rendering of the sanctuary title and preserves the sense of the designated place of meeting before God.
- source_word: וַיַּעֲשׂוּ
  chosen: did
  alternatives:
  - made
  - performed
  lexicon: HALOT
  rationale: Here עשה summarizes the Israelites' obedience to the command rather than repeating the idea of manufacture alone. 'Did' fits the following comparative clause naturally in English.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Following the project's gender-accurate principle, the literal familial expression is retained. It refers corporately to Israel, and the more idiomatic alternatives are possible, but this rendering stays closer to the Hebrew form.
- source_word: כְּכֹל אֲשֶׁר
  chosen: according to all that
  alternatives:
  - just as everything that
  - in accordance with all that
  lexicon: HALOT
  rationale: This phrase expresses full conformity to the command. 'According to all that' is both accurate and readable.
- source_word: צִוָּה
  chosen: had commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: The pluperfect sense works well in English because the command preceded the completed work. It clarifies temporal sequence without adding content.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כֵּן עָשׂוּ
  chosen: so they did
  alternatives:
  - thus they did
  - that is what they did
  lexicon: HALOT
  rationale: This closing repetition is preserved rather than smoothed away, because it emphasizes exact obedience. 'So they did' is concise and natural while reflecting the Hebrew repetition.
