id: EXO.39.20
reference: Exodus 39:20
source:
  edition: WLC
  text: וַֽ/יַּעֲשׂוּ֮ שְׁתֵּ֣י טַבְּעֹ֣ת זָהָב֒ וַֽ/יִּתְּנֻ֡/ם עַל שְׁתֵּי֩ כִתְפֹ֨ת
    הָ/אֵפֹ֤ד מִ/לְ/מַ֨טָּה֙ מִ/מּ֣וּל פָּנָ֔י/ו לְ/עֻמַּ֖ת מֶחְבַּרְתּ֑/וֹ מִ/מַּ֕עַל
    לְ/חֵ֖שֶׁב הָ/אֵפֹֽד־׃
translation:
  text: They made two gold rings and put them on the two shoulder pieces of the ephod,
    below, on its front side, opposite its seam, above the skillfully woven band of
    the ephod.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'opposite its joining' or 'opposite its attachment point'; the Hebrew
      term refers to the place where parts of the ephod were joined.
    reason: lexical_alternative
  - marker: b
    text: Or 'above the woven waistband of the ephod.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טַבְּעֹת
  chosen: rings
  alternatives:
  - settings
  - bands
  lexicon: HALOT
  rationale: The noun commonly denotes rings, especially metal attachment rings in
    tabernacle/priestly garment contexts. 'Rings' is the most natural and contextually
    precise rendering here.
- source_word: כִתְפֹת
  chosen: shoulder pieces
  alternatives:
  - shoulders
  - shoulder straps
  lexicon: HALOT
  rationale: In the ephod context this refers not merely to anatomical shoulders but
    to the garment's shoulder sections/attachments. 'Shoulder pieces' communicates
    the garment component clearly in modern English.
- source_word: מִלְמַטָּה
  chosen: below
  alternatives:
  - underneath
  - on the lower part
  lexicon: HALOT
  rationale: The adverb/prepositional expression indicates lower placement on the
    ephod. 'Below' is concise and preserves the spatial relation.
- source_word: מִמּוּל פָּנָיו
  chosen: on its front side
  alternatives:
  - in front of it
  - facing its front
  lexicon: HALOT
  rationale: Literally 'from/in front of its face.' For an object like the ephod,
    'front side' is idiomatic English and preserves the orientation of the rings.
- source_word: לְעֻמַּת
  chosen: opposite
  alternatives:
  - corresponding to
  - adjacent to
  lexicon: HALOT
  rationale: The term marks alignment or correspondence in position. 'Opposite' best
    captures the spatial relationship in this construction.
- source_word: מֶחְבַּרְתּוֹ
  chosen: its seam
  alternatives:
  - its joining
  - its attachment point
  - its coupling
  lexicon: HALOT
  rationale: The noun refers to a place of joining/connection in the garment. 'Seam'
    gives a clear English equivalent for a joined part of clothing, while still reflecting
    the underlying idea of connection.
- source_word: חֵשֶׁב
  chosen: skillfully woven band
  alternatives:
  - decorated band
  - woven waistband
  - artistically woven sash
  lexicon: HALOT
  rationale: In priestly garment descriptions this term refers to the ephod's woven
    band/belt-like fastening. 'Skillfully woven band' reflects both the textile nature
    and the craftsmanship implied by the broader tabernacle-garment context.
- source_word: אֵפֹד
  chosen: ephod
  lexicon: HALOT
  rationale: This is a technical term for the high priestly garment and is best transliterated
    rather than paraphrased, since no single English garment term is equivalent.
- source_word: וַיִּתְּנֻם
  chosen: put them
  alternatives:
  - set them
  - placed them
  lexicon: HALOT
  rationale: The verb simply indicates placing the rings in position. 'Put them' is
    natural modern English and sufficiently precise in context.
