id: EXO.39.40
reference: Exodus 39:40
source:
  edition: WLC
  text: אֵת֩ קַלְעֵ֨י הֶ/חָצֵ֜ר אֶת עַמֻּדֶ֣י/הָ וְ/אֶת אֲדָנֶ֗י/הָ וְ/אֶת הַ/מָּסָךְ֙
    לְ/שַׁ֣עַר הֶֽ/חָצֵ֔ר אֶת מֵיתָרָ֖י/ו וִ/יתֵדֹתֶ֑י/הָ וְ/אֵ֗ת כָּל כְּלֵ֛י עֲבֹדַ֥ת
    הַ/מִּשְׁכָּ֖ן לְ/אֹ֥הֶל מוֹעֵֽד־־־־־׃
translation:
  text: the hangings of the court, its pillars and its bases, and the screen for the
    gate of the court, its ropes and its pegs, and all the equipment for the service
    of the tabernacle, for the tent of meeting;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'courtyard' for 'court.'
    reason: lexical_alternative
  - marker: b
    text: Or 'sockets' for 'bases.'
    reason: lexical_alternative
  - marker: c
    text: Or 'cords' for 'ropes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קַלְעֵי
  chosen: hangings
  alternatives:
  - curtains
  - screen-cloths
  lexicon: HALOT
  rationale: In tabernacle/courtyard contexts this term refers to the woven fabric
    panels forming the enclosure. 'Hangings' is a standard, natural English rendering
    that distinguishes these side panels from the specific entrance 'screen' later
    in the verse.
- source_word: חָצֵר
  chosen: court
  alternatives:
  - courtyard
  lexicon: HALOT
  rationale: The referent is the enclosed sacred outer area around the tabernacle.
    'Court' is concise and idiomatic in English for this cultic setting; 'courtyard'
    is possible but slightly more expansive.
- source_word: עַמֻּדֶיהָ
  chosen: its pillars
  alternatives:
  - its posts
  - its columns
  lexicon: HALOT
  rationale: The noun denotes the upright structural supports of the court enclosure.
    'Pillars' fits the tabernacle inventory style and pairs naturally with 'bases.'
- source_word: אֲדָנֶיהָ
  chosen: its bases
  alternatives:
  - its sockets
  - its pedestals
  lexicon: HALOT
  rationale: In tabernacle descriptions this word refers to the metal foundation pieces
    into which pillars or frames were set. 'Bases' is clear modern English; 'sockets'
    is also possible and more technical.
- source_word: הַמָּסָךְ
  chosen: the screen
  alternatives:
  - the curtain
  - the covering
  lexicon: HALOT
  rationale: This term commonly denotes a hanging screen at an entrance rather than
    the perimeter hangings. 'Screen' preserves the distinction from קַלְעִים and matches
    tabernacle usage.
- source_word: לְשַׁעַר הֶחָצֵר
  chosen: for the gate of the court
  alternatives:
  - for the entrance of the court
  - for the courtyard gate
  lexicon: HALOT
  rationale: 'The preposition marks purpose or destination: the screen belonging to
    the court gate. ''Gate'' is retained because the Hebrew noun is the normal term
    for gate/entrance, even though the physical object is a fabric entryway.'
- source_word: מֵיתָרָיו
  chosen: its ropes
  alternatives:
  - its cords
  lexicon: HALOT
  rationale: The term denotes the lines used to secure the court/tabernacle structure.
    'Ropes' is more immediately understandable in modern English than 'cords' while
    remaining accurate.
- source_word: וִיתֵדֹתֶיהָ
  chosen: its pegs
  alternatives:
  - its stakes
  - its tent pegs
  lexicon: HALOT
  rationale: These are the pegs driven into the ground to secure the ropes. 'Pegs'
    is concise and natural; 'stakes' is also possible.
- source_word: כָּל כְּלֵי עֲבֹדַת
  chosen: all the equipment for the service of
  alternatives:
  - all the utensils for the work of
  - all the implements for the service of
  lexicon: HALOT
  rationale: כְּלִים is broad ('articles, vessels, implements'), and in an inventory
    context 'equipment' communicates the collective sense well. עֲבֹדָה here is functional
    service/work associated with the sanctuary.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  lexicon: HALOT
  rationale: This is the established and accurate rendering for the sacred portable
    dwelling. 'Tabernacle' remains understandable and preserves the cultic specificity
    of the Hebrew.
- source_word: לְאֹהֶל מוֹעֵד
  chosen: for the tent of meeting
  alternatives:
  - for the meeting tent
  lexicon: HALOT
  rationale: This phrase is the standard designation of the sanctuary structure. Rendering
    both terms preserves the formal title and its relation to the preceding inventory
    phrase.
