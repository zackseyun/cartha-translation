id: EXO.39.27
reference: Exodus 39:27
source:
  edition: WLC
  text: וַֽ/יַּעֲשׂ֛וּ אֶת הַ/כָּתְנֹ֥ת שֵׁ֖שׁ מַעֲשֵׂ֣ה אֹרֵ֑ג לְ/אַהֲרֹ֖ן וּ/לְ/בָנָֽי/ו־׃
translation:
  text: They made the tunics of fine linen, the work of a weaver, for Aaron and for
    his sons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "woven work." The Hebrew phrase emphasizes that the tunics were made
      by weaving.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  chosen: They made
  alternatives:
  - And they made
  - They fashioned
  lexicon: HALOT
  rationale: Qal wayyiqtol of עשה introduces the next action in the narrative. 'They
    made' is natural modern English; the prefixed conjunction is absorbed into the
    flow rather than represented woodenly as 'And'.
- source_word: הַכָּתְנֹת
  chosen: the tunics
  alternatives:
  - the coats
  - the garments
  lexicon: HALOT
  rationale: כֻּתֹּנֶת/כָּתְנֹת refers to a close-fitting body garment or tunic. 'Tunics'
    is more precise and contemporary than 'coats,' and less vague than 'garments.'
- source_word: שֵׁשׁ
  chosen: fine linen
  alternatives:
  - linen
  lexicon: HALOT
  rationale: In tabernacle and priestly contexts שֵׁשׁ denotes fine linen, not merely
    linen in general. 'Fine linen' preserves the material's quality and cultic significance.
- source_word: מַעֲשֵׂה אֹרֵג
  chosen: the work of a weaver
  alternatives:
  - woven work
  - the work of the weaver
  lexicon: HALOT
  rationale: The construct phrase denotes workmanship produced by weaving. 'The work
    of a weaver' is idiomatic and preserves the artisan emphasis of the Hebrew.
- source_word: לְאַהֲרֹן וּלְבָנָיו
  chosen: for Aaron and for his sons
  alternatives:
  - for Aaron and his sons
  lexicon: HALOT
  rationale: The repeated preposition לְ is retained in English for clarity and slight
    emphasis. 'His sons' accurately reflects the masculine familial reference and
    matches the priestly context.
