id: EXO.39.24
reference: Exodus 39:24
source:
  edition: WLC
  text: וַֽ/יַּעֲשׂוּ֙ עַל שׁוּלֵ֣י הַ/מְּעִ֔יל רִמּוֹנֵ֕י תְּכֵ֥לֶת וְ/אַרְגָּמָ֖ן
    וְ/תוֹלַ֣עַת שָׁנִ֑י מָשְׁזָֽר־׃
translation:
  text: And they made pomegranates of blue and purple and scarlet yarn, twisted, on
    the hem of the robe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pomegranate-shaped ornaments.' The Hebrew simply says 'pomegranates,'
      using the object’s shape as its name.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew lists blue, purple, and scarlet material, with 'twisted' describing
      the textile work; 'yarn' is supplied in English for clarity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  chosen: And they made
  alternatives:
  - And they fashioned
  - And they made
  lexicon: HALOT
  rationale: Qal wayyiqtol 3mp of עשה, the standard narrative form meaning 'and they
    made/did.' 'Made' is the most natural and direct rendering in this construction.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  - for
  lexicon: HALOT
  rationale: The preposition here marks location with שׁוּלֵי הַמְּעִיל, indicating
    placement on the hem of the robe.
- source_word: שׁוּלֵי
  chosen: the hem of
  alternatives:
  - the skirts of
  - the edge of
  lexicon: HALOT
  rationale: Construct plural of שׁוּל, referring to the lower edge or hem of a garment.
    'Hem' is idiomatic modern English for this clothing context.
- source_word: הַמְּעִיל
  chosen: the robe
  alternatives:
  - the mantle
  - the outer garment
  lexicon: HALOT
  rationale: מְעִיל denotes a robe-like outer garment; in the tabernacle context it
    refers to the priestly robe. 'Robe' is clear and standard.
- source_word: רִמּוֹנֵי
  chosen: pomegranates
  alternatives:
  - ornamental pomegranates
  - pomegranate-shaped ornaments
  lexicon: HALOT
  rationale: Literally 'pomegranates.' In this cultic garment context they are decorative
    textile pomegranate forms, but the Hebrew uses the simple noun, so the main text
    preserves that simplicity.
- source_word: תְּכֵלֶת
  chosen: blue
  alternatives:
  - blue yarn
  - blue-purple
  lexicon: HALOT
  rationale: The term denotes a prestigious blue dyed material/thread in tabernacle
    texts. Since English requires some smoothing, 'blue' is retained in the sequence
    of materials, with 'yarn' supplied at the end for the whole series.
- source_word: וְאַרְגָּמָן
  chosen: purple
  alternatives:
  - purple yarn
  - reddish-purple
  lexicon: HALOT
  rationale: Standard color/material term in sanctuary descriptions. 'Purple' is the
    conventional and sufficiently precise rendering.
- source_word: וְתוֹלַעַת שָׁנִי
  chosen: scarlet yarn
  alternatives:
  - scarlet
  - crimson yarn
  lexicon: HALOT
  rationale: This expression refers to scarlet-colored material/thread, traditionally
    rendered 'scarlet.' 'Yarn' is supplied in English because the verse lists textile
    materials used to make the pomegranates.
- source_word: מָשְׁזָר
  chosen: twisted
  alternatives:
  - twined
  - finely twisted
  lexicon: HALOT
  rationale: This passive participial/adjectival form describes spun or twisted thread.
    'Twisted' is concise and understandable; 'twined' is possible but less natural
    in contemporary English.
