id: EXO.39.5
reference: Exodus 39:5
source:
  edition: WLC
  text: וְ/חֵ֨שֶׁב אֲפֻדָּת֜/וֹ אֲשֶׁ֣ר עָלָ֗י/ו מִמֶּ֣/נּוּ הוּא֮ כְּ/מַעֲשֵׂ/הוּ֒ זָהָ֗ב תְּכֵ֧לֶת וְ/אַרְגָּמָ֛ן וְ/תוֹלַ֥עַת שָׁנִ֖י וְ/שֵׁ֣שׁ מָשְׁזָ֑ר כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶֽׁה־׃
translation:
  text: 'And the skillfully woven band of his ephod, which was on it, was of one piece with it and made like it: of gold, blue, purple, scarlet yarn, and fine twisted linen, just as Yahweh had commanded Moses.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the decorated band of his ephod ... was from it, of the same workmanship.' The Hebrew emphasizes that the band was integral to the ephod and matched its workmanship.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵשֶׁב
  chosen: skillfully woven band
  alternatives:
  - decorated band
  - woven waistband
  - artistically woven band
  lexicon: HALOT
  rationale: In priestly/tabernacle contexts this noun refers to the woven attachment/band associated with the ephod, not a mental act ('device'). 'Skillfully woven band' captures both the textile nature and the craftsmanship implied by the term and context.
- source_word: אֲפֻדָּתוֹ
  chosen: his ephod
  alternatives:
  - the ephod belonging to him
  lexicon: HALOT
  rationale: Straightforward construct with 3ms suffix referring to the high priestly garment. 'His ephod' is natural English and preserves the possessive.
- source_word: אֲשֶׁר עָלָיו
  chosen: which was on it
  alternatives:
  - which was upon it
  - that was attached to it
  lexicon: HALOT
  rationale: The relative clause locates the band on/upon the ephod. 'On it' is the most direct rendering; attachment is implied by the garment context.
- source_word: מִמֶּנּוּ הוּא
  chosen: was of one piece with it
  alternatives:
  - was from it
  - was made from the same piece
  - was integral to it
  lexicon: HALOT
  rationale: The phrase indicates material/structural continuity with the ephod rather than mere source. 'Of one piece with it' best conveys that the band was not separate but formed integrally with the ephod.
- source_word: כְּמַעֲשֵׂהוּ
  chosen: made like it
  alternatives:
  - of the same workmanship
  - according to its work
  - like its workmanship
  lexicon: HALOT
  rationale: This points to matching workmanship/pattern with the ephod. 'Made like it' is concise modern English; the preceding 'of one piece with it' already carries some structural sense, so this phrase highlights corresponding workmanship.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Standard material term in the list of components.
- source_word: תְּכֵלֶת
  chosen: blue
  alternatives:
  - blue yarn
  - blue-purple
  lexicon: HALOT
  rationale: Traditional tabernacle color term. English 'blue' is standard and readable; 'yarn' is supplied later in the series for smooth English.
- source_word: אַרְגָּמָן
  chosen: purple
  alternatives:
  - purple yarn
  lexicon: HALOT
  rationale: Standard rendering of the dye/color term in tabernacle textiles.
- source_word: תּוֹלַעַת שָׁנִי
  chosen: scarlet yarn
  alternatives:
  - scarlet
  - crimson yarn
  lexicon: HALOT
  rationale: This expression denotes scarlet-colored material, traditionally thread/yarn dyed from crimson source. 'Scarlet yarn' makes explicit the textile sense in this materials list.
- source_word: שֵׁשׁ מָשְׁזָר
  chosen: fine twisted linen
  alternatives:
  - finely twisted linen
  - fine linen, twisted
  lexicon: HALOT
  rationale: The phrase denotes high-quality linen spun/twisted into thread. 'Fine twisted linen' is idiomatic and preserves both quality and manufacture.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת־מֹשֶׁה
  chosen: just as the LORD had commanded Moses
  alternatives:
  - as the LORD commanded Moses
  lexicon: HALOT
  rationale: Formulaic compliance statement. 'The LORD' follows the project's default for יְהוָה. Pluperfect 'had commanded' fits English narrative style, indicating prior command fulfilled here.
