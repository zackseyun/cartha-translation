id: EXO.39.17
reference: Exodus 39:17
source:
  edition: WLC
  text: וַֽ/יִּתְּנ֗וּ שְׁתֵּי֙ הָ/עֲבֹתֹ֣ת הַ/זָּהָ֔ב עַל שְׁתֵּ֖י הַ/טַּבָּעֹ֑ת
    עַל קְצ֖וֹת הַ/חֹֽשֶׁן־־׃
translation:
  text: And they put the two gold cords on the two rings, at the ends of the breastpiece.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the two gold chains.' The Hebrew term can denote twisted cords or chain-like
      strands; here the objects are made of gold and attached to the breastpiece.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנוּ
  chosen: And they put
  alternatives:
  - and they placed
  - and they set
  lexicon: HALOT
  rationale: The verb נתן in this construction commonly means to put/place something
    onto something else. 'Put' is natural modern English and fits the tabernacle-construction
    narrative style.
- source_word: שְׁתֵּי
  chosen: the two
  lexicon: HALOT
  rationale: The dual/count form is straightforwardly rendered 'the two,' preserving
    the specific number.
- source_word: הָעֲבֹתֹת
  chosen: cords
  alternatives:
  - chains
  - wreathen chains
  lexicon: HALOT
  rationale: עבתת refers to twisted cords/ropes or cord-like chains. In the breastpiece
    context these are made of gold, so they are likely chain-like cords. 'Cords' preserves
    the basic image without importing the archaic traditional phrase 'wreathen chains.'
    An alternative 'chains' is viable and preserved in a footnote because the material
    is gold and the object is jewelry-like.
- source_word: הַזָּהָב
  chosen: gold
  alternatives:
  - of gold
  - golden
  lexicon: HALOT
  rationale: 'The noun specifies the material of the cords. In English attributive
    position, ''gold'' is concise and natural: ''gold cords.'''
- source_word: עַל
  chosen: 'on'
  alternatives:
  - onto
  lexicon: HALOT
  rationale: The preposition marks placement onto the rings. 'On' is idiomatic here.
- source_word: הַטַּבָּעֹת
  chosen: rings
  lexicon: HALOT
  rationale: טבעת is the standard term for a ring in tabernacle-furnishing descriptions.
- source_word: קְצֹוֹת
  chosen: ends
  alternatives:
  - edges
  - extremities
  lexicon: HALOT
  rationale: The word denotes extremities or end-points. 'Ends' is the clearest English
    in this construction.
- source_word: הַחֹשֶׁן
  chosen: breastpiece
  alternatives:
  - breastpiece of judgment
  lexicon: HALOT
  rationale: חֹשֶׁן in this context is the priestly breastpiece. 'Breastpiece' is
    the standard clear rendering; the longer traditional expansion is not required
    in this verse.
