id: EXO.39.15
reference: Exodus 39:15
source:
  edition: WLC
  text: וַ/יַּעֲשׂ֧וּ עַל הַ/חֹ֛שֶׁן שַׁרְשְׁרֹ֥ת גַּבְלֻ֖ת מַעֲשֵׂ֣ה עֲבֹ֑ת זָהָ֖ב
    טָהֽוֹר־׃
translation:
  text: And they made on the breastpiece chains of braided work, like cords, of pure
    gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'chains of twisted work' or 'chains of corded work.' The Hebrew describes
      chains made in a braided or rope-like pattern.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  chosen: And they made
  alternatives:
  - And they fashioned
  lexicon: HALOT
  rationale: Common verb עשה in the waw-consecutive narrative form; 'made' is the
    most straightforward English narrative rendering.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - for
  - upon
  lexicon: HALOT
  rationale: With the breastpiece as object, עַל can indicate attachment or placement.
    'On' preserves the spatial sense while remaining natural in English for an item
    affixed to the breastpiece.
- source_word: הַחֹשֶׁן
  chosen: the breastpiece
  alternatives:
  - the breastpiece of judgment
  - the pouch
  lexicon: HALOT
  rationale: In tabernacle-priestly context חֹשֶׁן refers to the high priest's breastpiece.
    'Breastpiece' is the standard clear rendering here; the longer traditional expansion
    is not present in this verse itself.
- source_word: שַׁרְשְׁרֹת
  chosen: chains
  alternatives:
  - chainlets
  - chains of links
  lexicon: HALOT
  rationale: The plural noun denotes chains; 'chains' is idiomatic and sufficient
    in English.
- source_word: גַּבְלֻת
  chosen: braided
  alternatives:
  - twisted
  - corded
  - interwoven
  lexicon: HALOT
  rationale: This term describes the chains' constructed form. 'Braided' communicates
    the worked, cord-like structure in accessible modern English.
- source_word: מַעֲשֵׂה עֲבֹת
  chosen: work, like cords
  alternatives:
  - corded work
  - ropework
  - twisted work
  lexicon: HALOT
  rationale: The construct phrase describes workmanship resembling cords or thick
    twisted strands. Rendering it as 'work, like cords' preserves both the craftsmanship
    term and the simile-like quality without becoming wooden.
- source_word: זָהָב טָהוֹר
  chosen: of pure gold
  alternatives:
  - from pure gold
  lexicon: HALOT
  rationale: Standard material phrase; 'of pure gold' is natural English and preserves
    the material description.
