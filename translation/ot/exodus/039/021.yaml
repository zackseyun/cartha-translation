id: EXO.39.21
reference: Exodus 39:21
source:
  edition: WLC
  text: וַ/יִּרְכְּס֣וּ אֶת הַ/חֹ֡שֶׁן מִ/טַּבְּעֹתָי/ו֩ אֶל טַבְּעֹ֨ת הָ/אֵפֹ֜ד בִּ/פְתִ֣יל
    תְּכֵ֗לֶת לִֽ/הְיֹת֙ עַל חֵ֣שֶׁב הָ/אֵפֹ֔ד וְ/לֹֽא יִזַּ֣ח הַ/חֹ֔שֶׁן מֵ/עַ֖ל
    הָ/אֵפֹ֑ד כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶֽׁה־־־־־׃
translation:
  text: They fastened the breastpiece by its rings to the rings of the ephod with
    a cord of blue, so that it would be on the skillfully woven band of the ephod,
    and so that the breastpiece would not come loose from on the ephod, just as the
    LORD had commanded Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a blue cord.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the woven band of the ephod'; the Hebrew term refers to the decorated
      band attached to the ephod.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְכְּסוּ
  chosen: They fastened
  alternatives:
  - They bound
  - They tied
  lexicon: HALOT
  rationale: The verb refers to securing or fastening parts together. 'Fastened' is
    natural modern English and fits the priestly garment context better than the more
    wooden 'bound' or narrower 'tied'.
- source_word: הַחֹשֶׁן
  chosen: the breastpiece
  alternatives:
  - the breastplate
  lexicon: HALOT
  rationale: In the tabernacle/priestly context this term denotes the ornamental chest-piece
    holding the stones. 'Breastpiece' is more precise and less misleading in modern
    English than 'breastplate,' which can suggest armor.
- source_word: מִטַּבְּעֹתָיו ... אֶל טַבְּעֹת הָאֵפֹד
  chosen: by its rings to the rings of the ephod
  alternatives:
  - from its rings to the rings of the ephod
  - with its rings to the rings of the ephod
  lexicon: HALOT
  rationale: The prepositions describe attachment via the breastpiece's rings to the
    ephod's rings. 'By its rings to the rings of the ephod' communicates the instrumental
    and directional sense idiomatically in English.
- source_word: בִּפְתִיל תְּכֵלֶת
  chosen: with a cord of blue
  alternatives:
  - with a blue cord
  - with a blue thread
  lexicon: HALOT
  rationale: פְתִיל is a cord/thread-like fastening. 'Cord of blue' preserves the
    material/color phrase while remaining readable. 'Blue thread' is possible but
    may sound too slight for the fastening described.
- source_word: לִהְיוֹת עַל חֵשֶׁב הָאֵפֹד
  chosen: so that it would be on the skillfully woven band of the ephod
  alternatives:
  - to be on the woven band of the ephod
  - to be over the waistband of the ephod
  lexicon: HALOT
  rationale: חֵשֶׁב in this context is the decorated woven band/belt attached to the
    ephod. 'Skillfully woven band' reflects the technical cultic garment term better
    than the vaguer 'waistband' while remaining understandable.
- source_word: וְלֹא יִזַּח
  chosen: would not come loose
  alternatives:
  - would not be displaced
  - would not be removed
  - would not shift away
  lexicon: HALOT
  rationale: The Niphal here expresses separation or slipping away from its proper
    place. 'Would not come loose' is idiomatic and matches the fastening context.
- source_word: מֵעַל הָאֵפֹד
  chosen: from on the ephod
  alternatives:
  - from the ephod
  - off the ephod
  lexicon: HALOT
  rationale: The Hebrew explicitly includes the sense 'from upon.' 'From on the ephod'
    preserves that spatial nuance more closely than simply 'from the ephod,' though
    it remains natural enough in context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention.
