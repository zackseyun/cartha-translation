id: EXO.39.3
reference: Exodus 39:3
source:
  edition: WLC
  text: וַֽ/יְרַקְּע֞וּ אֶת פַּחֵ֣י הַ/זָּהָב֮ וְ/קִצֵּ֣ץ פְּתִילִם֒ לַ/עֲשׂ֗וֹת בְּ/ת֤וֹךְ
    הַ/תְּכֵ֨לֶת֙ וּ/בְ/ת֣וֹךְ הָֽ/אַרְגָּמָ֔ן וּ/בְ/ת֛וֹךְ תּוֹלַ֥עַת הַ/שָּׁנִ֖י
    וּ/בְ/ת֣וֹךְ הַ/שֵּׁ֑שׁ מַעֲשֵׂ֖ה חֹשֵֽׁב־׃
translation:
  text: They hammered out sheets of gold and cut it into threads, to work it into
    the blue and into the purple and into the scarlet yarn and into the fine linen,
    the work of a skillful designer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'plates of gold' instead of 'sheets of gold.' The Hebrew refers to thin
      hammered pieces of metal.
    reason: lexical_alternative
  - marker: b
    text: Or 'cut threads' or 'cut it into strips.' The sense is that the gold was
      prepared as fine filaments to be woven into the fabric.
    reason: lexical_alternative
  - marker: c
    text: '''The work of a skillful designer'' renders a technical expression for
      expert artistic workmanship; some render ''the work of a skillful craftsman''
      or ''an artistic weaver.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְרַקְּעוּ
  chosen: They hammered out
  alternatives:
  - They beat out
  - They spread thin
  lexicon: HALOT
  rationale: The verb רקע in metalworking contexts refers to hammering metal into
    thin plates or sheets. 'Hammered out' is natural modern English and preserves
    the craft action better than the more wooden 'beat out.'
- source_word: פַּחֵי הַזָּהָב
  chosen: sheets of gold
  alternatives:
  - plates of gold
  - thin plates of gold
  lexicon: HALOT
  rationale: פַּחִים are thin metal plates or sheets. 'Sheets of gold' is idiomatic
    and fits the subsequent action of cutting them into threads.
- source_word: וְקִצֵּץ פְּתִילִם
  chosen: and cut it into threads
  alternatives:
  - and cut threads
  - and cut it into strips
  lexicon: HALOT
  rationale: The sense is that the hammered gold was cut into narrow filaments for
    weaving. Because English requires an object, 'it' refers back to the gold sheets.
    'Threads' best matches פְּתִילִם in this textile context; 'strips' is possible
    but less clearly connected to the weaving that follows.
- source_word: לַעֲשׂוֹת
  chosen: to work it
  alternatives:
  - to make
  - to fashion
  lexicon: HALOT
  rationale: Here עשה introduces the purpose of preparing the gold threads for incorporation
    into the woven materials. 'To work it' captures the artisan process more precisely
    than the generic 'to make.'
- source_word: בְּתוֹךְ
  chosen: into
  alternatives:
  - among
  - in the midst of
  - with
  lexicon: HALOT
  rationale: Repeated בְּתוֹךְ here indicates insertion or incorporation within the
    woven colored materials. 'Into' communicates the practical sense of interweaving
    better than the more literal but less idiomatic 'in the midst of.'
- source_word: הַתְּכֵלֶת
  chosen: the blue
  alternatives:
  - the blue yarn
  - the blue cloth
  lexicon: HALOT
  rationale: תְּכֵלֶת denotes the blue-dyed material used in tabernacle textiles.
    Since the noun for yarn is not repeated here, 'the blue' is concise and mirrors
    the Hebrew while remaining understandable in context.
- source_word: הָאַרְגָּמָן
  chosen: the purple
  alternatives:
  - the purple yarn
  - the purple cloth
  lexicon: HALOT
  rationale: אַרְגָּמָן refers to purple-dyed material. As with 'the blue,' the shorter
    rendering preserves the Hebrew's elliptical style.
- source_word: תּוֹלַעַת הַשָּׁנִי
  chosen: the scarlet yarn
  alternatives:
  - the scarlet
  - the crimson yarn
  lexicon: HALOT
  rationale: This expression refers to scarlet material, likely thread or yarn dyed
    with scarlet from worm-derived dye. 'Scarlet yarn' makes the textile sense explicit
    for modern readers.
- source_word: הַשֵּׁשׁ
  chosen: the fine linen
  alternatives:
  - the linen
  - the fine flax linen
  lexicon: HALOT
  rationale: שֵׁשׁ in tabernacle contexts denotes fine linen. Including 'fine' preserves
    the material's quality and cultic significance.
- source_word: מַעֲשֵׂה חֹשֵׁב
  chosen: the work of a skillful designer
  alternatives:
  - the work of a skillful craftsman
  - the work of a designer
  - the work of an artistic weaver
  lexicon: HALOT
  rationale: This technical phrase denotes patterned or expertly designed workmanship.
    'Skillful designer' preserves the idea of intentional artistic planning without
    over-specifying the exact craft role.
