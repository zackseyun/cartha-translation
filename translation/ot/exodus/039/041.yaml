theological_decisions:
- issue: Differentiation between בִּגְדֵי הַשְּׂרָד and בִּגְדֵי הַקֹּדֶשׁ
  chosen_reading: Treat the first phrase as a distinct class of specially woven garments
    used in sanctuary service, followed by the more specific holy garments for Aaron
    and his sons.
  alternative_readings:
  - Take both phrases as near synonyms and render the first more traditionally as
    'garments for service' or 'service garments'.
  rationale: The verse lists items delivered for tabernacle use. Preserving both phrases
    distinctly reflects the Hebrew repetition and likely differentiation in function
    or designation, without over-specifying beyond the text.
