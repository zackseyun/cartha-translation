id: EXO.39.41
reference: Exodus 39:41
source:
  edition: WLC
  text: אֶת בִּגְדֵ֥י הַ/שְּׂרָ֖ד לְ/שָׁרֵ֣ת בַּ/קֹּ֑דֶשׁ אֶת בִּגְדֵ֤י הַ/קֹּ֨דֶשׁ֙
    לְ/אַהֲרֹ֣ן הַ/כֹּהֵ֔ן וְ/אֶת בִּגְדֵ֥י בָנָ֖י/ו לְ/כַהֵֽן־־־׃
translation:
  text: the woven garments for ministering in the sanctuary, the holy garments for
    Aaron the priest, and the garments of his sons for serving as priests.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the garments of service'; the Hebrew expression likely refers to specially
      made textiles used for ministry in the sanctuary.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּגְדֵי
  chosen: garments
  alternatives:
  - clothes
  - vestments
  lexicon: HALOT
  rationale: בֶּגֶד denotes clothing/garments. 'Garments' is natural English and suitably
    formal for priestly attire without importing later ecclesiastical terminology
    like 'vestments.'
- source_word: הַשְּׂרָד
  chosen: woven
  alternatives:
  - service
  - finely worked
  - official
  lexicon: HALOT
  rationale: The noun שְׂרָד in this tabernacle context refers to specially made textile
    work. 'Woven garments' captures the material/craft sense better than the traditional
    but less transparent 'cloths of service' or 'garments of ministry.'
- source_word: לְשָׁרֵת
  chosen: for ministering
  alternatives:
  - for serving
  - to minister
  lexicon: HALOT
  rationale: The verb שׁרת often denotes formal service, especially cultic service.
    'Ministering' preserves the sacred/official nuance in this first occurrence.
- source_word: בַּקֹּדֶשׁ
  chosen: in the sanctuary
  alternatives:
  - in the holy place
  - in the holy place/holy area
  - in the holy sanctuary
  lexicon: HALOT
  rationale: Here קֹדֶשׁ refers to the sacred sphere of tabernacle service rather
    than abstract holiness. 'In the sanctuary' is clear modern English and fits the
    cultic setting.
- source_word: בִּגְדֵי הַקֹּדֶשׁ
  chosen: the holy garments
  alternatives:
  - the sacred garments
  lexicon: HALOT
  rationale: This is the standard designation for priestly vestments. 'Holy garments'
    is a close and idiomatic rendering of the construct phrase.
- source_word: לְאַהֲרֹן הַכֹּהֵן
  chosen: for Aaron the priest
  alternatives:
  - for Aaron the priestly one
  lexicon: HALOT
  rationale: Straightforward dative phrase identifying the recipient and office. 'The
    priest' preserves the appositional title.
- source_word: בִּגְדֵי בָנָיו
  chosen: the garments of his sons
  alternatives:
  - his sons' garments
  lexicon: HALOT
  rationale: Either English form is possible; 'the garments of his sons' keeps the
    Hebrew structure and avoids ambiguity.
- source_word: לְכַהֵן
  chosen: for serving as priests
  alternatives:
  - for priesting
  - to minister as priests
  - to serve as priests
  lexicon: HALOT
  rationale: The denominative verb from כֹּהֵן means to function as a priest. 'For
    serving as priests' is clear, natural English and preserves the vocational sense.
