id: EXO.39.12
reference: Exodus 39:12
source:
  edition: WLC
  text: וְ/הַ/טּ֖וּר הַ/שְּׁלִישִׁ֑י לֶ֥שֶׁם שְׁב֖וֹ וְ/אַחְלָֽמָה׃
translation:
  text: 'and the third row: jacinth, agate, and amethyst.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The exact identification of several ancient gemstones in the high priest’s
      breastpiece is uncertain; 'jacinth' may also be rendered 'amber' or, in older
      English tradition, 'ligure.'
    reason: lexical_alternative
  - marker: b
    text: Or 'onyx' for the second stone in this row.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַטּוּר
  chosen: and the ... row
  alternatives:
  - and the setting
  - and the band
  lexicon: HALOT
  rationale: טּוּר in the breastpiece gem lists denotes a row/arrangement of stones.
    The prefixed conjunction is carried over as 'and,' matching the list structure
    from the preceding verse.
- source_word: הַשְּׁלִישִׁי
  chosen: third
  lexicon: HALOT
  rationale: Ordinal adjective straightforwardly identifies the third row in sequence.
- source_word: לֶשֶׁם
  chosen: jacinth
  alternatives:
  - amber
  - ligure
  lexicon: HALOT
  rationale: The precise identification of several breastpiece stones is uncertain.
    'Jacinth' is a common modern rendering that avoids the archaic 'ligure'; the uncertainty
    is preserved in a footnote.
- source_word: שְׁבוֹ
  chosen: agate
  alternatives:
  - onyx
  lexicon: HALOT
  rationale: Traditional and widely accepted rendering in this context is 'agate,'
    though ancient gemstone identifications remain uncertain; an alternative is preserved
    in a footnote.
- source_word: וְאַחְלָמָה
  chosen: and amethyst
  lexicon: HALOT
  rationale: אַחְלָמָה is commonly identified as amethyst in the breastpiece lists;
    the conjunction is represented with 'and.'
