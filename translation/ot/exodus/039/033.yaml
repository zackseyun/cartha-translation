id: EXO.39.33
reference: Exodus 39:33
source:
  edition: WLC
  text: וַ/יָּבִ֤יאוּ אֶת הַ/מִּשְׁכָּן֙ אֶל מֹשֶׁ֔ה אֶת הָ/אֹ֖הֶל וְ/אֶת כָּל כֵּלָ֑י/ו
    קְרָסָ֣י/ו קְרָשָׁ֔י/ו בריח/ו וְ/עַמֻּדָ֥י/ו וַ/אֲדָנָֽי/ו־־־־־׃
translation:
  text: 'Then they brought the tabernacle to Moses—the tent and all its furnishings:
    its clasps, its frames, its bars, its pillars, and its bases.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'boards' for 'frames.' The Hebrew term refers to the tabernacle's upright
      structural pieces.
    reason: lexical_alternative
  - marker: b
    text: Or 'sockets' for 'bases.' The Hebrew term can refer to the foundation pieces
      into which the structural elements were fitted.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבִיאוּ
  chosen: Then they brought
  alternatives:
  - And they brought
  lexicon: HALOT
  rationale: Wayyiqtol of בוא in the Hiphil here narrates the next action in sequence.
    'Then they brought' gives natural English narrative progression while preserving
    the basic causative sense.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  - the dwelling
  lexicon: HALOT
  rationale: מִשְׁכָּן is the standard term for the sacred dwelling structure in Exodus.
    'Tabernacle' is the established and accurate English rendering in this cultic
    context.
- source_word: אֶל מֹשֶׁה
  chosen: to Moses
  alternatives:
  - before Moses
  lexicon: HALOT
  rationale: אֶל normally marks direction toward a person or place. 'To Moses' is
    the plain sense.
- source_word: הָאֹהֶל
  chosen: the tent
  alternatives:
  - the tent-covering
  lexicon: HALOT
  rationale: אֹהֶל ordinarily means 'tent.' In this context it stands in apposition
    or specification to 'the tabernacle,' distinguishing the tent component from the
    whole structure. Rendering it simply as 'the tent' preserves the source wording
    without over-interpreting.
- source_word: כָּל כֵּלָיו
  chosen: all its furnishings
  alternatives:
  - all its utensils
  - all its equipment
  - all its vessels
  lexicon: HALOT
  rationale: כֵּלִים is a broad term for articles, implements, or equipment. In the
    context of tabernacle components, 'furnishings' is natural modern English and
    broad enough to include structural items listed after it.
- source_word: קְרָסָיו
  chosen: its clasps
  alternatives:
  - its hooks
  - its fasteners
  lexicon: HALOT
  rationale: קְרָסִים in tabernacle descriptions refers to the connecting clasps used
    to join curtains. 'Clasps' best fits the construction context.
- source_word: קְרָשָׁיו
  chosen: its frames
  alternatives:
  - its boards
  - its planks
  lexicon: HALOT
  rationale: Though often traditionally rendered 'boards,' these are upright structural
    elements of the tabernacle. 'Frames' better reflects their function in modern
    English while remaining faithful to the referent.
- source_word: בְּרִיחָיו
  chosen: its bars
  alternatives:
  - its crossbars
  lexicon: HALOT
  rationale: בְּרִיחַ denotes the bars used to hold the frames together. 'Bars' is
    accurate and sufficiently clear.
- source_word: עַמֻּדָיו
  chosen: its pillars
  alternatives:
  - its posts
  - its columns
  lexicon: HALOT
  rationale: The term refers to vertical supports in the tabernacle structure. 'Pillars'
    is a clear and conventional rendering.
- source_word: אֲדָנָיו
  chosen: its bases
  alternatives:
  - its sockets
  - its pedestals
  lexicon: HALOT
  rationale: אֶדֶן in tabernacle contexts denotes the socket-like bases into which
    the frames or pillars were set. 'Bases' is clear in modern English; 'sockets'
    is more technical and may be preserved as an alternative.
