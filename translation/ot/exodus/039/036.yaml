id: EXO.39.36
reference: Exodus 39:36
source:
  edition: WLC
  text: אֶת הַ/שֻּׁלְחָן֙ אֶת כָּל כֵּלָ֔י/ו וְ/אֵ֖ת לֶ֥חֶם הַ/פָּנִֽים־־־׃
translation:
  text: the table, all its utensils, and the bread of the Presence—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or traditionally, 'the showbread.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשֻּׁלְחָן
  chosen: the table
  alternatives:
  - the table of showbread
  lexicon: HALOT
  rationale: שֻׁלְחָן straightforwardly denotes a table. The context already identifies
    tabernacle furnishings, so the simple 'the table' is sufficient and avoids importing
    explanatory wording not present in the Hebrew.
- source_word: כָּל כֵּלָיו
  chosen: all its utensils
  alternatives:
  - all its vessels
  - all its articles
  lexicon: HALOT
  rationale: כְּלִי is a broad term for implement, vessel, or article. 'Utensils'
    is natural modern English for the table's associated implements in cultic context,
    while still concrete and not overly technical.
- source_word: לֶחֶם הַפָּנִים
  chosen: the bread of the Presence
  alternatives:
  - the bread of the face
  - the showbread
  - the bread set out before the LORD
  lexicon: HALOT
  rationale: Literally 'bread of the face/presence.' 'Bread of the Presence' is the
    established but still transparent rendering that preserves the Hebrew sense better
    than the traditional but opaque 'showbread.'
- source_word: אֶת ... אֶת ... וְאֵת
  chosen: '[not separately translated]'
  rationale: These are object markers coordinating items in a list. English does not
    normally represent them lexically, so their function is conveyed by word order
    and conjunction.
