id: EXO.39.39
reference: Exodus 39:39
source:
  edition: WLC
  text: אֵ֣ת מִזְבַּ֣ח הַ/נְּחֹ֗שֶׁת וְ/אֶת מִכְבַּ֤ר הַ/נְּחֹ֨שֶׁת֙ אֲשֶׁר ל֔/וֹ
    אֶת בַּדָּ֖י/ו וְ/אֶת כָּל כֵּלָ֑י/ו אֶת הַ/כִּיֹּ֖ר וְ/אֶת כַּנּֽ/וֹ׀־־־־־־־׃
translation:
  text: the bronze altar, and the bronze grating that was for it, its poles, and all
    its utensils; the basin and its stand;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the bronze grate' or 'the bronze network.'
    reason: lexical_alternative
  - marker: b
    text: 'Traditional English: ''the laver and its base.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְבַּח
  chosen: altar
  alternatives:
  - altar of burnt offering
  lexicon: HALOT
  rationale: The noun means 'altar.' Although in tabernacle context this is specifically
    the altar for burnt offering, the Hebrew here does not repeat the fuller designation,
    so 'altar' is sufficient and natural.
- source_word: הַנְּחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: נְחֹשֶׁת can denote copper or bronze depending on context. In English
    tabernacle-furnishing contexts, 'bronze' is the standard and most idiomatic rendering.
- source_word: מִכְבַּר
  chosen: grating
  alternatives:
  - grate
  - network
  lexicon: HALOT
  rationale: Refers to the lattice/grill associated with the altar. 'Grating' best
    conveys the object in clear modern English while remaining close to the Hebrew.
- source_word: אֲשֶׁר לוֹ
  chosen: that was for it
  alternatives:
  - which belonged to it
  - that was on it
  lexicon: HALOT
  rationale: The relative phrase links the bronze grating to the altar. 'That was
    for it' is a natural English rendering that preserves the association without
    over-specifying placement.
- source_word: בַּדָּיו
  chosen: its poles
  alternatives:
  - its carrying poles
  - its staves
  lexicon: HALOT
  rationale: בַּדִּים are the poles used to carry tabernacle furnishings. 'Poles'
    is clear modern English; 'staves' is archaic.
- source_word: כָּל־כֵּלָיו
  chosen: all its utensils
  alternatives:
  - all its implements
  - all its vessels
  lexicon: HALOT
  rationale: כֵּלִים is a broad term for articles/equipment. For altar-related items,
    'utensils' is idiomatic and suitably concrete.
- source_word: כִּיֹּר
  chosen: basin
  alternatives:
  - laver
  lexicon: HALOT
  rationale: Though traditionally rendered 'laver,' 'basin' is more accessible modern
    English and accurately denotes the washing vessel.
- source_word: כַּנּוֹ
  chosen: its stand
  alternatives:
  - its base
  lexicon: HALOT
  rationale: The noun denotes the support/base of the basin. 'Stand' is natural English
    and fits the likely function; 'base' is possible but slightly less vivid.
