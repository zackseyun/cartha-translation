id: EXO.39.19
reference: Exodus 39:19
source:
  edition: WLC
  text: וַֽ/יַּעֲשׂ֗וּ שְׁתֵּי֙ טַבְּעֹ֣ת זָהָ֔ב וַ/יָּשִׂ֕ימוּ עַל שְׁנֵ֖י קְצ֣וֹת
    הַ/חֹ֑שֶׁן עַל שְׂפָת֕/וֹ אֲשֶׁ֛ר אֶל עֵ֥בֶר הָ/אֵפֹ֖ד בָּֽיְתָ/ה־־־׃
translation:
  text: They made two gold rings and put them on the two ends of the breastpiece,
    on its edge that was on the inner side toward the ephod.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which faced the ephod' or 'which was opposite the ephod.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'inward' (literally, 'houseward'), indicating the side of the breastpiece
      toward the ephod.
    reason: cultural_note
lexical_decisions:
- source_word: טַבְּעֹת זָהָב
  chosen: gold rings
  alternatives:
  - rings of gold
  lexicon: HALOT
  rationale: טַבָּעַת denotes a ring, here a fastening ring in priestly garments.
    'Gold rings' is natural modern English and preserves the material specification.
- source_word: הַחֹשֶׁן
  chosen: the breastpiece
  alternatives:
  - the breastplate
  lexicon: HALOT
  rationale: In the tabernacle/priestly context, חֹשֶׁן refers to the ornamental pouch-like
    breastpiece of judgment. 'Breastpiece' is more precise and less misleading in
    modern English than 'breastplate,' which can suggest armor.
- source_word: שְׂפָתוֹ
  chosen: its edge
  alternatives:
  - its lip
  - its border
  - its rim
  lexicon: HALOT
  rationale: שָׂפָה literally means lip/edge/border. For a crafted object, 'edge'
    is the clearest idiomatic rendering in English.
- source_word: אֲשֶׁר אֶל עֵבֶר הָאֵפֹד
  chosen: that was on the inner side toward the ephod
  alternatives:
  - which was opposite the ephod
  - which faced the ephod
  - which was toward the ephod
  lexicon: HALOT
  rationale: עֵבֶר can denote the side/region opposite or corresponding to something.
    In this garment-construction context, the phrase identifies the side of the breastpiece
    adjacent to the ephod. 'On the inner side toward the ephod' best captures the
    spatial relationship in clear English.
- source_word: בָּיְתָה
  chosen: on the inner side
  alternatives:
  - inward
  - inside
  - toward the house/within
  lexicon: HALOT
  rationale: The directional form from בַּיִת functions adverbially as 'inward' or
    'toward the inside.' Here it modifies the placement relative to the ephod, so
    'on the inner side' expresses the sense naturally.
- source_word: וַיָּשִׂימוּ עַל
  chosen: and put ... on
  alternatives:
  - and set ... on
  - and placed ... on
  lexicon: HALOT
  rationale: שׂוּם is a common verb for placing/setting. 'Put ... on' is straightforward
    modern English and fits the object-placement context.
- source_word: שְׁנֵי קְצוֹת
  chosen: the two ends
  alternatives:
  - the two extremities
  - the two corners
  lexicon: HALOT
  rationale: קָצֶה means end/extremity. 'Ends' is the most natural rendering here,
    without over-specifying shape as 'corners.'
