id: EXO.39.1
reference: Exodus 39:1
source:
  edition: WLC
  text: וּ/מִן הַ/תְּכֵ֤לֶת וְ/הָֽ/אַרְגָּמָן֙ וְ/תוֹלַ֣עַת הַ/שָּׁנִ֔י עָשׂ֥וּ בִגְדֵי שְׂרָ֖ד לְ/שָׁרֵ֣ת בַּ/קֹּ֑דֶשׁ וַֽ/יַּעֲשׂ֞וּ אֶת בִּגְדֵ֤י הַ/קֹּ֨דֶשׁ֙ אֲשֶׁ֣ר לְ/אַהֲרֹ֔ן כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶֽׁה־־־־׃פ
translation:
  text: And from the blue, the purple, and the scarlet yarn they made finely woven garments for ministering in the sanctuary, and they made the holy garments for Aaron, just as Yahweh had commanded Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'garments for service.' The Hebrew expression is specialized and may emphasize either the garments' function in tabernacle service or their finely worked construction.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִן הַתְּכֵלֶת וְהָאַרְגָּמָן וְתוֹלַעַת הַשָּׁנִי
  chosen: from the blue, the purple, and the scarlet yarn
  alternatives:
  - from the blue, purple, and scarlet material
  - from blue, purple, and crimson
  lexicon: HALOT
  rationale: These are standard tabernacle textile/dye terms. 'Scarlet yarn' makes explicit the textile sense of תּוֹלַעַת הַשָּׁנִי in context, while keeping the color list readable. 'Blue' and 'purple' are retained as conventional color terms without over-specifying the exact ancient dye shade.
- source_word: בִגְדֵי שְׂרָד
  chosen: finely woven garments
  alternatives:
  - garments for service
  - service garments
  - woven garments
  lexicon: HALOT
  rationale: The phrase is somewhat specialized and likely refers to official textile garments used in tabernacle service. 'Finely woven garments' fits the cultic-textile context and distinguishes this phrase from the later בִּגְדֵי הַקֹּדֶשׁ ('holy garments'). Because the exact nuance of שְׂרָד is debated, an alternative is preserved in a footnote.
- source_word: לְשָׁרֵת
  chosen: for ministering
  alternatives:
  - to serve
  - for service
  lexicon: HALOT
  rationale: '''Ministering'' appropriately conveys formal cultic service in sanctuary context, more specifically than the broader English ''serve.'''
- source_word: בַּקֹּדֶשׁ
  chosen: in the sanctuary
  alternatives:
  - in the holy place
  - in the holy place/holy area
  - in the holy precinct
  lexicon: HALOT
  rationale: Here הַקֹּדֶשׁ refers to the sacred sphere of tabernacle ministry, not abstract holiness. 'In the sanctuary' is natural English and fits the cultic setting without overcommitting to the narrower room-specific sense 'Holy Place.'
- source_word: בִּגְדֵי הַקֹּדֶשׁ
  chosen: the holy garments
  alternatives:
  - the sacred garments
  - the consecrated garments
  lexicon: HALOT
  rationale: A straightforward rendering that preserves the formal designation of Aaron's priestly vestments.
- source_word: לְאַהֲרֹן
  chosen: for Aaron
  alternatives:
  - belonging to Aaron
  lexicon: HALOT
  rationale: The preposition marks intended use or designation; 'for Aaron' is the most natural English rendering in context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  chosen: just as the LORD had commanded Moses
  alternatives:
  - as the LORD commanded Moses
  lexicon: HALOT
  rationale: The pluperfect-like English 'had commanded' fits the narrative summary sense, referring back to prior divine instructions.
