id: EXO.39.42
reference: Exodus 39:42
source:
  edition: WLC
  text: כְּ/כֹ֛ל אֲשֶׁר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶׁ֑ה כֵּ֤ן עָשׂוּ֙ בְּנֵ֣י יִשְׂרָאֵ֔ל אֵ֖ת כָּל הָ/עֲבֹדָֽה־־־׃
translation:
  text: According to all that Yahweh had commanded Moses, so the sons of Israel did all the work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the children of Israel' or 'the Israelites.' The Hebrew is literally 'the sons of Israel,' a standard covenantal designation for the people of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּכֹל
  chosen: According to all that
  alternatives:
  - Just as
  - In accordance with everything that
  lexicon: HALOT
  rationale: 'The prefixed כ plus כֹל introduces conformity or correspondence: ''according to all'' / ''in accordance with all.'' Rendering it with ''According to all that'' preserves the formal linkage to the command while remaining natural in English.'
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  - what
  lexicon: HALOT
  rationale: Relative particle linking 'all' to the content commanded. 'That' is the most natural English relative here.
- source_word: צִוָּה
  chosen: had commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: 'The verb means ''command.'' English past perfect fits the sequence naturally: the LORD''s command precedes Israel''s completion of the work.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶת מֹשֶׁה
  chosen: Moses
  alternatives:
  - to Moses
  lexicon: HALOT
  rationale: With צוה, the direct-object marker before Moses marks the person commanded. English idiom commonly expresses this as 'commanded Moses' rather than 'commanded to Moses.'
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in this way
  lexicon: HALOT
  rationale: 'כֵּן correlates with the opening phrase: ''According to all that ... so ...'' ''So'' preserves the correspondence succinctly.'
- source_word: עָשׂוּ
  chosen: did
  alternatives:
  - made
  - performed
  lexicon: HALOT
  rationale: The common verb עשה here refers broadly to carrying out the commanded work. 'Did' best matches the object 'all the work' and avoids narrowing the sense to manufacture alone.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' In keeping with the project's gender-accurate principle, this is retained rather than flattened to 'Israelites,' while still functioning corporately for the covenant people in context.
- source_word: אֵת כָּל הָעֲבֹדָה
  chosen: all the work
  alternatives:
  - all the service
  - the whole task
  lexicon: HALOT
  rationale: עֲבֹדָה can mean work, service, or labor. In the tabernacle-construction context, it refers to the whole body of assigned workmanship. 'All the work' is the clearest and most contextually fitting rendering here.
