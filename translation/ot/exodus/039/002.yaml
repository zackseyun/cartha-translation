id: EXO.39.2
reference: Exodus 39:2
source:
  edition: WLC
  text: וַ/יַּ֖עַשׂ אֶת הָ/אֵפֹ֑ד זָהָ֗ב תְּכֵ֧לֶת וְ/אַרְגָּמָ֛ן וְ/תוֹלַ֥עַת שָׁנִ֖י
    וְ/שֵׁ֥שׁ מָשְׁזָֽר־׃
translation:
  text: And he made the ephod of gold, blue, purple, scarlet yarn, and finely twisted
    linen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'scarlet'; the Hebrew expression תּוֹלַעַת שָׁנִי refers to scarlet-dyed
      material, here rendered 'scarlet yarn' to reflect the textile context.
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has 'fine twined linen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: And he made
  alternatives:
  - Then he made
  - And he fashioned
  lexicon: HALOT
  rationale: Wayyiqtol of עשה advances the narrative with a simple past. 'And he made'
    preserves the sequential force without overstyling.
- source_word: אֶת
  chosen: '[direct object marker, untranslated]'
  lexicon: Hebrew grammar
  rationale: Marks הָאֵפֹד as the definite direct object; it has no natural English
    equivalent.
- source_word: הָאֵפֹד
  chosen: the ephod
  lexicon: HALOT
  rationale: אֵפֹד is a specific priestly garment/item and is best transliterated
    as an established cultic term rather than paraphrased.
- source_word: זָהָב
  chosen: gold
  alternatives:
  - gold thread
  - of gold material
  lexicon: HALOT
  rationale: The noun lists the material used in making the ephod. 'Gold' is the plain
    lexical value. Although context in the surrounding verses explains worked gold
    thread, this verse itself simply names the material.
- source_word: תְּכֵלֶת
  chosen: blue
  alternatives:
  - blue yarn
  - blue-purple
  lexicon: HALOT
  rationale: Refers to the prestigious blue dyed material/thread used in tabernacle
    textiles. 'Blue' is readable modern English; 'yarn' is supplied later with scarlet
    for smooth English but not repeated for each item.
- source_word: וְאַרְגָּמָן
  chosen: purple
  alternatives:
  - purple yarn
  lexicon: HALOT
  rationale: Standard color/material term in tabernacle descriptions; 'purple' is
    the natural English rendering.
- source_word: וְתוֹלַעַת שָׁנִי
  chosen: scarlet yarn
  alternatives:
  - scarlet
  - crimson yarn
  lexicon: HALOT
  rationale: This construct expression denotes scarlet-dyed material, often textile
    thread/yarn in sanctuary contexts. 'Scarlet yarn' makes the textile sense explicit
    in idiomatic English.
- source_word: וְשֵׁשׁ מָשְׁזָר
  chosen: and finely twisted linen
  alternatives:
  - and twisted fine linen
  - and fine twined linen
  lexicon: HALOT
  rationale: שֵׁשׁ denotes fine linen; מָשְׁזָר describes it as twisted/twined. 'Finely
    twisted linen' is clear modern English and preserves both elements.
