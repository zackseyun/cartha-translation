id: EXO.39.23
reference: Exodus 39:23
source:
  edition: WLC
  text: וּ/פִֽי הַ/מְּעִ֥יל בְּ/תוֹכ֖/וֹ כְּ/פִ֣י תַחְרָ֑א שָׂפָ֥ה לְ/פִ֛י/ו סָבִ֖יב
    לֹ֥א יִקָּרֵֽעַ־׃
translation:
  text: And the opening of the robe was in the middle of it, like the opening of a
    coat of mail, with a binding around its opening, so that it would not be torn.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like the opening of armor' or 'like the opening of a cuirass'; the Hebrew
      term תַּחְרָא is rare and denotes a protective armored garment.
    reason: lexical_alternative
lexical_decisions:
- source_word: פִי
  chosen: opening
  alternatives:
  - mouth
  - edge
  - hole
  lexicon: HALOT
  rationale: In garment context, פֶּה idiomatically refers to an opening rather than
    a literal mouth. 'Opening' is natural English and fits the robe's neck-hole.
- source_word: הַמְּעִיל
  chosen: the robe
  alternatives:
  - the mantle
  lexicon: HALOT
  rationale: מְעִיל denotes an outer garment/robe. 'Robe' is standard, clear modern
    English for the priestly garment in this context.
- source_word: בְּתוֹכוֹ
  chosen: in the middle of it
  alternatives:
  - within it
  - in its midst
  lexicon: HALOT
  rationale: The phrase indicates the opening was centrally located in the garment.
    'In the middle of it' expresses the spatial sense clearly.
- source_word: כְּפִי תַחְרָא
  chosen: like the opening of a coat of mail
  alternatives:
  - like the opening of armor
  - like the opening of a cuirass
  lexicon: HALOT
  rationale: תַּחְרָא is a rare term commonly understood as a piece of armor, likely
    a coat of mail or cuirass. 'Coat of mail' preserves the comparison to a reinforced
    opening while remaining understandable.
- source_word: שָׂפָה
  chosen: a binding
  alternatives:
  - a lip
  - an edge
  - a border
  lexicon: HALOT
  rationale: Literally 'lip/edge,' but here it refers to the reinforced border around
    the opening. 'Binding' best conveys the functional garment feature in English.
- source_word: לְפִיו סָבִיב
  chosen: around its opening
  alternatives:
  - around its edge
  - all around its opening
  lexicon: HALOT
  rationale: This phrase specifies that the reinforcing edge encircled the opening.
    'Around its opening' is concise and accurate.
- source_word: לֹא יִקָּרֵעַ
  chosen: so that it would not be torn
  alternatives:
  - it was not to be torn
  - it would not tear
  lexicon: HALOT
  rationale: The Niphal imperfect expresses the intended result/purpose of the reinforced
    opening. 'So that it would not be torn' captures that function naturally in English.
