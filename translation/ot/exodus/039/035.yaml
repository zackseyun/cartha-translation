theological_decisions:
- issue: Rendering of כַּפֹּרֶת in a cultic furnishing context
  chosen_reading: mercy seat
  alternative_readings:
  - atonement cover
  - cover
  rationale: The term refers specifically to the ark's cover in the tabernacle, not
    the Greek contested term ἱλαστήριον listed in DOCTRINE.md. 'Mercy seat' preserves
    the established cultic referent and theological resonance without importing later
    doctrinal claims beyond the text.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic'
