id: EXO.39.35
reference: Exodus 39:35
source:
  edition: WLC
  text: אֶת אֲרֹ֥ן הָ/עֵדֻ֖ת וְ/אֶת בַּדָּ֑י/ו וְ/אֵ֖ת הַ/כַּפֹּֽרֶת־־׃
translation:
  text: the ark of the testimony, its poles, and the mercy seat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the atonement cover.' The Hebrew term refers to the cover of the ark
      and carries atoning associations.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרֹן
  chosen: ark
  alternatives:
  - chest
  - box
  lexicon: HALOT
  rationale: The standard rendering for the sacred cultic container in Exodus. 'Ark'
    preserves established referential meaning in English without obscuring the object’s
    function.
- source_word: הָעֵדֻת
  chosen: of the testimony
  alternatives:
  - of the covenant
  - of the witness
  lexicon: HALOT
  rationale: The Hebrew noun עֵדוּת most directly means 'testimony' or 'witness.'
    Here it identifies the ark by its relation to the covenant tablets as the testimony.
    'Of the covenant' is interpretive and not the plain lexical sense in this verse.
- source_word: בַּדָּיו
  chosen: its poles
  alternatives:
  - its staves
  - its carrying poles
  lexicon: HALOT
  rationale: בַּד in tabernacle contexts refers to the poles used for carrying sacred
    objects. 'Poles' is clear modern English; 'staves' is archaic.
- source_word: הַכַּפֹּרֶת
  chosen: the mercy seat
  alternatives:
  - the atonement cover
  - the cover
  lexicon: HALOT
  rationale: In tabernacle context כַּפֹּרֶת denotes the gold cover of the ark with
    atoning significance. 'Mercy seat' is the traditional and contextually precise
    rendering here. Although more literal options like 'atonement cover' are possible,
    this term best identifies the object in English and aligns with its cultic function.
