id: EXO.39.13
reference: Exodus 39:13
source:
  edition: WLC
  text: וְ/הַ/טּוּר֙ הָֽ/רְבִיעִ֔י תַּרְשִׁ֥ישׁ שֹׁ֖הַם וְ/יָשְׁפֵ֑ה מֽוּסַבֹּ֛ת מִשְׁבְּצ֥וֹת
    זָהָ֖ב בְּ/מִלֻּאֹתָֽ/ם׃
translation:
  text: 'and the fourth row: beryl, onyx, and jasper, mounted in settings of gold
    in their fillings.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The precise identification of several gemstones in the high priest's breastpiece
      is uncertain; 'beryl,' 'onyx,' and 'jasper' reflect common traditional equivalents.
    reason: lexical_alternative
  - marker: b
    text: Or 'mounted in gold settings according to their settings.' The final Hebrew
      phrase is technical and may refer to the way the stones were fitted into their
      designated sockets.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַטּוּר הָרְבִיעִי
  chosen: and the fourth row
  alternatives:
  - and the fourth line
  lexicon: HALOT
  rationale: טּוּר in the breastpiece gem lists refers to a row of stones. The conjunction
    is carried over naturally as 'and.'
- source_word: תַּרְשִׁישׁ
  chosen: beryl
  alternatives:
  - topaz
  - chrysolite
  lexicon: HALOT
  rationale: The precise identification of this gemstone is uncertain, but 'beryl'
    is a common and established rendering in the breastpiece lists and fits the likely
    ancient referent better than a generic paraphrase.
- source_word: שֹׁהַם
  chosen: onyx
  alternatives:
  - sardonyx
  - onyx stone
  lexicon: HALOT
  rationale: שֹׁהַם is traditionally rendered 'onyx' in priestly tabernacle contexts.
    Exact mineral identification is debated, but 'onyx' remains the clearest concise
    English equivalent.
- source_word: וְיָשְׁפֵה
  chosen: and jasper
  alternatives:
  - and jaspis
  lexicon: HALOT
  rationale: יָשְׁפֵה is well represented by 'jasper.' The conjunction is retained
    explicitly.
- source_word: מֽוּסַבֹּת
  chosen: mounted
  alternatives:
  - surrounded
  - enclosed
  lexicon: HALOT
  rationale: The passive participial form indicates that the stones were set around
    or enclosed. 'Mounted' gives clear modern English for stones fixed into metalwork
    while preserving the passive sense.
- source_word: מִשְׁבְּצֹת זָהָב
  chosen: in settings of gold
  alternatives:
  - in filigree settings of gold
  - in gold mountings
  lexicon: HALOT
  rationale: מִשְׁבְּצֹת refers to patterned settings or mountings for the stones.
    'Settings of gold' is natural English and matches the tabernacle craftsmanship
    context.
- source_word: בְּמִלֻּאֹתָם
  chosen: in their fillings
  alternatives:
  - in their mountings
  - according to their settings
  - when set
  lexicon: HALOT
  rationale: Literally the phrase refers to the stones in their filled placements
    or settings. Because the Hebrew is somewhat technical and overlaps semantically
    with the previous phrase, 'in their fillings' preserves the formal texture, though
    the sense is that the stones were fixed in their assigned settings.
