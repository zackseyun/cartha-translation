id: EXO.39.34
reference: Exodus 39:34
source:
  edition: WLC
  text: וְ/אֶת מִכְסֵ֞ה עוֹרֹ֤ת הָֽ/אֵילִם֙ הַ/מְאָדָּמִ֔ים וְ/אֶת מִכְסֵ֖ה עֹרֹ֣ת
    הַ/תְּחָשִׁ֑ים וְ/אֵ֖ת פָּרֹ֥כֶת הַ/מָּסָֽךְ־־׃
translation:
  text: the covering of ram skins dyed red, the covering of fine leather, and the
    veil for the screen;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew תְּחָשִׁים has an uncertain referent. It may refer to a particular
      animal skin (traditionally rendered 'porpoise/dugong skins' or transliterated
      'tachash skins').
    reason: lexical_alternative
lexical_decisions:
- source_word: מִכְסֵה
  chosen: covering
  alternatives:
  - cover
  - outer covering
  lexicon: HALOT
  rationale: A straightforward rendering of the noun for something that covers. 'Covering'
    fits the tabernacle context and preserves the nominal form without over-specifying
    structure.
- source_word: עוֹרֹת הָאֵילִם הַמְאָדָּמִים
  chosen: ram skins dyed red
  alternatives:
  - red ram skins
  - skins of rams dyed red
  lexicon: HALOT
  rationale: עוֹרֹת means 'skins/hides'; אֵילִם are 'rams'; הַמְאָדָּמִים indicates
    being made red or dyed red. 'Ram skins dyed red' is idiomatic English and preserves
    the likely processed/dyed sense rather than merely natural color.
- source_word: עֹרֹת הַתְּחָשִׁים
  chosen: fine leather
  alternatives:
  - goatskin
  - porpoise skins
  - dugong skins
  - tachash skins
  lexicon: HALOT
  rationale: תְּחָשׁ is notoriously uncertain. Rather than falsely specifying an animal,
    'fine leather' communicates a durable leather covering in readable English. Because
    the exact referent is disputed, alternatives are preserved in a footnote.
- source_word: פָּרֹכֶת
  chosen: veil
  alternatives:
  - curtain
  lexicon: HALOT
  rationale: In tabernacle usage, פָּרֹכֶת refers to the inner partitioning veil.
    'Veil' preserves its cultic function better than the more generic 'curtain'.
- source_word: הַמָּסָךְ
  chosen: the screen
  alternatives:
  - screen
  - covering curtain
  lexicon: HALOT
  rationale: מָסָךְ commonly denotes a screen or hanging at an entrance. Here it stands
    in construct-like relation after פָּרֹכֶת, yielding 'the veil for the screen'
    in this inventory context.
