id: EXO.39.14
reference: Exodus 39:14
source:
  edition: WLC
  text: וְ֠/הָ/אֲבָנִים עַל שְׁמֹ֨ת בְּנֵי יִשְׂרָאֵ֥ל הֵ֛נָּה שְׁתֵּ֥ים עֶשְׂרֵ֖ה
    עַל שְׁמֹתָ֑/ם פִּתּוּחֵ֤י חֹתָם֙ אִ֣ישׁ עַל שְׁמ֔/וֹ לִ/שְׁנֵ֥ים עָשָׂ֖ר שָֽׁבֶט־־־־׃
translation:
  text: And the stones were according to the names of the sons of Israel, twelve according
    to their names, engraved like a signet, each according to its name, for the twelve
    tribes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bearing the names of the sons of Israel.' The Hebrew preposition can
      express close association or correspondence.
    reason: lexical_alternative
  - marker: b
    text: Or 'engravings of a seal' / 'signet engravings.' The phrase refers to the
      manner of carving, like seal-cut inscriptions.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'sons of Israel,' a traditional covenantal designation for the people
      descended from Israel.
    reason: cultural_note
lexical_decisions:
- source_word: וְהָאֲבָנִים
  chosen: And the stones
  alternatives:
  - Now the stones
  - And the gemstones
  lexicon: HALOT
  rationale: Definite noun with conjunction; 'stones' is the plain sense in context
    of the breastpiece. 'Gemstones' is possible contextually but not required by the
    word itself.
- source_word: עַל שְׁמֹת בְּנֵי יִשְׂרָאֵל
  chosen: according to the names of the sons of Israel
  alternatives:
  - bearing the names of the sons of Israel
  - corresponding to the names of the sons of Israel
  lexicon: HALOT
  rationale: The preposition עַל here expresses correspondence/association rather
    than simple spatial 'on.' 'According to' best preserves the repeated structural
    pattern in the verse.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Gender-accurate and formally close to the Hebrew construct. 'Children
    of Israel' is traditional but less precise; 'Israelites' is smoother but less
    literal.
- source_word: הֵנָּה שְׁתֵּים עֶשְׂרֵה
  chosen: twelve
  alternatives:
  - they were twelve
  lexicon: HALOT
  rationale: The pronoun plus numeral emphasizes the count. In English, 'twelve' naturally
    conveys the predication without awkwardness.
- source_word: עַל שְׁמֹתָם
  chosen: according to their names
  alternatives:
  - by their names
  - bearing their names
  lexicon: HALOT
  rationale: Repeats the correspondence formula from earlier in the verse and keeps
    the Hebrew parallelism visible.
- source_word: פִּתּוּחֵי חֹתָם
  chosen: engraved like a signet
  alternatives:
  - engravings of a seal
  - signet engravings
  lexicon: HALOT
  rationale: This phrase describes the style of engraving, as in seal/signet cutting.
    'Engraved like a signet' is idiomatic modern English while preserving the image.
- source_word: אִישׁ עַל שְׁמוֹ
  chosen: each according to its name
  alternatives:
  - each according to his name
  - each with its own name
  lexicon: HALOT
  rationale: אִישׁ is distributive ('each'), referring to each stone in relation to
    each tribal name. English 'its' matches the immediate referent 'stone' and avoids
    implying male persons as the referent.
- source_word: לִשְׁנֵים עָשָׂר שָׁבֶט
  chosen: for the twelve tribes
  alternatives:
  - for the twelve tribe-groups
  - belonging to the twelve tribes
  lexicon: HALOT
  rationale: 'ל marks relation/purpose: the stones correspond to and represent the
    twelve tribes. ''For the twelve tribes'' is concise and natural.'
