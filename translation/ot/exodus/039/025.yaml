id: EXO.39.25
reference: Exodus 39:25
source:
  edition: WLC
  text: וַ/יַּעֲשׂ֥וּ פַעֲמֹנֵ֖י זָהָ֣ב טָה֑וֹר וַ/יִּתְּנ֨וּ אֶת הַ/פַּֽעֲמֹנִ֜ים
    בְּ/ת֣וֹךְ הָ/רִמֹּנִ֗ים עַל שׁוּלֵ֤י הַ/מְּעִיל֙ סָבִ֔יב בְּ/ת֖וֹךְ הָ/רִמֹּנִֽים־־׃
translation:
  text: They made bells of pure gold, and they put the bells among the pomegranates
    on the hem of the robe, all around, among the pomegranates.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'between the pomegranates.' The Hebrew phrase literally means 'in the
      midst of the pomegranates' and describes the bells' placement relative to the
      pomegranate ornaments.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  chosen: They made
  alternatives:
  - and they made
  - they fashioned
  lexicon: HALOT
  rationale: Common wayyiqtol of עשה introducing the next construction step; 'They
    made' is natural English and preserves the straightforward narrative sequence.
- source_word: פַעֲמֹנֵי
  chosen: bells
  alternatives:
  - small bells
  lexicon: HALOT
  rationale: פעמון denotes a bell; no modifier in the Hebrew requires 'small,' so
    the simple 'bells' is preferred.
- source_word: זָהָב טָהוֹר
  chosen: of pure gold
  alternatives:
  - pure gold bells
  - bells of refined gold
  lexicon: HALOT
  rationale: Construct phrase plus adjective is most naturally rendered 'bells of
    pure gold.' This keeps the material and quality explicit.
- source_word: וַיִּתְּנוּ
  chosen: and they put
  alternatives:
  - and they placed
  - and they set
  lexicon: HALOT
  rationale: נתן here has the sense of placing/setting in position. 'Put' is idiomatic
    modern English and sufficiently precise.
- source_word: בְּתוֹךְ הָרִמֹּנִים
  chosen: among the pomegranates
  alternatives:
  - in the midst of the pomegranates
  - between the pomegranates
  lexicon: HALOT
  rationale: Though literally 'in the midst of,' the sense in this ornamental arrangement
    is distributive placement among the pomegranate ornaments. 'Among' is the clearest
    natural rendering.
- source_word: הָרִמֹּנִים
  chosen: the pomegranates
  alternatives:
  - the pomegranate ornaments
  lexicon: HALOT
  rationale: In the tabernacle-priestly garment context these are decorative pomegranate-shaped
    ornaments, but the Hebrew simply says 'the pomegranates.' The main text preserves
    the source wording; the ornamental sense is contextually understood.
- source_word: עַל שׁוּלֵי הַמְּעִיל
  chosen: on the hem of the robe
  alternatives:
  - on the skirts of the robe
  - on the lower edge of the robe
  lexicon: HALOT
  rationale: שׁוּלִים refers to the hem or lower edge. 'Hem' is the most natural modern
    equivalent, and מְעִיל in this context is the priestly robe.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - all around it
  - round about
  lexicon: HALOT
  rationale: Indicates the arrangement encircling the hem. 'All around' is clear modern
    English.
- source_word: בְּתוֹךְ הָרִמֹּנִים (repeated)
  chosen: among the pomegranates
  alternatives:
  - between the pomegranates
  lexicon: HALOT
  rationale: The repetition is retained in translation because the Hebrew repeats
    the phrase for emphasis and arrangement detail. Keeping it avoids smoothing out
    a significant structural feature of the source.
