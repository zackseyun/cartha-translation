theological_decisions:
- issue: Gendered covenantal designation בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the children of Israel
  - the Israelites
  rationale: The Hebrew is explicitly masculine plural in a stock covenantal phrase.
    Following the project's gender-accurate-over-gender-neutral policy, the translation
    preserves the masculine form rather than neutralizing it.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
