id: EXO.39.6
reference: Exodus 39:6
source:
  edition: WLC
  text: וַֽ/יַּעֲשׂוּ֙ אֶת אַבְנֵ֣י הַ/שֹּׁ֔הַם מֻֽסַבֹּ֖ת מִשְׁבְּצֹ֣ת זָהָ֑ב מְפֻתָּחֹת֙
    פִּתּוּחֵ֣י חוֹתָ֔ם עַל שְׁמ֖וֹת בְּנֵ֥י יִשְׂרָאֵֽל־־׃
translation:
  text: And they made the onyx stones, set in gold settings, engraved like the engravings
    of a seal, according to the names of the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'shoham stones'; the precise identification of the gemstone
      is uncertain, though 'onyx' is the traditional rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  chosen: And they made
  alternatives:
  - And they fashioned
  - And they prepared
  lexicon: HALOT
  rationale: The verb עשה is broad ('make/do'). 'Made' is the most straightforward
    rendering here in a craftsmanship context and fits the narrative sequence.
- source_word: אַבְנֵי הַשֹּׁהַם
  chosen: the onyx stones
  alternatives:
  - the shoham stones
  - the beryl stones
  lexicon: HALOT
  rationale: שֹׁהַם is traditionally rendered 'onyx' in tabernacle contexts, though
    the precise mineral identification is uncertain. 'Onyx stones' is the standard,
    readable rendering; the uncertainty is worth preserving in a footnote.
- source_word: מֻסַבֹּת מִשְׁבְּצֹת זָהָב
  chosen: set in gold settings
  alternatives:
  - surrounded with settings of gold
  - mounted in filigree settings of gold
  lexicon: HALOT
  rationale: The participle plus noun phrase describes the stones as enclosed or mounted
    within crafted gold settings. 'Set in gold settings' is idiomatic English that
    preserves the material and mounting idea without over-specifying the exact metalwork.
- source_word: מְפֻתָּחֹת פִּתּוּחֵי חוֹתָם
  chosen: engraved like the engravings of a seal
  alternatives:
  - carved with seal engravings
  - engraved as a signet is engraved
  lexicon: HALOT
  rationale: The passive participle with cognate noun phrase emphasizes the manner
    of engraving, namely seal-style incision. 'Engraved like the engravings of a seal'
    preserves the Hebrew emphasis and imagery while remaining natural enough in English.
- source_word: עַל שְׁמוֹת
  chosen: according to the names
  alternatives:
  - with the names
  - bearing the names
  lexicon: HALOT
  rationale: 'The preposition עַל here likely indicates correspondence or relation:
    the engraving was done in relation to the names. ''According to the names'' preserves
    that sense and matches the likely meaning that the stones were inscribed in keeping
    with the listed tribal names.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Per the project's gender-accurate philosophy, 'sons of Israel' best reflects
    the Hebrew construct phrase while also preserving the covenantal/tribal idiom.
    More idiomatic alternatives are possible, but this one stays closer to the source.
