id: EXO.39.11
reference: Exodus 39:11
source:
  edition: WLC
  text: וְ/הַ/טּ֖וּר הַ/שֵּׁנִ֑י נֹ֥פֶךְ סַפִּ֖יר וְ/יָהֲלֹֽם׃
translation:
  text: 'and the second row: turquoise, sapphire, and diamond.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The exact identification of several ancient gemstones is uncertain. נֹפֶךְ
      may also be rendered 'emerald' or 'carbuncle,' and יָהֲלֹם may also be rendered
      'jacinth' or 'jasper.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הַ/טּוּר
  chosen: and the ... row
  alternatives:
  - and the ... setting
  - and the ... line
  lexicon: HALOT
  rationale: טּוּר in the breastpiece-gem context refers to a row or tier of stones.
    'Row' is the most natural English rendering here, and the conjunction וְ is carried
    as 'and.'
- source_word: הַ/שֵּׁנִי
  chosen: second
  alternatives:
  - the second
  lexicon: HALOT
  rationale: Ordinal adjective meaning 'second.' English idiom in this list naturally
    yields 'the second row.'
- source_word: נֹפֶךְ
  chosen: turquoise
  alternatives:
  - emerald
  - carbuncle
  lexicon: HALOT
  rationale: The precise identification of several breastpiece stones is uncertain.
    'Turquoise' is a plausible modern equivalent used by many recent translations
    for נֹפֶךְ; traditional alternatives such as 'emerald' or 'carbuncle' are worth
    preserving in a footnote because the ancient gemstone term is not fully certain.
- source_word: סַפִּיר
  chosen: sapphire
  lexicon: HALOT
  rationale: Standard rendering for סַפִּיר. Although the ancient stone may not correspond
    exactly to modern sapphire in mineralogical terms, 'sapphire' is the established
    and most likely English equivalent.
- source_word: וְ/יָהֲלֹם
  chosen: and diamond
  alternatives:
  - and jacinth
  - and jasper
  lexicon: HALOT
  rationale: יָהֲלֹם is another uncertain gemstone identification. 'Diamond' is the
    common traditional rendering and fits the list structure; alternatives are preserved
    in a footnote because certainty is limited.
