id: EXO.39.16
reference: Exodus 39:16
source:
  edition: WLC
  text: וַֽ/יַּעֲשׂ֗וּ שְׁתֵּי֙ מִשְׁבְּצֹ֣ת זָהָ֔ב וּ/שְׁתֵּ֖י טַבְּעֹ֣ת זָהָ֑ב וַֽ/יִּתְּנ֗וּ
    אֶת שְׁתֵּי֙ הַ/טַּבָּעֹ֔ת עַל שְׁנֵ֖י קְצ֥וֹת הַ/חֹֽשֶׁן־־׃
translation:
  text: They made two settings of gold and two rings of gold, and they put the two
    rings on the two ends of the breastpiece.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "mountings" or "filigree settings" for the goldwork described by the
      Hebrew term.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  chosen: They made
  alternatives:
  - and they made
  lexicon: HALOT
  rationale: Qal wayyiqtol of עשה introduces the next action in sequence. English
    can omit the conjunction for smoother narrative flow while retaining the sequential
    sense.
- source_word: שְׁתֵּי
  chosen: two
  lexicon: HALOT
  rationale: Dual/count form straightforwardly indicates the number of items; repeated
    in English for clarity as in the Hebrew.
- source_word: מִשְׁבְּצֹת
  chosen: settings
  alternatives:
  - filigree settings
  - rosettes
  - mountings
  lexicon: HALOT
  rationale: The term refers to gold work used as settings or mounts in the high priestly
    garments/tabernacle items. 'Settings' is clear modern English and fits the jewelry/craft
    context without over-specifying a technique such as filigree.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Standard material term; repeated twice in Hebrew and retained twice in
    English to mirror the source's emphasis and structure.
- source_word: טַבְּעֹת
  chosen: rings
  lexicon: HALOT
  rationale: Common term for rings used as attachment points in tabernacle and priestly
    garment construction.
- source_word: וַיִּתְּנוּ
  chosen: they put
  alternatives:
  - they placed
  - they set
  lexicon: HALOT
  rationale: נתן in this construction means to place/set. 'Put' is natural modern
    English and adequately reflects the simple action.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  - at
  lexicon: HALOT
  rationale: The preposition marks placement onto the ends of the breastpiece. 'On'
    is the most natural equivalent here.
- source_word: שְׁנֵי קְצֹוֹת
  chosen: the two ends
  alternatives:
  - both ends
  - the two edges
  lexicon: HALOT
  rationale: The construct phrase literally means 'the two ends of.' 'Ends' best fits
    the object being described and preserves the concrete spatial language.
- source_word: הַחֹשֶׁן
  chosen: the breastpiece
  alternatives:
  - the breastpiece of judgment
  - the pouch
  lexicon: HALOT
  rationale: In the priestly vestment context, חשן denotes the high priest's breastpiece.
    'Breastpiece' is the standard clear rendering; the longer traditional phrase is
    unnecessary here because the immediate context already identifies the object.
