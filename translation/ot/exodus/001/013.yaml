id: EXO.1.13
reference: Exodus 1:13
source:
  edition: WLC
  text: וַ/יַּעֲבִ֧דוּ מִצְרַ֛יִם אֶת בְּנֵ֥י יִשְׂרָאֵ֖ל בְּ/פָֽרֶךְ־׃
translation:
  text: And the Egyptians made the sons of Israel serve with harshness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or traditionally 'the children of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with ruthlessness' or 'with rigor.' The Hebrew denotes severe, crushing
      harshness in forced labor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבִדוּ
  chosen: made ... serve
  alternatives:
  - enslaved
  - worked
  - made ... labor
  lexicon: HALOT
  rationale: 'Hiphil of עבד here is causative: ''cause to serve/work.'' ''Made ...
    serve'' preserves the causative force without overstating beyond the verb itself.
    ''Enslaved'' is contextually true in the broader passage but is more interpretive
    than the immediate clause; ''made ... labor'' is possible but slightly narrows
    the sense.'
- source_word: מִצְרַיִם
  chosen: the Egyptians
  alternatives:
  - Egypt
  lexicon: HALOT
  rationale: 'Though the form can denote the land or the people, the plural English
    ethnonym fits the verbal subject in context: the Egyptian oppressors are acting
    against Israel.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: This keeps the familial/corporate Hebrew expression while remaining natural
    English. 'Israelites' is smoother but less formally transparent; 'children of
    Israel' is traditional but can sound archaic or suggest only minors. Per translation
    philosophy, this is gender-accurate to the source's corporate masculine form.
- source_word: בְּפָרֶךְ
  chosen: with harshness
  alternatives:
  - with ruthlessness
  - with rigor
  - with cruelty
  lexicon: HALOT
  rationale: פָּרֶךְ denotes severe, crushing harshness in forced labor. 'With harshness'
    is clear modern English and preserves the manner expressed by the preposition
    ב. 'Ruthlessness' and 'cruelty' are viable but slightly more interpretive in emotional
    coloring; 'rigor' is traditional but less accessible.
