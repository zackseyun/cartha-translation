theological_decisions:
- issue: Rendering the corporate designation בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The Hebrew phrase is a standard covenant-people designation. Rendering
    it as 'the sons of Israel' preserves the source form and its genealogical/corporate
    resonance, while remaining understandable. This follows the project's gender-accurate
    principle rather than flattening to a purely neutral ethnonym in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
