id: EXO.1.11
reference: Exodus 1:11
source:
  edition: WLC
  text: וַ/יָּשִׂ֤ימוּ עָלָי/ו֙ שָׂרֵ֣י מִסִּ֔ים לְמַ֥עַן עַנֹּת֖/וֹ בְּ/סִבְלֹתָ֑/ם
    וַ/יִּ֜בֶן עָרֵ֤י מִסְכְּנוֹת֙ לְ/פַרְעֹ֔ה אֶת פִּתֹ֖ם וְ/אֶת רַעַמְסֵֽס־־׃
translation:
  text: 'So they set taskmasters over him to afflict him with their burdens, and he
    built storage cities for Pharaoh: Pithom and Rameses.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'over them' and 'they built'; the Hebrew uses singular forms ('over him,'
      'he built') to refer collectively to Israel.
    reason: alternative_reading
  - marker: b
    text: Or 'store cities.'
    reason: lexical_alternative
  - marker: c
    text: Rameses may also be rendered 'Raamses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשִׂימוּ
  chosen: they set
  alternatives:
  - they placed
  - they appointed
  lexicon: HALOT
  rationale: Common wayyiqtol of שׂים, here meaning to place/appoint officials over
    Israel. 'Set' is concise and natural in English.
- source_word: עָלָיו
  chosen: over him
  alternatives:
  - upon him
  - over them
  lexicon: HALOT
  rationale: Grammatically singular masculine suffix. In context it refers collectively
    to Israel as a people represented in the singular, so 'him' preserves the Hebrew
    form rather than smoothing to plural.
- source_word: שָׂרֵי מִסִּים
  chosen: taskmasters
  alternatives:
  - chiefs of forced labor
  - overseers of labor gangs
  - officials over tribute
  lexicon: HALOT
  rationale: The phrase literally denotes officials/princes of corvée or levy. In
    this oppression context, 'taskmasters' best captures both authority and forced-labor
    function in readable English.
- source_word: לְמַעַן עַנֹּתוֹ
  chosen: to afflict him
  alternatives:
  - to oppress him
  - to humble him
  lexicon: HALOT
  rationale: ענה in the piel commonly means to afflict/oppress/humble. 'Afflict' preserves
    the severity without overinterpreting beyond the lexical range.
- source_word: בְּסִבְלֹתָם
  chosen: with their burdens
  alternatives:
  - with their forced labor
  - by their burdens
  - with the burdens they imposed
  lexicon: HALOT
  rationale: סִבְלֹת refers to burdens/load-bearing labor. 'With their burdens' is
    close to the Hebrew and leaves open whether the burdens are physical loads or
    oppressive labor obligations imposed by the Egyptians.
- source_word: וַיִּבֶן
  chosen: he built
  alternatives:
  - they built
  lexicon: HALOT
  rationale: The verb is morphologically 3ms singular. Hebrew often uses a singular
    verb with a collective subject; here the implied subject is Israel in the singular
    collective, matching the earlier singular suffixes. Retaining 'he built' preserves
    the Hebrew number.
- source_word: עָרֵי מִסְכְּנוֹת
  chosen: storage cities
  alternatives:
  - store cities
  - supply cities
  - granary cities
  lexicon: HALOT
  rationale: Traditional 'store cities' is possible, but 'storage cities' is more
    transparent modern English while preserving the sense of supply depots or administrative
    storage centers.
- source_word: לְפַרְעֹה
  chosen: for Pharaoh
  alternatives:
  - for the Pharaoh
  lexicon: HALOT
  rationale: Standard English rendering of the royal title/name in biblical narrative.
- source_word: פִּתֹם
  chosen: Pithom
  lexicon: HALOT
  rationale: Proper place name; transliterated per translation philosophy.
- source_word: רַעַמְסֵס
  chosen: Rameses
  alternatives:
  - Raamses
  lexicon: HALOT
  rationale: Proper place name; transliterated in a standard English form. 'Raamses'
    reflects a more letter-for-letter form and is worth preserving in a footnote.
