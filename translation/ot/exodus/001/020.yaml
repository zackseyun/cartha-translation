id: EXO.1.20
reference: Exodus 1:20
source:
  edition: WLC
  text: וַ/יֵּ֥יטֶב אֱלֹהִ֖ים לַֽ/מְיַלְּדֹ֑ת וַ/יִּ֧רֶב הָ/עָ֛ם וַ/יַּֽעַצְמ֖וּ מְאֹֽד׃
translation:
  text: So God dealt well with the midwives, and the people multiplied and became
    very strong.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was good to the midwives' or 'blessed the midwives.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּיטֶב
  chosen: dealt well
  alternatives:
  - was good
  - did good
  - treated kindly
  lexicon: HALOT
  rationale: The Hiphil of יטב with ל marks doing good to or dealing well with someone.
    'Dealt well' is idiomatic English that preserves the benefactive sense better
    than the wooden 'did good' and avoids overinterpreting with 'blessed.'
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In this narrative context אֱלֹהִים refers to the God of Israel. Standard
    singular English 'God' fits the singular verbal agreement and context.
- source_word: לַמְיַלְּדֹת
  chosen: with the midwives
  alternatives:
  - to the midwives
  - for the midwives
  lexicon: HALOT
  rationale: The prefixed ל with the benefactive verb can be rendered 'to/for,' but
    in idiomatic English after 'dealt well' the construction 'with the midwives' is
    most natural while preserving the relationship indicated by the Hebrew.
- source_word: וַיִּרֶב
  chosen: multiplied
  alternatives:
  - increased
  - became many
  lexicon: HALOT
  rationale: רבה in this context describes numerical growth of the people. 'Multiplied'
    is a conventional and accurate rendering in Exodus's population-growth context.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the people of Israel
  - the nation
  lexicon: HALOT
  rationale: The Hebrew simply says 'the people.' Since the referent is clear from
    context, the translation keeps the more literal expression rather than expanding
    it.
- source_word: וַיַּעַצְמוּ
  chosen: became very strong
  alternatives:
  - grew mighty
  - became exceedingly mighty
  lexicon: HALOT
  rationale: עצם here conveys becoming strong/mighty. 'Became very strong' is clear
    modern English and preserves the verbal idea of growth in strength rather than
    a static description.
- source_word: מְאֹד
  chosen: very
  alternatives:
  - exceedingly
  - greatly
  lexicon: HALOT
  rationale: מְאֹד intensifies the preceding verb. 'Very' is the most natural modern
    equivalent; 'exceedingly' would sound more archaic.
