theological_decisions:
- issue: Whether to render God's action as 'blessed' the midwives or more neutrally
    as 'dealt well with' them
  chosen_reading: dealt well with the midwives
  alternative_readings:
  - blessed the midwives
  - was good to the midwives
  rationale: The Hebrew verb יטב indicates doing good or dealing well, but does not
    itself specify the mode of divine favor. A more neutral rendering preserves the
    text's wording and leaves verse 21 to specify the concrete reward.
  doctrine_reference: 'Translation philosophy: preserve what the source text states
    without importing doctrinal or interpretive expansion.'
