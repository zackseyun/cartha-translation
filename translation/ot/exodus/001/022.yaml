id: EXO.1.22
reference: Exodus 1:22
source:
  edition: WLC
  text: וַ/יְצַ֣ו פַּרְעֹ֔ה לְ/כָל עַמּ֖/וֹ לֵ/אמֹ֑ר כָּל הַ/בֵּ֣ן הַ/יִּלּ֗וֹד הַ/יְאֹ֨רָ/ה֙
    תַּשְׁלִיכֻ֔/הוּ וְ/כָל הַ/בַּ֖ת תְּחַיּֽוּ/ן־־־׃ס
translation:
  text: Then Pharaoh commanded all his people, saying, “Every son who is born you
    must throw into the Nile, but every daughter you must let live.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the river.'' In Exodus this term commonly refers specifically
      to the Nile.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Every boy who is born.' Hebrew 'son' can function generically for a
      male child in this context.
    reason: lexical_alternative
  - marker: c
    text: Literally 'and every daughter'; the conjunction is rendered 'but' in English
      to show the contrast in Pharaoh's decree.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  chosen: commanded
  alternatives:
  - ordered
  lexicon: HALOT
  rationale: The verb צוה denotes issuing a command. 'Commanded' is slightly more
    formal and fits the royal decree context better than 'ordered,' while remaining
    natural English.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  rationale: Standard English transliteration of the royal title/name.
- source_word: לְכָל עַמּוֹ
  chosen: all his people
  alternatives:
  - all his nation
  - all his subjects
  lexicon: HALOT
  rationale: עַם commonly means 'people.' In context it refers broadly to the Egyptians
    under Pharaoh's authority. 'All his people' is the most direct rendering; 'subjects'
    is interpretive and 'nation' is less personal than the Hebrew.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - thus saying
  lexicon: HALOT
  rationale: Standard rendering of the quotative infinitive, introducing direct speech
    without unnecessary stiffness.
- source_word: כָּל הַבֵּן
  chosen: Every son
  alternatives:
  - Every boy
  - Every male child
  lexicon: HALOT
  rationale: בֵּן literally means 'son.' Here it refers to male offspring generally.
    'Every son' preserves the lexical form and the starkness of the decree; 'boy'
    or 'male child' are possible but less formally aligned with the Hebrew.
- source_word: הַיִּלּוֹד
  chosen: who is born
  alternatives:
  - that is born
  - newborn
  lexicon: HALOT
  rationale: Passive participial/adjectival form from ילד, describing the child as
    one being born. 'Who is born' is clear modern English and preserves the passive
    sense.
- source_word: הַיְאֹרָה
  chosen: into the Nile
  alternatives:
  - into the river
  lexicon: HALOT
  rationale: יְאֹר in Exodus commonly refers specifically to the Nile, not merely
    any river. Rendering it 'the Nile' communicates the referent directly in English;
    'the river' is more formally literal but less clear for modern readers.
- source_word: תַּשְׁלִיכֻהוּ
  chosen: you must throw
  alternatives:
  - you shall throw
  - you are to cast
  lexicon: HALOT
  rationale: Second masculine plural Hiphil with object suffix, addressed to Pharaoh's
    people. 'You must throw' conveys the force of the command in contemporary English.
    The object 'him' is absorbed naturally into English by the context established
    in 'Every son who is born.'
- source_word: וְכָל הַבַּת
  chosen: but every daughter
  alternatives:
  - and every daughter
  - but every girl
  lexicon: HALOT
  rationale: The conjunction is formally 'and,' but in context it marks contrast with
    the preceding command. 'But every daughter' best reflects the sense in idiomatic
    English while preserving בַּת as 'daughter' rather than the more generic 'girl.'
- source_word: תְּחַיּוּן
  chosen: you must let live
  alternatives:
  - you shall keep alive
  - you must preserve alive
  lexicon: HALOT
  rationale: Piel of חיה here means to keep alive or let live. 'Let live' is concise
    and idiomatic; 'keep alive' is also possible, but 'let live' better matches the
    contrast with throwing the sons into the Nile.
