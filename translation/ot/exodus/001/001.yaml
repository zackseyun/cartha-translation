id: EXO.1.1
reference: Exodus 1:1
source:
  edition: WLC
  text: וְ/אֵ֗לֶּה שְׁמוֹת֙ בְּנֵ֣י יִשְׂרָאֵ֔ל הַ/בָּאִ֖ים מִצְרָ֑יְמָ/ה אֵ֣ת יַעֲקֹ֔ב
    אִ֥ישׁ וּ/בֵית֖/וֹ בָּֽאוּ׃
translation:
  text: 'Now these are the names of the sons of Israel who came to Egypt with Jacob,
    each man with his household: they came.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And these are the names.' The Hebrew opens with a conjunction that
      links Exodus to the preceding narrative in Genesis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֵלֶּה
  chosen: Now these
  alternatives:
  - And these
  - These
  lexicon: HALOT
  rationale: The conjunction plus demonstrative continues the narrative from Genesis
    while also introducing a new section. 'Now these' preserves the discourse-linking
    force in natural English better than bare 'These,' while avoiding an overly wooden
    rendering.
- source_word: שְׁמוֹת
  chosen: names
  lexicon: HALOT
  rationale: Straightforward nominal rendering; this also preserves the thematic link
    to the book's Hebrew title.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the descendants of Israel
  lexicon: HALOT
  rationale: Gender-accurate rendering follows the Hebrew construct literally and
    aligns with the stated philosophy. 'Children' is traditional but less precise
    here, since the following phrase specifies male household heads.
- source_word: הַבָּאִים
  chosen: who came
  alternatives:
  - who were coming
  - those coming
  lexicon: HALOT
  rationale: Although formally a participle, in context it functions substantivally
    to identify the group historically. English relative clause 'who came' is the
    most natural equivalent.
- source_word: מִצְרָיְמָה
  chosen: to Egypt
  alternatives:
  - into Egypt
  lexicon: HALOT
  rationale: The directional ending indicates motion toward Egypt. 'To Egypt' is idiomatic
    modern English and sufficiently captures the sense.
- source_word: אֵת יַעֲקֹב
  chosen: with Jacob
  alternatives:
  - Jacob
  - along with Jacob
  lexicon: HALOT
  rationale: Here אֵת marks accompaniment rather than direct object. 'With Jacob'
    best reflects the syntax and sense.
- source_word: אִישׁ וּבֵיתוֹ
  chosen: each man with his household
  alternatives:
  - a man and his house
  - each with his household
  lexicon: HALOT
  rationale: The distributive singular אִישׁ indicates each individual member of the
    list, and בַּיִת in this context refers to the household rather than merely the
    physical house. 'Household' communicates the familial unit clearly.
- source_word: בָּאוּ
  chosen: they came
  alternatives:
  - had come
  lexicon: HALOT
  rationale: The final verb resumes and completes the clause after the distributive
    phrase. Repeating 'they came' mirrors the Hebrew structure, though it sounds slightly
    redundant in English; preserving it respects the source text's emphasis.
