id: EXO.1.7
reference: Exodus 1:7
source:
  edition: WLC
  text: וּ/בְנֵ֣י יִשְׂרָאֵ֗ל פָּר֧וּ וַֽ/יִּשְׁרְצ֛וּ וַ/יִּרְבּ֥וּ וַ/יַּֽעַצְמ֖וּ
    בִּ/מְאֹ֣ד מְאֹ֑ד וַ/תִּמָּלֵ֥א הָ/אָ֖רֶץ אֹתָֽ/ם׃פ
translation:
  text: But the sons of Israel were fruitful and swarmed and multiplied and became
    exceedingly strong, so that the land was filled with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And the sons of Israel'; Hebrew conjunction may be read simply as 'and,'
      but 'but' reflects the contrast with the previous verse.
    reason: alternative_reading
  - marker: b
    text: Or 'teemed'; the Hebrew verb evokes swarming or teeming abundance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי יִשְׂרָאֵל
  chosen: But the sons of Israel
  alternatives:
  - And the sons of Israel
  - But the Israelites
  lexicon: HALOT
  rationale: בני ישראל is literally 'sons of Israel.' 'Sons of Israel' preserves the
    Hebrew familial/national expression and aligns with the gender-accurate principle.
    The prefixed conjunction can be rendered 'and' or 'but'; here 'but' captures the
    narrative contrast with Joseph's generation having died in the previous verse.
- source_word: פָּרוּ
  chosen: were fruitful
  alternatives:
  - increased fruitfully
  lexicon: HALOT
  rationale: From פרה, commonly used for fruitfulness and fecundity. 'Were fruitful'
    is idiomatic English and preserves the likely echo of creation/blessing language.
- source_word: וַיִּשְׁרְצוּ
  chosen: swarmed
  alternatives:
  - teemed
  - bred abundantly
  lexicon: HALOT
  rationale: From שׁרץ, used of swarming/teeming creatures. 'Swarmed' is vivid and
    preserves the strong imagery; 'teemed' is possible but slightly less forceful
    in modern English.
- source_word: וַיִּרְבּוּ
  chosen: multiplied
  alternatives:
  - became many
  - increased
  lexicon: HALOT
  rationale: From רבה, a standard term for becoming numerous. 'Multiplied' fits the
    sequence of rapid population growth and echoes biblical blessing language.
- source_word: וַיַּעַצְמוּ
  chosen: became exceedingly strong
  alternatives:
  - grew very mighty
  - became very numerous and powerful
  lexicon: HALOT
  rationale: From עצם, here conveying becoming strong/mighty. Because the following
    בִּמְאֹד מְאֹד intensifies the verb, 'became exceedingly strong' captures both
    the lexical sense and the emphasis. In context this likely includes strength through
    numbers, but the core sense is strength rather than mere quantity.
- source_word: בִּמְאֹד מְאֹד
  chosen: exceedingly
  alternatives:
  - very, very much
  - greatly
  lexicon: HALOT
  rationale: The doubled מאד is an emphatic intensifier. 'Exceedingly' gives natural
    modern English while preserving the strong emphasis.
- source_word: וַתִּמָּלֵא הָאָרֶץ אֹתָם
  chosen: so that the land was filled with them
  alternatives:
  - and the land was filled with them
  - and they filled the land
  lexicon: HALOT
  rationale: The Niphal/passive-like form of מלא with הארץ as subject is most naturally
    rendered 'the land was filled.' 'So that' brings out the resultative force of
    the clause in English, though simple 'and' is also possible. 'Land' is preferable
    to 'earth' here because the reference is to the territory where they lived, not
    the whole world.
