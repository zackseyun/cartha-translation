theological_decisions:
- issue: Potential creation/blessing resonance in the fertility language
  chosen_reading: Retain the sequence 'were fruitful ... multiplied' without making
    the allusion explicit in the main text
  alternative_readings:
  - Use more interpretive wording to foreground an echo of Genesis blessing language
  rationale: The Hebrew likely evokes earlier blessing/creation language, but the
    translation should preserve that resonance through lexical choice rather than
    by adding explanatory wording not present in the text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import doctrinal claims the text does not make.'
