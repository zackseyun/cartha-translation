id: EXO.1.10
reference: Exodus 1:10
source:
  edition: WLC
  text: הָ֥בָ/ה נִֽתְחַכְּמָ֖ה ל֑/וֹ פֶּן יִרְבֶּ֗ה וְ/הָיָ֞ה כִּֽי תִקְרֶ֤אנָה מִלְחָמָה֙
    וְ/נוֹסַ֤ף גַּם הוּא֙ עַל שֹׂ֣נְאֵ֔י/נוּ וְ/נִלְחַם בָּ֖/נוּ וְ/עָלָ֥ה מִן הָ/אָֽרֶץ־־־־־־׃
translation:
  text: Come, let us deal shrewdly with them, lest they multiply, and if war breaks
    out, they too may join our enemies and fight against us and go up out of the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'with him'; the singular pronoun refers collectively to Israel, so
      English renders the sense as 'with them.'
    reason: lexical_alternative
  - marker: b
    text: Or 'let us deal wisely with them.' The Hebrew can denote acting cleverly
      or wisely; here the context favors a shrewd, politically calculating sense.
    reason: lexical_alternative
  - marker: c
    text: Or 'and leave the land.' Hebrew literally, 'and go up out of the land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבָה
  chosen: Come
  alternatives:
  - Come now
  - Come on
  lexicon: HALOT
  rationale: Idiomatic interjection inviting immediate collective action. 'Come' is
    concise and natural in English while preserving the exhortative force.
- source_word: נִתְחַכְּמָה
  chosen: let us deal shrewdly
  alternatives:
  - let us act wisely
  - let us deal wisely
  - let us outwit
  lexicon: HALOT
  rationale: The hitpael of חכם here carries the sense of acting cleverly or shrewdly
    in policy toward a perceived threat, not positive moral wisdom. 'Deal shrewdly'
    captures the strategic, somewhat sinister nuance better than simply 'deal wisely.'
- source_word: לוֹ
  chosen: with them
  alternatives:
  - with him
  lexicon: HALOT
  rationale: Although morphologically singular ('to/for him'), the pronoun refers
    collectively to Israel as a people. English naturally renders the collective referent
    as 'them' to match the surrounding plural sense and avoid misleading singularity.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - so that not
  lexicon: HALOT
  rationale: Introduces a feared outcome. 'Lest' is compact and accurately preserves
    the preventative logic.
- source_word: יִרְבֶּה
  chosen: they multiply
  alternatives:
  - it multiplies
  - he multiplies
  - they become many
  lexicon: HALOT
  rationale: The singular verb agrees with the collective subject Israel, but English
    idiom prefers plural for the people as a group. 'Multiply' preserves the growth
    motif already established in the context.
- source_word: וְהָיָה כִּי תִקְרֶאנָה מִלְחָמָה
  chosen: and if war breaks out
  alternatives:
  - and when war happens
  - and if wars occur
  - and when war befalls us
  lexicon: HALOT
  rationale: This clause introduces a contingency. 'If war breaks out' is idiomatic
    modern English for the onset of war and fits the plural feminine verb with singular
    collective noun 'war' as an event.
- source_word: וְנוֹסַף גַּם הוּא
  chosen: they too may join
  alternatives:
  - he also may add himself
  - it too may be added
  - they also may align themselves
  lexicon: HALOT
  rationale: יסף with על in this context means to add oneself to a side. Because the
    referent is the collective people Israel, English plural 'they too may join' best
    conveys the sense.
- source_word: עַל שֹׂנְאֵינוּ
  chosen: our enemies
  alternatives:
  - to our enemies
  - with those who hate us
  lexicon: HALOT
  rationale: With יסף, על expresses joining or attaching oneself to a party. In English,
    'join our enemies' communicates the idiom more naturally than a wooden prepositional
    rendering.
- source_word: וְנִלְחַם בָּנוּ
  chosen: and fight against us
  alternatives:
  - and wage war on us
  - and fight us
  lexicon: HALOT
  rationale: The niphal/qal nuance here is straightforward hostile combat. 'Fight
    against us' is clear and preserves the adversative force of בְּ.
- source_word: וְעָלָה מִן הָאָרֶץ
  chosen: and go up out of the land
  alternatives:
  - and leave the land
  - and depart from the land
  lexicon: HALOT
  rationale: '''Go up'' reflects the Hebrew verb עלה and preserves the directional
    idiom, while ''out of the land'' keeps the source wording. Although ''leave the
    land'' is smoother, the more literal rendering retains the Hebrew imagery and
    the ambiguity of whose land is meant from Pharaoh''s perspective.'
