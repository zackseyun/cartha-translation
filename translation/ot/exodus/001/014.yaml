id: EXO.1.14
reference: Exodus 1:14
source:
  edition: WLC
  text: וַ/יְמָרְר֨וּ אֶת חַיֵּי/הֶ֜ם בַּ/עֲבֹדָ֣ה קָשָׁ֗ה בְּ/חֹ֨מֶר֙ וּ/בִ/לְבֵנִ֔ים
    וּ/בְ/כָל עֲבֹדָ֖ה בַּ/שָּׂדֶ֑ה אֵ֚ת כָּל עֲבֹ֣דָתָ֔/ם אֲשֶׁר עָבְד֥וּ בָ/הֶ֖ם
    בְּ/פָֽרֶךְ־־־־׃
translation:
  text: And they made their lives bitter with hard labor in mortar and bricks and
    in every kind of field work. All their labor that they imposed on them was with
    harshness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with ruthlessness' for 'with harshness.' The Hebrew term denotes severe,
      crushing oppression.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמָרְרוּ
  chosen: made ... bitter
  alternatives:
  - embittered
  - made miserable
  lexicon: HALOT
  rationale: From מרר, literally 'to make bitter.' 'Made their lives bitter' preserves
    the metaphor and matches the direct object 'their lives' better than a flatter
    paraphrase like 'made miserable.'
- source_word: חַיֵּיהֶם
  chosen: their lives
  alternatives:
  - their life
  lexicon: HALOT
  rationale: Plural form with pronominal suffix; idiomatically 'their lives' in English
    best reflects the Hebrew expression for the totality of lived experience.
- source_word: בַּעֲבֹדָה קָשָׁה
  chosen: with hard labor
  alternatives:
  - with harsh service
  - with difficult work
  lexicon: HALOT
  rationale: עֲבֹדָה denotes labor/service; קָשָׁה means hard/harsh. 'Hard labor'
    is natural English and preserves the oppressive force without over-paraphrase.
- source_word: בְּחֹמֶר
  chosen: in mortar
  alternatives:
  - with mortar
  - in clay
  lexicon: HALOT
  rationale: In this building context חֹמֶר refers to mortar/clay material. 'Mortar'
    best fits the paired construction with bricks.
- source_word: וּבִלְבֵנִים
  chosen: and bricks
  alternatives:
  - and brickmaking
  lexicon: HALOT
  rationale: Concrete plural noun 'bricks' is the straightforward rendering; the labor
    involved is already conveyed by the surrounding phrase.
- source_word: וּבְכָל עֲבֹדָה בַּשָּׂדֶה
  chosen: and in every kind of field work
  alternatives:
  - and in all work in the field
  - and in every field task
  lexicon: HALOT
  rationale: כָל plus עֲבֹדָה broadens the scope beyond brick labor. 'Every kind of
    field work' communicates comprehensiveness in idiomatic English.
- source_word: אֵת כָּל עֲבֹדָתָם אֲשֶׁר עָבְדוּ בָהֶם
  chosen: All their labor that they imposed on them
  alternatives:
  - all the service in which they made them serve
  - all their work that they worked with them
  lexicon: HALOT
  rationale: 'The Hebrew is resumptive and somewhat heavy: it restates the totality
    of the labor and specifies that the Egyptians made the Israelites do it. English
    requires smoothing; ''imposed on them'' captures the causative/oppressive sense
    of the construction without adding content.'
- source_word: בְּפָרֶךְ
  chosen: with harshness
  alternatives:
  - with ruthlessness
  - with brutality
  lexicon: HALOT
  rationale: פָרֶךְ denotes crushing severity or ruthless oppression. 'With harshness'
    is a restrained but accurate rendering in context; stronger alternatives are possible
    but less literal. A footnote preserves 'ruthlessness' as a lexical alternative.
