id: EXO.1.18
reference: Exodus 1:18
source:
  edition: WLC
  text: וַ/יִּקְרָ֤א מֶֽלֶךְ מִצְרַ֨יִם֙ לַֽ/מְיַלְּדֹ֔ת וַ/יֹּ֣אמֶר לָ/הֶ֔ן מַדּ֥וּעַ
    עֲשִׂיתֶ֖ן הַ/דָּבָ֣ר הַ/זֶּ֑ה וַ/תְּחַיֶּ֖יןָ אֶת הַ/יְלָדִֽים־־׃
translation:
  text: So the king of Egypt called for the midwives and said to them, “Why have you
    done this thing and let the boys live?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “kept the boys alive.” The Hebrew verb can mean causing to live, preserving
      alive, or letting live in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called for
  alternatives:
  - called
  - summoned
  lexicon: HALOT
  rationale: The verb קרא with ל plus persons commonly means to call or summon someone.
    'Called for' is natural modern English and conveys that Pharaoh had them brought
    before him.
- source_word: מֶלֶךְ מִצְרַיִם
  chosen: the king of Egypt
  alternatives:
  - Egypt's king
  lexicon: HALOT
  rationale: A straightforward construct chain; the standard English rendering is
    clear and preserves the formal relationship.
- source_word: לַמְיַלְּדֹת
  chosen: the midwives
  alternatives:
  - the women helping at birth
  lexicon: HALOT
  rationale: From ילד in the participial form meaning women serving as midwives. 'Midwives'
    is the precise and idiomatic English equivalent.
- source_word: וַיֹּאמֶר לָהֶן
  chosen: and said to them
  alternatives:
  - and told them
  lexicon: HALOT
  rationale: אמר is the standard verb 'say.' 'Said to them' preserves the direct-speech
    introduction without adding interpretive force.
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: An interrogative asking reason or cause. 'Why' is the natural concise
    equivalent.
- source_word: עֲשִׂיתֶן
  chosen: have you done
  alternatives:
  - did you do
  lexicon: HALOT
  rationale: Second feminine plural, matching the addressees. English does not mark
    feminine here, but the plural is preserved by 'you.' The perfect can be rendered
    idiomatically in English as present perfect in this interrogative context.
- source_word: הַדָּבָר הַזֶּה
  chosen: this thing
  alternatives:
  - this matter
  - this deed
  lexicon: HALOT
  rationale: דבר here refers to an act or matter. 'This thing' closely follows the
    Hebrew while remaining natural in English.
- source_word: וַתְּחַיֶּיןָ
  chosen: let ... live
  alternatives:
  - kept ... alive
  - preserved ... alive
  lexicon: HALOT
  rationale: 'From חיה in a causative/resultative sense: causing to live or keeping
    alive. In context Pharaoh accuses them of allowing the infants to remain alive.
    ''Let ... live'' is concise and idiomatic; ''kept alive'' is possible but slightly
    more interpretive.'
- source_word: הַיְלָדִים
  chosen: the boys
  alternatives:
  - the children
  - the infants
  lexicon: HALOT
  rationale: Although ילדִים can mean children broadly, the immediate context concerns
    the Hebrew male babies whom Pharaoh had ordered killed (vv. 16–17). Rendering
    it 'the boys' makes explicit the contextual referent without overstepping the
    discourse.
