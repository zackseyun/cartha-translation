id: EXO.1.19
reference: Exodus 1:19
source:
  edition: WLC
  text: וַ/תֹּאמַ֤רְןָ הַֽ/מְיַלְּדֹת֙ אֶל פַּרְעֹ֔ה כִּ֣י לֹ֧א כַ/נָּשִׁ֛ים הַ/מִּצְרִיֹּ֖ת
    הָֽ/עִבְרִיֹּ֑ת כִּֽי חָי֣וֹת הֵ֔נָּה בְּ/טֶ֨רֶם תָּב֧וֹא אֲלֵ/הֶ֛ן הַ/מְיַלֶּ֖דֶת
    וְ/יָלָֽדוּ־־׃
translation:
  text: The midwives said to Pharaoh, “Because the Hebrew women are not like the Egyptian
    women, for they are vigorous; before the midwife comes to them, they have given
    birth.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for they are lively/robust'; the Hebrew adjective may emphasize strength
      and quickness in childbirth. Some interpreters take it more literally as 'like
      animals,' but that is less clear in contemporary English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמַרְןָ
  chosen: said
  alternatives:
  - answered
  - spoke
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introducing direct speech is most naturally rendered
    'said' in English narrative.
- source_word: הַמְיַלְּדֹת
  chosen: the midwives
  alternatives:
  - the women helping in childbirth
  lexicon: HALOT
  rationale: Standard participial noun from ילד in this context refers to the women
    serving as midwives; concise and idiomatic.
- source_word: אֶל־פַּרְעֹה
  chosen: to Pharaoh
  alternatives:
  - to Paroh
  lexicon: HALOT
  rationale: אֶל marks indirect object/direction of speech. 'Pharaoh' is the standard
    English transliteration.
- source_word: כִּי
  chosen: Because
  alternatives:
  - For
  - That
  lexicon: HALOT
  rationale: Here the first כִּי introduces the explanation the midwives give for
    why they did not do as commanded; 'Because' fits the discourse well.
- source_word: לֹא כַנָּשִׁים הַמִּצְרִיֹּת הָעִבְרִיֹּת
  chosen: the Hebrew women are not like the Egyptian women
  alternatives:
  - the Hebrew women are not as the Egyptian women are
  lexicon: HALOT
  rationale: The verbless comparison is naturally expressed in English with 'are not
    like.' Word order is adjusted for readable modern English while preserving the
    contrast.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: The second כִּי gives the stated reason for the comparison. 'For' avoids
    awkward repetition of 'because' and preserves explanatory force.
- source_word: חָיוֹת
  chosen: vigorous
  alternatives:
  - lively
  - robust
  - animal-like
  lexicon: HALOT
  rationale: As an adjective from חיה, the sense here is that the women are strong/vigorous
    in labor. 'Animal-like' is possible etymologically and reflected in some translations,
    but it is less clear in modern English and can sound pejorative beyond what the
    context requires.
- source_word: הֵנָּה
  chosen: they
  alternatives:
  - they themselves
  lexicon: HALOT
  rationale: Independent pronoun adds emphasis, but standard English can convey the
    sense simply with 'they' without overtranslation.
- source_word: בְּטֶרֶם תָּבוֹא אֲלֵהֶן הַמְיַלֶּדֶת
  chosen: before the midwife comes to them
  alternatives:
  - before the midwife can come to them
  - before a midwife comes to them
  lexicon: HALOT
  rationale: בטרם marks prior time. The singular הַמְיַלֶּדֶת is best taken generically,
    hence 'the midwife' in English.
- source_word: וְיָלָדוּ
  chosen: they have given birth
  alternatives:
  - they give birth
  - they deliver
  lexicon: HALOT
  rationale: Perfect verb after a 'before' clause describes completed action prior
    to the midwife's arrival. English present perfect communicates that sequence naturally.
