theological_decisions:
- issue: Rendering of אֱלֹהִים in the phrase 'fear God'
  chosen_reading: God
  alternative_readings:
  - the God
  rationale: The verse describes the midwives' reverent fear toward the true God.
    English idiom does not normally retain the article here. This is a lexical-theological
    choice insofar as it identifies the referent as Israel's God without adding doctrinal
    content beyond the narrative.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not archaic or academic.'
