id: EXO.1.17
reference: Exodus 1:17
source:
  edition: WLC
  text: וַ/תִּירֶ֤אןָ הַֽ/מְיַלְּדֹת֙ אֶת הָ֣/אֱלֹהִ֔ים וְ/לֹ֣א עָשׂ֔וּ כַּ/אֲשֶׁ֛ר
    דִּבֶּ֥ר אֲלֵי/הֶ֖ן מֶ֣לֶךְ מִצְרָ֑יִם וַ/תְּחַיֶּ֖יןָ אֶת הַ/יְלָדִֽים־־׃
translation:
  text: But the midwives feared God, and did not do as the king of Egypt had told
    them; instead, they let the children live.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they kept the children alive.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּירֶאןָ
  chosen: feared
  alternatives:
  - revered
  lexicon: HALOT
  rationale: From ירא, denoting fear/reverence toward God. 'Feared' preserves the
    common biblical idiom 'fear God' without softening it to mere respect, while still
    allowing reverential nuance.
- source_word: הַמְיַלְּדֹת
  chosen: the midwives
  alternatives:
  - the women assisting childbirth
  lexicon: HALOT
  rationale: The participial form from ילד functions substantivally for women serving
    as midwives. 'Midwives' is the natural and precise English equivalent.
- source_word: אֶת־הָאֱלֹהִים
  chosen: God
  alternatives:
  - the God
  lexicon: HALOT
  rationale: With the direct-object marker after 'feared,' the phrase means 'feared
    God.' Although the noun has the article in Hebrew, English idiom here is simply
    'God,' referring to the true God in narrative context.
- source_word: וְלֹא עָשׂוּ
  chosen: did not do
  alternatives:
  - did not act
  - did not comply
  lexicon: HALOT
  rationale: A straightforward negated עשׂה. 'Did not do' keeps close to the Hebrew
    and prepares for the following comparative clause.
- source_word: כַּאֲשֶׁר דִּבֶּר אֲלֵיהֶן
  chosen: as ... had told them
  alternatives:
  - as ... had spoken to them
  - according to what ... said to them
  lexicon: HALOT
  rationale: Though דבר is literally 'spoke,' in this command context 'had told them'
    communicates the force naturally in English without paraphrasing beyond the sense.
- source_word: מֶלֶךְ מִצְרַיִם
  chosen: the king of Egypt
  alternatives:
  - Egypt's king
  lexicon: HALOT
  rationale: Standard construct rendering; 'the king of Egypt' is clear and idiomatic.
- source_word: וַתְּחַיֶּיןָ
  chosen: they let ... live
  alternatives:
  - they kept ... alive
  - they preserved ... alive
  lexicon: HALOT
  rationale: 'From חיה in the piel, causative sense: causing to live or keeping alive.
    ''Let ... live'' fits the immediate contrast with Pharaoh''s order to kill and
    reads naturally in English.'
- source_word: הַיְלָדִים
  chosen: the children
  alternatives:
  - the boys
  - the infants
  lexicon: HALOT
  rationale: ילדים is broader than 'boys' lexically, even though the prior context
    concerns male babies specifically. 'Children' preserves the actual noun here while
    the context makes clear which children are in view.
