id: EXO.1.15
reference: Exodus 1:15
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ מֶ֣לֶךְ מִצְרַ֔יִם לַֽ/מְיַלְּדֹ֖ת הָֽ/עִבְרִיֹּ֑ת אֲשֶׁ֨ר שֵׁ֤ם
    הָֽ/אַחַת֙ שִׁפְרָ֔ה וְ/שֵׁ֥ם הַ/שֵּׁנִ֖ית פּוּעָֽה׃
translation:
  text: Then the king of Egypt said to the Hebrew midwives, one of whom was named
    Shiphrah and the second Puah,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to the midwives of the Hebrews.' The Hebrew phrase may mean either
      that the midwives were Hebrews or that they served the Hebrew women.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving sequential force; 'and said' is more formally
    literal but less idiomatic here.
- source_word: מֶלֶךְ מִצְרַיִם
  chosen: the king of Egypt
  alternatives:
  - Egypt's king
  lexicon: HALOT
  rationale: Standard construct rendering; preserves the formal designation of Pharaoh
    without importing the title 'Pharaoh,' which is not present in this verse.
- source_word: לַמְיַלְּדֹת
  chosen: to the ... midwives
  alternatives:
  - to the women assisting childbirth
  lexicon: HALOT
  rationale: From ילד in the participial form referring to women who assist in birth.
    'Midwives' is the clear, conventional English equivalent.
- source_word: הָעִבְרִיֹּת
  chosen: Hebrew
  alternatives:
  - of the Hebrews
  lexicon: HALOT
  rationale: The adjective may be taken attributively with 'midwives.' 'Hebrew midwives'
    is the most natural rendering of the Hebrew syntax, while acknowledging the phrase
    could also be understood as midwives serving Hebrew women.
- source_word: אֲשֶׁר שֵׁם הָאַחַת ... וְשֵׁם הַשֵּׁנִית ...
  chosen: one of whom was named Shiphrah and the second Puah
  alternatives:
  - whose name was the one Shiphrah and the name of the second Puah
  - the name of the one was Shiphrah, and the name of the second was Puah
  lexicon: HALOT
  rationale: This relative clause identifies the two midwives by name. The chosen
    rendering is idiomatic English that preserves the distributive sense of 'the one
    ... the second.'
- source_word: שִׁפְרָה
  chosen: Shiphrah
  alternatives:
  - Shiprah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard conventions. 'Shiphrah'
    reflects common English transliteration of the Hebrew form.
- source_word: פּוּעָה
  chosen: Puah
  lexicon: HALOT
  rationale: Personal name transliterated directly according to standard English convention.
