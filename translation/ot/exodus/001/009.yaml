id: EXO.1.9
reference: Exodus 1:9
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר אֶל עַמּ֑/וֹ הִנֵּ֗ה עַ֚ם בְּנֵ֣י יִשְׂרָאֵ֔ל רַ֥ב וְ/עָצ֖וּם
    מִמֶּֽ/נּוּ־׃
translation:
  text: And he said to his people, “Look, the people of the sons of Israel are more
    numerous and stronger than we are.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'the Israelite people.' The Hebrew reads literally,
      'the people of the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative form of אמר, advancing the storyline. 'And
    he said' preserves the Hebrew narrative flow without overinterpreting temporal
    nuance.
- source_word: אֶל עַמּוֹ
  chosen: to his people
  alternatives:
  - to his nation
  - to his subjects
  lexicon: HALOT
  rationale: עַם commonly means 'people' in a collective political or ethnic sense.
    With the 3ms suffix, 'his people' is the most natural and contextually fitting
    rendering for Pharaoh addressing his own populace or court.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה is a deictic particle drawing attention. 'Look' preserves the
    force in readable modern English better than the archaic 'Behold.'
- source_word: עַם בְּנֵי יִשְׂרָאֵל
  chosen: the people of the sons of Israel
  alternatives:
  - the people of the Israelites
  - the Israelite people
  lexicon: HALOT
  rationale: The construct chain is literally 'people of the sons of Israel.' To preserve
    source structure and the familial/ethnic designation בני ישראל, the main text
    keeps 'sons of Israel' rather than flattening it to 'Israelites.'
- source_word: רַב
  chosen: more numerous
  alternatives:
  - many
  - great
  lexicon: HALOT
  rationale: In context Pharaoh is describing the demographic strength of Israel in
    Egypt. 'More numerous' brings out the comparative sense implied in relation to
    מִמֶּנּוּ ('than we/us') more clearly than the bare adjective 'many.'
- source_word: וְעָצוּם
  chosen: stronger
  alternatives:
  - mighty
  - too mighty
  lexicon: HALOT
  rationale: עָצוּם can denote strength, might, or power. 'Stronger' works naturally
    in English alongside 'more numerous' and matches the comparative force of the
    clause relative to 'than we are.'
- source_word: מִמֶּנּוּ
  chosen: than we are
  alternatives:
  - than us
  - than we
  lexicon: HALOT
  rationale: 'The 1cp pronominal suffix after מן marks comparison: ''than us/than
    we.'' ''Than we are'' is idiomatic English and makes the comparison explicit.'
