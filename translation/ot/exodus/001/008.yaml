id: EXO.1.8
reference: Exodus 1:8
source:
  edition: WLC
  text: וַ/יָּ֥קָם מֶֽלֶךְ חָדָ֖שׁ עַל מִצְרָ֑יִם אֲשֶׁ֥ר לֹֽא יָדַ֖ע אֶת יוֹסֵֽף־־־־׃
translation:
  text: Now a new king arose over Egypt, who did not know Yosef.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'another king'; the Hebrew adjective is literally 'new,' but some understand
      it to imply a different dynasty or regime.
    reason: lexical_alternative
  - marker: b
    text: Or 'did not acknowledge Yosef'; 'know' may carry the sense of recognizing
      or taking account of him, not merely lacking information about him.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: Now ... arose
  alternatives:
  - Then ... arose
  - came to power
  - rose up
  lexicon: HALOT
  rationale: The wayyiqtol of קום advances the narrative. 'Arose' preserves the verbal
    imagery and can idiomatically refer to the rise of a ruler. 'Now' is a natural
    English discourse marker for the Hebrew narrative progression here.
- source_word: מֶלֶךְ
  chosen: king
  alternatives:
  - ruler
  lexicon: HALOT
  rationale: The noun straightforwardly denotes a king; 'ruler' would be broader and
    less precise than the Hebrew.
- source_word: חָדָשׁ
  chosen: new
  alternatives:
  - another
  lexicon: HALOT
  rationale: The adjective means 'new.' Some interpreters understand it as 'another'
    in the sense of a different dynasty, but the lexical value is still 'new,' and
    interpretation beyond that should not be imported into the main text.
- source_word: עַל מִצְרַיִם
  chosen: over Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: עַל with a ruler naturally conveys authority over a realm. 'Over Egypt'
    better reflects the preposition and the king's dominion than the more generic
    'in Egypt.'
- source_word: אֲשֶׁר לֹא יָדַע
  chosen: who did not know
  alternatives:
  - who did not acknowledge
  - who was not acquainted with
  lexicon: HALOT
  rationale: יָדַע commonly means 'know.' In context it may imply lack of regard or
    recognition of Yosef's significance, but 'did not know' preserves the Hebrew wording
    and leaves that nuance open.
- source_word: יוֹסֵף
  chosen: Yosef
  alternatives:
  - Joseph
  rationale: Per project philosophy, personal names are transliterated rather than
    replaced by traditional Anglicized forms. 'Yosef' directly reflects the Hebrew
    name יוֹסֵף.
