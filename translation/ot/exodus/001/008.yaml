theological_decisions:
- issue: Whether to imply dynastic change or political hostility in 'new king' and
    'did not know Yosef'
  chosen_reading: Retain the plain wording 'a new king ... who did not know Yosef'
    without expanding it to 'another dynasty' or 'did not acknowledge/remember Yosef.'
  alternative_readings:
  - a different king/dynasty arose
  - who did not acknowledge Yosef
  rationale: The verse itself states only that a new king arose and that he did not
    know Yosef. While historical or interpretive traditions may infer dynastic change
    or deliberate disregard, the Hebrew does not require those expansions. Preserving
    the simpler wording maintains the text's ambiguity and avoids importing claims
    the verse does not explicitly make.
  doctrine_reference: Translation philosophy items 1 and 3
