id: EXO.1.12
reference: Exodus 1:12
source:
  edition: WLC
  text: וְ/כַ/אֲשֶׁר֙ יְעַנּ֣וּ אֹת֔/וֹ כֵּ֥ן יִרְבֶּ֖ה וְ/כֵ֣ן יִפְרֹ֑ץ וַ/יָּקֻ֕צוּ
    מִ/פְּנֵ֖י בְּנֵ֥י יִשְׂרָאֵֽל׃
translation:
  text: But the more they afflicted them, the more they multiplied and the more they
    spread out, so that the Egyptians dreaded the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or 'the children of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally 'him,' referring collectively to Israel; English renders
      the collective sense as 'them.'
    reason: lexical_alternative
  - marker: c
    text: Or 'they were in dread of' or 'they loathed.' The Hebrew verb can express
      strong dread or abhorrence.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכַאֲשֶׁר
  chosen: But the more
  alternatives:
  - And as
  - But as
  - According as
  lexicon: HALOT
  rationale: 'The construction with כַאֲשֶׁר followed by כֵּן ... וְכֵן expresses
    proportional correlation: ''the more ... the more.'' ''But'' fits the adversative
    narrative sense in context, contrasting Egyptian oppression with Israel''s growth.'
- source_word: יְעַנּוּ
  chosen: they afflicted
  alternatives:
  - they oppressed
  - they humbled
  lexicon: HALOT
  rationale: ענה in the Piel commonly means to afflict, oppress, or humble. 'Afflicted'
    preserves the concrete harsh-treatment sense without over-specifying the mechanism.
- source_word: אֹתוֹ
  chosen: them
  alternatives:
  - him
  - it
  lexicon: HALOT
  rationale: Although morphologically singular, the pronoun refers collectively to
    Israel as a people. English idiom requires the plural 'them' to reflect the collective
    referent in context.
- source_word: כֵּן
  chosen: the more
  alternatives:
  - so
  - thus
  lexicon: HALOT
  rationale: In correlation with the opening clause, כֵּן is best rendered idiomatically
    as 'the more,' not merely 'so,' to capture the proportional force.
- source_word: יִרְבֶּה
  chosen: they multiplied
  alternatives:
  - it multiplied
  - he multiplied
  - they increased
  lexicon: HALOT
  rationale: The verb is singular with a collective subject, Israel. English naturally
    renders the collective as plural here. 'Multiplied' reflects רבה well and preserves
    the population-growth emphasis.
- source_word: וְכֵן יִפְרֹץ
  chosen: and the more they spread out
  alternatives:
  - and so it broke out
  - and so they increased greatly
  - and the more they burst forth
  lexicon: HALOT
  rationale: פרץ in this context conveys breaking out, spreading, or expanding rapidly.
    'Spread out' communicates vigorous expansion in clear modern English. Repeating
    'the more' preserves the Hebrew correlation.
- source_word: וַיָּקֻצוּ
  chosen: they dreaded
  alternatives:
  - they were in dread of
  - they loathed
  - they were disgusted by
  lexicon: HALOT
  rationale: קוץ can denote abhorrence or a strong sense of dread/distaste. In this
    context of fear over Israel's growth, 'dreaded' best captures the reaction motivating
    Egyptian policy.
- source_word: מִפְּנֵי
  chosen: so that the Egyptians dreaded
  alternatives:
  - because of
  - before
  - on account of
  lexicon: HALOT
  rationale: Literally 'from before/because of the presence of.' In English, with
    וַיָּקֻצוּ, the idiomatic sense is that they reacted with dread because of Israel's
    presence. The subject 'the Egyptians' is supplied from context for clarity.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: A more formal rendering would be 'sons of Israel.' This draft keeps that
    gender-accurate expression in line with the source while remaining readable. 'Children
    of Israel' is traditional but less precise; 'Israelites' is smoother but less
    transparent to the Hebrew idiom.
