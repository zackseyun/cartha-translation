theological_decisions:
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  - the people of Israel
  rationale: Per translation philosophy, gender-accurate renderings are preferred
    where they match the source's intent. Here בְּנֵי is grammatically masculine plural
    in a standard ethnonymic expression. 'Sons of Israel' preserves the Hebrew form
    transparently, while a footnote can preserve smoother English alternatives.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
