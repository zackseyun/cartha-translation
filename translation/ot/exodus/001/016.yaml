id: EXO.1.16
reference: Exodus 1:16
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר בְּ/יַלֶּדְ/כֶן֙ אֶת הָֽ/עִבְרִיּ֔וֹת וּ/רְאִיתֶ֖ן עַל הָ/אָבְנָ֑יִם
    אִם בֵּ֥ן הוּא֙ וַ/הֲמִתֶּ֣ן אֹת֔/וֹ וְ/אִם בַּ֥ת הִ֖יא וָ/חָֽיָה־־־־׃
translation:
  text: and he said, “When you help the Hebrew women give birth and see them on the
    birthstool, if it is a son, then you shall put him to death; but if it is a daughter,
    then she shall live.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “on the two stones,” likely referring to a birthstool
      or birthing seat.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיַלֶּדְכֶן
  chosen: When you help ... give birth
  alternatives:
  - when you serve as midwives to
  - in your delivering
  lexicon: HALOT
  rationale: From ילד in the Piel/causative childbirth context, addressed to the midwives
    (2fp). 'Help ... give birth' is natural modern English while preserving the obstetric
    sense. 'Serve as midwives to' is possible, but the Hebrew verbal form here is
    more directly about assisting in delivery than naming their office.
- source_word: הָעִבְרִיּוֹת
  chosen: the Hebrew women
  alternatives:
  - the Hebrew women in labor
  - the Hebrew women
  lexicon: HALOT
  rationale: עִבְרִיּוֹת is the feminine plural adjective/substantive 'Hebrew women.'
    The object marker אֶת marks them as the women being delivered. 'Women' is sufficient;
    the labor context is already supplied by the verb.
- source_word: וּרְאִיתֶן
  chosen: and see
  alternatives:
  - and look
  - and inspect
  lexicon: HALOT
  rationale: Simple sequential instruction to the midwives. 'See' is the most direct
    rendering.
- source_word: עַל הָאָבְנָיִם
  chosen: on the birthstool
  alternatives:
  - upon the two stones
  - on the delivery stool
  lexicon: HALOT
  rationale: אָבְנָיִם literally relates to 'stones,' but in this childbirth context
    it is an idiom for the place of delivery, traditionally understood as the birthstool
    or birthing seat. Rendering the idiomatic sense in the main text best fits optimal
    equivalence; the more literal alternative is preserved in a footnote.
- source_word: אִם בֵּן הוּא
  chosen: if it is a son
  alternatives:
  - if he is a son
  - if it is a boy
  lexicon: HALOT
  rationale: בן here identifies the newborn as male. 'Son' preserves the lexical correspondence
    with Hebrew בן and matches the formal tone of the decree better than 'boy.'
- source_word: וַהֲמִתֶּן אֹתוֹ
  chosen: then you shall put him to death
  alternatives:
  - then kill him
  - then you shall cause him to die
  lexicon: HALOT
  rationale: מות in the Hiphil means 'put to death'/'cause to die.' 'Put him to death'
    preserves the deliberate, official character of Pharaoh's command better than
    the blunter 'kill him.' The 2fp imperative force is represented with 'you shall'
    in English instruction style.
- source_word: וְאִם בַּת הִיא
  chosen: but if it is a daughter
  alternatives:
  - and if she is a daughter
  - but if it is a girl
  lexicon: HALOT
  rationale: בת is the female counterpart to בן. 'Daughter' keeps the son/daughter
    pairing and mirrors the Hebrew more closely than 'girl.' 'But' brings out the
    contrastive force naturally in English.
- source_word: וָחָיָה
  chosen: then she shall live
  alternatives:
  - then let her live
  - then she may live
  lexicon: HALOT
  rationale: The verb expresses that the female child is to remain alive/be spared.
    'She shall live' is a close rendering; English readers will understand it as permissive
    in this command context.
