id: EXO.1.6
reference: Exodus 1:6
source:
  edition: WLC
  text: וַ/יָּ֤מָת יוֹסֵף֙ וְ/כָל אֶחָ֔י/ו וְ/כֹ֖ל הַ/דּ֥וֹר הַ/הֽוּא־׃
translation:
  text: Then Joseph died, and all his brothers, and all that generation.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּמָת
  chosen: Then ... died
  alternatives:
  - And ... died
  - Now ... died
  lexicon: HALOT
  rationale: The waw-consecutive with מות advances the narrative with a past-tense
    event. 'Then ... died' gives natural English narrative progression while preserving
    the sequential force better than a bare 'and died.'
- source_word: יוֹסֵף
  chosen: Joseph
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: וְכָל
  chosen: and all
  alternatives:
  - and every
  lexicon: HALOT
  rationale: כָּל here has a collective sense. 'All' is the most natural rendering
    in coordination with the following nouns.
- source_word: אֶחָיו
  chosen: his brothers
  alternatives:
  - his brethren
  - his siblings
  lexicon: HALOT
  rationale: אָח in the plural with 3ms suffix means Joseph's brothers. 'Brothers'
    is gender-accurate and contextually precise; 'siblings' would overgeneralize beyond
    the male referents in the narrative.
- source_word: וְכֹל
  chosen: and all
  alternatives:
  - and every
  lexicon: HALOT
  rationale: Repeated כֹּל is retained for the Hebrew's emphatic comprehensiveness.
- source_word: הַדּוֹר הַהוּא
  chosen: that generation
  alternatives:
  - that whole generation
  - that age
  lexicon: HALOT
  rationale: דּוֹר denotes a generation of people living at the same time. 'That generation'
    is the plain and idiomatic English equivalent; 'age' would be less specific, and
    'that whole generation' adds emphasis already conveyed sufficiently by כֹּל.
