id: EXO.1.5
reference: Exodus 1:5
source:
  edition: WLC
  text: וַֽ/יְהִ֗י כָּל נֶ֛פֶשׁ יֹצְאֵ֥י יֶֽרֶךְ יַעֲקֹ֖ב שִׁבְעִ֣ים נָ֑פֶשׁ וְ/יוֹסֵ֖ף
    הָיָ֥ה בְ/מִצְרָֽיִם־־׃
translation:
  text: And all the persons who came from Jacob’s loins were seventy persons, and
    Joseph was already in Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'who came out of Jacob’s thigh.' This is an idiom for
      his direct descendants.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... were
  alternatives:
  - Now ... were
  - And it came to pass that ... were
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the clause narratively. In modern
    English, the existential/resultative sense is best carried by a simple finite
    verb rather than the archaic 'it came to pass.' 'And' preserves the narrative
    linkage.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole number of
  lexicon: HALOT
  rationale: Retains the comprehensive force of the Hebrew quantifier.
- source_word: נֶפֶשׁ ... נָפֶשׁ
  chosen: persons ... persons
  alternatives:
  - souls ... souls
  - people ... people
  lexicon: HALOT
  rationale: Although nephesh is literally 'soul' in some contexts, here it functions
    as a count term for persons/individuals. 'Persons' is natural English and avoids
    importing a more technical anthropological sense not demanded by the context.
- source_word: יֹצְאֵי יֶרֶךְ יַעֲקֹב
  chosen: who came from Jacob’s loins
  alternatives:
  - who came from Jacob’s thigh
  - who were descended from Jacob
  - who came out of Jacob’s body
  lexicon: HALOT
  rationale: The idiom literally refers to those coming out from Jacob's thigh/loins,
    meaning his direct bodily descendants. 'Loins' preserves the concrete Hebrew idiom
    more naturally than 'thigh,' while remaining understandable. A more dynamic option
    like 'descended from Jacob' is possible but loses the bodily imagery present in
    the source.
- source_word: שִׁבְעִים
  chosen: seventy
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: וְיוֹסֵף
  chosen: and Joseph
  alternatives:
  - with Joseph
  lexicon: HALOT
  rationale: The conjunction is simple copulative. The following clause is best represented
    as an additional statement rather than folded into the count phrase.
- source_word: הָיָה בְמִצְרָיִם
  chosen: was already in Egypt
  alternatives:
  - was in Egypt
  - had been in Egypt
  lexicon: HALOT
  rationale: The Hebrew states Joseph's prior presence in Egypt relative to the arrival/counting
    of Jacob's household. 'Was already in Egypt' communicates that temporal nuance
    in idiomatic English without overtranslating into a pluperfect.
