id: EXO.1.2
reference: Exodus 1:2
source:
  edition: WLC
  text: רְאוּבֵ֣ן שִׁמְע֔וֹן לֵוִ֖י וִ/יהוּדָֽה׃
translation:
  text: Reuben, Simeon, Levi, and Judah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: רְאוּבֵן
  chosen: Reuben
  rationale: Proper name; transliterated according to standard English convention,
    following the translation philosophy to transliterate personal names rather than
    translate them.
- source_word: שִׁמְעוֹן
  chosen: Simeon
  rationale: Proper name; transliterated by standard English convention. No contextual
    reason to alter the conventional form.
- source_word: לֵוִי
  chosen: Levi
  rationale: Proper name; transliterated in its standard English form. This preserves
    the personal name rather than importing later tribal or priestly associations
    into the translation.
- source_word: וִ/יהוּדָה
  chosen: and Judah
  rationale: The conjunction ו is rendered as 'and,' and יהודה is transliterated as
    the proper name 'Judah.' The conjunction is retained explicitly to reflect the
    Hebrew list structure in natural English.
