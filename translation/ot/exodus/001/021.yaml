theological_decisions:
- issue: Meaning of 'he made households for them'
  chosen_reading: God granted the midwives households/families.
  alternative_readings:
  - God built houses for them.
  rationale: The Hebrew phrase עשׂה ... בתים can denote establishing a household or
    family line, not merely physical structures. In context, this reads naturally
    as divine blessing on the midwives. To preserve transparency, the more literal
    alternative is retained in a footnote.
  doctrine_reference: Translation philosophy §3, §5
