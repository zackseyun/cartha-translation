id: EXO.1.21
reference: Exodus 1:21
source:
  edition: WLC
  text: וַ/יְהִ֕י כִּֽי יָֽרְא֥וּ הַֽ/מְיַלְּדֹ֖ת אֶת הָ/אֱלֹהִ֑ים וַ/יַּ֥עַשׂ לָ/הֶ֖ם
    בָּתִּֽים־־׃
translation:
  text: And because the midwives feared God, he made households for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'he made houses for them.' The Hebrew may refer to establishing
      households or families rather than constructing physical houses.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כִּי
  chosen: And because
  alternatives:
  - And it happened, because
  - And it came about that, because
  - And when
  lexicon: HALOT
  rationale: The sequence וַיְהִי כִּי introduces a resulting circumstance. In English,
    a simple causal connector is more natural than preserving the full idiom woodenly.
    'Because' captures the clause linkage without unnecessary paraphrase.
- source_word: יָרְאוּ
  chosen: feared
  alternatives:
  - revered
  lexicon: HALOT
  rationale: The verb ירא commonly denotes fear/reverence toward God. 'Feared' preserves
    the biblical idiom and theological weight better than the softer 'revered,' while
    still allowing covenantal reverence in context.
- source_word: הַמְיַלְּדֹת
  chosen: the midwives
  lexicon: HALOT
  rationale: The participial form with article functions substantivally, referring
    to the known women introduced earlier. 'The midwives' is the straightforward contextual
    rendering.
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the God
  lexicon: HALOT
  rationale: With the article, Hebrew often still refers to the true God in a definite
    sense. In idiomatic English, 'God' is the natural rendering here, not 'the God.'
- source_word: וַיַּעַשׂ
  chosen: he made
  alternatives:
  - he established
  - he provided
  lexicon: HALOT
  rationale: עשה has a broad semantic range including 'make' and, by extension, 'provide/establish.'
    'He made' stays closer to the Hebrew while allowing the object to clarify the
    sense.
- source_word: לָהֶם
  chosen: for them
  alternatives:
  - for themselves
  - for him
  lexicon: HALOT
  rationale: The pronominal suffix is 3mp, but in Hebrew mixed or even feminine groups
    can take masculine plural forms. Context clearly points back to the midwives,
    so 'for them' is correct. This avoids importing a singular referent not present
    in the immediate syntax.
- source_word: בָּתִּים
  chosen: households
  alternatives:
  - houses
  - families
  lexicon: HALOT
  rationale: While literally 'houses,' in this context the idiom likely means establishing
    family lines or households for the midwives, not merely constructing buildings.
    'Households' preserves the Hebrew metaphor while communicating the likely sense
    in natural English.
