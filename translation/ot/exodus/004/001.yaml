id: EXO.4.1
reference: Exodus 4:1
source:
  edition: WLC
  text: וַ/יַּ֤עַן מֹשֶׁה֙ וַ/יֹּ֔אמֶר וְ/הֵן֙ לֹֽא יַאֲמִ֣ינוּ לִ֔/י וְ/לֹ֥א יִשְׁמְע֖וּ בְּ/קֹלִ֑/י כִּ֣י יֹֽאמְר֔וּ לֹֽא נִרְאָ֥ה אֵלֶ֖י/ךָ יְהוָֽה־־׃
translation:
  text: Then Moses answered and said, “But behold, they will not believe me, and they will not listen to my voice, for they will say, ‘Yahweh has not appeared to you.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''listen to my voice,'' an idiom that can also mean ''listen to me'' or ''heed me.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'The LORD did not appear to you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: ענה in the wayyiqtol narrative sequence commonly introduces a reply. 'Answered' preserves the dialogical force and standard narrative idiom.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: אמר is the standard verb of speech. 'Said' is the most natural and direct English equivalent in this narrative frame.
- source_word: וְהֵן
  chosen: But look
  alternatives:
  - Behold
  - But suppose
  - Look
  lexicon: HALOT
  rationale: הן here introduces Moses' objection with an attention-getting particle. 'But look' preserves both the adversative sense from context and the deictic force without archaic 'behold.'
- source_word: לֹא יַאֲמִינוּ לִי
  chosen: they will not believe me
  alternatives:
  - they will not trust me
  lexicon: HALOT
  rationale: אמן in the Hiphil often means 'believe' or 'trust.' Here the object is Moses' claim/commission, so 'believe me' is the most idiomatic English rendering.
- source_word: וְלֹא יִשְׁמְעוּ בְּקֹלִי
  chosen: and they will not listen to my voice
  alternatives:
  - and they will not listen to me
  - and they will not obey my voice
  lexicon: HALOT
  rationale: שׁמע with בקול can mean listen to, heed, or obey. In this immediate context of accepting Moses' report, 'listen to my voice' preserves the Hebrew expression while remaining understandable; 'obey' would overstate the nuance at this point.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: כּי introduces the reason for Moses' concern. 'For' fits the explanatory clause smoothly in English.
- source_word: לֹא נִרְאָה אֵלֶיךָ
  chosen: has not appeared to you
  alternatives:
  - did not appear to you
  - was not seen by you
  lexicon: HALOT
  rationale: 'The Niphal of ראה commonly means ''appear.'' The perfect here is well represented by English present perfect in reported speech: ''has not appeared to you.'' This is more idiomatic than a passive rendering.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
