id: EXO.4.19
reference: Exodus 4:19
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֤ה אֶל מֹשֶׁה֙ בְּ/מִדְיָ֔ן לֵ֖ךְ שֻׁ֣ב מִצְרָ֑יִם כִּי מֵ֨תוּ֙
    כָּל הָ֣/אֲנָשִׁ֔ים הַֽ/מְבַקְשִׁ֖ים אֶת נַפְשֶֽׁ/ךָ־־־־׃
translation:
  text: And the LORD said to Moses in Midian, “Go, return to Egypt, because all the
    men who were seeking your life are dead.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Go back to Egypt.” The Hebrew preserves two imperatives, literally “Go,
      return to Egypt.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as 'the LORD' per the project's default for the divine name,
    following the stated doctrine and common English convention for YHWH.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: The waw-consecutive imperfect of אמר is the standard narrative form 'and
    ... said.' 'Said' is the most natural and accurate English rendering here.
- source_word: בְּמִדְיָן
  chosen: in Midian
  alternatives:
  - while in Midian
  lexicon: HALOT
  rationale: The preposition ב marks location. 'In Midian' is the straightforward
    locative rendering and fits the narrative setting.
- source_word: לֵךְ שֻׁב
  chosen: Go, return
  alternatives:
  - Go back
  - Leave and return
  lexicon: HALOT
  rationale: 'The two imperatives are both preserved: לֵךְ adds urgency/motion and
    שֻׁב gives the main action of returning. ''Go, return'' keeps both verbs rather
    than collapsing them entirely, while remaining readable English.'
- source_word: מִצְרָיִם
  chosen: to Egypt
  lexicon: HALOT
  rationale: Although the Hebrew form lacks an explicit preposition here, English
    idiom requires 'to' with 'return' in this context.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the command. 'Because' is clearer in modern
    English than the more formal 'for.'
- source_word: מֵתוּ
  chosen: are dead
  alternatives:
  - have died
  - died
  lexicon: HALOT
  rationale: The perfect verb states a completed action with present relevance. 'Are
    dead' communicates the resulting state naturally in English.
- source_word: כָּל הָאֲנָשִׁים
  chosen: all the men
  alternatives:
  - all the people
  - everyone
  lexicon: HALOT
  rationale: אֲנָשִׁים specifically means 'men' here, not a generic 'people.' This
    follows the project's gender-accurate principle and preserves the reference to
    the male individuals seeking Moses' life.
- source_word: הַמְבַקְשִׁים
  chosen: who were seeking
  alternatives:
  - who sought
  - who were looking for
  lexicon: HALOT
  rationale: The participle denotes ongoing or characteristic action in past context.
    'Who were seeking' captures the sense better than the more punctiliar 'sought.'
- source_word: אֶת נַפְשֶׁךָ
  chosen: your life
  alternatives:
  - your soul
  - you
  lexicon: HALOT
  rationale: In this idiom, נֶפֶשׁ refers to life itself, especially in the expression
    'seek someone's life' meaning to try to kill them. 'Your life' is the standard
    and clearest rendering.
