id: EXO.4.31
reference: Exodus 4:31
source:
  edition: WLC
  text: וַֽ/יַּאֲמֵ֖ן הָ/עָ֑ם וַֽ/יִּשְׁמְע֡וּ כִּֽי פָקַ֨ד יְהוָ֜ה אֶת בְּנֵ֣י יִשְׂרָאֵ֗ל וְ/כִ֤י רָאָה֙ אֶת עָנְיָ֔/ם וַֽ/יִּקְּד֖וּ וַ/יִּֽשְׁתַּחֲוּֽוּ־־־׃
translation:
  text: And the people believed; and when they heard that Yahweh had visited the sons of Israel and that he had seen their affliction, they bowed down and worshiped.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD had attended to the sons of Israel.' The Hebrew verb can mean 'visited,' 'attended to,' or 'took notice of,' often with the sense of divine intervention.
    reason: lexical_alternative
  - marker: b
    text: Or 'the children of Israel' or 'the Israelites.' Literally 'the sons of Israel.'
    reason: lexical_alternative
  - marker: c
    text: Or 'their misery' or 'their suffering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּאֲמֵן
  chosen: believed
  alternatives:
  - trusted
  - believed him
  lexicon: HALOT
  rationale: The Hiphil of אמן here denotes coming to believe the message/signs delivered by Moses and Aaron. 'Believed' is the most natural English rendering and preserves the narrative force without adding an explicit object not present in the Hebrew.
- source_word: הָעָם
  chosen: the people
  lexicon: HALOT
  rationale: A collective singular in Hebrew, best rendered idiomatically as 'the people' in English.
- source_word: וַיִּשְׁמְעוּ כִּי
  chosen: when they heard that
  alternatives:
  - and they heard that
  - for they heard that
  lexicon: HALOT
  rationale: The waw-consecutive plus שׁמע followed by כִּי introduces the content heard and explains the people's response. 'When they heard that' gives smooth English while preserving the temporal-causal connection.
- source_word: פָקַד יְהוָה
  chosen: the LORD had visited
  alternatives:
  - the LORD had attended to
  - the LORD had taken notice of
  - the LORD had cared for
  lexicon: HALOT
  rationale: פקד has a broad semantic range including visit, attend to, take note of, often with covenantal overtones of intervention. 'Visited' preserves the Hebrew idiom and its theological resonance of divine attention and action. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Following the gender-accurate principle, the familial expression is retained rather than flattened to 'Israelites,' while remaining understandable in English.
- source_word: רָאָה אֶת עָנְיָם
  chosen: he had seen their affliction
  alternatives:
  - he had seen their misery
  - he had seen their suffering
  lexicon: HALOT
  rationale: עֳנִי/עָנִי denotes affliction, misery, or oppression. 'Affliction' preserves the gravity and common biblical diction without becoming archaic. 'Seen' keeps the concrete Hebrew verb and implies compassionate notice in context.
- source_word: וַיִּקְּדוּ
  chosen: they bowed down
  alternatives:
  - they bent low
  - they bowed
  lexicon: HALOT
  rationale: קדד refers to bowing or inclining the body. 'Bowed down' is clear and pairs naturally with the following verb.
- source_word: וַיִּשְׁתַּחֲווּ
  chosen: worshiped
  alternatives:
  - prostrated themselves
  - bowed in worship
  lexicon: HALOT
  rationale: The verb commonly denotes prostration in homage or worship. Since it follows a separate verb for physical bowing, 'worshiped' captures the act's devotional significance without redundant repetition.
