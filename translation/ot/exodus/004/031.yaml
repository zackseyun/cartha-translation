theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Whether to preserve the literal familial phrase בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the children of Israel
  - the Israelites
  rationale: The Hebrew is explicitly masculine plural in a representative familial expression. Per the gender-accurate principle, the translation keeps the source form rather than neutralizing it, while still using natural English.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
