id: EXO.4.14
reference: Exodus 4:14
source:
  edition: WLC
  text: וַ/יִּֽחַר אַ֨ף יְהוָ֜ה בְּ/מֹשֶׁ֗ה וַ/יֹּ֨אמֶר֙ הֲ/לֹ֨א אַהֲרֹ֤ן אָחִ֨י/ךָ֙
    הַ/לֵּוִ֔י יָדַ֕עְתִּי כִּֽי דַבֵּ֥ר יְדַבֵּ֖ר ה֑וּא וְ/גַ֤ם הִנֵּה הוּא֙ יֹצֵ֣א
    לִ/קְרָאתֶ֔/ךָ וְ/רָאֲ/ךָ֖ וְ/שָׂמַ֥ח בְּ/לִבּֽ/וֹ־־־׃
translation:
  text: Then the LORD’s anger burned against Moses, and he said, “Is there not Aaron
    your brother, the Levite? I know that he can speak well. And also, look, he is
    coming out to meet you; when he sees you, he will rejoice in his heart.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I know that he speaks fluently' or more literally, 'speaking he will
      speak.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר אַף
  chosen: the LORD’s anger burned
  alternatives:
  - the LORD became angry
  - the anger of the LORD was kindled
  lexicon: HALOT
  rationale: The idiom literally involves anger 'burning' or 'kindling.' 'The LORD’s
    anger burned' preserves the Hebrew metaphor while remaining natural modern English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the Septuagintal
    pattern.
- source_word: הֲלֹא
  chosen: Is there not
  alternatives:
  - Is not
  - Surely there is
  lexicon: HALOT
  rationale: This introduces a rhetorical question expecting an affirmative answer.
    'Is there not' reflects the Hebrew form clearly and idiomatically.
- source_word: אָחִיךָ
  chosen: your brother
  lexicon: HALOT
  rationale: Straightforward kinship term with second masculine singular suffix; no
    reason to expand or paraphrase.
- source_word: הַלֵּוִי
  chosen: the Levite
  alternatives:
  - the Leviite
  - the descendant of Levi
  lexicon: HALOT
  rationale: The standard English ethnicon is 'the Levite.' It may identify Aaron
    by tribal affiliation rather than cultic office at this point in the narrative.
- source_word: יָדַעְתִּי כִּי דַבֵּר יְדַבֵּר הוּא
  chosen: I know that he can speak well
  alternatives:
  - I know that he speaks fluently
  - I know that he will certainly speak
  - I know that speaking he will speak
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verbal idea.
    In context, the point is Aaron’s speaking ability in contrast to Moses’ reluctance,
    so 'he can speak well' conveys the force naturally without wooden repetition.
- source_word: וְגַם הִנֵּה
  chosen: And also, look
  alternatives:
  - And indeed
  - Moreover, behold
  lexicon: HALOT
  rationale: This combination adds emphasis and draws attention to the next clause.
    'And also, look' preserves both additive and deictic force in readable English.
- source_word: יֹצֵא לִקְרָאתֶךָ
  chosen: he is coming out to meet you
  alternatives:
  - he is going out to meet you
  - he is on his way to meet you
  lexicon: HALOT
  rationale: The participle gives an ongoing/imminent sense. 'Coming out to meet you'
    fits the narrative viewpoint and sounds natural in English.
- source_word: וְרָאֲךָ
  chosen: when he sees you
  alternatives:
  - and he will see you
  lexicon: HALOT
  rationale: Although formally a sequential perfect/consecutive form, in English the
    temporal sense is best expressed as 'when he sees you,' since it introduces the
    circumstance for the following result.
- source_word: וְשָׂמַח בְּלִבּוֹ
  chosen: he will rejoice in his heart
  alternatives:
  - he will be glad in his heart
  - his heart will rejoice
  lexicon: HALOT
  rationale: This preserves the inward, heartfelt dimension of the Hebrew expression
    while remaining idiomatic. 'In his heart' is preferable to reducing it to merely
    'be glad' because the Hebrew explicitly includes the inner disposition.
