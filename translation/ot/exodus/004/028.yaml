id: EXO.4.28
reference: Exodus 4:28
source:
  edition: WLC
  text: וַ/יַּגֵּ֤ד מֹשֶׁה֙ לְ/אַֽהֲרֹ֔ן אֵ֛ת כָּל דִּבְרֵ֥י יְהוָ֖ה אֲשֶׁ֣ר שְׁלָח֑/וֹ וְ/אֵ֥ת כָּל הָ/אֹתֹ֖ת אֲשֶׁ֥ר צִוָּֽ/הוּ־־׃
translation:
  text: Moses told Aaron all the words of Yahweh who had sent him, and all the signs that he had commanded him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'all the words of the LORD with which he had sent him.' The Hebrew relative clause can be taken closely with 'words,' though the sense remains that the LORD had sent Moses.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּגֵּד
  chosen: told
  alternatives:
  - reported
  - declared
  lexicon: HALOT
  rationale: The Hiphil of נגד here means to make known or tell. 'Told' is natural modern English and fits the narrative context of Moses informing Aaron.
- source_word: דִּבְרֵי יְהוָה
  chosen: the words of the LORD
  alternatives:
  - the message of the LORD
  - everything the LORD had said
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'message.' The plural construct with כָּל is best kept fairly formally as 'all the words of the LORD,' preserving the sense that Moses relayed the LORD's spoken commission.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲשֶׁר שְׁלָחוֹ
  chosen: who had sent him
  alternatives:
  - which he had sent him with
  - that he sent him
  lexicon: HALOT
  rationale: 'The relative clause most naturally refers back to ''the LORD'' rather than ''words'': Moses told Aaron all the words of the LORD, namely the LORD who had sent Moses. English requires smoothing the syntax; ''who had sent him'' captures the Hebrew succinctly.'
- source_word: הָאֹתֹת
  chosen: the signs
  alternatives:
  - the miraculous signs
  - the tokens
  lexicon: HALOT
  rationale: אוֹת commonly denotes a sign, often miraculous in Exodus. 'Signs' is the most direct and contextually appropriate rendering without over-interpreting.
- source_word: אֲשֶׁר צִוָּהוּ
  chosen: that he had commanded him to do
  alternatives:
  - that he had commanded him
  - which he had instructed him regarding
  lexicon: HALOT
  rationale: 'The Hebrew object is ''all the signs'' followed by ''which he had commanded him.'' In English, ''commanded signs'' is awkward, so ''commanded him to do'' makes explicit the implied action while staying close to the sense: God had instructed Moses concerning the performance of these signs.'
