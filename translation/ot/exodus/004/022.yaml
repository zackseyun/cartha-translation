id: EXO.4.22
reference: Exodus 4:22
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֖ אֶל פַּרְעֹ֑ה כֹּ֚ה אָמַ֣ר יְהוָ֔ה בְּנִ֥/י בְכֹרִ֖/י יִשְׂרָאֵֽל־׃
translation:
  text: 'Then you shall say to Pharaoh, ‘Thus says the LORD: Israel is my firstborn
    son.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more formally following the Hebrew order: “Israel is my son, my firstborn.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אָמַרְתָּ
  chosen: Then you shall say
  alternatives:
  - And you shall say
  - You are to say
  lexicon: HALOT
  rationale: Qal perfect 2ms with prefixed conjunction in direct instruction to Moses
    functions with future/injunctive force in context. 'Then' captures the sequential
    force of waw in natural English; 'shall say' preserves the directive tone.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition introducing the addressee.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  lexicon: HALOT
  rationale: Proper name/title transliterated by standard English convention, in keeping
    with the philosophy to transliterate names.
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is what
  - So
  lexicon: HALOT
  rationale: Formulaic messenger expression כֹּה אָמַר is idiomatically rendered 'Thus
    says,' preserving the solemn prophetic style.
- source_word: אָמַר
  chosen: says
  alternatives:
  - has said
  - said
  lexicon: HALOT
  rationale: Though morphologically perfect, in the fixed citation formula כֹּה אָמַר
    it is best rendered with the English present 'says' to reflect standard speech-introduction
    usage.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD,' following
    Jewish reverence tradition and the Septuagintal pattern.
- source_word: בְּנִי
  chosen: my son
  alternatives:
  - my child
  lexicon: HALOT
  rationale: Construct form with 1cs suffix means 'my son.' 'Son' should be retained
    rather than neutralized, since the filial metaphor is explicit and the translation
    philosophy is gender-accurate over gender-neutral.
- source_word: בְכֹרִי
  chosen: my firstborn
  alternatives:
  - my firstborn one
  lexicon: HALOT
  rationale: Construct form with 1cs suffix denotes primogeniture status. 'Firstborn'
    preserves both familial and covenantal significance without over-interpreting
    whether priority is temporal, legal, or honorific.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: 'Proper name retained as transliteration. Here it stands in apposition
    to ''my son, my firstborn'': ''Israel is my firstborn son'' is the most natural
    English representation of the verbless Hebrew clause.'
