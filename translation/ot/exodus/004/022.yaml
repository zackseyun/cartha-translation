theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidance explicitly sets 'the LORD' as the default rendering
    for YHWH. This also preserves continuity with established English Bible convention
    while signaling the covenant name through small-caps style.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Filial metaphor for Israel
  chosen_reading: Israel is my firstborn son
  alternative_readings:
  - Israel is my son, my firstborn
  rationale: The Hebrew sequence permits either a tightly appositional reading ('my
    firstborn son') or a more formally segmented one ('my son, my firstborn'). The
    chosen wording is smoother in modern English while preserving the metaphor and
    covenantal status. The alternative is worth preserving because it more closely
    mirrors the Hebrew word order and emphasis.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension
    rather than resolve it; readable modern English'
