id: EXO.4.27
reference: Exodus 4:27
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶֽל אַהֲרֹ֔ן לֵ֛ךְ לִ/קְרַ֥את מֹשֶׁ֖ה הַ/מִּדְבָּ֑רָ/ה
    וַ/יֵּ֗לֶךְ וַֽ/יִּפְגְּשֵׁ֛/הוּ בְּ/הַ֥ר הָ/אֱלֹהִ֖ים וַ/יִּשַּׁק לֽ/וֹ־־׃
translation:
  text: And the LORD said to Aaron, “Go to meet Moses in the wilderness.” So he went
    and met him at the mountain of God and kissed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Go into the wilderness to meet Moses.” The Hebrew can be construed to
      emphasize movement toward the wilderness as the place of meeting.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD,' following
    Jewish reverence tradition and the Septuagintal pattern.
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Leave
  - Set out
  lexicon: HALOT
  rationale: Imperative of הלך is naturally rendered 'Go' in direct speech; concise
    and idiomatic in English.
- source_word: לִקְרַאת
  chosen: to meet
  alternatives:
  - to encounter
  - to go to meet
  lexicon: HALOT
  rationale: 'The infinitive construct with ל expresses purpose: Aaron is commanded
    to go for the purpose of meeting Moses. ''To meet'' is idiomatic and fits the
    context.'
- source_word: הַמִּדְבָּרָה
  chosen: in the wilderness
  alternatives:
  - into the wilderness
  - to the wilderness
  lexicon: HALOT
  rationale: The directional ending on 'wilderness' can suggest motion toward it,
    but in English the command 'Go to meet Moses in the wilderness' best captures
    the sense without awkwardness. The location of Moses is in the wilderness, and
    the meeting occurs there.
- source_word: וַיִּפְגְּשֵׁהוּ
  chosen: met him
  alternatives:
  - encountered him
  lexicon: HALOT
  rationale: פגשׁ commonly means 'meet/encounter.' In this narrative context 'met
    him' is the most natural English rendering and coheres with the prior command.
- source_word: בְּהַר הָאֱלֹהִים
  chosen: at the mountain of God
  alternatives:
  - at God's mountain
  - on the mountain of God
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the Hebrew construct phrase. 'At'
    fits the meeting context better than 'on' in English, without denying the broader
    mountainous setting.
- source_word: וַיִּשַּׁק לוֹ
  chosen: and kissed him
  alternatives:
  - and kissed him in greeting
  lexicon: HALOT
  rationale: נשׁק means 'kiss.' The indirect object pronoun is best rendered directly
    in English as 'kissed him.' No explanatory expansion is needed in the main text.
