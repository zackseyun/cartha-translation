theological_decisions:
- issue: Divine agency in human abilities and disabilities
  chosen_reading: The verse is translated straightforwardly as affirming the LORD's
    sovereign agency over speech, muteness, hearing, deafness, sight, and blindness,
    without softening the claim.
  alternative_readings:
  - A permissive reading ('who allows one to be mute...')
  rationale: The Hebrew verbs are active and rhetorical; the translation should preserve
    the text's theological tension rather than resolve it by weakening divine agency.
    No doctrinally motivated paraphrase is introduced.
  doctrine_reference: Translation philosophy §3
- issue: Generic אָדָם
  chosen_reading: man
  alternative_readings:
  - humankind
  rationale: The Hebrew is grammatically singular masculine with representative force.
    Per doctrine, gender-accurate rendering is preferred over flattening to gender-neutral
    language, though the generic sense is acknowledged.
  doctrine_reference: Translation philosophy §4; Contested terms table for אָדָם
