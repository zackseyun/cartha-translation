id: EXO.4.11
reference: Exodus 4:11
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֵלָ֗י/ו מִ֣י שָׂ֣ם פֶּה֮ לָֽ/אָדָם֒ א֚וֹ מִֽי יָשׂ֣וּם אִלֵּ֔ם א֣וֹ חֵרֵ֔שׁ א֥וֹ פִקֵּ֖חַ א֣וֹ עִוֵּ֑ר הֲ/לֹ֥א אָנֹכִ֖י יְהוָֽה־׃
translation:
  text: And Yahweh said to him, “Who has put a mouth on man? Or who makes one mute, or deaf, or seeing, or blind? Is it not I, Yahweh?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “humankind.” Hebrew adam is a generic singular here, referring to humanity in general.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  rationale: Standard narrative wayyiqtol introducing direct speech; 'said' is the most natural modern English rendering.
- source_word: אֵלָיו
  chosen: to him
  rationale: Direct object of speech addressed to Moses; straightforward pronominal rendering.
- source_word: מִי
  chosen: Who
  rationale: Interrogative pronoun introducing the rhetorical questions.
- source_word: שָׂם
  chosen: has put
  alternatives:
  - has placed
  - made
  lexicon: HALOT
  rationale: The verb שׂים commonly means 'put/place/set.' 'Has put' preserves the concrete idiom 'put a mouth on man' better than smoothing to 'made,' while remaining intelligible in English.
- source_word: פֶּה
  chosen: a mouth
  lexicon: HALOT
  rationale: Literal rendering of the body part; the singular is retained.
- source_word: לָאָדָם
  chosen: on man
  alternatives:
  - for man
  - on humankind
  lexicon: HALOT
  rationale: אָדָם here is generic rather than a proper name. Per doctrine, gender-accurate rendering is preferred; 'man' preserves the representative/generic force of the Hebrew. 'On man' matches the concrete idiom with שׂים.
- source_word: אוֹ
  chosen: or
  rationale: Simple disjunctive conjunction repeated through the list.
- source_word: יָשׂוּם
  chosen: makes
  alternatives:
  - puts
  - appoints
  lexicon: HALOT
  rationale: In this second clause, English idiom favors 'makes one mute/deaf/etc.' over a more wooden 'puts.' This is a documented contextual variation of the same Hebrew root שׂים.
- source_word: אִלֵּם
  chosen: mute
  alternatives:
  - speechless
  - unable to speak
  - dumb
  lexicon: HALOT
  rationale: '''Mute'' is the clearest modern, non-pejorative term for inability to speak. ''Dumb'' is avoided in contemporary English because it is misleading and potentially pejorative.'
- source_word: חֵרֵשׁ
  chosen: deaf
  lexicon: HALOT
  rationale: Standard rendering for the adjective describing inability to hear.
- source_word: פִקֵּחַ
  chosen: sighted
  alternatives:
  - seeing
  - one who sees
  lexicon: HALOT
  rationale: Chosen to balance the surrounding adjectives ('mute,' 'deaf,' 'blind') with a concise adjectival form. 'Sighted' is natural English and preserves the contrast with 'blind.'
- source_word: עִוֵּר
  chosen: blind
  lexicon: HALOT
  rationale: Standard rendering for lack of sight.
- source_word: הֲלֹא
  chosen: Is it not
  alternatives:
  - Is it not so that
  - Have not I
  lexicon: HALOT
  rationale: Renders the rhetorical particle naturally in English while preserving the force of divine self-assertion.
- source_word: אָנֹכִי
  chosen: I
  alternatives:
  - I myself
  rationale: The independent pronoun adds emphasis; in English the emphasis is sufficiently conveyed by the rhetorical question and word order without overtranslation.
