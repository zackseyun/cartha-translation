id: EXO.4.20
reference: Exodus 4:20
source:
  edition: WLC
  text: וַ/יִּקַּ֨ח מֹשֶׁ֜ה אֶת אִשְׁתּ֣/וֹ וְ/אֶת בָּנָ֗י/ו וַ/יַּרְכִּבֵ/ם֙ עַֽל
    הַ/חֲמֹ֔ר וַ/יָּ֖שָׁב אַ֣רְצָ/ה מִצְרָ֑יִם וַ/יִּקַּ֥ח מֹשֶׁ֛ה אֶת מַטֵּ֥ה הָ/אֱלֹהִ֖ים
    בְּ/יָדֽ/וֹ־־־־׃
translation:
  text: Then Moses took his wife and his sons, set them on the donkey, and returned
    to the land of Egypt. And Moses took the staff of God in his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'made them ride on the donkey.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the rod of God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: Then Moses took
  alternatives:
  - And Moses took
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence; 'took' is the plain sense of לקח.
- source_word: אִשְׁתּוֹ
  chosen: his wife
  lexicon: HALOT
  rationale: Standard possessive rendering of אשה with 3ms suffix; no contextual reason
    to expand to the proper name Zipporah here.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural 'sons,' not the more general
    'children'; this follows the gender-accurate principle.
- source_word: וַיַּרְכִּבֵם
  chosen: set them on
  alternatives:
  - made them ride on
  - mounted them on
  lexicon: HALOT
  rationale: The Hiphil of רכב means to cause to ride/mount. 'Set them on' is idiomatic
    modern English and preserves the causative sense without awkwardness.
- source_word: הַחֲמֹר
  chosen: the donkey
  alternatives:
  - a donkey
  - the ass
  lexicon: HALOT
  rationale: The noun is definite with article, so 'the donkey' is the most direct
    rendering. 'Ass' is archaic in modern English.
- source_word: וַיָּשָׁב
  chosen: returned
  alternatives:
  - went back
  lexicon: HALOT
  rationale: שוב in this context denotes returning. 'Returned' is concise and natural.
- source_word: אַרְצָה מִצְרָיִם
  chosen: to the land of Egypt
  alternatives:
  - toward Egypt
  - to Egypt
  lexicon: HALOT
  rationale: The directional ending on אֶרֶץ plus the proper noun yields 'to the land
    of Egypt.' Retaining 'land' reflects the Hebrew expression more fully than the
    simpler 'to Egypt.'
- source_word: מַטֵּה הָאֱלֹהִים
  chosen: the staff of God
  alternatives:
  - the rod of God
  lexicon: HALOT
  rationale: מַטֶּה can be 'staff' or 'rod.' 'Staff' is more natural contemporary
    English and fits the object Moses carries as a sign-bearing instrument. The genitive
    'of God' is preserved literally.
- source_word: בְּיָדוֹ
  chosen: in his hand
  alternatives:
  - with him in his hand
  lexicon: HALOT
  rationale: A straightforward rendering of the prepositional phrase, preserving the
    concrete image of Moses carrying the staff.
