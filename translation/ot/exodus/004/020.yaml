theological_decisions:
- issue: Rendering of הָאֱלֹהִים in the phrase מַטֵּה הָאֱלֹהִים
  chosen_reading: God
  alternative_readings:
  - the divine staff
  rationale: Although אֱלֹהִים can occasionally function in broader semantic ways,
    here the phrase refers specifically to the staff associated with God's commission
    and signs. 'God' is the plain and theologically appropriate rendering.
