id: EXO.4.10
reference: Exodus 4:10
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר מֹשֶׁ֣ה אֶל יְהוָה֮ בִּ֣י אֲדֹנָ/י֒ לֹא֩ אִ֨ישׁ דְּבָרִ֜ים אָנֹ֗כִי גַּ֤ם מִ/תְּמוֹל֙ גַּ֣ם מִ/שִּׁלְשֹׁ֔ם גַּ֛ם מֵ/אָ֥ז דַּבֶּרְ/ךָ אֶל עַבְדֶּ֑/ךָ כִּ֧י כְבַד פֶּ֛ה וּ/כְבַ֥ד לָשׁ֖וֹן אָנֹֽכִי־־־׃
translation:
  text: Then Moses said to Yahweh, “Please, Lord, I am not a man of words, neither yesterday nor the day before, nor since you have spoken to your servant; for I am heavy of mouth and heavy of tongue.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, “I am not eloquent.” The Hebrew reads “I am not a man of words.”
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: “heavy of mouth and heavy of tongue,” a metaphor for difficulty in speaking; it may imply lack of eloquence or some speech impediment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בִּי אֲדֹנָי
  chosen: Please, Lord
  alternatives:
  - Pardon me, Lord
  - Oh, Lord
  lexicon: HALOT
  rationale: בִּי functions as a polite interjection of entreaty rather than a literal 'in me.' 'Please, Lord' captures Moses' deferential appeal in natural English while preserving the address אֲדֹנָי as 'Lord'.
- source_word: לֹא אִישׁ דְּבָרִים אָנֹכִי
  chosen: I am not a man of words
  alternatives:
  - I am not eloquent
  - I am not a man of speech
  lexicon: HALOT
  rationale: The Hebrew is literally 'not a man of words am I.' This idiom refers to speaking ability, but the more literal 'a man of words' preserves the metaphor and Moses' self-description better than the interpretive 'eloquent.'
- source_word: גַּם מִתְּמוֹל גַּם מִשִּׁלְשֹׁם
  chosen: neither yesterday nor the day before
  alternatives:
  - not yesterday or the day before yesterday
  - neither formerly nor recently
  lexicon: HALOT
  rationale: The paired temporal idiom emphasizes that Moses has not recently been a fluent speaker. 'Yesterday nor the day before' is idiomatic English that reflects the Hebrew sequence without over-literal awkwardness.
- source_word: גַּם מֵאָז דַּבֶּרְךָ אֶל עַבְדֶּךָ
  chosen: nor since you have spoken to your servant
  alternatives:
  - nor since you began speaking to your servant
  - nor even since you spoke to your servant
  lexicon: HALOT
  rationale: 'מֵאָז marks time from a prior point: ''since then/since.'' The infinitive/verb phrase indicates God''s speaking to Moses. ''Since you have spoken'' communicates the continuing timeframe from God''s recent address until now.'
- source_word: עַבְדֶּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, here it is a deferential self-reference in direct address to God rather than emphasizing bonded status. 'Your servant' is the most natural and contextually appropriate rendering.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: כִּי here introduces the reason for Moses' claim about his unsuitability. 'For' preserves the explanatory force in a concise literary register.
- source_word: כְבַד פֶּה
  chosen: heavy of mouth
  alternatives:
  - slow of speech
  - awkward in speech
  lexicon: HALOT
  rationale: The adjective כבד ('heavy') is metaphorical here. Retaining 'heavy of mouth' preserves the Hebrew imagery and avoids prematurely diagnosing the exact nature of Moses' difficulty.
- source_word: וּכְבַד לָשׁוֹן
  chosen: and heavy of tongue
  alternatives:
  - and slow of tongue
  - and awkward of tongue
  lexicon: HALOT
  rationale: Parallel to 'heavy of mouth,' this phrase likely intensifies Moses' claim of speech difficulty. The literal rendering preserves the poetic parallelism and leaves the precise impairment open, as in the Hebrew.
