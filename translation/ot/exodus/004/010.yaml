theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to interpret Moses' speech problem explicitly
  chosen_reading: Preserve the metaphorical description 'heavy of mouth and heavy of tongue'
  alternative_readings:
  - Render interpretively as 'not eloquent' or 'slow of speech and tongue'
  rationale: The Hebrew describes Moses' condition metaphorically and does not specify whether the issue is lack of eloquence, lack of confidence, or a physical speech impediment. Preserving the metaphor maintains the text's ambiguity rather than resolving it.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
