id: EXO.4.3
reference: Exodus 4:3
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ הַשְׁלִיכֵ֣/הוּ אַ֔רְצָ/ה וַ/יַּשְׁלִיכֵ֥/הוּ אַ֖רְצָ/ה וַ/יְהִ֣י
    לְ/נָחָ֑שׁ וַ/יָּ֥נָס מֹשֶׁ֖ה מִ/פָּנָֽי/ו׃
translation:
  text: And he said, “Throw it on the ground.” So he threw it on the ground, and it
    became a snake, and Moses fled from before it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'from before it' (or 'from before him'), an idiom meaning
      'away from it' or 'from its presence.'
    reason: lexical_alternative
  - marker: b
    text: Or 'serpent' for 'snake.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative sequencing; 'And he said' preserves the
    Hebrew flow without overinterpreting temporal nuance.
- source_word: הַשְׁלִיכֵהוּ
  chosen: Throw it
  alternatives:
  - Cast it
  - Throw it down
  lexicon: HALOT
  rationale: Imperative of שלך with 3ms suffix referring to the staff from the prior
    verse. 'Throw it' is natural modern English; 'cast' is more traditional but less
    current. 'Down' is implied by the following directional phrase.
- source_word: אַרְצָה
  chosen: on the ground
  alternatives:
  - to the ground
  - earthward
  lexicon: HALOT
  rationale: Directional he on 'earth/land' here idiomatically means toward/onto the
    ground. 'On the ground' fits the action and reads naturally in English.
- source_word: וַיַּשְׁלִיכֵהוּ
  chosen: So he threw it
  alternatives:
  - And he threw it
  - So he cast it
  lexicon: HALOT
  rationale: Narrative consequence after the command is well conveyed by 'So he threw
    it.' The pronoun again refers to the staff.
- source_word: וַיְהִי לְנָחָשׁ
  chosen: and it became a snake
  alternatives:
  - and it became a serpent
  lexicon: HALOT
  rationale: נָחָשׁ denotes a snake/serpent. 'Snake' is the clearer modern English
    choice; 'serpent' is more traditional/literary but not required by the Hebrew
    here.
- source_word: וַיָּנָס
  chosen: and Moses fled
  alternatives:
  - and Moses ran away
  lexicon: HALOT
  rationale: The verb means to flee. 'Fled' preserves the force and gravity better
    than the more colloquial 'ran away.'
- source_word: מִפָּנָיו
  chosen: from before it
  alternatives:
  - from it
  - from before him
  lexicon: HALOT
  rationale: Literally 'from before its face/his face.' The suffix most naturally
    refers to the snake, not a person. 'From before it' preserves the Hebrew idiom
    more transparently, though English readers may understand simply 'from it.'
