theological_decisions:
- issue: Whether to resolve the ambiguity of 'his feet' as a euphemism or identify
    the referent explicitly as Moses or the son
  chosen_reading: Retain the literal wording 'his feet' without specifying beyond
    the Hebrew text
  alternative_readings:
  - his genitals
  - Moses' feet/genitals
  - the son's feet/genitals
  rationale: The verse is famously ambiguous. In keeping with the translation philosophy
    of preserving theological and interpretive tension rather than resolving it, the
    main text keeps the literal expression and leaves the referent unspecified, while
    a footnote preserves the major interpretive alternative.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
