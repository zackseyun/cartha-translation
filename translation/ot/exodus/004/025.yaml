id: EXO.4.25
reference: Exodus 4:25
source:
  edition: WLC
  text: וַ/תִּקַּ֨ח צִפֹּרָ֜ה צֹ֗ר וַ/תִּכְרֹת֙ אֶת עָרְלַ֣ת בְּנָ֔/הּ וַ/תַּגַּ֖ע
    לְ/רַגְלָ֑י/ו וַ/תֹּ֕אמֶר כִּ֧י חֲתַן דָּמִ֛ים אַתָּ֖ה לִֽ/י־־׃
translation:
  text: Then Zipporah took a flint and cut off her son's foreskin and touched his
    feet with it, and she said, “Surely you are a bridegroom of blood to me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'his feet.' 'Feet' may be a euphemism for genitals, and the pronoun
      may refer to Moses or to her son.
    reason: lexical_alternative
lexical_decisions:
- source_word: צֹר
  chosen: flint
  alternatives:
  - sharp stone
  lexicon: HALOT
  rationale: The noun denotes flint/stone used as a cutting implement. 'Flint' is
    the most natural concise English rendering and fits the circumcision context.
- source_word: עָרְלַת בְּנָהּ
  chosen: her son's foreskin
  alternatives:
  - the foreskin of her son
  lexicon: HALOT
  rationale: A direct, anatomically precise rendering of the construct phrase; no
    euphemizing beyond normal English style.
- source_word: וַתַּגַּע
  chosen: touched
  alternatives:
  - caused to touch
  - put
  - laid
  lexicon: HALOT
  rationale: The verb נגע normally means 'touch, reach, strike.' 'Touched' preserves
    the verbal simplicity and leaves the exact manner of contact unspecified.
- source_word: לְרַגְלָיו
  chosen: his feet
  alternatives:
  - his legs
  - his genitals
  lexicon: HALOT
  rationale: The plain lexical sense is 'his feet.' Because 'feet' can function as
    a euphemism in Hebrew, the alternative is preserved in a footnote rather than
    imported into the main text. The pronoun's referent is also debated, but the Hebrew
    itself simply reads 'his feet.'
- source_word: כִּי
  chosen: Surely
  alternatives:
  - for
  - indeed
  - 'yes'
  lexicon: HALOT
  rationale: Here כִּי introduces Zipporah's exclamation. 'Surely' captures the emphatic/exclamatory
    force better than a wooden 'for' in modern English.
- source_word: חֲתַן דָּמִים
  chosen: a bridegroom of blood
  alternatives:
  - a blood-bridegroom
  - a relative by marriage of blood
  lexicon: HALOT
  rationale: This is an unusual and difficult expression. 'Bridegroom of blood' preserves
    the Hebrew imagery and ambiguity more transparently than smoothing it into an
    interpretive paraphrase.
- source_word: לִי
  chosen: to me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The preposition marks personal relation. 'To me' is idiomatic with the
    retained nominal expression 'a bridegroom of blood.'
