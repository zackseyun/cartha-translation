id: EXO.4.2
reference: Exodus 4:2
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר אֵלָ֛י/ו יְהוָ֖ה מ/זה בְ/יָדֶ֑/ךָ וַ/יֹּ֖אמֶר מַטֶּֽה׃
translation:
  text: And Yahweh said to him, “What is that in your hand?” And he said, “A staff.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “A rod.” The Hebrew מַטֶּה can refer to a staff, rod, or stick depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֹּאמֶר ... וַיֹּאמֶר
  chosen: said ... said
  alternatives:
  - spoke ... said
  - asked ... answered
  lexicon: HALOT
  rationale: The verb אמר is the standard verb 'to say.' Although the first instance functions as a question and the second as a reply, rendering both as 'said' preserves the Hebrew repetition while remaining natural in English.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - unto him
  lexicon: HALOT
  rationale: The preposition plus pronominal suffix straightforwardly means 'to him.' 'Unto' would be unnecessarily archaic.
- source_word: מַה־זֶּה / מִזֶּה
  chosen: What is that
  alternatives:
  - What is this
  - What is this thing
  lexicon: HALOT
  rationale: The interrogative plus demonstrative asks identification of an object. 'What is that' fits the deictic sense naturally in English in this dialogue, especially since the object is in Moses' hand and being pointed out.
- source_word: בְּיָדֶךָ
  chosen: in your hand
  alternatives:
  - in your possession
  - at your hand
  lexicon: HALOT
  rationale: The phrase is literal and idiomatic here, referring to the physical object Moses is holding.
- source_word: מַטֶּה
  chosen: A staff
  alternatives:
  - A rod
  - A stick
  lexicon: HALOT
  rationale: מַטֶּה commonly denotes a staff or rod. 'Staff' is the most natural modern English choice for the object Moses carries, while 'rod' is a viable traditional alternative. The indefinite article is supplied naturally in English dialogue.
