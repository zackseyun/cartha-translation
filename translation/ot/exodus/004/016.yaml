theological_decisions:
- issue: Whether לֵאלֹהִים should be rendered in a way that could imply Moses is literally
    deity
  chosen_reading: as God to him
  alternative_readings:
  - God to him
  - like God to him
  rationale: 'The context is functional and representative: Moses receives God''s
    words and conveys them to Aaron, who then speaks to the people. Rendering the
    phrase ''as God to him'' preserves the strong metaphor while avoiding a misleading
    ontological claim about Moses. This maintains theological precision without flattening
    the text.'
  doctrine_reference: Translation philosophy §3; Affirmations (historic ecumenical
    orthodoxy)
