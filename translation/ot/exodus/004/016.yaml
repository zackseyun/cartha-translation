id: EXO.4.16
reference: Exodus 4:16
source:
  edition: WLC
  text: וְ/דִבֶּר ה֥וּא לְ/ךָ֖ אֶל הָ/עָ֑ם וְ/הָ֤יָה הוּא֙ יִֽהְיֶה לְּ/ךָ֣ לְ/פֶ֔ה
    וְ/אַתָּ֖ה תִּֽהְיֶה לּ֥/וֹ לֵֽ/אלֹהִֽים־־־־׃
translation:
  text: He will speak to the people for you, and he will be as a mouth for you, and
    you will be as God to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he will be your mouth.' The Hebrew literally uses 'mouth' as a metaphor
      for a spokesperson.
    reason: lexical_alternative
  - marker: b
    text: Or, 'you will be God to him' or 'like God to him.' The sense is that Moses
      will stand in a God-given authoritative, representative role toward Aaron.
    reason: alternative_reading
lexical_decisions:
- source_word: וְדִבֶּר
  chosen: will speak
  alternatives:
  - shall speak
  - will speak on behalf of
  lexicon: HALOT
  rationale: דבר in the piel commonly means 'speak.' Future sense fits the discourse
    context of God's promise about Aaron's role.
- source_word: לְךָ
  chosen: for you
  alternatives:
  - to you
  - on your behalf
  lexicon: HALOT
  rationale: 'The preposition ל here is best taken in a benefactive/representative
    sense in context: Aaron will speak to the people for Moses, not merely speak to
    Moses.'
- source_word: אֶל הָעָם
  chosen: to the people
  alternatives:
  - to the people-group
  - to the nation
  lexicon: HALOT
  rationale: עָם here refers to the people of Israel in context. 'To the people' is
    the natural English rendering.
- source_word: וְהָיָה הוּא יִהְיֶה לְּךָ לְפֶה
  chosen: he will be as a mouth for you
  alternatives:
  - he will be your mouth
  - he will serve as a mouth for you
  lexicon: HALOT
  rationale: The idiom presents Aaron as Moses' spokesperson. 'As a mouth for you'
    preserves the metaphor while remaining readable. The added 'as' reflects the predicative
    force without over-literal awkwardness.
- source_word: לְפֶה
  chosen: as a mouth
  alternatives:
  - your mouth
  - a spokesman
  lexicon: HALOT
  rationale: פֶּה literally means 'mouth.' Because the verse uses a metaphor parallel
    to 'as God,' retaining 'mouth' preserves the imagery better than replacing it
    with the interpretive gloss 'spokesman' in the main text.
- source_word: וְאַתָּה תִּהְיֶה לּוֹ לֵאלֹהִים
  chosen: and you will be as God to him
  alternatives:
  - and you will be God to him
  - and you will be like God to him
  lexicon: HALOT
  rationale: אֱלֹהִים can denote God or gods, but here the singular relational sense
    in context is that Moses will stand in a God-like authoritative role toward Aaron
    as the recipient of divine instruction. 'As God to him' preserves the comparison
    and avoids implying Moses' ontological deity.
- source_word: לֵאלֹהִים
  chosen: as God
  alternatives:
  - God
  - like God
  lexicon: HALOT
  rationale: Given the broader context (cf. Exod 4:15; 7:1), the phrase describes
    representative authority and mediation. The English 'as God' best communicates
    role/function while preserving the Hebrew's theological weight.
