id: EXO.4.23
reference: Exodus 4:23
source:
  edition: WLC
  text: וָ/אֹמַ֣ר אֵלֶ֗י/ךָ שַׁלַּ֤ח אֶת בְּנִ/י֙ וְ/יַֽעַבְדֵ֔/נִי וַ/תְּמָאֵ֖ן לְ/שַׁלְּח֑/וֹ
    הִנֵּה֙ אָנֹכִ֣י הֹרֵ֔ג אֶת בִּנְ/ךָ֖ בְּכֹרֶֽ/ךָ־־׃
translation:
  text: And I said to you, ‘Send out my son so that he may serve me,’ but you refused
    to send him out. Look, I am about to kill your son, your firstborn.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let him go' / 'release him' for 'send him out' (Hebrew שׁלח), a common
      Exodus expression for freeing Israel.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''will kill''; the Hebrew participle with ''Look'' can express imminent
      future action: ''I am about to kill.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  chosen: And I said
  alternatives:
  - Then I said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces the quoted divine speech in sequence. 'And
    I said' preserves the narrative linkage without overinterpreting temporal nuance.
- source_word: אֵלֶיךָ
  chosen: to you
  lexicon: HALOT
  rationale: Direct second masculine singular address to Pharaoh; simple dative rendering
    is most natural.
- source_word: שַׁלַּח
  chosen: Send out
  alternatives:
  - Let go
  - Release
  lexicon: HALOT
  rationale: Imperative of שלח in the Exodus context often carries the sense of releasing/sending
    away. 'Send out' preserves the verbal imagery and matches the repeated use later
    in the verse.
- source_word: אֶת־בְּנִי
  chosen: my son
  alternatives:
  - my child
  lexicon: HALOT
  rationale: בן with 1cs suffix is singular and here refers corporately to Israel
    as God's son in the immediate context. 'My son' preserves the metaphor and singular
    form.
- source_word: וְיַעַבְדֵנִי
  chosen: so that he may serve me
  alternatives:
  - and he may serve me
  - that he may worship me
  lexicon: HALOT
  rationale: Qal jussive/imperfect of עבד with 1cs suffix expresses purpose after
    the imperative. 'Serve me' is the broad and contextually appropriate rendering;
    'worship me' is too narrow here, though cultic service is included.
- source_word: וַתְּמָאֵן
  chosen: but you refused
  alternatives:
  - and you refused
  lexicon: HALOT
  rationale: מאן denotes refusal. Rendering the conjunction as 'but' brings out the
    adversative force in English between command and refusal.
- source_word: לְשַׁלְּחוֹ
  chosen: to send him out
  alternatives:
  - to let him go
  - to release him
  lexicon: HALOT
  rationale: Infinitive construct of שלח with 3ms suffix resumes the earlier command.
    'Send him out' keeps lexical consistency with שַׁלַּח while preserving the singular
    pronoun tied to 'my son'.
- source_word: הִנֵּה
  chosen: Look,
  alternatives:
  - Behold,
  - See,
  lexicon: HALOT
  rationale: Deictic particle marking solemn announcement. 'Look' is readable modern
    English and retains the force without archaic tone.
- source_word: אָנֹכִי
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: Independent pronoun adds emphasis to the participial clause. English
    can convey this adequately with explicit subject 'I'; stronger reflexive emphasis
    is possible but not required.
- source_word: הֹרֵג
  chosen: am about to kill
  alternatives:
  - am killing
  - will kill
  lexicon: HALOT
  rationale: The participle after הִנֵּה + pronoun often conveys imminent future action.
    'Am about to kill' best reflects the impending judgment announced here.
- source_word: אֶת־בִּנְךָ
  chosen: your son
  lexicon: HALOT
  rationale: Direct object with 2ms suffix; singular mirrors the earlier 'my son'
    and sharpens the son-for-son correspondence.
- source_word: בְּכֹרֶךָ
  chosen: your firstborn
  alternatives:
  - your firstborn son
  lexicon: HALOT
  rationale: בכור with 2ms suffix identifies the son specifically as Pharaoh's firstborn.
    'Your firstborn' is sufficient in English because 'son' has just been stated.
