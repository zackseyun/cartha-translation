theological_decisions:
- issue: Corporate singular 'my son' for Israel
  chosen_reading: Retain the singular filial metaphor as 'my son' rather than pluralizing
    to 'my people' or 'my children.'
  alternative_readings:
  - my people
  - my child Israel
  rationale: The immediate context (v. 22) identifies Israel as God's firstborn son.
    This verse continues that metaphor and sets up a measured correspondence with
    Pharaoh's son. Preserving the singular is both lexically accurate and theologically
    important to the rhetoric of judgment.
- issue: Force of עבד in relation to God
  chosen_reading: Render as 'serve me' in the main text.
  alternative_readings:
  - worship me
  rationale: The term can include cultic worship, but in Exodus it often encompasses
    covenantal service more broadly. 'Serve me' preserves the semantic range and avoids
    narrowing the text to liturgical action alone.
