id: EXO.4.9
reference: Exodus 4:9
source:
  edition: WLC
  text: וְ/הָיָ֡ה אִם לֹ֣א יַאֲמִ֡ינוּ גַּם֩ לִ/שְׁנֵ֨י הָ/אֹת֜וֹת הָ/אֵ֗לֶּה וְ/לֹ֤א
    יִשְׁמְעוּ/ן֙ לְ/קֹלֶ֔/ךָ וְ/לָקַחְתָּ֙ מִ/מֵּימֵ֣י הַ/יְאֹ֔ר וְ/שָׁפַכְתָּ֖ הַ/יַּבָּשָׁ֑ה
    וְ/הָי֤וּ הַ/מַּ֨יִם֙ אֲשֶׁ֣ר תִּקַּ֣ח מִן הַ/יְאֹ֔ר וְ/הָי֥וּ לְ/דָ֖ם בַּ/יַּבָּֽשֶׁת־־׃
translation:
  text: And if they do not believe even these two signs and do not listen to your
    voice, then you shall take some of the water of the Nile and pour it on the dry
    ground, and the water that you take from the Nile will become blood on the dry
    ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not heed your voice.' The Hebrew idiom is literally 'do not listen
      to your voice.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will turn to blood.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה אִם
  chosen: And if
  alternatives:
  - And it shall be, if
  - Now if
  lexicon: HALOT
  rationale: The clause introducer וְהָיָה with אִם functions idiomatically to set
    up a conditional scenario. 'And if' preserves the Hebrew flow without woodenly
    retaining 'it shall be.'
- source_word: יַאֲמִינוּ
  chosen: do not believe
  alternatives:
  - do not trust
  - do not have faith
  lexicon: HALOT
  rationale: The Hiphil of אמן here means to believe or trust the signs' evidentiary
    force. 'Believe' is the most natural English rendering in this narrative context.
- source_word: לִשְׁנֵי הָאֹתוֹת הָאֵלֶּה
  chosen: even these two signs
  alternatives:
  - these two signs
  - both of these signs
  lexicon: HALOT
  rationale: 'The phrase refers specifically to the first two miraculous signs just
    given. Including ''even'' reflects גַּם, conveying escalation: if they will not
    believe even these signs.'
- source_word: יִשְׁמְעוּן לְקֹלֶךָ
  chosen: do not listen to your voice
  alternatives:
  - do not heed your voice
  - do not listen to you
  lexicon: HALOT
  rationale: שׁמע with לְקוֹל commonly means to listen to or heed someone's voice.
    'Listen to your voice' is slightly more formal and preserves the Hebrew expression;
    'heed' is possible but less natural for modern readers.
- source_word: מִמֵּימֵי הַיְאֹר
  chosen: some of the water of the Nile
  alternatives:
  - from the waters of the Nile
  - some water from the Nile
  lexicon: HALOT
  rationale: The partitive sense of מִן with 'waters' is best captured by 'some of
    the water.' 'Nile' is the standard rendering of יְאֹר in Exodus.
- source_word: הַיַּבָּשָׁה / בַּיַּבָּשֶׁת
  chosen: the dry ground
  alternatives:
  - the dry land
  - the ground
  lexicon: HALOT
  rationale: The term denotes dry land/ground in contrast to water. 'Dry ground' fits
    the immediate action of pouring water onto land and preserves the repeated wording
    in the verse.
- source_word: וְשָׁפַכְתָּ
  chosen: pour it
  alternatives:
  - spill it out
  - pour out
  lexicon: HALOT
  rationale: '''Pour'' is the straightforward rendering of שפך here. The object is
    implied from the previous clause and naturally supplied in English as ''it.'''
- source_word: וְהָיוּ ... לְדָם
  chosen: will become blood
  alternatives:
  - will turn to blood
  - will be blood
  lexicon: HALOT
  rationale: The construction with היה + ל expresses transformation or result. 'Will
    become blood' is slightly more formal and direct than the idiomatic 'turn to blood,'
    while still clear.
- source_word: דָם
  chosen: blood
  lexicon: HALOT
  rationale: The noun plainly means 'blood.' No contextual reason warrants softening
    or metaphorizing it.
