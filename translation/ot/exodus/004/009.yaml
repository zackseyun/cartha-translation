theological_decisions:
- issue: Nature of the sign involving Nile water becoming blood
  chosen_reading: 'Render as a direct miraculous transformation: ''will become blood.'''
  alternative_readings:
  - will look like blood
  - will become blood-red
  rationale: The Hebrew wording straightforwardly states transformation (היה + לדם)
    without qualifiers. The translation should not weaken the miraculous claim or
    import a naturalistic explanation not present in the text.
  doctrine_reference: Translation philosophy §1, §3
