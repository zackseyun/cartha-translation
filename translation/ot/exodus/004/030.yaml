- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name. Following the project's stated
    default, it is rendered 'the LORD' in continuity with Jewish reverence practice
    and the traditional small-caps convention in English Bibles.
