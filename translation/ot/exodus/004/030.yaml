id: EXO.4.30
reference: Exodus 4:30
source:
  edition: WLC
  text: וַ/יְדַבֵּ֣ר אַהֲרֹ֔ן אֵ֚ת כָּל הַ/דְּבָרִ֔ים אֲשֶׁר דִּבֶּ֥ר יְהוָ֖ה אֶל
    מֹשֶׁ֑ה וַ/יַּ֥עַשׂ הָ/אֹתֹ֖ת לְ/עֵינֵ֥י הָ/עָֽם־־־׃
translation:
  text: Aaron spoke all the words that the LORD had spoken to Moses, and he performed
    the signs before the eyes of the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "in the sight of the people."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The verb דבר in the piel commonly means 'speak.' 'Spoke' fits the narrative
    style and pairs naturally with 'all the words.'
- source_word: אֵת כָּל הַדְּבָרִים
  chosen: all the words
  alternatives:
  - everything
  - all these words
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the concrete wording of the Hebrew
    rather than collapsing it into the more idiomatic but less explicit 'everything.'
- source_word: אֲשֶׁר דִּבֶּר יְהוָה אֶל מֹשֶׁה
  chosen: that the LORD had spoken to Moses
  alternatives:
  - which the LORD spoke to Moses
  lexicon: HALOT
  rationale: The relative clause is rendered naturally in English with past perfect
    to reflect prior action in the narrative. יְהוָה follows the doctrinal default
    'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, the covenant name is rendered
    'the LORD' rather than transliterated forms.
- source_word: וַיַּעַשׂ
  chosen: performed
  alternatives:
  - did
  - worked
  lexicon: HALOT
  rationale: עשה is broad ('do/make'), but with אותות in this context 'performed'
    communicates the carrying out of miraculous signs in idiomatic English without
    adding content.
- source_word: הָאֹתֹת
  chosen: the signs
  alternatives:
  - the miraculous signs
  - the tokens
  lexicon: HALOT
  rationale: אות here refers to the authenticating signs given in the surrounding
    context. 'The signs' is sufficiently clear and avoids over-interpretive expansion,
    though the miraculous sense is contextually present.
- source_word: לְעֵינֵי הָעָם
  chosen: before the eyes of the people
  alternatives:
  - in the sight of the people
  - before the people
  lexicon: HALOT
  rationale: This preserves the Hebrew idiom's vividness more closely than the flatter
    'before the people,' while remaining natural English.
