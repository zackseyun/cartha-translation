theological_decisions:
- issue: Anthropomorphic expression for divine aid in speech
  chosen_reading: Retain the concrete wording 'I will be with your mouth and with
    his mouth' in the main text.
  alternative_readings:
  - I will help you speak and help him speak
  rationale: The Hebrew uses bodily imagery to express God's direct presence and enablement.
    Preserving the anthropomorphic phrasing maintains the text's texture and avoids
    interpretive flattening, while still being understandable in English.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Number of the final pronoun and verb
  chosen_reading: Render final 'you' in idiomatic English while understanding it as
    plural (Moses and Aaron).
  alternative_readings:
  - what both of you shall do
  - what you all shall do
  rationale: Hebrew clearly shifts to plural in אֶתְכֶם and תַּעֲשׂוּן. Standard English
    'you' can represent the plural without awkwardness; the plural sense is preserved
    in the documented decision rather than forced into colloquial wording.
  doctrine_reference: Translation philosophy §6
