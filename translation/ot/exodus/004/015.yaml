id: EXO.4.15
reference: Exodus 4:15
source:
  edition: WLC
  text: וְ/דִבַּרְתָּ֣ אֵלָ֔י/ו וְ/שַׂמְתָּ֥ אֶת הַ/דְּבָרִ֖ים בְּ/פִ֑י/ו וְ/אָנֹכִ֗י
    אֶֽהְיֶ֤ה עִם פִּ֨י/ךָ֙ וְ/עִם פִּ֔י/הוּ וְ/הוֹרֵיתִ֣י אֶתְ/כֶ֔ם אֵ֖ת אֲשֶׁ֥ר
    תַּעֲשֽׂוּ/ן־־־׃
translation:
  text: You shall speak to him and put the words in his mouth, and I will be with
    your mouth and with his mouth, and I will instruct you what you shall do.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'I will be with your mouth and with his mouth.'
    reason: lexical_alternative
  - marker: b
    text: The final 'you' is plural, referring to Moses and Aaron together.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְדִבַּרְתָּ אֵלָיו
  chosen: You shall speak to him
  alternatives:
  - You must speak to him
  - You are to speak to him
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this instructional context functions
    as an imperative/future command. 'Speak to him' is the plain sense of דבר + אל.
- source_word: וְשַׂמְתָּ אֶת־הַדְּבָרִים בְּפִיו
  chosen: and put the words in his mouth
  alternatives:
  - and place the words in his mouth
  - and put these words in his mouth
  lexicon: HALOT
  rationale: שׂים commonly means 'put/place.' Retaining 'the words' reflects the definite
    Hebrew noun. 'In his mouth' preserves the idiom of supplying what Aaron is to
    say, without paraphrasing to 'tell him what to say' in the main text.
- source_word: הַדְּבָרִים
  chosen: the words
  alternatives:
  - these words
  - the message
  lexicon: HALOT
  rationale: The definite plural noun is best represented formally as 'the words.'
    'Message' is possible dynamically but less transparent to the Hebrew wording.
- source_word: וְאָנֹכִי אֶהְיֶה עִם־פִּיךָ וְעִם־פִּיהוּ
  chosen: and I will be with your mouth and with his mouth
  alternatives:
  - and I will be with you as you speak and with him as he speaks
  - and I will be with your speech and his speech
  lexicon: HALOT
  rationale: The Hebrew literally says 'with your mouth and with his mouth.' Keeping
    the concrete expression preserves the imagery and divine enablement in speech.
    More idiomatic expansions are possible but are interpretive.
- source_word: וְהוֹרֵיתִי אֶתְכֶם
  chosen: and I will instruct you
  alternatives:
  - and I will teach you
  - and I will direct you
  lexicon: HALOT
  rationale: ירה in Hiphil often means 'teach/instruct.' 'Instruct' fits the context
    of divine guidance for Moses and Aaron. Although אֶתְכֶם is plural, English 'you'
    naturally covers the plural here; the plural force is clarified by context and
    can be noted in rationale.
- source_word: אֵת אֲשֶׁר תַּעֲשׂוּן
  chosen: what you shall do
  alternatives:
  - what you must do
  - that which you shall do
  lexicon: HALOT
  rationale: The relative construction means 'what/that which.' The 2mp verb indicates
    Moses and Aaron together. 'Shall do' preserves the future/instructional sense
    without overstrengthening to obligation beyond the context.
