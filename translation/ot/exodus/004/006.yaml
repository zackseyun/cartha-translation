id: EXO.4.6
reference: Exodus 4:6
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ יְהוָ֨ה ל֜/וֹ ע֗וֹד הָֽבֵא נָ֤א יָֽדְ/ךָ֙ בְּ/חֵיקֶ֔/ךָ וַ/יָּבֵ֥א
    יָד֖/וֹ בְּ/חֵיק֑/וֹ וַ/יּ֣וֹצִאָ֔/הּ וְ/הִנֵּ֥ה יָד֖/וֹ מְצֹרַ֥עַת כַּ/שָּֽׁלֶג־׃
translation:
  text: Then the LORD said to him again, “Please put your hand into your bosom.” So
    he put his hand into his bosom, and when he brought it out, behold, his hand was
    leprous, like snow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'leprous.' The term refers to the condition called צָרַעַת in the
      Old Testament, which may not correspond exactly to modern leprosy (Hansen's
      disease).
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    the traditional small-caps covenantal substitute rather than transliteration.
- source_word: עוֹד
  chosen: again
  alternatives:
  - further
  - still
  lexicon: HALOT
  rationale: In this command sequence, עוֹד marks repetition/addition; 'again' is
    the most natural English fit.
- source_word: הָבֵא
  chosen: put
  alternatives:
  - bring
  - insert
  lexicon: HALOT
  rationale: Though the verb is literally 'bring,' idiomatic English with 'hand' and
    'into your bosom' is 'put your hand into.' This preserves sense without over-literal
    awkwardness.
- source_word: נָא
  chosen: Please
  alternatives:
  - now
  - I pray
  lexicon: HALOT
  rationale: נָא softens the imperative. 'Please' captures the particle's polite/urgent
    nuance in readable modern English.
- source_word: חֵיק
  chosen: bosom
  alternatives:
  - lap
  - fold of garment
  - chest
  lexicon: HALOT
  rationale: The term refers to the fold/front of the garment at the chest where something
    may be tucked. 'Bosom' is the most established and sufficiently precise English
    rendering here, though somewhat traditional.
- source_word: וַיּוֹצִאָהּ
  chosen: when he brought it out
  alternatives:
  - and he brought it out
  - and he took it out
  lexicon: HALOT
  rationale: The suffix refers back to 'hand' (feminine in Hebrew). English requires
    an object pronoun; 'it' is natural. Rendering the clause temporally ('when he
    brought it out') smooths the sequence into idiomatic English while preserving
    the action.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - and behold
  - suddenly
  lexicon: HALOT
  rationale: Marks dramatic presentation of the sign. 'Behold' preserves the deictic
    force and solemnity better than flatter alternatives.
- source_word: מְצֹרַעַת
  chosen: leprous
  alternatives:
  - afflicted with a skin disease
  - diseased
  lexicon: HALOT
  rationale: The adjective denotes being affected with צָרַעַת. 'Leprous' is the conventional
    concise rendering, though the underlying condition in biblical usage may not map
    exactly onto modern Hansen's disease.
- source_word: כַּשָּׁלֶג
  chosen: like snow
  alternatives:
  - as white as snow
  - snow-white
  lexicon: HALOT
  rationale: The Hebrew comparison is simply 'like snow.' English readers will infer
    the whiteness from context; this avoids adding words not explicit in the text.
