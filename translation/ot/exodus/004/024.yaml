theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse explicitly names Israel's covenant God as the acting subject.
    Following the project's doctrine, the tetragrammaton is rendered 'the LORD' rather
    than transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Referent of the pronoun suffixes ('him')
  chosen_reading: Retain the Hebrew ambiguity with 'him' in the main text
  alternative_readings:
  - Moses
  - Moses' son
  rationale: The Hebrew text leaves the antecedent implicit. Although many interpreters
    take the referent to be Moses, the verse itself does not specify it. Preserving
    'him' maintains the textual ambiguity rather than resolving it interpretively.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
