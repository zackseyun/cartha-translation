id: EXO.4.24
reference: Exodus 4:24
source:
  edition: WLC
  text: וַ/יְהִ֥י בַ/דֶּ֖רֶךְ בַּ/מָּל֑וֹן וַ/יִּפְגְּשֵׁ֣/הוּ יְהוָ֔ה וַ/יְבַקֵּ֖שׁ הֲמִיתֽ/וֹ׃
translation:
  text: And it happened on the way, at the lodging place, that Yahweh met him and sought to put him to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'him' is not explicitly identified here; it may refer to Moses or, in some interpretations, to his son.
    reason: alternative_reading
  - marker: b
    text: Or 'at the night encampment'; the Hebrew refers to a place of lodging, not necessarily a commercial inn.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new episode. 'And it happened' preserves the Hebrew discourse function without archaic English.
- source_word: בַדֶּרֶךְ
  chosen: on the way
  alternatives:
  - along the way
  - during the journey
  lexicon: HALOT
  rationale: Straightforward locative phrase; 'on the way' is idiomatic and close to the Hebrew.
- source_word: בַמָּלוֹן
  chosen: at the lodging place
  alternatives:
  - at the night encampment
  - at the inn
  lexicon: HALOT
  rationale: מָלוֹן denotes a place of lodging for the night, not necessarily a commercial inn in the modern sense. 'Lodging place' avoids anachronism while remaining natural English.
- source_word: וַיִּפְגְּשֵׁהוּ
  chosen: met him
  alternatives:
  - encountered him
  - confronted him
  lexicon: HALOT
  rationale: The verb פגע can mean meet/encounter, sometimes with hostile force depending on context. 'Met him' preserves the lexical core and lets the following clause supply the threat.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיְבַקֵּשׁ
  chosen: sought
  alternatives:
  - tried
  - intended
  lexicon: HALOT
  rationale: בקש commonly means seek. 'Sought' preserves the verbal nuance and the narrative tension better than a more interpretive gloss.
- source_word: הֲמִיתוֹ
  chosen: to put him to death
  alternatives:
  - to kill him
  - to cause his death
  lexicon: HALOT
  rationale: Hiphil infinitive of מות with 3ms suffix. 'Put him to death' is slightly more formal and weighty than 'kill him,' fitting the gravity of divine action while remaining clear.
