id: EXO.4.7
reference: Exodus 4:7
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר הָשֵׁ֤ב יָֽדְ/ךָ֙ אֶל חֵיקֶ֔/ךָ וַ/יָּ֥שֶׁב יָד֖/וֹ אֶל חֵיק֑/וֹ
    וַ/יּֽוֹצִאָ/הּ֙ מֵֽ/חֵיק֔/וֹ וְ/הִנֵּה שָׁ֖בָה כִּ/בְשָׂרֽ/וֹ־־־׃
translation:
  text: And he said, “Put your hand back into your bosom.” So he put his hand back
    into his bosom, and when he brought it out from his bosom, behold, it had returned
    like his flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “into the fold of your garment at your chest.”
    reason: cultural_note
  - marker: b
    text: That is, his hand was restored to normal flesh.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָשֵׁב
  chosen: Put ... back
  alternatives:
  - Return
  - Put ... again
  lexicon: HALOT
  rationale: The Hiphil imperative of שוב here means to cause the hand to return to
    its prior place. 'Put ... back' is natural modern English and preserves the restorative
    sense better than the less idiomatic 'return your hand.'
- source_word: חֵיק
  chosen: bosom
  alternatives:
  - cloak fold
  - chest
  - lap
  lexicon: HALOT
  rationale: The term denotes the bosom or fold of the garment at the chest where
    something can be tucked. 'Bosom' is the most direct traditional and lexical equivalent
    here; 'lap' is less fitting for the action, and 'cloak fold' is interpretive.
- source_word: וַיָּשֶׁב
  chosen: he put ... back
  alternatives:
  - he returned
  - he put ... again
  lexicon: HALOT
  rationale: Narrative wayyiqtol of שוב matching the prior imperative. Rendering consistently
    with 'put ... back' preserves the repeated action and keeps the English idiomatic.
- source_word: וַיּוֹצִאָהּ
  chosen: he brought it out
  alternatives:
  - he took it out
  - he drew it out
  lexicon: HALOT
  rationale: The verb יצא in Hiphil means to bring out. 'Brought it out' is a straightforward
    rendering; 'took it out' is possible but slightly less formally aligned.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - and behold
  - suddenly
  lexicon: HALOT
  rationale: The particle marks attention to the surprising result. 'Behold' preserves
    the narrative force and solemnity without adding interpretation.
- source_word: שָׁבָה
  chosen: it had returned
  alternatives:
  - it returned
  - it was restored
  lexicon: HALOT
  rationale: The feminine singular verb refers back to the hand. 'Had returned' fits
    the English sequence after 'when he brought it out'; 'was restored' captures the
    sense but is more interpretive than the Hebrew verb itself.
- source_word: כִּבְשָׂרוֹ
  chosen: like his flesh
  alternatives:
  - like the rest of his flesh
  - like his body
  - as his flesh
  lexicon: HALOT
  rationale: 'The prefixed כ marks comparison: the hand had become like his normal
    flesh again. ''Like his flesh'' is formally close; the fuller sense of restored
    normality is conveyed by context without over-expansion.'
