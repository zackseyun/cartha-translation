id: EXO.4.26
reference: Exodus 4:26
source:
  edition: WLC
  text: וַ/יִּ֖רֶף מִמֶּ֑/נּוּ אָ֚ז אָֽמְרָ֔ה חֲתַ֥ן דָּמִ֖ים לַ/מּוּלֹֽת׃פ
translation:
  text: So he let him alone. Then she said, “A bridegroom of blood,” because of the
    circumcision.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'bridegroom of blood,' a difficult idiom; possibly an exclamation
      tied to the circumcision rite.
    reason: lexical_alternative
  - marker: b
    text: Hebrew is plural, 'because of the circumcisions' or 'circumcision rites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרֶף
  chosen: he let him alone
  alternatives:
  - he withdrew from him
  - he relented from him
  - he left him
  lexicon: HALOT
  rationale: From רפה in the qal/wayyiqtol, here idiomatically indicating cessation
    of hostile action. In context, the subject is most naturally the LORD from the
    previous verse, and the object is Moses; 'let him alone' is natural English that
    preserves the sense of desisting.
- source_word: מִמֶּנּוּ
  chosen: him
  alternatives:
  - from him
  lexicon: HALOT
  rationale: The preposition מן with pronominal suffix is retained in sense through
    the English idiom 'let him alone'; a more wooden 'withdrew from him' is possible
    but less idiomatic.
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  - So then
  lexicon: HALOT
  rationale: Temporal adverb marking the sequence after the divine withdrawal; 'Then'
    fits the narrative flow in modern English.
- source_word: אָמְרָה
  chosen: she said
  alternatives:
  - she declared
  lexicon: HALOT
  rationale: Simple narrative verb אמר; no need to heighten beyond 'said.' The feminine
    subject refers to Zipporah from the immediate context.
- source_word: חֲתַן דָּמִים
  chosen: a bridegroom of blood
  alternatives:
  - a blood-bridegroom
  - a bridegroom of bloodshed
  lexicon: HALOT
  rationale: This is a difficult idiom. The traditional and most transparent rendering
    is retained because the Hebrew construct phrase is terse and culturally opaque.
    'Bridegroom of blood' preserves the lexical form without over-interpreting its
    precise nuance.
- source_word: לַמּוּלֹת
  chosen: because of the circumcision
  alternatives:
  - with regard to the circumcisions
  - for the circumcision rites
  lexicon: HALOT
  rationale: The noun derives from מול ('circumcise') and appears in a rare plural
    form. In context it explains Zipporah's statement in relation to the circumcision
    event just performed. Singular English best communicates the sense, while the
    plural nuance is preserved in a footnote.
