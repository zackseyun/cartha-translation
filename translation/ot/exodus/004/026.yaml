theological_decisions:
- issue: Referent of the pronouns in 'he let him alone'
  chosen_reading: The subject is the LORD and the object is Moses.
  alternative_readings:
  - The object could be understood more generally from context, though Moses is the
    dominant referent.
  rationale: Verse 24 identifies the LORD as the one attacking, and verse 25 narrates
    Zipporah's circumcision of their son; verse 26 most naturally concludes that the
    LORD ceased from attacking Moses. This is a contextual narrative decision, not
    a doctrinal harmonization.
  doctrine_reference: Preserve theological tension rather than resolve it; ambiguity
    is limited here by immediate context.
- issue: Meaning of Zipporah's phrase 'bridegroom of blood'
  chosen_reading: Retain the literal idiom without resolving its exact cultural or
    emotional force.
  alternative_readings:
  - An exclamation of revulsion
  - A ritual designation connected to circumcision
  - A statement addressed directly to Moses or to the child
  rationale: The Hebrew is genuinely difficult and likely culturally loaded. Following
    optimal equivalence and the instruction not to import claims the text does not
    make, the translation preserves the phrase rather than interpretively paraphrasing
    it.
  doctrine_reference: Preserve theological tension rather than resolve it.
