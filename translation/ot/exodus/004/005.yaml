id: EXO.4.5
reference: Exodus 4:5
source:
  edition: WLC
  text: לְמַ֣עַן יַאֲמִ֔ינוּ כִּֽי נִרְאָ֥ה אֵלֶ֛י/ךָ יְהוָ֖ה אֱלֹהֵ֣י אֲבֹתָ֑/ם אֱלֹהֵ֧י
    אַבְרָהָ֛ם אֱלֹהֵ֥י יִצְחָ֖ק וֵ/אלֹהֵ֥י יַעֲקֹֽב־׃
translation:
  text: so that they may believe that the LORD, the God of their fathers, the God
    of Abraham, the God of Isaac, and the God of Jacob, has appeared to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'' Alternatives include
      ''Yahweh'' and ''Jehovah.'''
    reason: alternative_reading
  - marker: b
    text: Or 'the God of their ancestors.' The Hebrew more literally says 'their fathers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the purpose that
  lexicon: HALOT
  rationale: Introduces purpose/result. 'So that' is natural modern English and preserves
    the clause's purposive force.
- source_word: יַאֲמִינוּ
  chosen: they may believe
  alternatives:
  - they may trust
  - they may have faith
  lexicon: HALOT
  rationale: Hiphil of אמן here denotes coming to believe or trust the sign's message.
    'Believe' best fits the immediate context of accepting Moses' claim.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here it introduces the content of what they are to believe, not a causal
    clause. 'That' is the clearest English complementizer.
- source_word: נִרְאָה
  chosen: has appeared
  alternatives:
  - appeared
  - was seen
  lexicon: HALOT
  rationale: Niphal of ראה commonly means 'appear/be seen.' 'Has appeared' conveys
    the completed divine appearance with present relevance to Moses' commission.
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - unto you
  lexicon: HALOT
  rationale: Standard rendering of אל with second masculine singular suffix; direct
    and idiomatic.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: אֱלֹהֵי אֲבֹתָם
  chosen: the God of their fathers
  alternatives:
  - the God of their ancestors
  lexicon: HALOT
  rationale: Construct phrase identifying Israel's ancestral God. 'Fathers' preserves
    the masculine plural in the source and matches the covenantal idiom; 'ancestors'
    is possible but less textually precise.
- source_word: אֱלֹהֵי אַבְרָהָם אֱלֹהֵי יִצְחָק וֵאלֹהֵי יַעֲקֹב
  chosen: the God of Abraham, the God of Isaac, and the God of Jacob
  alternatives:
  - God of Abraham, Isaac, and Jacob
  lexicon: HALOT
  rationale: The repeated construct 'God of' before each patriarch is retained for
    emphasis and solemnity, reflecting the Hebrew cadence rather than compressing
    the phrase.
