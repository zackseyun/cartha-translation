theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God. Following the project's doctrine,
    the tetragrammaton is rendered 'the LORD' in the main text, while alternatives
    remain acknowledged.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered ancestral term אֲבֹתָם
  chosen_reading: their fathers
  alternative_readings:
  - their ancestors
  rationale: The source is grammatically masculine plural and refers to the patriarchal
    lineage in covenantal context. Per the project's gender-accurate policy, the masculine
    form is preserved rather than neutralized.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
