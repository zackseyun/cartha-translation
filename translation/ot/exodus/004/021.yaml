id: EXO.4.21
reference: Exodus 4:21
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוָה֮ אֶל מֹשֶׁה֒ בְּ/לֶכְתְּ/ךָ֙ לָ/שׁ֣וּב מִצְרַ֔יְמָ/ה רְאֵ֗ה
    כָּל הַ/מֹּֽפְתִים֙ אֲשֶׁר שַׂ֣מְתִּי בְ/יָדֶ֔/ךָ וַ/עֲשִׂיתָ֖/ם לִ/פְנֵ֣י פַרְעֹ֑ה
    וַ/אֲנִי֙ אֲחַזֵּ֣ק אֶת לִבּ֔/וֹ וְ/לֹ֥א יְשַׁלַּ֖ח אֶת הָ/עָֽם־־־־־׃
translation:
  text: Then the LORD said to Moses, “When you go back to Egypt, see that you do before
    Pharaoh all the wonders that I have put in your hand. But I will harden his heart,
    and he will not let the people go.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will strengthen his heart' or 'I will make his heart firm.' The Hebrew
      verb can carry the sense of strengthening; here it describes Pharaoh being confirmed
      in stubborn refusal.
    reason: lexical_alternative
  - marker: b
    text: Or 'the signs' or 'the miracles.' The Hebrew word refers to extraordinary
      acts that function as displays of divine power.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    the traditional small-caps covenantal substitute in English rather than transliteration.
- source_word: בְּלֶכְתְּךָ לָשׁוּב
  chosen: When you go back
  alternatives:
  - As you are going back
  - in your going to return
  lexicon: HALOT
  rationale: The infinitive construction with prefixed prepositions is naturally rendered
    as a temporal clause in English. 'Go back' communicates the motion and return
    sense idiomatically without over-literal awkwardness.
- source_word: מִצְרַיְמָה
  chosen: to Egypt
  alternatives:
  - Egyptward
  lexicon: HALOT
  rationale: The directional ending is conveyed by the English preposition 'to'; 'Egyptward'
    would be overly archaic.
- source_word: רְאֵה
  chosen: see that
  alternatives:
  - see
  - take care to
  - make sure
  lexicon: HALOT
  rationale: The imperative introduces a charge or admonition. 'See that' preserves
    the force of careful attention while fitting the following clause smoothly in
    English.
- source_word: הַמֹּפְתִים
  chosen: the wonders
  alternatives:
  - the signs
  - the miracles
  lexicon: HALOT
  rationale: מופת often denotes extraordinary acts that function as signs/portents.
    'Wonders' preserves the miraculous sense without collapsing it entirely into the
    more technical 'signs,' though that remains a viable alternative.
- source_word: שַׂמְתִּי בְיָדֶךָ
  chosen: I have put in your hand
  alternatives:
  - I have placed in your power
  - I have entrusted to you
  lexicon: HALOT
  rationale: The idiom literally speaks of placing something in Moses' hand, expressing
    entrustment and enablement. Retaining 'in your hand' preserves the Hebrew imagery
    while remaining understandable.
- source_word: וַעֲשִׂיתָם לִפְנֵי פַרְעֹה
  chosen: you do before Pharaoh
  alternatives:
  - you perform before Pharaoh
  - you do them in Pharaoh's presence
  lexicon: HALOT
  rationale: '''Do'' is the direct lexical equivalent of עשה and is sufficiently natural
    here with ''wonders'' as object. ''Before Pharaoh'' preserves the public, confrontational
    setting.'
- source_word: וַאֲנִי
  chosen: But I
  alternatives:
  - And I
  - Now I
  lexicon: HALOT
  rationale: Although the conjunction is formally 'and,' English idiom and the discourse
    contrast favor 'But I' to mark the shift from Moses' actions to the LORD's decisive
    action.
- source_word: אֲחַזֵּק אֶת לִבּוֹ
  chosen: I will harden his heart
  alternatives:
  - I will strengthen his heart
  - I will make his heart firm
  lexicon: HALOT
  rationale: The Hiphil of חזק with 'heart' in the Pharaoh narrative conventionally
    conveys hardening/strengthening into obstinacy. 'Harden his heart' best captures
    the narrative-theological force in idiomatic English, while the more wooden 'strengthen'
    is preserved as an alternative.
- source_word: וְלֹא יְשַׁלַּח אֶת הָעָם
  chosen: and he will not let the people go
  alternatives:
  - and he will not send the people away
  - and he will not release the people
  lexicon: HALOT
  rationale: In the Exodus context, שׁלח with the people as object is the established
    idiom for permitting Israel's departure. 'Let the people go' is both accurate
    and natural.
