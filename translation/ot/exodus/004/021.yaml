theological_decisions:
- issue: Divine hardening of Pharaoh's heart
  chosen_reading: I will harden his heart
  alternative_readings:
  - I will strengthen his heart
  - I will make his heart firm
  rationale: The Hebrew verb חזק in this causative form can denote strengthening or
    making firm, but in this narrative context it refers to Pharaoh's becoming resolute
    in refusal. The translation preserves the text's theological tension regarding
    divine agency and human responsibility rather than softening it into a less charged
    paraphrase.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
