id: EXO.4.29
reference: Exodus 4:29
source:
  edition: WLC
  text: וַ/יֵּ֥לֶךְ מֹשֶׁ֖ה וְ/אַהֲרֹ֑ן וַ/יַּ֣אַסְפ֔וּ אֶת כָּל זִקְנֵ֖י בְּנֵ֥י
    יִשְׂרָאֵֽל־־׃
translation:
  text: Then Moses and Aaron went and gathered all the elders of the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Israelites” or traditionally “the children of Israel.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - set out
  - went along
  lexicon: HALOT
  rationale: הלך in the wayyiqtol commonly advances the narrative with the simple
    sense 'went.' Although the verb is singular while followed by two coordinated
    subjects, the sense is naturally collective in English, so 'Moses and Aaron went'
    is idiomatic and faithful.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: אַהֲרֹן
  chosen: Aaron
  rationale: Standard English transliteration of the personal name.
- source_word: וַיַּאַסְפוּ
  chosen: gathered
  alternatives:
  - assembled
  - collected
  lexicon: HALOT
  rationale: אסף here means to gather persons together. 'Gathered' is the most natural
    English rendering in this context and fits the direct object of persons.
- source_word: אֵת
  chosen: '[not separately translated]'
  rationale: Direct-object marker with no independent English equivalent.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole body of
  lexicon: HALOT
  rationale: כָּל straightforwardly indicates totality; 'all' is the natural concise
    rendering.
- source_word: זִקְנֵי
  chosen: elders
  alternatives:
  - older men
  - leaders
  lexicon: HALOT
  rationale: Though literally related to age, in context זקנים denotes recognized
    community leaders. 'Elders' preserves both the lexical form and social function.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Because the source explicitly uses the filial expression בני ישראל, 'the
    sons of Israel' preserves the Hebrew form more closely than 'Israelites.' This
    follows the project's gender-accurate principle and retains the covenantal/ancestral
    nuance. 'Children of Israel' is traditional but less precise to the masculine
    plural form.
