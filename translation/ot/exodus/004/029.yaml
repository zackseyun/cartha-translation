theological_decisions:
- issue: Rendering of בני ישראל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: No major doctrinal dispute is present, but the phrase carries covenantal
    identity rooted in descent from Israel/Jacob. The translation preserves the explicit
    Hebrew kinship expression rather than flattening it to an ethnonym. This also
    aligns with the stated gender-accurate policy.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
