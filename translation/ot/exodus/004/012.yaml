theological_decisions:
- issue: Divine presence formula in commissioning
  chosen_reading: I will be with your mouth
  alternative_readings:
  - I will help you speak
  - I will be with your speech
  rationale: The text presents God's enabling presence in concrete, embodied terms
    rather than paraphrasing it into a purely dynamic explanation. This preserves
    the theological emphasis that God himself accompanies and equips Moses' speech.
  doctrine_reference: 'Translation philosophy #3, preserve theological tension rather
    than resolve it'
