id: EXO.4.12
reference: Exodus 4:12
source:
  edition: WLC
  text: וְ/עַתָּ֖ה לֵ֑ךְ וְ/אָנֹכִי֙ אֶֽהְיֶ֣ה עִם פִּ֔י/ךָ וְ/הוֹרֵיתִ֖י/ךָ אֲשֶׁ֥ר
    תְּדַבֵּֽר־׃
translation:
  text: Now go, and I will be with your mouth and teach you what you are to speak.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'with your mouth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now
  alternatives:
  - So now
  - And now
  lexicon: HALOT
  rationale: Temporal/discourse marker introducing the next step in response to Moses'
    objection. 'Now' is natural English and preserves the immediacy.
- source_word: לֵךְ
  chosen: go
  alternatives:
  - be on your way
  - go on
  lexicon: HALOT
  rationale: Qal imperative of הלך. Simple imperative 'go' best matches the direct
    command without unnecessary expansion.
- source_word: וְאָנֹכִי אֶהְיֶה
  chosen: and I will be
  alternatives:
  - and I myself will be
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis, but standard English can convey
    this adequately with 'and I will be.' A more explicit 'I myself' is possible but
    sounds heavier than the context requires.
- source_word: עִם פִּיךָ
  chosen: with your mouth
  alternatives:
  - with your speech
  - with you as you speak
  lexicon: HALOT
  rationale: The Hebrew is literally 'with your mouth.' Retaining 'mouth' preserves
    the concrete imagery and the specific focus on Moses' speaking difficulty, while
    remaining intelligible in English.
- source_word: וְהוֹרֵיתִיךָ
  chosen: and teach you
  alternatives:
  - and instruct you
  - and show you
  lexicon: HALOT
  rationale: Hiphil of ירה here means to instruct/teach. 'Teach you' is clear modern
    English and fits the following content clause about what Moses will say.
- source_word: אֲשֶׁר תְּדַבֵּר
  chosen: what you are to speak
  alternatives:
  - what you shall speak
  - what you should say
  - what you will speak
  lexicon: HALOT
  rationale: The relative clause specifies the content of divine instruction. 'What
    you are to speak' communicates intended obligation/future function in idiomatic
    English. 'Say' is possible, but 'speak' better reflects דבר and matches the formal
    tone.
