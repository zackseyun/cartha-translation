id: EXO.4.13
reference: Exodus 4:13
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר בִּ֣י אֲדֹנָ֑/י שְֽׁלַֽח נָ֖א בְּ/יַד תִּשְׁלָֽח־־׃
translation:
  text: But he said, “Please, my Lord, send by the hand of whomever you will send.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, “Please, my Lord, send someone else.”
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: But he said
  alternatives:
  - And he said
  lexicon: HALOT
  rationale: The waw-consecutive on אמר normally advances the narrative as 'and he
    said,' but here 'but he said' better reflects the adversative force in context,
    since Moses is resisting after successive divine answers.
- source_word: בִּי
  chosen: Please
  alternatives:
  - Pardon me
  - I pray
  lexicon: HALOT
  rationale: In this idiom before a respectful address, בִּי functions as a polite
    entreaty rather than a literal 'in me.' 'Please' is natural modern English and
    preserves the deferential tone.
- source_word: אֲדֹנָי
  chosen: my Lord
  alternatives:
  - Lord
  - my master
  lexicon: HALOT
  rationale: Here אֲדֹנָי is a reverential address to God in direct speech. 'My Lord'
    preserves the 1cs suffix and the personal plea. It is not the divine name יהוה,
    so the covenantal rendering 'the LORD' is not used here.
- source_word: שְׁלַח
  chosen: send
  alternatives:
  - dispatch
  lexicon: HALOT
  rationale: Imperative of שלח. 'Send' is the standard, clear rendering and matches
    the repeated verbal root in the clause.
- source_word: נָא
  chosen: Please
  alternatives:
  - now
  - I pray
  lexicon: HALOT
  rationale: Particle of entreaty softening the imperative. English 'please' best
    conveys the politeness in contemporary idiom.
- source_word: בְּיַד
  chosen: by the hand of
  alternatives:
  - through
  - by means of
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'by the hand of' and commonly denotes
    agency or instrumentality. Retaining the idiom keeps the flavor of the Hebrew
    while remaining intelligible in English.
- source_word: תִּשְׁלָח
  chosen: you will send
  alternatives:
  - you would send
  - you choose to send
  lexicon: HALOT
  rationale: Imperfect of שלח in a relative-like construction after 'by the hand of.'
    'You will send' is formally close to the Hebrew and preserves the ambiguity of
    Moses' evasive wording, rather than over-interpreting it as 'someone else' in
    the main text.
