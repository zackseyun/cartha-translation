theological_decisions:
- issue: Interpretation of Moses' evasive request
  chosen_reading: 'Retain the Hebrew ambiguity: Moses asks God to send by whomever
    he will send.'
  alternative_readings:
  - Please send someone else.
  - Send by the hand of the one you would send.
  rationale: The clause is idiomatic and contextually expresses reluctance, but the
    Hebrew does not explicitly say 'someone else.' Following optimal equivalence and
    the instruction to preserve theological or interpretive tension rather than resolve
    it, the main text keeps the more literal ambiguous form, while a clearer interpretive
    alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
