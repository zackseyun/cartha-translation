id: EXO.4.4
reference: Exodus 4:4
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל מֹשֶׁ֔ה שְׁלַח֙ יָֽדְ/ךָ֔ וֶ/אֱחֹ֖ז בִּ/זְנָב֑/וֹ וַ/יִּשְׁלַ֤ח יָד/וֹ֙ וַ/יַּ֣חֲזֶק בּ֔/וֹ וַ/יְהִ֥י לְ/מַטֶּ֖ה בְּ/כַפּֽ/וֹ־׃
translation:
  text: Then Yahweh said to Moses, “Reach out your hand and take hold of its tail.” So he reached out his hand and took hold of it, and it became a staff in his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “grasp its tail” or “take hold of it by the tail.”
    reason: lexical_alternative
  - marker: b
    text: Or “rod.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שְׁלַח
  chosen: Reach out
  alternatives:
  - Stretch out
  - Send out
  lexicon: HALOT
  rationale: The verb שׁלח literally means 'send/stretch out.' In this immediate physical-action context with 'your hand,' 'Reach out' is natural modern English and accurately conveys the commanded motion without sounding wooden.
- source_word: יָדְךָ
  chosen: your hand
  lexicon: HALOT
  rationale: Direct, literal rendering of the body-part noun with second masculine singular suffix.
- source_word: וֶאֱחֹז
  chosen: take hold of
  alternatives:
  - grasp
  - seize
  - catch hold of
  lexicon: HALOT
  rationale: אָחַז commonly denotes grasping or taking hold. 'Take hold of' fits the imperative sequence and avoids the overly forceful nuance of 'seize' while preserving the concrete action.
- source_word: בִּזְנָבוֹ
  chosen: its tail
  alternatives:
  - by its tail
  lexicon: HALOT
  rationale: The noun means 'tail' with 3ms suffix referring to the snake from the previous verse. English idiom after 'take hold of' naturally uses the direct object 'its tail'; the instrumental nuance of the preposition is sufficiently carried by the verb phrase.
- source_word: וַיִּשְׁלַח יָדוֹ
  chosen: he reached out his hand
  alternatives:
  - he stretched out his hand
  lexicon: HALOT
  rationale: Maintains verbal correspondence with the command while using readable contemporary English.
- source_word: וַיַּחֲזֶק בּוֹ
  chosen: took hold of it
  alternatives:
  - grasped it
  - seized it
  lexicon: HALOT
  rationale: Although the verb is חזק rather than אחז, in this construction it conveys taking firm hold. 'Took hold of it' preserves the narrative echo with the command and reads smoothly in English.
- source_word: וַיְהִי
  chosen: it became
  alternatives:
  - it was
  - it turned into
  lexicon: HALOT
  rationale: In this transformation context, היה is best rendered 'became,' indicating change of state rather than simple existence.
- source_word: לְמַטֶּה
  chosen: a staff
  alternatives:
  - a rod
  - a stick
  lexicon: HALOT
  rationale: מַטֶּה can mean staff/rod. 'Staff' is the most natural and contextually appropriate term for Moses's shepherd's implement in modern English; 'rod' is possible but more traditional than necessary.
- source_word: בְּכַפּוֹ
  chosen: in his hand
  alternatives:
  - in his palm
  lexicon: HALOT
  rationale: כַּף literally refers to the palm/hand. 'In his hand' is idiomatic English and adequately represents the sense without awkward specificity.
