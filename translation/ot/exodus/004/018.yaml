id: EXO.4.18
reference: Exodus 4:18
source:
  edition: WLC
  text: וַ/יֵּ֨לֶךְ מֹשֶׁ֜ה וַ/יָּ֣שָׁב אֶל יֶ֣תֶר חֹֽתְנ֗/וֹ וַ/יֹּ֤אמֶר ל/וֹ֙ אֵ֣לֲכָה
    נָּ֗א וְ/אָשׁ֨וּבָה֙ אֶל אַחַ֣/י אֲשֶׁר בְּ/מִצְרַ֔יִם וְ/אֶרְאֶ֖ה הַ/עוֹדָ֣/ם
    חַיִּ֑ים וַ/יֹּ֧אמֶר יִתְר֛וֹ לְ/מֹשֶׁ֖ה לֵ֥ךְ לְ/שָׁלֽוֹם׀־־־׃
translation:
  text: Then Moses went and returned to Jethro his father-in-law and said to him,
    “Please let me go and return to my brothers who are in Egypt, so that I may see
    whether they are still alive.” And Jethro said to Moses, “Go in peace.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has the name form 'Jether' in the first mention and 'Jethro' in the
      second; the English text uses 'Jethro' for consistency since the same person
      is clearly intended.
    reason: textual_variant
  - marker: b
    text: Or 'my kinsmen' for 'my brothers.' The Hebrew literally says 'my brothers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: Then Moses went
  alternatives:
  - And Moses went
  - So Moses went
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative. 'Then' gives natural English narrative
    progression without over-paraphrasing.
- source_word: וַיָּשָׁב
  chosen: returned
  alternatives:
  - went back
  - turned back
  lexicon: HALOT
  rationale: שׁוּב commonly means 'return.' Here it refers to Moses going back to
    his Midianite household head after the divine encounter.
- source_word: יֶתֶר / יִתְרוֹ
  chosen: Jethro
  alternatives:
  - Jether
  lexicon: HALOT
  rationale: The verse contains two spellings/names, יֶתֶר in the first clause and
    יִתְרוֹ in the final clause. English tradition commonly harmonizes to 'Jethro,'
    and the referent is clearly the same person. The alternative form is preserved
    in a footnote for auditability.
- source_word: חֹתְנוֹ
  chosen: his father-in-law
  alternatives:
  - his in-law
  lexicon: HALOT
  rationale: In context the relationship is specifically that of Moses to his wife's
    father. 'Father-in-law' is the natural and precise English rendering.
- source_word: אֵלֲכָה נָּא
  chosen: Please let me go
  alternatives:
  - Please, I will go
  - Please let me leave
  lexicon: HALOT
  rationale: The cohortative with נָא expresses polite request or entreaty. In English,
    'Please let me go' best captures the deferential force toward his father-in-law.
- source_word: וְאָשׁוּבָה
  chosen: and return
  alternatives:
  - and go back
  lexicon: HALOT
  rationale: Cohortative continuation of Moses' request. 'Return' preserves the lexical
    link with שׁוּב earlier in the verse.
- source_word: אַחַי
  chosen: my brothers
  alternatives:
  - my kinsmen
  - my relatives
  lexicon: HALOT
  rationale: Literally 'my brothers.' In context it can denote kinfolk more broadly,
    but the translation philosophy prefers gender-accurate rendering matching the
    source form. Broader sense is noted by alternative glosses.
- source_word: וְאֶרְאֶה
  chosen: so that I may see
  alternatives:
  - and see
  - that I may see
  lexicon: HALOT
  rationale: The verb expresses Moses' purpose in returning. 'So that I may see' makes
    the purposive nuance clear in idiomatic English.
- source_word: הַעוֹדָם חַיִּים
  chosen: whether they are still alive
  alternatives:
  - if they are still living
  - whether they yet live
  lexicon: HALOT
  rationale: The idiom combines עוֹד ('still/yet') with plural adjective 'alive.'
    'Whether they are still alive' is clear modern English and preserves the uncertainty.
- source_word: לֵךְ לְשָׁלוֹם
  chosen: Go in peace
  alternatives:
  - Go in safety
  - Go with peace
  lexicon: HALOT
  rationale: Standard Hebrew idiom of blessing or peaceful dismissal. 'Go in peace'
    is the established and accurate English equivalent.
