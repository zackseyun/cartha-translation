id: EXO.15.19
reference: Exodus 15:19
source:
  edition: WLC
  text: כִּ֣י בָא֩ ס֨וּס פַּרְעֹ֜ה בְּ/רִכְבּ֤/וֹ וּ/בְ/פָרָשָׁי/ו֙ בַּ/יָּ֔ם וַ/יָּ֧שֶׁב יְהוָ֛ה עֲלֵ/הֶ֖ם אֶת מֵ֣י הַ/יָּ֑ם וּ/בְנֵ֧י יִשְׂרָאֵ֛ל הָלְכ֥וּ בַ/יַּבָּשָׁ֖ה בְּ/ת֥וֹךְ הַ/יָּֽם־׃פ
translation:
  text: For Pharaoh’s horses went into the sea with his chariots and with his horsemen, and Yahweh brought back the waters of the sea over them; but the sons of Israel walked on dry ground through the midst of the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Pharaoh’s horse ... with his chariot'; the singular may function collectively for Pharaoh’s mounted force and chariotry.
    reason: lexical_alternative
  - marker: b
    text: Or 'and the sons of Israel'; the Hebrew conjunction is simply 'and.' 'But' in the main text makes the contrast explicit in English.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - When
  lexicon: HALOT
  rationale: Introduces an explanatory ground for the preceding song refrain; 'For' preserves the connective force succinctly in English.
- source_word: בָא
  chosen: went into
  alternatives:
  - came
  - entered
  lexicon: HALOT
  rationale: With בַיָּם ('into the sea'), the motion is ingress. 'Went into' is idiomatic in English and avoids the awkwardness of 'came into' without a deictic center.
- source_word: סוּס פַּרְעֹה
  chosen: Pharaoh’s horse
  alternatives:
  - the horse of Pharaoh
  - Pharaoh’s horses
  lexicon: HALOT
  rationale: The Hebrew uses singular סוּס with a collective sense possible, but the singular is retained as the formal wording of the text. English possessive is natural.
- source_word: בְּרִכְבּוֹ
  chosen: with his chariots
  alternatives:
  - with his chariot
  lexicon: HALOT
  rationale: Although morphologically singular with suffix ('his chariot'), רכב often functions collectively for chariotry/chariot force. 'With his chariots' best reflects the military sense in context.
- source_word: וּבְפָרָשָׁיו
  chosen: with his horsemen
  alternatives:
  - with his riders
  - with his cavalry
  lexicon: HALOT
  rationale: Refers to mounted warriors. 'Horsemen' is the most direct and traditional equivalent; 'cavalry' is more interpretive and modernized.
- source_word: וַיָּשֶׁב יְהוָה
  chosen: and the LORD brought back
  alternatives:
  - and the LORD turned back
  - and the LORD caused to return
  lexicon: HALOT
  rationale: The hiphil of שוב is causative. In context of the sea waters returning over the Egyptians, 'brought back' is clear, natural, and preserves divine agency.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md contested terms table.
- source_word: עֲלֵהֶם
  chosen: over them
  alternatives:
  - upon them
  - against them
  lexicon: HALOT
  rationale: With the returning waters, 'over them' best conveys the physical overwhelming action.
- source_word: אֶת מֵי הַיָּם
  chosen: the waters of the sea
  alternatives:
  - the sea's waters
  lexicon: HALOT
  rationale: Standard construct rendering; preserves the concrete imagery.
- source_word: וּבְנֵי יִשְׂרָאֵל
  chosen: but the sons of Israel
  alternatives:
  - and the sons of Israel
  - but the Israelites
  lexicon: HALOT
  rationale: '''Sons of Israel'' is the more formally transparent rendering of the Hebrew phrase. ''But'' is supplied in English to mark the strong contrast with Pharaoh''s forces, though the Hebrew conjunction is simply ''and''.'
- source_word: הָלְכוּ
  chosen: walked
  alternatives:
  - went
  - passed through
  lexicon: HALOT
  rationale: '''Walked'' preserves the ordinary verb and highlights the calm, deliberate movement in contrast to the Egyptians'' destruction.'
- source_word: בַּיַּבָּשָׁה
  chosen: on dry ground
  alternatives:
  - on the dry land
  - on dry land
  lexicon: HALOT
  rationale: Idiomatic English for the state of the seabed after the waters parted; 'ground' fits the immediate scene slightly better than 'land'.
- source_word: בְּתוֹךְ הַיָּם
  chosen: through the midst of the sea
  alternatives:
  - in the midst of the sea
  - through the sea
  lexicon: HALOT
  rationale: Preserves the vivid spatial expression while remaining readable. 'Through the midst' captures both movement and location.
