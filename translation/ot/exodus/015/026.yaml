id: EXO.15.26
reference: Exodus 15:26
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ אִם שָׁמ֨וֹעַ תִּשְׁמַ֜ע לְ/ק֣וֹל יְהוָ֣ה אֱלֹהֶ֗י/ךָ וְ/הַ/יָּשָׁ֤ר בְּ/עֵינָי/ו֙ תַּעֲשֶׂ֔ה וְ/הַֽאֲזַנְתָּ֙ לְ/מִצְוֺתָ֔י/ו וְ/שָׁמַרְתָּ֖ כָּל חֻקָּ֑י/ו כָּֽל הַ/מַּֽחֲלָ֞ה אֲשֶׁר שַׂ֤מְתִּי בְ/מִצְרַ֨יִם֙ לֹא אָשִׂ֣ים עָלֶ֔י/ךָ כִּ֛י אֲנִ֥י יְהוָ֖ה רֹפְאֶֽ/ךָ־׀־־־־׃ס
translation:
  text: He said, “If you diligently listen to the voice of Yahweh your God, and do what is right in his eyes, and give ear to his commandments, and keep all his statutes, I will put none of the diseases on you that I put on Egypt, for I am Yahweh, your healer.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “for I am the LORD who heals you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמ֨וֹעַ תִּשְׁמַ֜ע
  chosen: diligently listen
  alternatives:
  - carefully listen
  - surely listen
  - indeed obey
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the verbal idea. 'Diligently listen' preserves both the auditory sense of שׁמע and the idiomatic force of attentive obedience without over-paraphrasing to simply 'obey.'
- source_word: לְק֣וֹל
  chosen: to the voice
  alternatives:
  - to the sound
  - to what ... says
  lexicon: HALOT
  rationale: קוֹל is literally 'voice.' Retaining 'voice' preserves the Hebrew expression 'listen to the voice of' while remaining natural in English.
- source_word: יְהוָ֣ה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: אֱלֹהֶ֗יךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward covenantal designation in second person singular.
- source_word: וְהַיָּשָׁר בְּעֵינָיו
  chosen: what is right in his eyes
  alternatives:
  - the upright thing in his sight
  - what is pleasing in his sight
  lexicon: HALOT
  rationale: יָשָׁר means 'straight/right/upright.' 'What is right in his eyes' preserves the idiom and moral sense better than the more interpretive 'pleasing.'
- source_word: וְהַאֲזַנְתָּ
  chosen: give ear
  alternatives:
  - pay attention
  - listen closely
  lexicon: HALOT
  rationale: The Hiphil of אזן means to listen attentively or give ear. 'Give ear' is slightly idiomatic but still readable and preserves the distinct nuance from the earlier שׁמע.
- source_word: לְמִצְוֺתָיו
  chosen: to his commandments
  alternatives:
  - to his commands
  lexicon: HALOT
  rationale: מִצְוֹת are commandments/commands. 'Commandments' fits covenantal and legal context.
- source_word: וְשָׁמַרְתָּ
  chosen: keep
  alternatives:
  - observe
  - guard
  lexicon: HALOT
  rationale: שׁמר in legal contexts commonly means 'keep/observe.' 'Keep' is concise and idiomatic.
- source_word: כָּל חֻקָּיו
  chosen: all his statutes
  alternatives:
  - all his decrees
  - all his ordinances
  lexicon: HALOT
  rationale: חֻקִּים are fixed prescriptions or statutes. 'Statutes' is a standard and suitably precise rendering.
- source_word: כָּל הַמַּחֲלָה
  chosen: none of the diseases
  alternatives:
  - none of the sicknesses
  - none of the afflictions
  lexicon: HALOT
  rationale: The singular collective with כָּל is naturally rendered in English as 'none of the diseases.' 'Diseases' fits the context of the plagues on Egypt without narrowing to one specific illness.
- source_word: אֲשֶׁר שַׂמְתִּי בְמִצְרַיִם
  chosen: that I put on Egypt
  alternatives:
  - that I inflicted on Egypt
  - that I placed on the Egyptians
  lexicon: HALOT
  rationale: שׂים literally means 'put/place/set.' 'Put on Egypt' preserves the Hebrew wording while remaining understandable; 'inflicted' is possible but more interpretive.
- source_word: לֹא אָשִׂים עָלֶיךָ
  chosen: I will put none ... on you
  alternatives:
  - I will not place any ... on you
  - I will not inflict any ... on you
  lexicon: HALOT
  rationale: Maintains lexical consistency with the earlier שׂים and preserves the covenantal conditional warning/promise structure.
- source_word: כִּי אֲנִי יְהוָה רֹפְאֶךָ
  chosen: for I am the LORD, your healer
  alternatives:
  - for I am the LORD who heals you
  - for I, the LORD, am your physician
  lexicon: HALOT
  rationale: רֹפְאֶךָ is a participial form, literally 'your healer' or 'the one healing you.' 'Your healer' preserves the nominal force and covenant identity statement. A footnote preserves the verbal alternative 'who heals you.'
