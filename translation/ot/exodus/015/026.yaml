theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Nature of the promise regarding disease
  chosen_reading: A covenantal conditional promise not to place on Israel the diseases placed on Egypt, contingent on obedient listening.
  alternative_readings:
  - A universal guarantee of individual physical healing in all circumstances
  - A purely metaphorical statement about spiritual restoration only
  rationale: The verse itself frames the statement conditionally and in relation to covenant obedience and the historical judgment on Egypt. The translation avoids importing later doctrinal claims about guaranteed healing or reducing the statement to metaphor alone.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 and §3
- issue: Rendering רֹפְאֶךָ
  chosen_reading: your healer
  alternative_readings:
  - who heals you
  rationale: The participle can be rendered either nominally or verbally. 'Your healer' preserves the appositional covenant-name style of the clause while a footnote preserves the verbal alternative without resolving the nuance too narrowly.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
