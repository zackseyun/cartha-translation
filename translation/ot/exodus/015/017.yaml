theological_decisions:
- issue: Rendering the divine names יְהוָה and אֲדֹנָי in the same verse
  chosen_reading: Render יְהוָה as 'Yahweh' and אֲדֹנָי as 'Lord'
  alternative_readings:
  - Render both as 'Lord'
  - Render יְהוָה as 'Yahweh' and אֲדֹנָי as 'Lord'
  rationale: The verse contains both the covenant name and the title. Using 'LORD' for יְהוָה follows the project's stated default, while 'Lord' for אֲדֹנָי preserves the distinction visible in Hebrew without importing extra wording.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Referent of 'the mountain of your inheritance' and 'the sanctuary'
  chosen_reading: Translate in a way that preserves the poetic tension between the promised land/mountain and God's sanctuary without resolving the exact geographic referent
  alternative_readings:
  - Interpret explicitly as Zion/Temple mount
  - Interpret explicitly as the land of Canaan as a whole
  rationale: The poetry may look ahead broadly to Israel's settled inheritance and more specifically to God's sanctuary. The translation keeps the Hebrew imagery and does not force a narrower interpretive identification than the text itself states.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
