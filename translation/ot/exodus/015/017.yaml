id: EXO.15.17
reference: Exodus 15:17
source:
  edition: WLC
  text: תְּבִאֵ֗/מוֹ וְ/תִטָּעֵ֨/מוֹ֙ בְּ/הַ֣ר נַחֲלָֽתְ/ךָ֔ מָכ֧וֹן לְ/שִׁבְתְּ/ךָ֛ פָּעַ֖לְתָּ יְהוָ֑ה מִקְּדָ֕שׁ אֲדֹנָ֖/י כּוֹנְנ֥וּ יָדֶֽי/ךָ׃
translation:
  text: You will bring them in and plant them on the mountain of your inheritance— the place, Yahweh, that you made for your dwelling, the sanctuary, Lord, that your hands established.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and establish them.' The Hebrew verb literally means 'plant them,' preserving the image of secure settlement.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the mountain of your inheritance' may refer broadly to the land God gives his people or more specifically to the mountain of God's sanctuary.
    reason: alternative_reading
  - marker: c
    text: Hebrew has both the divine name (rendered 'LORD') and the title 'Lord' in this verse.
    reason: cultural_note
lexical_decisions:
- source_word: תְּבִאֵמוֹ
  chosen: You will bring them in
  alternatives:
  - You will bring them
  - You bring them in
  lexicon: HALOT
  rationale: Hiphil of בוא with 3mp suffix conveys causative movement into a place. English 'bring them in' preserves both the causative sense and the implied destination.
- source_word: וְתִטָּעֵמוֹ
  chosen: and plant them
  alternatives:
  - and establish them
  - and set them
  lexicon: HALOT
  rationale: נטע literally means 'plant.' In context it is metaphorical for settling the people securely, but the concrete image is important in the poetry, so 'plant them' is retained rather than flattened to 'establish them.'
- source_word: בְּהַר נַחֲלָתְךָ
  chosen: on the mountain of your inheritance
  alternatives:
  - in the mountain of your inheritance
  - on your inherited mountain
  lexicon: HALOT
  rationale: The phrase is best taken as the mountain belonging to YHWH as his allotted possession. 'On the mountain of your inheritance' is idiomatic and preserves the genitive relationship.
- source_word: מָכוֹן לְשִׁבְתְּךָ
  chosen: the place ... that you made for your dwelling
  alternatives:
  - the fixed place for your dwelling
  - the foundation for your dwelling place
  lexicon: HALOT
  rationale: מָכוֹן can denote an established place or site. With לְשִׁבְתְּךָ ('for your dwelling'), the sense is the place prepared for God's habitation. 'Place' is clearer in modern English than the less natural 'fixed place,' while still reflecting the noun's sense of an established site.
- source_word: פָּעַלְתָּ
  chosen: you made
  alternatives:
  - you prepared
  - you worked
  lexicon: HALOT
  rationale: פעל is a broad verb for doing or making. In this collocation with the dwelling place, 'made' is natural and sufficiently literal; 'prepared' is possible but slightly more interpretive.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִקְּדָשׁ
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the sanctuary place
  lexicon: HALOT
  rationale: מקדש denotes a holy place or sanctuary. 'Sanctuary' is the most natural and theologically appropriate English equivalent here.
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - my Lord
  - the Lord
  lexicon: HALOT
  rationale: Although morphologically built on the 1cs form, אֲדֹנָי functions as the divine title. To distinguish it from the preceding divine name while preserving normal English style, 'Lord' is used without adding 'my,' which would overtranslate the frozen form.
- source_word: כּוֹנְנוּ יָדֶיךָ
  chosen: that your hands established
  alternatives:
  - which your hands founded
  - that your hands made firm
  lexicon: HALOT
  rationale: כון in the polel/poetic form conveys establishing or making firm. 'Your hands established' preserves the anthropomorphic imagery and the sense of firm founding.
