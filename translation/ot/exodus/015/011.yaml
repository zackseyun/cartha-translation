theological_decisions:
- issue: Referent of אֵלִם
  chosen_reading: gods
  alternative_readings:
  - mighty ones
  rationale: The verse rhetorically exalts the LORD over all rival divine powers in the Song of the Sea. Rendering 'gods' preserves the ancient Near Eastern polemical setting and the biblical language of incomparability, while not implying ontological equality with the LORD.
  doctrine_reference: 'Contested terms table: יְהוָה rendered ''the LORD''; broader philosophy: original-language primacy and preserve source-world meaning.'
