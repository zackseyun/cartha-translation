id: EXO.15.11
reference: Exodus 15:11
source:
  edition: WLC
  text: מִֽי כָמֹ֤/כָה בָּֽ/אֵלִם֙ יְהוָ֔ה מִ֥י כָּמֹ֖/כָה נֶאְדָּ֣ר בַּ/קֹּ֑דֶשׁ נוֹרָ֥א תְהִלֹּ֖ת עֹ֥שֵׂה פֶֽלֶא־׃
translation:
  text: Who is like you among the gods, O Yahweh? Who is like you, majestic in holiness, awesome in praises, doing wonders?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among the mighty ones.' The Hebrew may refer either to gods/divine beings or to mighty ones; 'gods' best fits the song's rhetoric of the LORD's incomparability.
    reason: alternative_reading
  - marker: b
    text: Or 'awesome in praises' or 'fearsome in praise.' The Hebrew expression is compact and poetic.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  chosen: Who
  lexicon: HALOT
  rationale: Interrogative pronoun introducing the rhetorical question.
- source_word: כָמֹכָה
  chosen: is like you
  alternatives:
  - is comparable to you
  lexicon: HALOT
  rationale: Idiomatic comparison formula; English supplies 'is' naturally.
- source_word: בָּאֵלִם
  chosen: among the gods
  alternatives:
  - among the mighty ones
  lexicon: HALOT
  rationale: Though אֵלִם can denote 'mighty ones,' in this victory hymn the contrast is between YHWH and other divine beings/deities. 'Among the gods' best matches the polemical and poetic sense without denying YHWH's uniqueness.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: נֶאְדָּר
  chosen: majestic
  alternatives:
  - glorious
  - excellent
  lexicon: HALOT
  rationale: Passive/adj-like form from אדר conveying exalted splendor. 'Majestic' is natural modern English and fits the poetic register.
- source_word: בַּקֹּדֶשׁ
  chosen: in holiness
  alternatives:
  - in the holy place
  - in holiness as holiness
  lexicon: HALOT
  rationale: Here קֹדֶשׁ is best taken abstractly, describing YHWH's holy character rather than a location. 'Majestic in holiness' is the most coherent poetic collocation.
- source_word: נוֹרָא
  chosen: feared
  alternatives:
  - awesome
  - fearsome
  lexicon: HALOT
  rationale: From ירא, denoting that which inspires fear/awe. 'Feared' preserves the fear-language more directly than the modern-weakened 'awesome.'
- source_word: תְהִלֹּת
  chosen: in praises
  alternatives:
  - in praise
  - worthy of praises
  - glorious in praises
  lexicon: HALOT
  rationale: Plural noun likely functions in a compressed poetic expression. 'Feared in praises' is somewhat literal and preserves the Hebrew terseness, indicating that even in acts of praise he is awe-inspiring.
- source_word: עֹשֵׂה
  chosen: doing
  alternatives:
  - working
  - performing
  lexicon: HALOT
  rationale: Participle expressing characteristic action; 'doing' keeps the participial force in a compact way.
- source_word: פֶלֶא
  chosen: wonders
  alternatives:
  - wonder
  - marvels
  lexicon: HALOT
  rationale: 'Collective/singular noun rendered idiomatically in English as plural after a participle: ''doing wonders.'''
