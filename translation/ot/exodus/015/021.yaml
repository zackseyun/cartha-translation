id: EXO.15.21
reference: Exodus 15:21
source:
  edition: WLC
  text: וַ/תַּ֥עַן לָ/הֶ֖ם מִרְיָ֑ם שִׁ֤ירוּ לַֽ/יהוָה֙ כִּֽי גָאֹ֣ה גָּאָ֔ה ס֥וּס וְ/רֹכְב֖/וֹ רָמָ֥ה בַ/יָּֽם־׃ס
translation:
  text: 'And Miriam answered them: “Sing to Yahweh, for he has triumphed gloriously; horse and its rider he has thrown into the sea.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Miriam sang responsively to them,' reflecting the verb 'answered' in a musical or antiphonal setting.
    reason: lexical_alternative
  - marker: b
    text: Hebrew, 'he has exalted himself greatly' or 'he is highly exalted'; the translation 'he has triumphed gloriously' captures the idiom in this victory-song context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעַן
  chosen: answered
  alternatives:
  - sang responsively
  - responded
  lexicon: HALOT
  rationale: ענה commonly means 'answer/respond.' In this song context it can imply antiphonal or responsive singing, but 'answered' preserves the base sense while allowing the poetic setting to supply the nuance.
- source_word: לָהֶם
  chosen: them
  alternatives:
  - to them
  lexicon: HALOT
  rationale: The preposition with pronominal suffix is naturally represented in English by 'them' after 'answered.' Although Miriam is addressing women in the immediate context, the Hebrew form here is masculine plural, which can function generically or for a mixed group; the translation preserves the form without over-specifying.
- source_word: מִרְיָם
  chosen: Miriam
  rationale: Personal name transliterated by standard English convention, per translation philosophy.
- source_word: שִׁירוּ
  chosen: Sing
  alternatives:
  - sing praise
  lexicon: HALOT
  rationale: Imperative plural of שׁיר, straightforwardly 'sing.' 'Sing praise' is interpretive and not required by the verb alone.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The divine name יְהוָה is rendered 'the LORD' per the doctrine's contested-terms table.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the imperative; 'for' is idiomatic in elevated English poetry.
- source_word: גָאֹה גָּאָה
  chosen: he has triumphed gloriously
  alternatives:
  - he has highly exalted himself
  - he is greatly exalted
  - he has risen in majesty
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the idea of גאה. In the Song at the Sea, the sense is not merely stative self-exaltation but manifest triumph/majesty in victory. 'Triumphed gloriously' is a well-established and contextually apt rendering that captures the emphatic force without wooden repetition.
- source_word: סוּס
  chosen: horse
  alternatives:
  - the horse
  lexicon: HALOT
  rationale: Singular collective/generic noun. English singular 'horse' works idiomatically in the paired expression.
- source_word: וְרֹכְבוֹ
  chosen: and its rider
  alternatives:
  - and his rider
  - and rider
  lexicon: HALOT
  rationale: The suffix on 'rider' refers back to 'horse.' English idiom favors 'its rider' for the horse-rider pair. This avoids implying a male human antecedent for the suffix.
- source_word: רָמָה
  chosen: he has thrown
  alternatives:
  - he hurled
  - he cast
  lexicon: HALOT
  rationale: The verb denotes throwing/casting. 'Thrown' is the most direct rendering; 'hurled' is vivid but slightly more interpretive. Perfect aspect is represented with English present perfect in this victory song context.
- source_word: בַיָּם
  chosen: into the sea
  alternatives:
  - in the sea
  lexicon: HALOT
  rationale: Although the preposition is literally 'in the sea,' with a verb of throwing English idiom normally uses 'into the sea' to express the resulting motion.
