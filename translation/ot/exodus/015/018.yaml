id: EXO.15.18
reference: Exodus 15:18
source:
  edition: WLC
  text: יְהוָ֥ה יִמְלֹ֖ךְ לְ/עֹלָ֥ם וָ/עֶֽד׀׃
translation:
  text: Yahweh will reign forever and ever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH.'' Traditionally rendered ''the LORD''; alternatively, ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יִמְלֹךְ
  chosen: will reign
  alternatives:
  - reigns
  - shall reign
  - will be king
  lexicon: HALOT
  rationale: 'The Hebrew imperfect of מלך here is best rendered futurally in context: a proclamation of YHWH''s enduring kingship following the victory song. ''Will reign'' is natural modern English and preserves the royal sense better than the more wooden ''will be king.'''
- source_word: לְעֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  - to eternity
  lexicon: HALOT
  rationale: עוֹלָם commonly denotes an unbounded future duration in doxological and royal contexts. 'Forever' is idiomatic modern English and fits the verse's acclamatory style.
- source_word: וָעֶד
  chosen: and ever
  alternatives:
  - and beyond
  - perpetually
  - for evermore
  lexicon: HALOT
  rationale: The collocation לְעֹלָם וָעֶד is a fixed intensifying expression meaning 'forever and ever.' Rendering the second noun separately as 'and ever' preserves the Hebrew emphasis without awkwardness.
