id: EXO.15.6
reference: Exodus 15:6
source:
  edition: WLC
  text: יְמִֽינְ/ךָ֣ יְהוָ֔ה נֶאְדָּרִ֖י בַּ/כֹּ֑חַ יְמִֽינְ/ךָ֥ יְהוָ֖ה תִּרְעַ֥ץ אוֹיֵֽב׃
translation:
  text: Your right hand, O Yahweh, is majestic in power; your right hand, O Yahweh, shatters the enemy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'YHWH'; traditionally rendered 'the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Or 'is glorious in strength.'
    reason: lexical_alternative
  - marker: c
    text: Or 'crushes the enemy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְמִינְךָ
  chosen: your right hand
  alternatives:
  - your right side
  lexicon: HALOT
  rationale: יָמִין literally denotes the right hand/right side. In poetic and martial contexts it commonly signifies strength or victorious action. 'Your right hand' preserves the concrete image and the metaphorical force without paraphrase.
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: נֶאְדָּרִי
  chosen: is majestic
  alternatives:
  - is glorious
  - is splendid
  - is exalted
  lexicon: HALOT
  rationale: From אדר, conveying majesty, glory, or magnificence. 'Is majestic' fits the predicative participial sense and pairs naturally with 'in power,' preserving elevated poetic diction without becoming archaic.
- source_word: בַּכֹּחַ
  chosen: in power
  alternatives:
  - in strength
  - with power
  lexicon: HALOT
  rationale: כֹּחַ denotes strength, power, or might. 'In power' closely reflects the preposition ב plus noun and works idiomatically with 'majestic,' yielding 'majestic in power' rather than a looser dynamic rendering.
- source_word: תִּרְעַץ
  chosen: shatters
  alternatives:
  - crushes
  - smashes
  - breaks
  lexicon: HALOT
  rationale: From רָעַץ, to smash, crush, or shatter. 'Shatters' preserves the violent, decisive force of the verb in this victory song and sounds natural in English poetry.
- source_word: אוֹיֵב
  chosen: the enemy
  alternatives:
  - an enemy
  - foe
  lexicon: HALOT
  rationale: Although formally singular, אוֹיֵב can function collectively. 'The enemy' is idiomatic and suits the Exodus context of Egypt as the hostile force. It preserves the singular form without awkwardness.
