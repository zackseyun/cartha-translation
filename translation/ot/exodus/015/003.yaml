id: EXO.15.3
reference: Exodus 15:3
source:
  edition: WLC
  text: יְהוָ֖ה אִ֣ישׁ מִלְחָמָ֑ה יְהוָ֖ה שְׁמֽ/וֹ׃
translation:
  text: Yahweh is a warrior; Yahweh is his name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew YHWH; alternatively rendered 'Yahweh' or 'Jehovah.'
    reason: alternative_reading
  - marker: b
    text: Or 'The LORD is a warrior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - warrior
  - husband
  - person
  lexicon: HALOT
  rationale: The noun literally means 'man' and, per the translation philosophy, gender-accurate renderings are preferred where they match the source. Here the phrase is a predicative nominal expression ('a man of war'), and retaining 'man' preserves the Hebrew imagery more directly than the interpretive gloss 'warrior.'
- source_word: מִלְחָמָה
  chosen: war
  alternatives:
  - battle
  - warfare
  lexicon: HALOT
  rationale: The noun denotes war or warfare. 'War' best fits the compact Hebrew expression אִישׁ מִלְחָמָה and preserves the force of the traditional idiom 'man of war' without unnecessary expansion.
- source_word: שְׁמוֹ
  chosen: is his name
  alternatives:
  - his name is the LORD
  - that is his name
  lexicon: HALOT
  rationale: The Hebrew is a verbless clause, literally 'YHWH his name.' In English, 'is' must be supplied. Rendering it as 'the LORD is his name' preserves the fronting of the divine name and the emphatic identification, while remaining natural English.
