theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh / O Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering קָנִיתָ in covenantal context
  chosen_reading: you acquired
  alternative_readings:
  - you purchased
  - you redeemed
  - you created
  rationale: The verse speaks of Israel as the people YHWH has made his own. 'Acquired' best reflects the lexical value of קנה without over-specifying a doctrine of redemption in a clause that does not use the standard redemption verbs. This preserves theological nuance rather than resolving it beyond the Hebrew.
