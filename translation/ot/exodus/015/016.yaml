id: EXO.15.16
reference: Exodus 15:16
source:
  edition: WLC
  text: תִּפֹּ֨ל עֲלֵי/הֶ֤ם אֵימָ֨תָ/ה֙ וָ/פַ֔חַד בִּ/גְדֹ֥ל זְרוֹעֲ/ךָ֖ יִדְּמ֣וּ כָּ/אָ֑בֶן עַד יַעֲבֹ֤ר עַמְּ/ךָ֙ יְהוָ֔ה עַֽד יַעֲבֹ֖ר עַם ז֥וּ קָנִֽיתָ־־־׃
translation:
  text: Terror and dread will fall on them; by the greatness of your arm they will be still as a stone, until your people pass by, O Yahweh, until this people whom you acquired pass by.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will be silent' or 'they will be motionless' for 'they will be still.'
    reason: lexical_alternative
  - marker: b
    text: Or 'until your people cross over ... until this people whom you acquired cross over.'
    reason: lexical_alternative
  - marker: c
    text: '''You acquired'' may also be rendered ''you purchased'' or, in a broader covenantal sense, ''you made your own.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּפֹּל
  chosen: will fall
  alternatives:
  - may fall
  - falls
  lexicon: HALOT
  rationale: Qal imperfect 3fs from נפל with feminine singular subject following (אֵימָתָה וָפַחַד treated collectively/with first noun governing the verbal agreement). Future sense fits the song's predictive declaration about the nations.
- source_word: אֵימָתָה
  chosen: terror
  alternatives:
  - dread
  - terror
  lexicon: HALOT
  rationale: Denotes terror or horror. 'Terror' pairs well with the following פַחַד as a near-synonymous intensification without collapsing both into the same English word.
- source_word: וָפַחַד
  chosen: and dread
  alternatives:
  - and פחד/fear
  - and terror
  lexicon: HALOT
  rationale: פחד commonly means fear/dread. 'Dread' distinguishes it from אֵימָה while preserving the poetic hendiadys-like parallelism.
- source_word: בִּגְדֹל זְרוֹעֲךָ
  chosen: by the greatness of your arm
  alternatives:
  - because of the greatness of your arm
  - through your mighty arm
  lexicon: HALOT
  rationale: ב marks the basis or means; 'by the greatness of your arm' preserves the metaphor and the formal structure. 'Arm' is a common biblical image for power and should be retained rather than paraphrased as 'power' in the main text.
- source_word: יִדְּמוּ
  chosen: they will be still
  alternatives:
  - they will be silent
  - they will be motionless
  - they will be stunned
  lexicon: HALOT
  rationale: From דמם/דםם in Qal, conveying being still, silent, or motionless. In context with 'as a stone,' the sense is paralysis or stunned stillness. 'Be still' preserves the lexical breadth and the poetic image.
- source_word: כָּאָבֶן
  chosen: as a stone
  alternatives:
  - like stone
  - like a rock
  lexicon: HALOT
  rationale: Simile with כ plus אבן. 'As a stone' is the most direct rendering and preserves the poetic comparison.
- source_word: עַד יַעֲבֹר
  chosen: until ... pass by
  alternatives:
  - until ... cross over
  - until ... pass through
  lexicon: HALOT
  rationale: עבר in this context refers to passing by/through in the course of Israel's advance. 'Pass by' is idiomatic and fits the repeated refrain; 'cross over' is possible but can sound overly tied to crossing water specifically, whereas the verse broadens to the nations' reaction as Israel proceeds.
- source_word: עַמְּךָ
  chosen: your people
  alternatives:
  - your nation
  lexicon: HALOT
  rationale: עם regularly means 'people' in covenantal-national contexts. 'Your people' preserves the relational force between the LORD and Israel.
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עַם זוּ
  chosen: this people
  alternatives:
  - the people
  - this nation
  lexicon: HALOT
  rationale: זו functions demonstratively, 'this.' 'This people' preserves the demonstrative emphasis and the parallel with 'your people.'
- source_word: קָנִיתָ
  chosen: you acquired
  alternatives:
  - you purchased
  - you redeemed
  - you created
  - you made your own
  lexicon: HALOT
  rationale: קנה fundamentally means acquire/buy/possess. In this salvation-historical context it can carry covenantal possession language. 'Acquired' is broad and textually grounded, avoiding importing the more specific theological term 'redeemed' where גאל/פדה are not used in this clause.
