theological_decisions:
- issue: Referent of singular pronominal suffixes in לּוֹ and נִסָּהוּ
  chosen_reading: Collective reference to Israel, rendered in English as plural 'them'
  alternative_readings:
  - Singular 'him,' referring to Israel as a corporate singular people
  - Singular 'him,' referring to Moses
  rationale: The immediate and broader context concerns the people of Israel at Marah. Hebrew can use singular pronominal forms for a collective entity, but English reads more naturally and accurately with plural reference here. Referring the suffixes to Moses would narrow the scope too much, especially for 'he tested them/him,' which in context concerns Israel's testing at Marah.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal equivalence with documented exception
- issue: Nature of חֹק וּמִשְׁפָּט
  chosen_reading: Legal/covenantal terms rendered concretely as 'a statute and a judgment'
  alternative_readings:
  - '''a statute and an ordinance'''
  - '''decree and law'''
  rationale: The phrase likely signals an initial covenantal/legal arrangement at Marah. The translation avoids over-specifying a full Sinai-style lawgiving while preserving the juridical force of the Hebrew terms.
