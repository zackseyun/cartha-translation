id: EXO.15.25
reference: Exodus 15:25
source:
  edition: WLC
  text: וַ/יִּצְעַ֣ק אֶל יְהוָ֗ה וַ/יּוֹרֵ֤/הוּ יְהוָה֙ עֵ֔ץ וַ/יַּשְׁלֵךְ֙ אֶל הַ/מַּ֔יִם וַֽ/יִּמְתְּק֖וּ הַ/מָּ֑יִם שָׁ֣ם שָׂ֥ם ל֛/וֹ חֹ֥ק וּ/מִשְׁפָּ֖ט וְ/שָׁ֥ם נִסָּֽ/הוּ־־׃
translation:
  text: So he cried out to Yahweh, and Yahweh showed him a piece of wood. He threw it into the water, and the water became sweet. There he made for them a statute and a judgment, and there he tested them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a piece of wood' or 'wood.' The Hebrew עֵץ can refer either to a tree or to wood.
    reason: lexical_alternative
  - marker: b
    text: Hebrew has singular pronouns ('for him' / 'tested him'), likely referring to Israel as a collective people; English renders the sense as plural 'them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצְעַק
  chosen: cried out
  alternatives:
  - called out
  lexicon: HALOT
  rationale: The verb צעק commonly denotes a strong cry for help, not a casual speech act. 'Cried out' preserves the urgency of Moses' appeal.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיּוֹרֵהוּ
  chosen: showed him
  alternatives:
  - instructed him
  - pointed out to him
  lexicon: HALOT
  rationale: From ירה in the Hiphil, the sense here is to cause to see or indicate. In context, God reveals a specific object to Moses. 'Showed him' is the most natural English rendering; 'instructed him' is possible but less immediate in this narrative setting.
- source_word: עֵץ
  chosen: a tree
  alternatives:
  - a piece of wood
  - wood
  lexicon: HALOT
  rationale: עֵץ can denote tree or wood. Since the text presents a visible object that is then thrown into the water, 'a tree' is the more straightforward lexical rendering, while 'wood' remains a plausible alternative preserved in a footnote.
- source_word: וַיַּשְׁלֵךְ
  chosen: threw
  alternatives:
  - cast
  lexicon: HALOT
  rationale: '''Threw'' is clear modern English and accurately reflects the force of שלך without archaic tone.'
- source_word: הַמַּיִם
  chosen: the water
  alternatives:
  - the waters
  lexicon: HALOT
  rationale: Though morphologically plural in Hebrew, מַיִם is idiomatically rendered as singular 'water' in English in this context.
- source_word: וַיִּמְתְּקוּ
  chosen: became sweet
  alternatives:
  - were made sweet
  - became fresh
  lexicon: HALOT
  rationale: The verb מתק means to become sweet. In context of bitter water at Marah, 'became sweet' preserves the lexical image and the transformation. 'Fresh' interprets the result but is less literal.
- source_word: שָׁם
  chosen: There
  alternatives:
  - At that place
  lexicon: HALOT
  rationale: The adverb marks location emphatically in the narrative. 'There' is concise and natural.
- source_word: שָׂם
  chosen: made
  alternatives:
  - set
  - established
  lexicon: HALOT
  rationale: The verb שׂים literally means 'put/set,' but with חֹק וּמִשְׁפָּט the idiomatic sense is that God instituted or made something for Israel. 'Made' is natural while remaining close to the Hebrew.
- source_word: לּוֹ
  chosen: for them
  alternatives:
  - for him
  - for it
  lexicon: HALOT
  rationale: Although the suffix is singular, it often functions collectively for Israel as a people in context. English requires the sense to be made explicit; 'for them' best reflects the referent, the people just mentioned in the surrounding narrative.
- source_word: חֹק
  chosen: a statute
  alternatives:
  - a decree
  - an ordinance
  lexicon: HALOT
  rationale: חֹק often denotes a prescribed statute or fixed ordinance. 'Statute' preserves the legal nuance.
- source_word: וּמִשְׁפָּט
  chosen: and a judgment
  alternatives:
  - and a rule
  - and an ordinance
  - and justice
  lexicon: HALOT
  rationale: מִשְׁפָּט has a broad semantic range including judgment, justice, and legal decision. Here paired with חֹק, it likely refers to a legal ruling or norm. 'Judgment' keeps the lexical connection while remaining readable.
- source_word: נִסָּהוּ
  chosen: he tested them
  alternatives:
  - he proved them
  - he put them to the test
  lexicon: HALOT
  rationale: נסה means to test or prove. The singular suffix/object again refers collectively to Israel. 'He tested them' is clear modern English and fits the covenantal context.
