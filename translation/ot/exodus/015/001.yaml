id: EXO.15.1
reference: Exodus 15:1
source:
  edition: WLC
  text: אָ֣ז יָשִֽׁיר מֹשֶׁה֩ וּ/בְנֵ֨י יִשְׂרָאֵ֜ל אֶת הַ/שִּׁירָ֤ה הַ/זֹּאת֙ לַֽ/יהוָ֔ה וַ/יֹּאמְר֖וּ לֵ/אמֹ֑ר אָשִׁ֤ירָה לַֽ/יהוָה֙ כִּֽי גָאֹ֣ה גָּאָ֔ה ס֥וּס וְ/רֹכְב֖/וֹ רָמָ֥ה בַ/יָּֽם־־־׃
translation:
  text: 'Then Moses and the sons of Israel sang this song to Yahweh, and they said: “I will sing to Yahweh, for he has triumphed gloriously; horse and its rider he has thrown into the sea.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH'' (traditionally rendered ''the LORD''; alternatively ''Yahweh'').'
    reason: alternative_reading
  - marker: b
    text: Or 'he is highly exalted'; the Hebrew intensifies the verb with a repeated form.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal discourse marker introducing the song after the sea crossing; 'Then' is natural English and preserves sequence.
- source_word: יָשִׁיר
  chosen: sang
  alternatives:
  - will sing
  - began to sing
  lexicon: HALOT
  rationale: Though morphologically an imperfect, in narrative with אָז it commonly has preterite force. English past tense best reflects the event in context. 'Began to sing' is interpretive and less direct.
- source_word: וּבְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Chosen for gender-accurate fidelity to the Hebrew expression while remaining understandable. 'Israelites' is smoother but less formally transparent; 'children of Israel' is traditional but can suggest age rather than descent.
- source_word: הַשִּׁירָה הַזֹּאת
  chosen: this song
  alternatives:
  - this song of praise
  lexicon: HALOT
  rationale: Direct rendering of the demonstrative phrase without adding interpretive content such as 'of praise.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' in the main text, following the stated default.
- source_word: וַיֹּאמְרוּ לֵאמֹר
  chosen: and they said, saying
  alternatives:
  - and they sang
  - and they said
  lexicon: HALOT
  rationale: Retains the emphatic introductory formula with some formal transparency. Hebrew uses a speech-introduction before the quoted song; preserving 'saying' keeps that structure visible.
- source_word: אָשִׁירָה
  chosen: I will sing
  alternatives:
  - Let me sing
  - I sing
  lexicon: HALOT
  rationale: 'Cohortative first person singular naturally expresses resolve: ''I will sing.'' This also preserves the shift from plural introduction to singular poetic voice.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for singing; 'for' is concise and idiomatic in elevated English.
- source_word: גָאֹה גָּאָה
  chosen: he has triumphed gloriously
  alternatives:
  - he has highly exalted himself
  - he is greatly exalted
  - he has risen in majesty
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verbal idea. In this context of victory at the sea, 'triumphed gloriously' captures both exaltation and military victory in idiomatic English.
- source_word: סוּס וְרֹכְבוֹ
  chosen: horse and its rider
  alternatives:
  - the horse and its rider
  - horse and rider
  lexicon: HALOT
  rationale: Collective-singular poetic expression. 'Horse and its rider' preserves the singular Hebrew and the possessive suffix. Omission of the article keeps the poetic terseness.
- source_word: רָמָה
  chosen: he has thrown
  alternatives:
  - he hurled
  - he cast
  lexicon: HALOT
  rationale: Conveys forceful casting into the sea. 'Thrown' is clear modern English; 'hurled' is possible but slightly more interpretive in intensity.
- source_word: בַיָּם
  chosen: into the sea
  alternatives:
  - in the sea
  lexicon: HALOT
  rationale: With the verb 'throw,' English idiom prefers 'into the sea,' expressing motion implied by the action though the Hebrew preposition is simply 'in/into' by context.
