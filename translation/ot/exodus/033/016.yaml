id: EXO.33.16
reference: Exodus 33:16
source:
  edition: WLC
  text: וּ/בַ/מֶּ֣ה יִוָּדַ֣ע אֵפ֗וֹא כִּֽי מָצָ֨אתִי חֵ֤ן בְּ/עֵינֶ֨י/ךָ֙ אֲנִ֣י
    וְ/עַמֶּ֔/ךָ הֲ/ל֖וֹא בְּ/לֶכְתְּ/ךָ֣ עִמָּ֑/נוּ וְ/נִפְלֵ֨ינוּ֙ אֲנִ֣י וְ/עַמְּ/ךָ֔
    מִ/כָּ֨ל הָ/עָ֔ם אֲשֶׁ֖ר עַל פְּנֵ֥י הָ/אֲדָמָֽה׀־־־׃פ
translation:
  text: For how then will it be known that I have found favor in your sight, I and
    your people? Is it not by your going with us, so that I and your people are distinguished
    from every people who are on the face of the earth?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'set apart' or 'made distinct.' The Hebrew verb can convey being marked
      out as extraordinary or separate from others.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַמֶּה
  chosen: For how
  alternatives:
  - And by what
  - By what
  lexicon: HALOT
  rationale: Introduces Moses' rhetorical question with a connective plus interrogative.
    'For how' captures both the linkage to the previous verse and the sense of asking
    by what means this will be evident.
- source_word: יִוָּדַע
  chosen: will it be known
  alternatives:
  - shall it be known
  - will it become known
  lexicon: HALOT
  rationale: Niphal imperfect of ידע is naturally passive/reflexive. 'Will it be known'
    is idiomatic English and preserves the passive sense.
- source_word: אֵפוֹא
  chosen: then
  alternatives:
  - now
  - indeed
  lexicon: HALOT
  rationale: 'This particle adds inferential or emphatic force. ''Then'' fits the
    argumentative flow: if God does not go with them, how will his favor be recognized?'
- source_word: כִּי מָצָאתִי חֵן בְּעֵינֶיךָ
  chosen: that I have found favor in your sight
  alternatives:
  - that I have found grace in your eyes
  - that I have found favor in your eyes
  lexicon: HALOT
  rationale: A standard Hebrew idiom for receiving favorable regard. 'Favor' is clearer
    in modern English than 'grace' here, and 'in your sight' is a natural equivalent
    of the idiom while preserving its relational sense.
- source_word: אֲנִי וְעַמֶּךָ
  chosen: I and your people
  alternatives:
  - I and your people together
  lexicon: HALOT
  rationale: The explicit pairing is retained because Moses intercedes not only for
    himself but for the covenant people with him.
- source_word: הֲלוֹא
  chosen: Is it not
  alternatives:
  - Is it not indeed
  - Surely it is
  lexicon: HALOT
  rationale: Marks a rhetorical question expecting agreement. 'Is it not' preserves
    the interrogative force better than flattening it into an assertion.
- source_word: בְּלֶכְתְּךָ עִמָּנוּ
  chosen: by your going with us
  alternatives:
  - by your walking with us
  - when you go with us
  lexicon: HALOT
  rationale: The infinitive construct with preposition expresses means or circumstance.
    'By your going with us' best fits the preceding question about how God's favor
    will be recognized.
- source_word: וְנִפְלֵינוּ
  chosen: so that I and your people are distinguished
  alternatives:
  - and we are set apart
  - and we are made wonderful
  - and we are separated
  lexicon: HALOT
  rationale: From פלא in the Niphal, the sense here is being marked out as extraordinary
    or distinct from others. 'Are distinguished' communicates covenantal distinctiveness
    in clear English without overinterpreting the mechanism.
- source_word: מִכָּל הָעָם
  chosen: from every people
  alternatives:
  - from all the people
  - from every nation
  lexicon: HALOT
  rationale: Though singular in Hebrew, עָם here is collective. 'Every people' preserves
    the distributive sense better than 'all the people,' which could sound like one
    group.
- source_word: אֲשֶׁר עַל פְּנֵי הָאֲדָמָה
  chosen: who are on the face of the earth
  alternatives:
  - who are upon the face of the ground
  - on the face of the land
  lexicon: HALOT
  rationale: This is a common Hebrew expression for all peoples inhabiting the earth.
    'Earth' is preferable to 'ground' here because the reference is global, not local
    soil.
