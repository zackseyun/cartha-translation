id: EXO.33.9
reference: Exodus 33:9
source:
  edition: WLC
  text: וְ/הָיָ֗ה כְּ/בֹ֤א מֹשֶׁה֙ הָ/אֹ֔הֱלָ/ה יֵרֵד֙ עַמּ֣וּד הֶֽ/עָנָ֔ן וְ/עָמַ֖ד
    פֶּ֣תַח הָ/אֹ֑הֶל וְ/דִבֶּ֖ר עִם מֹשֶֽׁה־׃
translation:
  text: And whenever Moses entered the tent, the pillar of cloud would descend and
    stand at the entrance of the tent, and he would speak with Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'and the LORD would speak with Moses.' The Hebrew leaves
      the subject implicit in this clause, though the context identifies it as the
      LORD.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  chosen: And whenever
  alternatives:
  - And it happened
  - And it would happen
  lexicon: HALOT
  rationale: The waw + qatal of היה introduces a customary or repeated circumstance
    in narrative. 'And whenever' captures the iterative sense naturally in English
    better than the more wooden 'and it happened'.
- source_word: כְּבֹא
  chosen: entered
  alternatives:
  - came into
  - went into
  lexicon: HALOT
  rationale: The infinitive construct with כ marks the time clause, 'when/as Moses
    entered.' 'Entered' is concise and idiomatic for בוא with a directional ending.
- source_word: הָאֹהֱלָה / הָאֹהֶל
  chosen: the tent
  alternatives:
  - the Tent
  - the tent of meeting
  lexicon: HALOT
  rationale: The Hebrew here says simply 'the tent,' not the fuller expression 'tent
    of meeting.' Since the immediate context has already identified this tent, 'the
    tent' preserves the source wording without importing the longer title. Capitalized
    'Tent' is possible as a contextual designation, but lowercase is retained to avoid
    adding interpretive weight not explicit in the verse.
- source_word: יֵרֵד
  chosen: would descend
  alternatives:
  - descended
  - comes down
  lexicon: HALOT
  rationale: The yiqtol here fits the habitual sense established by וְהָיָה כְּבֹא.
    'Would descend' communicates repeated action in past narrative.
- source_word: עַמּוּד הֶעָנָן
  chosen: the pillar of cloud
  alternatives:
  - the cloud pillar
  lexicon: HALOT
  rationale: This is the standard and transparent rendering of the construct phrase,
    preserving the concrete imagery.
- source_word: וְעָמַד
  chosen: and stand
  alternatives:
  - and would stand
  - and took its stand
  lexicon: HALOT
  rationale: Following 'would descend,' the coordinated verb continues the habitual
    sequence. English can idiomatically use 'would descend and stand'; this avoids
    overloading the sentence with repeated auxiliaries while preserving the repeated
    action.
- source_word: פֶּתַח הָאֹהֶל
  chosen: at the entrance of the tent
  alternatives:
  - at the doorway of the tent
  - at the opening of the tent
  lexicon: HALOT
  rationale: '''Entrance'' is natural modern English for פתח in this spatial sense
    and preserves the image of the tent''s opening.'
- source_word: וְדִבֶּר
  chosen: and he would speak
  alternatives:
  - and it would speak
  - and the LORD would speak
  lexicon: HALOT
  rationale: The verb is singular masculine with no explicit subject stated in this
    clause. Contextually, the subject is the LORD speaking from the pillar/cloud presence,
    but the Hebrew leaves it implicit. Rendering 'he' preserves the Hebrew's implicit
    subject while allowing the context to identify the referent.
- source_word: עִם מֹשֶׁה
  chosen: with Moses
  alternatives:
  - to Moses
  lexicon: HALOT
  rationale: עם normally means 'with,' and in this context it conveys personal communication.
    'With Moses' preserves the relational nuance better than the more one-directional
    'to Moses'.
