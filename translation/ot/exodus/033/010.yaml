theological_decisions:
- issue: Rendering the people's response to the visible sign of divine presence
  chosen_reading: worshiped
  alternative_readings:
  - bowed down
  - prostrated themselves
  rationale: The Hebrew verb can denote the bodily act of bowing, but in this context
    the act is clearly reverential response to the LORD's manifested presence. 'Worshiped'
    communicates the theological force without denying the bodily posture; the physical
    alternatives are preserved in a footnote.
  doctrine_reference: Translation philosophy §3, §6
