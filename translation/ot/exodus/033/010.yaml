id: EXO.33.10
reference: Exodus 33:10
source:
  edition: WLC
  text: וְ/רָאָ֤ה כָל הָ/עָם֙ אֶת עַמּ֣וּד הֶֽ/עָנָ֔ן עֹמֵ֖ד פֶּ֣תַח הָ/אֹ֑הֶל וְ/קָ֤ם
    כָּל הָ/עָם֙ וְ/הִֽשְׁתַּחֲוּ֔וּ אִ֖ישׁ פֶּ֥תַח אָהֳלֽ/וֹ־־־׃
translation:
  text: When all the people saw the pillar of cloud standing at the entrance of the
    tent, all the people rose and worshiped, each man at the entrance of his tent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bowed down' or 'prostrated themselves'; the Hebrew verb refers to a
      bodily act of reverence and often functions as an act of worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָה
  chosen: When ... saw
  alternatives:
  - and ... saw
  - then ... saw
  lexicon: HALOT
  rationale: The waw-consecutive with qatal advances the narrative. In English, rendering
    it as 'When ... saw' best captures the temporal sense created by the following
    actions ('rose and worshiped') while remaining natural narrative English.
- source_word: כָל הָעָם
  chosen: all the people
  alternatives:
  - all the people of Israel
  - the whole people
  lexicon: HALOT
  rationale: The phrase refers collectively to the assembled Israelite community.
    'All the people' is a direct and natural rendering without importing 'of Israel,'
    which is not explicit in this verse.
- source_word: עַמּוּד הֶעָנָן
  chosen: the pillar of cloud
  alternatives:
  - the cloud pillar
  lexicon: HALOT
  rationale: This is the standard and transparent rendering of the construct phrase,
    preserving the concrete imagery of the visible sign of divine presence.
- source_word: עֹמֵד
  chosen: standing
  alternatives:
  - stationed
  - remaining
  lexicon: HALOT
  rationale: The participle describes the pillar's position. 'Standing' is the most
    straightforward English equivalent and fits the visual scene.
- source_word: פֶּתַח הָאֹהֶל
  chosen: at the entrance of the tent
  alternatives:
  - at the doorway of the tent
  - at the entrance to the tent
  lexicon: HALOT
  rationale: פֶּתַח denotes an opening/entrance. 'Entrance' is clear modern English.
    'The tent' refers to the tent of meeting in context; retaining 'tent' rather than
    expanding to 'tent of meeting' avoids adding words not present in this verse.
- source_word: וְקָם
  chosen: rose
  alternatives:
  - stood up
  - got up
  lexicon: HALOT
  rationale: The verb conveys rising to one's feet in response to the sight of the
    pillar. 'Rose' is concise and suitably dignified in narrative context.
- source_word: וְהִשְׁתַּחֲווּ
  chosen: worshiped
  alternatives:
  - bowed down
  - prostrated themselves
  lexicon: HALOT
  rationale: The verb often denotes bowing low in reverence before God. Here the act
    is directed toward divine presence, so 'worshiped' captures the religious force.
    The more physical alternatives are possible and worth preserving in a footnote.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - everyone
  lexicon: HALOT
  rationale: The Hebrew is singular masculine distributive, referring to each individual
    in the group. Per the gender-accurate philosophy, 'each man' preserves the source
    form better than a gender-neutral smoothing.
- source_word: פֶּתַח אָהֳלוֹ
  chosen: at the entrance of his tent
  alternatives:
  - at the doorway of his tent
  lexicon: HALOT
  rationale: This repeats the earlier entrance language but now with the possessive
    suffix. 'At the entrance of his tent' preserves the distributive picture of each
    person worshiping from his own tent opening.
