theological_decisions:
- issue: Covenantal nuance in the closing clause
  chosen_reading: that this nation is your people
  alternative_readings:
  - that this people is your people
  - that this nation is your nation
  rationale: The Hebrew uses both גּוֹי ('nation') and עַם ('people'). The translation
    preserves both ideas rather than flattening them into one term. This avoids importing
    extra theological claims while keeping the covenantal appeal Moses makes.
  doctrine_reference: Translation philosophy §§1, 5
