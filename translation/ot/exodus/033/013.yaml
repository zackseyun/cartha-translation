id: EXO.33.13
reference: Exodus 33:13
source:
  edition: WLC
  text: וְ/עַתָּ֡ה אִם נָא֩ מָצָ֨אתִי חֵ֜ן בְּ/עֵינֶ֗י/ךָ הוֹדִעֵ֤/נִי נָא֙ אֶת דְּרָכֶ֔/ךָ
    וְ/אֵדָ֣עֲ/ךָ֔ לְמַ֥עַן אֶמְצָא חֵ֖ן בְּ/עֵינֶ֑י/ךָ וּ/רְאֵ֕ה כִּ֥י עַמְּ/ךָ֖
    הַ/גּ֥וֹי הַ/זֶּֽה־־־׃
translation:
  text: Now therefore, if I have found favor in your eyes, please make your ways known
    to me, so that I may know you, in order that I may find favor in your eyes. And
    consider that this nation is your people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'show me your way.' The Hebrew has the plural 'your ways,' but some
      English versions smooth it to the singular for style.
    reason: lexical_alternative
  - marker: b
    text: 'Or, ''see'' or ''look.'' Here the sense is idiomatic: ''take notice'' or
      ''consider.'''
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: ''this nation.'' The clause also says ''your people,'' preserving
      both national and covenantal language.'
    reason: cultural_note
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now therefore
  alternatives:
  - Now
  - And now
  lexicon: HALOT
  rationale: Marks a transition and inference from the preceding context; 'now therefore'
    captures both the temporal and argumentative force better than a bare 'now'.
- source_word: נָא
  chosen: please
  alternatives:
  - I pray
  - please now
  lexicon: HALOT
  rationale: Polite particle expressing entreaty. Modern English 'please' conveys
    the tone naturally without archaism.
- source_word: מָצָאתִי חֵן בְּעֵינֶיךָ
  chosen: I have found favor in your eyes
  alternatives:
  - I have found favor with you
  - I have found grace in your sight
  lexicon: HALOT
  rationale: Retains the Hebrew idiom 'in your eyes' for transparency while remaining
    understandable. 'Favor' is preferable to 'grace' here because the context is interpersonal
    acceptance rather than a developed theological category.
- source_word: הוֹדִעֵנִי
  chosen: make ... known to me
  alternatives:
  - show me
  - teach me
  lexicon: HALOT
  rationale: Hiphil of ידע means to cause to know or make known. 'Make known to me'
    is more lexically precise than 'show me,' while still natural in English.
- source_word: דְּרָכֶךָ
  chosen: your ways
  alternatives:
  - your way
  - your path
  lexicon: HALOT
  rationale: The Hebrew form is plural. 'Your ways' can denote God's manner of acting
    or dealings, fitting Moses' request to understand how God will proceed.
- source_word: וְאֵדָעֲךָ
  chosen: so that I may know you
  alternatives:
  - that I may know you
  - and I will know you
  lexicon: HALOT
  rationale: Taken as purpose/result following the request. 'Know you' preserves the
    personal relational sense, not merely cognitive information.
- source_word: לְמַעַן אֶמְצָא חֵן בְּעֵינֶיךָ
  chosen: in order that I may find favor in your eyes
  alternatives:
  - so that I may find favor with you
  - that I may continue to find favor in your sight
  lexicon: HALOT
  rationale: לְמַעַן marks purpose. Repeating 'find favor in your eyes' preserves
    the Hebrew repetition, which is rhetorically significant in Moses' plea.
- source_word: וּרְאֵה
  chosen: consider
  alternatives:
  - see
  - look
  lexicon: HALOT
  rationale: Imperative of ראה here functions idiomatically as a request to take notice
    or give regard, not merely physical seeing. 'Consider' best conveys the discourse
    function in English.
- source_word: כִּי עַמְּךָ הַגּוֹי הַזֶּה
  chosen: that this nation is your people
  alternatives:
  - that this nation is your nation
  - that this people is your people
  lexicon: HALOT
  rationale: Though גּוֹי often means 'nation,' the phrase is covenantal in force
    because it is paired with 'your people.' Rendering עַם explicitly as 'people'
    preserves that covenant nuance while retaining גּוֹי as 'nation' for lexical transparency.
