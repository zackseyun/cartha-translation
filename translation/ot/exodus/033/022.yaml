id: EXO.33.22
reference: Exodus 33:22
source:
  edition: WLC
  text: וְ/הָיָה֙ בַּ/עֲבֹ֣ר כְּבֹדִ֔/י וְ/שַׂמְתִּ֖י/ךָ בְּ/נִקְרַ֣ת הַ/צּ֑וּר וְ/שַׂכֹּתִ֥י
    כַפִּ֛/י עָלֶ֖י/ךָ עַד עָבְרִֽ/י־׃
translation:
  text: And when my glory passes by, I will put you in a cleft of the rock, and I
    will cover you with my hand until I have passed by.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the cleft of the rock.' The Hebrew can be rendered with either definite
      or indefinite English on 'cleft.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And when
  alternatives:
  - and it shall be
  - and it will happen
  lexicon: HALOT
  rationale: Here the prefixed conjunction plus היה introduces the circumstance for
    what follows rather than standing well in English as a separate clause. Rendering
    it with a temporal sense ('And when') captures the idiomatic force in context
    with the following infinitive construct.
- source_word: בַּעֲבֹר
  chosen: passes by
  alternatives:
  - in passing
  - when ... passes
  lexicon: HALOT
  rationale: The preposition ב with the infinitive construct of עבר expresses temporal
    circumstance, 'when ... passes by' or 'in the passing of.' English finite verbal
    expression is most natural here.
- source_word: כְּבֹדִי
  chosen: my glory
  alternatives:
  - my splendor
  - my honor
  lexicon: HALOT
  rationale: כבוד in this theophanic context refers to the manifested divine glory,
    not merely honor or reputation. 'My glory' is the standard and contextually precise
    rendering.
- source_word: וְשַׂמְתִּיךָ
  chosen: I will put you
  alternatives:
  - I will place you
  - I will set you
  lexicon: HALOT
  rationale: שׂים commonly means put/place/set. 'Put you' is natural modern English
    and preserves the directness of the divine action.
- source_word: בְּנִקְרַת הַצּוּר
  chosen: in a cleft of the rock
  alternatives:
  - in the cleft of the rock
  - in a fissure of the rock
  lexicon: HALOT
  rationale: נִקְרָה denotes a cleft or fissure. Because the noun is in construct
    with the definite 'rock,' English idiom can be either definite or indefinite on
    the first noun. 'A cleft of the rock' reads naturally while preserving the sense
    of a specific rocky recess.
- source_word: הַצּוּר
  chosen: the rock
  alternatives:
  - the crag
  lexicon: HALOT
  rationale: The definite article is explicit. In this immediate physical setting,
    'rock' is preferable to more figurative or elevated alternatives.
- source_word: וְשַׂכֹּתִי
  chosen: I will cover
  alternatives:
  - I will shelter
  - I will screen
  lexicon: HALOT
  rationale: The verb סכך conveys covering or shielding. 'Cover' keeps the concrete
    imagery and allows the following 'with my hand' to remain vivid.
- source_word: כַפִּי
  chosen: my hand
  alternatives:
  - my palm
  lexicon: HALOT
  rationale: Though כף can denote palm, in anthropomorphic divine language 'my hand'
    is the most natural and established English rendering, preserving the bodily metaphor
    without over-specifying anatomy.
- source_word: עָלֶיךָ
  chosen: you
  alternatives:
  - over you
  - upon you
  lexicon: HALOT
  rationale: The preposition על is semantically carried into the English verbal phrase
    'cover you.' A more literal 'cover over you' would be awkward; the object relation
    is preserved idiomatically.
- source_word: עַד עָבְרִי
  chosen: until I have passed by
  alternatives:
  - until I pass by
  - until my passing by
  lexicon: HALOT
  rationale: The preposition עַד with infinitive construct plus first-person suffix
    marks the endpoint of the covering. 'Until I have passed by' makes the sequence
    clear in English and reflects completed action relative to the covering.
