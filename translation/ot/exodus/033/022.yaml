theological_decisions:
- issue: Anthropomorphic language for God ('my hand')
  chosen_reading: Retain the concrete anthropomorphic expression 'my hand' in the
    main text.
  alternative_readings:
  - my protection
  - my power
  rationale: The Hebrew uses bodily imagery directly. Per translation philosophy,
    the text's imagery should be preserved rather than paraphrased into an abstract
    theological explanation. This maintains the narrative force of the theophany without
    making unwarranted doctrinal claims about divine corporeality.
  doctrine_reference: Translation philosophy §§1, 3, 6
