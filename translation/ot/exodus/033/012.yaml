theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH. No verse-specific reason overrides that default here.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of 'I know you by name'
  chosen_reading: Retain the relational idiom without expanding it into theological
    paraphrase
  alternative_readings:
  - I know you personally
  - I have chosen you personally
  rationale: The verse expresses personal divine knowledge and favor, but the Hebrew
    does not explicitly state election or covenant status beyond the idiom itself.
    The translation preserves the theological weight without importing a stronger
    doctrinal claim.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
