id: EXO.33.12
reference: Exodus 33:12
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר מֹשֶׁ֜ה אֶל יְהוָ֗ה רְ֠אֵה אַתָּ֞ה אֹמֵ֤ר אֵלַ/י֙ הַ֚עַל אֶת הָ/עָ֣ם
    הַ/זֶּ֔ה וְ/אַתָּה֙ לֹ֣א הֽוֹדַעְתַּ֔/נִי אֵ֥ת אֲשֶׁר תִּשְׁלַ֖ח עִמִּ֑/י וְ/אַתָּ֤ה
    אָמַ֨רְתָּ֙ יְדַעְתִּ֣י/ךָֽ בְ/שֵׁ֔ם וְ/גַם מָצָ֥אתָ חֵ֖ן בְּ/עֵינָֽ/י־־־־׃
translation:
  text: Then Moses said to the LORD, “See, you are saying to me, ‘Bring up this people,’
    but you have not made known to me whom you will send with me. Yet you have said,
    ‘I know you by name, and you also have found favor in my sight.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who you will send with me.' The Hebrew construction can be rendered
      with either 'whom' or 'who' in English.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''I know you by name,'' an idiom expressing personal knowledge
      and favor.'
    reason: cultural_note
  - marker: c
    text: Or, 'you have found grace in my eyes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: רְאֵה
  chosen: See
  alternatives:
  - Look
  - Consider
  lexicon: HALOT
  rationale: Imperative discourse marker introducing Moses' appeal. 'See' preserves
    the directness of the Hebrew while remaining natural in English.
- source_word: הַעַל
  chosen: Bring up
  alternatives:
  - Lead up
  - Take up
  lexicon: HALOT
  rationale: עלה in the Hiphil commonly means 'cause to go up' or 'bring up.' In the
    Exodus journey context, 'bring up' preserves the directional nuance without over-paraphrasing.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - these people
  - this nation
  lexicon: HALOT
  rationale: Singular demonstrative phrase is best represented as 'this people.' It
    preserves the Hebrew wording and the somewhat distancing tone of the expression.
- source_word: הוֹדַעְתַּנִי
  chosen: have not made known to me
  alternatives:
  - have not told me
  - have not informed me
  lexicon: HALOT
  rationale: Hiphil of ידע means 'make known.' This rendering is slightly more formal
    but accurately reflects the causative nuance.
- source_word: אֵת אֲשֶׁר תִּשְׁלַח עִמִּי
  chosen: whom you will send with me
  alternatives:
  - who you will send with me
  - what you will send with me
  lexicon: HALOT
  rationale: The clause most naturally refers to a person accompanying Moses. 'Whom'
    is grammatically precise and fits the elevated but readable style. 'With me' is
    retained rather than 'before me' or 'alongside me' because עִם straightforwardly
    denotes accompaniment.
- source_word: יְדַעְתִּיךָ בְשֵׁם
  chosen: I know you by name
  alternatives:
  - I have known you by name
  - I know you personally
  lexicon: HALOT
  rationale: This preserves the idiom and its covenantal-personal force without paraphrasing
    into interpretation. 'By name' should remain explicit.
- source_word: מָצָאתָ חֵן בְּעֵינַי
  chosen: you also have found favor in my sight
  alternatives:
  - you have also found grace in my eyes
  - you have found favor with me
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom. 'Found favor in my sight' keeps the
    imagery and remains understandable in modern English. 'Grace' is possible for
    חֵן, but 'favor' is more idiomatic here.
- source_word: וְגַם
  chosen: and you also
  alternatives:
  - and also
  - indeed you also
  lexicon: HALOT
  rationale: Included explicitly to preserve the additive emphasis in God's prior
    statement to Moses.
- source_word: וְאַתָּה ... לֹא ... וְאַתָּה אָמַרְתָּ
  chosen: but you ... Yet you have said
  alternatives:
  - and you ... and you said
  - but you ... and yet you said
  lexicon: HALOT
  rationale: The repeated pronoun creates contrast and emphasis. English idiom is
    improved by rendering the first as adversative 'but' and the second as concessive/adversative
    'Yet,' making Moses' complaint clear while reflecting the Hebrew emphasis.
