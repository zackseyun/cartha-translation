id: EXO.33.4
reference: Exodus 33:4
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֣ע הָ/עָ֗ם אֶת הַ/דָּבָ֥ר הָ/רָ֛ע הַ/זֶּ֖ה וַ/יִּתְאַבָּ֑לוּ וְ/לֹא
    שָׁ֛תוּ אִ֥ישׁ עֶדְי֖/וֹ עָלָֽי/ו־־׃
translation:
  text: When the people heard this bad word, they mourned, and no man put on his ornaments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this evil word' or 'this grievous word.' The Hebrew keeps the more literal
      'word/matter' rather than the more idiomatic 'news.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his jewelry' or 'his adornment.' The Hebrew term refers broadly to ornamental
      items.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: heard
  alternatives:
  - listened to
  lexicon: HALOT
  rationale: Though morphologically singular with a collective subject, the sense
    is plural with הָעָם as a collective noun. 'Heard' is the natural English rendering
    for שמע in this context of receiving a report.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: עם commonly denotes the people as a collective body. 'The people' is
    the standard and most natural rendering here for Israel.
- source_word: הַדָּבָר הָרָע הַזֶּה
  chosen: this bad word
  alternatives:
  - this evil word
  - this bad news
  - this grievous word
  lexicon: HALOT
  rationale: דבר is literally 'word/matter.' Because the verse refers back to the
    divine announcement just given, a rendering preserving the lexical sense of 'word'
    is preferable, while 'bad' communicates רָע in accessible English. 'Bad news'
    is idiomatic but moves further from the Hebrew wording.
- source_word: וַיִּתְאַבָּלוּ
  chosen: they mourned
  alternatives:
  - they grieved
  - they lamented
  lexicon: HALOT
  rationale: The hitpael of אבל denotes entering mourning. 'They mourned' best captures
    both the emotional and customary force.
- source_word: וְלֹא שָׁתוּ
  chosen: and no man put on
  alternatives:
  - and they did not put on
  lexicon: HALOT
  rationale: 'שׂים means ''put/place/set.'' With אִישׁ following, the distributive
    sense is explicit: ''no man put on.'' This preserves the Hebrew''s individualizing
    expression.'
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  - one
  lexicon: HALOT
  rationale: The Hebrew uses the singular distributive 'man/each man.' Per the translation
    philosophy, gender-accurate rendering is preferred where the source uses masculine
    representative language.
- source_word: עֶדְיוֹ
  chosen: his ornaments
  alternatives:
  - his jewelry
  - his adornment
  lexicon: HALOT
  rationale: עֲדִי refers to ornamental attire or jewelry. 'Ornaments' preserves the
    broader sense without restricting it to one type of item. The singular with suffix
    is distributive in sense.
- source_word: עָלָיו
  chosen: put on
  alternatives:
  - upon himself
  - on himself
  lexicon: HALOT
  rationale: The preposition literally means 'upon him,' but idiomatic English requires
    incorporation into the verbal phrase 'put on.'
