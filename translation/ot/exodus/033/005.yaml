id: EXO.33.5
reference: Exodus 33:5
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל מֹשֶׁ֗ה אֱמֹ֤ר אֶל בְּנֵֽי יִשְׂרָאֵל֙ אַתֶּ֣ם עַם
    קְשֵׁה עֹ֔רֶף רֶ֧גַע אֶחָ֛ד אֶֽעֱלֶ֥ה בְ/קִרְבְּ/ךָ֖ וְ/כִלִּיתִ֑י/ךָ וְ/עַתָּ֗ה
    הוֹרֵ֤ד עֶדְיְ/ךָ֙ מֵֽ/עָלֶ֔י/ךָ וְ/אֵדְעָ֖ה מָ֥ה אֶֽעֱשֶׂה לָּֽ/ךְ־־־־־־׃
translation:
  text: And the LORD said to Moses, “Say to the sons of Israel, ‘You are a stiff-necked
    people. In a single moment, if I were to go up in your midst, I would consume
    you. So now, take off your ornaments from upon you, and I will know what I should
    do with you.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the children of Israel' or 'the Israelites.' The Hebrew is literally
      'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'if I went up among you' or 'if I should go up in your midst.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I would destroy you.'
    reason: lexical_alternative
  - marker: d
    text: Or 'remove your jewelry from you' or 'lay aside your adornment.'
    reason: lexical_alternative
  - marker: e
    text: Hebrew 'and I will know what I should do with you'; the wording preserves
      the text's anthropomorphic expression rather than paraphrasing it as mere decision-making.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Follows the project's default rendering for the divine name, preserving
    Jewish reverence convention and established covenantal usage.
- source_word: אֱמֹר
  chosen: Say
  alternatives:
  - Speak
  lexicon: HALOT
  rationale: Direct imperative to Moses introducing the message to Israel; 'Say' is
    natural modern English and sufficiently formal.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Retains the familial idiom more closely than 'Israelites.' Because the
    Hebrew is explicitly masculine plural construct, 'sons' best reflects the source
    while still functioning corporately.
- source_word: עַם קְשֵׁה עֹרֶף
  chosen: a stiff-necked people
  alternatives:
  - a stubborn people
  - a hard-necked people
  lexicon: HALOT
  rationale: This is a well-established Hebrew idiom for obstinacy or rebellion. 'Stiff-necked'
    preserves the metaphor and theological force better than flattening it to 'stubborn.'
- source_word: רֶגַע אֶחָד
  chosen: In a single moment
  alternatives:
  - for one moment
  - in an instant
  lexicon: HALOT
  rationale: Conveys the brevity and immediacy of the expression while fitting the
    conditional sense of the clause that follows.
- source_word: אֶעֱלֶה בְקִרְבְּךָ
  chosen: if I were to go up in your midst
  alternatives:
  - if I went up among you
  - if I should go up in your midst
  lexicon: HALOT
  rationale: The verb 'go up' is retained rather than generalized to 'come,' and 'in
    your midst' preserves the covenant-presence language. The singular suffix likely
    addresses Israel corporately.
- source_word: וְכִלִּיתִיךָ
  chosen: I would consume you
  alternatives:
  - I would destroy you
  - I would put an end to you
  lexicon: HALOT
  rationale: כלה here denotes bringing to an end in judgment. 'Consume' preserves
    the sense of totality and echoes common biblical judgment language without over-specifying
    the mode.
- source_word: הוֹרֵד עֶדְיְךָ מֵעָלֶיךָ
  chosen: take off your ornaments from upon you
  alternatives:
  - remove your jewelry from you
  - lay aside your adornment
  lexicon: HALOT
  rationale: עֲדִי refers to ornamental adornment. 'Ornaments' is broad enough to
    include jewelry and other adornments, and 'take off ... from upon you' reflects
    the Hebrew phrasing.
- source_word: וְאֵדְעָה
  chosen: and I will know
  alternatives:
  - that I may know
  - so that I may know
  lexicon: HALOT
  rationale: The cohortative-like form can express intended result or resolve. Here
    'and I will know' keeps the Hebrew sequence and avoids over-interpreting the nuance.
- source_word: מָה אֶעֱשֶׂה לָּךְ
  chosen: what I should do with you
  alternatives:
  - what I will do to you
  - what I am to do with you
  lexicon: HALOT
  rationale: The phrase can imply action either for or against Israel in response
    to their state. 'Do with you' preserves the open-endedness and avoids prematurely
    narrowing it to punitive action alone.
