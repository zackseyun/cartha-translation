theological_decisions:
- issue: Anthropomorphic language of divine knowing
  chosen_reading: Retain 'I will know' in the main text
  alternative_readings:
  - that I may decide what to do with you
  - so I may determine what to do with you
  rationale: The Hebrew uses the verb 'know,' and the translation should preserve
    the anthropomorphic and relational language rather than smoothing it into abstract
    decision-making. This preserves theological tension rather than resolving questions
    about divine omniscience.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
- issue: Corporate singular suffixes addressed to Israel
  chosen_reading: Render with plural sense in English where needed but preserve corporate
    address
  alternative_readings:
  - translate every suffix explicitly as singular 'you' without explanation
  rationale: The Hebrew alternates between plural and singular forms when addressing
    Israel as a corporate entity. English 'you' can preserve this without awkwardness;
    the translation reflects the collective addressee naturally.
