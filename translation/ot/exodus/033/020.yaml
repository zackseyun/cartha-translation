id: EXO.33.20
reference: Exodus 33:20
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר לֹ֥א תוּכַ֖ל לִ/רְאֹ֣ת אֶת פָּנָ֑/י כִּ֛י לֹֽא יִרְאַ֥/נִי הָ/אָדָ֖ם
    וָ/חָֽי־־׃
translation:
  text: But he said, “You cannot see my face, for man shall not see me and live.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my presence.' Hebrew literally 'my face.'
    reason: lexical_alternative
  - marker: b
    text: '''Man'' here means any human being; the statement applies to humankind
      generally.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: But he said
  alternatives:
  - And he said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'But' fits the immediate
    contrast with Moses' request in the preceding verse better than a mechanically
    formal 'And,' while still reflecting the conjunction.
- source_word: לֹא תוּכַל
  chosen: You cannot
  alternatives:
  - You are not able to
  - You may not
  lexicon: HALOT
  rationale: יכל denotes ability/capacity here, not permission. 'You cannot' is natural
    English and preserves the sense of impossibility.
- source_word: לִרְאֹת
  chosen: see
  alternatives:
  - look upon
  - behold
  lexicon: HALOT
  rationale: ראה in this context is straightforward visual perception. 'See' is the
    clearest modern equivalent.
- source_word: אֶת־פָּנַי
  chosen: my face
  alternatives:
  - my presence
  lexicon: HALOT
  rationale: פָּנִים literally means 'face.' Although 'face' can imply presence relationally,
    the immediate contrast with seeing God and the following mention of seeing 'me'
    favors retaining the concrete expression in the main text.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the impossibility. 'For' preserves the explanatory
    force in elevated but still readable English.
- source_word: לֹא יִרְאַנִי
  chosen: shall not see me
  alternatives:
  - cannot see me
  lexicon: HALOT
  rationale: The imperfect here states a general principle/consequence. 'Shall not
    see me' preserves the gnomic force and matches the following consequence 'and
    live' better than repeating 'cannot.'
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - a human being
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered 'man / humankind' according to context.
    Here it is generic humanity stated as a representative singular. 'Man' preserves
    the singular generic force and the traditional cadence; inclusivity can be clarified
    in a footnote.
- source_word: וָחָי
  chosen: and live
  alternatives:
  - and remain alive
  - and survive
  lexicon: HALOT
  rationale: 'The qatal after waw expresses the result/consequence: one cannot see
    God and continue living. ''And live'' is concise and idiomatic.'
