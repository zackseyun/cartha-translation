theological_decisions:
- issue: Anthropomorphic language for God in 'my face'
  chosen_reading: Retain 'my face' as the main-text rendering
  alternative_readings:
  - my presence
  rationale: The Hebrew uses concrete anthropomorphic language. In keeping with the
    translation philosophy, the draft preserves the source expression rather than
    resolving it into an interpretive abstraction. The alternative 'my presence' is
    preserved in a footnote as a lexical possibility, not as the main text.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Generic force of הָאָדָם
  chosen_reading: Render as 'man' in the main text
  alternative_readings:
  - humankind
  - a human being
  rationale: The noun is grammatically singular and generic. Per the doctrine's gender-accurate
    principle, 'man' is appropriate in the main text, while a footnote can clarify
    that the statement applies to humanity generally.
  doctrine_reference: Translation philosophy §4; Contested terms table for אָדָם
