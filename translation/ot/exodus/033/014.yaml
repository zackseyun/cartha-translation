theological_decisions:
- issue: Rendering the anthropomorphic expression פָּנַי
  chosen_reading: My presence
  alternative_readings:
  - My face
  - I myself will go
  rationale: The Hebrew uses an anthropomorphic noun ('face') to express YHWH's personal
    presence. Rendering it as 'presence' preserves the sense without flattening the
    theology into mere abstraction or forcing an overly literal English phrase. The
    alternative 'My face' is preserved in a footnote because the imagery may matter
    for readers tracing the theme across the chapter.
  doctrine_reference: Translation philosophy §3, §6; Contested terms table for יְהוָה
    supports covenant-sensitive rendering choices.
