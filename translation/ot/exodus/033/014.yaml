id: EXO.33.14
reference: Exodus 33:14
source:
  edition: WLC
  text: וַ/יֹּאמַ֑ר פָּנַ֥/י יֵלֵ֖כוּ וַ/הֲנִחֹ֥תִי לָֽ/ךְ׃
translation:
  text: And he said, “My presence will go, and I will give you rest.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “My face will go.” The expression means “my presence will
      go,” that is, the LORD himself will accompany them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמַר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative form of אמר, introducing direct speech.
    'And he said' preserves Hebrew narrative flow without overinterpreting temporal
    sequence.
- source_word: פָּנַי
  chosen: My presence
  alternatives:
  - My face
  - I myself
  lexicon: HALOT
  rationale: Literally 'my face,' but in this idiom the sense is personal presence.
    'My presence' is the most natural English rendering and matches the covenantal
    context of YHWH accompanying Moses/Israel. 'My face' is preserved as a lexical
    alternative because the Hebrew imagery is significant.
- source_word: יֵלֵכוּ
  chosen: will go
  alternatives:
  - shall go
  lexicon: HALOT
  rationale: 'הלך in the plural agrees with the plural-form subject פָּנַי (''my presence/face'').
    English idiom uses singular sense with ''presence'': ''My presence will go.''
    Future rendering fits the promissory context.'
- source_word: וַהֲנִחֹתִי
  chosen: and I will give you rest
  alternatives:
  - and I will cause you to rest
  - and I will lead you to rest
  lexicon: HALOT
  rationale: Hiphil of נוח commonly means cause to rest, give rest, or set down. In
    context of divine accompaniment and reassurance, 'I will give you rest' is idiomatic
    and preserves the causative sense without awkwardness.
- source_word: לָךְ
  chosen: you
  alternatives:
  - for you
  - to you
  lexicon: HALOT
  rationale: Second person singular pronominal suffix. English requires an object
    pronoun with 'give you rest.' The Hebrew preposition can be represented idiomatically
    rather than woodenly.
