id: EXO.33.18
reference: Exodus 33:18
source:
  edition: WLC
  text: וַ/יֹּאמַ֑ר הַרְאֵ֥/נִי נָ֖א אֶת כְּבֹדֶֽ/ךָ־׃
translation:
  text: Then he said, “Please show me your glory.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “let me see your splendor.” The Hebrew verb is literally “cause me to
      see,” and “glory” can also denote manifested splendor or honor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמַר
  chosen: Then he said
  alternatives:
  - And he said
  lexicon: HALOT
  rationale: The waw-consecutive on אמר advances the narrative. 'Then he said' gives
    natural modern English while preserving sequential force; 'And he said' is more
    formally literal but less idiomatic here.
- source_word: הַרְאֵנִי
  chosen: show me
  alternatives:
  - let me see
  - cause me to see
  lexicon: HALOT
  rationale: Hiphil imperative of ראה with 1cs suffix literally means 'cause me to
    see.' In idiomatic English, 'show me' best captures the causative request without
    awkwardness. 'Let me see' is possible but weakens the direct appeal to the addressee's
    action.
- source_word: נָא
  chosen: Please
  alternatives:
  - I pray
  - now
  lexicon: HALOT
  rationale: נא marks entreaty or politeness. 'Please' is the clearest contemporary
    equivalent. 'I pray' is archaic, and 'now' would misrepresent the particle's function
    here.
- source_word: אֶת
  chosen: '[direct object marker, untranslated]'
  lexicon: Hebrew grammar
  rationale: אֶת marks the definite direct object and is not represented by a separate
    English word.
- source_word: כְּבֹדֶךָ
  chosen: your glory
  alternatives:
  - your splendor
  - your honor
  - your weightiness
  lexicon: HALOT
  rationale: כָּבוֹד commonly denotes glory, honor, or manifest splendor. In this
    context—Moses asking for a direct disclosure of God's manifested presence—'your
    glory' is the most established and semantically fitting rendering. 'Splendor'
    captures visible radiance but is narrower; 'honor' is too abstract.
