theological_decisions:
- issue: Meaning of 'your glory' in Moses' request
  chosen_reading: 'Render concretely but without over-specifying: ''your glory'''
  alternative_readings:
  - your splendor
  - the fullness of your presence
  rationale: The Hebrew does not explicitly define whether Moses asks to see visible
    radiance, divine majesty, or the manifestation of God's presence. To preserve
    the theological breadth and tension of כבוד in context, the translation keeps
    the traditional but accurate 'glory' rather than narrowing the sense interpretively.
  doctrine_reference: Preserve theological tension rather than resolve it.
