id: EXO.33.8
reference: Exodus 33:8
source:
  edition: WLC
  text: וְ/הָיָ֗ה כְּ/צֵ֤את מֹשֶׁה֙ אֶל הָ/אֹ֔הֶל יָק֨וּמוּ֙ כָּל הָ/עָ֔ם וְ/נִ֨צְּב֔וּ
    אִ֖ישׁ פֶּ֣תַח אָהֳל֑/וֹ וְ/הִבִּ֨יטוּ֙ אַחֲרֵ֣י מֹשֶׁ֔ה עַד בֹּא֖/וֹ הָ/אֹֽהֱלָ/ה־־־׃
translation:
  text: And whenever Moses went out to the tent, all the people would rise and stand,
    each man at the entrance of his tent, and they would watch Moses until he entered
    the tent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Tent,' referring to the tent of meeting mentioned in the surrounding
      context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'each man'; the singular masculine form is used distributively for
      the members of the people.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And whenever
  alternatives:
  - And it happened
  - And it would happen
  lexicon: HALOT
  rationale: The waw + qatal of היה introduces a customary or repeated circumstance
    in narrative. 'And whenever' captures the iterative sense naturally in English
    better than the more wooden 'and it happened.'
- source_word: כְּצֵאת
  chosen: went out
  alternatives:
  - when ... went out
  - as ... went out
  lexicon: HALOT
  rationale: The infinitive construct with כ expresses temporal circumstance, 'when/as
    Moses went out.' 'Went out' preserves the motion implied by יצא.
- source_word: הָאֹהֶל
  chosen: the tent
  alternatives:
  - the Tent
  lexicon: HALOT
  rationale: The noun simply reads 'the tent.' In this context it refers to the tent
    of meeting set up outside the camp, but the Hebrew here does not include the fuller
    designation. Lowercase 'tent' keeps close to the wording while remaining clear
    in context.
- source_word: יָקוּמוּ
  chosen: would rise
  alternatives:
  - rose
  - would get up
  lexicon: HALOT
  rationale: Imperfect verb in this narrative setting conveys customary action. 'Would
    rise' reflects repeated behavior.
- source_word: וְנִצְּבוּ
  chosen: and stand
  alternatives:
  - and station themselves
  - and take their stand
  lexicon: HALOT
  rationale: The verb נצב denotes taking one's stand or standing in position. 'Stand'
    is idiomatic with the preceding iterative 'would rise' and fits the reverential
    posture described.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - everyone
  lexicon: HALOT
  rationale: The Hebrew singular איש distributively means 'each man.' Following the
    project's gender-accurate principle, the masculine form is retained rather than
    neutralized.
- source_word: פֶּתַח אָהֳלוֹ
  chosen: at the entrance of his tent
  alternatives:
  - at the doorway of his tent
  lexicon: HALOT
  rationale: פתח is the opening/entrance of a tent or house. 'Entrance' is clear modern
    English and preserves the locative sense.
- source_word: וְהִבִּיטוּ אַחֲרֵי מֹשֶׁה
  chosen: and they would watch Moses
  alternatives:
  - and they would look after Moses
  - and they would gaze after Moses
  lexicon: HALOT
  rationale: The idiom means to look after/follow with the eyes as he moves away.
    'Watch Moses' communicates the sense naturally in English without implying physical
    pursuit.
- source_word: עַד בֹּאוֹ הָאֹהֱלָה
  chosen: until he entered the tent
  alternatives:
  - until he came into the tent
  - until his entering the tent
  lexicon: HALOT
  rationale: בוא with directional suffix on 'tent' indicates movement into the tent.
    'Entered the tent' is the most natural concise rendering.
