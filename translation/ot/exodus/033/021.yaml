id: EXO.33.21
reference: Exodus 33:21
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוָ֔ה הִנֵּ֥ה מָק֖וֹם אִתִּ֑/י וְ/נִצַּבְתָּ֖ עַל הַ/צּֽוּר־׃
translation:
  text: And the LORD said, “Look, there is a place by me, and you shall stand on the
    rock.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “with me” or “near me.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces the next event in sequence. 'And ... said'
    preserves the Hebrew narrative flow without overinterpreting the conjunction.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the pattern reflected in many
    English translations.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה is a deictic particle drawing attention. 'Look' is readable modern
    English and preserves the demonstrative force better than the more archaic 'Behold.'
- source_word: מָקוֹם
  chosen: a place
  alternatives:
  - a spot
  - a location
  lexicon: HALOT
  rationale: The noun denotes a place/location. 'A place' is the most natural and
    sufficiently formal rendering here.
- source_word: אִתִּי
  chosen: by me
  alternatives:
  - with me
  - near me
  lexicon: HALOT
  rationale: The preposition with 1cs suffix can mean 'with me' or spatially 'beside/near
    me.' In this context of directing Moses to a physical location, 'by me' best conveys
    spatial proximity while remaining idiomatic. The alternative 'with me' is preserved
    in a footnote because it could be read more relationally or more literally depending
    on translation philosophy.
- source_word: וְנִצַּבְתָּ
  chosen: and you shall stand
  alternatives:
  - and station yourself
  - and you must stand
  lexicon: HALOT
  rationale: From נצב, 'to stand, take one's stand.' The form here functions as an
    instruction to Moses. 'You shall stand' preserves the directive force in natural
    English.
- source_word: עַל הַצּוּר
  chosen: on the rock
  alternatives:
  - upon the rock
  - on the cliff
  lexicon: HALOT
  rationale: צוּר commonly means 'rock' or rocky crag. 'On the rock' is the straightforward
    rendering. 'Cliff' is possible in some contexts but is less certain here and would
    narrow the image beyond the Hebrew.
