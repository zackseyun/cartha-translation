id: EXO.33.2
reference: Exodus 33:2
source:
  edition: WLC
  text: וְ/שָׁלַחְתִּ֥י לְ/פָנֶ֖י/ךָ מַלְאָ֑ךְ וְ/גֵֽרַשְׁתִּ֗י אֶת הַֽ/כְּנַעֲנִי֙
    הָֽ/אֱמֹרִ֔י וְ/הַֽ/חִתִּי֙ וְ/הַ/פְּרִזִּ֔י הַ/חִוִּ֖י וְ/הַ/יְבוּסִֽי־׃
translation:
  text: And I will send an angel before you, and I will drive out the Canaanite, the
    Amorite, the Hittite, the Perizzite, the Hivite, and the Jebusite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a messenger.' The Hebrew מַלְאָךְ can denote either an angelic or human
      messenger; here 'angel' best fits the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁלַחְתִּי
  chosen: And I will send
  alternatives:
  - And I shall send
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this context carries future
    sense in divine speech. 'Will send' is natural modern English and preserves the
    promissory force.
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - ahead of you
  - in front of you
  lexicon: HALOT
  rationale: Literally 'to/for your face,' an idiom meaning 'before you' or 'ahead
    of you.' 'Before you' is concise, idiomatic, and fits the formal tone.
- source_word: מַלְאָךְ
  chosen: an angel
  alternatives:
  - a messenger
  lexicon: HALOT
  rationale: The Hebrew can mean either human or divine messenger, but in this wilderness-guidance
    context the referent is best rendered 'angel.' The indefinite article reflects
    the anarthrous Hebrew in English idiom.
- source_word: וְגֵרַשְׁתִּי
  chosen: and I will drive out
  alternatives:
  - and I will expel
  - and I will cast out
  lexicon: HALOT
  rationale: The verb גרשׁ commonly denotes driving out or expelling inhabitants.
    'Drive out' is the standard clear rendering for dispossessing nations from the
    land.
- source_word: אֶת
  chosen: '[direct object marker, untranslated]'
  lexicon: Hebrew grammar
  rationale: This particle marks the definite direct object and is not represented
    by a separate English word.
- source_word: הַכְּנַעֲנִי
  chosen: the Canaanite
  alternatives:
  - the Canaanites
  lexicon: HALOT
  rationale: The singular ethnonym with article is used collectively in Hebrew. Rendering
    each people group in the singular preserves the source form and matches the list
    structure.
- source_word: הָאֱמֹרִי
  chosen: the Amorite
  alternatives:
  - the Amorites
  lexicon: HALOT
  rationale: Rendered as a singular collective ethnonym for consistency with the Hebrew
    form and the surrounding list.
- source_word: וְהַחִתִּי
  chosen: the Hittite
  alternatives:
  - the Hittites
  lexicon: HALOT
  rationale: Singular collective ethnonym retained for formal correspondence and list
    consistency.
- source_word: וְהַפְּרִזִּי
  chosen: the Perizzite
  alternatives:
  - the Perizzites
  lexicon: HALOT
  rationale: Singular collective ethnonym retained, following the Hebrew list.
- source_word: הַחִוִּי
  chosen: the Hivite
  alternatives:
  - the Hivites
  lexicon: HALOT
  rationale: Singular collective ethnonym retained for consistency with the source
    wording.
- source_word: וְהַיְבוּסִי
  chosen: and the Jebusite
  alternatives:
  - and the Jebusites
  lexicon: HALOT
  rationale: Final member of the list rendered as singular collective ethnonym, preserving
    the Hebrew pattern.
