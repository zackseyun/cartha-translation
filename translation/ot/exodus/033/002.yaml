theological_decisions:
- issue: Identity of מַלְאָךְ in this verse
  chosen_reading: Render generically as 'an angel' without specifying whether this
    is the Angel of the LORD or a created angel.
  alternative_readings:
  - the angel
  - a messenger
  rationale: The verse itself does not explicitly identify the messenger beyond מַלְאָךְ.
    To avoid importing a theological identification not stated in the text, the translation
    keeps the term generic while allowing readers to consider the broader context.
  doctrine_reference: Preserve theological tension rather than resolve it.
