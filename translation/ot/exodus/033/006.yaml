id: EXO.33.6
reference: Exodus 33:6
source:
  edition: WLC
  text: וַ/יִּֽתְנַצְּל֧וּ בְנֵֽי יִשְׂרָאֵ֛ל אֶת עֶדְיָ֖/ם מֵ/הַ֥ר חוֹרֵֽב־־׃
translation:
  text: So the sons of Israel stripped off their ornaments from Mount Horeb onward.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Israelites took off their ornaments at Mount Horeb.' The Hebrew
      phrase may be understood either as marking location or as indicating the point
      from which they ceased wearing them.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּתְנַצְּלוּ
  chosen: stripped off
  alternatives:
  - took off
  - removed themselves from
  lexicon: HALOT
  rationale: The hitpael form of נצל here means to remove or strip off from oneself,
    specifically ornaments in this context. 'Stripped off' conveys deliberate removal
    more vividly than the flatter 'took off.'
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: A more formally transparent rendering preserves the Hebrew idiom and
    masculine plural form. 'Israelites' is possible, but 'sons of Israel' better reflects
    the source wording while remaining understandable.
- source_word: עֶדְיָם
  chosen: their ornaments
  alternatives:
  - their jewelry
  - their finery
  lexicon: HALOT
  rationale: עֲדִי refers to adornment or ornaments. 'Ornaments' is broad and contextually
    appropriate, matching the mourning context without over-specifying the material.
- source_word: מֵהַר חוֹרֵב
  chosen: from Mount Horeb onward
  alternatives:
  - at Mount Horeb
  - away from Mount Horeb
  - from Mount Horeb
  lexicon: HALOT
  rationale: 'The preposition מִן with ''Mount Horeb'' is best taken as marking the
    point from which this state obtained: they removed their ornaments from that point
    onward. This fits the broader context of Israel''s mourning after the divine command
    not to wear ornaments.'
