id: EXO.33.11
reference: Exodus 33:11
source:
  edition: WLC
  text: וְ/דִבֶּ֨ר יְהוָ֤ה אֶל מֹשֶׁה֙ פָּנִ֣ים אֶל פָּנִ֔ים כַּ/אֲשֶׁ֛ר יְדַבֵּ֥ר אִ֖ישׁ אֶל רֵעֵ֑/הוּ וְ/שָׁב֙ אֶל הַֽ/מַּחֲנֶ֔ה וּ/מְשָׁ֨רְת֜/וֹ יְהוֹשֻׁ֤עַ בִּן נוּן֙ נַ֔עַר לֹ֥א יָמִ֖ישׁ מִ/תּ֥וֹךְ הָ/אֹֽהֶל־־־־־׃ס
translation:
  text: And Yahweh would speak to Moses face to face, as a man speaks to his friend. Then he would return to the camp, but his attendant Joshua son of Nun, a young man, would not depart from the midst of the tent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'directly' / 'personally.' The Hebrew idiom 'face to face' expresses unusually direct encounter.
    reason: lexical_alternative
  - marker: b
    text: That is, the tent of meeting.
    reason: cross_reference
lexical_decisions:
- source_word: וְ/דִבֶּר
  chosen: would speak
  alternatives:
  - spoke
  - used to speak
  lexicon: HALOT
  rationale: Piel of דבר here describes repeated customary action in the narrative setting of the tent of meeting; English habitual 'would speak' captures the iterative sense better than a simple past.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: פָּנִים אֶל פָּנִים
  chosen: face to face
  alternatives:
  - personally
  - directly
  lexicon: HALOT
  rationale: This is the standard idiom and best preserves the Hebrew expression. It communicates direct, unmediated conversational encounter without forcing a claim about literal visual perception.
- source_word: כַּ/אֲשֶׁר יְדַבֵּר אִישׁ אֶל רֵעֵהוּ
  chosen: as a man speaks to his friend
  alternatives:
  - as a man speaks to his companion
  - as one speaks to his friend
  lexicon: HALOT
  rationale: Retains the gender-accurate singular 'man' in keeping with the Hebrew אִישׁ and the project's stated philosophy. 'Friend' is the most natural rendering of רֵעַ in this relational context.
- source_word: וְ/שָׁב
  chosen: Then he would return
  alternatives:
  - and he returned
  - and he would turn back
  lexicon: HALOT
  rationale: 'Like the earlier verb, this qatal in context likely continues the customary narrative pattern: after speaking with the LORD, Moses would return to the camp.'
- source_word: הַמַּחֲנֶה
  chosen: the camp
  alternatives:
  - camp
  lexicon: HALOT
  rationale: Standard rendering for Israel's encampment.
- source_word: וּ/מְשָׁרְתּוֹ
  chosen: his attendant
  alternatives:
  - his servant
  - his minister
  lexicon: HALOT
  rationale: The participial form denotes one who serves in an assisting role. 'Attendant' is clear modern English and avoids the misleading connotations of domestic servitude that 'servant' may carry here.
- source_word: יְהוֹשֻׁעַ בִּן נוּן
  chosen: Joshua son of Nun
  alternatives:
  - Joshua, the son of Nun
  lexicon: HALOT
  rationale: Personal names are transliterated; 'son of' is the natural English equivalent of the patronymic.
- source_word: נַעַר
  chosen: a young man
  alternatives:
  - a youth
  - a young servant
  lexicon: HALOT
  rationale: נַעַר can denote a youth or young attendant. Here it most naturally identifies Joshua as relatively young; 'a young man' is idiomatic and avoids overreading a service nuance already conveyed by 'his attendant'.
- source_word: לֹא יָמִישׁ
  chosen: would not depart
  alternatives:
  - did not depart
  - would not move away
  lexicon: HALOT
  rationale: The verb מוּשׁ conveys not turning aside or departing. 'Would not depart' fits the habitual narrative flow and reads naturally in English.
- source_word: מִתּוֹךְ הָאֹהֶל
  chosen: from the midst of the tent
  alternatives:
  - from inside the tent
  - from the tent
  lexicon: HALOT
  rationale: '''From the midst of the tent'' preserves the Hebrew expression more closely than the simpler ''from the tent,'' while still being understandable. ''Tent'' here refers to the tent of meeting in context.'
