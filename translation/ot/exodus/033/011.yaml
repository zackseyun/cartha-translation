theological_decisions:
- issue: Anthropomorphic language about the LORD speaking 'face to face' with Moses
  chosen_reading: Retain the idiom 'face to face' in the main text as language of direct personal encounter
  alternative_readings:
  - Render dynamically as 'directly' or 'personally' to avoid possible tension with texts stating that no one can see God
  rationale: The Hebrew idiom should be preserved rather than flattened. The phrase describes the immediacy and intimacy of divine-human communication in context, and the translation should preserve that theological tension rather than resolve it away.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
