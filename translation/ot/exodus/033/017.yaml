id: EXO.33.17
reference: Exodus 33:17
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל מֹשֶׁ֔ה גַּ֣ם אֶת הַ/דָּבָ֥ר הַ/זֶּ֛ה אֲשֶׁ֥ר דִּבַּ֖רְתָּ אֶֽעֱשֶׂ֑ה כִּֽי מָצָ֤אתָ חֵן֙ בְּ/עֵינַ֔/י וָ/אֵדָעֲ/ךָ֖ בְּ/שֵֽׁם־־־׃
translation:
  text: And Yahweh said to Moses, “I will also do this thing that you have spoken, because you have found favor in my eyes, and I know you by name.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “this matter” or “this word.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “found favor in my eyes,” an idiom meaning to receive favorable regard.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the traditional small-caps covenantal form rather than transliteration.
- source_word: גַּם
  chosen: also
  alternatives:
  - even
  - indeed
  lexicon: HALOT
  rationale: Here גַּם adds to the prior request in context; 'also' best captures the additive force in natural English.
- source_word: הַדָּבָר הַזֶּה
  chosen: this thing
  alternatives:
  - this word
  - this matter
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'thing.' In this context, referring to Moses's request just spoken, 'this thing' is idiomatic and broad enough to cover the requested action.
- source_word: אֲשֶׁר דִּבַּרְתָּ
  chosen: that you have spoken
  alternatives:
  - which you have said
  - that you spoke
  lexicon: HALOT
  rationale: Retains the verbal link to Moses's speech while using natural English perfect wording in direct discourse.
- source_word: אֶעֱשֶׂה
  chosen: I will do
  alternatives:
  - I will make
  - I will accomplish
  lexicon: HALOT
  rationale: The common verb עשה is best rendered simply as 'do' here, matching the object 'this thing' and the promise of action.
- source_word: מָצָאתָ חֵן בְּעֵינַי
  chosen: you have found favor in my eyes
  alternatives:
  - you have found grace in my sight
  - you are pleasing in my sight
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom. 'Favor' is the clearest English equivalent for חֵן here; 'in my eyes' preserves the Hebrew imagery more directly than 'in my sight' while remaining understandable.
- source_word: וָאֵדָעֲךָ
  chosen: and I know you
  alternatives:
  - and I have known you
  - and I acknowledge you
  lexicon: HALOT
  rationale: ידע here expresses personal knowledge/recognition by God. Present-tense English best conveys the relational force in this context.
- source_word: בְּשֵׁם
  chosen: by name
  alternatives:
  - by your name
  - personally
  lexicon: HALOT
  rationale: The phrase denotes specific personal knowledge and recognition. 'By name' is the standard concise rendering and preserves the covenantal-personal nuance.
