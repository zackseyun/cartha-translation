id: EXO.33.15
reference: Exodus 33:15
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר אֵלָ֑י/ו אִם אֵ֤ין פָּנֶ֨י/ךָ֙ הֹלְכִ֔ים אַֽל תַּעֲלֵ֖/נוּ מִ/זֶּֽה־־׃
translation:
  text: Then he said to him, “If your presence is not going, do not bring us up from
    here.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, “your face.” Hebrew often uses “face” to mean personal presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then he said
  alternatives:
  - And he said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then he said' gives natural
    modern English while preserving sequential force; 'And he said' is more formally
    possible.
- source_word: אֵלָיו
  chosen: to him
  lexicon: HALOT
  rationale: Standard preposition + pronominal suffix meaning directed speech toward
    the previously mentioned interlocutor.
- source_word: אִם אֵין
  chosen: If ... is not
  alternatives:
  - If ... does not
  lexicon: HALOT
  rationale: 'The conditional particle with the negative existential introduces a
    real condition. English requires supplying the copular sense: ''If your presence
    is not going'' rather than a wooden ''If there is not your presence going.'''
- source_word: פָּנֶיךָ
  chosen: your presence
  alternatives:
  - your face
  - your faces
  lexicon: HALOT
  rationale: Although literally 'your face/faces,' in this context the Hebrew idiom
    refers to God's personal presence. 'Presence' communicates the sense in clear
    English without flattening the relational force. The more literal 'face' is preserved
    in a footnote as a lexical alternative.
- source_word: הֹלְכִים
  chosen: is going
  alternatives:
  - goes
  - are going
  lexicon: HALOT
  rationale: The participle expresses ongoing accompanying action. Because 'presence'
    is singular in English, 'is going' is the most natural agreement, though the Hebrew
    participle is morphologically plural due to the form פָּנִים.
- source_word: אַל
  chosen: do not
  alternatives:
  - do not please
  - may you not
  lexicon: HALOT
  rationale: Standard negative particle used with a jussive/imperfect for prohibition
    or urgent request.
- source_word: תַּעֲלֵנוּ
  chosen: bring us up
  alternatives:
  - lead us up
  - take us up
  lexicon: HALOT
  rationale: עלה in the Hiphil commonly means 'bring up' or 'cause to go up.' Here
    it refers to moving the people onward/up from their current place. 'Bring us up'
    preserves the causative sense and echoes the Exodus travel idiom.
- source_word: מִזֶּה
  chosen: from here
  alternatives:
  - from this place
  - from this
  lexicon: HALOT
  rationale: The demonstrative with preposition points to the present location. 'From
    here' is idiomatic English; 'from this place' is slightly more explicit but less
    natural.
