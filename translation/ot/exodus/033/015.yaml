theological_decisions:
- issue: Rendering פָּנֶיךָ in reference to God
  chosen_reading: your presence
  alternative_readings:
  - your face
  rationale: The Hebrew literally uses 'face,' but in this context Moses is speaking
    of God's accompanying presence with Israel. Rendering it as 'presence' preserves
    the idiomatic sense without implying a merely physical facial reference. The literal
    alternative is preserved in a footnote to maintain transparency and theological
    tension where readers may wish to see the underlying imagery.
  doctrine_reference: Translation philosophy §3, §6
