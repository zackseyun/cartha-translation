id: EXO.33.1
reference: Exodus 33:1
source:
  edition: WLC
  text: וַ/יְדַבֵּ֨ר יְהוָ֤ה אֶל מֹשֶׁה֙ לֵ֣ךְ עֲלֵ֣ה מִ/זֶּ֔ה אַתָּ֣ה וְ/הָ/עָ֔ם
    אֲשֶׁ֥ר הֶֽעֱלִ֖יתָ מֵ/אֶ֣רֶץ מִצְרָ֑יִם אֶל הָ/אָ֗רֶץ אֲשֶׁ֣ר נִ֠שְׁבַּעְתִּי
    לְ/אַבְרָהָ֨ם לְ/יִצְחָ֤ק וּֽ/לְ/יַעֲקֹב֙ לֵ/אמֹ֔ר לְ/זַרְעֲ/ךָ֖ אֶתְּנֶֽ/נָּה־־׃
translation:
  text: Then the LORD said to Moses, “Go up from here, you and the people whom you
    brought up from the land of Egypt, to the land that I swore to Abraham, to Isaac,
    and to Jacob, saying, ‘I will give it to your offspring.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
  - marker: b
    text: Or 'to your seed.' The Hebrew term is a collective singular meaning offspring
      or descendants.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: Then ... said
  alternatives:
  - And ... spoke
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative, and English idiom prefers
    'Then ... said' here over the more wooden 'And ... spoke.' 'Said' is the natural
    rendering of דבר in direct-speech introduction.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established English convention and the reverential substitution pattern.
- source_word: לֵךְ עֲלֵה
  chosen: Go up
  alternatives:
  - Go, ascend
  - Leave here and go up
  lexicon: HALOT
  rationale: The paired imperatives intensify the command. English compresses them
    naturally as 'Go up' without losing the sense of departure and ascent.
- source_word: מִזֶּה
  chosen: from here
  alternatives:
  - from this place
  - from here
  lexicon: HALOT
  rationale: Idiomatic English equivalent of the deictic phrase; 'from this place'
    is possible but less natural.
- source_word: אַתָּה וְהָעָם
  chosen: you and the people
  alternatives:
  - you and this people
  lexicon: HALOT
  rationale: The Hebrew has the article with 'people' but no demonstrative. 'You and
    the people' is the most direct rendering; 'this people' would add a nuance not
    explicit here.
- source_word: אֲשֶׁר הֶעֱלִיתָ
  chosen: whom you brought up
  alternatives:
  - whom you led up
  - whom you caused to go up
  lexicon: HALOT
  rationale: עלה in the Hiphil commonly means 'bring up' or 'lead up.' 'Brought up'
    fits the exodus context and preserves the verbal link to the command 'go up.'
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of the land of Egypt
  lexicon: HALOT
  rationale: Both are valid; 'from the land of Egypt' is slightly smoother in this
    sentence while preserving the source sense.
- source_word: אֶל הָאָרֶץ
  chosen: to the land
  alternatives:
  - into the land
  lexicon: HALOT
  rationale: אֶל is straightforwardly directional. 'To the land' fits the promise-land
    movement context.
- source_word: נִשְׁבַּעְתִּי
  chosen: I swore
  alternatives:
  - I solemnly swore
  - I took an oath
  lexicon: HALOT
  rationale: A direct and clear rendering of שבע in the Niphal with first-person subject.
    The solemnity is inherent and need not be expanded in the main text.
- source_word: לְאַבְרָהָם לְיִצְחָק וּלְיַעֲקֹב
  chosen: to Abraham, to Isaac, and to Jacob
  alternatives:
  - to Abraham, Isaac, and Jacob
  lexicon: HALOT
  rationale: Repeating 'to' reflects the Hebrew prepositions and preserves the formal
    cadence of the oath formula.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - when I said
  - with the words
  lexicon: HALOT
  rationale: Standard rendering introducing the content of the oath. It keeps the
    syntax transparent.
- source_word: לְזַרְעֲךָ
  chosen: to your offspring
  alternatives:
  - to your seed
  - to your descendants
  lexicon: HALOT
  rationale: '''Offspring'' preserves the collective singular force of זרע better
    than ''descendants'' and is more natural in modern English than ''seed.'' The
    singular possessive matches the addressee in the quoted promise.'
- source_word: אֶתְּנֶנָּה
  chosen: I will give it
  alternatives:
  - I shall give it
  lexicon: HALOT
  rationale: Simple future rendering of נתן with 3fs suffix referring back to 'the
    land.' 'Will' is standard modern English.
