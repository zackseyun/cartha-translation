theological_decisions:
- issue: Anthropomorphic language for God
  chosen_reading: Retain the concrete bodily terms 'hand,' 'back,' and 'face' in the
    main text.
  alternative_readings:
  - Use more abstract language such as 'presence' or 'afterglow' to avoid corporeal
    implications
  rationale: The Hebrew text itself uses anthropomorphic imagery, and the translation
    should preserve that imagery rather than soften it. This maintains the theological
    tension of divine self-revelation without forcing a metaphysical explanation into
    the text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
