id: EXO.33.23
reference: Exodus 33:23
source:
  edition: WLC
  text: וַ/הֲסִרֹתִי֙ אֶת כַּפִּ֔/י וְ/רָאִ֖יתָ אֶת אֲחֹרָ֑/י וּ/פָנַ֖/י לֹ֥א יֵרָאֽוּ־־׃ס
translation:
  text: Then I will remove my hand, and you will see my back, but my face shall not
    be seen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what is behind me' / 'my after-part.' The Hebrew term can denote the
      back or rearward aspect.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲסִרֹתִי
  chosen: Then I will remove
  alternatives:
  - and I will take away
  - and I will withdraw
  lexicon: HALOT
  rationale: From סור in the causative sense, 'remove/withdraw.' The prefixed waw
    continues the sequence from the prior verse; 'Then I will remove' gives natural
    English while preserving the future/sequential force.
- source_word: כַּפִּי
  chosen: my hand
  alternatives:
  - my palm
  lexicon: HALOT
  rationale: כַּף can mean 'palm' or 'hand.' In this anthropomorphic context, 'hand'
    is the most idiomatic and traditional English rendering, matching the protective
    covering imagery of the preceding verse.
- source_word: וְרָאִיתָ
  chosen: and you will see
  alternatives:
  - then you will see
  lexicon: HALOT
  rationale: 'Qal perfect with waw in sequence after a future context is best rendered
    as a future result: ''and you will see.'''
- source_word: אֲחֹרַי
  chosen: my back
  alternatives:
  - my back parts
  - what is behind me
  - my after-part
  lexicon: HALOT
  rationale: The noun denotes the back or rear/after-part. 'My back' is the clearest
    modern English rendering. Older 'back parts' is less natural and may over-specify
    the idiom.
- source_word: וּפָנַי
  chosen: but my face
  alternatives:
  - and my face
  lexicon: HALOT
  rationale: The conjunction is rendered adversatively in English because the clause
    contrasts what Moses may see ('my back') with what he may not see ('my face').
    'Face' is the plain sense of פָּנִים.
- source_word: לֹא יֵרָאוּ
  chosen: shall not be seen
  alternatives:
  - will not be seen
  - must not be seen
  lexicon: HALOT
  rationale: 'Niphal of ראה is passive/reflexive, ''be seen,'' not active ''see.''
    Because the subject is ''my face'' (plural form with singular sense), English
    idiom takes a singular translation: ''my face shall not be seen.'' ''Shall'' preserves
    the solemnity of divine speech.'
