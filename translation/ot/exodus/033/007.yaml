id: EXO.33.7
reference: Exodus 33:7
source:
  edition: WLC
  text: וּ/מֹשֶׁה֩ יִקַּ֨ח אֶת הָ/אֹ֜הֶל וְ/נָֽטָה ל֣/וֹ מִ/ח֣וּץ לַֽ/מַּחֲנֶ֗ה הַרְחֵק֙
    מִן הַֽ/מַּחֲנֶ֔ה וְ/קָ֥רָא ל֖/וֹ אֹ֣הֶל מוֹעֵ֑ד וְ/הָיָה֙ כָּל מְבַקֵּ֣שׁ יְהוָ֔ה
    יֵצֵא֙ אֶל אֹ֣הֶל מוֹעֵ֔ד אֲשֶׁ֖ר מִ/ח֥וּץ לַֽ/מַּחֲנֶֽה־־׀־־־׃
translation:
  text: Now Moses would take the tent and pitch it for himself outside the camp, far
    from the camp, and he called it the tent of meeting. And everyone seeking the
    LORD would go out to the tent of meeting that was outside the camp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the tent.' The text does not explicitly say 'his tent,' though some
      understand it to refer to Moses' own tent or a distinct tent he used for this
      purpose.
    reason: lexical_alternative
  - marker: b
    text: Or 'used to take' and 'used to go out'; the Hebrew verbal forms here likely
      describe customary action.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִקַּח
  chosen: would take
  alternatives:
  - took
  - used to take
  lexicon: HALOT
  rationale: The yiqtol here in narrative likely has habitual or iterative force in
    this context, reflected by 'would take' rather than a simple past 'took.' This
    fits the subsequent description of repeated access by those seeking the LORD.
- source_word: הָאֹהֶל
  chosen: the tent
  alternatives:
  - his tent
  - a tent
  lexicon: HALOT
  rationale: The Hebrew has the definite article, 'the tent.' It is not explicitly
    'his tent' in the text, though context may imply Moses' own tent or a particular
    tent. The translation preserves the explicit wording and leaves the identification
    open.
- source_word: וְנָטָה לוֹ
  chosen: and pitch it for himself
  alternatives:
  - and pitch it
  - and stretch it out for himself
  - and set it up for himself
  lexicon: HALOT
  rationale: נטה with tent language commonly means to pitch or set up a tent. The
    pronoun לוֹ is retained with 'for himself,' though in English this may simply
    indicate that Moses set it up for his own use or purpose.
- source_word: מִחוּץ לַמַּחֲנֶה
  chosen: outside the camp
  alternatives:
  - from outside the camp
  - beyond the camp
  lexicon: HALOT
  rationale: 'Standard locative sense: the tent was placed outside the Israelite camp.'
- source_word: הַרְחֵק מִן הַמַּחֲנֶה
  chosen: far from the camp
  alternatives:
  - at a distance from the camp
  - some distance from the camp
  lexicon: HALOT
  rationale: The infinitive/adverbial form intensifies the separation already stated.
    'Far from the camp' is concise and preserves the emphasis.
- source_word: וְקָרָא לוֹ אֹהֶל מוֹעֵד
  chosen: and he called it the tent of meeting
  alternatives:
  - and he named it the tent of meeting
  - and he called it the meeting tent
  lexicon: HALOT
  rationale: קרא + לוֹ with a predicate commonly means naming. 'Tent of meeting' is
    the established and accurate rendering of אֹהֶל מוֹעֵד, preserving the sense of
    appointed meeting without over-paraphrase.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  - the tent of appointment
  lexicon: HALOT
  rationale: מוֹעֵד can denote appointed time/place of meeting. 'Tent of meeting'
    is the most natural and contextually established English equivalent.
- source_word: כָּל מְבַקֵּשׁ יְהוָה
  chosen: everyone seeking the LORD
  alternatives:
  - everyone who sought the LORD
  - everyone inquiring of the LORD
  lexicon: HALOT
  rationale: מבקש here denotes seeking or inquiring after God. 'Seeking the LORD'
    is broad and faithful, preserving both devotional and consultative nuance. YHWH
    is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, יְהוָה is rendered 'the LORD'
    in the main text, with alternatives preserved only if needed.
- source_word: יֵצֵא
  chosen: would go out
  alternatives:
  - went out
  - was to go out
  lexicon: HALOT
  rationale: 'Like the earlier yiqtol, this likely expresses customary action: anyone
    seeking the LORD would go out there.'
- source_word: אֲשֶׁר מִחוּץ לַמַּחֲנֶה
  chosen: that was outside the camp
  alternatives:
  - which was outside the camp
  lexicon: HALOT
  rationale: The relative clause identifies the location of the tent of meeting. 'That
    was outside the camp' is natural modern English.
