theological_decisions:
- issue: Rendering the divine presence statement
  chosen_reading: I will not go up in your midst
  alternative_readings:
  - I will not go up among you
  - I will not go up with you
  rationale: The verse emphasizes the danger posed by the LORD's holy presence among
    a rebellious people. 'In your midst' best preserves that theological tension without
    softening it into mere accompaniment.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it
- issue: Severity of divine judgment in אֲכֶלְךָ
  chosen_reading: I consume you
  alternative_readings:
  - I destroy you
  rationale: The Hebrew expresses the possibility that God's holiness would bring
    Israel to an end during the journey. 'Consume' preserves the vividness and seriousness
    without importing a more specific mode of judgment than the text states.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation
    tradition
