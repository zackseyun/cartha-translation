id: EXO.33.3
reference: Exodus 33:3
source:
  edition: WLC
  text: אֶל אֶ֛רֶץ זָבַ֥ת חָלָ֖ב וּ/דְבָ֑שׁ כִּי֩ לֹ֨א אֶֽעֱלֶ֜ה בְּ/קִרְבְּ/ךָ֗ כִּ֤י
    עַם קְשֵׁה עֹ֨רֶף֙ אַ֔תָּה פֶּן אֲכֶלְ/ךָ֖ בַּ/דָּֽרֶךְ־־־־׃
translation:
  text: to a land flowing with milk and honey. But I will not go up in your midst,
    because you are a stiff-necked people, lest I consume you on the way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among you' or 'with you' for 'in your midst.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I destroy you' for 'I consume you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶל אֶרֶץ
  chosen: to a land
  alternatives:
  - to the land
  lexicon: HALOT
  rationale: The preposition אֶל with אֶרֶץ naturally yields direction toward a land.
    The anarthrous form supports the indefinite-sounding English 'a land,' though
    contextually it is the promised land already known.
- source_word: זָבַת חָלָב וּדְבָשׁ
  chosen: flowing with milk and honey
  alternatives:
  - oozing with milk and honey
  lexicon: HALOT
  rationale: This is the standard idiomatic description of abundance in the land promise.
    'Flowing' is natural English and preserves the metaphor without over-literal awkwardness.
- source_word: כִּי לֹא אֶעֱלֶה
  chosen: But I will not go up
  alternatives:
  - for I will not go up
  - because I will not go up
  lexicon: HALOT
  rationale: כִּי can mark explanation, but here after the destination phrase it functions
    well as a contrastive/explanatory transition in English. 'Go up' preserves the
    Hebrew verb עלה, commonly used for ascent/journey to the land.
- source_word: בְּקִרְבְּךָ
  chosen: in your midst
  alternatives:
  - among you
  - with you
  lexicon: HALOT
  rationale: The singular suffix refers corporately to Israel. 'In your midst' best
    preserves the spatial/covenantal nuance of God's presence within the people, stronger
    than merely 'with you.'
- source_word: עַם
  chosen: people
  alternatives:
  - nation
  lexicon: HALOT
  rationale: In context this refers to Israel as a collective people rather than a
    geopolitical nation-state.
- source_word: קְשֵׁה עֹרֶף
  chosen: stiff-necked
  alternatives:
  - hard-necked
  - stubborn
  lexicon: HALOT
  rationale: The idiom literally means hard/stiff of neck and is well established
    in English biblical usage. It preserves the metaphor of obstinate resistance better
    than the flattened 'stubborn.'
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - or else
  lexicon: HALOT
  rationale: פֶּן introduces a feared consequence. 'Lest' is concise and accurate,
    and remains understandable in modern literary English.
- source_word: אֲכֶלְךָ
  chosen: I consume you
  alternatives:
  - I destroy you
  - I put an end to you
  lexicon: HALOT
  rationale: כלה in the Piel often means to bring to an end, consume, or destroy.
    'Consume' preserves the severity while leaving the imagery of divine wrath intact;
    the singular suffix is collective for the people.
- source_word: בַּדָּרֶךְ
  chosen: on the way
  alternatives:
  - along the way
  - on the journey
  lexicon: HALOT
  rationale: A straightforward rendering of the phrase, referring to the journey route.
    'On the way' is idiomatic and sufficiently literal.
