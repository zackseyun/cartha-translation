id: EXO.33.19
reference: Exodus 33:19
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר אֲנִ֨י אַעֲבִ֤יר כָּל טוּבִ/י֙ עַל פָּנֶ֔י/ךָ וְ/קָרָ֧אתִֽי בְ/שֵׁ֛ם יְהוָ֖ה לְ/פָנֶ֑י/ךָ וְ/חַנֹּתִי֙ אֶת אֲשֶׁ֣ר אָחֹ֔ן וְ/רִחַמְתִּ֖י אֶת אֲשֶׁ֥ר אֲרַחֵֽם־־־־׃
translation:
  text: And he said, “I myself will make all my goodness pass before you, and I will proclaim the name of Yahweh before you. And I will be gracious to whom I will be gracious, and I will show mercy to whom I will show mercy.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will have compassion on whom I will have compassion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַעֲבִיר
  chosen: will make ... pass
  alternatives:
  - will cause ... to pass
  - will pass
  lexicon: HALOT
  rationale: Hiphil of עבר is causative, so 'will make ... pass' best reflects the verbal stem while remaining natural English. 'Will pass' would underrepresent the causative nuance.
- source_word: כָּל טוּבִי
  chosen: all my goodness
  alternatives:
  - all my beauty
  - all my bounty
  lexicon: HALOT
  rationale: טוּב commonly denotes goodness, goodness expressed in beneficence, or pleasantness. In this context of divine self-revelation and mercy, 'goodness' best captures God's beneficent character without narrowing it merely to appearance or gifts.
- source_word: עַל־פָּנֶיךָ
  chosen: before you
  alternatives:
  - in front of you
  - over your face
  lexicon: HALOT
  rationale: The idiom literally involves 'upon/before your face,' but idiomatic English is 'before you.' This preserves the spatial sense of divine manifestation without wooden phrasing.
- source_word: וְקָרָאתִי בְשֵׁם יְהוָה
  chosen: I will proclaim the name of the LORD
  alternatives:
  - I will call on the name of the LORD
  - I will declare the name of the LORD
  lexicon: HALOT
  rationale: Here קרא בשם is best understood as proclamation or declaration of the divine name/character in context, not invocation. 'Proclaim' fits the ensuing self-disclosure in Exodus 34.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - in your presence
  lexicon: HALOT
  rationale: The phrase again denotes presence/location before Moses. 'Before you' keeps the repetition and concreteness of the Hebrew.
- source_word: וְחַנֹּתִי אֶת אֲשֶׁר אָחֹן
  chosen: I will be gracious to whom I will be gracious
  alternatives:
  - I will show favor to whom I show favor
  - I will have grace on whom I have grace
  lexicon: HALOT
  rationale: The cognate construction intentionally repeats the same root for emphasis. 'Be gracious' preserves the lexical connection and theological weight better than the flatter 'show favor.' 'Whom' is idiomatic after a prepositionless relative in elevated prose.
- source_word: וְרִחַמְתִּי אֶת אֲשֶׁר אֲרַחֵם
  chosen: I will show mercy to whom I will show mercy
  alternatives:
  - I will have compassion on whom I will have compassion
  - I will be merciful to whom I will be merciful
  lexicon: HALOT
  rationale: רחם can mean have compassion/show mercy. 'Show mercy' pairs well with 'be gracious' and is familiar in English, while preserving the emphatic repetition of the Hebrew root.
- source_word: אֲנִי
  chosen: I myself
  alternatives:
  - I
  - I alone
  lexicon: HALOT
  rationale: The explicit pronoun adds emphasis beyond the verbal inflection. 'I myself' conveys that emphasis without overstating exclusivity as 'I alone' might.
