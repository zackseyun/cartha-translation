theological_decisions:
- issue: Rendering of the divine self-declaration of grace and mercy
  chosen_reading: Retained the repeated first-person formulations ('I will be gracious... I will show mercy...') without softening or systematizing them.
  alternative_readings:
  - Paraphrastic renderings that generalize the statement as a timeless principle of divine kindness
  - More deterministic renderings that import later theological formulations
  rationale: The Hebrew presents God's sovereign freedom in dispensing grace and mercy through emphatic repetition. The translation preserves that tension and does not resolve later doctrinal debates beyond what the text itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
