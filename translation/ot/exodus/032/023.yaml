theological_decisions:
- issue: Whether אֱלֹהִים should be rendered singular or plural in Aaron's report
  chosen_reading: 'plural: ''gods'''
  alternative_readings:
  - 'singular: ''a god'''
  rationale: The plural verb יֵלְכוּ in the relative clause weighs decisively toward
    a plural rendering in this verse. This avoids harmonizing the wording to later
    singular references and lets the Hebrew's tension stand on its own.
  doctrine_reference: 'Translation philosophy #3 (preserve theological tension rather
    than resolve it)'
