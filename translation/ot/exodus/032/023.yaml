id: EXO.32.23
reference: Exodus 32:23
source:
  edition: WLC
  text: וַ/יֹּ֣אמְרוּ לִ֔/י עֲשֵׂה לָ֣/נוּ אֱלֹהִ֔ים אֲשֶׁ֥ר יֵלְכ֖וּ לְ/פָנֵ֑י/נוּ
    כִּי זֶ֣ה מֹשֶׁ֣ה הָ/אִ֗ישׁ אֲשֶׁ֤ר הֶֽעֱלָ֨/נוּ֙ מֵ/אֶ֣רֶץ מִצְרַ֔יִם לֹ֥א יָדַ֖עְנוּ
    מֶה הָ֥יָה לֽ/וֹ־־׀־׃
translation:
  text: And they said to me, ‘Make gods for us, who will go before us, because this
    Moses, the man who brought us up from the land of Egypt—we do not know what has
    happened to him.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Make a god for us, who will go before us.' Although this verse uses
      a plural noun with a plural verb ('gods ... will go'), some render the sense
      as singular in light of the calf image in the surrounding context.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמְרוּ לִי
  chosen: And they said to me
  alternatives:
  - Then they said to me
  - So they said to me
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative; 'And they said to me' is a natural
    English rendering that preserves the sequential force without overinterpreting
    it.
- source_word: עֲשֵׂה לָנוּ
  chosen: Make for us
  alternatives:
  - Make us
  - Fashion for us
  lexicon: HALOT
  rationale: The imperative of עשה here means 'make/fashion.' 'Make for us' preserves
    both the command and the dative nuance.
- source_word: אֱלֹהִים
  chosen: gods
  alternatives:
  - a god
  - God
  lexicon: HALOT
  rationale: Although אֱלֹהִים can be singular or plural, the accompanying plural
    verb יֵלְכוּ ('they will go') strongly supports a plural sense here. 'gods' best
    reflects the grammar of this verse, even though the narrative later focuses on
    a calf image.
- source_word: אֲשֶׁר יֵלְכוּ לְפָנֵינוּ
  chosen: who will go before us
  alternatives:
  - which will go before us
  - who shall go ahead of us
  lexicon: HALOT
  rationale: The relative clause describes the requested gods as leading the people.
    'Go before us' is the standard idiom for leading the way; 'who' is suitable because
    the referent is personal/deity-like.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the request. 'Because' is clear modern English
    and preserves the causal force.
- source_word: זֶה מֹשֶׁה הָאִישׁ
  chosen: this Moses, the man
  alternatives:
  - this man Moses
  - this Moses
  lexicon: HALOT
  rationale: The demonstrative plus proper name is slightly distancing in tone. 'This
    Moses, the man' preserves the Hebrew emphasis and Aaron's quotation of the people's
    words.
- source_word: אֲשֶׁר הֶעֱלָנוּ מֵאֶרֶץ מִצְרַיִם
  chosen: who brought us up from the land of Egypt
  alternatives:
  - who led us up out of the land of Egypt
  - who brought us out of Egypt
  lexicon: HALOT
  rationale: עלה in the Hiphil commonly means 'bring up' in the exodus context. Including
    'land of' reflects the Hebrew fully; 'brought us up' preserves the conventional
    exodus idiom.
- source_word: לֹא יָדַעְנוּ
  chosen: we do not know
  alternatives:
  - we did not know
  - we have not known
  lexicon: HALOT
  rationale: The perfect here expresses present resultant state in English idiom.
    'We do not know' is the most natural rendering in the direct quotation.
- source_word: מֶה הָיָה לוֹ
  chosen: what has happened to him
  alternatives:
  - what became of him
  - what happened to him
  lexicon: HALOT
  rationale: This idiom asks about someone's fate or condition. 'What has happened
    to him' is clear modern English; 'what became of him' is a good alternative but
    slightly less contemporary.
