id: EXO.32.3
reference: Exodus 32:3
source:
  edition: WLC
  text: וַ/יִּתְפָּֽרְקוּ֙ כָּל הָ/עָ֔ם אֶת נִזְמֵ֥י הַ/זָּהָ֖ב אֲשֶׁ֣ר בְּ/אָזְנֵי/הֶ֑ם
    וַ/יָּבִ֖יאוּ אֶֽל אַהֲרֹֽן־־־׃
translation:
  text: So all the people took off the gold rings that were in their ears and brought
    them to Aaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'broke off' or 'stripped off' the gold rings. The Hebrew verb can emphasize
      forceful removal.
    reason: lexical_alternative
  - marker: b
    text: Or 'the gold earrings.' The Hebrew term for 'rings' can refer to ear ornaments
      in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְפָּרְקוּ
  chosen: took off
  alternatives:
  - broke off
  - stripped off
  - removed
  lexicon: HALOT
  rationale: The hitpael form of פרק here refers to removing ornaments from oneself.
    'Took off' is natural modern English and fits the reflexive sense better than
    the more wooden 'broke off,' though that alternative is possible and worth preserving.
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - the whole people
  - all the nation
  lexicon: HALOT
  rationale: This phrase denotes the gathered community collectively. 'All the people'
    is the most idiomatic and direct rendering in English.
- source_word: נִזְמֵי הַזָּהָב
  chosen: the gold rings
  alternatives:
  - the gold earrings
  - the rings of gold
  lexicon: HALOT
  rationale: נֶזֶם can refer to a ring worn as an ornament, often in the ear or nose
    depending on context. Because the following phrase specifies that these were 'in
    their ears,' 'gold rings' preserves the lexical breadth while allowing the location
    phrase to define them more precisely. 'Gold earrings' is a valid contextual alternative.
- source_word: אֲשֶׁר בְּאָזְנֵיהֶם
  chosen: that were in their ears
  alternatives:
  - that were on their ears
  - from their ears
  lexicon: HALOT
  rationale: The relative clause identifies the location of the rings. 'In their ears'
    is the most natural English expression for ear ornaments and closely reflects
    the Hebrew preposition.
- source_word: וַיָּבִיאוּ אֶל אַהֲרֹן
  chosen: and brought them to Aaron
  alternatives:
  - and they brought them to Aaron
  lexicon: HALOT
  rationale: The verb means to bring or carry. English naturally supplies the object
    'them' from context, referring to the rings just mentioned.
