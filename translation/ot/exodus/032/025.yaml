id: EXO.32.25
reference: Exodus 32:25
source:
  edition: WLC
  text: וַ/יַּ֤רְא מֹשֶׁה֙ אֶת הָ/עָ֔ם כִּ֥י פָרֻ֖עַ ה֑וּא כִּֽי פְרָעֹ֣/ה אַהֲרֹ֔ן
    לְ/שִׁמְצָ֖ה בְּ/קָמֵי/הֶֽם־־׃
translation:
  text: When Moses saw that the people were out of control—for Aaron had let them
    get out of control, to the mockery of those who rose against them—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unrestrained' / 'let loose.' The Hebrew repeats the same root for the
      people's condition and Aaron's action.
    reason: lexical_alternative
  - marker: b
    text: Or 'for derision' or 'for scorn' among their adversaries.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: When Moses saw
  alternatives:
  - And Moses saw
  - Moses saw
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. Rendering with 'When' smoothly
    connects the observation to the ensuing action in context while preserving the
    temporal force of the clause.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: עָם in this context refers to the Israelite community gathered at the
    camp, best rendered 'the people' in natural English.
- source_word: כִּי פָרֻעַ הוּא
  chosen: that the people were out of control
  alternatives:
  - that the people were unrestrained
  - that the people were let loose
  lexicon: HALOT
  rationale: The passive/adj. form from פרע conveys loosened restraint or disorder.
    'Out of control' communicates the social and moral chaos in idiomatic modern English;
    'unrestrained' is more formal and is preserved as an alternative sense.
- source_word: כִּי פְרָעֹה אַהֲרֹן
  chosen: for Aaron had let them get out of control
  alternatives:
  - for Aaron had let them run wild
  - for Aaron had left them unrestrained
  lexicon: HALOT
  rationale: The verb repeats the same root פרע, now with Aaron as subject. The translation
    preserves the causal explanation and the wordplay by repeating 'out of control.'
    'Had let them get out of control' makes Aaron's culpability explicit without overstating
    intentionality.
- source_word: לְשִׁמְצָה
  chosen: to the mockery
  alternatives:
  - for derision
  - for a whispering disgrace
  - for scorn
  lexicon: HALOT
  rationale: שִׁמְצָה denotes an object of contempt, derision, or mocking talk. 'To
    the mockery' is concise and readable, though 'for derision' is also possible.
- source_word: בְּקָמֵיהֶם
  chosen: of those who rose against them
  alternatives:
  - among their adversaries
  - before their enemies
  - in the sight of their opponents
  lexicon: HALOT
  rationale: From קום in a participial form with preposition, the phrase points to
    those standing up against Israel, i.e., adversaries. 'Those who rose against them'
    stays close to the verbal idea while remaining intelligible. The pronominal suffix
    is best taken as referring to the people/Israel.
