theological_decisions:
- issue: Moral/social nuance of פרע
  chosen_reading: Rendered as 'out of control' rather than a more specific moral term
    such as 'naked' or 'debauched.'
  alternative_readings:
  - unrestrained
  - let loose
  - naked/exposed
  rationale: The Hebrew root can involve loosening or exposure, but in this context
    the emphasis is on disorder and loss of restraint under Aaron's leadership. A
    translation like 'naked' would be too narrow and potentially misleading without
    stronger contextual markers in the verse itself.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not archaic or academic.'
