theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Retention of the repeated masculine singular אִישׁ
  chosen_reading: Each man ... each man ... each man
  alternative_readings:
  - Everyone ... everyone ... everyone
  rationale: The Hebrew repeatedly uses masculine singular אִישׁ in a distributive sense. Per the project's gender-accurate policy, the translation preserves 'man' rather than neutralizing it, since the command is addressed to the Levite men in context.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
