id: EXO.32.27
reference: Exodus 32:27
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר לָ/הֶ֗ם כֹּֽה אָמַ֤ר יְהוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל שִׂ֥ימוּ אִישׁ חַרְבּ֖/וֹ עַל יְרֵכ֑/וֹ עִבְר֨וּ וָ/שׁ֜וּבוּ מִ/שַּׁ֤עַר לָ/שַׁ֨עַר֙ בַּֽ/מַּחֲנֶ֔ה וְ/הִרְג֧וּ אִֽישׁ אֶת אָחִ֛י/ו וְ/אִ֥ישׁ אֶת רֵעֵ֖/הוּ וְ/אִ֥ישׁ אֶת קְרֹבֽ/וֹ־־־־־־־׃
translation:
  text: 'And he said to them, “Thus says Yahweh, the God of Israel: Each man, put his sword on his thigh. Pass through and return from gate to gate throughout the camp, and each man kill his brother, and each man his companion, and each man his neighbor.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'his near one'; this can also be rendered 'his kinsman' or 'his close relative.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר לָהֶם
  chosen: And he said to them
  alternatives:
  - Then he said to them
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing direct speech; 'And' preserves Hebrew narrative flow without overinterpreting sequence.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Prophetic/messenger formula is best preserved with the conventional but still natural 'Thus says,' signaling authoritative divine speech.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Construct phrase identifying YHWH covenantally; straightforward formal rendering.
- source_word: שִׂימוּ אִישׁ חַרְבּוֹ עַל יְרֵכוֹ
  chosen: Each man, put his sword on his thigh
  alternatives:
  - Let each man strap his sword to his side
  - Each man, gird your sword on your thigh
  lexicon: HALOT
  rationale: שִׂים with weapon + עַל יָרֵךְ is an idiom for arming oneself. 'Put ... on his thigh' stays close to the Hebrew while remaining intelligible. 'Each man' preserves distributive אִישׁ.
- source_word: עִבְרוּ וָשׁוּבוּ
  chosen: Go back and forth
  alternatives:
  - Pass through and return
  - Go to and fro
  lexicon: HALOT
  rationale: The paired imperatives convey repeated movement through the camp. 'Go back and forth' captures the sense idiomatically in modern English.
- source_word: מִשַּׁעַר לָשַׁעַר
  chosen: from gate to gate
  alternatives:
  - from one gate to another
  lexicon: HALOT
  rationale: Hebrew distributive expression indicating movement across the camp's extent; 'from gate to gate' is concise and natural.
- source_word: בַּמַּחֲנֶה
  chosen: throughout the camp
  alternatives:
  - in the camp
  lexicon: HALOT
  rationale: The preposition ב can be rendered simply 'in,' but with the motion command and 'from gate to gate,' 'throughout the camp' better conveys the spatial sweep implied.
- source_word: וְהִרְגוּ
  chosen: kill
  alternatives:
  - strike down
  - slay
  lexicon: HALOT
  rationale: Common verb for causing death. 'Kill' is the clearest modern equivalent; 'slay' is archaic, and 'strike down' adds imagery not explicit in the verb itself.
- source_word: אִישׁ אֶת אָחִיו
  chosen: each man kill his brother
  alternatives:
  - let each man kill his brother
  lexicon: HALOT
  rationale: Distributive repetition of אִישׁ is preserved to reflect the Hebrew's emphatic individual responsibility and the shocking intimacy of the judgment.
- source_word: רֵעֵהוּ
  chosen: his companion
  alternatives:
  - his friend
  - his associate
  lexicon: HALOT
  rationale: רֵעַ can mean friend, companion, fellow. 'Companion' avoids implying emotional closeness only, while still conveying a personal associate.
- source_word: קְרֹבוֹ
  chosen: his neighbor
  alternatives:
  - his kinsman
  - his close relative
  lexicon: HALOT
  rationale: The adjective/noun from קרב denotes one who is near, often a near relation or close associate. Here, after 'brother' and 'companion,' 'neighbor' preserves the escalating triad of close human relationships without collapsing it into a duplicate of 'brother.'
