theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    יהוה, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Referent of the pronoun in לְפָנָיו
  chosen_reading: the altar was built before the calf/image
  alternative_readings:
  - the altar was built before Aaron
  rationale: Although the suffix could in theory refer to Aaron, the narrative context
    of the newly fashioned calf makes the idol the most coherent referent. This avoids
    an implausible scene in which the altar is built before Aaron himself.
