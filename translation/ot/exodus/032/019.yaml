id: EXO.32.19
reference: Exodus 32:19
source:
  edition: WLC
  text: וַֽ/יְהִ֗י כַּ/אֲשֶׁ֤ר קָרַב֙ אֶל הַֽ/מַּחֲנֶ֔ה וַ/יַּ֥רְא אֶת הָ/עֵ֖גֶל וּ/מְחֹלֹ֑ת
    וַ/יִּֽחַר אַ֣ף מֹשֶׁ֗ה וַ/יַּשְׁלֵ֤ךְ מ/יד/ו אֶת הַ/לֻּחֹ֔ת וַ/יְשַׁבֵּ֥ר אֹתָ֖/ם
    תַּ֥חַת הָ/הָֽר־־־־׃
translation:
  text: And as soon as he came near the camp and saw the calf and the dancing, Moses'
    anger burned, and he threw the tablets from his hands and shattered them at the
    foot of the mountain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and saw the calf and dances.' The Hebrew plural noun can be rendered
      more formally as 'dances,' but 'the dancing' is more natural in English after
      'saw.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַּאֲשֶׁר
  chosen: And as soon as
  alternatives:
  - And it happened, when
  - Now when
  lexicon: HALOT
  rationale: The Hebrew narrative formula introduces the next event sequence. Rendering
    it idiomatically as 'And as soon as' preserves the temporal force of כַּאֲשֶׁר
    with readable modern English, rather than a wooden 'and it happened when.'
- source_word: קָרַב אֶל הַמַּחֲנֶה
  chosen: he came near the camp
  alternatives:
  - he approached the camp
  - he drew near to the camp
  lexicon: HALOT
  rationale: קָרַב means to come near/approach. 'Came near the camp' is natural English
    and keeps the spatial sense without over-paraphrase.
- source_word: וַיַּרְא אֶת הָעֵגֶל
  chosen: and saw the calf
  alternatives:
  - and looked at the calf
  lexicon: HALOT
  rationale: רָאָה is the ordinary verb 'see.' The definite article on הָעֵגֶל points
    to the specific idol already known in context, so 'the calf' is appropriate.
- source_word: וּמְחֹלֹת
  chosen: and the dancing
  alternatives:
  - and dances
  - and revelry
  lexicon: HALOT
  rationale: מְחֹלֹת refers to dancing/dances, often in festive or cultic celebration.
    'The dancing' fits the English construction after 'saw' and avoids importing the
    more interpretive 'revelry,' though the context is indeed idolatrous.
- source_word: וַיִּחַר אַף מֹשֶׁה
  chosen: Moses' anger burned
  alternatives:
  - Moses became angry
  - the anger of Moses burned
  - Moses burned with anger
  lexicon: HALOT
  rationale: The idiom חרה אף literally involves the burning of anger/nose. 'Moses'
    anger burned' preserves the vivid Hebrew idiom in clear English better than the
    flatter 'became angry.'
- source_word: וַיַּשְׁלֵךְ מִיָּדוֹ
  chosen: and he threw ... from his hands
  alternatives:
  - and he cast ... from his hand
  - and he threw ... out of his hand
  lexicon: HALOT
  rationale: שָׁלַךְ is 'throw/cast.' Although Hebrew has singular 'from his hand,'
    English idiom prefers 'from his hands' here because he is carrying two tablets;
    this is a natural-number adjustment for clarity.
- source_word: הַלֻּחֹת
  chosen: the tablets
  alternatives:
  - the stone tablets
  - the slabs
  lexicon: HALOT
  rationale: לוּחֹת commonly refers to tablets, here the covenant tablets. 'The tablets'
    is sufficient because the referent is established in context; adding 'stone' would
    be interpretive expansion from nearby context rather than this verse alone.
- source_word: וַיְשַׁבֵּר אֹתָם
  chosen: and shattered them
  alternatives:
  - and broke them
  - and smashed them
  lexicon: HALOT
  rationale: שָׁבַר means break/shatter. 'Shattered' conveys the force of the action
    in context without becoming colloquial.
- source_word: תַּחַת הָהָר
  chosen: at the foot of the mountain
  alternatives:
  - under the mountain
  - beneath the mountain
  lexicon: HALOT
  rationale: תַּחַת can mean under/beneath, but in topographical context 'at the foot
    of the mountain' is the natural English equivalent and best reflects the scene.
