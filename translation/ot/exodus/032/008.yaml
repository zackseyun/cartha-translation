theological_decisions:
- issue: Number of אֱלֹהֶיךָ in the idol acclamation
  chosen_reading: 'Render the phrase as plural: ''These are your gods, Israel'''
  alternative_readings:
  - 'Render idiomatically as singular: ''This is your god, Israel'''
  rationale: The Hebrew grammar is overtly plural, and optimal equivalence favors
    preserving that form unless context compels singularization. Because the referent
    is a single calf, the singular alternative is worth preserving in a footnote rather
    than resolving the tension in the main text.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it
- issue: Cultic action verb וַיִּשְׁתַּחֲווּ
  chosen_reading: Translate as 'bowed down to it' rather than 'worshiped it'
  alternative_readings:
  - worshiped it
  rationale: The Hebrew verb denotes the bodily act of prostration. Rendering it more
    literally preserves the sequence of actions—bowing down, sacrificing, speaking—without
    collapsing them into a generalized theological label.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation
    tradition
