id: EXO.32.8
reference: Exodus 32:8
source:
  edition: WLC
  text: סָ֣רוּ מַהֵ֗ר מִן הַ/דֶּ֨רֶךְ֙ אֲשֶׁ֣ר צִוִּיתִ֔/ם עָשׂ֣וּ לָ/הֶ֔ם עֵ֖גֶל
    מַסֵּכָ֑ה וַ/יִּשְׁתַּֽחֲווּ ל/וֹ֙ וַ/יִּזְבְּחוּ ל֔/וֹ וַ/יֹּ֣אמְר֔וּ אֵ֤לֶּה
    אֱלֹהֶ֨י/ךָ֙ יִשְׂרָאֵ֔ל אֲשֶׁ֥ר הֶֽעֱל֖וּ/ךָ מֵ/אֶ֥רֶץ מִצְרָֽיִם־־־׃
translation:
  text: They have quickly turned aside from the way that I commanded them. They have
    made for themselves a cast calf, and have bowed down to it and sacrificed to it,
    and said, ‘These are your gods, Israel, who brought you up from the land of Egypt.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'This is your god, Israel.' The Hebrew reads literally, 'These are your
      gods,' though the referent in context is a single calf.
    reason: alternative_reading
lexical_decisions:
- source_word: סָרוּ
  chosen: have turned aside
  alternatives:
  - have departed
  - have turned away
  lexicon: HALOT
  rationale: The verb denotes deviating or turning aside from a path or standard.
    'Have turned aside' preserves the metaphor of defection from a commanded way and
    fits the covenantal context.
- source_word: מַהֵר
  chosen: quickly
  alternatives:
  - speedily
  - so soon
  lexicon: HALOT
  rationale: Adverbial use indicating haste. 'Quickly' is natural modern English and
    preserves the force of rapid apostasy.
- source_word: הַדֶּרֶךְ
  chosen: the way
  alternatives:
  - the path
  lexicon: HALOT
  rationale: Common biblical metaphor for the course of obedience. 'Way' is idiomatic
    and preserves the moral-path imagery better than the more concrete 'path'.
- source_word: צִוִּיתִם
  chosen: I commanded them
  alternatives:
  - I commanded for them
  lexicon: HALOT
  rationale: Straightforward rendering of the Piel verb with 3mp suffix. English idiom
    requires 'commanded them.'
- source_word: עָשׂוּ לָהֶם
  chosen: have made for themselves
  alternatives:
  - made themselves
  lexicon: HALOT
  rationale: 'The reflexive nuance of לָהֶם is significant: the idol is self-procured.
    ''Have made for themselves'' makes that explicit without overtranslation.'
- source_word: עֵגֶל מַסֵּכָה
  chosen: a cast calf
  alternatives:
  - a molten calf
  - an image of a calf
  lexicon: HALOT
  rationale: מַסֵּכָה refers to something cast in metal. 'Cast calf' is concise, natural,
    and preserves the manufacturing sense better than the archaic 'molten calf.'
- source_word: וַיִּשְׁתַּחֲווּ לוֹ
  chosen: have bowed down to it
  alternatives:
  - have worshiped it
  - have prostrated themselves before it
  lexicon: HALOT
  rationale: The verb literally denotes bowing down/prostration. 'Bowed down to it'
    preserves the physical act and lets the following sacrificial act intensify the
    idolatry.
- source_word: וַיִּזְבְּחוּ לוֹ
  chosen: sacrificed to it
  alternatives:
  - offered sacrifices to it
  lexicon: HALOT
  rationale: The sacrificial verb is cultically significant. 'Sacrificed to it' is
    concise and clear.
- source_word: אֵלֶּה אֱלֹהֶיךָ
  chosen: These are your gods
  alternatives:
  - This is your god
  lexicon: HALOT
  rationale: The Hebrew form is morphologically plural ('these' + 'your gods'). Although
    the referent is a single calf and some translations smooth to singular, the plural
    should be preserved in the main text as the plain form of the accusation.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: 'Vocative use retained by direct address: ''Israel.'' This reflects the
    Hebrew discourse without adding ''O'' or other archaic markers.'
- source_word: הֶעֱלוּךָ
  chosen: brought you up
  alternatives:
  - brought you out
  lexicon: HALOT
  rationale: The Hiphil of עלה is literally 'bring up.' In exodus contexts English
    often uses 'bring out,' but 'brought you up' preserves the Hebrew idiom and intertextual
    resonance with the repeated formula.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of the land of Egypt
  lexicon: HALOT
  rationale: '''From the land of Egypt'' is a direct and natural rendering of the
    prepositional phrase. The preceding ''brought you up'' already carries the exodus
    movement.'
