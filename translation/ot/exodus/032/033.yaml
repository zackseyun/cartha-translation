id: EXO.32.33
reference: Exodus 32:33
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר יְהוָ֖ה אֶל מֹשֶׁ֑ה מִ֚י אֲשֶׁ֣ר חָֽטָא לִ֔/י אֶמְחֶ֖/נּוּ מִ/סִּפְרִֽ/י־־׃
translation:
  text: And the LORD said to Moses, “Whoever has sinned against me, I will blot him
    out of my book.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I will erase him from my book.”
    reason: lexical_alternative
  - marker: b
    text: The phrase “my book” may refer to God's record of those under his care;
      some understand it more specifically as “the book of life.”
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' preserves
    the Hebrew narrative flow in natural English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the pattern reflected in the
    Septuagint.
- source_word: אֶל מֹשֶׁה
  chosen: to Moses
  alternatives:
  - to Mosheh
  lexicon: HALOT
  rationale: 'Standard English transliteration of the personal name is used, and אֶל
    is straightforwardly directional: ''to Moses.'''
- source_word: מִי אֲשֶׁר
  chosen: Whoever
  alternatives:
  - He who
  - The one who
  lexicon: HALOT
  rationale: The construction introduces an indefinite relative clause. 'Whoever'
    is idiomatic English that preserves the generalizing force without unnecessary
    stiffness.
- source_word: חָטָא לִי
  chosen: has sinned against me
  alternatives:
  - sins against me
  - has offended me
  lexicon: HALOT
  rationale: חטא with ל marks sin directed against a person; 'against me' is the clearest
    English expression. The perfect is rendered 'has sinned' to reflect completed
    offense in context.
- source_word: אֶמְחֶנּוּ
  chosen: I will blot him out
  alternatives:
  - I will wipe him out
  - I will erase him
  lexicon: HALOT
  rationale: The verb מחה commonly means 'wipe out/blot out,' especially in contexts
    of removing a name or memory. 'Blot ... out' fits the following 'from my book'
    and preserves the metaphor of erasure.
- source_word: מִסִּפְרִי
  chosen: of my book
  alternatives:
  - from my scroll
  - out of my book
  lexicon: HALOT
  rationale: With אֶמְחֶנּוּ the preposition מן is naturally carried into English
    as part of the phrasal expression 'blot ... out of/from.' 'Book' is the conventional
    and accurate rendering of סֵפֶר here, referring to a divine record.
- source_word: -נּוּ (3ms suffix in אֶמְחֶנּוּ)
  chosen: him
  alternatives:
  - that person
  lexicon: HALOT
  rationale: The suffix is masculine singular. Per gender-accurate policy, 'him' preserves
    the source grammar and representative force better than an explicitly gender-neutral
    recast.
