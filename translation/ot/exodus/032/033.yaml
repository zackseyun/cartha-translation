theological_decisions:
- issue: Nature of 'my book'
  chosen_reading: Retain the metaphor 'my book' without specifying whether it is a
    register of the living, covenant membership, or eternal salvation.
  alternative_readings:
  - book of life
  - record of the living
  - covenant register
  rationale: The Hebrew text itself says only 'my book.' Because interpreters differ
    on the precise referent, the translation preserves the metaphor and theological
    tension rather than importing a more specific doctrinal category into the main
    text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
