id: EXO.32.35
reference: Exodus 32:35
source:
  edition: WLC
  text: וַ/יִּגֹּ֥ף יְהוָ֖ה אֶת הָ/עָ֑ם עַ֚ל אֲשֶׁ֣ר עָשׂ֣וּ אֶת הָ/עֵ֔גֶל אֲשֶׁ֥ר
    עָשָׂ֖ה אַהֲרֹֽן־־׃ס
translation:
  text: Then the LORD struck the people with a plague because of what they did with
    the calf that Aaron made.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Then the LORD struck the people because of what they had done with
      the calf that Aaron made.' The Hebrew verb can be rendered more generally as
      'struck' or 'plagued.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגֹּף
  chosen: struck ... with a plague
  alternatives:
  - plagued
  - smote
  - struck down
  lexicon: HALOT
  rationale: The verb נָגַף in this stem commonly denotes striking or afflicting,
    often with plague/judgment. Since no explicit object like 'plague' appears, English
    benefits from making the idiomatic sense clear. 'Struck ... with a plague' preserves
    both the verbal force and the likely mode of judgment without over-specifying
    deaths.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'
    rather than a transliteration.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: עם here refers to the covenant community of Israel in collective sense;
    'the people' is the natural and standard rendering.
- source_word: עַל אֲשֶׁר
  chosen: because of what
  alternatives:
  - on account of that which
  - for what
  lexicon: HALOT
  rationale: The preposition plus relative clause gives a causal sense. 'Because of
    what' is idiomatic modern English and preserves the causal force.
- source_word: עָשׂוּ
  chosen: they did
  alternatives:
  - they made
  lexicon: HALOT
  rationale: Although עשה can mean 'make,' the clause already specifies the calf as
    something Aaron made in the following relative clause. Rendering the plural verb
    as 'they did' avoids awkward repetition and reflects the people's culpable action
    regarding the calf.
- source_word: הָעֵגֶל
  chosen: the calf
  alternatives:
  - the young bull
  - the golden calf
  lexicon: HALOT
  rationale: The noun means 'calf.' 'Golden' is contextually true from the wider passage
    but is not stated in this verse, so it should not be imported into the main text.
- source_word: אֲשֶׁר עָשָׂה אַהֲרֹן
  chosen: that Aaron made
  alternatives:
  - which Aaron fashioned
  - that Aaron had made
  lexicon: HALOT
  rationale: This relative clause identifies the calf as the one Aaron made. Simple
    past is sufficient in English; pluperfect is possible but not necessary.
