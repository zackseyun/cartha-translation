theological_decisions:
- issue: Nature of the divine judgment in וַיִּגֹּף
  chosen_reading: A plague-like affliction from the LORD is expressed in idiomatic
    English as 'struck the people with a plague.'
  alternative_readings:
  - The LORD struck the people
  - The LORD plagued the people
  rationale: The Hebrew verb alone does not name the instrument, but in this context
    it commonly implies a plague or affliction. The chosen rendering makes the judgment
    intelligible in English while remaining within the semantic range of נָגַף and
    not adding a specific doctrinal claim beyond divine judgment.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source-text
    sense without paraphrase beyond what the text warrants.'
