id: EXO.32.32
reference: Exodus 32:32
source:
  edition: WLC
  text: וְ/עַתָּ֖ה אִם תִּשָּׂ֣א חַטָּאתָ֑/ם וְ/אִם אַ֕יִן מְחֵ֣/נִי נָ֔א מִֽ/סִּפְרְ/ךָ֖
    אֲשֶׁ֥ר כָּתָֽבְתָּ־־׃
translation:
  text: But now, if you will forgive their sin—but if not, please blot me out of your
    book that you have written.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'carry away their sin' or 'pardon their sin'; the Hebrew idiom literally
      uses 'lift/bear' with 'sin.'
    reason: lexical_alternative
  - marker: b
    text: '''Your book'' may refer to a divine register of the living or, by extension,
      the book of life; the Hebrew itself does not specify further.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְעַתָּה
  chosen: But now
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Introduces Moses' urgent plea with a discourse shift. 'But now' captures
    the adversative force in context after the preceding intercession better than
    a bare 'and now.'
- source_word: אִם
  chosen: if
  lexicon: HALOT
  rationale: Standard conditional particle opening the first clause.
- source_word: תִּשָּׂא
  chosen: you will forgive
  alternatives:
  - you bear
  - you carry away
  - you pardon
  lexicon: HALOT
  rationale: From נשׂא, literally 'lift/carry.' With 'sin' as object, the idiom means
    to bear away or forgive sin. 'Forgive' is the clearest natural English rendering
    of the idiom here.
- source_word: חַטָּאתָם
  chosen: their sin
  alternatives:
  - their offense
  lexicon: HALOT
  rationale: Singular noun with 3mp suffix. 'Sin' preserves the theological and lexical
    weight better than a softer term like 'offense.'
- source_word: וְאִם אַיִן
  chosen: but if not
  alternatives:
  - and if not
  - otherwise if not
  lexicon: HALOT
  rationale: Elliptical negative conditional. 'But if not' reflects the contrastive
    turn in Moses' plea and reads naturally in English.
- source_word: מְחֵנִי
  chosen: blot me out
  alternatives:
  - wipe me out
  - erase me
  lexicon: HALOT
  rationale: From מחה, used for wiping out or blotting out names/records. 'Blot me
    out' fits the book/register imagery and preserves intertextual resonance with
    biblical book-language.
- source_word: נָא
  chosen: please
  alternatives:
  - I pray
  lexicon: HALOT
  rationale: Particle of entreaty. 'Please' is natural modern English and preserves
    the supplicatory tone without archaism.
- source_word: מִסִּפְרְךָ
  chosen: out of your book
  alternatives:
  - from your scroll
  - from your record
  lexicon: HALOT
  rationale: ספר can mean book, scroll, or written record. 'Book' is the most idiomatic
    and preserves the canonical resonance of a divine register, while remaining faithful
    to the Hebrew.
- source_word: אֲשֶׁר כָּתָבְתָּ
  chosen: that you have written
  alternatives:
  - which you wrote
  lexicon: HALOT
  rationale: Relative clause specifying the book as one God himself has written. Present
    perfect in English conveys the completed action with present relevance.
