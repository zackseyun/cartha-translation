theological_decisions:
- issue: Nature of 'your book'
  chosen_reading: your book
  alternative_readings:
  - your scroll
  - your record/register
  rationale: The Hebrew does not define the book's exact referent. Rendering it simply
    as 'your book' preserves the theological tension rather than resolving whether
    this is the book of life, a census register of the living, or another divine record.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
