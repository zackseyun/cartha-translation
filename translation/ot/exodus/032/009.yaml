id: EXO.32.9
reference: Exodus 32:9
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר יְהוָ֖ה אֶל מֹשֶׁ֑ה רָאִ֨יתִי֙ אֶת הָ/עָ֣ם הַ/זֶּ֔ה וְ/הִנֵּ֥ה עַם קְשֵׁה עֹ֖רֶף הֽוּא־־־־׃
translation:
  text: And Yahweh said to Moses, “I have seen this people, and behold, it is a stiff-necked people.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stubborn.' The Hebrew idiom is literally 'stiff-necked,' a metaphor for obstinacy or resistance.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the traditional English convention signaled in DOCTRINE.md.
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative sequencing; 'And ... said' preserves the Hebrew narrative flow without overinterpreting temporal nuance.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Direct and natural rendering of the preposition marking the addressee.
- source_word: רָאִיתִי
  chosen: I have seen
  alternatives:
  - I saw
  - I have looked at
  lexicon: HALOT
  rationale: The perfect can be rendered as a present-result perfect in English here, fitting the immediate divine assessment that follows. 'I have seen' preserves the force of completed observation with present relevance.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - these people
  - this nation
  lexicon: HALOT
  rationale: Hebrew singular collective עָם is best preserved as 'people.' 'This people' reflects the demonstrative force and the distancing tone of the Hebrew.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - indeed
  - now
  lexicon: HALOT
  rationale: Retains the discourse marker's attention-directing force. 'Behold' is slightly elevated but still transparent and preserves the rhetorical weight of the divine declaration.
- source_word: עַם
  chosen: people
  alternatives:
  - nation
  lexicon: HALOT
  rationale: Collective singular repeated for emphasis; 'people' is the most natural equivalent in context.
- source_word: קְשֵׁה עֹרֶף
  chosen: stiff-necked
  alternatives:
  - hard-necked
  - stubborn
  lexicon: HALOT
  rationale: This is a well-established idiom in English that closely matches the Hebrew metaphor and preserves its vividness better than the flattened interpretive gloss 'stubborn.'
- source_word: הוּא
  chosen: it is
  alternatives:
  - he is
  - they are
  lexicon: HALOT
  rationale: The pronoun refers back to the collective singular 'people.' English idiom prefers 'it is' for a singular collective in this construction, though the predicate still describes the group.
