theological_decisions:
- issue: Subject of 'to bestow a blessing on you today'
  chosen_reading: The implied subject is the LORD
  alternative_readings:
  - Moses as the implied subject
  - 'an impersonal/resultative sense: ''resulting in a blessing for you today'''
  rationale: The Hebrew infinitive construct does not state the subject explicitly. In context, the blessing is most naturally understood as coming from the LORD in response to the Levites' consecration and zeal. This preserves the theological logic of divine blessing without over-specifying beyond the syntax; the ambiguity is noted in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it
