id: EXO.32.29
reference: Exodus 32:29
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר מֹשֶׁ֗ה מִלְא֨וּ יֶדְ/כֶ֤ם הַ/יּוֹם֙ לַֽ/יהוָ֔ה כִּ֛י אִ֥ישׁ בִּ/בְנ֖/וֹ וּ/בְ/אָחִ֑י/ו וְ/לָ/תֵ֧ת עֲלֵי/כֶ֛ם הַ/יּ֖וֹם בְּרָכָֽה׃
translation:
  text: And Moses said, “Today fill your hand for Yahweh, for each man has been against his son and against his brother, so that he may bestow a blessing on you today.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'fill your hand.' This is an idiom for consecration or ordination to sacred service.
    reason: lexical_alternative
  - marker: b
    text: Or 'for each man was against his son and against his brother'; the Hebrew is compressed and refers to the Levites acting even against close relatives in the preceding episode.
    reason: alternative_reading
  - marker: c
    text: The Hebrew does not explicitly state who gives the blessing; it may be understood as 'so that the LORD may bestow a blessing on you today.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִלְאוּ יֶדְכֶם
  chosen: ordain yourselves
  alternatives:
  - fill your hand
  - consecrate yourselves
  lexicon: HALOT
  rationale: Literally 'fill your hand,' an idiom used for installation/consecration to sacred service. Here Moses addresses the Levites after their zealous action, so 'ordain yourselves' best captures the idiomatic force in natural English while preserving the cultic sense. The more literal alternative is preserved in a footnote.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Uses the covenant name according to project policy as 'the LORD.' The preposition ל can be rendered 'to' or 'for'; 'to the LORD' fits the idiom of dedication/consecration.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the command, so 'for' is the most natural connective in English.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - each of you
  lexicon: HALOT
  rationale: The Hebrew is singular distributive and grammatically masculine. 'Each man' preserves the gendered representative form in line with the project's gender-accurate policy.
- source_word: בִּבְנוֹ וּבְאָחִיו
  chosen: against his son and against his brother
  alternatives:
  - at the cost of his son and his brother
  - even against his son and his brother
  lexicon: HALOT
  rationale: The preposition ב in this context is elliptical and difficult, referring to the Levites' action against close kin in the preceding narrative. Rendering it as 'against' makes the sense explicit in idiomatic English. The more interpretive nuance 'at the cost of' is possible but less direct.
- source_word: וְלָתֵת
  chosen: so that he may bestow
  alternatives:
  - and to give
  - to bestow
  lexicon: HALOT
  rationale: The infinitive with prefixed conjunction expresses result/purpose from the preceding action. English requires an explicit subject; the implied giver is best understood as the LORD from context, hence 'he may bestow.'
- source_word: עֲלֵיכֶם
  chosen: on you
  alternatives:
  - upon you
  lexicon: HALOT
  rationale: Standard idiomatic rendering with 'bestow a blessing on you.'
- source_word: בְּרָכָה
  chosen: a blessing
  alternatives:
  - blessing
  lexicon: HALOT
  rationale: Indefinite singular in Hebrew; English idiom naturally takes the article here.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Modern, readable English while preserving the temporal emphasis; repeated in both clauses as in the Hebrew.
