theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Implied reflexive force of שִׁחֵת in context
  chosen_reading: have corrupted themselves
  alternative_readings:
  - have acted corruptly
  - have become corrupt
  rationale: The verse concerns Israel's culpable moral ruin in making the calf. Rendering
    the verb with reflexive force preserves the theological emphasis on their self-corruption
    without importing additional doctrinal claims.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
