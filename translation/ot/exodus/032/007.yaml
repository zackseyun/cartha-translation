id: EXO.32.7
reference: Exodus 32:7
source:
  edition: WLC
  text: וַ/יְדַבֵּ֥ר יְהוָ֖ה אֶל מֹשֶׁ֑ה לֶךְ רֵ֕ד כִּ֚י שִׁחֵ֣ת עַמְּ/ךָ֔ אֲשֶׁ֥ר
    הֶעֱלֵ֖יתָ מֵ/אֶ֥רֶץ מִצְרָֽיִם־־׃
translation:
  text: Then the LORD said to Moses, “Go, go down, because your people, whom you brought
    up from the land of Egypt, have corrupted themselves.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “have acted corruptly.” The Hebrew verb can be rendered in a way that
      emphasizes corrupt behavior rather than the resulting self-corruption.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: Then ... said
  alternatives:
  - And ... spoke
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative; 'Then' gives natural English
    narrative flow. 'Said' is idiomatic for divine speech in English, though 'spoke'
    is more formally literal.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD' rather than a transliteration.
- source_word: לֶךְ רֵד
  chosen: Go, go down
  alternatives:
  - Go down
  - Come, go down
  lexicon: HALOT
  rationale: The Hebrew uses two imperatives, literally 'go, descend.' Preserving
    both reflects the urgency and form of the command better than collapsing them
    into a single English imperative.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the command, so 'because' is the
    clearest modern English rendering.
- source_word: שִׁחֵת
  chosen: have corrupted themselves
  alternatives:
  - have acted corruptly
  - are ruined
  - have become corrupt
  lexicon: HALOT
  rationale: In this context the verb refers to moral corruption through idolatry.
    English often requires an explicit reflexive sense to convey that the people have
    corrupted themselves, not merely that something external ruined them. 'Have acted
    corruptly' is possible, but 'have corrupted themselves' better matches the destructive
    force of the Hebrew.
- source_word: עַמְּךָ
  chosen: your people
  alternatives:
  - your nation
  lexicon: HALOT
  rationale: 'The singular collective noun עַם commonly means ''people.'' The possessive
    is rhetorically significant here: God addresses Israel to Moses as ''your people,''
    highlighting the breach caused by their sin.'
- source_word: אֲשֶׁר הֶעֱלֵיתָ
  chosen: whom you brought up
  alternatives:
  - that you brought up
  - whom you led up
  lexicon: HALOT
  rationale: The relative clause identifies the people by the exodus event. 'Brought
    up' is the standard and contextually appropriate rendering of העלה in exodus contexts.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of Egypt
  lexicon: HALOT
  rationale: Including 'the land of' reflects the Hebrew wording more fully while
    remaining natural English.
