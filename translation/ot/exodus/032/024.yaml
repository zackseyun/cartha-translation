theological_decisions:
- issue: Aaron's evasive account of the idol's origin
  chosen_reading: Render the statement plainly without adding interpretive qualifiers
    such as 'miraculously' or 'supposedly.'
  alternative_readings:
  - Paraphrasing to expose sarcasm or deception in the main text
  rationale: The verse itself presents Aaron's words; the translation should preserve
    the narrative irony without inserting commentary. This follows the principle of
    not importing claims the text does not explicitly make while allowing the context
    to expose Aaron's evasion.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    tension rather than resolve it.'
