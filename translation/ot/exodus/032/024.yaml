id: EXO.32.24
reference: Exodus 32:24
source:
  edition: WLC
  text: וָ/אֹמַ֤ר לָ/הֶם֙ לְ/מִ֣י זָהָ֔ב הִתְפָּרָ֖קוּ וַ/יִּתְּנוּ לִ֑/י וָ/אַשְׁלִכֵ֣/הוּ
    בָ/אֵ֔שׁ וַ/יֵּצֵ֖א הָ/עֵ֥גֶל הַ/זֶּֽה־׃
translation:
  text: And I said to them, ‘Whoever has gold, take it off.’ So they gave it to me,
    and I threw it into the fire, and out came this calf.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Who has gold? Tear it off.' The Hebrew literally reads, 'To whom is
      gold? Break off/remove [it].'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  chosen: And I said
  alternatives:
  - So I said
  - Then I said
  lexicon: HALOT
  rationale: Standard wayyiqtol of אמר introducing Aaron's reported speech; 'And I
    said' preserves the narrative sequence without overinterpreting discourse flow.
- source_word: לְמִי זָהָב
  chosen: Whoever has gold
  alternatives:
  - Who has gold
  - Whoever had gold
  lexicon: HALOT
  rationale: 'The idiom literally ''to whom is gold'' is naturally rendered in English
    as possession: ''whoever has gold.'' ''Whoever'' fits the indefinite sense in
    direct speech.'
- source_word: הִתְפָּרָקוּ
  chosen: take it off
  alternatives:
  - break it off
  - tear it off
  - strip yourselves of it
  lexicon: HALOT
  rationale: The hitpael of פרק in this context refers to removing ornaments/jewelry
    from oneself. 'Take it off' is idiomatic modern English and matches the object
    implied by the gold ornaments.
- source_word: וַיִּתְּנוּ לִי
  chosen: So they gave it to me
  alternatives:
  - and they gave it to me
  lexicon: HALOT
  rationale: The Hebrew has plural subject with singular indirect object. English
    requires supplying the implied object 'it' from the prior mention of gold. 'So'
    reflects the narrative progression naturally.
- source_word: וָאַשְׁלִכֵהוּ
  chosen: and I threw it
  alternatives:
  - and I cast it
  - and I tossed it
  lexicon: HALOT
  rationale: The verb שלך means to throw/cast. 'Threw' is clear modern English; the
    suffix is singular, referring collectively to the gold as a mass/object.
- source_word: בָאֵשׁ
  chosen: into the fire
  alternatives:
  - in the fire
  lexicon: HALOT
  rationale: Although the preposition is 'in,' English idiom with a verb of throwing
    prefers 'into the fire' to express motion.
- source_word: וַיֵּצֵא
  chosen: and out came
  alternatives:
  - and it came out
  - and there came out
  lexicon: HALOT
  rationale: The verb 'came out' is retained straightforwardly. Fronting 'out' mirrors
    the Hebrew sequence and preserves the ironic, evasive tone of Aaron's explanation.
- source_word: הָעֵגֶל הַזֶּה
  chosen: this calf
  alternatives:
  - this young bull
  - this molten calf
  lexicon: HALOT
  rationale: עגל commonly denotes a calf/young bull. 'Calf' is the established and
    contextually appropriate rendering here, matching the idol already identified
    in the narrative. 'Molten' is not expressed in this verse and should not be imported.
