id: EXO.32.11
reference: Exodus 32:11
source:
  edition: WLC
  text: וַ/יְחַ֣ל מֹשֶׁ֔ה אֶת פְּנֵ֖י יְהוָ֣ה אֱלֹהָ֑י/ו וַ/יֹּ֗אמֶר לָ/מָ֤ה יְהוָה֙
    יֶחֱרֶ֤ה אַפְּ/ךָ֙ בְּ/עַמֶּ֔/ךָ אֲשֶׁ֤ר הוֹצֵ֨אתָ֙ מֵ/אֶ֣רֶץ מִצְרַ֔יִם בְּ/כֹ֥חַ
    גָּד֖וֹל וּ/בְ/יָ֥ד חֲזָקָֽה־׃
translation:
  text: But Moses pleaded with the LORD his God and said, “Why, LORD, should your
    anger burn against your people, whom you brought out of the land of Egypt with
    great power and with a strong hand?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''sought the face of the LORD''; an idiom meaning to seek favor
      or plead earnestly.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with a mighty hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחַל
  chosen: pleaded with
  alternatives:
  - entreated
  - sought the favor of
  - appeased
  lexicon: HALOT
  rationale: The verb חלה in the piel with 'the face of' someone is an idiom for seeking
    favor or making earnest supplication. 'Pleaded with' captures the interpersonal
    and urgent force in natural English better than the more wooden 'entreated,' while
    avoiding the potentially misleading implication of changing God by manipulation
    in 'appeased'.
- source_word: אֶת־פְּנֵי
  chosen: with
  alternatives:
  - the favor of
  - the face of
  lexicon: HALOT
  rationale: Literally 'the face of,' but in this idiom the sense is directed appeal
    to a person. Rendering the whole expression as 'pleaded with' communicates the
    idiomatic meaning; the preposition 'with' is supplied in English to complete the
    idiom naturally.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name YHWH is rendered 'the LORD' rather than
    transliterated.
- source_word: אֱלֹהָיו
  chosen: his God
  alternatives:
  - his gods
  lexicon: HALOT
  rationale: With singular possessive referring to Moses' God, the singular sense
    is clear in context. 'His God' preserves the covenantal relationship without overinterpreting.
- source_word: לָמָה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Standard interrogative; 'Why' is direct and natural.
- source_word: יֶחֱרֶה אַפְּךָ
  chosen: should your anger burn
  alternatives:
  - should your nose burn
  - should you become angry
  - should your wrath blaze
  lexicon: HALOT
  rationale: The Hebrew idiom literally involves the burning of the nose/anger. 'Your
    anger burn' preserves the metaphor of heat while expressing the idiomatic sense
    clearly. 'Should' reflects the rhetorical appeal in context.
- source_word: בְּעַמֶּךָ
  chosen: against your people
  alternatives:
  - among your people
  - at your people
  lexicon: HALOT
  rationale: With the verb of anger, the preposition is best rendered 'against.' 'Your
    people' preserves the covenantal claim Moses invokes in intercession.
- source_word: אֲשֶׁר הוֹצֵאתָ
  chosen: whom you brought out
  alternatives:
  - that you brought out
  - whom you led out
  lexicon: HALOT
  rationale: Refers to the people as the object of divine deliverance. 'Whom' fits
    personal reference; 'brought out' is the standard exodus idiom.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: out of the land of Egypt
  alternatives:
  - from Egypt
  lexicon: HALOT
  rationale: The fuller phrase preserves the formal cadence and geographic specificity
    of the Hebrew.
- source_word: בְּכֹחַ גָּדוֹל
  chosen: with great power
  alternatives:
  - by great power
  - with mighty power
  lexicon: HALOT
  rationale: Instrumental beth is naturally rendered 'with.' 'Great power' is straightforward
    and preserves the emphasis on divine might.
- source_word: וּבְיָד חֲזָקָה
  chosen: with a strong hand
  alternatives:
  - with a mighty hand
  - by a strong hand
  lexicon: HALOT
  rationale: The phrase is a conventional exodus expression. 'Strong hand' is a transparent
    rendering of the Hebrew; 'mighty hand' is traditional and possible, but 'strong'
    more closely matches חֲזָקָה while remaining idiomatic.
