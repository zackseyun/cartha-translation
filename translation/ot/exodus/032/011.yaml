theological_decisions:
- issue: Anthropomorphic language for divine anger
  chosen_reading: Retain the metaphor in moderated form as 'your anger burn' rather
    than flattening to 'be angry' or over-literalizing to 'your nose burn.'
  alternative_readings:
  - your wrath blazed
  - you were angry
  rationale: The Hebrew uses embodied imagery for God's anger. Preserving some of
    that imagery maintains the text's rhetorical force and theological tension without
    implying creaturely limitation in a crude way.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for YHWH and aligns with longstanding
    reverential convention while remaining transparent in documentation.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH → the LORD'
