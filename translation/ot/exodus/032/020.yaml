id: EXO.32.20
reference: Exodus 32:20
source:
  edition: WLC
  text: וַ/יִּקַּ֞ח אֶת הָ/עֵ֨גֶל אֲשֶׁ֤ר עָשׂוּ֙ וַ/יִּשְׂרֹ֣ף בָּ/אֵ֔שׁ וַ/יִּטְחַ֖ן
    עַ֣ד אֲשֶׁר דָּ֑ק וַ/יִּ֨זֶר֙ עַל פְּנֵ֣י הַ/מַּ֔יִם וַ/יַּ֖שְׁקְ אֶת בְּנֵ֥י
    יִשְׂרָאֵֽל־־־־׃
translation:
  text: He took the calf that they had made, burned it in the fire, ground it until
    it was fine, scattered it on the surface of the water, and made the sons of Israel
    drink it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'made the Israelites drink it.' The Hebrew reads 'the sons of Israel,'
      a standard covenantal designation for the people as a whole.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֵגֶל
  chosen: the calf
  alternatives:
  - the young bull
  lexicon: HALOT
  rationale: עֵגֶל ordinarily denotes a calf/young bovine. In context this is the
    idol of the golden calf, so the familiar and plain rendering 'the calf' is best.
- source_word: אֲשֶׁר עָשׂוּ
  chosen: that they had made
  alternatives:
  - which they made
  lexicon: HALOT
  rationale: The relative clause identifies the calf as the one produced by the people.
    'Had made' fits the English narrative sequence naturally while preserving prior
    action.
- source_word: וַיִּשְׂרֹף בָּאֵשׁ
  chosen: burned it in the fire
  alternatives:
  - burned it with fire
  lexicon: HALOT
  rationale: A straightforward rendering of the verb plus prepositional phrase. 'In
    the fire' is idiomatic modern English and preserves the concrete action.
- source_word: וַיִּטְחַן עַד אֲשֶׁר דָּק
  chosen: ground it until it was fine
  alternatives:
  - ground it until it was powder
  - crushed it until it was fine
  lexicon: HALOT
  rationale: טחן means to grind, and דק conveys something fine/crushed small. 'Until
    it was fine' preserves the Hebrew sense without over-specifying 'powder,' though
    that is a plausible interpretive expansion.
- source_word: וַיִּזֶר
  chosen: scattered it
  alternatives:
  - strewed it
  - winnowed it
  lexicon: HALOT
  rationale: The verb here describes dispersing the ground remains. 'Scattered' is
    clear modern English. 'Winnowed' is too specific in English for this context,
    though related semantically.
- source_word: עַל פְּנֵי הַמַּיִם
  chosen: on the surface of the water
  alternatives:
  - upon the water
  - over the face of the water
  lexicon: HALOT
  rationale: פְּנֵי literally means 'face/surface.' 'On the surface of the water'
    preserves the imagery while remaining natural English.
- source_word: וַיַּשְׁקְ אֶת בְּנֵי יִשְׂרָאֵל
  chosen: made the sons of Israel drink it
  alternatives:
  - gave the Israelites to drink
  - made the Israelites drink
  lexicon: HALOT
  rationale: The Hiphil of שׁקה is causative, 'cause to drink / make drink.' Retaining
    'sons of Israel' reflects the Hebrew phrase בְּנֵי יִשְׂרָאֵל and follows the
    project's gender-accurate principle, though 'Israelites' is a natural alternative.
