theological_decisions:
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  rationale: The Hebrew is explicitly 'sons of Israel.' In keeping with the project's
    gender-accurate principle, the main text preserves the form of the source rather
    than neutralizing it. Because English readers may understand this corporately,
    the alternative is preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
