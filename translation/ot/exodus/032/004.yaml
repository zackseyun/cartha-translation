id: EXO.32.4
reference: Exodus 32:4
source:
  edition: WLC
  text: וַ/יִּקַּ֣ח מִ/יָּדָ֗/ם וַ/יָּ֤צַר אֹת/וֹ֙ בַּ/חֶ֔רֶט וַֽ/יַּעֲשֵׂ֖/הוּ עֵ֣גֶל
    מַסֵּכָ֑ה וַ/יֹּ֣אמְר֔וּ אֵ֤לֶּה אֱלֹהֶ֨י/ךָ֙ יִשְׂרָאֵ֔ל אֲשֶׁ֥ר הֶעֱל֖וּ/ךָ
    מֵ/אֶ֥רֶץ מִצְרָֽיִם׃
translation:
  text: And he took it from their hands, formed it with a graving tool, and made it
    into a cast calf. Then they said, “These are your gods, Israel, who brought you
    up from the land of Egypt.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with an engraving tool,' 'with a stylus,' or 'with a chisel'; the exact
      sense of the Hebrew term is debated.
    reason: lexical_alternative
  - marker: b
    text: Some textual traditions read 'he said' instead of 'they said.'
    reason: textual_variant
  - marker: c
    text: 'Hebrew: ''These are your gods''; traditionally often rendered ''This is
      your god,'' likely influenced by the single calf image.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקַּח מִיָּדָם
  chosen: he took it from their hands
  alternatives:
  - he received it from their hand
  lexicon: HALOT
  rationale: The verb לקח commonly means 'take/receive.' 'Took it from their hands'
    fits the direct narrative action and makes explicit the object supplied by context
    (the gold items from the previous verse). Plural 'hands' follows the Hebrew suffix.
- source_word: וַיָּצַר אֹתוֹ
  chosen: formed it
  alternatives:
  - fashioned it
  - shaped it
  lexicon: HALOT
  rationale: יצר often denotes shaping or forming, especially artisanally. 'Formed'
    is concise and natural, while preserving the deliberate crafting implied by the
    verb.
- source_word: בַּחֶרֶט
  chosen: with a graving tool
  alternatives:
  - with an engraving tool
  - with a stylus
  - with a chisel
  lexicon: HALOT
  rationale: The noun חֶרֶט refers to an implement used for engraving or shaping.
    'Graving tool' preserves the artisanal sense without overcommitting to a specific
    modern instrument. Because the exact implement is debated, an alternative is preserved
    in a footnote.
- source_word: וַיַּעֲשֵׂהוּ
  chosen: made it into
  alternatives:
  - made it
  - made for them
  lexicon: HALOT
  rationale: עשה is broad ('make/do'). Here 'made it into' smooths the English by
    linking the object to the resulting form named immediately after, without adding
    content beyond the Hebrew result construction.
- source_word: עֵגֶל מַסֵּכָה
  chosen: a cast calf
  alternatives:
  - a molten calf
  - an image of a calf
  lexicon: HALOT
  rationale: עֵגֶל is 'calf.' מַסֵּכָה denotes something cast in metal, often an idol-image.
    'Cast calf' is clear modern English and preserves the manufacturing sense better
    than the traditional but less natural 'molten calf.'
- source_word: וַיֹּאמְרוּ
  chosen: they said
  alternatives:
  - he said
  lexicon: HALOT
  rationale: The Masoretic vocalization is plural, referring most naturally to the
    people. This should be retained in the main text; the singular reading found in
    some traditions is worth preserving as a textual note.
- source_word: אֵלֶּה אֱלֹהֶיךָ
  chosen: These are your gods
  alternatives:
  - This is your god
  lexicon: HALOT
  rationale: The demonstrative is plural ('these'), and אֱלֹהֶיךָ is morphologically
    plural. The Hebrew idiom can sometimes function with singular reference, but the
    plural form should be represented in the main text. Because English readers may
    expect the singular from traditional renderings and because the referent is a
    single calf, the singular alternative is preserved in a footnote.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - O Israel
  lexicon: HALOT
  rationale: The proper name is best transliterated. English can supply direct address
    either with or without 'O'; omitting 'O' keeps the line readable while preserving
    vocative force by punctuation.
- source_word: אֲשֶׁר הֶעֱלוּךָ
  chosen: who brought you up
  alternatives:
  - who brought you out
  lexicon: HALOT
  rationale: The Hiphil of עלה is literally 'cause to go up.' In exodus contexts,
    'brought you up' is a standard and faithful rendering that preserves the Hebrew
    idiom.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of Egypt
  lexicon: HALOT
  rationale: The fuller phrase 'from the land of Egypt' matches the Hebrew wording
    and maintains the solemn cadence of the formula.
