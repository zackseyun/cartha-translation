theological_decisions:
- issue: Plural versus singular in the idol acclamation
  chosen_reading: 'Render the clause as plural: ''These are your gods, Israel'''
  alternative_readings:
  - This is your god, Israel
  rationale: The Hebrew forms in the Masoretic Text are plural, and optimal equivalence
    favors reflecting the source wording even where English tradition often uses the
    singular. The singular likely arises from harmonization to the single calf image
    or from later textual/traditional smoothing. Preserving the plural also leaves
    intact the rhetorical shock and possible echo of earlier formulations without
    resolving the tension.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Agency in the crafting process
  chosen_reading: Retain Aaron's direct agency in both forming and making the image
  alternative_readings:
  - Soften the statement to imply only supervision or receipt of the gold
  rationale: The Hebrew verbs straightforwardly attribute the actions to the singular
    subject. The translation should not reduce Aaron's culpability or import interpretive
    mitigation from later verses.
  doctrine_reference: Translation philosophy §1
