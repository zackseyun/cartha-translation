id: EXO.32.16
reference: Exodus 32:16
source:
  edition: WLC
  text: וְ/הַ֨/לֻּחֹ֔ת מַעֲשֵׂ֥ה אֱלֹהִ֖ים הֵ֑מָּה וְ/הַ/מִּכְתָּ֗ב מִכְתַּ֤ב אֱלֹהִים֙
    ה֔וּא חָר֖וּת עַל הַ/לֻּחֹֽת־׃
translation:
  text: Now the tablets were the work of God, and the writing was the writing of God,
    engraved on the tablets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God's workmanship ... God's inscription.' The Hebrew repeats 'work'
      and 'writing' for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַלֻּחֹת
  chosen: the tablets
  alternatives:
  - the stone tablets
  - the tables
  lexicon: HALOT
  rationale: לֻחֹת refers to tablets, here the covenant tablets already established
    in context as stone. 'Tablets' is the natural modern English rendering; 'stone'
    is not explicit in this verse and so is left implicit.
- source_word: מַעֲשֵׂה אֱלֹהִים
  chosen: the work of God
  alternatives:
  - God's workmanship
  - made by God
  lexicon: HALOT
  rationale: The construct phrase literally denotes 'work/workmanship of God.' 'The
    work of God' preserves the nominal force and emphasis better than a verbal paraphrase.
- source_word: הֵמָּה
  chosen: were
  alternatives:
  - they were
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis in Hebrew. In English, the copular
    clause naturally conveys the sense without requiring an explicit 'they'; the emphasis
    is adequately represented by the clause structure.
- source_word: הַמִּכְתָּב
  chosen: the writing
  alternatives:
  - the inscription
  - what was written
  lexicon: HALOT
  rationale: מִכְתָּב denotes writing/that which is written. 'The writing' preserves
    the repetition with the following construct phrase and keeps the style close to
    the Hebrew.
- source_word: מִכְתַּב אֱלֹהִים
  chosen: the writing of God
  alternatives:
  - God's writing
  - written by God
  lexicon: HALOT
  rationale: 'The repeated noun phrase is rhetorically significant: the writing itself
    is identified as God''s writing. Retaining the repetition mirrors the Hebrew emphasis.'
- source_word: הוּא
  chosen: was
  alternatives:
  - it was
  lexicon: HALOT
  rationale: The pronoun is resumptive/emphatic. English idiom does not require an
    explicit 'it' here, and 'was' smoothly carries the predication.
- source_word: חָרוּת
  chosen: engraved
  alternatives:
  - inscribed
  - carved
  lexicon: HALOT
  rationale: חָרוּת indicates something cut or engraved. 'Engraved' fits writing on
    stone tablets especially well and is standard, precise English in this context.
- source_word: עַל הַלֻּחֹת
  chosen: on the tablets
  alternatives:
  - upon the tablets
  lexicon: HALOT
  rationale: עַל is straightforwardly locative here. 'On the tablets' is clear modern
    English without loss of meaning.
- source_word: וְ
  chosen: Now
  alternatives:
  - And
  lexicon: HALOT
  rationale: The initial conjunction links this verse to the preceding narrative.
    'Now' is a natural discourse-level rendering in English narrative, while still
    preserving continuity.
