theological_decisions:
- issue: Agency of the tablets and inscription
  chosen_reading: Both the tablets themselves and the writing on them are presented
    as directly God's work.
  alternative_readings:
  - The verse could be rendered more dynamically as 'the tablets were made by God,
    and the writing was written by God.'
  rationale: The Hebrew uses nominal expressions ('the work of God,' 'the writing
    of God') rather than finite verbs. Preserving these expressions maintains the
    emphatic attribution to God without adding interpretive material.
  doctrine_reference: Translation philosophy §1, §3, §5
