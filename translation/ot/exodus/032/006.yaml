id: EXO.32.6
reference: Exodus 32:6
source:
  edition: WLC
  text: וַ/יַּשְׁכִּ֨ימוּ֙ מִֽ/מָּחֳרָ֔ת וַ/יַּעֲל֣וּ עֹלֹ֔ת וַ/יַּגִּ֖שׁוּ שְׁלָמִ֑ים
    וַ/יֵּ֤שֶׁב הָ/עָם֙ לֶֽ/אֱכֹ֣ל וְ/שָׁת֔וֹ וַ/יָּקֻ֖מוּ לְ/צַחֵֽק׃פ
translation:
  text: And they rose early the next day and offered burnt offerings and brought peace
    offerings. Then the people sat down to eat and drink, and rose up to revel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rose up to play.' The Hebrew verb can mean 'play,' 'celebrate,' or 'engage
      in revelry'; here the context suggests disorderly festivity rather than innocent
      amusement.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכִּימוּ
  chosen: rose early
  alternatives:
  - got up early
  - started early
  lexicon: HALOT
  rationale: Hiphil of שׁכם commonly means to rise early. 'Rose early' is idiomatic
    and preserves the temporal emphasis without over-paraphrase.
- source_word: מִמָּחֳרָת
  chosen: the next day
  alternatives:
  - on the following day
  - on the morrow
  lexicon: HALOT
  rationale: Refers to the day after the preceding events. 'The next day' is clear
    modern English; 'morrow' is archaic.
- source_word: וַיַּעֲלוּ עֹלֹת
  chosen: offered burnt offerings
  alternatives:
  - presented burnt offerings
  - brought up burnt offerings
  lexicon: HALOT
  rationale: עלה with עֹלָה in sacrificial context means to offer up burnt offerings.
    'Offered burnt offerings' is the standard and accurate cultic rendering.
- source_word: וַיַּגִּשׁוּ שְׁלָמִים
  chosen: brought peace offerings
  alternatives:
  - presented fellowship offerings
  - offered peace offerings
  lexicon: HALOT
  rationale: נגשׁ here is 'bring/present' in sacrificial context. שְׁלָמִים is traditionally
    'peace offerings'; while 'fellowship offerings' captures relational nuance, 'peace
    offerings' better preserves the established sacrificial category and lexical continuity.
- source_word: וַיֵּשֶׁב הָעָם
  chosen: the people sat down
  alternatives:
  - the people sat
  - the people settled down
  lexicon: HALOT
  rationale: ישׁב means to sit/dwell; in this narrative sequence 'sat down' naturally
    introduces the meal scene.
- source_word: לֶאֱכֹל וְשָׁתוֹ
  chosen: to eat and drink
  alternatives:
  - for eating and drinking
  lexicon: HALOT
  rationale: Infinitive plus coordinated infinitive expresses purpose/activity. 'To
    eat and drink' is direct and idiomatic.
- source_word: וַיָּקֻמוּ לְצַחֵק
  chosen: rose up to revel
  alternatives:
  - got up to play
  - rose up to celebrate
  - rose up to indulge in revelry
  lexicon: HALOT
  rationale: צחק can mean laugh, play, sport, or engage in festive/sexualized revelry
    depending on context. In the golden calf episode, with sacrificial feasting and
    subsequent judgment, the term likely carries a morally charged sense beyond innocent
    play. 'Revel' preserves that negative nuance without over-specifying sexual misconduct.
