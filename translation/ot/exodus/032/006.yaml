theological_decisions:
- issue: Nuance of לְצַחֵק in the golden calf episode
  chosen_reading: rendered as 'to revel'
  alternative_readings:
  - to play
  - to celebrate
  rationale: 'The context suggests more than harmless amusement: sacrificial rites
    before the calf, feasting, and the severe divine response indicate disorderly
    idolatrous festivity. ''To revel'' preserves the negative moral force while avoiding
    interpretive excess such as explicitly sexual language not demanded by the verse
    alone.'
  doctrine_reference: Translation philosophy §3, §6
