id: EXO.32.30
reference: Exodus 32:30
source:
  edition: WLC
  text: וַ/יְהִי֙ מִֽ/מָּחֳרָ֔ת וַ/יֹּ֤אמֶר מֹשֶׁה֙ אֶל הָ/עָ֔ם אַתֶּ֥ם חֲטָאתֶ֖ם חֲטָאָ֣ה גְדֹלָ֑ה וְ/עַתָּה֙ אֶֽעֱלֶ֣ה אֶל יְהוָ֔ה אוּלַ֥י אֲכַפְּרָ֖ה בְּעַ֥ד חַטַּאתְ/כֶֽם־־׃
translation:
  text: And it happened on the next day that Moses said to the people, “You have sinned a great sin. And now I will go up to Yahweh; perhaps I can make atonement for your sin.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''You have sinned a great sin,'' a cognate expression that intensifies the seriousness of the offense.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing the next event. 'And it happened' preserves the Hebrew discourse function without archaic excess; 'came to pass' is traditional but less natural in modern English.
- source_word: מִמָּחֳרָת
  chosen: on the next day
  alternatives:
  - the next day
  - on the following day
  - on the morrow
  lexicon: HALOT
  rationale: Temporal expression meaning the day after the preceding events. 'On the next day' is natural modern English and preserves the temporal sequence.
- source_word: וַיֹּאמֶר ... אֶל הָעָם
  chosen: Moses said to the people
  alternatives:
  - Moses spoke to the people
  lexicon: HALOT
  rationale: אמר with אל is the standard verb of speech addressed to someone. 'Said to' is the most direct and idiomatic rendering.
- source_word: אַתֶּם
  chosen: You
  lexicon: HALOT
  rationale: Explicit 2nd person plural pronoun adds emphasis in Hebrew. English can preserve this naturally with 'You' at the front of the clause.
- source_word: חֲטָאתֶם
  chosen: have sinned
  alternatives:
  - sinned
  lexicon: HALOT
  rationale: Perfect 2mp of חטא referring to a completed act with present relevance. English present perfect captures the force well in direct speech.
- source_word: חֲטָאָה גְדֹלָה
  chosen: a great sin
  alternatives:
  - a great offense
  - a grievous sin
  lexicon: HALOT
  rationale: 'Cognate accusative construction intensifies the verbal idea: literally ''you have sinned a great sin.'' Retaining ''sin'' preserves the lexical repetition and theological weight better than weakening to ''offense.'''
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Marks transition from accusation to Moses' intended action. 'And now' preserves the connective force of waw plus the temporal adverb.
- source_word: אֶעֱלֶה אֶל יְהוָה
  chosen: I will go up to the LORD
  alternatives:
  - I will ascend to the LORD
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' 'Go up' is idiomatic and fits Moses' movement toward God's presence on the mountain. יְהוָה follows the doctrinal default 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אוּלַי
  chosen: perhaps
  alternatives:
  - maybe
  - if perhaps
  lexicon: HALOT
  rationale: Expresses uncertainty or hope regarding the outcome of Moses' intercession. 'Perhaps' best matches the solemn tone.
- source_word: אֲכַפְּרָה
  chosen: I can make atonement
  alternatives:
  - I may make atonement
  - I can appease
  - I can purge
  lexicon: HALOT
  rationale: Piel of כפר in cultic/intercessory context commonly denotes making atonement. 'Make atonement' is the established and semantically appropriate rendering. 'Can' reflects the tentative nuance in combination with אוּלַי, expressing hoped-for possibility rather than certainty.
- source_word: בְּעַד
  chosen: for
  alternatives:
  - on behalf of
  - for the sake of
  lexicon: HALOT
  rationale: Preposition indicating representation or benefit. 'For' is concise and natural here; 'on behalf of' is possible but heavier.
- source_word: חַטַּאתְכֶם
  chosen: your sin
  alternatives:
  - your sin-offering
  - your offense
  lexicon: HALOT
  rationale: In this context חטאת refers to the people's sin, not a sin offering. 'Your sin' preserves the direct moral sense and echoes the earlier cognate construction.
