theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of Moses' statement about atonement
  chosen_reading: perhaps I can make atonement for your sin
  alternative_readings:
  - perhaps I may make atonement for your sin
  - perhaps I can obtain atonement for your sin
  rationale: The Hebrew presents Moses' hope-filled uncertainty, not a guarantee. The translation preserves that tension and does not import a doctrinally stronger claim about Moses' efficacy than the text states.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
