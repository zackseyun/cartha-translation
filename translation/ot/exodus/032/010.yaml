id: EXO.32.10
reference: Exodus 32:10
source:
  edition: WLC
  text: וְ/עַתָּה֙ הַנִּ֣יחָ/ה לִּ֔/י וְ/יִֽחַר אַפִּ֥/י בָ/הֶ֖ם וַ/אֲכַלֵּ֑/ם וְ/אֶֽעֱשֶׂ֥ה
    אוֹתְ/ךָ֖ לְ/ג֥וֹי גָּדֽוֹל־׃
translation:
  text: Now leave me alone, so that my anger may burn against them and I may consume
    them; and I will make you into a great nation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let me alone.'
    reason: lexical_alternative
  - marker: b
    text: Or 'that my wrath may grow hot against them and I may destroy them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנִּיחָה
  chosen: leave me alone
  alternatives:
  - let me alone
  - leave me be
  lexicon: HALOT
  rationale: Imperative of נוח/הניח in this idiom means to let someone alone or desist
    from restraining them. 'Leave me alone' is natural modern English and preserves
    the force of the command better than the more archaic 'let me alone.'
- source_word: וְיִחַר אַפִּי
  chosen: so that my anger may burn
  alternatives:
  - that my anger may burn
  - that my wrath may grow hot
  - and my anger will burn
  lexicon: HALOT
  rationale: 'The idiom חרה אף literally involves the nose/anger burning and denotes
    kindled anger. ''My anger may burn'' preserves the metaphor without awkward literalism.
    The conjunction after the imperative is taken as expressing purpose/result in
    context: Moses is to leave, with the result/purpose that divine anger burns against
    Israel.'
- source_word: אַפִּי
  chosen: my anger
  alternatives:
  - my wrath
  - my nose
  lexicon: HALOT
  rationale: Though literally 'my nose,' in this idiom it means anger. 'Anger' is
    the clearest English equivalent; 'wrath' is possible but slightly more interpretive
    and elevated.
- source_word: בָהֶם
  chosen: against them
  alternatives:
  - at them
  - on them
  lexicon: HALOT
  rationale: With the anger idiom, English normally expresses the object as 'against
    them.' This makes explicit the hostile direction conveyed by the Hebrew preposition
    in context.
- source_word: וַאֲכַלֵּם
  chosen: I may consume them
  alternatives:
  - I may destroy them
  - I may put an end to them
  lexicon: HALOT
  rationale: כלה in the Piel commonly means to finish off, consume, or destroy. 'Consume
    them' preserves the lexical imagery and leaves open both annihilating and judgmental
    nuance; 'destroy' is a valid but less textually textured alternative.
- source_word: וְאֶעֱשֶׂה אוֹתְךָ
  chosen: and I will make you
  alternatives:
  - and I will make from you
  - and I will make of you
  lexicon: HALOT
  rationale: עשה with object plus ל expresses making someone into something. 'Make
    you into' is idiomatic and accurately conveys transformation into the status named
    next.
- source_word: לְגוֹי גָּדוֹל
  chosen: into a great nation
  alternatives:
  - a great nation
  lexicon: HALOT
  rationale: גוי is the standard term for nation/people-group. 'Nation' is the most
    direct rendering here, and 'great' preserves the covenantal echo of promises to
    the patriarchs without importing extra wording.
- source_word: וְעַתָּה
  chosen: Now
  alternatives:
  - And now
  - So now
  lexicon: HALOT
  rationale: This discourse marker advances the speech and introduces the immediate
    command. 'Now' is concise and natural in English.
