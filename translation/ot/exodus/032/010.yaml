theological_decisions:
- issue: Anthropopathic language for divine anger
  chosen_reading: Retain the metaphor of God's anger burning without softening it
    into abstract displeasure.
  alternative_readings:
  - Render more abstractly as 'I will be angry with them'
  rationale: The Hebrew explicitly uses vivid anthropopathic language. Preserving
    it maintains the narrative force and theological tension of divine holiness and
    judgment, rather than resolving it into a less embodied paraphrase.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Force of the imperative 'leave me alone' in relation to Moses' intercession
  chosen_reading: Translate straightforwardly as a real imperative without explaining
    in the main text whether it is rhetorical or invitational.
  alternative_readings:
  - Interpret it as an implicit invitation for Moses to intercede
  rationale: The verse itself presents a direct command and announced judgment/promise.
    Any inference that the command invites intercession belongs to interpretation
    and should not be imported into the translation.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve tension where present.'
