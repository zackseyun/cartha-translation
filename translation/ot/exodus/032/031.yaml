id: EXO.32.31
reference: Exodus 32:31
source:
  edition: WLC
  text: וַ/יָּ֧שָׁב מֹשֶׁ֛ה אֶל יְהוָ֖ה וַ/יֹּאמַ֑ר אָ֣נָּ֗א חָטָ֞א הָ/עָ֤ם הַ/זֶּה֙
    חֲטָאָ֣ה גְדֹלָ֔ה וַ/יַּֽעֲשׂ֥וּ לָ/הֶ֖ם אֱלֹהֵ֥י זָהָֽב־׃
translation:
  text: Then Moses returned to the LORD and said, “Please, this people has sinned
    a great sin, and they have made gods of gold for themselves.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they made a god of gold for themselves.' The Hebrew reads 'gods of gold'
      (plural), though some understand it as referring to the golden calf in the singular
      because of the broader context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: returned
  alternatives:
  - went back
  - turned back
  lexicon: HALOT
  rationale: The verb שוב in the wayyiqtol here most naturally indicates Moses going
    back to YHWH after the episode with the people. 'Returned' is concise and idiomatic
    in English.
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
    The preposition אֶל is straightforwardly directional, 'to'.
- source_word: אָ֣נָּא
  chosen: Please
  alternatives:
  - Oh please
  - Alas
  lexicon: HALOT
  rationale: This particle expresses entreaty. 'Please' preserves Moses' pleading
    tone without sounding archaic.
- source_word: חָטָא
  chosen: has sinned
  alternatives:
  - sinned
  lexicon: HALOT
  rationale: The perfect verb reports a completed act with present relevance in Moses'
    intercession. English present perfect communicates that naturally.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this people here
  - these people
  lexicon: HALOT
  rationale: The Hebrew is singular, 'this people,' not plural 'these people.' Retaining
    the singular reflects the collective sense of עָם.
- source_word: חֲטָאָה גְדֹלָה
  chosen: a great sin
  alternatives:
  - a great offense
  - a grievous sin
  lexicon: HALOT
  rationale: 'The cognate construction with חָטָא intensifies the statement: literally
    ''has sinned a great sin.'' ''A great sin'' preserves both the lexical repetition
    and the gravity.'
- source_word: וַיַּעֲשׂוּ לָהֶם
  chosen: they have made for themselves
  alternatives:
  - they made for themselves
  - they made themselves
  lexicon: HALOT
  rationale: The phrase indicates that the people fashioned something for their own
    use or benefit. 'For themselves' preserves the reflexive nuance of לָהֶם.
- source_word: אֱלֹהֵי זָהָב
  chosen: gods of gold
  alternatives:
  - gold gods
  - a god of gold
  lexicon: HALOT
  rationale: The plural construct is best rendered 'gods of gold.' Although the immediate
    narrative centers on the calf, the Hebrew form is plural and should be preserved
    rather than harmonized to a singular.
