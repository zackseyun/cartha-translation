id: EXO.32.2
reference: Exodus 32:2
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֲלֵ/הֶם֙ אַהֲרֹ֔ן פָּֽרְקוּ֙ נִזְמֵ֣י הַ/זָּהָ֔ב אֲשֶׁר֙ בְּ/אָזְנֵ֣י
    נְשֵׁי/כֶ֔ם בְּנֵי/כֶ֖ם וּ/בְנֹתֵי/כֶ֑ם וְ/הָבִ֖יאוּ אֵלָֽ/י׃
translation:
  text: And Aaron said to them, “Take off the gold rings that are in the ears of your
    wives, your sons, and your daughters, and bring them to me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Break off the gold rings …” The Hebrew verb can suggest forcibly removing
      or breaking off the ornaments.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' preserves
    the Hebrew narrative flow in natural English without overinterpreting sequence.
- source_word: אֲלֵהֶם
  chosen: to them
  alternatives:
  - to the people
  lexicon: HALOT
  rationale: The pronoun is explicit in Hebrew and should be retained rather than
    replaced with an interpretive noun.
- source_word: אַהֲרֹן
  chosen: Aaron
  lexicon: HALOT
  rationale: Personal name is transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: פָּרְקוּ
  chosen: Take off
  alternatives:
  - Break off
  - Tear off
  - Remove
  lexicon: HALOT
  rationale: The verb can mean to tear off or break off forcibly, but here it refers
    to removing jewelry from the body. 'Take off' is the most natural modern English
    equivalent while still fitting the action. The stronger alternative 'break off'
    is worth preserving because many English versions use it and it may suggest haste
    or roughness.
- source_word: נִזְמֵי
  chosen: rings
  alternatives:
  - earrings
  lexicon: HALOT
  rationale: The noun denotes rings, often nose-rings or earrings depending on context.
    Because the following phrase specifies that they are 'in the ears,' 'rings' avoids
    redundancy while preserving the sense.
- source_word: הַזָּהָב
  chosen: the gold
  alternatives:
  - golden
  lexicon: HALOT
  rationale: The construct phrase is literally 'rings of the gold,' idiomatically
    'the gold rings.' Rendering the material as a noun is standard and clear.
- source_word: אֲשֶׁר בְּאָזְנֵי
  chosen: that are in the ears of
  alternatives:
  - that are on the ears of
  - from the ears of
  lexicon: HALOT
  rationale: This relative phrase identifies the location of the rings. 'In the ears
    of' is the most direct rendering of the Hebrew preposition and idiomatic enough
    in English.
- source_word: נְשֵׁיכֶם
  chosen: your wives
  alternatives:
  - your women
  lexicon: HALOT
  rationale: In this household context, 'wives' is the most likely sense and the standard
    rendering. 'Women' is possible lexically but less specific than the relational
    force here.
- source_word: בְּנֵיכֶם
  chosen: your sons
  alternatives:
  - your children
  lexicon: HALOT
  rationale: The Hebrew specifically says 'your sons,' not a generic term for children.
    Gender-accurate translation should preserve that specificity.
- source_word: וּבְנֹתֵיכֶם
  chosen: and your daughters
  alternatives:
  - and your girls
  lexicon: HALOT
  rationale: The Hebrew specifically names daughters in parallel with sons; the translation
    should preserve the explicit family grouping.
- source_word: וְהָבִיאוּ אֵלַי
  chosen: and bring them to me
  alternatives:
  - and bring them here to me
  lexicon: HALOT
  rationale: The imperative plus prepositional phrase is straightforward. 'Them' is
    supplied in English for clarity, referring back to the rings.
