id: EXO.32.26
reference: Exodus 32:26
source:
  edition: WLC
  text: וַ/יַּעֲמֹ֤ד מֹשֶׁה֙ בְּ/שַׁ֣עַר הַֽ/מַּחֲנֶ֔ה וַ/יֹּ֕אמֶר מִ֥י לַ/יהוָ֖ה
    אֵלָ֑/י וַ/יֵּאָסְפ֥וּ אֵלָ֖י/ו כָּל בְּנֵ֥י לֵוִֽי־׃
translation:
  text: Then Moses stood at the gate of the camp and said, “Whoever is for the LORD,
    come to me.” And all the sons of Levi gathered to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Who is for the LORD? To me!'' The translation makes explicit
      the implied summons: ''come to me.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'all the Levites.' Literally, 'all the sons of Levi.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֹד
  chosen: stood
  alternatives:
  - took his stand
  - stationed himself
  lexicon: HALOT
  rationale: The verb עמד in the waw-consecutive narrative form straightforwardly
    denotes taking a standing position. 'Stood' is natural modern English and fits
    the narrative without overinterpreting the posture as more formal than the Hebrew
    requires.
- source_word: בְּשַׁעַר הַמַּחֲנֶה
  chosen: at the gate of the camp
  alternatives:
  - in the gate of the camp
  - at the entrance of the camp
  lexicon: HALOT
  rationale: שַׁעַר commonly means 'gate' or gateway. With בְּ, English idiom favors
    'at the gate' rather than the more wooden 'in the gate.' 'Gate' preserves the
    concrete image better than the more generalized 'entrance.'
- source_word: מִי לַיהוָה
  chosen: Whoever is for the LORD
  alternatives:
  - Who is for the LORD?
  - Who belongs to the LORD?
  lexicon: HALOT
  rationale: Literally, 'Who [is] for YHWH?' In context Moses is issuing a summons,
    not merely asking for information. 'Whoever is for the LORD' captures the elliptical
    Hebrew in idiomatic English while preserving the allegiance sense of ל. The alternative
    'Who is for the LORD?' is more formally literal but less natural when followed
    by the imperative-like 'come to me.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
    This follows the stated translation policy and preserves the covenant-name convention
    in readable English.
- source_word: אֵלַי
  chosen: come to me
  alternatives:
  - to me
  lexicon: HALOT
  rationale: The Hebrew is elliptical, consisting only of the prepositional phrase
    'to me' after the challenge. English requires an implied motion verb for a complete
    summons. 'Come to me' supplies the minimal necessary sense without adding content
    beyond the context.
- source_word: וַיֵּאָסְפוּ
  chosen: gathered
  alternatives:
  - assembled
  - rallied
  lexicon: HALOT
  rationale: אָסף in the Niphal here denotes being gathered or assembling. 'Gathered'
    is the most direct and neutral rendering. 'Rallied' would add military coloring
    not explicit in the verb itself.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - around him
  lexicon: HALOT
  rationale: 'The preposition אֶל with pronominal suffix most simply means movement
    toward a person: ''to him.'' ''Around him'' is possible as an interpretive expansion
    but is not required by the text.'
- source_word: כָּל בְּנֵי לֵוִי
  chosen: all the sons of Levi
  alternatives:
  - all the Levites
  - all Levi's sons
  lexicon: HALOT
  rationale: The phrase is literally 'all the sons of Levi.' Because the Hebrew uses
    a masculine kinship term and refers specifically to the tribal male members who
    respond, the gendered form should be preserved per the gender-accurate policy.
    'Levites' is smoother but loses the explicit filial/tribal wording.
