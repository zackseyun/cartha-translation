theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. No contextual factor in this verse warrants deviation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered tribal designation בְּנֵי לֵוִי
  chosen_reading: all the sons of Levi
  alternative_readings:
  - all the Levites
  rationale: The source uses the masculine plural construct 'sons of Levi.' In this
    context the referents are the male members of the tribe who answer Moses' summons,
    so preserving the gendered expression best matches the Hebrew and the stated gender-accurate
    policy.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 Gender-accurate over gender-neutral
