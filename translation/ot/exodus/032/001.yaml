id: EXO.32.1
reference: Exodus 32:1
source:
  edition: WLC
  text: וַ/יַּ֣רְא הָ/עָ֔ם כִּֽי בֹשֵׁ֥שׁ מֹשֶׁ֖ה לָ/רֶ֣דֶת מִן הָ/הָ֑ר וַ/יִּקָּהֵ֨ל
    הָ/עָ֜ם עַֽל אַהֲרֹ֗ן וַ/יֹּאמְר֤וּ אֵלָי/ו֙ ק֣וּם עֲשֵׂה לָ֣/נוּ אֱלֹהִ֗ים אֲשֶׁ֤ר
    יֵֽלְכוּ֙ לְ/פָנֵ֔י/נוּ כִּי זֶ֣ה מֹשֶׁ֣ה הָ/אִ֗ישׁ אֲשֶׁ֤ר הֶֽעֱלָ֨/נוּ֙ מֵ/אֶ֣רֶץ
    מִצְרַ֔יִם לֹ֥א יָדַ֖עְנוּ מֶה הָ֥יָה לֽ/וֹ־־־׀־־׀־׃
translation:
  text: When the people saw that Moses was taking a long time to come down from the
    mountain, the people gathered around Aaron and said to him, “Get up, make gods
    for us that will go before us, because this Moses, the man who brought us up from
    the land of Egypt—we do not know what has happened to him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a god ... that will go before us.' Some understand אֱלֹהִים here in
      a singular sense because the narrative soon focuses on a single calf image,
      but the Hebrew form and the following verb are plural.
    reason: alternative_reading
lexical_decisions:
- source_word: בֹשֵׁשׁ
  chosen: was taking a long time
  alternatives:
  - delayed
  - was late
  - tarried
  lexicon: HALOT
  rationale: The verb conveys delay or slowness in arriving. 'Was taking a long time'
    is natural modern English and captures the people's perception without archaic
    tone. 'Delayed' is possible but can sound more neutral or technical.
- source_word: לָרֶדֶת
  chosen: to come down
  alternatives:
  - to descend
  lexicon: HALOT
  rationale: With Moses on the mountain, English idiom prefers 'come down' over the
    more formal 'descend.' This preserves the directional sense clearly.
- source_word: הָהָר
  chosen: the mountain
  alternatives:
  - the hill
  lexicon: HALOT
  rationale: In context Sinai is a mountain, and the definite article is preserved.
- source_word: וַיִּקָּהֵל ... עַל אַהֲרֹן
  chosen: gathered around Aaron
  alternatives:
  - assembled against Aaron
  - gathered to Aaron
  lexicon: HALOT
  rationale: The construction indicates the people assembling in relation to Aaron.
    'Around Aaron' fits the immediate narrative scene and avoids overstating hostility
    with 'against,' though pressure is certainly implied.
- source_word: קוּם
  chosen: Get up
  alternatives:
  - Arise
  - Come
  lexicon: HALOT
  rationale: The imperative is abrupt and forceful. 'Get up' conveys urgency in contemporary
    English better than the archaic 'Arise.'
- source_word: עֲשֵׂה לָנוּ
  chosen: make for us
  alternatives:
  - make us
  - fashion for us
  lexicon: HALOT
  rationale: The dative pronoun is retained explicitly with 'for us,' preserving the
    sense that Aaron is to produce something on their behalf.
- source_word: אֱלֹהִים
  chosen: gods
  alternatives:
  - a god
  - God
  lexicon: HALOT
  rationale: The noun is morphologically plural, and the following verb יֵלְכוּ is
    also plural ('they will go'), strongly supporting the plural rendering 'gods'
    in the main text. Because the episode results in a single calf image and some
    interpreters understand a singular sense, that alternative is preserved in a footnote.
- source_word: אֲשֶׁר יֵלְכוּ לְפָנֵינוּ
  chosen: that will go before us
  alternatives:
  - who will go before us
  - to go before us
  lexicon: HALOT
  rationale: This relative clause expresses the desired function of the gods/images
    as leaders. 'That will go before us' is straightforward and preserves the plural
    verbal agreement.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - this man
  lexicon: HALOT
  rationale: 'The Hebrew includes the definite noun ''the man'' after apposition with
    ''this Moses.'' Rendering both yields the dismissive tone: ''this Moses, the man...''.'
- source_word: הֶעֱלָנוּ
  chosen: brought us up
  alternatives:
  - led us up
  lexicon: HALOT
  rationale: The Hiphil of עלה in exodus contexts commonly means 'bring up.' This
    preserves the established exodus idiom from Egypt.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of Egypt
  lexicon: HALOT
  rationale: The fuller phrase is retained for formal clarity and because 'land of
    Egypt' is a common biblical expression.
- source_word: מֶה הָיָה לוֹ
  chosen: what has happened to him
  alternatives:
  - what became of him
  - what happened to him
  lexicon: HALOT
  rationale: This idiom asks about Moses' fate. 'What has happened to him' is idiomatic
    modern English; 'what became of him' is also good but slightly less contemporary.
