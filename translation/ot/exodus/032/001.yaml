theological_decisions:
- issue: Whether אֱלֹהִים here should be rendered singular or plural
  chosen_reading: 'plural: ''gods'''
  alternative_readings:
  - 'singular: ''a god'''
  rationale: 'The immediate grammar favors the plural: אֱלֹהִים is plural in form
    and the relative verb יֵלְכוּ is plural (''they will go''). Although the broader
    narrative centers on a single calf image and some translations use the singular
    to reflect that, the main text follows the Hebrew grammar while preserving the
    singular alternative in a footnote.'
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 5
