theological_decisions:
- issue: Anthropopathic language for God in וְהִנָּחֵם
  chosen_reading: Render as 'relent' rather than 'repent' or 'change your mind.'
  alternative_readings:
  - repent
  - change your mind
  - be sorry
  rationale: The Hebrew uses human-relational language in Moses' plea. 'Relent' preserves
    the real force of the appeal while avoiding the misleading implication that God
    morally erred. This maintains theological tension rather than flattening the text.
  doctrine_reference: Translation philosophy §3
- issue: Meaning of הָרָעָה when predicated of God's threatened action
  chosen_reading: Render as 'harm' in the main text.
  alternative_readings:
  - disaster
  - calamity
  - evil
  rationale: Because the same root רעה appears earlier of the Egyptians' accusation
    ('evil intent'), using 'evil' again for God's threatened judgment could wrongly
    imply moral evil in God. 'Harm' communicates punitive disaster directed against
    the people without importing a moral defect into God.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
