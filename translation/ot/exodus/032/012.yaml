id: EXO.32.12
reference: Exodus 32:12
source:
  edition: WLC
  text: לָ/מָּה֩ יֹאמְר֨וּ מִצְרַ֜יִם לֵ/אמֹ֗ר בְּ/רָעָ֤ה הֽוֹצִיאָ/ם֙ לַ/הֲרֹ֤ג אֹתָ/ם֙
    בֶּֽ/הָרִ֔ים וּ֨/לְ/כַלֹּתָ֔/ם מֵ/עַ֖ל פְּנֵ֣י הָֽ/אֲדָמָ֑ה שׁ֚וּב מֵ/חֲר֣וֹן
    אַפֶּ֔/ךָ וְ/הִנָּחֵ֥ם עַל הָ/רָעָ֖ה לְ/עַמֶּֽ/ךָ־׃
translation:
  text: Why should the Egyptians say, ‘He brought them out with evil intent, to kill
    them in the mountains and to wipe them off the face of the earth’? Turn from your
    burning anger, and relent concerning the harm against your people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for evil' / 'with harmful intent' for 'with evil intent.' The Hebrew
      phrase בְּרָעָה expresses the motive the Egyptians would attribute to God.
    reason: lexical_alternative
  - marker: b
    text: Or 'and to consume them' for 'and to wipe them off.' The Hebrew verb conveys
      complete destruction.
    reason: lexical_alternative
  - marker: c
    text: Or 'and relent concerning the disaster' / 'and change your mind about the
      calamity.' The Hebrew uses anthropopathic language in Moses' plea.
    reason: alternative_reading
lexical_decisions:
- source_word: לָמָּה
  chosen: Why should
  alternatives:
  - Why
  - For what reason should
  lexicon: HALOT
  rationale: Introduces Moses' rhetorical appeal. 'Why should' brings out the jussive-like
    force in context better than a bare 'Why' in English.
- source_word: יֹאמְרוּ
  chosen: should ... say
  alternatives:
  - will say
  - may say
  lexicon: HALOT
  rationale: Imperfect here is best rendered in a deliberative/rhetorical sense with
    'should ... say' following לָמָּה.
- source_word: מִצְרַיִם
  chosen: the Egyptians
  alternatives:
  - Egypt
  lexicon: HALOT
  rationale: Refers to the people, not merely the land; English idiom prefers 'the
    Egyptians'.
- source_word: לֵאמֹר
  chosen: ‘...’
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Rendered by direct quotation punctuation in natural English rather than
    the explicit participial 'saying'.
- source_word: בְּרָעָה
  chosen: with evil intent
  alternatives:
  - for evil
  - with harm
  - with malicious purpose
  lexicon: HALOT
  rationale: The preposition plus רָעָה here expresses purpose/motive attributed by
    the Egyptians. 'With evil intent' communicates that they would accuse God of malevolent
    purpose, not merely unfortunate outcome.
- source_word: הוֹצִיאָם
  chosen: He brought them out
  alternatives:
  - He led them out
  lexicon: HALOT
  rationale: Standard rendering of יצא in the Hiphil in the exodus context.
- source_word: לַהֲרֹג אֹתָם
  chosen: to kill them
  alternatives:
  - to slay them
  lexicon: HALOT
  rationale: Straightforward infinitive of purpose; 'kill' is clear modern English.
- source_word: בֶּהָרִים
  chosen: in the mountains
  alternatives:
  - among the mountains
  - in the hill country
  lexicon: HALOT
  rationale: Most direct rendering of the plural noun; refers to the wilderness mountain
    region.
- source_word: וּלְכַלֹּתָם
  chosen: and to wipe them off
  alternatives:
  - and to consume them
  - and to destroy them completely
  - and to finish them
  lexicon: HALOT
  rationale: כלה in the Piel conveys complete destruction. 'Wipe them off' fits the
    following idiom 'from the face of the earth' in natural English.
- source_word: מֵעַל פְּנֵי הָאֲדָמָה
  chosen: off the face of the earth
  alternatives:
  - from upon the face of the ground
  - from the face of the land
  lexicon: HALOT
  rationale: Established Hebrew idiom for total removal. 'Earth' is more idiomatic
    in English here than 'ground,' while preserving the sense of eradication.
- source_word: שׁוּב
  chosen: Turn from
  alternatives:
  - Turn back from
  - Return from
  lexicon: HALOT
  rationale: Imperative appeal for God to turn away from a course of wrath; 'Turn
    from' is concise and idiomatic.
- source_word: מֵחֲרוֹן אַפֶּךָ
  chosen: your burning anger
  alternatives:
  - the fierceness of your anger
  - your fierce anger
  - your wrath
  lexicon: HALOT
  rationale: The phrase literally denotes the burning/fierce heat of anger. 'Burning
    anger' preserves the metaphor without archaic diction.
- source_word: וְהִנָּחֵם
  chosen: and relent
  alternatives:
  - and be sorry
  - and change your mind
  - and have compassion
  lexicon: HALOT
  rationale: In this intercessory context, נחם is best rendered 'relent'—a standard
    English equivalent that preserves the anthropopathic force without implying creaturely
    error in God.
- source_word: עַל הָרָעָה
  chosen: concerning the harm
  alternatives:
  - from the disaster
  - about the evil
  - concerning the calamity
  lexicon: HALOT
  rationale: רָעָה here denotes threatened calamity/disaster, not moral evil in God.
    'Harm' avoids suggesting moral evil while keeping the lexical link with earlier
    רָעָה partially visible through context.
- source_word: לְעַמֶּךָ
  chosen: against your people
  alternatives:
  - for your people
  - toward your people
  - concerning your people
  lexicon: HALOT
  rationale: Given the context of threatened judgment, English idiom naturally expresses
    the object of the harm as 'against your people.'
