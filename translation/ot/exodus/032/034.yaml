id: EXO.32.34
reference: Exodus 32:34
source:
  edition: WLC
  text: וְ/עַתָּ֞ה לֵ֣ךְ נְחֵ֣ה אֶת הָ/עָ֗ם אֶ֤ל אֲשֶׁר דִּבַּ֨רְתִּי֙ לָ֔/ךְ הִנֵּ֥ה
    מַלְאָכִ֖/י יֵלֵ֣ךְ לְ/פָנֶ֑י/ךָ וּ/בְ/י֣וֹם פָּקְדִ֔/י וּ/פָקַדְתִּ֥י עֲלֵי/הֶ֖ם
    חַטָּאתָֽ/ם׀־־׃
translation:
  text: But now go, lead the people to where I have spoken to you. Look, my angel
    will go before you; but on the day when I call them to account, I will call them
    to account for their sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'to the place of which I have spoken to you.'
    reason: lexical_alternative
  - marker: b
    text: '''My angel'' could also be rendered ''my messenger''; the Hebrew term can
      denote either, though ''angel'' best fits this context.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew repeats the verb פקד (''visit/attend/call to account''): literally,
      ''on the day of my visiting, I will visit upon them their sin.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: But now
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Marks a transition from Moses' intercession to renewed instruction. 'But
    now' preserves the adversative nuance in context after the preceding exchange,
    while remaining natural English.
- source_word: לֵךְ
  chosen: go
  alternatives:
  - depart
  - be on your way
  lexicon: HALOT
  rationale: Simple imperative of הלך. 'Go' is the most direct and idiomatic rendering.
- source_word: נְחֵה
  chosen: lead
  alternatives:
  - guide
  - conduct
  lexicon: HALOT
  rationale: Imperative of נחה in the causative sense of leading or guiding. 'Lead'
    fits Moses' role over the people and is concise.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - this people
  lexicon: HALOT
  rationale: The definite noun refers to Israel collectively. 'The people' is the
    plain sense; 'this people' would add a demonstrative not present here.
- source_word: אֶל אֲשֶׁר דִּבַּרְתִּי לָךְ
  chosen: to where I have spoken to you
  alternatives:
  - to the place of which I have spoken to you
  - to what I told you
  lexicon: HALOT
  rationale: The clause points to the previously designated destination. 'To where
    I have spoken to you' is natural English while preserving the relative construction;
    the more explicit 'to the place of which I have spoken' is possible but stiffer.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces an emphatic assurance. 'Look' conveys the discourse force
    in readable modern English better than archaic 'Behold.'
- source_word: מַלְאָכִי
  chosen: my angel
  alternatives:
  - my messenger
  lexicon: HALOT
  rationale: מלאך can mean either 'messenger' or 'angel.' In this wilderness-guidance
    context, a heavenly envoy is in view, so 'my angel' best matches the narrative
    and standard biblical usage.
- source_word: יֵלֵךְ לְפָנֶיךָ
  chosen: will go before you
  alternatives:
  - will go ahead of you
  - will go in front of you
  lexicon: HALOT
  rationale: A common idiom for preceding in guidance and protection. 'Before you'
    preserves the biblical idiom clearly.
- source_word: וּבְיוֹם פָּקְדִי
  chosen: on the day when I call them to account
  alternatives:
  - in the day of my visiting
  - when I punish
  - on the day when I attend to this
  lexicon: HALOT
  rationale: פקד has a broad semantic range including attend, visit, muster, and punish.
    In this context of the golden calf and ensuing judgment, the sense is judicial
    reckoning. 'Call them to account' preserves the accountability nuance without
    over-narrowing to immediate destruction.
- source_word: וּפָקַדְתִּי עֲלֵיהֶם
  chosen: I will call them to account
  alternatives:
  - I will punish them
  - I will visit upon them
  lexicon: HALOT
  rationale: The repetition of פקד is preserved by repeating the English phrase. This
    keeps the rhetorical force of the Hebrew and allows the judicial sense to remain
    broad enough to include punishment.
- source_word: חַטָּאתָם
  chosen: for their sin
  alternatives:
  - their sin
  - their offense
  lexicon: HALOT
  rationale: The preposition is supplied idiomatically in English with the verb phrase
    'call to account for.' 'Sin' is the standard rendering of חטאת here.
