theological_decisions:
- issue: Meaning of מלאכי in relation to divine presence
  chosen_reading: Rendered as 'my angel' without identifying the figure more specifically.
  alternative_readings:
  - my messenger
  - a manifestation of the LORD himself
  rationale: The verse states only that God's angel will go before Moses/Israel. The
    translation preserves that wording and does not resolve broader theological debates
    about whether this angel is a created messenger or a special manifestation of
    divine presence.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Judicial force of פקד in this context
  chosen_reading: 'Rendered with accountability language: ''call them to account.'''
  alternative_readings:
  - punish them
  - visit their sin upon them
  rationale: The context clearly involves judgment for sin, but פקד can denote a broader
    act of divine visitation or reckoning. 'Call them to account' preserves the judicial
    sense while avoiding an unnecessarily narrow doctrinal or interpretive specification.
  doctrine_reference: Preserve theological tension rather than resolve it.
