id: EXO.32.15
reference: Exodus 32:15
source:
  edition: WLC
  text: וַ/יִּ֜פֶן וַ/יֵּ֤רֶד מֹשֶׁה֙ מִן הָ/הָ֔ר וּ/שְׁנֵ֛י לֻחֹ֥ת הָ/עֵדֻ֖ת בְּ/יָד֑/וֹ
    לֻחֹ֗ת כְּתֻבִים֙ מִ/שְּׁנֵ֣י עֶבְרֵי/הֶ֔ם מִ/זֶּ֥ה וּ/מִ/זֶּ֖ה הֵ֥ם כְּתֻבִֽים־׃
translation:
  text: Then Moses turned and went down from the mountain, with the two tablets of
    the testimony in his hand, tablets written on both their sides; on this side and
    on that they were written.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on one side and on the other.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפֶן
  chosen: turned
  alternatives:
  - turned around
  lexicon: HALOT
  rationale: The verb פנה in the wayyiqtol sequence marks Moses' change of direction
    before descending. 'Turned' is natural and sufficiently formal; 'turned around'
    is possible but slightly more expansive than the Hebrew requires.
- source_word: וַיֵּרֶד
  chosen: went down
  alternatives:
  - came down
  - descended
  lexicon: HALOT
  rationale: ירד means 'go down, descend.' 'Went down' fits the narrative viewpoint
    without implying the speaker's vantage point as strongly as 'came down.' 'Descended'
    is more formal but less natural in contemporary English.
- source_word: הָהָר
  chosen: the mountain
  alternatives:
  - the hill
  lexicon: HALOT
  rationale: הַר normally means 'mountain/hill'; in the Sinai context 'the mountain'
    is the established and contextually appropriate rendering.
- source_word: שְׁנֵי לֻחֹת
  chosen: the two tablets
  alternatives:
  - the two stone tablets
  - the two tables
  lexicon: HALOT
  rationale: לוחות are tablets. 'Stone' is explicit in nearby context (cf. v. 16)
    but not stated here, so it is not imported into the main text. 'Tables' is traditional
    but less clear in modern English.
- source_word: הָעֵדֻת
  chosen: the testimony
  alternatives:
  - the covenant document
  - the witness
  lexicon: HALOT
  rationale: עֵדוּת often denotes 'testimony' and is a standard designation for the
    covenant tablets. 'The testimony' preserves the Hebrew term and its theological
    resonance without over-interpreting it as merely 'covenant document.'
- source_word: בְּיָדוֹ
  chosen: in his hand
  alternatives:
  - in his hands
  lexicon: HALOT
  rationale: The Hebrew is singular, literally 'in his hand.' English can use singular
    idiomatically for what one carries; retaining singular stays close to the source.
- source_word: לֻחֹת כְּתֻבִים
  chosen: tablets written
  alternatives:
  - tablets inscribed
  lexicon: HALOT
  rationale: כתב in the passive participle means 'written.' 'Inscribed' is stylistically
    attractive for stone, but the Hebrew itself simply says 'written,' so that is
    retained.
- source_word: מִשְּׁנֵי עֶבְרֵיהֶם
  chosen: on both their sides
  alternatives:
  - from both their sides
  - on both sides of them
  lexicon: HALOT
  rationale: The phrase indicates the writing was present on the two surfaces/sides
    of the tablets. 'On both their sides' communicates the sense idiomatically in
    English.
- source_word: מִזֶּה וּמִזֶּה
  chosen: on this side and on that
  alternatives:
  - on one side and on the other
  - on this side and on that side
  lexicon: HALOT
  rationale: The distributive phrase emphasizes each side. 'On this side and on that'
    is a close, readable rendering that preserves the rhetorical balance.
- source_word: הֵם כְּתֻבִים
  chosen: they were written
  alternatives:
  - they were inscribed
  lexicon: HALOT
  rationale: The clause restates and emphasizes that the tablets were written on both
    sides. 'They were written' preserves the repetition present in Hebrew rather than
    smoothing it away.
