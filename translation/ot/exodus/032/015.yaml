theological_decisions:
- issue: Rendering עֵדוּת in the phrase 'tablets of the testimony'
  chosen_reading: the testimony
  alternative_readings:
  - the covenant
  - the witness
  rationale: The verse uses established covenantal terminology for the tablets. Rendering
    it as 'the testimony' preserves the traditional and lexical sense without narrowing
    it to a specific theological interpretation beyond the Hebrew wording.
