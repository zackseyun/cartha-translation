id: EXO.32.14
reference: Exodus 32:14
source:
  edition: WLC
  text: וַ/יִּנָּ֖חֶם יְהוָ֑ה עַל הָ֣/רָעָ֔ה אֲשֶׁ֥ר דִּבֶּ֖ר לַ/עֲשׂ֥וֹת לְ/עַמּֽ/וֹ־׃פ
translation:
  text: And Yahweh relented concerning the harm that he had spoken of doing to his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'changed his mind' or 'was sorry' concerning the disaster he had spoken of bringing on his people.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'the evil/disaster'; here it refers to threatened calamity or harm, not moral evil in God.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּנָּחֶם
  chosen: relented
  alternatives:
  - was sorry
  - changed his mind
  - had compassion
  lexicon: HALOT
  rationale: The Niphal of נחם here expresses a turning from a previously announced course of action. 'Relented' fits the immediate context of threatened judgment being withheld without implying ignorance or error in God. Alternatives such as 'changed his mind' are possible but can over-specify the anthropomorphic expression; 'was sorry' is less natural in this context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עַל
  chosen: concerning
  alternatives:
  - about
  - from
  lexicon: HALOT
  rationale: With נחם על, the preposition marks the matter with respect to which the relenting occurs. 'Concerning' is idiomatic and preserves the relation without awkwardness.
- source_word: הָרָעָה
  chosen: the harm
  alternatives:
  - the disaster
  - the evil
  - the calamity
  lexicon: HALOT
  rationale: רָעָה in this judgment context refers to threatened calamity, not moral evil in God. 'Harm' is clear modern English and avoids suggesting moral wrongdoing by God. 'Disaster' and 'calamity' are also viable; 'evil' is too misleading in contemporary English here.
- source_word: אֲשֶׁר דִּבֶּר
  chosen: that he had spoken of
  alternatives:
  - that he had said
  - which he had declared
  lexicon: HALOT
  rationale: The clause refers to what the LORD had previously announced. 'Spoken of' works smoothly with the following infinitive 'doing' in English.
- source_word: לַעֲשׂוֹת
  chosen: doing
  alternatives:
  - to do
  - to bring
  lexicon: HALOT
  rationale: Linked with 'spoken of,' the infinitive is best rendered in idiomatic English as 'spoken of doing.' 'Bring' would interpret the object more dynamically than the Hebrew requires.
- source_word: לְעַמּוֹ
  chosen: to his people
  alternatives:
  - for his people
  lexicon: HALOT
  rationale: The preposition marks the object affected by the threatened action. 'To his people' is the most direct and natural rendering in this context.
