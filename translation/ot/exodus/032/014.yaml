theological_decisions:
- issue: Anthropopathic description of God in נחם language
  chosen_reading: Render the verb as 'relented' rather than 'changed his mind' in the main text.
  alternative_readings:
  - changed his mind
  - was sorry
  rationale: The verse depicts a real shift in announced action in response to intercession, and the translation should preserve that tension without importing a full doctrinal explanation of divine mutability. 'Relented' communicates the narrative force while avoiding unnecessary theological overstatement. The alternative is preserved in a footnote because the Hebrew verb can be rendered more literally in ways readers may expect.
  doctrine_reference: Preserve theological tension rather than resolve it.
