id: EXO.32.13
reference: Exodus 32:13
source:
  edition: WLC
  text: זְכֹ֡ר לְ/אַבְרָהָם֩ לְ/יִצְחָ֨ק וּ/לְ/יִשְׂרָאֵ֜ל עֲבָדֶ֗י/ךָ אֲשֶׁ֨ר נִשְׁבַּ֣עְתָּ
    לָ/הֶם֮ בָּ/ךְ֒ וַ/תְּדַבֵּ֣ר אֲלֵ/הֶ֔ם אַרְבֶּה֙ אֶֽת זַרְעֲ/כֶ֔ם כְּ/כוֹכְבֵ֖י
    הַ/שָּׁמָ֑יִם וְ/כָל הָ/אָ֨רֶץ הַ/זֹּ֜את אֲשֶׁ֣ר אָמַ֗רְתִּי אֶתֵּן֙ לְ/זַרְעֲ/כֶ֔ם
    וְ/נָחֲל֖וּ לְ/עֹלָֽם־־׃
translation:
  text: Remember Abraham, Isaac, and Israel, your servants, to whom you swore by yourself
    and said to them, ‘I will multiply your offspring like the stars of the heavens,
    and all this land that I have spoken of I will give to your offspring, and they
    shall inherit it forever.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Jacob'—the patriarch later named Israel. The Hebrew text here reads
      'Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זְכֹר
  chosen: Remember
  alternatives:
  - Call to mind
  - Remember for the sake of
  lexicon: HALOT
  rationale: Imperative 2ms from זכר, addressed to God in Moses' intercession. 'Remember'
    is the natural English equivalent and preserves the covenantal appeal without
    paraphrastic expansion.
- source_word: לְאַבְרָהָם לְיִצְחָק וּלְיִשְׂרָאֵל
  chosen: Abraham, Isaac, and Israel
  alternatives:
  - Jacob
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy. The Hebrew
    text reads 'Israel,' not 'Jacob'; this should be preserved because it evokes the
    patriarch's covenant name in this appeal.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, here the emphasis is their status
    as God's covenant servants rather than bonded social condition. 'Servants' is
    the most fitting contextual rendering.
- source_word: אֲשֶׁר נִשְׁבַּעְתָּ לָהֶם בָּךְ
  chosen: to whom you swore by yourself
  alternatives:
  - to whom you swore by your own self
  lexicon: HALOT
  rationale: The Niphal of שׁבע with בָּךְ expresses oath-taking with God himself
    as the guarantee. 'By yourself' is idiomatic and preserves the reflexive force.
- source_word: וַתְּדַבֵּר אֲלֵהֶם
  chosen: and said to them
  alternatives:
  - and spoke to them
  lexicon: HALOT
  rationale: Though דבר is formally 'speak,' English idiom before direct quotation
    prefers 'said to them.' This is a minor dynamic adjustment for readability.
- source_word: אַרְבֶּה אֶת זַרְעֲכֶם
  chosen: I will multiply your offspring
  alternatives:
  - I will greatly increase your seed
  - I will multiply your descendants
  lexicon: HALOT
  rationale: Hiphil of רבה means 'multiply/increase.' זרע is collective; 'offspring'
    is clear modern English and preserves singular-collective force better than 'seed'
    for most readers.
- source_word: כְּכוֹכְבֵי הַשָּׁמַיִם
  chosen: like the stars of the heavens
  alternatives:
  - like the stars of heaven
  - as the stars of the sky
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the elevated covenantal language.
    'The heavens' reflects the Hebrew plural form while remaining natural enough in
    English.
- source_word: וְכָל הָאָרֶץ הַזֹּאת
  chosen: and all this land
  alternatives:
  - and this whole land
  lexicon: HALOT
  rationale: The phrase points demonstratively to the promised land under discussion.
    'All this land' is straightforward and keeps the Hebrew order and emphasis.
- source_word: אֲשֶׁר אָמַרְתִּי
  chosen: that I have spoken of
  alternatives:
  - that I said
  - which I said
  lexicon: HALOT
  rationale: The Hebrew literally says 'which I said,' but in English 'that I have
    spoken of' smooths the connection to the land promise without changing the sense.
    It avoids an awkward bare 'said' before the following 'I will give.'
- source_word: אֶתֵּן לְזַרְעֲכֶם
  chosen: I will give to your offspring
  alternatives:
  - I will give to your seed
  - I will give to your descendants
  lexicon: HALOT
  rationale: נתן in the imperfect is future in the quoted promise. 'Offspring' again
    preserves the collective singular of זרע consistently in this verse.
- source_word: וְנָחֲלוּ
  chosen: and they shall inherit it
  alternatives:
  - and they shall possess it as an inheritance
  lexicon: HALOT
  rationale: From נחל, 'inherit/receive as a possession.' The object 'it' is supplied
    in English from the land context, since English normally requires the pronoun
    though Hebrew leaves it implicit.
- source_word: לְעֹלָם
  chosen: forever
  alternatives:
  - for ever
  - perpetually
  - for an age
  lexicon: HALOT
  rationale: In covenant-promise context, לְעוֹלָם is best rendered 'forever.' This
    is the standard, natural English equivalent and preserves the durative force.
