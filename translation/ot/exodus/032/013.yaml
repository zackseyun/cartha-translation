theological_decisions:
- issue: Use of 'Israel' rather than 'Jacob' for the patriarch
  chosen_reading: Retain 'Israel' in the main text
  alternative_readings:
  - Jacob
  rationale: The Hebrew explicitly names the patriarch as 'Israel.' Rendering it as
    'Jacob' would interpret rather than translate and would mute the covenant-renaming
    resonance in Moses' appeal.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names;
    original-language primacy over translation tradition.'
- issue: Rendering the oath formula בָּךְ
  chosen_reading: by yourself
  alternative_readings:
  - by your own self
  rationale: The phrase emphasizes God's self-attesting oath, an important theological
    point in the patriarchal promise tradition. 'By yourself' communicates this clearly
    without adding doctrinal explanation beyond the text.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; original-language primacy over translation tradition.'
