id: EXO.32.17
reference: Exodus 32:17
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֧ע יְהוֹשֻׁ֛עַ אֶת ק֥וֹל הָ/עָ֖ם בְּ/רֵעֹ֑/ה וַ/יֹּ֨אמֶר֙ אֶל מֹשֶׁ֔ה
    ק֥וֹל מִלְחָמָ֖ה בַּֽ/מַּחֲנֶה־־׃
translation:
  text: When Joshua heard the sound of the people in their shouting, he said to Moses,
    “There is the sound of war in the camp.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the uproar' / 'as it shouted.' The Hebrew expression refers to the
      people's loud cry or noisy shouting.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: heard
  alternatives:
  - listened to
  lexicon: HALOT
  rationale: Qal wayyiqtol of שׁמע here denotes simple perception by hearing in narrative
    sequence, best rendered 'heard.'
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  rationale: Personal name is transliterated by standard English convention, per translation
    philosophy.
- source_word: קוֹל
  chosen: sound
  alternatives:
  - noise
  - voice
  lexicon: HALOT
  rationale: קוֹל can mean 'sound,' 'noise,' or 'voice.' In this context it refers
    to the audible commotion of the people rather than articulated speech, so 'sound'
    is the most natural English choice. The second occurrence is likewise rendered
    'sound' for consistency.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: עָם in this context refers to the Israelite people collectively; 'the
    people' is the standard and natural rendering.
- source_word: בְּרֵעֹה
  chosen: in their shouting
  alternatives:
  - as it shouted
  - in his shouting
  - in its shouting
  - in the uproar
  lexicon: HALOT
  rationale: From רוּעַ/רֵעַ in the sense of raising a loud cry or shout. The 3ms
    suffix is formally singular, agreeing with the collective noun עָם; idiomatic
    English renders the collective sense as 'their shouting.' 'Uproar' is possible
    but less directly tied to the verbal idea of shouting.
- source_word: וַיֹּאמֶר אֶל־מֹשֶׁה
  chosen: he said to Moses
  alternatives:
  - he said to Moshe
  rationale: Standard narrative speech formula. 'Moses' follows conventional English
    transliteration.
- source_word: קוֹל מִלְחָמָה
  chosen: the sound of war
  alternatives:
  - the noise of battle
  - a sound of war
  lexicon: HALOT
  rationale: Construct phrase literally 'sound of war.' 'The sound of war' preserves
    the Hebrew structure while remaining idiomatic. 'Battle' is possible, but 'war'
    more closely matches מִלְחָמָה.
- source_word: בַּמַּחֲנֶה
  chosen: in the camp
  alternatives:
  - within the camp
  lexicon: HALOT
  rationale: מַחֲנֶה refers to the Israelite encampment; 'in the camp' is the straightforward
    rendering.
