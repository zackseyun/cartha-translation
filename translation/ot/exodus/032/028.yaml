theological_decisions:
- issue: Rendering of the casualty statement in a judgment context
  chosen_reading: and about three thousand men from among the people fell that day
  alternative_readings:
  - and about three thousand men of the people were killed that day
  - and about three thousand of the people died that day
  rationale: The Hebrew uses the idiom 'fell' rather than an explicit verb 'kill.'
    Retaining 'fell' preserves the narrative's gravity and leaves the idiomatic force
    intact without adding interpretive specificity beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 4, 6
