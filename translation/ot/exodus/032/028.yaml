id: EXO.32.28
reference: Exodus 32:28
source:
  edition: WLC
  text: וַ/יַּֽעֲשׂ֥וּ בְנֵֽי לֵוִ֖י כִּ/דְבַ֣ר מֹשֶׁ֑ה וַ/יִּפֹּ֤ל מִן הָ/עָם֙ בַּ/יּ֣וֹם
    הַ/ה֔וּא כִּ/שְׁלֹ֥שֶׁת אַלְפֵ֖י אִֽישׁ־־׃
translation:
  text: And the sons of Levi did according to the word of Moses, and about three thousand
    men from among the people fell that day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'fell,' a common idiom for dying or being struck down; alternatively,
      'were killed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  chosen: did
  alternatives:
  - acted
  - carried out
  lexicon: HALOT
  rationale: The verb עשה here is broad and idiomatic; 'did' preserves the straightforward
    narrative sense and pairs naturally with 'according to the word of Moses.'
- source_word: בְנֵי לֵוִי
  chosen: the sons of Levi
  alternatives:
  - the Levites
  - the descendants of Levi
  lexicon: HALOT
  rationale: Literally 'sons of Levi.' This keeps the Hebrew familial expression while
    remaining clear in English. 'Levites' is possible, but the more literal phrase
    preserves the wording of the source.
- source_word: כִּדְבַר מֹשֶׁה
  chosen: according to the word of Moses
  alternatives:
  - according to Moses' word
  - as Moses said
  lexicon: HALOT
  rationale: This reflects the Hebrew construction closely. 'Word' here means command/instruction,
    but retaining 'word' preserves the source phrasing without obscuring the sense.
- source_word: וַיִּפֹּל
  chosen: fell
  alternatives:
  - were struck down
  - died
  lexicon: HALOT
  rationale: The singular verb with collective sense is naturally rendered 'fell,'
    a common biblical idiom for death in judgment. More explicit renderings like 'were
    struck down' interpret the cause more directly than the verb itself states.
- source_word: מִן הָעָם
  chosen: from among the people
  alternatives:
  - of the people
  - from the people
  lexicon: HALOT
  rationale: 'This best conveys the partitive sense of מן: those who fell were a subset
    drawn from the people.'
- source_word: בַּיּוֹם הַהוּא
  chosen: that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: '''That day'' is idiomatic modern English and fully represents the temporal
    phrase.'
- source_word: כִּשְׁלֹשֶׁת אַלְפֵי אִישׁ
  chosen: about three thousand men
  alternatives:
  - some three thousand men
  - approximately three thousand men
  lexicon: HALOT
  rationale: The prefixed כ on the number gives an approximate sense ('about/as many
    as'). 'Men' reflects אִישׁ and follows the project's gender-accurate principle
    rather than neutralizing to 'people.'
