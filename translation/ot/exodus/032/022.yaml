id: EXO.32.22
reference: Exodus 32:22
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אַהֲרֹ֔ן אַל יִ֥חַר אַ֖ף אֲדֹנִ֑/י אַתָּה֙ יָדַ֣עְתָּ אֶת הָ/עָ֔ם
    כִּ֥י בְ/רָ֖ע הֽוּא־־׃
translation:
  text: And Aaron said, “Do not let my lord’s anger burn hot. You yourself know the
    people, that they are set on evil.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “they are bent on evil” or “they are prone to evil.” The Hebrew expression
      is idiomatic and describes the people as characterized by evil.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: Standard narrative waw-consecutive introducing Aaron's reply; 'And ...
    said' preserves Hebrew narrative flow without overinterpreting sequence.
- source_word: אַהֲרֹן
  chosen: Aaron
  rationale: Personal name transliterated by standard English convention per translation
    philosophy.
- source_word: אַל יִחַר אַף
  chosen: Do not let ... anger burn hot
  alternatives:
  - Do not be angry
  - Do not let ... wrath burn
  lexicon: HALOT
  rationale: The idiom literally involves anger burning. 'Do not let ... anger burn
    hot' preserves the Hebrew metaphor more fully than the flatter 'do not be angry,'
    while remaining natural English.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - my master
  - sir
  lexicon: HALOT
  rationale: Here the term is a human address to Moses, not the divine title. Lowercase
    'my lord' best reflects deferential address without implying deity; 'sir' is too
    weak and modern, while 'master' may overstate hierarchy.
- source_word: אַתָּה יָדַעְתָּ
  chosen: You yourself know
  alternatives:
  - You know
  - You know well
  lexicon: HALOT
  rationale: The explicit pronoun adds emphasis in Hebrew. 'You yourself know' captures
    that emphasis naturally in English.
- source_word: הָעָם
  chosen: the people
  lexicon: HALOT
  rationale: Straightforward rendering of the collective noun with the article.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Introduces the content of what Moses knows about the people. 'That' fits
    the explanatory clause smoothly in English.
- source_word: בְרָע הוּא
  chosen: they are set on evil
  alternatives:
  - it is in evil
  - they are bent on evil
  - they are prone to evil
  lexicon: HALOT
  rationale: 'The Hebrew is somewhat idiomatic: literally ''it/he is in evil,'' referring
    to the people collectively. ''They are set on evil'' communicates entrenched moral
    inclination without awkward literalism. Plural English matches the collective
    sense of ''the people.'''
