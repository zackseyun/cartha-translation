theological_decisions:
- issue: Rendering of אֲדֹנִי in a human-address context
  chosen_reading: my lord
  alternative_readings:
  - my master
  - sir
  rationale: Because the addressee is Moses, the term should not be rendered with
    the divine-title force associated with 'Lord.' Lowercase 'my lord' preserves the
    respectful address and avoids theological confusion.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; κύριος/Lord
    principle applied analogically to distinguish divine from human address.'
