theological_decisions:
- issue: Nature of Aaron's culpability
  chosen_reading: Render Aaron as having brought sin upon the people, without softening
    to mere 'occasioned trouble' or intensifying beyond the text.
  alternative_readings:
  - you have brought great guilt on them
  - you have led them into a great sin
  rationale: The Hebrew directly attributes responsibility to Aaron for bringing חטאה
    גדולה upon the people. The translation preserves that moral charge while avoiding
    interpretive expansion beyond the wording.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
