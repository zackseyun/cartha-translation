id: EXO.32.21
reference: Exodus 32:21
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר מֹשֶׁה֙ אֶֽל אַהֲרֹ֔ן מֶֽה עָשָׂ֥ה לְ/ךָ֖ הָ/עָ֣ם הַ/זֶּ֑ה כִּֽי
    הֵבֵ֥אתָ עָלָ֖י/ו חֲטָאָ֥ה גְדֹלָֽה־־־׃
translation:
  text: Moses said to Aaron, “What did this people do to you, that you have brought
    such a great sin upon them?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “you have brought a great sin upon it,” with the singular pronoun referring
      collectively to “the people.” English normally uses the plural sense: “them.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative form; English normally omits the conjunction
    in smooth narrative while retaining past tense.
- source_word: מֶה עָשָׂה לְךָ הָעָם הַזֶּה
  chosen: What did this people do to you
  alternatives:
  - What has this people done to you
  - What did this people do against you
  lexicon: HALOT
  rationale: מֶה introduces the question 'what?'; עָשָׂה + לְ can mean 'do to' someone.
    'This people' preserves the demonstrative force of הַזֶּה and the somewhat distancing
    tone.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the result/content of the question: what they did
    to Aaron such that he led them into grave sin. ''That'' fits the English idiom
    better than a more causal ''because''.'
- source_word: הֵבֵאתָ
  chosen: you have brought
  alternatives:
  - you brought
  - you caused to come
  lexicon: HALOT
  rationale: Hiphil of בוא commonly means 'bring' or 'cause to come.' Present perfect
    in English works naturally in direct speech referring to Aaron's completed action
    with present relevance.
- source_word: עָלָיו
  chosen: upon them
  alternatives:
  - upon it
  - on them
  lexicon: HALOT
  rationale: Although morphologically singular ('upon him/it'), the pronoun refers
    back collectively to הָעָם ('the people'), which is singular in form but plural
    in sense. English requires plural sense here.
- source_word: חֲטָאָה גְדֹלָה
  chosen: such a great sin
  alternatives:
  - a great sin
  - great guilt
  lexicon: HALOT
  rationale: חטאה denotes sin/offense; 'great sin' is the plain sense. 'Such a' conveys
    the exclamatory weight of Moses' rebuke in idiomatic English without adding content.
