id: EXO.35.35
reference: Exodus 35:35
source:
  edition: WLC
  text: מִלֵּ֨א אֹתָ֜/ם חָכְמַת לֵ֗ב לַ/עֲשׂוֹת֮ כָּל מְלֶ֣אכֶת חָרָ֣שׁ וְ/חֹשֵׁב֒
    וְ/רֹקֵ֞ם בַּ/תְּכֵ֣לֶת וּ/בָֽ/אַרְגָּמָ֗ן בְּ/תוֹלַ֧עַת הַ/שָּׁנִ֛י וּ/בַ/שֵּׁ֖שׁ
    וְ/אֹרֵ֑ג עֹשֵׂי֙ כָּל מְלָאכָ֔ה וְ/חֹשְׁבֵ֖י מַחֲשָׁבֹֽת־־׀־׃
translation:
  text: He has filled them with wisdom of heart to do every kind of work of an engraver,
    a designer, and an embroiderer in blue, in purple, in scarlet yarn, and in fine
    linen, and of a weaver—makers of every kind of work and designers of designs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more broadly, 'craftsman' for 'engraver'; the Hebrew term can denote
      a skilled artisan in general, but here it likely refers to a specific class
      of tabernacle workmanship.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'wisdom of heart,' a Hebrew expression for inwardly grounded
      skill, discernment, and craftsmanship.
    reason: cultural_note
  - marker: c
    text: Or 'devisers of artistic designs' for 'designers of designs.' The Hebrew
      repeats cognate terms for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִלֵּא
  chosen: has filled
  alternatives:
  - filled
  lexicon: HALOT
  rationale: Piel of מלא commonly means 'fill.' English present perfect fits the Hebrew
    perfect in this descriptive context about what God has done for Bezalel and Oholiab.
- source_word: חָכְמַת לֵב
  chosen: wisdom of heart
  alternatives:
  - skill
  - wisdom
  - ability
  lexicon: HALOT
  rationale: Literally 'wisdom of heart.' Retaining the Hebrew idiom preserves the
    biblical conception of inwardly grounded skill and discernment, while remaining
    understandable in English.
- source_word: לַעֲשׂוֹת
  chosen: to do
  alternatives:
  - to make
  - to perform
  lexicon: HALOT
  rationale: עשה is broad; 'to do' best preserves the general force before the list
    of crafts. The following nouns specify the kinds of work involved.
- source_word: כָּל מְלֶאכֶת
  chosen: every kind of work
  alternatives:
  - all workmanship
  - every work
  lexicon: HALOT
  rationale: מלאכה denotes occupational or skilled work. 'Every kind of work' is natural
    English and reflects the comprehensive force of כל.
- source_word: חָרָשׁ
  chosen: engraver
  alternatives:
  - craftsman
  - artisan
  lexicon: HALOT
  rationale: In this tabernacle-artisan context, חרש refers to a skilled artisan.
    'Engraver' fits the traditional triad here alongside designer and embroiderer,
    though the term can be broader in other contexts.
- source_word: חֹשֵׁב
  chosen: designer
  alternatives:
  - skillful designer
  - planner
  lexicon: HALOT
  rationale: The participle from חשב in craft contexts refers to devising artistic
    patterns. 'Designer' communicates this clearly in modern English.
- source_word: רֹקֵם
  chosen: embroiderer
  alternatives:
  - embroidering worker
  lexicon: HALOT
  rationale: Standard rendering for רקם in textile contexts; it denotes decorative
    needlework.
- source_word: תְּכֵלֶת
  chosen: blue
  alternatives:
  - blue yarn
  - blue-purple
  lexicon: HALOT
  rationale: The term denotes a valued blue-dyed material. 'Blue' is concise and idiomatic;
    the material sense is already implied by the embroidery context.
- source_word: אַרְגָּמָן
  chosen: purple
  alternatives:
  - purple yarn
  lexicon: HALOT
  rationale: Standard color term for costly purple-dyed material.
- source_word: תּוֹלַעַת הַשָּׁנִי
  chosen: scarlet yarn
  alternatives:
  - scarlet
  - crimson yarn
  lexicon: HALOT
  rationale: This expression refers to scarlet material/dyed thread. 'Scarlet yarn'
    makes the textile sense explicit in natural English.
- source_word: שֵׁשׁ
  chosen: fine linen
  alternatives:
  - linen
  lexicon: HALOT
  rationale: In tabernacle contexts שש refers specifically to fine linen, not merely
    linen in general.
- source_word: אֹרֵג
  chosen: weaver
  alternatives:
  - one who weaves
  lexicon: HALOT
  rationale: Straightforward participial rendering in the list of crafts.
- source_word: עֹשֵׂי כָּל מְלָאכָה
  chosen: makers of every kind of work
  alternatives:
  - doing every kind of work
  - workers of every kind of craft
  lexicon: HALOT
  rationale: This summarizes their broad craftsmanship. 'Makers' keeps the active
    participial sense and avoids flattening the phrase into a mere abstract noun.
- source_word: חֹשְׁבֵי מַחֲשָׁבֹת
  chosen: designers of designs
  alternatives:
  - devisers of artistic designs
  - skillful designers
  lexicon: HALOT
  rationale: The Hebrew is intentionally cognate and emphatic. 'Designers of designs'
    preserves that rhetorical texture better than a smoother but less transparent
    paraphrase.
