id: EXO.35.9
reference: Exodus 35:9
source:
  edition: WLC
  text: וְ/אַ֨בְנֵי שֹׁ֔הַם וְ/אַבְנֵ֖י מִלֻּאִ֑ים לָ/אֵפ֖וֹד וְ/לַ/חֹֽשֶׁן־׃
translation:
  text: onyx stones, and stones for setting, for the ephod and for the breastpiece.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew שֹׁהַם (shoham) is traditionally rendered 'onyx,' though the precise
      gemstone identification is uncertain; possible alternatives include beryl or
      simply 'shoham stone.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַבְנֵי שֹׁהַם
  chosen: onyx stones
  alternatives:
  - shoham stones
  - beryl stones
  lexicon: HALOT
  rationale: שֹׁהַם names a precious stone traditionally rendered 'onyx' in many English
    versions, especially in tabernacle contexts. The exact mineral identification
    is uncertain, so alternatives are worth preserving, but 'onyx' is the most established
    and contextually fitting English gloss.
- source_word: אַבְנֵי מִלֻּאִים
  chosen: stones for setting
  alternatives:
  - setting stones
  - stones of mounting
  - inset stones
  lexicon: HALOT
  rationale: מִלֻּאִים literally relates to fillings/settings in priestly vestment
    contexts. Here it most naturally refers to stones intended to be mounted or set
    into the ephod/breastpiece. 'Stones for setting' is clear modern English while
    preserving the functional sense.
- source_word: לָאֵפֹד
  chosen: for the ephod
  lexicon: HALOT
  rationale: אֵפֹד is a technical term for the priestly garment and is best transliterated
    as 'ephod' rather than replaced with an interpretive paraphrase, preserving the
    cultic specificity of the Hebrew.
- source_word: וְלַחֹשֶׁן
  chosen: and for the breastpiece
  alternatives:
  - and for the breastplate
  lexicon: HALOT
  rationale: חֹשֶׁן denotes the priestly chest-piece that held the stones. 'Breastpiece'
    is preferred over 'breastplate' because the context is ornamental/cultic rather
    than military armor, and it is standard readable English.
