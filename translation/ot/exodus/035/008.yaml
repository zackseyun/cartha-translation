id: EXO.35.8
reference: Exodus 35:8
source:
  edition: WLC
  text: וְ/שֶׁ֖מֶן לַ/מָּא֑וֹר וּ/בְשָׂמִים֙ לְ/שֶׁ֣מֶן הַ/מִּשְׁחָ֔ה וְ/לִ/קְטֹ֖רֶת
    הַ/סַּמִּֽים׃
translation:
  text: oil for the light, and spices for the anointing oil and for the fragrant incense,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'incense of spices' / 'aromatic incense.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׁמֶן
  chosen: oil
  alternatives:
  - olive oil
  lexicon: HALOT
  rationale: The noun broadly denotes oil, commonly olive oil in this context. 'Oil'
    is the most natural English rendering and avoids adding specificity not explicit
    in the Hebrew, while the cultic/tabernacle context makes the referent clear enough.
- source_word: לַמָּאוֹר
  chosen: for the light
  alternatives:
  - for lighting
  - for the lamp
  lexicon: HALOT
  rationale: מָאוֹר refers to light or luminary. In the tabernacle supply list, the
    phrase means oil intended to provide light. 'For the light' is a close, readable
    rendering that preserves the Hebrew's nominal form better than the more interpretive
    'for lighting.'
- source_word: בְשָׂמִים
  chosen: spices
  alternatives:
  - aromatics
  - fragrant spices
  lexicon: HALOT
  rationale: The plural denotes aromatic substances used in sacred preparation. 'Spices'
    is idiomatic and sufficiently broad; 'aromatics' is more technical, while 'fragrant
    spices' would front-load a nuance expressed more explicitly later in the verse.
- source_word: שֶׁמֶן הַמִּשְׁחָה
  chosen: the anointing oil
  alternatives:
  - oil of anointing
  lexicon: HALOT
  rationale: This construct phrase is a standard cultic expression. 'The anointing
    oil' is the clearest modern English equivalent and preserves the definite, recognized
    ritual item.
- source_word: קְטֹרֶת
  chosen: incense
  alternatives:
  - smoke offering
  - burned incense
  lexicon: HALOT
  rationale: In tabernacle contexts, the noun refers to incense rather than a generic
    burning. 'Incense' is the conventional and accurate rendering.
- source_word: הַסַּמִּים
  chosen: fragrant
  alternatives:
  - of spices
  - spiced
  - aromatic
  lexicon: HALOT
  rationale: The phrase קְטֹרֶת הַסַּמִּים literally means 'incense of spices/aromatics.'
    In natural English, 'fragrant incense' communicates the sense well. The adjective
    'fragrant' captures the aromatic quality without awkward literalism.
