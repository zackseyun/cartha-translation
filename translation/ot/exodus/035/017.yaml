id: EXO.35.17
reference: Exodus 35:17
source:
  edition: WLC
  text: אֵ֚ת קַלְעֵ֣י הֶ/חָצֵ֔ר אֶת עַמֻּדָ֖י/ו וְ/אֶת אֲדָנֶ֑י/הָ וְ/אֵ֕ת מָסַ֖ךְ
    שַׁ֥עַר הֶ/חָצֵֽר־־׃
translation:
  text: the hangings of the court, its pillars and its bases, and the screen for the
    gate of the court—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'curtains of the court.'
    reason: lexical_alternative
  - marker: b
    text: Or 'its sockets' for 'its bases.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the curtain for the entrance of the court.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קַלְעֵי
  chosen: hangings
  alternatives:
  - curtains
  lexicon: HALOT
  rationale: Refers to the fabric panels forming the enclosure of the tabernacle court.
    'Hangings' is a natural English rendering in tabernacle contexts and distinguishes
    these side panels from the more specialized entrance screen.
- source_word: חָצֵר
  chosen: court
  alternatives:
  - courtyard
  lexicon: HALOT
  rationale: Denotes the enclosed outer area of the tabernacle. 'Court' is concise
    and idiomatic in English Bible usage; 'courtyard' is possible but slightly more
    expansive. Consistency with tabernacle terminology favors 'court'.
- source_word: עַמֻּדָיו
  chosen: its pillars
  alternatives:
  - its posts
  - its columns
  lexicon: HALOT
  rationale: The term denotes the upright structural supports of the court enclosure.
    'Pillars' fits sanctuary/tabernacle architectural language better than the more
    ordinary 'posts'.
- source_word: אֲדָנֶיהָ
  chosen: its bases
  alternatives:
  - its sockets
  - its pedestals
  lexicon: HALOT
  rationale: Refers to the supporting bases or sockets for the pillars. 'Bases' is
    broad and clear modern English; 'sockets' is also common in tabernacle passages
    but can sound overly technical here.
- source_word: מָסַךְ
  chosen: screen
  alternatives:
  - curtain
  - covering
  lexicon: HALOT
  rationale: In tabernacle contexts this word commonly denotes a screen or hanging
    that serves as an entrance covering. 'Screen' helps distinguish it from the court's
    surrounding hangings (קַלְעִים).
- source_word: שַׁעַר
  chosen: gate
  alternatives:
  - entrance
  lexicon: HALOT
  rationale: Refers to the entry point of the court enclosure. 'Gate' is the most
    direct rendering, while the phrase 'screen for the gate' communicates that the
    textile belongs to the entrance area.
