id: EXO.35.25
reference: Exodus 35:25
source:
  edition: WLC
  text: וְ/כָל אִשָּׁ֥ה חַכְמַת לֵ֖ב בְּ/יָדֶ֣י/הָ טָו֑וּ וַ/יָּבִ֣יאוּ מַטְוֶ֗ה אֶֽת
    הַ/תְּכֵ֨לֶת֙ וְ/אֶת הָֽ/אַרְגָּמָ֔ן אֶת תּוֹלַ֥עַת הַ/שָּׁנִ֖י וְ/אֶת הַ/שֵּֽׁשׁ־־־־־־׃
translation:
  text: 'And every woman wise of heart spun with her hands, and they brought what
    they had spun: the blue, the purple, the scarlet yarn, and the fine linen.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'wise of heart,' an idiom for practical skill grounded in inner wisdom.
    reason: lexical_alternative
  - marker: b
    text: Or 'the blue, the purple, the scarlet, and the fine linen'; the Hebrew lists
      the materials after 'what they had spun.'
    reason: alternative_reading
lexical_decisions:
- source_word: חַכְמַת לֵב
  chosen: wise of heart
  alternatives:
  - skillful
  - wise-hearted
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the Hebrew idiom linking wisdom
    with inner disposition and practical skill. 'Skillful' captures the sense but
    loses the heart-language; 'wise-hearted' is possible but less natural in modern
    English.
- source_word: בְּיָדֶיהָ
  chosen: with her hands
  alternatives:
  - by her hands
  lexicon: HALOT
  rationale: Idiomatic English for the instrumental beth plus 'hands'; it emphasizes
    manual workmanship.
- source_word: טָוּוּ
  chosen: spun
  alternatives:
  - spun thread
  - did spinning
  lexicon: HALOT
  rationale: The verb refers to spinning fibers into thread/yarn. 'Spun' is the most
    natural concise rendering.
- source_word: וַיָּבִיאוּ
  chosen: they brought
  alternatives:
  - and brought
  lexicon: HALOT
  rationale: The verb is plural, naturally referring to the women collectively. Keeping
    'they' reflects the shift from distributive singular ('every woman') to collective
    plural in Hebrew.
- source_word: מַטְוֶה
  chosen: what they had spun
  alternatives:
  - spun yarn
  - the spun material
  lexicon: HALOT
  rationale: The noun denotes spun material/thread. 'What they had spun' is clear
    modern English and fits the following list of materials.
- source_word: תְּכֵלֶת
  chosen: the blue
  alternatives:
  - blue yarn
  - blue-purple
  lexicon: HALOT
  rationale: In tabernacle contexts this term denotes a valued blue dyed material/thread.
    Because 'what they had spun' governs the list, 'the blue' is a concise way to
    preserve the Hebrew wording without repeating 'yarn' after each item.
- source_word: אַרְגָּמָן
  chosen: the purple
  alternatives:
  - purple yarn
  lexicon: HALOT
  rationale: Standard rendering for the dyed material used in tabernacle textiles.
    As with 'the blue,' the material sense is supplied by context.
- source_word: תּוֹלַעַת הַשָּׁנִי
  chosen: the scarlet yarn
  alternatives:
  - scarlet
  - crimson yarn
  lexicon: HALOT
  rationale: This expression refers to scarlet-dyed material, historically associated
    with worm-derived dye. 'Scarlet yarn' makes explicit the textile sense in context
    and is clearer than the more opaque literal expression.
- source_word: שֵׁשׁ
  chosen: the fine linen
  alternatives:
  - linen
  - the linen
  lexicon: HALOT
  rationale: In tabernacle passages this term commonly denotes fine linen rather than
    linen in general. 'Fine linen' preserves the likely quality distinction.
