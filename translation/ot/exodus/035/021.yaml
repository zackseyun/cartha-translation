id: EXO.35.21
reference: Exodus 35:21
source:
  edition: WLC
  text: וַ/יָּבֹ֕אוּ כָּל אִ֖ישׁ אֲשֶׁר נְשָׂא֣/וֹ לִבּ֑/וֹ וְ/כֹ֡ל אֲשֶׁר֩ נָדְבָ֨ה
    רוּח֜/וֹ אֹת֗/וֹ הֵ֠בִיאוּ אֶת תְּרוּמַ֨ת יְהוָ֜ה לִ/מְלֶ֨אכֶת אֹ֤הֶל מוֹעֵד֙
    וּ/לְ/כָל עֲבֹ֣דָת֔/וֹ וּ/לְ/בִגְדֵ֖י הַ/קֹּֽדֶשׁ־־־־׃
translation:
  text: And everyone came whose heart lifted him up, and everyone whose spirit moved
    him willingly brought the LORD’s contribution for the work of the tent of meeting,
    for all its service, and for the holy garments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whose heart stirred him' and 'whose spirit made him willing.' The Hebrew
      uses idioms of inward prompting and voluntary generosity.
    reason: lexical_alternative
  - marker: b
    text: Or 'the offering to the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: And ... came
  alternatives:
  - And ... came forward
  - And ... came in
  lexicon: HALOT
  rationale: The verb בוא straightforwardly means 'come.' 'Came' is the plain narrative
    rendering; 'came forward' is possible contextually but slightly interpretive.
- source_word: כָּל אִישׁ
  chosen: everyone
  alternatives:
  - every man
  - every person
  lexicon: HALOT
  rationale: Literally 'every man,' but in context it refers generically to each individual
    donor. 'Everyone' conveys the representative/generic force naturally in English
    while preserving the distributive sense.
- source_word: אֲשֶׁר נְשָׂאוֹ לִבּוֹ
  chosen: whose heart lifted him up
  alternatives:
  - whose heart stirred him
  - whose heart moved him
  - whose heart prompted him
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'his heart lifted him.' Retaining 'lifted
    him up' preserves the metaphor and avoids flattening it into mere paraphrase.
    More idiomatic alternatives are possible, but this wording remains understandable
    in modern English.
- source_word: וְכֹל אֲשֶׁר נָדְבָה רוּחוֹ אֹתוֹ
  chosen: and everyone whose spirit moved him willingly
  alternatives:
  - and everyone whose spirit made him willing
  - and everyone whose spirit prompted him
  - and everyone whom his spirit impelled
  lexicon: HALOT
  rationale: נדב in this stem conveys voluntary willingness or generous prompting.
    'Moved him willingly' captures both inward prompting and voluntariness. The adverbial
    sense of willingness is important in this contribution context.
- source_word: הֵבִיאוּ
  chosen: brought
  alternatives:
  - brought in
  - presented
  lexicon: HALOT
  rationale: Simple past 'brought' best matches the narrative sequence and the concrete
    act of donation.
- source_word: תְּרוּמַת יְהוָה
  chosen: the LORD’s contribution
  alternatives:
  - the offering to the LORD
  - the LORD’s offering
  - the contribution for the LORD
  lexicon: HALOT
  rationale: תְּרוּמָה denotes a contribution or offering set apart. 'Contribution'
    fits the material-donation context especially well. The genitive with YHWH can
    be rendered as belonging to or designated for the LORD; in English 'the LORD’s
    contribution' is concise and natural enough, though the sense is contribution
    dedicated to him.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: לִמְלֶאכֶת
  chosen: for the work of
  alternatives:
  - for the construction of
  - for the workmanship of
  lexicon: HALOT
  rationale: מְלָאכָה here refers broadly to the work/task associated with making
    the tabernacle items. 'Work of' is sufficiently broad and natural.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  lexicon: HALOT
  rationale: This is the standard and accurate rendering of the tabernacle designation
    in Exodus.
- source_word: וּלְכָל עֲבֹדָתוֹ
  chosen: for all its service
  alternatives:
  - for all its work
  - for all its use
  lexicon: HALOT
  rationale: עֲבֹדָה can mean service, labor, or work. In cultic/tabernacle context,
    'service' appropriately includes the functions and duties associated with the
    tent.
- source_word: וּלְבִגְדֵי הַקֹּדֶשׁ
  chosen: and for the holy garments
  alternatives:
  - and for the sacred garments
  - and for the garments of holiness
  lexicon: HALOT
  rationale: This phrase refers to the consecrated priestly vestments. 'Holy garments'
    is a clear and established rendering without unnecessary archaism.
