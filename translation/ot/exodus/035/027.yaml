id: EXO.35.27
reference: Exodus 35:27
source:
  edition: WLC
  text: וְ/הַ/נְּשִׂאִ֣ם הֵבִ֔יאוּ אֵ֚ת אַבְנֵ֣י הַ/שֹּׁ֔הַם וְ/אֵ֖ת אַבְנֵ֣י הַ/מִּלֻּאִ֑ים
    לָ/אֵפ֖וֹד וְ/לַ/חֹֽשֶׁן׃
translation:
  text: And the leaders brought the onyx stones and the stones for setting, for the
    ephod and for the breastpiece.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'the shoham stones'; the exact identification of this gemstone
      is uncertain, though 'onyx' is the traditional rendering.
    reason: lexical_alternative
  - marker: b
    text: Or 'breastplate.' The Hebrew refers to the priestly ornament worn on the
      chest, not body armor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַנְּשִׂאִם
  chosen: the leaders
  alternatives:
  - the chiefs
  - the princes
  - the tribal leaders
  lexicon: HALOT
  rationale: נְשִׂיאִים commonly denotes community leaders or chiefs. In this context
    of Israel’s representatives contributing materials, 'leaders' is clear modern
    English without implying monarchy ('princes').
- source_word: הֵבִיאוּ
  chosen: brought
  alternatives:
  - brought in
  - presented
  lexicon: HALOT
  rationale: The Hiphil of בוא here means to bring or present. 'Brought' is the most
    natural and sufficiently formal rendering in an inventory/contribution context.
- source_word: אַבְנֵי הַשֹּׁהַם
  chosen: the onyx stones
  alternatives:
  - the shoham stones
  - the beryl stones
  lexicon: HALOT
  rationale: שֹׁהַם is traditionally rendered 'onyx,' especially in tabernacle and
    priestly contexts. The precise mineral identification is uncertain, but 'onyx'
    remains the standard English rendering; an alternative is preserved in a footnote
    because the exact gemstone is debated.
- source_word: אַבְנֵי הַמִּלֻּאִים
  chosen: the stones for setting
  alternatives:
  - the setting stones
  - the stones of filling
  - the mounted stones
  lexicon: HALOT
  rationale: מִלֻּאִים in this cultic/jewelry context refers to settings or mountings
    into which stones are placed. 'Stones for setting' communicates function in clear
    English better than the opaque literalism 'stones of filling.'
- source_word: לָאֵפֹד
  chosen: for the ephod
  lexicon: HALOT
  rationale: אֵפֹד denotes the priestly garment known as the ephod. Because there
    is no precise English equivalent and 'ephod' is established terminology, transliteration
    is preferable.
- source_word: וְלַחֹשֶׁן
  chosen: and for the breastpiece
  alternatives:
  - and for the breastplate
  lexicon: HALOT
  rationale: חֹשֶׁן refers to the priestly chest ornament/pouch attached to the ephod.
    'Breastpiece' is more precise and less misleading than 'breastplate,' which can
    suggest armor.
