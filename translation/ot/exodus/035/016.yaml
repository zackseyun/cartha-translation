id: EXO.35.16
reference: Exodus 35:16
source:
  edition: WLC
  text: אֵ֣ת מִזְבַּ֣ח הָ/עֹלָ֗ה וְ/אֶת מִכְבַּ֤ר הַ/נְּחֹ֨שֶׁת֙ אֲשֶׁר ל֔/וֹ אֶת
    בַּדָּ֖י/ו וְ/אֶת כָּל כֵּלָ֑י/ו אֶת הַ/כִּיֹּ֖ר וְ/אֶת כַּנּֽ/וֹ׀־־־־־־־׃
translation:
  text: the altar of burnt offering, and the bronze grating that belongs to it, its
    poles, and all its utensils, the basin and its stand—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the bronze grate' or 'the bronze latticework.'
    reason: lexical_alternative
  - marker: b
    text: 'Traditional English: ''the laver and its base.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְבַּח הָעֹלָה
  chosen: the altar of burnt offering
  alternatives:
  - the altar of the burnt offering
  - the burnt-offering altar
  lexicon: HALOT
  rationale: Construct phrase naming the specific altar associated with whole burnt
    offerings. 'Altar of burnt offering' is clear modern English and preserves the
    sacrificial function without unnecessary stiffness.
- source_word: מִכְבַּר הַנְּחֹשֶׁת
  chosen: the bronze grating
  alternatives:
  - the bronze grate
  - the bronze latticework
  lexicon: HALOT
  rationale: מִכְבַּר denotes a grating/grate-like network attached to the altar.
    'Bronze grating' best captures the object as a metal grid while remaining natural
    English.
- source_word: אֲשֶׁר לוֹ
  chosen: that belongs to it
  alternatives:
  - that is on it
  - which is for it
  lexicon: HALOT
  rationale: The relative phrase indicates possession/association with the altar.
    'That belongs to it' communicates attachment without over-specifying physical
    position, which the Hebrew does not explicitly state here.
- source_word: בַּדָּיו
  chosen: its poles
  alternatives:
  - its carrying poles
  - its staves
  lexicon: HALOT
  rationale: בַּדִּים are the poles used for carrying tabernacle furnishings. 'Poles'
    is the clearest modern rendering; 'carrying' is implied by context and need not
    be added in the main text.
- source_word: כָּל כֵּלָיו
  chosen: all its utensils
  alternatives:
  - all its vessels
  - all its implements
  lexicon: HALOT
  rationale: כֵּלִים is a broad term for articles/equipment associated with the altar.
    'Utensils' fits cultic equipment in readable English better than the more archaic
    'vessels'.
- source_word: הַכִּיֹּר
  chosen: the basin
  alternatives:
  - the laver
  lexicon: HALOT
  rationale: The object is the wash basin in the tabernacle court. 'Basin' is accessible
    modern English; 'laver' is traditional but archaic.
- source_word: כַּנּוֹ
  chosen: its stand
  alternatives:
  - its base
  lexicon: HALOT
  rationale: The term refers to the support/base of the basin. 'Stand' is slightly
    more concrete in contemporary English, while 'base' remains a viable alternative.
