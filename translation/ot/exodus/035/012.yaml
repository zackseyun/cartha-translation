id: EXO.35.12
reference: Exodus 35:12
source:
  edition: WLC
  text: אֶת הָ/אָרֹ֥ן וְ/אֶת בַּדָּ֖י/ו אֶת הַ/כַּפֹּ֑רֶת וְ/אֵ֖ת פָּרֹ֥כֶת הַ/מָּסָֽךְ־־־׃
translation:
  text: the ark and its poles, the mercy seat, and the veil for the screen,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the atonement cover."
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאָרֹן
  chosen: the ark
  alternatives:
  - the chest
  lexicon: HALOT
  rationale: אָרוֹן in tabernacle context conventionally refers to the sacred ark/chest.
    'Ark' is the established and contextually precise rendering in English for the
    covenant container, while 'chest' is too generic.
- source_word: בַּדָּיו
  chosen: its poles
  alternatives:
  - its staves
  lexicon: HALOT
  rationale: בַּד denotes carrying poles used for transporting sacred furniture. 'Poles'
    is clear modern English; 'staves' is traditional but archaic.
- source_word: הַכַּפֹּרֶת
  chosen: the mercy seat
  alternatives:
  - the atonement cover
  - the cover
  lexicon: HALOT
  rationale: כַּפֹּרֶת is the gold cover of the ark with strong cultic significance.
    'Mercy seat' is the traditional rendering and remains the most recognizable in
    this tabernacle context; 'atonement cover' is possible and more explanatory, but
    less established. Because of theological significance and possible lexical debate,
    an alternative is preserved in a footnote.
- source_word: פָּרֹכֶת
  chosen: the veil
  alternatives:
  - the curtain
  lexicon: HALOT
  rationale: פָּרֹכֶת refers to the inner partition hanging of the tabernacle. 'Veil'
    preserves its cultic and separating function better than the more generic 'curtain'.
- source_word: הַמָּסָךְ
  chosen: the screen
  alternatives:
  - the covering curtain
  lexicon: HALOT
  rationale: 'מָסָךְ commonly denotes a screen or hanging. In construct with פָּרֹכֶת,
    the phrase is best understood appositionally/descriptively: ''the veil for the
    screen'' or ''the screening veil.'' This preserves both nouns rather than collapsing
    one into the other.'
- source_word: אֶת / וְאֶת
  chosen: '[direct-object markers not translated]'
  lexicon: Hebrew grammar
  rationale: The repeated אֶת marks definite direct objects and has no direct English
    equivalent; the coordination is represented by English punctuation and 'and'.
