theological_decisions:
- issue: Rendering of הַכַּפֹּרֶת in a cultic/tabernacle context
  chosen_reading: the mercy seat
  alternative_readings:
  - the atonement cover
  rationale: The Hebrew term names the ark's cover and carries atonement associations.
    'Mercy seat' preserves the established cultic sense in English, while 'atonement
    cover' is a viable explanatory alternative. Since the doctrine excerpt highlights
    the theological weight of related atonement terminology, the alternative is preserved
    in a footnote rather than silently excluded.
  doctrine_reference: Translation philosophy §3; Contested terms note on ἱλαστήριον
