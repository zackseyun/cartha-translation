id: EXO.35.5
reference: Exodus 35:5
source:
  edition: WLC
  text: קְח֨וּ מֵֽ/אִתְּ/כֶ֤ם תְּרוּמָה֙ לַֽ/יהוָ֔ה כֹּ֚ל נְדִ֣יב לִבּ֔/וֹ יְבִיאֶ֕/הָ
    אֵ֖ת תְּרוּמַ֣ת יְהוָ֑ה זָהָ֥ב וָ/כֶ֖סֶף וּ/נְחֹֽשֶׁת׃
translation:
  text: 'Take from among you an offering for the LORD. Everyone whose heart is willing
    shall bring it—the LORD’s offering: gold, silver, and bronze.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'everyone of a willing heart'; the expression refers to a voluntary
      inner disposition.
    reason: lexical_alternative
  - marker: b
    text: Or 'contribution for the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: קְחוּ
  chosen: Take
  alternatives:
  - Collect
  - Receive
  lexicon: HALOT
  rationale: Qal imperative plural of לקח, here a direct command to the assembly.
    'Take' is the most straightforward rendering and fits the following phrase 'from
    among you.'
- source_word: מֵאִתְּכֶם
  chosen: from among you
  alternatives:
  - from you
  - out of your possession
  lexicon: HALOT
  rationale: The preposition with pronominal suffix indicates source from within the
    community. 'From among you' preserves the communal sense better than the flatter
    'from you.'
- source_word: תְּרוּמָה
  chosen: offering
  alternatives:
  - contribution
  - heave offering
  lexicon: HALOT
  rationale: In this tabernacle-contribution context, תְּרוּמָה refers to a contribution
    set apart for sacred use. 'Offering' is natural modern English and broad enough
    for the listed materials. 'Heave offering' is too technical and contextually misleading
    here.
- source_word: לַיהוָה / יְהוָה
  chosen: for the LORD / the LORD’s
  alternatives:
  - for Yahweh / Yahweh’s
  lexicon: HALOT
  rationale: 'Per doctrine, the default rendering of the divine name is ''the LORD.''
    The lamed marks dedication: the offering is for the LORD.'
- source_word: כֹּל נְדִיב לִבּוֹ
  chosen: Everyone whose heart is willing
  alternatives:
  - everyone of a willing heart
  - everyone whose heart moves him generously
  - every willing-hearted man
  lexicon: HALOT
  rationale: The phrase denotes voluntary inward disposition. 'Everyone whose heart
    is willing' preserves the heart-language while expressing the idiom in readable
    English. 'Man' is not required in English here because כֹּל with this adjective
    functions generically for the community.
- source_word: יְבִיאֶהָ
  chosen: shall bring it
  alternatives:
  - is to bring it
  - must bring it
  lexicon: HALOT
  rationale: Hiphil imperfect 3ms with 3fs suffix referring back to תְּרוּמָה. 'Shall
    bring it' conveys the expected action without overstating compulsion; the context
    is voluntary giving.
- source_word: אֵת תְּרוּמַת יְהוָה
  chosen: the LORD’s offering
  alternatives:
  - the offering for the LORD
  - the contribution to the LORD
  lexicon: HALOT
  rationale: 'This appositional phrase restates and specifies the offering. The construct
    is rendered possessively in idiomatic English: ''the LORD’s offering.'''
- source_word: זָהָב וָכֶסֶף וּנְחֹשֶׁת
  chosen: gold, silver, and bronze
  alternatives:
  - gold, silver, and copper
  lexicon: HALOT
  rationale: נְחֹשֶׁת in tabernacle-material contexts is conventionally and plausibly
    'bronze' rather than pure 'copper,' matching standard English usage for ancient
    metalwork lists.
