id: EXO.35.32
reference: Exodus 35:32
source:
  edition: WLC
  text: וְ/לַ/חְשֹׁ֖ב מַֽחַשָׁבֹ֑ת לַ/עֲשֹׂ֛ת בַּ/זָּהָ֥ב וּ/בַ/כֶּ֖סֶף וּ/בַ/נְּחֹֽשֶׁת׃
translation:
  text: to devise designs, to work in gold and in silver and in bronze,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to plan plans' or 'to design designs'; the Hebrew uses a verb and cognate
      noun from the same root to emphasize skilled artistic conception.
    reason: lexical_alternative
  - marker: b
    text: '''Bronze'' could also be rendered ''copper''; older English versions often
      have ''brass.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לַ/חְשֹׁב
  chosen: to devise
  alternatives:
  - and to plan
  - and to think out
  - and to design
  lexicon: HALOT
  rationale: The infinitive construct of חשׁב here denotes skilled planning or devising
    in an artistic/craft context, not mere abstract thinking. English 'devise' captures
    intentional creative planning well. The prefixed conjunction is not separately
    represented because English idiom in this skill-list context does not require
    repeating 'and' before every infinitive.
- source_word: מַחַשָׁבֹת
  chosen: designs
  alternatives:
  - plans
  - artistic designs
  - devices
  lexicon: HALOT
  rationale: The plural noun from the same root as חשׁב refers here to crafted designs
    or artistic plans. 'Designs' is concise and natural in English, and fits the tabernacle
    craftsmanship context better than the broader 'plans' or the potentially misleading
    'devices'.
- source_word: לַ/עֲשֹׂת
  chosen: to work
  alternatives:
  - to make
  - to execute
  - to fashion
  lexicon: HALOT
  rationale: עשה is broad ('do/make'), but in this immediate context of metal craftsmanship,
    'to work' idiomatically conveys skilled execution in a material. 'To make in gold'
    is less natural English, while 'to fashion' may sound slightly more interpretive.
- source_word: בַּ/זָּהָב
  chosen: in gold
  alternatives:
  - with gold
  - using gold
  lexicon: HALOT
  rationale: The preposition ב in lists of materials for craftsmanship is naturally
    rendered 'in' in English ('work in gold'), preserving the material sphere of the
    artisan's labor.
- source_word: וּ/בַ/כֶּסֶף
  chosen: and in silver
  alternatives:
  - and with silver
  lexicon: HALOT
  rationale: Parallel to 'in gold'; 'silver' is the standard rendering of כסף in material
    lists.
- source_word: וּ/בַ/נְּחֹשֶׁת
  chosen: and in bronze
  alternatives:
  - and in النحاس/copper
  - and in brass
  lexicon: HALOT
  rationale: In tabernacle contexts נְחֹשֶׁת is conventionally and plausibly rendered
    'bronze' for the metal used in cultic furnishings. 'Brass' is traditional but
    historically less precise; 'copper' is possible but less likely in this stock
    construction list.
