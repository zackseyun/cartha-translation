id: EXO.35.15
reference: Exodus 35:15
source:
  edition: WLC
  text: וְ/אֶת מִזְבַּ֤ח הַ/קְּטֹ֨רֶת֙ וְ/אֶת בַּדָּ֔י/ו וְ/אֵת֙ שֶׁ֣מֶן הַ/מִּשְׁחָ֔ה
    וְ/אֵ֖ת קְטֹ֣רֶת הַ/סַּמִּ֑ים וְ/אֶת מָסַ֥ךְ הַ/פֶּ֖תַח לְ/פֶ֥תַח הַ/מִּשְׁכָּֽן־־־׃
translation:
  text: the altar of incense and its poles, and the anointing oil, and the fragrant
    incense, and the screen for the entrance, for the entrance of the tabernacle;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the incense altar.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the incense of spices' or 'the spiced incense.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the curtain for the entrance' or 'at the entrance to the tabernacle.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְבַּח הַקְּטֹרֶת
  chosen: the altar of incense
  alternatives:
  - the incense altar
  - the altar for burning incense
  lexicon: HALOT
  rationale: Construct chain literally denotes an altar associated with incense. 'Altar
    of incense' is clear, natural English and preserves the cultic specificity without
    over-expanding the Hebrew.
- source_word: בַּדָּיו
  chosen: its poles
  alternatives:
  - its carrying poles
  - its staves
  lexicon: HALOT
  rationale: בַּדִּים in tabernacle contexts refers to the poles used to carry sacred
    furniture. 'Poles' is the most readable modern rendering; 'carrying poles' is
    accurate but slightly more interpretive.
- source_word: שֶׁמֶן הַמִּשְׁחָה
  chosen: the anointing oil
  alternatives:
  - the oil of anointing
  lexicon: HALOT
  rationale: Standard cultic phrase. 'Anointing oil' is idiomatic modern English while
    preserving the ritual sense.
- source_word: קְטֹרֶת הַסַּמִּים
  chosen: the fragrant incense
  alternatives:
  - the incense of spices
  - the spiced incense
  - the sweet incense
  lexicon: HALOT
  rationale: הַסַּמִּים refers to aromatic spices/balsamic ingredients. 'Fragrant
    incense' communicates the sense naturally in English without the awkwardness of
    a more wooden rendering.
- source_word: מָסַךְ הַפֶּתַח
  chosen: the screen for the entrance
  alternatives:
  - the curtain for the entrance
  - the covering for the entrance
  lexicon: HALOT
  rationale: מָסָךְ in tabernacle descriptions denotes a hanging/screen at an entryway,
    distinct from other curtains/veils. 'Screen' best preserves that distinction in
    English.
- source_word: לְפֶתַח הַמִּשְׁכָּן
  chosen: for the entrance of the tabernacle
  alternatives:
  - at the entrance to the tabernacle
  - for the doorway of the tabernacle
  lexicon: HALOT
  rationale: 'The prefixed ל here marks relation/purpose with the preceding screen:
    a screen belonging to or serving the entrance of the tabernacle. ''For the entrance
    of the tabernacle'' stays close to the Hebrew structure, though English could
    also smooth it as ''at the entrance to the tabernacle.'''
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  lexicon: HALOT
  rationale: Though the root sense is 'dwelling place,' 'tabernacle' is the established
    and accurate English term for this sanctuary structure in Exodus, preserving referential
    consistency.
