id: EXO.35.13
reference: Exodus 35:13
source:
  edition: WLC
  text: אֶת הַ/שֻּׁלְחָ֥ן וְ/אֶת בַּדָּ֖י/ו וְ/אֶת כָּל כֵּלָ֑י/ו וְ/אֵ֖ת לֶ֥חֶם הַ/פָּנִֽים־־־־׃
translation:
  text: the table, and its poles, and all its utensils, and the bread of the Presence,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or traditionally, 'showbread.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשֻּׁלְחָן
  chosen: the table
  alternatives:
  - the table of showbread
  lexicon: HALOT
  rationale: The noun simply denotes the cultic table. The specific function is clarified
    by the following phrase 'the bread of the Presence,' so adding that function here
    would over-translate.
- source_word: בַּדָּיו
  chosen: its poles
  alternatives:
  - its carrying poles
  - its staves
  lexicon: HALOT
  rationale: בַּד in tabernacle contexts refers to the poles used for carrying sacred
    furniture. 'Poles' is clear modern English; 'staves' is archaic, and 'carrying
    poles' is slightly more explicit but unnecessary here.
- source_word: כָּל כֵּלָיו
  chosen: all its utensils
  alternatives:
  - all its vessels
  - all its implements
  lexicon: HALOT
  rationale: כְּלִי is a broad term for articles, implements, or vessels. In the context
    of table service, 'utensils' is natural modern English and suitably concrete without
    being overly narrow.
- source_word: לֶחֶם הַפָּנִים
  chosen: the bread of the Presence
  alternatives:
  - the bread of the face
  - the showbread
  - the bread set before the LORD
  lexicon: HALOT
  rationale: Literally 'bread of the face/presence.' 'Bread of the Presence' preserves
    the Hebrew cultic expression in understandable English. 'Showbread' is traditional
    but opaque to many readers; 'bread set before the LORD' is interpretive rather
    than lexical.
