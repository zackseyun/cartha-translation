id: EXO.35.23
reference: Exodus 35:23
source:
  edition: WLC
  text: וְ/כָל אִ֞ישׁ אֲשֶׁר נִמְצָ֣א אִתּ֗/וֹ תְּכֵ֧לֶת וְ/אַרְגָּמָ֛ן וְ/תוֹלַ֥עַת
    שָׁנִ֖י וְ/שֵׁ֣שׁ וְ/עִזִּ֑ים וְ/עֹרֹ֨ת אֵילִ֧ם מְאָדָּמִ֛ים וְ/עֹרֹ֥ת תְּחָשִׁ֖ים
    הֵבִֽיאוּ־־׃
translation:
  text: And every man with whom blue yarn, purple yarn, scarlet yarn, fine linen,
    goats’ hair, ram skins dyed red, and tahash skins were found brought them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew tahash skins. The animal or material denoted by tahash is uncertain;
      proposed renderings include 'fine leather,' 'porpoise skins,' or 'dugong skins.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל אִישׁ
  chosen: And every man
  alternatives:
  - And every person
  - And every one
  lexicon: HALOT
  rationale: אִישׁ is grammatically masculine singular used distributively with כָל.
    Following the gender-accurate policy, 'every man' best matches the source form
    and sense here, referring to each male Israelite donor in the assembly context
    rather than using a gender-neutral smoothing.
- source_word: אֲשֶׁר נִמְצָא אִתּוֹ
  chosen: with whom ... were found
  alternatives:
  - who had ...
  - in whose possession ... were found
  lexicon: HALOT
  rationale: The Niphal of מצא is passive/reflexive, literally 'was found with him.'
    'With whom ... were found' preserves the Hebrew construction more closely than
    the smoother 'who had,' while remaining natural enough in English.
- source_word: תְּכֵלֶת
  chosen: blue yarn
  alternatives:
  - blue
  - blue cloth
  - blue material
  lexicon: HALOT
  rationale: In tabernacle contexts תְּכֵלֶת denotes the blue-dyed material used in
    fabrics. 'Blue yarn' makes explicit the textile sense in a list of tabernacle
    materials and pairs naturally with the following dyed fibers.
- source_word: אַרְגָּמָן
  chosen: purple yarn
  alternatives:
  - purple
  - purple cloth
  - purple material
  lexicon: HALOT
  rationale: Like תְּכֵלֶת, this term refers to purple-dyed textile material. 'Purple
    yarn' keeps the list concrete and consistent.
- source_word: תוֹלַעַת שָׁנִי
  chosen: scarlet yarn
  alternatives:
  - scarlet
  - crimson yarn
  - scarlet material
  lexicon: HALOT
  rationale: This expression refers to scarlet/crimson dyed material, often associated
    with yarn or thread in tabernacle inventories. 'Scarlet yarn' is idiomatic and
    consistent with the surrounding textile items.
- source_word: שֵׁשׁ
  chosen: fine linen
  alternatives:
  - linen
  lexicon: HALOT
  rationale: שֵׁשׁ commonly denotes high-quality linen in priestly/tabernacle texts.
    'Fine linen' reflects the likely quality nuance better than the bare 'linen.'
- source_word: עִזִּים
  chosen: goats’ hair
  alternatives:
  - goats
  - goat hair
  lexicon: HALOT
  rationale: Although literally 'goats,' in this materials list the referent is the
    goat-hair product used for weaving the tent coverings. Rendering the implied material
    avoids misleading readers into thinking live animals were brought.
- source_word: עֹרֹת אֵילִם מְאָדָּמִים
  chosen: ram skins dyed red
  alternatives:
  - red-dyed ram skins
  - skins of rams dyed red
  lexicon: HALOT
  rationale: The phrase denotes ram skins treated or colored red. 'Ram skins dyed
    red' is clear modern English and preserves the participial modifier.
- source_word: עֹרֹת תְּחָשִׁים
  chosen: tahash skins
  alternatives:
  - fine leather
  - porpoise skins
  - dugong skins
  - goat skins
  lexicon: HALOT
  rationale: תְּחָשׁ is lexically uncertain. Rather than choosing a speculative animal
    identification, 'tahash skins' transparently transliterates the debated term and
    preserves auditability. An explanatory footnote records major alternatives.
- source_word: הֵבִיאוּ
  chosen: brought them
  alternatives:
  - brought
  - presented them
  lexicon: HALOT
  rationale: The plural verb summarizes the action of those possessing these materials.
    'Brought them' makes the implied object explicit in natural English.
