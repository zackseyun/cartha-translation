id: EXO.35.24
reference: Exodus 35:24
source:
  edition: WLC
  text: כָּל מֵרִ֗ים תְּר֤וּמַת כֶּ֨סֶף֙ וּ/נְחֹ֔שֶׁת הֵבִ֕יאוּ אֵ֖ת תְּרוּמַ֣ת יְהוָ֑ה וְ/כֹ֡ל אֲשֶׁר֩ נִמְצָ֨א אִתּ֜/וֹ עֲצֵ֥י שִׁטִּ֛ים לְ/כָל מְלֶ֥אכֶת הָ/עֲבֹדָ֖ה הֵבִֽיאוּ־־׃
translation:
  text: Everyone who offered a contribution of silver or bronze brought Yahweh’s contribution, and everyone with whom acacia wood was found for any work of the service brought it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an offering of silver and bronze.' The Hebrew conjunction can be rendered either way in English, though the sense is that each person brought whatever metal contribution he or she had.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'with whom acacia wood was found,' an idiom meaning 'who had acacia wood available.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל מֵרִים
  chosen: Everyone who offered
  alternatives:
  - Everyone lifting up
  - Everyone who presented
  lexicon: HALOT
  rationale: The participle of רוּם with תְּרוּמָה refers idiomatically to presenting or offering a contribution. 'Everyone who offered' gives natural English while preserving the participial sense.
- source_word: תְּר֤וּמַת כֶּ֨סֶף֙ וּנְחֹשֶׁת
  chosen: a contribution of silver or bronze
  alternatives:
  - an offering of silver and bronze
  - a contribution of silver and copper
  lexicon: HALOT
  rationale: תְּרוּמָה is a contribution/offering set apart for sacred use. נְחֹשֶׁת can denote bronze or copper; 'bronze' is the standard contextual rendering in tabernacle materials. The conjunction is rendered 'or' idiomatically in English for distributed reference to either material contributed by individuals.
- source_word: הֵבִיאוּ אֵת תְּרוּמַת יְהוָה
  chosen: brought the LORD’s contribution
  alternatives:
  - brought the contribution to the LORD
  - brought the offering for the LORD
  lexicon: HALOT
  rationale: The construct phrase תְּרוּמַת יְהוָה most naturally means 'the LORD's contribution/offering,' i.e., the contribution belonging to him or designated for him. Because יְהוָה is rendered 'the LORD' per doctrine, the phrase is kept compact and possessive in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name.
- source_word: וְכֹל אֲשֶׁר נִמְצָא אִתּוֹ
  chosen: and everyone with whom ... was found
  alternatives:
  - and everyone who had
  - and all with whom ... was available
  lexicon: HALOT
  rationale: The Hebrew literally says 'everyone with whom it was found.' This idiom indicates possession or availability. The translation preserves the Hebrew structure more closely while remaining readable.
- source_word: עֲצֵי שִׁטִּים
  chosen: acacia wood
  alternatives:
  - acacia-wood timber
  - shittim wood
  lexicon: HALOT
  rationale: Standard modern rendering for the tabernacle material; more accessible than transliterating 'shittim.'
- source_word: לְכָל מְלֶאכֶת הָעֲבֹדָה
  chosen: for any work of the service
  alternatives:
  - for all the work of the service
  - for any work of the tabernacle service
  lexicon: HALOT
  rationale: מְלָאכָה is work/craftsmanship and עֲבֹדָה is service/labor. 'Work of the service' preserves both nouns without over-specifying 'tabernacle,' which is contextually implied but not stated here. 'Any' reflects distributive לְכָל idiomatically.
- source_word: הֵבִיאוּ
  chosen: brought it
  alternatives:
  - brought
  - brought them
  lexicon: HALOT
  rationale: English supplies 'it' to refer back to the acacia wood as a mass noun, making the sentence complete and natural.
