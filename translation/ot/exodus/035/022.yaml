id: EXO.35.22
reference: Exodus 35:22
source:
  edition: WLC
  text: וַ/יָּבֹ֥אוּ הָ/אֲנָשִׁ֖ים עַל הַ/נָּשִׁ֑ים כֹּ֣ל נְדִ֣יב לֵ֗ב הֵ֠בִיאוּ חָ֣ח וָ/נֶ֜זֶם וְ/טַבַּ֤עַת וְ/כוּמָז֙ כָּל כְּלִ֣י זָהָ֔ב וְ/כָל אִ֕ישׁ אֲשֶׁ֥ר הֵנִ֛יף תְּנוּפַ֥ת זָהָ֖ב לַ/יהוָֽה־׀־־׃
translation:
  text: So the men came with the women. Everyone whose heart was willing brought brooches, earrings, rings, and ornaments—all kinds of gold jewelry. And every man who presented a wave offering of gold to Yahweh did so.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew phrase 'the men upon/with the women' is idiomatic; it likely means the men came together with, or in addition to, the women.
    reason: alternative_reading
  - marker: b
    text: 'The exact meanings of some jewelry terms are uncertain: ''brooches'' may also be ''clasps'' or ''rings''; ''earrings'' may also be ''nose-rings''; ''ornaments'' may refer to a specific kind of pendant or armlet.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: So ... came
  alternatives:
  - and ... came
  - then ... came
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So' gives natural English flow while preserving sequence.
- source_word: הָאֲנָשִׁים עַל הַנָּשִׁים
  chosen: the men came with the women
  alternatives:
  - the men came along with the women
  - the men came in addition to the women
  - the men came upon/over the women
  lexicon: HALOT
  rationale: The preposition עַל here is idiomatic and difficult literally. In context of voluntary contributions by the congregation, it most plausibly means the men came together with / in addition to the women, not spatially 'upon' them. 'With the women' is concise and natural while preserving the joint participation.
- source_word: כֹּל נְדִיב לֵב
  chosen: Everyone whose heart was willing
  alternatives:
  - everyone of a willing heart
  - everyone generous of heart
  - every willing-hearted person
  lexicon: HALOT
  rationale: נְדִיב לֵב denotes willing, generous inner disposition. 'Whose heart was willing' preserves the Hebrew anthropological expression without sounding wooden.
- source_word: הֵבִיאוּ
  chosen: brought
  alternatives:
  - presented
  lexicon: HALOT
  rationale: Standard rendering for הביא in offering contexts; straightforward and idiomatic.
- source_word: חָח
  chosen: brooches
  alternatives:
  - hooks
  - rings
  - nose-rings
  - clasps
  lexicon: HALOT
  rationale: The exact item is uncertain; in jewelry lists it likely denotes an ornament such as a brooch or clasp rather than a generic hook. 'Brooches' gives a plausible modern equivalent while the uncertainty is preserved in a footnote.
- source_word: נֶזֶם
  chosen: earrings
  alternatives:
  - ring
  - nose-ring
  lexicon: HALOT
  rationale: נֶזֶם can denote a ring worn in ear or nose. In a list of personal ornaments, 'earrings' is a natural default, with the broader possibility preserved in a footnote.
- source_word: טַבַּעַת
  chosen: signet rings
  alternatives:
  - rings
  lexicon: HALOT
  rationale: טַבַּעַת commonly refers to a ring, often a signet ring. 'Signet rings' gives the likely sense in an inventory of valuables, though 'rings' remains possible.
- source_word: כוּמָז
  chosen: ornaments
  alternatives:
  - pendants
  - armlets
  - bracelets
  lexicon: HALOT
  rationale: The term is rare and its exact referent uncertain. A broad term such as 'ornaments' avoids false precision; a footnote preserves more specific proposals.
- source_word: כָּל כְּלִי זָהָב
  chosen: all kinds of gold jewelry
  alternatives:
  - every article of gold
  - all gold objects
  - every gold vessel/article
  lexicon: HALOT
  rationale: כְּלִי is broad ('article, object, vessel, implement'). In this jewelry context, 'all kinds of gold jewelry' captures the sense more idiomatically than the overly broad 'articles of gold'.
- source_word: וְכָל אִישׁ
  chosen: And every man
  alternatives:
  - and everyone
  - and every person
  lexicon: HALOT
  rationale: The Hebrew is singular masculine אישׁ. Per gender-accurate policy, 'every man' is retained rather than neutralized, though the broader group participation is already explicit in the verse.
- source_word: הֵנִיף
  chosen: presented
  alternatives:
  - waved
  - offered
  lexicon: HALOT
  rationale: The verb literally refers to waving/lifting in ritual presentation. Because English readers may misconstrue 'waved' without context, 'presented' in the main text communicates the offering action, while the technical expression is preserved through 'wave offering' and noted in rationale.
- source_word: תְּנוּפַת זָהָב
  chosen: a wave offering of gold
  alternatives:
  - an offering of gold
  - a presentation offering of gold
  lexicon: HALOT
  rationale: תְּנוּפָה is a technical cultic term for a wave offering. Retaining 'wave offering' preserves ritual specificity.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine table, YHWH is rendered 'the LORD'.
