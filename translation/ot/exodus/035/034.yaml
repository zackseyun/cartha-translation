id: EXO.35.34
reference: Exodus 35:34
source:
  edition: WLC
  text: וּ/לְ/הוֹרֹ֖ת נָתַ֣ן בְּ/לִבּ֑/וֹ ה֕וּא וְ/אָֽהֳלִיאָ֥ב בֶּן אֲחִיסָמָ֖ךְ
    לְ/מַטֵּה דָֽן־־׃
translation:
  text: And he has put in his heart the ability to teach, both he and Oholiab son
    of Ahisamach, of the tribe of Dan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to instruct.' The Hebrew infinitive can denote teaching in a broad sense,
      including giving instruction in skilled work.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְהוֹרֹת
  chosen: the ability to teach
  alternatives:
  - to teach
  - instruction
  lexicon: HALOT
  rationale: The infinitive construct of ירה in the Hiphil commonly means 'to teach'
    or 'to instruct.' Because English idiom with נָתַן בְּלִבּוֹ ('put in his heart')
    often requires an abstract complement, 'the ability to teach' makes the clause
    natural while preserving the sense that God endowed them inwardly for instruction.
- source_word: נָתַן בְּלִבּוֹ
  chosen: has put in his heart
  alternatives:
  - put in his mind
  - placed within him
  lexicon: HALOT
  rationale: This Hebrew idiom expresses inward endowment or disposition. 'Has put
    in his heart' is sufficiently transparent in English and preserves the biblical
    anthropological sense of the heart as the seat of intention and skill.
- source_word: הוּא
  chosen: he
  alternatives:
  - he himself
  lexicon: HALOT
  rationale: The pronoun is explicit for emphasis. English can retain this adequately
    with 'he' in the correlative construction 'both he and Oholiab,' without overemphasizing
    beyond the Hebrew.
- source_word: וְאָהֳלִיאָב
  chosen: and Oholiab
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: בֶּן אֲחִיסָמָךְ
  chosen: son of Ahisamach
  alternatives:
  - the son of Ahisamach
  rationale: A straightforward filial designation; 'son of' is the standard formal
    rendering and keeps the genealogical style of the Hebrew.
- source_word: לְמַטֵּה דָן
  chosen: of the tribe of Dan
  alternatives:
  - belonging to the tribe of Dan
  - for the tribe of Dan
  lexicon: HALOT
  rationale: לְ with מַטֶּה here marks tribal affiliation. 'Of the tribe of Dan' is
    idiomatic and precise.
