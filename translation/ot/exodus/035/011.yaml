id: EXO.35.11
reference: Exodus 35:11
source:
  edition: WLC
  text: אֶת הַ֨/מִּשְׁכָּ֔ן אֶֽת אָהֳל֖/וֹ וְ/אֶת מִכְסֵ֑/הוּ אֶת קְרָסָי/ו֙ וְ/אֶת
    קְרָשָׁ֔י/ו אֶת בְּרִיחָ֕/ו אֶת עַמֻּדָ֖י/ו וְ/אֶת אֲדָנָֽי/ו־־־־־־־־׃
translation:
  text: the tabernacle, its tent, and its covering; its clasps, its boards, its bars,
    its pillars, and its bases;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'frames' for 'boards' (קְרָשָׁיו), if the term is understood to describe
      a framed construction rather than solid planks.
    reason: lexical_alternative
  - marker: b
    text: Or 'sockets' for 'bases' (אֲדָנָיו), emphasizing the receptacles that held
      the structural elements.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  - the dwelling
  lexicon: HALOT
  rationale: מִשְׁכָּן in the sanctuary context refers to the sacred dwelling structure
    of YHWH among Israel. 'Tabernacle' is the established and accurate English term
    here, more specific than the broader 'dwelling place.'
- source_word: אָהֳלוֹ
  chosen: its tent
  alternatives:
  - his tent
  lexicon: HALOT
  rationale: אָהֶל means 'tent.' The 3ms suffix refers back grammatically to the tabernacle
    complex; in English, 'its' fits the inanimate referent naturally. The pairing
    'the tabernacle, its tent' reflects the Hebrew distinction between the larger
    sanctuary structure and its tent component.
- source_word: מִכְסֵהוּ
  chosen: its covering
  alternatives:
  - its outer covering
  - its cover
  lexicon: HALOT
  rationale: מִכְסֶה denotes a covering, here one of the protective layers of the
    tabernacle. 'Its covering' is sufficiently literal and leaves the exact material
    unspecified, as in the Hebrew.
- source_word: קְרָסָיו
  chosen: its clasps
  alternatives:
  - its hooks
  - its fasteners
  lexicon: HALOT
  rationale: קֶרֶס in tabernacle descriptions refers to connecting pieces used to
    join curtains or coverings. 'Clasps' best captures the likely function without
    overcommitting to a modern technical term.
- source_word: קְרָשָׁיו
  chosen: its boards
  alternatives:
  - its frames
  - its planks
  lexicon: HALOT
  rationale: קֶרֶשׁ commonly denotes boards/planks in the tabernacle construction.
    'Boards' is the most straightforward rendering, though some argue for 'frames'
    based on construction details.
- source_word: בְּרִיחָיו
  chosen: its bars
  alternatives:
  - its crossbars
  lexicon: HALOT
  rationale: בְּרִיחַ refers to bars used to hold the tabernacle boards together.
    'Bars' is accurate and natural; 'crossbars' is possible but slightly more interpretive.
- source_word: עַמֻּדָיו
  chosen: its pillars
  alternatives:
  - its posts
  - its columns
  lexicon: HALOT
  rationale: עַמּוּד denotes a standing support. 'Pillars' fits the elevated sanctuary
    register and common architectural sense here.
- source_word: אֲדָנָיו
  chosen: its bases
  alternatives:
  - its sockets
  - its pedestals
  lexicon: HALOT
  rationale: אֶדֶן in tabernacle contexts refers to the base or socket into which
    structural elements were set. 'Bases' is clear modern English and avoids overtechnicality,
    while preserving the structural sense.
