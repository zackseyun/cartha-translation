id: EXO.35.20
reference: Exodus 35:20
source:
  edition: WLC
  text: וַ/יֵּֽצְא֛וּ כָּל עֲדַ֥ת בְּנֵֽי יִשְׂרָאֵ֖ל מִ/לִּ/פְנֵ֥י מֹשֶֽׁה־־׃
translation:
  text: Then all the congregation of the sons of Israel went out from before Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the assembly' for 'the congregation.'
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has 'the children of Israel'; alternatively, 'the
      Israelites.' The Hebrew is literally 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצְאוּ
  chosen: Then ... went out
  alternatives:
  - And ... went out
  - departed
  lexicon: HALOT
  rationale: Wayyiqtol of יצא advances the narrative. 'Went out' is the plain sense;
    'Then' captures the sequential force in readable English.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole
  lexicon: HALOT
  rationale: כָּל modifies the following construct chain and is best rendered 'all,'
    emphasizing the totality of the assembly.
- source_word: עֲדַת
  chosen: the congregation
  alternatives:
  - the assembly
  - the community
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the gathered community of Israel. 'Congregation'
    preserves the corporate sense and fits Pentateuchal usage, though 'assembly' is
    also possible.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, the masculine plural construct is preserved
    as 'sons of Israel' rather than flattened to 'Israelites.' 'Children of Israel'
    is traditional but less formally tied to בנים ('sons').
- source_word: מִלִּפְנֵי
  chosen: from before
  alternatives:
  - from the presence of
  - from before the face of
  lexicon: HALOT
  rationale: The idiom literally means 'from before' someone, i.e., from their presence.
    'From before' keeps the Hebrew spatial idiom with acceptable English clarity.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name מֹשֶׁה.
