id: EXO.35.28
reference: Exodus 35:28
source:
  edition: WLC
  text: וְ/אֶת הַ/בֹּ֖שֶׂם וְ/אֶת הַ/שָּׁ֑מֶן לְ/מָא֕וֹר וּ/לְ/שֶׁ֨מֶן֙ הַ/מִּשְׁחָ֔ה
    וְ/לִ/קְטֹ֖רֶת הַ/סַּמִּֽים־־׃
translation:
  text: the balsam and the oil for the light, and for the anointing oil and for the
    incense of spices,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the spice' or 'the aromatic substance' for הַבֹּשֶׂם.
    reason: lexical_alternative
  - marker: b
    text: Or 'the fragrant incense' for 'the incense of spices.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבֹּשֶׂם
  chosen: the balsam
  alternatives:
  - the spice
  - the aromatic balsam
  - the perfume
  lexicon: HALOT
  rationale: בֹּשֶׂם denotes aromatic substance/spice/balsam. Here, in a list of tabernacle
    materials alongside oil and incense ingredients, 'balsam' preserves the concrete
    aromatic-material sense better than the broader 'spice' or more abstract 'perfume'.
- source_word: הַשָּׁמֶן
  chosen: the oil
  alternatives:
  - olive oil
  lexicon: HALOT
  rationale: שֶׁמֶן is the ordinary word for oil. 'Olive oil' is possible culturally,
    but the Hebrew does not specify olive here, so 'the oil' is the more text-faithful
    rendering.
- source_word: לְמָאוֹר
  chosen: for the light
  alternatives:
  - for lighting
  - for the lamp
  lexicon: HALOT
  rationale: מָאוֹר can denote light or luminary. In this cultic supply list it refers
    to the use of the oil in producing light. 'For the light' is a natural, close
    rendering that avoids over-specifying a singular lamp not stated in the Hebrew.
- source_word: שֶׁמֶן הַמִּשְׁחָה
  chosen: the anointing oil
  alternatives:
  - the oil of anointing
  lexicon: HALOT
  rationale: This is the standard construct phrase for sacred anointing oil. 'The
    anointing oil' is idiomatic modern English and preserves the cultic function.
- source_word: קְטֹרֶת הַסַּמִּים
  chosen: the incense of spices
  alternatives:
  - the fragrant incense
  - the incense of sweet spices
  - the spice incense
  lexicon: HALOT
  rationale: קְטֹרֶת is incense; סַמִּים refers to aromatic spices. 'The incense of
    spices' keeps both nouns visible and reflects the Hebrew construction without
    paraphrasing to a purely adjectival phrase.
- source_word: וְאֶת ... וְאֶת ... וּלְ ... וְלִ
  chosen: and ... and ... and for ... and for
  alternatives:
  - with ... with ... for ... for
  rationale: The repeated conjunctions and object markers signal an itemized continuation
    of the offering list from the previous verse. English retains the polysyndetic
    list structure naturally with repeated 'and' and 'for'.
