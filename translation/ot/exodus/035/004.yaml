id: EXO.35.4
reference: Exodus 35:4
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר מֹשֶׁ֔ה אֶל כָּל עֲדַ֥ת בְּנֵֽי יִשְׂרָאֵ֖ל לֵ/אמֹ֑ר זֶ֣ה הַ/דָּבָ֔ר
    אֲשֶׁר צִוָּ֥ה יְהוָ֖ה לֵ/אמֹֽר־־־־׃
translation:
  text: Then Moses said to all the congregation of the sons of Israel, “This is the
    word that the LORD has commanded, saying,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “assembly” for “congregation.”
    reason: lexical_alternative
  - marker: b
    text: Or “the Israelites” or the traditional “the children of Israel.”
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew “This is the word”; also possible: “This is the thing” or more idiomatically
      “This is what.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving the sequential force; 'And ... said' is more formally
    literal but less idiomatic.
- source_word: עֲדַת
  chosen: congregation
  alternatives:
  - assembly
  - community
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled community of Israel. 'Congregation'
    preserves the corporate, gathered sense and fits Pentateuchal usage; 'assembly'
    is possible but slightly less conventional here.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Per the gender-accurate principle, the masculine plural construct is
    retained as 'sons of Israel' rather than flattened to 'Israelites.' 'Children
    of Israel' is traditional but less precise to the masculine form.
- source_word: זֶה הַדָּבָר
  chosen: This is the word
  alternatives:
  - This is the thing
  - This is what
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'thing.' Here it introduces a divine
    command formula. 'The word' preserves the formal declarative force, while 'This
    is what' would be more idiomatic but less transparent to the Hebrew.
- source_word: צִוָּה
  chosen: has commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: English present perfect works naturally in this reporting frame ('This
    is the word that the LORD has commanded') and reflects the completed action with
    present relevance. Simple past is also possible.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: The final לֵאמֹר introduces the content of the command in the following
    verse. 'Saying' is the standard and natural English rendering in this construction.
