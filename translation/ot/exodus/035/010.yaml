id: EXO.35.10
reference: Exodus 35:10
source:
  edition: WLC
  text: וְ/כָל חֲכַם לֵ֖ב בָּ/כֶ֑ם יָבֹ֣אוּ וְ/יַעֲשׂ֔וּ אֵ֛ת כָּל אֲשֶׁ֥ר צִוָּ֖ה יְהוָֽה־־־׃
translation:
  text: 'And every skillful person among you shall come and make all that Yahweh has commanded:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'wise of heart,' an idiom for one who is skilled or adept, especially in craftsmanship.
    reason: lexical_alternative
  - marker: b
    text: Or 'everyone who is skillful among you.' The Hebrew is grammatically masculine singular with distributive force.
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/כָל
  chosen: And every
  alternatives:
  - And all
  lexicon: HALOT
  rationale: וְ joins this verse to the preceding instruction, and כָל with a following singular noun has distributive force, best rendered 'every' rather than the more collective 'all.'
- source_word: חֲכַם לֵב
  chosen: skillful man
  alternatives:
  - wise-hearted man
  - wise man
  - skilled person
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'wise of heart' and in tabernacle-construction contexts refers to practical skill or craftsmanship rather than merely intellectual wisdom. 'Skillful' communicates the functional sense in natural English. 'Man' is retained because the singular masculine form is present in the source and the phrase is distributive.
- source_word: בָּכֶם
  chosen: among you
  alternatives:
  - from among you
  - of you
  lexicon: HALOT
  rationale: 'The preposition ב with the 2mp suffix here indicates location within the community: those situated ''among you.'' This is smoother and more idiomatic than ''in you'' or ''of you.'''
- source_word: יָבֹאוּ
  chosen: shall come
  alternatives:
  - let them come
  - are to come
  - must come
  lexicon: HALOT
  rationale: The imperfect 3mp in this summons can be rendered as an instruction. 'Shall come' preserves the directive force without over-paraphrasing. 'Let them come' is possible, but the English singular distributive subject followed by plural verb in Hebrew is better smoothed in translation.
- source_word: וְיַעֲשׂוּ
  chosen: and make
  alternatives:
  - and do
  - and perform
  - and make it
  lexicon: HALOT
  rationale: עָשָׂה is broad ('do/make'), but in the context of constructing the tabernacle and its furnishings, 'make' best captures the concrete crafting sense.
- source_word: אֵת כָּל אֲשֶׁר
  chosen: all that
  alternatives:
  - everything that
  - all which
  lexicon: HALOT
  rationale: This object marker plus relative clause introduces the totality of what follows. 'All that' is concise and idiomatic.
- source_word: צִוָּה יְהוָה
  chosen: the LORD has commanded
  alternatives:
  - the LORD commanded
  - Yahweh has commanded
  lexicon: HALOT
  rationale: The perfect verb denotes completed command prior to the action requested. English present perfect fits the discourse well. Per doctrine, יְהוָה is rendered 'the LORD' rather than 'Yahweh' in the main text.
