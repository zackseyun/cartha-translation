theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Gendered expression חֲכַם לֵב
  chosen_reading: skillful man
  alternative_readings:
  - skillful person
  - everyone who is skillful
  rationale: The source uses a grammatically masculine singular expression with representative/distributive force. Per translation philosophy, gender-accurate rendering is preferred over gender-neutral smoothing. Because the context likely includes all qualified artisans, an inclusive alternative is worth preserving in a footnote without replacing the source-shaped main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
