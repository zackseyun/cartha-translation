theological_decisions:
- issue: Scope of the Sabbath prohibition regarding fire
  chosen_reading: Render the command as a direct prohibition against kindling fire,
    without importing later interpretive expansions about all fire use or all forms
    of work involving heat.
  alternative_readings:
  - Translate more broadly as 'do not burn fire'
  - Paraphrase toward later halakhic interpretation about maintaining or using fire
  rationale: The Hebrew text specifically prohibits kindling fire in the Israelites'
    dwellings on the Sabbath. The translation should state that command plainly without
    resolving broader interpretive debates not explicit in the verse.
  doctrine_reference: Translation philosophy §§1, 3, 6
