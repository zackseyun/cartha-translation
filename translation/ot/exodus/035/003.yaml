id: EXO.35.3
reference: Exodus 35:3
source:
  edition: WLC
  text: לֹא תְבַעֲר֣וּ אֵ֔שׁ בְּ/כֹ֖ל מֹשְׁבֹֽתֵי/כֶ֑ם בְּ/י֖וֹם הַ/שַּׁבָּֽת־׃פ
translation:
  text: You shall not kindle a fire in any of your dwellings on the Sabbath day.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: תְבַעֲרוּ
  chosen: kindle
  alternatives:
  - burn
  - light
  lexicon: HALOT
  rationale: From בער in the Piel, here meaning to ignite or kindle. 'Kindle' is the
    most natural English equivalent for setting a fire, more precise than the broader
    'burn' and more idiomatic than 'light a fire' while staying close to the Hebrew.
- source_word: אֵשׁ
  chosen: a fire
  alternatives:
  - fire
  lexicon: HALOT
  rationale: The singular noun refers to fire as an instance to be kindled. English
    idiom prefers the indefinite expression 'a fire' after 'kindle.'
- source_word: בְּכֹל
  chosen: in any
  alternatives:
  - in all
  - throughout all
  lexicon: HALOT
  rationale: The phrase with כֹּל before 'your dwellings' has a distributive sense.
    'In any of your dwellings' communicates the prohibition as applying to every dwelling
    without sounding wooden.
- source_word: מֹשְׁבֹתֵיכֶם
  chosen: your dwellings
  alternatives:
  - your homes
  - your settlements
  - your places of dwelling
  lexicon: HALOT
  rationale: מוֹשָׁב can denote dwelling place or habitation. 'Dwellings' preserves
    the broader scope and formal tone better than the more interpretive 'homes' or
    the potentially too public 'settlements.'
- source_word: בְּיוֹם הַשַּׁבָּת
  chosen: on the Sabbath day
  alternatives:
  - on the day of the Sabbath
  - on the Sabbath
  lexicon: HALOT
  rationale: This is a straightforward temporal phrase. 'On the Sabbath day' is clear
    modern English and preserves the explicit mention of 'day' present in the Hebrew.
