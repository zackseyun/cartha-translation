id: EXO.35.6
reference: Exodus 35:6
source:
  edition: WLC
  text: וּ/תְכֵ֧לֶת וְ/אַרְגָּמָ֛ן וְ/תוֹלַ֥עַת שָׁנִ֖י וְ/שֵׁ֥שׁ וְ/עִזִּֽים׃
translation:
  text: and blue, and purple, and scarlet yarn, and fine linen, and goats’ hair,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally 'goats'; in this context it refers to goats’ hair as a
      tabernacle material.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְכֵלֶת
  chosen: blue
  alternatives:
  - blue yarn
  - blue cloth
  lexicon: HALOT
  rationale: The noun denotes a blue or blue-purple dyed material used in tabernacle
    textiles. In this list of contributed materials, concise color rendering is natural
    in English, with the material sense understood from context and from the paired
    textile items.
- source_word: אַרְגָּמָן
  chosen: purple
  alternatives:
  - purple yarn
  - purple cloth
  lexicon: HALOT
  rationale: This term refers to purple dyed material. As with תְכֵלֶת, the list format
    allows the color term to stand elliptically for the dyed textile material.
- source_word: תוֹלַעַת שָׁנִי
  chosen: scarlet yarn
  alternatives:
  - scarlet
  - crimson yarn
  - scarlet material
  lexicon: HALOT
  rationale: The construct phrase literally involves 'worm of scarlet,' referring
    to scarlet-dyed material derived from insect dye. 'Scarlet yarn' is idiomatic
    English and matches the textile context better than a bare color term.
- source_word: שֵׁשׁ
  chosen: fine linen
  alternatives:
  - linen
  - fine flax linen
  lexicon: HALOT
  rationale: In tabernacle contexts this term regularly denotes fine linen rather
    than linen in general. 'Fine linen' preserves the likely quality distinction.
- source_word: עִזִּים
  chosen: goats’ hair
  alternatives:
  - goats
  - goat hair
  lexicon: HALOT
  rationale: Literally the plural noun is 'goats,' but in this materials list the
    referent is goat hair used for weaving tabernacle coverings. Rendering the implied
    material avoids misleading English readers into thinking live animals are meant.
- source_word: וְ
  chosen: and
  rationale: Each item in the list is linked by the conjunction, and English preserves
    the polysyndetic style naturally here.
