id: EXO.35.2
reference: Exodus 35:2
source:
  edition: WLC
  text: שֵׁ֣שֶׁת יָמִים֮ תֵּעָשֶׂ֣ה מְלָאכָה֒ וּ/בַ/יּ֣וֹם הַ/שְּׁבִיעִ֗י יִהְיֶ֨ה
    לָ/כֶ֥ם קֹ֛דֶשׁ שַׁבַּ֥ת שַׁבָּת֖וֹן לַ/יהוָ֑ה כָּל הָ/עֹשֶׂ֥ה ב֛/וֹ מְלָאכָ֖ה
    יוּמָֽת־׃
translation:
  text: Work may be done for six days, but on the seventh day there shall be for you
    a holy Sabbath, a complete rest to the LORD. Whoever does work on it shall surely
    be put to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a Sabbath of solemn rest.' The Hebrew expression 'Sabbath, sabbath-rest'
      intensifies the idea of full cessation from work.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew ''to the LORD''; also possible: ''for the LORD'' or ''belonging
      to the LORD.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵּעָשֶׂה
  chosen: may be done
  alternatives:
  - shall be done
  - is to be done
  lexicon: HALOT
  rationale: 'Nifal imperfect of עשה is passive/reflexive in form. ''May be done''
    gives natural English for a legal instruction without over-specifying whether
    the force is simple future or permissive/jussive. It also preserves the impersonal
    passive sense: the text speaks of work being done, not directly commanding a specific
    subject.'
- source_word: מְלָאכָה
  chosen: work
  alternatives:
  - occupation
  - labor
  lexicon: HALOT
  rationale: מְלָאכָה commonly denotes work or occupational labor, especially in Sabbath
    legislation. 'Work' is the clearest and most idiomatic rendering in this legal
    context.
- source_word: קֹדֶשׁ
  chosen: holy
  alternatives:
  - holiness
  - a holy day
  lexicon: HALOT
  rationale: 'Predicate noun used adjectivally in English: ''there shall be for you
    a holy Sabbath.'' This preserves the consecrated status of the day without adding
    words not present in the Hebrew.'
- source_word: שַׁבַּת שַׁבָּתוֹן
  chosen: a holy Sabbath, a complete rest
  alternatives:
  - a Sabbath of solemn rest
  - a Sabbath, a sabbath-rest
  - a Sabbath of complete rest
  lexicon: HALOT
  rationale: The collocation intensifies the Sabbath concept. 'Complete rest' communicates
    שַׁבָּתוֹן clearly in modern English. 'Solemn rest' is traditional, but the Hebrew
    emphasizes cessation/rest more directly than solemnity.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  - belonging to the LORD
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' The preposition ל here marks
    dedication or orientation; 'to the LORD' is concise and preserves that the Sabbath
    is directed/dedicated to him.
- source_word: כָּל הָעֹשֶׂה
  chosen: Whoever does
  alternatives:
  - Everyone who does
  - Anyone doing
  lexicon: HALOT
  rationale: This construction introduces a general legal case. 'Whoever does' is
    idiomatic and preserves the universal force.
- source_word: בּוֹ
  chosen: on it
  alternatives:
  - in it
  - during it
  lexicon: HALOT
  rationale: Refers to the Sabbath day. 'On it' is the normal English idiom for activity
    performed on a day.
- source_word: יוּמָת
  chosen: shall surely be put to death
  alternatives:
  - shall be put to death
  - must be executed
  lexicon: HALOT
  rationale: Hophal of מות is causative passive, 'be put to death.' 'Surely' reflects
    the force of the legal formula in context and matches the gravity of the sanction,
    though no separate infinitive absolute is present here; it functions as a firm
    legal penalty statement. 'Must be executed' is possible but slightly more interpretive.
- source_word: יָמִים ... הַשְּׁבִיעִי
  chosen: for six days ... on the seventh day
  alternatives:
  - six days ... but the seventh day
  - during six days ... and on the seventh day
  lexicon: HALOT
  rationale: This preserves the temporal contrast between the six working days and
    the sanctity of the seventh day in clear modern English.
