id: EXO.35.29
reference: Exodus 35:29
source:
  edition: WLC
  text: כָּל אִ֣ישׁ וְ/אִשָּׁ֗ה אֲשֶׁ֨ר נָדַ֣ב לִבָּ/ם֮ אֹתָ/ם֒ לְ/הָבִיא֙ לְ/כָל הַ/מְּלָאכָ֔ה אֲשֶׁ֨ר צִוָּ֧ה יְהוָ֛ה לַ/עֲשׂ֖וֹת בְּ/יַד מֹשֶׁ֑ה הֵבִ֧יאוּ בְנֵי יִשְׂרָאֵ֛ל נְדָבָ֖ה לַ/יהוָֽה־־־־׃פ
translation:
  text: Every man and woman whose heart moved them to bring something for all the work that Yahweh had commanded to be done through Moses—the children of Israel brought a freewill offering to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whose heart impelled them' or 'whose heart made them willing.' The Hebrew idiom expresses inward willingness or prompting.
    reason: lexical_alternative
  - marker: b
    text: Literally 'by the hand of Moses,' an idiom meaning 'through Moses' or 'by Moses as mediator.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the Israelites brought.' Literally 'the children of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל אִישׁ וְאִשָּׁה
  chosen: Every man and woman
  alternatives:
  - Every man or woman
  - Every person, man and woman
  lexicon: HALOT
  rationale: The phrase explicitly names both male and female participants. 'Every man and woman' preserves the distributive force of כָּל and the gendered wording of the Hebrew better than a flattened 'everyone.'
- source_word: נָדַב לִבָּם אֹתָם
  chosen: whose heart moved them
  alternatives:
  - whose heart impelled them
  - whose heart made them willing
  - whose heart prompted them
  lexicon: HALOT
  rationale: The idiom combines נדב ('to incite willingly, make willing') with 'heart' as the seat of volition. 'Moved them' is natural English and preserves the voluntary inner prompting without over-paraphrase.
- source_word: לְהָבִיא
  chosen: to bring something
  alternatives:
  - to bring
  - to present
  lexicon: HALOT
  rationale: 'The infinitive means ''to bring.'' English idiom benefits from supplying ''something'' because the object is implicit from context: a contribution for the work. This is a light contextual completion, not a substantive addition.'
- source_word: לְכָל הַמְּלָאכָה
  chosen: for all the work
  alternatives:
  - for all the service
  - for all the craftsmanship
  - for all the task
  lexicon: HALOT
  rationale: מְלָאכָה here refers broadly to the work involved in constructing the tabernacle and its furnishings. 'Work' is the most natural broad rendering in context.
- source_word: אֲשֶׁר צִוָּה יְהוָה לַעֲשׂוֹת בְּיַד מֹשֶׁה
  chosen: that the LORD had commanded to be done through Moses
  alternatives:
  - that the LORD had commanded by the hand of Moses to do
  - that the LORD had commanded through Moses to make
  lexicon: HALOT
  rationale: בְּיַד literally 'by the hand of' is a common idiom for agency or mediation. 'Through Moses' communicates the sense clearly in modern English. The passive 'to be done' reflects the Hebrew infinitive construction without forcing an awkward English syntax.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הֵבִיאוּ בְנֵי יִשְׂרָאֵל
  chosen: the children of Israel brought
  alternatives:
  - the Israelites brought
  - the sons of Israel brought
  lexicon: HALOT
  rationale: בְנֵי יִשְׂרָאֵל is a standard ethnonym. 'The children of Israel' preserves the traditional and literal sense; 'Israelites' would also be acceptable, but this rendering keeps closer formal correspondence.
- source_word: נְדָבָה
  chosen: a freewill offering
  alternatives:
  - a voluntary offering
  - an offering freely given
  lexicon: HALOT
  rationale: נְדָבָה denotes an offering given voluntarily, not under compulsion. 'Freewill offering' is a well-established and accurate English equivalent in sacrificial/contribution contexts.
