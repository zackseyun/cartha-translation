id: EXO.35.18
reference: Exodus 35:18
source:
  edition: WLC
  text: אֶת יִתְדֹ֧ת הַ/מִּשְׁכָּ֛ן וְ/אֶת יִתְדֹ֥ת הֶ/חָצֵ֖ר וְ/אֶת מֵיתְרֵי/הֶֽם־־־׃
translation:
  text: the pegs of the tabernacle, and the pegs of the courtyard, and their ropes—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their cords.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתְדֹת
  chosen: pegs
  alternatives:
  - stakes
  - tent pegs
  lexicon: HALOT
  rationale: Refers to fastening pegs used to secure the structure and hangings. 'Pegs'
    is concise and natural in modern English; 'stakes' is possible but can suggest
    larger ground stakes, and 'tent pegs' is more explicit but slightly interpretive.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling
  - the sanctuary tent
  lexicon: HALOT
  rationale: מִשְׁכָּן is the standard term for the sacred dwelling structure in Exodus.
    'Tabernacle' preserves established cultic meaning without excessive obscurity;
    'dwelling' is more literal but too vague in this inventory context.
- source_word: הֶחָצֵר
  chosen: the courtyard
  alternatives:
  - the court
  - the enclosure
  lexicon: HALOT
  rationale: In tabernacle contexts חָצֵר denotes the enclosed outer area. 'Courtyard'
    is clear modern English and fits the physical setting better than the somewhat
    archaic 'court'.
- source_word: מֵיתְרֵיהֶם
  chosen: their ropes
  alternatives:
  - their cords
  lexicon: HALOT
  rationale: Refers to the cords associated with the pegs and structure. 'Ropes' is
    more immediately understandable in contemporary English; 'cords' is also viable
    and somewhat more traditional, but less natural for many readers.
- source_word: אֶת ... וְאֶת ... וְאֶת
  chosen: the pegs ... and the pegs ... and their ropes
  rationale: The repeated object marker with conjunctions marks a simple inventory
    list. English does not translate אֶת directly, but the repetition is reflected
    by retaining the coordinated list structure.
