id: EXO.35.1
reference: Exodus 35:1
source:
  edition: WLC
  text: וַ/יַּקְהֵ֣ל מֹשֶׁ֗ה אֶֽת כָּל עֲדַ֛ת בְּנֵ֥י יִשְׂרָאֵ֖ל וַ/יֹּ֣אמֶר אֲלֵ/הֶ֑ם
    אֵ֚לֶּה הַ/דְּבָרִ֔ים אֲשֶׁר צִוָּ֥ה יְהוָ֖ה לַ/עֲשֹׂ֥ת אֹתָֽ/ם־־־׃
translation:
  text: Then Moses assembled all the congregation of the sons of Israel and said to
    them, “These are the things that the LORD has commanded to be done.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the sons of Israel,'' a covenantal designation for the people
      of Israel; the phrase refers to the whole community, not males only.'
    reason: lexical_alternative
  - marker: b
    text: Or 'These are the words' / 'These are the matters.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְהֵל
  chosen: assembled
  alternatives:
  - gathered together
  - convened
  lexicon: HALOT
  rationale: The Hifil of קהל here denotes causing the people to come together as
    an assembled body. 'Assembled' is natural modern English and preserves the formal
    sense better than the more colloquial 'gathered together.'
- source_word: כָּל עֲדַת
  chosen: all the congregation
  alternatives:
  - the whole community
  - all the assembly
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled community/congregation of Israel.
    'Congregation' preserves the corporate, covenantal sense; 'community' is possible
    but slightly less formal. 'All' renders כָּל straightforwardly.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Per the gender-accurate principle, the masculine plural construct is
    retained as 'sons of Israel' rather than flattened to 'Israelites.' 'Children
    of Israel' is traditional but less precise to the masculine form here. The phrase
    is ethnically/covenantally representative, not restricted to males only.
- source_word: אֵלֶּה הַדְּבָרִים
  chosen: These are the things
  alternatives:
  - These are the words
  - These are the matters
  lexicon: HALOT
  rationale: דְּבָרִים can mean 'words,' 'things,' or 'matters' depending on context.
    Since what follows is a set of commanded actions, 'things' best captures the practical
    force without over-literal awkwardness.
- source_word: צִוָּה יְהוָה
  chosen: the LORD has commanded
  alternatives:
  - the LORD commanded
  lexicon: HALOT
  rationale: The perfect verb is naturally rendered in English as present perfect
    in this discourse setting, highlighting the abiding force of the prior command.
    יְהוָה is rendered 'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered 'the LORD' in keeping with the project's
    stated default for יְהוָה and the longstanding reverential convention reflected
    in the LXX/English tradition.
- source_word: לַעֲשֹׂת אֹתָם
  chosen: to be done
  alternatives:
  - for doing them
  - to do them
  lexicon: HALOT
  rationale: The infinitive construct with object pronoun expresses the commanded
    actions to be carried out. 'To be done' is idiomatic English after 'commanded'
    and conveys the passive-like sense of required performance better than the stiffer
    'to do them.'
