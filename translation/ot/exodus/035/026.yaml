id: EXO.35.26
reference: Exodus 35:26
source:
  edition: WLC
  text: וְ/כָל הַ֨/נָּשִׁ֔ים אֲשֶׁ֨ר נָשָׂ֥א לִבָּ֛/ן אֹתָ֖/נָה בְּ/חָכְמָ֑ה טָו֖וּ
    אֶת הָ/עִזִּֽים־־׃
translation:
  text: And all the women whose hearts moved them with skill spun the goats' hair.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the goats'; the Hebrew here uses an ellipsis referring to goat
      hair used for spinning.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל הַנָּשִׁים
  chosen: And all the women
  alternatives:
  - And every woman
  lexicon: HALOT
  rationale: כָּל with the plural noun naturally yields a collective sense, best rendered
    'all the women' in smooth English.
- source_word: אֲשֶׁר נָשָׂא לִבָּן אֹתָנָה
  chosen: whose hearts moved them
  alternatives:
  - whose hearts lifted them
  - whose hearts stirred them
  lexicon: HALOT
  rationale: The idiom 'the heart lifted/stirred someone' expresses inward willingness
    or motivation. 'Moved them' preserves the idiomatic sense in readable modern English
    without over-paraphrasing. 'Stirred' is possible and traditional, but 'moved'
    is slightly more natural here.
- source_word: בְּחָכְמָה
  chosen: with skill
  alternatives:
  - wisely
  - with wisdom
  lexicon: HALOT
  rationale: In this craftsmanship context, חָכְמָה refers to practical skill rather
    than abstract wisdom. 'With skill' communicates the artisan sense clearly.
- source_word: טָווּ
  chosen: spun
  alternatives:
  - spun thread from
  - spun yarn from
  lexicon: HALOT
  rationale: The verb means to spin textile fiber. The simple English verb 'spun'
    is sufficient, with the object supplying the material.
- source_word: אֶת הָעִזִּים
  chosen: the goats' hair
  alternatives:
  - goat hair
  - the goats
  lexicon: HALOT
  rationale: Although literally 'the goats,' in textile-production context this is
    a well-known ellipsis for goat hair used in weaving/tabernacle materials. Rendering
    it woodenly as 'the goats' would mislead English readers into thinking of live
    animals rather than fiber. 'The goats' hair' makes the implied object explicit.
