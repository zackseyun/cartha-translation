id: EXO.35.19
reference: Exodus 35:19
source:
  edition: WLC
  text: אֶת בִּגְדֵ֥י הַ/שְּׂרָ֖ד לְ/שָׁרֵ֣ת בַּ/קֹּ֑דֶשׁ אֶת בִּגְדֵ֤י הַ/קֹּ֨דֶשׁ֙
    לְ/אַהֲרֹ֣ן הַ/כֹּהֵ֔ן וְ/אֶת בִּגְדֵ֥י בָנָ֖י/ו לְ/כַהֵֽן־־־׃
translation:
  text: the finely woven garments for ministering in the sanctuary, the holy garments
    for Aaron the priest, and the garments of his sons for serving as priests.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the garments of service'; the Hebrew term may denote specially woven
      service garments.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the holy place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּגְדֵי
  chosen: garments
  alternatives:
  - clothes
  - vestments
  lexicon: HALOT
  rationale: Basic sense is clothing/garments. 'Garments' is natural English and suitably
    formal for priestly attire without importing later ecclesiastical terminology
    like 'vestments'.
- source_word: הַשְּׂרָד
  chosen: finely woven
  alternatives:
  - woven
  - service
  lexicon: HALOT
  rationale: The term in tabernacle contexts refers to specially made textile work.
    'Finely woven' captures the likely sense of crafted fabric better than a wooden
    transliteration or the less clear traditional 'cloths of service.'
- source_word: לְשָׁרֵת
  chosen: for ministering
  alternatives:
  - to serve
  - for service
  lexicon: HALOT
  rationale: The verb denotes ministerial service, especially in sacred context. 'For
    ministering' preserves the cultic nuance better than the flatter 'to serve'.
- source_word: בַּקֹּדֶשׁ
  chosen: in the sanctuary
  alternatives:
  - in the holy place
  - in the holy place/holy area
  - in holiness
  lexicon: HALOT
  rationale: In this tabernacle context, the phrase refers to the sacred precinct
    rather than abstract holiness. 'In the sanctuary' is clear modern English and
    fits the cultic setting.
- source_word: בִּגְדֵי הַקֹּדֶשׁ
  chosen: the holy garments
  alternatives:
  - the sacred garments
  lexicon: HALOT
  rationale: Construct phrase literally means 'garments of holiness/holiness garments,'
    idiomatically priestly sacred attire. 'Holy garments' is the most direct and established
    rendering.
- source_word: לְאַהֲרֹן הַכֹּהֵן
  chosen: for Aaron the priest
  alternatives:
  - for Aaron the priestly one
  lexicon: HALOT
  rationale: Straightforward identification of Aaron by office; 'the priest' is the
    natural rendering of the appositional phrase.
- source_word: בִּגְדֵי בָנָיו
  chosen: the garments of his sons
  alternatives:
  - his sons' garments
  lexicon: HALOT
  rationale: Either English form is possible; 'the garments of his sons' keeps the
    Hebrew structure more transparently.
- source_word: לְכַהֵן
  chosen: for serving as priests
  alternatives:
  - to minister as priests
  - for priestly service
  lexicon: HALOT
  rationale: The piel infinitive from כהן means to function as priest. 'For serving
    as priests' is clear and preserves the verbal force.
