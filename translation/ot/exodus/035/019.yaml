theological_decisions:
- issue: Distinction between בִּגְדֵי הַשְּׂרָד and בִּגְדֵי הַקֹּדֶשׁ
  chosen_reading: Treat the first phrase as a distinct class of specially woven garments
    used for ministry in the sanctuary, followed by the holy garments specifically
    for Aaron and his sons.
  alternative_readings:
  - Take both phrases as appositional, with the first simply another description of
    the priestly garments.
  rationale: The verse lists multiple textile items with repeated object marker אֶת,
    which supports distinguishing the finely woven ministering garments from the holy
    garments for Aaron and his sons, while still recognizing overlap in sacred use.
    This avoids collapsing the Hebrew enumeration into a single item without textual
    necessity.
