id: EXO.35.33
reference: Exodus 35:33
source:
  edition: WLC
  text: וּ/בַ/חֲרֹ֥שֶׁת אֶ֛בֶן לְ/מַלֹּ֖את וּ/בַ/חֲרֹ֣שֶׁת עֵ֑ץ לַ/עֲשׂ֖וֹת בְּ/כָל
    מְלֶ֥אכֶת מַחֲשָֽׁבֶת־׃
translation:
  text: in the cutting of stones for setting, and in the carving of wood, to do every
    kind of skillful work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every kind of designed work' or 'every kind of artistic work.' The Hebrew
      term carries the idea of work done with planning, design, or skill.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַחֲרֹשֶׁת
  chosen: in the cutting / in the carving
  alternatives:
  - in the workmanship
  - in the engraving
  - in the craft of working
  lexicon: HALOT
  rationale: 'חֲרֹשֶׁת denotes skilled working or craftsmanship. Because it occurs
    with two different materials in the same verse, English varies slightly by object:
    ''cutting'' with stone and ''carving'' with wood, preserving the material-specific
    sense while reflecting the same Hebrew noun.'
- source_word: אֶבֶן
  chosen: stones
  alternatives:
  - stone
  lexicon: HALOT
  rationale: 'Although singular in Hebrew, English idiom naturally uses the plural
    in this craft context: ''cutting of stones.'' This preserves the generic/material
    sense rather than implying one specific stone.'
- source_word: לְמַלֹּאת
  chosen: for setting
  alternatives:
  - for mounting
  - for inset work
  - for filling
  lexicon: HALOT
  rationale: In tabernacle-artisan contexts this infinitive refers to setting stones
    into mountings rather than the more general sense 'to fill.' 'For setting' is
    the clearest natural English rendering.
- source_word: עֵץ
  chosen: wood
  alternatives:
  - timber
  lexicon: HALOT
  rationale: The noun refers to wood as a material here, not a living tree. 'Wood'
    is the most natural English equivalent in a craftsmanship list.
- source_word: לַעֲשׂוֹת
  chosen: to do
  alternatives:
  - to make
  - to perform
  lexicon: HALOT
  rationale: עשה is broad. 'To do' fits the following phrase 'every kind of ... work'
    and keeps the wording close to the Hebrew without awkwardness.
- source_word: בְּכָל מְלֶאכֶת
  chosen: every kind of work
  alternatives:
  - all manner of work
  - every work
  lexicon: HALOT
  rationale: The phrase is distributive and idiomatic, referring to the full range
    of artisan tasks. 'Every kind of work' is clear modern English.
- source_word: מַחֲשָׁבֶת
  chosen: skillful
  alternatives:
  - designed
  - artistic
  - ingenious
  - thoughtfully designed
  lexicon: HALOT
  rationale: מַחֲשָׁבֶת can denote devised, designed, or artistic work. In this context
    of Bezalel's artisan ability, 'skillful' communicates the sense of intentionally
    crafted workmanship in natural English. The more literal 'designed work' is possible
    but less idiomatic here.
