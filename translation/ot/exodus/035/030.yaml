id: EXO.35.30
reference: Exodus 35:30
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר מֹשֶׁה֙ אֶל בְּנֵ֣י יִשְׂרָאֵ֔ל רְא֛וּ קָרָ֥א יְהוָ֖ה בְּ/שֵׁ֑ם
    בְּצַלְאֵ֛ל בֶּן אוּרִ֥י בֶן ח֖וּר לְ/מַטֵּ֥ה יְהוּדָֽה־־־׃
translation:
  text: Then Moses said to the sons of Israel, “See, the LORD has called Bezalel son
    of Uri, son of Hur, by name, from the tribe of Judah.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Israelites” or “the children of Israel.” The Hebrew reads “the sons
      of Israel.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving the sequential sense; 'And ... said' is
    more formally literal but less idiomatic in modern English.
- source_word: אֶל
  chosen: to
  lexicon: HALOT
  rationale: Standard directional preposition introducing the addressees of Moses'
    speech.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: A more formal rendering preserves the underlying filial expression בני
    while remaining natural enough in context. 'Israelites' is idiomatic but loses
    the explicit kinship wording; 'children of Israel' is traditional but less natural
    in contemporary English. This also aligns with the project's gender-accurate principle.
- source_word: רְאוּ
  chosen: See
  alternatives:
  - Look
  - Behold
  lexicon: HALOT
  rationale: Imperative calling attention to what follows. 'See' is concise and natural;
    'behold' is too archaic for the stated style.
- source_word: קָרָא ... בְּשֵׁם
  chosen: has called ... by name
  alternatives:
  - has named
  - has summoned by name
  - has called specifically
  lexicon: HALOT
  rationale: The idiom קרא בשם commonly means to call or designate someone explicitly
    by name, often with a sense of personal selection. 'Has called ... by name' preserves
    the Hebrew idiom and its force better than the flatter 'has named.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: בְּצַלְאֵל
  chosen: Bezalel
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention.
- source_word: בֶּן אוּרִי בֶן חוּר
  chosen: son of Uri, son of Hur
  alternatives:
  - the son of Uri, the son of Hur
  lexicon: HALOT
  rationale: The construct chain is rendered straightforwardly in English genealogy
    style. Repeating 'son of' preserves the Hebrew lineage structure.
- source_word: לְמַטֵּה יְהוּדָה
  chosen: from the tribe of Judah
  alternatives:
  - of the tribe of Judah
  - belonging to the tribe of Judah
  lexicon: HALOT
  rationale: The phrase identifies Bezalel's tribal affiliation. 'From the tribe of
    Judah' is natural English and conveys source/association without awkwardness.
