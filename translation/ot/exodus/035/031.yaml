theological_decisions:
- issue: Whether רוּחַ אֱלֹהִים should be rendered impersonally ('a divine spirit'
    / 'spirit of God') or personally ('the Spirit of God')
  chosen_reading: the Spirit of God
  alternative_readings:
  - the spirit of God
  - a divine spirit
  rationale: Given the canonical and immediate context of divine empowerment for sacred
    service, the phrase is best rendered personally as God's Spirit. This preserves
    the theological weight of divine enablement without overstating beyond the text.
    The Hebrew lacks the article, but English idiom commonly uses the definite form
    for this expression.
  doctrine_reference: Affirmations; Translation philosophy §3
