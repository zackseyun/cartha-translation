id: EXO.35.31
reference: Exodus 35:31
source:
  edition: WLC
  text: וַ/יְמַלֵּ֥א אֹת֖/וֹ ר֣וּחַ אֱלֹהִ֑ים בְּ/חָכְמָ֛ה בִּ/תְבוּנָ֥ה וּ/בְ/דַ֖עַת
    וּ/בְ/כָל מְלָאכָֽה־׃
translation:
  text: and he filled him with the Spirit of God, with wisdom, with understanding,
    and with knowledge, and with every kind of craftsmanship.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the spirit of God' or 'a divine spirit.' The Hebrew phrase can be understood
      more generally, but here it likely refers to God's own empowering Spirit.
    reason: alternative_reading
  - marker: b
    text: Or 'with all workmanship' or 'in every craft.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמַלֵּא
  chosen: and he filled
  alternatives:
  - and He filled
  - and filled
  lexicon: HALOT
  rationale: The waw-consecutive with Piel imperfect 3ms is rendered as a past narrative
    verb, 'and he filled.' The subject is carried over from the previous verse (God/the
    LORD), so lowercase 'he' is used in the running text rather than capitalizing
    pronouns for deity, which would import an English convention not marked in Hebrew.
- source_word: אֹתוֹ
  chosen: him
  lexicon: HALOT
  rationale: Direct-object pronoun referring to Bezalel from the preceding context;
    straightforwardly rendered 'him.'
- source_word: רוּחַ אֱלֹהִים
  chosen: the Spirit of God
  alternatives:
  - the spirit of God
  - a divine spirit
  lexicon: HALOT
  rationale: In this tabernacle-empowerment context, the phrase most naturally denotes
    God's Spirit rather than merely a disposition or skill. 'The Spirit of God' preserves
    the likely personal and theological force while remaining faithful to the Hebrew
    construct phrase.
- source_word: בְּחָכְמָה
  chosen: with wisdom
  alternatives:
  - in wisdom
  lexicon: HALOT
  rationale: The preposition ב is rendered instrumentally/associatively as 'with'
    in a list of endowments. 'Wisdom' is the standard gloss for חָכְמָה and fits the
    skilled, God-given capacity in context.
- source_word: בִּתְבוּנָה
  chosen: with understanding
  alternatives:
  - with insight
  lexicon: HALOT
  rationale: תְּבוּנָה commonly denotes understanding or discernment. 'Understanding'
    keeps the triad with 'wisdom' and 'knowledge' recognizable and consistent.
- source_word: וּבְדַעַת
  chosen: and with knowledge
  alternatives:
  - and with skill
  - and with discernment
  lexicon: HALOT
  rationale: דַּעַת is most basically 'knowledge.' Although the context is craftsmanship,
    the Hebrew term should not be flattened into mere technical skill; the broader
    cognitive sense is retained.
- source_word: וּבְכָל מְלָאכָה
  chosen: and with every kind of craftsmanship
  alternatives:
  - and in every craft
  - and with all workmanship
  - and with every kind of work
  lexicon: HALOT
  rationale: מְלָאכָה can mean work, occupation, or craftsmanship. In the immediate
    context of artistic and tabernacle construction skill, 'craftsmanship' best captures
    the specialized nature of the work. 'Every kind of' idiomatically renders כָּל
    with an abstract singular in English.
