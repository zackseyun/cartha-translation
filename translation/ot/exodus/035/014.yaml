id: EXO.35.14
reference: Exodus 35:14
source:
  edition: WLC
  text: וְ/אֶת מְנֹרַ֧ת הַ/מָּא֛וֹר וְ/אֶת כֵּלֶ֖י/הָ וְ/אֶת נֵרֹתֶ֑י/הָ וְ/אֵ֖ת שֶׁ֥מֶן
    הַ/מָּאֽוֹר־־־׃
translation:
  text: and the lampstand for the light, and its utensils, and its lamps, and the
    oil for the light,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'the lampstand of the light' and 'the oil of the light.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְנֹרַת הַמָּאוֹר
  chosen: the lampstand for the light
  alternatives:
  - the lampstand of the light
  - the lampstand for lighting
  lexicon: HALOT
  rationale: מְנוֹרָה denotes the lampstand/candelabrum of the tabernacle. הַמָּאוֹר
    literally means 'the light' or 'the lighting/illumination.' In English, 'lampstand
    for the light' preserves the construct relationship while remaining natural. 'Lampstand
    of the light' is more wooden; 'for lighting' is smoother but less concrete.
- source_word: כֵּלֶיהָ
  chosen: its utensils
  alternatives:
  - its כלי, its vessels
  - its implements
  lexicon: HALOT
  rationale: כְּלִי is a broad term for articles, vessels, utensils, or implements.
    In the tabernacle furnishing context, 'utensils' is natural modern English and
    suitably broad without over-specifying.
- source_word: נֵרֹתֶיהָ
  chosen: its lamps
  alternatives:
  - its lamps/burners
  lexicon: HALOT
  rationale: נֵר commonly refers to a lamp or lamp-flame. Here, attached to the lampstand,
    it refers to the individual lamps associated with it. 'Lamps' is the standard
    and clearest rendering.
- source_word: שֶׁמֶן הַמָּאוֹר
  chosen: the oil for the light
  alternatives:
  - the oil for lighting
  - the lamp oil
  lexicon: HALOT
  rationale: Literally 'the oil of the light/lighting.' 'The oil for the light' mirrors
    the Hebrew construction and keeps the repeated מָאוֹר visible in translation.
    'Lamp oil' is idiomatic but slightly more interpretive.
- source_word: וְאֶת ... וְאֶת ... וְאֶת ... וְאֵת
  chosen: and ... and ... and ... and
  lexicon: Hebrew grammar
  rationale: The repeated direct-object marker with conjunction structures this verse
    as a list of tabernacle items. Repeating 'and' in English preserves the inventory
    style and rhythm of the Hebrew.
