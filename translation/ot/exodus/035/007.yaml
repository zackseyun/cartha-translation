id: EXO.35.7
reference: Exodus 35:7
source:
  edition: WLC
  text: וְ/עֹרֹ֨ת אֵילִ֧ם מְאָדָּמִ֛ים וְ/עֹרֹ֥ת תְּחָשִׁ֖ים וַ/עֲצֵ֥י שִׂטִּֽים׃
translation:
  text: and rams’ skins dyed red, and fine leather, and acacia wood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew term translated “fine leather” (תְּחָשִׁים) is uncertain; it
      has also been rendered “goatskin leather,” “porpoise skins,” or “dugong skins.”
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹרֹת
  chosen: skins
  alternatives:
  - hides
  lexicon: HALOT
  rationale: Plural construct of עוֹר refers to animal skins/hides as materials. 'Skins'
    is natural modern English in a list of tabernacle materials.
- source_word: אֵילִם
  chosen: rams’
  alternatives:
  - male sheep
  lexicon: HALOT
  rationale: The noun denotes rams; 'rams’ skins' is the standard and precise sense
    in this construction.
- source_word: מְאָדָּמִים
  chosen: dyed red
  alternatives:
  - reddened
  - made red
  lexicon: HALOT
  rationale: Passive/resultative participial form from אדם indicates the skins have
    been made red. 'Dyed red' communicates the likely treatment of the material in
    idiomatic English.
- source_word: עֹרֹת תְּחָשִׁים
  chosen: fine leather
  alternatives:
  - goatskin leather
  - porpoise skins
  - dugong skins
  - sea-cow hides
  lexicon: HALOT
  rationale: תְּחַשׁ is a well-known lexical uncertainty. Rather than falsely specifying
    an animal, 'fine leather' conveys a durable high-quality covering material and
    fits the tabernacle-material context. Significant alternatives are preserved in
    a footnote.
- source_word: עֲצֵי שִׂטִּים
  chosen: acacia wood
  alternatives:
  - wood of acacias
  - shittim wood
  lexicon: HALOT
  rationale: This phrase refers to wood from the acacia tree. 'Acacia wood' is clear
    modern English; 'shittim wood' is a traditional transliteration rather than a
    translation.
