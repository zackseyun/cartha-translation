id: EXO.10.9
reference: Exodus 10:9
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר מֹשֶׁ֔ה בִּ/נְעָרֵ֥י/נוּ וּ/בִ/זְקֵנֵ֖י/נוּ נֵלֵ֑ךְ בְּ/בָנֵ֨י/נוּ וּ/בִ/בְנוֹתֵ֜/נוּ בְּ/צֹאנֵ֤/נוּ וּ/בִ/בְקָרֵ֨/נוּ֙ נֵלֵ֔ךְ כִּ֥י חַג יְהוָ֖ה לָֽ/נוּ־׃
translation:
  text: Moses said, “We will go with our young and our old; we will go with our sons and our daughters, with our flocks and our herds, for we must hold a feast to Yahweh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “celebrate a festival to the LORD” or “keep a feast to the LORD.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - answered
  - spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר in direct speech introduction; 'said' is the natural English equivalent.
- source_word: בִּנְעָרֵינוּ
  chosen: with our young
  alternatives:
  - with our young men
  - with our children
  lexicon: HALOT
  rationale: נְעָרִים can denote youths/young people broadly. In this list paired with 'our old' and then followed by 'our sons and our daughters,' 'our young' best preserves the age contrast without narrowing to males only or collapsing it into 'children.' The prefixed ב is rendered idiomatically as 'with.'
- source_word: וּבִזְקֵנֵינוּ
  chosen: and our old
  alternatives:
  - and our elders
  - and our old men
  lexicon: HALOT
  rationale: Though זָקֵן can mean 'elder' as an office, here the pairing with 'our young' favors the age sense 'old/old ones' rather than leadership status. 'Our old' keeps the concise parallelism of the Hebrew.
- source_word: נֵלֵךְ
  chosen: we will go
  alternatives:
  - we shall go
  lexicon: HALOT
  rationale: הלך in first person plural imperfect here expresses intended future action in response to Pharaoh.
- source_word: בְּבָנֵינוּ וּבִבְנוֹתֵינוּ
  chosen: with our sons and our daughters
  alternatives:
  - with our children
  lexicon: HALOT
  rationale: The Hebrew explicitly names both sons and daughters; the translation preserves that gender-accurate specificity rather than generalizing to 'children.'
- source_word: בְּצֹאנֵנוּ
  chosen: with our flocks
  alternatives:
  - with our sheep and goats
  lexicon: HALOT
  rationale: צֹאן is a collective for small livestock, especially sheep/goats. 'Flocks' is the standard concise English rendering.
- source_word: וּבִבְקָרֵנוּ
  chosen: and our herds
  alternatives:
  - and our cattle
  lexicon: HALOT
  rationale: בָּקָר refers to herd animals, especially cattle. 'Herds' pairs naturally with 'flocks' in modern English and avoids sounding overly narrow or archaic.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for taking everyone and the livestock. 'Because' is clearer in contemporary English, while preserving the causal force.
- source_word: חַג
  chosen: hold a feast
  alternatives:
  - celebrate a festival
  - keep a feast
  lexicon: HALOT
  rationale: חַג denotes a pilgrimage feast/festival. Rendering the clause verbally in English ('hold a feast') communicates the implied action naturally while retaining the cultic sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לָנוּ
  chosen: we must
  alternatives:
  - for us
  - belongs to us
  lexicon: HALOT
  rationale: 'The dative pronoun with ''a feast to the LORD'' conveys obligation/possession in context: the feast is incumbent on Israel. ''We must hold a feast'' expresses the sense idiomatically in English.'
