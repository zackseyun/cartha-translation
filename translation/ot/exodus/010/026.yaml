id: EXO.10.26
reference: Exodus 10:26
source:
  edition: WLC
  text: וְ/גַם מִקְנֵ֜/נוּ יֵלֵ֣ךְ עִמָּ֗/נוּ לֹ֤א תִשָּׁאֵר֙ פַּרְסָ֔ה כִּ֚י מִמֶּ֣/נּוּ נִקַּ֔ח לַ/עֲבֹ֖ד אֶת יְהוָ֣ה אֱלֹהֵ֑י/נוּ וַ/אֲנַ֣חְנוּ לֹֽא נֵדַ֗ע מַֽה נַּעֲבֹד֙ אֶת יְהוָ֔ה עַד בֹּאֵ֖/נוּ שָֽׁמָּ/ה־־־־־־׃
translation:
  text: And even our livestock will go with us; not a hoof will be left behind, for from them we must take to serve Yahweh our God, and we do not know with what we must serve Yahweh until we arrive there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to worship the LORD our God' / 'with what we must worship the LORD.' The Hebrew verb can mean 'serve' or, in context, 'worship.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקְנֵנוּ
  chosen: our livestock
  alternatives:
  - our cattle
  - our herds
  lexicon: HALOT
  rationale: מִקְנֶה denotes domesticated animals/property in livestock. 'Livestock' is broad, natural English and fits the collective sense better than the narrower 'cattle.'
- source_word: יֵלֵךְ עִמָּנוּ
  chosen: will go with us
  alternatives:
  - shall go with us
  lexicon: HALOT
  rationale: Simple future movement with accompaniment; 'will go with us' is idiomatic modern English without loss of force.
- source_word: לֹא תִשָּׁאֵר פַּרְסָה
  chosen: not a hoof will be left behind
  alternatives:
  - not a hoof shall remain
  - not one hoof will be left
  lexicon: HALOT
  rationale: פַּרְסָה literally means 'hoof.' The singular after negation is idiomatic and emphatic; 'left behind' makes the implied separation explicit in natural English.
- source_word: כִּי מִמֶּנּוּ נִקַּח
  chosen: for from them we must take what we need
  alternatives:
  - for from them we will take
  - for from them we shall take
  lexicon: HALOT
  rationale: The Hebrew states 'from it/them we will take.' In context Moses means animals from the livestock will be required for worship. Adding 'what we need' makes explicit the object implied by the context without over-paraphrasing.
- source_word: לַעֲבֹד אֶת יְהוָה אֱלֹהֵינוּ
  chosen: to serve the LORD our God
  alternatives:
  - to worship the LORD our God
  lexicon: HALOT
  rationale: עבד with God can mean serve/worship. 'Serve' preserves the lexical link with the repeated נַעֲבֹד later in the verse and keeps the broader covenantal sense; worship is contextually included.
- source_word: וַאֲנַחְנוּ לֹא נֵדַע
  chosen: and we do not know
  alternatives:
  - and we will not know
  lexicon: HALOT
  rationale: The imperfect here expresses present lack of knowledge relative to the future journey; English present is the most natural rendering.
- source_word: מַה נַּעֲבֹד אֶת יְהוָה
  chosen: with what we must serve the LORD
  alternatives:
  - how we are to serve the LORD
  - what we must use to serve the LORD
  lexicon: HALOT
  rationale: 'The interrogative מַה here is best taken instrumentally in context: Moses does not yet know what animals/materials will be required. ''With what'' preserves that concrete sense better than the more abstract ''how.'' ''Must serve'' reflects contextual necessity rather than mere futurity.'
- source_word: עַד בֹּאֵנוּ שָׁמָּה
  chosen: until we arrive there
  alternatives:
  - until we come there
  - until we get there
  lexicon: HALOT
  rationale: בוא plus שָׁמָּה indicates arrival at the destination. 'Arrive there' is clear, natural English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
