theological_decisions:
- issue: Rendering עבד in a sacrificial/worship context
  chosen_reading: serve the LORD
  alternative_readings:
  - worship the LORD
  rationale: The verse concerns sacrificial obligations, so 'worship' is contextually possible. However, rendering both occurrences with 'serve' preserves the Hebrew repetition and the broader covenantal sense without narrowing the term to liturgy alone.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
