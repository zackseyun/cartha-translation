id: EXO.10.24
reference: Exodus 10:24
source:
  edition: WLC
  text: וַ/יִּקְרָ֨א פַרְעֹ֜ה אֶל מֹשֶׁ֗ה וַ/יֹּ֨אמֶר֙ לְכוּ֙ עִבְד֣וּ אֶת יְהוָ֔ה רַ֛ק צֹאנְ/כֶ֥ם וּ/בְקַרְ/כֶ֖ם יֻצָּ֑ג גַּֽם טַפְּ/כֶ֖ם יֵלֵ֥ךְ עִמָּ/כֶֽם־־־׃
translation:
  text: Then Pharaoh called to Moses and said, “Go, serve Yahweh. Only let your flocks and your herds remain behind; even your little ones may go with you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be left' for 'remain behind.'
    reason: lexical_alternative
  - marker: b
    text: Or 'your children' for 'your little ones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - summoned
  lexicon: HALOT
  rationale: The verb קרא in this narrative context means to call for or call to someone. 'Called' is natural English and preserves the straightforward narrative sense without adding the stronger nuance of official summons unless context requires it.
- source_word: פַרְעֹה
  chosen: Pharaoh
  rationale: Standard English transliteration of the royal title/name.
- source_word: אֶל מֹשֶׁה
  chosen: to Moses
  alternatives:
  - for Moses
  lexicon: HALOT
  rationale: אֶל with קרא can mean 'to' or 'for.' Here 'called to Moses' fits the immediate speech setting and keeps the Hebrew preposition visible in idiomatic English.
- source_word: לְכוּ
  chosen: Go
  alternatives:
  - Go on
  lexicon: HALOT
  rationale: Imperative plural of הלך. 'Go' is the plain and sufficient rendering in Pharaoh's concession.
- source_word: עִבְדוּ אֶת יְהוָה
  chosen: serve the LORD
  alternatives:
  - worship the LORD
  lexicon: HALOT
  rationale: עבד with God can denote service/worship. 'Serve' is preferred because it is the more direct lexical equivalent and preserves the repeated Exodus motif of Israel serving the LORD rather than Pharaoh. 'The LORD' follows the project's default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: רַק
  chosen: Only
  alternatives:
  - except that
  - just
  lexicon: HALOT
  rationale: רַק marks Pharaoh's restriction on the permission he grants. 'Only' is concise and idiomatic.
- source_word: צֹאנְכֶם
  chosen: your flocks
  alternatives:
  - your sheep and goats
  lexicon: HALOT
  rationale: צֹאן is a collective term for small livestock, especially sheep and goats. 'Flocks' is the standard concise rendering.
- source_word: וּבְקַרְכֶם
  chosen: and your herds
  alternatives:
  - and your cattle
  lexicon: HALOT
  rationale: בקר refers to larger livestock, especially cattle. 'Herds' pairs naturally with 'flocks' and reflects the collective sense.
- source_word: יֻצָּג
  chosen: remain behind
  alternatives:
  - be left
  - be stationed
  lexicon: HALOT
  rationale: Hophal of יצג here conveys being left in place. 'Remain behind' is idiomatic English that captures the passive/resultative sense in context.
- source_word: גַּם
  chosen: even
  alternatives:
  - also
  lexicon: HALOT
  rationale: 'גַּם adds an emphatic concessive element: Pharaoh allows not only the adults but also the children to go. ''Even'' brings out that concession.'
- source_word: טַפְּכֶם
  chosen: your little ones
  alternatives:
  - your children
  - your dependents
  lexicon: HALOT
  rationale: טַף refers to small children or dependents, often the little ones of a household. 'Your little ones' is a conventional and accurate rendering that preserves the familial nuance.
- source_word: יֵלֵךְ עִמָּכֶם
  chosen: may go with you
  alternatives:
  - shall go with you
  - can go with you
  lexicon: HALOT
  rationale: Though singular in Hebrew, the verb takes the collective noun טף as its subject. 'May go with you' fits Pharaoh's permissive statement in natural English; 'shall go' could sound overly formal or predictive rather than concessive.
