id: EXO.10.8
reference: Exodus 10:8
source:
  edition: WLC
  text: וַ/יּוּשַׁ֞ב אֶת מֹשֶׁ֤ה וְ/אֶֽת אַהֲרֹן֙ אֶל פַּרְעֹ֔ה וַ/יֹּ֣אמֶר אֲלֵ/הֶ֔ם לְכ֥וּ עִבְד֖וּ אֶת יְהוָ֣ה אֱלֹהֵי/כֶ֑ם מִ֥י וָ/מִ֖י הַ/הֹלְכִֽים־־־־׃
translation:
  text: So Moses and Aaron were brought back to Pharaoh, and he said to them, “Go, serve Yahweh your God. Who are the ones going?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: “Who and who are the ones going?”—an idiom asking for a precise identification of who will be allowed to go.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוּשַׁב
  chosen: were brought back
  alternatives:
  - were returned
  - he caused to return
  lexicon: HALOT
  rationale: 'Hophal of שוב is passive/causative-passive: Moses and Aaron are caused to return. ''Were brought back'' gives natural English while preserving the passive sense better than a simple active paraphrase.'
- source_word: אֶת מֹשֶׁה וְאֶת אַהֲרֹן
  chosen: Moses and Aaron
  rationale: Direct-object marking is not represented in English; names are transliterated per translation philosophy.
- source_word: אֶל פַּרְעֹה
  chosen: to Pharaoh
  alternatives:
  - before Pharaoh
  lexicon: HALOT
  rationale: אֶל normally indicates movement toward. 'To Pharaoh' is the most direct rendering in context.
- source_word: לְכוּ
  chosen: Go
  alternatives:
  - Go on
  - Proceed
  lexicon: HALOT
  rationale: Imperative of הלך. Simple 'Go' is idiomatic and matches Pharaoh's command.
- source_word: עִבְדוּ
  chosen: serve
  alternatives:
  - worship
  lexicon: HALOT
  rationale: עבד in this context refers to rendering service to God, which can include worship. 'Serve' preserves the lexical connection and avoids narrowing the sense to liturgical worship alone.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Construct with 2mp suffix; straightforward possessive rendering.
- source_word: מִי וָמִי
  chosen: Who exactly
  alternatives:
  - Who and who
  - Which ones
  lexicon: HALOT
  rationale: The idiom intensifies/specifies the question about identity. 'Who exactly' captures Pharaoh's demand for specification in natural English; a more literal 'who and who' is preserved in a footnote.
- source_word: הַהֹלְכִים
  chosen: are the ones going
  alternatives:
  - are going
  - will go
  lexicon: HALOT
  rationale: 'Participle with article functions substantivally: ''the ones going.'' Rendering it explicitly preserves the sense that Pharaoh asks which persons are to go, not merely whether they will go.'
