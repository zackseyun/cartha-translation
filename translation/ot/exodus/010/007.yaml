id: EXO.10.7
reference: Exodus 10:7
source:
  edition: WLC
  text: וַ/יֹּאמְרוּ֩ עַבְדֵ֨י פַרְעֹ֜ה אֵלָ֗י/ו עַד מָתַי֙ יִהְיֶ֨ה זֶ֥ה לָ֨/נוּ֙ לְ/מוֹקֵ֔שׁ שַׁלַּח֙ אֶת הָ֣/אֲנָשִׁ֔ים וְ/יַֽעַבְד֖וּ אֶת יְהוָ֣ה אֱלֹהֵי/הֶ֑ם הֲ/טֶ֣רֶם תֵּדַ֔ע כִּ֥י אָבְדָ֖ה מִצְרָֽיִם־־־׃
translation:
  text: Then Pharaoh’s servants said to him, “How long will this man be a snare to us? Send the men away so that they may serve Yahweh their God. Do you not yet know that Egypt is ruined?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “this one” or simply “this”; the Hebrew demonstrative refers to Moses.
    reason: lexical_alternative
  - marker: b
    text: Or “a trap.”
    reason: lexical_alternative
  - marker: c
    text: Hebrew “the men”; some translations broaden this to “the people,” but the source text is specifically masculine plural.
    reason: lexical_alternative
  - marker: d
    text: Or “serve/worship the LORD their God”; the Hebrew verb can include both service and worship in relation to God.
    reason: lexical_alternative
  - marker: e
    text: Hebrew “the LORD” represents the divine name YHWH; alternatively transliterated “Yahweh.”
    reason: alternative_reading
lexical_decisions:
- source_word: עַבְדֵי
  chosen: servants
  alternatives:
  - officials
  lexicon: HALOT
  rationale: In context this refers to Pharaoh’s court servants/attendants, likely officials. 'Servants' is the straightforward lexical rendering and fits the narrative register; 'officials' is possible but slightly more interpretive.
- source_word: עַד מָתַי
  chosen: How long
  alternatives:
  - Until when
  lexicon: HALOT
  rationale: Idiomatic temporal question in English; 'How long' best captures the force of the Hebrew expression.
- source_word: זֶה
  chosen: this man
  alternatives:
  - this one
  - this
  lexicon: HALOT
  rationale: The demonstrative refers to Moses in context. English normally supplies 'man' to avoid an unnatural 'this' standing alone; this is a contextually warranted explicitation, not a paraphrase.
- source_word: לְמוֹקֵשׁ
  chosen: a snare
  alternatives:
  - a trap
  - a stumbling block
  lexicon: HALOT
  rationale: מוֹקֵשׁ commonly denotes a snare or trap. 'Snare' preserves the metaphor and is a standard English equivalent; 'trap' is possible but less traditional in biblical style.
- source_word: שַׁלַּח
  chosen: Send ... away
  alternatives:
  - Let ... go
  - Release
  lexicon: HALOT
  rationale: The imperative calls for Pharaoh to dismiss/release them. 'Send ... away' fits the immediate syntax with אֶת־הָאֲנָשִׁים and avoids importing the more slogan-like 'let my people go' from other contexts.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the people
  lexicon: HALOT
  rationale: The noun אֲנָשִׁים is specifically 'men,' not a generic 'people.' This is gender-accurate and matches the source wording, even though the larger group in view is Israel.
- source_word: וְיַעַבְדוּ
  chosen: so that they may serve
  alternatives:
  - and let them serve
  - that they may worship
  lexicon: HALOT
  rationale: עבד with God as object can mean serve/worship. 'Serve' is the more direct lexical rendering and preserves the broader covenantal sense, while English readers can still hear worshipful service in context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הֲטֶרֶם תֵּדַע
  chosen: Do you not yet know
  alternatives:
  - Do you still not know
  - Before you know
  lexicon: HALOT
  rationale: 'The interrogative particle with טֶרֶם here yields an idiomatic rebuke: ''Do you not yet know...?'' This is the natural English equivalent in context.'
- source_word: אָבְדָה
  chosen: is ruined
  alternatives:
  - has perished
  - is destroyed
  lexicon: HALOT
  rationale: The perfect verb describes Egypt as already devastated by the plagues. 'Is ruined' communicates the state-result clearly in modern English without overstating final annihilation.
- source_word: מִצְרַיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: Standard rendering of the place name; here it denotes the nation/land as a whole.
