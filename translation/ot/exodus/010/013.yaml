id: EXO.10.13
reference: Exodus 10:13
source:
  edition: WLC
  text: וַ/יֵּ֨ט מֹשֶׁ֣ה אֶת מַטֵּ/הוּ֮ עַל אֶ֣רֶץ מִצְרַיִם֒ וַֽ/יהוָ֗ה נִהַ֤ג ר֥וּחַ קָדִים֙ בָּ/אָ֔רֶץ כָּל הַ/יּ֥וֹם הַ/ה֖וּא וְ/כָל הַ/לָּ֑יְלָה הַ/בֹּ֣קֶר הָיָ֔ה וְ/ר֨וּחַ֙ הַ/קָּדִ֔ים נָשָׂ֖א אֶת הָ/אַרְבֶּֽה־־־־־׃
translation:
  text: So Moses stretched out his staff over the land of Egypt, and Yahweh drove an east wind over the land all that day and all that night. When morning came, the east wind brought the locusts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a wind from the east.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּט
  chosen: stretched out
  alternatives:
  - extended
  - held out
  lexicon: HALOT
  rationale: The verb נטה commonly means to stretch out or extend. 'Stretched out' is idiomatic in English and fits the repeated plague narrative formula involving Moses' staff.
- source_word: מַטֵּהוּ
  chosen: his staff
  alternatives:
  - his rod
  lexicon: HALOT
  rationale: מַטֶּה can mean staff or rod. 'Staff' is clearer in modern English and matches the instrument Moses uses in Exodus.
- source_word: עַל אֶרֶץ מִצְרַיִם
  chosen: over the land of Egypt
  alternatives:
  - upon the land of Egypt
  lexicon: HALOT
  rationale: עַל with the gesture of the staff is naturally rendered 'over.' 'Land of Egypt' is the standard sense of אֶרֶץ here.
- source_word: וַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: נִהַג
  chosen: drove
  alternatives:
  - led
  - caused to blow
  lexicon: HALOT
  rationale: נהג means to drive, lead, or conduct. With 'wind' as object, 'drove' vividly conveys the LORD's active causation of the wind across the land.
- source_word: רוּחַ קָדִים
  chosen: an east wind
  alternatives:
  - a wind from the east
  lexicon: HALOT
  rationale: The phrase denotes a wind coming from the east. 'East wind' is the natural English collocation and preserves the directional force.
- source_word: בָּאָרֶץ
  chosen: over the land
  alternatives:
  - in the land
  - across the land
  lexicon: HALOT
  rationale: Given the motion of wind, 'over the land' best fits the imagery, though 'in the land' is possible. Using 'over' also echoes the earlier staff gesture without obscuring meaning.
- source_word: כָּל הַיּוֹם הַהוּא וְכָל הַלָּיְלָה
  chosen: all that day and all the night
  alternatives:
  - all that day and all night
  lexicon: HALOT
  rationale: The Hebrew explicitly repeats 'all' and includes the article with 'night.' The translation preserves the duration emphatically while remaining readable.
- source_word: הַבֹּקֶר הָיָה
  chosen: When morning came
  alternatives:
  - and it became morning
  - by morning
  lexicon: HALOT
  rationale: Literally 'the morning happened/was.' 'When morning came' is a natural English rendering that preserves the temporal transition.
- source_word: נָשָׂא אֶת הָאַרְבֶּה
  chosen: had brought the locusts
  alternatives:
  - carried the locusts
  - bore the locusts
  lexicon: HALOT
  rationale: נשא here refers to the wind carrying or bringing the locust swarm. 'Had brought' fits the narrative sequence after the overnight wind and reads naturally in English.
- source_word: הָאַרְבֶּה
  chosen: the locusts
  alternatives:
  - the locust swarm
  lexicon: HALOT
  rationale: Although singular in Hebrew can function collectively, English normally uses the plural 'locusts' for the plague insects. This preserves the collective sense idiomatically.
