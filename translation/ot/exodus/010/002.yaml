id: EXO.10.2
reference: Exodus 10:2
source:
  edition: WLC
  text: וּ/לְמַ֡עַן תְּסַפֵּר֩ בְּ/אָזְנֵ֨י בִנְ/ךָ֜ וּ/בֶן בִּנְ/ךָ֗ אֵ֣ת אֲשֶׁ֤ר הִתְעַלַּ֨לְתִּי֙ בְּ/מִצְרַ֔יִם וְ/אֶת אֹתֹתַ֖/י אֲשֶׁר שַׂ֣מְתִּי בָ֑/ם וִֽ/ידַעְתֶּ֖ם כִּי אֲנִ֥י יְהוָֽה־־־־׃
translation:
  text: so that you may tell in the hearing of your son and of your grandson how I made a mockery of the Egyptians, and my signs that I placed among them, so that you may know that I am Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “how I made a mockery of Egypt.” The Hebrew verb can emphasize humiliating Egypt as well as dealing severely with it.
    reason: lexical_alternative
  - marker: b
    text: Or, “and you will know that I am the LORD.”
    reason: alternative_reading
lexical_decisions:
- source_word: וּלְמַעַן
  chosen: so that
  alternatives:
  - in order that
  lexicon: HALOT
  rationale: Marks purpose/result in connection with the preceding command; 'so that' is natural modern English and preserves the purposive force.
- source_word: תְּסַפֵּר
  chosen: you may tell
  alternatives:
  - you may recount
  - you may declare
  lexicon: HALOT
  rationale: Piel of ספר here denotes recounting/telling a story to later generations. 'Tell' is idiomatic with the following 'in the hearing of' phrase.
- source_word: בְּאָזְנֵי
  chosen: in the hearing of
  alternatives:
  - in the ears of
  - to
  lexicon: HALOT
  rationale: Literally 'in the ears of,' an idiom for speaking so someone hears. 'In the hearing of' preserves the Hebrew image better than the flatter 'to' while remaining readable.
- source_word: בִנְךָ וּבֶן בִּנְךָ
  chosen: your son and your grandson
  alternatives:
  - your son and your son's son
  lexicon: HALOT
  rationale: The Hebrew expression is literally 'your son and your son's son.' 'Your grandson' is the natural English equivalent and preserves the generational emphasis.
- source_word: הִתְעַלַּלְתִּי
  chosen: I dealt harshly with
  alternatives:
  - I made a mockery of
  - I mocked
  - I dealt severely with
  lexicon: HALOT
  rationale: The Hitpael of עלל in this context conveys God's severe, humiliating action against Egypt in the plagues. 'Dealt harshly with' communicates the concrete force without sounding flippant; 'mocked' or 'made a mockery of' can suggest mere ridicule and understate the judicial acts.
- source_word: בְּמִצְרַיִם
  chosen: with Egypt
  alternatives:
  - against Egypt
  - in Egypt
  lexicon: HALOT
  rationale: Though the preposition is ב ('in/with'), English idiom with the chosen verb is 'dealt harshly with Egypt.' This best reflects the object of God's action.
- source_word: אֹתֹתַי
  chosen: my signs
  alternatives:
  - my wonders
  - my miraculous signs
  lexicon: HALOT
  rationale: אות commonly means 'signs.' 'My signs' is the most direct rendering; 'wonders' would shift toward a different Hebrew term, and 'miraculous signs' adds interpretation not explicit in the noun itself.
- source_word: שַׂמְתִּי בָם
  chosen: I placed among them
  alternatives:
  - I set among them
  - I performed among them
  - I put on them
  lexicon: HALOT
  rationale: The verb is literally 'placed/set' with a 3mp suffix likely referring to the Egyptians. 'Placed among them' preserves the concrete Hebrew wording while fitting English usage. 'Performed' is interpretive.
- source_word: וִידַעְתֶּם
  chosen: and so that you may know
  alternatives:
  - and you will know
  - that you may know
  lexicon: HALOT
  rationale: The form can be read with purposive/result nuance in sequence with the opening לְמַעַן. Rendering it as 'and so that you may know' makes explicit the continuing purpose of God's acts and fits the discourse flow.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
