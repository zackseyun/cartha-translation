theological_decisions:
- issue: Rendering the divine action הִתְעַלַּלְתִּי toward Egypt
  chosen_reading: how I dealt harshly with Egypt
  alternative_readings:
  - how I made a mockery of Egypt
  - how I mocked Egypt
  rationale: The verse refers to God's judicial acts in the plagues, which both humiliate and punish Egypt. The chosen rendering preserves the severity of divine judgment without reducing the sense to mere ridicule. The alternative is lexically possible and worth preserving because many translations emphasize the humiliating aspect.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it
- issue: Rendering וִידַעְתֶּם as purpose/result
  chosen_reading: and so that you may know
  alternative_readings:
  - and you will know
  rationale: The clause can be heard either as continued purpose from לְמַעַן or as result/future consequence. The purposive rendering best matches the syntax and flow, but the result nuance remains plausible and is preserved in a footnote.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it
