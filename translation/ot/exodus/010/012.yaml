id: EXO.10.12
reference: Exodus 10:12
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל מֹשֶׁ֗ה נְטֵ֨ה יָדְ/ךָ֜ עַל אֶ֤רֶץ מִצְרַ֨יִם֙ בָּֽ/אַרְבֶּ֔ה וְ/יַ֖עַל עַל אֶ֣רֶץ מִצְרָ֑יִם וְ/יֹאכַל֙ אֶת כָּל עֵ֣שֶׂב הָ/אָ֔רֶץ אֵ֛ת כָּל אֲשֶׁ֥ר הִשְׁאִ֖יר הַ/בָּרָֽד־־־־־־׃
translation:
  text: Then Yahweh said to Moses, “Stretch out your hand over the land of Egypt for the locusts, so that they may come up over the land of Egypt and eat every plant of the land, everything that the hail has left.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'for/with regard to the locust'; the preposition is difficult, and more literal renderings such as 'against the locusts' or 'over the locusts' are possible.
    reason: lexical_alternative
  - marker: b
    text: Hebrew singular 'locust' with singular verbs, used collectively for the swarm; English renders the sense with the plural 'locusts' / 'they.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: נְטֵה
  chosen: Stretch out
  alternatives:
  - Extend
  - Reach out
  lexicon: HALOT
  rationale: The imperative of נטה commonly means to stretch out or extend. 'Stretch out' is idiomatic in English and fits the plague-sign context.
- source_word: יָדְךָ
  chosen: your hand
  lexicon: HALOT
  rationale: A direct, literal rendering of the body-part term; no contextual reason to substitute 'arm' or a figurative expression.
- source_word: עַל אֶרֶץ מִצְרַיִם
  chosen: over the land of Egypt
  alternatives:
  - over Egypt
  - against the land of Egypt
  lexicon: HALOT
  rationale: אֶרֶץ here is best rendered 'land' rather than simply 'earth' or the bare place name. 'Over the land of Egypt' preserves the spatial sense of עַל and the repeated phrase in the verse.
- source_word: בָּאַרְבֶּה
  chosen: for the locusts
  alternatives:
  - toward the locusts
  - against the locusts
  - over the locusts
  lexicon: HALOT
  rationale: 'The preposition ב here is difficult and likely expresses the object/target of the gesture in context: Moses is to stretch out his hand with reference to the locust plague. ''For the locusts'' communicates the sense naturally in English without over-paraphrasing. More literal options are possible but less clear.'
- source_word: וְיַעַל
  chosen: so that they may come up
  alternatives:
  - and it will come up
  - that it may come up
  lexicon: HALOT
  rationale: Although the verb is morphologically singular, אַרְבֶּה can function as a collective noun. English naturally renders the collective as plural 'they' when referring to locusts. 'Come up' preserves the basic sense of עלה.
- source_word: אַרְבֶּה
  chosen: the locusts
  alternatives:
  - the locust swarm
  - locust
  lexicon: HALOT
  rationale: Though singular in form, אַרְבֶּה often denotes locusts collectively. English plural best conveys the intended plague of many insects.
- source_word: וְיֹאכַל
  chosen: and eat
  alternatives:
  - and it will eat
  - and consume
  lexicon: HALOT
  rationale: Like the preceding verb, the singular verb takes a collective subject. English plural sense is carried by 'they may come up ... and eat,' while 'eat' remains the straightforward gloss of אכל.
- source_word: כָּל עֵשֶׂב הָאָרֶץ
  chosen: every plant of the land
  alternatives:
  - all the vegetation of the land
  - every herb of the land
  - all the grass of the land
  lexicon: HALOT
  rationale: עֵשֶׂב can denote vegetation broadly, not merely grass. 'Every plant of the land' is natural modern English and fits the agricultural devastation in context.
- source_word: אֵת כָּל אֲשֶׁר הִשְׁאִיר הַבָּרָד
  chosen: everything that the hail has left
  alternatives:
  - all that the hail left behind
  - everything the hail spared
  lexicon: HALOT
  rationale: הִשְׁאִיר means 'leave, leave behind, spare.' 'Has left' is idiomatic and links this plague to the aftermath of the previous hail plague.
