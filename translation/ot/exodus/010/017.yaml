id: EXO.10.17
reference: Exodus 10:17
source:
  edition: WLC
  text: וְ/עַתָּ֗ה שָׂ֣א נָ֤א חַטָּאתִ/י֙ אַ֣ךְ הַ/פַּ֔עַם וְ/הַעְתִּ֖ירוּ לַ/יהוָ֣ה אֱלֹהֵי/כֶ֑ם וְ/יָסֵר֙ מֵֽ/עָלַ֔/י רַ֖ק אֶת הַ/מָּ֥וֶת הַ/זֶּֽה־׃
translation:
  text: So now, please forgive my sin just this once, and plead with Yahweh your God, that he may remove from me this death only.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bear away my sin' or 'pardon my sin.' The Hebrew idiom literally uses 'lift/bear' with 'sin' as its object.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''this death.'' Pharaoh likely refers to the present deadly plague and its effects.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: So now
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Introduces Pharaoh's urgent appeal with a natural discourse connector. 'So now' captures both the conjunction and the temporal adverb in readable English.
- source_word: שָׂא נָא
  chosen: please forgive
  alternatives:
  - please bear away
  - please pardon
  - please take away
  lexicon: HALOT
  rationale: The verb נָשָׂא literally means 'lift/carry/bear,' but with 'sin' as object it idiomatically means to bear away or forgive guilt. 'Please forgive' best conveys the idiom in contemporary English while preserving the plea marked by נָא.
- source_word: חַטָּאתִי
  chosen: my sin
  alternatives:
  - my offense
  lexicon: HALOT
  rationale: Standard rendering for חטאת in this context of moral wrongdoing. Singular is retained as in the Hebrew.
- source_word: אַךְ הַפַּעַם
  chosen: just this once
  alternatives:
  - only this time
  - only this once
  lexicon: HALOT
  rationale: Captures Pharaoh's limiting particle plus temporal noun, emphasizing that he asks for pardon on this occasion only.
- source_word: וְהַעְתִּירוּ
  chosen: and plead
  alternatives:
  - and entreat
  - and pray earnestly
  - and intercede
  lexicon: HALOT
  rationale: The Hiphil of עתר often denotes urgent supplication, especially to God. 'Plead' conveys earnestness without sounding archaic. Because the object is explicitly 'to the LORD your God,' the sense is prayerful intercession.
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Follows the project's default rendering of the divine name YHWH as 'the LORD' per doctrine guidelines.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: 'Retains Pharaoh''s distancing language: he says ''your God,'' not ''our God'' or simply ''God.'' This is contextually significant.'
- source_word: וְיָסֵר
  chosen: so that he may remove
  alternatives:
  - and may he remove
  - that he may turn away
  lexicon: HALOT
  rationale: The prefixed conjunction plus jussive/imperfect expresses purpose or result following the request for intercession. 'So that he may remove' makes the dependency clear in English.
- source_word: מֵעָלַי
  chosen: from me
  alternatives:
  - from upon me
  - away from me
  lexicon: HALOT
  rationale: Idiomatic English equivalent of the Hebrew prepositional phrase.
- source_word: רַק
  chosen: only
  alternatives:
  - just
  lexicon: HALOT
  rationale: 'Preserves the restrictive force: Pharaoh asks only for the removal of the present deadly plague.'
- source_word: אֶת־הַמָּוֶת הַזֶּה
  chosen: this death
  alternatives:
  - this deadly thing
  - this plague of death
  - this deathly disaster
  lexicon: HALOT
  rationale: The Hebrew says literally 'this death.' In context Pharaoh refers to the lethal plague of locust devastation and its consequences. The literal wording is retained rather than interpreting it more specifically as 'plague,' since the text itself uses 'death'.
