theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Pharaoh's confession wording
  chosen_reading: I have sinned against the LORD your God and against you
  alternative_readings:
  - I have sinned to the LORD your God and to you
  rationale: The Hebrew preposition ל after חטא is best represented in idiomatic English as 'against,' preserving the sense of offense without flattening the theological confession. 'Your God' is retained rather than 'our God' because the Hebrew explicitly marks second person plural possession.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve source meaning without paraphrase'
