id: EXO.10.16
reference: Exodus 10:16
source:
  edition: WLC
  text: וַ/יְמַהֵ֣ר פַּרְעֹ֔ה לִ/קְרֹ֖א לְ/מֹשֶׁ֣ה וּֽ/לְ/אַהֲרֹ֑ן וַ/יֹּ֗אמֶר חָטָ֛אתִי לַ/יהוָ֥ה אֱלֹֽהֵי/כֶ֖ם וְ/לָ/כֶֽם׃
translation:
  text: Then Pharaoh hurried to call for Moses and Aaron, and he said, “I have sinned against Yahweh your God and against you.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְמַהֵר
  chosen: hurried
  alternatives:
  - made haste
  - quickly
  lexicon: HALOT
  rationale: The verb from מהר conveys acting quickly or hastening. 'Hurried' is natural modern English and preserves the urgency without sounding archaic like 'made haste.'
- source_word: לִקְרֹא
  chosen: to call for
  alternatives:
  - to call
  - to summon
  lexicon: HALOT
  rationale: In context Pharaoh urgently requests the presence of Moses and Aaron. 'Call for' captures the idiomatic sense better than the more ambiguous 'call,' while remaining close to the Hebrew.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  rationale: Standard English transliteration of the royal title/name used consistently in Exodus.
- source_word: לְמֹשֶׁה וּלְאַהֲרֹן
  chosen: for Moses and Aaron
  alternatives:
  - Moses and Aaron
  rationale: The preposition is carried into English through 'call for Moses and Aaron,' which is idiomatic and reflects the infinitive construction.
- source_word: וַיֹּאמֶר
  chosen: and he said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing direct speech; 'and he said' is the clearest English rendering.
- source_word: חָטָאתִי
  chosen: I have sinned
  alternatives:
  - I sinned
  - I have done wrong
  lexicon: HALOT
  rationale: The verb חטא means 'to sin.' 'I have sinned' is the most direct and idiomatic confession in English, preserving the moral and theological force better than the weaker 'done wrong.'
- source_word: לַיהוָה
  chosen: against the LORD
  alternatives:
  - to the LORD
  lexicon: HALOT
  rationale: With חטא, the preposition ל can mark the offended party; in English, 'sin against' is the natural equivalent. Per doctrine, יהוה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: This follows the project's stated default for the divine name, preserving the conventional small-caps covenant rendering in standard English form.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - the God of you
  lexicon: HALOT
  rationale: Construct plus second person plural suffix is naturally rendered 'your God.' Pharaoh acknowledges Israel's God specifically, not yet as his own.
- source_word: וְלָכֶם
  chosen: and against you
  alternatives:
  - and to you
  lexicon: HALOT
  rationale: As with the prior phrase, English idiom with 'sinned' requires 'against you.' The plural refers to Moses and Aaron together.
