id: EXO.10.11
reference: Exodus 10:11
source:
  edition: WLC
  text: לֹ֣א כֵ֗ן לְכֽוּ נָ֤א הַ/גְּבָרִים֙ וְ/עִבְד֣וּ אֶת יְהוָ֔ה כִּ֥י אֹתָ֖/הּ אַתֶּ֣ם מְבַקְשִׁ֑ים וַ/יְגָ֣רֶשׁ אֹתָ֔/ם מֵ/אֵ֖ת פְּנֵ֥י פַרְעֹֽה־־׃פ
translation:
  text: No! Let the men go now and serve Yahweh, for that is what you are seeking.” Then he drove them out from Pharaoh’s presence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Not so'—a more formal rendering of Pharaoh's abrupt refusal.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the men,' specifically the males, not the whole people.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא כֵן
  chosen: No!
  alternatives:
  - Not so
  - No, not so
  lexicon: HALOT
  rationale: An idiomatic rejection of the proposal just made. A simple emphatic 'No!' communicates the force in natural English better than a wooden 'Not so,' while preserving the abrupt refusal.
- source_word: לְכוּ נָא
  chosen: Let ... go now
  alternatives:
  - Go now
  - Please go
  lexicon: HALOT
  rationale: The imperative with נָא can mark entreaty, urgency, or softening. In Pharaoh's speech here, 'now' better fits the dismissive, urgent tone than 'please,' which could sound overly polite in English.
- source_word: הַגְּבָרִים
  chosen: the men
  alternatives:
  - the males
  - the adult men
  lexicon: HALOT
  rationale: גְּבָרִים refers specifically to males/men, not the whole people. 'The men' is gender-accurate and contextually important because Pharaoh is restricting who may go.
- source_word: וְעִבְדוּ אֶת יְהוָה
  chosen: and serve the LORD
  alternatives:
  - and worship the LORD
  lexicon: HALOT
  rationale: עבד with God can mean serve/worship. 'Serve the LORD' preserves the broader covenantal sense and remains idiomatic. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name, preserving the reverential convention and established covenantal rendering.
- source_word: כִּי אֹתָהּ אַתֶּם מְבַקְשִׁים
  chosen: for that is what you are seeking
  alternatives:
  - for that is what you seek
  - because that is what you have been asking for
  lexicon: HALOT
  rationale: The feminine pronoun אֹתָהּ likely refers to the implied request/thing sought rather than a feminine noun explicitly stated in English. 'That is what you are seeking' renders the sense clearly and naturally without over-specifying the antecedent.
- source_word: וַיְגָרֶשׁ אֹתָם
  chosen: Then he drove them out
  alternatives:
  - And he expelled them
  - And one drove them out
  lexicon: HALOT
  rationale: The singular verb naturally takes Pharaoh as the subject in context. 'Drove them out' captures the forceful dismissal better than the more formal 'expelled them.'
- source_word: מֵאֵת פְּנֵי פַרְעֹה
  chosen: from Pharaoh’s presence
  alternatives:
  - from before Pharaoh
  - from the presence of Pharaoh
  lexicon: HALOT
  rationale: A standard Hebrew idiom meaning removal from before someone. 'From Pharaoh's presence' is clear modern English while preserving the courtly setting.
