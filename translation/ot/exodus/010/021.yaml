id: EXO.10.21
reference: Exodus 10:21
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל מֹשֶׁ֗ה נְטֵ֤ה יָֽדְ/ךָ֙ עַל הַ/שָּׁמַ֔יִם וִ֥/יהִי חֹ֖שֶׁךְ עַל אֶ֣רֶץ מִצְרָ֑יִם וְ/יָמֵ֖שׁ חֹֽשֶׁךְ־־־׃
translation:
  text: Then Yahweh said to Moses, “Stretch out your hand toward the sky, so that there may be darkness over the land of Egypt, and the darkness may be felt.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''and darkness may be felt'' or possibly ''and one may feel darkness.'' The final clause uses a rare verb and emphasizes the darkness as palpable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the traditional small-caps covenantal form rather than transliteration.
- source_word: נְטֵה
  chosen: Stretch out
  alternatives:
  - Extend
  - Reach out
  lexicon: HALOT
  rationale: The imperative of נטה commonly means to stretch out or extend. 'Stretch out' is natural English and fits the plague-sign action context.
- source_word: יָדְךָ
  chosen: your hand
  lexicon: HALOT
  rationale: Direct, literal rendering of the singular noun with second masculine singular suffix addressed to Moses.
- source_word: עַל הַשָּׁמַיִם
  chosen: toward the sky
  alternatives:
  - over the heavens
  - toward heaven
  lexicon: HALOT
  rationale: Although literally 'upon/over the heavens,' in this gesture context the phrase indicates direction upward. 'Toward the sky' is idiomatic modern English while preserving the sense.
- source_word: וִיהִי חֹשֶׁךְ
  chosen: so that there may be darkness
  alternatives:
  - and let there be darkness
  - that darkness may come
  lexicon: HALOT
  rationale: The jussive construction expresses intended result or command. 'So that there may be' captures the volitional/resultative force in readable English.
- source_word: עַל אֶרֶץ מִצְרַיִם
  chosen: over the land of Egypt
  alternatives:
  - upon the land of Egypt
  - over Egypt
  lexicon: HALOT
  rationale: Retains 'land' for אֶרֶץ, which is present in the Hebrew and situates the plague geographically.
- source_word: וְיָמֵשׁ חֹשֶׁךְ
  chosen: a darkness that can be felt
  alternatives:
  - and darkness will be felt
  - and one may feel the darkness
  - and darkness may be touched
  lexicon: HALOT
  rationale: The rare verb here is traditionally understood in context as referring to palpable darkness. The clause is rendered appositionally in English to avoid awkwardness while preserving the idea of tangible, oppressive darkness. Because the verb is difficult, alternatives are preserved in a footnote.
