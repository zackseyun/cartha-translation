id: EXO.10.25
reference: Exodus 10:25
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר מֹשֶׁ֔ה גַּם אַתָּ֛ה תִּתֵּ֥ן בְּ/יָדֵ֖/נוּ זְבָחִ֣ים וְ/עֹל֑וֹת וְ/עָשִׂ֖ינוּ לַ/יהוָ֥ה אֱלֹהֵֽי/נוּ־׃
translation:
  text: But Moses said, “You also must give into our hands sacrifices and burnt offerings, and we will offer them to Yahweh our God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''to Yahweh our God.'' The divine name is rendered ''the LORD'' in keeping with the project''s standard practice.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: But Moses said
  alternatives:
  - And Moses said
  - Then Moses said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'But' fits the adversative force in context, since Moses is responding to Pharaoh's restriction in the previous verse; this is more contextually precise than a bare 'and.'
- source_word: גַּם
  chosen: also
  alternatives:
  - even
  - indeed
  lexicon: HALOT
  rationale: 'גַּם adds emphasis: Pharaoh himself, not only Israel, must provide what is needed. ''Also'' preserves the additive force in natural English.'
- source_word: אַתָּה
  chosen: you
  alternatives:
  - you yourself
  lexicon: HALOT
  rationale: The independent pronoun is emphatic. English conveys this sufficiently with word order and the inclusion of 'also'; an overly explicit 'you yourself' would sound heavy here.
- source_word: תִּתֵּן
  chosen: must put
  alternatives:
  - must give
  - shall give
  lexicon: HALOT
  rationale: The verb נתן means 'give/put.' Because it is followed by 'into our hands,' 'put' is the most idiomatic collocation in English. 'Must' reflects the force of Moses' insistence in context better than a simple future.
- source_word: בְּיָדֵנוּ
  chosen: into our hands
  alternatives:
  - to us
  - in our hand
  lexicon: HALOT
  rationale: The Hebrew idiom is retained in a natural English form. 'Into our hands' preserves the concrete imagery of transfer better than the flattened 'to us.'
- source_word: זְבָחִים
  chosen: sacrifices
  alternatives:
  - slaughter offerings
  lexicon: HALOT
  rationale: זֶבַח broadly denotes sacrificial offerings, often involving slaughter. 'Sacrifices' is the clearest and most natural general rendering in this paired expression.
- source_word: וְעֹלֹת
  chosen: burnt offerings
  alternatives:
  - whole burnt offerings
  lexicon: HALOT
  rationale: עֹלָה is the standard term for an offering wholly burned on the altar. 'Burnt offerings' is the established and accurate rendering.
- source_word: וְעָשִׂינוּ
  chosen: we will offer
  alternatives:
  - we will make
  - we will perform
  lexicon: HALOT
  rationale: Literally 'we will do/make,' but in sacrificial context עשה commonly means to perform or offer a sacrifice. 'We will offer' communicates the cultic sense clearly in modern English.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition marks direction/recipient in the sacrificial act. Following the project's contested-terms policy, יְהוָה is rendered 'the LORD' rather than 'Yahweh' in the main text.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Straightforward construct with first person plural suffix; retained plainly.
