id: EXO.10.3
reference: Exodus 10:3
source:
  edition: WLC
  text: וַ/יָּבֹ֨א מֹשֶׁ֣ה וְ/אַהֲרֹן֮ אֶל פַּרְעֹה֒ וַ/יֹּאמְר֣וּ אֵלָ֗י/ו כֹּֽה אָמַ֤ר יְהוָה֙ אֱלֹהֵ֣י הָֽ/עִבְרִ֔ים עַד מָתַ֣י מֵאַ֔נְתָּ לֵ/עָנֹ֖ת מִ/פָּנָ֑/י שַׁלַּ֥ח עַמִּ֖/י וְ/יַֽעַבְדֻֽ/נִי־־־׃
translation:
  text: 'So Moses and Aaron went in to Pharaoh and said to him, “Thus says Yahweh, the God of the Hebrews: How long will you refuse to humble yourself before me? Let my people go, so that they may serve me.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'submit to me.' The Hebrew verb can carry the sense of being humbled or humbling oneself before God.
    reason: lexical_alternative
  - marker: b
    text: Or 'so that they may worship me.' The Hebrew verb also includes the sense of cultic service or worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: went in
  alternatives:
  - came
  - entered
  lexicon: HALOT
  rationale: The verb בוא with אֶל plus a person commonly means to go/come to or enter into someone's presence. In English narrative with Pharaoh as destination, 'went in to Pharaoh' is natural and preserves the court-setting nuance better than the flatter 'came to.'
- source_word: וַיֹּאמְרוּ אֵלָיו
  chosen: said to him
  alternatives:
  - told him
  - said
  lexicon: HALOT
  rationale: Standard speech introduction. 'Said to him' preserves the direct-address construction without adding interpretive force.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus said
  lexicon: HALOT
  rationale: Prophetic messenger formula; 'Thus says' is the established and accurate English equivalent in present force introducing the divine message.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי הָעִבְרִים
  chosen: the God of the Hebrews
  alternatives:
  - God of the Hebrews
  lexicon: HALOT
  rationale: Construct phrase identifying YHWH in relation to Israel as known in Egyptian context. 'Hebrews' is the plain ethnic designation here.
- source_word: עַד מָתַי
  chosen: How long
  alternatives:
  - Until when
  lexicon: HALOT
  rationale: Idiomatic temporal challenge formula. 'How long' is the natural English equivalent.
- source_word: מֵאַנְתָּ
  chosen: will you refuse
  alternatives:
  - have you refused
  - do you refuse
  lexicon: HALOT
  rationale: Though morphologically perfect, in this rebuke after repeated refusals the sense is durative/current. English future with 'How long will you refuse' best captures the idiom's forward-looking challenge.
- source_word: לֵעָנֹת
  chosen: to humble yourself
  alternatives:
  - to be humbled
  - to submit
  lexicon: HALOT
  rationale: ענה in the Niphal can mean 'be humbled/afflicted oneself.' In context of Pharaoh before God, the reflexive sense 'humble yourself' best conveys the demanded posture without reducing it merely to outward compliance. 'Submit' is possible but less lexically direct.
- source_word: מִפָּנַי
  chosen: before me
  alternatives:
  - before my face
  - in my presence
  lexicon: HALOT
  rationale: Literal 'from before me' in this construction after ענה functions idiomatically as 'before me' or 'in my presence.' 'Before me' is concise and natural.
- source_word: שַׁלַּח
  chosen: Let ... go
  alternatives:
  - Send away
  - Release
  lexicon: HALOT
  rationale: In the Exodus demand formula, 'Let my people go' is both accurate and contextually established. 'Release' is possible but less idiomatic for this repeated refrain.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Straightforward possessive phrase emphasizing covenant claim.
- source_word: וְיַעַבְדֻנִי
  chosen: so that they may serve me
  alternatives:
  - and they may serve me
  - that they may worship me
  lexicon: HALOT
  rationale: עבד denotes service, including cultic service/worship in this Exodus context. 'Serve me' preserves the broader lexical range and the repeated Exodus formula; 'worship me' is interpretive and narrower.
