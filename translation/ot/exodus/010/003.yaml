theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Meaning of וְיַעַבְדֻנִי in the Exodus demand formula
  chosen_reading: serve me
  alternative_readings:
  - worship me
  rationale: The Hebrew verb עבד can include worshipful/cultic service, but the broader term 'serve' better preserves the lexical range and avoids importing a narrower liturgical sense where the text itself uses the wider service language.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
