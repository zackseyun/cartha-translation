id: EXO.10.18
reference: Exodus 10:18
source:
  edition: WLC
  text: וַ/יֵּצֵ֖א מֵ/עִ֣ם פַּרְעֹ֑ה וַ/יֶּעְתַּ֖ר אֶל יְהוָֽה־׃
translation:
  text: So he went out from Pharaoh and pleaded with Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prayed earnestly to the LORD' or 'entreated the LORD.' The Hebrew verb conveys earnest supplication.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - departed
  - left
  lexicon: HALOT
  rationale: Qal wayyiqtol of יצא commonly denotes going out or departing. 'Went out' preserves the narrative sequence and concrete movement from Pharaoh's presence.
- source_word: מֵעִם
  chosen: from
  alternatives:
  - from the presence of
  - away from
  lexicon: HALOT
  rationale: The preposition with עִם literally conveys 'from with/from being with.' In English, 'from' naturally captures separation from Pharaoh; the fuller sense of leaving his presence is implicit.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  rationale: Standard English transliteration of the royal title/name.
- source_word: וַיֶּעְתַּר
  chosen: pleaded
  alternatives:
  - entreated
  - prayed earnestly
  - implored
  lexicon: HALOT
  rationale: עתר in this stem can denote making earnest supplication, often to God. 'Pleaded' communicates urgent intercession in clear modern English without becoming overly paraphrastic. Because the object is 'to the LORD,' the prayer sense is evident from context.
- source_word: אֶל
  chosen: with
  alternatives:
  - to
  lexicon: HALOT
  rationale: Although אֶל is literally 'to,' English idiom with 'pleaded' normally takes 'with.' This is an optimal-equivalence adjustment for natural English while preserving the direction of Moses' supplication toward the LORD.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
