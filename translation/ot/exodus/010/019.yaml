id: EXO.10.19
reference: Exodus 10:19
source:
  edition: WLC
  text: וַ/יַּהֲפֹ֨ךְ יְהוָ֤ה רֽוּחַ יָם֙ חָזָ֣ק מְאֹ֔ד וַ/יִּשָּׂא֙ אֶת הָ֣/אַרְבֶּ֔ה וַ/יִּתְקָעֵ֖/הוּ יָ֣מָּ/ה סּ֑וּף לֹ֤א נִשְׁאַר֙ אַרְבֶּ֣ה אֶחָ֔ד בְּ/כֹ֖ל גְּב֥וּל מִצְרָֽיִם־־׃
translation:
  text: And Yahweh turned a very strong west wind, and it carried away the locusts and drove them into the Sea of Reeds. Not one locust remained in all the territory of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Sea of Reeds''; traditionally rendered ''Red Sea.'''
    reason: alternative_reading
  - marker: b
    text: '''Sea wind'' may refer to a wind coming from the sea, that is, a west wind in this setting.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּהֲפֹךְ
  chosen: turned
  alternatives:
  - changed
  - shifted
  lexicon: HALOT
  rationale: The verb means to turn or change. In context of wind direction, 'turned' is the most natural and sufficiently formal rendering.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: רוּחַ יָם
  chosen: sea wind
  alternatives:
  - west wind
  - wind from the sea
  lexicon: HALOT
  rationale: Literally 'wind of the sea.' In Egyptian geography this likely denotes a wind coming from the Mediterranean, i.e., a west wind, but the Hebrew expression itself is 'sea wind.' To preserve source-language imagery without over-interpreting, 'sea wind' is used in the main text.
- source_word: חָזָק מְאֹד
  chosen: very strong
  alternatives:
  - exceedingly strong
  - extremely strong
  lexicon: HALOT
  rationale: A straightforward intensification; 'very strong' is natural modern English and adequately reflects the Hebrew adverbial force.
- source_word: וַיִּשָּׂא אֶת־הָאַרְבֶּה
  chosen: it carried away the locusts
  alternatives:
  - it lifted the locusts
  - it bore away the locusts
  lexicon: HALOT
  rationale: נשא commonly means lift, carry, or bear. With wind as subject and locusts as object, 'carried away' best captures the effect in idiomatic English.
- source_word: וַיִּתְקָעֵהוּ
  chosen: drove them
  alternatives:
  - thrust them
  - hurled them
  - fastened it
  lexicon: HALOT
  rationale: The verb תקע can mean thrust, drive, or force into. The suffix is singular in form but refers collectively to the locust swarm. 'Drove them' communicates the wind forcing the locusts into the sea in natural English.
- source_word: יָמָּה סּוּף
  chosen: into the Sea of Reeds
  alternatives:
  - into the Red Sea
  lexicon: HALOT
  rationale: The Hebrew name is Yam Suph, conventionally understood as 'Sea of Reeds.' Following original-language primacy, the main text avoids the traditional but less literal 'Red Sea,' while preserving it in a footnote as a familiar traditional rendering.
- source_word: לֹא נִשְׁאַר אַרְבֶּה אֶחָד
  chosen: Not one locust remained
  alternatives:
  - not a single locust was left
  - no locust remained, not even one
  lexicon: HALOT
  rationale: This renders the negated passive/remaining construction clearly and emphatically in English while preserving the singular 'one' for totality.
- source_word: בְּכֹל גְּבוּל מִצְרָיִם
  chosen: in all the territory of Egypt
  alternatives:
  - within all the border of Egypt
  - throughout all Egypt
  lexicon: HALOT
  rationale: גְּבוּל can mean border, territory, or region. Here it refers to the whole extent of the land under Egyptian domain, so 'territory of Egypt' is precise and natural.
