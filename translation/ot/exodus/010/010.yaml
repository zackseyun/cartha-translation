  - Jehovah
  rationale: Required by the doctrine's contested terms table for YHWH.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Preserving ambiguity in Pharaoh's final warning
