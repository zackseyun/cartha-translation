  alternative_readings:
  - for disaster is before you
  - for you have evil in mind
  rationale: The Hebrew permits more than one interpretive direction. The main text preserves the ambiguity rather than resolving it, in keeping with the translation philosophy.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
