id: EXO.10.10
reference: Exodus 10:10
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֲלֵ/הֶ֗ם יְהִ֨י כֵ֤ן יְהוָה֙ עִמָּ/כֶ֔ם כַּ/אֲשֶׁ֛ר אֲשַׁלַּ֥ח אֶתְ/כֶ֖ם וְ/אֶֽת טַפְּ/כֶ֑ם רְא֕וּ כִּ֥י רָעָ֖ה נֶ֥גֶד פְּנֵי/כֶֽם־׃
translation:
  text: And he said to them, “May Yahweh indeed be with you, if I ever send you and your little ones out! See, for evil is before your faces.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “The LORD be with you when I send you and your little ones,” likely spoken sarcastically.
    reason: alternative_reading
  - marker: b
    text: 'Hebrew is ambiguous: this may mean “disaster is before you” or “you have evil in view / in mind.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהִי כֵן יְהוָה עִמָּכֶם
  chosen: May the LORD indeed be with you
  alternatives:
  - So be the LORD with you
  - The LORD be with you
  lexicon: HALOT
  rationale: The jussive יְהִי with כֵן is idiomatic and likely sarcastic in Pharaoh's speech. 'May the LORD indeed be with you' preserves the optative force while allowing the irony to be heard in context. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: כַּאֲשֶׁר
  chosen: if ever
  alternatives:
  - when
  - just as
  lexicon: HALOT
  rationale: 'In this hostile context Pharaoh is not neutrally stating a future action but speaking conditionally or sarcastically: ''if I ever send you...'' This best fits the discourse sense.'
- source_word: אֲשַׁלַּח אֶתְכֶם וְאֶת טַפְּכֶם
  chosen: I send you and your little ones out
  alternatives:
  - I let you go, you and your children
  - I release you and your dependents
  lexicon: HALOT
  rationale: שׁלח in the Exodus narrative commonly means 'send/let go.' Adding 'out' makes the motion implicit in the context explicit in natural English. טַף refers to small children or little ones, not the whole household.
- source_word: טַפְּכֶם
  chosen: your little ones
  alternatives:
  - your children
  - your dependents
  lexicon: HALOT
  rationale: טַף often denotes little children specifically. 'Little ones' preserves the nuance better than the broader 'children.'
- source_word: רְאוּ
  chosen: Look out
  alternatives:
  - See
  - Take heed
  - Beware
  lexicon: HALOT
  rationale: Imperative of ראה here functions idiomatically as a warning, not merely visual perception. 'Look out' is concise modern English matching the threatening tone.
- source_word: כִּי רָעָה נֶגֶד פְּנֵיכֶם
  chosen: because evil is before you
  alternatives:
  - for disaster is before you
  - for you have evil in mind
  - for harm is in front of you
  lexicon: HALOT
  rationale: The Hebrew is terse and somewhat ambiguous. רָעָה can denote evil, harm, or disaster; נֶגֶד פְּנֵיכֶם literally 'before your faces.' The chosen rendering stays close to the wording and preserves the ambiguity of whether Pharaoh means danger awaits them or evil intent is evident in them.
