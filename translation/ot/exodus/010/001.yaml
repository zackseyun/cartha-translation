theological_decisions:
- issue: Divine hardening of Pharaoh's heart
  chosen_reading: I have hardened his heart
  alternative_readings:
  - I have made his heart heavy
  - I have made his heart stubborn
  rationale: The Hebrew idiom uses the Hiphil of כבד with 'heart.' The translation should preserve the text's direct attribution to the LORD without softening it, while noting the more literal 'made heavy' as a lexical alternative. This maintains theological tension rather than resolving debates about divine sovereignty and human responsibility beyond what the verse states.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
