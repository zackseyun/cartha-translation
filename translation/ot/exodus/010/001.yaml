id: EXO.10.1
reference: Exodus 10:1
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל מֹשֶׁ֔ה בֹּ֖א אֶל פַּרְעֹ֑ה כִּֽי אֲנִ֞י הִכְבַּ֤דְתִּי אֶת לִבּ/וֹ֙ וְ/אֶת לֵ֣ב עֲבָדָ֔י/ו לְמַ֗עַן שִׁתִ֛/י אֹתֹתַ֥/י אֵ֖לֶּה בְּ/קִרְבּֽ/וֹ־־־־־׃
translation:
  text: Then Yahweh said to Moses, "Go in to Pharaoh, because I have hardened his heart and the heart of his servants, so that I may set these signs of mine among them."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''I have made heavy his heart.'' The idiom means that the LORD hardened or made Pharaoh unresponsive.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally 'in his midst.' The sense may be Pharaoh specifically, or Pharaoh together with his servants/court.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural English narrative flow while preserving sequence.
- source_word: בֹּא אֶל־פַּרְעֹה
  chosen: Go in to Pharaoh
  alternatives:
  - Come to Pharaoh
  - Go to Pharaoh
  lexicon: HALOT
  rationale: בוא literally means 'come/go in.' In this confrontation setting, 'go in to Pharaoh' preserves the directional nuance better than the flatter 'go to Pharaoh.'
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - that
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the command. 'Because' is the clearest modern English equivalent.
- source_word: הִכְבַּדְתִּי
  chosen: have hardened
  alternatives:
  - have made heavy
  - have made stubborn
  lexicon: HALOT
  rationale: The Hiphil of כבד is literally 'make heavy,' especially of the heart. In this idiom it denotes dulling or hardening responsiveness. 'Have hardened' is the clearest idiomatic English rendering, while the more literal sense is worth preserving in a footnote.
- source_word: לִבּוֹ ... לֵב עֲבָדָיו
  chosen: his heart and the heart of his servants
  alternatives:
  - his mind and the mind of his servants
  lexicon: HALOT
  rationale: לֵב/לֵבָב in Hebrew commonly denotes the inner will/thought center. 'Heart' is the standard and theologically resonant English equivalent here.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his officials
  - his slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in Pharaoh's court this refers to his attendants or officials. 'Servants' is broad and natural; 'officials' is possible but somewhat interpretive.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the sake of
  lexicon: HALOT
  rationale: לְמַעַן marks purpose. 'So that' is natural modern English and preserves the purposive force.
- source_word: שִׁתִי
  chosen: I may place
  alternatives:
  - I may set
  - I may put
  lexicon: HALOT
  rationale: The verb שׂים means 'put/set/place.' 'Place' fits well with 'signs' in English without sounding wooden.
- source_word: אֹתֹתַי אֵלֶּה
  chosen: these signs of mine
  alternatives:
  - these my signs
  - these signs
  lexicon: HALOT
  rationale: The suffix plus demonstrative is most naturally rendered 'these signs of mine,' preserving both possession and deixis.
- source_word: בְּקִרְבּוֹ
  chosen: among them
  alternatives:
  - in his midst
  - among him
  - within him
  lexicon: HALOT
  rationale: The consonantal form points to singular 'in his midst,' likely referring to Pharaoh, but the immediately preceding plural 'his servants' broadens the sphere of the signs to Pharaoh's circle/court. 'Among them' communicates the contextual sense in idiomatic English, while the more literal singular should be preserved in a footnote.
