theological_decisions:
- issue: Divine action in Pharaoh’s hardening
  chosen_reading: But the LORD hardened Pharaoh’s heart
  alternative_readings:
  - But the LORD made Pharaoh’s heart firm
  - But the LORD strengthened Pharaoh’s heart
  rationale: The Hebrew explicitly attributes the action to the LORD in this verse, so the translation should not soften or evade divine agency. At the same time, 'hardened' preserves the canonical tension of the Exodus narrative without importing a fuller doctrinal explanation of human responsibility or predestination beyond the text itself.
  doctrine_reference: Preserve theological tension rather than resolve it; YHWH default rendering as 'the LORD'.
