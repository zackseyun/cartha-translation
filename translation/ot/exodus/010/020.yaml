id: EXO.10.20
reference: Exodus 10:20
source:
  edition: WLC
  text: וַ/יְחַזֵּ֥ק יְהוָ֖ה אֶת לֵ֣ב פַּרְעֹ֑ה וְ/לֹ֥א שִׁלַּ֖ח אֶת בְּנֵ֥י יִשְׂרָאֵֽל־־׃פ
translation:
  text: But Yahweh hardened Pharaoh’s heart, and he did not let the sons of Israel go.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'made Pharaoh’s heart firm' or 'strengthened Pharaoh’s heart'; the Hebrew verb literally means 'made strong/firm.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the Israelites' or traditionally 'the children of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחַזֵּק
  chosen: hardened
  alternatives:
  - strengthened
  - made firm
  lexicon: HALOT
  rationale: The verb חזק literally denotes making strong/firm, but in the repeated Exodus hardening formula the idiomatic sense in English is 'hardened.' This best captures the narrative-theological force of Pharaoh’s inner resistance becoming fixed, while remaining a standard rendering in this context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  - inner will
  lexicon: HALOT
  rationale: '''Heart'' is the natural and consistent rendering for לֵב, encompassing will, resolve, and inner disposition in Hebrew anthropology. It preserves the biblical idiom without reduction to a single psychological category.'
- source_word: פַּרְעֹה
  chosen: Pharaoh’s
  rationale: Standard English transliteration of the royal title/name. The possessive form is required by English syntax with 'heart.'
- source_word: שִׁלַּח
  chosen: did not let ... go
  alternatives:
  - did not send away
  - did not release
  lexicon: HALOT
  rationale: The verb שלח literally means 'send,' but in the Exodus context with Israel as the object, 'let ... go' is the most idiomatic and contextually precise English rendering, matching the liberation setting.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: A more formally transparent rendering is preferred here. 'Sons of Israel' preserves the Hebrew familial expression and aligns with the project's gender-accurate principle, while still being understandable in modern English. 'Israelites' is smoother but less explicit to the source wording.
