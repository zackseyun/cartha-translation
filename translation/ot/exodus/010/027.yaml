theological_decisions:
- issue: Divine hardening and human volition
  chosen_reading: 'Render both clauses straightforwardly: ''the LORD hardened Pharaoh’s heart, and he was not willing to let them go.'''
  alternative_readings:
  - '''the LORD made Pharaoh''s heart strong, so that he refused to let them go'''
  rationale: The Hebrew explicitly attributes the hardening to the LORD and then states Pharaoh's unwillingness. The translation preserves this theological tension rather than softening divine agency or collapsing Pharaoh's volition into a single explanatory clause.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
