id: EXO.10.27
reference: Exodus 10:27
source:
  edition: WLC
  text: וַ/יְחַזֵּ֥ק יְהוָ֖ה אֶת לֵ֣ב פַּרְעֹ֑ה וְ/לֹ֥א אָבָ֖ה לְ/שַׁלְּחָֽ/ם־׃
translation:
  text: But Yahweh hardened Pharaoh’s heart, and he was not willing to let them go.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'made Pharaoh’s heart firm/strong.' The Hebrew verb can mean 'strengthen' or 'make firm,' but in this context with 'heart' it carries the sense 'harden.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he refused to let them go.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחַזֵּק
  chosen: hardened
  alternatives:
  - strengthened
  - made firm
  lexicon: HALOT
  rationale: The verb חזק literally denotes making strong/firm, but in the repeated Exodus hardening formula with 'heart' it idiomatically conveys hardening or stiffening resolve. 'Hardened' is the clearest natural English rendering in this context and matches the narrative pattern without over-paraphrase.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  - inner will
  lexicon: HALOT
  rationale: '''Heart'' is the standard and sufficiently transparent rendering for לֵב, which in Hebrew anthropology includes will and disposition. Retaining ''heart'' preserves the biblical idiom.'
- source_word: פַּרְעֹה
  chosen: Pharaoh
  lexicon: HALOT
  rationale: Standard English transliteration of the royal title/name.
- source_word: לֹא אָבָה
  chosen: was not willing
  alternatives:
  - refused
  - was unwilling
  lexicon: HALOT
  rationale: אָבָה denotes willingness or consent. 'Was not willing' closely reflects the lexical sense, whereas 'refused' is slightly more interpretive though contextually valid. The chosen rendering preserves the nuance of volition.
- source_word: לְשַׁלְּחָם
  chosen: to let them go
  alternatives:
  - to send them away
  - to release them
  lexicon: HALOT
  rationale: שׁלח in this Exodus context commonly means letting the Israelites depart. 'Let them go' is idiomatic, accurate, and preserves the narrative refrain.
