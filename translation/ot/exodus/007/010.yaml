id: EXO.7.10
reference: Exodus 7:10
source:
  edition: WLC
  text: וַ/יָּבֹ֨א מֹשֶׁ֤ה וְ/אַהֲרֹן֙ אֶל פַּרְעֹ֔ה וַ/יַּ֣עַשׂוּ כֵ֔ן כַּ/אֲשֶׁ֖ר
    צִוָּ֣ה יְהוָ֑ה וַ/יַּשְׁלֵ֨ךְ אַהֲרֹ֜ן אֶת מַטֵּ֗/הוּ לִ/פְנֵ֥י פַרְעֹ֛ה וְ/לִ/פְנֵ֥י
    עֲבָדָ֖י/ו וַ/יְהִ֥י לְ/תַנִּֽין־־׃
translation:
  text: So Moses and Aaron went in to Pharaoh, and they did so, just as the LORD had
    commanded. Then Aaron threw down his staff before Pharaoh and before his servants,
    and it became a serpent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew tannin can also refer to a dragon-like creature or large reptile;
      here it likely denotes a serpent in this sign before Pharaoh.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: went in
  alternatives:
  - came
  - went
  lexicon: HALOT
  rationale: Though morphologically singular, the verb precedes the compound subject
    'Moses and Aaron' and functions collectively. 'Went in' fits the motion toward
    Pharaoh's presence and reads naturally in English.
- source_word: וַיַּעַשׂוּ כֵן
  chosen: they did so
  alternatives:
  - they did thus
  - they did accordingly
  lexicon: HALOT
  rationale: Idiomatic Hebrew for carrying out the command. 'They did so' is natural
    modern English while preserving the sense of exact obedience.
- source_word: כַּאֲשֶׁר צִוָּה
  chosen: just as ... had commanded
  alternatives:
  - as ... commanded
  - according to what ... commanded
  lexicon: HALOT
  rationale: The construction marks conformity to a prior command. 'Just as' slightly
    emphasizes exact correspondence, and the English pluperfect 'had commanded' reflects
    prior action relative to the narrative sequence.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the translation's stated policy.
- source_word: וַיַּשְׁלֵךְ
  chosen: threw down
  alternatives:
  - cast down
  - threw
  lexicon: HALOT
  rationale: The verb denotes throwing/casting. 'Threw down' suits the action of dropping
    the staff before Pharaoh in a demonstrative sign-act and is clear modern English.
- source_word: מַטֵּהוּ
  chosen: his staff
  alternatives:
  - his rod
  lexicon: HALOT
  rationale: '''Staff'' is more natural contemporary English than ''rod'' while preserving
    the object as Aaron''s hand-held staff used in signs.'
- source_word: לִפְנֵי ... וְלִפְנֵי
  chosen: before ... and before
  alternatives:
  - in the presence of ... and of
  - before ... and in front of
  lexicon: HALOT
  rationale: The repeated phrase is retained in translation to preserve the Hebrew
    emphasis that the act occurred publicly before both Pharaoh and his servants.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his officials
  - his attendants
  lexicon: HALOT
  rationale: The noun commonly means servants/slaves; in royal context it can denote
    court officials. 'Servants' preserves the lexical form and remains understandable,
    while the courtly nuance is not strong enough here to require 'officials' in the
    main text.
- source_word: וַיְהִי לְתַנִּין
  chosen: it became a serpent
  alternatives:
  - it became a dragon
  - it became a great reptile
  - it became a snake
  lexicon: HALOT
  rationale: תַנִּין can denote a serpent, sea creature, or dragon-like creature depending
    on context. In this immediate sign context involving a staff before Pharaoh, 'serpent'
    best fits the narrative and traditional understanding, while preserving the more
    specific and elevated sense over the generic 'snake'.
