theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This is a translation-policy decision rather than a contextual theological
    dispute in the verse itself.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering of תַנִּין
  chosen_reading: serpent
  alternative_readings:
  - dragon
  - snake
  - great reptile
  rationale: The term has a broader semantic range than a simple snake, but in Exodus
    7 the sign performed before Pharaoh is best represented in idiomatic English as
    'serpent.' Because the broader lexical range may matter for readers comparing
    passages, an alternative is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 and #5'
