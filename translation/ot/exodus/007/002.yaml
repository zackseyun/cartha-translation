id: EXO.7.2
reference: Exodus 7:2
source:
  edition: WLC
  text: אַתָּ֣ה תְדַבֵּ֔ר אֵ֖ת כָּל אֲשֶׁ֣ר אֲצַוֶּ֑/ךָּ וְ/אַהֲרֹ֤ן אָחִ֨י/ךָ֙ יְדַבֵּ֣ר
    אֶל פַּרְעֹ֔ה וְ/שִׁלַּ֥ח אֶת בְּנֵֽי יִשְׂרָאֵ֖ל מֵ/אַרְצֽ/וֹ־־־־׃
translation:
  text: You shall speak all that I command you, and Aaron your brother shall speak
    to Pharaoh, so that he will send the sons of Israel out from his land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or traditionally 'the children of Israel.' The Hebrew
      reads 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְדַבֵּר
  chosen: shall speak
  alternatives:
  - are to speak
  - must speak
  lexicon: HALOT
  rationale: Piel of דבר here gives the straightforward sense of speaking. 'Shall
    speak' preserves the directive force in elevated but still natural English and
    matches the parallel verb for Aaron.
- source_word: אֵת כָּל אֲשֶׁר אֲצַוֶּךָּ
  chosen: all that I command you
  alternatives:
  - everything that I command you
  - all that I will command you
  lexicon: HALOT
  rationale: The clause is comprehensive and direct. 'All that I command you' is concise
    and natural. Although the imperfect can in some contexts be future-oriented, in
    this commissioning context English present 'I command' works idiomatically for
    ongoing instruction.
- source_word: אַהֲרֹן אָחִיךָ
  chosen: Aaron your brother
  alternatives:
  - your brother Aaron
  lexicon: HALOT
  rationale: Both English orders are possible. 'Aaron your brother' follows the Hebrew
    sequence more closely while remaining natural.
- source_word: יְדַבֵּר אֶל פַּרְעֹה
  chosen: shall speak to Pharaoh
  alternatives:
  - shall speak with Pharaoh
  - shall tell Pharaoh
  lexicon: HALOT
  rationale: אֶל with דבר is well rendered 'speak to.' 'Tell Pharaoh' would over-specify
    the content as command rather than speech generally.
- source_word: וְשִׁלַּח
  chosen: so that he will send
  alternatives:
  - and he will send
  - that he may send
  - and let him send
  lexicon: HALOT
  rationale: The conjunction plus perfect here is best taken as the intended result
    of Aaron's speech to Pharaoh. 'So that he will send' makes the purpose/result
    relation explicit in idiomatic English. A simple coordinate 'and he will send'
    is possible but less clear in English.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' In keeping with gender-accurate
    translation and the project's preference not to flatten source texture unnecessarily,
    this is retained in the main text. 'The Israelites' is idiomatic but less formally
    transparent; 'children of Israel' is traditional but can suggest age rather than
    lineage in modern English.
- source_word: מֵאַרְצוֹ
  chosen: out from his land
  alternatives:
  - from his land
  - out of his land
  lexicon: HALOT
  rationale: The prefixed מִן marks movement away from Pharaoh's land. 'Out from his
    land' preserves the sense of departure while reading naturally in context.
