theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This preserves reverential convention without importing additional interpretation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  - the people of Israel
  rationale: The Hebrew is grammatically masculine plural in a familial construction.
    Per the translation philosophy, a gender-accurate rendering is preferred unless
    context demands otherwise. Here 'sons of Israel' best exposes the source form
    while remaining understandable.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
