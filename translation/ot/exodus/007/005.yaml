id: EXO.7.5
reference: Exodus 7:5
source:
  edition: WLC
  text: וְ/יָדְע֤וּ מִצְרַ֨יִם֙ כִּֽי אֲנִ֣י יְהוָ֔ה בִּ/נְטֹתִ֥/י אֶת יָדִ֖/י עַל
    מִצְרָ֑יִם וְ/הוֹצֵאתִ֥י אֶת בְּנֵֽי יִשְׂרָאֵ֖ל מִ/תּוֹכָֽ/ם־־־־־׃
translation:
  text: And the Egyptians will know that I am the LORD when I stretch out my hand
    against Egypt and bring the sons of Israel out from among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or 'the children of Israel.' The Hebrew reads 'the sons
      of Israel.'
    reason: lexical_alternative
  - marker: b
    text: The divine name is YHWH, traditionally rendered 'the LORD' in English translations.
    reason: alternative_reading
lexical_decisions:
- source_word: וְיָדְעוּ
  chosen: And ... will know
  alternatives:
  - and ... shall know
  - then ... will know
  lexicon: HALOT
  rationale: 'Qal perfect with prefixed conjunction in this predictive context is
    best rendered as a future: the Egyptians will come to know/recognize through the
    coming acts. ''Know'' is more direct than ''acknowledge'' and fits the covenant-revelatory
    formula.'
- source_word: מִצְרַיִם
  chosen: the Egyptians
  alternatives:
  - Egypt
  lexicon: HALOT
  rationale: Here the form refers to the people rather than the land, as shown by
    the plural sense with 'will know.' Thus 'the Egyptians' is preferable to 'Egypt'
    in English.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: 'Introduces the content of what the Egyptians will know: ''that I am
    the LORD.'''
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the pattern reflected in the
    Septuagint.
- source_word: בִּנְטֹתִי
  chosen: when I stretch out
  alternatives:
  - in stretching out
  - when I extend
  lexicon: HALOT
  rationale: 'The preposition ב with infinitive construct gives a temporal sense here:
    ''when I stretch out.'' ''Stretch out'' is the standard idiom for divine action/judgment
    involving the hand.'
- source_word: יָדִי
  chosen: my hand
  alternatives:
  - my power
  lexicon: HALOT
  rationale: Retains the concrete anthropomorphic image present in the Hebrew. Although
    it implies power, the text explicitly says 'hand,' and the idiom is transparent
    in English.
- source_word: עַל מִצְרָיִם
  chosen: against Egypt
  alternatives:
  - upon Egypt
  - over Egypt
  lexicon: HALOT
  rationale: In this judgment context, עַל is best rendered 'against,' conveying hostile
    divine action more naturally than the more literal 'upon.' Here מִצְרָיִם refers
    to the land/nation as the object of judgment.
- source_word: וְהוֹצֵאתִי
  chosen: and bring
  alternatives:
  - and I will bring out
  - and lead out
  lexicon: HALOT
  rationale: With the preceding temporal clause, English idiom prefers 'when I stretch
    out ... and bring ... out.' 'Bring' preserves the causative sense of יצא in Hiphil
    without overcomplicating the sentence.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Gender-accurate rendering preserves the Hebrew familial expression and
    aligns with the project's stated preference. 'Israelites' is possible but less
    transparent to the source wording.
- source_word: מִתּוֹכָם
  chosen: out from among them
  alternatives:
  - from their midst
  - out of the midst of them
  lexicon: HALOT
  rationale: Conveys separation from the Egyptians in natural English while preserving
    the sense of removal from their midst.
