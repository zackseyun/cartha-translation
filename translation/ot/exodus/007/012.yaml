id: EXO.7.12
reference: Exodus 7:12
source:
  edition: WLC
  text: וַ/יַּשְׁלִ֨יכוּ֙ אִ֣ישׁ מַטֵּ֔/הוּ וַ/יִּהְי֖וּ לְ/תַנִּינִ֑ם וַ/יִּבְלַ֥ע
    מַטֵּֽה אַהֲרֹ֖ן אֶת מַטֹּתָֽ/ם־־׃
translation:
  text: And each man threw down his staff, and they became serpents; but Aaron’s staff
    swallowed up their staffs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dragons' or 'great reptiles'; the Hebrew tannin can denote a serpent-like
      creature more broadly than the usual word for 'snake.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁלִיכוּ
  chosen: threw down
  alternatives:
  - cast down
  - threw
  lexicon: HALOT
  rationale: The verb שׁלך in this narrative context denotes throwing or casting an
    object down before someone. 'Threw down' is natural modern English and preserves
    the downward motion implied by the scene.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - every man
  lexicon: HALOT
  rationale: אִישׁ distributively with the following singular suffix means each individual
    person acted with his own staff. 'Each man' preserves the distributive force and
    the masculine singular form.
- source_word: מַטֵּהוּ / מַטֵּה / מַטֹּתָם
  chosen: staff / staff / staffs
  alternatives:
  - rod / rod / rods
  lexicon: HALOT
  rationale: מַטֶּה can mean 'staff' or 'rod.' 'Staff' fits the narrative object carried
    by magicians and by Aaron, and is more idiomatic in contemporary English while
    remaining concrete. The singular/plural distinctions are preserved.
- source_word: וַיִּהְיוּ
  chosen: they became
  alternatives:
  - they turned into
  - they came to be
  lexicon: HALOT
  rationale: The verb היה here marks transformation/result. 'They became' is a straightforward
    rendering that avoids over-paraphrase while clearly conveying the change.
- source_word: לְתַנִּינִם
  chosen: serpents
  alternatives:
  - sea monsters
  - dragons
  - great snakes
  lexicon: HALOT
  rationale: תַּנִּין has a broad semantic range including serpent, dragon, or sea
    creature depending on context. In the Exodus sign narrative, the immediate context
    of staffs becoming dangerous reptilian creatures supports 'serpents' as the clearest
    contextual rendering in English. Because 'tanin' is broader than the more common
    word for snake, an alternative is preserved in a footnote.
- source_word: וַיִּבְלַע
  chosen: swallowed up
  alternatives:
  - swallowed
  - engulfed
  lexicon: HALOT
  rationale: בלע means to swallow or engulf. 'Swallowed up' is idiomatic English in
    narrative and conveys complete consumption.
- source_word: אֶת
  chosen: '[direct object marker not translated]'
  lexicon: HALOT
  rationale: אֶת marks the definite direct object in Hebrew and has no direct English
    equivalent, so it is represented syntactically rather than lexically.
