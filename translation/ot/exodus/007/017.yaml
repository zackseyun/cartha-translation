id: EXO.7.17
reference: Exodus 7:17
source:
  edition: WLC
  text: כֹּ֚ה אָמַ֣ר יְהוָ֔ה בְּ/זֹ֣את תֵּדַ֔ע כִּ֖י אֲנִ֣י יְהוָ֑ה הִנֵּ֨ה אָנֹכִ֜י מַכֶּ֣ה בַּ/מַּטֶּ֣ה אֲשֶׁר בְּ/יָדִ֗/י עַל הַ/מַּ֛יִם אֲשֶׁ֥ר בַּ/יְאֹ֖ר וְ/נֶהֶפְכ֥וּ לְ/דָֽם׀־־׃
translation:
  text: 'Thus says Yahweh: By this you will know that I am Yahweh: behold, I am striking the water that is in the Nile with the staff that is in my hand, and it will be turned to blood.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the waters ... and they will be turned to blood.'' English smooths the plural ''waters'' to the mass noun ''water.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  - So says the LORD
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the formal force of the Hebrew idiom while remaining natural English. יְהוָה is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּזֹאת
  chosen: By this
  alternatives:
  - In this
  - By means of this
  lexicon: HALOT
  rationale: Instrumental beth is best represented by 'by this,' referring to the sign/plague as the means by which Pharaoh will know.
- source_word: תֵּדַע
  chosen: you will know
  alternatives:
  - you shall know
  - you are to know
  lexicon: HALOT
  rationale: Imperfect with future force in context. 'You will know' is clear modern English and preserves the predictive force.
- source_word: כִּי אֲנִי יְהוָה
  chosen: that I am the LORD
  alternatives:
  - that I am Yahweh
  lexicon: HALOT
  rationale: Retains the covenantal self-identification central to the plague narrative. 'the LORD' follows project convention for the divine name.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: HALOT
  rationale: Marks dramatic immediacy and solemn announcement. 'Behold' is slightly elevated but still readable and suits the gravity of the declaration.
- source_word: אָנֹכִי מַכֶּה
  chosen: I am striking
  alternatives:
  - I will strike
  - I am about to strike
  lexicon: HALOT
  rationale: The participle מַכֶּה with independent pronoun conveys imminent, vivid action. 'I am striking' preserves the present-progressive vividness better than a simple future, while the following result clause carries the consequence.
- source_word: בַּמַּטֶּה אֲשֶׁר בְּיָדִי
  chosen: with the staff that is in my hand
  alternatives:
  - with the rod that is in my hand
  - by the staff in my hand
  lexicon: HALOT
  rationale: מַטֶּה can be 'staff' or 'rod'; 'staff' is more natural contemporary English here. The relative clause is retained to reflect the Hebrew emphasis on the instrument in Moses' hand.
- source_word: עַל הַמַּיִם
  chosen: the water
  alternatives:
  - against the waters
  - upon the water
  lexicon: HALOT
  rationale: Although עַל often means 'upon/against,' in this striking context English idiom prefers direct object-like phrasing with 'the water' after 'striking.' This avoids awkwardness while preserving sense.
- source_word: אֲשֶׁר בַּיְאֹר
  chosen: that is in the Nile
  alternatives:
  - that is in the river
  - that is in the Nile River
  lexicon: HALOT
  rationale: יְאֹר in Exodus commonly refers specifically to the Nile. Rendering it 'the Nile' gives the plain referent rather than the more generic 'river.'
- source_word: וְנֶהֶפְכוּ לְדָם
  chosen: and it will be turned to blood
  alternatives:
  - and it will become blood
  - and they will be turned to blood
  lexicon: HALOT
  rationale: 'The verb is passive/resultative. Although the Hebrew verb is plural agreeing with ''waters,'' English naturally treats ''water'' as a mass noun with singular agreement: ''it will be turned to blood.'' ''Turned to blood'' preserves the transformation language.'
