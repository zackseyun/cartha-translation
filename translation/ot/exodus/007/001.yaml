theological_decisions:
- issue: How to render Moses as אֱלֹהִים in relation to Pharaoh
  chosen_reading: like God
  alternative_readings:
  - God
  - a god
  rationale: The verse assigns Moses a representative role of divine authority in the confrontation with Pharaoh, not deity by nature. 'Like God' preserves orthodox theological boundaries and fits the immediate context, where Aaron functions as Moses' 'prophet,' paralleling God-prophet structure without implying Moses is literally divine.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
