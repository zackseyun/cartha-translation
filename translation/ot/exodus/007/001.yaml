id: EXO.7.1
reference: Exodus 7:1
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל מֹשֶׁ֔ה רְאֵ֛ה נְתַתִּ֥י/ךָ אֱלֹהִ֖ים לְ/פַרְעֹ֑ה וְ/אַהֲרֹ֥ן אָחִ֖י/ךָ יִהְיֶ֥ה נְבִיאֶֽ/ךָ־׃
translation:
  text: Then Yahweh said to Moses, “See, I have made you God to Pharaoh, and Aaron your brother will be your prophet.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “I have made you God to Pharaoh.” The Hebrew presents Moses in a God-like representative role before Pharaoh, with Aaron as his prophet.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural modern English while preserving sequential force.
- source_word: רְאֵה
  chosen: See
  alternatives:
  - Look
  - Take note
  lexicon: HALOT
  rationale: An imperative drawing Moses' attention to what follows. 'See' is concise and idiomatic in direct speech.
- source_word: נְתַתִּיךָ
  chosen: I have made you
  alternatives:
  - I have given you
  - I have appointed you
  lexicon: HALOT
  rationale: 'Although the verb is literally ''I have given you,'' the complement ''God to Pharaoh'' makes idiomatic English require a resultative sense: ''made'' or ''appointed.'' ''Made'' best preserves the force without awkwardness.'
- source_word: אֱלֹהִים
  chosen: like God
  alternatives:
  - God
  - a god
  - godlike
  lexicon: HALOT
  rationale: Here אֱלֹהִים is predicative of Moses in relation to Pharaoh, indicating representative divine authority rather than identity with God. Rendering it simply 'God' could misleadingly suggest ontological deification; 'like God' communicates the comparative functional sense in context while remaining faithful to the Hebrew idea.
- source_word: לְפַרְעֹה
  chosen: to Pharaoh
  alternatives:
  - for Pharaoh
  - before Pharaoh
  lexicon: HALOT
  rationale: The preposition marks relation/reference. 'To Pharaoh' is the most direct and natural rendering in English here.
- source_word: נְבִיאֶךָ
  chosen: your prophet
  alternatives:
  - your spokesman
  - your mouthpiece
  lexicon: HALOT
  rationale: The Hebrew noun is the standard term for 'prophet.' Since the verse itself establishes Aaron's prophetic role relative to Moses, the literal term should be retained rather than reduced to an explanatory paraphrase.
- source_word: יִהְיֶה
  chosen: will be
  alternatives:
  - shall be
  lexicon: HALOT
  rationale: Simple future sense in contemporary English.
