id: EXO.7.22
reference: Exodus 7:22
source:
  edition: WLC
  text: וַ/יַּֽעֲשׂוּ כֵ֛ן חַרְטֻמֵּ֥י מִצְרַ֖יִם בְּ/לָטֵי/הֶ֑ם וַ/יֶּחֱזַ֤ק לֵב
    פַּרְעֹה֙ וְ/לֹא שָׁמַ֣ע אֲלֵ/הֶ֔ם כַּ/אֲשֶׁ֖ר דִּבֶּ֥ר יְהוָֽה־־־׃
translation:
  text: But the magicians of Egypt did the same by their secret arts, and Pharaoh’s
    heart was hardened, and he did not listen to them, just as the LORD had spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with their enchantments' or 'by their occult arts.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Pharaoh’s heart became hard.' The Hebrew does not explicitly state the
      agent of the hardening in this verse.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעֲשׂוּ כֵן
  chosen: did the same
  alternatives:
  - did so
  - did likewise
  lexicon: HALOT
  rationale: The idiom literally means 'and they did thus/so.' 'Did the same' is natural
    modern English and clearly links the magicians' action to the preceding sign.
- source_word: חַרְטֻמֵּי מִצְרַיִם
  chosen: the magicians of Egypt
  alternatives:
  - the Egyptian magicians
  - the scribes/diviners of Egypt
  lexicon: HALOT
  rationale: חַרְטֻמִּים in Exodus refers to Pharaoh's ritual specialists who imitate
    signs. 'Magicians' is the clearest contextual rendering in English.
- source_word: בְּלָטֵיהֶם
  chosen: by their secret arts
  alternatives:
  - with their enchantments
  - by their occult arts
  - with their magic arts
  lexicon: HALOT
  rationale: לָטִים denotes secret or concealed magical practices. 'By their secret
    arts' preserves both the instrumental sense of בְּ and the idea of hidden magical
    technique without over-specifying the method.
- source_word: וַיֶּחֱזַק לֵב פַּרְעֹה
  chosen: Pharaoh’s heart was hardened
  alternatives:
  - Pharaoh's heart became hard
  - Pharaoh hardened his heart
  - Pharaoh's heart grew firm
  lexicon: HALOT
  rationale: The Hebrew uses חזק with 'heart' in an intransitive/resultative way here,
    not explicitly naming God as subject. 'Was hardened' communicates the resulting
    state while preserving the text's lack of explicit agency and the broader hardening
    motif.
- source_word: וְלֹא שָׁמַע אֲלֵהֶם
  chosen: he did not listen to them
  alternatives:
  - he did not heed them
  - he did not obey them
  lexicon: HALOT
  rationale: שׁמע with אֶל commonly means 'listen to/heed.' 'Listen to them' is straightforward;
    'heed' is possible but slightly less natural for the target audience. 'Them' refers
    to Moses and Aaron in context.
- source_word: כַּאֲשֶׁר דִּבֶּר יְהוָה
  chosen: just as the LORD had spoken
  alternatives:
  - as the LORD had said
  - just as the LORD said
  lexicon: HALOT
  rationale: This formula points back to the LORD's prior declaration. 'Had spoken'
    reflects the prior action relative to the narrative and follows the project's
    default rendering of יְהוָה as 'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering for the divine name is
    'the LORD,' following established reverential convention and the Septuagintal
    pattern.
