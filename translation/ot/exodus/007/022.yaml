theological_decisions:
- issue: Agency in Pharaoh's hardening
  chosen_reading: Render the clause as a state/result ('Pharaoh’s heart was hardened')
    without specifying an external agent.
  alternative_readings:
  - Render actively as 'Pharaoh hardened his heart'
  - Render intransitively as 'Pharaoh's heart became hard'
  rationale: This verse does not explicitly state that God hardened Pharaoh's heart,
    nor does it explicitly say Pharaoh hardened it himself. The translation preserves
    that textual tension rather than importing a theological conclusion from nearby
    passages.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
