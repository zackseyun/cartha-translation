id: EXO.7.29
reference: Exodus 7:29
source:
  edition: WLC
  text: וּ/בְ/כָ֥ה וּֽ/בְ/עַמְּ/ךָ֖ וּ/בְ/כָל עֲבָדֶ֑י/ךָ יַעֲל֖וּ הַֽ/צְפַרְדְּעִֽים־׃
translation:
  text: The frogs will come up on you, on your people, and on all your servants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among your people' in the second phrase; the Hebrew preposition is the
      same throughout, but the context favors the sense of the frogs coming upon Pharaoh
      and his realm as an affliction.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּךָ
  chosen: on you
  alternatives:
  - against you
  - upon you
  - in you
  lexicon: HALOT
  rationale: The preposition בְּ with the verb עָלָה in this plague context conveys
    hostile encroachment affecting Pharaoh personally. 'On you' is idiomatic modern
    English and fits the repeated pattern of the plague reaching persons and households.
    'In you' would be unnatural here.
- source_word: בְּעַמְּךָ
  chosen: on your people
  alternatives:
  - among your people
  - against your people
  lexicon: HALOT
  rationale: The same preposition is repeated for parallelism. 'On your people' preserves
    the sense of the frogs coming upon them, matching the first phrase. 'Among your
    people' is possible but weakens the force of affliction.
- source_word: בְּכָל עֲבָדֶיךָ
  chosen: on all your servants
  alternatives:
  - on all your officials
  - on all your slaves
  lexicon: HALOT
  rationale: עֶבֶד often means servant, slave, or court official depending on context.
    Here Pharaoh's attendants/courtiers are in view within a royal address, so 'servants'
    is the broadest and most natural rendering. 'Officials' is interpretive; 'slaves'
    over-specifies bonded status in a court setting not emphasized by the verse.
- source_word: יַעֲלוּ
  chosen: will come up
  alternatives:
  - will go up
  - will rise up
  lexicon: HALOT
  rationale: The verb עָלָה literally means 'go up/ascend,' but with frogs emerging
    from the Nile/plague setting, 'come up' is the most natural English expression
    from the hearer's perspective while retaining the upward movement.
- source_word: הַצְּפַרְדְּעִים
  chosen: the frogs
  alternatives:
  - frogs
  lexicon: HALOT
  rationale: The definite article is present in Hebrew. English may omit it in generic
    reference, but 'the frogs' preserves the specificity of the announced plague as
    a known swarm.
