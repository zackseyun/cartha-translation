id: EXO.7.16
reference: Exodus 7:16
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֣ אֵלָ֗י/ו יְהוָ֞ה אֱלֹהֵ֤י הָ/עִבְרִים֙ שְׁלָחַ֤/נִי אֵלֶ֨י/ךָ֙
    לֵ/אמֹ֔ר שַׁלַּח֙ אֶת עַמִּ֔/י וְ/יַֽעַבְדֻ֖/נִי בַּ/מִּדְבָּ֑ר וְ/הִנֵּ֥ה לֹא
    שָׁמַ֖עְתָּ עַד כֹּֽה־־־׃
translation:
  text: 'And you shall say to him, ‘The LORD, the God of the Hebrews, has sent me
    to you, saying: Let my people go, so that they may serve me in the wilderness.
    But look, until now you have not listened.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'worship me in the wilderness.' The Hebrew verb can refer to service
      generally or to worship in a religious sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD,' following
    Jewish reverence tradition and the Septuagintal pattern.
- source_word: אֱלֹהֵי הָעִבְרִים
  chosen: the God of the Hebrews
  alternatives:
  - God of the Hebrews
  lexicon: HALOT
  rationale: Construct phrase identifying YHWH in relation to the Hebrews/Israelites.
    'Hebrews' preserves the ethnic designation עִבְרִים used in the source rather
    than smoothing to 'Israelites.'
- source_word: שְׁלָחַנִי
  chosen: has sent me
  alternatives:
  - sent me
  lexicon: HALOT
  rationale: The qatal form in reported speech naturally renders as English present
    perfect here, indicating a completed commissioning with present relevance.
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - unto you
  lexicon: HALOT
  rationale: Standard directional preposition; 'to you' is clear modern English.
- source_word: לֵאמֹר
  chosen: 'saying:'
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Introduces the content of the message. 'Saying' is idiomatic and preserves
    the discourse structure.
- source_word: שַׁלַּח אֶת־עַמִּי
  chosen: Let my people go
  alternatives:
  - Send out my people
  - Release my people
  lexicon: HALOT
  rationale: Imperative of שלח in this Exodus context is conventionally and accurately
    rendered 'Let ... go,' conveying demanded release without unnecessary paraphrase.
- source_word: וְיַעַבְדֻנִי
  chosen: so that they may serve me
  alternatives:
  - and they may serve me
  - that they may worship me
  lexicon: HALOT
  rationale: The prefixed verb expresses purpose/result after the imperative. 'Serve
    me' preserves the broader sense of עבד, which can include worship but is not limited
    to cultic worship.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness land; 'wilderness' fits biblical
    usage and avoids over-specifying arid desert terrain.
- source_word: וְהִנֵּה
  chosen: But look
  alternatives:
  - And behold
  - Behold
  - And see
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention to the present situation.
    'But look' preserves the confrontational force in readable modern English; 'but'
    also reflects the adversative sense in context.
- source_word: לֹא שָׁמַעְתָּ
  chosen: you have not listened
  alternatives:
  - you have not obeyed
  - you did not listen
  lexicon: HALOT
  rationale: שׁמע can mean hear/listen/obey. Here Pharaoh has heard the demand but
    failed to heed it, so 'listened' best captures the sense without over-interpreting
    as explicit obedience language.
- source_word: עַד כֹּה
  chosen: until now
  alternatives:
  - until this point
  - so far
  lexicon: HALOT
  rationale: Idiomatic temporal expression meaning up to the present moment.
