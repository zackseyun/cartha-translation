theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's doctrinal and translation guidelines explicitly set 'the
    LORD' as the default rendering for YHWH. No contextual factor here requires deviation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Meaning of וְיַעַבְדֻנִי in Exodus demand formula
  chosen_reading: serve me
  alternative_readings:
  - worship me
  rationale: The Hebrew עבד can denote service broadly, including cultic service.
    In Exodus this demand includes worship but also covenantal service more broadly,
    so 'serve me' preserves the theological breadth rather than narrowing it to liturgical
    worship alone.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
