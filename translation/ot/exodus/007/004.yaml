id: EXO.7.4
reference: Exodus 7:4
source:
  edition: WLC
  text: וְ/לֹֽא יִשְׁמַ֤ע אֲלֵ/כֶם֙ פַּרְעֹ֔ה וְ/נָתַתִּ֥י אֶת יָדִ֖/י בְּ/מִצְרָ֑יִם
    וְ/הוֹצֵאתִ֨י אֶת צִבְאֹתַ֜/י אֶת עַמִּ֤/י בְנֵֽי יִשְׂרָאֵל֙ מֵ/אֶ֣רֶץ מִצְרַ֔יִם
    בִּ/שְׁפָטִ֖ים גְּדֹלִֽים־־־־־׃
translation:
  text: Pharaoh will not listen to you, and I will lay my hand on Egypt and bring
    out my divisions—my people, the sons of Israel—from the land of Egypt with great
    judgments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my hosts' or 'my armies.' The Hebrew term can denote organized companies,
      often with military associations.
    reason: lexical_alternative
  - marker: b
    text: Or 'my people, the Israelites.' Literally, 'my people, the sons of Israel.'
    reason: lexical_alternative
  - marker: c
    text: Or 'by great acts of judgment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׁמַע אֲלֵכֶם
  chosen: will not listen to you
  alternatives:
  - will not hear you
  - will not obey you
  lexicon: HALOT
  rationale: שׁמע with אֶל commonly means 'listen to' or 'heed.' 'Listen to you' preserves
    the immediate sense without over-interpreting it as obedience, though refusal
    to heed is implied in context.
- source_word: וְנָתַתִּי אֶת יָדִי בְּמִצְרַיִם
  chosen: I will lay my hand on Egypt
  alternatives:
  - I will stretch out my hand against Egypt
  - I will put my hand on Egypt
  lexicon: HALOT
  rationale: The idiom 'put/give my hand' in judgment contexts signifies decisive
    divine action. 'Lay my hand on' is natural English and preserves the force of
    intervention without importing the fuller idiom 'stretch out' absent from this
    verse.
- source_word: צִבְאֹתַי
  chosen: my divisions
  alternatives:
  - my hosts
  - my armies
  lexicon: HALOT
  rationale: צָבָא can denote army, host, or organized company. Here it refers to
    Israel as Yahweh's ordered companies departing Egypt. 'Divisions' conveys organized
    groups without implying a purely military force as strongly as 'armies,' while
    remaining more concrete than 'hosts.'
- source_word: עַמִּי בְנֵי יִשְׂרָאֵל
  chosen: my people, the sons of Israel
  alternatives:
  - my people, the Israelites
  - my people, the children of Israel
  lexicon: HALOT
  rationale: 'The appositional structure is preserved: ''my people'' further identified
    as ''the sons of Israel.'' ''Sons of Israel'' is more formally aligned with בְנֵי
    יִשְׂרָאֵל and follows the project''s gender-accurate principle, while remaining
    understandable in context.'
- source_word: בִּשְׁפָטִים גְּדֹלִים
  chosen: with great judgments
  alternatives:
  - by great acts of judgment
  - with mighty judgments
  lexicon: HALOT
  rationale: שְׁפָטִים here refers to judicial acts executed by God against Egypt.
    'Great judgments' is a direct rendering that preserves both the legal/judicial
    nuance and the plural form.
