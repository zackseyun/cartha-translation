theological_decisions:
- issue: Rendering Israel's designation as צִבְאֹתַי
  chosen_reading: my divisions
  alternative_readings:
  - my hosts
  - my armies
  rationale: The verse depicts Israel as Yahweh's organized companies being brought
    out under divine authority. A less militarized rendering avoids overstating the
    image while preserving the ordered, corporate sense. This is a lexical-theological
    choice because 'armies' may suggest a stronger martial emphasis than the immediate
    context requires.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Gender rendering of בְנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: Per the doctrine's gender-accurate principle, the masculine plural familial
    term is retained rather than neutralized. The phrase is a standard covenantal
    ethnonym, and a more idiomatic alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §4
