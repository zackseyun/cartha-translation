id: EXO.7.8
reference: Exodus 7:8
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוָ֔ה אֶל מֹשֶׁ֥ה וְ/אֶֽל אַהֲרֹ֖ן לֵ/אמֹֽר־־׃
translation:
  text: Then Yahweh said to Moses and to Aaron,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “And the LORD said to Moses and to Aaron.” The Hebrew also includes the speech-introducing formula “saying,” which is often left implicit in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  - said
  lexicon: HALOT
  rationale: The waw-consecutive imperfect of אמר advances the narrative. 'Then ... said' captures the sequential force in natural English better than a bare 'and said,' while remaining close to the Hebrew.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks the indirect object of speech. 'To' is the natural modern English equivalent.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: וְאֶל
  chosen: and to
  alternatives:
  - and
  lexicon: HALOT
  rationale: The repeated preposition before Aaron is explicit in Hebrew and is preserved in English as 'and to Aaron' rather than collapsing both objects into 'to Moses and Aaron.' This keeps the source structure visible.
- source_word: אַהֲרֹן
  chosen: Aaron
  rationale: Standard English transliteration of the personal name.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - as follows
  lexicon: HALOT
  rationale: The infinitive construct לֵאמֹר introduces the following direct speech. Although often omitted in smoother English, it is retained here as 'saying' because the verse ends with the speech-introduction formula and the next verse supplies the content.
