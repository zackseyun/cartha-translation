id: EXO.7.18
reference: Exodus 7:18
source:
  edition: WLC
  text: וְ/הַ/דָּגָ֧ה אֲשֶׁר בַּ/יְאֹ֛ר תָּמ֖וּת וּ/בָאַ֣שׁ הַ/יְאֹ֑ר וְ/נִלְא֣וּ
    מִצְרַ֔יִם לִ/שְׁתּ֥וֹת מַ֖יִם מִן הַ/יְאֹֽר־־׃ס
translation:
  text: And the fish that are in the Nile will die, and the Nile will stink, and the
    Egyptians will be unable to drink water from the Nile.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the river''; in context this refers specifically to the Nile.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the Egyptians will grow weary trying to drink water from the Nile.'
      The Hebrew verb can carry the sense of becoming exhausted or unable through
      weariness.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדָּגָה
  chosen: the fish
  alternatives:
  - the fish stock
  - the aquatic life
  lexicon: HALOT
  rationale: Refers collectively to the fish in the river. 'The fish' is the most
    natural collective rendering in English and fits the singular Hebrew collective
    noun.
- source_word: יְאֹר
  chosen: the Nile
  alternatives:
  - the river
  lexicon: HALOT
  rationale: In Exodus, יְאֹר commonly refers specifically to the Nile, not merely
    any river. Using 'the Nile' makes the referent explicit for English readers and
    reflects contextual specificity.
- source_word: תָּמוּת
  chosen: will die
  alternatives:
  - will perish
  lexicon: HALOT
  rationale: Straightforward future sense of מות. 'Will die' is the plain and direct
    English equivalent.
- source_word: וּבָאַשׁ
  chosen: will stink
  alternatives:
  - will become foul
  - will reek
  lexicon: HALOT
  rationale: The verb באש denotes becoming foul-smelling or stinking. 'Will stink'
    is vivid, natural, and closely reflects the Hebrew without unnecessary softening.
- source_word: וְנִלְאוּ
  chosen: will be unable
  alternatives:
  - will be weary of trying
  - will struggle
  lexicon: HALOT
  rationale: From לאה in the Niphal, conveying weariness/exhaustion leading to inability.
    In this context, the sense is practical incapacity to drink because of the river's
    condition. 'Will be unable' communicates the result clearly in idiomatic English.
- source_word: לִשְׁתּוֹת מַיִם
  chosen: to drink water
  alternatives:
  - to drink
  lexicon: HALOT
  rationale: The infinitive plus object is explicit in Hebrew. Retaining 'water' preserves
    the full wording and the emphasis on the loss of potable water.
- source_word: מִן הַיְאֹר
  chosen: from the Nile
  alternatives:
  - out of the Nile
  lexicon: HALOT
  rationale: Standard English prepositional rendering. 'From the Nile' is natural
    and precise.
