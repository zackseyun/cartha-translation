id: EXO.7.15
reference: Exodus 7:15
source:
  edition: WLC
  text: לֵ֣ךְ אֶל פַּרְעֹ֞ה בַּ/בֹּ֗קֶר הִנֵּה֙ יֹצֵ֣א הַ/מַּ֔יְמָ/ה וְ/נִצַּבְתָּ֥
    לִ/קְרָאת֖/וֹ עַל שְׂפַ֣ת הַ/יְאֹ֑ר וְ/הַ/מַּטֶּ֛ה אֲשֶׁר נֶהְפַּ֥ךְ לְ/נָחָ֖שׁ
    תִּקַּ֥ח בְּ/יָדֶֽ/ךָ־־־׃
translation:
  text: Go to Pharaoh in the morning. Look, he is going out to the water, and you
    shall stand to meet him on the bank of the Nile, and you shall take in your hand
    the staff that was turned into a snake.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the river.' The Hebrew יְאֹר in Exodus commonly refers specifically
      to the Nile.
    reason: lexical_alternative
  - marker: b
    text: Or 'serpent.' The Hebrew נָחָשׁ can be rendered 'snake' or 'serpent'; 'snake'
      is used here for natural modern English.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Go yourself
  - Walk
  lexicon: HALOT
  rationale: Qal imperative 2ms of הלך gives a direct command. 'Go' is the natural
    concise English imperative.
- source_word: אֶל פַּרְעֹה
  chosen: to Pharaoh
  alternatives:
  - toward Pharaoh
  lexicon: HALOT
  rationale: אֶל marks direction toward a person. 'To Pharaoh' is idiomatic and sufficiently
    precise.
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - in the morning time
  - at morning
  lexicon: HALOT
  rationale: Temporal prepositional phrase; 'in the morning' is standard modern English.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה draws attention to what follows. 'Look' preserves the deictic
    force in readable modern English better than archaic 'Behold.'
- source_word: יֹצֵא הַמַּיְמָה
  chosen: he is going out to the water
  alternatives:
  - he goes out to the water
  - he is going out toward the water
  lexicon: HALOT
  rationale: The participle יֹצֵא conveys an action in progress or characteristic
    action. The directional ending on הַמַּיְמָה indicates motion toward the water.
    'He is going out to the water' captures both naturally.
- source_word: וְנִצַּבְתָּ
  chosen: you shall stand
  alternatives:
  - you must station yourself
  - you shall take your stand
  lexicon: HALOT
  rationale: Nifal here has the sense of taking one's position. 'You shall stand'
    is clear and keeps the command sequence without overinterpreting military nuance.
- source_word: לִקְרָאתוֹ
  chosen: to meet him
  alternatives:
  - before him
  - in order to meet him
  lexicon: HALOT
  rationale: The phrase commonly means meeting or confronting someone. 'To meet him'
    is the most straightforward rendering.
- source_word: עַל שְׂפַת הַיְאֹר
  chosen: on the bank of the Nile
  alternatives:
  - at the edge of the Nile
  - on the shore of the Nile
  lexicon: HALOT
  rationale: שָׂפָה here means edge/bank. יְאֹר in Exodus refers specifically to the
    Nile rather than a generic river or canal. 'Bank of the Nile' is both accurate
    and natural.
- source_word: וְהַמַּטֶּה
  chosen: the staff
  alternatives:
  - the rod
  lexicon: HALOT
  rationale: מַטֶּה can be 'staff' or 'rod.' 'Staff' is more natural in contemporary
    English and fits the narrative object Moses carries.
- source_word: אֲשֶׁר נֶהְפַּךְ לְנָחָשׁ
  chosen: that was turned into a snake
  alternatives:
  - that was changed into a serpent
  - which became a snake
  lexicon: HALOT
  rationale: The passive/reflexive sense of נהפך is best represented by 'was turned.'
    נָחָשׁ is the ordinary Hebrew word for snake/serpent; 'snake' is more accessible
    modern English, while 'serpent' remains a viable literary alternative.
- source_word: תִּקַּח בְּיָדֶךָ
  chosen: you shall take in your hand
  alternatives:
  - take in your hand
  - you shall carry in your hand
  lexicon: HALOT
  rationale: The imperfect in this command sequence functions injunctively. Retaining
    'in your hand' preserves the concrete Hebrew expression rather than reducing it
    to simply 'take.'
