theological_decisions:
- issue: Rendering of יְאֹר
  chosen_reading: the Nile
  alternative_readings:
  - the river
  rationale: In Exodus, יְאֹר is an Egyptian loanword used for the Nile and its setting.
    Rendering it as 'the Nile' gives the specific historical referent rather than
    a generic 'river.' This is a lexical-historical decision, not a doctrinal one,
    but it affects narrative clarity.
