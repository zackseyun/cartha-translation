theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for YHWH and does not introduce
    a doctrinally loaded variance in this verse.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Interpretation of וּבָעֵצִים וּבָאֲבָנִים
  chosen_reading: metonymy for wooden and stone containers holding water
  alternative_readings:
  - literal wood and stone
  - wood and stone vessels
  rationale: The immediate context concerns all water sources and collections in Egypt.
    Reading the materials as shorthand for containers best fits the plague's scope
    and avoids implying that non-water substances themselves became blood. Because
    the Hebrew is elliptical, the more literal alternative is preserved in a footnote.
