id: EXO.7.19
reference: Exodus 7:19
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל מֹשֶׁ֗ה אֱמֹ֣ר אֶֽל אַהֲרֹ֡ן קַ֣ח מַטְּ/ךָ֣ וּ/נְטֵֽה
    יָדְ/ךָ֩ עַל מֵימֵ֨י מִצְרַ֜יִם עַֽל נַהֲרֹתָ֣/ם עַל יְאֹרֵי/הֶ֣ם וְ/עַל אַגְמֵי/הֶ֗ם
    וְ/עַ֛ל כָּל מִקְוֵ֥ה מֵימֵי/הֶ֖ם וְ/יִֽהְיוּ דָ֑ם וְ/הָ֤יָה דָם֙ בְּ/כָל אֶ֣רֶץ
    מִצְרַ֔יִם וּ/בָ/עֵצִ֖ים וּ/בָ/אֲבָנִֽים־־־־־׀־־־־־׃
translation:
  text: Then the LORD said to Moses, “Say to Aaron, ‘Take your staff and stretch out
    your hand over the waters of Egypt—over their rivers, over their canals, over
    their ponds, and over every pool of their waters—that they may become blood. And
    there will be blood throughout all the land of Egypt, even in wooden and stone
    vessels.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, “and in the wood and in the stone,” likely referring
      to wooden and stone vessels or containers.
    reason: lexical_alternative
  - marker: b
    text: Or 'even in the wood and in the stone containers.'.
    reason: previous_rendering
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: אֱמֹר
  chosen: Say
  alternatives:
  - Speak
  lexicon: HALOT
  rationale: Imperative of אמר introducing direct speech; 'Say' is natural modern
    English and fits the command to relay words to Aaron.
- source_word: מַטְּךָ
  chosen: your staff
  alternatives:
  - your rod
  lexicon: HALOT
  rationale: מַטֶּה commonly denotes a staff/rod. 'Staff' is more readable modern
    English while preserving the concrete instrument in Moses/Aaron narratives.
- source_word: וּנְטֵה יָדְךָ
  chosen: stretch out your hand
  alternatives:
  - extend your hand
  lexicon: HALOT
  rationale: This idiom regularly introduces a symbolic act of power or judgment.
    'Stretch out your hand' is both idiomatic and close to the Hebrew.
- source_word: מֵימֵי מִצְרַיִם
  chosen: the waters of Egypt
  alternatives:
  - Egypt's waters
  lexicon: HALOT
  rationale: Construct phrase best rendered straightforwardly; the following prepositional
    phrases unpack the categories of those waters.
- source_word: נַהֲרֹתָם
  chosen: their rivers
  alternatives:
  - their streams
  lexicon: HALOT
  rationale: נָהָר is a broad term for river/stream. 'Rivers' fits the large-scale
    water system in view and distinguishes this term from the more specifically Egyptian
    יְאֹרִים.
- source_word: יְאֹרֵיהֶם
  chosen: their Nile canals
  alternatives:
  - their canals
  - their Nile branches
  lexicon: HALOT
  rationale: יְאֹר in Exodus commonly refers to Nile-related waterways rather than
    generic rivers. Rendering it 'Nile canals' preserves the Egyptian setting and
    distinguishes it from נַהֲרוֹת.
- source_word: אַגְמֵיהֶם
  chosen: their ponds
  alternatives:
  - their marshes
  - their pools
  lexicon: HALOT
  rationale: אָגַם denotes marshy or pooled waters. 'Ponds' is concise and readable;
    'marshes' is possible, but the list here moves through types of contained waters,
    so 'ponds' fits well.
- source_word: כָּל מִקְוֵה מֵימֵיהֶם
  chosen: every collection of their waters
  alternatives:
  - every pool of their water
  - every reservoir of their waters
  lexicon: HALOT
  rationale: מִקְוֶה denotes a gathered body/collection of water. 'Every collection
    of their waters' preserves the comprehensiveness of the phrase without over-specifying
    an artificial reservoir.
- source_word: וְיִהְיוּ דָם
  chosen: that they may become blood
  alternatives:
  - and they will become blood
  - that they shall become blood
  lexicon: HALOT
  rationale: The prefixed verb after the chain of imperatives expresses intended result.
    'That they may become blood' captures the command's purpose in natural English.
- source_word: וְהָיָה דָם בְּכָל אֶרֶץ מִצְרַיִם
  chosen: And there will be blood throughout all the land of Egypt
  alternatives:
  - And blood will be in all the land of Egypt
  lexicon: HALOT
  rationale: This clause states the resulting condition. 'Throughout all the land
    of Egypt' conveys the distributive force of בְּכָל in idiomatic English.
- source_word: וּבָעֵצִים וּבָאֲבָנִים
  chosen: even in the wood and in the stone containers
  alternatives:
  - and in the wood and in the stone
  - even in wooden and stone vessels
  lexicon: HALOT
  rationale: The bare nouns 'wood' and 'stone' likely stand metonymically for vessels
    or containers made of those materials, as recognized by many interpreters and
    ancient versions. Supplying 'containers' makes the sense explicit in English while
    retaining the material contrast. 'Even' brings out the surprising extension of
    the plague to stored water as well as natural sources.
