id: EXO.7.21
reference: Exodus 7:21
source:
  edition: WLC
  text: וְ/הַ/דָּגָ֨ה אֲשֶׁר בַּ/יְאֹ֥ר מֵ֨תָה֙ וַ/יִּבְאַ֣שׁ הַ/יְאֹ֔ר וְ/לֹא יָכְל֣וּ
    מִצְרַ֔יִם לִ/שְׁתּ֥וֹת מַ֖יִם מִן הַ/יְאֹ֑ר וַ/יְהִ֥י הַ/דָּ֖ם בְּ/כָל אֶ֥רֶץ
    מִצְרָֽיִם־־־־׃
translation:
  text: And the fish in the Nile died, and the Nile stank, so that the Egyptians could
    not drink water from the Nile. And there was blood throughout all the land of
    Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew יְאֹר is literally 'river,' but in Exodus it refers specifically
      to the Nile.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדָּגָה
  chosen: the fish
  alternatives:
  - the fish stock
  - the aquatic life
  lexicon: HALOT
  rationale: Refers collectively to the fish in the river. 'The fish' is natural English
    and preserves the collective sense without over-specifying.
- source_word: יְאֹר
  chosen: the Nile
  alternatives:
  - the river
  lexicon: HALOT
  rationale: In Exodus, יְאֹר commonly refers specifically to the Nile. Rendering
    it as 'the Nile' communicates the referent clearly in English better than the
    generic 'river.'
- source_word: מֵתָה
  chosen: died
  alternatives:
  - were dead
  lexicon: HALOT
  rationale: Simple past best reflects the verbal form and narrative sequence.
- source_word: וַיִּבְאַשׁ
  chosen: stank
  alternatives:
  - became foul
  - smelled bad
  lexicon: HALOT
  rationale: The verb denotes becoming foul or emitting a bad odor. 'Stank' is vivid,
    idiomatic, and suitably forceful for the plague narrative.
- source_word: וְלֹא יָכְלוּ
  chosen: could not
  alternatives:
  - were not able to
  lexicon: HALOT
  rationale: Standard idiomatic rendering of inability in English.
- source_word: לִשְׁתּוֹת מַיִם מִן הַיְאֹר
  chosen: drink water from the Nile
  alternatives:
  - drink from the Nile
  - drink the water of the Nile
  lexicon: HALOT
  rationale: Keeps both the act ('drink') and the object ('water') explicit, matching
    the Hebrew wording while remaining natural English.
- source_word: וַיְהִי הַדָּם
  chosen: there was blood
  alternatives:
  - the blood was
  - blood came to be
  lexicon: HALOT
  rationale: Existential 'there was' is the most natural way to render ויהי here in
    English narrative.
- source_word: בְּכָל אֶרֶץ מִצְרַיִם
  chosen: throughout all the land of Egypt
  alternatives:
  - in all the land of Egypt
  - through the whole land of Egypt
  lexicon: HALOT
  rationale: Conveys the distributive force of בכל with clear modern English. 'Throughout
    all the land of Egypt' emphasizes the plague's extent.
