id: EXO.7.13
reference: Exodus 7:13
source:
  edition: WLC
  text: וַ/יֶּחֱזַק֙ לֵ֣ב פַּרְעֹ֔ה וְ/לֹ֥א שָׁמַ֖ע אֲלֵ/הֶ֑ם כַּ/אֲשֶׁ֖ר דִּבֶּ֥ר
    יְהוָֽה׃פ
translation:
  text: But Pharaoh's heart was hardened, and he did not listen to them, just as the
    LORD had spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Pharaoh's heart grew hard.' The Hebrew verb can be rendered more literally
      as 'became strong/firm,' here in the sense of hardening.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּחֱזַק
  chosen: was hardened
  alternatives:
  - grew hard
  - was strong
  - became hard
  lexicon: HALOT
  rationale: The verb חזק in this context describes the hardening/strengthening of
    Pharaoh's heart. English idiom and the broader Exodus hardening motif favor 'was
    hardened' over the more wooden 'was strong.' Although the Hebrew form is active/intransitive
    rather than an explicit passive with stated agent, 'was hardened' best communicates
    the resultant state in natural English without over-specifying agency beyond the
    context.
- source_word: לֵב
  chosen: heart
  lexicon: HALOT
  rationale: Standard rendering for לֵב, referring to the inner will/mind in Hebrew
    anthropology as well as the figurative 'heart.'
- source_word: פַּרְעֹה
  chosen: Pharaoh
  rationale: Standard English transliteration of the royal title/name.
- source_word: שָׁמַע אֲלֵהֶם
  chosen: did not listen to them
  alternatives:
  - did not heed them
  - did not hear them
  lexicon: HALOT
  rationale: שׁמע with אֶל commonly means to listen to or heed someone. 'Did not listen
    to them' is clear modern English; 'heed' is possible but less common.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Introduces correspondence with what follows; 'just as' clearly marks
    fulfillment of prior divine speech.
- source_word: דִּבֶּר
  chosen: had spoken
  alternatives:
  - spoke
  - said
  lexicon: HALOT
  rationale: English past perfect fits the narrative sequence, indicating that the
    LORD's word had been spoken previously and is now being fulfilled.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible convention.
