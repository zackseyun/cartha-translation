theological_decisions:
- issue: Agency in Pharaoh's hardening
  chosen_reading: Render the clause as a state/result ('Pharaoh's heart was hardened')
    without explicitly naming God as the direct agent in this verse.
  alternative_readings:
  - Pharaoh's heart grew hard
  - Pharaoh hardened his heart
  rationale: This verse's Hebrew wording states that Pharaoh's heart became/was strong-hard
    without an explicit subject-agent distinction that would warrant importing a stronger
    theological claim than the text itself makes here. The translation preserves the
    Exodus tension across passages where Pharaoh hardens his heart and where God hardens
    it, rather than resolving that tension in this verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
