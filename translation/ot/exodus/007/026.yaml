theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH. This preserves established reverential convention without obscuring that
    the covenant God is speaking.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: Meaning of וְיַעַבְדֻנִי in relation to Israel's purpose
  chosen_reading: serve me
  alternative_readings:
  - worship me
  rationale: The Hebrew עבד in relation to God can denote service that includes worship,
    but the broader term 'serve' better preserves the lexical range and avoids narrowing
    the text to cultic worship alone. This also preserves the theological theme of
    Israel being transferred from Pharaoh's service to the LORD's service.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
