id: EXO.7.26
reference: Exodus 7:26
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל מֹשֶׁ֔ה בֹּ֖א אֶל פַּרְעֹ֑ה וְ/אָמַרְתָּ֣ אֵלָ֗י/ו
    כֹּ֚ה אָמַ֣ר יְהוָ֔ה שַׁלַּ֥ח אֶת עַמִּ֖/י וְ/יַֽעַבְדֻֽ/נִי־־־׃
translation:
  text: 'And the LORD said to Moses, “Go in to Pharaoh and say to him, ‘Thus says
    the LORD: Let my people go, so that they may serve me.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “that they may worship me.” The Hebrew verb can denote service rendered
      to God, including worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name YHWH as
    'the LORD,' following Jewish reverence tradition and the Septuagint pattern.
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive imperfect advances the narrative. 'And ... said'
    preserves the Hebrew narrative flow without unnecessary paraphrase.
- source_word: בֹּא אֶל־פַּרְעֹה
  chosen: Go in to Pharaoh
  alternatives:
  - Go to Pharaoh
  - Come to Pharaoh
  lexicon: HALOT
  rationale: בוא literally means 'come/go/enter' depending on viewpoint. With אֶל־פַּרְעֹה
    in this court-setting context, 'Go in to Pharaoh' best reflects the sense of entering
    his presence and matches the force of the command.
- source_word: וְאָמַרְתָּ אֵלָיו
  chosen: and say to him
  alternatives:
  - and you shall say to him
  lexicon: HALOT
  rationale: This is a straightforward sequential command. 'And say to him' is natural
    modern English while preserving the imperative force.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: This is the standard prophetic messenger formula. 'Thus says the LORD'
    preserves its formal and authoritative tone.
- source_word: שַׁלַּח
  chosen: Let ... go
  alternatives:
  - Send out
  - Release
  lexicon: HALOT
  rationale: In the idiom שַׁלַּח אֶת־עַמִּי, 'Let my people go' is both lexically
    sound and contextually precise, expressing demanded release rather than mere physical
    sending.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: The suffix marks first person singular possession. 'My people' preserves
    the covenantal claim embedded in the phrase.
- source_word: וְיַעַבְדֻנִי
  chosen: so that they may serve me
  alternatives:
  - and they may serve me
  - that they may worship me
  lexicon: HALOT
  rationale: The prefixed verb expresses purpose/result after the release command.
    'So that they may serve me' captures the likely purposive sense. עבד can include
    worshipful service to God, but 'serve' is broader and more directly lexical here;
    'worship me' is interpretive and therefore kept as an alternative rather than
    the main text.
