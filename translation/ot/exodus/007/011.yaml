id: EXO.7.11
reference: Exodus 7:11
source:
  edition: WLC
  text: וַ/יִּקְרָא֙ גַּם פַּרְעֹ֔ה לַֽ/חֲכָמִ֖ים וְ/לַֽ/מְכַשְּׁפִ֑ים וַ/יַּֽעֲשׂ֨וּ
    גַם הֵ֜ם חַרְטֻמֵּ֥י מִצְרַ֛יִם בְּ/לַהֲטֵי/הֶ֖ם כֵּֽן־־׃
translation:
  text: Then Pharaoh also called for the wise men and the sorcerers, and they too—the
    magicians of Egypt—did the same by their secret arts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with their enchantments.' The Hebrew term may denote occult arts or
      enchantments; the exact nuance is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called for
  alternatives:
  - called
  - summoned
  lexicon: HALOT
  rationale: The verb קרא in this context denotes summoning persons into one's presence.
    'Called for' is idiomatic English that conveys the directive sense better than
    the flatter 'called.'
- source_word: גַּם
  chosen: also
  alternatives:
  - too
  lexicon: HALOT
  rationale: The first גַּם modifies Pharaoh's action in response to the preceding
    event, so 'also' naturally marks that he in turn acted.
- source_word: חֲכָמִים
  chosen: wise men
  alternatives:
  - wise ones
  - sages
  lexicon: HALOT
  rationale: The plural adjective/noun refers to court experts or learned men. 'Wise
    men' is the most natural and recognizable rendering in this narrative setting.
- source_word: מְכַשְּׁפִים
  chosen: sorcerers
  alternatives:
  - magicians
  - spell-casters
  lexicon: HALOT
  rationale: The term from כשׁף refers specifically to practitioners of sorcery, distinct
    from the later term חַרְטֻמִּים. Rendering it 'sorcerers' preserves that distinction.
- source_word: וַיַּעֲשׂוּ
  chosen: did
  alternatives:
  - made
  - performed
  lexicon: HALOT
  rationale: With כֵּן ('so/the same'), עשה is best rendered idiomatically as 'did
    the same' rather than the more wooden 'made so.'
- source_word: גַם הֵם
  chosen: they too
  alternatives:
  - they also
  - even they
  lexicon: HALOT
  rationale: This combination emphasizes that Pharaoh's experts likewise replicated
    the sign. 'They too' is concise and preserves the emphasis.
- source_word: חַרְטֻמֵּי מִצְרַיִם
  chosen: the magicians of Egypt
  alternatives:
  - the Egyptian magicians
  - the scribal priests of Egypt
  lexicon: HALOT
  rationale: חַרְטֻמִּים is the standard term in Exodus for Pharaoh's ritual specialists.
    'Magicians' is the clearest contextual rendering in English, while 'of Egypt'
    preserves the construct relation.
- source_word: בְּלַהֲטֵיהֶם
  chosen: by their secret arts
  alternatives:
  - with their enchantments
  - by their occult arts
  - with their flames
  lexicon: HALOT
  rationale: The noun לַהַט in this context refers to the means by which the magicians
    performed their imitation, traditionally understood as occult or secret arts.
    'By their secret arts' is readable modern English and avoids overcommitting to
    a narrower technique. The more literal possibility related to 'flames' does not
    fit the narrative context as well.
- source_word: כֵּן
  chosen: the same
  alternatives:
  - so
  - thus
  lexicon: HALOT
  rationale: Here כֵּן points back to the preceding sign and indicates imitation.
    'The same' makes the referent explicit in natural English.
