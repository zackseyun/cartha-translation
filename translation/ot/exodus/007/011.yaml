theological_decisions:
- issue: Nature of the Egyptian practitioners' power
  chosen_reading: Use phenomenological language ('did the same by their secret arts')
    without specifying whether the act was demonic power, illusion, or trickery.
  alternative_readings:
  - They performed real supernatural signs
  - They used mere sleight of hand or deception
  rationale: The Hebrew states that Pharaoh's specialists replicated the act by their
    לַהֲטִים/secret arts but does not explain the metaphysical mechanism. The translation
    should preserve the narrative claim without importing a doctrinal explanation
    the text itself does not make.
  doctrine_reference: Translation philosophy §1, §3
