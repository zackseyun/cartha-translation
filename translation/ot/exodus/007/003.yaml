theological_decisions:
- issue: Divine action in Pharaoh's hardening
  chosen_reading: I will harden Pharaoh’s heart
  alternative_readings:
  - I will make Pharaoh’s heart stubborn
  - I will allow Pharaoh’s heart to become hard
  rationale: The Hebrew Hiphil presents God's active role straightforwardly. To preserve
    theological tension rather than resolve it, the main text keeps the direct causative
    wording and does not soften it to mere permission. A lexical alternative such
    as 'make stubborn' is possible, but permissive paraphrases go beyond the plain
    sense of the form here.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
