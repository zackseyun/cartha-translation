id: EXO.7.3
reference: Exodus 7:3
source:
  edition: WLC
  text: וַ/אֲנִ֥י אַקְשֶׁ֖ה אֶת לֵ֣ב פַּרְעֹ֑ה וְ/הִרְבֵּיתִ֧י אֶת אֹתֹתַ֛/י וְ/אֶת
    מוֹפְתַ֖/י בְּ/אֶ֥רֶץ מִצְרָֽיִם־־־׃
translation:
  text: But I will harden Pharaoh’s heart, and I will multiply my signs and my wonders
    in the land of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'make Pharaoh’s heart hard' or 'make Pharaoh’s heart stubborn.' The Hebrew
      verb is causative and presents the hardening directly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: But I
  alternatives:
  - And I
  - As for me, I
  lexicon: HALOT
  rationale: The conjunction with the explicit pronoun marks contrast or emphasis
    in context after the preceding commission. 'But I' captures the adversative/emphatic
    force more naturally in English than a simple 'And I.'
- source_word: אַקְשֶׁה
  chosen: will harden
  alternatives:
  - will make hard
  - will make stubborn
  lexicon: HALOT
  rationale: Hiphil of קשׁה means to make hard/harden. 'Will harden' is the standard
    concise English equivalent and best matches the idiom with 'heart' without paraphrasing
    away the causative force.
- source_word: לֵב פַּרְעֹה
  chosen: Pharaoh’s heart
  alternatives:
  - the heart of Pharaoh
  lexicon: HALOT
  rationale: Construct phrase rendered in natural English possessive form. 'Heart'
    in Hebrew denotes the inner will/mind, but the idiom should be preserved rather
    than interpreted in the main text.
- source_word: וְהִרְבֵּיתִי
  chosen: and I will multiply
  alternatives:
  - and I will increase
  - and I will make many
  lexicon: HALOT
  rationale: Hiphil/perfect with vav in this context carries future sense in sequence.
    'Multiply' preserves the lexical link to רבה and fits the object 'signs and wonders'
    well.
- source_word: אֹתֹתַי
  chosen: my signs
  alternatives:
  - my tokens
  lexicon: HALOT
  rationale: אוֹת commonly means 'sign.' This is the most transparent and established
    rendering in contexts of divine acts signifying God's power and message.
- source_word: מוֹפְתַי
  chosen: my wonders
  alternatives:
  - my marvels
  - my portents
  lexicon: HALOT
  rationale: מוֹפֵת can denote wonder or portent. 'Wonders' pairs naturally with 'signs'
    in English and preserves the miraculous sense without over-specifying omen/portent.
- source_word: בְּאֶרֶץ מִצְרָיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'land,' so the translation retains it
    for formal completeness while remaining natural English.
