id: EXO.7.7
reference: Exodus 7:7
source:
  edition: WLC
  text: וּ/מֹשֶׁה֙ בֶּן שְׁמֹנִ֣ים שָׁנָ֔ה וְ/אַֽהֲרֹ֔ן בֶּן שָׁלֹ֥שׁ וּ/שְׁמֹנִ֖ים
    שָׁנָ֑ה בְּ/דַבְּרָ֖/ם אֶל פַּרְעֹֽה־־־׃פ
translation:
  text: Now Moses was eighty years old, and Aaron was eighty-three years old, when
    they spoke to Pharaoh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And Moses was a son of eighty years, and Aaron a son
      of three and eighty years, when they spoke to Pharaoh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן ... שָׁנָה
  chosen: was ... years old
  alternatives:
  - son of ... years
  lexicon: HALOT
  rationale: The Hebrew age idiom literally uses 'son of' with a number of years;
    idiomatic English requires 'was ... years old.'
- source_word: שְׁמֹנִים שָׁנָה
  chosen: eighty years old
  alternatives:
  - eighty years
  lexicon: HALOT
  rationale: Standard cardinal-number expression for age; rendered idiomatically in
    English.
- source_word: שָׁלֹשׁ וּשְׁמֹנִים שָׁנָה
  chosen: eighty-three years old
  alternatives:
  - three and eighty years old
  lexicon: HALOT
  rationale: Hebrew gives 'three and eighty'; modern English normally reverses the
    order to 'eighty-three.'
- source_word: בְּדַבְּרָם
  chosen: when they spoke
  alternatives:
  - in their speaking
  - as they spoke
  lexicon: HALOT
  rationale: 'The prefixed ב with infinitive construct plus pronominal suffix is temporal
    here, indicating the time circumstance: ''when they spoke.'''
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: In this context of speech directed at a person, 'to' is the natural English
    equivalent.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  lexicon: HALOT
  rationale: Standard English transliteration of the royal title/name.
- source_word: וּ
  chosen: Now
  alternatives:
  - And
  lexicon: HALOT
  rationale: Clause-initial waw here functions smoothly as a discourse connector.
    'Now' gives natural English narrative flow while preserving continuity.
