id: EXO.7.24
reference: Exodus 7:24
source:
  edition: WLC
  text: וַ/יַּחְפְּר֧וּ כָל מִצְרַ֛יִם סְבִיבֹ֥ת הַ/יְאֹ֖ר מַ֣יִם לִ/שְׁתּ֑וֹת כִּ֣י
    לֹ֤א יָֽכְלוּ֙ לִ/שְׁתֹּ֔ת מִ/מֵּימֵ֖י הַ/יְאֹֽר־׃
translation:
  text: And all the Egyptians dug around the Nile for water to drink, because they
    could not drink from the water of the Nile.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the river' (ye'or); in Exodus this term refers specifically to the
      Nile.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחְפְּרוּ
  chosen: dug
  alternatives:
  - dug wells
  - excavated
  lexicon: HALOT
  rationale: The verb חפר means to dig or excavate. 'Dug' is the most direct and natural
    rendering. 'Dug wells' is more interpretive than the Hebrew, which does not explicitly
    mention wells, only the act of digging for water.
- source_word: כָל מִצְרַיִם
  chosen: all the Egyptians
  alternatives:
  - all Egypt
  lexicon: HALOT
  rationale: Although the phrase can sometimes function collectively, in context it
    refers to the people of Egypt responding to the plague, so 'all the Egyptians'
    best captures the sense in idiomatic English.
- source_word: סְבִיבֹת הַיְאֹר
  chosen: around the Nile
  alternatives:
  - around the river
  - all around the Nile
  lexicon: HALOT
  rationale: סביבות means surroundings or areas around. 'Around the Nile' is concise
    and clear. The noun יְאֹר in Exodus commonly refers specifically to the Nile,
    not merely any river, so the proper name is preferable.
- source_word: הַיְאֹר
  chosen: the Nile
  alternatives:
  - the river
  lexicon: HALOT
  rationale: In the Exodus plague narrative, יְאֹר refers to the Nile. Rendering it
    as 'the Nile' communicates the historical referent more clearly than the generic
    'the river.'
- source_word: מַיִם לִשְׁתּוֹת
  chosen: for water to drink
  alternatives:
  - for drinking water
  - water to drink
  lexicon: HALOT
  rationale: The Hebrew sequence is literally 'water to drink.' 'For water to drink'
    preserves the purpose nuance of the infinitive while remaining natural English.
    'For drinking water' is possible but slightly more idiomatic than the source structure.
- source_word: כִּי לֹא יָכְלוּ
  chosen: because they could not
  alternatives:
  - for they were not able to
  - since they could not
  lexicon: HALOT
  rationale: כִּי here gives the reason for the digging. 'Because they could not'
    is straightforward modern English.
- source_word: לִשְׁתֹּת מִמֵּימֵי הַיְאֹר
  chosen: drink from the water of the Nile
  alternatives:
  - drink from the Nile's water
  - drink of the waters of the Nile
  lexicon: HALOT
  rationale: 'מִן marks source: they could not drink from the Nile''s water. ''The
    water of the Nile'' is clear and preserves the possessive relationship without
    sounding archaic.'
