id: EXO.7.9
reference: Exodus 7:9
source:
  edition: WLC
  text: כִּי֩ יְדַבֵּ֨ר אֲלֵ/כֶ֤ם פַּרְעֹה֙ לֵ/אמֹ֔ר תְּנ֥וּ לָ/כֶ֖ם מוֹפֵ֑ת וְ/אָמַרְתָּ֣
    אֶֽל אַהֲרֹ֗ן קַ֧ח אֶֽת מַטְּ/ךָ֛ וְ/הַשְׁלֵ֥ךְ לִ/פְנֵֽי פַרְעֹ֖ה יְהִ֥י לְ/תַנִּֽין־־־׃
translation:
  text: When Pharaoh speaks to you, saying, ‘Produce a sign for yourselves,’ then
    you shall say to Aaron, ‘Take your staff and throw it down before Pharaoh; let
    it become a serpent.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dragon'; the Hebrew tannin can refer more broadly to a serpent, sea
      creature, or dragon-like creature depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - For
  - If
  lexicon: HALOT
  rationale: Here כִּי introduces a future circumstance rather than a causal statement.
    'When' best fits the instruction's anticipatory sense in context.
- source_word: יְדַבֵּר
  chosen: speaks
  alternatives:
  - will speak
  - speaks to
  lexicon: HALOT
  rationale: 'The imperfect in this conditional-temporal clause is naturally rendered
    with present English after ''when'': ''When Pharaoh speaks to you.'''
- source_word: מוֹפֵת
  chosen: sign
  alternatives:
  - wonder
  - miracle
  - portent
  lexicon: HALOT
  rationale: מוֹפֵת denotes a miraculous sign or portent. 'Sign' is the clearest modern
    English choice here, especially since Pharaoh is asking for a demonstrative act.
    'Wonder' is possible but less natural in direct speech here.
- source_word: תְּנוּ לָכֶם
  chosen: Produce for yourselves
  alternatives:
  - Give yourselves
  - Perform for yourselves
  - Show a sign
  lexicon: HALOT
  rationale: Literally 'give for yourselves,' but idiomatically this is a demand to
    furnish or produce a sign. 'Produce a sign for yourselves' preserves the reflexive
    nuance of לָכֶם while remaining readable.
- source_word: וְאָמַרְתָּ אֶל אַהֲרֹן
  chosen: then you shall say to Aaron
  alternatives:
  - and you shall say to Aaron
  lexicon: HALOT
  rationale: The waw-consecutive advances the instruction sequence. 'Then you shall
    say' captures the procedural flow in natural English.
- source_word: מַטְּךָ
  chosen: your staff
  alternatives:
  - your rod
  lexicon: HALOT
  rationale: מַטֶּה can mean 'staff' or 'rod.' 'Staff' is more natural modern English
    and fits the object Moses/Aaron carries, without archaic tone.
- source_word: וְהַשְׁלֵךְ
  chosen: throw it down
  alternatives:
  - cast it down
  - throw it
  lexicon: HALOT
  rationale: The verb means to throw/cast. 'Throw it down' reflects the action of
    casting the staff to the ground before Pharaoh and is idiomatic modern English.
- source_word: לִפְנֵי פַרְעֹה
  chosen: before Pharaoh
  alternatives:
  - in front of Pharaoh
  - in Pharaoh's presence
  lexicon: HALOT
  rationale: '''Before Pharaoh'' is concise, natural, and preserves the formal setting
    of the act.'
- source_word: יְהִי
  chosen: let it become
  alternatives:
  - it shall become
  - that it may become
  lexicon: HALOT
  rationale: The jussive expresses the intended result of the command. 'Let it become'
    preserves that nuance better than a flat future.
- source_word: תַנִּין
  chosen: serpent
  alternatives:
  - snake
  - dragon
  - great reptile
  lexicon: HALOT
  rationale: תַנִּין can denote a serpent, sea creature, or dragon-like creature depending
    on context. In this narrative setting involving a staff transformed before Pharaoh,
    'serpent' is the most contextually fitting and traditional English rendering,
    while avoiding the overly generic 'snake' and the misleading mythic overtones
    of 'dragon' here.
