theological_decisions:
- issue: Rendering of תַנִּין in the staff-sign narrative
  chosen_reading: serpent
  alternative_readings:
  - snake
  - dragon
  rationale: The Hebrew term has a broader semantic range than נָחָשׁ and can refer
    to a large reptile or dragon-like creature. In Exodus 7:9, however, the narrative
    context favors a serpent-like creature produced as a sign before Pharaoh. Because
    the lexical range is broader, an alternative is preserved in a footnote for auditability.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
