id: EXO.7.28
reference: Exodus 7:28
source:
  edition: WLC
  text: וְ/שָׁרַ֣ץ הַ/יְאֹר֮ צְפַרְדְּעִים֒ וְ/עָלוּ֙ וּ/בָ֣אוּ בְּ/בֵיתֶ֔/ךָ וּ/בַ/חֲדַ֥ר
    מִשְׁכָּבְ/ךָ֖ וְ/עַל מִטָּתֶ֑/ךָ וּ/בְ/בֵ֤ית עֲבָדֶ֨י/ךָ֙ וּ/בְ/עַמֶּ֔/ךָ וּ/בְ/תַנּוּרֶ֖י/ךָ
    וּ/בְ/מִשְׁאֲרוֹתֶֽי/ךָ־׃
translation:
  text: The Nile will swarm with frogs, and they will come up and enter your house,
    your bedroom, and your bed, and the houses of your servants and your people, and
    your ovens and your kneading bowls.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “kneading troughs.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁרַץ
  chosen: will swarm
  alternatives:
  - will teem
  - will abound with
  lexicon: HALOT
  rationale: שׁרץ denotes prolific swarming/teeming activity, especially of small
    creatures. 'Will swarm' is natural English and preserves the vivid sense better
    than a flatter 'will produce.' Future sense is supplied from the plague announcement
    context.
- source_word: הַיְאֹר
  chosen: The Nile
  alternatives:
  - the river
  lexicon: HALOT
  rationale: In Exodus, יְאֹר commonly refers specifically to the Nile in the Egyptian
    setting. 'The Nile' is clearer and more contextually precise than the generic
    'the river.'
- source_word: צְפַרְדְּעִים
  chosen: frogs
  lexicon: HALOT
  rationale: Straightforward lexical rendering of the plural noun.
- source_word: וְעָלוּ
  chosen: will come up
  alternatives:
  - will go up
  - will rise up
  lexicon: HALOT
  rationale: עלה here describes the frogs' movement up from the Nile into inhabited
    spaces. 'Come up' is idiomatic in English and fits the directional sense from
    river to land/houses.
- source_word: וּבָאוּ
  chosen: enter
  alternatives:
  - come into
  - go into
  lexicon: HALOT
  rationale: בוא with the following ב prepositional phrases indicates entry into successive
    locations. 'Enter' avoids repetition while preserving the sense.
- source_word: בְּבֵיתֶךָ
  chosen: your house
  alternatives:
  - your household
  lexicon: HALOT
  rationale: The phrase refers to Pharaoh's physical dwelling in this sequence of
    locations, so 'house' is preferable to the more abstract 'household.'
- source_word: וּבַחֲדַר מִשְׁכָּבְךָ
  chosen: your bedroom
  alternatives:
  - the room where you sleep
  - your sleeping chamber
  lexicon: HALOT
  rationale: Literally 'the room of your lying down/sleeping.' 'Bedroom' is a clear
    modern equivalent that preserves the domestic specificity without archaic diction.
- source_word: וְעַל מִטָּתֶךָ
  chosen: your bed
  alternatives:
  - upon your bed
  lexicon: HALOT
  rationale: The preposition על means 'on/upon.' In smooth English within a list,
    'your bed' after 'and' adequately conveys the location; the sense of intrusion
    onto the bed remains clear.
- source_word: וּבְבֵית עֲבָדֶיךָ
  chosen: the houses of your servants
  alternatives:
  - the house of your servants
  - the households of your servants
  lexicon: HALOT
  rationale: Although בית is singular in construct, with a plural genitive it can
    function distributively. 'The houses of your servants' best reflects the likely
    collective/distributive sense in English.
- source_word: וּבְעַמֶּךָ
  chosen: your people
  alternatives:
  - among your people
  lexicon: HALOT
  rationale: The phrase extends the plague beyond Pharaoh's residence to his populace.
    'Your people' is the most direct rendering; the preceding verb 'enter' governs
    the sense of intrusion among them.
- source_word: וּבְתַנּוּרֶיךָ
  chosen: your ovens
  alternatives:
  - your baking ovens
  lexicon: HALOT
  rationale: תנור refers to domestic ovens. 'Ovens' is sufficient and idiomatic.
- source_word: וּבְמִשְׁאֲרוֹתֶיךָ
  chosen: your kneading bowls
  alternatives:
  - your kneading troughs
  lexicon: HALOT
  rationale: The noun refers to vessels used in dough preparation. 'Kneading bowls'
    is accessible modern English; 'kneading troughs' is a viable more traditional
    alternative.
