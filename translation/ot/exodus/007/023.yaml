id: EXO.7.23
reference: Exodus 7:23
source:
  edition: WLC
  text: וַ/יִּ֣פֶן פַּרְעֹ֔ה וַ/יָּבֹ֖א אֶל בֵּית֑/וֹ וְ/לֹא שָׁ֥ת לִבּ֖/וֹ גַּם לָ/זֹֽאת־־־׃
translation:
  text: Pharaoh turned and went into his house, and he did not take even this to heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he did not set his heart to this' or 'he paid no attention even to
      this.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפֶן
  chosen: turned
  alternatives:
  - turned away
  - went away
  lexicon: HALOT
  rationale: ויפן from פנה commonly denotes turning or turning away. 'Turned' is concise
    and natural in sequence with the following verb 'went,' preserving the narrative
    movement without over-interpreting direction.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  rationale: Standard English transliteration of the royal title/name in Exodus.
- source_word: וַיָּבֹא אֶל בֵּיתוֹ
  chosen: went into his house
  alternatives:
  - came into his house
  - went to his house
  lexicon: HALOT
  rationale: בוא with אֶל marks movement into/toward. In English narrative, 'went
    into his house' best fits the perspective and preserves the sense of entering
    his residence.
- source_word: וְלֹא שָׁת לִבּוֹ
  chosen: he did not take ... to heart
  alternatives:
  - he did not set his heart
  - he paid no attention
  - he did not give his mind
  lexicon: HALOT
  rationale: The idiom שׁית/שׂים לב means to set one's heart/mind to something, that
    is, to pay serious attention. 'Did not take ... to heart' preserves the heart-language
    while remaining idiomatic modern English.
- source_word: גַּם לָזֹאת
  chosen: even this
  alternatives:
  - also to this
  - even to this
  lexicon: HALOT
  rationale: גַּם adds 'also/even,' and לָזֹאת refers to the present sign/judgment.
    'Even this' is the most natural English rendering in the idiom 'take something
    to heart,' conveying that not even this plague moved him.
