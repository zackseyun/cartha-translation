id: EXO.7.6
reference: Exodus 7:6
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ מֹשֶׁ֖ה וְ/אַהֲרֹ֑ן כַּ/אֲשֶׁ֨ר צִוָּ֧ה יְהוָ֛ה אֹתָ֖/ם כֵּ֥ן עָשֽׂוּ׃
translation:
  text: So Moses and Aaron did just as Yahweh had commanded them; so they did.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - acted
  - made
  lexicon: HALOT
  rationale: The verb עשה is broad ('do/make'). In this context of obedience to a command, 'did' is the most natural English rendering and matches the resumptive repetition at the end of the verse.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: וְאַהֲרֹן
  chosen: and Aaron
  rationale: Simple coordination with Moses; standard English transliteration of the personal name.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according to what
  lexicon: HALOT
  rationale: Introduces comparison/correspondence between the command and their action. 'Just as' clearly conveys exact conformity.
- source_word: צִוָּה
  chosen: had commanded
  alternatives:
  - commanded
  - instructed
  lexicon: HALOT
  rationale: צוה denotes giving a command. 'Had commanded' fits idiomatic English in a narrative sequence where the command precedes the obedience.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct-object marker with 3mp suffix referring to Moses and Aaron; rendered naturally as 'them' in English.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in that way
  lexicon: HALOT
  rationale: Adverb reinforcing that their action matched the command. 'So' is concise and natural in modern English.
- source_word: עָשׂוּ
  chosen: they did
  alternatives:
  - they acted
  - they did so
  lexicon: HALOT
  rationale: The repeated verb echoes the opening clause and emphasizes obedience. 'They did' preserves the Hebrew repetition without unnecessary paraphrase.
