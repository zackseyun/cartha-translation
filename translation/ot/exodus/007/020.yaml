id: EXO.7.20
reference: Exodus 7:20
source:
  edition: WLC
  text: וַ/יַּֽעֲשׂוּ כֵן֩ מֹשֶׁ֨ה וְ/אַהֲרֹ֜ן כַּ/אֲשֶׁ֣ר צִוָּ֣ה יְהוָ֗ה וַ/יָּ֤רֶם
    בַּ/מַּטֶּה֙ וַ/יַּ֤ךְ אֶת הַ/מַּ֨יִם֙ אֲשֶׁ֣ר בַּ/יְאֹ֔ר לְ/עֵינֵ֣י פַרְעֹ֔ה
    וּ/לְ/עֵינֵ֖י עֲבָדָ֑י/ו וַ/יֵּהָֽפְכ֛וּ כָּל הַ/מַּ֥יִם אֲשֶׁר בַּ/יְאֹ֖ר לְ/דָֽם־׀־־־׃
translation:
  text: So Moses and Aaron did so, just as the LORD had commanded. And he raised the
    staff and struck the water that was in the Nile before Pharaoh's eyes and before
    the eyes of his servants, and all the water that was in the Nile was turned to
    blood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the river''; in Exodus this term commonly refers specifically
      to the Nile.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ כֵן
  chosen: did so
  alternatives:
  - did thus
  - did accordingly
  lexicon: HALOT
  rationale: Idiomatic rendering of עשה + כן indicating compliance with the prior
    command; 'did so' is natural modern English while remaining close to the Hebrew.
- source_word: כַּאֲשֶׁר צִוָּה
  chosen: just as ... had commanded
  alternatives:
  - as ... commanded
  lexicon: HALOT
  rationale: Captures the comparative force 'just as' and the prior action sense in
    context. English past perfect is natural because the command precedes the action.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Required by doctrine table for the divine name YHWH; follows established
    covenant-name convention.
- source_word: וַיָּרֶם
  chosen: he raised
  alternatives:
  - lifted up
  lexicon: HALOT
  rationale: Straightforward narrative rendering of רום in the Hiphil here. Singular
    verb likely refers to Aaron as the immediate actor with the staff, but English
    can preserve the Hebrew's singular without overexplaining.
- source_word: בַּמַּטֶּה
  chosen: the staff
  alternatives:
  - the rod
  lexicon: HALOT
  rationale: '''Staff'' is clear modern English for מַטֶּה in this narrative context;
    ''rod'' is traditional but less natural for many readers.'
- source_word: וַיַּךְ אֶת־הַמַּיִם
  chosen: struck the water
  alternatives:
  - smote the water
  - hit the water
  lexicon: HALOT
  rationale: נכה here denotes striking; 'struck' is both accurate and readable.
- source_word: הַיְאֹר
  chosen: the Nile
  alternatives:
  - the river
  lexicon: HALOT
  rationale: In Exodus, יְאֹר commonly refers specifically to the Nile. Translating
    the proper referent avoids unnecessary ambiguity in English.
- source_word: לְעֵינֵי ... וּלְעֵינֵי
  chosen: before Pharaoh's eyes and before the eyes of his servants
  alternatives:
  - in the sight of Pharaoh and in the sight of his servants
  - before Pharaoh and his servants
  lexicon: HALOT
  rationale: Preserves the repeated Hebrew expression literally enough to retain emphasis
    on public visibility, while remaining idiomatic.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his officials
  - his attendants
  lexicon: HALOT
  rationale: Basic sense is 'his servants.' While these are likely royal attendants
    or officials, the Hebrew does not specify rank, so the more direct rendering is
    preferred.
- source_word: וַיֵּהָפְכוּ
  chosen: was turned
  alternatives:
  - were turned
  - changed
  lexicon: HALOT
  rationale: Hebrew verb is plural agreeing with 'all the water,' but idiomatic English
    often treats 'water' as a mass noun with singular verb. 'Was turned' reads naturally
    while preserving the passive/resultative sense.
- source_word: לְדָם
  chosen: to blood
  alternatives:
  - into blood
  lexicon: HALOT
  rationale: English idiom prefers 'turned to blood'; this reflects the Hebrew result
    construction without paraphrase.
