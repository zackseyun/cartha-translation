id: EXO.7.14
reference: Exodus 7:14
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל מֹשֶׁ֔ה כָּבֵ֖ד לֵ֣ב פַּרְעֹ֑ה מֵאֵ֖ן לְ/שַׁלַּ֥ח הָ/עָֽם־׃
translation:
  text: Then Yahweh said to Moses, “Pharaoh’s heart is heavy; he refuses to let the people go.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Pharaoh’s heart is hard.” The Hebrew adjective is literally “heavy,” a metaphor for stubbornness or unresponsiveness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural English narrative flow while preserving sequence; 'and ... said' is more formally possible.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition; 'to' is the natural modern English equivalent.
- source_word: מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Personal name is transliterated by standard English convention.
- source_word: כָּבֵד
  chosen: is heavy
  alternatives:
  - is hard
  - is dull
  - is unresponsive
  lexicon: HALOT
  rationale: The adjective literally means 'heavy.' In context it describes Pharaoh's inner disposition as stubborn or unyielding, but the main text preserves the concrete metaphor rather than interpreting it away as 'hard.'
- source_word: לֵב פַּרְעֹה
  chosen: Pharaoh’s heart
  alternatives:
  - the heart of Pharaoh
  lexicon: HALOT
  rationale: Construct relationship rendered idiomatically in English as a possessive.
- source_word: מֵאֵן
  chosen: he refuses
  alternatives:
  - he has refused
  - he is unwilling
  lexicon: HALOT
  rationale: The participle conveys Pharaoh's ongoing disposition/state of refusal. Present English 'he refuses' captures the durative sense naturally.
- source_word: לְשַׁלַּח
  chosen: to let ... go
  alternatives:
  - to send away
  - to release
  lexicon: HALOT
  rationale: In Exodus this verb regularly refers to Pharaoh allowing Israel to depart. 'Let ... go' is idiomatic and contextually precise, while still reflecting the underlying sense of sending away/releasing.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the people of Israel
  lexicon: HALOT
  rationale: The Hebrew says simply 'the people.' Although Israel is clearly intended from context, the translation should not add what is not explicit in this verse.
