theological_decisions:
- issue: Rendering Pharaoh's condition without over-resolving the hardening motif
  chosen_reading: Pharaoh’s heart is heavy
  alternative_readings:
  - Pharaoh’s heart is hard
  rationale: The Hebrew here uses 'heavy' rather than the more common English theological shorthand 'hard.' Preserving 'heavy' respects the source wording and avoids flattening the distinct vocabulary used across the hardening passages.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
