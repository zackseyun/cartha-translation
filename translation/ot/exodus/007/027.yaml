id: EXO.7.27
reference: Exodus 7:27
source:
  edition: WLC
  text: וְ/אִם מָאֵ֥ן אַתָּ֖ה לְ/שַׁלֵּ֑חַ הִנֵּ֣ה אָנֹכִ֗י נֹגֵ֛ף אֶת כָּל גְּבוּלְ/ךָ֖
    בַּֽ/צְפַרְדְּעִֽים־־־׃
translation:
  text: But if you refuse to let them go, behold, I am about to strike all your territory
    with frogs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And if you refuse to let them go ... I will strike all your land with
      frogs.' The Hebrew participle may be rendered as imminent ('am about to strike')
      or simple future ('will strike').
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: The conjunction plus conditional particle introduces a contrastive condition
    following the prior demand. 'But if' captures the adversative force in context
    better than a bare 'if.'
- source_word: מָאֵן
  chosen: refuse
  alternatives:
  - decline
  - be unwilling
  lexicon: HALOT
  rationale: The verb denotes a willful refusal, not mere inability. 'Refuse' is the
    most natural modern English equivalent and preserves the obstinate nuance addressed
    to Pharaoh.
- source_word: לְשַׁלֵּחַ
  chosen: to let them go
  alternatives:
  - to send out
  - to release
  lexicon: HALOT
  rationale: In the Exodus context, the idiom refers to releasing Israel from restraint.
    'Let them go' is idiomatic English and accurately reflects the force of the infinitive
    here.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - see
  - indeed
  lexicon: HALOT
  rationale: The particle marks solemn immediacy and draws attention to the announced
    judgment. 'Behold' preserves the elevated warning tone without adding content.
- source_word: אָנֹכִי
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis to the participial clause. English
    can carry this adequately with explicit 'I' before 'am about to strike'; an even
    stronger 'I myself' would be possible but is not required.
- source_word: נֹגֵף
  chosen: am about to strike
  alternatives:
  - am striking
  - will strike
  - am afflicting
  lexicon: HALOT
  rationale: The participle with הִנֵּה often conveys imminent action. 'Am about to
    strike' best reflects the impending plague announcement more precisely than a
    simple present, while 'strike' preserves the blow/judgment imagery.
- source_word: כָּל גְּבוּלְךָ
  chosen: all your territory
  alternatives:
  - all your border
  - all your land
  - your whole domain
  lexicon: HALOT
  rationale: גְּבוּל can mean border, boundary, or territory/domain. In this plague
    context, the sense is the full extent of Pharaoh's realm, not merely the frontier
    line. 'All your territory' communicates that scope clearly.
- source_word: בַּצְפַרְדְּעִים
  chosen: with frogs
  alternatives:
  - by frogs
  lexicon: HALOT
  rationale: The beth marks the instrument or means of the plague. 'With frogs' is
    idiomatic English for the means by which the territory will be struck.
