id: EXO.19.14
reference: Exodus 19:14
source:
  edition: WLC
  text: וַ/יֵּ֧רֶד מֹשֶׁ֛ה מִן הָ/הָ֖ר אֶל הָ/עָ֑ם וַ/יְקַדֵּשׁ֙ אֶת הָ/עָ֔ם וַֽ/יְכַבְּס֖וּ
    שִׂמְלֹתָֽ/ם־־־׃
translation:
  text: So Moses went down from the mountain to the people, and he consecrated the
    people, and they washed their garments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sanctified the people' or 'set the people apart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרֶד
  chosen: went down
  alternatives:
  - came down
  - descended
  lexicon: HALOT
  rationale: The verb ירד denotes downward movement. 'Went down' is natural modern
    English and fits the narrative sequence from the mountain to the people.
- source_word: מִן הָהָר
  chosen: from the mountain
  alternatives:
  - from the hill-country
  - from the hill
  lexicon: HALOT
  rationale: הַר here refers specifically to Sinai in the immediate context; 'mountain'
    is the standard and contextually clear rendering.
- source_word: אֶל הָעָם
  chosen: to the people
  alternatives:
  - to the assembly
  lexicon: HALOT
  rationale: עָם ordinarily means 'people.' 'Assembly' would over-specify the social
    form; the text simply indicates Moses' movement toward the people.
- source_word: וַיְקַדֵּשׁ
  chosen: consecrated
  alternatives:
  - sanctified
  - made holy
  - set apart
  lexicon: HALOT
  rationale: קדשׁ in the piel here refers to ritual preparation for meeting with God.
    'Consecrated' communicates formal setting apart in a cultic context better than
    the more abstract 'made holy,' while remaining readable.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: Repeated object retained as 'the people' for clarity and consistency
    with the Hebrew repetition.
- source_word: וַיְכַבְּסוּ
  chosen: they washed
  alternatives:
  - they laundered
  - they cleansed
  lexicon: HALOT
  rationale: כבס refers specifically to washing garments. 'Washed' is the most natural
    English equivalent in context.
- source_word: שִׂמְלֹתָם
  chosen: their garments
  alternatives:
  - their clothes
  - their cloaks
  lexicon: HALOT
  rationale: שִׂמְלָה denotes clothing/garments. 'Garments' preserves the slightly
    formal, ritual-preparation setting better than 'clothes,' without becoming archaic.
