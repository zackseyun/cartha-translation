theological_decisions:
- issue: Rendering of ritual holiness language in preparation for the Sinai theophany
  chosen_reading: consecrated the people
  alternative_readings:
  - sanctified the people
  - set the people apart as holy
  rationale: The verse describes ritual preparation rather than an abstract moral
    transformation. 'Consecrated' preserves the cultic and theological sense of being
    set apart for encounter with God without importing later doctrinal categories.
  doctrine_reference: Translation philosophy §§1, 5, 6
