id: EXO.19.25
reference: Exodus 19:25
source:
  edition: WLC
  text: וַ/יֵּ֥רֶד מֹשֶׁ֖ה אֶל הָ/עָ֑ם וַ/יֹּ֖אמֶר אֲלֵ/הֶֽם־׃ס
translation:
  text: So Moses went down to the people and spoke to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and said to them.' The Hebrew verb is literally 'said,' but 'spoke to
      them' is a natural English rendering in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרֶד
  chosen: went down
  alternatives:
  - came down
  - descended
  lexicon: HALOT
  rationale: From ירד, indicating downward movement from the mountain. 'Went down'
    is natural modern English and preserves the directional sense without sounding
    overly formal.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name, in keeping with
    the policy to transliterate names.
- source_word: אֶל
  chosen: to
  alternatives:
  - down to
  lexicon: HALOT
  rationale: The preposition marks movement toward the people. In English, 'went down
    to the people' naturally incorporates both the preposition and the directional
    sense of the verb.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the assembly
  lexicon: HALOT
  rationale: עם commonly means 'people.' In this Sinai context it refers to the gathered
    Israelites; 'the people' is the most direct and contextually appropriate rendering.
- source_word: וַיֹּאמֶר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: Although the verb literally means 'said,' the object 'to them' in English
    is more idiomatically rendered 'spoke to them.' This also avoids an abrupt ending
    and reflects that Moses conveyed the warning/instruction just received.
- source_word: אֲלֵהֶם
  chosen: to them
  lexicon: HALOT
  rationale: Standard rendering of the preposition with 3rd person masculine plural
    suffix, referring to the people.
