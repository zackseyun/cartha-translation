id: EXO.19.16
reference: Exodus 19:16
source:
  edition: WLC
  text: וַ/יְהִי֩ בַ/יּ֨וֹם הַ/שְּׁלִישִׁ֜י בִּֽ/הְיֹ֣ת הַ/בֹּ֗קֶר וַ/יְהִי֩ קֹלֹ֨ת
    וּ/בְרָקִ֜ים וְ/עָנָ֤ן כָּבֵד֙ עַל הָ/הָ֔ר וְ/קֹ֥ל שֹׁפָ֖ר חָזָ֣ק מְאֹ֑ד וַ/יֶּחֱרַ֥ד
    כָּל הָ/עָ֖ם אֲשֶׁ֥ר בַּֽ/מַּחֲנֶֽה־־׃
translation:
  text: And it happened on the third day, when morning came, that there were thunders
    and lightnings, and a heavy cloud on the mountain, and the sound of a trumpet,
    very strong; and all the people who were in the camp trembled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'voices'; the Hebrew word can mean 'sounds' or 'voices,' but here, alongside
      'lightnings,' it most likely refers to thunder.
    reason: lexical_alternative
  - marker: b
    text: Or 'the sound of a ram's horn.' The Hebrew shofar is a horn trumpet, traditionally
      made from an animal horn.
    reason: lexical_alternative
  - marker: c
    text: Literally 'very strong'; in context this describes the intensity of the
      trumpet sound.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - And it was
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new event. 'And it happened'
    preserves the Hebrew discourse function without archaic English.
- source_word: בַיּוֹם הַשְּׁלִישִׁי
  chosen: on the third day
  lexicon: HALOT
  rationale: Straightforward temporal phrase; formal rendering is natural in English.
- source_word: בִּהְיֹת הַבֹּקֶר
  chosen: when morning came
  alternatives:
  - when it was morning
  - at morning
  lexicon: HALOT
  rationale: Infinitive construct with temporal force. 'When morning came' is idiomatic
    modern English while preserving the temporal sense.
- source_word: קֹלֹת
  chosen: thunders
  alternatives:
  - voices
  - sounds
  lexicon: HALOT
  rationale: Although קוֹל can mean 'voice' or 'sound,' in this Sinai theophany context
    paired with 'lightnings' it idiomatically denotes thunderclaps. This best reflects
    the plain sense in English.
- source_word: בְרָקִים
  chosen: lightnings
  alternatives:
  - flashes of lightning
  lexicon: HALOT
  rationale: Standard plural noun for lightning flashes; 'lightnings' keeps the plural
    vividness of the Hebrew.
- source_word: עָנָן כָּבֵד
  chosen: a heavy cloud
  alternatives:
  - a dense cloud
  - a thick cloud
  lexicon: HALOT
  rationale: כָּבֵד literally means 'heavy,' and with cloud conveys weight/density.
    'Heavy cloud' is transparent and preserves the adjective rather than smoothing
    it away.
- source_word: עַל הָהָר
  chosen: on the mountain
  alternatives:
  - over the mountain
  - upon the mountain
  lexicon: HALOT
  rationale: עַל can mean 'on/over/upon'; 'on the mountain' is the most natural English
    rendering here and fits the scene.
- source_word: קֹל שֹׁפָר
  chosen: the sound of a trumpet
  alternatives:
  - the sound of a ram's horn
  - a trumpet blast
  lexicon: HALOT
  rationale: קוֹל plus שׁוֹפָר denotes the audible sound rather than the instrument
    alone. 'Trumpet' is the conventional accessible rendering; the more specific 'ram's
    horn' is possible but not required in context.
- source_word: חָזָק מְאֹד
  chosen: very strong
  alternatives:
  - very loud
  - exceedingly strong
  lexicon: HALOT
  rationale: חָזָק is literally 'strong.' Applied to sound, English often prefers
    'loud,' but 'very strong' more closely preserves the Hebrew wording while remaining
    understandable.
- source_word: וַיֶּחֱרַד
  chosen: trembled
  alternatives:
  - shuddered
  - quaked
  - was terrified
  lexicon: HALOT
  rationale: The verb denotes trembling with fear or agitation. 'Trembled' captures
    both the physical and emotional force without overinterpreting.
- source_word: כָּל הָעָם אֲשֶׁר בַּמַּחֲנֶה
  chosen: all the people who were in the camp
  alternatives:
  - all the people in the camp
  lexicon: HALOT
  rationale: Retains the relative clause explicitly present in Hebrew while remaining
    natural English.
