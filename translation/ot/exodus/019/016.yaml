theological_decisions:
- issue: Theophanic imagery at Sinai
  chosen_reading: Render the phenomena descriptively without importing later theological
    interpretation.
  alternative_readings:
  - Translate קֹלֹת as 'voices' to suggest heavenly voices
  rationale: The verse describes sensory phenomena accompanying God's descent at Sinai.
    The translation should preserve the event's awe without adding interpretive claims
    not explicit in the Hebrew. In context, 'thunders' is the most likely sense, but
    the broader semantic range of קֹל is noted.
  doctrine_reference: Translation philosophy §§1, 3
