id: EXO.19.24
reference: Exodus 19:24
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֵלָ֤י/ו יְהוָה֙ לֶךְ רֵ֔ד וְ/עָלִ֥יתָ אַתָּ֖ה וְ/אַהֲרֹ֣ן עִמָּ֑/ךְ
    וְ/הַ/כֹּהֲנִ֣ים וְ/הָ/עָ֗ם אַל יֶֽהֶרְס֛וּ לַ/עֲלֹ֥ת אֶל יְהוָ֖ה פֶּן יִפְרָץ
    בָּֽ/ם־־־־־׃
translation:
  text: And the LORD said to him, “Go down, and come up—you and Aaron with you. But
    the priests and the people must not break through to come up to the LORD, lest
    he break out against them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “must not force their way through … lest he burst forth against them.”
      The Hebrew uses related imagery of breaking through for both the people's intrusion
      and the LORD's judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD,' following Jewish reverence tradition and the LXX pattern.
- source_word: לֶךְ רֵד
  chosen: Go down
  alternatives:
  - Go, descend
  lexicon: HALOT
  rationale: The paired imperatives function idiomatically as an urgent command to
    depart and descend. 'Go down' is natural English and preserves both verbal elements.
- source_word: וְעָלִיתָ
  chosen: and come up
  alternatives:
  - and you shall come up
  - and ascend
  lexicon: HALOT
  rationale: Though formally perfect, in this command sequence it carries an injunctive/future
    force after the imperatives. 'Come up' is idiomatic in context and fits the movement
    back up the mountain.
- source_word: אַתָּה וְאַהֲרֹן עִמָּךְ
  chosen: you and Aaron with you
  alternatives:
  - you, and Aaron with you
  - you and Aaron
  lexicon: HALOT
  rationale: The explicit pronoun adds emphasis, and עִמָּךְ clarifies accompaniment.
    The translation preserves both the emphasis and the companionship.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  alternatives:
  - the priestly men
  lexicon: HALOT
  rationale: Standard rendering of the noun in this cultic context.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the common people
  lexicon: HALOT
  rationale: Straightforward rendering contrasting the general populace with Moses,
    Aaron, and the priests.
- source_word: אַל יֶהֶרְסוּ
  chosen: must not break through
  alternatives:
  - must not force their way through
  - must not burst through
  lexicon: HALOT
  rationale: The verb הרס in this context conveys breaking through a boundary or barrier.
    'Must not break through' preserves the concrete warning and reads naturally in
    English.
- source_word: לַעֲלֹת אֶל יְהוָה
  chosen: to come up to the LORD
  alternatives:
  - to go up to the LORD
  - to ascend to the LORD
  lexicon: HALOT
  rationale: This infinitive expresses the prohibited action of approaching the mountain
    presence of God. 'Come up' maintains the vertical imagery while sounding natural
    in English.
- source_word: פֶּן יִפְרָץ בָּם
  chosen: lest he break out against them
  alternatives:
  - lest he burst forth against them
  - or he will break through among them
  lexicon: HALOT
  rationale: פרץ here depicts a sudden outbreak of divine judgment. 'Break out against
    them' preserves the vividness and echoes the earlier 'break through' wordplay
    without implying identical actions.
