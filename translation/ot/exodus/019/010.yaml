id: EXO.19.10
reference: Exodus 19:10
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֤ה אֶל מֹשֶׁה֙ לֵ֣ךְ אֶל הָ/עָ֔ם וְ/קִדַּשְׁתָּ֥/ם הַ/יּ֖וֹם וּ/מָחָ֑ר וְ/כִבְּס֖וּ שִׂמְלֹתָֽ/ם־־׃
translation:
  text: Then Yahweh said to Moses, “Go to the people and consecrate them today and tomorrow, and let them wash their garments.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “sanctify them” or “set them apart as holy.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural English narrative flow while preserving the sequential force.
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Proceed
  - Leave and go
  lexicon: HALOT
  rationale: A straightforward imperative of הלך; 'Go' is the natural and sufficiently formal English equivalent.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: In this Sinai context, עָם refers to the covenant community of Israel collectively. 'The people' is the standard and most natural rendering.
- source_word: וְקִדַּשְׁתָּם
  chosen: consecrate them
  alternatives:
  - sanctify them
  - set them apart as holy
  lexicon: HALOT
  rationale: קדשׁ in the piel here denotes making/preparing the people as holy for divine encounter. 'Consecrate' preserves the ritual-sacral sense better than the broader 'set apart,' while remaining readable modern English.
- source_word: הַיּוֹם וּמָחָר
  chosen: today and tomorrow
  alternatives:
  - this day and tomorrow
  lexicon: HALOT
  rationale: A temporal expression marking the two-day preparation period. 'Today and tomorrow' is idiomatic and precise.
- source_word: וְכִבְּסוּ
  chosen: let them wash
  alternatives:
  - and they shall wash
  - have them wash
  lexicon: HALOT
  rationale: The verb is plural, referring to the people, following Moses' imperative to consecrate them. In English, 'let them wash' clearly conveys the commanded result without awkwardness. 'Have them wash' is possible but slightly more interpretive regarding Moses' agency.
- source_word: שִׂמְלֹתָם
  chosen: their garments
  alternatives:
  - their clothes
  - their cloaks
  lexicon: HALOT
  rationale: שִׂמְלָה denotes clothing/outer garments. 'Garments' fits the solemn ritual context better than the more casual 'clothes'.
