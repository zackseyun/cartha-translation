theological_decisions:
- issue: Ritual preparation language of קדשׁ
  chosen_reading: consecrate them
  alternative_readings:
  - sanctify them
  - set them apart as holy
  rationale: The verse concerns ritual preparation for meeting the LORD at Sinai, not necessarily inward moral transformation alone. 'Consecrate' preserves the cultic and covenantal dimension without importing later doctrinal categories.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
