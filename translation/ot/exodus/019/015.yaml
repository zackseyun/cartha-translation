theological_decisions:
- issue: Whether to make explicit that the prohibition concerns sexual relations during
    ritual preparation
  chosen_reading: 'Retain the Hebrew euphemism in the main text: ''do not go near
    a woman'''
  alternative_readings:
  - do not have sexual relations with a woman
  - do not approach your wives
  rationale: The text uses a conventional euphemistic expression rather than an explicit
    sexual verb. Preserving that wording respects the source while allowing a footnote
    to clarify the idiomatic sense. This avoids over-paraphrase while still making
    the meaning auditable.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source
    text''s plain sense without paraphrasing beyond what it warrants.'
