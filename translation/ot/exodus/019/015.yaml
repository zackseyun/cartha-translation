id: EXO.19.15
reference: Exodus 19:15
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ אֶל הָ/עָ֔ם הֱי֥וּ נְכֹנִ֖ים לִ/שְׁלֹ֣שֶׁת יָמִ֑ים אַֽל תִּגְּשׁ֖וּ
    אֶל אִשָּֽׁה־־־׃
translation:
  text: And he said to the people, “Be ready for three days; do not go near a woman.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'do not go near a woman'; in context this is a euphemistic instruction
      to abstain from sexual relations during the period of preparation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר introducing Moses' speech. 'And he
    said' preserves Hebrew narrative flow without overinterpreting temporal nuance.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: עם here refers to the gathered Israelites as a collective body. 'The
    people' is the natural and standard English equivalent in this context.
- source_word: הֱיוּ נְכֹנִים
  chosen: Be ready
  alternatives:
  - Be prepared
  - Be established/firm
  lexicon: HALOT
  rationale: The imperative of היה with the adjective/participle נכון forms an exhortation
    to readiness or preparedness. 'Be ready' is concise, idiomatic, and fits the immediate
    context of consecration before divine appearance.
- source_word: לִשְׁלֹשֶׁת יָמִים
  chosen: for three days
  alternatives:
  - within three days
  - for the third day
  lexicon: HALOT
  rationale: The phrase most naturally indicates a period of preparation extending
    over three days. 'For three days' best matches the Hebrew construction here. 'For
    the third day' would fit a different expression more directly tied to v. 11, though
    the broader context explains the timing.
- source_word: אַל
  chosen: do not
  alternatives:
  - you shall not
  lexicon: HALOT
  rationale: אַל with the following verb gives a prohibition. 'Do not' is the natural
    English imperative negative.
- source_word: תִּגְּשׁוּ
  chosen: go near
  alternatives:
  - approach
  - come near
  lexicon: HALOT
  rationale: נגשׁ commonly means to approach or draw near. 'Go near' is clear modern
    English and works smoothly with the following object.
- source_word: אֶל אִשָּׁה
  chosen: a woman
  alternatives:
  - a wife
  - a woman sexually
  lexicon: HALOT
  rationale: The Hebrew is literally 'to a woman.' In this context it is a euphemistic
    prohibition of sexual relations during consecration. The main text keeps the literal
    wording 'a woman' rather than importing the fuller implication into the translation;
    the euphemistic sense is preserved in a footnote for transparency.
