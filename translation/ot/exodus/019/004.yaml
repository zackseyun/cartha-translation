id: EXO.19.4
reference: Exodus 19:4
source:
  edition: WLC
  text: אַתֶּ֣ם רְאִיתֶ֔ם אֲשֶׁ֥ר עָשִׂ֖יתִי לְ/מִצְרָ֑יִם וָ/אֶשָּׂ֤א אֶתְ/כֶם֙ עַל
    כַּנְפֵ֣י נְשָׁרִ֔ים וָ/אָבִ֥א אֶתְ/כֶ֖ם אֵלָֽ/י־׃
translation:
  text: You yourselves have seen what I did to Egypt, and how I carried you on eagles’
    wings and brought you to myself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'on the wings of eagles.' The Hebrew expression is a vivid metaphor
      for protective, powerful deliverance.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew word rendered 'eagles' can more broadly refer to large birds
      of prey.
    reason: lexical_alternative
  - marker: c
    text: Or, 'brought you to me.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַתֶּם
  chosen: you yourselves
  alternatives:
  - you
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis beyond the verbal suffix in רְאִיתֶם,
    so 'you yourselves' preserves the marked address.
- source_word: רְאִיתֶם
  chosen: have seen
  alternatives:
  - saw
  lexicon: HALOT
  rationale: The qatal here refers to Israel's completed experience with present relevance
    in the discourse; English present perfect communicates that naturally.
- source_word: אֲשֶׁר עָשִׂיתִי לְמִצְרָיִם
  chosen: what I did to Egypt
  alternatives:
  - what I did to the Egyptians
  - what I did for Egypt
  lexicon: HALOT
  rationale: 'The preposition ל with Egypt here is best rendered idiomatically as
    the object affected by God''s acts in the exodus judgments: ''to Egypt,'' not
    benefactive ''for Egypt.'' ''Egypt'' preserves the collective/national sense.'
- source_word: וָאֶשָּׂא אֶתְכֶם
  chosen: I carried you
  alternatives:
  - I bore you
  - I lifted you up
  lexicon: HALOT
  rationale: נשא commonly means 'carry/bear.' 'Carried' is natural modern English
    and fits the protective metaphor.
- source_word: עַל כַּנְפֵי נְשָׁרִים
  chosen: on eagles’ wings
  alternatives:
  - on the wings of eagles
  - on vultures' wings
  lexicon: HALOT
  rationale: This is a conventional Hebrew image of swift, protective transport. 'Eagles'
    is the traditional and most likely contextual rendering for נְשָׁרִים here, though
    the term can denote large birds of prey more broadly. The plural construct phrase
    is rendered idiomatically in English.
- source_word: וָאָבִא אֶתְכֶם אֵלָי
  chosen: and brought you to myself
  alternatives:
  - and brought you to me
  lexicon: HALOT
  rationale: אֵלַי is literally 'to me,' but 'to myself' better conveys the covenantal-relational
    force in English without adding content beyond the Hebrew.
