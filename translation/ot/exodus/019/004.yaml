theological_decisions:
- issue: Relational force of God's deliverance
  chosen_reading: brought you to myself
  alternative_readings:
  - brought you to me
  rationale: The verse presents the exodus not merely as rescue from Egypt but as
    movement into covenant relationship with God. 'To myself' preserves that relational
    emphasis while remaining faithful to אֵלָי.
  doctrine_reference: Translation philosophy §3, §6
