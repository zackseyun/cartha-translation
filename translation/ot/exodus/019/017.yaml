id: EXO.19.17
reference: Exodus 19:17
source:
  edition: WLC
  text: וַ/יּוֹצֵ֨א מֹשֶׁ֧ה אֶת הָ/עָ֛ם לִ/קְרַ֥את הָֽ/אֱלֹהִ֖ים מִן הַֽ/מַּחֲנֶ֑ה
    וַ/יִּֽתְיַצְּב֖וּ בְּ/תַחְתִּ֥ית הָ/הָֽר־־׃
translation:
  text: Then Moses brought the people out from the camp to meet God, and they took
    their stand at the foot of the mountain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the base of the mountain.' The Hebrew expression refers to the mountain's
      lower part.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצֵא
  chosen: brought ... out
  alternatives:
  - led ... out
  - took ... out
  lexicon: HALOT
  rationale: The Hiphil of יצא is causative, meaning Moses caused the people to go
    out. 'Brought ... out' is natural English and preserves the causative sense without
    over-specifying manner. 'Led ... out' is possible but adds guidance emphasis not
    explicit in the verb itself.
- source_word: לִקְרַאת
  chosen: to meet
  alternatives:
  - to encounter
  - to meet with
  - toward the meeting of
  lexicon: HALOT
  rationale: The preposition + infinitive construction commonly expresses movement
    toward an encounter. 'To meet' is the most idiomatic and accurate English rendering
    here.
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the God
  lexicon: HALOT
  rationale: With the article, Hebrew can still refer to the one true God in a definite
    sense. In English, 'God' is the natural rendering; 'the God' would be awkward
    and misleading here.
- source_word: מִן הַמַּחֲנֶה
  chosen: out from the camp
  alternatives:
  - from the camp
  - out of the camp
  lexicon: HALOT
  rationale: This phrase marks the place from which the people were brought. 'Out
    from the camp' preserves the sense of departure and works smoothly with 'brought
    ... out.'
- source_word: וַיִּתְיַצְּבוּ
  chosen: they took their stand
  alternatives:
  - they stood
  - they stationed themselves
  - they presented themselves
  lexicon: HALOT
  rationale: The Hitpael of יצב often conveys taking one's position or standing in
    readiness. 'They took their stand' reflects the deliberate, formal posture better
    than the flatter 'they stood.'
- source_word: בְּתַחְתִּית
  chosen: at the foot of
  alternatives:
  - at the base of
  - underneath
  - at the lower part of
  lexicon: HALOT
  rationale: In context of a mountain, this noun refers to the lower part/base. The
    idiomatic English expression is 'at the foot of,' which communicates location
    clearly without implying they were physically beneath an overhang.
- source_word: הָהָר
  chosen: the mountain
  alternatives:
  - the hill
  lexicon: HALOT
  rationale: הַר in the Sinai context is best rendered 'mountain.' The article is
    retained in English because the specific mountain in context is in view.
