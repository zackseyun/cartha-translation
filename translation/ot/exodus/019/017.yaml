theological_decisions:
- issue: Rendering of הָאֱלֹהִים in the Sinai theophany
  chosen_reading: God
  alternative_readings:
  - the God
  rationale: The verse describes Israel being brought to encounter the covenant God
    at Sinai. English idiom strongly favors 'God' rather than 'the God,' while still
    preserving the referent as the true God of Israel. No doctrinal tension is created
    or resolved beyond the Hebrew's plain sense.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
