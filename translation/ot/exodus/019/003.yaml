id: EXO.19.3
reference: Exodus 19:3
source:
  edition: WLC
  text: וּ/מֹשֶׁ֥ה עָלָ֖ה אֶל הָ/אֱלֹהִ֑ים וַ/יִּקְרָ֨א אֵלָ֤י/ו יְהוָה֙ מִן הָ/הָ֣ר לֵ/אמֹ֔ר כֹּ֤ה תֹאמַר֙ לְ/בֵ֣ית יַעֲקֹ֔ב וְ/תַגֵּ֖יד לִ/בְנֵ֥י יִשְׂרָאֵֽל־־׃
translation:
  text: And Moses went up to God, and Yahweh called to him from the mountain, saying, “Thus you shall say to the house of Jacob, and tell the sons of Israel:”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the children of Israel' / 'the people of Israel.' The Hebrew reads 'sons of Israel,' a masculine collective expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלָה
  chosen: went up
  alternatives:
  - ascended
  - went up
  lexicon: HALOT
  rationale: The verb denotes upward movement. 'Went up' is natural modern English and preserves the spatial sense without sounding overly elevated like 'ascended.'
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the God
  lexicon: HALOT
  rationale: With the article, the phrase can be rendered literally 'the God,' but in English idiom in this context 'God' is the natural equivalent, referring to Israel's God rather than an indefinite deity.
- source_word: וַיִּקְרָא אֵלָיו
  chosen: called to him
  alternatives:
  - called him
  - proclaimed to him
  lexicon: HALOT
  rationale: קרא with אֶל commonly means 'call to' or 'call out to.' 'Called to him' preserves the prepositional nuance better than the flatter 'called him.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִן הָהָר
  chosen: from the mountain
  alternatives:
  - from the hill-country
  - from the hill
  lexicon: HALOT
  rationale: הַר here refers specifically to Sinai in the immediate context. 'Mountain' is the standard and contextually correct rendering.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: The infinitive introduces direct speech. 'Saying' is the conventional and clear English equivalent.
- source_word: כֹּה תֹאמַר
  chosen: Thus you shall say
  alternatives:
  - This is what you shall say
  - So you shall say
  lexicon: HALOT
  rationale: This formula introduces a formal divine message. 'Thus you shall say' preserves the solemn register and directness of the Hebrew.
- source_word: לְבֵית יַעֲקֹב
  chosen: to the house of Jacob
  alternatives:
  - to Jacob's house
  - to the household of Jacob
  lexicon: HALOT
  rationale: A literal rendering preserves the covenantal and collective sense of Israel as Jacob's house.
- source_word: וְתַגֵּיד
  chosen: and tell
  alternatives:
  - and declare
  - and report
  lexicon: HALOT
  rationale: The Hiphil of נגד can mean 'declare' or 'make known.' 'Tell' is clear modern English and fits the parallelism with 'say' while remaining faithful.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the people of Israel
  lexicon: HALOT
  rationale: Per gender-accurate policy, בְּנֵי is rendered 'sons' rather than a gender-neutral collective. This also preserves the Hebrew parallelism with 'house of Jacob.'
