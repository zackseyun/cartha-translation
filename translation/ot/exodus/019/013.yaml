id: EXO.19.13
reference: Exodus 19:13
source:
  edition: WLC
  text: לֹא תִגַּ֨ע בּ֜/וֹ יָ֗ד כִּֽי סָק֤וֹל יִסָּקֵל֙ אוֹ יָרֹ֣ה יִיָּרֶ֔ה אִם בְּהֵמָ֥ה
    אִם אִ֖ישׁ לֹ֣א יִחְיֶ֑ה בִּ/מְשֹׁךְ֙ הַ/יֹּבֵ֔ל הֵ֖מָּה יַעֲל֥וּ בָ/הָֽר־־־־־׃
translation:
  text: No hand shall touch him, for he must surely be stoned or surely shot; whether
    beast or man, he shall not live. When the ram’s horn sounds a long blast, they
    may go up on the mountain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'No hand shall touch it,' if the pronoun is taken more generally; the
      sense is that the offender must not be touched directly but executed from a
      distance.
    reason: alternative_reading
  - marker: b
    text: Or 'surely pierced.' The Hebrew verb can refer to being shot, likely with
      arrows in this context.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'when the yobel is drawn out'; this likely refers to a prolonged
      blast on a ram’s horn.
    reason: cultural_note
lexical_decisions:
- source_word: תִגַּע בּוֹ יָד
  chosen: No hand shall touch him
  alternatives:
  - No hand shall touch it
  - No one shall touch him with a hand
  lexicon: HALOT
  rationale: The idiom is literally 'a hand shall not touch him/it.' The pronominal
    suffix is masculine singular and most naturally refers to the offender who touched
    the mountain. 'No hand shall touch him' preserves the impersonal legal style and
    the prohibition against direct contact with the condemned person.
- source_word: סָקוֹל יִסָּקֵל
  chosen: he must surely be stoned
  alternatives:
  - he shall surely be stoned
  lexicon: HALOT
  rationale: Infinitive absolute + finite verb intensifies the certainty of the penalty.
    'Must surely be stoned' conveys obligatory certainty in natural English.
- source_word: יָרֹה יִיָּרֶה
  chosen: surely shot
  alternatives:
  - surely pierced
  - surely shot through
  lexicon: HALOT
  rationale: The verb ירה in this stem can denote shooting, especially with arrows.
    In this execution context, 'shot' is the clearest modern English rendering; 'pierced'
    is possible but less specific.
- source_word: אִם בְּהֵמָה אִם אִישׁ
  chosen: whether beast or man
  alternatives:
  - whether animal or man
  - whether beast or person
  lexicon: HALOT
  rationale: The construction marks either category as liable to the same penalty.
    'Beast or man' is concise and preserves the source's gender-accurate singular
    אִישׁ rather than neutralizing it.
- source_word: לֹא יִחְיֶה
  chosen: he shall not live
  alternatives:
  - it shall not live
  - must not remain alive
  lexicon: HALOT
  rationale: This states the required outcome of the violation. 'He shall not live'
    keeps the terse judicial force; the singular can stand generically after the preceding
    either/or construction.
- source_word: בִּמְשֹׁךְ הַיֹּבֵל
  chosen: When the ram’s horn sounds a long blast
  alternatives:
  - At the sounding of the ram's horn
  - When the trumpet sounds long
  lexicon: HALOT
  rationale: יוֹבֵל can denote a ram or ram's horn, and by extension the horn blast.
    With במשׁך ('drawing out, prolonging'), the sense is a prolonged horn signal.
    This rendering makes explicit the idiomatic meaning for modern readers while staying
    close to the Hebrew.
- source_word: הֵמָּה יַעֲלוּ בָהָר
  chosen: they may go up on the mountain
  alternatives:
  - they shall go up on the mountain
  - they may ascend the mountain
  lexicon: HALOT
  rationale: After the long blast, the prior restriction is lifted. 'May go up' captures
    permission more naturally than a simple future, while 'on the mountain' reflects
    the Hebrew preposition.
