theological_decisions:
- issue: Referent of the masculine singular suffix in 'No hand shall touch him'
  chosen_reading: The suffix refers to the violator who touched the mountain, not
    to the mountain itself.
  alternative_readings:
  - The suffix refers more generally to whatever has become taboo by contact
  rationale: The immediate context concerns the person or beast that crosses the boundary
    and must be executed without direct contact. Rendering the suffix personally fits
    the legal logic of the verse and the following penalties.
