id: EXO.19.18
reference: Exodus 19:18
source:
  edition: WLC
  text: וְ/הַ֤ר סִינַי֙ עָשַׁ֣ן כֻּלּ֔/וֹ מִ֠/פְּנֵי אֲשֶׁ֨ר יָרַ֥ד עָלָ֛י/ו יְהוָ֖ה
    בָּ/אֵ֑שׁ וַ/יַּ֤עַל עֲשָׁנ/וֹ֙ כְּ/עֶ֣שֶׁן הַ/כִּבְשָׁ֔ן וַ/יֶּחֱרַ֥ד כָּל הָ/הָ֖ר
    מְאֹֽד־׃
translation:
  text: Now Mount Sinai was all in smoke because the LORD had descended on it in fire,
    and its smoke went up like the smoke of a furnace, and the whole mountain trembled
    greatly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like the smoke of a kiln.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הַר סִינַי
  chosen: Now Mount Sinai
  alternatives:
  - And Mount Sinai
  - Mount Sinai
  lexicon: HALOT
  rationale: הַר סִינַי is straightforwardly 'Mount Sinai.' The prefixed וְ is rendered
    'Now' to introduce the scene naturally in English narrative while preserving the
    discourse connection; 'And' is possible but less idiomatic here.
- source_word: עָשַׁן כֻּלּוֹ
  chosen: was all in smoke
  alternatives:
  - was completely in smoke
  - smoked all over
  - was entirely smoking
  lexicon: HALOT
  rationale: The verb עָשַׁן denotes smoking/smoke-filled. With כֻּלּוֹ ('all of it'),
    the sense is that the mountain was wholly enveloped in smoke. 'Was all in smoke'
    preserves the stative/resultative sense better than the more active 'was smoking'.
- source_word: מִפְּנֵי אֲשֶׁר
  chosen: because
  alternatives:
  - from before that
  - for
  lexicon: HALOT
  rationale: 'This idiom introduces the cause: ''because'' or ''for the reason that.''
    ''Because'' is the clearest natural English rendering.'
- source_word: יָרַד עָלָיו יְהוָה
  chosen: the LORD had descended on it
  alternatives:
  - the LORD descended upon it
  - the LORD came down on it
  lexicon: HALOT
  rationale: יָרַד means 'go down/descend.' The pluperfect 'had descended' fits the
    causal clause in English. עָלָיו is rendered 'on it.' YHWH follows the project's
    default as 'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per project doctrine, the default rendering of יְהוָה is 'the LORD,'
    following Jewish reverence tradition and longstanding covenantal usage.
- source_word: בָּאֵשׁ
  chosen: in fire
  alternatives:
  - with fire
  - as fire
  lexicon: HALOT
  rationale: The preposition ב with אֵשׁ is most naturally rendered 'in fire' here,
    describing the mode/manifestation of the LORD's descent.
- source_word: וַיַּעַל עֲשָׁנוֹ
  chosen: and its smoke went up
  alternatives:
  - and its smoke rose
  - and his smoke went up
  lexicon: HALOT
  rationale: The subject is the mountain's smoke, indicated by the 3ms suffix referring
    back to the mountain. 'Went up' preserves the concrete upward motion of עלה.
- source_word: כְּעֶשֶׁן הַכִּבְשָׁן
  chosen: like the smoke of a furnace
  alternatives:
  - like the smoke of the kiln
  lexicon: HALOT
  rationale: כִּבְשָׁן can denote a furnace or kiln. 'Furnace' is the more familiar
    English image and fits the intense, ominous scene; 'kiln' is a viable lexical
    alternative worth preserving.
- source_word: וַיֶּחֱרַד
  chosen: and trembled
  alternatives:
  - and quaked
  - and shook
  lexicon: HALOT
  rationale: חרד conveys trembling/shaking, often with fearsome intensity. 'Trembled'
    preserves both physical shaking and the awe-laden tone without overinterpreting.
- source_word: כָּל הָהָר מְאֹד
  chosen: the whole mountain trembled greatly
  alternatives:
  - all the mountain trembled violently
  - the entire mountain shook exceedingly
  lexicon: HALOT
  rationale: כָּל הָהָר means 'the whole mountain.' מְאֹד intensifies the verb; 'greatly'
    is a clear, natural equivalent that preserves the emphasis.
