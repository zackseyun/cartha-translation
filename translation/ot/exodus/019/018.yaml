theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse narrates a theophany, but the source text itself uses the covenant
    name יְהוָה. Per doctrine, this is rendered 'the LORD' rather than transliterated
    forms, preserving both reverential convention and continuity with the project's
    stated policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
