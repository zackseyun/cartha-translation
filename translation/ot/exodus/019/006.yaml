id: EXO.19.6
reference: Exodus 19:6
source:
  edition: WLC
  text: וְ/אַתֶּ֧ם תִּהְיוּ לִ֛/י מַמְלֶ֥כֶת כֹּהֲנִ֖ים וְ/ג֣וֹי קָד֑וֹשׁ אֵ֚לֶּה
    הַ/דְּבָרִ֔ים אֲשֶׁ֥ר תְּדַבֵּ֖ר אֶל בְּנֵ֥י יִשְׂרָאֵֽל־־׃
translation:
  text: And you shall be to me a kingdom of priests and a holy nation. These are the
    words that you shall speak to the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "a priestly kingdom"; the Hebrew phrase may be understood as a kingdom
      composed of priests or a kingdom marked by priestly character. Compare 1 Peter
      2:9, which uses the related expression "a royal priesthood."
    reason: lexical_alternative
  - marker: b
    text: '"The sons of Israel" is the Hebrew expression for the people of Israel
      as a whole, not only male Israelites.'
    reason: cultural_note
lexical_decisions:
- source_word: תִּהְיוּ
  chosen: you shall be
  alternatives:
  - you will be
  - you are to be
  lexicon: HALOT
  rationale: Qal imperfect of היה here expresses future/result within the covenant
    declaration. 'Shall be' preserves the solemn promissory force without overinterpreting
    it as mere command.
- source_word: לִי
  chosen: to me
  alternatives:
  - for me
  - mine
  lexicon: HALOT
  rationale: The preposition ל with first person suffix marks relation or belonging.
    'To me' is a natural English rendering that preserves covenantal orientation;
    'mine' would be smoother but less literal.
- source_word: מַמְלֶכֶת כֹּהֲנִים
  chosen: a kingdom of priests
  alternatives:
  - a royal priesthood
  - a priestly kingdom
  lexicon: HALOT
  rationale: The construct phrase most directly means 'a kingdom of priests.' This
    preserves the noun 'kingdom' rather than converting it adjectivally. 'Royal priesthood'
    is influenced by later reception (cf. 1 Pet 2:9) and is not the plainest rendering
    of the Hebrew here.
- source_word: גּוֹי קָדוֹשׁ
  chosen: a holy nation
  alternatives:
  - a sacred nation
  lexicon: HALOT
  rationale: Standard and accurate rendering of the noun-adjective phrase. 'Holy'
    preserves covenantal and theological resonance better than 'sacred'.
- source_word: אֵלֶּה הַדְּבָרִים
  chosen: These are the words
  alternatives:
  - These are the matters
  - This is what
  lexicon: HALOT
  rationale: דברים commonly means 'words' in direct speech contexts. The more expansive
    'matters' is possible in some contexts but less fitting before 'you shall speak.'
- source_word: תְּדַבֵּר
  chosen: you shall speak
  alternatives:
  - you are to speak
  - you must speak
  lexicon: HALOT
  rationale: Piel imperfect second masculine singular addressed to Moses. 'You shall
    speak' matches the formal directive tone and aligns with the preceding future-style
    wording.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Per gender-accurate policy, the masculine plural construct is preserved
    as 'sons of Israel.' While idiomatically it refers to the covenant people broadly,
    the source expression is explicitly filial and masculine in form; more idiomatic
    alternatives are possible but less formally transparent.
