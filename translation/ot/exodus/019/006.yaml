theological_decisions:
- issue: Corporate identity of Israel in covenant vocation
  chosen_reading: a kingdom of priests
  alternative_readings:
  - a royal priesthood
  - a priestly kingdom
  rationale: The Hebrew presents Israel corporately as a kingdom characterized by
    priests, not merely as possessing royal status. This preserves the text's own
    covenantal formulation without importing later New Testament phrasing into the
    main text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
- issue: Gendered covenant designation
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  - the children of Israel
  rationale: The source phrase is grammatically masculine plural and idiomatically
    corporate. Following the gender-accurate policy, the translation keeps the filial
    wording in the main text while a footnote can clarify the inclusive referent.
  doctrine_reference: 'Translation philosophy: Gender-accurate over gender-neutral.'
