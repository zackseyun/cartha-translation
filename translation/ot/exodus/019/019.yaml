theological_decisions:
- issue: Nature of God's response at Sinai
  chosen_reading: God answered Moses 'with a voice'
  alternative_readings:
  - God answered him in thunder
  - God answered him audibly
  rationale: The Hebrew בְּקוֹל is lexically broad enough to allow 'voice' or a more
    phenomenological 'sound/thunder,' but the text itself does not specify thunder
    here. To preserve theological tension and avoid importing an interpretive resolution,
    the main text keeps 'with a voice,' while alternatives are preserved in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
