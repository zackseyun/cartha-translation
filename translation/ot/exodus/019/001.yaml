theological_decisions:
- issue: Rendering of the covenant people designation בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: This is not a doctrinally disputed phrase, but it intersects with the
    project's gender-accurate policy. Because the Hebrew masculine plural is the conventional
    national designation and not merely an abstract ethnonym, the more transparent
    rendering 'sons of Israel' is preferred in the main text, with common English
    alternatives preserved in documentation.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
