id: EXO.19.1
reference: Exodus 19:1
source:
  edition: WLC
  text: בַּ/חֹ֨דֶשׁ֙ הַ/שְּׁלִישִׁ֔י לְ/צֵ֥את בְּנֵי יִשְׂרָאֵ֖ל מֵ/אֶ֣רֶץ מִצְרָ֑יִם
    בַּ/יּ֣וֹם הַ/זֶּ֔ה בָּ֖אוּ מִדְבַּ֥ר סִינָֽי־׃
translation:
  text: In the third month after the sons of Israel had gone out from the land of
    Egypt, on this very day they came to the wilderness of Sinai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or 'the children of Israel.' The Hebrew reads 'the sons
      of Israel.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''on this day.'' The phrase may emphasize the exact day of arrival:
      ''on this very day.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחֹדֶשׁ הַשְּׁלִישִׁי
  chosen: in the third month
  alternatives:
  - in the third new moon/month
  lexicon: HALOT
  rationale: חֹדֶשׁ commonly denotes 'month' in temporal dating formulas. 'In the
    third month' is natural English and fits the chronological notice.
- source_word: לְצֵאת
  chosen: after ... had gone out
  alternatives:
  - when ... went out
  - at the going out of
  lexicon: HALOT
  rationale: 'The infinitive construct with ל marks the reference point of time: ''at/after
    the going out of.'' In idiomatic English, ''after ... had gone out'' best conveys
    the temporal relationship with the following date notice.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' Per the project's gender-accurate
    philosophy, the masculine form is preserved where it functions as the covenant
    people’s designation. 'Israelites' is possible but less transparent to the source
    wording.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of Egypt
  lexicon: HALOT
  rationale: אֶרֶץ is explicitly present and means 'land.' Retaining 'land of Egypt'
    preserves the full expression without awkwardness.
- source_word: בַּיּוֹם הַזֶּה
  chosen: on this very day
  alternatives:
  - on that day
  - on this day
  lexicon: HALOT
  rationale: The demonstrative 'this' is explicit. 'This very day' brings out the
    Hebrew emphasis and avoids the misleading retrospective sense of 'that day.'
- source_word: בָּאוּ
  chosen: they came
  alternatives:
  - they arrived
  - they entered
  lexicon: HALOT
  rationale: בוא is the standard verb 'come/enter.' 'They came' is the most direct
    rendering; 'arrived' is interpretive.
- source_word: מִדְבַּר סִינָי
  chosen: the wilderness of Sinai
  alternatives:
  - the desert of Sinai
  - the Sinai wilderness
  lexicon: HALOT
  rationale: מִדְבָּר denotes wilderness/desert terrain. 'Wilderness of Sinai' is
    a standard, readable rendering that preserves the construct relationship and avoids
    over-specifying aridity.
