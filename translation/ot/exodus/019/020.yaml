theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse narrates the LORD's descent and call to Moses. The translation
    preserves the covenant name through the standard English surrogate 'the LORD'
    in keeping with the project's doctrine and avoids importing a preference for a
    reconstructed pronunciation into the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
