id: EXO.19.20
reference: Exodus 19:20
source:
  edition: WLC
  text: וַ/יֵּ֧רֶד יְהוָ֛ה עַל הַ֥ר סִינַ֖י אֶל רֹ֣אשׁ הָ/הָ֑ר וַ/יִּקְרָ֨א יְהוָ֧ה לְ/מֹשֶׁ֛ה אֶל רֹ֥אשׁ הָ/הָ֖ר וַ/יַּ֥עַל מֹשֶֽׁה־־־׃
translation:
  text: And Yahweh came down on Mount Sinai, to the top of the mountain. Then Yahweh called Moses to the top of the mountain, and Moses went up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descended on Mount Sinai, to the summit of the mountain.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to the head of the mountain,' that is, 'to the top/summit of the mountain.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרֶד
  chosen: came down
  alternatives:
  - descended
  lexicon: HALOT
  rationale: The verb ירד means 'go down/come down, descend.' 'Came down' is natural modern English and preserves the directional movement without sounding overly formal.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַר סִינַי
  chosen: Mount Sinai
  alternatives:
  - the mountain of Sinai
  lexicon: HALOT
  rationale: Standard English rendering of the place name; concise and idiomatic while fully equivalent to the Hebrew construct.
- source_word: אֶל רֹאשׁ הָהָר
  chosen: to the top of the mountain
  alternatives:
  - to the summit of the mountain
  - onto the top of the mountain
  lexicon: HALOT
  rationale: רֹאשׁ literally means 'head,' here idiomatically the top or summit. 'Top of the mountain' is clear, natural, and preserves the spatial imagery.
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - summoned
  lexicon: HALOT
  rationale: קרא in this context means to call to someone. 'Called' is the most direct rendering; 'summoned' is possible but slightly more interpretive.
- source_word: לְמֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - ascended
  lexicon: HALOT
  rationale: עלה means 'go up.' 'Went up' matches the narrative style and contrasts naturally with 'came down' earlier in the verse.
