id: EXO.19.23
reference: Exodus 19:23
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר מֹשֶׁה֙ אֶל יְהוָ֔ה לֹא יוּכַ֣ל הָ/עָ֔ם לַ/עֲלֹ֖ת אֶל הַ֣ר סִינָ֑י
    כִּֽי אַתָּ֞ה הַעֵדֹ֤תָה בָּ֨/נוּ֙ לֵ/אמֹ֔ר הַגְבֵּ֥ל אֶת הָ/הָ֖ר וְ/קִדַּשְׁתּֽ/וֹ־־־־־׃
translation:
  text: And Moses said to the LORD, “The people cannot go up to Mount Sinai, because
    you yourself warned us, saying, ‘Set bounds around the mountain and consecrate
    it.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'solemnly charged us' or 'testified to us.' The Hebrew verb can carry
      the sense of giving formal warning or witness.
    reason: lexical_alternative
  - marker: b
    text: Or 'Set a boundary for the mountain and sanctify it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the covenant name YHWH is rendered 'the LORD' rather
    than transliterated forms, following established reverential convention and the
    LXX/English Bible pattern.
- source_word: לֹא יוּכַל
  chosen: cannot
  alternatives:
  - is not able to
  - will not be able to
  lexicon: HALOT
  rationale: יכל in the imperfect here expresses inability, not mere permission. 'Cannot'
    is natural modern English and preserves Moses' claim that ascent is not possible
    for the people under the present restriction.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: עם here refers to the assembled Israelites collectively. 'The people'
    is the standard and most natural rendering in context.
- source_word: לַעֲלֹת אֶל הַר סִינַי
  chosen: go up to Mount Sinai
  alternatives:
  - ascend Mount Sinai
  - go up onto Mount Sinai
  lexicon: HALOT
  rationale: עלה literally means 'go up/ascend.' 'Go up to Mount Sinai' preserves
    the vertical sense while remaining idiomatic. 'Mount Sinai' is the conventional
    English form for הַר סִינַי.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces Moses' reason for the statement. 'Because' is the
    clearest contemporary English connector.
- source_word: אַתָּה
  chosen: you yourself
  alternatives:
  - you
  - you personally
  lexicon: HALOT
  rationale: The explicit pronoun adds emphasis beyond the verbal form already marking
    second person. 'You yourself' reflects that emphasis naturally.
- source_word: הַעֵדֹתָה בָּנוּ
  chosen: warned us
  alternatives:
  - testified to us
  - solemnly charged us
  - gave witness to us
  lexicon: HALOT
  rationale: The Hiphil of עוד in this context means to warn or solemnly admonish.
    'Warned us' best fits the Sinai boundary context and communicates the force of
    prior divine instruction.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - by saying
  lexicon: HALOT
  rationale: Standard rendering of the infinitive introducing direct speech.
- source_word: הַגְבֵּל אֶת הָהָר
  chosen: Set bounds around the mountain
  alternatives:
  - Mark off the mountain
  - Set a boundary for the mountain
  lexicon: HALOT
  rationale: The Hiphil imperative of גבל means to set a boundary or limit. 'Set bounds
    around the mountain' is idiomatic and echoes the earlier command in the immediate
    context.
- source_word: וְקִדַּשְׁתּוֹ
  chosen: and consecrate it
  alternatives:
  - and make it holy
  - and sanctify it
  lexicon: HALOT
  rationale: קדשׁ in the Piel means to set apart as holy. 'Consecrate it' is readable
    modern English that preserves the cultic sense better than the more generic 'make
    it holy.'
