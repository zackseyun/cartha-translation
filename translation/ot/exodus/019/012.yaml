id: EXO.19.12
reference: Exodus 19:12
source:
  edition: WLC
  text: וְ/הִגְבַּלְתָּ֤ אֶת הָ/עָם֙ סָבִ֣יב לֵ/אמֹ֔ר הִשָּׁמְר֥וּ לָ/כֶ֛ם עֲל֥וֹת
    בָּ/הָ֖ר וּ/נְגֹ֣עַ בְּ/קָצֵ֑/הוּ כָּל הַ/נֹּגֵ֥עַ בָּ/הָ֖ר מ֥וֹת יוּמָֽת־־׃
translation:
  text: And you shall set bounds for the people all around, saying, ‘Be careful not
    to go up on the mountain or touch its edge. Whoever touches the mountain shall
    surely be put to death.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'shall surely die.' The Hebrew expression is an emphatic death formula;
      here it is rendered 'shall surely be put to death' to reflect the passive form
      and the immediate context of imposed execution in the next verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִגְבַּלְתָּ
  chosen: you shall set bounds
  alternatives:
  - you shall mark off limits
  - you shall fence off
  lexicon: HALOT
  rationale: Hiphil of גבל means to set a boundary or limit. 'Set bounds' is natural
    English and preserves the concrete sense of establishing a restricted perimeter.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: עם here refers to the assembled Israelites as a collective. 'The people'
    is the standard contextual rendering.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  - on every side
  lexicon: HALOT
  rationale: The adverb/noun indicates surrounding on every side. 'All around' clearly
    conveys the perimeter sense tied to the boundary-setting.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and say
  lexicon: HALOT
  rationale: The infinitive introduces the content of the command. 'Saying' fits standard
    English representation of direct speech introduction.
- source_word: הִשָּׁמְרוּ לָכֶם
  chosen: Be careful
  alternatives:
  - Take care
  - Guard yourselves
  lexicon: HALOT
  rationale: Niphal imperative of שׁמר with לָכֶם is an idiom meaning to watch yourselves
    or take care. 'Be careful' is idiomatic modern English while preserving the warning
    force.
- source_word: עֲלוֹת בָּהָר
  chosen: to go up on the mountain
  alternatives:
  - to ascend the mountain
  - to go up the mountain
  lexicon: HALOT
  rationale: עלה with בהר refers to ascending onto the mountain. 'Go up on the mountain'
    is clear and natural.
- source_word: וּנְגֹעַ בְּקָצֵהוּ
  chosen: or touch its edge
  alternatives:
  - or touch its border
  - or touch the edge of it
  lexicon: HALOT
  rationale: נגע means touch; קצהו means its extremity/edge. 'Its edge' preserves
    the spatial boundary idea established earlier.
- source_word: כָּל הַנֹּגֵעַ בָּהָר
  chosen: Whoever touches the mountain
  alternatives:
  - Everyone touching the mountain
  - Anyone who touches the mountain
  lexicon: HALOT
  rationale: The construction is generic and distributive. 'Whoever touches the mountain'
    is idiomatic and preserves the universal warning.
- source_word: מוֹת יוּמָת
  chosen: shall surely be put to death
  alternatives:
  - shall surely die
  - must certainly be executed
  lexicon: HALOT
  rationale: Infinitive absolute plus passive/imperfect intensifies certainty. Because
    the following context specifies execution by others (v.13), 'be put to death'
    best captures the passive force here, while 'surely' reflects the infinitive absolute.
