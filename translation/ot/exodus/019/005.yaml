id: EXO.19.5
reference: Exodus 19:5
source:
  edition: WLC
  text: וְ/עַתָּ֗ה אִם שָׁמ֤וֹעַ תִּשְׁמְעוּ֙ בְּ/קֹלִ֔/י וּ/שְׁמַרְתֶּ֖ם אֶת בְּרִיתִ֑/י
    וִ/הְיִ֨יתֶם לִ֤/י סְגֻלָּה֙ מִ/כָּל הָ֣/עַמִּ֔ים כִּי לִ֖/י כָּל הָ/אָֽרֶץ־־־־־׃
translation:
  text: And now, if you will indeed listen to my voice and keep my covenant, then
    you will be my treasured possession out of all the peoples, for all the earth
    is mine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if you truly obey my voice.' The Hebrew expression literally says 'if
      listening you will listen,' an emphatic form meaning to listen attentively or
      obediently.
    reason: lexical_alternative
  - marker: b
    text: Or 'my special possession' or 'my own possession.'
    reason: lexical_alternative
  - marker: c
    text: That is, from among all the nations/peoples; the next clause clarifies that
      the whole earth still belongs to God.
    reason: cross_reference
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Introduces the covenantal consequence flowing from the preceding context.
    'And now' preserves the connective ו plus temporal adverb more fully than simply
    'Now'.
- source_word: אִם
  chosen: if
  lexicon: HALOT
  rationale: Standard conditional marker introducing the protasis.
- source_word: שָׁמֹעַ תִּשְׁמְעוּ
  chosen: you will indeed listen
  alternatives:
  - you truly obey
  - you will surely listen
  - you diligently listen
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the verbal idea. 'Listen'
    keeps the auditory/covenantal nuance of שמע, while 'indeed' conveys emphasis without
    overparaphrasing into 'obey' in the main text.
- source_word: בְּקֹלִי
  chosen: to my voice
  alternatives:
  - my voice
  - to me
  lexicon: HALOT
  rationale: The idiom שמע בקול means to listen to/heed someone's voice. 'To my voice'
    is natural English and preserves the concrete Hebrew expression better than abstracting
    to 'obey me'.
- source_word: וּשְׁמַרְתֶּם
  chosen: and keep
  alternatives:
  - and guard
  - and observe
  lexicon: HALOT
  rationale: שׁמר in covenant contexts commonly means to keep/observe faithfully.
    'Keep' is idiomatic and suitably covenantal.
- source_word: בְּרִיתִי
  chosen: my covenant
  lexicon: HALOT
  rationale: Standard rendering of ברית in Sinai context; no reason to weaken to 'agreement'
    or similar.
- source_word: וִהְיִיתֶם לִי
  chosen: then you will be my
  alternatives:
  - and you will be to me
  lexicon: HALOT
  rationale: Future-result sense after the condition is clear. 'Then' makes the apodosis
    explicit in natural English while preserving the covenant formula 'be ... to me'.
- source_word: סְגֻלָּה
  chosen: treasured possession
  alternatives:
  - special possession
  - own possession
  - treasure
  lexicon: HALOT
  rationale: סגלה denotes a valued property specially possessed by a king or owner.
    'Treasured possession' is established, accurate, and communicates both value and
    belonging.
- source_word: מִכָּל הָעַמִּים
  chosen: out of all the peoples
  alternatives:
  - from among all the peoples
  - above all the peoples
  lexicon: HALOT
  rationale: מן here marks selection from among the nations/peoples. 'Out of all the
    peoples' avoids implying absolute exclusion while preserving Israel's distinct
    status among the nations.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'Introduces the grounding reason for the preceding statement: Israel''s
    election does not deny God''s universal ownership.'
- source_word: לִי כָּל הָאָרֶץ
  chosen: all the earth is mine
  alternatives:
  - the whole earth belongs to me
  - all the land is mine
  lexicon: HALOT
  rationale: אָרֶץ here is best taken universally as 'earth,' not merely 'land,' because
    it grounds God's claim over 'all the peoples.' 'Is mine' preserves the possessive
    emphasis of לִי.
