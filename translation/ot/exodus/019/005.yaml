theological_decisions:
- issue: Whether שמע should be rendered as 'listen' or 'obey' in covenantal context
  chosen_reading: listen ... to my voice
  alternative_readings:
  - obey my voice
  - obey me
  rationale: The Hebrew idiom carries obedient hearing, but the text literally foregrounds
    hearing/listening. Rendering 'listen' preserves the concrete covenantal language
    and lets the following 'keep my covenant' express the obedience dimension explicitly.
  doctrine_reference: Translation philosophy §1, §3
- issue: How to express Israel's status as סגלה without overstating exclusivity
  chosen_reading: my treasured possession out of all the peoples
  alternative_readings:
  - my special possession above all peoples
  - my own possession from among all peoples
  rationale: The phrase affirms Israel's distinctive covenant role while the following
    clause affirms God's ownership of the whole earth. The chosen wording preserves
    both election and universality without importing later theological systems.
  doctrine_reference: Translation philosophy §3
