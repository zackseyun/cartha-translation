id: EXO.19.2
reference: Exodus 19:2
source:
  edition: WLC
  text: וַ/יִּסְע֣וּ מֵ/רְפִידִ֗ים וַ/יָּבֹ֨אוּ֙ מִדְבַּ֣ר סִינַ֔י וַֽ/יַּחֲנ֖וּ בַּ/מִּדְבָּ֑ר
    וַ/יִּֽחַן שָׁ֥ם יִשְׂרָאֵ֖ל נֶ֥גֶד הָ/הָֽר־׃
translation:
  text: They set out from Rephidim and came to the wilderness of Sinai, and they camped
    in the wilderness. There Israel camped before the mountain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'opposite the mountain.' The Hebrew preposition can denote a position
      facing or in front of something.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: נסע in the travel narrative commonly denotes breaking camp and moving
    on. 'Set out' is natural modern English and preserves the narrative movement better
    than the more formal 'journeyed.'
- source_word: מֵרְפִידִים
  chosen: from Rephidim
  lexicon: HALOT
  rationale: Proper place name; transliterated per translation philosophy ('translate
    titles; transliterate names'). The prefixed preposition מ is rendered 'from.'
- source_word: וַיָּבֹאוּ
  chosen: and came
  alternatives:
  - and arrived
  - and entered
  lexicon: HALOT
  rationale: בוא broadly means 'come/enter/arrive.' 'Came' fits the sequence smoothly
    with the destination phrase that follows.
- source_word: מִדְבַּר סִינַי
  chosen: the wilderness of Sinai
  alternatives:
  - the desert of Sinai
  - the Sinai wilderness
  lexicon: HALOT
  rationale: מִדְבָּר denotes wilderness/desert land. 'Wilderness' is the standard
    and contextually appropriate rendering in Exodus. The construct phrase is rendered
    naturally as 'the wilderness of Sinai.'
- source_word: וַיַּחֲנוּ
  chosen: and they camped
  alternatives:
  - and they encamped
  lexicon: HALOT
  rationale: חנה means to camp/encamp. 'Camped' is more readable modern English than
    'encamped' while preserving the sense.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: Repeated use of מִדְבָּר is kept with the same English gloss for consistency.
    The article and preposition are reflected by 'in the wilderness.'
- source_word: וַיִּחַן
  chosen: There Israel camped
  alternatives:
  - and Israel camped there
  lexicon: HALOT
  rationale: The singular verb with the collective noun יִשְׂרָאֵל is preserved naturally
    in English by making 'Israel' the singular collective subject. Fronting 'There'
    reflects the Hebrew שָׁם placement and gives slight emphasis to the location.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Here the national collective is intended, not the patriarch Jacob individually.
    Standard transliteration is retained.
- source_word: נֶגֶד הָהָר
  chosen: before the mountain
  alternatives:
  - opposite the mountain
  - in front of the mountain
  lexicon: HALOT
  rationale: נֶגֶד indicates being in front of, opposite, or before. 'Before the mountain'
    is idiomatic and preserves the spatial relation without over-specifying exact
    orientation. The article on הָהָר is represented by 'the mountain,' referring
    to the specific mountain in context.
