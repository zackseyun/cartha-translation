id: EXO.19.21
reference: Exodus 19:21
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל מֹשֶׁ֔ה רֵ֖ד הָעֵ֣ד בָּ/עָ֑ם פֶּן יֶהֶרְס֤וּ אֶל יְהוָה֙ לִ/רְא֔וֹת וְ/נָפַ֥ל מִמֶּ֖/נּוּ רָֽב־־־׃
translation:
  text: And Yahweh said to Moses, “Go down; warn the people, lest they break through to Yahweh to look, and many of them fall.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to see.' The Hebrew verb can mean either 'look' or 'see'; here it refers to attempting to look upon the LORD’s manifestation.
    reason: lexical_alternative
  - marker: b
    text: Literally 'and many from among them fall.' The verb 'fall' may imply death in this context, but the Hebrew does not state it more explicitly.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: רֵד
  chosen: Go down
  alternatives:
  - Descend
  lexicon: HALOT
  rationale: Imperative of ירד. 'Go down' is natural modern English and preserves the directional force without sounding overly formal.
- source_word: הָעֵד
  chosen: warn
  alternatives:
  - testify to
  - solemnly warn
  lexicon: HALOT
  rationale: The Hifil of עוד here carries the sense of giving a warning or solemn charge. In context, Moses is to caution the people against approaching the mountain boundary. 'Warn' is concise and contextually precise.
- source_word: בָּעָם
  chosen: the people
  alternatives:
  - the people group
  - the nation
  lexicon: HALOT
  rationale: עם in this Sinai context refers to Israel collectively. 'The people' is the standard and most natural rendering.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - so that not
  lexicon: HALOT
  rationale: Introduces a negative purpose/result clause. 'Lest' is concise and idiomatic in warning contexts, and remains readily understandable here.
- source_word: יֶהֶרְסוּ
  chosen: break through
  alternatives:
  - break out
  - burst through
  - force their way through
  lexicon: HALOT
  rationale: From הרס in this context of crossing a forbidden boundary. 'Break through' best conveys violating the set limit around the holy mountain.
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - toward the LORD
  lexicon: HALOT
  rationale: The preposition marks movement toward the divine presence. 'To the LORD' fits the warning about unauthorized approach.
- source_word: לִרְאוֹת
  chosen: to look
  alternatives:
  - to see
  - to gaze
  lexicon: HALOT
  rationale: 'The infinitive expresses purpose: they might break through in order to see/look. ''To look'' preserves the concrete action and avoids overstating visionary language.'
- source_word: וְנָפַל
  chosen: and many of them fall
  alternatives:
  - and a great number of them fall
  - and many from among them perish
  lexicon: HALOT
  rationale: נפל literally means 'fall.' In this judgment context it likely implies death, but the Hebrew uses the more general verb. Rendering it as 'fall' preserves the source wording and leaves the consequence appropriately implicit.
- source_word: מִמֶּנּוּ רָב
  chosen: many of them
  alternatives:
  - a great number from among them
  - many from among them
  lexicon: HALOT
  rationale: This phrase is idiomatic for a large number from the group. 'Many of them' is clear, natural English and captures the quantitative force of רָב.
