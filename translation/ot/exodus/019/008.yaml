theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Following the project's stated
    default for יְהוָה, it is rendered 'the LORD' rather than transliterated forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to render נַעֲשֶׂה as obedience language
  chosen_reading: we will do
  alternative_readings:
  - we will obey
  rationale: Although the covenant context implies obedience, the Hebrew verb is simply
    'do/make.' Preserving 'do' avoids importing a stronger interpretive gloss than
    the text explicitly states.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy
    over translation tradition; preserve what the source text plainly says'
