id: EXO.19.22
reference: Exodus 19:22
source:
  edition: WLC
  text: וְ/גַ֧ם הַ/כֹּהֲנִ֛ים הַ/נִּגָּשִׁ֥ים אֶל יְהוָ֖ה יִתְקַדָּ֑שׁוּ פֶּן יִפְרֹ֥ץ בָּ/הֶ֖ם יְהוָֽה־־׃
translation:
  text: And even the priests who come near to Yahweh must consecrate themselves, lest Yahweh break out against them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "who approach the LORD" or "who draw near to the LORD."
    reason: lexical_alternative
  - marker: b
    text: Or "break forth upon them." The Hebrew depicts a sudden outbreak of the LORD's judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: And even
  alternatives:
  - Also
  - And also
  lexicon: HALOT
  rationale: Conveys additive emphasis, linking this warning to the prior commands while stressing that the priests too are included.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֲנִים in cultic context; definite article preserved.
- source_word: הַנִּגָּשִׁים אֶל יְהוָה
  chosen: who come near to the LORD
  alternatives:
  - who approach the LORD
  - who draw near to the LORD
  lexicon: HALOT
  rationale: The participle of נגשׁ denotes approaching for access or service. 'Come near' is natural English and preserves the cultic sense of approaching God's presence.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and established covenantal usage.
- source_word: יִתְקַדָּשׁוּ
  chosen: must consecrate themselves
  alternatives:
  - must sanctify themselves
  - must make themselves holy
  lexicon: HALOT
  rationale: Hitpael/reflexive sense indicates that the priests are to set themselves apart as holy. 'Consecrate themselves' is clear modern English with appropriate cultic force.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - so that not
  lexicon: HALOT
  rationale: Best concise English marker of warning and negative consequence.
- source_word: יִפְרֹץ בָּהֶם
  chosen: break out against them
  alternatives:
  - break forth upon them
  - burst out against them
  lexicon: HALOT
  rationale: The verb פרץ here depicts a sudden outbreak of divine judgment. 'Break out against them' preserves the vividness without over-paraphrasing.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Repeated explicitly in Hebrew at the end for emphasis; retained in English rather than replaced with a pronoun.
