theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nature of the warning in יִפְרֹץ בָּהֶם יְהוָה
  chosen_reading: a warning of sudden divine judgment if the priests are not consecrated
  alternative_readings:
  - a more general statement that the LORD might break through to them
  rationale: In context, Sinai boundary violations bring dangerous divine outbreak. 'Against them' makes explicit the hostile consequence implied by the preposition and context, without adding a specific mode of punishment not stated in the text.
