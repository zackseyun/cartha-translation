theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of בְּךָ יַאֲמִינוּ in relation to Moses
  chosen_reading: may also believe you
  alternative_readings:
  - may also trust you
  - may also believe in you
  rationale: The verse concerns the people's enduring acceptance of Moses as the authenticated mediator through whom God speaks. 'Believe you' preserves that they will credit Moses' words, without implying worship or a stronger theological claim than the Hebrew requires.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
