id: EXO.19.9
reference: Exodus 19:9
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל מֹשֶׁ֗ה הִנֵּ֨ה אָנֹכִ֜י בָּ֣א אֵלֶי/ךָ֮ בְּ/עַ֣ב הֶֽ/עָנָן֒ בַּ/עֲב֞וּר יִשְׁמַ֤ע הָ/עָם֙ בְּ/דַבְּרִ֣/י עִמָּ֔/ךְ וְ/גַם בְּ/ךָ֖ יַאֲמִ֣ינוּ לְ/עוֹלָ֑ם וַ/יַּגֵּ֥ד מֹשֶׁ֛ה אֶת דִּבְרֵ֥י הָ/עָ֖ם אֶל יְהוָֽה־־־־׃
translation:
  text: And Yahweh said to Moses, “Behold, I am coming to you in a thick cloud, so that the people may hear when I speak with you, and may also believe in you forever.” Then Moses told Yahweh the words of the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'may also trust you' or 'may also believe in you.' The Hebrew can express confidence in Moses as God's accredited spokesman.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Retains the deictic force and solemnity of the Hebrew discourse marker in direct speech without paraphrasing it away.
- source_word: בָּא
  chosen: I am coming
  alternatives:
  - I come
  - I will come
  lexicon: HALOT
  rationale: The participial form conveys imminent or ongoing action; 'I am coming' captures the vividness better than a simple future.
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - toward you
  lexicon: HALOT
  rationale: Natural English rendering of the prepositional phrase with second masculine singular suffix, addressed to Moses.
- source_word: בְּעַב הֶעָנָן
  chosen: in a thick cloud
  alternatives:
  - in the thickness of the cloud
  - in a dense cloud
  lexicon: HALOT
  rationale: The phrase denotes dense cloud cover; 'thick cloud' is idiomatic and preserves the imagery.
- source_word: בַּעֲבוּר
  chosen: so that
  alternatives:
  - for the sake of
  - because of
  lexicon: HALOT
  rationale: Here the term introduces purpose, not merely cause; 'so that' best fits the clause that follows.
- source_word: יִשְׁמַע הָעָם
  chosen: the people may hear
  alternatives:
  - the people will hear
  lexicon: HALOT
  rationale: After a purpose marker, the imperfect is well rendered as purposive/subjunctive in English.
- source_word: בְּדַבְּרִי עִמָּךְ
  chosen: when I speak with you
  alternatives:
  - in my speaking with you
  - while I speak with you
  lexicon: HALOT
  rationale: The infinitive construct with prefixed preposition is naturally rendered temporally here. 'With you' reflects the relational sense of עִם.
- source_word: וְגַם בְּךָ יַאֲמִינוּ
  chosen: and may also believe you
  alternatives:
  - and may also trust you
  - and may also believe in you
  lexicon: HALOT
  rationale: The Hiphil of אמן with ב can mean believe/trust in someone. Here the context is validating Moses as God's spokesman; 'believe you' expresses confidence in Moses' words more idiomatically in English, while avoiding an over-theologized 'believe in you'.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for all time
  - perpetually
  lexicon: HALOT
  rationale: Conveys enduring duration in clear modern English.
- source_word: וַיַּגֵּד
  chosen: Then Moses told
  alternatives:
  - And Moses reported
  - And Moses declared
  lexicon: HALOT
  rationale: Narrative wayyiqtol advances the story. 'Told' is straightforward modern English for reporting speech content.
- source_word: דִּבְרֵי הָעָם
  chosen: the words of the people
  alternatives:
  - the people's words
  - what the people said
  lexicon: HALOT
  rationale: Keeps the lexical sense 'words' rather than paraphrasing, while remaining natural enough in English.
