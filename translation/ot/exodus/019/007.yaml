id: EXO.19.7
reference: Exodus 19:7
source:
  edition: WLC
  text: וַ/יָּבֹ֣א מֹשֶׁ֔ה וַ/יִּקְרָ֖א לְ/זִקְנֵ֣י הָ/עָ֑ם וַ/יָּ֣שֶׂם לִ/פְנֵי/הֶ֗ם אֵ֚ת כָּל הַ/דְּבָרִ֣ים הָ/אֵ֔לֶּה אֲשֶׁ֥ר צִוָּ֖/הוּ יְהוָֽה־׃
translation:
  text: So Moses came and called for the elders of the people, and set before them all these words that Yahweh had commanded him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'summoned the elders of the people.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all these matters' or 'all these things.' The Hebrew word can refer either to spoken words or to matters under discussion; here 'words' is chosen because Moses is relaying the LORD's message.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  lexicon: HALOT
  rationale: The verb בוא commonly means 'come/go' depending on deictic perspective. In English narrative, 'came' is natural here as Moses returns from the LORD to the people.
- source_word: וַיִּקְרָא לְזִקְנֵי הָעָם
  chosen: called for the elders of the people
  alternatives:
  - called to the elders of the people
  - summoned the elders of the people
  lexicon: HALOT
  rationale: קרא with ל can mean to call to or call for. 'Called for' best fits the context of gathering representatives before delivering the message; 'summoned' is possible but slightly stronger than the Hebrew requires.
- source_word: זִקְנֵי הָעָם
  chosen: the elders of the people
  alternatives:
  - the leaders of the people
  lexicon: HALOT
  rationale: זקנים literally means 'elders' and refers to recognized senior representatives. 'Elders' preserves the social-political nuance without overinterpreting as merely generic leaders.
- source_word: וַיָּשֶׂם לִפְנֵיהֶם
  chosen: set before them
  alternatives:
  - placed before them
  - presented to them
  lexicon: HALOT
  rationale: שׂים plus לפני literally means 'set/place before.' 'Set before them' preserves the concrete idiom while remaining natural in English for laying out words or matters.
- source_word: כָּל הַדְּבָרִים הָאֵלֶּה
  chosen: all these words
  alternatives:
  - all these matters
  - all these things
  lexicon: HALOT
  rationale: דברים can mean 'words,' 'matters,' or 'things.' Here Moses is relaying divine speech from the preceding verses, so 'words' best preserves the verbal content.
- source_word: אֲשֶׁר צִוָּהוּ יְהוָה
  chosen: that the LORD had commanded him
  alternatives:
  - which the LORD commanded him
  lexicon: HALOT
  rationale: The clause identifies the source and authority of the message. The pluperfect 'had commanded' fits the sequence in English, since the command preceded Moses' speaking. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name, preserving the traditional small-caps covenantal rendering in standard English form.
