id: EXO.19.11
reference: Exodus 19:11
source:
  edition: WLC
  text: וְ/הָי֥וּ נְכֹנִ֖ים לַ/יּ֣וֹם הַ/שְּׁלִישִׁ֑י כִּ֣י בַּ/יּ֣וֹם הַ/שְּׁלִישִׁ֗י יֵרֵ֧ד יְהוָ֛ה לְ/עֵינֵ֥י כָל הָ/עָ֖ם עַל הַ֥ר סִינָֽי׀־־׃
translation:
  text: and let them be ready for the third day, because on the third day Yahweh will come down in the sight of all the people on Mount Sinai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "in the sight of all the people."'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיוּ
  chosen: and let them be
  alternatives:
  - and they shall be
  - and they must be
  lexicon: HALOT
  rationale: Though formally a qatal of היה ('be'), in this instructional context following prior commands it carries an injunctive force in English. 'Let them be' preserves the command sense without sounding overly wooden.
- source_word: נְכֹנִים
  chosen: ready
  alternatives:
  - prepared
  - established
  lexicon: HALOT
  rationale: The adjective from כון here refers to being prepared or in readiness for the event. 'Ready' is natural modern English and fits the ritual-preparation context.
- source_word: לַיּוֹם הַשְּׁלִישִׁי
  chosen: for the third day
  alternatives:
  - by the third day
  - for day three
  lexicon: HALOT
  rationale: The preposition ל marks the time aimed at or designated for readiness. 'For the third day' best captures preparation in view of that day; 'by the third day' is possible but slightly shifts the nuance toward deadline rather than designated occasion.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the command. 'Because' is clearer in contemporary English than the more formal 'for.'
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  chosen: on the third day
  lexicon: HALOT
  rationale: Standard temporal use of ב with 'day'; 'on the third day' is the natural English equivalent.
- source_word: יֵרֵד
  chosen: will come down
  alternatives:
  - will descend
  lexicon: HALOT
  rationale: ירד literally means 'go/come down.' Because the movement is toward Sinai and the people, 'come down' is the idiomatic English choice and preserves the theophanic imagery.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְעֵינֵי
  chosen: before the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: Literally 'to/before the eyes of.' 'Before the eyes of' preserves the vividness of the Hebrew, though 'in the sight of' is a smoother idiomatic alternative.
- source_word: כָל הָעָם
  chosen: all the people
  alternatives:
  - the whole people
  lexicon: HALOT
  rationale: This straightforwardly denotes the entirety of the assembled people. 'All the people' is the most natural English rendering.
- source_word: עַל הַר סִינָי
  chosen: on Mount Sinai
  alternatives:
  - upon Mount Sinai
  - onto Mount Sinai
  lexicon: HALOT
  rationale: With ירד and the location of the theophany, עַל indicates the mountain as the place upon which the LORD descends. 'On Mount Sinai' is idiomatic and sufficiently precise.
