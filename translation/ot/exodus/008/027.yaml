id: EXO.8.27
reference: Exodus 8:27
source:
  edition: WLC
  text: וַ/יַּ֤עַשׂ יְהוָה֙ כִּ/דְבַ֣ר מֹשֶׁ֔ה וַ/יָּ֨סַר֙ הֶ/עָרֹ֔ב מִ/פַּרְעֹ֖ה
    מֵ/עֲבָדָ֣י/ו וּ/מֵ/עַמּ֑/וֹ לֹ֥א נִשְׁאַ֖ר אֶחָֽד׃
translation:
  text: And the LORD did according to Moses's word, and removed the swarm from Pharaoh,
    from his servants, and from his people; not one remained.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the swarms of flies.' The Hebrew עָרֹב denotes the plague of swarming
      insects, but the exact species is not specified by the term itself.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine default for the divine name YHWH, rendered 'the LORD' rather
    than transliterated forms.
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - acted
  - performed
  lexicon: HALOT
  rationale: The verb עשה is broad ('do/make'). In the idiom 'did according to Moses's
    word,' 'did' is the most direct and natural rendering.
- source_word: כִּדְבַר מֹשֶׁה
  chosen: according to Moses's word
  alternatives:
  - according to the word of Moses
  - as Moses said
  lexicon: HALOT
  rationale: דבר here means 'word' or 'statement.' 'According to Moses's word' preserves
    the formal correspondence while remaining readable. It reflects that the LORD
    acted in line with Moses's spoken request.
- source_word: וַיָּסַר
  chosen: removed
  alternatives:
  - took away
  - turned aside
  lexicon: HALOT
  rationale: סור in the Hiphil can mean 'remove' or 'take away.' 'Removed' fits the
    plague context and the direct object 'the swarm' well.
- source_word: הֶעָרֹב
  chosen: the swarm
  alternatives:
  - the swarms of flies
  - the mixed swarm
  lexicon: HALOT
  rationale: עָרֹב is the plague term in Exodus 8, traditionally understood as a swarm,
    likely of insects. 'The swarm' keeps the Hebrew term concise without over-specifying
    beyond the text. A more specific traditional interpretation is preserved in a
    footnote.
- source_word: מִפַּרְעֹה מֵעֲבָדָיו וּמֵעַמּוֹ
  chosen: from Pharaoh, from his servants, and from his people
  alternatives:
  - away from Pharaoh, his servants, and his people
  lexicon: HALOT
  rationale: The repeated preposition מִן is retained in English rhythmically enough
    to reflect the Hebrew emphasis on removal from each sphere.
- source_word: לֹא נִשְׁאַר אֶחָד
  chosen: not one remained
  alternatives:
  - not one was left
  - none remained
  lexicon: HALOT
  rationale: This renders the negated Niphal of שׁאר plus אֶחָד idiomatically and
    emphatically. 'Not one remained' preserves the singular emphasis of אֶחָד.
