theological_decisions:
- issue: Whether פְדֻת should be rendered with its more literal theological sense
    ('redemption') or its contextual sense of separation
  chosen_reading: Render in the main text as 'a distinction'
  alternative_readings:
  - redemption
  - deliverance
  rationale: 'The verse describes God''s differentiating treatment of Israel and Egypt
    in the plague narrative. While the noun is related to redemption language, the
    immediate syntactic frame (''between my people and your people'') points to the
    concrete result: a distinction/separation. To preserve theological resonance without
    obscuring the sense, the alternative is retained in a footnote.'
  doctrine_reference: 'Translation philosophy #3, #5'
