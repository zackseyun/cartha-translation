id: EXO.8.19
reference: Exodus 8:19
source:
  edition: WLC
  text: וְ/שַׂמְתִּ֣י פְדֻ֔ת בֵּ֥ין עַמִּ֖/י וּ/בֵ֣ין עַמֶּ֑/ךָ לְ/מָחָ֥ר יִהְיֶ֖ה
    הָ/אֹ֥ת הַ/זֶּֽה׃
translation:
  text: And I will make a distinction between my people and your people. Tomorrow
    this sign will happen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'redemption' or 'deliverance'; the Hebrew term can carry the sense of
      God's redeeming act, here expressed as his making a distinction between Israel
      and Egypt.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתִּי
  chosen: And I will make
  alternatives:
  - And I will set
  - And I will put
  lexicon: HALOT
  rationale: The verb שׂים literally means 'set/put,' but with an abstract object
    ('distinction/redemption') and the preposition בין...ובין, idiomatic English is
    'make.' This preserves the causative sense without wooden phrasing.
- source_word: פְדֻת
  chosen: a distinction
  alternatives:
  - redemption
  - deliverance
  - separation
  lexicon: HALOT
  rationale: The noun can denote redemption/ransom, but in this immediate context—'between
    my people and your people'—it refers to a differentiating act by which God sets
    Israel apart from Egypt. 'A distinction' best captures the contextual sense in
    natural English. The more literal/theological sense 'redemption' is worth preserving
    in a footnote because the distinction is effected by God's saving action.
- source_word: בֵּין ... וּבֵין
  chosen: between ... and ...
  lexicon: HALOT
  rationale: Standard rendering of the correlative prepositional construction marking
    separation or distinction between two parties.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Straightforward possessive construction referring to the people belonging
    to God, here Israel.
- source_word: עַמֶּךָ
  chosen: your people
  lexicon: HALOT
  rationale: Straightforward possessive construction referring to Pharaoh's people,
    i.e., the Egyptians.
- source_word: לְמָחָר
  chosen: Tomorrow
  alternatives:
  - by tomorrow
  lexicon: HALOT
  rationale: Temporal adverb meaning 'tomorrow.' Fronting it in English reflects the
    Hebrew emphasis and reads naturally.
- source_word: יִהְיֶה
  chosen: will happen
  alternatives:
  - will be
  - will come to pass
  lexicon: HALOT
  rationale: With 'this sign' as subject, English idiom prefers 'will happen' rather
    than the more wooden 'will be.' This communicates the future occurrence of the
    announced sign.
- source_word: הָאֹת הַזֶּה
  chosen: this sign
  alternatives:
  - this mark
  - this token
  lexicon: HALOT
  rationale: אוֹת commonly means 'sign' in Exodus plague contexts, indicating a divinely
    given indicator or confirming act. 'Sign' is the clearest modern rendering.
