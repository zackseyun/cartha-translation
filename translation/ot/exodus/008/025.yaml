theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is 'the LORD' for YHWH, following the stated doctrine
    and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Specific identification of עָרֹב
  chosen_reading: the swarm
  alternative_readings:
  - the swarms of flies
  - the mixed swarm
  rationale: The Hebrew term's precise zoological reference is uncertain. The translation
    preserves the broader sense rather than resolving the uncertainty beyond the text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological/interpretive
    tension rather than resolve it'
