id: EXO.8.25
reference: Exodus 8:25
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר מֹשֶׁ֗ה הִנֵּ֨ה אָנֹכִ֜י יוֹצֵ֤א מֵֽ/עִמָּ/ךְ֙ וְ/הַעְתַּרְתִּ֣י
    אֶל יְהוָ֔ה וְ/סָ֣ר הֶ/עָרֹ֗ב מִ/פַּרְעֹ֛ה מֵ/עֲבָדָ֥י/ו וּ/מֵ/עַמּ֖/וֹ מָחָ֑ר
    רַ֗ק אַל יֹסֵ֤ף פַּרְעֹה֙ הָתֵ֔ל לְ/בִלְתִּי֙ שַׁלַּ֣ח אֶת הָ/עָ֔ם לִ/זְבֹּ֖חַ
    לַֽ/יהוָֽה־־־׃
translation:
  text: And Moses said, “Look, I am going out from you, and I will plead with the
    LORD, and the swarm will depart from Pharaoh, from his servants, and from his
    people tomorrow. Only let Pharaoh not continue to mock by not letting the people
    go to sacrifice to the LORD.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew עָרֹב may refer more specifically to a swarm of flies or other swarming
      insects; the exact referent is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces Moses' statement with attention-getting force. 'Look' preserves
    the immediacy in readable modern English better than archaic 'Behold.'
- source_word: יוֹצֵא מֵעִמָּךְ
  chosen: am going out from you
  alternatives:
  - am leaving you
  - am going out from your presence
  lexicon: HALOT
  rationale: Keeps the concrete motion of יצא plus the preposition 'from with/you.'
    'From you' is slightly formal but reflects the Hebrew closely without overexpansion.
- source_word: וְהַעְתַּרְתִּי אֶל יְהוָה
  chosen: I will plead with the LORD
  alternatives:
  - I will entreat the LORD
  - I will pray to the LORD
  lexicon: HALOT
  rationale: עתר in this context denotes earnest intercession rather than generic
    prayer. 'Plead with' communicates urgency and mediation clearly.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md
    contested terms table.
- source_word: וְסָר
  chosen: will depart
  alternatives:
  - will turn aside
  - will be removed
  lexicon: HALOT
  rationale: Conveys the intransitive sense 'turn aside/depart' naturally in English
    with the subject 'the swarm.'
- source_word: הֶעָרֹב
  chosen: the swarm
  alternatives:
  - the swarms of flies
  - the mixed swarm
  lexicon: HALOT
  rationale: The noun refers to the plague of swarming insects/creatures, but the
    exact species is uncertain. 'The swarm' preserves the Hebrew term without over-specifying
    'flies.'
- source_word: מִפַּרְעֹה מֵעֲבָדָיו וּמֵעַמּוֹ
  chosen: from Pharaoh, from his servants, and from his people
  alternatives:
  - away from Pharaoh, his servants, and his people
  lexicon: HALOT
  rationale: Retains the repeated prepositions for emphasis and scope, matching the
    Hebrew distribution.
- source_word: מָחָר
  chosen: tomorrow
  alternatives:
  - by tomorrow
  lexicon: HALOT
  rationale: Simple temporal adverb; 'tomorrow' is the most direct rendering.
- source_word: רַק
  chosen: Only
  alternatives:
  - But only
  - Nevertheless
  lexicon: HALOT
  rationale: Marks Moses' restriction/warning succinctly.
- source_word: אַל יֹסֵף ... הָתֵל
  chosen: let Pharaoh not continue to mock
  alternatives:
  - let Pharaoh not keep deceiving
  - let Pharaoh not act deceitfully again
  - let Pharaoh not trifle
  lexicon: HALOT
  rationale: The construction with יסף plus התל expresses continuing or repeated deceptive
    mockery. 'Continue to mock' captures both the durative force and the contemptuous
    deception in context.
- source_word: לְבִלְתִּי שַׁלַּח
  chosen: by not letting ... go
  alternatives:
  - so as not to let ... go
  - in refusing to let ... go
  lexicon: HALOT
  rationale: 'Expresses the content of Pharaoh''s deceptive behavior: his refusal
    to release the people.'
- source_word: לִזְבֹּחַ
  chosen: to sacrifice
  alternatives:
  - to offer sacrifice
  - to worship by sacrifice
  lexicon: HALOT
  rationale: זבח specifically denotes sacrificial worship, not worship in general;
    'to sacrifice' preserves that cultic specificity.
