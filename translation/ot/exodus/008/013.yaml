id: EXO.8.13
reference: Exodus 8:13
source:
  edition: WLC
  text: וַ/יַּֽעֲשׂוּ כֵ֗ן וַ/יֵּט֩ אַהֲרֹ֨ן אֶת יָד֤/וֹ בְ/מַטֵּ֨/הוּ֙ וַ/יַּךְ֙
    אֶת עֲפַ֣ר הָ/אָ֔רֶץ וַ/תְּהִי֙ הַ/כִּנָּ֔ם בָּ/אָדָ֖ם וּ/בַ/בְּהֵמָ֑ה כָּל עֲפַ֥ר
    הָ/אָ֛רֶץ הָיָ֥ה כִנִּ֖ים בְּ/כָל אֶ֥רֶץ מִצְרָֽיִם־־־־־׃
translation:
  text: And they did so. Aaron stretched out his hand with his staff and struck the
    dust of the earth, and the gnats came upon man and beast. All the dust of the
    earth became gnats throughout all the land of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lice'; the Hebrew term כנים is uncertain in precise zoological identification.
    reason: lexical_alternative
  - marker: b
    text: '''Man'' here is a collective term for human beings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ כֵן
  chosen: And they did so
  alternatives:
  - And they did thus
  lexicon: HALOT
  rationale: Idiomatic narrative formula indicating obedience to the prior command;
    'did so' is natural modern English while remaining close to the Hebrew.
- source_word: וַיֵּט
  chosen: stretched out
  alternatives:
  - extended
  - reached out
  lexicon: HALOT
  rationale: נטה with the hand commonly means to stretch out or extend. 'Stretched
    out' is the most natural narrative rendering in English.
- source_word: יָדוֹ בְמַטֵּהוּ
  chosen: his hand with his staff
  alternatives:
  - his hand holding his staff
  - his hand by means of his staff
  lexicon: HALOT
  rationale: The Hebrew literally has 'his hand with his staff.' This likely expresses
    accompaniment/instrumentality. 'With his staff' preserves the Hebrew wording without
    over-interpreting.
- source_word: וַיַּךְ
  chosen: struck
  alternatives:
  - hit
  - smote
  lexicon: HALOT
  rationale: Standard rendering of נכה in narrative. 'Struck' is clear, dignified,
    and non-archaic.
- source_word: עֲפַר הָאָרֶץ
  chosen: the dust of the earth
  alternatives:
  - the dust of the land
  - the soil of the earth
  lexicon: HALOT
  rationale: עפר is 'dust' or loose earth. 'Dust of the earth' preserves the repeated
    phrase and the plague's imagery better than 'soil.'
- source_word: וַתְּהִי הַכִּנָּם
  chosen: the gnats came upon
  alternatives:
  - the gnats were
  - the gnats came to be
  lexicon: HALOT
  rationale: The Hebrew literally says 'and the kinnam was/in came to be in/on man
    and beast.' English requires a more idiomatic expression. 'Came upon' captures
    the onset of infestation.
- source_word: הַכִּנָּם / כִנִּים
  chosen: gnats
  alternatives:
  - lice
  - mosquitoes
  lexicon: HALOT
  rationale: כנים is traditionally debated between 'gnats' and 'lice.' 'Gnats' is
    a common modern rendering for this plague and fits the image of dust becoming
    swarming insects. Because the identification is uncertain, the alternative is
    preserved in a footnote.
- source_word: בָּאָדָם וּבַבְּהֵמָה
  chosen: upon man and beast
  alternatives:
  - on humankind and livestock
  - on people and animals
  lexicon: HALOT
  rationale: אָדָם here is collective humanity in contrast with animals; per doctrine,
    gender-accurate language is preferred, so 'man' is retained in this representative
    sense. בְּהֵמָה here refers broadly to domesticated animals; 'beast' preserves
    the paired biblical cadence.
- source_word: כָּל עֲפַר הָאָרֶץ
  chosen: All the dust of the earth
  alternatives:
  - All the dust of the land
  lexicon: HALOT
  rationale: Retains the totalizing force of כָּל and the repeated plague imagery.
- source_word: הָיָה כִנִּים
  chosen: became gnats
  alternatives:
  - turned into gnats
  - was gnats
  lexicon: HALOT
  rationale: English 'became' best expresses the resultative sense of היה here.
- source_word: בְּכָל אֶרֶץ מִצְרָיִם
  chosen: throughout all the land of Egypt
  alternatives:
  - in all the land of Egypt
  lexicon: HALOT
  rationale: '''Throughout all'' conveys the distributive scope and reads naturally
    in English narrative.'
