theological_decisions:
- issue: Rendering of אָדָם
  chosen_reading: man
  alternative_readings:
  - humankind
  - people
  rationale: The term is collective and representative rather than male-specific,
    but the doctrine excerpt prefers gender-accurate renderings matching the source's
    intent. 'Man' preserves the Hebrew diction in contrast with 'beast,' while the
    inclusive sense can be noted in a footnote.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; אָדָם default
    ''man / humankind (context)'''
