id: EXO.8.4
reference: Exodus 8:4
source:
  edition: WLC
  text: וַ/יִּקְרָ֨א פַרְעֹ֜ה לְ/מֹשֶׁ֣ה וּֽ/לְ/אַהֲרֹ֗ן וַ/יֹּ֨אמֶר֙ הַעְתִּ֣ירוּ אֶל יְהוָ֔ה וְ/יָסֵר֙ הַֽ/צְפַרְדְּעִ֔ים מִמֶּ֖/נִּי וּ/מֵֽ/עַמִּ֑/י וַ/אֲשַׁלְּחָה֙ אֶת הָ/עָ֔ם וְ/יִזְבְּח֖וּ לַ/יהוָֽה־־׃
translation:
  text: Then Pharaoh called for Moses and Aaron and said, “Pray to Yahweh, that he may remove the frogs from me and from my people, and I will let the people go, so that they may sacrifice to Yahweh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'entreat/intercede to the LORD'; the verb can carry the sense of urgent pleading, not merely ordinary prayer.
    reason: lexical_alternative
  - marker: b
    text: Or 'and they may sacrifice to the LORD.' The Hebrew may be read as simple coordination, though here it likely expresses Pharaoh's intended purpose in letting the people go.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called for
  alternatives:
  - called
  - summoned
  lexicon: HALOT
  rationale: The verb קרא with לְ plus persons commonly means to call to or summon someone. 'Called for' is natural English and preserves the sense that Pharaoh had Moses and Aaron brought to him.
- source_word: פַרְעֹה
  chosen: Pharaoh
  lexicon: HALOT
  rationale: Standard English transliteration of the royal title/name.
- source_word: לְמֹשֶׁה וּלְאַהֲרֹן
  chosen: for Moses and Aaron
  alternatives:
  - to Moses and Aaron
  lexicon: HALOT
  rationale: With וַיִּקְרָא, the preposition לְ marks the persons summoned. 'For Moses and Aaron' fits the idiom 'called for' in English.
- source_word: הַעְתִּירוּ
  chosen: Pray
  alternatives:
  - entreat
  - plead
  - intercede
  lexicon: HALOT
  rationale: The Hiphil of עתר in prayer contexts means to entreat urgently or intercede. 'Pray' is the most accessible rendering in modern English; the stronger nuance is noted by alternatives.
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The preposition אֶל is straightforwardly 'to' here with the verb of prayer.
- source_word: וְיָסֵר
  chosen: that he may remove
  alternatives:
  - and let him remove
  - so that he may take away
  lexicon: HALOT
  rationale: The verb סור in Hiphil means to remove or take away. Following an imperative of request, the prefixed form expresses the content/purpose of the prayer. 'That he may remove' communicates the requested result naturally in English.
- source_word: הַצְפַרְדְּעִים
  chosen: the frogs
  lexicon: HALOT
  rationale: Direct rendering of the noun with article.
- source_word: מִמֶּנִּי וּמֵעַמִּי
  chosen: from me and from my people
  alternatives:
  - away from me and my people
  lexicon: HALOT
  rationale: 'The repeated preposition מִן is preserved for clarity and emphasis: Pharaoh wants relief both personally and nationally.'
- source_word: וַאֲשַׁלְּחָה
  chosen: and I will let ... go
  alternatives:
  - and I will send away
  - and I will release
  lexicon: HALOT
  rationale: The cohortative expresses Pharaoh's stated intention/promise. In Exodus, שלח with the people idiomatically means 'let go' or 'release'; 'let ... go' preserves the recurring Exodus wording.
- source_word: אֶת־הָעָם
  chosen: the people
  lexicon: HALOT
  rationale: Straightforward rendering. Here it refers to Israel as the people Pharaoh is holding.
- source_word: וְיִזְבְּחוּ
  chosen: so that they may sacrifice
  alternatives:
  - and they may sacrifice
  - that they may offer sacrifices
  lexicon: HALOT
  rationale: The prefixed verb after Pharaoh's promise expresses intended purpose/result. 'So that they may sacrifice' makes the relationship clear in idiomatic English while retaining sacrificial language.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the divine name is rendered 'the LORD.' The preposition לְ is rendered 'to' with sacrificial action.
