theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of Pharaoh's final clause
  chosen_reading: 'purpose/result: ''so that they may sacrifice to the LORD'''
  alternative_readings:
  - 'simple coordination: ''and they may sacrifice to the LORD'''
  rationale: The Hebrew prefixed verb after Pharaoh's cohortative can be represented in English as intended result. This best captures Pharaoh's promise without overstating certainty or adding interpretation.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
