id: EXO.8.8
reference: Exodus 8:8
source:
  edition: WLC
  text: וַ/יֵּצֵ֥א מֹשֶׁ֛ה וְ/אַהֲרֹ֖ן מֵ/עִ֣ם פַּרְעֹ֑ה וַ/יִּצְעַ֤ק מֹשֶׁה֙ אֶל יְהוָ֔ה עַל דְּבַ֥ר הַֽ/צְפַרְדְּעִ֖ים אֲשֶׁר שָׂ֥ם לְ/פַרְעֹֽה־־־׃
translation:
  text: So Moses and Aaron went out from Pharaoh, and Moses cried out to Yahweh concerning the frogs that he had set upon Pharaoh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that he had set against Pharaoh.' The Hebrew verb is literally 'put' or 'set'; 'brought upon' expresses the sense idiomatically in this plague context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - came out
  - departed
  lexicon: HALOT
  rationale: The wayyiqtol of יצא narrates simple movement away from Pharaoh's presence. 'Went out' is natural modern English and preserves the directional sense.
- source_word: מֵעִם
  chosen: from
  alternatives:
  - from the presence of
  - away from
  lexicon: HALOT
  rationale: The preposition with עִם can mean 'from with/from the company of.' In English, 'from Pharaoh' adequately conveys departure from his presence without awkwardness.
- source_word: וַיִּצְעַק
  chosen: cried out
  alternatives:
  - called out
  - pleaded
  lexicon: HALOT
  rationale: צעק often denotes a strong cry, especially in appeal to God. 'Cried out' preserves the intensity better than the flatter 'prayed' or 'called out.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עַל דְּבַר
  chosen: concerning
  alternatives:
  - about
  - because of
  - on account of
  lexicon: HALOT
  rationale: The idiom עַל דְּבַר means 'concerning/regarding' or sometimes 'because of.' Here Moses cries out to the LORD with reference to the plague of frogs, so 'concerning' is precise and idiomatic.
- source_word: הַצְפַרְדְּעִים
  chosen: the frogs
  lexicon: HALOT
  rationale: Straightforward plural noun referring to the plague animals.
- source_word: אֲשֶׁר שָׂם לְפַרְעֹה
  chosen: that he had brought upon Pharaoh
  alternatives:
  - that he had set against Pharaoh
  - that he had placed on Pharaoh
  lexicon: HALOT
  rationale: שׂוּם literally means 'put/set/place,' but in plague context English idiom prefers 'brought upon.' This preserves the causative sense without wooden phrasing. The subject is best understood as the LORD from context, referring to the frogs/plague imposed on Pharaoh.
