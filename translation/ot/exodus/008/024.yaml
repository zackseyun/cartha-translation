id: EXO.8.24
reference: Exodus 8:24
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר פַּרְעֹ֗ה אָנֹכִ֞י אֲשַׁלַּ֤ח אֶתְ/כֶם֙ וּ/זְבַחְתֶּ֞ם לַ/יהוָ֤ה
    אֱלֹֽהֵי/כֶם֙ בַּ/מִּדְבָּ֔ר רַ֛ק הַרְחֵ֥ק לֹא תַרְחִ֖יקוּ לָ/לֶ֑כֶת הַעְתִּ֖ירוּ
    בַּעֲדִֽ/י־׃
translation:
  text: Then Pharaoh said, “I will let you go, so that you may sacrifice to the LORD
    your God in the wilderness. Only, you must not go very far away. Plead for me.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  lexicon: HALOT
  rationale: Standard English transliteration of the royal title/name.
- source_word: אָנֹכִי אֲשַׁלַּח אֶתְכֶם
  chosen: I will let you go
  alternatives:
  - I myself will send you out
  - I will release you
  lexicon: HALOT
  rationale: שׁלח in this context means permitting/releasing Israel to depart. 'Let
    you go' is idiomatic and fits the negotiation context better than the more wooden
    'send you out.' The explicit pronoun אָנֹכִי adds emphasis, but English does not
    require 'I myself' here.
- source_word: וּזְבַחְתֶּם
  chosen: so that you may sacrifice
  alternatives:
  - and you shall sacrifice
  lexicon: HALOT
  rationale: The conjunction plus perfect after 'I will let you go' expresses intended
    result/purpose in context. 'So that you may sacrifice' communicates the sense
    more clearly in English than a bare coordinate 'and'.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' in the main text; 'Yahweh'
    is preserved as an alternative only if needed, but no footnote is required here
    because the doctrinal default is settled.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward possessive construction identifying the God of Israel.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: '''Wilderness'' is the conventional and contextually apt rendering for
    מִדְבָּר in Exodus, preserving the non-urban, uncultivated setting without over-specifying
    aridity.'
- source_word: רַק
  chosen: Only
  alternatives:
  - But
  - Except that
  lexicon: HALOT
  rationale: Introduces Pharaoh's restriction or qualification. 'Only' is concise
    and natural.
- source_word: הַרְחֵק לֹא תַרְחִיקוּ לָלֶכֶת
  chosen: you must not go very far away
  alternatives:
  - do not go far away
  - you shall not go too far to go
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb of רחק intensifies the prohibition.
    'Very far away' captures the emphatic force in idiomatic English.
- source_word: הַעְתִּירוּ
  chosen: Plead
  alternatives:
  - Entreat
  - Pray earnestly
  - Intercede
  lexicon: HALOT
  rationale: עתר in the Hiphil here means to make earnest supplication. 'Plead' is
    accessible modern English and preserves the urgency of Pharaoh's request.
- source_word: בַּעֲדִי
  chosen: for me
  alternatives:
  - on my behalf
  lexicon: HALOT
  rationale: Simple prepositional phrase indicating intercession in Pharaoh's interest.
