id: EXO.8.1
reference: Exodus 8:1
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוָה֮ אֶל מֹשֶׁה֒ אֱמֹ֣ר אֶֽל אַהֲרֹ֗ן נְטֵ֤ה אֶת יָדְ/ךָ֙ בְּ/מַטֶּ֔/ךָ
    עַל הַ֨/נְּהָרֹ֔ת עַל הַ/יְאֹרִ֖ים וְ/עַל הָ/אֲגַמִּ֑ים וְ/הַ֥עַל אֶת הַֽ/צְפַרְדְּעִ֖ים
    עַל אֶ֥רֶץ מִצְרָֽיִם־־־־־־־־׃
translation:
  text: Then the LORD said to Moses, “Say to Aaron, ‘Stretch out your hand with your
    staff over the rivers, over the canals, and over the pools, and bring up the frogs
    over the land of Egypt.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Nile channels” for “the canals”; the Hebrew term often refers to
      Nile waterways in Egypt.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name YHWH, rendered 'the LORD' rather
    than transliterated forms, following established reverential convention and the
    translation's stated policy.
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence better than a bare 'and' in modern
    English.
- source_word: אֱמֹר
  chosen: Say
  alternatives:
  - Speak
  lexicon: HALOT
  rationale: Imperative to Moses introducing direct reported speech. 'Say' is the
    most natural concise English equivalent here.
- source_word: נְטֵה
  chosen: Stretch out
  alternatives:
  - Extend
  - Reach out
  lexicon: HALOT
  rationale: The verb נטה commonly means to stretch out or extend. 'Stretch out' is
    idiomatic in plague-sign contexts and fits the gesture commanded to Aaron.
- source_word: יָדְךָ
  chosen: your hand
  alternatives:
  - your arm
  lexicon: HALOT
  rationale: Literal rendering of 'your hand' is appropriate; no contextual reason
    to broaden to 'arm.'
- source_word: בְּמַטֶּךָ
  chosen: with your staff
  alternatives:
  - with your rod
  - by your staff
  lexicon: HALOT
  rationale: 'The preposition beth here is best taken instrumentally: Aaron is to
    stretch out his hand using/with the staff. ''Staff'' is clearer modern English
    than ''rod'' while preserving the concrete object.'
- source_word: הַנְּהָרֹת
  chosen: the rivers
  alternatives:
  - the streams
  lexicon: HALOT
  rationale: נהרות is the ordinary term for rivers. Retained distinctly from the following
    water terms to preserve the source's threefold listing.
- source_word: הַיְאֹרִים
  chosen: the canals
  alternatives:
  - the Nile channels
  - the streams
  - the branches of the Nile
  lexicon: HALOT
  rationale: יאר in Exodus often refers specifically to Nile-related waterways. In
    the plural here, 'canals' best captures Egyptian watercourses distinct from the
    more general 'rivers' and from 'pools.'
- source_word: הָאֲגַמִּים
  chosen: the pools
  alternatives:
  - the ponds
  - the marshes
  lexicon: HALOT
  rationale: אגמים denotes gathered waters such as pools or ponds. 'Pools' is concise
    and preserves distinction from rivers/canals. 'Marshes' is possible but less likely
    in this command sequence.
- source_word: וְהַעַל
  chosen: bring up
  alternatives:
  - cause to come up
  - make come up
  lexicon: HALOT
  rationale: Hiphil imperative of עלה is causative. 'Bring up' is natural English
    that preserves the causative sense without awkwardness.
- source_word: הַצְפַרְדְּעִים
  chosen: the frogs
  lexicon: HALOT
  rationale: Straightforward lexical equivalent for the plague animals.
- source_word: עַל אֶרֶץ מִצְרָיִם
  chosen: over the land of Egypt
  alternatives:
  - upon the land of Egypt
  - throughout the land of Egypt
  lexicon: HALOT
  rationale: The repeated על is preserved as 'over' for consistency with the command
    over the waters and the resulting spread over Egypt. 'Throughout' would be interpretive
    expansion.
