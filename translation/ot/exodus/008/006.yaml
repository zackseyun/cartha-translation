id: EXO.8.6
reference: Exodus 8:6
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר לְ/מָחָ֑ר וַ/יֹּ֨אמֶר֙ כִּ/דְבָ֣רְ/ךָ֔ לְמַ֣עַן תֵּדַ֔ע כִּי אֵ֖ין כַּ/יהוָ֥ה אֱלֹהֵֽי/נוּ־׃
translation:
  text: He said, “Tomorrow.” And he said, “According to your word, so that you may know that there is no one like Yahweh our God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''like Yahweh our God.'' The divine name YHWH is rendered ''the LORD'' in keeping with the translation''s standard practice.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: He said
  alternatives:
  - And he said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative verb from אמר. English omits one conjunction at the start for natural style, but the second occurrence is retained to reflect the dialogue sequence.
- source_word: לְמָחָר
  chosen: Tomorrow
  alternatives:
  - For tomorrow
  lexicon: HALOT
  rationale: Temporal adverb meaning 'tomorrow.' Rendered as a direct reply in quotation marks, matching Pharaoh's answer in context.
- source_word: כִּדְבָרְךָ
  chosen: According to your word
  alternatives:
  - As you say
  - According to what you have said
  lexicon: HALOT
  rationale: Literally 'according to your word.' Kept relatively formal to preserve the idiom and Moses' acceptance of Pharaoh's stated time.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  lexicon: HALOT
  rationale: Purpose marker introducing the reason for granting the request at that time.
- source_word: תֵּדַע
  chosen: you may know
  alternatives:
  - you will know
  lexicon: HALOT
  rationale: Qal imperfect 2ms after לְמַעַן is best rendered as a purpose clause, 'that you may know,' addressed to Pharaoh.
- source_word: אֵין
  chosen: there is no one
  alternatives:
  - there is none
  lexicon: HALOT
  rationale: Existential negation. 'No one' is idiomatic in English when followed by a comparison involving a personal deity.
- source_word: כַּיהוָה
  chosen: like the LORD
  alternatives:
  - like Yahweh
  - like the LORD
  lexicon: HALOT
  rationale: Comparative כ plus divine name YHWH. Per doctrine, יְהוָה is rendered 'the LORD' in the main text; 'Yahweh' is preserved as an alternative in a footnote-worthy note.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  alternatives:
  - our gods
  lexicon: HALOT
  rationale: Though morphologically plural in form, with pronominal suffix and in this context it refers to the singular God of Israel; rendered idiomatically as 'our God.'
