id: EXO.8.14
reference: Exodus 8:14
source:
  edition: WLC
  text: וַ/יַּעֲשׂוּ כֵ֨ן הַ/חַרְטֻמִּ֧ים בְּ/לָטֵי/הֶ֛ם לְ/הוֹצִ֥יא אֶת הַ/כִּנִּ֖ים
    וְ/לֹ֣א יָכֹ֑לוּ וַ/תְּהִי֙ הַ/כִּנָּ֔ם בָּ/אָדָ֖ם וּ/בַ/בְּהֵמָֽה־־׃
translation:
  text: And the magicians did the same by their secret arts to bring out the gnats,
    but they were not able; and the gnats were on man and on beast.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "lice." The Hebrew term for the insect is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחַרְטֻמִּים
  chosen: the magicians
  alternatives:
  - the sorcerers
  - the occult practitioners
  lexicon: HALOT
  rationale: The term refers to Pharaoh's ritual specialists/court magicians. 'Magicians'
    is the most natural and established English equivalent without over-specifying
    their methods.
- source_word: בְּלָטֵיהֶם
  chosen: by their secret arts
  alternatives:
  - with their enchantments
  - by their occult arts
  lexicon: HALOT
  rationale: The noun denotes secret or occult practices. 'Secret arts' is clear modern
    English and preserves the sense of hidden magical technique.
- source_word: לְהוֹצִיא
  chosen: to bring out
  alternatives:
  - to produce
  - to bring forth
  lexicon: HALOT
  rationale: The infinitive of יצא literally means 'to bring out.' Here it refers
    to attempting to produce the plague. 'Bring out' stays close to the Hebrew while
    remaining idiomatic.
- source_word: הַכִּנִּים / הַכִּנָּם
  chosen: the gnats
  alternatives:
  - the lice
  lexicon: HALOT
  rationale: The precise insect is uncertain, but 'gnats' is a common modern rendering
    and fits the plague context. Because 'lice' is a longstanding alternative, it
    is preserved in a footnote.
- source_word: וְלֹא יָכֹלוּ
  chosen: but they were not able
  alternatives:
  - but they could not
  lexicon: HALOT
  rationale: This straightforwardly expresses inability. 'Were not able' slightly
    preserves the verbal force of יכל while remaining natural English.
- source_word: בָּאָדָם
  chosen: on man
  alternatives:
  - on humankind
  - on people
  lexicon: HALOT
  rationale: Following the doctrine's gender-accurate principle for אָדָם, 'man' is
    retained here because the singular collective contrasts with 'beast' and reflects
    the Hebrew form. The sense is humanity in general, not a male individual.
- source_word: וּבַבְּהֵמָה
  chosen: and on beast
  alternatives:
  - and on animals
  - and on livestock
  lexicon: HALOT
  rationale: The singular collective 'beast' mirrors the Hebrew and preserves the
    human/animal pairing. 'Animals' would be smoother but less formally aligned.
