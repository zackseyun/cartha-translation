theological_decisions:
- issue: Rendering of אָדָם in a collective sense
  chosen_reading: man
  alternative_readings:
  - humankind
  - people
  rationale: The Hebrew uses singular collective אָדָם in contrast with singular collective
    בְּהֵמָה. Per doctrine, gender-accurate rendering is preferred over flattening
    to gender-neutral language when the source uses 'man' representatively.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table
    for אָדָם
