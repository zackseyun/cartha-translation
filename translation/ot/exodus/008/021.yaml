id: EXO.8.21
reference: Exodus 8:21
source:
  edition: WLC
  text: וַ/יִּקְרָ֣א פַרְעֹ֔ה אֶל מֹשֶׁ֖ה וּֽ/לְ/אַהֲרֹ֑ן וַ/יֹּ֗אמֶר לְכ֛וּ זִבְח֥וּ
    לֵֽ/אלֹהֵי/כֶ֖ם בָּ/אָֽרֶץ־׃
translation:
  text: Then Pharaoh called Moses and Aaron and said, “Go, sacrifice to your God in
    the land.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “offer sacrifices to your God within the land,” that is, within Egypt.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - summoned
  lexicon: HALOT
  rationale: The verb קרא in this narrative context means to call for or summon. 'Called'
    is natural modern English and sufficiently reflects the action without overstating
    official force.
- source_word: פַרְעֹה
  chosen: Pharaoh
  lexicon: HALOT
  rationale: Standard English transliteration of the royal title/name.
- source_word: אֶל
  chosen: and Aaron
  alternatives:
  - to Moses and Aaron
  lexicon: HALOT
  rationale: The preposition marks the indirect object of 'called.' In idiomatic English,
    'called Moses and Aaron' naturally conveys 'called to/summoned Moses and Aaron.'
    The fuller sense is preserved in the rationale and could also be rendered explicitly.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - said to them
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר. 'Said' is the normal English equivalent;
    the addressees are already clear from context.
- source_word: לְכוּ
  chosen: Go
  alternatives:
  - Go on
  - Leave
  lexicon: HALOT
  rationale: Imperative plural of הלך. 'Go' is the direct and idiomatic rendering
    in Pharaoh's permission.
- source_word: זִבְחוּ
  chosen: sacrifice
  alternatives:
  - offer sacrifices
  lexicon: HALOT
  rationale: Imperative plural of זבח, referring to sacrificial worship. 'Sacrifice'
    as a verb is concise and accurate; 'offer sacrifices' is slightly more explicit
    but less compact.
- source_word: לֵאלֹהֵיכֶם
  chosen: to your God
  alternatives:
  - for your God
  lexicon: HALOT
  rationale: The lamed here marks direction/recipient of the sacrificial act. 'To
    your God' best matches English sacrificial idiom and the Hebrew syntax.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - within the land
  - in this land
  - in Egypt
  lexicon: HALOT
  rationale: The phrase literally means 'in the land.' In context Pharaoh means within
    Egypt rather than going out into the wilderness. The translation preserves the
    Hebrew wording while allowing the contextual implication to remain implicit.
