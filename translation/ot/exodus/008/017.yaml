id: EXO.8.17
reference: Exodus 8:17
source:
  edition: WLC
  text: כִּ֣י אִם אֵינְ/ךָ֮ מְשַׁלֵּ֣חַ אֶת עַמִּ/י֒ הִנְ/נִי֩ מַשְׁלִ֨יחַ בְּ/ךָ֜
    וּ/בַ/עֲבָדֶ֧י/ךָ וּֽ/בְ/עַמְּ/ךָ֛ וּ/בְ/בָתֶּ֖י/ךָ אֶת הֶ/עָרֹ֑ב וּ/מָ֨לְא֜וּ
    בָּתֵּ֤י מִצְרַ֨יִם֙ אֶת הֶ֣/עָרֹ֔ב וְ/גַ֥ם הָ/אֲדָמָ֖ה אֲשֶׁר הֵ֥ם עָלֶֽי/הָ־־־־־׃
translation:
  text: For if you do not let my people go, behold, I am sending the swarm upon you,
    upon your servants, upon your people, and into your houses. The houses of Egypt
    will be filled with the swarm, and also the ground on which they are.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the flies.' The Hebrew עָרֹב likely denotes a swarm, traditionally understood
      as flies; the broader rendering preserves the lexical uncertainty.
    reason: lexical_alternative
  - marker: b
    text: Or 'the land on which they are.' Hebrew אֲדָמָה can mean 'ground' or 'land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: For if
  alternatives:
  - But if
  - For indeed if
  lexicon: HALOT
  rationale: The combination introduces a conditional warning grounded in the preceding
    speech. 'For if' preserves the connective force without overcomplicating the English.
- source_word: אֵינְךָ מְשַׁלֵּחַ
  chosen: you do not let ... go
  alternatives:
  - you are not sending away
  - you do not release
  lexicon: HALOT
  rationale: The idiom שׁלח with the object 'my people' in the Exodus narrative is
    conventionally and accurately rendered 'let ... go,' expressing release rather
    than mere dispatch.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Standard covenantal/national expression; 'people' is the natural rendering
    here.
- source_word: הִנְנִי
  chosen: behold, I am
  alternatives:
  - look, I am
  - see, I am
  lexicon: HALOT
  rationale: Retains the solemn deictic force of the Hebrew announcement formula.
    'Behold' is still readable and preserves the gravity of the warning.
- source_word: מַשְׁלִיחַ
  chosen: sending
  alternatives:
  - about to send
  - sending forth
  lexicon: HALOT
  rationale: The participial form with הִנְנִי conveys imminent action. 'I am sending'
    captures both immediacy and certainty.
- source_word: הֶעָרֹב
  chosen: the swarm
  alternatives:
  - the swarms
  - the mixed swarm
  - the flies
  lexicon: HALOT
  rationale: The Hebrew term is traditionally associated with the plague of flies,
    but its more basic sense is a swarm or mixture. 'The swarm' preserves the lexical
    ambiguity of the Hebrew better than specifying 'flies' in the main text.
- source_word: בְּךָ ... וּבַעֲבָדֶיךָ וּבְעַמְּךָ
  chosen: upon you, upon your servants, upon your people
  alternatives:
  - against you ...
  - on you ...
  lexicon: HALOT
  rationale: The preposition ב here marks the objects affected by the plague. 'Upon'
    fits plague language in English and preserves the repeated rhetorical buildup.
- source_word: וּבְבָתֶּיךָ
  chosen: and into your houses
  alternatives:
  - and upon your houses
  - and in your houses
  lexicon: HALOT
  rationale: Although the preposition is formally 'in/at,' English idiom with a moving
    plague favors 'into your houses' after 'sending,' while the next clause states
    that the houses will be filled.
- source_word: וּמָלְאוּ בָּתֵּי מִצְרַיִם
  chosen: The houses of Egypt will be filled
  alternatives:
  - Egyptian houses will be full
  - the houses of the Egyptians will be filled
  lexicon: HALOT
  rationale: This preserves the passive-result sense in idiomatic English. 'Houses
    of Egypt' reflects the Hebrew construct and likely refers broadly to Egyptian
    households.
- source_word: וְגַם הָאֲדָמָה
  chosen: and also the ground
  alternatives:
  - and even the land
  - and also the soil
  lexicon: HALOT
  rationale: אֲדָמָה can mean ground/land/soil. Here, in contrast to houses and followed
    by 'on which they are,' 'ground' best conveys the physical surface covered by
    the swarm.
- source_word: אֲשֶׁר הֵם עָלֶיהָ
  chosen: on which they are
  alternatives:
  - where they are
  - upon which they stand
  lexicon: HALOT
  rationale: The clause most naturally refers to the Egyptians just mentioned by implication
    in 'houses of Egypt.' 'On which they are' is literal enough while remaining intelligible
    in context.
