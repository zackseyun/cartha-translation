id: EXO.8.5
reference: Exodus 8:5
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר מֹשֶׁ֣ה לְ/פַרְעֹה֮ הִתְפָּאֵ֣ר עָלַ/י֒ לְ/מָתַ֣י אַעְתִּ֣יר לְ/ךָ֗
    וְ/לַ/עֲבָדֶ֨י/ךָ֙ וּֽ/לְ/עַמְּ/ךָ֔ לְ/הַכְרִית֙ הַֽ/צֲפַרְדְּעִ֔ים מִמְּ/ךָ֖
    וּ/מִ/בָּתֶּ֑י/ךָ רַ֥ק בַּ/יְאֹ֖ר תִּשָּׁאַֽרְנָה׀׃
translation:
  text: 'And Moses said to Pharaoh, “Have the honor over me: when shall I plead for
    you, for your servants, and for your people, to cut off the frogs from you and
    from your houses? Only in the Nile shall they remain.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, “Set the time for me” or “Have this honor over
      me.” The Hebrew idiom is difficult; Moses is inviting Pharaoh to name when Moses
      should intercede.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִתְפָּאֵר עָלַי
  chosen: Have the honor over me
  alternatives:
  - Glory over me
  - Set the time for me
  - Have this honor over me
  lexicon: HALOT
  rationale: The hitpael of פאר with עַל here is idiomatic and difficult. In context
    Moses is inviting Pharaoh to name the time, but the literal sense involves taking
    honor/glory over Moses. 'Have the honor over me' preserves the idiom's force while
    remaining intelligible in English; the more interpretive sense ('set the time
    for me') is preserved as an alternative rather than placed in the main text.
- source_word: לְמָתַי
  chosen: when
  alternatives:
  - for when
  - until when
  lexicon: HALOT
  rationale: Introduces Pharaoh's choice of timing for Moses' intercession. Simple
    'when' is natural English and fits the interrogative construction.
- source_word: אַעְתִּיר
  chosen: I plead
  alternatives:
  - I entreat
  - I intercede
  - I pray
  lexicon: HALOT
  rationale: The Hiphil of עתר often refers to earnest entreaty, especially to God.
    'I plead' is accessible modern English and conveys urgent intercession without
    importing later technical terminology.
- source_word: לְךָ וְלַעֲבָדֶיךָ וּלְעַמְּךָ
  chosen: for you, for your servants, and for your people
  lexicon: HALOT
  rationale: The repeated preposition is retained in English for clarity and emphasis,
    reflecting the scope of Moses' intercession.
- source_word: לְהַכְרִית
  chosen: to cut off
  alternatives:
  - to destroy
  - to remove
  lexicon: HALOT
  rationale: כרת literally means 'cut off.' Here it refers to eliminating the frogs
    from Pharaoh and his houses. 'To cut off' preserves the verbal imagery better
    than the smoother but less literal 'remove.'
- source_word: הַצֲפַרְדְּעִים
  chosen: the frogs
  lexicon: HALOT
  rationale: Straightforward rendering of the plague animals.
- source_word: מִמְּךָ וּמִבָּתֶּיךָ
  chosen: from you and from your houses
  alternatives:
  - from you and your houses
  lexicon: HALOT
  rationale: The prepositions are preserved to reflect the Hebrew structure and to
    distinguish Pharaoh personally from his households/buildings.
- source_word: רַק
  chosen: Only
  alternatives:
  - except that
  - just
  lexicon: HALOT
  rationale: 'Marks the exception: the frogs will be removed everywhere except one
    place.'
- source_word: בַּיְאֹר
  chosen: in the Nile
  alternatives:
  - in the river
  lexicon: HALOT
  rationale: יְאֹר in Exodus commonly refers specifically to the Nile, not merely
    any river. Translating 'the Nile' makes the Egyptian setting explicit from the
    source context.
- source_word: תִּשָּׁאַרְנָה
  chosen: shall they remain
  alternatives:
  - they will be left
  - they shall be left over
  lexicon: HALOT
  rationale: Nifal of שׁאר expresses remaining or being left. The fronted English
    order after 'Only in the Nile' preserves the Hebrew emphasis and reads naturally.
