id: EXO.8.12
reference: Exodus 8:12
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוָה֮ אֶל מֹשֶׁה֒ אֱמֹר֙ אֶֽל אַהֲרֹ֔ן נְטֵ֣ה אֶֽת מַטְּ/ךָ֔
    וְ/הַ֖ךְ אֶת עֲפַ֣ר הָ/אָ֑רֶץ וְ/הָיָ֥ה לְ/כִנִּ֖ם בְּ/כָל אֶ֥רֶץ מִצְרָֽיִם־־־־־׃
translation:
  text: Then the LORD said to Moses, “Say to Aaron, ‘Stretch out your staff and strike
    the dust of the earth, and it will become gnats throughout all the land of Egypt.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “lice”; the Hebrew term refers to small biting or irritating insects,
      and the exact species is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    the traditional small-caps covenantal substitute in English rather than transliteration.
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative sequence while preserving the sense of progression.
- source_word: אֱמֹר
  chosen: Say
  alternatives:
  - Speak
  lexicon: HALOT
  rationale: Imperative to Moses introducing direct speech to Aaron. 'Say' is the
    most natural concise English equivalent here.
- source_word: נְטֵה
  chosen: Stretch out
  alternatives:
  - Extend
  - Reach out
  lexicon: HALOT
  rationale: The verb means to stretch out or extend. 'Stretch out' is idiomatic in
    English and fits gesture with the staff.
- source_word: מַטְּךָ
  chosen: your staff
  alternatives:
  - your rod
  lexicon: HALOT
  rationale: '''Staff'' is clear modern English and fits Moses/Aaron narrative usage
    better than the more archaic ''rod.'''
- source_word: וְהַךְ
  chosen: and strike
  alternatives:
  - and hit
  - and smite
  lexicon: HALOT
  rationale: The imperative of נכה commonly means 'strike.' 'Smite' is archaic; 'hit'
    is too colloquial.
- source_word: עֲפַר הָאָרֶץ
  chosen: the dust of the earth
  alternatives:
  - the dust of the land
  - the loose soil of the ground
  lexicon: HALOT
  rationale: עָפָר is 'dust' or fine dry earth. Retaining 'dust of the earth' reflects
    the Hebrew expression and echoes the plague's transformation of dust itself.
- source_word: וְהָיָה
  chosen: and it will become
  alternatives:
  - and it shall become
  - and it will be
  lexicon: HALOT
  rationale: Although literally 'and it will be,' in context the dust is transformed
    into gnats, so 'become' expresses the result more clearly in natural English without
    over-paraphrasing.
- source_word: לְכִנִּם
  chosen: gnats
  alternatives:
  - lice
  - mosquitoes
  lexicon: HALOT
  rationale: כִּנִּים is traditionally debated between 'lice,' 'gnats,' and similar
    tiny pests. 'Gnats' is a common modern rendering that fits the plague context
    and avoids implying certainty about a more specific insect than the Hebrew provides.
- source_word: בְּכָל אֶרֶץ מִצְרַיִם
  chosen: throughout all the land of Egypt
  alternatives:
  - in all the land of Egypt
  - through all the land of Egypt
  lexicon: HALOT
  rationale: בְּכָל marks comprehensive extent. 'Throughout all the land of Egypt'
    communicates the plague's total spread in idiomatic English.
