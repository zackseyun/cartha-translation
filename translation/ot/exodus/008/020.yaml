id: EXO.8.20
reference: Exodus 8:20
source:
  edition: WLC
  text: וַ/יַּ֤עַשׂ יְהוָה֙ כֵּ֔ן וַ/יָּבֹא֙ עָרֹ֣ב כָּבֵ֔ד בֵּ֥יתָ/ה פַרְעֹ֖ה וּ/בֵ֣ית עֲבָדָ֑י/ו וּ/בְ/כָל אֶ֧רֶץ מִצְרַ֛יִם תִּשָּׁחֵ֥ת הָ/אָ֖רֶץ מִ/פְּנֵ֥י הֶ/עָרֹֽב־׃
translation:
  text: And Yahweh did so, and a heavy swarm came into Pharaoh’s house and into his servants’ houses, and throughout all the land of Egypt the land was ruined because of the swarm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a great swarm'; the Hebrew may denote a massive swarm of insects, traditionally understood as flies.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיַּעַשׂ ... כֵּן
  chosen: did so
  alternatives:
  - did thus
  - acted accordingly
  lexicon: HALOT
  rationale: Idiomatic English rendering of the Hebrew verbal phrase with כֵּן, preserving the sense that the LORD carried out what had been announced.
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - entered
  - came in
  lexicon: HALOT
  rationale: Simple narrative verb best rendered as 'came'; the following prepositional phrases specify entry into houses.
- source_word: עָרֹב
  chosen: swarm
  alternatives:
  - mixture
  - swarms of flies
  lexicon: HALOT
  rationale: The Hebrew term refers to the plague traditionally understood as a swarm of insects, but the exact species is uncertain. 'Swarm' preserves the lexical ambiguity better than specifying 'flies' in the main text.
- source_word: כָּבֵד
  chosen: heavy
  alternatives:
  - great
  - severe
  lexicon: HALOT
  rationale: The adjective literally means 'heavy' and here intensifies the swarm's magnitude. 'Heavy swarm' is slightly unusual in English but remains understandable and closer to the Hebrew than the more interpretive 'severe'.
- source_word: בֵּיתָה פַרְעֹה
  chosen: into Pharaoh’s house
  alternatives:
  - to Pharaoh’s house
  - Pharaoh’s palace
  lexicon: HALOT
  rationale: The directional ending on 'house' supports 'into Pharaoh's house.' 'House' is retained rather than 'palace' because the Hebrew says 'house,' though the referent is royal.
- source_word: וּבֵית עֲבָדָיו
  chosen: into his servants’ houses
  alternatives:
  - into the house of his servants
  - into his officials’ houses
  lexicon: HALOT
  rationale: 'The singular construct ''house'' with plural ''servants'' is naturally distributive in English: ''his servants’ houses.'' ''Servants'' is preferred over ''officials'' because the Hebrew term is broader and should not be narrowed without necessity.'
- source_word: וּבְכָל אֶרֶץ מִצְרַיִם
  chosen: throughout all the land of Egypt
  alternatives:
  - in all the land of Egypt
  - through all the land of Egypt
  lexicon: HALOT
  rationale: Captures the comprehensive scope indicated by 'in/through all the land of Egypt' in natural English.
- source_word: תִּשָּׁחֵת הָאָרֶץ
  chosen: the land was ruined
  alternatives:
  - the land was corrupted
  - the land was devastated
  - the land was destroyed
  lexicon: HALOT
  rationale: The Niphal of שׁחת here indicates that the land suffered ruin or devastation. 'Was ruined' is strong but avoids overstating the case as total destruction.
- source_word: מִפְּנֵי הֶעָרֹב
  chosen: because of the swarm
  alternatives:
  - from the presence of the swarm
  - on account of the swarm
  lexicon: HALOT
  rationale: The idiom מִפְּנֵי commonly expresses causation here; 'because of' is the clearest natural English rendering.
