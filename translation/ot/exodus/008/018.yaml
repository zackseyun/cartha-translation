id: EXO.8.18
reference: Exodus 8:18
source:
  edition: WLC
  text: וְ/הִפְלֵיתִי֩ בַ/יּ֨וֹם הַ/ה֜וּא אֶת אֶ֣רֶץ גֹּ֗שֶׁן אֲשֶׁ֤ר עַמִּ/י֙ עֹמֵ֣ד עָלֶ֔י/הָ לְ/בִלְתִּ֥י הֱיֽוֹת שָׁ֖ם עָרֹ֑ב לְמַ֣עַן תֵּדַ֔ע כִּ֛י אֲנִ֥י יְהוָ֖ה בְּ/קֶ֥רֶב הָ/אָֽרֶץ־־׃
translation:
  text: But on that day I will set apart the land of Goshen, where my people dwell, so that no swarm will be there, in order that you may know that I am Yahweh in the midst of the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'swarms' or 'a swarm of insects'; the Hebrew term עָרֹב may refer more broadly to a mass of insects, not only flies.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the midst of the earth.' The Hebrew can be read more broadly, though in context it likely refers to the land of Egypt.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִפְלֵיתִי
  chosen: I will set apart
  alternatives:
  - I will distinguish
  - I will make a distinction concerning
  lexicon: HALOT
  rationale: Hiphil of פלא here conveys making a distinction or treating separately. 'Set apart' is natural English and captures the protective differentiation of Goshen from the plague, while avoiding an overly abstract phrasing.
- source_word: אֶרֶץ גֹּשֶׁן
  chosen: the land of Goshen
  alternatives:
  - the region of Goshen
  lexicon: HALOT
  rationale: אֶרֶץ can mean land/territory/region. 'Land of Goshen' is the standard and sufficiently clear rendering for the geographic area.
- source_word: עַמִּי עֹמֵד עָלֶיהָ
  chosen: where my people dwell
  alternatives:
  - where my people stand
  - where my people live
  lexicon: HALOT
  rationale: The participle עֹמֵד with עַל in reference to a land can idiomatically denote remaining, residing, or being stationed there. 'Dwell' best reflects settled residence in context.
- source_word: לְבִלְתִּי הֱיוֹת שָׁם
  chosen: so that no ... will be there
  alternatives:
  - so that there may not be ... there
  - to prevent ... from being there
  lexicon: HALOT
  rationale: 'The infinitival construction expresses purpose/result: the plague will not occur in Goshen. English is smoothed to a natural purposive clause.'
- source_word: עָרֹב
  chosen: swarm of flies
  alternatives:
  - swarms
  - mixed swarm
  - biting insects
  lexicon: HALOT
  rationale: The exact zoological reference is debated, but in the plague context 'swarm of flies' is the clearest idiomatic English rendering and aligns with common understanding. Because the term may denote a broader swarm of insects, that alternative is preserved in a footnote.
- source_word: לְמַעַן תֵּדַע
  chosen: in order that you may know
  alternatives:
  - so that you may know
  lexicon: HALOT
  rationale: This clause states divine purpose directed to Pharaoh (2ms verb). 'In order that' preserves the explicit purposive force.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּקֶרֶב הָאָרֶץ
  chosen: in the midst of the land
  alternatives:
  - in the midst of the earth
  - in the land
  lexicon: HALOT
  rationale: בקרב denotes being in the midst/middle of something. הָאָרֶץ here most naturally refers to the land, i.e., Egypt/the earthly realm of events in context, not a universal cosmological statement. 'In the midst of the land' preserves the concrete Hebrew expression.
