id: EXO.8.3
reference: Exodus 8:3
source:
  edition: WLC
  text: וַ/יַּֽעֲשׂוּ כֵ֥ן הַֽ/חֲרְטֻמִּ֖ים בְּ/לָטֵי/הֶ֑ם וַ/יַּעֲל֥וּ אֶת הַֽ/צְפַרְדְּעִ֖ים
    עַל אֶ֥רֶץ מִצְרָֽיִם־־־׃
translation:
  text: And the magicians did the same by their secret arts, and they brought up frogs
    over the land of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with their enchantments' or 'by their occult arts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ כֵן
  chosen: did the same
  alternatives:
  - did so
  - did likewise
  lexicon: HALOT
  rationale: The idiom combines עשה with כֵן to indicate performing in the same manner
    as the preceding act. 'Did the same' is natural modern English and preserves the
    comparative force.
- source_word: הַחֲרְטֻמִּים
  chosen: the magicians
  alternatives:
  - the sorcerers
  - the ritual experts
  lexicon: HALOT
  rationale: In Exodus this term refers to Pharaoh's court practitioners who imitate
    signs through occult or esoteric means. 'Magicians' is the standard and clearest
    English rendering in context.
- source_word: בְּלָטֵיהֶם
  chosen: by their secret arts
  alternatives:
  - with their enchantments
  - by their occult arts
  lexicon: HALOT
  rationale: The noun denotes secret or hidden magical practices. 'By their secret
    arts' communicates both instrumentality and the concealed/esoteric sense without
    over-specifying the exact technique.
- source_word: וַיַּעֲלוּ
  chosen: they brought up
  alternatives:
  - they caused to come up
  - they made come up
  lexicon: HALOT
  rationale: 'The Hiphil of עלה is causative: the magicians caused the frogs to come
    up. ''Brought up'' is concise, idiomatic, and preserves the causative sense better
    than a simple ''produced''.'
- source_word: אֶת הַצְפַרְדְּעִים
  chosen: frogs
  lexicon: HALOT
  rationale: Straightforward plural noun with definite article. English does not require
    the article here after 'brought up'.
- source_word: עַל אֶרֶץ מִצְרָיִם
  chosen: over the land of Egypt
  alternatives:
  - upon the land of Egypt
  - on the land of Egypt
  lexicon: HALOT
  rationale: עַל commonly means 'upon/over.' 'Over the land of Egypt' reads naturally
    in English and conveys the spreading of the frogs across the country.
