theological_decisions:
- issue: Nature of the magicians' act
  chosen_reading: Render the text straightforwardly as reporting that the magicians
    also brought up frogs.
  alternative_readings:
  - Render more skeptically as apparent imitation or trickery
  rationale: The Hebrew narrative states the action without qualification. The translation
    should not import a naturalistic or polemical explanation beyond what the text
    says.
  doctrine_reference: Translation philosophy §1, §3
