id: EXO.8.9
reference: Exodus 8:9
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ יְהוָ֖ה כִּ/דְבַ֣ר מֹשֶׁ֑ה וַ/יָּמֻ֨תוּ֙ הַֽ/צְפַרְדְּעִ֔ים מִן הַ/בָּתִּ֥ים מִן הַ/חֲצֵרֹ֖ת וּ/מִן הַ/שָּׂדֹֽת־־־׃
translation:
  text: And Yahweh did according to the word of Moses, and the frogs died from the houses, from the courtyards, and from the fields.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - acted
  - made
  lexicon: HALOT
  rationale: The verb עשה is broad ('do/make'). In the idiom 'did according to the word of Moses,' 'did' is the most natural and sufficiently formal English rendering.
- source_word: כִּדְבַר מֹשֶׁה
  chosen: according to the word of Moses
  alternatives:
  - according to Moses' word
  - as Moses said
  lexicon: HALOT
  rationale: דבר here means 'word' or 'matter.' 'According to the word of Moses' preserves the Hebrew construction and the mediating role of Moses without over-paraphrasing.
- source_word: וַיָּמֻתוּ
  chosen: died
  alternatives:
  - perished
  lexicon: HALOT
  rationale: מות is the ordinary verb 'to die.' 'Died' is the plainest and most direct rendering.
- source_word: הַצְפַרְדְּעִים
  chosen: the frogs
  lexicon: HALOT
  rationale: Standard rendering of the noun for frogs in the plague narrative.
- source_word: מִן
  chosen: out of
  alternatives:
  - from
  lexicon: HALOT
  rationale: Repeated מִן with locations is rendered 'out of' to convey removal from within those places and to mirror the Hebrew repetition with natural English rhythm.
- source_word: הַבָּתִּים
  chosen: the houses
  alternatives:
  - the homes
  lexicon: HALOT
  rationale: בית in the plural here refers to literal houses. 'Houses' is the straightforward formal rendering.
- source_word: הַחֲצֵרֹת
  chosen: the courtyards
  alternatives:
  - the courts
  - the enclosures
  lexicon: HALOT
  rationale: חצרות refers to enclosed yards/courtyards associated with dwellings. 'Courtyards' is clearer in modern English than 'courts' while remaining close to the source.
- source_word: הַשָּׂדֹת
  chosen: the fields
  alternatives:
  - the open country
  lexicon: HALOT
  rationale: שׂדות is the normal term for fields/open agricultural land. 'Fields' is the standard rendering.
