id: EXO.8.23
reference: Exodus 8:23
source:
  edition: WLC
  text: דֶּ֚רֶךְ שְׁלֹ֣שֶׁת יָמִ֔ים נֵלֵ֖ךְ בַּ/מִּדְבָּ֑ר וְ/זָבַ֨חְנוּ֙ לַֽ/יהוָ֣ה אֱלֹהֵ֔י/נוּ כַּ/אֲשֶׁ֖ר יֹאמַ֥ר אֵלֵֽי/נוּ׃
translation:
  text: We will go a three days' journey into the wilderness and sacrifice to Yahweh our God, just as he tells us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'three days’ journey.'
    reason: lexical_alternative
  - marker: b
    text: Or 'as he will tell us' or 'as he says to us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דֶּרֶךְ שְׁלֹשֶׁת יָמִים
  chosen: a journey of three days
  alternatives:
  - three days' journey
  - a three-day journey
  lexicon: HALOT
  rationale: דֶּרֶךְ with a measure of time functions idiomatically for the distance/travel of that duration. 'A journey of three days' is natural English while preserving the Hebrew sense without over-paraphrasing.
- source_word: נֵלֵךְ
  chosen: We will go
  alternatives:
  - Let us go
  - We must go
  lexicon: HALOT
  rationale: Qal imperfect 1cp here is straightforwardly future in Moses' reported request. 'We will go' preserves the verbal force without importing modal nuance.
- source_word: בַּמִּדְבָּר
  chosen: into the wilderness
  alternatives:
  - in the wilderness
  - into the desert
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/open country rather than specifically sandy desert. 'Into the wilderness' fits the motion implied by 'go' and is standard, clear English.
- source_word: וְזָבַחְנוּ
  chosen: and sacrifice
  alternatives:
  - and we will sacrifice
  - and offer sacrifices
  lexicon: HALOT
  rationale: The verb זבח refers to sacrificial slaughter/offer sacrifice. 'Sacrifice' is concise and preserves cultic meaning; 'offer sacrifices' is possible but slightly more expansive than the Hebrew verb alone requires.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated, following the stated default and longstanding reverential convention.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Construct with 1cp suffix is directly rendered 'our God,' preserving covenantal identification.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according to what
  lexicon: HALOT
  rationale: כַּאֲשֶׁר introduces comparison/conformity. 'Just as' clearly conveys that the sacrifice will be done in accordance with divine instruction.
- source_word: יֹאמַר אֵלֵינוּ
  chosen: he tells us
  alternatives:
  - he says to us
  - he will tell us
  lexicon: HALOT
  rationale: The imperfect can be rendered with present sense in English when expressing expected or customary instruction. 'He tells us' reads naturally and fits the sense of acting according to the LORD's direction; a more future-oriented rendering is also possible and worth preserving in a footnote.
