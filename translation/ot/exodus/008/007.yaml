id: EXO.8.7
reference: Exodus 8:7
source:
  edition: WLC
  text: וְ/סָר֣וּ הַֽ/צְפַרְדְּעִ֗ים מִמְּ/ךָ֙ וּ/מִ/בָּ֣תֶּ֔י/ךָ וּ/מֵ/עֲבָדֶ֖י/ךָ
    וּ/מֵ/עַמֶּ֑/ךָ רַ֥ק בַּ/יְאֹ֖ר תִּשָּׁאַֽרְנָה׃
translation:
  text: And the frogs will depart from you, and from your houses, and from your servants,
    and from your people; only in the Nile will they remain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'in the river.' The Hebrew יְאֹר can mean 'river,' but in Exodus it
      commonly refers specifically to the Nile.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסָרוּ
  chosen: And ... will depart
  alternatives:
  - and ... shall turn aside
  - and ... will be removed
  lexicon: HALOT
  rationale: סוּר commonly means 'turn aside, depart, remove oneself.' In this context
    of the plague ending, 'depart' is natural modern English and preserves the sense
    that the frogs go away rather than being directly destroyed.
- source_word: הַצְפַרְדְּעִים
  chosen: the frogs
  lexicon: HALOT
  rationale: Straightforward rendering of the definite plural noun for the plague
    animals.
- source_word: מִמְּךָ
  chosen: from you
  alternatives:
  - away from you
  lexicon: HALOT
  rationale: The preposition מן with 2ms suffix is best rendered simply 'from you.'
    English idiom supplies the broader sense of removal from Pharaoh's person/presence.
- source_word: וּמִבָּתֶּיךָ
  chosen: and from your houses
  alternatives:
  - and from your house
  lexicon: HALOT
  rationale: The plural construct with 2ms suffix is naturally 'your houses.' Although
    English can sometimes collectivize, the Hebrew plural should be preserved.
- source_word: וּמֵעֲבָדֶיךָ
  chosen: and from your servants
  alternatives:
  - and from your officials
  - and from your slaves
  lexicon: HALOT
  rationale: עֶבֶד can mean servant, slave, or official depending on context. Here
    it refers broadly to Pharaoh's attendants/courtiers under his authority. 'Servants'
    is the most contextually fitting and readable choice; 'officials' is possible
    but narrower, while 'slaves' would over-specify bonded status not foregrounded
    here.
- source_word: וּמֵעַמֶּךָ
  chosen: and from your people
  alternatives:
  - and from your subjects
  lexicon: HALOT
  rationale: עַם here refers to Pharaoh's populace. 'People' is the standard and sufficiently
    broad rendering.
- source_word: רַק
  chosen: only
  alternatives:
  - except that
  - just
  lexicon: HALOT
  rationale: רַק marks limitation or exception. 'Only' cleanly introduces the exception
    that follows.
- source_word: בַּיְאֹר
  chosen: in the Nile
  alternatives:
  - in the river
  lexicon: HALOT
  rationale: יְאֹר in Exodus commonly refers specifically to the Nile, not merely
    any river. Translating 'the Nile' favors source-context clarity over a more generic
    traditional 'river.'
- source_word: תִּשָּׁאַרְנָה
  chosen: will they remain
  alternatives:
  - they will be left
  - they will remain
  lexicon: HALOT
  rationale: The Niphal imperfect of שׁאר conveys remaining or being left over. The
    fronted prepositional phrase in Hebrew is reflected by the English inversion 'in
    the Nile will they remain' for emphasis, though still readable.
