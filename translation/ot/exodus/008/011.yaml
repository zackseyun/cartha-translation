id: EXO.8.11
reference: Exodus 8:11
source:
  edition: WLC
  text: וַ/יַּ֣רְא פַּרְעֹ֗ה כִּ֤י הָֽיְתָה֙ הָֽ/רְוָחָ֔ה וְ/הַכְבֵּד֙ אֶת לִבּ֔/וֹ
    וְ/לֹ֥א שָׁמַ֖ע אֲלֵ/הֶ֑ם כַּ/אֲשֶׁ֖ר דִּבֶּ֥ר יְהוָֽה־׃ס
translation:
  text: But when Pharaoh saw that there was relief, he hardened his heart and did
    not listen to them, just as the LORD had said.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there was respite.' The Hebrew term can denote relief, easing, or breathing
      space.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - perceived
  - realized
  lexicon: HALOT
  rationale: The verb ראה literally means 'see,' but in context it carries the sense
    of recognizing a changed situation. 'Saw' preserves the Hebrew idiom while remaining
    natural in English.
- source_word: כִּי הָיְתָה הָרְוָחָה
  chosen: that there was relief
  alternatives:
  - that there was respite
  - that there was breathing room
  lexicon: HALOT
  rationale: הָרְוָחָה denotes relief, respite, or a widening/easing of pressure.
    'There was relief' is clear modern English and fits the plague context without
    sounding overly idiomatic.
- source_word: וְהַכְבֵּד אֶת לִבּוֹ
  chosen: he hardened his heart
  alternatives:
  - he made his heart heavy
  - he made his heart stubborn
  lexicon: HALOT
  rationale: The Hiphil of כבד with 'heart' literally means 'make heavy,' but in this
    recurring Exodus idiom it refers to obstinacy. 'Hardened his heart' is the established
    and contextually accurate rendering, while still reflecting the Hebrew metaphor.
- source_word: וְלֹא שָׁמַע אֲלֵהֶם
  chosen: and did not listen to them
  alternatives:
  - and did not heed them
  - and did not obey them
  lexicon: HALOT
  rationale: שׁמע with אֶל commonly means 'listen to' or 'heed.' 'Did not listen to
    them' is the most direct rendering; 'obey' would over-specify, since the immediate
    sense is refusal to heed Moses and Aaron.
- source_word: כַּאֲשֶׁר דִּבֶּר יְהוָה
  chosen: just as the LORD had said
  alternatives:
  - as the LORD had spoken
  - just as the LORD said
  lexicon: HALOT
  rationale: The clause marks fulfillment of prior divine speech. 'Had said' appropriately
    conveys anteriority in English narrative. יְהוָה is rendered 'the LORD' per project
    doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md, the covenant name יְהוָה is rendered 'the LORD' rather
    than transliterated forms.
