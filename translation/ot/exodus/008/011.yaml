theological_decisions:
- issue: Agency in Pharaoh's hardening
  chosen_reading: Pharaoh is presented here as hardening his own heart.
  alternative_readings:
  - A passive sense that his heart became hard
  - An implied divine causation in this verse
  rationale: The Hebrew uses an active causative form with Pharaoh as subject, so
    this verse specifically attributes the hardening to Pharaoh himself. This preserves
    the broader canonical tension in Exodus, where other passages also speak of God
    hardening Pharaoh's heart, without importing that emphasis into this verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
