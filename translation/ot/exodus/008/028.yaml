theological_decisions:
- issue: Agency in Pharaoh's hardening
  chosen_reading: Pharaoh himself hardened his heart
  alternative_readings:
  - Pharaoh's heart became hard
  - Pharaoh made his heart heavy
  rationale: The Hebrew verbal form with Pharaoh as explicit subject presents Pharaoh
    as the acting agent in this verse. The translation preserves that agency and does
    not soften it into a mere state change. This also preserves the narrative tension
    in Exodus, where different verses variously describe Pharaoh hardening his own
    heart and God hardening Pharaoh's heart.
  doctrine_reference: Preserve theological tension rather than resolve it.
