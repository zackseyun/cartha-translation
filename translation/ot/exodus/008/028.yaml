id: EXO.8.28
reference: Exodus 8:28
source:
  edition: WLC
  text: וַ/יַּכְבֵּ֤ד פַּרְעֹה֙ אֶת לִבּ֔/וֹ גַּ֖ם בַּ/פַּ֣עַם הַ/זֹּ֑את וְ/לֹ֥א שִׁלַּ֖ח
    אֶת הָ/עָֽם־־׃פ
translation:
  text: But Pharaoh hardened his heart this time also, and did not let the people
    go.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'made his heart heavy.' The idiom means that Pharaoh became
      stubborn or unresponsive.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכְבֵּד
  chosen: hardened
  alternatives:
  - made heavy
  - became stubborn
  lexicon: HALOT
  rationale: The verb from כבד literally relates to heaviness, but in the idiom with
    'heart' it denotes becoming insensitive or obstinate. 'Hardened' is the clearest
    natural English rendering and matches the narrative motif, while preserving the
    moral resistance implied by the Hebrew.
- source_word: לִבּוֹ
  chosen: his heart
  lexicon: HALOT
  rationale: Literal rendering is appropriate. In Hebrew anthropology 'heart' is the
    center of will and disposition, and no paraphrase is needed here.
- source_word: גַּם
  chosen: also
  alternatives:
  - even
  - again
  lexicon: HALOT
  rationale: 'Here גַּם adds the sense of addition: Pharaoh did this yet again. ''Also''
    works naturally with the following temporal phrase.'
- source_word: בַּפַּעַם הַזֹּאת
  chosen: this time
  alternatives:
  - on this occasion
  lexicon: HALOT
  rationale: This idiom refers to the present instance or occasion. 'This time' is
    concise, idiomatic English.
- source_word: שִׁלַּח
  chosen: let ... go
  alternatives:
  - send away
  - release
  lexicon: HALOT
  rationale: In the Exodus context, שלח with the people as object is conventionally
    and accurately rendered 'let the people go.' It captures both permission and release
    without sounding wooden.
- source_word: הָעָם
  chosen: the people
  lexicon: HALOT
  rationale: Definite singular collective noun; 'the people' is the natural English
    equivalent in context, referring to Israel.
- source_word: וְלֹא
  chosen: and did not
  alternatives:
  - but did not
  lexicon: HALOT
  rationale: The conjunction plus negation straightforwardly continues the clause.
    English style supports 'and did not' after the prior statement.
- source_word: וַ
  chosen: But
  alternatives:
  - And
  lexicon: HALOT
  rationale: Although the waw-consecutive often simply advances narrative with 'and,'
    English discourse here benefits from 'But' to mark Pharaoh's contrary response
    after relief from the plague. This is an optimal-equivalence adjustment for readability
    and discourse force.
