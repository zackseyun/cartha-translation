id: EXO.8.22
reference: Exodus 8:22
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר מֹשֶׁ֗ה לֹ֤א נָכוֹן֙ לַ/עֲשׂ֣וֹת כֵּ֔ן כִּ֚י תּוֹעֲבַ֣ת מִצְרַ֔יִם
    נִזְבַּ֖ח לַ/יהוָ֣ה אֱלֹהֵ֑י/נוּ הֵ֣ן נִזְבַּ֞ח אֶת תּוֹעֲבַ֥ת מִצְרַ֛יִם לְ/עֵינֵי/הֶ֖ם
    וְ/לֹ֥א יִסְקְלֻֽ/נוּ־׃
translation:
  text: But Moses said, “It would not be right to do so, because we would sacrifice
    to the LORD our God what is detestable to the Egyptians. If we sacrifice what
    is detestable to the Egyptians before their eyes, will they not stone us?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “the abomination of the Egyptians.” The phrase likely
      means what the Egyptians regarded as abhorrent.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָכוֹן
  chosen: it would not be right
  alternatives:
  - it is not proper
  - it is not fitting
  - it is not correct
  lexicon: HALOT
  rationale: נָכוֹן here denotes what is proper, fitting, or established as acceptable.
    'It would not be right' gives natural English while preserving the moral/practical
    impropriety Moses expresses.
- source_word: לַעֲשׂוֹת כֵּן
  chosen: to do so
  alternatives:
  - to do this
  - to act this way
  lexicon: HALOT
  rationale: A standard idiom meaning 'to do thus/so.' 'To do so' is concise and idiomatic
    in English.
- source_word: תּוֹעֲבַת מִצְרַיִם
  chosen: what is detestable to the Egyptians
  alternatives:
  - the abomination of the Egyptians
  - what the Egyptians detest
  lexicon: HALOT
  rationale: The construct phrase is ambiguous between an objective sense ('what Egyptians
    detest') and a genitival label. In context Moses means the animals/sacrifices
    offensive to Egyptian religious sensibilities. 'What is detestable to the Egyptians'
    communicates the sense clearly in modern English.
- source_word: נִזְבַּח
  chosen: we would sacrifice
  alternatives:
  - we will sacrifice
  - we sacrifice
  lexicon: HALOT
  rationale: Although formally imperfect, in this causal clause it expresses intended
    or contemplated action under Pharaoh's proposal. 'Would sacrifice' fits the argument
    and English conditional logic.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD.' This also
    matches established covenantal usage in English Bibles.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Straightforward possessive construction; retained explicitly to preserve
    covenantal identity.
- source_word: הֵן
  chosen: If
  alternatives:
  - Behold, if
  - Surely if
  lexicon: HALOT
  rationale: Here הֵן introduces a vivid hypothetical condition rather than serving
    as a mere interjection. 'If' best fits the flow of Moses' rhetorical question
    in English.
- source_word: לְעֵינֵיהֶם
  chosen: before their eyes
  alternatives:
  - in their sight
  - before them
  lexicon: HALOT
  rationale: The idiom literally refers to visibility in front of them. 'Before their
    eyes' preserves the vividness and rhetorical force.
- source_word: יִסְקְלֻנוּ
  chosen: will they not stone us?
  alternatives:
  - would they not stone us?
  - will they not pelt us with stones?
  lexicon: HALOT
  rationale: The verb specifically denotes execution or attack by stoning. The rhetorical
    question with 'will they not' reflects the Hebrew הלא sense created by וְלֹא in
    context.
