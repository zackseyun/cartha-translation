theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of תּוֹעֲבַת מִצְרַיִם
  chosen_reading: 'objective sense: what is detestable to the Egyptians'
  alternative_readings:
  - 'subjective/genitival: the abomination of Egypt'
  rationale: The context concerns Egyptian offense at Israelite sacrificial animals
    and the danger of violent reaction. The objective sense best explains the logic
    of the verse without importing extra interpretation.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
