id: EXO.8.26
reference: Exodus 8:26
source:
  edition: WLC
  text: וַ/יֵּצֵ֥א מֹשֶׁ֖ה מֵ/עִ֣ם פַּרְעֹ֑ה וַ/יֶּעְתַּ֖ר אֶל יְהוָֽה־׃
translation:
  text: So Moses went out from Pharaoh and pleaded with Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prayed earnestly to the LORD.' The Hebrew verb conveys urgent entreaty or supplication.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - went forth
  - left
  lexicon: HALOT
  rationale: Qal wayyiqtol of יצא, denoting physical departure. 'Went out' is the most direct and natural rendering in modern English while preserving the narrative sequence.
- source_word: מֵעִם
  chosen: from
  alternatives:
  - from with
  - away from the presence of
  lexicon: HALOT
  rationale: The preposition with עִם marks separation from association or presence. In idiomatic English, 'from Pharaoh' communicates the sense clearly; the fuller nuance of departing from Pharaoh's presence is implicit.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  rationale: Standard English transliteration of the royal title/name used throughout Exodus.
- source_word: וַיֶּעְתַּר
  chosen: pleaded
  alternatives:
  - entreated
  - prayed earnestly
  - implored
  lexicon: HALOT
  rationale: עתר in this stem commonly conveys earnest supplication rather than a generic act of prayer. 'Pleaded' captures the intensity and directness of Moses' intercession in readable modern English.
- source_word: אֶל
  chosen: with
  alternatives:
  - to
  lexicon: HALOT
  rationale: Although אֶל is literally 'to,' English idiom with 'pleaded' normally takes 'with' for the person addressed. This is an optimal-equivalence adjustment for natural English without changing the sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
