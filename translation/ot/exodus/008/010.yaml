id: EXO.8.10
reference: Exodus 8:10
source:
  edition: WLC
  text: וַ/יִּצְבְּר֥וּ אֹתָ֖/ם חֳמָרִ֣ם חֳמָרִ֑ם וַ/תִּבְאַ֖שׁ הָ/אָֽרֶץ׃
translation:
  text: And they piled them up in heap after heap, and the land stank.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in heaps' or 'heap upon heap'; the Hebrew repeats the noun for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצְבְּרוּ
  chosen: they piled ... up
  alternatives:
  - they gathered
  - they heaped up
  lexicon: HALOT
  rationale: The verb צבר in the waw-consecutive imperfect denotes collecting into
    a mass or heap. 'Piled ... up' is natural modern English and preserves the concrete
    action better than the more generic 'gathered.'
- source_word: אֹתָם
  chosen: them
  rationale: Direct-object pronoun referring to the frogs from the immediate context;
    explicit in English as 'them.'
- source_word: חֳמָרִם חֳמָרִם
  chosen: in heap after heap
  alternatives:
  - in heaps
  - heap upon heap
  lexicon: HALOT
  rationale: The repeated noun intensifies and distributively emphasizes multiple
    piles. 'Heap after heap' captures the repetition idiomatically in readable English
    while preserving the sense of numerous heaps.
- source_word: וַתִּבְאַשׁ
  chosen: stank
  alternatives:
  - became foul-smelling
  - reeked
  lexicon: HALOT
  rationale: The verb באש means to stink or emit a foul odor. 'Stank' is vivid, direct,
    and closer to the Hebrew's force than the more clinical 'became foul-smelling.'
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the land/region affected by the plague, not the
    whole earth. 'The land' is the standard contextual rendering in Exodus plague
    narratives.
