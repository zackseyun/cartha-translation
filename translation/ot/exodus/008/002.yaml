id: EXO.8.2
reference: Exodus 8:2
source:
  edition: WLC
  text: וַ/יֵּ֤ט אַהֲרֹן֙ אֶת יָד֔/וֹ עַ֖ל מֵימֵ֣י מִצְרָ֑יִם וַ/תַּ֨עַל֙ הַ/צְּפַרְדֵּ֔עַ
    וַ/תְּכַ֖ס אֶת אֶ֥רֶץ מִצְרָֽיִם־־׃
translation:
  text: So Aaron stretched out his hand over the waters of Egypt, and the frogs came
    up and covered the land of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the frog' uses a singular form that likely functions collectively;
      hence 'the frogs.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּט
  chosen: stretched out
  alternatives:
  - extended
  - reached out
  lexicon: HALOT
  rationale: The verb נטה in this plague-sign context commonly denotes extending or
    stretching out the hand. 'Stretched out' is idiomatic in English and matches the
    gesture of authoritative action better than the more generic 'reached out.'
- source_word: יָדוֹ
  chosen: his hand
  alternatives:
  - his arm
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'his hand,' not 'arm.' Retaining 'hand' preserves
    the concrete imagery of Aaron's enacted sign.
- source_word: עַל
  chosen: over
  alternatives:
  - upon
  - against
  lexicon: HALOT
  rationale: In this context of extending the hand in relation to the waters, 'over'
    is the most natural English rendering and reflects spatial orientation without
    unnecessary archaism.
- source_word: מֵימֵי מִצְרַיִם
  chosen: the waters of Egypt
  alternatives:
  - the water of Egypt
  lexicon: HALOT
  rationale: The plural construct is best represented by 'the waters of Egypt,' referring
    collectively to Egypt's bodies of water and matching the plague setting.
- source_word: וַתַּעַל
  chosen: came up
  alternatives:
  - went up
  - rose up
  lexicon: HALOT
  rationale: עלה here describes the frogs emerging upward from the waters/river system.
    'Came up' is natural English for movement into view and onto the land.
- source_word: הַצְּפַרְדֵּעַ
  chosen: the frogs
  alternatives:
  - the frog
  lexicon: HALOT
  rationale: Although the Hebrew noun is formally singular with the article, it functions
    here as a collective singular. English normally renders this sense with the plural
    'the frogs,' especially since they subsequently cover the land.
- source_word: וַתְּכַס
  chosen: covered
  alternatives:
  - concealed
  - blanketed
  lexicon: HALOT
  rationale: כסה straightforwardly means 'cover.' 'Covered' is both accurate and suitably
    vivid without adding interpretive color.
- source_word: אֶרֶץ מִצְרַיִם
  chosen: the land of Egypt
  alternatives:
  - the country of Egypt
  - the earth of Egypt
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the territory/land of Egypt, not the whole earth.
    'The land of Egypt' is the standard and contextually precise rendering.
