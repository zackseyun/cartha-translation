id: EXO.8.16
reference: Exodus 8:16
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל מֹשֶׁ֗ה הַשְׁכֵּ֤ם בַּ/בֹּ֨קֶר֙ וְ/הִתְיַצֵּב֙ לִ/פְנֵ֣י
    פַרְעֹ֔ה הִנֵּ֖ה יוֹצֵ֣א הַ/מָּ֑יְמָ/ה וְ/אָמַרְתָּ֣ אֵלָ֗י/ו כֹּ֚ה אָמַ֣ר יְהוָ֔ה
    שַׁלַּ֥ח עַמִּ֖/י וְ/יַֽעַבְדֻֽ/נִי־׃
translation:
  text: 'Then the LORD said to Moses, “Rise early in the morning and station yourself
    before Pharaoh. Look, he is going out to the water, and you shall say to him,
    ‘Thus says the LORD: Let my people go, so that they may serve me.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to the Nile”; the Hebrew reads more literally “to the water.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence; 'and said' is more formally
    possible.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name יְהוָה is rendered 'the LORD' rather
    than transliterated.
- source_word: הַשְׁכֵּם בַּבֹּקֶר
  chosen: Rise early in the morning
  alternatives:
  - Get up early in the morning
  - Present yourself early in the morning
  lexicon: HALOT
  rationale: The Hiphil imperative of שׁכם with 'in the morning' is an idiom for rising
    early. 'Rise early in the morning' is idiomatic and sufficiently formal.
- source_word: וְהִתְיַצֵּב לִפְנֵי
  chosen: and station yourself before
  alternatives:
  - and stand before
  - and present yourself before
  lexicon: HALOT
  rationale: The Hitpael of יצב conveys taking one's stand or positioning oneself.
    'Station yourself before' preserves the deliberate, confrontational sense better
    than the flatter 'stand before.'
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה draws attention to what follows. 'Look' is readable modern English;
    'behold' is too archaic for project style.
- source_word: יוֹצֵא הַמָּיְמָה
  chosen: he is going out to the water
  alternatives:
  - he goes out to the water
  - he is going out to the Nile
  lexicon: HALOT
  rationale: 'The participle יוֹצֵא naturally gives an ongoing/imminent action: ''is
    going out.'' הַמָּיְמָה is literally ''to the water.'' While context likely points
    to the Nile, the Hebrew here says ''the water,'' so the main text keeps the more
    direct rendering.'
- source_word: וְאָמַרְתָּ אֵלָיו
  chosen: and you shall say to him
  alternatives:
  - and say to him
  lexicon: HALOT
  rationale: English future-like instruction fits the Hebrew sequence of commands
    naturally in context.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: This is a standard prophetic messenger formula. 'Thus says the LORD'
    preserves its recognizable force and form.
- source_word: שַׁלַּח עַמִּי
  chosen: Let my people go
  alternatives:
  - Send out my people
  - Release my people
  lexicon: HALOT
  rationale: The Piel imperative of שׁלח here is the established and accurate demand
    for release. 'Let my people go' is both idiomatic and faithful.
- source_word: וְיַעַבְדֻנִי
  chosen: so that they may serve me
  alternatives:
  - and they may serve me
  - that they may worship me
  lexicon: HALOT
  rationale: The conjunction here expresses purpose/result after the release command.
    עבד means 'serve'; while worship is included in context, 'serve me' is the broader
    and more lexically direct rendering.
