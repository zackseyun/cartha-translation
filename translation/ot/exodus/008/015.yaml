theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guideline explicitly sets 'the LORD' as the default rendering
    for YHWH; alternatives may be noted but not used in the main text absent special
    contextual reason.
  doctrine_reference: 'DOCTRINE.md — Contested terms: יְהוָה YHWH'
- issue: Agency in Pharaoh's hardening
  chosen_reading: Pharaoh’s heart was hardened
  alternative_readings:
  - Pharaoh hardened his heart
  - Pharaoh's heart became hard/strong
  rationale: The Hebrew here does not explicitly state God as agent, nor does it explicitly
    make Pharaoh the direct object-agent in English style. The passive/resultative
    rendering preserves the text's wording and theological tension rather than resolving
    agency beyond what the verse states.
  doctrine_reference: DOCTRINE.md — Preserve theological tension rather than resolve
    it
