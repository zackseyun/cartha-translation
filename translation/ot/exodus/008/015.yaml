id: EXO.8.15
reference: Exodus 8:15
source:
  edition: WLC
  text: וַ/יֹּאמְר֤וּ הַֽ/חַרְטֻמִּים֙ אֶל פַּרְעֹ֔ה אֶצְבַּ֥ע אֱלֹהִ֖ים הִ֑וא וַ/יֶּחֱזַ֤ק
    לֵב פַּרְעֹה֙ וְ/לֹֽא שָׁמַ֣ע אֲלֵ/הֶ֔ם כַּ/אֲשֶׁ֖ר דִּבֶּ֥ר יְהוָֽה־־־׃ס
translation:
  text: Then the magicians said to Pharaoh, “This is the finger of God.” But Pharaoh’s
    heart was hardened, and he did not listen to them, just as the LORD had spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the finger of God''; an idiom indicating direct divine power
      at work.'
    reason: cultural_note
  - marker: b
    text: Or 'Pharaoh’s heart became hard/strong.' The Hebrew does not explicitly
      state the agent of the hardening in this clause.
    reason: lexical_alternative
  - marker: c
    text: Hebrew YHWH, traditionally rendered 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַחַרְטֻמִּים
  chosen: the magicians
  alternatives:
  - the sorcerers
  - the court magicians
  lexicon: HALOT
  rationale: Refers to Pharaoh's ritual specialists/occult practitioners. 'Magicians'
    is the standard clear English rendering and fits the Exodus context without over-specifying
    their court role in the main text.
- source_word: אֶצְבַּע אֱלֹהִים הִוא
  chosen: This is the finger of God
  alternatives:
  - It is the finger of God
  - This is God's finger
  lexicon: HALOT
  rationale: The Hebrew is a verbless clause with feminine pronoun הִוא agreeing with
    'finger' (feminine). 'This is the finger of God' is natural English and preserves
    the idiomatic force of direct divine power at work.
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - a god
  - gods
  lexicon: HALOT
  rationale: Although אֱלֹהִים can be grammatically plural or contextually indefinite
    in some settings, here the singular predicate sense is most natural in the narrative,
    especially in light of the immediate contest between Pharaoh and Israel's God.
    English singular 'God' best reflects the intended referent.
- source_word: וַיֶּחֱזַק לֵב פַּרְעֹה
  chosen: Pharaoh’s heart was hardened
  alternatives:
  - Pharaoh's heart became strong
  - Pharaoh hardened his heart
  lexicon: HALOT
  rationale: The verb חזק in the hardening formula can denote becoming strong/firm.
    Here the form is third masculine singular with 'heart' as the following subject-like
    noun in Hebrew narrative style. English passive 'was hardened' best captures the
    resultant obstinacy without incorrectly making Pharaoh the explicit agent in this
    clause.
- source_word: שָׁמַע אֲלֵהֶם
  chosen: did not listen to them
  alternatives:
  - did not heed them
  - did not obey them
  lexicon: HALOT
  rationale: שׁמע with אֶל commonly means 'listen to' or 'heed.' 'Listen to them'
    is clear modern English; 'heed' is possible but slightly less natural for the
    target audience.
- source_word: כַּאֲשֶׁר דִּבֶּר יְהוָה
  chosen: just as the LORD had spoken
  alternatives:
  - as the LORD had said
  - just as the LORD said
  lexicon: HALOT
  rationale: This formula points back to prior divine declaration. The pluperfect
    'had spoken' fits the narrative sequence in English. Per doctrine, יְהוָה is rendered
    'the LORD' in the main text.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD,' preserving established reverential convention and LXX/English Bible pattern.
