id: EXO.27.14
reference: Exodus 27:14
source:
  edition: WLC
  text: וַ/חֲמֵ֨שׁ עֶשְׂרֵ֥ה אַמָּ֛ה קְלָעִ֖ים לַ/כָּתֵ֑ף עַמֻּדֵי/הֶ֣ם שְׁלֹשָׁ֔ה
    וְ/אַדְנֵי/הֶ֖ם שְׁלֹשָֽׁה׃
translation:
  text: Fifteen cubits of hangings for the one side, with their three pillars and
    their three bases.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their three sockets.' The Hebrew term can denote the socket-like bases
      supporting the pillars.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲמֵשׁ עֶשְׂרֵה
  chosen: fifteen
  alternatives:
  - fifteen [units]
  lexicon: HALOT
  rationale: The compound numeral straightforwardly means 'fifteen.' No expansion
    beyond the text is needed because the following noun supplies the unit.
- source_word: אַמָּה
  chosen: cubits
  alternatives:
  - cubits long
  - cubits in length
  lexicon: HALOT
  rationale: 'אַמָּה is the standard linear measure ''cubit.'' English idiom prefers
    the plural here: ''fifteen cubits.'' The sense of length is inherent and need
    not be separately stated.'
- source_word: קְלָעִים
  chosen: hangings
  alternatives:
  - curtains
  - screen-cloths
  lexicon: HALOT
  rationale: In tabernacle-court contexts קְלָעִים refers to the fabric hangings forming
    the enclosure. 'Hangings' is natural modern English and avoids implying interior
    drapery more strongly than 'curtains' might.
- source_word: לַכָּתֵף
  chosen: for the one side
  alternatives:
  - for the shoulder
  - for one side
  lexicon: HALOT
  rationale: Literally 'for the shoulder/side,' but in architectural description it
    denotes one side or flank of the gate area. 'For the one side' fits the immediate
    context, where the matching opposite side is described in the next verse.
- source_word: עַמֻּדֵיהֶם
  chosen: their three pillars
  alternatives:
  - its three pillars
  - their three posts
  lexicon: HALOT
  rationale: עַמּוּד means 'pillar, column, post.' In tabernacle descriptions 'pillar'
    is the established and suitable architectural term. The plural suffix naturally
    refers to the hangings on that side. 'Their' preserves the Hebrew suffix; 'posts'
    is possible but less consistent with surrounding tabernacle terminology.
- source_word: אַדְנֵיהֶם
  chosen: their three bases
  alternatives:
  - their three sockets
  - their three pedestals
  lexicon: HALOT
  rationale: אֶדֶן in tabernacle construction denotes the supporting base/socket for
    a pillar. 'Bases' is clear modern English; 'sockets' is also possible and often
    used in Exodus, but 'bases' reads more naturally here while still conveying structural
    support.
