id: EXO.27.18
reference: Exodus 27:18
source:
  edition: WLC
  text: אֹ֣רֶךְ הֶֽ/חָצֵר֩ מֵאָ֨ה בָֽ/אַמָּ֜ה וְ/רֹ֣חַב חֲמִשִּׁ֣ים בַּ/חֲמִשִּׁ֗ים
    וְ/קֹמָ֛ה חָמֵ֥שׁ אַמּ֖וֹת שֵׁ֣שׁ מָשְׁזָ֑ר וְ/אַדְנֵי/הֶ֖ם נְחֹֽשֶׁת׀׃
translation:
  text: The length of the court shall be a hundred cubits, and the width fifty by
    fifty, and the height five cubits, of finely twisted linen, with their bases of
    bronze.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''fifty by fifty.'' Some translations smooth this to ''fifty cubits,''
      but the Hebrew wording is preserved here for transparency.'
    reason: alternative_reading
  - marker: b
    text: Or 'their sockets of bronze.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹרֶךְ
  chosen: length
  alternatives:
  - extent
  lexicon: HALOT
  rationale: Standard architectural sense in tabernacle measurements; 'length' is
    the natural English equivalent.
- source_word: הֶחָצֵר
  chosen: the court
  alternatives:
  - the courtyard
  lexicon: HALOT
  rationale: Refers to the tabernacle enclosure. 'Court' is concise and idiomatic
    in sanctuary descriptions; 'courtyard' is possible but slightly more expansive.
- source_word: מֵאָה בָאַמָּה
  chosen: a hundred cubits
  alternatives:
  - one hundred cubits
  lexicon: HALOT
  rationale: Retains the source measurement rather than converting to modern units,
    preserving formal correspondence and intertextual consistency in tabernacle texts.
- source_word: וְרֹחַב
  chosen: and the width
  alternatives:
  - and its width
  lexicon: HALOT
  rationale: Architectural dimension term parallel to 'length.' English can omit the
    possessive without loss.
- source_word: חֲמִשִּׁים בַּחֲמִשִּׁים
  chosen: fifty by fifty
  alternatives:
  - fifty cubits
  lexicon: HALOT
  rationale: The Hebrew literally reads 'fifty by fifty.' This likely expresses the
    width dimension in relation to the corresponding side arrangement; retaining the
    idiom is more transparent to the source than smoothing it away. Because the phrase
    can sound unusual in English, an alternative is preserved in a footnote.
- source_word: וְקֹמָה
  chosen: and the height
  alternatives:
  - and its height
  lexicon: HALOT
  rationale: Refers to the vertical dimension of the court hangings.
- source_word: חָמֵשׁ אַמּוֹת
  chosen: five cubits
  lexicon: HALOT
  rationale: Direct rendering of the measurement.
- source_word: שֵׁשׁ מָשְׁזָר
  chosen: of finely twisted linen
  alternatives:
  - of twisted fine linen
  - of fine twined linen
  lexicon: HALOT
  rationale: שֵׁשׁ denotes fine linen in tabernacle contexts, and מָשְׁזָר indicates
    twisted/twined workmanship. 'Finely twisted linen' is readable modern English
    while preserving the material description.
- source_word: וְאַדְנֵיהֶם
  chosen: with their bases
  alternatives:
  - and their sockets
  lexicon: HALOT
  rationale: אַדֶן in tabernacle construction refers to the metal bases/sockets supporting
    posts. 'Bases' is more accessible; 'sockets' is a viable technical alternative
    and is preserved in a footnote.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: In tabernacle furnishing contexts, נְחֹשֶׁת is conventionally rendered
    'bronze,' reflecting the likely worked metal in view. 'Copper' remains possible
    lexically but is less idiomatic in this construction list.
