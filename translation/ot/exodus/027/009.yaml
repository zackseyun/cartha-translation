id: EXO.27.9
reference: Exodus 27:9
source:
  edition: WLC
  text: וְ/עָשִׂ֕יתָ אֵ֖ת חֲצַ֣ר הַ/מִּשְׁכָּ֑ן לִ/פְאַ֣ת נֶֽגֶב תֵּ֠ימָנָ/ה קְלָעִ֨ים
    לֶ/חָצֵ֜ר שֵׁ֣שׁ מָשְׁזָ֗ר מֵאָ֤ה בָֽ/אַמָּה֙ אֹ֔רֶךְ לַ/פֵּאָ֖ה הָ/אֶחָֽת־׃
translation:
  text: And you shall make the court of the tabernacle. On the south side, southward,
    there shall be hangings for the court of finely twisted linen, a hundred cubits
    long for one side.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'curtains' for 'hangings.' The Hebrew term refers to fabric panels forming
      the court boundary.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲצַר
  chosen: court
  alternatives:
  - courtyard
  - enclosure
  lexicon: HALOT
  rationale: Refers to the open enclosed area associated with the tabernacle. 'Court'
    is concise and standard in sanctuary contexts; 'courtyard' is possible but slightly
    more expansive in tone.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling
  - the dwelling place
  lexicon: HALOT
  rationale: In Exodus this term denotes the sacred tent-sanctuary. 'Tabernacle' preserves
    the established cultic reference while remaining understandable.
- source_word: לִפְאַת נֶגֶב תֵּימָנָה
  chosen: On the south side, southward
  alternatives:
  - for the south side, toward the south
  - on the southern side
  lexicon: HALOT
  rationale: The Hebrew uses both 'side/edge' and a directional expression, creating
    emphasis. The translation preserves that doubled southern orientation rather than
    collapsing it into a single adjective.
- source_word: קְלָעִים
  chosen: hangings
  alternatives:
  - curtains
  - screens
  lexicon: HALOT
  rationale: These are the fabric hangings forming the perimeter of the court. 'Hangings'
    fits the architectural function better than 'curtains,' which may suggest interior
    drapery.
- source_word: שֵׁשׁ מָשְׁזָר
  chosen: finely twisted linen
  alternatives:
  - fine twisted linen
  - twined fine linen
  lexicon: HALOT
  rationale: This phrase denotes high-quality spun or twisted linen. 'Finely twisted
    linen' is natural modern English and preserves the material and workmanship.
- source_word: מֵאָה בָאַמָּה
  chosen: a hundred cubits
  alternatives:
  - one hundred cubits
  lexicon: HALOT
  rationale: A straightforward measurement expression. 'Cubits' is retained rather
    than converted, preserving the ancient unit.
- source_word: אֹרֶךְ
  chosen: long
  alternatives:
  - in length
  - the length
  lexicon: HALOT
  rationale: Rendered idiomatically with the measurement phrase as 'a hundred cubits
    long' rather than a more wooden 'a hundred cubits of length.'
- source_word: לַפֵּאָה הָאֶחָת
  chosen: for one side
  alternatives:
  - for the one side
  - for one edge
  lexicon: HALOT
  rationale: Refers to one side of the court perimeter. 'For one side' is clear and
    idiomatic while preserving the singular reference.
