id: EXO.27.21
reference: Exodus 27:21
source:
  edition: WLC
  text: בְּ/אֹ֣הֶל מוֹעֵד֩ מִ/ח֨וּץ לַ/פָּרֹ֜כֶת אֲשֶׁ֣ר עַל הָ/עֵדֻ֗ת יַעֲרֹךְ֩ אֹת֨/וֹ אַהֲרֹ֧ן וּ/בָנָ֛י/ו מֵ/עֶ֥רֶב עַד בֹּ֖קֶר לִ/פְנֵ֣י יְהוָ֑ה חֻקַּ֤ת עוֹלָם֙ לְ/דֹ֣רֹתָ֔/ם מֵ/אֵ֖ת בְּנֵ֥י יִשְׂרָאֵֽל־־׃ס
translation:
  text: In the tent of meeting, outside the veil that is before the testimony, Aaron and his sons shall arrange it before Yahweh from evening until morning. It shall be a perpetual statute throughout their generations from the Israelites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shall set it in order' for 'shall arrange it.' The Hebrew verb can denote arranging or ordering the lamp service.
    reason: lexical_alternative
  - marker: b
    text: Or 'outside the curtain.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the testimony' likely refers to the covenant tablets housed in the ark; thus 'before the testimony' describes the veil's position relative to the ark.
    reason: cultural_note
lexical_decisions:
- source_word: בְּאֹהֶל מוֹעֵד
  chosen: in the tent of meeting
  alternatives:
  - in the meeting tent
  - in the appointed tent
  lexicon: HALOT
  rationale: Standard rendering for the tabernacle designation; preserves the cultic/technical sense of אֹהֶל מוֹעֵד without over-paraphrase.
- source_word: מִחוּץ לַפָּרֹכֶת
  chosen: outside the veil
  alternatives:
  - outside the curtain
  lexicon: HALOT
  rationale: פָּרֹכֶת refers to the inner sanctuary divider. 'Veil' preserves the established cultic sense, while remaining understandable.
- source_word: אֲשֶׁר עַל הָעֵדֻת
  chosen: that is before the testimony
  alternatives:
  - that is over the testimony
  - that is by the testimony
  lexicon: HALOT
  rationale: Though עַל often means 'on/over,' in tabernacle spatial descriptions it can denote position relative to the ark/testimony. 'Before the testimony' fits the immediate spatial context with the veil standing in front of the ark containing the testimony.
- source_word: יַעֲרֹךְ אֹתוֹ
  chosen: shall arrange it
  alternatives:
  - shall set it in order
  - shall tend it
  lexicon: HALOT
  rationale: The verb ערך commonly means to arrange or set in order. Here the object is singular ('it'), referring back to the lamp/lampstand service in context. 'Arrange it' is clear and sufficiently formal.
- source_word: מֵעֶרֶב עַד בֹּקֶר
  chosen: from evening until morning
  alternatives:
  - from evening to morning
  lexicon: HALOT
  rationale: Straightforward temporal expression indicating the nightly duration of the priestly duty.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' 'Before' preserves the formal covenantal/cultic idiom.
- source_word: חֻקַּת עוֹלָם
  chosen: a permanent statute
  alternatives:
  - a perpetual statute
  - an everlasting statute
  lexicon: HALOT
  rationale: עוֹלָם in legal/cultic contexts often denotes enduring continuance within the covenantal frame. 'Permanent statute' is readable modern English and avoids misleading metaphysical overstatement while preserving durability.
- source_word: לְדֹרֹתָם
  chosen: throughout their generations
  alternatives:
  - for their generations
  lexicon: HALOT
  rationale: Idiomatic English for the recurring covenantal formula.
- source_word: מֵאֵת בְּנֵי יִשְׂרָאֵל
  chosen: from the Israelites
  alternatives:
  - on behalf of the Israelites
  - from the sons of Israel
  lexicon: HALOT
  rationale: מֵאֵת here marks source/origin of the obligation/supply. 'From the Israelites' is natural English. 'Sons of Israel' is possible but less natural here; the collective national sense is intended.
