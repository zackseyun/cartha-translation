  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Force of חֻקַּת עוֹלָם in cultic legislation
  chosen_reading: a permanent statute
  alternative_readings:
  - a perpetual statute
  - an everlasting statute
  rationale: This preserves the legal force and enduring covenantal character without importing a philosophical claim about absolute timelessness beyond the idiom's normal legal usage.
