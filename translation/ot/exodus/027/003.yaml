id: EXO.27.3
reference: Exodus 27:3
source:
  edition: WLC
  text: וְ/עָשִׂ֤יתָ סִּֽירֹתָי/ו֙ לְ/דַשְּׁנ֔/וֹ וְ/יָעָי/ו֙ וּ/מִזְרְקֹתָ֔י/ו וּ/מִזְלְגֹתָ֖י/ו
    וּ/מַחְתֹּתָ֑י/ו לְ/כָל כֵּלָ֖י/ו תַּעֲשֶׂ֥ה נְחֹֽשֶׁת־׃
translation:
  text: You shall make its pots for removing its ashes, and its shovels, and its basins,
    and its forks, and its firepans; you shall make all its utensils of bronze.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'for removing its fat ashes'; the expression refers to
      clearing away the ashes produced by the altar offerings.
    reason: lexical_alternative
  - marker: b
    text: Or 'copper' for 'bronze.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: You shall make
  alternatives:
  - and you shall make
  - you are to make
  lexicon: HALOT
  rationale: Qal 2ms of עשה in instructional material commonly carries future/imperfective
    force in English legislative style. 'You shall make' preserves the directive tone.
- source_word: סִּירֹתָיו
  chosen: its pots
  alternatives:
  - its pails
  - its ash pots
  lexicon: HALOT
  rationale: סִירוֹת are containers/pots. Because the following infinitive specifies
    their function, the base noun is rendered generically as 'pots' rather than building
    'ash' into the noun itself.
- source_word: לְדַשְּׁנוֹ
  chosen: for removing its ashes
  alternatives:
  - for taking away its fat ashes
  - for cleansing away its ashes
  lexicon: HALOT
  rationale: The verb דשן in the Piel can refer to removing the fatty ashes from the
    altar. In clear modern English, 'for removing its ashes' communicates function
    without overloading the phrase; 'fat ashes' is more formally literal but obscure
    in English.
- source_word: יָעָיו
  chosen: its shovels
  alternatives:
  - its scoops
  lexicon: HALOT
  rationale: The noun denotes implements for handling ashes/coals; 'shovels' is the
    standard and most natural rendering in altar context.
- source_word: מִזְרְקֹתָיו
  chosen: its basins
  alternatives:
  - its bowls
  lexicon: HALOT
  rationale: The term refers to vessels used for tossing/splashing sacrificial blood
    or holding liquids. 'Basins' fits cultic usage better than the more domestic 'bowls'.
- source_word: מִזְלְגֹתָיו
  chosen: its forks
  alternatives:
  - its flesh-hooks
  lexicon: HALOT
  rationale: The noun denotes fork-like implements. 'Forks' is clear modern English;
    the more traditional 'flesh-hooks' is more interpretive and archaic for this context.
- source_word: מַחְתֹּתָיו
  chosen: its firepans
  alternatives:
  - its censers
  - its pans for coals
  lexicon: HALOT
  rationale: The term often denotes a pan for carrying coals/fire. 'Firepans' is a
    concise and contextually fitting rendering here.
- source_word: לְכָל־כֵּלָיו
  chosen: all its utensils
  alternatives:
  - all its vessels
  - all its implements
  lexicon: HALOT
  rationale: כְּלִי is a broad term for articles/implements. 'Utensils' works well
    for the set of altar tools just listed and reads naturally in modern English.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: In tabernacle-furnishing contexts, נְחֹשֶׁת is conventionally and plausibly
    rendered 'bronze,' the likely alloy intended in English Bible tradition. 'Copper'
    remains possible and is preserved as an alternative lexical note.
