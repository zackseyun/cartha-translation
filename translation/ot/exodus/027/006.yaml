id: EXO.27.6
reference: Exodus 27:6
source:
  edition: WLC
  text: וְ/עָשִׂ֤יתָ בַדִּים֙ לַ/מִּזְבֵּ֔חַ בַּדֵּ֖י עֲצֵ֣י שִׁטִּ֑ים וְ/צִפִּיתָ֥
    אֹתָ֖/ם נְחֹֽשֶׁת׃
translation:
  text: You shall make poles for the altar, poles of acacia wood, and you shall overlay
    them with bronze.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'copper' for 'bronze.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: You shall make
  alternatives:
  - and you shall make
  - you are to make
  lexicon: HALOT
  rationale: Qal perfect 2ms with prefixed conjunction in instructional context functions
    as an imperative/future command. 'You shall make' fits standard English legal/instructional
    style and preserves the directive force.
- source_word: בַדִּים / בַּדֵּי
  chosen: poles
  alternatives:
  - staves
  - carrying poles
  - bars
  lexicon: HALOT
  rationale: The noun refers to poles used for carrying tabernacle furnishings. 'Poles'
    is clear modern English; 'staves' is archaic, and 'bars' could suggest structural
    crosspieces rather than transport poles.
- source_word: לַמִּזְבֵּחַ
  chosen: for the altar
  alternatives:
  - for the altar of burnt offering
  lexicon: HALOT
  rationale: The phrase is simply 'for the altar' in this verse. Although the broader
    context identifies which altar is meant, the translation should not import additional
    words not present here.
- source_word: עֲצֵי שִׁטִּים
  chosen: acacia wood
  alternatives:
  - wood of acacia
  - shittim wood
  lexicon: HALOT
  rationale: This construct phrase denotes the material. 'Acacia wood' is natural
    modern English and reflects the likely species identification better than the
    traditional transliteration 'shittim wood.'
- source_word: וְצִפִּיתָ
  chosen: and you shall overlay
  alternatives:
  - and you shall cover
  - and you shall plate
  lexicon: HALOT
  rationale: The Piel of צפה in tabernacle contexts commonly means to overlay or plate
    an object with metal. 'Overlay' preserves the craft sense without over-specifying
    a modern technique.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: The pronoun refers back to the poles and should be rendered explicitly
    in English.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: In tabernacle-furnishing contexts, נְחֹשֶׁת is conventionally rendered
    'bronze,' reflecting the likely metal/alloy sense in English Bible usage. 'Copper'
    is possible lexically, so it is preserved as an alternative.
