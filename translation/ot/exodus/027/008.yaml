id: EXO.27.8
reference: Exodus 27:8
source:
  edition: WLC
  text: נְב֥וּב לֻחֹ֖ת תַּעֲשֶׂ֣ה אֹת֑/וֹ כַּ/אֲשֶׁ֨ר הֶרְאָ֥ה אֹתְ/ךָ֛ בָּ/הָ֖ר כֵּ֥ן
    יַעֲשֽׂוּ׃ס
translation:
  text: You shall make it hollow, with boards; as it was shown to you on the mountain,
    so shall they make it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hollowed out with planks.' The Hebrew describes the altar as a hollow
      structure made with boards.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְבוּב
  chosen: hollow
  alternatives:
  - hollowed out
  - hollow inside
  lexicon: HALOT
  rationale: The adjective describes the altar as empty or hollow in construction
    rather than solid. 'Hollow' is concise and natural in English.
- source_word: לֻחֹת
  chosen: with boards
  alternatives:
  - of boards
  - from planks
  lexicon: HALOT
  rationale: The plural noun refers to boards/planks. In English, 'hollow, with boards'
    best conveys the constructional sense that the altar is made as a hollow framework
    of boards.
- source_word: תַּעֲשֶׂה אֹתוֹ
  chosen: you shall make it
  alternatives:
  - you are to make it
  lexicon: HALOT
  rationale: A straightforward second masculine singular instruction to Moses. 'You
    shall make it' preserves the directive force.
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - according as
  lexicon: HALOT
  rationale: Introduces comparison to the pattern shown on the mountain. 'As' is sufficient
    and idiomatic.
- source_word: הֶרְאָה אֹתְךָ
  chosen: it was shown to you
  alternatives:
  - he showed you
  - one showed you
  lexicon: HALOT
  rationale: The Hebrew form is 3ms Hoph'al ('was shown'), not active 'he showed.'
    English passive best reflects the morphology while leaving the implied divine
    agent unstated, as in the Hebrew.
- source_word: בָּהָר
  chosen: on the mountain
  alternatives:
  - in the mountain
  lexicon: HALOT
  rationale: English idiom prefers 'on the mountain' for location of revelation, even
    though the Hebrew preposition could be rendered more literally as 'in/on.'
- source_word: כֵּן יַעֲשׂוּ
  chosen: so shall they make it
  alternatives:
  - so they shall make it
  - thus it shall be made
  lexicon: HALOT
  rationale: 'Keeps the comparison-result structure: according to what was shown,
    that is how the workers are to make it. The plural verb naturally refers to those
    carrying out the construction.'
