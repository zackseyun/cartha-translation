id: EXO.27.4
reference: Exodus 27:4
source:
  edition: WLC
  text: וְ/עָשִׂ֤יתָ לּ/וֹ֙ מִכְבָּ֔ר מַעֲשֵׂ֖ה רֶ֣שֶׁת נְחֹ֑שֶׁת וְ/עָשִׂ֣יתָ עַל
    הָ/רֶ֗שֶׁת אַרְבַּע֙ טַבְּעֹ֣ת נְחֹ֔שֶׁת עַ֖ל אַרְבַּ֥ע קְצוֹתָֽי/ו־׃
translation:
  text: You shall make for it a grating, a network of bronze, and on the network you
    shall make four bronze rings at its four corners.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a meshwork of bronze' or 'a net-work of bronze.' The Hebrew literally
      reads 'a grating, work of a net, of bronze.'
    reason: lexical_alternative
  - marker: b
    text: Or 'at its four ends.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִכְבָּר
  chosen: grating
  alternatives:
  - grate
  - gridiron
  lexicon: HALOT
  rationale: Refers to a lattice-like or grated structure associated with the altar.
    'Grating' is natural modern English and fits the construction described.
- source_word: מַעֲשֵׂה רֶשֶׁת
  chosen: a network
  alternatives:
  - meshwork
  - net-work
  - latticework
  lexicon: HALOT
  rationale: The construct phrase literally means 'work of a net.' 'A network' preserves
    the image of interwoven or netted construction without awkwardness. The following
    phrase 'on the network' keeps the lexical link with רֶשֶׁת explicit.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: In tabernacle contexts, נְחֹשֶׁת is traditionally rendered 'bronze' and
    likely denotes bronze or copper alloy objects. 'Bronze' is the standard contextual
    rendering in English Bible tradition and fits the cultic furnishing.
- source_word: עַל הָרֶשֶׁת
  chosen: on the network
  alternatives:
  - upon the netting
  - on the mesh
  lexicon: HALOT
  rationale: The preposition עַל most naturally means 'on/upon' here, describing the
    placement of the rings relative to the net-like grating. 'Network' maintains consistency
    with the prior rendering of רֶשֶׁת.
- source_word: טַבְּעֹת
  chosen: rings
  alternatives:
  - loops
  lexicon: HALOT
  rationale: The noun commonly denotes rings used for poles or attachment points in
    tabernacle instructions. 'Rings' is the most straightforward and consistent rendering.
- source_word: קְצוֹתָיו
  chosen: its four corners
  alternatives:
  - its four ends
  - its four extremities
  lexicon: HALOT
  rationale: The noun denotes extremities or outer ends. In the case of a rectangular
    or square grating, 'corners' is the clearest idiomatic English expression for
    the four extremities.
- source_word: לּוֹ
  chosen: for it
  alternatives:
  - for him
  lexicon: HALOT
  rationale: The pronoun refers to the altar, an inanimate antecedent in English,
    so 'for it' is appropriate.
- source_word: וְעָשִׂיתָ
  chosen: You shall make
  alternatives:
  - and you shall make
  lexicon: HALOT
  rationale: The waw-consecutive continues the instruction sequence. English can omit
    the initial 'and' in the first clause for smoother style, while retaining the
    imperative-future force as 'You shall make.'
