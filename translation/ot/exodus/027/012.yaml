id: EXO.27.12
reference: Exodus 27:12
source:
  edition: WLC
  text: וְ/רֹ֤חַב הֶֽ/חָצֵר֙ לִ/פְאַת יָ֔ם קְלָעִ֖ים חֲמִשִּׁ֣ים אַמָּ֑ה עַמֻּדֵי/הֶ֣ם
    עֲשָׂרָ֔ה וְ/אַדְנֵי/הֶ֖ם עֲשָׂרָֽה־׃
translation:
  text: And for the width of the court on the west side, there shall be hangings of
    fifty cubits, with their pillars ten, and their bases ten.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally 'sea side,' a standard idiom for the west side.
    reason: lexical_alternative
  - marker: b
    text: Or 'sockets' for 'bases.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/רֹחַב
  chosen: And for the width
  alternatives:
  - And the width
  - As for the width
  lexicon: HALOT
  rationale: רֹחַב means 'breadth, width.' The prefixed conjunction is carried as
    'And,' and the construction introduces the specification for this side of the
    court. 'For the width' fits the tabernacle-instructions style in context.
- source_word: הֶחָצֵר
  chosen: of the court
  alternatives:
  - of the courtyard
  lexicon: HALOT
  rationale: חָצֵר refers to the enclosed court area of the tabernacle. 'Court' is
    concise and standard in this architectural context; 'courtyard' is possible but
    slightly less formal.
- source_word: לִפְאַת
  chosen: on the ... side
  alternatives:
  - for the side of
  - at the edge of
  lexicon: HALOT
  rationale: פֵאָה denotes a side, edge, or extremity. In this construction it marks
    the side/orientation of the court, best rendered idiomatically as 'on the ...
    side.'
- source_word: יָם
  chosen: west
  alternatives:
  - sea
  - westward
  lexicon: HALOT
  rationale: Literally 'sea,' but in Hebrew spatial orientation it commonly denotes
    the west, the direction of the Mediterranean. Here the directional sense is plainly
    intended, so 'west side' is the clearest English rendering.
- source_word: קְלָעִים
  chosen: hangings
  alternatives:
  - curtains
  - screens
  lexicon: HALOT
  rationale: In the tabernacle court context, קְלָעִים refers to the fabric hangings
    forming the enclosure. 'Hangings' preserves the architectural function without
    over-specifying a modern curtain form.
- source_word: חֲמִשִּׁים אַמָּה
  chosen: fifty cubits
  alternatives:
  - fifty cubits long
  lexicon: HALOT
  rationale: The phrase gives the measurement of the hangings. 'Fifty cubits' is a
    direct rendering; 'long' is implied by context and need not be added.
- source_word: עַמֻּדֵיהֶם עֲשָׂרָה
  chosen: their pillars ten
  alternatives:
  - its pillars ten
  - with ten pillars
  lexicon: HALOT
  rationale: עַמּוּד means 'pillar, column.' The suffix refers back to the hangings/side
    arrangement. English idiom is improved by 'with their pillars ten,' while preserving
    the Hebrew count structure.
- source_word: וְאַדְנֵיהֶם עֲשָׂרָה
  chosen: and their bases ten
  alternatives:
  - and their sockets ten
  - with ten bases
  lexicon: HALOT
  rationale: אֶדֶן in tabernacle descriptions denotes a base or socket for structural
    supports. 'Bases' is clear modern English; 'sockets' is possible and traditional,
    but 'bases' is more generally accessible.
