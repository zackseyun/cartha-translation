id: EXO.27.11
reference: Exodus 27:11
source:
  edition: WLC
  text: וְ/כֵ֨ן לִ/פְאַ֤ת צָפוֹן֙ בָּ/אֹ֔רֶךְ קְלָעִ֖ים מֵ֣אָה אֹ֑רֶךְ ו/עמד/ו עֶשְׂרִ֗ים
    וְ/אַדְנֵי/הֶ֤ם עֶשְׂרִים֙ נְחֹ֔שֶׁת וָוֵ֧י הָֽ/עַמֻּדִ֛ים וַ/חֲשֻׁקֵי/הֶ֖ם כָּֽסֶף׃
translation:
  text: 'And likewise for the north side in length: hangings a hundred cubits long,
    with its twenty pillars and their twenty bronze bases, and the hooks of the pillars
    and their bands shall be silver.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their fillets'; the Hebrew term refers to the connecting or encircling
      pieces associated with the pillars.
    reason: lexical_alternative
  - marker: b
    text: Hebrew simply 'a hundred long'; 'cubits' is supplied from the immediate
      tabernacle measurements in context.
    reason: cultural_note
lexical_decisions:
- source_word: וְכֵן
  chosen: And likewise
  alternatives:
  - And so
  - Similarly
  lexicon: HALOT
  rationale: Introduces correspondence with the preceding side's specifications. 'And
    likewise' captures the comparative force naturally in English.
- source_word: לִפְאַת צָפוֹן
  chosen: for the north side
  alternatives:
  - for the northern side
  - for the side toward the north
  lexicon: HALOT
  rationale: פאה denotes a side/edge; with צפון it refers to the north side of the
    court. 'For the north side' is concise and clear.
- source_word: בָּאֹרֶךְ
  chosen: in length
  alternatives:
  - lengthwise
  - along the length
  lexicon: HALOT
  rationale: Retains the dimensional specification modifying the side's arrangement.
- source_word: קְלָעִים
  chosen: hangings
  alternatives:
  - curtains
  - screens
  lexicon: HALOT
  rationale: In tabernacle-court contexts this refers to the linen hangings forming
    the enclosure. 'Hangings' is standard and suitably concrete without over-specifying
    fabric here.
- source_word: מֵאָה אֹרֶךְ
  chosen: a hundred cubits long
  alternatives:
  - one hundred cubits in length
  - a hundred in length
  lexicon: HALOT
  rationale: The measure is elliptical in Hebrew but clearly means cubits from the
    surrounding context. Supplying 'cubits' is necessary for intelligible English
    and matches the construction used in this passage.
- source_word: וְעַמֻּדָיו עֶשְׂרִים
  chosen: with its twenty pillars
  alternatives:
  - and its twenty pillars
  lexicon: HALOT
  rationale: The suffix refers back to the side/hangings arrangement. 'With' makes
    the list read naturally in English while preserving the inventory sense.
- source_word: וְאַדְנֵיהֶם עֶשְׂרִים נְחֹשֶׁת
  chosen: and their twenty bronze bases
  alternatives:
  - and their twenty sockets of bronze
  - and their twenty bronze sockets
  lexicon: HALOT
  rationale: אדן in tabernacle descriptions denotes a base/socket for a pillar. 'Bases'
    is more accessible modern English; 'bronze' is the standard rendering for נחשת
    in this context.
- source_word: וָוֵי הָעַמֻּדִים
  chosen: the hooks of the pillars
  alternatives:
  - the pegs of the pillars
  lexicon: HALOT
  rationale: וָוִים are hooks or pegs attached to pillars. 'Hooks' best fits the tabernacle
    furnishing context and common translation usage.
- source_word: וַחֲשֻׁקֵיהֶם
  chosen: their bands
  alternatives:
  - their fillets
  - their connecting rods
  lexicon: HALOT
  rationale: The term refers to the joining or encircling elements associated with
    the pillars. 'Bands' is understandable modern English and avoids the archaic 'fillets'
    while remaining non-interpretively broad.
- source_word: כָּסֶף
  chosen: silver
  lexicon: HALOT
  rationale: Material designation; straightforwardly 'silver'.
