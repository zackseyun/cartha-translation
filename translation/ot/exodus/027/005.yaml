id: EXO.27.5
reference: Exodus 27:5
source:
  edition: WLC
  text: וְ/נָתַתָּ֣ה אֹתָ֗/הּ תַּ֛חַת כַּרְכֹּ֥ב הַ/מִּזְבֵּ֖חַ מִ/לְּ/מָ֑טָּה וְ/הָיְתָ֣ה
    הָ/רֶ֔שֶׁת עַ֖ד חֲצִ֥י הַ/מִּזְבֵּֽחַ׃
translation:
  text: And you shall put it under the ledge of the altar from below, so that the
    net shall reach halfway up the altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rim' for 'ledge' (Heb. karkov), referring to a projecting border or
      frame on the altar.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and the net shall be unto the middle of the altar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתָּה
  chosen: And you shall put
  alternatives:
  - and you shall place
  - and you shall set
  lexicon: HALOT
  rationale: נתן is a common verb meaning 'give/put/set.' In this construction with
    a direct object and location, 'put' is the most natural modern English rendering
    while preserving the imperative/future instruction force.
- source_word: אֹתָהּ
  chosen: it
  alternatives:
  - her
  lexicon: HALOT
  rationale: The feminine singular pronoun refers back to the bronze net/grating from
    the previous verse. English uses the inanimate pronoun 'it.'
- source_word: תַּחַת
  chosen: under
  alternatives:
  - beneath
  lexicon: HALOT
  rationale: The preposition straightforwardly indicates position below the ledge
    of the altar.
- source_word: כַּרְכֹּב
  chosen: ledge
  alternatives:
  - rim
  - border
  - grating-frame
  lexicon: HALOT
  rationale: The noun denotes a projecting border or ledge associated with the altar's
    structure. 'Ledge' is clearer in modern English than the traditional but less
    transparent 'compass' and fits the architectural context.
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Standard rendering of מזבח in tabernacle instructions.
- source_word: מִלְּמָטָּה
  chosen: from below
  alternatives:
  - beneath
  - on the lower side
  lexicon: HALOT
  rationale: The compound adverb/prepositional form indicates placement from the lower
    part/underside. 'From below' preserves the spatial detail without overinterpreting
    the exact mechanics.
- source_word: וְהָיְתָה
  chosen: so that ... shall reach
  alternatives:
  - and it shall be
  - and it shall come to
  lexicon: HALOT
  rationale: Although היה literally means 'and it shall be,' in this construction
    with עד it expresses resulting extent or position. Rendering it idiomatically
    as 'so that ... shall reach' communicates the sense in natural English.
- source_word: הָרֶשֶׁת
  chosen: the net
  alternatives:
  - the network
  - the grating
  lexicon: HALOT
  rationale: רשת denotes a net-like lattice. 'Net' is concise and natural, while the
    previous context identifies it as the altar's bronze network.
- source_word: עַד
  chosen: halfway up
  alternatives:
  - up to
  - as far as
  lexicon: HALOT
  rationale: With חצי and the altar as reference, the phrase indicates extent up to
    the midpoint. 'Halfway up' expresses the spatial sense clearly in English.
- source_word: חֲצִי הַמִּזְבֵּחַ
  chosen: halfway up the altar
  alternatives:
  - the middle of the altar
  - half of the altar
  lexicon: HALOT
  rationale: Literally 'half of the altar,' but in context of the net's vertical placement,
    the meaning is that it extends to the midpoint of the altar. 'Halfway up the altar'
    makes the intended spatial relation explicit.
