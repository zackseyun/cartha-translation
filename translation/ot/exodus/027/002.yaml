id: EXO.27.2
reference: Exodus 27:2
source:
  edition: WLC
  text: וְ/עָשִׂ֣יתָ קַרְנֹתָ֗י/ו עַ֚ל אַרְבַּ֣ע פִּנֹּתָ֔י/ו מִמֶּ֖/נּוּ תִּהְיֶ֣יןָ
    קַרְנֹתָ֑י/ו וְ/צִפִּיתָ֥ אֹת֖/וֹ נְחֹֽשֶׁת׃
translation:
  text: And you shall make its horns on its four corners; its horns shall be of one
    piece with it, and you shall overlay it with bronze.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its horns shall be from it,' that is, formed as one piece with the altar
      rather than attached separately.
    reason: lexical_alternative
  - marker: b
    text: Hebrew nechoshet can refer to bronze or copper; 'bronze' is chosen here
      as the most likely sense in this construction context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: And you shall make
  alternatives:
  - And make
  - You are to make
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional context functions
    as a directive/future sequence. 'You shall make' preserves the command-like force
    in English covenant/instruction style.
- source_word: קַרְנֹתָיו
  chosen: its horns
  alternatives:
  - horns of it
  lexicon: HALOT
  rationale: קֶרֶן literally means 'horn.' In altar/tabernacle context this refers
    to the horn-like projections on the altar. 'Its horns' is natural English and
    preserves the concrete cultic image.
- source_word: עַל אַרְבַּע פִּנֹּתָיו
  chosen: on its four corners
  alternatives:
  - at its four corners
  - upon its four corners
  lexicon: HALOT
  rationale: עַל commonly means 'on/upon'; with corners of an altar, English idiom
    allows either 'on' or 'at.' 'On its four corners' stays closer to the Hebrew while
    remaining clear.
- source_word: מִמֶּנּוּ תִּהְיֶיןָ קַרְנֹתָיו
  chosen: its horns shall be of one piece with it
  alternatives:
  - its horns shall be from it
  - its horns shall be made from it
  lexicon: HALOT
  rationale: Literally, 'from it shall its horns be.' In construction language this
    indicates the horns are integral to the altar rather than attached separately.
    'Of one piece with it' expresses the plain sense in idiomatic English without
    over-paraphrasing.
- source_word: וְצִפִּיתָ אֹתוֹ
  chosen: and you shall overlay it
  alternatives:
  - and you shall plate it
  - and you shall cover it
  lexicon: HALOT
  rationale: צפה in the Piel here means to overlay or plate an object with a material.
    'Overlay' is standard and precise for tabernacle furnishing instructions.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: נְחֹשֶׁת can denote copper or bronze depending on context. In tabernacle-furnishing
    tradition and likely ancient metallurgy here, 'bronze' is the most idiomatic and
    contextually appropriate rendering, while 'copper' remains a lexical alternative
    worth preserving.
