id: EXO.27.13
reference: Exodus 27:13
source:
  edition: WLC
  text: וְ/רֹ֣חַב הֶֽ/חָצֵ֗ר לִ/פְאַ֛ת קֵ֥דְמָ/ה מִזְרָ֖חָ/ה חֲמִשִּׁ֥ים אַמָּֽה׃
translation:
  text: And the width of the court on the east side, toward the sunrise, shall be
    fifty cubits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the breadth of the court on the east side, eastward, fifty cubits.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרֹחַב
  chosen: And the width
  alternatives:
  - And the breadth
  lexicon: HALOT
  rationale: רֹחַב denotes width/breadth. 'Width' is more natural modern English while
    preserving the dimensional sense. The prefixed ו is rendered as 'And' to maintain
    the coordinate, descriptive style of the tabernacle instructions.
- source_word: הֶחָצֵר
  chosen: of the court
  alternatives:
  - of the courtyard
  lexicon: HALOT
  rationale: חָצֵר here refers to the tabernacle's enclosed outer area. 'Court' is
    concise and standard in sanctuary-context English; 'courtyard' is possible but
    slightly more expansive.
- source_word: לִפְאַת
  chosen: on the ... side
  alternatives:
  - for the side of
  - at the edge of
  lexicon: HALOT
  rationale: פֵאָה means side, edge, or corner. In this construction with a cardinal
    direction, idiomatic English is 'on the east side' rather than a more wooden 'for
    the side of the east.'
- source_word: קֵדְמָה
  chosen: east
  alternatives:
  - eastward
  - front
  lexicon: HALOT
  rationale: קֵדְמָה indicates the eastern direction. Although the root can relate
    to 'front' in orientation language, here the paired directional expression clearly
    specifies the east side.
- source_word: מִזְרָחָה
  chosen: toward the sunrise
  alternatives:
  - eastward
  - toward the east
  - sunrise
  lexicon: HALOT
  rationale: מִזְרָח refers to the place of sunrise/east. Since קֵדְמָה already gives
    'east,' rendering this second term as 'toward the sunrise' preserves the Hebrew's
    doubled directional emphasis without awkward repetition.
- source_word: חֲמִשִּׁים
  chosen: fifty
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: אַמָּה
  chosen: cubits
  alternatives:
  - cubits long
  lexicon: HALOT
  rationale: אַמָּה is the standard linear measure 'cubit.' The plural is required
    in English with 'fifty.' No conversion is supplied in the main text in keeping
    with source-oriented translation.
