id: EXO.27.1
reference: Exodus 27:1
source:
  edition: WLC
  text: וְ/עָשִׂ֥יתָ אֶת הַ/מִּזְבֵּ֖חַ עֲצֵ֣י שִׁטִּ֑ים חָמֵשׁ֩ אַמּ֨וֹת אֹ֜רֶךְ
    וְ/חָמֵ֧שׁ אַמּ֣וֹת רֹ֗חַב רָב֤וּעַ יִהְיֶה֙ הַ/מִּזְבֵּ֔חַ וְ/שָׁלֹ֥שׁ אַמּ֖וֹת
    קֹמָתֽ/וֹ־׃
translation:
  text: You shall make the altar of acacia wood, five cubits long and five cubits
    wide; the altar shall be square, and its height shall be three cubits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "shall be foursquare."
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: You shall make
  alternatives:
  - And you shall make
  - You are to make
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional context functions
    as an imperative/future command. 'You shall make' preserves the directive force
    in natural English.
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Standard rendering for מִזְבֵּחַ, the sacrificial altar described in
    tabernacle instructions. Definite article is preserved.
- source_word: עֲצֵי שִׁטִּים
  chosen: of acacia wood
  alternatives:
  - of acacia-wood
  - from acacia wood
  - of shittim wood
  lexicon: HALOT
  rationale: The construct phrase denotes the material. 'Acacia wood' is clear modern
    English; 'shittim wood' is a traditional transliteration but less transparent.
- source_word: חָמֵשׁ אַמּוֹת אֹרֶךְ
  chosen: five cubits long
  alternatives:
  - a length of five cubits
  - five cubits in length
  lexicon: HALOT
  rationale: This idiomatic measurement phrase is best rendered with an English dimensional
    expression.
- source_word: וְחָמֵשׁ אַמּוֹת רֹחַב
  chosen: and five cubits wide
  alternatives:
  - and a width of five cubits
  - and five cubits in width
  lexicon: HALOT
  rationale: Parallel to the previous measurement phrase; 'wide' gives natural English
    while preserving the dimension.
- source_word: רָבוּעַ יִהְיֶה
  chosen: shall be square
  alternatives:
  - shall be foursquare
  - shall be quadrangular
  lexicon: HALOT
  rationale: רָבוּעַ denotes a square shape. 'Square' is the clearest modern equivalent;
    'foursquare' is traditional but archaic for many readers.
- source_word: וְשָׁלֹשׁ אַמּוֹת קֹמָתוֹ
  chosen: and its height shall be three cubits
  alternatives:
  - and three cubits shall be its height
  - and it shall be three cubits high
  lexicon: HALOT
  rationale: קֹמָה refers to height/stature. This rendering preserves the possessive
    suffix and the dimensional statement in idiomatic English.
