id: EXO.27.10
reference: Exodus 27:10
source:
  edition: WLC
  text: וְ/עַמֻּדָ֣י/ו עֶשְׂרִ֔ים וְ/אַדְנֵי/הֶ֥ם עֶשְׂרִ֖ים נְחֹ֑שֶׁת וָוֵ֧י הָ/עַמֻּדִ֛ים
    וַ/חֲשֻׁקֵי/הֶ֖ם כָּֽסֶף׃
translation:
  text: with its twenty pillars and their twenty bronze bases, and the hooks of the
    pillars and their bands shall be silver.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sockets' instead of 'bases' for the supports of the pillars.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term rendered 'bands' is uncertain; traditional versions often
      have 'fillets.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמֻּדָיו
  chosen: its twenty pillars
  alternatives:
  - twenty of its pillars
  lexicon: HALOT
  rationale: 'עַמּוּד means ''pillar, column.'' The 3ms suffix refers back to the
    south side/hangings described in the preceding verse, so ''its'' is retained.
    English idiom places the number before the noun: ''its twenty pillars.'''
- source_word: אַדְנֵיהֶם
  chosen: their twenty bronze bases
  alternatives:
  - their twenty sockets of bronze
  - their twenty pedestals of bronze
  lexicon: HALOT
  rationale: אֶדֶן in tabernacle contexts denotes a base or socket for structural
    supports. 'Bases' is clear modern English; 'sockets' is possible but more technical.
    The numeral is carried with the noun in English.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: נְחֹשֶׁת can denote copper/bronze. In tabernacle-furnishing contexts,
    'bronze' is the conventional and likely material sense in English, while remaining
    natural and specific.
- source_word: וָוֵי
  chosen: hooks
  alternatives:
  - pegs
  - hooks/pins
  lexicon: HALOT
  rationale: וָו commonly refers to hooks used in the tabernacle structure. 'Hooks'
    best fits the likely function here and aligns with the immediate construction
    details.
- source_word: חֲשֻׁקֵיהֶם
  chosen: bands
  alternatives:
  - fillets
  - connecting rods
  - rings
  lexicon: HALOT
  rationale: The exact architectural referent is somewhat uncertain. Traditional 'fillets'
    is archaic; many modern versions use 'bands' or 'connecting rods.' 'Bands' preserves
    the idea of attached silver elements on the pillars without over-specifying beyond
    the Hebrew.
- source_word: כָּסֶף
  chosen: silver
  lexicon: HALOT
  rationale: 'Straightforward material term meaning ''silver.'' In English it naturally
    predicates the material of both hooks and bands: ''shall be silver.'''
- source_word: וְ
  chosen: with / and
  lexicon: HALOT
  rationale: The initial conjunction links this verse to the previous description,
    so 'with' gives smooth English continuity, while subsequent conjunctions are rendered
    'and' in the coordinate list.
