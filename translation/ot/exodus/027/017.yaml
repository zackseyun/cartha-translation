id: EXO.27.17
reference: Exodus 27:17
source:
  edition: WLC
  text: כָּל עַמּוּדֵ֨י הֶֽ/חָצֵ֤ר סָבִיב֙ מְחֻשָּׁקִ֣ים כֶּ֔סֶף וָוֵי/הֶ֖ם כָּ֑סֶף
    וְ/אַדְנֵי/הֶ֖ם נְחֹֽשֶׁת־׃
translation:
  text: All the pillars around the courtyard shall be banded with silver, with their
    hooks of silver and their bases of bronze.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'joined with silver rods' or, in older English, 'filleted with silver.'
      The Hebrew term refers to the silver banding or connecting work on the pillars.
    reason: lexical_alternative
  - marker: b
    text: Or 'their sockets.' The Hebrew can refer to the metal bases into which the
      pillars were set.
    reason: lexical_alternative
  - marker: c
    text: '''Bronze'' may also be rendered ''copper,'' since the Hebrew term can cover
      copper or copper-alloy metal in ancient usage.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - Every
  lexicon: HALOT
  rationale: Distributive/collective sense introducing the totality of the courtyard
    pillars; 'all' is the most natural English rendering here.
- source_word: עַמּוּדֵי
  chosen: the pillars
  alternatives:
  - the posts
  - the columns
  lexicon: HALOT
  rationale: Refers to the upright structural supports of the court enclosure. 'Pillars'
    fits tabernacle-construction context better than the more generic 'posts,' while
    remaining readable.
- source_word: הֶחָצֵר
  chosen: the courtyard
  alternatives:
  - the court
  lexicon: HALOT
  rationale: In tabernacle contexts חָצֵר denotes the enclosed outer area. 'Courtyard'
    is clearer in modern English than 'court' and avoids ambiguity with judicial senses.
- source_word: סָבִיב
  chosen: around
  alternatives:
  - all around
  - surrounding
  lexicon: HALOT
  rationale: Adverbial term indicating the pillars on every side of the courtyard.
    'Around' is concise and natural in English.
- source_word: מְחֻשָּׁקִים
  chosen: banded
  alternatives:
  - filleted
  - joined with rods
  - encircled
  lexicon: HALOT
  rationale: The passive participle refers to being furnished with connecting bands/rods
    of silver. Traditional 'filleted' is archaic and obscure; 'banded' communicates
    the likely architectural sense in accessible modern English while staying close
    to the source.
- source_word: כֶּסֶף
  chosen: with silver
  alternatives:
  - silver
  lexicon: HALOT
  rationale: Material designation following מְחֻשָּׁקִים; English idiom naturally
    supplies 'with' to express what the banding consists of.
- source_word: וָוֵיהֶם
  chosen: their hooks
  alternatives:
  - their pegs
  - their capitals/hooks
  lexicon: HALOT
  rationale: וָו commonly denotes hooks in tabernacle descriptions, likely the fixtures
    from which hangings were attached. 'Hooks' is the standard and most contextually
    fitting rendering.
- source_word: כָּסֶף
  chosen: of silver
  alternatives:
  - silver
  lexicon: HALOT
  rationale: Predicate of material for the hooks; 'of silver' is idiomatic English
    and preserves the construction's sense.
- source_word: אַדְנֵיהֶם
  chosen: their bases
  alternatives:
  - their sockets
  - their pedestals
  lexicon: HALOT
  rationale: Refers to the supporting metal bases/sockets for the pillars. 'Bases'
    is clear modern English; 'sockets' is possible but more technical. Either is plausible,
    so the alternative is preserved in a footnote.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: In tabernacle metallurgy נְחֹשֶׁת is conventionally rendered 'bronze,'
    though the exact ancient alloy can overlap with copper. 'Bronze' best matches
    established material sense in context, with 'copper' preserved as an alternative.
