id: EXO.27.15
reference: Exodus 27:15
source:
  edition: WLC
  text: וְ/לַ/כָּתֵף֙ הַ/שֵּׁנִ֔ית חְמֵ֥שׁ עֶשְׂרֵ֖ה קְלָעִ֑ים עַמֻּדֵי/הֶ֣ם שְׁלֹשָׁ֔ה
    וְ/אַדְנֵי/הֶ֖ם שְׁלֹשָֽׁה׃
translation:
  text: And for the second side there shall be fifteen hangings, with their three
    pillars and their three bases.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sockets' for 'bases.' The Hebrew term refers to the foundation pieces
      for the pillars.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לַ/כָּתֵף
  chosen: And for the ... side
  alternatives:
  - And on the ... side
  - And for the ... shoulder/side
  lexicon: HALOT
  rationale: כָּתֵף literally means 'shoulder,' but in tabernacle architectural context
    it refers to a side or flank. 'For the ... side' fits the construction specifications
    naturally in English while preserving the spatial sense.
- source_word: הַ/שֵּׁנִית
  chosen: second
  alternatives:
  - other
  lexicon: HALOT
  rationale: The ordinal plainly means 'second.' While contextually it refers to the
    opposite corresponding side, 'second' is the more direct rendering of the Hebrew.
- source_word: חְמֵשׁ עֶשְׂרֵה
  chosen: fifteen
  alternatives:
  - five and ten
  lexicon: HALOT
  rationale: Standard English rendering of the Hebrew number expression.
- source_word: קְלָעִים
  chosen: hangings
  alternatives:
  - curtains
  - screens
  lexicon: HALOT
  rationale: In the tabernacle courtyard context, קְלָעִים denotes the woven linen
    hangings forming the enclosure. 'Hangings' is traditional and suitably precise;
    'curtains' is possible but can suggest interior drapery.
- source_word: עַמֻּדֵי/הֶם
  chosen: their three pillars
  alternatives:
  - their three posts
  - their three columns
  lexicon: HALOT
  rationale: עַמּוּד commonly means pillar or column. In this construction context,
    'pillars' is a natural rendering and matches the structural supports for the hangings.
- source_word: וְ/אַדְנֵי/הֶם
  chosen: and their three bases
  alternatives:
  - and their three sockets
  - and their three pedestals
  lexicon: HALOT
  rationale: אֶדֶן in tabernacle descriptions refers to the base or socket in which
    a pillar stands. 'Bases' is clear modern English; 'sockets' is more technical
    and remains a viable alternative.
