id: EXO.27.16
reference: Exodus 27:16
source:
  edition: WLC
  text: וּ/לְ/שַׁ֨עַר הֶֽ/חָצֵ֜ר מָסָ֣ךְ עֶשְׂרִ֣ים אַמָּ֗ה תְּכֵ֨לֶת וְ/אַרְגָּמָ֜ן
    וְ/תוֹלַ֧עַת שָׁנִ֛י וְ/שֵׁ֥שׁ מָשְׁזָ֖ר מַעֲשֵׂ֣ה רֹקֵ֑ם עַמֻּֽדֵי/הֶם֙ אַרְבָּעָ֔ה
    וְ/אַדְנֵי/הֶ֖ם אַרְבָּעָֽה׀׃
translation:
  text: And for the gate of the courtyard there shall be a screen twenty cubits long,
    of blue, purple, and scarlet yarn, and fine twined linen, the work of an embroiderer,
    with their four pillars and their four bases.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a curtain' or 'a hanging' for the entrance covering.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'twenty cubits'; 'long' is supplied in English for clarity in the
      architectural description.
    reason: lexical_alternative
  - marker: c
    text: Or 'their four sockets' instead of 'their four bases.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְשַׁעַר
  chosen: And for the gate
  alternatives:
  - And for the entrance
  - And for the gateway
  lexicon: HALOT
  rationale: שַׁעַר commonly denotes a gate or gateway. 'Gate' is the most natural
    rendering here for the entry structure of the courtyard. The prefixed conjunction
    and preposition are carried by 'And for.'
- source_word: הֶחָצֵר
  chosen: of the courtyard
  alternatives:
  - of the court
  lexicon: HALOT
  rationale: חָצֵר refers to an enclosed court/courtyard. 'Courtyard' is clearer in
    modern English while preserving the architectural sense.
- source_word: מָסָךְ
  chosen: a screen
  alternatives:
  - a curtain
  - a hanging
  lexicon: HALOT
  rationale: מָסָךְ in tabernacle contexts refers to a hanging or screen that serves
    as an entrance covering. 'Screen' preserves the functional sense without implying
    a solid door.
- source_word: עֶשְׂרִים אַמָּה
  chosen: twenty cubits long
  alternatives:
  - twenty cubits
  lexicon: HALOT
  rationale: The Hebrew gives the measurement literally as 'twenty cubits.' English
    idiom benefits from supplying 'long' to clarify that this is the extent of the
    screen, as in the surrounding architectural instructions.
- source_word: תְּכֵלֶת
  chosen: blue
  alternatives:
  - blue yarn
  - blue-purple
  lexicon: HALOT
  rationale: תְּכֵלֶת denotes the blue dyed material used in tabernacle textiles.
    'Blue' is the standard concise rendering; the material aspect is supplied collectively
    by 'yarn' later in the list.
- source_word: וְאַרְגָּמָן
  chosen: purple
  alternatives:
  - purple yarn
  lexicon: HALOT
  rationale: אַרְגָּמָן denotes purple dyed material. 'Purple' is the standard rendering.
- source_word: וְתוֹלַעַת שָׁנִי
  chosen: scarlet yarn
  alternatives:
  - scarlet
  - crimson yarn
  lexicon: HALOT
  rationale: The expression refers to scarlet-colored material, traditionally understood
    as dyed yarn/thread. 'Scarlet yarn' makes explicit the textile sense and aligns
    with the list of materials.
- source_word: וְשֵׁשׁ מָשְׁזָר
  chosen: fine twined linen
  alternatives:
  - finely twisted linen
  - twined fine linen
  lexicon: HALOT
  rationale: שֵׁשׁ denotes fine linen and מָשְׁזָר indicates twisted/twined manufacture.
    'Fine twined linen' is a clear and established rendering.
- source_word: מַעֲשֵׂה רֹקֵם
  chosen: the work of an embroiderer
  alternatives:
  - embroidered work
  - the work of a weaver of colors
  lexicon: HALOT
  rationale: This phrase describes crafted needlework or variegated textile work.
    'The work of an embroiderer' preserves the personal-agent construction and the
    skilled-craft nuance.
- source_word: עַמֻּדֵיהֶם אַרְבָּעָה
  chosen: their four pillars
  alternatives:
  - four of their pillars
  lexicon: HALOT
  rationale: The phrase states the number of supporting pillars belonging to this
    gate-screen arrangement. 'Their four pillars' is the most straightforward English
    rendering.
- source_word: וְאַדְנֵיהֶם אַרְבָּעָה
  chosen: and their four bases
  alternatives:
  - and their four sockets
  lexicon: HALOT
  rationale: אֶדֶן in tabernacle construction refers to a base or socket for a pillar.
    'Bases' is more accessible modern English; 'sockets' remains a viable alternative
    but is less natural here.
