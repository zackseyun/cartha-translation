id: EXO.27.19
reference: Exodus 27:19
source:
  edition: WLC
  text: לְ/כֹל֙ כְּלֵ֣י הַ/מִּשְׁכָּ֔ן בְּ/כֹ֖ל עֲבֹדָת֑/וֹ וְ/כָל יְתֵדֹתָ֛י/ו וְ/כָל
    יִתְדֹ֥ת הֶ/חָצֵ֖ר נְחֹֽשֶׁת־־׃ס
translation:
  text: All the utensils of the tabernacle for all its service, and all its pegs,
    and all the pegs of the courtyard, shall be bronze.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'copper' for 'bronze'; the Hebrew נְחֹשֶׁת can refer broadly to copper-based
      metal.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּלֵי
  chosen: utensils
  alternatives:
  - furnishings
  - articles
  - equipment
  lexicon: HALOT
  rationale: כְּלִי is a broad term for implements/articles. 'Utensils' fits the cultic/instrumental
    context without narrowing to furniture alone. 'Furnishings' could suggest larger
    items only; 'equipment' is possible but less natural here.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling
  - the tent dwelling
  lexicon: HALOT
  rationale: מִשְׁכָּן is the standard term for the sacred dwelling. 'Tabernacle'
    is the established and accurate English rendering in this cultic context.
- source_word: בְּכֹל עֲבֹדָתוֹ
  chosen: for all its service
  alternatives:
  - in all its service
  - for all its use
  - for all the work of it
  lexicon: HALOT
  rationale: עֲבֹדָה here refers to the tabernacle's service/work, likely the functions
    carried out with these items. Rendering the preposition with 'for' communicates
    purpose naturally in English while preserving the sense that these utensils belong
    to every aspect of its service.
- source_word: יְתֵדֹתָיו
  chosen: its pegs
  alternatives:
  - its stakes
  - its tent pegs
  lexicon: HALOT
  rationale: יָתֵד denotes a peg/stake used to secure the structure. 'Pegs' is concise
    and idiomatic; 'tent pegs' is more explicit but somewhat redundant given the tabernacle
    context.
- source_word: יִתְדֹת הֶחָצֵר
  chosen: the pegs of the courtyard
  alternatives:
  - the stakes of the court
  - the pegs of the court
  lexicon: HALOT
  rationale: חָצֵר in this context is the enclosed court around the tabernacle. 'Courtyard'
    is clearer in modern English than 'court' while remaining accurate.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: נְחֹשֶׁת can denote copper or bronze depending on context. In tabernacle
    materials lists, 'bronze' is the conventional and likely intended alloy/material
    term in English.
