id: EXO.27.7
reference: Exodus 27:7
source:
  edition: WLC
  text: וְ/הוּבָ֥א אֶת בַּדָּ֖י/ו בַּ/טַּבָּעֹ֑ת וְ/הָי֣וּ הַ/בַּדִּ֗ים עַל שְׁתֵּ֛י
    צַלְעֹ֥ת הַ/מִּזְבֵּ֖חַ בִּ/שְׂאֵ֥ת אֹתֽ/וֹ־־׃
translation:
  text: Its poles shall be put into the rings, and the poles shall be on the two sides
    of the altar when it is carried.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shall be brought into the rings.' The Hebrew verb is passive, and the
      expression describes inserting the poles for transport.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sides' (צַלְעֹת), which can also mean sidepieces or flanks depending
      on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוּבָא
  chosen: shall be put
  alternatives:
  - shall be brought
  - is to be brought
  lexicon: HALOT
  rationale: Hophal of בוא gives a passive/causative sense, here describing the prescribed
    placement of the poles. 'Shall be put' is idiomatic in English for inserting poles
    into rings, while preserving the passive force.
- source_word: בַּדָּיו
  chosen: its poles
  alternatives:
  - its carrying poles
  - its staves
  lexicon: HALOT
  rationale: בַּד commonly refers to the poles used for carrying sacred furniture.
    'Poles' is clear modern English; 'staves' is archaic, and 'carrying poles' is
    more explicit but less concise.
- source_word: בַּטַּבָּעֹת
  chosen: into the rings
  alternatives:
  - in the rings
  - through the rings
  lexicon: HALOT
  rationale: The preposition ב here marks placement with the rings as the receiving
    location. 'Into the rings' best conveys insertion in natural English, matching
    the furniture-transport context.
- source_word: וְהָיוּ
  chosen: shall be
  alternatives:
  - and they shall remain
  - and they are to be
  lexicon: HALOT
  rationale: 'Simple future/resultative sense fits the instruction sequence: after
    being inserted, the poles are to be positioned on the altar''s two sides.'
- source_word: עַל
  chosen: 'on'
  alternatives:
  - along
  - against
  lexicon: HALOT
  rationale: עַל most straightforwardly means 'on/upon.' In this construction with
    the altar's sides, 'on' is acceptable English and preserves the spatial relation
    without overinterpreting.
- source_word: שְׁתֵּי צַלְעֹת
  chosen: the two sides
  alternatives:
  - the two sidepieces
  - the two flanks
  lexicon: HALOT
  rationale: צלע can mean side, sidewall, or sidepiece. For altar construction, 'the
    two sides' is the most natural and sufficiently precise rendering.
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Standard rendering for מזבח in cultic contexts.
- source_word: בִּשְׂאֵת אֹתוֹ
  chosen: when it is carried
  alternatives:
  - in carrying it
  - when carrying it
  lexicon: HALOT
  rationale: 'The infinitive construct of נשׂא with prefixed ב expresses circumstance/time:
    ''when it is carried.'' Passive English fits the object-focused instruction and
    avoids introducing an unspecified human subject.'
