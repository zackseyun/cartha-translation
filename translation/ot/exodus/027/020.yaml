id: EXO.27.20
reference: Exodus 27:20
source:
  edition: WLC
  text: וְ/אַתָּ֞ה תְּצַוֶּ֣ה אֶת בְּנֵ֣י יִשְׂרָאֵ֗ל וְ/יִקְח֨וּ אֵלֶ֜י/ךָ שֶׁ֣מֶן
    זַ֥יִת זָ֛ךְ כָּתִ֖ית לַ/מָּא֑וֹר לְ/הַעֲלֹ֥ת נֵ֖ר תָּמִֽיד׀־׃
translation:
  text: And you shall command the sons of Israel that they bring to you pure beaten
    olive oil for the light, to cause a lamp to burn continually.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “the Israelites” or “the people of Israel.” Hebrew: “the sons of Israel.”'
    reason: lexical_alternative
  - marker: b
    text: “Beaten” may also be rendered “crushed,” referring to high-quality oil produced
      from olives by pounding rather than ordinary pressing.
    reason: lexical_alternative
  - marker: c
    text: “Continually” in tabernacle usage can denote regular ongoing maintenance
      rather than necessarily every moment without interruption; compare the priestly
      instructions in Exodus 27:21 and Leviticus 24:2–4.
    reason: cross_reference
lexical_decisions:
- source_word: וְ/אַתָּה
  chosen: And you
  alternatives:
  - And as for you
  - Now you
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks a direct address to Moses
    and a slight discourse shift. 'And you' preserves the emphatic subject without
    overtranslating.
- source_word: תְּצַוֶּה
  chosen: shall command
  alternatives:
  - are to command
  - must command
  lexicon: HALOT
  rationale: Piel of צוה commonly means 'command, charge.' 'Shall command' fits the
    instructional legal style and preserves the directive force.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Per the gender-accurate philosophy, the formal
    familial expression is retained rather than neutralized to 'people,' though 'Israelites'
    is possible. Here the traditional covenantal designation is best preserved.
- source_word: וְ/יִקְחוּ אֵלֶיךָ
  chosen: that they bring to you
  alternatives:
  - and let them take to you
  - and they shall get for you
  lexicon: HALOT
  rationale: לקח literally means 'take,' but with אֶל plus second-person suffix in
    this supply context the idiomatic sense is to procure and bring to Moses. 'Bring
    to you' communicates the action naturally in English while staying close to the
    Hebrew sense.
- source_word: שֶׁמֶן זַיִת
  chosen: olive oil
  alternatives:
  - oil of olive
  lexicon: HALOT
  rationale: The construct phrase straightforwardly denotes oil from olives. 'Olive
    oil' is standard modern English.
- source_word: זָךְ
  chosen: pure
  alternatives:
  - clear
  - clean
  lexicon: HALOT
  rationale: Describes the oil's purity/clarity for cultic use. 'Pure' is the most
    natural and sufficiently broad English equivalent.
- source_word: כָּתִית
  chosen: beaten
  alternatives:
  - crushed
  - pressed
  lexicon: HALOT
  rationale: The adjective denotes oil produced by beating/crushing rather than by
    later pressing. 'Beaten' is the more formally precise rendering and reflects the
    Hebrew term directly.
- source_word: לַמָּאוֹר
  chosen: for the light
  alternatives:
  - for lighting
  - for the lampstand's light
  lexicon: HALOT
  rationale: The noun מָאוֹר refers to the light/illumination. 'For the light' preserves
    the nominal form and leaves the exact apparatus to context.
- source_word: לְהַעֲלֹת נֵר
  chosen: to cause a lamp to burn
  alternatives:
  - to set up a lamp
  - to raise up a lamp
  - to light a lamp
  lexicon: HALOT
  rationale: The idiom 'cause a lamp to go up' refers to lighting/maintaining a lamp.
    'To cause a lamp to burn' preserves the causative nuance of the Hiphil while expressing
    the idiom clearly.
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - regularly
  - continually before me
  lexicon: HALOT
  rationale: In tabernacle contexts תָּמִיד often means continual regularity rather
    than unbroken every-second duration. 'Continually' is the standard cultic rendering
    and fits the immediate context.
