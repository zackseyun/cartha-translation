theological_decisions:
- issue: Gendered covenant designation בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: Following the project's gender-accurate philosophy, the explicitly masculine
    familial term is retained in the main text rather than flattened to a neutral
    collective. In context it denotes the covenant community represented through the
    stock expression 'sons of Israel,' not a doctrinal claim about exclusion of women.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
