id: EXO.22.1
reference: Exodus 22:1
source:
  edition: WLC
  text: אִם בַּ/מַּחְתֶּ֛רֶת יִמָּצֵ֥א הַ/גַּנָּ֖ב וְ/הֻכָּ֣ה וָ/מֵ֑ת אֵ֥ין ל֖/וֹ
    דָּמִֽים־׃
translation:
  text: If the thief is found breaking in and is struck so that he dies, there is
    no bloodguilt for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'If the thief is found in the breaking-in.' The Hebrew
      term refers to a break-in, likely by digging through a wall or entering secretly.
    reason: lexical_alternative
  - marker: b
    text: That is, the person who struck the thief incurs no legal bloodguilt in this
      case.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּמַּחְתֶּרֶת
  chosen: breaking in
  alternatives:
  - in the breaking-in
  - in the tunnel
  - in the burglary
  lexicon: HALOT
  rationale: The noun refers to a break-in, especially by digging through a wall or
    entering by stealth. In idiomatic modern English, 'found breaking in' best captures
    the legal scenario without woodenly preserving the nominal form. 'Tunnel' is too
    concrete here, while 'burglary' is more technical and less natural in this conditional
    law.
- source_word: יִמָּצֵא
  chosen: is found
  alternatives:
  - is discovered
  lexicon: HALOT
  rationale: 'Nifal of מצא is naturally passive/reflexive here in a legal conditional:
    ''if the thief is found.'' ''Discovered'' is possible but slightly less direct.'
- source_word: הַגַּנָּב
  chosen: the thief
  alternatives:
  - the burglar
  lexicon: HALOT
  rationale: גנב is the ordinary term for 'thief.' Although the context is specifically
    a nighttime break-in, 'thief' remains the most transparent and lexically direct
    rendering.
- source_word: וְהֻכָּה
  chosen: is struck
  alternatives:
  - is beaten
  - is hit
  lexicon: HALOT
  rationale: Passive of נכה in legal narrative commonly means 'is struck.' 'Beaten'
    may imply repeated blows not specified by the Hebrew.
- source_word: וָמֵת
  chosen: so that he dies
  alternatives:
  - and dies
  - and he dies
  lexicon: HALOT
  rationale: The sequence expresses result after the striking. 'So that he dies' makes
    the causal/resultative sense clear in natural English, though 'and dies' would
    also be formally possible.
- source_word: אֵין לוֹ דָּמִים
  chosen: there is no bloodguilt for him
  alternatives:
  - there is no bloodshed charged to him
  - he is not guilty of bloodshed
  - no bloodguilt is on his account
  lexicon: HALOT
  rationale: The idiom דמים in legal contexts refers to bloodguilt or liability for
    bloodshed, not merely physical blood. 'There is no bloodguilt for him' preserves
    the legal force while remaining readable. The pronoun refers to the one who struck
    the thief, expressed idiomatically in English without over-specifying beyond the
    Hebrew.
