theological_decisions:
- issue: Legal idiom of justified killing during a break-in
  chosen_reading: Render the clause as absence of bloodguilt rather than as a broad
    moral endorsement of killing.
  alternative_readings:
  - Render more dynamically as 'he is not guilty of murder'
  rationale: The Hebrew states a legal judgment about bloodguilt in this circumstance.
    'Bloodguilt' preserves the covenant-legal category and avoids importing a narrower
    modern criminal-law category such as 'murder.'
  doctrine_reference: Translation philosophy §§1, 3, 5
