id: EXO.22.6
reference: Exodus 22:6
source:
  edition: WLC
  text: כִּֽי יִתֵּן֩ אִ֨ישׁ אֶל רֵעֵ֜/הוּ כֶּ֤סֶף אֽוֹ כֵלִים֙ לִ/שְׁמֹ֔ר וְ/גֻנַּ֖ב
    מִ/בֵּ֣ית הָ/אִ֑ישׁ אִם יִמָּצֵ֥א הַ/גַּנָּ֖ב יְשַׁלֵּ֥ם שְׁנָֽיִם־־־־׃
translation:
  text: If a man gives his neighbor money or goods to keep, and it is stolen from
    the man's house, if the thief is found, he shall pay double.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'silver'; here used in the sense of money.
    reason: lexical_alternative
  - marker: b
    text: Or 'articles' or 'objects' for 'goods.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'he shall repay twofold.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: In this casuistic legal context, כִּי introduces a case law condition.
    English 'If' best matches the protasis structure and is idiomatic in legal material.
- source_word: יִתֵּן אִישׁ
  chosen: a man gives
  alternatives:
  - someone gives
  - a person gives
  lexicon: HALOT
  rationale: The Hebrew is singular masculine ('a man gives'). Per translation philosophy,
    gender-accurate rendering is preferred where the source uses masculine representative
    language. 'A man' preserves the legal style without implying exclusion beyond
    the source's idiom.
- source_word: אֶל רֵעֵהוּ
  chosen: his neighbor
  alternatives:
  - his companion
  - his friend
  lexicon: HALOT
  rationale: רֵעַ in covenant/legal contexts commonly means a fellow person in the
    community. 'Neighbor' is the most natural and biblically coherent English rendering
    here.
- source_word: כֶּסֶף
  chosen: money
  alternatives:
  - silver
  lexicon: HALOT
  rationale: Though literally 'silver,' in legal/economic contexts it often denotes
    money generally. 'Money' communicates the functional sense in readable modern
    English.
- source_word: אוֹ כֵלִים
  chosen: or goods
  alternatives:
  - or articles
  - or vessels
  - or objects
  lexicon: HALOT
  rationale: כֵלִים is broad and refers to items/property entrusted for safekeeping.
    'Goods' is natural modern English and suitably broad; 'vessels' would be too narrow
    and archaic here.
- source_word: לִשְׁמֹר
  chosen: to keep
  alternatives:
  - to guard
  - to watch
  lexicon: HALOT
  rationale: 'The infinitive expresses purpose: the items are entrusted for safekeeping.
    ''To keep'' is concise and idiomatic in English legal/property contexts.'
- source_word: וְגֻנַּב
  chosen: and it is stolen
  alternatives:
  - and it was stolen
  lexicon: HALOT
  rationale: The passive verb refers back collectively to the entrusted property.
    Singular English 'it' can represent the entrusted property as a collective, and
    present-style case law English ('is stolen') fits the legal formulation.
- source_word: מִבֵּית הָאִישׁ
  chosen: from the man's house
  alternatives:
  - from that man's house
  - from the house of the man
  lexicon: HALOT
  rationale: The phrase refers to the custodian's house, i.e., the man just mentioned.
    'From the man's house' is clear and idiomatic.
- source_word: אִם יִמָּצֵא הַגַּנָּב
  chosen: if the thief is found
  alternatives:
  - if the thief is caught
  lexicon: HALOT
  rationale: The Niphal of מצא is literally 'is found.' 'Caught' is interpretive;
    'found' preserves the source wording while remaining clear.
- source_word: יְשַׁלֵּם שְׁנָיִם
  chosen: he shall pay double
  alternatives:
  - he shall make double restitution
  - he shall repay twofold
  lexicon: HALOT
  rationale: The idiom means repayment in double amount. 'Pay double' is concise,
    accurate, and readable. The subject is the thief in context.
