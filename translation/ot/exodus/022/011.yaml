id: EXO.22.11
reference: Exodus 22:11
source:
  edition: WLC
  text: וְ/אִם גָּנֹ֥ב יִגָּנֵ֖ב מֵ/עִמּ֑/וֹ יְשַׁלֵּ֖ם לִ/בְעָלָֽי/ו־׃
translation:
  text: But if it is indeed stolen from him, he shall make restitution to its owner.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'if stealing it is stolen from with him,' an emphatic
      construction meaning 'if it is indeed stolen from him' or 'if it is actually
      stolen while in his custody.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a contrasting conditional within the case law sequence. 'But
    if' captures the adversative force in context better than a bare 'if' while remaining
    natural English.
- source_word: גָּנֹב יִגָּנֵב
  chosen: it is indeed stolen
  alternatives:
  - it is stolen
  - it should surely be stolen
  - if it is actually stolen
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verbal idea.
    English cannot mirror the Hebrew form directly, so 'is indeed stolen' conveys
    the emphatic/passive sense without awkwardness. The object is implicit from the
    prior context and is represented by 'it' for clear English.
- source_word: מֵעִמּוֹ
  chosen: from him
  alternatives:
  - from his custody
  - from with him
  lexicon: HALOT
  rationale: Literally 'from with him.' In this legal context it refers to loss while
    in the keeper's possession. 'From him' is the most direct rendering; the custodial
    nuance is contextually understood and need not be overexpanded in the main text.
- source_word: יְשַׁלֵּם
  chosen: he shall make restitution
  alternatives:
  - he shall repay
  - he shall pay compensation
  lexicon: HALOT
  rationale: The Piel of שלם in legal contexts commonly means to make compensation
    or restitution. 'Make restitution' preserves the legal force more precisely than
    the simpler 'repay'.
- source_word: לִבְעָלָיו
  chosen: to its owner
  alternatives:
  - to its masters
  - to the owner of it
  lexicon: HALOT
  rationale: בעל can mean owner/master. Here the referent is the owner of the entrusted
    animal or goods from the surrounding case law. Singular 'owner' is the natural
    English equivalent, with 'its' supplying the implicit object relationship.
