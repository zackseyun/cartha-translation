id: EXO.22.14
reference: Exodus 22:14
source:
  edition: WLC
  text: אִם בְּעָלָ֥י/ו עִמּ֖/וֹ לֹ֣א יְשַׁלֵּ֑ם אִם שָׂכִ֣יר ה֔וּא בָּ֖א בִּ/שְׂכָרֽ/וֹ־־׃ס
translation:
  text: If its owner is with it, he shall not make restitution; if it is a hired thing,
    it came for its hire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'if he is a hired worker, he came for his wages.' The Hebrew is terse
      and has been understood either of the hired animal/item or of a hired laborer;
      in this context of liability for borrowed property, the main text takes it as
      referring to the hired item.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּעָלָיו
  chosen: its owner
  alternatives:
  - its master
  - the owner of it
  lexicon: HALOT
  rationale: בעל commonly denotes an owner or possessor. In this legal context concerning
    borrowed or hired property, 'owner' is the most natural English legal term. The
    suffix refers back to the animal/object under discussion, so 'its owner' preserves
    that relation.
- source_word: עִמּוֹ
  chosen: is with it
  alternatives:
  - is with him
  - is present with it
  lexicon: HALOT
  rationale: 'The preposition with 3ms suffix can be rendered ''with it'' because
    the antecedent in context is the borrowed animal/object, not another male person.
    This keeps the legal scenario coherent: if the owner accompanies the item, the
    borrower is exempt.'
- source_word: לֹא יְשַׁלֵּם
  chosen: he shall not make restitution
  alternatives:
  - he shall not pay
  - he shall not repay
  lexicon: HALOT
  rationale: The piel of שלם in legal contexts means to make compensation or restitution.
    'Make restitution' is more precise than the broader 'pay' and fits covenant-law
    style English.
- source_word: שָׂכִיר
  chosen: a hired thing
  alternatives:
  - a hired animal
  - a hired item
  - a hired servant
  lexicon: HALOT
  rationale: Although שָׂכִיר often refers to a hired laborer, in this immediate property-law
    context the clause is best understood elliptically of the borrowed object/animal
    being hired. Rendering it as 'a hired thing' preserves the legal sense without
    over-specifying beyond the Hebrew.
- source_word: בָּא בִּשְׂכָרוֹ
  chosen: it came for its hire
  alternatives:
  - it came with its hire
  - its hire covers it
  - it was hired for payment
  lexicon: HALOT
  rationale: The idiom is terse and somewhat elliptical. A fairly literal rendering,
    'it came for its hire,' preserves the sense that the risk or compensation is included
    in the hire arrangement. This avoids paraphrasing while remaining intelligible.
