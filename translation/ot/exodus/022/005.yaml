id: EXO.22.5
reference: Exodus 22:5
source:
  edition: WLC
  text: כִּֽי תֵצֵ֨א אֵ֜שׁ וּ/מָצְאָ֤ה קֹצִים֙ וְ/נֶאֱכַ֣ל גָּדִ֔ישׁ א֥וֹ הַ/קָּמָ֖ה
    א֣וֹ הַ/שָּׂדֶ֑ה שַׁלֵּ֣ם יְשַׁלֵּ֔ם הַ/מַּבְעִ֖ר אֶת הַ/בְּעֵרָֽה־־׃ס
translation:
  text: If a fire breaks out and spreads to thorns, so that stacked grain or standing
    grain or the field is consumed, the one who started the fire must surely make
    restitution.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and catches thorns'; literally, 'and finds thorns.'
    reason: lexical_alternative
  - marker: b
    text: Or 'must surely pay'; the Hebrew intensifies the obligation with an infinitive
      absolute plus finite verb.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a case law condition. 'If' is standard and natural in English
    casuistic law; 'when' is possible but slightly less conditional in tone.
- source_word: תֵצֵא אֵשׁ
  chosen: a fire breaks out
  alternatives:
  - a fire goes out
  - fire goes forth
  lexicon: HALOT
  rationale: The idiom refers to a fire starting or breaking out, not a fire being
    extinguished. 'Breaks out' gives the natural English sense of an accidental or
    uncontrolled outbreak.
- source_word: וּמָצְאָה קֹצִים
  chosen: and spreads to thorns
  alternatives:
  - and catches thorns
  - and finds thorns
  lexicon: HALOT
  rationale: Literally 'and finds thorns,' but in context the fire reaches and ignites
    thornbushes. 'Spreads to thorns' communicates the progression of the blaze in
    idiomatic English while staying close to the image.
- source_word: קֹצִים
  chosen: thorns
  alternatives:
  - thornbushes
  - brush
  lexicon: HALOT
  rationale: '''Thorns'' is the direct lexical equivalent. In context these likely
    function as dry brush that carries the fire, but the simpler rendering preserves
    the Hebrew image.'
- source_word: וְנֶאֱכַל
  chosen: is consumed
  alternatives:
  - is burned up
  - is eaten up
  lexicon: HALOT
  rationale: The Niphal of אכל is commonly used for being consumed by fire. 'Is consumed'
    is accurate and suitably formal for legal material; 'burned up' is a possible
    dynamic alternative.
- source_word: גָּדִישׁ
  chosen: stacked grain
  alternatives:
  - a stack of grain
  - shocks of grain
  - a grain heap
  lexicon: HALOT
  rationale: Refers to harvested grain gathered in a heap or stack. 'Stacked grain'
    is concise and clear for modern readers.
- source_word: הַקָּמָה
  chosen: standing grain
  alternatives:
  - the standing crop
  - unharvested grain
  lexicon: HALOT
  rationale: Denotes grain still standing in the field. 'Standing grain' preserves
    the agricultural contrast with already harvested grain.
- source_word: הַשָּׂדֶה
  chosen: the field
  alternatives:
  - the open field
  - the farmland
  lexicon: HALOT
  rationale: Straightforward rendering of the noun. The article is retained in English
    because it refers to the affected field in the case scenario.
- source_word: שַׁלֵּם יְשַׁלֵּם
  chosen: must surely make restitution
  alternatives:
  - shall surely pay
  - must make full compensation
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the obligation. 'Must
    surely make restitution' captures both the legal force and the emphasis.
- source_word: הַמַּבְעִר
  chosen: the one who started the fire
  alternatives:
  - the one who kindled it
  - the burner
  lexicon: HALOT
  rationale: From בער in the causative sense, referring to the person responsible
    for setting the fire. 'Started the fire' is idiomatic and clear; 'kindled it'
    is more formal but slightly less natural.
- source_word: אֶת הַבְּעֵרָה
  chosen: the fire
  alternatives:
  - the burning
  - the blaze
  lexicon: HALOT
  rationale: Object of the participle, literally 'the burning.' In English, 'the fire'
    best conveys the referent without awkwardness. The sense is the fire that was
    set and then spread.
