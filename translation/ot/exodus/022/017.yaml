theological_decisions:
- issue: Gender-specific rendering of the offender
  chosen_reading: 'Render the noun as feminine singular: ''sorceress.'''
  alternative_readings:
  - Render generically as 'sorcerer' or 'one who practices sorcery'
  rationale: The Hebrew form is explicitly feminine, and the translation philosophy
    calls for gender-accurate rendering rather than neutralizing marked gender. The
    verse should therefore preserve the feminine form in English.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Force of the legal prohibition
  chosen_reading: Translate as a prohibition against allowing such a person to remain
    alive, without expanding the mechanism of punishment in the main text.
  alternative_readings:
  - Translate more interpretively as 'must be put to death'
  rationale: While the legal effect implies a death penalty within the covenant law
    context, the Hebrew wording is literally 'you shall not let live/keep alive.'
    Optimal equivalence preserves that wording rather than importing a more explicit
    judicial formula not present in the text.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 1
