id: EXO.22.17
reference: Exodus 22:17
source:
  edition: WLC
  text: מְכַשֵּׁפָ֖ה לֹ֥א תְחַיֶּֽה׃ס
translation:
  text: You shall not let a sorceress live.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'witch.' The Hebrew noun is feminine singular, referring specifically
      to a woman who practices sorcery.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְכַשֵּׁפָה
  chosen: a sorceress
  alternatives:
  - a witch
  - a female sorcerer
  lexicon: HALOT
  rationale: The noun is feminine singular and denotes a woman who practices sorcery/magic.
    'Sorceress' preserves the feminine marking in the Hebrew and avoids some of the
    later cultural baggage of the English word 'witch,' though that remains a plausible
    alternative.
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Standard negation particle; in English it is naturally carried by 'shall
    not' with the following verb.
- source_word: תְחַיֶּה
  chosen: you shall not let ... live
  alternatives:
  - you shall not keep alive
  - you shall not allow ... to live
  lexicon: HALOT
  rationale: Piel imperfect 2ms of חיה here has a causative/resultative sense, 'keep
    alive' or 'let live.' In legal English, 'you shall not let ... live' is both natural
    and close to the Hebrew force. The singular addressee functions corporately in
    covenant law.
