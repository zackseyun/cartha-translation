id: EXO.22.30
reference: Exodus 22:30
source:
  edition: WLC
  text: וְ/אַנְשֵׁי קֹ֖דֶשׁ תִּהְי֣וּ/ן לִ֑/י וּ/בָשָׂ֨ר בַּ/שָּׂדֶ֤ה טְרֵפָה֙ לֹ֣א
    תֹאכֵ֔לוּ לַ/כֶּ֖לֶב תַּשְׁלִכ֥וּ/ן אֹתֽ/וֹ־׃ס
translation:
  text: And you shall be holy men to me. You shall not eat flesh torn in the field;
    you shall throw it to the dogs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'flesh torn by beasts in the field.' The Hebrew says simply 'flesh ...
      torn,' with the agent implied rather than stated.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'holy men.' The phrase may function representatively for the covenant
      community, but the masculine form is explicit in the source text.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי קֹדֶשׁ
  chosen: holy men
  alternatives:
  - men of holiness
  - holy people
  lexicon: HALOT
  rationale: The construct phrase literally means 'men of holiness/holy men.' Because
    the Hebrew is grammatically masculine plural and addresses the covenant community's
    male representatives, 'holy men' preserves the source form in keeping with the
    gender-accurate policy. 'Holy people' is possible as a more inclusive dynamic
    rendering, but it weakens the explicit masculine form and is not required by the
    immediate syntax.
- source_word: תִּהְיוּן לִי
  chosen: you shall be ... to me
  alternatives:
  - you must be ... for me
  lexicon: HALOT
  rationale: 'The imperfect of היה with לִי expresses covenantal obligation/status:
    ''you shall be to me.'' This is rendered naturally in English while preserving
    the relational force of belonging to God.'
- source_word: בָשָׂר
  chosen: flesh
  alternatives:
  - meat
  lexicon: HALOT
  rationale: בָשָׂר is literally 'flesh.' 'Meat' is idiomatic in English, but 'flesh'
    better preserves the lexical form and the concrete imagery of animal carcass regulations.
- source_word: בַּשָּׂדֶה
  chosen: in the field
  alternatives:
  - in the open country
  lexicon: HALOT
  rationale: The phrase is spatial and concrete. 'In the field' is the straightforward
    rendering and matches the Hebrew noun שָׂדֶה.
- source_word: טְרֵפָה
  chosen: torn
  alternatives:
  - torn by beasts
  - mauled
  lexicon: HALOT
  rationale: טְרֵפָה denotes something torn, especially prey torn by animals. 'Torn'
    keeps the Hebrew concise; the likely agent ('by beasts') is contextually inferable
    but not explicit in the word itself, so it is not added to the main text.
- source_word: לֹא תֹאכֵלוּ
  chosen: you shall not eat
  alternatives:
  - you must not eat
  lexicon: HALOT
  rationale: A standard prohibition with imperfect verb. 'Shall not' fits the legal
    style of the context without becoming archaic.
- source_word: לַכֶּלֶב
  chosen: to the dogs
  alternatives:
  - to a dog
  lexicon: HALOT
  rationale: Although the noun is singular in form, English commonly uses the plural
    generically in this distributive sense. 'To the dogs' sounds natural and conveys
    disposal to scavengers.
- source_word: תַּשְׁלִכוּן אֹתוֹ
  chosen: you shall throw it
  alternatives:
  - you shall cast it
  lexicon: HALOT
  rationale: The Hiphil of שלך means 'throw/cast.' 'Throw' is clear modern English;
    'cast' is more traditional but less natural for the target audience.
