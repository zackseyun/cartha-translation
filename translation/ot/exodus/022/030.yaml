theological_decisions:
- issue: Holiness language in covenant law
  chosen_reading: Rendered the command as 'you shall be holy men to me' to preserve
    both covenant belonging and ethical consecration.
  alternative_readings:
  - you shall be consecrated men to me
  - you shall be holy people to me
  rationale: The verse grounds the food prohibition in Israel's holy status before
    God. 'Holy' is the most direct and theologically loaded equivalent of קֹדֶשׁ;
    'consecrated' is possible but narrower. The masculine plural 'men' is retained
    per the gender-accurate translation philosophy rather than neutralizing to 'people.'
  doctrine_reference: DOCTRINE.md Translation philosophy §§3-4
