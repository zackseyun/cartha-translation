id: EXO.22.21
reference: Exodus 22:21
source:
  edition: WLC
  text: כָּל אַלְמָנָ֥ה וְ/יָת֖וֹם לֹ֥א תְעַנּֽוּ/ן־׃
translation:
  text: You shall not afflict any widow or orphan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fatherless child' for 'orphan.'
    reason: lexical_alternative
  - marker: b
    text: Or 'oppress' or 'mistreat' for 'afflict.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: any
  alternatives:
  - every
  lexicon: HALOT
  rationale: With singular nouns אַלְמָנָה and יָתוֹם in a prohibition, כָּל has a
    distributive sense. 'Any' is idiomatic in English after a negative command ('do
    not ... any widow or orphan'), while still preserving the comprehensive force.
- source_word: אַלְמָנָה
  chosen: widow
  lexicon: HALOT
  rationale: Standard lexical sense is 'widow.' This is direct and natural English.
- source_word: יָתוֹם
  chosen: orphan
  alternatives:
  - fatherless child
  lexicon: HALOT
  rationale: The noun denotes an orphan, often specifically a fatherless child in
    Hebrew legal contexts. 'Orphan' is the clearest modern English rendering; the
    more literal nuance 'fatherless child' is worth preserving as an alternative but
    is less idiomatic here.
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Regular negation in a prohibition.
- source_word: תְעַנּוּן
  chosen: afflict
  alternatives:
  - oppress
  - mistreat
  - humble
  lexicon: HALOT
  rationale: From ענה in the Piel, the sense here is to cause suffering or harsh treatment.
    'Afflict' preserves the breadth and gravity of the Hebrew without narrowing it
    merely to economic oppression. 'Mistreat' is possible but lighter; 'oppress' is
    plausible but somewhat narrower; 'humble' reflects other contexts of the root
    but not this legal setting.
