id: EXO.22.29
reference: Exodus 22:29
source:
  edition: WLC
  text: כֵּֽן תַּעֲשֶׂ֥ה לְ/שֹׁרְ/ךָ֖ לְ/צֹאנֶ֑/ךָ שִׁבְעַ֤ת יָמִים֙ יִהְיֶ֣ה עִם
    אִמּ֔/וֹ בַּ/יּ֥וֹם הַ/שְּׁמִינִ֖י תִּתְּנ/וֹ לִֽ/י־־־׃
translation:
  text: 'You shall do the same with your ox and with your flock: seven days it shall
    remain with its mother; on the eighth day you shall give it to me.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it shall be with its mother.' The Hebrew is literally 'it shall be with
      its mother'; 'remain' brings out the durative sense in context.
    reason: lexical_alternative
  - marker: b
    text: The command continues the preceding context about firstborn offerings; Hebrew
      does not repeat 'firstborn' in this verse.
    reason: cross_reference
lexical_decisions:
- source_word: כֵּן
  chosen: the same
  alternatives:
  - thus
  - so
  lexicon: HALOT
  rationale: Links this instruction to the immediately preceding command about firstborn
    offerings. 'The same' makes the comparative force clear in natural English.
- source_word: תַּעֲשֶׂה
  chosen: you shall do
  alternatives:
  - you shall act
  - you shall make
  lexicon: HALOT
  rationale: Common legal-instruction use of עשה; 'you shall do' is idiomatic and
    preserves the imperative force.
- source_word: לְשֹׁרְךָ
  chosen: with your ox
  alternatives:
  - for your ox
  - to your ox
  - with your bull
  lexicon: HALOT
  rationale: 'The prefixed ל here marks relation/reference: the rule applies with
    respect to the owner''s ox. ''With your ox'' is natural in English when paired
    with ''with your flock.'' ''Ox'' is broader and safer than ''bull'' in this legal
    context.'
- source_word: לְצֹאנְךָ
  chosen: with your flock
  alternatives:
  - for your flock
  - with your sheep and goats
  lexicon: HALOT
  rationale: צאן is a collective term for small livestock, especially sheep/goats.
    'Flock' preserves the collective sense without over-specifying.
- source_word: שִׁבְעַת יָמִים
  chosen: seven days
  alternatives:
  - for seven days
  lexicon: HALOT
  rationale: Accusative of duration; English can express this naturally as 'seven
    days' before the verb 'it shall remain.'
- source_word: יִהְיֶה עִם אִמּוֹ
  chosen: it shall remain with its mother
  alternatives:
  - it shall be with its mother
  - it shall stay with its mother
  lexicon: HALOT
  rationale: Though literally 'it shall be with its mother,' the legal sense is durative
    retention with the mother animal. 'Remain' communicates that sense clearly.
- source_word: בַּיּוֹם הַשְּׁמִינִי
  chosen: on the eighth day
  alternatives:
  - on day eight
  lexicon: HALOT
  rationale: Standard temporal expression; 'on the eighth day' is both accurate and
    idiomatic.
- source_word: תִּתְּנוֹ לִי
  chosen: you shall give it to me
  alternatives:
  - you shall present it to me
  - you shall give him to me
  lexicon: HALOT
  rationale: Directly reflects נתן + pronominal suffix + ל. 'Give it to me' preserves
    the straightforward covenantal demand. Neuter 'it' fits English usage for livestock
    in legal material.
