theological_decisions:
- issue: Referent of the command in relation to firstborn animals
  chosen_reading: The verse is rendered as a command concerning the owner's ox and
    flock in continuity with the preceding firstborn-offering instruction, without
    expanding the text to explain sacrificial theology.
  alternative_readings:
  - A more explicit rendering could add 'firstborn' from the previous verse for clarity.
  rationale: The Hebrew here omits 'firstborn' because it is carried over from context.
    To avoid paraphrase beyond the verse itself, the translation keeps the wording
    concise while allowing the contextual link to stand.
  doctrine_reference: 'Translation philosophy: original-language primacy; never paraphrase
    beyond what the source text warrants.'
