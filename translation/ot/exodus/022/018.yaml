theological_decisions:
- issue: Rendering the legal death-penalty formula
  chosen_reading: shall surely be put to death
  alternative_readings:
  - shall surely die
  rationale: The Hebrew construction is a legal formula expressing certain capital
    punishment. The chosen rendering makes the judicial/passive force explicit without
    adding interpretation beyond the syntax.
