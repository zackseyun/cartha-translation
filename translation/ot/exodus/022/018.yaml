id: EXO.22.18
reference: Exodus 22:18
source:
  edition: WLC
  text: כָּל שֹׁכֵ֥ב עִם בְּהֵמָ֖ה מ֥וֹת יוּמָֽת־־׃ס
translation:
  text: Whoever lies with an animal shall surely be put to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'shall surely die.' The Hebrew legal formula explicitly
      conveys certain death as a judicial penalty.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: Whoever
  alternatives:
  - Everyone who
  - Any person who
  lexicon: HALOT
  rationale: כָּל with the following participle forms an indefinite generalizing expression,
    best rendered idiomatically in English as 'Whoever' rather than the overly literal
    'all who.'
- source_word: שֹׁכֵב
  chosen: lies with
  alternatives:
  - has sexual relations with
  - sleeps with
  lexicon: HALOT
  rationale: The Qal participle of שׁכב with עִם is a standard sexual euphemism. 'Lies
    with' preserves the source idiom and gravity without becoming either clinical
    or euphemistic beyond the Hebrew.
- source_word: עִם
  chosen: with
  lexicon: HALOT
  rationale: Straightforward preposition linking the sexual verb to its object.
- source_word: בְּהֵמָה
  chosen: an animal
  alternatives:
  - a beast
  - livestock
  lexicon: HALOT
  rationale: בְּהֵמָה denotes an animal/beast. 'An animal' is clear modern English
    and avoids archaic tone; 'beast' is possible but sounds dated or rhetorically
    loaded in English.
- source_word: מוֹת יוּמָת
  chosen: shall surely be put to death
  alternatives:
  - must certainly be put to death
  - shall surely die
  lexicon: HALOT
  rationale: The infinitive absolute plus passive/imperfect construction intensifies
    the penalty. 'Shall surely be put to death' captures both the emphasis and the
    passive/juridical sense better than simply 'shall surely die,' which could sound
    less explicitly judicial.
