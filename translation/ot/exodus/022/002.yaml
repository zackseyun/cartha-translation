id: EXO.22.2
reference: Exodus 22:2
source:
  edition: WLC
  text: אִם זָרְחָ֥ה הַ/שֶּׁ֛מֶשׁ עָלָ֖י/ו דָּמִ֣ים ל֑/וֹ שַׁלֵּ֣ם יְשַׁלֵּ֔ם אִם
    אֵ֣ין ל֔/וֹ וְ/נִמְכַּ֖ר בִּ/גְנֵבָתֽ/וֹ־־׃
translation:
  text: But if the sun has risen on him, there is bloodguilt for him. He must surely
    make restitution. If he has nothing, then he shall be sold for his theft.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'if it happens after sunrise' or 'if it is done
      in daylight.' The Hebrew reads literally, 'if the sun has risen on him.'
    reason: lexical_alternative
  - marker: b
    text: That is, the killer would incur bloodguilt in this circumstance.
    reason: alternative_reading
  - marker: c
    text: This sale is a debt remedy for theft when the thief lacks the means to make
      restitution.
    reason: cultural_note
lexical_decisions:
- source_word: אִם
  chosen: But if
  alternatives:
  - If
  lexicon: HALOT
  rationale: Introduces the contrasting conditional case relative to the previous
    verse. 'But if' makes the adversative force clear in English, though the particle
    itself is simply conditional.
- source_word: זָרְחָה הַשֶּׁמֶשׁ
  chosen: the sun has risen
  alternatives:
  - the sun rose
  - it happened by daylight
  lexicon: HALOT
  rationale: A fairly literal rendering of the verb זרח with subject 'the sun.' The
    perfect is rendered idiomatically in English as 'has risen.' This preserves the
    concrete image rather than paraphrasing it as 'by daylight,' though that is the
    legal sense.
- source_word: עָלָיו
  chosen: on him
  alternatives:
  - upon him
  - over him
  lexicon: HALOT
  rationale: Kept formally with the preposition 'on' to preserve the Hebrew expression
    'the sun has risen on him,' referring to the burglar/thief in context.
- source_word: דָּמִים לוֹ
  chosen: there is bloodguilt for him
  alternatives:
  - he is guilty of bloodshed
  - blood shall be shed for him
  lexicon: HALOT
  rationale: The plural דמים in legal contexts commonly denotes bloodguilt. The phrase
    indicates liability for killing the intruder in this circumstance. 'There is bloodguilt
    for him' stays close to the Hebrew while remaining intelligible.
- source_word: שַׁלֵּם יְשַׁלֵּם
  chosen: He must surely make restitution
  alternatives:
  - he shall surely pay
  - he must fully repay
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the obligation. 'Make
    restitution' fits the legal context better than bare 'pay,' since the issue is
    compensation for theft.
- source_word: אִם אֵין לוֹ
  chosen: If he has nothing
  alternatives:
  - if he has no means
  - if he has nothing of his own
  lexicon: HALOT
  rationale: Idiomatic rendering of the Hebrew expression for lacking resources to
    repay.
- source_word: וְנִמְכַּר
  chosen: then he shall be sold
  alternatives:
  - then he is to be sold
  lexicon: HALOT
  rationale: Passive/reflexive legal consequence rendered straightforwardly. This
    refers to sale into servitude to satisfy the debt.
- source_word: בִּגְנֵבָתוֹ
  chosen: for his theft
  alternatives:
  - for what he stole
  - because of his theft
  lexicon: HALOT
  rationale: The noun גנבה denotes the theft/stolen property. 'For his theft' is concise
    and preserves the legal basis for the sale.
