id: EXO.22.10
reference: Exodus 22:10
source:
  edition: WLC
  text: שְׁבֻעַ֣ת יְהוָ֗ה תִּהְיֶה֙ בֵּ֣ין שְׁנֵי/הֶ֔ם אִם לֹ֥א שָׁלַ֛ח יָד֖/וֹ בִּ/מְלֶ֣אכֶת רֵעֵ֑/הוּ וְ/לָקַ֥ח בְּעָלָ֖י/ו וְ/לֹ֥א יְשַׁלֵּֽם־׃
translation:
  text: an oath of Yahweh shall be between the two of them, that he has not put his hand to his neighbor’s property; and its owner shall accept it, and he shall not make restitution.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'an oath of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'put his hand to his neighbor’s property,' an idiom for misappropriating or tampering with what belonged to another.
    reason: cultural_note
  - marker: c
    text: Or 'the owner shall receive it,' that is, accept the oath as sufficient.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁבֻעַת
  chosen: an oath
  alternatives:
  - the oath
  lexicon: HALOT
  rationale: 'Construct with the divine name: literally ''oath of YHWH.'' English idiom is best represented as ''an oath before the LORD'' rather than a wooden ''the LORD''s oath,'' while preserving the formal legal sense.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בֵּין שְׁנֵיהֶם
  chosen: between the two of them
  alternatives:
  - between them
  - between both of them
  lexicon: HALOT
  rationale: The Hebrew explicitly marks two parties; 'between the two of them' preserves that bilateral legal setting more clearly than the simpler 'between them.'
- source_word: אִם לֹא
  chosen: that ... not
  alternatives:
  - whether ... not
  - if ... not
  lexicon: HALOT
  rationale: In oath formulas אִם לֹא introduces the content sworn, not a simple conditional. English legal style is best conveyed by 'that he has not...' rather than a misleading conditional 'if he did not...'.
- source_word: שָׁלַח יָדוֹ
  chosen: put his hand to
  alternatives:
  - laid his hand on
  - stretched out his hand against
  lexicon: HALOT
  rationale: This idiom means to appropriate or misuse something. 'Put his hand to' keeps the Hebrew imagery while fitting the context of possible misappropriation.
- source_word: בִּמְלֶאכֶת רֵעֵהוּ
  chosen: his neighbor’s property
  alternatives:
  - his neighbor’s goods
  - his neighbor’s business
  - that which belongs to his neighbor
  lexicon: HALOT
  rationale: Here מְלָאכָה refers not to 'work' in the abstract but to the matter/property entrusted and potentially misused. 'Property' communicates the legal-economic sense in context.
- source_word: וְלָקַח בְּעָלָיו
  chosen: and its owner shall accept it
  alternatives:
  - and the owner shall take it
  - and the master/owner shall receive it
  lexicon: HALOT
  rationale: The idiom means the owner accepts the oath/settlement. 'Accept it' makes the legal force explicit in natural English; the object is implicit from context.
- source_word: יְשַׁלֵּם
  chosen: make restitution
  alternatives:
  - pay
  - repay
  - make compensation
  lexicon: HALOT
  rationale: In covenant law contexts, שׁלם in the Piel commonly denotes compensatory payment. 'Make restitution' best captures the legal nuance.
