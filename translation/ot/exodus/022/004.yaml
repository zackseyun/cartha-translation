id: EXO.22.4
reference: Exodus 22:4
source:
  edition: WLC
  text: כִּ֤י יַבְעֶר אִישׁ֙ שָׂדֶ֣ה אוֹ כֶ֔רֶם וְ/שִׁלַּח֙ אֶת בעיר/ה וּ/בִעֵ֖ר בִּ/שְׂדֵ֣ה
    אַחֵ֑ר מֵיטַ֥ב שָׂדֵ֛/הוּ וּ/מֵיטַ֥ב כַּרְמ֖/וֹ יְשַׁלֵּֽם־־־׃ס
translation:
  text: If a man causes a field or vineyard to be grazed over, and lets his animal
    loose so that it grazes in another man's field, he shall make restitution from
    the best of his own field and the best of his own vineyard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'If a man burns a field or vineyard.' The Hebrew verb בער can refer
      to burning in some contexts, but here the immediate mention of releasing his
      animal strongly supports the sense of grazing/consuming by livestock.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'another field'; 'man's' is supplied in English to make the legal
      sense explicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: In this casuistic law context, כִּי introduces a conditional case. 'If'
    is the most natural English legal rendering, though 'when' is also possible.
- source_word: יַבְעֶר
  chosen: causes ... to be grazed over
  alternatives:
  - grazes
  - burns
  lexicon: HALOT
  rationale: From בער in Hiphil, here the context is clarified by the following mention
    of releasing his animal and grazing in another field. The sense is not literal
    burning here but causing consumption by grazing. 'Causes ... to be grazed over'
    preserves the causative force better than simply 'grazes.'
- source_word: שָׂדֶה אוֹ כֶרֶם
  chosen: a field or vineyard
  lexicon: HALOT
  rationale: Straightforward agricultural terms; singulars retained to match the Hebrew
    legal case formulation.
- source_word: וְשִׁלַּח אֶת־בְּעִירֹה
  chosen: and lets his animal loose
  alternatives:
  - and sends out his livestock
  - and releases his beast
  lexicon: HALOT
  rationale: שִׁלַּח means 'send/release,' and בְּעִיר refers to a beast of burden
    or grazing animal. 'Lets his animal loose' is idiomatic modern English and fits
    the legal scenario.
- source_word: בְּעִירֹה
  chosen: his animal
  alternatives:
  - his livestock
  - his beast
  lexicon: HALOT
  rationale: The singular with suffix is generic. 'Animal' is clear modern English;
    'livestock' is possible but slightly more collective than the Hebrew singular.
- source_word: וּבִעֵר בִּשְׂדֵה אַחֵר
  chosen: so that it grazes in another man's field
  alternatives:
  - and it feeds in another field
  - and it consumes another's field
  lexicon: HALOT
  rationale: The repeated בער continues the grazing/consuming imagery. 'Another man's
    field' makes explicit the possessive sense implied by 'another' in this legal
    context. 'Grazes' fits the animal-damage setting better than the more general
    'consumes.'
- source_word: אַחֵר
  chosen: another man's
  alternatives:
  - another
  - someone else's
  lexicon: HALOT
  rationale: Hebrew literally has 'another,' but English legal style commonly supplies
    the implied possessor. 'Man's' matches the gender-accurate style of the surrounding
    casuistic formulation.
- source_word: מֵיטַב שָׂדֵהוּ וּמֵיטַב כַּרְמוֹ
  chosen: from the best of his own field and the best of his own vineyard
  alternatives:
  - with the best of his field and the best of his vineyard
  lexicon: HALOT
  rationale: מֵיטַב denotes the choicest or best part. 'His own' clarifies that the
    offender must pay from his property, not the damaged party's. 'From' expresses
    source of restitution naturally in English.
- source_word: יְשַׁלֵּם
  chosen: he shall make restitution
  alternatives:
  - he shall pay
  - he shall repay
  lexicon: HALOT
  rationale: In covenant law, שׁלם in Piel commonly denotes compensatory payment.
    'Make restitution' captures the legal force more precisely than the simpler 'pay.'
