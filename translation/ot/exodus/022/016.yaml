id: EXO.22.16
reference: Exodus 22:16
source:
  edition: WLC
  text: אִם מָאֵ֧ן יְמָאֵ֛ן אָבִ֖י/הָ לְ/תִתָּ֣/הּ ל֑/וֹ כֶּ֣סֶף יִשְׁקֹ֔ל כְּ/מֹ֖הַר
    הַ/בְּתוּלֹֽת־׃ס
translation:
  text: If her father absolutely refuses to give her to him, he shall pay silver equal
    to the bride-price for virgins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'he shall weigh out silver,' reflecting payment by weighed metal
      rather than coined currency.
    reason: cultural_note
  - marker: b
    text: Or, 'to give her in marriage to him.' The Hebrew idiom 'give her to him'
      refers to the father's consent to marriage.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  lexicon: HALOT
  rationale: Standard conditional particle introducing the case law condition.
- source_word: מָאֵן יְמָאֵן
  chosen: absolutely refuses
  alternatives:
  - flatly refuses
  - surely refuses
  - refuses outright
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the verb מאן. English
    needs an adverbial intensifier to reflect the emphatic construction rather than
    a bare 'refuses'.
- source_word: אָבִיהָ
  chosen: her father
  lexicon: HALOT
  rationale: Straightforward construct with 3fs suffix; the possessive should be explicit
    in English.
- source_word: לְתִתָּהּ לוֹ
  chosen: to give her to him
  alternatives:
  - to give her in marriage to him
  lexicon: HALOT
  rationale: Literally 'to give her to him.' In this legal-marital context the idiom
    implies giving in marriage, but the shorter rendering preserves the Hebrew wording
    while remaining clear.
- source_word: כֶּסֶף
  chosen: silver
  alternatives:
  - money
  lexicon: HALOT
  rationale: Hebrew literally says 'silver.' In legal/economic contexts this can function
    as money, but 'silver' preserves the concrete wording of the source.
- source_word: יִשְׁקֹל
  chosen: he shall pay
  alternatives:
  - he shall weigh out
  lexicon: HALOT
  rationale: The verb literally means 'weigh,' reflecting payment by weighed silver.
    In idiomatic modern English, 'pay' best communicates the legal obligation; the
    more literal nuance is preserved by retaining 'silver' and noting the alternative.
- source_word: כְּמֹהַר
  chosen: equal to the bride-price
  alternatives:
  - according to the marriage payment
  - as the bride-price
  lexicon: HALOT
  rationale: מֹהַר denotes the marriage payment/bride-price customarily paid to the
    bride's family. 'Bride-price' is the clearest concise English equivalent in this
    legal setting.
- source_word: הַבְּתוּלֹת
  chosen: for virgins
  alternatives:
  - for virgin daughters
  - of virgins
  lexicon: HALOT
  rationale: Plural noun with article refers generically to the customary rate associated
    with virgins. 'For virgins' communicates the class reference in natural English.
