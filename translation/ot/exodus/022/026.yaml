theological_decisions:
- issue: Rendering of the divine self-description חַנּוּן
  chosen_reading: compassionate
  alternative_readings:
  - gracious
  - merciful
  rationale: The term speaks of God's character as one who responds with favor and
    pity to the vulnerable. In this legal context, 'compassionate' foregrounds the
    ethical force without importing narrower doctrinal terminology. Alternatives remain
    viable lexical options rather than doctrinally distinct readings.
  doctrine_reference: Translation philosophy §6 (readable modern English, not archaic
    or academic)
