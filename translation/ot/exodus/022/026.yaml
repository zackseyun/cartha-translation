id: EXO.22.26
reference: Exodus 22:26
source:
  edition: WLC
  text: כִּ֣י הִ֤וא כסות/ה לְ/בַדָּ֔/הּ הִ֥וא שִׂמְלָת֖/וֹ לְ/עֹר֑/וֹ בַּ/מֶּ֣ה יִשְׁכָּ֔ב
    וְ/הָיָה֙ כִּֽי יִצְעַ֣ק אֵלַ֔/י וְ/שָׁמַעְתִּ֖י כִּֽי חַנּ֥וּן אָֽנִי־־׃ס
translation:
  text: For it is his only covering; it is his cloak for his skin. In what will he
    lie down? And it will be that if he cries out to me, I will hear, for I am compassionate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gracious' or 'merciful' for 'compassionate.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the rationale for the preceding command; 'for' fits the explanatory
    force in context.
- source_word: כְּסוּתוֹ
  chosen: his only covering
  alternatives:
  - his covering alone
  - his sole covering
  lexicon: HALOT
  rationale: כְּסוּת denotes a covering/garment. Combined with לְבַדָּהּ, the sense
    is that this garment is the debtor's only covering.
- source_word: לְבַדָּהּ
  chosen: only
  alternatives:
  - alone
  - by itself
  lexicon: HALOT
  rationale: Adverbial expression meaning 'alone/by itself'; in idiomatic English
    'only' best conveys that no other covering is available.
- source_word: שִׂמְלָתוֹ
  chosen: his cloak
  alternatives:
  - his garment
  - his outer garment
  lexicon: HALOT
  rationale: שִׂמְלָה commonly refers to a mantle/cloak or outer garment. 'Cloak'
    preserves the likely function as a wrap used at night.
- source_word: לְעֹרוֹ
  chosen: for his skin
  alternatives:
  - for his body
  - next to his skin
  lexicon: HALOT
  rationale: עוֹר literally means 'skin.' Retaining 'skin' preserves the concrete
    imagery of the garment serving as bodily covering, though 'body' is a possible
    smoothing alternative.
- source_word: בַּמֶּה יִשְׁכָּב
  chosen: In what will he lie down?
  alternatives:
  - What will he sleep in?
  - With what will he lie down?
  lexicon: HALOT
  rationale: The Hebrew is a rhetorical question about what covering remains for sleeping.
    'Lie down' is closer to שׁכב, while 'in what' reflects the instrumental sense
    of בַּמֶּה.
- source_word: וְהָיָה כִּי
  chosen: And it will be that if
  alternatives:
  - And if
  - Then if
  lexicon: HALOT
  rationale: This construction introduces a future contingency. The fuller rendering
    shows the Hebrew structure, though English could compress it.
- source_word: יִצְעַק אֵלַי
  chosen: he cries out to me
  alternatives:
  - he calls out to me
  lexicon: HALOT
  rationale: צעק conveys a cry for help or distress appeal. 'Cries out' preserves
    the emotional and judicial force.
- source_word: וְשָׁמַעְתִּי
  chosen: I will hear
  alternatives:
  - I will listen
  - I will hear him
  lexicon: HALOT
  rationale: Simple future of שׁמע. 'Hear' is both literal and covenantally resonant
    in contexts of God responding to the oppressed.
- source_word: חַנּוּן
  chosen: compassionate
  alternatives:
  - gracious
  - merciful
  lexicon: HALOT
  rationale: חַנּוּן describes God's gracious, compassionate disposition. 'Compassionate'
    is clear modern English and fits the context of responding to the poor person's
    cry; 'gracious' is traditional but can sound less concrete in this setting.
