id: EXO.22.3
reference: Exodus 22:3
source:
  edition: WLC
  text: אִֽם הִמָּצֵא֩ תִמָּצֵ֨א בְ/יָד֜/וֹ הַ/גְּנֵבָ֗ה מִ/שּׁ֧וֹר עַד חֲמ֛וֹר עַד
    שֶׂ֖ה חַיִּ֑ים שְׁנַ֖יִם יְשַׁלֵּֽם־־־׃ס
translation:
  text: If the stolen item is actually found alive in his possession—whether ox, donkey,
    or sheep—he shall repay double.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'if finding it is found in his hand the stolen property.' The
      Hebrew uses an emphatic verbal construction ('is surely/indeed found') and the
      idiom 'in his hand' for possession.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  lexicon: HALOT
  rationale: Standard conditional particle introducing a case law condition.
- source_word: הִמָּצֵא תִמָּצֵא
  chosen: is actually found
  alternatives:
  - is surely found
  - is indeed found
  - is found
  lexicon: HALOT
  rationale: The infinitive absolute plus finite Niphal of מצא intensifies the verbal
    idea. 'Actually found' captures the emphatic force in natural modern English without
    sounding wooden.
- source_word: בְיָדוֹ
  chosen: in his possession
  alternatives:
  - in his hand
  - with him
  lexicon: HALOT
  rationale: Literally 'in his hand,' but in this legal context the idiom denotes
    possession or control. 'In his possession' communicates the legal sense more clearly
    in English.
- source_word: הַגְּנֵבָה
  chosen: the stolen item
  alternatives:
  - the theft
  - the stolen property
  - the stolen thing
  lexicon: HALOT
  rationale: Although formally 'the stolen thing/property,' English 'the stolen item'
    is concise and clear. 'The theft' could misleadingly suggest the act rather than
    the object stolen.
- source_word: מִשּׁוֹר עַד חֲמוֹר עַד שֶׂה
  chosen: whether ox, donkey, or sheep
  alternatives:
  - from ox to donkey to sheep
  - whether an ox, a donkey, or a sheep
  lexicon: HALOT
  rationale: The sequence specifies representative livestock categories. 'Whether
    ox, donkey, or sheep' renders the distributive legal sense idiomatically.
- source_word: חַיִּים
  chosen: alive
  alternatives:
  - living
  - still alive
  lexicon: HALOT
  rationale: Predicate adjective describing the stolen animal(s) as found alive rather
    than slaughtered or disposed of. 'Alive' is the most natural legal-English rendering.
- source_word: שְׁנַיִם יְשַׁלֵּם
  chosen: he shall repay double
  alternatives:
  - he shall pay twofold
  - he shall make double restitution
  lexicon: HALOT
  rationale: This legal formula indicates double compensation. 'Repay double' is concise,
    natural, and preserves the juridical force.
