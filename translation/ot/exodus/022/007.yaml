id: EXO.22.7
reference: Exodus 22:7
source:
  edition: WLC
  text: אִם לֹ֤א יִמָּצֵא֙ הַ/גַּנָּ֔ב וְ/נִקְרַ֥ב בַּֽעַל הַ/בַּ֖יִת אֶל הָֽ/אֱלֹהִ֑ים
    אִם לֹ֥א שָׁלַ֛ח יָד֖/וֹ בִּ/מְלֶ֥אכֶת רֵעֵֽ/הוּ־־־־׃
translation:
  text: If the thief is not found, the owner of the house shall come near to God to
    determine whether he has not laid his hand on his neighbor’s property.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the judges'; the Hebrew reads 'to God,' but in some legal contexts
      this may refer to judges acting under divine authority.
    reason: alternative_reading
lexical_decisions:
- source_word: יִמָּצֵא הַגַּנָּב
  chosen: the thief is not found
  alternatives:
  - the thief is not discovered
  - the thief is not caught
  lexicon: HALOT
  rationale: 'The Niphal of מצא here is passive/reflexive in legal context: the thief
    is not found/discovered. ''Found'' is the most direct rendering and leaves open
    whether this means identified or apprehended.'
- source_word: וְנִקְרַב
  chosen: shall come near
  alternatives:
  - shall be brought near
  - shall approach
  lexicon: HALOT
  rationale: קרב in the Niphal can be either intransitive ('come near/approach') or
    passive ('be brought near'). Here the legal setting allows either nuance, but
    'shall come near' is clear modern English and preserves the formal sense without
    over-specifying agency.
- source_word: בַּעַל הַבַּיִת
  chosen: the owner of the house
  alternatives:
  - the master of the house
  - the householder
  lexicon: HALOT
  rationale: בעל הבית denotes the person in charge/possession of the house. 'Owner
    of the house' is the clearest modern legal phrasing in this context.
- source_word: אֶל הָאֱלֹהִים
  chosen: to God
  alternatives:
  - before God
  - to the judges
  lexicon: HALOT
  rationale: אֱלֹהִים can in some legal texts be understood as God or as human judges
    acting under divine authority. In keeping with original-language primacy, the
    default rendering is 'God' unless context clearly requires otherwise. The legal
    proceeding is understood as taking place before God, possibly mediated through
    judges; the alternative is preserved in a footnote.
- source_word: אִם לֹא שָׁלַח יָדוֹ
  chosen: whether he has not laid his hand on
  alternatives:
  - whether he has not put his hand to
  - whether he has not stolen
  lexicon: HALOT
  rationale: The idiom 'lay/put the hand on' in this legal context refers to wrongful
    appropriation or misuse. Rendering it idiomatically as 'laid his hand on' preserves
    the Hebrew image while remaining understandable. 'Stolen' is interpretive and
    too narrow for the idiom.
- source_word: בִּמְלֶאכֶת רֵעֵהוּ
  chosen: his neighbor’s property
  alternatives:
  - his neighbor’s goods
  - that which belongs to his neighbor
  - his neighbor’s business
  lexicon: HALOT
  rationale: מְלָאכָה often means work or occupation, but in this legal context after
    entrusting money or goods, it refers broadly to the other person's affairs/property
    entrusted to him. 'Property' best captures the practical sense in English. 'Business'
    is too abstract; 'goods' may be too narrow.
