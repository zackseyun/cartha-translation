theological_decisions:
- issue: Meaning of אֱלֹהִים in this legal setting
  chosen_reading: to God
  alternative_readings:
  - to the judges
  - before the judges
  rationale: The Hebrew text literally reads 'to God.' Because the term can denote
    judges in some covenant-law contexts, that alternative is preserved in a footnote
    rather than resolved silently. The main text keeps the more direct lexical value
    while allowing readers to see the judicial alternative.
  doctrine_reference: Translation philosophy §§1, 3, 5
