id: EXO.22.15
reference: Exodus 22:15
source:
  edition: WLC
  text: וְ/כִֽי יְפַתֶּ֣ה אִ֗ישׁ בְּתוּלָ֛ה אֲשֶׁ֥ר לֹא אֹרָ֖שָׂה וְ/שָׁכַ֣ב עִמָּ֑/הּ
    מָהֹ֛ר יִמְהָרֶ֥/נָּה לּ֖/וֹ לְ/אִשָּֽׁה־־׃
translation:
  text: If a man seduces a virgin who is not engaged, and lies with her, he must surely
    pay the bride-price for her to be his wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who is not betrothed.' The Hebrew refers to a woman not formally pledged
      in marriage.
    reason: lexical_alternative
  - marker: b
    text: Or 'he shall surely pay the marriage-price for her.' The Hebrew refers to
      the mohar, the payment associated with marriage, better rendered 'bride-price'
      than 'dowry' in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְפַתֶּה
  chosen: seduces
  alternatives:
  - entices
  - persuades
  lexicon: HALOT
  rationale: The Piel of פתה here denotes persuading or enticing in a sexual context.
    'Seduces' best captures the context without importing explicit force, which would
    exceed the lexical evidence and conflict with the distinct legal treatment of
    rape elsewhere.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  lexicon: HALOT
  rationale: The Hebrew is singular masculine and refers to an adult male. Per gender-accurate
    policy, 'a man' matches the source better than a gender-neutral substitute.
- source_word: בְּתוּלָה
  chosen: a virgin
  alternatives:
  - a young woman
  lexicon: HALOT
  rationale: בְּתוּלָה ordinarily denotes a virgin in legal and social contexts like
    this one. 'Virgin' preserves the specific marital/sexual status relevant to the
    law.
- source_word: אֲשֶׁר לֹא אֹרָשָׂה
  chosen: who is not engaged
  alternatives:
  - who is not betrothed
  - who is not pledged to be married
  lexicon: HALOT
  rationale: The passive participial form indicates a woman not formally betrothed.
    'Engaged' is readable modern English; 'betrothed' is more formal and culturally
    precise, so it is preserved as an alternative.
- source_word: וְשָׁכַב עִמָּהּ
  chosen: and lies with her
  alternatives:
  - and sleeps with her
  - and has sexual relations with her
  lexicon: HALOT
  rationale: שׁכב with עִם is a standard idiom for sexual intercourse. 'Lies with
    her' is a clear, dignified rendering that stays close to the Hebrew wording.
- source_word: מָהֹר יִמְהָרֶנָּה
  chosen: he must surely pay the bride-price
  alternatives:
  - he shall surely pay the marriage-price
  - he must pay the dowry
  lexicon: HALOT
  rationale: 'The infinitive absolute plus imperfect intensifies the obligation: ''must
    surely pay.'' The verb מהר in this stem refers to paying the mohar, the marriage
    or bride-price. ''Bride-price'' is more precise than ''dowry,'' which in English
    often suggests property brought by the bride rather than payment made by the groom
    or his family.'
- source_word: לּוֹ לְאִשָּׁה
  chosen: for her to be his wife
  alternatives:
  - to him as a wife
  - as his wife
  lexicon: HALOT
  rationale: The phrase expresses the legal-marital result of the payment. 'For her
    to be his wife' makes the English relation explicit and natural while preserving
    the Hebrew sense.
