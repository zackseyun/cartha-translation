theological_decisions:
- issue: Nature of the sexual act described by פתה in this law
  chosen_reading: consensual seduction rather than forcible rape
  alternative_readings:
  - rape/violation
  rationale: The lexical choice 'seduces' reflects the ordinary sense of פתה in the
    Piel and avoids importing coercion not stated in this verse. This preserves the
    distinction between this case law and other laws addressing forcible sexual assault.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it'
