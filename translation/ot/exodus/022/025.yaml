id: EXO.22.25
reference: Exodus 22:25
source:
  edition: WLC
  text: אִם חָבֹ֥ל תַּחְבֹּ֖ל שַׂלְמַ֣ת רֵעֶ֑/ךָ עַד בֹּ֥א הַ/שֶּׁ֖מֶשׁ תְּשִׁיבֶ֥/נּוּ
    לֽ/וֹ־־׃
translation:
  text: If you take your neighbor’s cloak as a pledge, you shall return it to him
    before the sun sets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'garment' or 'outer garment' for 'cloak.' The Hebrew term refers specifically
      to an outer covering that could serve as protection at night.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'until the coming of the sun'; that is, by sunset.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a conditional/casuistic law. 'If' is the most direct rendering
    in English law style, though 'when' is possible in case-law contexts.
- source_word: חָבֹל תַּחְבֹּל
  chosen: you take ... as a pledge
  alternatives:
  - you surely take in pledge
  - you take as collateral
  lexicon: HALOT
  rationale: The infinitive absolute + imperfect intensifies the verbal idea of taking
    a pledge. English does not naturally preserve the duplication, so 'take ... as
    a pledge' conveys the legal action clearly. 'Collateral' is possible but more
    modern/technical; 'pledge' better matches biblical legal diction.
- source_word: שַׂלְמַת
  chosen: cloak
  alternatives:
  - garment
  - outer garment
  lexicon: HALOT
  rationale: Refers to a mantle/cloak used as an outer garment, not merely any clothing
    item. 'Cloak' is specific and readable, and fits the humanitarian rationale in
    the following verse.
- source_word: רֵעֶךָ
  chosen: your neighbor’s
  alternatives:
  - your fellow’s
  - your companion’s
  lexicon: HALOT
  rationale: '''Neighbor'' is the most natural English equivalent for רֵעַ in covenantal/social
    law contexts and preserves the interpersonal ethical force.'
- source_word: עַד בֹּא הַשֶּׁמֶשׁ
  chosen: before the sun sets
  alternatives:
  - by sunset
  - until the sun comes in/goes down
  lexicon: HALOT
  rationale: Literally 'until the coming of the sun,' an idiom for sunset in context.
    'Before the sun sets' expresses the temporal requirement in natural English.
- source_word: תְּשִׁיבֶנּוּ לוֹ
  chosen: you shall return it to him
  alternatives:
  - you must restore it to him
  lexicon: HALOT
  rationale: Hiphil of שוב means to cause to return/restore. 'Return it to him' is
    straightforward and idiomatic in English legal instruction.
