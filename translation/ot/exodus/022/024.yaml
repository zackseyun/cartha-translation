theological_decisions:
- issue: Gendered reference in הֶעָנִי
  chosen_reading: the poor man
  alternative_readings:
  - the poor person
  rationale: The Hebrew is grammatically masculine singular and refers to an individual
    within the community. Following the stated gender-accurate policy, the masculine
    form is retained rather than neutralized.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Legal force of אִם in casuistic law
  chosen_reading: If you lend
  alternative_readings:
  - When you lend
  rationale: Hebrew legal casuistic style often uses 'if' for case law. Retaining
    'if' preserves the source form while still functioning naturally in English law-like
    discourse.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
