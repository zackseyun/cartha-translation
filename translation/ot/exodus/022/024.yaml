id: EXO.22.24
reference: Exodus 22:24
source:
  edition: WLC
  text: אִם כֶּ֣סֶף תַּלְוֶ֣ה אֶת עַמִּ֗/י אֶת הֶֽ/עָנִי֙ עִמָּ֔/ךְ לֹא תִהְיֶ֥ה ל֖/וֹ
    כְּ/נֹשֶׁ֑ה לֹֽא תְשִׂימ֥וּ/ן עָלָ֖י/ו נֶֽשֶׁךְ־׀־־־־׃
translation:
  text: If you lend money to my people, to the poor man among you, you shall not be
    to him like a creditor; you shall not impose interest on him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'When you lend money to my people.' The Hebrew uses a conditional form
      common in case law.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'silver'; here meaning money.
    reason: lexical_alternative
  - marker: c
    text: Or 'you shall not charge him interest.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Formally the conditional particle means 'if.' In covenant law this can
    function casuistically ('if/when'), but 'if' preserves the Hebrew form without
    obscuring the legal sense.
- source_word: כֶּסֶף
  chosen: money
  alternatives:
  - silver
  lexicon: HALOT
  rationale: Although literally 'silver,' in legal/economic contexts it commonly denotes
    money. 'Money' communicates the plain sense in contemporary English.
- source_word: תַּלְוֶה
  chosen: lend
  alternatives:
  - make a loan
  lexicon: HALOT
  rationale: Hiphil of לוה here means to lend. 'Lend' is the most natural and sufficiently
    formal English equivalent.
- source_word: עַמִּי
  chosen: my people
  alternatives:
  - my people Israel
  lexicon: HALOT
  rationale: The suffix marks first person singular, 'my people.' The broader context
    identifies Israel, but the verse itself says only 'my people,' which should be
    preserved.
- source_word: הֶעָנִי
  chosen: the poor man
  alternatives:
  - the poor person
  - the needy man
  lexicon: HALOT
  rationale: The adjective/substantive is masculine singular, referring to a poor
    individual. Per gender-accurate policy, 'poor man' better reflects the source
    form than a gender-neutral rendering.
- source_word: עִמָּךְ
  chosen: among you
  alternatives:
  - with you
  - beside you
  lexicon: HALOT
  rationale: Literally 'with you' (2fs), but in English legal style 'among you' best
    conveys membership within the covenant community in this context.
- source_word: כְּנֹשֶׁה
  chosen: like a creditor
  alternatives:
  - like an exactor
  - like one who presses for payment
  lexicon: HALOT
  rationale: נשה in this participial form denotes a creditor, especially one pressing
    a debt. 'Like a creditor' is clear and fits the prohibition's social-ethical force.
- source_word: תְשִׂימוּן
  chosen: impose
  alternatives:
  - put
  - charge
  lexicon: HALOT
  rationale: Literally 'put/set,' but with עַל plus נֶשֶׁךְ the idiom means to place
    or charge interest upon someone. 'Impose' captures the idiomatic force while remaining
    close to the source.
- source_word: נֶשֶׁךְ
  chosen: interest
  alternatives:
  - usury
  lexicon: HALOT
  rationale: The term denotes interest on a loan. 'Usury' in older English can imply
    only excessive interest, whereas the Hebrew here prohibits charging interest in
    this case generally; therefore 'interest' is more accurate for modern readers.
