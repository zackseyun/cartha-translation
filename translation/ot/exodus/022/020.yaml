theological_decisions:
- issue: Rendering of singular masculine references generically
  chosen_reading: Retain singular 'a foreigner' and the corresponding pronoun 'him.'
  alternative_readings:
  - Use plural 'foreigners ... them' for generic English
  - Use singular 'them'
  rationale: The Hebrew uses singular גֵר with a 3ms suffix, functioning generically
    in legal style. Per the doctrine's gender-accurate principle, the translation
    preserves the source's singular masculine form rather than smoothing it into plural
    or singular 'them.'
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
