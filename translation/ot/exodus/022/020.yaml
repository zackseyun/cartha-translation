id: EXO.22.20
reference: Exodus 22:20
source:
  edition: WLC
  text: וְ/גֵ֥ר לֹא תוֹנֶ֖ה וְ/לֹ֣א תִלְחָצֶ֑/נּוּ כִּֽי גֵרִ֥ים הֱיִיתֶ֖ם בְּ/אֶ֥רֶץ
    מִצְרָֽיִם־־׃
translation:
  text: You shall not mistreat a foreigner or oppress him, for you were foreigners
    in the land of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sojourner' or 'resident alien.' The Hebrew גֵר refers to a non-native
      person living among Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: גֵר
  chosen: foreigner
  alternatives:
  - sojourner
  - resident alien
  - stranger
  lexicon: HALOT
  rationale: גֵר denotes a non-native person residing among Israel, not merely a passing
    stranger. 'Foreigner' is clear modern English and fits optimal equivalence better
    than the more technical 'resident alien' or the potentially archaic/misleading
    'sojourner.'
- source_word: תוֹנֶה
  chosen: mistreat
  alternatives:
  - wrong
  - exploit
  - do wrong to
  lexicon: HALOT
  rationale: From ינה in the Hiphil, the sense is to treat unfairly or wrongfully.
    'Mistreat' captures broad unjust treatment without narrowing the action too specifically
    to economic exploitation alone.
- source_word: תִלְחָצֶנּוּ
  chosen: oppress him
  alternatives:
  - press him
  - afflict him
  - take advantage of him
  lexicon: HALOT
  rationale: לחץ commonly conveys oppression or harsh pressure. 'Oppress him' is the
    most natural and weighty English equivalent in this legal context; the 3ms suffix
    is represented by 'him,' matching the singular גֵר.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the rationale for the command. 'For' preserves the legal-explanatory
    tone of the Hebrew succinctly.
- source_word: גֵרִים
  chosen: foreigners
  alternatives:
  - sojourners
  - resident aliens
  - strangers
  lexicon: HALOT
  rationale: The plural repeats the key term from the first clause, so the English
    should preserve lexical consistency. 'Foreigners' maintains that repetition naturally.
- source_word: הֱיִיתֶם
  chosen: you were
  alternatives:
  - you became
  lexicon: HALOT
  rationale: The verb היה here states Israel's past condition in Egypt. 'You were'
    is the straightforward idiomatic rendering.
- source_word: בְּאֶרֶץ מִצְרָיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'land,' and retaining it preserves the
    formal texture of the legal reminder without sounding unnatural in English.
