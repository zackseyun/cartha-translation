theological_decisions:
- issue: Rendering of the penalty term חרם in a law against idolatrous sacrifice
  chosen_reading: shall be devoted to destruction
  alternative_readings:
  - shall be utterly destroyed
  - shall be put under the ban
  rationale: The Hebrew expresses more than mere execution; it invokes the concept
    of being placed under חרם, a ban of total consecration to destruction. The chosen
    rendering preserves that theological-legal weight without archaic jargon in the
    main text.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
