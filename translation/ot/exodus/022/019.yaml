id: EXO.22.19
reference: Exodus 22:19
source:
  edition: WLC
  text: זֹבֵ֥חַ לָ/אֱלֹהִ֖ים יָֽחֳרָ֑ם בִּלְתִּ֥י לַ/יהוָ֖ה לְ/בַדּֽ/וֹ׃
translation:
  text: Whoever sacrifices to any god, except to the LORD alone, shall be devoted
    to destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'shall be put under the ban' or 'shall be utterly destroyed.' The Hebrew
      verb carries the idea of being devoted irrevocably to destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹבֵחַ
  chosen: Whoever sacrifices
  alternatives:
  - He who sacrifices
  - One who sacrifices
  lexicon: HALOT
  rationale: Qal participle used substantivally; English idiom is best conveyed by
    an indefinite relative construction. 'Sacrifices' preserves the cultic sense of
    offering by slaughter rather than a broader 'offers.'
- source_word: לָאֱלֹהִים
  chosen: to any god
  alternatives:
  - to gods
  - to a god
  - to God/gods
  lexicon: HALOT
  rationale: Though אֱלֹהִים is morphologically plural, in this context with the preposition
    and the prohibition of idolatrous sacrifice it refers generically to any deity
    other than YHWH. 'Any god' communicates the distributive force naturally in English
    and avoids implying legitimate plurality.
- source_word: יָחֳרָם
  chosen: shall be devoted to destruction
  alternatives:
  - shall be utterly destroyed
  - shall be put under the ban
  - shall be devoted
  lexicon: HALOT
  rationale: Hophil of חרם denotes being placed under the ban, devoted irrevocably
    to destruction. 'Devoted to destruction' preserves both the consecratory and punitive
    force better than the flatter 'destroyed' while remaining readable modern English.
- source_word: בִּלְתִּי
  chosen: except
  alternatives:
  - unless
  - save
  lexicon: HALOT
  rationale: Here בִּלְתִּי introduces an exception clause. 'Except' is the clearest
    modern English equivalent.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
    The preposition is retained with the sacrificial verb.
- source_word: לְבַדּוֹ
  chosen: alone
  alternatives:
  - by himself
  - only
  lexicon: HALOT
  rationale: 'The adverbial sense is exclusivity: sacrifice is permitted only to YHWH.
    ''Alone'' reads naturally after ''the LORD'' and preserves the exclusive force.'
