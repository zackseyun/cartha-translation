id: EXO.22.12
reference: Exodus 22:12
source:
  edition: WLC
  text: אִם טָרֹ֥ף יִטָּרֵ֖ף יְבִאֵ֣/הוּ עֵ֑ד הַ/טְּרֵפָ֖ה לֹ֥א יְשַׁלֵּֽם־׃פ
translation:
  text: But if it is truly torn by beasts, he shall bring it as evidence; he shall
    not make restitution for what was torn.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'If it is indeed torn to pieces, he shall bring the torn animal as evidence;
      he shall not repay.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: But if
  alternatives:
  - If
  lexicon: HALOT
  rationale: Introduces a conditional case in this legal sequence. 'But if' fits the
    casuistic flow from the preceding verse, marking contrast with the prior condition.
- source_word: טָרֹף יִטָּרֵף
  chosen: it is truly torn by beasts
  alternatives:
  - it is torn to pieces
  - it is indeed torn
  - it is surely preyed upon
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verbal idea,
    so 'truly'/'indeed' reflects the emphasis. Because טרף in this stem commonly refers
    to being torn by an animal, 'torn by beasts' makes the legal scenario explicit
    without over-paraphrasing.
- source_word: יְבִאֵהוּ
  chosen: he shall bring it
  alternatives:
  - he must bring it
  - let him bring it
  lexicon: HALOT
  rationale: Hiphil of בוא here means to bring/present. The 3ms suffix most naturally
    refers to the torn remains or the matter at hand as evidence before the owner/judicial
    party.
- source_word: עֵד
  chosen: as evidence
  alternatives:
  - for evidence
  - as witness
  - a witness
  lexicon: HALOT
  rationale: Although the noun literally means 'witness/testimony,' in this context
    of presenting remains, 'as evidence' best conveys the forensic function in natural
    English. 'A witness' would sound as though a person is being produced rather than
    physical proof.
- source_word: הַטְּרֵפָה
  chosen: what was torn
  alternatives:
  - the torn carcass
  - the torn animal
  - the prey
  lexicon: HALOT
  rationale: The noun denotes that which has been torn, likely the animal/remains.
    'What was torn' preserves the Hebrew's compactness and avoids specifying more
    than the text states, while still making sense in English legal style.
- source_word: לֹא יְשַׁלֵּם
  chosen: he shall not make restitution
  alternatives:
  - he shall not repay
  - he shall not pay for it
  lexicon: HALOT
  rationale: In covenant law contexts, שלם in the Piel commonly means to make compensation/restitution.
    'Make restitution' captures the legal nuance better than the more generic 'pay'.
