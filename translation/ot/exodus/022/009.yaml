id: EXO.22.9
reference: Exodus 22:9
source:
  edition: WLC
  text: כִּֽי יִתֵּן֩ אִ֨ישׁ אֶל רֵעֵ֜/הוּ חֲמ֨וֹר אוֹ שׁ֥וֹר אוֹ שֶׂ֛ה וְ/כָל בְּהֵמָ֖ה
    לִ/שְׁמֹ֑ר וּ/מֵ֛ת אוֹ נִשְׁבַּ֥ר אוֹ נִשְׁבָּ֖ה אֵ֥ין רֹאֶֽה־־־־־־־׃
translation:
  text: If a man gives his neighbor a donkey, or an ox, or a sheep, or any animal
    to keep, and it dies, or is injured, or is carried off, with no one seeing it,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a sheep or a goat'; the Hebrew שֶׂה can refer more broadly to one of
      the flock.
    reason: lexical_alternative
  - marker: b
    text: Literally 'is broken.'
    reason: lexical_alternative
  - marker: c
    text: That is, there is no eyewitness to what happened.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a casuistic law condition. English 'If' is the most natural
    legal conditional here, though 'When' is also possible in case-law style.
- source_word: יִתֵּן
  chosen: gives
  alternatives:
  - entrusts
  lexicon: HALOT
  rationale: The verb נתן is broadly 'give.' In this legal context it implies entrusting
    property to another, but 'gives' keeps closer to the Hebrew while the purpose
    phrase 'to keep' supplies the custodial sense.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  lexicon: HALOT
  rationale: Gender-accurate rendering follows the stated philosophy. In casuistic
    law אִישׁ often has representative force, but the Hebrew is singular masculine,
    so 'a man' is retained rather than neutralizing to 'someone'.
- source_word: אֶל רֵעֵהוּ
  chosen: his neighbor
  alternatives:
  - his companion
  - his fellow
  lexicon: HALOT
  rationale: רֵעַ commonly denotes a fellow person in social proximity. 'Neighbor'
    is idiomatic and standard in legal/moral contexts without overstating intimacy.
- source_word: חֲמוֹר
  chosen: donkey
  alternatives:
  - ass
  lexicon: HALOT
  rationale: '''Donkey'' is the clear modern English equivalent; ''ass'' is archaic/ambiguous
    in contemporary usage.'
- source_word: שׁוֹר
  chosen: ox
  alternatives:
  - bull
  - cattle
  lexicon: HALOT
  rationale: In legal livestock contexts שׁוֹר is conventionally and accurately rendered
    'ox,' a standard English term for bovine working/owned animal in such laws.
- source_word: שֶׂה
  chosen: sheep
  alternatives:
  - small livestock
  - lamb/goat
  lexicon: HALOT
  rationale: שֶׂה can denote one of the flock, sheep or goat depending on context.
    Here, because it is listed among examples before the broader 'any animal,' 'sheep'
    is a natural specific rendering, while the broader possibility is preserved in
    a footnote.
- source_word: וְכָל בְּהֵמָה
  chosen: or any animal
  alternatives:
  - or any livestock
  - or any beast
  lexicon: HALOT
  rationale: בְּהֵמָה here refers to domesticated animal property generally. 'Any
    animal' is readable modern English; 'livestock' is possible but slightly narrower
    and more technical.
- source_word: לִשְׁמֹר
  chosen: to keep
  alternatives:
  - to guard
  - to watch
  lexicon: HALOT
  rationale: The infinitive expresses the purpose of entrusting the animal. 'To keep'
    is idiomatic for property left in another's care and fits the legal register.
- source_word: וּמֵת
  chosen: and it dies
  alternatives:
  - and it dies thereupon
  lexicon: HALOT
  rationale: Simple sequential rendering of the perfect verb in the case description.
- source_word: נִשְׁבַּר
  chosen: is injured
  alternatives:
  - is hurt
  - is broken
  lexicon: HALOT
  rationale: The Niphal of שׁבר is literally 'is broken.' For an animal, idiomatic
    English is 'is injured,' which conveys bodily harm without the awkwardness of
    'is broken.' The more literal alternative is preserved in a footnote.
- source_word: נִשְׁבָּה
  chosen: is carried off
  alternatives:
  - is driven away
  - is stolen
  - is captured
  lexicon: HALOT
  rationale: The verb שׁבה in Niphal commonly means 'is taken captive/carried off.'
    In this livestock setting it likely refers to seizure by raiders or thieves, broader
    than simple 'stolen,' so 'is carried off' best preserves the sense.
- source_word: אֵין רֹאֶה
  chosen: with no one seeing it
  alternatives:
  - and there is no witness
  - with no eyewitness
  lexicon: HALOT
  rationale: Literally 'there is no one seeing.' The phrase indicates absence of witnesses
    to the loss. 'With no one seeing it' is close to the Hebrew and natural in English.
