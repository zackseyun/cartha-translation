id: EXO.22.13
reference: Exodus 22:13
source:
  edition: WLC
  text: וְ/כִֽי יִשְׁאַ֥ל אִ֛ישׁ מֵ/עִ֥ם רֵעֵ֖/הוּ וְ/נִשְׁבַּ֣ר אוֹ מֵ֑ת בְּעָלָ֥י/ו
    אֵין עִמּ֖/וֹ שַׁלֵּ֥ם יְשַׁלֵּֽם־־־׃
translation:
  text: And if a man borrows from his neighbor, and it is injured or dies, if its
    owner is not with it, he must surely make restitution.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'it is broken.' The Hebrew can refer either to damage
      to a borrowed item or injury to a borrowed animal.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'he shall surely pay'; that is, he must make full restitution.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  chosen: And if
  alternatives:
  - If
  - Now if
  lexicon: HALOT
  rationale: Introduces a conditional case within the legal collection. 'And if' preserves
    the connective force of ו while remaining natural in English law-style discourse.
- source_word: יִשְׁאַל
  chosen: borrows
  alternatives:
  - asks for
  - requests
  lexicon: HALOT
  rationale: In this legal context the verb refers to borrowing an item from another
    person, not merely asking a question or making a request. 'Borrows' best captures
    the transactional sense.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular used generically in case
    law. Per translation philosophy, gender-accurate wording is retained rather than
    neutralized.
- source_word: מֵעִם רֵעֵהוּ
  chosen: from his neighbor
  alternatives:
  - from his friend
  - from his companion
  lexicon: HALOT
  rationale: רֵעַ can mean friend, companion, or neighbor. In covenant law contexts
    involving fellow community members, 'neighbor' is the most idiomatic and legally
    recognizable English rendering.
- source_word: וְנִשְׁבַּר
  chosen: it is injured
  alternatives:
  - it is broken
  - it is hurt
  lexicon: HALOT
  rationale: The passive verb literally means 'is broken,' but because the borrowed
    object here may be an animal, 'injured' better covers the likely legal sense without
    sounding mechanically object-only. This also pairs naturally with 'or dies.'
- source_word: אוֹ מֵת
  chosen: or dies
  alternatives:
  - or is dead
  lexicon: HALOT
  rationale: Simple verbal rendering preserves the legal condition affecting the borrowed
    animal or item.
- source_word: בְּעָלָיו
  chosen: its owner
  alternatives:
  - the owner
  - its master
  lexicon: HALOT
  rationale: Though morphologically plural in form, the noun functions idiomatically
    for a singular owner here. 'Its owner' clarifies the relation to the borrowed
    item/animal.
- source_word: אֵין עִמּוֹ
  chosen: is not with it
  alternatives:
  - is not with him
  - is absent
  lexicon: HALOT
  rationale: 'The pronominal reference is contextually to the borrowed item/animal:
    if the owner was not present with it, the borrower bears liability. ''With it''
    makes the legal condition explicit in English.'
- source_word: שַׁלֵּם יְשַׁלֵּם
  chosen: he must surely make restitution
  alternatives:
  - he shall surely pay
  - he must pay in full
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the obligation.
    'Must surely make restitution' conveys both certainty and the legal sense of compensatory
    payment better than a bare 'pay'.
