theological_decisions:
- issue: Referent of אֱלֹהִים
  chosen_reading: God
  alternative_readings:
  - gods
  - judges
  rationale: The immediate legal context and the parallelism with 'a ruler among your
    people' favor reading אֱלֹהִים as a reference to God rather than pagan gods or
    human judges. Since 'judges' has a notable history in interpretation and translation,
    it is preserved in a footnote rather than adopted in the main text.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it, with alternatives in footnotes where warranted)
