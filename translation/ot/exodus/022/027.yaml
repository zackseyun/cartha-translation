id: EXO.22.27
reference: Exodus 22:27
source:
  edition: WLC
  text: אֱלֹהִ֖ים לֹ֣א תְקַלֵּ֑ל וְ/נָשִׂ֥יא בְ/עַמְּ/ךָ֖ לֹ֥א תָאֹֽר׃
translation:
  text: You shall not revile God, nor curse a ruler among your people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'judges'; אֱלֹהִים can in some contexts refer to human authorities, though
      'God' best fits the parallelism here.
    reason: alternative_reading
lexical_decisions:
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - gods
  - judges
  lexicon: HALOT, BDB
  rationale: Although אֱלֹהִים can denote 'gods' or, in some contexts, human authorities/judges,
    the singular sense 'God' best fits the legal prohibition here and aligns with
    the parallel prohibition against cursing a human ruler. The verse thus forbids
    speaking abusively against God and against a leader. Because 'judges' is a historically
    significant alternative, it is preserved in a footnote.
- source_word: תְקַלֵּל
  chosen: revile
  alternatives:
  - curse
  - treat with contempt
  lexicon: HALOT, BDB
  rationale: From קלל in the Piel, the verb can mean to curse, dishonor, or treat
    lightly. 'Revile' captures abusive speech without collapsing it into the second
    clause's more direct 'curse,' preserving the rhetorical distinction between the
    two verbs.
- source_word: נָשִׂיא
  chosen: a ruler
  alternatives:
  - leader
  - prince
  - chief
  lexicon: HALOT, BDB
  rationale: נָשִׂיא denotes one lifted up as a leader or chief. 'Ruler' is natural
    modern English in a legal context and preserves the authority implied by the Hebrew
    better than the narrower or more archaic 'prince.'
- source_word: בְעַמְּךָ
  chosen: among your people
  alternatives:
  - of your people
  lexicon: HALOT, BDB
  rationale: The preposition ב can be rendered idiomatically here as 'among,' indicating
    a ruler within the covenant community. 'Of your people' is also possible, but
    'among your people' reads more naturally in English while preserving the sense.
- source_word: תָאֹר
  chosen: curse
  alternatives:
  - execrate
  lexicon: HALOT, BDB
  rationale: From ארר, this is the standard verb for cursing. 'Curse' is the clear
    and natural English equivalent.
