id: EXO.22.23
reference: Exodus 22:23
source:
  edition: WLC
  text: וְ/חָרָ֣ה אַפִּ֔/י וְ/הָרַגְתִּ֥י אֶתְ/כֶ֖ם בֶּ/חָ֑רֶב וְ/הָי֤וּ נְשֵׁי/כֶם֙
    אַלְמָנ֔וֹת וּ/בְנֵי/כֶ֖ם יְתֹמִֽים׃פ
translation:
  text: then my anger will burn, and I will kill you with the sword, and your wives
    will become widows and your sons fatherless.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the sword.'
    reason: lexical_alternative
  - marker: b
    text: Or 'orphans'; Hebrew more specifically denotes those left fatherless.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחָרָה
  chosen: will burn
  alternatives:
  - will be kindled
  - will grow hot
  lexicon: HALOT
  rationale: The verb חרה with אַף is an idiom for anger flaring up. 'Will burn' preserves
    the metaphor naturally in English without becoming wooden.
- source_word: אַפִּי
  chosen: my anger
  alternatives:
  - my nose
  - my wrath
  lexicon: HALOT
  rationale: Although literally 'my nose,' in this idiom it denotes anger. 'My anger'
    communicates the sense directly; 'my wrath' is possible but slightly more elevated
    than the surrounding style.
- source_word: וְהָרַגְתִּי
  chosen: I will kill
  alternatives:
  - I will slay
  lexicon: HALOT
  rationale: הרג is the ordinary verb 'kill/slay.' 'Kill' is the clearest modern equivalent;
    'slay' is more traditional but archaic in tone.
- source_word: אֶתְכֶם
  chosen: you
  rationale: Direct object marker plus 2mp suffix; rendered simply as the English
    object pronoun.
- source_word: בֶּחָרֶב
  chosen: with the sword
  alternatives:
  - by the sword
  lexicon: HALOT
  rationale: The preposition ב plus חֶרֶב marks instrument or means. 'With the sword'
    is a natural English rendering and preserves the concrete image of violent judgment.
- source_word: וְהָיוּ
  chosen: will become
  alternatives:
  - will be
  lexicon: HALOT
  rationale: In context היה indicates resulting state after the judgment. 'Will become'
    makes the consequential force explicit in idiomatic English.
- source_word: נְשֵׁיכֶם
  chosen: your wives
  alternatives:
  - your women
  lexicon: HALOT
  rationale: In this possessive familial context, 'wives' is the clear sense, not
    the broader 'women.'
- source_word: אַלְמָנוֹת
  chosen: widows
  lexicon: HALOT
  rationale: Standard rendering of the noun for women bereaved of husbands.
- source_word: וּבְנֵיכֶם
  chosen: your sons
  alternatives:
  - your children
  lexicon: HALOT
  rationale: The Hebrew specifically says 'your sons,' not a gender-neutral term for
    children. This follows the gender-accurate principle.
- source_word: יְתֹמִים
  chosen: fatherless
  alternatives:
  - orphans
  lexicon: HALOT
  rationale: יָתוֹם often denotes one deprived of a father, especially in legal and
    social vulnerability contexts. 'Fatherless' preserves the specific social condition
    created by the men's death better than the broader 'orphans'.
