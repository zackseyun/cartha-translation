theological_decisions:
- issue: Anthropomorphic expression for divine anger
  chosen_reading: Rendered the idiom as 'my anger will burn' rather than a literal
    body-part expression.
  alternative_readings:
  - my nose will burn
  - my wrath will be kindled
  rationale: The Hebrew uses anthropomorphic idiom, but a literal rendering would
    obscure meaning in English. The translation preserves the force of divine judgment
    without flattening the metaphor entirely.
  doctrine_reference: Translation philosophy §6 (readable modern English) and §1 (original-language
    primacy).
- issue: Gender-specific filial term
  chosen_reading: Retained 'your sons' in the main text.
  alternative_readings:
  - your children
  rationale: The source text uses a specifically male term. Per the gender-accurate
    principle, the translation should not neutralize it unless context demands it,
    which it does not here.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral).
