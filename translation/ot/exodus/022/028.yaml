id: EXO.22.28
reference: Exodus 22:28
source:
  edition: WLC
  text: מְלֵאָתְ/ךָ֥ וְ/דִמְעֲ/ךָ֖ לֹ֣א תְאַחֵ֑ר בְּכ֥וֹר בָּנֶ֖י/ךָ תִּתֶּן לִּֽ/י־׃
translation:
  text: You shall not delay the fullness of your harvest and the outflow of your press.
    You shall give to me the firstborn of your sons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your full produce and your juice/wine.' The Hebrew terms likely refer
      to harvested produce and pressed liquid produce; the exact agricultural pairing
      may be grain and wine, or more generally solid and liquid yield.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְלֵאָתְךָ
  chosen: the fullness of your harvest
  alternatives:
  - your full produce
  - your abundance
  - your fullness
  lexicon: HALOT
  rationale: מְלֵאָה literally denotes fullness or full yield. In this legal context
    it refers to the produce owed from the harvest. 'The fullness of your harvest'
    keeps the concrete agricultural sense while making clear that produce, not abstract
    fullness, is intended.
- source_word: וְדִמְעֲךָ
  chosen: the outflow of your press
  alternatives:
  - your juice
  - your wine
  - your vintage
  - your tears
  lexicon: HALOT
  rationale: Though the noun can literally mean 'tear,' in agricultural/legal contexts
    it idiomatically refers to liquid produce, especially wine or oil from a press.
    'The outflow of your press' preserves the image without over-specifying whether
    wine or oil is meant. 'Tears' would be misleading here.
- source_word: לֹא תְאַחֵר
  chosen: You shall not delay
  alternatives:
  - you shall not hold back
  - you shall not postpone
  lexicon: HALOT
  rationale: The verb אחר in the piel here means to delay or postpone. 'You shall
    not delay' is direct, idiomatic, and fits the legal prohibition against withholding
    due offerings.
- source_word: בְּכוֹר
  chosen: the firstborn
  alternatives:
  - firstborn male
  lexicon: HALOT
  rationale: בכור denotes the firstborn offspring. 'The firstborn' is the standard
    and sufficiently precise rendering here; the male sense is inherent in the legal
    category and reinforced by the following phrase about sons.
- source_word: בָּנֶיךָ
  chosen: of your sons
  alternatives:
  - of your children
  lexicon: HALOT
  rationale: The Hebrew is specifically 'your sons,' not a gender-neutral term for
    children. Following the project's gender-accurate principle, the masculine form
    is retained.
- source_word: תִּתֶּן לִּי
  chosen: You shall give to me
  alternatives:
  - you shall give me
  - you must give to me
  lexicon: HALOT
  rationale: The clause is a straightforward legal requirement. 'You shall give to
    me' preserves the formal force and the emphasis on the recipient, while remaining
    natural English.
