theological_decisions:
- issue: Meaning of the agricultural pair מְלֵאָה / דִמְעָה in a law about offerings
  chosen_reading: The verse commands prompt offering of both solid produce and liquid
    produce, followed by dedication of the firstborn son.
  alternative_readings:
  - The terms refer specifically to grain and wine
  - The terms refer to firstfruits in a broader sense without distinguishing types
  rationale: The Hebrew likely pairs harvested produce with expressed liquid produce.
    The translation avoids narrowing the second term to wine alone, since the Hebrew
    image is broader, while still reflecting that the law concerns due offerings to
    God.
- issue: Rendering of בָּנֶיךָ
  chosen_reading: sons
  alternative_readings:
  - children
  rationale: No doctrinal issue is at stake, but the translation follows the stated
    gender-accurate principle by preserving the masculine term rather than neutralizing
    it.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
