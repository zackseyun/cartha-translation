theological_decisions:
- issue: Meaning of אֱלֹהִים in this legal context
  chosen_reading: God
  alternative_readings:
  - the judges
  - the court
  rationale: The Hebrew form is literally 'God/gods,' and in covenant law may denote
    God directly or judges as his representatives. Following the translation philosophy's
    priority of source-language plain sense, the main text keeps 'God.' Because the
    legal-institutional sense is a longstanding and plausible interpretation, it is
    preserved in a footnote rather than resolved away.
  doctrine_reference: Translation philosophy §1, §3
