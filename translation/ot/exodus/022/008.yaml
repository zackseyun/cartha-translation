id: EXO.22.8
reference: Exodus 22:8
source:
  edition: WLC
  text: עַֽל כָּל דְּבַר פֶּ֡שַׁע עַל שׁ֡וֹר עַל חֲ֠מוֹר עַל שֶׂ֨ה עַל שַׂלְמָ֜ה עַל
    כָּל אֲבֵדָ֗ה אֲשֶׁ֤ר יֹאמַר֙ כִּי ה֣וּא זֶ֔ה עַ֚ד הָֽ/אֱלֹהִ֔ים יָבֹ֖א דְּבַר
    שְׁנֵי/הֶ֑ם אֲשֶׁ֤ר יַרְשִׁיעֻ/ן֙ אֱלֹהִ֔ים יְשַׁלֵּ֥ם שְׁנַ֖יִם לְ/רֵעֵֽ/הוּ־־־־־־־־־־־׃ס
translation:
  text: For every case of wrongdoing involving an ox, a donkey, a sheep, a garment,
    or any lost thing about which someone says, ‘This is it,’ the case of both parties
    shall come before God. The one whom God declares guilty shall pay double to his
    neighbor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “before the judges” / “before the court”; Hebrew אֱלֹהִים can refer to
      God directly or to human judges acting under divine authority in legal settings.
    reason: alternative_reading
  - marker: b
    text: Hebrew שֶׂה is a broader term for small livestock and can refer to a sheep
      or a goat.
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּבַר פֶּשַׁע
  chosen: case of wrongdoing
  alternatives:
  - matter of transgression
  - case of offense
  - disputed case of fraud
  lexicon: HALOT
  rationale: דָּבָר here means a matter/case, and פֶּשַׁע denotes wrongdoing or transgression.
    In this legal context, 'case of wrongdoing' communicates a judicial dispute without
    over-specifying the exact offense.
- source_word: שׁוֹר
  chosen: ox
  alternatives:
  - bull
  - cattle
  lexicon: HALOT
  rationale: '''Ox'' is the standard singular rendering in legal/property contexts
    and fits the representative list of domestic property.'
- source_word: חֲמוֹר
  chosen: donkey
  alternatives:
  - ass
  lexicon: HALOT
  rationale: '''Donkey'' is clear modern English; ''ass'' is archaic in contemporary
    usage.'
- source_word: שֶׂה
  chosen: sheep
  alternatives:
  - small livestock
  - lamb
  - goat/sheep
  lexicon: HALOT
  rationale: שֶׂה can denote a head of small livestock, sheep or goat. 'Sheep' is
    a natural representative rendering in this list, though the Hebrew is somewhat
    broader.
- source_word: שַׂלְמָה
  chosen: garment
  alternatives:
  - cloak
  - clothing
  lexicon: HALOT
  rationale: A general article of clothing is intended; 'garment' preserves the legal
    breadth better than the narrower 'cloak'.
- source_word: אֲבֵדָה
  chosen: lost thing
  alternatives:
  - lost property
  - something lost
  lexicon: HALOT
  rationale: The noun refers broadly to lost property. 'Lost thing' stays close to
    the Hebrew while remaining understandable.
- source_word: אֲשֶׁר יֹאמַר כִּי הוּא זֶה
  chosen: about which someone says, ‘This is it,’
  alternatives:
  - of which one says, 'This is the one'
  - where one claims, 'This is it'
  lexicon: HALOT
  rationale: The clause likely expresses identification or claim over disputed property.
    'This is it' preserves the demonstrative force of הוּא זֶה without adding interpretive
    material.
- source_word: הָאֱלֹהִים / אֱלֹהִים
  chosen: God
  alternatives:
  - the judges
  - the court
  lexicon: HALOT
  rationale: Although אֱלֹהִים in legal texts can be understood as human judges acting
    under divine authority, the plain lexical form is 'God.' In keeping with original-language
    primacy, the main text retains 'God,' while the judicial alternative is preserved
    in a footnote.
- source_word: יָבֹא דְּבַר שְׁנֵיהֶם
  chosen: the case of both parties shall come
  alternatives:
  - the matter of both of them shall come
  - both men's case shall come forward
  lexicon: HALOT
  rationale: דָּבָר again means legal matter/case. 'Both parties' expresses the dual
    possessive naturally in English legal style.
- source_word: יַרְשִׁיעֻן
  chosen: declares guilty
  alternatives:
  - condemns
  - convicts
  lexicon: HALOT
  rationale: The Hiphil of רשע means to declare someone guilty in a judicial setting.
    'Declares guilty' is precise and avoids importing later technical courtroom language.
- source_word: יְשַׁלֵּם שְׁנַיִם
  chosen: shall pay double
  alternatives:
  - shall make double restitution
  - shall repay twofold
  lexicon: HALOT
  rationale: The idiom indicates double repayment. 'Pay double' is concise, accurate,
    and readable.
- source_word: לְרֵעֵהוּ
  chosen: to his neighbor
  alternatives:
  - to the other party
  - to his fellow
  lexicon: HALOT
  rationale: רֵעַ commonly means neighbor/fellow/associate. In this legal context
    it refers to the other person in the dispute. 'Neighbor' is a standard rendering,
    with the legal nuance supplied by context.
