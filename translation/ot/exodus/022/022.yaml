id: EXO.22.22
reference: Exodus 22:22
source:
  edition: WLC
  text: אִם עַנֵּ֥ה תְעַנֶּ֖ה אֹת֑/וֹ כִּ֣י אִם צָעֹ֤ק יִצְעַק֙ אֵלַ֔/י שָׁמֹ֥עַ אֶשְׁמַ֖ע
    צַעֲקָתֽ/וֹ־־׃
translation:
  text: If you indeed afflict him, and if he indeed cries out to me, I will surely
    hear his cry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has masculine singular pronouns ('him,' 'his'), functioning here
      for any individual widow or fatherless child mentioned in the previous verse.
    reason: cultural_note
  - marker: b
    text: 'The repeated Hebrew verb forms (''afflict,'' ''cry out,'' ''hear'') use
      an infinitive absolute with a finite verb for emphasis: ''surely/indeed afflict,''
      ''surely cry out,'' ''surely hear.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a conditional clause. Although the legal context can imply
    expected occurrence, the Hebrew particle is straightforwardly conditional here.
- source_word: עַנֵּה תְעַנֶּה
  chosen: indeed afflict
  alternatives:
  - surely afflict
  - mistreat
  - oppress
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. 'Indeed
    afflict' preserves both the verbal force and the emphasis without over-paraphrasing.
    'Mistreat' is possible in context, but 'afflict' stays closer to ענה while still
    readable.
- source_word: אֹתוֹ
  chosen: him
  alternatives:
  - them
  lexicon: HALOT
  rationale: The suffix is masculine singular. In context it refers distributively
    to the vulnerable person just mentioned in the preceding verse ('any widow or
    fatherless child'), so singular 'him' reflects the morphology while functioning
    generically.
- source_word: כִּי אִם
  chosen: and if
  alternatives:
  - if indeed
  - surely if
  lexicon: HALOT
  rationale: In this construction the phrase introduces the consequent conditional
    development, not a contrastive 'but rather.' 'And if' reads naturally in English
    while preserving the linkage.
- source_word: צָעֹק יִצְעַק
  chosen: he indeed cries out
  alternatives:
  - he surely cries out
  - he cries out earnestly
  lexicon: HALOT
  rationale: Again the infinitive absolute plus imperfect marks emphasis. 'Indeed
    cries out' preserves the intensification without adding interpretive detail.
- source_word: אֵלַי
  chosen: to me
  lexicon: HALOT
  rationale: Direct object of the cry; simple and literal rendering.
- source_word: שָׁמֹעַ אֶשְׁמַע
  chosen: I will surely hear
  alternatives:
  - I will indeed hear
  - hearing I will hear
  lexicon: HALOT
  rationale: The infinitive absolute with the finite verb intensifies divine response.
    'I will surely hear' is idiomatic English that preserves the emphatic certainty.
- source_word: צַעֲקָתוֹ
  chosen: his cry
  alternatives:
  - his outcry
  lexicon: HALOT
  rationale: '''Cry'' is natural English and matches the cognate verb צעק in the same
    verse. ''Outcry'' is possible but slightly less natural here.'
