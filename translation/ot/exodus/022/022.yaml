theological_decisions:
- issue: Gendered singular pronoun for the oppressed person
  chosen_reading: him / his
  alternative_readings:
  - them / their
  rationale: The Hebrew suffixes are masculine singular, and the translation philosophy
    specifies gender-accurate rendering over flattening to gender-neutral forms. In
    context the singular functions distributively for any vulnerable individual in
    the class named in the previous verse.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
