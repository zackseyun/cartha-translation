  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name. Per DOCTRINE.md contested terms,
    the default rendering is 'the LORD,' preserving the reverential convention and
    LXX-influenced pattern rather than a direct transliteration.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
