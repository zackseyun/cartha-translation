id: EXO.17.1
reference: Exodus 17:1
source:
  edition: WLC
  text: וַ֠/יִּסְעוּ כָּל עֲדַ֨ת בְּנֵֽי יִשְׂרָאֵ֧ל מִ/מִּדְבַּר סִ֛ין לְ/מַסְעֵי/הֶ֖ם
    עַל פִּ֣י יְהוָ֑ה וַֽ/יַּחֲנוּ֙ בִּ/רְפִידִ֔ים וְ/אֵ֥ין מַ֖יִם לִ/שְׁתֹּ֥ת הָ/עָֽם־־־־׃
translation:
  text: Then the whole congregation of the sons of Israel set out from the wilderness
    of Sin by stages, according to the command of the LORD, and camped at Rephidim;
    but there was no water for the people to drink.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''according to the mouth of the LORD,'' an idiom meaning according
      to his command or direction.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the whole congregation of the Israelites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: set out
  alternatives:
  - journeyed
  - departed
  lexicon: HALOT
  rationale: The verb נסע in travel contexts means to pull up camp and move on. 'Set
    out' is natural modern English and preserves the narrative movement better than
    the more archaic 'journeyed.'
- source_word: כָּל עֲדַת בְּנֵי יִשְׂרָאֵל
  chosen: the whole congregation of the sons of Israel
  alternatives:
  - the whole congregation of the Israelites
  - the whole community of the children of Israel
  lexicon: HALOT
  rationale: עֵדָה denotes the assembled community/congregation. 'Congregation' preserves
    the corporate sense. בְּנֵי יִשְׂרָאֵל is rendered more formally as 'sons of Israel'
    to reflect the Hebrew expression directly; this is gender-accurate to the source
    while still idiomatic enough in context.
- source_word: מִמִּדְבַּר סִין
  chosen: from the wilderness of Sin
  alternatives:
  - from the Desert of Sin
  lexicon: HALOT
  rationale: מִדְבָּר is 'wilderness' or 'desert.' 'Wilderness' fits Pentateuchal
    narrative style well. 'Sin' is a place-name and is transliterated, not translated.
- source_word: לְמַסְעֵיהֶם
  chosen: by stages
  alternatives:
  - according to their stages
  - from place to place in their journeys
  lexicon: HALOT
  rationale: 'The noun מַסָּע refers to a stage or breaking-camp in a journey. The
    prefixed ל here is best taken adverbially: they traveled in successive stages.
    ''By stages'' is concise and idiomatic while preserving the sense.'
- source_word: עַל פִּי יְהוָה
  chosen: according to the command of the LORD
  alternatives:
  - at the mouth of the LORD
  - according to the word of the LORD
  - by the command of the LORD
  lexicon: HALOT
  rationale: The idiom עַל־פִּי literally means 'upon the mouth of,' but in context
    means in accordance with an authoritative command or direction. 'According to
    the command of the LORD' makes the idiom clear in modern English. יְהוָה follows
    the doctrinal default 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name יְהוָה is rendered 'the LORD,' following
    the stated default and longstanding reverential convention.
- source_word: וַיַּחֲנוּ
  chosen: camped
  alternatives:
  - encamped
  lexicon: HALOT
  rationale: חנה in wilderness-travel narrative means to pitch camp or camp. 'Camped'
    is clear modern English; 'encamped' is more traditional but less natural.
- source_word: בִּרְפִידִים
  chosen: at Rephidim
  alternatives:
  - in Rephidim
  lexicon: HALOT
  rationale: Rephidim is a place-name and is transliterated. 'At' suits a campsite
    location in English narrative.
- source_word: וְאֵין מַיִם
  chosen: but there was no water
  alternatives:
  - and there was no water
  lexicon: HALOT
  rationale: The conjunction ו can be rendered simply 'and,' but here 'but' brings
    out the adversative force implied by the sudden problem after arrival. This is
    a modest discourse-level adjustment consistent with optimal equivalence.
- source_word: לִשְׁתֹּת הָעָם
  chosen: for the people to drink
  alternatives:
  - for the people to drink from
  - for the people to drink water
  lexicon: HALOT
  rationale: 'The infinitive construct with ל expresses purpose/result: there was
    no water for drinking by the people. ''For the people to drink'' is the most natural
    English rendering.'
