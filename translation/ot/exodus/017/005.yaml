id: EXO.17.5
reference: Exodus 17:5
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל מֹשֶׁ֗ה עֲבֹר֙ לִ/פְנֵ֣י הָ/עָ֔ם וְ/קַ֥ח אִתְּ/ךָ֖ מִ/זִּקְנֵ֣י יִשְׂרָאֵ֑ל וּ/מַטְּ/ךָ֗ אֲשֶׁ֨ר הִכִּ֤יתָ בּ/וֹ֙ אֶת הַ/יְאֹ֔ר קַ֥ח בְּ/יָדְ/ךָ֖ וְ/הָלָֽכְתָּ־־׃
translation:
  text: Then Yahweh said to Moses, “Pass on before the people, and take with you some of the elders of Israel. Take in your hand your staff with which you struck the Nile, and go.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from the elders of Israel''; the phrase likely means that Moses should take some selected elders with him.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the river'; in Exodus this term commonly refers specifically to the Nile.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עֲבֹר לִפְנֵי הָעָם
  chosen: Pass on before the people
  alternatives:
  - Go on ahead of the people
  - Cross before the people
  lexicon: HALOT
  rationale: The verb עבר fundamentally means 'pass over/pass by/go across.' In this context of moving ahead of the assembly, 'Pass on before the people' preserves the imperative force and spatial sense without over-specifying 'ahead' beyond the Hebrew.
- source_word: וְקַח אִתְּךָ מִזִּקְנֵי יִשְׂרָאֵל
  chosen: and take with you some of the elders of Israel
  alternatives:
  - and take with you from the elders of Israel
  - and take with you elders of Israel
  lexicon: HALOT
  rationale: The מן construction indicates selection from a group rather than necessarily the whole body. 'Some of the elders of Israel' makes that partitive sense clear in natural English.
- source_word: וּמַטְּךָ
  chosen: your staff
  alternatives:
  - your rod
  lexicon: HALOT
  rationale: מַטֶּה can be 'staff' or 'rod.' 'Staff' is more natural modern English here and fits Moses' instrument of leadership and miraculous action.
- source_word: אֲשֶׁר הִכִּיתָ בּוֹ אֶת הַיְאֹר
  chosen: with which you struck the Nile
  alternatives:
  - with which you struck the river
  - with which you struck the Nile River
  lexicon: HALOT
  rationale: יְאֹר in Exodus commonly refers specifically to the Nile. Rendering it 'the Nile' is more precise than the generic 'river' and reflects the Egyptian setting. The preposition בּוֹ is instrumental, hence 'with which.'
- source_word: קַח בְּיָדְךָ
  chosen: Take in your hand
  alternatives:
  - take in your hand it
  - carry in your hand
  lexicon: HALOT
  rationale: 'The Hebrew repeats קח for emphasis and command sequence. English can omit the explicit object pronoun while preserving the sense: Moses is to take the staff in hand.'
- source_word: וְהָלָכְתָּ
  chosen: and go
  alternatives:
  - and walk on
  - and proceed
  lexicon: HALOT
  rationale: הלך here functions as a simple imperative-like continuation after prior commands. 'And go' is idiomatic and concise in English.
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English narrative flow while preserving sequence.
