id: EXO.17.11
reference: Exodus 17:11
source:
  edition: WLC
  text: וְ/הָיָ֗ה כַּ/אֲשֶׁ֨ר יָרִ֥ים מֹשֶׁ֛ה יָד֖/וֹ וְ/גָבַ֣ר יִשְׂרָאֵ֑ל וְ/כַ/אֲשֶׁ֥ר
    יָנִ֛יחַ יָד֖/וֹ וְ/גָבַ֥ר עֲמָלֵֽק׃
translation:
  text: And whenever Moses raised his hand, Israel prevailed; and whenever he let
    down his hand, Amalek prevailed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when Moses lifted up his hand ... when he let down his hand.' The Hebrew
      construction can be rendered more formally with 'when,' but the context suggests
      repeated action during the battle, hence 'whenever.'
    reason: lexical_alternative
  - marker: b
    text: '''Let down'' renders a verb that can also mean ''caused to rest'' or ''lowered.''
      The contrast with ''raised his hand'' favors the idiomatic sense ''let down.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And whenever
  alternatives:
  - And it happened
  - And it came about
  lexicon: HALOT
  rationale: The waw + qatal of היה here introduces a recurring circumstance rather
    than a single punctiliar event. In idiomatic English, folding this into 'And whenever'
    best captures the construction with the following כַאֲשֶׁר while remaining faithful
    to the narrative sense.
- source_word: כַאֲשֶׁר
  chosen: whenever
  alternatives:
  - when
  - as
  lexicon: HALOT
  rationale: In this context the particle marks repeated occasions during the battle,
    not merely one-time sequence. 'Whenever' conveys the iterative force more clearly
    than simple 'when'.
- source_word: יָרִים
  chosen: raised
  alternatives:
  - lifted up
  - held up
  lexicon: HALOT
  rationale: The Hiphil of רום means to raise/lift up. 'Raised' is natural modern
    English and avoids over-specifying duration; 'held up' would import a sustained
    aspect not explicit in this verb alone.
- source_word: יָדוֹ
  chosen: his hand
  alternatives:
  - his arm
  lexicon: HALOT
  rationale: The Hebrew noun is 'hand.' Although English might sometimes use 'arm'
    for the gesture, the source specifically says 'hand,' so the more literal rendering
    is retained.
- source_word: וְגָבַר
  chosen: prevailed
  alternatives:
  - was stronger
  - gained the upper hand
  - overcame
  lexicon: HALOT
  rationale: גבר denotes being strong or prevailing. 'Prevailed' fits the military
    context well and preserves the comparative outcome without overstating it as total
    defeat.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Standard transliteration of the people/nation name.
- source_word: וְכַאֲשֶׁר
  chosen: and whenever
  alternatives:
  - and when
  lexicon: HALOT
  rationale: As in the first clause, the phrase marks repeated instances. Including
    'and' preserves the Hebrew coordination between the contrasting clauses.
- source_word: יָנִיחַ
  chosen: let down
  alternatives:
  - lowered
  - rested
  - set down
  lexicon: HALOT
  rationale: The Hiphil of נוח can mean cause to rest or set down. In this immediate
    contrast with 'raised his hand,' 'let down' is the clearest idiomatic English
    expression for lowering the hand.
- source_word: עֲמָלֵק
  chosen: Amalek
  rationale: Standard transliteration of the national/ethnic name.
