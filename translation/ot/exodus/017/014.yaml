id: EXO.17.14
reference: Exodus 17:14
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל מֹשֶׁ֗ה כְּתֹ֨ב זֹ֤את זִכָּרוֹן֙ בַּ/סֵּ֔פֶר וְ/שִׂ֖ים
    בְּ/אָזְנֵ֣י יְהוֹשֻׁ֑עַ כִּֽי מָחֹ֤ה אֶמְחֶה֙ אֶת זֵ֣כֶר עֲמָלֵ֔ק מִ/תַּ֖חַת
    הַ/שָּׁמָֽיִם־־־׃
translation:
  text: Then the LORD said to Moses, “Write this as a memorial in the book, and put
    it in Joshua’s hearing, for I will surely blot out the remembrance of Amalek from
    under heaven.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in a book' or 'in the scroll'; Hebrew has 'in the book.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'put in the ears of Joshua,' that is, make Joshua hear it or recite
      it to him.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew expression 'I will surely blot out' is emphatic.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name, render YHWH as 'the LORD' rather
    than a transliteration, following established reverential convention and the pattern
    reflected in ancient translation tradition.
- source_word: כְּתֹב
  chosen: Write
  alternatives:
  - Record
  lexicon: HALOT
  rationale: Imperative of כתב is straightforwardly 'write.' 'Record' is possible
    in context, but 'write' preserves the directness of the command.
- source_word: זֹאת זִכָּרוֹן
  chosen: this as a memorial
  alternatives:
  - this for a memorial
  - this as a remembrance
  lexicon: HALOT
  rationale: The construction directs Moses to write the event with memorial purpose.
    'Memorial' is idiomatic and concise in English while preserving the commemorative
    force of זִכָּרוֹן.
- source_word: בַּסֵּפֶר
  chosen: in the book
  alternatives:
  - in a book
  - in the scroll
  lexicon: HALOT
  rationale: The Hebrew has the definite article, so 'the book' is the most formally
    accurate rendering. 'Scroll' reflects ancient material culture but is interpretive;
    'book' better matches the lexical form while remaining natural English.
- source_word: וְשִׂים בְּאָזְנֵי יְהוֹשֻׁעַ
  chosen: and put it in Joshua’s hearing
  alternatives:
  - and recite it to Joshua
  - and place it in Joshua's ears
  - and make Joshua hear it
  lexicon: HALOT
  rationale: Literally 'put in the ears of Joshua,' a Hebrew idiom for causing someone
    to hear. 'Put it in Joshua’s hearing' preserves the idiomatic imagery better than
    a fully flattened dynamic rendering while remaining understandable.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - that
  lexicon: HALOT
  rationale: Here כִּי introduces the content/reason for the command. 'For' fits the
    explanatory force in smooth English.
- source_word: מָחֹה אֶמְחֶה
  chosen: I will surely blot out
  alternatives:
  - I will utterly blot out
  - blotting out I will blot out
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the action. 'I will
    surely blot out' captures the emphatic certainty without sounding wooden.
- source_word: זֵכֶר עֲמָלֵק
  chosen: the remembrance of Amalek
  alternatives:
  - the memory of Amalek
  - the name of Amalek
  lexicon: HALOT
  rationale: 'זֵכֶר refers to remembrance/memory. ''Remembrance'' preserves the formal
    correspondence with the earlier memorial language, creating an intentional contrast
    in the verse: Israel is to preserve this as a memorial while Amalek''s remembrance
    will be erased.'
- source_word: מִתַּחַת הַשָּׁמָיִם
  chosen: from under heaven
  alternatives:
  - from under the heavens
  - from the earth
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom. 'From under heaven' is a natural singular
    English rendering that preserves the idiomatic scope of total removal.
