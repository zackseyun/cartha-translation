id: EXO.17.10
reference: Exodus 17:10
source:
  edition: WLC
  text: וַ/יַּ֣עַשׂ יְהוֹשֻׁ֗עַ כַּ/אֲשֶׁ֤ר אָֽמַר ל/וֹ֙ מֹשֶׁ֔ה לְ/הִלָּחֵ֖ם בַּ/עֲמָלֵ֑ק
    וּ/מֹשֶׁה֙ אַהֲרֹ֣ן וְ/ח֔וּר עָל֖וּ רֹ֥אשׁ הַ/גִּבְעָֽה־׃
translation:
  text: So Joshua did as Moses had told him, to fight against Amalek; and Moses, Aaron,
    and Hur went up to the top of the hill.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Amalek'; this may refer to the people descended from Amalek, i.e.,
      the Amalekites.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - acted
  - carried out
  lexicon: HALOT
  rationale: The verb עשה here idiomatically means to do or carry out what was commanded.
    'Did' is the most natural English rendering in the construction 'did as Moses
    had told him.'
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - according to what
  lexicon: HALOT
  rationale: Introduces comparison/conformity with Moses' instruction. 'As' is concise
    and natural in English.
- source_word: אָמַר לוֹ
  chosen: had told him
  alternatives:
  - said to him
  - had said to him
  lexicon: HALOT
  rationale: Although אמר is literally 'said,' in this context it refers to Moses'
    prior instruction from the previous verse. 'Had told him' communicates the pluperfect
    sense naturally in English and fits the command context better than the more wooden
    'said to him.'
- source_word: לְהִלָּחֵם
  chosen: to fight
  alternatives:
  - to wage war
  - to battle
  lexicon: HALOT
  rationale: The Niphal infinitive of לחם means 'to fight/do battle.' 'To fight' is
    the clearest modern English equivalent.
- source_word: בַּעֲמָלֵק
  chosen: against Amalek
  alternatives:
  - with Amalek
  - against the Amalekites
  lexicon: HALOT
  rationale: With לחם, the preposition conveys hostile engagement. 'Against Amalek'
    preserves the Hebrew proper name as given. 'Against the Amalekites' is interpretive,
    since the text names Amalek rather than the gentilic form.
- source_word: עָלוּ
  chosen: went up
  alternatives:
  - ascended
  - climbed up
  lexicon: HALOT
  rationale: עלה commonly means 'go up.' 'Went up' is idiomatic and preserves the
    narrative movement without sounding archaic.
- source_word: רֹאשׁ הַגִּבְעָה
  chosen: the top of the hill
  alternatives:
  - the head of the hill
  - the summit of the hill
  lexicon: HALOT
  rationale: The construct literally means 'head of the hill,' an idiom for its top
    or summit. 'The top of the hill' is the most natural optimal-equivalence rendering.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Personal name transliterated by standard English convention.
- source_word: אַהֲרֹן
  chosen: Aaron
  rationale: Personal name transliterated by standard English convention.
- source_word: חוּר
  chosen: Hur
  rationale: Personal name transliterated by standard English convention.
