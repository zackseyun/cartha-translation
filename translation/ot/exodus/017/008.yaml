id: EXO.17.8
reference: Exodus 17:8
source:
  edition: WLC
  text: וַ/יָּבֹ֖א עֲמָלֵ֑ק וַ/יִּלָּ֥חֶם עִם יִשְׂרָאֵ֖ל בִּ/רְפִידִֽם־׃
translation:
  text: Then Amalek came and fought with Israel at Rephidim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fought against Israel.' The Hebrew preposition is literally 'with,'
      but in battle contexts English may express the adversarial sense as 'against.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: Then ... came
  alternatives:
  - And ... came
  - Now ... came
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' conveys sequential
    movement in natural English better than a bare 'and,' while preserving the simple
    sense of בוא ('come').
- source_word: עֲמָלֵק
  chosen: Amalek
  lexicon: HALOT
  rationale: Proper name transliterated according to the translation philosophy. In
    context it refers to the Amalekite people represented corporately by their ancestor-name,
    but English convention keeps the singular proper name 'Amalek.'
- source_word: וַיִּלָּחֶם
  chosen: fought
  alternatives:
  - made war
  - battled
  lexicon: HALOT
  rationale: The Niphal of לחם in this context means 'to fight/do battle.' 'Fought'
    is the most natural modern English rendering and fits the straightforward narrative
    style.
- source_word: עִם
  chosen: with
  alternatives:
  - against
  lexicon: HALOT
  rationale: The preposition literally means 'with.' In English, 'fought with Israel'
    can idiomatically mean engaged in battle with them; this preserves the Hebrew
    preposition more closely. 'Against' is interpretive and possible, but not necessary
    in the main text.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Standard transliteration of the covenant people/nation name.
- source_word: בִּרְפִידִם
  chosen: at Rephidim
  alternatives:
  - in Rephidim
  lexicon: HALOT
  rationale: The preposition ב marks location. 'At Rephidim' is idiomatic for a place
    where an event occurred, especially a camp or site, and reads more naturally than
    'in Rephidim.'
