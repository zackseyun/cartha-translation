id: EXO.17.13
reference: Exodus 17:13
source:
  edition: WLC
  text: וַ/יַּחֲלֹ֧שׁ יְהוֹשֻׁ֛עַ אֶת עֲמָלֵ֥ק וְ/אֶת עַמּ֖/וֹ לְ/פִי חָֽרֶב־־־׃פ
translation:
  text: And Joshua overcame Amalek and his people with the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'by the edge of the sword.' The Hebrew literally reads
      'by the mouth of the sword,' an idiom for defeat through armed combat.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחֲלֹשׁ
  chosen: overcame
  alternatives:
  - weakened
  - defeated
  - disabled
  lexicon: HALOT
  rationale: The verb from חלש can mean to weaken or overpower. In this battle context,
    English 'overcame' captures the result of military success without overstating
    total annihilation. 'Defeated' is possible, but 'overcame' better reflects the
    underlying sense of prevailing over by weakening.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  rationale: Personal names are transliterated by standard English convention.
- source_word: עֲמָלֵק
  chosen: Amalek
  rationale: This proper name can refer to the Amalekite force represented by its
    ancestor-name; English convention preserves the singular proper name 'Amalek'.
- source_word: עַמּוֹ
  chosen: his people
  alternatives:
  - his army
  - his troops
  lexicon: HALOT
  rationale: עַם ordinarily means 'people.' In a battle narrative it refers to the
    people under Amalek's leadership, likely his fighting force, but 'his people'
    preserves the Hebrew wording more directly while remaining natural English.
- source_word: לְפִי חָרֶב
  chosen: with the sword
  alternatives:
  - by the edge of the sword
  - by the mouth of the sword
  lexicon: HALOT
  rationale: The idiom literally means 'to/according to the mouth of the sword,' a
    standard Hebrew expression for death or defeat by sword. 'With the sword' is a
    clear modern rendering; the more formal 'by the edge of the sword' is preserved
    as an alternative.
