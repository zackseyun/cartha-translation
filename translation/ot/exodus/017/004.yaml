id: EXO.17.4
reference: Exodus 17:4
source:
  edition: WLC
  text: וַ/יִּצְעַ֤ק מֹשֶׁה֙ אֶל יְהוָ֣ה לֵ/אמֹ֔ר מָ֥ה אֶעֱשֶׂ֖ה לָ/עָ֣ם הַ/זֶּ֑ה ע֥וֹד מְעַ֖ט וּ/סְקָלֻֽ/נִי־׃
translation:
  text: So Moses cried out to Yahweh, saying, “What shall I do with this people? A little more, and they will stone me!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yet a little, and they will stone me,'' expressing that the threat is imminent.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצְעַק
  chosen: cried out
  alternatives:
  - called out
  - cried
  lexicon: HALOT
  rationale: The verb צעק commonly denotes a strong cry for help or distress, not merely neutral speech. 'Cried out' preserves the urgency of Moses' appeal to God.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: The infinitive construct introducing direct speech is naturally rendered 'saying' in English and keeps the narrative flow close to the Hebrew.
- source_word: מָה אֶעֱשֶׂה
  chosen: What shall I do
  alternatives:
  - What am I to do
  - What should I do
  lexicon: HALOT
  rationale: This idiom expresses Moses' urgent question about how to act. 'What shall I do' is natural, direct, and preserves the first-person deliberative sense.
- source_word: לָעָם הַזֶּה
  chosen: with this people
  alternatives:
  - for this people
  - to this people
  lexicon: HALOT
  rationale: The preposition ל with עשה in this context can indicate relation toward the object of action. In idiomatic English, 'do with this people' best conveys Moses' exasperated question about how to deal with them.
- source_word: עֹד מְעַט
  chosen: A little more
  alternatives:
  - A little longer
  - Yet a little
  lexicon: HALOT
  rationale: The phrase literally means 'yet a little' and idiomatically signals imminence. 'A little more' is concise modern English that preserves the sense that only a small step remains before violence erupts.
- source_word: וּסְקָלֻנִי
  chosen: and they will stone me
  alternatives:
  - and they are about to stone me
  - and they will pelt me with stones
  lexicon: HALOT
  rationale: From סקל, the standard sense is execution or attack by stoning. 'They will stone me' is the clearest and most direct rendering; the Hebrew perfect with waw after עֹד מְעַט conveys imminent result, which English expresses naturally with future force here.
