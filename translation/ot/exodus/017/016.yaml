id: EXO.17.16
reference: Exodus 17:16
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר כִּֽי יָד֙ עַל כֵּ֣ס יָ֔הּ מִלְחָמָ֥ה לַ/יהוָ֖ה בַּֽ/עֲמָלֵ֑ק מִ/דֹּ֖ר דֹּֽר־־׃פ
translation:
  text: And he said, “A hand is upon the throne of Yah; Yahweh will have war with Amalek from generation to generation.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew is difficult and elliptical: literally, ''A hand upon the throne of Yah.'' It may also be understood as ''a hand against the throne of Yah,'' or, less likely, with כֵּס taken as ''banner.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - And he said,
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative continuation with 3ms subject. The subject is left as 'he' because the Hebrew does not restate the name here.
- source_word: כִּי
  chosen: “
  alternatives:
  - for
  - because
  - indeed
  - surely
  lexicon: HALOT
  rationale: כִּי here introduces the content of the speech, but the clause that follows is elliptical and difficult. In English, direct quotation naturally absorbs the particle without forcing an awkward 'for/because' that may over-interpret the syntax.
- source_word: יָד
  chosen: A hand
  alternatives:
  - hand
  - the hand
  lexicon: HALOT
  rationale: The noun lacks the article, so an indefinite rendering best reflects the Hebrew form. The phrase is elliptical; 'A hand is upon...' preserves the terseness without specifying whose hand.
- source_word: עַל
  chosen: upon
  alternatives:
  - 'on'
  - against
  lexicon: HALOT
  rationale: The preposition most naturally means 'upon/on' here. Some interpret the phrase adversatively ('against'), but that moves beyond the plain lexical value and into interpretation.
- source_word: כֵּס
  chosen: throne
  alternatives:
  - seat
  - banner
  lexicon: HALOT
  rationale: The consonantal form is unusual and likely a shortened or defective form related to 'throne' (כִּסֵּא), especially in the expression 'throne of Yah.' 'Banner' is less likely lexically here and is influenced by the previous verse's altar name rather than this word itself.
- source_word: יָהּ
  chosen: Yah
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: This is the short divine name Yah, not the full tetragrammaton. Translating it distinctly preserves the source-text form and avoids collapsing it into the following יהוה.
- source_word: מִלְחָמָה
  chosen: will have war
  alternatives:
  - war
  - is war
  - there is war
  - will wage war
  lexicon: HALOT
  rationale: The verbless Hebrew clause states the reality of war belonging to the LORD against Amalek. 'Will have war' is idiomatic enough in English while preserving the nominal force and future-like sense in context. 'Will wage war' is possible but slightly more interpretive.
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: 'Per doctrine, יהוה is rendered ''the LORD.'' The lamed marks possession or relation: the war belongs to the LORD / is the LORD''s war.'
- source_word: בַּעֲמָלֵק
  chosen: with Amalek
  alternatives:
  - against Amalek
  lexicon: HALOT
  rationale: The preposition ב can mark hostile engagement in warfare contexts. 'With Amalek' is a natural English expression for being at war, while still conveying opposition.
- source_word: מִדֹּר דֹּר
  chosen: from generation to generation
  alternatives:
  - from age to age
  - for all generations
  lexicon: HALOT
  rationale: This idiom denotes continuing duration across successive generations. 'From generation to generation' is the most transparent and established equivalent.
