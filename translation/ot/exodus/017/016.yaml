theological_decisions:
- issue: Rendering of the divine names יָהּ and יהוה in the same verse
  chosen_reading: Render יָהּ as 'Yah' and יהוה as 'Yahweh'
  alternative_readings:
  - Render both as 'the LORD'
  - Render יהוה as 'Yahweh'
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Handling the elliptical and difficult clause כִּי יָד עַל כֵּס יָהּ
  chosen_reading: Translate conservatively as 'A hand is upon the throne of Yah' and preserve alternatives in a footnote
  alternative_readings:
  - Because a hand was against the throne of Yah
  - A hand is upon the banner of Yah
  - For the hand is on the throne of the LORD
  rationale: The Hebrew is famously compressed and syntactically difficult. A transparent rendering should preserve the ambiguity rather than resolve it into a more interpretive paraphrase about oath, banner, or attack. Alternatives are worth preserving in a footnote because the clause is genuinely contested.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
