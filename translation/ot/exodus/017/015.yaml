theological_decisions:
- issue: Rendering the divine name יְהוָה in a memorial altar name
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names the altar with a title incorporating the covenant name.
    Following the project's stated default for יְהוָה, the main text uses 'the LORD'
    rather than a transliteration. This preserves consistency with doctrine while
    still conveying that the altar name is a theological confession about Israel's
    God.
