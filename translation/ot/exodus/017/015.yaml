id: EXO.17.15
reference: Exodus 17:15
source:
  edition: WLC
  text: וַ/יִּ֥בֶן מֹשֶׁ֖ה מִזְבֵּ֑חַ וַ/יִּקְרָ֥א שְׁמ֖/וֹ יְהוָ֥ה נִסִּֽ/י׀׃
translation:
  text: And Moses built an altar and called its name, “The LORD Is My Banner.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH my banner'' or ''The LORD my banner''; the title likely
      means that the LORD is the rallying banner or standard of Israel''s victory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  chosen: built
  alternatives:
  - constructed
  lexicon: HALOT
  rationale: The verb בנה in the waw-consecutive narrative form straightforwardly
    means 'built.' 'Built' is the natural modern English narrative equivalent and
    preserves the concrete action.
- source_word: מִזְבֵּחַ
  chosen: altar
  lexicon: HALOT
  rationale: מִזְבֵּחַ is the standard term for an altar, specifically a place of
    sacrifice or memorial worship. 'Altar' is the direct and established equivalent.
- source_word: וַיִּקְרָא שְׁמוֹ
  chosen: called its name
  alternatives:
  - named it
  - called the name of it
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'called its name.' In English, 'called
    its name' preserves the naming formula more transparently than the smoother 'named
    it,' while remaining understandable.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name YHWH is 'the LORD,'
    following Jewish reverence tradition and the Septuagintal pattern. Because the
    name appears within a memorial title, it is still translated rather than transliterated
    in the main text.
- source_word: נִסִּי
  chosen: Is My Banner
  alternatives:
  - my banner
  - my standard
  lexicon: HALOT
  rationale: 'נֵס commonly denotes a banner, signal pole, or standard. In this naming
    formula, rendering the phrase as a verbless title in idiomatic English requires
    supplying ''is'': ''The LORD Is My Banner.'' ''Banner'' is more familiar than
    ''standard'' and preserves the metaphor of rallying and victory.'
