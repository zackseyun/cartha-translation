id: EXO.17.6
reference: Exodus 17:6
source:
  edition: WLC
  text: הִנְ/נִ֣י עֹמֵד֩ לְ/פָנֶ֨י/ךָ שָּׁ֥ם עַֽל הַ/צּוּר֮ בְּ/חֹרֵב֒ וְ/הִכִּ֣יתָ
    בַ/צּ֗וּר וְ/יָצְא֥וּ מִמֶּ֛/נּוּ מַ֖יִם וְ/שָׁתָ֣ה הָ/עָ֑ם וַ/יַּ֤עַשׂ כֵּן֙
    מֹשֶׁ֔ה לְ/עֵינֵ֖י זִקְנֵ֥י יִשְׂרָאֵֽל׀־׃
translation:
  text: Behold, I will stand before you there on the rock at Horeb, and you shall
    strike the rock, and water will come out from it, and the people will drink. And
    Moses did so in the sight of the elders of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Behold, I am standing before you there on the rock at Horeb.' The Hebrew
      participle may be rendered as a present.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - Here I am
  lexicon: HALOT
  rationale: Introduces a solemn, attention-directing divine declaration. 'Behold'
    preserves the elevated deictic force better than flatter modern options, while
    remaining intelligible.
- source_word: עֹמֵד
  chosen: I will stand
  alternatives:
  - I am standing
  - I stand
  lexicon: HALOT
  rationale: Although morphologically a participle ('standing'), in context it functions
    with imminent/future force in the divine instruction. 'I will stand' is natural
    English and fits the sequence of commands and promised result.
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - in front of you
  - ahead of you
  lexicon: HALOT
  rationale: Standard rendering of the prepositional phrase; it can denote position
    in front of Moses and also public visibility. 'Before you' is concise and idiomatic.
- source_word: הַצּוּר
  chosen: the rock
  alternatives:
  - the crag
  - the cliff
  lexicon: HALOT
  rationale: צוּר commonly denotes a rock or rocky mass. 'The rock' is the natural
    English equivalent and preserves the repeated term in the verse.
- source_word: בְּחֹרֵב
  chosen: at Horeb
  alternatives:
  - in Horeb
  lexicon: HALOT
  rationale: For a place name in English, 'at Horeb' is more idiomatic than 'in Horeb'
    in this setting.
- source_word: וְהִכִּיתָ
  chosen: you shall strike
  alternatives:
  - you must strike
  - you are to strike
  - you shall hit
  lexicon: HALOT
  rationale: The perfect with vav in instructional context carries directive force.
    'Strike' is stronger and more fitting than 'hit' for the solemn command.
- source_word: וְיָצְאוּ
  chosen: will come out
  alternatives:
  - shall come out
  - will flow out
  lexicon: HALOT
  rationale: The verb means 'go/come out.' 'Will come out' is a direct rendering;
    'flow out' adds imagery not explicit in the verb itself.
- source_word: מִמֶּנּוּ
  chosen: from it
  alternatives:
  - from him
  lexicon: HALOT
  rationale: The suffix refers to the rock. English requires the impersonal pronoun
    'it' for the inanimate antecedent.
- source_word: מַיִם
  chosen: water
  lexicon: HALOT
  rationale: Straightforward lexical equivalent.
- source_word: וְשָׁתָה הָעָם
  chosen: the people will drink
  alternatives:
  - and the people shall drink
  - so that the people may drink
  lexicon: HALOT
  rationale: 'A simple future/result clause best fits the sequence: strike the rock,
    water comes out, the people drink. This preserves the narrative progression without
    overinterpreting purpose.'
- source_word: וַיַּעַשׂ כֵּן
  chosen: did so
  alternatives:
  - did thus
  - acted accordingly
  lexicon: HALOT
  rationale: Idiomatic English rendering of the Hebrew summary formula.
- source_word: לְעֵינֵי
  chosen: in the sight of
  alternatives:
  - before
  - in front of
  - before the eyes of
  lexicon: HALOT
  rationale: This phrase emphasizes public witness. 'In the sight of' preserves that
    nuance more clearly than the simpler 'before'.
- source_word: זִקְנֵי יִשְׂרָאֵל
  chosen: the elders of Israel
  alternatives:
  - Israel's elders
  lexicon: HALOT
  rationale: Standard rendering for the recognized leadership group within Israel.
