theological_decisions:
- issue: Rendering the divine self-presentation with a participle
  chosen_reading: Behold, I will stand before you there on the rock at Horeb
  alternative_readings:
  - Behold, I am standing before you there on the rock at Horeb
  rationale: The Hebrew participle can be rendered presentively, but in this instruction
    scene the future-oriented English better communicates the imminent divine action
    Moses is to expect. This does not alter theology; it reflects aspect and discourse
    flow.
  doctrine_reference: Translation philosophy §1, §6
- issue: Reference of 'before you' in relation to the rock
  chosen_reading: God stands before Moses there on the rock at Horeb
  alternative_readings:
  - God stands before Moses there, by the rock at Horeb
  rationale: The syntax most naturally links 'there on the rock at Horeb' with the
    divine standing. The translation preserves the striking imagery without softening
    it, while avoiding speculative theological explanation beyond the text.
  doctrine_reference: Translation philosophy §1, §3
