id: EXO.17.2
reference: Exodus 17:2
source:
  edition: WLC
  text: וַ/יָּ֤רֶב הָ/עָם֙ עִם מֹשֶׁ֔ה וַ/יֹּ֣אמְר֔וּ תְּנוּ לָ֥/נוּ מַ֖יִם וְ/נִשְׁתֶּ֑ה וַ/יֹּ֤אמֶר לָ/הֶם֙ מֹשֶׁ֔ה מַה תְּרִיבוּ/ן֙ עִמָּדִ֔/י מַה תְּנַסּ֖וּ/ן אֶת יְהוָֽה־־־־־׃
translation:
  text: So the people quarreled with Moses and said, “Give us water so that we may drink.” And Moses said to them, “Why do you quarrel with me? Why do you test Yahweh?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
  - marker: b
    text: Or 'put the LORD to the test.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּרֶב
  chosen: quarreled
  alternatives:
  - contended
  - complained against
  - strove with
  lexicon: HALOT
  rationale: From ריב, denoting dispute or contention. 'Quarreled' is natural modern English and preserves the adversarial force better than the weaker 'complained.'
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the people of Israel
  - the people there
  lexicon: HALOT
  rationale: The noun with article is simply 'the people'; adding 'of Israel' would import context not explicit in this verse.
- source_word: עִם מֹשֶׁה
  chosen: with Moses
  alternatives:
  - against Moses
  lexicon: HALOT
  rationale: The preposition עִם is formally 'with.' In English, 'quarrel with' naturally conveys opposition without overtranslating to 'against' in the main text.
- source_word: תְּנוּ לָנוּ מַיִם
  chosen: Give us water
  alternatives:
  - Give water to us
  - Provide us with water
  lexicon: HALOT
  rationale: Imperative נתן plus indirect object is straightforwardly rendered 'Give us water.' 'Provide' is possible but slightly more interpretive.
- source_word: וְנִשְׁתֶּה
  chosen: so that we may drink
  alternatives:
  - and we will drink
  - that we may drink
  lexicon: HALOT
  rationale: The cohortative expresses purpose or desired result following the imperative. 'So that we may drink' captures the request idiomatically in English.
- source_word: מַה תְּרִיבוּן עִמָּדִי
  chosen: Why do you quarrel with me?
  alternatives:
  - Why are you contending with me?
  - Why do you strive with me?
  lexicon: HALOT
  rationale: מַה in this rebuke functions idiomatically as 'why.' Repeating 'quarrel' preserves the lexical link with the earlier ריב and keeps the rhetorical force.
- source_word: מַה תְּנַסּוּן
  chosen: Why do you test
  alternatives:
  - Why do you put to the test
  - Why are you trying
  lexicon: HALOT
  rationale: נסה in the piel commonly means 'test' or 'put to the test.' 'Test' is concise and preserves the theological seriousness of challenging God's presence/provision.
- source_word: אֶת יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - the Lord
  lexicon: HALOT
  rationale: Per doctrine guidelines, יְהוָה is rendered 'the LORD' to reflect the covenant name following established reverential convention and LXX-influenced pattern.
