theological_decisions:
- issue: Meaning of אֱמוּנָה in Moses' hands
  chosen_reading: physical steadiness/firmness rather than moral 'faithfulness'
  alternative_readings:
  - faithful
  - steadfast
  rationale: The immediate context is bodily fatigue and physical support from Aaron
    and Hur. Rendering the noun as 'steady' avoids importing a theological abstraction
    not demanded by the scene, while still preserving the semantic overlap with firmness/steadfastness.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
