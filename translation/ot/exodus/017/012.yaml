id: EXO.17.12
reference: Exodus 17:12
source:
  edition: WLC
  text: וִ/ידֵ֤י מֹשֶׁה֙ כְּבֵדִ֔ים וַ/יִּקְחוּ אֶ֛בֶן וַ/יָּשִׂ֥ימוּ תַחְתָּ֖י/ו
    וַ/יֵּ֣שֶׁב עָלֶ֑י/הָ וְ/אַהֲרֹ֨ן וְ/ח֜וּר תָּֽמְכ֣וּ בְ/יָדָ֗י/ו מִ/זֶּ֤ה אֶחָד֙
    וּ/מִ/זֶּ֣ה אֶחָ֔ד וַ/יְהִ֥י יָדָ֛י/ו אֱמוּנָ֖ה עַד בֹּ֥א הַ/שָּֽׁמֶשׁ־־׃
translation:
  text: But Moses’ hands were heavy, so they took a stone and put it under him, and
    he sat on it. And Aaron and Hur supported his hands, one on this side and one
    on that side, so his hands remained steady until the sun went down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'firm' or 'steadfast'; the Hebrew noun can also carry the sense of 'faithfulness,'
      but here it refers to the physical steadiness of Moses' hands.
    reason: lexical_alternative
lexical_decisions:
- source_word: וִידֵי
  chosen: hands
  alternatives:
  - arms
  lexicon: HALOT
  rationale: Literal plural of יָד. 'Hands' is the natural English equivalent and
    fits the repeated imagery in the verse.
- source_word: כְּבֵדִים
  chosen: were heavy
  alternatives:
  - were weary
  - grew heavy
  lexicon: HALOT
  rationale: The adjective literally means 'heavy.' In context it implies fatigue,
    but retaining 'heavy' preserves the concrete Hebrew expression without over-paraphrasing.
- source_word: וַיִּקְחוּ
  chosen: they took
  alternatives:
  - someone took
  lexicon: HALOT
  rationale: Third person plural with unspecified subject; the following mention of
    Aaron and Hur suggests attendants, but the Hebrew simply says 'they took.'
- source_word: אֶבֶן
  chosen: a stone
  alternatives:
  - a rock
  lexicon: HALOT
  rationale: אֶבֶן is the common word for 'stone.' 'Stone' is more precise than 'rock'
    here, especially since it is used as a seat support.
- source_word: תַחְתָּיו
  chosen: under him
  alternatives:
  - beneath him
  lexicon: HALOT
  rationale: The preposition indicates placement beneath Moses, with the next clause
    clarifying that he sat on the stone.
- source_word: וַיֵּשֶׁב עָלֶיהָ
  chosen: and he sat on it
  alternatives:
  - and he sat upon it
  lexicon: HALOT
  rationale: Straightforward narrative sequence; 'on it' is idiomatic modern English.
- source_word: תָּמְכוּ
  chosen: supported
  alternatives:
  - held up
  - upheld
  lexicon: HALOT
  rationale: The verb means to support or sustain. 'Supported' is clear and natural,
    while still conveying physical assistance.
- source_word: בְיָדָיו
  chosen: his hands
  alternatives:
  - his arms
  lexicon: HALOT
  rationale: Though English might idiomatically say 'arms' in this scene, the Hebrew
    again uses 'hands,' and consistency is preferable unless context demands otherwise.
- source_word: מִזֶּה אֶחָד וּמִזֶּה אֶחָד
  chosen: one on this side and one on that side
  alternatives:
  - one on one side and one on the other
  lexicon: HALOT
  rationale: 'This preserves the distributive sense: Aaron on one side, Hur on the
    other.'
- source_word: וַיְהִי יָדָיו אֱמוּנָה
  chosen: so his hands remained steady
  alternatives:
  - and his hands were steady
  - and his hands were firm
  - and his hands were faithful
  lexicon: HALOT
  rationale: אֱמוּנָה can denote steadiness, firmness, or faithfulness. In this physical
    context, 'steady' best fits the scene of Moses' uplifted hands being physically
    sustained. 'Remained' brings out the durative result in context.
- source_word: עַד בֹּא הַשָּׁמֶשׁ
  chosen: until the sun went down
  alternatives:
  - until the going down of the sun
  - until sunset
  lexicon: HALOT
  rationale: Idiomatic English rendering of the infinitive construction. It preserves
    the temporal endpoint clearly and naturally.
