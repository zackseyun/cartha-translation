theological_decisions:
- issue: Rendering of הָאֱלֹהִים in the phrase מַטֵּה הָאֱלֹהִים
  chosen_reading: the staff of God
  alternative_readings:
  - God's staff
  rationale: This is not a contested doctrinal term in the excerpt, but the construct
    phrase is best preserved formally. 'The staff of God' also matches established
    Exodus usage and avoids implying ownership nuances beyond the Hebrew.
