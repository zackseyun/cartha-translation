id: EXO.17.9
reference: Exodus 17:9
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר מֹשֶׁ֤ה אֶל יְהוֹשֻׁ֨עַ֙ בְּחַר לָ֣/נוּ אֲנָשִׁ֔ים וְ/צֵ֖א הִלָּחֵ֣ם
    בַּ/עֲמָלֵ֑ק מָחָ֗ר אָנֹכִ֤י נִצָּב֙ עַל רֹ֣אשׁ הַ/גִּבְעָ֔ה וּ/מַטֵּ֥ה הָ/אֱלֹהִ֖ים
    בְּ/יָדִֽ/י־־־׃
translation:
  text: And Moses said to Joshua, “Choose men for us and go out; fight against Amalek.
    Tomorrow I will stand on the top of the hill, with the staff of God in my hand.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “wage war against Amalek.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “on the head of the hill,” an idiom for “on the top of the hill.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative advance; 'And ... said' preserves the Hebrew
    narrative flow without overinterpreting sequence.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  alternatives:
  - Yehoshua
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: בְּחַר לָנוּ אֲנָשִׁים
  chosen: Choose men for us
  alternatives:
  - Choose men on our behalf
  - Select men for us
  lexicon: HALOT
  rationale: בחר means 'choose/select.' אֲנָשִׁים is literally 'men'; this is gender-accurate
    and likely refers to fighting men, so 'men' is preferred over a neutral paraphrase
    like 'people' or 'soldiers.' 'For us' reflects לָנוּ naturally.
- source_word: וְצֵא
  chosen: and go out
  alternatives:
  - then go out
  - and go
  lexicon: HALOT
  rationale: יצא commonly means 'go out.' Retaining 'out' reflects the Hebrew verb
    more closely, likely implying going out to battle.
- source_word: הִלָּחֵם בַּעֲמָלֵק
  chosen: fight against Amalek
  alternatives:
  - wage war against Amalek
  - fight Amalek
  lexicon: HALOT
  rationale: The Niphal imperative of לחם in military context means 'fight/do battle.'
    'Against Amalek' makes the adversarial sense explicit in idiomatic English while
    preserving the preposition.
- source_word: מָחָר
  chosen: Tomorrow
  alternatives:
  - tomorrow
  lexicon: HALOT
  rationale: Fronted adverb is naturally rendered at the start of the next clause
    in English.
- source_word: אָנֹכִי נִצָּב
  chosen: I will stand
  alternatives:
  - I am standing
  - I will station myself
  lexicon: HALOT
  rationale: Though נִצָּב is formally a participle, in context with 'tomorrow' it
    has future force. 'I will stand' is the most natural English rendering.
- source_word: עַל רֹאשׁ הַגִּבְעָה
  chosen: on the top of the hill
  alternatives:
  - on the head of the hill
  - atop the hill
  lexicon: HALOT
  rationale: רֹאשׁ literally 'head' is idiomatically 'top/summit.' 'Hill' is the straightforward
    rendering of גִּבְעָה.
- source_word: וּמַטֵּה הָאֱלֹהִים
  chosen: with the staff of God
  alternatives:
  - and the staff of God
  - with God's staff
  lexicon: HALOT
  rationale: 'The verbless final phrase is most naturally connected adverbially to
    Moses'' standing: he will stand there with the staff in hand. ''Staff of God''
    preserves the construct phrase and echoes earlier usage in Exodus.'
- source_word: בְּיָדִי
  chosen: in my hand
  alternatives:
  - in my own hand
  - at hand
  lexicon: HALOT
  rationale: Direct, literal rendering of the prepositional phrase; it completes the
    image of Moses holding the staff.
