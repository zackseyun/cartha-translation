id: EXO.17.7
reference: Exodus 17:7
source:
  edition: WLC
  text: וַ/יִּקְרָא֙ שֵׁ֣ם הַ/מָּק֔וֹם מַסָּ֖ה וּ/מְרִיבָ֑ה עַל רִ֣יב בְּנֵ֣י יִשְׂרָאֵ֗ל וְ/עַ֨ל נַסֹּתָ֤/ם אֶת יְהוָה֙ לֵ/אמֹ֔ר הֲ/יֵ֧שׁ יְהוָ֛ה בְּ/קִרְבֵּ֖/נוּ אִם אָֽיִן־׀־־׃פ
translation:
  text: And he called the name of the place Massah and Meribah, because of the quarreling of the sons of Israel and because they tested Yahweh, saying, “Is Yahweh among us or not?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Massah sounds like the Hebrew word for 'testing,' and Meribah sounds like the Hebrew word for 'quarreling' or 'contention.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the Israelites' for 'the sons of Israel.'
    reason: lexical_alternative
  - marker: c
    text: Or 'Is the LORD in our midst or not?'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: he called
  alternatives:
  - he named
  lexicon: HALOT
  rationale: The verb קרא with שֵׁם commonly means to name or call. 'He called' preserves the Hebrew idiom, while the following phrase makes the naming sense clear.
- source_word: שֵׁם הַמָּקוֹם
  chosen: the name of the place
  alternatives:
  - the place
  lexicon: HALOT
  rationale: Retaining 'the name of the place' reflects the Hebrew construction rather than smoothing it to simply 'the place,' preserving the formal naming formula.
- source_word: מַסָּה
  chosen: Massah
  alternatives:
  - Testing
  - Trial
  lexicon: HALOT
  rationale: As a place name, it is transliterated per the translation philosophy to transliterate names. Its meaning ('testing') is important contextually but is better preserved in notes rather than replacing the proper name in the main text.
- source_word: וּמְרִיבָה
  chosen: and Meribah
  alternatives:
  - and Quarreling
  - and Contention
  lexicon: HALOT
  rationale: Also a place name, so transliteration is preferred. The semantic force of 'quarreling/contention' is reflected in the explanatory clause that follows.
- source_word: עַל רִיב
  chosen: because of the quarreling
  alternatives:
  - because of the contention
  - on account of the dispute
  lexicon: HALOT
  rationale: עַל here gives the reason for the naming. רִיב denotes strife, dispute, or quarrel. 'Quarreling' is natural modern English and matches the narrative context.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'sons of Israel.' In keeping with gender-accurate philosophy, this is retained rather than flattened to 'Israelites,' though the phrase functions corporately for the people.
- source_word: וְעַל נַסֹּתָם אֶת יְהוָה
  chosen: and because they tested the LORD
  alternatives:
  - and because of their testing of the LORD
  - and because they put the LORD to the test
  lexicon: HALOT
  rationale: נסה in the piel means to test or try. 'They tested the LORD' is direct and clear. The object marker אֶת confirms the LORD as the one being tested.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - by saying
  lexicon: HALOT
  rationale: Standard rendering introducing the content of the people's challenge.
- source_word: הֲיֵשׁ יְהוָה בְּקִרְבֵּנוּ
  chosen: Is the LORD among us
  alternatives:
  - Is the LORD in our midst
  lexicon: HALOT
  rationale: בְּקֶרֶב means 'in the midst/among.' 'Among us' is idiomatic and preserves the sense of divine presence within the community.
- source_word: אִם אָיִן
  chosen: or not
  alternatives:
  - or is he not
  - if not
  lexicon: HALOT
  rationale: This idiom completes the polar question. 'Or not' is concise, natural English.
