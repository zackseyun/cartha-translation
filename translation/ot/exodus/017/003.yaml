theological_decisions:
- issue: Singular pronouns in the people's complaint
  chosen_reading: Retain the singular sequence 'me ... my children ... my livestock'
    in English
  alternative_readings:
  - 'Smooth to plural: ''us ... our children ... our livestock'''
  rationale: The Hebrew text uses singular pronominal forms after a plural subject.
    This likely reflects a representative singular, voicing the complaint as if from
    any individual Israelite. Preserving the singular keeps the texture of the source
    text and avoids silently normalizing it.
  doctrine_reference: Translation philosophy §1, §5
- issue: Complaint verb nuance
  chosen_reading: Render לון as 'grumbled'
  alternative_readings:
  - murmured
  - complained
  rationale: In wilderness narratives this verb carries theological resonance of rebellious
    complaint against God's appointed leader. 'Grumbled' communicates that nuance
    in contemporary English without importing extra doctrinal interpretation.
  doctrine_reference: Translation philosophy §6
