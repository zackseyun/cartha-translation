id: EXO.17.3
reference: Exodus 17:3
source:
  edition: WLC
  text: וַ/יִּצְמָ֨א שָׁ֤ם הָ/עָם֙ לַ/מַּ֔יִם וַ/יָּ֥לֶן הָ/עָ֖ם עַל מֹשֶׁ֑ה וַ/יֹּ֗אמֶר
    לָ֤/מָּה זֶּה֙ הֶעֱלִיתָ֣/נוּ מִ/מִּצְרַ֔יִם לְ/הָמִ֥ית אֹתִ֛/י וְ/אֶת בָּנַ֥/י
    וְ/אֶת מִקְנַ֖/י בַּ/צָּמָֽא־־־׃
translation:
  text: And there the people thirsted for water, and the people grumbled against Moses
    and said, “Why is this—that you brought us up from Egypt to kill me and my children
    and my livestock with thirst?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew has singular forms: ''to kill me and my children and my livestock.''
      The singular likely represents each individual speaker''s complaint, though
      many translations smooth it to the plural.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצְמָא
  chosen: thirsted
  alternatives:
  - was thirsty
  lexicon: HALOT
  rationale: The verb צמא denotes becoming thirsty or suffering thirst. 'Thirsted'
    preserves the verbal force and the narrative sequence better than the stative-sounding
    'was thirsty.'
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Simple locative adverb; 'there' is the most natural and direct rendering.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the people of Israel
  - the populace
  lexicon: HALOT
  rationale: עם here refers to the covenant community in context, but the Hebrew says
    simply 'the people,' so the translation preserves that wording without expansion.
- source_word: לַמַּיִם
  chosen: for water
  alternatives:
  - because of water
  - for the water
  lexicon: HALOT
  rationale: 'The preposition ל with צמא idiomatically expresses the object desired:
    ''thirsted for water.'''
- source_word: וַיָּלֶן
  chosen: grumbled
  alternatives:
  - murmured
  - complained
  lexicon: HALOT
  rationale: לון in wilderness complaint contexts often carries the sense of murmuring/grumbling
    against leadership. 'Grumbled' is readable modern English and captures the hostile
    complaint better than the more archaic 'murmured.'
- source_word: עַל מֹשֶׁה
  chosen: against Moses
  alternatives:
  - to Moses
  - about Moses
  lexicon: HALOT
  rationale: The preposition על with this complaint verb indicates opposition directed
    toward Moses; 'against Moses' best reflects the adversative force.
- source_word: לָמָּה זֶּה
  chosen: Why is this—that
  alternatives:
  - Why did you
  - Why is it that
  lexicon: HALOT
  rationale: The Hebrew is more emphatic than a simple 'why did you'; it literally
    asks 'why this?' before the clause. 'Why is this—that' preserves the rhetorical
    sharpness while remaining understandable.
- source_word: הֶעֱלִיתָנוּ מִמִּצְרַיִם
  chosen: you brought us up from Egypt
  alternatives:
  - you led us up from Egypt
  lexicon: HALOT
  rationale: עלה in the Hiphil commonly means 'bring up' in exodus language. 'Brought
    us up from Egypt' preserves the established exodus idiom.
- source_word: לְהָמִית
  chosen: to kill
  alternatives:
  - to let die
  - to cause to die
  lexicon: HALOT
  rationale: The infinitive of מות in Hiphil is causative. 'To kill' is the most direct
    English equivalent in this accusation.
- source_word: אֹתִי
  chosen: me
  alternatives:
  - us
  lexicon: HALOT
  rationale: Although the speakers are plural, the Hebrew shifts to singular 'me,'
    likely a representative singular expressing each speaker's complaint personally.
    The translation preserves the singular rather than smoothing it to 'us.'
- source_word: בָּנַי
  chosen: my children
  alternatives:
  - my sons
  lexicon: HALOT
  rationale: בנים can mean sons specifically or children more broadly. In this complaint
    context, 'children' is the more natural representative rendering in English unless
    male offspring are specifically in view.
- source_word: מִקְנַי
  chosen: my livestock
  alternatives:
  - my cattle
  - my herds
  lexicon: HALOT
  rationale: מקנה denotes livestock/property in animals generally, not only cattle.
    'Livestock' is broad and accurate.
- source_word: בַּצָּמָא
  chosen: with thirst
  alternatives:
  - by thirst
  - from thirst
  lexicon: HALOT
  rationale: The preposition ב marks means or circumstance. 'With thirst' is a fairly
    literal rendering that preserves the Hebrew image of death by thirst; 'from thirst'
    would also be possible but is slightly more interpretive.
