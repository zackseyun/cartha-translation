id: EXO.13.21
reference: Exodus 13:21
source:
  edition: WLC
  text: וַֽ/יהוָ֡ה הֹלֵךְ֩ לִ/פְנֵי/הֶ֨ם יוֹמָ֜ם בְּ/עַמּ֤וּד עָנָן֙ לַ/נְחֹתָ֣/ם הַ/דֶּ֔רֶךְ וְ/לַ֛יְלָה בְּ/עַמּ֥וּד אֵ֖שׁ לְ/הָאִ֣יר לָ/הֶ֑ם לָ/לֶ֖כֶת יוֹמָ֥ם וָ/לָֽיְלָה׃
translation:
  text: And Yahweh was going before them by day in a pillar of cloud to lead them on the way, and by night in a pillar of fire to give them light, so that they could travel by day and by night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; alternatively rendered ''Yahweh'' in some translations.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for יְהוָה, rendered 'the LORD' rather than a transliteration, following established covenant-name convention while preserving reverence and readability.
- source_word: הֹלֵךְ
  chosen: was going before
  alternatives:
  - went before
  - was walking before
  lexicon: HALOT
  rationale: The participle conveys ongoing action; 'was going before' reflects durative sense better than simple past 'went before.' Combined with לִפְנֵיהֶם to express continual leading presence.
- source_word: לִפְנֵיהֶם
  chosen: before them
  alternatives:
  - ahead of them
  - in front of them
  lexicon: HALOT
  rationale: '''Before them'' is a natural and sufficiently formal rendering of the idiom, preserving both spatial and leadership nuance.'
- source_word: יוֹמָם
  chosen: by day
  alternatives:
  - during the day
  - daytime
  lexicon: HALOT
  rationale: Idiomatic temporal adverb best rendered 'by day' here, especially in parallel with 'by night.'
- source_word: בְּעַמּוּד עָנָן
  chosen: in a pillar of cloud
  alternatives:
  - by a pillar of cloud
  - in the pillar of cloud
  lexicon: HALOT
  rationale: '''Pillar of cloud'' is the established and accurate image for עַמּוּד. The preposition בְּ is rendered ''in'' to reflect manifestation within that visible form; ''a pillar'' fits first mention in this verse.'
- source_word: לַנְחֹתָם
  chosen: to lead them
  alternatives:
  - to guide them
  - to direct them
  lexicon: HALOT
  rationale: From נחה, the sense is guiding/leading. 'Lead them' is concise and fits the movement context of the exodus journey.
- source_word: הַדֶּרֶךְ
  chosen: on the way
  alternatives:
  - along the way
  - the way
  lexicon: HALOT
  rationale: With the leading verb, English idiom prefers 'lead them on the way.' This preserves the definite noun while sounding natural.
- source_word: וְלַיְלָה
  chosen: and by night
  alternatives:
  - and at night
  - and in the night
  lexicon: HALOT
  rationale: Parallel to יוֹמָם / 'by day'; maintains the balanced structure of the verse.
- source_word: בְּעַמּוּד אֵשׁ
  chosen: in a pillar of fire
  alternatives:
  - by a pillar of fire
  lexicon: HALOT
  rationale: Matches the previous phrase structurally and preserves the concrete imagery of divine guidance.
- source_word: לְהָאִיר לָהֶם
  chosen: to give them light
  alternatives:
  - to shine for them
  - to illumine them
  lexicon: HALOT
  rationale: The hiphil of אור means to give light/illumine. 'Give them light' is clear modern English and preserves purpose.
- source_word: לָלֶכֶת
  chosen: so that they could travel
  alternatives:
  - for them to go
  - so that they might go
  - to walk
  lexicon: HALOT
  rationale: In context of Israel's journey, 'travel' communicates purposeful movement better than the overly literal 'go' or 'walk.' The infinitive expresses result/purpose tied to the illumination.
- source_word: יוֹמָם וָלָיְלָה
  chosen: by day and by night
  alternatives:
  - day and night
  lexicon: HALOT
  rationale: Retaining both prepositional phrases mirrors the Hebrew repetition and emphasizes continual ability to move at all times.
