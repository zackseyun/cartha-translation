id: EXO.13.20
reference: Exodus 13:20
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מִ/סֻּכֹּ֑ת וַ/יַּחֲנ֣וּ בְ/אֵתָ֔ם בִּ/קְצֵ֖ה הַ/מִּדְבָּֽר׃
translation:
  text: They set out from Succoth and camped at Etham, on the edge of the wilderness.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: From נסע in the wayyiqtol plural, indicating the next narrative action
    of breaking camp and moving on. 'Set out' is natural modern English and preserves
    the travel sense without unnecessary formality.
- source_word: מִסֻּכֹּת
  chosen: from Succoth
  lexicon: HALOT
  rationale: Proper place name with prefixed preposition מִן ('from'). Following the
    translation philosophy, names are transliterated rather than translated.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: From חנה, 'to camp, encamp.' 'Camped' is the clearer modern English equivalent;
    'encamped' is more formal but not necessary here.
- source_word: בְאֵתָם
  chosen: at Etham
  alternatives:
  - in Etham
  lexicon: HALOT
  rationale: Proper place name with prefixed בְ. 'At Etham' fits English idiom for
    arrival at a location in travel narrative better than 'in Etham,' while preserving
    the locative sense.
- source_word: בִּקְצֵה
  chosen: on the edge of
  alternatives:
  - at the end of
  - at the border of
  lexicon: HALOT
  rationale: קָצֶה denotes an extremity, edge, or border. 'On the edge of' is the
    most idiomatic rendering in this geographical context.
- source_word: הַמִּדְבָּר
  chosen: the wilderness
  alternatives:
  - the desert
  lexicon: HALOT
  rationale: מִדְבָּר commonly refers to wilderness or steppe land, not necessarily
    sandy desert. 'Wilderness' better matches biblical usage and avoids over-specifying
    terrain.
