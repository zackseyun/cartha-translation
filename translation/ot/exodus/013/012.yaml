id: EXO.13.12
reference: Exodus 13:12
source:
  edition: WLC
  text: וְ/הַעֲבַרְתָּ֥ כָל פֶּֽטֶר רֶ֖חֶם לַֽ/יהֹוָ֑ה וְ/כָל פֶּ֣טֶר שֶׁ֣גֶר בְּהֵמָ֗ה אֲשֶׁ֨ר יִהְיֶ֥ה לְ/ךָ֛ הַ/זְּכָרִ֖ים לַ/יהוָֽה־־־׀׃
translation:
  text: you shall set apart to Yahweh every one that opens the womb, and every male firstborn of the livestock that you have belongs to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'every opener of the womb.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'every first issue of the livestock'; the Hebrew refers to the first offspring born from the womb among domesticated animals, with the males specifically belonging to the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַעֲבַרְתָּ
  chosen: you shall set apart
  alternatives:
  - you shall cause to pass over
  - you shall transfer
  - you shall dedicate
  lexicon: HALOT
  rationale: The Hiphil of עבר literally means 'cause to pass over/pass along,' but in this cultic context it refers to transferring or dedicating something to YHWH. 'Set apart' communicates the consecratory sense in clear English without over-paraphrasing.
- source_word: פֶּטֶר רֶחֶם
  chosen: every one that opens the womb
  alternatives:
  - every firstborn
  - every opener of the womb
  lexicon: HALOT
  rationale: The phrase is literally 'opener of the womb' and refers to the first issue from the womb. Rendering it more literally preserves the idiom and its legal/cultic precision better than simply 'firstborn,' though the latter is conceptually related.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: פֶּטֶר שֶׁגֶר בְּהֵמָה
  chosen: every firstborn male offspring of the livestock
  alternatives:
  - every opener of the issue of livestock
  - every first issue of cattle/animals
  lexicon: HALOT
  rationale: שֶׁגֶר refers to offspring/issue, especially of animals. Combined with פֶּטֶר and clarified by הַזְּכָרִים later in the verse, the sense is the firstborn offspring among livestock, specifically the males. This rendering is natural English while preserving the animal-birth focus.
- source_word: אֲשֶׁר יִהְיֶה לְךָ
  chosen: that you have
  alternatives:
  - that belongs to you
  - that is yours
  lexicon: HALOT
  rationale: The clause identifies the livestock in the addressee's possession. 'That you have' is idiomatic and concise, without changing the possessive sense.
- source_word: הַזְּכָרִים
  chosen: male
  alternatives:
  - the males
  lexicon: HALOT
  rationale: 'The Hebrew plural with article functions class-wise: the male ones among such offspring. In English, ''male'' modifying ''offspring'' is the most natural equivalent while preserving the gender-specific requirement.'
- source_word: לַיהוָה
  chosen: belongs to the LORD
  alternatives:
  - shall be the LORD's
  - are for the LORD
  lexicon: HALOT
  rationale: The final phrase states ownership/consecration. 'Belongs to the LORD' makes the legal-sacral force explicit in natural English.
