id: EXO.13.14
reference: Exodus 13:14
source:
  edition: WLC
  text: וְ/הָיָ֞ה כִּֽי יִשְׁאָלְ/ךָ֥ בִנְ/ךָ֛ מָחָ֖ר לֵ/אמֹ֣ר מַה זֹּ֑את וְ/אָמַרְתָּ֣ אֵלָ֔י/ו בְּ/חֹ֣זֶק יָ֗ד הוֹצִיאָ֧/נוּ יְהוָ֛ה מִ/מִּצְרַ֖יִם מִ/בֵּ֥ית עֲבָדִֽים־־׃
translation:
  text: And when your son asks you in time to come, saying, ‘What is this?’ then you shall say to him, ‘By strength of hand Yahweh brought us out from Egypt, from the house of slavery.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'tomorrow.' Here the Hebrew idiom refers to a future time, not necessarily the next day.
    reason: lexical_alternative
  - marker: b
    text: Or, 'What does this mean?'
    reason: lexical_alternative
  - marker: c
    text: Traditionally, 'from the house of bondage' or 'from the house of slavery.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  chosen: And when
  alternatives:
  - And it shall be, when
  - Now when
  lexicon: HALOT
  rationale: This idiom introduces a future contingency. 'And when' preserves the forward-looking sense without wooden English.
- source_word: יִשְׁאָלְךָ בִנְךָ
  chosen: your son asks you
  alternatives:
  - your son shall ask you
  lexicon: HALOT
  rationale: The imperfect here is naturally future in context. 'Son' is retained as gender-accurate to the Hebrew singular masculine, in keeping with the translation philosophy.
- source_word: מָחָר
  chosen: in time to come
  alternatives:
  - tomorrow
  - later
  lexicon: HALOT
  rationale: Although literally 'tomorrow,' in idiomatic contexts like this it means a future time, not necessarily the next day. 'In time to come' conveys the idiomatic force in natural English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and says
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing the son's question.
- source_word: מַה זֹּאת
  chosen: What is this?
  alternatives:
  - What does this mean?
  - What is this thing?
  lexicon: HALOT
  rationale: A direct, simple rendering fits the Hebrew. The broader meaning 'What does this mean?' is interpretive and better preserved as an alternative.
- source_word: וְאָמַרְתָּ אֵלָיו
  chosen: then you shall say to him
  alternatives:
  - and you shall say to him
  lexicon: HALOT
  rationale: The sequence is instructional; 'then' clarifies the response relation in English while preserving the imperative-future force.
- source_word: בְּחֹזֶק יָד
  chosen: By a mighty hand
  alternatives:
  - By strength of hand
  - With a strong hand
  lexicon: HALOT
  rationale: The idiom denotes powerful divine action. 'Mighty hand' is idiomatic English and preserves the anthropomorphic metaphor.
- source_word: הוֹצִיאָנוּ
  chosen: brought us out
  alternatives:
  - brought us forth
  - led us out
  lexicon: HALOT
  rationale: The hiphil of יצא means 'cause to go out' or 'bring out.' 'Brought us out' is standard, clear English and fits the exodus context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִמִּצְרַיִם
  chosen: from Egypt
  lexicon: HALOT
  rationale: Straightforward geographic source phrase.
- source_word: מִבֵּית עֲבָדִים
  chosen: from the house of slaves
  alternatives:
  - from the house of slavery
  - from the slave house
  - from the house of servants
  lexicon: HALOT
  rationale: Literally 'from a house of slaves/slavery.' 'House of slaves' preserves the concrete Hebrew image and the bonded condition more sharply than the traditional abstract 'house of bondage.' Because עֲבָדִים is plural 'slaves,' this rendering reflects the lexical form while still communicating Egypt as the place of enslavement.
