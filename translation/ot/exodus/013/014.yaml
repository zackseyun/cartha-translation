theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Degree of literalness in the idiom מָחָר
  chosen_reading: in time to come
  alternative_readings:
  - tomorrow
  rationale: A strictly literal 'tomorrow' would likely mislead modern readers into a next-day timeframe, whereas the Hebrew idiom here refers more broadly to the future. Optimal equivalence favors the idiomatic sense.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
