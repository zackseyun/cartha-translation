id: EXO.13.10
reference: Exodus 13:10
source:
  edition: WLC
  text: וְ/שָׁמַרְתָּ֛ אֶת הַ/חֻקָּ֥ה הַ/זֹּ֖את לְ/מוֹעֲדָ֑/הּ מִ/יָּמִ֖ים יָמִֽימָ/ה־׃ס
translation:
  text: You shall keep this statute at its appointed time from days to days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from days to days,'' an idiom often understood here as ''year
      by year.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמַרְתָּ
  chosen: You shall keep
  alternatives:
  - You shall observe
  - You shall guard
  lexicon: HALOT
  rationale: שׁמר commonly means keep, observe, or guard. In legal/cultic contexts,
    'keep' is a natural English rendering that preserves both obedience and continuity
    without over-paraphrasing.
- source_word: הַחֻקָּה הַזֹּאת
  chosen: this statute
  alternatives:
  - this ordinance
  - this prescribed rule
  lexicon: HALOT
  rationale: חֻקָּה often denotes a fixed prescription or statute. 'Statute' is concise
    and suitably formal for covenantal legislation; 'ordinance' is possible but can
    sound more ecclesiastical in modern English.
- source_word: לְמוֹעֲדָהּ
  chosen: at its appointed time
  alternatives:
  - at its appointed season
  - at the time appointed for it
  lexicon: HALOT
  rationale: מוֹעֵד refers to an appointed time or set occasion. The pronominal suffix
    indicates the time appointed for this observance. 'At its appointed time' is idiomatic
    and preserves the calendrical force.
- source_word: מִיָּמִים יָמִימָה
  chosen: from days to days
  alternatives:
  - year by year
  - from year to year
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'from days to days.' In this context, because
    the feast is annual, many translations render the sense as 'year by year.' However,
    the source text itself uses 'days,' so the main text preserves the Hebrew expression
    more transparently, with the idiomatic sense noted in a footnote.
