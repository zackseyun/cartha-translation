id: EXO.13.19
reference: Exodus 13:19
source:
  edition: WLC
  text: וַ/יִּקַּ֥ח מֹשֶׁ֛ה אֶת עַצְמ֥וֹת יוֹסֵ֖ף עִמּ֑/וֹ כִּי֩ הַשְׁבֵּ֨עַ הִשְׁבִּ֜יעַ
    אֶת בְּנֵ֤י יִשְׂרָאֵל֙ לֵ/אמֹ֔ר פָּקֹ֨ד יִפְקֹ֤ד אֱלֹהִים֙ אֶתְ/כֶ֔ם וְ/הַעֲלִיתֶ֧ם
    אֶת עַצְמֹתַ֛/י מִ/זֶּ֖ה אִתְּ/כֶֽם־־־׃
translation:
  text: And Moses took Joseph’s bones with him, because Joseph had made the sons of
    Israel solemnly swear, saying, “God will surely attend to you, and you shall bring
    up my bones from here with you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “God will surely visit you.” The Hebrew idiom can denote God’s decisive
      intervention on behalf of his people.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - carried
  - took away
  lexicon: HALOT
  rationale: Qal wayyiqtol of לקח, the standard narrative verb 'take.' 'Took' is the
    most natural and sufficiently formal rendering in context.
- source_word: עַצְמוֹת
  chosen: bones
  alternatives:
  - remains
  lexicon: HALOT
  rationale: Literal 'bones' best matches עַצְמוֹת and preserves the concrete wording
    of the Hebrew. 'Remains' is interpretive and less precise.
- source_word: עִמּוֹ
  chosen: with him
  alternatives:
  - along with him
  lexicon: HALOT
  rationale: Simple accompaniment preposition with 3ms suffix; 'with him' is direct
    and idiomatic.
- source_word: הַשְׁבֵּעַ הִשְׁבִּיעַ
  chosen: had made ... solemnly swear
  alternatives:
  - had strictly charged
  - had put under oath
  lexicon: HALOT
  rationale: The infinitive absolute plus finite Hiphil intensifies the action. 'Made
    ... solemnly swear' preserves both the causative sense and the emphatic force
    better than a flatter 'made swear.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Gender-accurate rendering follows the source expression literally enough
    while remaining readable. 'Israelites' is possible but loses the familial idiom;
    'children of Israel' is traditional but less natural in contemporary English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - by saying
  lexicon: HALOT
  rationale: Standard quotative infinitive construct introducing direct speech.
- source_word: פָּקֹד יִפְקֹד
  chosen: will surely attend to
  alternatives:
  - will surely visit
  - will certainly take notice of
  - will surely come to your aid
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb conveys certainty/emphasis.
    In this context of divine intervention and fulfillment, 'attend to' communicates
    purposeful action without the archaic ambiguity of 'visit.'
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Common singular reference to Israel's God in this context.
- source_word: וְהַעֲלִיתֶם
  chosen: and you shall bring up
  alternatives:
  - then you shall carry up
  - and you must bring up
  lexicon: HALOT
  rationale: Hiphil perfect with prefixed conjunction in quoted oath context has future/obligational
    force. 'Bring up' preserves the directional nuance of עלה from Egypt.
- source_word: עַצְמֹתַי
  chosen: my bones
  alternatives:
  - my remains
  lexicon: HALOT
  rationale: Literal rendering preserves the personal, concrete expression.
- source_word: מִזֶּה
  chosen: from here
  alternatives:
  - from this place
  lexicon: HALOT
  rationale: Deictic expression referring to Egypt/the present location. 'From here'
    is natural and sufficiently precise.
- source_word: אִתְּכֶם
  chosen: with you
  alternatives:
  - along with you
  lexicon: HALOT
  rationale: Straightforward accompaniment; repetition with earlier עִמּוֹ is preserved
    because the Hebrew repeats the idea.
