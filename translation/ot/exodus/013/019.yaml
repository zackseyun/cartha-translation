theological_decisions:
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: Following the project's gender-accurate principle, the familial idiom
    is retained rather than neutralized. The phrase refers corporately to Israel's
    descendants, but the Hebrew wording is explicitly 'sons.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering of פָּקֹד יִפְקֹד אֱלֹהִים אֶתְכֶם
  chosen_reading: God will surely attend to you
  alternative_readings:
  - God will surely visit you
  - God will surely take notice of you
  rationale: The Hebrew idiom denotes certain divine intervention/care. 'Attend to'
    communicates this clearly in modern English while preserving theological tension
    between visitation, remembrance, and action without over-specifying the mode of
    God's intervention.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
