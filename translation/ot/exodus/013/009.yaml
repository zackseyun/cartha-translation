theological_decisions:
- issue: Whether the hand/eyes language should be rendered literally or interpreted as later phylactery practice
  chosen_reading: 'Retain the literal imagery in the main text: ''a sign on your hand'' and ''a memorial between your eyes.'''
  alternative_readings:
  - Interpret as 'bound on your arm' and 'on your forehead' with explicit allusion to phylacteries/tefillin
  - Treat the language as purely metaphorical and paraphrase as inward remembrance
  rationale: The Hebrew text itself uses concrete imagery without explicitly naming later ritual objects. Preserving the literal wording maintains theological and interpretive openness, in keeping with the doctrine's instruction to preserve tension rather than resolve ambiguity beyond what the source warrants.
  doctrine_reference: Translation philosophy §3; §1
- issue: Rendering תּוֹרָה in this context
  chosen_reading: Translate as 'law' rather than 'instruction' in the main text.
  alternative_readings:
  - instruction
  - Torah
  rationale: Both are lexically possible. In this covenantal and commemorative setting, 'law of the LORD' is idiomatic and weighty in English, while still within the semantic range of תּוֹרָה. The alternative is preserved in a footnote because 'instruction' may better capture the broader Hebrew sense.
  doctrine_reference: Translation philosophy §5
