id: EXO.13.9
reference: Exodus 13:9
source:
  edition: WLC
  text: וְ/הָיָה֩ לְ/ךָ֨ לְ/א֜וֹת עַל יָדְ/ךָ֗ וּ/לְ/זִכָּרוֹן֙ בֵּ֣ין עֵינֶ֔י/ךָ לְמַ֗עַן תִּהְיֶ֛ה תּוֹרַ֥ת יְהוָ֖ה בְּ/פִ֑י/ךָ כִּ֚י בְּ/יָ֣ד חֲזָקָ֔ה הוֹצִֽאֲ/ךָ֥ יְהֹוָ֖ה מִ/מִּצְרָֽיִם־׃
translation:
  text: And it shall be for you as a sign on your hand and as a memorial between your eyes, so that the law of Yahweh may be in your mouth; for with a strong hand Yahweh brought you out of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'between your eyes' may be understood idiomatically as 'on your forehead'; the Hebrew wording is kept literal here.
    reason: lexical_alternative
  - marker: b
    text: Or 'the instruction of the LORD.' Hebrew torah can mean 'law' or 'instruction,' depending on context.
    reason: lexical_alternative
  - marker: c
    text: Traditional English often has 'with a mighty hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it shall be
  alternatives:
  - And it will be
  - And it shall become
  lexicon: HALOT
  rationale: 'Qal perfect with prefixed conjunction in this legal/instructional context functions prospectively: the observance is to serve as something for Israel. ''Shall be'' preserves the formal force and fits English legal-instruction style.'
- source_word: לְאוֹת
  chosen: as a sign
  alternatives:
  - for a sign
  - as a mark
  lexicon: HALOT
  rationale: אוֹת commonly denotes a sign, token, or distinguishing mark. 'Sign' is the most standard and semantically broad rendering here, preserving possible symbolic rather than strictly physical force.
- source_word: עַל יָדְךָ
  chosen: on your hand
  alternatives:
  - upon your hand
  - on your arm
  lexicon: HALOT
  rationale: יָד is literally 'hand,' though in some contexts it can extend to arm/power. Here the idiom is best kept literally as 'on your hand' to preserve the wording that later informed phylactery practice without forcing that interpretation into the main text.
- source_word: וּלְזִכָּרוֹן
  chosen: and as a memorial
  alternatives:
  - and as a reminder
  - and for remembrance
  lexicon: HALOT
  rationale: זִכָּרוֹן denotes memorial/remembrance. 'Memorial' preserves the noun's covenantal and commemorative weight better than the more colloquial 'reminder,' while remaining readable.
- source_word: בֵּין עֵינֶיךָ
  chosen: between your eyes
  alternatives:
  - before your eyes
  - on your forehead
  lexicon: HALOT
  rationale: The Hebrew is literally 'between your eyes.' This should be preserved in the main text because it is the source wording; 'on your forehead' is interpretive and better suited to a footnote if needed.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the sake that
  lexicon: HALOT
  rationale: לְמַעַן introduces purpose. 'So that' is natural modern English and accurately conveys the clause's telic force.
- source_word: תּוֹרַת יְהוָה
  chosen: the law of the LORD
  alternatives:
  - the instruction of the LORD
  - the Torah of the LORD
  lexicon: HALOT
  rationale: תּוֹרָה can mean instruction or law. In Exodus covenantal context, 'law' is the most idiomatic English rendering, though 'instruction' is a legitimate alternative. YHWH is rendered 'the LORD' per doctrine.
- source_word: בְּפִיךָ
  chosen: in your mouth
  alternatives:
  - on your lips
  lexicon: HALOT
  rationale: The Hebrew is literally 'in your mouth.' This idiom points to spoken recitation or ready confession; the literal rendering is clear in English and preserves the imagery.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Here כִּי gives the ground or explanation for the command's memorial purpose. 'For' fits the explanatory relation and preserves a slightly more formal connective.
- source_word: בְּיָד חֲזָקָה
  chosen: with a strong hand
  alternatives:
  - by a mighty hand
  - with a mighty hand
  lexicon: HALOT
  rationale: The phrase is a standard Exodus idiom for YHWH's powerful deliverance. 'Strong hand' is closer to חֲזָקָה, while 'mighty hand' is a common English traditional rendering. The more literal choice is retained in the main text.
- source_word: הוֹצִאֲךָ
  chosen: brought you out
  alternatives:
  - led you out
  - caused you to go out
  lexicon: HALOT
  rationale: Hiphil of יצא means to bring out/cause to go out. 'Brought you out' is idiomatic English and standard for exodus/deliverance contexts.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִמִּצְרָיִם
  chosen: out of Egypt
  alternatives:
  - from Egypt
  lexicon: HALOT
  rationale: With הוֹצִיא, 'out of Egypt' is the most natural collocation in English and emphasizes deliverance from within the land/bondage.
