id: EXO.13.22
reference: Exodus 13:22
source:
  edition: WLC
  text: לֹֽא יָמִ֞ישׁ עַמּ֤וּד הֶֽ/עָנָן֙ יוֹמָ֔ם וְ/עַמּ֥וּד הָ/אֵ֖שׁ לָ֑יְלָה לִ/פְנֵ֖י
    הָ/עָֽם־׃פ
translation:
  text: The pillar of cloud by day and the pillar of fire by night did not depart
    from before the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not move away from before the people.' The Hebrew verb emphasizes
      that the guiding pillars remained continually present.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָמִישׁ
  chosen: did not depart
  alternatives:
  - did not move away
  - did not withdraw
  - did not leave
  lexicon: HALOT
  rationale: The verb from מוּשׁ denotes removal or departure. 'Did not depart' is
    natural English and preserves the sense that the pillars remained continually
    present rather than merely pausing.
- source_word: עַמּוּד
  chosen: pillar
  alternatives:
  - column
  lexicon: HALOT
  rationale: '''Pillar'' is the standard and clearest rendering for a vertical column-like
    manifestation; ''column'' is possible but less idiomatic in this narrative context.'
- source_word: הֶעָנָן
  chosen: cloud
  lexicon: HALOT
  rationale: Straightforward rendering of עָנָן as 'cloud.' The article is naturally
    represented in English by 'the pillar of cloud.'
- source_word: יוֹמָם
  chosen: by day
  alternatives:
  - in the daytime
  - during the day
  lexicon: HALOT
  rationale: The adverbial form indicates time. 'By day' pairs idiomatically with
    'by night' and matches the narrative contrast.
- source_word: וְעַמּוּד הָאֵשׁ
  chosen: and the pillar of fire
  alternatives:
  - and the column of fire
  lexicon: HALOT
  rationale: Maintains the parallel structure with 'the pillar of cloud' and preserves
    the concrete imagery of fire.
- source_word: לָיְלָה
  chosen: by night
  alternatives:
  - at night
  - in the night
  lexicon: HALOT
  rationale: Adverbial accusative of time; 'by night' best preserves the balanced
    Hebrew expression with יוֹמָם.
- source_word: לִפְנֵי
  chosen: from before
  alternatives:
  - from the presence of
  - before
  lexicon: HALOT
  rationale: With יָמִישׁ, the preposition expresses movement away from a position
    in front of the people. 'From before' is slightly formal but accurately reflects
    the spatial relation without over-paraphrasing.
- source_word: הָעָם
  chosen: the people
  lexicon: HALOT
  rationale: Definite singular collective noun; 'the people' is the natural English
    equivalent in context, referring to Israel as a corporate body.
