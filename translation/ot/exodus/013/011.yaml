id: EXO.13.11
reference: Exodus 13:11
source:
  edition: WLC
  text: וְ/הָיָ֞ה כִּֽי יְבִֽאֲ/ךָ֤ יְהוָה֙ אֶל אֶ֣רֶץ הַֽ/כְּנַעֲנִ֔י כַּ/אֲשֶׁ֛ר נִשְׁבַּ֥ע לְ/ךָ֖ וְ/לַֽ/אֲבֹתֶ֑י/ךָ וּ/נְתָנָ֖/הּ לָֽ/ךְ־־׃
translation:
  text: And when Yahweh brings you into the land of the Canaanites, as he swore to you and to your fathers, and gives it to you,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''And it shall be when.'' The translation smooths the idiom to ''And when.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'to your ancestors'; Hebrew literally 'to your fathers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  chosen: And when
  alternatives:
  - And it shall be when
  - Now when
  lexicon: HALOT
  rationale: This construction introduces a future circumstance or transition. 'And when' preserves the temporal force of כִּי with smoother modern English than the more wooden 'and it shall be when,' while retaining the forward-looking sense.
- source_word: יְבִיאֲךָ
  chosen: brings you
  alternatives:
  - brings you in
  - has brought you
  lexicon: HALOT
  rationale: Hiphil of בוא with 2ms suffix means 'cause you to come' or 'bring you.' 'Brings you' is natural English and fits the following prepositional phrase 'into the land.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל אֶרֶץ הַכְּנַעֲנִי
  chosen: into the land of the Canaanites
  alternatives:
  - to the land of the Canaanites
  - into Canaan
  lexicon: HALOT
  rationale: אֶל marks motion toward/into; with יְבִיאֲךָ, 'into' is idiomatic. 'Land of the Canaanites' translates the gentilic phrase directly and avoids collapsing it into the later shorthand 'Canaan.'
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - according as
  lexicon: HALOT
  rationale: Introduces comparison to the prior oath. 'As' is concise and accurate in context.
- source_word: נִשְׁבַּע
  chosen: he swore
  alternatives:
  - he had sworn
  - he took an oath
  lexicon: HALOT
  rationale: The Niphal of שׁבע commonly means 'swear, take an oath.' 'He swore' is the standard direct rendering and fits the narrative sequence.
- source_word: לְךָ וְלַאֲבֹתֶיךָ
  chosen: to you and to your fathers
  alternatives:
  - to you and your fathers
  - to you and to your ancestors
  lexicon: HALOT
  rationale: The repeated preposition is preserved for clarity. 'Fathers' is retained rather than 'ancestors' because the Hebrew is explicitly paternal and the doctrine prefers gender-accurate renderings where that matches the source.
- source_word: וּנְתָנָהּ לָךְ
  chosen: and gives it to you
  alternatives:
  - and has given it to you
  - and gives it over to you
  lexicon: HALOT
  rationale: The clause continues the future-oriented scenario. 'Gives it to you' is straightforward and idiomatic; the 3fs suffix refers back to 'land,' hence 'it.'
