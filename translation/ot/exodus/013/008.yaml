id: EXO.13.8
reference: Exodus 13:8
source:
  edition: WLC
  text: וְ/הִגַּדְתָּ֣ לְ/בִנְ/ךָ֔ בַּ/יּ֥וֹם הַ/ה֖וּא לֵ/אמֹ֑ר בַּ/עֲב֣וּר זֶ֗ה עָשָׂ֤ה יְהוָה֙ לִ֔/י בְּ/צֵאתִ֖/י מִ/מִּצְרָֽיִם׃
translation:
  text: And you shall tell your son on that day, saying, ‘It is because of this that Yahweh acted for me when I came out of Egypt.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the LORD did this for me when I went out of Egypt.' The Hebrew can be understood with 'this' linked either to the reason for the observance or more directly to what the LORD did.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִגַּדְתָּ
  chosen: And you shall tell
  alternatives:
  - And you shall declare
  - And you shall explain
  lexicon: HALOT
  rationale: Hiphil of נגד commonly means to tell, declare, or make known. 'Tell' is natural modern English and fits direct instruction to a parent without losing the causative/reporting sense.
- source_word: לְבִנְךָ
  chosen: your son
  alternatives:
  - to your son
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object. English can express this naturally as 'tell your son.' 'Son' is retained rather than a gender-neutral substitute because the Hebrew is singular masculine and the translation philosophy prefers gender-accurate renderings.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  - that day
  lexicon: HALOT
  rationale: Standard temporal expression. 'On that day' is idiomatic and preserves the demonstrative emphasis.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and say
  - thus
  lexicon: HALOT
  rationale: This infinitive introduces the content of the speech. 'Saying' preserves the formal structure while remaining readable.
- source_word: בַּעֲבוּר זֶה
  chosen: because of this
  alternatives:
  - for the sake of this
  - on account of this
  - this is because of what
  lexicon: HALOT
  rationale: The phrase indicates reason or basis. 'Because of this' best captures the causal force in clear English. More literal 'for the sake of this' is possible but less natural here.
- source_word: עָשָׂה יְהוָה לִי
  chosen: the LORD acted for me
  alternatives:
  - the LORD did this for me
  - the LORD dealt with me
  - the LORD worked for me
  lexicon: HALOT
  rationale: עשה is semantically broad ('do, make, act'). Here an English object is not explicit, so 'acted for me' avoids over-specifying while still reading naturally. It also preserves the sense that the LORD intervened on the speaker's behalf.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּצֵאתִי מִמִּצְרָיִם
  chosen: when I came out of Egypt
  alternatives:
  - at my going out from Egypt
  - when I went out from Egypt
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב conveys temporal circumstance. 'When I came out of Egypt' is idiomatic and preserves the first-person singular perspective of the Hebrew.
