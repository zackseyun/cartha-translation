id: EXO.13.7
reference: Exodus 13:7
source:
  edition: WLC
  text: מַצּוֹת֙ יֵֽאָכֵ֔ל אֵ֖ת שִׁבְעַ֣ת הַ/יָּמִ֑ים וְ/לֹֽא יֵרָאֶ֨ה לְ/ךָ֜ חָמֵ֗ץ
    וְ/לֹֽא יֵרָאֶ֥ה לְ/ךָ֛ שְׂאֹ֖ר בְּ/כָל גְּבֻלֶֽ/ךָ־־־׃
translation:
  text: Unleavened bread shall be eaten throughout the seven days, and no leavened
    bread shall be seen with you, and no yeast shall be seen with you within all your
    territory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'anything leavened' for 'leavened bread.' The Hebrew חָמֵץ denotes what
      is leavened, while שְׂאֹר in the next clause refers more specifically to the
      leavening agent itself.
    reason: lexical_alternative
  - marker: b
    text: Literally 'shall not be seen with you.' The wording implies that no leavened
      product or yeast is to remain anywhere in your possession or domain during the
      seven days.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַצּוֹת
  chosen: unleavened bread
  alternatives:
  - unleavened cakes
  - matzot
  lexicon: HALOT
  rationale: Refers to bread made without leaven in the Passover context. 'Unleavened
    bread' is clear modern English and preserves the ritual sense better than transliteration.
- source_word: יֵאָכֵל
  chosen: shall be eaten
  alternatives:
  - is to be eaten
  - must be eaten
  lexicon: HALOT
  rationale: Niphal imperfect gives a passive sense. 'Shall be eaten' preserves the
    formal force of the Hebrew without over-interpreting as an explicit imperative
    stronger than the form warrants.
- source_word: אֵת שִׁבְעַת הַיָּמִים
  chosen: throughout the seven days
  alternatives:
  - for seven days
  - during the seven days
  lexicon: HALOT
  rationale: The accusative of duration marks the full span of time. 'Throughout the
    seven days' makes explicit that the practice extends across the entire festival
    period.
- source_word: יֵרָאֶה לְךָ
  chosen: shall be seen with you
  alternatives:
  - shall be seen by you
  - shall appear to you
  - shall be found with you
  lexicon: HALOT
  rationale: The Niphal of ראה is literally 'be seen.' In this legal-ritual context,
    'with you' captures the idiomatic force that such items must not be present in
    one's possession or domain, while staying close to the Hebrew wording.
- source_word: חָמֵץ
  chosen: leavened bread
  alternatives:
  - anything leavened
  - leaven
  lexicon: HALOT
  rationale: In distinction from שְׂאֹר later in the verse, חָמֵץ here denotes what
    is leavened, especially leavened food/bread. Rendering it 'leavened bread' helps
    preserve the contrast with 'yeast' for שְׂאֹר.
- source_word: שְׂאֹר
  chosen: yeast
  alternatives:
  - leaven
  - sourdough starter
  lexicon: HALOT
  rationale: This term refers to the fermenting agent itself, distinct from חָמֵץ,
    which is the leavened product. 'Yeast' is accessible modern English; 'leaven'
    is a viable alternative but less transparent for many readers.
- source_word: בְּכָל גְּבֻלֶךָ
  chosen: within all your territory
  alternatives:
  - in all your borders
  - throughout all your territory
  - within all your borders
  lexicon: HALOT
  rationale: The phrase refers to the full extent of the Israelite's domain or boundaries.
    'Within all your territory' is natural English and preserves the comprehensive
    scope.
