id: EXO.13.6
reference: Exodus 13:6
source:
  edition: WLC
  text: שִׁבְעַ֥ת יָמִ֖ים תֹּאכַ֣ל מַצֹּ֑ת וּ/בַ/יּוֹם֙ הַ/שְּׁבִיעִ֔י חַ֖ג לַ/יהוָֽה׃
translation:
  text: For seven days you shall eat unleavened bread, and on the seventh day there shall be a feast to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
  - marker: b
    text: Or 'a festival to the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁבְעַת יָמִים
  chosen: For seven days
  alternatives:
  - Seven days
  lexicon: HALOT
  rationale: The construct phrase denotes duration. English idiom can be either bare ('Seven days') or marked ('For seven days'). 'For seven days' makes the durative force explicit and reads naturally in modern English.
- source_word: תֹּאכַל
  chosen: you shall eat
  alternatives:
  - you are to eat
  - you must eat
  lexicon: HALOT
  rationale: Qal imperfect 2ms in legal/instructional context carries directive force. 'You shall eat' preserves the covenantal/instructional tone without overstrengthening to 'must'.
- source_word: מַצּוֹת
  chosen: unleavened bread
  alternatives:
  - unleavened loaves
  - matzot
  lexicon: HALOT
  rationale: The noun refers to unleavened bread in the Passover/Feast context. 'Unleavened bread' is the standard clear English rendering; transliteration is unnecessary in the main text.
- source_word: וּבַיּוֹם הַשְּׁבִיעִי
  chosen: and on the seventh day
  alternatives:
  - but on the seventh day
  lexicon: HALOT
  rationale: The conjunction is simple waw, best rendered 'and' here. The prepositional phrase marks the time of the following clause.
- source_word: חַג
  chosen: a feast
  alternatives:
  - a festival
  - festival observance
  lexicon: HALOT
  rationale: חַג denotes a festival/feast, often with pilgrimage or celebratory-sacral overtones. 'Feast' is concise and traditional while still understandable; 'festival' is possible but slightly flatter in this cultic setting.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The preposition ל marks dedication or relation. 'To the LORD' preserves the sense of a feast directed/dedicated to YHWH. Per doctrine, יהוה is rendered 'the LORD' rather than 'Yahweh' in the main text.
