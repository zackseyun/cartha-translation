theological_decisions:
- issue: Whether the hand/eyes language should be rendered literally or interpreted
    as later ritual objects
  chosen_reading: Retain the concrete imagery literally in the main text ('on your
    hand' / 'frontlets between your eyes')
  alternative_readings:
  - Interpret as specifically 'phylacteries' in the main text
  - Render non-literally as a figurative reminder
  rationale: The Hebrew itself uses image-rich language without explicitly naming
    later ritual practice. Preserving the wording maintains interpretive openness
    and avoids resolving whether the command is primarily literal, symbolic, or both.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
