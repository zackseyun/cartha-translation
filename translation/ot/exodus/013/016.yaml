id: EXO.13.16
reference: Exodus 13:16
source:
  edition: WLC
  text: וְ/הָיָ֤ה לְ/אוֹת֙ עַל יָ֣דְ/כָ֔ה וּ/לְ/טוֹטָפֹ֖ת בֵּ֣ין עֵינֶ֑י/ךָ כִּ֚י
    בְּ/חֹ֣זֶק יָ֔ד הוֹצִיאָ֥/נוּ יְהוָ֖ה מִ/מִּצְרָֽיִם־׃ס
translation:
  text: And it shall be as a sign on your hand and as frontlets between your eyes,
    for with a strong hand the LORD brought us out from Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bands'; traditionally 'phylacteries.' The Hebrew term is rare and likely
      refers to something worn on the forehead as a reminder.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'between your eyes,' an idiom often understood as 'on your forehead.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it shall be
  alternatives:
  - And it will be
  - And it shall serve as
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this instructional context functions
    futurally/resultatively, introducing the continuing significance of the ordinance.
- source_word: לְאוֹת
  chosen: as a sign
  alternatives:
  - for a sign
  - as a mark
  lexicon: HALOT
  rationale: אוֹת commonly denotes a sign or token. 'Sign' is the most natural and
    sufficiently broad rendering here.
- source_word: עַל יָדְכָה
  chosen: on your hand
  alternatives:
  - upon your hand
  - on your arm
  lexicon: HALOT
  rationale: The Hebrew says 'hand,' not 'arm.' English 'on your hand' preserves the
    source wording and the parallel with the phrase about the eyes.
- source_word: וּלְטוֹטָפֹת
  chosen: as frontlets
  alternatives:
  - as bands
  - as phylacteries
  - as memorial bands
  lexicon: HALOT
  rationale: טוֹטָפֹת is a rare term traditionally understood as something worn on
    the forehead. 'Frontlets' preserves the likely referent without importing the
    later specifically Jewish term 'phylacteries' into the main text.
- source_word: בֵּין עֵינֶיךָ
  chosen: between your eyes
  alternatives:
  - on your forehead
  lexicon: HALOT
  rationale: The idiom is rendered literally to preserve the Hebrew imagery. 'On your
    forehead' is interpretive and therefore better left as an alternative.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the ground for the sign language. 'For' is concise
    and natural in English.
- source_word: בְּחֹזֶק יָד
  chosen: with a strong hand
  alternatives:
  - by strength of hand
  - with a mighty hand
  lexicon: HALOT
  rationale: The idiom expresses powerful divine action. 'Strong hand' is a transparent
    rendering; 'mighty hand' is possible but adds a slightly more elevated traditional
    tone not required by the Hebrew adjective/noun construction here.
- source_word: הוֹצִיאָנוּ
  chosen: brought us out
  alternatives:
  - led us out
  lexicon: HALOT
  rationale: The Hiphil of יצא means to cause to go out, commonly 'bring out.' This
    is the standard and clearest rendering in exodus contexts.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD.'
- source_word: מִמִּצְרַיִם
  chosen: from Egypt
  alternatives:
  - out of Egypt
  lexicon: HALOT
  rationale: With 'brought us out,' 'from Egypt' yields idiomatic English while preserving
    the source sense.
