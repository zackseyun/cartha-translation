id: EXO.13.3
reference: Exodus 13:3
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר מֹשֶׁ֜ה אֶל הָ/עָ֗ם זָכ֞וֹר אֶת הַ/יּ֤וֹם הַ/זֶּה֙ אֲשֶׁ֨ר יְצָאתֶ֤ם
    מִ/מִּצְרַ֨יִם֙ מִ/בֵּ֣ית עֲבָדִ֔ים כִּ֚י בְּ/חֹ֣זֶק יָ֔ד הוֹצִ֧יא יְהֹוָ֛ה אֶתְ/כֶ֖ם
    מִ/זֶּ֑ה וְ/לֹ֥א יֵאָכֵ֖ל חָמֵֽץ־־׃
translation:
  text: Then Moses said to the people, “Remember this day, on which you came out from
    Egypt, from the house of slaves, because the LORD brought you out from there by
    a strong hand; and no leavened bread shall be eaten.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from the house of slavery.” The Hebrew is literally “from the house
      of slaves,” an idiom for Egypt as a place of enslavement.
    reason: lexical_alternative
  - marker: b
    text: Or “by a mighty hand.”
    reason: lexical_alternative
  - marker: c
    text: Or “and nothing leavened shall be eaten.”
    reason: lexical_alternative
lexical_decisions:
- source_word: זָכוֹר
  chosen: Remember
  alternatives:
  - Keep in remembrance
  - Call to mind
  lexicon: HALOT
  rationale: Imperative singular used in direct address to the people as a collective;
    'Remember' is the natural English imperative and preserves the covenantal/memorial
    force.
- source_word: הַיּוֹם הַזֶּה
  chosen: this day
  alternatives:
  - this very day
  - the day
  lexicon: HALOT
  rationale: Definite noun plus demonstrative is most naturally rendered 'this day.'
    'This very day' would add emphasis not strictly required by the Hebrew.
- source_word: יְצָאתֶם
  chosen: you came out
  alternatives:
  - you went out
  - you departed
  lexicon: HALOT
  rationale: From יצא, 'go out/come out.' In English, from the perspective of leaving
    Egypt, 'came out' is idiomatic and common in exodus contexts.
- source_word: מִמִּצְרַיִם
  chosen: from Egypt
  alternatives:
  - out of Egypt
  lexicon: HALOT
  rationale: Simple source preposition; 'from Egypt' reads smoothly, while the following
    clause already expresses the exodus movement.
- source_word: מִבֵּית עֲבָדִים
  chosen: from the house of slaves
  alternatives:
  - from the house of bondage
  - from a slave house
  - from the house of slavery
  lexicon: HALOT
  rationale: Literally 'from a house of slaves.' 'House of slaves' preserves the concrete
    metaphor and the noun עֲבָדִים as 'slaves,' in line with the project's preference
    to render bonded-status terms plainly where salient. 'House of bondage' is traditional
    but more interpretive.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for remembering the day. 'Because' makes the causal
    connection explicit in clear modern English.
- source_word: בְּחֹזֶק יָד
  chosen: by a strong hand
  alternatives:
  - with a mighty hand
  - by strength of hand
  lexicon: HALOT
  rationale: The idiom denotes powerful divine action. 'By a strong hand' is a close,
    readable rendering. 'Mighty hand' is also possible, but 'strong' more directly
    reflects חֹזֶק.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: הוֹצִיא
  chosen: brought you out
  alternatives:
  - caused you to go out
  - led you out
  lexicon: HALOT
  rationale: 'Hiphil of יצא, causative: ''bring out'' or ''lead out.'' ''Brought you
    out'' is idiomatic and matches the exodus motif without over-specifying guidance.'
- source_word: מִזֶּה
  chosen: from there
  alternatives:
  - from this place
  - from here
  lexicon: HALOT
  rationale: The demonstrative with preposition points back to Egypt/house of slaves.
    In English, 'from there' best captures the anaphoric reference.
- source_word: וְלֹא יֵאָכֵל חָמֵץ
  chosen: and no leavened bread shall be eaten
  alternatives:
  - and leaven shall not be eaten
  - and nothing leavened shall be eaten
  lexicon: HALOT
  rationale: The Niphal imperfect is naturally rendered as a passive prohibition/general
    rule. חָמֵץ refers to leavened matter/food; 'no leavened bread shall be eaten'
    is clear, though broader 'nothing leavened' is possible. The chosen rendering
    communicates the prohibition in natural English without losing the passive sense.
