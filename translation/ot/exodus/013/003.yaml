theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This preserves reverential convention and aligns with the project's
    stated policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering עֲבָדִים in the exodus formula
  chosen_reading: slaves
  alternative_readings:
  - servants
  - bondage
  rationale: The phrase describes Israel's condition in Egypt as one of actual enslavement.
    In keeping with the translation philosophy's preference for plain rendering of
    bonded-status terms where salient, 'slaves' is preferable to the softened 'servants'
    or the abstract 'bondage.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms analogy
    for δοῦλος
