id: EXO.13.18
reference: Exodus 13:18
source:
  edition: WLC
  text: וַ/יַּסֵּ֨ב אֱלֹהִ֧ים אֶת הָ/עָ֛ם דֶּ֥רֶךְ הַ/מִּדְבָּ֖ר יַם ס֑וּף וַ/חֲמֻשִׁ֛ים
    עָל֥וּ בְנֵי יִשְׂרָאֵ֖ל מֵ/אֶ֥רֶץ מִצְרָֽיִם׀־־־׃
translation:
  text: So God led the people around by the way of the wilderness toward the Sea of
    Reeds, and the sons of Israel went up from the land of Egypt equipped for battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Red Sea.' The Hebrew name is literally 'Sea of Reeds.'
    reason: alternative_reading
  - marker: b
    text: The Hebrew term rendered 'equipped for battle' is uncertain; it may also
      mean 'armed,' 'in battle array,' or more generally 'in ordered ranks.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּסֵּב
  chosen: led ... around
  alternatives:
  - turned
  - caused to go around
  - brought around
  lexicon: HALOT
  rationale: The Hiphil of סבב here indicates causing the people to take a roundabout
    route rather than the direct road. 'Led ... around' is natural English and preserves
    divine agency better than a bare 'turned.'
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Standard rendering for the singular referent here; the verb is singular,
    so the sense is clearly 'God,' not 'gods.'
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: Refers collectively to Israel in transit; 'the people' is the most direct
    and idiomatic rendering.
- source_word: דֶּרֶךְ הַמִּדְבָּר
  chosen: by the way of the wilderness
  alternatives:
  - by the wilderness road
  - through the wilderness
  lexicon: HALOT
  rationale: דֶּרֶךְ marks route or way. 'By the way of the wilderness' stays close
    to the Hebrew while remaining readable. 'Through the wilderness' is possible but
    slightly less precise because the phrase emphasizes route.
- source_word: יַם סוּף
  chosen: the Sea of Reeds
  alternatives:
  - the Red Sea
  lexicon: HALOT
  rationale: Source-language primacy favors 'Sea of Reeds' for יַם סוּף. 'Red Sea'
    reflects later translation tradition and conventional English usage rather than
    the plain lexical sense of סוּף.
- source_word: וַחֲמֻשִׁים
  chosen: equipped for battle
  alternatives:
  - armed
  - in battle array
  - in ranks
  - by fives
  lexicon: HALOT
  rationale: The term is difficult, but in this context it most plausibly denotes
    martial preparedness or ordered military formation. 'Equipped for battle' communicates
    the likely sense without overstating that every individual was visibly armed.
    Alternatives are worth preserving because the word is debated.
- source_word: עָלוּ
  chosen: went up
  alternatives:
  - came up
  lexicon: HALOT
  rationale: עלה is the standard verb 'go up/come up.' 'Went up' is retained because
    it is both literal and idiomatic for departure from Egypt in biblical narrative.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Per the gender-accurate guideline, the masculine plural construct is
    preserved as 'sons of Israel.' 'Israelites' is idiomatic but less formally transparent;
    'children of Israel' is traditional but less precise in modern English.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of Egypt
  lexicon: HALOT
  rationale: This closely reflects the Hebrew preposition and noun while remaining
    natural English.
