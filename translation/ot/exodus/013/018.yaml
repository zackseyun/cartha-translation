theological_decisions:
- issue: Rendering of בְנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The Hebrew is grammatically masculine plural. Following the doctrine's
    gender-accurate principle, the translation preserves the source form rather than
    neutralizing it, while recognizing that the phrase refers corporately to the covenant
    people.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering of יַם סוּף
  chosen_reading: the Sea of Reeds
  alternative_readings:
  - the Red Sea
  rationale: The translation follows original-language primacy over inherited English
    tradition. 'Red Sea' is preserved in a footnote because of its familiarity and
    longstanding use in Christian translation tradition.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
