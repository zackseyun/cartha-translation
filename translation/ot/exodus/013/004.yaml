id: EXO.13.4
reference: Exodus 13:4
source:
  edition: WLC
  text: הַ/יּ֖וֹם אַתֶּ֣ם יֹצְאִ֑ים בְּ/חֹ֖דֶשׁ הָ/אָבִֽיב׃
translation:
  text: Today you are going out, in the month of Abib.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Abib is the name of the month; the term is associated with the stage of
      ripening grain in spring.
    reason: cultural_note
lexical_decisions:
- source_word: הַיּוֹם
  chosen: Today
  alternatives:
  - This day
  - On this day
  lexicon: HALOT
  rationale: With the article, the noun functions adverbially to mark the present
    day of the exodus event. 'Today' is natural modern English and preserves the immediacy
    of Moses' address better than the more wooden 'this day.'
- source_word: אַתֶּם
  chosen: you
  lexicon: HALOT
  rationale: Second person masculine plural pronoun addressed to Israel. English 'you'
    adequately represents the plural here without adding unnecessary wording.
- source_word: יֹצְאִים
  chosen: are going out
  alternatives:
  - are coming out
  - go out
  - are departing
  lexicon: HALOT
  rationale: Qal participle plural of יצא expresses ongoing/imminent action in context.
    'Are going out' reflects the participial aspect and the movement out from Egypt.
    'Coming out' is possible in idiomatic English, but 'going out' more closely matches
    the source orientation.
- source_word: בְּחֹדֶשׁ
  chosen: in the month of
  alternatives:
  - during the month of
  lexicon: HALOT
  rationale: The preposition ב plus 'month' is best rendered 'in the month of,' indicating
    the calendrical time reference.
- source_word: הָאָבִיב
  chosen: Abib
  alternatives:
  - the month of fresh ears
  - spring
  lexicon: HALOT
  rationale: Per translation philosophy, names are transliterated rather than replaced
    with an interpretive gloss. 'Abib' is the Hebrew month name/designation; glosses
    such as 'spring' or 'fresh ears' are explanatory rather than translational and
    are better reserved for a note.
