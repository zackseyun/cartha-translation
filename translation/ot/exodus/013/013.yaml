id: EXO.13.13
reference: Exodus 13:13
source:
  edition: WLC
  text: וְ/כָל פֶּ֤טֶר חֲמֹר֙ תִּפְדֶּ֣ה בְ/שֶׂ֔ה וְ/אִם לֹ֥א תִפְדֶּ֖ה וַ/עֲרַפְתּ֑/וֹ
    וְ/כֹ֨ל בְּכ֥וֹר אָדָ֛ם בְּ/בָנֶ֖י/ךָ תִּפְדֶּֽה־־׃
translation:
  text: And every firstborn of a donkey you shall redeem with a lamb; and if you do
    not redeem it, then you shall break its neck. And every firstborn of man among
    your sons you shall redeem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew שֶׂה is a broader term for a head of small livestock, often a sheep
      or goat; 'lamb' is a contextually natural rendering here.
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּטֶר חֲמוֹר
  chosen: firstborn of a donkey
  alternatives:
  - first issue of a donkey
  - whatever first opens the womb of a donkey
  lexicon: HALOT
  rationale: פֶּטֶר literally refers to that which opens the womb, but in natural
    English within sacrificial law this is well conveyed by 'firstborn.' 'Donkey'
    is the standard rendering of חֲמוֹר.
- source_word: תִּפְדֶּה
  chosen: you shall redeem
  alternatives:
  - you must redeem
  - you shall ransom
  lexicon: HALOT
  rationale: פדה denotes redemption/ransom by substitution or payment. 'Redeem' preserves
    the cultic and legal sense better than a flatter 'buy back.' Future-like legal
    instruction is naturally rendered 'you shall redeem.'
- source_word: בְשֶׂה
  chosen: with a lamb
  alternatives:
  - with a sheep
  - with a head of small livestock
  lexicon: HALOT
  rationale: שֶׂה can denote a member of the flock, sheep or goat, but 'lamb' is the
    conventional and contextually fitting sacrificial rendering in English. Because
    the Hebrew is somewhat broader, the alternative is preserved in a footnote.
- source_word: וַעֲרַפְתּוֹ
  chosen: you shall break its neck
  alternatives:
  - you shall decapitate it
  - you shall snap its neck
  lexicon: HALOT
  rationale: The verb ערף refers to breaking the neck from the back of the neck rather
    than ordinary slaughter. 'Break its neck' is the clearest idiomatic English rendering.
- source_word: בְּכוֹר אָדָם
  chosen: firstborn of man
  alternatives:
  - firstborn human
  - firstborn of humankind
  lexicon: HALOT
  rationale: אָדָם here contrasts human with animal, so 'man' carries the class sense
    'human being' rather than adult male. This follows the project's gender-accurate
    policy while preserving the Hebrew contrast.
- source_word: בְּבָנֶיךָ
  chosen: among your sons
  alternatives:
  - among your children
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'your sons,' not a gender-neutral term. Since
    firstborn sons are in view in this legal context, 'among your sons' is both accurate
    and natural.
