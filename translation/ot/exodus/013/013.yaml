theological_decisions:
- issue: Rendering of אָדָם
  chosen_reading: man in the class sense, retained in the phrase 'firstborn of man'
  alternative_readings:
  - humankind
  - human being
  rationale: The term contrasts human offspring with donkey offspring in a consecration/redemption
    law. Retaining 'man' in the class sense reflects the Hebrew and aligns with the
    doctrine's gender-accurate policy, while the surrounding phrase makes the meaning
    clearly human rather than specifically male adult.
