id: EXO.13.5
reference: Exodus 13:5
source:
  edition: WLC
  text: וְ/הָיָ֣ה כִֽי יְבִֽיאֲ/ךָ֣ יְהוָ֡ה אֶל אֶ֣רֶץ הַֽ֠/כְּנַעֲנִי וְ/הַ/חִתִּ֨י
    וְ/הָ/אֱמֹרִ֜י וְ/הַ/חִוִּ֣י וְ/הַ/יְבוּסִ֗י אֲשֶׁ֨ר נִשְׁבַּ֤ע לַ/אֲבֹתֶ֨י/ךָ֙
    לָ֣/תֶת לָ֔/ךְ אֶ֛רֶץ זָבַ֥ת חָלָ֖ב וּ/דְבָ֑שׁ וְ/עָבַדְתָּ֛ אֶת הָ/עֲבֹדָ֥ה הַ/זֹּ֖את
    בַּ/חֹ֥דֶשׁ הַ/זֶּֽה־־־׃
translation:
  text: And when the LORD brings you into the land of the Canaanites, the Hittites,
    the Amorites, the Hivites, and the Jebusites, which he swore to your fathers to
    give you, a land flowing with milk and honey, you shall perform this service in
    this month.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this rite' or 'this observance.' The Hebrew term can denote a prescribed
      act of worship or service.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  chosen: And when
  alternatives:
  - And it shall be when
  - Now when
  lexicon: HALOT
  rationale: This construction introduces a future contingency/result. 'And when'
    preserves the temporal force in natural English without the stiffness of 'it shall
    be when.'
- source_word: יְבִיאֲךָ
  chosen: brings you
  alternatives:
  - has brought you
  - brings you in
  lexicon: HALOT
  rationale: Hiphil of בוא means 'bring' or 'cause to enter.' 'Brings you' is clear
    and idiomatic with the following 'into the land'; 'brings you in' is possible
    but less smooth here.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name יְהוָה is rendered 'the LORD,' following
    the project's default for YHWH.
- source_word: אֶל אֶרֶץ
  chosen: into the land
  alternatives:
  - to the land
  lexicon: HALOT
  rationale: With the verb 'bring,' English idiom prefers 'into the land,' reflecting
    movement into a place.
- source_word: הַכְּנַעֲנִי וְהַחִתִּי וְהָאֱמֹרִי וְהַחִוִּי וְהַיְבוּסִי
  chosen: the Canaanites, the Hittites, the Amorites, the Hivites, and the Jebusites
  alternatives:
  - the land of the Canaanite, Hittite, Amorite, Hivite, and Jebusite
  lexicon: HALOT
  rationale: Though the Hebrew uses singular ethnonyms after 'land of,' English normally
    pluralizes these people-group names in this formula. This preserves the referent
    clearly and idiomatically.
- source_word: אֲשֶׁר נִשְׁבַּע לַאֲבֹתֶיךָ לָתֶת לָךְ
  chosen: which he swore to your fathers to give you
  alternatives:
  - that he swore to your fathers to give to you
  lexicon: HALOT
  rationale: This keeps the relative clause attached to 'land' and preserves the covenantal
    oath language without unnecessary expansion.
- source_word: אֶרֶץ זָבַת חָלָב וּדְבָשׁ
  chosen: a land flowing with milk and honey
  alternatives:
  - a land that flows with milk and honey
  lexicon: HALOT
  rationale: This is the standard and accurate idiom for the Hebrew participial expression,
    conveying abundance and fertility.
- source_word: וְעָבַדְתָּ
  chosen: you shall perform
  alternatives:
  - you shall serve
  - you shall observe
  lexicon: HALOT
  rationale: The verb עבד can mean 'serve' or 'perform' in cultic contexts. Here,
    with the direct object 'this service/rite,' 'perform' best communicates carrying
    out the prescribed observance.
- source_word: הָעֲבֹדָה הַזֹּאת
  chosen: this service
  alternatives:
  - this rite
  - this observance
  lexicon: HALOT
  rationale: '''Service'' is the most direct rendering of עֲבֹדָה and fits the cultic
    context. ''Rite'' and ''observance'' are possible, but ''service'' preserves the
    lexical connection to worshipful duty.'
- source_word: בַּחֹדֶשׁ הַזֶּה
  chosen: in this month
  alternatives:
  - during this month
  lexicon: HALOT
  rationale: A straightforward rendering of the temporal phrase. In context it refers
    to the appointed month of the festival observance.
