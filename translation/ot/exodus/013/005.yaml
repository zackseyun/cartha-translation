theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH, preserving reverential convention and alignment with longstanding biblical
    translation practice.
  doctrine_reference: 'Contested terms: יְהוָה YHWH → the LORD'
- issue: Cultic nuance of עֲבֹדָה in Passover/Unleavened Bread context
  chosen_reading: this service
  alternative_readings:
  - this rite
  - this observance
  rationale: The Hebrew denotes a prescribed act of worship/service. 'Service' preserves
    the worshipful and duty-oriented nuance without over-specifying liturgical form.
  doctrine_reference: Translation philosophy §1, §5
