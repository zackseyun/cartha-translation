theological_decisions:
- issue: Divine rationale for avoiding the Philistine route
  chosen_reading: The verse presents God's decision as a prudent accommodation to
    the people's likely fear and reversal, without implying error or ignorance in
    God.
  alternative_readings:
  - A purely human narrator's speculation about God's motive
  - An implication that God changed plans reactively
  rationale: The explicit clause 'for God said' grounds the motive in the text itself.
    The translation preserves the stated rationale without importing broader doctrinal
    claims about providence beyond what the verse says.
  doctrine_reference: Preserve theological tension rather than resolve it.
