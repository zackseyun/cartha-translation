id: EXO.13.17
reference: Exodus 13:17
source:
  edition: WLC
  text: וַ/יְהִ֗י בְּ/שַׁלַּ֣ח פַּרְעֹה֮ אֶת הָ/עָם֒ וְ/לֹא נָחָ֣/ם אֱלֹהִ֗ים דֶּ֚רֶךְ
    אֶ֣רֶץ פְּלִשְׁתִּ֔ים כִּ֥י קָר֖וֹב ה֑וּא כִּ֣י אָמַ֣ר אֱלֹהִ֗ים פֶּֽן יִנָּחֵ֥ם
    הָ/עָ֛ם בִּ/רְאֹתָ֥/ם מִלְחָמָ֖ה וְ/שָׁ֥בוּ מִצְרָֽיְמָ/ה־־׀־׃
translation:
  text: Now when Pharaoh let the people go, God did not lead them by the way of the
    land of the Philistines, though it was near; for God said, “Lest the people change
    their minds when they see war and return to Egypt.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for it was near.' The Hebrew conjunction can be read causally; the main
      text renders it concessively for smoother English sense in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'regret it' or 'relent.' The Hebrew verb here refers to a change of mind
      when faced with war.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשַׁלַּח
  chosen: when Pharaoh let ... go
  alternatives:
  - when Pharaoh sent ... out
  - after Pharaoh had released ...
  lexicon: HALOT
  rationale: 'The infinitive construct of שׁלח with ב marks temporal circumstance:
    ''when/in the sending of.'' In context with אֶת־הָעָם, the idiom means releasing
    or letting the people go, echoing the Exodus refrain without sounding overly wooden.'
- source_word: נָחָם
  chosen: lead
  alternatives:
  - guide
  - conduct
  lexicon: HALOT
  rationale: The verb נחה commonly means to lead or guide. 'Lead' is the most natural
    modern English rendering here and fits the travel-route context.
- source_word: דֶּרֶךְ אֶרֶץ פְּלִשְׁתִּים
  chosen: by the way of the land of the Philistines
  alternatives:
  - by the road through the land of the Philistines
  - by the route of Philistia
  lexicon: HALOT
  rationale: דֶּרֶךְ is 'way/road/route.' Retaining 'way of the land of the Philistines'
    preserves the Hebrew geographic phrasing while remaining readable. 'Philistines'
    is preferred over 'Philistia' because the Hebrew names the people-group in a land-genitive
    construction.
- source_word: כִּי קָרוֹב הוּא
  chosen: though it was near
  alternatives:
  - for it was near
  - because it was near
  lexicon: HALOT
  rationale: 'כִּי can be causal or concessive depending on context. Here a concessive
    sense best fits English flow: despite the route being shorter, God chose otherwise.
    This preserves the logic without awkwardness.'
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - in case
  lexicon: HALOT
  rationale: פֶּן introduces a negative purpose or apprehension clause. 'Lest' is
    concise and accurate, and still understandable in modern literary English.
- source_word: יִנָּחֵם
  chosen: change their minds
  alternatives:
  - regret it
  - relent
  - be sorry
  lexicon: HALOT
  rationale: 'The Niphal of נחם here refers to a change of mind or resolve, not repentance
    in a moral-theological sense. Because the subject is collective הָעָם, idiomatic
    English uses plural sense: ''the people change their minds.'''
- source_word: בִּרְאֹתָם מִלְחָמָה
  chosen: when they see war
  alternatives:
  - when they see battle
  - when they encounter fighting
  lexicon: HALOT
  rationale: 'The infinitive construct with ב expresses circumstance: ''when/at seeing.''
    מִלְחָמָה is broadly ''war'' or ''battle''; ''war'' best matches the general prospect
    of armed conflict on the route.'
- source_word: וְשָׁבוּ מִצְרָיְמָה
  chosen: and return to Egypt
  alternatives:
  - and go back to Egypt
  lexicon: HALOT
  rationale: שׁוב is the standard verb 'return.' The directional ending on מִצְרַיִם
    is naturally conveyed by 'to Egypt.'
- source_word: וַיְהִי
  chosen: Now when
  alternatives:
  - And it happened when
  - When
  lexicon: HALOT
  rationale: The wayyiqtol of היה here introduces a new narrative development. 'Now
    when' preserves discourse movement better than the overly literal 'and it happened
    when' while still signaling continuation.
