id: EXO.13.15
reference: Exodus 13:15
source:
  edition: WLC
  text: וַ/יְהִ֗י כִּֽי הִקְשָׁ֣ה פַרְעֹה֮ לְ/שַׁלְּחֵ/נוּ֒ וַ/יַּהֲרֹ֨ג יְהֹוָ֤ה כָּל בְּכוֹר֙ בְּ/אֶ֣רֶץ מִצְרַ֔יִם מִ/בְּכֹ֥ר אָדָ֖ם וְ/עַד בְּכ֣וֹר בְּהֵמָ֑ה עַל כֵּן֩ אֲנִ֨י זֹבֵ֜חַ לַֽ/יהוָ֗ה כָּל פֶּ֤טֶר רֶ֨חֶם֙ הַ/זְּכָרִ֔ים וְ/כָל בְּכ֥וֹר בָּנַ֖/י אֶפְדֶּֽה־־־־־־׃
translation:
  text: And when Pharaoh stubbornly refused to let us go, Yahweh killed every firstborn in the land of Egypt, from the firstborn of man to the firstborn of beast. Therefore I sacrifice to Yahweh every male that opens the womb, but every firstborn of my sons I redeem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the firstborn of humankind to the firstborn of livestock.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִקְשָׁה
  chosen: stubbornly refused
  alternatives:
  - hardened
  - made difficult
  - was stubborn
  lexicon: HALOT
  rationale: In context with לְשַׁלְּחֵנוּ ('to let us go'), the Hiphil of קשׁה conveys obstinate resistance. 'Stubbornly refused' expresses the idiomatic force in natural English better than a bare 'hardened,' which can sound incomplete without an object.
- source_word: לְשַׁלְּחֵנוּ
  chosen: to let us go
  alternatives:
  - to send us away
  - to release us
  lexicon: HALOT
  rationale: שׁלח in the Exodus narrative often means releasing/sending the people out. 'Let us go' is idiomatic English and matches the narrative refrain.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and consistency with the LXX/English tradition noted in DOCTRINE.md.
- source_word: בְּכוֹר
  chosen: firstborn
  lexicon: HALOT
  rationale: Standard and precise rendering for the one first opening birth order; repeated consistently through the verse.
- source_word: מִבְּכֹר אָדָם וְעַד בְּכוֹר בְּהֵמָה
  chosen: from the firstborn of man to the firstborn of beast
  alternatives:
  - from the firstborn of humankind to the firstborn of livestock
  - from the firstborn of people to the firstborn of animals
  lexicon: HALOT
  rationale: אָדָם here contrasts with בְּהֵמָה and refers to human beings generically. Per doctrine, gender-accurate language is preferred; 'man' preserves the representative/generic force. 'Beast' is concise and fits sacrificial/legal register.
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - That is why
  lexicon: HALOT
  rationale: Marks the inferential connection between the plague on the firstborn and Israel's consecration/redemption practice.
- source_word: זֹבֵחַ
  chosen: I sacrifice
  alternatives:
  - I offer in sacrifice
  - I slaughter as a sacrifice
  lexicon: HALOT
  rationale: זבח denotes sacrificial offering, often by slaughter. 'I sacrifice' is concise and sufficiently explicit in context.
- source_word: פֶּטֶר רֶחֶם
  chosen: that opens the womb
  alternatives:
  - womb-opener
  - first issue of the womb
  lexicon: HALOT
  rationale: This idiom refers to the first offspring to emerge from the womb. The relative clause is natural English and preserves the legal-sacral sense.
- source_word: הַזְּכָרִים
  chosen: every male
  alternatives:
  - the males
  - every male one
  lexicon: HALOT
  rationale: The article with the plural adjective specifies the male offspring among those opening the womb. 'Every male' communicates the distributive sense in idiomatic English.
- source_word: בָּנַי
  chosen: my sons
  alternatives:
  - my children
  lexicon: HALOT
  rationale: The Hebrew specifically says 'my sons,' not a gender-neutral term. This should be preserved per the gender-accurate translation principle.
- source_word: אֶפְדֶּה
  chosen: I redeem
  alternatives:
  - I ransom
  - I buy back
  lexicon: HALOT
  rationale: פדה in this cultic/legal context refers to redemption by substitution/payment. 'Redeem' is the established theological and lexical equivalent.
