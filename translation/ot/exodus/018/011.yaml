theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Interpretation of the difficult final clause כִּי בַדָּבָר אֲשֶׁר זָדוּ עֲלֵיהֶם
  chosen_reading: because in the matter in which they acted arrogantly, he was above them
  alternative_readings:
  - because in the very thing in which they acted proudly against them
  - for by the thing wherein they dealt proudly he was above them
  rationale: The Hebrew is compressed and syntactically difficult. The translation preserves the basic elements of the clause while making explicit in English the likely sense of YHWH's superiority demonstrated in the very sphere of the oppressors' arrogance. This avoids over-resolving the antecedents while still yielding readable English.
