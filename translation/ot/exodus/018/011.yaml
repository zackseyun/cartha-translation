id: EXO.18.11
reference: Exodus 18:11
source:
  edition: WLC
  text: עַתָּ֣ה יָדַ֔עְתִּי כִּֽי גָד֥וֹל יְהוָ֖ה מִ/כָּל הָ/אֱלֹהִ֑ים כִּ֣י בַ/דָּבָ֔ר אֲשֶׁ֥ר זָד֖וּ עֲלֵי/הֶֽם־־׃
translation:
  text: Now I know that Yahweh is greater than all the gods, because in the matter in which they acted arrogantly against them, he was above them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'because in the very thing in which they acted proudly against them.' The Hebrew of the final clause is difficult and may refer specifically to the Egyptians' arrogant treatment of Israel.
    reason: alternative_reading
lexical_decisions:
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - At this time
  lexicon: HALOT
  rationale: Temporal adverb marking Jethro's present conclusion in response to recent events. 'Now' is natural modern English and preserves the discourse force.
- source_word: יָדַעְתִּי
  chosen: I know
  alternatives:
  - I have known
  - I have come to know
  lexicon: HALOT
  rationale: Qal perfect 1cs can express present resultant state after new evidence. 'I know' is idiomatic English here, though the sense includes coming to recognition.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: Introduces the content of what Jethro now knows.
- source_word: גָדוֹל
  chosen: greater
  alternatives:
  - great
  lexicon: HALOT
  rationale: With מִכָּל ('than all'), the adjective functions comparatively. English requires the comparative 'greater' rather than the more wooden 'great ... than all'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִכָּל הָאֱלֹהִים
  chosen: than all the gods
  alternatives:
  - above all the gods
  lexicon: HALOT
  rationale: 'The preposition מן with כָּל marks comparison: YHWH is greater than all other elohim. ''Gods'' fits the plural reference in context better than ''divine beings'' here, since Jethro is contrasting YHWH with the deities acknowledged by the nations.'
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground or evidence for the preceding confession.
- source_word: בַדָּבָר
  chosen: in the matter
  alternatives:
  - in the thing
  - in what happened
  - by the thing
  lexicon: HALOT
  rationale: דבר here refers to the affair/event under discussion, namely the Egyptians' treatment of Israel and God's response. 'In the matter' preserves the idiomatic Hebrew without over-paraphrasing.
- source_word: אֲשֶׁר
  chosen: in which
  alternatives:
  - that
  - wherein
  lexicon: HALOT
  rationale: Relative pronoun linking 'the matter' to the following clause.
- source_word: זָדוּ
  chosen: acted arrogantly
  alternatives:
  - dealt proudly
  - acted presumptuously
  - were insolent
  lexicon: HALOT
  rationale: From זיד/זוד, denoting presumptuous or arrogant action. 'Acted arrogantly' is clear modern English and fits the Exodus context of Egyptian pride.
- source_word: עֲלֵיהֶם
  chosen: above them
  alternatives:
  - against them
  - over them
  lexicon: HALOT
  rationale: The phrase is difficult, but in context it most naturally points to YHWH's superiority over those who acted arrogantly against Israel. Rendering 'he was above them' captures the implied outcome of divine exaltation/superiority without importing too much interpretation. The antecedent of 'them' is best taken as the arrogant oppressors.
