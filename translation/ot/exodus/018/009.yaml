id: EXO.18.9
reference: Exodus 18:9
source:
  edition: WLC
  text: וַ/יִּ֣חַדְּ יִתְר֔וֹ עַ֚ל כָּל הַ/טּוֹבָ֔ה אֲשֶׁר עָשָׂ֥ה יְהוָ֖ה לְ/יִשְׂרָאֵ֑ל אֲשֶׁ֥ר הִצִּיל֖/וֹ מִ/יַּ֥ד מִצְרָֽיִם־־׃
translation:
  text: Jethro rejoiced over all the good that Yahweh had done for Israel, whom he had delivered from the hand of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was glad over all the good.' The Hebrew verb can denote gladness or rejoicing.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from the hand of Egypt,' an idiom for deliverance from Egypt's power.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַדְּ
  chosen: rejoiced
  alternatives:
  - was glad
  - delighted himself
  lexicon: HALOT
  rationale: The verb here denotes gladness or rejoicing. 'Rejoiced' is natural modern English and fits the positive response to God's saving action. 'Was glad' is possible, but 'rejoiced' better conveys the strength of the reaction.
- source_word: יִתְרוֹ
  chosen: Jethro
  rationale: Personal names are transliterated by standard convention.
- source_word: עַל כָּל הַטּוֹבָה
  chosen: over all the good
  alternatives:
  - because of all the goodness
  - over all the good things
  lexicon: HALOT
  rationale: The preposition עַל with an emotion verb can indicate the occasion of rejoicing, hence 'over.' הַטּוֹבָה is singular collective, so 'all the good' preserves the Hebrew better than the more interpretive 'all the good things.'
- source_word: עָשָׂה
  chosen: had done
  alternatives:
  - did
  lexicon: HALOT
  rationale: English past perfect reads naturally here because the good done by the LORD precedes Jethro's rejoicing in the narrative sequence.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְיִשְׂרָאֵל
  chosen: for Israel
  alternatives:
  - to Israel
  lexicon: HALOT
  rationale: The preposition ל here marks benefit or advantage; 'for Israel' communicates that the LORD acted on Israel's behalf.
- source_word: אֲשֶׁר הִצִּילוֹ
  chosen: whom he had delivered
  alternatives:
  - because he had delivered him
  - which he had delivered
  lexicon: HALOT
  rationale: The relative clause most naturally refers to Israel as a collective singular, allowing English 'whom.' The singular pronominal suffix reflects Israel as a corporate entity. 'Delivered' is the standard and contextually fitting rendering of נצל in rescue contexts.
- source_word: מִיַּד מִצְרָיִם
  chosen: from the hand of Egypt
  alternatives:
  - from Egypt's power
  - from the power of Egypt
  lexicon: HALOT
  rationale: '''From the hand of'' preserves the Hebrew idiom and remains understandable in English. It conveys oppressive control without unnecessary paraphrase.'
