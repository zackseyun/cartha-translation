id: EXO.18.1
reference: Exodus 18:1
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֞ע יִתְר֨וֹ כֹהֵ֤ן מִדְיָן֙ חֹתֵ֣ן מֹשֶׁ֔ה אֵת֩ כָּל אֲשֶׁ֨ר עָשָׂ֤ה אֱלֹהִים֙ לְ/מֹשֶׁ֔ה וּ/לְ/יִשְׂרָאֵ֖ל עַמּ֑/וֹ כִּֽי הוֹצִ֧יא יְהוָ֛ה אֶת יִשְׂרָאֵ֖ל מִ/מִּצְרָֽיִם־־־׃
translation:
  text: Now Jethro, the priest of Midian, Moses’ father-in-law, heard all that God had done for Moses and for Israel his people, that Yahweh had brought Israel out of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Israel, Moses’ people.' The pronoun in 'his people' could grammatically be taken with Moses, though in context it most likely refers to God.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: Now ... heard
  alternatives:
  - And ... heard
  - Then ... heard
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Now' gives natural English narrative flow while preserving the sequential sense of the Hebrew wayyiqtol.
- source_word: כֹהֵן מִדְיָן
  chosen: the priest of Midian
  alternatives:
  - a priest of Midian
  lexicon: HALOT
  rationale: The construct phrase most naturally identifies Jethro by office and association. 'The priest of Midian' is the conventional and contextually specific rendering.
- source_word: חֹתֵן מֹשֶׁה
  chosen: Moses’ father-in-law
  alternatives:
  - Moses' relative by marriage
  lexicon: HALOT
  rationale: In this context חֹתֵן clearly refers to the relationship established by Moses' marriage to Zipporah. 'Father-in-law' is the standard and most precise English equivalent here.
- source_word: אֵת כָּל אֲשֶׁר עָשָׂה אֱלֹהִים
  chosen: all that God had done
  alternatives:
  - everything that God did
  lexicon: HALOT
  rationale: This preserves the totalizing force of כָּל אֲשֶׁר while using idiomatic English. The pluperfect 'had done' fits the narrative retrospectively.
- source_word: לְמֹשֶׁה וּלְיִשְׂרָאֵל
  chosen: for Moses and for Israel
  alternatives:
  - to Moses and to Israel
  lexicon: HALOT
  rationale: The preposition ל here is best rendered 'for,' indicating beneficial action on behalf of Moses and Israel rather than merely action directed toward them.
- source_word: עַמּוֹ
  chosen: his people
  alternatives:
  - His people
  lexicon: HALOT
  rationale: 'The 3ms suffix most naturally refers back to God in the preceding clause: Israel is God''s people. Lowercase ''his'' avoids adding interpretive emphasis not marked in Hebrew orthography.'
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the content or explanatory substance of what Jethro heard. 'That' works smoothly in English and links the clause appositionally to 'all that God had done.'
- source_word: הוֹצִיא
  chosen: had brought ... out
  alternatives:
  - had led ... out
  - had taken ... out
  lexicon: HALOT
  rationale: The Hiphil of יצא means 'cause to go out, bring out.' 'Brought ... out' is a clear and established rendering in exodus contexts.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִמִּצְרַיִם
  chosen: out of Egypt
  alternatives:
  - from Egypt
  lexicon: HALOT
  rationale: With הוֹצִיא, 'out of Egypt' best captures the exodus movement from within the land of bondage.
