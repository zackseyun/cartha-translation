theological_decisions:
- issue: Referent of the pronoun in עַמּוֹ
  chosen_reading: Israel his people = Israel, God's people
  alternative_readings:
  - Israel his people = Israel, Moses' people
  rationale: The nearest and most coherent antecedent is אֱלֹהִים, reinforced by the following explicit mention of the LORD as the one who brought Israel out of Egypt. Rendering 'his people' without over-specifying in the main text preserves the sense while allowing the theological implication that Israel belongs to God.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
