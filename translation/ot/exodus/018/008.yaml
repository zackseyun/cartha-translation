id: EXO.18.8
reference: Exodus 18:8
source:
  edition: WLC
  text: וַ/יְסַפֵּ֤ר מֹשֶׁה֙ לְ/חֹ֣תְנ֔/וֹ אֵת֩ כָּל אֲשֶׁ֨ר עָשָׂ֤ה יְהוָה֙ לְ/פַרְעֹ֣ה וּ/לְ/מִצְרַ֔יִם עַ֖ל אוֹדֹ֣ת יִשְׂרָאֵ֑ל אֵ֤ת כָּל הַ/תְּלָאָה֙ אֲשֶׁ֣ר מְצָאָ֣תַ/ם בַּ/דֶּ֔רֶךְ וַ/יַּצִּלֵ֖/ם יְהוָֽה־־׃
translation:
  text: Moses told his father-in-law all that Yahweh had done to Pharaoh and to Egypt for Israel’s sake, all the hardship that had come upon them on the way, and how Yahweh had delivered them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on account of Israel' / 'because of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all the trouble' or 'all the adversity' that had come upon them on the journey.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְסַפֵּר
  chosen: told
  alternatives:
  - recounted
  - related
  lexicon: HALOT
  rationale: The verb ספר in the piel commonly means to recount or tell. 'Told' is natural modern English and fits the narrative context without losing the sense of reporting details.
- source_word: חֹתְנוֹ
  chosen: his father-in-law
  alternatives:
  - his relative by marriage
  lexicon: HALOT
  rationale: In context this refers to Jethro, Moses's father-in-law. Although the Hebrew kinship term can have broader affinity usage in some contexts, 'father-in-law' is the plain sense here.
- source_word: אֵת כָּל אֲשֶׁר עָשָׂה יְהוָה לְפַרְעֹה וּלְמִצְרַיִם
  chosen: all that the LORD had done to Pharaoh and to Egypt
  alternatives:
  - everything that the LORD had done against Pharaoh and Egypt
  lexicon: HALOT
  rationale: This clause summarizes the LORD's acts in the exodus events. 'To Pharaoh and to Egypt' is a direct and sufficiently idiomatic rendering of the lamed preposition here; 'against' is interpretive and therefore left as an alternative.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עַל אֹדוֹת יִשְׂרָאֵל
  chosen: for Israel’s sake
  alternatives:
  - on account of Israel
  - because of Israel
  lexicon: HALOT
  rationale: The idiom עַל אֹדוֹת conveys causation or concern. 'For Israel’s sake' is idiomatic English that preserves the sense that the LORD acted with reference to Israel's welfare.
- source_word: הַתְּלָאָה
  chosen: the hardship
  alternatives:
  - the trouble
  - the hardship and weariness
  - the adversity
  lexicon: HALOT
  rationale: The noun denotes trouble, hardship, or distress experienced in difficult circumstances. Singular 'hardship' works well as a collective in English after 'all the,' preserving the weight of the journey's afflictions.
- source_word: מְצָאָתַם
  chosen: had found them
  alternatives:
  - had come upon them
  - had overtaken them
  lexicon: HALOT
  rationale: The Hebrew literally says the hardship 'found' them. Retaining 'had found them' preserves the vivid personified expression while remaining understandable in English.
- source_word: בַּדֶּרֶךְ
  chosen: on the way
  alternatives:
  - on the journey
  - along the road
  lexicon: HALOT
  rationale: This phrase refers to Israel's travel after leaving Egypt. 'On the way' is idiomatic and keeps the narrative movement without over-specifying.
- source_word: וַיַּצִּלֵם
  chosen: had delivered them
  alternatives:
  - rescued them
  - saved them
  lexicon: HALOT
  rationale: נצל often means to deliver or rescue from danger. 'Delivered' fits biblical narrative style and avoids importing later soteriological overtones that 'saved' might suggest here.
