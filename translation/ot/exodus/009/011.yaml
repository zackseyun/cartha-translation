id: EXO.9.11
reference: Exodus 9:11
source:
  edition: WLC
  text: וְ/לֹֽא יָכְל֣וּ הַֽ/חַרְטֻמִּ֗ים לַ/עֲמֹ֛ד לִ/פְנֵ֥י מֹשֶׁ֖ה מִ/פְּנֵ֣י הַ/שְּׁחִ֑ין
    כִּֽי הָיָ֣ה הַ/שְּׁחִ֔ין בַּֽ/חֲרְטֻמִּ֖ם וּ/בְ/כָל מִצְרָֽיִם־־־׃
translation:
  text: And the magicians were not able to stand before Moses because of the boils,
    for the boils were on the magicians and on all the Egyptians.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew literally, ''in all Egypt.'' The translation renders the implied
      personal sense from the context: the boils were on the people throughout Egypt.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחַרְטֻמִּים
  chosen: the magicians
  alternatives:
  - the sorcerers
  - the court scribes
  lexicon: HALOT
  rationale: חַרְטֻמִּים in Exodus refers to Pharaoh’s ritual specialists who oppose
    or imitate Moses and Aaron. 'Magicians' is the clearest established English equivalent
    in this narrative context, conveying occult/ritual practitioners better than the
    more technical or uncertain alternatives.
- source_word: לַעֲמֹד לִפְנֵי מֹשֶׁה
  chosen: to stand before Moses
  alternatives:
  - to appear before Moses
  - to take their stand before Moses
  lexicon: HALOT
  rationale: The idiom is kept fairly formally. 'Stand before' can denote appearing
    in someone’s presence or serving/attending before them; here it naturally means
    they could not present themselves before Moses because of the affliction.
- source_word: מִפְּנֵי הַשְּׁחִין
  chosen: because of the boils
  alternatives:
  - because of the boil disease
  - from the presence of the boils
  lexicon: HALOT
  rationale: 'מִפְּנֵי here expresses cause: ''because of.'' שְׁחִין denotes an inflamed
    skin eruption/boils. English idiom prefers plural ''boils'' for the affliction,
    even though the Hebrew noun is singular collective.'
- source_word: הַשְּׁחִין
  chosen: the boils
  alternatives:
  - the boil disease
  - the inflammation
  lexicon: HALOT
  rationale: Repeated for consistency within the verse. Rendering as plural in English
    reflects the distributive/collective sense of the plague affecting many sores
    on many persons.
- source_word: בַּחֲרְטֻמִּם
  chosen: on the magicians
  alternatives:
  - among the magicians
  - upon the magicians
  lexicon: HALOT
  rationale: The preposition ב here is best rendered idiomatically as the boils being
    'on' them, not merely 'in/among' them, since the context is bodily affliction.
- source_word: וּבְכָל מִצְרַיִם
  chosen: and on all the Egyptians
  alternatives:
  - and on all Egypt
  - and among all Egypt
  lexicon: HALOT
  rationale: Although the Hebrew literally says 'in all Egypt,' the immediate parallel
    with 'on the magicians' and the plague’s effect on persons supports the personal
    rendering 'on all the Egyptians.' This makes explicit the human referent implied
    by the context.
