id: EXO.9.6
reference: Exodus 9:6
source:
  edition: WLC
  text: וַ/יַּ֨עַשׂ יְהוָ֜ה אֶת הַ/דָּבָ֤ר הַ/זֶּה֙ מִֽ/מָּחֳרָ֔ת וַ/יָּ֕מָת כֹּ֖ל מִקְנֵ֣ה מִצְרָ֑יִם וּ/מִ/מִּקְנֵ֥ה בְנֵֽי יִשְׂרָאֵ֖ל לֹא מֵ֥ת אֶחָֽד־־־׃
translation:
  text: And Yahweh did this thing the next day, and all the livestock of Egypt died; but from the livestock of the sons of Israel, not one died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''the Israelites.'' Hebrew: ''the sons of Israel.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיַּעַשׂ ... אֶת־הַדָּבָר הַזֶּה
  chosen: did this thing
  alternatives:
  - did this
  - brought about this matter
  lexicon: HALOT
  rationale: The Hebrew idiom is straightforward and concrete. 'Did this thing' preserves the formal force of עשה + דבר without unnecessary paraphrase.
- source_word: מִמָּחֳרָת
  chosen: the next day
  alternatives:
  - on the next day
  - the following day
  lexicon: HALOT
  rationale: This temporal noun refers to the following day. 'The next day' is natural modern English and accurately reflects the timing.
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - perished
  lexicon: HALOT
  rationale: מות is the ordinary verb for dying. 'Died' is the plain and direct equivalent.
- source_word: כֹּל מִקְנֵה מִצְרַיִם
  chosen: all the livestock of Egypt
  alternatives:
  - all the cattle of Egypt
  - all the livestock belonging to Egypt
  lexicon: HALOT
  rationale: מִקְנֶה denotes livestock/herds rather than only bovines. 'Livestock' is broader and better matches the Hebrew than the traditional but narrower 'cattle.' The genitive is rendered naturally as 'of Egypt.'
- source_word: וּמִמִּקְנֵה בְנֵי יִשְׂרָאֵל
  chosen: but from the livestock of the sons of Israel
  alternatives:
  - but from the livestock of the Israelites
  - but of the livestock of the sons of Israel
  lexicon: HALOT
  rationale: The prefixed מִן is retained with 'from' to reflect the Hebrew construction leading into the negated statement. 'Sons of Israel' is more formally aligned with בְנֵי יִשְׂרָאֵל, though 'Israelites' is a viable smoother alternative.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: In keeping with the gender-accurate principle, the masculine plural construct is preserved as 'sons of Israel' rather than flattened. This is an ethnonymic expression, but the formal rendering remains clear in context.
- source_word: לֹא מֵת אֶחָד
  chosen: not one died
  alternatives:
  - not one of them died
  - not a single one died
  lexicon: HALOT
  rationale: 'This concise English rendering captures the emphatic negation plus numeral: no single animal among Israel''s livestock died.'
