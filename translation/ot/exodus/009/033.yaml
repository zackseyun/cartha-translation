id: EXO.9.33
reference: Exodus 9:33
source:
  edition: WLC
  text: וַ/יֵּצֵ֨א מֹשֶׁ֜ה מֵ/עִ֤ם פַּרְעֹה֙ אֶת הָ/עִ֔יר וַ/יִּפְרֹ֥שׂ כַּפָּ֖י/ו אֶל יְהוָ֑ה וַֽ/יַּחְדְּל֤וּ הַ/קֹּלוֹת֙ וְ/הַ/בָּרָ֔ד וּ/מָטָ֖ר לֹא נִתַּ֥ךְ אָֽרְצָ/ה־־־׃
translation:
  text: So Moses went out from Pharaoh, out of the city, and spread out his hands to Yahweh; and the thunder and the hail ceased, and rain was no longer poured down on the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the voices'; in this storm context, the term refers to thunder.
    reason: lexical_alternative
  - marker: b
    text: Or 'rain was not poured down to the ground.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - went forth
  - left
  lexicon: HALOT
  rationale: Basic narrative wayyiqtol of יצא, indicating physical departure. 'Went out' is natural modern English and preserves the motion.
- source_word: מֵעִם פַּרְעֹה
  chosen: from Pharaoh
  alternatives:
  - away from Pharaoh
  - from being with Pharaoh
  lexicon: HALOT
  rationale: The preposition with עם after מן marks separation from Pharaoh's presence. 'From Pharaoh' is idiomatic and sufficient in English.
- source_word: אֶת הָעִיר
  chosen: out of the city
  alternatives:
  - the city
  - from the city
  lexicon: HALOT
  rationale: Although אֶת is the object marker, in context with 'went out' and the prior request in v. 29, the sense is departure from within the city. Rendering 'out of the city' makes the movement explicit in idiomatic English.
- source_word: וַיִּפְרֹשׂ כַּפָּיו
  chosen: spread out his hands
  alternatives:
  - spread his palms
  - stretched out his hands
  lexicon: HALOT
  rationale: The idiom denotes a prayer gesture. 'Spread out his hands' is a clear, fairly formal rendering that preserves the physical imagery without over-paraphrasing.
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - toward the LORD
  - to Yahweh
  lexicon: HALOT
  rationale: אֶל marks direction toward YHWH in prayer. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: הַקֹּלוֹת
  chosen: the thunder
  alternatives:
  - the voices
  - the sounds
  lexicon: HALOT
  rationale: Though literally 'voices/sounds,' in the plague context this term refers to thunder. English requires the meteorological sense here.
- source_word: וְהַבָּרָד
  chosen: the hail
  lexicon: HALOT
  rationale: Straightforward rendering of the plague element.
- source_word: וַיַּחְדְּלוּ
  chosen: ceased
  alternatives:
  - stopped
  - came to an end
  lexicon: HALOT
  rationale: The verb means to stop or cease. 'Ceased' fits the elevated narrative style and coordinates well with the weather phenomena.
- source_word: וּמָטָר
  chosen: and rain
  alternatives:
  - and the rain
  lexicon: HALOT
  rationale: The conjunction introduces an additional weather element. English can omit the article naturally here.
- source_word: לֹא נִתַּךְ
  chosen: was no longer poured down
  alternatives:
  - did not pour down
  - was not poured out
  lexicon: HALOT
  rationale: The passive of נתך conveys being poured out/down. With the narrative context of the storm ending, 'was no longer poured down' captures the cessation implied in context more naturally than a simple negation.
- source_word: אָרְצָה
  chosen: on the earth
  alternatives:
  - to the ground
  - upon the land
  lexicon: HALOT
  rationale: The directional form of ארץ here refers to the ground/land below. 'On the earth' is traditional and clear, though 'to the ground' is possible; the broader term suits the plague narrative.
