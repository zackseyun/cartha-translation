id: EXO.9.22
reference: Exodus 9:22
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל מֹשֶׁה נְטֵ֤ה אֶת יָֽדְ/ךָ֙ עַל הַ/שָּׁמַ֔יִם וִ/יהִ֥י בָרָ֖ד בְּ/כָל אֶ֣רֶץ מִצְרָ֑יִם עַל הָ/אָדָ֣ם וְ/עַל הַ/בְּהֵמָ֗ה וְ/עַ֛ל כָּל עֵ֥שֶׂב הַ/שָּׂדֶ֖ה בְּ/אֶ֥רֶץ מִצְרָֽיִם־־־־־־־׃
translation:
  text: Then Yahweh said to Moses, “Stretch out your hand toward the sky, so that hail may fall on all the land of Egypt—on man and on beast and on every plant of the field in the land of Egypt.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “toward heaven.” The Hebrew word can mean “sky” or “heaven(s),” but here it refers to the visible heavens from which the hail comes.
    reason: lexical_alternative
  - marker: b
    text: “Man” here means human beings generally, in contrast with “beast.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: נְטֵה
  chosen: Stretch out
  alternatives:
  - Extend
  - Reach out
  lexicon: HALOT
  rationale: The imperative of נטה commonly means to stretch out or extend. 'Stretch out' is idiomatic modern English and fits the gesture-command context.
- source_word: יָדְךָ
  chosen: your hand
  alternatives:
  - your arm
  lexicon: HALOT
  rationale: The Hebrew term is the ordinary word for 'hand.' No contextual reason warrants a broader rendering such as 'arm.'
- source_word: עַל הַשָּׁמַיִם
  chosen: toward the sky
  alternatives:
  - toward heaven
  - over the heavens
  lexicon: HALOT
  rationale: Although שָׁמַיִם can be rendered 'heaven(s),' in this plague narrative the reference is directional and meteorological. 'Toward the sky' communicates the plain sense in natural English without importing cosmological overtones.
- source_word: וִיהִי
  chosen: so that hail may come
  alternatives:
  - and let there be hail
  - that there may be hail
  lexicon: HALOT
  rationale: The jussive-like form of היה expresses desired result following the imperative. 'So that hail may come' captures the command-result relationship in readable English.
- source_word: בָּרָד
  chosen: hail
  lexicon: HALOT
  rationale: Standard rendering for the meteorological phenomenon; context is the plague of hail.
- source_word: בְּכָל אֶרֶץ מִצְרַיִם
  chosen: over all the land of Egypt
  alternatives:
  - throughout all the land of Egypt
  - in all the land of Egypt
  lexicon: HALOT
  rationale: '''Over'' fits the movement of hail falling upon the land, while preserving the comprehensiveness of בְּכָל.'
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - people
  lexicon: HALOT
  rationale: Per DOCTRINE.md, אדם should be rendered 'man' or 'humankind' according to context. Here it stands in contrast with 'beast' and refers to human beings generally. 'Man' preserves the gender-accurate representative sense and the Hebrew pairing.
- source_word: הַבְּהֵמָה
  chosen: beast
  alternatives:
  - livestock
  - animals
  - cattle
  lexicon: HALOT
  rationale: בְּהֵמָה here denotes domesticated animals in plague context. 'Beast' preserves the concise Hebrew contrast with 'man' and matches the elevated narrative register; 'livestock' is possible but narrower than the term itself.
- source_word: כָּל עֵשֶׂב הַשָּׂדֶה
  chosen: every plant of the field
  alternatives:
  - every herb of the field
  - all the vegetation of the field
  - every green thing of the field
  lexicon: HALOT
  rationale: עֵשֶׂב can denote grass, herb, or vegetation. 'Plant' is clear modern English and broad enough for the agricultural damage in view. 'Of the field' preserves the genitival phrase.
- source_word: בְּאֶרֶץ מִצְרָיִם
  chosen: in the land of Egypt
  alternatives:
  - throughout the land of Egypt
  lexicon: HALOT
  rationale: The final phrase is retained rather than omitted as redundant, since the Hebrew repeats it for emphasis and scope.
