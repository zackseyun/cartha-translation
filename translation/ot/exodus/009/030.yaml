theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    יְהוָה, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of ירא in relation to God
  chosen_reading: fear
  alternative_readings:
  - revere
  - be afraid of
  rationale: The verse concerns Pharaoh's continued refusal to respond rightly to
    divine judgment. 'Fear' preserves the Hebrew's theological tension between dread
    and reverence without resolving it into merely terror or merely respect.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
