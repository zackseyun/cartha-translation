id: EXO.9.30
reference: Exodus 9:30
source:
  edition: WLC
  text: וְ/אַתָּ֖ה וַ/עֲבָדֶ֑י/ךָ יָדַ֕עְתִּי כִּ֚י טֶ֣רֶם תִּֽירְא֔וּ/ן מִ/פְּנֵ֖י
    יְהוָ֥ה אֱלֹהִֽים׃
translation:
  text: But as for you and your servants, I know that you do not yet fear the LORD
    God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you still do not fear' or 'before you fear the LORD God.' The Hebrew
      term can express temporal priority ('before') or the sense 'not yet' in context.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''the LORD'' represents the divine name YHWH.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אַתָּה
  chosen: But as for you
  alternatives:
  - and you
  - but you
  lexicon: HALOT
  rationale: The conjunction with the independent pronoun marks a contrast with the
    preceding statement about the cessation of the plague. 'But as for you' brings
    out the adversative and topical force naturally in English.
- source_word: וַ/עֲבָדֶיךָ
  chosen: and your servants
  alternatives:
  - and your officials
  - and your servants/slaves
  lexicon: HALOT
  rationale: עֶבֶד commonly means 'servant' or 'slave.' In Pharaoh's court context,
    'servants' is the most idiomatic English for his attendants/court officials without
    overstating chattel status. The possessive suffix is preserved.
- source_word: יָדַעְתִּי
  chosen: I know
  alternatives:
  - I have known
  - I knew
  lexicon: HALOT
  rationale: The perfect here expresses Moses' present knowledge or settled assessment.
    English present 'I know' best conveys the sense in context.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Introduces the content of what Moses knows, so 'that' is the most straightforward
    rendering.
- source_word: טֶרֶם
  chosen: not yet
  alternatives:
  - before
  - still not
  lexicon: HALOT
  rationale: With the following imperfect, the sense is that Pharaoh and his servants
    have not yet come to fear the LORD. 'Not yet' expresses the temporal nuance idiomatically
    in English.
- source_word: תִּירְאוּן
  chosen: you do ... fear
  alternatives:
  - you are afraid of
  - you revere
  lexicon: HALOT
  rationale: From ירא, which can denote fear, awe, or reverence depending on context.
    Here Moses speaks of Pharaoh's lack of proper fear before God in the face of judgment.
    'Fear' preserves the lexical connection and theological weight better than softer
    alternatives.
- source_word: מִפְּנֵי
  chosen: before
  alternatives:
  - from before
  - in the presence of
  lexicon: HALOT
  rationale: Literally 'from/before the face of.' In this idiom with ירא, English
    commonly expresses it as 'fear before' or simply 'fear.' 'Before' preserves some
    of the Hebrew relational nuance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD.'
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - god
  lexicon: HALOT
  rationale: Appositional to the divine name, yielding 'the LORD God.' This preserves
    the full designation in the Hebrew.
