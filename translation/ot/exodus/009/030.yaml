theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of ירא in relation to God
  chosen_reading: fear
  alternative_readings:
  - revere
  - be afraid of
  rationale: The verse concerns Pharaoh's continued refusal to respond rightly to divine judgment. 'Fear' preserves the Hebrew's theological tension between dread and reverence without resolving it into merely terror or merely respect.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
