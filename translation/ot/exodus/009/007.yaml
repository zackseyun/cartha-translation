id: EXO.9.7
reference: Exodus 9:7
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֣ח פַּרְעֹ֔ה וְ/הִנֵּ֗ה לֹא מֵ֛ת מִ/מִּקְנֵ֥ה יִשְׂרָאֵ֖ל עַד אֶחָ֑ד
    וַ/יִּכְבַּד֙ לֵ֣ב פַּרְעֹ֔ה וְ/לֹ֥א שִׁלַּ֖ח אֶת הָ/עָֽם־־־׃פ
translation:
  text: Pharaoh sent, and behold, not even one of Israel’s livestock had died. But
    Pharaoh’s heart was hardened, and he did not let the people go.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'not one had died from Israel’s livestock.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew, 'Pharaoh’s heart became heavy,' an idiom for becoming hardened or
      stubborn.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - sent word
  - investigated
  lexicon: HALOT
  rationale: The verb שׁלח literally means 'sent.' In context Pharaoh sends to verify
    the report about Israel's livestock. English can leave the object implicit ('sent'),
    which is natural and preserves the Hebrew terseness better than supplying 'messengers'
    in the main text.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - indeed
  lexicon: HALOT
  rationale: הִנֵּה is a discourse particle drawing attention to what was discovered.
    'Behold' preserves the deictic force and narrative vividness; though somewhat
    elevated, it remains readable here.
- source_word: לֹא מֵת מִמִּקְנֵה יִשְׂרָאֵל עַד אֶחָד
  chosen: not even one of Israel’s livestock had died
  alternatives:
  - not one from Israel's cattle died
  - not a single head of Israel's livestock died
  lexicon: HALOT
  rationale: מִקְנֶה denotes livestock/cattle broadly, not only bovines. עַד אֶחָד
    is an idiom meaning 'as far as one,' i.e., 'not even one.' The pluperfect-like
    English 'had died' fits the reported result of Pharaoh's inquiry.
- source_word: מִקְנֶה
  chosen: livestock
  alternatives:
  - cattle
  - herds
  lexicon: HALOT
  rationale: A broad term for domesticated animals/property in livestock. 'Livestock'
    is more accurate than the narrower 'cattle' in this plague context.
- source_word: וַיִּכְבַּד לֵב פַּרְעֹה
  chosen: Pharaoh’s heart was hardened
  alternatives:
  - Pharaoh's heart became heavy
  - Pharaoh hardened his heart
  lexicon: HALOT
  rationale: The Hebrew literally says 'the heart of Pharaoh became heavy.' In Exodus
    this idiom conveys stubborn hardening. 'Was hardened' communicates the idiomatic
    sense in natural English without over-specifying agency, which the Hebrew here
    does not explicitly state.
- source_word: וְלֹא שִׁלַּח אֶת הָעָם
  chosen: and he did not let the people go
  alternatives:
  - and he did not send the people away
  - and he did not release the people
  lexicon: HALOT
  rationale: In the Exodus narrative, שׁלח with the people as object idiomatically
    means to let them go/release them. 'Let the people go' is both accurate and idiomatic.
