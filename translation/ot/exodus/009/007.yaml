theological_decisions:
- issue: Agency in Pharaoh's hardening
  chosen_reading: Pharaoh’s heart was hardened
  alternative_readings:
  - Pharaoh's heart became heavy
  - Pharaoh hardened his heart
  rationale: The clause uses the verb כבד with 'heart of Pharaoh' as subject, describing
    the state/result without an explicit external agent. Rendering it passively in
    English preserves the theological tension in Exodus regarding divine and human
    agency rather than resolving it in this verse.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
