theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for YHWH, preserving reverential
    convention and consistency.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Meaning of קֹלֹת אֱלֹהִים
  chosen_reading: God's thunder
  alternative_readings:
  - voices of God
  - thunderings of God
  rationale: Although literally 'voices of God,' the immediate meteorological context
    (hail plague) indicates thunder. This avoids an overly wooden rendering while
    preserving divine agency.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; original-language
    primacy'
