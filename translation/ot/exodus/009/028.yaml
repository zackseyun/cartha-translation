id: EXO.9.28
reference: Exodus 9:28
source:
  edition: WLC
  text: הַעְתִּ֨ירוּ֙ אֶל יְהוָ֔ה וְ/רַ֕ב מִֽ/הְיֹ֛ת קֹלֹ֥ת אֱלֹהִ֖ים וּ/בָרָ֑ד וַ/אֲשַׁלְּחָ֣ה
    אֶתְ/כֶ֔ם וְ/לֹ֥א תֹסִפ֖וּ/ן לַ/עֲמֹֽד־׃
translation:
  text: Pray to the LORD, for there has been enough of God's thunder and hail. Then
    I will let you go, and you will stay no longer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'voices of God and hail.' Here 'voices' refers to thunder
      in the storm.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַעְתִּירוּ
  chosen: Pray
  alternatives:
  - Entreat
  - Plead
  lexicon: HALOT
  rationale: Hiphil imperative plural of עתר in this context means to make earnest
    supplication/intercession. 'Pray' is natural modern English; 'entreat' is possible
    but less readable.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'
    rather than a transliteration.
- source_word: וְרַב מִהְיֹת
  chosen: for there has been enough
  alternatives:
  - for it is enough
  - and let it be enough
  lexicon: HALOT
  rationale: 'This idiom expresses sufficiency/excess: ''much from being'' = ''it
    has been enough'' or ''there has been enough.'' The chosen rendering communicates
    Pharaoh''s plea that the plague cease.'
- source_word: קֹלֹת אֱלֹהִים
  chosen: God's thunder
  alternatives:
  - voices of God
  - thunderings of God
  lexicon: HALOT
  rationale: קוֹלוֹת literally means 'voices/sounds,' but in plague context with hail
    it refers to thunder. The genitive with אֱלֹהִים marks the thunder as divine in
    origin. 'God's thunder' is idiomatic and contextually precise.
- source_word: וּבָרָד
  chosen: and hail
  lexicon: HALOT
  rationale: Straightforward noun meaning 'hail.'
- source_word: וַאֲשַׁלְּחָה אֶתְכֶם
  chosen: Then I will let you go
  alternatives:
  - and I will send you away
  - and I will release you
  lexicon: HALOT
  rationale: In Exodus, שלח with the people as object regularly means to let them
    go/release them. 'Then' captures the vav-consecutive sense in smooth English.
- source_word: וְלֹא תֹסִפוּן לַעֲמֹד
  chosen: and you will stay no longer
  alternatives:
  - and you shall not continue to stand
  - and you shall remain no longer
  lexicon: HALOT
  rationale: The idiom 'not add to stand' means not to continue remaining/delaying.
    'Stay no longer' conveys Pharaoh's promise that they need not remain in Egypt
    any further.
