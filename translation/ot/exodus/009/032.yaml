id: EXO.9.32
reference: Exodus 9:32
source:
  edition: WLC
  text: וְ/הַ/חִטָּ֥ה וְ/הַ/כֻּסֶּ֖מֶת לֹ֣א נֻכּ֑וּ כִּ֥י אֲפִילֹ֖ת הֵֽנָּה׃
translation:
  text: But the wheat and the spelt were not struck down, because they were late-ripening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wheat and the spelt were not struck down, for they ripen late.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term for 'spelt' may refer to a related grain such as emmer.
    reason: cultural_note
lexical_decisions:
- source_word: וְהַחִטָּה
  chosen: But the wheat
  alternatives:
  - and the wheat
  lexicon: HALOT
  rationale: חִטָּה denotes wheat. The prefixed conjunction is rendered 'But' in English
    to reflect the contrast with the previous verse's damaged crops, though formally
    it is simply 'and.'
- source_word: וְהַכֻּסֶּמֶת
  chosen: and the spelt
  alternatives:
  - and the emmer
  - and the rye
  lexicon: HALOT
  rationale: כֻּסֶּמֶת refers to a grain, traditionally identified as spelt or emmer;
    'spelt' is the most familiar modern English rendering and fits the agricultural
    context. 'Rye' is an older traditional rendering but is less likely botanically.
- source_word: לֹא נֻכּוּ
  chosen: were not struck down
  alternatives:
  - were not hit
  - were not damaged
  lexicon: HALOT
  rationale: The passive of נכה here describes the crops not being smitten by the
    hail. 'Struck down' preserves the plague/judgment register better than the flatter
    'damaged' while remaining natural English.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: כִּי introduces the reason the wheat and spelt escaped damage. 'Because'
    is clearer in contemporary English than 'for.'
- source_word: אֲפִילֹת הֵנָּה
  chosen: they were late-ripening
  alternatives:
  - they were still dark
  - they were not yet in ear
  - they ripen late
  lexicon: HALOT
  rationale: The feminine plural adjective/predicate likely refers to being late or
    backward in development, explaining why the hail did not destroy them. 'Late-ripening'
    captures the agricultural sense in clear English. More literal options like 'dark'
    are obscure here and likely reflect an underlying notion of being undeveloped
    or hidden.
