id: EXO.9.35
reference: Exodus 9:35
source:
  edition: WLC
  text: וַֽ/יֶּחֱזַק֙ לֵ֣ב פַּרְעֹ֔ה וְ/לֹ֥א שִׁלַּ֖ח אֶת בְּנֵ֣י יִשְׂרָאֵ֑ל כַּ/אֲשֶׁ֛ר
    דִּבֶּ֥ר יְהוָ֖ה בְּ/יַד מֹשֶֽׁה־־׃פ
translation:
  text: So Pharaoh’s heart was hardened, and he did not let the sons of Israel go,
    just as the LORD had spoken through Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or traditionally 'the children of Israel'; Hebrew 'the
      sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'by the hand of Moses,' an idiom meaning 'through Moses.'
    reason: lexical_alternative
  - marker: c
    text: Or 'Pharaoh’s heart grew hard.' The Hebrew verb can mean 'became strong/firm,'
      here in the sense of stubborn hardening.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֶּחֱזַק
  chosen: was hardened
  alternatives:
  - was strong
  - grew hard
  - was firm
  lexicon: HALOT
  rationale: The verb חזק in the plague narrative can denote becoming strong/firm,
    but in this context of Pharaoh’s resistance it idiomatically conveys hardening
    or stubborn strengthening of resolve. The passive-like English 'was hardened'
    best communicates the narrative sense in natural English while preserving the
    hardness motif across the context.
- source_word: לֵב פַּרְעֹה
  chosen: Pharaoh’s heart
  alternatives:
  - the heart of Pharaoh
  lexicon: HALOT
  rationale: A straightforward construct chain. 'Pharaoh’s heart' is idiomatic modern
    English and preserves the Hebrew focus on the inner will/disposition.
- source_word: שִׁלַּח
  chosen: let ... go
  alternatives:
  - send away
  - release
  lexicon: HALOT
  rationale: In Exodus this verb regularly refers to Pharaoh permitting Israel to
    depart. 'Let ... go' is the most natural and contextually established English
    rendering.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' In keeping with gender-accurate
    translation and transparency to the source, this rendering preserves the formal
    expression rather than replacing it with the more interpretive collective 'Israelites.'
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Introduces correspondence between the event and the prior divine word.
    'Just as' clearly marks fulfillment.
- source_word: דִּבֶּר יְהוָה
  chosen: the LORD had spoken
  alternatives:
  - the LORD spoke
  - the LORD had said
  lexicon: HALOT
  rationale: English past perfect fits the sense of prior divine speech now being
    fulfilled. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, יְהוָה is rendered 'the LORD'
    in the main text.
- source_word: בְּיַד מֹשֶׁה
  chosen: through Moses
  alternatives:
  - by the hand of Moses
  - by Moses
  lexicon: HALOT
  rationale: The idiom 'by the hand of' means agency/instrumentality. 'Through Moses'
    is clear modern English while preserving the mediating role.
