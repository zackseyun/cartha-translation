theological_decisions:
- issue: Agency and hardening language
  chosen_reading: So Pharaoh’s heart was hardened
  alternative_readings:
  - So Pharaoh’s heart grew hard
  - So Pharaoh hardened his heart
  rationale: The Hebrew form here presents the heart as becoming/being strong rather
    than explicitly stating direct divine causation or Pharaoh’s self-hardening in
    this verse. The chosen rendering preserves the hardness motif without importing
    a stronger causal claim than this clause itself makes, while remaining consistent
    with the broader narrative tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
