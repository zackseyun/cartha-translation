id: EXO.9.19
reference: Exodus 9:19
source:
  edition: WLC
  text: וְ/עַתָּ֗ה שְׁלַ֤ח הָעֵז֙ אֶֽת מִקְנְ/ךָ֔ וְ/אֵ֛ת כָּל אֲשֶׁ֥ר לְ/ךָ֖ בַּ/שָּׂדֶ֑ה
    כָּל הָ/אָדָ֨ם וְ/הַ/בְּהֵמָ֜ה אֲשֶֽׁר יִמָּצֵ֣א בַ/שָּׂדֶ֗ה וְ/לֹ֤א יֵֽאָסֵף֙
    הַ/בַּ֔יְתָ/ה וְ/יָרַ֧ד עֲלֵ/הֶ֛ם הַ/בָּרָ֖ד וָ/מֵֽתוּ־־־־׃
translation:
  text: So now, send word and bring your livestock and everything you have in the
    field to safety. Every man and beast that is found in the field and is not gathered
    into the house—the hail will come down on them, and they will die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'send quickly' / 'send at once'; the Hebrew command includes an urgency
      nuance.
    reason: lexical_alternative
  - marker: b
    text: '''Every man'' renders Hebrew adam here as a representative term for human
      beings generally.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: So now
  alternatives:
  - Now
  - And now
  lexicon: HALOT
  rationale: Introduces an immediate consequence or urgent transition. 'So now' captures
    both the connective ו and the temporal adverb עתה in natural English.
- source_word: שְׁלַח הָעֵז
  chosen: send word
  alternatives:
  - send quickly
  - send at once
  - send, make secure
  lexicon: HALOT
  rationale: The imperative שׁלח with the following infinitive-like/adverbial הָעֵז
    conveys urgent action. 'Send word' fits the context of ordering servants to secure
    property, while the urgency is preserved without awkward literalism. The nuance
    of haste from הָעֵז is absorbed into the command's force.
- source_word: מִקְנְךָ
  chosen: your livestock
  alternatives:
  - your cattle
  - your property in animals
  lexicon: HALOT
  rationale: מִקְנֶה commonly denotes livestock or domesticated animals as possessions.
    'Livestock' is the clearest modern equivalent.
- source_word: וְאֵת כָּל אֲשֶׁר לְךָ בַּשָּׂדֶה
  chosen: and everything you have in the field
  alternatives:
  - and all that belongs to you in the field
  - and all that is yours in the open country
  lexicon: HALOT
  rationale: A broad phrase covering possessions located outdoors. 'Everything you
    have in the field' is natural and sufficiently comprehensive.
- source_word: כָּל הָאָדָם
  chosen: Every man
  alternatives:
  - Every person
  - Everyone
  lexicon: HALOT
  rationale: Following the doctrine's gender-accurate principle, אדם here is singular
    collective but paired with beast and used representatively for human beings. 'Every
    man' preserves the source's form and distributive force better than a neutral
    paraphrase.
- source_word: וְהַבְּהֵמָה
  chosen: and beast
  alternatives:
  - and animal
  - and livestock
  lexicon: HALOT
  rationale: בְּהֵמָה here is a broad term for animals, especially domesticated beasts.
    'Beast' preserves the concise pairing 'man and beast' common in English biblical
    style.
- source_word: אֲשֶׁר יִמָּצֵא בַשָּׂדֶה
  chosen: that is found in the field
  alternatives:
  - that is out in the field
  - that remains in the field
  lexicon: HALOT
  rationale: 'The Niphal of מצא is passive/reflexive in sense: ''is found.'' This
    keeps the conditional description close to the Hebrew.'
- source_word: וְלֹא יֵאָסֵף הַבַּיְתָה
  chosen: and is not gathered into the house
  alternatives:
  - and is not brought home
  - and is not taken indoors
  lexicon: HALOT
  rationale: אָסף in Niphal/passive sense means to be gathered in. 'Into the house'
    reflects the directional ending on הַבַּיְתָה. This is more literal than 'brought
    home' and preserves the image of sheltering indoors.
- source_word: וְיָרַד עֲלֵהֶם הַבָּרָד
  chosen: the hail will come down on them
  alternatives:
  - the hail will fall on them
  - hail will descend upon them
  lexicon: HALOT
  rationale: The Hebrew verb is singular with 'the hail' as subject. 'Will come down
    on them' is idiomatic and preserves the downward motion of ירד.
- source_word: וָמֵתוּ
  chosen: and they will die
  alternatives:
  - and they shall die
  lexicon: HALOT
  rationale: Simple future consequence from the qatal with prefixed conjunction in
    context. Modern English prefers 'will die' over 'shall die'.
- source_word: בַּשָּׂדֶה
  chosen: in the field
  alternatives:
  - in the open field
  - in the countryside
  lexicon: HALOT
  rationale: '''Field'' is the standard rendering and fits both occurrences in the
    verse. No contextual pressure requires expansion.'
