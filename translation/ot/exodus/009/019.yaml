theological_decisions:
- issue: Rendering of אָדָם in a representative/generic warning
  chosen_reading: Every man
  alternative_readings:
  - Every person
  - Everyone
  rationale: The doctrine excerpt specifies gender-accurate over gender-neutral renderings
    where the source uses grammatically masculine representative language. Here אדם
    is collective/generic, but 'Every man' best preserves the Hebrew form and the
    traditional human/animal pairing, while the context clearly includes all humans
    in the field.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table
    for אָדָם
