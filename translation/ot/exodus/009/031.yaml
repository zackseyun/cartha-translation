id: EXO.9.31
reference: Exodus 9:31
source:
  edition: WLC
  text: וְ/הַ/פִּשְׁתָּ֥ה וְ/הַ/שְּׂעֹרָ֖ה נֻכָּ֑תָה כִּ֤י הַ/שְּׂעֹרָה֙ אָבִ֔יב וְ/הַ/פִּשְׁתָּ֖ה
    גִּבְעֹֽל׃
translation:
  text: And the flax and the barley were struck down, because the barley was in the
    ear and the flax was in bud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the barley was ripening' for 'was in the ear.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the flax was in blossom' for 'was in bud.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַפִּשְׁתָּה
  chosen: the flax
  alternatives:
  - the linen plant
  lexicon: HALOT
  rationale: פִּשְׁתָּה denotes flax, the plant from which linen is made. 'Flax' is
    the most direct and natural English equivalent for the crop in this agricultural
    context.
- source_word: הַשְּׂעֹרָה
  chosen: the barley
  lexicon: HALOT
  rationale: שְׂעֹרָה straightforwardly refers to barley, one of the grain crops affected
    by the plague.
- source_word: נֻכָּתָה
  chosen: were struck down
  alternatives:
  - was struck
  - were beaten down
  - were ruined
  lexicon: HALOT
  rationale: From נכה, here a passive form with a feminine singular verb governing
    a compound subject. 'Were struck down' captures the passive sense and the effect
    of the hail on the crops in idiomatic English. Plural English agreement is used
    because the subject is compound ('the flax and the barley').
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: כִּי gives the reason the crops were damaged. 'Because' is clearer in
    modern English than the more formal 'for'.
- source_word: אָבִיב
  chosen: in the ear
  alternatives:
  - in the head
  - ripening
  lexicon: HALOT
  rationale: אָבִיב refers to grain at the stage when the ear has formed and is fresh/ripening.
    'In the ear' is a standard agricultural rendering that preserves the concrete
    image better than the more interpretive 'ripening'.
- source_word: גִּבְעֹל
  chosen: in bud
  alternatives:
  - in blossom
  - forming capsules
  lexicon: HALOT
  rationale: גִּבְעֹל refers to the flax being in an advanced growth stage, likely
    budding or bolled. 'In bud' is concise, readable, and suitably concrete, while
    avoiding overprecision beyond what the Hebrew clearly warrants.
