id: EXO.9.18
reference: Exodus 9:18
source:
  edition: WLC
  text: הִנְ/נִ֤י מַמְטִיר֙ כָּ/עֵ֣ת מָחָ֔ר בָּרָ֖ד כָּבֵ֣ד מְאֹ֑ד אֲשֶׁ֨ר לֹא הָיָ֤ה
    כָמֹ֨/הוּ֙ בְּ/מִצְרַ֔יִם לְ/מִן הַ/יּ֥וֹם הִוָּסְדָ֖/ה וְ/עַד עָֽתָּה־־־׃
translation:
  text: Behold, about this time tomorrow I will rain down very heavy hail, such as
    has never been in Egypt from the day it was founded until now.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at this time tomorrow.'
    reason: lexical_alternative
  - marker: b
    text: Or 'since the day it was established.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  - Indeed
  lexicon: HALOT
  rationale: Introduces a solemn divine announcement with deictic emphasis. 'Behold'
    preserves the force and gravity better than flatter modern options, while remaining
    understandable in context.
- source_word: מַמְטִיר
  chosen: I will rain down
  alternatives:
  - I am causing to rain
  - I will make rain
  lexicon: HALOT
  rationale: 'Hiphil of מטר expresses causative action: God causes the hail to fall.
    ''I will rain down'' is idiomatic English that preserves the causative sense without
    awkwardness.'
- source_word: כָּעֵת מָחָר
  chosen: about this time tomorrow
  alternatives:
  - at this time tomorrow
  - tomorrow at this time
  lexicon: HALOT
  rationale: This temporal phrase points to roughly the same time on the following
    day. 'About this time tomorrow' is natural English and reflects the prefixed כ
    nuance of approximation/comparison.
- source_word: בָּרָד
  chosen: hail
  lexicon: HALOT
  rationale: Standard and precise rendering for the meteorological term.
- source_word: כָּבֵד מְאֹד
  chosen: very heavy
  alternatives:
  - extremely severe
  - exceedingly weighty
  lexicon: HALOT
  rationale: כָּבֵד literally means 'heavy,' and with מְאֹד intensifies the description.
    For hail, 'very heavy' is both literal and idiomatic; 'severe' is possible but
    less directly tied to the Hebrew adjective.
- source_word: אֲשֶׁר לֹא הָיָה כָמֹהוּ
  chosen: such as has never been
  alternatives:
  - the like of which has never occurred
  - which has not been like it
  lexicon: HALOT
  rationale: This relative clause compares the coming hail with all prior experience.
    'Such as has never been' is concise, idiomatic, and preserves the superlative
    comparison.
- source_word: בְּמִצְרַיִם
  chosen: in Egypt
  lexicon: HALOT
  rationale: Straightforward locative rendering.
- source_word: לְמִן הַיּוֹם הִוָּסְדָה
  chosen: from the day it was founded
  alternatives:
  - since the day it was established
  - from the day she was founded
  lexicon: HALOT
  rationale: The Niphal form indicates Egypt's being established/founded. English
    normally refers to a nation as 'it' here. 'Founded' is slightly more concrete
    and idiomatic than 'established,' while preserving the passive sense.
- source_word: וְעַד עָתָּה
  chosen: until now
  alternatives:
  - even to now
  - up to this point
  lexicon: HALOT
  rationale: Standard temporal expression marking continuation from founding to the
    present moment.
