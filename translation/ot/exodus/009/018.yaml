theological_decisions:
- issue: Divine agency in the plague announcement
  chosen_reading: God directly declares, 'I will rain down,' preserving explicit divine
    causation.
  alternative_readings:
  - A less direct rendering such as 'hail will fall'
  rationale: The Hiphil verb with first-person subject explicitly attributes the coming
    hail to God's action. The translation should not soften this into an impersonal
    event.
