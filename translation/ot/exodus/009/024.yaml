id: EXO.9.24
reference: Exodus 9:24
source:
  edition: WLC
  text: וַ/יְהִ֣י בָרָ֔ד וְ/אֵ֕שׁ מִתְלַקַּ֖חַת בְּ/ת֣וֹךְ הַ/בָּרָ֑ד כָּבֵ֣ד מְאֹ֔ד
    אֲ֠שֶׁר לֹֽא הָיָ֤ה כָמֹ֨/הוּ֙ בְּ/כָל אֶ֣רֶץ מִצְרַ֔יִם מֵ/אָ֖ז הָיְתָ֥ה לְ/גֽוֹי־־׃
translation:
  text: There was hail, and fire flashing within the hail, very severe—such as had
    never been in all the land of Egypt since it became a nation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and fire was darting in the midst of the hail'; the Hebrew uses the
      literal term 'fire,' likely describing lightning-like flashes within the storm.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: There was
  alternatives:
  - and there was
  - and it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing the event. 'There was' is natural
    English and preserves the existential/reporting force without over-literal awkwardness.
- source_word: בָּרָד
  chosen: hail
  lexicon: HALOT
  rationale: Standard rendering for the meteorological phenomenon in the plague narrative.
- source_word: וְאֵשׁ
  chosen: and fire
  alternatives:
  - and lightning
  lexicon: HALOT
  rationale: The Hebrew noun is literally 'fire.' In storm contexts it can denote
    lightning-like fiery phenomena, but the text itself says 'fire,' so the main text
    preserves that imagery.
- source_word: מִתְלַקַּחַת
  chosen: flashing
  alternatives:
  - taking hold
  - darting
  - continually blazing
  lexicon: HALOT
  rationale: Hitpael participle of לקח in this idiom conveys fire moving/flickering
    through the hail. 'Flashing' communicates the vivid storm imagery in readable
    English better than a wooden 'taking itself' construction.
- source_word: בְּתוֹךְ הַבָּרָד
  chosen: within the hail
  alternatives:
  - in the midst of the hail
  - among the hail
  lexicon: HALOT
  rationale: בְּתוֹךְ denotes interior/midst. 'Within the hail' is concise and preserves
    the striking image of fire appearing amid the hailstorm.
- source_word: כָּבֵד מְאֹד
  chosen: very severe
  alternatives:
  - very heavy
  - extremely grievous
  lexicon: HALOT
  rationale: כבד literally means 'heavy,' but for a storm in English 'very severe'
    best conveys the idiomatic sense of intensity.
- source_word: אֲשֶׁר לֹא הָיָה כָמֹהוּ
  chosen: such as had never been
  alternatives:
  - the like of which had never occurred
  - such as there had not been like it
  lexicon: HALOT
  rationale: This relative clause expresses unparalleled severity. The chosen rendering
    is idiomatic while preserving the superlative comparison.
- source_word: בְּכָל אֶרֶץ מִצְרַיִם
  chosen: in all the land of Egypt
  alternatives:
  - throughout the whole land of Egypt
  lexicon: HALOT
  rationale: Standard territorial expression; 'land of Egypt' is the natural biblical-English
    rendering.
- source_word: מֵאָז הָיְתָה לְגוֹי
  chosen: since it became a nation
  alternatives:
  - since it came into being as a nation
  - from the time it became a people
  lexicon: HALOT
  rationale: The feminine verb refers to the land/country, and לְגוֹי marks transition
    into nationhood. 'Since it became a nation' is idiomatic and captures the historical
    benchmark.
