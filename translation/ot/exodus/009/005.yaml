id: EXO.9.5
reference: Exodus 9:5
source:
  edition: WLC
  text: וַ/יָּ֥שֶׂם יְהוָ֖ה מוֹעֵ֣ד לֵ/אמֹ֑ר מָחָ֗ר יַעֲשֶׂ֧ה יְהוָ֛ה הַ/דָּבָ֥ר הַ/זֶּ֖ה
    בָּ/אָֽרֶץ׃
translation:
  text: And the LORD set a time, saying, “Tomorrow the LORD will do this thing in
    the land.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “an appointed time” or “a set time.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  chosen: set
  alternatives:
  - appointed
  - fixed
  lexicon: HALOT
  rationale: From שׂוּם, here in the sense of establishing or fixing something. 'Set'
    is concise and natural in English, while preserving the formal sense. 'Appointed'
    is possible, but 'set a time' better reflects the collocation with מוֹעֵד.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: מוֹעֵד
  chosen: a time
  alternatives:
  - an appointed time
  - a set time
  lexicon: HALOT
  rationale: מוֹעֵד often denotes an appointed time or fixed occasion. Here, in straightforward
    narrative speech, 'a time' is readable modern English and is clarified by the
    following 'Tomorrow.' The alternatives are semantically close; 'appointed time'
    is slightly more formal.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard rendering of the infinitive introducing direct speech in Hebrew
    narrative.
- source_word: מָחָר
  chosen: Tomorrow
  alternatives:
  - the next day
  lexicon: HALOT
  rationale: The adverb directly indicates the time of fulfillment and is best rendered
    simply as 'Tomorrow' in the quotation.
- source_word: יַעֲשֶׂה
  chosen: will do
  alternatives:
  - will bring about
  - will carry out
  lexicon: HALOT
  rationale: עשה is broad and commonly rendered 'do' or 'make.' Here 'will do' preserves
    the Hebrew's simplicity and directness without over-interpreting the action.
- source_word: הַדָּבָר הַזֶּה
  chosen: this thing
  alternatives:
  - this matter
  - this event
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'thing.' In this plague context
    it refers to the announced act/judgment. 'This thing' is idiomatic and close to
    the Hebrew; 'this matter' is possible but less natural in contemporary English.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the הארץ region
  - throughout the land
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the land of Egypt in context. 'In the land' preserves
    the Hebrew wording without adding 'Egypt,' which is contextually understood from
    the surrounding passage.
