id: EXO.9.20
reference: Exodus 9:20
source:
  edition: WLC
  text: הַ/יָּרֵא֙ אֶת דְּבַ֣ר יְהוָ֔ה מֵֽ/עַבְדֵ֖י פַּרְעֹ֑ה הֵנִ֛יס אֶת עֲבָדָ֥י/ו
    וְ/אֶת מִקְנֵ֖/הוּ אֶל הַ/בָּתִּֽים־־־־׃
translation:
  text: Whoever among Pharaoh’s servants feared the word of the LORD hurried his servants
    and his livestock into the houses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one among Pharaoh’s servants who feared the word of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'caused to flee'; that is, he quickly brought them under shelter.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיָּרֵא
  chosen: Whoever ... feared
  alternatives:
  - The one who feared
  - Anyone who feared
  lexicon: HALOT
  rationale: 'The article with the participle functions substantivally: ''the one/whoever
    fearing.'' In English, ''whoever ... feared'' best captures the class-reference
    naturally while preserving the participial sense of a subset within Pharaoh''s
    servants.'
- source_word: דְּבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  - the warning of the LORD
  lexicon: HALOT
  rationale: דבר commonly means 'word' or 'message.' 'The word of the LORD' preserves
    the established biblical idiom and reflects the direct object of fearing; 'warning'
    is interpretive and narrower than the Hebrew.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention rooted
    in the LXX pattern.
- source_word: מֵעַבְדֵי פַרְעֹה
  chosen: among Pharaoh’s servants
  alternatives:
  - from Pharaoh’s servants
  - of Pharaoh’s servants
  lexicon: HALOT
  rationale: 'The preposition מִן here is partitive: one from among a larger group.
    ''Among Pharaoh’s servants'' expresses the sense idiomatically in English.'
- source_word: הֵנִיס
  chosen: hurried
  alternatives:
  - drove
  - caused to flee
  - brought to safety
  lexicon: HALOT
  rationale: The Hiphil of נוּס means to cause to flee or put to flight. In this context
    of moving people and animals indoors before the hail, 'hurried' is natural English
    that preserves the urgency without implying panic beyond the text. 'Brought to
    safety' adds interpretation.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, here the social-bonded nuance
    is not the focus; the context is household personnel under an Egyptian official.
    'Servants' is the more contextually natural rendering while remaining accurate.
- source_word: מִקְנֵהוּ
  chosen: his livestock
  alternatives:
  - his cattle
  - his animals
  lexicon: HALOT
  rationale: מִקְנֶה refers broadly to livestock/property animals. 'Livestock' is
    the most accurate general modern term; 'cattle' would be too narrow.
- source_word: אֶל הַבָּתִּים
  chosen: into the houses
  alternatives:
  - into the house
  - to the houses
  lexicon: HALOT
  rationale: The plural noun with the preposition אֶל is best rendered 'into the houses,'
    indicating movement into sheltering buildings. The plural should be preserved
    rather than flattened to singular.
