theological_decisions:
- issue: Counterfactual force of the verbal sequence
  chosen_reading: Render the clause as a counterfactual statement ('I could have...
    and you would have been...')
  alternative_readings:
  - Render more formally as a simple past ('For now I have stretched out my hand...
    and you were cut off...')
  rationale: The immediate context contrasts what God could have done with what he
    has in fact done in order to display his power (vv. 15–16). A simple past rendering
    creates tension with Pharaoh still being alive and addressed. The counterfactual
    reading best reflects the discourse sense without importing extra theology.
  doctrine_reference: Translation philosophy §1, §3
