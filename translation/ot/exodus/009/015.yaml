id: EXO.9.15
reference: Exodus 9:15
source:
  edition: WLC
  text: כִּ֤י עַתָּה֙ שָׁלַ֣חְתִּי אֶת יָדִ֔/י וָ/אַ֥ךְ אוֹתְ/ךָ֛ וְ/אֶֽת עַמְּ/ךָ֖
    בַּ/דָּ֑בֶר וַ/תִּכָּחֵ֖ד מִן הָ/אָֽרֶץ־־־׃
translation:
  text: For by now I could have stretched out my hand and struck you and your people
    with pestilence, and you would have been cut off from the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'For now I have stretched out my hand and struck you
      and your people with pestilence, and you were cut off from the earth.' The Hebrew
      verbal forms are formally past, but the context strongly supports a counterfactual
      sense.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding statement; 'for' fits the
    causal/explanatory force in context.
- source_word: עַתָּה
  chosen: by now
  alternatives:
  - now
  - at this time
  lexicon: HALOT
  rationale: 'In this counterfactual context, ''by now'' conveys temporal force naturally
    in English: God is saying what could already have happened.'
- source_word: שָׁלַחְתִּי אֶת־יָדִי
  chosen: I could have stretched out my hand
  alternatives:
  - I stretched out my hand
  - I sent out my hand
  lexicon: HALOT
  rationale: Although the Hebrew form is formally perfect ('I sent/stretched out'),
    the clause is best understood idiomatically and contextually as a counterfactual
    or potential action in light of the following result clause. 'Stretched out my
    hand' preserves the Hebrew idiom for divine action/judgment better than the more
    wooden 'sent out my hand.' 'Could have' is supplied to express the sense in idiomatic
    English.
- source_word: וָאַךְ
  chosen: and struck
  alternatives:
  - and smote
  - and hit
  lexicon: HALOT
  rationale: From נכה, in plague/judgment contexts 'strike' is the standard natural
    rendering. It preserves the force of divine affliction without archaic diction.
- source_word: אֹתְךָ וְאֶת־עַמְּךָ
  chosen: you and your people
  lexicon: HALOT
  rationale: Direct and literal rendering of the objects of judgment.
- source_word: בַּדָּבֶר
  chosen: with pestilence
  alternatives:
  - with plague
  - with disease
  lexicon: HALOT
  rationale: דבר commonly denotes pestilence/plague in judgment contexts. 'Pestilence'
    is precise and distinguishes this from the broader English 'plague,' which can
    refer to the whole cycle of signs.
- source_word: וַתִּכָּחֵד
  chosen: you would have been cut off
  alternatives:
  - you would have perished
  - you would have been wiped out
  - you would have been destroyed
  lexicon: HALOT
  rationale: The Niphal of כחד conveys being effaced, annihilated, or cut off. 'Cut
    off' preserves the severity while remaining idiomatic and slightly more formal
    than 'wiped out.' The modal 'would have been' matches the counterfactual sense
    of the verse.
- source_word: מִן־הָאָרֶץ
  chosen: from the earth
  alternatives:
  - from the land
  lexicon: HALOT
  rationale: אָרֶץ can mean 'land' or 'earth.' Here the sense is broad eradication
    rather than removal merely from Egypt's territory, so 'earth' best captures the
    scope and traditional idiom.
