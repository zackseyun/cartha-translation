theological_decisions:
- issue: Meaning of הֶעֱמַדְתִּיךָ in relation to Pharaoh
  chosen_reading: God states that he has allowed Pharaoh to remain standing/alive
    for a divine purpose.
  alternative_readings:
  - God has raised Pharaoh up to royal position for this purpose.
  - God has preserved Pharaoh through the plagues for this purpose.
  rationale: The immediate context contrasts what God could have done already (cut
    Pharaoh off) with the fact that Pharaoh still stands. This favors preservation/continued
    existence as the primary sense. The translation avoids importing a stronger claim
    about God's installing Pharaoh into office while still allowing the broader theological
    implication of divine sovereignty.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
