id: EXO.9.16
reference: Exodus 9:16
source:
  edition: WLC
  text: וְ/אוּלָ֗ם בַּ/עֲב֥וּר זֹאת֙ הֶעֱמַדְתִּ֔י/ךָ בַּ/עֲב֖וּר הַרְאֹתְ/ךָ֣ אֶת
    כֹּחִ֑/י וּ/לְמַ֛עַן סַפֵּ֥ר שְׁמִ֖/י בְּ/כָל הָ/אָֽרֶץ־־׃
translation:
  text: 'But for this purpose I have let you stand: to show you my power, and so that
    my name may be proclaimed in all the earth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I have raised you up.' The Hebrew can be understood as causing Pharaoh
      to stand or remain, which in context likely means preserving him rather than
      immediately destroying him.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאוּלָם
  chosen: But
  alternatives:
  - Nevertheless
  - However
  lexicon: HALOT
  rationale: Marks a strong contrast with the preceding statement; 'But' is natural
    modern English and preserves the adversative force without sounding overly formal.
- source_word: בַּעֲבוּר זֹאת
  chosen: for this purpose
  alternatives:
  - for this reason
  - because of this
  lexicon: HALOT
  rationale: The prepositional phrase introduces divine purpose rather than mere cause;
    'for this purpose' best fits the following infinitival clauses.
- source_word: הֶעֱמַדְתִּיךָ
  chosen: I have let you stand
  alternatives:
  - I have caused you to stand
  - I have preserved you
  - I have raised you up
  lexicon: HALOT
  rationale: From עמד in the Hiphil, the sense is causing someone to remain standing
    or continue in existence. In context, God has spared Pharaoh rather than immediately
    cutting him off. 'Let you stand' preserves the Hebrew image while communicating
    continued survival. 'Raised you up' is traditional and reflected in some later
    citations, but in this Hebrew context it can misleadingly suggest elevation to
    office rather than preservation.
- source_word: בַּעֲבוּר הַרְאֹתְךָ
  chosen: to show you
  alternatives:
  - in order to show you
  - for the sake of showing you
  lexicon: HALOT
  rationale: Expresses purpose with a direct and readable English infinitive construction.
- source_word: כֹּחִי
  chosen: my power
  alternatives:
  - my strength
  - my might
  lexicon: HALOT
  rationale: כח commonly denotes strength or power; 'power' best suits the display
    of divine might in the plague narrative.
- source_word: וּלְמַעַן
  chosen: and so that
  alternatives:
  - and in order that
  - so that
  lexicon: HALOT
  rationale: Introduces a second purpose clause. 'And so that' clearly coordinates
    it with the prior purpose statement.
- source_word: סַפֵּר
  chosen: may be proclaimed
  alternatives:
  - may be declared
  - may be recounted
  - may be told
  lexicon: HALOT
  rationale: The verb ספר in the Piel means to recount or declare. An impersonal passive
    in English captures the Hebrew's open-ended subject ('one may tell') and fits
    the global scope of the clause.
- source_word: שְׁמִי
  chosen: my name
  lexicon: HALOT
  rationale: A standard rendering; in Hebrew 'name' carries reputation and revealed
    identity, but the literal expression should be preserved in the main text.
- source_word: בְּכָל הָאָרֶץ
  chosen: in all the earth
  alternatives:
  - throughout all the earth
  - in all the land
  lexicon: HALOT
  rationale: Given the universalizing כל with הארץ in this context, 'earth' is preferable
    to 'land'; the point is worldwide renown, not merely a local territory.
