id: EXO.9.26
reference: Exodus 9:26
source:
  edition: WLC
  text: רַ֚ק בְּ/אֶ֣רֶץ גֹּ֔שֶׁן אֲשֶׁר שָׁ֖ם בְּנֵ֣י יִשְׂרָאֵ֑ל לֹ֥א הָיָ֖ה בָּרָֽד־׃
translation:
  text: Only in the land of Goshen, where the sons of Israel were, there was no hail.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or 'the children of Israel.' The Hebrew reads 'the sons
      of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  chosen: Only
  alternatives:
  - except
  - only in
  lexicon: HALOT
  rationale: רַק marks restriction/exclusion. 'Only' preserves the emphatic limitation
    at the head of the clause in natural English.
- source_word: בְּאֶרֶץ
  chosen: in the land of
  alternatives:
  - in
  - in the territory of
  lexicon: HALOT
  rationale: The preposition ב plus אֶרֶץ is most naturally rendered 'in the land
    of.' 'Land' is appropriate for a named region such as Goshen.
- source_word: גֹּשֶׁן
  chosen: Goshen
  rationale: Proper place name; transliterated according to the translation philosophy.
- source_word: אֲשֶׁר שָׁם
  chosen: where
  alternatives:
  - where there
  - in which there
  lexicon: HALOT
  rationale: The relative particle plus adverb of place forms a relative locative
    expression. 'Where' gives clear, idiomatic English without adding meaning.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' In keeping with gender-accurate policy, the
    masculine familial expression is preserved rather than flattened to 'Israelites,'
    while remaining understandable in context.
- source_word: לֹא הָיָה
  chosen: there was no
  alternatives:
  - was not
  - did not occur
  lexicon: HALOT
  rationale: The existential use of היה with negation is best represented in English
    as 'there was no,' which communicates the absence of hail in that region.
- source_word: בָּרָד
  chosen: hail
  lexicon: HALOT
  rationale: Standard rendering of the weather phenomenon in the plague narrative.
