theological_decisions:
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The Hebrew is explicitly masculine plural construct. Per the doctrine's
    gender-accurate principle, the translation preserves the source form unless context
    requires a more idiomatic collective. Here, 'the sons of Israel' is clear and
    formally faithful.
