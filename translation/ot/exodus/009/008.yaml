id: EXO.9.8
reference: Exodus 9:8
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוָה֮ אֶל מֹשֶׁ֣ה וְ/אֶֽל אַהֲרֹן֒ קְח֤וּ לָ/כֶם֙ מְלֹ֣א חָפְנֵי/כֶ֔ם פִּ֖יחַ כִּבְשָׁ֑ן וּ/זְרָק֥/וֹ מֹשֶׁ֛ה הַ/שָּׁמַ֖יְמָ/ה לְ/עֵינֵ֥י פַרְעֹֽה־־׃
translation:
  text: Then Yahweh said to Moses and to Aaron, “Take for yourselves handfuls of soot from a furnace, and let Moses throw it toward the sky before Pharaoh’s eyes.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'full handfuls'; literally 'the fullness of your hands.'
    reason: lexical_alternative
  - marker: b
    text: '''Soot'' may also be rendered ''fine soot'' or, more generally, ''ashes,'' though the Hebrew points more specifically to soot from a furnace.'
    reason: lexical_alternative
  - marker: c
    text: Or 'toward heaven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: The verb אמר is the standard verb of speaking; 'said' is the most natural and direct English equivalent here.
- source_word: קְחוּ לָכֶם
  chosen: Take for yourselves
  alternatives:
  - Take
  - Get for yourselves
  lexicon: HALOT
  rationale: The imperative plural with לָכֶם has a reflexive/dative nuance. 'For yourselves' preserves the Hebrew emphasis without sounding unnatural.
- source_word: מְלֹא חָפְנֵיכֶם
  chosen: handfuls
  alternatives:
  - full handfuls
  - the fullness of your hands
  lexicon: HALOT
  rationale: The expression literally means 'the fullness of your palms/hands.' 'Handfuls' is idiomatic English and adequately conveys the quantity; the plural reflects the dual participants addressed.
- source_word: פִּיחַ
  chosen: soot
  alternatives:
  - fine soot
  - ashes
  lexicon: HALOT
  rationale: פִּיחַ denotes soot or fine black powdery residue, not ordinary ash in general. 'Soot' best matches the lexical sense and the plague context.
- source_word: כִּבְשָׁן
  chosen: furnace
  alternatives:
  - kiln
  - smelting furnace
  lexicon: HALOT
  rationale: The term refers to a furnace or kiln. 'Furnace' is the broad, natural English choice here and fits the likely industrial/heating context without over-specifying.
- source_word: וּזְרָקוֹ
  chosen: and let Moses throw it
  alternatives:
  - and Moses shall toss it
  - and Moses must scatter it
  lexicon: HALOT
  rationale: Though the initial command is plural ('take'), the following verb is 3ms with object suffix, shifting specifically to Moses as the actor. 'Let Moses throw it' preserves that shift and reads naturally as a continued instruction.
- source_word: הַשָּׁמַיְמָה
  chosen: toward the sky
  alternatives:
  - heavenward
  - toward heaven
  lexicon: HALOT
  rationale: The directional ending indicates motion upward. 'Toward the sky' is clear modern English; 'heavenward' is more formal, while 'toward heaven' could sound overly theological in this physical action context.
- source_word: לְעֵינֵי פַרְעֹה
  chosen: before Pharaoh’s eyes
  alternatives:
  - in Pharaoh's sight
  - before Pharaoh
  lexicon: HALOT
  rationale: The idiom literally means 'to/for the eyes of Pharaoh,' emphasizing visible public action. 'Before Pharaoh’s eyes' preserves the vividness of the Hebrew idiom.
