theological_decisions:
- issue: Agency and scope of heart-hardening
  chosen_reading: The verse states that Pharaoh hardened his own heart, with the concluding
    phrase extending involvement to 'he and his servants.'
  alternative_readings:
  - The final phrase modifies only the hardening action collectively
  - The phrase is merely appositional emphasis on Pharaoh and his court
  rationale: The Hebrew explicitly attributes the action to Pharaoh ('hardened his
    heart') and then adds 'he and his servants.' The translation preserves the wording
    without importing a broader doctrinal claim about divine versus human agency beyond
    what this verse states.
  doctrine_reference: Preserve theological tension rather than resolve it.
