id: EXO.9.34
reference: Exodus 9:34
source:
  edition: WLC
  text: וַ/יַּ֣רְא פַּרְעֹ֗ה כִּֽי חָדַ֨ל הַ/מָּטָ֧ר וְ/הַ/בָּרָ֛ד וְ/הַ/קֹּלֹ֖ת וַ/יֹּ֣סֶף
    לַ/חֲטֹ֑א וַ/יַּכְבֵּ֥ד לִבּ֖/וֹ ה֥וּא וַ/עֲבָדָֽי/ו־׃
translation:
  text: But when Pharaoh saw that the rain and the hail and the thunder had ceased,
    he continued to sin and hardened his heart, he and his servants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the voices'; in this storm context, the term refers to thunder.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - observed
  - realized
  lexicon: HALOT
  rationale: The verb ראה in narrative commonly means 'see,' but in English 'saw'
    can naturally include perception of the situation. It preserves the concrete narrative
    style without over-interpreting.
- source_word: כִּי
  chosen: that
  alternatives:
  - when
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of what Pharaoh saw: ''that the rain...
    had ceased.'' The temporal sense is carried by the larger clause with ''when Pharaoh
    saw,'' so ''that'' best reflects the syntax.'
- source_word: חָדַל
  chosen: had ceased
  alternatives:
  - stopped
  - came to an end
  lexicon: HALOT
  rationale: חדל means to cease or stop. 'Had ceased' fits the past-perfect sense
    in English after 'saw that' and keeps a slightly more formal narrative tone than
    'stopped.'
- source_word: הַמָּטָר
  chosen: the rain
  alternatives:
  - rain
  lexicon: HALOT
  rationale: Straightforward rendering of מטר. The article is naturally retained in
    English in this coordinated list.
- source_word: הַבָּרָד
  chosen: the hail
  alternatives:
  - hail
  lexicon: HALOT
  rationale: Standard rendering of ברד in the plague context.
- source_word: הַקֹּלֹת
  chosen: the thunder
  alternatives:
  - the voices
  - the sounds
  lexicon: HALOT
  rationale: Although קולות literally means 'voices/sounds,' in this storm-plague
    context it idiomatically refers to thunder. This is the established sense in Exodus
    plague narratives and best communicates the meteorological phenomenon to English
    readers.
- source_word: וַיֹּסֶף לַחֲטֹא
  chosen: he continued to sin
  alternatives:
  - he sinned again
  - he added to sin
  lexicon: HALOT
  rationale: The idiom יסף + infinitive means to continue or do again. 'He continued
    to sin' captures the ongoing/repeated force more naturally than the wooden 'added
    to sin.'
- source_word: וַיַּכְבֵּד לִבּוֹ
  chosen: hardened his heart
  alternatives:
  - made his heart heavy
  - made his heart stubborn
  lexicon: HALOT
  rationale: The verb כבד literally relates to heaviness, but in this recurring Exodus
    idiom it denotes hardening/insensibility of heart. 'Hardened his heart' is the
    clearest idiomatic English equivalent and preserves the thematic linkage across
    the Pharaoh narratives.
- source_word: הוּא וַעֲבָדָיו
  chosen: he and his servants
  alternatives:
  - he and his officials
  - he and his slaves
  lexicon: HALOT
  rationale: עבדים can mean servants, slaves, or officials depending on context. In
    royal court narrative, 'servants' is the conventional and contextually appropriate
    rendering for Pharaoh's attendants/court personnel. The pronoun הוּא is retained
    for emphasis by the appositional phrase 'he and his servants.'
- source_word: וַ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: HALOT
  rationale: The initial waw advances the narrative, but 'But' appropriately signals
    the contrast with Pharaoh's prior apparent repentance in the immediate context.
