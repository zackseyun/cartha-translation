theological_decisions:
- issue: Divine agency in Pharaoh's hardening
  chosen_reading: But the LORD hardened Pharaoh's heart
  alternative_readings:
  - But the LORD made Pharaoh's heart firm
  - But the LORD strengthened Pharaoh's heart
  rationale: The Hebrew explicitly names YHWH as subject of the verb and Pharaoh's heart as object. The translation preserves this direct divine agency and does not soften it into a permissive paraphrase. At the same time, 'hardened' is chosen as the idiomatic English rendering of the Exodus heart-hardening motif, while alternatives are preserved for auditability because חזק more literally denotes strengthening/firming.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it; Contested terms table: יְהוָה → the LORD'
