id: EXO.9.12
reference: Exodus 9:12
source:
  edition: WLC
  text: וַ/יְחַזֵּ֤ק יְהוָה֙ אֶת לֵ֣ב פַּרְעֹ֔ה וְ/לֹ֥א שָׁמַ֖ע אֲלֵ/הֶ֑ם כַּ/אֲשֶׁ֛ר דִּבֶּ֥ר יְהוָ֖ה אֶל מֹשֶֽׁה־־׃ס
translation:
  text: But Yahweh hardened Pharaoh's heart, and he did not listen to them, just as Yahweh had spoken to Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'made Pharaoh's heart firm' or 'strengthened Pharaoh's heart.' The Hebrew verb more literally means 'made strong/firm,' but in this context it refers to Pharaoh's stubborn resistance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחַזֵּק
  chosen: hardened
  alternatives:
  - strengthened
  - made firm
  lexicon: HALOT
  rationale: The verb חזק literally denotes strengthening or making firm, but in the recurring Exodus idiom with 'heart' it conveys obstinacy/resistance. 'Hardened' is the clearest natural English rendering in this context and matches the narrative pattern without softening divine agency.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֵב פַּרְעֹה
  chosen: Pharaoh's heart
  alternatives:
  - the heart of Pharaoh
  lexicon: HALOT
  rationale: Construct chain rendered idiomatically in English as a possessive. 'Heart' in Hebrew anthropology is the center of will and disposition; no expansion is added in the main text to avoid paraphrase.
- source_word: שָׁמַע אֲלֵהֶם
  chosen: did not listen to them
  alternatives:
  - did not heed them
  - did not obey them
  lexicon: HALOT
  rationale: שׁמע with אֶל commonly means 'listen to/heed.' 'Did not listen to them' is straightforward modern English and preserves the relational sense. 'Obey' would over-specify, while 'heed' is possible but slightly less common.
- source_word: אֲלֵהֶם
  chosen: to them
  alternatives:
  - to Moses and Aaron
  lexicon: HALOT
  rationale: The pronoun refers contextually to Moses and Aaron, but the Hebrew uses only the pronoun. The translation preserves that form rather than making the referent explicit in the main text.
- source_word: כַּאֲשֶׁר דִּבֶּר יְהוָה אֶל מֹשֶׁה
  chosen: just as the LORD had spoken to Moses
  alternatives:
  - as the LORD said to Moses
  - just as the LORD spoke to Moses
  lexicon: HALOT
  rationale: The clause marks fulfillment of prior divine speech. 'Had spoken' appropriately reflects the prior action relative to the narrative moment in natural English; 'just as' preserves the comparative/fulfillment force of כַּאֲשֶׁר.
