id: EXO.9.10
reference: Exodus 9:10
source:
  edition: WLC
  text: וַ/יִּקְח֞וּ אֶת פִּ֣יחַ הַ/כִּבְשָׁ֗ן וַ/יַּֽעַמְדוּ֙ לִ/פְנֵ֣י פַרְעֹ֔ה
    וַ/יִּזְרֹ֥ק אֹת֛/וֹ מֹשֶׁ֖ה הַ/שָּׁמָ֑יְמָ/ה וַ/יְהִ֗י שְׁחִין֙ אֲבַעְבֻּעֹ֔ת
    פֹּרֵ֕חַ בָּ/אָדָ֖ם וּ/בַ/בְּהֵמָֽה־׃
translation:
  text: So they took soot from the kiln and stood before Pharaoh, and Moses threw
    it toward the sky, and it became festering boils breaking out on man and on beast.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ashes from the furnace.' The Hebrew more specifically suggests soot
      or fine black powder from a kiln/furnace.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'on man and on beast,' a collective way of saying the outbreak affected
      humans and animals.
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּיחַ
  chosen: soot
  alternatives:
  - ashes
  - furnace soot
  lexicon: HALOT
  rationale: פִּיחַ refers to fine black powder or soot rather than general ash. 'Soot'
    best matches the likely substance taken from the kiln.
- source_word: הַכִּבְשָׁן
  chosen: the kiln
  alternatives:
  - the furnace
  lexicon: HALOT
  rationale: כִּבְשָׁן denotes a kiln or furnace. 'Kiln' is more concrete and fits
    an industrial oven producing soot, while remaining natural English.
- source_word: לִפְנֵי פַרְעֹה
  chosen: before Pharaoh
  alternatives:
  - in the presence of Pharaoh
  lexicon: HALOT
  rationale: The idiom means standing in Pharaoh's presence. 'Before Pharaoh' is concise
    and idiomatic.
- source_word: וַיִּזְרֹק אֹתוֹ מֹשֶׁה
  chosen: and Moses threw it
  alternatives:
  - and Moses tossed it
  - and Moses scattered it
  lexicon: HALOT
  rationale: The singular object suffix refers back to the soot as a mass noun. 'Threw
    it' preserves the simple verbal action without overinterpreting the manner.
- source_word: הַשָּׁמָיְמָה
  chosen: toward the sky
  alternatives:
  - heavenward
  - toward heaven
  lexicon: HALOT
  rationale: The directional ending indicates motion upward. 'Toward the sky' is readable
    modern English and avoids importing theological overtones where the immediate
    sense is physical direction.
- source_word: שְׁחִין
  chosen: boils
  alternatives:
  - inflammation
  - skin disease
  lexicon: HALOT
  rationale: שְׁחִין commonly denotes boils or an inflamed skin eruption. 'Boils'
    is the standard and clearest English equivalent in this plague context.
- source_word: אֲבַעְבֻּעֹת
  chosen: festering
  alternatives:
  - with blisters
  - erupting in blisters
  lexicon: HALOT
  rationale: The noun refers to blisters or pustules associated with the boils. Rendering
    it adjectivally as 'festering' gives natural English with the following participle,
    while preserving the sense of inflamed, blistered sores.
- source_word: פֹּרֵחַ
  chosen: breaking out
  alternatives:
  - sprouting
  - bursting forth
  lexicon: HALOT
  rationale: The participle conveys active eruption or breakout. 'Breaking out' is
    idiomatic for skin sores and fits the medical imagery.
- source_word: בָּאָדָם
  chosen: on man
  alternatives:
  - on humankind
  - on people
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered according to context. Here it contrasts
    with beast and denotes human beings generically; 'man' preserves the singular
    collective force and the human/animal pairing of the Hebrew.
- source_word: וּבַבְּהֵמָה
  chosen: and on beast
  alternatives:
  - and on animals
  - and on livestock
  lexicon: HALOT
  rationale: בְּהֵמָה here is a collective singular contrasting with אָדָם. 'Beast'
    preserves the formal human/beast pairing and the singular collective style of
    the Hebrew better than 'animals'.
