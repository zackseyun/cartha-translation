theological_decisions:
- issue: Rendering of אָדָם in a generic human-versus-animal contrast
  chosen_reading: man
  alternative_readings:
  - humankind
  - people
  rationale: The doctrine excerpt specifies 'man / humankind' contextually for אָדָם
    and prefers gender-accurate renderings. In this plague narrative, the singular
    collective 'man' paired with 'beast' best reflects the Hebrew structure without
    implying an exclusively male referent.
