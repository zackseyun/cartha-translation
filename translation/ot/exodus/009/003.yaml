id: EXO.9.3
reference: Exodus 9:3
source:
  edition: WLC
  text: הִנֵּ֨ה יַד יְהוָ֜ה הוֹיָ֗ה בְּ/מִקְנְ/ךָ֙ אֲשֶׁ֣ר בַּ/שָּׂדֶ֔ה בַּ/סּוּסִ֤ים בַּֽ/חֲמֹרִים֙ בַּ/גְּמַלִּ֔ים בַּ/בָּקָ֖ר וּ/בַ/צֹּ֑אן דֶּ֖בֶר כָּבֵ֥ד מְאֹֽד־׃
translation:
  text: Look, the hand of Yahweh will come upon your livestock that are in the field—upon the horses, the donkeys, the camels, the herds, and the flocks—with a very severe plague.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pestilence'; the Hebrew term denotes a deadly epidemic affecting livestock.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces the announcement with urgency. 'Look' is natural modern English while preserving the deictic force better than omitting it.
- source_word: יַד יְהוָה
  chosen: the hand of the LORD
  alternatives:
  - the LORD's hand
  lexicon: HALOT
  rationale: Retains the Hebrew idiom of divine power/judgment rather than flattening it to mere action. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving covenantal reference in standard English Bible style.
- source_word: הוֹיָה
  chosen: is coming
  alternatives:
  - will be
  - is
  - comes
  lexicon: HALOT
  rationale: The form conveys imminent action. 'Is coming upon' captures the impending force of the plague announcement better than a static 'is upon,' while remaining close to the Hebrew.
- source_word: בְּמִקְנְךָ
  chosen: upon your livestock
  alternatives:
  - against your cattle
  - upon your cattle
  lexicon: HALOT
  rationale: מִקְנֶה is a broad term for domesticated animals/property in livestock, not only bovines. 'Livestock' best fits the following list of species.
- source_word: אֲשֶׁר בַּשָּׂדֶה
  chosen: that are in the field
  alternatives:
  - which are in the countryside
  - that are out in the field
  lexicon: HALOT
  rationale: Specifies the subset of Pharaoh's livestock affected. 'In the field' is straightforward and close to the Hebrew.
- source_word: בַּסּוּסִים בַּחֲמֹרִים בַּגְּמַלִּים בַּבָּקָר וּבַצֹּאן
  chosen: upon the horses, the donkeys, the camels, the herds, and the flocks
  alternatives:
  - on the horses, the asses, the camels, the cattle, and the sheep
  lexicon: HALOT
  rationale: Preserves the species list with natural modern English. 'Donkeys' is preferred over archaic 'asses.' בָּקָר and צֹאן are collective terms; 'herds' and 'flocks' reflect that collective sense better than narrower species labels.
- source_word: דֶּבֶר
  chosen: plague
  alternatives:
  - pestilence
  - murrain
  lexicon: HALOT
  rationale: Refers to a deadly epidemic striking animals. 'Plague' is accessible modern English; 'pestilence' is possible but less natural, and 'murrain' is archaic.
- source_word: כָּבֵד מְאֹד
  chosen: very severe
  alternatives:
  - very heavy
  - exceedingly grievous
  lexicon: HALOT
  rationale: Conveys the intensity idiomatically in English. 'Heavy' would be too literal here; the phrase describes the plague's severity.
