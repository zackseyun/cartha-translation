theological_decisions:
- issue: Rendering of אָדָם in a representative range expression
  chosen_reading: man
  alternative_readings:
  - humankind
  - people
  rationale: The phrase מֵאָדָם וְעַד בְּהֵמָה is a stock human-to-animal range expression.
    Following the doctrine's gender-accurate principle for אָדָם, 'man' is retained
    in representative sense rather than neutralizing the expression.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4; Contested terms table
    for אָדָם'
