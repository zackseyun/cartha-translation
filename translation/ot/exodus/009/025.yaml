id: EXO.9.25
reference: Exodus 9:25
source:
  edition: WLC
  text: וַ/יַּ֨ךְ הַ/בָּרָ֜ד בְּ/כָל אֶ֣רֶץ מִצְרַ֗יִם אֵ֚ת כָּל אֲשֶׁ֣ר בַּ/שָּׂדֶ֔ה
    מֵ/אָדָ֖ם וְ/עַד בְּהֵמָ֑ה וְ/אֵ֨ת כָּל עֵ֤שֶׂב הַ/שָּׂדֶה֙ הִכָּ֣ה הַ/בָּרָ֔ד
    וְ/אֶת כָּל עֵ֥ץ הַ/שָּׂדֶ֖ה שִׁבֵּֽר־־־־־־׃
translation:
  text: And the hail struck throughout all the land of Egypt everything that was in
    the field, from man to beast. The hail struck every plant of the field, and shattered
    every tree of the field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from humankind to beast' or 'from people to beast.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּךְ
  chosen: struck
  alternatives:
  - beat
  - smote
  - hit
  lexicon: HALOT
  rationale: From נכה, a common verb for striking/plaguing. 'Struck' is natural modern
    English and preserves the force of the judgment without archaic tone.
- source_word: הַבָּרָד
  chosen: the hail
  lexicon: HALOT
  rationale: Straightforward rendering of the weather phenomenon; repeated in the
    verse and retained for emphasis.
- source_word: בְּכָל אֶרֶץ מִצְרַיִם
  chosen: throughout all the land of Egypt
  alternatives:
  - in all the land of Egypt
  lexicon: HALOT
  rationale: Captures the distributive sense of בְּכָל across the whole territory.
    'Throughout' conveys the widespread extent of the plague.
- source_word: אֵת כָּל אֲשֶׁר בַּשָּׂדֶה
  chosen: everything that was in the field
  alternatives:
  - all that was in the field
  - everything in the open field
  lexicon: HALOT
  rationale: כָּל אֲשֶׁר is comprehensive. 'In the field' is kept rather than generalized,
    preserving the agricultural setting.
- source_word: מֵאָדָם וְעַד בְּהֵמָה
  chosen: from man to beast
  alternatives:
  - from human to animal
  - from people to livestock
  lexicon: HALOT
  rationale: This is a merism marking the full range of living beings affected. Per
    doctrine, אָדָם is rendered gender-accurately here as 'man' in a representative
    sense; 'beast' matches בְּהֵמָה well in plague/judgment context.
- source_word: עֵשֶׂב הַשָּׂדֶה
  chosen: every plant of the field
  alternatives:
  - every herb of the field
  - all the vegetation of the field
  - every green thing of the field
  lexicon: HALOT
  rationale: עֵשֶׂב can denote grass/herbage/vegetation. 'Plant' is clear modern English
    and fits the context of crop destruction better than the archaic 'herb' or the
    narrower 'grass'.
- source_word: הִכָּה
  chosen: struck
  alternatives:
  - beat
  - smote
  lexicon: HALOT
  rationale: Same lemma as the opening verb; rendered consistently as 'struck'.
- source_word: עֵץ הַשָּׂדֶה
  chosen: every tree of the field
  alternatives:
  - every tree in the field
  lexicon: HALOT
  rationale: A literal and natural rendering preserving the repeated 'of the field'
    phrasing.
- source_word: שִׁבֵּר
  chosen: shattered
  alternatives:
  - broke
  - broke down
  lexicon: HALOT
  rationale: Piel of שבר is intensive; 'shattered' better conveys destructive force
    than the flatter 'broke'.
