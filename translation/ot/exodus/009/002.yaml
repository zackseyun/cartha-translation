id: EXO.9.2
reference: Exodus 9:2
source:
  edition: WLC
  text: כִּ֛י אִם מָאֵ֥ן אַתָּ֖ה לְ/שַׁלֵּ֑חַ וְ/עוֹדְ/ךָ֖ מַחֲזִ֥יק בָּֽ/ם־׃
translation:
  text: For if you refuse to let them go and still hold on to them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and still keep holding them back.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: For if
  alternatives:
  - If
  - Indeed if
  lexicon: HALOT
  rationale: The combination introduces a conditional explanation tied to the previous
    verse. 'For if' preserves both the explanatory force of כִּי and the conditional
    force of אִם in natural English.
- source_word: מָאֵן
  chosen: refuse
  alternatives:
  - decline
  - are unwilling
  lexicon: HALOT
  rationale: The verb denotes refusal rather than mere inability. 'Refuse' is the
    most direct and idiomatic rendering in this warning context.
- source_word: לְשַׁלֵּחַ
  chosen: to let them go
  alternatives:
  - to send away
  - to release
  lexicon: HALOT
  rationale: In the Exodus context, שׁלח with the people as object is the standard
    idiom for Pharaoh permitting Israel to depart. 'Let them go' is both accurate
    and idiomatic.
- source_word: וְעוֹדְךָ
  chosen: and still
  alternatives:
  - while you are still
  - and yet you continue
  lexicon: HALOT
  rationale: The form combines conjunction with עוֹד plus second masculine singular
    suffix, conveying continued action by Pharaoh. 'And still' captures the ongoing
    persistence succinctly.
- source_word: מַחֲזִיק
  chosen: hold on to
  alternatives:
  - keep holding
  - restrain
  - seize
  lexicon: HALOT
  rationale: The participle of חזק here conveys continuing retention or keeping back.
    'Hold on to' expresses the ongoing act of retaining the people and fits the immediate
    context well.
- source_word: בָּם
  chosen: them
  alternatives:
  - them back
  lexicon: HALOT
  rationale: The preposition with pronoun refers to the Israelites as the object of
    Pharaoh's continued grasp. English idiom does not require repeating the preposition
    explicitly beyond 'hold on to them.'
