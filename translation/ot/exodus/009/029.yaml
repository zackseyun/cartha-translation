id: EXO.9.29
reference: Exodus 9:29
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֵלָי/ו֙ מֹשֶׁ֔ה כְּ/צֵאתִ/י֙ אֶת הָ/עִ֔יר אֶפְרֹ֥שׂ אֶת כַּפַּ֖/י אֶל יְהוָ֑ה הַ/קֹּל֣וֹת יֶחְדָּל֗וּ/ן וְ/הַ/בָּרָד֙ לֹ֣א יִֽהְיֶה ע֔וֹד לְמַ֣עַן תֵּדַ֔ע כִּ֥י לַ/יהוָ֖ה הָ/אָֽרֶץ־־־־׃
translation:
  text: Moses said to him, “As soon as I have gone out of the city, I will spread out my hands to Yahweh; the thunder will cease, and the hail will be no more, so that you may know that the earth belongs to Yahweh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the voices'; in this storm context the term refers to thunder.
    reason: lexical_alternative
  - marker: b
    text: Or, 'that the land belongs to the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: כְּ/צֵאתִ/י
  chosen: As soon as I have gone out
  alternatives:
  - When I go out
  - As I go out
  lexicon: HALOT
  rationale: The preposition כְ with the infinitive construct of יצא plus 1cs suffix marks the time of Moses' departure from the city. 'As soon as I have gone out' captures the imminent temporal sense naturally in English.
- source_word: אֶפְרֹשׂ אֶת כַּפַּי
  chosen: I will spread out my hands
  alternatives:
  - I will stretch out my hands
  - I will spread my palms
  lexicon: HALOT
  rationale: פרשׂ with כף in prayer contexts denotes extending/spreading the hands in supplication. 'Spread out my hands' is idiomatic and preserves the physical prayer gesture.
- source_word: יְהוָה / לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,' following Jewish reverence tradition and longstanding English convention while signaling the covenant name.
- source_word: הַקֹּלֹת
  chosen: the thunder
  alternatives:
  - the voices
  - the sounds
  lexicon: HALOT
  rationale: Although קולות literally means 'voices/sounds,' in the plague narrative it refers to the thunder accompanying the hailstorm. 'Thunder' best conveys the meteorological sense in context.
- source_word: יֶחְדָּלוּן
  chosen: will cease
  alternatives:
  - will stop
  - will come to an end
  lexicon: HALOT
  rationale: חדל means to cease or stop. 'Will cease' is concise and fits the elevated but readable register of the verse.
- source_word: וְהַבָּרָד לֹא יִהְיֶה עוֹד
  chosen: and the hail will be no more
  alternatives:
  - and there will be no more hail
  - and the hail will not continue
  lexicon: HALOT
  rationale: The clause states that the hail will no longer exist/occur. 'Will be no more' is natural English and preserves the finality of the cessation.
- source_word: לְמַעַן תֵּדַע
  chosen: so that you may know
  alternatives:
  - in order that you may know
  - so that you will know
  lexicon: HALOT
  rationale: למען introduces purpose. 'So that you may know' reflects the purposive force without overstating certainty beyond the Hebrew imperfect.
- source_word: כִּי לַיהוָה הָאָרֶץ
  chosen: that the earth belongs to the LORD
  alternatives:
  - that the earth is the LORD's
  - that the land belongs to the LORD
  lexicon: HALOT
  rationale: 'The lamed here expresses possession: ''belongs to.'' ''Earth'' is preferred over ''land'' because the statement is broad and theological, asserting the LORD''s ownership over the whole earth, not merely a territory.'
