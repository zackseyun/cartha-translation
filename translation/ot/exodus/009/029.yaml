theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Scope of הָאָרֶץ
  chosen_reading: the earth
  alternative_readings:
  - the land
  rationale: In this confrontation with Pharaoh, Moses' statement functions as a declaration of the LORD's universal sovereignty, not merely ownership of a local land. 'Earth' best preserves that theological scope while remaining lexically sound.
