theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The main text follows the project's stated default for the covenant name.
    Alternatives are acknowledged but not adopted in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Meaning of וְיַעַבְדֻנִי in covenant context
  chosen_reading: serve me
  alternative_readings:
  - worship me
  rationale: The Hebrew verb עבד can denote worshipful service to God, but 'serve'
    better preserves the full semantic range without narrowing the command to liturgical
    worship alone. This maintains theological breadth rather than resolving it too
    tightly.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
