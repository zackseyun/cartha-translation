id: EXO.9.1
reference: Exodus 9:1
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל מֹשֶׁ֔ה בֹּ֖א אֶל פַּרְעֹ֑ה וְ/דִבַּרְתָּ֣ אֵלָ֗י/ו
    כֹּֽה אָמַ֤ר יְהוָה֙ אֱלֹהֵ֣י הָֽ/עִבְרִ֔ים שַׁלַּ֥ח אֶת עַמִּ֖/י וְ/יַֽעַבְדֻֽ/נִי־־־־׃
translation:
  text: 'Then the LORD said to Moses, "Go in to Pharaoh and say to him, ''Thus says
    the LORD, the God of the Hebrews: Let my people go, so that they may serve me.''"'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'worship me.' The Hebrew verb can refer to service rendered to God, including
      worship, but is broader than liturgical worship alone.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD,' following
    Jewish reverence tradition and the Septuagintal pattern. This is used consistently
    for both occurrences in the verse.
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving the sequential force better than a bare 'and said'
    in contemporary style.
- source_word: בֹּא אֶל־פַּרְעֹה
  chosen: Go in to Pharaoh
  alternatives:
  - Come to Pharaoh
  - Go to Pharaoh
  lexicon: HALOT
  rationale: בוא literally means 'come/go in.' In this confrontation setting, 'Go
    in to Pharaoh' preserves the idiomatic sense of entering Pharaoh's presence and
    matches the Hebrew more closely than simply 'Go to Pharaoh.'
- source_word: וְדִבַּרְתָּ אֵלָיו
  chosen: and say to him
  alternatives:
  - and speak to him
  lexicon: HALOT
  rationale: Although דבר is formally 'speak,' English idiom before direct quotation
    prefers 'say to him.' This is an optimal-equivalence adjustment for naturalness
    without loss of meaning.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus has said
  lexicon: HALOT
  rationale: This is the standard prophetic messenger formula. 'Thus says' preserves
    the formal declarative force and recognizable discourse pattern.
- source_word: אֱלֹהֵי הָעִבְרִים
  chosen: the God of the Hebrews
  alternatives:
  - the God of the Israelites
  lexicon: HALOT
  rationale: The source text explicitly says 'Hebrews' (עברים), not 'Israelites.'
    The translation preserves the ethnic designation used in the Hebrew narrative.
- source_word: שַׁלַּח אֶת־עַמִּי
  chosen: Let my people go
  alternatives:
  - Send out my people
  - Release my people
  lexicon: HALOT
  rationale: שׁלח in the imperative here means to send away/release. 'Let my people
    go' is both accurate and the most established natural English rendering in this
    Exodus context.
- source_word: וְיַעַבְדֻנִי
  chosen: so that they may serve me
  alternatives:
  - and they may serve me
  - that they may worship me
  lexicon: HALOT
  rationale: 'The conjunction plus imperfect expresses purpose/result here: Pharaoh
    is to release them for the purpose of serving God. ''Serve'' is preferred over
    ''worship'' because עבד includes worship but is broader, encompassing covenantal
    service and devotion.'
