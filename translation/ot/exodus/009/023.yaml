id: EXO.9.23
reference: Exodus 9:23
source:
  edition: WLC
  text: וַ/יֵּ֨ט מֹשֶׁ֣ה אֶת מַטֵּ/הוּ֮ עַל הַ/שָּׁמַיִם֒ וַֽ/יהוָ֗ה נָתַ֤ן קֹלֹת֙
    וּ/בָרָ֔ד וַ/תִּ֥הֲלַךְ אֵ֖שׁ אָ֑רְצָ/ה וַ/יַּמְטֵ֧ר יְהוָ֛ה בָּרָ֖ד עַל אֶ֥רֶץ
    מִצְרָֽיִם־־־׃
translation:
  text: So Moses stretched out his staff toward the sky, and the LORD sent thunder
    and hail, and fire ran down to the earth. And the LORD rained hail on the land
    of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fire went earthward'; the 'fire' in context likely refers to lightning.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּט
  chosen: stretched out
  alternatives:
  - extended
  - held out
  lexicon: HALOT
  rationale: The verb נָטָה commonly means to stretch out or extend. 'Stretched out'
    is idiomatic in English and fits the gesture with the staff in plague narratives
    better than the more wooden 'inclined' or 'turned'.
- source_word: מַטֵּהוּ
  chosen: his staff
  alternatives:
  - his rod
  lexicon: HALOT
  rationale: מַטֶּה can mean 'staff' or 'rod.' 'Staff' is clearer in modern English
    and suits Moses's instrument in Exodus without archaic overtones.
- source_word: עַל הַשָּׁמַיִם
  chosen: toward the sky
  alternatives:
  - toward heaven
  - over the heavens
  lexicon: HALOT
  rationale: Literally 'upon the heavens/sky.' In this context of raising the staff
    upward, 'toward the sky' is natural modern English and preserves the directional
    sense without sounding overly formal.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD,' following established reverential convention and the LXX-influenced
    pattern.
- source_word: נָתַן קֹלֹת וּבָרָד
  chosen: sent thunder and hail
  alternatives:
  - gave voices and hail
  - gave thunder and hail
  lexicon: HALOT
  rationale: קוֹלוֹת literally means 'voices/sounds,' but in storm contexts it idiomatically
    refers to thunder. 'Sent thunder and hail' communicates the meteorological sense
    clearly in English.
- source_word: קֹלֹת
  chosen: thunder
  alternatives:
  - sounds
  - voices
  lexicon: HALOT
  rationale: In plague and storm theophany contexts, קוֹלוֹת is best rendered 'thunder.'
    A more literal 'voices' would obscure the sense for modern readers.
- source_word: וַתִּהֲלַךְ אֵשׁ אָרְצָה
  chosen: fire ran down to the earth
  alternatives:
  - fire went earthward
  - lightning struck the ground
  - fire moved toward the earth
  lexicon: HALOT
  rationale: The Hebrew is literally 'and fire went/walked earthward.' 'Fire' should
    be retained rather than interpreted away, but 'ran down to the earth' captures
    the vivid motion naturally in English. The phrase likely refers to lightning,
    but the text says 'fire,' so the main text preserves that imagery.
- source_word: אֵשׁ
  chosen: fire
  alternatives:
  - lightning
  lexicon: HALOT
  rationale: Although the referent is likely lightning in the storm, the lexical item
    is plainly 'fire.' To avoid over-interpretation, the main text keeps 'fire,' with
    the imagery explained by context.
- source_word: אָרְצָה
  chosen: to the earth
  alternatives:
  - to the ground
  - earthward
  lexicon: HALOT
  rationale: The directional ending indicates movement toward the earth/ground. 'To
    the earth' is a transparent rendering that preserves the vertical motion from
    sky to land.
- source_word: וַיַּמְטֵר
  chosen: rained
  alternatives:
  - caused to rain
  - sent down
  lexicon: HALOT
  rationale: The hiphil of מָטַר means to cause to rain or rain down. 'Rained' is
    concise and idiomatic with hail as the object.
- source_word: בָּרָד
  chosen: hail
  lexicon: HALOT
  rationale: Standard rendering of the noun in this plague context.
- source_word: אֶרֶץ מִצְרַיִם
  chosen: the land of Egypt
  alternatives:
  - Egypt
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'land of Egypt,' not merely 'Egypt.' Retaining
    'land of' preserves the geographic emphasis of the plague's scope.
