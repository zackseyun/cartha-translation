id: EXO.9.13
reference: Exodus 9:13
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל מֹשֶׁ֔ה הַשְׁכֵּ֣ם בַּ/בֹּ֔קֶר וְ/הִתְיַצֵּ֖ב לִ/פְנֵ֣י
    פַרְעֹ֑ה וְ/אָמַרְתָּ֣ אֵלָ֗י/ו כֹּֽה אָמַ֤ר יְהוָה֙ אֱלֹהֵ֣י הָֽ/עִבְרִ֔ים שַׁלַּ֥ח
    אֶת עַמִּ֖/י וְ/יַֽעַבְדֻֽ/נִי־־־׃
translation:
  text: 'Then the LORD said to Moses, “Rise early in the morning and present yourself
    before Pharaoh, and say to him, ‘Thus says the LORD, the God of the Hebrews: Let
    my people go, so that they may serve me.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that they may worship me.' The Hebrew verb can denote service rendered
      to God, including worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name YHWH as
    'the LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: הַשְׁכֵּם
  chosen: Rise early
  alternatives:
  - Get up early
  - Start early
  lexicon: HALOT
  rationale: The Hiphil imperative from שׁכם idiomatically means to rise early. 'Rise
    early' is natural English and preserves the temporal urgency.
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - at morning
  - early in the morning
  lexicon: HALOT
  rationale: Rendered with the common temporal phrase 'in the morning.' The adverbial
    force of early rising is already carried by הַשְׁכֵּם, so this avoids redundancy
    while remaining idiomatic.
- source_word: וְהִתְיַצֵּב לִפְנֵי
  chosen: and present yourself before
  alternatives:
  - and station yourself before
  - and stand before
  lexicon: HALOT
  rationale: The Hitpael of יצב conveys taking one's stand or presenting oneself.
    'Present yourself before' fits the courtly setting with Pharaoh and reads naturally
    in English.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - So says
  lexicon: HALOT
  rationale: This is the standard prophetic messenger formula. 'Thus says' preserves
    the formal declarative force.
- source_word: אֱלֹהֵי הָעִבְרִים
  chosen: the God of the Hebrews
  alternatives:
  - God of the Hebrews
  lexicon: HALOT
  rationale: A straightforward construct-chain rendering. Including 'the' is idiomatic
    in English apposition after 'the LORD.'
- source_word: שַׁלַּח
  chosen: Let ... go
  alternatives:
  - Send out
  - Release
  lexicon: HALOT
  rationale: In this Exodus context, 'let my people go' is both accurate to the imperative
    of שלח and established as the clearest idiomatic English expression.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Direct possessive rendering of the covenantal designation.
- source_word: וְיַעַבְדֻנִי
  chosen: so that they may serve me
  alternatives:
  - and they may serve me
  - that they may worship me
  lexicon: HALOT
  rationale: 'The conjunction with imperfect expresses purpose/result here: Pharaoh
    is to release Israel for the purpose of their serving the LORD. ''Serve'' is preferred
    over ''worship'' because עבד includes worshipful service but is broader, and the
    Exodus theme includes covenantal service to God.'
