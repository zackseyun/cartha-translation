theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's doctrinal and translation guidelines explicitly set 'the
    LORD' as the default rendering for YHWH. This preserves continuity with Jewish
    reverence practice and common English Bible usage without obscuring that the covenant
    name is present in the Hebrew.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering וְיַעַבְדֻנִי
  chosen_reading: so that they may serve me
  alternative_readings:
  - that they may worship me
  rationale: The verse states Israel's release is for God's service. Translating עבד
    as 'serve' preserves the broader covenantal sense and avoids narrowing the term
    to liturgical worship alone, while still allowing worship as part of the meaning.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
