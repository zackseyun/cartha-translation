id: EXO.9.17
reference: Exodus 9:17
source:
  edition: WLC
  text: עוֹדְ/ךָ֖ מִסְתּוֹלֵ֣ל בְּ/עַמִּ֑/י לְ/בִלְתִּ֖י שַׁלְּחָֽ/ם׃
translation:
  text: Are you still exalting yourself against my people by not letting them go?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'acting proudly over my people' or 'lifting yourself up against my people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עוֹדְךָ
  chosen: Are you still
  alternatives:
  - You are still
  - Still you are
  lexicon: HALOT
  rationale: The combination of עוֹד ('still, yet') with the 2ms pronominal element
    introduces a continuing state addressed directly to Pharaoh. Rendering it idiomatically
    as an interrogative opening in English fits the verse's rhetorical question in
    context.
- source_word: מִסְתּוֹלֵל
  chosen: exalting yourself
  alternatives:
  - acting proudly
  - lifting yourself up
  - setting yourself against
  lexicon: HALOT
  rationale: The Hitpolel participle of סלל here conveys self-exaltation or arrogant
    self-assertion. 'Exalting yourself' preserves the reflexive force and the prideful
    nuance better than a flatter 'opposing.'
- source_word: בְּעַמִּי
  chosen: against my people
  alternatives:
  - over my people
  - against my people in relation to
  - among my people
  lexicon: HALOT
  rationale: 'With the reflexive participle, ב here is best taken in an adversative/superior
    sense: Pharaoh is elevating himself over/against Yahweh''s people. ''Against my
    people'' communicates the hostile posture clearly in natural English, while the
    broader context of oppression supports this nuance.'
- source_word: לְבִלְתִּי
  chosen: by not
  alternatives:
  - so as not to
  - in order not to
  - to avoid
  lexicon: HALOT
  rationale: לבלתי introduces a negative infinitival/result clause explaining how
    Pharaoh's self-exaltation is expressed. 'By not' is concise and idiomatic in English
    with the following infinitive.
- source_word: שַׁלְּחָם
  chosen: letting them go
  alternatives:
  - sending them away
  - releasing them
  lexicon: HALOT
  rationale: The Piel of שלח in the Exodus plague narrative is the standard idiom
    for releasing Israel from bondage. 'Letting them go' matches the established contextual
    sense and natural English usage.
