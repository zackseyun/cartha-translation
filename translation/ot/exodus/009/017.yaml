theological_decisions:
- issue: Divine ownership language in 'my people'
  chosen_reading: Retain 'my people' as Yahweh's direct claim over Israel
  alternative_readings:
  - the people
  - Israel
  rationale: The first-person suffix is theologically significant in the Exodus context,
    underscoring covenantal claim and Pharaoh's opposition to Yahweh himself. It should
    not be generalized or reduced.
  doctrine_reference: Translation philosophy §1, §5
