theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of Pharaoh's confession regarding God's character
  chosen_reading: The LORD is in the right
  alternative_readings:
  - The LORD is righteous
  - The LORD is just
  rationale: This wording preserves the moral-judicial contrast in Pharaoh's confession without importing a broader doctrinal statement beyond the verse. It reflects the immediate contrast with 'I and my people are the wicked ones.'
