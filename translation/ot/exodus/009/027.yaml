id: EXO.9.27
reference: Exodus 9:27
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֣ח פַּרְעֹ֗ה וַ/יִּקְרָא֙ לְ/מֹשֶׁ֣ה וּֽ/לְ/אַהֲרֹ֔ן וַ/יֹּ֥אמֶר אֲלֵ/הֶ֖ם חָטָ֣אתִי הַ/פָּ֑עַם יְהוָה֙ הַ/צַּדִּ֔יק וַ/אֲנִ֥י וְ/עַמִּ֖/י הָ/רְשָׁעִֽים׃
translation:
  text: Then Pharaoh sent and called for Moses and Aaron, and said to them, “I have sinned this time. Yahweh is in the right, and I and my people are the wicked ones.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “The LORD is righteous.”
    reason: lexical_alternative
  - marker: b
    text: Or, “I and my people are in the wrong / guilty.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - sent word
  - sent for
  lexicon: HALOT
  rationale: The verb literally means 'sent.' Because the next verb is 'called for,' rendering this simply as 'sent' preserves the Hebrew sequence without collapsing the two actions into one English idiom.
- source_word: וַיִּקְרָא לְ
  chosen: called for
  alternatives:
  - summoned
  - called
  lexicon: HALOT
  rationale: With לְ plus persons, the sense is to call/summon someone. 'Called for' is natural English and preserves the idea that Pharaoh had Moses and Aaron brought to him.
- source_word: חָטָאתִי
  chosen: I have sinned
  alternatives:
  - I sinned
  lexicon: HALOT
  rationale: The perfect here expresses Pharaoh's admission of guilt. Present perfect English best conveys a present acknowledgment of completed wrongdoing.
- source_word: הַפָּעַם
  chosen: this time
  alternatives:
  - at this time
  - now
  lexicon: HALOT
  rationale: Idiomatic temporal expression meaning 'this time' or 'on this occasion.' 'This time' is the most natural and direct rendering.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַצַּדִּיק
  chosen: is in the right
  alternatives:
  - is righteous
  - is just
  lexicon: HALOT
  rationale: 'The adjective means ''righteous/just.'' In this judicial-confessional context, ''is in the right'' communicates the comparative force clearly in modern English: Pharaoh admits that the LORD is right and he is wrong. ''Righteous'' is possible but can sound more abstract here.'
- source_word: הָרְשָׁעִים
  chosen: the wicked ones
  alternatives:
  - wicked
  - in the wrong
  - guilty
  lexicon: HALOT
  rationale: The plural adjective agrees with 'I and my people' and carries moral culpability, not merely legal error. 'The wicked ones' preserves the explicit plural and the ethical weight better than the flatter 'in the wrong.'
- source_word: וַאֲנִי וְעַמִּי
  chosen: I and my people
  alternatives:
  - my people and I
  lexicon: HALOT
  rationale: This follows the Hebrew order and keeps Pharaoh's self-implication prominent in the confession.
