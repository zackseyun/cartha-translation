id: EXO.9.9
reference: Exodus 9:9
source:
  edition: WLC
  text: וְ/הָיָ֣ה לְ/אָבָ֔ק עַ֖ל כָּל אֶ֣רֶץ מִצְרָ֑יִם וְ/הָיָ֨ה עַל הָ/אָדָ֜ם וְ/עַל
    הַ/בְּהֵמָ֗ה לִ/שְׁחִ֥ין פֹּרֵ֛חַ אֲבַעְבֻּעֹ֖ת בְּ/כָל אֶ֥רֶץ מִצְרָֽיִם־־־־׃
translation:
  text: And it will become fine dust over all the land of Egypt, and it will become
    boils breaking out with blisters on man and on beast throughout all the land of
    Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on humankind and on beast.' The Hebrew אדם is a generic term for humanity
      here, set in contrast with beast.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional English: ''boils breaking out with blains.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: and it will become
  alternatives:
  - and it will be
  lexicon: HALOT
  rationale: 'The verb היה here marks result/transformation: the soot/ashes become
    fine dust, and then become an affliction on humans and animals. ''Become'' better
    captures the change of state than simple ''be.'''
- source_word: לְאָבָק
  chosen: fine dust
  alternatives:
  - dust
  - powder
  lexicon: HALOT
  rationale: אָבָק denotes dust/powder; 'fine dust' conveys the particulate sense
    appropriate to soot scattered into the air.
- source_word: עַל כָּל אֶרֶץ מִצְרַיִם
  chosen: over all the land of Egypt
  alternatives:
  - upon all the land of Egypt
  - throughout all the land of Egypt
  lexicon: HALOT
  rationale: עַל with the first clause naturally expresses spread over the whole territory.
    'Over all the land' is idiomatic and spatially clear.
- source_word: עַל הָאָדָם
  chosen: on man
  alternatives:
  - on humankind
  - on people
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered according to context. Here it refers
    collectively to human beings in contrast with beasts; 'man' preserves the representative/generic
    force and the human-animal pairing of the Hebrew.
- source_word: וְעַל הַבְּהֵמָה
  chosen: and on beast
  alternatives:
  - and on animals
  - and on livestock
  lexicon: HALOT
  rationale: בְּהֵמָה here is collective and contrasts with האדם. 'Beast' preserves
    the singular collective style of the Hebrew better than 'animals'; 'livestock'
    would be too narrow.
- source_word: לִשְׁחִין
  chosen: boils
  alternatives:
  - inflamed sores
  - festering boils
  lexicon: HALOT
  rationale: שְׁחִין refers to an eruptive skin disease, commonly rendered 'boils.'
    The plural in English is more natural with the following participle and plural
    blisters, even though the Hebrew noun is singular collective.
- source_word: פֹּרֵחַ
  chosen: breaking out
  alternatives:
  - budding
  - bursting forth
  lexicon: HALOT
  rationale: The participle literally suggests sprouting/flowering, used idiomatically
    for an eruption on the skin. 'Breaking out' is the natural English equivalent
    for disease eruption.
- source_word: אֲבַעְבֻּעֹת
  chosen: blisters
  alternatives:
  - blains
  - pustules
  - boils
  lexicon: HALOT
  rationale: This noun denotes inflamed swellings/blisters associated with the boils.
    'Blisters' is clear modern English; 'blains' is traditional but archaic, and 'pustules'
    may sound overly clinical.
- source_word: בְּכָל אֶרֶץ מִצְרַיִם
  chosen: throughout all the land of Egypt
  alternatives:
  - in all the land of Egypt
  lexicon: HALOT
  rationale: The repeated territorial phrase emphasizes total extent. 'Throughout'
    brings out the distributive spread of the plague across Egypt.
