theological_decisions:
- issue: Rendering of אָדָם in a generic human reference
  chosen_reading: man
  alternative_readings:
  - humankind
  - people
  rationale: The doctrine excerpt specifies 'man / humankind (context)' and prefers
    gender-accurate renderings matching the source's intent. In this human-versus-beast
    pairing, 'man' preserves the Hebrew's representative generic sense without flattening
    the contrast.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested
    terms table for אָדָם'
