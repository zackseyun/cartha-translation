id: EXO.9.14
reference: Exodus 9:14
source:
  edition: WLC
  text: כִּ֣י בַּ/פַּ֣עַם הַ/זֹּ֗את אֲנִ֨י שֹׁלֵ֜חַ אֶת כָּל מַגֵּפֹתַ/י֙ אֶֽל לִבְּ/ךָ֔
    וּ/בַ/עֲבָדֶ֖י/ךָ וּ/בְ/עַמֶּ֑/ךָ בַּ/עֲב֣וּר תֵּדַ֔ע כִּ֛י אֵ֥ין כָּמֹ֖/נִי בְּ/כָל
    הָ/אָֽרֶץ׀־־־־׃
translation:
  text: For this time I am sending all my plagues against your heart, and against
    your servants and your people, so that you may know that there is none like me
    in all the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to your heart.' The Hebrew expression may mean that the plagues are
      aimed at Pharaoh himself, at the core of his being.
    reason: lexical_alternative
  - marker: b
    text: Or 'in all the land,' if the phrase is taken more locally; here it is rendered
      'earth' because the statement emphasizes the LORD's unmatched uniqueness universally.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the explanation for why Pharaoh has been preserved and warned.
    'For' fits the discourse connection in English better than 'because' here.
- source_word: בַּפַּעַם הַזֹּאת
  chosen: this time
  alternatives:
  - at this time
  - on this occasion
  lexicon: HALOT
  rationale: Idiomatic temporal expression meaning the present occasion/round of action.
    'This time' is natural modern English and preserves the temporal force.
- source_word: שֹׁלֵחַ
  chosen: I am sending
  alternatives:
  - I send
  - I am about to send
  lexicon: HALOT
  rationale: The participle conveys imminent or ongoing action in context. 'I am sending'
    preserves the vividness without overinterpreting as strictly future.
- source_word: כָּל מַגֵּפֹתַי
  chosen: all my plagues
  alternatives:
  - all my blows
  - all my afflictions
  lexicon: HALOT
  rationale: מַגֵּפָה commonly denotes a plague, blow, or striking judgment. 'Plagues'
    matches the Exodus context and standard English understanding while retaining
    divine-judgment force.
- source_word: אֶל לִבְּךָ
  chosen: against your heart
  alternatives:
  - to your heart
  - upon your heart
  lexicon: HALOT
  rationale: Literally 'to your heart.' In context this likely means the plagues are
    directed at Pharaoh himself, at the core of his being, not merely physically.
    'Against your heart' preserves the metaphor and the confrontational force better
    than flattening it to 'against you.'
- source_word: וּבַעֲבָדֶיךָ
  chosen: and against your servants
  alternatives:
  - and on your servants
  lexicon: HALOT
  rationale: The preposition is carried forward from the prior phrase. 'Servants'
    is the normal rendering for Pharaoh's court officials/subjects here; 'slaves'
    would misidentify the social relation in this context.
- source_word: וּבְעַמֶּךָ
  chosen: and your people
  alternatives:
  - and against your people
  lexicon: HALOT
  rationale: English style allows the repeated preposition to be implied after the
    first coordinated phrase, though its force is retained in the sentence. 'Your
    people' refers to the Egyptians under Pharaoh.
- source_word: בַּעֲבוּר
  chosen: so that
  alternatives:
  - in order that
  - because of
  lexicon: HALOT
  rationale: Marks purpose. 'So that' is clear, natural English and preserves the
    telic sense.
- source_word: תֵּדַע
  chosen: you may know
  alternatives:
  - you will know
  lexicon: HALOT
  rationale: 'Imperfect after a purpose marker is best rendered as intended result:
    ''you may know''/''you might know.'' This avoids overstating it as simple future.'
- source_word: אֵין כָּמֹנִי
  chosen: there is none like me
  alternatives:
  - there is no one like me
  lexicon: HALOT
  rationale: A standard Hebrew expression of incomparability. 'There is none like
    me' is concise, natural, and preserves the absolute claim.
- source_word: בְּכָל הָאָרֶץ
  chosen: in all the earth
  alternatives:
  - in all the land
  lexicon: HALOT
  rationale: Although אֶרֶץ can mean 'land,' the statement of divine incomparability
    is universal in scope here, so 'earth' best reflects the sense.
