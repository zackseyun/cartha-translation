theological_decisions:
- issue: Scope of divine incomparability
  chosen_reading: 'Universal: ''in all the earth'''
  alternative_readings:
  - 'Regional: ''in all the land'''
  rationale: The verse presents the LORD's uniqueness not merely within Egypt but
    over the whole world. This fits the plague narrative's theological aim without
    importing later doctrinal formulations.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve theological
    weight without overstatement'
- issue: Meaning of 'against your heart'
  chosen_reading: Retain the metaphor of the plagues being directed against Pharaoh's
    heart/core self
  alternative_readings:
  - Interpretively flatten to 'against you personally'
  rationale: The Hebrew explicitly says 'to/against your heart.' Retaining 'heart'
    preserves the narrative tension around Pharaoh's hardened heart and the personal,
    inward target of the judgment, while avoiding paraphrase.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; optimal equivalence'
