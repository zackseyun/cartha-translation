id: EXO.9.4
reference: Exodus 9:4
source:
  edition: WLC
  text: וְ/הִפְלָ֣ה יְהוָ֔ה בֵּ֚ין מִקְנֵ֣ה יִשְׂרָאֵ֔ל וּ/בֵ֖ין מִקְנֵ֣ה מִצְרָ֑יִם
    וְ/לֹ֥א יָמ֛וּת מִ/כָּל לִ/בְנֵ֥י יִשְׂרָאֵ֖ל דָּבָֽר־׃
translation:
  text: But the LORD will make a distinction between the livestock of Israel and the
    livestock of Egypt, so that not one thing belonging to the sons of Israel will
    die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites'; Hebrew 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִפְלָה
  chosen: will make a distinction
  alternatives:
  - will distinguish
  - will set apart
  lexicon: HALOT
  rationale: Hiphil of פלא here conveys making a clear distinction or separation between
    two groups. 'Make a distinction' is natural English and preserves the causative
    nuance better than a bare 'distinguish'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD'.
- source_word: בֵּין ... וּבֵין
  chosen: between ... and ...
  lexicon: HALOT
  rationale: Standard correlative preposition pair marking contrast between two referents.
- source_word: מִקְנֵה
  chosen: livestock
  alternatives:
  - cattle
  - property in livestock
  lexicon: HALOT
  rationale: מִקְנֶה refers broadly to domesticated animals/possessions in livestock,
    not merely bovines. 'Livestock' best fits the plague context and avoids over-narrowing
    to 'cattle'.
- source_word: מִצְרַיִם
  chosen: Egypt
  alternatives:
  - the Egyptians
  lexicon: HALOT
  rationale: The construct phrase 'livestock of Egypt' is a natural national designation
    here; English idiom allows 'Egypt' for the people/land collectively.
- source_word: וְלֹא יָמוּת
  chosen: so that ... will die
  alternatives:
  - and ... will not die
  - and not ... shall die
  lexicon: HALOT
  rationale: 'The clause states the result of the distinction: none of Israel''s livestock
    will die. Rendering with ''so that'' makes the relation explicit in idiomatic
    English while preserving the future sense.'
- source_word: מִכָּל
  chosen: not one thing
  alternatives:
  - nothing
  - not anything from all
  lexicon: HALOT
  rationale: Combined with the singular דָּבָר after a negated verb, this yields an
    emphatic 'not one thing'/'nothing at all.' 'Not one thing' preserves the distributive
    force.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: belonging to the sons of Israel
  alternatives:
  - of the Israelites
  - of the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is literally 'to/for the sons of Israel.' In context it modifies
    what belongs to Israel. 'Sons of Israel' preserves the source's familial/national
    expression more closely than 'Israelites,' while remaining understandable.
- source_word: דָּבָר
  chosen: thing
  alternatives:
  - anything
  - a single thing
  lexicon: HALOT
  rationale: Here דָּבָר functions idiomatically in a negated expression to mean 'thing/anything,'
    not 'word' or 'matter' in a narrower sense.
