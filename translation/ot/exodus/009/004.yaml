theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH,
    following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering בְּנֵי יִשְׂרָאֵל with gender-accurate language
  chosen_reading: sons of Israel
  alternative_readings:
  - Israelites
  - children of Israel
  rationale: The source is grammatically masculine plural and denotes the covenant
    people through the stock national expression. Per translation philosophy, gender-accurate
    rendering is preferred unless context requires otherwise.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
