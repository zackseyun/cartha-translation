id: EXO.9.21
reference: Exodus 9:21
source:
  edition: WLC
  text: וַ/אֲשֶׁ֥ר לֹא שָׂ֛ם לִבּ֖/וֹ אֶל דְּבַ֣ר יְהוָ֑ה וַֽ/יַּעֲזֹ֛ב אֶת עֲבָדָ֥י/ו
    וְ/אֶת מִקְנֵ֖/הוּ בַּ/שָּׂדֶֽה־־־־׃פ
translation:
  text: But whoever did not pay attention to the word of the LORD left his servants
    and his livestock in the field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “did not set his heart to the word of the LORD,” that is, did not take
      it to heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲשֶׁר
  chosen: But whoever
  alternatives:
  - and whoever
  - but he who
  lexicon: HALOT
  rationale: The relative particle with prefixed waw contrasts this group with the
    previous verse's obedient officials. 'But whoever' captures the adversative flow
    in natural English while preserving the indefinite relative sense.
- source_word: לֹא שָׂם לִבּוֹ אֶל
  chosen: did not pay attention to
  alternatives:
  - did not set his heart to
  - did not take to heart
  - did not regard
  lexicon: HALOT
  rationale: The idiom literally means 'did not set his heart to.' In context it denotes
    failing to heed or take seriously the LORD's warning. 'Did not pay attention to'
    is clear modern English and reflects the practical sense of disregard without
    over-paraphrasing.
- source_word: דְּבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  - the matter spoken by the LORD
  lexicon: HALOT
  rationale: דבר can mean word, matter, or message. Here it refers to the announced
    warning from the LORD, and 'the word of the LORD' preserves the standard biblical
    expression while remaining natural.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: וַיַּעֲזֹב
  chosen: left
  alternatives:
  - abandoned
  - let remain
  lexicon: HALOT
  rationale: The verb means to leave or forsake. In this narrative setting, 'left'
    best fits the concrete action of leaving servants and livestock exposed in the
    field.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, here the focus is on household
    workers left outdoors, not on the bonded status itself. 'Servants' is the better
    contextual rendering under the project's context-dependent policy.
- source_word: מִקְנֵהוּ
  chosen: his livestock
  alternatives:
  - his cattle
  - his animals
  lexicon: HALOT
  rationale: The noun refers broadly to domesticated animals/property in herds. 'Livestock'
    is the most accurate modern collective term.
- source_word: בַּשָּׂדֶה
  chosen: in the field
  alternatives:
  - out in the field
  - in the open field
  lexicon: HALOT
  rationale: A straightforward locative phrase. 'In the field' is sufficiently clear;
    the exposure to the coming hail is implied by context.
