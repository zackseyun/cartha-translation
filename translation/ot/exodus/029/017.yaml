id: EXO.29.17
reference: Exodus 29:17
source:
  edition: WLC
  text: וְ/אֶ֨ת הָ/אַ֔יִל תְּנַתֵּ֖חַ לִ/נְתָחָ֑י/ו וְ/רָחַצְתָּ֤ קִרְבּ/וֹ֙ וּ/כְרָעָ֔י/ו
    וְ/נָתַתָּ֥ עַל נְתָחָ֖י/ו וְ/עַל רֹאשֽׁ/וֹ־־־׃
translation:
  text: Then cut the ram into its pieces, wash its entrails and its legs, and put
    them with its pieces and with its head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wash its inner parts.' The Hebrew term can refer more generally to the
      inside of the animal, though in sacrificial context 'entrails' is likely more
      specific.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'put [them] on its pieces and on its head.' The translation 'put
      them with its pieces and with its head' reflects the likely sense of arranging
      the washed parts together with the cut pieces for the offering.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאַיִל
  chosen: the ram
  alternatives:
  - the male sheep
  lexicon: HALOT
  rationale: אַיִל in sacrificial contexts refers to a ram. 'Ram' is the standard,
    natural English rendering and fits the cultic setting.
- source_word: תְּנַתֵּחַ
  chosen: cut ... into its pieces
  alternatives:
  - divide
  - butcher
  lexicon: HALOT
  rationale: The piel of נתח means to cut up or divide into pieces, especially in
    preparation for sacrifice. 'Cut ... into its pieces' preserves the procedural
    sense without sounding overly technical.
- source_word: לִנְתָחָיו / נְתָחָיו
  chosen: its pieces
  alternatives:
  - its parts
  - its sections
  lexicon: HALOT
  rationale: נְתָחִים are the cut pieces of the animal. 'Pieces' is clear, idiomatic,
    and suits the sacrificial procedure.
- source_word: קִרְבּוֹ
  chosen: its entrails
  alternatives:
  - its inner parts
  - its inward parts
  lexicon: HALOT
  rationale: קֶרֶב can mean inner part generally, but in sacrificial instructions
    it refers concretely to the internal organs/entrails that are to be washed. 'Entrails'
    is specific and contextually appropriate.
- source_word: כְרָעָיו
  chosen: its legs
  alternatives:
  - its shanks
  lexicon: HALOT
  rationale: כְּרָעַיִם refers to the legs, especially lower legs, of an animal. 'Legs'
    is the most readable modern English choice; 'shanks' is possible but less common.
- source_word: וְנָתַתָּ עַל
  chosen: put them with
  alternatives:
  - place them on
  - lay them on top of
  lexicon: HALOT
  rationale: Although עַל often means 'on,' here in the arrangement of sacrificial
    pieces it indicates placing the washed entrails and legs onto/with the other pieces
    and head. 'Put them with' communicates the arrangement naturally in English while
    preserving the ritual action.
- source_word: רֹאשׁוֹ
  chosen: its head
  lexicon: HALOT
  rationale: Straightforward anatomical term; 'head' is the direct and natural rendering.
- source_word: וְ
  chosen: Then / and
  alternatives:
  - and
  rationale: The sequence of waw-linked verbs is procedural. Rendering the first conjunction
    as 'Then' helps English flow and reflects the step-by-step ritual instructions,
    while subsequent conjunctions are rendered as 'and'.
