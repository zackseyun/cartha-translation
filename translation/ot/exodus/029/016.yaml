id: EXO.29.16
reference: Exodus 29:16
source:
  edition: WLC
  text: וְ/שָׁחַטְתָּ֖ אֶת הָ/אָ֑יִל וְ/לָֽקַחְתָּ֙ אֶת דָּמ֔/וֹ וְ/זָרַקְתָּ֥ עַל
    הַ/מִּזְבֵּ֖חַ סָבִֽיב־־־׃
translation:
  text: And you shall slaughter the ram, and take its blood and throw it against the
    altar all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dash it against the altar all around.' The Hebrew verb can denote a
      more forceful ritual application than English 'sprinkle.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁחַטְתָּ
  chosen: shall slaughter
  alternatives:
  - shall kill
  - shall slaughter as a sacrifice
  lexicon: HALOT
  rationale: שָׁחַט in sacrificial contexts specifically denotes slaughtering an animal,
    not generic killing. 'Slaughter' preserves the ritual-sacrificial sense in clear
    modern English.
- source_word: הָאָיִל
  chosen: the ram
  alternatives:
  - the male sheep
  lexicon: HALOT
  rationale: אָיִל ordinarily means 'ram.' This is the specific sacrificial animal
    in context, so the standard zoological term is best.
- source_word: לָקַחְתָּ
  chosen: take
  alternatives:
  - receive
  - collect
  lexicon: HALOT
  rationale: The verb is the common 'take.' In context it refers to taking some of
    the animal's blood for ritual use. 'Take' is sufficiently natural and close to
    the Hebrew.
- source_word: דָּמוֹ
  chosen: its blood
  alternatives:
  - his blood
  lexicon: HALOT
  rationale: The suffix is masculine singular referring to the ram. English idiom
    for an animal in sacrificial instruction normally uses 'its' rather than 'his.'
- source_word: זָרַקְתָּ
  chosen: throw
  alternatives:
  - sprinkle
  - dash
  - toss
  lexicon: HALOT
  rationale: זָרַק in priestly sacrificial contexts often refers to throwing or dashing
    blood against the altar, not the lighter English sense of 'sprinkle.' 'Throw'
    best preserves the force of the action while remaining readable.
- source_word: עַל הַמִּזְבֵּחַ
  chosen: against the altar
  alternatives:
  - on the altar
  - upon the altar
  lexicon: HALOT
  rationale: With blood manipulation and זָרַק, English 'against the altar' better
    conveys application onto the altar's sides/surface than a simple locative 'on.'
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  - on every side
  lexicon: HALOT
  rationale: סָבִיב indicates surrounding circumference. 'All around' is idiomatic
    and conveys that the blood is applied around the altar's perimeter.
