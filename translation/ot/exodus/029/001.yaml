id: EXO.29.1
reference: Exodus 29:1
source:
  edition: WLC
  text: וְ/זֶ֨ה הַ/דָּבָ֜ר אֲשֶֽׁר תַּעֲשֶׂ֥ה לָ/הֶ֛ם לְ/קַדֵּ֥שׁ אֹתָ֖/ם לְ/כַהֵ֣ן
    לִ֑/י לְ֠קַח פַּ֣ר אֶחָ֧ד בֶּן בָּקָ֛ר וְ/אֵילִ֥ם שְׁנַ֖יִם תְּמִימִֽם־־׃
translation:
  text: 'And this is the matter that you shall do for them to consecrate them to serve
    as priests for me: take one bull from the herd and two unblemished rams.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one young bull.' The Hebrew phrase literally reads 'one bull, a son
      of the herd/cattle,' an idiom for a bovine animal from the herd.
    reason: lexical_alternative
  - marker: b
    text: Or 'without defect.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדָּבָר
  chosen: the matter
  alternatives:
  - the thing
  - the procedure
  lexicon: HALOT
  rationale: דָּבָר has a broad semantic range including 'word,' 'matter,' or 'thing.'
    In this ritual-instruction context, 'matter' preserves the formal sense without
    sounding overly wooden, and introduces the specific procedure that follows.
- source_word: תַּעֲשֶׂה
  chosen: you shall do
  alternatives:
  - you are to do
  - you must do
  lexicon: HALOT
  rationale: The imperfect here functions instructionally. 'You shall do' keeps the
    directive force and fits the formal tone of covenantal ritual instructions.
- source_word: לְקַדֵּשׁ
  chosen: to consecrate
  alternatives:
  - to sanctify
  - to make holy
  lexicon: HALOT
  rationale: In priestly context קדשׁ commonly refers to setting apart for sacred
    service. 'Consecrate' is the most natural English equivalent in ordination/ritual
    contexts.
- source_word: לְכַהֵן לִי
  chosen: to serve as priests for me
  alternatives:
  - to minister as priests to me
  - to act as priests for me
  lexicon: HALOT
  rationale: The infinitive from כהן denotes functioning in priestly office. 'Serve
    as priests for me' is clear modern English and preserves the vocational sense
    directed toward God.
- source_word: לְקַח
  chosen: take
  alternatives:
  - bring
  - fetch
  lexicon: HALOT
  rationale: The imperative straightforwardly introduces the required sacrificial
    animals. 'Take' is the plain and direct rendering.
- source_word: פַּר אֶחָד בֶּן בָּקָר
  chosen: one bull from the herd
  alternatives:
  - one young bull
  - one bull, a son of cattle
  lexicon: HALOT
  rationale: פַּר is 'bull.' The phrase בֶּן־בָּקָר is an idiomatic specification
    for a bovine animal from the herd, often a young bull. 'One bull from the herd'
    is idiomatic English and avoids the opaque literalism 'son of cattle.' 'Young
    bull' is possible, but the age nuance is not explicit enough to require it in
    the main text.
- source_word: אֵילִם שְׁנַיִם
  chosen: two rams
  alternatives:
  - a pair of rams
  lexicon: HALOT
  rationale: אֵיל means 'ram.' The numeral is explicit; 'two rams' is the natural
    rendering.
- source_word: תְּמִימִם
  chosen: unblemished
  alternatives:
  - without defect
  - perfect
  lexicon: HALOT
  rationale: In sacrificial contexts תמימים denotes animals free from defect. 'Unblemished'
    is standard, clear, and preserves the cultic requirement better than the potentially
    misleading 'perfect'.
