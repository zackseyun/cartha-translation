theological_decisions:
- issue: Priestly function language
  chosen_reading: to serve as priests for me
  alternative_readings:
  - to minister as priests to me
  rationale: The verse concerns Aaronic ordination and sacred office. The chosen wording
    preserves the institutional priestly role without importing later ecclesiastical
    connotations beyond the Hebrew.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source-text
    meaning without importing doctrinal claims.'
