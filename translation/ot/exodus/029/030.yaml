theological_decisions:
- issue: Priestly succession language
  chosen_reading: the priest from among his sons who succeeds him
  alternative_readings:
  - the priest in his place from his sons
  - one of his sons who is priest in his stead
  rationale: The Hebrew describes succession in the Aaronic priesthood rather than
    merely spatial replacement. The chosen wording preserves hereditary succession
    without importing later doctrinal claims.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cultic location of בַּקֹּדֶשׁ
  chosen_reading: in the holy place
  alternative_readings:
  - in the sanctuary
  rationale: The phrase should retain the concrete sacred-space reference of the tabernacle
    service. 'Holy place' best preserves the cultic specificity and avoids flattening
    the term into a generic abstraction.
  doctrine_reference: Translation philosophy §1, §6
