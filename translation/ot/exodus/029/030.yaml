id: EXO.29.30
reference: Exodus 29:30
source:
  edition: WLC
  text: שִׁבְעַ֣ת יָמִ֗ים יִלְבָּשָׁ֧/ם הַ/כֹּהֵ֛ן תַּחְתָּ֖י/ו מִ/בָּנָ֑י/ו אֲשֶׁ֥ר
    יָבֹ֛א אֶל אֹ֥הֶל מוֹעֵ֖ד לְ/שָׁרֵ֥ת בַּ/קֹּֽדֶשׁ־׃
translation:
  text: For seven days the priest from among his sons who succeeds him shall put them
    on, when he enters the tent of meeting to minister in the holy place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shall wear them.' The Hebrew verb can mean either 'put on' or 'wear'
      depending on context.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the priest under him from among his sons,' that is, the priest
      who succeeds him.
    reason: lexical_alternative
  - marker: c
    text: Or 'in the sanctuary.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁבְעַת יָמִים
  chosen: For seven days
  alternatives:
  - Seven days
  lexicon: HALOT
  rationale: The accusative of duration is naturally rendered in English with 'for'
    to express the period during which the garments are worn.
- source_word: יִלְבָּשָׁם
  chosen: shall put them on
  alternatives:
  - shall wear them
  lexicon: HALOT
  rationale: The verb לבש means 'put on, wear.' Here the focus is on donning the priestly
    garments mentioned in the preceding context. 'Put them on' reads naturally in
    English while preserving the concrete action; 'wear them' is possible but slightly
    less explicit about the garments being assumed for service.
- source_word: הַכֹּהֵן תַּחְתָּיו
  chosen: the priest ... who succeeds him
  alternatives:
  - the priest in his place
  - the priest instead of him
  lexicon: HALOT
  rationale: תחתיו literally means 'under him/in his place' and in this succession
    context refers to the next priest occupying his office. 'Who succeeds him' conveys
    the institutional succession clearly in modern English.
- source_word: מִבָּנָיו
  chosen: from among his sons
  alternatives:
  - one of his sons
  lexicon: HALOT
  rationale: The phrase specifies that the successor priest comes from Aaron's sons.
    'From among his sons' preserves the partitive sense and the familial line.
- source_word: אֲשֶׁר יָבֹא
  chosen: when he enters
  alternatives:
  - who will enter
  - who enters
  lexicon: HALOT
  rationale: Although formally relative, in context it identifies the successor by
    the circumstance of entering for priestly service. 'When he enters' connects smoothly
    with the following infinitive phrase and reflects the temporal force in English.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  lexicon: HALOT
  rationale: This is the standard and accurate rendering of the tabernacle designation,
    preserving the cultic setting without paraphrase.
- source_word: לְשָׁרֵת
  chosen: to minister
  alternatives:
  - to serve
  lexicon: HALOT
  rationale: In priestly/tabernacle contexts, 'minister' appropriately conveys formal
    sacred service, whereas 'serve' can sound too broad or ordinary.
- source_word: בַּקֹּדֶשׁ
  chosen: in the holy place
  alternatives:
  - in the sanctuary
  - in the holy place/holy sanctuary
  lexicon: HALOT
  rationale: In this cultic context, קֹדֶשׁ refers to the sacred area of tabernacle
    service. 'In the holy place' is a clear, traditional, and contextually precise
    rendering; 'in the sanctuary' is possible but less specific.
