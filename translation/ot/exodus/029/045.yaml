id: EXO.29.45
reference: Exodus 29:45
source:
  edition: WLC
  text: וְ/שָׁ֣כַנְתִּ֔י בְּ/ת֖וֹךְ בְּנֵ֣י יִשְׂרָאֵ֑ל וְ/הָיִ֥יתִי לָ/הֶ֖ם לֵ/אלֹהִֽים׃
translation:
  text: And I will dwell among the sons of Israel, and I will be their God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the midst of the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sons of Israel'; traditionally 'the children of Israel.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I will be God to them.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְשָׁכַנְתִּי
  chosen: And I will dwell
  alternatives:
  - And I will tabernacle
  - And I will reside
  lexicon: HALOT
  rationale: שׁכן denotes dwelling or settling in a place. 'Dwell' is the most natural
    modern English rendering and preserves the covenantal/theological resonance of
    God's presence without importing the more interpretive 'tabernacle' into the main
    text.
- source_word: בְּתוֹךְ
  chosen: among
  alternatives:
  - in the midst of
  - in the middle of
  lexicon: HALOT
  rationale: In this context, בְּתוֹךְ with a people group is best rendered idiomatically
    as 'among,' expressing presence within the community rather than merely spatial
    centrality. 'In the midst of' is more formal but less natural in contemporary
    English.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' Per the gender-accurate policy,
    the masculine form should be preserved where it reflects the source wording. 'Children
    of Israel' is traditional but less literal; 'Israelites' is smoother but loses
    the familial idiom.
- source_word: וְהָיִיתִי
  chosen: and I will be
  alternatives:
  - and I will become
  lexicon: HALOT
  rationale: היה here expresses covenant relation, not change of state in the sense
    of 'become.' 'I will be' is the standard and contextually appropriate rendering.
- source_word: לָהֶם
  chosen: their
  alternatives:
  - to them
  lexicon: HALOT
  rationale: Although literally 'to them/for them,' English idiom in covenant formulas
    is 'be their God.' This preserves the relational force of the Hebrew construction.
- source_word: לֵאלֹהִים
  chosen: God
  alternatives:
  - a god
  lexicon: HALOT
  rationale: In covenant formula contexts with Israel and the first-person divine
    speaker, אֱלֹהִים is definitively 'God,' not an indefinite 'a god.' The anarthrous
    form in Hebrew does not require indefiniteness here.
