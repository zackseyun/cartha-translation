theological_decisions:
- issue: Covenant formula rendering
  chosen_reading: I will be their God
  alternative_readings:
  - I will be God to them
  rationale: The Hebrew covenant formula וְהָיִיתִי לָהֶם לֵאלֹהִים is best rendered
    in established but still natural English as 'I will be their God.' This preserves
    the relational and covenantal force without unnecessary literalism.
  doctrine_reference: Translation philosophy §§3, 6
- issue: Gendered people-group expression
  chosen_reading: the sons of Israel
  alternative_readings:
  - the children of Israel
  - the Israelites
  rationale: Because the source text explicitly uses the masculine plural construct
    'sons of,' the translation preserves that form in keeping with the gender-accurate
    policy, rather than neutralizing it in the main text.
  doctrine_reference: Translation philosophy §4
