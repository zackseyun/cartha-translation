theological_decisions:
- issue: Rendering of כפר in sacrificial context
  chosen_reading: atonement was made
  alternative_readings:
  - expiation was made
  rationale: The verse concerns priestly sacrificial rites. 'Atonement' is the standard
    accessible English rendering and fits the translation philosophy's balance of
    clarity and theological weight. 'Expiation' is more technical and narrower, so
    it is preserved as an alternative rather than used in the main text.
  doctrine_reference: Translation philosophy §6
- issue: Rendering of priestly idiom מִלֵּא יָד in context
  chosen_reading: ordain them
  alternative_readings:
  - fill their hand
  - install them
  rationale: The Hebrew idiom refers to priestly installation, not a literal filling
    of hands. Using 'ordain' preserves the ritual-theological sense without importing
    later denominational structures; it is a functional equivalent in this cultic
    context.
  doctrine_reference: Translation philosophy §1, §6
