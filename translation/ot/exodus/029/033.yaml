id: EXO.29.33
reference: Exodus 29:33
source:
  edition: WLC
  text: וְ/אָכְל֤וּ אֹתָ/ם֙ אֲשֶׁ֣ר כֻּפַּ֣ר בָּ/הֶ֔ם לְ/מַלֵּ֥א אֶת יָדָ֖/ם לְ/קַדֵּ֣שׁ
    אֹתָ֑/ם וְ/זָ֥ר לֹא יֹאכַ֖ל כִּי קֹ֥דֶשׁ הֵֽם־־־׃
translation:
  text: They shall eat those things by which atonement was made for them, to ordain
    them and to consecrate them; but an outsider shall not eat them, because they
    are holy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'fill their hand,' a Hebrew idiom for priestly ordination or
      installation.
    reason: lexical_alternative
  - marker: b
    text: Or 'through which expiation was made for them.'
    reason: lexical_alternative
  - marker: c
    text: '''Outsider'' here means someone not authorized to participate in the priestly
      rite, not necessarily a foreigner by ethnicity.'
    reason: cultural_note
lexical_decisions:
- source_word: וְאָכְלוּ
  chosen: They shall eat
  alternatives:
  - And they shall eat
  - They are to eat
  lexicon: HALOT
  rationale: Qal imperfect/waw here carries straightforward future-instructional force
    within the ritual sequence. 'They shall eat' preserves the prescriptive sense
    without over-paraphrasing.
- source_word: אֹתָם
  chosen: those things
  alternatives:
  - them
  lexicon: HALOT
  rationale: The pronoun refers back to the sacrificial portions from the previous
    context. 'Those things' makes the object slightly clearer in English while remaining
    faithful to the pronoun.
- source_word: אֲשֶׁר כֻּפַּר בָּהֶם
  chosen: by which atonement was made for them
  alternatives:
  - with which atonement was made for them
  - through which expiation was made for them
  lexicon: HALOT
  rationale: The passive of כפר with ב marks the means/instrument associated with
    making atonement. 'Atonement was made' is the most natural and established English
    rendering; 'for them' reflects the priestly beneficiaries in context.
- source_word: לְמַלֵּא אֶת יָדָם
  chosen: to ordain them
  alternatives:
  - to fill their hand
  - to install them
  lexicon: HALOT
  rationale: Literally 'to fill their hand,' this is a technical idiom for priestly
    installation/ordination in this context. 'Ordain them' communicates the idiomatic
    sense in readable English; the literal expression is preserved as an alternative.
- source_word: לְקַדֵּשׁ אֹתָם
  chosen: to consecrate them
  alternatives:
  - to sanctify them
  - to make them holy
  lexicon: HALOT
  rationale: In priestly ritual context קדשׁ denotes setting apart as holy for sacred
    service. 'Consecrate' is the clearest modern formal equivalent.
- source_word: וְזָר
  chosen: but an outsider
  alternatives:
  - and a stranger
  - but a layman
  - but an unauthorized person
  lexicon: HALOT
  rationale: זר in cultic law refers not primarily to an ethnic foreigner but to someone
    outside the authorized priestly group. 'Outsider' best captures the ritual exclusion
    in contemporary English.
- source_word: לֹא יֹאכַל
  chosen: shall not eat them
  alternatives:
  - must not eat
  - shall not eat
  lexicon: HALOT
  rationale: The prohibition is direct and legal. Adding 'them' in English clarifies
    the implied object from context.
- source_word: כִּי קֹדֶשׁ הֵם
  chosen: because they are holy
  alternatives:
  - for they are holy
  - because they are sacred
  lexicon: HALOT
  rationale: The clause gives the reason for the prohibition. 'Holy' preserves the
    covenantal-sacral register better than the flatter 'sacred.'
