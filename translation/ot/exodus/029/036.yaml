theological_decisions:
- issue: Rendering cultic purification/atonement language without importing later
    doctrinal categories
  chosen_reading: Use 'sin offering,' 'purify,' and 'make atonement' in their ritual-tabernacle
    sense
  alternative_readings:
  - Use 'purification offering' for חטאת
  - Render וְחִטֵּאתָ as 'cleanse' or 'de-sin'
  rationale: The verse concerns consecration of the altar through sacrificial rites.
    The translation preserves the Hebrew cultic categories while avoiding paraphrase
    or anachronistic theological expansion. 'Purify the altar' is especially important
    because the altar is ritually cleansed/consecrated, not morally forgiven.
  doctrine_reference: Translation philosophy §§1, 3, 6
