id: EXO.29.36
reference: Exodus 29:36
source:
  edition: WLC
  text: וּ/פַ֨ר חַטָּ֜את תַּעֲשֶׂ֤ה לַ/יּוֹם֙ עַל הַ/כִּפֻּרִ֔ים וְ/חִטֵּאתָ֙ עַל
    הַ/מִּזְבֵּ֔חַ בְּ/כַפֶּרְ/ךָ֖ עָלָ֑י/ו וּ/מָֽשַׁחְתָּ֥ אֹת֖/וֹ לְ/קַדְּשֽׁ/וֹ־־׃
translation:
  text: And each day you shall offer a bull as a sin offering for atonement, and you
    shall purify the altar when you make atonement for it, and you shall anoint it
    to consecrate it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a bull as a purification offering.' The Hebrew term חַטָּאת can denote
      either 'sin' or, in sacrificial contexts, the offering used for purification
      from sin/impurity.
    reason: lexical_alternative
lexical_decisions:
- source_word: פַר
  chosen: a bull
  alternatives:
  - a young bull
  lexicon: HALOT
  rationale: פַר denotes a bull/bullock. 'Bull' is the clearest modern English rendering;
    'young bull' is possible but not required by the term itself here.
- source_word: חַטָּאת
  chosen: sin offering
  alternatives:
  - sin
  - purification offering
  lexicon: HALOT
  rationale: In sacrificial context חַטָּאת commonly denotes the offering associated
    with sin/purification rather than abstract 'sin.' 'Sin offering' is the most established
    and understandable rendering, while 'purification offering' captures a nuance
    preserved in a footnote-worthy alternative.
- source_word: לַיּוֹם
  chosen: each day
  alternatives:
  - daily
  - for the day
  lexicon: HALOT
  rationale: With the repeated ritual context, the phrase indicates a daily action.
    'Each day' is natural English and preserves the distributive sense.
- source_word: עַל הַכִּפֻּרִים
  chosen: for atonement
  alternatives:
  - for the atonements
  - concerning the atonement rites
  lexicon: HALOT
  rationale: The plural noun כפרים here refers to the atonement/purgation rites. English
    idiom prefers the singular abstract 'for atonement' rather than the awkward literal
    plural.
- source_word: וְחִטֵּאתָ
  chosen: you shall purify
  alternatives:
  - you shall cleanse from sin
  - you shall de-sin
  - you shall make a sin offering for
  lexicon: HALOT
  rationale: The piel of חטא in cultic contexts means to purify/decontaminate, especially
    of sacred objects. Since the direct object is the altar, 'purify' best conveys
    the ritual action without misleadingly implying the altar committed sin.
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Standard rendering for מזבח in tabernacle sacrificial context.
- source_word: בְּכַפֶּרְךָ עָלָיו
  chosen: when you make atonement for it
  alternatives:
  - by making atonement for it
  - as you make atonement on it
  lexicon: HALOT
  rationale: The preposition ב with infinitive construct can be temporal or instrumental.
    Here temporal 'when you make atonement for it' fits the sequence of ritual actions
    and the object suffix עָלָיו refers most naturally to the altar.
- source_word: וּמָשַׁחְתָּ
  chosen: you shall anoint
  lexicon: HALOT
  rationale: משׁח is the standard verb for applying consecratory oil; 'anoint' preserves
    the ritual and theological sense.
- source_word: לְקַדְּשׁוֹ
  chosen: to consecrate it
  alternatives:
  - to make it holy
  - to sanctify it
  lexicon: HALOT
  rationale: קדשׁ in this context refers to setting the altar apart as holy for sacred
    use. 'Consecrate' is clear modern English and fits ritual context.
