id: EXO.29.8
reference: Exodus 29:8
source:
  edition: WLC
  text: וְ/אֶת בָּנָ֖י/ו תַּקְרִ֑יב וְ/הִלְבַּשְׁתָּ֖/ם כֻּתֳּנֹֽת־׃
translation:
  text: And you shall bring near his sons and clothe them with tunics.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'present his sons.' The Hebrew verb can carry the sense of bringing someone
      forward for ritual presentation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת
  chosen: And
  alternatives:
  - And also
  - Then
  lexicon: HALOT
  rationale: The conjunction plus object marker introduces the next coordinated command.
    In English, the object marker is not translated directly; 'And' smoothly carries
    the sequence forward.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The noun specifically denotes male offspring, not children generically.
    'His sons' preserves the gender-specific reference to Aaron's sons in the priestly
    consecration context.
- source_word: תַּקְרִיב
  chosen: you shall bring near
  alternatives:
  - you shall present
  - you shall bring forward
  lexicon: HALOT
  rationale: The Hiphil of קרב commonly means to bring near/present, especially in
    cultic contexts. 'Bring near' preserves the ritual nuance and verbal connection
    with priestly presentation language better than the more generic 'bring'.
- source_word: וְהִלְבַּשְׁתָּם
  chosen: and clothe them
  alternatives:
  - and dress them
  - and put garments on them
  lexicon: HALOT
  rationale: The verb means to clothe or dress. 'Clothe them' is concise, natural
    English and retains the formal ritual sense of investiture.
- source_word: כֻּתֳּנֹת
  chosen: tunics
  alternatives:
  - coats
  - robes
  - linen garments
  lexicon: HALOT
  rationale: The term refers to close-fitting body garments/tunics. 'Tunics' is the
    most standard and semantically precise English choice in priestly clothing contexts;
    'coats' is dated and potentially misleading, while 'robes' suggests a different
    garment type.
