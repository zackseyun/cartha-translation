id: EXO.29.13
reference: Exodus 29:13
source:
  edition: WLC
  text: וְ/לָֽקַחְתָּ֗ אֶֽת כָּל הַ/חֵלֶב֮ הַֽ/מְכַסֶּ֣ה אֶת הַ/קֶּרֶב֒ וְ/אֵ֗ת הַ/יֹּתֶ֨רֶת֙
    עַל הַ/כָּבֵ֔ד וְ/אֵת֙ שְׁתֵּ֣י הַ/כְּלָיֹ֔ת וְ/אֶת הַ/חֵ֖לֶב אֲשֶׁ֣ר עֲלֵי/הֶ֑ן
    וְ/הִקְטַרְתָּ֖ הַ/מִּזְבֵּֽחָ/ה־־־־־׃
translation:
  text: Then you shall take all the fat that covers the entrails, the appendage on
    the liver, the two kidneys, and the fat that is on them, and you shall burn them
    on the altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the lobe of the liver.' The Hebrew term refers to a specific part attached
      to the liver, but its exact anatomical identification is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָקַחְתָּ
  chosen: you shall take
  alternatives:
  - you are to take
  - take
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional sequence functions
    as an imperative/future command. 'You shall take' preserves the procedural, legal-register
    force in English.
- source_word: כָּל הַחֵלֶב
  chosen: all the fat
  alternatives:
  - all the suet
  lexicon: HALOT
  rationale: חֵלֶב refers to the fatty portions of the sacrificial animal. 'Fat' is
    the clearest modern English equivalent; 'suet' is more technical and less accessible.
- source_word: הַמְכַסֶּה אֶת הַקֶּרֶב
  chosen: that covers the entrails
  alternatives:
  - that covers the inward parts
  - that covers the inner organs
  lexicon: HALOT
  rationale: קֶרֶב here refers to the internal cavity/organs of the animal. 'Entrails'
    is concrete and natural in sacrificial context, while still readable.
- source_word: הַיֹּתֶרֶת עַל הַכָּבֵד
  chosen: the appendage on the liver
  alternatives:
  - the lobe of the liver
  - the long lobe of the liver
  lexicon: HALOT
  rationale: יוֹתֶרֶת is a difficult anatomical term in sacrificial texts, commonly
    understood as an appendage/lobe associated with the liver. 'Appendage on the liver'
    stays close to the Hebrew preposition עַל ('on/upon') without overclaiming a precise
    modern anatomical identification.
- source_word: שְׁתֵּי הַכְּלָיֹת
  chosen: the two kidneys
  lexicon: HALOT
  rationale: Straightforward anatomical reference; 'kidneys' is the standard equivalent
    for כְּלָיוֹת.
- source_word: הַחֵלֶב אֲשֶׁר עֲלֵיהֶן
  chosen: the fat that is on them
  alternatives:
  - the fat that is around them
  lexicon: HALOT
  rationale: The phrase refers to the fat associated with the kidneys. 'On them' is
    the most direct rendering of עֲלֵיהֶן, while remaining idiomatic enough in context.
- source_word: הִקְטַרְתָּ
  chosen: you shall burn them
  alternatives:
  - you shall turn them into smoke
  - you shall offer them up in smoke
  lexicon: HALOT
  rationale: In sacrificial context, the Hiphil of קטר means to burn as an offering
    on the altar. 'Burn them' is clear and natural; the sacrificial nuance is supplied
    by the altar phrase.
- source_word: הַמִּזְבֵּחָה
  chosen: on the altar
  alternatives:
  - upon the altar
  lexicon: HALOT
  rationale: Directional he with altar indicates movement toward/onto the altar. English
    idiom prefers 'on the altar' in sacrificial instructions.
