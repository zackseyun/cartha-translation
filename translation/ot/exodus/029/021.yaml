theological_decisions:
- issue: Rendering the result of the ritual sanctification
  chosen_reading: shall be holy
  alternative_readings:
  - shall be consecrated
  rationale: The verse states the effect of blood-and-oil sprinkling in terms of holiness.
    Rendering קדשׁ as 'holy' preserves the text's own category rather than replacing
    it with a more technical but narrower ecclesiastical term. This avoids importing
    extra doctrinal nuance while keeping the cultic force.
  doctrine_reference: Translation philosophy §§1, 6
