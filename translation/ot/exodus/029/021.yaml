id: EXO.29.21
reference: Exodus 29:21
source:
  edition: WLC
  text: וְ/לָקַחְתָּ֞ מִן הַ/דָּ֨ם אֲשֶׁ֥ר עַֽל הַ/מִּזְבֵּחַ֮ וּ/מִ/שֶּׁ֣מֶן הַ/מִּשְׁחָה֒
    וְ/הִזֵּיתָ֤ עַֽל אַהֲרֹן֙ וְ/עַל בְּגָדָ֔י/ו וְ/עַל בָּנָ֛י/ו וְ/עַל בִּגְדֵ֥י
    בָנָ֖י/ו אִתּ֑/וֹ וְ/קָדַ֥שׁ הוּא֙ וּ/בְגָדָ֔י/ו וּ/בָנָ֛י/ו וּ/בִגְדֵ֥י בָנָ֖י/ו
    אִתּֽ/וֹ־־־־־־׃
translation:
  text: Then you shall take some of the blood that is on the altar and some of the
    anointing oil, and sprinkle it on Aaron and on his garments and on his sons and
    on the garments of his sons with him; and he and his garments shall be holy, and
    his sons and the garments of his sons with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shall be consecrated.' The Hebrew says literally 'shall be holy,' expressing
      the resulting sanctified status after the ritual action.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָקַחְתָּ
  chosen: you shall take
  alternatives:
  - you must take
  - take
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in procedural instruction functions
    as a future-like imperative sequence. 'You shall take' preserves the instructional
    force in clear English.
- source_word: מִן הַדָּם אֲשֶׁר עַל הַמִּזְבֵּחַ
  chosen: some of the blood that is on the altar
  alternatives:
  - from the blood that is on the altar
  - some of the blood on the altar
  lexicon: HALOT
  rationale: מִן marks taking a portion, so 'some of' is more natural and precise
    than a bare 'from.' The relative clause אֲשֶׁר עַל is retained as 'that is on
    the altar.'
- source_word: שֶׁמֶן הַמִּשְׁחָה
  chosen: the anointing oil
  alternatives:
  - oil of anointing
  lexicon: HALOT
  rationale: Standard construct phrase meaning oil used for anointing. 'The anointing
    oil' is idiomatic modern English while remaining formally close.
- source_word: הִזֵּיתָ
  chosen: sprinkle it
  alternatives:
  - spatter it
  - dash it
  lexicon: HALOT
  rationale: The Hiphil of נזה in cultic contexts denotes sprinkling a liquid. Singular
    object in English refers collectively to the mixed substances just mentioned;
    this is smoother than repeating both nouns.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: Repeated עַל is straightforwardly locative. 'On' is natural modern English
    and sufficiently formal.
- source_word: בְּגָדָיו / בִּגְדֵי בָנָיו
  chosen: his garments / the garments of his sons
  alternatives:
  - his clothing / his sons' garments
  - his vestments / the vestments of his sons
  lexicon: HALOT
  rationale: בגד is a general term for garments/clothing. 'Garments' fits the priestly
    context without importing later ecclesiastical terminology such as 'vestments.'
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural and refers to Aaron's male
    priestly descendants in context. This follows the gender-accurate principle.
- source_word: אִתּוֹ
  chosen: with him
  alternatives:
  - along with him
  lexicon: HALOT
  rationale: The phrase modifies 'his sons' / 'the garments of his sons' in relation
    to Aaron. 'With him' is the most direct rendering.
- source_word: וְקָדַשׁ
  chosen: shall be holy
  alternatives:
  - shall be consecrated
  - shall become holy
  lexicon: HALOT
  rationale: Qal perfect with vav in this ritual sequence expresses resulting state.
    Because the verb here predicates status after the sprinkling, 'shall be holy'
    best reflects the Hebrew without over-specifying the process. 'Consecrated' is
    possible but slightly interpretive and less transparent to the root קדשׁ.
- source_word: הוּא
  chosen: he
  alternatives:
  - Aaron
  lexicon: HALOT
  rationale: The pronoun resumes Aaron explicitly enough in context. Retaining 'he'
    mirrors the Hebrew structure while remaining clear after the prior mention of
    Aaron.
