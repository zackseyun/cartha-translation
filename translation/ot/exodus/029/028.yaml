theological_decisions:
- issue: Rendering of YHWH
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guideline specifies rendering the divine name as 'the LORD' in continuity with Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Cultic term שְׁלָמִים
  chosen_reading: peace offerings
  alternative_readings:
  - fellowship offerings
  - offerings of well-being
  rationale: The Hebrew term can emphasize peace, wholeness, or fellowship. 'Peace offerings' preserves the established cultic label without importing a narrower theological interpretation; alternatives are preserved in a footnote because the semantic range is broader than the traditional English term alone suggests.
