id: EXO.29.28
reference: Exodus 29:28
source:
  edition: WLC
  text: וְ/הָיָה֩ לְ/אַהֲרֹ֨ן וּ/לְ/בָנָ֜י/ו לְ/חָק עוֹלָ֗ם מֵ/אֵת֙ בְּנֵ֣י יִשְׂרָאֵ֔ל כִּ֥י תְרוּמָ֖ה ה֑וּא וּ/תְרוּמָ֞ה יִהְיֶ֨ה מֵ/אֵ֤ת בְּנֵֽי יִשְׂרָאֵל֙ מִ/זִּבְחֵ֣י שַׁלְמֵי/הֶ֔ם תְּרוּמָתָ֖/ם לַ/יהוָֽה־־׃
translation:
  text: It shall belong to Aaron and to his sons as a permanent statute from the Israelites, for it is a contribution; it shall be a contribution from the Israelites, from the sacrifices of their peace offerings, their contribution to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fellowship offerings' or 'offerings of well-being' for 'peace offerings.' The Hebrew term carries the sense of wholeness and restored relationship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: It shall belong
  alternatives:
  - and it shall be
  - and it shall become
  lexicon: HALOT
  rationale: Though the verb is literally 'and it shall be,' in context it denotes possession/allotment of the specified portions to Aaron and his sons. 'It shall belong' brings out the legal sense in natural English without over-paraphrasing.
- source_word: לְאַהֲרֹן וּלְבָנָיו
  chosen: to Aaron and to his sons
  alternatives:
  - for Aaron and for his sons
  lexicon: HALOT
  rationale: The lamed marks possession/benefit. 'To Aaron and to his sons' is straightforward and preserves the familial-priestly reference.
- source_word: לְחָק עוֹלָם
  chosen: as a permanent statute
  alternatives:
  - as a perpetual statute
  - as an everlasting due
  lexicon: HALOT
  rationale: חָק is a prescribed statute/due; עוֹלָם in legal-cultic contexts often means enduring or permanent rather than philosophically eternal. 'Permanent statute' is readable modern English while preserving the covenantal-legal force.
- source_word: מֵאֵת בְּנֵי יִשְׂרָאֵל
  chosen: from the Israelites
  alternatives:
  - from the sons of Israel
  - from the people of Israel
  lexicon: HALOT
  rationale: '''Israelites'' is the standard natural rendering of בְּנֵי יִשְׂרָאֵל and avoids unnecessary literalism while preserving the referent.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the explanation for why this statute applies. 'For' fits the explanatory flow.
- source_word: תְרוּמָה
  chosen: contribution
  alternatives:
  - offering
  - heave offering
  - raised offering
  lexicon: HALOT
  rationale: תְּרוּמָה denotes a contribution set apart and presented to God, often by lifting up. 'Contribution' best captures the general sense in accessible English. 'Heave offering' is traditional but archaic and overly technical; 'offering' alone is too broad.
- source_word: הוּא
  chosen: it is
  alternatives:
  - this is
  lexicon: HALOT
  rationale: The pronoun refers back to the priestly portion under discussion. 'It is' is the natural English equivalent.
- source_word: וּתְרוּמָה יִהְיֶה
  chosen: it shall be a contribution
  alternatives:
  - and it shall become a contribution
  - and it shall serve as a contribution
  lexicon: HALOT
  rationale: This repeats and reinforces the cultic classification of the portion. The English preserves the repetition, which is stylistically significant in Hebrew legal material.
- source_word: מִזִּבְחֵי שַׁלְמֵיהֶם
  chosen: from the sacrifices of their peace offerings
  alternatives:
  - from their fellowship-offering sacrifices
  - from the sacrifices of their offerings of well-being
  lexicon: HALOT
  rationale: זֶבַח refers to sacrifice, and שְׁלָמִים is the technical term traditionally rendered 'peace offerings.' 'Peace offerings' remains widely recognized and suitably concise; alternatives like 'offerings of well-being' are possible but less established. Including 'sacrifices of' reflects the construct chain.
- source_word: תְּרוּמָתָם
  chosen: their contribution
  alternatives:
  - their offering
  - their raised contribution
  lexicon: HALOT
  rationale: The suffix marks the contribution as belonging to/offered by the Israelites. Repeating 'contribution' maintains lexical consistency with earlier תְרוּמָה in the verse.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Per doctrine, YHWH is rendered 'the LORD.' The preposition here can be rendered 'to' or 'for'; 'to the LORD' fits the presentation of an offering directed to him.
