- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Purpose clause in Israel's exodus
  chosen_reading: so that I might dwell among them
  alternative_readings:
  - to dwell among them
  rationale: The Hebrew infinitive with ל is best taken as expressing divine purpose, highlighting that redemption from Egypt is ordered toward God's dwelling presence with his people. This is a translational, not doctrinally speculative, decision.
