theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Following the project's stated
    default for יְהוָה, it is rendered 'the LORD' rather than transliterated forms.
    This preserves continuity with Jewish reverence practice and the project's doctrine
    guidance.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Purpose clause in Israel's exodus
  chosen_reading: so that I might dwell among them
  alternative_readings:
  - to dwell among them
  rationale: The Hebrew infinitive with ל is best taken as expressing divine purpose,
    highlighting that redemption from Egypt is ordered toward God's dwelling presence
    with his people. This is a translational, not doctrinally speculative, decision.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
