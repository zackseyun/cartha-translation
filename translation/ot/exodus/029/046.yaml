id: EXO.29.46
reference: Exodus 29:46
source:
  edition: WLC
  text: וְ/יָדְע֗וּ כִּ֣י אֲנִ֤י יְהוָה֙ אֱלֹ֣הֵי/הֶ֔ם אֲשֶׁ֨ר הוֹצֵ֧אתִי אֹתָ֛/ם
    מֵ/אֶ֥רֶץ מִצְרַ֖יִם לְ/שָׁכְנִ֣/י בְ/תוֹכָ֑/ם אֲנִ֖י יְהוָ֥ה אֱלֹהֵי/הֶֽם׃פ
translation:
  text: And they shall know that I am the LORD their God, who brought them out from
    the land of Egypt so that I might dwell among them. I am the LORD their God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who brought them out of the land of Egypt to dwell among them.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in their midst.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדְעוּ
  chosen: And they shall know
  alternatives:
  - And they will know
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this context carries a future/result
    sense following the preceding instructions and promises. 'Shall know' preserves
    the solemn covenantal tone, while 'will know' is a viable modern alternative.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention reflecting
    the Tetragrammaton.
- source_word: אֱלֹהֵיהֶם
  chosen: their God
  alternatives:
  - their gods
  lexicon: HALOT
  rationale: 'In construct with the divine name and covenant context, the singular
    sense is required: ''their God.'' The plural-form noun regularly takes singular
    reference for Israel''s God.'
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - that
  - which
  lexicon: HALOT
  rationale: A personal relative pronoun fits the antecedent 'I am the LORD their
    God' and reads naturally in English.
- source_word: הוֹצֵאתִי אֹתָם מֵאֶרֶץ מִצְרַיִם
  chosen: who brought them out from the land of Egypt
  alternatives:
  - who brought them out of the land of Egypt
  lexicon: HALOT
  rationale: This is standard exodus language. 'From the land of Egypt' closely reflects
    the preposition מִן, while remaining idiomatic English.
- source_word: לְשָׁכְנִי
  chosen: so that I might dwell
  alternatives:
  - to dwell
  - for my dwelling
  lexicon: HALOT
  rationale: 'The infinitive construct with ל expresses purpose here: God brought
    Israel out in order to dwell among them. ''So that I might dwell'' makes the purposive
    force explicit in natural English.'
- source_word: בְּתוֹכָם
  chosen: among them
  alternatives:
  - in their midst
  - in the midst of them
  lexicon: HALOT
  rationale: '''Among them'' is the most natural modern English rendering of the idiom
    while preserving the sense of divine presence within the covenant community.'
- source_word: אֲנִי יְהוָה אֱלֹהֵיהֶם
  chosen: I am the LORD their God
  alternatives:
  - I, the LORD, am their God
  lexicon: HALOT
  rationale: This preserves the emphatic covenant formula and mirrors the Hebrew word
    order closely enough for English readability.
