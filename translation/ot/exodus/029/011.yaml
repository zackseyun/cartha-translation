id: EXO.29.11
reference: Exodus 29:11
source:
  edition: WLC
  text: וְ/שָׁחַטְתָּ֥ אֶת הַ/פָּ֖ר לִ/פְנֵ֣י יְהוָ֑ה פֶּ֖תַח אֹ֥הֶל מוֹעֵֽד־׃
translation:
  text: You shall slaughter the bull before the LORD at the entrance of the tent of
    meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'' Alternatives include
      ''Yahweh'' and ''Jehovah.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְשָׁחַטְתָּ
  chosen: You shall slaughter
  alternatives:
  - and you shall slaughter
  - you shall kill
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional sequence functions
    as a future/modal command in English. 'Slaughter' is more precise than 'kill'
    in sacrificial context and matches cultic usage.
- source_word: הַפָּר
  chosen: the bull
  alternatives:
  - the young bull
  - the ox
  lexicon: HALOT
  rationale: פַּר commonly denotes a bull in sacrificial contexts. 'Bull' is the clearest
    natural English rendering here; 'young bull' is possible but not required by this
    verse alone.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before/in front of.' 'Before the LORD' preserves
    the covenantal-sacral sense and follows the doctrinal default rendering of יְהוָה
    as 'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms, the default rendering of the divine
    name is 'the LORD,' following Jewish reverence tradition and longstanding English
    convention.
- source_word: פֶּתַח
  chosen: at the entrance
  alternatives:
  - at the doorway
  - at the opening
  lexicon: HALOT
  rationale: פֶּתַח denotes the entrance/opening. 'At the entrance' is idiomatic with
    the following construct phrase and suits the ritual-location instruction.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  - the tent of appointment
  lexicon: HALOT
  rationale: This is the standard rendering of the sanctuary designation in Exodus.
    It preserves the formal title while remaining readable modern English.
