theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name of God. Following the project's
    doctrinal guidance, the main text uses 'the LORD' rather than a transliteration,
    while preserving alternatives in a footnote.
