id: EXO.29.2
reference: Exodus 29:2
source:
  edition: WLC
  text: וְ/לֶ֣חֶם מַצּ֗וֹת וְ/חַלֹּ֤ת מַצֹּת֙ בְּלוּלֹ֣ת בַּ/שֶּׁ֔מֶן וּ/רְקִיקֵ֥י
    מַצּ֖וֹת מְשֻׁחִ֣ים בַּ/שָּׁ֑מֶן סֹ֥לֶת חִטִּ֖ים תַּעֲשֶׂ֥ה אֹתָֽ/ם׃
translation:
  text: and unleavened bread, and unleavened cakes mixed with oil, and unleavened
    wafers anointed with oil; you shall make them of fine wheat flour.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unleavened loaves' for 'unleavened cakes' (חַלֹּת); the Hebrew term
      can denote a loaf-shaped bread item.
    reason: lexical_alternative
  - marker: b
    text: Or 'spread with oil' for 'anointed with oil'; the verb is the usual word
      for anointing, but here it describes preparation of the wafers.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶחֶם מַצּוֹת
  chosen: unleavened bread
  alternatives:
  - bread of unleavened bread
  - bread made without yeast
  lexicon: HALOT
  rationale: The construct-like sequence denotes bread characterized by being unleavened.
    'Unleavened bread' is the natural English equivalent and preserves the ritual
    specificity without over-paraphrase.
- source_word: חַלֹּת מַצֹּת
  chosen: unleavened cakes
  alternatives:
  - unleavened loaves
  lexicon: HALOT
  rationale: חַלָּה refers to a cake/loaf, often a round bread item. 'Cakes' fits
    the likely cultic baked form and distinguishes this item from the more general
    'bread' and from the thin 'wafers' that follow.
- source_word: בְּלוּלֹת בַּשֶּׁמֶן
  chosen: mixed with oil
  alternatives:
  - mingled with oil
  - kneaded with oil
  lexicon: HALOT
  rationale: The passive participle from בלל indicates something blended or mixed.
    'Mixed with oil' is clear modern English and adequately reflects the preparation
    method.
- source_word: רְקִיקֵי מַצּוֹת
  chosen: unleavened wafers
  alternatives:
  - thin unleavened cakes
  - unleavened flatbreads
  lexicon: HALOT
  rationale: רָקִיק denotes a thin cake or wafer. 'Wafers' best preserves the contrast
    with the thicker חַלּוֹת while remaining idiomatic in English for sacrificial
    bread terminology.
- source_word: מְשֻׁחִים בַּשָּׁמֶן
  chosen: anointed with oil
  alternatives:
  - spread with oil
  - smeared with oil
  lexicon: HALOT
  rationale: The participle from משׁח commonly means 'anoint.' Although in a culinary
    context it can imply spreading or smearing, 'anointed with oil' preserves the
    lexical link and is standard in sacrificial instructions.
- source_word: סֹלֶת חִטִּים
  chosen: fine wheat flour
  alternatives:
  - choice wheat flour
  - fine flour of wheat
  lexicon: HALOT
  rationale: סֹלֶת is fine flour, and חִטִּים specifies wheat. 'Fine wheat flour'
    is natural English and preserves both quality and grain type.
- source_word: תַּעֲשֶׂה אֹתָם
  chosen: you shall make them
  alternatives:
  - you are to make them
  - make them
  lexicon: HALOT
  rationale: The imperfect here is instructional/jussive in legal material. 'You shall
    make them' matches the prescriptive force and the surrounding ritual directives.
