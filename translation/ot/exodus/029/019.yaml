id: EXO.29.19
reference: Exodus 29:19
source:
  edition: WLC
  text: וְ/לָ֣קַחְתָּ֔ אֵ֖ת הָ/אַ֣יִל הַ/שֵּׁנִ֑י וְ/סָמַ֨ךְ אַהֲרֹ֧ן וּ/בָנָ֛י/ו
    אֶת יְדֵי/הֶ֖ם עַל רֹ֥אשׁ הָ/אָֽיִל־־׃
translation:
  text: Then you shall take the second ram, and Aaron and his sons shall lay their
    hands on the head of the ram.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְלָקַחְתָּ
  chosen: Then you shall take
  alternatives:
  - And you shall take
  - You shall take
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional sequence functions
    as an imperative/future-like command to Moses. 'Then' captures the procedural
    progression in natural English, while 'you shall take' preserves the directive
    force.
- source_word: הָאַיִל הַשֵּׁנִי
  chosen: the second ram
  alternatives:
  - the other ram
  lexicon: HALOT
  rationale: אַיִל is 'ram.' הַשֵּׁנִי is ordinal 'second,' not merely 'another,'
    and refers to the second ram in the consecration sequence.
- source_word: וְסָמַךְ
  chosen: shall lay
  alternatives:
  - shall lean
  - shall place
  lexicon: HALOT
  rationale: The verb סמך in sacrificial contexts commonly denotes the ritual act
    of laying or pressing the hand(s) on the animal. 'Lay' is the standard clear English
    rendering in cultic contexts.
- source_word: אַהֲרֹן וּבָנָיו
  chosen: Aaron and his sons
  alternatives:
  - Aaron and his children
  lexicon: HALOT
  rationale: בָּנִים here refers specifically to Aaron's male offspring serving in
    priestly consecration. 'Sons' is gender-accurate and contextually precise.
- source_word: אֶת יְדֵיהֶם
  chosen: their hands
  alternatives:
  - their hand
  lexicon: HALOT
  rationale: The Hebrew uses the plural 'their hands,' matching the plural subject
    and naturally rendered as plural in English.
- source_word: עַל רֹאשׁ הָאָיִל
  chosen: on the head of the ram
  alternatives:
  - upon the head of the ram
  lexicon: HALOT
  rationale: A straightforward spatial expression. 'On' is idiomatic modern English;
    'head' is singular in Hebrew and English because the animal is singular.
