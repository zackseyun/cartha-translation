theological_decisions:
- issue: Rendering the hand-imposition rite without importing later theological explanation
  chosen_reading: shall lay their hands on the head of the ram
  alternative_readings:
  - shall place their hands on the ram's head
  - shall lean their hands on the head of the ram
  rationale: The verse describes the ritual action itself without explaining its symbolism.
    The translation preserves the concrete cultic act and avoids importing interpretive
    claims such as transfer of guilt, identification, or ordination beyond what the
    text explicitly states.
  doctrine_reference: Preserve theological tension rather than resolve it.
