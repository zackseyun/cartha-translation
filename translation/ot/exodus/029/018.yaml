id: EXO.29.18
reference: Exodus 29:18
source:
  edition: WLC
  text: וְ/הִקְטַרְתָּ֤ אֶת כָּל הָ/אַ֨יִל֙ הַ/מִּזְבֵּ֔חָ/ה עֹלָ֥ה ה֖וּא לַֽ/יהוָ֑ה
    רֵ֣יחַ נִיח֔וֹחַ אִשֶּׁ֥ה לַ/יהוָ֖ה הֽוּא־־׃
translation:
  text: And you shall burn the whole ram on the altar. It is a burnt offering to the
    LORD, a pleasing aroma, a food offering to the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a soothing aroma.' The Hebrew expression is a fixed sacrificial formula
      for an offering acceptable to the LORD.
    reason: lexical_alternative
  - marker: b
    text: Or 'an offering by fire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְטַרְתָּ
  chosen: And you shall burn
  alternatives:
  - and you shall turn into smoke
  - and you shall offer up in smoke
  lexicon: HALOT
  rationale: The Hiphil of קטר in sacrificial contexts refers to causing the offering
    to go up in smoke on the altar. 'Burn' is the most natural modern English rendering,
    while the altar context preserves the sacrificial sense.
- source_word: כָּל
  chosen: the whole
  alternatives:
  - all of
  lexicon: HALOT
  rationale: Here it emphasizes that the entire ram is offered, not merely a portion.
    'The whole' reads naturally with a singular animal in English.
- source_word: הָאַיִל
  chosen: ram
  lexicon: HALOT
  rationale: אַיִל specifically denotes a ram, not a generic sheep or lamb.
- source_word: הַמִּזְבֵּחָה
  chosen: on the altar
  alternatives:
  - to the altar
  lexicon: HALOT
  rationale: The directional ending with the sacrificial verb indicates movement toward
    the altar for offering, but idiomatic English in this context is 'on the altar,'
    since the burning occurs there.
- source_word: עֹלָה
  chosen: a burnt offering
  alternatives:
  - an ascent offering
  - a whole burnt offering
  lexicon: HALOT
  rationale: '''Burnt offering'' is the established and accurate rendering for עֹלָה
    in sacrificial law. ''Ascent offering'' is more etymologically transparent but
    less idiomatic in English.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The lamed marks dedication or relation. 'To the LORD' preserves the offering's
    direction and dedication. Per doctrine, יהוה is rendered 'the LORD.'
- source_word: רֵיחַ נִיחוֹחַ
  chosen: a pleasing aroma
  alternatives:
  - a soothing aroma
  - an aroma of rest
  lexicon: HALOT
  rationale: This fixed sacrificial expression denotes an odor acceptable to God.
    'Pleasing aroma' communicates acceptability without implying divine olfactory
    limitation. 'Soothing aroma' is possible but can suggest calming God in a way
    the English reader may overread.
- source_word: אִשֶּׁה
  chosen: a food offering
  alternatives:
  - an offering by fire
  - a fire offering
  lexicon: HALOT
  rationale: Although traditionally rendered 'offering by fire,' the term denotes
    an offering made by fire and in many contexts functions as a category of food
    gift to God. 'Food offering' is clear modern English and fits the sacrificial
    context, while the burning action has already been expressed by the verb.
- source_word: הוּא
  chosen: It is
  alternatives:
  - this is
  lexicon: HALOT
  rationale: The pronoun serves a predicative function identifying the ram/offering.
    'It is' is the natural English equivalent in both occurrences.
