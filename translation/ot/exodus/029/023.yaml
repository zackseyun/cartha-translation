id: EXO.29.23
reference: Exodus 29:23
source:
  edition: WLC
  text: וְ/כִכַּ֨ר לֶ֜חֶם אַחַ֗ת וַֽ/חַלַּ֨ת לֶ֥חֶם שֶׁ֛מֶן אַחַ֖ת וְ/רָקִ֣יק אֶחָ֑ד
    מִ/סַּל֙ הַ/מַּצּ֔וֹת אֲשֶׁ֖ר לִ/פְנֵ֥י יְהוָֽה׃
translation:
  text: and one loaf of bread, one cake of bread mixed with oil, and one wafer, from
    the basket of unleavened bread that is before the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; alternatively rendered ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: כִּכַּר לֶחֶם
  chosen: loaf of bread
  alternatives:
  - round loaf of bread
  - cake of bread
  lexicon: HALOT
  rationale: כִּכַּר denotes a round loaf or cake-shaped unit; with לֶחֶם, 'loaf of
    bread' is natural modern English and distinguishes it from the following חַלָּה
    item.
- source_word: אַחַת
  chosen: one
  rationale: Cardinal numeral marking a single item; repeated for each bread item
    and preserved in English for ritual precision.
- source_word: חַלַּת לֶחֶם שֶׁמֶן
  chosen: cake of bread mixed with oil
  alternatives:
  - oil bread cake
  - cake of oiled bread
  - cake of bread with oil
  lexicon: HALOT
  rationale: חַלָּה is a cake/loaf, and the construct-like sequence with לֶחֶם שֶׁמֶן
    indicates a bread item prepared with oil. 'Mixed with oil' communicates the preparation
    idiomatically without over-paraphrasing.
- source_word: רָקִיק
  chosen: wafer
  alternatives:
  - thin cake
  - flat cake
  lexicon: HALOT
  rationale: רָקִיק refers to a thin unleavened cake; 'wafer' is a concise established
    rendering that captures thinness and ritual-food context.
- source_word: מִסַּל הַמַּצּוֹת
  chosen: from the basket of unleavened bread
  alternatives:
  - from the basket of unleavened cakes
  - from the basket of unleavened breadstuff
  lexicon: HALOT
  rationale: מִן marks source, and סַל is 'basket.' Though מַצּוֹת can be rendered
    'unleavened cakes/bread,' 'unleavened bread' is the most natural collective English
    expression here.
- source_word: אֲשֶׁר לִפְנֵי יְהוָה
  chosen: that is before the LORD
  alternatives:
  - which is before the LORD
  - that is set before the LORD
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before/in the presence of.' 'That is before
    the LORD' is a clear, fairly formal rendering preserving the cultic spatial sense.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' following established reverential convention and the translation's stated
    policy.
