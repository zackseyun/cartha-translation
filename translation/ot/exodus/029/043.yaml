theological_decisions:
- issue: Implicit subject of 'it will be made holy'
  chosen_reading: The clause is rendered with an impersonal English subject ('it')
    referring to the sanctuary locale previously in view.
  alternative_readings:
  - '''he will be consecrated'' referring to Aaron'
  - '''it will be consecrated'' referring specifically to the tent of meeting'
  - '''it will be consecrated'' referring to the altar'
  rationale: The Hebrew verb is 3ms singular with no explicit subject in this verse.
    In context, the nearest antecedents in the surrounding verses are sanctuary-related
    objects, not primarily Aaron. English requires an explicit subject, so 'it' preserves
    the ambiguity better than specifying 'the tent' or 'the altar.'
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it; §5, document exception/ambiguity.
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - Israelites
  - people of Israel
  rationale: The Hebrew is grammatically masculine plural and is a standard covenantal
    ethnonym. Per the project's gender-accurate principle, the more formally transparent
    'sons of Israel' is retained in the main text, while a footnote can note the idiomatic
    equivalent 'Israelites.'
  doctrine_reference: Translation philosophy §4, gender-accurate over gender-neutral.
