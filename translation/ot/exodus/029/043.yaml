id: EXO.29.43
reference: Exodus 29:43
source:
  edition: WLC
  text: וְ/נֹעַדְתִּ֥י שָׁ֖מָּ/ה לִ/בְנֵ֣י יִשְׂרָאֵ֑ל וְ/נִקְדַּ֖שׁ בִּ/כְבֹדִֽ/י׃
translation:
  text: There I will meet with the sons of Israel, and it will be made holy by my
    glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew reads 'the sons of Israel,' a standard covenantal
      expression for the people of Israel.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says 'and it will be made holy by my glory.' The subject of 'it'
      is implicit and may refer generally to the sanctuary area in view, more specifically
      to the tent of meeting or the altar.
    reason: alternative_reading
lexical_decisions:
- source_word: וְנֹעַדְתִּי
  chosen: I will meet with
  alternatives:
  - I will appoint
  - I will be present
  - I will reveal myself
  lexicon: HALOT
  rationale: From יעד in the Niphal, here in the sanctuary context it denotes an appointed
    meeting/encounter. 'Meet with' best fits the immediate context of divine encounter
    at the tent of meeting without over-paraphrasing.
- source_word: שָׁמָּה
  chosen: there
  alternatives:
  - to that place
  lexicon: HALOT
  rationale: Adverb of place referring back to the sanctuary location just described.
    Simple 'there' is natural and sufficiently precise.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: with the sons of Israel
  alternatives:
  - with the Israelites
  - for the sons of Israel
  lexicon: HALOT
  rationale: The preposition with יעד supports the sense 'meet with.' 'Sons of Israel'
    preserves the Hebrew expression and follows the project's gender-accurate principle;
    'Israelites' is possible but less formally transparent.
- source_word: וְנִקְדַּשׁ
  chosen: it will be made holy
  alternatives:
  - it will be consecrated
  - it will be sanctified
  lexicon: HALOT
  rationale: Niphal of קדש expresses being made holy/consecrated. The subject is implicit
    from context, most naturally the tent/altar/sanctuary locale. 'Made holy' is readable
    modern English and preserves the passive sense.
- source_word: בִּכְבֹדִי
  chosen: by my glory
  alternatives:
  - by means of my glory
  - with my glory
  lexicon: HALOT
  rationale: כבוד here refers to Yahweh's manifest glory/presence. The preposition
    ב can be instrumental; 'by my glory' communicates that the sanctifying agency
    is God's glory.
