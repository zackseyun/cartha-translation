id: EXO.29.31
reference: Exodus 29:31
source:
  edition: WLC
  text: וְ/אֵ֛ת אֵ֥יל הַ/מִּלֻּאִ֖ים תִּקָּ֑ח וּ/בִשַּׁלְתָּ֥ אֶת בְּשָׂר֖/וֹ בְּ/מָקֹ֥ם
    קָדֹֽשׁ־׃
translation:
  text: And you shall take the ram of ordination and boil its flesh in a holy place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the ram of consecration.' The Hebrew term refers to the priestly installation
      rite.
    reason: lexical_alternative
  - marker: b
    text: Or, 'in the Holy Place,' though the Hebrew more literally says 'in a holy
      place.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֵיל
  chosen: ram
  alternatives:
  - male sheep
  lexicon: HALOT
  rationale: The standard sacrificial-animal sense is 'ram.' 'Male sheep' is semantically
    possible but too generic and less natural in English cultic context.
- source_word: הַמִּלֻּאִים
  chosen: of ordination
  alternatives:
  - of consecration
  - of filling
  lexicon: HALOT
  rationale: In priestly context מִלֻּאִים refers to the ordination/consecration rite
    ('filling of the hand'). 'Ordination' communicates the ritual function clearly
    in modern English while remaining close to the technical sense.
- source_word: תִּקָּח
  chosen: you shall take
  alternatives:
  - you are to take
  - take
  lexicon: HALOT
  rationale: Second masculine singular imperfect in instructional context is well
    represented by 'you shall take,' preserving the directive force and sequence of
    commands.
- source_word: וּבִשַּׁלְתָּ
  chosen: and boil
  alternatives:
  - and cook
  - and seethe
  lexicon: HALOT
  rationale: בשׁל in this context specifically denotes boiling/cooking in liquid.
    'Boil' is more precise than the broader 'cook'; 'seethe' is archaic.
- source_word: בְּשָׂרוֹ
  chosen: its flesh
  alternatives:
  - its meat
  lexicon: HALOT
  rationale: '''Flesh'' is the more literal rendering of בשר and suits sacrificial
    language better than ''meat,'' while remaining understandable.'
- source_word: בְּמָקוֹם קָדֹשׁ
  chosen: in a holy place
  alternatives:
  - in the holy place
  - in a sacred place
  lexicon: HALOT
  rationale: The phrase lacks the article on both noun and adjective here, so 'in
    a holy place' is the most direct rendering. 'The Holy Place' could misleadingly
    suggest the inner tabernacle chamber, which is not required by the Hebrew.
