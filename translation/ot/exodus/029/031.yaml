theological_decisions:
- issue: Technical cultic term הַמִּלֻּאִים in priestly ordination context
  chosen_reading: the ram of ordination
  alternative_readings:
  - the ram of consecration
  rationale: Both 'ordination' and 'consecration' are viable in priestly installation
    contexts. 'Ordination' better captures the specific installation of priests into
    office in readable modern English, while not excluding the sanctifying aspect.
    The Hebrew idiom behind the term is preserved conceptually rather than woodenly.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Whether בְּמָקוֹם קָדֹשׁ should be rendered as a generic holy place or the
    technical sanctuary room 'the Holy Place'
  chosen_reading: in a holy place
  alternative_readings:
  - in the Holy Place
  rationale: The anarthrous Hebrew phrase does not require identification with the
    tabernacle chamber called 'the Holy Place.' Rendering it generically avoids importing
    a more specific cultic location than the text states.
  doctrine_reference: Translation philosophy §§1, 3, 6
