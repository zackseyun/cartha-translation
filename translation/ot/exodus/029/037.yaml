id: EXO.29.37
reference: Exodus 29:37
source:
  edition: WLC
  text: שִׁבְעַ֣ת יָמִ֗ים תְּכַפֵּר֙ עַל הַ/מִּזְבֵּ֔חַ וְ/קִדַּשְׁתָּ֖ אֹת֑/וֹ וְ/הָיָ֤ה
    הַ/מִּזְבֵּ֨חַ֙ קֹ֣דֶשׁ קָֽדָשִׁ֔ים כָּל הַ/נֹּגֵ֥עַ בַּ/מִּזְבֵּ֖חַ יִקְדָּֽשׁ־־׃ס
translation:
  text: For seven days you shall make atonement for the altar and consecrate it, and
    the altar shall be most holy. Whatever touches the altar shall become holy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Everyone who touches the altar shall be holy.' The Hebrew can be understood
      either as holiness being imparted by contact or as requiring that only what
      is holy may touch it.
    reason: alternative_reading
lexical_decisions:
- source_word: תְּכַפֵּר
  chosen: make atonement
  alternatives:
  - purge
  - cover
  lexicon: HALOT
  rationale: In priestly ritual context כפר refers to performing rites of atonement/purification.
    'Make atonement' is the most established and accurate English rendering here without
    over-specifying the mechanism.
- source_word: עַל הַמִּזְבֵּחַ
  chosen: for the altar
  alternatives:
  - on the altar
  - over the altar
  lexicon: HALOT
  rationale: Although עַל often means 'on/upon,' with כפר in sacrificial contexts
    it commonly marks the object for which atonement is made. 'For the altar' best
    reflects the idiom in natural English.
- source_word: וְקִדַּשְׁתָּ אֹתוֹ
  chosen: and consecrate it
  alternatives:
  - and sanctify it
  - and make it holy
  lexicon: HALOT
  rationale: '''Consecrate'' fits cultic setting and communicates setting apart as
    holy. ''Sanctify'' is possible but more ecclesiastical; ''make it holy'' is accurate
    but less idiomatic in ritual instructions.'
- source_word: קֹדֶשׁ קָדָשִׁים
  chosen: most holy
  alternatives:
  - holy of holies
  - supremely holy
  lexicon: HALOT
  rationale: The Hebrew superlative construction denotes the highest degree of holiness.
    'Most holy' is clear modern English and standard for objects in priestly texts;
    'holy of holies' is more literal but less natural here in predicative use.
- source_word: כָּל הַנֹּגֵעַ
  chosen: Whatever touches
  alternatives:
  - Everyone who touches
  - Anything that touches
  lexicon: HALOT
  rationale: The participle with כָּל is broad and can include any person or thing
    coming into contact. 'Whatever touches' preserves that breadth better than restricting
    it to persons.
- source_word: יִקְדָּשׁ
  chosen: shall become holy
  alternatives:
  - shall be holy
  - shall be consecrated
  lexicon: HALOT
  rationale: 'The verb is passive/inchoative in sense here: contact with the altar
    imparts holiness. ''Shall become holy'' best captures the resulting state from
    contact, rather than merely describing an existing status.'
