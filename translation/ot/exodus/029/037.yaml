theological_decisions:
- issue: Meaning of holiness imparted by contact with the altar
  chosen_reading: Contact with the consecrated altar communicates holiness to what
    touches it.
  alternative_readings:
  - Only authorized holy objects/persons may touch it without incurring danger.
  - Whoever touches it must already be holy.
  rationale: The plain sense of יִקְדָּשׁ after 'whatever touches the altar' is that
    the touching party becomes holy, not merely that it must be holy beforehand. This
    preserves the ritual logic of priestly holiness without importing later interpretive
    restrictions into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it
