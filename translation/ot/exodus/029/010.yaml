theological_decisions:
- issue: Ritual hand-laying on the sacrificial animal
  chosen_reading: shall lay their hands on the head of the bull
  alternative_readings:
  - shall place their hands on the bull's head
  rationale: The verse describes a concrete consecration/sacrificial rite without
    explicitly explaining its theological symbolism. The translation preserves the
    ritual action and does not import later doctrinal interpretation such as transfer
    of guilt beyond what the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
