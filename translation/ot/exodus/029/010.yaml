id: EXO.29.10
reference: Exodus 29:10
source:
  edition: WLC
  text: וְ/הִקְרַבְתָּ֙ אֶת הַ/פָּ֔ר לִ/פְנֵ֖י אֹ֣הֶל מוֹעֵ֑ד וְ/סָמַ֨ךְ אַהֲרֹ֧ן
    וּ/בָנָ֛י/ו אֶת יְדֵי/הֶ֖ם עַל רֹ֥אשׁ הַ/פָּֽר־־־׃
translation:
  text: You shall bring the bull before the tent of meeting, and Aaron and his sons
    shall lay their hands on the head of the bull.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'present' or 'bring near' the bull before the tent of meeting.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרַבְתָּ
  chosen: You shall bring
  alternatives:
  - You shall present
  - You shall bring near
  lexicon: HALOT
  rationale: Hiphil of קרב commonly means to bring near/present in sacrificial contexts.
    'Bring' is clear modern English; 'before the tent of meeting' preserves the directional/sacrificial
    sense without awkwardness.
- source_word: הַפָּר
  chosen: the bull
  alternatives:
  - the young bull
  - the ox
  lexicon: HALOT
  rationale: פַּר denotes a bull, often a young bull in sacrificial usage. 'Bull'
    is the most natural and sufficiently precise English rendering here.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in front of
  - to the front of
  lexicon: HALOT
  rationale: The preposition indicates position in the presence of or before a location.
    'Before' is idiomatic and fits ritual setting.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  - the tent of appointment
  lexicon: HALOT
  rationale: This is the standard and contextually accurate rendering for the tabernacle
    sanctuary designation. It preserves the cultic sense without paraphrase.
- source_word: וְסָמַךְ
  chosen: shall lay
  alternatives:
  - shall place
  - shall lean
  lexicon: HALOT
  rationale: סמך with hands on a sacrificial animal's head refers to the ritual act
    of laying/placing hands. 'Lay' is the established and clearest English equivalent.
- source_word: יְדֵיהֶם
  chosen: their hands
  alternatives:
  - their hand
  lexicon: HALOT
  rationale: The Hebrew is plural, matching the ritual gesture by Aaron and his sons
    collectively. English should preserve the plural.
- source_word: עַל רֹאשׁ הַפָּר
  chosen: on the head of the bull
  alternatives:
  - upon the bull's head
  lexicon: HALOT
  rationale: This preserves the concrete physical action and Hebrew syntax in natural
    English.
- source_word: אַהֲרֹן וּבָנָיו
  chosen: Aaron and his sons
  alternatives:
  - Aaron and his children
  lexicon: HALOT
  rationale: בנים here specifically refers to male offspring serving in priestly consecration.
    'Sons' is gender-accurate and contextually required.
