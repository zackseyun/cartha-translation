theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering of
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Number shift in pronouns within the verse
  chosen_reading: retain plural 'you' in 'with you' and singular 'you' in 'to speak
    to you'
  alternative_readings:
  - harmonize both as plural
  - harmonize both as singular
  rationale: The Hebrew shifts from לָכֶם ('with you' plural, likely Israel/priests)
    to אֵלֶיךָ ('to you' singular, addressed to Moses). Preserving the shift maintains
    the source text's distinction rather than smoothing it away.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #3, #5'
