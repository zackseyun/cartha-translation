id: EXO.29.42
reference: Exodus 29:42
source:
  edition: WLC
  text: עֹלַ֤ת תָּמִיד֙ לְ/דֹרֹ֣תֵי/כֶ֔ם פֶּ֥תַח אֹֽהֶל מוֹעֵ֖ד לִ/פְנֵ֣י יְהוָ֑ה
    אֲשֶׁ֨ר אִוָּעֵ֤ד לָ/כֶם֙ שָׁ֔מָּ/ה לְ/דַבֵּ֥ר אֵלֶ֖י/ךָ שָֽׁם־׃
translation:
  text: It shall be a regular burnt offering throughout your generations at the entrance
    of the tent of meeting before the LORD, where I will meet with you, to speak to
    you there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a continual burnt offering' or 'a perpetual burnt offering.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew shifts from plural ('with you') to singular ('to you'), likely
      distinguishing the broader people from Moses specifically.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹלַת תָּמִיד
  chosen: a regular burnt offering
  alternatives:
  - a continual burnt offering
  - a perpetual burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard term for a burnt offering, and תָּמִיד denotes
    regular continuity. 'Regular' communicates the ongoing prescribed nature in natural
    English without implying uninterrupted action as strongly as 'continual' might.
- source_word: לְדֹרֹתֵיכֶם
  chosen: throughout your generations
  alternatives:
  - for your generations
  lexicon: HALOT
  rationale: This idiom marks enduring applicability across successive generations.
    'Throughout your generations' is the established and accurate English equivalent.
- source_word: פֶּתַח
  chosen: at the entrance
  alternatives:
  - at the doorway
  - at the opening
  lexicon: HALOT
  rationale: פֶּתַח refers to the entrance/opening. 'At the entrance' fits the locative
    sense smoothly in English.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  - the tent of appointment
  lexicon: HALOT
  rationale: This is the conventional and contextually precise rendering for the tabernacle
    structure where God meets with Moses/Israel. 'Tent of meeting' best captures both
    idiom and function.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי commonly means 'before' in cultic/spatial contexts. YHWH is rendered
    'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered 'the LORD' in keeping with the project's
    stated default for יְהוָה.
- source_word: אֲשֶׁר אִוָּעֵד לָכֶם שָׁמָּה
  chosen: where I will meet with you
  alternatives:
  - where I will appoint to meet you
  - where I will present myself to you
  lexicon: HALOT
  rationale: The Niphal of יעד here carries the sense of meeting by appointment. In
    this context, 'meet with you' is the clearest idiomatic English rendering. The
    adverb שָׁמָּה ('there') is absorbed into 'where' to avoid redundancy in English.
- source_word: לְדַבֵּר אֵלֶיךָ שָׁם
  chosen: to speak to you there
  alternatives:
  - to speak with you there
  lexicon: HALOT
  rationale: 'The infinitive expresses purpose: God''s meeting there is for speaking.
    אֵלֶיךָ is singular (''to you''), referring specifically to Moses, so singular
    ''you'' should be retained. ''To speak to you there'' preserves both syntax and
    referent.'
