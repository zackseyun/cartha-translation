theological_decisions:
- issue: Rendering the cultic duration phrase לְחֻקַּת עוֹלָם
  chosen_reading: as a permanent statute
  alternative_readings:
  - as a perpetual statute
  - as an everlasting ordinance
  rationale: The phrase marks the enduring validity of the priestly institution in
    Israel's covenantal order. 'Permanent' preserves the force of ongoing obligation
    in context while avoiding importing later theological conclusions about absolute
    timelessness beyond the immediate legal setting.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering the priestly installation idiom וּמִלֵּאתָ יַד
  chosen_reading: ordain Aaron and his sons
  alternative_readings:
  - fill the hand of Aaron and his sons
  - install Aaron and his sons
  rationale: The Hebrew idiom is technical and cultic. 'Ordain' best conveys the act
    in clear English, but the literal idiom is preserved in a footnote to maintain
    auditability and theological transparency.
  doctrine_reference: Translation philosophy §3, §5
