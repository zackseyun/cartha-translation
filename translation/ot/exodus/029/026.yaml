- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Technical cultic term הַמִּלֻּאִים in priestly installation ritual
  chosen_reading: ordination
  alternative_readings:
  - consecration
  rationale: The context is the installation of Aaron into priestly office. 'Ordination' best preserves the office-setting dimension without importing later ecclesial structures; 'consecration' remains a valid alternative and is preserved in a footnote.
