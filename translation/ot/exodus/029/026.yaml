id: EXO.29.26
reference: Exodus 29:26
source:
  edition: WLC
  text: וְ/לָקַחְתָּ֣ אֶת הֶֽ/חָזֶ֗ה מֵ/אֵ֤יל הַ/מִּלֻּאִים֙ אֲשֶׁ֣ר לְ/אַהֲרֹ֔ן וְ/הֵנַפְתָּ֥ אֹת֛/וֹ תְּנוּפָ֖ה לִ/פְנֵ֣י יְהוָ֑ה וְ/הָיָ֥ה לְ/ךָ֖ לְ/מָנָֽה־׃
translation:
  text: Then you shall take the breast from the ram of ordination that is for Aaron, and you shall wave it as a wave offering before Yahweh; and it shall be your portion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the ram of consecration.' The Hebrew technical term refers to the ram used in the priestly installation rite.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶחָזֶה
  chosen: the breast
  alternatives:
  - the chest
  lexicon: HALOT
  rationale: In sacrificial context חָזֶה refers to the animal's breast portion specifically assigned in priestly legislation. 'Breast' is the standard precise anatomical and ritual term in English.
- source_word: אַיִל
  chosen: ram
  alternatives:
  - male sheep
  lexicon: HALOT
  rationale: אַיִל denotes a ram; 'ram' is the natural and specific English equivalent in sacrificial contexts.
- source_word: הַמִּלֻּאִים
  chosen: of ordination
  alternatives:
  - of consecration
  - of filling
  lexicon: HALOT
  rationale: The phrase אֵיל הַמִּלֻּאִים is the technical term for the ordination/consecration ram in this ritual. 'Ordination' communicates the installation of Aaron into priestly office more clearly than the more literal but opaque 'fillings.' 'Consecration' is possible, but 'ordination' better fits the office-installation context.
- source_word: אֲשֶׁר לְאַהֲרֹן
  chosen: that is for Aaron
  alternatives:
  - which belongs to Aaron
  - that is Aaron's
  lexicon: HALOT
  rationale: The construction identifies the specific ram associated with Aaron. 'That is for Aaron' is clear modern English and preserves the relational force without overinterpreting ownership.
- source_word: וְהֵנַפְתָּ אֹתוֹ תְּנוּפָה
  chosen: you shall wave it as a wave offering
  alternatives:
  - you shall present it with a waving motion
  - you shall wave it as a presentation offering
  lexicon: HALOT
  rationale: The Hiphil of נוּף with the cognate noun תְּנוּפָה is a fixed ritual expression. Rendering both with 'wave' preserves the formal ritual terminology while remaining understandable.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי is regularly rendered 'before' in cultic settings. Per doctrine, יְהוָה is rendered 'the LORD' rather than a transliteration.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְהָיָה לְךָ לְמָנָה
  chosen: and it shall be your portion
  alternatives:
  - and it shall be your share
  - and it shall belong to you as an allotted portion
  lexicon: HALOT
  rationale: מָנָה denotes an allotted share or portion. 'Your portion' is idiomatic, concise, and fits the priestly allocation context.
- source_word: וְלָקַחְתָּ ... וְהֵנַפְתָּ ... וְהָיָה
  chosen: Then you shall take ... and you shall wave ... and it shall be
  alternatives:
  - You are to take ... wave ... and it will be
  lexicon: HALOT
  rationale: The sequence of perfects with prefixed conjunction in legal/instructional discourse carries directive force. English 'shall' appropriately conveys the prescriptive ritual instruction.
