id: EXO.29.7
reference: Exodus 29:7
source:
  edition: WLC
  text: וְ/לָֽקַחְתָּ֙ אֶת שֶׁ֣מֶן הַ/מִּשְׁחָ֔ה וְ/יָצַקְתָּ֖ עַל רֹאשׁ֑/וֹ וּ/מָשַׁחְתָּ֖
    אֹתֽ/וֹ־־׃
translation:
  text: Then you shall take the anointing oil and pour it on his head and anoint him.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְלָקַחְתָּ
  chosen: Then you shall take
  alternatives:
  - And you shall take
  - You shall take
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in procedural instruction; in English
    ritual sequence, 'Then' naturally conveys the consecutive force, while 'shall
    take' preserves the directive tone.
- source_word: שֶׁמֶן הַמִּשְׁחָה
  chosen: the anointing oil
  alternatives:
  - the oil of anointing
  lexicon: HALOT
  rationale: Construct phrase literally means 'oil of the anointing.' 'The anointing
    oil' is idiomatic modern English and preserves the specific consecratory function.
- source_word: וְיָצַקְתָּ
  chosen: and pour
  alternatives:
  - and you shall pour
  - and cast
  lexicon: HALOT
  rationale: The verb יצק commonly means 'pour.' Present-form English after 'shall
    take' yields smooth coordinated instruction without losing the sequence.
- source_word: עַל רֹאשׁוֹ
  chosen: on his head
  alternatives:
  - upon his head
  lexicon: HALOT
  rationale: Straightforward prepositional phrase; 'on' is natural modern English,
    while 'upon' would be more formal without adding meaning.
- source_word: וּמָשַׁחְתָּ אֹתוֹ
  chosen: and anoint him
  alternatives:
  - and you shall anoint him
  lexicon: HALOT
  rationale: משׁח is the standard verb 'anoint.' Retaining 'anoint' preserves the
    ritual and theological significance of consecration; no paraphrase such as 'set
    him apart' is used because the source explicitly names the act.
