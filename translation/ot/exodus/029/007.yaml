theological_decisions:
- issue: Ritual sequence of pouring and anointing
  chosen_reading: 'Render both actions distinctly: ''pour it on his head and anoint
    him.'''
  alternative_readings:
  - Compress into a single idea such as 'anoint him by pouring it on his head'
  rationale: The Hebrew presents two coordinated verbs, indicating both the physical
    act of pouring and the consecratory act of anointing. Preserving both avoids flattening
    the ritual action into mere explanation.
  doctrine_reference: Translation philosophy §1, §3, §5
