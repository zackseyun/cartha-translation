id: EXO.29.41
reference: Exodus 29:41
source:
  edition: WLC
  text: וְ/אֵת֙ הַ/כֶּ֣בֶשׂ הַ/שֵּׁנִ֔י תַּעֲשֶׂ֖ה בֵּ֣ין הָ/עַרְבָּ֑יִם כְּ/מִנְחַ֨ת הַ/בֹּ֤קֶר וּ/כְ/נִסְכָּ/הּ֙ תַּֽעֲשֶׂה לָּ֔/הּ לְ/רֵ֣יחַ נִיחֹ֔חַ אִשֶּׁ֖ה לַ/יהוָֽה־׃
translation:
  text: And you shall offer the second lamb at twilight; you shall offer for it its grain offering and its drink offering, as in the morning, as a pleasing aroma, a food offering to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''between the evenings,'' an idiom for the late afternoon or twilight period.'
    reason: lexical_alternative
  - marker: b
    text: Or 'an offering by fire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֶּבֶשׂ הַשֵּׁנִי
  chosen: the second lamb
  alternatives:
  - the other lamb
  - the second young ram
  lexicon: HALOT
  rationale: כֶּבֶשׂ commonly denotes a lamb/young sheep suitable for sacrifice. 'Second lamb' matches the sequence established by the first daily offering in the preceding verse.
- source_word: תַּעֲשֶׂה
  chosen: you shall offer
  alternatives:
  - you shall make
  - you shall prepare
  lexicon: HALOT
  rationale: עשה literally means 'do/make,' but in sacrificial context idiomatic English is 'offer.' This preserves the cultic sense without wooden phrasing.
- source_word: בֵּין הָעַרְבָּיִם
  chosen: at twilight
  alternatives:
  - between the evenings
  - at dusk
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'between the evenings' and refers to the late-afternoon/twilight period. 'At twilight' is clear modern English; the more literal alternative is preserved in a footnote.
- source_word: כְּמִנְחַת הַבֹּקֶר
  chosen: with its grain offering, as in the morning
  alternatives:
  - like the morning grain offering
  - according to the morning tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in sacrificial law refers to the grain offering accompanying the animal sacrifice. Rendering it explicitly as 'grain offering' avoids the overly broad 'offering' and fits Levitical usage.
- source_word: וּכְנִסְכָּהּ
  chosen: and its drink offering
  alternatives:
  - and its libation
  - and according to its drink offering
  lexicon: HALOT
  rationale: נֶסֶךְ denotes a poured drink offering/libation. 'Drink offering' is standard, clear English; 'libation' is a viable but less common alternative.
- source_word: לָּהּ
  chosen: it
  alternatives:
  - for it
  - for that lamb
  lexicon: HALOT
  rationale: 'The feminine pronominal suffix agrees with מִנְחָה/implicit offering construction in Hebrew syntax, but idiomatic English expresses the sense by referring to the lamb''s accompanying offerings: ''offer it with its grain offering and its drink offering.'''
- source_word: לְרֵיחַ נִיחֹחַ
  chosen: as a pleasing aroma
  alternatives:
  - for a soothing aroma
  - for a sweet-smelling aroma
  lexicon: HALOT
  rationale: This fixed sacrificial formula conveys acceptability before God. 'Pleasing aroma' is natural English and preserves the metaphor without archaic wording.
- source_word: אִשֶּׁה
  chosen: a food offering
  alternatives:
  - an offering by fire
  - a fire offering
  lexicon: HALOT
  rationale: אִשֶּׁה traditionally means an offering made by fire. 'Food offering' reflects the sacrificial category in accessible English, while the more literal 'offering by fire' is preserved in a footnote because the Hebrew term is cultically significant.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD,' following established reverential convention and the translation's stated policy.
