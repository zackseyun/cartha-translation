id: EXO.29.5
reference: Exodus 29:5
source:
  edition: WLC
  text: וְ/לָקַחְתָּ֣ אֶת הַ/בְּגָדִ֗ים וְ/הִלְבַּשְׁתָּ֤ אֶֽת אַהֲרֹן֙ אֶת הַ/כֻּתֹּ֔נֶת
    וְ/אֵת֙ מְעִ֣יל הָ/אֵפֹ֔ד וְ/אֶת הָ/אֵפֹ֖ד וְ/אֶת הַ/חֹ֑שֶׁן וְ/אָפַדְתָּ֣ ל֔/וֹ
    בְּ/חֵ֖שֶׁב הָ/אֵפֹֽד־־־־־׃
translation:
  text: Then you shall take the garments and clothe Aaron with the tunic, the robe
    of the ephod, the ephod, and the breastpiece, and you shall skillfully fasten
    it on him with the woven band of the ephod.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and gird him with it by the woven band of the ephod.' The Hebrew verb
      is rare and may emphasize fastening or girding the ephod onto Aaron.
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has 'breastplate'; the Hebrew more broadly denotes
      a chest piece, so 'breastpiece' is used here.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַחְתָּ
  chosen: Then you shall take
  alternatives:
  - And you shall take
  - You shall take
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional sequence; English
    'Then' captures the procedural force of waw in context without over-literal repetition
    of 'and.'
- source_word: הַבְּגָדִים
  chosen: the garments
  alternatives:
  - the clothes
  - the vestments
  lexicon: HALOT
  rationale: בְּגָדִים is the general term for clothing/garments. 'Garments' is natural
    and suitably formal for priestly attire; 'vestments' would import later ecclesiastical
    terminology not explicit in the Hebrew.
- source_word: וְהִלְבַּשְׁתָּ אֶת־אַהֲרֹן
  chosen: and clothe Aaron
  alternatives:
  - and dress Aaron
  - and put on Aaron
  lexicon: HALOT
  rationale: Hiphil of לבש means to cause someone to be clothed. 'Clothe Aaron' is
    idiomatic and preserves the causative sense better than 'dress' while avoiding
    awkward literalism.
- source_word: הַכֻּתֹּנֶת
  chosen: the tunic
  alternatives:
  - the coat
  - the long shirt
  lexicon: HALOT
  rationale: כֻּתֹּנֶת denotes a basic close-fitting garment worn next to the body.
    'Tunic' is the standard transparent rendering in priestly contexts.
- source_word: מְעִיל הָאֵפֹד
  chosen: the robe of the ephod
  alternatives:
  - the ephod robe
  - the robe worn under the ephod
  lexicon: HALOT
  rationale: Construct phrase naming the robe associated with the ephod. 'Robe of
    the ephod' stays close to the Hebrew and matches the technical cultic terminology
    of the passage.
- source_word: הָאֵפֹד
  chosen: the ephod
  lexicon: HALOT
  rationale: אֵפֹד is a technical term for a specific priestly garment/device with
    no precise English equivalent. Transliteration is preferable to a misleading paraphrase.
- source_word: הַחֹשֶׁן
  chosen: the breastpiece
  alternatives:
  - the breastplate
  - the pouch
  lexicon: HALOT
  rationale: חֹשֶׁן refers to the ornamental chest piece attached to the ephod. 'Breastpiece'
    is more precise and less armor-like than traditional 'breastplate.'
- source_word: וְאָפַדְתָּ לוֹ
  chosen: and you shall skillfully fasten it on him
  alternatives:
  - and gird him with it
  - and bind it on him
  - and wrap it on him
  lexicon: HALOT
  rationale: The verb אפד is rare and related to fitting or girding with the ephod.
    Because the direct object is implicit and the following phrase names the securing
    element, 'skillfully fasten it on him' communicates the act of fitting/attaching
    the ephod without wooden obscurity.
- source_word: בְּחֵשֶׁב הָאֵפֹד
  chosen: with the woven band of the ephod
  alternatives:
  - with the skillfully woven waistband of the ephod
  - with the decorated band of the ephod
  - with the artistic band of the ephod
  lexicon: HALOT
  rationale: חֵשֶׁב in this context denotes the woven/embroidered band or waistband
    associated with the ephod, not abstract 'skill' alone. 'Woven band' is concise,
    concrete, and contextually accurate.
- source_word: implicit object in וְאָפַדְתָּ
  chosen: it
  alternatives:
  - the ephod
  lexicon: Hebrew syntax
  rationale: English requires an explicit object for smoothness. The nearest suitable
    antecedent is 'the ephod,' so 'it' avoids clumsy repetition while preserving the
    sense.
