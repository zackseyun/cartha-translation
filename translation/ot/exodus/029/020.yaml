id: EXO.29.20
reference: Exodus 29:20
source:
  edition: WLC
  text: וְ/שָׁחַטְתָּ֣ אֶת הָ/אַ֗יִל וְ/לָקַחְתָּ֤ מִ/דָּמ/וֹ֙ וְ/נָֽתַתָּ֡ה עַל תְּנוּךְ֩
    אֹ֨זֶן אַהֲרֹ֜ן וְ/עַל תְּנ֨וּךְ אֹ֤זֶן בָּנָי/ו֙ הַ/יְמָנִ֔ית וְ/עַל בֹּ֤הֶן
    יָדָ/ם֙ הַ/יְמָנִ֔ית וְ/עַל בֹּ֥הֶן רַגְלָ֖/ם הַ/יְמָנִ֑ית וְ/זָרַקְתָּ֧ אֶת הַ/דָּ֛ם
    עַל הַ/מִּזְבֵּ֖חַ סָבִֽיב־־־־־־־׃
translation:
  text: Then you shall slaughter the ram, and take some of its blood and put it on
    the lobe of Aaron’s right ear, and on the lobe of the right ear of his sons, and
    on the thumb of their right hand, and on the big toe of their right foot; and
    you shall throw the blood against the altar all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tip of Aaron’s right ear ... tip of the right ear of his sons.' The
      Hebrew term may denote the ear’s extremity more generally, though 'lobe' is
      the most likely sense in this ritual context.
    reason: lexical_alternative
  - marker: b
    text: Or 'dash the blood against the altar all around.' The Hebrew verb suggests
      a forceful ritual application rather than a gentle sprinkling.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁחַט
  chosen: slaughter
  alternatives:
  - kill
  - slay
  lexicon: HALOT
  rationale: In sacrificial context, 'slaughter' is more precise than the generic
    'kill' and more natural in modern English than 'slay.'
- source_word: אַיִל
  chosen: ram
  alternatives:
  - male sheep
  lexicon: HALOT
  rationale: Standard and precise rendering for the sacrificial animal specified here.
- source_word: מִדָּמוֹ
  chosen: some of its blood
  alternatives:
  - from its blood
  lexicon: HALOT
  rationale: The preposition מִן with 'blood' here indicates taking a portion of the
    blood for application; 'some of its blood' expresses the idiomatic sense in clear
    English.
- source_word: תְּנוּךְ אֹזֶן
  chosen: lobe of ... ear
  alternatives:
  - tip of ... ear
  - cartilage of ... ear
  lexicon: HALOT
  rationale: תְּנוּךְ denotes the extremity or lobe of the ear in priestly ritual
    contexts. 'Lobe' is the most idiomatic and specific English rendering here.
- source_word: הַיְמָנִית
  chosen: right
  alternatives:
  - right side
  lexicon: HALOT
  rationale: The adjective specifies the right-side member (ear/hand/foot). English
    naturally renders this attributively as 'right ear,' 'right hand,' and 'right
    foot.'
- source_word: בֹּהֶן יָד
  chosen: thumb
  alternatives:
  - big thumb
  lexicon: HALOT
  rationale: בֹּהֶן for the hand refers specifically to the thumb; this is the standard
    anatomical equivalent.
- source_word: בֹּהֶן רֶגֶל
  chosen: big toe
  alternatives:
  - great toe
  lexicon: HALOT
  rationale: For the foot, בֹּהֶן denotes the large toe; 'big toe' is clear modern
    English.
- source_word: זָרַק
  chosen: throw ... against
  alternatives:
  - sprinkle
  - dash
  - toss
  lexicon: HALOT
  rationale: In sacrificial procedure זָרַק commonly refers to throwing or dashing
    blood against the altar, not the lighter English sense of 'sprinkle.' 'Throw ...
    against' preserves the force while remaining readable.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  - on every side
  lexicon: HALOT
  rationale: This adverb indicates the blood is applied around the altar's sides.
    'All around' is natural and preserves the distributive sense.
- source_word: וְ
  chosen: Then / and
  alternatives:
  - and
  lexicon: Hebrew grammar
  rationale: The repeated waw-consecutives advance the ritual sequence. Rendering
    the first as 'Then' and the rest mostly as 'and' gives natural English while preserving
    procedural flow.
