id: EXO.29.29
reference: Exodus 29:29
source:
  edition: WLC
  text: וּ/בִגְדֵ֤י הַ/קֹּ֨דֶשׁ֙ אֲשֶׁ֣ר לְ/אַהֲרֹ֔ן יִהְי֥וּ לְ/בָנָ֖י/ו אַחֲרָ֑י/ו
    לְ/מָשְׁחָ֣ה בָ/הֶ֔ם וּ/לְ/מַלֵּא בָ֖/ם אֶת יָדָֽ/ם־־׃
translation:
  text: And the holy garments that are Aaron’s shall belong to his sons after him,
    for anointing in them and for filling their hand in them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'filling their hand,' a priestly idiom meaning 'ordaining them' or
      'installing them' into office.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִגְדֵי הַקֹּדֶשׁ
  chosen: the holy garments
  alternatives:
  - the sacred garments
  - the garments of holiness
  lexicon: HALOT
  rationale: בגד means 'garment/clothing'; with הקֹדשׁ the phrase denotes garments
    set apart for priestly sacred use. 'Holy garments' is natural English and preserves
    the consecrated sense without over-paraphrase.
- source_word: אֲשֶׁר לְאַהֲרֹן
  chosen: that are Aaron’s
  alternatives:
  - which belong to Aaron
  - that are for Aaron
  lexicon: HALOT
  rationale: The ל marks possession/belonging here. 'That are Aaron’s' is concise,
    idiomatic, and accurately expresses ownership/assignment.
- source_word: יִהְיוּ לְבָנָיו אַחֲרָיו
  chosen: shall belong to his sons after him
  alternatives:
  - shall be for his sons after him
  - shall be for his sons who come after him
  lexicon: HALOT
  rationale: 'The clause indicates succession: the garments pass to Aaron''s sons
    in the priestly line after him. ''Shall belong to'' makes the transfer/inheritance
    sense clear while retaining the formal structure.'
- source_word: לְמָשְׁחָה בָהֶם
  chosen: for anointing in them
  alternatives:
  - to anoint in them
  - for being anointed in them
  - for anointing with them
  lexicon: HALOT
  rationale: The infinitive/noun phrase with בָהֶם most naturally means the sons are
    anointed while wearing these garments, not that the garments are the instrument
    of anointing. 'In them' preserves the local/situational force of ב.
- source_word: וּלְמַלֵּא בָם אֶת יָדָם
  chosen: and for filling their hand in them
  alternatives:
  - and for ordaining them in them
  - and for consecrating them in them
  lexicon: HALOT
  rationale: The idiom מלא יד 'fill the hand' is the formal Hebrew expression used
    for priestly installation/ordination. To keep the text auditable and preserve
    the ritual idiom, the main text retains 'filling their hand,' while more interpretive
    alternatives are preserved in a footnote.
