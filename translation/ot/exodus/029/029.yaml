theological_decisions:
- issue: Rendering the priestly ordination idiom מלא יד
  chosen_reading: retain the idiom 'filling their hand' in the main text
  alternative_readings:
  - ordaining them
  - consecrating them
  rationale: The phrase is a technical cultic idiom for priestly installation. Rendering
    it idiomatically in English as 'ordain' is possible, but preserving the Hebrew
    imagery in the main text better serves transparency and avoids importing later
    ecclesiastical associations. The functional sense is preserved in a footnote.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than over-resolve; consistency of key terms or documented
    exception.'
