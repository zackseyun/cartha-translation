id: EXO.29.24
reference: Exodus 29:24
source:
  edition: WLC
  text: וְ/שַׂמְתָּ֣ הַ/כֹּ֔ל עַ֚ל כַּפֵּ֣י אַהֲרֹ֔ן וְ/עַ֖ל כַּפֵּ֣י בָנָ֑י/ו וְ/הֵנַפְתָּ֥
    אֹתָ֛/ם תְּנוּפָ֖ה לִ/פְנֵ֥י יְהוָֽה׃
translation:
  text: You shall put all of it on the palms of Aaron and on the palms of his sons,
    and you shall wave them as a wave offering before the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'on the palms of Aaron and on the palms of his sons'; some translations
      broaden this to 'hands,' but the Hebrew term is more specifically 'palms.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתָּ
  chosen: You shall put
  alternatives:
  - and you shall place
  - then put
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional sequence functions
    as an imperative/future command. 'Put' is natural modern English and sufficiently
    formal.
- source_word: הַכֹּל
  chosen: all of it
  alternatives:
  - the whole
  - all
  lexicon: HALOT
  rationale: Refers back to the collected portions from the prior context. 'All of
    it' makes the resumptive sense clear in English.
- source_word: עַל כַּפֵּי
  chosen: on the palms of
  alternatives:
  - upon the hands of
  - on the hands of
  lexicon: HALOT
  rationale: כַּף literally denotes the palm/hand. Because the ritual action involves
    placing portions into the hands for presentation, 'palms' preserves the concrete
    image better than the broader 'hands'.
- source_word: אַהֲרֹן
  chosen: Aaron
  rationale: Standard English transliteration of the personal name.
- source_word: בָנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: בנים here specifically refers to Aaron's male priestly descendants participating
    in ordination, so 'sons' is both literal and contextually precise.
- source_word: וְהֵנַפְתָּ
  chosen: and you shall wave
  alternatives:
  - and you shall present by waving
  - and you shall elevate
  lexicon: HALOT
  rationale: Hiphil of נוף in sacrificial contexts denotes the ritual act of waving/presenting.
    'Wave' is the established and most transparent cultic rendering in English.
- source_word: אֹתָם
  chosen: them
  alternatives:
  - it
  lexicon: HALOT
  rationale: Masculine plural object pronoun refers to the items being waved. English
    plural 'them' matches the Hebrew grammar and the multiple portions in view.
- source_word: תְּנוּפָה
  chosen: as a wave offering
  alternatives:
  - for a wave offering
  - a presentation offering
  lexicon: HALOT
  rationale: The noun names the type/result of the ritual action. 'Wave offering'
    is the conventional and accurate cultic term; adding 'as a' yields idiomatic English
    with the preceding verb.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Standard rendering of the prepositional phrase in sacrificial contexts.
    Per doctrine, יְהוָה is rendered 'the LORD' rather than a transliteration.
