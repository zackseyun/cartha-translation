theological_decisions:
- issue: Ritual specificity of altar terminology
  chosen_reading: Retain the concrete cultic terms 'horns' and 'base' rather than
    smoothing them into generalized sacrificial language.
  alternative_readings:
  - on the corners of the altar
  - at the foot of the altar
  rationale: The verse describes a precise ordination rite. Preserving the physical
    features of the altar maintains the ritual and theological texture of the sacrificial
    system without importing later doctrinal interpretation.
  doctrine_reference: Translation philosophy §§1, 5, 6
