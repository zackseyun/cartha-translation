id: EXO.29.12
reference: Exodus 29:12
source:
  edition: WLC
  text: וְ/לָֽקַחְתָּ֙ מִ/דַּ֣ם הַ/פָּ֔ר וְ/נָתַתָּ֛ה עַל קַרְנֹ֥ת הַ/מִּזְבֵּ֖חַ
    בְּ/אֶצְבָּעֶ֑/ךָ וְ/אֶת כָּל הַ/דָּ֣ם תִּשְׁפֹּ֔ךְ אֶל יְס֖וֹד הַ/מִּזְבֵּֽחַ־־־־׃
translation:
  text: And you shall take some of the bull's blood and put it on the horns of the
    altar with your finger, and you shall pour out all the blood at the base of the
    altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the blood of the bull.' The Hebrew expression is literally 'from
      the blood of the bull,' here meaning that a portion of the blood is taken for
      application to the altar.
    reason: lexical_alternative
  - marker: b
    text: The 'horns' were the horn-like projections at the altar's corners.
    reason: cultural_note
  - marker: c
    text: Or 'to the base of the altar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַחְתָּ
  chosen: And you shall take
  alternatives:
  - Then you shall take
  - And take
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional sequence functions
    as an imperative/future-like command. 'And you shall take' preserves the procedural
    force and the chaining of ritual actions.
- source_word: מִדַּם הַפָּר
  chosen: some of the bull's blood
  alternatives:
  - from the blood of the bull
  - part of the bull's blood
  lexicon: HALOT
  rationale: 'The preposition מִן with ''blood'' is naturally partitive here: a portion
    of the blood is taken for application to the altar''s horns. ''Bull''s blood''
    is idiomatic English while preserving the genitive relation.'
- source_word: וְנָתַתָּה
  chosen: and put
  alternatives:
  - and place
  - and apply
  lexicon: HALOT
  rationale: נתן is broadly 'give/put.' In this ritual context 'put' is the most natural
    modern English equivalent; 'apply' is interpretive and more technical than the
    Hebrew requires.
- source_word: עַל קַרְנֹת הַמִּזְבֵּחַ
  chosen: on the horns of the altar
  alternatives:
  - upon the horns of the altar
  lexicon: HALOT
  rationale: קַרְנוֹת literally means 'horns,' referring to the altar's horn-like
    projections. The concrete cultic image should be preserved rather than generalized.
- source_word: בְּאֶצְבָּעֶךָ
  chosen: with your finger
  alternatives:
  - by your finger
  - using your finger
  lexicon: HALOT
  rationale: The beth preposition here is instrumental. 'With your finger' is clear,
    natural, and preserves the specified ritual means.
- source_word: וְאֶת כָּל הַדָּם תִּשְׁפֹּךְ
  chosen: and you shall pour out all the blood
  alternatives:
  - and all the blood you shall pour out
  - and you shall spill all the blood
  lexicon: HALOT
  rationale: שׁפך means 'pour out' in sacrificial contexts. 'Pour out' is the standard
    and fitting ritual expression; 'spill' sounds accidental in English.
- source_word: אֶל יְסוֹד הַמִּזְבֵּחַ
  chosen: at the base of the altar
  alternatives:
  - to the base of the altar
  - at the foundation of the altar
  lexicon: HALOT
  rationale: יְסוֹד literally denotes foundation/base. In altar terminology, 'base'
    is the clearest idiomatic rendering. 'At' fits the action of pouring blood beside/against
    the altar's base in English usage.
