id: EXO.29.6
reference: Exodus 29:6
source:
  edition: WLC
  text: וְ/שַׂמְתָּ֥ הַ/מִּצְנֶ֖פֶת עַל רֹאשׁ֑/וֹ וְ/נָתַתָּ֛ אֶת נֵ֥זֶר הַ/קֹּ֖דֶשׁ
    עַל הַ/מִּצְנָֽפֶת־־־׃
translation:
  text: And you shall place the turban on his head, and put the holy diadem on the
    turban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the holy crown.' The Hebrew nezer can denote a consecrated crown-like
      emblem; 'diadem' was chosen to reflect a sacred ornamental piece worn on the
      priestly headgear.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתָּ
  chosen: And you shall place
  alternatives:
  - and you shall set
  - and you shall put
  lexicon: HALOT
  rationale: שׂים is a common verb meaning 'put, set, place.' 'Place' fits the ceremonial
    action with slightly more formality than 'put' while remaining natural English.
    The prefixed conjunction is carried as 'And,' and the imperfect/consecutive in
    instruction context is rendered with English 'shall' for procedural sequence.
- source_word: הַמִּצְנֶפֶת
  chosen: the turban
  alternatives:
  - the headdress
  - the mitre
  lexicon: HALOT
  rationale: מִצְנֶפֶת denotes the priestly headwrap/turban. 'Turban' is the clearest
    modern English equivalent; 'mitre' is traditional but ecclesiastical and potentially
    misleading for modern readers.
- source_word: עַל רֹאשׁוֹ
  chosen: on his head
  alternatives:
  - upon his head
  lexicon: HALOT
  rationale: A straightforward spatial phrase. 'On his head' is idiomatic modern English
    and preserves the concrete placement.
- source_word: וְנָתַתָּ
  chosen: and put
  alternatives:
  - and you shall put
  - and place
  - and set
  lexicon: HALOT
  rationale: נתן commonly means 'give, put, set.' Here the object is a physical item
    being positioned, so 'put' is the most natural concise rendering. Variation from
    'place' avoids awkward repetition while preserving meaning; the variance is stylistic,
    not semantic.
- source_word: אֵת
  chosen: '[not separately translated]'
  lexicon: Hebrew grammar
  rationale: Direct-object marker has no direct English equivalent and is therefore
    not represented in the translation.
- source_word: נֵזֶר הַקֹּדֶשׁ
  chosen: the holy diadem
  alternatives:
  - the holy crown
  - the sacred diadem
  - the consecrated crown
  lexicon: HALOT
  rationale: נֵזֶר refers to a consecrated crown-like emblem or diadem. 'Diadem' best
    captures an ornamental sacred headpiece distinct from a full royal crown. הַקֹּדֶשׁ
    is rendered attributively as 'holy' rather than a more abstract 'of holiness'
    for natural English.
- source_word: עַל הַמִּצְנָפֶת
  chosen: on the turban
  alternatives:
  - upon the turban
  lexicon: HALOT
  rationale: The repeated preposition עַל is retained as 'on,' indicating the diadem
    is attached to or positioned on the turban itself.
