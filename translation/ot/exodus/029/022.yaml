id: EXO.29.22
reference: Exodus 29:22
source:
  edition: WLC
  text: וְ/לָקַחְתָּ֣ מִן הָ֠/אַיִל הַ/חֵ֨לֶב וְ/הָֽ/אַלְיָ֜ה וְ/אֶת הַ/חֵ֣לֶב הַֽ/מְכַסֶּ֣ה
    אֶת הַ/קֶּ֗רֶב וְ/אֵ֨ת יֹתֶ֤רֶת הַ/כָּבֵד֙ וְ/אֵ֣ת שְׁתֵּ֣י הַ/כְּלָיֹ֗ת וְ/אֶת
    הַ/חֵ֨לֶב֙ אֲשֶׁ֣ר עֲלֵ/הֶ֔ן וְ/אֵ֖ת שׁ֣וֹק הַ/יָּמִ֑ין כִּ֛י אֵ֥יל מִלֻּאִ֖ים
    הֽוּא־־׀־׀־׃
translation:
  text: And you shall take from the ram the fat, and the fat tail, and the fat that
    covers the entrails, and the lobe of the liver, and the two kidneys, and the fat
    that is on them, and the right thigh, for it is a ram of ordination.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a ram of consecration' or 'a ram of installation.' The Hebrew phrase
      refers to the ram used in the rite that installs the priests into office.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵלֶב
  chosen: fat
  alternatives:
  - fatty parts
  lexicon: HALOT
  rationale: In sacrificial contexts this refers to the animal fat portions specifically
    designated for offering. 'Fat' is the standard, direct rendering and remains clear
    in English.
- source_word: אַלְיָה
  chosen: fat tail
  alternatives:
  - tail
  lexicon: HALOT
  rationale: This term refers specifically to the fatty tail of a sheep/ram, not merely
    the tail in general. 'Fat tail' preserves the anatomical specificity relevant
    to sacrificial procedure.
- source_word: הַמְכַסֶּה אֶת־הַקֶּרֶב
  chosen: that covers the entrails
  alternatives:
  - that covers the inward parts
  - that covers the inner organs
  lexicon: HALOT
  rationale: The participle plus object describes the fat covering the internal organs.
    'Entrails' is natural modern English and suitably concrete for the ritual context.
- source_word: יֹתֶרֶת הַכָּבֵד
  chosen: the lobe of the liver
  alternatives:
  - the appendage of the liver
  lexicon: HALOT
  rationale: The precise anatomy is debated, but 'lobe of the liver' is the conventional
    and most intelligible rendering for the sacrificial portion intended.
- source_word: כְּלָיֹת
  chosen: kidneys
  lexicon: HALOT
  rationale: The noun straightforwardly denotes the kidneys; no contextual reason
    suggests a figurative rendering here.
- source_word: שׁוֹק הַיָּמִין
  chosen: the right thigh
  alternatives:
  - the right leg
  lexicon: HALOT
  rationale: In sacrificial distribution language, שׁוֹק denotes the leg/thigh portion.
    'Thigh' is more precise for the butchered portion than the broader 'leg.'
- source_word: אֵיל מִלֻּאִים
  chosen: a ram of ordination
  alternatives:
  - a ram of consecration
  - a ram of installation
  lexicon: HALOT
  rationale: The phrase refers to the ram used in the priestly ordination rite. 'Ordination'
    is concise and idiomatic in English while preserving the ritual sense of consecratory
    installation.
- source_word: וְלָקַחְתָּ
  chosen: And you shall take
  alternatives:
  - Then you shall take
  lexicon: HALOT
  rationale: The waw plus perfect in instruction sequence is naturally rendered as
    a directive future/modal in English. 'And you shall take' preserves the procedural
    flow.
