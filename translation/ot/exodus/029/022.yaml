theological_decisions:
- issue: Rendering of priestly installation terminology in אֵיל מִלֻּאִים
  chosen_reading: a ram of ordination
  alternative_readings:
  - a ram of consecration
  - a ram of installation
  rationale: The verse concerns the ritual by which Aaron and his sons are installed
    into priestly service. 'Ordination' communicates this clearly in modern English
    without importing later ecclesiastical structures beyond the text's basic sense.
    Alternatives are viable and preserved in a footnote because the Hebrew idiom literally
    relates to 'fillings' and can be expressed in several ritual terms.
  doctrine_reference: Translation philosophy §1, §5
