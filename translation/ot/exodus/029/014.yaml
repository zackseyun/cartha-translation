id: EXO.29.14
reference: Exodus 29:14
source:
  edition: WLC
  text: וְ/אֶת בְּשַׂ֤ר הַ/פָּר֙ וְ/אֶת עֹר֣/וֹ וְ/אֶת פִּרְשׁ֔/וֹ תִּשְׂרֹ֣ף בָּ/אֵ֔שׁ
    מִ/ח֖וּץ לַֽ/מַּחֲנֶ֑ה חַטָּ֖את הֽוּא־־־׃
translation:
  text: But the flesh of the bull, and its hide, and its dung, you shall burn with
    fire outside the camp; it is a sin offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'purification offering.' The Hebrew חַטָּאת can denote either 'sin' or
      the sacrifice offered in relation to sin; in sacrificial contexts like this,
      many translate 'sin offering,' while some prefer 'purification offering' to
      highlight the rite's cleansing function.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשַׂר
  chosen: flesh
  alternatives:
  - meat
  lexicon: HALOT
  rationale: Rendered 'flesh' as the more direct and ritually precise term in sacrificial
    context, preserving the concrete bodily sense rather than the more culinary 'meat'.
- source_word: הַפָּר
  chosen: the bull
  alternatives:
  - the young bull
  - the bullock
  lexicon: HALOT
  rationale: פַּר commonly denotes a bull in sacrificial legislation. 'Bull' is clear
    modern English; 'young bull' is possible in some contexts but not required here.
- source_word: עֹרוֹ
  chosen: its hide
  alternatives:
  - its skin
  lexicon: HALOT
  rationale: For animal carcass context, 'hide' is more idiomatic and specific than
    'skin' in English.
- source_word: פִּרְשׁוֹ
  chosen: its dung
  alternatives:
  - its offal
  - its refuse
  lexicon: HALOT
  rationale: פֶּרֶשׁ refers to excrement/dung. 'Dung' is the plain lexical sense and
    should not be softened to 'offal,' which would suggest entrails rather than waste.
- source_word: תִּשְׂרֹף
  chosen: you shall burn
  alternatives:
  - you must burn
  lexicon: HALOT
  rationale: Second masculine singular imperfect in legal/instructional context is
    well represented by English 'you shall' for directive force.
- source_word: בָּאֵשׁ
  chosen: with fire
  alternatives:
  - in the fire
  lexicon: HALOT
  rationale: 'The preposition beth here is naturally instrumental: the carcass is
    to be burned by means of fire. ''With fire'' is also the established idiom in
    sacrificial instructions.'
- source_word: מִחוּץ לַמַּחֲנֶה
  chosen: outside the camp
  alternatives:
  - outside the encampment
  lexicon: HALOT
  rationale: Standard idiomatic rendering for the location beyond Israel's camp boundaries
    in wilderness legislation.
- source_word: חַטָּאת
  chosen: sin offering
  alternatives:
  - sin
  - purification offering
  lexicon: HALOT
  rationale: In sacrificial context חַטָּאת denotes the offering associated with sin,
    not merely the abstract concept 'sin.' 'Purification offering' is argued by some
    scholars because of the rite's cleansing function, but 'sin offering' remains
    the most recognizable and contextually appropriate main-text rendering.
- source_word: הוּא
  chosen: it is
  alternatives:
  - this is
  lexicon: HALOT
  rationale: 'The pronoun identifies the animal/rite: ''it is a sin offering.'' This
    is the natural English equivalent.'
- source_word: וְאֶת ... וְאֶת ... וְאֶת
  chosen: and ... and ... and
  alternatives:
  - along with ... and ...
  lexicon: HALOT
  rationale: Preserved the repeated coordination to reflect the Hebrew listing of
    the parts to be burned.
