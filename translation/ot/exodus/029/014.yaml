theological_decisions:
- issue: Rendering of חַטָּאת in sacrificial legislation
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  - sin
  rationale: The immediate cultic context makes the sacrificial sense primary. While
    some modern scholarship prefers 'purification offering' to emphasize ritual cleansing,
    the Hebrew term can denote both sin and the associated offering. 'Sin offering'
    best balances recognizability, tradition, and contextual accuracy here, while
    preserving the alternative in a footnote.
  doctrine_reference: DOCTRINE.md § Translation philosophy (preserve theological tension
    rather than resolve it); consistency of key terms, or documented exception
