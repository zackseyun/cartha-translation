theological_decisions:
- issue: Cultic nuance of קרב in priestly ordination context
  chosen_reading: bring Aaron and his sons near
  alternative_readings:
  - present Aaron and his sons
  rationale: The verse initiates priestly consecration. 'Bring near' preserves the
    ritual approach-to-sanctuary nuance without overinterpreting the act. 'Present'
    is possible but slightly more interpretive in English.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source-text
    nuance without paraphrase.'
