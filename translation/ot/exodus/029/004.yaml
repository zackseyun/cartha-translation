id: EXO.29.4
reference: Exodus 29:4
source:
  edition: WLC
  text: וְ/אֶת אַהֲרֹ֤ן וְ/אֶת בָּנָי/ו֙ תַּקְרִ֔יב אֶל פֶּ֖תַח אֹ֣הֶל מוֹעֵ֑ד וְ/רָחַצְתָּ֥
    אֹתָ֖/ם בַּ/מָּֽיִם־־־׃
translation:
  text: You shall bring Aaron and his sons near to the entrance of the tent of meeting,
    and you shall wash them with water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'present Aaron and his sons.' The Hebrew verb can carry a formal cultic
      sense of presenting someone for ritual action.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּקְרִיב
  chosen: bring ... near
  alternatives:
  - present
  - bring
  lexicon: HALOT
  rationale: Hiphil of קרב commonly means to bring near or present. 'Bring near' preserves
    the consecratory/cultic nuance better than the flatter 'bring,' while remaining
    natural English.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: The preposition marks motion toward a destination. 'To' is the most natural
    English rendering here.
- source_word: פֶּתַח
  chosen: entrance
  alternatives:
  - doorway
  - door
  lexicon: HALOT
  rationale: פֶּתַח denotes an opening or entrance. 'Entrance' fits the tabernacle
    setting well and avoids implying a hinged door specifically.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  - the tent of appointment
  lexicon: HALOT
  rationale: This is the standard and contextually accurate rendering for the tabernacle
    designation. It preserves the cultic sense of the place appointed for meeting.
- source_word: וְרָחַצְתָּ
  chosen: you shall wash
  alternatives:
  - then you shall wash
  - you must wash
  lexicon: HALOT
  rationale: The verb רחץ means to wash/bathe. With the prefixed conjunction in procedural
    instruction, simple future-style English ('you shall wash') appropriately conveys
    the command sequence.
- source_word: בַּמָּיִם
  chosen: with water
  alternatives:
  - in water
  lexicon: HALOT
  rationale: English idiom prefers 'wash someone with water' in this context, though
    the Hebrew preposition could be rendered more literally as 'in.' 'With water'
    communicates the means clearly.
- source_word: אַהֲרֹן
  chosen: Aaron
  rationale: Personal name transliterated according to standard English convention,
    per translation philosophy.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew specifically denotes male offspring. 'His sons' is gender-accurate
    and contextually important because the priestly ordination concerns Aaron's male
    descendants.
