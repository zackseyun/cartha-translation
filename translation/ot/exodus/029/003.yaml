id: EXO.29.3
reference: Exodus 29:3
source:
  edition: WLC
  text: וְ/נָתַתָּ֤ אוֹתָ/ם֙ עַל סַ֣ל אֶחָ֔ד וְ/הִקְרַבְתָּ֥ אֹתָ֖/ם בַּ/סָּ֑ל וְ/אֶ֨ת
    הַ/פָּ֔ר וְ/אֵ֖ת שְׁנֵ֥י הָ/אֵילִֽם־־׃
translation:
  text: You shall put them into one basket, and you shall bring them near in the basket,
    along with the bull and the two rams.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in one basket.' The Hebrew preposition is literally 'on/upon,' but in
      this container context the sense is that the items are placed in a single basket.
    reason: lexical_alternative
  - marker: b
    text: Or 'present them' or 'offer them.' The Hebrew verb is the standard sacrificial
      term 'bring near.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתָּ
  chosen: you shall put
  alternatives:
  - you shall place
  - and you shall put
  lexicon: HALOT
  rationale: נתן commonly means 'give/put/place.' In this procedural sacrificial context,
    'put' is natural modern English. The prefixed conjunction is not separately represented
    with 'and' at the start because English style can begin the instruction directly
    without loss.
- source_word: אוֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Refers back to the bread items listed in the previous verse; the masculine
    plural object pronoun is best rendered simply as 'them.'
- source_word: עַל סַל אֶחָד
  chosen: into one basket
  alternatives:
  - in one basket
  - on one basket
  lexicon: HALOT
  rationale: Although על often means 'on/upon,' with נתן in contexts of placing items
    into a container, idiomatic English favors 'into' or 'in.' 'One basket' preserves
    אֶחָד straightforwardly.
- source_word: וְהִקְרַבְתָּ
  chosen: you shall bring them near
  alternatives:
  - you shall present
  - you shall offer
  lexicon: HALOT
  rationale: הקריב in cultic contexts can mean 'bring near/present/offer.' Here the
    direct objects include both the basketed bread and the animals, so 'bring near'
    preserves the underlying sacrificial language without prematurely specifying the
    technical act as 'offer'.
- source_word: בַּסָּל
  chosen: in the basket
  alternatives:
  - with the basket
  lexicon: HALOT
  rationale: The preposition ב is most naturally 'in' here, indicating the bread items
    are brought near while contained in the basket. This avoids flattening the image
    into mere accompaniment.
- source_word: וְאֶת הַפָּר וְאֵת שְׁנֵי הָאֵילִם
  chosen: along with the bull and the two rams
  alternatives:
  - and the bull and the two rams
  lexicon: HALOT
  rationale: The repeated object markers signal additional direct objects coordinated
    with the basketed items. 'Along with' makes the English relation clear and smooth
    while preserving that the bull and two rams are also to be brought near.
- source_word: הַפָּר
  chosen: the bull
  alternatives:
  - the young bull
  lexicon: HALOT
  rationale: פַּר denotes a bull; 'the bull' is the plain sense and matches the definite
    article in context.
- source_word: שְׁנֵי הָאֵילִם
  chosen: the two rams
  lexicon: HALOT
  rationale: Construct numeral plus definite noun is naturally rendered 'the two rams.'
