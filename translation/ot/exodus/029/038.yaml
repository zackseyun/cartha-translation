id: EXO.29.38
reference: Exodus 29:38
source:
  edition: WLC
  text: וְ/זֶ֕ה אֲשֶׁ֥ר תַּעֲשֶׂ֖ה עַל הַ/מִּזְבֵּ֑חַ כְּבָשִׂ֧ים בְּנֵֽי שָׁנָ֛ה
    שְׁנַ֥יִם לַ/יּ֖וֹם תָּמִֽיד־־׃
translation:
  text: 'Now this is what you shall offer on the altar: two one-year-old lambs each
    day, continually.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you shall do on the altar.' The Hebrew verb is broadly 'do/make,' but
      here it refers to performing the sacrificial offering.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of a year,' that is, one-year-old lambs.
    reason: lexical_alternative
  - marker: c
    text: Or 'daily, continually.' The phrase indicates an ongoing regular daily offering.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/זֶה
  chosen: Now this
  alternatives:
  - And this
  - This
  lexicon: HALOT
  rationale: Introduces the next instruction with a natural English discourse marker.
    'Now this' preserves the forward-pointing force of the Hebrew while reading smoothly.
- source_word: אֲשֶׁר
  chosen: what
  alternatives:
  - that which
  - which
  lexicon: HALOT
  rationale: Combined idiomatically with the following verb to form 'what you shall
    offer/do,' which is standard English for this relative construction.
- source_word: תַּעֲשֶׂה
  chosen: you shall offer
  alternatives:
  - you shall do
  - you shall make
  lexicon: HALOT
  rationale: Although עשה is broadly 'do/make,' in sacrificial context with 'on the
    altar' and the following animal specification, English 'offer' best conveys the
    cultic action without over-literal awkwardness.
- source_word: עַל הַמִּזְבֵּחַ
  chosen: on the altar
  alternatives:
  - upon the altar
  lexicon: HALOT
  rationale: Standard and natural rendering of the prepositional phrase in sacrificial
    context.
- source_word: כְּבָשִׂים
  chosen: lambs
  alternatives:
  - young rams
  - male lambs
  lexicon: HALOT
  rationale: The term commonly denotes lambs; the age phrase 'sons of a year' clarifies
    youth. 'Male lambs' is possible, but the Hebrew here does not separately foreground
    sex in the English line, and 'lambs' is the conventional concise rendering.
- source_word: בְּנֵי שָׁנָה
  chosen: one-year-old
  alternatives:
  - a year old
  - sons of a year
  lexicon: HALOT
  rationale: Idiomatic English equivalent of the Hebrew age expression, preserving
    the sacrificial specification.
- source_word: שְׁנַיִם
  chosen: two
  lexicon: HALOT
  rationale: Direct rendering of the numeral.
- source_word: לַיּוֹם
  chosen: each day
  alternatives:
  - per day
  - by day
  - daily
  lexicon: HALOT
  rationale: Expresses distributive daily frequency naturally in English.
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - regularly
  - continually as a regular offering
  lexicon: HALOT
  rationale: תמיד in cultic contexts denotes regular continual observance. 'Continually'
    preserves the ongoing, repeated nature of the daily offering.
