theological_decisions:
- issue: Rendering of cultic holiness language
  chosen_reading: consecrate
  alternative_readings:
  - sanctify
  - make holy
  rationale: The verse concerns ritual setting apart of sacred space and priestly
    persons. 'Consecrate' best communicates cultic dedication without importing later
    theological nuances beyond the Hebrew text.
  doctrine_reference: Translation philosophy §6; §5 consistency of key terms
- issue: Gendered priestly reference
  chosen_reading: his sons
  alternative_readings:
  - his children
  rationale: The Hebrew is specifically masculine and contextually refers to the male
    priestly line. Per doctrine, gender-accurate rendering is preferred over gender-neutral
    language.
  doctrine_reference: Translation philosophy §4 gender-accurate over gender-neutral
