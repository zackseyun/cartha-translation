id: EXO.29.44
reference: Exodus 29:44
source:
  edition: WLC
  text: וְ/קִדַּשְׁתִּ֛י אֶת אֹ֥הֶל מוֹעֵ֖ד וְ/אֶת הַ/מִּזְבֵּ֑חַ וְ/אֶת אַהֲרֹ֧ן
    וְ/אֶת בָּנָ֛י/ו אֲקַדֵּ֖שׁ לְ/כַהֵ֥ן לִֽ/י־־־־׃
translation:
  text: And I will consecrate the tent of meeting and the altar; I will also consecrate
    Aaron and his sons to serve me as priests.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sanctify' / 'make holy' for 'consecrate' in both occurrences of the
      verb.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'to priest for me' or 'to minister as priests to me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקִדַּשְׁתִּי
  chosen: And I will consecrate
  alternatives:
  - And I will sanctify
  - And I will make holy
  lexicon: HALOT
  rationale: קדשׁ in the piel commonly means to set apart as holy or consecrate. 'Consecrate'
    is clear modern English and fits cultic context better than the more archaic 'sanctify,'
    while preserving the formal sense of setting apart for sacred use.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  - the tent of appointment
  lexicon: HALOT
  rationale: This is the standard rendering for the tabernacle-related phrase, expressing
    the place of appointed meeting. 'Tent of meeting' is both idiomatic and transparent.
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Straightforward cultic term for the sacrificial altar.
- source_word: אַהֲרֹן
  chosen: Aaron
  rationale: Personal name transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'sons,' referring to Aaron's male descendants
    serving in the priesthood. This should remain gender-accurate rather than be generalized
    to 'children.'
- source_word: אֲקַדֵּשׁ
  chosen: I will also consecrate
  alternatives:
  - I will consecrate
  - I will sanctify
  lexicon: HALOT
  rationale: The repeated verb mirrors the first clause and should be rendered consistently.
    'Also' is supplied in English to reflect the progression from sanctifying the
    sanctuary objects to sanctifying Aaron and his sons.
- source_word: לְכַהֵן לִי
  chosen: to serve me as priests
  alternatives:
  - to minister as priests to me
  - to be priests for me
  lexicon: HALOT
  rationale: The infinitive of כהן denotes priestly service. 'To serve me as priests'
    is natural modern English and preserves both the priestly role and the dative
    'to/for me,' indicating service rendered to God.
