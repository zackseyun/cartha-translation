id: EXO.29.39
reference: Exodus 29:39
source:
  edition: WLC
  text: אֶת הַ/כֶּ֥בֶשׂ הָ/אֶחָ֖ד תַּעֲשֶׂ֣ה בַ/בֹּ֑קֶר וְ/אֵת֙ הַ/כֶּ֣בֶשׂ הַ/שֵּׁנִ֔י
    תַּעֲשֶׂ֖ה בֵּ֥ין הָ/עַרְבָּֽיִם־׃
translation:
  text: You shall offer the one lamb in the morning, and the second lamb you shall
    offer between the evenings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'between the evenings,' a traditional expression often understood
      as 'at twilight' or the period between late afternoon and sunset.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֶּבֶשׂ
  chosen: lamb
  alternatives:
  - young ram
  - sheep
  lexicon: HALOT
  rationale: In sacrificial contexts כֶּבֶשׂ commonly denotes a lamb/young sheep suitable
    for offering. 'Lamb' is the most natural and specific English rendering here.
- source_word: הָאֶחָד
  chosen: the one
  alternatives:
  - the first
  lexicon: HALOT
  rationale: The Hebrew literally says 'the one.' English can preserve this naturally
    here, while the pairing with 'the second' still clearly marks sequence.
- source_word: תַּעֲשֶׂה
  chosen: you shall offer
  alternatives:
  - you shall make
  - you shall prepare
  lexicon: HALOT
  rationale: Although עשה literally means 'do/make,' in sacrificial instructions it
    idiomatically means to perform or offer the sacrifice. 'Offer' best conveys the
    cultic action in clear English without wooden literalism.
- source_word: בַבֹּקֶר
  chosen: in the morning
  alternatives:
  - in the morning time
  - at morning
  lexicon: HALOT
  rationale: Standard temporal rendering of the prepositional phrase; idiomatic and
    precise.
- source_word: הַשֵּׁנִי
  chosen: the second
  alternatives:
  - the other
  - the second one
  lexicon: HALOT
  rationale: Direct and natural rendering of the ordinal adjective, preserving the
    sequence of the two daily offerings.
- source_word: בֵּין הָעַרְבָּיִם
  chosen: between the evenings
  alternatives:
  - at twilight
  - between sunset and dark
  - toward evening
  lexicon: HALOT
  rationale: The Hebrew expression is literally 'between the evenings.' Because the
    phrase is culturally and interpretively debated, the main text preserves the formal
    wording, while a footnote gives a more idiomatic alternative.
