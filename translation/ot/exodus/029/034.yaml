id: EXO.29.34
reference: Exodus 29:34
source:
  edition: WLC
  text: וְֽ/אִם יִוָּתֵ֞ר מִ/בְּשַׂ֧ר הַ/מִּלֻּאִ֛ים וּ/מִן הַ/לֶּ֖חֶם עַד הַ/בֹּ֑קֶר
    וְ/שָׂרַפְתָּ֤ אֶת הַ/נּוֹתָר֙ בָּ/אֵ֔שׁ לֹ֥א יֵאָכֵ֖ל כִּי קֹ֥דֶשׁ הֽוּא־־־־־׃
translation:
  text: And if any of the flesh of the ordination offering or any of the bread is
    left until the morning, then you shall burn what is left with fire. It shall not
    be eaten, because it is holy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the consecration offering.' The Hebrew term refers to the priestly installation
      rite.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִוָּתֵר
  chosen: is left
  alternatives:
  - remains
  - is left over
  lexicon: HALOT
  rationale: Niphal of יתר denotes something remaining or being left over. 'Is left'
    is natural modern English and matches the passive sense.
- source_word: בְּשַׂר
  chosen: flesh
  alternatives:
  - meat
  lexicon: HALOT
  rationale: The Hebrew literally means 'flesh.' 'Flesh' preserves the concrete sacrificial
    terminology better than the more generic 'meat,' while remaining understandable.
- source_word: הַמִּלֻּאִים
  chosen: the ordination offering
  alternatives:
  - the consecration offering
  - the filling/installation offering
  lexicon: HALOT
  rationale: In priestly context, מִלֻּאִים refers to ordination/consecration rites.
    'Ordination offering' is concise and idiomatic in English while preserving the
    ritual sense. 'Offering' is supplied from context because the phrase refers to
    sacrificial flesh from the ordination rite.
- source_word: לֶּחֶם
  chosen: bread
  lexicon: HALOT
  rationale: Straightforward lexical rendering.
- source_word: עַד הַבֹּקֶר
  chosen: until the morning
  alternatives:
  - by morning
  lexicon: HALOT
  rationale: This preserves the temporal boundary expressed by עַד.
- source_word: וְשָׂרַפְתָּ
  chosen: then you shall burn
  alternatives:
  - and you shall burn
  lexicon: HALOT
  rationale: The waw + qatal continues the conditional-apodosis sequence. 'Then you
    shall burn' makes the result relation clear in English without over-paraphrasing.
- source_word: הַנּוֹתָר
  chosen: what is left
  alternatives:
  - the remainder
  - what remains
  lexicon: HALOT
  rationale: Substantivized participle from the same root as יִוָּתֵר. 'What is left'
    is clear, natural, and reflects the referent comprehensively.
- source_word: בָּאֵשׁ
  chosen: with fire
  alternatives:
  - in the fire
  lexicon: HALOT
  rationale: Either is possible idiomatically, but 'burn with fire' is a standard
    English collocation and reflects the instrumental sense well.
- source_word: לֹא יֵאָכֵל
  chosen: It shall not be eaten
  alternatives:
  - it must not be eaten
  lexicon: HALOT
  rationale: The passive imperfect expresses prohibition regarding the leftover material.
    'It shall not be eaten' preserves the formal legal tone.
- source_word: קֹדֶשׁ
  chosen: holy
  alternatives:
  - sacred
  lexicon: HALOT
  rationale: '''Holy'' is the standard biblical rendering and preserves the cultic/theological
    force better than the more generic ''sacred''.'
