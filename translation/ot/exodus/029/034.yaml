theological_decisions:
- issue: Rendering of cultic term הַמִּלֻּאִים in priestly context
  chosen_reading: the ordination offering
  alternative_readings:
  - the consecration offering
  rationale: The term refers to the priestly installation/ordination rite in Exodus
    29. 'Ordination' is slightly more specific in this context, while 'consecration'
    remains a viable alternative. No doctrinal dispute is at stake, but the cultic
    nuance is significant and therefore documented.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
