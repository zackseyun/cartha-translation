id: EXO.29.40
reference: Exodus 29:40
source:
  edition: WLC
  text: וְ/עִשָּׂרֹ֨ן סֹ֜לֶת בָּל֨וּל בְּ/שֶׁ֤מֶן כָּתִית֙ רֶ֣בַע הַ/הִ֔ין וְ/נֵ֕סֶךְ
    רְבִעִ֥ית הַ/הִ֖ין יָ֑יִן לַ/כֶּ֖בֶשׂ הָ/אֶחָֽד׃
translation:
  text: and a tenth of fine flour mixed with a quarter of a hin of beaten oil, and
    a drink offering of a quarter of a hin of wine, for the one lamb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'one-tenth of an ephah of fine flour.' The Hebrew uses
      'a tenth' as a standard offering measure.
    reason: lexical_alternative
  - marker: b
    text: '''Beaten oil'' refers to oil produced from crushed or beaten olives; some
      translations render it ''pressed oil.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'for one lamb'; in context this likely refers to the first of the two
      daily lambs mentioned in the surrounding verses.
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/עִשָּׂרֹן
  chosen: a tenth
  alternatives:
  - a tenth part
  - one-tenth of an ephah
  lexicon: HALOT
  rationale: עִשָּׂרוֹן denotes a tenth measure, conventionally a tenth of an ephah
    in sacrificial contexts. The Hebrew here states the fraction rather than repeating
    the larger unit, so 'a tenth' is the most direct rendering; the fuller interpretive
    expansion is possible but not required in the main text.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  - fine wheat flour
  lexicon: HALOT
  rationale: סֹלֶת regularly refers to finely milled flour used in offerings. 'Fine
    flour' is the standard, clear English equivalent.
- source_word: בָּל֨וּל
  chosen: mixed
  alternatives:
  - mingled
  - mixed together
  lexicon: HALOT
  rationale: The passive participle indicates the flour is mixed with oil. 'Mixed'
    is natural modern English and preserves the sacrificial preparation sense.
- source_word: בְּ/שֶׁ֤מֶן
  chosen: with ... oil
  alternatives:
  - in oil
  lexicon: HALOT
  rationale: The preposition ב with בלול idiomatically expresses the substance with
    which the flour is mixed. English 'mixed with oil' is the clearest equivalent.
- source_word: כָּתִית
  chosen: beaten
  alternatives:
  - pressed
  - crushed
  lexicon: HALOT
  rationale: כָּתִית describes oil produced by beating/crushing olives. 'Beaten oil'
    is a fairly literal and established rendering that preserves the specific production
    method better than the more generic 'pressed oil'.
- source_word: רֶ֣בַע הַ/הִ֔ין
  chosen: a quarter of a hin
  alternatives:
  - a fourth of a hin
  lexicon: HALOT
  rationale: The phrase gives a liquid measure. 'A quarter of a hin' is idiomatic
    English and accurately preserves the ancient unit without converting it.
- source_word: וְ/נֵ֕סֶךְ
  chosen: and a drink offering
  alternatives:
  - and a libation
  lexicon: HALOT
  rationale: נֶסֶךְ is the technical term for a poured wine offering accompanying
    sacrifices. 'Drink offering' is the clearest accessible rendering; 'libation'
    is accurate but less transparent for modern readers.
- source_word: רְבִעִ֥ית הַ/הִ֖ין
  chosen: a quarter of a hin
  alternatives:
  - a fourth of a hin
  lexicon: HALOT
  rationale: This feminine form likewise denotes one-fourth of a hin. Rendering it
    the same as the previous measure preserves consistency.
- source_word: יָ֑יִן
  chosen: wine
  lexicon: HALOT
  rationale: The ordinary Hebrew word for wine; no contextual reason suggests a different
    gloss.
- source_word: לַ/כֶּ֖בֶשׂ הָ/אֶחָֽד
  chosen: for the one lamb
  alternatives:
  - for one lamb
  - for the first lamb
  lexicon: HALOT
  rationale: The article plus numeral most naturally points back to the first of the
    two daily lambs mentioned in context. 'The one lamb' preserves the Hebrew form
    closely while still reading naturally enough in English. 'The first lamb' is interpretive
    from context and therefore left as an alternative rather than adopted in the main
    text.
