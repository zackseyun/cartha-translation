id: EXO.29.15
reference: Exodus 29:15
source:
  edition: WLC
  text: וְ/אֶת הָ/אַ֥יִל הָ/אֶחָ֖ד תִּקָּ֑ח וְ/סָ֨מְכ֜וּ אַהֲרֹ֧ן וּ/בָנָ֛י/ו אֶת
    יְדֵי/הֶ֖ם עַל רֹ֥אשׁ הָ/אָֽיִל־־־׃
translation:
  text: Then you shall take the one ram, and Aaron and his sons shall lay their hands
    on the head of the ram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the one ram,'' distinguishing this ram from the other ram in
      the consecration ritual; some translations render this as ''the first ram.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶת
  chosen: Then
  alternatives:
  - And
  - Now
  lexicon: HALOT
  rationale: The conjunction plus object marker introduces the next procedural step
    in a sequence. 'Then' conveys the instructional progression in natural English
    while preserving the connective force better than omitting it.
- source_word: הָ/אַיִל
  chosen: the ram
  alternatives:
  - the male sheep
  lexicon: HALOT
  rationale: אַיִל refers to a ram. 'Ram' is the standard precise English equivalent
    in sacrificial contexts.
- source_word: הָ/אֶחָד
  chosen: the one
  alternatives:
  - one
  - first
  lexicon: HALOT
  rationale: The Hebrew literally says 'the one ram,' distinguishing this animal from
    the other ram in the ritual sequence. 'The one' preserves that specificity without
    prematurely interpreting it as an ordinal.
- source_word: תִּקָּח
  chosen: you shall take
  alternatives:
  - you are to take
  - take
  lexicon: HALOT
  rationale: Second masculine singular imperfect in instructional context is well
    rendered as 'you shall take,' matching the direct address to Moses and the prescriptive
    tone.
- source_word: וְ/סָמְכוּ
  chosen: shall lay
  alternatives:
  - shall lean
  - shall place
  - shall press
  lexicon: HALOT
  rationale: The verb סמך in sacrificial contexts means to lay or lean the hands upon
    the offering. 'Lay' is idiomatic in English and standard for this ritual action.
- source_word: אַהֲרֹן וּ/בָנָיו
  chosen: Aaron and his sons
  alternatives:
  - Aaron and his children
  lexicon: HALOT
  rationale: בנים here refers specifically to Aaron's male offspring serving in priestly
    consecration. 'Sons' is gender-accurate and contextually precise.
- source_word: אֶת יְדֵיהֶם
  chosen: their hands
  alternatives:
  - their hand
  lexicon: HALOT
  rationale: The Hebrew uses the plural 'their hands'; English naturally preserves
    the plural for the ritual gesture.
- source_word: עַל רֹאשׁ
  chosen: on the head of
  alternatives:
  - upon the head of
  lexicon: HALOT
  rationale: This prepositional phrase is straightforwardly locative. 'On the head
    of' is clear modern English.
- source_word: הָ/אָיִל
  chosen: the ram
  alternatives:
  - the male sheep
  lexicon: HALOT
  rationale: Repeated noun retained as 'the ram' for clarity and consistency within
    the verse.
