theological_decisions:
- issue: Ritual hand-placement terminology in sacrificial consecration
  chosen_reading: shall lay their hands on the head of the ram
  alternative_readings:
  - shall lean their hands on the head of the ram
  - shall place their hands on the head of the ram
  rationale: The Hebrew verb can denote leaning/supporting, but in sacrificial legislation
    the established sense is the ritual act of laying hands on the animal. This preserves
    the cultic action without importing a more developed theological explanation not
    stated in the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
