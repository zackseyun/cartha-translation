id: EXO.29.27
reference: Exodus 29:27
source:
  edition: WLC
  text: וְ/קִדַּשְׁתָּ֞ אֵ֣ת חֲזֵ֣ה הַ/תְּנוּפָ֗ה וְ/אֵת֙ שׁ֣וֹק הַ/תְּרוּמָ֔ה אֲשֶׁ֥ר
    הוּנַ֖ף וַ/אֲשֶׁ֣ר הוּרָ֑ם מֵ/אֵיל֙ הַ/מִּלֻּאִ֔ים מֵ/אֲשֶׁ֥ר לְ/אַהֲרֹ֖ן וּ/מֵ/אֲשֶׁ֥ר
    לְ/בָנָֽי/ו׀׃
translation:
  text: And you shall consecrate the breast of the wave offering and the thigh of
    the contribution offering, which was waved and which was raised, from the ram
    of ordination, from what belonged to Aaron and from what belonged to his sons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the thigh of the raised offering'; traditionally 'the heave offering.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the ram of fillings,' an idiom for the ram used in ordination/consecration.
    reason: cultural_note
lexical_decisions:
- source_word: קִדַּשְׁתָּ
  chosen: you shall consecrate
  alternatives:
  - you shall sanctify
  - you shall make holy
  lexicon: HALOT
  rationale: Piel of קדשׁ means to set apart as holy. 'Consecrate' is natural modern
    English in sacrificial context and preserves cultic force better than the more
    abstract 'sanctify'.
- source_word: חֲזֵה
  chosen: breast
  alternatives:
  - chest
  lexicon: HALOT
  rationale: Standard anatomical/cultic term for the animal's breast portion in sacrificial
    legislation.
- source_word: תְּנוּפָה
  chosen: wave offering
  alternatives:
  - presentation offering
  lexicon: HALOT
  rationale: Traditional but still intelligible rendering for the offering portion
    ritually waved before YHWH. It preserves the concrete ritual action reflected
    by the related verb נוף in this verse.
- source_word: שׁוֹק
  chosen: thigh
  alternatives:
  - leg
  lexicon: HALOT
  rationale: Refers to the upper hind leg portion assigned in sacrificial distribution.
    'Thigh' is more precise than the broader 'leg'.
- source_word: תְּרוּמָה
  chosen: contribution offering
  alternatives:
  - heave offering
  - raised offering
  - contribution
  lexicon: HALOT
  rationale: The noun denotes something lifted up/set apart as a contribution. 'Heave
    offering' is traditional but archaic; 'contribution offering' communicates both
    dedication and offering status in readable English.
- source_word: הוּנַף
  chosen: was waved
  alternatives:
  - was presented by waving
  lexicon: HALOT
  rationale: Hophal of נוף, matching תְּנוּפָה and preserving the ritual gesture explicitly.
- source_word: הוּרָם
  chosen: was raised
  alternatives:
  - was lifted up
  lexicon: HALOT
  rationale: Hophal of רום, corresponding to תְּרוּמָה as the portion lifted up. 'Raised'
    is concise and keeps the verbal link.
- source_word: אֵיל הַמִּלֻּאִים
  chosen: the ram of ordination
  alternatives:
  - the ram of consecration
  - the ram of installation
  lexicon: HALOT
  rationale: This fixed phrase refers to the ram used in the priestly ordination rite.
    'Ordination' is the clearest idiomatic rendering in English for this priestly
    installation context.
- source_word: מֵאֲשֶׁר לְאַהֲרֹן וּמֵאֲשֶׁר לְבָנָיו
  chosen: from what belonged to Aaron and from what belonged to his sons
  alternatives:
  - from Aaron's share and from his sons' share
  - from that which was for Aaron and that which was for his sons
  lexicon: HALOT
  rationale: The prepositional relative construction distinguishes the portions associated
    with Aaron and with his sons. 'Belonged to' is idiomatic and preserves the distributive
    sense without overinterpreting.
