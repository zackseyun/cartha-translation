theological_decisions:
- issue: Rendering of sacrificial technical terms in cultic legislation
  chosen_reading: Retain concrete ritual language ('wave offering,' 'contribution
    offering,' 'was waved,' 'was raised') rather than flattening into generic dedication
    language.
  alternative_readings:
  - Use more interpretive renderings such as 'presentation offering' or 'special portion'
  rationale: The verse is procedural priestly legislation, and the Hebrew intentionally
    links nouns and verbs for the ritual actions. Preserving that terminology maintains
    transparency to the source text and avoids importing later theological interpretation.
  doctrine_reference: Translation philosophy §§1, 5, 6
