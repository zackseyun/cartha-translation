theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering אִשֶּׁה in sacrificial terminology
  chosen_reading: food offering
  alternative_readings:
  - offering by fire
  - fire offering
  rationale: The Hebrew sacrificial term is traditionally linked to fire, but in priestly usage it also participates in the broader presentation of offerings as God's 'food.' 'Food offering' communicates the category in accessible English while remaining within the semantic range. Because 'offering by fire' is a familiar alternative, it is preserved in a footnote for auditability.
