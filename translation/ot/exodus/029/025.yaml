id: EXO.29.25
reference: Exodus 29:25
source:
  edition: WLC
  text: וְ/לָקַחְתָּ֤ אֹתָ/ם֙ מִ/יָּדָ֔/ם וְ/הִקְטַרְתָּ֥ הַ/מִּזְבֵּ֖חָ/ה עַל הָ/עֹלָ֑ה לְ/רֵ֤יחַ נִיח֨וֹחַ֙ לִ/פְנֵ֣י יְהוָ֔ה אִשֶּׁ֥ה ה֖וּא לַ/יהוָֽה־׃
translation:
  text: Then you shall take them from their hands and burn them on the altar, on top of the burnt offering, as a pleasing aroma before Yahweh. It is an offering made by fire to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'an offering by fire to the LORD' or 'a fire offering to the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַחְתָּ
  chosen: Then you shall take
  alternatives:
  - and you shall take
  - you shall take
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional sequence functions as an imperative/future command. 'Then' captures the procedural progression naturally in English while preserving the command force.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct-object pronoun referring to the portions previously placed in the priests' hands; simple pronominal rendering is sufficient.
- source_word: מִיָּדָם
  chosen: from their hands
  alternatives:
  - out of their hands
  lexicon: HALOT
  rationale: Literal rendering preserves the ritual action and bodily concreteness of the Hebrew idiom.
- source_word: וְהִקְטַרְתָּ
  chosen: burn
  alternatives:
  - turn into smoke
  - offer up in smoke
  lexicon: HALOT
  rationale: Hiphil of קטר in sacrificial contexts means to make smoke on the altar, i.e., burn as an offering. 'Burn' is clear modern English; the altar context supplies the sacrificial nuance.
- source_word: הַמִּזְבֵּחָה
  chosen: on the altar
  alternatives:
  - to the altar
  lexicon: HALOT
  rationale: The directional ending with the sacrificial verb indicates movement toward/onto the altar; idiomatic English in this context is 'on the altar.'
- source_word: עַל הָעֹלָה
  chosen: on top of the burnt offering
  alternatives:
  - upon the burnt offering
  - over the burnt offering
  lexicon: HALOT
  rationale: עַל here indicates placement upon the already-present burnt offering. 'On top of' makes the ritual layering explicit for modern readers.
- source_word: לְרֵיחַ נִיחוֹחַ
  chosen: as a pleasing aroma
  alternatives:
  - for a soothing aroma
  - for a sweet-smelling aroma
  lexicon: HALOT
  rationale: This fixed sacrificial phrase denotes acceptability/pleasure before God, not merely scent. 'Pleasing aroma' is established, readable English that preserves the metaphor without archaic wording.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - before Yahweh
  lexicon: HALOT
  rationale: לִפְנֵי is spatial-relational, 'before/in the presence of.' Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: אִשֶּׁה
  chosen: food offering
  alternatives:
  - offering by fire
  - fire offering
  lexicon: HALOT
  rationale: Although traditionally rendered 'offering made by fire,' the term in priestly sacrificial contexts can denote a gift offering presented by fire and is often associated with Yahweh's 'food' imagery in Leviticus. 'Food offering' is clearer modern English and avoids implying the fire itself is the essence of the offering.
- source_word: הוּא
  chosen: It is
  alternatives:
  - it
  lexicon: HALOT
  rationale: The pronoun is explicit in Hebrew and naturally rendered with a copular clause in English.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The lamed marks dedication/belonging. 'To the LORD' preserves the offering's direction and consecratory sense.
