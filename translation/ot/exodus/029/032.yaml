id: EXO.29.32
reference: Exodus 29:32
source:
  edition: WLC
  text: וְ/אָכַ֨ל אַהֲרֹ֤ן וּ/בָנָי/ו֙ אֶת בְּשַׂ֣ר הָ/אַ֔יִל וְ/אֶת הַ/לֶּ֖חֶם אֲשֶׁ֣ר
    בַּ/סָּ֑ל פֶּ֖תַח אֹ֥הֶל מוֹעֵֽד־־׃
translation:
  text: Aaron and his sons shall eat the flesh of the ram and the bread that is in
    the basket at the entrance of the tent of meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the meat of the ram.' The Hebrew word is literally 'flesh,' but in sacrificial
      contexts it can refer to edible meat.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אָכַל
  chosen: shall eat
  alternatives:
  - and Aaron shall eat
  - must eat
  - is to eat
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this instructional context functions
    with directive/future force. English 'shall eat' captures the prescriptive sense
    in ritual instructions better than a simple past 'ate'.
- source_word: אַהֲרֹן
  chosen: Aaron
  rationale: Standard transliteration of the personal name.
- source_word: וּ/בָנָי/ו
  chosen: and his sons
  alternatives:
  - and his children
  lexicon: HALOT
  rationale: בנים here refers specifically to Aaron's male priestly descendants participating
    in ordination rites, so 'sons' is more accurate than the broader 'children.' This
    follows the gender-accurate policy.
- source_word: בְּשַׂר
  chosen: the flesh
  alternatives:
  - the meat
  lexicon: HALOT
  rationale: בשר literally means 'flesh.' In sacrificial contexts 'meat' is possible
    in idiomatic English, but 'flesh' preserves the ritual and concrete sense of the
    Hebrew.
- source_word: הָ/אַיִל
  chosen: the ram
  lexicon: HALOT
  rationale: אַיִל denotes a ram, specifically the sacrificial animal in this ordination
    context.
- source_word: הַ/לֶּחֶם
  chosen: the bread
  alternatives:
  - the loaf
  - the food
  lexicon: HALOT
  rationale: לחם ordinarily means 'bread.' Since the previous context mentions unleavened
    bread items in a basket, the singular collective 'the bread' is the most natural
    rendering.
- source_word: אֲשֶׁר בַּ/סָּל
  chosen: that is in the basket
  alternatives:
  - that is from the basket
  - which is in the basket
  lexicon: HALOT
  rationale: The relative clause identifies the bread as the bread located in the
    ritual basket. 'That is in the basket' is straightforward modern English.
- source_word: פֶּתַח
  chosen: at the entrance of
  alternatives:
  - at the doorway of
  - at the opening of
  lexicon: HALOT
  rationale: פתח denotes an entrance/opening. 'At the entrance of' is idiomatic and
    fits the locative sense with the following construct chain.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  - the tent of appointment
  lexicon: HALOT
  rationale: This is the standard rendering of the tabernacle-related phrase, accurately
    reflecting the Hebrew construct and its cultic referent.
