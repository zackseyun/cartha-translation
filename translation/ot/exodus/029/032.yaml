theological_decisions:
- issue: Representative male language in priestly context
  chosen_reading: and his sons
  alternative_readings:
  - and his children
  rationale: The verse concerns Aaron's ordained male priestly descendants, not a
    generic household reference. Retaining 'sons' reflects the source text's specific
    referent and the translation policy's gender-accurate principle.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Ritual instruction verbal force
  chosen_reading: shall eat
  alternative_readings:
  - ate
  - must eat
  - is to eat
  rationale: In legal/ritual instruction, the Hebrew form is best represented in English
    as a directive/future statement rather than a simple narrative past. This preserves
    the prescriptive force without over-interpreting it as an explicit command formula.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
