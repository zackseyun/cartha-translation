theological_decisions:
- issue: Rendering the priestly idiom מלא יד
  chosen_reading: you shall ordain them
  alternative_readings:
  - you shall fill their hand
  - you shall consecrate/install them
  rationale: The Hebrew idiom literally reads 'fill their hand,' but in this cultic
    context it denotes the formal setting apart and installation of Aaron and his
    sons into priestly service. 'Ordain' best captures the office-conferring sense
    without importing later denominational specifics; the literal idiom is preserved
    in a footnote for auditability.
  doctrine_reference: Translation philosophy §1, §5
