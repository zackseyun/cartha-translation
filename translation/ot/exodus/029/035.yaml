id: EXO.29.35
reference: Exodus 29:35
source:
  edition: WLC
  text: וְ/עָשִׂ֜יתָ לְ/אַהֲרֹ֤ן וּ/לְ/בָנָי/ו֙ כָּ֔כָה כְּ/כֹ֥ל אֲשֶׁר צִוִּ֖יתִי
    אֹתָ֑/כָה שִׁבְעַ֥ת יָמִ֖ים תְּמַלֵּ֥א יָדָֽ/ם־׃
translation:
  text: And you shall do thus for Aaron and for his sons, according to all that I
    have commanded you. For seven days you shall ordain them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'you shall fill their hand,' a Hebrew idiom for ordaining or
      installing someone into priestly service.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: And you shall do
  alternatives:
  - And you must do
  - So you shall do
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional context functions
    as a future/imperfective command sequence. 'You shall do' preserves the directive
    force in natural English.
- source_word: לְאַהֲרֹן וּלְבָנָיו
  chosen: for Aaron and for his sons
  alternatives:
  - to Aaron and to his sons
  - for Aaron and his sons
  lexicon: HALOT
  rationale: The repeated ל marks the action as being performed with reference to
    Aaron and his sons. 'For' fits the ritual-instruction context better than 'to'
    in English.
- source_word: כָּכָה
  chosen: thus
  alternatives:
  - in this way
  - so
  lexicon: HALOT
  rationale: Deictic adverb referring back to the prescribed ritual procedure. 'Thus'
    is concise and suitably formal without being archaic in this context.
- source_word: כְּכֹל אֲשֶׁר צִוִּיתִי אֹתָכָה
  chosen: according to all that I have commanded you
  alternatives:
  - just as I commanded you
  - according to everything that I commanded you
  lexicon: HALOT
  rationale: כְּכֹל plus relative clause expresses conformity to the full set of prior
    instructions. 'According to all that I have commanded you' preserves the comprehensiveness
    of the Hebrew.
- source_word: שִׁבְעַת יָמִים
  chosen: For seven days
  alternatives:
  - Seven days
  - During seven days
  lexicon: HALOT
  rationale: Accusative of duration. 'For seven days' is idiomatic English and clearly
    conveys the temporal extent of the ordination process.
- source_word: תְּמַלֵּא יָדָם
  chosen: you shall ordain them
  alternatives:
  - you shall fill their hand
  - you shall install them
  lexicon: HALOT
  rationale: The idiom מלא יד in priestly contexts refers to consecrating/installing
    someone into priestly office. 'Ordain them' communicates the ritual appointment
    clearly in modern English, while the more literal 'fill their hand' would be opaque.
    'Install them' is possible but less standard for priestly consecration.
