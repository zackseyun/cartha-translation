theological_decisions:
- issue: Rendering of אָדָם in a generic-human context
  chosen_reading: man
  alternative_readings:
  - humankind
  - any person
  rationale: The Hebrew uses אָדָם generically rather than a more specific individual
    term. Following the project's gender-accurate principle, 'man' is retained in
    the main text as representative/generic, while an inclusive alternative is preserved
    in a footnote for clarity in modern English.
