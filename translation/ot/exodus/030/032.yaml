id: EXO.30.32
reference: Exodus 30:32
source:
  edition: WLC
  text: עַל בְּשַׂ֤ר אָדָם֙ לֹ֣א יִיסָ֔ךְ וּ/בְ/מַ֨תְכֻּנְתּ֔/וֹ לֹ֥א תַעֲשׂ֖וּ כָּמֹ֑/הוּ
    קֹ֣דֶשׁ ה֔וּא קֹ֖דֶשׁ יִהְיֶ֥ה לָ/כֶֽם־׃
translation:
  text: It shall not be poured on the flesh of man, and in its composition you shall
    not make any like it. It is holy; it shall be holy to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on human flesh.' The Hebrew 'flesh of man' uses אָדָם generically for
      human beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִיסָךְ
  chosen: shall be poured
  alternatives:
  - shall be anointed
  - shall be smeared
  lexicon: HALOT
  rationale: The verb נסך in this context refers to applying the specially compounded
    anointing oil. 'Poured' follows the passive form and the concrete action without
    overinterpreting as a ritual title. 'Anointed' is possible by context, but the
    Hebrew verb here is more literally about pouring/application than the broader
    ritual result.
- source_word: עַל בְּשַׂר אָדָם
  chosen: on the flesh of man
  alternatives:
  - on human flesh
  - on the body of any person
  lexicon: HALOT
  rationale: בָּשָׂר is literally 'flesh,' and אָדָם here has generic human reference.
    Per doctrine, gender-accurate rendering is preferred where the source uses masculine/generic
    forms. 'Man' preserves the Hebrew form and representative sense; 'flesh' is retained
    rather than flattened to 'body.'
- source_word: וּבְמַתְכֻּנְתּוֹ
  chosen: in its composition
  alternatives:
  - according to its recipe
  - with its formula
  lexicon: HALOT
  rationale: מַתְכֹּנֶת denotes measured composition, proportion, or formula. 'Composition'
    is natural modern English and fits the prohibition against reproducing the sacred
    blend. 'Recipe' is possible but slightly colloquial; 'formula' is also viable.
- source_word: לֹא תַעֲשׂוּ כָּמֹהוּ
  chosen: you shall not make any like it
  alternatives:
  - you shall not make the same as it
  - you shall not make its equal
  lexicon: HALOT
  rationale: The phrase prohibits making another substance matching this sacred oil.
    'Any like it' expresses the comparative force of כָּמוֹהוּ idiomatically in English.
- source_word: קֹדֶשׁ הוּא
  chosen: It is holy
  alternatives:
  - It is sacred
  lexicon: HALOT
  rationale: קֹדֶשׁ denotes holiness/sacredness. 'Holy' preserves the key biblical
    term and its theological resonance better than the more secular-sounding 'sacred.'
- source_word: קֹדֶשׁ יִהְיֶה לָכֶם
  chosen: it shall be holy to you
  alternatives:
  - it shall be sacred for you
  - it shall be set apart to you
  lexicon: HALOT
  rationale: The clause marks the oil as set apart in relation to Israel. 'Holy to
    you' is a fairly literal rendering that preserves the covenantal force without
    paraphrase.
