theological_decisions:
- issue: Meaning of זָר in a priestly holiness law
  chosen_reading: unauthorized person
  alternative_readings:
  - stranger
  - outsider
  - layman
  rationale: In this cultic context the concern is not ethnicity but lack of authorization
    to receive the holy anointing oil. This preserves the holiness boundary without
    implying merely foreign identity.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of the penalty וְנִכְרַת מֵעַמָּיו
  chosen_reading: shall be cut off from his people
  alternative_readings:
  - shall be excluded from his people
  - shall be put to death
  rationale: The Hebrew idiom is left intact rather than resolved into a specific
    penalty mechanism, since the text itself does not specify how the cutting off
    occurs. This preserves theological and legal tension rather than over-interpreting.
  doctrine_reference: Translation philosophy §3
