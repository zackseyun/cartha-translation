id: EXO.30.33
reference: Exodus 30:33
source:
  edition: WLC
  text: אִ֚ישׁ אֲשֶׁ֣ר יִרְקַ֣ח כָּמֹ֔/הוּ וַ/אֲשֶׁ֥ר יִתֵּ֛ן מִמֶּ֖/נּוּ עַל זָ֑ר
    וְ/נִכְרַ֖ת מֵ/עַמָּֽי/ו־׃ס
translation:
  text: Whoever compounds any like it, or puts any of it on an unauthorized person,
    shall be cut off from his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on a stranger,' 'on an outsider,' or 'on a layman'; Hebrew zar often
      means one not authorized for sacred use in this context.
    reason: lexical_alternative
  - marker: b
    text: '''Shall be cut off from his people'' is a covenantal legal formula; the
      text does not specify the exact manner of the penalty here.'
    reason: alternative_reading
lexical_decisions:
- source_word: אִישׁ אֲשֶׁר
  chosen: Whoever
  alternatives:
  - Any man who
  - A person who
  lexicon: HALOT
  rationale: The Hebrew literally begins with 'man who,' but here it functions generically
    for any individual. 'Whoever' preserves the legal force in natural English while
    reflecting the representative masculine usage.
- source_word: יִרְקַח
  chosen: compounds
  alternatives:
  - mixes
  - blends
  - makes perfume like
  lexicon: HALOT
  rationale: The verb רקח refers to compounding or mixing a perfumed substance. 'Compounds'
    fits the technical, cultic context better than the more casual 'mixes' or 'blends'.
- source_word: כָּמֹהוּ
  chosen: any like it
  alternatives:
  - like it
  - according to its composition
  - the same as it
  lexicon: HALOT
  rationale: The phrase refers back to the sacred anointing oil described in context
    and prohibits making something of the same kind. 'Any like it' communicates likeness
    in composition without overloading the English.
- source_word: וַאֲשֶׁר יִתֵּן מִמֶּנּוּ
  chosen: or puts any of it
  alternatives:
  - or gives some of it
  - or applies any of it
  lexicon: HALOT
  rationale: נתן with מן + pronominal suffix here means to place/apply some of the
    oil. 'Puts any of it' is idiomatic and broad enough to cover application; 'applies'
    is possible but slightly more interpretive.
- source_word: עַל זָר
  chosen: on an unauthorized person
  alternatives:
  - on a stranger
  - on an outsider
  - on a layman
  lexicon: HALOT
  rationale: זָר in priestly contexts commonly means someone unauthorized or outside
    the permitted sacred role, not necessarily a foreigner ethnically. 'Unauthorized
    person' best conveys the cultic restriction for modern readers.
- source_word: וְנִכְרַת
  chosen: shall be cut off
  alternatives:
  - will be cut off
  - shall be excluded
  lexicon: HALOT
  rationale: This is the standard covenantal/judicial idiom for severe removal from
    the community. 'Shall be cut off' preserves the established biblical expression
    without prematurely specifying the mechanism.
- source_word: מֵעַמָּיו
  chosen: from his people
  alternatives:
  - from his kin
  - from his community
  lexicon: HALOT
  rationale: The phrase denotes removal from one's covenant community. 'From his people'
    is the most direct and biblically resonant rendering.
