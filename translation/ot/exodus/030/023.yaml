id: EXO.30.23
reference: Exodus 30:23
source:
  edition: WLC
  text: וְ/אַתָּ֣ה קַח לְ/ךָ֮ בְּשָׂמִ֣ים רֹאשׁ֒ מָר דְּרוֹר֙ חֲמֵ֣שׁ מֵא֔וֹת וְ/קִנְּמָן
    בֶּ֥שֶׂם מַחֲצִית֖/וֹ חֲמִשִּׁ֣ים וּ/מָאתָ֑יִם וּ/קְנֵה בֹ֖שֶׂם חֲמִשִּׁ֥ים וּ/מָאתָֽיִם־־־־׃
translation:
  text: 'And you, take for yourself the finest spices: five hundred shekels of flowing
    myrrh, and half as much—two hundred fifty—of fragrant cinnamon, and two hundred
    fifty of fragrant cane,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pure myrrh' for 'flowing myrrh.' The Hebrew expression likely refers
      to myrrh that flows freely in its natural state.
    reason: lexical_alternative
  - marker: b
    text: Traditionally 'sweet cinnamon' and 'sweet calamus.' The Hebrew more broadly
      denotes aromatic or fragrant cinnamon and cane.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשָׂמִים רֹאשׁ
  chosen: the finest spices
  alternatives:
  - choice spices
  - chief spices
  - prime spices
  lexicon: HALOT
  rationale: בְּשָׂמִים denotes aromatic substances/spices; רֹאשׁ literally 'head'
    functions idiomatically for what is chief or best. 'The finest spices' gives the
    idiomatic sense in natural English while preserving the qualitative force.
- source_word: מָר דְּרוֹר
  chosen: flowing myrrh
  alternatives:
  - liquid myrrh
  - free-flowing myrrh
  - pure myrrh
  lexicon: HALOT
  rationale: מָר is myrrh; דְּרוֹר conveys freedom/flowing, likely indicating myrrh
    in its natural, free-flowing state rather than processed form. 'Flowing myrrh'
    is a transparent rendering; 'pure myrrh' is traditional but more interpretive.
- source_word: חֲמֵשׁ מֵאוֹת
  chosen: five hundred shekels
  alternatives:
  - five hundred
  lexicon: HALOT
  rationale: The Hebrew gives only the number here, but the unit 'shekel' is supplied
    from the immediate context of the recipe, made explicit in v.24 and traditionally
    understood throughout the list. Supplying 'shekels' in English prevents ambiguity
    about quantity.
- source_word: קִנְּמָן בֶּשֶׂם
  chosen: fragrant cinnamon
  alternatives:
  - sweet cinnamon
  - aromatic cinnamon
  lexicon: HALOT
  rationale: קִנְּמָן is cinnamon; בֶּשֶׂם marks it as aromatic/fragrant. 'Fragrant
    cinnamon' is clear modern English. 'Sweet cinnamon' is traditional but may suggest
    taste rather than aroma.
- source_word: מַחֲצִיתוֹ
  chosen: half as much
  alternatives:
  - half of it
  - its half
  lexicon: HALOT
  rationale: The suffix refers back to the preceding amount of five hundred. 'Half
    as much' communicates the comparative sense idiomatically in English.
- source_word: חֲמִשִּׁים וּמָאתָיִם
  chosen: two hundred fifty
  alternatives:
  - two hundred and fifty
  lexicon: HALOT
  rationale: This is the explicit numerical value of the half amount. Rendering it
    appositionally after 'half as much' mirrors the Hebrew clarification and aids
    readability.
- source_word: קְנֵה בֹשֶׂם
  chosen: fragrant cane
  alternatives:
  - sweet cane
  - aromatic cane
  - calamus
  lexicon: HALOT
  rationale: קָנֶה is cane/reed; בֹשֶׂם again marks it as aromatic. 'Fragrant cane'
    is a transparent rendering. 'Calamus' is possible botanically/traditionally but
    less accessible and somewhat more specific than the Hebrew requires.
