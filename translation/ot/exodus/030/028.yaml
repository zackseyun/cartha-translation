id: EXO.30.28
reference: Exodus 30:28
source:
  edition: WLC
  text: וְ/אֶת מִזְבַּ֥ח הָ/עֹלָ֖ה וְ/אֶת כָּל כֵּלָ֑י/ו וְ/אֶת הַ/כִּיֹּ֖ר וְ/אֶת
    כַּנּֽ/וֹ־־־־־׃
translation:
  text: and the altar of burnt offering with all its utensils, and the basin with
    its stand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the laver with its base.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְבַּח הָעֹלָה
  chosen: the altar of burnt offering
  alternatives:
  - the altar of the burnt offering
  - the altar for burnt offering
  lexicon: HALOT
  rationale: מִזְבַּח is 'altar,' and הָעֹלָה refers to the burnt offering. The construct-like
    relationship is best conveyed in natural English as 'altar of burnt offering.'
    Retaining 'burnt offering' preserves the sacrificial terminology without unnecessary
    expansion.
- source_word: כָּל כֵּלָיו
  chosen: all its utensils
  alternatives:
  - all its vessels
  - all its implements
  - all its furnishings
  lexicon: HALOT
  rationale: כְּלִי has a broad range including vessel, implement, utensil, article.
    In tabernacle context, 'utensils' is clear modern English and suitably concrete.
    The suffix refers back to the altar, hence 'its.'
- source_word: הַכִּיֹּר
  chosen: the basin
  alternatives:
  - the laver
  lexicon: HALOT
  rationale: כִּיּוֹר denotes the wash basin used in sanctuary service. 'Basin' is
    preferred over the traditional but archaic 'laver' in keeping with readable modern
    English.
- source_word: כַּנּוֹ
  chosen: its stand
  alternatives:
  - its base
  lexicon: HALOT
  rationale: כֵּן in this context refers to the support or pedestal for the basin.
    'Stand' is natural English and communicates function clearly; 'base' is possible
    but slightly less specific.
- source_word: וְאֶת
  chosen: and
  alternatives:
  - also
  - with
  lexicon: HALOT
  rationale: The repeated object marker with conjunction links the consecrated items
    in a list. English does not reproduce the object marker, so 'and' appropriately
    carries the coordination.
