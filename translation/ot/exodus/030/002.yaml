id: EXO.30.2
reference: Exodus 30:2
source:
  edition: WLC
  text: אַמָּ֨ה אָרְכּ֜/וֹ וְ/אַמָּ֤ה רָחְבּ/וֹ֙ רָב֣וּעַ יִהְיֶ֔ה וְ/אַמָּתַ֖יִם
    קֹמָת֑/וֹ מִמֶּ֖/נּוּ קַרְנֹתָֽי/ו׃
translation:
  text: Its length shall be a cubit, and its width a cubit; it shall be square, and
    its height shall be two cubits. Its horns shall be of one piece with it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'from it'; that is, the altar's horns were to be made as one
      piece with the altar itself, not attached separately.
    reason: lexical_alternative
  - marker: b
    text: Traditional English versions often render רָבוּעַ as 'foursquare.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַמָּה
  chosen: a cubit
  alternatives:
  - one cubit
  lexicon: HALOT
  rationale: Standard unit of length. English keeps the ancient measure as 'cubit'
    rather than converting, preserving formal correspondence and avoiding false precision.
- source_word: אָרְכּוֹ
  chosen: its length
  lexicon: HALOT
  rationale: Construct noun with 3ms suffix referring to the altar described in context;
    'its length' is the natural English equivalent.
- source_word: רָחְבּוֹ
  chosen: its width
  alternatives:
  - its breadth
  lexicon: HALOT
  rationale: '''Width'' is clearer modern English than the more traditional ''breadth,''
    while preserving the dimensional sense.'
- source_word: רָבוּעַ
  chosen: square
  alternatives:
  - foursquare
  lexicon: HALOT
  rationale: Adjective meaning 'square/four-sided.' 'Square' is the clearest modern
    rendering; 'foursquare' is traditional but archaic.
- source_word: יִהְיֶה
  chosen: it shall be
  alternatives:
  - it is to be
  lexicon: HALOT
  rationale: Imperfect here expresses prescription/specification in the tabernacle
    instructions. 'Shall be' fits English instructional style.
- source_word: אַמָּתַיִם
  chosen: two cubits
  lexicon: HALOT
  rationale: Dual form explicitly indicates two cubits for the height.
- source_word: קֹמָתוֹ
  chosen: its height
  alternatives:
  - its stature
  lexicon: HALOT
  rationale: In architectural context, 'height' is the appropriate English rendering.
- source_word: מִמֶּנּוּ
  chosen: of one piece with it
  alternatives:
  - from it
  - out of it
  lexicon: HALOT
  rationale: 'The preposition literally means ''from it,'' but in craftsmanship context
    it indicates integral construction: the horns are made from the same piece as
    the altar rather than attached separately. This is the idiomatic English sense.'
- source_word: קַרְנֹתָיו
  chosen: its horns
  lexicon: HALOT
  rationale: Standard term for the horn-like projections on altar corners. Retaining
    'horns' preserves cultic terminology and intertextual links with altar imagery
    elsewhere.
