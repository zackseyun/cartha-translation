theological_decisions:
- issue: Cultic setting of קדשׁ and כהן
  chosen_reading: 'Render the verse in priestly-installation language: ''consecrate''
    and ''serve as priests.'''
  alternative_readings:
  - '''sanctify'' and ''minister as priests'''
  rationale: The verse concerns setting Aaron and his sons apart for sacred office.
    The chosen wording preserves the formal priestly context without importing later
    ecclesiastical concepts. It reflects the Hebrew cultic terminology in clear modern
    English.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Gender rendering of בָּנָיו
  chosen_reading: '''his sons'''
  alternative_readings:
  - '''his children'''
  rationale: The source text is specifically masculine and contextually refers to
    the male priestly line. Per the doctrine's gender-accurate principle, the translation
    should not neutralize this.
  doctrine_reference: Translation philosophy §4
