id: EXO.30.30
reference: Exodus 30:30
source:
  edition: WLC
  text: וְ/אֶת אַהֲרֹ֥ן וְ/אֶת בָּנָ֖י/ו תִּמְשָׁ֑ח וְ/קִדַּשְׁתָּ֥ אֹתָ֖/ם לְ/כַהֵ֥ן
    לִֽ/י־־׃
translation:
  text: And you shall anoint Aaron and his sons, and you shall consecrate them to
    serve as priests to me.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: תִּמְשָׁח
  chosen: you shall anoint
  alternatives:
  - you must anoint
  lexicon: HALOT
  rationale: From משׁח, the standard verb for applying sacred oil in commissioning.
    'Anoint' preserves the ritual and theological sense better than a more generic
    'apply oil.' The yiqtol here is naturally rendered as an instruction/future, 'you
    shall.'
- source_word: וְקִדַּשְׁתָּ
  chosen: and you shall consecrate
  alternatives:
  - and you shall sanctify
  - and you shall make holy
  lexicon: HALOT
  rationale: From קדשׁ in the Piel, meaning to set apart as holy. 'Consecrate' is
    idiomatic in English for priestly installation and preserves the cultic force
    without sounding overly technical. 'Sanctify' is possible but less natural in
    this procedural context.
- source_word: לְכַהֵן
  chosen: to serve as priests
  alternatives:
  - to minister as priests
  - to act as priests
  lexicon: HALOT
  rationale: From כהן, verbal form meaning to function in priestly service. 'Serve
    as priests' communicates role and activity clearly in modern English. It is preferable
    to a bare 'to priest' and slightly broader and more natural than 'to minister
    as priests.'
- source_word: לִי
  chosen: to me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The preposition with first-person suffix marks service directed to Yahweh.
    'To me' is the most direct rendering and fits the Hebrew closely. 'For me' is
    possible but slightly more interpretive.
- source_word: בָּנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'sons,' not a gender-neutral term. This matches
    the priestly context, where Aaron's male descendants are in view; therefore gender-accurate
    translation is required.
- source_word: וְאֶת ... וְאֶת
  chosen: Aaron and his sons
  alternatives:
  - both Aaron and his sons
  lexicon: HALOT
  rationale: The repeated object marker marks both coordinated direct objects. English
    does not require repeating a marker, so a smooth rendering is 'Aaron and his sons.'
