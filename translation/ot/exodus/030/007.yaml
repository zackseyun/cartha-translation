id: EXO.30.7
reference: Exodus 30:7
source:
  edition: WLC
  text: וְ/הִקְטִ֥יר עָלָ֛י/ו אַהֲרֹ֖ן קְטֹ֣רֶת סַמִּ֑ים בַּ/בֹּ֣קֶר בַּ/בֹּ֗קֶר בְּ/הֵיטִיב֛/וֹ
    אֶת הַ/נֵּרֹ֖ת יַקְטִירֶֽ/נָּה־׃
translation:
  text: Aaron shall burn fragrant incense on it every morning; when he tends the lamps,
    he shall burn it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'morning by morning.' The Hebrew repetition emphasizes the regular daily
      practice.
    reason: lexical_alternative
  - marker: b
    text: Or 'when he trims the lamps.' The Hebrew verb can refer more specifically
      to putting the lamps in order.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְטִיר
  chosen: shall burn
  alternatives:
  - shall burn as smoke
  - shall offer up in smoke
  lexicon: HALOT
  rationale: Hiphil of קטר in cultic context refers to causing an offering to go up
    in smoke on the altar. 'Shall burn' is natural English and fits the ritual setting
    without unnecessary paraphrase.
- source_word: עָלָיו
  chosen: on it
  alternatives:
  - upon it
  lexicon: HALOT
  rationale: Refers back to the incense altar in the preceding context. 'On it' is
    idiomatic modern English while preserving the locative sense.
- source_word: קְטֹרֶת
  chosen: incense
  lexicon: HALOT
  rationale: Standard rendering for the substance burned in worship; context makes
    clear this is incense rather than a more generic 'smoke offering'.
- source_word: סַמִּים
  chosen: fragrant
  alternatives:
  - spiced
  - sweet-smelling
  - of spices
  lexicon: HALOT
  rationale: The noun denotes aromatic spices/balsam components. In English, 'fragrant
    incense' best conveys the sense of incense compounded from aromatic spices. A
    more literal 'incense of spices' is possible but less natural.
- source_word: בַּבֹּקֶר בַּבֹּקֶר
  chosen: every morning
  alternatives:
  - morning by morning
  lexicon: HALOT
  rationale: The distributive repetition expresses regular daily recurrence. 'Every
    morning' is clear modern English; the more formal 'morning by morning' is preserved
    as an alternative.
- source_word: בְּהֵיטִיבוֹ
  chosen: when he tends
  alternatives:
  - when he trims
  - when he sets in order
  lexicon: HALOT
  rationale: The Hiphil infinitive of יטב here refers to servicing the lamps, likely
    trimming/wicking and preparing them. 'Tends' captures the broader maintenance
    action in accessible English without over-specifying one sub-action.
- source_word: הַנֵּרֹת
  chosen: the lamps
  alternatives:
  - the lamps of the lampstand
  lexicon: HALOT
  rationale: Refers to the sanctuary lamps already established in context. 'The lamps'
    is sufficient in English.
- source_word: יַקְטִירֶנָּה
  chosen: he shall burn it
  alternatives:
  - he shall burn it as incense
  lexicon: HALOT
  rationale: The feminine singular suffix refers back to קְטֹרֶת ('incense'). Rendering
    the pronoun as 'it' preserves the Hebrew anaphora and avoids redundancy, though
    'as incense' is possible for clarification.
