id: EXO.30.1
reference: Exodus 30:1
source:
  edition: WLC
  text: וְ/עָשִׂ֥יתָ מִזְבֵּ֖חַ מִקְטַ֣ר קְטֹ֑רֶת עֲצֵ֥י שִׁטִּ֖ים תַּעֲשֶׂ֥ה אֹתֽ/וֹ׃
translation:
  text: And you shall make an altar for burning incense; you shall make it of acacia
    wood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more compactly, 'an altar of incense' or 'an incense altar.' The Hebrew
      more literally reads 'an altar for burning incense.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: And you shall make
  alternatives:
  - And make
  - Then you shall make
  lexicon: HALOT
  rationale: Qal perfect 2ms with prefixed conjunction in instructional sequence functions
    as a directive/future command. 'And you shall make' preserves the sequential force
    and legal-instruction style better than a bare imperative.
- source_word: מִזְבֵּחַ
  chosen: an altar
  lexicon: HALOT
  rationale: Standard rendering for the noun denoting an altar. The indefinite article
    fits English idiom at the introduction of a new cultic object.
- source_word: מִקְטַר קְטֹרֶת
  chosen: for burning incense
  alternatives:
  - an incense altar
  - for offering incense
  lexicon: HALOT
  rationale: The construct expression literally denotes an altar of incense-burning/incense
    offering. 'For burning incense' is a clear, natural rendering that preserves the
    altar's function without over-compressing the Hebrew into a title. 'An incense
    altar' is possible but less transparent to the underlying syntax.
- source_word: עֲצֵי שִׁטִּים
  chosen: acacia wood
  alternatives:
  - wood of acacia
  - acacia-wood
  lexicon: HALOT
  rationale: The Hebrew literally means 'woods of acacias,' an idiom for acacia wood/timber.
    'Acacia wood' is standard, natural English and accurately reflects the material.
- source_word: תַּעֲשֶׂה אֹתוֹ
  chosen: you shall make it
  alternatives:
  - you are to make it
  lexicon: HALOT
  rationale: The imperfect 2ms continues the instruction and resumes focus on the
    object. Repeating 'you shall make it' reflects the Hebrew's emphatic restatement
    before specifying the material.
