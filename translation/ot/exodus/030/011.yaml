theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name of God. Following the project's
    contested-terms policy, it is rendered 'the LORD' rather than a transliteration.
    This is a translation-policy decision rather than a doctrinally disputed theological
    claim in the verse itself.
