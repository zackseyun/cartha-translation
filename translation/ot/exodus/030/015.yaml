theological_decisions:
- issue: Rendering of YHWH
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The divine name is rendered according to the project's stated default for יְהוָה, following Jewish reverence tradition and longstanding English Bible convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of נֶפֶשׁ in atonement context
  chosen_reading: for your lives
  alternative_readings:
  - for your souls
  - for yourselves
  rationale: In this census-ransom setting, the term points to the life/person of each Israelite rather than making an anthropological statement about the soul. This avoids importing later doctrinal assumptions while preserving the verse's concrete force.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
- issue: Rendering of כפר
  chosen_reading: to make atonement
  alternative_readings:
  - to make expiation
  - to make ransom
  rationale: The verse speaks in established cultic language. 'Make atonement' is the clearest accessible rendering and preserves theological breadth without forcing a specific atonement model.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #6'
