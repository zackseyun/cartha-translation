id: EXO.30.15
reference: Exodus 30:15
source:
  edition: WLC
  text: הֶֽ/עָשִׁ֣יר לֹֽא יַרְבֶּ֗ה וְ/הַ/דַּל֙ לֹ֣א יַמְעִ֔יט מִֽ/מַּחֲצִ֖ית הַ/שָּׁ֑קֶל לָ/תֵת֙ אֶת תְּרוּמַ֣ת יְהוָ֔ה לְ/כַפֵּ֖ר עַל נַפְשֹׁתֵי/כֶֽם־־־׃
translation:
  text: The rich shall not give more, and the poor shall not give less, than the half-shekel, when giving the contribution to Yahweh to make atonement for your lives.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "for your souls"; Hebrew nephesh can mean soul, self, person, or life. In this census-payment context, the sense is likely the lives/persons of the people counted.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶעָשִׁיר
  chosen: the rich
  alternatives:
  - the wealthy man
  - the rich man
  lexicon: HALOT
  rationale: The adjective with article functions substantivally for a class of people. English 'the rich' naturally conveys this representative singular/class sense without awkwardness.
- source_word: יַרְבֶּה
  chosen: shall not give more
  alternatives:
  - shall not increase
  - shall not add more
  lexicon: HALOT
  rationale: In context of a fixed levy, the verb 'increase' refers to contributing more than the prescribed amount. 'Give more' makes the sense explicit in idiomatic English while staying close to the Hebrew.
- source_word: הַדַּל
  chosen: the poor
  alternatives:
  - the lowly
  - the needy
  - the poor man
  lexicon: HALOT
  rationale: The term denotes one of low economic means in this taxation/ransom context. 'The poor' best matches the socioeconomic contrast with 'the rich'.
- source_word: יַמְעִיט
  chosen: shall not give less
  alternatives:
  - shall not diminish
  - shall not reduce
  lexicon: HALOT
  rationale: Parallel to 'shall not give more'; the sense is contributing less than the required amount. This preserves the balanced legal formulation in natural English.
- source_word: מִמַּחֲצִית הַשָּׁקֶל
  chosen: than the half-shekel
  alternatives:
  - from the half-shekel
  - less than half a shekel
  lexicon: HALOT
  rationale: With the preceding negative comparative sense, English idiom requires 'than the half-shekel.' This expresses that neither more nor less than the fixed amount is to be given.
- source_word: תְּרוּמַת יְהוָה
  chosen: the contribution to the LORD
  alternatives:
  - the LORD's offering
  - the LORD's contribution
  - the offering to the LORD
  lexicon: HALOT
  rationale: תְּרוּמָה is a contribution/offering set apart for sacred use. 'Contribution' fits the census-payment context better than a more sacrificial-sounding 'offering.' YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְכַפֵּר
  chosen: to make atonement
  alternatives:
  - to atone
  - to make expiation
  - to make ransom
  lexicon: HALOT
  rationale: כפר in this cultic context is standardly rendered 'make atonement.' This preserves the theological weight without importing a narrower theory of atonement.
- source_word: עַל נַפְשֹׁתֵיכֶם
  chosen: for your lives
  alternatives:
  - for yourselves
  - for your souls
  - for your persons
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to the persons/lives being ransomed in the census context, not specifically the immaterial soul. 'For your lives' communicates the concrete sense clearly in modern English.
- source_word: לָתֵת
  chosen: when giving
  alternatives:
  - to give
  lexicon: HALOT
  rationale: The infinitive expresses the circumstance/purpose of the payment. 'When giving' reads naturally in English and links the fixed amount to the act of presenting it.
