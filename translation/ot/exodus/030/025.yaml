id: EXO.30.25
reference: Exodus 30:25
source:
  edition: WLC
  text: וְ/עָשִׂ֣יתָ אֹת֗/וֹ שֶׁ֚מֶן מִשְׁחַת קֹ֔דֶשׁ רֹ֥קַח מִרְקַ֖חַת מַעֲשֵׂ֣ה
    רֹקֵ֑חַ שֶׁ֥מֶן מִשְׁחַת קֹ֖דֶשׁ יִהְיֶֽה־־׃
translation:
  text: And you shall make it into a holy anointing oil, a perfumed blend, the work
    of a perfumer; it shall be a holy anointing oil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a compounded ointment' or 'a blended perfume'; the Hebrew emphasizes
      an expertly mixed aromatic preparation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: And you shall make
  alternatives:
  - and you must make
  - and you are to make
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional context functions
    as an imperative/future command. 'You shall make' preserves the directive force
    in natural English.
- source_word: אֹתוֹ
  chosen: it
  alternatives:
  - this
  lexicon: HALOT
  rationale: Direct-object pronoun refers back to the compounded ingredients/oil mixture
    from the previous verse. 'It' is the most straightforward English referent.
- source_word: שֶׁמֶן מִשְׁחַת קֹדֶשׁ
  chosen: a holy anointing oil
  alternatives:
  - holy anointing oil
  - oil of holy anointing
  lexicon: HALOT
  rationale: Construct chain literally means 'oil of anointing of holiness/holy anointing.'
    'A holy anointing oil' is idiomatic modern English while preserving consecratory
    sense. The phrase recurs at the end of the verse, where the same rendering is
    maintained for consistency.
- source_word: רֹקַח
  chosen: a perfumed blend
  alternatives:
  - a compound ointment
  - a blended perfume
  - a mixture of spices
  lexicon: HALOT
  rationale: The noun denotes a compounded aromatic preparation. 'Perfumed blend'
    captures both the blended and aromatic character without archaic wording like
    'compound ointment.'
- source_word: מִרְקַחַת
  chosen: blend
  alternatives:
  - mixture
  - ointment
  lexicon: HALOT
  rationale: This cognate noun intensifies/specifies the idea of compounding or mixing.
    Rendering it with 'blend' in apposition to רֹקַח preserves the wordplay and manufacturing
    sense.
- source_word: מַעֲשֵׂה רֹקֵחַ
  chosen: the work of a perfumer
  alternatives:
  - the work of an ointment-maker
  - the work of a compounder
  - the work of a skilled mixer
  lexicon: HALOT
  rationale: Literally 'work of a mixer/perfumer.' In context of aromatic sacred oil,
    'perfumer' best conveys a skilled artisan preparing fragrant compounds.
- source_word: יִהְיֶה
  chosen: it shall be
  alternatives:
  - it will be
  lexicon: HALOT
  rationale: Simple imperfect of היה here gives the resultant state of the prepared
    oil. 'It shall be' fits the formal instructional register.
