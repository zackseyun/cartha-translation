id: EXO.30.31
reference: Exodus 30:31
source:
  edition: WLC
  text: וְ/אֶל בְּנֵ֥י יִשְׂרָאֵ֖ל תְּדַבֵּ֣ר לֵ/אמֹ֑ר שֶׁ֠מֶן מִשְׁחַת קֹ֨דֶשׁ יִהְיֶ֥ה
    זֶ֛ה לִ֖/י לְ/דֹרֹתֵי/כֶֽם־־׃
translation:
  text: And you shall speak to the sons of Israel, saying, ‘This shall be a holy anointing
    oil to me throughout your generations.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the children of Israel' or 'the Israelites.'
    reason: lexical_alternative
  - marker: b
    text: Or 'oil of holy anointing.'
    reason: lexical_alternative
  - marker: c
    text: That is, set apart for the LORD's sacred use.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶל
  chosen: And ... to
  alternatives:
  - And to
  - Now to
  lexicon: HALOT
  rationale: The conjunction plus preposition introduces the next instruction directed
    toward Israel. In English, 'And you shall speak to...' best captures the flow
    and the directional force of אֶל without awkwardness.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: A formally transparent rendering is preferred here. 'Sons of Israel'
    preserves the Hebrew idiom and its masculine plural form, in keeping with the
    gender-accurate policy. 'Israelites' is possible but less transparent to the source
    wording.
- source_word: תְּדַבֵּר
  chosen: you shall speak
  alternatives:
  - you are to speak
  - you must speak
  lexicon: HALOT
  rationale: The imperfect here functions as an instruction to Moses. 'You shall speak'
    is natural English and preserves the directive force without over-interpreting
    modality.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and say
  - as follows
  lexicon: HALOT
  rationale: Standard rendering for the quotative infinitive construct. 'Saying' keeps
    the formal structure and introduces the direct speech naturally.
- source_word: שֶׁמֶן מִשְׁחַת קֹדֶשׁ
  chosen: a holy anointing oil
  alternatives:
  - holy anointing oil
  - oil of holy anointing
  lexicon: HALOT
  rationale: The construct chain denotes oil used for sacred anointing. 'A holy anointing
    oil' is clear modern English while preserving the adjectival force of קֹדֶשׁ.
    'Oil of holy anointing' is more formal but less natural.
- source_word: יִהְיֶה זֶה
  chosen: This shall be
  alternatives:
  - This is to be
  - This will be
  lexicon: HALOT
  rationale: The Hebrew places the demonstrative with the verb to identify the substance
    just described. 'This shall be' is idiomatic and suitably directive in context.
- source_word: לִי
  chosen: to me
  alternatives:
  - for me
  - as mine
  lexicon: HALOT
  rationale: The preposition marks belonging or dedication to Yahweh. 'To me' is the
    most direct rendering; context makes clear this means consecrated for Yahweh's
    use.
- source_word: לְדֹרֹתֵיכֶם
  chosen: throughout your generations
  alternatives:
  - for your generations
  - from generation to generation
  lexicon: HALOT
  rationale: This idiom expresses enduring applicability across successive generations.
    'Throughout your generations' is standard, clear, and faithful.
