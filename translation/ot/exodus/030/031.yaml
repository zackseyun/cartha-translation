theological_decisions:
- issue: Rendering of covenantal dedication in לִי
  chosen_reading: to me
  alternative_readings:
  - for me
  - belonging to me
  rationale: The phrase indicates that the anointing oil is set apart for Yahweh.
    'To me' preserves the Hebrew wording without expanding into a fuller theological
    paraphrase such as 'belonging to the LORD,' though that sense is implicit in context.
  doctrine_reference: 'Translation philosophy: original-language primacy; avoid importing
    claims beyond the text.'
- issue: Gendered corporate designation בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the children of Israel
  - the Israelites
  rationale: The Hebrew is grammatically masculine plural and idiomatic for the covenant
    people. Per doctrine, gender-accurate rendering is preferred over flattening to
    a neutral collective, while alternatives remain viable in English tradition.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
