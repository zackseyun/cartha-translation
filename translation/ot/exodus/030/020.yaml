id: EXO.30.20
reference: Exodus 30:20
source:
  edition: WLC
  text: בְּ/בֹאָ֞/ם אֶל אֹ֧הֶל מוֹעֵ֛ד יִרְחֲצוּ מַ֖יִם וְ/לֹ֣א יָמֻ֑תוּ א֣וֹ בְ/גִשְׁתָּ֤/ם אֶל הַ/מִּזְבֵּ֨חַ֙ לְ/שָׁרֵ֔ת לְ/הַקְטִ֥יר אִשֶּׁ֖ה לַֽ/יהוָֽה־־־׃
translation:
  text: When they enter the tent of meeting, they shall wash with water, so that they may not die; or when they come near the altar to minister, to burn a food offering to Yahweh,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'lest they die' or 'and they shall not die.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'an offering by fire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּבֹאָם
  chosen: When they enter
  alternatives:
  - At their entering
  - When they come in
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct with pronominal suffix gives a temporal sense, 'when they enter/come in.' 'Enter' is natural modern English and fits the movement into the tent.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the Tent of Meeting
  lexicon: HALOT
  rationale: Standard rendering of the sanctuary designation. Lowercase is used here for readable modern English; the phrase denotes the tabernacle structure where God meets with Israel.
- source_word: יִרְחֲצוּ מַיִם
  chosen: they shall wash with water
  alternatives:
  - they shall wash themselves with water
  - they must wash with water
  lexicon: HALOT
  rationale: The verb רחץ with מים expresses ritual washing. English idiom can omit the reflexive object, but 'with water' should be retained explicitly from the Hebrew.
- source_word: וְלֹא יָמֻתוּ
  chosen: so that they may not die
  alternatives:
  - and they shall not die
  - lest they die
  lexicon: HALOT
  rationale: Though formally coordinated, in context the clause expresses purpose/result of the washing requirement. 'So that they may not die' communicates the force clearly in modern English without overstating beyond the Hebrew.
- source_word: אוֹ
  chosen: or
  alternatives:
  - or else
  lexicon: HALOT
  rationale: Simple disjunctive introducing the second circumstance in which washing is required.
- source_word: בְגִשְׁתָּם אֶל־הַמִּזְבֵּחַ
  chosen: when they come near the altar
  alternatives:
  - when they approach the altar
  lexicon: HALOT
  rationale: נגשׁ commonly means approach/draw near, often in cultic contexts. 'Come near' preserves the physical and ritual sense.
- source_word: לְשָׁרֵת
  chosen: to minister
  alternatives:
  - to serve
  lexicon: HALOT
  rationale: In priestly context, 'minister' better conveys formal sacred service than the broader 'serve.'
- source_word: לְהַקְטִיר
  chosen: to burn
  alternatives:
  - to offer up in smoke
  - to make smoke
  lexicon: HALOT
  rationale: The Hiphil of קטר refers to causing an offering to go up in smoke on the altar. 'Burn' is concise and natural; the sacrificial nuance is supplied by the object phrase.
- source_word: אִשֶּׁה
  chosen: a food offering
  alternatives:
  - an offering by fire
  - a fire offering
  lexicon: HALOT
  rationale: While traditionally rendered 'offering by fire,' the term denotes an offering made by fire and is often understood functionally as a food offering to God. 'Food offering' is clearer in contemporary English while remaining tied to sacrificial terminology.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, יהוה is rendered 'the LORD,' following the project's default for the divine name.
