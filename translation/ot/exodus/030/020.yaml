theological_decisions:
- issue: Rendering of the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Cultic consequence clause וְלֹא יָמֻתוּ
  chosen_reading: so that they may not die
  alternative_readings:
  - and they shall not die
  - lest they die
  rationale: The verse states a real death-sanction attached to priestly impurity. The translation preserves that gravity while expressing the clause in natural English as the purpose of washing, without softening the warning or importing further theological explanation.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
