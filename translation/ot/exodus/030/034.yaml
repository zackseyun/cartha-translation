id: EXO.30.34
reference: Exodus 30:34
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ יְהוָ֨ה אֶל מֹשֶׁ֜ה קַח לְ/ךָ֣ סַמִּ֗ים נָטָ֤ף וּ/שְׁחֵ֨לֶת֙ וְ/חֶלְבְּנָ֔ה
    סַמִּ֖ים וּ/לְבֹנָ֣ה זַכָּ֑ה בַּ֥ד בְּ/בַ֖ד יִהְיֶֽה־־׀׃
translation:
  text: 'Then the LORD said to Moses, “Take for yourself spices: stacte and onycha
    and galbanum, spices with pure frankincense; they shall be in equal parts.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The exact identities of 'stacte' and 'onycha' are uncertain; the Hebrew
      likely refers to specific aromatic incense ingredients, traditionally rendered
      this way.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    Jewish reverence tradition and aligning with established English Bible convention
    documented in DOCTRINE.md.
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving sequential force.
- source_word: קַח לְךָ
  chosen: Take for yourself
  alternatives:
  - Take
  - Get for yourself
  lexicon: HALOT
  rationale: The imperative plus לְךָ includes a reflexive/personal nuance. 'Take
    for yourself' preserves that nuance without awkwardness.
- source_word: סַמִּים
  chosen: spices
  alternatives:
  - aromatics
  - fragrant substances
  lexicon: HALOT
  rationale: A broad term for aromatic ingredients. 'Spices' is clear, idiomatic,
    and suitable in the incense-making context.
- source_word: נָטָף
  chosen: stacte
  alternatives:
  - gum resin
  - balm resin
  lexicon: HALOT
  rationale: The exact botanical identification is uncertain, but 'stacte' is the
    longstanding specific rendering for this incense ingredient. Because the referent
    is uncertain, a lexical alternative is preserved in a footnote.
- source_word: שְׁחֵלֶת
  chosen: onycha
  alternatives:
  - aromatic shell substance
  - operculum
  lexicon: HALOT
  rationale: The precise substance is uncertain; 'onycha' is the traditional rendering
    for this incense ingredient and remains recognizable in translation history. A
    footnote preserves the uncertainty.
- source_word: חֶלְבְּנָה
  chosen: galbanum
  alternatives:
  - galbanum gum
  lexicon: HALOT
  rationale: This term is commonly identified as galbanum, an aromatic resin. The
    English gloss is sufficiently precise and standard.
- source_word: לְבֹנָה זַכָּה
  chosen: pure frankincense
  alternatives:
  - clean frankincense
  lexicon: HALOT
  rationale: לְבֹנָה is frankincense; זַכָּה denotes purity/cleanness. 'Pure frankincense'
    is natural English and preserves the qualifying adjective.
- source_word: בַּד בְּבַד
  chosen: in equal parts
  alternatives:
  - part for part
  - each alike
  - separately in equal measure
  lexicon: HALOT
  rationale: The idiom indicates equal proportion among the ingredients. 'In equal
    parts' communicates the sense clearly in modern English.
- source_word: יִהְיֶה
  chosen: they shall be
  alternatives:
  - it shall be
  lexicon: HALOT
  rationale: Although the verb is singular in Hebrew, the sense governs the listed
    ingredients collectively. English naturally uses the plural to match 'they' referring
    to the ingredients and the idiom of proportions.
