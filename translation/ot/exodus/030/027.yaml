id: EXO.30.27
reference: Exodus 30:27
source:
  edition: WLC
  text: וְ/אֶת הַ/שֻּׁלְחָן֙ וְ/אֶת כָּל כֵּלָ֔י/ו וְ/אֶת הַ/מְּנֹרָ֖ה וְ/אֶת כֵּלֶ֑י/הָ
    וְ/אֵ֖ת מִזְבַּ֥ח הַ/קְּטֹֽרֶת־־־־־׃
translation:
  text: and the table and all its utensils, and the lampstand and its utensils, and
    the altar of incense,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the incense altar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשֻּׁלְחָן
  chosen: the table
  alternatives:
  - the table of the bread of the Presence
  lexicon: HALOT
  rationale: The noun simply means 'table' here. Although in tabernacle context it
    refers specifically to the sacred table, the Hebrew text in this verse does not
    repeat the fuller designation, so the concise rendering best matches the source.
- source_word: כָּל כֵּלָיו
  chosen: all its utensils
  alternatives:
  - all its vessels
  - all its articles
  lexicon: HALOT
  rationale: כְּלִי is a broad term for implements, vessels, or utensils. 'Utensils'
    is natural modern English and fits tabernacle furnishings without becoming overly
    technical.
- source_word: הַמְּנֹרָה
  chosen: the lampstand
  alternatives:
  - the menorah
  lexicon: HALOT
  rationale: Per translation philosophy, titles/common nouns are translated rather
    than transliterated. 'Lampstand' conveys the function of מְנוֹרָה clearly in English;
    'menorah' is preserved as a possible lexical alternative but not preferred in
    the main text.
- source_word: כֵּלֶיהָ
  chosen: its utensils
  alternatives:
  - its vessels
  - its articles
  lexicon: HALOT
  rationale: Same lexical range as כָּל כֵּלָיו above. The feminine suffix refers
    back to the lampstand, so 'its utensils' is the most straightforward rendering.
- source_word: מִזְבַּח הַקְּטֹרֶת
  chosen: the altar of incense
  alternatives:
  - the incense altar
  lexicon: HALOT
  rationale: Construct phrase meaning the altar associated with incense. 'The altar
    of incense' is the most transparent and established English rendering while remaining
    faithful to the Hebrew structure.
