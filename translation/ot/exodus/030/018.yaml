id: EXO.30.18
reference: Exodus 30:18
source:
  edition: WLC
  text: וְ/עָשִׂ֜יתָ כִּיּ֥וֹר נְחֹ֛שֶׁת וְ/כַנּ֥/וֹ נְחֹ֖שֶׁת לְ/רָחְצָ֑ה וְ/נָתַתָּ֣
    אֹת֗/וֹ בֵּֽין אֹ֤הֶל מוֹעֵד֙ וּ/בֵ֣ין הַ/מִּזְבֵּ֔חַ וְ/נָתַתָּ֥ שָׁ֖מָּ/ה מָֽיִם־׃
translation:
  text: You shall make a bronze basin, with its stand of bronze, for washing; and
    you shall place it between the tent of meeting and the altar, and you shall put
    water there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'laver' for 'basin,' a traditional rendering for the large wash vessel
      used at the tabernacle.
    reason: lexical_alternative
  - marker: b
    text: '''Bronze'' may also be rendered ''copper''; the Hebrew term can denote
      copper or a copper alloy depending on context.'
    reason: lexical_alternative
  - marker: c
    text: Or 'base' for 'stand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּיּוֹר
  chosen: basin
  alternatives:
  - laver
  lexicon: HALOT
  rationale: Refers to a large vessel for holding water used in sanctuary washing.
    'Basin' is clear modern English; 'laver' is traditional but archaic and less accessible.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: In tabernacle contexts this metal term is conventionally and plausibly
    rendered 'bronze' in English Bible translation. 'Copper' is possible lexically,
    but 'bronze' better matches established cultic-object usage in readable modern
    English.
- source_word: כַּן
  chosen: stand
  alternatives:
  - base
  lexicon: HALOT
  rationale: Denotes the supporting structure for the basin. 'Stand' is natural English
    and communicates function clearly; 'base' is possible but slightly less specific.
- source_word: לְרָחְצָה
  chosen: for washing
  alternatives:
  - for ablutions
  - for washing themselves
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'For washing' preserves the concise
    Hebrew without importing an explicit object not stated in this verse. 'Ablutions'
    is too technical; 'washing themselves' is interpretive from context.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  lexicon: HALOT
  rationale: Standard rendering for the tabernacle designation; it is both accurate
    and idiomatic in English.
- source_word: מִזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Straightforward rendering of the sacrificial altar in context.
- source_word: שָׁמָּה
  chosen: there
  alternatives:
  - in it
  lexicon: HALOT
  rationale: The adverb means 'there/to there.' English idiom prefers 'put water there'
    after specifying the basin's location. 'In it' makes the referent explicit but
    is not the form used in the Hebrew.
- source_word: מַיִם
  chosen: water
  lexicon: HALOT
  rationale: Direct rendering of the plural-form noun used as a mass noun in English.
- source_word: וְעָשִׂיתָ ... וְנָתַתָּ ... וְנָתַתָּ
  chosen: You shall make ... and you shall place ... and you shall put
  alternatives:
  - Make ... place ... put
  lexicon: HALOT
  rationale: The sequence of second masculine singular perfects with prefixed waw
    in instructional context functions imperativally/futurally. 'You shall' preserves
    the directive force and covenantal instruction style better than bare English
    imperatives in this legal/cultic context.
