theological_decisions:
- issue: Gender-specific priestly reference
  chosen_reading: and his sons
  alternative_readings:
  - and his children
  rationale: The verse concerns Aaron and the male priestly line serving at the tent
    of meeting. Following the translation philosophy's gender-accurate principle,
    the masculine familial term is retained rather than neutralized.
