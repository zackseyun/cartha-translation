id: EXO.30.19
reference: Exodus 30:19
source:
  edition: WLC
  text: וְ/רָחֲצ֛וּ אַהֲרֹ֥ן וּ/בָנָ֖י/ו מִמֶּ֑/נּוּ אֶת יְדֵי/הֶ֖ם וְ/אֶת רַגְלֵי/הֶֽם־־׃
translation:
  text: Aaron and his sons shall wash their hands and their feet from it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more explicitly, 'with water from it,' referring to the basin mentioned
      in the surrounding context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָחֲצוּ
  chosen: shall wash
  alternatives:
  - must wash
  - are to wash
  - will wash
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional context functions
    with directive/future force. 'Shall wash' preserves the legal/instructional tone
    without over-paraphrasing.
- source_word: אַהֲרֹן
  chosen: Aaron
  rationale: Standard English transliteration of the personal name.
- source_word: וּבָנָיו
  chosen: and his sons
  alternatives:
  - and his children
  lexicon: HALOT
  rationale: בנים here refers specifically to Aaron's male priestly descendants in
    cultic service, so 'sons' is more precise than the broader 'children,' in keeping
    with gender-accurate translation.
- source_word: מִמֶּנּוּ
  chosen: from it
  alternatives:
  - with water from it
  - using it
  lexicon: HALOT
  rationale: The preposition מן with pronominal suffix naturally means 'from it,'
    referring to the bronze basin/laver mentioned in context. English 'from it' is
    slightly formal but accurately reflects the Hebrew construction; the more explicit
    sense 'with water from it' is interpretive and therefore left to a footnote rather
    than the main text.
- source_word: אֶת יְדֵיהֶם
  chosen: their hands
  lexicon: HALOT
  rationale: Direct-object marker plus noun phrase straightforwardly indicates the
    body part to be washed.
- source_word: וְאֶת רַגְלֵיהֶם
  chosen: and their feet
  lexicon: HALOT
  rationale: Coordinates the second direct object; 'feet' is the plain lexical sense.
