theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of יְהוָה
    as 'the LORD.' No contextual factor here requires deviation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: How explicitly to render the census idiom
  chosen_reading: passes over to those who are counted
  alternative_readings:
  - is counted among them
  - passes among those numbered
  rationale: The Hebrew preserves the procedural imagery of passing over in relation
    to those enrolled. The translation keeps that imagery rather than resolving it
    into a purely abstract census term, while still making the legal sense clear.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy
    over translation tradition; preserve significant lexical decisions'
