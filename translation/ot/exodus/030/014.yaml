id: EXO.30.14
reference: Exodus 30:14
source:
  edition: WLC
  text: כֹּ֗ל הָ/עֹבֵר֙ עַל הַ/פְּקֻדִ֔ים מִ/בֶּ֛ן עֶשְׂרִ֥ים שָׁנָ֖ה וָ/מָ֑עְלָ/ה יִתֵּ֖ן תְּרוּמַ֥ת יְהוָֽה־׃
translation:
  text: Everyone who passes over to those who are counted, from twenty years old and upward, shall give Yahweh’s contribution.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “among those numbered.” The Hebrew idiom literally speaks of one “passing over” in relation to those counted, likely referring to the census procedure.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל
  chosen: Everyone
  alternatives:
  - All
  - Everyone who
  lexicon: HALOT
  rationale: The noun means 'all/every.' In context it governs the following participial phrase, so 'Everyone' gives natural English while preserving the distributive sense.
- source_word: הָעֹבֵר
  chosen: who passes over
  alternatives:
  - who crosses over
  - who passes among
  lexicon: HALOT
  rationale: The participle of עבר literally means 'passing over/across.' Here it refers to those passing over for enrollment in the census procedure. 'Who passes over' preserves the concrete verbal imagery better than a flattened 'who is counted.'
- source_word: עַל הַפְּקֻדִים
  chosen: to those who are counted
  alternatives:
  - among those numbered
  - over to the enrolled
  - to the census records
  lexicon: HALOT
  rationale: פְּקֻדִים derives from the root for numbering/mustering/appointing. In this census-tax context it refers to those registered or counted. The preposition עַל with עבר is somewhat idiomatic; 'to those who are counted' communicates movement into the counted group while remaining readable. 'Among those numbered' is also possible.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמָעְלָה
  chosen: from twenty years old and upward
  alternatives:
  - from twenty years old and above
  - aged twenty years and up
  lexicon: HALOT
  rationale: This is a standard age-threshold formula. 'From twenty years old and upward' is idiomatic, accurate, and preserves the formal register of the legal instruction.
- source_word: יִתֵּן
  chosen: shall give
  alternatives:
  - must give
  - is to give
  lexicon: HALOT
  rationale: The imperfect here carries injunctive/legal force. 'Shall give' fits covenantal legal style in English without becoming archaic in this context.
- source_word: תְּרוּמַת
  chosen: contribution
  alternatives:
  - offering
  - heave offering
  - tribute
  lexicon: HALOT
  rationale: תְּרוּמָה denotes a contribution/offering set apart for the LORD. 'Contribution' fits this census-payment context better than the more ritual-sounding 'heave offering,' while avoiding over-interpretation as 'tribute.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
