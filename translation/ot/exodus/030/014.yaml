- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: How explicitly to render the census idiom
  chosen_reading: passes over to those who are counted
  alternative_readings:
  - is counted among them
  - passes among those numbered
  rationale: The Hebrew preserves the procedural imagery of passing over in relation to those enrolled. The translation keeps that imagery rather than resolving it into a purely abstract census term, while still making the legal sense clear.
