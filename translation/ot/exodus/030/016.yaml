id: EXO.30.16
reference: Exodus 30:16
source:
  edition: WLC
  text: וְ/לָקַחְתָּ֞ אֶת כֶּ֣סֶף הַ/כִּפֻּרִ֗ים מֵ/אֵת֙ בְּנֵ֣י יִשְׂרָאֵ֔ל וְ/נָתַתָּ֣ אֹת֔/וֹ עַל עֲבֹדַ֖ת אֹ֣הֶל מוֹעֵ֑ד וְ/הָיָה֩ לִ/בְנֵ֨י יִשְׂרָאֵ֤ל לְ/זִכָּרוֹן֙ לִ/פְנֵ֣י יְהוָ֔ה לְ/כַפֵּ֖ר עַל נַפְשֹׁתֵי/כֶֽם־־־׃פ
translation:
  text: You shall take the atonement money from the sons of Israel and give it for the service of the tent of meeting, and it shall be for the sons of Israel as a memorial before Yahweh, to make atonement for your lives.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from the Israelites” / “from the children of Israel.” The Hebrew reads “from the sons of Israel.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “for your souls”; here the sense is “for your lives” or “for yourselves” in the context of atonement payment.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֶּסֶף הַכִּפֻּרִים
  chosen: the atonement money
  alternatives:
  - the silver of atonements
  - the ransom money
  - the expiation money
  lexicon: HALOT
  rationale: כֶּסֶף is literally 'silver/money'; in this context it refers to the census payment specified in the preceding verses. הַכִּפֻּרִים derives from כפר and denotes atonement/expiation. 'Atonement money' is natural English and preserves the cultic sense without over-paraphrasing.
- source_word: מֵאֵת בְּנֵי יִשְׂרָאֵל
  chosen: from the sons of Israel
  alternatives:
  - from the Israelites
  - from the children of Israel
  lexicon: HALOT
  rationale: בְּנֵי יִשְׂרָאֵל is formally 'sons of Israel.' Per the project's gender-accurate principle, the masculine form is retained where it represents the covenant people corporately. 'Israelites' is possible but less formally transparent.
- source_word: עַל עֲבֹדַת אֹהֶל מוֹעֵד
  chosen: for the service of the tent of meeting
  alternatives:
  - for the work of the tent of meeting
  - for the ministry of the tent of meeting
  lexicon: HALOT
  rationale: עַל here is best rendered idiomatically as indicating purpose/allocation. עֲבֹדָה can mean work/service; in sanctuary context 'service' best captures cultic labor. אֹהֶל מוֹעֵד is the standard designation 'tent of meeting.'
- source_word: וְהָיָה ... לְזִכָּרוֹן
  chosen: and it shall be ... as a memorial
  alternatives:
  - and it shall be ... for a remembrance
  lexicon: HALOT
  rationale: זִכָּרוֹן denotes memorial/remembrance. 'Memorial' is concise and idiomatic in cultic contexts, preserving the idea of an enduring reminder before God.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: The preposition phrase is a standard cultic expression meaning in God's presence. YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: לְכַפֵּר
  chosen: to make atonement
  alternatives:
  - to atone
  - to make expiation
  lexicon: HALOT
  rationale: The piel infinitive of כפר in priestly context is conventionally and accurately rendered 'to make atonement.' 'Expiation' is semantically possible but less accessible for the target audience.
- source_word: עַל נַפְשֹׁתֵיכֶם
  chosen: for your lives
  alternatives:
  - for your souls
  - for yourselves
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to the persons/lives of the Israelites in the context of ransom/atonement payment, not a later body-soul dualism. 'For your lives' best fits the immediate context and avoids misleading metaphysical overtones.
