id: EXO.30.8
reference: Exodus 30:8
source:
  edition: WLC
  text: וּ/בְ/הַעֲלֹ֨ת אַהֲרֹ֧ן אֶת הַ/נֵּרֹ֛ת בֵּ֥ין הָ/עֲרְבַּ֖יִם יַקְטִירֶ֑/נָּה
    קְטֹ֧רֶת תָּמִ֛יד לִ/פְנֵ֥י יְהוָ֖ה לְ/דֹרֹתֵי/כֶֽם־׃
translation:
  text: And when Aaron sets up the lamps at twilight, he shall burn it—regular incense—before
    the LORD throughout your generations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''between the evenings,'' an idiom for the twilight/evening period.'
    reason: lexical_alternative
  - marker: b
    text: Or 'continual incense.' The Hebrew term can emphasize ongoing regularity
      or perpetuity in the prescribed offering.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְהַעֲלֹת
  chosen: And when ... sets up
  alternatives:
  - and when ... lights
  - and when ... causes to ascend
  lexicon: HALOT
  rationale: The preposition with infinitive construct introduces a temporal clause,
    'and when.' The Hiphil of עלה with lamps can denote causing the flame to go up,
    hence 'light,' but in tabernacle context it can also mean arranging or setting
    up the lamps for burning. 'Sets up' preserves the ritual nuance without overcommitting
    to ignition alone.
- source_word: הַנֵּרֹת
  chosen: the lamps
  alternatives:
  - the lamps/flames
  lexicon: HALOT
  rationale: נֵרֹת is the standard term for lamps in the tabernacle furnishing context.
- source_word: בֵּין הָעַרְבַּיִם
  chosen: at twilight
  alternatives:
  - between the evenings
  - toward evening
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'between the evenings' and refers to
    the twilight/evening period. 'At twilight' gives clear modern English while reflecting
    the temporal sense. The more literal alternative is preserved in a footnote because
    it is a recognizable cultic expression.
- source_word: יַקְטִירֶנָּה
  chosen: he shall burn it
  alternatives:
  - he shall make it smoke
  - he shall offer it up in smoke
  lexicon: HALOT
  rationale: The Hiphil of קטר in sacrificial/incense contexts means to burn as an
    offering, often with the sense of producing smoke. The 3fs suffix refers to קְטֹרֶת,
    hence 'it.' 'Burn it' is natural English and fits incense-offering language.
- source_word: קְטֹרֶת
  chosen: incense
  alternatives:
  - incense offering
  lexicon: HALOT
  rationale: The noun denotes incense; the offering sense is implicit from the verb
    קטר.
- source_word: תָּמִיד
  chosen: regular
  alternatives:
  - continual
  - perpetual
  lexicon: HALOT
  rationale: תמיד often denotes regularity/continuity in cultic practice. Since the
    action occurs morning and twilight rather than unceasingly every moment, 'regular'
    communicates the prescribed ongoing recurrence more idiomatically than 'continual,'
    while the traditional alternative is worth preserving in a footnote.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי marks presence before God in cultic space. Per doctrine, יְהוָה
    is rendered 'the LORD' rather than a transliteration.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD.'
- source_word: לְדֹרֹתֵיכֶם
  chosen: throughout your generations
  alternatives:
  - for your generations
  - from generation to generation
  lexicon: HALOT
  rationale: This idiom marks an enduring ordinance across successive generations
    of Israel. 'Throughout your generations' is standard, clear English.
