theological_decisions:
- issue: Meaning of the holiness transferred by contact
  chosen_reading: The clause states that contact with these consecrated items renders
    the toucher holy, without specifying whether this holiness is beneficial, dangerous,
    or restricted by later qualifications.
  alternative_readings:
  - The toucher becomes holy in a positive consecratory sense
  - The toucher is brought into the sphere of holiness and therefore subject to its
    danger/restrictions
  rationale: The Hebrew simply says 'shall become holy.' The translation preserves
    that theological tension rather than importing an interpretive explanation from
    broader ritual theology.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
