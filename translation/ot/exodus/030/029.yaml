id: EXO.30.29
reference: Exodus 30:29
source:
  edition: WLC
  text: וְ/קִדַּשְׁתָּ֣ אֹתָ֔/ם וְ/הָי֖וּ קֹ֣דֶשׁ קָֽדָשִׁ֑ים כָּל הַ/נֹּגֵ֥עַ בָּ/הֶ֖ם
    יִקְדָּֽשׁ־׃
translation:
  text: You shall consecrate them, and they shall be most holy. Whatever touches them
    shall become holy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'shall be holy' or 'shall be consecrated.' The Hebrew
      may denote becoming holy through contact.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקִדַּשְׁתָּ
  chosen: You shall consecrate
  alternatives:
  - you shall sanctify
  - you shall make holy
  lexicon: HALOT
  rationale: קדשׁ in the Piel commonly means to consecrate or set apart as holy. 'Consecrate'
    is natural modern English in cultic context and preserves the formal sense better
    than the more archaic 'sanctify'.
- source_word: אֹתָם
  chosen: them
  rationale: Direct object pronoun referring back to the tabernacle furnishings and
    related items in the immediate context.
- source_word: וְהָיוּ
  chosen: and they shall be
  alternatives:
  - and they will be
  lexicon: HALOT
  rationale: Simple copular/resultative clause following the consecration action;
    future English fits the instructional sequence.
- source_word: קֹדֶשׁ קָדָשִׁים
  chosen: most holy
  alternatives:
  - holy of holies
  - most holy thing(s)
  lexicon: HALOT
  rationale: The Hebrew superlative construction literally 'holiness of holinesses'
    denotes the highest degree of holiness. 'Most holy' is idiomatic English and fits
    predicative use here better than the more spatial-sounding 'holy of holies.'
- source_word: כָּל
  chosen: Whatever
  alternatives:
  - everyone who
  - anything that
  - all who
  lexicon: HALOT
  rationale: With the participle 'the one touching,' the phrase is generic. 'Whatever'
    preserves the broad, non-person-specific scope, especially since the referent
    may include persons or objects.
- source_word: הַנֹּגֵעַ
  chosen: touches
  alternatives:
  - comes into contact with
  - the one touching
  lexicon: HALOT
  rationale: נגע means to touch or make contact. A finite English verb after 'whatever'
    yields natural syntax while preserving the participial sense.
- source_word: בָּהֶם
  chosen: them
  alternatives:
  - these things
  rationale: Preposition plus pronoun referring to the consecrated objects just mentioned.
- source_word: יִקְדָּשׁ
  chosen: shall become holy
  alternatives:
  - shall be holy
  - shall be consecrated
  lexicon: HALOT
  rationale: 'The Qal imperfect of קדשׁ here is best taken as inchoative/resultative:
    the one or thing touching becomes holy. ''Shall become holy'' makes the change-of-state
    explicit and avoids implying merely recognized status.'
