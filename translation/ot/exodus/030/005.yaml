id: EXO.30.5
reference: Exodus 30:5
source:
  edition: WLC
  text: וְ/עָשִׂ֥יתָ אֶת הַ/בַּדִּ֖ים עֲצֵ֣י שִׁטִּ֑ים וְ/צִפִּיתָ֥ אֹתָ֖/ם זָהָֽב־׃
translation:
  text: And you shall make the poles of acacia wood and overlay them with gold.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: And you shall make
  alternatives:
  - And make
  - You are to make
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional context functions
    as a directive in sequence; English future-like 'shall' preserves the prescriptive
    force and continuity with surrounding tabernacle instructions.
- source_word: הַבַּדִּים
  chosen: the poles
  alternatives:
  - the carrying poles
  - the staves
  lexicon: HALOT
  rationale: בַּד in tabernacle contexts refers to poles used for carrying sacred
    furniture. 'Poles' is clear modern English; 'staves' is traditional but archaic.
- source_word: עֲצֵי שִׁטִּים
  chosen: of acacia wood
  alternatives:
  - of acacia
  - of shittim wood
  lexicon: HALOT
  rationale: Construct phrase literally 'woods of acacia.' 'Acacia wood' is the standard
    natural English rendering. 'Shittim wood' merely transliterates and is less accessible.
- source_word: וְצִפִּיתָ
  chosen: and overlay
  alternatives:
  - and cover
  - and plate
  lexicon: HALOT
  rationale: The verb צפה in this craftsmanship context means to overlay or plate
    with a material. 'Overlay' best captures the manufacturing sense without sounding
    overly technical.
- source_word: אֹתָם
  chosen: them
  rationale: Direct-object pronoun referring back to the poles; straightforward pronominal
    rendering.
- source_word: זָהָב
  chosen: with gold
  alternatives:
  - gold
  - in gold
  lexicon: HALOT
  rationale: English idiom with verbs like 'overlay' normally supplies 'with' to express
    the material used, though the Hebrew simply places 'gold' as the material object/complement.
