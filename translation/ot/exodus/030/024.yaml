id: EXO.30.24
reference: Exodus 30:24
source:
  edition: WLC
  text: וְ/קִדָּ֕ה חֲמֵ֥שׁ מֵא֖וֹת בְּ/שֶׁ֣קֶל הַ/קֹּ֑דֶשׁ וְ/שֶׁ֥מֶן זַ֖יִת הִֽין׃
translation:
  text: and cassia, five hundred shekels by the sanctuary shekel, and a hin of olive
    oil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A hin was an ancient liquid measure; many estimate it at roughly 3.5 to
      4 liters (about 1 gallon).
    reason: cultural_note
lexical_decisions:
- source_word: קִדָּה
  chosen: cassia
  alternatives:
  - aromatic bark
  - cassia bark
  lexicon: HALOT
  rationale: קִדָּה denotes cassia, an aromatic spice/bark used in perfuming. 'Cassia'
    is the standard concise English equivalent and fits the ingredient list context.
- source_word: חֲמֵשׁ מֵאוֹת
  chosen: five hundred
  rationale: Straightforward cardinal number modifying the amount of cassia.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  chosen: by the sanctuary shekel
  alternatives:
  - according to the sanctuary shekel
  - in sanctuary shekels
  lexicon: HALOT
  rationale: The phrase specifies the standard of weight measurement. 'By the sanctuary
    shekel' is natural English while preserving the sense that the amount is reckoned
    according to the sacred standard.
- source_word: שֶׁמֶן זַיִת
  chosen: olive oil
  alternatives:
  - oil of olive
  - olive oil
  lexicon: HALOT
  rationale: This construct phrase idiomatically means 'olive oil.' The smoother English
    expression is preferred in keeping with optimal equivalence.
- source_word: הִין
  chosen: a hin
  lexicon: HALOT
  rationale: הִין is an ancient liquid measure. Retaining 'hin' preserves the specific
    unit rather than replacing it with an approximate modern equivalent.
- source_word: וְ
  chosen: and
  rationale: The conjunction links this item with the preceding ingredients in the
    recipe and should be preserved.
