id: EXO.30.35
reference: Exodus 30:35
source:
  edition: WLC
  text: וְ/עָשִׂ֤יתָ אֹתָ/הּ֙ קְטֹ֔רֶת רֹ֖קַח מַעֲשֵׂ֣ה רוֹקֵ֑חַ מְמֻלָּ֖ח טָה֥וֹר
    קֹֽדֶשׁ׃
translation:
  text: And you shall make it into incense, a perfume blended by the work of a perfumer,
    salted, pure, holy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a compound perfume' or 'an aromatic mixture.' The Hebrew emphasizes
      a carefully blended aromatic preparation.
    reason: lexical_alternative
  - marker: b
    text: Or 'seasoned with salt' or 'mixed with salt.'
    reason: lexical_alternative
  - marker: c
    text: Or 'sacred.' The Hebrew simply says 'holy,' not 'most holy' in this verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: And you shall make
  alternatives:
  - And you are to make
  - And make
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional context functions
    as an imperative/future command. 'You shall make' preserves the legal-instructional
    tone in natural English.
- source_word: אֹתָהּ
  chosen: it
  alternatives:
  - this
  - it [feminine, referring to the mixture]
  lexicon: HALOT
  rationale: Direct-object pronoun refers back to the compounded ingredients of the
    previous verse. English does not mark the feminine pronoun here, so 'it' is the
    natural rendering.
- source_word: קְטֹרֶת
  chosen: incense
  alternatives:
  - incense offering
  - fumigation
  lexicon: HALOT
  rationale: The noun denotes incense, specifically the sacred aromatic mixture to
    be burned. 'Incense' is the standard and contextually precise English term.
- source_word: רֹקַח
  chosen: a perfume blended
  alternatives:
  - a compound perfume
  - spiced mixture
  - an aromatic mixture
  lexicon: HALOT
  rationale: This noun is related to compounding/perfuming. Rendering it with 'perfume
    blended' brings out the crafted aromatic nature of the incense while fitting the
    appositional structure with the following phrase.
- source_word: מַעֲשֵׂה רוֹקֵחַ
  chosen: by the work of a perfumer
  alternatives:
  - the work of a perfumer
  - according to the art of the perfumer
  - skillfully mixed
  lexicon: HALOT
  rationale: Literally 'work of a perfumer/mixer.' The phrase describes skilled craftsmanship.
    'By the work of a perfumer' keeps the formal sense while remaining readable.
- source_word: מְמֻלָּח
  chosen: salted
  alternatives:
  - seasoned with salt
  - mixed with salt
  lexicon: HALOT
  rationale: The passive participle from the salt-related root most naturally means
    'salted' or 'seasoned with salt.' 'Salted' is concise and preserves the concrete
    lexical sense.
- source_word: טָהוֹר
  chosen: pure
  alternatives:
  - clean
  lexicon: HALOT
  rationale: In cultic/material context, 'pure' better conveys ritual and material
    purity than the more ordinary 'clean.'
- source_word: קֹדֶשׁ
  chosen: holy
  alternatives:
  - sacred
  - most holy
  lexicon: HALOT
  rationale: The adjective-like predicate here marks the incense as set apart for
    sacred use. 'Holy' is the most direct rendering. 'Most holy' would overtranslate,
    since the Hebrew here is simply 'holy,' though the broader context stresses its
    special sanctity.
