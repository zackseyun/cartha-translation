- issue: Cultic status of the incense
  chosen_reading: holy
  alternative_readings:
  - sacred
  - most holy
  rationale: The Hebrew says 'holy' without the superlative construction. To avoid
    importing a stronger doctrinal/cultic category than this verse explicitly states,
    the main text keeps 'holy.'
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve source text''s plain sense.'
