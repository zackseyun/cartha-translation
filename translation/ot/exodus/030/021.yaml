theological_decisions:
- issue: Duration of cultic statute expressed by חָק עוֹלָם
  chosen_reading: permanent statute
  alternative_readings:
  - everlasting statute
  - perpetual statute
  rationale: The Hebrew legal formula indicates enduring covenantal obligation within
    Israel's worship system. 'Permanent' preserves the force while avoiding importing
    a philosophical claim about unending practice beyond the covenantal frame. This
    follows the translation philosophy of readable modern English and preserving the
    source's scope without overstatement.
  doctrine_reference: Translation philosophy §§1, 3, 6
