id: EXO.30.21
reference: Exodus 30:21
source:
  edition: WLC
  text: וְ/רָחֲצ֛וּ יְדֵי/הֶ֥ם וְ/רַגְלֵי/הֶ֖ם וְ/לֹ֣א יָמֻ֑תוּ וְ/הָיְתָ֨ה לָ/הֶ֧ם
    חָק עוֹלָ֛ם ל֥/וֹ וּ/לְ/זַרְע֖/וֹ לְ/דֹרֹתָֽ/ם־׃פ
translation:
  text: They shall wash their hands and their feet, so that they may not die. This
    shall be a permanent statute for them, for him and for his offspring throughout
    their generations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everlasting statute' or 'perpetual statute.' The Hebrew phrase is חָק
      עוֹלָם, a standard legal formula for an enduring ordinance.
    reason: lexical_alternative
  - marker: b
    text: '''For him'' refers to Aaron in the immediate context.'
    reason: cross_reference
lexical_decisions:
- source_word: וְרָחֲצוּ
  chosen: they shall wash
  alternatives:
  - and they shall wash
  - they must wash
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in legal/instructional context
    functions with injunctive/future force. 'They shall wash' fits English legislative
    style and preserves the command-like sense without over-paraphrasing.
- source_word: יְדֵיהֶם
  chosen: their hands
  lexicon: HALOT
  rationale: Straightforward plural construct with 3mp suffix; rendered literally.
- source_word: וְרַגְלֵיהֶם
  chosen: and their feet
  lexicon: HALOT
  rationale: Literal rendering of the coordinated body part phrase; preserves the
    ritual specificity.
- source_word: וְלֹא יָמֻתוּ
  chosen: so that they may not die
  alternatives:
  - and they will not die
  - lest they die
  lexicon: HALOT
  rationale: In this ritual-law context the clause expresses purpose/result tied to
    obedience. 'So that they may not die' communicates the consequence clearly in
    modern English. 'Lest they die' is more formal but less natural; 'and they will
    not die' could sound merely predictive rather than warning-oriented.
- source_word: וְהָיְתָה לָהֶם
  chosen: This shall be for them
  alternatives:
  - and it shall be for them
  - it shall become for them
  lexicon: HALOT
  rationale: Idiomatic English requires an explicit subject supplied from context
    ('this'), referring to the ordinance just described. This is standard and does
    not add content beyond what the Hebrew implies.
- source_word: חָק
  chosen: statute
  alternatives:
  - decree
  - prescription
  - ordinance
  lexicon: HALOT
  rationale: '''Statute'' is a strong fit for cultic/legal prescription and is a common,
    accurate English equivalent for חָק in Torah contexts.'
- source_word: עוֹלָם
  chosen: permanent
  alternatives:
  - everlasting
  - forever
  - perpetual
  lexicon: HALOT
  rationale: עוֹלָם in legal formulae often denotes enduring or perpetual duration
    within covenantal/institutional context. 'Permanent' is clear modern English and
    avoids overstating metaphysical endlessness while preserving the force of the
    statute.
- source_word: לּוֹ
  chosen: for him
  alternatives:
  - for Aaron
  - for it
  lexicon: HALOT
  rationale: The singular pronominal suffix most naturally refers back to Aaron from
    the previous verse. Rendering the pronoun as 'for him' preserves the Hebrew form;
    the referent is contextually Aaron.
- source_word: וּלְזַרְעוֹ
  chosen: and for his offspring
  alternatives:
  - and for his seed
  - and for his descendants
  lexicon: HALOT
  rationale: זֶרַע with suffix refers to progeny/lineage. 'Offspring' is natural modern
    English and preserves the collective singular sense better than 'descendants'
    while avoiding the less idiomatic 'seed' in main text.
- source_word: לְדֹרֹתָם
  chosen: throughout their generations
  alternatives:
  - for their generations
  - from generation to generation
  lexicon: HALOT
  rationale: This is the standard idiomatic rendering of the Hebrew phrase in legal/covenantal
    contexts, expressing continuity across successive generations.
