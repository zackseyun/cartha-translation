id: EXO.30.13
reference: Exodus 30:13
source:
  edition: WLC
  text: זֶ֣ה יִתְּנ֗וּ כָּל הָ/עֹבֵר֙ עַל הַ/פְּקֻדִ֔ים מַחֲצִ֥ית הַ/שֶּׁ֖קֶל בְּ/שֶׁ֣קֶל הַ/קֹּ֑דֶשׁ עֶשְׂרִ֤ים גֵּרָה֙ הַ/שֶּׁ֔קֶל מַחֲצִ֣ית הַ/שֶּׁ֔קֶל תְּרוּמָ֖ה לַֽ/יהוָֽה׀־־׃
translation:
  text: 'This is what everyone who passes over to those who are numbered shall give: half a shekel according to the sanctuary shekel (the shekel is twenty gerahs), half a shekel as an offering to Yahweh.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everyone who passes among those registered'; the Hebrew expression is a census idiom for those entering the official count.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה
  chosen: This is what
  alternatives:
  - This
  - This shall be
  lexicon: HALOT
  rationale: Introduces the required payment with a demonstrative formula. 'This is what' is natural English and preserves the deictic force better than a bare 'This'.
- source_word: יִתְּנוּ
  chosen: shall give
  alternatives:
  - must give
  - are to give
  lexicon: HALOT
  rationale: Imperfect here expresses prescribed action in legal instruction. 'Shall give' preserves the directive force without sounding overly paraphrastic.
- source_word: כָּל הָעֹבֵר עַל הַפְּקֻדִים
  chosen: everyone who is counted among those registered
  alternatives:
  - everyone who passes over to those numbered
  - everyone who passes among those enrolled
  - everyone who is numbered
  lexicon: HALOT
  rationale: Literally 'everyone passing over the counted/registered ones,' an idiom in census contexts for those entering the count. 'Is counted among those registered' communicates the census setting clearly in modern English while staying close to the Hebrew sense.
- source_word: מַחֲצִית הַשֶּׁקֶל
  chosen: half a shekel
  alternatives:
  - a half-shekel
  lexicon: HALOT
  rationale: Standard and clear rendering of the monetary amount.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  chosen: according to the sanctuary shekel
  alternatives:
  - by the sanctuary shekel
  - in the shekel of the sanctuary
  - by the holy shekel
  lexicon: HALOT
  rationale: The beth marks standard or measure. 'According to the sanctuary shekel' conveys that the amount is reckoned by the sanctuary standard. 'Sanctuary shekel' is preferable to 'holy shekel,' which could sound adjectival rather than technical.
- source_word: עֶשְׂרִים גֵּרָה הַשֶּׁקֶל
  chosen: the shekel is twenty gerahs
  alternatives:
  - twenty gerahs make a shekel
  - a shekel is twenty gerahs
  lexicon: HALOT
  rationale: This parenthetical clause defines the standard unit. The chosen wording is straightforward and preserves the explanatory function.
- source_word: תְּרוּמָה לַיהוָה
  chosen: as an offering to the LORD
  alternatives:
  - a contribution to the LORD
  - a heave offering to the LORD
  - an offering for the LORD
  lexicon: HALOT
  rationale: תְּרוּמָה denotes a contribution/offering set apart for God. 'Offering' is accessible modern English; 'contribution' is possible but weaker cultically, and 'heave offering' is too technical here. 'The LORD' follows the project's default for YHWH.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
