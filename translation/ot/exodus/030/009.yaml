id: EXO.30.9
reference: Exodus 30:9
source:
  edition: WLC
  text: לֹא תַעֲל֥וּ עָלָ֛י/ו קְטֹ֥רֶת זָרָ֖ה וְ/עֹלָ֣ה וּ/מִנְחָ֑ה וְ/נֵ֕סֶךְ לֹ֥א
    תִסְּכ֖וּ עָלָֽי/ו־׃
translation:
  text: You shall not offer unauthorized incense on it, or a burnt offering, or a
    grain offering; and you shall not pour out a drink offering on it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'strange incense' or 'foreign incense.' The Hebrew adjective can mean
      something outside what is permitted or prescribed in this cultic context.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַעֲלוּ
  chosen: offer
  alternatives:
  - bring up
  - cause to ascend
  lexicon: HALOT
  rationale: The Hiphil of עלה literally means 'cause to go up/ascend,' but in sacrificial
    contexts it idiomatically means to offer up on an altar. 'Offer' gives the cultic
    sense in clear English without over-literal awkwardness.
- source_word: עָלָיו
  chosen: on it
  alternatives:
  - upon it
  lexicon: HALOT
  rationale: Refers to the altar of incense in context. 'On it' is natural modern
    English and preserves the spatial relation.
- source_word: קְטֹרֶת
  chosen: incense
  alternatives:
  - incense offering
  lexicon: HALOT
  rationale: The noun denotes incense; 'incense' is sufficient here because the sacrificial
    setting already implies offering language from the verb.
- source_word: זָרָה
  chosen: unauthorized
  alternatives:
  - strange
  - foreign
  - profane
  lexicon: HALOT
  rationale: In priestly/cultic contexts זָר often denotes that which is outside what
    is prescribed or permitted, not necessarily ethnically foreign. 'Unauthorized'
    best captures the legal-cultic force for modern readers. Traditional 'strange'
    is less clear in contemporary English.
- source_word: וְעֹלָה
  chosen: or a burnt offering
  alternatives:
  - and a burnt offering
  lexicon: HALOT
  rationale: 'The conjunction links prohibited items in a negative command. English
    idiom naturally uses ''or'' in such a prohibition: do not offer X, or Y, or Z.
    ''Burnt offering'' is the standard and accurate cultic term for עֹלָה.'
- source_word: וּמִנְחָה
  chosen: or a grain offering
  alternatives:
  - or an offering
  - or a tribute offering
  lexicon: HALOT
  rationale: In priestly sacrificial contexts מִנְחָה commonly denotes the cereal/grain
    offering. 'Grain offering' is more precise here than the broader 'offering' or
    'tribute'.
- source_word: וְנֵסֶךְ
  chosen: a drink offering
  alternatives:
  - a libation
  lexicon: HALOT
  rationale: נֵסֶךְ refers to a poured liquid offering. 'Drink offering' is standard,
    clear English; 'libation' is accurate but less accessible.
- source_word: תִסְּכוּ
  chosen: pour out
  alternatives:
  - pour
  - libate
  lexicon: HALOT
  rationale: The verb נסך in this context means to pour out a drink offering. 'Pour
    out' makes the ritual action explicit and idiomatic in English.
