theological_decisions:
- issue: Cultic status of זָרָה modifying incense
  chosen_reading: unauthorized incense
  alternative_readings:
  - strange incense
  - foreign incense
  rationale: The verse regulates proper worship on the incense altar. Rendering זָרָה
    as 'unauthorized' preserves the priestly concern for what is not prescribed, without
    implying merely ethnic foreignness. This avoids importing a narrower or misleading
    sense while retaining the prohibition's force.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
