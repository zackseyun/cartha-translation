theological_decisions:
- issue: Rendering of אֲרוֹן הָעֵדֻת
  chosen_reading: the ark of the testimony
  alternative_readings:
  - the ark of the covenant
  - the ark of the witness
  rationale: The Hebrew here explicitly uses 'testimony,' not 'covenant.' While 'ark
    of the covenant' is familiar from other passages and traditions, this verse should
    reflect the actual lexical choice of the source text. 'Witness' is possible but
    less idiomatic in this cultic formula.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Consistency of key terms, or documented exception.'
