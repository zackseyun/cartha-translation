id: EXO.30.26
reference: Exodus 30:26
source:
  edition: WLC
  text: וּ/מָשַׁחְתָּ֥ ב֖/וֹ אֶת אֹ֣הֶל מוֹעֵ֑ד וְ/אֵ֖ת אֲר֥וֹן הָ/עֵדֻֽת־׃
translation:
  text: With it you shall anoint the tent of meeting and the ark of the testimony,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the ark of the covenant'; the Hebrew here reads
      'the testimony.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּמָשַׁחְתָּ
  chosen: you shall anoint
  alternatives:
  - and you shall anoint
  - you must anoint
  lexicon: HALOT
  rationale: Qal perfect 2ms with prefixed conjunction in instructional sequence functions
    as a future/modal command in English. 'Anoint' is the standard and precise cultic
    rendering for משׁח.
- source_word: בּוֹ
  chosen: with it
  alternatives:
  - with this
  - by it
  lexicon: HALOT
  rationale: Preposition ב plus 3ms suffix refers back to the anointing oil in the
    preceding context. 'With it' is the most natural English rendering and preserves
    the instrumental sense.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  - the tent of appointment
  lexicon: HALOT
  rationale: Established but source-faithful rendering of the tabernacle designation.
    'Tent of meeting' best captures the construct phrase without unnecessary paraphrase.
- source_word: אֲרוֹן
  chosen: the ark
  alternatives:
  - the chest
  - the coffer
  lexicon: HALOT
  rationale: In tabernacle context, 'ark' is the conventional and accurate rendering
    for the sacred chest; alternatives are more wooden and less recognizable.
- source_word: הָעֵדֻת
  chosen: the testimony
  alternatives:
  - the covenant decree
  - the witness
  lexicon: HALOT
  rationale: עדות in this cultic context refers to the covenantal testimony associated
    with the ark. 'Testimony' is the most direct formal equivalent and preserves the
    traditional biblical sense without over-interpreting.
