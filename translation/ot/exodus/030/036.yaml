id: EXO.30.36
reference: Exodus 30:36
source:
  edition: WLC
  text: וְ/שָֽׁחַקְתָּ֣ מִמֶּ/נָּה֮ הָדֵק֒ וְ/נָתַתָּ֨ה מִמֶּ֜/נָּה לִ/פְנֵ֤י הָ/עֵדֻת֙
    בְּ/אֹ֣הֶל מוֹעֵ֔ד אֲשֶׁ֛ר אִוָּעֵ֥ד לְ/ךָ֖ שָׁ֑מָּ/ה קֹ֥דֶשׁ קָֽדָשִׁ֖ים תִּהְיֶ֥ה
    לָ/כֶֽם׃
translation:
  text: And you shall grind some of it very fine, and put some of it before the testimony
    in the tent of meeting, where I will meet with you. It shall be most holy for
    you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'holy of holies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁחַקְתָּ
  chosen: you shall grind
  alternatives:
  - you shall beat
  - you shall crush
  lexicon: HALOT
  rationale: שׁחק in this context refers to pulverizing the incense mixture into powder.
    'Grind' is natural modern English and fits the object better than the more literal
    but less idiomatic 'beat.'
- source_word: מִמֶּנָּה
  chosen: some of it
  alternatives:
  - from it
  lexicon: HALOT
  rationale: 'The preposition plus pronoun is partitive here: only a portion of the
    incense is to be ground and placed before the testimony. ''Some of it'' expresses
    the sense clearly in English.'
- source_word: הָדֵק
  chosen: very fine
  alternatives:
  - finely
  - into fine powder
  lexicon: HALOT
  rationale: 'The adverbial infinitive/absolute-like form intensifies the action:
    the incense is to be reduced to a very fine consistency. ''Very fine'' captures
    the result succinctly.'
- source_word: וְנָתַתָּה
  chosen: and put
  alternatives:
  - and place
  - and set
  lexicon: HALOT
  rationale: נתן is broad ('give/put/set'). In this ritual-placement context, 'put'
    is straightforward and idiomatic.
- source_word: לִפְנֵי הָעֵדֻת
  chosen: before the testimony
  alternatives:
  - before the covenant document
  - before the ark of the testimony
  lexicon: HALOT
  rationale: The Hebrew says 'the testimony,' a standard tabernacle term referring
    to the covenant testimony associated with the ark. The translation preserves the
    source wording rather than expanding interpretively to 'ark.'
- source_word: בְּאֹהֶל מוֹעֵד
  chosen: in the tent of meeting
  alternatives:
  - in the meeting tent
  - in the tabernacle
  lexicon: HALOT
  rationale: This is the standard rendering of the tabernacle designation and preserves
    the formal cultic term without unnecessary paraphrase.
- source_word: אֲשֶׁר אִוָּעֵד לְךָ שָׁמָּה
  chosen: where I will meet with you
  alternatives:
  - where I will make myself known to you
  - where I will appoint to meet with you
  lexicon: HALOT
  rationale: The Niphal of יעד here denotes appointed meeting. 'Where I will meet
    with you' is the clearest idiomatic rendering in context and matches the tabernacle
    theology of divine-human meeting.
- source_word: קֹדֶשׁ קָדָשִׁים
  chosen: most holy
  alternatives:
  - holy of holies
  - supremely holy
  lexicon: HALOT
  rationale: The Hebrew superlative construction denotes the highest degree of holiness.
    For the incense itself, 'most holy' is idiomatic English; 'holy of holies' is
    more naturally used for the sanctuary space.
- source_word: תִּהְיֶה לָכֶם
  chosen: it shall be for you
  alternatives:
  - it shall belong to you
  - it shall be to you
  lexicon: HALOT
  rationale: The clause states the status of the incense with respect to Israel/the
    priests. 'It shall be for you' preserves the Hebrew relation without over-specifying
    possession.
