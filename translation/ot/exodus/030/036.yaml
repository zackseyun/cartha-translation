theological_decisions:
- issue: Referent of 'the testimony'
  chosen_reading: Retain the literal cultic term 'the testimony' rather than interpretively
    substituting 'the ark' or 'the tablets.'
  alternative_readings:
  - before the ark of the testimony
  - before the covenant tablets
  rationale: The Hebrew text names the testimony, not explicitly the ark or tablets.
    Preserving the source term avoids importing a narrower referent than the verse
    states while still fitting the tabernacle context.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering of the holiness superlative
  chosen_reading: Translate קֹדֶשׁ קָדָשִׁים as 'most holy' in the main text.
  alternative_readings:
  - holy of holies
  rationale: '''Most holy'' communicates the superlative force in readable modern
    English. The alternative is preserved in a footnote because it is a familiar traditional
    rendering and may be recognized by readers.'
  doctrine_reference: Translation philosophy §6
