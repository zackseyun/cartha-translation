id: EXO.30.4
reference: Exodus 30:4
source:
  edition: WLC
  text: וּ/שְׁתֵּי֩ טַבְּעֹ֨ת זָהָ֜ב תַּֽעֲשֶׂה לּ֣/וֹ מִ/תַּ֣חַת לְ/זֵר֗/וֹ עַ֚ל
    שְׁתֵּ֣י צַלְעֹתָ֔י/ו תַּעֲשֶׂ֖ה עַל שְׁנֵ֣י צִדָּ֑י/ו וְ/הָיָה֙ לְ/בָתִּ֣ים לְ/בַדִּ֔ים
    לָ/שֵׂ֥את אֹת֖/וֹ בָּ/הֵֽמָּה־׀־׃
translation:
  text: And you shall make two gold rings for it under its molding; on its two side
    panels you shall make them, on its two sides, and they shall be holders for poles
    with which to carry it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under its border' or 'beneath its rim'; the Hebrew זֵר refers to the
      decorative edging around the altar.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'on its two side-structures ... on its two sides,' a somewhat repetitive
      description emphasizing placement on both sides.
    reason: lexical_alternative
  - marker: c
    text: Literally 'they shall be houses for poles,' meaning receptacles or holders
      for the carrying poles.
    reason: lexical_alternative
lexical_decisions:
- source_word: טַבְּעֹת זָהָב
  chosen: gold rings
  alternatives:
  - rings of gold
  lexicon: HALOT
  rationale: טַבַּעַת denotes a ring, here specifically attachment rings made of gold.
    'Gold rings' is natural English and preserves the material adjective.
- source_word: מִתַּחַת לְזֵרוֹ
  chosen: under its molding
  alternatives:
  - beneath its rim
  - under its border
  lexicon: HALOT
  rationale: זֵר refers to the decorative molding/border previously described on the
    altar. 'Molding' fits tabernacle-furnishing context better than the less specific
    'border' and is more natural than 'rim' while preserving the crafted feature.
- source_word: צַלְעֹתָיו
  chosen: side panels
  alternatives:
  - ribs
  - sides
  lexicon: HALOT
  rationale: צֵלָע can mean side, side-structure, or rib. In tabernacle/construction
    contexts it often refers to a structural side. 'Side panels' captures the crafted
    object more concretely than 'ribs' and more precisely than the generic 'sides'.
- source_word: עַל שְׁנֵי צִדָּיו
  chosen: on its two sides
  alternatives:
  - on both its sides
  lexicon: HALOT
  rationale: צַד means side. The phrase restates the bilateral placement of the rings.
    'On its two sides' closely follows the Hebrew while remaining readable.
- source_word: וְהָיָה לְבָתִּים לְבַדִּים
  chosen: they shall be holders for poles
  alternatives:
  - they shall serve as housings for the poles
  - they shall be places for poles
  lexicon: HALOT
  rationale: בָּתִּים literally 'houses' is idiomatic here for receptacles/holders.
    'Holders for poles' conveys function clearly in modern English without wooden
    literalism.
- source_word: בַדִּים
  chosen: poles
  alternatives:
  - staves
  lexicon: HALOT
  rationale: בַּד in tabernacle transport contexts refers to carrying poles. 'Poles'
    is modern and clear; 'staves' is traditional but archaic.
- source_word: לָשֵׂאת אֹתוֹ בָּהֵמָּה
  chosen: with which to carry it
  alternatives:
  - to carry it by them
  lexicon: HALOT
  rationale: The infinitive plus pronoun expresses purpose, and בָּהֵמָּה refers to
    the poles as the means. English idiom is best captured by 'with which to carry
    it,' preserving the instrumental sense.
- source_word: תַּעֲשֶׂה ... תַּעֲשֶׂה
  chosen: you shall make ... you shall make
  alternatives:
  - make ... make
  lexicon: HALOT
  rationale: The repeated second masculine singular imperfect in instruction style
    is naturally rendered 'you shall make,' preserving the formal directive tone and
    the repetition present in Hebrew.
