id: EXO.30.10
reference: Exodus 30:10
source:
  edition: WLC
  text: וְ/כִפֶּ֤ר אַהֲרֹן֙ עַל קַרְנֹתָ֔י/ו אַחַ֖ת בַּ/שָּׁנָ֑ה מִ/דַּ֞ם חַטַּ֣את
    הַ/כִּפֻּרִ֗ים אַחַ֤ת בַּ/שָּׁנָה֙ יְכַפֵּ֤ר עָלָי/ו֙ לְ/דֹרֹ֣תֵי/כֶ֔ם קֹֽדֶשׁ
    קָֽדָשִׁ֥ים ה֖וּא לַ/יהוָֽה־־׃פ
translation:
  text: Aaron shall make atonement on its horns once a year. With the blood of the
    sin offering of atonements he shall make atonement for it once a year throughout
    your generations. It is most holy to the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the blood of the sin offering for atonement.' The Hebrew phrase
      is literally 'from the blood of the sin offering of atonements.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִפֶּר / יְכַפֵּר
  chosen: shall make atonement
  alternatives:
  - shall purge
  - shall cleanse
  - shall cover
  lexicon: HALOT
  rationale: The verb כפר in priestly sacrificial contexts refers to performing the
    rite of atonement, not merely a general covering. 'Make atonement' is the most
    established and semantically fitting English rendering here, while remaining understandable.
- source_word: קַרְנֹתָיו
  chosen: its horns
  alternatives:
  - his horns
  lexicon: HALOT
  rationale: The suffix refers to the altar of incense described in the immediate
    context, an inanimate masculine noun in Hebrew. English idiom prefers 'its' for
    the altar.
- source_word: אַחַת בַּשָּׁנָה
  chosen: once a year
  alternatives:
  - one time in the year
  - once in the year
  lexicon: HALOT
  rationale: This is the natural English equivalent of the Hebrew distributive expression
    and preserves the ritual frequency clearly.
- source_word: מִדַּם
  chosen: with the blood
  alternatives:
  - from the blood
  - using the blood
  lexicon: HALOT
  rationale: Although the preposition is literally 'from,' in sacrificial-instrumental
    context English idiom is best expressed as 'with the blood,' indicating the means
    by which atonement is made.
- source_word: חַטַּאת
  chosen: sin offering
  alternatives:
  - sin
  - purification offering
  lexicon: HALOT
  rationale: In cultic contexts חטאת commonly denotes the offering rather than abstract
    sin. 'Sin offering' is the clearest conventional rendering. 'Purification offering'
    is possible, but the immediate construction with blood and atonement fits the
    established sacrificial term.
- source_word: הַכִּפֻּרִים
  chosen: of atonements
  alternatives:
  - of atonement
  - for atonement
  lexicon: HALOT
  rationale: The plural form is retained in a woodenly transparent way within the
    phrase 'sin offering of atonements' to reflect the Hebrew expression without over-paraphrasing.
    In English the phrase remains intelligible, though somewhat formal.
- source_word: לְדֹרֹתֵיכֶם
  chosen: throughout your generations
  alternatives:
  - for your generations
  - from generation to generation
  lexicon: HALOT
  rationale: This is the standard idiomatic rendering for an enduring ordinance applying
    across successive generations of Israel.
- source_word: קֹדֶשׁ קָדָשִׁים
  chosen: most holy
  alternatives:
  - holy of holies
  - a holiness of holinesses
  lexicon: HALOT
  rationale: The Hebrew superlative construction denotes the highest degree of holiness.
    'Most holy' is clear modern English. 'Holy of holies' in English can be mistaken
    for the inner sanctuary rather than a holiness classification.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  - belonging to the LORD
  lexicon: HALOT
  rationale: Following the project's default for יהוה, the divine name is rendered
    'the LORD.' The preposition here marks relation/dedication; 'to the LORD' is concise
    and natural.
