theological_decisions:
- issue: Rendering of cultic term הַכַּפֹּרֶת
  chosen_reading: the mercy seat
  alternative_readings:
  - the atonement cover
  rationale: The Hebrew denotes the cover of the ark with atoning significance. 'Mercy
    seat' preserves the established cultic referent without forcing a narrower doctrinal
    explanation into the main text. Because modern readers may not know the term,
    a lexical alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Rendering of עֵדוּת in ark formula
  chosen_reading: testimony
  alternative_readings:
  - covenant
  rationale: The verse says 'testimony' twice. Using 'covenant' would reflect translation
    tradition rather than the plain Hebrew. The choice preserves lexical transparency
    and avoids importing a different term.
  doctrine_reference: Translation philosophy §§1, 5
