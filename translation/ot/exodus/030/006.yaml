id: EXO.30.6
reference: Exodus 30:6
source:
  edition: WLC
  text: וְ/נָתַתָּ֤ה אֹת/וֹ֙ לִ/פְנֵ֣י הַ/פָּרֹ֔כֶת אֲשֶׁ֖ר עַל אֲרֹ֣ן הָ/עֵדֻ֑ת לִ/פְנֵ֣י
    הַ/כַּפֹּ֗רֶת אֲשֶׁר֙ עַל הָ֣/עֵדֻ֔ת אֲשֶׁ֛ר אִוָּעֵ֥ד לְ/ךָ֖ שָֽׁמָּ/ה־־׃
translation:
  text: And you shall place it in front of the veil that is before the ark of the
    testimony, in front of the mercy seat that is over the testimony, where I will
    meet with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the atonement cover.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the ark of the testimony' ... 'the testimony'; traditional English
      often has 'ark of the covenant,' but the word here is 'testimony.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתָּה
  chosen: And you shall place
  alternatives:
  - and you shall put
  - and you shall set
  lexicon: HALOT
  rationale: נתן is broad ('give/put/set'). In this cultic placement instruction,
    'place' is natural modern English and preserves the directive force without sounding
    wooden.
- source_word: לִפְנֵי
  chosen: in front of
  alternatives:
  - before
  lexicon: HALOT
  rationale: The phrase occurs twice in the verse. 'In front of' gives the spatial
    sense clearly in contemporary English; 'before' is possible but can sound either
    archaic or less explicitly locative.
- source_word: הַפָּרֹכֶת
  chosen: the veil
  alternatives:
  - the curtain
  lexicon: HALOT
  rationale: פרכת denotes the inner sanctuary screen. 'Veil' is the established and
    precise cultic term in English, while still understandable.
- source_word: אֲרֹן הָעֵדֻת
  chosen: the ark of the testimony
  alternatives:
  - the ark of the covenant
  lexicon: HALOT
  rationale: The Hebrew here is explicitly 'testimony,' not 'covenant.' To honor original-language
    primacy, the translation keeps 'testimony' rather than importing the more familiar
    traditional phrase.
- source_word: הַכַּפֹּרֶת
  chosen: the mercy seat
  alternatives:
  - the atonement cover
  lexicon: HALOT
  rationale: כפרת refers to the gold cover atop the ark. 'Mercy seat' is the standard
    English rendering and fits the tabernacle context. Although more explanatory renderings
    exist, this term remains widely recognized; the alternative is preserved in a
    footnote for transparency.
- source_word: הָעֵדֻת
  chosen: the testimony
  alternatives:
  - the covenant
  lexicon: HALOT
  rationale: As above, עדות is rendered consistently as 'testimony' in this verse.
    This avoids harmonizing to traditional wording not reflected in the Hebrew.
- source_word: אֲשֶׁר אִוָּעֵד לְךָ שָׁמָּה
  chosen: where I will meet with you
  alternatives:
  - where I will appoint to meet with you
  - where I will make myself known to you
  lexicon: HALOT
  rationale: The Niphal of יעד in this context conveys appointed meeting. 'Where I
    will meet with you' is idiomatic, clear, and faithful to the tabernacle setting.
    'There' is absorbed into 'where' in natural English.
