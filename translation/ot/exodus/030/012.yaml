theological_decisions:
- issue: Rendering of the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Meaning of נַפְשׁוֹ in the ransom formula
  chosen_reading: for his life
  alternative_readings:
  - for his soul
  - for himself
  rationale: To avoid importing later doctrinal assumptions about 'soul,' the term is rendered according to its contextual sense of life/personhood in a census-payment setting.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; do not import doctrinal claims the text does not make'
- issue: Gendered expression בְּנֵי יִשְׂרָאֵל / אִישׁ
  chosen_reading: the sons of Israel ... each man
  alternative_readings:
  - the Israelites ... each person
  rationale: The Hebrew uses masculine forms with representative force. Per project policy, gender-accurate renderings are preferred over flattening to gender-neutral language.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Gender-accurate over gender-neutral'
