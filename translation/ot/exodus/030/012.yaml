id: EXO.30.12
reference: Exodus 30:12
source:
  edition: WLC
  text: כִּ֣י תִשָּׂ֞א אֶת רֹ֥אשׁ בְּנֵֽי יִשְׂרָאֵ֘ל לִ/פְקֻדֵי/הֶם֒ וְ/נָ֨תְנ֜וּ אִ֣ישׁ כֹּ֧פֶר נַפְשׁ֛/וֹ לַ/יהוָ֖ה בִּ/פְקֹ֣ד אֹתָ֑/ם וְ/לֹא יִהְיֶ֥ה בָ/הֶ֛ם נֶ֖גֶף בִּ/פְקֹ֥ד אֹתָֽ/ם־־־׃
translation:
  text: When you take a census of the sons of Israel according to those numbered among them, then each man shall give to Yahweh a ransom for his life when you number them, so that there will be no plague among them when you number them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'lift up the head of the sons of Israel,' an idiom for taking a census.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Israelites.'
    reason: lexical_alternative
  - marker: c
    text: Or 'a ransom for himself'; Hebrew nephesh often means 'life' or 'self,' not only 'soul.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - If
  lexicon: HALOT
  rationale: Introduces a temporal/conditional circumstance. In this legal instruction, 'when' fits the expected occasion better than a more open-ended 'if.'
- source_word: תִשָּׂא אֶת רֹאשׁ
  chosen: take a census
  alternatives:
  - lift up the head of
  - count
  lexicon: HALOT
  rationale: The idiom literally means 'lift the head,' but in this administrative context it refers to numbering/census-taking. 'Take a census' communicates the idiomatic sense in natural English without obscuring the legal setting.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Retains the Hebrew familial expression with gender-accurate wording per project philosophy. 'Israelites' is possible, but 'sons of Israel' more closely reflects the source form.
- source_word: לִפְקֻדֵיהֶם
  chosen: according to those numbered among them
  alternatives:
  - for their numbering
  - when they are counted
  lexicon: HALOT
  rationale: The phrase is tied to the root פקד in a census/register sense. This rendering preserves the administrative nuance of enrollment/numbering while remaining readable.
- source_word: וְנָתְנוּ אִישׁ
  chosen: then each man shall give
  alternatives:
  - and each man shall give
  - then every man shall give
  lexicon: HALOT
  rationale: Distributive איש indicates each individual person in the counted group. 'Each man' preserves the singular distributive force and the masculine form of the Hebrew.
- source_word: כֹּפֶר
  chosen: a ransom
  alternatives:
  - atonement price
  - compensation
  - redemption payment
  lexicon: HALOT
  rationale: כפר here denotes a compensatory payment that averts judgment. 'Ransom' is the most established and semantically fitting English term in this context.
- source_word: נַפְשׁוֹ
  chosen: for his life
  alternatives:
  - for himself
  - for his soul
  lexicon: HALOT
  rationale: נפש in this context refers to the person's life/self rather than the later English theological sense of an immaterial 'soul.' 'For his life' best fits the census-ransom context.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Follows the project's default rendering of YHWH as 'the LORD.' The preposition here is naturally rendered 'to' with the giving/payment action.
- source_word: בִּפְקֹד אֹתָם
  chosen: when you number them
  alternatives:
  - when they are counted
  - in numbering them
  lexicon: HALOT
  rationale: Infinitive construct with preposition marks the time/circumstance of the payment. 'When you number them' is clear and preserves the repeated census terminology.
- source_word: נֶגֶף
  chosen: plague
  alternatives:
  - blow
  - affliction
  - stroke
  lexicon: HALOT
  rationale: In contexts of divine judgment, נגע/נגף language often denotes a plague or deadly outbreak. 'Plague' is idiomatic and fits the warning attached to the census.
- source_word: וְלֹא יִהְיֶה בָהֶם נֶגֶף
  chosen: so that there will be no plague among them
  alternatives:
  - and there shall be no plague among them
  lexicon: HALOT
  rationale: The clause expresses the intended result of the ransom payment. 'So that' makes the purpose/result relationship explicit in natural English.
