id: EXO.30.3
reference: Exodus 30:3
source:
  edition: WLC
  text: וְ/צִפִּיתָ֨ אֹת֜/וֹ זָהָ֣ב טָה֗וֹר אֶת גַּגּ֧/וֹ וְ/אֶת קִירֹתָ֛י/ו סָבִ֖יב
    וְ/אֶת קַרְנֹתָ֑י/ו וְ/עָשִׂ֥יתָ לּ֛/וֹ זֵ֥ר זָהָ֖ב סָבִֽיב־־־׃
translation:
  text: You shall overlay it with pure gold—its top, its sides all around, and its
    horns—and you shall make for it a gold molding all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a gold crown all around.' The Hebrew zer can denote a border, rim, or
      crown-like molding.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְצִפִּיתָ
  chosen: you shall overlay
  alternatives:
  - you shall cover
  - you shall plate
  lexicon: HALOT
  rationale: צפה in this construction refers to plating or overlaying an object with
    a material, not merely covering it loosely. 'Overlay' is standard, clear English
    for applying a metal surface.
- source_word: זָהָב טָהוֹר
  chosen: pure gold
  alternatives:
  - refined gold
  - clean gold
  lexicon: HALOT
  rationale: The phrase denotes gold of high purity. 'Pure gold' is the natural and
    established English equivalent and fits modern readability.
- source_word: גַּגּוֹ
  chosen: its top
  alternatives:
  - its roof
  lexicon: HALOT
  rationale: Although גג often means 'roof,' here the object is the altar of incense,
    a small furnishing, so 'top' better conveys the upper surface in idiomatic English.
- source_word: קִירֹתָיו
  chosen: its sides
  alternatives:
  - its walls
  lexicon: HALOT
  rationale: Literally 'its walls,' but for a small altar 'sides' is more natural
    English while preserving the sense of the vertical surfaces.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  lexicon: HALOT
  rationale: The adverb emphasizes encircling completeness. 'All around' preserves
    that force more clearly than the simpler 'around.'
- source_word: קַרְנֹתָיו
  chosen: its horns
  lexicon: HALOT
  rationale: The cultic term for the altar's projecting corner-horns should be retained
    literally; it is a significant tabernacle feature and should not be paraphrased
    away.
- source_word: וְעָשִׂיתָ לוֹ
  chosen: and you shall make for it
  alternatives:
  - and you shall make it
  lexicon: HALOT
  rationale: 'The preposition ל marks advantage or relation: a feature is to be made
    for the altar. ''Make for it'' reflects the Hebrew syntax more closely.'
- source_word: זֵר זָהָב
  chosen: a gold molding
  alternatives:
  - a gold rim
  - a gold border
  - a gold crown
  lexicon: HALOT
  rationale: זֵר denotes a decorative border or molding around sacred furniture. 'Molding'
    communicates the architectural/decorative feature without importing regal imagery
    too strongly; 'crown' is traditional but can mislead modern readers.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  lexicon: HALOT
  rationale: Repeated here to preserve the Hebrew repetition and the sense that the
    molding encircled the altar on every side.
