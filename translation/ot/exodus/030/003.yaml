theological_decisions:
- issue: Rendering of cultic furniture terminology
  chosen_reading: Retain literal 'horns' and render זֵר as 'molding' rather than 'crown.'
  alternative_readings:
  - Render זֵר as 'crown'
  rationale: The verse is descriptive of tabernacle construction, not making a theological
    claim about kingship. Keeping 'horns' preserves established sacrificial terminology,
    while 'molding' best fits the physical feature in accessible modern English. The
    traditional 'crown' is preserved in a footnote because it remains a plausible
    lexical alternative and appears in many translations.
  doctrine_reference: Translation philosophy §§1, 5, 6
