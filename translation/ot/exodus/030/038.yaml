theological_decisions:
- issue: Meaning of the penalty formula 'cut off from his people'
  chosen_reading: Retain the formal expression 'shall be cut off from his people'
    without defining whether it means death, excommunication, or divine judgment.
  alternative_readings:
  - shall be put to death
  - shall be excluded from the community
  - shall be removed by divine judgment
  rationale: The Hebrew legal formula is weighty but not always precise about mechanism.
    In keeping with the translation philosophy, the rendering preserves the theological
    and legal tension rather than resolving a debated interpretive question in the
    main text.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
