id: EXO.30.38
reference: Exodus 30:38
source:
  edition: WLC
  text: אִ֛ישׁ אֲשֶׁר יַעֲשֶׂ֥ה כָמ֖וֹ/הָ לְ/הָרִ֣יחַ בָּ֑/הּ וְ/נִכְרַ֖ת מֵ/עַמָּֽי/ו־׃ס
translation:
  text: Whoever makes any like it to smell it shall be cut off from his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to enjoy its fragrance' / 'to smell its aroma.' The Hebrew infinitive
      expresses making such incense for personal smelling or enjoyment.
    reason: lexical_alternative
  - marker: b
    text: '''Shall be cut off from his people'' is a standard legal formula. It may
      imply death, expulsion, or divine removal, depending on context.'
    reason: alternative_reading
lexical_decisions:
- source_word: אִישׁ
  chosen: Whoever
  alternatives:
  - A man who
  - Anyone who
  lexicon: HALOT
  rationale: Although the noun is literally 'man,' in this legal formulation it functions
    generically for any person meeting the condition. 'Whoever' preserves the representative
    force in natural English while matching the clause structure.
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - that
  lexicon: HALOT
  rationale: Relative particle introducing the conditional description; rendered idiomatically
    within 'Whoever ...'.
- source_word: יַעֲשֶׂה
  chosen: makes
  alternatives:
  - prepares
  - manufactures
  lexicon: HALOT
  rationale: The verb עשה is broad ('do/make'). In context of compounding incense,
    'makes' is the most direct and sufficiently natural rendering.
- source_word: כָמֹהָ
  chosen: any like it
  alternatives:
  - the same as it
  - something like it
  lexicon: HALOT
  rationale: Refers back to the sacred incense formula in the preceding context. 'Any
    like it' clearly conveys making a comparable mixture without over-specifying exact
    identity.
- source_word: לְהָרִיחַ
  chosen: to smell
  alternatives:
  - to enjoy its fragrance
  - to smell its aroma
  lexicon: HALOT
  rationale: Infinitive of ריח in the causative stem here expresses purpose related
    to smelling/enjoying the scent. 'To smell' is concise and close to the Hebrew;
    fuller idiomatic alternatives are possible but less formal.
- source_word: בָּהּ
  chosen: it
  alternatives:
  - in it
  - of it
  lexicon: HALOT
  rationale: The preposition with pronominal suffix is idiomatic with the smelling
    verb and points to the incense mixture. English expresses this naturally as the
    object 'it' after 'smell'.
- source_word: וְנִכְרַת
  chosen: shall be cut off
  alternatives:
  - will be cut off
  - shall be excluded
  lexicon: HALOT
  rationale: The Niphal of כרת in covenant/legal contexts is the standard formula
    for severe removal from the community. 'Shall be cut off' preserves the traditional
    and lexical force without prematurely specifying the exact mode of punishment.
- source_word: מֵעַמָּיו
  chosen: from his people
  alternatives:
  - from his kin
  - from his community
  lexicon: HALOT
  rationale: עם with suffix denotes one's people/community. 'From his people' is the
    standard legal phrasing in English Bible translation and fits the covenantal setting.
