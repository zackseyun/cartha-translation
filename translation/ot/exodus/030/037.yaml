id: EXO.30.37
reference: Exodus 30:37
source:
  edition: WLC
  text: וְ/הַ/קְּטֹ֨רֶת֙ אֲשֶׁ֣ר תַּעֲשֶׂ֔ה בְּ/מַ֨תְכֻּנְתָּ֔/הּ לֹ֥א תַעֲשׂ֖וּ לָ/כֶ֑ם קֹ֛דֶשׁ תִּהְיֶ֥ה לְ/ךָ֖ לַ/יהוָֽה׃
translation:
  text: And the incense that you make according to its composition, you shall not make for yourselves; it shall be holy to you for Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to its formula' or 'according to its proportions.'
    reason: lexical_alternative
  - marker: b
    text: That is, this sacred incense mixture was not to be reproduced for ordinary personal use.
    reason: cultural_note
lexical_decisions:
- source_word: הַקְּטֹרֶת
  chosen: the incense
  alternatives:
  - the fragrant incense
  lexicon: HALOT
  rationale: Refers specifically to the sacred incense mixture described in the immediate context. 'Incense' is the plain and natural English equivalent; adding 'fragrant' would overtranslate what is not explicit in this verse.
- source_word: אֲשֶׁר תַּעֲשֶׂה
  chosen: that you make
  alternatives:
  - which you shall make
  lexicon: HALOT
  rationale: A straightforward relative clause with the verb עשה. 'That you make' is idiomatic modern English while preserving the direct sense.
- source_word: בְּמַתְכֻּנְתָּהּ
  chosen: according to its composition
  alternatives:
  - according to its formula
  - in its proportion
  lexicon: HALOT
  rationale: מַתְכֹּנֶת in this context refers to the prescribed manner, proportion, or formula of compounding. 'Composition' preserves the idea of specified makeup without sounding overly technical; 'formula' is viable but can sound more modern-scientific.
- source_word: לֹא תַעֲשׂוּ לָכֶם
  chosen: you shall not make for yourselves
  alternatives:
  - you must not make for your own use
  - do not make any for yourselves
  lexicon: HALOT
  rationale: The plural verb with reflexive/dative phrase indicates prohibition against producing this incense for personal possession or use. 'For yourselves' keeps the wording close to the Hebrew and leaves the implied private use clear from context.
- source_word: קֹדֶשׁ
  chosen: holy
  alternatives:
  - set apart
  - most holy
  lexicon: HALOT
  rationale: The predicate noun denotes sacred status. 'Holy' is the standard and theologically weighty rendering. 'Set apart' captures part of the meaning but is less natural here; 'most holy' is not supported by the wording of this verse.
- source_word: תִּהְיֶה לְךָ
  chosen: it shall be holy to you
  alternatives:
  - it shall be holy for you
  - it shall belong to you as holy
  lexicon: HALOT
  rationale: 'The feminine singular verb agrees with ''incense.'' The phrase indicates how Israel/Moses is to regard it: as holy. ''Holy to you'' preserves the relational force without paraphrasing.'
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - to the LORD
  lexicon: HALOT
  rationale: Following project doctrine, יהוה is rendered 'the LORD.' The preposition marks dedication or belonging; 'for the LORD' fits the sense of consecration in context slightly better than 'to the LORD,' though both are possible.
