id: EXO.23.16
reference: Exodus 23:16
source:
  edition: WLC
  text: וְ/חַ֤ג הַ/קָּצִיר֙ בִּכּוּרֵ֣י מַעֲשֶׂ֔י/ךָ אֲשֶׁ֥ר תִּזְרַ֖ע בַּ/שָּׂדֶ֑ה
    וְ/חַ֤ג הָֽ/אָסִף֙ בְּ/צֵ֣את הַ/שָּׁנָ֔ה בְּ/אָסְפְּ/ךָ֥ אֶֽת מַעֲשֶׂ֖י/ךָ מִן
    הַ/שָּׂדֶֽה־־׃
translation:
  text: and the Feast of Harvest, of the firstfruits of your labor, of what you sow
    in the field; and the Feast of Ingathering at the end of the year, when you gather
    in your labor from the field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'festival' for 'feast' in both occurrences of חַג.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'at the going out of the year.'
    reason: lexical_alternative
  - marker: c
    text: '''Ingathering'' refers to the festival marking the gathering of produce
      from the field.'
    reason: cultural_note
lexical_decisions:
- source_word: חַג
  chosen: Feast
  alternatives:
  - festival
  lexicon: HALOT
  rationale: Rendered as 'Feast' to preserve the sense of an appointed celebratory
    pilgrimage observance while remaining natural in English. Capitalized here because
    it functions as part of the festal designation.
- source_word: הַקָּצִיר
  chosen: Harvest
  alternatives:
  - reaping
  lexicon: HALOT
  rationale: The noun denotes harvest/reaping. 'Harvest' is the more idiomatic English
    title in the festal name 'Feast of Harvest.'
- source_word: בִּכּוּרֵי
  chosen: firstfruits
  alternatives:
  - first produce
  - earliest yield
  lexicon: HALOT
  rationale: Standard rendering for the earliest portion of produce offered to God.
    It preserves the cultic and agricultural nuance better than a flatter phrase like
    'first produce.'
- source_word: מַעֲשֶׂיךָ
  chosen: your labor
  alternatives:
  - your work
  - your produce
  lexicon: HALOT
  rationale: Literally 'your deeds/work.' In this agricultural context it refers to
    the result of one's labor. 'Your labor' preserves the connection to human work
    without prematurely narrowing the term to harvested produce alone. The same English
    is retained later in the verse for consistency.
- source_word: אֲשֶׁר תִּזְרַע בַּשָּׂדֶה
  chosen: of what you sow in the field
  alternatives:
  - which you sow in the field
  lexicon: HALOT
  rationale: This relative clause modifies the firstfruits/labor and specifies the
    agricultural source. 'Of what you sow in the field' is idiomatic and preserves
    the direct second-person address.
- source_word: הָאָסִף
  chosen: Ingathering
  alternatives:
  - Gathering
  - Final Harvest
  lexicon: HALOT
  rationale: Traditional and precise rendering for the agricultural festival marking
    the collection of produce. 'Ingathering' best captures the nominal form and its
    festal title usage.
- source_word: בְּצֵאת הַשָּׁנָה
  chosen: at the end of the year
  alternatives:
  - at the going out of the year
  - when the year goes out
  lexicon: HALOT
  rationale: Literally 'at the going out of the year.' The idiomatic sense is temporal,
    referring to the year's end. 'At the end of the year' communicates the Hebrew
    plainly in modern English.
- source_word: בְּאָסְפְּךָ
  chosen: when you gather in
  alternatives:
  - in your gathering
  - as you gather
  lexicon: HALOT
  rationale: The infinitive construct with prefixed preposition is naturally rendered
    temporally here. 'When you gather in' is idiomatic English for harvesting/collecting
    crops.
- source_word: מִן הַשָּׂדֶה
  chosen: from the field
  alternatives:
  - out of the field
  lexicon: HALOT
  rationale: Straightforward spatial source phrase. 'From the field' is the most natural
    modern English rendering.
