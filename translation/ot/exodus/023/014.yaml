id: EXO.23.14
reference: Exodus 23:14
source:
  edition: WLC
  text: שָׁלֹ֣שׁ רְגָלִ֔ים תָּחֹ֥ג לִ֖/י בַּ/שָּׁנָֽה׃
translation:
  text: Three times in the year you shall keep a feast to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'three feet.' This Hebrew idiom refers to the three pilgrimage
      festival occasions in the year.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלֹשׁ
  chosen: Three
  alternatives:
  - Three times
  lexicon: HALOT
  rationale: Cardinal number introducing the frequency of the required observance.
    In English, the idiom is completed by the following noun, yielding 'Three times.'
- source_word: רְגָלִים
  chosen: times
  alternatives:
  - feet
  - pilgrimage-feasts
  - occasions
  lexicon: HALOT
  rationale: Literally 'feet,' but in this idiom שָׁלֹשׁ רְגָלִים refers to the three
    pilgrimage festival occasions in the year. Rendering it as 'times' gives the natural
    English sense while the festival nuance is carried by the verb and can be noted
    in a footnote.
- source_word: תָּחֹג
  chosen: you shall keep a feast
  alternatives:
  - you shall celebrate a festival
  - you shall hold a pilgrimage festival
  lexicon: HALOT
  rationale: From חגג, 'to celebrate a festival/keep a feast.' 'Keep a feast' preserves
    the cultic/festal sense with readable English and fits the legal style of the
    passage.
- source_word: לִי
  chosen: to me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The preposition marks the festival as directed to Yahweh. 'To me' is
    a straightforward rendering of the Hebrew and preserves the personal address.
- source_word: בַּשָּׁנָה
  chosen: in the year
  alternatives:
  - each year
  - yearly
  lexicon: HALOT
  rationale: 'Literally ''in the year.'' This works idiomatically with ''three times''
    in English: ''Three times in the year.'' ''Each year'' is possible but slightly
    more interpretive.'
