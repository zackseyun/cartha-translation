id: EXO.23.6
reference: Exodus 23:6
source:
  edition: WLC
  text: לֹ֥א תַטֶּ֛ה מִשְׁפַּ֥ט אֶבְיֹנְ/ךָ֖ בְּ/רִיבֽ/וֹ׃
translation:
  text: You shall not pervert the justice due to your poor man in his dispute.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You shall not deny justice to your poor man in his lawsuit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  chosen: not
  alternatives:
  - do not
  lexicon: HALOT
  rationale: Standard negation introducing a prohibition. Rendered with 'shall not'
    in English to match the legal style of the surrounding covenant laws.
- source_word: תַטֶּה
  chosen: pervert
  alternatives:
  - bend
  - turn aside
  - distort
  lexicon: HALOT
  rationale: From נטה in the Hiphil, here meaning to bend or turn aside in a juridical
    sense. 'Pervert' best captures the legal idea of corrupting justice rather than
    merely inclining it.
- source_word: מִשְׁפַּט
  chosen: the justice due to
  alternatives:
  - justice
  - judgment
  - legal right
  - case
  lexicon: HALOT
  rationale: In this legal context, מִשְׁפָּט refers not merely to abstract justice
    but to the rightful judicial decision or legal due owed to a person. 'The justice
    due to' makes explicit the object of the prohibition in natural English.
- source_word: אֶבְיֹנְךָ
  chosen: your poor man
  alternatives:
  - your needy man
  - your poor person
  - your poor
  lexicon: HALOT
  rationale: אֶבְיוֹן denotes a poor or needy person. The 2ms suffix is retained as
    'your,' addressing the individual Israelite/judge within the legal code. 'Man'
    preserves the masculine singular form in line with the gender-accurate policy,
    while functioning representatively.
- source_word: בְּרִיבוֹ
  chosen: in his dispute
  alternatives:
  - in his lawsuit
  - in his case
  - when he has a dispute
  lexicon: HALOT
  rationale: רִיב can denote a dispute, legal contention, or lawsuit. 'In his dispute'
    is broad enough to cover formal legal contention while remaining readable; the
    possessive suffix is preserved with 'his'.
