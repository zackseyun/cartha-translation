theological_decisions:
- issue: Whether the verse forbids favoritism against the poor rather than favoritism
    toward them
  chosen_reading: The prohibition is against depriving a poor man of his rightful
    justice in court.
  alternative_readings:
  - The verse could be paraphrased more generally as 'do not deny justice to the poor.'
  rationale: The Hebrew syntax places מִשְׁפַּט as the object being bent/perverted
    and identifies the beneficiary as 'your poor man' in the setting of a legal dispute.
    In context with nearby laws, the point is impartial justice, not a generalized
    social slogan. The translation keeps the legal focus explicit.
  doctrine_reference: Translation philosophy §1, §3, §4, §6
