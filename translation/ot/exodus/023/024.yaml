id: EXO.23.24
reference: Exodus 23:24
source:
  edition: WLC
  text: לֹֽא תִשְׁתַּחֲוֶ֤ה לֵ/אלֹֽהֵי/הֶם֙ וְ/לֹ֣א תָֽעָבְדֵ֔/ם וְ/לֹ֥א תַעֲשֶׂ֖ה
    כְּ/מַֽעֲשֵׂי/הֶ֑ם כִּ֤י הָרֵס֙ תְּהָ֣רְסֵ֔/ם וְ/שַׁבֵּ֥ר תְּשַׁבֵּ֖ר מַצֵּבֹתֵי/הֶֽם־׃
translation:
  text: You shall not bow down to their gods, nor serve them, nor do according to
    their deeds; rather, you shall surely tear them down and surely shatter their
    pillars.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their sacred pillars' or 'their standing stones.' The Hebrew refers
      to cultic stone monuments associated with worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִשְׁתַּחֲוֶה
  chosen: bow down
  alternatives:
  - prostrate yourself
  - worship
  lexicon: HALOT
  rationale: The verb denotes the physical act of prostration/bowing in reverence.
    'Bow down' preserves the concrete action without prematurely interpreting it as
    the broader concept 'worship,' though worship is clearly implicated in context.
- source_word: לֵאלֹהֵיהֶם
  chosen: to their gods
  alternatives:
  - before their gods
  lexicon: HALOT
  rationale: The preposition ל with 'their gods' is naturally rendered 'to their gods'
    after 'bow down.' Lowercase 'gods' reflects reference to the deities of the nations,
    not the God of Israel.
- source_word: תָעָבְדֵם
  chosen: serve them
  alternatives:
  - worship them
  lexicon: HALOT
  rationale: עבד in this context can include cultic service/worship. 'Serve them'
    is more lexically direct and preserves the overlap between religious devotion
    and service.
- source_word: תַעֲשֶׂה כְּמַעֲשֵׂיהֶם
  chosen: do according to their deeds
  alternatives:
  - act as they do
  - do like their works
  - follow their practices
  lexicon: HALOT
  rationale: The Hebrew is literally 'do according to their deeds/works.' 'Do according
    to their deeds' keeps the formal correspondence while remaining intelligible.
    It refers to imitating the nations' religious practices.
- source_word: כִּי
  chosen: rather
  alternatives:
  - for
  - but rather
  - instead
  lexicon: HALOT
  rationale: Although כי often means 'for,' here it introduces a strong contrast with
    the prohibited actions that follow. 'Rather' captures the adversative force in
    idiomatic English better than a wooden 'for.'
- source_word: הָרֵס תְּהָרְסֵם
  chosen: you shall surely tear them down
  alternatives:
  - you must utterly overthrow them
  - you shall completely demolish them
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the command. 'Surely
    tear them down' preserves that emphasis. The object suffix most naturally refers
    to the idols/gods by metonymy or their cult objects, and the following clause
    specifies one such object.
- source_word: וְשַׁבֵּר תְּשַׁבֵּר
  chosen: and surely shatter
  alternatives:
  - and utterly break
  - and surely smash
  lexicon: HALOT
  rationale: Again, the infinitive absolute plus finite verb marks emphasis. 'Shatter'
    fits the destruction of stone cult objects better than the more generic 'break.'
- source_word: מַצֵּבֹתֵיהֶם
  chosen: their pillars
  alternatives:
  - their sacred pillars
  - their standing stones
  lexicon: HALOT
  rationale: מַצֵּבָה refers to a standing stone/pillar, often cultic. 'Pillars' is
    concise and traditional enough for readability; the cultic sense is preserved
    by context. Because 'sacred pillars' is interpretive but accurate, it is preserved
    in a footnote.
