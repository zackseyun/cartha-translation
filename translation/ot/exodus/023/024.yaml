theological_decisions:
- issue: Nature of the prohibited acts toward foreign deities
  chosen_reading: The verse forbids both acts of reverence ('bow down') and cultic
    allegiance ('serve'), without collapsing the two into a single English term.
  alternative_readings:
  - Render both verbs with worship language, e.g., 'do not worship or serve them'
  rationale: 'The Hebrew uses two distinct verbs, and preserving both maintains the
    text''s rhetorical force and theological comprehensiveness: Israel must reject
    both outward homage and ongoing religious service to other gods.'
  doctrine_reference: Translation philosophy items 1 and 5
- issue: Referent of the destruction commands
  chosen_reading: The commands target the nations' cultic objects and symbols associated
    with their gods, culminating explicitly in 'their pillars.'
  alternative_readings:
  - Take the suffix in 'tear them down' as referring directly to the gods in a purely
    figurative sense
  rationale: The text moves from gods and their deeds to the destruction of tangible
    cult objects. English should avoid suggesting literal destruction of deities while
    preserving the Hebrew's forceful polemic against idolatry.
  doctrine_reference: Translation philosophy items 1 and 6
