id: EXO.23.15
reference: Exodus 23:15
source:
  edition: WLC
  text: אֶת חַ֣ג הַ/מַּצּוֹת֮ תִּשְׁמֹר֒ שִׁבְעַ֣ת יָמִים֩ תֹּאכַ֨ל מַצּ֜וֹת כַּֽ/אֲשֶׁ֣ר
    צִוִּיתִ֗/ךָ לְ/מוֹעֵד֙ חֹ֣דֶשׁ הָֽ/אָבִ֔יב כִּי ב֖/וֹ יָצָ֣אתָ מִ/מִּצְרָ֑יִם
    וְ/לֹא יֵרָא֥וּ פָנַ֖/י רֵיקָֽם־־־׃
translation:
  text: You shall keep the Feast of Unleavened Bread. For seven days you shall eat
    unleavened bread, as I commanded you, at the appointed time in the month of Abib,
    for in it you came out from Egypt. And they shall not appear before me empty-handed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''before my face,'' an idiom meaning ''before me'' or ''in my presence.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'And none shall appear before me empty-handed.' The Hebrew shifts from
      second-person singular address to a third-person plural verb in this clause.
    reason: alternative_reading
lexical_decisions:
- source_word: חַג הַמַּצּוֹת
  chosen: the Feast of Unleavened Bread
  alternatives:
  - the festival of unleavened bread
  - the pilgrimage feast of unleavened bread
  lexicon: HALOT
  rationale: חַג denotes a festival/feast, often with pilgrimage connotations, but
    'Feast' is a clear and established English equivalent that preserves the formal
    character of the observance. מַצּוֹת refers specifically to unleavened bread.
- source_word: תִּשְׁמֹר
  chosen: you shall keep
  alternatives:
  - you shall observe
  - you shall guard
  lexicon: HALOT
  rationale: שׁמר in cultic/legal contexts commonly means 'keep' or 'observe.' 'Keep'
    is concise, idiomatic, and preserves covenantal/legal force.
- source_word: שִׁבְעַת יָמִים
  chosen: For seven days
  alternatives:
  - Seven days
  - for a period of seven days
  lexicon: HALOT
  rationale: A straightforward temporal expression. 'For seven days' reads naturally
    in English while preserving the duration.
- source_word: תֹּאכַל מַצּוֹת
  chosen: you shall eat unleavened bread
  alternatives:
  - you shall eat unleavened cakes
  - you shall eat matzot
  lexicon: HALOT
  rationale: מַצּוֹת are unleavened bread(s). Singular mass expression in English
    is more natural than 'unleavened breads' while accurately conveying the substance.
- source_word: כַּאֲשֶׁר צִוִּיתִךָ
  chosen: as I commanded you
  alternatives:
  - just as I commanded you
  lexicon: HALOT
  rationale: This preserves the comparative force of כַּאֲשֶׁר and the direct divine
    command without embellishment.
- source_word: לְמוֹעֵד
  chosen: at the appointed time
  alternatives:
  - at the appointed season
  - at the set time
  lexicon: HALOT
  rationale: מוֹעֵד can mean appointed time, meeting, or festival season. Here it
    marks the fixed calendrical time of observance; 'appointed time' is precise and
    readable.
- source_word: חֹדֶשׁ הָאָבִיב
  chosen: the month of Abib
  alternatives:
  - the month of Aviv
  - the month of fresh grain
  lexicon: HALOT
  rationale: As a calendrical designation, transliterating אָבִיב as 'Abib' best preserves
    the Hebrew month name. A semantic rendering ('fresh grain') would obscure its
    function as a proper time marker.
- source_word: כִּי בוֹ יָצָאתָ מִמִּצְרָיִם
  chosen: for in it you came out from Egypt
  alternatives:
  - for in that month you came out of Egypt
  - because in it you went out from Egypt
  lexicon: HALOT
  rationale: The prepositional pronoun בוֹ most naturally refers to the month just
    mentioned. 'Came out from Egypt' preserves the exodus language with natural English
    diction.
- source_word: וְלֹא יֵרָאוּ פָנַי
  chosen: And they shall not appear before me
  alternatives:
  - And none shall appear before me
  - and one shall not be seen before me
  lexicon: HALOT
  rationale: The Niphal of ראה here is the idiom 'appear before.' Although the verb
    is 3mp ('they shall not appear'), the law addresses Israel collectively after
    second-person singular commands. English can preserve the Hebrew shift with 'they,'
    though 'none' is also possible. 'Before me' reflects the idiom literally enough
    without awkwardness.
- source_word: רֵיקָם
  chosen: empty-handed
  alternatives:
  - empty
  - without an offering
  lexicon: HALOT
  rationale: רֵיקָם means 'empty, empty-handed.' In this cultic context it implies
    not coming without a gift/offering. 'Empty-handed' is the clearest idiomatic English
    equivalent and preserves the implied sense without over-specifying the exact offering.
