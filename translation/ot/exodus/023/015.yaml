theological_decisions:
- issue: Rendering the divine reference in first person
  chosen_reading: before me
  alternative_readings:
  - before my face
  - before my presence
  rationale: The Hebrew literally reads 'my face,' but in this idiom the sense is
    appearing in God's presence. 'Before me' is natural English and preserves the
    personal divine address without unnecessary literalism.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense in readable modern English.'
