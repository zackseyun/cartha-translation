theological_decisions:
- issue: Forensic sense of God's statement
  chosen_reading: for I will not justify the wicked
  alternative_readings:
  - for I will not acquit the guilty
  rationale: The verse grounds the human prohibition in God's own judicial character.
    Rendering אַצְדִּיק as 'justify' preserves the forensic declaration and the lexical
    tie to צַדִּיק ('righteous'). 'Acquit' is contextually strong but loses some of
    that wordplay, so it is preserved in a footnote.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
