id: EXO.23.7
reference: Exodus 23:7
source:
  edition: WLC
  text: מִ/דְּבַר שֶׁ֖קֶר תִּרְחָ֑ק וְ/נָקִ֤י וְ/צַדִּיק֙ אַֽל תַּהֲרֹ֔ג כִּ֥י לֹא
    אַצְדִּ֖יק רָשָֽׁע־־־׃
translation:
  text: Keep far from a false matter, and do not kill the innocent and the righteous,
    for I will not justify the wicked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Keep far from a false charge' or 'from a lie.' The Hebrew 'matter/word'
      is broad and may include false testimony or a deceptive legal case.
    reason: lexical_alternative
  - marker: b
    text: Or 'for I will not acquit the guilty.' The Hebrew verb is forensic and can
      mean 'declare righteous,' 'justify,' or 'acquit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִ/דְּבַר שֶׁקֶר
  chosen: from a false matter
  alternatives:
  - from a false word
  - from a false charge
  - from a lie
  lexicon: HALOT
  rationale: דָּבָר has a broad range including 'word,' 'matter,' 'affair,' or 'case.'
    In this legal context, 'matter' preserves the breadth better than narrowing to
    'charge,' while still sounding natural in English when paired with 'false.'
- source_word: תִּרְחָק
  chosen: Keep far
  alternatives:
  - stay far away
  - distance yourself
  lexicon: HALOT
  rationale: The Qal imperfect 2ms functions as an instruction. 'Keep far' captures
    the imperative force and preserves the sense of active separation more formally
    than 'avoid' or 'distance yourself.'
- source_word: וְ/נָקִי
  chosen: the innocent
  alternatives:
  - the blameless
  - the guiltless
  lexicon: HALOT
  rationale: נָקִי commonly denotes one free from guilt or innocent. 'The innocent'
    is the clearest modern legal-moral rendering in this context.
- source_word: וְ/צַדִּיק
  chosen: the righteous
  alternatives:
  - the just
  - the one in the right
  lexicon: HALOT
  rationale: צַדִּיק can mean righteous or just. 'The righteous' preserves the lexical
    link with the צדק word-group and fits the moral-judicial setting.
- source_word: אַל תַּהֲרֹג
  chosen: do not kill
  alternatives:
  - do not slay
  - do not put to death
  - do not murder
  lexicon: HALOT
  rationale: הרג is the general verb 'kill/slay.' 'Do not kill' is broad and does
    not over-specify motive as 'murder' would, while still fitting the judicial context.
- source_word: לֹא אַצְדִּיק
  chosen: I will not justify
  alternatives:
  - I will not acquit
  - I will not declare righteous
  lexicon: HALOT
  rationale: 'The Hiphil of צדק here is forensic: to declare righteous, justify, or
    acquit. ''Justify'' preserves the lexical connection to the צדק family and communicates
    the judicial declaration. ''Acquit'' is a strong contextual alternative worth
    preserving in a footnote.'
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - the guilty
  - the wrongdoer
  lexicon: HALOT
  rationale: רָשָׁע denotes the wicked or guilty person in legal-moral contexts. 'The
    wicked' is the standard and sufficiently broad rendering, while 'guilty' is a
    contextual nuance.
