id: EXO.23.33
reference: Exodus 23:33
source:
  edition: WLC
  text: לֹ֤א יֵשְׁבוּ֙ בְּ/אַרְצְ/ךָ֔ פֶּן יַחֲטִ֥יאוּ אֹתְ/ךָ֖ לִ֑/י כִּ֤י תַעֲבֹד֙
    אֶת אֱלֹ֣הֵי/הֶ֔ם כִּֽי יִהְיֶ֥ה לְ/ךָ֖ לְ/מוֹקֵֽשׁ־־־׃פ
translation:
  text: They must not dwell in your land, lest they cause you to sin against me; for
    if you serve their gods, it will surely become a snare to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they make you sin against me' or 'they lead you into sin against me.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'for you would serve their gods'; the Hebrew conjunction can be understood
      as explanatory, and the clause may be read as the likely outcome rather than
      a simple condition.
    reason: alternative_reading
  - marker: c
    text: '''Snare'' translates Hebrew moqesh, a trap metaphorically describing something
      that leads to ruin or apostasy.'
    reason: cultural_note
lexical_decisions:
- source_word: יֵשְׁבוּ
  chosen: dwell
  alternatives:
  - live
  - remain
  - settle
  lexicon: HALOT
  rationale: The verb ישׁב commonly means to sit, dwell, remain, or settle. In this
    land-occupancy context, 'dwell' is natural modern English and preserves the sense
    of continued residence without over-specifying permanent settlement.
- source_word: בְּאַרְצְךָ
  chosen: in your land
  alternatives:
  - in your country
  lexicon: HALOT
  rationale: אֶרֶץ can mean land or country. 'Land' fits the covenantal-territorial
    context of Exodus and is the standard rendering in this section.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - so that not
  lexicon: HALOT
  rationale: פֶּן introduces a warning of undesirable consequence. 'Lest' is concise
    and accurately preserves the preventative force.
- source_word: יַחֲטִיאוּ אֹתְךָ לִי
  chosen: they cause you to sin against me
  alternatives:
  - they make you sin against me
  - they lead you into sin against me
  lexicon: HALOT
  rationale: 'The Hiphil of חטא is causative: ''cause to sin'' or ''make sin.'' The
    phrase לִי is best taken ethically as ''against me,'' clarifying that the offense
    is against God, not merely ''to me'' in a wooden sense.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - if
  lexicon: HALOT
  rationale: The first כִּי introduces the reason for the prohibition. 'For' works
    well in English to connect the warning with its rationale.
- source_word: תַעֲבֹד אֶת אֱלֹהֵיהֶם
  chosen: if you serve their gods
  alternatives:
  - for you would serve their gods
  - when you serve their gods
  lexicon: HALOT
  rationale: עבד with gods means to serve/worship them. 'Serve' is the more direct
    lexical equivalent and retains the covenantal language of allegiance. The clause
    is rendered conditionally in English because the following warning naturally reads
    as a contingent result if Israel serves those gods.
- source_word: אֱלֹהֵיהֶם
  chosen: their gods
  alternatives:
  - their deities
  lexicon: HALOT
  rationale: Plain plural 'gods' is the most direct rendering and matches the polemical
    context against Canaanite worship.
- source_word: יִהְיֶה לְךָ לְמוֹקֵשׁ
  chosen: it will surely become a snare to you
  alternatives:
  - it will become a trap to you
  - it will be a snare to you
  lexicon: HALOT
  rationale: מוֹקֵשׁ denotes a snare or trap, often metaphorically for spiritual ruin.
    'Snare' preserves the biblical metaphor. 'Become' makes explicit the future-result
    sense. 'Surely' reflects the emphatic force of the warning in idiomatic English,
    though not as a separate Hebrew particle.
