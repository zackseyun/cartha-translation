theological_decisions:
- issue: Nature of the sin warned against
  chosen_reading: The verse warns specifically against covenantal unfaithfulness through
    idolatrous service to other gods.
  alternative_readings:
  - A more general warning about moral corruption from foreign neighbors
  rationale: The immediate clause 'if you serve their gods' defines the sin in view.
    The translation therefore keeps the explicit link to idolatry and does not generalize
    the warning into ethnic separation or mere cultural influence.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
