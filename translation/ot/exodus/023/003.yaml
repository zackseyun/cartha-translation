id: EXO.23.3
reference: Exodus 23:3
source:
  edition: WLC
  text: וְ/דָ֕ל לֹ֥א תֶהְדַּ֖ר בְּ/רִיבֽ/וֹ׃ס
translation:
  text: And you shall not show partiality to a poor man in his lawsuit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'honor a poor man in his case.' The Hebrew verb can more literally mean
      'honor,' but in this judicial context it refers to showing favoritism or partiality.
    reason: lexical_alternative
lexical_decisions:
- source_word: דָל
  chosen: a poor man
  alternatives:
  - the poor
  - a weak man
  lexicon: HALOT
  rationale: דָל denotes one who is poor, lowly, or weak in social/economic standing.
    The singular masculine form is best represented as 'a poor man' rather than the
    abstract 'the poor.' This also fits the legal case example in context.
- source_word: תֶהְדַּר
  chosen: show partiality
  alternatives:
  - honor
  - favor
  - defer to
  lexicon: HALOT
  rationale: From הדר in the Hiphil/causative sense here, the idea is not generic
    honoring but giving preferential treatment or showing undue favor. In this legal
    context, 'show partiality' captures the judicial nuance better than the more literal
    but potentially misleading 'honor.'
- source_word: בְּרִיבוֹ
  chosen: in his lawsuit
  alternatives:
  - in his dispute
  - in his case
  lexicon: HALOT
  rationale: רִיב commonly refers to a legal dispute, contention, or case. Given the
    surrounding judicial laws, 'lawsuit' makes the courtroom setting explicit in natural
    English. 'His' reflects the 3ms suffix.
- source_word: וְ
  chosen: And
  alternatives:
  - But
  - Now
  rationale: The conjunction simply links this prohibition with the surrounding case
    laws. 'And' preserves the Hebrew coordination without adding contrast not explicit
    in the text.
- source_word: לֹא
  chosen: shall not
  alternatives:
  - do not
  rationale: With the imperfect verb in legal instruction, English 'shall not' appropriately
    conveys prohibition in covenant law style.
