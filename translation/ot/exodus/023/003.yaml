theological_decisions:
- issue: Judicial concern for the poor without favoritism
  chosen_reading: The verse forbids bias in favor of the poor person in court.
  alternative_readings:
  - The verse commands honoring the poor generally.
  rationale: The immediate legal context and the phrase 'in his lawsuit' show that
    the command concerns impartial justice, not a denial of compassion toward the
    poor in general. The wording avoids importing a broader social ethic that this
    verse by itself does not state.
  doctrine_reference: 'Translation philosophy items 1 and 3: original-language primacy;
    preserve the text''s tension without importing doctrinal claims.'
