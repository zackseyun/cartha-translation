id: EXO.23.13
reference: Exodus 23:13
source:
  edition: WLC
  text: וּ/בְ/כֹ֛ל אֲשֶׁר אָמַ֥רְתִּי אֲלֵי/כֶ֖ם תִּשָּׁמֵ֑רוּ וְ/שֵׁ֨ם אֱלֹהִ֤ים
    אֲחֵרִים֙ לֹ֣א תַזְכִּ֔ירוּ לֹ֥א יִשָּׁמַ֖ע עַל פִּֽי/ךָ־־׃
translation:
  text: In all that I have said to you, be careful; and the name of other gods you
    shall not mention—it shall not be heard on your lips.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more specifically, 'you shall not invoke the name of other gods.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'it shall not be heard upon your mouth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְכֹל
  chosen: In all
  alternatives:
  - In everything
  - With respect to all
  lexicon: HALOT
  rationale: The preposition ב with כֹּל introduces the scope of the command. 'In
    all' is natural English and preserves the comprehensive force without over-paraphrasing.
- source_word: אֲשֶׁר אָמַרְתִּי אֲלֵיכֶם
  chosen: that I have said to you
  alternatives:
  - that I said to you
  - which I have spoken to you
  lexicon: HALOT
  rationale: The clause refers back to the preceding stipulations. English present
    perfect ('have said') fits the discourse context of instructions just given, while
    remaining faithful to the Hebrew perfect.
- source_word: תִּשָּׁמֵרוּ
  chosen: be careful
  alternatives:
  - take heed
  - keep yourselves
  - be on guard
  lexicon: HALOT
  rationale: Niphal of שׁמר here has a reflexive/passive nuance of taking care or
    guarding oneself with respect to the commands. 'Be careful' is idiomatic modern
    English and captures the exhortational force better than the less natural 'keep
    yourselves.'
- source_word: וְשֵׁם
  chosen: and the name
  alternatives:
  - and a name
  - even the name
  lexicon: HALOT
  rationale: The conjunction links a further prohibition, and the singular construct
    'name of' is best preserved directly.
- source_word: אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  lexicon: HALOT
  rationale: The phrase straightforwardly denotes deities other than the God of Israel.
    'Other gods' is the most direct and conventional rendering.
- source_word: לֹא תַזְכִּירוּ
  chosen: you shall not mention
  alternatives:
  - you shall not invoke
  - do not mention
  lexicon: HALOT
  rationale: Hiphil of זכר means to cause to remember, mention, or call to mind. In
    this legal context, 'mention' best fits the prohibition against speaking the names
    of other gods. 'Invoke' is possible but narrower and more interpretive.
- source_word: לֹא יִשָּׁמַע
  chosen: it shall not be heard
  alternatives:
  - let it not be heard
  - it must not be heard
  lexicon: HALOT
  rationale: 'The Niphal imperfect of שׁמע expresses a prohibition/result: the name
    is not to be heard. ''It shall not be heard'' preserves the formal force and matches
    the legal style.'
- source_word: עַל פִּיךָ
  chosen: on your lips
  alternatives:
  - from your mouth
  - upon your mouth
  lexicon: HALOT
  rationale: Literally 'upon your mouth.' The idiomatic English equivalent is 'on
    your lips,' which preserves the image of spoken utterance while sounding natural.
    'From your mouth' is also possible but less vivid.
