theological_decisions:
- issue: Nature of the prohibition regarding other gods' names
  chosen_reading: Render as a prohibition against mentioning/speaking the names of
    other gods, without expanding it into a broader doctrinal claim about their ontological
    status.
  alternative_readings:
  - Render more specifically as 'do not invoke the names of other gods'
  rationale: The Hebrew text directly prohibits mention and hearing of these names
    on Israel's lips. It does not here explicitly define whether the issue is mere
    utterance, liturgical invocation, or covenantal acknowledgment; therefore the
    translation preserves the textual wording rather than resolving the scope beyond
    what the verse states.
  doctrine_reference: Preserve theological tension rather than resolve it.
