id: EXO.23.27
reference: Exodus 23:27
source:
  edition: WLC
  text: אֶת אֵֽימָתִ/י֙ אֲשַׁלַּ֣ח לְ/פָנֶ֔י/ךָ וְ/הַמֹּתִי֙ אֶת כָּל הָ/עָ֔ם אֲשֶׁ֥ר
    תָּבֹ֖א בָּ/הֶ֑ם וְ/נָתַתִּ֧י אֶת כָּל אֹיְבֶ֛י/ךָ אֵלֶ֖י/ךָ עֹֽרֶף־־־־־׃
translation:
  text: I will send my terror ahead of you, and I will throw into confusion all the
    people among whom you come, and I will make all your enemies turn their backs
    to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my dread' or 'my fear.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I will rout' or 'I will put in an uproar.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew idiom: ''I will give all your enemies to you [as] back/neck,'' meaning
      they will turn and flee before you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵימָתִי
  chosen: my terror
  alternatives:
  - my dread
  - my fear
  lexicon: HALOT
  rationale: אֵימָה denotes dread, terror, or fear-inspiring panic. 'My terror' preserves
    the possessive force and the active sense of a divinely sent dread better than
    the weaker 'my fear.'
- source_word: אֲשַׁלַּח לְפָנֶיךָ
  chosen: I will send ... ahead of you
  alternatives:
  - before you
  lexicon: HALOT
  rationale: שׁלח with לִפְנֵי expresses sending something in advance or before someone.
    'Ahead of you' is natural modern English while preserving the directional sense.
- source_word: וְהַמֹּתִי
  chosen: I will throw into confusion
  alternatives:
  - I will rout
  - I will put in an uproar
  - I will confound
  lexicon: HALOT
  rationale: From המם, the verb commonly means to throw into confusion, panic, or
    tumult, especially in battle contexts. 'Throw into confusion' captures the causative
    force without over-specifying military defeat at this point in the clause.
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - every people
  - all the peoples
  lexicon: HALOT
  rationale: Though singular in Hebrew, עָם here functions collectively for the populations
    encountered. 'All the people' is idiomatic and fits the following relative clause.
- source_word: אֲשֶׁר תָּבֹא בָהֶם
  chosen: among whom you come
  alternatives:
  - to whom you come
  - against whom you come
  - into whose midst you come
  lexicon: HALOT
  rationale: The preposition ב with plural pronoun most naturally gives the sense
    of entering among or into the midst of them. 'Among whom you come' preserves that
    nuance better than the more adversarial 'against whom,' which would import interpretation.
- source_word: וְנָתַתִּי ... אֵלֶיךָ עֹרֶף
  chosen: I will make all your enemies turn their backs to you
  alternatives:
  - I will give all your enemies to you as a back
  - I will make all your enemies flee before you
  - I will set all your enemies before you with neck turned
  lexicon: HALOT
  rationale: The idiom נתן + enemy + עורף means causing enemies to turn their backs
    in retreat. 'Turn their backs to you' preserves the Hebrew image more directly
    than the interpretive paraphrase 'flee before you,' while remaining intelligible
    in English.
