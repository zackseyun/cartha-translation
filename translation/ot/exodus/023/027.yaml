theological_decisions:
- issue: Divine agency in military victory and panic
  chosen_reading: The verse is rendered with direct first-person divine action ('I
    will send,' 'I will throw into confusion,' 'I will make')
  alternative_readings:
  - More indirect renderings that soften divine causation
  rationale: The Hebrew uses explicit first-person verbs with God as subject. The
    translation preserves this without softening the text's claim about God's active
    role in Israel's deliverance and conquest.
  doctrine_reference: Translation philosophy §1, §3
