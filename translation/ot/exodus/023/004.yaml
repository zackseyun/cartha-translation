theological_decisions:
- issue: Ethical force toward an enemy
  chosen_reading: The verse commands restoration of an enemy's wandering animal without
    softening 'enemy' to a neutral term.
  alternative_readings:
  - neighbor
  - one who hates you
  rationale: The Hebrew explicitly says 'your enemy.' The translation preserves the
    moral tension of showing covenantal justice and practical mercy even toward an
    adversary, rather than resolving it into a less pointed relationship.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
