id: EXO.23.4
reference: Exodus 23:4
source:
  edition: WLC
  text: כִּ֣י תִפְגַּ֞ע שׁ֧וֹר אֹֽיִבְ/ךָ֛ א֥וֹ חֲמֹר֖/וֹ תֹּעֶ֑ה הָשֵׁ֥ב תְּשִׁיבֶ֖/נּוּ
    לֽ/וֹ׃ס
translation:
  text: If you come upon your enemy’s ox or his donkey going astray, you must surely
    return it to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'When you come upon your enemy’s ox or his donkey wandering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Here כִּי introduces a casuistic condition in legal material. English
    'If' best matches the protasis structure of the law, though 'When' is also possible
    in similar contexts.
- source_word: תִפְגַּע
  chosen: you come upon
  alternatives:
  - you encounter
  - you meet
  lexicon: HALOT
  rationale: From פגע, in this context the sense is encountering or coming across
    something. 'Come upon' is natural modern English and preserves the incidental
    nature of the encounter.
- source_word: שׁוֹר
  chosen: ox
  alternatives:
  - bull
  - cattle
  lexicon: HALOT
  rationale: שׁוֹר commonly denotes an ox/bovine used in agrarian life. 'Ox' is the
    standard and suitably specific rendering in legal contexts.
- source_word: אֹיִבְךָ
  chosen: your enemy’s
  alternatives:
  - of your enemy
  lexicon: HALOT
  rationale: The noun אֹיֵב means 'enemy.' The possessive construction is naturally
    rendered in English as 'your enemy’s.'
- source_word: חֲמֹרוֹ
  chosen: his donkey
  alternatives:
  - his ass
  lexicon: HALOT
  rationale: חֲמוֹר is the ordinary term for donkey. 'Donkey' is clear modern English;
    'ass' is archaic or potentially distracting.
- source_word: תֹּעֶה
  chosen: going astray
  alternatives:
  - wandering
  - straying
  lexicon: HALOT
  rationale: The participle from תעה describes the animal as wandering off or lost
    from its proper path. 'Going astray' preserves the participial sense and echoes
    the idea of deviation without overinterpreting as permanently lost.
- source_word: הָשֵׁב תְּשִׁיבֶנּוּ
  chosen: you must surely return it
  alternatives:
  - you shall surely bring it back
  - you must indeed return it
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb of שוב intensifies the command.
    'You must surely return it' captures both the imperative force and the emphasis
    in idiomatic English.
- source_word: לוֹ
  chosen: to him
  alternatives:
  - to its owner
  lexicon: HALOT
  rationale: The pronoun refers back to the enemy/owner. 'To him' is the direct formal
    equivalent; 'to its owner' is interpretive and therefore left as an alternative
    only.
