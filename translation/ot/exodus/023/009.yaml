id: EXO.23.9
reference: Exodus 23:9
source:
  edition: WLC
  text: וְ/גֵ֖ר לֹ֣א תִלְחָ֑ץ וְ/אַתֶּ֗ם יְדַעְתֶּם֙ אֶת נֶ֣פֶשׁ הַ/גֵּ֔ר כִּֽי גֵרִ֥ים
    הֱיִיתֶ֖ם בְּ/אֶ֥רֶץ מִצְרָֽיִם־־׃
translation:
  text: You shall not oppress a sojourner, and you yourselves know the life of the
    sojourner, because you were sojourners in the land of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'foreigner,' 'resident alien,' or 'stranger.' The Hebrew ger refers to
      a non-native living among a people, often in a socially vulnerable position.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'you know the nephesh of the sojourner'—an idiom expressing firsthand
      knowledge of the sojourner's inner life or lived condition.
    reason: lexical_alternative
lexical_decisions:
- source_word: גֵר
  chosen: sojourner
  alternatives:
  - foreigner
  - resident alien
  - stranger
  lexicon: HALOT
  rationale: גֵר denotes a non-native residing among Israel, not merely a passing
    traveler. 'Sojourner' preserves the covenantal/social category better than 'foreigner,'
    while avoiding the bureaucratic tone of 'resident alien.'
- source_word: תִלְחָץ
  chosen: oppress
  alternatives:
  - wrong
  - press
  - mistreat
  lexicon: HALOT
  rationale: The verb לחץ in this legal context conveys oppressive pressure or exploitation.
    'Oppress' best captures the social-ethical force and matches the parallel concern
    for vulnerable persons in the law.
- source_word: יְדַעְתֶּם
  chosen: you yourselves know
  alternatives:
  - you know
  - you have known
  lexicon: HALOT
  rationale: The perfect verb states Israel's experiential knowledge. Adding 'yourselves'
    brings out the explicit pronoun וְאַתֶּם for emphasis without overtranslating
    tense.
- source_word: נֶפֶשׁ
  chosen: life
  alternatives:
  - soul
  - inner being
  - experience
  lexicon: HALOT
  rationale: In the expression 'know the nephesh of the sojourner,' נֶפֶשׁ refers
    to the living person in their inner life or lived condition. 'Life' is natural
    English and avoids importing later dualistic connotations of 'soul.'
- source_word: אֶת נֶפֶשׁ הַגֵּר
  chosen: the life of the sojourner
  alternatives:
  - the heart of the sojourner
  - what it is like to be a sojourner
  - the soul of the sojourner
  lexicon: HALOT
  rationale: This idiom points to empathetic knowledge of the sojourner's condition.
    'The life of the sojourner' stays relatively close to the Hebrew while remaining
    intelligible; a more dynamic paraphrase like 'what it is like to be a sojourner'
    was possible but less formally transparent.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the command. 'Because' expresses
    the causal force clearly in modern English.
- source_word: גֵרִים הֱיִיתֶם
  chosen: you were sojourners
  alternatives:
  - you were foreigners
  - you lived as resident aliens
  lexicon: HALOT
  rationale: Using the same gloss as earlier גֵר preserves lexical consistency and
    highlights the rhetorical appeal to Israel's own history.
- source_word: בְּאֶרֶץ מִצְרַיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: Including 'the land of' reflects the Hebrew wording and preserves the
    formal cadence of the legal reminder.
