theological_decisions:
- issue: Rendering of גֵר in covenant law
  chosen_reading: sojourner
  alternative_readings:
  - foreigner
  - resident alien
  - stranger
  rationale: The verse grounds ethical treatment in Israel's own experience as displaced
    residents in Egypt. 'Sojourner' best preserves the social and legal nuance without
    reducing the term to ethnicity alone.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
