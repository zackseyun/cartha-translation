id: EXO.23.1
reference: Exodus 23:1
source:
  edition: WLC
  text: לֹ֥א תִשָּׂ֖א שֵׁ֣מַע שָׁ֑וְא אַל תָּ֤שֶׁת יָֽדְ/ךָ֙ עִם רָשָׁ֔ע לִ/הְיֹ֖ת
    עֵ֥ד חָמָֽס־־׃ס
translation:
  text: You shall not spread a false report. Do not join hands with a wicked man to
    be a violent witness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'carry/bear a false report.' The Hebrew verb is literally 'lift/carry,'
      here used for circulating a report.
    reason: lexical_alternative
  - marker: b
    text: Or 'Do not put your hand with a wicked man to be a malicious witness.' The
      Hebrew idiom is literally 'put your hand with,' and 'violent witness' may also
      be understood as 'malicious' or 'unjust' witness in this legal context.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִשָּׂא
  chosen: spread
  alternatives:
  - carry
  - bear
  lexicon: HALOT
  rationale: The verb נָשָׂא literally means 'lift/carry/bear,' but with שֵׁמַע ('report,
    rumor') the idiom naturally means to carry or circulate a report. 'Spread' communicates
    the prohibition against passing along false testimony in clear modern English
    without over-paraphrasing.
- source_word: שֵׁמַע שָׁוְא
  chosen: a false report
  alternatives:
  - a false rumor
  - an empty report
  - a lying report
  lexicon: HALOT
  rationale: שֵׁמַע denotes something heard, hence 'report/rumor,' and שָׁוְא means
    emptiness, falsehood, or worthlessness. 'False report' is concise, idiomatic,
    and fits the legal-ethical context.
- source_word: תָּשֶׁת יָדְךָ עִם
  chosen: join hands with
  alternatives:
  - put your hand with
  - side with
  - lend your hand to
  lexicon: HALOT
  rationale: Literally 'put your hand with.' In context this is an idiom for cooperating
    or aligning oneself with another. 'Join hands with' preserves the concrete imagery
    of the hand while making the idiom intelligible in English.
- source_word: רָשָׁע
  chosen: a wicked man
  alternatives:
  - the guilty
  - a wicked person
  - an evildoer
  lexicon: HALOT
  rationale: רָשָׁע commonly means 'wicked' or 'guilty' in legal/moral contexts. Because
    the Hebrew form is masculine singular and addresses a masculine singular addressee,
    'a wicked man' is gender-accurate and preserves the source form, while still functioning
    representatively.
- source_word: לִהְיוֹת עֵד חָמָס
  chosen: to be a violent witness
  alternatives:
  - to be a malicious witness
  - to be an unjust witness
  - to be a false witness
  lexicon: HALOT
  rationale: עֵד is 'witness.' חָמָס often denotes violence, wrongdoing, or ruthless
    injustice. In judicial context it can describe testimony that does violence to
    justice, hence 'violent witness.' This keeps the lexical force of חָמָס stronger
    than the smoother but less literal 'false witness.'
- source_word: אַל
  chosen: Do not
  alternatives:
  - You must not
  lexicon: HALOT
  rationale: אַל with the imperfect expresses prohibition. 'Do not' is the standard
    natural English rendering.
- source_word: לֹא
  chosen: You shall not
  alternatives:
  - Do not
  - You must not
  lexicon: HALOT
  rationale: The opening prohibition is rendered with covenantal/legal force as 'You
    shall not,' matching the legal style of the surrounding material while remaining
    readable.
