theological_decisions:
- issue: Rendering of masculine singular forms in legal instruction
  chosen_reading: Retain gender-accurate singular address ('You shall not ... with
    a wicked man')
  alternative_readings:
  - Use gender-neutral forms such as 'person' throughout
  rationale: The Hebrew addresses a singular masculine addressee and refers to a masculine
    singular wrongdoer. Per translation philosophy, gender-accurate rendering is preferred
    over flattening to gender-neutral language unless context clearly demands otherwise.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
