id: EXO.23.8
reference: Exodus 23:8
source:
  edition: WLC
  text: וְ/שֹׁ֖חַד לֹ֣א תִקָּ֑ח כִּ֤י הַ/שֹּׁ֨חַד֙ יְעַוֵּ֣ר פִּקְחִ֔ים וִֽ/יסַלֵּ֖ף
    דִּבְרֵ֥י צַדִּיקִֽים׃
translation:
  text: And you shall not take a bribe, for a bribe blinds the clear-sighted and twists
    the words of the righteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the discerning' for 'the clear-sighted.' The Hebrew keeps the imagery
      of sight while implying sound judgment.
    reason: lexical_alternative
  - marker: b
    text: '''The words of the righteous'' may also be understood in a legal sense
      as ''the statements'' or ''the case'' of those who are in the right.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁחַד
  chosen: bribe
  alternatives:
  - gift
  - payoff
  lexicon: HALOT
  rationale: The noun denotes a corrupting payment given to influence judgment. 'Bribe'
    is the standard and clearest modern legal-moral term; 'gift' is too neutral, and
    'payoff' is more colloquial.
- source_word: לֹא תִקָּח
  chosen: you shall not take
  alternatives:
  - you must not accept
  lexicon: HALOT
  rationale: Qal imperfect 2ms in legal material functions as a prohibition. 'You
    shall not take' preserves the covenant-law style while remaining natural English.
    'Accept' is possible, but 'take' more closely reflects לקח.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the rationale for the prohibition. 'For' fits legal discourse
    and keeps the concise explanatory force of the Hebrew.
- source_word: יְעַוֵּר
  chosen: blinds
  alternatives:
  - makes blind
  lexicon: HALOT
  rationale: The Piel verb expresses causing blindness. 'Blinds' is idiomatic and
    preserves both literal imagery and metaphorical judicial corruption.
- source_word: פִּקְחִים
  chosen: the clear-sighted
  alternatives:
  - those who see clearly
  - the discerning
  - the open-eyed
  lexicon: HALOT
  rationale: The adjective refers to those who are sighted/open-eyed, here metaphorically
    people capable of sound perception or judgment. 'The clear-sighted' preserves
    the visual metaphor better than the more interpretive 'the discerning.'
- source_word: וִיסַלֵּף
  chosen: twists
  alternatives:
  - distorts
  - perverts
  lexicon: HALOT
  rationale: The Piel verb means to bend, distort, or pervert. 'Twists' is vivid,
    readable modern English and suits the metaphor of corrupting testimony or judicial
    speech. 'Perverts' is possible but can sound more abstract or carry unrelated
    modern connotations.
- source_word: דִּבְרֵי
  chosen: the words of
  alternatives:
  - the statements of
  - the case of
  lexicon: HALOT
  rationale: 'The construct plural of דבר is broad: words, matters, statements. In
    a judicial context it may refer to testimony or legal claims, but ''words of''
    is the most textually transparent and lets the context supply the forensic sense.'
- source_word: צַדִּיקִים
  chosen: the righteous
  alternatives:
  - righteous people
  - those in the right
  - the just
  lexicon: HALOT
  rationale: The adjective can denote morally righteous persons or those who are in
    the right in a legal dispute. 'The righteous' preserves the Hebrew's breadth,
    allowing both ethical and judicial resonance without over-specifying.
