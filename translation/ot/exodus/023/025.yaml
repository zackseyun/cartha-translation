id: EXO.23.25
reference: Exodus 23:25
source:
  edition: WLC
  text: וַ/עֲבַדְתֶּ֗ם אֵ֚ת יְהוָ֣ה אֱלֹֽהֵי/כֶ֔ם וּ/בֵרַ֥ךְ אֶֽת לַחְמְ/ךָ֖ וְ/אֶת
    מֵימֶ֑י/ךָ וַ/הֲסִרֹתִ֥י מַחֲלָ֖ה מִ/קִּרְבֶּֽ/ךָ־־׃
translation:
  text: You shall serve the LORD your God, and he will bless your bread and your water,
    and I will remove sickness from your midst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'bread' may stand more broadly for food or provision.
    reason: lexical_alternative
  - marker: b
    text: Or 'disease' instead of 'sickness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲבַדְתֶּם
  chosen: You shall serve
  alternatives:
  - you shall worship
  - you will serve
  lexicon: HALOT
  rationale: The verb עבד in this covenant context denotes rendering service/worship
    to God. 'Serve' preserves the broader covenantal sense better than the narrower
    'worship,' while 'shall' fits the injunctive force of the prefixed form in context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the pattern reflected
    in the Septuagint.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: 'With YHWH as the object and in covenantal singular reference, אֱלֹהִים
    clearly means ''God,'' not ''gods.'' The possessive marks covenant relationship:
    ''your God.'''
- source_word: וּבֵרַךְ
  chosen: and he will bless
  alternatives:
  - and he shall bless
  - and he blessed
  lexicon: HALOT
  rationale: The form is a waw + perfect with YHWH as understood subject, functioning
    here as a future consequence/promise following the command. 'He will bless' makes
    the implied subject explicit and reads naturally in English.
- source_word: לַחְמְךָ
  chosen: your bread
  alternatives:
  - your food
  lexicon: HALOT
  rationale: לחם is literally 'bread,' and in many contexts can stand metonymically
    for food. Here 'bread' is retained for concreteness and fidelity, with the broader
    sense left implicit.
- source_word: מֵימֶיךָ
  chosen: your water
  alternatives:
  - your waters
  - your drinking water
  lexicon: HALOT
  rationale: Though morphologically plural/collective, מים commonly takes singular
    sense in English. 'Your water' is idiomatic and pairs naturally with 'your bread'
    as basic provisions.
- source_word: וַהֲסִרֹתִי
  chosen: and I will remove
  alternatives:
  - and I will turn away
  - and I will take away
  lexicon: HALOT
  rationale: סור/הסיר in the Hiphil means to remove or take away. 'Remove' is clear,
    direct, and fits the promise of divine protection.
- source_word: מַחֲלָה
  chosen: sickness
  alternatives:
  - disease
  - illness
  lexicon: HALOT
  rationale: The noun denotes sickness/disease. 'Sickness' is natural modern English
    and broad enough to cover the term's range without sounding overly clinical.
- source_word: מִקִּרְבֶּךָ
  chosen: from your midst
  alternatives:
  - from among you
  - from within you
  lexicon: HALOT
  rationale: The phrase literally means 'from your midst.' This preserves the communal/covenantal
    sense and avoids narrowing it to merely internal bodily illness.
