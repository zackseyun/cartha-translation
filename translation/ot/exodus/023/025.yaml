theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This preserves reverential convention without importing additional theological
    claims.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Number shift in second-person forms
  chosen_reading: Retain singular possessives in English ('your bread ... your water
    ... your midst') while using idiomatic 'You shall serve'
  alternative_readings:
  - Pluralize throughout as 'your bread ... your water ... your midst' addressed to
    all collectively with an explanatory note
  rationale: The Hebrew begins with a 2mp verb but then uses singular possessive suffixes,
    a common collective address pattern. English can preserve the wording naturally
    without forcing an awkward distinction; the singular possessives function collectively
    for Israel.
