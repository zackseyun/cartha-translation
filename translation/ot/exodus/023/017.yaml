id: EXO.23.17
reference: Exodus 23:17
source:
  edition: WLC
  text: שָׁלֹ֥שׁ פְּעָמִ֖ים בַּ/שָּׁנָ֑ה יֵרָאֶה֙ כָּל זְכ֣וּרְ/ךָ֔ אֶל פְּנֵ֖י הָ/אָדֹ֥ן יְהוָֽה־־׀׃
translation:
  text: Three times in the year every male among you shall appear before the Lord Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''before the Lord Yahweh.'' English ''the Lord GOD'' reflects the Hebrew title-plus-divine-name combination and avoids the awkward ''Lord LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: שָׁלֹשׁ פְּעָמִים
  chosen: Three times
  alternatives:
  - Three occasions
  lexicon: HALOT
  rationale: The idiom denotes frequency/occasions. 'Three times' is the most natural and direct English rendering.
- source_word: בַּשָּׁנָה
  chosen: in the year
  alternatives:
  - a year
  - yearly
  lexicon: HALOT
  rationale: With the article, the phrase is most naturally rendered 'in the year,' i.e., within the yearly cycle. This preserves the Hebrew form better than the more idiomatic but less formal 'a year.'
- source_word: יֵרָאֶה
  chosen: shall appear
  alternatives:
  - shall be seen
  - shall present himself
  lexicon: HALOT
  rationale: Niphal of ראה here functions idiomatically for appearing before a superior/deity. 'Shall appear' is standard, clear English. 'Shall be seen' is too wooden, while 'present himself' adds an explicit reflexive nuance not present in the Hebrew wording.
- source_word: כָּל זְכוּרְךָ
  chosen: every male among you
  alternatives:
  - all your males
  - every male of yours
  lexicon: HALOT
  rationale: The phrase refers specifically to the male members of Israelite households. 'Every male among you' is natural English and preserves the masculine specificity required by the source; it avoids flattening to a gender-neutral expression.
- source_word: אֶל פְּנֵי
  chosen: before
  alternatives:
  - before the face of
  - in the presence of
  lexicon: HALOT
  rationale: This is a common Hebrew prepositional expression meaning to come into someone's presence. 'Before' is concise and idiomatic; the fuller literal sense is not necessary in the main text.
- source_word: הָאָדֹן
  chosen: the Lord
  alternatives:
  - the Master
  - the Sovereign
  lexicon: HALOT
  rationale: אָדוֹן here is a divine title. 'The Lord' is the most natural English equivalent in this context and aligns with the project's rendering of divine titles.
- source_word: יְהוָה
  chosen: GOD
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
