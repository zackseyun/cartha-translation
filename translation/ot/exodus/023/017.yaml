theological_decisions:
- issue: Rendering the divine name יְהוָה in the collocation הָאָדֹן יְהוָה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord the LORD
  - the Lord Yahweh
  rationale: The project's default for יְהוָה is 'the LORD,' but in the fixed Hebrew
    collocation 'the Lord YHWH,' English convention commonly uses 'the Lord GOD' to
    avoid the awkward 'Lord LORD' while still signaling the divine name distinctly.
    'Yahweh' is preserved as an alternative in a footnote rather than used in the
    main text, in keeping with the doctrine's default rendering for YHWH.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → the LORD'
