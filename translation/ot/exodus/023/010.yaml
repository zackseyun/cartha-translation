id: EXO.23.10
reference: Exodus 23:10
source:
  edition: WLC
  text: וְ/שֵׁ֥שׁ שָׁנִ֖ים תִּזְרַ֣ע אֶת אַרְצֶ֑/ךָ וְ/אָסַפְתָּ֖ אֶת תְּבוּאָתָֽ/הּ־־׃
translation:
  text: For six years you shall sow your land and gather its produce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its yield.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/שֵׁשׁ שָׁנִים
  chosen: For six years
  alternatives:
  - And six years
  - Six years
  lexicon: HALOT
  rationale: The conjunction with the numeral-plus-time expression is best rendered
    idiomatically in English as a temporal frame, 'For six years,' introducing the
    command's duration rather than preserving a wooden initial 'and.'
- source_word: תִּזְרַע
  chosen: you shall sow
  alternatives:
  - you are to sow
  - you may sow
  lexicon: HALOT
  rationale: The imperfect 2ms in this legal context carries prescriptive force, so
    'shall sow' appropriately reflects covenantal instruction in readable English.
- source_word: אַרְצֶךָ
  chosen: your land
  alternatives:
  - your earth
  - your ground
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the Israelite's cultivated landholding rather than
    the earth in general, so 'your land' best fits the agricultural law context.
- source_word: וְאָסַפְתָּ
  chosen: and gather
  alternatives:
  - and collect
  - and harvest
  lexicon: HALOT
  rationale: אָסַף commonly means gather or collect. 'Gather' is broad enough to cover
    bringing in the yield, while avoiding over-specification beyond the Hebrew. The
    English coordinate verb matches the sequence of actions in the law.
- source_word: תְּבוּאָתָהּ
  chosen: its produce
  alternatives:
  - its yield
  - its crops
  - its increase
  lexicon: HALOT
  rationale: תְּבוּאָה denotes agricultural produce/yield. 'Produce' is natural modern
    English and suitably general for the land's output. The feminine suffix is represented
    by 'its,' referring back to 'land.'
