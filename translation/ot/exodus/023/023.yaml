id: EXO.23.23
reference: Exodus 23:23
source:
  edition: WLC
  text: כִּֽי יֵלֵ֣ךְ מַלְאָכִ/י֮ לְ/פָנֶי/ךָ֒ וֶ/הֱבִֽיאֲ/ךָ֗ אֶל הָֽ/אֱמֹרִי֙ וְ/הַ֣/חִתִּ֔י
    וְ/הַ/פְּרִזִּי֙ וְ/הַֽ/כְּנַעֲנִ֔י הַ/חִוִּ֖י וְ/הַ/יְבוּסִ֑י וְ/הִכְחַדְתִּֽי/ו־־׃
translation:
  text: For my angel will go before you and bring you to the Amorites, the Hittites,
    the Perizzites, the Canaanites, the Hivites, and the Jebusites, and I will wipe
    them out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my messenger.' The Hebrew מַלְאָךְ can refer to either a human or heavenly
      messenger; here 'angel' fits the context of divine guidance.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'I will wipe him/it out,' with a singular suffix used collectively
      for the listed peoples; English renders the sense as 'them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding command/promise.
    'For' preserves the explanatory force in natural English.
- source_word: יֵלֵךְ
  chosen: will go
  alternatives:
  - goes
  - shall go
  lexicon: HALOT
  rationale: Imperfect verb with future sense in context of divine promise. 'Will
    go' is clear modern English.
- source_word: מַלְאָכִי
  chosen: my angel
  alternatives:
  - my messenger
  lexicon: HALOT
  rationale: מַלְאָךְ can mean either 'messenger' or 'angel.' In this context, the
    being goes before Israel under divine commission in a supernatural guidance/judgment
    context, so 'angel' best fits standard English usage while preserving the Hebrew
    sense.
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - ahead of you
  - in front of you
  lexicon: HALOT
  rationale: Idiomatic expression for preceding and guiding. 'Before you' is both
    natural and close to the Hebrew.
- source_word: וֶהֱבִיאֲךָ
  chosen: and bring you
  alternatives:
  - and lead you in
  - and bring you into
  lexicon: HALOT
  rationale: Hiphil of בוא means 'cause to come, bring.' 'Bring you' is the most direct
    rendering; the destination is supplied by the following אֶל phrase.
- source_word: אֶל
  chosen: to
  alternatives:
  - into
  lexicon: HALOT
  rationale: Basic directional preposition. 'To' works smoothly with 'bring you' and
    the list of peoples as the destination of encounter/conquest.
- source_word: הָאֱמֹרִי ... וְהַיְבוּסִי
  chosen: the Amorites, the Hittites, the Perizzites, the Canaanites, the Hivites,
    and the Jebusites
  lexicon: HALOT
  rationale: These are standard English transliterations of the ethnic group names.
    Pluralized in English to match normal usage for peoples, though the Hebrew forms
    are singular gentilic/collective.
- source_word: וְהִכְחַדְתִּיו
  chosen: and I will wipe them out
  alternatives:
  - and I will destroy them
  - and I will cut them off
  - and I will annihilate them
  lexicon: HALOT
  rationale: Hiphil of כחד conveys causing to disappear, destroying, wiping out. The
    suffix is singular in form, likely collective referring back to the listed peoples.
    'Wipe them out' communicates the collective object naturally in English; 'destroy
    them' is possible but slightly less vivid.
