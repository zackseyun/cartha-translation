theological_decisions:
- issue: Referent and nature of מַלְאָכִי
  chosen_reading: Rendered as 'my angel' without identifying the figure beyond the
    Hebrew text.
  alternative_readings:
  - my messenger
  - a theophanic manifestation of the LORD
  - the preincarnate Son
  rationale: The verse itself identifies the figure only as God's angel/messenger.
    The translation should not resolve later theological interpretations in the main
    text. 'Angel' is the best lexical rendering here, while leaving christological
    or theophanic interpretations to interpretation rather than translation.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Object number in וְהִכְחַדְתִּיו
  chosen_reading: 'Collective sense rendered with plural English object: ''them.'''
  alternative_readings:
  - singular collective 'him/it'
  - '''I will blot it out'' referring to the collective enemy'
  rationale: The Hebrew suffix is singular, but it refers back to a series of peoples
    treated collectively. English requires a natural collective rendering; plural
    'them' best communicates the sense without wooden awkwardness.
