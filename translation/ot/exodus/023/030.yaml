theological_decisions:
- issue: Collective singular object suffix in the promise of dispossession
  chosen_reading: Render the 3ms suffix with singular 'him' while allowing the English
    reader to understand a collective referent from context.
  alternative_readings:
  - 'Render with plural sense: ''them'''
  - 'Render with impersonal singular: ''it'''
  rationale: The Hebrew grammar is singular, but the referent is the peoples/inhabitants
    of the land collectively. Preserving the singular respects the source text; the
    surrounding context supplies the collective sense. No doctrinal issue is at stake,
    but this is a significant interpretive choice affecting transparency to the Hebrew.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
