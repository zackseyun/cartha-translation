id: EXO.23.30
reference: Exodus 23:30
source:
  edition: WLC
  text: מְעַ֥ט מְעַ֛ט אֲגָרְשֶׁ֖/נּוּ מִ/פָּנֶ֑י/ךָ עַ֚ד אֲשֶׁ֣ר תִּפְרֶ֔ה וְ/נָחַלְתָּ֖
    אֶת הָ/אָֽרֶץ־׃
translation:
  text: Little by little I will drive him out from before you, until you become fruitful
    and take possession of the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'him'; the singular likely refers collectively to the inhabitants
      or nations of the land.
    reason: lexical_alternative
  - marker: b
    text: Or 'inherit the land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְעַט מְעַט
  chosen: Little by little
  alternatives:
  - gradually
  - a little at a time
  lexicon: HALOT
  rationale: The repetition of מְעַט is an idiomatic intensification indicating gradual
    action over time. 'Little by little' is a natural English equivalent that preserves
    the repeated form and sense better than a single adverb alone.
- source_word: אֲגָרְשֶׁנּוּ
  chosen: I will drive him out
  alternatives:
  - I will drive it out
  - I will expel him
  lexicon: HALOT
  rationale: From גרשׁ, 'drive out/expel.' The suffix is 3ms singular, referring collectively
    to the enemy inhabitants previously mentioned in context. English singular 'him'
    reflects the Hebrew grammatical number, though the referent is collective. 'Drive
    out' is the most idiomatic and contextually fitting rendering.
- source_word: מִפָּנֶיךָ
  chosen: from before you
  alternatives:
  - from your presence
  - from before your face
  lexicon: HALOT
  rationale: The idiom literally involves 'face/presence' and in conquest contexts
    means removal from someone's presence or in front of them. 'From before you' preserves
    the Hebrew idiom while remaining understandable in English.
- source_word: עַד אֲשֶׁר
  chosen: until
  alternatives:
  - until such time as
  - up to the point that
  lexicon: HALOT
  rationale: This common combination introduces the goal or terminating point of the
    gradual action. Simple 'until' is sufficient and natural.
- source_word: תִּפְרֶה
  chosen: you become fruitful
  alternatives:
  - you are fruitful
  - you increase
  lexicon: HALOT
  rationale: From פרה, 'be fruitful, increase.' In this context it refers to Israel's
    population growth sufficient to occupy the land. 'Become fruitful' captures the
    inceptive/resultative sense better than the stative 'are fruitful.'
- source_word: וְנָחַלְתָּ
  chosen: and take possession of
  alternatives:
  - and inherit
  - and possess
  lexicon: HALOT
  rationale: From נחל in the Qal, often 'inherit/receive as a possession.' Here the
    context is entering and occupying the land, so 'take possession of' communicates
    the concrete sense clearly in modern English. 'Inherit' is possible but may sound
    overly passive in this military-settlement context.
- source_word: אֶת־הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: הָאָרֶץ here refers to the promised land in context. 'The land' is the
    standard and sufficiently specific rendering.
