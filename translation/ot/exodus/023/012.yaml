theological_decisions:
- issue: Rendering of social-status term גר
  chosen_reading: the sojourner
  alternative_readings:
  - the resident foreigner
  - the stranger
  rationale: The verse extends Sabbath mercy beyond the native household to the socially
    vulnerable outsider residing among Israel. 'Sojourner' preserves this covenantal
    legal category without flattening it into a merely emotional or temporary sense.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
- issue: Rendering of שׁבת in Sabbath legislation
  chosen_reading: you shall cease
  alternative_readings:
  - you shall rest
  rationale: The Hebrew verb's core sense is cessation. Using 'cease' preserves the
    textual emphasis on stopping labor, while the following purpose clauses explain
    the resulting rest and refreshment for dependents and animals.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition)
