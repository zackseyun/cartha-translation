id: EXO.23.12
reference: Exodus 23:12
source:
  edition: WLC
  text: שֵׁ֤שֶׁת יָמִים֙ תַּעֲשֶׂ֣ה מַעֲשֶׂ֔י/ךָ וּ/בַ/יּ֥וֹם הַ/שְּׁבִיעִ֖י תִּשְׁבֹּ֑ת
    לְמַ֣עַן יָנ֗וּחַ שֽׁוֹרְ/ךָ֙ וַ/חֲמֹרֶ֔/ךָ וְ/יִנָּפֵ֥שׁ בֶּן אֲמָתְ/ךָ֖ וְ/הַ/גֵּֽר־׃
translation:
  text: For six days you shall do your work, but on the seventh day you shall cease,
    so that your ox and your donkey may rest, and the son of your female servant and
    the sojourner may be refreshed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you shall rest'; the Hebrew verb fundamentally means 'cease, stop.'
    reason: lexical_alternative
  - marker: b
    text: '''Sojourner'' refers to a resident foreigner living among Israel under
      its social and legal order.'
    reason: cultural_note
  - marker: c
    text: Or 'your female servant’s son.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׁשֶׁת יָמִים
  chosen: For six days
  alternatives:
  - Six days
  lexicon: HALOT
  rationale: Temporal accusative indicating duration. 'For six days' makes the English
    idiomatic while preserving the command's timeframe.
- source_word: תַּעֲשֶׂה
  chosen: you shall do
  alternatives:
  - you may do
  - you are to do
  lexicon: HALOT
  rationale: Imperfect 2ms in legal instruction functions as an injunction. 'You shall
    do' matches covenant-law style in clear modern English.
- source_word: מַעֲשֶׂיךָ
  chosen: your work
  alternatives:
  - your tasks
  - your labor
  lexicon: HALOT
  rationale: The noun refers broadly to one's work or deeds. 'Your work' is the most
    natural fit in Sabbath-law context and avoids over-specifying manual labor only.
- source_word: וּבַיּוֹם הַשְּׁבִיעִי
  chosen: but on the seventh day
  alternatives:
  - and on the seventh day
  lexicon: HALOT
  rationale: The conjunction marks continuation with contrast between six working
    days and the seventh day. 'But' brings out the contrast naturally in English.
- source_word: תִּשְׁבֹּת
  chosen: you shall cease
  alternatives:
  - you shall rest
  - you shall stop
  lexicon: HALOT
  rationale: From שׁבת, fundamentally 'cease, stop.' 'Cease' preserves the verbal
    idea behind Sabbath without importing a narrower sense of personal relaxation
    only.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the purpose that
  lexicon: HALOT
  rationale: Introduces purpose. 'So that' is idiomatic and accurately expresses the
    clause's function.
- source_word: יָנוּחַ
  chosen: may rest
  alternatives:
  - may settle down
  - may be at rest
  lexicon: HALOT
  rationale: From נוח, denoting rest or repose. 'May rest' is the standard and contextually
    fitting rendering for the animals' benefit on the Sabbath.
- source_word: שׁוֹרְךָ
  chosen: your ox
  alternatives:
  - your bull
  - your cattle
  lexicon: HALOT
  rationale: The singular noun commonly denotes an ox or bovine work animal. 'Ox'
    best fits the agrarian labor context.
- source_word: וַחֲמֹרֶךָ
  chosen: and your donkey
  alternatives:
  - and your ass
  lexicon: HALOT
  rationale: Standard modern rendering of חמור. 'Donkey' is clear contemporary English.
- source_word: וְיִנָּפֵשׁ
  chosen: may be refreshed
  alternatives:
  - may catch breath
  - may be restored
  lexicon: HALOT
  rationale: Niphal of נפשׁ here conveys regaining breath or being refreshed. 'May
    be refreshed' communicates the humane purpose of Sabbath rest better than a wooden
    gloss.
- source_word: בֶּן אֲמָתְךָ
  chosen: the son of your female servant
  alternatives:
  - your female servant's son
  - the son of your maidservant
  lexicon: HALOT
  rationale: Literally 'son of your female servant.' This likely refers to a dependent
    male within the household of a female slave/servant. The more literal phrasing
    preserves the Hebrew social relation without paraphrase.
- source_word: הַגֵּר
  chosen: the sojourner
  alternatives:
  - the resident foreigner
  - the stranger
  lexicon: HALOT
  rationale: גר denotes a resident outsider living among Israel. 'Sojourner' is a
    concise established rendering that preserves the legal-social category better
    than the vaguer 'stranger.'
