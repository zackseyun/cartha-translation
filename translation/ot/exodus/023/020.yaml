theological_decisions:
- issue: Identity of מַלְאָךְ in this context
  chosen_reading: Render the term lexically as 'an angel' without specifying in the
    main text whether this is a created angelic being or a special manifestation of
    the LORD.
  alternative_readings:
  - a human messenger
  - the Angel of the LORD as a unique divine messenger
  rationale: The verse itself identifies the figure only as מַלְאָךְ. Because the
    wider context raises interpretive questions about this messenger's status, the
    translation preserves the lexical sense without importing a more developed theological
    identification into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
