id: EXO.23.20
reference: Exodus 23:20
source:
  edition: WLC
  text: הִנֵּ֨ה אָנֹכִ֜י שֹׁלֵ֤חַ מַלְאָךְ֙ לְ/פָנֶ֔י/ךָ לִ/שְׁמָרְ/ךָ֖ בַּ/דָּ֑רֶךְ
    וְ/לַ/הֲבִ֣יאֲ/ךָ֔ אֶל הַ/מָּק֖וֹם אֲשֶׁ֥ר הֲכִנֹֽתִי־׃
translation:
  text: Behold, I am sending an angel before you to guard you on the way and to bring
    you to the place that I have prepared.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a messenger.' The Hebrew מַלְאָךְ can mean either a human messenger
      or an angelic messenger; here 'angel' best fits the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Retains the deictic force and solemn attention-getting function of the
    Hebrew particle. 'Behold' is slightly elevated but still natural in this context
    and fits the gravity of divine speech better than flatter alternatives.
- source_word: אָנֹכִי
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis, but English normally conveys this
    adequately with explicit subject 'I' alongside the present progressive verb. 'I
    myself' would overstate the emphasis in the main text.
- source_word: שֹׁלֵחַ
  chosen: am sending
  alternatives:
  - send
  - am about to send
  lexicon: HALOT
  rationale: The participle with אָנֹכִי in direct speech naturally conveys an imminent
    or ongoing action. 'Am sending' preserves that aspect better than a simple present.
- source_word: מַלְאָךְ
  chosen: an angel
  alternatives:
  - a messenger
  lexicon: HALOT
  rationale: Although the Hebrew can mean either 'messenger' or 'angel,' in this context
    the being is sent by God ahead of Israel with protective and guiding functions,
    and the broader passage supports a supernatural envoy. 'Angel' is therefore the
    most likely sense, while the lexical alternative is preserved in a footnote.
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - ahead of you
  - in front of you
  lexicon: HALOT
  rationale: '''Before you'' is a natural rendering and preserves the idiomatic sense
    of going in advance. ''Ahead of you'' is possible but slightly more interpretive.'
- source_word: לִשְׁמָרְךָ
  chosen: to guard you
  alternatives:
  - to keep you
  - to watch over you
  lexicon: HALOT
  rationale: The verb שׁמר commonly means guard, keep, watch over. 'Guard you' best
    fits the protective sense in a travel context and is clear modern English.
- source_word: בַּדָּרֶךְ
  chosen: on the way
  alternatives:
  - in the way
  - along the road
  lexicon: HALOT
  rationale: This idiom refers to the journey or route. 'On the way' is idiomatic
    English and avoids the misleading sense of obstruction that 'in the way' would
    have in modern usage.
- source_word: וְלַהֲבִיאֲךָ
  chosen: and to bring you
  alternatives:
  - and to lead you
  - and to cause you to come
  lexicon: HALOT
  rationale: The hiphil of בוא means to cause to come or bring. 'Bring you' is the
    most direct and natural rendering; 'lead you' would shift the lexical sense.
- source_word: הַמָּקוֹם
  chosen: the place
  alternatives:
  - the location
  lexicon: HALOT
  rationale: Straightforward rendering of מקום. 'Place' is idiomatic and sufficiently
    specific in context.
- source_word: אֲשֶׁר הֲכִנֹתִי
  chosen: that I have prepared
  alternatives:
  - which I have made ready
  - that I have established
  lexicon: HALOT
  rationale: כון in the hiphil can mean prepare, make ready, establish. In context
    of destination, 'have prepared' best captures the sense of a divinely appointed
    place made ready for Israel.
