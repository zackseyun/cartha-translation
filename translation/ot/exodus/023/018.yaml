id: EXO.23.18
reference: Exodus 23:18
source:
  edition: WLC
  text: לֹֽא תִזְבַּ֥ח עַל חָמֵ֖ץ דַּם זִבְחִ֑/י וְ/לֹֽא יָלִ֥ין חֵֽלֶב חַגִּ֖/י עַד
    בֹּֽקֶר־־־־־־׃
translation:
  text: You shall not sacrifice the blood of my sacrifice with anything leavened,
    and the fat of my feast shall not remain overnight until morning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with leaven' / 'upon leaven.' The Hebrew preposition is literally 'upon,'
      but in this sacrificial context it likely means the sacrifice must not be offered
      in association with anything leavened.
    reason: lexical_alternative
  - marker: b
    text: Or 'festival' for 'feast.' The Hebrew term refers to a sacred festival celebration.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִזְבַּח
  chosen: you shall not sacrifice
  alternatives:
  - you must not offer as a sacrifice
  lexicon: HALOT
  rationale: Qal imperfect 2ms of זבח in legal prohibition with לֹא is naturally rendered
    as a second-person prohibition. 'Sacrifice' keeps the cultic sense without unnecessary
    expansion.
- source_word: עַל חָמֵץ
  chosen: with anything leavened
  alternatives:
  - upon leaven
  - with leaven
  lexicon: HALOT
  rationale: The preposition עַל here is idiomatic in sacrificial context; a wooden
    'upon leaven' is unclear in English. 'With anything leavened' conveys the prohibition
    against offering the sacrifice in association with leavened matter.
- source_word: דַּם זִבְחִי
  chosen: the blood of my sacrifice
  alternatives:
  - the blood of my sacrificial offering
  lexicon: HALOT
  rationale: Construct chain with 1cs suffix. Retaining 'blood' is important because
    the Hebrew explicitly mentions the blood of the sacrifice, not merely the sacrifice
    itself.
- source_word: יָלִין
  chosen: shall not remain overnight
  alternatives:
  - shall not stay all night
  - shall not be left overnight
  lexicon: HALOT
  rationale: From לין, 'remain/spend the night.' 'Remain overnight' is idiomatic modern
    English and fits the legal context.
- source_word: חֵלֶב
  chosen: the fat
  alternatives:
  - the choicest part
  - the fat portions
  lexicon: HALOT
  rationale: The Hebrew specifically says 'fat,' likely referring to sacrificial fat
    portions. The more interpretive 'fat portions' is possible, but the simpler 'fat'
    preserves the lexical form.
- source_word: חַגִּי
  chosen: my feast
  alternatives:
  - my festival
  lexicon: HALOT
  rationale: חַג denotes a pilgrimage feast/festival. 'Feast' is natural in English
    and fits the sacrificial setting; 'festival' is a viable alternative but slightly
    less concrete here.
- source_word: עַד בֹּקֶר
  chosen: until morning
  alternatives:
  - until the morning
  lexicon: HALOT
  rationale: Standard temporal phrase. English idiom favors omission of the article.
