theological_decisions:
- issue: Referent of first-person suffixes in 'my sacrifice' and 'my feast'
  chosen_reading: Retain the first-person divine speech as 'my sacrifice' and 'my
    feast' without interpretive expansion.
  alternative_readings:
  - '''the sacrifice to me'''
  - '''the feast of the LORD'''
  rationale: The Hebrew suffixes are explicit and should be preserved. Expanding them
    to explanatory paraphrases would go beyond the text. The verse presents the offerings/festival
    as belonging to God in covenantal worship.
  doctrine_reference: Translation philosophy §1, §5
