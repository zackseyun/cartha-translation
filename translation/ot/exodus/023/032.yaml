theological_decisions:
- issue: Rendering the covenant idiom כרת ברית
  chosen_reading: make no covenant
  alternative_readings:
  - cut no covenant
  rationale: The Hebrew idiom literally says 'cut a covenant,' but optimal equivalence
    favors the natural English covenant formula 'make a covenant.' This avoids wooden
    phrasing without losing the legal-theological force of the prohibition.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
- issue: Force of ו before 'their gods'
  chosen_reading: or with their gods
  alternative_readings:
  - and with their gods
  rationale: 'Although ו commonly means ''and,'' in a prohibition listing multiple
    forbidden objects English often uses ''or'' to communicate the intended sense
    clearly: no covenant either with them or with their gods. This is a stylistic-semantic
    choice, not a doctrinal one.'
  doctrine_reference: 'Translation philosophy: optimal equivalence'
