id: EXO.23.32
reference: Exodus 23:32
source:
  edition: WLC
  text: לֹֽא תִכְרֹ֥ת לָ/הֶ֛ם וְ/לֵ/אלֹֽהֵי/הֶ֖ם בְּרִֽית־׃
translation:
  text: You shall make no covenant with them or with their gods.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'cut a covenant.'
    reason: lexical_alternative
  - marker: b
    text: Or, more formally, 'and with their gods.'
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא
  chosen: no / not
  alternatives:
  - not
  lexicon: HALOT
  rationale: Standard negation. In English, rendered idiomatically with 'make no covenant'
    rather than the less natural 'not cut a covenant,' while preserving the prohibition.
- source_word: תִכְרֹת
  chosen: you shall make
  alternatives:
  - you shall cut
  - you must not make
  lexicon: HALOT
  rationale: The verb כרת with בְּרִית is a fixed covenant-making idiom, literally
    'cut a covenant.' 'Make' best conveys the idiom in clear modern English while
    retaining the formal force of the command. 'Shall' reflects the second masculine
    singular prohibition in legal style.
- source_word: לָהֶם
  chosen: with them
  alternatives:
  - for them
  lexicon: HALOT
  rationale: 'The preposition ל with כרת ברית in covenant contexts is naturally rendered
    ''with'' in English: one makes a covenant with someone.'
- source_word: וְלֵאלֹהֵיהֶם
  chosen: or with their gods
  alternatives:
  - and with their gods
  lexicon: HALOT
  rationale: The conjunction joins a second prohibited covenant partner. English 'or'
    better expresses the distributive force of the prohibition ('neither...nor' sense)
    than a simple additive 'and,' though the Hebrew conjunction is formally 'and.'
    'Gods' is required by the plural form and the pagan context.
- source_word: בְּרִית
  chosen: covenant
  alternatives:
  - treaty
  - agreement
  lexicon: HALOT
  rationale: '''Covenant'' is the standard and theologically weighty rendering for
    ברית. ''Treaty'' could fit politically, but ''covenant'' preserves the broader
    relational and religious dimension, especially since the verse also forbids covenant
    with their gods.'
