theological_decisions:
- issue: Referent of the final pronoun עִמּוֹ
  chosen_reading: with him (the owner who hates you)
  alternative_readings:
  - with it (the donkey)
  rationale: The Hebrew masculine singular can grammatically refer to either owner
    or donkey, but the immediate legal-ethical thrust favors helping the person in
    relation to his animal. Rendering 'with him' preserves the social dimension of
    assisting even an adversary. The alternative is preserved in a footnote because
    some understand the phrase as focused on the animal.
  doctrine_reference: Translation philosophy §3, preserve theological/interpreive
    tension where genuine ambiguity exists
