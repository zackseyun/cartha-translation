id: EXO.23.5
reference: Exodus 23:5
source:
  edition: WLC
  text: כִּֽי תִרְאֶ֞ה חֲמ֣וֹר שֹׂנַאֲ/ךָ֗ רֹבֵץ֙ תַּ֣חַת מַשָּׂא֔/וֹ וְ/חָדַלְתָּ֖
    מֵ/עֲזֹ֣ב ל֑/וֹ עָזֹ֥ב תַּעֲזֹ֖ב עִמּֽ/וֹ־׃ס
translation:
  text: If you see the donkey of one who hates you lying down under its load, and
    you would refrain from helping him, you must surely help with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with it,' i.e., help the donkey with its load. The Hebrew pronoun can
      be understood with either the owner or the animal.
    reason: alternative_reading
  - marker: b
    text: The Hebrew verb here commonly means 'leave' or 'forsake,' but in this context
      it carries the sense 'help, assist.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Here כִּי introduces a casuistic condition in legal material; 'If' fits
    standard English law-style formulation better than 'When,' while preserving the
    conditional sense.
- source_word: תִרְאֶה
  chosen: you see
  alternatives:
  - you encounter
  - you notice
  lexicon: HALOT
  rationale: The verb ראה is literally 'see.' 'You see' preserves the directness of
    the Hebrew without over-interpreting as accidental encounter.
- source_word: חֲמוֹר
  chosen: donkey
  alternatives:
  - ass
  lexicon: HALOT
  rationale: '''Donkey'' is the clear modern English equivalent; ''ass'' is archaic/ambiguous
    in contemporary English.'
- source_word: שֹׂנַאֲךָ
  chosen: one who hates you
  alternatives:
  - your enemy
  - your hater
  lexicon: HALOT
  rationale: The participial form literally denotes 'one hating you.' 'One who hates
    you' preserves the lexical force without importing the broader category 'enemy,'
    though that is contextually close.
- source_word: רֹבֵץ
  chosen: lying down
  alternatives:
  - crouching
  - collapsed
  lexicon: HALOT
  rationale: The participle of רבץ commonly describes an animal lying down. In context
    it implies being down under a burden, but 'lying down' keeps the image without
    adding interpretive detail.
- source_word: תַּחַת מַשָּׂאוֹ
  chosen: under its load
  alternatives:
  - under his load
  - beneath its burden
  lexicon: HALOT
  rationale: The phrase denotes being beneath the burden it carries. 'Its load' refers
    naturally to the donkey in English; 'burden' is possible but 'load' is more idiomatic
    here.
- source_word: וְחָדַלְתָּ מֵעֲזֹב לוֹ
  chosen: and you would refrain from helping him
  alternatives:
  - and you refrain from helping him
  - and you are tempted to leave him without help
  - and you would desist from helping him
  lexicon: HALOT
  rationale: The construction is difficult and idiomatic. It expresses the prospect
    or inclination of holding back from assistance. 'Would refrain' captures the conditional
    nuance in context better than a flat indicative, while 'helping him' reflects
    the following עזב in this context of assistance.
- source_word: עָזֹב תַּעֲזֹב
  chosen: you must surely help
  alternatives:
  - you shall surely help
  - you must certainly help
  - you shall surely release
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the command. In this
    context עזב means to help/assist rather than the more common 'leave, forsake.'
    'You must surely help' conveys both obligation and emphasis in natural English.
- source_word: עִמּוֹ
  chosen: with him
  alternatives:
  - with it
  - together with him
  lexicon: HALOT
  rationale: 'The suffix is masculine singular and most naturally refers to the owner,
    not the donkey: the command is to assist together with him in unloading or raising
    the animal. This also fits the interpersonal ethic of aiding even one who hates
    you.'
