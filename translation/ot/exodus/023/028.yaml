theological_decisions:
- issue: Whether הַצִּרְעָה should be rendered literally or interpreted metaphorically
  chosen_reading: Rendered literally as 'the hornet' in the main text
  alternative_readings:
  - Rendered figuratively as 'terror' or as a metaphor for panic, plague, or military
    pressure
  rationale: The Hebrew lexical sense most naturally refers to a hornet/stinging insect.
    Since the translation philosophy prioritizes original-language primacy and avoids
    importing interpretive conclusions not demanded by the text, the literal rendering
    is preferred. Possible figurative understandings are preserved in a footnote rather
    than moved into the main text.
  doctrine_reference: Translation philosophy §1, §3
