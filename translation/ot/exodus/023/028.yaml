id: EXO.23.28
reference: Exodus 23:28
source:
  edition: WLC
  text: וְ/שָׁלַחְתִּ֥י אֶת הַ/צִּרְעָ֖ה לְ/פָנֶ֑י/ךָ וְ/גֵרְשָׁ֗ה אֶת הַ/חִוִּ֧י
    אֶת הַֽ/כְּנַעֲנִ֛י וְ/אֶת הַ/חִתִּ֖י מִ/לְּ/פָנֶֽי/ךָ־־־־׃
translation:
  text: And I will send the hornet ahead of you, and it will drive out the Hivite,
    the Canaanite, and the Hittite from before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly a figurative image for panic or some other means of divine pressure
      sent ahead of Israel; the Hebrew word normally means 'hornet.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁלַחְתִּי
  chosen: And I will send
  alternatives:
  - And I shall send
  lexicon: HALOT
  rationale: Qal perfect 1cs with prefixed conjunction in context functions as a future
    promise. 'Will send' is natural modern English and preserves divine agency.
- source_word: הַצִּרְעָה
  chosen: the hornet
  alternatives:
  - the swarm of hornets
  - the terror
  lexicon: HALOT
  rationale: The noun ordinarily denotes 'hornet' or a stinging insect. Singular with
    article is best rendered as a collective or representative singular in English.
    More figurative renderings such as 'terror' are interpretive and go beyond the
    plain lexical sense, though the term may function instrumentally in judgment.
- source_word: לְפָנֶיךָ
  chosen: ahead of you
  alternatives:
  - before you
  - in front of you
  lexicon: HALOT
  rationale: Literally 'before your face.' Here it expresses prior movement or advance
    action, so 'ahead of you' gives clear contemporary English while preserving the
    spatial sense.
- source_word: וְגֵרְשָׁה
  chosen: and it will drive out
  alternatives:
  - and it shall drive out
  - and it will expel
  lexicon: HALOT
  rationale: The verb גרשׁ means 'drive out, expel.' The feminine singular verbal
    form agrees with the feminine noun 'hornet,' so the English subject is rendered
    explicitly as 'it' for clarity.
- source_word: הַחִוִּי
  chosen: the Hivite
  lexicon: HALOT
  rationale: Standard English ethnonym for the named people group; transliteration
    preserves the proper-name character.
- source_word: הַכְּנַעֲנִי
  chosen: the Canaanite
  lexicon: HALOT
  rationale: Standard English ethnonym for the named people group.
- source_word: הַחִתִּי
  chosen: the Hittite
  lexicon: HALOT
  rationale: Standard English ethnonym for the named people group.
- source_word: מִלְּפָנֶיךָ
  chosen: from before you
  alternatives:
  - from your presence
  - from before your face
  lexicon: HALOT
  rationale: This phrase mirrors the earlier spatial idiom and is kept relatively
    formal here because it is a common biblical expression for removal from someone's
    presence or path. 'From before you' preserves that idiom without over-paraphrase.
