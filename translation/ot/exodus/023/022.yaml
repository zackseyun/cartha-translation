id: EXO.23.22
reference: Exodus 23:22
source:
  edition: WLC
  text: כִּ֣י אִם שָׁמֹ֤עַ תִּשְׁמַע֙ בְּ/קֹל֔/וֹ וְ/עָשִׂ֕יתָ כֹּ֖ל אֲשֶׁ֣ר אֲדַבֵּ֑ר
    וְ/אָֽיַבְתִּי֙ אֶת אֹ֣יְבֶ֔י/ךָ וְ/צַרְתִּ֖י אֶת צֹרְרֶֽי/ךָ־־־׃
translation:
  text: But if you carefully obey his voice and do all that I speak, then I will be
    an enemy to your enemies and an adversary to your adversaries.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if you surely listen to his voice.' The Hebrew uses an infinitive absolute
      with the finite verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: The verse shifts from 'his voice' to 'I speak,' preserving the close link
      between the messenger and the LORD in the context.
    reason: cross_reference
lexical_decisions:
- source_word: כִּי אִם
  chosen: But if
  alternatives:
  - For if
  - Indeed if
  lexicon: HALOT
  rationale: The combination introduces a strong conditional contrast with the previous
    warning and promise. 'But if' captures the adversative-conditional force naturally
    in English.
- source_word: שָׁמֹעַ תִּשְׁמַע
  chosen: you carefully obey
  alternatives:
  - you surely listen
  - you diligently obey
  - you indeed hear
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the verb. Because
    שׁמע with 'voice' commonly carries the sense of obedient hearing, 'carefully obey'
    conveys both hearing and responsive obedience without awkward literalism.
- source_word: בְּקֹלוֹ
  chosen: his voice
  alternatives:
  - to his voice
  lexicon: HALOT
  rationale: A literal rendering preserves the Hebrew idiom and the personal nature
    of the command. English can naturally say 'obey his voice' in biblical style;
    this also keeps the referent tied to the angel/messenger in context.
- source_word: וְעָשִׂיתָ כֹּל אֲשֶׁר אֲדַבֵּר
  chosen: and do all that I speak
  alternatives:
  - and do all that I say
  - and do everything that I speak
  lexicon: HALOT
  rationale: The Hebrew shifts from 'his voice' to first-person divine speech. 'Speak'
    preserves that shift more closely than 'say,' though either is possible. 'All
    that I speak' keeps the directness of the Hebrew.
- source_word: וְאָיַבְתִּי
  chosen: I will be an enemy to
  alternatives:
  - I will oppose
  - I will hate
  lexicon: HALOT
  rationale: From איב, the sense here is relational hostility toward Israel's enemies.
    'Be an enemy to' preserves the lexical connection with 'your enemies' better than
    the more interpretive 'oppose.' 'Hate' is too affective and less contextually
    precise.
- source_word: אֹיְבֶיךָ
  chosen: your enemies
  lexicon: HALOT
  rationale: Standard rendering of the participial noun אויב in this military/covenantal
    context.
- source_word: וְצַרְתִּי
  chosen: and an adversary to
  alternatives:
  - and I will afflict
  - and I will harass
  - and I will oppose
  lexicon: HALOT
  rationale: The verb from צרר denotes showing hostility or pressing against. Rendering
    it as 'be an adversary to' preserves the wordplay with the following noun and
    parallels the previous clause.
- source_word: צֹרְרֶיךָ
  chosen: your adversaries
  alternatives:
  - those who oppose you
  - your foes
  lexicon: HALOT
  rationale: This keeps the cognate relationship with וְצַרְתִּי and distinguishes
    it slightly from 'enemies' in the prior clause, reflecting the Hebrew variation.
