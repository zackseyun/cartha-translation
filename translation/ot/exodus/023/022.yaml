theological_decisions:
- issue: Referent shift between 'his voice' and 'I speak'
  chosen_reading: Preserve the text's shift from the messenger's voice to the LORD's
    first-person speech without harmonizing it.
  alternative_readings:
  - Interpret both clauses as referring only to the angel
  - Interpret both clauses as direct divine speech and smooth the wording
  rationale: The verse intentionally maintains close identification between the messenger's
    voice and God's own speech in the immediate context. The translation preserves
    this theological tension rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
