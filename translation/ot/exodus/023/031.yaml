theological_decisions:
- issue: Geographic designation יַם סוּף
  chosen_reading: Red Sea
  alternative_readings:
  - Sea of Reeds
  rationale: This is primarily a lexical-geographic decision rather than a doctrinal
    one. 'Red Sea' is retained in the main text for recognizability and traditional
    geographic reference, while the more literal alternative is preserved in a footnote
    for auditability.
