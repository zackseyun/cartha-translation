id: EXO.23.31
reference: Exodus 23:31
source:
  edition: WLC
  text: וְ/שַׁתִּ֣י אֶת גְּבֻלְ/ךָ֗ מִ/יַּם סוּף֙ וְ/עַד יָ֣ם פְּלִשְׁתִּ֔ים וּ/מִ/מִּדְבָּ֖ר
    עַד הַ/נָּהָ֑ר כִּ֣י אֶתֵּ֣ן בְּ/יֶדְ/כֶ֗ם אֵ֚ת יֹשְׁבֵ֣י הָ/אָ֔רֶץ וְ/גֵרַשְׁתָּ֖/מוֹ
    מִ/פָּנֶֽי/ךָ־־־־׀׃
translation:
  text: And I will set your border from the Red Sea to the Sea of the Philistines,
    and from the wilderness to the River; for I will give the inhabitants of the land
    into your hand, and you will drive them out from before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Sea of Reeds.'''
    reason: lexical_alternative
  - marker: b
    text: That is, the Euphrates.
    reason: cultural_note
lexical_decisions:
- source_word: וְשַׁתִּי
  chosen: And I will set
  alternatives:
  - And I will place
  - And I will establish
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this context has future force
    in divine promise. 'Set' is natural English for establishing territorial boundaries
    and stays close to the Hebrew verb שׂים.
- source_word: גְּבֻלְךָ
  chosen: your border
  alternatives:
  - your boundary
  - your territory
  lexicon: HALOT
  rationale: גְּבוּל commonly denotes a border or boundary. 'Border' fits the geographic
    context better than the broader 'territory.'
- source_word: מִיַּם סוּף
  chosen: from the Red Sea
  alternatives:
  - from the Sea of Reeds
  lexicon: HALOT
  rationale: Yam Suph is the conventional geographic designation. Although the Hebrew
    more literally may suggest 'Sea of Reeds,' 'Red Sea' is the standard referent
    in English Bible usage; the lexical alternative is preserved in a footnote for
    transparency.
- source_word: יָם פְּלִשְׁתִּים
  chosen: the Sea of the Philistines
  alternatives:
  - the Philistine Sea
  - the Mediterranean Sea
  lexicon: HALOT
  rationale: A formally transparent rendering preserves the Hebrew expression and
    lets readers see the ethnic-geographic designation. It likely refers to the Mediterranean
    coast, but the text itself names it by relation to the Philistines.
- source_word: וּמִמִּדְבָּר
  chosen: and from the wilderness
  alternatives:
  - and from the desert
  lexicon: HALOT
  rationale: מִדְבָּר can be 'wilderness' or 'desert.' 'Wilderness' is a standard
    and contextually suitable rendering in Exodus.
- source_word: הַנָּהָר
  chosen: the River
  alternatives:
  - the Euphrates River
  lexicon: HALOT
  rationale: With the article, 'the River' is a conventional Hebrew way to refer to
    the Euphrates. The main text preserves the Hebrew idiom while a footnote can identify
    the referent.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground for the preceding promise. 'For' is concise and
    natural.
- source_word: אֶתֵּן בְּיֶדְכֶם
  chosen: I will give ... into your hand
  alternatives:
  - I will deliver ... into your power
  - I will hand ... over to you
  lexicon: HALOT
  rationale: The idiom נתן ביד is well represented by 'give into your hand,' preserving
    the concrete Hebrew imagery while remaining understandable.
- source_word: יֹשְׁבֵי הָאָרֶץ
  chosen: the inhabitants of the land
  alternatives:
  - those who dwell in the land
  - the residents of the land
  lexicon: HALOT
  rationale: A participial construction meaning those dwelling in the land. 'Inhabitants'
    is idiomatic and sufficiently formal.
- source_word: וְגֵרַשְׁתָּמוֹ
  chosen: and you will drive them out
  alternatives:
  - and you shall drive them out
  - and you will expel them
  lexicon: HALOT
  rationale: גרשׁ commonly means drive out/expel. 'Drive them out' is direct, idiomatic,
    and matches the conquest context.
- source_word: מִפָּנֶיךָ
  chosen: from before you
  alternatives:
  - from your presence
  - ahead of you
  lexicon: HALOT
  rationale: The idiom literally means 'from before your face/presence.' 'From before
    you' preserves the Hebrew flavor without obscuring meaning.
