id: EXO.23.21
reference: Exodus 23:21
source:
  edition: WLC
  text: הִשָּׁ֧מֶר מִ/פָּנָ֛י/ו וּ/שְׁמַ֥ע בְּ/קֹל֖/וֹ אַל תַּמֵּ֣ר בּ֑/וֹ כִּ֣י לֹ֤א
    יִשָּׂא֙ לְ/פִשְׁעֲ/כֶ֔ם כִּ֥י שְׁמִ֖/י בְּ/קִרְבּֽ/וֹ־׃
translation:
  text: Be on your guard before him, and listen to his voice. Do not rebel against
    him, for he will not pardon your transgression, because my name is within him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my name is in him,' 'my name is upon him,' or more interpretively, 'he
      bears my name.' The phrase signals delegated divine authority, but the verse
      does not explicitly define the messenger's exact nature.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשָּׁמֶר
  chosen: Be on your guard
  alternatives:
  - Take heed
  - Beware
  - Guard yourself
  lexicon: HALOT
  rationale: Niphal imperative of שׁמר here functions as a warning to exercise careful
    vigilance. 'Be on your guard' is natural modern English and preserves the imperative
    force better than the more archaic 'beware' while remaining stronger than a mere
    'be careful.'
- source_word: מִפָּנָיו
  chosen: before him
  alternatives:
  - of him
  - in his presence
  lexicon: HALOT
  rationale: Literally 'from/before his face.' In this warning context, 'before him'
    captures the relational and positional sense without over-literal awkwardness.
    'In his presence' is possible but slightly more interpretive.
- source_word: וּשְׁמַע בְּקֹלוֹ
  chosen: and listen to his voice
  alternatives:
  - and obey his voice
  - and listen to him
  lexicon: HALOT
  rationale: שׁמע with בְּקוֹל often carries the sense of heeding/obeying, but the
    more literal 'listen to his voice' preserves the Hebrew wording and leaves the
    obedience nuance to be inferred from context. This fits optimal equivalence and
    avoids paraphrasing.
- source_word: אַל תַּמֵּר בּוֹ
  chosen: Do not rebel against him
  alternatives:
  - Do not provoke him
  - Do not be defiant toward him
  lexicon: HALOT
  rationale: The verb מרה commonly denotes rebellion or defiance, especially against
    divine authority. 'Rebel against him' best reflects the covenantal seriousness
    of the warning.
- source_word: לֹא יִשָּׂא לְפִשְׁעֲכֶם
  chosen: he will not pardon your transgression
  alternatives:
  - he will not forgive your transgression
  - he will not bear away your transgression
  lexicon: HALOT
  rationale: נשא with sin/transgression idiomatically means to bear, carry away, or
    forgive. 'Pardon' communicates judicial remission clearly in modern English and
    fits the solemn warning. Singular 'transgression' follows the Hebrew collective
    singular.
- source_word: פִשְׁעֲכֶם
  chosen: your transgression
  alternatives:
  - your rebellion
  - your offense
  lexicon: HALOT
  rationale: פשע denotes transgression/rebellion, often willful breach. 'Transgression'
    is broad enough to preserve the legal-covenantal sense without collapsing it into
    the previous verb 'rebel.'
- source_word: שְׁמִי בְּקִרְבּוֹ
  chosen: my name is within him
  alternatives:
  - my name is in him
  - my name is upon him
  - he bears my name
  lexicon: HALOT
  rationale: The phrase is compact and theologically weighty. 'Within him' closely
    reflects בְּקִרְבּוֹ ('in his midst/within him') and preserves the text's strong
    statement without over-interpreting exactly how the divine name relates to the
    messenger. Alternatives such as 'he bears my name' are interpretive and better
    preserved in a footnote.
