theological_decisions:
- issue: Judicial-ethical force of the final clause
  chosen_reading: Explicitly render the implied legal object as 'justice' in 'to pervert
    justice.'
  alternative_readings:
  - to turn aside
  - to bend judgment
  rationale: The Hebrew final infinitive is terse, but in context of testimony and
    legal dispute it refers to bending the verdict or justice. Supplying 'justice'
    clarifies the legal prohibition without importing extra doctrine; it is an interpretive
    expansion warranted by the immediate forensic context.
  doctrine_reference: Translation philosophy §1, §5
