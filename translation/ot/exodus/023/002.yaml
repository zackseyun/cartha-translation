id: EXO.23.2
reference: Exodus 23:2
source:
  edition: WLC
  text: לֹֽא תִהְיֶ֥ה אַחֲרֵֽי רַבִּ֖ים לְ/רָעֹ֑ת וְ/לֹא תַעֲנֶ֣ה עַל רִ֗ב לִ/נְטֹ֛ת
    אַחֲרֵ֥י רַבִּ֖ים לְ/הַטֹּֽת־־־־׃
translation:
  text: You shall not follow the many to do evil, and you shall not testify in a dispute
    so as to turn aside after the many, to pervert justice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you shall not answer in a dispute to turn aside after the many, to bend
      judgment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִהְיֶה אַחֲרֵי רַבִּים
  chosen: follow the many
  alternatives:
  - be after the many
  - side with the majority
  lexicon: HALOT
  rationale: אַחֲרֵי with היה idiomatically conveys going after or following. רַבִּים
    here refers to the many/the majority. 'Follow the many' preserves the warning
    against crowd-driven wrongdoing without over-paraphrasing.
- source_word: לְרָעֹת
  chosen: to do evil
  alternatives:
  - for evil
  - to do wrong
  lexicon: HALOT
  rationale: The infinitive with ל expresses purpose/result. רָעֹת is best rendered
    morally here as 'to do evil' or 'to do wrong'; 'to do evil' keeps the stronger
    ethical force.
- source_word: תַעֲנֶה
  chosen: testify
  alternatives:
  - answer
  - respond
  - give testimony
  lexicon: HALOT
  rationale: In legal context with עַל רִיב, ענה commonly refers to giving testimony
    or speaking as a witness. 'Testify' makes the forensic setting clear in natural
    English.
- source_word: עַל רִיב
  chosen: in a dispute
  alternatives:
  - in a lawsuit
  - concerning a case
  - upon a controversy
  lexicon: HALOT
  rationale: רִיב denotes a legal dispute, case, or controversy. 'In a dispute' is
    readable and broad enough to cover the judicial setting; the legal nuance is reinforced
    by 'testify' and the final clause about perverting justice.
- source_word: לִנְטֹת
  chosen: so as to turn aside
  alternatives:
  - to incline
  - to bend
  - to deviate
  lexicon: HALOT
  rationale: נטה literally means to stretch out, incline, or turn aside. In judicial
    context it refers to deviating from what is right. 'So as to turn aside' preserves
    the metaphor and links purposefully to the following phrase.
- source_word: אַחֲרֵי רַבִּים
  chosen: after the many
  alternatives:
  - after the majority
  - with the crowd
  lexicon: HALOT
  rationale: Repeating 'after the many' reflects the Hebrew repetition and keeps the
    rhetorical emphasis on majority pressure. 'Many' is slightly more formal and closer
    to the source than 'crowd.'
- source_word: לְהַטֹּת
  chosen: to pervert justice
  alternatives:
  - to turn aside
  - to distort
  - to bend judgment
  lexicon: HALOT
  rationale: The Hiphil of נטה in legal contexts often means to bend or pervert justice/judgment.
    Since English requires the implied object for clarity, 'justice' is supplied to
    express the judicial sense already signaled by the context.
