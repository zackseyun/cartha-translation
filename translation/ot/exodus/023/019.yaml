id: EXO.23.19
reference: Exodus 23:19
source:
  edition: WLC
  text: רֵאשִׁ֗ית בִּכּוּרֵי֙ אַדְמָ֣תְ/ךָ֔ תָּבִ֕יא בֵּ֖ית יְהוָ֣ה אֱלֹהֶ֑י/ךָ לֹֽא תְבַשֵּׁ֥ל גְּדִ֖י בַּ/חֲלֵ֥ב אִמּֽ/וֹ־׃ס
translation:
  text: The first of the firstfruits of your ground you shall bring into the house of Yahweh your God. You shall not boil a young goat in its mother’s milk.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the firstfruits of your land.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a kid'; that is, a young goat.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֵאשִׁית
  chosen: the first
  alternatives:
  - the best
  - the beginning
  lexicon: HALOT
  rationale: In construct with בִּכּוּרֵי, the term denotes the first portion or earliest part. Rendering it as 'the first' preserves the concrete sense without overinterpreting it as 'best,' though the idea of choiceness may be associated.
- source_word: בִּכּוּרֵי
  chosen: firstfruits
  alternatives:
  - first produce
  - first ripe fruits
  lexicon: HALOT
  rationale: Standard cultic term for the earliest produce offered to God. 'Firstfruits' is both accurate and natural in English, and fits the agricultural-offering context.
- source_word: אַדְמָתְךָ
  chosen: your ground
  alternatives:
  - your land
  - your soil
  lexicon: HALOT
  rationale: אֲדָמָה refers to arable ground/soil. 'Your ground' preserves the agricultural concreteness better than the broader 'land,' which could suggest territory rather than cultivated produce.
- source_word: תָּבִיא
  chosen: you shall bring
  alternatives:
  - you must bring
  lexicon: HALOT
  rationale: The Hiphil imperfect here functions as legal instruction. 'You shall bring' is standard covenant-law English and preserves the directive force without adding emphasis beyond the Hebrew.
- source_word: בֵּית יְהוָה אֱלֹהֶיךָ
  chosen: the house of the LORD your God
  alternatives:
  - the house of Yahweh your God
  - the temple of the LORD your God
  lexicon: HALOT
  rationale: בַּיִת here means sanctuary/house in covenantal worship context. 'House' is preferable to 'temple' because the tabernacle/sanctuary setting is broader than a later temple structure. Per doctrine, יְהוָה is rendered 'the LORD,' with 'Yahweh' preserved as an alternative only in documentation, not main text.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrine's contested-terms table for the divine name.
- source_word: לֹא תְבַשֵּׁל
  chosen: you shall not boil
  alternatives:
  - you shall not cook
  lexicon: HALOT
  rationale: בשל specifically denotes boiling/cooking. 'Boil' is more precise than the broader 'cook' and matches the prepositional phrase 'in its mother's milk.'
- source_word: גְּדִי
  chosen: a young goat
  alternatives:
  - a kid
  - a young animal
  lexicon: HALOT
  rationale: Though גְּדִי can in some contexts refer more broadly to a young animal, its normal sense is a young goat/kid. 'Young goat' is clearer for modern readers than 'kid' and avoids ambiguity with English idiom.
- source_word: בַּחֲלֵב אִמּוֹ
  chosen: in its mother’s milk
  alternatives:
  - in the milk of its mother
  lexicon: HALOT
  rationale: This is a direct, natural rendering of the Hebrew phrase. 'Its mother's milk' is idiomatic modern English while preserving the literal imagery and legal prohibition.
