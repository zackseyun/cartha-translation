  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpretation of the prohibition against boiling a young goat in its mother's milk
  chosen_reading: Retain the literal prohibition without importing a later doctrinal or ritual explanation into the translation.
  alternative_readings:
  - Translate with an explanatory paraphrase tied to Canaanite ritual
  - Translate with an explanatory paraphrase tied to cruelty or dietary separation
