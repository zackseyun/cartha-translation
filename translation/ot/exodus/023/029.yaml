id: EXO.23.29
reference: Exodus 23:29
source:
  edition: WLC
  text: לֹ֧א אֲגָרְשֶׁ֛/נּוּ מִ/פָּנֶ֖י/ךָ בְּ/שָׁנָ֣ה אֶחָ֑ת פֶּן תִּהְיֶ֤ה הָ/אָ֨רֶץ֙
    שְׁמָמָ֔ה וְ/רַבָּ֥ה עָלֶ֖י/ךָ חַיַּ֥ת הַ/שָּׂדֶֽה־׃
translation:
  text: I will not drive him out from before you in one year, lest the land become
    desolate and the wild animals of the field become too numerous against you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will not drive them out from before you in a single year.' The Hebrew
      uses a singular object suffix, likely a collective reference to the inhabitants/enemy.
    reason: lexical_alternative
  - marker: b
    text: '''Wild animals of the field'' may also be rendered ''beasts of the field.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲגָרְשֶׁנּוּ
  chosen: I will not drive him out
  alternatives:
  - I will not drive them out
  - I will not expel him
  lexicon: HALOT
  rationale: גרש commonly means to drive out or expel. The suffix is morphologically
    singular ('him'), referring collectively to the enemy/inhabitant previously mentioned;
    English can preserve the singular without obscuring the collective sense. 'Drive
    out' is idiomatic and fits conquest context.
- source_word: מִפָּנֶיךָ
  chosen: from before you
  alternatives:
  - from your presence
  - from before your face
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'from before you.' Retaining it preserves
    the spatial/confrontational sense better than the more abstract 'from your presence,'
    while remaining natural enough in English.
- source_word: בְּשָׁנָה אֶחָת
  chosen: in one year
  alternatives:
  - within one year
  - in a single year
  lexicon: HALOT
  rationale: A straightforward temporal phrase. 'In one year' is clear and close to
    the Hebrew; 'single year' is possible but slightly more interpretive in tone.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - so that not
  lexicon: HALOT
  rationale: פן introduces a negative purpose/result clause. 'Lest' is concise and
    accurately captures the warning nuance, even if slightly elevated; it remains
    readily understandable in context.
- source_word: תִּהְיֶה הָאָרֶץ שְׁמָמָה
  chosen: the land become desolate
  alternatives:
  - the land become a wasteland
  - the land lie desolate
  lexicon: HALOT
  rationale: שְׁמָמָה denotes desolation or devastation. 'Become desolate' is natural
    English and preserves the resultative sense of the clause.
- source_word: וְרַבָּה
  chosen: become too numerous
  alternatives:
  - multiply
  - increase greatly
  lexicon: HALOT
  rationale: The verb רבה means to become many/increase. Because the warning implies
    harmful overgrowth of wildlife, 'become too numerous' makes the pragmatic force
    explicit without adding foreign content.
- source_word: עָלֶיךָ
  chosen: against you
  alternatives:
  - upon you
  - over you
  lexicon: HALOT
  rationale: With hostile or adverse sense in context, על can be rendered 'against.'
    This communicates the threat posed by the animals more clearly than a wooden 'upon
    you.'
- source_word: חַיַּת הַשָּׂדֶה
  chosen: the wild animals of the field
  alternatives:
  - the beasts of the field
  - the wildlife of the countryside
  lexicon: HALOT
  rationale: The construct phrase refers to wild land animals. 'Wild animals of the
    field' is clear modern English; 'beasts of the field' is traditional but less
    natural for contemporary readers.
