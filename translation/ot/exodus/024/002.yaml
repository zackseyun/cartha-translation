id: EXO.24.2
reference: Exodus 24:2
source:
  edition: WLC
  text: וְ/נִגַּ֨שׁ מֹשֶׁ֤ה לְ/בַדּ/וֹ֙ אֶל יְהוָ֔ה וְ/הֵ֖ם לֹ֣א יִגָּ֑שׁוּ וְ/הָ/עָ֕ם
    לֹ֥א יַעֲל֖וּ עִמּֽ/וֹ־׃
translation:
  text: Moses alone shall come near to the LORD, but they shall not come near, and
    the people shall not go up with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''to Yahweh.'' The main text follows the project’s standard rendering
      of the divine name as ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְנִגַּשׁ
  chosen: shall come near
  alternatives:
  - shall approach
  - must come near
  lexicon: HALOT
  rationale: From נגשׁ, 'to approach/draw near.' Given the directive context following
    surrounding commands, English future with imperatival force ('shall come near')
    preserves the formal tone better than a simple imperative while remaining natural.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: לבדו
  chosen: alone
  alternatives:
  - by himself
  lexicon: HALOT
  rationale: 'Conveys exclusivity succinctly: Moses, and no one else, is permitted
    to approach.'
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition marks movement toward/into the presence of YHWH. Per
    doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: וְהֵם
  chosen: they
  alternatives:
  - the others
  rationale: The pronoun refers back to the previously mentioned group other than
    Moses. 'They' is the most direct rendering; the antecedent is clear from context.
- source_word: לֹא יִגָּשׁוּ
  chosen: shall not come near
  alternatives:
  - shall not approach
  lexicon: HALOT
  rationale: Repeats the same verb as earlier in the verse, so 'come near' preserves
    lexical consistency and the contrast with Moses.
- source_word: וְהָעָם
  chosen: and the people
  alternatives:
  - and the people of Israel
  lexicon: HALOT
  rationale: עם here refers to the people as a group. The Hebrew does not explicitly
    add 'of Israel' in this verse, so the shorter rendering is preferred.
- source_word: לֹא יַעֲלוּ
  chosen: shall not go up
  alternatives:
  - shall not ascend
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' 'Go up' is more natural modern English
    while preserving the spatial movement up the mountain.
- source_word: עִמּוֹ
  chosen: with him
  lexicon: HALOT
  rationale: Straightforward prepositional phrase referring to Moses.
