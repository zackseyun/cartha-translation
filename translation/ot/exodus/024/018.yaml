theological_decisions:
- issue: Rendering the cloud imagery associated with divine presence
  chosen_reading: the cloud
  alternative_readings:
  - the thick cloud
  rationale: The Hebrew here uses the ordinary noun עָנָן with article, without an
    adjective meaning 'thick.' The translation preserves the narrative's theophanic
    imagery without expanding it interpretively.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
