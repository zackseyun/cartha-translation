id: EXO.24.9
reference: Exodus 24:9
source:
  edition: WLC
  text: וַ/יַּ֥עַל מֹשֶׁ֖ה וְ/אַהֲרֹ֑ן נָדָב֙ וַ/אֲבִיה֔וּא וְ/שִׁבְעִ֖ים מִ/זִּקְנֵ֥י
    יִשְׂרָאֵֽל׃
translation:
  text: Then Moses went up, and Aaron, Nadab, Abihu, and seventy of the elders of
    Israel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - ascended
  - went up the mountain
  lexicon: HALOT
  rationale: From עלה, the basic motion is upward. 'Went up' is natural modern English
    and preserves the directional sense without adding 'the mountain,' which is contextually
    implied but not explicit in this verse.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: וְאַהֲרֹן
  chosen: and Aaron
  rationale: Simple conjunction plus proper name; standard transliteration retained.
- source_word: נָדָב
  chosen: Nadab
  rationale: Standard English transliteration of the personal name.
- source_word: וַאֲבִיהוּא
  chosen: Abihu
  rationale: Standard English transliteration of the personal name.
- source_word: וְשִׁבְעִים
  chosen: and seventy
  alternatives:
  - with seventy
  lexicon: HALOT
  rationale: Cardinal number with conjunction. 'And seventy' straightforwardly reflects
    the Hebrew coordination.
- source_word: מִזִּקְנֵי
  chosen: of the elders
  alternatives:
  - from the elders
  lexicon: HALOT
  rationale: 'The preposition מן here is naturally partitive: seventy selected from
    among the elders. English idiom prefers ''seventy of the elders'' over the more
    wooden ''seventy from the elders.'''
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Standard rendering of the national name; in context it identifies the
    elders as belonging to Israel.
