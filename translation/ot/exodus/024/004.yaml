id: EXO.24.4
reference: Exodus 24:4
source:
  edition: WLC
  text: וַ/יִּכְתֹּ֣ב מֹשֶׁ֗ה אֵ֚ת כָּל דִּבְרֵ֣י יְהוָ֔ה וַ/יַּשְׁכֵּ֣ם בַּ/בֹּ֔קֶר וַ/יִּ֥בֶן מִזְבֵּ֖חַ תַּ֣חַת הָ/הָ֑ר וּ/שְׁתֵּ֤ים עֶשְׂרֵה֙ מַצֵּבָ֔ה לִ/שְׁנֵ֥ים עָשָׂ֖ר שִׁבְטֵ֥י יִשְׂרָאֵֽל־׃
translation:
  text: And Moses wrote down all the words of Yahweh. He rose early in the morning and built an altar at the foot of the mountain, and twelve pillars for the twelve tribes of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''under the mountain,'' that is, at its base or foot.'
    reason: lexical_alternative
  - marker: b
    text: Or 'twelve standing stones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכְתֹּב
  chosen: wrote down
  alternatives:
  - wrote
  - recorded
  lexicon: HALOT
  rationale: The verb כתב means 'to write.' 'Wrote down' conveys the act of committing spoken words to writing in natural English without adding content beyond the Hebrew.
- source_word: דִּבְרֵי
  chosen: words
  alternatives:
  - matters
  - commands
  - statements
  lexicon: HALOT
  rationale: דבר in construct with 'all' and YHWH most naturally refers to the spoken words just delivered. 'Words' preserves the direct lexical sense better than interpretive options like 'commands,' though the context includes covenant stipulations.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיַּשְׁכֵּם בַּבֹּקֶר
  chosen: He rose early in the morning
  alternatives:
  - He got up early in the morning
  - He arose in the morning
  lexicon: HALOT
  rationale: The Hiphil of שׁכם idiomatically means to rise early. Including 'in the morning' reflects בַּבֹּקֶר explicitly and keeps the Hebrew temporal emphasis.
- source_word: וַיִּבֶן מִזְבֵּחַ
  chosen: built an altar
  alternatives:
  - constructed an altar
  lexicon: HALOT
  rationale: A straightforward rendering of בנה + מזבח. 'Built an altar' is idiomatic and formally close.
- source_word: תַּחַת הָהָר
  chosen: at the foot of the mountain
  alternatives:
  - under the mountain
  - below the mountain
  lexicon: HALOT
  rationale: Literally 'under the mountain,' but in this spatial context the idiomatic English equivalent is 'at the foot of the mountain,' indicating location at the mountain's base rather than beneath it.
- source_word: וּשְׁתֵּים עֶשְׂרֵה מַצֵּבָה
  chosen: and twelve pillars
  alternatives:
  - and twelve standing stones
  - and twelve memorial stones
  lexicon: HALOT
  rationale: מַצֵּבָה denotes a standing stone or pillar. 'Pillars' is concise and traditional; 'standing stones' is possible but less natural in running English. The plural sense is required by the numeral though the noun appears in singular form after the number, a normal Hebrew construction.
- source_word: לִשְׁנֵים עָשָׂר שִׁבְטֵי יִשְׂרָאֵל
  chosen: for the twelve tribes of Israel
  alternatives:
  - according to the twelve tribes of Israel
  - representing the twelve tribes of Israel
  lexicon: HALOT
  rationale: The preposition ל here marks correspondence or representation. 'For the twelve tribes of Israel' is sufficiently literal while naturally conveying that the pillars correspond to the tribes.
