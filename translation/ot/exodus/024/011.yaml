theological_decisions:
- issue: Subject of 'did not stretch out his hand'
  chosen_reading: The implicit subject is God, continuing the reference from the surrounding
    context.
  alternative_readings:
  - An impersonal reading leaving the subject unstated in English
  rationale: Hebrew leaves the subject implicit, but the nearest and most coherent
    referent in context is God. Making the subject explicit in English avoids ambiguity
    while not adding a new theological claim.
  doctrine_reference: Preserve theological tension rather than resolve it; here the
    syntax is best clarified, not left artificially vague.
- issue: Rendering the divine encounter
  chosen_reading: they saw God
  alternative_readings:
  - they saw a manifestation of God
  - they beheld God
  rationale: The Hebrew text states the encounter directly and should not be weakened
    to avoid theological tension with other passages about seeing God. The tension
    is preserved by translating the text as written.
  doctrine_reference: Preserve theological tension rather than resolve it.
