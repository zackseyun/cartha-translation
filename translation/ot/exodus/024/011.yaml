id: EXO.24.11
reference: Exodus 24:11
source:
  edition: WLC
  text: וְ/אֶל אֲצִילֵי֙ בְּנֵ֣י יִשְׂרָאֵ֔ל לֹ֥א שָׁלַ֖ח יָד֑/וֹ וַֽ/יֶּחֱזוּ֙ אֶת
    הָ֣/אֱלֹהִ֔ים וַ/יֹּאכְל֖וּ וַ/יִּשְׁתּֽוּ־־׃ס
translation:
  text: But he did not stretch out his hand against the nobles of the sons of Israel;
    they saw God, and they ate and drank.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they beheld God'—the verb can carry the sense of gazing upon or beholding.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶל
  chosen: against
  alternatives:
  - to
  - toward
  lexicon: HALOT
  rationale: With שָׁלַח יָד ('stretch/send out the hand'), אֶל carries hostile directional
    force in this idiom, so 'against' best conveys that God did not strike them.
- source_word: אֲצִילֵי
  chosen: nobles
  alternatives:
  - chief men
  - leaders
  lexicon: HALOT
  rationale: The noun refers to prominent or select members of the community. 'Nobles'
    is concise and fits the context of the representative elders ascending the mountain.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: A more formal rendering preserves the underlying familial expression
    and follows the project's gender-accurate principle. 'Israelites' is possible
    but less transparent to the Hebrew wording.
- source_word: שָׁלַח יָדוֹ
  chosen: did not stretch out his hand
  alternatives:
  - did not lay his hand
  - did not send out his hand
  lexicon: HALOT
  rationale: This idiom commonly denotes acting in judgment or violence. 'Stretch
    out his hand' is natural English and preserves the metaphor better than the more
    interpretive 'strike'.
- source_word: וַיֶּחֱזוּ
  chosen: they saw
  alternatives:
  - they gazed upon
  - they beheld
  lexicon: HALOT
  rationale: The verb can suggest seeing or beholding with some intensity. 'Saw' is
    the clearest modern English choice; the heightened nuance can be preserved in
    a footnote.
- source_word: אֶת הָאֱלֹהִים
  chosen: God
  alternatives:
  - the God
  lexicon: HALOT
  rationale: With the definite article, the phrase refers to the God of Israel. Standard
    English idiom omits the article before 'God' in this referential use.
- source_word: וַיֹּאכְלוּ וַיִּשְׁתּוּ
  chosen: and they ate and drank
  alternatives:
  - and they ate and they drank
  lexicon: HALOT
  rationale: The simple sequential verbs are best rendered straightforwardly. The
    wording preserves the remarkable normalcy of covenant fellowship after the divine
    vision.
