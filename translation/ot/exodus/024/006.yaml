id: EXO.24.6
reference: Exodus 24:6
source:
  edition: WLC
  text: וַ/יִּקַּ֤ח מֹשֶׁה֙ חֲצִ֣י הַ/דָּ֔ם וַ/יָּ֖שֶׂם בָּ/אַגָּנֹ֑ת וַ/חֲצִ֣י הַ/דָּ֔ם
    זָרַ֖ק עַל הַ/מִּזְבֵּֽחַ־׃
translation:
  text: Moses took half of the blood and put it in basins, and half of the blood he
    threw against the altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'splashed on' or 'sprinkled on the altar.' The Hebrew verb can be rendered
      in several ways in sacrificial contexts; the main text chooses a more forceful
      expression to reflect the likely physical action.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - received
  - took up
  lexicon: HALOT
  rationale: Common narrative use of לקח in the waw-consecutive wayyiqtol sequence;
    'took' is the plain and natural English equivalent.
- source_word: חֲצִי הַדָּם
  chosen: half of the blood
  alternatives:
  - half the blood
  lexicon: HALOT
  rationale: Construct phrase with definite noun; 'half of the blood' is slightly
    more explicit in English while preserving the partitive sense.
- source_word: וַיָּשֶׂם
  chosen: put
  alternatives:
  - placed
  - set
  lexicon: HALOT
  rationale: שׂים is a broad placement verb; 'put' is the most natural modern English
    rendering here.
- source_word: בָּאַגָּנֹת
  chosen: in basins
  alternatives:
  - in bowls
  lexicon: HALOT
  rationale: אַגָּנֹת refers to containers/vessels used to hold liquid. 'Basins' fits
    sacrificial context well and is a standard, clear rendering; 'bowls' is possible
    but slightly less specific.
- source_word: זָרַק
  chosen: threw against
  alternatives:
  - splashed on
  - sprinkled on
  - dashed against
  lexicon: HALOT
  rationale: זרק in sacrificial contexts often denotes tossing or throwing blood onto/against
    the altar rather than a delicate sprinkling. 'Threw against' preserves the force
    of the action and avoids understating the ritual gesture.
- source_word: עַל הַמִּזְבֵּחַ
  chosen: against the altar
  alternatives:
  - on the altar
  - upon the altar
  lexicon: HALOT
  rationale: Although על often means 'on/upon,' with זרק in this ritual context English
    'against the altar' better conveys the physical action of blood being cast onto
    the altar's surface.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name מֹשֶׁה.
