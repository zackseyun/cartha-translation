theological_decisions:
- issue: Ritual action of blood application
  chosen_reading: Rendered זָרַק with forceful sacrificial language ('threw against
    the altar') rather than softer 'sprinkled.'
  alternative_readings:
  - sprinkled on the altar
  - splashed on the altar
  rationale: The verse describes covenant-sacrifice ritual, and the Hebrew verb supports
    a more forceful act than English 'sprinkle' often suggests. This is a lexical
    and ritual-context decision, not a doctrinal embellishment.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve source-text plain sense.'
