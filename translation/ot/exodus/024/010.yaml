id: EXO.24.10
reference: Exodus 24:10
source:
  edition: WLC
  text: וַ/יִּרְא֕וּ אֵ֖ת אֱלֹהֵ֣י יִשְׂרָאֵ֑ל וְ/תַ֣חַת רַגְלָ֗י/ו כְּ/מַעֲשֵׂה֙
    לִבְנַ֣ת הַ/סַּפִּ֔יר וּ/כְ/עֶ֥צֶם הַ/שָּׁמַ֖יִם לָ/טֹֽהַר׃
translation:
  text: And they saw the God of Israel, and under his feet was something like a pavement
    of sapphire stone, and like the very heavens in clearness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'lapis lazuli'; the precise identification of סַפִּיר in the
      ancient world is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'like the workmanship of a pavement of sapphire,' an image of a crafted,
      brick- or tile-like surface beneath his feet.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְאוּ
  chosen: they saw
  alternatives:
  - they looked upon
  - they beheld
  lexicon: HALOT
  rationale: Qal wayyiqtol of ראה straightforwardly denotes visual perception. 'Saw'
    is the plainest English rendering and preserves the force of the narrative claim
    without softening it.
- source_word: אֵת אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  alternatives:
  - God of Israel
  lexicon: HALOT
  rationale: Direct-object marker plus construct phrase identifies the object seen.
    Rendering with the article in English is natural and preserves the specificity
    of Israel's God.
- source_word: וְתַחַת רַגְלָיו
  chosen: and under his feet was
  alternatives:
  - and beneath his feet was
  - and under his feet
  lexicon: HALOT
  rationale: תחת means 'under/beneath.' The Hebrew is verbless after the conjunction,
    so English supplies 'was' for readability. 'His feet' reflects the 3ms suffix
    and the anthropomorphic vision language of the text.
- source_word: כְּמַעֲשֵׂה
  chosen: something like a ... pavement
  alternatives:
  - like the work of
  - like the workmanship of
  - like a crafted surface of
  lexicon: HALOT
  rationale: מַעֲשֶׂה often means 'work, workmanship.' In this visual description,
    idiomatic English benefits from expressing the appearance rather than a wooden
    'work of.' 'Something like a ... pavement' captures the comparative כ and the
    crafted-surface sense.
- source_word: לִבְנַת
  chosen: pavement
  alternatives:
  - brickwork
  - tilework
  lexicon: HALOT
  rationale: לִבְנָה can denote brick, but in the construct phrase here it likely
    refers to a brick- or tile-like paved surface. 'Pavement' best fits the scene
    under the feet and standard English usage, while avoiding the misleading impression
    of a single brick.
- source_word: הַסַּפִּיר
  chosen: sapphire stone
  alternatives:
  - sapphire
  - lapis lazuli
  lexicon: HALOT
  rationale: סַפִּיר is traditionally rendered 'sapphire,' though the precise ancient
    gemstone may have been lapis lazuli. 'Sapphire stone' preserves the conventional
    lexical value in the main text while acknowledging gemstone language. The more
    specific mineral identification is best preserved in a footnote.
- source_word: וּכְעֶצֶם הַשָּׁמַיִם
  chosen: and like the very heavens
  alternatives:
  - and like the essence of the heavens
  - and like the body of the heavens
  - and like the heavens themselves
  lexicon: HALOT
  rationale: 'עֶצֶם here is an intensifying/comparative expression, not ''bone'' literally.
    ''The very heavens'' conveys the force idiomatically: the appearance matched the
    heavens themselves in quality.'
- source_word: לָטֹהַר
  chosen: in clearness
  alternatives:
  - for purity
  - in purity
  - in brightness
  lexicon: HALOT
  rationale: טֹהַר denotes clearness/purity. In this visual context, 'in clearness'
    communicates optical clarity more naturally than the more abstract 'purity,' while
    remaining close to the Hebrew.
