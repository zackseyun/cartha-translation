theological_decisions:
- issue: Anthropomorphic vision of God
  chosen_reading: Retain the direct statement 'they saw the God of Israel' and the
    bodily language 'under his feet' without paraphrastic softening.
  alternative_readings:
  - they saw a manifestation of the God of Israel
  - they saw where the God of Israel stood
  rationale: The Hebrew text explicitly states that they saw the God of Israel and
    describes what was under his feet. In keeping with the translation philosophy,
    the rendering preserves the theological tension rather than resolving it by inserting
    interpretive qualifiers about a mere manifestation, even though broader canonical
    theology raises questions about seeing God.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
