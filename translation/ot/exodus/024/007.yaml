theological_decisions:
- issue: Rendering of the covenant response וְנִשְׁמָע
  chosen_reading: and we will listen
  alternative_readings:
  - and we will obey
  - and we will hear
  rationale: The Hebrew verb שׁמע regularly carries both the sense of hearing/listening and the covenantal extension of obeying. Because the immediate context is the public reading of the covenant document, the auditory sense is prominent; however, covenant obedience is also clearly implicated. In keeping with the translation philosophy of preserving theological tension rather than over-resolving ambiguity, the main text uses 'listen' and a footnote preserves 'obey.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
