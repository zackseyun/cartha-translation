theological_decisions:
- issue: Generic singular in legal instruction
  chosen_reading: let him approach them
  alternative_readings:
  - let them approach them
  - they should go to them
  rationale: The Hebrew uses a singular generic subject (מִי ... יִגַּשׁ). Following
    the project's gender-accurate policy, the translation preserves the singular with
    'him' rather than flattening to a plural paraphrase.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
