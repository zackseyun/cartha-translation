id: EXO.24.14
reference: Exodus 24:14
source:
  edition: WLC
  text: וְ/אֶל הַ/זְּקֵנִ֤ים אָמַר֙ שְׁבוּ לָ֣/נוּ בָ/זֶ֔ה עַ֥ד אֲשֶׁר נָשׁ֖וּב אֲלֵי/כֶ֑ם
    וְ/הִנֵּ֨ה אַהֲרֹ֤ן וְ/חוּר֙ עִמָּ/כֶ֔ם מִי בַ֥עַל דְּבָרִ֖ים יִגַּ֥שׁ אֲלֵ/הֶֽם־־־־׃
translation:
  text: And to the elders he said, “Wait here for us until we return to you. And look,
    Aaron and Hur are with you. Whoever has a dispute, let him approach them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Whoever has a case, let him approach them.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הַזְּקֵנִים
  chosen: the elders
  alternatives:
  - the older men
  - the leaders
  lexicon: HALOT
  rationale: זְקֵנִים commonly denotes the recognized elders/leaders of the community,
    not merely elderly males. 'The elders' is the standard and contextually precise
    rendering.
- source_word: שְׁבוּ
  chosen: Wait
  alternatives:
  - Sit
  - Remain
  - Stay
  lexicon: HALOT
  rationale: From ישׁב, literally 'sit/dwell/remain.' In this directive context, Moses
    is telling them to stay in place until his return. 'Wait' captures the intended
    force in natural English while preserving the command to remain.
- source_word: לָנוּ
  chosen: for us
  alternatives:
  - for our sake
  lexicon: HALOT
  rationale: The preposition with first person plural pronoun indicates relation to
    Moses and his companion(s). 'For us' is the most straightforward rendering in
    context.
- source_word: בָזֶה
  chosen: here
  alternatives:
  - in this place
  - at this place
  lexicon: HALOT
  rationale: Literally 'in this,' idiomatically referring to the present location.
    'Here' is clear modern English and reflects the deictic sense.
- source_word: עַד אֲשֶׁר נָשׁוּב אֲלֵיכֶם
  chosen: until we return to you
  alternatives:
  - until we come back to you
  lexicon: HALOT
  rationale: A standard temporal clause with שוב. 'Return' preserves the formal sense
    without sounding archaic.
- source_word: וְהִנֵּה
  chosen: And look
  alternatives:
  - Behold
  - See
  - Now
  lexicon: HALOT
  rationale: הִנֵּה draws attention to what follows. 'And look' preserves the discourse-marking
    force in readable modern English better than archaic 'behold.'
- source_word: עִמָּכֶם
  chosen: are with you
  alternatives:
  - are among you
  lexicon: HALOT
  rationale: The preposition עִם indicates presence/association. 'Are with you' is
    the most direct rendering.
- source_word: מִי בַעַל דְּבָרִים
  chosen: Whoever has a dispute
  alternatives:
  - Whoever has matters to settle
  - Whoever is a master of words
  - Whoever has a case
  lexicon: HALOT
  rationale: The idiom בַעַל דְּבָרִים refers to a person involved in a legal matter,
    claim, or dispute. 'Whoever has a dispute' communicates the judicial context clearly.
    'Has a case' is also possible, but 'dispute' is slightly broader and natural.
- source_word: יִגַּשׁ אֲלֵהֶם
  chosen: let him approach them
  alternatives:
  - let him come near to them
  - he shall approach them
  lexicon: HALOT
  rationale: The imperfect here has jussive/instructional force in context. 'Let him
    approach them' conveys the directive naturally. Singular 'him' reflects the Hebrew
    singular generic form in keeping with the project's gender-accurate policy.
