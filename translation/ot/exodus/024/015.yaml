theological_decisions:
- issue: Nature of the cloud
  chosen_reading: Render descriptively as 'the cloud' without making explicit that
    it signifies God's glory in the main text.
  alternative_readings:
  - the glory-cloud covered the mountain
  - the cloud of the LORD covered the mountain
  rationale: The Hebrew text here names only 'the cloud.' While the broader context
    connects the cloud with divine presence, the verse itself does not explicitly
    add 'glory' or 'of the LORD,' so the translation preserves the text's restraint.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve theological tension rather than resolve it.'
