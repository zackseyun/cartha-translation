id: EXO.24.15
reference: Exodus 24:15
source:
  edition: WLC
  text: וַ/יַּ֥עַל מֹשֶׁ֖ה אֶל הָ/הָ֑ר וַ/יְכַ֥ס הֶ/עָנָ֖ן אֶת הָ/הָֽר־־׃
translation:
  text: Then Moses went up onto the mountain, and the cloud covered the mountain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And Moses went up to the mountain.' The Hebrew narrative conjunction
      can be rendered simply 'and,' and the preposition may be taken as 'to' or, in
      context with 'went up,' 'onto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - ascended
  - climbed up
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' 'Went up' is natural modern English
    and preserves the directional sense without sounding overly formal.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: אֶל
  chosen: onto
  alternatives:
  - to
  - up to
  lexicon: HALOT
  rationale: With עלה plus 'the mountain,' the sense is movement upward onto the mountain.
    'Onto' captures the spatial force more clearly in English than a bare 'to.'
- source_word: הָהָר
  chosen: the mountain
  alternatives:
  - the hill
  lexicon: HALOT
  rationale: הַר normally denotes 'mountain/hill'; in the Sinai context 'mountain'
    is the appropriate and conventional sense.
- source_word: וַיְכַס
  chosen: covered
  alternatives:
  - concealed
  - enveloped
  lexicon: HALOT
  rationale: כסה means 'cover.' 'Covered' is the most direct rendering; 'enveloped'
    is possible contextually but slightly more interpretive.
- source_word: הֶעָנָן
  chosen: the cloud
  lexicon: HALOT
  rationale: Definite noun referring to the visible cloud associated with the divine
    presence in this context; straightforwardly rendered 'the cloud.'
- source_word: אֶת
  chosen: '[direct object marker not translated]'
  lexicon: HALOT
  rationale: Hebrew direct object marker has no direct English equivalent and is represented
    by normal English syntax.
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  lexicon: HALOT
  rationale: The prefixed waw advances the narrative. 'Then' communicates sequential
    movement in readable modern English; 'And' would also be formally possible.
