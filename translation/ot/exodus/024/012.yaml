id: EXO.24.12
reference: Exodus 24:12
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל מֹשֶׁ֗ה עֲלֵ֥ה אֵלַ֛/י הָ/הָ֖רָ/ה וֶ/הְיֵה שָׁ֑ם וְ/אֶתְּנָ֨ה לְ/ךָ֜ אֶת לֻחֹ֣ת הָ/אֶ֗בֶן וְ/הַ/תּוֹרָה֙ וְ/הַ/מִּצְוָ֔ה אֲשֶׁ֥ר כָּתַ֖בְתִּי לְ/הוֹרֹתָֽ/ם־־־׃
translation:
  text: Then Yahweh said to Moses, “Come up to me on the mountain and remain there, and I will give you the stone tablets, and the law and the commandment, which I have written for their instruction.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the instruction and the commandment.' The Hebrew word torah often means 'instruction' or 'teaching,' not only legal statute.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the law and the commandment' may be understood either as additional covenant instruction alongside the stone tablets or as further describing what is written on them.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עֲלֵה אֵלַי הָהָרָה
  chosen: Come up to me on the mountain
  alternatives:
  - Go up to me on the mountain
  - Come up to me into the mountain
  lexicon: HALOT
  rationale: עלה in the imperative with אֵלַי naturally means 'come up to me.' The directional form הָהָרָה indicates movement toward the mountain; in idiomatic English, 'on the mountain' is the clearest rendering in this context.
- source_word: וֶהְיֵה שָׁם
  chosen: and remain there
  alternatives:
  - and be there
  - and stay there
  lexicon: HALOT
  rationale: The imperative of היה plus שָׁם can be rendered formally as 'be there,' but in context it carries the sense of continuing presence, so 'remain there' expresses the command naturally without over-paraphrase.
- source_word: וְאֶתְּנָה לְךָ
  chosen: and I will give you
  alternatives:
  - that I may give you
  lexicon: HALOT
  rationale: The cohortative form here functions straightforwardly as a first-person promise/intention following the command, best rendered in English as 'I will give you.'
- source_word: לֻחֹת הָאֶבֶן
  chosen: the stone tablets
  alternatives:
  - the tablets of stone
  - the stone slabs
  lexicon: HALOT
  rationale: This construct phrase refers to the covenant tablets. 'Stone tablets' is clear modern English and preserves the material reference.
- source_word: וְהַתּוֹרָה
  chosen: the law
  alternatives:
  - the instruction
  - the teaching
  lexicon: HALOT
  rationale: תּוֹרָה fundamentally denotes instruction/teaching, but in this Sinai covenant context 'the law' is the most natural and recognizable rendering. The instructional nuance is preserved later in 'for their instruction.'
- source_word: וְהַמִּצְוָה
  chosen: the commandment
  alternatives:
  - the command
  - the commandment(s)
  lexicon: HALOT
  rationale: The singular Hebrew is retained with 'the commandment.' Although some understand it collectively, the singular form is explicit and should be preserved in the main text.
- source_word: אֲשֶׁר כָּתַבְתִּי
  chosen: which I have written
  alternatives:
  - that I wrote
  lexicon: HALOT
  rationale: The perfect verb refers to completed divine writing. English present perfect fits naturally and keeps the completed-yet-relevant force.
- source_word: לְהוֹרֹתָם
  chosen: for their instruction
  alternatives:
  - to instruct them
  - for teaching them
  lexicon: HALOT
  rationale: The Hiphil infinitive of ירה means 'to instruct/teach.' 'For their instruction' is concise and preserves the purpose sense of the לְ infinitive. The 3mp suffix is rendered generically as 'their,' referring to the people of Israel.
