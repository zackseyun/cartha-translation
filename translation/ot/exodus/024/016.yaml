id: EXO.24.16
reference: Exodus 24:16
source:
  edition: WLC
  text: וַ/יִּשְׁכֹּ֤ן כְּבוֹד יְהוָה֙ עַל הַ֣ר סִינַ֔י וַ/יְכַסֵּ֥/הוּ הֶ/עָנָ֖ן שֵׁ֣שֶׁת יָמִ֑ים וַ/יִּקְרָ֧א אֶל מֹשֶׁ֛ה בַּ/יּ֥וֹם הַ/שְּׁבִיעִ֖י מִ/תּ֥וֹךְ הֶ/עָנָֽן־־־׃
translation:
  text: And the glory of Yahweh settled on Mount Sinai, and the cloud covered it for six days. On the seventh day he called to Moses from the midst of the cloud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the cloud covered the glory' if the suffix is taken to refer to 'the glory of the LORD' rather than to Mount Sinai.
    reason: alternative_reading
  - marker: b
    text: Or, 'from within the cloud.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכֹּן
  chosen: settled
  alternatives:
  - dwelt
  - rested
  - abode
  lexicon: HALOT
  rationale: From שכן, indicating taking up a settled presence. 'Settled' preserves the concrete sense of the glory coming to rest on the mountain without sounding archaic like 'abode' or overly static like 'dwelt'.
- source_word: כְּבוֹד יְהוָה
  chosen: the glory of the LORD
  alternatives:
  - the LORD's glory
  lexicon: HALOT
  rationale: Construct chain rendered naturally in English. 'Glory' is the standard equivalent for כבוד here, denoting the manifest weighty splendor/presence of YHWH.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עַל הַר סִינַי
  chosen: on Mount Sinai
  alternatives:
  - upon Mount Sinai
  lexicon: HALOT
  rationale: Standard idiomatic rendering of על with a mountain location. 'On Mount Sinai' is natural modern English and preserves the spatial sense.
- source_word: וַיְכַסֵּהוּ
  chosen: covered it
  alternatives:
  - covered him
  - covered the mountain
  lexicon: HALOT
  rationale: The 3ms suffix most naturally refers back to 'Mount Sinai' (masculine singular), not to 'glory' (which is grammatically masculine but less likely as the object of the cloud's covering in context). English 'it' captures the likely antecedent without over-specifying beyond the Hebrew.
- source_word: הֶעָנָן
  chosen: the cloud
  lexicon: HALOT
  rationale: Definite noun referring to the known theophanic cloud in the Sinai narrative.
- source_word: שֵׁשֶׁת יָמִים
  chosen: for six days
  alternatives:
  - six days
  lexicon: HALOT
  rationale: English idiom benefits from 'for' to express duration, though the Hebrew accusative of time is formally just 'six days.'
- source_word: וַיִּקְרָא
  chosen: he called
  alternatives:
  - he summoned
  - he proclaimed
  lexicon: HALOT
  rationale: The subject is most naturally the LORD, continuing the narrative. 'Called' is the broad and contextually fitting equivalent; 'summoned' is possible but slightly more interpretive.
- source_word: אֶל מֹשֶׁה
  chosen: to Moses
  lexicon: HALOT
  rationale: Direct and standard rendering of the preposition אל with the verb 'called.'
- source_word: בַּיּוֹם הַשְּׁבִיעִי
  chosen: On the seventh day
  alternatives:
  - on day seven
  lexicon: HALOT
  rationale: Natural English temporal expression preserving the definite ordinal.
- source_word: מִתּוֹךְ הֶעָנָן
  chosen: from the midst of the cloud
  alternatives:
  - from within the cloud
  - out of the cloud
  lexicon: HALOT
  rationale: מתוך conveys emergence from the interior/middle. 'From the midst of the cloud' preserves the vividness of the Hebrew better than the flatter 'out of the cloud,' while remaining readable.
