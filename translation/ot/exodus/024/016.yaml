theological_decisions:
- issue: Referent of the subject in 'he called'
  chosen_reading: The subject is the LORD
  alternative_readings:
  - The glory of the LORD as a metonymic subject
  rationale: The immediate context concerns the glory of the LORD resting on Sinai, but the narrative logic and broader Sinai theophany indicate that the one calling Moses is the LORD himself. English retains the pronoun 'he' rather than repeating 'the LORD,' preserving the Hebrew flow while allowing the antecedent to be understood from context.
  doctrine_reference: Preserve theological tension rather than resolve it; no doctrinally loaded issue beyond narrative referent.
- issue: Referent of the object suffix in 'the cloud covered it/him'
  chosen_reading: The cloud covered Mount Sinai
  alternative_readings:
  - The cloud covered the glory of the LORD
  rationale: The nearest plausible antecedent and the narrative picture favor the mountain as the object covered by the cloud. This avoids importing a more speculative interpretation while matching the scene described in the surrounding verses.
  doctrine_reference: Original-language primacy over translation tradition; preserve ambiguity only where genuine.
