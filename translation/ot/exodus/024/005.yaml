id: EXO.24.5
reference: Exodus 24:5
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֗ח אֶֽת נַעֲרֵי֙ בְּנֵ֣י יִשְׂרָאֵ֔ל וַ/יַּֽעֲל֖וּ עֹלֹ֑ת וַֽ/יִּזְבְּח֞וּ זְבָחִ֧ים שְׁלָמִ֛ים לַ/יהוָ֖ה פָּרִֽים־׃
translation:
  text: And he sent the young men of the sons of Israel, and they offered up burnt offerings and sacrificed peace offerings of bulls to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the young men of the Israelites.'
    reason: lexical_alternative
  - marker: b
    text: Or 'fellowship offerings' or 'offerings of well-being.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: he sent
  alternatives:
  - he dispatched
  lexicon: HALOT
  rationale: The waw-consecutive with שׁלח narrates Moses' action straightforwardly. 'He sent' is the plain and natural English equivalent.
- source_word: נַעֲרֵי בְּנֵי יִשְׂרָאֵל
  chosen: the young men of the sons of Israel
  alternatives:
  - the young men of the Israelites
  - the youths of the sons of Israel
  lexicon: HALOT
  rationale: נַעַר commonly denotes a youth/young man. The construct chain is preserved fairly closely. 'Young men' is more idiomatic than 'youths' here, while retaining the male reference required by the Hebrew. 'Of the sons of Israel' keeps the gender-accurate wording of בְּנֵי יִשְׂרָאֵל rather than flattening to a neutral collective in the main text.
- source_word: וַיַּעֲלוּ עֹלֹת
  chosen: they offered up burnt offerings
  alternatives:
  - they offered burnt offerings
  - they brought up burnt offerings
  lexicon: HALOT
  rationale: עלה with עֹלָה is sacrificial idiom. 'Offered up burnt offerings' reflects both the verbal sense and the established sacrificial meaning without sounding archaic.
- source_word: וַיִּזְבְּחוּ
  chosen: and sacrificed
  alternatives:
  - and slaughtered as sacrifices
  - and offered sacrifices
  lexicon: HALOT
  rationale: זבח in cultic context means to sacrifice. 'Sacrificed' is concise and fits the paired sacrificial actions in the verse.
- source_word: זְבָחִים שְׁלָמִים
  chosen: peace offerings
  alternatives:
  - fellowship offerings
  - offerings of well-being
  lexicon: HALOT
  rationale: The traditional 'peace offerings' is widely recognized and accurately reflects the sacrificial category שְׁלָמִים. Because modern scholarship often renders it 'fellowship offerings' or 'offerings of well-being,' those are preserved as alternatives in a footnote.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD,' following Jewish reverence tradition and common English Bible practice.
- source_word: פָּרִים
  chosen: of bulls
  alternatives:
  - bulls
  lexicon: HALOT
  rationale: פָּרִים specifies the sacrificial animals. Rendering it as 'of bulls' makes clear that the peace offerings consisted of bulls, attaching the noun naturally to 'peace offerings' in English.
