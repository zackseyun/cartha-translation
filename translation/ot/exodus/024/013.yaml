theological_decisions:
- issue: Relationship between Moses and Joshua in מְשָׁרְתוֹ
  chosen_reading: Joshua is described as Moses's attendant/assistant, not as a slave
    or cultic minister.
  alternative_readings:
  - Joshua his servant
  - Joshua his minister
  rationale: The Hebrew term can denote service in a range of contexts, but here the
    possessive suffix and narrative setting point to personal attendance upon Moses.
    This avoids importing later theological or institutional meanings.
  doctrine_reference: Translation philosophy §§1, 5, 6
