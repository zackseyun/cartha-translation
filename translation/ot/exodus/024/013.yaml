id: EXO.24.13
reference: Exodus 24:13
source:
  edition: WLC
  text: וַ/יָּ֣קָם מֹשֶׁ֔ה וִ/יהוֹשֻׁ֖עַ מְשָׁרְת֑/וֹ וַ/יַּ֥עַל מֹשֶׁ֖ה אֶל הַ֥ר
    הָ/אֱלֹהִֽים־׃
translation:
  text: So Moses arose with Joshua his attendant, and Moses went up to the mountain
    of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "his servant." The Hebrew term can denote one who serves in attendance;
      here it likely refers to Joshua as Moses's personal assistant.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: arose
  alternatives:
  - got up
  - set out
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום commonly means 'arose' or 'got up.' 'Arose' preserves
    the narrative elevation and sequence without over-interpreting it as departure
    alone.
- source_word: וִיהוֹשֻׁעַ
  chosen: Joshua
  alternatives:
  - Yehoshua
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: מְשָׁרְתוֹ
  chosen: his attendant
  alternatives:
  - his servant
  - his minister
  - his assistant
  lexicon: HALOT
  rationale: From שׁרת, denoting one who serves in attendance. 'Attendant' best fits
    Joshua's role here without implying slavery and avoids ecclesiastical overtones
    of 'minister.' The suffix makes clear that Joshua is Moses's attendant.
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - ascended
  - went up
  lexicon: HALOT
  rationale: עלה in this context refers to upward movement onto the mountain. 'Went
    up' is natural modern English and preserves the spatial sense.
- source_word: הַר הָאֱלֹהִים
  chosen: the mountain of God
  alternatives:
  - God's mountain
  - the divine mountain
  lexicon: HALOT
  rationale: The construct-like phrase with article is most naturally rendered 'the
    mountain of God.' This preserves the Hebrew wording and the sacred significance
    of Sinai/Horeb without paraphrase.
