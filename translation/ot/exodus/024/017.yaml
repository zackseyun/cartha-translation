theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, preserving reverential convention without making a sectarian claim about
    pronunciation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Gendered covenantal designation בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the children of Israel
  - the Israelites
  rationale: The Hebrew is grammatically masculine plural. Following the gender-accurate
    policy, the translation preserves the masculine form rather than flattening it
    to a neutral collective, while recognizing more idiomatic alternatives.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
