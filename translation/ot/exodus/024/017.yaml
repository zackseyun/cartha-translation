id: EXO.24.17
reference: Exodus 24:17
source:
  edition: WLC
  text: וּ/מַרְאֵה֙ כְּב֣וֹד יְהוָ֔ה כְּ/אֵ֥שׁ אֹכֶ֖לֶת בְּ/רֹ֣אשׁ הָ/הָ֑ר לְ/עֵינֵ֖י
    בְּנֵ֥י יִשְׂרָאֵֽל׃
translation:
  text: And the appearance of the glory of the LORD was like a consuming fire on the
    top of the mountain in the sight of the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'devouring fire.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the children of Israel' or 'the Israelites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַרְאֵה
  chosen: appearance
  alternatives:
  - sight
  - vision
  - manifestation
  lexicon: HALOT
  rationale: מַרְאֵה commonly denotes visible appearance or what is seen. 'Appearance'
    best fits the immediate visual description without implying a prophetic 'vision'
    experience.
- source_word: כְּבוֹד
  chosen: glory
  alternatives:
  - honor
  - weight
  lexicon: HALOT
  rationale: In reference to YHWH's visible, radiant presence, 'glory' is the standard
    and most contextually fitting rendering.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the pattern reflected
    in the Septuagint tradition.
- source_word: כְּאֵשׁ
  chosen: like a ... fire
  alternatives:
  - as fire
  - like fire
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like a ... fire' preserves the simile
    explicitly.
- source_word: אֹכֶלֶת
  chosen: consuming
  alternatives:
  - devouring
  - eating
  lexicon: HALOT
  rationale: The participle from אכל literally means 'eating,' but with fire idiomatically
    means 'consuming' or 'devouring.' 'Consuming' is natural English and preserves
    the force of destructive intensity.
- source_word: בְּרֹאשׁ
  chosen: on the top
  alternatives:
  - at the summit
  - on the summit
  - at the top
  lexicon: HALOT
  rationale: The phrase denotes position at the mountain's uppermost part. 'On the
    top' is a clear, direct rendering close to the Hebrew.
- source_word: הָהָר
  chosen: the mountain
  alternatives:
  - the hill
  lexicon: HALOT
  rationale: In Exodus 24 the referent is Sinai; 'mountain' is the natural rendering
    of הַר here.
- source_word: לְעֵינֵי
  chosen: in the sight of
  alternatives:
  - before the eyes of
  - before
  lexicon: HALOT
  rationale: The idiom means openly before or in full view of. 'In the sight of' preserves
    the visual emphasis of the Hebrew.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Per gender-accurate policy, the masculine plural construct is retained
    as 'sons of Israel.' While 'Israelites' is idiomatic, this rendering more transparently
    reflects the source form and covenantal designation.
