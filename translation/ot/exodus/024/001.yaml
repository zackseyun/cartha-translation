theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Preserving the unusual phrasing 'Come up to the LORD' when the speaker is the LORD
  chosen_reading: Retain 'to the LORD' in the main text
  alternative_readings:
  - Come up to me
  - Come up before the LORD
  rationale: The Hebrew text explicitly says 'to YHWH.' Although some English readers may expect 'to me,' altering it would resolve a textual/theological tension not resolved by the source. The translation preserves the wording as given.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
