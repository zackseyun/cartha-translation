id: EXO.24.1
reference: Exodus 24:1
source:
  edition: WLC
  text: וְ/אֶל מֹשֶׁ֨ה אָמַ֜ר עֲלֵ֣ה אֶל יְהוָ֗ה אַתָּה֙ וְ/אַהֲרֹן֙ נָדָ֣ב וַ/אֲבִיה֔וּא וְ/שִׁבְעִ֖ים מִ/זִּקְנֵ֣י יִשְׂרָאֵ֑ל וְ/הִשְׁתַּחֲוִיתֶ֖ם מֵ/רָחֹֽק־־׃
translation:
  text: Then he said to Moses, “Come up to Yahweh, you and Aaron, Nadab and Abihu, and seventy of the elders of Israel, and bow down from a distance.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Come up to the LORD.'' The text preserves this wording even though the speaker is the LORD; some translations smooth it to ''Come up to me'' or ''before the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אֶל
  chosen: Then ... to
  alternatives:
  - And to
  lexicon: HALOT
  rationale: The conjunction plus preposition introduces a new speech unit linked to the previous context. English idiom is smoother with 'Then he said to Moses' rather than the more wooden 'And to Moses he said.' 'Then' preserves narrative progression without over-paraphrasing.
- source_word: אָמַר
  chosen: he said
  alternatives:
  - said
  lexicon: HALOT
  rationale: The Hebrew verb is 3ms with no explicit subject in this clause; English requires an expressed subject, supplied as 'he' from the immediate context. 'Said' is the standard rendering.
- source_word: עֲלֵה
  chosen: Come up
  alternatives:
  - Go up
  - Ascend
  lexicon: HALOT
  rationale: עלה in the imperative means 'go up/come up.' 'Come up' fits direct speech inviting approach to the divine presence; 'ascend' is too formal for the register.
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  - to the LORD God
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The preposition אֶל is straightforwardly 'to.' Although the phrase is striking because the speaker is apparently the LORD speaking of approach 'to the LORD,' the translation preserves the Hebrew wording rather than smoothing it away.
- source_word: אַתָּה
  chosen: you
  alternatives:
  - you yourself
  lexicon: HALOT
  rationale: The pronoun is explicit for emphasis and to begin the list of those summoned. English 'you' adequately carries the sense without awkward overemphasis.
- source_word: וְ/אַהֲרֹן נָדָב וַ/אֲבִיהוּא
  chosen: and Aaron, Nadab and Abihu
  alternatives:
  - with Aaron, Nadab, and Abihu
  lexicon: HALOT
  rationale: These are personal names and are transliterated. The simple coordination best reflects the Hebrew list.
- source_word: וְ/שִׁבְעִים מִ/זִּקְנֵי יִשְׂרָאֵל
  chosen: and seventy of the elders of Israel
  alternatives:
  - and seventy elders of Israel
  - and seventy from the elders of Israel
  lexicon: HALOT
  rationale: 'The מן construction is partitive: seventy selected from among the elders. ''Seventy of the elders of Israel'' preserves that nuance better than the flatter ''seventy elders of Israel.'''
- source_word: וְ/הִשְׁתַּחֲוִיתֶם
  chosen: and bow down
  alternatives:
  - and worship
  - and prostrate yourselves
  lexicon: HALOT
  rationale: The verb denotes bowing/prostration in reverence. 'Bow down' preserves the physical act without prematurely interpreting it as exclusively cultic 'worship,' while 'prostrate yourselves' is more formal than needed.
- source_word: מֵ/רָחֹק
  chosen: from a distance
  alternatives:
  - afar
  - at a distance
  - from afar
  lexicon: HALOT
  rationale: The phrase indicates spatial separation in approach to the divine presence. 'From a distance' is clear modern English; 'afar' is archaic.
