theological_decisions:
- issue: Rendering the covenant-making idiom כָּרַת ... בְּרִית
  chosen_reading: has cut ... covenant
  alternative_readings:
  - has made ... covenant
  - has established ... covenant
  rationale: The Hebrew idiom literally speaks of 'cutting' a covenant, likely reflecting
    sacrificial ratification. Preserving the idiom in the main text maintains transparency
    to the source and the ritual context of the verse, while an English alternative
    is worth preserving in a footnote for readability.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
