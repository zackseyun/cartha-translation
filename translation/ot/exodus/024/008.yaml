id: EXO.24.8
reference: Exodus 24:8
source:
  edition: WLC
  text: וַ/יִּקַּ֤ח מֹשֶׁה֙ אֶת הַ/דָּ֔ם וַ/יִּזְרֹ֖ק עַל הָ/עָ֑ם וַ/יֹּ֗אמֶר הִנֵּ֤ה
    דַֽם הַ/בְּרִית֙ אֲשֶׁ֨ר כָּרַ֤ת יְהוָה֙ עִמָּ/כֶ֔ם עַ֥ל כָּל הַ/דְּבָרִ֖ים הָ/אֵֽלֶּה־־־־׃
translation:
  text: Then Moses took the blood and threw it on the people, and said, “Behold, the
    blood of the covenant that the LORD has cut with you according to all these words.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “sprinkled it on the people.” The Hebrew verb more literally means “threw”
      or “cast,” but in sacrificial contexts it can describe ritual application of
      blood.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “has cut with you,” an idiom meaning “has made a covenant with you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - received
  - took up
  lexicon: HALOT
  rationale: Common narrative wayyiqtol of לקח; 'took' is the plain and natural English
    equivalent.
- source_word: הַדָּם
  chosen: the blood
  lexicon: HALOT
  rationale: Definite article is present; this refers to the sacrificial blood already
    mentioned in context.
- source_word: וַיִּזְרֹק
  chosen: threw
  alternatives:
  - sprinkled
  - dashed
  - cast
  lexicon: HALOT
  rationale: זרק commonly denotes throwing/tossing, often of sacrificial blood. 'Threw'
    preserves the concrete force of the Hebrew better than the more interpretive 'sprinkled,'
    though the ritual action may involve scattering blood.
- source_word: עַל הָעָם
  chosen: on the people
  alternatives:
  - upon the people
  lexicon: HALOT
  rationale: עַל is spatially straightforward here. 'On the people' is idiomatic modern
    English.
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Deictic particle marking solemn presentation. 'Behold' retains the elevated,
    covenantal force without paraphrase.
- source_word: דַם הַבְּרִית
  chosen: the blood of the covenant
  alternatives:
  - covenant blood
  lexicon: HALOT
  rationale: Construct chain is best rendered literally here, especially because of
    its theological significance and later biblical resonance.
- source_word: כָּרַת
  chosen: has cut
  alternatives:
  - made
  - established
  lexicon: HALOT
  rationale: Hebrew idiom for covenant-making is literally 'cut a covenant.' To preserve
    original-language primacy and expose the idiom, the main text keeps 'has cut'
    rather than smoothing to 'made.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: עִמָּכֶם
  chosen: with you
  alternatives:
  - with you all
  lexicon: HALOT
  rationale: Preposition with 2mp suffix; 'with you' is standard English, with plurality
    understood from the addressees.
- source_word: עַל כָּל הַדְּבָרִים הָאֵלֶּה
  chosen: according to all these words
  alternatives:
  - concerning all these words
  - on the basis of all these words
  - in accordance with all these terms
  lexicon: HALOT
  rationale: עַל here links the covenant to the stipulations just spoken. 'According
    to all these words' preserves the lexical sense of דְּבָרִים as 'words' and avoids
    over-interpreting it as merely 'terms,' though that nuance is possible in context.
