id: EXO.5.18
reference: Exodus 5:18
source:
  edition: WLC
  text: וְ/עַתָּה֙ לְכ֣וּ עִבְד֔וּ וְ/תֶ֖בֶן לֹא יִנָּתֵ֣ן לָ/כֶ֑ם וְ/תֹ֥כֶן לְבֵנִ֖ים
    תִּתֵּֽנּוּ־׃
translation:
  text: So now, go, work; but straw will not be given to you, yet you must deliver
    the required number of bricks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the quota of bricks.' The Hebrew תֹכֶן refers to a fixed or measured
      amount required from the workers.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: So now
  alternatives:
  - And now
  - Now therefore
  lexicon: HALOT
  rationale: Introduces Pharaoh’s concluding command with a transitional, emphatic
    sense. 'So now' preserves the discourse force in natural English.
- source_word: לְכוּ
  chosen: go
  alternatives:
  - be off
  - get going
  lexicon: HALOT
  rationale: Imperative of הלך. 'Go' is the plain and sufficiently forceful English
    equivalent in this command context.
- source_word: עִבְדוּ
  chosen: work
  alternatives:
  - labor
  - serve
  lexicon: HALOT
  rationale: In context Pharaoh is commanding forced labor, not cultic service. 'Work'
    is the most natural rendering in English, while 'labor' is possible but slightly
    heavier stylistically.
- source_word: וְתֶבֶן
  chosen: but straw
  alternatives:
  - and straw
  lexicon: HALOT
  rationale: 'The conjunction marks contrast with the command to work: they are to
    continue working, but straw will not be supplied. Rendering with ''but'' brings
    out the adversative force implicit in context.'
- source_word: יִנָּתֵן לָכֶם
  chosen: will not be given to you
  alternatives:
  - will not be supplied to you
  lexicon: HALOT
  rationale: Passive of נתן with negative. 'Will not be given to you' is formally
    close and clear; 'supplied' is interpretive and therefore kept as an alternative
    only.
- source_word: תֹכֶן
  chosen: the required number
  alternatives:
  - the quota
  - the fixed amount
  lexicon: HALOT
  rationale: Refers to the measured or fixed amount demanded. 'The required number'
    is clear modern English and fits the following genitive 'of bricks.' 'Quota' is
    concise and plausible, but slightly more idiomatic than the Hebrew noun itself.
- source_word: לְבֵנִים
  chosen: of bricks
  alternatives:
  - bricks
  lexicon: HALOT
  rationale: Completes the construct phrase with תֹכֶן. 'Of bricks' preserves the
    relationship explicitly.
- source_word: תִּתֵּנּוּ
  chosen: you must deliver
  alternatives:
  - you shall give
  - you must produce
  lexicon: HALOT
  rationale: Although literally 'you shall give,' in context the sense is to provide
    or meet the demanded output. 'You must deliver' captures the obligation and production
    context without excessive paraphrase.
