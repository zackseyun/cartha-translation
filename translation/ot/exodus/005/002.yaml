id: EXO.5.2
reference: Exodus 5:2
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר פַּרְעֹ֔ה מִ֤י יְהוָה֙ אֲשֶׁ֣ר אֶשְׁמַ֣ע בְּ/קֹל֔/וֹ לְ/שַׁלַּ֖ח אֶת יִשְׂרָאֵ֑ל לֹ֤א יָדַ֨עְתִּי֙ אֶת יְהוָ֔ה וְ/גַ֥ם אֶת יִשְׂרָאֵ֖ל לֹ֥א אֲשַׁלֵּֽחַ־־־׃
translation:
  text: Pharaoh said, “Who is Yahweh, that I should obey his voice and let Israel go? I do not know Yahweh, and moreover I will not let Israel go.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'' Alternatives include ''Yahweh'' and ''Jehovah.'''
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִי
  chosen: Who
  alternatives:
  - What sort of one
  lexicon: HALOT
  rationale: The interrogative asks for identity. 'Who' is the plain English equivalent and preserves Pharaoh's dismissive challenge.
- source_word: אֲשֶׁר אֶשְׁמַע בְּקֹלוֹ
  chosen: that I should obey his voice
  alternatives:
  - that I should listen to his voice
  - that I should heed his voice
  lexicon: HALOT
  rationale: שׁמע with בְּקוֹל commonly means to listen obediently or obey. 'Obey his voice' preserves the Hebrew idiom while remaining natural English; adding 'should' reflects the clause's sense after 'Who is the LORD...?'.
- source_word: לְשַׁלַּח
  chosen: let ... go
  alternatives:
  - send away
  - release
  lexicon: HALOT
  rationale: In the Exodus context, שׁלח with Israel as object is idiomatically rendered 'let Israel go,' which is both accurate and established by context.
- source_word: יָדַעְתִּי
  chosen: I do not know
  alternatives:
  - I have not known
  - I do not acknowledge
  lexicon: HALOT
  rationale: The perfect here expresses Pharaoh's present stance of non-recognition. 'I do not know' is the most natural English rendering, while still allowing the sense of refusal to acknowledge.
- source_word: וְגַם
  chosen: and moreover
  alternatives:
  - and also
  - nor
  lexicon: HALOT
  rationale: וְגַם adds emphatic continuation to Pharaoh's refusal. 'And moreover' preserves the force better than a bare 'and also.'
- source_word: אֲשַׁלֵּחַ
  chosen: I will not let ... go
  alternatives:
  - I will not send away
  - I will not release
  lexicon: HALOT
  rationale: The imperfect expresses Pharaoh's resolve for the future/immediate response. Repeating 'let Israel go' maintains consistency with the earlier infinitive and the narrative context.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  lexicon: HALOT
  rationale: Standard English transliteration of the royal title/name.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Standard English transliteration of the people/nation name.
