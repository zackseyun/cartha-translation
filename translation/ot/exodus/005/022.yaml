id: EXO.5.22
reference: Exodus 5:22
source:
  edition: WLC
  text: וַ/יָּ֧שָׁב מֹשֶׁ֛ה אֶל יְהוָ֖ה וַ/יֹּאמַ֑ר אֲדֹנָ֗/י לָ/מָ֤ה הֲרֵעֹ֨תָה֙ לָ/עָ֣ם הַ/זֶּ֔ה לָ֥/מָּה זֶּ֖ה שְׁלַחְתָּֽ/נִי־׃
translation:
  text: Then Moses returned to Yahweh and said, “Lord, why have you done evil to this people? Why then did you send me?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Why this, have you sent me?''—an emphatic idiom meaning ''Why then did you send me?'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: returned
  alternatives:
  - turned back
  - went back
  lexicon: HALOT
  rationale: The verb שוב in the wayyiqtol form here naturally means 'returned' or 'turned back.' 'Returned' is idiomatic in English and fits Moses going back to address God after Pharaoh's response.
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition אֶל is straightforwardly 'to.' Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - my Lord
  - O Lord
  lexicon: HALOT
  rationale: אֲדֹנָי is a reverential divine address. 'Lord' preserves the title naturally in direct speech. 'O Lord' is possible but slightly more archaic; 'my Lord' is more formally literal but less idiomatic in this prayer-like complaint.
- source_word: לָמָה
  chosen: why
  lexicon: HALOT
  rationale: The interrogative is directly 'why' in both occurrences.
- source_word: הֲרֵעֹתָה
  chosen: have you brought harm on
  alternatives:
  - have you done evil to
  - have you made things worse for
  lexicon: HALOT
  rationale: The Hiphil of רעע means to cause evil/harm or to do ill. In context Moses is accusing God of bringing calamity or mistreatment upon Israel, not moral evil in an abstract sense. 'Brought harm on' preserves the causative force without implying that God committed moral evil.
- source_word: לָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this nation
  lexicon: HALOT
  rationale: עָם is best rendered 'people' here, referring to Israel as a collective. 'Nation' is possible but less natural in this complaint context.
- source_word: לָמָּה זֶּה
  chosen: Why is this why
  alternatives:
  - Why then
  - Why
  lexicon: HALOT
  rationale: The phrase literally includes both 'why' and 'this,' an idiom often functioning as an emphatic 'why then' or 'why is it that.' The English rendering attempts to preserve the emphasis, though somewhat awkwardly, rather than fully flattening it.
- source_word: שְׁלַחְתָּנִי
  chosen: you sent me
  alternatives:
  - you have sent me
  lexicon: HALOT
  rationale: The qatal 2ms + 1cs suffix is naturally 'you sent me.' English simple past works well in this rhetorical question.
