id: EXO.5.9
reference: Exodus 5:9
source:
  edition: WLC
  text: תִּכְבַּ֧ד הָ/עֲבֹדָ֛ה עַל הָ/אֲנָשִׁ֖ים וְ/יַעֲשׂוּ בָ֑/הּ וְ/אַל יִשְׁע֖וּ
    בְּ/דִבְרֵי שָֽׁקֶר־־־־׃
translation:
  text: Let the work be made heavy on the men, so that they may labor at it and not
    pay attention to lying words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'heed false words' or 'look to deceptive words.' The Hebrew verb can
      mean 'pay attention to,' 'regard,' or 'heed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּכְבַּד
  chosen: be made heavy
  alternatives:
  - be heavy
  - be increased
  - be burdensome
  lexicon: HALOT
  rationale: Qal imperfect 3fs from כבד with הָעֲבֹדָה as subject. In context Pharaoh
    is ordering that the labor load be intensified, so an English passive-like expression
    'be made heavy' best captures the causative sense conveyed idiomatically in context
    without overtranslating the stem.
- source_word: הָעֲבֹדָה
  chosen: the work
  alternatives:
  - the labor
  - the service
  lexicon: HALOT
  rationale: עֲבֹדָה commonly denotes work/labor/service. Here the context is brickmaking
    and forced labor, so 'the work' is natural English while retaining the concrete
    sense.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  - for
  lexicon: HALOT
  rationale: The preposition marks the burden resting upon the men. 'On' preserves
    the image of labor being laid on them.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the workers
  - the people
  lexicon: HALOT
  rationale: The Hebrew specifically says 'the men.' Following the gender-accurate
    principle, this is retained rather than generalized, since the referent is the
    male Israelite labor force in context.
- source_word: וְיַעֲשׂוּ
  chosen: so that they may labor
  alternatives:
  - and let them do it
  - and they may do it
  - and let them work
  lexicon: HALOT
  rationale: עשה with the following pronoun בָהּ means 'do/work at it.' In English,
    'labor' fits the oppressive context and avoids the awkwardness of 'do in it' while
    preserving the purpose nuance after the preceding jussive.
- source_word: בָהּ
  chosen: at it
  alternatives:
  - in it
  - with it
  lexicon: HALOT
  rationale: The feminine singular pronoun refers back to עֲבֹדָה ('work'). English
    idiom prefers 'labor at it' rather than 'do in it.'
- source_word: וְאַל
  chosen: and not
  alternatives:
  - and let them not
  - so that they may not
  lexicon: HALOT
  rationale: אַל with the following imperfect expresses prohibition or negative purpose.
    In this sequence, 'and not' smoothly carries the command's intended result in
    English.
- source_word: יִשְׁעוּ
  chosen: pay attention to
  alternatives:
  - regard
  - look to
  - heed
  lexicon: HALOT
  rationale: From שעה, meaning to look to, regard, pay attention to. 'Pay attention
    to' is clear modern English and fits the sense of refusing to give credence to
    Moses and Aaron's message.
- source_word: בְּדִבְרֵי
  chosen: to ... words
  alternatives:
  - to ... matters
  - to ... statements
  lexicon: HALOT
  rationale: דָּבָר in plural construct here means words/speeches. 'Words' is the
    most direct rendering.
- source_word: שָׁקֶר
  chosen: lying
  alternatives:
  - 'false'
  - deceptive
  - vain
  lexicon: HALOT
  rationale: שקר denotes falsehood or deception. 'Lying words' is a natural collocation
    in English and preserves Pharaoh's dismissive characterization of Moses and Aaron's
    claims.
