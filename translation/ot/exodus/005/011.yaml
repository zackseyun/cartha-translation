id: EXO.5.11
reference: Exodus 5:11
source:
  edition: WLC
  text: אַתֶּ֗ם לְכ֨וּ קְח֤וּ לָ/כֶם֙ תֶּ֔בֶן מֵ/אֲשֶׁ֖ר תִּמְצָ֑אוּ כִּ֣י אֵ֥ין נִגְרָ֛ע
    מֵ/עֲבֹדַתְ/כֶ֖ם דָּבָֽר׃
translation:
  text: You yourselves, go and get straw for yourselves wherever you can find it,
    but nothing of your work will be reduced.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'from wherever you find it.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'for nothing of your work is reduced' or 'because nothing of
      your work is reduced.' The conjunction can be rendered 'for/because,' but the
      sense in context is adversative.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַתֶּם
  chosen: You yourselves
  alternatives:
  - You
  - As for you
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis before the imperatives. 'You yourselves'
    preserves the force better than a simple 'you.'
- source_word: לְכוּ
  chosen: go
  alternatives:
  - be off
  - go on
  lexicon: HALOT
  rationale: Qal imperative plural of הלך. 'Go' is the natural English imperative
    and fits the sequence of commands.
- source_word: קְחוּ
  chosen: get
  alternatives:
  - take
  lexicon: HALOT
  rationale: Although literally 'take,' in English with 'straw' and the following
    clause about finding it, 'get' better conveys procuring supplies without over-paraphrasing.
- source_word: לָכֶם
  chosen: for yourselves
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The dative/reflexive sense indicates they must obtain it on their own
    behalf. 'For yourselves' preserves that force.
- source_word: תֶּבֶן
  chosen: straw
  alternatives:
  - stubble
  lexicon: HALOT
  rationale: In the brickmaking context of Exodus 5, תבן refers to straw used in making
    bricks. 'Straw' is the standard and contextually precise rendering.
- source_word: מֵאֲשֶׁר תִּמְצָאוּ
  chosen: wherever you can find it
  alternatives:
  - from wherever you find it
  - where you find it
  lexicon: HALOT
  rationale: The phrase means they must obtain straw from whatever source is available.
    'Wherever you can find it' expresses the open-ended sourcing implied by the Hebrew.
- source_word: כִּי
  chosen: but
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Though often ''for/because,'' here it introduces the hard condition
    attached to the command: they must gather straw, yet their workload will not decrease.
    In English, ''but'' best conveys the adversative force in context.'
- source_word: אֵין נִגְרָע
  chosen: will be reduced
  alternatives:
  - is diminished
  - is taken away
  lexicon: HALOT
  rationale: 'The passive sense of גרע with אין expresses that no reduction is permitted.
    Future English fits the directive context: the quota is not going to be lessened.'
- source_word: מֵעֲבֹדַתְכֶם
  chosen: of your work
  alternatives:
  - from your labor
  - from your service
  lexicon: HALOT
  rationale: עֲבֹדָה here refers to the labor/task imposed on the Israelites. 'Work'
    is clear modern English; 'service' would sound too formal and potentially misleading.
- source_word: דָּבָר
  chosen: nothing
  alternatives:
  - a thing
  - anything
  lexicon: HALOT
  rationale: With אין נגרע ... דבר, the idiom means 'not a thing' or 'nothing' will
    be reduced. 'Nothing' is idiomatic and concise in English.
