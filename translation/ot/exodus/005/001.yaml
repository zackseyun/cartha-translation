id: EXO.5.1
reference: Exodus 5:1
source:
  edition: WLC
  text: וְ/אַחַ֗ר בָּ֚אוּ מֹשֶׁ֣ה וְ/אַהֲרֹ֔ן וַ/יֹּאמְר֖וּ אֶל פַּרְעֹ֑ה כֹּֽה אָמַ֤ר יְהוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל שַׁלַּח֙ אֶת עַמִּ֔/י וְ/יָחֹ֥גּוּ לִ֖/י בַּ/מִּדְבָּֽר־־־׃
translation:
  text: 'Afterward Moses and Aaron went in and said to Pharaoh, “Thus says Yahweh, the God of Israel: Let my people go, so that they may hold a feast to me in the wilderness.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; alternatively rendered ''Yahweh.'''
    reason: alternative_reading
  - marker: b
    text: Or 'keep a festival for me' or 'celebrate a festival to me'; the Hebrew verb refers to observing a feast/festival.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַחַר
  chosen: Afterward
  alternatives:
  - After this
  - Later
  lexicon: HALOT
  rationale: Temporal discourse marker introducing the next event in sequence. 'Afterward' is natural English and preserves the narrative progression without over-specifying the interval.
- source_word: בָּאוּ
  chosen: went in
  alternatives:
  - came
  - entered
  lexicon: HALOT
  rationale: In context of approaching Pharaoh's presence, the verb likely implies entering before him rather than merely arriving. 'Went in' is idiomatic in English for appearing before a ruler and fits the following speech.
- source_word: וַיֹּאמְרוּ אֶל־פַּרְעֹה
  chosen: said to Pharaoh
  alternatives:
  - spoke to Pharaoh
  lexicon: HALOT
  rationale: Standard narrative speech formula. 'Said to Pharaoh' is the most natural modern English rendering.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus said
  lexicon: HALOT
  rationale: Prophetic messenger formula. 'Thus says' preserves the formal authoritative tone better than a looser paraphrase.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  alternatives:
  - Israel's God
  lexicon: HALOT
  rationale: Construct phrase identifying YHWH covenantally. 'The God of Israel' is the standard, transparent rendering.
- source_word: שַׁלַּח אֶת־עַמִּי
  chosen: Let my people go
  alternatives:
  - Send out my people
  - Release my people
  lexicon: HALOT
  rationale: Imperative of שלח in this context calls for Pharaoh to release Israel. 'Let my people go' is both accurate and idiomatic, and it captures the force of the command without unnecessary expansion.
- source_word: וְיָחֹגּוּ לִי
  chosen: so that they may hold a feast to me
  alternatives:
  - and let them celebrate a festival to me
  - that they may keep a festival for me
  lexicon: HALOT
  rationale: The verb חגג refers specifically to celebrating a pilgrimage festival/feast, not merely general worship. 'Hold a feast to me' preserves the cultic-festal nuance while remaining readable.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness region rather than sandy desert specifically. 'Wilderness' better matches biblical usage and the setting of Israel's departure.
