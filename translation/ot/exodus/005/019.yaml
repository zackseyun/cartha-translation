id: EXO.5.19
reference: Exodus 5:19
source:
  edition: WLC
  text: וַ/יִּרְא֞וּ שֹֽׁטְרֵ֧י בְנֵֽי יִשְׂרָאֵ֛ל אֹתָ֖/ם בְּ/רָ֣ע לֵ/אמֹ֑ר לֹא תִגְרְע֥וּ
    מִ/לִּבְנֵי/כֶ֖ם דְּבַר י֥וֹם בְּ/יוֹמֽ/וֹ־־־׃
translation:
  text: Then the officers of the sons of Israel saw that they were in trouble when
    it was said, “You must not reduce your daily number of bricks.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Israelites” for “the sons of Israel.” The Hebrew is literally “sons
      of Israel.”
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: “the matter of a day in its day,” meaning the required amount
      for each day.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְאוּ
  chosen: saw
  alternatives:
  - realized
  lexicon: HALOT
  rationale: Basic sense of ראה is 'see.' In context it can imply perception/realization,
    but 'saw' preserves the concrete Hebrew while still making sense idiomatically
    in English.
- source_word: שֹׁטְרֵי
  chosen: officers
  alternatives:
  - foremen
  - officials
  lexicon: HALOT
  rationale: Refers to subordinate Israelite administrators under Egyptian authority
    in this narrative. 'Officers' is a standard and suitably broad rendering; 'foremen'
    is possible but narrower and more interpretive.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: A more formally transparent rendering of the Hebrew construct phrase.
    'Israelites' is idiomatic but less explicit; 'sons of Israel' preserves the source
    wording and fits the translation's gender-accurate philosophy.
- source_word: אֹתָם
  chosen: they
  alternatives:
  - themselves
  lexicon: HALOT
  rationale: The object pronoun refers back to the Israelite officers as the ones
    perceived to be in a bad situation. English idiom naturally recasts this as 'they
    were in trouble' rather than the more wooden 'saw them in trouble.'
- source_word: בְּרָע
  chosen: in trouble
  alternatives:
  - in evil
  - in a bad situation
  - in distress
  lexicon: HALOT
  rationale: The phrase means being in an adverse or harmful situation, not moral
    evil. 'In trouble' is concise, natural, and contextually accurate.
- source_word: לֵאמֹר
  chosen: when it was said
  alternatives:
  - saying
  - as they were told
  lexicon: HALOT
  rationale: Introduces the content that revealed their predicament. A temporal/passive
    rendering fits English syntax better here than a bare 'saying' while preserving
    the Hebrew function.
- source_word: לֹא תִגְרְעוּ
  chosen: You must not reduce
  alternatives:
  - You shall not diminish
  - Do not lessen
  lexicon: HALOT
  rationale: גרע means to diminish, reduce, or take away. 'You must not reduce' communicates
    the force of the command in clear modern English.
- source_word: מִלִּבְנֵיכֶם
  chosen: your ... of bricks
  alternatives:
  - from your bricks
  - your brick quota
  lexicon: HALOT
  rationale: The noun לְבֵנִים means 'bricks.' Because English requires a smoother
    construction with the following quota language, the phrase is represented as part
    of 'your daily number of bricks.' 'Brick quota' is possible but slightly more
    interpretive.
- source_word: דְּבַר יוֹם בְּיוֹמוֹ
  chosen: your daily number of bricks
  alternatives:
  - the matter of each day on its day
  - each day's quota on its day
  - the required amount each day
  lexicon: HALOT
  rationale: This idiom denotes the prescribed amount due each day. 'Daily number
    of bricks' preserves the quota sense without becoming overly wooden. 'Quota' is
    accurate but somewhat more interpretive than 'number.'
