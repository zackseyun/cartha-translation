id: EXO.5.7
reference: Exodus 5:7
source:
  edition: WLC
  text: לֹ֣א תֹאסִפ֞וּ/ן לָ/תֵ֨ת תֶּ֧בֶן לָ/עָ֛ם לִ/לְבֹּ֥ן הַ/לְּבֵנִ֖ים כִּ/תְמ֣וֹל
    שִׁלְשֹׁ֑ם הֵ֚ם יֵֽלְכ֔וּ וְ/קֹשְׁשׁ֥וּ לָ/הֶ֖ם תֶּֽבֶן׃
translation:
  text: You shall no longer give straw to the people for making bricks as before;
    let them go and gather straw for themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'as yesterday and the day before,' an idiom meaning 'as before'
      or 'formerly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תֹאסִפוּן
  chosen: shall no longer
  alternatives:
  - shall not continue
  - must not again
  lexicon: HALOT
  rationale: 'Hiphil of יסף with negation expresses cessation of a previous practice:
    ''you shall not continue/add to.'' In English, ''shall no longer'' naturally conveys
    the force of ending an ongoing provision.'
- source_word: לָתֵת
  chosen: give
  alternatives:
  - provide
  lexicon: HALOT
  rationale: נתן is the common verb 'give.' 'Provide' is possible in context, but
    'give' stays closer to the Hebrew while remaining clear.
- source_word: תֶּבֶן
  chosen: straw
  lexicon: HALOT
  rationale: Standard rendering for the material mixed with clay in brickmaking; repeated
    consistently in the verse.
- source_word: לָעָם
  chosen: to the people
  alternatives:
  - to the laborers
  lexicon: HALOT
  rationale: עם literally means 'people.' Although the referent is the Israelite workforce,
    'the people' reflects the Hebrew wording without narrowing beyond the text.
- source_word: לִלְבֹּן הַלְּבֵנִים
  chosen: for making bricks
  alternatives:
  - to make the bricks
  - for brickmaking
  lexicon: HALOT
  rationale: The infinitive plus object expresses purpose. 'For making bricks' is
    idiomatic English and preserves the function of the phrase.
- source_word: כִּתְמוֹל שִׁלְשֹׁם
  chosen: as before
  alternatives:
  - as yesterday and the day before
  - as formerly
  lexicon: HALOT
  rationale: The idiom literally refers to prior days ('as yesterday, three days ago')
    and means formerly/previously. 'As before' communicates the temporal sense naturally
    in modern English.
- source_word: הֵם יֵלְכוּ
  chosen: let them go
  alternatives:
  - they must go
  - they shall go
  lexicon: HALOT
  rationale: Independent pronoun plus imperfect here functions jussively in context
    as a command about what the workers are to do. 'Let them go' captures the directive
    force in natural English.
- source_word: וְקֹשְׁשׁוּ
  chosen: and gather
  alternatives:
  - and collect
  - and glean
  lexicon: HALOT
  rationale: קשש means to gather or collect, often by picking up scattered material.
    'Gather' is the clearest general rendering here.
- source_word: לָהֶם
  chosen: for themselves
  alternatives:
  - for their own use
  lexicon: HALOT
  rationale: The dative pronoun indicates that they are to obtain the straw on their
    own behalf rather than receive it from others.
