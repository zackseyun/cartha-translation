id: EXO.5.5
reference: Exodus 5:5
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר פַּרְעֹ֔ה הֵן רַבִּ֥ים עַתָּ֖ה עַ֣ם הָ/אָ֑רֶץ וְ/הִשְׁבַּתֶּ֥ם
    אֹתָ֖/ם מִ/סִּבְלֹתָֽ/ם־׃
translation:
  text: Pharaoh said, “Look, the people of the land are now many, and you are making
    them stop from their burdens.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you have made them cease from their labors' or 'you are causing them
      to rest from their burdens.' The Hebrew verb is causative ('make cease/stop')
      and can be rendered in several close ways depending on how explicitly the labor
      context is brought out.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  lexicon: HALOT
  rationale: Introduces Pharaoh’s emphatic observation. 'Look' preserves the deictic/exclamatory
    force in readable modern English better than the more archaic 'Behold.'
- source_word: רַבִּים
  chosen: many
  alternatives:
  - numerous
  lexicon: HALOT
  rationale: Standard quantitative adjective; 'many' is the most natural modern equivalent
    and fits the predicative construction.
- source_word: עַם הָאָרֶץ
  chosen: the people of the land
  alternatives:
  - the people of the country
  - the common people of the land
  lexicon: HALOT
  rationale: Formally, the phrase is 'people of the land.' In this context Pharaoh
    is speaking of the Israelite laboring population within Egypt. The more literal
    rendering is retained rather than interpreting it as 'common people' or simply
    'the people,' since the Hebrew expression itself is transparent here.
- source_word: עַתָּה
  chosen: now
  alternatives:
  - at this time
  lexicon: HALOT
  rationale: Temporal adverb marking the present situation; 'now' is concise and natural.
- source_word: וְהִשְׁבַּתֶּם
  chosen: you are making them stop
  alternatives:
  - you have made them cease
  - you are causing them to rest
  - you are stopping them
  lexicon: HALOT
  rationale: 'Hiphil of שׁבת is causative: Moses and Aaron are causing the people
    to cease from labor. ''Making them stop'' captures the causative force without
    importing the positive connotation of ''rest.'' The aspect is rendered as present
    in English to fit Pharaoh’s complaint in context.'
- source_word: מִסִּבְלֹתָם
  chosen: from their burdens
  alternatives:
  - from their forced labor
  - from their labors
  lexicon: HALOT
  rationale: סִבְלֹת commonly refers to burdens, especially labor burdens imposed
    on the Israelites in Exodus. 'Burdens' preserves the lexical link with the oppression
    theme; 'forced labor' is interpretive and therefore left as an alternative.
