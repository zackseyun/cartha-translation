id: EXO.5.15
reference: Exodus 5:15
source:
  edition: WLC
  text: וַ/יָּבֹ֗אוּ שֹֽׁטְרֵי֙ בְּנֵ֣י יִשְׂרָאֵ֔ל וַ/יִּצְעֲק֥וּ אֶל פַּרְעֹ֖ה לֵ/אמֹ֑ר
    לָ֧/מָּה תַעֲשֶׂ֦ה כֹ֖ה לַ/עֲבָדֶֽי/ךָ־׃
translation:
  text: Then the officers of the sons of Israel came and cried out to Pharaoh, saying,
    “Why do you treat your servants this way?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Israelites”; literally “the sons of Israel.”
    reason: lexical_alternative
  - marker: b
    text: Literally, “Why do you do thus to your servants?”
    reason: lexical_alternative
  - marker: c
    text: Or “your slaves,” depending on how עבד is understood in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: Then ... came
  alternatives:
  - And ... came
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative. 'Then' gives natural English sequence
    while preserving the consecutive force of the Hebrew verb 'came'.
- source_word: שֹׁטְרֵי
  chosen: officers
  alternatives:
  - foremen
  - officials
  lexicon: HALOT
  rationale: In Exodus this term refers to subordinate Israelite labor administrators
    under Egyptian authority. 'Officers' preserves their recognized administrative
    role better than the more generic 'officials'; 'foremen' is possible but narrower
    and more interpretive.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' Following the project's gender-accurate
    principle, the familial expression is retained rather than flattened to the ethnic
    label 'Israelites,' though that remains a viable contextual alternative.
- source_word: וַיִּצְעֲקוּ
  chosen: cried out
  alternatives:
  - appealed
  - cried
  lexicon: HALOT
  rationale: The verb conveys a forceful plea or outcry, not merely a formal request.
    'Cried out' captures both urgency and complaint.
- source_word: אֶל פַּרְעֹה
  chosen: to Pharaoh
  alternatives:
  - out to Pharaoh
  lexicon: HALOT
  rationale: The preposition marks direction toward Pharaoh. English idiom naturally
    renders this with 'to Pharaoh' after 'cried out.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Standard speech introducer. 'Saying' closely reflects the Hebrew infinitive
    construction and smoothly introduces the quotation.
- source_word: לָמָּה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Direct interrogative; 'Why' is the natural concise equivalent.
- source_word: תַעֲשֶׂה כֹה
  chosen: do you treat ... this way
  alternatives:
  - do you do thus to
  - are you doing this to
  lexicon: HALOT
  rationale: 'Literally ''do thus.'' In English, ''treat ... this way'' best conveys
    the idiomatic sense in context: Pharaoh''s oppressive handling of them, not merely
    a single discrete action.'
- source_word: לַעֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave or servant depending on context, here the
    speakers address Pharaoh with deferential court language about themselves. 'Your
    servants' fits the social-register of petition and does not require the stronger
    bonded nuance in the main text.
