id: EXO.5.4
reference: Exodus 5:4
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֲלֵ/הֶם֙ מֶ֣לֶךְ מִצְרַ֔יִם לָ֚/מָּה מֹשֶׁ֣ה וְ/אַהֲרֹ֔ן תַּפְרִ֥יעוּ
    אֶת הָ/עָ֖ם מִ/מַּֽעֲשָׂ֑י/ו לְכ֖וּ לְ/סִבְלֹתֵי/כֶֽם־׃
translation:
  text: But the king of Egypt said to them, “Why, Moses and Aaron, are you causing
    the people to neglect their work? Go to your burdens.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “are you distracting the people from their labor?”
    reason: lexical_alternative
  - marker: b
    text: Or “Go to your forced labor.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: But ... said
  alternatives:
  - And ... said
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'But' fits the discourse
    context by marking Pharaoh's response in contrast to Moses and Aaron's request
    in the preceding verse, while still remaining close to the Hebrew narrative sequence.
- source_word: מֶלֶךְ מִצְרַיִם
  chosen: the king of Egypt
  alternatives:
  - Egypt's king
  lexicon: HALOT
  rationale: Standard construct rendering; clear and natural in English.
- source_word: לָמָּה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Direct interrogative preserved with natural English simplicity.
- source_word: תַּפְרִיעוּ
  chosen: are you causing ... to neglect
  alternatives:
  - are you distracting
  - are you interrupting
  - are you freeing
  lexicon: HALOT
  rationale: Hiphil of פרע here means to cause cessation or interruption from labor,
    not liberation in a positive sense. 'Causing ... to neglect' captures the causative
    force and Pharaoh's accusation that Moses and Aaron are pulling the people away
    from assigned work.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the workers
  lexicon: HALOT
  rationale: The Hebrew says 'the people'; although the context concerns laborers,
    the broader designation should be retained.
- source_word: מִמַּעֲשָׂיו
  chosen: their work
  alternatives:
  - from its work
  - from his work
  - from their labors
  lexicon: HALOT
  rationale: The singular suffix in Hebrew is a collective construction with 'the
    people,' best rendered idiomatically in English as 'their work.' A hyper-literal
    'its work' would sound unnatural and obscure the sense.
- source_word: לְכוּ
  chosen: Go
  alternatives:
  - Be off
  - Go on
  lexicon: HALOT
  rationale: Imperative preserved directly and naturally.
- source_word: לְסִבְלֹתֵיכֶם
  chosen: to your burdens
  alternatives:
  - to your forced labor
  - to your labor burdens
  - to your tasks
  lexicon: HALOT
  rationale: סבלות refers to burdens/load-bearing labor and by extension oppressive
    labor obligations. 'Burdens' preserves the concrete metaphor and the oppressive
    tone. 'Forced labor' is interpretively possible but slightly more explicit than
    the Hebrew here.
