id: EXO.5.8
reference: Exodus 5:8
source:
  edition: WLC
  text: וְ/אֶת מַתְכֹּ֨נֶת הַ/לְּבֵנִ֜ים אֲשֶׁ֣ר הֵם֩ עֹשִׂ֨ים תְּמ֤וֹל שִׁלְשֹׁם֙
    תָּשִׂ֣ימוּ עֲלֵי/הֶ֔ם לֹ֥א תִגְרְע֖וּ מִמֶּ֑/נּוּ כִּֽי נִרְפִּ֣ים הֵ֔ם עַל כֵּ֗ן
    הֵ֤ם צֹֽעֲקִים֙ לֵ/אמֹ֔ר נֵלְכָ֖ה נִזְבְּחָ֥ה לֵ/אלֹהֵֽי/נוּ־־־׃
translation:
  text: And the quota of bricks that they were making yesterday and the day before
    yesterday, you shall impose on them; you shall not reduce any of it, because they
    are idle. Therefore they are crying out, saying, ‘Let us go and sacrifice to our
    God.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'formerly' or 'as before' for 'yesterday and the
      day before yesterday.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַתְכֹּנֶת
  chosen: quota
  alternatives:
  - fixed number
  - required amount
  - schedule
  lexicon: HALOT
  rationale: In this labor context, the noun refers to the prescribed amount to be
    produced, not merely a pattern or arrangement. 'Quota' is concise, natural English
    and fits the command not to reduce it.
- source_word: הַלְּבֵנִים
  chosen: bricks
  lexicon: HALOT
  rationale: Straightforward concrete noun in context of brickmaking.
- source_word: תְּמוֹל שִׁלְשֹׁם
  chosen: yesterday and the day before yesterday
  alternatives:
  - as before
  - formerly
  lexicon: HALOT
  rationale: The paired adverbs literally denote the previous two days. In idiomatic
    English this can function more broadly as 'previously,' but the fuller rendering
    preserves the Hebrew expression while remaining readable.
- source_word: תָּשִׂימוּ עֲלֵיהֶם
  chosen: you shall impose on them
  alternatives:
  - you shall set on them
  - you shall place upon them
  lexicon: HALOT
  rationale: The idiom of 'putting' a quota 'upon' workers means to lay an obligation
    on them. 'Impose' captures the coercive administrative force.
- source_word: לֹא תִגְרְעוּ מִמֶּנּוּ
  chosen: you shall not reduce any of it
  alternatives:
  - you shall not diminish from it
  - you shall not take away from it
  lexicon: HALOT
  rationale: The verb means to lessen or subtract. 'Any of it' makes clear that no
    part of the quota is to be cut.
- source_word: נִרְפִּים
  chosen: idle
  alternatives:
  - lazy
  - slack
  - weak-handed
  lexicon: HALOT
  rationale: In Pharaoh's accusation, the term characterizes the Israelites as not
    working hard enough. 'Idle' preserves the charge without overinterpreting it as
    moral laziness alone.
- source_word: צֹעֲקִים
  chosen: crying out
  alternatives:
  - crying
  - calling out
  lexicon: HALOT
  rationale: The participle denotes vocal protest or appeal. 'Crying out' conveys
    intensity and fits the direct speech that follows.
- source_word: נֵלְכָה נִזְבְּחָה
  chosen: Let us go and sacrifice
  alternatives:
  - Let us go, let us sacrifice
  lexicon: HALOT
  rationale: The cohortatives express a first-person plural appeal or resolve. English
    idiom naturally renders the sequence as 'Let us go and sacrifice.'
- source_word: לֵאלֹהֵינוּ
  chosen: to our God
  lexicon: HALOT
  rationale: Simple prepositional phrase indicating the recipient of sacrifice.
