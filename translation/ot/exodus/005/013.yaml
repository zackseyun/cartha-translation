id: EXO.5.13
reference: Exodus 5:13
source:
  edition: WLC
  text: וְ/הַ/נֹּגְשִׂ֖ים אָצִ֣ים לֵ/אמֹ֑ר כַּלּ֤וּ מַעֲשֵׂי/כֶם֙ דְּבַר י֣וֹם בְּ/יוֹמ֔/וֹ
    כַּ/אֲשֶׁ֖ר בִּ/הְי֥וֹת הַ/תֶּֽבֶן־׃
translation:
  text: And the taskmasters kept pressing them, saying, “Finish your work, each day’s
    quota in its day, just as when there was straw.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the daily amount each day.” The Hebrew idiom literally speaks of “the
      matter/word of a day in its day,” referring to the required quota assigned for
      each day.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנֹּגְשִׂים
  chosen: the taskmasters
  alternatives:
  - the oppressors
  - the overseers
  - the drivers
  lexicon: HALOT
  rationale: In the Exodus labor context, נגשׂים refers to those who exact labor or
    quotas from the Israelites. 'Taskmasters' is the most natural contextual equivalent
    in English and matches the coercive labor setting better than the broader 'overseers.'
- source_word: אָצִים
  chosen: kept pressing
  alternatives:
  - were urging
  - were hastening
  - were driving
  lexicon: HALOT
  rationale: The participle conveys ongoing, forceful pressure. 'Kept pressing' captures
    both the durative sense and the coercive tone in readable modern English.
- source_word: כַּלּוּ
  chosen: Finish
  alternatives:
  - Complete
  - Bring to an end
  lexicon: HALOT
  rationale: An imperative demanding completion of assigned labor. 'Finish' is direct,
    idiomatic, and fits the command to meet production requirements.
- source_word: מַעֲשֵׂיכֶם
  chosen: your work
  alternatives:
  - your tasks
  - your labor
  - your deeds
  lexicon: HALOT
  rationale: In context this refers to the Israelites' required brickmaking labor.
    'Your work' is broad enough to reflect the Hebrew while fitting the immediate
    setting.
- source_word: דְּבַר יוֹם בְּיוֹמוֹ
  chosen: each day’s quota in its day
  alternatives:
  - the matter of a day on its day
  - the daily amount each day
  - the quota for each day on that day
  lexicon: HALOT
  rationale: This idiom refers to the required amount assigned for each day. 'Each
    day's quota in its day' preserves the Hebrew structure while making the sense
    clear in English.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Introduces comparison with the previous condition. 'Just as' clearly
    signals that the demanded output is unchanged from earlier circumstances.
- source_word: בִּהְיוֹת הַתֶּבֶן
  chosen: when there was straw
  alternatives:
  - when straw was available
  - while there was straw
  - when the straw was provided
  lexicon: HALOT
  rationale: The infinitive construction marks the former situation in which straw
    was present/supplied. 'When there was straw' is concise and faithful; the context
    already implies contrast with the current lack of straw.
