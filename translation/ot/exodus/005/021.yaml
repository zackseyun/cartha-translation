id: EXO.5.21
reference: Exodus 5:21
source:
  edition: WLC
  text: וַ/יֹּאמְר֣וּ אֲלֵ/הֶ֔ם יֵ֧רֶא יְהוָ֛ה עֲלֵי/כֶ֖ם וְ/יִשְׁפֹּ֑ט אֲשֶׁ֧ר הִבְאַשְׁתֶּ֣ם אֶת רֵיחֵ֗/נוּ בְּ/עֵינֵ֤י פַרְעֹה֙ וּ/בְ/עֵינֵ֣י עֲבָדָ֔י/ו לָֽ/תֶת חֶ֥רֶב בְּ/יָדָ֖/ם לְ/הָרְגֵֽ/נוּ־־׃
translation:
  text: And they said to them, “May Yahweh look on you and judge, because you have made us stink in the sight of Pharaoh and in the sight of his servants, putting a sword in their hand to kill us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''have made our smell stink,'' that is, ''have made us repulsive'' or ''have made us seem foul.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: And they said
  alternatives:
  - Then they said
  lexicon: HALOT
  rationale: Standard waw-consecutive narrative preterite; 'And they said' preserves the Hebrew narrative flow without overinterpreting sequence.
- source_word: אֲלֵהֶם
  chosen: to them
  alternatives:
  - to Moses and Aaron
  lexicon: HALOT
  rationale: The pronoun refers to Moses and Aaron from context, but the Hebrew uses only the pronoun, so the translation keeps 'to them' rather than supplying names in the main text.
- source_word: יֵרֶא יְהוָה עֲלֵיכֶם
  chosen: May the LORD look on you
  alternatives:
  - The LORD will look on you
  - May the LORD see you
  lexicon: HALOT
  rationale: 'Here the imperfect functions jussively in an imprecatory appeal: ''May the LORD look on you.'' ''Look on'' is idiomatic and preserves the sense of divine notice more naturally than bare ''see.'' YHWH is rendered ''the LORD'' per doctrine.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְיִשְׁפֹּט
  chosen: and judge
  alternatives:
  - and pass judgment
  - and vindicate/judge between
  lexicon: HALOT
  rationale: A second jussive coordinated with 'May the LORD look on you.' 'Judge' is broad enough to preserve the Hebrew, which here carries the sense of calling for divine adjudication against Moses and Aaron.
- source_word: אֲשֶׁר
  chosen: because
  alternatives:
  - that
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the imprecation. 'Because' communicates the causal force in natural English.
- source_word: הִבְאַשְׁתֶּם
  chosen: have made us stink
  alternatives:
  - have made us offensive
  - have made us abhorrent
  - have made our smell stink
  lexicon: HALOT
  rationale: 'The Hiphil of באשׁ is vivid and concrete: to make stink/foul. ''Have made us stink'' preserves the metaphor''s force better than smoothing it to ''offensive,'' while remaining intelligible in modern English.'
- source_word: אֶת רֵיחֵנוּ
  chosen: us
  alternatives:
  - our smell
  - our reputation
  lexicon: HALOT
  rationale: Literally 'our smell/odor.' In English, 'made our smell stink' is awkward and redundant. Rendering the idiom as 'made us stink' preserves the metaphor and its target. The more interpretive 'our reputation' is possible but too flattened for the main text.
- source_word: בְּעֵינֵי פַרְעֹה וּבְעֵינֵי עֲבָדָיו
  chosen: in the eyes of Pharaoh and in the eyes of his servants
  alternatives:
  - before Pharaoh and his servants
  - to Pharaoh and his servants
  lexicon: HALOT
  rationale: The repeated Hebrew idiom 'in the eyes of' is preserved because it is natural enough in English and reflects perceived standing or evaluation.
- source_word: לָתֵת חֶרֶב בְּיָדָם
  chosen: putting a sword in their hand
  alternatives:
  - to put a sword in their hand
  - giving them a sword
  lexicon: HALOT
  rationale: The infinitive expresses result/effect. 'Putting a sword in their hand' captures the idiom of furnishing the means/opportunity to kill. Singular 'sword' matches Hebrew collective singular.
- source_word: לְהָרְגֵנוּ
  chosen: to kill us
  alternatives:
  - to slay us
  lexicon: HALOT
  rationale: Straightforward infinitive with 1cp suffix. 'Kill' is clear modern English; 'slay' would sound archaic.
