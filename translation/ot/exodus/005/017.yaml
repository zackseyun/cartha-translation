id: EXO.5.17
reference: Exodus 5:17
source:
  edition: WLC
  text: וַ/יֹּ֛אמֶר נִרְפִּ֥ים אַתֶּ֖ם נִרְפִּ֑ים עַל כֵּן֙ אַתֶּ֣ם אֹֽמְרִ֔ים נֵלְכָ֖ה
    נִזְבְּחָ֥ה לַֽ/יהוָֽה־׃
translation:
  text: But he said, “You are idle, idle! That is why you say, ‘Let us go and sacrifice
    to the LORD.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''idle, idle,'' with repetition for emphasis; alternatively, ''lazy,
      very lazy.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: But he said
  alternatives:
  - And he said
  lexicon: HALOT
  rationale: The waw-consecutive introduces Pharaoh's response in narrative sequence.
    'But' fits the adversative force in context after the Israelites' complaint, while
    still reflecting the simple narrative verb 'said.'
- source_word: נִרְפִּים
  chosen: idle
  alternatives:
  - lazy
  - slack
  - weak
  lexicon: HALOT
  rationale: The adjective from רפה here describes lack of industriousness or slackness
    in Pharaoh's accusation. 'Idle' is concise, idiomatic, and preserves the rhetorical
    sting better than 'weak.'
- source_word: אַתֶּם
  chosen: you
  rationale: Second person masculine plural pronoun, directly addressing the Israelite
    workers/people as a group. English 'you' naturally carries the plural here.
- source_word: נִרְפִּים אַתֶּם נִרְפִּים
  chosen: You are idle, idle!
  alternatives:
  - You are lazy, very lazy!
  - Idle you are, idle!
  lexicon: HALOT
  rationale: The repetition is emphatic and should be preserved in English rather
    than collapsed. The chosen wording keeps the accusation's force and rhythm in
    readable modern English.
- source_word: עַל כֵּן
  chosen: That is why
  alternatives:
  - Therefore
  - For this reason
  lexicon: HALOT
  rationale: This phrase marks Pharaoh's claimed inference from their behavior. 'That
    is why' is natural modern English and clearly expresses causation.
- source_word: אֹמְרִים
  chosen: you say
  alternatives:
  - you are saying
  lexicon: HALOT
  rationale: The participle functions here as a finite present in direct discourse.
    'You say' is the most natural English equivalent.
- source_word: נֵלְכָה
  chosen: Let us go
  alternatives:
  - We should go
  - Let us depart
  lexicon: HALOT
  rationale: First person plural cohortative expressing proposed action. 'Let us go'
    preserves the hortatory force.
- source_word: נִזְבְּחָה
  chosen: and sacrifice
  alternatives:
  - and offer sacrifice
  - that we may sacrifice
  lexicon: HALOT
  rationale: First person plural cohortative paired with 'Let us go.' 'Sacrifice'
    is the straightforward cultic term and fits the concise speech.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD.' The preposition
    ל marks direction or recipient of the sacrificial act, hence 'to the LORD.'
