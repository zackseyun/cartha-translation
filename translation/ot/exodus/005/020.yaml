id: EXO.5.20
reference: Exodus 5:20
source:
  edition: WLC
  text: וַֽ/יִּפְגְּעוּ֙ אֶת מֹשֶׁ֣ה וְ/אֶֽת אַהֲרֹ֔ן נִצָּבִ֖ים לִ/קְרָאתָ֑/ם בְּ/צֵאתָ֖/ם
    מֵ/אֵ֥ת פַּרְעֹֽה־־׃
translation:
  text: They met Moses and Aaron, who were standing to meet them when they came out
    from Pharaoh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They encountered Moses and Aaron'; the verb can also carry the sense
      'confronted' in some contexts, but the main text keeps the broader sense 'met.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְגְּעוּ
  chosen: They met
  alternatives:
  - they encountered
  - they confronted
  lexicon: HALOT
  rationale: The verb פגע can mean 'meet, encounter,' and in some contexts can carry
    a hostile nuance. Here the immediate context (the Israelite foremen reacting sharply
    in the next verse) allows some tension, but the verb itself does not require an
    adversarial rendering. 'Met' preserves the plain sense while leaving the following
    response to convey the hostility.
- source_word: אֶת מֹשֶׁה וְאֶת אַהֲרֹן
  chosen: Moses and Aaron
  rationale: Direct-object markers are not represented in English; the personal names
    are transliterated per translation philosophy.
- source_word: נִצָּבִים
  chosen: who were standing
  alternatives:
  - standing there
  - stationed
  lexicon: HALOT
  rationale: The participle from נצב denotes standing or taking one's stand. 'Who
    were standing' naturally conveys the durative participial sense in English and
    fits the scene of Moses and Aaron waiting for them.
- source_word: לִקְרָאתָם
  chosen: to meet them
  alternatives:
  - opposite them
  - to confront them
  lexicon: HALOT
  rationale: לקראת commonly expresses movement or position toward someone for meeting.
    'To meet them' is the most idiomatic and contextually fitting rendering. 'To confront
    them' would overread hostility into the prepositional phrase.
- source_word: בְּצֵאתָם
  chosen: when they came out
  alternatives:
  - as they were coming out
  - at their coming out
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב marks temporal circumstance.
    'When they came out' gives clear modern English while preserving the temporal
    relation.
- source_word: מֵאֵת פַּרְעֹה
  chosen: from Pharaoh
  alternatives:
  - from being with Pharaoh
  - from the presence of Pharaoh
  lexicon: HALOT
  rationale: מֵאֵת can indicate movement away from a person, effectively 'from' or
    'from the presence of.' 'From Pharaoh' is concise and natural; the fuller sense
    is not materially lost.
