id: EXO.5.6
reference: Exodus 5:6
source:
  edition: WLC
  text: וַ/יְצַ֥ו פַּרְעֹ֖ה בַּ/יּ֣וֹם הַ/ה֑וּא אֶת הַ/נֹּגְשִׂ֣ים בָּ/עָ֔ם וְ/אֶת
    שֹׁטְרָ֖י/ו לֵ/אמֹֽר־־׃
translation:
  text: So Pharaoh commanded, on that day, the taskmasters among the people and his
    officers, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that same day.' The Hebrew temporal phrase can emphasize immediacy.
    reason: lexical_alternative
  - marker: b
    text: '''Taskmasters'' renders a term for those who drove or exacted labor; ''overseers''
      is another possible rendering.'
    reason: lexical_alternative
  - marker: c
    text: Or 'his foremen.' The Hebrew term refers to subordinate officials in the
      labor system.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  chosen: commanded
  alternatives:
  - ordered
  - gave orders
  lexicon: HALOT
  rationale: The waw-consecutive imperfect of צוה advances the narrative with a simple
    past sense. 'Commanded' is a clear, natural rendering that preserves the authoritative
    force without unnecessary expansion.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  rationale: Standard English transliteration of the royal title/name.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - that same day
  lexicon: HALOT
  rationale: A temporal expression marking immediacy in the narrative. 'On that day'
    is the most direct rendering; 'that same day' is possible but slightly more interpretive.
- source_word: הַנֹּגְשִׂים
  chosen: the taskmasters
  alternatives:
  - the overseers
  - the oppressors
  lexicon: HALOT
  rationale: In the Exodus labor context, נגשׂים refers to those who drive or exact
    labor from the Israelites. 'Taskmasters' best fits the setting and established
    sense in context; 'oppressors' is too general here.
- source_word: בָּעָם
  chosen: among the people
  alternatives:
  - over the people
  - of the people
  lexicon: HALOT
  rationale: The preposition ב with עם here is contextually best taken as locating
    these taskmasters in relation to the laboring population. 'Among the people' is
    natural English and avoids over-specifying authority structure beyond the Hebrew.
- source_word: שֹׁטְרָיו
  chosen: his officers
  alternatives:
  - his foremen
  - his scribes
  lexicon: HALOT
  rationale: שׁטרים in Exodus commonly denotes subordinate officials associated with
    administration of labor. 'Officers' is broad enough to preserve the term's official
    character; 'foremen' may fit contextually but narrows the role too much, while
    'scribes' is too specialized.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Standard Hebrew speech-introduction formula. 'Saying' preserves the formal
    narrative linkage to the direct speech in the next verse.
