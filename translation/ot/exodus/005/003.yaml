id: EXO.5.3
reference: Exodus 5:3
source:
  edition: WLC
  text: וַ/יֹּ֣אמְר֔וּ אֱלֹהֵ֥י הָ/עִבְרִ֖ים נִקְרָ֣א עָלֵ֑י/נוּ נֵ֣לֲכָה נָּ֡א דֶּרֶךְ֩
    שְׁלֹ֨שֶׁת יָמִ֜ים בַּ/מִּדְבָּ֗ר וְ/נִזְבְּחָה֙ לַֽ/יהוָ֣ה אֱלֹהֵ֔י/נוּ פֶּ֨ן
    יִפְגָּעֵ֔/נוּ בַּ/דֶּ֖בֶר א֥וֹ בֶ/חָֽרֶב־׃
translation:
  text: And they said, “The God of the Hebrews has met with us. Please let us go a
    journey of three days into the wilderness, so that we may sacrifice to the LORD
    our God, lest he strike us with plague or with the sword.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “has called us.” The Hebrew may denote that God has met with them or
      summoned them.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהֵי הָעִבְרִים
  chosen: The God of the Hebrews
  alternatives:
  - the God of the Israelites
  lexicon: HALOT
  rationale: Formal construct phrase meaning 'God of the Hebrews.' 'Hebrews' preserves
    the source term עִבְרִים and the social/ethnic designation used in this narrative,
    rather than smoothing to 'Israelites.'
- source_word: נִקְרָא עָלֵינוּ
  chosen: has met with us
  alternatives:
  - has called us
  - has encountered us
  lexicon: HALOT
  rationale: The Niphal of קרא with עַל can denote being encountered or meeting with
    someone. In this context Moses and Aaron are reporting divine encounter/appointment,
    not merely saying God 'called' in an abstract sense. 'Has met with us' is idiomatic
    and fits the narrative situation.
- source_word: נֵלֲכָה נָּא
  chosen: Please let us go
  alternatives:
  - Let us go, please
  - Please, we must go
  lexicon: HALOT
  rationale: Cohortative נֵלֲכָה expresses requested resolve ('let us go'), and נָא
    adds politeness/entreaty. English places 'please' naturally before the request.
- source_word: דֶּרֶךְ שְׁלֹשֶׁת יָמִים
  chosen: a journey of three days
  alternatives:
  - three days' journey
  - the distance of three days
  lexicon: HALOT
  rationale: This Hebrew idiom denotes travel distance/time. 'A journey of three days'
    is natural modern English while remaining close to the source.
- source_word: בַּמִּדְבָּר
  chosen: into the wilderness
  alternatives:
  - into the desert
  lexicon: HALOT
  rationale: מִדְבָּר often refers to wilderness/pastureland rather than sandy desert
    specifically. 'Wilderness' is the standard and contextually appropriate rendering.
- source_word: וְנִזְבְּחָה
  chosen: so that we may sacrifice
  alternatives:
  - and sacrifice
  - that we may offer sacrifice
  lexicon: HALOT
  rationale: The cohortative following the request expresses purpose. 'So that we
    may sacrifice' makes the intended purpose explicit in idiomatic English.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD,' following
    established reverential convention and the stated translation policy.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - or else
  lexicon: HALOT
  rationale: '''Lest'' concisely preserves the warning/purpose nuance of פֶּן. Though
    slightly elevated, it remains readable and precise here.'
- source_word: יִפְגָּעֵנוּ
  chosen: he strike us
  alternatives:
  - he fall upon us
  - he attack us
  lexicon: HALOT
  rationale: פגע in this context conveys hostile divine intervention. 'Strike us'
    communicates punitive affliction clearly in English and fits the following instruments
    'with plague or with the sword.'
- source_word: בַּדֶּבֶר
  chosen: with plague
  alternatives:
  - with pestilence
  lexicon: HALOT
  rationale: דֶּבֶר commonly denotes pestilence/plague. 'Plague' is more accessible
    modern English while preserving the sense of divinely sent epidemic judgment.
- source_word: בֶחָרֶב
  chosen: with the sword
  alternatives:
  - by the sword
  lexicon: HALOT
  rationale: A conventional rendering for חֶרֶב in judgment contexts. 'With the sword'
    parallels 'with plague' and reflects the preposition בְּ instrumentally.
