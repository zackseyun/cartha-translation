id: EXO.5.14
reference: Exodus 5:14
source:
  edition: WLC
  text: וַ/יֻּכּ֗וּ שֹֽׁטְרֵי֙ בְּנֵ֣י יִשְׂרָאֵ֔ל אֲשֶׁר שָׂ֣מוּ עֲלֵ/הֶ֔ם נֹגְשֵׂ֥י
    פַרְעֹ֖ה לֵ/אמֹ֑ר מַדּ֡וּעַ לֹא֩ כִלִּיתֶ֨ם חָקְ/כֶ֤ם לִ/לְבֹּן֙ כִּ/תְמ֣וֹל שִׁלְשֹׁ֔ם
    גַּם תְּמ֖וֹל גַּם הַ/יּֽוֹם־־־׃
translation:
  text: And the Israelite foremen, whom Pharaoh’s taskmasters had set over them, were
    beaten, saying, “Why have you not finished your quota of brickmaking as before,
    both yesterday and today?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “as yesterday, the day before,” an idiom meaning “as before”
      or “as formerly.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֻּכּוּ
  chosen: were beaten
  alternatives:
  - were struck
  - were flogged
  lexicon: HALOT
  rationale: Passive plural of נכה; 'were beaten' is natural modern English and conveys
    physical punishment without over-specifying the method.
- source_word: שֹׁטְרֵי בְּנֵי יִשְׂרָאֵל
  chosen: the Israelite foremen
  alternatives:
  - the officers of the sons of Israel
  - the Israelite officials
  lexicon: HALOT
  rationale: In this labor context, שֹׁטְרִים refers to subordinate overseers/record-keepers
    among the Israelites rather than generic civil 'officers.' 'Israelite foremen'
    best fits the narrative role and readable English.
- source_word: אֲשֶׁר שָׂמוּ עֲלֵהֶם נֹגְשֵׂי פַרְעֹה
  chosen: whom Pharaoh’s taskmasters had set over them
  alternatives:
  - whom Pharaoh's slave drivers had appointed over them
  - whom the oppressors of Pharaoh had placed over them
  lexicon: HALOT
  rationale: נֹגְשִׂים in Exodus commonly denotes those driving forced labor; 'taskmasters'
    is idiomatic and contextually precise. The clause is rendered smoothly in English
    while preserving the relative structure.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - with the words
  - as they said
  lexicon: HALOT
  rationale: Standard quotative infinitive; 'saying' preserves the Hebrew discourse
    function.
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - For what reason
  - Why is it that
  lexicon: HALOT
  rationale: Direct interrogative is best represented by simple 'Why'.
- source_word: לֹא כִלִּיתֶם
  chosen: have you not finished
  alternatives:
  - have you not completed
  - did you not fulfill
  lexicon: HALOT
  rationale: כלה here refers to bringing the assigned work to completion. 'Finished'
    is idiomatic with the object 'quota'.
- source_word: חָקְכֶם
  chosen: your quota
  alternatives:
  - your prescribed amount
  - your assigned portion
  lexicon: HALOT
  rationale: חֹק can mean fixed allotment or prescribed due; in this labor setting
    'quota' is the clearest equivalent.
- source_word: לִלְבֹּן
  chosen: of brickmaking
  alternatives:
  - for making bricks
  - for molding bricks
  lexicon: HALOT
  rationale: The infinitive from לבן refers to making bricks. 'Of brickmaking' links
    naturally with 'quota' in English.
- source_word: כִּתְמוֹל שִׁלְשֹׁם
  chosen: as before
  alternatives:
  - as yesterday and the day before
  - as formerly
  lexicon: HALOT
  rationale: The idiom literally refers to previous days ('as yesterday, the third
    day'), meaning formerly/as before. A concise idiomatic rendering avoids awkwardness
    while preserving the sense of prior expectation.
- source_word: גַּם תְּמוֹל גַּם הַיּוֹם
  chosen: both yesterday and today
  alternatives:
  - yesterday as well as today
  - both last day and this day
  lexicon: HALOT
  rationale: גַּם...גַּם marks the pair emphatically. 'Both yesterday and today' is
    clear and natural.
