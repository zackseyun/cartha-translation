id: EXO.5.10
reference: Exodus 5:10
source:
  edition: WLC
  text: וַ/יֵּ֨צְא֜וּ נֹגְשֵׂ֤י הָ/עָם֙ וְ/שֹׁ֣טְרָ֔י/ו וַ/יֹּאמְר֥וּ אֶל הָ/עָ֖ם
    לֵ/אמֹ֑ר כֹּ֚ה אָמַ֣ר פַּרְעֹ֔ה אֵינֶ֛/נִּי נֹתֵ֥ן לָ/כֶ֖ם תֶּֽבֶן־׃
translation:
  text: 'So the taskmasters of the people and their officers went out and said to
    the people, “Thus says Pharaoh: I am not giving you straw.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “their foremen.” The Hebrew term can denote subordinate officials among
      the people.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹגְשֵׂי
  chosen: taskmasters
  alternatives:
  - slave drivers
  - overseers
  lexicon: HALOT
  rationale: In Exodus this term refers to those enforcing labor quotas under oppression.
    'Taskmasters' is established, natural English and conveys coercive labor supervision
    better than the broader 'overseers.' 'Slave drivers' is possible but slightly
    more interpretive in this verse.
- source_word: שֹׁטְרָיו
  chosen: their officers
  alternatives:
  - their foremen
  - their scribes
  lexicon: HALOT
  rationale: With 3ms suffix referring back to 'the people,' the phrase is best understood
    as the people's subordinate officials/foremen. 'Officers' preserves the administrative
    sense without over-specifying; 'foremen' is plausible from context but narrower.
- source_word: וַיֵּצְאוּ
  chosen: went out
  alternatives:
  - came out
  lexicon: HALOT
  rationale: The verb is the common 'go out/come out.' 'Went out' fits the narrative
    movement from Pharaoh's presence to the people.
- source_word: הָעָם
  chosen: the people
  lexicon: HALOT
  rationale: Straightforward rendering of the collective noun; contextually the Israelite
    laboring population is in view.
- source_word: לֵאמֹר
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Although literally introducing direct speech with 'saying,' idiomatic
    English is smoother with 'and said' before the quotation while preserving the
    discourse function.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus said
  lexicon: HALOT
  rationale: Standard messenger formula. Present-tense 'says' is natural in English
    for formal proclamation and reflects the Hebrew formulaic usage.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  lexicon: HALOT
  rationale: Standard English transliteration of the royal title/name.
- source_word: אֵינֶנִּי נֹתֵן
  chosen: I am not giving
  alternatives:
  - I will not give
  - I am giving no
  lexicon: HALOT
  rationale: The construction expresses present refusal in context. 'I am not giving'
    preserves the participial aspect and immediate force of Pharaoh's decree; 'I will
    not give' is possible but slightly shifts toward future-only sense.
- source_word: תֶּבֶן
  chosen: straw
  lexicon: HALOT
  rationale: Standard rendering for the material used in brickmaking in the immediate
    context.
