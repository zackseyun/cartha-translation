id: EXO.5.16
reference: Exodus 5:16
source:
  edition: WLC
  text: תֶּ֗בֶן אֵ֤ין נִתָּן֙ לַ/עֲבָדֶ֔י/ךָ וּ/לְבֵנִ֛ים אֹמְרִ֥ים לָ֖/נוּ עֲשׂ֑וּ
    וְ/הִנֵּ֧ה עֲבָדֶ֛י/ךָ מֻכִּ֖ים וְ/חָטָ֥את עַמֶּֽ/ךָ׃
translation:
  text: No straw is given to your servants, yet they say to us, ‘Make bricks!’ And
    look, your servants are being beaten, but the fault is with your own people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'and your people have sinned.' The Hebrew clause is compressed
      and may be rendered more literally this way, but in context it likely means
      that the blame lies with Pharaoh's people.
    reason: lexical_alternative
lexical_decisions:
- source_word: תֶּבֶן
  chosen: straw
  alternatives:
  - chopped straw
  - stubble
  lexicon: HALOT
  rationale: Standard rendering for the material mixed with clay in brickmaking; 'straw'
    is the natural English equivalent in this Exodus context.
- source_word: אֵין נִתָּן
  chosen: is given
  alternatives:
  - is being given
  - has been given
  lexicon: HALOT
  rationale: The negative existential with passive participle expresses that straw
    is not being supplied. English present passive is the clearest idiomatic rendering
    in context.
- source_word: לַעֲבָדֶיךָ / עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: Although עבד can denote bonded service, here the Israelite foremen are
    addressing Pharaoh in deferential court language. 'Your servants' preserves both
    the social subordination and the respectful address without overstating chattel
    status in this immediate speech.
- source_word: לְבֵנִים
  chosen: bricks
  alternatives:
  - brickwork
  lexicon: HALOT
  rationale: Direct object demanded by the overseers; plural 'bricks' matches the
    countable production context.
- source_word: אֹמְרִים לָנוּ עֲשׂוּ
  chosen: they say to us, ‘Make bricks!’
  alternatives:
  - they tell us, ‘Make them!’
  - they are saying to us, ‘Produce bricks!’
  lexicon: HALOT
  rationale: The Hebrew gives direct speech with an imperative. Supplying 'bricks'
    in English makes the command explicit from the immediately preceding noun and
    avoids awkward ellipsis.
- source_word: וְהִנֵּה
  chosen: And look
  alternatives:
  - And behold
  - Yet look
  - See
  lexicon: HALOT
  rationale: Marks an emphatic appeal to the obvious injustice. 'And look' is readable
    modern English while retaining the deictic force.
- source_word: מֻכִּים
  chosen: are being beaten
  alternatives:
  - are beaten
  - are struck
  lexicon: HALOT
  rationale: Passive participle in context describes ongoing mistreatment; progressive
    passive best conveys the immediate complaint.
- source_word: וְחָטָאת עַמֶּךָ
  chosen: but the fault is with your own people
  alternatives:
  - and your people have sinned
  - but your people are at fault
  - and it is a sin against your people
  lexicon: HALOT
  rationale: This clause is syntactically compressed and contextually difficult. In
    context the foremen are charging that the wrongdoing lies with Pharaoh's people
    (the Egyptian taskmasters), not with the Israelite workers. Rendering it as 'the
    fault is with your own people' captures the idiomatic sense and the argumentative
    force better than a wooden 'your people have sinned.' 'Own' brings out the contrast
    implied by the complaint.
