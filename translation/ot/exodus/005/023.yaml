id: EXO.5.23
reference: Exodus 5:23
source:
  edition: WLC
  text: וּ/מֵ/אָ֞ז בָּ֤אתִי אֶל פַּרְעֹה֙ לְ/דַבֵּ֣ר בִּ/שְׁמֶ֔/ךָ הֵרַ֖ע לָ/עָ֣ם
    הַ/זֶּ֑ה וְ/הַצֵּ֥ל לֹא הִצַּ֖לְתָּ אֶת עַמֶּֽ/ךָ־־־׃
translation:
  text: For since I came to Pharaoh to speak in your name, he has done evil to this
    people, and you have certainly not delivered your people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Ever since I came to Pharaoh to speak in your name.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he has made things worse for this people.'
    reason: lexical_alternative
  - marker: c
    text: 'The Hebrew expression uses an infinitive absolute with the verb (''delivering,
      you have not delivered'') to intensify the statement: ''you have certainly not
      delivered'' or ''you have not delivered at all.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֵאָז
  chosen: For since
  alternatives:
  - And since
  - Ever since
  lexicon: HALOT
  rationale: מֵאָז means 'since then/from that time.' The prefixed conjunction is
    rendered 'For' to fit Moses' explanatory complaint in context, while 'since' preserves
    the temporal force.
- source_word: בָּאתִי
  chosen: I came
  alternatives:
  - I went
  - I have come
  lexicon: HALOT
  rationale: Qal perfect 1cs of בוא is straightforwardly 'I came.' English simple
    past fits the retrospective complaint.
- source_word: אֶל־פַּרְעֹה
  chosen: to Pharaoh
  alternatives:
  - before Pharaoh
  lexicon: HALOT
  rationale: אֶל marks direction toward Pharaoh; 'to Pharaoh' is the most direct rendering.
- source_word: לְדַבֵּר
  chosen: to speak
  alternatives:
  - to talk
  lexicon: HALOT
  rationale: Infinitive construct of דבר here expresses purpose. 'To speak' is more
    formal and appropriate than 'to talk.'
- source_word: בִּשְׁמֶךָ
  chosen: in your name
  alternatives:
  - on your behalf
  - with your authority
  lexicon: HALOT
  rationale: Literally 'in your name.' This idiom can imply representation and authority,
    but the literal rendering is clear in English and preserves the theological weight.
- source_word: הֵרַע
  chosen: he has done evil
  alternatives:
  - he has harmed
  - he has made things worse for
  lexicon: HALOT
  rationale: Hiphil of רעע can mean 'do evil' or 'cause harm/make worse.' Here Pharaoh's
    action toward the people is morally charged and harmful; 'has done evil' preserves
    both the lexical connection to evil and the accusation's force.
- source_word: לָעָם הַזֶּה
  chosen: to this people
  alternatives:
  - to this nation
  - against this people
  lexicon: HALOT
  rationale: עָם is 'people.' The preposition ל here is naturally rendered 'to' with
    the verb phrase 'do evil to.'
- source_word: וְהַצֵּל לֹא הִצַּלְתָּ
  chosen: and you have certainly not delivered
  alternatives:
  - and you have not rescued at all
  - and you have by no means delivered
  lexicon: HALOT
  rationale: 'The infinitive absolute plus finite verb of נצל intensifies the negation:
    ''you have certainly/by no means delivered.'' ''Delivered'' fits Exodus'' redemption
    context and is idiomatic.'
- source_word: אֶת־עַמֶּךָ
  chosen: your people
  lexicon: HALOT
  rationale: Direct object marker plus construct phrase; simple and direct rendering.
