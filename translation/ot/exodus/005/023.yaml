theological_decisions:
- issue: Rendering the intensified negation in Moses' complaint to God
  chosen_reading: and you have certainly not delivered your people
  alternative_readings:
  - and you have not rescued your people at all
  - and you have by no means delivered your people
  rationale: The Hebrew infinitive absolute with the finite verb intensifies the denial.
    The chosen wording preserves Moses' bold complaint without overstating beyond
    the Hebrew. 'Delivered' also aligns with the emerging redemption theme in Exodus.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Rendering בִּשְׁמֶךָ literally
  chosen_reading: in your name
  alternative_readings:
  - on your behalf
  - with your authority
  rationale: The literal phrase is understandable in modern English and preserves
    the theological significance of acting under God's name, rather than reducing
    it to a mere functional paraphrase.
  doctrine_reference: Translation philosophy §§1, 6
