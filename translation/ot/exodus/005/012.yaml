id: EXO.5.12
reference: Exodus 5:12
source:
  edition: WLC
  text: וַ/יָּ֥פֶץ הָ/עָ֖ם בְּ/כָל אֶ֣רֶץ מִצְרָ֑יִם לְ/קֹשֵׁ֥שׁ קַ֖שׁ לַ/תֶּֽבֶן־׃
translation:
  text: So the people were scattered throughout all the land of Egypt to gather stubble
    for straw.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to gather straw for stubble' if קַשׁ and תֶּבֶן are taken less distinctly;
      the main text preserves the likely contrast between gathered stubble and the
      usual straw supply.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּפֶץ
  chosen: were scattered
  alternatives:
  - spread out
  - dispersed
  lexicon: HALOT
  rationale: The verb from פוץ in the waw-consecutive narrative form describes the
    people being dispersed over a wide area. English passive 'were scattered' best
    captures the resultative sense in context, where Pharaoh's policy forces the people
    to spread out across Egypt.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the populace
  lexicon: HALOT
  rationale: עם commonly means 'people.' In this context it refers collectively to
    the Israelite labor force under Pharaoh's command. 'The people' is natural and
    sufficiently formal without over-specifying beyond the Hebrew.
- source_word: בְּכָל אֶרֶץ מִצְרַיִם
  chosen: throughout all the land of Egypt
  alternatives:
  - through all the land of Egypt
  - throughout the whole land of Egypt
  lexicon: HALOT
  rationale: The phrase indicates movement over the full extent of Egypt. 'Throughout
    all the land of Egypt' preserves the distributive force of בְּכָל while remaining
    idiomatic English.
- source_word: לְקֹשֵׁשׁ
  chosen: to gather
  alternatives:
  - to collect
  lexicon: HALOT
  rationale: קשש denotes gathering or collecting, especially small pieces or scattered
    material. 'To gather' is the most straightforward English equivalent here.
- source_word: קַשׁ
  chosen: stubble
  alternatives:
  - straw
  - chopped straw
  - dry stalks
  lexicon: HALOT
  rationale: 'קַשׁ refers to straw or stubble-like plant residue. Because תֶּבֶן appears
    separately in the same clause, rendering both with ''straw'' would obscure the
    distinction. ''Stubble'' preserves the contrast: they are gathering rough substitute
    material to serve in place of the usual straw.'
- source_word: לַתֶּבֶן
  chosen: for straw
  alternatives:
  - instead of straw
  - for use as straw
  lexicon: HALOT
  rationale: 'The preposition ל here is best taken as indicating purpose or substitution:
    the gathered stubble is to function as straw for brickmaking. ''For straw'' is
    concise and close to the Hebrew, while the substitutional nuance is clear from
    context.'
