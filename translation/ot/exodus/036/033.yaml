id: EXO.36.33
reference: Exodus 36:33
source:
  edition: WLC
  text: וַ/יַּ֖עַשׂ אֶת הַ/בְּרִ֣יחַ הַ/תִּיכֹ֑ן לִ/בְרֹ֨חַ֙ בְּ/ת֣וֹךְ הַ/קְּרָשִׁ֔ים
    מִן הַ/קָּצֶ֖ה אֶל הַ/קָּצֶֽה־־־׃
translation:
  text: He made the middle bar to pass through the midst of the boards from end to
    end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the central bar ... from one end to the other.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb rendered 'to pass through' can also be understood as 'to
      run through' or 'to extend through' in this construction context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He made
  alternatives:
  - And he made
  - Then he made
  lexicon: HALOT
  rationale: Qal wayyiqtol of עשה, the standard narrative form meaning 'and/he made.'
    English drops the conjunction for smoother narrative while preserving the simple
    past sense.
- source_word: הַבְּרִיחַ
  chosen: the bar
  alternatives:
  - the crossbar
  - the bolt
  lexicon: HALOT
  rationale: בְּרִיחַ in tabernacle construction refers to a bar used to hold the
    frames together. 'Bar' is the most natural and sufficiently precise English rendering
    here.
- source_word: הַתִּיכֹן
  chosen: the middle
  alternatives:
  - the central
  - the inner
  lexicon: HALOT
  rationale: The adjective denotes something in the middle or center. 'Middle' fits
    the construction description and matches the likely spatial sense.
- source_word: לִבְרֹחַ
  chosen: to pass through
  alternatives:
  - to run through
  - to extend through
  lexicon: HALOT
  rationale: The infinitive of ברח in this architectural context describes the bar
    going through or along the frames. 'To pass through' communicates the function
    idiomatically in English without suggesting motion at that moment.
- source_word: בְּתוֹךְ
  chosen: through the midst of
  alternatives:
  - through the middle of
  - inside
  lexicon: HALOT
  rationale: בְּתוֹךְ means 'in the midst of' or 'through the interior of.' Because
    the bar is described as traversing the boards, 'through the midst of' preserves
    the spatial nuance.
- source_word: הַקְּרָשִׁים
  chosen: the boards
  alternatives:
  - the frames
  - the planks
  lexicon: HALOT
  rationale: קֶרֶשׁ in tabernacle passages is often rendered 'frame' or 'board.' 'Boards'
    is a clear, traditional, and plausible rendering for the structural elements in
    view.
- source_word: מִן הַקָּצֶה אֶל הַקָּצֶה
  chosen: from end to end
  alternatives:
  - from one end to the other
  - from the far end to the far end
  lexicon: HALOT
  rationale: This idiom expresses full extension across the entire length. 'From end
    to end' is concise and natural English.
