id: EXO.36.6
reference: Exodus 36:6
source:
  edition: WLC
  text: וַ/יְצַ֣ו מֹשֶׁ֗ה וַ/יַּעֲבִ֨ירוּ ק֥וֹל בַּֽ/מַּחֲנֶה֮ לֵ/אמֹר֒ אִ֣ישׁ וְ/אִשָּׁ֗ה
    אַל יַעֲשׂוּ ע֛וֹד מְלָאכָ֖ה לִ/תְרוּמַ֣ת הַ/קֹּ֑דֶשׁ וַ/יִּכָּלֵ֥א הָ/עָ֖ם מֵ/הָבִֽיא־־׃
translation:
  text: So Moses commanded, and they sent a proclamation through the camp, saying,
    “Let neither man nor woman do any more work for the contribution of the sanctuary.”
    So the people were restrained from bringing more.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “they made an announcement in the camp.” The Hebrew idiom is literally
      “they caused a voice to pass.”
    reason: lexical_alternative
  - marker: b
    text: “Contribution of the sanctuary” may also be rendered “holy contribution”
      or “offering for the sanctuary.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  chosen: commanded
  alternatives:
  - gave orders
  - instructed
  lexicon: HALOT
  rationale: The verb צוה in the waw-consecutive narrative form denotes issuing an
    authoritative command. 'Commanded' best preserves the force of Moses's directive.
- source_word: וַיַּעֲבִירוּ קוֹל
  chosen: they sent a proclamation
  alternatives:
  - they caused a message to pass through
  - they made an announcement
  - they proclaimed
  lexicon: HALOT
  rationale: The idiom עבר קול means to circulate a public announcement. 'Sent a proclamation'
    captures both the causative sense and the public nature of the message in natural
    English.
- source_word: בַּמַּחֲנֶה
  chosen: through the camp
  alternatives:
  - in the camp
  lexicon: HALOT
  rationale: With the proclamation idiom, English 'through the camp' better conveys
    movement of the announcement among the people, though the preposition is literally
    'in.'
- source_word: אִישׁ וְאִשָּׁה
  chosen: neither man nor woman
  alternatives:
  - man or woman
  - any man or woman
  lexicon: HALOT
  rationale: The pair explicitly includes both sexes. 'Neither man nor woman' fits
    the prohibitive construction with אַל and preserves the gendered wording of the
    Hebrew.
- source_word: אַל יַעֲשׂוּ עוֹד מְלָאכָה
  chosen: do any more work
  alternatives:
  - make any more work
  - do further work
  lexicon: HALOT
  rationale: מלאכה commonly denotes work or craftsmanship. In this context it refers
    to producing materials or items for the tabernacle contribution, so 'do any more
    work' is idiomatic and sufficiently broad.
- source_word: לִתְרוּמַת הַקֹּדֶשׁ
  chosen: for the contribution of the sanctuary
  alternatives:
  - for the holy contribution
  - for the offering for the sanctuary
  lexicon: HALOT
  rationale: תרומה is a contribution/offering set apart for sacred use. הקֹדשׁ here
    refers to the sanctuary/holy place in context. 'Contribution of the sanctuary'
    communicates that the work was for the sacred collection connected with the tabernacle.
- source_word: וַיִּכָּלֵא
  chosen: were restrained
  alternatives:
  - were stopped
  - were held back
  lexicon: HALOT
  rationale: The Niphal form of כלא conveys being restrained or prevented. 'Were restrained'
    preserves the passive nuance without implying unwillingness.
- source_word: מֵהָבִיא
  chosen: from bringing more
  alternatives:
  - from bringing
  - from continuing to bring
  lexicon: HALOT
  rationale: The preposition מן with the infinitive marks prevention from the action.
    'Bringing more' makes explicit the contextual sense that additional contributions
    were no longer needed.
