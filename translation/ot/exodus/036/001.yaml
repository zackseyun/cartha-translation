id: EXO.36.1
reference: Exodus 36:1
source:
  edition: WLC
  text: וְ/עָשָׂה֩ בְצַלְאֵ֨ל וְ/אָהֳלִיאָ֜ב וְ/כֹ֣ל אִ֣ישׁ חֲכַם לֵ֗ב אֲשֶׁר֩ נָתַ֨ן יְהוָ֜ה חָכְמָ֤ה וּ/תְבוּנָה֙ בָּ/הֵ֔מָּה לָ/דַ֣עַת לַ/עֲשֹׂ֔ת אֶֽת כָּל מְלֶ֖אכֶת עֲבֹדַ֣ת הַ/קֹּ֑דֶשׁ לְ/כֹ֥ל אֲשֶׁר צִוָּ֖ה יְהוָֽה׀־־־־׃
translation:
  text: And Bezalel and Oholiab, and every skillful man in whom Yahweh has put wisdom and understanding to know how to do all the work for the service of the sanctuary, shall do according to all that Yahweh has commanded.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'every wise-hearted man'; the phrase may function generically for every skilled worker.
    reason: lexical_alternative
  - marker: b
    text: Or 'to whom the LORD has given wisdom and understanding'; Hebrew literally has a plural expression, 'in them,' referring collectively to Bezalel, Oholiab, and every wise-hearted man.
    reason: lexical_alternative
  - marker: c
    text: Or 'all the work of the service of the sanctuary.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשָׂה
  chosen: shall do
  alternatives:
  - will do
  - shall make
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in context functions as a future/resultative statement continuing the instructions. 'Shall do' preserves the directive/result sense without sounding overly archaic; 'make' is possible for עשה but 'do' better covers the broad range of tasks.
- source_word: בְצַלְאֵל
  chosen: Bezalel
  rationale: Personal name transliterated per translation philosophy.
- source_word: וְאָהֳלִיאָב
  chosen: Oholiab
  alternatives:
  - Aholiab
  rationale: Personal name transliterated by standard English convention; 'Oholiab' is a common rendering, though 'Aholiab' also appears in English tradition.
- source_word: וְכֹל אִישׁ חֲכַם לֵב
  chosen: every wise-hearted man
  alternatives:
  - every skillful man
  - every wise man
  - every man wise of heart
  lexicon: HALOT
  rationale: Literally 'every man wise of heart.' 'Wise-hearted' preserves the Hebrew idiom linking inner disposition with skill. 'Man' is retained for gender-accurate representation of אִישׁ per project philosophy, though the phrase likely has representative force in context.
- source_word: אֲשֶׁר נָתַן יְהוָה חָכְמָה וּתְבוּנָה בָהֵמָּה
  chosen: in whom the LORD has put wisdom and understanding
  alternatives:
  - to whom the LORD has given wisdom and understanding
  - in them the LORD has put wisdom and understanding
  lexicon: HALOT
  rationale: The clause is plural in Hebrew ('in them'), referring collectively to Bezalel, Oholiab, and every wise-hearted man. English singular 'in whom' works distributively with the collective phrase and reads naturally. 'Put' reflects נתן well in this idiom.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Follows the project's default rendering for the divine name.
- source_word: חָכְמָה
  chosen: wisdom
  alternatives:
  - skill
  lexicon: HALOT
  rationale: Though the context is craftsmanship, 'wisdom' is the broader and more literal term, and in Exodus it often includes divinely given artisan skill.
- source_word: וּתְבוּנָה
  chosen: understanding
  alternatives:
  - discernment
  - insight
  lexicon: HALOT
  rationale: '''Understanding'' is the standard rendering and pairs naturally with ''wisdom'' in Hebrew idiom.'
- source_word: לָדַעַת
  chosen: to know how
  alternatives:
  - to know
  - for knowing
  lexicon: HALOT
  rationale: Infinitive expresses practical knowledge/ability in context; 'to know how' makes the functional sense explicit in natural English.
- source_word: לַעֲשֹׂת
  chosen: to do
  alternatives:
  - to make
  - to perform
  lexicon: HALOT
  rationale: Keeps continuity with עשה earlier in the verse and covers the full range of construction tasks.
- source_word: כָּל מְלֶאכֶת עֲבֹדַת הַקֹּדֶשׁ
  chosen: all the work for the service of the sanctuary
  alternatives:
  - all the work of the holy service
  - all the workmanship for the service of the holy place
  - all the work of the service of the sanctuary
  lexicon: HALOT
  rationale: מלאכת is 'work/workmanship'; עבדת is 'service/labor'; הקֹדשׁ here refers to the holy place/sanctuary rather than abstract holiness. 'For the service of the sanctuary' is clear modern English while preserving the layered Hebrew construction.
- source_word: לְכֹל אֲשֶׁר צִוָּה יְהוָה
  chosen: according to all that the LORD has commanded
  alternatives:
  - for all that the LORD has commanded
  - in accordance with all that the LORD commanded
  lexicon: HALOT
  rationale: 'The prefixed ל here is best taken as conformity/result: the work is to be done in accordance with everything the LORD commanded.'
