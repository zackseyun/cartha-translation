id: EXO.36.28
reference: Exodus 36:28
source:
  edition: WLC
  text: וּ/שְׁנֵ֤י קְרָשִׁים֙ עָשָׂ֔ה לִ/מְקֻצְעֹ֖ת הַ/מִּשְׁכָּ֑ן בַּ/יַּרְכָתָֽיִם׃
translation:
  text: And he made two boards for the corners of the tabernacle at the rear corners.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the corner-pieces of the tabernacle, at the two rear sides.' The
      Hebrew terms describe the back extremities/corners of the structure and may
      emphasize either the corner location or the specially joined corner boards.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁנֵי
  chosen: And ... two
  alternatives:
  - and two
  - now two
  lexicon: HALOT
  rationale: The conjunction plus construct form of 'two' introduces the next item
    in sequence. 'And' preserves the narrative coordination, and 'two' is retained
    explicitly.
- source_word: קְרָשִׁים
  chosen: boards
  alternatives:
  - frames
  - planks
  lexicon: HALOT
  rationale: In tabernacle construction contexts, קֶרֶשׁ refers to the structural
    wooden boards/panels. 'Boards' is the most natural modern English rendering and
    fits the repeated usage in this section.
- source_word: עָשָׂה
  chosen: he made
  alternatives:
  - he fashioned
  - he prepared
  lexicon: HALOT
  rationale: The verb עשה is the standard verb 'make/do.' 'He made' is the plain and
    sufficiently formal rendering in this construction narrative.
- source_word: לִ/מְקֻצְעֹת
  chosen: for the corners
  alternatives:
  - for the corner-pieces
  - for the angles
  lexicon: HALOT
  rationale: The term refers to corner locations or corner joinings. 'For the corners'
    is clear and idiomatic, while still leaving room for the architectural sense of
    specially placed boards.
- source_word: הַ/מִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  - the sanctuary tent
  lexicon: HALOT
  rationale: מִשְׁכָּן is conventionally and accurately rendered 'tabernacle' in Exodus's
    sanctuary instructions. Although literally related to 'dwelling,' 'tabernacle'
    best matches the referent in readable modern English.
- source_word: בַּ/יַּרְכָתָיִם
  chosen: at the rear corners
  alternatives:
  - in the far back part
  - at the two back sides
  - at the extremities
  lexicon: HALOT
  rationale: The dual form indicates the two hindmost sides/extremities, here referring
    to the back corners of the structure. Rendering the phrase with 'rear corners'
    communicates both the dual/back sense and the architectural setting.
