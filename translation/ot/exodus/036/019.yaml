id: EXO.36.19
reference: Exodus 36:19
source:
  edition: WLC
  text: וַ/יַּ֤עַשׂ מִכְסֶה֙ לָ/אֹ֔הֶל עֹרֹ֥ת אֵלִ֖ים מְאָדָּמִ֑ים וּ/מִכְסֵ֛ה עֹרֹ֥ת
    תְּחָשִׁ֖ים מִ/לְ/מָֽעְלָ/ה׃ס
translation:
  text: He made a covering for the tent of ram skins dyed red, and a covering of fine
    leather above that.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew תְּחָשִׁים is uncertain; possible renderings include 'sea-cow hides,'
      'porpoise skins,' 'dugong skins,' or traditionally 'badger skins.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He made
  alternatives:
  - and he made
  - then he made
  lexicon: HALOT
  rationale: Wayyiqtol of עשה, narrating a past action in sequence. 'He made' is natural
    modern English while preserving the straightforward verbal sense.
- source_word: מִכְסֶה
  chosen: a covering
  alternatives:
  - covering
  lexicon: HALOT
  rationale: The noun denotes a covering layer. The indefinite article fits English
    idiom and the construction with the following material phrase.
- source_word: לָאֹהֶל
  chosen: for the tent
  alternatives:
  - for the tabernacle
  - over the tent
  lexicon: HALOT
  rationale: אֹהֶל is literally 'tent.' Although in tabernacle contexts some English
    versions use 'tabernacle,' the Hebrew term here is the ordinary word for tent,
    so 'for the tent' better reflects original-language primacy.
- source_word: עֹרֹת אֵלִים מְאָדָּמִים
  chosen: of ram skins dyed red
  alternatives:
  - of red ram skins
  - of rams' skins dyed red
  lexicon: HALOT
  rationale: עֹרֹת are skins/hides; אֵלִים are rams; מְאָדָּמִים indicates being reddened/dyed
    red. 'Ram skins dyed red' is clear, idiomatic, and preserves the participial/adjectival
    nuance.
- source_word: וּמִכְסֵה
  chosen: and a covering
  alternatives:
  - and a second covering
  lexicon: HALOT
  rationale: The conjunction introduces an additional covering. 'A second' is interpretive;
    the Hebrew simply repeats 'covering,' so the translation keeps the repetition.
- source_word: עֹרֹת תְּחָשִׁים
  chosen: of fine leather
  alternatives:
  - of hides of sea cows
  - of porpoise skins
  - of dugong skins
  - of badger skins
  lexicon: HALOT
  rationale: תְּחָשִׁים is a well-known lexical uncertainty in tabernacle texts. Rather
    than choose a speculative animal identification, 'fine leather' communicates a
    durable outer covering and reflects a cautious, source-sensitive rendering. Alternatives
    are preserved in a footnote.
- source_word: מִלְמָעְלָה
  chosen: above that
  alternatives:
  - from above
  - on top
  - over it
  lexicon: HALOT
  rationale: The phrase indicates placement as the uppermost layer. 'Above that' makes
    the relational sense explicit in natural English without overtranslating.
