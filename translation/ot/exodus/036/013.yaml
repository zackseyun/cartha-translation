id: EXO.36.13
reference: Exodus 36:13
source:
  edition: WLC
  text: וַ/יַּ֕עַשׂ חֲמִשִּׁ֖ים קַרְסֵ֣י זָהָ֑ב וַ/יְחַבֵּ֨ר אֶת הַ/יְרִעֹ֜ת אַחַ֤ת
    אֶל אַחַת֙ בַּ/קְּרָסִ֔ים וַֽ/יְהִ֥י הַ/מִּשְׁכָּ֖ן אֶחָֽד־־׃ס
translation:
  text: And he made fifty gold clasps, and joined the curtains to one another with
    the clasps, so that the tabernacle became one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "and the tabernacle was one." The Hebrew can be rendered more formally;
      "became one" brings out the result of the joining action.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: And he made
  alternatives:
  - And he fashioned
  - And he made
  lexicon: HALOT
  rationale: The verb עשה is the standard verb 'make/do.' 'Made' is the most natural
    and sufficiently formal rendering in this construction.
- source_word: חֲמִשִּׁים
  chosen: fifty
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: קַרְסֵי זָהָב
  chosen: gold clasps
  alternatives:
  - gold hooks
  - gold fasteners
  lexicon: HALOT
  rationale: קֶרֶס in tabernacle contexts refers to connecting pieces used to join
    curtains. 'Clasps' best conveys a joining fastener in readable modern English
    without over-specifying shape.
- source_word: וַיְחַבֵּר
  chosen: and joined
  alternatives:
  - and coupled
  - and connected
  lexicon: HALOT
  rationale: חבר means to join/connect. 'Joined' is idiomatic and matches the physical
    action described.
- source_word: אֶת הַיְרִעֹת
  chosen: the curtains
  alternatives:
  - the curtain panels
  lexicon: HALOT
  rationale: יְרִיעוֹת are the fabric curtains/panels of the tabernacle covering.
    'Curtains' is the standard clear rendering; 'panels' is possible but less natural
    here.
- source_word: אַחַת אֶל אַחַת
  chosen: to one another
  alternatives:
  - one to another
  - each to the other
  lexicon: HALOT
  rationale: The feminine singular repetition idiomatically expresses reciprocal joining
    of the curtains. 'To one another' is natural English and preserves the reciprocal
    sense.
- source_word: בַּקְּרָסִים
  chosen: with the clasps
  alternatives:
  - by the clasps
  - using the clasps
  lexicon: HALOT
  rationale: 'The preposition ב here is instrumental: the joining is accomplished
    by means of the clasps.'
- source_word: וַיְהִי הַמִּשְׁכָּן אֶחָד
  chosen: so that the tabernacle became one
  alternatives:
  - and the tabernacle was one
  - and the tabernacle became one whole
  lexicon: HALOT
  rationale: The clause gives the result of joining the curtains. 'Became one' captures
    the resultant unity more clearly in English than the more wooden 'was one,' while
    preserving the text's emphasis on the tabernacle as a unified structure.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  lexicon: HALOT
  rationale: מִשְׁכָּן is the established term for the sanctuary structure in Exodus.
    'Tabernacle' is the clearest conventional rendering in this context.
