id: EXO.36.3
reference: Exodus 36:3
source:
  edition: WLC
  text: וַ/יִּקְח֞וּ מִ/לִּ/פְנֵ֣י מֹשֶׁ֗ה אֵ֤ת כָּל הַ/תְּרוּמָה֙ אֲשֶׁ֨ר הֵבִ֜יאוּ
    בְּנֵ֣י יִשְׂרָאֵ֗ל לִ/מְלֶ֛אכֶת עֲבֹדַ֥ת הַ/קֹּ֖דֶשׁ לַ/עֲשֹׂ֣ת אֹתָ֑/הּ וְ֠/הֵם
    הֵבִ֨יאוּ אֵלָ֥י/ו ע֛וֹד נְדָבָ֖ה בַּ/בֹּ֥קֶר בַּ/בֹּֽקֶר־׃
translation:
  text: And they took from before Moses all the contribution that the sons of Israel
    had brought for the work of the service of the sanctuary, to do it. But they still
    kept bringing to him a freewill offering morning after morning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the presence of Moses.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the Israelites.' Literally, 'the sons of Israel.'
    reason: lexical_alternative
  - marker: c
    text: Or 'morning by morning.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  chosen: they took
  alternatives:
  - they received
  lexicon: HALOT
  rationale: Basic sense of לקח is 'take.' In context the craftsmen take the materials
    from Moses' presence/custody. 'Received' is possible contextually, but 'took'
    better reflects the Hebrew verb while remaining natural English.
- source_word: מִלִּפְנֵי מֹשֶׁה
  chosen: from before Moses
  alternatives:
  - from Moses
  - from the presence of Moses
  lexicon: HALOT
  rationale: Literally 'from before/from the presence of Moses.' The phrase indicates
    transfer from Moses' immediate custody. 'From before Moses' preserves the Hebrew
    image; smoother alternatives are possible, but this wording remains intelligible
    and transparent.
- source_word: הַתְּרוּמָה
  chosen: the contribution
  alternatives:
  - the offering
  - the raised contribution
  lexicon: HALOT
  rationale: תְּרוּמָה commonly denotes a contribution or offering set apart for sacred
    use. 'Contribution' fits the tabernacle-building context, where donated materials
    are in view rather than a sacrificial act.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, the formal expression is retained rather
    than flattened. Here it is a conventional collective designation for Israel. A
    more idiomatic alternative could be footnoted elsewhere if needed, but the source
    expression is best preserved in the main text.
- source_word: לִמְלֶאכֶת עֲבֹדַת הַקֹּדֶשׁ
  chosen: for the work of the service of the sanctuary
  alternatives:
  - for the work of the holy service
  - for the work of serving in the sanctuary
  lexicon: HALOT
  rationale: 'The Hebrew stacks related nouns: ''for the work of the service of the
    holy place/sanctuary.'' ''Sanctuary'' best captures הַקֹּדֶשׁ here as the sacred
    precinct/tabernacle context, while preserving the distinction between ''work''
    and ''service.'''
- source_word: לַעֲשֹׂת אֹתָהּ
  chosen: to do it
  alternatives:
  - to make it
  - to carry it out
  lexicon: HALOT
  rationale: עשה is broad ('do/make'). The feminine suffix most naturally refers back
    to the work/service as a collective task. 'To do it' is slightly formal but transparent
    to the Hebrew; 'carry it out' is smoother but more interpretive.
- source_word: וְהֵם הֵבִיאוּ
  chosen: But they still kept bringing
  alternatives:
  - And they brought
  - while they continued bringing
  lexicon: HALOT
  rationale: The independent pronoun plus verb gives emphasis/continuation, and the
    context shows ongoing action despite the transfer of materials. 'Still kept bringing'
    captures the persistence implied by the narrative flow better than a simple past.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - to Moses
  lexicon: HALOT
  rationale: The pronoun most naturally refers to Moses. 'To him' preserves the Hebrew
    cohesion; the antecedent is clear from context.
- source_word: נְדָבָה
  chosen: a freewill offering
  alternatives:
  - a voluntary offering
  - an additional contribution
  lexicon: HALOT
  rationale: נְדָבָה denotes a voluntary/freewill gift. 'Freewill offering' is a standard
    and accurate rendering in cultic contexts, preserving the voluntariness of the
    people's giving.
- source_word: בַּבֹּקֶר בַּבֹּקֶר
  chosen: morning after morning
  alternatives:
  - every morning
  - morning by morning
  lexicon: HALOT
  rationale: The repeated phrase expresses regular recurrence. 'Morning after morning'
    is natural modern English and preserves the iterative force more vividly than
    a flat 'every morning.'
