id: EXO.36.7
reference: Exodus 36:7
source:
  edition: WLC
  text: וְ/הַ/מְּלָאכָ֗ה הָיְתָ֥ה דַיָּ֛/ם לְ/כָל הַ/מְּלָאכָ֖ה לַ/עֲשׂ֣וֹת אֹתָ֑/הּ
    וְ/הוֹתֵֽר־׃ס
translation:
  text: And the material was sufficient for all the work to do it, and more than enough.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and there was some left over.' The Hebrew verb can emphasize that there
      was a surplus remaining after what was needed for the work.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַמְּלָאכָה
  chosen: the material
  alternatives:
  - the work
  - the workmanship
  lexicon: HALOT
  rationale: Although מְלָאכָה often means 'work,' in this context the clause explains
    that what had been brought by the people was enough and left over for the construction.
    English 'material' best captures the referent here, avoiding the awkward sense
    that 'the work' itself was sufficient. This is a contextual rendering of the same
    Hebrew noun used flexibly in the verse.
- source_word: הָיְתָה
  chosen: was
  lexicon: HALOT
  rationale: Standard rendering of היה as the copula in a past descriptive clause.
- source_word: דַיָּם
  chosen: sufficient
  alternatives:
  - enough
  lexicon: HALOT
  rationale: דַּי conveys sufficiency; the pronominal suffix refers back to what had
    been brought. 'Sufficient' fits the formal sense and pairs naturally with the
    following infinitive clause.
- source_word: לְכָל הַמְּלָאכָה
  chosen: for all the work
  alternatives:
  - for all the craftsmanship
  - for the whole task
  lexicon: HALOT
  rationale: Here מְלָאכָה clearly denotes the work/task to be done. 'For all the
    work' preserves the breadth of the phrase and distinguishes this use from the
    earlier contextual rendering 'material.'
- source_word: לַעֲשׂוֹת אֹתָהּ
  chosen: to do it
  alternatives:
  - to make it
  - to accomplish it
  lexicon: HALOT
  rationale: A straightforward rendering of the infinitive of עשה with object suffix.
    'To do it' is slightly more literal; in English it refers to carrying out the
    work just mentioned.
- source_word: וְהוֹתֵר
  chosen: and more than enough
  alternatives:
  - and there was left over
  - with some left over
  - and it exceeded
  lexicon: HALOT
  rationale: The Hiphil of יתר expresses surplus or excess. 'And more than enough'
    communicates both the result and the idiomatic force in smooth English. The more
    literal idea of 'left over' is preserved as an alternative because the Hebrew
    can also emphasize remainder.
