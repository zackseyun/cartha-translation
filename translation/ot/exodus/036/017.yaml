id: EXO.36.17
reference: Exodus 36:17
source:
  edition: WLC
  text: וַ/יַּ֜עַשׂ לֻֽלָאֹ֣ת חֲמִשִּׁ֗ים עַ֚ל שְׂפַ֣ת הַ/יְרִיעָ֔ה הַ/קִּיצֹנָ֖ה
    בַּ/מַּחְבָּ֑רֶת וַ/חֲמִשִּׁ֣ים לֻלָאֹ֗ת עָשָׂה֙ עַל שְׂפַ֣ת הַ/יְרִיעָ֔ה הַ/חֹבֶ֖רֶת
    הַ/שֵּׁנִֽית־׃
translation:
  text: He made fifty loops on the edge of the outer curtain in the first set joined
    together, and he made fifty loops on the edge of the second curtain that was joined
    to it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the coupling' or 'in the first joined section'; the Hebrew term refers
      to the joined set or coupling of curtains.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֻלָאֹת
  chosen: loops
  alternatives:
  - loops of blue
  - fastening loops
  lexicon: HALOT
  rationale: The noun refers to fabric loops used to connect the curtains. 'Loops'
    is the plain, natural English equivalent here. 'Of blue' is not present in this
    verse, though it appears in the parallel instruction elsewhere, so it should not
    be imported.
- source_word: שְׂפַת
  chosen: edge
  alternatives:
  - lip
  - border
  lexicon: HALOT
  rationale: In construction/tabernacle contexts, the term denotes the edge or border
    of a fabric piece. 'Edge' is the most idiomatic modern English rendering.
- source_word: יְרִיעָה
  chosen: curtain
  alternatives:
  - panel
  - sheet
  lexicon: HALOT
  rationale: In the tabernacle descriptions, יְרִיעָה refers to a large fabric curtain.
    'Curtain' is the standard and clearest rendering in context.
- source_word: הַקִּיצֹנָה
  chosen: outer
  alternatives:
  - endmost
  - extreme
  lexicon: HALOT
  rationale: The adjective indicates the curtain at the outer/end position of the
    set. 'Outer' communicates the spatial sense naturally in English.
- source_word: בַּמַּחְבָּרֶת
  chosen: in the first set joined together
  alternatives:
  - in the coupling
  - in the first joined section
  lexicon: HALOT
  rationale: מַחְבָּרֶת denotes something joined or a set/coupling. In this context
    it refers to the first group of curtains as joined together. A slightly expanded
    rendering is warranted for clarity in English.
- source_word: הַחֹבֶרֶת
  chosen: that was joined to it
  alternatives:
  - that was coupled
  - that was joined
  lexicon: HALOT
  rationale: The participial form describes the curtain as belonging to the joined
    counterpart set. 'That was joined to it' makes the relational sense explicit and
    readable.
- source_word: הַשֵּׁנִית
  chosen: the second
  alternatives:
  - the other
  - the second one
  lexicon: HALOT
  rationale: The adjective straightforwardly marks the second curtain/set counterpart.
    'The second' preserves the formal distinction.
- source_word: וַיַּעַשׂ ... עָשָׂה
  chosen: he made ... he made
  alternatives:
  - and he made ... he made
  - he fashioned ... he made
  lexicon: HALOT
  rationale: The repeated verb עשה is preserved with 'made' in both clauses to reflect
    the Hebrew repetition and maintain consistency.
