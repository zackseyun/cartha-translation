id: EXO.36.12
reference: Exodus 36:12
source:
  edition: WLC
  text: חֲמִשִּׁ֣ים לֻלָאֹ֗ת עָשָׂה֮ בַּ/יְרִיעָ֣ה הָ/אֶחָת֒ וַ/חֲמִשִּׁ֣ים לֻלָאֹ֗ת
    עָשָׂה֙ בִּ/קְצֵ֣ה הַ/יְרִיעָ֔ה אֲשֶׁ֖ר בַּ/מַּחְבֶּ֣רֶת הַ/שֵּׁנִ֑ית מַקְבִּילֹת֙
    הַ/לֻּ֣לָאֹ֔ת אַחַ֖ת אֶל אֶחָֽת־׃
translation:
  text: He made fifty loops on the one curtain, and he made fifty loops on the edge
    of the curtain that was in the second set; the loops corresponded to one another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the curtain that was in the second joining' or 'the second coupled section.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the loops were corresponding, one to another.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֻלָאֹת
  chosen: loops
  alternatives:
  - clasps
  - buttonholes
  lexicon: HALOT
  rationale: The noun refers to fabric loops used for joining curtains. 'Loops' is
    the most natural and precise English term in this tabernacle-construction context;
    'clasps' would confuse this item with the separate metal fasteners/hooks mentioned
    elsewhere.
- source_word: יְרִיעָה
  chosen: curtain
  alternatives:
  - panel
  - sheet
  lexicon: HALOT
  rationale: In tabernacle contexts, יְרִיעָה denotes a large fabric hanging or curtain.
    'Curtain' is idiomatic and fits the sanctuary setting better than the more generic
    'sheet' or the more technical 'panel'.
- source_word: בִּקְצֵה
  chosen: on the edge of
  alternatives:
  - at the end of
  - on the extremity of
  lexicon: HALOT
  rationale: קָצֶה commonly means edge/end. Here the loops are attached along the
    border of the curtain for coupling, so 'on the edge of' is the clearest contextual
    rendering.
- source_word: מַחְבֶּרֶת
  chosen: set
  alternatives:
  - joining
  - coupled section
  - connection
  lexicon: HALOT
  rationale: The term denotes the joined unit formed by coupled curtains. Rendering
    it as 'set' communicates the resulting grouped section in clear English. 'Joining'
    is more literal but less natural in this sentence.
- source_word: הַשֵּׁנִית
  chosen: second
  alternatives:
  - other
  lexicon: HALOT
  rationale: The adjective is ordinal, referring to the second joined set corresponding
    to the first. 'Second' preserves the formal sense better than the looser 'other'.
- source_word: מַקְבִּילֹת
  chosen: corresponded
  alternatives:
  - were opposite
  - matched
  - were aligned
  lexicon: HALOT
  rationale: The participle expresses alignment or matching of the loops across from
    each other. 'Corresponded' captures the functional idea that the loops lined up
    for joining, while remaining readable.
- source_word: אַחַת אֶל אֶחָת
  chosen: to one another
  alternatives:
  - one opposite another
  - one to the other
  lexicon: HALOT
  rationale: This idiom indicates reciprocal correspondence. 'To one another' is natural
    English and conveys the mutual alignment intended.
- source_word: עָשָׂה
  chosen: made
  alternatives:
  - fashioned
  lexicon: HALOT
  rationale: The common verb עשה is straightforward here. 'Made' is the plainest equivalent
    and suits the repetitive construction details.
