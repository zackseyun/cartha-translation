id: EXO.36.32
reference: Exodus 36:32
source:
  edition: WLC
  text: וַ/חֲמִשָּׁ֣ה בְרִיחִ֔ם לְ/קַרְשֵׁ֥י צֶֽלַע הַ/מִּשְׁכָּ֖ן הַ/שֵּׁנִ֑ית וַ/חֲמִשָּׁ֤ה
    בְרִיחִם֙ לְ/קַרְשֵׁ֣י הַ/מִּשְׁכָּ֔ן לַ/יַּרְכָתַ֖יִם יָֽמָּ/ה־׃
translation:
  text: and five bars for the boards of the second side of the tabernacle, and five
    bars for the boards of the tabernacle at the far rear on the west.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'crossbars' for 'bars.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for the back part of the tabernacle, westward.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְרִיחִם
  chosen: bars
  alternatives:
  - crossbars
  lexicon: HALOT
  rationale: בְּרִיחַ in tabernacle construction contexts refers to the horizontal
    bars used to hold the frames/boards together. 'Bars' is the most natural concise
    English rendering; 'crossbars' is possible but slightly more interpretive.
- source_word: קַרְשֵׁי
  chosen: boards
  alternatives:
  - frames
  - planks
  lexicon: HALOT
  rationale: קֶרֶשׁ in Exodus tabernacle descriptions denotes the structural wooden
    units. 'Boards' is the traditional and sufficiently accurate rendering in this
    construction context, though 'frames' is argued by some interpreters.
- source_word: צֶלַע
  chosen: side
  alternatives:
  - sidewall
  - flank
  lexicon: HALOT
  rationale: צֶלַע commonly means 'side' or 'side part.' Here it identifies one side
    of the tabernacle structure. 'Side' is straightforward and avoids over-specifying
    architecture.
- source_word: הַשֵּׁנִית
  chosen: the second
  alternatives:
  - the other
  lexicon: HALOT
  rationale: The adjective literally means 'second.' In context it distinguishes this
    side from the first side previously mentioned. 'The second side' preserves the
    formal sequence more closely than the idiomatic 'the other side.'
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling
  - the dwelling place
  lexicon: HALOT
  rationale: מִשְׁכָּן literally relates to dwelling, but in Exodus it is the established
    designation for the sanctuary structure. 'Tabernacle' is the standard contextual
    rendering and best communicates the referent.
- source_word: לַיַּרְכָתַיִם
  chosen: at the far rear
  alternatives:
  - for the back part
  - for the rear section
  - for the western end
  lexicon: HALOT
  rationale: יַרְכָתַיִם refers to the remotest/back parts. In this architectural
    setting it points to the rear of the tabernacle. 'At the far rear' captures both
    spatial remoteness and structural location in readable English.
- source_word: יָמָּה
  chosen: on the west
  alternatives:
  - westward
  - toward the sea
  lexicon: HALOT
  rationale: יָמָּה is the directional adverb/noun 'westward,' derived from 'sea.'
    In tabernacle orientation it denotes the west side. 'On the west' is idiomatic
    in English and fits the architectural description.
- source_word: וַחֲמִשָּׁה ... וַחֲמִשָּׁה
  chosen: and five ... and five
  alternatives:
  - five ... and five
  lexicon: HALOT
  rationale: The repeated waw + numeral is preserved with 'and' to reflect the Hebrew
    coordination and inventory style of the verse.
