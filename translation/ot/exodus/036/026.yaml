id: EXO.36.26
reference: Exodus 36:26
source:
  edition: WLC
  text: וְ/אַרְבָּעִ֥ים אַדְנֵי/הֶ֖ם כָּ֑סֶף שְׁנֵ֣י אֲדָנִ֗ים תַּ֚חַת הַ/קֶּ֣רֶשׁ
    הָ/אֶחָ֔ד וּ/שְׁנֵ֣י אֲדָנִ֔ים תַּ֖חַת הַ/קֶּ֥רֶשׁ הָ/אֶחָֽד׃
translation:
  text: 'and their forty silver bases: two bases under the one frame, and two bases
    under the other frame.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'two bases under the one board, and two bases under the one board.' The
      Hebrew repeats 'the one frame/board' in both clauses; English idiom often renders
      the second as 'the other frame.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַרְבָּעִים
  chosen: and ... forty
  alternatives:
  - with forty
  - namely forty
  lexicon: HALOT
  rationale: The conjunction simply continues the construction list, and the cardinal
    is rendered straightforwardly as 'forty.' English idiom places the conjunction
    before the full phrase.
- source_word: אַדְנֵי/הֶם
  chosen: their bases
  alternatives:
  - their sockets
  - their pedestals
  lexicon: HALOT
  rationale: אֶדֶן/אֲדָנִים in tabernacle construction refers to the supporting base
    or socket for the frames. 'Bases' is clear modern English and fits the architectural
    context.
- source_word: כָּסֶף
  chosen: silver
  alternatives:
  - of silver
  lexicon: HALOT
  rationale: The noun specifies the material of the bases. In English, attributive
    'silver bases' is natural and concise, equivalent to 'bases of silver.'
- source_word: שְׁנֵי אֲדָנִים
  chosen: two bases
  alternatives:
  - two sockets
  lexicon: HALOT
  rationale: The repeated phrase is rendered consistently with the earlier choice
    for אֲדָנִים. Number + noun is translated directly.
- source_word: תַּחַת
  chosen: under
  alternatives:
  - beneath
  lexicon: HALOT
  rationale: The preposition indicates placement beneath each frame. 'Under' is the
    most natural modern equivalent.
- source_word: הַ/קֶּרֶשׁ
  chosen: frame
  alternatives:
  - board
  - plank
  lexicon: HALOT
  rationale: קֶרֶשׁ in the tabernacle context is traditionally rendered 'board,' but
    the object is a structural upright element. 'Frame' better communicates its function
    in contemporary English without over-paraphrasing.
- source_word: הָ/אֶחָד
  chosen: the one
  alternatives:
  - one
  - first
  lexicon: HALOT
  rationale: The Hebrew has the article with 'one,' literally 'the one.' In the first
    occurrence this is preserved as 'the one frame.' In the second occurrence, English
    style prefers 'the other frame' to avoid awkward repetition while still reflecting
    the distributive sense of the Hebrew pair.
