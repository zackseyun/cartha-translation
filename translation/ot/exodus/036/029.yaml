id: EXO.36.29
reference: Exodus 36:29
source:
  edition: WLC
  text: וְ/הָי֣וּ תוֹאֲמִם֮ מִ/לְּ/מַטָּה֒ וְ/יַחְדָּ֗ו יִהְי֤וּ תַמִּים֙ אֶל רֹאשׁ֔/וֹ
    אֶל הַ/טַּבַּ֖עַת הָ/אֶחָ֑ת כֵּ֚ן עָשָׂ֣ה לִ/שְׁנֵי/הֶ֔ם לִ/שְׁנֵ֖י הַ/מִּקְצֹעֹֽת־־׃
translation:
  text: They were paired together at the bottom, and together they were complete up
    to its top, to the one ring. He did this for both of them, for the two corners.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'matched' or 'twinned' at the bottom; the Hebrew emphasizes that the
      two pieces corresponded to each other structurally.
    reason: lexical_alternative
  - marker: b
    text: Or 'whole' up to its top. The sense is that each was fully joined or finished
      from bottom to top.
    reason: lexical_alternative
  - marker: c
    text: Or 'for the two corner pieces.' The Hebrew literally says 'for the two corners,'
      likely referring to the corner frames/boards.
    reason: lexical_alternative
lexical_decisions:
- source_word: תוֹאֲמִם
  chosen: paired together
  alternatives:
  - matched
  - twinned
  lexicon: HALOT
  rationale: The term denotes being matched or corresponding as a pair. 'Paired together'
    communicates the structural sense in context of tabernacle frames/boards without
    sounding overly technical. 'Twinned' is possible but less natural in modern English.
- source_word: מִלְּמַטָּה
  chosen: at the bottom
  alternatives:
  - from below
  - below
  lexicon: HALOT
  rationale: In this construction the phrase describes where the pairing begins or
    is evident. 'At the bottom' is clear modern English and fits the architectural
    description.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - in unison
  - jointly
  lexicon: HALOT
  rationale: A straightforward adverb meaning 'together.' Repeating it reflects the
    Hebrew emphasis.
- source_word: תַמִּים
  chosen: complete
  alternatives:
  - whole
  - matching
  lexicon: HALOT
  rationale: Here the adjective describes the boards as whole/fully joined up to the
    top. 'Complete' best captures the sense of being finished or intact in construction.
    'Matching' would blur the distinction from the earlier תואמים.
- source_word: אֶל רֹאשׁוֹ
  chosen: up to its top
  alternatives:
  - to its top
  - toward its top
  lexicon: HALOT
  rationale: The phrase indicates extent toward the upper end of the board/frame.
    'Up to its top' expresses the architectural progression from bottom to top.
- source_word: הַטַּבַּעַת הָאֶחָת
  chosen: the one ring
  alternatives:
  - one ring
  - the first ring
  lexicon: HALOT
  rationale: Literally 'the one ring.' The definite article plus numeral is best preserved.
    'First ring' would interpret beyond the text.
- source_word: כֵּן עָשָׂה
  chosen: He did this
  alternatives:
  - Thus he made
  - So he made them
  lexicon: HALOT
  rationale: The Hebrew summarizes the manner of construction. 'He did this' is concise
    and natural, with the implied subject being the craftsman(s) represented by the
    singular verb as in Hebrew narrative style.
- source_word: לִשְׁנֵיהֶם
  chosen: for both of them
  alternatives:
  - for the two of them
  - to both
  lexicon: HALOT
  rationale: Refers to the two corresponding structural pieces. 'For both of them'
    is idiomatic and clear.
- source_word: לִשְׁנֵי הַמִּקְצֹעֹת
  chosen: for the two corners
  alternatives:
  - for the two corner pieces
  - at the two corners
  lexicon: HALOT
  rationale: מִקְצֹעֹת refers to corners/corner areas. 'For the two corners' preserves
    the wording while fitting the construction context. 'Corner pieces' is interpretive
    and could be footnoted as a contextual alternative.
