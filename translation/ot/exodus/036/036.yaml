id: EXO.36.36
reference: Exodus 36:36
source:
  edition: WLC
  text: וַ/יַּ֣עַשׂ לָ֗/הּ אַרְבָּעָה֙ עַמּוּדֵ֣י שִׁטִּ֔ים וַ/יְצַפֵּ֣/ם זָהָ֔ב וָוֵי/הֶ֖ם
    זָהָ֑ב וַ/יִּצֹ֣ק לָ/הֶ֔ם אַרְבָּעָ֖ה אַדְנֵי כָֽסֶף־׃
translation:
  text: He made for it four pillars of acacia wood and overlaid them with gold; their
    hooks were of gold; and he cast for them four silver bases.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'four silver sockets.'
    reason: lexical_alternative
  - marker: b
    text: The pronoun 'it' refers to the veil mentioned in the preceding verse.
    reason: cross_reference
lexical_decisions:
- source_word: עַמּוּדֵי
  chosen: pillars
  alternatives:
  - posts
  - columns
  lexicon: HALOT
  rationale: The noun denotes upright structural supports. 'Pillars' is natural English
    in tabernacle-construction contexts and fits the formal setting better than the
    more generic 'posts.'
- source_word: שִׁטִּים
  chosen: acacia wood
  alternatives:
  - acacia
  - shittim wood
  lexicon: HALOT
  rationale: Refers to acacia timber used throughout the tabernacle materials. 'Acacia
    wood' is clear modern English and avoids the opaque transliteration 'shittim.'
- source_word: וַיְצַפֵּם
  chosen: overlaid them
  alternatives:
  - covered them
  - plated them
  lexicon: HALOT
  rationale: The verb in this construction commonly refers to overlaying an object
    with a metal covering. 'Overlaid' is the standard precise rendering for tabernacle
    furnishings.
- source_word: וָוֵיהֶם
  chosen: their hooks
  alternatives:
  - their pegs
  - their capitals
  lexicon: HALOT
  rationale: In tabernacle descriptions this noun most naturally refers to hooks or
    connecting fixtures on the pillars. 'Hooks' is the most established and contextually
    coherent rendering here. 'Capitals' is less likely for this term in this construction.
- source_word: אַדְנֵי
  chosen: bases
  alternatives:
  - sockets
  - pedestals
  lexicon: HALOT
  rationale: The term denotes the metal foundation pieces into which the pillars were
    set. 'Bases' is clear modern English; 'sockets' is also possible and common in
    older translations.
- source_word: כָסֶף
  chosen: silver
  lexicon: HALOT
  rationale: Straightforward material term for the metal used in the bases.
- source_word: לָהּ
  chosen: for it
  alternatives:
  - for it (the veil)
  - for it (the screen)
  lexicon: HALOT
  rationale: The feminine singular pronoun refers back to the immediately preceding
    feminine object in context, namely the veil. English can preserve the pronoun
    without over-specifying in the main text.
- source_word: וַיִּצֹק
  chosen: he cast
  alternatives:
  - he poured
  - he cast in metal
  lexicon: HALOT
  rationale: In context of making metal bases, the verb refers to casting metal objects.
    'He cast' is concise and idiomatic.
