id: EXO.36.11
reference: Exodus 36:11
source:
  edition: WLC
  text: וַ/יַּ֜עַשׂ לֻֽלְאֹ֣ת תְּכֵ֗לֶת עַ֣ל שְׂפַ֤ת הַ/יְרִיעָה֙ הָֽ/אֶחָ֔ת מִ/קָּצָ֖ה
    בַּ/מַּחְבָּ֑רֶת כֵּ֤ן עָשָׂה֙ בִּ/שְׂפַ֣ת הַ/יְרִיעָ֔ה הַ/קִּ֣יצוֹנָ֔ה בַּ/מַּחְבֶּ֖רֶת
    הַ/שֵּׁנִֽית׃
translation:
  text: He made loops of blue yarn on the edge of the first curtain, at the end in
    the first set joined together; likewise he made them on the edge of the outermost
    curtain in the second set joined together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the coupling' / 'at the joining.' The Hebrew term refers to the place
      or arrangement where the curtains were joined together.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֻלְאֹת
  chosen: loops
  alternatives:
  - clasps
  - loops for fastening
  lexicon: HALOT
  rationale: The noun refers to fabric loops used to connect curtains. 'Loops' is
    the most direct and natural rendering in this tabernacle-construction context.
- source_word: תְּכֵלֶת
  chosen: blue yarn
  alternatives:
  - blue
  - blue-purple yarn
  lexicon: HALOT
  rationale: In tabernacle texts תכלת denotes the blue dyed material/thread rather
    than merely an abstract color. 'Blue yarn' makes clear that the loops were made
    of dyed textile material.
- source_word: שְׂפַת
  chosen: edge
  alternatives:
  - lip
  - border
  lexicon: HALOT
  rationale: Here the term denotes the edge or border of a curtain. 'Edge' is idiomatic
    modern English and fits the construction description.
- source_word: הַיְרִיעָה
  chosen: curtain
  alternatives:
  - tabernacle curtain
  - panel
  lexicon: HALOT
  rationale: In the tabernacle context יְרִיעָה refers to one curtain-panel of the
    tabernacle covering. 'Curtain' is the standard clear rendering.
- source_word: הָאֶחָת
  chosen: the first
  alternatives:
  - the one
  lexicon: HALOT
  rationale: Although literally 'the one,' in this paired construction it functions
    ordinally, contrasting with 'the second' later in the verse. 'The first' communicates
    the sense clearly in English.
- source_word: מִקָּצָה
  chosen: at the end
  alternatives:
  - from the end
  - on the end
  lexicon: HALOT
  rationale: The phrase locates the loops at the extremity of the curtain where the
    joining occurs. 'At the end' is natural English for this spatial use.
- source_word: בַּמַּחְבָּרֶת
  chosen: in the first set joined together
  alternatives:
  - in the coupling
  - at the seam
  - in the joining
  lexicon: HALOT
  rationale: מַחְבָּרֶת denotes the place/state of joining the curtain set. Because
    English 'coupling' is less natural here, 'set joined together' conveys the function
    of the connected group of curtains. 'First' is supplied from context by contrast
    with 'the second' later in the verse.
- source_word: כֵּן עָשָׂה
  chosen: likewise he made them
  alternatives:
  - so he made
  - thus he did
  lexicon: HALOT
  rationale: This resumptive phrase indicates corresponding action on the other curtain
    edge. 'Likewise he made them' is clear and avoids awkward repetition while preserving
    the parallelism.
- source_word: הַקִּיצוֹנָה
  chosen: outermost
  alternatives:
  - last
  - end
  lexicon: HALOT
  rationale: The adjective denotes the curtain at the extremity of the set. 'Outermost'
    best captures the spatial sense in modern English.
- source_word: הַשֵּׁנִית
  chosen: the second
  alternatives: []
  lexicon: HALOT
  rationale: This identifies the second joined set of curtains in contrast to the
    first. The ordinal should be rendered explicitly.
