id: EXO.36.35
reference: Exodus 36:35
source:
  edition: WLC
  text: וַ/יַּ֨עַשׂ֙ אֶת הַ/פָּרֹ֔כֶת תְּכֵ֧לֶת וְ/אַרְגָּמָ֛ן וְ/תוֹלַ֥עַת שָׁנִ֖י
    וְ/שֵׁ֣שׁ מָשְׁזָ֑ר מַעֲשֵׂ֥ה חֹשֵׁ֛ב עָשָׂ֥ה אֹתָ֖/הּ כְּרֻבִֽים־׃
translation:
  text: And he made the curtain of blue, purple, and scarlet yarn, and fine twisted
    linen; he made it with cherubim, the work of a skillful designer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the veil.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'scarlet' is literally an expression for scarlet-dyed material/thread;
      'crimson' is a possible alternative.
    reason: lexical_alternative
  - marker: c
    text: Or 'the work of a skillful craftsman' or 'embroidered work.' The Hebrew
      refers to artistic, patterned workmanship.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַפָּרֹכֶת
  chosen: the curtain
  alternatives:
  - the veil
  lexicon: HALOT
  rationale: פָּרֹכֶת refers to the inner tabernacle divider. 'Curtain' is clearer
    in modern English and avoids overly ecclesiastical diction, while still fitting
    the cultic furnishing. 'Veil' is a traditional alternative worth preserving.
- source_word: תְּכֵלֶת
  chosen: blue
  alternatives:
  - blue yarn
  - blue-purple
  lexicon: HALOT
  rationale: The term denotes a blue dyed material/color used in tabernacle textiles.
    'Blue' is the most natural English rendering here; 'yarn' is supplied collectively
    by the series and need not be repeated after each color term.
- source_word: אַרְגָּמָן
  chosen: purple
  alternatives:
  - purple yarn
  lexicon: HALOT
  rationale: Standard rendering for the prestigious purple dyed material. As with
    the other color terms, the material sense is implicit in the textile list.
- source_word: תוֹלַעַת שָׁנִי
  chosen: scarlet yarn
  alternatives:
  - scarlet
  - crimson yarn
  lexicon: HALOT
  rationale: This expression denotes scarlet-dyed material/thread. 'Scarlet yarn'
    makes the textile sense explicit in idiomatic English and matches the tabernacle-fabric
    context.
- source_word: שֵׁשׁ מָשְׁזָר
  chosen: fine twisted linen
  alternatives:
  - finely twisted linen
  - fine linen, twisted
  lexicon: HALOT
  rationale: שֵׁשׁ is fine linen and מָשְׁזָר indicates twisted/spun quality. 'Fine
    twisted linen' is concise, natural, and preserves both material and workmanship.
- source_word: מַעֲשֵׂה חֹשֵׁב
  chosen: the work of a skillful designer
  alternatives:
  - the work of a skillful craftsman
  - embroidered work
  - the work of a weaver of designs
  lexicon: HALOT
  rationale: The phrase indicates artistic, thoughtfully designed workmanship rather
    than mere manual labor. 'Skillful designer' captures the intentional patterned
    artistry in accessible English. Because English style prefers not to front this
    phrase awkwardly, it is rendered appositionally at the end.
- source_word: כְּרֻבִים
  chosen: cherubim
  alternatives:
  - cherubs
  lexicon: HALOT
  rationale: '''Cherubim'' is the established English plural for the heavenly beings
    depicted on the curtain and preserves the biblical register better than ''cherubs''
    in this sacred-art context.'
- source_word: עָשָׂה אֹתָהּ כְּרֻבִים
  chosen: he made it with cherubim
  alternatives:
  - he made cherubim on it
  - he made it, with cherubim worked into it
  lexicon: HALOT
  rationale: The syntax indicates that cherubim were incorporated into the curtain's
    design. 'He made it with cherubim' is concise and faithful, while the following
    apposition clarifies the artistic workmanship.
