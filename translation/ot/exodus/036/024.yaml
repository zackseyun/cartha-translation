id: EXO.36.24
reference: Exodus 36:24
source:
  edition: WLC
  text: וְ/אַרְבָּעִים֙ אַדְנֵי כֶ֔סֶף עָשָׂ֕ה תַּ֖חַת עֶשְׂרִ֣ים הַ/קְּרָשִׁ֑ים שְׁנֵ֨י
    אֲדָנִ֜ים תַּֽחַת הַ/קֶּ֤רֶשׁ הָ/אֶחָד֙ לִ/שְׁתֵּ֣י יְדֹתָ֔י/ו וּ/שְׁנֵ֧י אֲדָנִ֛ים
    תַּֽחַת הַ/קֶּ֥רֶשׁ הָ/אֶחָ֖ד לִ/שְׁתֵּ֥י יְדֹתָֽי/ו־־־׃
translation:
  text: And he made forty silver bases under the twenty frames, two bases under the
    one frame for its two tenons, and two bases under the other frame for its two
    tenons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sockets' instead of 'bases' for the silver supports under the frames.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַדְנֵי / אֲדָנִים
  chosen: bases
  alternatives:
  - sockets
  - pedestals
  lexicon: HALOT
  rationale: In tabernacle construction contexts, אֶדֶן refers to the supporting base/socket
    for a frame. 'Bases' is clear modern English and fits the architectural function
    without unnecessary jargon. 'Sockets' is a traditional alternative worth preserving
    conceptually but not necessary in the main text.
- source_word: כֶסֶף
  chosen: silver
  lexicon: HALOT
  rationale: The material of the bases is straightforwardly 'silver.'
- source_word: עָשָׂה
  chosen: made
  alternatives:
  - fashioned
  lexicon: HALOT
  rationale: The common verb 'made' is the plain sense and suits the construction
    narrative.
- source_word: תַּחַת
  chosen: under
  alternatives:
  - beneath
  - for
  lexicon: HALOT
  rationale: The repeated preposition indicates placement beneath the frames. 'Under'
    is the most direct rendering in English.
- source_word: הַקְּרָשִׁים / הַקֶּרֶשׁ
  chosen: frames / frame
  alternatives:
  - boards
  - planks
  lexicon: HALOT
  rationale: קֶרֶשׁ in the tabernacle context denotes the upright structural members.
    'Frames' better conveys their architectural role than the more traditional but
    potentially misleading 'boards.' Singular/plural are preserved in context.
- source_word: שְׁנֵי
  chosen: two
  lexicon: HALOT
  rationale: Cardinal number, rendered directly.
- source_word: הָאֶחָד
  chosen: the one
  alternatives:
  - one
  - each
  lexicon: HALOT
  rationale: The Hebrew is literally 'the one.' In English, the first occurrence is
    rendered 'the one frame' to stay close to the source; the second is rendered idiomatically
    as 'the other frame' to avoid awkward repetition while still reflecting the distributive
    sense across the twenty frames.
- source_word: לִשְׁתֵּי יְדֹתָיו
  chosen: for its two tenons
  alternatives:
  - for its two projections
  - for its two pegs
  - for its two hands
  lexicon: HALOT
  rationale: Literally 'for its two hands,' but in this construction context the term
    refers to the projecting joining pieces on each frame. 'Tenons' is the best architectural
    equivalent in English and matches the function described.
- source_word: וּ
  chosen: and
  lexicon: HALOT
  rationale: Simple conjunction linking the repeated clause.
