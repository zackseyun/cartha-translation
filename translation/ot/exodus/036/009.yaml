id: EXO.36.9
reference: Exodus 36:9
source:
  edition: WLC
  text: אֹ֜רֶךְ הַ/יְרִיעָ֣ה הָֽ/אַחַ֗ת שְׁמֹנֶ֤ה וְ/עֶשְׂרִים֙ בָּֽ/אַמָּ֔ה וְ/רֹ֨חַב֙
    אַרְבַּ֣ע בָּֽ/אַמָּ֔ה הַ/יְרִיעָ֖ה הָ/אֶחָ֑ת מִדָּ֥ה אַחַ֖ת לְ/כָל הַ/יְרִיעֹֽת־׃
translation:
  text: The length of each curtain was twenty-eight cubits, and the width of each
    curtain was four cubits; all the curtains had one measurement.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''one measure for all the curtains.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'and the width of each curtain was four cubits'.
    reason: previous_rendering
lexical_decisions:
- source_word: אֹרֶךְ
  chosen: length
  alternatives:
  - long
  lexicon: HALOT
  rationale: Standard nominal sense for physical dimension; 'length' is the natural
    English equivalent in measurement contexts.
- source_word: יְרִיעָה
  chosen: curtain
  alternatives:
  - sheet
  - panel
  lexicon: HALOT
  rationale: In tabernacle contexts, יְרִיעָה refers to a fabric hanging or panel.
    'Curtain' is the established and contextually clear rendering in English.
- source_word: הָאַחַת / הָאֶחָת
  chosen: each
  alternatives:
  - the one
  - one
  lexicon: HALOT
  rationale: Literally 'the one,' but in distributive measurement style English idiom
    is best conveyed by 'each curtain,' preserving the sense that the dimensions apply
    individually to every curtain.
- source_word: שְׁמֹנֶה וְעֶשְׂרִים
  chosen: twenty-eight
  alternatives:
  - eight and twenty
  lexicon: HALOT
  rationale: Modern English expresses the numeral as 'twenty-eight'; 'eight and twenty'
    would be overly formal/archaic.
- source_word: אַמָּה
  chosen: cubits
  alternatives:
  - cubits long
  lexicon: HALOT
  rationale: The Hebrew unit of measure is best preserved as 'cubit(s)' rather than
    converted into modern units, maintaining transparency to the source text.
- source_word: רֹחַב
  chosen: width
  alternatives:
  - breadth
  lexicon: HALOT
  rationale: Standard dimensional counterpart to 'length'; 'breadth' is possible but
    less natural in contemporary English.
- source_word: אַרְבַּע
  chosen: four
  lexicon: HALOT
  rationale: Direct numeral rendering.
- source_word: מִדָּה אַחַת
  chosen: the same measurement
  alternatives:
  - one measure
  - one size
  lexicon: HALOT
  rationale: Literally 'one measure.' In idiomatic English, 'the same measurement'
    clearly conveys uniform dimensions across all curtains without sounding wooden.
- source_word: לְכָל הַיְרִיעֹת
  chosen: all the curtains
  alternatives:
  - for all the curtains
  - for every curtain
  lexicon: HALOT
  rationale: The phrase marks the scope of the uniform measurement. 'All the curtains'
    is idiomatic and accurately reflects the collective sense.
