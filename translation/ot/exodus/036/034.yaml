id: EXO.36.34
reference: Exodus 36:34
source:
  edition: WLC
  text: וְֽ/אֶת הַ/קְּרָשִׁ֞ים צִפָּ֣ה זָהָ֗ב וְ/אֶת טַבְּעֹתָ/ם֙ עָשָׂ֣ה זָהָ֔ב בָּתִּ֖ים
    לַ/בְּרִיחִ֑ם וַ/יְצַ֥ף אֶת הַ/בְּרִיחִ֖ם זָהָֽב־־־׃
translation:
  text: He overlaid the frames with gold, and made their rings of gold as holders
    for the bars, and overlaid the bars with gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'boards' instead of 'frames.' The Hebrew term refers to the tabernacle's
      structural wooden members.
    reason: lexical_alternative
  - marker: b
    text: Literally 'houses for the bars,' an idiom for holders or receptacles for
      the bars.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקְּרָשִׁים
  chosen: the frames
  alternatives:
  - the boards
  - the planks
  lexicon: HALOT
  rationale: קְרָשִׁים in tabernacle contexts refers to the upright structural members.
    'Frames' communicates their architectural function in modern English better than
    the more traditional 'boards,' while remaining concrete and not overly interpretive.
- source_word: צִפָּה / וַיְצַף
  chosen: overlaid
  alternatives:
  - covered
  - plated
  lexicon: HALOT
  rationale: The verb צפה in this construction denotes overlaying an object with a
    material layer. 'Overlaid' is the standard precise English equivalent in sanctuary-construction
    contexts and fits both occurrences.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Straightforward material term; repeated three times in Hebrew and retained
    each time in English for fidelity to the source's emphasis.
- source_word: טַבְּעֹתָם
  chosen: their rings
  lexicon: HALOT
  rationale: טַבַּעַת commonly means 'ring,' here the metal rings attached to the
    frames. The plural with 3mp suffix is naturally rendered 'their rings.'
- source_word: עָשָׂה
  chosen: made
  alternatives:
  - fashioned
  lexicon: HALOT
  rationale: A common verb meaning 'make/do.' 'Made' is the most natural and sufficiently
    precise rendering here.
- source_word: בָּתִּים
  chosen: holders
  alternatives:
  - houses
  - sockets
  - receptacles
  lexicon: HALOT
  rationale: Literally 'houses,' but in this construction it refers functionally to
    receiving places for the bars, likely ring-settings or holders. 'Holders' conveys
    the idiomatic sense in clear modern English without the misleading literalism
    of 'houses.'
- source_word: לַבְּרִיחִם
  chosen: for the bars
  lexicon: HALOT
  rationale: בְּרִיחִים are the crossbars used to hold the frames together. 'Bars'
    is the standard concise rendering.
