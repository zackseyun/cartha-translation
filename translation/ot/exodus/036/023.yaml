id: EXO.36.23
reference: Exodus 36:23
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ אֶת הַ/קְּרָשִׁ֖ים לַ/מִּשְׁכָּ֑ן עֶשְׂרִ֣ים קְרָשִׁ֔ים לִ/פְאַ֖ת
    נֶ֥גֶב תֵּימָֽנָ/ה־׃
translation:
  text: 'He made the frames for the tabernacle: twenty frames for the south side,
    southward.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'twenty boards for the south side.' The Hebrew uses a doubled southern
      expression ('south, southward') for emphasis or specification.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He made
  alternatives:
  - And he made
  - Then he made
  lexicon: HALOT
  rationale: Qal wayyiqtol of עשה, narrating a past action. English simple past fits
    the narrative sequence. The subject remains singular from context.
- source_word: הַקְּרָשִׁים
  chosen: the frames
  alternatives:
  - the boards
  - the planks
  lexicon: HALOT
  rationale: קֶרֶשׁ in tabernacle construction refers to the upright structural members.
    'Frames' communicates their architectural function in modern English better than
    the traditional 'boards,' while remaining concrete and not overly interpretive.
- source_word: לַמִּשְׁכָּן
  chosen: for the tabernacle
  alternatives:
  - for the dwelling
  - for the tent dwelling
  lexicon: HALOT
  rationale: מִשְׁכָּן is the standard term for the sanctuary structure in Exodus.
    'Tabernacle' is the established and accurate English rendering in this cultic
    context.
- source_word: עֶשְׂרִים קְרָשִׁים
  chosen: twenty frames
  alternatives:
  - twenty boards
  lexicon: HALOT
  rationale: The numeral plus repeated noun is rendered straightforwardly. Repeating
    'frames' preserves the Hebrew repetition and keeps the inventory style of the
    passage.
- source_word: לִפְאַת
  chosen: for the side
  alternatives:
  - for the edge
  - for the corner/quarter
  lexicon: HALOT
  rationale: פֵּאָה here denotes a side or extremity of the structure. In this construction,
    'side' best fits the architectural description.
- source_word: נֶגֶב
  chosen: south
  alternatives:
  - Negeb
  - southern region
  lexicon: HALOT
  rationale: Here נֶגֶב functions directionally/geographically as 'south,' not as
    the proper regional name Negeb.
- source_word: תֵּימָנָה
  chosen: southward
  alternatives:
  - to the south
  - on the south
  lexicon: HALOT
  rationale: תֵּימָנָה adds directional emphasis to נֶגֶב. Rendering it as 'southward'
    preserves the Hebrew's doubled southern designation rather than collapsing it
    entirely.
