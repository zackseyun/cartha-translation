id: EXO.36.37
reference: Exodus 36:37
source:
  edition: WLC
  text: וַ/יַּ֤עַשׂ מָסָךְ֙ לְ/פֶ֣תַח הָ/אֹ֔הֶל תְּכֵ֧לֶת וְ/אַרְגָּמָ֛ן וְ/תוֹלַ֥עַת
    שָׁנִ֖י וְ/שֵׁ֣שׁ מָשְׁזָ֑ר מַעֲשֵׂ֖ה רֹקֵֽם׃
translation:
  text: And he made a screen for the entrance of the tent, of blue and purple and
    scarlet yarn, and fine twisted linen, the work of an embroiderer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'curtain.' The Hebrew term denotes a hanging or screen at an entrance,
      distinct from the inner 'veil' (פָּרֹכֶת).
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: And he made
  alternatives:
  - Then he made
  - And he fashioned
  lexicon: HALOT
  rationale: The waw-consecutive with עשה advances the narrative. 'And he made' is
    a clear, natural rendering that preserves the sequential force without over-stylizing.
- source_word: מָסָךְ
  chosen: screen
  alternatives:
  - curtain
  - veil
  lexicon: HALOT
  rationale: מָסָךְ refers to a hanging/screen at an entrance, distinct from פָּרֹכֶת
    ('veil') used for the inner divider. 'Screen' best preserves that distinction
    in tabernacle contexts.
- source_word: לְפֶתַח הָאֹהֶל
  chosen: for the entrance of the tent
  alternatives:
  - for the doorway of the tent
  - for the entrance to the tent
  lexicon: HALOT
  rationale: פֶּתַח denotes an opening/entrance. 'Entrance of the tent' is idiomatic
    and sufficiently formal. 'Tent' is retained for אֹהֶל rather than expanding to
    'tabernacle,' since the Hebrew term here is the common noun.
- source_word: תְּכֵלֶת
  chosen: blue
  alternatives:
  - blue yarn
  - blue-purple
  lexicon: HALOT
  rationale: The term denotes a blue dyed material/thread used in tabernacle textiles.
    'Blue' is the standard concise rendering; the material sense is supplied by the
    construction in English.
- source_word: וְאַרְגָּמָן
  chosen: purple
  alternatives:
  - purple yarn
  lexicon: HALOT
  rationale: אַרְגָּמָן denotes purple dyed material. 'Purple' is the conventional
    and accurate rendering in this textile list.
- source_word: וְתוֹלַעַת שָׁנִי
  chosen: scarlet yarn
  alternatives:
  - scarlet
  - crimson yarn
  lexicon: HALOT
  rationale: The expression refers to scarlet-colored material/thread, historically
    associated with crimson dye. 'Scarlet yarn' makes explicit the textile sense in
    context and matches the series of materials.
- source_word: וְשֵׁשׁ מָשְׁזָר
  chosen: fine twisted linen
  alternatives:
  - finely twisted linen
  - fine linen, twisted
  lexicon: HALOT
  rationale: שֵׁשׁ is fine linen, and מָשְׁזָר indicates twisted/spun material. 'Fine
    twisted linen' is natural English and preserves both quality and manufacture.
- source_word: מַעֲשֵׂה רֹקֵם
  chosen: the work of an embroiderer
  alternatives:
  - embroidered work
  - the work of a weaver of colors
  lexicon: HALOT
  rationale: The phrase denotes skilled embroidered craftsmanship. 'The work of an
    embroiderer' closely reflects the construct phrase and distinguishes it from other
    technical textile expressions.
