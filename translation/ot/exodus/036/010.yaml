id: EXO.36.10
reference: Exodus 36:10
source:
  edition: WLC
  text: וַ/יְחַבֵּר֙ אֶת חֲמֵ֣שׁ הַ/יְרִיעֹ֔ת אַחַ֖ת אֶל אֶחָ֑ת וְ/חָמֵ֤שׁ יְרִיעֹת֙
    חִבַּ֔ר אַחַ֖ת אֶל אֶחָֽת־־־׃
translation:
  text: He joined five of the curtains to one another, and the other five curtains
    he joined to one another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''and five curtains'' in the second clause; ''the other'' is supplied
      in English to clarify that a second group of five is meant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחַבֵּר / חִבַּר
  chosen: joined
  alternatives:
  - coupled
  - connected
  - fastened together
  lexicon: HALOT
  rationale: The verb חבר means to join or connect. 'Joined' is natural modern English
    and fits the tabernacle-construction context without over-specifying the method
    of attachment.
- source_word: יְרִיעֹת
  chosen: curtains
  alternatives:
  - cloths
  - panels
  lexicon: HALOT
  rationale: In the tabernacle context, יְרִיעוֹת refers to large fabric hangings.
    'Curtains' is the established and contextually accurate rendering in accessible
    English.
- source_word: חֲמֵשׁ
  chosen: five
  rationale: Straightforward cardinal number.
- source_word: אַחַת אֶל אֶחָת
  chosen: to one another
  alternatives:
  - one to another
  - each to the other
  lexicon: HALOT
  rationale: The idiom expresses reciprocal joining within each set. 'To one another'
    is idiomatic modern English and preserves the sense of mutual connection.
- source_word: וְחָמֵשׁ יְרִיעֹת
  chosen: the other five curtains
  alternatives:
  - and five curtains
  - and another five curtains
  lexicon: HALOT
  rationale: The Hebrew repeats 'and five curtains' without an explicit word for 'other,'
    but English style benefits from making clear that this is the second set of five
    corresponding to the first. 'Other' is implied by the parallel structure rather
    than added as new content.
