id: EXO.36.38
reference: Exodus 36:38
source:
  edition: WLC
  text: וְ/אֶת עַמּוּדָ֤י/ו חֲמִשָּׁה֙ וְ/אֶת וָ֣וֵי/הֶ֔ם וְ/צִפָּ֧ה רָאשֵׁי/הֶ֛ם
    וַ/חֲשֻׁקֵי/הֶ֖ם זָהָ֑ב וְ/אַדְנֵי/הֶ֥ם חֲמִשָּׁ֖ה נְחֹֽשֶׁת־־׃פ
translation:
  text: and its five pillars with their hooks; and he overlaid their tops and their
    bands with gold, and their five bases were bronze.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their five sockets were bronze.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term rendered 'bands' is traditionally translated 'fillets';
      it likely refers to decorative or connecting elements on the pillars.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמּוּדָיו
  chosen: its five pillars
  alternatives:
  - its five posts
  lexicon: HALOT
  rationale: עַמּוּד commonly denotes a pillar or column. 'Pillars' fits tabernacle
    construction language in English better than 'posts,' while still referring to
    upright supports. The suffix is singular ('its'), referring back to the screen/entrance
    structure described in context.
- source_word: וָוֵיהֶם
  chosen: their hooks
  alternatives:
  - their pegs
  lexicon: HALOT
  rationale: וָו in tabernacle contexts refers to hooks or pegs attached to pillars
    for hanging fabric. 'Hooks' is the standard and clearest rendering here, especially
    with the associated pillars.
- source_word: וְצִפָּה
  chosen: he overlaid
  alternatives:
  - he plated
  - he covered
  lexicon: HALOT
  rationale: The verb צפה in the piel/passive-related construction here refers to
    overlaying with a metal covering. 'Overlaid' is idiomatic in English for sanctuary
    furnishings and preserves the craftsmanship sense.
- source_word: רָאשֵׁיהֶם
  chosen: their tops
  alternatives:
  - their capitals
  - their heads
  lexicon: HALOT
  rationale: Literally 'their heads.' In architectural context this refers to the
    upper part of the pillars. 'Tops' is clear modern English. 'Capitals' is possible
    but may imply a more specific architectural feature than the Hebrew requires.
- source_word: חֲשֻׁקֵיהֶם
  chosen: their bands
  alternatives:
  - their fillets
  - their connecting rods
  lexicon: HALOT
  rationale: This term in tabernacle descriptions is traditionally rendered 'fillets,'
    but that is archaic and unclear. It likely refers to bands/connecting elements
    associated with the pillars. 'Bands' gives readable modern English without over-specifying
    the exact form.
- source_word: זָהָב
  chosen: with gold
  alternatives:
  - gold
  lexicon: HALOT
  rationale: The noun functions as the material with which the tops and bands were
    overlaid. English idiom naturally supplies 'with' after 'overlaid'.
- source_word: אַדְנֵיהֶם
  chosen: their five bases
  alternatives:
  - their five sockets
  lexicon: HALOT
  rationale: אֶדֶן in tabernacle construction denotes a base or socket for a pillar/board.
    'Bases' is more accessible modern English; 'sockets' remains a viable alternative
    and is preserved because it is common in formal translations.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: In tabernacle metallurgy, נְחֹשֶׁת is conventionally rendered 'bronze,'
    though the exact ancient alloy can be debated. 'Bronze' is the standard contextual
    rendering in English Bible translation.
