id: EXO.36.2
reference: Exodus 36:2
source:
  edition: WLC
  text: וַ/יִּקְרָ֣א מֹשֶׁ֗ה אֶל בְּצַלְאֵ֘ל וְ/אֶל אָֽהֳלִיאָב֒ וְ/אֶל֙ כָּל אִ֣ישׁ חֲכַם לֵ֔ב אֲשֶׁ֨ר נָתַ֧ן יְהוָ֛ה חָכְמָ֖ה בְּ/לִבּ֑/וֹ כֹּ֚ל אֲשֶׁ֣ר נְשָׂא֣/וֹ לִבּ֔/וֹ לְ/קָרְבָ֥ה אֶל הַ/מְּלָאכָ֖ה לַ/עֲשֹׂ֥ת אֹתָֽ/הּ־־־־־׃
translation:
  text: Then Moses called Bezalel and Oholiab and every wise-hearted man in whose heart Yahweh had put wisdom, everyone whose heart stirred him to come to the work to do it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everyone whose heart moved him' or 'lifted him.' The Hebrew idiom speaks of inward willingness or prompting.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'wise-hearted,' an idiom for one endowed with wisdom or skill.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - summoned
  lexicon: HALOT
  rationale: The verb קרא with אֶל here denotes summoning or calling persons to a task. 'Called' is natural modern English and sufficiently formal.
- source_word: אֶל
  chosen: and
  alternatives:
  - to
  lexicon: HALOT
  rationale: Although אֶל literally means 'to,' in English after 'called' the direct objects are better rendered without repeated 'to.' The sense is preserved in idiomatic English.
- source_word: בְּצַלְאֵל
  chosen: Bezalel
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: אָהֳלִיאָב
  chosen: Oholiab
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: כָּל אִישׁ חֲכַם לֵב
  chosen: every wise-hearted man
  alternatives:
  - every skilled man
  - every wise man
  - every man wise of heart
  lexicon: HALOT
  rationale: The Hebrew idiom 'wise of heart' refers to skill and wisdom, especially artisan skill in this context. 'Wise-hearted' preserves the Hebrew imagery better than flattening it to merely 'skilled,' while 'man' reflects the singular masculine אִישׁ in a representative sense.
- source_word: אֲשֶׁר נָתַן יְהוָה חָכְמָה בְּלִבּוֹ
  chosen: in whose heart the LORD had put wisdom
  alternatives:
  - to whom the LORD had given wisdom in his heart
  lexicon: HALOT
  rationale: This clause attributes the wisdom to divine gifting. 'Put wisdom in his heart' is a natural rendering that preserves the Hebrew heart-language and the causative sense of נתן.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כֹּל אֲשֶׁר נְשָׂאוֹ לִבּוֹ
  chosen: everyone whose heart stirred him
  alternatives:
  - everyone whose heart lifted him
  - everyone whose heart moved him
  lexicon: HALOT
  rationale: The idiom with נשׂא + לב expresses inward prompting or motivation. 'Stirred him' communicates the volitional impulse clearly in English while retaining the heart as the seat of motivation.
- source_word: לְקָרְבָה
  chosen: to come near
  alternatives:
  - to approach
  - to join
  lexicon: HALOT
  rationale: From קרב, the infinitive means approaching or coming near. 'Come near' preserves the verbal imagery and avoids over-interpreting it as merely 'join' or 'begin.'
- source_word: הַמְּלָאכָה
  chosen: the work
  alternatives:
  - the task
  - the craftsmanship
  lexicon: HALOT
  rationale: מלאכה here refers to the tabernacle construction work. 'Work' is broad enough to cover the whole project and fits the immediate context.
- source_word: לַעֲשֹׂת אֹתָהּ
  chosen: to do it
  alternatives:
  - to perform it
  - to make it
  lexicon: HALOT
  rationale: עשה with מלאכה is commonly rendered 'do' or 'perform.' 'To do it' is simple, direct, and idiomatic in modern English.
