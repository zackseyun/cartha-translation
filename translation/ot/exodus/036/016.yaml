id: EXO.36.16
reference: Exodus 36:16
source:
  edition: WLC
  text: וַ/יְחַבֵּ֛ר אֶת חֲמֵ֥שׁ הַ/יְרִיעֹ֖ת לְ/בָ֑ד וְ/אֶת שֵׁ֥שׁ הַ/יְרִיעֹ֖ת לְ/בָֽד־־׃
translation:
  text: And he joined five of the curtains by themselves, and six of the curtains
    by themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'separately' or 'apart'; the sense is that the five curtains were joined
      as one set and the six curtains as another set.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחַבֵּר
  chosen: joined
  alternatives:
  - coupled
  - connected
  - fastened together
  lexicon: HALOT
  rationale: The verb חָבַר means to join or connect. 'Joined' is natural modern English
    and fits the tabernacle-construction context without over-specifying the method.
- source_word: הַיְרִיעֹת
  chosen: the curtains
  alternatives:
  - the panels
  - the tent cloths
  lexicon: HALOT
  rationale: יְרִיעָה in tabernacle contexts refers to the large fabric pieces/curtains.
    'Curtains' is the established and contextually accurate rendering, though 'panels'
    is possible.
- source_word: לְבָד
  chosen: by themselves
  alternatives:
  - separately
  - apart
  lexicon: HALOT
  rationale: לְבָד indicates separation or distinct grouping. 'By themselves' clearly
    conveys that the five formed one group and the six another, matching the construction
    sequence.
- source_word: חֲמֵשׁ
  chosen: five
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: שֵׁשׁ
  chosen: six
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: אֶת ... וְאֶת
  chosen: marked direct objects in coordination
  rationale: 'The repeated object marker structures the verse as two coordinated direct
    objects: five curtains as one grouping, and six curtains as another. English expresses
    this by repeating ''of the curtains'' rather than translating the particle itself.'
