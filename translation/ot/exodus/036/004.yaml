id: EXO.36.4
reference: Exodus 36:4
source:
  edition: WLC
  text: וַ/יָּבֹ֨אוּ֙ כָּל הַ֣/חֲכָמִ֔ים הָ/עֹשִׂ֕ים אֵ֖ת כָּל מְלֶ֣אכֶת הַ/קֹּ֑דֶשׁ
    אִֽישׁ אִ֥ישׁ מִ/מְּלַאכְתּ֖/וֹ אֲשֶׁר הֵ֥מָּה עֹשִֽׂים־־־־׃
translation:
  text: Then all the skilled men who were doing all the work of the sanctuary came,
    each from the work that he was doing,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'man, man from his work which they were doing,' a distributive
      expression meaning 'each man from the work he was doing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: came
  alternatives:
  - came in
  - approached
  lexicon: HALOT
  rationale: Wayyiqtol of בוא narrates the next event in sequence; simple past 'came'
    is the most natural English narrative rendering.
- source_word: כָּל הַחֲכָמִים
  chosen: all the skilled men
  alternatives:
  - all the wise men
  - all the craftsmen
  lexicon: HALOT
  rationale: חכמים here refers not primarily to intellectual wisdom but to those endowed
    with skill for tabernacle construction. 'Skilled men' preserves the masculine
    form and the vocational sense better than the overly abstract 'wise men.'
- source_word: הָעֹשִׂים
  chosen: who were doing
  alternatives:
  - who were making
  - who were working on
  lexicon: HALOT
  rationale: The participle marks ongoing activity. 'Who were doing' keeps close to
    עשה while fitting the English clause.
- source_word: אֵת כָּל מְלֶאכֶת הַקֹּדֶשׁ
  chosen: all the work of the sanctuary
  alternatives:
  - all the work of the holy place
  - all the holy work
  lexicon: HALOT
  rationale: מלאכת denotes occupational/workmanship labor, and הקֹדשׁ in this tabernacle
    context refers to the sanctuary/holy precinct rather than abstract holiness. 'Work
    of the sanctuary' is idiomatic and contextually precise.
- source_word: אִישׁ אִישׁ
  chosen: each
  alternatives:
  - man by man
  - each man
  lexicon: HALOT
  rationale: The distributive repetition means 'each one' or 'each man.' 'Each' conveys
    the distributive force smoothly in English; the masculine sense is still reflected
    earlier in 'men.'
- source_word: מִמְּלַאכְתּוֹ
  chosen: from the work
  alternatives:
  - from his work
  - away from his task
  lexicon: HALOT
  rationale: The preposition מן indicates movement away from the task each was engaged
    in. English can omit the possessive here because the following clause clarifies
    individual reference, though the sense remains personal.
- source_word: אֲשֶׁר הֵמָּה עֹשִׂים
  chosen: that he was doing
  alternatives:
  - which they were doing
  - that they were doing
  lexicon: HALOT
  rationale: 'Although הֵמָּה is plural, the preceding distributive אִישׁ אִישׁ makes
    the sense individual: each one from the work he was doing. Singular English best
    reflects the distributive construction.'
