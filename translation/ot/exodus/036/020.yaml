id: EXO.36.20
reference: Exodus 36:20
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ אֶת הַ/קְּרָשִׁ֖ים לַ/מִּשְׁכָּ֑ן עֲצֵ֥י שִׁטִּ֖ים עֹמְדִֽים־׃
translation:
  text: And he made the boards for the tabernacle of acacia wood, standing upright.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the boards for the tabernacle, of acacia wood, standing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: And he made
  alternatives:
  - Then he made
  - And he fashioned
  lexicon: HALOT
  rationale: Wayyiqtol of עשה advances the narrative with a simple past. 'And he made'
    preserves the sequential force without overinterpreting the manner of construction.
- source_word: הַקְּרָשִׁים
  chosen: the boards
  alternatives:
  - the frames
  - the planks
  lexicon: HALOT
  rationale: קֶרֶשׁ in tabernacle contexts refers to the structural boards/panels.
    'Boards' is the most straightforward and traditional architectural term in English
    here.
- source_word: לַמִּשְׁכָּן
  chosen: for the tabernacle
  alternatives:
  - for the dwelling
  - for the tent dwelling
  lexicon: HALOT
  rationale: מִשְׁכָּן is the established term for the sacred dwelling structure in
    Exodus. 'Tabernacle' is clear, conventional, and contextually precise.
- source_word: עֲצֵי שִׁטִּים
  chosen: of acacia wood
  alternatives:
  - of acacia
  - of shittim wood
  lexicon: HALOT
  rationale: The construct phrase literally means 'woods of acacia.' Idiomatic English
    is 'acacia wood.' 'Shittim wood' is a transliterated traditional form but is less
    accessible and less transparent to modern readers.
- source_word: עֹמְדִים
  chosen: standing upright
  alternatives:
  - standing
  - upright
  lexicon: HALOT
  rationale: The participle describes the orientation of the boards, not merely their
    existence. 'Standing upright' makes explicit the likely architectural sense in
    natural English.
