id: EXO.36.15
reference: Exodus 36:15
source:
  edition: WLC
  text: אֹ֜רֶךְ הַ/יְרִיעָ֣ה הָ/אַחַ֗ת שְׁלֹשִׁים֙ בָּֽ/אַמָּ֔ה וְ/אַרְבַּ֣ע אַמּ֔וֹת
    רֹ֖חַב הַ/יְרִיעָ֣ה הָ/אֶחָ֑ת מִדָּ֣ה אַחַ֔ת לְ/עַשְׁתֵּ֥י עֶשְׂרֵ֖ה יְרִיעֹֽת׃
translation:
  text: The length of each curtain was thirty cubits, and four cubits was the width
    of each curtain; the eleven curtains had one measure.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אֹרֶךְ
  chosen: length
  alternatives:
  - long side
  - measurement in length
  lexicon: HALOT
  rationale: Standard architectural/material term meaning the extent in length. 'Length'
    is the natural English equivalent in tabernacle-construction context.
- source_word: הַיְרִיעָה
  chosen: curtain
  alternatives:
  - panel
  - sheet
  lexicon: HALOT
  rationale: In tabernacle texts, יְרִיעָה refers to a fabric hanging or covering
    piece. 'Curtain' is the established and contextually accurate rendering, more
    natural than 'sheet' and more specific than 'panel.'
- source_word: הָאַחַת / הָאֶחָת
  chosen: each
  alternatives:
  - the one
  - one
  lexicon: HALOT
  rationale: 'Though literally ''the one,'' in distributive measurement statements
    English idiom is best expressed by ''each'': ''the length of each curtain ...
    the width of each curtain.'' This preserves the sense without wooden phrasing.'
- source_word: שְׁלֹשִׁים בָּאַמָּה
  chosen: thirty cubits
  alternatives:
  - thirty in cubit
  - thirty cubits long
  lexicon: HALOT
  rationale: The phrase gives the numerical length measurement. 'Thirty cubits' is
    the standard concise rendering; the predication of length is already supplied
    by the clause.
- source_word: וְאַרְבַּע אַמּוֹת
  chosen: and four cubits
  alternatives:
  - with four cubits
  - four cubits
  lexicon: HALOT
  rationale: Simple coordinate measurement phrase for width. Retaining 'and' mirrors
    the Hebrew coordination between length and width statements.
- source_word: רֹחַב
  chosen: width
  alternatives:
  - breadth
  lexicon: HALOT
  rationale: Standard dimensional opposite of length. 'Width' is more natural in modern
    English than 'breadth' while preserving the sense.
- source_word: מִדָּה אַחַת
  chosen: had one measure
  alternatives:
  - were of one measure
  - had the same measurements
  - one size
  lexicon: HALOT
  rationale: The Hebrew idiom states uniformity among the curtains. 'Had one measure'
    is close to the source while remaining readable. 'One size' is too colloquial;
    'same measurements' is slightly more interpretive.
- source_word: לְעַשְׁתֵּי עֶשְׂרֵה יְרִיעֹת
  chosen: the eleven curtains
  alternatives:
  - for the eleven curtains
  - of the eleven curtains
  lexicon: HALOT
  rationale: 'The phrase identifies the group to which the uniform measurement applies.
    English expresses this most naturally as the subject of the final clause: ''the
    eleven curtains had one measure.'''
