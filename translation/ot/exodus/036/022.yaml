id: EXO.36.22
reference: Exodus 36:22
source:
  edition: WLC
  text: שְׁתֵּ֣י יָדֹ֗ת לַ/קֶּ֨רֶשׁ֙ הָֽ/אֶחָ֔ד מְשֻׁלָּבֹ֔ת אַחַ֖ת אֶל אֶחָ֑ת כֵּ֣ן
    עָשָׂ֔ה לְ/כֹ֖ל קַרְשֵׁ֥י הַ/מִּשְׁכָּֽן־׃
translation:
  text: There were two tenons for each board, joined one to another; thus he made
    all the boards of the tabernacle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hands' for 'tenons'; the Hebrew uses the ordinary word for 'hands' metaphorically
      for the projecting joints of each board.
    reason: lexical_alternative
  - marker: b
    text: Or 'joined one opposite another,' emphasizing the matching alignment of
      the two tenons.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁתֵּי
  chosen: two
  lexicon: HALOT
  rationale: Cardinal number introducing the count of the board's projections.
- source_word: יָדֹת
  chosen: tenons
  alternatives:
  - hands
  - pegs
  lexicon: HALOT
  rationale: Literally 'hands,' but in tabernacle construction context this refers
    to the projecting joining pieces on each board. 'Tenons' is the standard and most
    precise architectural equivalent in English.
- source_word: קֶּרֶשׁ
  chosen: board
  alternatives:
  - frame
  - plank
  lexicon: HALOT
  rationale: Refers to the structural wooden unit of the tabernacle. 'Board' is clear
    modern English and fits the construction context.
- source_word: מְשֻׁלָּבֹת
  chosen: joined
  alternatives:
  - coupled
  - interlocked
  lexicon: HALOT
  rationale: Passive participle describing the two tenons as fitted together in corresponding
    arrangement. 'Joined' is natural English while preserving the construction sense.
- source_word: אַחַת אֶל אֶחָת
  chosen: one to another
  alternatives:
  - one opposite another
  - one with another
  lexicon: HALOT
  rationale: Idiomatic expression describing the relation of the two tenons. 'One
    to another' preserves the reciprocal correspondence without over-specifying geometry.
- source_word: כֵּן
  chosen: thus
  alternatives:
  - so
  - in this way
  lexicon: HALOT
  rationale: Marks the manner in which the work was done for all the boards.
- source_word: עָשָׂה
  chosen: he made
  alternatives:
  - he did
  - he fashioned
  lexicon: HALOT
  rationale: Simple verb of making/doing; 'he made' is the most straightforward rendering
    in this construction account.
- source_word: מִּשְׁכָּן
  chosen: tabernacle
  alternatives:
  - dwelling place
  - dwelling
  lexicon: HALOT
  rationale: Established English rendering for the sanctuary structure in Exodus;
    contextually specific and readily understood.
