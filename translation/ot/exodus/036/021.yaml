id: EXO.36.21
reference: Exodus 36:21
source:
  edition: WLC
  text: עֶ֥שֶׂר אַמֹּ֖ת אֹ֣רֶךְ הַ/קָּ֑רֶשׁ וְ/אַמָּה֙ וַ/חֲצִ֣י הָֽ/אַמָּ֔ה רֹ֖חַב
    הַ/קֶּ֥רֶשׁ הָ/אֶחָֽד׃
translation:
  text: The length of each frame was ten cubits, and the width of each frame was a
    cubit and a half.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'board' or 'plank' for 'frame' (Hebrew קֶרֶשׁ); the term refers to the
      tabernacle's structural pieces.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶשֶׂר אַמֹּת
  chosen: ten cubits
  alternatives:
  - ten cubits long
  lexicon: HALOT
  rationale: The numeral plus plural of אַמָּה gives the measurement directly. 'Cubits'
    preserves the ancient unit rather than converting it, which is more transparent
    and formally faithful.
- source_word: אֹרֶךְ
  chosen: length
  alternatives:
  - long
  lexicon: HALOT
  rationale: The noun denotes dimension/length. Rendering it as the noun 'length'
    fits the Hebrew construct phrase 'length of the frame' and yields natural English.
- source_word: הַקָּרֶשׁ
  chosen: frame
  alternatives:
  - board
  - plank
  lexicon: HALOT
  rationale: קֶרֶשׁ in tabernacle contexts refers to the structural upright pieces.
    'Frame' is a common contextual rendering that avoids implying a simple flat board
    if the construction was more complex; 'board' remains a viable alternative.
- source_word: וְאַמָּה וַחֲצִי הָאַמָּה
  chosen: a cubit and a half
  alternatives:
  - one and a half cubits
  lexicon: HALOT
  rationale: This idiom literally reads 'and a cubit and half the cubit.' 'A cubit
    and a half' is idiomatic English and closely reflects the Hebrew expression.
- source_word: רֹחַב
  chosen: width
  alternatives:
  - breadth
  lexicon: HALOT
  rationale: The noun denotes width/breadth. 'Width' is the clearest modern English
    equivalent.
- source_word: הַקֶּרֶשׁ הָאֶחָד
  chosen: each frame
  alternatives:
  - the one frame
  - the first frame
  lexicon: HALOT
  rationale: 'Literally ''the one frame,'' but in this measurement context the sense
    is distributive: the dimensions of any single frame. ''Each frame'' communicates
    that idiom naturally in English without suggesting sequence (''first frame'').'
