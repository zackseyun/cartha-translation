id: EXO.36.27
reference: Exodus 36:27
source:
  edition: WLC
  text: וּֽ/לְ/יַרְכְּתֵ֥י הַ/מִּשְׁכָּ֖ן יָ֑מָּ/ה עָשָׂ֖ה שִׁשָּׁ֥ה קְרָשִֽׁים׃
translation:
  text: And for the rear sides of the tabernacle, westward, he made six frames.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'boards.' The Hebrew term can refer to structural boards or frames; 'frames'
      is chosen here because it may better fit the tabernacle's construction.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְיַרְכְּתֵי
  chosen: and for the rear sides of
  alternatives:
  - and for the far end of
  - and for the back parts of
  - and for the rear of
  lexicon: HALOT
  rationale: 'The conjunction and preposition together introduce a new construction
    detail: ''and for.'' יַרְכְּתֵי is the plural construct of a noun meaning the
    remote parts, hindmost parts, or recesses. In tabernacle-context English, ''rear
    sides of'' captures the architectural sense without becoming overly wooden. The
    plural is preserved with ''sides'' rather than flattened to singular ''back.'''
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  lexicon: HALOT
  rationale: מִשְׁכָּן is the standard term for the sanctuary structure in Exodus.
    'Tabernacle' is the established and accurate English rendering in this cultic
    context.
- source_word: יָמָּה
  chosen: westward
  alternatives:
  - on the west side
  - toward the sea
  lexicon: HALOT
  rationale: יָמָּה literally relates to 'sea-ward,' functioning idiomatically as
    'westward' in biblical Hebrew orientation. 'Westward' is concise and natural here,
    while preserving the directional force.
- source_word: עָשָׂה
  chosen: he made
  alternatives:
  - he constructed
  - he fashioned
  lexicon: HALOT
  rationale: The verb is the common עשה, 'to make/do.' 'He made' is the most direct
    rendering and fits the repetitive construction account style.
- source_word: שִׁשָּׁה
  chosen: six
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: קְרָשִׁים
  chosen: frames
  alternatives:
  - boards
  - planks
  lexicon: HALOT
  rationale: קְרָשִׁים in the tabernacle descriptions refers to the upright structural
    elements. 'Frames' better reflects the likely construction than the traditional
    'boards,' which can suggest flat planks rather than fitted structural supports.
    This follows original-language primacy over translation tradition.
