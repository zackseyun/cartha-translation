id: EXO.36.25
reference: Exodus 36:25
source:
  edition: WLC
  text: וּ/לְ/צֶ֧לַע הַ/מִּשְׁכָּ֛ן הַ/שֵּׁנִ֖ית לִ/פְאַ֣ת צָפ֑וֹן עָשָׂ֖ה עֶשְׂרִ֥ים
    קְרָשִֽׁים׃
translation:
  text: For the second side of the tabernacle, on the north side, he made twenty boards.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'twenty frames.' The Hebrew term can denote structural panels or frames,
      and the exact form of the tabernacle pieces is debated.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְצֶלַע
  chosen: For the ... side
  alternatives:
  - And for the ... side
  - for the flank/side
  lexicon: HALOT
  rationale: צֶלַע commonly means 'side' in tabernacle construction contexts rather
    than a literal anatomical 'rib.' The prefixed conjunction and preposition are
    naturally rendered together as 'For the ... side' in English narrative instructions.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  lexicon: HALOT
  rationale: מִשְׁכָּן is the standard term for the wilderness sanctuary; 'tabernacle'
    is the established and accurate English rendering in this cultic context.
- source_word: הַשֵּׁנִית
  chosen: second
  alternatives:
  - other
  lexicon: HALOT
  rationale: The adjective marks the corresponding second side in the sequence of
    tabernacle sides. 'Second' is more precise than the looser 'other.'
- source_word: לִפְאַת צָפוֹן
  chosen: on the north side
  alternatives:
  - toward the north side
  - at the northern edge
  lexicon: HALOT
  rationale: פֵאָה denotes side, edge, or region; with צָפוֹן it specifies orientation.
    'On the north side' is natural English and preserves the directional sense.
- source_word: עָשָׂה
  chosen: he made
  alternatives:
  - he constructed
  - he fashioned
  lexicon: HALOT
  rationale: The verb עשה is broad ('do/make'). Here 'made' is sufficiently literal
    and idiomatic for the construction report.
- source_word: עֶשְׂרִים
  chosen: twenty
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: קְרָשִׁים
  chosen: boards
  alternatives:
  - frames
  - planks
  lexicon: HALOT
  rationale: In tabernacle descriptions, קְרָשִׁים refers to the structural wooden
    elements. 'Boards' is the most conventional and understandable rendering, though
    'frames' is argued by some interpreters; that alternative is worth preserving
    in a footnote because it affects how the structure is visualized.
