id: EXO.36.5
reference: Exodus 36:5
source:
  edition: WLC
  text: וַ/יֹּאמְרוּ֙ אֶל מֹשֶׁ֣ה לֵּ/אמֹ֔ר מַרְבִּ֥ים הָ/עָ֖ם לְ/הָבִ֑יא מִ/דֵּ֤י
    הָֽ/עֲבֹדָה֙ לַ/מְּלָאכָ֔ה אֲשֶׁר צִוָּ֥ה יְהוָ֖ה לַ/עֲשֹׂ֥ת אֹתָֽ/הּ־־׃
translation:
  text: And they said to Moses, “The people are bringing much more than enough for
    the work of the task that the LORD commanded to be done.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “The people are bringing too much for the work.” The Hebrew expression
      emphasizes that the contributions exceed what is needed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ אֶל־מֹשֶׁה לֵּאמֹר
  chosen: And they said to Moses
  alternatives:
  - And they told Moses, saying
  - And they said to Moses, saying
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing direct speech. English normally
    omits the redundant 'saying' for natural style while preserving the speech introduction.
- source_word: מַרְבִּים
  chosen: are bringing much more than enough
  alternatives:
  - are bringing too much
  - are increasing in bringing
  lexicon: HALOT
  rationale: The Hifil participle of רבה here conveys excess in the people's ongoing
    bringing. 'Much more than enough' captures the comparative/excessive sense better
    than the flatter 'too much,' while remaining idiomatic.
- source_word: הָעָם
  chosen: the people
  lexicon: HALOT
  rationale: Straightforward collective reference to Israel.
- source_word: לְהָבִיא
  chosen: are bringing
  alternatives:
  - to bring
  lexicon: HALOT
  rationale: 'Though formally an infinitive, in English it is best absorbed into the
    participial construction with מַרְבִּים to express ongoing action: ''are bringing
    much more than enough.'''
- source_word: מִדֵּי
  chosen: much more than enough
  alternatives:
  - more than enough
  - beyond what is needed
  lexicon: HALOT
  rationale: This term marks sufficiency/excess ('enough, sufficiency'). Combined
    with מַרְבִּים it yields the sense of exceeding what is needed.
- source_word: הָעֲבֹדָה
  chosen: the work
  alternatives:
  - the service
  - the labor
  lexicon: HALOT
  rationale: In tabernacle contexts עֲבֹדָה can mean service or work. Here, paired
    with מְלָאכָה and focused on material production, 'work' best fits the immediate
    sense.
- source_word: לַמְּלָאכָה
  chosen: of the task
  alternatives:
  - for the construction
  - for the workmanship
  - for the project
  lexicon: HALOT
  rationale: מְלָאכָה often denotes the concrete task or craftsmanship to be accomplished.
    Rendering עֲבֹדָה ... לַמְּלָאכָה as 'the work of the task' preserves the paired
    Hebrew terms without collapsing them entirely.
- source_word: אֲשֶׁר צִוָּה יְהוָה
  chosen: that the LORD commanded
  alternatives:
  - which the LORD commanded
  lexicon: HALOT
  rationale: Relative clause identifying the divinely mandated task. YHWH is rendered
    'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Required by the project's contested-terms policy for the divine name.
- source_word: לַעֲשֹׂת אֹתָהּ
  chosen: to be done
  alternatives:
  - to do it
  - to make it
  lexicon: HALOT
  rationale: English passive is the most natural rendering of the Hebrew infinitive
    plus object in this context, where the focus is on the commanded work being carried
    out rather than on a specified subject.
