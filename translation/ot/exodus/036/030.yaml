id: EXO.36.30
reference: Exodus 36:30
source:
  edition: WLC
  text: וְ/הָיוּ֙ שְׁמֹנָ֣ה קְרָשִׁ֔ים וְ/אַדְנֵי/הֶ֣ם כֶּ֔סֶף שִׁשָּׁ֥ה עָשָׂ֖ר אֲדָנִ֑ים
    שְׁנֵ֤י אֲדָנִים֙ שְׁנֵ֣י אֲדָנִ֔ים תַּ֖חַת הַ/קֶּ֥רֶשׁ הָ/אֶחָֽד׃
translation:
  text: 'There were eight frames, and their silver bases were sixteen bases: two bases
    under one frame, and two bases under the next frame.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'boards' for 'frames'; the Hebrew term refers to the tabernacle's upright
      structural pieces.
    reason: lexical_alternative
  - marker: b
    text: Or 'sockets' for 'bases.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיוּ
  chosen: There were
  alternatives:
  - and there were
  - and they were
  lexicon: HALOT
  rationale: Uses idiomatic English existential wording for היה in a descriptive inventory
    context. The prefixed conjunction is absorbed into normal English style rather
    than mechanically repeated.
- source_word: קְרָשִׁים
  chosen: frames
  alternatives:
  - boards
  - planks
  lexicon: HALOT
  rationale: In tabernacle contexts, קֶרֶשׁ refers to the upright structural members.
    'Frames' communicates function better in modern English than 'boards,' while remaining
    concrete and not overly interpretive.
- source_word: אַדְנֵיהֶם / אֲדָנִים
  chosen: bases
  alternatives:
  - sockets
  - pedestals
  lexicon: HALOT
  rationale: אֶדֶן in tabernacle construction denotes the supporting metal base/socket
    for each frame. 'Bases' is clear modern English and fits the construction context;
    'sockets' is possible but slightly more technical.
- source_word: כֶּסֶף
  chosen: silver
  lexicon: HALOT
  rationale: Straightforward material designation modifying the bases.
- source_word: שִׁשָּׁה עָשָׂר
  chosen: sixteen
  lexicon: HALOT
  rationale: Standard cardinal number rendering.
- source_word: שְׁנֵי אֲדָנִים שְׁנֵי אֲדָנִים
  chosen: two bases under one frame, and two bases under the next frame
  alternatives:
  - two bases under one frame, two bases under one frame
  - two bases under each frame
  lexicon: HALOT
  rationale: The Hebrew repeats 'two bases, two bases under the one frame.' In context
    this distributive repetition means each of the eight frames had two bases. English
    smooths the repetition for readability while preserving the sense. 'Under the
    next frame' makes explicit the distributive force without collapsing the wording
    into a summary like 'under each frame.'
- source_word: תַּחַת
  chosen: under
  alternatives:
  - beneath
  lexicon: HALOT
  rationale: Standard spatial preposition in construction description.
- source_word: הַקֶּרֶשׁ הָאֶחָד
  chosen: one frame
  alternatives:
  - the one frame
  - each frame
  lexicon: HALOT
  rationale: The singular with article and numeral functions distributively in context.
    'One frame' preserves the singular expression more naturally than 'the one frame'
    in English.
