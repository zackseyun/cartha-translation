theological_decisions:
- issue: Gender rendering of חֲכַם לֵב in a generic artisan context
  chosen_reading: skillful man
  alternative_readings:
  - skillful person
  - skilled worker
  rationale: Following the project's gender-accurate principle, the grammatically
    masculine singular/generic form is preserved with 'man' rather than neutralized.
    The context is representative rather than individually male-specific, but the
    source form should still be reflected.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Retention of singular verb at verse end
  chosen_reading: he made them
  alternative_readings:
  - they made them
  rationale: The Hebrew text ends with a singular verb after an initial plural subject.
    Rather than smoothing the syntax for English, the translation preserves the textual
    form to maintain auditability and avoid importing an interpretive harmonization.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
