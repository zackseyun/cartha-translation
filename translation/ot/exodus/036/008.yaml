id: EXO.36.8
reference: Exodus 36:8
source:
  edition: WLC
  text: וַ/יַּעֲשׂ֨וּ כָל חֲכַם לֵ֜ב בְּ/עֹשֵׂ֧י הַ/מְּלָאכָ֛ה אֶת הַ/מִּשְׁכָּ֖ן
    עֶ֣שֶׂר יְרִיעֹ֑ת שֵׁ֣שׁ מָשְׁזָ֗ר וּ/תְכֵ֤לֶת וְ/אַרְגָּמָן֙ וְ/תוֹלַ֣עַת שָׁנִ֔י
    כְּרֻבִ֛ים מַעֲשֵׂ֥ה חֹשֵׁ֖ב עָשָׂ֥ה אֹתָֽ/ם־־־׃
translation:
  text: And every skillful man among those doing the work made the tabernacle with
    ten curtains of finely twisted linen, and blue, and purple, and scarlet yarn;
    he made them with cherubim, the work of a skillful designer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'wise of heart,' an idiom for a skilled artisan.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew ends with a singular verb, 'he made them,' though the verse began
      with a plural subject; some translations smooth this to 'they made them.'
    reason: alternative_reading
lexical_decisions:
- source_word: חֲכַם לֵב
  chosen: skillful man
  alternatives:
  - wise-hearted man
  - skilled person
  lexicon: HALOT
  rationale: Literally 'wise of heart,' an idiom for craftsmanship skill. 'Skillful
    man' preserves the masculine singular/generic force and communicates the vocational
    sense in natural English. 'Skilled person' would flatten the gendered form; 'wise-hearted'
    is too opaque in modern English.
- source_word: בְּעֹשֵׂי הַמְּלָאכָה
  chosen: among those doing the work
  alternatives:
  - of the workers
  - engaged in the work
  lexicon: HALOT
  rationale: The preposition plus participle indicates membership within the group
    occupied with the work. 'Among those doing the work' preserves that nuance more
    clearly than the compressed 'of the workers.'
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  lexicon: HALOT
  rationale: Established and accurate rendering for the sanctuary structure in Exodus.
    'Dwelling place' is etymologically related but too generic for this cultic referent.
- source_word: יְרִיעֹת
  chosen: curtains
  alternatives:
  - panels
  - cloths
  lexicon: HALOT
  rationale: In tabernacle construction contexts, the term refers to large fabric
    hangings. 'Curtains' is the most natural and conventional English equivalent.
- source_word: שֵׁשׁ מָשְׁזָר
  chosen: finely twisted linen
  alternatives:
  - fine twisted linen
  - twined fine linen
  lexicon: HALOT
  rationale: This phrase denotes high-quality linen thread that has been twisted/spun.
    'Finely twisted linen' is idiomatic modern English while retaining the textile
    detail.
- source_word: תְכֵלֶת
  chosen: blue
  alternatives:
  - blue yarn
  - blue-purple
  lexicon: HALOT
  rationale: The term denotes a prestigious blue dyed material/thread. Since 'yarn'
    is supplied explicitly only with the final color in English for smoothness, 'blue'
    here is sufficient and natural.
- source_word: אַרְגָּמָן
  chosen: purple
  alternatives:
  - purple yarn
  lexicon: HALOT
  rationale: Standard rendering for the dyed material/color in tabernacle descriptions.
- source_word: תוֹלַעַת שָׁנִי
  chosen: scarlet yarn
  alternatives:
  - scarlet
  - crimson yarn
  lexicon: HALOT
  rationale: The phrase refers to scarlet-dyed material, likely thread/yarn. 'Scarlet
    yarn' makes explicit in English the textile sense shared by the color terms in
    this construction.
- source_word: כְּרֻבִים
  chosen: cherubim
  alternatives:
  - cherubs
  lexicon: HALOT
  rationale: '''Cherubim'' is the standard English biblical form and preserves the
    formal, cultic register better than ''cherubs.'''
- source_word: מַעֲשֵׂה חֹשֵׁב
  chosen: the work of a skillful designer
  alternatives:
  - the work of a cunning workman
  - embroidered work
  - the work of a skilled craftsman
  lexicon: HALOT
  rationale: The phrase denotes expertly designed/artfully woven workmanship. 'Skillful
    designer' captures the intentional artistic planning implied by חֹשֵׁב without
    archaic wording like 'cunning workman.'
- source_word: עָשָׂה אֹתָם
  chosen: he made them
  alternatives:
  - they made them
  lexicon: HALOT
  rationale: Though the verse begins with a plural verb, the final verb is singular
    in the Hebrew text. The singular is retained in translation rather than harmonized
    away, likely reflecting a collective or distributive singular focused on the workmanship.
