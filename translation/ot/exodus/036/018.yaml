id: EXO.36.18
reference: Exodus 36:18
source:
  edition: WLC
  text: וַ/יַּ֛עַשׂ קַרְסֵ֥י נְחֹ֖שֶׁת חֲמִשִּׁ֑ים לְ/חַבֵּ֥ר אֶת הָ/אֹ֖הֶל לִֽ/הְיֹ֥ת
    אֶחָֽד־׃
translation:
  text: He made fifty bronze clasps to join the tent so that it would be one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the tabernacle,' since 'tent' here refers to the tabernacle structure.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He made
  alternatives:
  - and he made
  - then he made
  lexicon: HALOT
  rationale: Wayyiqtol of עשה normally advances the narrative with a simple past.
    English can omit the conjunction while preserving narrative flow.
- source_word: קַרְסֵי
  chosen: clasps
  alternatives:
  - hooks
  - fasteners
  - taches
  lexicon: HALOT
  rationale: The noun refers to connecting pieces used to join the curtains/sections
    of the tabernacle structure. 'Clasps' is clear modern English and fits the construction
    context better than archaic 'taches' or overly generic 'hooks'.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: In tabernacle-material contexts, נְחֹשֶׁת conventionally denotes bronze
    as the likely worked metal in view. 'Bronze' is standard English Bible usage here.
- source_word: חֲמִשִּׁים
  chosen: fifty
  lexicon: HALOT
  rationale: Straightforward cardinal number modifying 'clasps'.
- source_word: לְחַבֵּר
  chosen: to join
  alternatives:
  - to couple
  - to connect
  lexicon: HALOT
  rationale: 'The infinitive expresses purpose: the clasps were made for joining the
    tent sections together. ''Join'' is natural modern English and sufficiently concrete.'
- source_word: אֶת הָאֹהֶל
  chosen: the tent
  alternatives:
  - the tabernacle
  lexicon: HALOT
  rationale: אֹהֶל literally means 'tent.' Although it refers to the tabernacle structure
    in context, the Hebrew term here is not the more interpretive English 'tabernacle.'
    'Tent' preserves the source wording while remaining understandable.
- source_word: לִהְיוֹת אֶחָד
  chosen: so that it would be one
  alternatives:
  - that it might be one
  - to become one whole
  lexicon: HALOT
  rationale: 'The infinitive of היה plus אֶחָד expresses result/purpose: the joined
    structure would form a single unit. ''So that it would be one'' is idiomatic and
    preserves the structural sense of unity.'
