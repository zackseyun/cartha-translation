id: EXO.36.14
reference: Exodus 36:14
source:
  edition: WLC
  text: וַ/יַּ֨עַשׂ֙ יְרִיעֹ֣ת עִזִּ֔ים לְ/אֹ֖הֶל עַל הַ/מִּשְׁכָּ֑ן עַשְׁתֵּֽי עֶשְׂרֵ֥ה
    יְרִיעֹ֖ת עָשָׂ֥ה אֹתָֽ/ם־־׃
translation:
  text: He made curtains of goats’ hair for a tent over the tabernacle; he made eleven
    curtains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'curtains of goats' if the material is left implicit; the context
      of tabernacle textiles favors 'goats’ hair.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ / עָשָׂה
  chosen: he made
  alternatives:
  - he fashioned
  - he constructed
  lexicon: HALOT
  rationale: The verb עשה is the standard verb 'make/do.' 'He made' is the most direct
    and natural rendering in this construction and matches the repeated Hebrew verb
    for emphasis.
- source_word: יְרִיעֹת
  chosen: curtains
  alternatives:
  - cloths
  - panels
  lexicon: HALOT
  rationale: יְרִיעָה in tabernacle contexts refers to large fabric hangings or curtain-panels.
    'Curtains' is established and clear modern English, fitting the sanctuary construction
    context better than the vaguer 'cloths.'
- source_word: עִזִּים
  chosen: of goats’ hair
  alternatives:
  - of goats
  - goatskin
  lexicon: HALOT
  rationale: In the tabernacle construction context, the phrase denotes material derived
    from goats, traditionally understood as woven goat hair rather than whole goats
    or leather. 'Of goats’ hair' best conveys the likely fabric material used for
    these curtains.
- source_word: לְאֹהֶל
  chosen: for a tent
  alternatives:
  - for the tent
  - as a tent
  lexicon: HALOT
  rationale: 'The prefixed ל marks purpose/result: the curtains were made ''for a
    tent'' or ''as a tent-covering.'' The anarthrous noun is well represented by ''for
    a tent,'' indicating function rather than introducing a distinct named structure.'
- source_word: עַל
  chosen: over
  alternatives:
  - above
  - upon
  lexicon: HALOT
  rationale: עַל here indicates placement over the tabernacle structure. 'Over' is
    the most natural English preposition for a covering layer.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling
  - the dwelling place
  lexicon: HALOT
  rationale: מִשְׁכָּן is the technical term for the sanctuary structure in Exodus.
    'Tabernacle' is the conventional and contextually precise rendering, despite its
    traditional character, because it clearly distinguishes this structure from the
    outer tent covering.
- source_word: עַשְׁתֵּי עֶשְׂרֵה
  chosen: eleven
  alternatives:
  - eleven in number
  lexicon: HALOT
  rationale: The compound numeral straightforwardly means 'eleven.' Simple cardinal
    English is best.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: The object suffix refers back to the curtains. English style does not
    require repeating 'them' after 'he made eleven curtains,' so the sense is incorporated
    idiomatically in the clause rather than represented by a separate English word.
