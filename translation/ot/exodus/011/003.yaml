id: EXO.11.3
reference: Exodus 11:3
source:
  edition: WLC
  text: וַ/יִּתֵּ֧ן יְהוָ֛ה אֶת חֵ֥ן הָ/עָ֖ם בְּ/עֵינֵ֣י מִצְרָ֑יִם גַּ֣ם הָ/אִ֣ישׁ מֹשֶׁ֗ה גָּד֤וֹל מְאֹד֙ בְּ/אֶ֣רֶץ מִצְרַ֔יִם בְּ/עֵינֵ֥י עַבְדֵֽי פַרְעֹ֖ה וּ/בְ/עֵינֵ֥י הָ/עָֽם־׀־׃ס
translation:
  text: And Yahweh gave the people favor in the sight of the Egyptians. Moreover, the man Moses was very great in the land of Egypt, in the sight of Pharaoh’s servants and in the sight of the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the eyes of the Egyptians.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the man, Moses,' preserving the Hebrew emphasis.
    reason: lexical_alternative
  - marker: c
    text: Or 'Pharaoh’s officials'; the Hebrew is literally 'Pharaoh’s servants.'
    reason: lexical_alternative
  - marker: d
    text: The final 'the people' likely refers to the broader populace in Egypt, in contrast to Pharaoh’s servants.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיִּתֵּן
  chosen: gave
  alternatives:
  - had given
  - granted
  lexicon: HALOT
  rationale: 'The waw-consecutive with נתן is naturally rendered as a simple past narrative verb here: ''gave.'' ''Granted'' is possible idiomatically with favor, but ''gave'' preserves the Hebrew verbal choice while remaining natural in English.'
- source_word: חֵן
  chosen: favor
  alternatives:
  - grace
  - acceptance
  lexicon: HALOT
  rationale: In the expression 'gave ... favor in the sight of,' חֵן refers to favorable regard or goodwill from others. 'Favor' is the most idiomatic and contextually precise English rendering here; 'grace' would sound overly theological in this social setting.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the Israelites
  lexicon: HALOT
  rationale: The Hebrew says simply 'the people.' In context this refers to Israel, but the text does not explicitly restate 'Israelites,' so 'the people' preserves the source wording.
- source_word: בְּעֵינֵי מִצְרַיִם
  chosen: in the sight of the Egyptians
  alternatives:
  - in the eyes of the Egyptians
  - in the estimation of the Egyptians
  lexicon: HALOT
  rationale: The idiom בְּעֵינֵי literally means 'in the eyes of,' but 'in the sight of' is a clear and established English equivalent that preserves the relational perspective without sounding awkward.
- source_word: גַּם
  chosen: Moreover
  alternatives:
  - also
  - indeed
  lexicon: HALOT
  rationale: Here גַּם introduces an additional statement about Moses' stature. 'Moreover' captures the additive and slightly emphatic discourse function more smoothly than a bare 'also' at the start of a new sentence.
- source_word: הָאִישׁ מֹשֶׁה
  chosen: the man Moses
  alternatives:
  - Moses himself
  - the man, Moses
  lexicon: HALOT
  rationale: The Hebrew explicitly includes הָאִישׁ before the proper name. Rendering it as 'the man Moses' preserves the marked phrasing and the dignity/emphasis of the expression without paraphrase.
- source_word: גָּדוֹל מְאֹד
  chosen: very great
  alternatives:
  - very important
  - highly esteemed
  lexicon: HALOT
  rationale: גדול מאוד denotes exceptional greatness or prominence. 'Very great' preserves the lexical force and leaves the nature of that greatness broad, as in the Hebrew. More interpretive options like 'important' or 'esteemed' narrow the sense too much.
- source_word: בְּאֶרֶץ מִצְרַיִם
  chosen: in the land of Egypt
  alternatives:
  - throughout Egypt
  - in Egypt
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'in the land of Egypt.' This fuller phrase is retained rather than shortened to 'in Egypt' in order to preserve the source wording.
- source_word: בְּעֵינֵי עַבְדֵי פַרְעֹה
  chosen: in the sight of Pharaoh’s servants
  alternatives:
  - in the eyes of Pharaoh’s officials
  - in the estimation of Pharaoh’s servants
  lexicon: HALOT
  rationale: עבדי פרעה literally means 'servants of Pharaoh.' In royal context these are court servants/officials, but 'servants' is the direct lexical rendering and is sufficiently clear here.
- source_word: וּבְעֵינֵי הָעָם
  chosen: and in the sight of the people
  alternatives:
  - and in the sight of the Egyptians
  - and in the sight of the common people
  lexicon: HALOT
  rationale: The phrase repeats the idiom and uses הָעָם, 'the people.' Given the preceding mention of Pharaoh's servants, this likely contrasts the broader populace, but the Hebrew does not specify 'Egyptians' or 'common people,' so the more literal 'the people' is retained.
