id: EXO.11.7
reference: Exodus 11:7
source:
  edition: WLC
  text: וּ/לְ/כֹ֣ל בְּנֵ֣י יִשְׂרָאֵ֗ל לֹ֤א יֶֽחֱרַץ כֶּ֨לֶב֙ לְשֹׁנ֔/וֹ לְ/מֵ/אִ֖ישׁ וְ/עַד בְּהֵמָ֑ה לְמַ֨עַן֙ תֵּֽדְע֔וּ/ן אֲשֶׁר֙ יַפְלֶ֣ה יְהוָ֔ה בֵּ֥ין מִצְרַ֖יִם וּ/בֵ֥ין יִשְׂרָאֵֽל׀־־׃
translation:
  text: But against any of the sons of Israel, not a dog will sharpen its tongue, from man to beast, so that you may know that Yahweh makes a distinction between Egypt and Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'not a dog will bark against them,' an idiom expressing complete peace and safety for Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְכֹל
  chosen: But against any of
  alternatives:
  - And against all of
  - But for all of
  lexicon: HALOT
  rationale: 'The prefixed conjunction plus preposition introduces a contrast with the fate of Egypt in the prior verse. ''Against any of'' captures the idiomatic sense in context: no hostile action will be directed toward any Israelite.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Rendered formally as 'the sons of Israel' to preserve the Hebrew expression. 'Israelites' is possible, but the more literal phrase remains natural enough in English and reflects the source wording.
- source_word: יֶחֱרַץ כֶּלֶב לְשֹׁנוֹ
  chosen: not a dog will sharpen its tongue
  alternatives:
  - not a dog will bark
  - not a dog will growl
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of a dog 'sharpening' its tongue. I preserved the vivid image in the main text rather than flattening it to 'bark,' while recognizing that barking/growling is the idiomatic sense. Because the literal image may be opaque to some readers, the idiomatic alternative is preserved in a footnote.
- source_word: לְמֵאִישׁ וְעַד בְּהֵמָה
  chosen: from man to beast
  alternatives:
  - against man or beast
  - from human to animal
  lexicon: HALOT
  rationale: This phrase marks total scope, covering both humans and animals. 'From man to beast' is concise, idiomatic, and preserves the merism. 'Man' is retained as gender-accurate and representative, in line with the translation philosophy.
- source_word: לְמַעַן תֵּדְעוּן
  chosen: so that you may know
  alternatives:
  - in order that you may know
  - so that you will know
  lexicon: HALOT
  rationale: Standard purposive rendering. 'May know' best reflects the Hebrew imperfect in a purpose clause without overcommitting to either simple future or modal nuance.
- source_word: יַפְלֶה
  chosen: makes a distinction
  alternatives:
  - distinguishes
  - deals wondrously
  lexicon: HALOT
  rationale: In this context the Hiphil of פלא refers to setting apart or distinguishing between groups, not primarily to performing wonders. 'Makes a distinction' expresses the relational contrast clearly and naturally.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בֵּין מִצְרַיִם וּבֵין יִשְׂרָאֵל
  chosen: between Egypt and Israel
  alternatives:
  - between the Egyptians and Israel
  - between Egypt and the sons of Israel
  lexicon: HALOT
  rationale: The national names are retained as in Hebrew. 'Egypt and Israel' is concise and preserves the covenant-historical contrast.
