theological_decisions:
- issue: Rendering of the divine purpose in Pharaoh's refusal
  chosen_reading: God states Pharaoh's refusal serves the purpose that God's wonders may be multiplied in Egypt.
  alternative_readings:
  - 'A weaker consequential sense: Pharaoh will not listen, with the result that God''s wonders will be multiplied.'
  rationale: לְמַעַן most naturally expresses purpose here. The translation preserves the text's theological tension—Pharaoh's refusal and God's purpose are both present—without importing a fuller doctrinal explanation of hardening beyond what this verse states.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
