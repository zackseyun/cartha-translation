id: EXO.11.9
reference: Exodus 11:9
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל מֹשֶׁ֔ה לֹא יִשְׁמַ֥ע אֲלֵי/כֶ֖ם פַּרְעֹ֑ה לְמַ֛עַן רְב֥וֹת מוֹפְתַ֖/י בְּ/אֶ֥רֶץ מִצְרָֽיִם־־׃
translation:
  text: And Yahweh said to Moses, “Pharaoh will not listen to you, so that my wonders may be multiplied in the land of Egypt.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will not hear you' or 'will not heed you.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my signs.' The Hebrew term can denote wonders, signs, or portents.
    reason: lexical_alternative
  - marker: c
    text: Some translations render 'And the LORD had said to Moses' to relate this statement to the preceding narrative context; the Hebrew verbal form itself is the standard narrative past.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - had said
  lexicon: HALOT
  rationale: The wayyiqtol form normally advances narrative with simple past 'said.' Although some translations use pluperfect ('had said') to smooth chronology with the surrounding context, the Hebrew form itself does not require that here, so simple past best reflects the source while remaining natural English.
- source_word: לֹא יִשְׁמַע אֲלֵיכֶם
  chosen: will not listen to you
  alternatives:
  - will not hear you
  - will not obey you
  lexicon: HALOT
  rationale: שׁמע with אֶל commonly means 'listen to' or 'heed.' 'Listen to you' preserves the idiom and leaves room for the implied refusal to heed without over-specifying 'obey.' The plural suffix on אֲלֵיכֶם addresses Moses and Aaron together, but direct English singular 'you' is acceptable in context since Moses is the addressee; the sense remains collective from the broader narrative.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the sake of
  lexicon: HALOT
  rationale: This conjunction expresses purpose/result. 'So that' is clear modern English and preserves the purposive force without sounding overly formal.
- source_word: רְבוֹת
  chosen: may be multiplied
  alternatives:
  - may become many
  - may increase
  lexicon: HALOT
  rationale: The infinitive construct of רבה after לְמַעַן conveys the increase of the following noun. 'May be multiplied' is a natural passive rendering in English that captures the causative/resultative sense in context.
- source_word: מוֹפְתַי
  chosen: my wonders
  alternatives:
  - my signs
  - my miraculous signs
  lexicon: HALOT
  rationale: מוֹפֵת often denotes a wonder or portent, especially in the Exodus plague narratives. 'Wonders' fits the immediate context and pairs well with the idea of multiplication. 'Signs' is possible, but 'wonders' better reflects the extraordinary, awe-producing aspect here.
- source_word: בְּאֶרֶץ מִצְרַיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: The fuller phrase includes אֶרֶץ, so 'in the land of Egypt' preserves the Hebrew wording more closely than the shorter 'in Egypt' while remaining idiomatic.
