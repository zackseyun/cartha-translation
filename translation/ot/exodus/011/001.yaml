id: EXO.11.1
reference: Exodus 11:1
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל מֹשֶׁ֗ה ע֣וֹד נֶ֤גַע אֶחָד֙ אָבִ֤יא עַל פַּרְעֹה֙ וְ/עַל מִצְרַ֔יִם אַֽחֲרֵי כֵ֕ן יְשַׁלַּ֥ח אֶתְ/כֶ֖ם מִ/זֶּ֑ה כְּ/שַׁ֨לְּח֔/וֹ כָּלָ֕ה גָּרֵ֛שׁ יְגָרֵ֥שׁ אֶתְ/כֶ֖ם מִ/זֶּֽה־־־־׃
translation:
  text: Then Yahweh said to Moses, “One more plague I will bring upon Pharaoh and upon Egypt. After that he will send you away from here. When he sends you away, he will surely drive you out completely from here.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'blow,' 'stroke,' or 'affliction' for 'plague.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew expression 'he will surely drive you out' is emphatic; literally, 'driving out he will drive you out.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural modern English while preserving sequential force better than a mechanically repeated 'and'.
- source_word: עוֹד
  chosen: more
  alternatives:
  - still
  - yet
  lexicon: HALOT
  rationale: 'In the phrase עוֹד נֶגַע אֶחָד, the sense is additive: one additional plague remains. ''One more'' is idiomatic and precise.'
- source_word: נֶגַע
  chosen: plague
  alternatives:
  - blow
  - affliction
  - stroke
  lexicon: HALOT
  rationale: In the Exodus context of divine judgments on Egypt, 'plague' is the clearest contextual equivalent in English, though the noun more broadly denotes a blow/affliction.
- source_word: אָבִיא
  chosen: I will bring
  alternatives:
  - I am bringing
  lexicon: HALOT
  rationale: The Hiphil of בוא here means 'bring upon.' Future English fits the predictive statement addressed to Moses.
- source_word: עַל פַּרְעֹה וְעַל מִצְרַיִם
  chosen: upon Pharaoh and upon Egypt
  alternatives:
  - against Pharaoh and against Egypt
  lexicon: HALOT
  rationale: '''Upon'' closely reflects עַל with a judgment-coming sense. Repeating ''upon'' preserves the Hebrew parallelism.'
- source_word: אַחֲרֵי כֵן
  chosen: After that
  alternatives:
  - afterward
  - after this
  lexicon: HALOT
  rationale: A natural temporal connector that preserves the sequence of events.
- source_word: יְשַׁלַּח אֶתְכֶם מִזֶּה
  chosen: he will send you away from here
  alternatives:
  - he will let you go from here
  - he will send you out from here
  lexicon: HALOT
  rationale: שׁלח commonly means 'send away/let go.' 'Send you away' fits the immediate context and avoids sounding overly idiomatic while retaining the expulsion nuance developed in the next clause.
- source_word: כְּשַׁלְּחוֹ
  chosen: When he sends you away
  alternatives:
  - As he sends you away
  - When he lets you go
  lexicon: HALOT
  rationale: 'The prefixed כ here is temporal in context: ''when/as.'' ''When he sends you away'' reads naturally and maintains linkage with the prior verb.'
- source_word: כָּלָה
  chosen: completely
  alternatives:
  - altogether
  - entirely
  lexicon: HALOT
  rationale: Used adverbially with the following infinitive + finite verb for emphasis. 'Completely' captures the totality of the expulsion.
- source_word: גָּרֵשׁ יְגָרֵשׁ
  chosen: he will surely drive you out
  alternatives:
  - he will utterly drive you out
  - he will indeed expel you
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the action. 'Will surely drive you out' preserves the emphatic force in idiomatic English. 'Drive out' is stronger than 'send away' and reflects the escalation in the Hebrew.
- source_word: מִזֶּה
  chosen: from here
  alternatives:
  - from this place
  lexicon: HALOT
  rationale: A straightforward deictic reference to Egypt/the present location; 'from here' is natural and sufficient in English.
