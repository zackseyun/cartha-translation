id: EXO.11.4
reference: Exodus 11:4
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר מֹשֶׁ֔ה כֹּ֖ה אָמַ֣ר יְהוָ֑ה כַּ/חֲצֹ֣ת הַ/לַּ֔יְלָה אֲנִ֥י יוֹצֵ֖א בְּ/ת֥וֹךְ מִצְרָֽיִם׃
translation:
  text: 'Then Moses said, “Thus says Yahweh: About midnight I will go out into the midst of Egypt.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “At midnight.” The Hebrew expression includes a prefixed particle that can indicate approximation, hence “About midnight.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - and ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural modern English while preserving the sequential force better than a bare 'and' in this context.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus said
  lexicon: HALOT
  rationale: 'This is the standard prophetic messenger formula. Although אָמַר is morphologically perfect, English idiom regularly uses the present in direct quotation formulas: ''Thus says ...''.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כַּחֲצֹת הַלַּיְלָה
  chosen: About midnight
  alternatives:
  - At midnight
  - around midnight
  - about the middle of the night
  lexicon: HALOT
  rationale: The prefixed כ on 'midnight' is best taken as approximative ('about/around'), not strictly punctual. 'About midnight' reflects the Hebrew more precisely than the traditional 'at midnight' and fits the source-text primacy principle.
- source_word: אֲנִי
  chosen: I
  rationale: Explicit first-person pronoun retained for emphasis as the subject of the divine speech.
- source_word: יוֹצֵא
  chosen: will go out
  alternatives:
  - am going out
  - am going forth
  lexicon: HALOT
  rationale: The participle in direct divine speech has imminent/future force here. 'Will go out' is clear modern English and fits the announced impending action.
- source_word: בְּתוֹךְ
  chosen: into the midst of
  alternatives:
  - through the midst of
  - in the midst of
  - among
  lexicon: HALOT
  rationale: The phrase emphasizes movement into Egypt's interior/presence, not merely location. 'Into the midst of' preserves both the motion from 'go out' and the force of תוך.
- source_word: מִצְרָיִם
  chosen: Egypt
  rationale: Standard English place-name rendering.
