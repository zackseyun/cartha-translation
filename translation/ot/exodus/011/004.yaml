theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Temporal nuance of כַּחֲצֹת הַלַּיְלָה
  chosen_reading: About midnight
  alternative_readings:
  - At midnight
  rationale: The Hebrew includes the prefixed כ, which naturally conveys approximation ('about/as'). Retaining that nuance avoids overstating precision and follows original-language primacy over inherited translation tradition.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 Original-language primacy over translation tradition
