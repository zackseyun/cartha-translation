id: EXO.11.10
reference: Exodus 11:10
source:
  edition: WLC
  text: וּ/מֹשֶׁ֣ה וְ/אַהֲרֹ֗ן עָשׂ֛וּ אֶת כָּל הַ/מֹּפְתִ֥ים הָ/אֵ֖לֶּה לִ/פְנֵ֣י פַרְעֹ֑ה וַ/יְחַזֵּ֤ק יְהוָה֙ אֶת לֵ֣ב פַּרְעֹ֔ה וְ/לֹֽא שִׁלַּ֥ח אֶת בְּנֵֽי יִשְׂרָאֵ֖ל מֵ/אַרְצֽ/וֹ־־־־־־׃פ
translation:
  text: And Moses and Aaron did all these signs before Pharaoh, and Yahweh hardened Pharaoh’s heart, and he did not let the sons of Israel go out from his land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all these wonders.' The Hebrew term can denote miraculous signs or wonders.
    reason: lexical_alternative
  - marker: b
    text: Or 'the LORD strengthened Pharaoh’s heart' or 'made Pharaoh’s heart firm.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the Israelites' or 'the children of Israel.' Literally, 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: אַהֲרֹן
  chosen: Aaron
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: עָשׂוּ
  chosen: did
  alternatives:
  - performed
  lexicon: HALOT
  rationale: The verb עשה is broad ('do/make'). 'Did' is the most direct rendering here and works idiomatically with 'signs.' 'Performed' is possible but slightly more interpretive.
- source_word: כָּל הַמֹּפְתִים הָאֵלֶּה
  chosen: all these signs
  alternatives:
  - all these wonders
  lexicon: HALOT
  rationale: מוֹפֵת often denotes miraculous signs or wonders. 'Signs' fits the Exodus context of acts meant to demonstrate divine power before Pharaoh. 'Wonders' is viable, but 'signs' better captures evidential function in context.
- source_word: לִפְנֵי פַרְעֹה
  chosen: before Pharaoh
  alternatives:
  - in Pharaoh's presence
  lexicon: HALOT
  rationale: A straightforward spatial/relational rendering of לִפְנֵי, idiomatic in English narrative.
- source_word: וַיְחַזֵּק
  chosen: hardened
  alternatives:
  - strengthened
  - made firm
  lexicon: HALOT
  rationale: חזק literally means 'be strong/strengthen,' but in the repeated Exodus formula with Pharaoh's heart, 'hardened' is the established and contextually accurate English rendering for the resulting obstinacy. The more literal alternatives are preserved because they reflect the underlying verbal image.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֵב פַּרְעֹה
  chosen: Pharaoh’s heart
  lexicon: HALOT
  rationale: Natural English possessive rendering of the construct relationship.
- source_word: שִׁלַּח
  chosen: did not let ... go out
  alternatives:
  - did not send away
  - did not let ... go
  lexicon: HALOT
  rationale: שלח commonly means 'send' or 'send away,' but in the Exodus narrative regarding Israel's release, 'let ... go' is the clearest idiomatic English equivalent. 'Go out' is retained to reflect the Hebrew sense of departure from the land.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' In keeping with gender-accurate translation philosophy and the importance of preserving source texture, the more literal rendering is used here rather than the smoother collective 'Israelites.'
- source_word: מֵאַרְצוֹ
  chosen: from his land
  alternatives:
  - out of his land
  - from his country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to Pharaoh's land/territory. 'From his land' is direct and readable; 'out of his land' is also possible, but 'go out' already carries the motion.
