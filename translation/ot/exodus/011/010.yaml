theological_decisions:
- issue: Rendering the divine action on Pharaoh's heart
  chosen_reading: but Yahweh hardened Pharaoh’s heart
  alternative_readings:
  - and the LORD strengthened Pharaoh’s heart
  - and the LORD made Pharaoh’s heart firm
  rationale: The Hebrew verb חזק can be rendered more literally as 'strengthened' or 'made firm,' but in this narrative context it describes Pharaoh's confirmed resistance to releasing Israel. 'Hardened' best communicates the idiomatic sense in English without softening the text's theological tension regarding divine sovereignty and human responsibility.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The source is explicitly masculine plural in construct. Following the doctrine's gender-accurate principle, the literal form is retained rather than neutralizing it to 'Israelites,' while recognizing that the phrase functions corporately for the people of Israel.
  doctrine_reference: Gender-accurate over gender-neutral.
