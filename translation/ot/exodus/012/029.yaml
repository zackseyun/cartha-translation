id: EXO.12.29
reference: Exodus 12:29
source:
  edition: WLC
  text: וַ/יְהִ֣י בַּ/חֲצִ֣י הַ/לַּ֗יְלָה וַֽ/יהוָה֮ הִכָּ֣ה כָל בְּכוֹר֮ בְּ/אֶ֣רֶץ
    מִצְרַיִם֒ מִ/בְּכֹ֤ר פַּרְעֹה֙ הַ/יֹּשֵׁ֣ב עַל כִּסְא֔/וֹ עַ֚ד בְּכ֣וֹר הַ/שְּׁבִ֔י
    אֲשֶׁ֖ר בְּ/בֵ֣ית הַ/בּ֑וֹר וְ/כֹ֖ל בְּכ֥וֹר בְּהֵמָֽה׀־־׃
translation:
  text: And at midnight the LORD struck down every firstborn in the land of Egypt,
    from the firstborn of Pharaoh, who sat on his throne, to the firstborn of the
    captive who was in the prison pit, and every firstborn of the livestock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the firstborn of the prisoner who was in the dungeon."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ...
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive plus היה introduces the event in narrative sequence.
    In modern English, a simple connective 'And' best preserves the flow without archaic
    diction like 'it came to pass.'
- source_word: בַּחֲצִי הַלַּיְלָה
  chosen: at midnight
  alternatives:
  - in the middle of the night
  - at the middle of the night
  lexicon: HALOT
  rationale: The idiom literally means 'at the half/middle of the night.' 'At midnight'
    is the natural and precise English equivalent.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    in keeping with Jewish reverence tradition and the longstanding covenantal pattern
    reflected in the LXX and English Bible tradition.
- source_word: הִכָּה
  chosen: struck down
  alternatives:
  - struck
  - smote
  - killed
  lexicon: HALOT
  rationale: The verb נכה means 'strike, smite,' and in this context the result is
    death. 'Struck down' preserves the verbal imagery while making the lethal outcome
    clear without over-paraphrasing to 'killed.'
- source_word: כָל בְּכוֹר
  chosen: every firstborn
  alternatives:
  - all the firstborn
  - every eldest offspring
  lexicon: HALOT
  rationale: בכור denotes the firstborn offspring. 'Every firstborn' is idiomatic
    and fits the distributive force of כָל in context.
- source_word: בְּאֶרֶץ מִצְרַיִם
  chosen: in the land of Egypt
  alternatives:
  - throughout the land of Egypt
  - in Egypt
  lexicon: HALOT
  rationale: The phrase is straightforwardly locative. 'In the land of Egypt' preserves
    the formal geographic expression better than the looser 'in Egypt.'
- source_word: מִבְּכֹר פַּרְעֹה
  chosen: from the firstborn of Pharaoh
  alternatives:
  - beginning with Pharaoh's firstborn
  lexicon: HALOT
  rationale: The מן ... עד construction marks the range of those affected. 'From the
    firstborn of Pharaoh' preserves that structure directly.
- source_word: הַיֹּשֵׁב עַל כִּסְאוֹ
  chosen: who sat on his throne
  alternatives:
  - who sits on his throne
  - the one sitting on his throne
  lexicon: HALOT
  rationale: The participle describes Pharaoh in his royal status. In English narrative
    style, the relative clause 'who sat on his throne' reads naturally and reflects
    the past-time setting.
- source_word: עַד
  chosen: to
  alternatives:
  - as far as
  - even to
  lexicon: HALOT
  rationale: Within the range expression מן ... עד, 'from ... to ...' is the most
    idiomatic English equivalent.
- source_word: בְּכוֹר הַשְּׁבִי
  chosen: the firstborn of the captive
  alternatives:
  - the firstborn of the prisoner
  lexicon: HALOT
  rationale: שבי refers to one taken captive. 'Captive' is slightly broader and more
    literal than 'prisoner,' while fitting the plague's social sweep from highest
    to lowest.
- source_word: אֲשֶׁר בְּבֵית הַבּוֹר
  chosen: who was in the prison pit
  alternatives:
  - who was in the dungeon
  - who was in the pit-house
  - who was in the prison
  lexicon: HALOT
  rationale: בור is literally 'pit,' but in imprisonment contexts refers to a dungeon-like
    prison pit. Rendering both elements preserves the concrete imagery without becoming
    obscure. This also avoids flattening the term to a generic 'prison' alone.
- source_word: וְכֹל בְּכוֹר בְּהֵמָה
  chosen: and every firstborn of the livestock
  alternatives:
  - and all the firstborn of the cattle
  - and every firstborn of the animals
  lexicon: HALOT
  rationale: בהמה here refers broadly to domesticated animals/livestock, not merely
    cattle. 'Livestock' is the most accurate and natural collective term in English.
