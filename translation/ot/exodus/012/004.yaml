id: EXO.12.4
reference: Exodus 12:4
source:
  edition: WLC
  text: וְ/אִם יִמְעַ֣ט הַ/בַּיִת֮ מִ/הְיֹ֣ת מִ/שֶּׂה֒ וְ/לָקַ֣ח ה֗וּא וּ/שְׁכֵנ֛/וֹ
    הַ/קָּרֹ֥ב אֶל בֵּית֖/וֹ בְּ/מִכְסַ֣ת נְפָשֹׁ֑ת אִ֚ישׁ לְ/פִ֣י אָכְל֔/וֹ תָּכֹ֖סּוּ
    עַל הַ/שֶּֽׂה־־־׃
translation:
  text: And if the household is too small for a lamb, then he and his nearest neighbor
    shall take one according to the number of persons; each man according to his eating
    you shall count for the lamb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew שֶׂה can refer more broadly to a head of small livestock, from the
      sheep or the goats; 'lamb' is used here for natural English in the Passover
      context.
    reason: lexical_alternative
  - marker: b
    text: Or 'each person according to what he can eat, you shall calculate for the
      lamb.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִמְעַט הַבַּיִת מִהְיֹת מִשֶּׂה
  chosen: if the household is too small for a lamb
  alternatives:
  - if the house is too few for a lamb
  - if the household is insufficient for a lamb
  lexicon: HALOT
  rationale: הַבַּיִת literally means 'the house,' but in context it refers to the
    household unit participating in the Passover meal. יִמְעַט with מִהְיֹת conveys
    being too few/insufficient in relation to one lamb. 'Too small for a lamb' is
    idiomatic English that preserves the sense of insufficient numbers.
- source_word: שֶׂה
  chosen: lamb
  alternatives:
  - small livestock animal
  - sheep or goat
  lexicon: HALOT
  rationale: שֶׂה can denote a head of small livestock, either from sheep or goats.
    In the Passover context, English tradition and immediate readability favor 'lamb,'
    though the broader category is possible. The alternative is preserved in a footnote
    because the wider passage allows either sheep or goat.
- source_word: וְלָקַח הוּא וּשְׁכֵנוֹ הַקָּרֹב אֶל־בֵּיתוֹ
  chosen: then he and his nearest neighbor shall take one
  alternatives:
  - then he and his neighbor nearest to his house shall take it
  - then he and the neighbor who is near his house shall take one
  lexicon: HALOT
  rationale: The clause directs joint participation with the closest neighboring household.
    'Nearest neighbor' captures הַקָּרֹב אֶל־בֵּיתוֹ naturally in English. 'Shall
    take one' makes explicit the implied object from context.
- source_word: בְּמִכְסַת נְפָשֹׁת
  chosen: according to the number of persons
  alternatives:
  - by the count of persons
  - according to the number of souls
  lexicon: HALOT
  rationale: מִכְסָה refers to a counted amount or number; נְפָשֹׁת here means persons/lives,
    not disembodied 'souls.' 'Number of persons' is clear modern English and avoids
    misleading theological overtones.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each person
  - each one
  lexicon: HALOT
  rationale: The Hebrew is singular masculine and distributive. Per the translation
    philosophy's gender-accurate principle, 'each man' preserves the source form and
    representative force better than a neutral recasting, while still functioning
    generically in context.
- source_word: לְפִי אָכְלוֹ
  chosen: according to his eating
  alternatives:
  - according to what he can eat
  - in proportion to his food
  lexicon: HALOT
  rationale: The phrase is literally 'according to the mouth of his eating,' an idiom
    for each person's consumption/appetite. 'According to his eating' stays relatively
    close to the Hebrew while remaining understandable.
- source_word: תָּכֹסּוּ עַל־הַשֶּׂה
  chosen: you shall count for the lamb
  alternatives:
  - you shall calculate for the lamb
  - you shall apportion for the lamb
  lexicon: HALOT
  rationale: The verb כָּסַס/כּוֹס? here in context means to reckon or count in relation
    to the lamb, i.e., determine participation based on how much each will eat. 'Count
    for the lamb' is concise and preserves the accounting sense, though 'calculate'
    or 'apportion' are possible.
