id: EXO.12.19
reference: Exodus 12:19
source:
  edition: WLC
  text: שִׁבְעַ֣ת יָמִ֔ים שְׂאֹ֕ר לֹ֥א יִמָּצֵ֖א בְּ/בָתֵּי/כֶ֑ם כִּ֣י כָּל אֹכֵ֣ל
    מַחְמֶ֗צֶת וְ/נִכְרְתָ֞ה הַ/נֶּ֤פֶשׁ הַ/הִוא֙ מֵ/עֲדַ֣ת יִשְׂרָאֵ֔ל בַּ/גֵּ֖ר
    וּ/בְ/אֶזְרַ֥ח הָ/אָֽרֶץ׀־׃
translation:
  text: For seven days no leaven is to be found in your houses, for whoever eats anything
    leavened, that person shall be cut off from the congregation of Israel, whether
    a sojourner or a native of the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that soul shall be cut off.' The Hebrew idiom may refer to expulsion,
      death, or divine judgment depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'resident foreigner' for 'sojourner.'
    reason: lexical_alternative
  - marker: c
    text: Or 'assembly' or 'community' for 'congregation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁבְעַת יָמִים
  chosen: For seven days
  alternatives:
  - Seven days
  lexicon: HALOT
  rationale: Temporal accusative indicating duration. 'For seven days' is natural
    modern English and preserves the force of the Hebrew phrase.
- source_word: שְׂאֹר
  chosen: leaven
  alternatives:
  - yeast
  - sourdough starter
  lexicon: HALOT
  rationale: Refers to leavening agent rather than the broader category of leavened
    food. 'Leaven' is the standard biblical term and fits the ritual context better
    than the more specific modern 'yeast'.
- source_word: לֹא יִמָּצֵא
  chosen: is to be found
  alternatives:
  - shall not be found
  - must not be found
  lexicon: HALOT
  rationale: 'Niphal imperfect of מצא expresses a prohibition/result state: leaven
    is not to be present. ''Is to be found'' balances formal accuracy with readable
    English.'
- source_word: בְּבָתֵּיכֶם
  chosen: in your houses
  alternatives:
  - in your homes
  lexicon: HALOT
  rationale: Literal plural 'houses' is retained; it refers to the households/dwellings
    of the Israelites.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the prohibition. 'For' fits the legal style
    of the passage.
- source_word: כָּל אֹכֵל
  chosen: whoever eats
  alternatives:
  - everyone eating
  - anyone who eats
  lexicon: HALOT
  rationale: Hebrew participial construction with כל has generic force. 'Whoever eats'
    is idiomatic and preserves the universal scope.
- source_word: מַחְמֶצֶת
  chosen: anything leavened
  alternatives:
  - what is leavened
  - leavened bread
  lexicon: HALOT
  rationale: Broader than bread alone; it denotes something made with leaven. 'Anything
    leavened' captures the comprehensive prohibition.
- source_word: וְנִכְרְתָה הַנֶּפֶשׁ הַהִוא
  chosen: that person shall be cut off
  alternatives:
  - that soul shall be cut off
  - that person shall be excluded
  lexicon: HALOT
  rationale: נפש here refers to the individual person, not specifically the immaterial
    soul. 'Cut off' preserves the covenantal sanction language without over-interpreting
    the exact mode of punishment.
- source_word: מֵעֲדַת יִשְׂרָאֵל
  chosen: from the congregation of Israel
  alternatives:
  - from the assembly of Israel
  - from the community of Israel
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the covenant assembly/community. 'Congregation'
    preserves the formal communal sense in legal material.
- source_word: בַּגֵּר
  chosen: a sojourner
  alternatives:
  - the resident foreigner
  - the alien
  lexicon: HALOT
  rationale: גֵּר is a non-native residing among Israel. 'Sojourner' is a standard
    biblical rendering that avoids the misleading modern connotations of 'alien'.
- source_word: וּבְאֶזְרַח הָאָרֶץ
  chosen: a native of the land
  alternatives:
  - the native-born of the land
  - a citizen of the land
  lexicon: HALOT
  rationale: Contrasts with גֵּר. 'Native of the land' is clear modern English and
    preserves the social distinction without importing modern political categories.
