theological_decisions:
- issue: Meaning of the covenant penalty 'cut off'
  chosen_reading: Retain the idiom 'shall be cut off' without specifying whether it
    means death, expulsion, or divine judgment.
  alternative_readings:
  - shall be put to death
  - shall be excluded from the community
  rationale: The Hebrew idiom carries covenant-sanction force, but its precise implementation
    is debated by context. Preserving the idiom maintains the theological and legal
    tension rather than resolving it beyond the text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
