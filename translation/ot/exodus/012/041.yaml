theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and Septuagintal pattern. No contextual
    factor here requires deviation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of צִבְאוֹת יְהוָה
  chosen_reading: the hosts of the LORD
  alternative_readings:
  - the armies of the LORD
  rationale: The phrase can sound militarized in English if rendered 'armies,' but
    in context it identifies Israel as the LORD's ordered companies departing Egypt.
    'Hosts' preserves the metaphor and theological ownership without importing a stronger
    combat sense than the verse itself states.
