id: EXO.12.41
reference: Exodus 12:41
source:
  edition: WLC
  text: וַ/יְהִ֗י מִ/קֵּץ֙ שְׁלֹשִׁ֣ים שָׁנָ֔ה וְ/אַרְבַּ֥ע מֵא֖וֹת שָׁנָ֑ה וַ/יְהִ֗י
    בְּ/עֶ֨צֶם֙ הַ/יּ֣וֹם הַ/זֶּ֔ה יָֽצְא֛וּ כָּל צִבְא֥וֹת יְהוָ֖ה מֵ/אֶ֥רֶץ מִצְרָֽיִם־׃
translation:
  text: At the end of four hundred and thirty years, on that very day, all the hosts
    of the LORD went out from the land of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the armies of the LORD.' The Hebrew term can denote organized companies
      or armies.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקֵּץ
  chosen: at the end of
  alternatives:
  - from the end of
  - when the end of had come
  lexicon: HALOT
  rationale: The preposition מִן with קֵץ marks the completion point of a period.
    'At the end of' is idiomatic English and preserves the temporal force without
    awkwardness.
- source_word: שְׁלֹשִׁים שָׁנָה וְאַרְבַּע מֵאוֹת שָׁנָה
  chosen: four hundred and thirty years
  alternatives:
  - thirty years and four hundred years
  lexicon: HALOT
  rationale: English normally reverses the Hebrew number order for readability. The
    sense is a total duration of 430 years.
- source_word: בְּעֶצֶם הַיּוֹם הַזֶּה
  chosen: on that very day
  alternatives:
  - on this very day
  - on the selfsame day
  lexicon: HALOT
  rationale: The idiom emphasizes exactness and solemn specificity. 'On that very
    day' is natural modern English and preserves the emphatic force better than the
    archaic 'selfsame day.' 'This very day' is possible, but in English narrative
    style 'that very day' better fits retrospective narration.
- source_word: יָצְאוּ
  chosen: went out
  alternatives:
  - came out
  - departed
  lexicon: HALOT
  rationale: יצא commonly means 'go out/come out.' 'Went out' matches the narrative
    viewpoint from Egypt outward and keeps the verbal simplicity of the Hebrew.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: כָּל here modifies the following construct phrase comprehensively. 'All'
    is the straightforward equivalent.
- source_word: צִבְאוֹת
  chosen: hosts
  alternatives:
  - companies
  - armies
  lexicon: HALOT
  rationale: צָבָא can denote army, host, or organized company. Here it refers to
    the ordered divisions of Israel under the LORD. 'Hosts' preserves the corporate
    and quasi-military sense without overstating that they were acting as a fighting
    army in this verse.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD,'
    following established reverential convention and the stated project default.
- source_word: מֵאֶרֶץ מִצְרָיִם
  chosen: from the land of Egypt
  alternatives:
  - out of Egypt
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'land' (אֶרֶץ). Retaining it preserves
    the fuller expression and the geographic-national sense of departure.
