id: EXO.12.9
reference: Exodus 12:9
source:
  edition: WLC
  text: אַל תֹּאכְל֤וּ מִמֶּ֨/נּוּ֙ נָ֔א וּ/בָשֵׁ֥ל מְבֻשָּׁ֖ל בַּ/מָּ֑יִם כִּ֣י אִם
    צְלִי אֵ֔שׁ רֹאשׁ֥/וֹ עַל כְּרָעָ֖י/ו וְ/עַל קִרְבּֽ/וֹ־־־־־׃
translation:
  text: Do not eat any of it raw or boiled in water, but only roasted over the fire,
    with its head, its legs, and its inner parts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'its head with its legs and with its entrails.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָא
  chosen: raw
  alternatives:
  - undercooked
  lexicon: HALOT
  rationale: In this culinary context, נָא refers to meat not cooked by fire or boiling.
    'Raw' is the standard and clearest English equivalent.
- source_word: וּבָשֵׁל מְבֻשָּׁל בַּמָּיִם
  chosen: or boiled in water
  alternatives:
  - or cooked, cooked in water
  - or sodden with boiling in water
  lexicon: HALOT
  rationale: The construction combines the adjective/participle from בשל with an explicit
    instrumental phrase 'in water,' emphasizing boiling rather than cooking in general.
    'Boiled in water' is idiomatic and preserves the prohibition's specificity.
- source_word: כִּי אִם
  chosen: but only
  alternatives:
  - except
  - rather
  lexicon: HALOT
  rationale: 'The phrase marks a strong exception/contrast: not this way, but only
    that way. ''But only'' communicates the exclusivity clearly in modern English.'
- source_word: צְלִי אֵשׁ
  chosen: roasted over the fire
  alternatives:
  - roast of fire
  - fire-roasted
  - roasted with fire
  lexicon: HALOT
  rationale: The Hebrew literally denotes roasting by means of fire. 'Roasted over
    the fire' is natural English and preserves the cooking method.
- source_word: רֹאשׁוֹ עַל־כְּרָעָיו וְעַל־קִרְבּוֹ
  chosen: with its head, its legs, and its inner parts
  alternatives:
  - its head with its legs and with its entrails
  - its head along with its legs and inward parts
  lexicon: HALOT
  rationale: The phrase specifies that the animal is to be roasted whole, including
    these parts. 'Inner parts' is readable modern English; 'entrails' is more literal
    but harsher in tone. 'With' captures the sense of the repeated עַל in this listing
    context.
- source_word: מִמֶּנּוּ
  chosen: any of it
  alternatives:
  - from it
  - of it
  lexicon: HALOT
  rationale: English idiom prefers 'eat any of it' rather than the more wooden 'eat
    from it.' This preserves the partitive sense in natural English.
