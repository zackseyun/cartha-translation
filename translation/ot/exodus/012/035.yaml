id: EXO.12.35
reference: Exodus 12:35
source:
  edition: WLC
  text: וּ/בְנֵי יִשְׂרָאֵ֥ל עָשׂ֖וּ כִּ/דְבַ֣ר מֹשֶׁ֑ה וַֽ/יִּשְׁאֲלוּ֙ מִ/מִּצְרַ֔יִם
    כְּלֵי כֶ֛סֶף וּ/כְלֵ֥י זָהָ֖ב וּ/שְׂמָלֹֽת־־׃
translation:
  text: And the sons of Israel did according to the word of Moses, and they asked
    the Egyptians for articles of silver and articles of gold and clothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'requested.' Older English versions often have 'borrowed,' but the Hebrew
      verb here ordinarily means 'asked' or 'requested.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Formal phrase literally means 'sons of Israel.' Chosen to preserve the
    Hebrew expression and its corporate/familial sense. 'Israelites' is smoother English
    but less transparent to the source wording.
- source_word: עָשׂוּ
  chosen: did
  alternatives:
  - acted
  - carried out
  lexicon: HALOT
  rationale: Common verb עשה here with כדבר means 'did/acted according to.' 'Did'
    best preserves the simple verbal force without overinterpreting.
- source_word: כִּדְבַר מֹשֶׁה
  chosen: according to the word of Moses
  alternatives:
  - as Moses said
  - according to Moses' word
  - according to Moses' instruction
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'command/instruction' depending on
    context. 'According to the word of Moses' is transparent and idiomatic enough,
    while preserving the source noun rather than paraphrasing.
- source_word: וַיִּשְׁאֲלוּ
  chosen: asked
  alternatives:
  - requested
  - borrowed
  - plundered from
  lexicon: HALOT
  rationale: The verb שאל fundamentally means 'ask, request.' Older English versions
    used 'borrowed,' but that imports a sense not required by the Hebrew. 'Plundered'
    belongs to the result described in the surrounding context, not the lexical meaning
    of this verb in this clause.
- source_word: מִמִּצְרַיִם
  chosen: the Egyptians
  alternatives:
  - from Egypt
  lexicon: HALOT
  rationale: Although the form is 'from Egypt,' in context it refers to the Egyptian
    people from whom the Israelites requested items. Rendering 'the Egyptians' makes
    the implied personal object explicit in natural English.
- source_word: כְּלֵי כֶסֶף
  chosen: articles of silver
  alternatives:
  - silver vessels
  - silver objects
  - items of silver
  lexicon: HALOT
  rationale: כְּלִי is a broad term for articles, vessels, utensils, or objects. 'Articles
    of silver' preserves breadth without narrowing to tableware or cultic vessels.
- source_word: וּכְלֵי זָהָב
  chosen: articles of gold
  alternatives:
  - gold vessels
  - gold objects
  - items of gold
  lexicon: HALOT
  rationale: Same rationale as the previous phrase; consistency is maintained for
    כְּלִי.
- source_word: וּשְׂמָלֹת
  chosen: clothing
  alternatives:
  - garments
  - cloaks
  lexicon: HALOT
  rationale: שִׂמְלָה refers broadly to clothing/garments. 'Clothing' is clear modern
    English and suitably broad; 'garments' is acceptable but slightly more formal/archaic.
