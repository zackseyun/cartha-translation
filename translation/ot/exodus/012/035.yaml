theological_decisions:
- issue: Potentially loaded rendering of וַיִּשְׁאֲלוּ in the exodus-plundering context
  chosen_reading: asked
  alternative_readings:
  - borrowed
  - requested
  rationale: To avoid importing a moral or theological judgment not explicit in the
    Hebrew, the main text keeps the basic lexical sense 'asked.' The broader narrative
    later states that Egypt was 'plundered,' but that result should not be read back
    into this verb itself.
  doctrine_reference: Translation philosophy §§1, 3, 5
