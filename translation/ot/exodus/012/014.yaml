id: EXO.12.14
reference: Exodus 12:14
source:
  edition: WLC
  text: וְ/הָיָה֩ הַ/יּ֨וֹם הַ/זֶּ֤ה לָ/כֶם֙ לְ/זִכָּר֔וֹן וְ/חַגֹּתֶ֥ם אֹת֖/וֹ חַ֣ג לַֽ/יהוָ֑ה לְ/דֹרֹ֣תֵי/כֶ֔ם חֻקַּ֥ת עוֹלָ֖ם תְּחָגֻּֽ/הוּ׃
translation:
  text: And this day shall be for you as a memorial, and you shall celebrate it as a feast to Yahweh; throughout your generations, you shall celebrate it as a permanent statute.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an everlasting statute' or 'a perpetual statute.' The Hebrew phrase חֻקַּת עוֹלָם often denotes an enduring, ongoing ordinance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: shall be
  alternatives:
  - will be
  - is to be
  lexicon: HALOT
  rationale: 'Qal perfect with prefixed conjunction in this legal/instructional context carries future force: the day is prescribed as something that shall be for Israel.'
- source_word: הַיּוֹם הַזֶּה
  chosen: this day
  alternatives:
  - this day here
  - this very day
  lexicon: HALOT
  rationale: Straightforward demonstrative phrase; 'this day' is natural and sufficiently formal without adding emphasis not explicit in the Hebrew.
- source_word: לָכֶם
  chosen: for you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: The preposition marks relation/benefit; 'for you' fits idiomatic English in this memorial instruction.
- source_word: לְזִכָּרוֹן
  chosen: as a memorial
  alternatives:
  - for remembrance
  - as a remembrance
  lexicon: HALOT
  rationale: זִכָּרוֹן denotes a memorial/remembrance. 'Memorial' is concise and idiomatic in cultic/legal context, while preserving the commemorative force.
- source_word: וְחַגֹּתֶם ... חַג
  chosen: you shall celebrate it as a feast
  alternatives:
  - you shall keep it as a festival
  - you shall observe it as a feast
  lexicon: HALOT
  rationale: The verb חגג means to celebrate/keep a pilgrimage festival, and the cognate noun חַג means feast/festival. Rendering both with related English terms preserves the Hebrew wordplay without awkward repetition.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' With חגג, 'to the LORD' naturally expresses that the feast is directed toward/honors him.
- source_word: לְדֹרֹתֵיכֶם
  chosen: throughout your generations
  alternatives:
  - for your generations
  - from generation to generation
  lexicon: HALOT
  rationale: This idiom expresses ongoing observance across successive generations. 'Throughout your generations' is standard and clear.
- source_word: חֻקַּת עוֹלָם
  chosen: a permanent statute
  alternatives:
  - an everlasting statute
  - a perpetual statute
  lexicon: HALOT
  rationale: חֻקָּה is a fixed statute/prescription. עוֹלָם in legal contexts often denotes enduring or permanent duration rather than making a philosophical claim about absolute endlessness. 'Permanent statute' is clear modern English and avoids archaic phrasing while preserving the force of ongoing obligation.
- source_word: תְּחָגֻּהוּ
  chosen: you shall celebrate it
  alternatives:
  - you shall keep it
  - you shall observe it as a feast
  lexicon: HALOT
  rationale: The repeated verb resumes and reinforces the command. 'Celebrate it' keeps consistency with the earlier חגג rendering and reads naturally in English.
