- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of חֻקַּת עוֹלָם in covenant legislation
  chosen_reading: a permanent statute
  alternative_readings:
  - an everlasting statute
  - a perpetual statute
  rationale: The phrase indicates enduring covenantal observance across Israel's generations. 'Permanent' preserves the legal force in readable modern English without over-specifying metaphysical endlessness beyond the Hebrew idiom.
