id: EXO.12.36
reference: Exodus 12:36
source:
  edition: WLC
  text: וַֽ/יהוָ֞ה נָתַ֨ן אֶת חֵ֥ן הָ/עָ֛ם בְּ/עֵינֵ֥י מִצְרַ֖יִם וַ/יַּשְׁאִל֑וּ/ם
    וַֽ/יְנַצְּל֖וּ אֶת מִצְרָֽיִם־־׃פ
translation:
  text: And the LORD gave the people favor in the eyes of the Egyptians, so that they
    let them ask; and they plundered Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'so that they lent to them.' The Hebrew verb here
      has been understood either as lending or as granting what was requested.
    reason: alternative_reading
lexical_decisions:
- source_word: וַֽיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of יְהוָה as 'the LORD,'
    following Jewish reverence tradition and the LXX pattern.
- source_word: נָתַן
  chosen: gave
  alternatives:
  - granted
  - caused
  lexicon: HALOT
  rationale: The verb's plain sense is 'gave.' In context it governs 'favor,' yielding
    idiomatic English without over-interpretation.
- source_word: חֵן
  chosen: favor
  alternatives:
  - grace
  - acceptance
  lexicon: HALOT
  rationale: In this context חֵן denotes favorable disposition or goodwill from the
    Egyptians toward Israel. 'Favor' is the most natural English equivalent here.
- source_word: בְּעֵינֵי
  chosen: in the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for evaluation or perception. 'In the eyes
    of' preserves the idiom transparently in readable English.
- source_word: וַיַּשְׁאִלוּם
  chosen: they let them ask
  alternatives:
  - they granted their request
  - they gave to them what they asked
  - they lent to them
  lexicon: HALOT
  rationale: The underlying verb שאל in the Hiphil can mean 'cause to ask,' and in
    this Exodus context has long been debated between 'lend' and 'give on request.'
    Because the immediate context concerns the Egyptians responding favorably to Israel's
    request for valuables, 'they let them ask' stays close to the morphology while
    avoiding the misleading implication of a normal loan expected to be repaid. The
    more traditional 'lent to them' is preserved in a footnote.
- source_word: וַיְנַצְּלוּ
  chosen: they plundered
  alternatives:
  - they despoiled
  - they stripped
  lexicon: HALOT
  rationale: The Piel of נצל here means to strip off or despoil. 'Plundered' is clear
    modern English and captures the force of the result clause.
- source_word: אֶת מִצְרָיִם
  chosen: Egypt
  alternatives:
  - the Egyptians
  lexicon: HALOT
  rationale: The object is the nation/entity Egypt as a collective, not merely individual
    Egyptians. 'Egypt' is the natural rendering in English for the corporate object
    of despoiling.
