theological_decisions:
- issue: Whether to render וַיַּשְׁאִלוּם with traditional 'lent to them' or with
    a request/grant sense
  chosen_reading: so that they let them ask
  alternative_readings:
  - so that they lent to them
  - so that they granted their request
  rationale: The verse describes the LORD giving Israel favor so that the Egyptians
    responded positively to their requests. Rendering the verb as a straightforward
    loan in English can suggest an ordinary commercial transaction and obscure the
    narrative emphasis that Egypt was despoiled under divine judgment. The chosen
    wording preserves the causative/request nuance without importing repayment expectations.
    The traditional alternative is preserved in a footnote because it is a longstanding
    rendering and lexically possible.
  doctrine_reference: Translation philosophy §§1, 3, 5
