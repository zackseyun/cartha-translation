theological_decisions:
- issue: Referent of the final pronoun בוֹ
  chosen_reading: the Passover animal as a whole ('of it')
  alternative_readings:
  - the lamb specifically
  rationale: The Hebrew pronoun is masculine singular and refers to the Passover victim
    under discussion. English 'of it' preserves the immediate referent without importing
    a more specific noun than the verse itself states, while remaining compatible
    with the broader Passover-lamb context.
