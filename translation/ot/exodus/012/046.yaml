id: EXO.12.46
reference: Exodus 12:46
source:
  edition: WLC
  text: בְּ/בַ֤יִת אֶחָד֙ יֵאָכֵ֔ל לֹא תוֹצִ֧יא מִן הַ/בַּ֛יִת מִן הַ/בָּשָׂ֖ר ח֑וּצָ/ה
    וְ/עֶ֖צֶם לֹ֥א תִשְׁבְּרוּ בֽ/וֹ־־־־׃
translation:
  text: It shall be eaten in one house; you shall not take any of the meat outside
    the house, and you shall not break a bone of it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in one household.' The Hebrew word can denote either the physical house
      or the household gathered there.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּבַיִת אֶחָד
  chosen: in one house
  alternatives:
  - in one household
  - in a single house
  lexicon: HALOT
  rationale: בַּיִת literally denotes a house/household. Here the immediate contrast
    with taking meat 'outside the house' favors the concrete spatial sense 'house,'
    while still implying the household setting of the Passover meal.
- source_word: יֵאָכֵל
  chosen: shall be eaten
  alternatives:
  - is to be eaten
  - must be eaten
  lexicon: HALOT
  rationale: Niphal imperfect of אכל functions as an instruction about the Passover
    animal. 'Shall be eaten' preserves the passive form and legal-register force without
    over-paraphrasing.
- source_word: לֹא תוֹצִיא
  chosen: you shall not take
  alternatives:
  - you shall not bring out
  - do not carry out
  lexicon: HALOT
  rationale: Hiphil of יצא means 'cause to go out, bring out.' 'Take' is idiomatic
    in English with the following object ('any of the meat') while retaining the prohibition
    against removing it from the house.
- source_word: מִן הַבַּיִת
  chosen: outside the house
  alternatives:
  - from the house
  lexicon: HALOT
  rationale: The phrase is completed by חוּצָה, so the sense is not merely source
    ('from the house') but movement to the exterior. Rendering the whole clause as
    'outside the house' communicates the destination clearly in natural English.
- source_word: מִן הַבָּשָׂר
  chosen: any of the meat
  alternatives:
  - from the flesh
  - any of the flesh
  lexicon: HALOT
  rationale: בָּשָׂר literally means 'flesh,' but in food context 'meat' is the natural
    English equivalent. 'Any of the meat' reflects the partitive use of מִן.
- source_word: חוּצָה
  chosen: outside
  alternatives:
  - outdoors
  - to the outside
  lexicon: HALOT
  rationale: Directional adverb meaning outward/outside. 'Outside' is concise and
    idiomatic with the preceding prohibition.
- source_word: וְעֶצֶם לֹא תִשְׁבְּרוּ בוֹ
  chosen: and you shall not break a bone of it
  alternatives:
  - and you shall not break any bone in it
  - and do not break a bone in it
  lexicon: HALOT
  rationale: עֶצֶם is singular 'bone,' used collectively in this idiom. 'A bone of
    it' is standard English and preserves the distributive sense that no bone of the
    Passover animal is to be broken. בוֹ refers back to the animal/lamb being eaten.
