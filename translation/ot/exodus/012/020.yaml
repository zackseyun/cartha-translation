id: EXO.12.20
reference: Exodus 12:20
source:
  edition: WLC
  text: כָּל מַחְמֶ֖צֶת לֹ֣א תֹאכֵ֑לוּ בְּ/כֹל֙ מוֹשְׁבֹ֣תֵי/כֶ֔ם תֹּאכְל֖וּ מַצּֽוֹת־׃פ
translation:
  text: You shall not eat anything leavened; in all your dwellings you shall eat unleavened
    bread.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'no leavened thing shall you eat.' The Hebrew term is broader than bread
      alone and includes anything made leavened.
    reason: lexical_alternative
  - marker: b
    text: Or 'throughout all your settlements.' The phrase refers to every place where
      you live.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: anything
  alternatives:
  - all
  - any
  lexicon: HALOT
  rationale: 'With the following singular noun מַחְמֶצֶת in a prohibition, the sense
    is comprehensive: no leavened thing whatsoever is to be eaten. ''Anything'' gives
    natural English while preserving the totalizing force.'
- source_word: מַחְמֶצֶת
  chosen: anything leavened
  alternatives:
  - leavened thing
  - that which is leavened
  - leavened bread
  lexicon: HALOT
  rationale: The noun denotes something fermented/leavened, not specifically 'leaven'
    as an ingredient here. 'Anything leavened' best captures the broad prohibition
    and avoids narrowing the object to bread alone.
- source_word: לֹא תֹאכֵלוּ
  chosen: you shall not eat
  alternatives:
  - do not eat
  - you must not eat
  lexicon: HALOT
  rationale: The imperfect with לֹא in legal/instructional context is well rendered
    as a prohibition. 'You shall not eat' preserves the covenantal/legal tone of the
    command.
- source_word: בְּכֹל מוֹשְׁבֹתֵיכֶם
  chosen: in all your dwellings
  alternatives:
  - throughout all your settlements
  - in all your homes
  - wherever you live
  lexicon: HALOT
  rationale: מוֹשָׁב can denote dwelling place/settlement. Here the phrase extends
    the command to every place the Israelites live. 'In all your dwellings' is clear,
    fairly formal, and fits the domestic Passover context.
- source_word: תֹּאכְלוּ
  chosen: you shall eat
  alternatives:
  - you are to eat
  - eat
  lexicon: HALOT
  rationale: The second imperfect functions as a positive command corresponding to
    the prohibition. 'You shall eat' maintains parallelism with the first clause.
- source_word: מַצּוֹת
  chosen: unleavened bread
  alternatives:
  - unleavened loaves
  - matzot
  lexicon: HALOT
  rationale: The term refers to bread made without leaven. 'Unleavened bread' is the
    standard transparent English rendering and is more accessible than transliteration.
