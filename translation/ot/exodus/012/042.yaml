id: EXO.12.42
reference: Exodus 12:42
source:
  edition: WLC
  text: לֵ֣יל שִׁמֻּרִ֥ים הוּא֙ לַֽ/יהוָ֔ה לְ/הוֹצִיאָ֖/ם מֵ/אֶ֣רֶץ מִצְרָ֑יִם הֽוּא הַ/לַּ֤יְלָה הַ/זֶּה֙ לַֽ/יהוָ֔ה שִׁמֻּרִ֛ים לְ/כָל בְּנֵ֥י יִשְׂרָאֵ֖ל לְ/דֹרֹתָֽ/ם־־׃פ
translation:
  text: It was a night of vigil for Yahweh, to bring them out from the land of Egypt; this same night is a vigil for Yahweh for all the children of Israel throughout their generations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a night of watching' or 'a night of observance.' The Hebrew שִׁמֻּרִים carries the sense of watchfulness/keeping and may also imply commemorative observance.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵיל
  chosen: night of
  alternatives:
  - night
  lexicon: HALOT
  rationale: Construct form with the following plural noun yields the sense 'night of ...' rather than a standalone 'night.'
- source_word: שִׁמֻּרִים
  chosen: vigil
  alternatives:
  - watching
  - keeping watch
  - observance
  lexicon: HALOT
  rationale: From the root שׁמר ('keep/watch'). Here it denotes a night marked by watchfulness/keeping. 'Vigil' captures both the concrete sense of watchfulness and the commemorative character of the night without over-paraphrasing.
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - to the LORD
  - belonging to the LORD
  lexicon: HALOT
  rationale: The preposition ל here indicates relation/dedication. 'For the LORD' reads naturally in English and preserves the idea that the night is specially associated with and devoted to him. Per doctrine, יהוה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name in accordance with DOCTRINE.md contested terms table.
- source_word: לְהוֹצִיאָם
  chosen: to bring them out
  alternatives:
  - for bringing them out
  - when he brought them out
  lexicon: HALOT
  rationale: 'Infinitive construct with prefixed ל expresses purpose/result: the night was for the LORD in relation to his bringing them out. ''To bring them out'' is a clear, minimally interpretive English rendering.'
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of Egypt
  lexicon: HALOT
  rationale: Retains the explicit noun 'land' present in the Hebrew rather than compressing it.
- source_word: הוּא הַלַּיְלָה הַזֶּה
  chosen: this same night is
  alternatives:
  - that is this night
  - it is this night
  lexicon: HALOT
  rationale: The repeated pronoun plus demonstrative gives emphatic identification. 'This same night' conveys the Hebrew emphasis and links the second clause to the first.
- source_word: שִׁמֻּרִים
  chosen: a vigil
  alternatives:
  - a night of watching
  - an observance
  lexicon: HALOT
  rationale: Repeated noun should be rendered consistently. The article is absent here as in the first occurrence; English idiom naturally supplies 'a' in predicative position.
- source_word: לְכָל בְּנֵי יִשְׂרָאֵל
  chosen: for all the children of Israel
  alternatives:
  - for all the Israelites
  - for all the sons of Israel
  lexicon: HALOT
  rationale: '''Children of Israel'' preserves the familial covenantal expression בני ישראל more closely than the flatter ethnic label ''Israelites.'''
- source_word: לְדֹרֹתָם
  chosen: throughout their generations
  alternatives:
  - for their generations
  - from generation to generation
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the Hebrew phrase indicating ongoing observance across successive generations.
