theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of שִׁמֻּרִים in a cultic-historical context
  chosen_reading: vigil
  alternative_readings:
  - watching
  - observance
  rationale: '''Vigil'' preserves the tension between literal watchfulness and commemorative sacred observance. This avoids flattening the term into either a purely ritual ''observance'' or a merely physical ''watching.'''
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
