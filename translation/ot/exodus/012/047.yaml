id: EXO.12.47
reference: Exodus 12:47
source:
  edition: WLC
  text: כָּל עֲדַ֥ת יִשְׂרָאֵ֖ל יַעֲשׂ֥וּ אֹתֽ/וֹ־׃
translation:
  text: All the congregation of Israel shall do it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The whole assembly of Israel shall observe it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - The whole
  lexicon: HALOT
  rationale: Quantifier indicating totality. 'All' is natural modern English and preserves
    the comprehensive scope.
- source_word: עֲדַת
  chosen: the congregation of
  alternatives:
  - the assembly of
  - the community of
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled covenant community. 'Congregation'
    fits the communal/cultic context of Passover regulations and is idiomatic with
    'of Israel.'
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Proper name retained by standard transliteration convention.
- source_word: יַעֲשׂוּ
  chosen: shall do
  alternatives:
  - shall observe
  - shall keep
  - must do
  lexicon: HALOT
  rationale: עשה has the broad sense 'do/make.' Here it refers to carrying out the
    Passover observance. 'Shall do' stays closer to the Hebrew while remaining clear
    in context; more interpretive options like 'observe' are possible but less formally
    transparent.
- source_word: אֹתוֹ
  chosen: it
  alternatives:
  - this
  - this rite
  lexicon: HALOT
  rationale: The 3ms pronominal object refers back to the Passover observance/lamb
    in the immediate context. 'It' preserves the Hebrew pronoun without over-specifying
    the referent in the main text.
