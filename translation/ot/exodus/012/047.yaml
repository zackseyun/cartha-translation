theological_decisions:
- issue: Corporate subject in Passover command
  chosen_reading: 'The verse addresses the covenant people corporately: ''All the
    congregation of Israel shall do it.'''
  alternative_readings:
  - Every individual Israelite shall do it
  rationale: The singular collective noun with the national identifier naturally denotes
    the whole covenant community as a body, not necessarily each individual in isolation.
    This preserves the communal force of the Passover legislation without importing
    a stricter individualizing claim than the Hebrew states.
