id: EXO.12.23
reference: Exodus 12:23
source:
  edition: WLC
  text: וְ/עָבַ֣ר יְהוָה֮ לִ/נְגֹּ֣ף אֶת מִצְרַיִם֒ וְ/רָאָ֤ה אֶת הַ/דָּם֙ עַל הַ/מַּשְׁק֔וֹף
    וְ/עַ֖ל שְׁתֵּ֣י הַ/מְּזוּזֹ֑ת וּ/פָסַ֤ח יְהוָה֙ עַל הַ/פֶּ֔תַח וְ/לֹ֤א יִתֵּן֙
    הַ/מַּשְׁחִ֔ית לָ/בֹ֥א אֶל בָּתֵּי/כֶ֖ם לִ/נְגֹּֽף־־־־־׃
translation:
  text: For the LORD will pass through to strike Egypt, and when he sees the blood
    on the lintel and on the two doorposts, the LORD will pass over the doorway and
    will not allow the destroyer to enter your houses to strike.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will spare' or 'will protect' for 'will pass over'; the Hebrew verb
      is the one associated with Passover.
    reason: lexical_alternative
  - marker: b
    text: '''The destroyer'' is left unspecified in the Hebrew; some understand an
      angelic agent of judgment.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD,' following
    Jewish reverence tradition and the LXX pattern.
- source_word: וְעָבַר
  chosen: will pass through
  alternatives:
  - passed through
  - will pass over
  lexicon: HALOT
  rationale: The verb עבר here denotes movement through/among the land in order to
    strike Egypt. 'Will pass through' fits the context better than 'pass over,' which
    is reserved in this verse for פסח.
- source_word: לִנְגֹּף
  chosen: to strike
  alternatives:
  - to plague
  - to smite
  lexicon: HALOT
  rationale: נגף in this context refers to striking with deadly judgment. 'Strike'
    is clear modern English and preserves the severity without archaic diction.
- source_word: מִצְרַיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: Standard rendering of the place name in context; here it refers to the
    land/people of Egypt under judgment.
- source_word: וְרָאָה
  chosen: when he sees
  alternatives:
  - and he will see
  - and seeing
  lexicon: HALOT
  rationale: Although formally a waw + qatal, in this sequence it carries forward
    the future sense after the initial clause. 'When he sees' expresses the temporal
    force naturally in English.
- source_word: הַדָּם
  chosen: the blood
  lexicon: HALOT
  rationale: Definite reference to the sacrificial blood previously applied to the
    house.
- source_word: הַמַּשְׁקוֹף
  chosen: the lintel
  alternatives:
  - the top of the doorway
  - the crossbeam
  lexicon: HALOT
  rationale: משקוף denotes the upper horizontal part of the doorframe. 'Lintel' is
    the standard precise architectural term.
- source_word: שְׁתֵּי הַמְּזוּזוֹת
  chosen: the two doorposts
  alternatives:
  - the two side posts
  lexicon: HALOT
  rationale: מזוזות are the vertical doorposts. 'The two doorposts' is both precise
    and natural.
- source_word: וּפָסַח
  chosen: will pass over
  alternatives:
  - will spare
  - will protect
  lexicon: HALOT
  rationale: פסח is the key verb behind Passover. 'Pass over' preserves the lexical
    connection and the imagery of the LORD's protective action, while alternatives
    like 'spare' interpret the effect rather than translate the term directly.
- source_word: עַל הַפֶּתַח
  chosen: the doorway
  alternatives:
  - the entrance
  - the door
  lexicon: HALOT
  rationale: פתח here refers to the house entrance/opening. 'Doorway' fits the physical
    setting and avoids confusion with the blood-marked structural elements already
    named.
- source_word: וְלֹא יִתֵּן
  chosen: will not allow
  alternatives:
  - will not permit
  - will not give
  lexicon: HALOT
  rationale: נתן plus infinitive here idiomatically means to permit. 'Will not allow'
    is idiomatic modern English.
- source_word: הַמַּשְׁחִית
  chosen: the destroyer
  alternatives:
  - the destroying one
  - the destroyer angel
  lexicon: HALOT
  rationale: The noun denotes the agent of destruction. 'The destroyer' is the most
    natural rendering. 'Destroyer angel' would import specificity not stated in the
    Hebrew.
- source_word: לָבֹא אֶל בָּתֵּיכֶם
  chosen: to enter your houses
  alternatives:
  - to come into your houses
  lexicon: HALOT
  rationale: בוא אל with houses naturally means entering them. 'Enter your houses'
    is concise and idiomatic.
- source_word: לִנְגֹּף
  chosen: to strike
  alternatives:
  - to plague
  - to smite
  lexicon: HALOT
  rationale: The repeated infinitive echoes the earlier judgment language; keeping
    'to strike' preserves consistency within the verse.
