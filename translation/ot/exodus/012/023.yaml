theological_decisions:
- issue: Relationship between the LORD and 'the destroyer'
  chosen_reading: 'Render both distinctly: the LORD acts in judgment and also restrains
    ''the destroyer'' from entering Israelite houses.'
  alternative_readings:
  - Treat 'the destroyer' as simply another way of referring to the LORD himself
  - Specify 'destroying angel' in the main text
  rationale: The Hebrew distinguishes יְהוָה from הַמַּשְׁחִית in this clause, so
    the translation preserves that distinction without overdefining the destroyer's
    identity. This maintains the text's theological tension rather than resolving
    it beyond what the Hebrew states.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of פסח in this verse
  chosen_reading: Translate as 'pass over' in the main text while allowing the protective
    nuance to remain implicit.
  alternative_readings:
  - spare
  - protect
  rationale: The verb is central to the Passover narrative and should retain its lexical
    identity in English. While some argue for a stronger sense like 'protect,' the
    immediate context already expresses protection through the LORD's preventing the
    destroyer from entering, so 'pass over' best preserves both wording and narrative
    resonance.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it.
