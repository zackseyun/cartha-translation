id: EXO.12.3
reference: Exodus 12:3
source:
  edition: WLC
  text: דַּבְּר֗וּ אֶֽל כָּל עֲדַ֤ת יִשְׂרָאֵל֙ לֵ/אמֹ֔ר בֶּ/עָשֹׂ֖ר לַ/חֹ֣דֶשׁ הַ/זֶּ֑ה
    וְ/יִקְח֣וּ לָ/הֶ֗ם אִ֛ישׁ שֶׂ֥ה לְ/בֵית אָבֹ֖ת שֶׂ֥ה לַ/בָּֽיִת־־־׃
translation:
  text: Speak to all the congregation of Israel, saying, ‘On the tenth day of this
    month each man shall take for himself a lamb according to his fathers’ house,
    a lamb for the household.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew שֶׂה can refer more broadly to a young member of the flock, whether
      a sheep or a goat; here it is rendered 'lamb' because of the Passover context
      and established English usage.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבְּרוּ
  chosen: Speak
  alternatives:
  - Tell
  - Say
  lexicon: HALOT
  rationale: Piel imperative plural of דבר, a direct command to address the people.
    'Speak' preserves the formal force and matches the following לֵאמֹר construction
    naturally in English.
- source_word: כָּל עֲדַת יִשְׂרָאֵל
  chosen: all the congregation of Israel
  alternatives:
  - the whole community of Israel
  - all the assembly of Israel
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled covenant community. 'Congregation'
    preserves the corporate and somewhat formal sense better than the flatter 'community,'
    while remaining natural English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and say
  - to say
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing the content of the speech.
    'Saying' is concise and idiomatic in English Bible style without being archaic.
- source_word: בֶּעָשֹׂר לַחֹדֶשׁ הַזֶּה
  chosen: On the tenth day of this month
  alternatives:
  - On the tenth of this month
  lexicon: HALOT
  rationale: The Hebrew literally says 'on the tenth of this month.' Expanding with
    'day' makes the temporal expression clear in natural English while staying close
    to the source.
- source_word: וְיִקְחוּ לָהֶם
  chosen: shall take for himself
  alternatives:
  - are to take for themselves
  - must take for themselves
  lexicon: HALOT
  rationale: The prefixed verb has directive force in this legal/instructional context.
    Because the distributive subject is immediately specified by אִישׁ ('each man'),
    English shifts naturally to singular 'for himself' to reflect the individual obligation.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - each person
  lexicon: HALOT
  rationale: Gender-accurate rendering follows the stated philosophy. Here אִישׁ is
    distributive singular, and 'each man' preserves the Hebrew form while functioning
    representatively for each household head in context.
- source_word: שֶׂה
  chosen: a lamb
  alternatives:
  - a head of small livestock
  - a sheep or goat
  lexicon: HALOT
  rationale: שֶׂה can denote a member of the flock, whether sheep or goat. However,
    in Passover context 'lamb' is the established and contextually fitting rendering
    in English. The broader lexical possibility is worth preserving in a footnote.
- source_word: לְבֵית אָבֹת
  chosen: according to his fathers’ house
  alternatives:
  - for a father's household
  - by ancestral house
  lexicon: HALOT
  rationale: The phrase denotes the patrilineal family unit or clan subdivision. 'According
    to his fathers’ house' preserves the social structure reflected in the Hebrew
    better than a generalized 'family.'
- source_word: שֶׂה לַבָּיִת
  chosen: a lamb for the household
  alternatives:
  - a lamb for the house
  lexicon: HALOT
  rationale: בַּיִת here refers to the domestic household rather than the physical
    building. 'Household' communicates the intended social unit in clear modern English.
