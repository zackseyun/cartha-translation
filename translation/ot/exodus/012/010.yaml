id: EXO.12.10
reference: Exodus 12:10
source:
  edition: WLC
  text: וְ/לֹא תוֹתִ֥ירוּ מִמֶּ֖/נּוּ עַד בֹּ֑קֶר וְ/הַ/נֹּתָ֥ר מִמֶּ֛/נּוּ עַד בֹּ֖קֶר
    בָּ/אֵ֥שׁ תִּשְׂרֹֽפוּ־־־׃
translation:
  text: You shall not leave any of it until morning, and what remains of it until
    morning you shall burn with fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what is left over of it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תוֹתִירוּ
  chosen: leave
  alternatives:
  - let remain
  - keep over
  lexicon: HALOT
  rationale: Hiphil of יתר here means to leave over or leave remaining. 'Leave' is
    idiomatic modern English and fits the prohibition about not retaining any portion
    of the Passover lamb.
- source_word: מִמֶּנּוּ
  chosen: of it
  alternatives:
  - from it
  - any of it
  lexicon: HALOT
  rationale: The preposition מן with pronominal suffix is naturally rendered 'of it'
    in English in this context. In the first clause, 'any of it' is implied by the
    negative command and made explicit in English for clarity.
- source_word: עַד בֹּקֶר
  chosen: until morning
  alternatives:
  - until the morning
  - by morning
  lexicon: HALOT
  rationale: The phrase denotes the limit of time. 'Until morning' is the most natural
    English rendering and preserves the temporal boundary without over-specifying
    the article.
- source_word: הַנֹּתָר
  chosen: what remains
  alternatives:
  - the remainder
  - what is left over
  lexicon: HALOT
  rationale: The Niphal participle of יתר refers to that which remains. 'What remains'
    is clear, natural, and preserves the sense of any leftover portion.
- source_word: בָּאֵשׁ
  chosen: with fire
  alternatives:
  - in the fire
  - by fire
  lexicon: HALOT
  rationale: The beth preposition with 'fire' can be rendered several ways. 'With
    fire' is standard English with 'burn' and communicates the means without awkwardness.
- source_word: תִּשְׂרֹפוּ
  chosen: you shall burn
  alternatives:
  - you must burn
  - burn
  lexicon: HALOT
  rationale: The imperfect in this legal/instructional context carries directive force.
    'You shall burn' matches the surrounding command style and preserves the imperative
    force in a formal yet readable way.
