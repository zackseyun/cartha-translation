theological_decisions:
- issue: Nature of the command regarding leftover Passover meat
  chosen_reading: A direct prohibition followed by a required disposal instruction
  alternative_readings:
  - A merely practical instruction without legal force
  rationale: 'The verse gives covenantal ritual instructions: first, none is to be
    left until morning; second, any remainder is to be burned. The translation preserves
    both commands straightforwardly without importing symbolic interpretation not
    stated in the verse itself.'
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
