id: EXO.12.1
reference: Exodus 12:1
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל מֹשֶׁ֣ה וְ/אֶֽל אַהֲרֹ֔ן בְּ/אֶ֥רֶץ מִצְרַ֖יִם לֵ/אמֹֽר־־׃
translation:
  text: Now the LORD said to Moses and to Aaron in the land of Egypt, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; alternatively rendered ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Now ... said
  alternatives:
  - And ... said
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive with אמר advances the narrative. 'Now ... said' is
    natural modern English and preserves the discourse shift without sounding overly
    wooden. 'And' or 'Then' are possible, but 'Now' fits the introduction to a major
    new section.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the Septuagintal pattern.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition; 'to' is the clear modern equivalent.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: וְאֶל
  chosen: and to
  alternatives:
  - and
  lexicon: HALOT
  rationale: The repeated preposition before Aaron is explicit in Hebrew and is best
    represented in English as 'and to,' preserving the coordinated address to both
    men.
- source_word: אַהֲרֹן
  chosen: Aaron
  rationale: Standard English transliteration of the personal name.
- source_word: בְּאֶרֶץ מִצְרַיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'in the land of Egypt.' Retaining 'land' preserves
    the formal wording and geographic setting, while remaining natural in English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - as follows
  lexicon: HALOT
  rationale: This infinitive introduces the following speech in standard biblical
    style. 'Saying' keeps the formal linkage to verse 2; although somewhat wooden
    in isolation, it is appropriate because the sentence continues in the next verse.
