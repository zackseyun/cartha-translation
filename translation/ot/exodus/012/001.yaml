theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This is not a theological reinterpretation of the verse's content, but a
    translation-policy decision that should be documented because the term is doctrinally
    significant and explicitly listed in the contested terms table.
