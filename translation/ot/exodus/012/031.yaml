id: EXO.12.31
reference: Exodus 12:31
source:
  edition: WLC
  text: וַ/יִּקְרָא֩ לְ/מֹשֶׁ֨ה וּֽ/לְ/אַהֲרֹ֜ן לַ֗יְלָה וַ/יֹּ֨אמֶר֙ ק֤וּמוּ צְּאוּ֙ מִ/תּ֣וֹךְ עַמִּ֔/י גַּם אַתֶּ֖ם גַּם בְּנֵ֣י יִשְׂרָאֵ֑ל וּ/לְכ֛וּ עִבְד֥וּ אֶת יְהוָ֖ה כְּ/דַבֶּרְ/כֶֽם־־־׃
translation:
  text: Then he called for Moses and Aaron by night and said, “Rise up, go out from among my people, both you and the sons of Israel, and go, serve Yahweh, as you have said.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the sons of Israel.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'at night.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: he called for
  alternatives:
  - he summoned
  - he called
  lexicon: HALOT
  rationale: The verb קרא in this context introduces Pharaoh's urgent nighttime summons. 'Called for' is idiomatic English that preserves the action without overformalizing it as 'summoned,' though that is a viable alternative.
- source_word: לַיְלָה
  chosen: by night
  alternatives:
  - at night
  - during the night
  lexicon: HALOT
  rationale: The adverbial accusative indicates time. 'By night' preserves the terse narrative force and the marked timing of the event; 'at night' would also be acceptable.
- source_word: קוּמוּ
  chosen: Rise up
  alternatives:
  - Get up
  - Arise
  lexicon: HALOT
  rationale: The imperative conveys urgency. 'Rise up' is natural modern English while retaining the elevated force of the command better than the more colloquial 'Get up.'
- source_word: צְּאוּ
  chosen: go out
  alternatives:
  - leave
  - depart
  lexicon: HALOT
  rationale: יצא is straightforwardly 'go out/come out.' 'Go out' preserves the spatial sense that Pharaoh is ordering them out from Egypt/from his people, rather than the more interpretive 'leave.'
- source_word: מִתּוֹךְ עַמִּי
  chosen: from among my people
  alternatives:
  - from the midst of my people
  - out of my people
  lexicon: HALOT
  rationale: מִתּוֹךְ literally means 'from the midst of.' 'From among my people' is idiomatic and preserves the sense of removal from within the Egyptian populace.
- source_word: גַּם אַתֶּם גַּם בְּנֵי יִשְׂרָאֵל
  chosen: both you and the sons of Israel
  alternatives:
  - you as well as the Israelites
  - both you and the people of Israel
  lexicon: HALOT
  rationale: 'The repeated גַּם...גַּם marks inclusion/emphasis: not only Moses and Aaron but also Israel. ''Sons of Israel'' preserves the Hebrew idiom and the source''s gender-accurate familial expression; ''people of Israel'' is smoother but less formally aligned.'
- source_word: וּלְכוּ
  chosen: and go
  alternatives:
  - and depart
  - go on
  lexicon: HALOT
  rationale: הלך here continues the chain of imperatives. Rendering it simply as 'and go' preserves the sequence and avoids collapsing it into the previous command.
- source_word: עִבְדוּ
  chosen: serve
  alternatives:
  - worship
  - perform service for
  lexicon: HALOT
  rationale: עבד with God can denote service/worship. 'Serve' is the broader and more literal term, preserving the covenantal and cultic range without narrowing it to liturgical worship alone.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כְּדַבֶּרְכֶם
  chosen: as you have said
  alternatives:
  - as you said
  - according to your word
  lexicon: HALOT
  rationale: The preposition כ plus infinitive/verb form conveys conformity to what Moses and Aaron had requested. 'As you have said' reads naturally in English and reflects Pharaoh's concession to their stated demand.
