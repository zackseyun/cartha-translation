id: EXO.12.28
reference: Exodus 12:28
source:
  edition: WLC
  text: וַ/יֵּלְכ֥וּ וַ/יַּֽעֲשׂ֖וּ בְּנֵ֣י יִשְׂרָאֵ֑ל כַּ/אֲשֶׁ֨ר צִוָּ֧ה יְהוָ֛ה
    אֶת מֹשֶׁ֥ה וְ/אַהֲרֹ֖ן כֵּ֥ן עָשֽׂוּ־׃ס
translation:
  text: Then the sons of Israel went and did so; just as the LORD had commanded Moses
    and Aaron, so they did.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “the Israelites.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  chosen: went
  alternatives:
  - departed
  - went away
  lexicon: HALOT
  rationale: 'From הלך, the wayyiqtol advances the narrative: ''went'' is the natural
    English equivalent. In context it likely implies going to carry out the Passover
    instructions, but the verb itself should not be expanded beyond ''went''.'
- source_word: וַיַּעֲשׂוּ
  chosen: did so
  alternatives:
  - did
  - acted
  lexicon: HALOT
  rationale: From עשה, here referring back to the commanded Passover actions. 'Did
    so' is idiomatic English that preserves the anaphoric force without over-specifying
    the object.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Following the gender-accurate principle,
    the main text preserves the masculine familial expression. 'The Israelites' is
    idiomatic but less formally transparent; 'children of Israel' is traditional but
    less precise to בנים.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according to what
  lexicon: HALOT
  rationale: Introduces exact correspondence between command and obedience. 'Just
    as' brings out the emphatic conformity more clearly than a bare 'as'.
- source_word: צִוָּה
  chosen: had commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: 'English past perfect fits the sequence naturally: the LORD''s command
    precedes Israel''s action. The Hebrew perfect itself does not require pluperfect,
    but English style favors it here.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the Septuagintal pattern.
- source_word: אֶת מֹשֶׁה וְאַהֲרֹן
  chosen: Moses and Aaron
  alternatives:
  - through Moses and Aaron
  - to Moses and Aaron
  lexicon: HALOT
  rationale: The direct-object marker אֶת marks Moses and Aaron as the ones whom the
    LORD commanded. English 'commanded Moses and Aaron' is the most straightforward
    rendering; adding 'through' would alter the syntax.
- source_word: כֵּן עָשׂוּ
  chosen: so they did
  alternatives:
  - thus they did
  - they did so
  lexicon: HALOT
  rationale: This resumptive clause reinforces exact obedience. 'So they did' preserves
    the Hebrew emphasis and gives a natural concluding cadence in English.
