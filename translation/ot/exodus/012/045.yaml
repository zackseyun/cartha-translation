theological_decisions:
- issue: Referent of 'it' in Passover legislation
  chosen_reading: '''It'' refers to the Passover animal/meal established in the immediate
    context.'
  alternative_readings:
  - '''it'' refers more narrowly to the Passover lamb'
  rationale: The Hebrew pronoun has an implicit antecedent from the surrounding Passover
    instructions. Rendering simply 'it' preserves the source text's brevity while
    allowing the context to specify the Passover observance/meal.
