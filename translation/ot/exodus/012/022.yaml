id: EXO.12.22
reference: Exodus 12:22
source:
  edition: WLC
  text: וּ/לְקַחְתֶּ֞ם אֲגֻדַּ֣ת אֵז֗וֹב וּ/טְבַלְתֶּם֮ בַּ/דָּ֣ם אֲשֶׁר בַּ/סַּף֒
    וְ/הִגַּעְתֶּ֤ם אֶל הַ/מַּשְׁקוֹף֙ וְ/אֶל שְׁתֵּ֣י הַ/מְּזוּזֹ֔ת מִן הַ/דָּ֖ם
    אֲשֶׁ֣ר בַּ/סָּ֑ף וְ/אַתֶּ֗ם לֹ֥א תֵצְא֛וּ אִ֥ישׁ מִ/פֶּֽתַח בֵּית֖/וֹ עַד בֹּֽקֶר־־־־־־׃
translation:
  text: And you shall take a bunch of hyssop and dip it in the blood that is in the
    basin, and touch the lintel and the two doorposts with some of the blood that
    is in the basin. And none of you shall go out from the entrance of his house until
    morning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'threshold' for 'basin' (Hebrew saph). Here 'basin' is preferred because
      the blood is said to be in it and the hyssop is dipped into it.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲגֻדַּת אֵזוֹב
  chosen: a bunch of hyssop
  alternatives:
  - a bundle of hyssop
  lexicon: HALOT
  rationale: אֲגֻדָּה denotes a bound cluster or bunch. 'Bunch' is natural modern
    English and preserves the concrete ritual implement without overformalizing.
- source_word: אֵזוֹב
  chosen: hyssop
  lexicon: HALOT
  rationale: Standard rendering for the plant term in ritual contexts. Although the
    precise botanical identification is debated, 'hyssop' is the conventional and
    sufficiently transparent English equivalent.
- source_word: בַּדָּם
  chosen: in the blood
  alternatives:
  - into the blood
  lexicon: HALOT
  rationale: With טבל ('dip'), the preposition ב commonly marks what the object is
    dipped in. 'In the blood' is idiomatic and formally close.
- source_word: הַסַּף
  chosen: the basin
  alternatives:
  - the threshold
  lexicon: HALOT
  rationale: In this Passover context, the phrase 'the blood that is in the saph'
    strongly favors a container holding blood rather than a doorstep/threshold. This
    also coheres with the action of dipping hyssop into it. Because 'threshold' is
    a known lexical alternative, it is preserved in a footnote.
- source_word: וְהִגַּעְתֶּם
  chosen: touch
  alternatives:
  - apply
  - strike
  lexicon: HALOT
  rationale: The Hiphil of נגע here means to cause contact with the blood-marked surfaces.
    'Touch' preserves the concrete action without adding interpretive force. 'Apply'
    is possible but slightly more interpretive.
- source_word: הַמַּשְׁקוֹף
  chosen: the lintel
  alternatives:
  - the top of the doorway
  lexicon: HALOT
  rationale: Architectural term for the upper horizontal part of the doorway. 'Lintel'
    is standard and precise English.
- source_word: שְׁתֵּי הַמְּזוּזֹת
  chosen: the two doorposts
  alternatives:
  - the two side posts
  lexicon: HALOT
  rationale: מְזוּזוֹת refers to the vertical doorposts. 'The two doorposts' is the
    clearest natural rendering.
- source_word: מִן הַדָּם
  chosen: with some of the blood
  alternatives:
  - from the blood
  lexicon: HALOT
  rationale: The preposition מִן after the command to touch the frame indicates use
    of part of the blood from the basin. 'With some of the blood' makes the instrumental
    sense clear in English.
- source_word: לֹא תֵצְאוּ אִישׁ
  chosen: none of you shall go out
  alternatives:
  - you shall not go out, each man
  lexicon: HALOT
  rationale: אִישׁ after a plural prohibition has distributive force. 'None of you'
    communicates the sense naturally while preserving the individual application of
    the command.
- source_word: מִפֶּתַח בֵּיתוֹ
  chosen: from the entrance of his house
  alternatives:
  - from the doorway of his house
  lexicon: HALOT
  rationale: פֶּתַח is the opening/entrance. 'Entrance' is slightly broader and natural;
    'doorway' is also possible. The singular suffix on 'his house' reflects the distributive
    אִישׁ and is retained as gender-accurate to the Hebrew form.
- source_word: עַד בֹּקֶר
  chosen: until morning
  alternatives:
  - until daybreak
  lexicon: HALOT
  rationale: Straightforward temporal phrase. 'Until morning' is the most direct rendering.
