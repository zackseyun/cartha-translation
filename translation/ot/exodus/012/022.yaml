theological_decisions:
- issue: Gendered distributive expression אִישׁ ... בֵּיתוֹ
  chosen_reading: And none of you shall go out from the entrance of his house
  alternative_readings:
  - And none of you shall go out from the entrance of your houses
  - No one shall go out from the entrance of the house
  rationale: Following the project's gender-accurate principle, the singular masculine
    distributive is preserved in English as 'his house' rather than neutralizing it.
    The phrase is representative/distributive, not a restriction to males only.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Meaning of הַסַּף in this verse
  chosen_reading: basin
  alternative_readings:
  - threshold
  rationale: The immediate syntax speaks of blood being 'in' the saph and of dipping
    hyssop into it, which strongly supports a vessel/container sense here. Because
    'threshold' is a viable lexical option elsewhere and has interpretive significance
    in Passover discussions, it is preserved in a footnote rather than silently excluded.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
