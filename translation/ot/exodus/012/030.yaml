id: EXO.12.30
reference: Exodus 12:30
source:
  edition: WLC
  text: וַ/יָּ֨קָם פַּרְעֹ֜ה לַ֗יְלָה ה֤וּא וְ/כָל עֲבָדָי/ו֙ וְ/כָל מִצְרַ֔יִם וַ/תְּהִ֛י
    צְעָקָ֥ה גְדֹלָ֖ה בְּ/מִצְרָ֑יִם כִּֽי אֵ֣ין בַּ֔יִת אֲשֶׁ֥ר אֵֽין שָׁ֖ם מֵֽת־־־־׃
translation:
  text: And Pharaoh rose in the night, he and all his servants and all Egypt, and
    there was a great cry in Egypt, for there was no house where there was not someone
    dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'there was not a house where there was not a dead person.'
    reason: lexical_alternative
  - marker: b
    text: '''All Egypt'' uses the land name collectively for the people of Egypt.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּקָם
  chosen: rose
  alternatives:
  - got up
  - arose
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום narrates a simple past action. 'Rose' is concise
    and natural in narrative English, preserving the sudden nighttime action without
    overinterpreting.
- source_word: לַיְלָה הוּא
  chosen: in the night
  alternatives:
  - that night
  - at night
  lexicon: HALOT
  rationale: The phrase literally includes 'night' plus the pronoun 'he/that,' functioning
    idiomatically to specify the time. 'In the night' keeps the nocturnal setting
    clear and close to the Hebrew. 'That night' is possible, but the chosen rendering
    stays slightly more formal.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his officials
  - his attendants
  lexicon: HALOT
  rationale: עֶבֶד commonly means 'servant' or 'slave' depending on context. Here
    it refers to Pharaoh's court personnel in a royal setting, not emphasizing chattel
    status, so 'servants' is the best contextual rendering.
- source_word: וְכָל מִצְרַיִם
  chosen: and all Egypt
  alternatives:
  - and all the Egyptians
  lexicon: HALOT
  rationale: The Hebrew uses the place name collectively. 'All Egypt' is a natural
    metonymy in English and preserves the corporate scope of the calamity.
- source_word: וַתְּהִי
  chosen: there was
  alternatives:
  - there came to be
  - it happened
  lexicon: HALOT
  rationale: With the following noun phrase, היה introduces the occurrence/existence
    of the cry. 'There was' is idiomatic and accurate.
- source_word: צְעָקָה גְדֹלָה
  chosen: a great cry
  alternatives:
  - a loud outcry
  - a great outcry
  lexicon: HALOT
  rationale: צְעָקָה denotes a cry or outcry, often of distress. 'A great cry' preserves
    both the emotional force and the adjective גְדֹלָה without sounding overly technical.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the great cry. 'For' fits the narrative
    register and keeps the causal link explicit.
- source_word: אֵין בַּיִת אֲשֶׁר אֵין שָׁם מֵת
  chosen: there was no house where there was not someone dead
  alternatives:
  - there was not a house where there was not a dead person
  - there was no household without a death
  lexicon: HALOT
  rationale: The Hebrew is emphatic through repeated אֵין ('there is no ... not').
    'House' is retained rather than shifting to 'household' in the main text, since
    בַּיִת literally means 'house' though it can imply household. 'Someone dead' makes
    the verbless Hebrew predicate natural in English while preserving the sense that
    every house had a death.
- source_word: מֵת
  chosen: someone dead
  alternatives:
  - a dead person
  - one dead
  lexicon: HALOT
  rationale: The participial form functions substantivally. 'Someone dead' is idiomatic
    modern English and avoids stiffness while preserving the indefinite force.
