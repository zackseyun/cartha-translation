id: EXO.12.32
reference: Exodus 12:32
source:
  edition: WLC
  text: גַּם צֹאנְ/כֶ֨ם גַּם בְּקַרְ/כֶ֥ם קְח֛וּ כַּ/אֲשֶׁ֥ר דִּבַּרְתֶּ֖ם וָ/לֵ֑כוּ
    וּ/בֵֽרַכְתֶּ֖ם גַּם אֹתִֽ/י־־־׃
translation:
  text: Take both your flocks and your herds, just as you have said, and go—and bless
    me also.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bless even me.' Pharaoh's wording may stress that he too seeks blessing
      as Israel departs.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: both
  alternatives:
  - also
  - even
  lexicon: HALOT
  rationale: The first גַּם coordinates the two livestock categories; 'both' captures
    the paired emphasis more naturally in English than repeating 'also'.
- source_word: צֹאנְכֶם
  chosen: your flocks
  alternatives:
  - your sheep and goats
  - your small livestock
  lexicon: HALOT
  rationale: צֹאן is a collective term for small livestock, especially sheep and goats.
    'Flocks' is idiomatic and sufficiently precise in context.
- source_word: גַּם
  chosen: and
  alternatives:
  - also
  - both
  lexicon: HALOT
  rationale: The second גַּם continues the coordination with בְּקַרְכֶם. In English,
    simple 'and' after 'both' yields the most natural equivalent sense.
- source_word: בְּקַרְכֶם
  chosen: your herds
  alternatives:
  - your cattle
  - your large livestock
  lexicon: HALOT
  rationale: בָּקָר refers to cattle/large livestock. 'Herds' pairs well with 'flocks'
    and preserves the collective sense.
- source_word: קְחוּ
  chosen: Take
  alternatives:
  - take away
  - bring
  lexicon: HALOT
  rationale: Imperative plural from לקח. 'Take' is the straightforward command in
    context as Pharaoh permits departure with livestock.
- source_word: כַּאֲשֶׁר דִּבַּרְתֶּם
  chosen: just as you have said
  alternatives:
  - as you said
  - according to what you said
  lexicon: HALOT
  rationale: This phrase refers back to Moses and Aaron's stated request. 'Just as
    you have said' preserves the comparative force and Pharaoh's concession.
- source_word: וָלֵכוּ
  chosen: and go
  alternatives:
  - and leave
  - depart
  lexicon: HALOT
  rationale: הלך here functions as a command to depart. 'Go' is direct and idiomatic;
    the departure sense is clear from context.
- source_word: וּבֵרַכְתֶּם
  chosen: and bless
  alternatives:
  - and invoke blessing for
  - and bid farewell to with blessing
  lexicon: HALOT
  rationale: ברך in the piel commonly means 'bless.' Here Pharaoh asks for blessing
    from Moses and Aaron. The simple rendering preserves the lexical sense without
    over-interpreting the mechanism.
- source_word: גַּם אֹתִי
  chosen: me also
  alternatives:
  - also me
  - even me
  lexicon: HALOT
  rationale: The phrase adds Pharaoh himself as an object of the requested blessing.
    In the final English line, 'bless me also' is the most natural placement.
