theological_decisions:
- issue: Nature of Pharaoh's request for blessing
  chosen_reading: Render as a straightforward request for blessing without specifying
    whether Pharaoh seeks divine favor through Moses and Aaron or merely a polite
    farewell blessing.
  alternative_readings:
  - a request for intercessory blessing from Israel's God
  - a conventional request for goodwill or farewell
  rationale: The Hebrew verb ברך is clear, but the exact nuance of how Pharaoh expects
    to be blessed is not explicit in the verse. Preserving the simple wording maintains
    the narrative tension without importing a fuller theological explanation than
    the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
