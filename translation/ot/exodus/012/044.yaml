theological_decisions:
- issue: Rendering of slave terminology in covenantal/legal context
  chosen_reading: slave
  alternative_readings:
  - servant
  rationale: Because the verse explicitly describes a person purchased with money,
    the bonded and owned status is central to the meaning. Using 'slave' avoids softening
    the institution and aligns with the translation philosophy's preference for source-text
    realism over traditional euphemism.
  doctrine_reference: Translation philosophy §1; Contested terms table on δοῦλος by
    analogy of bonded-status rendering
- issue: Gendered language for אִישׁ
  chosen_reading: man's
  alternative_readings:
  - person's
  rationale: The Hebrew is grammatically masculine singular and functions as a representative
    legal subject. Per the doctrine statement, gender-accurate rendering is preferred
    over flattening to gender-neutral language unless context requires otherwise.
  doctrine_reference: Translation philosophy §4
