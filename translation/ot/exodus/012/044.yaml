id: EXO.12.44
reference: Exodus 12:44
source:
  edition: WLC
  text: וְ/כָל עֶ֥בֶד אִ֖ישׁ מִקְנַת כָּ֑סֶף וּ/מַלְתָּ֣ה אֹת֔/וֹ אָ֖ז יֹ֥אכַל בּֽ/וֹ־־׃
translation:
  text: But every man's slave, one bought with silver—when you have circumcised him,
    then he may eat of it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every slave of a man, purchased with money.'
    reason: lexical_alternative
  - marker: b
    text: That is, he may participate in the Passover meal only after circumcision.
    reason: cultural_note
lexical_decisions:
- source_word: וְ/כָל
  chosen: But every
  alternatives:
  - And every
  - Now every
  lexicon: HALOT
  rationale: וְ here links this rule to the preceding exclusion of foreigners; 'But
    every' brings out the contrast in natural English while preserving the conjunction
    and distributive force of כָּל.
- source_word: עֶבֶד
  chosen: slave
  alternatives:
  - servant
  lexicon: HALOT
  rationale: The term denotes a bonded person under ownership. In this legal context,
    where purchase with money is explicit, 'slave' better reflects the social reality
    than the softer 'servant,' in line with the project's guidance to use 'slave'
    where bonded status is salient.
- source_word: אִישׁ
  chosen: man's
  alternatives:
  - person's
  - householder's
  lexicon: HALOT
  rationale: אִישׁ is singular masculine and here marks the owner/master. 'Man's'
    preserves the gendered singular form and fits the legal style of the verse. 'Householder'
    is interpretive and broader than the Hebrew.
- source_word: מִקְנַת כָּסֶף
  chosen: one bought with silver
  alternatives:
  - purchased with money
  - acquired for money
  lexicon: HALOT
  rationale: The construct phrase literally refers to an acquisition of silver/money,
    idiomatically a person purchased with money. 'Bought with silver' stays close
    to the Hebrew imagery while remaining clear in English.
- source_word: וּ/מַלְתָּה אֹתוֹ
  chosen: when you have circumcised him
  alternatives:
  - and you circumcise him
  - after you circumcise him
  lexicon: HALOT
  rationale: The qatal with prefixed conjunction in this legal sequence is best rendered
    as a prerequisite action before participation. 'When you have circumcised him'
    expresses the condition naturally in English without losing the direct second-person
    singular address.
- source_word: אָז
  chosen: then
  alternatives:
  - afterward
  - at that time
  lexicon: HALOT
  rationale: אָז marks the consequent step following circumcision. 'Then' is the most
    natural and direct equivalent in this procedural context.
- source_word: יֹאכַל בּוֹ
  chosen: he may eat of it
  alternatives:
  - he may eat it
  - he shall eat of it
  lexicon: HALOT
  rationale: The imperfect here expresses permitted participation in the Passover
    meal. 'May eat of it' conveys authorization rather than mere future action. The
    preposition בּוֹ is naturally represented as 'of it' in English with eating language.
