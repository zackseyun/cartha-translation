id: EXO.12.49
reference: Exodus 12:49
source:
  edition: WLC
  text: תּוֹרָ֣ה אַחַ֔ת יִהְיֶ֖ה לָֽ/אֶזְרָ֑ח וְ/לַ/גֵּ֖ר הַ/גָּ֥ר בְּ/תוֹכְ/כֶֽם׃
translation:
  text: One law shall apply to the native and to the sojourner who sojourns among
    you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'One instruction shall be for the native and for the resident foreigner
      who resides among you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹרָה
  chosen: law
  alternatives:
  - instruction
  lexicon: HALOT
  rationale: In this legal context concerning Passover observance, תּוֹרָה refers
    to a binding legal rule or statute rather than general teaching. 'Law' best fits
    the immediate context and standard legal sense.
- source_word: אַחַת
  chosen: one
  alternatives:
  - same
  - single
  lexicon: HALOT
  rationale: אַחַת emphasizes unity/singleness of the legal standard. 'One' preserves
    the formal force and naturally yields the idiom 'one law.'
- source_word: יִהְיֶה
  chosen: shall apply
  alternatives:
  - shall be
  - will be
  lexicon: HALOT
  rationale: Although literally 'shall be,' English idiom in a legal statement is
    clearer with 'shall apply,' making explicit that the one law governs both groups
    without adding meaning beyond the context.
- source_word: אֶזְרָח
  chosen: the native
  alternatives:
  - the native-born
  - the citizen
  lexicon: HALOT
  rationale: אֶזְרָח denotes an indigenous member of the community. 'The native' is
    concise and natural; 'native-born' is possible but slightly more interpretive,
    and 'citizen' risks importing later political categories.
- source_word: גֵּר
  chosen: the sojourner
  alternatives:
  - the resident foreigner
  - the stranger
  - the alien
  lexicon: HALOT
  rationale: גֵּר refers to a non-native residing among Israel under its social/legal
    order. 'Sojourner' preserves the resident-foreigner sense without the harsh or
    politically loaded connotations of 'alien,' and is more precise than 'stranger.'
- source_word: הַגָּר
  chosen: who sojourns
  alternatives:
  - who resides
  - who dwells as a foreigner
  lexicon: HALOT
  rationale: The participle restates and qualifies גֵּר as one residing among the
    people. 'Who sojourns' preserves the lexical connection with גֵּר and keeps the
    wording transparent to the Hebrew.
- source_word: בְּתוֹכְכֶם
  chosen: among you
  alternatives:
  - in your midst
  lexicon: HALOT
  rationale: '''Among you'' is clear modern English for the communal setting. ''In
    your midst'' is more formal but less natural for contemporary readers.'
