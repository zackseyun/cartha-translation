id: EXO.12.11
reference: Exodus 12:11
source:
  edition: WLC
  text: וְ/כָכָה֮ תֹּאכְל֣וּ אֹת/וֹ֒ מָתְנֵי/כֶ֣ם חֲגֻרִ֔ים נַֽעֲלֵי/כֶם֙ בְּ/רַגְלֵי/כֶ֔ם וּ/מַקֶּלְ/כֶ֖ם בְּ/יֶדְ/כֶ֑ם וַ/אֲכַלְתֶּ֤ם אֹת/וֹ֙ בְּ/חִפָּז֔וֹן פֶּ֥סַח ה֖וּא לַ/יהוָֽה׃
translation:
  text: 'And this is how you shall eat it: with your waist belted, your sandals on your feet, and your staff in your hand. You shall eat it in haste; it is the Passover of Yahweh.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''your loins girded''—an idiom for being dressed and ready to depart immediately.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'it is the LORD's Passover.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְכָכָה
  chosen: And this is how
  alternatives:
  - And thus
  - And in this way
  lexicon: HALOT
  rationale: Introduces the manner in which the meal is to be eaten. 'This is how' is natural modern English while preserving the instructional force of the Hebrew adverbial expression.
- source_word: תֹּאכְלוּ
  chosen: you shall eat
  alternatives:
  - you are to eat
  - you must eat
  lexicon: HALOT
  rationale: Imperfect 2mp in legal/instructional context is well rendered with 'shall' to preserve directive force without sounding overly colloquial.
- source_word: מָתְנֵיכֶם חֲגֻרִים
  chosen: with your waist belted
  alternatives:
  - your loins girded
  - with your belt fastened around your waist
  lexicon: HALOT
  rationale: The idiom refers to being dressed for immediate travel or action. 'Waist belted' preserves the concrete image better than paraphrastic renderings, while avoiding archaic 'loins girded' in the main text.
- source_word: נַעֲלֵיכֶם בְּרַגְלֵיכֶם
  chosen: your sandals on your feet
  alternatives:
  - with your sandals on your feet
  - your shoes on your feet
  lexicon: HALOT
  rationale: נַעַל specifically denotes sandals/footwear of the ancient context; 'sandals' is more historically precise than 'shoes.'
- source_word: וּמַקֶּלְכֶם בְּיֶדְכֶם
  chosen: and your staff in your hand
  alternatives:
  - and your stick in your hand
  lexicon: HALOT
  rationale: מַקֵּל commonly means staff/rod/stick. 'Staff' fits the travel context and standard English biblical usage without unnecessary archaism.
- source_word: וַאֲכַלְתֶּם
  chosen: You shall eat
  alternatives:
  - And you shall eat
  - You are to eat
  lexicon: HALOT
  rationale: Continues the instruction. English repeats the verbal command naturally as a new sentence after the list of circumstances.
- source_word: בְּחִפָּזוֹן
  chosen: in haste
  alternatives:
  - hurriedly
  - in hurried flight
  lexicon: HALOT
  rationale: Conveys urgency and readiness for immediate departure. 'In haste' is concise, idiomatic, and preserves the solemn force of the command.
- source_word: פֶּסַח
  chosen: Passover
  alternatives:
  - passover offering
  lexicon: HALOT
  rationale: In this context the term names the rite/meal itself. 'Passover' is the established and accurate rendering.
- source_word: הוּא לַיהוָה
  chosen: it is the Passover of the LORD
  alternatives:
  - it is the LORD's Passover
  - it is a Passover to the LORD
  lexicon: HALOT
  rationale: The clause identifies the meal as belonging to or designated for YHWH. 'Of the LORD' preserves the genitival relation clearly. The divine name follows the doctrinal default rendering 'the LORD' for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
