id: EXO.12.37
reference: Exodus 12:37
source:
  edition: WLC
  text: וַ/יִּסְע֧וּ בְנֵֽי יִשְׂרָאֵ֛ל מֵ/רַעְמְסֵ֖ס סֻכֹּ֑תָ/ה כְּ/שֵׁשׁ מֵא֨וֹת
    אֶ֧לֶף רַגְלִ֛י הַ/גְּבָרִ֖ים לְ/בַ֥ד מִ/טָּֽף־־׃
translation:
  text: And the sons of Israel journeyed from Rameses to Succoth, about six hundred
    thousand men on foot, besides children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew reads literally 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'set out.' The Hebrew verb can denote breaking camp and beginning a journey.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'about six hundred thousand men on foot' counts the men, with
      children excluded from this number.
    reason: cultural_note
  - marker: d
    text: Or 'besides little ones.' The Hebrew טף refers to children or small dependents.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: journeyed
  alternatives:
  - set out
  - traveled
  lexicon: HALOT
  rationale: The verb נסע in travel contexts commonly means to set out or journey.
    'Journeyed' preserves the narrative movement in readable English without over-paraphrasing.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: A more formal rendering preserves the underlying familial expression
    בני while remaining natural enough in context. 'Israelites' is possible, but 'sons
    of Israel' better reflects the Hebrew wording and aligns with the gender-accurate
    philosophy.
- source_word: מֵרַעְמְסֵס
  chosen: from Rameses
  alternatives:
  - from Raamses
  lexicon: HALOT
  rationale: Standard English transliteration favors 'Rameses.' The preposition מן
    is straightforwardly rendered 'from.'
- source_word: סֻכֹּתָה
  chosen: to Succoth
  alternatives: []
  lexicon: HALOT
  rationale: The directional he on the place name indicates motion toward the destination,
    naturally rendered 'to Succoth.'
- source_word: כְּשֵׁשׁ מֵאוֹת אֶלֶף
  chosen: about six hundred thousand
  alternatives:
  - approximately six hundred thousand
  - some six hundred thousand
  lexicon: HALOT
  rationale: The prefixed כ on the number signals approximation or comparison, so
    'about' is warranted rather than a rigidly exact figure.
- source_word: רַגְלִי
  chosen: on foot
  alternatives:
  - footmen
  lexicon: HALOT
  rationale: The adjective/noun from רגל here denotes those traveling by foot. 'On
    foot' is idiomatic modern English and fits the construction with the following
    noun.
- source_word: הַגְּבָרִים
  chosen: men
  alternatives:
  - males
  - adult men
  lexicon: HALOT
  rationale: גבר emphasizes males/men, likely in distinction from dependents. 'Men'
    is the most natural and sufficiently precise rendering in English.
- source_word: לְבַד מִטָּף
  chosen: besides children
  alternatives:
  - apart from little ones
  - excluding dependents
  lexicon: HALOT
  rationale: טף refers to little ones/children, not the whole population. 'Besides
    children' captures the exclusion of children from the count in clear English.
    'Dependents' is broader than the Hebrew, and 'little ones' is somewhat less natural
    in contemporary English.
