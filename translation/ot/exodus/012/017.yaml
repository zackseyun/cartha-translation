theological_decisions:
- issue: Whether הַמַּצּוֹת should be rendered as the food itself or explicitly as
    the festival
  chosen_reading: Rendered 'the Unleavened Bread' without adding 'feast' in the main
    text.
  alternative_readings:
  - the Feast of Unleavened Bread
  rationale: The Hebrew expression is literally 'the unleavened breads/things' and
    can stand metonymically for the observance. The main text avoids over-specifying
    beyond the source while still allowing the ritual sense in context.
  doctrine_reference: Translation philosophy §1, §5
- issue: How to render חֻקַּת עוֹלָם in accessible modern English
  chosen_reading: Rendered 'as a permanent statute.'
  alternative_readings:
  - as a statute forever
  - as an everlasting statute
  rationale: The phrase denotes enduring covenantal prescription. 'Permanent statute'
    communicates the force in readable modern English without forcing a philosophical
    claim about absolute timelessness beyond the idiom's contextual use.
  doctrine_reference: Translation philosophy §6
