id: EXO.12.17
reference: Exodus 12:17
source:
  edition: WLC
  text: וּ/שְׁמַרְתֶּם֮ אֶת הַ/מַּצּוֹת֒ כִּ֗י בְּ/עֶ֨צֶם֙ הַ/יּ֣וֹם הַ/זֶּ֔ה הוֹצֵ֥אתִי
    אֶת צִבְאוֹתֵי/כֶ֖ם מֵ/אֶ֣רֶץ מִצְרָ֑יִם וּ/שְׁמַרְתֶּ֞ם אֶת הַ/יּ֥וֹם הַ/זֶּ֛ה
    לְ/דֹרֹתֵי/כֶ֖ם חֻקַּ֥ת עוֹלָֽם־־־׃
translation:
  text: And you shall keep the Unleavened Bread, because on this very day I brought
    your hosts out from the land of Egypt. And you shall keep this day throughout
    your generations as a permanent statute.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Feast of Unleavened Bread.' The Hebrew literally says 'the unleavened
      breads/things,' which can refer to the bread itself or, by extension, the festival
      observance.
    reason: lexical_alternative
  - marker: b
    text: Or 'your multitudes,' 'your divisions,' or 'your companies.' The Hebrew
      'hosts' portrays Israel as an ordered body coming out of Egypt.
    reason: lexical_alternative
  - marker: c
    text: Or 'as a statute forever' or 'as an everlasting statute.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁמַרְתֶּם
  chosen: you shall keep
  alternatives:
  - you shall observe
  - you shall guard
  lexicon: HALOT
  rationale: שׁמר commonly means keep, guard, or observe. Here it governs both הַמַּצּוֹת
    and הַיּוֹם הַזֶּה in a ritual context, so 'keep' preserves both the covenantal/ritual
    sense and the repetition in the verse without becoming wooden.
- source_word: הַמַּצּוֹת
  chosen: the Unleavened Bread
  alternatives:
  - the unleavened bread
  - the unleavened loaves
  - the Feast of Unleavened Bread
  lexicon: HALOT
  rationale: Literally 'the unleavened things/breads.' In context this can denote
    either the unleavened bread itself or, metonymically, the festival associated
    with it. 'The Unleavened Bread' preserves the Hebrew expression while allowing
    the ritual/festival sense to be heard. 'Feast of Unleavened Bread' is interpretive
    and adds 'feast,' which is not present.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the command. 'Because' is clearer in modern
    English than 'for' while preserving the causal force.
- source_word: בְּעֶצֶם הַיּוֹם הַזֶּה
  chosen: on this very day
  alternatives:
  - on this same day
  - on the very same day
  lexicon: HALOT
  rationale: The idiom emphasizes exactness and solemnity. 'On this very day' is a
    natural English equivalent that preserves the emphatic force of עֶצֶם in this
    construction.
- source_word: הוֹצֵאתִי
  chosen: I brought out
  alternatives:
  - I brought forth
  - I caused to go out
  lexicon: HALOT
  rationale: Hiphil of יצא means to bring out/cause to go out. 'I brought out' is
    idiomatic and faithful.
- source_word: צִבְאוֹתֵיכֶם
  chosen: your hosts
  alternatives:
  - your multitudes
  - your divisions
  - your companies
  lexicon: HALOT
  rationale: צָבָא often denotes host, army, or organized company. In the exodus context
    it portrays Israel as ordered companies departing Egypt. 'Your hosts' preserves
    the military-organizational nuance better than the flatter 'multitudes.'
- source_word: מֵאֶרֶץ מִצְרָיִם
  chosen: out from the land of Egypt
  alternatives:
  - from the land of Egypt
  - out of the land of Egypt
  lexicon: HALOT
  rationale: The preposition מִן marks source. 'Out from the land of Egypt' keeps
    the exodus movement explicit and pairs well with 'brought ... out.'
- source_word: הַיּוֹם הַזֶּה
  chosen: this day
  alternatives:
  - this very day
  lexicon: HALOT
  rationale: The second occurrence lacks עֶצֶם, so the simpler 'this day' reflects
    the Hebrew wording and avoids importing the earlier emphasis.
- source_word: לְדֹרֹתֵיכֶם
  chosen: throughout your generations
  alternatives:
  - for your generations
  - from generation to generation
  lexicon: HALOT
  rationale: A standard covenantal expression indicating ongoing observance across
    successive generations. 'Throughout your generations' is the most natural established
    equivalent.
- source_word: חֻקַּת עוֹלָם
  chosen: as a permanent statute
  alternatives:
  - as a statute forever
  - as an everlasting statute
  lexicon: HALOT
  rationale: חֻקָּה is a prescribed statute; עוֹלָם can denote enduring/perpetual
    duration within covenantal context. 'Permanent statute' is clear modern English
    and avoids archaic phrasing while preserving the force of ongoing obligation.
