id: EXO.12.25
reference: Exodus 12:25
source:
  edition: WLC
  text: וְ/הָיָ֞ה כִּֽי תָבֹ֣אוּ אֶל הָ/אָ֗רֶץ אֲשֶׁ֨ר יִתֵּ֧ן יְהוָ֛ה לָ/כֶ֖ם כַּ/אֲשֶׁ֣ר
    דִּבֵּ֑ר וּ/שְׁמַרְתֶּ֖ם אֶת הָ/עֲבֹדָ֥ה הַ/זֹּֽאת־־־׃
translation:
  text: And when you come into the land that the LORD will give you, just as he promised,
    you shall keep this service.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'just as he said.' The Hebrew is literally 'just as he spoke,' with the
      sense of prior promise in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'this observance' or 'this rite.' The Hebrew term refers to the Passover
      ritual service.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  chosen: And when
  alternatives:
  - And it shall be, when
  - Now when
  lexicon: HALOT
  rationale: This common Hebrew discourse formula introduces a future circumstance.
    'And when' preserves the temporal force while avoiding wooden English.
- source_word: תָבֹאוּ
  chosen: you come
  alternatives:
  - you enter
  - you go in
  lexicon: HALOT
  rationale: The verb בוא means 'come/enter.' 'Come' fits natural English here and
    works well with 'into the land.'
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the country
  lexicon: HALOT
  rationale: '''Land'' is the standard rendering in covenant and promise contexts
    and preserves the biblical resonance of the promised land.'
- source_word: אֲשֶׁר יִתֵּן יְהוָה לָכֶם
  chosen: that the LORD will give you
  alternatives:
  - which the LORD is giving you
  - that the LORD gives to you
  lexicon: HALOT
  rationale: The yiqtol of נתן here is naturally future in context. Per doctrine,
    יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's default rendering for the divine name, preserving
    established English convention and the reverential substitution pattern.
- source_word: כַּאֲשֶׁר דִּבֵּר
  chosen: just as he promised
  alternatives:
  - as he spoke
  - just as he said
  lexicon: HALOT
  rationale: While דבר is literally 'spoke/said,' in this covenantal context the sense
    is promissory, referring back to the LORD's prior word. 'Promised' communicates
    the force more clearly in idiomatic English.
- source_word: וּשְׁמַרְתֶּם
  chosen: you shall keep
  alternatives:
  - you shall observe
  - you must keep
  lexicon: HALOT
  rationale: שׁמר with a ritual object commonly means 'keep/observe.' 'Keep' is concise
    and preserves covenantal-obligational nuance.
- source_word: הָעֲבֹדָה הַזֹּאת
  chosen: this service
  alternatives:
  - this observance
  - this rite
  - this ritual service
  lexicon: HALOT
  rationale: עֲבֹדָה denotes service or cultic labor. In the Passover context it refers
    to the prescribed ritual practice. 'Service' is slightly more formal and matches
    the cultic setting, while remaining understandable.
