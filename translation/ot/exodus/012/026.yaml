id: EXO.12.26
reference: Exodus 12:26
source:
  edition: WLC
  text: וְ/הָיָ֕ה כִּֽי יֹאמְר֥וּ אֲלֵי/כֶ֖ם בְּנֵי/כֶ֑ם מָ֛ה הָ/עֲבֹדָ֥ה הַ/זֹּ֖את
    לָ/כֶֽם־׃
translation:
  text: And when your sons say to you, ‘What does this service mean to you?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more formally, 'What is this service to you?'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And when
  alternatives:
  - And it shall be
  - And it will happen, when
  lexicon: HALOT
  rationale: The Hebrew formula וְהָיָה כִּי commonly introduces a future contingency
    ('and when it happens that'). In natural English, 'And when' best captures the
    idiom without unnecessary stiffness.
- source_word: כִּי
  chosen: when
  alternatives:
  - that
  - if
  lexicon: HALOT
  rationale: Here כִּי with וְהָיָה introduces a temporal clause, not a causal or
    declarative one.
- source_word: יֹאמְרוּ
  chosen: say
  alternatives:
  - ask
  - speak
  lexicon: HALOT
  rationale: The verb אמר is the standard verb 'say.' Although the content is a question,
    English naturally uses 'say to you' here; 'ask' would be interpretive rather than
    strictly lexical.
- source_word: אֲלֵיכֶם
  chosen: to you
  alternatives:
  - unto you
  lexicon: HALOT
  rationale: Direct and natural rendering of the preposition plus second person plural
    suffix.
- source_word: בְּנֵיכֶם
  chosen: your sons
  alternatives:
  - your children
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural 'sons,' not a gender-neutral
    term for children. Per doctrine, gender-accurate rendering is preferred.
- source_word: מָה
  chosen: What does ... mean
  alternatives:
  - What is
  - Why is
  lexicon: HALOT
  rationale: The interrogative 'what?' in this construction asks for the significance
    of the ritual. English idiom expresses this naturally as 'What does ... mean?'
    rather than the more wooden 'What is ... to you?'.
- source_word: הָעֲבֹדָה
  chosen: service
  alternatives:
  - ritual
  - worship
  - labor
  lexicon: HALOT
  rationale: עֲבֹדָה can denote service, work, or cultic service. In the Passover
    context it refers to the prescribed religious observance, and 'service' preserves
    that breadth without over-specifying.
- source_word: הַזֹּאת
  chosen: this
  alternatives:
  - this particular
  lexicon: HALOT
  rationale: Straightforward demonstrative modifying 'service.'
- source_word: לָכֶם
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The phrase 'what is this service to you?' is idiomatically rendered 'What
    does this service mean to you?' The dative nuance is preserved in 'to you,' indicating
    the significance of the observance for the addressed community.
