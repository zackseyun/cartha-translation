id: EXO.12.39
reference: Exodus 12:39
source:
  edition: WLC
  text: וַ/יֹּאפ֨וּ אֶת הַ/בָּצֵ֜ק אֲשֶׁ֨ר הוֹצִ֧יאוּ מִ/מִּצְרַ֛יִם עֻגֹ֥ת מַצּ֖וֹת
    כִּ֣י לֹ֣א חָמֵ֑ץ כִּֽי גֹרְשׁ֣וּ מִ/מִּצְרַ֗יִם וְ/לֹ֤א יָֽכְלוּ֙ לְ/הִתְמַהְמֵ֔הַּ
    וְ/גַם צֵדָ֖ה לֹא עָשׂ֥וּ לָ/הֶֽם־־־־׃
translation:
  text: And they baked the dough that they had brought out from Egypt into unleavened
    cakes, because it had not leavened; for they had been driven out from Egypt and
    could not delay, and they had not prepared provisions for themselves either.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as cakes of unleavened bread.' The Hebrew expression refers to bread-cakes
      made without leaven.
    reason: lexical_alternative
  - marker: b
    text: Or 'because it was not leavened' or 'because it had not risen.' The Hebrew
      verb refers to the dough not becoming leavened before baking.
    reason: lexical_alternative
  - marker: c
    text: Or 'could not linger.' The sense is that they had no time to remain or wait.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאפוּ
  chosen: they baked
  alternatives:
  - they cooked
  lexicon: HALOT
  rationale: The verb from אפה commonly refers to baking bread or cakes. 'Baked' is
    the natural English equivalent in this food context.
- source_word: הַבָּצֵק
  chosen: the dough
  alternatives:
  - the kneaded dough
  lexicon: HALOT
  rationale: בצק denotes dough. 'The dough' is clear modern English and fits the narrative
    sequence.
- source_word: אֲשֶׁר הוֹצִיאוּ מִמִּצְרַיִם
  chosen: that they had brought out from Egypt
  alternatives:
  - which they had taken out of Egypt
  lexicon: HALOT
  rationale: The clause modifies 'dough' and indicates what the Israelites carried
    with them. 'Brought out' is idiomatic and preserves the movement from Egypt.
- source_word: עֻגֹת מַצּוֹת
  chosen: into unleavened cakes
  alternatives:
  - as cakes of unleavened bread
  - into flat cakes without yeast
  lexicon: HALOT
  rationale: עֻגֹת are cakes/round loaves, and מַצּוֹת specifies that they were unleavened.
    'Unleavened cakes' is concise and faithful; 'cakes' here refers to bread-cakes,
    not dessert.
- source_word: כִּי לֹא חָמֵץ
  chosen: because it had not leavened
  alternatives:
  - because it was not leavened
  - because it had not risen
  lexicon: HALOT
  rationale: The verb חמץ here describes the dough not becoming leavened. 'Had not
    leavened' preserves the verbal force better than a purely adjectival rendering;
    'risen' is interpretive and less exact.
- source_word: כִּי גֹרְשׁוּ מִמִּצְרַיִם
  chosen: for they had been driven out from Egypt
  alternatives:
  - for they were expelled from Egypt
  - because they were thrust out of Egypt
  lexicon: HALOT
  rationale: גרשׁ in the passive sense conveys forceful expulsion. 'Driven out' is
    strong, natural English and matches the urgency of the exodus.
- source_word: וְלֹא יָכְלוּ לְהִתְמַהְמֵהַּ
  chosen: and could not delay
  alternatives:
  - and could not linger
  - and could not tarry
  lexicon: HALOT
  rationale: התמהמה means to delay or linger. 'Could not delay' is contemporary and
    captures the sense of having no time to wait.
- source_word: וְגַם
  chosen: and ... either
  alternatives:
  - and also
  - moreover
  lexicon: HALOT
  rationale: 'The conjunction adds a further circumstance. Rendering it with ''either''
    in English fits the negative clause naturally: ''they had not prepared ... either.'''
- source_word: צֵדָה
  chosen: provisions
  alternatives:
  - food for the journey
  - supplies
  lexicon: HALOT
  rationale: צדה refers to provisions or travel supplies. 'Provisions' is concise
    and suitably broad, covering food prepared for departure.
- source_word: לָהֶם
  chosen: for themselves
  alternatives:
  - for their journey
  - for themselves to take
  lexicon: HALOT
  rationale: The pronoun indicates the provisions were prepared for their own use.
    'For themselves' is the most direct rendering.
