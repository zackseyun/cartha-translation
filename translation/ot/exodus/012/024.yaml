id: EXO.12.24
reference: Exodus 12:24
source:
  edition: WLC
  text: וּ/שְׁמַרְתֶּ֖ם אֶת הַ/דָּבָ֣ר הַ/זֶּ֑ה לְ/חָק לְ/ךָ֥ וּ/לְ/בָנֶ֖י/ךָ עַד
    עוֹלָֽם־־־׃
translation:
  text: And you shall keep this matter as a statute for you and for your sons forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this thing' or 'this word.' The Hebrew term can refer broadly to a matter,
      thing, or spoken word.
    reason: lexical_alternative
  - marker: b
    text: Or 'for you and your children' or 'for you and your descendants.' The Hebrew
      reads 'your sons.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁמַרְתֶּם
  chosen: And you shall keep
  alternatives:
  - And you must observe
  - And you shall guard
  lexicon: HALOT
  rationale: שׁמר commonly means keep, guard, or observe. In covenantal/legal contexts,
    'keep' is a natural English rendering that preserves both obedience and continuity
    without over-paraphrasing.
- source_word: הַדָּבָר הַזֶּה
  chosen: this matter
  alternatives:
  - this thing
  - this word
  - this command
  lexicon: HALOT
  rationale: דָּבָר has a broad semantic range including word, matter, thing, and
    affair. Here it refers to the prescribed Passover observance just described; 'this
    matter' is idiomatic and broad enough to cover the ordinance without narrowing
    it to mere speech.
- source_word: לְחָק
  chosen: as a statute
  alternatives:
  - as an ordinance
  - as a fixed statute
  - as a decree
  lexicon: HALOT
  rationale: חֹק denotes something prescribed or fixed, often a statute. 'Statute'
    preserves the legal-covenantal force more formally than 'custom' or 'rule'.
- source_word: לְךָ וּלְבָנֶיךָ
  chosen: for you and for your sons
  alternatives:
  - for you and your children
  - for you and your descendants
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine singular plus 'your sons.' Per the
    gender-accurate principle, 'sons' is retained rather than generalized to 'children,'
    while still functioning representatively in the covenantal household context.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for all time
  - perpetually
  - throughout the age
  lexicon: HALOT
  rationale: עוֹלָם with עַד often denotes enduring or perpetual duration. 'Forever'
    is the most natural modern English equivalent, while preserving the strong sense
    of ongoing obligation in context.
