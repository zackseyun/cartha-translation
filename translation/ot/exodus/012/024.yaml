theological_decisions:
- issue: Scope of covenantal inheritance language in 'your sons'
  chosen_reading: Retain the literal 'your sons' in the main text
  alternative_readings:
  - your children
  - your descendants
  rationale: The Hebrew explicitly says 'your sons.' In keeping with the translation
    philosophy's gender-accurate principle, the main text preserves the source wording
    rather than neutralizing it. The phrase can function representatively for household
    succession, but that interpretive expansion should not replace the lexical form
    in translation.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
