id: EXO.12.50
reference: Exodus 12:50
source:
  edition: WLC
  text: וַ/יַּֽעֲשׂ֖וּ כָּל בְּנֵ֣י יִשְׂרָאֵ֑ל כַּ/אֲשֶׁ֨ר צִוָּ֧ה יְהוָ֛ה אֶת מֹשֶׁ֥ה וְ/אֶֽת אַהֲרֹ֖ן כֵּ֥ן עָשֽׂוּ־־־׃ס
translation:
  text: And all the sons of Israel did as Yahweh had commanded Moses and Aaron; so they did.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “the Israelites” or “the children of Israel.” Hebrew: “the sons of Israel.”'
    reason: lexical_alternative
  - marker: b
    text: Hebrew YHWH, traditionally rendered “the LORD.”
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  chosen: And ... did
  alternatives:
  - And ... acted
  - And ... made
  lexicon: HALOT
  rationale: The verb עשה commonly means 'do/make.' In this context of obedience to commands, 'did' is the most natural English rendering and matches the repeated verb at the end of the verse.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: 'כָּל with the following construct phrase indicates totality: the entirety of the group is in view.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Following the gender-accurate principle, the formal familial expression is preserved in the main text rather than flattened to 'Israelites,' though that is a natural English alternative.
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - according to what
  lexicon: HALOT
  rationale: 'Introduces comparison/conformity: they acted in accordance with what was commanded. ''As'' is concise and idiomatic.'
- source_word: צִוָּה
  chosen: had commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: 'English past perfect fits the sequence naturally: the LORD''s command precedes Israel''s action. The Hebrew perfect itself does not require pluperfect, but English style favors it here.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶת מֹשֶׁה וְאֶת אַהֲרֹן
  chosen: Moses and Aaron
  alternatives:
  - through Moses and Aaron
  lexicon: HALOT
  rationale: The direct-object markers indicate that Moses and Aaron are the ones whom the LORD commanded, not necessarily the mediating agents expressed by a preposition like 'through.' English omits the object markers.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in this way
  lexicon: HALOT
  rationale: כֵּן resumes and emphasizes exact correspondence to the command. 'So' is natural modern English and preserves the emphatic restatement.
- source_word: עָשׂוּ
  chosen: they did
  alternatives:
  - they acted
  lexicon: HALOT
  rationale: The repeated verb closes the verse with emphasis on obedience. Retaining 'they did' preserves the Hebrew repetition rather than smoothing it away.
