id: EXO.12.5
reference: Exodus 12:5
source:
  edition: WLC
  text: שֶׂ֥ה תָמִ֛ים זָכָ֥ר בֶּן שָׁנָ֖ה יִהְיֶ֣ה לָ/כֶ֑ם מִן הַ/כְּבָשִׂ֥ים וּ/מִן
    הָ/עִזִּ֖ים תִּקָּֽחוּ־־־׃
translation:
  text: Your lamb shall be without blemish, a male a year old; you may take it from
    the sheep or from the goats.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew שֶׂה can refer more broadly to a young animal of the flock, including
      either a lamb or a kid; the following clause makes explicit that it may be taken
      from sheep or goats.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׂה
  chosen: lamb
  alternatives:
  - young animal
  - one of the flock
  lexicon: HALOT
  rationale: שֶׂה can denote a small livestock animal, especially a lamb or kid. In
    this Passover context, 'lamb' is the most natural English rendering and aligns
    with the singular sacrificial animal in view, while the following clause explicitly
    preserves that it may come from sheep or goats.
- source_word: תָמִים
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  lexicon: HALOT
  rationale: In sacrificial contexts תָמִים commonly denotes an animal free from defect.
    'Without blemish' is clear modern English and preserves the cultic sense better
    than the broader 'perfect.'
- source_word: זָכָר
  chosen: male
  lexicon: HALOT
  rationale: A straightforward biological designation; 'male' is the precise and natural
    rendering.
- source_word: בֶּן שָׁנָה
  chosen: a year old
  alternatives:
  - one year old
  - a son of a year
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'son of a year' and denotes an animal
    in its first year. 'A year old' is idiomatic English with the same sense.
- source_word: יִהְיֶה לָכֶם
  chosen: shall be
  alternatives:
  - must be for you
  - is to be for you
  lexicon: HALOT
  rationale: The clause expresses the required qualification of the animal for the
    Israelites. 'Shall be' communicates the prescriptive force naturally in English
    without overtranslating the dative לָכֶם.
- source_word: מִן הַכְּבָשִׂים וּמִן הָעִזִּים
  chosen: from the sheep or from the goats
  alternatives:
  - from the lambs or from the kids
  - from the sheep and from the goats
  lexicon: HALOT
  rationale: 'The phrase identifies the allowable source categories. ''Sheep'' and
    ''goats'' are the natural species terms in English. The conjunction is rendered
    ''or'' because the sense is disjunctive: the animal may be taken from either group,
    not necessarily both.'
- source_word: תִּקָּחוּ
  chosen: you may take it
  alternatives:
  - you shall take
  - you are to take
  lexicon: HALOT
  rationale: The verb is second person plural and gives instruction. Because English
    requires an object for smoothness, 'it' is supplied from the singular animal already
    specified. 'May take' communicates permitted source options within the command;
    the broader imperative force remains in context.
