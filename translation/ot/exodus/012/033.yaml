id: EXO.12.33
reference: Exodus 12:33
source:
  edition: WLC
  text: וַ/תֶּחֱזַ֤ק מִצְרַ֨יִם֙ עַל הָ/עָ֔ם לְ/מַהֵ֖ר לְ/שַׁלְּחָ֣/ם מִן הָ/אָ֑רֶץ
    כִּ֥י אָמְר֖וּ כֻּלָּ֥/נוּ מֵתִֽים־־׃
translation:
  text: And the Egyptians pressed the people urgently to send them out of the land
    quickly, for they said, “We are all dying.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to hurry to send them out of the land.” The Hebrew uses two infinitives
      in sequence to express urgent haste.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֶּחֱזַק
  chosen: pressed
  alternatives:
  - urged strongly
  - were urgent with
  - prevailed upon
  lexicon: HALOT
  rationale: From חזק in the sense of being strong/pressing hard upon someone. With
    עַל הָעָם, the idiom conveys forceful pressure rather than physical strength alone.
    'Pressed' captures the urgency and social pressure in natural English.
- source_word: מִצְרַיִם
  chosen: the Egyptians
  alternatives:
  - Egypt
  - the people of Egypt
  lexicon: HALOT
  rationale: Although the form is the place-name Egypt, in context with a singular
    feminine verb it functions collectively for the populace/nation. 'The Egyptians'
    makes the collective personal subject clear in English.
- source_word: עַל הָעָם
  chosen: the people
  alternatives:
  - upon the people
  lexicon: HALOT
  rationale: עַל after חזק marks the object of pressure. 'The people' refers to Israel
    in context. English does not need to preserve the preposition explicitly once
    'pressed' is used transitively.
- source_word: לְמַהֵר
  chosen: urgently
  alternatives:
  - quickly
  - to hurry
  lexicon: HALOT
  rationale: The infinitive expresses haste/purpose alongside the following infinitive.
    Rendering adverbially with 'urgently' reflects the Egyptians' pressing manner
    and avoids awkward repetition with the later 'quickly.'
- source_word: לְשַׁלְּחָם
  chosen: to send them out
  alternatives:
  - to let them go
  - to send them away
  lexicon: HALOT
  rationale: שׁלח commonly means send away/release. 'Send them out' fits the immediate
    context of expulsion from Egypt and preserves the directional force better than
    the more idiomatic but less literal 'let them go.'
- source_word: מִן הָאָרֶץ
  chosen: out of the land
  alternatives:
  - from the land
  - out of Egypt
  lexicon: HALOT
  rationale: The Hebrew says 'the land,' referring contextually to Egypt. 'Out of
    the land' preserves the source wording while remaining clear in context.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the Egyptians' urgency. 'For' is concise and
    natural in narrative English.
- source_word: אָמְרוּ
  chosen: they said
  alternatives:
  - they were saying
  lexicon: HALOT
  rationale: Simple past fits the narrative sequence and represents the qatal naturally
    in English.
- source_word: כֻּלָּנוּ
  chosen: we are all
  alternatives:
  - all of us are
  lexicon: HALOT
  rationale: The pronoun-plus-quantifier is best represented idiomatically as 'we
    are all' before the participle.
- source_word: מֵתִים
  chosen: dying
  alternatives:
  - dead
  - about to die
  lexicon: HALOT
  rationale: The participle from מות here expresses an ongoing or imminent state from
    the Egyptians' perspective, not that they are already dead. 'Dying' best captures
    the sense in context after the plague.
