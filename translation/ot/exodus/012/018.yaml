id: EXO.12.18
reference: Exodus 12:18
source:
  edition: WLC
  text: בָּ/רִאשֹׁ֡ן בְּ/אַרְבָּעָה֩ עָשָׂ֨ר י֤וֹם לַ/חֹ֨דֶשׁ֙ בָּ/עֶ֔רֶב תֹּאכְל֖וּ
    מַצֹּ֑ת עַ֠ד י֣וֹם הָ/אֶחָ֧ד וְ/עֶשְׂרִ֛ים לַ/חֹ֖דֶשׁ בָּ/עָֽרֶב׃
translation:
  text: In the first month, on the fourteenth day of the month at evening, you shall
    eat unleavened bread, until the twenty-first day of the month at evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the evening' at both occurrences of 'at evening.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרִאשֹׁן
  chosen: In the first month
  alternatives:
  - In the first
  lexicon: HALOT
  rationale: With the temporal phrase completed by לַחֹדֶשׁ later in the clause, the
    idiomatic sense is 'in the first month,' not merely 'in the first.' English supplies
    'month' for clarity from the Hebrew construction.
- source_word: בְּאַרְבָּעָה עָשָׂר יוֹם
  chosen: on the fourteenth day
  alternatives:
  - on day fourteen
  - on the fourteenth
  lexicon: HALOT
  rationale: This is the standard Hebrew ordinal-like dating expression using cardinal
    numbers. 'On the fourteenth day' is natural English and preserves the calendrical
    force.
- source_word: לַחֹדֶשׁ
  chosen: of the month
  alternatives:
  - of the new moon/month
  lexicon: HALOT
  rationale: חֹדֶשׁ can denote 'month' or 'new moon,' but in date formulas it normally
    means 'month.' 'Of the month' best fits the calendrical context.
- source_word: בָּעֶרֶב
  chosen: at evening
  alternatives:
  - in the evening
  - at dusk
  lexicon: HALOT
  rationale: The phrase marks the beginning boundary of the observance. 'At evening'
    is slightly more precise and concise for the temporal boundary than 'in the evening,'
    while avoiding over-interpretive specificity such as 'at dusk.'
- source_word: תֹּאכְלוּ
  chosen: you shall eat
  alternatives:
  - you are to eat
  - you will eat
  lexicon: HALOT
  rationale: The imperfect here carries instructional force in legal/covenantal context.
    'You shall eat' preserves the directive sense in clear English.
- source_word: מַצּוֹת
  chosen: unleavened bread
  alternatives:
  - unleavened cakes
  - matzot
  lexicon: HALOT
  rationale: The term refers to bread made without leaven in the Passover context.
    'Unleavened bread' is the standard transparent rendering; transliteration is unnecessary
    in the main text.
- source_word: עַד
  chosen: until
  alternatives:
  - up to
  lexicon: HALOT
  rationale: Marks the ending boundary of the period of eating unleavened bread.
- source_word: יוֹם הָאֶחָד וְעֶשְׂרִים
  chosen: the twenty-first day
  alternatives:
  - day twenty-one
  - the one-and-twentieth day
  lexicon: HALOT
  rationale: This is the normal Hebrew way to express 'twenty-first.' The idiomatic
    English ordinal is best.
- source_word: בָּעָרֶב
  chosen: at evening
  alternatives:
  - in the evening
  - at dusk
  lexicon: HALOT
  rationale: Repeats the same temporal boundary at the close of the observance; consistency
    with the first occurrence is preferable.
