theological_decisions:
- issue: Referent of הַפָּסַח
  chosen_reading: the term refers to the Passover sacrificial animal, rendered explicitly
    as 'the Passover lamb' in idiomatic English
  alternative_readings:
  - the Passover
  - the Passover sacrifice
  rationale: The Hebrew uses 'Passover' as a metonym for the sacrificial victim. English
    normally requires the implied object to be made explicit. 'Passover lamb' is the
    most familiar and contextually fitting expression, though the broader sacrificial
    sense is preserved in documentation because Exod 12:5 allows sheep or goats.
