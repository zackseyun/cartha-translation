id: EXO.12.21
reference: Exodus 12:21
source:
  edition: WLC
  text: וַ/יִּקְרָ֥א מֹשֶׁ֛ה לְ/כָל זִקְנֵ֥י יִשְׂרָאֵ֖ל וַ/יֹּ֣אמֶר אֲלֵ/הֶ֑ם מִֽשְׁכ֗וּ
    וּ/קְח֨וּ לָ/כֶ֥ם צֹ֛אן לְ/מִשְׁפְּחֹתֵי/כֶ֖ם וְ/שַׁחֲט֥וּ הַ/פָּֽסַח־׃
translation:
  text: Then Moses called for all the elders of Israel and said to them, “Draw out
    and take for yourselves sheep from the flock according to your families, and slaughter
    the Passover lamb.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the Passover'; that is, the Passover sacrifice or victim.
    reason: lexical_alternative
  - marker: b
    text: '''Draw out'' may also be understood as ''select'' or ''pull out'' from
      the flock.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew word for the animal is broader than 'lamb' and can refer to small
      livestock from the flock.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called for
  alternatives:
  - called
  - summoned
  lexicon: HALOT
  rationale: The verb קרא in this context introduces Moses gathering the elders to
    give instructions. 'Called for' communicates the summoning nuance more naturally
    than bare 'called' while remaining close to the Hebrew.
- source_word: זִקְנֵי יִשְׂרָאֵל
  chosen: the elders of Israel
  alternatives:
  - Israel's elders
  lexicon: HALOT
  rationale: Standard rendering of the construct phrase; it refers to the recognized
    leaders/representatives of the people.
- source_word: מִשְׁכוּ
  chosen: Draw out
  alternatives:
  - Pull out
  - Select
  lexicon: HALOT
  rationale: The imperative of משך literally means 'draw/pull.' In this context it
    likely means to draw out an animal from the flock for sacrifice. 'Draw out' preserves
    the concrete verbal force better than the more interpretive 'select.'
- source_word: וּקְחוּ
  chosen: take
  alternatives:
  - get
  lexicon: HALOT
  rationale: A straightforward rendering of לקח. Paired with 'draw out,' it reflects
    the two imperatives without collapsing them into one.
- source_word: לָכֶם
  chosen: for yourselves
  alternatives:
  - for you
  lexicon: HALOT
  rationale: 'The dative pronoun has reflexive force in English idiom here: they are
    to take the animal for their own household use.'
- source_word: צֹאן
  chosen: sheep from the flock
  alternatives:
  - small livestock
  - flock animals
  - lambs
  lexicon: HALOT
  rationale: צֹאן can denote small livestock collectively, including sheep and goats.
    Because the Passover animal in the immediate context may be from sheep or goats
    (cf. Exod 12:5), the main text avoids the overly narrow 'lambs.' 'Sheep from the
    flock' keeps the pastoral sense while sounding natural in English.
- source_word: לְמִשְׁפְּחֹתֵיכֶם
  chosen: according to your families
  alternatives:
  - by your clans
  - for your families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה refers to family/clan groupings. 'According to your families'
    reflects distribution by household groups in the Passover instructions.
- source_word: וְשַׁחֲטוּ
  chosen: slaughter
  alternatives:
  - kill
  - slay
  lexicon: HALOT
  rationale: This verb is the normal term for slaughtering an animal, especially in
    a sacrificial setting. 'Slaughter' is precise and suitably weighty without being
    archaic.
- source_word: הַפָּסַח
  chosen: the Passover lamb
  alternatives:
  - the Passover
  - the Passover sacrifice
  lexicon: HALOT
  rationale: Literally the noun is 'the Passover,' but in this command it refers metonymically
    to the Passover victim. 'The Passover lamb' makes the referent explicit for English
    readers, though the Hebrew term itself is broader than the English word 'lamb'
    in some contexts.
