id: EXO.12.15
reference: Exodus 12:15
source:
  edition: WLC
  text: שִׁבְעַ֤ת יָמִים֙ מַצּ֣וֹת תֹּאכֵ֔לוּ אַ֚ךְ בַּ/יּ֣וֹם הָ/רִאשׁ֔וֹן תַּשְׁבִּ֥יתוּ
    שְּׂאֹ֖ר מִ/בָּתֵּי/כֶ֑ם כִּ֣י כָּל אֹכֵ֣ל חָמֵ֗ץ וְ/נִכְרְתָ֞ה הַ/נֶּ֤פֶשׁ הַ/הִוא֙
    מִ/יִּשְׂרָאֵ֔ל מִ/יּ֥וֹם הָ/רִאשֹׁ֖ן עַד י֥וֹם הַ/שְּׁבִעִֽי׀־־׃
translation:
  text: For seven days you shall eat unleavened bread. But on the first day you shall
    remove leaven from your houses, for whoever eats anything leavened, that person
    shall be cut off from Israel, from the first day to the seventh day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you shall put away/destroy leaven from your houses.' The Hebrew literally
      means 'you shall cause leaven to cease.'
    reason: lexical_alternative
  - marker: b
    text: '''Shall be cut off'' is a Hebrew legal expression. It may refer to expulsion
      from the community, death, or divine judgment; the verse itself does not specify
      the exact mode.'
    reason: alternative_reading
lexical_decisions:
- source_word: מַצּוֹת
  chosen: unleavened bread
  alternatives:
  - unleavened cakes
  - matzot
  lexicon: HALOT
  rationale: The noun refers to bread made without leaven. 'Unleavened bread' is the
    clearest natural English rendering and matches the ritual context of Passover.
- source_word: אַךְ
  chosen: But
  alternatives:
  - only
  - surely
  - however
  lexicon: HALOT
  rationale: Here the particle marks a restrictive/emphatic transition from the general
    command to a specific requirement on the first day. 'But' communicates the shift
    naturally in English.
- source_word: תַּשְׁבִּיתוּ
  chosen: you shall remove
  alternatives:
  - you shall cause to cease
  - you shall destroy
  - you shall put away
  lexicon: HALOT
  rationale: The Hiphil of שׁבת here means to cause leaven to cease from the houses,
    i.e., to remove it. 'Remove' is idiomatic and captures the practical force of
    the command better than a wooden gloss.
- source_word: שְּׂאֹר
  chosen: leaven
  alternatives:
  - yeast
  - sourdough starter
  lexicon: HALOT
  rationale: The term denotes fermenting agent/leaven. 'Leaven' preserves the biblical
    ritual terminology better than 'yeast,' while remaining understandable.
- source_word: חָמֵץ
  chosen: anything leavened
  alternatives:
  - leavened bread
  - what is leavened
  - leaven
  lexicon: HALOT
  rationale: The word refers broadly to what is leavened, not necessarily bread alone.
    'Anything leavened' makes the scope explicit in natural English.
- source_word: וְנִכְרְתָה
  chosen: shall be cut off
  alternatives:
  - shall be excluded
  - shall be removed
  - shall be destroyed
  lexicon: HALOT
  rationale: The Niphal of כרת in covenant/legal contexts is the standard idiom 'be
    cut off.' Because the precise mode of excision is debated, the traditional but
    still transparent rendering best preserves the Hebrew's legal-theological force
    without over-interpreting it.
- source_word: הַנֶּפֶשׁ הַהִוא
  chosen: that person
  alternatives:
  - that soul
  - that life
  lexicon: HALOT
  rationale: Although נֶפֶשׁ is literally 'soul' or 'life,' in legal formulations
    it commonly refers to the individual person. 'That person' is idiomatic English
    and avoids importing a narrower anthropological sense.
- source_word: מִיִּשְׂרָאֵל
  chosen: from Israel
  alternatives:
  - from among Israel
  - from the people of Israel
  lexicon: HALOT
  rationale: The phrase indicates exclusion from the covenant community. 'From Israel'
    is concise and faithful; the communal sense is clear from context.
- source_word: מִיּוֹם הָרִאשֹׁן עַד יוֹם הַשְּׁבִעִי
  chosen: from the first day to the seventh day
  alternatives:
  - from day one until day seven
  - from the first day through the seventh day
  lexicon: HALOT
  rationale: This temporal phrase most naturally modifies the penalty clause, specifying
    the period during which eating leavened food incurs the sanction. The chosen rendering
    is straightforward and preserves the Hebrew sequence.
