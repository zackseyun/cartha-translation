theological_decisions:
- issue: Meaning of the sanction 'cut off' (וְנִכְרְתָה)
  chosen_reading: Retain the formal legal expression 'shall be cut off' without specifying
    whether the result is death, expulsion, or divine judgment.
  alternative_readings:
  - shall be excluded from the community
  - shall be put to death
  - shall be removed by divine judgment
  rationale: The Hebrew idiom carries covenantal and judicial weight, but the exact
    mechanism is not specified in this verse. Preserving the idiom maintains the theological
    tension rather than resolving a debated question beyond what the text states.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
