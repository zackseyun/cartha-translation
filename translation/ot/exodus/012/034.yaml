id: EXO.12.34
reference: Exodus 12:34
source:
  edition: WLC
  text: וַ/יִּשָּׂ֥א הָ/עָ֛ם אֶת בְּצֵק֖/וֹ טֶ֣רֶם יֶחְמָ֑ץ מִשְׁאֲרֹתָ֛/ם צְרֻרֹ֥ת
    בְּ/שִׂמְלֹתָ֖/ם עַל שִׁכְמָֽ/ם־־׃
translation:
  text: So the people carried their dough before it was leavened, with their kneading
    bowls bound up in their cloaks on their shoulders.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their kneading troughs.' The Hebrew term refers to containers used in
      preparing dough.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂא
  chosen: carried
  alternatives:
  - took up
  - lifted
  lexicon: HALOT
  rationale: The verb נשׂא here describes physically bearing items away in departure.
    'Carried' is natural modern English and fits the travel context better than the
    more wooden 'lifted' or the broader 'took up'.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: עָם in this narrative context refers to the Israelite people collectively.
    'The people' is the standard and clearest rendering.
- source_word: בְּצֵקוֹ
  chosen: their dough
  alternatives:
  - its dough
  - the dough
  lexicon: HALOT
  rationale: Although the suffix is morphologically singular, the collective subject
    'the people' is best represented idiomatically in English as 'their dough.' This
    avoids the awkward collective singular 'its dough' while preserving the sense.
- source_word: טֶרֶם יֶחְמָץ
  chosen: before it was leavened
  alternatives:
  - before it fermented
  - before it became leavened
  lexicon: HALOT
  rationale: The clause indicates the dough had not yet undergone the leavening process.
    'Before it was leavened' is concise and matches the Passover context better than
    the more technical 'fermented.'
- source_word: מִשְׁאֲרֹתָם
  chosen: their kneading bowls
  alternatives:
  - their kneading troughs
  - their baking bowls
  lexicon: HALOT
  rationale: The noun refers to vessels used in dough preparation. 'Kneading bowls'
    is understandable modern English; 'kneading troughs' is also possible and traditional,
    but 'bowls' reads more naturally for contemporary readers.
- source_word: צְרֻרֹת
  chosen: bound up
  alternatives:
  - wrapped
  - tied up
  lexicon: HALOT
  rationale: The passive participle from צרר conveys being bundled or tied together.
    'Bound up' preserves the image of items secured for travel.
- source_word: בְּשִׂמְלֹתָם
  chosen: in their cloaks
  alternatives:
  - in their garments
  - in their outer garments
  lexicon: HALOT
  rationale: שִׂמְלָה commonly denotes an outer garment or cloak. 'Cloaks' gives a
    concrete and natural image of using garments to wrap belongings.
- source_word: עַל שִׁכְמָם
  chosen: on their shoulders
  alternatives:
  - upon their shoulder
  lexicon: HALOT
  rationale: The phrase describes the bundles being carried on the shoulders of the
    people. The plural English matches the collective sense of the subject.
