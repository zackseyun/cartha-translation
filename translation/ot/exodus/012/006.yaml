id: EXO.12.6
reference: Exodus 12:6
source:
  edition: WLC
  text: וְ/הָיָ֤ה לָ/כֶם֙ לְ/מִשְׁמֶ֔רֶת עַ֣ד אַרְבָּעָ֥ה עָשָׂ֛ר י֖וֹם לַ/חֹ֣דֶשׁ
    הַ/זֶּ֑ה וְ/שָׁחֲט֣וּ אֹת֗/וֹ כֹּ֛ל קְהַ֥ל עֲדַֽת יִשְׂרָאֵ֖ל בֵּ֥ין הָ/עַרְבָּֽיִם־׃
translation:
  text: And it shall be kept by you until the fourteenth day of this month, and the
    whole assembly of the congregation of Israel shall slaughter it at twilight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''between the evenings,'' an idiom commonly understood as the time
      around dusk or twilight.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it shall be
  alternatives:
  - And it will be
  - And it shall remain
  lexicon: HALOT
  rationale: The qatal with prefixed conjunction continues the instruction sequence
    with future/resultative force. 'Shall be' fits the legal-instruction style in
    English without sounding overly archaic in this context.
- source_word: לָכֶם
  chosen: by you
  alternatives:
  - for you
  - for yourselves
  lexicon: HALOT
  rationale: Although literally 'for you,' in context with לְמִשְׁמֶרֶת the sense
    is that the animal is to be kept under the Israelites' care. 'By you' expresses
    custodial responsibility more naturally in English.
- source_word: לְמִשְׁמֶרֶת
  chosen: kept
  alternatives:
  - for keeping
  - for safekeeping
  - under guard
  lexicon: HALOT
  rationale: The noun denotes keeping, charge, or custody. Rendering the phrase idiomatically
    as 'shall be kept' communicates the required preservation of the animal until
    the appointed day.
- source_word: עַד אַרְבָּעָה עָשָׂר יוֹם
  chosen: until the fourteenth day
  alternatives:
  - until day fourteen
  - until the fourteenth
  lexicon: HALOT
  rationale: This is the standard Hebrew way of expressing a calendar date. 'The fourteenth
    day' is clear and natural English.
- source_word: לַחֹדֶשׁ הַזֶּה
  chosen: of this month
  alternatives:
  - for this month
  - in this month
  lexicon: HALOT
  rationale: The phrase specifies the month already under discussion. 'Of this month'
    is the most natural date expression in English.
- source_word: וְשָׁחֲטוּ
  chosen: shall slaughter
  alternatives:
  - shall kill
  - shall butcher
  lexicon: HALOT
  rationale: שׁחט commonly refers to slaughtering an animal, often in sacrificial
    or ritual contexts. 'Slaughter' preserves that specificity better than the more
    generic 'kill.'
- source_word: אֹתוֹ
  chosen: it
  lexicon: HALOT
  rationale: Direct object pronoun referring to the lamb or goat selected earlier
    in the passage.
- source_word: כֹּל קְהַל עֲדַת יִשְׂרָאֵל
  chosen: the whole assembly of the congregation of Israel
  alternatives:
  - the whole assembly of Israel's congregation
  - the entire gathered community of Israel
  lexicon: HALOT
  rationale: The doubled collective expression is retained rather than flattened,
    since the Hebrew emphasizes the corporate participation of Israel. 'Assembly of
    the congregation' sounds slightly formal but preserves the weight and structure
    of the source.
- source_word: בֵּין הָעַרְבָּיִם
  chosen: at twilight
  alternatives:
  - between the evenings
  - at dusk
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'between the evenings,' a debated temporal
    expression referring to the period around sunset/twilight. 'At twilight' gives
    a clear main-text rendering while preserving the more literal alternative in a
    footnote.
