theological_decisions:
- issue: Corporate subject in the slaughter command
  chosen_reading: the whole assembly of the congregation of Israel shall slaughter
    it
  alternative_readings:
  - each household shall slaughter its own lamb
  rationale: The Hebrew subject is singular collective language for Israel as a whole.
    The verse speaks corporately, even though the practical action occurs by households
    in the surrounding context. The translation preserves the corporate wording rather
    than resolving it into an explanatory paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it.
