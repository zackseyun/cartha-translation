id: EXO.12.7
reference: Exodus 12:7
source:
  edition: WLC
  text: וְ/לָֽקְחוּ֙ מִן הַ/דָּ֔ם וְ/נָֽתְנ֛וּ עַל שְׁתֵּ֥י הַ/מְּזוּזֹ֖ת וְ/עַל הַ/מַּשְׁק֑וֹף
    עַ֚ל הַ/בָּ֣תִּ֔ים אֲשֶׁר יֹאכְל֥וּ אֹת֖/וֹ בָּ/הֶֽם־־־־׃
translation:
  text: And they shall take some of the blood and put it on the two doorposts and
    on the lintel of the houses in which they eat it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'where they will eat it.' The Hebrew imperfect can be rendered with a
      future nuance in this instructional context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקְחוּ
  chosen: And they shall take
  alternatives:
  - And they are to take
  - And they must take
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this instructional sequence
    functions with directive/future force. 'Shall take' preserves the legal-instructional
    tone without sounding overly wooden.
- source_word: מִן הַדָּם
  chosen: some of the blood
  alternatives:
  - from the blood
  - part of the blood
  lexicon: HALOT
  rationale: The preposition מִן here is partitive, indicating a portion rather than
    the entirety. 'Some of the blood' is idiomatic English and preserves the sense.
- source_word: וְנָתְנוּ
  chosen: and put
  alternatives:
  - and place
  - and apply
  lexicon: HALOT
  rationale: נתן is broadly 'give/put/set.' In this ritual context, 'put' is natural
    modern English and sufficiently concrete; 'apply' is possible but slightly more
    interpretive.
- source_word: עַל שְׁתֵּי הַמְּזוּזֹת
  chosen: on the two doorposts
  alternatives:
  - on the two side posts
  - on the two doorframes
  lexicon: HALOT
  rationale: מְזוּזוֹת refers to the upright posts of a doorway. 'Doorposts' is the
    standard and precise English equivalent.
- source_word: וְעַל הַמַּשְׁקוֹף
  chosen: and on the lintel
  alternatives:
  - and on the top of the doorway
  - and on the crossbeam
  lexicon: HALOT
  rationale: מַשְׁקוֹף denotes the upper horizontal beam of the doorway. 'Lintel'
    is the most exact architectural term in English.
- source_word: עַל הַבָּתִּים
  chosen: of the houses
  alternatives:
  - on the houses
  - upon the houses
  lexicon: HALOT
  rationale: Although עַל commonly means 'on,' in context the phrase identifies the
    houses whose doorposts and lintels are marked. English expresses this relation
    most naturally as 'of the houses' rather than repeating 'on' in a potentially
    confusing way.
- source_word: אֲשֶׁר יֹאכְלוּ אֹתוֹ בָהֶם
  chosen: in which they eat it
  alternatives:
  - where they will eat it
  - in them they shall eat it
  lexicon: HALOT
  rationale: The relative clause modifies 'houses.' The imperfect יֹאכְלוּ can be
    rendered with present sense in procedural instruction. 'In which they eat it'
    is clear and keeps the focus on the houses as the location of eating the lamb.
