id: EXO.12.2
reference: Exodus 12:2
source:
  edition: WLC
  text: הַ/חֹ֧דֶשׁ הַ/זֶּ֛ה לָ/כֶ֖ם רֹ֣אשׁ חֳדָשִׁ֑ים רִאשׁ֥וֹן הוּא֙ לָ/כֶ֔ם לְ/חָדְשֵׁ֖י
    הַ/שָּׁנָֽה׃
translation:
  text: This month shall be for you the beginning of months; it shall be the first
    month of the year for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'This new moon,' since the Hebrew word can be associated with the new-moon
      cycle; here it refers to the calendrical month.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֹדֶשׁ הַזֶּה
  chosen: This month
  alternatives:
  - This new moon
  - This lunar month
  lexicon: HALOT
  rationale: חֹדֶשׁ ordinarily denotes 'month' in calendrical contexts, though etymologically
    related to the new moon. In this legal-calendar setting, 'month' is the plain
    and natural English rendering.
- source_word: לָכֶם
  chosen: for you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: 'The preposition marks relation/reference: this calendrical designation
    is established with respect to Israel. ''For you'' reads naturally in English
    and preserves the covenantal addressee.'
- source_word: רֹאשׁ חֳדָשִׁים
  chosen: the beginning of months
  alternatives:
  - the head of months
  - the chief of months
  lexicon: HALOT
  rationale: רֹאשׁ literally means 'head,' but in temporal ordering it idiomatically
    means 'beginning' or 'first.' 'Beginning of months' preserves the Hebrew construct
    sense without awkward literalism.
- source_word: רִאשׁוֹן
  chosen: the first month
  alternatives:
  - first
  - the foremost
  lexicon: HALOT
  rationale: The adjective explicitly states ordinal priority. Supplying 'month' in
    English is required by the following phrase 'of the year' and is implied by the
    Hebrew context.
- source_word: הוּא
  chosen: it shall be
  alternatives:
  - it is
  lexicon: HALOT
  rationale: The pronoun links the predication to 'this month.' English idiom prefers
    an explicit copular clause; 'shall be' fits the directive force of the context,
    where God is instituting Israel's calendar.
- source_word: לְחָדְשֵׁי הַשָּׁנָה
  chosen: of the year
  alternatives:
  - among the months of the year
  - for the months of the year
  lexicon: HALOT
  rationale: 'The phrase specifies the sphere of reckoning: this month is first with
    respect to the year''s months. ''Of the year'' is concise and idiomatic, while
    retaining the calendrical sense.'
