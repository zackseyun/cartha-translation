theological_decisions:
- issue: Force of the verbless Hebrew clause in a legislative context
  chosen_reading: 'Rendered with future/modal force: ''shall be'''
  alternative_readings:
  - 'Rendered as simple present: ''is'''
  rationale: Although the Hebrew lacks an explicit verb, the surrounding context is
    prescriptive instruction from God establishing Israel's liturgical calendar. English
    'shall be' best conveys institution rather than mere description, without adding
    doctrinal content.
  doctrine_reference: Translation philosophy §1, §6
