id: EXO.12.43
reference: Exodus 12:43
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל מֹשֶׁ֣ה וְ/אַהֲרֹ֔ן זֹ֖את חֻקַּ֣ת הַ/פָּ֑סַח כָּל
    בֶּן נֵכָ֖ר לֹא יֹ֥אכַל בּֽ/וֹ־־־־׃
translation:
  text: 'And the LORD said to Moses and Aaron, “This is the statute of the Passover:
    no foreigner may eat of it.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'son of foreignness.' The phrase refers to a foreigner, that
      is, someone outside the covenant community.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' following Jewish reverence tradition and the longstanding convention reflected
    in the LXX/English tradition.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: The common narrative wayyiqtol of אמר is most naturally rendered 'said'
    in straightforward prose narration.
- source_word: זֹאת
  chosen: This is
  alternatives:
  - This
  lexicon: HALOT
  rationale: English idiom normally supplies the copula in equational clauses; 'This
    is' clearly introduces the following regulation.
- source_word: חֻקַּת
  chosen: statute
  alternatives:
  - ordinance
  - regulation
  - decree
  lexicon: HALOT
  rationale: חֻקָּה denotes a prescribed statute or fixed ordinance. 'Statute' preserves
    the formal legal tone of the instruction without becoming archaic in this context.
- source_word: הַפָּסַח
  chosen: the Passover
  alternatives:
  - the Passover sacrifice
  - the Passover meal
  lexicon: HALOT
  rationale: The term can refer to the Passover observance more broadly, including
    the sacrificial meal. Here 'the Passover' is sufficiently precise and matches
    the immediate context of eating it.
- source_word: כָּל
  chosen: 'no'
  alternatives:
  - every ... not
  lexicon: HALOT
  rationale: In combination with the following noun phrase and negated verb, idiomatic
    English expresses the prohibition as 'no foreigner may eat of it' rather than
    the more wooden 'every foreigner shall not eat of it.'
- source_word: בֶּן נֵכָר
  chosen: foreigner
  alternatives:
  - son of a foreign land
  - alien
  - foreign son
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'son of foreignness/foreign land' and
    denotes a foreigner, especially one outside the covenant community. 'Foreigner'
    is the clearest natural English rendering.
- source_word: לֹא יֹאכַל
  chosen: may eat
  alternatives:
  - shall eat
  - is to eat
  lexicon: HALOT
  rationale: 'With the negation and legal context, English idiom often uses ''may''
    to express prohibition: ''may not eat.'' This communicates legal restriction clearly.'
- source_word: בּוֹ
  chosen: of it
  alternatives:
  - it
  - from it
  lexicon: HALOT
  rationale: The preposition ב with אכל in this context is naturally rendered 'eat
    of it,' an idiomatic English expression for partaking of the Passover.
