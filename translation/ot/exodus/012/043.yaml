theological_decisions:
- issue: Identity of those excluded from the Passover meal
  chosen_reading: Rendered בֶּן נֵכָר as 'foreigner' without importing a narrower
    theological category such as 'uncircumcised foreigner' into the main text.
  alternative_readings:
  - alien
  - foreigner outside the covenant community
  rationale: The immediate Hebrew phrase itself states only 'son of foreignness/foreigner.'
    The broader context later clarifies covenantal boundaries, but this verse alone
    should not be expanded beyond its wording.
  doctrine_reference: Translation philosophy §§1, 3, 5
