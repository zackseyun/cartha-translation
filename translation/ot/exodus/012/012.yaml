id: EXO.12.12
reference: Exodus 12:12
source:
  edition: WLC
  text: וְ/עָבַרְתִּ֣י בְ/אֶֽרֶץ מִצְרַיִם֮ בַּ/לַּ֣יְלָה הַ/זֶּה֒ וְ/הִכֵּיתִ֤י כָל
    בְּכוֹר֙ בְּ/אֶ֣רֶץ מִצְרַ֔יִם מֵ/אָדָ֖ם וְ/עַד בְּהֵמָ֑ה וּ/בְ/כָל אֱלֹהֵ֥י מִצְרַ֛יִם
    אֶֽעֱשֶׂ֥ה שְׁפָטִ֖ים אֲנִ֥י יְהוָֽה־־־־׃
translation:
  text: For I will pass through the land of Egypt on this night, and I will strike
    every firstborn in the land of Egypt, from man to beast; and against all the gods
    of Egypt I will execute judgments. I am the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will go through.' The verb here means passing through the land, not
      'passing over' in the sense of sparing.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''from man to beast.'''
    reason: lexical_alternative
  - marker: c
    text: Hebrew YHWH, traditionally rendered 'the LORD'; alternatively 'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְעָבַרְתִּי
  chosen: I will pass through
  alternatives:
  - I will go through
  - I will pass over
  lexicon: HALOT
  rationale: The verb עבר with בְּאֶרֶץ here denotes moving through the land, not
    sparing it. 'Pass over' would confuse this clause with the distinct Passover sparing
    motif applied to Israelite houses later in the chapter.
- source_word: בְאֶרֶץ מִצְרַיִם
  chosen: the land of Egypt
  alternatives:
  - Egypt
  lexicon: HALOT
  rationale: The construct explicitly refers to the territory/land, and retaining
    'land' preserves the geographic scope of the action.
- source_word: בַּלַּיְלָה הַזֶּה
  chosen: on this night
  alternatives:
  - this night
  - during this night
  lexicon: HALOT
  rationale: Natural modern English for the temporal phrase while preserving the demonstrative
    emphasis.
- source_word: וְהִכֵּיתִי
  chosen: I will strike
  alternatives:
  - I will smite
  - I will strike down
  lexicon: HALOT
  rationale: '''Strike'' is a clear modern equivalent for נכה. ''Strike down'' is
    possible but slightly more interpretive; the death of the firstborn is implied
    by context.'
- source_word: כָּל בְּכוֹר
  chosen: every firstborn
  alternatives:
  - all the firstborn
  - every firstborn male
  lexicon: HALOT
  rationale: This is the standard rendering of the singular collective phrase. 'Male'
    is not explicit in the Hebrew here and is therefore not added.
- source_word: מֵאָדָם וְעַד בְּהֵמָה
  chosen: from man to beast
  alternatives:
  - from human to animal
  - from humankind to livestock
  lexicon: HALOT
  rationale: אָדָם here contrasts with animal life and is best rendered 'man' per
    the project's gender-accurate policy and default table. 'Beast' is a natural equivalent
    for בְּהֵמָה in this human-animal merism.
- source_word: וּבְכָל אֱלֹהֵי מִצְרַיִם
  chosen: against all the gods of Egypt
  alternatives:
  - on all the gods of Egypt
  - against all the divine beings of Egypt
  lexicon: HALOT
  rationale: The preposition with עשה שפטים conveys hostile action directed against
    Egypt's gods. 'Gods' is the plain sense and should not be demythologized.
- source_word: אֶעֱשֶׂה שְׁפָטִים
  chosen: I will execute judgments
  alternatives:
  - I will carry out judgments
  - I will inflict punishments
  lexicon: HALOT
  rationale: This preserves the judicial force of the idiom without over-paraphrasing.
    'Execute judgments' is idiomatic and weighty.
- source_word: אֲנִי יְהוָה
  chosen: I am the LORD
  alternatives:
  - I am Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' in the main text, with 'Yahweh'
    preserved as an alternative if needed.
