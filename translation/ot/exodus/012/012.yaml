theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's contested-terms table specifies 'the LORD' as the default
    rendering for YHWH, following Jewish reverence tradition and the Septuagintal
    pattern. The personal name alternative is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Status of אֱלֹהֵי מִצְרַיִם
  chosen_reading: the gods of Egypt
  alternative_readings:
  - the idols of Egypt
  - the rulers of Egypt
  rationale: The Hebrew plainly says 'gods of Egypt.' The translation preserves the
    text's theological claim that the LORD's judgments are directed not only at Egypt's
    people but also at its deities, without reducing the term to a purely metaphorical
    reference.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
