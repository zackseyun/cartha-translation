id: EXO.12.40
reference: Exodus 12:40
source:
  edition: WLC
  text: וּ/מוֹשַׁב֙ בְּנֵ֣י יִשְׂרָאֵ֔ל אֲשֶׁ֥ר יָשְׁב֖וּ בְּ/מִצְרָ֑יִם שְׁלֹשִׁ֣ים
    שָׁנָ֔ה וְ/אַרְבַּ֥ע מֵא֖וֹת שָׁנָֽה׃
translation:
  text: Now the dwelling of the sons of Israel, during which they lived in Egypt,
    was four hundred thirty years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some ancient witnesses read, 'the dwelling of the sons of Israel and their
      fathers, which they lived in Egypt and in Canaan, was four hundred thirty years.'
    reason: textual_variant
lexical_decisions:
- source_word: מוֹשַׁב
  chosen: dwelling
  alternatives:
  - sojourning
  - time of residence
  - settlement
  lexicon: HALOT
  rationale: מוֹשַׁב denotes dwelling/residence or place/time of dwelling. Here it
    refers not merely to a location but to the period/state of residence, so 'dwelling'
    preserves the noun while remaining natural in English.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Formally, the Hebrew is 'sons of Israel.' This keeps the traditional
    covenantal expression and follows the gender-accurate principle. 'Israelites'
    is smoother but less transparent to the source wording.
- source_word: אֲשֶׁר יָשְׁבוּ
  chosen: during which they lived
  alternatives:
  - who lived
  - which they dwelt
  - who sojourned
  lexicon: HALOT
  rationale: The relative clause modifies 'dwelling/residence' and explains its duration.
    English requires some restructuring for clarity. 'Lived' is a natural rendering
    of ישׁב in this context.
- source_word: בְּמִצְרַיִם
  chosen: in Egypt
  lexicon: HALOT
  rationale: Straightforward locative use of the preposition ב with the place name
    Egypt.
- source_word: שְׁלֹשִׁים שָׁנָה וְאַרְבַּע מֵאוֹת שָׁנָה
  chosen: four hundred thirty years
  alternatives:
  - thirty years and four hundred years
  lexicon: HALOT
  rationale: English idiom reverses the Hebrew order of the compound number. 'Four
    hundred thirty years' is the natural equivalent and preserves the stated duration.
