theological_decisions:
- issue: Scope of the 430 years in relation to Egypt alone or to a broader patriarchal
    sojourn
  chosen_reading: 'Main text follows the Masoretic wording as given: the residence
    of the sons of Israel in Egypt was 430 years.'
  alternative_readings:
  - Some ancient witnesses (notably the Samaritan Pentateuch and Septuagint) read
    'in Egypt and in Canaan,' broadening the period beyond Egypt alone.
  rationale: The Hebrew source provided is the Masoretic Text and explicitly says
    'in Egypt.' Because a well-known alternative textual tradition exists and affects
    chronology, it should be preserved in a footnote rather than imported into the
    main text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
