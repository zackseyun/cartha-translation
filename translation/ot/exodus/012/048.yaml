theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Eligibility of the resident foreigner for Passover participation
  chosen_reading: The verse permits participation after circumcision of every male in his household/group, without expanding the text into later theological categories.
  alternative_readings:
  - Treating the verse as simple ethnic exclusion
  - Treating the verse as abolishing all covenantal boundary markers
  rationale: 'The Hebrew presents a covenantal inclusion condition: the sojourner may participate if the circumcision requirement is met, and then is treated like a native regarding this observance. The translation preserves that tension without importing later doctrinal conclusions.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3
