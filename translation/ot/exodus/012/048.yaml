id: EXO.12.48
reference: Exodus 12:48
source:
  edition: WLC
  text: וְ/כִֽי יָג֨וּר אִתְּ/ךָ֜ גֵּ֗ר וְ/עָ֣שָׂה פֶסַח֮ לַ/יהוָה֒ הִמּ֧וֹל ל֣/וֹ כָל זָכָ֗ר וְ/אָז֙ יִקְרַ֣ב לַ/עֲשֹׂת֔/וֹ וְ/הָיָ֖ה כְּ/אֶזְרַ֣ח הָ/אָ֑רֶץ וְ/כָל עָרֵ֖ל לֹֽא יֹ֥אכַל בּֽ/וֹ־־־־׃
translation:
  text: If a sojourner resides with you and keeps the Passover to Yahweh, every male belonging to him must be circumcised; then he may come near to keep it, and he shall be like a native of the land. But no uncircumcised person may eat of it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'resident foreigner' for 'sojourner' (גֵּר), referring to a non-native living among Israel.
    reason: lexical_alternative
  - marker: b
    text: Literally 'do/make the Passover.' English idiom commonly says 'keep' or 'celebrate' the Passover.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the LORD' represents the divine name YHWH.
    reason: alternative_reading
lexical_decisions:
- source_word: גֵּר
  chosen: sojourner
  alternatives:
  - resident foreigner
  - stranger
  lexicon: HALOT
  rationale: גֵּר denotes a non-native residing among Israel, not merely a passing traveler. 'Sojourner' preserves the covenantal/legal nuance better than 'stranger,' while remaining concise. 'Resident foreigner' is possible but less natural in running English.
- source_word: יָגוּר אִתְּךָ
  chosen: resides with you
  alternatives:
  - sojourns with you
  - dwells with you
  lexicon: HALOT
  rationale: The verb גור in this stem commonly refers to residing as an alien/sojourner. 'Resides with you' gives clear modern English while retaining the durative sense of living among the Israelites.
- source_word: וְעָשָׂה פֶסַח
  chosen: wants to keep the Passover
  alternatives:
  - keeps the Passover
  - celebrates the Passover
  - does the Passover
  lexicon: HALOT
  rationale: Literally 'does/makes Passover,' but idiomatic English for ritual observance is 'keep the Passover.' 'Wants to' is supplied from the conditional context to make explicit the prospective force before the requirement of circumcision; this is an optimal-equivalence clarification rather than paraphrase.
- source_word: פֶסַח
  chosen: Passover
  lexicon: HALOT
  rationale: Standard and accurate rendering for the festival/sacrificial observance in context.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The divine name יְהוָה is rendered 'the LORD' per doctrine. The preposition ל here marks dedication/direction of the observance; 'to the LORD' is natural and preserves that sense.
- source_word: הִמּוֹל לוֹ כָל זָכָר
  chosen: every male belonging to him must be circumcised
  alternatives:
  - let every male of his be circumcised
  - all his males must be circumcised
  lexicon: HALOT
  rationale: The infinitive absolute/passive-like construction functions as an imperative requirement. 'Every male belonging to him must be circumcised' clearly conveys the legal demand applying to all males in his household/group.
- source_word: וְאָז יִקְרַב
  chosen: then he may come near
  alternatives:
  - then let him come near
  - then he shall come near
  lexicon: HALOT
  rationale: קרב here signals authorized approach/eligibility to participate in the rite. 'May come near' captures permission after the prerequisite is met, better than a purely spatial sense.
- source_word: לַעֲשֹׂתוֹ
  chosen: to keep it
  alternatives:
  - to celebrate it
  - to do it
  lexicon: HALOT
  rationale: Refers back to the Passover observance. 'Keep it' matches English idiom for festival observance and aligns with the earlier rendering.
- source_word: כְּאֶזְרַח הָאָרֶץ
  chosen: like a native of the land
  alternatives:
  - as a native-born of the land
  - like one born in the land
  lexicon: HALOT
  rationale: אֶזְרַח denotes a native-born member of the land/community. 'Native of the land' is readable modern English and preserves the legal-social comparison.
- source_word: עָרֵל
  chosen: uncircumcised person
  alternatives:
  - uncircumcised male
  lexicon: HALOT
  rationale: Although the adjective is masculine singular, the clause states a general exclusion principle. 'Uncircumcised person' communicates the rule idiomatically in English without implying a different ritual requirement for females; the immediate context has already specified circumcision of every male.
- source_word: לֹא יֹאכַל בּוֹ
  chosen: may eat of it
  alternatives:
  - shall eat of it
  - eat it
  lexicon: HALOT
  rationale: With negation, the clause expresses prohibition/ineligibility. 'May eat of it' in English naturally conveys permitted participation in the meal. 'Of it' reflects the preposition בּוֹ and the partaking sense.
