theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God as the actor in the exodus. Following
    the project's stated policy for the Tetragrammaton, the main text uses 'the LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Corporate designation בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the children of Israel
  - the Israelites
  rationale: The project prefers gender-accurate renderings where the source is grammatically
    masculine and representative. 'Sons of Israel' preserves the Hebrew form and covenantal
    lineage language without flattening it to the ethnic label 'Israelites.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4: Gender-accurate over
    gender-neutral'
