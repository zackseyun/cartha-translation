id: EXO.12.51
reference: Exodus 12:51
source:
  edition: WLC
  text: וַ/יְהִ֕י בְּ/עֶ֖צֶם הַ/יּ֣וֹם הַ/זֶּ֑ה הוֹצִ֨יא יְהוָ֜ה אֶת בְּנֵ֧י יִשְׂרָאֵ֛ל
    מֵ/אֶ֥רֶץ מִצְרַ֖יִם עַל צִבְאֹתָֽ/ם־־׃פ
translation:
  text: And on that very day, the LORD brought the sons of Israel out from the land
    of Egypt by their divisions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the children of Israel' or 'the Israelites.' The Hebrew reads 'the sons
      of Israel,' a corporate familial expression.
    reason: lexical_alternative
  - marker: b
    text: Or 'according to their hosts' or 'with their companies.' The Hebrew may
      emphasize Israel's ordered groupings as they departed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ...
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive plus היה introduces the temporal frame of the statement.
    In natural modern English, its discourse function is best carried by 'And' with
    the temporal clause rather than the archaic full formula 'and it came to pass.'
- source_word: בְּעֶצֶם הַיּוֹם הַזֶּה
  chosen: on that very day
  alternatives:
  - on this very day
  - on that same day
  lexicon: HALOT
  rationale: 'The idiom בְּעֶצֶם ... intensifies precision: ''on that very day.''
    ''That'' fits the narrative retrospective viewpoint in English, while preserving
    the emphatic force of the Hebrew expression.'
- source_word: הוֹצִיא
  chosen: brought ... out
  alternatives:
  - led ... out
  - caused ... to go out
  lexicon: HALOT
  rationale: The Hiphil of יצא is causative, commonly 'bring out' or 'lead out.' 'Brought
    ... out' is idiomatic, preserves the causative sense, and matches the exodus context
    without over-specifying manner.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' This preserves the familial/covenantal
    wording more closely than 'Israelites.' 'Children of Israel' is traditional, but
    'sons' is more gender-accurate to the source form while still functioning corporately.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: out from the land of Egypt
  alternatives:
  - from the land of Egypt
  - out of Egypt
  lexicon: HALOT
  rationale: The phrase explicitly includes 'land' (אֶרֶץ), so the translation retains
    it. 'Out from' reflects the movement away from Egypt while remaining natural English.
- source_word: עַל צִבְאֹתָם
  chosen: by their divisions
  alternatives:
  - according to their hosts
  - by their companies
  - with their armies
  lexicon: HALOT
  rationale: צָבָא often denotes host, army, or organized company. Here it describes
    the ordered arrangement of Israel in the exodus, not necessarily militarized combat
    units. 'By their divisions' communicates structured groupings in clear modern
    English while preserving the organizational nuance.
