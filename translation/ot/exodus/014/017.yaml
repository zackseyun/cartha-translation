theological_decisions:
- issue: Rendering divine action in Pharaoh/Egypt hardening
  chosen_reading: Explicitly render God's direct agency as 'I am hardening' without
    softening to mere permission.
  alternative_readings:
  - I will strengthen
  - I will allow their hearts to be hardened
  rationale: The Hebrew directly attributes the action to God in this verse. Per translation
    philosophy, the theological tension of divine sovereignty and human responsibility
    should be preserved rather than resolved by weakening the verb.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Rendering כבד in a judgment context
  chosen_reading: Use 'I will get glory' to express God's honor manifested through
    judgment over Pharaoh.
  alternative_readings:
  - I will be glorified
  rationale: Both are orthodox and textually defensible. 'Get glory' is chosen for
    readable modern English while preserving the theological claim that God's glory
    is displayed in judgment.
  doctrine_reference: Translation philosophy §6 (Readable modern English, not archaic
    or academic)
