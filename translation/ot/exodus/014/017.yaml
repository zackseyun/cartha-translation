id: EXO.14.17
reference: Exodus 14:17
source:
  edition: WLC
  text: וַ/אֲנִ֗י הִנְ/נִ֤י מְחַזֵּק֙ אֶת לֵ֣ב מִצְרַ֔יִם וְ/יָבֹ֖אוּ אַחֲרֵי/הֶ֑ם
    וְ/אִכָּבְדָ֤ה בְּ/פַרְעֹה֙ וּ/בְ/כָל חֵיל֔/וֹ בְּ/רִכְבּ֖/וֹ וּ/בְ/פָרָשָֽׁי/ו־־׃
translation:
  text: And I—behold, I am hardening the heart of the Egyptians so that they will
    go in after them, and I will get glory over Pharaoh and over all his army, over
    his chariots and over his horsemen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will be glorified over Pharaoh and over all his army.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the heart of the Egyptians,' with singular 'heart' used collectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  chosen: behold, I
  alternatives:
  - indeed I
  - here I am
  lexicon: HALOT
  rationale: The particle with 1cs suffix adds emphatic self-reference. 'Behold, I'
    preserves the heightened emphasis without sounding overly archaic when paired
    with the dash after 'And I'.
- source_word: מְחַזֵּק
  chosen: am hardening
  alternatives:
  - will harden
  - am strengthening
  lexicon: HALOT
  rationale: Piel of חזק here carries the established Exodus sense of making firm/hardening
    the Egyptians' resolve. The participle supports an ongoing/imminent action, best
    rendered 'am hardening' rather than simple future. 'Strengthening' is lexically
    possible but would understate the judicial-hardening context in this narrative.
- source_word: לֵב מִצְרַיִם
  chosen: the heart of the Egyptians
  alternatives:
  - the hearts of the Egyptians
  - Egypt's heart
  lexicon: HALOT
  rationale: Hebrew singular 'heart' can function collectively with a plural people-group.
    Rendering it singular preserves the source form while remaining intelligible in
    English. 'Hearts' is possible as a smoothing translation but less formally aligned.
- source_word: וְיָבֹאוּ אַחֲרֵיהֶם
  chosen: so that they will go in after them
  alternatives:
  - and they will go after them
  - and they will come after them
  lexicon: HALOT
  rationale: In context of the sea crossing, בוא is better rendered 'go in' rather
    than the more generic 'come,' making explicit the movement into the sea after
    Israel. The sequence expresses result/purpose from the hardening, so 'so that'
    clarifies the relation without over-paraphrasing.
- source_word: וְאִכָּבְדָה
  chosen: I will get glory
  alternatives:
  - I will be glorified
  - I will gain honor
  lexicon: HALOT
  rationale: Niphal/cohortative-like form of כבד here expresses YHWH's gaining honor/glory
    through judgment over Pharaoh. 'Get glory' is idiomatic modern English and preserves
    the reflexive/resultative sense without sounding abstract. 'Be glorified' is traditional
    and valid, but 'get glory' better reflects the eventive force in context.
- source_word: בְּפַרְעֹה
  chosen: over Pharaoh
  alternatives:
  - through Pharaoh
  - by means of Pharaoh
  lexicon: HALOT
  rationale: The preposition ב with כבד in this context indicates the sphere/object
    over which glory is displayed. 'Over Pharaoh' communicates triumph and judgment
    more naturally in English than a strictly instrumental rendering.
- source_word: חֵילוֹ
  chosen: his army
  alternatives:
  - his force
  - his host
  lexicon: HALOT
  rationale: חיל in military context refers to armed forces. 'Army' is the clearest
    contemporary equivalent.
- source_word: רִכְבּוֹ
  chosen: his chariots
  alternatives:
  - his chariotry
  lexicon: HALOT
  rationale: Though the singular form with suffix can function collectively, English
    plural 'chariots' best conveys the military unit as a whole in natural style.
- source_word: פָרָשָׁיו
  chosen: his horsemen
  alternatives:
  - his cavalry
  - his riders
  lexicon: HALOT
  rationale: The term denotes mounted troops. 'Horsemen' is concrete and matches the
    military imagery of chariots; 'cavalry' is possible but somewhat more technical
    and potentially anachronistic in tone.
