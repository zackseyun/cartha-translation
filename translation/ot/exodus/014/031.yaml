id: EXO.14.31
reference: Exodus 14:31
source:
  edition: WLC
  text: וַ/יַּ֨רְא יִשְׂרָאֵ֜ל אֶת הַ/יָּ֣ד הַ/גְּדֹלָ֗ה אֲשֶׁ֨ר עָשָׂ֤ה יְהוָה֙ בְּ/מִצְרַ֔יִם
    וַ/יִּֽירְא֥וּ הָ/עָ֖ם אֶת יְהוָ֑ה וַ/יַּֽאֲמִ֨ינוּ֙ בַּֽ/יהוָ֔ה וּ/בְ/מֹשֶׁ֖ה
    עַבְדּֽ/וֹ־־׃פ
translation:
  text: Israel saw the great hand that the LORD had used against Egypt, and the people
    feared the LORD, and they believed in the LORD and in Moses his servant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the mighty hand' or 'the great power.' The Hebrew reads literally 'the
      great hand,' a common image for power.
    reason: lexical_alternative
  - marker: b
    text: Or 'that the LORD had done in Egypt' or 'to Egypt.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - looked at
  - experienced
  lexicon: HALOT
  rationale: The verb ראה here denotes direct perception of what had just occurred.
    'Saw' is the plain narrative rendering and fits the object that follows.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - the Israelites
  lexicon: HALOT
  rationale: The singular collective 'Israel' matches the Hebrew and is common in
    biblical narrative for the people as a whole. It also balances the later explicit
    singular collective 'the people.'
- source_word: הַיָּד הַגְּדֹלָה
  chosen: the great hand
  alternatives:
  - the great power
  - the mighty hand
  lexicon: HALOT
  rationale: Literally 'the great hand.' While idiomatic for power, retaining 'hand'
    preserves the Hebrew imagery and a recurring Exodus motif of the LORD's powerful
    hand. 'Great' is closer to גָּדוֹל than 'mighty,' though 'mighty hand' is a viable
    idiomatic alternative.
- source_word: אֲשֶׁר עָשָׂה יְהוָה בְּמִצְרַיִם
  chosen: that the LORD had used against Egypt
  alternatives:
  - that the LORD had done in Egypt
  - that the LORD had done to Egypt
  lexicon: HALOT
  rationale: The preposition בְ with Egypt in this context points to action directed
    with reference to Egypt in the exodus judgment setting. 'Used against Egypt' makes
    explicit the hostile force implied by the context while preserving the hand imagery.
    'Done in Egypt' is more literal but less fitting after the sea event; 'done to
    Egypt' is interpretive but possible.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the
    LORD.'
- source_word: וַיִּירְאוּ
  chosen: feared
  alternatives:
  - were in awe of
  - revered
  lexicon: HALOT
  rationale: ירא commonly means 'fear.' Here it likely includes awe and reverence
    in response to divine deliverance and judgment, but 'feared' best preserves the
    lexical force while allowing the theological breadth to remain implicit.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the Israelites
  - the nation
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'the people.' Retaining it avoids over-specification
    and reflects the narrative style.
- source_word: וַיַּאֲמִינוּ
  chosen: they believed
  alternatives:
  - they trusted
  - they put their faith
  lexicon: HALOT
  rationale: The Hiphil of אמן with בְ commonly means to believe or trust in. 'Believed'
    is the most direct rendering and works naturally with the following prepositional
    phrases.
- source_word: בַּיהוָה
  chosen: in the LORD
  alternatives:
  - the LORD
  - the LORD's word
  lexicon: HALOT
  rationale: The preposition בְ after אמן is naturally rendered 'believed in.' This
    preserves the relational trust sense without over-paraphrase.
- source_word: וּבְמֹשֶׁה עַבְדּוֹ
  chosen: and in Moses his servant
  alternatives:
  - and in Moses, his servant
  - and in Moses, the LORD's servant
  lexicon: HALOT
  rationale: The suffix on 'servant' refers to the LORD, so 'his servant' most naturally
    means Moses as the LORD's servant. Keeping the phrase compact preserves the Hebrew
    structure. A comma is stylistic, not required.
