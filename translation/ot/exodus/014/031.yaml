theological_decisions:
- issue: Nature of Israel's response to Moses
  chosen_reading: They believed in the LORD and in Moses as the LORD's servant/authorized
    agent.
  alternative_readings:
  - They trusted the LORD and also trusted Moses personally.
  - They believed the LORD and believed Moses.
  rationale: The Hebrew construction with אמן + בְ for both objects presents trust
    directed toward the LORD and toward Moses in his divinely appointed role. The
    translation preserves this without implying equality between the LORD and Moses;
    'his servant' clarifies Moses' subordinate status.
  doctrine_reference: Translation philosophy §3; Affirmations (avoid importing claims
    beyond the text)
