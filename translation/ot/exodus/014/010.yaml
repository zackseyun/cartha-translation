id: EXO.14.10
reference: Exodus 14:10
source:
  edition: WLC
  text: וּ/פַרְעֹ֖ה הִקְרִ֑יב וַ/יִּשְׂאוּ֩ בְנֵֽי יִשְׂרָאֵ֨ל אֶת עֵינֵי/הֶ֜ם וְ/הִנֵּ֥ה
    מִצְרַ֣יִם נֹסֵ֣עַ אַחֲרֵי/הֶ֗ם וַ/יִּֽירְאוּ֙ מְאֹ֔ד וַ/יִּצְעֲק֥וּ בְנֵֽי יִשְׂרָאֵ֖ל
    אֶל יְהוָֽה־־׀־־׃
translation:
  text: As Pharaoh drew near, the sons of Israel lifted up their eyes, and behold,
    Egypt was marching after them; and they were very afraid, and the sons of Israel
    cried out to the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Egypt'; the singular name stands for the Egyptian force pursuing
      them.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Israelites' for 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִקְרִיב
  chosen: drew near
  alternatives:
  - came near
  - approached
  lexicon: HALOT
  rationale: Hiphil of קרב here is intransitive in sense with Pharaoh as subject,
    indicating approach rather than causative 'brought near.' 'Drew near' is idiomatic
    and preserves the narrative tension.
- source_word: וַיִּשְׂאוּ ... אֶת עֵינֵיהֶם
  chosen: lifted up their eyes
  alternatives:
  - looked up
  - raised their eyes
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for looking up. Retaining 'lifted up their
    eyes' preserves the source texture while remaining understandable in English.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - there was
  lexicon: HALOT
  rationale: The particle marks sudden perception and dramatic immediacy. 'Behold'
    best preserves the discourse force in elevated but still readable English narrative.
- source_word: מִצְרַיִם
  chosen: Egypt
  alternatives:
  - the Egyptians
  lexicon: HALOT
  rationale: The singular proper noun is the form present in the text. In context
    it functions collectively for Egypt's pursuing force. 'Egypt' preserves the Hebrew
    wording better than expanding to 'the Egyptians.'
- source_word: נֹסֵעַ אַחֲרֵיהֶם
  chosen: was marching after them
  alternatives:
  - was setting out after them
  - was journeying after them
  - was pursuing them
  lexicon: HALOT
  rationale: נסע commonly denotes setting out or moving camp, but in this military
    pursuit context 'was marching after them' captures active movement without over-interpreting
    to the more result-focused 'pursuing,' which is implied by context but not the
    lexical core.
- source_word: וַיִּירְאוּ מְאֹד
  chosen: they were very afraid
  alternatives:
  - they feared greatly
  - they were exceedingly afraid
  lexicon: HALOT
  rationale: This renders the verb-plus-intensifier naturally in modern English while
    preserving the strong emotional force.
- source_word: וַיִּצְעֲקוּ
  chosen: cried out
  alternatives:
  - called out
  - cried
  lexicon: HALOT
  rationale: The verb conveys an urgent cry, often in distress. 'Cried out' fits the
    immediate context of fear and appeal.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the pattern reflected in the
    Septuagint tradition.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'sons of Israel.' In keeping with the project's
    gender-accurate principle, this is retained rather than flattened to 'Israelites,'
    while still functioning corporately in context.
