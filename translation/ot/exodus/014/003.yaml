id: EXO.14.3
reference: Exodus 14:3
source:
  edition: WLC
  text: וְ/אָמַ֤ר פַּרְעֹה֙ לִ/בְנֵ֣י יִשְׂרָאֵ֔ל נְבֻכִ֥ים הֵ֖ם בָּ/אָ֑רֶץ סָגַ֥ר
    עֲלֵי/הֶ֖ם הַ/מִּדְבָּֽר׃
translation:
  text: For Pharaoh will say of the sons of Israel, ‘They are wandering in confusion
    in the land; the wilderness has shut them in.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They are bewildered in the land' or 'They are entangled in the land.'
      The Hebrew participle can denote confusion, perplexity, or being trapped/disoriented.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of Israel.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the wilderness has hemmed them in.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַר
  chosen: For ... will say
  alternatives:
  - And ... said
  - And ... will say
  lexicon: HALOT
  rationale: The waw + qatal here is best rendered with future sense in context, since
    YHWH is predicting Pharaoh’s reaction in the following narrative. 'For' fits the
    explanatory force in English better than a bare 'and.'
- source_word: פַּרְעֹה
  chosen: Pharaoh
  rationale: Standard English transliteration of the royal title/name.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: of the sons of Israel
  alternatives:
  - concerning the Israelites
  - about the sons of Israel
  lexicon: HALOT
  rationale: The preposition ל with אמר can mark the object spoken about. 'Sons of
    Israel' preserves the Hebrew expression and its gender-accurate form per translation
    philosophy, rather than flattening to 'Israelites' in the main text.
- source_word: נְבֻכִים
  chosen: wandering in confusion
  alternatives:
  - bewildered
  - confused
  - entangled
  - perplexed
  lexicon: HALOT
  rationale: The participle conveys a state of disorientation or being at a loss.
    'Wandering in confusion' captures both the likely situational sense in context
    and the verbal nuance better than a purely mental term like 'bewildered.'
- source_word: הֵם
  chosen: they are
  alternatives:
  - they
  rationale: Explicitly represented in English to preserve the predicative clause
    structure.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the country
  - in the region
  lexicon: HALOT
  rationale: '''Land'' is the most natural and consistent rendering of אֶרֶץ here,
    without over-specifying whether Pharaoh means Egypt''s territory or the broader
    area.'
- source_word: סָגַר עֲלֵיהֶם
  chosen: has shut them in
  alternatives:
  - has closed in on them
  - has hemmed them in
  - has enclosed them
  lexicon: HALOT
  rationale: This idiom expresses being trapped or enclosed. 'Has shut them in' is
    clear modern English and preserves the image of confinement.
- source_word: הַמִּדְבָּר
  chosen: the wilderness
  alternatives:
  - the desert
  lexicon: HALOT
  rationale: מִדְבָּר often denotes uncultivated wilderness rather than strictly sandy
    desert. 'Wilderness' better matches biblical usage and the Exodus setting.
