id: EXO.14.26
reference: Exodus 14:26
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל מֹשֶׁ֔ה נְטֵ֥ה אֶת יָדְ/ךָ֖ עַל הַ/יָּ֑ם וְ/יָשֻׁ֤בוּ
    הַ/מַּ֨יִם֙ עַל מִצְרַ֔יִם עַל רִכְבּ֖/וֹ וְ/עַל פָּרָשָֽׁי/ו־־־־־־׃
translation:
  text: Then the LORD said to Moses, “Stretch out your hand over the sea, so that
    the waters may return over the Egyptians, over their chariots, and over their
    horsemen.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and the waters will return over the Egyptians.' The Hebrew verb can
      be rendered more literally as a simple future, but here it likely expresses
      the intended result of Moses' action.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative progression while preserving the sequential force better than a bare
    'and' in modern style.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established English convention and the reverential pattern reflected
    in the LXX tradition.
- source_word: נְטֵה
  chosen: Stretch out
  alternatives:
  - Extend
  - Reach out
  lexicon: HALOT
  rationale: The imperative of נטה here calls for extending the hand outward over
    the sea. 'Stretch out' is idiomatic, vivid, and consistent with the physical action
    in context.
- source_word: יָדְךָ
  chosen: your hand
  lexicon: HALOT
  rationale: A straightforward rendering of the singular noun with second masculine
    singular suffix; no contextual reason to broaden or paraphrase.
- source_word: עַל הַיָּם
  chosen: over the sea
  alternatives:
  - toward the sea
  - upon the sea
  lexicon: HALOT
  rationale: עַל commonly means 'over/upon.' In this gesture-command context, 'over
    the sea' is the most natural English expression and matches the spatial sense
    of Moses extending his hand above or toward the waters.
- source_word: וְיָשֻׁבוּ
  chosen: so that ... may return
  alternatives:
  - and ... will return
  - and ... may turn back
  lexicon: HALOT
  rationale: The prefixed verb after the imperative expresses the intended result
    of Moses' action. Rendering it as 'so that ... may return' captures the volitional/resultative
    nuance more clearly in English than a simple future.
- source_word: הַמַּיִם
  chosen: the waters
  alternatives:
  - the water
  lexicon: HALOT
  rationale: Though English often uses the mass noun 'water,' the Hebrew plural is
    well represented by 'the waters,' especially in this elevated narrative context.
- source_word: עַל מִצְרַיִם
  chosen: over the Egyptians
  alternatives:
  - upon the Egyptians
  - against the Egyptians
  lexicon: HALOT
  rationale: Here עַל marks the waters coming back onto the Egyptians. 'Over' preserves
    the image of the waters covering them; 'against' would overinterpret the preposition.
- source_word: עַל רִכְבּוֹ
  chosen: over their chariots
  alternatives:
  - over his chariots
  - over Egypt's chariots
  lexicon: HALOT
  rationale: Although the suffix is morphologically singular ('his'), מִצְרַיִם functions
    collectively for the Egyptians/Egypt, and English naturally expresses the collective
    referent with 'their chariots.' This avoids awkwardness while preserving the sense.
- source_word: וְעַל פָּרָשָׁיו
  chosen: and over their horsemen
  alternatives:
  - and over his horsemen
  - and over their cavalry
  lexicon: HALOT
  rationale: פָּרָשִׁים refers to mounted riders/horsemen. 'Horsemen' is the most
    direct rendering; 'cavalry' is possible but more interpretive and military-technical.
    As with 'chariots,' the collective singular suffix is best rendered with English
    plural possession.
