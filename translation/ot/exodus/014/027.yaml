id: EXO.14.27
reference: Exodus 14:27
source:
  edition: WLC
  text: וַ/יֵּט֩ מֹשֶׁ֨ה אֶת יָד֜/וֹ עַל הַ/יָּ֗ם וַ/יָּ֨שָׁב הַ/יָּ֜ם לִ/פְנ֥וֹת בֹּ֨קֶר֙ לְ/אֵ֣יתָנ֔/וֹ וּ/מִצְרַ֖יִם נָסִ֣ים לִ/קְרָאת֑/וֹ וַ/יְנַעֵ֧ר יְהוָ֛ה אֶת מִצְרַ֖יִם בְּ/ת֥וֹךְ הַ/יָּֽם־־־׃
translation:
  text: So Moses stretched out his hand over the sea, and toward morning the sea returned to its usual place, while the Egyptians were fleeing toward it. And Yahweh threw the Egyptians into the midst of the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to its full force' or 'to its former state.' The Hebrew expression indicates that the sea resumed its enduring, normal condition.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb literally means 'shook off' or 'shook out,' a vivid image for the LORD's casting the Egyptians into the sea.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּט
  chosen: stretched out
  alternatives:
  - extended
  - held out
  lexicon: HALOT
  rationale: The verb נטה with 'hand' commonly means to stretch out or extend the hand. 'Stretched out' is idiomatic and preserves the physical action without paraphrase.
- source_word: הַיָּם
  chosen: the sea
  alternatives:
  - the Sea
  lexicon: HALOT
  rationale: The noun is the common Hebrew word for 'sea.' No contextual marker in this verse itself requires a more interpretive rendering such as a proper name.
- source_word: וַיָּשָׁב הַיָּם
  chosen: the sea returned
  alternatives:
  - the sea turned back
  - the sea went back
  lexicon: HALOT
  rationale: שׁוב here denotes returning to a prior state. 'Returned' fits the following phrase about its former condition and reads naturally in English.
- source_word: לִפְנוֹת בֹּקֶר
  chosen: toward morning
  alternatives:
  - at the turning of the morning
  - when morning appeared
  - at daybreak
  lexicon: HALOT
  rationale: The infinitive of פנה with 'morning' is an idiom for the approach or turning of morning. 'Toward morning' preserves the temporal sense without over-literal awkwardness.
- source_word: לְאֵיתָנוֹ
  chosen: to its normal strength
  alternatives:
  - to its usual flow
  - to its full force
  - to its former state
  lexicon: HALOT
  rationale: אֵיתָן can denote enduring strength, permanence, or steady force. In context of waters resuming after being divided, 'to its normal strength' captures the restoration of the sea's stable, powerful condition better than the more interpretive 'usual flow.'
- source_word: נָסִים לִקְרָאתוֹ
  chosen: were fleeing toward it
  alternatives:
  - were fleeing to meet it
  - were fleeing against it
  lexicon: HALOT
  rationale: The participle נָסִים gives ongoing action, and לקראת literally means 'to meet/toward.' In context the Egyptians are running as the sea returns upon them; 'toward it' is the clearest idiomatic rendering while preserving the directional force.
- source_word: וַיְנַעֵר
  chosen: shook ... off into
  alternatives:
  - overthrew ... in
  - tossed ... into
  - shook ... into
  lexicon: HALOT
  rationale: נער literally means to shake out/off. Here it vividly depicts YHWH hurling or shaking the Egyptians into the sea. 'Shook ... off into' preserves the metaphorical force better than the flattened traditional 'overthrew.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּתוֹךְ הַיָּם
  chosen: into the midst of the sea
  alternatives:
  - in the midst of the sea
  - into the sea
  lexicon: HALOT
  rationale: תוך denotes the middle/interior. Because the verb implies motion affecting the Egyptians, 'into the midst of the sea' brings out both the location and the force of the action.
