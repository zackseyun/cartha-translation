id: EXO.14.1
reference: Exodus 14:1
source:
  edition: WLC
  text: וַ/יְדַבֵּ֥ר יְהֹוָ֖ה אֶל מֹשֶׁ֥ה לֵּ/אמֹֽר־׃
translation:
  text: Then Yahweh spoke to Moses, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: YHWH; alternatively rendered ''Yahweh'' or ''Jehovah.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The waw-consecutive prefixed imperfect advances the narrative, so 'Then ... spoke' captures the sequential force. 'Spoke' is preferred over 'said' here because דבר commonly introduces divine speech formally, especially before לֵאמֹר.
- source_word: יְהֹוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the LORD,' following Jewish reverence tradition and the longstanding convention reflected in the LXX/English tradition.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks the indirect object of speech. 'To' is the natural modern English equivalent.
- source_word: מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name, in keeping with the policy to transliterate names rather than translate them.
- source_word: לֵּאמֹר
  chosen: saying
  alternatives:
  - and said
  - to say
  lexicon: HALOT
  rationale: This infinitive construct formula regularly introduces the content of speech in Hebrew narrative. 'Saying' preserves the formal structure without unnecessary expansion.
