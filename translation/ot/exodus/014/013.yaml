id: EXO.14.13
reference: Exodus 14:13
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר מֹשֶׁ֣ה אֶל הָ/עָם֮ אַל תִּירָאוּ֒ הִֽתְיַצְב֗וּ וּ/רְאוּ֙ אֶת
    יְשׁוּעַ֣ת יְהוָ֔ה אֲשֶׁר יַעֲשֶׂ֥ה לָ/כֶ֖ם הַ/יּ֑וֹם כִּ֗י אֲשֶׁ֨ר רְאִיתֶ֤ם
    אֶת מִצְרַ֨יִם֙ הַ/יּ֔וֹם לֹ֥א תֹסִ֛יפוּ לִ/רְאֹתָ֥/ם ע֖וֹד עַד עוֹלָֽם־־־־־־׃
translation:
  text: And Moses said to the people, “Do not fear. Stand firm, and see the salvation
    of the LORD, which he will accomplish for you today; for the Egyptians whom you
    see today, you will never see again forever.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the deliverance of the LORD.' The Hebrew term can denote salvation,
      deliverance, or victory depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּירָאוּ
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: The prohibition with ירא is naturally rendered as a direct command against
    fear. 'Do not fear' is slightly more formal and concise, fitting the elevated
    narrative speech, while 'Do not be afraid' remains a viable idiomatic alternative.
- source_word: הִתְיַצְבוּ
  chosen: Stand firm
  alternatives:
  - Take your stand
  - Stand still
  lexicon: HALOT
  rationale: The hitpael imperative conveys taking one's position or standing in place.
    'Stand firm' communicates both physical steadiness and resolute composure in context.
    'Stand still' is traditional but can overemphasize motionlessness; 'take your
    stand' is possible but less natural in this immediate exhortation.
- source_word: וּרְאוּ
  chosen: and see
  alternatives:
  - and watch
  - and behold
  lexicon: HALOT
  rationale: The simple imperative of ראה is best kept as 'see.' 'Watch' adds durative
    nuance not explicit in the verb, and 'behold' is too archaic for the stated translation
    philosophy.
- source_word: יְשׁוּעַת יְהוָה
  chosen: the salvation of the LORD
  alternatives:
  - the deliverance of the LORD
  - the victory of the LORD
  lexicon: HALOT
  rationale: יְשׁוּעָה can denote salvation, deliverance, or victory depending on
    context. Here the immediate referent is concrete rescue from Egypt, so 'deliverance'
    is possible; however, 'salvation' preserves the broader theological resonance
    of divine rescue while remaining accurate. Per doctrine, יְהוָה is rendered 'the
    LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's default rendering for the divine name in accordance
    with the contested terms table.
- source_word: אֲשֶׁר יַעֲשֶׂה לָכֶם הַיּוֹם
  chosen: which he will accomplish for you today
  alternatives:
  - which he will do for you today
  - that he will work for you today
  lexicon: HALOT
  rationale: עשה is broad ('do/make/work'). In English, 'accomplish' fits naturally
    with 'salvation' as its object and preserves the sense of decisive divine action
    on that day.
- source_word: כִּי אֲשֶׁר רְאִיתֶם אֶת מִצְרַיִם הַיּוֹם
  chosen: for the Egyptians whom you see today
  alternatives:
  - for as you have seen the Egyptians today
  - for the Egyptians you have seen today
  lexicon: HALOT
  rationale: The clause is syntactically compressed in Hebrew. Rendering it with a
    relative construction in English produces a clear and natural sentence linked
    to the following negated future. Using present 'see' reflects the immediate scene
    and aligns with many interpreters' understanding of the discourse context.
- source_word: מִצְרַיִם
  chosen: the Egyptians
  alternatives:
  - Egypt
  - Egyptians
  lexicon: HALOT
  rationale: Although the form can denote the land or the people, the context clearly
    refers to the pursuing Egyptian forces whom Israel is seeing, so the personal
    sense 'the Egyptians' is required.
- source_word: לֹא תֹסִיפוּ לִרְאֹתָם עוֹד
  chosen: you will never see again
  alternatives:
  - you will not continue to see
  - you will not see anymore
  lexicon: HALOT
  rationale: The idiom with יסף plus infinitive expresses no longer doing something.
    'You will never see again' is idiomatic and forceful in English, matching the
    emphatic reassurance of the Hebrew.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - ever again
  - for all time
  lexicon: HALOT
  rationale: The phrase intensifies the finality of the statement. 'Forever' is the
    most direct equivalent, though in English it can sound redundant after 'never
    see again'; the redundancy reflects the Hebrew emphasis and is therefore retained.
