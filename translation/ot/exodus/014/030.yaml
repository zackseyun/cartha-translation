id: EXO.14.30
reference: Exodus 14:30
source:
  edition: WLC
  text: וַ/יּ֨וֹשַׁע יְהוָ֜ה בַּ/יּ֥וֹם הַ/ה֛וּא אֶת יִשְׂרָאֵ֖ל מִ/יַּ֣ד מִצְרָ֑יִם
    וַ/יַּ֤רְא יִשְׂרָאֵל֙ אֶת מִצְרַ֔יִם מֵ֖ת עַל שְׂפַ֥ת הַ/יָּֽם־־־׃
translation:
  text: So the LORD saved Israel that day from the hand of Egypt, and Israel saw the
    Egyptians dead on the seashore.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from the hand of Egypt,'' an idiom for deliverance from Egypt''s
      power.'
    reason: cultural_note
  - marker: b
    text: Or 'on the shore of the sea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹשַׁע
  chosen: saved
  alternatives:
  - delivered
  - gave victory to
  lexicon: HALOT
  rationale: The Hifil of ישׁע here denotes YHWH's act of rescuing Israel from danger.
    'Saved' is natural modern English and preserves the theological weight of divine
    deliverance; 'delivered' is possible but slightly less direct.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: בַּיּוֹם הַהוּא
  chosen: that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: The phrase is temporal and idiomatically rendered 'that day' in English.
    The preposition is absorbed naturally into the temporal expression.
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from the power of
  - from
  lexicon: HALOT
  rationale: The Hebrew idiom literally means deliverance from someone's hand, expressing
    power or control. Retaining 'from the hand of' preserves the metaphor while remaining
    understandable.
- source_word: מִצְרַיִם / מִצְרָיִם
  chosen: Egypt / the Egyptians
  alternatives:
  - Egyptians / Egypt
  lexicon: HALOT
  rationale: The proper noun can denote the nation or its people depending on context.
    In 'from the hand of Egypt' the national power is in view, so 'Egypt' fits; in
    the second clause the visible corpses are persons, so 'the Egyptians' is required.
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - looked upon
  lexicon: HALOT
  rationale: A straightforward rendering of ראה in narrative context.
- source_word: מֵת
  chosen: dead
  alternatives:
  - lying dead
  lexicon: HALOT
  rationale: The singular adjective functions collectively with 'Egyptians.' 'Dead'
    is concise and faithful; 'lying dead' adds imagery not explicit in the Hebrew.
- source_word: עַל שְׂפַת הַיָּם
  chosen: on the seashore
  alternatives:
  - on the shore of the sea
  - at the edge of the sea
  lexicon: HALOT
  rationale: The phrase means the shore/lip of the sea. 'On the seashore' is idiomatic
    modern English and preserves the location clearly.
