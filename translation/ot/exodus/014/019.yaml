id: EXO.14.19
reference: Exodus 14:19
source:
  edition: WLC
  text: וַ/יִּסַּ֞ע מַלְאַ֣ךְ הָ/אֱלֹהִ֗ים הַ/הֹלֵךְ֙ לִ/פְנֵי֙ מַחֲנֵ֣ה יִשְׂרָאֵ֔ל
    וַ/יֵּ֖לֶךְ מֵ/אַחֲרֵי/הֶ֑ם וַ/יִּסַּ֞ע עַמּ֤וּד הֶֽ/עָנָן֙ מִ/פְּנֵי/הֶ֔ם וַ/יַּֽעֲמֹ֖ד
    מֵ/אַחֲרֵי/הֶֽם׃
translation:
  text: Then the angel of God, who had been going before the camp of Israel, moved
    and went behind them; and the pillar of cloud moved from before them and stood
    behind them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the messenger of God.' The Hebrew word can mean either 'angel' or 'messenger.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסַּע
  chosen: moved
  alternatives:
  - set out
  - pulled up
  - journeyed
  lexicon: HALOT
  rationale: The verb נסע literally can denote pulling up camp or setting out, but
    here the subject is the angel/pillar changing position relative to Israel rather
    than beginning a journey. 'Moved' best fits the immediate spatial context in natural
    English while preserving the concrete action.
- source_word: מַלְאַךְ הָאֱלֹהִים
  chosen: the angel of God
  alternatives:
  - the messenger of God
  lexicon: HALOT
  rationale: מַלְאָךְ can mean either 'messenger' or 'angel.' In this narrative context,
    referring to the divine guide associated with the pillar, 'angel' is the most
    natural and established sense without over-interpreting the figure's identity.
- source_word: הַהֹלֵךְ
  chosen: who had been going
  alternatives:
  - who was going
  - going
  lexicon: HALOT
  rationale: The participle describes ongoing prior action relative to the subsequent
    wayyiqtol verbs. 'Who had been going' captures the durative sense and the fact
    that this was the angel's prior position before moving behind Israel.
- source_word: לִפְנֵי מַחֲנֵה יִשְׂרָאֵל
  chosen: before the camp of Israel
  alternatives:
  - in front of the camp of Israel
  - ahead of Israel's camp
  lexicon: HALOT
  rationale: לִפְנֵי is spatial, 'before/in front of.' 'Before the camp of Israel'
    is clear and fairly formal; 'camp of Israel' preserves the construct relationship.
- source_word: וַיֵּלֶךְ מֵאַחֲרֵיהֶם
  chosen: went behind them
  alternatives:
  - went to their rear
  - went after them
  lexicon: HALOT
  rationale: מֵאַחֲרֵי here indicates position at the rear, not pursuit. 'Went behind
    them' is the clearest idiomatic rendering.
- source_word: עַמּוּד הֶעָנָן
  chosen: the pillar of cloud
  alternatives:
  - the cloud pillar
  lexicon: HALOT
  rationale: This is the standard and transparent rendering of the construct phrase,
    preserving the concrete imagery of the visible divine guide.
- source_word: מִפְּנֵיהֶם
  chosen: from before them
  alternatives:
  - from in front of them
  - from ahead of them
  lexicon: HALOT
  rationale: The phrase mirrors the earlier spatial expression and should be rendered
    consistently. 'From before them' is slightly more formal but remains clear in
    context.
- source_word: וַיַּעֲמֹד
  chosen: stood
  alternatives:
  - took its stand
  - stationed itself
  lexicon: HALOT
  rationale: עמד commonly means 'stand.' Here it marks the pillar's coming to a fixed
    position. 'Stood' is simple and faithful; the more interpretive 'took its stand'
    is possible but not necessary.
