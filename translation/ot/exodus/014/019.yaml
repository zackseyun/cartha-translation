theological_decisions:
- issue: Identity and nature of מַלְאַךְ הָאֱלֹהִים
  chosen_reading: Render as 'the angel of God' without specifying whether this is
    a created angel, a manifestation of God, or a christophany.
  alternative_readings:
  - the messenger of God
  - an explicit theophanic rendering
  rationale: The Hebrew text names the figure but does not explicitly define the ontology
    of the messenger here. To preserve theological tension and avoid importing later
    doctrinal conclusions, the translation keeps the lexical rendering 'angel of God'
    and leaves fuller identification to interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
