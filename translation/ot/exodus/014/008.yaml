theological_decisions:
- issue: Divine action in Pharaoh's hardening
  chosen_reading: And the LORD hardened the heart of Pharaoh
  alternative_readings:
  - And the LORD strengthened Pharaoh's heart
  rationale: The Hebrew attributes the action directly to the LORD, and the translation should preserve that theological tension rather than soften it. At the same time, the underlying verb can be rendered 'strengthened'; this lexical alternative is preserved in documentation rather than used to reduce the force of the statement.
  doctrine_reference: Preserve theological tension rather than resolve it; YHWH default rendering as 'the LORD'.
