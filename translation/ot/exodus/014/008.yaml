id: EXO.14.8
reference: Exodus 14:8
source:
  edition: WLC
  text: וַ/יְחַזֵּ֣ק יְהֹוָ֗ה אֶת לֵ֤ב פַּרְעֹה֙ מֶ֣לֶךְ מִצְרַ֔יִם וַ/יִּרְדֹּ֕ף אַחֲרֵ֖י בְּנֵ֣י יִשְׂרָאֵ֑ל וּ/בְנֵ֣י יִשְׂרָאֵ֔ל יֹצְאִ֖ים בְּ/יָ֥ד רָמָֽה־׃
translation:
  text: And Yahweh hardened the heart of Pharaoh king of Egypt, and he pursued the sons of Israel, while the sons of Israel were going out with a high hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'strengthened the heart of Pharaoh.' The Hebrew verb literally means 'made strong/firm,' though in Exodus this expression commonly carries the sense 'hardened.'
    reason: lexical_alternative
  - marker: b
    text: Or 'boldly' or 'with uplifted hand.' The Hebrew idiom is literally 'with a raised hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהֹוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for YHWH, render as 'the LORD' rather than transliterating the divine name.
- source_word: וַיְחַזֵּק
  chosen: hardened
  alternatives:
  - strengthened
  - made firm
  lexicon: HALOT
  rationale: The verb חזק literally means 'strengthen/make strong,' but in the recurring Exodus idiom with Pharaoh's heart it denotes the hardening/firming of his resolve against Israel. 'Hardened' best communicates the established English sense of this judicial motif without obscuring the narrative connection.
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  - inner resolve
  lexicon: HALOT
  rationale: '''Heart'' is the standard and sufficiently transparent rendering for the Hebrew seat of will and disposition here.'
- source_word: פַּרְעֹה מֶלֶךְ מִצְרַיִם
  chosen: Pharaoh king of Egypt
  alternatives:
  - Pharaoh, the king of Egypt
  lexicon: HALOT
  rationale: A close rendering of the construct chain; English punctuation is not required.
- source_word: וַיִּרְדֹּף אַחֲרֵי
  chosen: he pursued
  alternatives:
  - he chased after
  - he followed after
  lexicon: HALOT
  rationale: רדף + אחרי means to pursue/chase after. 'Pursued' is concise, natural, and preserves the hostile military sense.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Following the gender-accurate principle, 'sons of Israel' preserves the Hebrew expression more closely than the traditional but broader 'children of Israel.' 'Israelites' is possible but less formally transparent in this verse, where the repeated phrase is rhetorically significant.
- source_word: יֹצְאִים
  chosen: were going out
  alternatives:
  - went out
  - were departing
  lexicon: HALOT
  rationale: The participle gives a durative/imperfective sense in context. 'Were going out' reflects ongoing action as Pharaoh pursued.
- source_word: בְּיָד רָמָה
  chosen: with a raised hand
  alternatives:
  - boldly
  - triumphantly
  - with uplifted hand
  lexicon: HALOT
  rationale: The idiom is literally 'with a high/raised hand.' Rather than interpret it fully as 'boldly' or 'defiantly,' the main text preserves the concrete image. An explanatory alternative is worth preserving in a footnote.
