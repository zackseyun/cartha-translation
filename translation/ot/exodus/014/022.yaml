id: EXO.14.22
reference: Exodus 14:22
source:
  edition: WLC
  text: וַ/יָּבֹ֧אוּ בְנֵֽי יִשְׂרָאֵ֛ל בְּ/ת֥וֹךְ הַ/יָּ֖ם בַּ/יַּבָּשָׁ֑ה וְ/הַ/מַּ֤יִם
    לָ/הֶם֙ חֹמָ֔ה מִֽ/ימִינָ֖/ם וּ/מִ/שְּׂמֹאלָֽ/ם־׃
translation:
  text: And the sons of Israel went into the midst of the sea on the dry ground, and
    the waters were a wall to them on their right and on their left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew is literally 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: went into
  alternatives:
  - came into
  - entered
  lexicon: HALOT
  rationale: The verb בוא in this narrative wayyiqtol context denotes movement into
    a place. 'Went into' reads naturally in English narrative while preserving the
    directional sense. 'Entered' is possible but slightly more formal; 'came into'
    is less natural here because the viewpoint is not anchored inside the sea.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Because the translation philosophy prefers
    gender-accurate renderings where the source is masculine and representative, the
    main text preserves the formal expression. 'The Israelites' is idiomatic but less
    transparent to the Hebrew wording; 'children of Israel' is traditional but less
    precise than the masculine plural construct.
- source_word: בְּתוֹךְ הַיָּם
  chosen: into the midst of the sea
  alternatives:
  - through the middle of the sea
  - into the middle of the sea
  lexicon: HALOT
  rationale: בְּתוֹךְ means 'in the midst/middle of.' 'Into the midst of the sea'
    closely reflects the Hebrew while remaining intelligible. 'Through the middle'
    is interpretive and better suits the broader event than this clause alone.
- source_word: בַּיַּבָּשָׁה
  chosen: on the dry ground
  alternatives:
  - on dry ground
  - on the dry land
  lexicon: HALOT
  rationale: The noun denotes dry land/ground as opposed to water. 'On the dry ground'
    preserves the article and the concrete image of a dried seabed. 'Dry land' is
    possible but can sound broader than the immediate path underfoot.
- source_word: וְהַמַּיִם
  chosen: and the waters
  alternatives:
  - and the water
  lexicon: HALOT
  rationale: Though English often uses the mass noun 'water,' the Hebrew plural is
    vivid and distributive in this scene. 'The waters' preserves the literary force
    and is standard natural English in elevated narrative.
- source_word: חֹמָה
  chosen: a wall
  alternatives:
  - like a wall
  - a barrier
  lexicon: HALOT
  rationale: The noun straightforwardly means 'wall.' The Hebrew does not include
    an explicit comparative marker, so 'a wall' is preferred over 'like a wall.' 'Barrier'
    weakens the concrete imagery.
- source_word: מִימִינָם
  chosen: on their right
  alternatives:
  - to their right
  - from their right hand
  lexicon: HALOT
  rationale: The prepositional phrase indicates position at their right side. 'On
    their right' is natural English and preserves the spatial sense.
- source_word: וּמִשְּׂמֹאלָם
  chosen: on their left
  alternatives:
  - to their left
  - from their left hand
  lexicon: HALOT
  rationale: Parallel to the previous phrase, this indicates position at their left
    side. 'On their left' keeps the symmetry and readability of the Hebrew parallelism.
