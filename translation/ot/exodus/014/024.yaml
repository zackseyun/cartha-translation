id: EXO.14.24
reference: Exodus 14:24
source:
  edition: WLC
  text: וַֽ/יְהִי֙ בְּ/אַשְׁמֹ֣רֶת הַ/בֹּ֔קֶר וַ/יַּשְׁקֵ֤ף יְהוָה֙ אֶל מַחֲנֵ֣ה מִצְרַ֔יִם
    בְּ/עַמּ֥וּד אֵ֖שׁ וְ/עָנָ֑ן וַ/יָּ֕הָם אֵ֖ת מַחֲנֵ֥ה מִצְרָֽיִם־׃
translation:
  text: And in the morning watch, the LORD looked down on the camp of the Egyptians
    through the pillar of fire and cloud, and threw the camp of the Egyptians into
    confusion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from within the pillar of fire and cloud.'
    reason: lexical_alternative
  - marker: b
    text: Or 'threw the camp of the Egyptians into panic.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּאַשְׁמֹרֶת הַבֹּקֶר
  chosen: in the morning watch
  alternatives:
  - at the watch of the morning
  - during the morning watch
  lexicon: HALOT
  rationale: אַשְׁמֹרֶת denotes a watch or guard period of the night/day transition.
    'Morning watch' is the natural English equivalent and preserves the temporal specificity
    without overexplaining.
- source_word: וַיַּשְׁקֵף
  chosen: looked down on
  alternatives:
  - looked
  - gazed out at
  - peered toward
  lexicon: HALOT
  rationale: The verb שׁקף in this stem commonly conveys looking out/down from an
    elevated or heavenly vantage. 'Looked down on' captures both the directionality
    and the divine perspective better than the flatter 'looked'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention rooted
    in the LXX pattern.
- source_word: מַחֲנֵה מִצְרַיִם
  chosen: the camp of the Egyptians
  alternatives:
  - the Egyptian camp
  - the camp of Egypt
  lexicon: HALOT
  rationale: The construct phrase most naturally refers to the military encampment
    belonging to the Egyptians. 'The camp of the Egyptians' is slightly more formal
    and mirrors the Hebrew structure.
- source_word: בְּעַמּוּד אֵשׁ וְעָנָן
  chosen: through the pillar of fire and cloud
  alternatives:
  - in the pillar of fire and cloud
  - from within the pillar of fire and cloud
  lexicon: HALOT
  rationale: The preposition ב here is instrumental or locative-instrumental. 'Through
    the pillar of fire and cloud' communicates that the LORD's action is mediated
    from within/by means of the pillar, while remaining idiomatic in English.
- source_word: וַיָּהָם
  chosen: threw ... into confusion
  alternatives:
  - confused
  - threw ... into panic
  - routed
  lexicon: HALOT
  rationale: The verb הום conveys causing tumult, confusion, or panic. 'Threw the
    camp of the Egyptians into confusion' preserves the causative force and avoids
    overstating the result as a full rout, which the immediate context develops progressively.
