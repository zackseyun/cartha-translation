id: EXO.14.11
reference: Exodus 14:11
source:
  edition: WLC
  text: וַ/יֹּאמְרוּ֮ אֶל מֹשֶׁה֒ הַֽ/מִ/בְּלִ֤י אֵין קְבָרִים֙ בְּ/מִצְרַ֔יִם לְקַחְתָּ֖/נוּ
    לָ/מ֣וּת בַּ/מִּדְבָּ֑ר מַה זֹּאת֙ עָשִׂ֣יתָ לָּ֔/נוּ לְ/הוֹצִיאָ֖/נוּ מִ/מִּצְרָֽיִם־־־׃
translation:
  text: And they said to Moses, “Was it because there were no graves in Egypt that
    you took us away to die in the wilderness? What is this you have done to us, bringing
    us out of Egypt?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “Is it for lack of graves in Egypt that you have taken
      us to die in the wilderness?”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: And they said
  alternatives:
  - And they spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר introducing direct speech; 'said'
    is the natural English narrative equivalent.
- source_word: אֶל מֹשֶׁה
  chosen: to Moses
  alternatives:
  - to Mosheh
  lexicon: HALOT
  rationale: אֶל marks indirect object/direction of speech. The personal name is transliterated
    by standard English convention as 'Moses' per translation philosophy.
- source_word: הֲמִבְּלִי אֵין קְבָרִים בְּמִצְרַיִם
  chosen: Was it because there were no graves in Egypt
  alternatives:
  - Is it for lack of graves in Egypt
  - Was it for want of graves in Egypt
  lexicon: HALOT
  rationale: The idiom הֲמִבְּלִי + אֵין expresses a sarcastic rhetorical question,
    literally 'Is it from there being no graves...?' English idiom is best captured
    by 'Was it because there were no graves in Egypt,' preserving the irony without
    wooden awkwardness.
- source_word: לְקַחְתָּנוּ
  chosen: that you took us away
  alternatives:
  - that you took us
  - that you brought us
  lexicon: HALOT
  rationale: לקח is 'take.' 'Took us away' fits the accusatory force and the movement
    away from Egypt. 'Brought' would blur the lexical distinction from הוציא later
    in the verse.
- source_word: לָמוּת
  chosen: to die
  lexicon: HALOT
  rationale: Infinitive of מות with straightforward purpose/result sense after לקח.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/desert terrain. 'Wilderness' is
    preferred for consistency in Exodus and because it better reflects the broader
    uncultivated region, not merely sandy desert.
- source_word: מַה זֹּאת עָשִׂיתָ לָּנוּ
  chosen: What is this you have done to us
  alternatives:
  - Why have you done this to us
  - What have you done to us
  lexicon: HALOT
  rationale: The Hebrew is an exclamatory interrogative, literally 'What is this you
    have done to us?' This preserves the emotional force more closely than the smoother
    but less literal 'Why have you done this to us?'
- source_word: לְהוֹצִיאָנוּ מִמִּצְרָיִם
  chosen: bringing us out of Egypt
  alternatives:
  - by bringing us out of Egypt
  - to bring us out of Egypt
  lexicon: HALOT
  rationale: הוציא means 'bring out/lead out.' Here the infinitive explains the complained-of
    action. 'Bringing us out of Egypt' works idiomatically in apposition to the prior
    clause and preserves the exodus motif.
