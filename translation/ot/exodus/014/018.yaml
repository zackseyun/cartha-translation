id: EXO.14.18
reference: Exodus 14:18
source:
  edition: WLC
  text: וְ/יָדְע֥וּ מִצְרַ֖יִם כִּי אֲנִ֣י יְהוָ֑ה בְּ/הִכָּבְדִ֣/י בְּ/פַרְעֹ֔ה בְּ/רִכְבּ֖/וֹ וּ/בְ/פָרָשָֽׁי/ו־׃
translation:
  text: And the Egyptians will know that I am Yahweh, when I gain glory through Pharaoh, through his chariots, and through his horsemen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “when I am glorified through Pharaoh, through his chariots, and through his horsemen.”
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: “the LORD” represents the divine name YHWH, traditionally rendered this way in English translations.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְיָדְעוּ
  chosen: And ... will know
  alternatives:
  - and ... shall know
  - then ... will know
  lexicon: HALOT
  rationale: 'Qal perfect with prefixed conjunction in prophetic/narrative sequence expresses future result here: the Egyptians coming to recognize YHWH through the impending event. ''Will know'' is natural modern English.'
- source_word: מִצְרַיִם
  chosen: the Egyptians
  alternatives:
  - Egypt
  lexicon: HALOT
  rationale: Although the form can denote the land or people, context requires the people of Egypt as the subject who come to know.
- source_word: כִּי אֲנִי יְהוָה
  chosen: that I am the LORD
  alternatives:
  - that I am Yahweh
  lexicon: HALOT
  rationale: Standard recognition formula. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated. 'That I am the LORD' preserves the covenantal self-identification.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּהִכָּבְדִי
  chosen: when I gain glory
  alternatives:
  - when I am glorified
  - when I get honor
  - when I show my glory
  lexicon: HALOT
  rationale: From כבד in the Niphal/infinitive construct with 1cs suffix, denoting YHWH's being honored/glorified in relation to Pharaoh's defeat. 'Gain glory' communicates the result in idiomatic English while preserving that the event manifests YHWH's honor. 'When' fits the temporal force of בְּ with infinitive construct.
- source_word: בְּפַרְעֹה
  chosen: through Pharaoh
  alternatives:
  - in Pharaoh
  - by Pharaoh
  - over Pharaoh
  lexicon: HALOT
  rationale: The preposition ב here marks the sphere/means by which YHWH's glory is displayed. 'Through Pharaoh' is idiomatic and matches the repeated structure with the following terms.
- source_word: בְּרִכְבּוֹ
  chosen: through his chariots
  alternatives:
  - through his chariotry
  - in his chariots
  lexicon: HALOT
  rationale: רכב can denote chariotry collectively. 'His chariots' is clear modern English and preserves the military reference.
- source_word: וּבְפָרָשָׁיו
  chosen: and through his horsemen
  alternatives:
  - and through his cavalry
  - and through his riders
  lexicon: HALOT
  rationale: פָרָשִׁים refers to horsemen/cavalry. 'Horsemen' is the most direct and traditional rendering, fitting the paired military terms with chariots.
