id: EXO.14.25
reference: Exodus 14:25
source:
  edition: WLC
  text: וַ/יָּ֗סַר אֵ֚ת אֹפַ֣ן מַרְכְּבֹתָ֔י/ו וַֽ/יְנַהֲגֵ֖/הוּ בִּ/כְבֵדֻ֑ת וַ/יֹּ֣אמֶר מִצְרַ֗יִם אָנ֨וּסָה֙ מִ/פְּנֵ֣י יִשְׂרָאֵ֔ל כִּ֣י יְהוָ֔ה נִלְחָ֥ם לָ/הֶ֖ם בְּ/מִצְרָֽיִםפ
translation:
  text: And he removed the wheels from their chariots, and drove them with difficulty. And Egypt said, “Let us flee from before Israel, for Yahweh is fighting for them against Egypt.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Egypt' is singular and speaks collectively for the Egyptian force; alternatively, 'the Egyptians said.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Let us flee from before Israel'; the Hebrew has a singular cohortative, likely collective in force.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּסַר
  chosen: removed
  alternatives:
  - took off
  - turned aside
  - caused to depart
  lexicon: HALOT
  rationale: The verb סור in the hiphil can mean 'remove' or 'take away.' In this context with 'the wheels of his chariots,' 'removed' best captures the causative sense without over-specifying mechanism.
- source_word: אֹפַן מַרְכְּבֹתָיו
  chosen: the wheels from his chariots
  alternatives:
  - the wheel of his chariot
  - the chariot wheels
  lexicon: HALOT
  rationale: Although אֹפַן is singular in form, it functions collectively with the plural 'his chariots.' English idiom prefers the plural 'wheels' here. The 3ms suffix likely refers collectively to Egypt/Pharaoh as representative of the Egyptian force.
- source_word: וַיְנַהֲגֵהוּ
  chosen: drove them
  alternatives:
  - led them
  - made it drive
  - caused them to move
  lexicon: HALOT
  rationale: נהג commonly means 'drive' or 'lead.' With chariots as the implied object, 'drove them' is the most natural English rendering. The singular pronominal suffix is understood collectively in context.
- source_word: בִּכְבֵדֻת
  chosen: with difficulty
  alternatives:
  - heavily
  - with heaviness
  - laboriously
  lexicon: HALOT
  rationale: The noun conveys heaviness or difficulty. In idiomatic English for impaired chariot movement, 'with difficulty' communicates the sense more clearly than the more literal but awkward 'heavily.'
- source_word: מִצְרַיִם
  chosen: Egypt
  alternatives:
  - the Egyptians
  lexicon: HALOT
  rationale: The singular proper noun is used as a collective national subject. Retaining 'Egypt' reflects the Hebrew form while still allowing the nation/army to speak representatively.
- source_word: אָנֻסָה
  chosen: Let me flee
  alternatives:
  - I must flee
  - I will flee
  - Let us flee
  lexicon: HALOT
  rationale: The cohortative 1cs expresses resolve or exhortative force. Since the subject 'Egypt' is singular collective, 'Let me flee' preserves the Hebrew grammar more closely than smoothing to plural, while still sounding like representative speech.
- source_word: מִפְּנֵי יִשְׂרָאֵל
  chosen: from before Israel
  alternatives:
  - from Israel
  - away from Israel
  lexicon: HALOT
  rationale: The idiom literally means 'from before the face/presence of.' 'From before Israel' preserves the Hebrew spatial idiom with acceptable English dignity.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: נִלְחָם לָהֶם
  chosen: is fighting for them
  alternatives:
  - fights for them
  - is warring for them
  - is fighting on their behalf
  lexicon: HALOT
  rationale: The participle expresses ongoing action. 'Is fighting for them' captures the durative sense and the benefactive force of לָהֶם.
- source_word: בְּמִצְרָיִם
  chosen: against Egypt
  alternatives:
  - in Egypt
  - with Egypt
  lexicon: HALOT
  rationale: Although ב normally means 'in/with,' with the verb 'fight' it can mark the opponent. 'Against Egypt' best conveys the sense in natural English.
