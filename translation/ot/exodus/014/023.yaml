id: EXO.14.23
reference: Exodus 14:23
source:
  edition: WLC
  text: וַ/יִּרְדְּפ֤וּ מִצְרַ֨יִם֙ וַ/יָּבֹ֣אוּ אַחֲרֵי/הֶ֔ם כֹּ֚ל ס֣וּס פַּרְעֹ֔ה
    רִכְבּ֖/וֹ וּ/פָרָשָׁ֑י/ו אֶל תּ֖וֹךְ הַ/יָּֽם־׃
translation:
  text: The Egyptians pursued and went in after them into the midst of the sea—all
    Pharaoh’s horses, his chariots, and his horsemen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'all Pharaoh’s horse, his chariotry, and his horsemen' uses a collective
      singular for 'horse'; the translation renders the sense in natural English as
      'Pharaoh’s horses.'
    reason: lexical_alternative
  - marker: b
    text: Or 'entered after them into the middle of the sea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְדְּפוּ
  chosen: pursued
  alternatives:
  - chased
  lexicon: HALOT
  rationale: רדף commonly means to pursue or chase. 'Pursued' fits the military narrative
    and is standard, clear English.
- source_word: מִצְרַיִם
  chosen: The Egyptians
  alternatives:
  - Egypt
  lexicon: HALOT
  rationale: Though the form can denote the land or people, the plural verbal context
    and narrative sense clearly indicate the people/army of Egypt. English idiom prefers
    'The Egyptians' here.
- source_word: וַיָּבֹאוּ
  chosen: went in
  alternatives:
  - entered
  - came in
  lexicon: HALOT
  rationale: בוא is a broad motion verb. 'Went in' preserves the sequential movement
    into the sea path and reads naturally in context.
- source_word: אַחֲרֵיהֶם
  chosen: after them
  alternatives:
  - behind them
  lexicon: HALOT
  rationale: The preposition indicates following in pursuit. 'After them' best matches
    the idiom with the preceding pursuit verb.
- source_word: כֹּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: כֹּל here governs the following coordinated military elements and is
    naturally rendered 'all' in English.
- source_word: סוּס פַּרְעֹה
  chosen: Pharaoh’s horses
  alternatives:
  - every horse of Pharaoh
  - all Pharaoh’s cavalry horses
  lexicon: HALOT
  rationale: The singular סוּס after כֹּל functions collectively. English expresses
    this naturally as the plural collective 'Pharaoh’s horses.'
- source_word: רִכְבּוֹ
  chosen: his chariots
  alternatives:
  - his chariotry
  - his chariot force
  lexicon: HALOT
  rationale: רכב can denote chariot(s) or chariotry. In this list of military assets,
    'his chariots' is the most natural and sufficiently precise rendering.
- source_word: וּפָרָשָׁיו
  chosen: and his horsemen
  alternatives:
  - and his cavalry
  - and his riders
  lexicon: HALOT
  rationale: פָּרָשִׁים refers to horsemen/cavalry. 'Horsemen' preserves the concrete
    image and matches the military list.
- source_word: אֶל תּוֹךְ הַיָּם
  chosen: into the midst of the sea
  alternatives:
  - into the middle of the sea
  - into the sea
  lexicon: HALOT
  rationale: תּוֹךְ adds the sense of interiority, not merely entry. 'Into the midst
    of the sea' preserves the emphasis that they advanced into its interior passage.
