id: EXO.14.29
reference: Exodus 14:29
source:
  edition: WLC
  text: וּ/בְנֵ֧י יִשְׂרָאֵ֛ל הָלְכ֥וּ בַ/יַּבָּשָׁ֖ה בְּ/ת֣וֹךְ הַ/יָּ֑ם וְ/הַ/מַּ֤יִם
    לָ/הֶם֙ חֹמָ֔ה מִֽ/ימִינָ֖/ם וּ/מִ/שְּׂמֹאלָֽ/ם
translation:
  text: But the sons of Israel walked on dry ground through the midst of the sea,
    and the waters were a wall to them on their right and on their left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And the Israelites walked on dry land through the sea.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the waters were a wall to them'; some understand this as 'like a
      wall.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְנֵי יִשְׂרָאֵל
  chosen: But the sons of Israel
  alternatives:
  - And the sons of Israel
  - But the Israelites
  lexicon: HALOT
  rationale: בני ישראל is literally 'sons of Israel.' This preserves the Hebrew familial/national
    expression and follows the gender-accurate principle. 'But' is chosen for the
    prefixed conjunction here because the clause contrasts Israel's safe passage with
    the Egyptians' destruction in the surrounding context; 'and' is possible more
    formally, and 'the Israelites' is a smoother dynamic alternative.
- source_word: הָלְכוּ
  chosen: walked
  alternatives:
  - went
  lexicon: HALOT
  rationale: הלך commonly means 'go/walk.' 'Walked' fits the narrative image of proceeding
    on foot through the sea and is a standard rendering here.
- source_word: בַיַּבָּשָׁה
  chosen: on dry ground
  alternatives:
  - on the dry land
  - on dry land
  lexicon: HALOT
  rationale: יבשה denotes dry land/ground. 'On dry ground' is idiomatic English and
    highlights the miraculous condition of the seabed.
- source_word: בְּתוֹךְ הַיָּם
  chosen: through the midst of the sea
  alternatives:
  - in the midst of the sea
  - through the sea
  lexicon: HALOT
  rationale: בתוך means 'in/through the midst of.' 'Through the midst of the sea'
    preserves the vivid spatial sense while remaining natural English.
- source_word: וְהַמַּיִם
  chosen: and the waters
  alternatives:
  - and the water
  lexicon: HALOT
  rationale: Though מים is morphologically plural in Hebrew, English may use either
    collective singular or plural. 'The waters' better preserves the Hebrew form and
    the dramatic imagery.
- source_word: לָהֶם
  chosen: to them
  alternatives:
  - for them
  lexicon: HALOT
  rationale: 'The preposition ל marks relation here: the waters functioned as a wall
    with reference to them. ''To them'' is slightly more literal; ''for them'' is
    a natural alternative.'
- source_word: חֹמָה
  chosen: a wall
  alternatives:
  - like a wall
  lexicon: HALOT
  rationale: חומה straightforwardly means 'wall.' The Hebrew does not include an explicit
    comparative particle, so the main text keeps the more direct rendering 'a wall.'
    The simile-like sense sometimes inferred in interpretation is preserved as an
    alternative only.
- source_word: מִימִינָם
  chosen: on their right
  alternatives:
  - at their right hand
  - to their right
  lexicon: HALOT
  rationale: מן with ימין indicates position at/from the right side. 'On their right'
    is clear modern English.
- source_word: וּמִשְּׂמֹאלָם
  chosen: and on their left
  alternatives:
  - and at their left hand
  - and to their left
  lexicon: HALOT
  rationale: Parallel to the previous phrase, this denotes the left side. 'And on
    their left' preserves the balanced structure of the Hebrew.
