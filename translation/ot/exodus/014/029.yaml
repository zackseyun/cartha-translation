theological_decisions:
- issue: Rendering of בני ישראל
  chosen_reading: sons of Israel
  alternative_readings:
  - Israelites
  rationale: The Hebrew expression is literally filial and national. Following the
    translation philosophy's gender-accurate principle, the main text preserves 'sons
    of Israel' rather than flattening to the ethnic label 'Israelites,' though the
    latter is a legitimate idiomatic alternative.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Whether חֹמָה should be rendered literally or comparatively
  chosen_reading: a wall
  alternative_readings:
  - like a wall
  rationale: The text states that the waters were 'a wall' to them without an explicit
    marker of comparison. The translation preserves the stronger literal wording and
    does not weaken the miraculous description by adding 'like' in the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
