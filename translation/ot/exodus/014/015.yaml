theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for YHWH and avoids introducing
    a denominationally loaded preference while preserving the covenant-name distinction
    in standard English Bible style.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering בְּנֵי יִשְׂרָאֵל with gender-accurate language
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The Hebrew is grammatically masculine plural. In keeping with the project's
    gender-accurate-over-gender-neutral principle, the masculine form is preserved
    in the main text rather than neutralized, while a more idiomatic alternative is
    preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
