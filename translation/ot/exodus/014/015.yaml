id: EXO.14.15
reference: Exodus 14:15
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל מֹשֶׁ֔ה מַה תִּצְעַ֖ק אֵלָ֑/י דַּבֵּ֥ר אֶל בְּנֵי
    יִשְׂרָאֵ֖ל וְ/יִסָּֽעוּ־־־־׃
translation:
  text: Then the LORD said to Moses, “Why are you crying out to me? Tell the sons
    of Israel to set out.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Israelites.”
    reason: lexical_alternative
  - marker: b
    text: Or “to go forward.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name YHWH as
    'the LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive with אמר advances the narrative. 'Then ... said'
    gives natural English narrative flow while preserving the sequential force.
- source_word: מַה
  chosen: Why
  alternatives:
  - What is this, that
  - Why is it that
  lexicon: HALOT
  rationale: In the idiom מַה + verb here, English 'Why' best conveys the rebuking/interrogative
    force rather than a wooden 'What'.
- source_word: תִּצְעַק אֵלַי
  chosen: are you crying out to me
  alternatives:
  - do you cry out to me
  - are you calling out to me
  lexicon: HALOT
  rationale: צעק commonly denotes crying out, often in distress or appeal. 'Are you
    crying out to me' preserves the directness and emotional force. The English progressive
    fits the immediate situation naturally.
- source_word: דַּבֵּר
  chosen: Tell
  alternatives:
  - Speak to
  - Command
  lexicon: HALOT
  rationale: The imperative of דבר with אֶל can be rendered 'speak to,' but 'Tell'
    is more idiomatic in English here while still preserving the directive force without
    overstating it as 'command.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Per the gender-accurate principle, the formally masculine plural construct
    is preserved as 'sons of Israel.' 'Israelites' is possible, but the more literal
    rendering better reflects the source form and traditional covenantal designation.
- source_word: וְיִסָּעוּ
  chosen: to set out
  alternatives:
  - to go forward
  - to break camp
  - to journey on
  lexicon: HALOT
  rationale: נסע in travel contexts means to pull up camp and set out/journey. 'Set
    out' is concise, natural English that fits the immediate command to begin moving.
    'Go forward' is traditional but less lexically specific.
