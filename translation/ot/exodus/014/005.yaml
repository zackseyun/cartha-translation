id: EXO.14.5
reference: Exodus 14:5
source:
  edition: WLC
  text: וַ/יֻּגַּד֙ לְ/מֶ֣לֶךְ מִצְרַ֔יִם כִּ֥י בָרַ֖ח הָ/עָ֑ם וַ֠/יֵּהָפֵךְ לְבַ֨ב
    פַּרְעֹ֤ה וַ/עֲבָדָי/ו֙ אֶל הָ/עָ֔ם וַ/יֹּֽאמרוּ֙ מַה זֹּ֣את עָשִׂ֔ינוּ כִּֽי
    שִׁלַּ֥חְנוּ אֶת יִשְׂרָאֵ֖ל מֵ/עָבְדֵֽ/נוּ־־־־׃
translation:
  text: It was reported to the king of Egypt that the people had fled, and the heart
    of Pharaoh and of his servants was turned against the people, and they said, “What
    is this we have done, that we have let Israel go from serving us?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the mind of Pharaoh and his servants was changed toward the people.”
    reason: lexical_alternative
  - marker: b
    text: Or, “that we have released Israel from our service” or “from being our slaves.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֻּגַּד
  chosen: It was reported
  alternatives:
  - it was told
  - word was brought
  lexicon: HALOT
  rationale: Passive/Hophal form of נגד indicates an unspecified agent reporting news.
    English passive preserves the Hebrew's impersonal report style.
- source_word: לְמֶלֶךְ מִצְרַיִם
  chosen: to the king of Egypt
  alternatives:
  - to Egypt's king
  lexicon: HALOT
  rationale: Straightforward genitive construction; retained in natural English order.
- source_word: כִּי בָרַח הָעָם
  chosen: that the people had fled
  alternatives:
  - that the people fled
  - that the people had run away
  lexicon: HALOT
  rationale: ברח commonly means 'flee/run away.' Pluperfect-like English ('had fled')
    fits the narrative sequence after Israel's departure. 'The people' reflects the
    definite noun.
- source_word: וַיֵּהָפֵךְ לְבַב
  chosen: the heart ... was turned
  alternatives:
  - was changed
  - was overturned
  lexicon: HALOT
  rationale: נהפך with 'heart' is idiomatic for an inner change or reversal of attitude.
    'Was turned' preserves the metaphor without overinterpreting.
- source_word: לְבַב פַּרְעֹה וַעֲבָדָיו
  chosen: the heart of Pharaoh and of his servants
  alternatives:
  - the mind of Pharaoh and his servants
  - Pharaoh and his servants changed their minds
  lexicon: HALOT
  rationale: לְבַב is literally 'heart,' often the seat of will/thought in Hebrew.
    Retaining 'heart' preserves the Hebrew anthropology and imagery better than flattening
    to 'mind.' Singular 'heart' follows the Hebrew construction even with compound
    possessors.
- source_word: אֶל הָעָם
  chosen: against the people
  alternatives:
  - toward the people
  - concerning the people
  lexicon: HALOT
  rationale: With this idiom of changed heart, אֶל here signals a directional shift
    in attitude that is hostile in context. 'Against' makes the sense explicit in
    idiomatic English.
- source_word: וַיֹּאמְרוּ
  chosen: and they said
  alternatives:
  - and they were saying
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative advance; simple past is appropriate.
- source_word: מַה זֹּאת עָשִׂינוּ
  chosen: What is this we have done
  alternatives:
  - What have we done
  - Why have we done this
  lexicon: HALOT
  rationale: The Hebrew includes both interrogative and demonstrative ('what is this'),
    an idiomatic expression of alarm/regret. Preserving the fuller form reflects the
    source more closely than the smoother 'What have we done?'.
- source_word: שִׁלַּחְנוּ
  chosen: we have let ... go
  alternatives:
  - we have sent away
  - we released
  lexicon: HALOT
  rationale: שׁלח in this context refers to dismissing/releasing Israel. 'Let ...
    go' is idiomatic English and echoes the Exodus motif without becoming archaic.
- source_word: מֵעָבְדֵנוּ
  chosen: from serving us
  alternatives:
  - from our service
  - from being our slaves
  lexicon: HALOT
  rationale: The infinitive/verb from עבד after מן expresses cessation of service
    to Egypt. 'From serving us' is a close and natural rendering. 'From being our
    slaves' is interpretively stronger than the immediate wording, though the broader
    context involves forced labor.
