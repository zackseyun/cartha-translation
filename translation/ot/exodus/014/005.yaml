theological_decisions:
- issue: Anthropological term לְבַב
  chosen_reading: heart
  alternative_readings:
  - mind
  rationale: The Hebrew term denotes the inner seat of thought and will, but the translation
    preserves the source metaphor rather than reducing it to a modern psychological
    term. This maintains theological and literary texture without importing extra
    claims.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Nature of Israel's status in מֵעָבְדֵנוּ
  chosen_reading: from serving us
  alternative_readings:
  - from being our slaves
  rationale: Although Egypt's oppression elsewhere clearly entails bondage, this clause
    itself speaks of Israel's serving Egypt. The main text stays close to the wording
    and avoids importing a stronger term not explicitly present here.
  doctrine_reference: Translation philosophy §1, §5
