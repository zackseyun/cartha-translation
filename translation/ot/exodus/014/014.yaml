id: EXO.14.14
reference: Exodus 14:14
source:
  edition: WLC
  text: יְהוָ֖ה יִלָּחֵ֣ם לָ/כֶ֑ם וְ/אַתֶּ֖ם תַּחֲרִישֽׁוּ/ן׃פ
translation:
  text: Yahweh will fight for you, and you must be silent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will be silent,' 'you shall keep quiet,' or traditionally 'you shall hold your peace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יִלָּחֵם
  chosen: will fight
  alternatives:
  - will battle
  - will wage war
  lexicon: HALOT
  rationale: 'The Niphal imperfect of לחם here expresses future action: YHWH will engage in battle on Israel''s behalf. ''Will fight'' is the most natural modern English rendering and preserves the military sense without overtranslation.'
- source_word: לָכֶם
  chosen: for you
  alternatives:
  - on your behalf
  - for your sake
  lexicon: HALOT
  rationale: The preposition ל with 2mp suffix indicates advantage/benefit. 'For you' is concise and idiomatic, while retaining the sense that the LORD acts on behalf of Israel.
- source_word: וְאַתֶּם
  chosen: and you
  alternatives:
  - but you
  - while you
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun creates a contrast with the LORD's action. 'And you' preserves the Hebrew coordination while allowing the contrast to be felt in context.
- source_word: תַּחֲרִישׁוּן
  chosen: must be silent
  alternatives:
  - will be silent
  - shall keep quiet
  - shall hold your peace
  lexicon: HALOT
  rationale: From חרשׁ in the Hiphil, the verb means to be silent/keep quiet. Although morphologically imperfect, in this exhortational context after Moses' reassurance it carries an injunctive force in English. 'Must be silent' communicates the force clearly in modern English better than the traditional but archaic 'hold your peace.'
