id: EXO.14.12
reference: Exodus 14:12
source:
  edition: WLC
  text: הֲ/לֹא זֶ֣ה הַ/דָּבָ֗ר אֲשֶׁר֩ דִּבַּ֨רְנוּ אֵלֶ֤י/ךָ בְ/מִצְרַ֨יִם֙ לֵ/אמֹ֔ר
    חֲדַ֥ל מִמֶּ֖/נּוּ וְ/נַֽעַבְדָ֣ה אֶת מִצְרָ֑יִם כִּ֣י ט֥וֹב לָ֨/נוּ֙ עֲבֹ֣ד אֶת
    מִצְרַ֔יִם מִ/מֻּתֵ֖/נוּ בַּ/מִּדְבָּֽר־־־׃
translation:
  text: Is this not the word that we spoke to you in Egypt, saying, ‘Leave us alone
    so that we may serve the Egyptians’? For it would have been better for us to serve
    the Egyptians than to die in the wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this matter' or 'this thing' for 'this ... word' (זֶה הַדָּבָר).
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Leave off from us' is an idiom meaning 'Leave us alone' or 'Stop
      bothering us.'
    reason: lexical_alternative
  - marker: c
    text: Or 'it is better for us to serve the Egyptians than to die in the wilderness.'
      The Hebrew states the comparison without an explicit auxiliary; English may
      express it as a present general statement or a retrospective complaint.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Is ... not
  alternatives:
  - Was ... not
  - Did ... not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. English 'Is this
    not' naturally captures the force with the following demonstrative clause.
- source_word: זֶה הַדָּבָר
  chosen: this ... word
  alternatives:
  - this matter
  - this thing
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'thing.' Here it refers to a prior
    statement they claim to have spoken, so 'word' best preserves the speech-oriented
    sense while remaining idiomatic in English.
- source_word: דִּבַּרְנוּ אֵלֶיךָ
  chosen: we spoke to you
  alternatives:
  - we said to you
  - we told you
  lexicon: HALOT
  rationale: A straightforward rendering of the Piel verb with indirect object. 'Spoke
    to you' stays close to the Hebrew without overinterpreting the force as command
    or warning.
- source_word: בְמִצְרַיִם
  chosen: in Egypt
  lexicon: HALOT
  rationale: Locative sense is plain and should be rendered directly.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - when we said
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing the content of the prior speech.
- source_word: חֲדַל מִמֶּנּוּ
  chosen: Leave us alone
  alternatives:
  - Stop from us
  - Leave off from us
  - Cease from us
  lexicon: HALOT
  rationale: The idiom means to desist from bothering or pressing them. 'Leave us
    alone' is the most natural modern English equivalent and fits the context of Israel's
    complaint to Moses.
- source_word: וְנַעַבְדָה אֶת מִצְרַיִם
  chosen: so that we may serve the Egyptians
  alternatives:
  - and let us serve the Egyptians
  - that we may work for the Egyptians
  lexicon: HALOT
  rationale: The cohortative expresses desired result or permission after the imperative.
    'So that we may serve' captures the volitional nuance in smooth English. 'Serve'
    is preferable to 'work for' because the context is bondage/service under Egyptian
    rule.
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the reason for the quoted plea. 'For' preserves the explanatory
    connection cleanly.
- source_word: טוֹב לָנוּ
  chosen: it would have been better for us
  alternatives:
  - it is better for us
  - better for us
  lexicon: HALOT
  rationale: Although the Hebrew lacks an explicit past auxiliary, the complaint is
    retrospective in context, contrasting the preferable alternative with the present
    danger. English idiom is best served by 'it would have been better for us.'
- source_word: עֲבֹד אֶת מִצְרַיִם
  chosen: to serve the Egyptians
  alternatives:
  - serving the Egyptians
  lexicon: HALOT
  rationale: Infinitive construct after טוֹב expresses the preferable action. 'To
    serve the Egyptians' is the clearest English equivalent.
- source_word: מִמֻּתֵנוּ
  chosen: than to die
  alternatives:
  - than our dying
  - rather than dying
  lexicon: HALOT
  rationale: The prefixed מִן marks comparison after 'better.' English comparative
    idiom requires 'than to die.'
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר denotes wilderness/desert terrain. 'Wilderness' is a standard
    biblical rendering and fits the Exodus setting without sounding overly technical.
