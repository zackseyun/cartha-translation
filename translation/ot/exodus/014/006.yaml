id: EXO.14.6
reference: Exodus 14:6
source:
  edition: WLC
  text: וַ/יֶּאְסֹ֖ר אֶת רִכְבּ֑/וֹ וְ/אֶת עַמּ֖/וֹ לָקַ֥ח עִמּֽ/וֹ־־׃
translation:
  text: So he harnessed his chariot and took his people with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'made his chariot ready'; the Hebrew verb literally means 'bound' or
      'fastened,' here in the sense of preparing the chariot team.
    reason: lexical_alternative
  - marker: b
    text: '''His people'' likely refers to the force accompanying Pharaoh; the Hebrew
      says ''his people,'' not explicitly ''his army.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּאְסֹר
  chosen: harnessed
  alternatives:
  - made ready
  - bound
  - hitched
  lexicon: HALOT
  rationale: The verb אסר literally means 'to bind/tie,' but with chariot context
    it refers to fastening or harnessing the team/chariot for departure. 'Harnessed'
    conveys the concrete action in natural English better than the more generic 'bound'
    or the interpretive 'made ready'.
- source_word: רִכְבּוֹ
  chosen: his chariot
  alternatives:
  - his chariotry
  - his chariot team
  lexicon: HALOT
  rationale: Although רכב can denote chariotry more broadly, the singular with suffix
    here most naturally refers to Pharaoh's own chariot. 'His chariot' fits the syntax
    and immediate narrative context.
- source_word: עַמּוֹ
  chosen: his people
  alternatives:
  - his army
  - his men
  lexicon: HALOT
  rationale: The noun עם ordinarily means 'people.' In this military setting it refers
    to the people accompanying Pharaoh, likely his fighting force, but the Hebrew
    does not explicitly say 'army' here. 'His people' preserves the source wording
    without over-specifying.
- source_word: לָקַח עִמּוֹ
  chosen: took with him
  alternatives:
  - took along with him
  - brought with him
  lexicon: HALOT
  rationale: This common verbal-prepositional combination straightforwardly means
    'took with him.' 'Took' is the most direct and idiomatic rendering.
