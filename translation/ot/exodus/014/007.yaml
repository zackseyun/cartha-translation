id: EXO.14.7
reference: Exodus 14:7
source:
  edition: WLC
  text: וַ/יִּקַּ֗ח שֵׁשׁ מֵא֥וֹת רֶ֨כֶב֙ בָּח֔וּר וְ/כֹ֖ל רֶ֣כֶב מִצְרָ֑יִם וְ/שָׁלִשִׁ֖ם
    עַל כֻּלּֽ/וֹ־־׃
translation:
  text: And he took six hundred choice chariots, and all the chariots of Egypt, with
    officers over all of them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with chariot officers over all of them'; the Hebrew term can denote
      elite military aides or captains associated with chariots.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: And he took
  alternatives:
  - Then he took
  - So he took
  lexicon: HALOT
  rationale: Wayyiqtol of לקח advances the narrative. 'And he took' preserves the
    sequential force without overinterpreting the nuance.
- source_word: שֵׁשׁ מֵאוֹת
  chosen: six hundred
  lexicon: HALOT
  rationale: Straightforward cardinal number construction.
- source_word: רֶכֶב
  chosen: chariots
  alternatives:
  - chariot force
  - war chariots
  lexicon: HALOT
  rationale: Though רכב can function collectively ('chariotry'), English idiom here
    is best served by the countable 'chariots,' especially with the explicit number
    six hundred.
- source_word: בָּחוּר
  chosen: choice
  alternatives:
  - select
  - picked
  lexicon: HALOT
  rationale: The passive participial adjective from בחר denotes selected or elite
    quality. 'Choice' is concise and idiomatic in English for specially selected military
    units.
- source_word: וְכֹל רֶכֶב מִצְרַיִם
  chosen: and all the chariots of Egypt
  alternatives:
  - and all Egypt's chariots
  - and every chariot of Egypt
  lexicon: HALOT
  rationale: Construct chain with כל indicates the full Egyptian chariot force in
    addition to the six hundred elite chariots. 'All the chariots of Egypt' is the
    most natural rendering.
- source_word: וְשָׁלִשִׁם
  chosen: with officers
  alternatives:
  - and third men
  - and chariot officers
  - and adjutants
  lexicon: HALOT
  rationale: שָׁלִישׁ/שָׁלִשִׁים is a military term often understood as chariot officers
    or elite aides, not literally 'third men' in English. 'Officers' communicates
    the rank/function clearly while remaining broad enough for the lexical uncertainty.
- source_word: עַל כֻּלּוֹ
  chosen: over all of them
  alternatives:
  - over all of it
  - on all of them
  lexicon: HALOT
  rationale: Although the suffix is singular in form, the sense in context is distributive/collective
    with the chariot force. 'Over all of them' gives the natural English sense that
    officers were assigned throughout the force.
