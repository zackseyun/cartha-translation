theological_decisions:
- issue: Rendering בְנֵי יִשְׂרָאֵל with gender-accurate language
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The Hebrew is explicitly masculine plural ('sons of'). Following the
    project's gender-accurate-over-gender-neutral principle, the translation preserves
    the form rather than neutralizing it, while recognizing that the referent is the
    covenant people as a whole.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
