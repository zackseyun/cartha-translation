id: EXO.14.16
reference: Exodus 14:16
source:
  edition: WLC
  text: וְ/אַתָּ֞ה הָרֵ֣ם אֶֽת מַטְּ/ךָ֗ וּ/נְטֵ֧ה אֶת יָדְ/ךָ֛ עַל הַ/יָּ֖ם וּ/בְקָעֵ֑/הוּ
    וְ/יָבֹ֧אוּ בְנֵֽי יִשְׂרָאֵ֛ל בְּ/ת֥וֹךְ הַ/יָּ֖ם בַּ/יַּבָּשָֽׁה־־־־׃
translation:
  text: But as for you, lift up your staff and stretch out your hand over the sea
    and split it, so that the sons of Israel may go into the midst of the sea on dry
    ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or 'the children of Israel.' The Hebrew reads 'the sons
      of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה
  chosen: But as for you
  alternatives:
  - And you
  - But you
  lexicon: HALOT
  rationale: 'The conjunction plus independent pronoun marks contrastive emphasis
    in context: while the people are told to move forward, Moses is singled out for
    action. ''But as for you'' preserves the emphatic contrast more clearly than a
    simple ''and you.'''
- source_word: הָרֵם
  chosen: lift up
  alternatives:
  - raise
  lexicon: HALOT
  rationale: The Hiphil imperative of רום here calls for elevating the staff. 'Lift
    up' is idiomatic modern English and fits the physical gesture.
- source_word: מַטְּךָ
  chosen: your staff
  alternatives:
  - your rod
  lexicon: HALOT
  rationale: מַטֶּה can mean rod, staff, or branch; in the Moses narrative 'staff'
    is the most natural contemporary English rendering and avoids archaic tone while
    preserving the object’s symbolic function.
- source_word: וּנְטֵה
  chosen: and stretch out
  alternatives:
  - and extend
  lexicon: HALOT
  rationale: The Qal imperative of נטה commonly describes extending the hand. 'Stretch
    out' is the standard natural equivalent in English.
- source_word: יָדְךָ
  chosen: your hand
  lexicon: HALOT
  rationale: Direct, literal rendering of the body-part term; no contextual reason
    to paraphrase.
- source_word: עַל הַיָּם
  chosen: over the sea
  alternatives:
  - toward the sea
  - upon the sea
  lexicon: HALOT
  rationale: עַל can denote movement or position over/upon. In this gesture context,
    'over the sea' best captures the action of extending the hand in relation to the
    waters.
- source_word: וּבְקָעֵהוּ
  chosen: and split it
  alternatives:
  - and divide it
  - and cleave it
  lexicon: HALOT
  rationale: The verb בקע means to split or cleave. 'Split it' is vivid, natural English
    and avoids the potentially overtraditional 'divide' while still matching the physical
    sense.
- source_word: וְיָבֹאוּ
  chosen: so that ... may go
  alternatives:
  - and ... shall go in
  - and ... will enter
  lexicon: HALOT
  rationale: Although formally a prefixed imperfect with waw, in this command sequence
    it expresses intended result/purpose following Moses' action. 'So that ... may
    go' communicates the sense well in English.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, the masculine plural construct is preserved
    as 'sons of Israel.' 'Israelites' is smoother but less transparent to the Hebrew
    form; 'children of Israel' is traditional but less precise.
- source_word: בְּתוֹךְ הַיָּם
  chosen: into the midst of the sea
  alternatives:
  - through the sea
  - in the middle of the sea
  lexicon: HALOT
  rationale: בְּתוֹךְ denotes being in the middle/interior. 'Into the midst of the
    sea' preserves the concrete spatial imagery better than the more interpretive
    'through the sea.'
- source_word: בַּיַּבָּשָׁה
  chosen: on dry ground
  alternatives:
  - on the dry land
  - on dry land
  lexicon: HALOT
  rationale: The noun denotes dry ground/land in contrast to the sea. 'On dry ground'
    is idiomatic English and highlights the miracle that the seabed is dry enough
    for passage.
