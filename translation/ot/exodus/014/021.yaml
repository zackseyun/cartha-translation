id: EXO.14.21
reference: Exodus 14:21
source:
  edition: WLC
  text: וַ/יֵּ֨ט מֹשֶׁ֣ה אֶת יָד/וֹ֮ עַל הַ/יָּם֒ וַ/יּ֣וֹלֶךְ יְהוָ֣ה אֶת הַ֠/יָּם
    בְּ/ר֨וּחַ קָדִ֤ים עַזָּה֙ כָּל הַ/לַּ֔יְלָה וַ/יָּ֥שֶׂם אֶת הַ/יָּ֖ם לֶ/חָרָבָ֑ה
    וַ/יִּבָּקְע֖וּ הַ/מָּֽיִם־־׀־־־׃
translation:
  text: Then Moses stretched out his hand over the sea, and the LORD drove the sea
    back by a strong east wind all night and made the sea dry land, and the waters
    were split.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD caused the sea to go back'; the Hebrew verb is causative and
      can be rendered more literally, but 'drove the sea back' best conveys the sense
      in English.
    reason: lexical_alternative
  - marker: b
    text: Or 'by a mighty east wind.'
    reason: lexical_alternative
  - marker: c
    text: Or 'made the sea into dry ground' or 'turned the sea into dry ground.'
    reason: lexical_alternative
  - marker: d
    text: Or 'the waters were divided.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּט
  chosen: stretched out
  alternatives:
  - extended
  - held out
  lexicon: HALOT
  rationale: The verb נטה with 'hand' commonly means to stretch out or extend the
    hand. 'Stretched out' is idiomatic modern English and preserves the physical action
    without paraphrase.
- source_word: יָדוֹ
  chosen: his hand
  lexicon: HALOT
  rationale: Straightforward possessive construction; singular 'hand' should be retained.
- source_word: עַל הַיָּם
  chosen: over the sea
  alternatives:
  - toward the sea
  - upon the sea
  lexicon: HALOT
  rationale: עַל can mean over/upon/against. With the gesture of the hand, 'over the
    sea' is the most natural English rendering and matches the scene.
- source_word: וַיּוֹלֶךְ יְהוָה אֶת הַיָּם
  chosen: the LORD drove the sea back
  alternatives:
  - the LORD caused the sea to go
  - the LORD set the sea in motion
  lexicon: HALOT
  rationale: הלך in the Hiphil here is causative. In context of the sea being opened,
    English requires an idiomatic causative sense; 'drove the sea back' captures the
    effect without overinterpreting mechanism.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'.
- source_word: בְּרוּחַ קָדִים עַזָּה
  chosen: by a strong east wind
  alternatives:
  - with a strong east wind
  - by a mighty east wind
  lexicon: HALOT
  rationale: רוּחַ here denotes wind rather than spirit because it is qualified by
    'east' and functions as the means by which the sea is driven back. 'Strong' renders
    עַזָּה naturally.
- source_word: כָּל הַלַּיְלָה
  chosen: all night
  alternatives:
  - throughout the whole night
  lexicon: HALOT
  rationale: Concise idiomatic rendering preserving the duration.
- source_word: וַיָּשֶׂם אֶת הַיָּם לֶחָרָבָה
  chosen: made the sea dry land
  alternatives:
  - turned the sea into dry ground
  - made the sea into dry ground
  lexicon: HALOT
  rationale: חָרָבָה denotes dry land/ground. 'Dry land' is a clear and natural rendering,
    and keeping 'sea' as the object preserves the Hebrew wording's force.
- source_word: וַיִּבָּקְעוּ הַמָּיִם
  chosen: the waters were split
  alternatives:
  - the waters were divided
  - the waters split apart
  lexicon: HALOT
  rationale: The Niphal/passive-like form of בקע indicates the waters were cleaved/split.
    'Were split' is vivid and direct; 'divided' is possible but less concrete.
