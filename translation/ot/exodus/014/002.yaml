id: EXO.14.2
reference: Exodus 14:2
source:
  edition: WLC
  text: דַּבֵּר֮ אֶל בְּנֵ֣י יִשְׂרָאֵל֒ וְ/יָשֻׁ֗בוּ וְ/יַחֲנוּ֙ לִ/פְנֵי֙ פִּ֣י
    הַחִירֹ֔ת בֵּ֥ין מִגְדֹּ֖ל וּ/בֵ֣ין הַ/יָּ֑ם לִ/פְנֵי֙ בַּ֣עַל צְפֹ֔ן נִכְח֥/וֹ
    תַחֲנ֖וּ עַל הַ/יָּֽם־־׃
translation:
  text: Speak to the sons of Israel, so that they turn back and camp before Pi-hahiroth,
    between Migdol and the sea. Before Baal-zephon, opposite it, you shall camp by
    the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew reads 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Pi-hahiroth, Migdol, and Baal-zephon are place names and are therefore transliterated
      rather than translated.
    reason: cultural_note
  - marker: c
    text: Or 'facing it.' The pronoun in 'opposite it' most likely refers to Baal-zephon.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Tell
  - Speak to
  lexicon: HALOT
  rationale: Piel imperative of דבר, a direct command to Moses. 'Speak' is the straightforward
    formal equivalent; the following preposition אֶל supplies 'to' in English.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Chosen to preserve the Hebrew familial expression
    and follow the gender-accurate principle. 'Israelites' is idiomatic but less transparent
    to the source; 'children of Israel' is traditional but can sound archaic or imply
    age.
- source_word: וְיָשֻׁבוּ
  chosen: so that they turn back
  alternatives:
  - and let them turn back
  - and they shall turn back
  - and return
  lexicon: HALOT
  rationale: Jussive after an imperative, expressing the commanded action. 'So that
    they turn back' conveys the directive force in natural English and preserves the
    sense of reversing direction, which is contextually important.
- source_word: וְיַחֲנוּ
  chosen: and camp
  alternatives:
  - and encamp
  - and pitch camp
  lexicon: HALOT
  rationale: From חנה, 'camp/encamp.' 'Camp' is modern and readable; 'encamp' is more
    formal but less natural. The military/travel setting is still clear.
- source_word: לִפְנֵי פִּי הַחִירֹת
  chosen: before Pi-hahiroth
  alternatives:
  - in front of Pi-hahiroth
  - before the mouth of Hahiroth
  lexicon: HALOT
  rationale: פִּי הַחִירֹת is a place name conventionally transliterated Pi-hahiroth.
    Since names are transliterated by policy, the toponym is retained rather than
    translated etymologically.
- source_word: בֵּין מִגְדֹּל וּבֵין הַיָּם
  chosen: between Migdol and the sea
  alternatives:
  - between Migdol and the Sea
  lexicon: HALOT
  rationale: בֵּין...וּבֵין marks the two boundaries. 'The sea' is the plain sense
    of הַיָּם here; capitalization as a formal title is not required by the Hebrew
    in this verse.
- source_word: לִפְנֵי בַּעַל צְפֹן
  chosen: Before Baal-zephon
  alternatives:
  - In front of Baal-zephon
  - opposite Baal-zephon
  lexicon: HALOT
  rationale: Another locative phrase with a proper place name. The name is transliterated.
    'Before' keeps the spatial relation consistent with לִפְנֵי.
- source_word: נִכְחוֹ
  chosen: opposite it
  alternatives:
  - facing it
  - in front of it
  - opposite him
  lexicon: HALOT
  rationale: נֹכַח with 3ms suffix indicates position 'opposite/in front of it.' The
    suffix most naturally refers to Baal-zephon as a place, so 'it' is preferable
    in English. 'Opposite' best captures the spatial nuance without redundancy.
- source_word: תַחֲנוּ
  chosen: you shall camp
  alternatives:
  - you are to camp
  - camp
  lexicon: HALOT
  rationale: Second masculine plural imperfect used as a direct instruction. 'You
    shall camp' clearly addresses the Israelites and preserves the command force while
    fitting English style after the descriptive locatives.
- source_word: עַל הַיָּם
  chosen: by the sea
  alternatives:
  - beside the sea
  - upon the sea
  - at the sea
  lexicon: HALOT
  rationale: עַל in this locative context is best rendered idiomatically as 'by' rather
    than the overly literal 'upon.' This communicates proximity to the shoreline.
