id: EXO.14.9
reference: Exodus 14:9
source:
  edition: WLC
  text: וַ/יִּרְדְּפ֨וּ מִצְרַ֜יִם אַחֲרֵי/הֶ֗ם וַ/יַּשִּׂ֤יגוּ אוֹתָ/ם֙ חֹנִ֣ים עַל
    הַ/יָּ֔ם כָּל סוּס֙ רֶ֣כֶב פַּרְעֹ֔ה וּ/פָרָשָׁ֖י/ו וְ/חֵיל֑/וֹ עַל פִּי֙ הַֽחִירֹ֔ת
    לִ/פְנֵ֖י בַּ֥עַל צְפֹֽן־־־׃
translation:
  text: The Egyptians pursued them and overtook them as they were camped by the sea—all
    Pharaoh’s horses, his chariots, his horsemen, and his army—by Pi-hahiroth, before
    Baal-zephon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'opposite Baal-zephon.' The Hebrew phrase can denote a position facing
      a landmark.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְדְּפוּ
  chosen: pursued
  alternatives:
  - chased
  lexicon: HALOT
  rationale: רדף commonly means to pursue or chase. 'Pursued' is the standard, natural
    English rendering and fits the military context without sounding colloquial.
- source_word: מִצְרַיִם
  chosen: The Egyptians
  alternatives:
  - Egypt
  lexicon: HALOT
  rationale: Although the form can denote the land or the people, the plural verbal
    context and sense require the people/forces of Egypt. 'The Egyptians' makes the
    subject explicit in English.
- source_word: וַיַּשִּׂיגוּ
  chosen: overtook
  alternatives:
  - caught up with
  - reached
  lexicon: HALOT
  rationale: נשׂג in this context means to catch up with or overtake. 'Overtook' is
    concise and preserves the narrative force.
- source_word: חֹנִים
  chosen: as they were camped
  alternatives:
  - encamped
  - camping
  lexicon: HALOT
  rationale: The participle describes Israel's state when the Egyptians caught up
    to them. 'As they were camped' expresses the circumstantial nuance clearly in
    modern English; 'encamped' is possible but slightly stiffer.
- source_word: עַל הַיָּם
  chosen: by the sea
  alternatives:
  - at the sea
  - by the Sea
  lexicon: HALOT
  rationale: עַל here is locative. 'By the sea' is idiomatic English and suits the
    setting. Capitalized 'Sea' is unnecessary because the Hebrew uses the common noun
    with article, not a formal title here.
- source_word: כָּל סוּס רֶכֶב פַּרְעֹה
  chosen: all Pharaoh’s horses, his chariots
  alternatives:
  - every horse of Pharaoh’s chariotry
  - all the horses and chariots of Pharaoh
  lexicon: HALOT
  rationale: The Hebrew sequence is compressed and collective. Rather than the overly
    literal but awkward 'every horse of Pharaoh's chariot,' the translation unpacks
    the military inventory into natural English while preserving the sense of totality
    with 'all.'
- source_word: וּפָרָשָׁיו
  chosen: his horsemen
  alternatives:
  - his cavalry
  lexicon: HALOT
  rationale: פָּרָשִׁים are horsemen/mounted troops. 'Horsemen' is more transparent
    and closer to the lexical form than the more interpretive military term 'cavalry.'
- source_word: וְחֵילוֹ
  chosen: and his army
  alternatives:
  - and his force
  - and his troops
  lexicon: HALOT
  rationale: חַיִל here denotes military force. 'Army' is the clearest natural rendering
    in context.
- source_word: עַל פִּי הַחִירֹת
  chosen: by Pi-hahiroth
  alternatives:
  - at Pi-hahiroth
  - beside Pi-hahiroth
  lexicon: HALOT
  rationale: This is a place name introduced by a prepositional expression. 'By Pi-hahiroth'
    is idiomatic and corresponds well to the locative sense.
- source_word: לִפְנֵי בַּעַל צְפֹן
  chosen: before Baal-zephon
  alternatives:
  - opposite Baal-zephon
  - in front of Baal-zephon
  lexicon: HALOT
  rationale: לִפְנֵי often means before, in front of, or opposite in spatial contexts.
    'Before' is concise and traditional, while still intelligible as a locative relation
    to the place/site named Baal-zephon.
