theological_decisions:
- issue: Referent of the singular verbs in the verse
  chosen_reading: Use impersonal/neuter 'it' for the moving and illuminating presence
  alternative_readings:
  - Use personal 'he' referring to the angel of God
  - Use 'the pillar/cloud' explicitly in the main text
  rationale: The immediate literary context includes both the angel of God and the
    pillar of cloud. The Hebrew singular permits either as the manifested divine presence.
    Using 'it' preserves the narrative ambiguity rather than resolving it dogmatically,
    in keeping with the translation philosophy of preserving tension where the text
    does not force a single interpretive resolution.
  doctrine_reference: Translation philosophy §3
