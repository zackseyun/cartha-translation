id: EXO.14.20
reference: Exodus 14:20
source:
  edition: WLC
  text: וַ/יָּבֹ֞א בֵּ֣ין מַחֲנֵ֣ה מִצְרַ֗יִם וּ/בֵין֙ מַחֲנֵ֣ה יִשְׂרָאֵ֔ל וַ/יְהִ֤י
    הֶֽ/עָנָן֙ וְ/הַ/חֹ֔שֶׁךְ וַ/יָּ֖אֶר אֶת הַ/לָּ֑יְלָה וְ/לֹא קָרַ֥ב זֶ֛ה אֶל זֶ֖ה
    כָּל הַ/לָּֽיְלָה׀־־־־׃
translation:
  text: And it came between the camp of Egypt and the camp of Israel, and there was
    the cloud and the darkness, yet it lit up the night; and the one did not come
    near the other all night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and there was the cloud and darkness, but it gave light by night.'
      The Hebrew is terse, and ancient versions and translations differ on how the
      darkness and light relate to the two camps.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: it came
  alternatives:
  - he came
  - it moved
  lexicon: HALOT
  rationale: The verb is singular masculine and refers back to the angel of God/pillar
    moving position in the preceding context. English 'it' best matches the immediate
    referent as the pillar/cloud manifestation in this verse, while 'came' preserves
    the narrative motion without overinterpreting.
- source_word: בֵּין ... וּבֵין
  chosen: between ... and ...
  alternatives:
  - in between ... and ...
  lexicon: HALOT
  rationale: Standard spatial sense; 'between ... and ...' is the most natural and
    formally accurate rendering.
- source_word: מַחֲנֵה
  chosen: camp
  alternatives:
  - army
  - encampment
  lexicon: HALOT
  rationale: In this military-travel context, 'camp' is the clearest and most idiomatic
    rendering, covering both the people and their encampment.
- source_word: מִצְרַיִם
  chosen: Egypt
  alternatives:
  - the Egyptians
  lexicon: HALOT
  rationale: The construct phrase is literally 'camp of Egypt.' Although it refers
    to the Egyptian force, retaining 'Egypt' follows the Hebrew wording closely and
    remains clear in English.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - the Israelites
  lexicon: HALOT
  rationale: The Hebrew has the proper name 'Israel' in construct. 'Israel' preserves
    the source form; the sense 'the Israelites' is implicit in 'camp of Israel.'
- source_word: וַיְהִי
  chosen: there was
  alternatives:
  - and it was
  - and it became
  lexicon: HALOT
  rationale: Existential 'there was' best fits the clause that follows in English
    and avoids awkwardness while preserving the Hebrew narrative sequence.
- source_word: הֶעָנָן
  chosen: the cloud
  lexicon: HALOT
  rationale: Direct rendering of the definite noun; in context this is the pillar-cloud
    already introduced.
- source_word: וְהַחֹשֶׁךְ
  chosen: and the darkness
  alternatives:
  - and darkness
  lexicon: HALOT
  rationale: The Hebrew has the definite article on both nouns. Retaining both articles
    reflects the source and preserves the stark juxtaposition.
- source_word: וַיָּאֶר
  chosen: yet it lit up
  alternatives:
  - and it gave light
  - and he lit up
  - and it shone
  lexicon: HALOT
  rationale: The verb from אור means to give light/shine. 'Lit up' is readable modern
    English. 'Yet' brings out the adversative sense implied by the juxtaposition of
    cloud/darkness with illumination, without adding more than the context warrants.
- source_word: אֶת־הַלָּיְלָה
  chosen: the night
  alternatives:
  - at night
  lexicon: HALOT
  rationale: The direct object marker indicates the night is what was illuminated;
    'the night' is the straightforward rendering.
- source_word: וְלֹא קָרַב
  chosen: did not come near
  alternatives:
  - did not approach
  - did not draw near
  lexicon: HALOT
  rationale: A simple and natural rendering of the negated verb, preserving the spatial
    sense of prevented approach.
- source_word: זֶה אֶל־זֶה
  chosen: the one ... the other
  alternatives:
  - one ... another
  - this one ... that one
  lexicon: HALOT
  rationale: This idiom denotes mutual proximity between the two camps. 'The one ...
    the other' is idiomatic and avoids ambiguity.
- source_word: כָּל־הַלָּיְלָה
  chosen: all night
  alternatives:
  - the whole night
  - all the night
  lexicon: HALOT
  rationale: Idiomatic English equivalent of the Hebrew duration phrase.
