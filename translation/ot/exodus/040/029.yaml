id: EXO.40.29
reference: Exodus 40:29
source:
  edition: WLC
  text: וְ/אֵת֙ מִזְבַּ֣ח הָ/עֹלָ֔ה שָׂ֕ם פֶּ֖תַח מִשְׁכַּ֣ן אֹֽהֶל מוֹעֵ֑ד וַ/יַּ֣עַל עָלָ֗י/ו אֶת הָ/עֹלָה֙ וְ/אֶת הַ/מִּנְחָ֔ה כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶֽׁה־־־־׃ס
translation:
  text: And he set the altar of burnt offering at the entrance to the tabernacle of the tent of meeting, and offered on it the burnt offering and the grain offering, just as Yahweh had commanded Moses.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: מִזְבַּח הָעֹלָה
  chosen: the altar of burnt offering
  alternatives:
  - the altar for burnt offering
  - the burnt-offering altar
  lexicon: HALOT
  rationale: Construct phrase identifying the altar by its primary sacrificial function. 'Altar of burnt offering' is clear, idiomatic, and preserves the cultic specificity of עֹלָה.
- source_word: שָׂם
  chosen: set
  alternatives:
  - placed
  - put
  lexicon: HALOT
  rationale: A straightforward rendering of שׂים in this installation context. 'Set' fits formal narrative style and furniture/tabernacle placement language.
- source_word: פֶּתַח
  chosen: at the entrance to
  alternatives:
  - at the doorway of
  - before the entrance of
  lexicon: HALOT
  rationale: פֶּתַח denotes the opening/entrance. 'At the entrance to' is natural English and matches the spatial sense without over-literal awkwardness.
- source_word: מִשְׁכַּן אֹהֶל מוֹעֵד
  chosen: the tabernacle, the tent of meeting
  alternatives:
  - the dwelling, the tent of meeting
  - the tabernacle of the tent of meeting
  lexicon: HALOT
  rationale: The Hebrew stacks appositional/construct terms. Rendering both as 'the tabernacle, the tent of meeting' preserves both designations in readable English rather than collapsing one into the other.
- source_word: וַיַּעַל עָלָיו
  chosen: and offered on it
  alternatives:
  - and caused to go up on it
  - and presented on it
  lexicon: HALOT
  rationale: עלה in sacrificial contexts idiomatically means to offer up. 'Offered on it' communicates the cultic action clearly while preserving the altar as the location.
- source_word: הָעֹלָה
  chosen: the burnt offering
  lexicon: HALOT
  rationale: Standard and precise rendering of the sacrificial term עֹלָה.
- source_word: הַמִּנְחָה
  chosen: the grain offering
  alternatives:
  - the tribute offering
  - the gift offering
  lexicon: HALOT
  rationale: Though מִנְחָה can broadly mean gift/tribute, in priestly sacrificial context it refers to the cereal/grain offering. 'Grain offering' is the clearest established English equivalent here.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת־מֹשֶׁה
  chosen: just as the LORD had commanded Moses
  alternatives:
  - as the LORD commanded Moses
  lexicon: HALOT
  rationale: This formula marks Moses' obedience to divine instruction. 'Just as' slightly highlights conformity, and the pluperfect 'had commanded' fits the prior-command, subsequent-obedience sequence in English.
