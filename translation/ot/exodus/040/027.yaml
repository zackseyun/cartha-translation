id: EXO.40.27
reference: Exodus 40:27
source:
  edition: WLC
  text: וַ/יַּקְטֵ֥ר עָלָ֖י/ו קְטֹ֣רֶת סַמִּ֑ים כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶֽׁה־׃פ
translation:
  text: And he burned fragrant incense on it, just as Yahweh had commanded Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spiced incense' or 'aromatic incense'; the Hebrew phrase refers to incense made from fragrant spices.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְטֵר
  chosen: burned
  alternatives:
  - offered up in smoke
  - burned incense
  lexicon: HALOT
  rationale: The Hiphil of קטר commonly refers to causing an offering to go up in smoke, especially on an altar. In English, 'burned' is the most natural concise rendering here; the object 'incense' makes the cultic sense clear without over-paraphrase.
- source_word: עָלָיו
  chosen: on it
  alternatives:
  - upon it
  - on top of it
  lexicon: HALOT
  rationale: The preposition עַל with 3ms suffix refers to the incense altar mentioned in context. 'On it' is idiomatic modern English and sufficiently formal.
- source_word: קְטֹרֶת
  chosen: incense
  lexicon: HALOT
  rationale: Standard rendering for the noun denoting incense used in worship.
- source_word: סַמִּים
  chosen: fragrant
  alternatives:
  - sweet
  - spiced
  - aromatic
  lexicon: HALOT
  rationale: This plural noun refers to aromatic spices/compounds. In the collocation קְטֹרֶת סַמִּים, English idiom is best served by 'fragrant incense,' conveying incense made of aromatic spices without awkward literalism.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Introduces comparison to the divine command. 'Just as' clearly marks conformity to what was commanded.
- source_word: צִוָּה
  chosen: had commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: 'English past perfect fits the sequence naturally: the action in this verse conforms to a prior command already given.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
