id: EXO.40.35
reference: Exodus 40:35
source:
  edition: WLC
  text: וְ/לֹא יָכֹ֣ל מֹשֶׁ֗ה לָ/בוֹא֙ אֶל אֹ֣הֶל מוֹעֵ֔ד כִּֽי שָׁכַ֥ן עָלָ֖י/ו הֶ/עָנָ֑ן וּ/כְב֣וֹד יְהוָ֔ה מָלֵ֖א אֶת הַ/מִּשְׁכָּֽן־־־־׃
translation:
  text: And Moses was not able to enter the tent of meeting, because the cloud settled on it, and the glory of Yahweh filled the tabernacle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dwelt on it' or 'rested on it.' The Hebrew verb can carry the sense of dwelling or settling.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לֹא
  chosen: And ... not
  alternatives:
  - But ... not
  - Now ... not
  lexicon: HALOT
  rationale: The conjunction plus negation continues the narrative straightforwardly. 'And' preserves the Hebrew sequence without adding contrast not explicit in the text.
- source_word: יָכֹל
  chosen: was not able
  alternatives:
  - could not
  lexicon: HALOT
  rationale: The verb denotes ability. 'Was not able' is slightly more formal and transparent to the Hebrew construction than the contracted English 'could not,' while remaining natural.
- source_word: לָ/בוֹא
  chosen: to enter
  alternatives:
  - to go in
  - to come in
  lexicon: HALOT
  rationale: In context of approaching a structure, 'enter' gives the plain sense in idiomatic English.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  - the Tent of Meeting
  lexicon: HALOT
  rationale: This is the standard and contextually precise rendering of the sanctuary designation. Lowercase is used here as a common noun phrase in running translation rather than as a fixed English proper name.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Here the conjunction gives the reason Moses could not enter. 'Because' expresses the causal force clearly in modern English.
- source_word: שָׁכַן
  chosen: settled
  alternatives:
  - dwelt
  - rested
  - abode
  lexicon: HALOT
  rationale: The verb means to settle down or dwell. 'Settled' fits the immediate image of the cloud coming to rest upon the tent, while avoiding overly archaic diction. The theological resonance of the root with 'dwelling' is real, but in this verse the concrete scene is primary.
- source_word: עָלָיו
  chosen: on it
  alternatives:
  - upon it
  - over it
  lexicon: HALOT
  rationale: The preposition most naturally indicates the cloud's resting upon the tent. 'On it' is idiomatic and sufficiently literal.
- source_word: הֶעָנָן
  chosen: the cloud
  lexicon: HALOT
  rationale: Definite article preserved. The referent is the known divine cloud in the narrative.
- source_word: וּ/כְב֣וֹד יְהוָה
  chosen: and the glory of the LORD
  alternatives:
  - and the LORD's glory
  lexicon: HALOT
  rationale: Construct relationship rendered naturally. YHWH follows the doctrinal default as 'the LORD.' 'Glory' preserves the theological weight of כָּבוֹד without paraphrase.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מָלֵא
  chosen: filled
  alternatives:
  - had filled
  - was filling
  lexicon: HALOT
  rationale: The qatal here reports the resulting state/event in the narrative. Simple past 'filled' is the most natural English rendering.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  - the dwelling
  - the sanctuary
  lexicon: HALOT
  rationale: '''Tabernacle'' is the established and accurate rendering for מִשְׁכָּן in Exodus. Although the root relates to dwelling, this term in context refers specifically to the portable sanctuary.'
