theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of שָׁכַן in relation to divine dwelling theology
  chosen_reading: settled
  alternative_readings:
  - dwelt
  - rested
  rationale: The root later contributes to biblical 'dwelling' theology, but this verse's immediate image is the cloud coming to rest on the tent. 'Settled' preserves the concrete narrative sense without importing later theological terminology into the main text.
