id: EXO.40.32
reference: Exodus 40:32
source:
  edition: WLC
  text: בְּ/בֹאָ֞/ם אֶל אֹ֣הֶל מוֹעֵ֗ד וּ/בְ/קָרְבָתָ֛/ם אֶל הַ/מִּזְבֵּ֖חַ יִרְחָ֑צוּ כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶֽׁה־־־׃ס
translation:
  text: When they entered the tent of meeting, and when they approached the altar, they washed, just as Yahweh had commanded Moses.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּבֹאָם
  chosen: Whenever they entered
  alternatives:
  - When they entered
  - In their entering
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct with 3mp suffix expresses a temporal circumstance, naturally rendered 'when/whenever they entered.' 'Whenever' fits the iterative sense in context, since this describes repeated priestly practice.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  - the tent of appointment
  lexicon: HALOT
  rationale: This is the standard and contextually clear rendering for the tabernacle structure where Yahweh meets with Israel. It preserves the cultic sense without awkwardness.
- source_word: וּבְקָרְבָתָם
  chosen: and whenever they approached
  alternatives:
  - and when they came near
  - and in their drawing near
  lexicon: HALOT
  rationale: The preposition ב with infinitive construct of קרב again marks temporal circumstance. 'Approached' is idiomatic English and matches movement toward the altar.
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: The definite article is preserved. In tabernacle context, 'the altar' is the natural rendering.
- source_word: יִרְחָצוּ
  chosen: they washed
  alternatives:
  - they would wash
  - they washed themselves
  lexicon: HALOT
  rationale: The imperfect here describes customary action in a past narrative setting. English simple past can convey this habitual sense when paired with 'whenever.' 'Washed themselves' is possible, but the object is implied from context and need not be made explicit.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: '''Just as'' clearly introduces conformity to a prior command and reads naturally in modern English.'
- source_word: צִוָּה
  chosen: had commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: 'Past perfect fits the sequence: the washing occurred in accordance with an earlier command already given to Moses.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶת מֹשֶׁה
  chosen: Moses
  alternatives:
  - to Moses
  lexicon: HALOT
  rationale: With צוה, the direct object marker אֶת marks the person commanded. English idiom requires 'commanded Moses' rather than a wooden retention of the particle.
