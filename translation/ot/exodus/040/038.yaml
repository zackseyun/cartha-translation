id: EXO.40.38
reference: Exodus 40:38
source:
  edition: WLC
  text: כִּי֩ עֲנַ֨ן יְהוָ֤ה עַֽל הַ/מִּשְׁכָּן֙ יוֹמָ֔ם וְ/אֵ֕שׁ תִּהְיֶ֥ה לַ֖יְלָה בּ֑/וֹ לְ/עֵינֵ֥י כָל בֵּֽית יִשְׂרָאֵ֖ל בְּ/כָל מַסְעֵי/הֶֽם־־־־׃
translation:
  text: For the cloud of Yahweh was over the tabernacle by day, and fire was in it by night, before the eyes of all the house of Israel throughout all their journeys.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the sight of all the house of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'through all their journeys' or 'in all their journeys.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces an explanatory summary of the preceding narrative, so 'For' fits the discourse flow in English better than a more causal 'because.'
- source_word: עֲנַן יְהוָה
  chosen: the cloud of the LORD
  alternatives:
  - the LORD's cloud
  lexicon: HALOT
  rationale: Construct relationship is rendered naturally in English as 'the cloud of the LORD.' This preserves the association of the cloud with the LORD's presence without overinterpreting it.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name YHWH per DOCTRINE.md.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  - the tent dwelling
  lexicon: HALOT
  rationale: '''Tabernacle'' is the established and accurate rendering for מִשְׁכָּן in Exodus, referring to the sacred portable sanctuary. It remains understandable in modern English and preserves continuity in this context.'
- source_word: יוֹמָם
  chosen: by day
  alternatives:
  - during the day
  - in the daytime
  lexicon: HALOT
  rationale: Idiomatic temporal adverb best rendered 'by day' in parallel with 'by night.'
- source_word: וְאֵשׁ תִּהְיֶה לַיְלָה בּוֹ
  chosen: and fire was in it by night
  alternatives:
  - and fire was on it by night
  - and fire would be in it by night
  lexicon: HALOT
  rationale: The suffix in בּוֹ most naturally refers back to the cloud/tabernacle setting; 'in it' reflects the preposition directly and matches the imagery of fire present within the cloud at night. English past tense 'was' fits the narrative summary better than a more wooden 'would be.'
- source_word: לְעֵינֵי
  chosen: before the eyes of
  alternatives:
  - in the sight of
  - visible to
  lexicon: HALOT
  rationale: A fairly literal rendering that preserves the concrete Hebrew idiom while remaining natural English.
- source_word: כָל בֵּית יִשְׂרָאֵל
  chosen: all the house of Israel
  alternatives:
  - all Israel
  - the whole house of Israel
  lexicon: HALOT
  rationale: Retains the covenantal corporate expression 'house of Israel' rather than flattening it to simply 'Israel.'
- source_word: בְּכָל מַסְעֵיהֶם
  chosen: throughout all their journeys
  alternatives:
  - in all their journeys
  - through all their stages of travel
  lexicon: HALOT
  rationale: מַסְעִים refers to the people's travel stages or journeys. 'Throughout all their journeys' communicates the continuing circumstance across the whole wilderness travel.
