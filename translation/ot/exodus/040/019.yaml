id: EXO.40.19
reference: Exodus 40:19
source:
  edition: WLC
  text: וַ/יִּפְרֹ֤שׂ אֶת הָ/אֹ֨הֶל֙ עַל הַ/מִּשְׁכָּ֔ן וַ/יָּ֜שֶׂם אֶת מִכְסֵ֥ה הָ/אֹ֛הֶל עָלָ֖י/ו מִ/לְ/מָ֑עְלָ/ה כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶֽׁה־־־־׃ס
translation:
  text: Then he spread the tent over the tabernacle and put the covering of the tent over it from above, just as Yahweh had commanded Moses.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּפְרֹשׂ
  chosen: spread
  alternatives:
  - stretched out
  - pitched
  lexicon: HALOT
  rationale: The verb פרשׂ here denotes spreading out or extending a covering. 'Spread' is natural English and fits the action of laying the tent over the tabernacle structure. 'Pitched' would be more interpretive and less directly tied to the verb's basic sense.
- source_word: הָאֹהֶל
  chosen: the tent
  alternatives:
  - the tent covering
  lexicon: HALOT
  rationale: אֹהֶל ordinarily means 'tent.' In this tabernacle-construction context it refers to the tent layer placed over the mishkan. 'Tent' preserves the lexical distinction from מִכְסֶה ('covering') later in the verse.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  - the dwelling
  lexicon: HALOT
  rationale: מִשְׁכָּן is conventionally and accurately rendered 'tabernacle' in Exodus for the sacred dwelling. While 'dwelling' is more etymologically transparent, 'tabernacle' is both readable and contextually precise in English Bible usage.
- source_word: וַיָּשֶׂם
  chosen: put
  alternatives:
  - set
  - placed
  lexicon: HALOT
  rationale: שׂים is a common verb meaning 'put, set, place.' 'Put' is the most natural modern English choice here.
- source_word: מִכְסֵה הָאֹהֶל
  chosen: the covering of the tent
  alternatives:
  - the tent's covering
  - the covering for the tent
  lexicon: HALOT
  rationale: מִכְסֶה means 'covering.' The construct phrase is best represented straightforwardly as 'the covering of the tent,' preserving the distinction between the tent itself and its outer protective covering.
- source_word: עָלָיו
  chosen: over it
  alternatives:
  - on top of it
  lexicon: HALOT
  rationale: The pronoun refers back to the tabernacle/tent structure just mentioned. 'Over it' is idiomatic and matches the spatial sense of על.
- source_word: מִלְמָעְלָה
  chosen: from above
  alternatives:
  - above
  - on top
  lexicon: HALOT
  rationale: The adverbial expression literally means 'from above.' Retaining 'from above' reflects the Hebrew wording and clarifies that the covering was placed over the structure from the top.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת־מֹשֶׁה
  chosen: just as the LORD had commanded Moses
  alternatives:
  - as the LORD commanded Moses
  lexicon: HALOT
  rationale: This recurring Exodus formula marks Moses' obedience to divine instruction. 'Just as' slightly brings out the correspondence emphasized by כַּאֲשֶׁר. The pluperfect 'had commanded' fits the sequence in English, referring to prior instructions.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
