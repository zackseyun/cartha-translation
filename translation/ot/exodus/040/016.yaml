id: EXO.40.16
reference: Exodus 40:16
source:
  edition: WLC
  text: וַ/יַּ֖עַשׂ מֹשֶׁ֑ה כְּ֠/כֹל אֲשֶׁ֨ר צִוָּ֧ה יְהוָ֛ה אֹת֖/וֹ כֵּ֥ן עָשָֽׂה׃ס
translation:
  text: And Moses did according to all that Yahweh commanded him; so he did.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - made
  - acted
  lexicon: HALOT
  rationale: The verb עשה is broad ('do/make'). Here, with the following comparative phrase and resumptive conclusion, 'did' best fits obedient performance rather than manufacture alone.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: כְּכֹל
  chosen: according to all
  alternatives:
  - just as all
  - in accordance with everything
  lexicon: HALOT
  rationale: כ + כֹּל expresses conformity to the full extent of what was commanded. 'According to all' preserves the comprehensive force with natural English.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  - what
  lexicon: HALOT
  rationale: Relative particle introducing the content of what the LORD commanded.
- source_word: צִוָּה
  chosen: had commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: The command precedes Moses's action; English past perfect makes the sequence explicit and natural.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֹתוֹ
  chosen: him
  lexicon: HALOT
  rationale: Direct-object marker with 3ms suffix referring to Moses as the one commanded.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - accordingly
  lexicon: HALOT
  rationale: Adverb resuming and emphasizing exact correspondence between command and action. 'So' is concise and idiomatic.
- source_word: עָשָׂה
  chosen: he did
  alternatives:
  - he acted
  - he made it so
  lexicon: HALOT
  rationale: The repeated verb mirrors the Hebrew emphasis. Retaining 'he did' preserves the rhetorical reinforcement of Moses's obedience.
