theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering מַלְאַךְ in a theophanic context
  chosen_reading: angel
  alternative_readings:
  - messenger
  rationale: The Hebrew term can denote either a human or heavenly messenger. In this
    context of divine appearance in the bush, 'angel' best fits the narrative setting
    while not forcing a more specific theological identification than the text itself
    states.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
