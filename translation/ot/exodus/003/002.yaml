id: EXO.3.2
reference: Exodus 3:2
source:
  edition: WLC
  text: וַ֠/יֵּרָא מַלְאַ֨ךְ יְהֹוָ֥ה אֵלָ֛י/ו בְּ/לַבַּת אֵ֖שׁ מִ/תּ֣וֹךְ הַ/סְּנֶ֑ה
    וַ/יַּ֗רְא וְ/הִנֵּ֤ה הַ/סְּנֶה֙ בֹּעֵ֣ר בָּ/אֵ֔שׁ וְ/הַ/סְּנֶ֖ה אֵינֶ֥/נּוּ אֻכָּֽל־׃
translation:
  text: Then the angel of the LORD appeared to him in a flame of fire from the midst
    of the bush. He looked, and behold, the bush was burning with fire, but the bush
    was not consumed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the messenger of the LORD.' The Hebrew word can mean either 'angel'
      or 'messenger.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרָא
  chosen: appeared
  alternatives:
  - was seen
  - became visible
  lexicon: HALOT
  rationale: The Niphal form of ראה here is best rendered as an intransitive passive/reflexive,
    'appeared,' the standard idiomatic English equivalent in divine-appearance contexts.
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאַךְ can mean 'messenger' or 'angel.' In this theophanic narrative,
    'angel' is the most natural English rendering and matches established biblical
    usage without foreclosing the narrative's theological complexity. יְהוָה is rendered
    'the LORD' per doctrine default.
- source_word: יְהֹוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per the doctrine table, the covenant name is rendered 'the LORD' rather
    than transliterated forms.
- source_word: אֵלָיו
  chosen: to him
  lexicon: HALOT
  rationale: Directly reflects the preposition plus pronominal suffix, referring to
    Moses in context.
- source_word: בְּלַבַּת אֵשׁ
  chosen: in a flame of fire
  alternatives:
  - in the flame of fire
  - in blazing fire
  lexicon: HALOT
  rationale: לַבָּה/לַבַּת denotes flame; the construct with אֵשׁ yields the idiomatic
    expression 'flame of fire.' 'In a flame of fire' preserves the Hebrew imagery
    and syntax better than a looser paraphrase.
- source_word: מִתּוֹךְ הַסְּנֶה
  chosen: from the midst of the bush
  alternatives:
  - from within the bush
  - out of the bush
  lexicon: HALOT
  rationale: מִתּוֹךְ literally means 'from the midst/middle of.' 'Bush' is the standard
    rendering of סְּנֶה in this passage.
- source_word: וַיַּרְא
  chosen: He looked
  alternatives:
  - he saw
  lexicon: HALOT
  rationale: Although literally 'and he saw,' English narrative style is clearer with
    'He looked' before the following observation. This preserves the sequence of Moses
    directing his attention and then perceiving the sight.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: '''Behold'' preserves the discourse marker''s force of drawing attention
    to a striking sight. It remains readable in modern literary English in this elevated
    narrative context.'
- source_word: בֹּעֵר בָּאֵשׁ
  chosen: was burning with fire
  alternatives:
  - was on fire
  - burned with fire
  lexicon: HALOT
  rationale: The participle בֹּעֵר conveys ongoing action; 'was burning' captures
    the progressive sense. Adding 'with fire' reflects the explicit Hebrew phrase
    rather than reducing it to the idiom 'on fire.'
- source_word: אֵינֶנּוּ אֻכָּל
  chosen: was not consumed
  alternatives:
  - was not burned up
  - was not devoured
  lexicon: HALOT
  rationale: The passive of אכל here idiomatically means 'consumed' or 'burned up.'
    'Was not consumed' is concise, natural, and preserves the paradox central to the
    sign.
