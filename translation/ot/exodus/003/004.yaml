theological_decisions:
- issue: Rendering the divine names יְהוָה and אֱלֹהִים in the same verse
  chosen_reading: Render יְהוָה as 'Yahweh' and אֱלֹהִים as 'God,' preserving the Hebrew distinction in English.
  alternative_readings:
  - Render both simply as 'God' for stylistic smoothness
  - Render יְהוָה as 'Yahweh'
  rationale: The Hebrew text intentionally uses both names in close proximity. Preserving the distinction is more transparent to the source text and aligns with the doctrinal default for YHWH.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Referent continuity after the repeated divine naming
  chosen_reading: Translate the final וַיֹּאמֶר as 'And he said,' with the referent understood as Moses.
  alternative_readings:
  - 'Repeat the name: ''And Moses said'''
  rationale: Hebrew narrative commonly uses wayyiqtol with implicit subject continuity. English can preserve this naturally with 'he said' after the direct address, and the referent is clear from context.
