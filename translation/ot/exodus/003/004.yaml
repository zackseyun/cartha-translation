id: EXO.3.4
reference: Exodus 3:4
source:
  edition: WLC
  text: וַ/יַּ֥רְא יְהוָ֖ה כִּ֣י סָ֣ר לִ/רְא֑וֹת וַ/יִּקְרָא֩ אֵלָ֨י/ו אֱלֹהִ֜ים מִ/תּ֣וֹךְ הַ/סְּנֶ֗ה וַ/יֹּ֛אמֶר מֹשֶׁ֥ה מֹשֶׁ֖ה וַ/יֹּ֥אמֶר הִנֵּֽ/נִי׃
translation:
  text: When Yahweh saw that he had turned aside to look, God called to him from the midst of the bush and said, “Moses, Moses!” And he said, “Here I am.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from the midst of the bush''; alternatively, ''from within the bush.'''
    reason: lexical_alternative
  - marker: b
    text: The divine name יְהוָה is rendered 'the LORD' here; alternatively, 'Yahweh.'
    reason: alternative_reading
  - marker: c
    text: '''The bush'' may more specifically denote a thornbush.'
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - looked
  - perceived
  lexicon: HALOT
  rationale: The verb ראה in the wayyiqtol narrative sequence is most naturally 'saw.' 'Perceived' is possible contextually, but the plain narrative sense is visual observation leading to speech.
- source_word: כִּי
  chosen: that
  alternatives:
  - when
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of what the LORD saw: ''that he had turned aside.'' English idiom smooths the clause with ''When the LORD saw that...,'' preserving both temporal flow and content.'
- source_word: סָר
  chosen: had turned aside
  alternatives:
  - turned aside
  - went aside
  - changed course
  lexicon: HALOT
  rationale: סוּר commonly means 'turn aside/depart.' The pluperfect-like English 'had turned aside' fits the sequence after 'saw that,' indicating Moses' prior action before the call.
- source_word: לִרְאוֹת
  chosen: to look
  alternatives:
  - to see
  - to inspect
  lexicon: HALOT
  rationale: Infinitive of ראה after סָר expresses purpose. 'To look' is more natural modern English than 'to see' in this context of approaching for observation.
- source_word: וַיִּקְרָא אֵלָיו
  chosen: called to him
  alternatives:
  - called out to him
  - called him
  lexicon: HALOT
  rationale: קרא with אֶל commonly means 'call to' someone. 'Called to him' preserves the preposition and avoids over-dynamic expansion.
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - the divine one
  lexicon: HALOT
  rationale: Although the verse uses both יְהוָה and אֱלֹהִים, standard English renders אֱלֹהִים here as 'God.' This preserves the Hebrew's appositional/narrative identification without flattening either term into the other.
- source_word: מִתּוֹךְ
  chosen: from the midst of
  alternatives:
  - from within
  - out of the middle of
  lexicon: HALOT
  rationale: '''From the midst of'' is slightly more formal than ''from within'' but preserves the vivid spatial sense of the Hebrew and echoes the solemnity of the scene.'
- source_word: הַסְּנֶה
  chosen: the bush
  alternatives:
  - the thornbush
  lexicon: HALOT
  rationale: סְנֶה refers to the bush of the burning-bush episode, likely a thornbush, but 'the bush' is the established and sufficiently precise rendering in context. The more specific botanical nuance is not necessary in the main text.
- source_word: מֹשֶׁה מֹשֶׁה
  chosen: Moses, Moses!
  alternatives:
  - Moses! Moses!
  lexicon: HALOT
  rationale: The doubled name conveys urgency and personal address. Comma-separated repetition is natural English punctuation for vocative repetition.
- source_word: הִנֵּנִי
  chosen: Here I am
  alternatives:
  - Behold me
  - I am here
  - At your service
  lexicon: HALOT
  rationale: הִנֵּנִי is a conventional response of readiness/presence. 'Here I am' is idiomatic modern English and preserves both availability and location without overinterpreting it as servile obedience.
