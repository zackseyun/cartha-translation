theological_decisions:
- issue: Gendered covenantal designation בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the children of Israel
  - the Israelites
  rationale: Following the stated gender-accurate philosophy, the masculine plural
    is preserved where it carries representative force. This avoids flattening the
    source idiom while remaining understandable in English.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering of הִנֵּה in modern English
  chosen_reading: look
  alternative_readings:
  - behold
  rationale: The translation aims for readable modern English rather than archaic
    diction, while still preserving the discourse force of the particle.
  doctrine_reference: DOCTRINE.md Translation philosophy §6
