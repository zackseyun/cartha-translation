id: EXO.3.9
reference: Exodus 3:9
source:
  edition: WLC
  text: וְ/עַתָּ֕ה הִנֵּ֛ה צַעֲקַ֥ת בְּנֵי יִשְׂרָאֵ֖ל בָּ֣אָה אֵלָ֑/י וְ/גַם רָאִ֨יתִי֙
    אֶת הַ/לַּ֔חַץ אֲשֶׁ֥ר מִצְרַ֖יִם לֹחֲצִ֥ים אֹתָֽ/ם־־־׃
translation:
  text: And now, look, the cry of the sons of Israel has come to me, and I have also
    seen the oppression with which Egypt is oppressing them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the children of Israel' or 'the Israelites.' The Hebrew reads 'the sons
      of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the outcry of the sons of Israel has reached me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Marks a transition and continuation in discourse; 'And now' preserves
    the conjunction plus temporal adverb naturally in English.
- source_word: הִנֵּה
  chosen: look
  alternatives:
  - behold
  - indeed
  - see
  lexicon: HALOT
  rationale: An attention-getting particle. 'Look' preserves the deictic force in
    readable modern English better than archaic 'behold.'
- source_word: צַעֲקַת
  chosen: the cry
  alternatives:
  - the outcry
  - the plea for help
  lexicon: HALOT
  rationale: Refers to a cry arising from distress. 'Cry' is direct and idiomatic;
    'outcry' is possible but can sound more public/protest-oriented than the context
    requires.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, the masculine plural construct is retained
    rather than neutralized. 'Sons of Israel' also preserves the familial/covenantal
    idiom more closely than 'Israelites.'
- source_word: בָּאָה אֵלַי
  chosen: has come to me
  alternatives:
  - has reached me
  lexicon: HALOT
  rationale: The Hebrew verb is simply 'come'; 'has come to me' is the more literal
    and still natural rendering. 'Has reached me' is interpretive.
- source_word: וְגַם
  chosen: and ... also
  alternatives:
  - and also
  - moreover
  lexicon: HALOT
  rationale: Conveys addition/emphasis. Distributed in English as 'and I have also
    seen' for natural flow while preserving the additive force.
- source_word: רָאִיתִי
  chosen: I have ... seen
  alternatives:
  - I saw
  lexicon: HALOT
  rationale: 'The perfect here is rendered with present relevance in context: God
    has seen and now acts. English present perfect captures that well.'
- source_word: הַלַּחַץ
  chosen: the oppression
  alternatives:
  - the affliction
  - the pressure
  lexicon: HALOT
  rationale: From a noun denoting oppression/pressure. 'Oppression' best fits the
    social and coercive context of Egypt's treatment of Israel.
- source_word: אֲשֶׁר
  chosen: with which
  alternatives:
  - that
  - by which
  lexicon: HALOT
  rationale: Introduces a relative clause tied to the cognate verb 'oppress.' 'With
    which' yields idiomatic English with the noun 'oppression.'
- source_word: מִצְרַיִם
  chosen: Egypt
  alternatives:
  - the Egyptians
  lexicon: HALOT
  rationale: The Hebrew form is the proper name 'Egypt,' often used collectively for
    the nation/people. Retaining 'Egypt' preserves the source wording; English readily
    understands the metonymy.
- source_word: לֹחֲצִים
  chosen: is oppressing
  alternatives:
  - oppresses
  - are oppressing
  lexicon: HALOT
  rationale: The participle expresses ongoing action. Because 'Egypt' is treated as
    a collective singular in the chosen rendering, 'is oppressing' is the most natural
    agreement in English.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct object pronoun referring to the sons of Israel.
