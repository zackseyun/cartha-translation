theological_decisions:
- issue: Rendering of בני ישראל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The Hebrew is grammatically masculine and genealogical. Following the
    doctrine's gender-accurate principle, the main text preserves that form rather
    than neutralizing it to 'Israelites.' A more idiomatic collective alternative
    is worth preserving in a footnote for readability.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #4 (Gender-accurate over
    gender-neutral)'
