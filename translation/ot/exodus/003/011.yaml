id: EXO.3.11
reference: Exodus 3:11
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר מֹשֶׁה֙ אֶל הָ֣/אֱלֹהִ֔ים מִ֣י אָנֹ֔כִי כִּ֥י אֵלֵ֖ךְ אֶל פַּרְעֹ֑ה
    וְ/כִ֥י אוֹצִ֛יא אֶת בְּנֵ֥י יִשְׂרָאֵ֖ל מִ/מִּצְרָֽיִם־־־׃
translation:
  text: But Moses said to God, “Who am I that I should go to Pharaoh and that I should
    bring the sons of Israel out of Egypt?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Israelites” or traditionally “the children of Israel.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר is most naturally rendered 'said'
    in English narrative.
- source_word: אֶל הָאֱלֹהִים
  chosen: to God
  alternatives:
  - to the God
  lexicon: HALOT
  rationale: Although the noun bears the article in Hebrew, English idiom with the
    true God in direct reference is simply 'God,' not 'the God.'
- source_word: מִי אָנֹכִי
  chosen: Who am I
  alternatives:
  - Who am I, really
  lexicon: HALOT
  rationale: A direct, idiomatic rendering that preserves Moses's humility and sense
    of inadequacy without expansion.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the content/result clause after 'Who am I,' best
    represented by 'that' in English.
- source_word: אֵלֵךְ
  chosen: I should go
  alternatives:
  - I may go
  - I go
  lexicon: HALOT
  rationale: The imperfect in this rhetorical question expresses contemplated or potential
    action; 'I should go' fits natural English after 'Who am I that...'.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  lexicon: HALOT
  rationale: Standard English transliteration of the royal title/name.
- source_word: וְכִי
  chosen: and that
  alternatives:
  - and
  - that
  lexicon: HALOT
  rationale: 'Preserves the parallel structure of Moses''s twofold objection: going
    to Pharaoh and bringing Israel out.'
- source_word: אוֹצִיא
  chosen: I should bring
  alternatives:
  - I might bring out
  - I would bring out
  lexicon: HALOT
  rationale: Hiphil of יצא is causative, 'bring out.' 'I should bring' matches the
    rhetorical construction governed by 'Who am I that...'.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: This preserves the Hebrew familial expression בני while remaining understandable
    in English. 'The Israelites' is smoother but less formally transparent; 'children
    of Israel' is traditional but can sound age-specific in modern English. Per translation
    philosophy, gender-accurate wording is preferred where it matches the source.
- source_word: מִמִּצְרַיִם
  chosen: out of Egypt
  alternatives:
  - from Egypt
  lexicon: HALOT
  rationale: With the causative verb 'bring out,' 'out of Egypt' is the most natural
    and semantically complete English rendering.
