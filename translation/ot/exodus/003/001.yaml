id: EXO.3.1
reference: Exodus 3:1
source:
  edition: WLC
  text: וּ/מֹשֶׁ֗ה הָיָ֥ה רֹעֶ֛ה אֶת צֹ֛אן יִתְר֥וֹ חֹתְנ֖/וֹ כֹּהֵ֣ן מִדְיָ֑ן וַ/יִּנְהַ֤ג
    אֶת הַ/צֹּאן֙ אַחַ֣ר הַ/מִּדְבָּ֔ר וַ/יָּבֹ֛א אֶל הַ֥ר הָ/אֱלֹהִ֖ים חֹרֵֽבָ/ה־־־׃
translation:
  text: Now Moses was shepherding the flock of Jethro his father-in-law, the priest
    of Midian. He led the flock beyond the wilderness and came to the mountain of
    God, to Horeb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the far side of the wilderness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מֹשֶׁה
  chosen: Now Moses
  alternatives:
  - And Moses
  - Moses
  lexicon: HALOT
  rationale: The prefixed conjunction introduces a new scene in narrative. 'Now Moses'
    is natural English that preserves the discourse shift better than a bare 'And
    Moses' while not over-paraphrasing.
- source_word: הָיָה רֹעֶה
  chosen: was shepherding
  alternatives:
  - was tending
  - was pasturing
  - was a shepherd of
  lexicon: HALOT
  rationale: The construction expresses ongoing past action. 'Was shepherding' preserves
    both the verbal aspect and the pastoral sense of רעה more precisely than the broader
    'was tending.'
- source_word: צֹאן
  chosen: the flock
  alternatives:
  - small livestock
  - sheep and goats
  lexicon: HALOT
  rationale: צֹאן denotes small livestock collectively, often sheep and goats. 'Flock'
    is the most natural collective rendering in English and fits the shepherding context.
- source_word: יִתְרוֹ
  chosen: Jethro
  alternatives:
  - Yitro
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: חֹתְנוֹ
  chosen: his father-in-law
  alternatives:
  - his in-law
  lexicon: HALOT
  rationale: In Exodus, the relationship to Jethro is specifically familial through
    marriage; 'father-in-law' is the standard and contextually appropriate rendering.
- source_word: כֹּהֵן מִדְיָן
  chosen: the priest of Midian
  alternatives:
  - a priest of Midian
  - priest in Midian
  lexicon: HALOT
  rationale: The appositional phrase identifies Jethro. 'The priest of Midian' reflects
    the construct relation straightforwardly and matches the likely definite sense
    in context.
- source_word: וַיִּנְהַג
  chosen: He led
  alternatives:
  - he drove
  - he guided
  lexicon: HALOT
  rationale: נהג can mean drive, lead, or guide. For flock movement, 'led' is idiomatic
    and avoids the harsher nuance of 'drove' unless context requires it.
- source_word: אַחַר הַמִּדְבָּר
  chosen: beyond the wilderness
  alternatives:
  - to the far side of the wilderness
  - behind the wilderness
  - west of the wilderness
  lexicon: HALOT
  rationale: אַחַר in this spatial context most naturally means movement to the far
    side/beyond. 'Beyond the wilderness' is concise and faithful; the more interpretive
    'west of' is too specific.
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: HALOT
  rationale: The verb simply marks arrival. 'Came' works naturally in English narrative;
    'arrived' is possible but slightly more formal.
- source_word: הַר הָאֱלֹהִים
  chosen: the mountain of God
  alternatives:
  - God's mountain
  - the divine mountain
  lexicon: HALOT
  rationale: The construct phrase is rendered transparently. 'The mountain of God'
    preserves the Hebrew form and leaves open whether the designation is proleptic
    or already recognized.
- source_word: חֹרֵבָה
  chosen: to Horeb
  alternatives:
  - Horeb
  lexicon: HALOT
  rationale: 'The locative ending indicates motion toward the place. In English this
    is best represented by adding ''to'' before the place name: ''to Horeb.'''
