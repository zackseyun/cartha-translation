theological_decisions:
- issue: Whether הַר הָאֱלֹהִים should be rendered in a way that interprets the mountain
    as already sacred or merely later recognized as such
  chosen_reading: the mountain of God
  alternative_readings:
  - God's mountain
  - the sacred mountain
  rationale: The Hebrew expression is translated directly without importing a theological
    explanation. This preserves the narrative tension and avoids resolving whether
    the designation is retrospective, anticipatory, or already conventional.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
