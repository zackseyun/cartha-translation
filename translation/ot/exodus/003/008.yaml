theological_decisions:
- issue: Anthropomorphic divine movement in 'I have come down'
  chosen_reading: Retain the spatial language literally
  alternative_readings:
  - Paraphrase as 'I am intervening' or 'I have determined to act'
  rationale: The text presents God's action in anthropomorphic terms. Preserving this
    language respects the Hebrew expression and avoids flattening the narrative's
    theological vividness. No doctrinal necessity requires demythologizing the wording.
  doctrine_reference: Translation philosophy §1, §3
- issue: Collective singular pronouns for Israel
  chosen_reading: Use singular 'him' twice
  alternative_readings:
  - Use plural 'them' for contemporary English clarity
  rationale: The Hebrew pronominal suffixes are singular, referring to Israel as a
    corporate entity. Keeping the singular preserves the source-text perspective and
    avoids silently resolving the collective imagery into a plural.
  doctrine_reference: Translation philosophy §5
