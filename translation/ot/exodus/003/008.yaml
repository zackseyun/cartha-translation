id: EXO.3.8
reference: Exodus 3:8
source:
  edition: WLC
  text: וָ/אֵרֵ֞ד לְ/הַצִּיל֣/וֹ מִ/יַּ֣ד מִצְרַ֗יִם וּֽ/לְ/הַעֲלֹת/וֹ֮ מִן הָ/אָ֣רֶץ
    הַ/הִוא֒ אֶל אֶ֤רֶץ טוֹבָה֙ וּ/רְחָבָ֔ה אֶל אֶ֛רֶץ זָבַ֥ת חָלָ֖ב וּ/דְבָ֑שׁ אֶל
    מְק֤וֹם הַֽ/כְּנַעֲנִי֙ וְ/הַ֣/חִתִּ֔י וְ/הָֽ/אֱמֹרִי֙ וְ/הַ/פְּרִזִּ֔י וְ/הַ/חִוִּ֖י
    וְ/הַ/יְבוּסִֽי׀־־־־׃
translation:
  text: And I have come down to deliver him from the hand of Egypt and to bring him
    up from that land to a good and broad land, to a land flowing with milk and honey,
    to the place of the Canaanite, the Hittite, the Amorite, the Perizzite, the Hivite,
    and the Jebusite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'from the hand of Egypt,' an idiom for Egypt's power or control.
    reason: lexical_alternative
  - marker: b
    text: Hebrew singular 'him' in both 'deliver him' and 'bring him up,' referring
      to Israel as a people collectively.
    reason: lexical_alternative
  - marker: c
    text: Or 'to a good and spacious land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֵרֵד
  chosen: I have come down
  alternatives:
  - I have descended
  - I came down
  lexicon: HALOT
  rationale: The waw-consecutive imperfect in narrative speech is naturally rendered
    as a perfective past/present-perfect in English. 'Have come down' preserves the
    vivid immediacy of divine action in context better than the flatter simple past,
    while retaining the anthropomorphic spatial language of ירד rather than paraphrasing
    it away.
- source_word: לְהַצִּילוֹ
  chosen: to deliver him
  alternatives:
  - to rescue him
  - to save him
  lexicon: HALOT
  rationale: נצל in the Hiphil commonly means to snatch away or deliver from danger.
    'Deliver' fits the exodus context and preserves the concrete rescue sense without
    importing later theological freight that 'save' may carry.
- source_word: מִיַּד מִצְרַיִם
  chosen: from the hand of Egypt
  alternatives:
  - from Egypt's hand
  - from the power of Egypt
  lexicon: HALOT
  rationale: The idiom 'from the hand of' is retained because it is transparent in
    English and preserves the Hebrew image of oppressive power/control. 'Egypt' is
    kept as the national entity rather than expanded to 'the Egyptians,' since the
    Hebrew singular proper noun can represent the nation-state.
- source_word: וּלְהַעֲלֹתוֹ
  chosen: to bring him up
  alternatives:
  - to lead him up
  - to bring them up
  lexicon: HALOT
  rationale: עלה in the Hiphil means to cause to go up/bring up. 'Bring him up' preserves
    the vertical/geographical motif central to exodus language. The singular pronominal
    suffix is maintained as collective singular referring to Israel, so 'him' is preferred
    over smoothing to 'them'.
- source_word: מִן הָאָרֶץ הַהִוא
  chosen: from that land
  alternatives:
  - out of that land
  lexicon: HALOT
  rationale: A straightforward rendering of the demonstrative phrase. 'That land'
    points back to Egypt without over-specifying.
- source_word: אֶל אֶרֶץ טוֹבָה וּרְחָבָה
  chosen: to a good and broad land
  alternatives:
  - to a good and spacious land
  - to a good and wide land
  lexicon: HALOT
  rationale: טובה is 'good'; רחבה denotes breadth/spaciousness. 'Broad' is slightly
    more formal but remains natural and preserves the contrast with constriction in
    Egypt. 'Spacious' is possible but more interpretive.
- source_word: אֶרֶץ זָבַת חָלָב וּדְבָשׁ
  chosen: a land flowing with milk and honey
  alternatives:
  - a land dripping with milk and honey
  lexicon: HALOT
  rationale: This is a conventional but accurate idiomatic rendering of זבת, conveying
    abundance. 'Flowing' is established English and reflects the participial image
    without sounding awkward.
- source_word: אֶל מְקוֹם
  chosen: to the place of
  alternatives:
  - to the land of
  - to the territory of
  lexicon: HALOT
  rationale: מקום is literally 'place.' Although 'land of' would be smoother before
    the list of peoples, 'place of' better reflects the source text and avoids replacing
    the noun with a more interpretive geographical term.
- source_word: הַכְּנַעֲנִי ... הַיְבוּסִי
  chosen: the Canaanite, the Hittite, the Amorite, the Perizzite, the Hivite, and
    the Jebusite
  alternatives:
  - the Canaanites, Hittites, Amorites, Perizzites, Hivites, and Jebusites
  lexicon: HALOT
  rationale: The Hebrew uses singular ethnonyms with the article, a common collective
    usage. Rendering each as singular with article preserves the form of the source
    while remaining intelligible in English.
