theological_decisions:
- issue: Rendering the divine self-designation אֶהְיֶה אֲשֶׁר אֶהְיֶה
  chosen_reading: I AM WHO I AM
  alternative_readings:
  - I WILL BE WHAT I WILL BE
  - I WILL BE WHO I WILL BE
  rationale: The Hebrew imperfect allows both present and future nuance. Because the
    phrase is used here as a self-revelatory name and then shortened to אֶהְיֶה as
    the designation Moses is to repeat, the main text uses the traditional-present
    rendering 'I AM WHO I AM,' which best communicates a name-like self-identification
    in English. To preserve the genuine semantic tension of the Hebrew, future-oriented
    alternatives are retained in a footnote rather than excluded.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
- issue: Whether to capitalize 'I AM'
  chosen_reading: Capitalize as 'I AM'
  alternative_readings:
  - I am
  - I will be
  rationale: Capitalization signals that the clause functions not merely as a predication
    but as a solemn divine self-designation in this context. This is an English typographic
    decision, not a claim about a distinct Hebrew form, and it helps readers recognize
    the repeated designation in the second half of the verse.
