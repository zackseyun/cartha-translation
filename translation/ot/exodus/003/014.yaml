id: EXO.3.14
reference: Exodus 3:14
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֱלֹהִים֙ אֶל מֹשֶׁ֔ה אֶֽהְיֶ֖ה אֲשֶׁ֣ר אֶֽהְיֶ֑ה וַ/יֹּ֗אמֶר
    כֹּ֤ה תֹאמַר֙ לִ/בְנֵ֣י יִשְׂרָאֵ֔ל אֶֽהְיֶ֖ה שְׁלָחַ֥/נִי אֲלֵי/כֶֽם־׃
translation:
  text: 'And God said to Moses, “I AM WHO I AM.” And he said, “Thus you shall say
    to the sons of Israel: ‘I AM has sent me to you.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I will be what I will be,” or “I will be who I will be.” The Hebrew
      verb can carry future sense as well as present force here.
    reason: alternative_reading
  - marker: b
    text: 'Hebrew: “sons of Israel.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - Gods
  - divine being
  lexicon: HALOT
  rationale: In this narrative context the plural form functions as the singular designation
    for Israel's God, so 'God' is the natural English rendering.
- source_word: אֶהְיֶה
  chosen: I AM
  alternatives:
  - I will be
  - I am
  - I will become
  lexicon: HALOT
  rationale: The form is Qal imperfect 1cs of היה, which can denote either present
    or future aspect depending on context. Here, because the clause functions as a
    self-identification and is immediately reused as a divine designation ('אֶהְיֶה
    has sent me'), the present-tense rendering 'I AM' best preserves the force in
    English. The future-oriented alternative remains important and is preserved in
    a footnote because the Hebrew imperfect can also be rendered 'I will be.'
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - that
  - what
  - as
  lexicon: HALOT
  rationale: In the expression אֶהְיֶה אֲשֶׁר אֶהְיֶה, 'who' gives idiomatic English
    for a personal self-reference. 'That' is possible but less natural in contemporary
    English.
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is what
  - So
  lexicon: HALOT
  rationale: כֹּה introduces the formula for reported speech. 'Thus' preserves the
    formal declarative tone without sounding archaic in this context.
- source_word: תֹאמַר
  chosen: you shall say
  alternatives:
  - you are to say
  - say
  lexicon: HALOT
  rationale: The imperfect 2ms here carries directive force to Moses. 'You shall say'
    communicates the command clearly and fits the solemn register.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: to the sons of Israel
  alternatives:
  - to the Israelites
  - to the children of Israel
  lexicon: HALOT
  rationale: Per the translation philosophy's gender-accurate principle, בְּנֵי is
    rendered with its masculine form 'sons' rather than neutralizing to 'Israelites.'
    'Children of Israel' is traditional but less precise to the Hebrew form.
- source_word: שְׁלָחַנִי
  chosen: has sent me
  alternatives:
  - sent me
  lexicon: HALOT
  rationale: The perfect 3ms + 1cs suffix denotes completed action from the speaker's
    perspective. 'Has sent me' is natural English in direct speech and highlights
    the present relevance of the commission.
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' preserves
    the Hebrew sequencing straightforwardly.
