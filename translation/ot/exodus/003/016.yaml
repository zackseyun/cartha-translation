theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This also matches the covenantal register of the passage and standard
    English Bible practice while avoiding a denominationally loaded choice.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering אֲבֹתֵיכֶם
  chosen_reading: your fathers
  alternative_readings:
  - your ancestors
  rationale: The translation philosophy prefers gender-accurate renderings over gender-neutral
    ones where the source intends a masculine referent or patriarchal framing. Here
    the context explicitly names Abraham, Isaac, and Jacob, so 'fathers' best preserves
    the covenantal-patriarchal emphasis.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
