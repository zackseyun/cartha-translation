id: EXO.3.16
reference: Exodus 3:16
source:
  edition: WLC
  text: לֵ֣ךְ וְ/אָֽסַפְתָּ֞ אֶת זִקְנֵ֣י יִשְׂרָאֵ֗ל וְ/אָמַרְתָּ֤ אֲלֵ/הֶם֙ יְהוָ֞ה
    אֱלֹהֵ֤י אֲבֹֽתֵי/כֶם֙ נִרְאָ֣ה אֵלַ֔/י אֱלֹהֵ֧י אַבְרָהָ֛ם יִצְחָ֥ק וְ/יַעֲקֹ֖ב
    לֵ/אמֹ֑ר פָּקֹ֤ד פָּקַ֨דְתִּי֙ אֶתְ/כֶ֔ם וְ/אֶת הֶ/עָשׂ֥וּי לָ/כֶ֖ם בְּ/מִצְרָֽיִם־־׃
translation:
  text: 'Go and gather the elders of Israel, and say to them, ‘The LORD, the God of
    your fathers—the God of Abraham, Isaac, and Jacob—has appeared to me, saying:
    “I have surely attended to you and to what has been done to you in Egypt.”’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I have surely visited you.' The Hebrew expression intensifies the verb
      and can denote decisive divine attention leading to intervention, not merely
      a social visit.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your fathers'; the phrase is then specified by 'the God of Abraham,
      Isaac, and Jacob.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Go on
  - Come, go
  lexicon: HALOT
  rationale: Qal imperative 2ms of הלך introduces the commission with a direct command.
    'Go' is the natural concise English imperative.
- source_word: וְאָֽסַפְתָּ
  chosen: and gather
  alternatives:
  - and assemble
  - and bring together
  lexicon: HALOT
  rationale: אָסף in this context means to collect people together. 'Gather' is idiomatic
    and suitably formal without overtranslating.
- source_word: זִקְנֵי יִשְׂרָאֵל
  chosen: the elders of Israel
  alternatives:
  - Israel's elders
  lexicon: HALOT
  rationale: Standard social-political designation for community leaders; 'elders
    of Israel' preserves the recognized covenant-community expression.
- source_word: וְאָמַרְתָּ אֲלֵהֶם
  chosen: and say to them
  alternatives:
  - and tell them
  lexicon: HALOT
  rationale: אָמַר is the ordinary verb 'say.' 'Say to them' keeps the direct-speech
    introduction close to the Hebrew.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention rooted
    in the LXX pattern.
- source_word: אֱלֹהֵי אֲבֹתֵיכֶם
  chosen: the God of your fathers
  alternatives:
  - your fathers' God
  - the God of your ancestors
  lexicon: HALOT
  rationale: Construct phrase identifying Israel's covenant God in relation to the
    patriarchal line. 'Fathers' is retained as gender-accurate and source-near; 'ancestors'
    would flatten the specific patriarchal framing.
- source_word: נִרְאָה אֵלַי
  chosen: has appeared to me
  alternatives:
  - appeared to me
  - was seen by me
  lexicon: HALOT
  rationale: Niphal of ראה here is the standard idiom for divine appearance. Present
    perfect in English fits the recent completed event with present relevance. 'Was
    seen by me' would be wooden and less idiomatic.
- source_word: אֱלֹהֵי אַבְרָהָם יִצְחָק וְיַעֲקֹב
  chosen: the God of Abraham, Isaac, and Jacob
  lexicon: HALOT
  rationale: This appositional identification is central to the covenantal context
    and should be preserved in full, with standard English punctuation for readability.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - with these words
  lexicon: HALOT
  rationale: Introduces the content of the divine message. 'Saying' preserves the
    Hebrew discourse marker without unnecessary expansion.
- source_word: פָּקֹד פָּקַדְתִּי
  chosen: I have surely attended to you
  alternatives:
  - I have surely visited you
  - I have indeed taken notice of you
  - I have carefully watched over you
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. פקד
    in this context conveys purposeful divine attention/intervention, not mere observation.
    'Attended to' communicates active concern and impending action better than the
    traditional but potentially misleading 'visited,' while 'surely' reflects the
    intensification.
- source_word: אֶתְכֶם
  chosen: to you
  alternatives:
  - you
  lexicon: HALOT
  rationale: With פקד rendered as 'attend to,' English idiom requires 'to you' rather
    than a bare object, while preserving the personal object of divine concern.
- source_word: וְאֶת הֶעָשׂוּי לָכֶם
  chosen: and to what has been done to you
  alternatives:
  - and to what is being done to you
  - and to the treatment you have received
  - and to what they have done to you
  lexicon: HALOT
  rationale: The passive participial expression literally denotes 'the thing done
    to you.' 'What has been done to you' is natural English and preserves the passive
    focus on Israel's mistreatment without adding an explicit subject absent from
    the Hebrew.
- source_word: בְּמִצְרָיִם
  chosen: in Egypt
  lexicon: HALOT
  rationale: Locative phrase specifying the place of oppression; straightforward rendering.
