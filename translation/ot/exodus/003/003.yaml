id: EXO.3.3
reference: Exodus 3:3
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר מֹשֶׁ֔ה אָסֻֽרָה נָּ֣א וְ/אֶרְאֶ֔ה אֶת הַ/מַּרְאֶ֥ה הַ/גָּדֹ֖ל
    הַ/זֶּ֑ה מַדּ֖וּעַ לֹא יִבְעַ֥ר הַ/סְּנֶֽה־־־׃
translation:
  text: Then Moses said, “Let me turn aside and see this great sight—why the bush
    is not burning up.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “why the bush does not burn,” or “why the bush is not consumed.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence better than a bare 'and' in modern style.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name, following the
    policy to transliterate names.
- source_word: אָסֻרָה נָּא
  chosen: Let me turn aside
  alternatives:
  - I will turn aside, please
  - Please let me turn aside
  lexicon: HALOT
  rationale: The cohortative with נָא expresses volition/polite self-exhortation.
    'Let me turn aside' captures the sense idiomatically in English without over-literal
    awkwardness.
- source_word: וְאֶרְאֶה
  chosen: and see
  alternatives:
  - and look
  - and inspect
  lexicon: HALOT
  rationale: ראה here denotes visual examination. 'See' is the most natural and sufficiently
    broad rendering in context.
- source_word: הַמַּרְאֶה הַגָּדֹל הַזֶּה
  chosen: this great sight
  alternatives:
  - this great appearance
  - this remarkable spectacle
  lexicon: HALOT
  rationale: מַרְאֶה refers to what is seen, an appearance or sight. 'This great sight'
    is idiomatic English and preserves the demonstrative force and Moses' sense of
    wonder.
- source_word: מַדּוּעַ
  chosen: why
  alternatives:
  - for what reason
  lexicon: HALOT
  rationale: Straightforward interrogative of reason.
- source_word: לֹא יִבְעַר
  chosen: is not burning up
  alternatives:
  - does not burn
  - is not consumed
  lexicon: HALOT
  rationale: בער in the Qal commonly means 'burn.' In this context, because the marvel
    is that the bush burns without being consumed, English 'is not burning up' makes
    the implied result explicit and natural. 'Is not consumed' reflects the broader
    sense but is less directly tied to the Hebrew verb here.
- source_word: הַסְּנֶה
  chosen: the bush
  alternatives:
  - the thornbush
  lexicon: HALOT
  rationale: סְּנֶה denotes a bush, likely thorny, but 'bush' is the standard clear
    rendering. 'Thornbush' is possible but more specific than the context requires.
