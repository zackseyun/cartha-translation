theological_decisions:
- issue: Rendering the phenomenon of the bush's fire
  chosen_reading: why the bush is not burning up
  alternative_readings:
  - why the bush does not burn
  - why the bush is not consumed
  rationale: The Hebrew verb is 'burn,' not explicitly 'consume,' yet the context
    highlights the paradox of a bush aflame without being used up. The chosen rendering
    balances lexical fidelity and natural English while preserving the wonder of the
    sign without importing extra theological interpretation.
  doctrine_reference: Translation philosophy §1, §3, §6
