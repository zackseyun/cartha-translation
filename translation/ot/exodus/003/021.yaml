id: EXO.3.21
reference: Exodus 3:21
source:
  edition: WLC
  text: וְ/נָתַתִּ֛י אֶת חֵ֥ן הָֽ/עָם הַ/זֶּ֖ה בְּ/עֵינֵ֣י מִצְרָ֑יִם וְ/הָיָה֙ כִּ֣י
    תֵֽלֵכ֔וּ/ן לֹ֥א תֵלְכ֖וּ רֵיקָֽם־־׃
translation:
  text: And I will give this people favor in the sight of the Egyptians, and when
    you go, you will not go empty-handed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the eyes of the Egyptians.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you will not go out empty.' The Hebrew idiom means departing without
      goods or provisions.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: And I will give
  alternatives:
  - And I will grant
  - And I will put
  lexicon: HALOT
  rationale: נתן commonly means 'give.' Here with חֵן as object, English can idiomatically
    be 'give favor' or 'grant favor.' 'Give' stays closer to the Hebrew while remaining
    natural.
- source_word: חֵן
  chosen: favor
  alternatives:
  - grace
  - acceptance
  lexicon: HALOT
  rationale: חֵן denotes favor or gracious acceptance. 'Favor' best fits the social
    sense of winning goodwill from the Egyptians; 'grace' would sound more theologically
    loaded than the context requires.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this nation
  - these people
  lexicon: HALOT
  rationale: The singular עָם with demonstrative is most directly 'this people.' It
    refers collectively to Israel. 'This people' preserves the Hebrew form better
    than the more interpretive 'these people.'
- source_word: בְּעֵינֵי מִצְרָיִם
  chosen: in the sight of the Egyptians
  alternatives:
  - in the eyes of the Egyptians
  - with the Egyptians
  lexicon: HALOT
  rationale: The idiom בְּעֵינֵי literally means 'in the eyes/sight of' and conveys
    how someone is regarded. 'In the sight of' is natural English and preserves the
    idiomatic sense; 'with the Egyptians' is smoother but less transparent.
- source_word: וְהָיָה כִּי
  chosen: and when
  alternatives:
  - and it shall be that when
  - and it will happen that when
  lexicon: HALOT
  rationale: This is a common Hebrew discourse formula introducing a future circumstance.
    'And when' captures the sense in readable modern English without unnecessary stiffness.
- source_word: תֵלֵכוּן / תֵלְכוּ
  chosen: you go / you will not go
  alternatives:
  - you leave / you will not leave
  - you depart / you will not depart
  lexicon: HALOT
  rationale: הלך is broadly 'go/walk.' In context it refers to Israel's departure
    from Egypt. 'Go' preserves the lexical simplicity of the Hebrew; 'leave' is contextually
    explicit but slightly more interpretive.
- source_word: רֵיקָם
  chosen: empty-handed
  alternatives:
  - empty
  - with nothing
  lexicon: HALOT
  rationale: 'רֵיקָם means ''empty, empty-handed.'' In this departure context, ''empty-handed''
    communicates the idiomatic force clearly in English: they will not leave without
    goods.'
