theological_decisions:
- issue: Nature of the promised 'sign'
  chosen_reading: The sign is the future worship/serving of God at this mountain after
    the exodus.
  alternative_readings:
  - The sign is God's present promise of presence with Moses
  - The sign includes both present assurance and future fulfillment
  rationale: The syntax most naturally points to the following clause ('when you bring...
    you will serve God on this mountain') as the content of the sign. This preserves
    the text's forward-looking confirmation without resolving it into a merely immediate
    sign.
  doctrine_reference: Preserve theological tension rather than resolve it.
