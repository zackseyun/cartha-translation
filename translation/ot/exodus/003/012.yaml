id: EXO.3.12
reference: Exodus 3:12
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ כִּֽי אֶֽהְיֶ֣ה עִמָּ֔/ךְ וְ/זֶה לְּ/ךָ֣ הָ/א֔וֹת כִּ֥י אָנֹכִ֖י
    שְׁלַחְתִּ֑י/ךָ בְּ/הוֹצִֽיאֲ/ךָ֤ אֶת הָ/עָם֙ מִ/מִּצְרַ֔יִם תַּֽעַבְדוּ/ן֙ אֶת
    הָ֣/אֱלֹהִ֔ים עַ֖ל הָ/הָ֥ר הַ/זֶּֽה־־־־׃
translation:
  text: 'And he said, “Certainly I will be with you, and this will be the sign for
    you that I have sent you: when you bring the people out of Egypt, you will serve
    God on this mountain.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will worship God on this mountain.' The Hebrew verb can mean both
      'serve' and, in relation to God, 'worship.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: Certainly
  alternatives:
  - For
  - Indeed
  lexicon: HALOT
  rationale: Here כִּי introduces God's reassuring response to Moses' objection. 'Certainly'
    captures the asseverative force in natural English better than a wooden 'for'.
- source_word: אֶהְיֶה
  chosen: I will be
  alternatives:
  - I am
  - I shall be
  lexicon: HALOT
  rationale: Imperfect of היה in this context is future-oriented, promising divine
    presence. 'I will be' also coheres with the immediately following promise of accompaniment.
- source_word: עִמָּךְ
  chosen: with you
  lexicon: HALOT
  rationale: Standard rendering of the preposition עם with pronominal suffix; expresses
    accompanying presence.
- source_word: הָאוֹת
  chosen: the sign
  alternatives:
  - the proof
  - the token
  lexicon: HALOT
  rationale: אוֹת commonly denotes a sign or confirming mark. 'Sign' is the most transparent
    and biblically consistent rendering.
- source_word: כִּי אָנֹכִי שְׁלַחְתִּיךָ
  chosen: that I have sent you
  alternatives:
  - that I sent you
  - that it is I who sent you
  lexicon: HALOT
  rationale: The clause explains what the sign confirms. English present perfect communicates
    the relevance of the completed sending to the present commission. The emphatic
    pronoun אָנֹכִי is sufficiently carried by the clause without overloading the
    English.
- source_word: בְּהוֹצִיאֲךָ
  chosen: when you bring out
  alternatives:
  - in your bringing out
  - when I bring you out
  lexicon: HALOT
  rationale: 'The infinitive construct with prefixed ב plus 2ms suffix is best taken
    temporally: ''when you bring out.'' The suffix refers to Moses as agent in leading
    the people out, not to Moses as object being brought out.'
- source_word: הָעָם
  chosen: the people
  lexicon: HALOT
  rationale: Definite reference to Israel as the people Moses is commissioned to lead.
- source_word: תַּעַבְדוּן
  chosen: you will serve
  alternatives:
  - you will worship
  lexicon: HALOT
  rationale: עבד can mean serve or worship in relation to God. 'Serve' preserves the
    lexical breadth and allows the cultic sense to emerge from the object 'God' and
    the setting at the mountain.
- source_word: אֶת־הָאֱלֹהִים
  chosen: God
  alternatives:
  - the true God
  lexicon: HALOT
  rationale: Definite object with האלהים refers to Israel's God. Plain 'God' is sufficient
    and avoids importing explanatory material not explicit in the text.
- source_word: עַל הָהָר הַזֶּה
  chosen: on this mountain
  alternatives:
  - at this mountain
  lexicon: HALOT
  rationale: עַל naturally means 'on,' though in English 'at' is possible idiomatically
    for location. 'On this mountain' preserves the Hebrew preposition and the narrative
    concreteness of Horeb/Sinai.
