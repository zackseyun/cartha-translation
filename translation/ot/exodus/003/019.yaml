theological_decisions:
- issue: Interpretation of the elliptical clause וְלֹא בְּיָד חֲזָקָה
  chosen_reading: Pharaoh will not let Israel go unless compelled by a strong hand.
  alternative_readings:
  - Pharaoh will not let Israel go, not even by a strong hand.
  - Pharaoh will not let Israel go except by a mighty hand.
  rationale: The clause is syntactically compressed and has been understood in more
    than one way. In the immediate context (v. 20), God says he will strike Egypt
    with his wonders, which supports the sense that Pharaoh will only yield under
    overwhelming divine compulsion. This rendering preserves that narrative logic
    without importing extra doctrinal content.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity and preserve alternatives in footnotes where appropriate.
