id: EXO.3.19
reference: Exodus 3:19
source:
  edition: WLC
  text: וַ/אֲנִ֣י יָדַ֔עְתִּי כִּ֠י לֹֽא יִתֵּ֥ן אֶתְ/כֶ֛ם מֶ֥לֶךְ מִצְרַ֖יִם לַ/הֲלֹ֑ךְ
    וְ/לֹ֖א בְּ/יָ֥ד חֲזָקָֽה־׃
translation:
  text: But I know that the king of Egypt will not let you go, unless compelled by
    a strong hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the king of Egypt will not let you go, not even by a strong hand,'
      or 'except by a mighty hand.' The Hebrew clause is elliptical and may emphasize
      that only overwhelming force will move Pharaoh.
    reason: alternative_reading
lexical_decisions:
- source_word: וַאֲנִי
  chosen: But I
  alternatives:
  - And I
  - Now I
  lexicon: HALOT
  rationale: The conjunction with independent pronoun marks a contrastive or emphatic
    shift in discourse. 'But I' captures the adversative force naturally in English
    better than a simple 'And I.'
- source_word: יָדַעְתִּי
  chosen: know
  alternatives:
  - have known
  - knew
  lexicon: HALOT
  rationale: The perfect expresses settled divine knowledge. Present 'know' is the
    most natural English rendering in context, reflecting God's current and certain
    knowledge rather than a past event.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: Introduces the content of what is known; 'that' is the straightforward
    complementizer in English.
- source_word: לֹא יִתֵּן אֶתְכֶם ... לַהֲלֹךְ
  chosen: will not let you go
  alternatives:
  - will not give you leave to go
  - will not allow you to go
  lexicon: HALOT
  rationale: נתן with infinitive here idiomatically means to permit or allow. 'Let
    you go' is idiomatic, clear, and fits the Exodus context.
- source_word: מֶלֶךְ מִצְרַיִם
  chosen: the king of Egypt
  alternatives:
  - Egypt's king
  lexicon: HALOT
  rationale: A direct and natural rendering of the construct phrase.
- source_word: וְלֹא בְּיָד חֲזָקָה
  chosen: unless compelled by a strong hand
  alternatives:
  - and not by a strong hand
  - not even by a strong hand
  - except by a mighty hand
  lexicon: HALOT
  rationale: The Hebrew is elliptical and contextually means Pharaoh will not release
    Israel apart from coercive divine power. English requires some completion of the
    sense. 'Unless compelled by a strong hand' preserves the instrumental image while
    making the implied contrast explicit. 'Strong hand' is retained rather than paraphrased
    away, echoing a key Exodus motif; 'mighty hand' is possible, but 'strong hand'
    stays closer to חֲזָקָה.
