theological_decisions:
- issue: Rendering בְּנֵי יִשְׂרָאֵל with gender-accurate language
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The Hebrew is grammatically masculine plural and also carries familial
    identity. Following the doctrine's gender-accurate principle, the main text preserves
    'sons,' while a footnote can note the collective sense if desired.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Divine designation אֱלֹהֵי אֲבוֹתֵיכֶם
  chosen_reading: The God of your fathers
  alternative_readings:
  - The God of your ancestors
  rationale: This preserves the covenantal continuity with the patriarchs and avoids
    flattening the familial language. No contested doctrinal term from the table is
    involved here.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
