id: EXO.3.13
reference: Exodus 3:13
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר מֹשֶׁ֜ה אֶל הָֽ/אֱלֹהִ֗ים הִנֵּ֨ה אָנֹכִ֣י בָא֮ אֶל בְּנֵ֣י יִשְׂרָאֵל֒
    וְ/אָמַרְתִּ֣י לָ/הֶ֔ם אֱלֹהֵ֥י אֲבוֹתֵי/כֶ֖ם שְׁלָחַ֣/נִי אֲלֵי/כֶ֑ם וְ/אָֽמְרוּ
    לִ֣/י מַה שְּׁמ֔/וֹ מָ֥ה אֹמַ֖ר אֲלֵ/הֶֽם־־־־׃
translation:
  text: Then Moses said to God, “Look, when I come to the sons of Israel and say to
    them, ‘The God of your fathers has sent me to you,’ and they say to me, ‘What
    is his name?’ what shall I say to them?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Israelites”; Hebrew “the sons of Israel.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence; 'and ... said' is possible but
    less idiomatic here.
- source_word: אֶל הָאֱלֹהִים
  chosen: to God
  alternatives:
  - to the God
  - to Godhead
  lexicon: HALOT
  rationale: With the article, Hebrew can still function as a definite reference to
    the true God in context. English idiom prefers 'to God' rather than 'to the God'
    here.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  - Indeed
  lexicon: HALOT
  rationale: Introduces Moses' scenario with attention-getting force. 'Look' preserves
    the discourse function in readable modern English; 'Behold' is too archaic.
- source_word: אָנֹכִי
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: The independent pronoun adds explicitness, but English normally includes
    the subject pronoun anyway. No extra emphasis is required in the main text beyond
    natural English.
- source_word: בָא
  chosen: come
  alternatives:
  - go
  lexicon: HALOT
  rationale: Although participial in form ('coming'), in this conditional-like scenario
    English finite 'when I come' is most natural. 'Come' follows the deictic perspective
    of approaching the Israelites.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, the masculine plural construct is preserved
    as 'sons of Israel.' 'Israelites' is smoother but loses the familial wording;
    'children of Israel' is traditional but less precise to the masculine form.
- source_word: וְאָמַרְתִּי לָהֶם
  chosen: and say to them
  alternatives:
  - and I say to them
  - and will say to them
  lexicon: HALOT
  rationale: The qatal after הִנֵּה + participle functions in a projected scenario.
    English present 'say' within 'when I come ... and say' best captures the sense.
- source_word: אֱלֹהֵי אֲבוֹתֵיכֶם
  chosen: The God of your fathers
  alternatives:
  - The God of your ancestors
  lexicon: HALOT
  rationale: '''Fathers'' is the direct lexical equivalent and preserves covenantal,
    patriarchal resonance. ''Ancestors'' is possible but less formally tied to the
    Hebrew wording.'
- source_word: שְׁלָחַנִי
  chosen: has sent me
  alternatives:
  - sent me
  lexicon: HALOT
  rationale: 'English present perfect fits the reported message from Moses'' standpoint:
    a completed action with present relevance. Simple past is also possible.'
- source_word: מַה שְּׁמוֹ
  chosen: What is his name?
  alternatives:
  - What is the name of him?
  - What is his reputation?
  lexicon: HALOT
  rationale: The straightforward sense asks for the divine name. While שֵׁם can extend
    to reputation or renown, the immediate context in the next verse centers on the
    name itself.
- source_word: מָה אֹמַר אֲלֵהֶם
  chosen: what shall I say to them?
  alternatives:
  - what am I to say to them?
  - what should I say to them?
  lexicon: HALOT
  rationale: '''Shall'' conveys Moses'' request for instruction without sounding overly
    colloquial. It preserves the deliberative nuance of the imperfect.'
