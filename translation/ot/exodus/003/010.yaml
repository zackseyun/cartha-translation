id: EXO.3.10
reference: Exodus 3:10
source:
  edition: WLC
  text: וְ/עַתָּ֣ה לְכָ֔/ה וְ/אֶֽשְׁלָחֲ/ךָ֖ אֶל פַּרְעֹ֑ה וְ/הוֹצֵ֛א אֶת עַמִּ֥/י
    בְנֵֽי יִשְׂרָאֵ֖ל מִ/מִּצְרָֽיִם־־־׃
translation:
  text: And now, come, and I will send you to Pharaoh, and bring my people, the sons
    of Israel, out of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more idiomatically, ''the Israelites.'' Hebrew: ''the sons of Israel.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  - So now
  lexicon: HALOT
  rationale: Temporal-discursive transition marking the next stage of the commission.
    'And now' preserves the connective ו plus עתה without sounding overly wooden.
- source_word: לְכָה
  chosen: come
  alternatives:
  - go
  - come now
  lexicon: HALOT
  rationale: Imperative of הלך in this idiom can function as an urgent summons. 'Come'
    fits the immediate divine address in English better than the more spatially literal
    'go,' while still introducing the commission.
- source_word: וְאֶשְׁלָחֲךָ
  chosen: and I will send you
  alternatives:
  - that I may send you
  - so I will send you
  lexicon: HALOT
  rationale: Straightforward Qal imperfect with 2ms suffix. 'I will send you' best
    reflects the divine commissioning without adding purposive nuance not explicit
    in the Hebrew.
- source_word: אֶל־פַּרְעֹה
  chosen: to Pharaoh
  alternatives:
  - to Pharaoh himself
  lexicon: HALOT
  rationale: Simple directional phrase; standard transliteration of the royal name/title
    is retained.
- source_word: וְהוֹצֵא
  chosen: and bring ... out
  alternatives:
  - and lead ... out
  - and bring forth
  lexicon: HALOT
  rationale: Hiphil imperative of יצא means to cause to go out. In idiomatic English
    with the following מן phrase, 'bring ... out' is natural and preserves the causative
    sense.
- source_word: עַמִּי
  chosen: my people
  alternatives:
  - my own people
  lexicon: HALOT
  rationale: Possessive covenantal language should be preserved directly; 'my people'
    is the natural and theologically weighty rendering.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Gender-accurate policy favors retaining the masculine familial expression
    where it refers to the covenant people by their ancestral designation. 'The sons
    of Israel' preserves the Hebrew form and genealogical force better than the smoother
    ethnic label 'the Israelites.'
- source_word: מִמִּצְרָיִם
  chosen: out of Egypt
  alternatives:
  - from Egypt
  lexicon: HALOT
  rationale: With הוציא, English idiom strongly prefers 'out of Egypt,' which also
    highlights the exodus movement more vividly than the flatter 'from Egypt.'
