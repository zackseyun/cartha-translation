theological_decisions:
- issue: Rendering of the covenant people designation בְנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: Following the gender-accurate principle, the masculine plural familial
    term is retained rather than neutralized. This also preserves the ancestral and
    covenantal identity embedded in the Hebrew expression. A more idiomatic alternative
    is worth preserving in a footnote for readability.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
