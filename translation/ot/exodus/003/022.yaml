theological_decisions:
- issue: Potential moral/theological softening of Israel's taking Egyptian goods
  chosen_reading: So you will plunder Egypt
  alternative_readings:
  - so you will despoil Egypt
  - so you will strip Egypt
  rationale: The Hebrew presents this as divinely ordained recompense and reversal,
    not mere borrowing. The translation should not soften the force of נצל or imply
    deception by using 'borrow.'
  doctrine_reference: Translation philosophy §1, §3
