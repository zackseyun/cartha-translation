id: EXO.3.22
reference: Exodus 3:22
source:
  edition: WLC
  text: וְ/שָׁאֲלָ֨ה אִשָּׁ֤ה מִ/שְּׁכֶנְתָּ/הּ֙ וּ/מִ/גָּרַ֣ת בֵּיתָ֔/הּ כְּלֵי כֶ֛סֶף
    וּ/כְלֵ֥י זָהָ֖ב וּ/שְׂמָלֹ֑ת וְ/שַׂמְתֶּ֗ם עַל בְּנֵי/כֶם֙ וְ/עַל בְּנֹ֣תֵי/כֶ֔ם
    וְ/נִצַּלְתֶּ֖ם אֶת מִצְרָֽיִם־־־־׃
translation:
  text: Each woman shall ask from her neighbor and from the woman staying in her house
    articles of silver and articles of gold, and clothing; and you shall put them
    on your sons and on your daughters. So you will plunder Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shall request'; traditionally, some render 'shall borrow,' but the Hebrew
      verb more basically means 'ask' or 'request.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from the sojourner/resident woman in her house.'
    reason: lexical_alternative
  - marker: c
    text: Or 'despoil' or 'strip' Egypt.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁאֲלָה
  chosen: shall ask
  alternatives:
  - shall request
  - shall borrow
  lexicon: HALOT
  rationale: The verb שׁאל commonly means 'ask, request.' Although some English traditions
    use 'borrow,' the context here does not emphasize return but requesting valuables
    before departure; 'ask' best reflects the plain sense without importing an obligation
    to return.
- source_word: אִשָּׁה
  chosen: Each woman
  alternatives:
  - a woman
  - every woman
  lexicon: HALOT
  rationale: Indefinite singular used distributively; 'Each woman' communicates the
    representative force naturally in English.
- source_word: מִשְּׁכֶנְתָּהּ
  chosen: from her neighbor
  alternatives:
  - from her female neighbor
  - from her neighbor woman
  lexicon: HALOT
  rationale: The noun is grammatically feminine and refers to a female neighbor in
    context, but idiomatic English normally uses the common-gender 'neighbor.' The
    feminine nuance is not crucial in the main text.
- source_word: וּמִגָּרַת בֵּיתָהּ
  chosen: from the woman staying in her house
  alternatives:
  - from the sojourner in her house
  - from the resident in her house
  - from the guest in her house
  lexicon: HALOT
  rationale: The participial form from גור denotes one residing temporarily or as
    an alien. In this domestic context, 'the woman staying in her house' is clear
    modern English and preserves the idea of residence without overtechnical wording.
- source_word: כְּלֵי כֶסֶף
  chosen: articles of silver
  alternatives:
  - silver vessels
  - silver objects
  - jewelry of silver
  lexicon: HALOT
  rationale: כְּלִי is broad ('article, vessel, object, item'). Since the exact type
    is unspecified, 'articles of silver' preserves breadth better than 'jewelry' or
    'vessels.'
- source_word: וּכְלֵי זָהָב
  chosen: articles of gold
  alternatives:
  - gold vessels
  - gold objects
  - jewelry of gold
  lexicon: HALOT
  rationale: Parallel to the previous phrase; the broad term should remain broad in
    English.
- source_word: וּשְׂמָלֹת
  chosen: clothing
  alternatives:
  - garments
  - cloaks
  lexicon: HALOT
  rationale: A general term for garments. 'Clothing' is natural modern English and
    suitably broad.
- source_word: וְשַׂמְתֶּם עַל
  chosen: you shall put them on
  alternatives:
  - you shall place them on
  - you shall set them on
  lexicon: HALOT
  rationale: Straightforward rendering of שׂים + עַל. 'Put ... on' is idiomatic in
    English for adorning children with these items.
- source_word: בְּנֵיכֶם ... בְּנֹתֵיכֶם
  chosen: your sons ... your daughters
  alternatives:
  - your children
  lexicon: HALOT
  rationale: The Hebrew explicitly distinguishes sons and daughters; per gender-accurate
    philosophy, both should be preserved rather than collapsed into 'children.'
- source_word: וְנִצַּלְתֶּם אֶת מִצְרָיִם
  chosen: So you will plunder Egypt
  alternatives:
  - and you will despoil Egypt
  - and you will strip Egypt
  lexicon: HALOT
  rationale: The Piel of נצל here means to strip or plunder. 'Plunder Egypt' is the
    clearest natural English rendering and conveys the reversal of oppression without
    euphemism.
