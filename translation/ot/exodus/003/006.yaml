theological_decisions:
- issue: Rendering אֱלֹהִים in a direct divine self-identification and theophany
  chosen_reading: God
  alternative_readings:
  - the divine being
  rationale: The context is explicitly the God of the patriarchs speaking to Moses;
    rendering with lowercase generic language would weaken the covenantal identification.
    English capitalization appropriately signals the referent without adding doctrine
    beyond the text.
  doctrine_reference: 'Affirmations; Translation philosophy #1'
- issue: Rendering the patriarchal formula with repeated 'the God of'
  chosen_reading: the God of Abraham, the God of Isaac, and the God of Jacob
  alternative_readings:
  - God of Abraham, Isaac, and Jacob
  rationale: Preserving the repeated formula maintains the covenantal and theological
    emphasis of the Hebrew rather than smoothing it into a summary phrase.
  doctrine_reference: 'Translation philosophy #1; #5'
