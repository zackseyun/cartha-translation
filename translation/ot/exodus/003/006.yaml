id: EXO.3.6
reference: Exodus 3:6
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר אָנֹכִי֙ אֱלֹהֵ֣י אָבִ֔י/ךָ אֱלֹהֵ֧י אַבְרָהָ֛ם אֱלֹהֵ֥י יִצְחָ֖ק
    וֵ/אלֹהֵ֣י יַעֲקֹ֑ב וַ/יַּסְתֵּ֤ר מֹשֶׁה֙ פָּנָ֔י/ו כִּ֣י יָרֵ֔א מֵ/הַבִּ֖יט אֶל
    הָ/אֱלֹהִֽים־׃
translation:
  text: Then he said, “I am the God of your father, the God of Abraham, the God of
    Isaac, and the God of Jacob.” And Moses hid his face, because he was afraid to
    look at God.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then he said
  alternatives:
  - And he said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then he said' gives natural
    English narrative flow while preserving sequence; 'And he said' is possible but
    slightly less idiomatic here.
- source_word: אָנֹכִי
  chosen: I am
  alternatives:
  - I
  lexicon: HALOT
  rationale: 'The independent pronoun is emphatic and in verbless identification clauses
    is naturally rendered with the implied copula in English: ''I am.'''
- source_word: אֱלֹהֵי אָבִיךָ
  chosen: the God of your father
  alternatives:
  - your father's God
  lexicon: HALOT
  rationale: The construct phrase is most transparently rendered 'the God of your
    father.' This preserves the singular suffix and the covenantal identification
    formula.
- source_word: אֱלֹהֵי אַבְרָהָם אֱלֹהֵי יִצְחָק וֵאלֹהֵי יַעֲקֹב
  chosen: the God of Abraham, the God of Isaac, and the God of Jacob
  alternatives:
  - God of Abraham, Isaac, and Jacob
  lexicon: HALOT
  rationale: The repetition of 'God of' is explicit in Hebrew and carries rhetorical
    and covenantal weight, so it is preserved rather than compressed.
- source_word: וַיַּסְתֵּר
  chosen: hid
  alternatives:
  - covered
  - concealed
  lexicon: HALOT
  rationale: The Hiphil here means to hide/conceal. 'Hid' is the most natural English
    rendering in context.
- source_word: פָּנָיו
  chosen: his face
  alternatives:
  - his presence
  lexicon: HALOT
  rationale: The literal sense 'his face' fits the physical action of averting sight
    in a theophany. No figurative rendering is needed.
- source_word: כִּי יָרֵא
  chosen: because he was afraid
  alternatives:
  - for he feared
  - because he feared
  lexicon: HALOT
  rationale: This gives clear modern English while preserving the causal force of
    כִּי and the stative sense of יָרֵא.
- source_word: מֵהַבִּיט
  chosen: to look
  alternatives:
  - from looking
  - to gaze
  lexicon: HALOT
  rationale: After יָרֵא, the infinitive with מן expresses what he feared doing. English
    idiom prefers 'afraid to look' rather than the more wooden 'afraid from looking.'
- source_word: אֶל הָאֱלֹהִים
  chosen: at God
  alternatives:
  - toward God
  - at the divine being
  lexicon: HALOT
  rationale: In this immediate context, אֱלֹהִים refers to the one true God speaking
    from the bush. 'At God' is the natural rendering of the preposition and referent.
