id: EXO.3.18
reference: Exodus 3:18
source:
  edition: WLC
  text: וְ/שָׁמְע֖וּ לְ/קֹלֶ֑/ךָ וּ/בָאתָ֡ אַתָּה֩ וְ/זִקְנֵ֨י יִשְׂרָאֵ֜ל אֶל מֶ֣לֶךְ
    מִצְרַ֗יִם וַ/אֲמַרְתֶּ֤ם אֵלָי/ו֙ יְהוָ֞ה אֱלֹהֵ֤י הָֽ/עִבְרִיִּים֙ נִקְרָ֣ה
    עָלֵ֔י/נוּ וְ/עַתָּ֗ה נֵֽלֲכָה נָּ֞א דֶּ֣רֶךְ שְׁלֹ֤שֶׁת יָמִים֙ בַּ/מִּדְבָּ֔ר
    וְ/נִזְבְּחָ֖ה לַֽ/יהוָ֥ה אֱלֹהֵֽי/נוּ־־׃
translation:
  text: And they will listen to your voice, and you and the elders of Israel will
    go to the king of Egypt and say to him, ‘The LORD, the God of the Hebrews, has
    met with us. And now, please let us go a journey of three days into the wilderness,
    so that we may sacrifice to the LORD our God.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has encountered us.' The Hebrew phrase can denote that the LORD has
      come upon or met with them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמְעוּ
  chosen: they will listen
  alternatives:
  - they will hear
  - they will obey
  lexicon: HALOT
  rationale: שׁמע can mean hear, listen, or obey depending on context. Here the immediate
    object is 'your voice,' and the sense is that the elders/people will heed Moses'
    message. 'Listen' preserves both auditory reception and responsive acceptance
    without overstating to explicit obedience.
- source_word: לְקֹלֶךָ
  chosen: to your voice
  alternatives:
  - to you
  - your message
  lexicon: HALOT
  rationale: Literally 'to your voice.' Retaining 'voice' keeps the Hebrew idiom while
    remaining natural in English.
- source_word: וּבָאתָ אַתָּה וְזִקְנֵי יִשְׂרָאֵל
  chosen: you and the elders of Israel will go
  alternatives:
  - you shall come, you and the elders of Israel
  - you are to go with the elders of Israel
  lexicon: HALOT
  rationale: The Hebrew uses singular followed by explicit pronoun and coordinated
    subject. English smooths this to a plural future with the full subject stated.
    'Go' fits the directional sense toward Pharaoh from the speaker's standpoint in
    context better than a wooden 'come.'
- source_word: מֶלֶךְ מִצְרַיִם
  chosen: the king of Egypt
  alternatives:
  - Egypt's king
  lexicon: HALOT
  rationale: Standard construct rendering; clear and natural English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention rooted
    in the Septuagint pattern.
- source_word: אֱלֹהֵי הָעִבְרִיִּים
  chosen: the God of the Hebrews
  alternatives:
  - the God of the Hebrew people
  lexicon: HALOT
  rationale: A straightforward construct phrase. 'Hebrews' preserves the ethnic designation
    used in the source text.
- source_word: נִקְרָה עָלֵינוּ
  chosen: has met with us
  alternatives:
  - has encountered us
  - has happened upon us
  - has called us
  lexicon: HALOT
  rationale: The Niphal of קרא with עַל can denote an encounter or meeting. 'Has met
    with us' is idiomatic English and fits the context of divine appearance/commission
    without importing the stronger idea of summons alone. The perfect is rendered
    with present relevance in English.
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Marks transition from declaration to request; 'And now' preserves the
    discourse flow.
- source_word: נֵלֲכָה נָּא
  chosen: please let us go
  alternatives:
  - please, we would like to go
  - please let us journey
  lexicon: HALOT
  rationale: The cohortative plus particle נָא expresses polite entreaty. 'Please
    let us go' captures the request directed to Pharaoh better than a bare 'let us
    go,' which in English can sound like self-exhortation.
- source_word: דֶּרֶךְ שְׁלֹשֶׁת יָמִים
  chosen: a journey of three days
  alternatives:
  - a three-day journey
  - the distance of three days
  lexicon: HALOT
  rationale: Hebrew idiom for travel distance/duration. 'A journey of three days'
    is clear and fairly close to the form of the source.
- source_word: בַּמִּדְבָּר
  chosen: into the wilderness
  alternatives:
  - in the wilderness
  - into the desert
  lexicon: HALOT
  rationale: With the motion verb, English naturally supplies 'into.' 'Wilderness'
    is broader and better than 'desert' for the biblical setting.
- source_word: וְנִזְבְּחָה
  chosen: so that we may sacrifice
  alternatives:
  - and let us sacrifice
  - that we may sacrifice
  lexicon: HALOT
  rationale: The cohortative here expresses purpose following the request to go. 'So
    that we may sacrifice' makes the purpose relation explicit in natural English.
- source_word: לַיהוָה אֱלֹהֵינוּ
  chosen: to the LORD our God
  alternatives:
  - to the LORD, our God
  lexicon: HALOT
  rationale: Standard rendering of the prepositional phrase with possessive suffix;
    no need to add punctuation not signaled by the Hebrew.
