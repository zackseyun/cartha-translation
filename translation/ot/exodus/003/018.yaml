theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This preserves covenantal resonance in English while following the project's
    stated policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of נִקְרָה עָלֵינוּ in divine encounter language
  chosen_reading: has met with us
  alternative_readings:
  - has encountered us
  - has called us
  rationale: The phrase reports divine encounter without requiring a more specific
    theological claim such as a summons formula. 'Has met with us' preserves the event
    of encounter and avoids over-interpretation.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
