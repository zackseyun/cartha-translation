theological_decisions:
- issue: Anthropomorphic language for divine action
  chosen_reading: Retain the bodily metaphor 'stretch out my hand'
  alternative_readings:
  - Render more abstractly as 'exercise my power'
  rationale: The Hebrew uses concrete anthropomorphic imagery for God's intervention.
    Preserving it respects the source text and does not require doctrinal reinterpretation.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve the source text''s plain sense.'
