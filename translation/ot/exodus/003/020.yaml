id: EXO.3.20
reference: Exodus 3:20
source:
  edition: WLC
  text: וְ/שָׁלַחְתִּ֤י אֶת יָדִ/י֙ וְ/הִכֵּיתִ֣י אֶת מִצְרַ֔יִם בְּ/כֹל֙ נִפְלְאֹתַ֔/י
    אֲשֶׁ֥ר אֶֽעֱשֶׂ֖ה בְּ/קִרְבּ֑/וֹ וְ/אַחֲרֵי כֵ֖ן יְשַׁלַּ֥ח אֶתְ/כֶֽם־־־׃
translation:
  text: And I will stretch out my hand and strike Egypt with all my wonders that I
    will do in its midst; and after that he will send you out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will send out my hand.' The Hebrew idiom means to extend the hand
      in action or power.
    reason: lexical_alternative
  - marker: b
    text: Or 'he will let you go.' The Hebrew more literally says 'he will send you
      out.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁלַחְתִּי אֶת־יָדִי
  chosen: I will stretch out my hand
  alternatives:
  - I will send out my hand
  lexicon: HALOT
  rationale: Although the verb שׁלח is literally 'send,' the idiom 'send/stretch out
    the hand' in contexts of divine action is naturally rendered 'stretch out my hand'
    in English. This preserves the Hebrew image while avoiding awkwardness.
- source_word: וְהִכֵּיתִי
  chosen: and strike
  alternatives:
  - and smite
  - and strike down
  lexicon: HALOT
  rationale: נכה commonly means 'strike' or 'smite.' 'Strike' is clear modern English
    and fits the impending plagues without over-specifying death or total destruction.
- source_word: מִצְרַיִם
  chosen: Egypt
  alternatives:
  - the Egyptians
  lexicon: HALOT
  rationale: The object is the nation/land as a corporate entity, not merely individual
    Egyptians. 'Egypt' best matches the Hebrew proper noun here.
- source_word: בְּכֹל נִפְלְאֹתַי
  chosen: with all my wonders
  alternatives:
  - with all my miraculous acts
  - with all my marvelous deeds
  lexicon: HALOT
  rationale: נפלאות refers to extraordinary acts that evoke wonder. 'Wonders' is concise,
    traditional enough to preserve biblical resonance, and understandable in modern
    English.
- source_word: אֲשֶׁר אֶעֱשֶׂה
  chosen: that I will do
  alternatives:
  - which I will perform
  lexicon: HALOT
  rationale: A straightforward rendering of the relative clause; 'do' preserves the
    simplicity of עשה.
- source_word: בְּקִרְבּוֹ
  chosen: in its midst
  alternatives:
  - among them
  - within it
  lexicon: HALOT
  rationale: The singular suffix most naturally refers back to Egypt as a collective/national
    entity. 'In its midst' preserves the singular and the spatial imagery of events
    occurring within Egypt.
- source_word: וְאַחֲרֵי כֵן
  chosen: and after that
  alternatives:
  - and afterward
  - then after that
  lexicon: HALOT
  rationale: This temporal phrase marks sequence. 'After that' is natural and sufficiently
    formal.
- source_word: יְשַׁלַּח אֶתְכֶם
  chosen: he will send you out
  alternatives:
  - he will let you go
  - he will send you away
  lexicon: HALOT
  rationale: The subject is Pharaoh, implied from context. 'Send you out' keeps the
    verbal link with שׁלח and reflects expulsion/release language more closely than
    the more interpretive 'let you go.'
