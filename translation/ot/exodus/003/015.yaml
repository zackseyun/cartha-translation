theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to preserve masculine kinship terms in Israelite address
  chosen_reading: the sons of Israel / your fathers
  alternative_readings:
  - the Israelites / your ancestors
  rationale: The translation philosophy calls for gender-accurate renderings over gender-neutral ones when the source is grammatically masculine and representative. Here the Hebrew uses explicit masculine kinship language, so it is retained in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
