id: EXO.3.15
reference: Exodus 3:15
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ ע֨וֹד אֱלֹהִ֜ים אֶל מֹשֶׁ֗ה כֹּֽה תֹאמַר֮ אֶל בְּנֵ֣י יִשְׂרָאֵל֒ יְהוָ֞ה אֱלֹהֵ֣י אֲבֹתֵי/כֶ֗ם אֱלֹהֵ֨י אַבְרָהָ֜ם אֱלֹהֵ֥י יִצְחָ֛ק וֵ/אלֹהֵ֥י יַעֲקֹ֖ב שְׁלָחַ֣/נִי אֲלֵי/כֶ֑ם זֶה שְּׁמִ֣/י לְ/עֹלָ֔ם וְ/זֶ֥ה זִכְרִ֖/י לְ/דֹ֥ר דֹּֽר־־־־׃
translation:
  text: 'God also said to Moses, “Thus you shall say to the sons of Israel: Yahweh, the God of your fathers, the God of Abraham, the God of Isaac, and the God of Jacob, has sent me to you. This is my name forever, and this is my memorial from generation to generation.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; alternatively rendered ''Yahweh.'''
    reason: alternative_reading
  - marker: b
    text: Or 'my remembrance' or 'the name by which I am remembered.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' In keeping with the gender-accurate principle, the masculine plural is retained rather than flattened to a neutral collective. 'Children of Israel' is traditional and idiomatic, but 'sons' more directly reflects the Hebrew form.
- source_word: אֱלֹהֵי אֲבֹתֵיכֶם
  chosen: the God of your fathers
  alternatives:
  - the God of your ancestors
  lexicon: HALOT
  rationale: The Hebrew explicitly uses 'fathers,' and the translation philosophy prefers gender-accurate renderings where the source is masculine and representative. 'Ancestors' is possible but less formally aligned with the wording.
- source_word: שְׁלָחַנִי
  chosen: has sent me
  alternatives:
  - sent me
  lexicon: HALOT
  rationale: 'The qatal form here naturally conveys a completed action with present relevance in English discourse: God has commissioned Moses and that commission stands. ''Has sent me'' reads naturally in modern English while preserving the force of the perfect.'
- source_word: זֶה שְּׁמִי לְעֹלָם
  chosen: This is my name forever
  alternatives:
  - This is my name for eternity
  - This is my name permanently
  lexicon: HALOT
  rationale: לְעֹלָם commonly denotes enduring duration or perpetuity. 'Forever' is the most natural modern English rendering and fits the covenantal context.
- source_word: זִכְרִי
  chosen: my memorial
  alternatives:
  - my remembrance
  - the name by which I am remembered
  lexicon: HALOT
  rationale: The noun derives from the root 'remember' and refers to what preserves remembrance. 'Memorial' is concise, traditional, and contextually apt, though potentially less immediately transparent than 'remembrance'; the latter is preserved in a footnote.
- source_word: לְדֹר דֹּר
  chosen: from generation to generation
  alternatives:
  - for generation after generation
  - through all generations
  lexicon: HALOT
  rationale: This idiom expresses continuity across successive generations. 'From generation to generation' is a natural English equivalent that preserves the repetitive force of the Hebrew.
- source_word: כֹּה תֹאמַר
  chosen: Thus you shall say
  alternatives:
  - This is what you shall say
  - So you shall say
  lexicon: HALOT
  rationale: This formula introduces direct divine instruction. 'Thus you shall say' preserves the formal register appropriate to the speech while remaining understandable.
- source_word: עוֹד
  chosen: also
  alternatives:
  - again
  - further
  lexicon: HALOT
  rationale: In context, עוֹד marks continuation of God's speech. 'Also' fits the discourse flow better than 'again,' which could imply repetition rather than further elaboration.
