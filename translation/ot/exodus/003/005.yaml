theological_decisions:
- issue: Nature of the holiness of the location
  chosen_reading: Render the statement descriptively as 'the place where you are standing
    is holy ground' without adding explanation.
  alternative_readings:
  - Explicitly interpret the holiness as derived from God's presence
  rationale: The verse clearly marks the ground as holy, but it does not itself explain
    the mechanism beyond the immediate divine encounter. The translation preserves
    the text's claim without importing further theological commentary.
  doctrine_reference: Translation philosophy §1, §3
