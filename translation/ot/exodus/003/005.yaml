id: EXO.3.5
reference: Exodus 3:5
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר אַל תִּקְרַ֣ב הֲלֹ֑ם שַׁל נְעָלֶ֨י/ךָ֙ מֵ/עַ֣ל רַגְלֶ֔י/ךָ כִּ֣י
    הַ/מָּק֗וֹם אֲשֶׁ֤ר אַתָּה֙ עוֹמֵ֣ד עָלָ֔י/ו אַדְמַת קֹ֖דֶשׁ הֽוּא־־־׃
translation:
  text: Then he said, “Do not come near here. Take your sandals off your feet, because
    the place where you are standing is holy ground.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not approach here.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'ground of holiness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then he said
  alternatives:
  - And he said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then he said' gives natural
    modern English while preserving sequential force; 'And he said' is more formally
    literal but less idiomatic.
- source_word: אַל תִּקְרַב
  chosen: Do not come near
  alternatives:
  - Do not approach
  lexicon: HALOT
  rationale: The negative particle with the imperfect/jussive expresses prohibition.
    'Come near' is a natural rendering of קרב in this context and matches the immediate
    spatial warning.
- source_word: הֲלֹם
  chosen: here
  alternatives:
  - to here
  - hither
  lexicon: HALOT
  rationale: The adverb indicates this place. 'Here' is clear modern English; 'hither'
    is archaic.
- source_word: שַׁל
  chosen: Take ... off
  alternatives:
  - Remove
  lexicon: HALOT
  rationale: The imperative means to draw off/remove. In idiomatic English with footwear,
    'take ... off' is the most natural equivalent.
- source_word: נְעָלֶיךָ
  chosen: your sandals
  alternatives:
  - your shoes
  lexicon: HALOT
  rationale: The Hebrew term refers to sandals/footwear typical of the ancient Near
    Eastern setting. 'Sandals' preserves the cultural concreteness better than the
    more generic 'shoes'.
- source_word: מֵעַל רַגְלֶיךָ
  chosen: off your feet
  alternatives:
  - from on your feet
  - from your feet
  lexicon: HALOT
  rationale: The preposition plus 'feet' specifies removal from the feet. 'Off your
    feet' is idiomatic and accurately conveys the sense.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the command. 'Because' communicates
    the causal force more clearly in contemporary English than 'for'.
- source_word: הַמָּקוֹם
  chosen: the place
  alternatives:
  - this place
  lexicon: HALOT
  rationale: The definite noun refers to the specific location Moses is at. 'The place'
    is straightforward and sufficiently definite in English.
- source_word: עוֹמֵד עָלָיו
  chosen: you are standing
  alternatives:
  - you stand on
  - you are standing on it
  lexicon: HALOT
  rationale: The participle with preposition denotes Moses' present position on the
    ground. English normally omits the explicit object after 'standing' when 'the
    place' already governs the clause; this avoids awkwardness without loss of meaning.
- source_word: אַדְמַת קֹדֶשׁ
  chosen: holy ground
  alternatives:
  - ground of holiness
  - holy soil
  lexicon: HALOT
  rationale: The construct phrase literally means 'ground/soil of holiness.' 'Holy
    ground' is the established and accurate English equivalent, preserving the sanctity
    of the location without unnecessary stiffness.
- source_word: הוּא
  chosen: is
  alternatives:
  - it is
  lexicon: HALOT
  rationale: 'The pronoun functions as the copular conclusion of the clause. In English,
    the predicate is naturally rendered with ''is'' after the subject phrase: ''the
    place ... is holy ground.'''
