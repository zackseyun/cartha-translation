id: EXO.3.7
reference: Exodus 3:7
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוָ֔ה רָאֹ֥ה רָאִ֛יתִי אֶת עֳנִ֥י עַמִּ֖/י אֲשֶׁ֣ר בְּ/מִצְרָ֑יִם
    וְ/אֶת צַעֲקָתָ֤/ם שָׁמַ֨עְתִּי֙ מִ/פְּנֵ֣י נֹֽגְשָׂ֔י/ו כִּ֥י יָדַ֖עְתִּי אֶת
    מַכְאֹבָֽי/ו־־־׃
translation:
  text: Then the LORD said, “I have surely seen the affliction of my people who are
    in Egypt, and I have heard their cry because of their oppressors, for I know their
    sufferings.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I have indeed seen” (Hebrew uses an infinitive absolute with the finite
      verb for emphasis).
    reason: lexical_alternative
  - marker: b
    text: Or “their outcry.”
    reason: lexical_alternative
  - marker: c
    text: Or “because of their taskmasters.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD,' following
    Jewish reverence tradition and the Septuagintal pattern.
- source_word: רָאֹה רָאִיתִי
  chosen: I have surely seen
  alternatives:
  - I have indeed seen
  - seeing I have seen
  - I have seen, yes, seen
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verbal idea.
    'I have surely seen' preserves the emphatic force in natural English without awkward
    literalism.
- source_word: עֳנִי
  chosen: affliction
  alternatives:
  - misery
  - oppression
  - suffering
  lexicon: HALOT
  rationale: The noun denotes misery or affliction under harsh conditions. 'Affliction'
    is broad enough to include both suffering and oppression and fits the Exodus context
    well.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Straightforward covenantal designation; 'people' is the natural rendering
    of עַם here.
- source_word: בְּמִצְרָיִם
  chosen: who are in Egypt
  alternatives:
  - in Egypt
  rationale: The relative clause naturally modifies 'my people.' Expanding to 'who
    are in Egypt' makes the English syntax clear and readable.
- source_word: צַעֲקָתָם
  chosen: their cry
  alternatives:
  - their outcry
  - their plea
  lexicon: HALOT
  rationale: The noun refers to a cry arising from distress. 'Cry' is simple and forceful;
    'outcry' is possible but slightly more interpretive.
- source_word: מִפְּנֵי נֹגְשָׂיו
  chosen: because of their oppressors
  alternatives:
  - from before their taskmasters
  - because of those driving them
  lexicon: HALOT
  rationale: נֹגֵשׂ refers to one who drives or exacts labor/payment; in Exodus this
    is best captured by 'oppressors.' Rendering מִפְּנֵי causally as 'because of'
    fits the sense of the cry arising on account of them.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'Here כִּי introduces the ground for the preceding statement: the LORD
    has heard because he knows. ''For'' preserves that explanatory connection.'
- source_word: יָדַעְתִּי
  chosen: I know
  alternatives:
  - I have known
  - I am aware of
  lexicon: HALOT
  rationale: Though formally perfect, in context it expresses present, engaged knowledge.
    'I know' is idiomatic and preserves the personal, relational force better than
    the flatter 'I am aware of.'
- source_word: מַכְאֹבָיו
  chosen: their sufferings
  alternatives:
  - their pains
  - their sorrows
  lexicon: HALOT
  rationale: The noun denotes pain or suffering. With the plural sense in English,
    'their sufferings' communicates the breadth of Israel's distress more naturally
    than 'their pains.'
