theological_decisions:
- issue: Rendering the divine name YHWH
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for יְהוָה and avoids introducing
    a denominationally loaded preference while preserving the covenantal identity
    of Israel's God.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Anthropopathic language of divine knowledge
  chosen_reading: I know their sufferings
  alternative_readings:
  - I am aware of their sufferings
  - I have taken notice of their pains
  rationale: The Hebrew uses ordinary human language for God's personal knowledge
    of Israel's suffering. The translation preserves this theological immediacy rather
    than softening it into abstract awareness.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
