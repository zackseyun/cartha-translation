id: EXO.3.17
reference: Exodus 3:17
source:
  edition: WLC
  text: וָ/אֹמַ֗ר אַעֲלֶ֣ה אֶתְ/כֶם֮ מֵ/עֳנִ֣י מִצְרַיִם֒ אֶל אֶ֤רֶץ הַֽ/כְּנַעֲנִי֙
    וְ/הַ֣/חִתִּ֔י וְ/הָֽ/אֱמֹרִי֙ וְ/הַ/פְּרִזִּ֔י וְ/הַ/חִוִּ֖י וְ/הַ/יְבוּסִ֑י
    אֶל אֶ֛רֶץ זָבַ֥ת חָלָ֖ב וּ/דְבָֽשׁ־־׃
translation:
  text: And I have said, ‘I will bring you up out of the affliction of Egypt to the
    land of the Canaanites, the Hittites, the Amorites, the Perizzites, the Hivites,
    and the Jebusites—to a land flowing with milk and honey.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “And I said, ‘I will bring you up ...’” The Hebrew verb is formally
      past; the main text renders it with present relevance in context.
    reason: alternative_reading
  - marker: b
    text: “Affliction of Egypt” may also be rendered “oppression in Egypt” or “Egypt’s
      misery.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  chosen: And I have said
  alternatives:
  - And I said
  - I promise
  lexicon: HALOT
  rationale: The waw-consecutive with אמר is formally past ('and I said'), but in
    context it introduces the content of God's declared intention within the ongoing
    speech to Moses. 'And I have said' preserves the prior divine resolve with present
    relevance better than a simple English preterite, while avoiding paraphrastic
    expansion.
- source_word: אַעֲלֶה
  chosen: I will bring you up
  alternatives:
  - I will lead you up
  - I will bring you out
  lexicon: HALOT
  rationale: עלה in Hiphil commonly means 'cause to go up, bring up.' 'Bring you up'
    preserves the vertical/exodus imagery and is more literal than 'bring you out,'
    though the latter is contextually implied.
- source_word: מֵעֳנִי מִצְרַיִם
  chosen: out of the affliction of Egypt
  alternatives:
  - out of Egypt's misery
  - out of oppression in Egypt
  lexicon: HALOT
  rationale: עֳנִי denotes affliction, misery, or oppression. The construct is best
    taken as the affliction associated with Egypt rather than merely a geographic
    departure. 'Affliction of Egypt' stays close to the Hebrew while remaining intelligible.
- source_word: אֶל אֶרֶץ
  chosen: to the land
  alternatives:
  - into the land
  lexicon: HALOT
  rationale: אֶל marks movement toward. 'To the land' is a natural rendering here
    and fits the repeated destination formula in the verse.
- source_word: הַכְּנַעֲנִי ... הַיְבוּסִי
  chosen: the Canaanites, the Hittites, the Amorites, the Perizzites, the Hivites,
    and the Jebusites
  alternatives:
  - the land of the Canaanite ... Jebusite
  lexicon: HALOT
  rationale: Although each ethnonym is singular in Hebrew, English idiom normally
    uses plural ethnonyms for peoples. This preserves the sense of a land identified
    by its inhabitants.
- source_word: אֶל אֶרֶץ זָבַת חָלָב וּדְבָשׁ
  chosen: to a land flowing with milk and honey
  alternatives:
  - to a land that flows with milk and honey
  lexicon: HALOT
  rationale: This is a conventional Hebrew idiom for abundance and fertility. 'Flowing
    with milk and honey' is both accurate and established English, preserving the
    metaphor without flattening it.
