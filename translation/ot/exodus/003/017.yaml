theological_decisions:
- issue: Rendering of the divine promise formula in context
  chosen_reading: And I have said, ‘I will bring you up ...’
  alternative_readings:
  - And I said, ‘I will bring you up ...’
  rationale: The Hebrew form is formally past, but within the discourse it functions
    as a reaffirmed divine declaration. The chosen rendering preserves the sense of
    God's settled promise without importing extra theological content.
  doctrine_reference: Translation philosophy §1, §3
