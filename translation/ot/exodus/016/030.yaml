theological_decisions:
- issue: Whether to make the Sabbath reference explicit in the verb
  chosen_reading: Render the verb as 'rested' rather than 'kept the Sabbath' or another
    expanded form.
  alternative_readings:
  - kept the Sabbath
  - ceased
  rationale: The Hebrew verb itself states that the people ceased/rested; the Sabbath
    significance is already clear from the surrounding context and from 'the seventh
    day.' This preserves the text's wording without importing extra doctrinal or liturgical
    formulation.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve what
    the source text says without paraphrase beyond warrant.'
