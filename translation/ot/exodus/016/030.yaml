id: EXO.16.30
reference: Exodus 16:30
source:
  edition: WLC
  text: וַ/יִּשְׁבְּת֥וּ הָ/עָ֖ם בַּ/יּ֥וֹם הַ/שְּׁבִעִֽי׃
translation:
  text: So the people rested on the seventh day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ceased'; the verb is related to Sabbath rest, so 'kept Sabbath' is an
      interpretive expansion.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁבְּתוּ
  chosen: rested
  alternatives:
  - ceased
  - stopped
  - kept Sabbath
  lexicon: HALOT
  rationale: From שׁבת in the qal wayyiqtol, the basic sense is to cease/rest. In
    this immediate context of Sabbath observance, 'rested' communicates the intended
    action naturally in English without overtranslating to the more interpretive 'kept
    Sabbath.' 'Ceased' is more wooden but less idiomatic here.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: עָם commonly means 'people' in a collective sense. 'The people' fits
    the wilderness narrative and standard English usage better than 'the nation' in
    this context.
- source_word: בַּיּוֹם
  chosen: on the day
  alternatives:
  - in the day
  lexicon: HALOT
  rationale: The preposition ב with יוֹם is most naturally rendered 'on' in English
    for a specific day reference.
- source_word: הַשְּׁבִיעִי
  chosen: the seventh
  alternatives:
  - the seventh day
  lexicon: HALOT
  rationale: As an ordinal modifying 'day,' it yields 'the seventh day.' In English
    the full phrase is required for clarity, even though 'day' is already supplied
    by the previous word.
- source_word: וַ
  chosen: So
  alternatives:
  - And
  lexicon: Hebrew waw-consecutive grammar
  rationale: The prefixed waw on the verb advances the narrative. 'So' gives smooth
    modern English while preserving the resultative/narrative flow; 'And' would also
    be possible but is less natural in contemporary style.
