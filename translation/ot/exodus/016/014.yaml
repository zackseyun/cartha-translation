id: EXO.16.14
reference: Exodus 16:14
source:
  edition: WLC
  text: וַ/תַּ֖עַל שִׁכְבַ֣ת הַ/טָּ֑ל וְ/הִנֵּ֞ה עַל פְּנֵ֤י הַ/מִּדְבָּר֙ דַּ֣ק מְחֻסְפָּ֔ס
    דַּ֥ק כַּ/כְּפֹ֖ר עַל הָ/אָֽרֶץ־־׃
translation:
  text: When the layer of dew had gone up, behold, on the surface of the wilderness
    was a fine, flaky thing, fine as frost on the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a fine, flake-like thing'; the rare Hebrew term translated 'flaky' is
      uncertain in nuance and may describe texture or appearance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעַל
  chosen: had gone up
  alternatives:
  - lifted
  - evaporated
  lexicon: HALOT
  rationale: The verb עלה literally means 'went up.' In context of dew disappearing,
    English 'had gone up' preserves the imagery without over-interpreting; 'evaporated'
    is possible but more explanatory than the Hebrew.
- source_word: שִׁכְבַת הַטָּל
  chosen: the layer of dew
  alternatives:
  - the covering of dew
  - the deposit of dew
  lexicon: HALOT
  rationale: שִׁכְבָה denotes a layer or lying mass. 'Layer of dew' is natural English
    and reflects the physical sheet-like covering implied by the construct phrase.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - there was
  lexicon: HALOT
  rationale: הִנֵּה is a discourse particle drawing attention. 'Behold' preserves
    the suddenness and vividness better than flattening it into simple narration.
- source_word: עַל פְּנֵי הַמִּדְבָּר
  chosen: on the surface of the wilderness
  alternatives:
  - over the face of the wilderness
  - on the face of the desert
  lexicon: HALOT
  rationale: פְּנֵי literally 'face/surface.' 'Surface' communicates the idiom clearly
    in modern English. 'Wilderness' is preferred for מִדְבָּר in Exodus context over
    'desert,' which can sound overly specific climatically.
- source_word: דַּק
  chosen: fine
  alternatives:
  - thin
  - small
  lexicon: HALOT
  rationale: The adjective indicates something fine/thin. 'Fine' works well both occurrences
    and matches the visual description.
- source_word: מְחֻסְפָּס
  chosen: flaky thing
  alternatives:
  - flake-like
  - granular thing
  - scaled thing
  lexicon: HALOT
  rationale: This rare term is difficult and likely describes texture or form. 'Flaky'
    captures the likely sense in context and aligns with the manna description without
    importing too much specificity. 'Thing' is supplied in English because the Hebrew
    leaves the noun implicit in a verbless descriptive clause.
- source_word: דַּק כַּכְּפֹר
  chosen: fine as frost
  alternatives:
  - fine like hoarfrost
  - thin as frost
  lexicon: HALOT
  rationale: כְּפֹר refers to frost/hoarfrost. 'Fine as frost' preserves the comparison
    and echoes the repeated דַּק.
- source_word: עַל הָאָרֶץ
  chosen: on the ground
  alternatives:
  - upon the earth
  - on the land
  lexicon: HALOT
  rationale: In this immediate physical setting, 'ground' is the most natural contextual
    rendering of אֶרֶץ.
