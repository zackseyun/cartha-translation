theological_decisions:
- issue: Rendering of תּוֹרָה in a pre-Sinai context
  chosen_reading: my law
  alternative_readings:
  - my instruction
  - my teaching
  rationale: The verse tests whether Israel will conform to the LORD's revealed will.
    'Law' preserves covenantal weight and anticipates the broader Torah theme, while
    still being a legitimate rendering of תּוֹרָה. The alternative 'instruction' is
    lexically possible and is preserved in a footnote because it may better capture
    the immediate context of divine provision commands.
  doctrine_reference: Translation philosophy §5 (consistency of key terms) and §6
    (readable modern English)
