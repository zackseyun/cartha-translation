id: EXO.16.4
reference: Exodus 16:4
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל מֹשֶׁ֔ה הִנְ/נִ֨י מַמְטִ֥יר לָ/כֶ֛ם לֶ֖חֶם מִן הַ/שָּׁמָ֑יִם
    וְ/יָצָ֨א הָ/עָ֤ם וְ/לָֽקְטוּ֙ דְּבַר י֣וֹם בְּ/יוֹמ֔/וֹ לְמַ֧עַן אֲנַסֶּ֛/נּוּ
    הֲ/יֵלֵ֥ךְ בְּ/תוֹרָתִ֖/י אִם לֹֽא־־־־׃
translation:
  text: Then the LORD said to Moses, “Look, I am raining bread from heaven for you,
    and the people shall go out and gather each day’s portion on its day, so that
    I may test them, whether they will walk in my law or not.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I will rain bread from heaven for you.” The Hebrew participle can be
      rendered with imminent future force.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “the matter of a day in its day,” that is, each day’s needed portion
      gathered on that day.
    reason: lexical_alternative
  - marker: c
    text: Or “whether they will walk in my instruction or not.”
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Follows the project's default rendering for the divine name, preserving
    the covenant name while matching established English convention.
- source_word: הִנְנִי
  chosen: Look
  alternatives:
  - Behold
  - Here I am
  lexicon: HALOT
  rationale: Introduces divine announcement with a natural modern English attention-getter.
    'Behold' is more formal but less natural; 'Here I am' is too literal in this context.
- source_word: מַמְטִיר
  chosen: I am raining
  alternatives:
  - I will rain
  - I am about to rain down
  lexicon: HALOT
  rationale: The Hiphil participle conveys imminent or ongoing causative action. 'I
    am raining' preserves the vividness and immediacy better than a simple future,
    while still sounding natural in context.
- source_word: לֶחֶם מִן הַשָּׁמַיִם
  chosen: bread from heaven
  alternatives:
  - food from heaven
  - bread from the sky
  lexicon: HALOT
  rationale: Retains the concrete noun 'bread' rather than broadening to 'food,' since
    the Hebrew explicitly says bread and the phrase becomes theologically significant
    in later biblical usage.
- source_word: וְיָצָא הָעָם
  chosen: the people shall go out
  alternatives:
  - the people will go out
  lexicon: HALOT
  rationale: Represents the sequential instruction/result with a simple future sense
    in English. 'Shall' fits the directive tone without overformalizing.
- source_word: וְלָקְטוּ
  chosen: and gather
  alternatives:
  - and collect
  - and pick up
  lexicon: HALOT
  rationale: '''Gather'' is the standard and contextually fitting rendering for collecting
    manna, preserving the ordinary action without colloquial flattening.'
- source_word: דְּבַר יוֹם בְּיוֹמוֹ
  chosen: each day’s portion on its day
  alternatives:
  - the matter of a day in its day
  - a day's amount each day
  - the daily portion day by day
  lexicon: HALOT
  rationale: This idiom refers to the amount needed for each day, gathered on that
    day. The chosen rendering preserves both the distributive sense and the temporal
    limitation.
- source_word: לְמַעַן אֲנַסֶּנּוּ
  chosen: so that I may test them
  alternatives:
  - in order that I may test it
  - that I may prove them
  lexicon: HALOT
  rationale: Although the suffix is singular ('him/it'), the referent is collective
    ('the people'), so idiomatic English uses plural 'them.' 'Test' is clearer in
    modern English than 'prove'.
- source_word: הֲיֵלֵךְ
  chosen: whether they will walk
  alternatives:
  - whether it will walk
  - whether they will live
  lexicon: HALOT
  rationale: The singular verb agrees with the collective noun, but English naturally
    renders the collective as plural here. 'Walk' preserves the Hebrew metaphor of
    conduct rather than interpreting it as 'live' or 'obey' alone.
- source_word: בְּתוֹרָתִי
  chosen: in my law
  alternatives:
  - according to my instruction
  - in my teaching
  lexicon: HALOT
  rationale: תּוֹרָה fundamentally means instruction, but in this covenantal setting
    'law' is a strong and recognizable rendering. The preposition 'in' is retained
    with 'walk in my law' to preserve the Hebrew idiom.
- source_word: אִם לֹא
  chosen: or not
  alternatives:
  - or no
  - if not
  lexicon: HALOT
  rationale: Here the phrase completes the indirect question introduced by 'whether,'
    yielding natural English 'whether ... or not.'
