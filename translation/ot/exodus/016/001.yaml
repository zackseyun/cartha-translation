id: EXO.16.1
reference: Exodus 16:1
source:
  edition: WLC
  text: וַ/יִּסְעוּ֙ מֵֽ/אֵילִ֔ם וַ/יָּבֹ֜אוּ כָּל עֲדַ֤ת בְּנֵֽי יִשְׂרָאֵל֙ אֶל
    מִדְבַּר סִ֔ין אֲשֶׁ֥ר בֵּין אֵילִ֖ם וּ/בֵ֣ין סִינָ֑י בַּ/חֲמִשָּׁ֨ה עָשָׂ֥ר יוֹם֙
    לַ/חֹ֣דֶשׁ הַ/שֵּׁנִ֔י לְ/צֵאתָ֖/ם מֵ/אֶ֥רֶץ מִצְרָֽיִם־־־־־׃
translation:
  text: They set out from Elim, and the whole congregation of the sons of Israel came
    to the wilderness of Sin, which is between Elim and Sinai, on the fifteenth day
    of the second month after they had gone out from the land of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of Israel.' This is the standard national designation and can
      refer to the whole people of Israel, not only males.
    reason: lexical_alternative
  - marker: b
    text: '''Sin'' here is a place name, the wilderness of Sin, not the moral term
      ''sin.'''
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: The verb נסע in the wilderness-travel context commonly denotes breaking
    camp and moving on. 'Set out' is natural modern English and preserves the travel
    nuance without unnecessary archaism.
- source_word: מֵאֵילִם
  chosen: from Elim
  lexicon: HALOT
  rationale: אֵילִם is a place name and is transliterated per translation philosophy.
- source_word: וַיָּבֹאוּ
  chosen: came
  alternatives:
  - arrived
  - entered
  lexicon: HALOT
  rationale: בוא is a common motion verb. 'Came' fits the narrative sequence smoothly;
    'arrived' is possible but slightly more interpretive.
- source_word: כָּל עֲדַת בְּנֵי יִשְׂרָאֵל
  chosen: the whole congregation of the sons of Israel
  alternatives:
  - the whole congregation of the Israelites
  - the whole community of the sons of Israel
  lexicon: HALOT
  rationale: כָּל עֲדַת is best represented by 'the whole congregation.' בְּנֵי יִשְׂרָאֵל
    is formally 'sons of Israel'; this preserves the Hebrew familial-national expression
    and follows the gender-accurate principle. 'Israelites' is idiomatic but less
    transparent to the source wording.
- source_word: אֶל מִדְבַּר סִין
  chosen: to the wilderness of Sin
  alternatives:
  - into the wilderness of Sin
  - to the Desert of Sin
  lexicon: HALOT
  rationale: מִדְבַּר denotes wilderness/desert terrain. 'Wilderness' is a standard
    biblical rendering and avoids over-specifying geography. סִין is a place name
    distinct from 'Sinai' and must be transliterated, not translated as moral 'sin'.
- source_word: אֲשֶׁר בֵּין אֵילִם וּבֵין סִינָי
  chosen: which is between Elim and Sinai
  alternatives:
  - that is between Elim and Sinai
  lexicon: HALOT
  rationale: A straightforward relative clause locating the wilderness geographically.
- source_word: בַּחֲמִשָּׁה עָשָׂר יוֹם
  chosen: on the fifteenth day
  alternatives:
  - on day fifteen
  - on the fifteenth
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'on the fifteen day'; standard English
    date style is 'on the fifteenth day.'
- source_word: לַחֹדֶשׁ הַשֵּׁנִי
  chosen: of the second month
  alternatives:
  - in the second month
  lexicon: HALOT
  rationale: This phrase modifies the date expression. 'Of the second month' is the
    most natural English equivalent in calendrical style.
- source_word: לְצֵאתָם מֵאֶרֶץ מִצְרַיִם
  chosen: after they had gone out from the land of Egypt
  alternatives:
  - since they came out of the land of Egypt
  - from their going out from the land of Egypt
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ל marks the reference point for
    the dating. 'After they had gone out' communicates the temporal relation clearly
    in English while preserving the exodus event as the anchor. 'Land of Egypt' is
    retained formally.
