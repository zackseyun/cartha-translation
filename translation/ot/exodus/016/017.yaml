id: EXO.16.17
reference: Exodus 16:17
source:
  edition: WLC
  text: וַ/יַּעֲשׂוּ כֵ֖ן בְּנֵ֣י יִשְׂרָאֵ֑ל וַֽ/יִּלְקְט֔וּ הַ/מַּרְבֶּ֖ה וְ/הַ/מַּמְעִֽיט־׃
translation:
  text: And the sons of Israel did so, and they gathered, some more and some less.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more formally, 'the one who gathered much and the one who gathered little.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  chosen: did
  alternatives:
  - acted
  - made
  lexicon: HALOT
  rationale: From עשה, here in the idiom 'did so' referring back to the prior instruction.
    'Did' is the natural English equivalent in this construction.
- source_word: כֵן
  chosen: so
  alternatives:
  - thus
  lexicon: HALOT
  rationale: Adverb meaning 'so/thus.' 'Did so' is standard, natural English for ויעשו
    כן.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' In keeping with the gender-accurate principle,
    the familial expression is preserved rather than flattened to 'Israelites,' while
    remaining idiomatic in English.
- source_word: וַיִּלְקְטוּ
  chosen: they gathered
  alternatives:
  - they collected
  - they gleaned
  lexicon: HALOT
  rationale: לקט means to gather up or collect, especially food. 'Gathered' fits the
    manna context and reads naturally.
- source_word: הַמַּרְבֶּה
  chosen: some more
  alternatives:
  - the one gathering much
  - the one with much
  - the one who gathered much
  lexicon: HALOT
  rationale: Substantivized participle from רבה, literally 'the one increasing/doing
    much.' In context it contrasts with the next term and refers to those who gathered
    a larger amount. 'Some more' captures the distributive sense in smooth English.
- source_word: הַמַּמְעִיט
  chosen: some less
  alternatives:
  - the one gathering little
  - the one with little
  - the one who gathered little
  lexicon: HALOT
  rationale: Substantivized participle from מעט, contrasting with המרבה. 'Some less'
    pairs naturally with 'some more' and reflects the comparative contrast in context.
