id: EXO.16.21
reference: Exodus 16:21
source:
  edition: WLC
  text: וַ/יִּלְקְט֤וּ אֹת/וֹ֙ בַּ/בֹּ֣קֶר בַּ/בֹּ֔קֶר אִ֖ישׁ כְּ/פִ֣י אָכְל֑/וֹ וְ/חַ֥ם
    הַ/שֶּׁ֖מֶשׁ וְ/נָמָֽס׃
translation:
  text: And they gathered it morning by morning, each man according to what he could
    eat; but when the sun grew hot, it melted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''each man according to the mouth of his eating,'' that is, in
      proportion to what each could eat.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלְקְטוּ
  chosen: they gathered
  alternatives:
  - they picked up
  - they collected
  lexicon: HALOT
  rationale: The verb לקט commonly means to gather or collect, especially food. 'Gathered'
    is natural English and preserves the concrete action without over-specifying method.
- source_word: אֹתוֹ
  chosen: it
  alternatives:
  - this
  - the manna
  lexicon: HALOT
  rationale: The direct object pronoun refers back to the manna from the prior context.
    'It' preserves the Hebrew pronoun without importing the noun into the verse.
- source_word: בַּבֹּקֶר בַּבֹּקֶר
  chosen: morning by morning
  alternatives:
  - every morning
  - morning after morning
  lexicon: HALOT
  rationale: The repeated phrase is distributive and iterative. 'Morning by morning'
    preserves the Hebrew repetition more transparently than the smoother 'every morning'.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - each person
  lexicon: HALOT
  rationale: The Hebrew is singular masculine אִישׁ used distributively. Per the gender-accurate
    philosophy, 'each man' best matches the source form and representative force,
    rather than neutralizing it.
- source_word: כְּפִי אָכְלוֹ
  chosen: according to what he could eat
  alternatives:
  - according to his eating
  - as much as he could eat
  - in proportion to his consumption
  lexicon: HALOT
  rationale: Literally 'according to the mouth of his eating,' an idiom meaning in
    proportion to one's eating need or capacity. 'According to what he could eat'
    is idiomatic modern English that preserves the sense without wooden literalism.
- source_word: וְחַם הַשֶּׁמֶשׁ
  chosen: when the sun grew hot
  alternatives:
  - and the sun became hot
  - when the sun was hot
  lexicon: HALOT
  rationale: The clause uses a verb meaning 'became hot' with 'the sun' as subject.
    'When the sun grew hot' conveys the temporal sense naturally in English and fits
    the narrative sequence.
- source_word: וְנָמָס
  chosen: it melted
  alternatives:
  - it dissolved
  - it liquefied
  lexicon: HALOT
  rationale: The verb מסס means to melt or dissolve. 'Melted' is the standard and
    contextually appropriate rendering for manna exposed to heat.
