id: EXO.16.20
reference: Exodus 16:20
source:
  edition: WLC
  text: וְ/לֹא שָׁמְע֣וּ אֶל מֹשֶׁ֗ה וַ/יּוֹתִ֨רוּ אֲנָשִׁ֤ים מִמֶּ֨/נּוּ֙ עַד בֹּ֔קֶר
    וַ/יָּ֥רֻם תּוֹלָעִ֖ים וַ/יִּבְאַ֑שׁ וַ/יִּקְצֹ֥ף עֲלֵ/הֶ֖ם מֹשֶֽׁה־־־׃
translation:
  text: But they did not listen to Moses, and some men left part of it until morning,
    and it bred worms and stank; and Moses was angry with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not heed Moses.' The Hebrew can carry the sense of refusing to listen
      in a way that implies disobedience.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'worms arose in it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמְעוּ אֶל מֹשֶׁה
  chosen: did not listen to Moses
  alternatives:
  - did not obey Moses
  - did not heed Moses
  lexicon: HALOT
  rationale: שׁמע with אֶל commonly means to listen to or heed someone. 'Listen to'
    is the most direct English rendering; the disobedient implication is clear from
    context without importing the stronger interpretive gloss 'obey' into the main
    text.
- source_word: וַיּוֹתִרוּ
  chosen: left part of it
  alternatives:
  - left some of it over
  - kept some of it over
  lexicon: HALOT
  rationale: From יתר in the Hiphil, meaning to leave over or leave remaining. 'Left
    part of it' is natural modern English and preserves the sense that some manna
    was retained contrary to instruction.
- source_word: אֲנָשִׁים
  chosen: some men
  alternatives:
  - men
  - some people
  lexicon: HALOT
  rationale: The noun is explicitly masculine plural, not a generic term for people
    here. 'Some men' reflects the indefinite subset sense in context and follows the
    gender-accurate principle.
- source_word: מִמֶּנּוּ
  chosen: of it
  alternatives:
  - from it
  lexicon: HALOT
  rationale: Refers back to the manna. English idiom prefers 'left part of it' rather
    than the more wooden 'left from it.'
- source_word: עַד בֹּקֶר
  chosen: until morning
  alternatives:
  - until the morning
  lexicon: HALOT
  rationale: Straightforward temporal phrase; 'until morning' is idiomatic and sufficiently
    precise.
- source_word: וַיָּרֻם תּוֹלָעִים
  chosen: it bred worms
  alternatives:
  - worms appeared in it
  - it swarmed with worms
  lexicon: HALOT
  rationale: The verb רום here idiomatically describes worms arising/developing in
    the manna. 'It bred worms' is concise, natural English that captures the result
    without awkward literalism.
- source_word: וַיִּבְאַשׁ
  chosen: stank
  alternatives:
  - became foul-smelling
  - smelled bad
  lexicon: HALOT
  rationale: The verb means to stink or become foul. 'Stank' is vivid, direct, and
    matches the narrative tone better than a softened paraphrase.
- source_word: וַיִּקְצֹף
  chosen: was angry
  alternatives:
  - became angry
  - was enraged
  lexicon: HALOT
  rationale: The verb denotes anger or wrath. 'Was angry' is the most natural narrative
    rendering in English and avoids overstating the intensity.
- source_word: עֲלֵהֶם
  chosen: with them
  alternatives:
  - at them
  - against them
  lexicon: HALOT
  rationale: Although literally 'upon/against them,' English idiom with 'angry' normally
    takes 'with.' This is an optimal-equivalence adjustment for readability.
