id: EXO.16.27
reference: Exodus 16:27
source:
  edition: WLC
  text: וַֽ/יְהִי֙ בַּ/יּ֣וֹם הַ/שְּׁבִיעִ֔י יָצְא֥וּ מִן הָ/עָ֖ם לִ/לְקֹ֑ט וְ/לֹ֖א
    מָצָֽאוּ־׃ס
translation:
  text: And it happened on the seventh day that some of the people went out to gather,
    but they found nothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from the people,'' meaning that only part of the people went
      out.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came about
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing the next event in sequence. 'And
    it happened' preserves the Hebrew narrative flow without sounding overly archaic.
- source_word: בַּיּוֹם הַשְּׁבִיעִי
  chosen: on the seventh day
  alternatives:
  - on the seventh day of the week
  lexicon: HALOT
  rationale: Straightforward temporal phrase. The Hebrew specifies 'the seventh day'
    without adding 'of the week,' so the translation keeps the wording concise and
    close to the source.
- source_word: יָצְאוּ
  chosen: went out
  alternatives:
  - came out
  - went forth
  lexicon: HALOT
  rationale: Common sense of יצא in movement away from camp or dwelling. 'Went out'
    is the most natural modern English rendering here.
- source_word: מִן הָעָם
  chosen: some of the people
  alternatives:
  - from the people
  - out of the people
  lexicon: HALOT
  rationale: The preposition מן with 'the people' indicates that only a portion of
    the people acted, not the whole community. English idiom requires an explicit
    partitive sense, best rendered 'some of the people.'
- source_word: לִלְקֹט
  chosen: to gather
  alternatives:
  - to gather manna
  - to pick up
  lexicon: HALOT
  rationale: The infinitive of לקט means to gather or glean. 'To gather' is sufficiently
    specific in context, since the object (manna) is understood from the preceding
    passage and need not be supplied in translation.
- source_word: וְלֹא מָצָאוּ
  chosen: but they found nothing
  alternatives:
  - and they did not find any
  - and they found none
  lexicon: HALOT
  rationale: The Hebrew says literally 'and they did not find.' In English, 'but they
    found nothing' better conveys the adversative sense implied by the failed purpose
    of going out to gather.
