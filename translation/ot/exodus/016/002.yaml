theological_decisions:
- issue: Rendering the corporate designation בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The source is grammatically masculine and refers to the covenant people
    corporately. Per the doctrine's gender-accurate principle, the translation preserves
    the masculine form rather than replacing it with a gender-neutral ethnonym in
    the main text. Readability alternatives are preserved in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over
    gender-neutral)
