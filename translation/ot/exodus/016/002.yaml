id: EXO.16.2
reference: Exodus 16:2
source:
  edition: WLC
  text: ו/ילינו כָּל עֲדַ֧ת בְּנֵי יִשְׂרָאֵ֛ל עַל מֹשֶׁ֥ה וְ/עַֽל אַהֲרֹ֖ן בַּ/מִּדְבָּֽר־־־־׃
translation:
  text: And the whole congregation of the sons of Israel grumbled against Moses and
    against Aaron in the wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or traditionally 'the children of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלּוֹנוּ
  chosen: grumbled
  alternatives:
  - murmured
  - complained
  lexicon: HALOT
  rationale: The verb לון/לין in this stem and context commonly denotes murmuring
    or complaining against leaders. 'Grumbled' is natural modern English and preserves
    the negative, communal protest sense better than the more archaic 'murmured.'
- source_word: כָּל
  chosen: the whole
  alternatives:
  - all
  lexicon: HALOT
  rationale: With the following collective noun, כָּל emphasizes totality. 'The whole'
    reads idiomatically in English with 'congregation.'
- source_word: עֲדַת
  chosen: congregation
  alternatives:
  - assembly
  - community
  lexicon: HALOT
  rationale: עֵדָה often refers to the gathered community of Israel. 'Congregation'
    preserves the corporate sense and is a standard rendering in Pentateuchal narrative,
    while remaining understandable in modern English.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Following the project's gender-accurate principle, the masculine plural
    construct is retained as 'sons of Israel' rather than neutralizing to 'Israelites.'
    'Children of Israel' is traditional but less formally tied to the masculine source
    form.
- source_word: עַל
  chosen: against
  alternatives:
  - to
  - about
  lexicon: HALOT
  rationale: In this complaint context, עַל with persons marks the object of opposition
    or complaint. 'Against' best captures the adversative force in English.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר denotes wilderness land, not necessarily sandy desert. 'Wilderness'
    is the more precise and biblically resonant choice in Exodus.
