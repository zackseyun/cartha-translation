id: EXO.16.18
reference: Exodus 16:18
source:
  edition: WLC
  text: וַ/יָּמֹ֣דּוּ בָ/עֹ֔מֶר וְ/לֹ֤א הֶעְדִּיף֙ הַ/מַּרְבֶּ֔ה וְ/הַ/מַּמְעִ֖יט
    לֹ֣א הֶחְסִ֑יר אִ֥ישׁ לְ/פִֽי אָכְל֖/וֹ לָקָֽטוּ־׃
translation:
  text: When they measured it by the omer, the one who gathered much had nothing left
    over, and the one who gathered little had no lack; each one gathered according
    to what he could eat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the one with much had no excess, and the one with little lacked nothing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמֹדּוּ
  chosen: When they measured
  alternatives:
  - and they measured
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative, but in English the clause
    functions naturally as a temporal setup for the result that follows. 'Measured'
    is the plain sense of מדד.
- source_word: בָעֹמֶר
  chosen: by the omer
  alternatives:
  - with the omer
  - in the omer measure
  lexicon: HALOT
  rationale: עֹמֶר is a dry-measure unit. 'By the omer' communicates measurement according
    to that standard in natural English while preserving the concrete unit rather
    than converting it.
- source_word: הֶעְדִּיף
  chosen: had nothing left over
  alternatives:
  - had no excess
  - did not have too much
  lexicon: HALOT
  rationale: The verb conveys having surplus or excess. In context, after measuring,
    the sense is that the one with much did not end up with surplus. 'Had nothing
    left over' is idiomatic and contextually precise.
- source_word: הַמַּרְבֶּה
  chosen: the one who gathered much
  alternatives:
  - the one with much
  - the one who had much
  lexicon: HALOT
  rationale: Though formally a participle meaning 'the one increasing/multiplying,'
    in this manna-gathering context it refers to the person who gathered much. Supplying
    'gathered' makes the implied action explicit from the context and parallel with
    the closing verb.
- source_word: הֶחְסִיר
  chosen: had no lack
  alternatives:
  - lacked nothing
  - did not have too little
  lexicon: HALOT
  rationale: The verb means to lack or be deficient. 'Had no lack' preserves the balance
    with 'had nothing left over' and mirrors the Hebrew's concise contrast.
- source_word: הַמַּמְעִיט
  chosen: the one who gathered little
  alternatives:
  - the one with little
  - the one who had little
  lexicon: HALOT
  rationale: As with הַמַּרְבֶּה, the participle is contextualized by the manna collection
    narrative. 'Gathered little' makes the implied action explicit and keeps the parallelism.
- source_word: אִישׁ
  chosen: each one
  alternatives:
  - each man
  - everyone
  lexicon: HALOT
  rationale: Although אִישׁ is grammatically masculine singular, here it distributively
    refers to each individual in the group. 'Each one' preserves the distributive
    force without implying adult males only. This fits the doctrine's gender-accurate
    principle because the intent is representative, not male-exclusive.
- source_word: לְפִי אָכְלוֹ
  chosen: according to what he could eat
  alternatives:
  - according to his eating
  - according to his appetite
  - in proportion to what he ate
  lexicon: HALOT
  rationale: Literally 'according to the mouth of his eating,' an idiom for amount
    needed for consumption. 'According to what he could eat' is clear modern English
    and fits the context of gathering enough for need.
- source_word: לָקָטוּ
  chosen: gathered
  alternatives:
  - collected
  lexicon: HALOT
  rationale: This is the standard verb used in the manna narrative for gathering.
    'Gathered' is the most direct and consistent rendering.
