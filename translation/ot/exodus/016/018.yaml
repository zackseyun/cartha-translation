theological_decisions:
- issue: Gendered distributive singular in אִישׁ ... אָכְלוֹ
  chosen_reading: Render distributively as 'each one ... what he could eat'
  alternative_readings:
  - each man ... according to his eating
  - everyone ... according to what they could eat
  rationale: The Hebrew uses masculine singular forms distributively. The main text
    preserves the singular structure with 'each one' and retains 'he' for agreement
    with the singular idiom, while avoiding a male-exclusive reading for אִישׁ in
    this context. This follows the doctrine's gender-accurate-over-gender-neutral
    principle.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
