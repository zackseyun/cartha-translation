id: EXO.16.23
reference: Exodus 16:23
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֲלֵ/הֶ֗ם ה֚וּא אֲשֶׁ֣ר דִּבֶּ֣ר יְהוָ֔ה שַׁבָּת֧וֹן שַׁבַּת קֹ֛דֶשׁ
    לַֽ/יהוָ֖ה מָחָ֑ר אֵ֣ת אֲשֶׁר תֹּאפ֞וּ אֵפ֗וּ וְ/אֵ֤ת אֲשֶֽׁר תְּבַשְּׁלוּ֙ בַּשֵּׁ֔לוּ
    וְ/אֵת֙ כָּל הָ֣/עֹדֵ֔ף הַנִּ֧יחוּ לָ/כֶ֛ם לְ/מִשְׁמֶ֖רֶת עַד הַ/בֹּֽקֶר־־־־־׃
translation:
  text: 'And he said to them, “This is what the LORD has spoken: Tomorrow is a solemn
    rest, a holy Sabbath to the LORD. What you will bake, bake; and what you will
    boil, boil; and all that is left over, set aside for yourselves to be kept until
    the morning.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a Sabbath holy to the LORD.”
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew repeats the verbs for emphasis: “what you will bake, bake; and what
      you will boil, boil.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֲלֵהֶם
  chosen: And he said to them
  alternatives:
  - Then he said to them
  - And he told them
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing direct speech; 'said' preserves
    the straightforward discourse function without unnecessary expansion.
- source_word: הוּא אֲשֶׁר דִּבֶּר יְהוָה
  chosen: This is what the LORD has spoken
  alternatives:
  - This is what the LORD said
  - This is what the LORD has said
  lexicon: HALOT
  rationale: 'The construction points back to the matter at hand: ''this is what ...''.
    ''Has spoken'' reflects the completed divine utterance with present relevance.
    YHWH is rendered ''the LORD'' per doctrine.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrine table for the divine name, following established
    English convention and reverential substitution.
- source_word: שַׁבָּתוֹן
  chosen: a solemn rest
  alternatives:
  - a sabbath observance
  - complete rest
  - rest
  lexicon: HALOT
  rationale: The noun denotes a special cessation/rest, often intensified. 'Solemn
    rest' preserves the marked, cultically significant character without flattening
    it to ordinary rest.
- source_word: שַׁבַּת קֹדֶשׁ לַיהוָה
  chosen: a holy Sabbath to the LORD
  alternatives:
  - a Sabbath holy to the LORD
  - a sacred Sabbath for the LORD
  lexicon: HALOT
  rationale: The appositional phrase further defines the day. 'Holy Sabbath to the
    LORD' keeps both consecration and covenantal orientation explicit.
- source_word: מָחָר
  chosen: Tomorrow is
  alternatives:
  - Tomorrow will be
  - Tomorrow
  lexicon: HALOT
  rationale: In English, supplying 'is' yields a natural clause after the verbless
    Hebrew phrase while preserving the temporal emphasis.
- source_word: אֵת אֲשֶׁר תֹּאפוּ אֵפוּ
  chosen: What you will bake, bake
  alternatives:
  - Bake what you want to bake
  - What you are going to bake, bake
  lexicon: HALOT
  rationale: The Hebrew uses an object marker plus relative clause followed by an
    imperative/volitive repetition for emphasis. This rendering preserves the emphatic
    parallelism without over-paraphrasing.
- source_word: וְאֵת אֲשֶׁר תְּבַשְּׁלוּ בַּשֵּׁלוּ
  chosen: and what you will boil, boil
  alternatives:
  - and what you will cook, cook
  - and boil what you want to boil
  lexicon: HALOT
  rationale: בשל can mean boil/cook, but 'boil' is more concrete and matches the likely
    food-preparation sense here. The repeated verb is retained for rhetorical symmetry
    with 'bake, bake.'
- source_word: כָּל הָעֹדֵף
  chosen: all that is left over
  alternatives:
  - all the surplus
  - everything remaining
  lexicon: HALOT
  rationale: The participial form denotes what remains in excess after preparation.
    'Left over' is idiomatic modern English and fits the manna context.
- source_word: הַנִּיחוּ לָכֶם
  chosen: set aside for yourselves
  alternatives:
  - leave for yourselves
  - put aside for yourselves
  lexicon: HALOT
  rationale: The hiphil of נוח here means to lay aside/place down. 'Set aside' communicates
    intentional reservation; 'for yourselves' preserves לָכֶם.
- source_word: לְמִשְׁמֶרֶת
  chosen: to be kept
  alternatives:
  - for keeping
  - for preservation
  - as a kept portion
  lexicon: HALOT
  rationale: The noun indicates keeping/guarding/preservation. 'To be kept' is natural
    in English and conveys purpose without awkward nominalization.
- source_word: עַד הַבֹּקֶר
  chosen: until the morning
  alternatives:
  - until morning
  - until the next morning
  lexicon: HALOT
  rationale: The phrase marks the duration of storage. Including the article in English
    as 'the morning' is idiomatic and slightly more formal, fitting the context.
