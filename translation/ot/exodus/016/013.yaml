id: EXO.16.13
reference: Exodus 16:13
source:
  edition: WLC
  text: וַ/יְהִ֣י בָ/עֶ֔רֶב וַ/תַּ֣עַל הַ/שְּׂלָ֔ו וַ/תְּכַ֖ס אֶת הַֽ/מַּחֲנֶ֑ה וּ/בַ/בֹּ֗קֶר
    הָֽיְתָה֙ שִׁכְבַ֣ת הַ/טַּ֔ל סָבִ֖יב לַֽ/מַּחֲנֶֽה־׃
translation:
  text: And in the evening the quail came up and covered the camp, and in the morning
    a layer of dew was around the camp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there was a layer of dew around the camp.' The Hebrew construction may
      be rendered either with 'was' following the subject or with existential 'there
      was.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי בָעֶרֶב
  chosen: And in the evening
  alternatives:
  - And it happened in the evening
  - That evening
  lexicon: HALOT
  rationale: The waw-consecutive with היה introduces the next event in narrative sequence.
    In English, the idiomatic narrative rendering is simply 'And in the evening' rather
    than the more wooden 'and it happened in the evening.'
- source_word: וַתַּעַל
  chosen: came up
  alternatives:
  - went up
  - appeared
  lexicon: HALOT
  rationale: עלה literally means 'go up/come up.' With quail as the subject, 'came
    up' preserves the Hebrew image and works naturally in English narrative. 'Appeared'
    is smoother but less literal.
- source_word: הַשְּׂלָו
  chosen: the quail
  alternatives:
  - quail
  lexicon: HALOT
  rationale: The noun denotes quail. English commonly uses 'quail' as a collective
    noun; retaining the article reflects the Hebrew while remaining natural.
- source_word: וַתְּכַס אֶת־הַמַּחֲנֶה
  chosen: covered the camp
  alternatives:
  - covered over the camp
  - covered the encampment
  lexicon: HALOT
  rationale: כסה means 'cover.' 'Camp' is the most natural rendering of מַחֲנֶה here;
    'encampment' is possible but less readable.
- source_word: וּבַבֹּקֶר
  chosen: and in the morning
  alternatives:
  - by morning
  - the next morning
  lexicon: HALOT
  rationale: The phrase marks the next time reference in sequence. 'And in the morning'
    mirrors the Hebrew structure clearly.
- source_word: הָיְתָה שִׁכְבַת הַטַּל
  chosen: a layer of dew was
  alternatives:
  - there was a layer of dew
  - a deposit of dew was
  - a lying of dew was
  lexicon: HALOT
  rationale: שִׁכְבָה/שִׁכְבַת refers to a layer or lying mass. 'A layer of dew' communicates
    the concrete sense idiomatically in modern English.
- source_word: סָבִיב לַמַּחֲנֶה
  chosen: around the camp
  alternatives:
  - all around the camp
  - surrounding the camp
  lexicon: HALOT
  rationale: סָבִיב with ל expresses surrounding location. 'Around the camp' is concise
    and accurate.
