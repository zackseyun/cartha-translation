id: EXO.16.6
reference: Exodus 16:6
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר מֹשֶׁה֙ וְ/אַהֲרֹ֔ן אֶֽל כָּל בְּנֵ֖י יִשְׂרָאֵ֑ל עֶ֕רֶב וִֽ/ידַעְתֶּ֕ם כִּ֧י יְהוָ֛ה הוֹצִ֥יא אֶתְ/כֶ֖ם מֵ/אֶ֥רֶץ מִצְרָֽיִם־־׃
translation:
  text: Then Moses and Aaron said to all the sons of Israel, “At evening you will know that Yahweh brought you out from the land of Egypt.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to all the Israelites' or the traditional 'to all the children of Israel.' The Hebrew is literally 'to all the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural modern English while preserving sequential force better than a bare 'and' in this context.
- source_word: מֹשֶׁה וְאַהֲרֹן
  chosen: Moses and Aaron
  rationale: Standard transliteration of personal names per project philosophy.
- source_word: אֶל כָּל בְּנֵי יִשְׂרָאֵל
  chosen: to all the sons of Israel
  alternatives:
  - to all the Israelites
  - to all the children of Israel
  lexicon: HALOT
  rationale: בְּנֵי is literally 'sons of.' Because the source is explicitly masculine plural and denotes the covenant people by the established Hebrew expression, 'sons of Israel' preserves the form most closely. 'Israelites' is idiomatic but less transparent to the Hebrew wording; 'children of Israel' is traditional but less precise than the masculine plural.
- source_word: עֶרֶב
  chosen: At evening
  alternatives:
  - In the evening
  - This evening
  lexicon: HALOT
  rationale: The noun here functions adverbially/temporally. 'At evening' is concise and natural, preserving the temporal marker without over-specifying.
- source_word: וִידַעְתֶּם
  chosen: you will know
  alternatives:
  - you shall know
  - you will come to know
  lexicon: HALOT
  rationale: A straightforward future sense fits the context. 'You will know' is readable modern English; 'shall' is archaic in contemporary usage.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the content of what they will know, so 'that' best reflects the clause relationship.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הוֹצִיא
  chosen: brought ... out
  alternatives:
  - has brought ... out
  - caused ... to go out
  lexicon: HALOT
  rationale: 'The Hiphil of יצא commonly means ''bring out.'' English idiom requires the object to be split by the particle: ''brought you out.'' Simple past suits the retrospective reference to the exodus event.'
- source_word: מֵאֶרֶץ מִצְרָיִם
  chosen: from the land of Egypt
  alternatives:
  - out of Egypt
  - from Egypt
  lexicon: HALOT
  rationale: Including 'the land of' reflects אֶרֶץ explicitly and preserves the fuller Hebrew expression.
