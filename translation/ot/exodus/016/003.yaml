theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines specify 'the LORD' as the default rendering
    for the covenant name, following Jewish reverence tradition and the Septuagintal
    pattern. No contextual factor here compels deviation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered covenantal designation בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The source is explicitly masculine plural in a representative covenantal
    expression. Per the gender-accurate policy, the translation preserves the masculine
    form rather than neutralizing it, while alternatives are noted as possible smoother
    English renderings.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
