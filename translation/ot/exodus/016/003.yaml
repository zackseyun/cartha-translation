id: EXO.16.3
reference: Exodus 16:3
source:
  edition: WLC
  text: וַ/יֹּאמְר֨וּ אֲלֵ/הֶ֜ם בְּנֵ֣י יִשְׂרָאֵ֗ל מִֽי יִתֵּ֨ן מוּתֵ֤/נוּ בְ/יַד
    יְהוָה֙ בְּ/אֶ֣רֶץ מִצְרַ֔יִם בְּ/שִׁבְתֵּ֨/נוּ֙ עַל סִ֣יר הַ/בָּשָׂ֔ר בְּ/אָכְלֵ֥/נוּ
    לֶ֖חֶם לָ/שֹׂ֑בַע כִּֽי הוֹצֵאתֶ֤ם אֹתָ֨/נוּ֙ אֶל הַ/מִּדְבָּ֣ר הַ/זֶּ֔ה לְ/הָמִ֛ית
    אֶת כָּל הַ/קָּהָ֥ל הַ/זֶּ֖ה בָּ/רָעָֽב־־־־־־־׃ס
translation:
  text: And the sons of Israel said to them, “If only we had died by the hand of the
    LORD in the land of Egypt, when we sat by the pots of meat, when we ate bread
    to the full. For you have brought us out into this wilderness to kill this whole
    assembly with hunger.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the sons of Israel'; many English versions render this more idiomatically
      as 'the Israelites' or 'the children of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'when we sat by the flesh pots'—a traditional rendering of the Hebrew
      idiom for cooking pots filled with meat.
    reason: lexical_alternative
  - marker: c
    text: The divine name is Hebrew YHWH, rendered here as 'the LORD' in keeping with
      the translation's standard practice; alternatively, 'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: A formally transparent rendering of the Hebrew construct phrase. 'The
    Israelites' is smoother English, but 'sons of Israel' preserves the familial/covenantal
    expression and aligns with the gender-accurate policy where the source is explicitly
    masculine plural with representative force.
- source_word: מִי יִתֵּן
  chosen: If only
  alternatives:
  - Who will give...?
  lexicon: HALOT
  rationale: This idiom expresses a wish rather than a literal question. 'If only'
    best captures the idiomatic force in natural English without over-paraphrasing.
- source_word: מוּתֵנוּ
  chosen: we had died
  alternatives:
  - our dying
  - we died
  lexicon: HALOT
  rationale: 'With the preceding wish idiom, the infinitive/nominal form is best represented
    idiomatically as a past counterfactual wish in English: ''If only we had died.'''
- source_word: בְיַד יְהוָה
  chosen: by the hand of the LORD
  alternatives:
  - by the LORD
  - at the LORD's hand
  lexicon: HALOT
  rationale: Retains the Hebrew idiom 'by the hand of' while remaining intelligible.
    The divine name follows the doctrinal default rendering 'the LORD' for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: 'Required by the contested-terms table: יְהוָה is rendered ''the LORD''
    in the main text.'
- source_word: בְּשִׁבְתֵּנוּ עַל סִיר הַבָּשָׂר
  chosen: when we sat by the pots of meat
  alternatives:
  - when we sat by the flesh pots
  - when we sat over the pot of meat
  lexicon: HALOT
  rationale: The preposition and infinitive construct indicate a temporal clause.
    'Pots of meat' is clear modern English and preserves the concrete image better
    than the archaic traditional 'flesh pots.'
- source_word: בְּאָכְלֵנוּ לֶחֶם לָשֹׂבַע
  chosen: when we ate bread to the full
  alternatives:
  - when we ate bread to satisfaction
  - when we had enough bread to eat
  lexicon: HALOT
  rationale: Preserves the temporal parallelism with the previous clause and reflects
    לָשֹׂבַע as fullness/satiety. 'To the full' is idiomatic and concise.
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the complaint. 'For' preserves the rhetorical
    connection in direct speech.
- source_word: הוֹצֵאתֶם
  chosen: you have brought us out
  alternatives:
  - you brought us out
  lexicon: HALOT
  rationale: The perfect in direct accusation can be rendered as English present perfect
    to convey the completed action with present consequence. Either is possible; this
    choice sounds natural in the complaint context.
- source_word: הַמִּדְבָּר הַזֶּה
  chosen: this wilderness
  alternatives:
  - this desert
  lexicon: HALOT
  rationale: '''Wilderness'' is the standard and contextually appropriate rendering
    for מִדְבָּר in Exodus, preserving the theological-geographical motif of the wilderness
    journey.'
- source_word: לְהָמִית
  chosen: to kill
  alternatives:
  - to cause to die
  - to put to death
  lexicon: HALOT
  rationale: A direct infinitive of purpose/result. 'To kill' is the most straightforward
    modern equivalent.
- source_word: כָּל הַקָּהָל הַזֶּה
  chosen: this whole assembly
  alternatives:
  - all this congregation
  - this entire community
  lexicon: HALOT
  rationale: '''Assembly'' preserves the collective sense of קָהָל without importing
    later ecclesial associations too strongly. Word order reflects natural English
    emphasis.'
- source_word: בָּרָעָב
  chosen: with hunger
  alternatives:
  - by famine
  - with starvation
  lexicon: HALOT
  rationale: In this immediate setting the complaint is about lack of food in the
    wilderness, so 'with hunger' captures the experiential force. 'By famine' is possible
    but sounds more like a formal disaster term than the people's direct complaint.
