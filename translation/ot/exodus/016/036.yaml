id: EXO.16.36
reference: Exodus 16:36
source:
  edition: WLC
  text: וְ/הָ/עֹ֕מֶר עֲשִׂרִ֥ית הָ/אֵיפָ֖ה הֽוּא׃פ
translation:
  text: Now an omer is a tenth of an ephah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: An omer and an ephah are ancient Hebrew dry measures; the verse defines
      the omer as one-tenth of an ephah.
    reason: cultural_note
lexical_decisions:
- source_word: הָעֹמֶר
  chosen: an omer
  alternatives:
  - the omer
  lexicon: HALOT
  rationale: עֹמֶר is a dry-measure unit, best preserved by transliteration rather
    than replaced with an imprecise modern equivalent. Although the Hebrew has the
    article ('the omer'), English idiom in a definitional statement is more natural
    as 'an omer is...' while still conveying the measure as a standard unit.
- source_word: עֲשִׂרִית
  chosen: a tenth
  alternatives:
  - the tenth part
  - one-tenth
  lexicon: HALOT
  rationale: The feminine ordinal/noun here denotes a fractional measure, 'a tenth'
    or 'one-tenth.' 'A tenth' is concise, natural English and accurately expresses
    the quantitative relationship.
- source_word: הָאֵיפָה
  chosen: of an ephah
  alternatives:
  - of the ephah
  lexicon: HALOT
  rationale: אֵיפָה is another dry-measure unit and is best transliterated. As with
    'omer,' English idiom in a measurement equivalence favors the indefinite expression
    'an ephah' rather than the more wooden 'the ephah.'
- source_word: הוּא
  chosen: is
  alternatives:
  - it is
  lexicon: HALOT
  rationale: The pronoun functions as the copular element in this nominal clause.
    In English, the explicit pronoun is normally absorbed into the verb 'is' for a
    smooth definitional sentence.
- source_word: וְ
  chosen: Now
  alternatives:
  - And
  - ''
  lexicon: HALOT
  rationale: The conjunction introduces an explanatory note. 'Now' captures the parenthetical/explanatory
    force more naturally in English than a bare 'And,' though omission would also
    be possible.
