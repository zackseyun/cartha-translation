theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to treat מָן as a proper noun ('manna') in the main text
  chosen_reading: 'Translate the phrase contextually as an interrogative: ''What is it?'''
  alternative_readings:
  - Use 'manna' in the main text
  - Render more literally as 'What is this?'
  rationale: In this verse the expression functions as the people's question and is immediately explained by 'for they did not know what it was.' Using 'manna' in the main text would import the later conventional name too early and obscure the narrative wordplay. The naming connection is worth preserving in a footnote.
