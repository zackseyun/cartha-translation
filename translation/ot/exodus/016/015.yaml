id: EXO.16.15
reference: Exodus 16:15
source:
  edition: WLC
  text: וַ/יִּרְא֣וּ בְנֵֽי יִשְׂרָאֵ֗ל וַ/יֹּ֨אמְר֜וּ אִ֤ישׁ אֶל אָחִי/ו֙ מָ֣ן ה֔וּא כִּ֛י לֹ֥א יָדְע֖וּ מַה ה֑וּא וַ/יֹּ֤אמֶר מֹשֶׁה֙ אֲלֵ/הֶ֔ם ה֣וּא הַ/לֶּ֔חֶם אֲשֶׁ֨ר נָתַ֧ן יְהוָ֛ה לָ/כֶ֖ם לְ/אָכְלָֽה־־־׃
translation:
  text: When the sons of Israel saw it, they said to one another, “What is it?” For they did not know what it was. And Moses said to them, “It is the bread that Yahweh has given you to eat.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'a man to his brother.' This is an idiom meaning they said to one another.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew expression behind 'What is it?' is traditionally connected with the name 'manna.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Rendered more formally as 'the sons of Israel' to reflect the Hebrew construct phrase directly. This preserves the gender-accurate wording of the source per doctrine, while alternatives are viable in smoother English.
- source_word: מָן הוּא
  chosen: What is it?
  alternatives:
  - Manna?
  - It is manna
  - What is this?
  lexicon: HALOT
  rationale: Here מָן is best taken as an interrogative expression in context, reinforced by the following clause 'for they did not know what it was.' The idiomatic English equivalent is 'What is it?' This also explains the later naming tradition of manna without prematurely turning the phrase into a proper noun in the main text.
- source_word: אִישׁ אֶל אָחִיו
  chosen: to one another
  alternatives:
  - each man to his brother
  - a man to his brother
  lexicon: HALOT
  rationale: The Hebrew literally says 'a man to his brother,' an idiom for mutual speech. 'To one another' communicates the sense naturally in modern English without denying the underlying masculine form; the more literal alternative is preserved in a footnote.
- source_word: לֹא יָדְעוּ מַה הוּא
  chosen: they did not know what it was
  alternatives:
  - they did not know what it was for
  - they did not know what this was
  lexicon: HALOT
  rationale: A straightforward rendering of the explanatory clause. 'What it was' is the most natural English equivalent and matches the narrative explanation of their question.
- source_word: הוּא הַלֶּחֶם
  chosen: It is the bread
  alternatives:
  - This is the bread
  - That is the bread
  lexicon: HALOT
  rationale: The pronoun plus noun identifies the substance. 'It is the bread' fits the immediate referent and reads naturally in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְאָכְלָה
  chosen: to eat
  alternatives:
  - for food
  - for eating
  lexicon: HALOT
  rationale: 'The infinitive/noun construction expresses purpose: God gave the bread for their consumption. ''To eat'' is concise and natural in English while preserving the sense.'
