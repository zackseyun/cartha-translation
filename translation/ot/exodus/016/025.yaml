id: EXO.16.25
reference: Exodus 16:25
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר מֹשֶׁה֙ אִכְלֻ֣/הוּ הַ/יּ֔וֹם כִּֽי שַׁבָּ֥ת הַ/יּ֖וֹם לַ/יהוָ֑ה
    הַ/יּ֕וֹם לֹ֥א תִמְצָאֻ֖/הוּ בַּ/שָּׂדֶֽה־׃
translation:
  text: And Moses said, “Eat it today, because today is a Sabbath to the LORD; today
    you will not find it in the field.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “for the LORD.” The Hebrew preposition can express dedication or belonging:
      “today is a Sabbath to/for the LORD.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces the next narrative action. 'And ... said'
    preserves the Hebrew narrative sequence without overinterpreting discourse flow.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: אִכְלֻהוּ
  chosen: Eat it
  alternatives:
  - Eat this
  - Consume it
  lexicon: HALOT
  rationale: Second masculine plural imperative with 3ms suffix, referring to the
    manna portion gathered previously. 'Eat it' is natural English and preserves the
    direct object suffix.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Used three times in the verse for emphasis. 'Today' is idiomatic modern
    English and preserves the temporal stress when repeated.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: Here כִּי gives the reason for the command to eat the stored manna. 'Because'
    makes the causal force explicit in clear English.
- source_word: שַׁבָּת
  chosen: a Sabbath
  alternatives:
  - Sabbath rest
  - a day of rest
  lexicon: HALOT
  rationale: 'The noun names the day as Sabbath. The anarthrous Hebrew is well represented
    by ''a Sabbath'' in predicate position: ''today is a Sabbath to the LORD.'' ''Sabbath
    rest'' would add nuance from related contexts not explicit in this word alone.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  - belonging to the LORD
  lexicon: HALOT
  rationale: The preposition ל marks relation/dedication. 'To the LORD' is a natural
    rendering here, expressing that the Sabbath is oriented to or dedicated to YHWH.
    Per doctrine, יהוה is rendered 'the LORD.'
- source_word: לֹא תִמְצָאֻהוּ
  chosen: you will not find it
  alternatives:
  - you shall not find it
  lexicon: HALOT
  rationale: 'Imperfect 2mp with negation expresses future expectation in context:
    on this day they will not find manna outside. ''Will not find'' fits the immediate
    instruction and prediction.'
- source_word: בַּשָּׂדֶה
  chosen: in the field
  alternatives:
  - out in the open country
  - in the countryside
  lexicon: HALOT
  rationale: שָׂדֶה commonly means 'field/open country.' 'In the field' is the most
    direct rendering and suits the context of searching outside the camp area for
    manna.
