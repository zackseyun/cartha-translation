id: EXO.16.31
reference: Exodus 16:31
source:
  edition: WLC
  text: וַ/יִּקְרְא֧וּ בֵֽית יִשְׂרָאֵ֛ל אֶת שְׁמ֖/וֹ מָ֑ן וְ/ה֗וּא כְּ/זֶ֤רַע גַּד֙
    לָבָ֔ן וְ/טַעְמ֖/וֹ כְּ/צַפִּיחִ֥ת בִּ/דְבָֽשׁ־־׃
translation:
  text: The house of Israel called its name manna, and it was like white coriander
    seed, and its taste was like wafers with honey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew man; conventionally rendered 'manna' in English.
    reason: lexical_alternative
  - marker: b
    text: Or 'like the seed of coriander, white.'
    reason: lexical_alternative
  - marker: c
    text: Or 'like a wafer with honey' or 'like thin cakes with honey.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרְאוּ
  chosen: called
  alternatives:
  - named
  lexicon: HALOT
  rationale: Qal wayyiqtol of קרא here introduces the naming of the substance. 'Called'
    is the most direct English equivalent; 'named' is possible but slightly more interpretive.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: The house of Israel
  alternatives:
  - the Israelites
  lexicon: HALOT
  rationale: A construct phrase literally meaning 'house of Israel.' Retaining it
    preserves the Hebrew corporate expression while remaining natural English.
- source_word: אֶת־שְׁמוֹ
  chosen: its name
  alternatives:
  - the name of it
  - it
  lexicon: HALOT
  rationale: The suffix refers to the substance being described. 'Its name' preserves
    the explicit Hebrew object of naming better than the more idiomatic but less formal
    'it'.
- source_word: מָן
  chosen: manna
  alternatives:
  - man
  lexicon: HALOT
  rationale: Although the Hebrew form is man, standard English biblical usage is 'manna,'
    which clearly identifies the wilderness food for modern readers. The transliterated
    traditional English form is preferable for comprehension.
- source_word: וְהוּא
  chosen: and it was
  alternatives:
  - now it was
  - and it
  lexicon: HALOT
  rationale: The pronoun resumes the subject and introduces description. Supplying
    'was' is required in idiomatic English and reflects the verbless Hebrew clause.
- source_word: כְּזֶרַע גַּד לָבָן
  chosen: like white coriander seed
  alternatives:
  - like the seed of coriander, white
  - like white gad seed
  lexicon: HALOT
  rationale: זֶרַע is 'seed,' גַּד is commonly identified as coriander, and לָבָן
    modifies the comparison as 'white.' 'White coriander seed' is concise and natural
    while preserving the simile.
- source_word: וְטַעְמוֹ
  chosen: and its taste
  alternatives:
  - and its flavor
  lexicon: HALOT
  rationale: טַעַם denotes taste/flavor. 'Taste' is the more straightforward and common
    rendering in food description.
- source_word: כְּצַפִּיחִת
  chosen: like wafers
  alternatives:
  - like a wafer
  - like cakes
  - like thin cakes
  lexicon: HALOT
  rationale: The noun refers to a thin baked cake or wafer. The plural 'wafers' fits
    idiomatic English in this comparative food description, though singular is possible.
- source_word: בִּדְבָשׁ
  chosen: with honey
  alternatives:
  - in honey
  - made with honey
  - in sweet syrup
  lexicon: HALOT
  rationale: The preposition ב here is best rendered in an associative or ingredient
    sense. 'With honey' is idiomatic and reflects the likely sense of a honey-based
    confection.
