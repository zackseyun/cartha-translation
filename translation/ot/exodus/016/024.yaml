id: EXO.16.24
reference: Exodus 16:24
source:
  edition: WLC
  text: וַ/יַּנִּ֤יחוּ אֹת/וֹ֙ עַד הַ/בֹּ֔קֶר כַּ/אֲשֶׁ֖ר צִוָּ֣ה מֹשֶׁ֑ה וְ/לֹ֣א
    הִבְאִ֔ישׁ וְ/רִמָּ֖ה לֹא הָ֥יְתָה בּֽ/וֹ־־׃
translation:
  text: So they left it until morning, just as Moses had commanded, and it did not
    stink, nor were there any worms in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'maggots.' The Hebrew noun can refer to worm-like decay creatures generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּנִּיחוּ
  chosen: they left
  alternatives:
  - they set aside
  - they placed
  lexicon: HALOT
  rationale: From נוח/הניח in context of storing manna overnight. 'They left' is natural
    modern English and fits the sense of leaving it undisturbed until morning.
- source_word: אֹתוֹ
  chosen: it
  rationale: Refers to the manna portion being kept overnight; singular pronoun is
    preserved.
- source_word: עַד הַבֹּקֶר
  chosen: until morning
  alternatives:
  - until the morning
  lexicon: HALOT
  rationale: Idiomatic temporal expression; English normally omits the article.
- source_word: כַּאֲשֶׁר צִוָּה מֹשֶׁה
  chosen: just as Moses had commanded
  alternatives:
  - as Moses commanded
  lexicon: HALOT
  rationale: Captures comparison plus prior command. Past perfect helps English narrative
    sequence, showing the command preceded the action.
- source_word: הִבְאִישׁ
  chosen: did not stink
  alternatives:
  - did not become foul
  - did not rot
  lexicon: HALOT
  rationale: The verb means to stink or become foul. 'Did not stink' is the most direct
    and vivid rendering, matching the contrast with the previous day's spoiled manna.
- source_word: רִמָּה
  chosen: worms
  alternatives:
  - maggots
  lexicon: HALOT
  rationale: The noun can denote worms or maggots. 'Worms' is broader and traditional;
    'maggots' is possible but more specific than the Hebrew requires.
- source_word: לֹא הָיְתָה בּוֹ
  chosen: nor were there any ... in it
  alternatives:
  - and there was no ... in it
  lexicon: HALOT
  rationale: 'Restructured for natural English coordination after the previous negative
    clause while preserving the existential sense: no worms were present in it.'
