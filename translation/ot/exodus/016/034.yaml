id: EXO.16.34
reference: Exodus 16:34
source:
  edition: WLC
  text: כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֶל מֹשֶׁ֑ה וַ/יַּנִּיחֵ֧/הוּ אַהֲרֹ֛ן לִ/פְנֵ֥י
    הָ/עֵדֻ֖ת לְ/מִשְׁמָֽרֶת־׃
translation:
  text: As the LORD commanded Moses, so Aaron placed it before the testimony for safekeeping.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'placed it before the covenant testimony.' The Hebrew term 'testimony'
      is a technical tabernacle term that can refer more specifically to the covenant
      tablets or what is associated with them.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  chosen: As
  alternatives:
  - Just as
  - According as
  lexicon: HALOT
  rationale: Introduces comparison with the prior command; 'As' is natural modern
    English and preserves the sense of conformity to what was commanded.
- source_word: צִוָּה
  chosen: commanded
  alternatives:
  - ordered
  - instructed
  lexicon: HALOT
  rationale: Standard rendering for צוה in divine-command contexts; 'commanded' best
    preserves the authoritative force.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering of the divine name, preserving
    covenantal reference while matching established English Bible convention.
- source_word: אֶל מֹשֶׁה
  chosen: Moses
  alternatives:
  - to Moses
  lexicon: HALOT
  rationale: The indirect object is naturally expressed in English within 'the LORD
    commanded Moses'; retaining 'to' would be wooden.
- source_word: וַיַּנִּיחֵהוּ
  chosen: placed it
  alternatives:
  - set it down
  - laid it up
  - deposited it
  lexicon: HALOT
  rationale: Refers to Aaron's putting the manna jar in the designated place. 'Placed
    it' is clear and idiomatic; 'laid it up' is possible but less transparent in modern
    English.
- source_word: אַהֲרֹן
  chosen: Aaron
  lexicon: HALOT
  rationale: Standard transliteration of the personal name.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in front of
  - in the presence of
  lexicon: HALOT
  rationale: Common spatial/prepositional sense; 'before' is concise and fits cultic
    context.
- source_word: הָעֵדֻת
  chosen: the testimony
  alternatives:
  - the covenant document
  - the witness
  lexicon: HALOT
  rationale: In Pentateuchal tabernacle language, עֵדוּת commonly refers to the covenant
    testimony, especially the tablets/ark-associated testimony. 'The testimony' preserves
    the established cultic term without over-interpreting.
- source_word: לְמִשְׁמָרֶת
  chosen: for safekeeping
  alternatives:
  - to be kept
  - for keeping
  - as a memorial to be kept
  lexicon: HALOT
  rationale: Conveys purpose/result of preservation in natural English. 'For safekeeping'
    captures the sense of being stored/kept in custody without adding memorial language
    not explicit in this verse.
