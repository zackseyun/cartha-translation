id: EXO.16.10
reference: Exodus 16:10
source:
  edition: WLC
  text: וַ/יְהִ֗י כְּ/דַבֵּ֤ר אַהֲרֹן֙ אֶל כָּל עֲדַ֣ת בְּנֵֽי יִשְׂרָאֵ֔ל וַ/יִּפְנ֖וּ אֶל הַ/מִּדְבָּ֑ר וְ/הִנֵּה֙ כְּב֣וֹד יְהוָ֔ה נִרְאָ֖ה בֶּ/עָנָֽן־־־־׃פ
translation:
  text: And it happened, as Aaron spoke to the whole congregation of the sons of Israel, that they turned toward the wilderness, and behold, the glory of Yahweh appeared in the cloud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the whole congregation of the Israelites.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of Israel'; traditionally 'children of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing the next event. 'And it happened' preserves the Hebrew discourse function without archaic English.
- source_word: כְּדַבֵּר
  chosen: as Aaron spoke
  alternatives:
  - while Aaron was speaking
  - when Aaron spoke
  lexicon: HALOT
  rationale: The prefixed כ with infinitive construct marks contemporaneous time. 'As Aaron spoke' captures the temporal overlap naturally and concisely.
- source_word: כָּל עֲדַת בְּנֵי יִשְׂרָאֵל
  chosen: the whole congregation of the sons of Israel
  alternatives:
  - the whole congregation of the Israelites
  - the whole assembly of the children of Israel
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the gathered community or congregation. 'Sons of Israel' is a more source-transparent rendering of בְּנֵי יִשְׂרָאֵל than 'Israelites,' while remaining understandable. 'Congregation' fits the communal sense better than the more generic 'assembly' here.
- source_word: וַיִּפְנוּ אֶל הַמִּדְבָּר
  chosen: they turned toward the wilderness
  alternatives:
  - they turned to the wilderness
  - they faced the wilderness
  lexicon: HALOT
  rationale: פנה with אֶל indicates turning in the direction of something. 'Toward' is slightly more idiomatic in English than a bare 'to' and avoids over-specifying a fixed stance implied by 'faced.'
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: Deictic particle marking sudden attention to what follows. 'Behold' preserves the rhetorical force and solemnity better than flatter modern substitutes.
- source_word: כְּבוֹד יְהוָה
  chosen: the glory of the LORD
  alternatives:
  - the LORD's glory
  lexicon: HALOT
  rationale: כָּבוֹד here denotes the manifest divine glory or splendor. Per doctrine, יְהוָה is rendered 'the LORD.' The genitive construction is preserved straightforwardly.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: נִרְאָה
  chosen: appeared
  alternatives:
  - was seen
  - became visible
  lexicon: HALOT
  rationale: Niphal of ראה here is best rendered as an intransitive passive/reflexive sense, 'appeared,' which is idiomatic and fits a visible divine manifestation.
- source_word: בֶּעָנָן
  chosen: in the cloud
  alternatives:
  - in a cloud
  - within the cloud
  lexicon: HALOT
  rationale: The prefixed preposition with article points to a definite cloud, likely the known cloud of divine presence in the wilderness narrative. 'In the cloud' preserves that specificity.
