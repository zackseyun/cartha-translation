id: EXO.16.35
reference: Exodus 16:35
source:
  edition: WLC
  text: וּ/בְנֵ֣י יִשְׂרָאֵ֗ל אָֽכְל֤וּ אֶת הַ/מָּן֙ אַרְבָּעִ֣ים שָׁנָ֔ה עַד בֹּאָ֖/ם
    אֶל אֶ֣רֶץ נוֹשָׁ֑בֶת אֶת הַ/מָּן֙ אָֽכְל֔וּ עַד בֹּאָ֕/ם אֶל קְצֵ֖ה אֶ֥רֶץ כְּנָֽעַן־־־־־־׃
translation:
  text: And the sons of Israel ate the manna forty years, until they came to an inhabited
    land; they ate the manna until they came to the border of the land of Canaan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' / 'the children of Israel.' The Hebrew is literally
      'the sons of Israel,' a standard covenantal designation for the people of Israel.
    reason: lexical_alternative
  - marker: b
    text: Or 'a settled land.' The phrase contrasts the wilderness with land fit for
      settled human habitation.
    reason: lexical_alternative
  - marker: c
    text: Or 'the edge of the land of Canaan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי יִשְׂרָאֵל
  chosen: And the sons of Israel
  alternatives:
  - And the Israelites
  - And the children of Israel
  lexicon: HALOT
  rationale: בְּנֵי יִשְׂרָאֵל is the standard covenantal ethnonym literally meaning
    'sons of Israel.' Given the project's gender-accurate policy and the representative
    corporate sense, 'sons of Israel' preserves the Hebrew form more closely than
    'Israelites,' while remaining natural enough in context.
- source_word: אָכְלוּ
  chosen: ate
  alternatives:
  - were eating
  - consumed
  lexicon: HALOT
  rationale: 'Qal perfect 3cp of אכל is straightforward past narrative here: ''ate.''
    English simple past best fits the summary statement.'
- source_word: הַמָּן
  chosen: the manna
  lexicon: HALOT
  rationale: Definite noun with article; 'manna' is the established English form for
    מָן in this context, and the article is naturally retained as 'the manna' in this
    summary statement.
- source_word: אַרְבָּעִים שָׁנָה
  chosen: forty years
  lexicon: HALOT
  rationale: Standard cardinal-plus-noun duration expression; 'forty years' is the
    natural English rendering.
- source_word: עַד בֹּאָם
  chosen: until they came
  alternatives:
  - until their coming
  - until they entered
  lexicon: HALOT
  rationale: עַד with infinitive construct plus pronominal suffix expresses a temporal
    limit. 'Until they came' is a clear and idiomatic rendering; 'entered' is possible
    contextually but slightly more interpretive than the Hebrew verb 'come.'
- source_word: אֶל אֶרֶץ נוֹשָׁבֶת
  chosen: to an inhabited land
  alternatives:
  - to a settled land
  - to a land that was inhabited
  lexicon: HALOT
  rationale: נוֹשָׁבֶת, a Niphal participial form from ישב, denotes a place that is
    inhabited/settled. 'Inhabited land' preserves the passive/resultative sense and
    contrasts with wilderness.
- source_word: עַד בֹּאָם אֶל קְצֵה אֶרֶץ כְּנָעַן
  chosen: until they came to the border of the land of Canaan
  alternatives:
  - until they came to the edge of the land of Canaan
  - until they came to the extremity of the land of Canaan
  lexicon: HALOT
  rationale: קְצֵה means end, edge, extremity, or border. In a geographical context,
    'border' communicates the sense most naturally in English while preserving the
    idea of reaching Canaan's boundary.
