id: EXO.16.19
reference: Exodus 16:19
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר מֹשֶׁ֖ה אֲלֵ/הֶ֑ם אִ֕ישׁ אַל יוֹתֵ֥ר מִמֶּ֖/נּוּ עַד בֹּֽקֶר־־׃
translation:
  text: And Moses said to them, “Let no man leave any of it until morning.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'man' (אִישׁ) is distributive here, meaning each individual; the
      prohibition applies to everyone.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive on אמר advances the narrative. 'And ... said' is
    a natural, sufficiently formal rendering in English narrative style.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: אֲלֵהֶם
  chosen: to them
  alternatives:
  - to the people
  lexicon: HALOT
  rationale: The preposition אֶל with 3mp suffix is directly 'to them.' 'To the people'
    would be interpretive and is unnecessary.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - one
  - person
  lexicon: HALOT
  rationale: Hebrew אִישׁ here has distributive force ('each man' / 'any man'). Per
    the translation philosophy's gender-accurate principle, 'man' preserves the masculine
    representative form better than a neutral substitute, while still functioning
    generically in context.
- source_word: אַל
  chosen: Let no ...
  alternatives:
  - No one shall ... not
  lexicon: HALOT
  rationale: אַל introduces a prohibition/jussive sense. English idiom renders this
    naturally as 'Let no ...' rather than a wooden negative imperative.
- source_word: יוֹתֵר
  chosen: leave any
  alternatives:
  - leave over
  - keep over
  - have left over
  lexicon: HALOT
  rationale: From יתר in this context of manna, the sense is to leave over or keep
    remaining. 'Leave any' is idiomatic English and fits the prohibition against retaining
    manna.
- source_word: מִמֶּנּוּ
  chosen: of it
  alternatives:
  - from it
  - any of it
  lexicon: HALOT
  rationale: The preposition מן with 3ms/collective reference points back to the manna.
    In English, 'of it' is the most natural complement after 'leave any.'
- source_word: עַד בֹּקֶר
  chosen: until morning
  alternatives:
  - until the morning
  - before morning
  lexicon: HALOT
  rationale: 'A straightforward temporal phrase. English commonly omits the article
    here: ''until morning.'''
