theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern. This
    verse contains the name twice, and both instances are rendered consistently.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Causal vs. temporal force of בְּשָׁמְעוֹ
  chosen_reading: because he has heard
  alternative_readings:
  - when he hears
  rationale: The context explains the manifestation of the LORD's glory as a response
    to Israel's grumbling. A causal rendering best preserves the logic of the verse
    without overinterpreting beyond the Hebrew's plausible range. The temporal alternative
    is preserved in a footnote because it remains linguistically possible.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
