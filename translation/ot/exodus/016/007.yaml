id: EXO.16.7
reference: Exodus 16:7
source:
  edition: WLC
  text: וּ/בֹ֗קֶר וּ/רְאִיתֶם֙ אֶת כְּב֣וֹד יְהוָ֔ה בְּ/שָׁמְע֥/וֹ אֶת תְּלֻנֹּתֵי/כֶ֖ם
    עַל יְהוָ֑ה וְ/נַ֣חְנוּ מָ֔ה כִּ֥י תלונו עָלֵֽי/נוּ־־־׃
translation:
  text: And in the morning you will see the glory of the LORD, because he has heard
    your grumblings against the LORD. But what are we, that you grumble against us?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'when he hears your grumblings against the LORD.' The Hebrew construction
      can be read temporally as well as causally.
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/בֹקֶר
  chosen: And in the morning
  alternatives:
  - and morning
  - in the morning
  lexicon: HALOT
  rationale: The conjunction plus noun functions adverbially to mark time. 'And in
    the morning' preserves the sequential flow from the prior verse while reading
    naturally in English.
- source_word: וּ/רְאִיתֶם
  chosen: you will see
  alternatives:
  - and you shall see
  - then you will see
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this context carries future/result
    sense in the instruction/prediction sequence. 'You will see' is natural modern
    English and preserves the force.
- source_word: כְּבוֹד יְהוָה
  chosen: the glory of the LORD
  alternatives:
  - the LORD's glory
  lexicon: HALOT
  rationale: כָּבוֹד here denotes the manifest weighty splendor/presence of YHWH.
    'The glory of the LORD' is the standard transparent rendering and preserves the
    theological resonance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
    This follows the stated translation policy and established English convention.
- source_word: בְּ/שָׁמְע/וֹ
  chosen: because he has heard
  alternatives:
  - when he hears
  - in his hearing
  - as he hears
  lexicon: HALOT
  rationale: 'The preposition ב with infinitive construct of שׁמע can express temporal
    or causal nuance. In this context the clause explains why they will see the LORD''s
    glory: because he has heard their complaints. The perfective English ''has heard''
    fits the Hebrew construction and immediate context.'
- source_word: תְּלֻנֹּתֵיכֶם
  chosen: your grumblings
  alternatives:
  - your complaints
  - your murmurings
  lexicon: HALOT
  rationale: The noun refers to the people's complaining in a discontented, rebellious
    way. 'Grumblings' captures both the repeated nature and negative tone better than
    the more neutral 'complaints'; 'murmurings' is accurate but archaic.
- source_word: עַל יְהוָה
  chosen: against the LORD
  alternatives:
  - about the LORD
  - concerning the LORD
  lexicon: HALOT
  rationale: עַל with this complaint language indicates opposition directed toward
    the LORD, not merely topic. 'Against the LORD' best reflects the force.
- source_word: וְנַחְנוּ מָה
  chosen: But what are we
  alternatives:
  - And what are we
  - What are we
  lexicon: HALOT
  rationale: The phrase is rhetorical and contrasts Moses and Aaron with the LORD,
    emphasizing their insignificance. 'But' brings out the contrast in idiomatic English.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content/result of the rhetorical question:
    ''what are we, that...?'' This is smoother and more precise than a causal ''because''
    in English.'
- source_word: תלונו
  chosen: you grumble
  alternatives:
  - you complain
  - you murmur
  lexicon: HALOT
  rationale: The verb matches the noun earlier in the verse and should be rendered
    consistently. 'Grumble' preserves the pejorative, rebellious nuance and keeps
    lexical cohesion with 'grumblings'.
- source_word: עָלֵינוּ
  chosen: against us
  alternatives:
  - about us
  - at us
  lexicon: HALOT
  rationale: The preposition indicates complaint directed toward Moses and Aaron.
    'Against us' reflects the adversative force and parallels 'against the LORD' earlier
    in the verse.
