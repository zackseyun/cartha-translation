id: EXO.16.28
reference: Exodus 16:28
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר יְהוָ֖ה אֶל מֹשֶׁ֑ה עַד אָ֨נָה֙ מֵֽאַנְתֶּ֔ם לִ/שְׁמֹ֥ר מִצְוֺתַ֖/י
    וְ/תוֹרֹתָֽ/י־־׃
translation:
  text: Then the LORD said to Moses, “How long will you refuse to keep my commandments
    and my laws?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “my instructions.” The Hebrew torot (plural of torah) can denote authoritative
      instruction as well as laws.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive preterite advances the narrative. 'Then ... said'
    gives natural modern English while preserving sequential force; 'And ... said'
    is more formally literal but less idiomatic.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name, render YHWH as 'the LORD' rather
    than transliterating the covenant name.
- source_word: עַד אָנה
  chosen: How long
  alternatives:
  - Until when
  lexicon: HALOT
  rationale: This idiom expresses duration of continued disobedience. 'How long' is
    the standard natural English equivalent.
- source_word: מֵאַנְתֶּם
  chosen: will you refuse
  alternatives:
  - have you refused
  - do you refuse
  lexicon: HALOT
  rationale: The verb means 'refuse, be unwilling.' In direct rebuke following repeated
    violations, English future 'will you refuse' idiomatically conveys the ongoing
    obstinacy implied by the Hebrew in this rhetorical question.
- source_word: לִשְׁמֹר
  chosen: to keep
  alternatives:
  - to observe
  - to guard
  lexicon: HALOT
  rationale: שׁמר with commandments commonly means to keep/observe them. 'Keep' is
    both idiomatic and sufficiently formal; 'guard' is too wooden here.
- source_word: מִצְוֺתַי
  chosen: my commandments
  alternatives:
  - my commands
  lexicon: HALOT
  rationale: The noun denotes commands/commandments. 'Commandments' preserves the
    covenantal and legal register appropriate to divine speech.
- source_word: וְתוֹרֹתָי
  chosen: and my laws
  alternatives:
  - and my instructions
  - and my teachings
  lexicon: HALOT
  rationale: תּוֹרָה fundamentally means instruction, but in parallel with 'my commandments'
    and in this wilderness-law context, 'laws' best conveys the normative force in
    clear English. The broader sense 'instructions' is preserved in a footnote.
