theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH,
    following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering תּוֹרָה in plural construct with divine first-person suffix
  chosen_reading: laws
  alternative_readings:
  - instructions
  - teachings
  rationale: To avoid flattening the legal force of the rebuke, the main text uses
    'laws.' Because תּוֹרָה can also emphasize instruction rather than statute, the
    alternative is preserved in a footnote rather than resolved absolutely.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it; §5 Consistency of key terms, or documented exception
