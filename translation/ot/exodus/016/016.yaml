id: EXO.16.16
reference: Exodus 16:16
source:
  edition: WLC
  text: זֶ֤ה הַ/דָּבָר֙ אֲשֶׁ֣ר צִוָּ֣ה יְהוָ֔ה לִקְט֣וּ מִמֶּ֔/נּוּ אִ֖ישׁ לְ/פִ֣י
    אָכְל֑/וֹ עֹ֣מֶר לַ/גֻּלְגֹּ֗לֶת מִסְפַּר֙ נַפְשֹׁ֣תֵי/כֶ֔ם אִ֛ישׁ לַ/אֲשֶׁ֥ר
    בְּ/אָהֳל֖/וֹ תִּקָּֽחוּ׃
translation:
  text: 'This is the word that the LORD has commanded: ‘Gather from it, each man according
    to his eating; an omer per person, according to the number of your persons. Each
    man shall take for those who are in his tent.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'an omer per head.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדָּבָר
  chosen: the word
  alternatives:
  - the thing
  - the matter
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'thing.' In the formula זֶה הַדָּבָר
    אֲשֶׁר צִוָּה, 'the word' preserves the idiomatic sense of a stated command while
    remaining natural in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name is rendered 'the LORD' rather
    than transliterated.
- source_word: לִקְטוּ
  chosen: Gather
  alternatives:
  - Pick up
  - Collect
  lexicon: HALOT
  rationale: The verb לקט refers to gathering up food items. 'Gather' is clear, natural,
    and suitably broad for the manna context.
- source_word: מִמֶּנּוּ
  chosen: from it
  alternatives:
  - from him
  - some of it
  lexicon: HALOT
  rationale: The pronoun refers to the manna just mentioned in context. English requires
    an impersonal object here; 'from it' is the most direct rendering.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - each person
  lexicon: HALOT
  rationale: The Hebrew uses the masculine singular distributively. Following the
    gender-accurate guideline, 'each man' preserves the form and representative force
    better than a neutral paraphrase.
- source_word: לְפִי אָכְלוֹ
  chosen: according to his eating
  alternatives:
  - according to what he eats
  - as much as he can eat
  lexicon: HALOT
  rationale: Literally 'according to the mouth of his eating,' an idiom for amount
    needed for consumption. 'According to his eating' keeps the formal structure while
    remaining understandable.
- source_word: עֹמֶר
  chosen: an omer
  alternatives:
  - an omer-measure
  lexicon: HALOT
  rationale: This is a specific dry measure and is best transliterated rather than
    approximated with an uncertain modern equivalent.
- source_word: לַגֻּלְגֹּלֶת
  chosen: per person
  alternatives:
  - per head
  - for each skull
  lexicon: HALOT
  rationale: Literally 'per skull/head.' In English, 'per person' communicates the
    counting sense naturally without awkwardness; the more literal 'per head' is preserved
    as an alternative.
- source_word: מִסְפַּר נַפְשֹׁתֵיכֶם
  chosen: according to the number of your persons
  alternatives:
  - according to the number of yourselves
  - according to the number of your people
  lexicon: HALOT
  rationale: נֶפֶשׁ here denotes individual persons/lives rather than an immaterial
    'soul.' 'According to the number of your persons' preserves the counting emphasis
    and avoids misleading theological overtones.
- source_word: לַאֲשֶׁר בְּאָהֳלוֹ
  chosen: for those who are in his tent
  alternatives:
  - for whoever is in his tent
  - for those in his household
  lexicon: HALOT
  rationale: The phrase points to those belonging to or present in each man's tent.
    'For those who are in his tent' stays close to the concrete image without over-interpreting
    it as 'household' alone.
- source_word: תִּקָּחוּ
  chosen: shall take
  alternatives:
  - you shall take
  - are to take
  lexicon: HALOT
  rationale: The 2mp form addresses the community, but in English the distributive
    restatement with 'each man shall take' best reflects the syntax and command force.
