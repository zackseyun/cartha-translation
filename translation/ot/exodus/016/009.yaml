id: EXO.16.9
reference: Exodus 16:9
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר מֹשֶׁה֙ אֶֽל אַהֲרֹ֔ן אֱמֹ֗ר אֶֽל כָּל עֲדַת֙ בְּנֵ֣י יִשְׂרָאֵ֔ל
    קִרְב֖וּ לִ/פְנֵ֣י יְהוָ֑ה כִּ֣י שָׁמַ֔ע אֵ֖ת תְּלֻנֹּתֵי/כֶֽם־־־׃
translation:
  text: Then Moses said to Aaron, “Say to all the congregation of the sons of Israel,
    ‘Come near before the LORD, for he has heard your grumblings.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Draw near before the LORD.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “the sons of Israel”; that is, the people of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence; 'and ... said' is more formally
    possible.
- source_word: אֱמֹר
  chosen: Say
  alternatives:
  - Speak
  lexicon: HALOT
  rationale: Imperative to Aaron introducing reported speech. 'Say' is the most natural
    English equivalent in this direct-command context.
- source_word: כָּל עֲדַת בְּנֵי יִשְׂרָאֵל
  chosen: all the congregation of the sons of Israel
  alternatives:
  - all the congregation of the Israelites
  - the whole community of the children of Israel
  lexicon: HALOT
  rationale: עֵדָה denotes the assembled community/congregation. 'Congregation' preserves
    the corporate, assembly sense. בְּנֵי יִשְׂרָאֵל is rendered more formally as
    'sons of Israel' to reflect the Hebrew expression; 'Israelites' is idiomatic but
    less transparent to the source wording.
- source_word: קִרְבוּ
  chosen: Come near
  alternatives:
  - Draw near
  - Approach
  lexicon: HALOT
  rationale: The imperative of קרב calls for physical approach into the divine presence.
    'Come near' is clear modern English; 'draw near' is a strong formal alternative
    preserved in a footnote because of its recurring cultic resonance.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - into the presence of the LORD
  - before Yahweh
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before/in the presence of.' 'Before the LORD'
    is concise and faithful. Per doctrine, יְהוָה is rendered 'the LORD,' not 'Yahweh'
    in the main text.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: 'This follows the project''s contested-terms policy for the divine name:
    main text ''the LORD,'' with alternatives not adopted in the text.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the summons. 'For' is slightly more formal
    and fits the speech naturally.
- source_word: שָׁמַע
  chosen: he has heard
  alternatives:
  - he heard
  lexicon: HALOT
  rationale: 'The qatal here reports a completed action with present relevance: the
    LORD has already heard their complaint, which grounds the command to approach.
    English present perfect captures that nuance well.'
- source_word: תְּלֻנֹּתֵיכֶם
  chosen: your grumblings
  alternatives:
  - your complaints
  - your murmurings
  lexicon: HALOT
  rationale: The noun refers to the people's complaining in the wilderness, often
    with a rebellious undertone. 'Grumblings' captures both complaint and murmuring
    better than the flatter 'complaints'; 'murmurings' is accurate but less natural
    in contemporary English.
