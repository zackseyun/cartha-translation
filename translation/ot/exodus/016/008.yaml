id: EXO.16.8
reference: Exodus 16:8
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר מֹשֶׁ֗ה בְּ/תֵ֣ת יְהוָה֩ לָ/כֶ֨ם בָּ/עֶ֜רֶב בָּשָׂ֣ר לֶ/אֱכֹ֗ל
    וְ/לֶ֤חֶם בַּ/בֹּ֨קֶר֙ לִ/שְׂבֹּ֔עַ בִּ/שְׁמֹ֤עַ יְהוָה֙ אֶת תְּלֻנֹּ֣תֵי/כֶ֔ם
    אֲשֶׁר אַתֶּ֥ם מַלִּינִ֖ם עָלָ֑י/ו וְ/נַ֣חְנוּ מָ֔ה לֹא עָלֵ֥י/נוּ תְלֻנֹּתֵי/כֶ֖ם
    כִּ֥י עַל יְהוָֽה־־־־׃
translation:
  text: And Moses said, “When the LORD gives you meat to eat in the evening and bread
    in the morning to the full, because the LORD hears your grumblings that you are
    grumbling against him—what are we? Your grumblings are not against us, but against
    the LORD.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''your grumblings ... that you are grumbling.'' The repetition
      of noun and cognate verb intensifies the accusation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּתֵת
  chosen: When ... gives
  alternatives:
  - in giving
  - as ... gives
  lexicon: HALOT
  rationale: The preposition ב with infinitive construct of נתן introduces a temporal
    circumstance here. 'When the LORD gives' is idiomatic English and fits Moses'
    predictive statement better than the more wooden 'in giving.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name is rendered 'the LORD' rather than transliterated.
- source_word: בָּשָׂר
  chosen: meat
  alternatives:
  - flesh
  lexicon: HALOT
  rationale: In this food context, 'meat' communicates the sense naturally in modern
    English; 'flesh' would sound overly literal and awkward.
- source_word: לֶאֱכֹל
  chosen: to eat
  lexicon: HALOT
  rationale: Straightforward infinitive of purpose after 'meat'.
- source_word: לֶחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: The ordinary sense 'bread' is appropriate and preserves the concrete
    imagery of manna as described in the context.
- source_word: לִשְׂבֹּעַ
  chosen: to the full
  alternatives:
  - to satisfaction
  - until you are full
  lexicon: HALOT
  rationale: The infinitive from שבע expresses satiation. 'To the full' is concise,
    natural, and preserves the idea of abundance.
- source_word: בִּשְׁמֹעַ
  chosen: because ... hears
  alternatives:
  - when ... hears
  - in ... hearing
  lexicon: HALOT
  rationale: 'Here the preposition with infinitive gives the reason for the provision
    in the sentence structure: the LORD responds to their complaints. ''Because the
    LORD hears'' best captures the causal force in context.'
- source_word: תְּלֻנֹּתֵיכֶם / מַלִּינִם
  chosen: your grumblings ... you are grumbling
  alternatives:
  - your complaints ... you are complaining
  - your murmurings ... you are murmuring
  lexicon: HALOT
  rationale: The noun and cognate verb emphasize repeated discontent. 'Grumbling'
    is natural modern English and preserves the wilderness-complaint motif better
    than the more formal 'murmuring.'
- source_word: עָלָיו
  chosen: against him
  alternatives:
  - about him
  lexicon: HALOT
  rationale: The preposition על with this verb in context indicates hostile direction,
    not merely topic; 'against him' fits the rebuke.
- source_word: וְנַחְנוּ מָה
  chosen: what are we?
  alternatives:
  - who are we?
  - what are we then?
  lexicon: HALOT
  rationale: The Hebrew uses 'what,' stressing Moses and Aaron's insignificance as
    objects of complaint. 'What are we?' preserves that nuance better than 'who are
    we?'.
- source_word: לֹא עָלֵינוּ תְלֻנֹּתֵיכֶם כִּי עַל יְהוָה
  chosen: Your grumblings are not against us, but against the LORD
  alternatives:
  - for your grumblings are not against us but against the LORD
  lexicon: HALOT
  rationale: English requires an explicit predicate for clarity. 'But' rightly brings
    out the contrast implied by כי here in context.
