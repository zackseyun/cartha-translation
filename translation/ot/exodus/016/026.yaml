theological_decisions:
- issue: Rendering of שַׁבָּת in a pre-Sinai Sabbath context
  chosen_reading: a Sabbath
  alternative_readings:
  - the Sabbath
  - a day of rest
  rationale: The Hebrew lacks the article on שַׁבָּת here and functions appositionally
    with 'the seventh day.' Rendering 'a Sabbath' preserves the lexical form and avoids
    importing a more developed liturgical sense than the text itself states, while
    still recognizing the institution of Sabbath rest in context.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
