id: EXO.16.26
reference: Exodus 16:26
source:
  edition: WLC
  text: שֵׁ֥שֶׁת יָמִ֖ים תִּלְקְטֻ֑/הוּ וּ/בַ/יּ֧וֹם הַ/שְּׁבִיעִ֛י שַׁבָּ֖ת לֹ֥א
    יִֽהְיֶה בּֽ/וֹ־׃
translation:
  text: For six days you shall gather it, but on the seventh day, a Sabbath, there
    will be none on it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and on the seventh day.' The Hebrew conjunction can be rendered simply
      'and,' though the context is contrastive.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the seventh day, Sabbath.'
    reason: lexical_alternative
  - marker: c
    text: That is, no manna will appear on that day.
    reason: cross_reference
lexical_decisions:
- source_word: שֵׁשֶׁת יָמִים
  chosen: For six days
  alternatives:
  - Six days
  lexicon: HALOT
  rationale: The construct phrase literally means 'six of days,' idiomatically 'six
    days.' Rendering with 'For six days' fits the instructional sense in English while
    preserving the temporal duration.
- source_word: תִּלְקְטֻהוּ
  chosen: you shall gather it
  alternatives:
  - you will gather it
  - you are to gather it
  - you shall collect it
  lexicon: HALOT
  rationale: From לקט 'to gather/pick up' with 2mp subject and 3ms object suffix.
    'Gather it' is natural and matches the context of collecting manna. 'Shall' preserves
    the directive/future force.
- source_word: וּבַיּוֹם הַשְּׁבִיעִי
  chosen: but on the seventh day
  alternatives:
  - and on the seventh day
  lexicon: HALOT
  rationale: The conjunction waw can be rendered simply 'and,' but in context it marks
    contrast with the preceding six days. 'But' brings out the adversative sense naturally
    in English.
- source_word: שַׁבָּת
  chosen: a Sabbath
  alternatives:
  - Sabbath
  - a day of rest
  lexicon: HALOT
  rationale: The noun identifies the seventh day as Sabbath. 'A Sabbath' preserves
    the nominal apposition in Hebrew ('the seventh day, Sabbath') without over-paraphrasing.
    'A day of rest' is interpretive and less textually direct.
- source_word: לֹא יִהְיֶה בּוֹ
  chosen: there will be none on it
  alternatives:
  - it will not be in it
  - there will be none in it
  - none will be on it
  lexicon: HALOT
  rationale: The clause literally reads 'it will not be in/on it.' In context the
    implied referent is manna/dew associated with that day. English requires making
    the sense explicit enough; 'there will be none on it' refers to the seventh day,
    i.e., no manna appearing on that day. This avoids adding 'manna' directly while
    conveying the intended meaning.
