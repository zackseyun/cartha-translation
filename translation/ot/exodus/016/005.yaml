id: EXO.16.5
reference: Exodus 16:5
source:
  edition: WLC
  text: וְ/הָיָה֙ בַּ/יּ֣וֹם הַ/שִּׁשִּׁ֔י וְ/הֵכִ֖ינוּ אֵ֣ת אֲשֶׁר יָבִ֑יאוּ וְ/הָיָ֣ה
    מִשְׁנֶ֔ה עַ֥ל אֲשֶֽׁר יִלְקְט֖וּ י֥וֹם יֽוֹם־־׀׃ס
translation:
  text: And on the sixth day, when they prepare what they bring in, it will be double
    what they gather day by day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'it will be a double portion over what they gather each day.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And ... it will be
  alternatives:
  - And it shall be
  - Now it will happen
  lexicon: HALOT
  rationale: The qatal with prefixed waw introduces the future circumstance/result
    in narrative instruction. English renders this naturally with a future-oriented
    clause rather than a wooden 'and it shall be.'
- source_word: בַּיּוֹם הַשִּׁשִּׁי
  chosen: on the sixth day
  alternatives:
  - on the sixth day of the week
  lexicon: HALOT
  rationale: Straightforward temporal phrase. 'Of the week' is not explicit in the
    Hebrew and would over-specify.
- source_word: וְהֵכִינוּ
  chosen: when they prepare
  alternatives:
  - and they shall prepare
  - and they prepare
  lexicon: HALOT
  rationale: The perfect with waw in this instructional context is best represented
    as a temporal circumstance tied to the sixth day. 'When they prepare' gives clear
    English sense while preserving the action.
- source_word: אֵת אֲשֶׁר יָבִיאוּ
  chosen: what they bring in
  alternatives:
  - that which they bring
  - what they bring
  lexicon: HALOT
  rationale: The object marker plus relative clause refers to the material collected
    and brought. 'Bring in' fits the context of gathering manna and returning with
    it.
- source_word: וְהָיָה מִשְׁנֶה
  chosen: it will be double
  alternatives:
  - it will be a double portion
  - it will amount to twice as much
  lexicon: HALOT
  rationale: מִשְׁנֶה denotes a double amount. 'It will be double' is concise and
    closely reflects the Hebrew predicate structure. The fuller 'double portion' is
    possible but slightly interpretive.
- source_word: עַל אֲשֶׁר
  chosen: what
  alternatives:
  - more than what
  - over what
  lexicon: HALOT
  rationale: 'Here עַל with the relative clause expresses comparison/measure: the
    amount is double in relation to what they normally gather. English idiom is best
    served by ''what'' with the comparative sense carried by ''double.'''
- source_word: יִלְקְטוּ
  chosen: they gather
  alternatives:
  - they collect
  lexicon: HALOT
  rationale: לקט in this manna context means gathering up. 'Gather' is the most natural
    and contextually consistent rendering.
- source_word: יוֹם יוֹם
  chosen: day by day
  alternatives:
  - each day
  - daily
  lexicon: HALOT
  rationale: The repetition is distributive/iterative. 'Day by day' preserves the
    Hebrew rhythm and ongoing sense better than the flatter 'daily'.
