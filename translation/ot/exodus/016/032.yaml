id: EXO.16.32
reference: Exodus 16:32
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר מֹשֶׁ֗ה זֶ֤ה הַ/דָּבָר֙ אֲשֶׁ֣ר צִוָּ֣ה יְהוָ֔ה מְלֹ֤א הָ/עֹ֨מֶר֙
    מִמֶּ֔/נּוּ לְ/מִשְׁמֶ֖רֶת לְ/דֹרֹתֵי/כֶ֑ם לְמַ֣עַן יִרְא֣וּ אֶת הַ/לֶּ֗חֶם אֲשֶׁ֨ר
    הֶאֱכַ֤לְתִּי אֶתְ/כֶם֙ בַּ/מִּדְבָּ֔ר בְּ/הוֹצִיאִ֥/י אֶתְ/כֶ֖ם מֵ/אֶ֥רֶץ מִצְרָֽיִם׀־׃
translation:
  text: 'And Moses said, “This is the thing that the LORD has commanded: Let an omerful
    of it be kept throughout your generations, so that they may see the bread with
    which I fed you in the wilderness, when I brought you out from the land of Egypt.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'an omerful'—that is, a full measure of an omer.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר מֹשֶׁה
  chosen: And Moses said
  alternatives:
  - Then Moses said
  - Moses said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing direct speech; 'And Moses said'
    preserves Hebrew narrative flow without sounding overly wooden.
- source_word: זֶה הַדָּבָר
  chosen: This is the thing
  alternatives:
  - This is the word
  - This is what
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'thing.' Here it introduces a specific
    command/instruction. 'Thing' is natural English and preserves the concrete force
    better than the more abstract 'word.'
- source_word: אֲשֶׁר צִוָּה יְהוָה
  chosen: that the LORD has commanded
  alternatives:
  - that the LORD commanded
  - which the LORD commanded
  lexicon: HALOT
  rationale: Uses the covenant name per doctrine as 'the LORD' for יְהוָה. Present
    perfect in English fits a command whose force continues into the present speech
    situation.
- source_word: מְלֹא הָעֹמֶר
  chosen: an omerful
  alternatives:
  - the full amount of an omer
  - an omer full
  lexicon: HALOT
  rationale: מְלֹא denotes fullness/full amount; paired with עֹמֶר it means a full
    omer measure. 'Omerful' is concise and idiomatic enough while preserving the ancient
    unit rather than converting it.
- source_word: מִמֶּנּוּ
  chosen: of it
  alternatives:
  - from it
  - some of it
  lexicon: HALOT
  rationale: Refers to the manna just mentioned in context. 'Of it' is the most natural
    English complement after 'an omerful.'
- source_word: לְמִשְׁמֶרֶת
  chosen: be kept
  alternatives:
  - for keeping
  - for safekeeping
  - for preservation
  lexicon: HALOT
  rationale: The noun means something kept/guarded in custody. Rendering the clause
    verbally in English ('be kept') produces natural syntax while preserving the sense
    of preservation.
- source_word: לְדֹרֹתֵיכֶם
  chosen: throughout your generations
  alternatives:
  - for your generations
  - for generations to come
  lexicon: HALOT
  rationale: A standard idiom for ongoing remembrance across successive generations.
    'Throughout your generations' is both clear and close to the Hebrew.
- source_word: לְמַעַן יִרְאוּ
  chosen: so that they may see
  alternatives:
  - so that your generations may see
  - in order that they may see
  lexicon: HALOT
  rationale: Purpose clause. The implicit subject of 'they' is the future generations
    just mentioned. English can leave that implicit without loss.
- source_word: הַלֶּחֶם
  chosen: the bread
  alternatives:
  - the food
  lexicon: HALOT
  rationale: Although referring to manna, לֶחֶם is literally 'bread/food.' 'Bread'
    preserves the text's wording and theological resonance, especially given the manna
    tradition.
- source_word: אֲשֶׁר הֶאֱכַלְתִּי אֶתְכֶם
  chosen: with which I fed you
  alternatives:
  - that I caused you to eat
  - which I gave you to eat
  lexicon: HALOT
  rationale: Hiphil of אכל is causative, 'cause to eat/feed.' 'Fed you with' is idiomatic
    English and accurately reflects divine provision.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: '''Wilderness'' is the standard rendering for מִדְבָּר in Exodus and
    better captures the biblical setting than the narrower ''desert.'''
- source_word: בְּהוֹצִיאִי אֶתְכֶם
  chosen: when I brought you out
  alternatives:
  - when I was bringing you out
  - in my bringing you out
  lexicon: HALOT
  rationale: Infinitive construct with prefixed ב marks temporal circumstance. 'When
    I brought you out' is the most natural English rendering.
- source_word: מֵאֶרֶץ מִצְרָיִם
  chosen: from the land of Egypt
  alternatives:
  - out of Egypt
  lexicon: HALOT
  rationale: Preserves the full Hebrew expression, including 'land,' which is formulaic
    in Exodus and ties to the exodus motif.
