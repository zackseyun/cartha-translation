theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This also fits the covenantal declaration formula in Exodus.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to preserve the masculine form in בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The translation philosophy calls for gender-accurate rendering over gender-neutral
    smoothing. Since the Hebrew explicitly uses the masculine plural construct 'sons
    of,' the main text preserves that form rather than replacing it with the more
    idiomatic but less transparent 'Israelites.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
