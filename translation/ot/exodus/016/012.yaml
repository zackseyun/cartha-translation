id: EXO.16.12
reference: Exodus 16:12
source:
  edition: WLC
  text: שָׁמַ֗עְתִּי אֶת תְּלוּנֹּת֮ בְּנֵ֣י יִשְׂרָאֵל֒ דַּבֵּ֨ר אֲלֵ/הֶ֜ם לֵ/אמֹ֗ר
    בֵּ֤ין הָֽ/עַרְבַּ֨יִם֙ תֹּאכְל֣וּ בָשָׂ֔ר וּ/בַ/בֹּ֖קֶר תִּשְׂבְּעוּ לָ֑חֶם וִֽ/ידַעְתֶּ֕ם
    כִּ֛י אֲנִ֥י יְהוָ֖ה אֱלֹהֵי/כֶֽם־־׃
translation:
  text: I have heard the grumblings of the sons of Israel. Speak to them, saying,
    ‘At twilight you shall eat meat, and in the morning you shall be filled with bread,
    and you shall know that I am the LORD your God.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''between the evenings,'' an idiom referring to the twilight period.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the Israelites' / 'the children of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַעְתִּי
  chosen: I have heard
  alternatives:
  - I heard
  lexicon: HALOT
  rationale: Perfect first person singular can be rendered as simple past or present
    perfect in English. Present perfect fits the immediate relevance of God's response
    to the people's complaints.
- source_word: תְּלוּנֹּת
  chosen: grumblings
  alternatives:
  - complaints
  - murmurings
  lexicon: HALOT
  rationale: The noun denotes repeated complaining/murmuring in the wilderness context.
    'Grumblings' preserves the iterative, discontented tone better than the more neutral
    'complaints.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Gender-accurate policy favors retaining the masculine plural where the
    Hebrew explicitly says 'sons.' 'Israelites' is smoother but less formally transparent;
    'children of Israel' is traditional but less precise to בְּנֵי here.
- source_word: דַּבֵּר אֲלֵהֶם לֵאמֹר
  chosen: Speak to them, saying
  alternatives:
  - Tell them
  - Speak to them as follows
  lexicon: HALOT
  rationale: This preserves the Hebrew speech-introduction structure without sounding
    overly wooden. 'Saying' reflects לֵאמֹר and keeps the discourse frame explicit.
- source_word: בֵּין הָעַרְבַּיִם
  chosen: At twilight
  alternatives:
  - between the evenings
  - at evening twilight
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'between the evenings' and refers to
    the twilight period. 'At twilight' gives the plain temporal sense in readable
    English, while the more literal alternative is preserved in a footnote.
- source_word: תֹּאכְלוּ בָשָׂר
  chosen: you shall eat meat
  alternatives:
  - you will eat flesh
  lexicon: HALOT
  rationale: בָשָׂר in food context is naturally 'meat' in English, not the more anatomical
    'flesh.' Future-like force of the imperfect is well conveyed by 'shall' in this
    promise context.
- source_word: וּבַבֹּקֶר
  chosen: and in the morning
  alternatives:
  - and by morning
  lexicon: HALOT
  rationale: The prepositional phrase marks the time of the second provision. 'In
    the morning' is the most straightforward rendering.
- source_word: תִּשְׂבְּעוּ לָחֶם
  chosen: you shall be filled with bread
  alternatives:
  - you shall be satisfied with bread
  - you shall have your fill of bread
  lexicon: HALOT
  rationale: The verb means to be sated/satisfied. 'Be filled with bread' preserves
    the concrete imagery and promise of abundance while remaining natural English.
- source_word: וִידַעְתֶּם
  chosen: and you shall know
  alternatives:
  - then you will know
  lexicon: HALOT
  rationale: The conjunction plus perfect with vav here carries forward-result force.
    'And you shall know' keeps the Hebrew coordination while expressing the promised
    recognition.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the Septuagintal pattern.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: Though morphologically plural in form, אֱלֹהִים with singular reference
    to Israel's deity is regularly rendered singular. The covenantal phrase 'the LORD
    your God' is the natural and theologically accurate rendering here.
