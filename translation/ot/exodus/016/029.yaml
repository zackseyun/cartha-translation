id: EXO.16.29
reference: Exodus 16:29
source:
  edition: WLC
  text: רְא֗וּ כִּֽי יְהוָה֮ נָתַ֣ן לָ/כֶ֣ם הַ/שַּׁבָּת֒ עַל כֵּ֠ן ה֣וּא נֹתֵ֥ן לָ/כֶ֛ם
    בַּ/יּ֥וֹם הַ/שִּׁשִּׁ֖י לֶ֣חֶם יוֹמָ֑יִם שְׁב֣וּ אִ֣ישׁ תַּחְתָּ֗י/ו אַל יֵ֥צֵא
    אִ֛ישׁ מִ/מְּקֹמ֖/וֹ בַּ/יּ֥וֹם הַ/שְּׁבִיעִֽי־־׀־׃
translation:
  text: See, because the LORD has given you the Sabbath, therefore on the sixth day
    he gives you bread for two days. Let each man stay in his place; let no man go
    out from his place on the seventh day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'each man' / 'no man'; the masculine form is used distributively
      for each individual in the community.
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאוּ
  chosen: See
  alternatives:
  - Look
  - Understand
  lexicon: HALOT
  rationale: Imperative plural of ראה can call for physical seeing or recognition/understanding.
    'See' preserves the direct force and allows the explanatory clause that follows
    to supply the sense of recognition.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common covenantal English usage.
- source_word: נָתַן לָכֶם הַשַּׁבָּת
  chosen: has given you the Sabbath
  alternatives:
  - has given the Sabbath to you
  - has appointed for you the Sabbath
  lexicon: HALOT
  rationale: The perfect verb with direct object 'the Sabbath' most naturally states
    a completed gift or grant. 'Has given you the Sabbath' is idiomatic and preserves
    the sense that the Sabbath is bestowed for Israel's benefit.
- source_word: הַשַּׁבָּת
  chosen: the Sabbath
  alternatives:
  - the sabbath-rest
  lexicon: HALOT
  rationale: The noun refers to the Sabbath day/institution in this context. 'The
    Sabbath' is the standard and clearest English rendering here.
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - for that reason
  - that is why
  lexicon: HALOT
  rationale: This phrase marks consequence. 'Therefore' keeps the logical connection
    concise and formal enough for the instruction.
- source_word: נֹתֵן
  chosen: he gives
  alternatives:
  - he is giving
  - he gives out
  lexicon: HALOT
  rationale: The participle expresses present or customary action. In context it explains
    the LORD's provision on the sixth day as a standing pattern, well rendered by
    simple present 'he gives.'
- source_word: לֶחֶם יוֹמָיִם
  chosen: bread for two days
  alternatives:
  - two days' bread
  - food for two days
  lexicon: HALOT
  rationale: Literally 'bread of two days.' 'Bread for two days' is natural English
    and preserves the concrete term לֶחֶם rather than broadening it to 'food' without
    necessity.
- source_word: שְׁבוּ אִישׁ תַּחְתָּיו
  chosen: Let each man stay in his place
  alternatives:
  - Remain, each man, where he is
  - Sit, each man, under himself
  lexicon: HALOT
  rationale: ישב here means remain/stay rather than literally sit. תַּחְתָּיו is an
    idiom meaning in one's place/where one is. 'Let each man stay in his place' conveys
    the command clearly while preserving the masculine representative wording.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  - one
  lexicon: HALOT
  rationale: Per doctrine, gender-accurate rendering is preferred. Here אִישׁ is grammatically
    masculine with representative force; 'man' preserves the source form better than
    neutralizing to 'person.'
- source_word: אַל יֵצֵא אִישׁ מִמְּקֹמוֹ
  chosen: let no man go out from his place
  alternatives:
  - let no one leave his place
  - no man is to go out from his place
  lexicon: HALOT
  rationale: The negative jussive gives a prohibition. 'Let no man go out from his
    place' closely reflects the Hebrew syntax and maintains the repeated אִישׁ / מְקוֹם
    language.
- source_word: בַּיּוֹם הַשְּׁבִיעִי
  chosen: on the seventh day
  alternatives:
  - on the seventh day of the week
  lexicon: HALOT
  rationale: The phrase refers specifically to the Sabbath day in sequence. 'On the
    seventh day' is sufficient and matches the Hebrew wording without adding explanatory
    material.
