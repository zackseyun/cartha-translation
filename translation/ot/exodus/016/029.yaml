theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This also aligns with the covenantal context of Exodus.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Representative masculine language with אִישׁ
  chosen_reading: man / each man / no man
  alternative_readings:
  - person
  - anyone
  - each one
  rationale: The source uses grammatically masculine singular אִישׁ in distributive
    commands. Per translation philosophy, gender-accurate rendering is preferred over
    neutralization when the source is masculine with representative force.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
