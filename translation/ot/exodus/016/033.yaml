id: EXO.16.33
reference: Exodus 16:33
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר מֹשֶׁ֜ה אֶֽל אַהֲרֹ֗ן קַ֚ח צִנְצֶ֣נֶת אַחַ֔ת וְ/תֶן שָׁ֥מָּ/ה
    מְלֹֽא הָ/עֹ֖מֶר מָ֑ן וְ/הַנַּ֤ח אֹת/וֹ֙ לִ/פְנֵ֣י יְהוָ֔ה לְ/מִשְׁמֶ֖רֶת לְ/דֹרֹתֵי/כֶֽם־־־׃
translation:
  text: And Moses said to Aaron, “Take one jar, and put there an omerful of manna,
    and place it before the LORD, to be kept throughout your generations.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “pot” for the vessel named here.
    reason: lexical_alternative
lexical_decisions:
- source_word: צִנְצֶנֶת
  chosen: jar
  alternatives:
  - container
  - pot
  lexicon: HALOT
  rationale: The noun denotes a vessel/container. 'Jar' is natural modern English
    and fits a vessel used to hold manna. 'Pot' is traditional, but 'jar' is less
    archaic and avoids implying a cooking vessel.
- source_word: מְלֹא הָעֹמֶר
  chosen: an omerful
  alternatives:
  - the full amount of an omer
  - an omer
  lexicon: HALOT
  rationale: מְלֹא indicates fullness/full amount, modifying עֹמֶר as a dry measure.
    'An omerful' compactly preserves both the measure and the idea of a full quantity.
- source_word: מָן
  chosen: manna
  lexicon: HALOT
  rationale: Standard English transliteration of the substance named in the context;
    clear and established.
- source_word: וְתֶן שָׁמָּה
  chosen: put there
  alternatives:
  - put in it
  - place there
  lexicon: HALOT
  rationale: The adverb שָׁמָּה means 'there.' In context it refers to putting the
    manna into the jar just mentioned. 'Put there' preserves the Hebrew wording while
    remaining intelligible.
- source_word: וְהַנַּח אֹתוֹ
  chosen: place it
  alternatives:
  - set it down
  - lay it
  lexicon: HALOT
  rationale: The verb means to set/place something down. 'Place it' is clear, dignified,
    and fits the ritual context.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי commonly means 'before/in the presence of.' 'Before the LORD'
    is the standard concise rendering. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: לְמִשְׁמֶרֶת
  chosen: to be kept
  alternatives:
  - for keeping
  - for safekeeping
  - as something to be preserved
  lexicon: HALOT
  rationale: 'The noun conveys keeping, custody, or preservation. In this context
    the sense is purpose/result: the manna is to be preserved. ''To be kept'' expresses
    this naturally in English.'
- source_word: לְדֹרֹתֵיכֶם
  chosen: throughout your generations
  alternatives:
  - for your generations
  - for generations to come
  lexicon: HALOT
  rationale: The phrase indicates ongoing duration across successive generations of
    Israel. 'Throughout your generations' is idiomatic and close to the Hebrew.
- source_word: קַח ... אַחַת
  chosen: Take one jar
  alternatives:
  - Take a single jar
  lexicon: HALOT
  rationale: The imperative plus numeral emphasizes a single vessel. 'Take one jar'
    is straightforward and natural.
