id: EXO.16.22
reference: Exodus 16:22
source:
  edition: WLC
  text: וַ/יְהִ֣י בַּ/יּ֣וֹם הַ/שִּׁשִּׁ֗י לָֽקְט֥וּ לֶ֨חֶם֙ מִשְׁנֶ֔ה שְׁנֵ֥י הָ/עֹ֖מֶר
    לָ/אֶחָ֑ד וַ/יָּבֹ֨אוּ֙ כָּל נְשִׂיאֵ֣י הָֽ/עֵדָ֔ה וַ/יַּגִּ֖ידוּ לְ/מֹשֶֽׁה׀־׃
translation:
  text: And it happened on the sixth day that they gathered twice as much bread, two
    omers for each person, and all the leaders of the congregation came and told Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: An omer was a unit of dry measure used in ancient Israel.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new event. 'And it happened'
    preserves the discourse function without archaic phrasing.
- source_word: בַּיּוֹם הַשִּׁשִּׁי
  chosen: on the sixth day
  alternatives:
  - on day six
  lexicon: HALOT
  rationale: Straightforward temporal phrase with article; standard idiomatic English
    is 'on the sixth day.'
- source_word: לָקְטוּ
  chosen: they gathered
  alternatives:
  - they collected
  - they picked up
  lexicon: HALOT
  rationale: לקט in the manna context refers to gathering/collecting the provision.
    'Gathered' is natural and suitably literal.
- source_word: לֶחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: Although the referent is manna, the Hebrew says 'bread.' Retaining 'bread'
    preserves the source wording and echoes the broader manna-as-bread theme.
- source_word: מִשְׁנֶה
  chosen: twice as much
  alternatives:
  - double
  - a double portion
  lexicon: HALOT
  rationale: The noun denotes a double amount. 'Twice as much' reads naturally in
    English and fits the following quantitative apposition.
- source_word: שְׁנֵי הָעֹמֶר
  chosen: two omers
  alternatives:
  - a double measure, two omers
  lexicon: HALOT
  rationale: The text specifies the amount as two omers. 'Omer' is a cultural measure
    best transliterated rather than approximated, since no exact modern equivalent
    is given in the text.
- source_word: לָאֶחָד
  chosen: for each person
  alternatives:
  - for one
  - per person
  - for each one
  lexicon: HALOT
  rationale: 'Literally ''for one,'' but idiomatically distributive: each individual
    received two omers. ''For each person'' makes the distributive sense clear in
    modern English.'
- source_word: כָּל נְשִׂיאֵי הָעֵדָה
  chosen: all the leaders of the congregation
  alternatives:
  - all the chiefs of the community
  - all the rulers of the assembly
  lexicon: HALOT
  rationale: נשיאים are recognized leaders/chiefs; 'leaders' is clear modern English.
    עֵדָה is the gathered covenant community; 'congregation' is a standard rendering
    here.
- source_word: וַיַּגִּידוּ לְמֹשֶׁה
  chosen: came and told Moses
  alternatives:
  - reported it to Moses
  - informed Moses
  lexicon: HALOT
  rationale: 'The sequence of verbs is preserved: they came and then told Moses. ''Told''
    is simple and direct for נגד in this context.'
