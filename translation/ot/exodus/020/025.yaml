id: EXO.20.25
reference: Exodus 20:25
source:
  edition: WLC
  text: וְ/אִם מִזְבַּ֤ח אֲבָנִים֙ תַּֽעֲשֶׂה לִּ֔/י לֹֽא תִבְנֶ֥ה אֶתְ/הֶ֖ן גָּזִ֑ית
    כִּ֧י חַרְבְּ/ךָ֛ הֵנַ֥פְתָּ עָלֶ֖י/הָ וַ/תְּחַֽלְלֶֽ/הָ־־־׃
translation:
  text: And if you make for me an altar of stones, you shall not build them of cut
    stone; for if you wield your sword on it, you will profane it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hewn stone.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your sword'; in context this likely refers to a metal implement
      used on the stones.
    reason: cultural_note
lexical_decisions:
- source_word: וְאִם
  chosen: And if
  alternatives:
  - If
  lexicon: HALOT
  rationale: The conjunction plus conditional particle introduces a conditional case
    linked to the preceding instructions. 'And if' preserves the connective force
    better than a bare 'if'.
- source_word: מִזְבַּח אֲבָנִים
  chosen: an altar of stones
  alternatives:
  - a stone altar
  lexicon: HALOT
  rationale: The construct phrase is most directly rendered 'altar of stones.' 'Stone
    altar' is idiomatic English but slightly less transparent to the Hebrew construction.
- source_word: תַּעֲשֶׂה לִּי
  chosen: you make for me
  alternatives:
  - you make me
  - you make for my sake
  lexicon: HALOT
  rationale: The verb 'make' with ל plus first person suffix is naturally 'make for
    me.' This preserves the dative relation without overinterpreting it.
- source_word: לֹא תִבְנֶה אֶתְהֶן
  chosen: you shall not build them
  alternatives:
  - do not build them
  lexicon: HALOT
  rationale: The imperfect in legal instruction is well represented by English 'you
    shall not,' matching the covenantal command style of the context.
- source_word: גָּזִית
  chosen: of cut stone
  alternatives:
  - of hewn stone
  - with dressed stones
  lexicon: HALOT
  rationale: גזית refers to worked/hewn stone. 'Cut stone' is clear modern English;
    'hewn stone' is more traditional and is preserved as an alternative.
- source_word: כִּי
  chosen: for if
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the rationale for the prohibition, and the following
    clause is conditional in sense. 'For if' makes the logic explicit in natural English.
- source_word: חַרְבְּךָ
  chosen: your sword
  alternatives:
  - your tool
  lexicon: HALOT
  rationale: The noun normally means 'sword.' In context it likely refers to an iron
    implement used on the stones, but the Hebrew explicitly says 'sword,' so the main
    text retains that wording rather than paraphrasing.
- source_word: הֵנַפְתָּ עָלֶיהָ
  chosen: you wield ... on it
  alternatives:
  - you lift ... upon it
  - you use ... on it
  lexicon: HALOT
  rationale: The hiphil of נוף here conveys applying or brandishing the implement
    over the altar. 'Wield ... on it' is idiomatic and fits the context of tool use
    while preserving the active force.
- source_word: וַתְּחַלְלֶהָ
  chosen: you will profane it
  alternatives:
  - you defile it
  - you make it common
  lexicon: HALOT
  rationale: From חלל in the piel/polel sense of profaning or desecrating what is
    holy. 'Profane' best preserves the holiness contrast in a concise way.
