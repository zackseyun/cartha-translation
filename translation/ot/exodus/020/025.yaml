theological_decisions:
- issue: Nature of the altar's defilement/profanation
  chosen_reading: Human working of the stones with a metal blade renders the altar
    profaned in cultic terms.
  alternative_readings:
  - The concern is primarily avoiding association with weapons/violence.
  - The concern is preserving simplicity and non-ostentation rather than ritual profanation
    per se.
  rationale: The explicit verb חלל is cultic and holiness-oriented, so the translation
    should preserve the notion of profanation rather than reduce it to aesthetics
    or symbolism. At the same time, the wording does not explain the full rationale
    beyond the stated prohibition, so the translation avoids importing a fuller theology
    than the verse itself states.
  doctrine_reference: Translation philosophy §1, §3
