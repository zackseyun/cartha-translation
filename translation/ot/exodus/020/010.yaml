theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Household dependents in Sabbath law
  chosen_reading: Explicitly includes children, slaves, livestock, and the sojourner under the prohibition
  rationale: The translation preserves the full scope of the command without softening the social categories or narrowing the Sabbath obligation to the male householder alone.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 5
