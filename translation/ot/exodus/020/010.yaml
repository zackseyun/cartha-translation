id: EXO.20.10
reference: Exodus 20:10
source:
  edition: WLC
  text: וְ/י֨וֹם֙ הַ/שְּׁבִיעִ֔י שַׁבָּ֖ת לַ/יהוָ֣ה אֱלֹהֶ֑י/ךָ לֹֽ֣א תַעֲשֶׂ֨ה כָל מְלָאכָ֜ה אַתָּ֣ה וּ/בִנְ/ךָֽ֣ וּ/בִתֶּ֗/ךָ עַבְדְּ/ךָ֤ וַ/אֲמָֽתְ/ךָ֙ וּ/בְהֶמְתֶּ֔/ךָ וְ/גֵרְ/ךָ֖ אֲשֶׁ֥ר בִּ/שְׁעָרֶֽי/ךָ־־׀־׃
translation:
  text: but the seventh day is a Sabbath to Yahweh your God; you shall not do any work—you, or your son, or your daughter, your male slave, or your female slave, or your livestock, or the sojourner within your gates.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and the seventh day.' The Hebrew conjunction can be rendered either way; 'but' brings out the contrast with the six days of labor in the previous verse.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your male slave ... your female slave.' Traditional English often has 'servant' or 'maidservant.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the resident foreigner' for 'the sojourner.' Hebrew ger refers to a non-native residing among Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְי֨וֹם הַשְּׁבִיעִי
  chosen: but the seventh day
  alternatives:
  - and the seventh day
  lexicon: HALOT
  rationale: The conjunction ו can be rendered simply 'and,' but in the flow of the command contrasting six days of labor with the seventh, English idiom is better served by 'but.' 'The seventh day' is a direct rendering of the Hebrew phrase.
- source_word: שַׁבָּת
  chosen: a Sabbath
  alternatives:
  - Sabbath
  - a day of rest
  lexicon: HALOT
  rationale: Rendered 'a Sabbath' to preserve the noun rather than paraphrasing it as merely 'rest.' The anarthrous Hebrew predicate functions naturally in English with the indefinite article.
- source_word: לַיהוָה אֱלֹהֶיךָ
  chosen: to the LORD your God
  alternatives:
  - for the LORD your God
  - belonging to the LORD your God
  lexicon: HALOT
  rationale: The lamed marks relation/dedication. 'To the LORD your God' preserves the sense that the day is set apart for YHWH. Per doctrine, יהוה is rendered 'the LORD,' not 'Yahweh.'
- source_word: יהוה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name, preserving Jewish reverence tradition and the long-standing English convention aligned with the LXX pattern.
- source_word: לֹא תַעֲשֶׂה
  chosen: you shall not do
  alternatives:
  - you must not do
  - do not do
  lexicon: HALOT
  rationale: The imperfect with לֹא in legal material is well represented by English 'shall not,' which preserves the command's force in covenantal legislation.
- source_word: כָל מְלָאכָה
  chosen: any work
  alternatives:
  - all work
  - any labor
  lexicon: HALOT
  rationale: The phrase means any kind of occupational/task work. 'Any work' is idiomatic and preserves the comprehensive force of כָל.
- source_word: אַתָּה
  chosen: you
  alternatives:
  - you yourself
  lexicon: HALOT
  rationale: The pronoun is explicit in Hebrew for emphasis, but standard English can carry the force without overtranslating. The following list makes the scope clear.
- source_word: וּבִנְךָ וּבִתֶּךָ
  chosen: or your son, or your daughter
  alternatives:
  - and your son and your daughter
  lexicon: HALOT
  rationale: English legal-style enumeration reads naturally with repeated 'or,' clarifying that each listed member is included under the prohibition.
- source_word: עַבְדְּךָ
  chosen: your male slave
  alternatives:
  - your servant
  - your male servant
  lexicon: HALOT
  rationale: Although עבד can mean servant in some contexts, here the household-status term paired with female slave points to bonded servitude. Per project philosophy, 'slave' is preferred where the bonded nature is salient.
- source_word: וַאֲמָתְךָ
  chosen: your female slave
  alternatives:
  - your maidservant
  - your female servant
  lexicon: HALOT
  rationale: Paired with עבדך, this denotes a female household slave/servant. 'Female slave' preserves the social reality more transparently than the traditional 'maidservant.'
- source_word: וּבְהֶמְתֶּךָ
  chosen: your livestock
  alternatives:
  - your cattle
  - your animals
  lexicon: HALOT
  rationale: בְּהֵמָה here refers collectively to domesticated animals owned by the household. 'Livestock' is accurate and modern without being too narrow.
- source_word: וְגֵרְךָ
  chosen: the sojourner
  alternatives:
  - the resident foreigner
  - the stranger
  - the alien
  lexicon: HALOT
  rationale: גֵר denotes a non-native residing among Israel under its social order. 'Sojourner' preserves the covenantal-legal nuance better than 'stranger,' while avoiding the harsh modern connotations of 'alien.'
- source_word: אֲשֶׁר בִּשְׁעָרֶיךָ
  chosen: within your gates
  alternatives:
  - who is within your gates
  - who is in your towns
  lexicon: HALOT
  rationale: Literally 'who is in your gates.' 'Within your gates' is a clear, fairly formal rendering that preserves the idiom for one's settled domain/community jurisdiction.
