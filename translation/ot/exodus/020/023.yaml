id: EXO.20.23
reference: Exodus 20:23
source:
  edition: WLC
  text: לֹ֥א תַעֲשׂ֖וּ/ן אִתִּ֑/י אֱלֹ֤הֵי כֶ֨סֶף֙ וֵ/אלֹהֵ֣י זָהָ֔ב לֹ֥א תַעֲשׂ֖וּ
    לָ/כֶֽם׃
translation:
  text: You shall not make gods of silver to be with me, nor shall you make for yourselves
    gods of gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with me' or 'beside me.' The Hebrew is literally 'with me'; 'beside
      me' is a common interpretive rendering emphasizing the prohibition of rival
      gods.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַעֲשׂוּן / תַעֲשׂוּ
  chosen: make
  alternatives:
  - fashion
  - make for yourselves
  lexicon: HALOT
  rationale: The verb עשה in this context refers to manufacturing or producing cultic
    objects. 'Make' is the most natural modern English equivalent and preserves the
    prohibition's directness without over-specifying craftsmanship.
- source_word: אִתִּי
  chosen: to be with me
  alternatives:
  - with me
  - beside me
  - alongside me
  lexicon: HALOT
  rationale: The preposition with 1cs suffix literally means 'with me.' Here it modifies
    the making of silver gods in relation to YHWH's worship. 'To be with me' makes
    explicit in English the relational force implied by the Hebrew syntax, while avoiding
    the more interpretive 'beside me.'
- source_word: אֱלֹהֵי כֶסֶף
  chosen: gods of silver
  alternatives:
  - silver gods
  - gods made of silver
  lexicon: HALOT
  rationale: The construct chain is most directly rendered 'gods of silver.' This
    preserves the Hebrew form and keeps the focus on illicit manufactured deities
    rather than merely decorative objects.
- source_word: וֵאלֹהֵי זָהָב
  chosen: nor shall you make for yourselves gods of gold
  alternatives:
  - and gods of gold
  - gold gods
  - gods made of gold
  lexicon: HALOT
  rationale: The conjunction plus repeated prohibition creates a parallel second clause.
    Rendering with 'nor shall you make for yourselves gods of gold' reflects the Hebrew
    repetition and the dative pronoun לָכֶם, which marks these as gods made for the
    people's own use or possession.
- source_word: לָכֶם
  chosen: for yourselves
  alternatives:
  - for you
  - for your own use
  lexicon: HALOT
  rationale: The preposition ל with 2mp suffix is best represented as 'for yourselves'
    in idiomatic English, highlighting personal appropriation of the idols rather
    than a mere indirect object.
- source_word: לֹא ... לֹא
  chosen: You shall not ... nor shall you ...
  alternatives:
  - Do not ... and do not ...
  lexicon: HALOT
  rationale: The repeated negatives frame two coordinated prohibitions. 'You shall
    not ... nor shall you ...' preserves the legal-register force appropriate to covenant
    stipulations in this context.
