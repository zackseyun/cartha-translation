theological_decisions:
- issue: Apparent tension between 'Do not fear' and 'the fear of him' in the same
    verse
  chosen_reading: Preserve both as 'fear' in the main text
  alternative_readings:
  - Render first clause 'Do not be afraid' and second 'reverence for him'
  rationale: The Hebrew intentionally distinguishes forbidden terror from proper covenantal
    fear without changing roots. Preserving the same English root 'fear' maintains
    that tension rather than resolving it interpretively. This aligns with the translation
    philosophy of preserving theological tension where the source text does so.
  doctrine_reference: Translation philosophy §3
- issue: Nature of divine 'testing'
  chosen_reading: Translate נַסּוֹת as 'to test' without importing a moral implication
    of tempting to evil
  alternative_readings:
  - to prove
  - to try
  rationale: The verse presents God's purpose as proving the people so that they will
    not sin. 'Test' accurately conveys this without suggesting enticement to evil
    or adding doctrinal explanation not explicit in the text.
