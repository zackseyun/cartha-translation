id: EXO.20.20
reference: Exodus 20:20
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר מֹשֶׁ֣ה אֶל הָ/עָם֮ אַל תִּירָאוּ֒ כִּ֗י לְ/בַֽ/עֲבוּר֙ נַסּ֣וֹת
    אֶתְ/כֶ֔ם בָּ֖א הָ/אֱלֹהִ֑ים וּ/בַ/עֲב֗וּר תִּהְיֶ֧ה יִרְאָת֛/וֹ עַל פְּנֵי/כֶ֖ם
    לְ/בִלְתִּ֥י תֶחֱטָֽאוּ־־־׃
translation:
  text: And Moses said to the people, “Do not fear, for God has come to test you,
    and so that the fear of him may be before you, so that you may not sin.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not be afraid.' The Hebrew uses the same fear-root later in the verse
      ('the fear of him'), creating a deliberate contrast between panic and proper
      fear of God.
    reason: lexical_alternative
  - marker: b
    text: Or 'reverence for him.' The Hebrew noun can denote fear in the sense of
      reverent awe as well as dread.
    reason: lexical_alternative
  - marker: c
    text: Literally 'upon your faces,' an idiom for something kept before a person
      or continually present to awareness.
    reason: cultural_note
lexical_decisions:
- source_word: אַל תִּירָאוּ
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: The verb ירא can denote fear, dread, or reverence depending on context.
    Here Moses contrasts panic before the theophany with a proper enduring fear of
    God later in the verse. Rendering the prohibition as 'Do not fear' preserves the
    deliberate wordplay/tension with יִרְאָתוֹ ('the fear of him') better than 'Do
    not be afraid,' though that is a natural English alternative.
- source_word: לְבַעֲבוּר
  chosen: for
  alternatives:
  - because
  - for the sake of
  lexicon: HALOT
  rationale: 'In the first clause the prepositional expression introduces purpose:
    God has come ''for'' the purpose of testing them. ''For'' is concise and idiomatic
    in English when followed by an infinitive phrase.'
- source_word: נַסּוֹת
  chosen: to test
  alternatives:
  - to prove
  - to try
  lexicon: HALOT
  rationale: נסה commonly means to test or prove. 'Test' is the clearest modern English
    rendering and avoids archaic tone while preserving the sense of proving or examining.
- source_word: בָּא
  chosen: has come
  alternatives:
  - came
  lexicon: HALOT
  rationale: The qatal after the explanatory כִּי can be rendered as present perfect
    in English to express the present significance of God's arrival in the immediate
    scene. 'Has come' fits the ongoing situation at Sinai.
- source_word: הָאֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: The noun here refers to the God of Israel in a non-divine-name form.
    'God' is the straightforward rendering; the contested-term guidance for YHWH does
    not apply because the tetragrammaton is not used in this verse.
- source_word: וּבַעֲבוּר
  chosen: and so that
  alternatives:
  - and for the purpose that
  - and in order that
  lexicon: HALOT
  rationale: The second occurrence again marks purpose, now introducing a finite clause.
    'And so that' is natural English and clearly signals intended result/purpose.
- source_word: יִרְאָתוֹ
  chosen: the fear of him
  alternatives:
  - his fear
  - fear of him
  - reverence for him
  lexicon: HALOT
  rationale: The noun יִרְאָה can mean fear or reverence. 'The fear of him' preserves
    the lexical connection with 'Do not fear' and leaves intact the theological tension
    between terror and proper reverent fear. 'Reverence for him' is interpretive and
    therefore better preserved as an alternative rather than adopted in the main text.
- source_word: עַל־פְּנֵיכֶם
  chosen: before you
  alternatives:
  - upon your faces
  - before your faces
  lexicon: HALOT
  rationale: Literally 'upon your faces,' an idiom for something set before a person
    or continually present to consciousness. 'Before you' communicates the idiomatic
    sense in readable English without unnecessary literal awkwardness.
- source_word: לְבִלְתִּי תֶחֱטָאוּ
  chosen: so that you may not sin
  alternatives:
  - in order that you not sin
  - so as not to sin
  lexicon: HALOT
  rationale: This construction expresses negative purpose. 'So that you may not sin'
    is clear, natural, and preserves the purposive force.
