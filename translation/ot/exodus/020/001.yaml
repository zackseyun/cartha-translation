id: EXO.20.1
reference: Exodus 20:1
source:
  edition: WLC
  text: וַ/יְדַבֵּ֣ר אֱלֹהִ֔ים אֵ֛ת כָּל הַ/דְּבָרִ֥ים הָ/אֵ֖לֶּה לֵ/אמֹֽר־׃ס
translation:
  text: 'And God spoke all these words, saying:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'said.' The Hebrew verb can be rendered more generally, but 'spoke' better
      matches the wording here and the solemn introduction to the commandments.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: 'The waw-consecutive + דבר introduces narrative sequence: ''And ... spoke.''
    ''Spoke'' better reflects דבר than the more generic ''said,'' especially before
    the direct object ''all these words.'''
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In this context the plural-form noun takes singular verbal agreement
    and clearly refers to the God of Israel; standard English rendering is 'God.'
- source_word: אֵת
  chosen: '[direct object marker, untranslated]'
  lexicon: HALOT
  rationale: Marks 'all these words' as the direct object; it has no natural standalone
    English equivalent and is therefore not represented directly.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: Straightforward quantifier modifying 'these words.' 'All' is the most
    natural and accurate English rendering.
- source_word: הַדְּבָרִים
  chosen: words
  alternatives:
  - things
  - statements
  lexicon: HALOT
  rationale: Though דברים can mean 'matters' or 'things' in some contexts, here it
    introduces the Decalogue and is best rendered 'words,' matching the Hebrew expression
    and preserving the connection to 'the ten words' elsewhere.
- source_word: הָאֵלֶּה
  chosen: these
  alternatives:
  - these here
  lexicon: HALOT
  rationale: Demonstrative specifying the immediately following content; 'these' is
    the natural English equivalent.
- source_word: לֵאמֹר
  chosen: 'saying:'
  alternatives:
  - ':'
  - 'as follows:'
  lexicon: HALOT
  rationale: Standard Hebrew quotative infinitive introducing direct speech. 'Saying:'
    preserves the formal structure while remaining readable in English.
