theological_decisions:
- issue: Rendering of the speaker's identity
  chosen_reading: God
  alternative_readings:
  - the Deity
  rationale: The Hebrew text uses אֱלֹהִים, not the divine name YHWH. Rendering it
    as 'God' preserves the source wording without importing the covenant name where
    it is not present.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    YHWH default applies only where the divine name appears.'
