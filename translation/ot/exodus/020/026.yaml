theological_decisions:
- issue: Reason for prohibiting steps to the altar
  chosen_reading: The text is rendered as a concern for bodily exposure and modesty
    in the sanctuary context, without importing a broader symbolic explanation.
  alternative_readings:
  - The prohibition symbolizes humility before God
  - The concern is specifically exposure due to priestly garments
  rationale: The explicit rationale in the Hebrew is that nakedness not be exposed
    on the altar. The translation should preserve that stated reason and not resolve
    further interpretive symbolism in the main text.
  doctrine_reference: Translation philosophy §1, §3
