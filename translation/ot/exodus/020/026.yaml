id: EXO.20.26
reference: Exodus 20:26
source:
  edition: WLC
  text: וְ/לֹֽא תַעֲלֶ֥ה בְ/מַעֲלֹ֖ת עַֽל מִזְבְּחִ֑/י אֲשֶׁ֛ר לֹֽא תִגָּלֶ֥ה עֶרְוָתְ/ךָ֖
    עָלָֽי/ו־־־׃פ
translation:
  text: And you shall not go up by steps to my altar, so that your nakedness may not
    be exposed on it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "lest your nakedness be uncovered on it."
    reason: lexical_alternative
lexical_decisions:
- source_word: תַעֲלֶה
  chosen: you shall not go up
  alternatives:
  - you shall not ascend
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' 'Go up' is natural modern English
    while preserving the directional sense and the prohibition force with לֹא.
- source_word: בְּמַעֲלֹת
  chosen: by steps
  alternatives:
  - with steps
  - by stairway
  lexicon: HALOT
  rationale: מַעֲלוֹת refers to steps/stairs. 'By steps' best fits the preposition
    ב and the construction 'go up by steps' in idiomatic English.
- source_word: מִזְבְּחִי
  chosen: my altar
  lexicon: HALOT
  rationale: Standard rendering of מִזְבֵּחַ with 1cs suffix; no contextual reason
    to vary.
- source_word: אֲשֶׁר לֹא
  chosen: so that ... not
  alternatives:
  - lest
  - that ... not
  lexicon: HALOT
  rationale: Here אֲשֶׁר introduces the purpose/result clause following the prohibition.
    'So that ... not' communicates the sense clearly in modern English; 'lest' is
    accurate but more archaic.
- source_word: תִּגָּלֶה
  chosen: may not be exposed
  alternatives:
  - be uncovered
  - be revealed
  lexicon: HALOT
  rationale: Niphal of גלה is passive/reflexive, 'be uncovered/exposed.' 'Be exposed'
    is clear and fits the context of bodily exposure.
- source_word: עֶרְוָתְךָ
  chosen: your nakedness
  alternatives:
  - your private parts
  lexicon: HALOT
  rationale: עֶרְוָה commonly denotes nakedness, often with sexual modesty implications.
    'Your nakedness' is the standard and sufficiently direct rendering without over-specifying.
- source_word: עָלָיו
  chosen: on it
  alternatives:
  - upon it
  - over it
  lexicon: HALOT
  rationale: The pronoun refers back to the altar. 'On it' is the most natural English
    rendering in this context, indicating exposure in relation to the altar.
