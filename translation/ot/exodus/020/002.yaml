theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering עֲבָדִים in Israel's Egyptian bondage
  chosen_reading: slaves
  alternative_readings:
  - servants
  rationale: The context is national bondage and forced labor, so the bonded nature of the term is prominent. Following the translation philosophy, 'slave' is used where that salience matters.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms principle for δοῦλος analogous to bonded-status language
