id: EXO.20.2
reference: Exodus 20:2
source:
  edition: WLC
  text: אָֽנֹכִ֖י יְהוָ֣ה אֱלֹהֶ֑י/ךָ אֲשֶׁ֧ר הוֹצֵאתִ֛י/ךָ מֵ/אֶ֥רֶץ מִצְרַ֖יִם מִ/בֵּ֥ית
    עֲבָדִֽים׃
translation:
  text: I am the LORD your God, who brought you out from the land of Egypt, from the
    house of slaves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'from the house of slavery.' The Hebrew is literally
      'from the house of slaves.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew YHWH, traditionally rendered 'the LORD'; alternatively transliterated
      'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: אָֽנֹכִי
  chosen: I am
  alternatives:
  - I
  lexicon: HALOT
  rationale: 'The independent first-person pronoun is emphatic in Hebrew. English
    idiom naturally supplies the copula in this verbless clause: ''I am.'' This preserves
    the solemn self-identification opening the declaration.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established covenantal usage and the Jewish reverence tradition, while
    preserving the sense of the personal divine name.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: Although morphologically plural in form, אֱלֹהִים with singular reference
    and a singular pronominal suffix here clearly denotes Israel's God. 'Your God'
    is the idiomatic and theologically correct singular rendering in context.
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - that
  - which
  lexicon: HALOT
  rationale: The relative particle introduces a clause describing the LORD. 'Who'
    is the most natural English relative for a personal subject.
- source_word: הוֹצֵאתִיךָ
  chosen: brought you out
  alternatives:
  - led you out
  - caused you to go out
  lexicon: HALOT
  rationale: The Hiphil of יצא means 'bring out' or 'cause to go out.' 'Brought you
    out' is the standard, clear English rendering and preserves the exodus motif without
    over-literal awkwardness.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of the land of Egypt
  - from Egypt
  lexicon: HALOT
  rationale: The preposition מן marks source. 'From the land of Egypt' preserves the
    formal geographic expression and matches the Hebrew structure. 'Out of' is possible,
    but 'from' works smoothly with the following repeated 'from' phrase.
- source_word: מִבֵּית עֲבָדִים
  chosen: from the house of slaves
  alternatives:
  - from the house of slavery
  - from a slave house
  - from the house of servants
  lexicon: HALOT
  rationale: Literally, the phrase is 'from the house of slaves.' Because עֲבָדִים
    denotes slaves here and the bonded condition is salient, 'slaves' is preferred
    over 'servants' in line with the translation philosophy. 'House of slavery' is
    a common smoothing, but the Hebrew uses a concrete construct phrase with a plural
    noun; 'house of slaves' preserves that imagery more directly.
