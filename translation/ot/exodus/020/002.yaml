theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, with alternatives preserved where useful. This maintains continuity with
    covenantal usage without transliterating the name in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering עֲבָדִים in Israel's Egyptian bondage
  chosen_reading: slaves
  alternative_readings:
  - servants
  rationale: The context is national bondage and forced labor, so the bonded nature
    of the term is prominent. Following the translation philosophy, 'slave' is used
    where that salience matters.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms principle
    for δοῦλος analogous to bonded-status language
