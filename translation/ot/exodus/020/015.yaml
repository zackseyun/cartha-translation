id: EXO.20.15
reference: Exodus 20:15
source:
  edition: WLC
  text: לֹ֖א תִּגְנֹֽב׃ס
translation:
  text: You shall not steal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more dynamically, 'Do not steal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  chosen: not
  alternatives:
  - shall not
  lexicon: HALOT
  rationale: Standard Hebrew negation. In English the prohibition is naturally expressed
    with auxiliary 'shall' plus 'not' to match the command form.
- source_word: תִּגְנֹב
  chosen: steal
  alternatives:
  - kidnap
  - commit theft
  lexicon: HALOT
  rationale: Qal imperfect 2ms of גנב in a prohibition. The broad and conventional
    sense is 'steal.' While the verb can in some contexts refer specifically to stealing
    persons (kidnapping), nothing in this verse narrows the object, so the general
    prohibition 'steal' best reflects the Hebrew and the Decalogue's concise style.
    English 'You shall not steal' preserves both the legal force and the familiar
    imperative cadence without unnecessary expansion.
