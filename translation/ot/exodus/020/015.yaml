theological_decisions:
- issue: Form of the Decalogue prohibition
  chosen_reading: You shall not steal.
  alternative_readings:
  - Do not steal.
  rationale: The Hebrew uses לֹא + imperfect for a direct prohibition in covenant
    law. 'You shall not' preserves the solemn legal-register force of the Decalogue
    better than the more colloquial 'Do not,' while remaining clear modern English.
    This is a stylistic and discourse-level decision, not a doctrinal one.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
