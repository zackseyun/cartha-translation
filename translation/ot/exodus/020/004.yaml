id: EXO.20.4
reference: Exodus 20:4
source:
  edition: WLC
  text: לֹֽ֣א תַֽעֲשֶׂ֨ה לְ/ךָ֥ פֶ֨סֶל֙ וְ/כָל תְּמוּנָ֔ה אֲשֶׁ֤ר בַּ/שָּׁמַ֨יִם֙
    מִ/מַּ֔עַל וַ/אֲשֶׁ֥ר בָּ/אָ֖רֶץ מִ/תָּ֑חַת וַ/אֲשֶׁ֥ר בַּ/מַּ֖יִם מִ/תַּ֥חַת
    לָ/אָֽרֶץ־־׃
translation:
  text: You shall not make for yourself a carved image, or any likeness of what is
    in the heavens above, or on the earth beneath, or in the waters under the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'graven image.' The Hebrew refers specifically to an image made by carving;
      'idol' is more interpretive.
    reason: lexical_alternative
  - marker: b
    text: Or 'any form' or 'any representation' for 'likeness.'
    reason: lexical_alternative
  - marker: c
    text: 'The verse describes the created realms in ancient cosmological terms: the
      heavens above, the earth beneath, and the waters under the earth.'
    reason: cultural_note
lexical_decisions:
- source_word: תַעֲשֶׂה
  chosen: you shall make
  alternatives:
  - you shall make for yourself
  - you must not make
  lexicon: HALOT
  rationale: Qal imperfect second masculine singular of עשה in a prohibition with
    לֹא is naturally rendered as a direct prohibition in English. 'Shall not make'
    preserves the legal/decalogue force better than a looser imperative.
- source_word: לְךָ
  chosen: for yourself
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The dative pronoun marks personal interest or benefit. 'For yourself'
    is idiomatic and reflects the reflexive sense in context.
- source_word: פֶסֶל
  chosen: a carved image
  alternatives:
  - an idol
  - a graven image
  lexicon: HALOT
  rationale: פֶסֶל denotes an image fashioned by carving. 'Carved image' is more transparent
    to modern readers than archaic 'graven image' and more lexically precise than
    the interpretive 'idol'.
- source_word: וְכָל תְּמוּנָה
  chosen: or any likeness
  alternatives:
  - or any form
  - or any representation
  lexicon: HALOT
  rationale: תְּמוּנָה refers to a form, likeness, or representation. 'Likeness' fits
    the prohibition's scope and echoes established biblical diction without sounding
    archaic.
- source_word: אֲשֶׁר בַּשָּׁמַיִם מִמַּעַל
  chosen: of what is in the heavens above
  alternatives:
  - that is in heaven above
  - of anything that is in the sky above
  lexicon: HALOT
  rationale: The relative clause specifies the referent of 'likeness.' 'The heavens
    above' preserves the plural Hebrew שָׁמַיִם and the cosmological register of the
    command.
- source_word: וַאֲשֶׁר בָּאָרֶץ מִתָּחַת
  chosen: or on the earth beneath
  alternatives:
  - or that is in the earth beneath
  - or on the land below
  lexicon: HALOT
  rationale: Although ב can mean 'in,' English idiom with earth/land here is better
    as 'on the earth.' 'Beneath' preserves the vertical cosmological contrast with
    'above.'
- source_word: וַאֲשֶׁר בַּמַּיִם מִתַּחַת לָאָרֶץ
  chosen: or in the waters under the earth
  alternatives:
  - or that is in the waters beneath the earth
  - or in the waters below the earth
  lexicon: HALOT
  rationale: This phrase completes the three-tier cosmological scope. 'Under the earth'
    is the most natural rendering of מִתַּחַת לָאָרֶץ and preserves the ancient-world
    spatial imagery without overexplaining it.
- source_word: וְ
  chosen: or
  alternatives:
  - and
  lexicon: HALOT
  rationale: The repeated conjunction links prohibited categories in a disjunctive
    list in English. 'Or' communicates the sense more naturally than mechanically
    repeating 'and'.
