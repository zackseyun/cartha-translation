theological_decisions:
- issue: Scope of the prohibition in the second commandment
  chosen_reading: The verse prohibits making cultic images by naming carved images
    and any likeness from the created order, without importing a broader ban on all
    art into the translation itself.
  alternative_readings:
  - A total prohibition on making any visual representation whatsoever
  - A prohibition limited only to making idols for worship, with that limitation supplied
    explicitly in translation
  rationale: The Hebrew text itself states the prohibition on making a carved image
    or likeness and then catalogs the created realms. The following verse supplies
    the worship/bowing context, so this verse should not be expanded to 'idol' or
    narrowed by adding 'for worship' in the main text. This preserves the textual
    tension and lets the immediate context interpret the command.
  doctrine_reference: Preserve theological tension rather than resolve it.
