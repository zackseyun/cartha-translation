theological_decisions:
- issue: Referent and number of אֱלֹהִים
  chosen_reading: Singular 'God'
  alternative_readings:
  - gods (not contextually viable here)
  rationale: The immediate Sinai context and singular verbal form indicate the God
    of Israel, not a plural referent. This is a grammatical-contextual decision, not
    a doctrinal import.
