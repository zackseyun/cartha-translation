id: EXO.20.19
reference: Exodus 20:19
source:
  edition: WLC
  text: וַ/יֹּֽאמְרוּ֙ אֶל מֹשֶׁ֔ה דַּבֵּר אַתָּ֥ה עִמָּ֖/נוּ וְ/נִשְׁמָ֑עָה וְ/אַל
    יְדַבֵּ֥ר עִמָּ֛/נוּ אֱלֹהִ֖ים פֶּן נָמֽוּת־־־־׃
translation:
  text: And they said to Moses, “You speak with us, and we will listen; but let not
    God speak with us, lest we die.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we will hear.' The Hebrew verb can denote hearing in the sense of listening
      attentively or obeying responsively.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: And they said
  alternatives:
  - Then they said
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative with a simple past; 'And they said'
    preserves the Hebrew sequence naturally in English.
- source_word: אֶל מֹשֶׁה
  chosen: to Moses
  lexicon: HALOT
  rationale: Standard directional use of אֶל with the proper name מֹשֶׁה.
- source_word: דַּבֵּר אַתָּה
  chosen: You speak
  alternatives:
  - Speak, you
  lexicon: HALOT
  rationale: 'Imperative plus explicit pronoun gives emphasis: Moses, not God, is
    to be the speaker. English conveys this naturally as ''You speak.'''
- source_word: עִמָּנוּ
  chosen: with us
  alternatives:
  - to us
  lexicon: HALOT
  rationale: The preposition עִם normally means 'with.' In English, 'speak with us'
    is idiomatic and preserves the relational sense better than 'speak to us' here.
- source_word: וְנִשְׁמָעָה
  chosen: and we will listen
  alternatives:
  - and we will hear
  - that we may listen
  lexicon: HALOT
  rationale: Cohortative/volitional nuance following the imperative is well represented
    by a future-like response, 'we will listen.' 'Listen' better conveys responsive
    hearing than bare 'hear.'
- source_word: וְאַל יְדַבֵּר
  chosen: but let not ... speak
  alternatives:
  - and do not let ... speak
  - but may ... not speak
  lexicon: HALOT
  rationale: אַל with the imperfect expresses prohibition/jussive force. 'Let not'
    is concise and suitably weighty in context; 'but' captures the contrast with the
    prior request.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Although morphologically plural in form, the verb is singular and the
    referent is the one God of Israel; singular 'God' is required by context.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - otherwise
  lexicon: HALOT
  rationale: פֶּן introduces feared consequence. 'Lest' is still clear in modern English
    and preserves the solemn brevity of the Hebrew.
- source_word: נָמוּת
  chosen: we die
  alternatives:
  - we may die
  lexicon: HALOT
  rationale: First person plural imperfect after פֶּן expresses feared result. 'We
    die' after 'lest' is idiomatic English; 'we may die' is possible but less direct.
