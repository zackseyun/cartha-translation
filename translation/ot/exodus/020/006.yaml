id: EXO.20.6
reference: Exodus 20:6
source:
  edition: WLC
  text: וְ/עֹ֥שֶׂה חֶ֖סֶד לַ/אֲלָפִ֑ים לְ/אֹהֲבַ֖/י וּ/לְ/שֹׁמְרֵ֥י מִצְוֺתָֽ/י׃ס
translation:
  text: but showing steadfast love to thousands, to those who love me and keep my
    commandments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to a thousand generations' (compare Deuteronomy 5:10); the Hebrew here
      reads simply 'to thousands.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְעֹשֶׂה
  chosen: but showing
  alternatives:
  - and showing
  - and doing
  lexicon: HALOT
  rationale: The participle from עשה continues the contrast with the previous verse's
    judgment statement; English 'but showing' makes the adversative force clear in
    context while preserving the participial sense.
- source_word: חֶסֶד
  chosen: steadfast love
  alternatives:
  - lovingkindness
  - covenant loyalty
  - mercy
  lexicon: HALOT
  rationale: חסד denotes loyal, covenantal love and kindness. 'Steadfast love' is
    established, readable modern English that preserves the term's theological depth
    better than the narrower 'mercy'.
- source_word: לַאֲלָפִים
  chosen: to thousands
  alternatives:
  - to a thousand generations
  - to thousands of generations
  lexicon: HALOT
  rationale: The Hebrew here is simply 'to thousands' with no explicit word for 'generations'
    in this verse. The broader context contrasts limited judgment with expansive mercy;
    'to thousands' preserves the Hebrew wording without importing 'generations' from
    Deuteronomy 5:10 or interpretive tradition.
- source_word: לְאֹהֲבַי
  chosen: to those who love me
  alternatives:
  - to my lovers
  - to those loving me
  lexicon: HALOT
  rationale: The participial form with first-person suffix is best rendered as a relative
    clause in natural English. 'Those who love me' accurately conveys ongoing relational
    loyalty.
- source_word: וּלְשֹׁמְרֵי
  chosen: and keep
  alternatives:
  - and to those who keep
  - and guard
  lexicon: HALOT
  rationale: שׁמר commonly means 'keep, guard, observe.' With commandments as object,
    'keep' is the most idiomatic and semantically appropriate English rendering.
- source_word: מִצְוֺתָי
  chosen: my commandments
  alternatives:
  - my commands
  - my commandments of mine
  lexicon: HALOT
  rationale: מצוה is standardly 'commandment/command.' 'My commandments' preserves
    the covenantal and legal register of the Decalogue context better than the slightly
    flatter 'my commands'.
