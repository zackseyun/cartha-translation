theological_decisions:
- issue: Scope of לַאֲלָפִים
  chosen_reading: to thousands
  alternative_readings:
  - to a thousand generations
  - to thousands of generations
  rationale: The Hebrew text of this verse does not explicitly include 'generations.'
    To avoid importing wording not present in the source, the main text keeps 'to
    thousands.' Because many translations understand an implied generational scope
    from the immediate contrast and parallel passages, that alternative is preserved
    in a footnote.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
