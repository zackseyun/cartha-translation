theological_decisions:
- issue: Scope of the prohibition regarding the divine name
  chosen_reading: A broad prohibition against bearing the LORD's name in a false,
    empty, or worthless way, not limited to casual speech alone.
  alternative_readings:
  - A narrower prohibition against false oaths
  - A narrower prohibition against blasphemous or profane utterance
  rationale: The combination of נשא ('bear/carry') with שֵׁם ('name') and שָׁוְא ('emptiness/falsehood')
    suggests more than merely pronouncing the name improperly. It can include oath-taking,
    false representation, and any empty invocation of the divine name. The translation
    therefore avoids the narrower traditional gloss 'take ... in vain' in the main
    text while preserving that alternative in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Rendering of the divine name YHWH
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Required by the doctrine table for יְהוָה YHWH.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
