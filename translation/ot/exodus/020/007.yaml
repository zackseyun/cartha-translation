id: EXO.20.7
reference: Exodus 20:7
source:
  edition: WLC
  text: לֹ֥א תִשָּׂ֛א אֶת שֵֽׁם יְהוָ֥ה אֱלֹהֶ֖י/ךָ לַ/שָּׁ֑וְא כִּ֣י לֹ֤א יְנַקֶּה֙
    יְהוָ֔ה אֵ֛ת אֲשֶׁר יִשָּׂ֥א אֶת שְׁמ֖/וֹ לַ/שָּֽׁוְא־־־־׃פ
translation:
  text: You shall not bear the name of the LORD your God for emptiness, for the LORD
    will not leave unpunished the one who bears his name for emptiness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Traditional English: ''You shall not take the name of the LORD your God
      in vain.'' The Hebrew is broader, literally ''bear/carry the name ... for emptiness,''
      which can include false oaths, empty invocation, or wrongful representation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִשָּׂא / יִשָּׂא (נשא)
  chosen: bear / bears
  alternatives:
  - take up
  - carry
  - lift up
  - misuse
  lexicon: HALOT
  rationale: The verb נשא literally means 'to lift, carry, bear.' Rendering it as
    'bear' preserves the concrete verbal link between the prohibition and its rationale
    clause ('the one who bears his name'). 'Misuse' is interpretive and narrows the
    sense too quickly to speech acts such as false oaths or profanity, whereas the
    Hebrew can encompass any wrongful carrying of the divine name.
- source_word: שֵׁם
  chosen: name
  lexicon: HALOT
  rationale: Standard rendering. In context it refers not merely to pronunciation
    but to the LORD's revealed identity, reputation, and covenantal claim.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of YHWH is 'the LORD,' following
    Jewish reverence tradition and the Septuagintal pattern.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Direct covenantal address in the second person singular; 'your God' preserves
    the personal and covenantal force.
- source_word: לַשָּׁוְא
  chosen: for emptiness
  alternatives:
  - in vain
  - for falsehood
  - for nothing
  - wrongfully
  lexicon: HALOT
  rationale: שָׁוְא denotes emptiness, vanity, falsehood, or worthlessness. 'For emptiness'
    keeps the semantic breadth and avoids reducing the commandment to a conventional
    idiom that modern readers may hear only as casual profanity. It also matches the
    repeated phrase in both halves of the verse.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the ground for the prohibition. 'For' is concise and natural
    in English legal style.
- source_word: יְנַקֶּה (נקה)
  chosen: will not leave unpunished
  alternatives:
  - will not acquit
  - will not hold guiltless
  - will not clear
  lexicon: HALOT
  rationale: The piel of נקה here means to leave free from guilt or punishment. 'Will
    not leave unpunished' communicates the judicial force clearly in modern English.
    'Will not hold guiltless' is traditional but less idiomatic; 'will not acquit'
    is possible but sounds narrower than the warning intends.
- source_word: אֲשֶׁר
  chosen: the one who
  alternatives:
  - whoever
  - him who
  lexicon: HALOT
  rationale: This relative construction points to any person fitting the description.
    'The one who' is clear, singular, and natural.
- source_word: שְׁמוֹ
  chosen: his name
  lexicon: HALOT
  rationale: Refers back to the LORD's name; the third-person suffix should be preserved
    explicitly.
