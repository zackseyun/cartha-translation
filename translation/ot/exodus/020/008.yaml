id: EXO.20.8
reference: Exodus 20:8
source:
  edition: WLC
  text: זָכ֛וֹר אֶת י֥וֹם הַ/שַּׁבָּ֖ת לְ/קַדְּשֽׁ/וֹ־׃
translation:
  text: Remember the Sabbath day, to keep it holy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to sanctify it' or 'to set it apart as holy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זָכוֹר
  chosen: Remember
  alternatives:
  - Observe
  - Call to mind
  lexicon: HALOT
  rationale: Qal imperative singular of זכר, commanding active remembrance. 'Remember'
    is the most direct and idiomatic rendering in English and preserves the covenantal
    force better than the more interpretive 'observe.'
- source_word: אֶת
  chosen: '[direct object marker, untranslated]'
  lexicon: HALOT
  rationale: Marks the definite direct object in Hebrew and is not represented by
    a separate English word.
- source_word: יוֹם
  chosen: day
  lexicon: HALOT
  rationale: Standard sense of יוֹם as 'day.'
- source_word: הַשַּׁבָּת
  chosen: the Sabbath
  alternatives:
  - the day of cessation
  - the sabbath
  lexicon: HALOT
  rationale: Refers to the specific covenantally recognized Sabbath day. 'Sabbath'
    is the established and accurate English equivalent for שַׁבָּת, preserving both
    lexical meaning and biblical usage.
- source_word: לְקַדְּשׁוֹ
  chosen: to keep it holy
  alternatives:
  - to sanctify it
  - to set it apart as holy
  lexicon: HALOT
  rationale: 'Infinitive construct with 3ms suffix from קדשׁ, expressing purpose/result:
    remembering the Sabbath with a view to treating it as holy. ''Keep it holy'' is
    idiomatic modern English that preserves the sanctifying sense without unnecessary
    archaism; ''sanctify it'' is more formal but less natural.'
