theological_decisions:
- issue: Rendering קדשׁ language in a command about the Sabbath
  chosen_reading: to keep it holy
  alternative_readings:
  - to sanctify it
  - to set it apart as holy
  rationale: The Hebrew denotes making/treating the day as holy or set apart. 'Keep
    it holy' best balances formal accuracy and natural English while preserving the
    theological concept of holiness rather than reducing it to mere ritual observance.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological
    weight in readable modern English.'
