theological_decisions:
- issue: Rendering the prohibition style of the Decalogue
  chosen_reading: You shall not commit adultery.
  alternative_readings:
  - Do not commit adultery.
  rationale: The Hebrew uses לֹא with the imperfect 2ms in covenant-law style. 'You
    shall not' preserves the formal, enduring prohibitive force characteristic of
    the Ten Commandments better than the more colloquial imperative 'Do not,' while
    remaining natural English.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English without flattening gravity.'
- issue: Scope of the masculine singular verb form
  chosen_reading: Generic second-person singular 'you' in English
  alternative_readings:
  - Explicitly male-directed wording
  rationale: Although the Hebrew verb is masculine singular, Decalogue prohibitions
    are conventionally addressed to the covenant member representatively. English
    'you' preserves this without adding gender limitation not required by the command's
    legal function.
  doctrine_reference: 'Translation philosophy: gender-accurate over gender-neutral;
    render with the English form that matches the source''s intent.'
