id: EXO.20.14
reference: Exodus 20:14
source:
  edition: WLC
  text: לֹ֖א תִּנְאָֽף׃ס
translation:
  text: You shall not commit adultery.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לֹא
  chosen: not
  alternatives:
  - shall not
  lexicon: HALOT
  rationale: Standard Hebrew negation. In English the prohibition is naturally expressed
    with the auxiliary construction 'shall not' governing the verb, preserving the
    force of the command.
- source_word: תִּנְאָף
  chosen: commit adultery
  alternatives:
  - adulterate
  - be adulterous
  lexicon: HALOT
  rationale: The verb נאף in the qal denotes committing adultery. 'Commit adultery'
    is the clear, established, and semantically precise English equivalent in a legal-prohibitive
    context such as the Decalogue. The 2ms form is retained in conventional English
    legal style as 'You shall not...' without implying restriction to males only in
    application.
