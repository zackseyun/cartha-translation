id: EXO.20.5
reference: Exodus 20:5
source:
  edition: WLC
  text: לֹֽא תִשְׁתַּחֲוֶ֥ה לָ/הֶ֖ם וְ/לֹ֣א תָעָבְדֵ֑/ם כִּ֣י אָֽנֹכִ֞י יְהוָ֤ה אֱלֹהֶ֨י/ךָ֙
    אֵ֣ל קַנָּ֔א פֹּ֠קֵד עֲוֺ֨ן אָבֹ֧ת עַל בָּנִ֛ים עַל שִׁלֵּשִׁ֥ים וְ/עַל רִבֵּעִ֖ים
    לְ/שֹׂנְאָֽ/י־־־־׃
translation:
  text: You shall not bow down to them or serve them, for I, the LORD your God, am
    a jealous God, visiting the iniquity of fathers on children, on the third and
    on the fourth generations of those who hate me,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prostrate yourself to them'; the Hebrew verb refers to bowing oneself
      down in reverence.
    reason: lexical_alternative
  - marker: b
    text: Or 'worship them'; the verb 'serve' here can refer to cultic service offered
      to idols.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'visiting the iniquity of fathers on children.' This wording preserves
      the Hebrew idiom; compare Deuteronomy 24:16 and Ezekiel 18 for related teaching
      on individual responsibility.
    reason: cross_reference
  - marker: d
    text: Or 'to the third and fourth generation of those who hate me.'
    reason: alternative_reading
lexical_decisions:
- source_word: תִשְׁתַּחֲוֶה
  chosen: bow down
  alternatives:
  - prostrate yourself
  - worship
  lexicon: HALOT
  rationale: The verb denotes the physical act of bowing/prostration before an object
    of reverence. 'Bow down' preserves the concrete action and avoids prematurely
    collapsing it into the broader category 'worship,' especially since the next verb
    covers service/rendered devotion.
- source_word: תָעָבְדֵם
  chosen: serve them
  alternatives:
  - worship them
  - be enslaved to them
  lexicon: HALOT
  rationale: עבד commonly means 'serve.' In idol contexts it can imply cultic service
    or worship, but 'serve' keeps the lexical distinction from the previous verb while
    still conveying religious devotion in context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding covenantal usage.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with second masculine singular suffix; 'your
    God' is the natural English equivalent in covenantal address.
- source_word: אֵל קַנָּא
  chosen: a jealous God
  alternatives:
  - a zealous God
  lexicon: HALOT
  rationale: קַנָּא in covenant context expresses exclusive divine claim and intolerance
    of rival worship. 'Jealous' is the established and most precise English rendering
    here; 'zealous' weakens the relational exclusivity in this commandment context.
- source_word: פֹּקֵד
  chosen: visiting
  alternatives:
  - punishing
  - calling to account
  lexicon: HALOT
  rationale: The participle describes God's active oversight and judicial response.
    'Visiting' preserves the Hebrew idiom without over-specifying the mechanism; stronger
    interpretive renderings like 'punishing' are possible but narrower.
- source_word: עֲוֺן
  chosen: iniquity
  alternatives:
  - guilt
  - sin
  lexicon: HALOT
  rationale: עון can denote iniquity, guilt, or the consequences of guilt. 'Iniquity'
    preserves the moral weight while leaving the semantic breadth intact.
- source_word: אָבֹת
  chosen: fathers
  alternatives:
  - parents
  - ancestors
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural. Per gender-accurate policy,
    'fathers' should be retained rather than neutralized to 'parents,' especially
    in this formulaic covenant warning.
- source_word: בָּנִים
  chosen: children
  alternatives:
  - sons
  lexicon: HALOT
  rationale: Although literally 'sons/children,' in this intergenerational formula
    the broader English 'children' best conveys descendants without implying only
    males.
- source_word: שִׁלֵּשִׁים וְעַל רִבֵּעִים
  chosen: on the third and on the fourth generations
  alternatives:
  - to the third and fourth generation
  - on the third and fourth
  lexicon: HALOT
  rationale: The Hebrew numerals stand elliptically for successive generations. Supplying
    'generations' in English makes the sense explicit and readable. Repeating 'on'
    reflects the Hebrew rhythm and scope.
- source_word: לְשֹׂנְאָי
  chosen: of those who hate me
  alternatives:
  - of my haters
  - for those who hate me
  lexicon: HALOT
  rationale: The phrase most naturally qualifies the preceding warning, limiting it
    to those in the line of people who hate God. 'Of those who hate me' is idiomatic
    and preserves the relational force.
