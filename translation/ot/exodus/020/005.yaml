theological_decisions:
- issue: How to render divine jealousy
  chosen_reading: a jealous God
  alternative_readings:
  - a zealous God
  rationale: The context is covenant exclusivity in the prohibition of idolatry. 'Jealous'
    best preserves the theological tension of God's rightful exclusive claim without
    softening it into mere enthusiasm.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: How to express intergenerational judgment
  chosen_reading: visiting the iniquity of fathers on children, on the third and on
    the fourth generations of those who hate me
  alternative_readings:
  - punishing children for the sins of the fathers to the third and fourth generation
    of those who hate me
  rationale: The Hebrew idiom should be preserved without importing a more resolved
    doctrinal claim than the text itself states. 'Visiting the iniquity' keeps the
    tension and allows canonical interpretation alongside passages such as Deut 24:16
    and Ezek 18.
  doctrine_reference: Translation philosophy §3
