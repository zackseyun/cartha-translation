id: EXO.20.16
reference: Exodus 20:16
source:
  edition: WLC
  text: לֹֽא תַעֲנֶ֥ה בְ/רֵעֲ/ךָ֖ עֵ֥ד שָֽׁקֶר־׃ס
translation:
  text: You shall not bear false witness against your neighbor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "You shall not testify falsely against your neighbor."
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Standard negation particle introducing the prohibition.
- source_word: תַעֲנֶה
  chosen: you shall bear witness
  alternatives:
  - you shall answer
  - you shall testify
  lexicon: HALOT
  rationale: ענה in legal contexts can mean 'answer, respond, testify.' With עֵד שָׁקֶר
    and the Decalogue's prohibitive form, the legal-forensic sense 'bear witness/testify'
    is most natural. 'Bear witness' preserves the established judicial idiom without
    unnecessary archaism.
- source_word: בְרֵעֲךָ
  chosen: against your neighbor
  alternatives:
  - concerning your neighbor
  - against your fellow
  lexicon: HALOT
  rationale: רֵעַ commonly means 'neighbor, fellow.' The preposition ב here in a forensic
    setting is well represented by 'against,' indicating testimony directed adversely
    toward another person. 'Neighbor' is the most natural and established English
    equivalent.
- source_word: עֵד
  chosen: witness
  alternatives:
  - testimony
  lexicon: HALOT
  rationale: As a noun paired with שָׁקֶר, עֵד denotes the role/content of witness
    in court. In English, 'bear false witness' idiomatically captures both the noun
    and the legal setting.
- source_word: שָׁקֶר
  chosen: 'false'
  alternatives:
  - deceitful
  - lying
  lexicon: HALOT
  rationale: שָׁקֶר denotes falsehood or deception. 'False' is the most idiomatic
    modifier in the fixed English legal phrase 'false witness,' preserving both meaning
    and register.
