id: EXO.20.18
reference: Exodus 20:18
source:
  edition: WLC
  text: וְ/כָל הָ/עָם֩ רֹאִ֨ים אֶת הַ/קּוֹלֹ֜ת וְ/אֶת הַ/לַּפִּידִ֗ם וְ/אֵת֙ ק֣וֹל
    הַ/שֹּׁפָ֔ר וְ/אֶת הָ/הָ֖ר עָשֵׁ֑ן וַ/יַּ֤רְא הָ/עָם֙ וַ/יָּנֻ֔עוּ וַ/יַּֽעַמְד֖וּ
    מֵֽ/רָחֹֽק־־־־׃
translation:
  text: Now all the people were seeing the thunder and the flashes of fire, and the
    sound of the trumpet, and the mountain smoking; and when the people saw it, they
    trembled and stood at a distance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally 'the sounds' or 'the voices'; in context this likely refers
      to thunder.
    reason: lexical_alternative
  - marker: b
    text: Or 'torches'; in this context the term likely refers to lightning-like flashes
      of fire.
    reason: lexical_alternative
  - marker: c
    text: Hebrew says the people were 'seeing' phenomena that include sound, preserving
      the overwhelming sensory character of the scene.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹאִים
  chosen: were seeing
  alternatives:
  - saw
  - perceived
  lexicon: HALOT
  rationale: The participle gives an ongoing/imperfective sense, so 'were seeing'
    preserves the vividness of the scene better than a simple past. Because the object
    includes audible phenomena, the Hebrew idiom intentionally blends sensory perception.
- source_word: הַקּוֹלֹת
  chosen: the thunder
  alternatives:
  - the sounds
  - the voices
  lexicon: HALOT
  rationale: Although קוֹל literally means 'sound/voice,' in this Sinai context the
    plural commonly refers to thunder. This fits the paired phenomena of flashes,
    trumpet sound, and smoking mountain, and yields natural English without losing
    the storm-theophany sense.
- source_word: הַלַּפִּידִם
  chosen: the flashes of fire
  alternatives:
  - the torches
  - the lightning
  lexicon: HALOT
  rationale: Literally 'torches,' but in this theophanic setting it refers to fiery
    flashes/lightning-like manifestations. 'Flashes of fire' preserves the concrete
    imagery while avoiding over-interpretation; 'lightning' is a plausible contextual
    alternative.
- source_word: קוֹל הַשֹּׁפָר
  chosen: the sound of the trumpet
  alternatives:
  - the sound of the ram's horn
  - the trumpet blast
  lexicon: HALOT
  rationale: שׁוֹפָר is the horn instrument; 'trumpet' is standard readable English,
    while 'sound of the trumpet' closely reflects the construct phrase. 'Ram's horn'
    is more specific but less idiomatic in running translation.
- source_word: הָהָר עָשֵׁן
  chosen: the mountain smoking
  alternatives:
  - the mountain in smoke
  - the smoking mountain
  lexicon: HALOT
  rationale: The adjective/predicate-like construction is rendered as a vivid participial
    phrase in English. 'The mountain smoking' preserves the immediate visual force
    of the Hebrew.
- source_word: וַיַּרְא הָעָם
  chosen: when the people saw it
  alternatives:
  - and the people saw
  - and the people saw this
  lexicon: HALOT
  rationale: The clause resumes the people's reaction after the list of phenomena.
    Supplying 'it' makes the English coherent, referring back collectively to the
    manifestations just described. 'When' captures the temporal force leading into
    their response.
- source_word: וַיָּנֻעוּ
  chosen: they trembled
  alternatives:
  - they shook
  - they reeled
  lexicon: HALOT
  rationale: The verb denotes quaking or moving in fear. 'They trembled' best conveys
    the people's fearful reaction in idiomatic English.
- source_word: וַיַּעַמְדוּ מֵרָחֹק
  chosen: stood at a distance
  alternatives:
  - stood far off
  - kept their distance
  lexicon: HALOT
  rationale: This expresses spatial withdrawal in fear. 'Stood at a distance' is natural
    modern English while remaining close to the Hebrew.
- source_word: וְכָל הָעָם
  chosen: all the people
  alternatives:
  - the whole people
  - all the nation
  lexicon: HALOT
  rationale: This straightforwardly denotes the gathered Israelite people as a whole.
    'All the people' is the most natural and direct rendering.
