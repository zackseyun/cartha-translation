theological_decisions:
- issue: Rendering sensory language that says the people 'saw' audible phenomena
  chosen_reading: Preserve the Hebrew's mixed sensory imagery rather than smoothing
    it away entirely
  alternative_readings:
  - Normalize to 'heard the thunder' or 'perceived the phenomena'
  rationale: The text intentionally presents an overwhelming theophany in which the
    people 'see' thunder/sounds. The translation keeps this tension by using 'were
    seeing the thunder' while rendering other elements naturally in English.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
