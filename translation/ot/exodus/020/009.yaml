theological_decisions:
- issue: Imperative force in Sabbath legislation
  chosen_reading: 'Render the imperfect as directive: ''you shall labor'''
  alternative_readings:
  - you may labor
  - you are to labor
  rationale: Within the Decalogue, the form functions as covenantal instruction rather
    than mere prediction. 'You shall labor' preserves the legal-command tone without
    overstating permission ('may') or softening the register.
  doctrine_reference: Translation philosophy §1, §5
