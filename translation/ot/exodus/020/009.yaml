id: EXO.20.9
reference: Exodus 20:9
source:
  edition: WLC
  text: שֵׁ֤שֶׁת יָמִים֙ תַּֽעֲבֹ֔ד וְ/עָשִׂ֖יתָ כָּל מְלַאכְתֶּֽ/ךָ־׃
translation:
  text: Six days you shall labor and do all your work,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For six days you shall work.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׁשֶׁת יָמִים
  chosen: Six days
  alternatives:
  - For six days
  lexicon: HALOT
  rationale: Construct numeral plus plural noun is most naturally rendered as the
    temporal phrase 'Six days.' 'For six days' is possible in English but adds a preposition
    not explicit in the Hebrew.
- source_word: תַּעֲבֹד
  chosen: you shall labor
  alternatives:
  - you shall work
  - you are to labor
  lexicon: HALOT
  rationale: עבד in the Qal commonly means 'work, serve, labor.' In the Sabbath command
    context, 'labor' preserves the command's seriousness and pairs well with the following
    noun for occupational activity. 'Shall' reflects the imperfect's directive force
    in legal material.
- source_word: וְעָשִׂיתָ
  chosen: and do
  alternatives:
  - and make
  - and accomplish
  lexicon: HALOT
  rationale: עשה is broad ('do, make'). Here with 'all your work' the idiomatic English
    collocation is 'do all your work.'
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: כָּל straightforwardly means 'all/every.' 'All' is the natural English
    equivalent in this construction.
- source_word: מְלַאכְתֶּךָ
  chosen: your work
  alternatives:
  - your labor
  - your occupation
  - your business
  lexicon: HALOT
  rationale: מְלָאכָה often denotes work, occupation, or task, especially in Sabbath
    contexts. 'Your work' is the most direct and idiomatic rendering here, and it
    maintains consistency with the surrounding command about labor and cessation from
    work.
