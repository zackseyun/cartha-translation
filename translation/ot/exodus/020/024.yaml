theological_decisions:
- issue: Meaning of God's action in 'אֲשֶׁר אַזְכִּיר אֶת שְׁמִי'
  chosen_reading: where I cause my name to be remembered
  alternative_readings:
  - where I proclaim my name
  - where I record my name
  rationale: The clause concerns God's sovereign designation of places of worship
    and memorial presence. Rendering it causatively preserves the Hebrew Hiphil and
    avoids over-specifying the mechanism as only proclamation or inscription. This
    also preserves theological tension about how God's name is made present without
    resolving it beyond the text.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
