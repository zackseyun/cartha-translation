id: EXO.20.24
reference: Exodus 20:24
source:
  edition: WLC
  text: מִזְבַּ֣ח אֲדָמָה֮ תַּעֲשֶׂה לִּ/י֒ וְ/זָבַחְתָּ֣ עָלָ֗י/ו אֶת עֹלֹתֶ֨י/ךָ֙
    וְ/אֶת שְׁלָמֶ֔י/ךָ אֶת צֹֽאנְ/ךָ֖ וְ/אֶת בְּקָרֶ֑/ךָ בְּ/כָל הַ/מָּקוֹם֙ אֲשֶׁ֣ר
    אַזְכִּ֣יר אֶת שְׁמִ֔/י אָב֥וֹא אֵלֶ֖י/ךָ וּ/בֵרַכְתִּֽי/ךָ־־־־־־־׃
translation:
  text: You shall make for me an altar of earth, and on it you shall sacrifice your
    burnt offerings and your peace offerings, your sheep and your cattle. In every
    place where I cause my name to be remembered, I will come to you and bless you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'where I proclaim my name' or 'where I record my name.' The Hebrew verb
      is causative ('cause to be remembered/mentioned'), and the exact nuance may
      include proclamation, memorialization, or invocation of God's name.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְבַּח אֲדָמָה
  chosen: an altar of earth
  alternatives:
  - an earthen altar
  - an altar of soil
  lexicon: HALOT
  rationale: Construct phrase literally denotes an altar made of earth/ground. 'Altar
    of earth' preserves the concrete wording while remaining natural English; 'earthen
    altar' is possible but slightly more interpretive.
- source_word: תַּעֲשֶׂה לִּי
  chosen: You shall make for me
  alternatives:
  - You are to make for me
  lexicon: HALOT
  rationale: Qal imperfect 2ms in legal/instructional context is well rendered as
    an imperative-like future, 'you shall make.' 'For me' preserves the dative of
    dedication.
- source_word: וְזָבַחְתָּ עָלָיו
  chosen: and on it you shall sacrifice
  alternatives:
  - and you shall sacrifice on it
  - and you shall slaughter on it
  lexicon: HALOT
  rationale: זבח in sacrificial context is best rendered 'sacrifice' rather than the
    more wooden 'slaughter.' Fronting 'on it' keeps the altar in view and reflects
    עָלָיו.
- source_word: עֹלֹתֶיךָ
  chosen: your burnt offerings
  lexicon: HALOT
  rationale: Standard sacrificial term for offerings wholly burned. 'Burnt offerings'
    is the established and accurate cultic rendering.
- source_word: שְׁלָמֶיךָ
  chosen: your peace offerings
  alternatives:
  - your fellowship offerings
  lexicon: HALOT
  rationale: Traditional 'peace offerings' reflects the Hebrew term tied to wholeness/well-being.
    'Fellowship offerings' captures one aspect but narrows the semantic range.
- source_word: אֶת צֹאנְךָ וְאֶת בְּקָרֶךָ
  chosen: your sheep and your cattle
  alternatives:
  - your flock and your herd
  lexicon: HALOT
  rationale: 'The Hebrew names the animal classes directly: small livestock and cattle.
    ''Sheep and cattle'' is concrete and readable, though ''flock and herd'' is also
    idiomatic.'
- source_word: בְּכָל הַמָּקוֹם
  chosen: In every place
  alternatives:
  - In each place
  - At every place
  lexicon: HALOT
  rationale: The phrase is distributive. 'In every place' is natural English and preserves
    the breadth of the statement.
- source_word: אֲשֶׁר אַזְכִּיר אֶת שְׁמִי
  chosen: where I cause my name to be remembered
  alternatives:
  - where I proclaim my name
  - where I make mention of my name
  - where I cause my name to be invoked
  lexicon: HALOT
  rationale: 'Hiphil of זכר is causative: not merely ''remember'' but ''cause to be
    remembered/mentioned.'' This avoids importing a narrower idea like proclamation
    only, while preserving divine agency in establishing memorial worship.'
- source_word: אָבֹא אֵלֶיךָ
  chosen: I will come to you
  alternatives:
  - I will come toward you
  lexicon: HALOT
  rationale: Simple future with אֶל marks divine approach/presence. 'Come to you'
    is the natural equivalent.
- source_word: וּבֵרַכְתִּיךָ
  chosen: and bless you
  alternatives:
  - and I will bless you
  lexicon: HALOT
  rationale: The verb explicitly includes first-person subject and second-person object.
    In English, 'and bless you' after 'I will come to you' is smooth and fully conveys
    the sense.
