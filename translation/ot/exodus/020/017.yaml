theological_decisions:
- issue: Whether בֵּית in the first clause should be rendered 'house' or expanded
    to 'household'
  chosen_reading: house
  alternative_readings:
  - household
  rationale: Although בַּיִת can denote household, the verse then itemizes wife, slaves,
    and animals separately. Rendering it 'house' avoids redundancy and follows the
    verse's apparent progression from dwelling to other possessions.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering slave terminology in covenant law
  chosen_reading: male slave / female slave
  alternative_readings:
  - male servant / female servant
  - servant / maidservant
  rationale: The project's stated philosophy prefers 'slave' where bonded status is
    salient. In this legal list of a neighbor's possessions, the status dimension
    is prominent enough to justify 'slave' rather than the softer 'servant.'
  doctrine_reference: Translation philosophy §1; Contested terms table on δοῦλος by
    analogy of bonded-status rendering
