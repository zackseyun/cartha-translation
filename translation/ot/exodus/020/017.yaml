id: EXO.20.17
reference: Exodus 20:17
source:
  edition: WLC
  text: לֹ֥א תַחְמֹ֖ד בֵּ֣ית רֵעֶ֑/ךָ לֹֽא תַחְמֹ֞ד אֵ֣שֶׁת רֵעֶ֗/ךָ וְ/עַבְדּ֤/וֹ
    וַ/אֲמָת/וֹ֙ וְ/שׁוֹר֣/וֹ וַ/חֲמֹר֔/וֹ וְ/כֹ֖ל אֲשֶׁ֥ר לְ/רֵעֶֽ/ךָ־׃פ
translation:
  text: You shall not covet your neighbor’s house; you shall not covet your neighbor’s
    wife, or his male slave, or his female slave, or his ox, or his donkey, or anything
    that belongs to your neighbor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your neighbor’s household.' The Hebrew word for 'house' can also refer
      to a household, though here 'house' fits the separate listing that follows.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַחְמֹד
  chosen: covet
  alternatives:
  - desire
  - lust after
  lexicon: HALOT
  rationale: חמד in this commandment denotes wrongful desire for what belongs to another.
    'Covet' preserves the established ethical force and fits the legal context better
    than the broader 'desire.'
- source_word: בֵּית רֵעֶךָ
  chosen: your neighbor’s house
  alternatives:
  - the house of your neighbor
  - your neighbor’s household
  lexicon: HALOT
  rationale: בַּיִת can mean either a physical house or a household. Here the following
    list separately names wife, slaves, and animals, so 'house' is the most natural
    primary sense in this verse's structure.
- source_word: רֵעֶךָ
  chosen: your neighbor
  alternatives:
  - your fellow
  - your companion
  lexicon: HALOT
  rationale: רֵעַ in covenant law commonly refers to another member of the community.
    'Neighbor' is idiomatic and preserves the interpersonal-ethical sense.
- source_word: אֵשֶׁת רֵעֶךָ
  chosen: your neighbor’s wife
  alternatives:
  - the wife of your neighbor
  lexicon: HALOT
  rationale: The construct phrase straightforwardly means 'your neighbor’s wife.'
    This keeps the relational and legal force clear.
- source_word: עַבְדּוֹ
  chosen: his male slave
  alternatives:
  - his servant
  - his male servant
  lexicon: HALOT
  rationale: Following the project's principle of original-language primacy, עֶבֶד
    is rendered 'slave' where bonded status is salient. In a property list within
    covenant law, the bonded nature is foregrounded; 'male' distinguishes it from
    the following feminine term.
- source_word: אֲמָתוֹ
  chosen: his female slave
  alternatives:
  - his maidservant
  - his female servant
  lexicon: HALOT
  rationale: אָמָה denotes a female slave/servant. In parallel with עֶבֶד and in this
    legal-property context, 'female slave' best reflects the social status and preserves
    the gender distinction in the Hebrew.
- source_word: שׁוֹרוֹ
  chosen: his ox
  alternatives:
  - his bull
  - his cattle
  lexicon: HALOT
  rationale: שׁוֹר commonly denotes an ox or bovine work animal. 'Ox' is the standard
    singular rendering in legal contexts and pairs naturally with 'donkey.'
- source_word: חֲמֹרוֹ
  chosen: his donkey
  alternatives:
  - his ass
  lexicon: HALOT
  rationale: '''Donkey'' is the clear modern English equivalent and avoids archaic
    diction.'
- source_word: וְכֹל אֲשֶׁר לְרֵעֶךָ
  chosen: or anything that belongs to your neighbor
  alternatives:
  - or anything that is your neighbor’s
  - or all that belongs to your neighbor
  lexicon: HALOT
  rationale: The phrase is a comprehensive catchall. 'Anything that belongs to your
    neighbor' is natural modern English and preserves the possessive force of לְ.
- source_word: לֹא ... לֹא
  chosen: You shall not ... you shall not
  alternatives:
  - Do not ... do not
  lexicon: HALOT
  rationale: The repeated prohibition is retained in English rather than collapsed,
    preserving the Hebrew emphasis and the commandment style.
