theological_decisions:
- issue: Scope of the prohibition in the Decalogue
  chosen_reading: Render רצח as 'murder' rather than 'kill'
  alternative_readings:
  - You shall not kill.
  rationale: This is primarily a lexical decision with theological implications. Translating
    'kill' could suggest a blanket ban on all taking of life, which exceeds the semantic
    range of רצח in this legal context. 'Murder' preserves the command's moral force
    without importing a broader claim the text does not make.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve what the source text plainly says without importing doctrinal
    claims.'
