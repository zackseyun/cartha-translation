id: EXO.20.13
reference: Exodus 20:13
source:
  edition: WLC
  text: לֹ֖א תִּרְצָֽח׃ס
translation:
  text: You shall not murder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more broadly, 'You shall not kill,' though the Hebrew verb here commonly
      refers to unlawful killing or murder rather than every kind of killing.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  chosen: not
  alternatives:
  - shall not
  lexicon: HALOT
  rationale: 'Standard negation particle. In English the prohibition is naturally
    expressed with auxiliary ''shall'' supplied by the verbal construction: ''You
    shall not ...''.'
- source_word: תִּרְצָח
  chosen: murder
  alternatives:
  - kill
  - commit murder
  lexicon: HALOT
  rationale: The verb רצח refers more specifically to unlawful killing/murder rather
    than killing in the broadest sense. 'Murder' best reflects the lexical force and
    avoids implying an absolute prohibition of all killing, which the Torah itself
    does not teach in every context. 'Commit murder' is possible but less direct;
    'kill' is too broad.
