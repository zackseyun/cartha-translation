id: EXO.20.22
reference: Exodus 20:22
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל מֹשֶׁ֔ה כֹּ֥ה תֹאמַ֖ר אֶל בְּנֵ֣י יִשְׂרָאֵ֑ל אַתֶּ֣ם רְאִיתֶ֔ם כִּ֚י מִן הַ/שָּׁמַ֔יִם דִּבַּ֖רְתִּי עִמָּ/כֶֽם־־־׃
translation:
  text: 'Then Yahweh said to Moses, “Thus you shall say to the sons of Israel: You yourselves have seen that I have spoken to you from heaven.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Israelites” or “the children of Israel.” The Hebrew is literally “the sons of Israel.”
    reason: lexical_alternative
  - marker: b
    text: Or “I have spoken to you.” The Hebrew more literally says “with you,” emphasizing direct encounter.
    reason: lexical_alternative
  - marker: c
    text: Hebrew “from the heavens”; English idiom commonly renders this as “from heaven.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the traditional small-caps covenantal substitute rather than transliteration.
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural modern English while preserving sequential force.
- source_word: כֹּה תֹאמַר
  chosen: Thus you shall say
  alternatives:
  - This is what you shall say
  - So you shall say
  lexicon: HALOT
  rationale: A standard messenger formula. 'Thus you shall say' preserves the formal declarative tone without unnecessary archaism.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' Per the project's gender-accurate principle, the masculine form is retained rather than flattened to a neutral collective, while still functioning corporately.
- source_word: אַתֶּם
  chosen: You yourselves
  alternatives:
  - You
  - You all
  lexicon: HALOT
  rationale: The independent pronoun is emphatic alongside the verb. 'You yourselves' brings out the emphasis more clearly than a simple 'you.'
- source_word: רְאִיתֶם
  chosen: have seen
  alternatives:
  - saw
  lexicon: HALOT
  rationale: 'English present perfect fits the discourse force of a past event with present evidential relevance: they are witnesses to what has just occurred.'
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - indeed that
  lexicon: HALOT
  rationale: Here כִּי introduces the content of what they have seen, best rendered as 'that' rather than causal 'for.'
- source_word: מִן הַשָּׁמַיִם
  chosen: from heaven
  alternatives:
  - from the heavens
  - out of heaven
  lexicon: HALOT
  rationale: Although the Hebrew form is plural, English idiom normally uses singular 'heaven' in this sense. 'From heaven' is natural and preserves the source meaning.
- source_word: דִּבַּרְתִּי עִמָּכֶם
  chosen: I have spoken with you
  alternatives:
  - I spoke with you
  - I have spoken to you
  lexicon: HALOT
  rationale: The preposition עִם normally means 'with,' highlighting direct encounter rather than one-way address. 'With you' is therefore preferred over the more common but less precise 'to you.'
