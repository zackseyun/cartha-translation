theological_decisions:
- issue: Description of the divine manifestation in darkness
  chosen_reading: Render עֲרָפֶל concretely as 'thick darkness' without softening
    or overexplaining the imagery.
  alternative_readings:
  - the dark cloud
  - the gloom where God was present
  rationale: The verse presents the paradox of God's holy presence being associated
    with obscurity and unapproachability. The translation should preserve that theological
    tension rather than resolve it into a merely meteorological or purely symbolic
    description.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
