id: EXO.20.21
reference: Exodus 20:21
source:
  edition: WLC
  text: וַ/יַּעֲמֹ֥ד הָ/עָ֖ם מֵ/רָחֹ֑ק וּ/מֹשֶׁה֙ נִגַּ֣שׁ אֶל הָֽ/עֲרָפֶ֔ל אֲשֶׁר
    שָׁ֖ם הָ/אֱלֹהִֽים־־׃פ
translation:
  text: The people stood at a distance, and Moses approached the thick darkness where
    God was.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the dark cloud' or 'the gloom.' The Hebrew term can denote dense darkness
      associated with God's manifestation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֹד
  chosen: stood
  alternatives:
  - remained standing
  - stationed themselves
  lexicon: HALOT
  rationale: 'The wayyiqtol of עמד here narrates a simple past action/state: the people
    took their position and remained there. ''Stood'' is the most natural concise
    English rendering in context.'
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the people of Israel
  - the nation
  lexicon: HALOT
  rationale: עם with the article refers to the assembled people already in view at
    Sinai. 'The people' is sufficiently specific without importing words not present
    in the Hebrew.
- source_word: מֵרָחֹק
  chosen: at a distance
  alternatives:
  - far off
  - from afar
  lexicon: HALOT
  rationale: The preposition plus noun/adjective conveys spatial remove. 'At a distance'
    is idiomatic modern English and preserves the sense of separation.
- source_word: נִגַּשׁ
  chosen: approached
  alternatives:
  - came near
  - drew near
  lexicon: HALOT
  rationale: נגשׁ commonly means to come near or approach. 'Approached' is clear modern
    English; 'drew near' is possible but slightly more traditional in tone.
- source_word: הָעֲרָפֶל
  chosen: the thick darkness
  alternatives:
  - the dark cloud
  - the gloom
  lexicon: HALOT
  rationale: עֲרָפֶל denotes dense darkness or gloom, often associated with divine
    manifestation. 'Thick darkness' preserves both the physical obscurity and the
    solemn theophanic atmosphere better than the more interpretive 'dark cloud'.
- source_word: אֲשֶׁר שָׁם הָאֱלֹהִים
  chosen: where God was
  alternatives:
  - where God was present
  - where God was there
  lexicon: HALOT
  rationale: The relative clause identifies the location of the divine presence. English
    normally omits a literal rendering of שָׁם ('there') in this construction; 'where
    God was' is natural and faithful. 'Was present' is interpretive and therefore
    left as an alternative.
- source_word: הָאֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In this context אֱלֹהִים clearly refers to the God of Israel, not 'gods'
    or a generic divine being, so 'God' is the appropriate singular rendering.
