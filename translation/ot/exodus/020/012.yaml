id: EXO.20.12
reference: Exodus 20:12
source:
  edition: WLC
  text: כַּבֵּ֥ד אֶת אָבִ֖י/ךָ וְ/אֶת אִמֶּ֑/ךָ לְמַ֨עַן֙ יַאֲרִכ֣וּ/ן יָמֶ֔י/ךָ עַ֚ל
    הָ/אֲדָמָ֔ה אֲשֶׁר יְהוָ֥ה אֱלֹהֶ֖י/ךָ נֹתֵ֥ן לָֽ/ךְ־־־׃ס
translation:
  text: Honor your father and your mother, so that your days may be long on the land
    that the LORD your God is giving you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the land.' The Hebrew preposition is literally 'on/upon,' but English
      idiom may also express this as 'in the land.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'your days may be long' is a Hebrew idiom for long life.
    reason: cultural_note
lexical_decisions:
- source_word: כַּבֵּד
  chosen: Honor
  alternatives:
  - Give weight to
  - Glorify
  - Respect
  lexicon: HALOT
  rationale: The Piel imperative of כבד here calls for treating parents as weighty
    or worthy of honor. 'Honor' is the established and accurate English equivalent
    that preserves both the ethical force and the covenantal seriousness better than
    the weaker 'respect.'
- source_word: אָבִיךָ
  chosen: your father
  alternatives:
  - your male parent
  lexicon: HALOT
  rationale: Direct, natural rendering of the singular noun with 2ms suffix. 'Father'
    preserves the familial and covenantal register.
- source_word: אִמֶּךָ
  chosen: your mother
  alternatives:
  - your female parent
  lexicon: HALOT
  rationale: Direct rendering of the singular noun with 2ms suffix. Paired with 'father'
    in the commandment formula.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: HALOT
  rationale: Introduces purpose/result. 'So that' is idiomatic modern English and
    preserves the connection between obedience and promised outcome.
- source_word: יַאֲרִכוּן
  chosen: may be long
  alternatives:
  - may be prolonged
  - may lengthen
  lexicon: HALOT
  rationale: The Hiphil plural form with 'your days' yields the idiom 'your days may
    be long.' This is more natural in English than the overly literal 'may be prolonged'
    while preserving the Hebrew sense.
- source_word: יָמֶיךָ
  chosen: your days
  alternatives:
  - your lifetime
  lexicon: HALOT
  rationale: Literal rendering preserves the Hebrew idiom and its biblical resonance.
    'Lifetime' would interpret rather than translate.
- source_word: עַל הָאֲדָמָה
  chosen: on the land
  alternatives:
  - in the land
  - upon the ground
  lexicon: HALOT
  rationale: אֲדָמָה here refers to the land given by God, not merely soil. 'On the
    land' follows the preposition עַל more closely, while still sounding natural enough
    in English. 'In the land' is possible, but 'on' better reflects the Hebrew wording.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    to follow established reverential convention and the Septuagintal pattern.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Standard rendering of the construct with 2ms suffix. It identifies Israel's
    covenant God in direct address.
- source_word: נֹתֵן לָךְ
  chosen: is giving you
  alternatives:
  - gives you
  - is about to give you
  - has given you
  lexicon: HALOT
  rationale: The participle נֹתֵן can express ongoing or imminent action. 'Is giving
    you' preserves the participial aspect and fits the Sinai setting, where the land
    is promised but not yet possessed.
