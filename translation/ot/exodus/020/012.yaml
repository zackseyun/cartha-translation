theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH.
    This also matches longstanding English Bible convention without obscuring that
    the covenant name is present in the Hebrew.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Scope of הָאֲדָמָה in the promise
  chosen_reading: the land
  alternative_readings:
  - the ground
  - the earth
  rationale: In context of the Decalogue addressed to Israel and the clause 'that
    the LORD your God is giving you,' the referent is the covenant land rather than
    earth in general. This avoids flattening the historical-covenantal setting while
    not overexpanding the text to 'promised land.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy;
    preserve source-text plain sense'
