theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Description of God's cessation on the seventh day
  chosen_reading: he rested
  alternative_readings:
  - he ceased
  rationale: The Hebrew verb naturally supports 'rested' in this Sabbath-grounding context. This rendering should not be taken to imply divine weariness; the text presents God's rest as the pattern for Sabbath sanctification. The alternative 'ceased' is lexically possible but less idiomatic here.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (preserve tension rather than over-resolve)
