id: EXO.20.11
reference: Exodus 20:11
source:
  edition: WLC
  text: כִּ֣י שֵֽׁשֶׁת יָמִים֩ עָשָׂ֨ה יְהוָ֜ה אֶת הַ/שָּׁמַ֣יִם וְ/אֶת הָ/אָ֗רֶץ אֶת הַ/יָּם֙ וְ/אֶת כָּל אֲשֶׁר בָּ֔/ם וַ/יָּ֖נַח בַּ/יּ֣וֹם הַ/שְּׁבִיעִ֑י עַל כֵּ֗ן בֵּרַ֧ךְ יְהוָ֛ה אֶת י֥וֹם הַ/שַּׁבָּ֖ת וַֽ/יְקַדְּשֵֽׁ/הוּ־־־־־־־־־׃ס
translation:
  text: For in six days Yahweh made the heavens and the earth, the sea, and all that is in them, and he rested on the seventh day. Therefore Yahweh blessed the Sabbath day and made it holy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he ceased' on the seventh day. The Hebrew verb can emphasize settling into rest or ceasing from work.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or rationale for the Sabbath command in the preceding verse. 'For' fits the explanatory force in English and preserves the connection to the command.
- source_word: שֵׁשֶׁת יָמִים
  chosen: in six days
  alternatives:
  - for six days
  - six days
  lexicon: HALOT
  rationale: The construct phrase denotes duration/time span within which the creative work is described. 'In six days' is idiomatic and traditional without adding interpretive material beyond the Hebrew.
- source_word: עָשָׂה
  chosen: made
  alternatives:
  - did
  - fashioned
  lexicon: HALOT
  rationale: עָשָׂה is a broad verb meaning 'do/make.' Here 'made' is the most natural English rendering for God's creative activity and matches the direct objects listed.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַשָּׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the sky
  lexicon: HALOT
  rationale: The Hebrew plural is best represented by 'the heavens' in this creation context, preserving the elevated cosmological sense rather than flattening to 'sky.'
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In the creation formula paired with 'the heavens,' אֶרֶץ refers to the earth/world, not merely a local land.
- source_word: הַיָּם
  chosen: the sea
  alternatives:
  - the seas
  lexicon: HALOT
  rationale: Singular in Hebrew and naturally rendered singular in English here as part of the meristic listing of creation's domains.
- source_word: כָּל אֲשֶׁר בָּם
  chosen: all that is in them
  alternatives:
  - everything in them
  - all that is in them all
  lexicon: HALOT
  rationale: This relative clause comprehensively includes all contents of the heavens, earth, and sea. 'All that is in them' is clear and close to the Hebrew.
- source_word: וַיָּנַח
  chosen: he rested
  alternatives:
  - he ceased
  - he settled down
  lexicon: HALOT
  rationale: The verb נוח here denotes resting/settling after work. 'He rested' is the standard and most natural rendering in the Sabbath context, while not implying fatigue.
- source_word: בַּיּוֹם הַשְּׁבִיעִי
  chosen: on the seventh day
  alternatives:
  - in the seventh day
  lexicon: HALOT
  rationale: Temporal phrase indicating when the resting occurred. 'On the seventh day' is idiomatic English.
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For that reason
  - Thus
  lexicon: HALOT
  rationale: Marks the conclusion drawn from the creation pattern. 'Therefore' clearly signals the inferential relationship.
- source_word: בֵּרַךְ
  chosen: blessed
  alternatives:
  - pronounced a blessing on
  lexicon: HALOT
  rationale: Standard rendering of ברך. Here it indicates God's conferral of blessing upon the day.
- source_word: יוֹם הַשַּׁבָּת
  chosen: the Sabbath day
  alternatives:
  - the sabbath day
  - the day of Sabbath
  lexicon: HALOT
  rationale: Natural English rendering of the construct phrase, preserving the specific sanctified day in view.
- source_word: וַיְקַדְּשֵׁהוּ
  chosen: made it holy
  alternatives:
  - sanctified it
  - set it apart as holy
  lexicon: HALOT
  rationale: קדשׁ in the piel means to consecrate or make holy. 'Made it holy' is accessible modern English; 'it' refers back to 'the Sabbath day.'
