id: EXO.26.13
reference: Exodus 26:13
source:
  edition: WLC
  text: וְ/הָ/אַמָּ֨ה מִ/זֶּ֜ה וְ/הָ/אַמָּ֤ה מִ/זֶּה֙ בָּ/עֹדֵ֔ף בְּ/אֹ֖רֶךְ יְרִיעֹ֣ת
    הָ/אֹ֑הֶל יִהְיֶ֨ה סָר֜וּחַ עַל צִדֵּ֧י הַ/מִּשְׁכָּ֛ן מִ/זֶּ֥ה וּ/מִ/זֶּ֖ה לְ/כַסֹּתֽ/וֹ־׃
translation:
  text: And the extra cubit on this side and the extra cubit on that side, from the
    surplus in the length of the tent curtains, shall hang over the sides of the tabernacle
    on this side and on that side, to cover it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one cubit on one side and one cubit on the other side.' The Hebrew repeats
      'the cubit' with demonstratives, referring to the leftover measure on each side.
    reason: lexical_alternative
  - marker: b
    text: '''Tabernacle'' translates Hebrew mishkan, the sacred dwelling structure
      beneath the tent covering.'
    reason: cultural_note
lexical_decisions:
- source_word: הָאַמָּה
  chosen: the cubit
  alternatives:
  - the extra cubit
  - the one cubit
  lexicon: HALOT
  rationale: אַמָּה is the standard linear measure 'cubit.' In English the phrase
    is clarified by context as the amount left over; 'extra cubit' is reflected in
    the full clause rather than forcing it into the noun alone.
- source_word: מִזֶּה ... מִזֶּה
  chosen: on this side ... on that side
  alternatives:
  - from this side ... from that side
  - on one side ... on the other side
  lexicon: HALOT
  rationale: The demonstrative phrases indicate the two opposite sides. English idiom
    prefers 'on this side and on that side' in this architectural description.
- source_word: בָּעֹדֵף
  chosen: the surplus
  alternatives:
  - what remains over
  - the excess
  lexicon: HALOT
  rationale: From the root meaning 'to be in excess/remain over.' Here it refers to
    the leftover length of the tent curtains beyond the tabernacle dimensions.
- source_word: אֹרֶךְ
  chosen: length
  alternatives:
  - full length
  lexicon: HALOT
  rationale: Straightforward spatial term in a construction context.
- source_word: יְרִיעֹת הָאֹהֶל
  chosen: the tent curtains
  alternatives:
  - the curtains of the tent
  - the tent cloths
  lexicon: HALOT
  rationale: יְרִיעוֹת are curtain panels; הָאֹהֶל identifies them as belonging to
    the tent layer. 'Tent curtains' is natural modern English and preserves the construction
    sense.
- source_word: יִהְיֶה סָרוּחַ
  chosen: shall hang over
  alternatives:
  - shall extend over
  - shall be spread over
  lexicon: HALOT
  rationale: The verbal idea is that the excess material is left hanging down/overhanging.
    'Shall hang over' best captures the physical image in readable English.
- source_word: צִדֵּי הַמִּשְׁכָּן
  chosen: the sides of the tabernacle
  alternatives:
  - the sides of the dwelling
  - the sides of the dwelling place
  lexicon: HALOT
  rationale: מִשְׁכָּן in Exodus is conventionally and accurately rendered 'tabernacle'
    for the sacred structure. 'Sides' fits the plural construct.
- source_word: לְכַסֹּתוֹ
  chosen: to cover it
  alternatives:
  - for covering it
  lexicon: HALOT
  rationale: 'Infinitive of purpose: the overhanging material serves to cover the
    tabernacle.'
