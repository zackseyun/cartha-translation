id: EXO.26.14
reference: Exodus 26:14
source:
  edition: WLC
  text: וְ/עָשִׂ֤יתָ מִכְסֶה֙ לָ/אֹ֔הֶל עֹרֹ֥ת אֵילִ֖ם מְאָדָּמִ֑ים וּ/מִכְסֵ֛ה עֹרֹ֥ת
    תְּחָשִׁ֖ים מִ/לְ/מָֽעְלָ/ה׃פ
translation:
  text: And you shall make for the tent a covering of rams’ skins dyed red, and a
    covering of tahash skins above that.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew term tahash is uncertain. It may refer to a specific animal or
      to a type of durable leather; proposed renderings include 'fine leather,' 'porpoise
      skins,' or 'dugong skins.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: And you shall make
  alternatives:
  - And make
  - You are to make
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional sequence functions
    as an imperative/future command. 'You shall make' preserves the directive force
    in clear modern English.
- source_word: מִכְסֶה
  chosen: a covering
  alternatives:
  - covering layer
  - cover
  lexicon: HALOT
  rationale: The noun denotes a covering or protective layer. 'A covering' is the
    most natural and sufficiently formal rendering in the tabernacle construction
    context.
- source_word: לָאֹהֶל
  chosen: for the tent
  alternatives:
  - for the tabernacle
  - over the tent
  lexicon: HALOT
  rationale: אֹהֶל is literally 'tent.' Although the broader context is the tabernacle,
    the Hebrew term here is the common noun, so 'tent' better reflects original-language
    primacy. 'For' matches the prefixed ל well in context.
- source_word: עֹרֹת אֵילִם מְאָדָּמִים
  chosen: rams’ skins dyed red
  alternatives:
  - red rams' skins
  - skins of rams made red
  lexicon: HALOT
  rationale: The phrase consists of 'skins of rams' plus a participial/adjectival
    form from אדם, indicating reddening. 'Dyed red' communicates the likely processed
    state of the skins in idiomatic English better than the less clear 'red rams'
    skins.'
- source_word: וּמִכְסֵה
  chosen: and a covering
  alternatives:
  - and another covering
  lexicon: HALOT
  rationale: The conjunction introduces a second covering layer. English can supply
    the indefinite article naturally. 'Another' is interpretive; the simple repetition
    better mirrors the Hebrew.
- source_word: עֹרֹת תְּחָשִׁים
  chosen: tahash skins
  alternatives:
  - fine leather skins
  - porpoise skins
  - dugong skins
  - goatskin leather
  lexicon: HALOT
  rationale: תְּחָשִׁים is a well-known lexical uncertainty. Rather than choose a
    speculative animal identification, the draft transliterates 'tahash' to preserve
    the source-term ambiguity transparently. An explanatory footnote preserves major
    alternatives.
- source_word: מִלְמָעְלָה
  chosen: above that
  alternatives:
  - from above
  - on top
  - over it
  lexicon: HALOT
  rationale: In context the adverbial expression indicates the outermost placement
    of the second covering over the previous one. 'Above that' communicates the layering
    clearly without over-paraphrasing.
