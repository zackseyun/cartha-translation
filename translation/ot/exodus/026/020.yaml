id: EXO.26.20
reference: Exodus 26:20
source:
  edition: WLC
  text: וּ/לְ/צֶ֧לַע הַ/מִּשְׁכָּ֛ן הַ/שֵּׁנִ֖ית לִ/פְאַ֣ת צָפ֑וֹן עֶשְׂרִ֖ים קָֽרֶשׁ׃
translation:
  text: And for the second side of the tabernacle, on the north side, twenty frames.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “boards.” The Hebrew term can refer to the upright structural pieces
      of the tabernacle.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/צֶלַע
  chosen: And for the ... side
  alternatives:
  - And on the ... side
  - And for the ... flank
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition naturally introduce the next
    construction specification. צֶלַע in tabernacle-building contexts refers to a
    side/sidewall rather than a literal rib; 'for the ... side' fits the elliptical
    construction with the following numeral phrase.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  lexicon: HALOT
  rationale: מִשְׁכָּן is the standard term in Exodus for the sacred tent sanctuary.
    'Tabernacle' is established, accurate, and still readable in this cultic architectural
    context.
- source_word: הַשֵּׁנִית
  chosen: the second
  alternatives:
  - the other
  lexicon: HALOT
  rationale: The adjective marks this as the second of the corresponding long sides,
    following the first side described in the previous verse. 'Second' is more precise
    than 'other'.
- source_word: לִפְאַת צָפוֹן
  chosen: on the north side
  alternatives:
  - toward the north side
  - at the northern edge
  lexicon: HALOT
  rationale: The phrase indicates orientation/direction. 'On the north side' is idiomatic
    English and matches the architectural description.
- source_word: עֶשְׂרִים
  chosen: twenty
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: קָרֶשׁ
  chosen: frames
  alternatives:
  - boards
  - planks
  lexicon: HALOT
  rationale: In the tabernacle descriptions, קֶרֶשׁ denotes the upright structural
    elements forming the walls. 'Frames' better reflects likely structural function
    than the traditional 'boards,' though 'boards' remains a viable alternative.
