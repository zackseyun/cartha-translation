id: EXO.26.36
reference: Exodus 26:36
source:
  edition: WLC
  text: וְ/עָשִׂ֤יתָ מָסָךְ֙ לְ/פֶ֣תַח הָ/אֹ֔הֶל תְּכֵ֧לֶת וְ/אַרְגָּמָ֛ן וְ/תוֹלַ֥עַת
    שָׁנִ֖י וְ/שֵׁ֣שׁ מָשְׁזָ֑ר מַעֲשֵׂ֖ה רֹקֵֽם׃
translation:
  text: You shall make a screen for the entrance of the tent, of blue and purple and
    scarlet yarn, and fine twisted linen, the work of an embroiderer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'curtain' or 'veil' for the entrance covering; 'screen' is used here
      to distinguish it from the inner veil described elsewhere in the chapter.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָסָךְ
  chosen: screen
  alternatives:
  - curtain
  - veil
  lexicon: HALOT
  rationale: מָסָךְ denotes a hanging that serves as a covering or partition. Here
    it is for the entrance of the tent, distinct from the inner veil in the surrounding
    context, so 'screen' best preserves the functional distinction without overloading
    it with later cultic associations.
- source_word: לְפֶתַח הָאֹהֶל
  chosen: for the entrance of the tent
  alternatives:
  - for the doorway of the tent
  - for the opening of the tent
  lexicon: HALOT
  rationale: פֶתַח commonly refers to an opening or entrance. 'Entrance' is natural
    English and fits the function of the hanging. 'Tent' straightforwardly renders
    אֹהֶל in tabernacle-construction context without importing the more interpretive
    'tabernacle' into this phrase itself.
- source_word: תְּכֵלֶת
  chosen: blue
  alternatives:
  - blue yarn
  - violet-blue
  lexicon: HALOT
  rationale: The term refers to a prestigious blue/purple-blue dyed material. In English
    tabernacle-text style, 'blue' is the standard accessible rendering. Because the
    material noun is implied by the series, 'yarn' is supplied once later in English
    rather than repeated after each color term.
- source_word: אַרְגָּמָן
  chosen: purple
  alternatives:
  - purple yarn
  - reddish-purple
  lexicon: HALOT
  rationale: אַרְגָּמָן denotes purple dyed material. 'Purple' is the conventional
    and sufficiently precise rendering in this textile list.
- source_word: תוֹלַעַת שָׁנִי
  chosen: scarlet yarn
  alternatives:
  - scarlet
  - crimson yarn
  lexicon: HALOT
  rationale: The expression refers idiomatically to scarlet-dyed material, not literally
    to the worm itself in this construction context. 'Scarlet yarn' makes the textile
    sense explicit and matches the series of materials.
- source_word: שֵׁשׁ מָשְׁזָר
  chosen: fine twisted linen
  alternatives:
  - finely twisted linen
  - fine linen, twisted
  lexicon: HALOT
  rationale: שֵׁשׁ is fine linen; מָשְׁזָר indicates twisted/spun thread. 'Fine twisted
    linen' is concise, natural, and preserves both quality and manufacture.
- source_word: מַעֲשֵׂה רֹקֵם
  chosen: the work of an embroiderer
  alternatives:
  - embroidered work
  - the work of a weaver in colors
  lexicon: HALOT
  rationale: The phrase denotes skilled decorative needlework/textile craftsmanship.
    'The work of an embroiderer' preserves the construct sense and the artisan focus
    better than the flatter 'embroidered work'.
- source_word: וְעָשִׂיתָ
  chosen: You shall make
  alternatives:
  - And you shall make
  - You are to make
  lexicon: HALOT
  rationale: The waw plus perfect in this instructional sequence carries directive
    force. 'You shall make' matches the legal/instructional register used throughout
    the tabernacle commands.
