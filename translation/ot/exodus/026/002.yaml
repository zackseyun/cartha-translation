id: EXO.26.2
reference: Exodus 26:2
source:
  edition: WLC
  text: אֹ֣רֶךְ הַ/יְרִיעָ֣ה הָֽ/אַחַ֗ת שְׁמֹנֶ֤ה וְ/עֶשְׂרִים֙ בָּֽ/אַמָּ֔ה וְ/רֹ֨חַב֙
    אַרְבַּ֣ע בָּ/אַמָּ֔ה הַ/יְרִיעָ֖ה הָ/אֶחָ֑ת מִדָּ֥ה אַחַ֖ת לְ/כָל הַ/יְרִיעֹֽת׀־׃
translation:
  text: The length of each curtain shall be twenty-eight cubits, and the width of
    each curtain four cubits; all the curtains shall have one measure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the curtain, the one ... the curtain, the one'; Hebrew
      uses a distributive form to specify the dimensions of each individual curtain.
    reason: lexical_alternative
  - marker: b
    text: Or 'all the curtains shall have the same measure.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹרֶךְ
  chosen: length
  alternatives:
  - long
  lexicon: HALOT
  rationale: Standard architectural/dimensional sense in tabernacle instructions;
    'length' is the natural English measurement term.
- source_word: הַיְרִיעָה
  chosen: curtain
  alternatives:
  - panel
  - sheet
  lexicon: HALOT
  rationale: In tabernacle contexts יְרִיעָה refers to a large fabric hanging or covering
    piece. 'Curtain' is established and fits the cultic furnishing context better
    than the more generic 'sheet' or 'panel'.
- source_word: הָאַחַת / הָאֶחָת
  chosen: each
  alternatives:
  - the one
  - one
  lexicon: HALOT
  rationale: Though literally 'the one,' English idiom in distributive measurement
    statements is best expressed as 'each,' preserving the sense that the dimensions
    apply to every individual curtain.
- source_word: שְׁמֹנֶה וְעֶשְׂרִים
  chosen: twenty-eight
  lexicon: HALOT
  rationale: Cardinal number in standard English order.
- source_word: בָּאַמָּה
  chosen: cubits
  alternatives:
  - cubits long
  lexicon: HALOT
  rationale: אַמָּה is the standard ancient linear unit 'cubit.' The plural is required
    in English after the numeral.
- source_word: וְרֹחַב
  chosen: and the width
  alternatives:
  - and width
  - and breadth
  lexicon: HALOT
  rationale: Pairs naturally with 'length' in English dimensional description. 'Breadth'
    is possible but less natural in modern English.
- source_word: אַרְבַּע
  chosen: four
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: מִדָּה אַחַת
  chosen: one measure
  alternatives:
  - the same measure
  - one size
  lexicon: HALOT
  rationale: Literally 'one measure.' This preserves the formal wording while remaining
    clear. 'One size' is more idiomatic but slightly less precise; 'the same measure'
    is interpretive though accurate.
- source_word: לְכָל הַיְרִיעֹת
  chosen: all the curtains
  alternatives:
  - for all the curtains
  - for every curtain
  lexicon: HALOT
  rationale: The phrase indicates that the single standard measurement applies across
    the whole set. 'All the curtains' is idiomatic English and preserves the collective
    scope.
