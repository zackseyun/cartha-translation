id: EXO.26.3
reference: Exodus 26:3
source:
  edition: WLC
  text: חֲמֵ֣שׁ הַ/יְרִיעֹ֗ת תִּֽהְיֶ֨יןָ֙ חֹֽבְרֹ֔ת אִשָּׁ֖ה אֶל אֲחֹתָ֑/הּ וְ/חָמֵ֤שׁ
    יְרִיעֹת֙ חֹֽבְרֹ֔ת אִשָּׁ֖ה אֶל אֲחֹתָֽ/הּ־־׃
translation:
  text: Five of the curtains shall be joined to one another, and five curtains shall
    be joined to one another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'a woman to her sister,' an idiom meaning corresponding items
      joined to each other.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְרִיעֹת
  chosen: curtains
  alternatives:
  - panels
  - cloths
  lexicon: HALOT
  rationale: In tabernacle construction contexts, יְרִיעָה refers to a large fabric
    hanging or curtain. 'Curtains' is the standard, natural English rendering and
    fits the architectural setting better than the vaguer 'cloths' or the more interpretive
    'panels.'
- source_word: תִּהְיֶיןָ
  chosen: shall be
  alternatives:
  - are to be
  - must be
  lexicon: HALOT
  rationale: The imperfect of היה here gives an instructional/future sense within
    construction directions. 'Shall be' preserves the prescriptive force in concise
    English without over-interpreting modality.
- source_word: חֹבְרֹת
  chosen: joined
  alternatives:
  - coupled
  - connected
  lexicon: HALOT
  rationale: From חבר, 'to join/connect.' 'Joined' is clear modern English and suitably
    formal for construction instructions. 'Coupled' is possible and traditional, but
    sounds less natural in contemporary English.
- source_word: אִשָּׁה אֶל אֲחֹתָהּ
  chosen: to one another
  alternatives:
  - each to her sister
  - one to its counterpart
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'a woman to her sister,' a common way
    of expressing correspondence between inanimate feminine nouns. Since the referent
    is the feminine plural 'curtains,' idiomatic English is 'to one another.' The
    more literal 'each to her sister' is understandable but unnatural in modern English
    and could distract readers.
- source_word: חֲמֵשׁ ... וְחָמֵשׁ
  chosen: Five ... and five
  alternatives:
  - Five of them ... and five of them
  lexicon: HALOT
  rationale: The verse divides the ten curtains into two groups of five. 'Five of
    the curtains ... and five curtains' reflects the Hebrew structure clearly in English.
