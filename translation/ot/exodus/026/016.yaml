id: EXO.26.16
reference: Exodus 26:16
source:
  edition: WLC
  text: עֶ֥שֶׂר אַמּ֖וֹת אֹ֣רֶךְ הַ/קָּ֑רֶשׁ וְ/אַמָּה֙ וַ/חֲצִ֣י הָֽ/אַמָּ֔ה רֹ֖חַב
    הַ/קֶּ֥רֶשׁ הָ/אֶחָֽד׃
translation:
  text: The length of each frame shall be ten cubits, and the width of each frame
    one and a half cubits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'board' instead of 'frame' for Hebrew קֶרֶשׁ.
    reason: lexical_alternative
lexical_decisions:
- source_word: קָּרֶשׁ
  chosen: frame
  alternatives:
  - board
  - plank
  lexicon: HALOT
  rationale: In tabernacle construction contexts, קֶרֶשׁ refers to a structural upright
    element. 'Frame' fits modern English and the likely function better than the more
    traditional 'board,' while avoiding over-specification beyond the source.
- source_word: עֶשֶׂר אַמּוֹת
  chosen: ten cubits
  lexicon: HALOT
  rationale: A straightforward measurement expression. 'Cubits' preserves the ancient
    unit rather than converting it, maintaining formal accuracy.
- source_word: אֹרֶךְ
  chosen: length
  lexicon: HALOT
  rationale: Standard rendering for the dimension term in construction descriptions.
- source_word: וְאַמָּה וַחֲצִי הָאַמָּה
  chosen: one and a half cubits
  alternatives:
  - a cubit and a half
  lexicon: HALOT
  rationale: This idiomatic English rendering communicates the Hebrew measurement
    naturally while preserving the exact value. 'A cubit and a half' is more formally
    literal but less smooth in contemporary English.
- source_word: רֹחַב
  chosen: width
  alternatives:
  - breadth
  lexicon: HALOT
  rationale: '''Width'' is the clearest modern English equivalent; ''breadth'' is
    possible but less natural for contemporary readers.'
- source_word: הַקֶּרֶשׁ הָאֶחָד
  chosen: each frame
  alternatives:
  - the one frame
  - the single frame
  lexicon: HALOT
  rationale: The Hebrew singular with the article and אֶחָד expresses the dimension
    of an individual unit. 'Each frame' conveys distributive sense idiomatically in
    English better than the wooden 'the one frame.'
