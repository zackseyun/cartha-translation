id: EXO.26.34
reference: Exodus 26:34
source:
  edition: WLC
  text: וְ/נָתַתָּ֙ אֶת הַ/כַּפֹּ֔רֶת עַ֖ל אֲר֣וֹן הָ/עֵדֻ֑ת בְּ/קֹ֖דֶשׁ הַ/קֳּדָשִֽׁים־׃
translation:
  text: And you shall place the mercy seat on the ark of the testimony in the Most
    Holy Place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'atonement cover' for 'mercy seat.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''the ark of the testimony''; many English versions have ''ark
      of the covenant.'''
    reason: alternative_reading
  - marker: c
    text: Or 'the Holy of Holies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/נָתַתָּ
  chosen: And you shall place
  alternatives:
  - and you shall put
  - and you shall set
  lexicon: HALOT
  rationale: Qal perfect 2ms with prefixed conjunction in instructional sequence functions
    as an imperative/future command. 'Place' is natural modern English for positioning
    a cultic object, while preserving the directive force.
- source_word: הַכַּפֹּרֶת
  chosen: the mercy seat
  alternatives:
  - the atonement cover
  - the cover
  lexicon: HALOT
  rationale: Traditional but still meaningful rendering for the lid of the ark associated
    with atonement. 'Atonement cover' is possible and more transparent etymologically,
    but 'mercy seat' remains the most recognizable cultic term in English for this
    object and fits the tabernacle context. The term is distinct from Greek ἱλαστήριον
    in the doctrine table, so no mandated rendering applies here.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: The preposition indicates placement on/upon the ark. 'On' is the clearest
    contemporary English equivalent.
- source_word: אֲרוֹן הָעֵדֻת
  chosen: the ark of the testimony
  alternatives:
  - the ark of the covenant
  - the chest of the testimony
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'ark of the testimony,' not 'covenant.' The
    translation follows original-language primacy over traditional harmonization.
    'Ark' is retained as the established term for this sacred chest.
- source_word: בְּ/קֹדֶשׁ הַקֳּדָשִׁים
  chosen: in the Most Holy Place
  alternatives:
  - in the Holy of Holies
  - in the holiest place
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'in the holiness of holinesses,' denoting
    the innermost sanctuary. 'Most Holy Place' communicates the superlative sense
    in clear modern English; 'Holy of Holies' is a viable traditional alternative
    preserved in a footnote.
