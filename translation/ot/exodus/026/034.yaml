theological_decisions:
- issue: Whether to preserve traditional sanctuary terminology or render more dynamically
  chosen_reading: Use 'mercy seat' and 'Most Holy Place' in the main text
  alternative_readings:
  - '''atonement cover'' for כַּפֹּרֶת'
  - '''Holy of Holies'' for קֹדֶשׁ הַקֳּדָשִׁים'
  rationale: The verse concerns tabernacle furniture and sacred space. The chosen
    renderings balance recognizability and readability without importing extra doctrinal
    claims. Alternatives are preserved where they may aid auditability or readers
    familiar with traditional phrasing.
  doctrine_reference: Translation philosophy §§1, 5, 6
