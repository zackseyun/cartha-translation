id: EXO.26.12
reference: Exodus 26:12
source:
  edition: WLC
  text: וְ/סֶ֨רַח֙ הָ/עֹדֵ֔ף בִּ/ירִיעֹ֖ת הָ/אֹ֑הֶל חֲצִ֤י הַ/יְרִיעָה֙ הָ/עֹדֶ֔פֶת
    תִּסְרַ֕ח עַ֖ל אֲחֹרֵ֥י הַ/מִּשְׁכָּֽן׃
translation:
  text: And the overhang that remains from the tent curtains—the half curtain that
    remains over—shall hang over the back of the tabernacle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the surplus that is left from the tent curtains.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew distinguishes between 'the tent' (the covering layer) and 'the
      tabernacle' (the dwelling structure).
    reason: cultural_note
lexical_decisions:
- source_word: סֶרַח
  chosen: overhang
  alternatives:
  - surplus
  - that which hangs over
  lexicon: HALOT
  rationale: The noun denotes an excess or projecting remainder. In this construction
    and architectural context, 'overhang' best captures both the idea of what remains
    and its hanging/protruding function.
- source_word: הָעֹדֵף
  chosen: that remains
  alternatives:
  - that is left over
  - that exceeds
  lexicon: HALOT
  rationale: From עודף, indicating what is left over or in excess. 'That remains'
    is idiomatic in English and fits the description of the extra material from the
    curtains.
- source_word: יְרִיעֹת
  chosen: curtains
  alternatives:
  - cloths
  - panels
  lexicon: HALOT
  rationale: In tabernacle contexts, יְרִיעָה refers to large fabric coverings. 'Curtains'
    is the standard and clearest architectural rendering in English.
- source_word: הָאֹהֶל
  chosen: the tent
  alternatives:
  - the tabernacle tent
  lexicon: HALOT
  rationale: Here אֹהֶל refers specifically to the tent covering layer distinct from
    the מִשְׁכָּן structure named later in the verse. Rendering it 'the tent' preserves
    the distinction.
- source_word: חֲצִי הַיְרִיעָה
  chosen: the half curtain
  alternatives:
  - half of the curtain
  lexicon: HALOT
  rationale: The construct phrase refers to half of one curtain breadth. 'The half
    curtain' is concise and natural while preserving the singular reference.
- source_word: הָעֹדֶפֶת
  chosen: that remains over
  alternatives:
  - that is left over
  - that extends beyond
  lexicon: HALOT
  rationale: The feminine participle modifies 'curtain' and again conveys excess/remainder.
    'That remains over' keeps the sense of surplus while echoing the spatial function.
- source_word: תִּסְרַח
  chosen: shall hang
  alternatives:
  - shall extend
  - shall hang down
  - shall spread
  lexicon: HALOT
  rationale: The verb from סרח in this context describes the extra portion hanging
    down or extending. 'Shall hang' best matches the physical image and the related
    noun 'overhang' earlier in the verse.
- source_word: עַל אֲחֹרֵי
  chosen: over the back of
  alternatives:
  - at the rear of
  - behind
  lexicon: HALOT
  rationale: The preposition plus plural form of 'back/rear parts' indicates position
    over the rear side of the structure. 'Over the back of' fits the image of fabric
    hanging down the rear.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling
  - the dwelling place
  lexicon: HALOT
  rationale: מִשְׁכָּן is the technical term for the tabernacle/dwelling structure.
    'Tabernacle' is the clearest established English equivalent in this cultic context.
