id: EXO.26.29
reference: Exodus 26:29
source:
  edition: WLC
  text: וְֽ/אֶת הַ/קְּרָשִׁ֞ים תְּצַפֶּ֣ה זָהָ֗ב וְ/אֶת טַבְּעֹֽתֵי/הֶם֙ תַּעֲשֶׂ֣ה
    זָהָ֔ב בָּתִּ֖ים לַ/בְּרִיחִ֑ם וְ/צִפִּיתָ֥ אֶת הַ/בְּרִיחִ֖ם זָהָֽב־־־׃
translation:
  text: You shall overlay the frames with gold, and you shall make their rings of
    gold as holders for the bars, and you shall overlay the bars with gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'houses for the bars,' that is, receptacles or holders
      for the bars.
    reason: lexical_alternative
  - marker: b
    text: Or 'boards' for 'frames.' The Hebrew refers to the structural pieces of
      the tabernacle.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקְּרָשִׁים
  chosen: the frames
  alternatives:
  - the boards
  - the planks
  lexicon: HALOT
  rationale: קֶרֶשׁ in tabernacle contexts refers to the structural upright pieces.
    'Frames' communicates their function in the sanctuary structure more naturally
    than 'boards,' while remaining close to the Hebrew.
- source_word: תְּצַפֶּה / וְצִפִּיתָ
  chosen: you shall overlay
  alternatives:
  - you shall cover
  - you shall plate
  lexicon: HALOT
  rationale: צפה in the piel here denotes overlaying or plating with a material, not
    merely covering in a general sense. 'Overlay' preserves the craftsmanship sense
    used for tabernacle furnishings.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Straightforward material term; repeated three times in Hebrew and retained
    each time in English for clarity and emphasis.
- source_word: טַבְּעֹתֵיהֶם
  chosen: their rings
  lexicon: HALOT
  rationale: טַבַּעַת commonly means a ring, here the metal rings attached to the
    frames.
- source_word: תַּעֲשֶׂה
  chosen: you shall make
  alternatives:
  - you shall fashion
  lexicon: HALOT
  rationale: עשה is the common verb 'make/do.' 'Make' is the most direct and idiomatic
    rendering here.
- source_word: בָּתִּים לַבְּרִיחִם
  chosen: as holders for the bars
  alternatives:
  - as housings for the bars
  - as sockets for the bars
  lexicon: HALOT
  rationale: Literally 'houses for the bars.' In this construction, בָּתִּים refers
    to receptacles or holders into which the bars fit. 'Holders' gives the functional
    sense in clear modern English; 'housings' is more literal but less natural.
- source_word: הַבְּרִיחִם
  chosen: the bars
  alternatives:
  - the crossbars
  lexicon: HALOT
  rationale: בְּרִיחַ denotes the bars used to hold the frames together. 'Bars' is
    accurate and sufficiently clear in context; 'crossbars' is possible but slightly
    more interpretive.
