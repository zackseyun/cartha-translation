id: EXO.26.37
reference: Exodus 26:37
source:
  edition: WLC
  text: וְ/עָשִׂ֣יתָ לַ/מָּסָ֗ךְ חֲמִשָּׁה֙ עַמּוּדֵ֣י שִׁטִּ֔ים וְ/צִפִּיתָ֤ אֹתָ/ם֙
    זָהָ֔ב וָוֵי/הֶ֖ם זָהָ֑ב וְ/יָצַקְתָּ֣ לָ/הֶ֔ם חֲמִשָּׁ֖ה אַדְנֵ֥י נְחֹֽשֶׁת׃ס
translation:
  text: And you shall make for the screen five pillars of acacia wood, and overlay
    them with gold; their hooks shall be of gold; and you shall cast for them five
    bases of bronze.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'curtain' or 'veil' for 'screen'; the Hebrew term here refers to the
      entrance hanging, distinct from the inner veil of the Most Holy Place.
    reason: lexical_alternative
  - marker: b
    text: Or 'sockets of bronze' for 'bases of bronze.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מָּסָךְ
  chosen: screen
  alternatives:
  - curtain
  - veil
  lexicon: HALOT
  rationale: Refers here to the entrance hanging of the tabernacle rather than the
    inner veil. 'Screen' distinguishes it from the inner partition and matches the
    functional sense of an entrance covering.
- source_word: עַמּוּדֵי שִׁטִּים
  chosen: pillars of acacia wood
  alternatives:
  - posts of acacia wood
  lexicon: HALOT
  rationale: עַמּוּדִים commonly denotes pillars/columns; 'pillars' fits tabernacle
    structural language in English. שִׁטִּים is the acacia wood used throughout these
    instructions.
- source_word: וְצִפִּיתָ אֹתָם זָהָב
  chosen: overlay them with gold
  alternatives:
  - cover them with gold
  - plate them with gold
  lexicon: HALOT
  rationale: צפה in this construction means to overlay or plate with a metal covering.
    'Overlay' is a standard, clear rendering for cultic furnishing instructions.
- source_word: וָוֵיהֶם
  chosen: their hooks
  alternatives:
  - their pegs
  - their capitals/hooks
  lexicon: HALOT
  rationale: וָוִים in tabernacle contexts usually refers to hooks or pegs used in
    connection with hangings. 'Hooks' is the most common and likely sense here, especially
    with the screen hanging on the pillars.
- source_word: אַדְנֵי נְחֹשֶׁת
  chosen: bases of bronze
  alternatives:
  - sockets of bronze
  - pedestals of bronze
  lexicon: HALOT
  rationale: אַדָן in tabernacle construction denotes the supporting base/socket for
    a pillar or frame. 'Bases' is natural English; 'bronze' is preferred over 'brass'
    for נְחֹשֶׁת in ancient metallurgy.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  - brass
  lexicon: HALOT
  rationale: In tabernacle material descriptions, נְחֹשֶׁת is best rendered 'bronze'
    in modern English; 'brass' is historically traditional but metallurgically misleading.
- source_word: וְיָצַקְתָּ לָהֶם
  chosen: you shall cast for them
  alternatives:
  - you shall pour for them
  - you shall cast them
  lexicon: HALOT
  rationale: יצק refers to casting metal objects. The preposition לָהֶם indicates
    these bases are cast for the pillars, not that the pillars themselves are cast.
