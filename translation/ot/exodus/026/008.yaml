id: EXO.26.8
reference: Exodus 26:8
source:
  edition: WLC
  text: אֹ֣רֶךְ הַ/יְרִיעָ֣ה הָֽ/אַחַ֗ת שְׁלֹשִׁים֙ בָּֽ/אַמָּ֔ה וְ/רֹ֨חַב֙ אַרְבַּ֣ע
    בָּ/אַמָּ֔ה הַ/יְרִיעָ֖ה הָ/אֶחָ֑ת מִדָּ֣ה אַחַ֔ת לְ/עַשְׁתֵּ֥י עֶשְׂרֵ֖ה יְרִיעֹֽת׀׃
translation:
  text: The length of each curtain shall be thirty cubits, and the width of each curtain
    four cubits; the eleven curtains shall have one measure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the curtain, the one' ... 'the curtain, the one'; Hebrew
      uses this form distributively, meaning each individual curtain.
    reason: lexical_alternative
  - marker: b
    text: Or 'the same measure.' The Hebrew phrase is literally 'one measure,' emphasizing
      that all eleven curtains were made to identical dimensions.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹרֶךְ
  chosen: length
  alternatives:
  - long side
  - measurement in length
  lexicon: HALOT
  rationale: Standard architectural/material term here, paired with רֹחַב ('width'),
    so 'length' is the natural English equivalent.
- source_word: יְרִיעָה
  chosen: curtain
  alternatives:
  - panel
  - sheet
  lexicon: HALOT
  rationale: In tabernacle contexts יְרִיעָה refers to a large fabric hanging or covering
    piece. 'Curtain' is the established and contextually clear rendering in English,
    more natural than 'sheet' and less ambiguous than 'panel'.
- source_word: הָאַחַת / הָאֶחָת
  chosen: each
  alternatives:
  - the one
  - one
  lexicon: HALOT
  rationale: Although literally 'the one,' in distributive measurement context English
    idiom is best expressed by 'each curtain,' preserving the sense that every individual
    curtain has the same dimensions.
- source_word: שְׁלֹשִׁים בָּאַמָּה
  chosen: thirty cubits
  alternatives:
  - thirty in cubits
  - thirty cubit[s]
  lexicon: HALOT
  rationale: אַמָּה is the standard ancient unit 'cubit.' Retaining the source unit
    is more transparent than converting to modern measurements.
- source_word: רֹחַב
  chosen: width
  alternatives:
  - breadth
  lexicon: HALOT
  rationale: Paired with 'length'; 'width' is the clearest modern English equivalent.
- source_word: אַרְבַּע בָּאַמָּה
  chosen: four cubits
  alternatives:
  - four in cubits
  lexicon: HALOT
  rationale: Same unit logic as above; straightforward dimensional statement.
- source_word: מִדָּה אַחַת
  chosen: one measure
  alternatives:
  - the same measure
  - one size
  lexicon: HALOT
  rationale: Literally 'one measure.' This expresses uniformity among the curtains.
    'One measure' preserves the Hebrew wording more closely, while still being understandable
    in English.
- source_word: לְעַשְׁתֵּי עֶשְׂרֵה יְרִיעֹת
  chosen: the eleven curtains
  alternatives:
  - for the eleven curtains
  - with respect to the eleven curtains
  lexicon: HALOT
  rationale: 'The phrase identifies the full set to which the uniform measurement
    applies. English smooths the prefixed לְ by making the eleven curtains the subject
    of the clause: ''the eleven curtains shall have one measure.'''
