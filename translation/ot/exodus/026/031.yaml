theological_decisions:
- issue: Rendering of cultic/tabernacle craftsmanship language without importing later
    theological symbolism
  chosen_reading: Translate the verse as a concrete instruction for tabernacle construction,
    using 'veil' and 'cherubim' in their immediate cultic sense.
  alternative_readings:
  - Use more symbolic wording that foregrounds later biblical/theological associations
    of the veil
  rationale: The verse itself gives architectural and artistic instructions. The translation
    should not import later theological interpretations into the main text, though
    those associations may be noted elsewhere in study materials rather than translation.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make.'
