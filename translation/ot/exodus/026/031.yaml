id: EXO.26.31
reference: Exodus 26:31
source:
  edition: WLC
  text: וְ/עָשִׂ֣יתָ פָרֹ֗כֶת תְּכֵ֧לֶת וְ/אַרְגָּמָ֛ן וְ/תוֹלַ֥עַת שָׁנִ֖י וְ/שֵׁ֣שׁ
    מָשְׁזָ֑ר מַעֲשֵׂ֥ה חֹשֵׁ֛ב יַעֲשֶׂ֥ה אֹתָ֖/הּ כְּרֻבִֽים׃
translation:
  text: And you shall make a veil of blue, purple, and scarlet yarn, and fine twisted
    linen; it shall be made with cherubim, the work of a skillful designer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'curtain.' The Hebrew term refers to the inner hanging that separated
      the holy place from the most holy place.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'scarlet' more literally refers to scarlet-dyed material; traditionally
      associated with dye derived from insects.
    reason: cultural_note
  - marker: c
    text: Or 'the work of an artistic weaver' or 'skillfully worked.' The Hebrew expression
      denotes expert artistic craftsmanship.
    reason: lexical_alternative
lexical_decisions:
- source_word: פָרֹכֶת
  chosen: veil
  alternatives:
  - curtain
  lexicon: HALOT
  rationale: Refers to the inner hanging that separates the holy place from the most
    holy place. 'Veil' is the established and contextually precise English term for
    this cultic divider, while 'curtain' is possible but less specific.
- source_word: תְּכֵלֶת
  chosen: blue
  alternatives:
  - blue yarn
  - blue-purple
  lexicon: HALOT
  rationale: The term denotes a prestigious dyed textile color, traditionally rendered
    'blue.' Because the verse lists materials/colors for fabric construction, 'blue'
    communicates the sense clearly in modern English; 'yarn' is supplied at the phrase
    level rather than repeated after each color term.
- source_word: אַרְגָּמָן
  chosen: purple
  alternatives:
  - purple yarn
  lexicon: HALOT
  rationale: Standard rendering for the luxury dye/color term in tabernacle descriptions.
    As with the surrounding color terms, the material sense is carried by the collective
    English phrase 'blue, purple, and scarlet yarn.'
- source_word: תוֹלַעַת שָׁנִי
  chosen: scarlet yarn
  alternatives:
  - scarlet
  - crimson yarn
  lexicon: HALOT
  rationale: This expression refers to scarlet-dyed material, historically associated
    with worm-derived dye. 'Scarlet yarn' is natural English in this tabernacle-material
    list and makes explicit the textile sense implied by the sequence of materials.
- source_word: שֵׁשׁ מָשְׁזָר
  chosen: fine twisted linen
  alternatives:
  - finely twisted linen
  - fine linen, twisted
  lexicon: HALOT
  rationale: שֵׁשׁ denotes fine linen and מָשְׁזָר indicates twisted/spun quality.
    'Fine twisted linen' preserves both the material and the crafted quality in readable
    English.
- source_word: מַעֲשֵׂה חֹשֵׁב
  chosen: the work of a skillful designer
  alternatives:
  - skillfully worked
  - the work of an artistic weaver
  - embroidered work
  lexicon: HALOT
  rationale: The phrase denotes skilled artistic workmanship, not merely generic manufacture.
    'The work of a skillful designer' captures intentional crafted artistry without
    overcommitting to a specific modern trade term. 'Embroidered work' is too narrow
    here.
- source_word: יַעֲשֶׂה אֹתָהּ
  chosen: it shall be made
  alternatives:
  - one shall make it
  - you shall make it
  lexicon: HALOT
  rationale: The Hebrew shifts from second person command ('you shall make') to a
    third masculine singular verb with feminine object ('he/it shall make it'), a
    common impersonal/passive-like instruction style in English. 'It shall be made'
    renders the construction naturally while preserving the instructional force.
- source_word: כְּרֻבִים
  chosen: with cherubim
  alternatives:
  - featuring cherubim
  - with cherub figures
  lexicon: HALOT
  rationale: The cherubim are part of the veil's design. 'With cherubim' is concise
    and sufficiently literal; 'featuring cherubim' is interpretive but possible. 'Cherubim'
    is retained as the conventional English plural form for these heavenly beings.
