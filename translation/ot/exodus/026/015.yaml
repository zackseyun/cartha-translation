  from: the frames for the tabernacle of acacia wood, standing upright
  to: the upright frames of acacia wood for the tabernacle
  rationale: 'The current word order, while closely following the Hebrew, creates a minor but real ambiguity: ''of acacia wood'' could momentarily be read as modifying ''tabernacle'' instead of ''frames''. Furthermore, the final phrase '', standing upright'' feels tacked on. Reordering the elements to ''the upright frames of acacia wood for the tabernacle'' resolves the ambiguity, integrates the Hebrew participle (''standing'') more naturally as a pre-modifying adjective (''upright''), and creates a clearer, more idiomatic English sentence without losing any semantic content.'
