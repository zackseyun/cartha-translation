id: EXO.26.15
reference: Exodus 26:15
source:
  edition: WLC
  text: וְ/עָשִׂ֥יתָ אֶת הַ/קְּרָשִׁ֖ים לַ/מִּשְׁכָּ֑ן עֲצֵ֥י שִׁטִּ֖ים עֹמְדִֽים־׃
translation:
  text: And you shall make the upright frames of acacia wood for the tabernacle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'boards' for 'frames'; the Hebrew term refers to the tabernacle's structural wooden elements.
    reason: lexical_alternative
  - marker: b
    text: Or 'the frames for the tabernacle of acacia wood, standing upright'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: And you shall make
  alternatives:
  - And you are to make
  - Then you shall make
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional sequence functions as an imperative/future command. 'You shall make' is natural modern English for this construction in legal/cultic instructions; 'And' preserves the sequential waw.
- source_word: הַקְּרָשִׁים
  chosen: the frames
  alternatives:
  - the boards
  - the planks
  lexicon: HALOT
  rationale: קְרָשִׁים in tabernacle construction refers to the structural upright elements. 'Frames' better reflects their architectural function in context than the traditional but potentially misleading 'boards,' while remaining concrete and readable.
- source_word: לַמִּשְׁכָּן
  chosen: for the tabernacle
  alternatives:
  - for the dwelling
  - for the tent dwelling
  lexicon: HALOT
  rationale: מִשְׁכָּן is the technical term for the sanctuary structure in Exodus. 'Tabernacle' is the established and contextually precise English equivalent here, preferable to the more generic 'dwelling'.
- source_word: עֲצֵי שִׁטִּים
  chosen: of acacia wood
  alternatives:
  - of acacia-wood
  - of wood of acacia
  - of shittim wood
  lexicon: HALOT
  rationale: Construct chain meaning wood from the acacia tree(s). 'Acacia wood' is idiomatic modern English and preferable to the archaic transliteration 'shittim wood.' The preposition 'of' in English naturally links the material to the frames.
- source_word: עֹמְדִים
  chosen: standing upright
  alternatives:
  - standing
  - set upright
  - upright
  lexicon: HALOT
  rationale: Participle describes the orientation/position of the frames. 'Standing upright' makes explicit the architectural sense and reads smoothly in English without losing the participial nuance.
