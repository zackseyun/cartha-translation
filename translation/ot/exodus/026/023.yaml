id: EXO.26.23
reference: Exodus 26:23
source:
  edition: WLC
  text: וּ/שְׁנֵ֤י קְרָשִׁים֙ תַּעֲשֶׂ֔ה לִ/מְקֻצְעֹ֖ת הַ/מִּשְׁכָּ֑ן בַּ/יַּרְכָתָֽיִם׃
translation:
  text: And you shall make two boards for the corners of the tabernacle at the rear
    corners.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the corner-pieces of the tabernacle, at the two rear parts.' The
      Hebrew terms are architectural and somewhat technical.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁנֵי
  chosen: And ... two
  alternatives:
  - and two
  lexicon: HALOT
  rationale: The conjunction plus construct form of 'two' introduces the next construction
    item in sequence. English naturally renders this as 'And ... two' or 'And two
    ...'; the finite verb later governs the phrase.
- source_word: קְרָשִׁים
  chosen: boards
  alternatives:
  - frames
  - planks
  lexicon: HALOT
  rationale: In tabernacle construction contexts, קֶרֶשׁ refers to the structural
    wooden units forming the walls. 'Boards' is the most established and sufficiently
    precise modern rendering; 'frames' is more interpretive and 'planks' may suggest
    thinner pieces than intended.
- source_word: תַּעֲשֶׂה
  chosen: you shall make
  alternatives:
  - you are to make
  - make
  lexicon: HALOT
  rationale: Second masculine singular imperfect of עשה in instructional material
    is well rendered as an imperative-future, 'you shall make,' preserving the directive
    force of the Hebrew.
- source_word: לִ/מְקֻצְעֹת
  chosen: for the corners
  alternatives:
  - for the corner-pieces
  - for the angles
  lexicon: HALOT
  rationale: The noun denotes corners or angular joining points. In this architectural
    context, 'for the corners' is clear and avoids over-specifying a technical sense
    not explicit in the Hebrew.
- source_word: הַ/מִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling
  - the dwelling place
  lexicon: HALOT
  rationale: מִשְׁכָּן in Exodus is the established term for the sacred tent-sanctuary.
    'Tabernacle' remains the clearest concise English equivalent in this cultic context,
    though literally it is a dwelling place.
- source_word: בַּ/יַּרְכָתָיִם
  chosen: at the rear corners
  alternatives:
  - in the far back part
  - at the two back parts
  - at the extreme rear
  lexicon: HALOT
  rationale: The dual form of יַרְכָה refers to the two rear extremities/sides. Because
    the verse already speaks of corners, the phrase locates them at the back of the
    tabernacle. 'At the rear corners' captures both the dual/back sense and the architectural
    function in idiomatic English.
