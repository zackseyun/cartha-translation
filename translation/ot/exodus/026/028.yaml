id: EXO.26.28
reference: Exodus 26:28
source:
  edition: WLC
  text: וְ/הַ/בְּרִ֥יחַ הַ/תִּיכֹ֖ן בְּ/ת֣וֹךְ הַ/קְּרָשִׁ֑ים מַבְרִ֕חַ מִן הַ/קָּצֶ֖ה
    אֶל הַ/קָּצֶֽה־־׃
translation:
  text: And the middle bar, in the midst of the frames, shall pass through from end
    to end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'boards' instead of 'frames.' The Hebrew term refers to the tabernacle's
      upright structural pieces; 'frames' is chosen here to avoid implying simple
      flat planks.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבְּרִיחַ
  chosen: bar
  alternatives:
  - crossbar
  - bolt
  lexicon: HALOT
  rationale: בְּרִיחַ in tabernacle construction contexts denotes a bar used to hold
    the frames together. 'Bar' is the most natural architectural term in English here;
    'bolt' is possible lexically but sounds too much like a door-fastening in this
    context.
- source_word: הַתִּיכֹן
  chosen: middle
  alternatives:
  - central
  - inner
  lexicon: HALOT
  rationale: The adjective identifies this as the bar positioned between the others.
    'Middle' is the clearest and most idiomatic rendering in English for the tabernacle
    description.
- source_word: בְּתוֹךְ
  chosen: in the midst of
  alternatives:
  - through the middle of
  - inside
  lexicon: HALOT
  rationale: בְּתוֹךְ marks location within or among the frames. 'In the midst of'
    preserves the spatial sense without over-specifying mechanics.
- source_word: הַקְּרָשִׁים
  chosen: frames
  alternatives:
  - boards
  - planks
  lexicon: HALOT
  rationale: קְרָשִׁים in the tabernacle account refers to the upright structural
    members. 'Frames' better reflects likely construction than the traditional 'boards,'
    which can suggest flat lumber rather than substantial supports. This follows original-language
    primacy over translation tradition.
- source_word: מַבְרִחַ
  chosen: shall pass through
  alternatives:
  - running through
  - extending through
  lexicon: HALOT
  rationale: The participle from ברח in the Hiphil here describes the bar traversing
    the structure from one extremity to the other. 'Shall pass through' gives a clear
    English verbal sense in context and fits the instructional style.
- source_word: מִן הַקָּצֶה אֶל הַקָּצֶה
  chosen: from end to end
  alternatives:
  - from one end to the other
  - from extremity to extremity
  lexicon: HALOT
  rationale: This idiom expresses full extension across the length. 'From end to end'
    is concise, natural English and preserves the total-span sense.
