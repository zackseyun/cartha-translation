id: EXO.26.18
reference: Exodus 26:18
source:
  edition: WLC
  text: וְ/עָשִׂ֥יתָ אֶת הַ/קְּרָשִׁ֖ים לַ/מִּשְׁכָּ֑ן עֶשְׂרִ֣ים קֶ֔רֶשׁ לִ/פְאַ֖ת
    נֶ֥גְבָּ/ה תֵימָֽנָ/ה־׃
translation:
  text: 'And you shall make the frames for the tabernacle: twenty frames for the south
    side, southward.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'boards' instead of 'frames'; the Hebrew term refers to the structural
      pieces of the tabernacle and may be understood either way in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: And you shall make
  alternatives:
  - And you are to make
  - And make
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional context functions
    as an imperative/future command. 'You shall make' preserves the directive force
    in natural English.
- source_word: הַקְּרָשִׁים
  chosen: the frames
  alternatives:
  - the boards
  - the planks
  lexicon: HALOT
  rationale: קֶרֶשׁ in tabernacle construction refers to the upright structural members.
    'Frames' fits the likely function better in modern English than 'boards,' while
    remaining concrete and not overly interpretive.
- source_word: לַמִּשְׁכָּן
  chosen: for the tabernacle
  alternatives:
  - for the dwelling
  - for the dwelling place
  lexicon: HALOT
  rationale: מִשְׁכָּן is the standard term for the sanctuary structure in Exodus.
    'Tabernacle' is the established and contextually precise English rendering here.
- source_word: עֶשְׂרִים קֶרֶשׁ
  chosen: twenty frames
  alternatives:
  - twenty boards
  lexicon: HALOT
  rationale: 'The numeral plus singular noun is a normal Hebrew counting construction.
    English idiom requires plural: ''twenty frames.'''
- source_word: לִפְאַת
  chosen: for the side
  alternatives:
  - for the edge
  - for the corner/quarter
  lexicon: HALOT
  rationale: פֵאָה can denote side, edge, or extremity. In architectural description,
    'side' best fits the spatial sense.
- source_word: נֶגְבָּה תֵימָנָה
  chosen: the south side, southward
  alternatives:
  - the Negev side, toward the south
  - the southern side
  lexicon: HALOT
  rationale: The paired directional terms intensify/specify the southern orientation.
    Rendering both as 'the south side, southward' preserves the Hebrew fullness better
    than collapsing them into a single adjective.
