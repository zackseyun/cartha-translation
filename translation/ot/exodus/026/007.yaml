id: EXO.26.7
reference: Exodus 26:7
source:
  edition: WLC
  text: וְ/עָשִׂ֨יתָ֙ יְרִיעֹ֣ת עִזִּ֔ים לְ/אֹ֖הֶל עַל הַ/מִּשְׁכָּ֑ן עַשְׁתֵּי עֶשְׂרֵ֥ה
    יְרִיעֹ֖ת תַּעֲשֶׂ֥ה אֹתָֽ/ם־־׃
translation:
  text: You shall make curtains of goats’ hair for a tent over the tabernacle; you
    shall make them as eleven curtains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'curtains of goats.' The Hebrew uses 'goats' to denote material
      from goats, that is, goat hair.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: You shall make
  alternatives:
  - And you shall make
  - You are to make
  lexicon: HALOT
  rationale: Qal with prefixed conjunction in instructional sequence; English imperative-future
    style 'you shall make' fits the legal/cultic register and preserves the direct
    command to Moses.
- source_word: יְרִיעֹת
  chosen: curtains
  alternatives:
  - cloths
  - panels
  lexicon: HALOT
  rationale: In tabernacle construction contexts, יְרִיעָה refers to large fabric
    hangings or curtain-panels. 'Curtains' is the most natural and established English
    rendering without becoming overly technical.
- source_word: עִזִּים
  chosen: goats’ hair
  alternatives:
  - goats
  - goat hair
  lexicon: HALOT
  rationale: Though literally 'goats,' in this construction the sense is the material
    made from goats, i.e., goat hair fabric. Supplying 'hair' makes the material sense
    explicit in idiomatic English and matches the tabernacle-text context.
- source_word: לְאֹהֶל
  chosen: for a tent
  alternatives:
  - for the tent
  - as a tent
  lexicon: HALOT
  rationale: 'The preposition ל marks purpose/result: the curtains are made for use
    as a tent covering. The anarthrous noun is well represented by ''for a tent''
    rather than ''for the tent.'''
- source_word: עַל הַמִּשְׁכָּן
  chosen: over the tabernacle
  alternatives:
  - over the dwelling
  - above the tabernacle
  lexicon: HALOT
  rationale: עַל indicates position over/above, and מִשְׁכָּן in Exodus is the technical
    term for the sanctuary structure. 'Tabernacle' preserves the established cultic
    sense better than the more generic 'dwelling' here.
- source_word: עַשְׁתֵּי עֶשְׂרֵה
  chosen: eleven
  alternatives:
  - eleven in number
  lexicon: HALOT
  rationale: The compound numeral straightforwardly means 'eleven.' English idiom
    prefers the simple cardinal form.
- source_word: יְרִיעֹת תַּעֲשֶׂה אֹתָם
  chosen: you shall make them as eleven curtains
  alternatives:
  - you shall make eleven curtains of them
  - you shall make them, eleven curtains
  lexicon: HALOT
  rationale: 'The Hebrew repeats ''curtains'' after the numeral for emphasis/specification.
    English smooths this by rendering the total count predicatively: ''make them as
    eleven curtains,'' preserving both the repetition''s force and natural readability.'
