id: EXO.26.25
reference: Exodus 26:25
source:
  edition: WLC
  text: וְ/הָיוּ֙ שְׁמֹנָ֣ה קְרָשִׁ֔ים וְ/אַדְנֵי/הֶ֣ם כֶּ֔סֶף שִׁשָּׁ֥ה עָשָׂ֖ר אֲדָנִ֑ים
    שְׁנֵ֣י אֲדָנִ֗ים תַּ֚חַת הַ/קֶּ֣רֶשׁ הָ/אֶחָ֔ד וּ/שְׁנֵ֣י אֲדָנִ֔ים תַּ֖חַת הַ/קֶּ֥רֶשׁ
    הָ/אֶחָֽד׃
translation:
  text: 'There shall be eight frames, with their silver bases: sixteen bases, two
    bases under one frame and two bases under the next frame.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'boards' for 'frames.'
    reason: lexical_alternative
  - marker: b
    text: Or 'sockets' for 'bases.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קְרָשִׁים
  chosen: frames
  alternatives:
  - boards
  - planks
  lexicon: HALOT
  rationale: In tabernacle-construction contexts, the term refers to the upright structural
    members. 'Frames' communicates their architectural function in natural modern
    English better than the more traditional 'boards,' while remaining close to the
    source.
- source_word: אַדְנֵי/הֶם ... אֲדָנִים
  chosen: bases
  alternatives:
  - sockets
  - pedestals
  lexicon: HALOT
  rationale: The noun denotes the supporting pieces beneath the frames. 'Bases' is
    clear and broadly understandable; 'sockets' is a viable traditional alternative,
    but 'bases' better fits contemporary English without losing the construction sense.
- source_word: כֶּסֶף
  chosen: silver
  lexicon: HALOT
  rationale: Straightforward material designation for the bases.
- source_word: שִׁשָּׁה עָשָׂר
  chosen: sixteen
  lexicon: HALOT
  rationale: Standard English rendering of the cardinal number.
- source_word: תַּחַת
  chosen: under
  alternatives:
  - beneath
  lexicon: HALOT
  rationale: Direct spatial rendering appropriate for construction instructions.
- source_word: הַקֶּרֶשׁ הָאֶחָד
  chosen: one frame
  alternatives:
  - the one frame
  - the first frame
  lexicon: HALOT
  rationale: The Hebrew repeats 'the one frame' in distributive fashion. In English,
    'one frame' followed by 'the next frame' conveys the intended allocation of two
    bases per frame more naturally than repeating 'the one frame' twice, while preserving
    the sense.
- source_word: וְהָיוּ
  chosen: There shall be
  alternatives:
  - and there shall be
  - and they shall be
  lexicon: HALOT
  rationale: Idiomatic existential rendering in English for inventory/specification
    language. The prefixed conjunction is not always best represented with a separate
    'and' in English when the clause begins a specification statement.
