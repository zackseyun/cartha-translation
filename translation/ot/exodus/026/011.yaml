id: EXO.26.11
reference: Exodus 26:11
source:
  edition: WLC
  text: וְ/עָשִׂ֛יתָ קַרְסֵ֥י נְחֹ֖שֶׁת חֲמִשִּׁ֑ים וְ/הֵבֵאתָ֤ אֶת הַ/קְּרָסִים֙
    בַּ/לֻּ֣לָאֹ֔ת וְ/חִבַּרְתָּ֥ אֶת הָ/אֹ֖הֶל וְ/הָיָ֥ה אֶחָֽד־־׃
translation:
  text: And you shall make fifty bronze clasps, and bring the clasps into the loops,
    and join the tent together, so that it may be one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'copper clasps.' The Hebrew נְחֹשֶׁת can refer to copper or bronze, depending
      on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'put the clasps into the loops.'
    reason: lexical_alternative
  - marker: c
    text: That is, the separate sections are to form one unified tent.
    reason: cultural_note
lexical_decisions:
- source_word: קַרְסֵי נְחֹשֶׁת
  chosen: bronze clasps
  alternatives:
  - copper clasps
  - bronze hooks
  lexicon: HALOT
  rationale: קַרְסִים refers to fastening pieces used to connect curtains; 'clasps'
    fits the tabernacle-construction context better than the broader 'hooks.' נְחֹשֶׁת
    can denote copper or bronze; 'bronze' is the conventional and likely contextual
    rendering for tabernacle metalwork.
- source_word: חֲמִשִּׁים
  chosen: fifty
  rationale: Straightforward cardinal number modifying 'clasps.'
- source_word: וְהֵבֵאתָ אֶת הַקְּרָסִים בַּלֻּלָאֹת
  chosen: bring the clasps into the loops
  alternatives:
  - put the clasps into the loops
  - insert the clasps in the loops
  lexicon: HALOT
  rationale: The hiphil of בוא here has the sense of causing the clasps to go into
    place; 'bring ... into' is slightly more formal but natural. לֻלָאֹת are the loops
    sewn on the curtain edges.
- source_word: וְחִבַּרְתָּ אֶת הָאֹהֶל
  chosen: join the tent together
  alternatives:
  - couple the tent together
  - fasten the tent together
  - join the tabernacle together
  lexicon: HALOT
  rationale: חבר means to join/connect. הָאֹהֶל here refers to the tent structure
    formed by these coverings, not merely a generic tent. 'Join the tent together'
    preserves the construction imagery and the object named in the Hebrew.
- source_word: וְהָיָה אֶחָד
  chosen: so that it may be one
  alternatives:
  - and it shall be one
  - and it will become one
  lexicon: HALOT
  rationale: The clause expresses the result of joining the sections. English idiom
    is improved by making the result explicit with 'so that,' while preserving the
    sense that the tent becomes a single unified whole.
