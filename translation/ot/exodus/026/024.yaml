id: EXO.26.24
reference: Exodus 26:24
source:
  edition: WLC
  text: וְ/יִֽהְי֣וּ תֹֽאֲמִים֮ מִ/לְּ/מַטָּה֒ וְ/יַחְדָּ֗ו יִהְי֤וּ תַמִּים֙ עַל
    רֹאשׁ֔/וֹ אֶל הַ/טַּבַּ֖עַת הָ/אֶחָ֑ת כֵּ֚ן יִהְיֶ֣ה לִ/שְׁנֵי/הֶ֔ם לִ/שְׁנֵ֥י
    הַ/מִּקְצֹעֹ֖ת יִהְיֽוּ־־׃
translation:
  text: They shall be paired at the bottom, and together they shall be complete at
    its top, up to the one ring. So it shall be for both of them; they shall be for
    the two corners.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'twinned' or 'matching' at the bottom; the Hebrew describes the two boards
      as forming a matched pair.
    reason: lexical_alternative
  - marker: b
    text: Or 'whole' or 'perfectly fitted' at its top; the Hebrew term emphasizes
      structural completeness here, not moral perfection.
    reason: lexical_alternative
  - marker: c
    text: Or 'to the single ring'; the phrase may refer to the ring that joins the
      paired boards at the top.
    reason: lexical_alternative
lexical_decisions:
- source_word: תֹאֲמִים
  chosen: paired
  alternatives:
  - twinned
  - matching
  - double
  lexicon: HALOT
  rationale: The adjective from the root associated with being in pairs indicates
    that the boards are matched as a pair. 'Paired' is natural English in this construction
    and fits the architectural context better than the more literal but less idiomatic
    'twinned.'
- source_word: מִלְּמַטָּה
  chosen: at the bottom
  alternatives:
  - from below
  - beneath
  lexicon: HALOT
  rationale: The phrase marks the lower end of the boards. 'At the bottom' communicates
    the spatial sense clearly in English; 'from below' is possible but less natural
    in this descriptive instruction.
- source_word: וְיַחְדָּו
  chosen: together
  alternatives:
  - jointly
  - as one
  lexicon: HALOT
  rationale: The adverb emphasizes the two boards functioning in unison. 'Together'
    is the clearest modern equivalent.
- source_word: תַמִּים
  chosen: complete
  alternatives:
  - whole
  - finished
  - perfectly fitted
  lexicon: HALOT
  rationale: In this construction the sense is not moral perfection but structural
    completeness/integrity. 'Complete' preserves that sense without overinterpreting
    the exact carpentry method.
- source_word: עַל רֹאשׁוֹ
  chosen: at its top
  alternatives:
  - at its head
  - on its top
  lexicon: HALOT
  rationale: '''Head'' here is an idiom for the upper end of the board structure.
    English architectural style prefers ''top.'' The singular suffix is retained as
    a collective/representative singular referring to the paired construction.'
- source_word: אֶל הַטַּבַּעַת הָאֶחָת
  chosen: up to the one ring
  alternatives:
  - to the first ring
  - to the single ring
  lexicon: HALOT
  rationale: The phrase likely refers to the ring at the top where the paired boards
    are joined. 'The one ring' follows the Hebrew article plus numeral closely. 'First
    ring' is interpretive and less certain.
- source_word: כֵּן יִהְיֶה לִשְׁנֵיהֶם
  chosen: So it shall be for both of them
  alternatives:
  - Thus it shall be for the two of them
  - This is how it shall be for both
  lexicon: HALOT
  rationale: This clause summarizes the prescribed construction for the pair of boards.
    'Both of them' is straightforward and idiomatic.
- source_word: לִשְׁנֵי הַמִּקְצֹעֹת
  chosen: for the two corners
  alternatives:
  - for the two corner pieces
  - for the two back corners
  lexicon: HALOT
  rationale: מִקְצֹעֹת refers to corners or corner-joins. 'The two corners' is the
    most direct rendering. More specific expansions such as 'back corners' depend
    on the wider context and are not required by this verse alone.
