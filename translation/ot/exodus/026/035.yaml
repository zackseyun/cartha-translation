id: EXO.26.35
reference: Exodus 26:35
source:
  edition: WLC
  text: וְ/שַׂמְתָּ֤ אֶת הַ/שֻּׁלְחָן֙ מִ/ח֣וּץ לַ/פָּרֹ֔כֶת וְ/אֶת הַ/מְּנֹרָה֙ נֹ֣כַח
    הַ/שֻּׁלְחָ֔ן עַ֛ל צֶ֥לַע הַ/מִּשְׁכָּ֖ן תֵּימָ֑נָ/ה וְ/הַ֨/שֻּׁלְחָ֔ן תִּתֵּ֖ן
    עַל צֶ֥לַע צָפֽוֹן־־־׃
translation:
  text: And you shall place the table outside the veil, and the lampstand opposite
    the table on the south side of the tabernacle; and you shall put the table on
    the north side.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'outside the curtain.' The Hebrew פָּרֹכֶת denotes the inner partition
      of the tabernacle; 'veil' is retained as the more specific traditional equivalent.
    reason: lexical_alternative
  - marker: b
    text: Hebrew menorah; translated 'lampstand' rather than transliterated to preserve
      meaning in English.
    reason: cultural_note
lexical_decisions:
- source_word: שַׂמְתָּ
  chosen: you shall place
  alternatives:
  - you shall set
  - you shall put
  lexicon: HALOT
  rationale: שׂוּם commonly means 'put, place, set.' 'Place' is natural modern English
    and fits the instruction of positioning tabernacle furniture.
- source_word: הַשֻּׁלְחָן
  chosen: the table
  alternatives:
  - the table of the bread of the Presence
  lexicon: HALOT
  rationale: The noun itself is simply 'table.' The fuller identification is contextually
    known from surrounding passages but is not stated here, so the translation keeps
    the simple form.
- source_word: מִחוּץ לַפָּרֹכֶת
  chosen: outside the veil
  alternatives:
  - outside the curtain
  lexicon: HALOT
  rationale: פָּרֹכֶת refers to the inner partition veil of the tabernacle. 'Veil'
    is the established and contextually precise term here, while 'outside' accurately
    renders מִחוּץ.
- source_word: הַמְּנֹרָה
  chosen: the lampstand
  alternatives:
  - the menorah
  lexicon: HALOT
  rationale: Optimal equivalence favors translating the common noun rather than transliterating
    it. 'Lampstand' communicates the object clearly in English; 'menorah' is a possible
    cultural transliteration but less aligned with the stated philosophy.
- source_word: נֹכַח
  chosen: opposite
  alternatives:
  - in front of
  - facing
  lexicon: HALOT
  rationale: The term indicates corresponding position across from something. 'Opposite'
    best fits the spatial arrangement being described.
- source_word: עַל צֶלַע הַמִּשְׁכָּן תֵּימָנָה
  chosen: on the south side of the tabernacle
  alternatives:
  - on the south flank of the tabernacle
  - along the south side of the tabernacle
  lexicon: HALOT
  rationale: צֶלַע literally means 'side' or 'flank,' and תֵּימָנָה indicates the
    southward direction. 'South side of the tabernacle' is clear, accurate, and idiomatic.
- source_word: תִּתֵּן
  chosen: you shall put
  alternatives:
  - you shall place
  - you shall set
  lexicon: HALOT
  rationale: נָתַן is a broad verb meaning 'give, put, set.' In this furnishing context,
    'put' is straightforward and natural. Variation from 'place' avoids awkward repetition
    while preserving sense; the semantic overlap is close and contextually appropriate.
- source_word: עַל צֶלַע צָפוֹן
  chosen: on the north side
  alternatives:
  - along the north side
  - on the north flank
  lexicon: HALOT
  rationale: As above, צֶלַע denotes side/flank and צָפוֹן denotes north. 'North side'
    is the clearest English rendering for the spatial instruction.
