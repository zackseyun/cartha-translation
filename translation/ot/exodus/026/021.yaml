id: EXO.26.21
reference: Exodus 26:21
source:
  edition: WLC
  text: וְ/אַרְבָּעִ֥ים אַדְנֵי/הֶ֖ם כָּ֑סֶף שְׁנֵ֣י אֲדָנִ֗ים תַּ֚חַת הַ/קֶּ֣רֶשׁ
    הָֽ/אֶחָ֔ד וּ/שְׁנֵ֣י אֲדָנִ֔ים תַּ֖חַת הַ/קֶּ֥רֶשׁ הָ/אֶחָֽד׃
translation:
  text: 'and their forty bases shall be of silver: two bases under the one frame,
    and two bases under the one frame.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sockets' instead of 'bases'; the Hebrew term refers to the silver supports
      into which the tabernacle frames were set.
    reason: lexical_alternative
  - marker: b
    text: Traditionally 'board' instead of 'frame' for the Hebrew term describing
      each upright structural piece of the tabernacle.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַרְבָּעִים
  chosen: and ... forty
  alternatives:
  - and forty
  lexicon: HALOT
  rationale: The conjunction plus numeral continues the construction from the previous
    verse. English supplies a smoother clause structure with 'and their forty bases
    shall be...' while preserving the additive force of וְ and the cardinal number
    אַרְבָּעִים.
- source_word: אַדְנֵי/הֶם
  chosen: their bases
  alternatives:
  - their sockets
  - their pedestals
  lexicon: HALOT
  rationale: אֶדֶן in tabernacle construction refers to the supporting base/socket
    for the frames. 'Bases' is clear modern English and fits the architectural context.
    'Sockets' is possible, but 'bases' reads more naturally here.
- source_word: כָּסֶף
  chosen: of silver
  alternatives:
  - silver
  lexicon: HALOT
  rationale: The noun specifies the material composition of the bases. 'Of silver'
    is idiomatic English for construction material and reflects the Hebrew appositional/material
    use.
- source_word: שְׁנֵי אֲדָנִים
  chosen: two bases
  alternatives:
  - two sockets
  lexicon: HALOT
  rationale: The repeated phrase gives the number of supports under each frame. 'Bases'
    is kept consistent with the earlier rendering of אַדְנֵי/הֶם.
- source_word: תַּחַת
  chosen: under
  alternatives:
  - beneath
  lexicon: HALOT
  rationale: The preposition denotes physical position beneath each frame. 'Under'
    is the most direct and natural equivalent.
- source_word: הַ/קֶּרֶשׁ
  chosen: the ... frame
  alternatives:
  - the board
  - the plank
  lexicon: HALOT
  rationale: קֶרֶשׁ in the tabernacle context refers to the upright structural members.
    'Frame' better communicates function in contemporary English than 'board,' which
    may sound too flat or generic, though 'board' is a traditional rendering.
- source_word: הָאֶחָד
  chosen: the one
  alternatives:
  - one
  - each
  lexicon: HALOT
  rationale: 'The Hebrew is definite: ''the one frame.'' Retaining ''the one'' mirrors
    the source and preserves the distributive sense across the repeated clauses without
    paraphrasing to ''each.'''
- source_word: וּ/שְׁנֵי אֲדָנִים תַּחַת הַקֶּרֶשׁ הָאֶחָד
  chosen: and two bases under the one frame
  alternatives:
  - and two bases under another frame
  lexicon: HALOT
  rationale: The Hebrew repeats 'under the one frame' rather than explicitly saying
    'another frame.' The translation preserves the formal repetition of the source
    text. English readers may infer the distributive pattern from context.
