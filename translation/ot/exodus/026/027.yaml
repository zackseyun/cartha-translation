id: EXO.26.27
reference: Exodus 26:27
source:
  edition: WLC
  text: וַ/חֲמִשָּׁ֣ה בְרִיחִ֔ם לְ/קַרְשֵׁ֥י צֶֽלַע הַ/מִּשְׁכָּ֖ן הַ/שֵּׁנִ֑ית וַ/חֲמִשָּׁ֣ה
    בְרִיחִ֗ם לְ/קַרְשֵׁי֙ צֶ֣לַע הַ/מִּשְׁכָּ֔ן לַ/יַּרְכָתַ֖יִם יָֽמָּ/ה־׃
translation:
  text: and five bars for the boards of the second side of the tabernacle, and five
    bars for the boards of the side of the tabernacle at the rear westward.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the other side of the tabernacle' for 'the second side of the tabernacle.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'to the rear, westward.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְרִיחִם
  chosen: bars
  alternatives:
  - crossbars
  - frames
  lexicon: HALOT
  rationale: בְּרִיחַ in tabernacle-construction contexts refers to the horizontal
    bars used to hold the boards together. 'Bars' is the most natural and sufficiently
    precise English rendering; 'crossbars' is possible but slightly more interpretive.
- source_word: קַרְשֵׁי
  chosen: boards
  alternatives:
  - frames
  - planks
  lexicon: HALOT
  rationale: קֶרֶשׁ in Exodus 26 denotes the structural wooden units of the tabernacle.
    'Boards' is the standard, clear rendering in this construction context; 'planks'
    is possible but less established, and 'frames' may overinterpret the object.
- source_word: צֶלַע
  chosen: side
  alternatives:
  - flank
  lexicon: HALOT
  rationale: צֶלַע commonly means 'side' in architectural descriptions. Here it identifies
    the side of the tabernacle rather than a rib or other literal side-piece.
- source_word: הַשֵּׁנִית
  chosen: the second
  alternatives:
  - the other
  lexicon: HALOT
  rationale: The adjective literally means 'second.' In context it refers to the second
    side, i.e., the opposite side from the one just mentioned. 'The second' preserves
    the source wording more directly than the smoother but less literal 'the other.'
- source_word: מִּשְׁכָּן
  chosen: tabernacle
  alternatives:
  - dwelling
  - dwelling place
  lexicon: HALOT
  rationale: מִשְׁכָּן literally relates to dwelling, but in Exodus this term functions
    as the established designation for the sacred tent-sanctuary. 'Tabernacle' is
    the clearest conventional rendering in English Bible usage.
- source_word: לַיַּרְכָתַיִם
  chosen: at the rear
  alternatives:
  - for the far end
  - for the back part
  lexicon: HALOT
  rationale: יַרְכָתַיִם refers to the remotest or hindmost part. In this architectural
    context, 'at the rear' communicates the back section of the tabernacle naturally
    and accurately.
- source_word: יָמָּה
  chosen: westward
  alternatives:
  - on the west side
  - toward the sea
  lexicon: HALOT
  rationale: יָמָּה is the directional adverb 'westward,' derived from 'sea' because
    the Mediterranean lay to the west. In tabernacle orientation, 'westward' is the
    concise and idiomatic directional rendering.
- source_word: וַחֲמִשָּׁה ... וַחֲמִשָּׁה
  chosen: and five ... and five
  alternatives:
  - five ... and five
  lexicon: HALOT
  rationale: The repeated waw + numeral structure is preserved to reflect the Hebrew
    coordination and list-like construction of the building instructions.
