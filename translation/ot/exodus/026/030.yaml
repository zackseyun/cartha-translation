id: EXO.26.30
reference: Exodus 26:30
source:
  edition: WLC
  text: וַ/הֲקֵמֹתָ֖ אֶת הַ/מִּשְׁכָּ֑ן כְּ/מִ֨שְׁפָּט֔/וֹ אֲשֶׁ֥ר הָרְאֵ֖יתָ בָּ/הָֽר־׃ס
translation:
  text: And you shall set up the tabernacle according to its pattern, which you were
    shown on the mountain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''which you saw on the mountain.'' The main text renders the sense
      idiomatically as ''which you were shown on the mountain.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲקֵמֹתָ
  chosen: you shall set up
  alternatives:
  - you shall erect
  - you shall raise up
  lexicon: HALOT
  rationale: From קום in the Hiphil, here with directive force in context. 'Set up'
    is natural modern English for establishing the structure, while remaining close
    to the Hebrew sense of causing to stand.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  - the dwelling
  lexicon: HALOT
  rationale: מִשְׁכָּן is the standard term for the sacred tent-sanctuary in Exodus.
    'Tabernacle' preserves established referential precision better than the more
    generic 'dwelling place.'
- source_word: כְּמִשְׁפָּטוֹ
  chosen: according to its pattern
  alternatives:
  - according to its ordinance
  - according to its prescribed manner
  - according to its plan
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment, ordinance, legal claim, or prescribed procedure/pattern
    depending on context. In a construction context, 'pattern' best captures the prescribed
    design or arrangement. The suffix refers back to the tabernacle.
- source_word: אֲשֶׁר הָרְאֵיתָ
  chosen: which you were shown
  alternatives:
  - which you saw
  - that was shown to you
  lexicon: HALOT
  rationale: 'Though the Hebrew form is active (''you saw''), English idiom in this
    context often expresses the implied divine showing with a passive: Moses saw it
    because it was shown to him. This clarifies the sense without materially departing
    from the source.'
- source_word: בָּהָר
  chosen: on the mountain
  alternatives:
  - in the mountain
  - at the mountain
  lexicon: HALOT
  rationale: The preposition ב in this locative setting is naturally rendered 'on'
    in English for Moses' location on Sinai. 'On the mountain' is idiomatic and contextually
    precise.
