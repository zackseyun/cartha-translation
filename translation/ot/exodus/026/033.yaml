id: EXO.26.33
reference: Exodus 26:33
source:
  edition: WLC
  text: וְ/נָתַתָּ֣ה אֶת הַ/פָּרֹכֶת֮ תַּ֣חַת הַ/קְּרָסִים֒ וְ/הֵבֵאתָ֥ שָׁ֨מָּ/ה֙
    מִ/בֵּ֣ית לַ/פָּרֹ֔כֶת אֵ֖ת אֲר֣וֹן הָ/עֵד֑וּת וְ/הִבְדִּילָ֤ה הַ/פָּרֹ֨כֶת֙ לָ/כֶ֔ם
    בֵּ֣ין הַ/קֹּ֔דֶשׁ וּ/בֵ֖ין קֹ֥דֶשׁ הַ/קֳּדָשִֽׁים־׃
translation:
  text: And you shall place the veil under the clasps, and there, inside the veil,
    you shall bring the ark of the testimony; and the veil shall separate for you
    between the Holy Place and the Most Holy Place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the ark of the covenant.' The Hebrew here reads 'the testimony.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'holy of holies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּרֹכֶת
  chosen: veil
  alternatives:
  - curtain
  lexicon: HALOT
  rationale: Refers to the inner hanging that screens off the innermost sanctuary.
    'Veil' is the established and semantically fitting English term for a partitioning
    screen in sacred space; 'curtain' is possible but less specific in this cultic
    context.
- source_word: קְרָסִים
  chosen: clasps
  alternatives:
  - hooks
  - fasteners
  lexicon: HALOT
  rationale: The term denotes the joining pieces used to connect the tabernacle curtains.
    'Clasps' best fits the construction context and avoids overcommitting to a more
    specific modern mechanism.
- source_word: מִבֵּית לַפָּרֹכֶת
  chosen: inside the veil
  alternatives:
  - within the veil
  - from inside the veil
  lexicon: HALOT
  rationale: Literally 'from the inside of the veil' or 'within/inside the veil.'
    In context it indicates the space on the inner side of the veil where the ark
    is to be placed. 'Inside the veil' is clear modern English and preserves the spatial
    sense.
- source_word: אֲרוֹן הָעֵדוּת
  chosen: the ark of the testimony
  alternatives:
  - the ark of the covenant
  lexicon: HALOT
  rationale: The Hebrew here is explicitly 'testimony,' not 'covenant.' To honor original-language
    primacy, the main text keeps 'testimony.' The more traditional 'ark of the covenant'
    is a contextual/theological association, not the wording of this verse.
- source_word: וְהִבְדִּילָה
  chosen: shall separate
  alternatives:
  - shall divide
  - shall make a separation
  lexicon: HALOT
  rationale: The Hiphil of בדל expresses causing separation. 'Shall separate' is natural
    English and accurately conveys the function assigned to the veil.
- source_word: לָכֶם
  chosen: for you
  alternatives:
  - for yourselves
  - on your behalf
  lexicon: HALOT
  rationale: The dative pronoun is retained because it is present in the Hebrew and
    indicates the veil's separating function with respect to Israel's worship arrangement.
    'For you' is the most straightforward rendering.
- source_word: הַקֹּדֶשׁ
  chosen: the Holy Place
  alternatives:
  - the sanctuary
  - the holy place
  lexicon: HALOT
  rationale: In this tabernacle context the noun denotes the outer sacred chamber,
    distinguished from the inner chamber. Capitalizing 'Holy Place' helps readers
    track the technical spatial distinction.
- source_word: קֹדֶשׁ הַקֳּדָשִׁים
  chosen: the Most Holy Place
  alternatives:
  - the Holy of Holies
  - the holiest place
  lexicon: HALOT
  rationale: The Hebrew superlative construction literally means 'holy of holies.'
    'Most Holy Place' communicates the sense in clear modern English while preserving
    the technical cultic distinction. The traditional 'Holy of Holies' is preserved
    as an alternative.
