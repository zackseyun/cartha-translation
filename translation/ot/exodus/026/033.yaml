theological_decisions:
- issue: Traditional cultic terminology for the inner sanctuary
  chosen_reading: the Most Holy Place
  alternative_readings:
  - the Holy of Holies
  rationale: The Hebrew idiom is preserved in sense rather than woodenly reproduced.
    'Most Holy Place' is more accessible modern English while still reflecting the
    superlative force and sacred distinction of the inner chamber.
  doctrine_reference: Translation philosophy §6 (readable modern English, not archaic
    or academic)
- issue: Rendering עֵדוּת in the ark title
  chosen_reading: the ark of the testimony
  alternative_readings:
  - the ark of the covenant
  rationale: The verse's wording should govern the translation. Although 'ark of the
    covenant' is familiar in English tradition, this specific phrase uses עֵדוּת ('testimony'),
    so the translation preserves that lexical choice rather than harmonizing to a
    traditional title.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition)
