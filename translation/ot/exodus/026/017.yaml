id: EXO.26.17
reference: Exodus 26:17
source:
  edition: WLC
  text: שְׁתֵּ֣י יָד֗וֹת לַ/קֶּ֨רֶשׁ֙ הָ/אֶחָ֔ד מְשֻׁלָּבֹ֔ת אִשָּׁ֖ה אֶל אֲחֹתָ֑/הּ
    כֵּ֣ן תַּעֲשֶׂ֔ה לְ/כֹ֖ל קַרְשֵׁ֥י הַ/מִּשְׁכָּֽן־׃
translation:
  text: Each board is to have two tenons joined one to another; this is how you shall
    make all the boards of the tabernacle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'two hands for the one board, joined, a woman to her sister.'
      Here 'hands' refers to projecting joints, hence 'tenons.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָד֗וֹת
  chosen: tenons
  alternatives:
  - hands
  - projections
  - pegs
  lexicon: HALOT
  rationale: Literally 'hands,' but in carpentry/tabernacle construction context it
    refers to the projecting parts of each board used for fitting into bases. 'Tenons'
    is the clearest idiomatic English equivalent for the structural feature intended.
- source_word: מְשֻׁלָּבֹת
  chosen: joined
  alternatives:
  - coupled
  - interlocked
  - fitted together
  lexicon: HALOT
  rationale: The passive participle describes the two projections as fitted or linked
    together in construction. 'Joined' is natural modern English and preserves the
    structural sense without over-specifying the exact mechanism.
- source_word: אִשָּׁה אֶל אֲחֹתָהּ
  chosen: one to another
  alternatives:
  - one to its sister
  - each to its sister
  lexicon: HALOT
  rationale: This Hebrew idiom uses feminine nouns ('woman ... to her sister') to
    express correspondence or pairing between like parts. 'One to another' communicates
    the idiomatic sense in readable English while avoiding an overly literal rendering
    that would sound opaque in this construction context.
- source_word: קֶּרֶשׁ
  chosen: board
  alternatives:
  - frame
  - plank
  lexicon: HALOT
  rationale: In the tabernacle instructions, קֶרֶשׁ denotes the upright structural
    wooden unit. 'Board' is the standard and most transparent English rendering here;
    'frame' may over-interpret the object.
- source_word: מִּשְׁכָּן
  chosen: tabernacle
  alternatives:
  - dwelling
  - dwelling place
  lexicon: HALOT
  rationale: While the noun literally relates to dwelling, in Exodus this term functions
    as the established designation for the sacred portable sanctuary. 'Tabernacle'
    is the clearest contextual rendering in English.
- source_word: כֵּן תַּעֲשֶׂה
  chosen: this is how you shall make
  alternatives:
  - so you shall make
  - thus you shall make
  lexicon: HALOT
  rationale: This construction gives an instruction about the pattern to be followed
    for all the boards. 'This is how you shall make' is clear modern English and preserves
    the directive force.
- source_word: שְׁתֵּי
  chosen: two
  lexicon: HALOT
  rationale: Straightforward numeral modifying 'tenons.'
- source_word: לַקֶּרֶשׁ הָאֶחָד
  chosen: each board
  alternatives:
  - for the one board
  - for each single board
  lexicon: HALOT
  rationale: 'Although formally ''for the one board,'' the sense in context is distributive:
    the instruction applies to every individual board. ''Each board'' expresses that
    distributive force naturally in English.'
