id: EXO.26.22
reference: Exodus 26:22
source:
  edition: WLC
  text: וּֽ/לְ/יַרְכְּתֵ֥י הַ/מִּשְׁכָּ֖ן יָ֑מָּ/ה תַּעֲשֶׂ֖ה שִׁשָּׁ֥ה קְרָשִֽׁים׃
translation:
  text: And for the rear side of the tabernacle, westward, you shall make six boards.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'frames' instead of 'boards,' if the structural pieces are understood
      as open frameworks rather than solid planks.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְיַרְכְּתֵי
  chosen: And for the rear side of
  alternatives:
  - And for the far end of
  - And for the back part of
  lexicon: HALOT
  rationale: The noun יַרְכָּה/יַרְכְּתַיִם in tabernacle descriptions refers to the
    remote or rear part. In construct plural with prefixed conjunction and preposition,
    it idiomatically denotes the back/rear side. 'Rear side' is natural English and
    fits the architectural context better than a more literal but less idiomatic 'uttermost
    parts.'
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  lexicon: HALOT
  rationale: מִשְׁכָּן is the standard term for the sanctuary structure in Exodus.
    'Tabernacle' preserves established architectural reference while remaining accurate
    in context.
- source_word: יָמָּה
  chosen: westward
  alternatives:
  - on the west side
  - toward the sea
  lexicon: HALOT
  rationale: יָמָּה literally relates to 'sea-ward' and commonly means 'westward'
    in biblical spatial orientation. Since this verse specifies the rear side's direction,
    'westward' concisely captures the adverbial force.
- source_word: תַּעֲשֶׂה
  chosen: you shall make
  alternatives:
  - you are to make
  lexicon: HALOT
  rationale: The Qal imperfect 2ms of עשה in instructional material commonly carries
    directive force. 'You shall make' reflects the command style used throughout the
    tabernacle instructions.
- source_word: שִׁשָּׁה
  chosen: six
  lexicon: HALOT
  rationale: Straightforward cardinal numeral modifying the following noun.
- source_word: קְרָשִׁים
  chosen: boards
  alternatives:
  - frames
  - planks
  lexicon: HALOT
  rationale: קֶרֶשׁ in the tabernacle context denotes the structural wooden units
    forming the walls. 'Boards' is the most conventional and sufficiently precise
    rendering, though 'frames' is sometimes argued from construction details.
