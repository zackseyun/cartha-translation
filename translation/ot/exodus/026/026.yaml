id: EXO.26.26
reference: Exodus 26:26
source:
  edition: WLC
  text: וְ/עָשִׂ֥יתָ בְרִיחִ֖ם עֲצֵ֣י שִׁטִּ֑ים חֲמִשָּׁ֕ה לְ/קַרְשֵׁ֥י צֶֽלַע הַ/מִּשְׁכָּ֖ן
    הָ/אֶחָֽד־׃
translation:
  text: And you shall make five bars of acacia wood for the frames of the one side
    of the tabernacle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'boards' instead of 'frames'; the Hebrew term refers to the tabernacle's
      structural members.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: And you shall make
  alternatives:
  - And make
  - You are to make
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional sequence functions
    as an imperative/future command. 'And you shall make' preserves the procedural
    style of the tabernacle instructions.
- source_word: בְרִיחִם
  chosen: bars
  alternatives:
  - crossbars
  - bolts
  lexicon: HALOT
  rationale: In the tabernacle construction context, בְּרִיחַ refers to structural
    bars used to hold the frames together. 'Bars' is accurate and sufficiently natural;
    'crossbars' is possible but adds specificity not explicit in the Hebrew.
- source_word: עֲצֵי שִׁטִּים
  chosen: of acacia wood
  alternatives:
  - of acacia
  - of shittim wood
  lexicon: HALOT
  rationale: Construct chain meaning 'woods of acacia,' idiomatically 'acacia wood.'
    This is standard, clear English and avoids the less familiar transliteration 'shittim.'
- source_word: חֲמִשָּׁה
  chosen: five
  lexicon: HALOT
  rationale: Straightforward cardinal number modifying 'bars.'
- source_word: לְקַרְשֵׁי
  chosen: for the frames
  alternatives:
  - for the boards
  - for the planks
  lexicon: HALOT
  rationale: קֶרֶשׁ in the tabernacle context denotes the upright structural members.
    'Frames' better reflects their architectural function in modern English than the
    traditional 'boards,' while remaining within the source sense.
- source_word: צֶלַע
  chosen: side
  alternatives:
  - rib
  - flank
  lexicon: HALOT
  rationale: Here צֶלַע refers to one lateral side of the tabernacle structure, not
    a literal rib. 'Side' is the natural contextual rendering.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  lexicon: HALOT
  rationale: Though the root sense is 'dwelling place,' 'tabernacle' is the established
    and contextually precise term for the sanctuary structure in Exodus.
- source_word: הָאֶחָד
  chosen: the one
  alternatives:
  - one
  - first
  lexicon: HALOT
  rationale: The adjective specifies one particular side in a pair. Rendering it as
    'the one side' preserves the Hebrew's definiteness and prepares for the corresponding
    opposite side in the following verse.
