id: EXO.26.9
reference: Exodus 26:9
source:
  edition: WLC
  text: וְ/חִבַּרְתָּ֞ אֶת חֲמֵ֤שׁ הַ/יְרִיעֹת֙ לְ/בָ֔ד וְ/אֶת שֵׁ֥שׁ הַ/יְרִיעֹ֖ת
    לְ/בָ֑ד וְ/כָפַלְתָּ֙ אֶת הַ/יְרִיעָ֣ה הַ/שִּׁשִּׁ֔ית אֶל מ֖וּל פְּנֵ֥י הָ/אֹֽהֶל־־־־׃
translation:
  text: And you shall join the five curtains together separately, and the six curtains
    together separately; and you shall fold the sixth curtain double at the front
    of the tent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'double over the sixth curtain opposite the front of the tent.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חִבַּרְתָּ
  chosen: join ... together
  alternatives:
  - couple
  - connect
  lexicon: HALOT
  rationale: The verb חָבַר means to join or connect. 'Join ... together' is natural
    modern English and preserves the construction of combining the curtains into grouped
    units.
- source_word: יְרִיעֹת / יְרִיעָה
  chosen: curtains
  alternatives:
  - curtain cloths
  - panels
  lexicon: HALOT
  rationale: יְרִיעָה refers to the tabernacle fabric hangings. 'Curtains' is the
    standard and clearest rendering in this architectural context; 'panels' is possible
    but less transparent for general readers.
- source_word: לְבָד
  chosen: separately
  alternatives:
  - by itself
  - apart
  lexicon: HALOT
  rationale: 'Here לְבָד marks each set as a distinct grouping: five in one group
    and six in another. ''Separately'' communicates the distributive sense more idiomatically
    than the more literal ''by itself''.'
- source_word: כָפַלְתָּ
  chosen: fold ... double
  alternatives:
  - double over
  - fold over
  lexicon: HALOT
  rationale: The verb conveys doubling or folding. 'Fold ... double' preserves the
    idea that the sixth curtain is doubled, not merely bent or turned.
- source_word: הַשִּׁשִּׁית
  chosen: the sixth
  lexicon: HALOT
  rationale: Straightforward ordinal adjective modifying 'curtain.'
- source_word: אֶל מוּל פְּנֵי
  chosen: at the front of
  alternatives:
  - opposite the front of
  - in front of
  lexicon: HALOT
  rationale: The combined prepositional expression indicates placement facing the
    front side of the tent. 'At the front of' is concise and idiomatic while preserving
    the spatial sense.
- source_word: הָאֹהֶל
  chosen: the tent
  alternatives:
  - the tabernacle
  lexicon: HALOT
  rationale: The Hebrew here is simply 'the tent.' Although it refers to the tabernacle
    structure, translating it as 'tent' respects the source wording and avoids importing
    a more interpretive term into the verse.
