theological_decisions:
- issue: Rendering of הַמִּשְׁכָּן
  chosen_reading: tabernacle
  alternative_readings:
  - dwelling place
  - dwelling
  rationale: This is not a major doctrinally contested term here, but 'tabernacle'
    preserves the technical sanctuary sense in Exodus better than the more generic
    'dwelling place.'
