id: EXO.26.6
reference: Exodus 26:6
source:
  edition: WLC
  text: וְ/עָשִׂ֕יתָ חֲמִשִּׁ֖ים קַרְסֵ֣י זָהָ֑ב וְ/חִבַּרְתָּ֨ אֶת הַ/יְרִיעֹ֜ת אִשָּׁ֤ה
    אֶל אֲחֹתָ/הּ֙ בַּ/קְּרָסִ֔ים וְ/הָיָ֥ה הַ/מִּשְׁכָּ֖ן אֶחָֽד־־׃פ
translation:
  text: And you shall make fifty gold clasps, and join the curtains to one another
    with the clasps, so that the tabernacle may be one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the curtains, each woman to her sister'—a Hebrew idiom meaning
      the curtains are to be joined correspondingly to one another.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: And you shall make
  alternatives:
  - And you are to make
  - Then you shall make
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional sequence functions
    as an imperative/future command. 'You shall make' is standard clear English for
    the directive force.
- source_word: קַרְסֵי זָהָב
  chosen: gold clasps
  alternatives:
  - gold hooks
  - gold fasteners
  lexicon: HALOT
  rationale: קֶרֶס in tabernacle contexts refers to connecting pieces used to join
    curtains. 'Clasps' best conveys a fastening device without over-specifying shape;
    'gold' renders the genitive material plainly.
- source_word: וְחִבַּרְתָּ
  chosen: and join
  alternatives:
  - and couple
  - and connect
  lexicon: HALOT
  rationale: The verb חבר means to join or connect. 'Join' is natural modern English
    and fits the construction instructions.
- source_word: הַיְרִיעֹת
  chosen: the curtains
  alternatives:
  - the curtain panels
  - the sheets
  lexicon: HALOT
  rationale: יְרִיעָה in the tabernacle account denotes the fabric panels/curtains.
    'Curtains' is the most established and understandable rendering, though they are
    effectively panels.
- source_word: אִשָּׁה אֶל אֲחֹתָהּ
  chosen: to one another
  alternatives:
  - each to her sister
  - one to its matching piece
  lexicon: HALOT
  rationale: This idiom literally says 'a woman to her sister,' a Hebrew way of expressing
    correspondence between items. Since the referent is inanimate curtains, idiomatic
    English 'to one another' communicates the sense best; the literal form is worth
    preserving in a footnote.
- source_word: בַּקְּרָסִים
  chosen: with the clasps
  alternatives:
  - by the clasps
  - using the clasps
  lexicon: HALOT
  rationale: The preposition ב marks instrument here. 'With the clasps' is the most
    natural instrumental rendering in English.
- source_word: וְהָיָה הַמִּשְׁכָּן אֶחָד
  chosen: so that the tabernacle may be one
  alternatives:
  - and the tabernacle shall be one
  - and the dwelling shall become one
  lexicon: HALOT
  rationale: The clause expresses the result of joining the curtains. 'Tabernacle'
    is the conventional rendering of מִשְׁכָּן in Exodus and fits the sanctuary context.
    'May be one' captures resultant unity in smooth English; 'shall be one' is possible
    but slightly stiffer.
