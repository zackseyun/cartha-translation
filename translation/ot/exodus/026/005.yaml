id: EXO.26.5
reference: Exodus 26:5
source:
  edition: WLC
  text: חֲמִשִּׁ֣ים לֻֽלָאֹ֗ת תַּעֲשֶׂה֮ בַּ/יְרִיעָ֣ה הָ/אֶחָת֒ וַ/חֲמִשִּׁ֣ים לֻֽלָאֹ֗ת
    תַּעֲשֶׂה֙ בִּ/קְצֵ֣ה הַ/יְרִיעָ֔ה אֲשֶׁ֖ר בַּ/מַּחְבֶּ֣רֶת הַ/שֵּׁנִ֑ית מַקְבִּילֹת֙
    הַ/לֻּ֣לָאֹ֔ת אִשָּׁ֖ה אֶל אֲחֹתָֽ/הּ־׃
translation:
  text: You shall make fifty loops on the one curtain, and you shall make fifty loops
    on the edge of the curtain that is in the second set; the loops shall be opposite
    one another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the loops ... a woman to her sister,' a Hebrew idiom meaning
      that the loops are matched or aligned with their counterparts.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֻלָאֹת
  chosen: loops
  alternatives:
  - clasps
  - loops of fabric
  lexicon: HALOT
  rationale: The noun refers to loop-like attachments used to join the curtains. 'Loops'
    is the most natural and precise English term here; 'clasps' would better fit the
    metal fasteners in the next verse, not the fabric loops themselves.
- source_word: יְרִיעָה
  chosen: curtain
  alternatives:
  - panel
  - sheet
  lexicon: HALOT
  rationale: In tabernacle contexts this term denotes a large fabric hanging or curtain.
    'Curtain' is established and clear in modern English, while 'panel' is possible
    but less idiomatic.
- source_word: הָאֶחָת
  chosen: the one
  alternatives:
  - the first
  - one
  lexicon: HALOT
  rationale: The Hebrew is literally 'the one,' distinguishing one curtain from its
    counterpart. 'The first' would over-specify sequence not explicit in the text.
- source_word: קְצֵה
  chosen: edge
  alternatives:
  - end
  - extremity
  lexicon: HALOT
  rationale: The word denotes the outer limit or border of the curtain. 'Edge' fits
    the sewing/joining context better than 'end,' though 'end' is possible.
- source_word: מַחְבֶּרֶת
  chosen: set
  alternatives:
  - joining
  - coupling
  - connection
  lexicon: HALOT
  rationale: The term refers to the joined grouping of curtains described in the surrounding
    verses. Rendering it as 'set' communicates the resulting unit in readable English.
    More literal options like 'joining' are possible but less natural in context.
- source_word: הַשֵּׁנִית
  chosen: the second
  alternatives:
  - the other
  lexicon: HALOT
  rationale: This identifies the second grouped unit of curtains. 'The second' is
    the straightforward formal rendering.
- source_word: מַקְבִּילֹת
  chosen: shall be opposite
  alternatives:
  - shall correspond
  - shall be aligned
  lexicon: HALOT
  rationale: The participle conveys matching alignment between the loops on the two
    curtain units. 'Shall be opposite' preserves the spatial sense clearly.
- source_word: אִשָּׁה אֶל אֲחֹתָהּ
  chosen: one another
  alternatives:
  - each woman to her sister
  - each to its counterpart
  lexicon: HALOT
  rationale: This idiom literally reads 'a woman to her sister' and is used for corresponding
    items. 'One another' gives the idiomatic sense in English without awkward literalism;
    the more literal imagery can be preserved in a footnote.
