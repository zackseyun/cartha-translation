id: EXO.26.19
reference: Exodus 26:19
source:
  edition: WLC
  text: וְ/אַרְבָּעִים֙ אַדְנֵי כֶ֔סֶף תַּעֲשֶׂ֕ה תַּ֖חַת עֶשְׂרִ֣ים הַ/קָּ֑רֶשׁ שְׁנֵ֨י
    אֲדָנִ֜ים תַּֽחַת הַ/קֶּ֤רֶשׁ הָ/אֶחָד֙ לִ/שְׁתֵּ֣י יְדֹתָ֔י/ו וּ/שְׁנֵ֧י אֲדָנִ֛ים
    תַּֽחַת הַ/קֶּ֥רֶשׁ הָ/אֶחָ֖ד לִ/שְׁתֵּ֥י יְדֹתָֽי/ו־־־׃
translation:
  text: 'And you shall make forty silver bases under the twenty frames: two bases
    under the one frame for its two tenons, and two bases under the next frame for
    its two tenons.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'silver sockets' for 'silver bases'; the Hebrew term can denote a socket-like
      base in tabernacle construction.
    reason: lexical_alternative
  - marker: b
    text: Traditionally 'board' instead of 'frame.' The Hebrew likely refers to the
      upright structural pieces of the tabernacle.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַדְנֵי כֶסֶף
  chosen: silver bases
  alternatives:
  - silver sockets
  lexicon: HALOT
  rationale: אֶדֶן in tabernacle construction refers to a supporting base or socket.
    'Bases' is clearer in modern English while still fitting the architectural context;
    'sockets' is a traditional alternative worth preserving.
- source_word: תַּעֲשֶׂה
  chosen: you shall make
  alternatives:
  - you are to make
  lexicon: HALOT
  rationale: Qal imperfect 2ms of עשה in instructional material commonly carries an
    injunctive/future force. 'You shall make' preserves the directive tone of the
    Hebrew.
- source_word: תַּחַת
  chosen: under
  alternatives:
  - beneath
  lexicon: HALOT
  rationale: The preposition straightforwardly indicates placement beneath the frames.
    'Under' is the most natural and direct rendering.
- source_word: הַקָּרֶשׁ / הַקֶּרֶשׁ
  chosen: frame
  alternatives:
  - board
  - plank
  lexicon: HALOT
  rationale: קֶרֶשׁ in the tabernacle context denotes the upright structural pieces.
    'Frame' better communicates their architectural function in contemporary English
    than the more traditional but potentially misleading 'board'.
- source_word: שְׁנֵי אֲדָנִים
  chosen: two bases
  alternatives:
  - two sockets
  lexicon: HALOT
  rationale: The repeated phrase specifies the number of supporting pieces for each
    structural unit. 'Bases' maintains consistency with the earlier rendering of אַדְנֵי
    כֶסֶף.
- source_word: לִשְׁתֵּי יְדֹתָיו
  chosen: for its two tenons
  alternatives:
  - for its two projections
  - for its two pegs
  lexicon: HALOT
  rationale: Though literally 'for its two hands,' יָדוֹת here is an architectural
    term for the projecting joining pieces on each frame. 'Tenons' is the most precise
    English woodworking term.
- source_word: הָאֶחָד ... הָאֶחָד
  chosen: the one frame ... the next frame
  alternatives:
  - the one frame ... the one frame
  - each frame ... each frame
  lexicon: HALOT
  rationale: Hebrew repeats 'the one' in distributive fashion for successive frames.
    Rendering the second instance as 'the next frame' avoids awkward repetition while
    preserving the sense that each frame receives two bases.
