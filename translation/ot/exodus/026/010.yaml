id: EXO.26.10
reference: Exodus 26:10
source:
  edition: WLC
  text: וְ/עָשִׂ֜יתָ חֲמִשִּׁ֣ים לֻֽלָאֹ֗ת עַ֣ל שְׂפַ֤ת הַ/יְרִיעָה֙ הָֽ/אֶחָ֔ת הַ/קִּיצֹנָ֖ה
    בַּ/חֹבָ֑רֶת וַ/חֲמִשִּׁ֣ים לֻֽלָאֹ֗ת עַ֚ל שְׂפַ֣ת הַ/יְרִיעָ֔ה הַ/חֹבֶ֖רֶת הַ/שֵּׁנִֽית׃
translation:
  text: And you shall make fifty loops on the edge of the one curtain, the outermost
    one in the set joined together, and fifty loops on the edge of the second curtain
    that is joined to it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the coupling.' The Hebrew term refers to the joined unit formed by
      coupling curtains together.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  chosen: And you shall make
  alternatives:
  - And make
  - You are to make
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional context functions
    as an imperative/future command. 'You shall make' preserves the directive force
    in natural English.
- source_word: לֻלָאֹת
  chosen: loops
  alternatives:
  - loops for fastening
  - loops
  lexicon: HALOT
  rationale: The noun refers to fabric loops used to connect curtains. 'Loops' is
    the standard concise architectural/tabernacle term; the fastening function is
    clear from context and need not be expanded in the main text.
- source_word: שְׂפַת
  chosen: edge
  alternatives:
  - lip
  - border
  lexicon: HALOT
  rationale: Literally 'lip,' but for cloth construction 'edge' is the most idiomatic
    English equivalent.
- source_word: הַיְרִיעָה
  chosen: curtain
  alternatives:
  - panel
  - sheet
  lexicon: HALOT
  rationale: In tabernacle contexts יְרִיעָה denotes a large fabric curtain or panel.
    'Curtain' is the most established and understandable rendering in English.
- source_word: הָאֶחָת
  chosen: the one
  alternatives:
  - the first
  - one
  lexicon: HALOT
  rationale: The Hebrew says 'the one,' not explicitly 'the first.' Retaining 'the
    one' better reflects the source while still making sense in English.
- source_word: הַקִּיצֹנָה
  chosen: the outermost one
  alternatives:
  - the end one
  - the one at the extremity
  - the outer one
  lexicon: HALOT
  rationale: The adjective denotes what is at the end or outer edge. 'Outermost one'
    communicates position within the joined set of curtains.
- source_word: בַּחֹבָרֶת
  chosen: in the set joined together
  alternatives:
  - in the coupling
  - in the joined section
  - in the set
  lexicon: HALOT
  rationale: The noun refers to the joined unit/coupled set of curtains. A more literal
    'coupling' is possible, but 'set joined together' is clearer for modern readers
    while preserving the constructional sense.
- source_word: הַחֹבֶרֶת
  chosen: that is joined to it
  alternatives:
  - that is coupled
  - of the joined set
  - the joined one
  lexicon: HALOT
  rationale: Here the related form describes the second curtain as belonging to or
    participating in the joined arrangement. 'That is joined to it' makes the relationship
    explicit and readable in English.
- source_word: הַשֵּׁנִית
  chosen: the second curtain
  alternatives:
  - the second
  - the other
  lexicon: HALOT
  rationale: Ordinally contrasts with 'the one' in the first clause. English idiom
    benefits from repeating 'curtain' for clarity.
