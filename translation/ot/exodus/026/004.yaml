id: EXO.26.4
reference: Exodus 26:4
source:
  edition: WLC
  text: וְ/עָשִׂ֜יתָ לֻֽלְאֹ֣ת תְּכֵ֗לֶת עַ֣ל שְׂפַ֤ת הַ/יְרִיעָה֙ הָ/אֶחָ֔ת מִ/קָּצָ֖ה
    בַּ/חֹבָ֑רֶת וְ/כֵ֤ן תַּעֲשֶׂה֙ בִּ/שְׂפַ֣ת הַ/יְרִיעָ֔ה הַ/קִּ֣יצוֹנָ֔ה בַּ/מַּחְבֶּ֖רֶת
    הַ/שֵּׁנִֽית׃
translation:
  text: And you shall make loops of blue yarn on the edge of the one curtain at the
    end in the first set joined together; and so you shall do on the edge of the outermost
    curtain in the second set joined together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'blue' or 'violet'; the Hebrew תְּכֵלֶת denotes the characteristic dyed
      blue material used in the tabernacle.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew terms for 'set joined together' (חֹבָרֶת / מַחְבֶּרֶת) refer
      to a grouping of curtains coupled into one unit; traditionally, 'coupling' is
      also used.
    reason: lexical_alternative
  - marker: c
    text: Or 'endmost curtain' for 'outermost curtain.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֻלְאֹת
  chosen: loops
  alternatives:
  - loops for fastening
  - loops
  lexicon: HALOT
  rationale: The noun refers to loop-like attachments used to connect the curtains.
    'Loops' is the most natural and sufficiently precise English rendering in this
    tabernacle-construction context.
- source_word: תְּכֵלֶת
  chosen: blue yarn
  alternatives:
  - blue
  - blue-purple
  - violet
  lexicon: HALOT
  rationale: The term denotes the distinctive blue/purple-blue dyed material used
    in tabernacle fabrics. Because it modifies the loops as constructed textile elements,
    'blue yarn' makes explicit the material sense without overcommitting to a narrower
    color term like 'violet'.
- source_word: שְׂפַת
  chosen: edge
  alternatives:
  - lip
  - border
  - rim
  lexicon: HALOT
  rationale: In textile context, 'edge' is the clearest idiomatic rendering for the
    border of a curtain.
- source_word: יְרִיעָה
  chosen: curtain
  alternatives:
  - panel
  - tabernacle curtain
  lexicon: HALOT
  rationale: In Exodus 26 the term refers to the fabric panels of the tabernacle.
    'Curtain' is standard and understandable, while 'panel' is possible but less natural
    in English.
- source_word: הָאֶחָת
  chosen: the one
  alternatives:
  - the first
  - one
  lexicon: HALOT
  rationale: The Hebrew is literally 'the one,' referring to one curtain of the set
    rather than explicitly numbering it as first. 'The one curtain' preserves that
    wording.
- source_word: מִקָּצָה
  chosen: at the end
  alternatives:
  - from the end
  - on the end
  lexicon: HALOT
  rationale: The phrase locates the loops at the extremity of the curtain. 'At the
    end' is idiomatic English for the spatial sense.
- source_word: חֹבָרֶת
  chosen: the first set joined together
  alternatives:
  - the first coupling
  - the first joined section
  - the first set
  lexicon: HALOT
  rationale: The noun refers to a unit formed by joining curtains together. Since
    English lacks a simple equivalent, 'set joined together' conveys the functional
    sense. 'First' is supplied from context because the parallel phrase later specifies
    'the second' set.
- source_word: וְכֵן
  chosen: and so
  alternatives:
  - and likewise
  - and in the same way
  lexicon: HALOT
  rationale: This introduces a corresponding instruction. 'And so' is concise and
    natural.
- source_word: הַקִּיצוֹנָה
  chosen: outermost
  alternatives:
  - last
  - endmost
  - extreme
  lexicon: HALOT
  rationale: The adjective denotes the curtain at the outside/end of the set. 'Outermost'
    communicates the positional sense clearly in context.
- source_word: מַחְבֶּרֶת
  chosen: set joined together
  alternatives:
  - coupling
  - joined section
  - set
  lexicon: HALOT
  rationale: This noun is closely related in sense to חֹבָרֶת and refers to the assembled
    grouping of curtains. Rendering both with similar English preserves the connection
    while remaining readable.
- source_word: הַשֵּׁנִית
  chosen: the second
  alternatives:
  - the other
  - the second set
  lexicon: HALOT
  rationale: This identifies the second of the two joined sets of curtains. 'The second'
    is straightforward and precise.
