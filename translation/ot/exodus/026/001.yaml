id: EXO.26.1
reference: Exodus 26:1
source:
  edition: WLC
  text: וְ/אֶת הַ/מִּשְׁכָּ֥ן תַּעֲשֶׂ֖ה עֶ֣שֶׂר יְרִיעֹ֑ת שֵׁ֣שׁ מָשְׁזָ֗ר וּ/תְכֵ֤לֶת
    וְ/אַרְגָּמָן֙ וְ/תֹלַ֣עַת שָׁנִ֔י כְּרֻבִ֛ים מַעֲשֵׂ֥ה חֹשֵׁ֖ב תַּעֲשֶׂ֥ה אֹתָֽ/ם־׃
translation:
  text: And you shall make the tabernacle with ten curtains of finely twisted linen,
    and blue and purple and scarlet yarn; with cherubim, the work of a skillful designer,
    you shall make them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with cherubim skillfully worked into them.' The Hebrew phrase מַעֲשֵׂה
      חֹשֵׁב refers to artistic, designed workmanship in the fabric.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  - the dwelling
  lexicon: HALOT
  rationale: מִשְׁכָּן denotes the sacred dwelling/tent-sanctuary. 'Tabernacle' is
    the established and still intelligible English term in this cultic context, preserving
    the technical sense better than the more generic 'dwelling.'
- source_word: יְרִיעֹת
  chosen: curtains
  alternatives:
  - panels
  - cloths
  lexicon: HALOT
  rationale: In the tabernacle construction context, יְרִיעוֹת refers to large fabric
    hangings or curtain-panels. 'Curtains' is natural English and fits the architectural/furnishing
    setting.
- source_word: שֵׁשׁ מָשְׁזָר
  chosen: finely twisted linen
  alternatives:
  - fine twisted linen
  - twined fine linen
  lexicon: HALOT
  rationale: שֵׁשׁ refers to fine linen, and מָשְׁזָר indicates twisted/spun thread.
    'Finely twisted linen' communicates both the material and workmanship in readable
    modern English.
- source_word: תְּכֵלֶת
  chosen: blue
  alternatives:
  - blue yarn
  - blue-purple
  lexicon: HALOT
  rationale: תְּכֵלֶת is the standard tabernacle dye/color term, commonly rendered
    'blue.' Because the Hebrew lists materials/colors in sequence with textile material
    already supplied, 'blue' is sufficient in the main text.
- source_word: אַרְגָּמָן
  chosen: purple
  alternatives:
  - purple yarn
  - reddish-purple
  lexicon: HALOT
  rationale: אַרְגָּמָן denotes purple-dyed material. 'Purple' is the conventional
    and clear rendering.
- source_word: תֹלַעַת שָׁנִי
  chosen: scarlet yarn
  alternatives:
  - scarlet
  - crimson yarn
  lexicon: HALOT
  rationale: The expression denotes scarlet/crimson dyed thread or material. 'Scarlet
    yarn' makes explicit the textile sense in context and matches the series of tabernacle
    materials.
- source_word: כְּרֻבִים
  chosen: cherubim
  alternatives:
  - cherubs
  lexicon: HALOT
  rationale: '''Cherubim'' preserves the biblical-cultic term and avoids the misleading
    modern connotations of ''cherubs.'''
- source_word: מַעֲשֵׂה חֹשֵׁב
  chosen: the work of a skillful designer
  alternatives:
  - the work of a skillful craftsman
  - embroidered by a skillful workman
  - designer's work
  lexicon: HALOT
  rationale: The phrase denotes skilled artistic workmanship, likely patterned or
    woven design rather than mere manual labor. 'The work of a skillful designer'
    captures the artistic-planned aspect of חֹשֵׁב in this textile context.
- source_word: וְאֶת ... תַּעֲשֶׂה
  chosen: And you shall make
  alternatives:
  - You shall make
  lexicon: HALOT
  rationale: The prefixed conjunction continues the divine instructions. Retaining
    'And' reflects the discourse flow of the Hebrew.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: The plural pronoun refers back to the ten curtains, requiring an explicit
    plural object in English.
