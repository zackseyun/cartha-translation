id: EXO.26.32
reference: Exodus 26:32
source:
  edition: WLC
  text: וְ/נָתַתָּ֣ה אֹתָ֗/הּ עַל אַרְבָּעָה֙ עַמּוּדֵ֣י שִׁטִּ֔ים מְצֻפִּ֣ים זָהָ֔ב
    וָוֵי/הֶ֖ם זָהָ֑ב עַל אַרְבָּעָ֖ה אַדְנֵי כָֽסֶף־־־׃
translation:
  text: And you shall hang it on four pillars of acacia wood overlaid with gold, their
    hooks being of gold, on four silver bases.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'four silver sockets.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתָּה
  chosen: And you shall hang
  alternatives:
  - And you shall put
  - And you shall place
  - And you shall set
  lexicon: HALOT
  rationale: The verb נתן is broadly 'give/put/place,' but in this tabernacle-construction
    context with the direct object being the veil and followed by 'on four pillars,'
    idiomatic English requires 'hang' to express the intended action more precisely
    without over-paraphrasing.
- source_word: אֹתָהּ
  chosen: it
  lexicon: HALOT
  rationale: Feminine singular pronominal object referring back to the veil mentioned
    in the previous verse; English naturally uses 'it.'
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: Standard spatial preposition here, used both for the veil's placement
    on the pillars and the pillars' placement on the bases.
- source_word: אַרְבָּעָה
  chosen: four
  lexicon: HALOT
  rationale: Cardinal number straightforwardly rendered.
- source_word: עַמּוּדֵי
  chosen: pillars
  alternatives:
  - posts
  - columns
  lexicon: HALOT
  rationale: עמוד denotes a standing support. 'Pillars' fits tabernacle furnishing
    English well; 'posts' is possible but slightly plainer, while 'columns' sounds
    more architectural than the context requires.
- source_word: שִׁטִּים
  chosen: acacia wood
  alternatives:
  - acacia
  lexicon: HALOT
  rationale: Refers to acacia timber. 'Acacia wood' makes explicit that the material,
    not living trees, is meant.
- source_word: מְצֻפִּים זָהָב
  chosen: overlaid with gold
  alternatives:
  - covered with gold
  - plated with gold
  lexicon: HALOT
  rationale: The passive participle from צפה in this construction indicates an overlay
    or plating. 'Overlaid with gold' is a standard and accurate rendering for tabernacle
    materials.
- source_word: וָוֵיהֶם
  chosen: their hooks
  alternatives:
  - their pegs
  lexicon: HALOT
  rationale: The noun refers to hooks or pegs attached to the pillars for hanging
    the veil. 'Hooks' best fits the immediate function in context.
- source_word: זָהָב
  chosen: of gold
  alternatives:
  - gold
  lexicon: HALOT
  rationale: Predicate/appositional material description of the hooks; 'of gold' reads
    naturally in English.
- source_word: אַדְנֵי כָסֶף
  chosen: silver bases
  alternatives:
  - silver sockets
  lexicon: HALOT
  rationale: אדן in tabernacle contexts denotes a base or socket supporting a structural
    element. 'Bases' is clear modern English; 'sockets' is a viable more formal alternative
    and worth preserving in a footnote because it is common in translation tradition
    and may better evoke fitted supports.
