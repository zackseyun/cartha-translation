id: MAL.1.10
reference: Malachi 1:10
source:
  edition: WLC
  text: מִ֤י גַם בָּ/כֶם֙ וְ/יִסְגֹּ֣ר דְּלָתַ֔יִם וְ/לֹֽא תָאִ֥ירוּ מִזְבְּחִ֖/י חִנָּ֑ם אֵֽין לִ֨/י חֵ֜פֶץ בָּ/כֶ֗ם אָמַר֙ יְהוָ֣ה צְבָא֔וֹת וּ/מִנְחָ֖ה לֹֽא אֶרְצֶ֥ה מִ/יֶּדְ/כֶֽם־־־־׃
translation:
  text: Oh, that there were even one among you who would shut the doors, so that you would not kindle my altar in vain! I have no pleasure in you, says Yahweh of hosts, and I will not accept an offering from your hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''Who is there even among you who would shut the doors?'' The Hebrew can be read as a rhetorical question, but here it likely expresses a wish: that someone would close the temple doors rather than continue empty worship.'
    reason: alternative_reading
  - marker: b
    text: '''Kindle my altar for nothing'' may also be rendered ''light my altar in vain.'''
    reason: lexical_alternative
  - marker: c
    text: '''Offering'' translates Hebrew minḥah, which can more specifically mean ''grain offering'' in sacrificial contexts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי גַם בָּכֶם
  chosen: Oh, that there were even one among you
  alternatives:
  - Who is there even among you
  - If only there were one among you
  lexicon: HALOT
  rationale: The idiom introduces a wish or lament rather than a straightforward information question. English 'Oh, that there were even one among you' captures the exasperated optative force in context better than a wooden interrogative.
- source_word: וְיִסְגֹּר דְּלָתַיִם
  chosen: who would shut the doors
  alternatives:
  - and shut the doors
  - who might close the doors
  lexicon: HALOT
  rationale: 'The verb means ''shut/close,'' and the plural noun refers to temple doors/gates. Rendering with a relative clause fits the English expression of the Hebrew wish: someone among them who would close the temple doors.'
- source_word: וְלֹא תָאִירוּ מִזְבְּחִי
  chosen: so that you would not kindle my altar
  alternatives:
  - and not light my altar
  - and not set fire to my altar
  lexicon: HALOT
  rationale: Hiphil of אור here means to cause to burn/light, specifically to ignite the altar fire. 'Kindle my altar' is idiomatic English and preserves the sacrificial setting better than the more literal but awkward 'light my altar.'
- source_word: חִנָּם
  chosen: for nothing
  alternatives:
  - in vain
  - gratuitously
  lexicon: HALOT
  rationale: 'The adverb conveys uselessness or pointlessness in this context: God would rather the altar not be kindled at all than be used for empty worship. ''For nothing'' is natural modern English; ''in vain'' is possible but slightly more archaic.'
- source_word: אֵין לִי חֵפֶץ בָּכֶם
  chosen: I have no pleasure in you
  alternatives:
  - I take no delight in you
  - I have no delight in you
  lexicon: HALOT
  rationale: חֵפֶץ denotes delight, pleasure, or favorable disposition. 'I have no pleasure in you' is clear and solemn, preserving the personal rejection addressed to the priests/people.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of hosts
  alternatives:
  - the LORD of armies
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' 'Hosts' is the established and still comprehensible rendering for צְבָאוֹת in this divine title, preserving its weight and intertextual resonance.
- source_word: וּמִנְחָה
  chosen: an offering
  alternatives:
  - a grain offering
  - a gift offering
  - tribute
  lexicon: HALOT
  rationale: מִנְחָה can denote a gift/tribute and in cultic contexts often a grain offering. Here the broader sense 'offering' best fits the denunciation of their sacrificial worship generally, without over-specifying the type.
- source_word: לֹא אֶרְצֶה מִיֶּדְכֶם
  chosen: I will not accept an offering from your hand
  alternatives:
  - I will not be pleased with an offering from your hand
  - I will not receive it from your hand
  lexicon: HALOT
  rationale: רצה in sacrificial contexts commonly means to accept favorably. 'From your hand' is retained in singular 'hand' as an English collective idiom corresponding to the Hebrew singular noun with plural suffix.
