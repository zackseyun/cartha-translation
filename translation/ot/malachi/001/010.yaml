theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Scope of מִנְחָה in this context
  chosen_reading: an offering
  alternative_readings:
  - a grain offering
  rationale: Although מִנְחָה often refers specifically to a grain offering, the immediate context condemns the worshipers' sacrificial service more broadly. 'Offering' preserves the cultic sense without narrowing beyond what the verse requires.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
