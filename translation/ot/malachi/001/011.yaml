theological_decisions:
- issue: Whether the verse describes present worship among the nations or a future/ideal reality
  chosen_reading: 'Render the Hebrew participles as present: ''is great,'' ''is offered,'' ''is offered,'' without adding future markers.'
  alternative_readings:
  - 'A future sense: ''will be great... will be offered'''
  - An idealized or prophetic present
  rationale: The Hebrew uses verbless and participial constructions that naturally allow a present rendering. Because the text itself does not explicitly mark futurity, the translation preserves the surface grammar and leaves interpretive timing open to readers.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of sacrificial language in relation to worship beyond Israel
  chosen_reading: Retain the cultic terms 'incense' and 'offering' without interpretive expansion.
  alternative_readings:
  - Interpret as metaphorical prayer/worship
  - Interpret as eschatological Gentile sacrificial worship
  rationale: The verse uses explicit sacrificial vocabulary. Translating it straightforwardly avoids importing a specific theological system about how the nations' worship is fulfilled while preserving the text's cultic imagery.
  doctrine_reference: Do not import doctrinal claims the text does not make.
