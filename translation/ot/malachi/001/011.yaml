id: MAL.1.11
reference: Malachi 1:11
source:
  edition: WLC
  text: כִּ֣י מִ/מִּזְרַח שֶׁ֜מֶשׁ וְ/עַד מְבוֹא֗/וֹ גָּד֤וֹל שְׁמִ/י֙ בַּ/גּוֹיִ֔ם וּ/בְ/כָל מָק֗וֹם מֻקְטָ֥ר מֻגָּ֛שׁ לִ/שְׁמִ֖/י וּ/מִנְחָ֣ה טְהוֹרָ֑ה כִּֽי גָד֤וֹל שְׁמִ/י֙ בַּ/גּוֹיִ֔ם אָמַ֖ר יְהוָ֥ה צְבָאֽוֹת־־־־׃
translation:
  text: For from the rising of the sun to its setting, my name is great among the nations, and in every place incense is offered, and a pure offering is brought, to my name; for my name is great among the nations, says Yahweh of hosts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the east to the west'; literally, 'from the rising of the sun to its setting.'
    reason: lexical_alternative
  - marker: b
    text: Or 'among the Gentiles.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew may be read as describing present reality, a prophetic present, or future certainty; the translation preserves the Hebrew wording without resolving the timing.
    reason: alternative_reading
  - marker: d
    text: '''A pure offering'' translates Hebrew minchah, a term that can denote an offering generally, often a grain offering in sacrificial contexts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground for the preceding rebuke; 'For' preserves the explanatory force without over-specifying whether it is causal or emphatic.
- source_word: מִמִּזְרַח שֶׁמֶשׁ וְעַד מְבוֹאוֹ
  chosen: from the rising of the sun to its setting
  alternatives:
  - from the east to the west
  - from sunrise to sunset
  lexicon: HALOT
  rationale: A natural rendering of the idiom that retains the cosmic scope. 'Its setting' reflects the 3ms suffix on 'its going/setting' referring to the sun.
- source_word: גָּדוֹל שְׁמִי
  chosen: my name is great
  alternatives:
  - great is my name
  lexicon: HALOT
  rationale: Predicate adjective plus noun rendered in standard English word order. 'Name' here carries reputation/honor, but the concrete term is retained rather than paraphrased.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  lexicon: HALOT
  rationale: '''Nations'' is the broad, contextually appropriate rendering of גוים in prophetic literature. ''Gentiles'' is possible but can sound overly NT-specific and ethnically narrowed.'
- source_word: וּבְכָל מָקוֹם
  chosen: and in every place
  alternatives:
  - and everywhere
  lexicon: HALOT
  rationale: Keeps the distributive sense of the Hebrew while remaining readable. Slightly more formal than 'everywhere' and closer to the source wording.
- source_word: מֻקְטָר
  chosen: incense is offered
  alternatives:
  - incense is burned
  - it is made to smoke
  lexicon: HALOT
  rationale: The Hophal/passive participle from קטר refers to the burning of incense or sacrificial smoke. 'Incense is offered' communicates the cultic sense clearly in English; 'burned' is possible but less explicitly sacrificial in modern usage.
- source_word: מֻגָּשׁ לִשְׁמִי
  chosen: is offered to my name
  alternatives:
  - is brought to my name
  - is presented to my name
  lexicon: HALOT
  rationale: From נגשׁ in sacrificial contexts, 'offered' is the most idiomatic English equivalent. 'To my name' is retained literally to preserve the covenantal/theological expression rather than paraphrasing as 'to me'.
- source_word: וּמִנְחָה טְהוֹרָה
  chosen: and a pure offering
  alternatives:
  - even a pure grain offering
  - and a clean offering
  lexicon: HALOT
  rationale: מִנְחָה can denote a gift/offering and often a grain offering in cultic contexts. Here 'offering' is broad enough to fit the parallelism and avoid over-narrowing, while 'pure' preserves the adjective's ritual/moral quality.
- source_word: אָמַר יְהוָה צְבָאוֹת
  chosen: says the LORD of hosts
  alternatives:
  - says the LORD Almighty
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' 'Hosts' translates צבאות more directly than 'Almighty' and preserves the traditional prophetic title's martial/cosmic nuance.
