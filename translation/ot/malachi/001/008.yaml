theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of אֵין רָע in the priests' speech/context
  chosen_reading: 'Render as rhetorical question: ''is that not evil?'''
  alternative_readings:
  - 'Render more literally as assertion: ''it is not evil'''
  rationale: The Hebrew wording can be represented woodenly as an assertion, but in context YHWH is exposing the priests' dismissive attitude through rhetorical challenge. The question form best conveys the rebuke in idiomatic English while preserving the irony.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source sense over tradition'
