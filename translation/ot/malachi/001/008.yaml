id: MAL.1.8
reference: Malachi 1:8
source:
  edition: WLC
  text: וְ/כִֽי תַגִּשׁ֨וּ/ן עִוֵּ֤ר לִ/זְבֹּ֨חַ֙ אֵ֣ין רָ֔ע וְ/כִ֥י תַגִּ֛ישׁוּ פִּסֵּ֥חַ וְ/חֹלֶ֖ה אֵ֣ין רָ֑ע הַקְרִיבֵ֨/הוּ נָ֜א לְ/פֶחָתֶ֗/ךָ הֲ/יִּרְצְ/ךָ֙ א֚וֹ הֲ/יִשָּׂ֣א פָנֶ֔י/ךָ אָמַ֖ר יְהוָ֥ה צְבָאֽוֹת־׃
translation:
  text: When you present a blind animal for sacrifice, is that not evil? And when you present one that is lame or sick, is that not evil? Present it, please, to your governor. Will he accept you, or show you favor? says Yahweh of hosts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'there is no evil' ... 'there is no evil'; the translation renders the lines as rhetorical questions to reflect the rebuking force in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'Will he be pleased with you?'
    reason: alternative_reading
  - marker: c
    text: 'Hebrew idiom: ''lift up your face,'' meaning to show favor or grant acceptance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַגִּשׁוּן / תַגִּישׁוּ
  chosen: present
  alternatives:
  - bring
  - offer
  lexicon: HALOT
  rationale: Hiphil of נגשׁ here refers to bringing forward an offering. 'Present' fits both sacrificial and rhetorical contexts and works smoothly with the later imperative 'Present it ... to your governor.'
- source_word: עִוֵּר
  chosen: a blind animal
  alternatives:
  - the blind
  - something blind
  lexicon: HALOT
  rationale: The adjective functions substantivally for a blemished sacrificial animal. Supplying 'animal' makes the sacrificial referent explicit in natural English without adding meaning beyond the context.
- source_word: לִזְבֹּחַ
  chosen: for sacrifice
  alternatives:
  - to sacrifice
  - as a sacrifice
  lexicon: HALOT
  rationale: The infinitive expresses sacrificial purpose. 'For sacrifice' is concise and idiomatic in English.
- source_word: אֵין רָע
  chosen: is that not evil?
  alternatives:
  - is it not bad?
  - there is no evil?
  lexicon: HALOT
  rationale: Although literally 'there is no evil,' the context is sarcastic quotation or challenge to the priests' attitude. Rendering it as a rhetorical question in English best captures the force of the rebuke.
- source_word: פִּסֵּחַ
  chosen: lame
  alternatives:
  - crippled
  lexicon: HALOT
  rationale: Standard term for an animal with a disabling defect; 'lame' is natural and sufficiently precise.
- source_word: חֹלֶה
  chosen: sick
  alternatives:
  - diseased
  - ill
  lexicon: HALOT
  rationale: '''Sick'' is the most accessible modern English rendering; ''diseased'' is possible but more technical than the Hebrew requires.'
- source_word: הַקְרִיבֵהוּ נָא
  chosen: Present it, please
  alternatives:
  - Offer it, please
  - Bring it, please
  lexicon: HALOT
  rationale: Imperative plus particle נָא gives a pointed but ironic challenge. 'Please' preserves the particle's discourse force without sounding archaic.
- source_word: פֶחָה
  chosen: governor
  alternatives:
  - provincial governor
  - official
  lexicon: HALOT
  rationale: Refers to a Persian-period civil authority. 'Governor' is the standard concise rendering.
- source_word: הֲיִרְצְךָ
  chosen: Will he accept you
  alternatives:
  - Will he be pleased with you
  - Will he receive you favorably
  lexicon: HALOT
  rationale: From רצה, to be pleased with or accept favorably. Since the object is second person, the sense is personal acceptance rather than merely acceptance of the gift.
- source_word: הֲיִשָּׂא פָנֶיךָ
  chosen: show you favor
  alternatives:
  - lift up your face
  - regard you with favor
  lexicon: HALOT
  rationale: The idiom literally means 'lift up your face' and denotes favorable regard. 'Show you favor' communicates the idiomatic sense clearly.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of hosts
  alternatives:
  - the LORD of armies
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' 'Hosts' is the established and still understandable rendering for צְבָאוֹת in this divine title.
