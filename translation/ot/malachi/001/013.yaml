id: MAL.1.13
reference: Malachi 1:13
source:
  edition: WLC
  text: וַ/אֲמַרְתֶּם֩ הִנֵּ֨ה מַ/תְּלָאָ֜ה וְ/הִפַּחְתֶּ֣ם אוֹת֗/וֹ אָמַר֙ יְהוָ֣ה צְבָא֔וֹת וַ/הֲבֵאתֶ֣ם גָּז֗וּל וְ/אֶת הַ/פִּסֵּ֨חַ֙ וְ/אֶת הַ֣/חוֹלֶ֔ה וַ/הֲבֵאתֶ֖ם אֶת הַ/מִּנְחָ֑ה הַ/אֶרְצֶ֥ה אוֹתָ֛/הּ מִ/יֶּדְ/כֶ֖ם אָמַ֥ר יְהוָֽה־־־׃ס
translation:
  text: And you say, ‘Look, what a weariness this is,’ and you snort at it, says Yahweh of hosts. And you bring what is stolen, and the lame, and the sick; thus you bring the offering. Should I accept it from your hand? says Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and you snort at it' or 'and you disdain it.' The Hebrew verb pictures a contemptuous exhalation, expressing scorn.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the LORD of hosts,' that is, the LORD of heavenly armies.
    reason: cultural_note
lexical_decisions:
- source_word: מַתְּלָאָה
  chosen: what a weariness this is
  alternatives:
  - what weariness
  - what a nuisance
  lexicon: HALOT
  rationale: 'The noun denotes weariness/trouble. The exclamatory construction with הִנֵּה is best represented idiomatically in English as a complaint: ''what a weariness this is.'' This preserves the people''s disdain without over-paraphrasing.'
- source_word: וְהִפַּחְתֶּם אֹתוֹ
  chosen: and you sniff at it
  alternatives:
  - and you snort at it
  - and you disdain it
  lexicon: HALOT
  rationale: The verb from נפח literally involves blowing/snorting. In context it expresses contempt toward the Lord's service or offering. 'Sniff at it' keeps the concrete image and communicates disdain better than a flattened abstract gloss.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of hosts
  alternatives:
  - the LORD Almighty
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is traditionally and accurately 'hosts,' preserving the title's martial/heavenly-armies sense better than the more interpretive 'Almighty.'
- source_word: גָּזוּל
  chosen: what is stolen
  alternatives:
  - the stolen thing
  - what was taken by robbery
  lexicon: HALOT
  rationale: The passive participle denotes something taken by robbery/theft. 'What is stolen' is natural English and preserves the moral force of the defective offering.
- source_word: הַפִּסֵּחַ
  chosen: the lame
  alternatives:
  - the crippled
  lexicon: HALOT
  rationale: Refers to an animal with a disabling defect. 'The lame' is concise, idiomatic, and consistent with sacrificial-defect language elsewhere.
- source_word: הַחוֹלֶה
  chosen: the sick
  alternatives:
  - the diseased
  - the ill
  lexicon: HALOT
  rationale: The participial/adjectival form denotes sickness. 'The sick' is the most natural parallel to 'the lame' in this list of blemished animals.
- source_word: הַמִּנְחָה
  chosen: the offering
  alternatives:
  - the grain offering
  - the gift offering
  - the tribute
  lexicon: HALOT
  rationale: Although מִנְחָה can specifically denote a grain offering, here it functions more broadly for the presented offering/gift in the cultic context. 'The offering' fits the immediate rhetorical question and avoids over-specifying beyond what the verse requires.
- source_word: הַאֶרְצֶה אֹתָהּ
  chosen: Should I accept it
  alternatives:
  - Will I accept it
  - Would I take pleasure in it
  lexicon: HALOT
  rationale: רצה in sacrificial contexts means to accept favorably. The prefixed interrogative ה makes the clause a rhetorical question. 'Should I accept it' captures the rhetorical rebuke in idiomatic English.
- source_word: מִיֶּדְכֶם
  chosen: from your hand
  alternatives:
  - from you
  - at your hand
  lexicon: HALOT
  rationale: The idiom literally reads 'from your hand,' a common Hebrew expression for receiving something from someone. Retaining 'from your hand' preserves the concrete idiom while remaining understandable in English.
