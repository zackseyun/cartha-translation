id: MAL.1.7
reference: Malachi 1:7
source:
  edition: WLC
  text: מַגִּישִׁ֤ים עַֽל מִזְבְּחִ/י֙ לֶ֣חֶם מְגֹאָ֔ל וַ/אֲמַרְתֶּ֖ם בַּ/מֶּ֣ה גֵֽאַלְנ֑וּ/ךָ בֶּ/אֱמָרְ/כֶ֕ם שֻׁלְחַ֥ן יְהוָ֖ה נִבְזֶ֥ה הֽוּא־׃
translation:
  text: By presenting defiled food on my altar. But you say, “How have we defiled you?” By saying, “The table of Yahweh is despised.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally 'bread,' but here in sacrificial context it refers more broadly to food presented on the altar.
    reason: lexical_alternative
  - marker: b
    text: Or 'How have we polluted you?' The Hebrew directly addresses God with 'you,' expressing that contempt for his altar is an affront to him.
    reason: alternative_reading
  - marker: c
    text: '''The table of the LORD'' is a metaphor for the altar and its sacrificial service.'
    reason: cultural_note
lexical_decisions:
- source_word: מַגִּישִׁים
  chosen: By presenting
  alternatives:
  - You are presenting
  - Offering
  lexicon: HALOT
  rationale: 'Hiphil participle of נגשׁ, here continuing the accusation from the previous verse and functioning adverbially/explanatorily: the priests despise God''s name by presenting polluted offerings. ''By presenting'' captures the participial force in smooth English while preserving the causal/explanatory sense.'
- source_word: עַל מִזְבְּחִי
  chosen: on my altar
  alternatives:
  - upon my altar
  lexicon: HALOT
  rationale: Straightforward locative phrase. 'On my altar' is natural modern English and preserves the first-person possessive.
- source_word: לֶחֶם
  chosen: food
  alternatives:
  - bread
  lexicon: HALOT
  rationale: Although literally 'bread,' in sacrificial contexts לֶחֶם can denote food/food offering more broadly, especially in the phrase 'food of God' or food placed on the altar. 'Food' better fits the cultic context and avoids implying only baked bread is in view.
- source_word: מְגֹאָל
  chosen: defiled
  alternatives:
  - polluted
  - unclean
  lexicon: HALOT
  rationale: From גאל in the sense of defiling/polluting. 'Defiled' is clear, weighty, and fits both ritual and moral contamination language.
- source_word: בַּמֶּה גֵאַלְנוּךָ
  chosen: How have we defiled you?
  alternatives:
  - How have we polluted you?
  - How have we defiled it?
  lexicon: HALOT
  rationale: The suffix is second masculine singular, so the direct object is 'you,' referring to God rhetorically through the profanation of his altar/table. This should not be flattened away. 'How have we defiled you?' preserves the Hebrew form and the force of the priests' objection.
- source_word: בֶּאֱמָרְכֶם
  chosen: By saying
  alternatives:
  - When you say
  lexicon: HALOT
  rationale: 'The preposition ב plus infinitive construct gives the means/explanation: they defile by saying. ''By saying'' matches the explanatory structure.'
- source_word: שֻׁלְחַן יְהוָה
  chosen: the table of the LORD
  alternatives:
  - the LORD's table
  lexicon: HALOT
  rationale: A cultic metaphor for the altar and its sacrificial service. 'The table of the LORD' preserves the metaphor explicitly rather than interpreting it away.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: נִבְזֶה הוּא
  chosen: is despised
  alternatives:
  - is contemptible
  - is to be despised
  - is treated with contempt
  lexicon: HALOT
  rationale: The predicate adjective with pronoun emphasizes the assessment being voiced about the LORD's table. 'Is despised' is the most direct rendering and matches the semantic field of בזה.
