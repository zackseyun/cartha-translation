theological_decisions:
- issue: Whether to preserve the direct object 'you' in 'How have we defiled you?'
  chosen_reading: 'Retain the direct address to God: ''How have we defiled you?'''
  alternative_readings:
  - How have we defiled it?
  - How have we defiled your name/altar?
  rationale: The Hebrew suffix is explicitly second masculine singular. While the sense is mediated through the altar/table and God's name, the text's rhetoric intentionally treats contempt for worship as an affront to God himself. Preserving that tension aligns with the translation philosophy of not resolving theological force away from the source text.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Rendering לֶחֶם in sacrificial context
  chosen_reading: Translate as 'food' rather than the more literal 'bread'
  alternative_readings:
  - bread
  rationale: This is not a doctrinally contested term, but the cultic context indicates a broader sacrificial sense. 'Food' communicates the altar-offering sense more accurately in modern English without paraphrasing the metaphor of the LORD's table.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation tradition)
