id: MAL.1.2
reference: Malachi 1:2
source:
  edition: WLC
  text: אָהַ֤בְתִּי אֶתְ/כֶם֙ אָמַ֣ר יְהוָ֔ה וַ/אֲמַרְתֶּ֖ם בַּ/מָּ֣ה אֲהַבְתָּ֑/נוּ הֲ/לוֹא אָ֨ח עֵשָׂ֤ו לְ/יַֽעֲקֹב֙ נְאֻם יְהוָ֔ה וָ/אֹהַ֖ב אֶֽת יַעֲקֹֽב־־־׃
translation:
  text: “I have loved you,” says Yahweh. But you say, “How have you loved us?” “Was not Esau Jacob’s brother?” declares Yahweh. “Yet I loved Jacob,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “I loved you … How did you love us? … Did I not love Jacob?” The Hebrew perfect forms can be rendered with simple past in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָהַבְתִּי
  chosen: I have loved
  alternatives:
  - I loved
  lexicon: HALOT
  rationale: Qal perfect 1cs of אהב. Rendered with English present perfect to convey a past action with present relevance in this disputation context; simple past is possible but can sound less connected to the present claim of covenant love.
- source_word: אֶתְכֶם
  chosen: you
  lexicon: HALOT
  rationale: Direct-object marker plus 2mp suffix. English simply requires the object pronoun 'you'; the plural is addressed to Israel collectively and is clear from context.
- source_word: אָמַר יְהוָה
  chosen: says the LORD
  alternatives:
  - said the LORD
  lexicon: HALOT
  rationale: Prophetic speech formula. Although the Hebrew verb is perfect, English prophetic style commonly uses present 'says' for an ongoing divine declaration. YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: וַאֲמַרְתֶּם
  chosen: But you say
  alternatives:
  - And you say
  - But you said
  lexicon: HALOT
  rationale: The conjunction introduces the people's objection in the disputation pattern; 'But' brings out the adversative force naturally in English better than a bare 'And'.
- source_word: בַּמָּה
  chosen: How
  alternatives:
  - In what way
  - How exactly
  lexicon: HALOT
  rationale: Idiomatic interrogative meaning 'in what way?'. 'How' is concise, natural English and preserves the challenge.
- source_word: אֲהַבְתָּנוּ
  chosen: have you loved us
  alternatives:
  - did you love us
  lexicon: HALOT
  rationale: Perfect 2ms + 1cp suffix. Present perfect matches the opening 'I have loved you' and keeps the rhetorical exchange parallel.
- source_word: הֲלוֹא
  chosen: Was not
  alternatives:
  - Is not
  - Surely
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Was not' fits the genealogical fact being cited.
- source_word: אָח
  chosen: brother
  lexicon: HALOT
  rationale: Straightforward kinship term. In construct-like relation with the following names, expressed idiomatically in English as 'Jacob’s brother'.
- source_word: עֵשָׂו לְיַעֲקֹב
  chosen: Esau Jacob’s brother
  alternatives:
  - Esau a brother to Jacob
  - Esau the brother of Jacob
  lexicon: HALOT
  rationale: 'The preposition ל marks relation (''to/for Jacob''); idiomatic English expresses this as possession: ''Jacob’s brother.'''
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' preserves the solemnity and distinguishes it from the earlier speech tag.
- source_word: וָאֹהַב
  chosen: Yet I loved
  alternatives:
  - And I loved
  - But I loved
  lexicon: HALOT
  rationale: 'The conjunction here is contextually contrastive: despite Esau''s close relation to Jacob, YHWH''s electing love was set on Jacob. ''Yet'' captures the rhetorical contrast without overinterpreting beyond the immediate statement.'
- source_word: אֶת יַעֲקֹב
  chosen: Jacob
  lexicon: HALOT
  rationale: Direct-object marker plus proper name. English omits the marker and retains the transliterated personal name.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
