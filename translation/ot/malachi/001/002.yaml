theological_decisions:
- issue: Whether to make explicit the covenantal/elective sense of divine love toward Jacob and Israel
  chosen_reading: Retain the simple verb 'loved' without expanding to 'chosen' or 'set my covenant love on.'
  alternative_readings:
  - chosen
  - set my love on
  rationale: The verse itself uses the common verb אהב ('love'). While the context has covenantal and election overtones, importing those interpretive expansions into the main text would go beyond the lexical data. The theological force is preserved by the plain wording and the rhetorical contrast with Esau.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
