id: MAL.1.9
reference: Malachi 1:9
source:
  edition: WLC
  text: וְ/עַתָּ֛ה חַלּוּ נָ֥א פְנֵי אֵ֖ל וִֽ/יחָנֵ֑/נוּ מִ/יֶּדְ/כֶם֙ הָ֣יְתָה זֹּ֔את הֲ/יִשָּׂ֤א מִ/כֶּם֙ פָּנִ֔ים אָמַ֖ר יְהוָ֥ה צְבָאֽוֹת־־׃
translation:
  text: And now, entreat God for favor, that he may be gracious to us. From your hand has this come; will he show favor to any of you? says Yahweh of hosts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'implore the face of God.' The expression means to seek God's favor.
    reason: lexical_alternative
  - marker: b
    text: Or, 'This has come from your hand; will he accept any of you?'
    reason: alternative_reading
lexical_decisions:
- source_word: חַלּוּ נָא
  chosen: implore
  alternatives:
  - entreat
  - beseech
  - seek the favor of
  lexicon: HALOT
  rationale: The piel imperative of חלה with נָא here is an urgent appeal. In this idiom with פְּנֵי, it means to entreat or seek favor, not merely 'begin' or 'be weak.' 'Implore' captures the earnestness in natural modern English.
- source_word: פְנֵי אֵל
  chosen: God for favor
  alternatives:
  - the face of God
  - God's favor
  lexicon: HALOT
  rationale: Literally 'the face of God,' but in the idiom חלה פני it means to seek someone's favor. Rendering the idiomatic sense avoids wooden English while preserving the relational/judicial nuance.
- source_word: וִיחָנֵּנוּ
  chosen: that he may be gracious to us
  alternatives:
  - that he may show us favor
  - and he will be gracious to us
  lexicon: HALOT
  rationale: 'From חנן, ''show favor/be gracious.'' The prefixed conjunction with imperfect after the imperative is well rendered as purpose/result: ''that he may be gracious to us.'' ''Be gracious'' preserves the covenantal nuance better than the flatter ''show favor,'' though both are close.'
- source_word: מִיֶּדְכֶם הָיְתָה זֹּאת
  chosen: With this coming from your hand
  alternatives:
  - This has come from your hand
  - This was by your hand
  - From your hand has this happened
  lexicon: HALOT
  rationale: The phrase points to the defective offerings/priestly conduct as originating with them. 'Coming from your hand' preserves the Hebrew idiom of agency/source while reading smoothly in English.
- source_word: הֲיִשָּׂא מִכֶּם פָּנִים
  chosen: will he show favor to any of you?
  alternatives:
  - will he lift up your faces?
  - will he accept any of you?
  - will he be partial toward you?
  lexicon: HALOT
  rationale: The idiom נשׂא פנים literally means 'lift up the face,' but in context it denotes showing favor or acceptance. Because the question is rhetorical and addressed to corrupt priests, 'show favor to any of you' best fits the sense. 'Be partial' is possible in some contexts, but here the issue is favorable reception, not unjust favoritism.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of hosts
  alternatives:
  - the LORD of armies
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' 'Hosts' is the established and still intelligible rendering of צְבָאוֹת in this divine title, preserving its breadth beyond merely human armies.
