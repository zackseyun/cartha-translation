theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sense of the rhetorical question הֲיִשָּׂא מִכֶּם פָּנִים
  chosen_reading: will he show favor to any of you?
  alternative_readings:
  - will he accept your persons?
  - will he be partial to you?
  rationale: The verse rebukes priests who presume on divine favor while offering polluted worship. The chosen rendering preserves the rhetorical force without importing a doctrinal claim about divine partiality; it expresses favorable reception in context.
