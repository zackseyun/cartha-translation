theological_decisions:
- issue: Rendering the divine title יְהוָה צְבָאוֹת
  chosen_reading: Yahweh of Armies
  alternative_readings:
  - the LORD of hosts
  - Yahweh of Armies
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of מוֹרָאִי
  chosen_reading: the fear due me
  alternative_readings:
  - my reverence
  - the reverence due me
  rationale: The verse parallels honor owed to a father and fear/awe owed to a master. 'Fear due me' preserves the lexical force of מורא while signaling that reverential fear, not mere terror, is in view.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
- issue: Social-status term עֶבֶד
  chosen_reading: slave
  alternative_readings:
  - servant
  - bondservant
  rationale: The proverb contrasts a son/father relation with a slave/master relation. Because bonded status is salient in the analogy, 'slave' better reflects the Hebrew social hierarchy than the softer 'servant.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table on δοῦλος as analogous policy
