id: MAL.1.6
reference: Malachi 1:6
source:
  edition: WLC
  text: בֵּ֛ן יְכַבֵּ֥ד אָ֖ב וְ/עֶ֣בֶד אֲדֹנָ֑י/ו וְ/אִם אָ֣ב אָ֣נִי אַיֵּ֣ה כְבוֹדִ֡/י וְ/אִם אֲדוֹנִ֣ים אָנִי֩ אַיֵּ֨ה מוֹרָאִ֜/י אָמַ֣ר יְהוָ֣ה צְבָא֗וֹת לָ/כֶם֙ הַ/כֹּֽהֲנִים֙ בּוֹזֵ֣י שְׁמִ֔/י וַ/אֲמַרְתֶּ֕ם בַּ/מֶּ֥ה בָזִ֖ינוּ אֶת שְׁמֶֽ/ךָ־־׀־׃
translation:
  text: A son honors his father, and a servant his master. If, then, I am a father, where is my honor? And if I am a master, where is the fear due me? says Yahweh of Armies to you, O priests who despise my name. Yet you say, “How have we despised your name?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the LORD of hosts.”
    reason: lexical_alternative
  - marker: b
    text: Or “where is the reverence due me?”
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּן
  chosen: A son
  alternatives:
  - A child
  lexicon: HALOT
  rationale: בן is specifically masculine singular here and paired with 'father'; 'son' preserves the gendered proverb-like formulation in keeping with gender-accurate policy.
- source_word: יְכַבֵּד
  chosen: honors
  alternatives:
  - glorifies
  - shows honor to
  lexicon: HALOT
  rationale: Piel of כבד here denotes giving honor/respect in a relational sense. 'Honors' is idiomatic and fits the parallel with the later noun כבוד ('honor').
- source_word: אָב
  chosen: father
  alternatives:
  - parent
  lexicon: HALOT
  rationale: The ordinary familial sense is intended, and the repetition supports the analogy to the LORD as father.
- source_word: עֶבֶד
  chosen: a slave
  alternatives:
  - a servant
  - a bondservant
  lexicon: HALOT
  rationale: עבד can mean servant or slave; here the hierarchical relation to a master is foregrounded. 'Slave' best preserves the bonded status and sharpens the analogy with lordship/mastery.
- source_word: אֲדֹנָיו
  chosen: his master
  alternatives:
  - his lord
  lexicon: HALOT
  rationale: In this social relation, 'master' is the clearest English equivalent; 'lord' would sound overly theological in the opening proverb.
- source_word: וְאִם
  chosen: If, then
  alternatives:
  - And if
  - But if
  lexicon: HALOT
  rationale: The conjunction introduces the inferential application of the proverb. 'If, then' makes the logic explicit in natural English without adding content.
- source_word: כְבוֹדִי
  chosen: my honor
  alternatives:
  - my glory
  lexicon: HALOT
  rationale: כבוד can mean glory or honor; in this relational context, corresponding to a son's honoring a father, 'honor' is the better fit.
- source_word: אֲדוֹנִים
  chosen: a master
  alternatives:
  - lord
  lexicon: HALOT
  rationale: Though morphologically plural, אדנים here functions as a singular of majesty/intensity with אני. English singular 'master' best matches the sense and the preceding analogy.
- source_word: מוֹרָאִי
  chosen: the fear due me
  alternatives:
  - my fear
  - my reverence
  - the reverence due me
  lexicon: HALOT
  rationale: מורא denotes fear, awe, or reverence. 'The fear due me' preserves the concrete noun while making clear that the issue is the reverential fear owed to a master.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of hosts
  lexicon: HALOT
  rationale: צבאות literally refers to armies/hosts. 'Of Armies' is more transparent modern English than the traditional 'of hosts' while preserving the martial-cosmic title.
- source_word: הַכֹּהֲנִים
  chosen: O priests
  alternatives:
  - you priests
  lexicon: HALOT
  rationale: The phrase is vocative after 'to you'; 'O priests' clearly marks direct address and suits prophetic style.
- source_word: בּוֹזֵי
  chosen: who despise
  alternatives:
  - who scorn
  - despisers of
  lexicon: HALOT
  rationale: The participle characterizes the priests ongoingly. 'Who despise' is natural English and preserves the verbal force.
- source_word: שְׁמִי
  chosen: my name
  lexicon: HALOT
  rationale: '''Name'' carries covenantal reputation and honor here; the literal rendering should be retained rather than paraphrased as ''me'' or ''my reputation''.'
- source_word: וַאֲמַרְתֶּם
  chosen: Yet you say
  alternatives:
  - But you say
  - And you say
  lexicon: HALOT
  rationale: The waw introduces the people's objection in contrast to the accusation. 'Yet' captures the adversative force in context.
- source_word: בַּמֶּה
  chosen: How
  alternatives:
  - In what way
  - By what means
  lexicon: HALOT
  rationale: The idiom asks for the manner or respect in which the charge is true. 'How have we...?' is idiomatic English.
- source_word: בָזִינוּ
  chosen: have we despised
  alternatives:
  - have we shown contempt for
  lexicon: HALOT
  rationale: 'Using the same English root as בוזי preserves the rhetorical repetition: the priests who ''despise'' ask how they ''have despised''.'
