id: MAL.1.4
reference: Malachi 1:4
source:
  edition: WLC
  text: כִּֽי תֹאמַ֨ר אֱד֜וֹם רֻשַּׁ֗שְׁנוּ וְ/נָשׁוּב֙ וְ/נִבְנֶ֣ה חֳרָב֔וֹת כֹּ֤ה אָמַר֙ יְהוָ֣ה צְבָא֔וֹת הֵ֥מָּה יִבְנ֖וּ וַ/אֲנִ֣י אֶהֱר֑וֹס וְ/קָרְא֤וּ לָ/הֶם֙ גְּב֣וּל רִשְׁעָ֔ה וְ/הָ/עָ֛ם אֲשֶׁר זָעַ֥ם יְהוָ֖ה עַד עוֹלָֽם־־־׃
translation:
  text: 'Though Edom says, “We are shattered, but we will return and rebuild the ruins,” this is what Yahweh of Armies says: “They may build, but I will tear down, and they will be called the territory of wickedness, the people with whom Yahweh is indignant forever.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “They will build, but I will tear down.” The Hebrew can be read predictively; the main text brings out the concessive force in context.
    reason: alternative_reading
  - marker: b
    text: 'Traditional rendering: “the LORD of hosts.”'
    reason: lexical_alternative
  - marker: c
    text: Or, “the borderland of wickedness.”
    reason: lexical_alternative
  - marker: d
    text: Or, “the people against whom the LORD is indignant forever.”
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: Though
  alternatives:
  - For
  - If
  - When
  lexicon: HALOT
  rationale: Introduces a concessive or situational clause tied to Edom's claim. 'Though' fits the rhetorical force in context better than a strictly causal 'for,' bringing out the contrast between Edom's intention and the LORD's response.
- source_word: תֹאמַר
  chosen: says
  alternatives:
  - will say
  - may say
  lexicon: HALOT
  rationale: The imperfect here functions naturally as a present or gnomic future in English within prophetic discourse. 'Says' is idiomatic and keeps the statement vivid.
- source_word: אֱדוֹם
  chosen: Edom
  lexicon: HALOT
  rationale: Standard transliteration of the nation name, per policy to transliterate names.
- source_word: רֻשַּׁשְׁנוּ
  chosen: We are shattered
  alternatives:
  - We are crushed
  - We are beaten down
  - We are impoverished
  lexicon: HALOT
  rationale: The passive form conveys being broken down or devastated. 'Shattered' captures the force of national ruin without narrowing it merely to economic poverty.
- source_word: וְנָשׁוּב
  chosen: we will return
  alternatives:
  - we will come back
  - we will be restored
  lexicon: HALOT
  rationale: The verb primarily means 'return.' This may imply returning to rebuild after devastation; 'be restored' would over-interpret the subject as passive.
- source_word: וְנִבְנֶה חֳרָבוֹת
  chosen: and rebuild the ruins
  alternatives:
  - and build the ruins
  - and rebuild the waste places
  - and rebuild the devastated places
  lexicon: HALOT
  rationale: English idiom prefers 'rebuild the ruins' rather than the more wooden 'build ruins.' 'Ruins' adequately represents חֳרָבוֹת as devastated places.
- source_word: כֹּה אָמַר
  chosen: this is what ... says
  alternatives:
  - thus says
  - so says
  lexicon: HALOT
  rationale: A standard prophetic messenger formula. 'This is what ... says' is more natural modern English while preserving the formulaic force.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of hosts
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is translated rather than preserved in traditional form; 'of Armies' communicates the martial/plural sense more transparently to modern readers than 'of hosts.'
- source_word: הֵמָּה יִבְנוּ
  chosen: They may build
  alternatives:
  - They will build
  - They build
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis. In context the clause is concessive and adversative relative to the LORD's response; 'They may build' captures the sense that even if they undertake rebuilding, it will not stand.
- source_word: וַאֲנִי אֶהֱרֹס
  chosen: but I will tear down
  alternatives:
  - but I will demolish
  - and I will tear down
  lexicon: HALOT
  rationale: The pronoun is emphatic in contrast to Edom's efforts. 'Tear down' is vivid and natural; 'but' makes the adversative force explicit in English.
- source_word: וְקָרְאוּ לָהֶם
  chosen: and they will be called
  alternatives:
  - and people will call them
  - and one will call them
  lexicon: HALOT
  rationale: The Hebrew third plural is an impersonal construction. Passive English is the most natural equivalent.
- source_word: גְּבוּל רִשְׁעָה
  chosen: the territory of wickedness
  alternatives:
  - the borderland of wickedness
  - the realm of wickedness
  lexicon: HALOT
  rationale: גְּבוּל can denote territory or border region. 'Territory' communicates a national domain more clearly in English here, while preserving the moral characterization in רִשְׁעָה as 'wickedness.'
- source_word: וְהָעָם אֲשֶׁר זָעַם יְהוָה
  chosen: the people with whom the LORD is angry
  alternatives:
  - the people the LORD has denounced
  - the people against whom the LORD is indignant
  lexicon: HALOT
  rationale: זעם denotes indignation or wrath. 'Is angry' is accessible modern English; the prepositional phrase 'with whom' reflects the relational target of divine anger without sounding wooden.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - to eternity
  - perpetually
  lexicon: HALOT
  rationale: A standard idiomatic rendering for enduring duration. 'Forever' is natural modern English and preserves the force of ongoing judgment in context.
