theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering צְבָאוֹת in the divine title
  chosen_reading: of Armies
  alternative_readings:
  - of hosts
  rationale: The translation philosophy prefers readable modern English and translating titles for meaning. 'Of Armies' makes the Hebrew sense transparent for contemporary readers while preserving the title's force.
  doctrine_reference: Translation philosophy §§2, 6
- issue: Force of the clause הֵמָּה יִבְנוּ וַאֲנִי אֶהֱרֹס
  chosen_reading: 'concessive-adversative: ''They may build, but I will tear down'''
  alternative_readings:
  - 'predictive: ''They will build, but I will tear down'''
  rationale: The context emphasizes the futility of Edom's rebuilding in the face of divine opposition. English concessive 'may build' best conveys that rhetorical force without changing the underlying sense.
