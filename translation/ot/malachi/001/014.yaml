id: MAL.1.14
reference: Malachi 1:14
source:
  edition: WLC
  text: וְ/אָר֣וּר נוֹכֵ֗ל וְ/יֵ֤שׁ בְּ/עֶדְר/וֹ֙ זָכָ֔ר וְ/נֹדֵ֛ר וְ/זֹבֵ֥חַ מָשְׁחָ֖ת לַֽ/אדֹנָ֑/י כִּי֩ מֶ֨לֶךְ גָּד֜וֹל אָ֗נִי אָמַר֙ יְהוָ֣ה צְבָא֔וֹת וּ/שְׁמִ֖/י נוֹרָ֥א בַ/גּוֹיִֽם׃
translation:
  text: But cursed is the deceiver who has a male in his flock, and vows it, but sacrifices a blemished animal to the Lord. For I am a great King, says Yahweh of Armies, and my name is feared among the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the LORD of hosts.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'my name is revered among the nations.' The Hebrew term carries the sense of inspiring fear, awe, and reverence.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  chosen: cursed
  alternatives:
  - accursed
  lexicon: HALOT
  rationale: Predicate adjective announcing divine judgment; 'cursed' is standard, clear modern English without archaic weight.
- source_word: נוֹכֵל
  chosen: the deceiver
  alternatives:
  - the cheat
  - the fraudulent one
  lexicon: HALOT
  rationale: Refers to one who acts deceitfully in worship by withholding the proper offering. 'Deceiver' captures the moral/religious fraud better than the more colloquial 'cheat'.
- source_word: יֵשׁ בְּעֶדְרוֹ זָכָר
  chosen: who has a male in his flock
  alternatives:
  - when there is a male in his herd/flock
  - though he has a male in his flock
  lexicon: HALOT
  rationale: 'The clause identifies the man''s culpability: he possesses an acceptable male animal yet offers otherwise. ''Flock'' is idiomatic for sacrificial livestock here, though ''herd'' is possible more broadly.'
- source_word: וְנֹדֵר
  chosen: and vows it
  alternatives:
  - and makes a vow
  - and vows
  lexicon: HALOT
  rationale: The participle indicates making a vow concerning the acceptable animal just mentioned. Supplying 'it' makes the implied object explicit in natural English.
- source_word: וְזֹבֵחַ
  chosen: but sacrifices
  alternatives:
  - and sacrifices
  lexicon: HALOT
  rationale: 'Though formally waw-consecutive/coordinate, the sense is adversative in context: he vows one thing yet offers another. ''But'' best reflects the rhetorical contrast.'
- source_word: מָשְׁחָת
  chosen: a blemished animal
  alternatives:
  - a corrupted thing
  - something defective
  - a blemished one
  lexicon: HALOT
  rationale: In sacrificial context the term denotes something spoiled/defective and therefore unfit. 'Blemished animal' communicates the cultic sense clearly for modern readers.
- source_word: לַאדֹנָי
  chosen: to the Lord
  alternatives:
  - to the master
  lexicon: HALOT
  rationale: Here אֲדֹנָי refers to God as sovereign recipient of sacrifice. 'Lord' is the established title in English biblical style and matches the doctrinal default for divine title rendering.
- source_word: כִּי מֶלֶךְ גָּדוֹל אֲנִי
  chosen: For I am a great King
  alternatives:
  - Because I am a great king
  lexicon: HALOT
  rationale: Retains the divine self-declaration and causal force. Capitalizing 'King' reflects titular use for God in English without adding content.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of hosts
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is translated rather than preserved in traditional ecclesiastical form; 'Armies' is more transparent to modern readers than 'hosts' while preserving martial/cosmic force.
- source_word: וּשְׁמִי
  chosen: and my name
  lexicon: HALOT
  rationale: Straightforward possessive construction; 'name' in Hebrew carries reputation and revealed identity, which English can preserve directly.
- source_word: נוֹרָא
  chosen: is feared
  alternatives:
  - is awesome
  - is revered
  - is dreadful
  lexicon: HALOT
  rationale: The passive-like adjectival sense here emphasizes that God's name evokes fear/reverence among the nations. 'Is feared' preserves the stronger covenantal sense better than the weaker modern 'is revered' or the colloquialized 'is awesome'.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  lexicon: HALOT
  rationale: In prophetic literature גוים commonly means the nations/peoples outside Israel. 'Among the nations' is natural and avoids importing later NT-specific connotations of 'Gentiles'.
