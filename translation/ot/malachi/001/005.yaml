id: MAL.1.5
reference: Malachi 1:5
source:
  edition: WLC
  text: וְ/עֵינֵי/כֶ֖ם תִּרְאֶ֑ינָה וְ/אַתֶּ֤ם תֹּֽאמְרוּ֙ יִגְדַּ֣ל יְהוָ֔ה מֵ/עַ֖ל לִ/גְב֥וּל יִשְׂרָאֵֽל׃
translation:
  text: Your own eyes will see, and you yourselves will say, “Great is Yahweh beyond the border of Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “The LORD is great beyond the border of Israel,” or “Great is the LORD beyond the border of Israel.” The Hebrew may be read as an acclamation or as a statement.
    reason: alternative_reading
lexical_decisions:
- source_word: וְעֵינֵיכֶם
  chosen: Your own eyes
  alternatives:
  - your eyes
  lexicon: HALOT
  rationale: Literally 'and your eyes.' Rendering with 'your own eyes' brings out the emphatic possessive force in natural English while preserving the concrete imagery of direct sight.
- source_word: תִּרְאֶינָה
  chosen: will see this
  alternatives:
  - will see
  - shall see
  lexicon: HALOT
  rationale: Imperfect of ראה indicates future action. 'Will see' is the natural English future. 'This' is supplied idiomatically from context (the LORD's judgment on Edom in the preceding verse) to make the object explicit in English without over-paraphrasing.
- source_word: וְאַתֶּם
  chosen: and you yourselves
  alternatives:
  - and you
  - then you
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis. 'You yourselves' preserves that emphasis better than a simple 'you.'
- source_word: תֹּאמְרוּ
  chosen: will say
  alternatives:
  - shall say
  lexicon: HALOT
  rationale: Simple future sense fits the sequence of events and standard modern English.
- source_word: יִגְדַּל
  chosen: May ... be magnified
  alternatives:
  - The LORD is great
  - The LORD will be great
  - Great is the LORD
  lexicon: HALOT
  rationale: The jussive/imprecative nuance is best represented by 'May ... be magnified.' This preserves the volitional or acclamatory force better than a flat indicative. Passive English also reflects the idiomatic sense of ascribing greatness to the LORD.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מֵעַל
  chosen: beyond
  alternatives:
  - over
  - above
  - from over
  lexicon: HALOT
  rationale: 'In the phrase מֵעַל לִגְבוּל יִשְׂרָאֵל, ''beyond'' best captures the spatial sense in idiomatic English: the LORD''s greatness extends outside or beyond Israel''s border.'
- source_word: לִגְבוּל יִשְׂרָאֵל
  chosen: the border of Israel
  alternatives:
  - the territory of Israel
  - the boundary of Israel
  - the borders of Israel
  lexicon: HALOT
  rationale: גְּבוּל commonly means border, boundary, or territory. Singular 'border' matches the Hebrew form and works idiomatically here, expressing that the LORD's greatness is acknowledged beyond Israel's national limits.
