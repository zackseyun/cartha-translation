id: MAL.1.1
reference: Malachi 1:1
source:
  edition: WLC
  text: מַשָּׂ֥א דְבַר יְהוָ֖ה אֶל יִשְׂרָאֵ֑ל בְּ/יַ֖ד מַלְאָכִֽי־־׃
translation:
  text: 'The oracle of the word of Yahweh to Israel by the hand of Malachi:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'oracle.' The Hebrew term can denote a weighty prophetic utterance.
    reason: lexical_alternative
  - marker: b
    text: Malachi may also be understood as 'my messenger,' since the Hebrew form is transparently related to that expression.
    reason: alternative_reading
lexical_decisions:
- source_word: מַשָּׂא
  chosen: burden
  alternatives:
  - oracle
  lexicon: HALOT
  rationale: מַשָּׂא in prophetic headings can denote an utterance with the sense of a weighty pronouncement or oracle. 'Burden' preserves the concrete metaphor and the solemn tone of the Hebrew, while 'oracle' is a common interpretive alternative. Because 'oracle' is viable and familiar in modern translations, it is preserved in a footnote.
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: The construct phrase is straightforwardly 'word of YHWH.' 'The word of the LORD' is both formally accurate and idiomatic in prophetic superscriptions. 'Message' is possible but less textually direct.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל יִשְׂרָאֵל
  chosen: to Israel
  alternatives:
  - against Israel
  - concerning Israel
  lexicon: HALOT
  rationale: אֶל most naturally means 'to' here, indicating the addressee of the prophetic word. Given the rebuking content of the book, some render 'concerning' or even 'against,' but the preposition itself does not require those stronger interpretive senses in this heading.
- source_word: בְּיַד
  chosen: by the hand of
  alternatives:
  - through
  - by
  lexicon: HALOT
  rationale: The idiom literally means 'by the hand of' and commonly marks agency or instrumentality in prophetic superscriptions. Retaining the idiom preserves Hebrew texture while remaining understandable in English.
- source_word: מַלְאָכִי
  chosen: Malachi
  alternatives:
  - my messenger
  lexicon: HALOT
  rationale: As the book heading identifies the prophetic speaker, this is best taken as the proper name 'Malachi,' in keeping with the translation principle to transliterate names. Since the form is transparently related to 'my messenger,' that lexical possibility is preserved in a footnote.
