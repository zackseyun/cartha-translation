theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Understanding מַלְאָכִי as a proper name or descriptive title
  chosen_reading: proper name 'Malachi'
  alternative_readings:
  - descriptive title 'my messenger'
  rationale: In a prophetic book superscription, the final term functions most naturally as the prophet's name. This also aligns with the translation principle to transliterate names. Because the Hebrew form can also be read descriptively, the alternative is preserved in a footnote rather than adopted in the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Translate titles; transliterate names; preserve theological tension rather than resolve it without note'
