id: MAL.3.12
reference: Malachi 3:12
source:
  edition: WLC
  text: וְ/אִשְּׁר֥וּ אֶתְ/כֶ֖ם כָּל הַ/גּוֹיִ֑ם כִּֽי תִהְי֤וּ אַתֶּם֙ אֶ֣רֶץ חֵ֔פֶץ אָמַ֖ר יְהוָ֥ה צְבָאֽוֹת־־׃ס
translation:
  text: Then all the nations will call you blessed, for you will be a delightful land, says Yahweh of hosts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a land of delight' or 'a desirable land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִשְּׁרוּ
  chosen: will call ... blessed
  alternatives:
  - will count ... happy
  - will pronounce ... blessed
  lexicon: HALOT
  rationale: From אשר in the Piel, meaning to declare or regard as blessed/happy. 'Call you blessed' is idiomatic modern English and preserves the public recognition implied by the verb.
- source_word: כָּל הַגּוֹיִם
  chosen: all the nations
  alternatives:
  - all the peoples
  - all the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם commonly means 'nations.' In this prophetic context it refers to the surrounding peoples collectively, not specifically 'Gentiles' as a later technical contrast.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason the nations will call them blessed. 'For' is concise and natural in English.
- source_word: תִהְיוּ אַתֶּם
  chosen: you will be
  alternatives:
  - you yourselves will become
  - you shall be
  lexicon: HALOT
  rationale: Simple future of היה with explicit pronoun for emphasis. English does not need to reproduce the pronoun separately, though the clause retains the direct address.
- source_word: אֶרֶץ חֵפֶץ
  chosen: a delightful land
  alternatives:
  - a land of delight
  - a desirable land
  - a pleasant land
  lexicon: HALOT
  rationale: Literally 'a land of delight/desire.' 'Delightful land' is natural English and conveys that the land is pleasing and desirable because of divine favor.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: The established rendering 'hosts' preserves the breadth of the term, including heavenly and earthly armies, without over-narrowing it.
