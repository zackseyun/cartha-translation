id: MAL.3.21
reference: Malachi 3:21
source:
  edition: WLC
  text: וְ/עַסּוֹתֶ֣ם רְשָׁעִ֔ים כִּֽי יִהְי֣וּ אֵ֔פֶר תַּ֖חַת כַּפּ֣וֹת רַגְלֵי/כֶ֑ם בַּ/יּוֹם֙ אֲשֶׁ֣ר אֲנִ֣י עֹשֶׂ֔ה אָמַ֖ר יְהוָ֥ה צְבָאֽוֹת־׃פ
translation:
  text: And you will trample the wicked, for they will be ashes under the soles of your feet on the day when I act, says Yahweh of Armies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the LORD of Hosts.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַסּוֹתֶם
  chosen: And you will trample
  alternatives:
  - And you shall tread down
  - And you will crush
  lexicon: HALOT
  rationale: From the root עמס/עסס? In this context and standard lexical treatment of the form from עשה? the established sense in Mal 4:3 Eng. is 'trample/tread down' the wicked. 'Trample' is natural modern English and preserves the physical metaphor of victorious subjugation without over-paraphrase.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the wicked ones
  lexicon: HALOT
  rationale: Plural adjective/substantive meaning wicked persons. 'The wicked' is concise, idiomatic, and preserves the moral category.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: 'Introduces the reason for the trampling: they will become ashes. ''For'' preserves the explanatory force in a compact way.'
- source_word: יִהְיוּ אֵפֶר
  chosen: they will be ashes
  alternatives:
  - they will become ashes
  - they will be like ashes
  lexicon: HALOT
  rationale: The predicate is direct, not explicitly comparative. 'They will be ashes' is the plainest rendering; English plural 'ashes' is idiomatic for אֵפֶר in this context.
- source_word: תַּחַת
  chosen: under
  alternatives:
  - beneath
  lexicon: HALOT
  rationale: Simple spatial preposition; 'under' is the most natural equivalent.
- source_word: כַּפּוֹת רַגְלֵיכֶם
  chosen: the soles of your feet
  alternatives:
  - the palms of your feet
  - your footsoles
  lexicon: HALOT
  rationale: כַּף literally refers to palm/sole; with feet it idiomatically means 'soles.' This is the standard English expression.
- source_word: בַּיּוֹם אֲשֶׁר
  chosen: on the day when
  alternatives:
  - in the day that
  - on the day that
  lexicon: HALOT
  rationale: Temporal phrase introducing the time of divine action. 'On the day when' is clear modern English.
- source_word: אֲנִי עֹשֶׂה
  chosen: I act
  alternatives:
  - I do this
  - I am acting
  - I make
  lexicon: HALOT
  rationale: The participle of עשה after 'the day when' is somewhat elliptical ('the day that I am doing/making'). In context it refers to YHWH's decisive intervention in judgment. 'I act' is a restrained optimal-equivalence rendering that makes good English without importing extra content.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of Hosts
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is translated rather than transliterated to preserve meaning. 'Armies' is more transparent to modern readers than 'Hosts,' while retaining the martial/cosmic force of the title.
