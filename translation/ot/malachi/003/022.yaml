id: MAL.3.22
reference: Malachi 3:22
source:
  edition: WLC
  text: זִכְר֕וּ תּוֹרַ֖ת מֹשֶׁ֣ה עַבְדִּ֑/י אֲשֶׁר֩ צִוִּ֨יתִי אוֹת֤/וֹ בְ/חֹרֵב֙
    עַל כָּל יִשְׂרָאֵ֔ל חֻקִּ֖ים וּ/מִשְׁפָּטִֽים־־׃
translation:
  text: Remember the law of Moses my servant, which I commanded him at Horeb for all
    Israel—statutes and judgments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the instruction of Moses my servant.'
    reason: lexical_alternative
  - marker: b
    text: '''Horeb'' is another name for Sinai, the mountain where God gave Israel
      the covenant law through Moses.'
    reason: cultural_note
  - marker: c
    text: Or 'statutes and ordinances.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זִכְרוּ
  chosen: Remember
  alternatives:
  - Keep in mind
  - Call to mind
  lexicon: HALOT
  rationale: Imperative plural from זכר, calling the audience to active remembrance
    with covenantal implications. 'Remember' is the standard and sufficiently weighty
    English rendering.
- source_word: תּוֹרַת
  chosen: the law
  alternatives:
  - the instruction
  lexicon: HALOT
  rationale: תּוֹרָה can mean 'instruction,' but in the collocation 'the torah of
    Moses' and with the following reference to Horeb and covenant stipulations, it
    points specifically to the Mosaic law/covenantal corpus. 'Law' best fits the context
    without over-paraphrasing.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: Although עבד can denote a slave, in this honorific covenantal designation
    for Moses the emphasis is on his role as YHWH's commissioned servant. 'My servant'
    is the most natural and contextually appropriate rendering.
- source_word: אֲשֶׁר צִוִּיתִי אֹתוֹ
  chosen: which I commanded him
  alternatives:
  - that I commanded him
  - which I commanded to him
  lexicon: HALOT
  rationale: Relative clause referring back to 'the law.' English idiom prefers 'which
    I commanded him,' with 'him' referring to Moses as recipient/mediator of the command.
- source_word: בְּחֹרֵב
  chosen: at Horeb
  alternatives:
  - in Horeb
  lexicon: HALOT
  rationale: ב with a place name here is locative. 'At Horeb' is idiomatic and preserves
    the Sinai/Horeb setting.
- source_word: עַל כָּל יִשְׂרָאֵל
  chosen: for all Israel
  alternatives:
  - concerning all Israel
  - upon all Israel
  lexicon: HALOT
  rationale: עַל here marks scope/application of the command. 'For all Israel' communicates
    that the law was commanded with reference to the whole covenant people.
- source_word: חֻקִּים
  chosen: statutes
  alternatives:
  - decrees
  - ordinances
  lexicon: HALOT
  rationale: A standard rendering for covenantal prescribed enactments; preserves
    legal nuance and pairs well with the following term.
- source_word: וּמִשְׁפָּטִים
  chosen: and judgments
  alternatives:
  - and rules
  - and ordinances
  lexicon: HALOT
  rationale: מִשְׁפָּטִים in legal contexts often denotes judicial decisions or ordinances.
    'Judgments' preserves the forensic/legal sense and reflects the Hebrew distinction
    from חֻקִּים.
