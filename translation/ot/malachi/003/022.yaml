theological_decisions:
- issue: Rendering תּוֹרָה in covenantal context
  chosen_reading: the law
  alternative_readings:
  - the instruction
  rationale: The verse explicitly recalls Moses, Horeb, and covenant stipulations
    for Israel. In this setting, a more specific legal-covenantal rendering is warranted
    over the broader 'instruction.' This does not deny the pedagogical sense of torah
    but reflects the immediate context.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; consistency of key terms, or documented exception.'
- issue: Rendering עבד for Moses
  chosen_reading: my servant
  alternative_readings:
  - my slave
  rationale: The doctrine excerpt prefers 'slave' where bonded status is theologically
    salient, especially for Greek doulos. Here, however, the Hebrew title for Moses
    functions as an honorific designation of commissioned service rather than emphasizing
    chattel or bonded status. 'Servant' better matches the source intent in this context.
  doctrine_reference: 'Translation philosophy: optimal equivalence; contested terms
    table on δοῦλος servant/slave (context-dependent).'
