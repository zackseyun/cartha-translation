theological_decisions:
- issue: Corporate scope of judgment
  chosen_reading: 'The verse addresses the covenant people corporately: the entire
    nation is under the curse because the whole community is robbing God.'
  alternative_readings:
  - The phrase could be taken as an appositional intensifier meaning simply 'all of
    you' without emphasizing national identity.
  rationale: הַגּוֹי כֻּלּוֹ is a collective designation, and the context concerns
    communal covenant unfaithfulness. The translation preserves both the corporate
    and second-person dimensions without importing later theological categories.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
