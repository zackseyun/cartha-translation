id: MAL.3.9
reference: Malachi 3:9
source:
  edition: WLC
  text: בַּ/מְּאֵרָה֙ אַתֶּ֣ם נֵֽאָרִ֔ים וְ/אֹתִ֖/י אַתֶּ֣ם קֹבְעִ֑ים הַ/גּ֖וֹי כֻּלּֽ/וֹ׃
translation:
  text: You are cursed with a curse, yet you are robbing me—the whole nation of you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You are under a curse, and yet you are robbing me—all of you, the whole
      nation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּמְּאֵרָה
  chosen: with a curse
  alternatives:
  - under a curse
  - by the curse
  lexicon: HALOT
  rationale: The noun מְאֵרָה means 'curse.' The prefixed ב is best taken instrumentally
    or statively here. 'With a curse' preserves the Hebrew idiom and pairs naturally
    with the following passive participle. 'Under a curse' is possible in smoother
    English, but the doubled expression is rhetorically forceful in Hebrew.
- source_word: נֵאָרִים
  chosen: are cursed
  alternatives:
  - are being cursed
  lexicon: HALOT
  rationale: Passive participle from ארר, indicating the people's present state. 'Are
    cursed' is the most natural English rendering and preserves the durative/resultative
    sense without overtranslating aspect.
- source_word: וְאֹתִי
  chosen: yet you are robbing me
  alternatives:
  - and you are robbing me
  lexicon: HALOT
  rationale: 'The conjunction can be rendered simply ''and,'' but in context it has
    an adversative force: despite being cursed, they continue robbing God. Including
    ''me'' preserves the marked direct object.'
- source_word: קֹבְעִים
  chosen: are robbing
  alternatives:
  - are defrauding
  - are cheating
  lexicon: HALOT
  rationale: The verb קבע in this context means to rob or defraud, as in the immediate
    context of withholding tithes. 'Robbing' matches the repeated accusation in this
    passage and is the clearest modern English equivalent.
- source_word: הַגּוֹי כֻּלּוֹ
  chosen: the whole nation of you
  alternatives:
  - the whole nation
  - all of you, the nation
  lexicon: HALOT
  rationale: Literally 'the whole nation, all of it.' Because the address is second
    person plural, the phrase identifies the entire covenant community as implicated.
    'The whole nation of you' is slightly idiomatic but preserves both the collective
    noun and the direct address better than simply 'the whole nation.'
