theological_decisions:
- issue: Rendering of חֵרֶם at the close of the book
  chosen_reading: with a ban of destruction
  alternative_readings:
  - with a curse
  - with utter destruction
  - with the ban
  rationale: The Hebrew term is not the ordinary word for 'curse' but a term for something
    devoted to destruction under divine judgment. Rendering it more literally avoids
    importing a narrower concept than the source text warrants, while still communicating
    the severity of covenant judgment. Because 'curse' is familiar from many English
    versions, it is preserved in a footnote as an alternative.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological weight without paraphrase.'
