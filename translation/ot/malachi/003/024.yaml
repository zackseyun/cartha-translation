id: MAL.3.24
reference: Malachi 3:24
source:
  edition: WLC
  text: וְ/הֵשִׁ֤יב לֵב אָבוֹת֙ עַל בָּנִ֔ים וְ/לֵ֥ב בָּנִ֖ים עַל אֲבוֹתָ֑/ם פֶּן
    אָב֕וֹא וְ/הִכֵּיתִ֥י אֶת הָ/אָ֖רֶץ חֵֽרֶם־־־־־׃
translation:
  text: And he will turn the hearts of fathers to their children, and the hearts of
    children to their fathers, lest I come and strike the land with a ban of destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with utter destruction'; traditionally, 'with a curse.' The Hebrew term
      refers to something placed under a ban and devoted to destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵשִׁיב
  chosen: And he will turn
  alternatives:
  - And he will restore
  - And he will bring back
  lexicon: HALOT
  rationale: Hiphil of שוב commonly means to turn back/restore. In this relational
    context, 'turn' is the most natural English rendering and preserves the idiom
    of redirected affections/loyalties without over-specifying the mechanism.
- source_word: לֵב
  chosen: hearts
  alternatives:
  - heart
  - mind
  lexicon: HALOT
  rationale: Hebrew 'heart' denotes the inner person, including will and affection.
    English plural 'hearts' fits the distributive sense with plural fathers/children.
- source_word: אָבוֹת
  chosen: fathers
  alternatives:
  - parents
  - ancestors
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural 'fathers.' Per the translation
    philosophy, gender-accurate rendering is preferred over neutralization. 'Ancestors'
    is possible in some contexts, but here the paired contrast with 'children' favors
    immediate family/generational reconciliation.
- source_word: עַל
  chosen: to
  alternatives:
  - toward
  - upon
  lexicon: HALOT
  rationale: 'Although literally ''upon/to,'' in this idiom it expresses relational
    orientation. ''To'' is idiomatic in English: ''turn the hearts of X to Y.'''
- source_word: בָּנִים
  chosen: children
  alternatives:
  - sons
  lexicon: HALOT
  rationale: While the form can mean 'sons,' it also functions generically for offspring/children.
    In parallel with 'fathers,' 'children' best conveys the representative family
    sense without implying only males.
- source_word: אֲבוֹתָם
  chosen: their fathers
  alternatives:
  - their ancestors
  lexicon: HALOT
  rationale: The pronominal suffix requires 'their.' As in the first colon, the immediate
    relational sense is best captured by 'fathers' rather than the broader 'ancestors.'
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - or else
  lexicon: HALOT
  rationale: Introduces a warning of undesirable consequence. 'Lest' is concise and
    preserves the solemn prophetic tone.
- source_word: אָבוֹא
  chosen: I come
  alternatives:
  - I should come
  lexicon: HALOT
  rationale: Simple rendering of the first person imperfect of בוא. In English after
    'lest,' the bare form 'I come' is idiomatic and direct.
- source_word: וְהִכֵּיתִי
  chosen: and strike
  alternatives:
  - and smite
  - and strike down
  lexicon: HALOT
  rationale: Hiphil/perfect with vav after פֶּן expresses the threatened result. 'Strike'
    is clear modern English; 'smite' is traditional but archaic.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  lexicon: HALOT
  rationale: אֶרֶץ can mean land or earth. In Malachi's covenantal-prophetic setting,
    'the land' better fits the threatened judgment on the covenant community and avoids
    sounding unnecessarily cosmic.
- source_word: חֵרֶם
  chosen: with a ban of destruction
  alternatives:
  - with utter destruction
  - with a curse
  - with the ban
  lexicon: HALOT
  rationale: חֵרֶם denotes something devoted to destruction, often under a ban. Because
    the term is theologically and culturally loaded, 'a ban of destruction' preserves
    more of the Hebrew concept than the traditional but potentially misleading 'curse.'
    Alternatives are preserved in a footnote.
