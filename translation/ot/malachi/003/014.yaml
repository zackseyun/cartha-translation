theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render the Tetragrammaton as 'the LORD,' following
    the stated doctrine and established reverential convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of the speakers' complaint about religious observance
  chosen_reading: The verse is rendered as a cynical complaint that serving God and
    keeping his requirements has yielded no benefit.
  alternative_readings:
  - A narrower complaint focused only on ritual mourning practices
  rationale: The syntax joins serving God, keeping his charge, and walking in mourning
    as related examples of pious conduct the speakers deem unprofitable. The translation
    preserves that complaint without importing a stronger theological claim than the
    text states.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve the source text''s
    plain sense without importing doctrinal claims'
