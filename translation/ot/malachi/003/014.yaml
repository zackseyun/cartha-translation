id: MAL.3.14
reference: Malachi 3:14
source:
  edition: WLC
  text: אֲמַרְתֶּ֕ם שָׁ֖וְא עֲבֹ֣ד אֱלֹהִ֑ים וּ/מַה בֶּ֗צַע כִּ֤י שָׁמַ֨רְנוּ֙ מִשְׁמַרְתּ֔/וֹ
    וְ/כִ֤י הָלַ֨כְנוּ֙ קְדֹ֣רַנִּ֔ית מִ/פְּנֵ֖י יְהוָ֥ה צְבָאֽוֹת־׃
translation:
  text: You have said, ‘It is vain to serve God. And what profit is it that we have
    kept his charge and that we have walked in mourning before the LORD of hosts?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'futile' instead of 'vain.'
    reason: lexical_alternative
  - marker: b
    text: Or 'what gain' instead of 'what profit.'
    reason: lexical_alternative
  - marker: c
    text: '''His charge'' may also be rendered ''what he required'' or ''his requirement.'''
    reason: lexical_alternative
  - marker: d
    text: Or 'walked gloomily' or 'gone about in black,' likely referring to mournful
      or penitential behavior.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁוְא
  chosen: vain
  alternatives:
  - futile
  - empty
  - worthless
  lexicon: HALOT
  rationale: שָׁוְא denotes emptiness or futility. 'Vain' preserves the evaluative
    force and fits the idiom 'it is vain to serve God' without over-paraphrasing.
- source_word: עֲבֹד
  chosen: to serve
  alternatives:
  - to worship
  lexicon: HALOT
  rationale: The infinitive of עבד here refers broadly to rendering service to God,
    not narrowly cultic worship. 'Serve' is the most direct and contextually appropriate
    rendering.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In this context אֱלֹהִים clearly refers to the God of Israel, so 'God'
    is the natural English rendering.
- source_word: בֶּצַע
  chosen: profit
  alternatives:
  - gain
  - advantage
  lexicon: HALOT
  rationale: בֶּצַע can denote gain or profit. 'Profit' works idiomatically with the
    rhetorical complaint and preserves the mercenary nuance of the speakers' question.
- source_word: מִשְׁמַרְתּוֹ
  chosen: his charge
  alternatives:
  - his requirement
  - his ordinance
  - what he required
  lexicon: HALOT
  rationale: מִשְׁמֶרֶת often denotes an obligation, charge, or duty to be kept. 'His
    charge' is concise and fairly formal, preserving the covenantal-obligational sense
    better than the more interpretive 'what he required.'
- source_word: קְדֹרַנִּית
  chosen: in mourning
  alternatives:
  - gloomily
  - sorrowfully
  - in black
  lexicon: HALOT
  rationale: 'The adverb derives from the idea of being dark or somber, often associated
    with mourning attire or demeanor. ''In mourning'' best conveys the likely idiomatic
    sense in context: outward penitential or mournful conduct before God.'
- source_word: מִפְּנֵי
  chosen: before
  alternatives:
  - in the presence of
  - because of
  lexicon: HALOT
  rationale: Here מִפְּנֵי with a personal divine object is best taken in the sense
    of being before or in the presence of the LORD, not causally 'because of.' 'Before'
    is idiomatic and sufficiently precise.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of hosts
  alternatives:
  - the LORD Almighty
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is traditionally
    and accurately rendered 'hosts,' preserving the title's martial-heavenly imagery
    better than the more interpretive 'Almighty'.
