id: MAL.3.19
reference: Malachi 3:19
source:
  edition: WLC
  text: כִּֽי הִנֵּ֤ה הַ/יּוֹם֙ בָּ֔א בֹּעֵ֖ר כַּ/תַּנּ֑וּר וְ/הָי֨וּ כָל זֵדִ֜ים וְ/כָל עֹשֵׂ֤ה רִשְׁעָה֙ קַ֔שׁ וְ/לִהַ֨ט אֹתָ֜/ם הַ/יּ֣וֹם הַ/בָּ֗א אָמַר֙ יְהוָ֣ה צְבָא֔וֹת אֲשֶׁ֛ר לֹא יַעֲזֹ֥ב לָ/הֶ֖ם שֹׁ֥רֶשׁ וְ/עָנָֽף־־־־׃
translation:
  text: For behold, the day is coming, burning like an oven, when all the arrogant and every evildoer will be stubble. The coming day will set them ablaze, says Yahweh of Armies, so that it will leave them neither root nor branch.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'burning like a furnace.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the proud' for 'the arrogant.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the LORD of hosts'; rendered 'the LORD of Armies' to express the meaning of the title more transparently in modern English.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the explanation or ground for the preceding statement; 'For' preserves the connective force naturally in English.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: HALOT
  rationale: A deictic particle drawing attention. 'Behold' preserves the prophetic solemnity and immediacy better than more colloquial options.
- source_word: הַיּוֹם
  chosen: the day
  alternatives:
  - that day
  lexicon: HALOT
  rationale: The definite expression points to a known eschatological/judgment day in prophetic discourse. 'The day' is the most direct rendering.
- source_word: בָּא
  chosen: is coming
  alternatives:
  - comes
  - is about to come
  lexicon: HALOT
  rationale: The participial/verbal form conveys imminent future. 'Is coming' gives natural English aspect and preserves the sense of approach.
- source_word: בֹּעֵר כַּתַּנּוּר
  chosen: burning like an oven
  alternatives:
  - burning like a furnace
  lexicon: HALOT
  rationale: The participle modifies 'the day' and depicts intense heat. 'Oven' is the plain sense of תַּנּוּר; 'furnace' is possible but slightly more interpretive and industrial in tone.
- source_word: זֵדִים
  chosen: the arrogant
  alternatives:
  - the proud
  - the presumptuous
  lexicon: HALOT
  rationale: Refers to insolent, presumptuous people. 'Arrogant' captures the moral posture clearly in modern English.
- source_word: עֹשֵׂה רִשְׁעָה
  chosen: evildoer
  alternatives:
  - everyone who does wickedness
  - those who practice wickedness
  lexicon: HALOT
  rationale: A singular participial construction with collective force. 'Every evildoer' is concise and preserves the distributive sense.
- source_word: קַשׁ
  chosen: stubble
  alternatives:
  - chaff
  - dry straw
  lexicon: HALOT
  rationale: קַשׁ denotes straw/stubble left after harvest. 'Stubble' fits the fire imagery and common prophetic usage better than 'chaff,' which is a different agricultural image.
- source_word: וְלִהַט אֹתָם
  chosen: will set them ablaze
  alternatives:
  - will burn them up
  - will consume them
  lexicon: HALOT
  rationale: The verb conveys flaming/burning. 'Set them ablaze' preserves the imagery without prematurely importing the fuller result of total consumption, which is then expressed by the next clause.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of hosts
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' 'Armies' translates צְבָאוֹת transparently for modern readers while preserving the martial/cosmic force of the title.
- source_word: אֲשֶׁר לֹא יַעֲזֹב לָהֶם
  chosen: so that it will leave them
  alternatives:
  - which will leave them
  - and it will not leave them
  lexicon: HALOT
  rationale: The relative particle plus negated verb expresses result with reference to the coming day. 'So that it will leave them' communicates the consequence smoothly in English while keeping the day as subject.
- source_word: שֹׁרֶשׁ וְעָנָף
  chosen: neither root nor branch
  alternatives:
  - root or branch
  - root and bough
  lexicon: HALOT
  rationale: A merism for total eradication. 'Neither root nor branch' is idiomatic English and preserves the image of complete removal.
