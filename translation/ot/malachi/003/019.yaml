theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to make the judgment imagery more interpretive ('burn up/consume') or preserve the staged metaphor
  chosen_reading: Preserve the imagery with 'set them ablaze' and then 'leave them neither root nor branch.'
  alternative_readings:
  - burn them up
  - consume them completely
  rationale: The verse itself unfolds from ignition to total eradication. Retaining both stages avoids importing a more interpretive summary and preserves the prophetic tension and imagery.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, #6'
