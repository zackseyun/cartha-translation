id: MAL.3.3
reference: Malachi 3:3
source:
  edition: WLC
  text: וְ/יָשַׁ֨ב מְצָרֵ֤ף וּ/מְטַהֵר֙ כֶּ֔סֶף וְ/טִהַ֤ר אֶת בְּנֵֽי לֵוִי֙ וְ/זִקַּ֣ק אֹתָ֔/ם כַּ/זָּהָ֖ב וְ/כַ/כָּ֑סֶף וְ/הָיוּ֙ לַֽ/יהוָ֔ה מַגִּישֵׁ֥י מִנְחָ֖ה בִּ/צְדָקָֽה־־׃
translation:
  text: He will sit as a refiner and purifier of silver, and he will purify the sons of Levi and refine them like gold and like silver, and they will be for Yahweh, presenting an offering in righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bringing a grain offering.' The Hebrew term minḥah often refers specifically to a grain offering, though it can also be used more broadly for an offering or gift.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָשַׁב
  chosen: He will sit
  alternatives:
  - He will take his seat
  - He will sit down
  lexicon: HALOT
  rationale: The verb ישׁב literally means 'sit, dwell, remain.' In this refining context, 'sit' preserves the vivid image of a refiner attentively seated at his work, without over-paraphrasing to a more interpretive expression.
- source_word: מְצָרֵף
  chosen: as a refiner
  alternatives:
  - refining
  - one who refines
  lexicon: HALOT
  rationale: The participle from צרף denotes one who smelts/refines metals. 'As a refiner' fits the predicative construction after 'sit' and preserves the occupational metaphor.
- source_word: וּמְטַהֵר כֶּסֶף
  chosen: and purifier of silver
  alternatives:
  - and one who purifies silver
  - and cleanser of silver
  lexicon: HALOT
  rationale: טהר means 'to cleanse, purify.' With כסף, the phrase describes metallurgical purification. 'Purifier of silver' is concise and natural in English while retaining the parallel with 'refiner.'
- source_word: וְטִהַר
  chosen: and he will purify
  alternatives:
  - and he will cleanse
  lexicon: HALOT
  rationale: The finite verb resumes the metaphor and applies it to the priests. 'Purify' best carries both ritual and moral resonance in context.
- source_word: בְּנֵי לֵוִי
  chosen: the sons of Levi
  alternatives:
  - the Levites
  - the descendants of Levi
  lexicon: HALOT
  rationale: Literally 'sons of Levi.' This is gender-accurate and preserves the familial/tribal expression of the Hebrew. 'Levites' is possible, but the more literal rendering better reflects the source wording and covenantal lineage.
- source_word: וְזִקַּק
  chosen: and refine
  alternatives:
  - and purge
  - and smelt clean
  lexicon: HALOT
  rationale: זקק in this context means to refine/purify metal. 'Refine' matches the metallurgical imagery and avoids archaic 'purge.'
- source_word: כַּזָּהָב וְכַכָּסֶף
  chosen: like gold and like silver
  alternatives:
  - as gold and silver
  - like gold and silver
  lexicon: HALOT
  rationale: The repeated כ similes are preserved with 'like ... and like ...' to reflect the Hebrew emphasis and parallelism.
- source_word: וְהָיוּ לַיהוָה
  chosen: and they will be for the LORD
  alternatives:
  - and they will belong to the LORD
  - and they will become the LORD's
  lexicon: HALOT
  rationale: The phrase expresses belonging or consecrated relation to YHWH. 'Be for the LORD' is slightly more formal but preserves the Hebrew structure and sacrificial context.
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD' in keeping with established reverential convention and the translation's stated default.
- source_word: מַגִּישֵׁי מִנְחָה
  chosen: presenting an offering
  alternatives:
  - those who bring an offering
  - offering a grain offering
  - bringing an offering
  lexicon: HALOT
  rationale: The participle means 'bringing/presenting,' and מִנְחָה can denote an offering broadly, though often specifically a grain offering. Because the context concerns priestly offerings generally and English style favors a smoother clause, 'presenting an offering' is chosen, with the more specific alternative preserved in a footnote.
- source_word: מִנְחָה
  chosen: offering
  alternatives:
  - grain offering
  - tribute offering
  lexicon: HALOT
  rationale: מִנְחָה often refers to a grain offering, but can also function more broadly for a gift/offering. Here a broader 'offering' fits the immediate context and avoids over-specifying beyond what the verse itself requires.
- source_word: בִּצְדָקָה
  chosen: in righteousness
  alternatives:
  - righteously
  - with righteousness
  lexicon: HALOT
  rationale: The prepositional phrase is rendered formally as 'in righteousness,' preserving the noun צְדָקָה and its ethical/cultic force rather than flattening it into an adverb.
