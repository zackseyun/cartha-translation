theological_decisions:
- issue: Reference of the refining imagery
  chosen_reading: The verse speaks of the LORD's purifying work on the priestly line ('the sons of Levi') so that their offerings become acceptable.
  alternative_readings:
  - A broader metaphor for purifying all Israel
  - A messianic application through later canonical interpretation
  rationale: The immediate Hebrew text explicitly names 'the sons of Levi,' so the main translation keeps the priestly focus without importing a broader theological application into the wording. Broader canonical or christological readings may be valid interpretively but are not encoded in the translation itself.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
- issue: Specificity of מִנְחָה
  chosen_reading: Rendered broadly as 'offering' in the main text.
  alternative_readings:
  - grain offering
  rationale: While מִנְחָה frequently denotes a grain offering in cultic contexts, the verse's emphasis is on purified worship rather than the technical classification of the sacrifice. The more specific alternative is preserved in a footnote rather than forced into the main text.
  doctrine_reference: Optimal equivalence; do not paraphrase beyond what the source warrants.
