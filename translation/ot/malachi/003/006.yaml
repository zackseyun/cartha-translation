id: MAL.3.6
reference: Malachi 3:6
source:
  edition: WLC
  text: כִּ֛י אֲנִ֥י יְהוָ֖ה לֹ֣א שָׁנִ֑יתִי וְ/אַתֶּ֥ם בְּנֵֽי יַעֲקֹ֖ב לֹ֥א כְלִיתֶֽם־׃
translation:
  text: For I, Yahweh, do not change; and you, sons of Jacob, have not come to an end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have not been consumed' or 'have not perished.' The Hebrew verb can carry the sense of being finished, consumed, or brought to an end.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of Jacob,' a covenantal designation for Jacob's descendants, that is, Israel.
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding statement. 'For' preserves the explanatory force in natural English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and alignment with the stated doctrine guidance.
- source_word: שָׁנִיתִי
  chosen: do not change
  alternatives:
  - have not changed
  - am not changed
  lexicon: HALOT
  rationale: From שנה in the sense 'to change.' English present tense best communicates the gnomic, enduring divine constancy expressed by the Hebrew perfect in this context.
- source_word: בְּנֵי יַעֲקֹב
  chosen: sons of Jacob
  alternatives:
  - children of Jacob
  - descendants of Jacob
  lexicon: HALOT
  rationale: Retains the masculine plural form and covenantal idiom. This follows the project's gender-accurate principle; 'sons' preserves the Hebrew wording more closely than the more interpretive 'descendants.'
- source_word: כְלִיתֶם
  chosen: have not come to an end
  alternatives:
  - are not consumed
  - have not been destroyed
  - have not perished
  lexicon: HALOT
  rationale: From כלה, 'to be finished, completed, consumed, come to an end.' The form can be rendered idiomatically in several ways. 'Have not come to an end' preserves the broad semantic range without over-specifying the mode of judgment, while still fitting the context of divine preservation.
- source_word: וְ/אַתֶּם
  chosen: therefore you
  alternatives:
  - and you
  - so you
  lexicon: HALOT
  rationale: The conjunction plus pronoun marks the consequent relation between the LORD's unchanging nature and Jacob's continued existence. 'Therefore you' makes the logic explicit in idiomatic English.
