- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Aspect of divine immutability in לֹא שָׁנִיתִי
  chosen_reading: do not change
  alternative_readings:
  - have not changed
  rationale: The verse expresses the LORD's enduring constancy, a theological affirmation often summarized as divine immutability. The present-tense English rendering communicates the ongoing truth without importing philosophical categories beyond the text.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: Rendering בְּנֵי יַעֲקֹב with gender-accurate language
  chosen_reading: sons of Jacob
  alternative_readings:
  - children of Jacob
  - descendants of Jacob
  rationale: The Hebrew is grammatically masculine plural in a covenantal designation for Israel. Per the doctrine excerpt, gender-accurate rendering is preferred over gender-neutral smoothing unless context requires otherwise.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
