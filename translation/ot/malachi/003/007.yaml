id: MAL.3.7
reference: Malachi 3:7
source:
  edition: WLC
  text: לְ/מִ/ימֵ֨י אֲבֹתֵי/כֶ֜ם סַרְתֶּ֤ם מֵֽ/חֻקַּ/י֙ וְ/לֹ֣א שְׁמַרְתֶּ֔ם שׁ֤וּבוּ אֵלַ/י֙ וְ/אָשׁ֣וּבָה אֲלֵי/כֶ֔ם אָמַ֖ר יְהוָ֣ה צְבָא֑וֹת וַ/אֲמַרְתֶּ֖ם בַּ/מֶּ֥ה נָשֽׁוּב׃
translation:
  text: From the days of your fathers you have turned aside from my statutes and have not kept them. Return to me, and I will return to you, says Yahweh of hosts. But you say, “How shall we return?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “your ancestors.” The Hebrew reads literally “your fathers.”
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמִימֵי
  chosen: From the days of
  alternatives:
  - Since the days of
  lexicon: HALOT
  rationale: The prepositional phrase marks temporal extent beginning in the past. 'From the days of' is a natural, sufficiently formal rendering that preserves the Hebrew idiom.
- source_word: אֲבֹתֵיכֶם
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: HALOT
  rationale: The Hebrew is literally masculine plural 'your fathers.' Per gender-accurate philosophy, the main text keeps 'fathers.' 'Ancestors' is possible dynamically but loses the source form; the broader ancestral sense is clear from context.
- source_word: סַרְתֶּם
  chosen: you have turned aside
  alternatives:
  - you have departed
  - you have turned away
  lexicon: HALOT
  rationale: סור commonly denotes turning aside/departing from a path or standard. 'Turned aside' preserves the metaphor of deviation from covenantal obedience.
- source_word: מֵחֻקַּי
  chosen: from my statutes
  alternatives:
  - from my decrees
  - from my ordinances
  lexicon: HALOT
  rationale: חֹק/חֻקִּים often refers to prescribed statutes or decrees. 'Statutes' is a standard and suitably precise covenantal term here.
- source_word: וְלֹא שְׁמַרְתֶּם
  chosen: and have not kept them
  alternatives:
  - and have not observed them
  - and did not keep them
  lexicon: HALOT
  rationale: שׁמר in legal/covenantal contexts means keep/observe. Present perfect English fits the continuing relevance of the accusation; 'them' is supplied from the immediately preceding 'statutes'.
- source_word: שׁוּבוּ אֵלַי
  chosen: Return to me
  alternatives:
  - Turn back to me
  lexicon: HALOT
  rationale: שׁוב in prophetic covenant language often carries repentance/restoration overtones. 'Return to me' is concise, traditional, and faithful without over-paraphrasing.
- source_word: וְאָשׁוּבָה אֲלֵיכֶם
  chosen: and I will return to you
  alternatives:
  - and I will turn to you
  lexicon: HALOT
  rationale: The reciprocal use of שׁוב should be mirrored in English for rhetorical force. 'Return' preserves the covenant reciprocity without forcing a more interpretive gloss.
- source_word: אָמַר יְהוָה צְבָאוֹת
  chosen: says the LORD of hosts
  alternatives:
  - says the LORD Almighty
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is retained as 'hosts,' a transparent and established rendering that preserves the military/heavenly-armies imagery better than the more interpretive 'Almighty.'
- source_word: בַּמֶּה
  chosen: How
  alternatives:
  - In what way
  - By what means
  lexicon: HALOT
  rationale: The interrogative asks manner or means. 'How' is idiomatic modern English and fits the people's skeptical question.
- source_word: נָשׁוּב
  chosen: shall we return
  alternatives:
  - should we return
  - can we return
  lexicon: HALOT
  rationale: The imperfect here is best rendered as a deliberative/future-oriented question. 'Shall we return?' captures the force naturally in English.
