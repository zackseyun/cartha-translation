theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Degree of specificity in promised blessing
  chosen_reading: general 'blessing' without specifying material prosperity alone
  alternative_readings:
  - material abundance
  - agricultural rain
  rationale: The context includes agricultural and covenantal provision, but the noun
    בְּרָכָה itself is broad. The translation preserves the text's promise without
    narrowing it to a later doctrinal formula.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Never import doctrinal
    claims the text does not make'
