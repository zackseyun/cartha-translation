id: MAL.3.10
reference: Malachi 3:10
source:
  edition: WLC
  text: הָבִ֨יאוּ אֶת כָּל הַֽ/מַּעֲשֵׂ֜ר אֶל בֵּ֣ית הָ/אוֹצָ֗ר וִ/יהִ֥י טֶ֨רֶף֙ בְּ/בֵיתִ֔/י
    וּ/בְחָנ֤וּ/נִי נָא֙ בָּ/זֹ֔את אָמַ֖ר יְהוָ֣ה צְבָא֑וֹת אִם לֹ֧א אֶפְתַּ֣ח לָ/כֶ֗ם
    אֵ֚ת אֲרֻבּ֣וֹת הַ/שָּׁמַ֔יִם וַ/הֲרִיקֹתִ֥י לָ/כֶ֛ם בְּרָכָ֖ה עַד בְּלִי דָֽי־־־־־־׃
translation:
  text: Bring the full tithe into the storehouse, so that there may be food in my
    house. And test me in this now, says the LORD of hosts, whether I will not open
    for you the windows of heaven and pour out for you blessing until there is no
    more need.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the tithe' or 'the whole tithe.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the floodgates of heaven.' The Hebrew literally says 'the windows of
      heaven.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew idiom means an abundance beyond sufficiency; traditionally, 'until
      there is no more room' or 'beyond measure.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבִיאוּ
  chosen: Bring
  alternatives:
  - Bring in
  lexicon: HALOT
  rationale: Hiphil imperative plural of בוא/ביא in this context means to bring or
    bring in. 'Bring' is natural English and preserves the imperative force.
- source_word: כָּל הַמַּעֲשֵׂר
  chosen: the full tithe
  alternatives:
  - all the tithe
  - the whole tithe
  lexicon: HALOT
  rationale: כָּל with the singular noun conveys totality. 'The full tithe' communicates
    that the entire required tenth is in view, not merely some tithes.
- source_word: בֵּית הָאוֹצָר
  chosen: the storehouse
  alternatives:
  - the treasury
  - the house of storage
  lexicon: HALOT
  rationale: The construct phrase literally means 'house of the store/storage.' 'Storehouse'
    is the standard natural equivalent for a temple storage facility.
- source_word: וִיהִי
  chosen: so that there may be
  alternatives:
  - and let there be
  lexicon: HALOT
  rationale: Jussive of היה expresses purpose/result following the imperative. 'So
    that there may be' fits the flow in idiomatic English.
- source_word: טֶרֶף
  chosen: food
  alternatives:
  - provisions
  - prey
  lexicon: HALOT
  rationale: Though the noun can denote prey, in this temple-economic context it refers
    to edible provision or sustenance for the house of God. 'Food' is the clearest
    contextual rendering.
- source_word: בְּבֵיתִי
  chosen: in my house
  alternatives:
  - in my temple
  lexicon: HALOT
  rationale: Literal 'in my house' preserves the covenantal and temple language without
    over-specifying beyond the Hebrew.
- source_word: וּבְחָנוּנִי
  chosen: test me
  alternatives:
  - try me
  - put me to the test
  lexicon: HALOT
  rationale: בחן means to test or examine. 'Test me' is concise and natural while
    preserving the unusual divine invitation.
- source_word: נָא
  chosen: now
  alternatives:
  - please
  lexicon: HALOT
  rationale: Here נָא functions as a particle of entreaty or immediacy. 'Now' better
    fits the prophetic challenge in English than the more polite 'please.'
- source_word: בָּזֹאת
  chosen: in this
  alternatives:
  - by this
  - in this matter
  lexicon: HALOT
  rationale: The phrase points to the specific matter just commanded, namely bringing
    the tithe. 'In this' is sufficiently literal and clear.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of hosts
  alternatives:
  - the LORD Almighty
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is traditionally
    and accurately 'hosts,' preserving the title's martial/cosmic force.
- source_word: אִם לֹא
  chosen: whether I will not
  alternatives:
  - surely I will
  - if I will not
  lexicon: HALOT
  rationale: After an imperative to test, אִם לֹא introduces the content of what will
    be seen. 'Whether I will not' preserves the rhetorical structure, though the sense
    is strongly affirmative.
- source_word: אֶפְתַּח ... אֲרֻבּוֹת הַשָּׁמַיִם
  chosen: open for you the windows of heaven
  alternatives:
  - open for you the floodgates of heaven
  - open the sluices of the sky
  lexicon: HALOT
  rationale: אֲרֻבּוֹת literally denotes windows/openings. 'Windows of heaven' preserves
    the biblical imagery and intertextual resonance, while 'floodgates' is interpretive.
- source_word: וַהֲרִיקֹתִי
  chosen: pour out
  alternatives:
  - empty out
  - pour down
  lexicon: HALOT
  rationale: The Hiphil of ריק conveys emptying out or pouring forth abundantly. 'Pour
    out' is idiomatic and suits the blessing imagery.
- source_word: בְּרָכָה
  chosen: blessing
  alternatives:
  - a blessing
  - prosperity
  lexicon: HALOT
  rationale: The singular abstract noun is best rendered 'blessing.' Omitting the
    article in English avoids awkwardness while preserving the broad sense of divine
    beneficence.
- source_word: עַד בְּלִי דָי
  chosen: until there is no more need
  alternatives:
  - until there is no limit
  - until there is not enough room
  - beyond measure
  lexicon: HALOT
  rationale: The Hebrew idiom denotes abundance beyond sufficiency. 'Until there is
    no more need' captures the sense of more than enough without importing the spatial
    idea 'room,' which is interpretive and not explicit in the Hebrew.
