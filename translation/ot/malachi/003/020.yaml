id: MAL.3.20
reference: Malachi 3:20
source:
  edition: WLC
  text: וְ/זָרְחָ֨ה לָ/כֶ֜ם יִרְאֵ֤י שְׁמִ/י֙ שֶׁ֣מֶשׁ צְדָקָ֔ה וּ/מַרְפֵּ֖א בִּ/כְנָפֶ֑י/הָ
    וִֽ/יצָאתֶ֥ם וּ/פִשְׁתֶּ֖ם כְּ/עֶגְלֵ֥י מַרְבֵּֽק׃
translation:
  text: But for you who fear my name, the sun of righteousness will rise with healing
    in its wings; and you will go out and leap like calves from the stall.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sun of vindication.' The Hebrew צדקה can carry the sense of righteousness,
      justice, or vindication.
    reason: lexical_alternative
  - marker: b
    text: Or 'in its rays.' Hebrew 'wings' can be used metaphorically for the extremities
      or rays of the sun.
    reason: lexical_alternative
  - marker: c
    text: Or 'skip' or 'frolic.' The Hebrew verb is rare and may denote exuberant
      movement; some have understood it as 'grow fat.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזָרְחָה
  chosen: will rise
  alternatives:
  - will shine forth
  - will dawn
  lexicon: HALOT
  rationale: The verb זרח commonly denotes the rising or shining forth of a luminary.
    'Will rise' fits the solar imagery naturally in English and preserves the future
    sense.
- source_word: יִרְאֵי שְׁמִי
  chosen: you who fear my name
  alternatives:
  - those who fear my name
  - my name-fearers
  lexicon: HALOT
  rationale: The participial phrase identifies the addressees. Rendering with 'you
    who fear my name' preserves the second-person orientation created by לָכֶם while
    remaining natural English.
- source_word: שֶׁמֶשׁ צְדָקָה
  chosen: the sun of righteousness
  alternatives:
  - a sun of righteousness
  - the sun of vindication
  lexicon: HALOT
  rationale: The construct-like apposition is traditionally and naturally rendered
    'the sun of righteousness.' 'Righteousness' is preferred over 'vindication' here
    because צדקה can denote righteousness or justice/vindication, but the image is
    broad and not limited to forensic acquittal. The definite article is supplied
    in English for idiomatic expression of the singular image.
- source_word: וּמַרְפֵּא
  chosen: with healing
  alternatives:
  - and healing
  - bringing healing
  lexicon: HALOT
  rationale: The noun מרפא denotes healing or remedy. 'With healing' best reflects
    the Hebrew nominal phrase linked to the rising sun image without over-paraphrasing.
- source_word: בכנפיה
  chosen: in its wings
  alternatives:
  - in her wings
  - in its rays
  lexicon: HALOT
  rationale: כנף literally means 'wing' and can metaphorically refer to extremities
    or rays. The main text keeps the concrete metaphor 'wings,' while 'rays' is preserved
    as a lexical alternative because of the solar context. English 'its' is used for
    the impersonal image of the sun.
- source_word: ויצאתם
  chosen: you will go out
  alternatives:
  - you will come out
  lexicon: HALOT
  rationale: יצא straightforwardly means 'go out/come out.' 'Go out' is the more direct
    default and suits the image of release into open space.
- source_word: ופשתם
  chosen: leap
  alternatives:
  - skip
  - frolic
  - grow fat
  lexicon: HALOT
  rationale: The verb here is difficult and has been understood as exuberant movement.
    In context with calves released from confinement, 'leap' best captures the image.
    'Grow fat' is a known alternative in some traditions but fits the immediate simile
    less well than lively motion.
- source_word: כעגלי מרבק
  chosen: like calves from the stall
  alternatives:
  - like stall-fed calves
  - like calves from the pen
  lexicon: HALOT
  rationale: מרבק denotes a stall, pen, or fattening place for cattle. 'Calves from
    the stall' preserves the release imagery that explains the leaping.
