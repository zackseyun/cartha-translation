theological_decisions:
- issue: Messianic interpretation of 'the sun of righteousness'
  chosen_reading: Retain the metaphor without explicitly identifying it as the Messiah
    in the translation.
  alternative_readings:
  - Interpret the phrase as a direct messianic title referring to the Messiah/Christ
  rationale: Historic Christian interpretation often reads this image messianically,
    but the Hebrew text itself presents a metaphor of eschatological deliverance for
    those who fear God's name. To avoid importing a doctrinal identification not explicit
    in the verse, the translation preserves the image and leaves christological interpretation
    to readers and notes.
  doctrine_reference: Translation philosophy §1, §3
