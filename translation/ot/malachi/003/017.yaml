theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagint pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Gendered language in אִישׁ ... בְּנוֹ
  chosen_reading: a man ... his son
  alternative_readings:
  - someone ... his child
  rationale: The Hebrew uses explicitly masculine singular terms in a representative
    simile. Per doctrine, gender-accurate rendering is preferred over gender-neutral
    smoothing unless context requires otherwise.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
