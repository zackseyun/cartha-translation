id: MAL.3.17
reference: Malachi 3:17
source:
  edition: WLC
  text: וְ/הָ֣יוּ לִ֗/י אָמַר֙ יְהוָ֣ה צְבָא֔וֹת לַ/יּ֕וֹם אֲשֶׁ֥ר אֲנִ֖י עֹשֶׂ֣ה
    סְגֻלָּ֑ה וְ/חָמַלְתִּ֣י עֲלֵי/הֶ֔ם כַּֽ/אֲשֶׁר֙ יַחְמֹ֣ל אִ֔ישׁ עַל בְּנ֖/וֹ
    הָ/עֹבֵ֥ד אֹתֽ/וֹ־׃
translation:
  text: And they will be mine, says the LORD of Armies, on the day when I make them
    my treasured possession, and I will spare them as a man spares his son who serves
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the LORD of hosts.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a treasured possession' or 'my special possession'; the Hebrew term
      denotes a specially valued possession belonging to a king or master.
    reason: lexical_alternative
  - marker: c
    text: The comparison is to a father sparing a son who serves him.
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיוּ לִי
  chosen: And they will be mine
  alternatives:
  - And they shall be mine
  - And they will belong to me
  lexicon: HALOT
  rationale: The clause expresses future possession/belonging. 'They will be mine'
    is natural modern English and preserves the covenantal force without unnecessary
    expansion.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of hosts
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is translated rather
    than transliterated; 'of Armies' is more transparent to modern readers than traditional
    'of hosts' while preserving the martial/cosmic sense.
- source_word: לַיּוֹם אֲשֶׁר
  chosen: on the day when
  alternatives:
  - for the day when
  - in the day that
  lexicon: HALOT
  rationale: This prepositional-relative construction is idiomatically rendered 'on
    the day when,' indicating the specific future time of divine action.
- source_word: אֲנִי עֹשֶׂה
  chosen: I make them
  alternatives:
  - I act
  - I prepare
  lexicon: HALOT
  rationale: 'The participle עֹשֶׂה with the following predicate noun is best completed
    in English by supplying the object from context: God is making the people into
    his special possession. This avoids an awkwardly literal ''I make'' while staying
    close to the Hebrew sense.'
- source_word: סְגֻלָּה
  chosen: my treasured possession
  alternatives:
  - a treasured possession
  - my special possession
  lexicon: HALOT
  rationale: סְגֻלָּה denotes a specially valued possession, often in covenant contexts.
    'My treasured possession' captures both value and possessive relationship; 'my'
    is supplied from the context of 'they will be mine' and is natural in English.
- source_word: וְחָמַלְתִּי עֲלֵיהֶם
  chosen: and I will spare them
  alternatives:
  - and I will have compassion on them
  - and I will show pity to them
  lexicon: HALOT
  rationale: חמל can mean pity, compassion, or spare. In this context of withholding
    judgment, reinforced by the comparison with a father and son, 'spare them' best
    fits the sense.
- source_word: כַּאֲשֶׁר יַחְמֹל אִישׁ
  chosen: as a man spares
  alternatives:
  - as a man has compassion
  - as someone spares
  lexicon: HALOT
  rationale: The simile repeats חמל, so 'spares' maintains lexical consistency. אִישׁ
    is grammatically masculine and singular; per doctrine, gender-accurate rendering
    is preferred, so 'a man' is retained rather than neutralizing to 'someone.'
- source_word: עַל בְּנוֹ
  chosen: his son
  alternatives:
  - his child
  lexicon: HALOT
  rationale: בֵּן specifically means 'son,' and the father-son imagery should be preserved
    rather than generalized.
- source_word: הָעֹבֵד אֹתוֹ
  chosen: who serves him
  alternatives:
  - who works for him
  - serving him
  lexicon: HALOT
  rationale: The participle describes the son as one who serves his father. 'Who serves
    him' is straightforward and preserves the relational and covenantal nuance better
    than the more economic 'works for him.'
