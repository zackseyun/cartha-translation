id: MAL.3.16
reference: Malachi 3:16
source:
  edition: WLC
  text: אָ֧ז נִדְבְּר֛וּ יִרְאֵ֥י יְהוָ֖ה אִ֣ישׁ אֶת רֵעֵ֑/הוּ וַ/יַּקְשֵׁ֤ב יְהוָה֙ וַ/יִּשְׁמָ֔ע וַ֠/יִּכָּתֵב סֵ֣פֶר זִכָּר֤וֹן לְ/פָנָי/ו֙ לְ/יִרְאֵ֣י יְהוָ֔ה וּ/לְ/חֹשְׁבֵ֖י שְׁמֽ/וֹ־׃
translation:
  text: Then those who feared Yahweh spoke with one another, and Yahweh paid attention and heard; and a book of remembrance was written before him for those who fear Yahweh and who esteem his name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'a man with his companion.' The Hebrew idiom means they spoke with one another.
    reason: lexical_alternative
  - marker: b
    text: Or 'who think on his name' / 'who regard his name.'
    reason: alternative_reading
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal adverb marking the ensuing response to the prior situation. 'Then' is natural and sufficiently formal.
- source_word: נִדְבְּרוּ
  chosen: spoke
  alternatives:
  - spoke together
  - conversed
  lexicon: HALOT
  rationale: Nifal plural of דבר here has reciprocal sense in context. English 'spoke with one another' captures the reciprocal force without overtranslating.
- source_word: יִרְאֵי יְהוָה
  chosen: those who feared the LORD
  alternatives:
  - the fearers of the LORD
  - those who revere the LORD
  lexicon: HALOT
  rationale: Substantival participle denotes a class of people characterized by fearing YHWH. 'Feared' preserves the covenantal/theological weight of ירא better than the softer 'revere.' YHWH is rendered 'the LORD' per doctrine.
- source_word: אִישׁ אֶת־רֵעֵהוּ
  chosen: with one another
  alternatives:
  - each with his companion
  - a man with his neighbor
  lexicon: HALOT
  rationale: The idiom literally reads 'a man with his companion/neighbor' but functions distributively/reciprocally. 'With one another' gives idiomatic English while preserving the mutual action. The masculine singular form is representative rather than individually gendered here.
- source_word: וַיַּקְשֵׁב
  chosen: paid attention
  alternatives:
  - gave heed
  - listened attentively
  lexicon: HALOT
  rationale: קשב conveys attentive listening, stronger than merely hearing. 'Paid attention' is readable modern English and preserves the nuance distinct from the following 'heard.'
- source_word: וַיִּשְׁמָע
  chosen: heard
  alternatives:
  - listened
  - heard them
  lexicon: HALOT
  rationale: Following 'paid attention,' שמע is best rendered simply 'heard,' preserving the Hebrew pairing of attentiveness plus hearing.
- source_word: וַיִּכָּתֵב
  chosen: was written
  alternatives:
  - was recorded
  - was inscribed
  lexicon: HALOT
  rationale: 'Nifal/passive sense: something came to be written. ''Was written'' is the most direct rendering; the object specifies what was recorded.'
- source_word: סֵפֶר זִכָּרוֹן
  chosen: a book of remembrance
  alternatives:
  - a memorial book
  - a record of remembrance
  lexicon: HALOT
  rationale: A formal record kept in remembrance before a king/deity. 'Book of remembrance' is established, clear English and preserves the memorial nuance.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - in his presence
  lexicon: HALOT
  rationale: Spatial/relational phrase indicating the record stands before God. 'Before him' is concise and natural.
- source_word: לְיִרְאֵי יְהוָה
  chosen: for those who fear the LORD
  alternatives:
  - concerning those who fear the LORD
  - on behalf of those who fear the LORD
  lexicon: HALOT
  rationale: The preposition ל here marks reference/benefactive relation of the written record to this group. Present tense 'who fear' is idiomatic in English for a defining class and avoids awkward repetition of past tense after the narrative frame.
- source_word: וּלְחֹשְׁבֵי שְׁמוֹ
  chosen: and who esteem his name
  alternatives:
  - and who think on his name
  - and who regard his name
  - and who honor his name
  lexicon: HALOT
  rationale: חשב with 'name' can denote regarding, esteeming, or giving thoughtful regard to God's name. 'Esteem his name' communicates both valuation and reverent regard in natural English. 'Think on his name' is more literal but less clear to modern readers.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
