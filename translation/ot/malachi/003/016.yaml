theological_decisions:
- issue: Rendering the God-fearer terminology
  chosen_reading: those who feared Yahweh / those who fear Yahweh
  alternative_readings:
  - those who revered the LORD
  rationale: The verse describes covenant-faithful people by the standard biblical category of fearing YHWH. 'Fear' should be preserved rather than softened, since the Hebrew term carries reverent awe and covenant loyalty together.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering וּלְחֹשְׁבֵי שְׁמוֹ
  chosen_reading: who esteem his name
  alternative_readings:
  - who think on his name
  - who regard his name
  rationale: The phrase concerns reverent valuation of God's name, not mere cognition. 'Esteem' best preserves the theological force in readable English while avoiding an overly wooden expression.
  doctrine_reference: Translation philosophy §1, §6
