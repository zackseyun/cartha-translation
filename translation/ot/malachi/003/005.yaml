id: MAL.3.5
reference: Malachi 3:5
source:
  edition: WLC
  text: וְ/קָרַבְתִּ֣י אֲלֵי/כֶם֮ לַ/מִּשְׁפָּט֒ וְ/הָיִ֣יתִי עֵ֣ד מְמַהֵ֗ר בַּֽ/מְכַשְּׁפִים֙ וּ/בַ/מְנָ֣אֲפִ֔ים וּ/בַ/נִּשְׁבָּעִ֖ים לַ/שָּׁ֑קֶר וּ/בְ/עֹשְׁקֵ֣י שְׂכַר שָׂ֠כִיר אַלְמָנָ֨ה וְ/יָת֤וֹם וּ/מַטֵּי גֵר֙ וְ/לֹ֣א יְרֵא֔וּ/נִי אָמַ֖ר יְהוָ֥ה צְבָאֽוֹת׀־־׃
translation:
  text: Then I will come near to you for judgment, and I will be a swift witness against sorcerers, against adulterers, against those who swear falsely, against those who oppress the wages of a hired worker, the widow and the fatherless, and those who turn aside the sojourner, and do not fear me, says Yahweh of Armies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'those who defraud a hired worker of wages.' The Hebrew is literally 'those who oppress the wage of a hired worker.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the foreigner' or 'the resident foreigner.' The Hebrew גֵר denotes a non-native living among Israel under its protection.
    reason: lexical_alternative
  - marker: c
    text: 'Traditional rendering: ''the LORD of Hosts.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְקָרַבְתִּי
  chosen: Then I will come near
  alternatives:
  - And I will draw near
  - And I will come close
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse functions futurally. 'Come near' preserves the judicial approach motif better than a looser 'appear.' 'Then' reflects the discourse connection from the prior context while remaining natural English.
- source_word: אֲלֵיכֶם
  chosen: to you
  alternatives:
  - against you
  lexicon: HALOT
  rationale: The preposition is directional, 'to/toward you.' Although the context is confrontational, 'against' is interpretive and is better reserved for the later repeated בְ marking the objects of testimony.
- source_word: לַמִּשְׁפָּט
  chosen: for judgment
  alternatives:
  - for justice
  - for trial
  lexicon: HALOT
  rationale: מִשְׁפָּט can denote justice, judgment, or legal decision. Here the forensic setting with 'witness' favors 'judgment.' 'For judgment' captures purpose/result without over-specifying a courtroom trial.
- source_word: וְהָיִיתִי עֵד מְמַהֵר
  chosen: and I will be a swift witness
  alternatives:
  - and I will be a quick witness
  - and I will testify promptly
  lexicon: HALOT
  rationale: 'The clause is nominal-predicative: ''I will be a witness, swift.'' Rendering it as ''a swift witness'' is idiomatic and preserves the emphasis on the speed of divine testimony/judgment.'
- source_word: בַּמְכַשְּׁפִים
  chosen: against sorcerers
  alternatives:
  - against those who practice sorcery
  - against witches
  lexicon: HALOT
  rationale: The participial form denotes practitioners of magic. 'Sorcerers' is concise, current, and avoids the narrower or culturally loaded 'witches.' 'Against' reflects the adversative force in context with witness testimony.
- source_word: וּבַמְנָאֲפִים
  chosen: against adulterers
  alternatives:
  - against those who commit adultery
  lexicon: HALOT
  rationale: The participle denotes those characterized by adultery. 'Adulterers' is the most direct and natural equivalent.
- source_word: וּבַנִּשְׁבָּעִים לַשָּׁקֶר
  chosen: against those who swear falsely
  alternatives:
  - against perjurers
  - against those who swear to a lie
  lexicon: HALOT
  rationale: The phrase literally means 'those swearing to/for falsehood.' 'Swear falsely' is idiomatic and broad enough to include false oaths generally, not only formal courtroom perjury.
- source_word: וּבְעֹשְׁקֵי שְׂכַר שָׂכִיר
  chosen: against those who oppress the wage of a hired worker
  alternatives:
  - against those who defraud a hired worker of wages
  - against those who withhold a laborer's pay
  lexicon: HALOT
  rationale: The Hebrew is literally 'oppressors of the wage of a hired worker.' This likely refers to withholding or exploiting wages. I kept the concrete 'wage' in the main text to stay close to the source, while preserving smoother interpretive alternatives in a footnote.
- source_word: אַלְמָנָה וְיָתוֹם
  chosen: the widow, and the fatherless
  alternatives:
  - the widow and the orphan
  lexicon: HALOT
  rationale: These are stock covenantal categories of the vulnerable. 'Fatherless' is slightly more formal but closely matches יָתוֹם; 'orphan' is a viable modern alternative preserved in consideration.
- source_word: וּמַטֵּי גֵר
  chosen: and those who turn aside the sojourner
  alternatives:
  - and those who deprive the foreigner of justice
  - and those who thrust aside the resident foreigner
  lexicon: HALOT
  rationale: The Hiphil participle of נטה here means to bend aside, pervert, or turn away. Because no explicit word for 'justice' appears in this clause, 'turn aside the sojourner' stays closer to the Hebrew while allowing the legal-oppressive sense to be heard from context. 'Sojourner' preserves the covenantal-social category of גֵר better than the more modern but potentially misleading 'immigrant.'
- source_word: וְלֹא יְרֵאוּנִי
  chosen: and do not fear me
  alternatives:
  - and they do not fear me
  lexicon: HALOT
  rationale: The verb denotes fear/reverence toward God. 'Fear me' preserves the covenantal-theological force; 'revere me' would soften the lexical weight.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of Hosts
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is translated rather than left in traditional form; 'of Armies' is transparent modern English and preserves the martial-plural sense better than the inherited 'of Hosts.'
