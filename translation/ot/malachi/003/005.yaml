theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering צְבָאוֹת with יְהוָה
  chosen_reading: Yahweh of Armies
  alternative_readings:
  - the LORD of Hosts
  rationale: The translation philosophy prefers translated titles in readable modern English. 'Armies' communicates the meaning of צְבָאוֹת more transparently for contemporary readers, while the traditional 'Hosts' is preserved in a footnote as a familiar alternative.
  doctrine_reference: DOCTRINE.md Translation philosophy §2, §6
