id: MAL.3.13
reference: Malachi 3:13
source:
  edition: WLC
  text: חָזְק֥וּ עָלַ֛/י דִּבְרֵי/כֶ֖ם אָמַ֣ר יְהוָ֑ה וַ/אֲמַרְתֶּ֕ם מַה נִּדְבַּ֖רְנוּ
    עָלֶֽי/ךָ־׃
translation:
  text: Your words have been hard against me, says the LORD. But you say, “What have
    we spoken against you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Your words have been harsh against me.' The Hebrew literally says 'have
      been strong against me,' using 'strong' idiomatically for forceful or severe
      speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָזְקוּ
  chosen: have been hard
  alternatives:
  - have been strong
  - have been harsh
  - have prevailed
  lexicon: HALOT
  rationale: The verb חזק literally denotes strength, but with words as subject and
    עַל against a person, the sense is that the speech has been forceful, severe,
    or harsh toward someone. 'Have been hard against me' preserves the metaphor and
    the adversative force without over-paraphrasing.
- source_word: עָלַי
  chosen: against me
  alternatives:
  - upon me
  - concerning me
  lexicon: HALOT
  rationale: With חזק and later with דבר, the preposition עַל here carries an adversative
    sense. 'Against me' best reflects the accusatory posture in context.
- source_word: דִּבְרֵיכֶם
  chosen: your words
  alternatives:
  - your speech
  - your statements
  lexicon: HALOT
  rationale: The noun דבר in plural construct with 2mp suffix naturally means 'your
    words.' This is the most direct and idiomatic rendering.
- source_word: אָמַר יְהוָה
  chosen: says the LORD
  alternatives:
  - said the LORD
  - declares the LORD
  lexicon: HALOT
  rationale: Prophetic speech formulas are commonly rendered with the English present
    for immediacy. יְהוָה is rendered 'the LORD' per doctrine guidance for the divine
    name.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for יְהוָה, preserving reverential
    convention and broad English Bible recognizability.
- source_word: וַאֲמַרְתֶּם
  chosen: But you say
  alternatives:
  - And you say
  - Yet you say
  lexicon: HALOT
  rationale: The conjunction introduces the people's objection in contrast to the
    LORD's accusation. 'But you say' captures the disputation style of Malachi.
- source_word: מַה
  chosen: What
  alternatives:
  - How
  - In what way
  lexicon: HALOT
  rationale: The interrogative asks for the content or manner of their alleged speech.
    'What' is concise and natural in English here.
- source_word: נִּדְבַּרְנוּ
  chosen: have we spoken
  alternatives:
  - have we said
  - have we talked
  lexicon: HALOT
  rationale: The Niphal of דבר can function in a reciprocal or simple passive/reflexive-like
    way in speech contexts. Here it is best rendered idiomatically as 'have we spoken,'
    matching the people's denial without unnecessary expansion.
- source_word: עָלֶיךָ
  chosen: against you
  alternatives:
  - about you
  - concerning you
  lexicon: HALOT
  rationale: Given the adversative context and parallel with עָלַי earlier in the
    verse, 'against you' is the strongest contextual fit.
