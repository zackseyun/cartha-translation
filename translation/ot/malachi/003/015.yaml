id: MAL.3.15
reference: Malachi 3:15
source:
  edition: WLC
  text: וְ/עַתָּ֕ה אֲנַ֖חְנוּ מְאַשְּׁרִ֣ים זֵדִ֑ים גַּם נִבְנוּ֙ עֹשֵׂ֣י רִשְׁעָ֔ה
    גַּ֧ם בָּחֲנ֛וּ אֱלֹהִ֖ים וַ/יִּמָּלֵֽטוּ־׃
translation:
  text: So now we call the arrogant blessed; evildoers are even built up; they even
    test God and escape.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the proud' for 'the arrogant.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'are built up'; that is, they are established or prosper.
    reason: lexical_alternative
  - marker: c
    text: Or 'put God to the test.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: So now
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Discourse marker introducing the people's present conclusion in response
    to the preceding complaint. 'So now' captures both continuity and inferential
    force.
- source_word: מְאַשְּׁרִים
  chosen: we call ... blessed
  alternatives:
  - we consider ... happy
  - we pronounce ... fortunate
  lexicon: HALOT
  rationale: From אשר in the declarative sense of calling or regarding someone as
    blessed/happy. 'Call ... blessed' is idiomatic English and preserves the evaluative
    speech-act.
- source_word: זֵדִים
  chosen: the arrogant
  alternatives:
  - the proud
  - the presumptuous
  lexicon: HALOT
  rationale: Refers to insolent, presumptuous people. 'The arrogant' is natural modern
    English and fits the moral critique of the context.
- source_word: גַּם
  chosen: even
  alternatives:
  - also
  - indeed
  lexicon: HALOT
  rationale: Used here for emphatic addition. 'Even' conveys the escalating complaint.
- source_word: נִבְנוּ
  chosen: are ... built up
  alternatives:
  - prosper
  - are established
  lexicon: HALOT
  rationale: Passive of בנה, literally 'are built.' In context it refers metaphorically
    to being established or prospering. 'Are built up' keeps the metaphor visible
    while remaining understandable.
- source_word: עֹשֵׂי רִשְׁעָה
  chosen: evildoers
  alternatives:
  - those who do wickedness
  - workers of wickedness
  lexicon: HALOT
  rationale: Compact rendering of the participial phrase meaning those who practice
    wickedness. 'Evildoers' is idiomatic and semantically accurate.
- source_word: בָּחֲנוּ אֱלֹהִים
  chosen: test God
  alternatives:
  - put God to the test
  - try God
  lexicon: HALOT
  rationale: The verb בחן can mean test/examine. In this context of impious behavior,
    'test God' conveys challenging him presumptuously.
- source_word: וַיִּמָּלֵטוּ
  chosen: and escape
  alternatives:
  - and get away
  - and are delivered
  lexicon: HALOT
  rationale: Niphal of מלט, 'escape, be delivered.' Here the sense is that they come
    through unpunished. 'Escape' best fits the complaint.
