theological_decisions:
- issue: Identity relationship between 'the Lord' and 'the messenger of the covenant'
  chosen_reading: Render both titles straightforwardly in the main text without collapsing them into one figure or separating them interpretively.
  alternative_readings:
  - Both titles refer to the same coming figure
  - The 'messenger' is distinct from 'the Lord'
  rationale: The Hebrew apposes the phrases in a way that permits close identification, but the verse itself does not require the translator to resolve the interpretive question. The translation preserves the tension by rendering both clauses plainly.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of הָאָדוֹן in a verse often read messianically
  chosen_reading: the Lord
  alternative_readings:
  - the master
  rationale: The title should be translated in a way that preserves its elevated force and compatibility with historic Christian reading, without importing more explicit christological identification than the Hebrew states.
  doctrine_reference: Affirmations; Translate titles; Preserve theological tension rather than resolve it.
