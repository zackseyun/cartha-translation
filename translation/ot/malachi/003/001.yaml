id: MAL.3.1
reference: Malachi 3:1
source:
  edition: WLC
  text: הִנְ/נִ֤י שֹׁלֵחַ֙ מַלְאָכִ֔/י וּ/פִנָּה דֶ֖רֶךְ לְ/פָנָ֑/י וּ/פִתְאֹם֩ יָב֨וֹא אֶל הֵיכָל֜/וֹ הָ/אָד֣וֹן אֲשֶׁר אַתֶּ֣ם מְבַקְשִׁ֗ים וּ/מַלְאַ֨ךְ הַ/בְּרִ֜ית אֲשֶׁר אַתֶּ֤ם חֲפֵצִים֙ הִנֵּה בָ֔א אָמַ֖ר יְהוָ֥ה צְבָאֽוֹת־־׀־־־׃
translation:
  text: Behold, I am sending my messenger, and he will clear the way before me. And suddenly the Lord whom you seek will come to his temple, and the messenger of the covenant in whom you delight—behold, he is coming, says Yahweh of Armies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my angel' / 'the angel of the covenant'; the Hebrew word מַלְאָךְ can mean either 'messenger' or 'angel.'
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: ''the LORD of hosts.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  chosen: Behold, I am
  alternatives:
  - Look, I am
  - See, I am
  lexicon: HALOT
  rationale: Deictic particle plus 1cs pronoun gives emphatic announcement. 'Behold' preserves prophetic force better than a flatter 'look'.
- source_word: שֹׁלֵחַ
  chosen: sending
  alternatives:
  - about to send
  - send
  lexicon: HALOT
  rationale: Participle with הִנְנִי expresses imminent or certain action. English progressive 'I am sending' captures the vividness without over-paraphrasing.
- source_word: מַלְאָכִי
  chosen: my messenger
  alternatives:
  - my angel
  lexicon: HALOT
  rationale: ' מַלְאָךְ can mean ''messenger'' or ''angel''; here the figure prepares the way, and the parallel with ''messenger of the covenant'' favors ''messenger'' as the clearer and broader rendering. ''Angel'' is preserved as a lexical alternative because the Hebrew term can bear that sense.'
- source_word: וּפִנָּה
  chosen: and he will clear
  alternatives:
  - and he will prepare
  - and he will turn aside/clear away
  lexicon: HALOT
  rationale: The verb from פנה in this stem conveys making ready by clearing or preparing. 'Clear the way' is idiomatic English that preserves the image of removing obstacles.
- source_word: דֶרֶךְ לְפָנָי
  chosen: the way before me
  alternatives:
  - a way before me
  - the road before me
  lexicon: HALOT
  rationale: Definite 'way' fits the prophetic motif of preparing a route for divine coming. 'Before me' should remain first person because the speaker is YHWH.
- source_word: וּפִתְאֹם
  chosen: And suddenly
  alternatives:
  - Then suddenly
  - and unexpectedly
  lexicon: HALOT
  rationale: Adverb marks abruptness of the coming; 'suddenly' is the natural equivalent.
- source_word: יָבֹוא אֶל הֵיכָלוֹ
  chosen: will come to his temple
  alternatives:
  - will enter his temple
  - will come into his palace/temple
  lexicon: HALOT
  rationale: הֵיכָל commonly denotes temple/palace; in Malachi's cultic context 'temple' is required. 'To his temple' is a direct rendering of the preposition.
- source_word: הָאָדוֹן
  chosen: the Lord
  alternatives:
  - the master
  lexicon: HALOT
  rationale: אָדוֹן with article here functions as a title. 'The Lord' is the most natural English title in this prophetic context; 'master' is too domestic and weak for the temple-coming figure.
- source_word: אֲשֶׁר אַתֶּם מְבַקְשִׁים
  chosen: whom you seek
  alternatives:
  - whom you are seeking
  - for whom you are looking
  lexicon: HALOT
  rationale: Participial form indicates ongoing disposition, but simple present in English communicates this well.
- source_word: וּמַלְאַךְ הַבְּרִית
  chosen: and the messenger of the covenant
  alternatives:
  - and the angel of the covenant
  lexicon: HALOT
  rationale: Again מַלְאָךְ is best rendered 'messenger' in context. הַבְּרִית is definite, so 'the covenant' should be retained.
- source_word: אֲשֶׁר אַתֶּם חֲפֵצִים
  chosen: in whom you delight
  alternatives:
  - whom you desire
  - in whom you take pleasure
  lexicon: HALOT
  rationale: חפץ denotes delight/desire. Because the object is personal, 'in whom you delight' is idiomatic and preserves the relational nuance better than the flatter 'whom you desire.'
- source_word: הִנֵּה בָא
  chosen: behold, he is coming
  alternatives:
  - look, he comes
  - behold, he comes
  lexicon: HALOT
  rationale: The particle plus participle-like predicate gives vivid imminence. 'He is coming' communicates the present-certainty force in contemporary English.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of hosts
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is more transparent to modern readers as 'Armies' than the traditional but opaque 'hosts,' while preserving martial/cosmic force.
