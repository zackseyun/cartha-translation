theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering צְבָאוֹת in the divine title
  chosen_reading: of Armies
  alternative_readings:
  - of hosts
  rationale: The title is translated for meaning in line with the project's philosophy
    to translate titles. 'Of Armies' is more transparent to modern readers than the
    traditional but opaque 'of hosts.'
  doctrine_reference: DOCTRINE.md Translation philosophy §2, §6
