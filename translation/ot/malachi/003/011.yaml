id: MAL.3.11
reference: Malachi 3:11
source:
  edition: WLC
  text: וְ/גָעַרְתִּ֤י לָ/כֶם֙ בָּֽ/אֹכֵ֔ל וְ/לֹֽא יַשְׁחִ֥ת לָ/כֶ֖ם אֶת פְּרִ֣י הָ/אֲדָמָ֑ה
    וְ/לֹא תְשַׁכֵּ֨ל לָ/כֶ֤ם הַ/גֶּ֨פֶן֙ בַּ/שָּׂדֶ֔ה אָמַ֖ר יְהוָ֥ה צְבָאֽוֹת־־־׃
translation:
  text: And I will rebuke the devourer for you, so that it will not destroy for you
    the fruit of the ground, and the vine in the field will not fail to bear for you,
    says the LORD of Armies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the LORD of hosts.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the vine in the field will not miscarry for you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגָעַרְתִּי
  chosen: I will rebuke
  alternatives:
  - I will restrain
  - I will threaten
  lexicon: HALOT
  rationale: גָּעַר commonly means to rebuke or sharply reprove, often with effective
    force. 'Rebuke' preserves the verbal imagery and divine authority better than
    a more interpretive 'restrain,' while still fitting the context of stopping agricultural
    harm.
- source_word: בָּאֹכֵל
  chosen: the devourer
  alternatives:
  - the eater
  - the consuming one
  lexicon: HALOT
  rationale: The participial form from אכל functions substantivally here for whatever
    consumes crops. 'The devourer' is idiomatic English and preserves the agentive
    sense without over-specifying whether this is insect plague, blight, or another
    destructive force.
- source_word: יַשְׁחִת
  chosen: destroy
  alternatives:
  - ruin
  - corrupt
  lexicon: HALOT
  rationale: In this agricultural context שׁחת in the Hiphil denotes causing ruin
    or destruction to produce. 'Destroy' is clear modern English and suitably strong.
- source_word: פְּרִי הָאֲדָמָה
  chosen: the fruit of the ground
  alternatives:
  - the produce of the land
  - the crops of the soil
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the concrete agricultural imagery.
    'Fruit of the ground' is natural enough in English and avoids narrowing the phrase
    to only grain or only general crops.
- source_word: תְשַׁכֵּל
  chosen: will not fail to bear
  alternatives:
  - will not miscarry
  - will not be barren
  lexicon: HALOT
  rationale: The verb שׁכל in the Piel can mean to bereave or cause loss of offspring/fruit.
    Applied to a vine, the image is of fruit failing before maturity. 'Will not fail
    to bear' communicates the agricultural sense in readable English; the more literal
    'miscarry' is possible but sounds awkward for a vine in contemporary English.
- source_word: הַגֶּפֶן
  chosen: the vine
  alternatives:
  - your vine
  - the grapevine
  lexicon: HALOT
  rationale: The noun is definite singular. 'The vine' is sufficiently natural and
    keeps the Hebrew imagery. 'Your vine' would make explicit the implied possession
    from context but is not stated in the noun itself.
- source_word: בַּשָּׂדֶה
  chosen: in the field
  alternatives:
  - in the countryside
  lexicon: HALOT
  rationale: A straightforward locative phrase. 'In the field' preserves the concrete
    setting and matches the agricultural context.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of hosts
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is translated rather
    than left in traditional form to preserve meaning for modern readers. 'Armies'
    is the clearest English equivalent, while 'hosts' is preserved as an alternative
    because of translation tradition.
