id: MAL.3.4
reference: Malachi 3:4
source:
  edition: WLC
  text: וְ/עָֽרְבָה֙ לַֽ/יהוָ֔ה מִנְחַ֥ת יְהוּדָ֖ה וִ/ירֽוּשָׁלִָ֑ם כִּ/ימֵ֣י עוֹלָ֔ם וּ/כְ/שָׁנִ֖ים קַדְמֹנִיּֽוֹת׃
translation:
  text: Then the offering of Judah and Jerusalem will be pleasing to Yahweh, as in the days of old and as in former years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "acceptable" for "pleasing."
    reason: lexical_alternative
  - marker: b
    text: '"Offering" may more specifically mean "grain offering" in some contexts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָרְבָה
  chosen: Then ... will be pleasing
  alternatives:
  - and ... will be pleasing
  - and ... will be acceptable
  lexicon: HALOT
  rationale: The verb ערב in this stem means 'be pleasing/acceptable.' English supplies a future sense from the prophetic context and prior verse. 'Then' brings out the conjunctive waw as a sequence/result marker rather than a mere additive 'and.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - before the LORD
  lexicon: HALOT
  rationale: 'The preposition ל marks relation toward YHWH: the offering is pleasing to him. Per doctrine, יְהוָה is rendered ''the LORD,'' not transliterated.'
- source_word: מִנְחַת
  chosen: the offering
  alternatives:
  - the grain offering
  - the tribute offering
  lexicon: HALOT
  rationale: מִנְחָה can denote a grain offering specifically, but also more broadly an offering/gift presented to God. In this restoration context, the broader 'offering' best fits without over-specifying the material of the sacrifice.
- source_word: יְהוּדָה וִירוּשָׁלִָם
  chosen: Judah and Jerusalem
  lexicon: HALOT
  rationale: These are place names and are transliterated by standard English forms, in keeping with the translation philosophy for names.
- source_word: כִּימֵי עוֹלָם
  chosen: as in the days of old
  alternatives:
  - as in ancient days
  - as in days long past
  lexicon: HALOT
  rationale: עוֹלָם here refers to antiquity/long duration in retrospect, not metaphysical eternity. 'Days of old' is natural English and preserves the temporal comparison.
- source_word: וּכְשָׁנִים קַדְמֹנִיּוֹת
  chosen: and as in former years
  alternatives:
  - and as in earlier years
  - and as in years of old
  lexicon: HALOT
  rationale: The phrase parallels the previous temporal expression and intensifies the comparison to an earlier, ideal period. 'Former years' is idiomatic and preserves the poetic parallelism.
