theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Specificity of מִנְחָה
  chosen_reading: offering
  alternative_readings:
  - grain offering
  rationale: Although מִנְחָה often denotes a grain offering in cultic contexts, the verse speaks broadly of restored worship being acceptable. Using 'offering' avoids narrowing the sense beyond what the immediate wording requires while remaining faithful to the sacrificial context.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
