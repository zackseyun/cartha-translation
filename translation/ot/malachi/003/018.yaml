id: MAL.3.18
reference: Malachi 3:18
source:
  edition: WLC
  text: וְ/שַׁבְתֶּם֙ וּ/רְאִיתֶ֔ם בֵּ֥ין צַדִּ֖יק לְ/רָשָׁ֑ע בֵּ֚ין עֹבֵ֣ד אֱלֹהִ֔ים
    לַ/אֲשֶׁ֖ר לֹ֥א עֲבָדֽ/וֹ׃ס
translation:
  text: Then you will again see the difference between the righteous and the wicked,
    between one who serves God and one who does not serve him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Then you will return and see between the righteous
      and the wicked.' The Hebrew idiom likely means that they will once again perceive
      the distinction.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׁבְתֶּם
  chosen: Then you will again
  alternatives:
  - And you will return
  - Then you will turn back
  lexicon: HALOT
  rationale: The verb שוב literally means 'return/turn back.' In this context, followed
    by 'you will see,' it idiomatically introduces a renewed perception or recognition.
    Rendering it with 'again' captures the sense of renewed discernment in natural
    English without over-paraphrasing.
- source_word: וּרְאִיתֶם
  chosen: see
  alternatives:
  - look and see
  - perceive
  lexicon: HALOT
  rationale: ראה commonly means 'see.' Here it refers to recognizing or perceiving
    the distinction God will make. 'See' preserves the concrete Hebrew wording while
    allowing the contextual sense of discernment.
- source_word: בֵּין ... לְ
  chosen: the difference between
  alternatives:
  - between
  - distinguish between
  lexicon: HALOT
  rationale: The repeated בין marks contrast. English idiom is smoother with 'see
    the difference between,' which makes explicit the comparative force already implied
    by the Hebrew construction.
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - the just
  - the righteous person
  lexicon: HALOT
  rationale: צַדִּיק denotes a righteous or just person. 'The righteous' is the most
    natural collective-singular/class term in English and preserves the moral-theological
    category.
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - the guilty
  - the wicked person
  lexicon: HALOT
  rationale: רָשָׁע is the standard antonym to צַדִּיק in wisdom and prophetic literature.
    'The wicked' preserves that established contrast better than narrower legal renderings
    such as 'guilty.'
- source_word: עֹבֵד אֱלֹהִים
  chosen: one who serves God
  alternatives:
  - the one serving God
  - a worshiper of God
  lexicon: HALOT
  rationale: עבד with God commonly means 'serve' in the sense of worshipful allegiance
    and obedience. 'Serves God' is broad enough to include worship and covenant loyalty
    without narrowing the term to liturgical worship alone.
- source_word: לַאֲשֶׁר לֹא עֲבָדוֹ
  chosen: one who does not serve him
  alternatives:
  - the one who has not served him
  - one who does not worship him
  lexicon: HALOT
  rationale: The relative construction contrasts directly with 'one who serves God.'
    The suffix on עֲבָדוֹ refers back to God. Present English 'does not serve him'
    best expresses the class contrast, even though the Hebrew perfect may be read
    more literally as 'has not served him.'
