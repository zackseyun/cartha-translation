theological_decisions:
- issue: Whether to make the contrast explicitly eschatological or leave it as renewed
    discernment
  chosen_reading: Render the verse as a future recognition of the distinction God
    makes between the righteous and the wicked, without adding interpretive language
    about final judgment.
  alternative_readings:
  - Render with explicit judgment language such as 'you will again distinguish at
    the judgment'
  rationale: The immediate context concerns God's coming action and vindication, but
    this verse itself states that the audience will again see the distinction. The
    translation preserves that wording and does not import additional doctrinal detail
    not explicit in the Hebrew.
  doctrine_reference: Preserve theological tension rather than resolve it.
