theological_decisions:
- issue: Generic force of אָדָם
  chosen_reading: Will a man rob God?
  alternative_readings:
  - Will humankind rob God?
  - Will a person rob God?
  rationale: The Hebrew singular אדם is generic/proverbial. The main text keeps 'man'
    in line with the project's gender-accurate policy and the terse rhetorical style,
    while the generic sense is documented here.
