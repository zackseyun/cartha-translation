id: MAL.3.8
reference: Malachi 3:8
source:
  edition: WLC
  text: הֲ/יִקְבַּ֨ע אָדָ֜ם אֱלֹהִ֗ים כִּ֤י אַתֶּם֙ קֹבְעִ֣ים אֹתִ֔/י וַ/אֲמַרְתֶּ֖ם
    בַּ/מֶּ֣ה קְבַעֲנ֑וּ/ךָ הַֽ/מַּעֲשֵׂ֖ר וְ/הַ/תְּרוּמָֽה׃
translation:
  text: Will a man rob God? Yet you are robbing me. But you say, “How have we robbed
    you?” In the tithe and the contribution.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Will a person rob God?” The Hebrew 'man' here has a generic human sense.
    reason: lexical_alternative
  - marker: b
    text: Or “offering.” The Hebrew term can denote a contribution set apart for sacred
      use.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִקְבַּע / קֹבְעִים / קְבַעֲנוּךָ
  chosen: rob / robbing / robbed
  alternatives:
  - defraud
  - cheat
  - plunder
  lexicon: HALOT
  rationale: The verb קבע in this context denotes wrongful taking from God what is
    due to him. 'Rob' is the most natural and forceful English equivalent, preserving
    the rhetorical shock of the accusation. 'Defraud' is possible but weaker and more
    abstract; 'plunder' is too violent for this cultic-economic context.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - a person
  lexicon: HALOT
  rationale: The singular rhetorical question asks whether a human being would rob
    God. Per doctrine, gender-accurate rendering is preferred where the source uses
    masculine/generic אדם. 'Man' preserves the concise proverbial force; the sense
    is generic rather than male-exclusive.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here אֱלֹהִים refers to the God of Israel in direct address context.
    'God' is the standard and clear English rendering.
- source_word: כִּי
  chosen: Yet
  alternatives:
  - For
  - But
  lexicon: HALOT
  rationale: 'Although כִּי often means ''for,'' here it introduces the surprising
    reality that follows the rhetorical question. ''Yet'' captures the adversative
    force in idiomatic English: despite the absurdity of robbing God, the people are
    in fact doing so.'
- source_word: בַּמֶּה
  chosen: How
  alternatives:
  - In what way
  - By what means
  lexicon: HALOT
  rationale: The people's response asks for the manner in which they have allegedly
    robbed God. 'How' is idiomatic modern English and adequately reflects the interrogative
    phrase.
- source_word: הַמַּעֲשֵׂר
  chosen: the tithe
  alternatives:
  - the tenth
  lexicon: HALOT
  rationale: מַעֲשֵׂר is the established term for the required tenth given to God.
    'The tithe' is both accurate and readily understood.
- source_word: הַתְּרוּמָה
  chosen: the contribution
  alternatives:
  - the offering
  - the heave offering
  lexicon: HALOT
  rationale: תְּרוּמָה refers to a contribution set apart or lifted up for sacred
    use. 'Contribution' avoids over-specifying a technical ritual gesture ('heave
    offering') while distinguishing it from the tithe. 'Offering' is possible but
    broader and less precise.
