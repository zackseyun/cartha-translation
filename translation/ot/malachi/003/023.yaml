theological_decisions:
- issue: Referent of 'Elijah'
  chosen_reading: Retain the literal name 'Elijah' without interpretive expansion.
  alternative_readings:
  - A typological forerunner in the spirit/power of Elijah
  rationale: The Hebrew text names Elijah directly. The translation should not import
    later interpretive identifications into the main text. Such connections belong
    to cross-reference or commentary, not the translation itself.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Tone of יוֹם יְהוָה הַגָּדוֹל וְהַנּוֹרָא
  chosen_reading: 'Render with both majesty and dread: ''the great and fearful day
    of the LORD.'''
  alternative_readings:
  - the great and awesome day of the LORD
  - the great and terrible day of the LORD
  rationale: The phrase carries both grandeur and terror in prophetic judgment context.
    'Fearful' better preserves the threatening dimension than 'awesome,' which in
    contemporary English can sound positive or weakened.
  doctrine_reference: Readable modern English, not archaic or academic; preserve theological
    tension rather than resolve it.
