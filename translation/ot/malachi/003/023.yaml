id: MAL.3.23
reference: Malachi 3:23
source:
  edition: WLC
  text: הִנֵּ֤ה אָֽנֹכִי֙ שֹׁלֵ֣חַ לָ/כֶ֔ם אֵ֖ת אֵלִיָּ֣ה הַ/נָּבִ֑יא לִ/פְנֵ֗י בּ֚וֹא
    י֣וֹם יְהוָ֔ה הַ/גָּד֖וֹל וְ/הַ/נּוֹרָֽא׃
translation:
  text: Look, I am sending Elijah the prophet to you before the coming of the great
    and fearful day of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the great and terrible day of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: '''Elijah'' may be understood literally or as an Elijah-like forerunner;
      the Hebrew text itself simply says ''Elijah the prophet.'''
    reason: cross_reference
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces an emphatic announcement. 'Look' preserves the deictic force
    in readable modern English better than the archaic 'Behold.'
- source_word: אָֽנֹכִי
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis alongside the participle. English
    can convey this sufficiently with normal word order after 'Look,' without overtranslating
    to 'I myself.'
- source_word: שֹׁלֵחַ
  chosen: am sending
  alternatives:
  - send
  - am about to send
  lexicon: HALOT
  rationale: The participle expresses imminent or vivid present/future action. 'Am
    sending' preserves the participial aspect and prophetic immediacy better than
    a simple future.
- source_word: לָכֶם
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The preposition ל here is best rendered directionally/datively as 'to
    you,' indicating the recipients of the sending.
- source_word: אֵלִיָּה הַנָּבִיא
  chosen: Elijah the prophet
  alternatives:
  - Elijah, the prophet
  lexicon: HALOT
  rationale: Personal name is transliterated per project philosophy, and the appositional
    title is translated. The unpunctuated form reads naturally in English.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - ahead of
  - in advance of
  lexicon: HALOT
  rationale: Temporal priority is in view; 'before' is the most direct and natural
    rendering.
- source_word: בּוֹא
  chosen: the coming of
  alternatives:
  - the arrival of
  - comes
  lexicon: HALOT
  rationale: 'The infinitive construct after לִפְנֵי is naturally rendered as a verbal
    noun in English: ''before the coming of.'''
- source_word: יוֹם יְהוָה
  chosen: the day of the LORD
  alternatives:
  - the LORD's day
  lexicon: HALOT
  rationale: This is the established prophetic expression for the eschatological/judgment
    event. YHWH is rendered 'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and alignment with the stated doctrine.
- source_word: הַגָּדוֹל
  chosen: great
  alternatives:
  - mighty
  lexicon: HALOT
  rationale: A straightforward rendering of the adjective modifying 'day.' 'Great'
    preserves both scale and significance.
- source_word: וְהַנּוֹרָא
  chosen: fearful
  alternatives:
  - awesome
  - dreadful
  - terrible
  lexicon: HALOT
  rationale: From ירא in the Niphal-derived adjectival form, conveying that the day
    inspires fear/dread. 'Fearful' preserves the affective force without flattening
    it into the more positive modern sense often carried by 'awesome.'
