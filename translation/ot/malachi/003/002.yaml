theological_decisions:
- issue: Nature of the coming figure's action
  chosen_reading: Render the imagery in terms of purifying and testing severity without
    importing a narrower doctrinal category such as only destruction or only sanctification.
  alternative_readings:
  - primarily destructive judgment
  - primarily priestly purification
  rationale: The verse itself uses similes of refining fire and cleansing soap, which
    imply both severity and purification. The translation preserves that tension rather
    than resolving the imagery into a single theological system.
  doctrine_reference: Preserve theological tension rather than resolve it.
