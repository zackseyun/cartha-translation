id: MAL.3.2
reference: Malachi 3:2
source:
  edition: WLC
  text: וּ/מִ֤י מְכַלְכֵּל֙ אֶת י֣וֹם בּוֹא֔/וֹ וּ/מִ֥י הָ/עֹמֵ֖ד בְּ/הֵרָֽאוֹת֑/וֹ
    כִּֽי הוּא֙ כְּ/אֵ֣שׁ מְצָרֵ֔ף וּ/כְ/בֹרִ֖ית מְכַבְּסִֽים־־׃
translation:
  text: But who can endure the day of his coming, and who can stand when he appears?
    For he is like a refiner’s fire and like launderers’ soap.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “like fullers’ soap.” The Hebrew refers to a strong cleansing alkali
      used in washing cloth.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְכַלְכֵּל
  chosen: can endure
  alternatives:
  - can sustain
  - can bear
  - can contain oneself through
  lexicon: HALOT
  rationale: The verb כלכל in this context means to bear up under or endure. 'Can
    endure' is idiomatic modern English and fits the rhetorical question about surviving
    the coming day better than the more wooden 'can sustain.'
- source_word: יוֹם בּוֹאוֹ
  chosen: the day of his coming
  alternatives:
  - the day when he comes
  - his coming day
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the genitival construction and the
    eschatological/prophetic weight of the phrase.
- source_word: הָעֹמֵד
  chosen: can stand
  alternatives:
  - will stand
  - stands firm
  lexicon: HALOT
  rationale: Though literally 'the one standing,' in parallel with 'who can endure'
    the sense is potential ability to remain standing under judgment. Supplying 'can'
    in English brings out the parallelism.
- source_word: בְּהֵרָאוֹתוֹ
  chosen: when he appears
  alternatives:
  - at his appearing
  - when he is seen
  - in his appearing
  lexicon: HALOT
  rationale: The Niphal infinitive construct of ראה here is best rendered as a temporal
    clause. 'When he appears' is natural English and preserves the passive/reflexive
    sense of becoming visible.
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason no one can easily endure or stand; 'For' preserves
    the explanatory force in elevated but still readable English.
- source_word: כְּאֵשׁ מְצָרֵף
  chosen: like a refiner’s fire
  alternatives:
  - like refining fire
  - like the fire of a refiner
  lexicon: HALOT
  rationale: This construct-like comparison refers to fire used by a refiner. 'Refiner’s
    fire' is concise, idiomatic, and preserves the metaphor of purifying judgment.
- source_word: וּכְבֹרִית מְכַבְּסִים
  chosen: like launderers’ soap
  alternatives:
  - like fullers' soap
  - like washermen's lye
  - like the alkali of those who wash clothes
  lexicon: HALOT
  rationale: בֹּרִית refers to an alkaline cleansing agent, traditionally 'fullers'
    soap.' 'Launderers’ soap' communicates the image clearly in modern English without
    archaic trade terminology, while preserving the cleansing metaphor.
