id: MAL.2.13
reference: Malachi 2:13
source:
  edition: WLC
  text: וְ/זֹאת֙ שֵׁנִ֣ית תַּֽעֲשׂ֔וּ כַּסּ֤וֹת דִּמְעָה֙ אֶת מִזְבַּ֣ח יְהוָ֔ה בְּכִ֖י
    וַֽ/אֲנָקָ֑ה מֵ/אֵ֣ין ע֗וֹד פְּנוֹת֙ אֶל הַ/מִּנְחָ֔ה וְ/לָ/קַ֥חַת רָצ֖וֹן מִ/יֶּדְ/כֶֽם־־׃
translation:
  text: 'And this second thing you do: you cover the altar of the LORD with tears,
    with weeping and groaning, because he no longer turns toward the offering or accepts
    it with favor from your hand.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the grain offering.' The Hebrew מִנְחָה can denote a specific grain
      offering or, more broadly, an offering.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזֹאת שֵׁנִית
  chosen: And this second thing
  alternatives:
  - And this a second time
  - And this secondly
  lexicon: HALOT
  rationale: The phrase introduces another charge in a sequence. 'This second thing'
    is natural English and preserves the ordinal force of שֵׁנִית better than the
    more adverbial 'secondly.'
- source_word: תַּעֲשׂוּ
  chosen: you do
  alternatives:
  - you are doing
  lexicon: HALOT
  rationale: The imperfect here functions as a present/general accusation. Simple
    present English fits prophetic indictment style.
- source_word: כַּסּוֹת דִּמְעָה אֶת מִזְבַּח יְהוָה
  chosen: you cover the altar of the LORD with tears
  alternatives:
  - you flood the altar of the LORD with tears
  lexicon: HALOT
  rationale: כסה is literally 'cover.' Retaining 'cover' preserves the vivid image
    without over-paraphrasing. The direct-object marker with 'altar' supports this
    construction.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: בְּכִי וַאֲנָקָה
  chosen: with weeping and groaning
  alternatives:
  - with crying and sighing
  - with weeping and lament
  lexicon: HALOT
  rationale: בְּכִי is straightforwardly 'weeping.' אֲנָקָה denotes groaning/sighing;
    'groaning' best conveys audible anguish and pairs well with 'weeping.'
- source_word: מֵאֵין עוֹד פְּנוֹת
  chosen: because he no longer turns toward
  alternatives:
  - so that he no longer regards
  - because there is no longer any turning toward
  lexicon: HALOT
  rationale: 'The infinitive construct of פנה after מֵאֵין עוֹד expresses cessation:
    ''from there no longer being a turning toward.'' In idiomatic English, ''because
    he no longer turns toward'' captures the sense that the LORD no longer pays regard.'
- source_word: אֶל הַמִּנְחָה
  chosen: the offering
  alternatives:
  - the grain offering
  - the gift offering
  lexicon: HALOT
  rationale: מִנְחָה can specifically denote a grain offering, but in prophetic usage
    it can function more broadly for an offering/present. Here 'the offering' is sufficiently
    precise and avoids over-specifying the material unless context demands it.
- source_word: וְלָקַחַת רָצוֹן מִיֶּדְכֶם
  chosen: or accepts it with favor from your hand
  alternatives:
  - or receives favorably from your hand
  - or takes pleasure from your hand
  lexicon: HALOT
  rationale: The idiom combines לקח ('take/receive') with רצון ('favor/acceptance').
    'Accepts it with favor from your hand' communicates cultic acceptance in clear
    English while preserving the source imagery of reception from the worshiper's
    hand.
