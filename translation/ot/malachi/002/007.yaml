theological_decisions:
- issue: Rendering of יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagint pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Normative versus predictive force of the imperfect verbs
  chosen_reading: should guard / should seek
  alternative_readings:
  - will guard / will seek
  - guard / seek
  rationale: The surrounding context rebukes priests for failing in their calling.
    Rendering the imperfects with 'should' preserves the verse as a statement of priestly
    duty rather than a simple future prediction.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve
    source sense without paraphrase'
