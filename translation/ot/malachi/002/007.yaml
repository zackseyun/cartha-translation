id: MAL.2.7
reference: Malachi 2:7
source:
  edition: WLC
  text: כִּֽי שִׂפְתֵ֤י כֹהֵן֙ יִשְׁמְרוּ דַ֔עַת וְ/תוֹרָ֖ה יְבַקְשׁ֣וּ מִ/פִּ֑י/הוּ
    כִּ֛י מַלְאַ֥ךְ יְהוָֽה צְבָא֖וֹת הֽוּא־־־׃
translation:
  text: For the lips of a priest should guard knowledge, and people should seek instruction
    from his mouth, because he is the messenger of the LORD of Armies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "law" or "teaching" for "instruction" (Hebrew torah).
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: "the LORD of hosts."'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂפְתֵי כֹהֵן
  chosen: the lips of a priest
  alternatives:
  - a priest's lips
  lexicon: HALOT
  rationale: Construct phrase literally denotes the priest's lips. 'The lips of a
    priest' preserves the generic representative sense without over-specifying an
    individual known priest.
- source_word: יִשְׁמְרוּ
  chosen: should guard
  alternatives:
  - keep
  - preserve
  - watch over
  lexicon: HALOT
  rationale: The imperfect here expresses what is expected or proper in context, not
    merely a future prediction. 'Should guard' captures the normative force in this
    rebuke of priests.
- source_word: דַעַת
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: HALOT
  rationale: '''Knowledge'' is the standard rendering and fits the covenant-teaching
    context; it refers to sound knowledge of God and his ways, not mere information.'
- source_word: וְתוֹרָה
  chosen: instruction
  alternatives:
  - law
  - teaching
  lexicon: HALOT
  rationale: Though torah can mean 'law,' here the sense is what people seek from
    the priest's mouth—authoritative instruction/teaching. 'Instruction' is readable
    modern English and avoids narrowing the term to statutory law alone.
- source_word: יְבַקְשׁוּ מִפִּיהוּ
  chosen: people should seek instruction from his mouth
  alternatives:
  - they should seek instruction from his mouth
  - they should seek law from his mouth
  lexicon: HALOT
  rationale: The Hebrew subject is implicit in the plural verb; English idiom benefits
    from supplying 'people.' 'From his mouth' is retained because it reflects oral
    priestly teaching.
- source_word: מַלְאַךְ
  chosen: messenger
  alternatives:
  - angel
  lexicon: HALOT
  rationale: In this context the referent is the priest, so 'messenger' is required
    rather than 'angel.' The term denotes one commissioned to convey the LORD's word.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of hosts
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' For צבאות, 'of Armies' translates
    the Hebrew meaning more transparently for modern readers than the traditional
    'of hosts,' while preserving the martial/cosmic title.
