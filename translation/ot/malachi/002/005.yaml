id: MAL.2.5
reference: Malachi 2:5
source:
  edition: WLC
  text: בְּרִיתִ֣/י הָיְתָ֣ה אִתּ֗/וֹ הַֽ/חַיִּים֙ וְ/הַ֨/שָּׁל֔וֹם וָ/אֶתְּנֵֽ/ם
    ל֥/וֹ מוֹרָ֖א וַ/יִּֽירָאֵ֑/נִי וּ/מִ/פְּנֵ֥י שְׁמִ֖/י נִחַ֥ת הֽוּא׀־׃
translation:
  text: My covenant with him was one of life and peace, and I gave them to him as
    fear; and he feared me, and he stood in awe before my name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for fear' or 'for reverence'; the Hebrew syntax after 'I gave them to
      him' is compressed.
    reason: lexical_alternative
  - marker: b
    text: Or 'he was humbled,' 'he trembled,' or 'he was dismayed' before my name.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרִיתִי
  chosen: My covenant
  alternatives:
  - my covenant
  lexicon: HALOT
  rationale: Standard rendering of בְּרִית as 'covenant'; possessive suffix retained
    explicitly.
- source_word: הָיְתָה אִתּוֹ
  chosen: was with him
  alternatives:
  - was with him
  - belonged to him
  lexicon: HALOT
  rationale: The clause states the covenant's relation to Levi/him. In English, this
    is smoothed into 'My covenant with him was...' to preserve natural syntax while
    retaining the relational sense of אֵת/עִם construction.
- source_word: הַחַיִּים וְהַשָּׁלוֹם
  chosen: life and peace
  alternatives:
  - the life and the peace
  - life and well-being
  lexicon: HALOT
  rationale: Definite articles are not naturally carried into English here. שָׁלוֹם
    is rendered 'peace' as the most direct and established equivalent, with the broader
    sense of well-being implicit.
- source_word: וָאֶתְּנֵם לוֹ
  chosen: and I gave them to him
  alternatives:
  - and I gave him them
  - and I granted them to him
  lexicon: HALOT
  rationale: The 3mp suffix most naturally refers back to 'life and peace' as plural
    objects. 'Gave' preserves the straightforward verbal sense.
- source_word: מוֹרָא
  chosen: as fear
  alternatives:
  - for fear
  - reverence
  lexicon: HALOT
  rationale: The syntax is compressed and difficult. מוֹרָא denotes fear/awe. Rendering
    it 'as fear' preserves the noun and the terseness of the Hebrew while allowing
    the following clause 'and he feared me' to explain the response. 'Reverence' is
    interpretive and softened.
- source_word: וַיִּירָאֵנִי
  chosen: and he feared me
  alternatives:
  - and he revered me
  lexicon: HALOT
  rationale: The verb ירא is best kept as 'fear' for lexical consistency with מוֹרָא,
    while the context makes clear this is covenantal reverence rather than cringing
    terror.
- source_word: וּמִפְּנֵי שְׁמִי
  chosen: before my name
  alternatives:
  - because of my name
  - at the presence of my name
  lexicon: HALOT
  rationale: Literally 'from before my name/face of my name.' In context it expresses
    his posture in relation to God's name. 'Before my name' is concise and preserves
    the spatial-metaphorical force.
- source_word: נִחַת
  chosen: he stood in awe
  alternatives:
  - he was dismayed
  - he was humbled
  - he trembled
  lexicon: HALOT
  rationale: The Niphal of חתת can denote being shattered, dismayed, or broken down.
    In this positive covenant context, 'stood in awe' best conveys humbled reverence
    without implying sinful terror. Because this is interpretively significant, alternatives
    are preserved in a footnote.
