theological_decisions:
- issue: Nature of priestly response to God in the covenant
  chosen_reading: The verse describes reverential fear/awe, not servile terror.
  alternative_readings:
  - The language could be read more starkly as dread or dismay before God.
  rationale: Both מוֹרָא and ירא naturally involve fear, but within a positive covenant
    description ('life and peace') the sense is best understood as reverent fear.
    The rendering preserves 'fear' in the main text while using 'stood in awe' for
    נִחַת to reflect the favorable context without erasing the gravity.
  doctrine_reference: Translation philosophy §3, §6
