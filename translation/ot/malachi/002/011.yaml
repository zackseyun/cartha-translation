id: MAL.2.11
reference: Malachi 2:11
source:
  edition: WLC
  text: בָּגְדָ֣ה יְהוּדָ֔ה וְ/תוֹעֵבָ֛ה נֶעֶשְׂתָ֥ה בְ/יִשְׂרָאֵ֖ל וּ/בִ/ירֽוּשָׁלִָ֑ם
    כִּ֣י חִלֵּ֣ל יְהוּדָ֗ה קֹ֤דֶשׁ יְהוָה֙ אֲשֶׁ֣ר אָהֵ֔ב וּ/בָעַ֖ל בַּת אֵ֥ל נֵכָֽר׀־׃
translation:
  text: Judah has acted treacherously, and an abomination has been committed in Israel
    and in Jerusalem, for Judah has profaned the holiness of the LORD, which he loves,
    and has married the daughter of a foreign god.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sanctuary of the LORD' or 'the holy people of the LORD'; the Hebrew
      phrase is ambiguous.
    reason: alternative_reading
  - marker: b
    text: Literally, 'the daughter of a foreign god'; this likely refers to a woman
      aligned with foreign worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּגְדָה
  chosen: has acted treacherously
  alternatives:
  - has been faithless
  - has dealt treacherously
  - has betrayed
  lexicon: HALOT
  rationale: The verb בגד commonly denotes acting faithlessly or treacherously, especially
    in covenantal contexts. 'Has acted treacherously' preserves the moral and covenantal
    force without over-specifying the object of betrayal.
- source_word: תוֹעֵבָה
  chosen: an abomination
  alternatives:
  - a detestable thing
  - something abhorrent
  lexicon: HALOT
  rationale: '''Abomination'' is the standard rendering for תועבה and preserves the
    strong cultic-moral weight of the term in prophetic discourse.'
- source_word: נֶעֶשְׂתָה
  chosen: has been committed
  alternatives:
  - has been done
  - has taken place
  lexicon: HALOT
  rationale: The passive sense is important. 'Has been committed' fits naturally with
    'abomination' in English and conveys culpable action.
- source_word: חִלֵּל
  chosen: has profaned
  alternatives:
  - has defiled
  - has desecrated
  lexicon: HALOT
  rationale: In relation to what is holy, חלל means to profane or desecrate. 'Profaned'
    best matches the covenantal and cultic register.
- source_word: קֹדֶשׁ יְהוָה
  chosen: the holiness of the LORD
  alternatives:
  - the sanctuary of the LORD
  - the holy thing of the LORD
  - the holy people of the LORD
  lexicon: HALOT
  rationale: The phrase is syntactically ambiguous. 'Holiness of the LORD' stays close
    to the Hebrew and avoids prematurely resolving whether the referent is the sanctuary,
    the covenant community, or Judah's consecrated status. This preserves the text's
    theological tension.
- source_word: אֲשֶׁר אָהֵב
  chosen: which he loves
  alternatives:
  - which he loved
  - that he loves
  lexicon: HALOT
  rationale: The perfect verb can be rendered as a present stative in English here.
    'Which he loves' communicates the LORD's ongoing regard for what is holy.
- source_word: וּבָעַל
  chosen: has married
  alternatives:
  - has possessed
  - has become husband to
  lexicon: HALOT
  rationale: Though בעל can broadly mean 'to own' or 'to rule,' with a woman as object
    it commonly means 'to marry' or 'to become husband of.' This is the most natural
    contextual sense here.
- source_word: בַּת אֵל נֵכָר
  chosen: the daughter of a foreign god
  alternatives:
  - a daughter of a foreign god
  - the daughter of a foreign deity
  lexicon: HALOT
  rationale: The expression is likely idiomatic for a woman associated with foreign
    worship, but the Hebrew literally says 'daughter of a foreign god.' Retaining
    the literal form preserves the polemical religious dimension rather than reducing
    it merely to ethnicity.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
