theological_decisions:
- issue: Referent of 'the holiness of the LORD' (קֹדֶשׁ יְהוָה)
  chosen_reading: Render as 'the holiness of the LORD' without specifying the referent.
  alternative_readings:
  - the sanctuary of the LORD
  - the holy people of the LORD
  - the holy covenant institution the LORD loves
  rationale: The Hebrew permits multiple closely related interpretations. A less interpretively
    loaded rendering preserves the prophetic accusation without importing a narrower
    doctrinal claim than the text itself makes.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Meaning of 'daughter of a foreign god'
  chosen_reading: Retain the literal religiously charged expression rather than paraphrasing
    as merely 'foreign woman.'
  alternative_readings:
  - foreign woman
  - woman devoted to a foreign god
  rationale: The context concerns covenant unfaithfulness expressed through marriages
    tied to idolatry. The literal rendering preserves the theological emphasis on
    foreign worship rather than ethnicity alone.
  doctrine_reference: 'Translation philosophy §1 and §3: original-language primacy;
    preserve tension where ambiguity remains.'
