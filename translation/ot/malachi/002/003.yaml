id: MAL.2.3
reference: Malachi 2:3
source:
  edition: WLC
  text: הִנְ/נִ֨י גֹעֵ֤ר לָ/כֶם֙ אֶת הַ/זֶּ֔רַע וְ/זֵרִ֤יתִי פֶ֨רֶשׁ֙ עַל פְּנֵי/כֶ֔ם
    פֶּ֖רֶשׁ חַגֵּי/כֶ֑ם וְ/נָשָׂ֥א אֶתְ/כֶ֖ם אֵלָֽי/ו־־׃
translation:
  text: Look, I am rebuking your offspring, and I will spread dung on your faces—the
    dung of your festival sacrifices—and one will carry you away with it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your seed'; some take this as a reference to grain or crops rather than
      offspring.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'the dung of your festivals'; this likely refers to the refuse from
      animals offered at the festivals.
    reason: lexical_alternative
  - marker: c
    text: The final clause is difficult. It likely means that the priests will be
      removed along with the dung/offal to an unclean place.
    reason: alternative_reading
lexical_decisions:
- source_word: גֹעֵר
  chosen: am rebuking
  alternatives:
  - am threatening
  - am censuring
  lexicon: HALOT
  rationale: The participle with הִנְנִי gives an imminent, declarative sense. גער
    commonly means to rebuke or reprove, and in prophetic judgment contexts can carry
    forceful threat. 'Am rebuking' preserves the lexical core while fitting the present-announcement
    construction.
- source_word: הַזֶּרַע
  chosen: your offspring
  alternatives:
  - the seed
  - your seed
  lexicon: HALOT
  rationale: זֶרַע can mean seed literally or offspring/descendants metaphorically.
    In context of judgment on priests, 'offspring' best communicates the likely sense
    of posterity rather than agricultural seed, while remaining natural English.
- source_word: וְזֵרִיתִי
  chosen: I will spread
  alternatives:
  - I will scatter
  - I will throw
  lexicon: HALOT
  rationale: זרה in the piel can mean scatter/winnow. With dung as object and 'on
    your faces' as destination, 'spread' is vivid and idiomatic in English, preserving
    the humiliating action.
- source_word: פֶּרֶשׁ
  chosen: dung
  alternatives:
  - offal
  - refuse
  - excrement
  lexicon: HALOT
  rationale: The noun denotes animal excrement/manure. 'Dung' is the most direct and
    biblically natural English equivalent, retaining the verse's deliberate offensiveness.
- source_word: עַל פְּנֵיכֶם
  chosen: on your faces
  alternatives:
  - upon your faces
  lexicon: HALOT
  rationale: A straightforward rendering of the prepositional phrase; 'on your faces'
    is clear modern English and preserves the shame imagery.
- source_word: פֶּרֶשׁ חַגֵּיכֶם
  chosen: the dung of your festival sacrifices
  alternatives:
  - the dung of your feasts
  - the offal of your festivals
  lexicon: HALOT
  rationale: חַגִּים are festivals/feasts, but here the associated dung is from animals
    brought for sacrificial celebration. Rendering simply 'your festivals' could sound
    as though the festivals themselves produce dung; 'festival sacrifices' makes explicit
    the cultic referent implied by context while staying close to the Hebrew genitive.
- source_word: וְנָשָׂא אֶתְכֶם אֵלָיו
  chosen: and one will carry you away with it
  alternatives:
  - and it will carry you away to it
  - and you will be taken away with it
  lexicon: HALOT
  rationale: The 3ms verb with singular pronominal suffix is syntactically difficult.
    The sense is that the priests will be removed along with the dung/offal. English
    often uses an indefinite subject ('one will carry') to represent an unspecified
    agent. 'With it' takes the suffix as referring back to the dung/offal and communicates
    removal to an unclean place.
