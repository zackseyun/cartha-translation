theological_decisions:
- issue: Interpretation of הַזֶּרַע in a priestly judgment oracle
  chosen_reading: your offspring
  alternative_readings:
  - the seed, i.e., your grain/crops
  rationale: The immediate context addresses priests and covenant judgment on their
    line, making 'offspring' the more likely sense. Some interpreters take it agriculturally,
    but the familial/judicial force fits the oracle better.
- issue: Interpretation of the final clause וְנָשָׂא אֶתְכֶם אֵלָיו
  chosen_reading: an unspecified agent will carry the priests away with the dung/offal
  alternative_readings:
  - the dung itself will carry you away to it
  - you will be lifted up toward it
  rationale: The clause is notoriously compressed. The broader image is priestly defilement
    and removal with sacrificial refuse. This rendering preserves the judgment image
    without over-specifying the agent.
