theological_decisions:
- issue: Force of the opening imperfect/jussive in an imprecatory judgment context
  chosen_reading: May the LORD cut off
  alternative_readings:
  - The LORD will cut off
  rationale: The context supports an imprecatory or wish-like denunciation rather
    than a simple future prediction. This preserves the prophetic rhetoric without
    changing the underlying judgment sense.
- issue: Interpretation of the difficult phrase עֵר וְעֹנֶה
  chosen_reading: retain a relatively literal rendering in the main text and preserve
    interpretive alternatives in a footnote
  alternative_readings:
  - witness and advocate
  - master and apprentice
  rationale: The phrase is lexically uncertain and should not be over-resolved in
    translation. A transparent rendering best fits the instruction to preserve tension
    rather than settle ambiguity beyond what the Hebrew warrants.
  doctrine_reference: Translation philosophy §3
