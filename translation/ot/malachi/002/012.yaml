id: MAL.2.12
reference: Malachi 2:12
source:
  edition: WLC
  text: יַכְרֵ֨ת יְהוָ֜ה לָ/אִ֨ישׁ אֲשֶׁ֤ר יַעֲשֶׂ֨/נָּה֙ עֵ֣ר וְ/עֹנֶ֔ה מֵ/אָהֳלֵ֖י
    יַֽעֲקֹ֑ב וּ/מַגִּ֣ישׁ מִנְחָ֔ה לַֽ/יהוָ֖ה צְבָאֽוֹת׃פ
translation:
  text: May the LORD cut off from the tents of Jacob the man who does this—him who
    is awake and him who answers—and yet brings an offering to the LORD of hosts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'awake and answering.' The phrase is difficult; it may be an idiom
      meaning something like 'witness and advocate' or a merism meaning everyone involved.
    reason: alternative_reading
lexical_decisions:
- source_word: יַכְרֵת
  chosen: may ... cut off
  alternatives:
  - will cut off
  lexicon: HALOT
  rationale: 'Hiphil of כרת commonly means ''cut off,'' especially in covenant/judgment
    contexts. The imperfect here is well rendered as a jussive/wish in context, continuing
    the denunciatory tone: ''May the LORD cut off.'''
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: לָאִישׁ
  chosen: the man
  alternatives:
  - any man
  - the person
  lexicon: HALOT
  rationale: The Hebrew is singular masculine 'to/from the man.' 'The man' preserves
    the gender-accurate singular representative force better than the more neutral
    'person.'
- source_word: אֲשֶׁר יַעֲשֶׂנָּה
  chosen: who does this
  alternatives:
  - whoever does it
  - who acts in this way
  lexicon: HALOT
  rationale: The feminine suffix likely refers back to the offending practice just
    described in context. English idiom naturally renders it 'this.'
- source_word: עֵר וְעֹנֶה
  chosen: him who is awake and him who answers
  alternatives:
  - witness and advocate
  - master and apprentice
  - caller and responder
  lexicon: HALOT
  rationale: This expression is notoriously difficult. The most literal sense of the
    participles is 'one awake' and 'one answering/responding.' Because the exact idiomatic
    force is uncertain, a relatively transparent rendering is preferred in the main
    text, with more interpretive alternatives preserved in a footnote.
- source_word: מֵאָהֳלֵי יַעֲקֹב
  chosen: from the tents of Jacob
  alternatives:
  - from Jacob's tents
  - from the dwellings of Jacob
  lexicon: HALOT
  rationale: A conventional Hebrew expression for the covenant community/household
    of Israel. 'Tents of Jacob' preserves the imagery and corporate sense.
- source_word: וּמַגִּישׁ מִנְחָה
  chosen: and yet brings an offering
  alternatives:
  - even if he brings an offering
  - while bringing an offering
  - and presents a grain offering
  lexicon: HALOT
  rationale: The participle marks the offender as one who still approaches in worship.
    'Offering' is broader and more natural in English than 'grain offering' here,
    since the emphasis is on hypocritical worship rather than the specific sacrificial
    type; 'yet' brings out the concessive force in context.
- source_word: מִנְחָה
  chosen: offering
  alternatives:
  - gift offering
  - grain offering
  - tribute
  lexicon: HALOT
  rationale: מִנְחָה can denote tribute, gift, or grain offering. In cultic context
    with 'to the LORD of hosts,' 'offering' is the clearest accessible rendering without
    over-specifying the form.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of hosts
  alternatives:
  - the LORD Almighty
  - Yahweh of hosts
  lexicon: HALOT
  rationale: A standard rendering that preserves the martial/heavenly-armies sense
    of צְבָאוֹת while following the doctrinal default for YHWH.
