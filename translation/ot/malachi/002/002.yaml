theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Force of the final perfect אָרוֹתִיהָ
  chosen_reading: I have already cursed them
  alternative_readings:
  - I also will curse them
  - I have cursed it
  rationale: In context, the shift from future threats to a perfect verb plausibly signals that the curse is not merely future but already underway. This preserves the prophetic force without overstating beyond the Hebrew; alternatives remain possible due to prophetic perfect usage and the suffix's ambiguity.
