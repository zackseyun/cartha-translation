id: MAL.2.2
reference: Malachi 2:2
source:
  edition: WLC
  text: אִם לֹ֣א תִשְׁמְע֡וּ וְ/אִם לֹא֩ תָשִׂ֨ימוּ עַל לֵ֜ב לָ/תֵ֧ת כָּב֣וֹד לִ/שְׁמִ֗/י אָמַר֙ יְהוָ֣ה צְבָא֔וֹת וְ/שִׁלַּחְתִּ֤י בָ/כֶם֙ אֶת הַ/מְּאֵרָ֔ה וְ/אָרוֹתִ֖י אֶת בִּרְכֽוֹתֵי/כֶ֑ם וְ/גַם֙ אָרוֹתִ֔י/הָ כִּ֥י אֵינְ/כֶ֖ם שָׂמִ֥ים עַל לֵֽב־־־־־־׃
translation:
  text: If you will not listen, and if you will not take it to heart to give glory to my name, says Yahweh of Armies, then I will send the curse among you, and I will curse your blessings; indeed, I have already cursed them, because you are not taking it to heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the LORD of Hosts.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew could also be understood, 'I also will curse them,' or with a singular sense, 'I have cursed it.'
    reason: alternative_reading
lexical_decisions:
- source_word: תִשְׁמְעוּ
  chosen: listen
  alternatives:
  - hear
  - obey
  lexicon: HALOT
  rationale: שׁמע commonly means 'hear/listen,' and in covenant-warning contexts can shade toward obedience. 'Listen' preserves the auditory verb while allowing the implied heed/obedience to remain contextual rather than overtranslated.
- source_word: תָשִׂימוּ עַל לֵב
  chosen: take it to heart
  alternatives:
  - set on your heart
  - lay to heart
  lexicon: HALOT
  rationale: This Hebrew idiom means to internalize seriously or pay careful heed. 'Take it to heart' is idiomatic modern English and preserves the force better than a wooden rendering.
- source_word: לָתֵת כָּבוֹד לִשְׁמִי
  chosen: to give glory to my name
  alternatives:
  - to give honor to my name
  lexicon: HALOT
  rationale: כָּבוֹד can be rendered 'glory' or 'honor.' 'Glory' fits prophetic and theological diction well here, while 'my name' preserves the covenantal focus on YHWH's revealed reputation and honor.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of Hosts
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is translated rather than merely traditionalized; 'of Armies' is transparent modern English, while 'of Hosts' is preserved as an alternative in a footnote-worthy sense.
- source_word: וְשִׁלַּחְתִּי בָכֶם אֶת הַמְּאֵרָה
  chosen: I will send the curse among you
  alternatives:
  - I will send the curse upon you
  - I will send against you the curse
  lexicon: HALOT
  rationale: The phrase expresses the dispatch of covenant curse against the audience. 'Among you' reflects the preposition ב in a natural way, suggesting the curse entering their midst; 'upon you' is possible but less direct to the Hebrew preposition here.
- source_word: הַמְּאֵרָה
  chosen: the curse
  alternatives:
  - the curse-blight
  lexicon: HALOT
  rationale: The noun denotes a curse, likely covenantal in force. The definite article is retained in English as 'the curse,' signaling a specific threatened judgment rather than a vague misfortune.
- source_word: וְאָרוֹתִי אֶת בִּרְכוֹתֵיכֶם
  chosen: I will curse your blessings
  alternatives:
  - I will turn your blessings into a curse
  - I will curse the things you bless
  lexicon: HALOT
  rationale: The direct object is 'your blessings.' The straightforward rendering preserves the Hebrew wording and leaves open whether this means blessings given to them, blessings pronounced by them, or both in context.
- source_word: וְגַם אָרוֹתִיהָ
  chosen: indeed, I have already cursed them
  alternatives:
  - and also I have cursed it
  - yes, I have cursed them
  lexicon: HALOT
  rationale: The conjunction plus גַם adds emphatic continuation ('indeed/yes, also'). The perfect verb naturally conveys an already-begun action in context, hence 'have already cursed.' The feminine singular suffix likely refers collectively back to the class of blessings/cursing just mentioned; English 'them' communicates the sense naturally.
- source_word: כִּי אֵינְכֶם שָׂמִים עַל לֵב
  chosen: because you are not taking it to heart
  alternatives:
  - for you are not laying it to heart
  - because none of you takes it to heart
  lexicon: HALOT
  rationale: The repeated idiom ties the reason clause to the earlier warning. Using the same English phrase preserves the rhetorical repetition. The plural predicate is represented by 'you are not taking it to heart.'
