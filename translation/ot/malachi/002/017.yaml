id: MAL.2.17
reference: Malachi 2:17
source:
  edition: WLC
  text: הוֹגַעְתֶּ֤ם יְהוָה֙ בְּ/דִבְרֵי/כֶ֔ם וַ/אֲמַרְתֶּ֖ם בַּ/מָּ֣ה הוֹגָ֑עְנוּ בֶּ/אֱמָרְ/כֶ֗ם כָּל עֹ֨שֵׂה רָ֜ע ט֣וֹב בְּ/עֵינֵ֣י יְהוָ֗ה וּ/בָ/הֶם֙ ה֣וּא חָפֵ֔ץ א֥וֹ אַיֵּ֖ה אֱלֹהֵ֥י הַ/מִּשְׁפָּֽט־׀׃
translation:
  text: You have wearied Yahweh with your words. Yet you say, “How have we wearied him?” By saying, “Everyone who does evil is good in the eyes of Yahweh, and he delights in them,” or, “Where is the God of justice?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the God of judgment.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹגַעְתֶּם / הוֹגָעְנוּ
  chosen: have wearied / have we wearied
  alternatives:
  - have tired
  - have burdened
  lexicon: HALOT
  rationale: The Hiphil of יגע here means to cause weariness or exhaustion. 'Wearied' is idiomatic in English and preserves the anthropopathic force without flattening it into a weaker expression.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּדִבְרֵיכֶם
  chosen: with your words
  alternatives:
  - by your words
  - in your words
  lexicon: HALOT
  rationale: The preposition ב with דִּבְרֵי indicates means or instrument. 'With your words' is natural English and clearly conveys instrumentality.
- source_word: בַּמָּה
  chosen: How
  alternatives:
  - In what way
  - By what
  lexicon: HALOT
  rationale: In the quoted objection, the idiomatic sense is a challenge asking in what respect they have wearied God. 'How' is concise and natural.
- source_word: בֶּאֱמָרְכֶם
  chosen: By saying
  alternatives:
  - When you say
  - In that you say
  lexicon: HALOT
  rationale: The preposition plus infinitive construct introduces the explanation of how they have wearied the LORD. 'By saying' best matches the causal/instrumental force.
- source_word: כָּל עֹשֵׂה רָע
  chosen: Everyone who does evil
  alternatives:
  - Every evildoer
  - Everyone doing evil
  lexicon: HALOT
  rationale: This phrase is generic and distributive. 'Everyone who does evil' is clear modern English and preserves the participial sense.
- source_word: טוֹב
  chosen: is good
  alternatives:
  - is pleasing
  - is acceptable
  lexicon: HALOT
  rationale: The adjective straightforwardly means 'good.' The irony of the people's claim is best preserved by retaining the simple predicate 'is good.'
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: The idiom literally means 'in the eyes of' and denotes evaluation. This rendering preserves the Hebrew image while remaining understandable.
- source_word: וּבָהֶם הוּא חָפֵץ
  chosen: and he delights in them
  alternatives:
  - and he takes pleasure in them
  - and he is pleased with them
  lexicon: HALOT
  rationale: חפץ conveys delight or pleasure. 'Delights in them' is vivid, natural, and fits the accusatory force of the quotation.
- source_word: אוֹ
  chosen: or
  alternatives:
  - and
  - indeed
  lexicon: HALOT
  rationale: 'Here או introduces an alternative form of the same cynical complaint: either they say God approves evil, or they ask where his justice is. ''Or'' best reflects the discourse structure.'
- source_word: אַיֵּה
  chosen: Where is
  alternatives:
  - Where then is
  - Where can be found
  lexicon: HALOT
  rationale: A direct interrogative of absence. 'Where is' preserves the sharp challenge.
- source_word: אֱלֹהֵי הַמִּשְׁפָּט
  chosen: the God of justice
  alternatives:
  - the God of judgment
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment or justice. In this context the complaint concerns God's moral governance and apparent failure to act justly, so 'justice' better communicates the sense in contemporary English while retaining theological weight.
