theological_decisions:
- issue: Anthropopathic description of God being 'wearied'
  chosen_reading: Retained the personal, anthropopathic wording 'You have wearied the LORD'
  alternative_readings:
  - You have offended the LORD
  - You have burdened the LORD
  rationale: The Hebrew explicitly uses language of causing weariness. Smoothing this into a less vivid abstraction would mute the prophetic rebuke. The text speaks analogically of God's response to their cynical speech, and the translation preserves that tension rather than resolving it.
  doctrine_reference: Translation philosophy §3
- issue: Rendering מִשְׁפָּט in the final clause
  chosen_reading: justice
  alternative_readings:
  - judgment
  rationale: The people's complaint is not merely about courtroom sentencing but about the apparent absence of God's just moral order. 'Justice' communicates that broader concern in readable modern English without importing a denominational slant.
  doctrine_reference: Translation philosophy §6
