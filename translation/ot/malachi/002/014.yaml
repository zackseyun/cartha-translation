id: MAL.2.14
reference: Malachi 2:14
source:
  edition: WLC
  text: וַ/אֲמַרְתֶּ֖ם עַל מָ֑ה עַ֡ל כִּי יְהוָה֩ הֵעִ֨יד בֵּינְ/ךָ֜ וּ/בֵ֣ין אֵ֣שֶׁת נְעוּרֶ֗י/ךָ אֲשֶׁ֤ר אַתָּה֙ בָּגַ֣דְתָּה בָּ֔/הּ וְ/הִ֥יא חֲבֶרְתְּ/ךָ֖ וְ/אֵ֥שֶׁת בְּרִיתֶֽ/ךָ־־׀׃
translation:
  text: But you say, “Why?” Because Yahweh has been a witness between you and the wife of your youth, to whom you have been unfaithful, though she is your companion and your wife by covenant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “with whom you have dealt faithlessly.” The Hebrew verb can denote treachery, betrayal, or faithless dealing, especially in covenant contexts.
    reason: lexical_alternative
  - marker: b
    text: Or, “your covenant wife” or “the wife of your covenant.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲמַרְתֶּם
  chosen: But you say
  alternatives:
  - And you say
  - Yet you say
  lexicon: HALOT
  rationale: The waw with the quoted objection is best rendered adversatively in English to mark the people's response to the prior accusation. 'But' captures the rhetorical pushback naturally.
- source_word: עַל־מָה
  chosen: Why?
  alternatives:
  - For what reason?
  - On what account?
  lexicon: HALOT
  rationale: This idiom introduces the people's question succinctly. 'Why?' is idiomatic modern English and preserves the force.
- source_word: עַל כִּי
  chosen: Because
  alternatives:
  - It is because
  - On account that
  lexicon: HALOT
  rationale: The repeated preposition plus כי gives the answer to the question. 'Because' is the most natural English connector.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הֵעִיד
  chosen: has been a witness
  alternatives:
  - has testified
  - has borne witness
  lexicon: HALOT
  rationale: The Hiphil of עוד here carries the sense of serving as witness/testifying in a covenantal-legal setting. 'Has been a witness' fits the relational and judicial context between husband and wife.
- source_word: בֵּינְךָ וּבֵין
  chosen: between you and
  alternatives:
  - between you and between
  - against you and
  lexicon: HALOT
  rationale: Standard rendering of the relational preposition pair. It introduces the two parties between whom the LORD stands as witness.
- source_word: אֵשֶׁת נְעוּרֶיךָ
  chosen: the wife of your youth
  alternatives:
  - your youthful wife
  - the wife you married in your youth
  lexicon: HALOT
  rationale: 'A fairly literal rendering preserves the idiom and its emotional force: the woman joined to him from early life.'
- source_word: אֲשֶׁר אַתָּה בָּגַדְתָּה בָּהּ
  chosen: against whom you have acted treacherously
  alternatives:
  - with whom you have dealt faithlessly
  - whom you have betrayed
  lexicon: HALOT
  rationale: בגד commonly denotes treachery/faithlessness, especially in covenant contexts. 'Acted treacherously' preserves the seriousness and covenantal overtones better than the flatter 'been unfaithful,' while 'against whom' reflects the preposition ב in context.
- source_word: וְהִיא
  chosen: though she is
  alternatives:
  - yet she is
  - and she is
  lexicon: HALOT
  rationale: 'The conjunction here is concessive in sense within the argument: despite his treachery, she remains his companion and covenant wife. English ''though'' brings out that contrast.'
- source_word: חֲבֶרְתְּךָ
  chosen: your companion
  alternatives:
  - your partner
  - your associate
  lexicon: HALOT
  rationale: The noun denotes one joined in close association. 'Companion' is relationally warm and fits the marital context without importing modern contractual connotations of 'partner.'
- source_word: אֵשֶׁת בְּרִיתֶךָ
  chosen: your wife by covenant
  alternatives:
  - the wife of your covenant
  - your covenant wife
  lexicon: HALOT
  rationale: The phrase identifies the marriage as covenantal. 'Your wife by covenant' is clear modern English and preserves the covenant emphasis.
