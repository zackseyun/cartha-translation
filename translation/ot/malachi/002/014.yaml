theological_decisions:
- issue: Marital covenant language
  chosen_reading: Render the verse to emphasize that the LORD stands as witness to a covenant marriage and condemns the husband's treachery against his wife.
  alternative_readings:
  - Render more weakly as mere interpersonal unfaithfulness without explicit covenant force
  rationale: The terms בגד and ברית together make the covenantal dimension explicit. The translation should preserve that theological and legal weight without adding later doctrinal formulations beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 5
