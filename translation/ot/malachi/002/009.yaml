theological_decisions:
- issue: Rendering תּוֹרָה in a priestly context
  chosen_reading: the law
  alternative_readings:
  - instruction
  - the Torah
  rationale: The verse rebukes priests for partiality in handling God's revealed standard.
    'The law' best communicates the judicial and covenantal setting in English without
    denying the broader semantic range of תּוֹרָה. Alternatives are preserved because
    'instruction' is lexically possible and 'Torah' may be preferred for Hebraic specificity.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of the public-shame language
  chosen_reading: despised and humiliated before all the people
  alternative_readings:
  - despised and abased to all the people
  rationale: The translation preserves divine judgment as social disgrace without
    intensifying it beyond the Hebrew. 'Humiliated' expresses abasement in a way modern
    readers readily understand.
  doctrine_reference: Translation philosophy §6
