id: MAL.2.9
reference: Malachi 2:9
source:
  edition: WLC
  text: וְ/גַם אֲנִ֞י נָתַ֧תִּי אֶתְ/כֶ֛ם נִבְזִ֥ים וּ/שְׁפָלִ֖ים לְ/כָל הָ/עָ֑ם כְּ/פִ֗י
    אֲשֶׁ֤ר אֵֽינְ/כֶם֙ שֹׁמְרִ֣ים אֶת דְּרָכַ֔/י וְ/נֹשְׂאִ֥ים פָּנִ֖ים בַּ/תּוֹרָֽה־־־׃פ
translation:
  text: So I also have made you despised and humiliated before all the people, because
    you are not keeping my ways but are showing partiality in the law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in instruction' or 'in the Torah' for 'in the law.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם אֲנִי
  chosen: So I also
  alternatives:
  - And I also
  - Therefore I also
  lexicon: HALOT
  rationale: וְגַם with the emphatic pronoun אֲנִי links this statement to the preceding
    rebuke and adds emphasis. 'So I also' captures both the connective force and the
    reciprocal sense in context.
- source_word: נָתַתִּי אֶתְכֶם
  chosen: have made you
  alternatives:
  - have given you over as
  - have set you as
  lexicon: HALOT
  rationale: נתן literally means 'give,' but with predicate adjectives following ('despised
    and humiliated') the idiom means to cause or make someone become something. 'Have
    made you' is natural English and reflects the resultative sense.
- source_word: נִבְזִים
  chosen: despised
  alternatives:
  - contemptible
  - scorned
  lexicon: HALOT
  rationale: From בזה, denoting being treated with contempt. 'Despised' is direct,
    idiomatic, and matches the social shame context.
- source_word: וּשְׁפָלִים
  chosen: humiliated
  alternatives:
  - abased
  - low
  lexicon: HALOT
  rationale: The adjective conveys lowness or abasement in status. 'Humiliated' brings
    out the public disgrace implied by the context better than the more static 'low'.
- source_word: לְכָל הָעָם
  chosen: before all the people
  alternatives:
  - to all the people
  - in the sight of all the people
  lexicon: HALOT
  rationale: The phrase marks the social sphere in which their disgrace is evident.
    'Before all the people' communicates public exposure and shame more clearly than
    a simple dative rendering.
- source_word: כְּפִי אֲשֶׁר
  chosen: because
  alternatives:
  - according to how
  - inasmuch as
  lexicon: HALOT
  rationale: Literally 'according to that which,' but here it introduces the basis
    for judgment. 'Because' best conveys the causal force in clear English.
- source_word: אֵינְכֶם שֹׁמְרִים אֶת דְּרָכַי
  chosen: you are not keeping my ways
  alternatives:
  - you are not guarding my ways
  - you are not observing my ways
  lexicon: HALOT
  rationale: שׁמר commonly means keep, guard, or observe. 'Keeping my ways' preserves
    covenantal-obediential language while remaining readable.
- source_word: וְנֹשְׂאִים פָּנִים
  chosen: are showing partiality
  alternatives:
  - are lifting up faces
  - are being partial
  - are showing favoritism
  lexicon: HALOT
  rationale: The idiom נשׂא פנים means to show favor or partiality. 'Showing partiality'
    is the clearest established English equivalent in judicial/covenantal contexts.
- source_word: בַּתּוֹרָה
  chosen: in the law
  alternatives:
  - in instruction
  - in the Torah
  lexicon: HALOT
  rationale: תּוֹרָה can mean instruction broadly or the law more specifically. In
    this priestly-judicial context, 'the law' best fits the sense of administering
    or teaching God's legal instruction, while remaining accessible to English readers.
