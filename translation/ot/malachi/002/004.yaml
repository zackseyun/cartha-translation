id: MAL.2.4
reference: Malachi 2:4
source:
  edition: WLC
  text: וִֽ/ידַעְתֶּ֕ם כִּ֚י שִׁלַּ֣חְתִּי אֲלֵי/כֶ֔ם אֵ֖ת הַ/מִּצְוָ֣ה הַ/זֹּ֑את לִֽ/הְי֤וֹת בְּרִיתִ/י֙ אֶת לֵוִ֔י אָמַ֖ר יְהוָ֥ה צְבָאֽוֹת־׃
translation:
  text: Then you will know that I have sent this command to you, that my covenant with Levi may be, says Yahweh of Armies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'to be my covenant with Levi.' The Hebrew is compressed; the sense may be that this command is sent in relation to the continuance of God's covenant with Levi.
    reason: alternative_reading
  - marker: b
    text: 'Traditional rendering: ''the LORD of hosts.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וִידַעְתֶּם
  chosen: Then you will know
  alternatives:
  - And you will know
  - So you will know
  lexicon: HALOT
  rationale: Qal perfect 2mp with prefixed waw in prophetic discourse commonly carries a future/result sense in English. 'Then' captures the consequential force in context after the announced judgment.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Introduces the content of what they will know rather than a causal clause.
- source_word: שִׁלַּחְתִּי
  chosen: I have sent
  alternatives:
  - I sent
  lexicon: HALOT
  rationale: The perfect can be rendered as a present-result perfect in English, fitting the idea that the message now stands as something sent to them.
- source_word: אֲלֵיכֶם
  chosen: to you
  alternatives:
  - against you
  lexicon: HALOT
  rationale: The preposition אֶל normally indicates direction toward. Here it marks the recipients of the command.
- source_word: הַמִּצְוָה הַזֹּאת
  chosen: this command
  alternatives:
  - this commandment
  - this decree
  lexicon: HALOT
  rationale: מִצְוָה is a command or injunction. 'Command' is natural modern English and suits the immediate prophetic charge to the priests.
- source_word: לִהְיוֹת
  chosen: so that ... may continue
  alternatives:
  - to be
  - for being
  lexicon: HALOT
  rationale: The infinitive construct with following noun phrase is somewhat elliptical. In context it expresses purpose/result tied to the preservation or maintenance of the covenant after the warning. Rendering it idiomatically as 'so that ... may continue' best reflects the sense in context.
- source_word: בְּרִיתִי אֶת־לֵוִי
  chosen: my covenant with Levi
  alternatives:
  - my covenant with the Levites
  - my covenant with Levi
  lexicon: HALOT
  rationale: אֶת here marks association, 'with.' The singular proper name Levi likely stands corporately for the Levitical priesthood, but the Hebrew names Levi himself; the translation preserves the name while allowing readers to infer the corporate sense from context.
- source_word: אָמַר יְהוָה צְבָאוֹת
  chosen: says the LORD of Armies
  alternatives:
  - says the LORD of hosts
  - declares the LORD of Armies
  lexicon: HALOT
  rationale: The prophetic messenger formula is naturally rendered 'says.' Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is translated rather than transliterated; 'of Armies' preserves the martial/plural force more transparently than traditional 'of hosts'.
