theological_decisions:
- issue: Sense of the purpose clause relating to the covenant with Levi
  chosen_reading: The warning/command is sent in order that God's covenant with Levi may continue or remain in force.
  alternative_readings:
  - The command is sent as the covenant with Levi
  - The command is sent to establish God's covenant with Levi anew
  rationale: The Hebrew לִהְיוֹת בְּרִיתִי אֶת־לֵוִי is terse and has been understood in more than one way. In the immediate context (vv. 1–9), the point is not the first institution of the covenant but the preservation of the covenantal arrangement through priestly obedience and warning. The chosen rendering makes the purpose intelligible in English without overstating beyond the context.
  doctrine_reference: Preserve theological tension rather than resolve it
