id: MAL.2.16
reference: Malachi 2:16
source:
  edition: WLC
  text: כִּֽי שָׂנֵ֣א שַׁלַּ֗ח אָמַ֤ר יְהוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל וְ/כִסָּ֤ה חָמָס֙ עַל לְבוּשׁ֔/וֹ אָמַ֖ר יְהוָ֣ה צְבָא֑וֹת וְ/נִשְׁמַרְתֶּ֥ם בְּ/רוּחֲ/כֶ֖ם וְ/לֹ֥א תִבְגֹּֽדוּ־־׃ס
translation:
  text: For he hates divorce, says Yahweh, the God of Israel, and the one who covers his garment with violence, says Yahweh of Armies. So guard yourselves in your spirit, and do not act faithlessly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Traditional rendering: ''For I hate divorce,'' says the LORD, the God of Israel. The Hebrew text here is difficult and can be understood in more than one way.'
    reason: alternative_reading
  - marker: b
    text: Or 'do not deal treacherously' / 'do not be unfaithful.' The Hebrew speaks of acting faithlessly in covenant relationship.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding warning. 'For' fits the argumentative flow in English.
- source_word: שָׂנֵא
  chosen: he hates
  alternatives:
  - I hate
  lexicon: HALOT
  rationale: The consonantal text and morphology point to a 3ms form ('he hates'), not a 1cs ('I hate'). This avoids importing the traditional rendering 'I hate divorce' where the Hebrew is more difficult. The subject is left implicit until clarified by context.
- source_word: שַׁלַּח
  chosen: divorce
  alternatives:
  - sending away
  - dismissal
  lexicon: HALOT
  rationale: In this marital context the infinitive/participle from שלח refers to sending away a wife, i.e., divorce. 'Divorce' is the clearest idiomatic English rendering.
- source_word: יְהוָה אֱלֹהֵי יִשְׂרָאֵל
  chosen: the LORD, the God of Israel
  alternatives:
  - Yahweh, God of Israel
  lexicon: HALOT
  rationale: Follows the project's default rendering of YHWH as 'the LORD' and translates the title phrase straightforwardly.
- source_word: וְכִסָּה חָמָס עַל לְבוּשׁוֹ
  chosen: and the one who covers his garment with violence
  alternatives:
  - and covers his garment with violence
  - and covers over his garment with wrong
  lexicon: HALOT
  rationale: The clause is syntactically compressed and difficult. 'Covers his garment with violence' preserves the metaphor and the likely image of a man staining what should symbolize covenant fidelity. Supplying 'the one who' makes the English grammatical while retaining the Hebrew sense.
- source_word: חָמָס
  chosen: violence
  alternatives:
  - wrongdoing
  - violence and injustice
  lexicon: HALOT
  rationale: חָמָס commonly denotes violence, often with moral and social wrongdoing. 'Violence' is the standard concise rendering and preserves the severity of the accusation.
- source_word: לְבוּשׁוֹ
  chosen: his garment
  alternatives:
  - his clothing
  - his robe
  lexicon: HALOT
  rationale: A literal rendering preserves the metaphor and possible allusion to marriage imagery without overinterpreting it.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of hosts
  lexicon: HALOT
  rationale: '''Armies'' translates צְבָאוֹת into clear modern English while preserving the martial/cosmic force of the title.'
- source_word: וְנִשְׁמַרְתֶּם בְּרוּחֲכֶם
  chosen: So guard yourselves in your spirit
  alternatives:
  - Guard yourselves in your spirit
  - Take heed to your spirit
  lexicon: HALOT
  rationale: The Niphal imperative/call to vigilance is reflexive in force. 'Guard yourselves in your spirit' is natural English and preserves the inward moral focus.
- source_word: וְלֹא תִבְגֹּדוּ
  chosen: and do not act faithlessly
  alternatives:
  - and do not deal treacherously
  - and do not be unfaithful
  lexicon: HALOT
  rationale: בגד in this context refers to covenantal betrayal, especially marital unfaithfulness. 'Act faithlessly' is readable modern English and preserves the covenantal dimension better than the more archaic 'deal treacherously.'
