theological_decisions:
- issue: Whether the main clause should read the traditional 'I hate divorce' or reflect the MT's more difficult third-person wording
  chosen_reading: Retain the MT-based sense 'he hates divorce' in the main text, with the traditional first-person reading preserved in a footnote.
  alternative_readings:
  - For I hate divorce, says the LORD, the God of Israel
  rationale: The translation philosophy prioritizes the original-language text over translation tradition. The Hebrew form שָׂנֵא is third masculine singular, and the verse is notoriously difficult syntactically. Rather than smoothing it into the familiar traditional rendering, the main text reflects the Hebrew more directly while preserving the longstanding alternative in a footnote.
  doctrine_reference: 'Translation philosophy §1, §3; Contested terms: יְהוָה → the LORD'
- issue: Interpretation of the garment-and-violence clause
  chosen_reading: 'Keep the metaphor literal enough to preserve ambiguity: ''the one who covers his garment with violence.'''
  alternative_readings:
  - for he covers his garment with violence
  - and violence covers his garment
  rationale: The clause likely condemns covenant betrayal and its moral stain, but the exact syntax is debated. Preserving the metaphor avoids over-resolving the image while still making coherent English.
  doctrine_reference: Translation philosophy §3
