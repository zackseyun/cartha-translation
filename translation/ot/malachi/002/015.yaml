id: MAL.2.15
reference: Malachi 2:15
source:
  edition: WLC
  text: וְ/לֹא אֶחָ֣ד עָשָׂ֗ה וּ/שְׁאָ֥ר ר֨וּחַ֙ ל֔/וֹ וּ/מָה֙ הָֽ/אֶחָ֔ד מְבַקֵּ֖שׁ
    זֶ֣רַע אֱלֹהִ֑ים וְ/נִשְׁמַרְתֶּם֙ בְּ/ר֣וּחֲ/כֶ֔ם וּ/בְ/אֵ֥שֶׁת נְעוּרֶ֖י/ךָ
    אַל יִבְגֹּֽד־־׃
translation:
  text: Did not the one God make them? Yet a remnant of the Spirit was his. And what
    was the one seeking? Godly offspring. So guard yourselves in your spirit, and
    let no one deal treacherously with the wife of his youth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew is difficult: ''Did not one make, and a remnant of spirit was his?''
      Other interpretations include, ''No one with even a remnant of spirit does this,''
      or taking ''the one'' as Abraham.'
    reason: alternative_reading
  - marker: b
    text: Or 'a remnant of spirit was his'; possibly 'he had abundance of spirit.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'seed of God'; also rendered 'godly seed' or 'offspring of God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא אֶחָד עָשָׂה
  chosen: Did not the one God make them?
  alternatives:
  - Did not one make?
  - Has not the one made?
  lexicon: HALOT
  rationale: The Hebrew is notoriously compressed and difficult. אֶחָד ('one') with
    עָשָׂה ('made/did') is taken as referring to the one God as subject, in continuity
    with the marriage context of vv. 14–16. 'Make them' is supplied in English to
    express the implied object from context (the married pair), since a bare 'Did
    not one make?' is too opaque in modern English.
- source_word: וּשְׁאָר רוּחַ לוֹ
  chosen: Yet a remnant of the Spirit was his
  alternatives:
  - And he had the residue of the spirit
  - Though he had abundance of spirit
  - And a remnant of spirit belonged to him
  lexicon: HALOT
  rationale: שְׁאָר means 'remainder/remnant.' רוּחַ can mean 'spirit,' 'breath,'
    or 'wind.' Given the theological and literary context, 'Spirit' is capitalized
    as a plausible reference to divine endowment, but the phrase is highly disputed;
    the alternative lower-case renderings are preserved in a footnote. 'Was his' reflects
    לּוֹ ('to him/belonging to him').
- source_word: וּמָה הָאֶחָד מְבַקֵּשׁ
  chosen: And what was the one seeking?
  alternatives:
  - And what did the one seek?
  - And what was that one seeking?
  lexicon: HALOT
  rationale: מְבַקֵּשׁ is 'seeking.' הָאֶחָד is rendered 'the one,' referring back
    to the previously mentioned 'one.' The interrogative is retained rather than paraphrased
    away.
- source_word: זֶרַע אֱלֹהִים
  chosen: Godly offspring
  alternatives:
  - offspring of God
  - seed from God
  - godly seed
  lexicon: HALOT
  rationale: זֶרַע is 'seed/offspring.' In idiomatic modern English within a marriage
    context, 'offspring' is clearer than 'seed.' The genitive אֱלֹהִים is taken qualitatively
    ('godly') rather than as strict possession ('of God'), which best fits the exhortation
    about covenant faithfulness and marriage.
- source_word: וְנִשְׁמַרְתֶּם בְּרוּחֲכֶם
  chosen: So guard yourselves in your spirit
  alternatives:
  - Therefore guard yourselves in your spirit
  - Take heed in your spirit
  lexicon: HALOT
  rationale: 'The Niphal imperative-like form carries a reflexive sense: ''guard yourselves''
    or ''take heed.'' בְּרוּחֲכֶם is rendered ''in your spirit,'' preserving the Hebrew
    wording and its inward-motive emphasis.'
- source_word: וּבְאֵשֶׁת נְעוּרֶיךָ אַל יִבְגֹּד
  chosen: and let no one deal treacherously with the wife of his youth
  alternatives:
  - and do not be faithless to the wife of your youth
  - and let him not act treacherously against the wife of his youth
  lexicon: HALOT
  rationale: בגד commonly denotes acting treacherously or faithlessly, especially
    in covenant contexts. 'Deal treacherously' preserves the covenantal force better
    than the flatter 'be unfaithful.' Because the verb is 3ms while the surrounding
    address includes plural forms, English smooths this to a general prohibition,
    'let no one,' which communicates the force naturally.
