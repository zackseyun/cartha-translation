theological_decisions:
- issue: Interpretation of the notoriously difficult first colon and its relation
    to marriage theology
  chosen_reading: The verse is rendered as affirming that the one God made the married
    pair and seeks godly offspring through covenant faithfulness.
  alternative_readings:
  - The verse refers to Abraham as 'the one' who did not act this way though he had
    the spirit
  - The verse means 'No one who has even a remnant of spirit does this'
  - The syntax is too broken to identify the subject with certainty
  rationale: Malachi 2:15 is one of the most textually and syntactically difficult
    verses in the Hebrew Bible. The chosen reading best fits the immediate context
    of rebuking marital treachery and the flow into v. 16. Because the ambiguity is
    genuine, major alternatives are preserved in footnotes rather than erased.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
- issue: Capitalization of רוּחַ as 'Spirit'
  chosen_reading: Spirit
  alternative_readings:
  - spirit
  rationale: The Hebrew consonantal text does not mark capitalization, so this is
    an interpretive decision. Capitalizing 'Spirit' signals a possible reference to
    divine Spirit/endowment in the creation-and-marriage argument, but because the
    phrase is disputed, the lower-case alternative is preserved in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
