id: MAL.2.1
reference: Malachi 2:1
source:
  edition: WLC
  text: וְ/עַתָּ֗ה אֲלֵי/כֶ֛ם הַ/מִּצְוָ֥ה הַ/זֹּ֖את הַ/כֹּהֲנִֽים׃
translation:
  text: And now, this command is for you, O priests.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to you, O priests.' The Hebrew preposition can be rendered more literally
      as 'to,' but 'for you' better conveys the sense in English that the command
      is specifically directed at them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  - So now
  lexicon: HALOT
  rationale: Temporal/discourse marker introducing a direct transition from the preceding
    rebuke to the present address. 'And now' preserves both the conjunction and the
    rhetorical shift.
- source_word: אֲלֵיכֶם
  chosen: for you
  alternatives:
  - to you
  - against you
  lexicon: HALOT
  rationale: The preposition אֶל with pronominal suffix can mean 'to' or 'toward,'
    but in this predicative construction with 'this command' the idiomatic English
    sense is 'for you,' indicating that the command is directed at the priests.
- source_word: הַמִּצְוָה
  chosen: command
  alternatives:
  - instruction
  - decree
  lexicon: HALOT
  rationale: מִצְוָה commonly denotes a command or injunction. 'Command' is the most
    straightforward rendering here and fits the prophetic warning context better than
    the broader 'instruction.'
- source_word: הַזֹּאת
  chosen: this
  alternatives:
  - this very
  lexicon: HALOT
  rationale: Simple demonstrative modifying 'command.' English places it naturally
    before the noun.
- source_word: הַכֹּהֲנִים
  chosen: O priests
  alternatives:
  - priests
  - you priests
  lexicon: HALOT
  rationale: The noun functions as a vocative in direct address. 'O priests' clearly
    marks the vocative force in natural but elevated English suitable to prophetic
    speech.
