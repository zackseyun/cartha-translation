- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sense of תּוֹרָה in priestly context
  chosen_reading: the law
  alternative_readings:
  - instruction
  rationale: The verse addresses priests who were entrusted with covenantal teaching. 'The law' preserves the formal covenantal sense, while the alternative 'instruction' remains lexically possible and is preserved in a footnote because the Hebrew term can carry both senses.
