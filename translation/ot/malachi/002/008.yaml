id: MAL.2.8
reference: Malachi 2:8
source:
  edition: WLC
  text: וְ/אַתֶּם֙ סַרְתֶּ֣ם מִן הַ/דֶּ֔רֶךְ הִכְשַׁלְתֶּ֥ם רַבִּ֖ים בַּ/תּוֹרָ֑ה שִֽׁחַתֶּם֙ בְּרִ֣ית הַ/לֵּוִ֔י אָמַ֖ר יְהוָ֥ה צְבָאֽוֹת־׃
translation:
  text: But you have turned aside from the way; you have caused many to stumble in the law; you have corrupted the covenant of Levi, says Yahweh of hosts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by instruction' or 'in the law'; the Hebrew torah can mean 'law' or 'instruction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: סַרְתֶּם
  chosen: have turned aside
  alternatives:
  - have departed
  - have gone astray
  lexicon: HALOT
  rationale: The verb סור commonly means to turn aside or depart. 'Turned aside' preserves the metaphor of deviating from a path and fits the following phrase 'from the way.'
- source_word: הַדֶּרֶךְ
  chosen: the way
  alternatives:
  - the path
  lexicon: HALOT
  rationale: '''The way'' is the most natural rendering and preserves the ethical/metaphorical sense common in prophetic literature.'
- source_word: הִכְשַׁלְתֶּם
  chosen: have caused ... to stumble
  alternatives:
  - have made ... stumble
  - have caused ... to fall
  lexicon: HALOT
  rationale: The Hiphil of כשל is causative. 'Caused many to stumble' reflects both the causative stem and the moral/spiritual offense implied in context.
- source_word: רַבִּים
  chosen: many
  alternatives:
  - multitudes
  lexicon: HALOT
  rationale: A straightforward quantitative term; 'many' is idiomatic and sufficiently formal.
- source_word: בַּתּוֹרָה
  chosen: by the law
  alternatives:
  - in the law
  - through instruction
  - by your instruction
  lexicon: HALOT
  rationale: תּוֹרָה can mean law or instruction. Here the article and priestly context support 'the law' as the covenantal teaching entrusted to the priests. The preposition ב can be rendered instrumentally ('by') to express the means by which many were caused to stumble. 'Instruction' is possible, but 'law' better preserves the covenantal and textual force.
- source_word: שִׁחַתֶּם
  chosen: have corrupted
  alternatives:
  - have ruined
  - have spoiled
  - have violated
  lexicon: HALOT
  rationale: The Piel of שׁחת often means to corrupt or ruin. 'Corrupted' fits covenantal language without overinterpreting it as merely legal violation.
- source_word: בְּרִית
  chosen: covenant
  alternatives:
  - agreement
  - treaty
  lexicon: HALOT
  rationale: '''Covenant'' is the standard and theologically appropriate rendering for ברית in this prophetic context.'
- source_word: הַלֵּוִי
  chosen: of Levi
  alternatives:
  - with Levi
  - the Levite
  lexicon: HALOT
  rationale: The construct phrase is best rendered 'the covenant of Levi.' This likely refers to the covenant associated with Levi/the Levitical priesthood rather than an individual Levite. 'With Levi' is possible conceptually, but the English genitive is more natural here.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of hosts
  alternatives:
  - the LORD of armies
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' 'Of hosts' is the established and still comprehensible rendering for צְבָאוֹת in prophetic formulae, preserving the title's weight better than the more reductionistic 'armies'.
