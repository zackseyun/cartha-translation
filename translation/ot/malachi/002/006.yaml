id: MAL.2.6
reference: Malachi 2:6
source:
  edition: WLC
  text: תּוֹרַ֤ת אֱמֶת֙ הָיְתָ֣ה בְּ/פִ֔י/הוּ וְ/עַוְלָ֖ה לֹא נִמְצָ֣א בִ/שְׂפָתָ֑י/ו
    בְּ/שָׁל֤וֹם וּ/בְ/מִישׁוֹר֙ הָלַ֣ךְ אִתִּ֔/י וְ/רַבִּ֖ים הֵשִׁ֥יב מֵ/עָוֺֽן־׃
translation:
  text: The law of truth was in his mouth, and no injustice was found on his lips.
    He walked with me in peace and uprightness, and he turned many back from iniquity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'true instruction was in his mouth.'
    reason: lexical_alternative
  - marker: b
    text: Or 'no wrongdoing' or 'no unrighteousness was found on his lips.'
    reason: lexical_alternative
  - marker: c
    text: Or 'he caused many to return from sin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹרַת אֱמֶת
  chosen: the law of truth
  alternatives:
  - true instruction
  - instruction of truth
  lexicon: HALOT
  rationale: תּוֹרָה can mean law, instruction, or teaching. Here it refers to priestly
    teaching, but retaining 'law' preserves the covenantal and torah-shaped sense
    while remaining natural in English. The construct with אֱמֶת is rendered literally
    as 'of truth' rather than a looser adjectival paraphrase.
- source_word: בְּפִיהוּ
  chosen: in his mouth
  alternatives:
  - on his tongue
  lexicon: HALOT
  rationale: A literal rendering preserves the Hebrew idiom for speech/teaching without
    unnecessary paraphrase.
- source_word: עַוְלָה
  chosen: injustice
  alternatives:
  - wrongdoing
  - unrighteousness
  - falsehood
  lexicon: HALOT
  rationale: עַוְלָה denotes injustice, wrong, or unrighteousness. 'Injustice' fits
    the ethical context and pairs well with priestly integrity in speech. 'Falsehood'
    is possible by context but is narrower than the Hebrew term.
- source_word: נִמְצָא
  chosen: was found
  alternatives:
  - was present
  - was discovered
  lexicon: HALOT
  rationale: The Niphal is naturally rendered 'was found,' preserving the passive/resultative
    sense.
- source_word: בִשְׂפָתָיו
  chosen: on his lips
  alternatives:
  - in his speech
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for spoken words. 'On his lips' is both
    literal and idiomatic in English.
- source_word: בְּשָׁלוֹם
  chosen: in peace
  alternatives:
  - peaceably
  lexicon: HALOT
  rationale: The prepositional phrase is kept close to the Hebrew. 'Peace' here suggests
    wholeness and harmony in covenantal conduct, not merely absence of conflict.
- source_word: וּבְמִישׁוֹר
  chosen: and uprightness
  alternatives:
  - and equity
  - and straightness
  lexicon: HALOT
  rationale: מִישׁוֹר conveys straightness, levelness, and figuratively uprightness/equity.
    'Uprightness' best fits moral conduct in parallel with peace.
- source_word: הָלַךְ אִתִּי
  chosen: he walked with me
  alternatives:
  - he lived with me
  - he conducted himself with me
  lexicon: HALOT
  rationale: The idiom 'walked with me' is a common covenantal expression and should
    be preserved rather than flattened.
- source_word: וְרַבִּים
  chosen: many
  alternatives:
  - multitudes
  lexicon: HALOT
  rationale: A straightforward rendering of the adjective/substantive plural.
- source_word: הֵשִׁיב
  chosen: he turned many back
  alternatives:
  - he brought back many
  - he caused many to return
  lexicon: HALOT
  rationale: The Hiphil of שוב is causative. 'Turned many back' preserves the causative
    force and the repentance/restoration nuance.
- source_word: מֵעָוֺן
  chosen: from iniquity
  alternatives:
  - from sin
  - from guilt
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or punishment for guilt. Here the sense
    is moral crookedness from which people are turned, so 'iniquity' is the most precise
    formal choice.
