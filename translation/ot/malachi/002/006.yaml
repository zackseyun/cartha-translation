theological_decisions:
- issue: Nature of priestly 'torah' in context
  chosen_reading: Rendered תּוֹרַת אֱמֶת as 'the law of truth' while allowing the
    instructional sense to remain implicit.
  alternative_readings:
  - true instruction
  - faithful teaching
  rationale: The verse describes Levi/the ideal priest's teaching role. 'Law of truth'
    preserves the lexical link to torah and avoids reducing the term to mere advice,
    while still fitting the context of priestly instruction.
  doctrine_reference: Translation philosophy §1, §5
- issue: Covenantal idiom of walking with God
  chosen_reading: Kept 'he walked with me' in the main text.
  alternative_readings:
  - he lived in fellowship with me
  - he conducted himself before me
  rationale: The Hebrew idiom carries covenantal and relational weight. Preserving
    it maintains theological texture rather than resolving it into a single explanatory
    paraphrase.
  doctrine_reference: Translation philosophy §3
