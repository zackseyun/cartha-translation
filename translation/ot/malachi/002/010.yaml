id: MAL.2.10
reference: Malachi 2:10
source:
  edition: WLC
  text: הֲ/ל֨וֹא אָ֤ב אֶחָד֙ לְ/כֻלָּ֔/נוּ הֲ/ל֛וֹא אֵ֥ל אֶֽחָ֖ד בְּרָאָ֑/נוּ מַדּ֗וּעַ
    נִבְגַּד֙ אִ֣ישׁ בְּ/אָחִ֔י/ו לְ/חַלֵּ֖ל בְּרִ֥ית אֲבֹתֵֽי/נוּ׃
translation:
  text: Do we not all have one Father? Has not one God created us? Why then are we
    faithless, each man against his brother, profaning the covenant of our fathers?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Why then do we deal treacherously, each man with his brother?' The
      Hebrew verb carries the sense of acting treacherously or faithlessly in a covenant
      relationship.
    reason: lexical_alternative
  - marker: b
    text: '''One Father'' may refer directly to God, as the parallel ''one God created
      us'' suggests; some understand it more broadly as a shared covenant ancestor.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֲלוֹא
  chosen: Do we not / Has not
  alternatives:
  - Have we not
  - Is it not
  lexicon: HALOT
  rationale: Introduces rhetorical questions expecting an affirmative answer. English
    idiom works best by rendering the two occurrences as direct rhetorical questions.
- source_word: אָב אֶחָד
  chosen: one Father
  alternatives:
  - a father
  - one ancestor
  lexicon: HALOT
  rationale: The phrase is singular and qualitative. 'One Father' preserves both the
    unity theme and the likely reference to God as covenant Father in parallel with
    'one God created us,' while allowing the rhetorical force to stand.
- source_word: לְכֻלָּנוּ
  chosen: we all
  alternatives:
  - all of us
  - for us all
  lexicon: HALOT
  rationale: 'The preposition with ''all us'' is idiomatically represented in English
    as ''we all'' in this clause: ''Do we not all have one Father?'''
- source_word: אֵל אֶחָד
  chosen: one God
  alternatives:
  - one Mighty God
  - one divine being
  lexicon: HALOT
  rationale: Straightforward rendering of the singular noun with numeral. 'God' is
    the natural English equivalent here and preserves the monotheistic emphasis.
- source_word: בְּרָאָנוּ
  chosen: created us
  alternatives:
  - made us
  - formed us
  lexicon: HALOT
  rationale: ברא commonly denotes divine creation. 'Created us' best matches the verb's
    theological weight and the explicit divine subject.
- source_word: מַדּוּעַ
  chosen: Why then
  alternatives:
  - Why
  - For what reason then
  lexicon: HALOT
  rationale: Adds a natural inferential connection in English from the two rhetorical
    affirmations to the rebuke that follows.
- source_word: נִבְגַּד
  chosen: are we faithless
  alternatives:
  - do we deal treacherously
  - do we act deceitfully
  - do we betray
  lexicon: HALOT
  rationale: The verb בגד carries the sense of acting treacherously or faithlessly,
    especially in covenantal relationships. 'Are we faithless' is readable modern
    English and fits the covenant-profaning infinitive that follows. The more traditional
    'deal treacherously' is preserved as an alternative.
- source_word: אִישׁ בְּאָחִיו
  chosen: each man against his brother
  alternatives:
  - a man against his brother
  - each one against his brother
  - one with another
  lexicon: HALOT
  rationale: Retains the distributive singular and the masculine kinship term. 'Against'
    captures the adversative sense of ב in this context of betrayal. This follows
    the gender-accurate policy rather than flattening to a neutral paraphrase.
- source_word: לְחַלֵּל
  chosen: profaning
  alternatives:
  - to profane
  - defiling
  - violating
  lexicon: HALOT
  rationale: The infinitive expresses result or purpose connected to the treachery.
    'Profaning' gives a natural English participial sense after the question while
    preserving the sacrilegious/covenantal force.
- source_word: בְּרִית אֲבֹתֵינוּ
  chosen: the covenant of our fathers
  alternatives:
  - our fathers' covenant
  - the covenant with our fathers
  - the ancestral covenant
  lexicon: HALOT
  rationale: A formal but clear rendering that preserves the genitival relationship
    and the covenantal continuity with the ancestors.
