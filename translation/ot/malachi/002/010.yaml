theological_decisions:
- issue: Identity of 'one Father'
  chosen_reading: Rendered as 'one Father' without specifying further in the text,
    while allowing the parallel with 'one God' to suggest divine fatherhood.
  alternative_readings:
  - '''one ancestor'' referring to Abraham/Jacob'
  - explicitly harmonizing as 'God our Father'
  rationale: The Hebrew text itself says 'one Father' and then separately 'one God
    created us.' The translation preserves the text's wording and theological tension
    rather than collapsing the two clauses into an interpretive paraphrase. The immediate
    parallel strongly supports a divine referent, but the wording is left as in the
    source.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it
- issue: Gendered language in אִישׁ ... אָחִיו
  chosen_reading: each man against his brother
  alternative_readings:
  - each person against another
  - one against his fellow
  rationale: The Hebrew uses grammatically masculine singular terms with representative
    force. Per the gender-accurate policy, the translation keeps the masculine form
    rather than neutralizing it, while the context clearly addresses the community
    broadly.
  doctrine_reference: Translation philosophy §4 Gender-accurate over gender-neutral
