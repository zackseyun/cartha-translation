theological_decisions:
- issue: Gendered language in אַנְשֵׁי מְקֹמוֹ
  chosen_reading: the men of his place
  alternative_readings:
  - the people of his place
  - his neighbors
  rationale: The Hebrew uses a masculine plural noun. Following the stated gender-accurate
    policy, the translation preserves the masculine form rather than smoothing to
    a gender-neutral collective, while recognizing that the social referent may include
    the local community more broadly.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Sense of יְנַשְּׂאֻהוּ in context
  chosen_reading: let the men of his place support him
  alternative_readings:
  - let the men of his place assist him
  - let the men of his place carry him
  rationale: The verb's literal sense 'carry/lift' would be misleading in English
    here. The context is provision of resources for return and rebuilding, so an idiomatic
    rendering is warranted under optimal equivalence.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
