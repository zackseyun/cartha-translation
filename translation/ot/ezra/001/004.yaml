id: EZR.1.4
reference: Ezra 1:4
source:
  edition: WLC
  text: וְ/כָל הַ/נִּשְׁאָ֗ר מִֽ/כָּל הַ/מְּקֹמוֹת֮ אֲשֶׁ֣ר ה֣וּא גָֽר שָׁם֒ יְנַשְּׂא֨וּ/הוּ֙
    אַנְשֵׁ֣י מְקֹמ֔/וֹ בְּ/כֶ֥סֶף וּ/בְ/זָהָ֖ב וּ/בִ/רְכ֣וּשׁ וּ/בִ/בְהֵמָ֑ה עִם
    הַ֨/נְּדָבָ֔ה לְ/בֵ֥ית הָ/אֱלֹהִ֖ים אֲשֶׁ֥ר בִּ/ירוּשָׁלִָֽם־־־־׃
translation:
  text: And everyone who remains, in any place where he is living, let the men of
    his place support him with silver and gold, with goods and with livestock, together
    with the freewill offering for the house of God that is in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wherever he resides' or 'wherever he sojourns.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the men of his place'; this may refer more broadly to the local
      inhabitants or neighbors.
    reason: lexical_alternative
  - marker: c
    text: Or 'assist him'; the Hebrew verb is literally 'lift/carry,' used here for
      giving practical support.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנִּשְׁאָר
  chosen: who remains
  alternatives:
  - who is left
  - the survivor
  lexicon: HALOT
  rationale: 'Niphal participle of שׁאר denotes one remaining or being left behind.
    ''Who remains'' fits the proclamation context: any Judean not joining the return
    immediately.'
- source_word: מִכָּל הַמְּקֹמוֹת אֲשֶׁר הוּא גָר שָׁם
  chosen: in any place where he is living
  alternatives:
  - from every place where he resides
  - wherever he sojourns
  lexicon: HALOT
  rationale: The phrase identifies the locality of diaspora residence. גָר can mean
    sojourn/reside; here ordinary residence is intended, so 'is living' is natural
    modern English while preserving the sense.
- source_word: יְנַשְּׂאֻהוּ
  chosen: let ... support him
  alternatives:
  - let ... lift him up
  - let ... assist him
  - let ... carry him
  lexicon: HALOT
  rationale: From נשׂא, literally 'lift/carry,' but in this construction with material
    means it idiomatically means to aid or furnish support. 'Support him' best captures
    the practical sense of supplying resources for the journey and project.
- source_word: אַנְשֵׁי מְקֹמוֹ
  chosen: the men of his place
  alternatives:
  - the people of his place
  - the men of his locality
  - his neighbors
  lexicon: HALOT
  rationale: אַנְשֵׁי is explicitly masculine plural construct, 'men of.' Per gender-accurate
    philosophy, the masculine form is retained rather than neutralized to 'people,'
    though the referent may function broadly as local inhabitants.
- source_word: בְּכֶסֶף וּבְזָהָב
  chosen: with silver and gold
  alternatives:
  - with money and gold
  lexicon: HALOT
  rationale: These are standard precious-metal terms. 'Silver and gold' preserves
    the formal wording and likely includes coined or weighed wealth without over-specifying
    'money'.
- source_word: וּבִרְכוּשׁ
  chosen: with goods
  alternatives:
  - with property
  - with possessions
  lexicon: HALOT
  rationale: רְכוּשׁ denotes movable property/possessions. 'Goods' is concise and
    fits the list of material support.
- source_word: וּבִבְהֵמָה
  chosen: with livestock
  alternatives:
  - with animals
  - with cattle
  lexicon: HALOT
  rationale: בְהֵמָה here is collective for domestic animals used as property or transport.
    'Livestock' is the most natural collective English equivalent.
- source_word: עִם הַנְּדָבָה
  chosen: together with the freewill offering
  alternatives:
  - along with the voluntary offering
  - besides the freewill gift
  lexicon: HALOT
  rationale: נְדָבָה denotes a voluntary/freewill contribution. 'Freewill offering'
    is a well-established and accurate rendering in cultic contexts.
- source_word: לְבֵית הָאֱלֹהִים
  chosen: for the house of God
  alternatives:
  - for God's house
  - for the temple of God
  lexicon: HALOT
  rationale: Literally 'for the house of God.' Although it refers to the temple, retaining
    'house of God' preserves the Hebrew expression and avoids importing a more interpretive
    gloss.
- source_word: אֲשֶׁר בִּירוּשָׁלָם
  chosen: that is in Jerusalem
  alternatives:
  - which is in Jerusalem
  lexicon: HALOT
  rationale: Simple relative clause locating the house of God. 'That is in Jerusalem'
    is idiomatic and clear.
