id: EZR.1.11
reference: Ezra 1:11
source:
  edition: WLC
  text: כָּל כֵּלִים֙ לַ/זָּהָ֣ב וְ/לַ/כֶּ֔סֶף חֲמֵ֥שֶׁת אֲלָפִ֖ים וְ/אַרְבַּ֣ע מֵא֑וֹת
    הַ/כֹּ֞ל הֶעֱלָ֣ה שֵׁשְׁבַּצַּ֗ר עִ֚ם הֵעָל֣וֹת הַ/גּוֹלָ֔ה מִ/בָּבֶ֖ל לִ/ירוּשָׁלִָֽם־׃פ
translation:
  text: All the articles of gold and silver were five thousand four hundred in all.
    Sheshbazzar brought them up with the exiles when they were brought up from Babylon
    to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vessels' for 'articles.' The Hebrew term can refer broadly to utensils,
      vessels, or articles, especially temple objects.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'brought up' twice in this verse, reflecting the customary expression
      for going up to Jerusalem.
    reason: cultural_note
  - marker: c
    text: Or 'the exile community' or 'the deportees' for 'the exiles.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל כֵּלִים
  chosen: All the articles
  alternatives:
  - All the vessels
  - All the utensils
  lexicon: HALOT
  rationale: כֵּלִים is a broad term for objects/articles/vessels. In the temple-treasury
    context, 'articles' is natural modern English and broad enough to include the
    listed temple items without implying only containers.
- source_word: לַזָּהָב וְלַכֶּסֶף
  chosen: of gold and silver
  alternatives:
  - gold and silver
  - made of gold and silver
  lexicon: HALOT
  rationale: The prefixed ל here classifies the items by material. 'Of gold and silver'
    is idiomatic and concise in English.
- source_word: חֲמֵשֶׁת אֲלָפִים וְאַרְבַּע מֵאוֹת
  chosen: five thousand four hundred
  alternatives:
  - 5,400
  lexicon: HALOT
  rationale: The cardinal number is rendered in words for formal readability in running
    biblical prose.
- source_word: הַכֹּל
  chosen: in all
  alternatives:
  - the whole
  - the total
  lexicon: HALOT
  rationale: Here הַכֹּל summarizes the total count. 'In all' is the most idiomatic
    English equivalent.
- source_word: הֶעֱלָה
  chosen: brought ... up
  alternatives:
  - carried up
  - took up
  lexicon: HALOT
  rationale: עלה in the Hiphil commonly means 'bring up' or 'cause to go up.' Because
    the destination is Jerusalem, 'brought up' preserves the geographic/theological
    ascent idiom.
- source_word: שֵׁשְׁבַּצַּר
  chosen: Sheshbazzar
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: עִם
  chosen: with
  alternatives:
  - along with
  lexicon: HALOT
  rationale: 'Simple accompaniment is intended: Sheshbazzar brought the items up together
    with the returning exiles.'
- source_word: הֵעָלוֹת הַגּוֹלָה
  chosen: when they were brought up with the exiles
  alternatives:
  - with the bringing up of the exiles
  - as the exiles were brought up
  - with the exiles of the captivity when they came up
  lexicon: HALOT
  rationale: The infinitive construct of עלה with הגולה expresses the occasion/circumstance
    of the return. Rendering it as a temporal clause gives clear English while preserving
    the passive/causative sense signaled by the Hiphil.
- source_word: הַגּוֹלָה
  chosen: the exiles
  alternatives:
  - the exile community
  - the deportees
  - the captivity
  lexicon: HALOT
  rationale: The noun can denote the body of exiles or the state of exile. Here it
    refers to the people returning, so 'the exiles' is the clearest contextual rendering.
- source_word: מִבָּבֶל לִירוּשָׁלִָם
  chosen: from Babylon to Jerusalem
  rationale: Straightforward rendering of the place names and movement.
