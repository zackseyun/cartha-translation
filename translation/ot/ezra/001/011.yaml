theological_decisions:
- issue: Ascent language to Jerusalem in עלה
  chosen_reading: Retain 'brought up' rather than flattening to 'brought'
  alternative_readings:
  - brought
  - took
  rationale: The Hebrew uses עלה twice in this verse, reflecting the conventional
    'going up' to Jerusalem. Preserving 'up' maintains the source-text's geographic
    and literary nuance without adding doctrinal claims.
  doctrine_reference: Translation philosophy §1, §5
- issue: Reference of הַגּוֹלָה
  chosen_reading: Render as 'the exiles' (people)
  alternative_readings:
  - the captivity
  - the exile
  rationale: In this context the phrase describes the returning community from Babylon,
    not merely the abstract condition of exile. This avoids archaic phrasing while
    staying close to the Hebrew sense.
  doctrine_reference: Translation philosophy §6
