theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Contrast between Israel's God and Nebuchadnezzar's deity
  chosen_reading: his god
  alternative_readings:
  - his gods
  rationale: The Hebrew form is singular with 3ms suffix, so the translation should not generalize to the Babylonian pantheon. The singular preserves the text's wording without importing broader claims.
