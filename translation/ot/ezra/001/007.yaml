id: EZR.1.7
reference: Ezra 1:7
source:
  edition: WLC
  text: וְ/הַ/מֶּ֣לֶךְ כּ֔וֹרֶשׁ הוֹצִ֖יא אֶת כְּלֵ֣י בֵית יְהוָ֑ה אֲשֶׁ֨ר הוֹצִ֤יא נְבֽוּכַדְנֶצַּר֙ מִ/יר֣וּשָׁלִַ֔ם וַֽ/יִּתְּנֵ֖/ם בְּ/בֵ֥ית אֱלֹהָֽי/ו־־׃
translation:
  text: And King Cyrus brought out the vessels of the house of Yahweh, which Nebuchadnezzar had brought out from Jerusalem and had put in the house of his god.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the house of the LORD''; alternatively, ''the temple of the LORD.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'had taken out of Jerusalem and placed in the house of his god.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמֶּלֶךְ כּוֹרֶשׁ
  chosen: King Cyrus
  alternatives:
  - Cyrus the king
  lexicon: HALOT
  rationale: English idiom normally places the royal title before the personal name. The definite article on 'king' is naturally absorbed in English proper-title style.
- source_word: הוֹצִיא
  chosen: brought out
  alternatives:
  - brought forth
  - took out
  lexicon: HALOT
  rationale: The verb יצא in Hiphil means to cause to go out, hence 'bring out.' This keeps the repeated verbal link with Nebuchadnezzar's earlier action in the same verse.
- source_word: כְּלֵי
  chosen: vessels
  alternatives:
  - articles
  - utensils
  - objects
  lexicon: HALOT
  rationale: In temple context, 'vessels' is a natural and sufficiently specific English rendering for cultic implements without over-specifying their exact form.
- source_word: בֵית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' 'House of the LORD' preserves the Hebrew expression while remaining clear in English. 'Temple' is possible but less formally tied to the source wording.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  lexicon: HALOT
  rationale: Introduces the relative clause identifying the vessels. 'Which' reads smoothly in modern literary English.
- source_word: הוֹצִיא ... מִירוּשָׁלַם
  chosen: had brought out from Jerusalem
  alternatives:
  - had taken out of Jerusalem
  lexicon: HALOT
  rationale: The second occurrence of the same verb is rendered consistently. The pluperfect in English reflects the prior action of Nebuchadnezzar relative to Cyrus's action.
- source_word: וַיִּתְּנֵם
  chosen: had put
  alternatives:
  - placed them
  - gave them
  lexicon: HALOT
  rationale: נתן literally means 'gave/put,' but with the following prepositional phrase 'in the house of his god' the sense is placement/deposit. 'Had put' is concise and idiomatic, and the pluperfect continues the backgrounded prior action.
- source_word: בְּבֵית אֱלֹהָיו
  chosen: in the house of his god
  alternatives:
  - in the temple of his god
  lexicon: HALOT
  rationale: Literally 'in the house of his god.' This preserves the lexical parallel with 'house of the LORD' while allowing the contrast between Israel's God and Nebuchadnezzar's god to remain explicit.
