id: EZR.1.10
reference: Ezra 1:10
source:
  edition: WLC
  text: כְּפוֹרֵ֤י זָהָב֙ שְׁלֹשִׁ֔ים כְּפ֤וֹרֵי כֶ֨סֶף֙ מִשְׁנִ֔ים אַרְבַּ֥ע מֵא֖וֹת
    וַ/עֲשָׂרָ֑ה כֵּלִ֥ים אֲחֵרִ֖ים אָֽלֶף׃ס
translation:
  text: 30 gold bowls, 410 silver bowls of a second kind, and 1,000 other vessels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''silver bowls, double: 410.'' The Hebrew term translated ''of a second
      kind'' is uncertain in this inventory context and may indicate a second class,
      duplicates, or a doubled form.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּפוֹרֵי
  chosen: bowls
  alternatives:
  - basins
  - cups
  lexicon: HALOT
  rationale: The noun denotes a type of vessel. In this inventory context, 'bowls'
    is a clear, natural English rendering. 'Basins' is possible in temple-vessel lists,
    but 'bowls' better fits readable modern English without over-specifying shape.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: 'Standard material term; here it modifies the vessel type: ''gold bowls.'''
- source_word: שְׁלֹשִׁים
  chosen: '30'
  alternatives:
  - thirty
  lexicon: HALOT
  rationale: Cardinal number rendered numerically for clarity in an inventory list.
- source_word: כְּפוֹרֵי כֶסֶף
  chosen: silver bowls
  alternatives:
  - silver basins
  - silver cups
  lexicon: HALOT
  rationale: Same vessel term as earlier in the verse, rendered consistently. 'Silver'
    is attributive to the vessel material.
- source_word: מִשְׁנִים
  chosen: of a second kind
  alternatives:
  - double
  - duplicates
  - secondary
  lexicon: HALOT
  rationale: The term is difficult in this context. Rather than forcing a mathematically
    precise sense such as 'double,' it is best taken as distinguishing this set of
    silver vessels from the previous group—thus 'of a second kind.' This preserves
    the inventory distinction without overstating certainty.
- source_word: אַרְבַּע מֵאוֹת וַעֲשָׂרָה
  chosen: '410'
  alternatives:
  - four hundred and ten
  lexicon: HALOT
  rationale: Compound number rendered numerically for readability in a list of counted
    objects.
- source_word: כֵּלִים
  chosen: vessels
  alternatives:
  - articles
  - utensils
  - implements
  lexicon: HALOT
  rationale: A broad term for objects/items, especially cultic or temple items. 'Vessels'
    fits the temple-inventory setting and matches common English usage in such contexts.
- source_word: אֲחֵרִים
  chosen: other
  alternatives:
  - remaining
  - additional
  lexicon: HALOT
  rationale: Simple adjectival distinction from the previously listed items. 'Other'
    is the most direct rendering.
- source_word: אָלֶף
  chosen: 1,000
  alternatives:
  - one thousand
  lexicon: HALOT
  rationale: Cardinal number rendered numerically for consistency with the rest of
    the inventory.
