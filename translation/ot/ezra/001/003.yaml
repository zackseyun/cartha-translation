theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Temple-localizing clause 'he is the God who is in Jerusalem'
  chosen_reading: Retained as written without harmonizing to a broader theological formulation
  alternative_readings:
  - he is God, who is in Jerusalem
  - he is the God—who is in Jerusalem
  - omitting or softening the locative force
  rationale: The verse reflects Cyrus's proclamation in its historical idiom, associating Israel's God with Jerusalem and his house there. To avoid importing later theological clarification or smoothing away the ancient royal perspective, the locative clause is preserved in translation.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
