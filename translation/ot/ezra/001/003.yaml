id: EZR.1.3
reference: Ezra 1:3
source:
  edition: WLC
  text: מִֽי בָ/כֶ֣ם מִ/כָּל עַמּ֗/וֹ יְהִ֤י אֱלֹהָי/ו֙ עִמּ֔/וֹ וְ/יַ֕עַל לִ/ירוּשָׁלִַ֖ם אֲשֶׁ֣ר בִּ/יהוּדָ֑ה וְ/יִ֗בֶן אֶת בֵּ֤ית יְהוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל ה֥וּא הָ/אֱלֹהִ֖ים אֲשֶׁ֥ר בִּ/ירוּשָׁלִָֽם־־־׃
translation:
  text: Whoever among all his people is among you, may his God be with him, and let him go up to Jerusalem, which is in Judah, and rebuild the house of Yahweh, the God of Israel—he is the God who is in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and build the house of the LORD.' The Hebrew verb simply means 'build'; 'rebuild' makes explicit the restoration context.
    reason: lexical_alternative
  - marker: b
    text: Or, 'he is God who is in Jerusalem.' The Hebrew can be rendered more tersely, but the article favors 'the God.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִי בָכֶם מִכָּל עַמּוֹ
  chosen: Whoever among you is from all his people
  alternatives:
  - Who among you from all his people
  - Any of you from among all his people
  lexicon: HALOT
  rationale: מִי introduces an indefinite invitation in context ('whoever'), not merely an information question. עַמּוֹ refers back to Cyrus's God/people framework in the proclamation; 'his people' preserves the 3ms suffix without over-specifying 'the LORD's people' in the main text.
- source_word: יְהִי אֱלֹהָיו עִמּוֹ
  chosen: may his God be with him
  alternatives:
  - his God be with him
  lexicon: HALOT
  rationale: 'Jussive יְהִי is best rendered as a wish/blessing: ''may ... be.'' This preserves the royal benedictory tone.'
- source_word: וְיַעַל
  chosen: let him go up
  alternatives:
  - and may he go up
  - and let him ascend
  lexicon: HALOT
  rationale: עלה is the standard idiom for traveling up to Jerusalem. 'Go up' preserves the geographic/cultic nuance better than simple 'go'.
- source_word: לִירוּשָׁלַם אֲשֶׁר בִּיהוּדָה
  chosen: to Jerusalem, which is in Judah
  alternatives:
  - to Jerusalem that is in Judah
  lexicon: HALOT
  rationale: The relative clause identifies the Jerusalem in view geographically. 'Which is in Judah' is natural modern English and keeps the appositional clarification.
- source_word: וְיִבֶן
  chosen: and rebuild
  alternatives:
  - and build
  lexicon: HALOT
  rationale: Although בנה literally means 'build,' in this restoration context after exile the intended sense is rebuilding the temple. 'Rebuild' makes the situational force explicit without distorting the verb.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: '''House of the LORD'' preserves the Hebrew expression while remaining understandable. The divine name follows doctrine default: יְהוָה rendered ''the LORD.'''
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct rendering; preserves covenantal identification.
- source_word: הוּא הָאֱלֹהִים
  chosen: he is the God
  alternatives:
  - he is God
  lexicon: HALOT
  rationale: With the article on אֱלֹהִים, 'the God' is the more formally precise rendering. It also preserves the emphatic identification in Cyrus's decree.
- source_word: אֲשֶׁר בִּירוּשָׁלָם
  chosen: who is in Jerusalem
  alternatives:
  - who is at Jerusalem
  lexicon: HALOT
  rationale: The relative clause most naturally modifies 'the God' in the Masoretic wording. 'Who is in Jerusalem' preserves the locative expression without softening the text's ancient temple-centered formulation.
