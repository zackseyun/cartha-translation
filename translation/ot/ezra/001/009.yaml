id: EZR.1.9
reference: Ezra 1:9
source:
  edition: WLC
  text: וְ/אֵ֖לֶּה מִסְפָּרָ֑/ם אֲגַרְטְלֵ֨י זָהָ֜ב שְׁלֹשִׁ֗ים אֲגַרְטְלֵי כֶ֨סֶף֙
    אָ֔לֶף מַחֲלָפִ֖ים תִּשְׁעָ֥ה וְ/עֶשְׂרִֽים־׃ס
translation:
  text: 'And this was their number: 30 gold basins, 1,000 silver basins, and 29 knives.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly “29 other vessels,” “29 duplicates,” or “29 replacement vessels”;
      the Hebrew term is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: And this
  alternatives:
  - And these
  lexicon: HALOT
  rationale: Introduces the inventory list. Although formally plural ('and these'),
    idiomatic English with the following singular 'number' is better rendered 'And
    this was' to introduce the total enumeration.
- source_word: מִסְפָּרָם
  chosen: was their number
  alternatives:
  - their number
  - the number of them
  lexicon: HALOT
  rationale: 'The noun with 3mp suffix means ''their number.'' English supplies ''was''
    for a complete clause: ''And this was their number.'''
- source_word: אֲגַרְטְלֵי
  chosen: basins
  alternatives:
  - bowls
  - dishes
  lexicon: HALOT
  rationale: The term denotes a temple vessel/container. 'Basins' is a clear, natural
    rendering in an inventory context; 'bowls' or 'dishes' are possible but less specific.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Material descriptor for the vessels.
- source_word: שְׁלֹשִׁים
  chosen: '30'
  alternatives:
  - thirty
  rationale: Cardinal number; rendered with Arabic numerals for readability in an
    inventory list.
- source_word: כֶּסֶף
  chosen: silver
  lexicon: HALOT
  rationale: Material descriptor for the second set of vessels.
- source_word: אָלֶף
  chosen: 1,000
  alternatives:
  - one thousand
  rationale: Cardinal number; rendered with Arabic numerals for readability and consistency
    in the list.
- source_word: מַחֲלָפִים
  chosen: knives
  alternatives:
  - duplicates
  - replacement vessels
  - other vessels
  lexicon: HALOT
  rationale: The noun is difficult and has been understood in several ways. In this
    temple-vessel inventory, 'knives' is a longstanding and plausible rendering, likely
    referring to implements associated with sacrificial service. Because the term
    is lexically uncertain, alternatives are preserved in a footnote.
- source_word: תִּשְׁעָה וְעֶשְׂרִים
  chosen: '29'
  alternatives:
  - twenty-nine
  rationale: Cardinal number; rendered with Arabic numerals for readability in the
    inventory.
