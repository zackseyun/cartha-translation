id: EZR.1.6
reference: Ezra 1:6
source:
  edition: WLC
  text: וְ/כָל סְבִיבֹֽתֵי/הֶם֙ חִזְּק֣וּ בִֽ/ידֵי/הֶ֔ם בִּ/כְלֵי כֶ֧סֶף בַּ/זָּהָ֛ב
    בָּ/רְכ֥וּשׁ וּ/בַ/בְּהֵמָ֖ה וּ/בַ/מִּגְדָּנ֑וֹת לְ/בַ֖ד עַל כָּל הִתְנַדֵּֽב־־־־׃ס
translation:
  text: And all those around them strengthened their hands with vessels of silver,
    with gold, with goods, with livestock, and with precious things, besides all that
    was freely offered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their neighbors helped them' for the idiom 'strengthened their hands.'
    reason: lexical_alternative
  - marker: b
    text: Or 'besides every freewill offering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: סְבִיבֹתֵיהֶם
  chosen: those around them
  alternatives:
  - their neighbors
  - those surrounding them
  lexicon: HALOT
  rationale: The noun from סביב denotes those in the surrounding area. 'Those around
    them' is natural modern English and avoids over-specifying civic proximity implied
    by 'neighbors,' while still conveying nearby peoples.
- source_word: חִזְּקוּ בִידֵיהֶם
  chosen: strengthened their hands
  alternatives:
  - helped them
  - supported them
  lexicon: HALOT
  rationale: The idiom literally reads 'strengthened in their hands/by their hands.'
    In this context it means giving practical support. Retaining 'strengthened their
    hands' preserves the Hebrew idiom while remaining understandable in English.
- source_word: בִּכְלֵי כֶסֶף
  chosen: with vessels of silver
  alternatives:
  - with articles of silver
  - with silver vessels
  lexicon: HALOT
  rationale: כְּלִי is a broad term for vessel, article, implement, or object. Here,
    in a list of donated valuables, 'vessels of silver' fits the material-gift context
    and remains fairly formal.
- source_word: בַּזָּהָב
  chosen: with gold
  alternatives:
  - with items of gold
  lexicon: HALOT
  rationale: The preposition continues the list of contributed goods. English idiom
    naturally renders the bare noun as 'with gold' rather than repeating 'vessels/items'
    unnecessarily.
- source_word: בָּרְכוּשׁ
  chosen: with goods
  alternatives:
  - with property
  - with possessions
  lexicon: HALOT
  rationale: רְכוּשׁ refers to movable property or goods. 'Goods' fits the donation
    list and avoids suggesting landed property.
- source_word: וּבַבְּהֵמָה
  chosen: with livestock
  alternatives:
  - with cattle
  - with animals
  lexicon: HALOT
  rationale: בְּהֵמָה here is collective and refers to domestic animals as property.
    'Livestock' best captures the collective economic sense in contemporary English.
- source_word: וּבַמִּגְדָּנוֹת
  chosen: with precious things
  alternatives:
  - with choice gifts
  - with costly wares
  - with delicacies
  lexicon: HALOT
  rationale: מִגְדָּנוֹת can denote precious or choice items, sometimes delicacies.
    In this context of material support for returnees, 'precious things' is broad
    enough to cover valuable specialty gifts without narrowing to food.
- source_word: לְבַד
  chosen: besides
  alternatives:
  - apart from
  - in addition to
  lexicon: HALOT
  rationale: The term marks addition beyond the listed items. 'Besides' is concise
    and idiomatic in English.
- source_word: עַל כָּל הִתְנַדֵּב
  chosen: all that was freely offered
  alternatives:
  - every freewill offering
  - all that anyone volunteered
  lexicon: HALOT
  rationale: The hitpael of נדב conveys voluntary or freewill giving. Because the
    Hebrew is somewhat compressed, 'all that was freely offered' captures the sense
    without forcing an explicit subject not present in the text.
