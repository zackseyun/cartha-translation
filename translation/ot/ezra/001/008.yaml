id: EZR.1.8
reference: Ezra 1:8
source:
  edition: WLC
  text: וַ/יּֽוֹצִיאֵ֗/ם כּ֚וֹרֶשׁ מֶ֣לֶךְ פָּרַ֔ס עַל יַ֖ד מִתְרְדָ֣ת הַ/גִּזְבָּ֑ר
    וַֽ/יִּסְפְּרֵ/ם֙ לְ/שֵׁשְׁבַּצַּ֔ר הַ/נָּשִׂ֖יא לִ/יהוּדָֽה־׃
translation:
  text: King Cyrus of Persia brought them out by the hand of Mithredath the treasurer,
    and counted them out to Sheshbazzar, the prince of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through Mithredath the treasurer.' The Hebrew idiom is literally 'by
      the hand of Mithredath.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the leader of Judah' or 'the governor of Judah.' The Hebrew term can
      denote a chief or ruler more generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצִיאֵם
  chosen: brought them out
  alternatives:
  - brought them forth
  - had them brought out
  - released them
  lexicon: HALOT
  rationale: From יצא in the Hiphil, meaning to cause to go out or bring out. Here
    it refers to Cyrus causing the temple vessels mentioned in the previous verse
    to be brought out from storage, not people being led out. 'Brought them out' is
    natural English and preserves the causative sense.
- source_word: עַל יַד
  chosen: by the hand of
  alternatives:
  - through
  - under the charge of
  lexicon: HALOT
  rationale: This Hebrew idiom commonly indicates agency or instrumentality. Rendering
    it literally as 'by the hand of' preserves the idiom while remaining understandable
    in English.
- source_word: מִתְרְדָת
  chosen: Mithredath
  alternatives:
  - Mithradath
  rationale: Personal name transliterated by standard English convention. 'Mithredath'
    is a common conventional form for this Persian name.
- source_word: הַגִּזְבָּר
  chosen: the treasurer
  alternatives:
  - the treasury official
  lexicon: HALOT
  rationale: Refers to an official connected with the treasury. 'Treasurer' is concise,
    idiomatic, and fits the context of handling temple vessels.
- source_word: וַיִּסְפְּרֵם
  chosen: counted them out
  alternatives:
  - counted them
  - numbered them
  lexicon: HALOT
  rationale: From ספר in the sense of counting or enumerating. 'Counted them out'
    fits the context of inventorying and handing over objects one by one.
- source_word: לְשֵׁשְׁבַּצַּר
  chosen: to Sheshbazzar
  rationale: Personal name transliterated rather than translated, following the project's
    policy for names.
- source_word: הַנָּשִׂיא
  chosen: the prince
  alternatives:
  - the leader
  - the governor
  lexicon: HALOT
  rationale: נָשִׂיא broadly denotes one lifted up as a chief, leader, or prince.
    'Prince' is a standard rendering and avoids importing the more specific Persian
    administrative title 'governor,' which the text does not use here.
- source_word: לִיהוּדָה
  chosen: of Judah
  alternatives:
  - for Judah
  lexicon: HALOT
  rationale: The preposition with the place name here identifies Sheshbazzar in relation
    to Judah. 'Of Judah' is the most natural appositional rendering in English with
    'the prince.'
- source_word: כּוֹרֶשׁ מֶלֶךְ פָּרַס
  chosen: King Cyrus of Persia
  alternatives:
  - Cyrus king of Persia
  rationale: Standard English ordering for a royal title and realm, preserving the
    full identification of the subject.
