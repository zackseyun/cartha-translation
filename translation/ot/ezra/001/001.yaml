theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's doctrine specifies 'the LORD' as the default rendering
    of YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Fulfillment language for לִכְלוֹת דְּבַר יְהוָה מִפִּי יִרְמְיָה
  chosen_reading: so that the word of the LORD spoken by Jeremiah might be fulfilled
  alternative_readings:
  - when the word of the LORD spoken by Jeremiah was completed
  - to complete the word of the LORD from the mouth of Jeremiah
  rationale: The verse frames Cyrus's decree as the realization of prophetic speech.
    'Fulfilled' preserves the theological connection between prophecy and historical
    event without adding doctrinal content beyond the text.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
