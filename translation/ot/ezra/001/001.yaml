id: EZR.1.1
reference: Ezra 1:1
source:
  edition: WLC
  text: וּ/בִ/שְׁנַ֣ת אַחַ֗ת לְ/כ֨וֹרֶשׁ֙ מֶ֣לֶךְ פָּרַ֔ס לִ/כְל֥וֹת דְּבַר יְהוָ֖ה
    מִ/פִּ֣י יִרְמְיָ֑ה הֵעִ֣יר יְהוָ֗ה אֶת ר֨וּחַ֙ כֹּ֣רֶשׁ מֶֽלֶךְ פָּרַ֔ס וַ/יַּֽעֲבֶר
    קוֹל֙ בְּ/כָל מַלְכוּת֔/וֹ וְ/גַם בְּ/מִכְתָּ֖ב לֵ/אמֹֽר־־־־־־׃
translation:
  text: 'Now in the first year of Cyrus king of Persia, so that the word of the LORD
    spoken by Jeremiah might be fulfilled, the LORD stirred up the spirit of Cyrus
    king of Persia, and he sent a proclamation throughout all his kingdom, and also
    in writing, saying:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'from the mouth of Jeremiah.' This Hebrew idiom means that Jeremiah
      was the human spokesman through whom the LORD's word came.
    reason: lexical_alternative
  - marker: b
    text: Or, more literally, 'to complete the word of the LORD.' The main text uses
      'fulfilled' because the context is the realization of prophecy.
    reason: lexical_alternative
  - marker: c
    text: Or, 'he made a proclamation' / 'he caused a proclamation to pass.' The Hebrew
      idiom refers to publicly circulating an official announcement.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִשְׁנַת אַחַת
  chosen: Now in the first year
  alternatives:
  - And in the first year
  - In the first year
  lexicon: HALOT
  rationale: The conjunction plus temporal phrase introduces a new narrative stage.
    'Now' captures the discourse transition naturally in English while preserving
    the temporal setting; 'first year' is the plain sense of the construct with אַחַת.
- source_word: לְכוֹרֶשׁ מֶלֶךְ פָּרַס
  chosen: of Cyrus king of Persia
  alternatives:
  - of Cyrus, king of Persia
  lexicon: HALOT
  rationale: Standard genitival dating formula. Personal name is transliterated per
    project philosophy; royal title is translated.
- source_word: לִכְלוֹת
  chosen: so that ... might be fulfilled
  alternatives:
  - to complete
  - when ... was completed
  - to bring to an end
  lexicon: HALOT
  rationale: With דְּבַר יְהוָה, the infinitive expresses the bringing to completion
    of the LORD's word. In idiomatic English for prophetic realization, 'might be
    fulfilled' best conveys the sense without woodenly saying 'completed.'
- source_word: דְּבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the promise of the LORD
  - the message of the LORD
  lexicon: HALOT
  rationale: דָּבָר here refers to the prophetic word/promise. 'Word' preserves the
    broad biblical idiom and allows the fulfillment motif to remain explicit.
- source_word: מִפִּי יִרְמְיָה
  chosen: spoken by Jeremiah
  alternatives:
  - from the mouth of Jeremiah
  - by the mouth of Jeremiah
  lexicon: HALOT
  rationale: Literally 'from the mouth of Jeremiah,' an idiom for prophetic mediation.
    'Spoken by Jeremiah' is clear modern English and preserves Jeremiah as the human
    instrument.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: הֵעִיר
  chosen: stirred up
  alternatives:
  - awakened
  - moved
  - aroused
  lexicon: HALOT
  rationale: The hiphil of עור here denotes inciting or prompting someone internally
    to action. 'Stirred up' is a standard and accurate rendering that preserves divine
    initiative without over-specifying mechanism.
- source_word: אֶת רוּחַ כֹּרֶשׁ
  chosen: the spirit of Cyrus
  alternatives:
  - the mind of Cyrus
  - the inner spirit of Cyrus
  lexicon: HALOT
  rationale: רוּחַ can denote spirit, disposition, or inner impulse. 'Spirit' preserves
    the Hebrew term's breadth and theological resonance; alternatives narrow the sense
    too much in the main text.
- source_word: וַיַּעֲבֶר קוֹל
  chosen: he sent a proclamation
  alternatives:
  - he caused a voice/proclamation to pass
  - he made a proclamation
  lexicon: HALOT
  rationale: The idiom literally means causing a message to circulate publicly. 'Sent
    a proclamation' is natural English and retains the official-public sense of קוֹל
    in this context.
- source_word: בְּכָל מַלְכוּתוֹ
  chosen: throughout all his kingdom
  alternatives:
  - through all his kingdom
  - in all his kingdom
  lexicon: HALOT
  rationale: The preposition and noun indicate dissemination across the whole realm.
    'Throughout' best conveys geographic extent.
- source_word: וְגַם בְּמִכְתָּב
  chosen: and also in writing
  alternatives:
  - and also in a written document
  - and in writing as well
  lexicon: HALOT
  rationale: This phrase adds a written form alongside the oral proclamation. 'In
    writing' is concise and idiomatic.
- source_word: לֵאמֹר
  chosen: 'saying:'
  alternatives:
  - 'as follows:'
  lexicon: HALOT
  rationale: Standard introduction to direct discourse; 'saying:' is the most transparent
    rendering.
