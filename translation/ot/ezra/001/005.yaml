id: EZR.1.5
reference: Ezra 1:5
source:
  edition: WLC
  text: וַ/יָּק֜וּמוּ רָאשֵׁ֣י הָ/אָב֗וֹת לִֽ/יהוּדָה֙ וּ/בִנְיָמִ֔ן וְ/הַ/כֹּהֲנִ֖ים
    וְ/הַ/לְוִיִּ֑ם לְ/כֹ֨ל הֵעִ֤יר הָ/אֱלֹהִים֙ אֶת רוּח֔/וֹ לַ/עֲל֣וֹת לִ/בְנ֔וֹת
    אֶת בֵּ֥ית יְהוָ֖ה אֲשֶׁ֥ר בִּ/ירוּשָׁלִָֽם־־׃
translation:
  text: Then the heads of the fathers’ houses of Judah and Benjamin, and the priests
    and the Levites, arose—everyone whose spirit God had stirred—to go up to build
    the house of the LORD that is in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everyone whose spirit God had awakened' or 'everyone whom God had moved
      in spirit.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the house of the LORD'; that is, the temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּק֜וּמוּ
  chosen: arose
  alternatives:
  - rose up
  - set out
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום, here marking the beginning of responsive action.
    'Arose' preserves the narrative movement without overinterpreting it as departure
    itself.
- source_word: רָאשֵׁי הָאָבוֹת
  chosen: the heads of the fathers’ houses
  alternatives:
  - the family heads
  - the heads of ancestral houses
  lexicon: HALOT
  rationale: A technical social expression for clan/family leadership. 'Fathers’ houses'
    keeps the Hebrew kinship structure visible; 'family heads' is smoother but less
    transparent to the source.
- source_word: לִיהוּדָה וּבִנְיָמִן
  chosen: of Judah and Benjamin
  alternatives:
  - belonging to Judah and Benjamin
  - for Judah and Benjamin
  lexicon: HALOT
  rationale: The prefixed ל marks affiliation here, not direction. 'Of Judah and Benjamin'
    is the most natural English expression of tribal belonging.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of כהנים in cultic and genealogical contexts.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of the tribal/cultic group לויים.
- source_word: לְכֹל הֵעִיר הָאֱלֹהִים אֶת רוּחוֹ
  chosen: everyone whose spirit God had stirred
  alternatives:
  - all whose spirit God had awakened
  - everyone whom God had moved in spirit
  lexicon: HALOT
  rationale: 'The construction is distributive: ''as for everyone whose spirit God
    stirred.'' ''Stirred'' fits the idiom of divine prompting and echoes the same
    verb in the surrounding context. ''Had stirred'' reflects the prior divine action
    motivating their arising.'
- source_word: רוּחַ
  chosen: spirit
  alternatives:
  - heart
  - inner being
  lexicon: HALOT
  rationale: In this context רוח refers to the inner disposition or motivating spirit.
    'Spirit' preserves the Hebrew term and its theological resonance better than 'heart'.
- source_word: לַעֲלוֹת
  chosen: to go up
  alternatives:
  - to ascend
  lexicon: HALOT
  rationale: עלה is the conventional verb for traveling up to Jerusalem. 'To go up'
    is idiomatic English and preserves the pilgrimage/topographical sense.
- source_word: לִבְנוֹת
  chosen: to build
  alternatives:
  - to rebuild
  lexicon: HALOT
  rationale: The Hebrew verb is simply 'to build.' Although the context implies rebuilding,
    adding 're-' would import information not explicit in this verb.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' 'House of the LORD' preserves the Hebrew imagery;
    'temple' is interpretive though contextually accurate.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and consistency with the doctrine guidelines.
- source_word: אֲשֶׁר בִּירוּשָׁלִָם
  chosen: that is in Jerusalem
  alternatives:
  - which was in Jerusalem
  - in Jerusalem
  lexicon: HALOT
  rationale: The relative clause identifies the location of the house. Present tense
    'is' works naturally in English and avoids implying nonexistence despite the temple's
    ruined state.
