theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering of
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Whether to make divine causation more interpretive in הֵעִיר הָאֱלֹהִים אֶת
    רוּחוֹ
  chosen_reading: everyone whose spirit God had stirred
  alternative_readings:
  - everyone whom God inspired
  - everyone God prompted
  rationale: The Hebrew explicitly attributes the inner stirring to God without specifying
    a later doctrinal mechanism. The translation preserves that divine-human tension
    without paraphrasing into stronger experiential language.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
