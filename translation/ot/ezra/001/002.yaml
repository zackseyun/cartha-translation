id: EZR.1.2
reference: Ezra 1:2
source:
  edition: WLC
  text: כֹּ֣ה אָמַ֗ר כֹּ֚רֶשׁ מֶ֣לֶךְ פָּרַ֔ס כֹּ֚ל מַמְלְכ֣וֹת הָ/אָ֔רֶץ נָ֣תַן לִ֔/י יְהוָ֖ה אֱלֹהֵ֣י הַ/שָּׁמָ֑יִם וְ/הֽוּא פָקַ֤ד עָלַ/י֙ לִ/בְנֽוֹת ל֣/וֹ בַ֔יִת בִּ/ירוּשָׁלִַ֖ם אֲשֶׁ֥ר בִּֽ/יהוּדָֽה־־׃
translation:
  text: 'Thus says Cyrus king of Persia: Yahweh, the God of heaven, has given me all the kingdoms of the earth, and he has appointed me to build a house for him in Jerusalem, which is in Judah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has charged me' to build a house for him.
    reason: lexical_alternative
  - marker: b
    text: That is, the temple in Jerusalem.
    reason: cultural_note
lexical_decisions:
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - So says
  lexicon: HALOT
  rationale: Standard prophetic/decree formula. 'Thus says' preserves the formal proclamation style without sounding archaic beyond normal biblical register.
- source_word: כֹּרֶשׁ
  chosen: Cyrus
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention, per translation philosophy.
- source_word: מֶלֶךְ פָּרַס
  chosen: king of Persia
  alternatives:
  - the king of Persia
  lexicon: HALOT
  rationale: Construct phrase identifying Cyrus's royal office. Omitted the article in English because apposition with the proper name reads naturally as 'Cyrus king of Persia.'
- source_word: כֹּל מַמְלְכוֹת הָאָרֶץ
  chosen: all the kingdoms of the earth
  alternatives:
  - all the kingdoms of the land
  - every kingdom on earth
  lexicon: HALOT
  rationale: מַמְלָכוֹת is plural, so 'kingdoms' should be retained. הָאָרֶץ here is best taken in the broad imperial sense 'the earth/world' rather than the local 'land,' fitting royal rhetoric.
- source_word: נָתַן לִי
  chosen: has given me
  alternatives:
  - gave me
  lexicon: HALOT
  rationale: English present perfect fits a past act with present result in a royal proclamation. Simple past is possible, but 'has given me' better conveys Cyrus's current possession of rule.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי הַשָּׁמַיִם
  chosen: the God of heaven
  alternatives:
  - God of the heavens
  lexicon: HALOT
  rationale: Idiomatic title common in Ezra. Singular 'heaven' is standard English for the Hebrew plural in this expression.
- source_word: וְהוּא
  chosen: and he
  alternatives:
  - and it is he
  - he himself
  lexicon: HALOT
  rationale: The pronoun is explicit in Hebrew and marks emphasis/continuity. 'And he' preserves the subject shift and emphasis without overtranslation.
- source_word: פָקַד עָלַי
  chosen: has appointed me
  alternatives:
  - has charged me
  - has commanded me
  - has entrusted me
  lexicon: HALOT
  rationale: פָקַד in this context conveys commissioning or assigning responsibility. 'Appointed me' reads naturally in English and fits the infinitive complement 'to build.' 'Charged me' is a viable alternative worth preserving.
- source_word: לִבְנוֹת לוֹ בַיִת
  chosen: to build a house for him
  alternatives:
  - to build him a house
  - to build a temple for him
  lexicon: HALOT
  rationale: בַיִת literally means 'house.' In this context it refers to the temple, but the main text keeps the literal term; 'temple' is interpretive and better suited for a footnote if needed.
- source_word: בִּירוּשָׁלִַם אֲשֶׁר בִּיהוּדָה
  chosen: in Jerusalem, which is in Judah
  alternatives:
  - in Jerusalem that is in Judah
  - in Jerusalem, in Judah
  lexicon: HALOT
  rationale: The relative clause is retained explicitly. 'Which is in Judah' reflects the Hebrew wording and preserves the geographic specification.
