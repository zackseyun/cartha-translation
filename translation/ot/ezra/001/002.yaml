theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to render בַיִת as 'house' or interpretively as 'temple'
  chosen_reading: house
  alternative_readings:
  - temple
  rationale: Optimal equivalence favors retaining the literal lexical value 'house' while allowing readers to infer the temple context. This avoids importing more interpretation than the Hebrew explicitly states in the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy over translation tradition'
