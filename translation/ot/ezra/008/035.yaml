id: EZR.8.35
reference: Ezra 8:35
source:
  edition: WLC
  text: הַ֠/בָּאִים מֵֽ/הַ/שְּׁבִ֨י בְנֵֽי הַ/גּוֹלָ֜ה הִקְרִ֥יבוּ עֹל֣וֹת לֵ/אלֹהֵ֣י יִשְׂרָאֵ֗ל פָּרִ֨ים שְׁנֵים עָשָׂ֤ר עַל כָּל יִשְׂרָאֵל֙ אֵילִ֣ים תִּשְׁעִ֣ים וְ/שִׁשָּׁ֗ה כְּבָשִׂים֙ שִׁבְעִ֣ים וְ/שִׁבְעָ֔ה צְפִירֵ֥י חַטָּ֖את שְׁנֵ֣ים עָשָׂ֑ר הַ/כֹּ֖ל עוֹלָ֥ה לַ/יהוָֽה־׀־־־׀׃פ
translation:
  text: 'Those who had come from the captivity, the sons of the exile, offered burnt offerings to the God of Israel: twelve bulls for all Israel, ninety-six rams, seventy-seven lambs, and twelve male goats as a sin offering. All of it was a burnt offering to Yahweh.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on behalf of all Israel.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sons of the exile,' an idiom referring to the returned exiles.
    reason: cultural_note
  - marker: c
    text: Hebrew 'All of it was a burnt offering to the LORD.' The wording is preserved as in the source text, even though the verse also mentions male goats for a sin offering.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבָּאִים
  chosen: Those who had come
  alternatives:
  - the ones coming
  - those who came
  lexicon: HALOT
  rationale: The participle with article functions substantivally, referring to a defined group. English past perfect/past sense fits the narrative context of returnees who have now arrived.
- source_word: מֵהַשְּׁבִי
  chosen: from the captivity
  alternatives:
  - from the exile
  - from captivity
  lexicon: HALOT
  rationale: שְׁבִי denotes captivity/captive state. 'Captivity' preserves the concrete sense of being taken captive, while the following phrase already uses 'exile' for גּוֹלָה.
- source_word: בְנֵי הַגּוֹלָה
  chosen: the sons of the exile
  alternatives:
  - the children of the exile
  - the exiles
  - the returned exiles
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the Hebrew appositional expression and its covenant-historical identity marker. 'Sons of' is retained as a conventional Hebrew relational idiom rather than flattened to 'people of'.
- source_word: הִקְרִיבוּ
  chosen: offered
  alternatives:
  - presented
  - brought near
  lexicon: HALOT
  rationale: In sacrificial context, 'offered' is the natural English equivalent for הקריב.
- source_word: עֹלוֹת
  chosen: burnt offerings
  alternatives:
  - whole burnt offerings
  lexicon: HALOT
  rationale: Standard sacrificial term for עֹלָה in the plural. 'Burnt offerings' is clear and established without unnecessary expansion.
- source_word: לֵאלֹהֵי יִשְׂרָאֵל
  chosen: to the God of Israel
  alternatives:
  - for the God of Israel
  lexicon: HALOT
  rationale: The lamed here marks direction/recipient in sacrificial offering language; 'to the God of Israel' is idiomatic and faithful.
- source_word: פָּרִים שְׁנֵים עָשָׂר עַל כָּל יִשְׂרָאֵל
  chosen: twelve bulls for all Israel
  alternatives:
  - twelve bulls on behalf of all Israel
  - twelve young bulls for all Israel
  lexicon: HALOT
  rationale: עַל in sacrificial contexts often conveys representation/on behalf of. 'For all Israel' is concise and natural, while preserving representative force. 'Bulls' is sufficient for פָּרִים.
- source_word: אֵילִים תִּשְׁעִים וְשִׁשָּׁה
  chosen: ninety-six rams
  alternatives:
  - 96 rams
  lexicon: HALOT
  rationale: Straightforward numerical phrase; spelled out in standard literary English.
- source_word: כְּבָשִׂים שִׁבְעִים וְשִׁבְעָה
  chosen: seventy-seven lambs
  alternatives:
  - 77 lambs
  - seventy-seven sheep
  lexicon: HALOT
  rationale: כְּבָשִׂים commonly denotes lambs in sacrificial lists; 'lambs' is the conventional and contextually fitting rendering.
- source_word: צְפִירֵי חַטָּאת
  chosen: male goats as a sin offering
  alternatives:
  - goats for a sin offering
  - he-goats of sin offering
  lexicon: HALOT
  rationale: צְפִירִים are male goats, and חַטָּאת here denotes the sin offering category. Rendering the construction as 'male goats as a sin offering' makes the sacrificial function explicit in natural English.
- source_word: הַכֹּל עוֹלָה לַיהוָה
  chosen: All of it was a burnt offering to the LORD
  alternatives:
  - The whole was a burnt offering to the LORD
  - all was an עולה to the LORD
  lexicon: HALOT
  rationale: The clause sums up the sacrificial presentation. Although sin-offering goats have just been mentioned, the Hebrew states this summary formula; the translation preserves it rather than harmonizing away the tension. 'the LORD' follows the project's default for YHWH.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, YHWH is rendered 'the LORD' in the main text.
