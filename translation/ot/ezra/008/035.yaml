theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Apparent tension between the mention of sin-offering goats and the summary statement 'all of it was a burnt offering to the LORD'
  chosen_reading: Preserve the Hebrew summary statement without smoothing it
  alternative_readings:
  - Interpret the final clause as referring only to the preceding burnt-offering animals
  - Emend or paraphrase to avoid tension
  rationale: The translation philosophy requires preserving theological and textual tension rather than resolving it by paraphrase. The Hebrew text as given includes both the sin offering and the concluding summary; the English reflects that wording transparently.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
