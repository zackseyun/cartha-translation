id: EZR.8.29
reference: Ezra 8:29
source:
  edition: WLC
  text: שִׁקְד֣וּ וְ/שִׁמְר֗וּ עַֽד תִּשְׁקְל֡וּ לִ/פְנֵי֩ שָׂרֵ֨י הַ/כֹּהֲנִ֧ים וְ/הַ/לְוִיִּ֛ם וְ/שָׂרֵֽי הָ/אָב֥וֹת לְ/יִשְׂרָאֵ֖ל בִּ/ירוּשָׁלִָ֑ם הַ/לִּשְׁכ֖וֹת בֵּ֥ית יְהוָֽה־־׃
translation:
  text: Be watchful and guard them until you weigh them out before the chief priests and the Levites and the heads of the fathers’ houses of Israel in Jerusalem, in the chambers of the house of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Be watchful and keep them.' The Hebrew imperatives emphasize careful vigilance over the entrusted items.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the heads of the fathers’ houses of Israel,' referring to clan or ancestral-house leaders.
    reason: cultural_note
  - marker: c
    text: Hebrew 'the house of the LORD'; that is, the temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁקְדוּ
  chosen: Be diligent
  alternatives:
  - Be watchful
  - Be attentive
  lexicon: HALOT
  rationale: Imperative plural from שׁקד conveys wakeful attentiveness or diligence. 'Be diligent' fits the charge to exercise careful oversight of the entrusted valuables, while remaining natural English.
- source_word: וְשִׁמְרוּ
  chosen: and guard them
  alternatives:
  - and keep them
  - and watch over them
  lexicon: HALOT
  rationale: שׁמר commonly means keep, guard, watch over. Because the context is safeguarding temple silver and gold, 'guard them' best brings out the protective sense. 'Them' is supplied from context, referring to the entrusted items from the previous verse.
- source_word: עַד תִּשְׁקְלוּ
  chosen: until you weigh them out
  alternatives:
  - until you weigh them
  - until they are weighed
  lexicon: HALOT
  rationale: The verb שקל here refers to weighing valuables for accountability. 'Weigh them out' reflects the procedural sense of measuring out the entrusted items before officials.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: Standard rendering meaning in front of or in the presence of. 'Before' is concise and idiomatic in this formal setting.
- source_word: שָׂרֵי הַכֹּהֲנִים
  chosen: the chief priests
  alternatives:
  - the leaders of the priests
  - the priestly officials
  lexicon: HALOT
  rationale: שׂרים are leaders/officials. In English biblical usage, 'chief priests' is a natural rendering for leading priests, though this is not the later NT technical group. It communicates rank clearly.
- source_word: וְהַלְוִיִּם
  chosen: and the Levites
  lexicon: HALOT
  rationale: Straightforward ethnoreligious designation; transliterated conventionally as 'Levites'.
- source_word: וְשָׂרֵי הָאָבוֹת לְיִשְׂרָאֵל
  chosen: and the heads of the fathers’ houses of Israel
  alternatives:
  - and the leaders of the ancestral houses of Israel
  - and the heads of the families of Israel
  lexicon: HALOT
  rationale: Literally 'the leaders of the fathers' for Israel,' an idiom for clan or ancestral-house heads. 'Heads of the fathers’ houses' preserves the formal structure of the Hebrew while remaining understandable. A more dynamic 'families' is possible but loses the household/clan nuance.
- source_word: בִּירוּשָׁלָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Standard place-name rendering.
- source_word: הַלִּשְׁכוֹת
  chosen: the chambers
  alternatives:
  - the rooms
  - the storerooms
  lexicon: HALOT
  rationale: Refers to rooms/chambers in the temple complex. 'Chambers' preserves the architectural and cultic setting better than the more generic 'rooms.' 'Storerooms' may be too specific for the lexical range.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: בית יהוה is literally 'house of YHWH.' Following the doctrine guideline, יְהוָה is rendered 'the LORD.' 'House of the LORD' preserves the Hebrew expression; 'temple' is a valid contextual alternative but less formally equivalent.
