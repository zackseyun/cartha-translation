id: EZR.8.28
reference: Ezra 8:28
source:
  edition: WLC
  text: וָ/אֹמְרָ֣/ה אֲלֵ/הֶ֗ם אַתֶּ֥ם קֹ֨דֶשׁ֙ לַ/יהוָ֔ה וְ/הַ/כֵּלִ֖ים קֹ֑דֶשׁ וְ/הַ/כֶּ֤סֶף וְ/הַ/זָּהָב֙ נְדָבָ֔ה לַ/יהוָ֖ה אֱלֹהֵ֥י אֲבֹתֵי/כֶֽם׃
translation:
  text: And I said to them, “You are holy to Yahweh, and the vessels are holy; and the silver and the gold are a freewill offering to Yahweh, the God of your fathers.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וָאֹמְרָה
  chosen: And I said
  alternatives:
  - Then I said
  - So I said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces Ezra's direct speech. 'And I said' preserves the narrative sequence without overinterpreting the conjunction.
- source_word: אַתֶּם
  chosen: You
  alternatives:
  - You yourselves
  lexicon: HALOT
  rationale: Second person masculine plural pronoun addressing the priests/Levites. Simple 'You' is sufficient in English; plurality is clear from context.
- source_word: קֹדֶשׁ לַיהוָה
  chosen: holy to the LORD
  alternatives:
  - holy for the LORD
  - set apart to the LORD
  - holy unto the LORD
  lexicon: HALOT
  rationale: קֹדֶשׁ here predicates consecrated status. 'Holy to the LORD' is idiomatic and preserves the cultic sense of belonging/consecration to YHWH.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַכֵּלִים
  chosen: the vessels
  alternatives:
  - the articles
  - the utensils
  lexicon: HALOT
  rationale: In temple context, כֵּלִים refers to cultic objects/implements. 'Vessels' is a standard and suitably formal rendering for sacred temple items.
- source_word: קֹדֶשׁ
  chosen: holy
  alternatives:
  - sacred
  lexicon: HALOT
  rationale: Predicate adjective/noun parallel to the previous clause. 'Holy' maintains lexical consistency with the first occurrence and preserves the consecration theme.
- source_word: הַכֶּסֶף וְהַזָּהָב
  chosen: the silver and the gold
  alternatives:
  - the silver and gold
  lexicon: HALOT
  rationale: The definite articles are present on both nouns. Rendering both articles keeps the formal balance of the Hebrew while remaining natural English.
- source_word: נְדָבָה
  chosen: a freewill offering
  alternatives:
  - a voluntary offering
  - an offering freely given
  lexicon: HALOT
  rationale: נְדָבָה denotes an offering given voluntarily rather than by compulsion. 'Freewill offering' is the established cultic term and accurately conveys the nuance.
- source_word: אֱלֹהֵי אֲבֹתֵיכֶם
  chosen: the God of your fathers
  alternatives:
  - your fathers' God
  - the God of your ancestors
  lexicon: HALOT
  rationale: Construct chain identifying YHWH covenantally. 'The God of your fathers' preserves the traditional covenant formula and the masculine plural source wording.
