id: EZR.2.53
reference: Ezra 2:53
source:
  edition: WLC
  text: בְּנֵי בַרְק֥וֹס בְּֽנֵי סִֽיסְרָ֖א בְּנֵי תָֽמַח־־־׃
translation:
  text: the sons of Barkos, the sons of Sisera, the sons of Temah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Tamah,” reflecting a different English transliteration of the same Hebrew
      name.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: In Ezra's returnee/genealogical list, בְּנֵי is the standard construct
    formula introducing a family or clan line. 'The sons of' is the most direct and
    conventional rendering, while still naturally representing a broader descendant
    group in list context.
- source_word: בַרְק֥וֹס
  chosen: Barkos
  alternatives:
  - Barqos
  lexicon: HALOT
  rationale: This is a proper name and should be transliterated rather than translated,
    following the project's policy for personal names. 'Barkos' reflects a standard
    English transliteration of the Hebrew form.
- source_word: סִֽיסְרָא
  chosen: Sisera
  lexicon: HALOT
  rationale: Proper name transliterated by standard convention. Although the name
    is familiar from the earlier biblical Sisera, here it functions simply as a family
    ancestor name in the list.
- source_word: תָֽמַח
  chosen: Temah
  alternatives:
  - Tamah
  lexicon: HALOT
  rationale: Proper name transliterated. The vocalization supports 'Temah' in many
    English traditions; 'Tamah' is a possible alternative transliteration worth preserving
    because of variation in English versions and transliteration practices.
