id: EZR.2.44
reference: Ezra 2:44
source:
  edition: WLC
  text: בְּנֵי קֵרֹ֥ס בְּֽנֵי סִֽיעֲהָ֖א בְּנֵ֥י פָדֽוֹן־־׃
translation:
  text: the sons of Keros, the sons of Siaha, the sons of Padon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: In genealogical lists, 'sons of' can also mean 'descendants of' or members
      of a family line, not only immediate male children.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: In Ezra's returnee/genealogical list, בְּנֵי is a standard clan formula
    meaning the members or descendants of a named family line. 'The sons of' preserves
    the formal structure and matches the Hebrew construct chain, while remaining idiomatic
    in English. Alternatives are possible contextually, but the repeated list format
    favors the conventional genealogical rendering.
- source_word: קֵרֹס
  chosen: Keros
  alternatives:
  - Qeros
  lexicon: HALOT
  rationale: This is a proper name and should be transliterated rather than translated,
    per project philosophy. 'Keros' is a standard English transliteration from the
    Hebrew form.
- source_word: סִיעֲהָא
  chosen: Siaha
  alternatives:
  - Siahaʾ
  - Sia
  lexicon: HALOT
  rationale: This is a proper name in a list of temple servants/family groups and
    is best transliterated. 'Siaha' reflects the consonantal form and common English
    convention. A shorter form appears in some parallel traditions, but the MT here
    supports 'Siaha.'
- source_word: פָדוֹן
  chosen: Padon
  alternatives:
  - Pedon
  lexicon: HALOT
  rationale: This is a proper name and is transliterated. 'Padon' closely reflects
    the Hebrew vocalization and standard English practice for this name.
