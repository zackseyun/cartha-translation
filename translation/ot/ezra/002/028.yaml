id: EZR.2.28
reference: Ezra 2:28
source:
  edition: WLC
  text: אַנְשֵׁ֤י בֵֽית אֵל֙ וְ/הָ/עָ֔י מָאתַ֖יִם עֶשְׂרִ֥ים וּ/שְׁלֹשָֽׁה־׃ס
translation:
  text: 'The men of Bethel and Ai: two hundred twenty-three.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אַנְשֵׁי
  chosen: The men of
  alternatives:
  - The people of
  - The men
  lexicon: HALOT
  rationale: Construct plural of אִישׁ here introduces a census entry for male members/households
    associated with the place names. 'The men of' is the most natural and sufficiently
    formal rendering in this list context; 'people of' would broaden beyond the masculine
    form without textual warrant.
- source_word: בֵית אֵל
  chosen: Bethel
  alternatives:
  - Beth-el
  lexicon: HALOT
  rationale: Proper place name, conventionally transliterated as 'Bethel' per the
    translation policy to transliterate names rather than translate them.
- source_word: וְהָעָי
  chosen: and Ai
  alternatives:
  - and the Ai
  lexicon: HALOT
  rationale: Proper place name with article in Hebrew. In English, the article is
    normally not carried over with established place names, so 'Ai' is idiomatic while
    preserving the referent.
- source_word: מָאתַיִם עֶשְׂרִים וּשְׁלֹשָׁה
  chosen: two hundred twenty-three
  alternatives:
  - two hundred and twenty-three
  lexicon: HALOT
  rationale: Straightforward cardinal number. The hyphenated modern English form is
    clear and readable; omission of 'and' follows contemporary style without changing
    meaning.
