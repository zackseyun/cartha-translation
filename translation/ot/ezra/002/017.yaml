id: EZR.2.17
reference: Ezra 2:17
source:
  edition: WLC
  text: בְּנֵ֣י בֵצָ֔י שְׁלֹ֥שׁ מֵא֖וֹת עֶשְׂרִ֥ים וּ/שְׁלֹשָֽׁה׃ס
translation:
  text: the sons of Bezai, three hundred twenty-three.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: In Ezra's returnee list, בְּנֵי introduces a family/clan grouping. 'The
    sons of' is the standard and sufficiently transparent rendering, while also allowing
    for a broader descendant sense in genealogical/list contexts.
- source_word: בֵצָי
  chosen: Bezai
  rationale: Proper name transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: שְׁלֹשׁ מֵאוֹת עֶשְׂרִים וּשְׁלֹשָׁה
  chosen: three hundred twenty-three
  alternatives:
  - three hundred and twenty-three
  lexicon: HALOT
  rationale: The Hebrew cardinal number sequence is rendered in natural modern English
    as 'three hundred twenty-three.' The alternative with 'and' is acceptable in some
    English styles, but the chosen form is cleaner and contemporary.
