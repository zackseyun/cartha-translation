theological_decisions:
- issue: Rendering of וַיְגֹאֲלוּ in relation to priestly status
  chosen_reading: they were excluded from the priesthood
  alternative_readings:
  - they were considered defiled from the priesthood
  - they were disqualified from the priesthood
  rationale: 'The Hebrew verb can carry the idea of defilement/disqualification, but
    in this context the narrative emphasis is the administrative outcome: they were
    barred from priestly standing because their genealogy could not be verified. ''Excluded''
    preserves that outcome without overstating a ritual-theological judgment beyond
    the text''s immediate function.'
  doctrine_reference: Translation philosophy §1, §3, §6
