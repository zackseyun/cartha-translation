id: EZR.2.62
reference: Ezra 2:62
source:
  edition: WLC
  text: אֵ֗לֶּה בִּקְשׁ֧וּ כְתָבָ֛/ם הַ/מִּתְיַחְשִׂ֖ים וְ/לֹ֣א נִמְצָ֑אוּ וַֽ/יְגֹאֲל֖וּ
    מִן הַ/כְּהֻנָּֽה־׃
translation:
  text: These sought their record among those enrolled by genealogy, but they were
    not found, and they were excluded from the priesthood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they were considered defiled from the priesthood' or 'they were disqualified
      from the priesthood.' The Hebrew verb carries the sense of being treated as
      unfit for priestly status because their genealogy could not be verified.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These
  alternatives:
  - These men
  - These people
  lexicon: HALOT
  rationale: Demonstrative plural referring back to the priestly claimants in the
    preceding context. Simple 'These' is natural and sufficiently specific in English.
- source_word: בִּקְשׁוּ
  chosen: sought
  alternatives:
  - searched for
  - looked for
  lexicon: HALOT
  rationale: The verb בקשׁ commonly means 'seek' or 'search for.' 'Sought' preserves
    the formal sense while remaining readable.
- source_word: כְתָבָם
  chosen: their record
  alternatives:
  - their document
  - their written record
  - their register
  lexicon: HALOT
  rationale: כְּתָב is a writing/document. In this genealogical-administrative context,
    'record' best conveys an official written proof without over-specifying the exact
    format.
- source_word: הַמִּתְיַחְשִׂים
  chosen: among those enrolled by genealogy
  alternatives:
  - in the genealogical register
  - among those reckoned by genealogy
  - among those who were registered by ancestry
  lexicon: HALOT
  rationale: 'The hitpael of יחס refers to establishing or enrolling one''s lineage/genealogy.
    The phrase modifies where the record was sought: within the genealogical enrollment/register.
    ''Among those enrolled by genealogy'' preserves the participial force and administrative
    nuance.'
- source_word: וְלֹא נִמְצָאוּ
  chosen: but they were not found
  alternatives:
  - but they could not be found
  - but it was not found
  lexicon: HALOT
  rationale: The plural verb naturally refers to the persons in relation to the register,
    i.e., they were not found in it. This is slightly elliptical in Hebrew; the English
    keeps the Hebrew subject while remaining understandable.
- source_word: וַיְגֹאֲלוּ
  chosen: they were excluded
  alternatives:
  - they were disqualified
  - they were deemed unclean
  - they were defiled
  lexicon: HALOT
  rationale: From גאל in the passive/polel-related usage here, the sense is being
    treated as defiled or disqualified from priestly status because lineage could
    not be verified. 'Excluded' communicates the practical result in clear English
    without importing ritual terminology too strongly into the main text.
- source_word: מִן הַכְּהֻנָּה
  chosen: from the priesthood
  alternatives:
  - from the priestly office
  - from serving as priests
  lexicon: HALOT
  rationale: כְּהֻנָּה denotes priesthood/priestly office. 'From the priesthood' is
    the most direct and idiomatic rendering.
