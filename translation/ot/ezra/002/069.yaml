id: EZR.2.69
reference: Ezra 2:69
source:
  edition: WLC
  text: כְּ/כֹחָ֗/ם נָתְנוּ֮ לְ/אוֹצַ֣ר הַ/מְּלָאכָה֒ זָהָ֗ב דַּרְכְּמוֹנִים֙ שֵׁשׁ
    רִבֹּ֣אות וָ/אֶ֔לֶף וְ/כֶ֕סֶף מָנִ֖ים חֲמֵ֣שֶׁת אֲלָפִ֑ים וְ/כָתְנֹ֥ת כֹּהֲנִ֖ים
    מֵאָֽה־ס׃ס
translation:
  text: 'According to their ability they gave to the treasury for the work: 61,000
    gold darics, 5,000 minas of silver, and 100 priests’ tunics.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gold coins'; the Hebrew term refers specifically to Persian darics.
    reason: lexical_alternative
  - marker: b
    text: A mina was an ancient unit of weight and money.
    reason: cultural_note
lexical_decisions:
- source_word: כְּכֹחָם
  chosen: According to their ability
  alternatives:
  - as they were able
  - according to their resources
  - according to their strength
  lexicon: HALOT
  rationale: 'The preposition כְ with כֹּחַ expresses measure or proportion: giving
    in keeping with one''s capacity. ''According to their ability'' is natural English
    and preserves the proportional sense better than a more literal ''according to
    their strength.'''
- source_word: נָתְנוּ
  chosen: they gave
  alternatives:
  - they contributed
  lexicon: HALOT
  rationale: נתן is the standard verb 'give.' 'They gave' is sufficiently clear in
    context and avoids adding interpretive nuance beyond the source.
- source_word: לְאוֹצַר הַמְּלָאכָה
  chosen: to the treasury for the work
  alternatives:
  - to the treasury of the work
  - for the storehouse of the work
  - to the fund for the work
  lexicon: HALOT
  rationale: אוֹצָר denotes a treasury or storehouse; מְלָאכָה here refers to the
    rebuilding project/work. 'Treasury for the work' communicates that the gifts were
    designated for the project without forcing an overly wooden genitive.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Straightforward material term.
- source_word: דַּרְכְּמוֹנִים
  chosen: darics
  alternatives:
  - drachmas
  - gold coins
  lexicon: HALOT
  rationale: This Persian loanword refers to darics, a known gold coin. 'Darics' preserves
    the historical specificity better than the more generic 'gold coins.' 'Drachmas'
    reflects some traditional renderings but is less precise for this Hebrew term.
- source_word: שֵׁשׁ רִבֹּאות וָאֶלֶף
  chosen: 61,000
  alternatives:
  - sixty-one thousand
  lexicon: HALOT
  rationale: The Hebrew number is literally 'six ten-thousands and one thousand.'
    Rendering as 61,000 is accurate and readable in modern English.
- source_word: וְכֶסֶף
  chosen: and ... of silver
  alternatives:
  - and silver
  lexicon: HALOT
  rationale: The conjunction introduces the next donated item. In English, '5,000
    minas of silver' is the most natural ordering.
- source_word: מָנִים
  chosen: minas
  alternatives:
  - pounds
  - manehs
  lexicon: HALOT
  rationale: מָנֶה is a weight/monetary unit commonly rendered 'mina.' Using 'minas'
    preserves the ancient unit rather than replacing it with an inexact modern equivalent.
- source_word: חֲמֵשֶׁת אֲלָפִים
  chosen: 5,000
  alternatives:
  - five thousand
  lexicon: HALOT
  rationale: Simple cardinal number; numerals improve readability in a list of donations.
- source_word: וְכָתְנֹת כֹּהֲנִים
  chosen: and 100 priests’ tunics
  alternatives:
  - and one hundred priestly garments
  - and one hundred tunics for the priests
  - and one hundred priests' garments
  lexicon: HALOT
  rationale: כֻּתֹּנֶת/כָּתְנֹת refers to tunics or long garments. 'Priests’ tunics'
    is concise and likely reflects garments belonging to or intended for priests.
    'Priestly garments' is broader than the Hebrew noun warrants.
- source_word: מֵאָה
  chosen: '100'
  alternatives:
  - one hundred
  lexicon: HALOT
  rationale: Simple cardinal number; numeral style matches the rest of the verse for
    readability and consistency.
