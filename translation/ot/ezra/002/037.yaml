id: EZR.2.37
reference: Ezra 2:37
source:
  edition: WLC
  text: בְּנֵ֣י אִמֵּ֔ר אֶ֖לֶף חֲמִשִּׁ֥ים וּ/שְׁנָֽיִם׃ס
translation:
  text: the sons of Immer, 1,052.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the members of
  lexicon: HALOT
  rationale: In genealogical/post-exilic census lists, בְּנֵי commonly introduces
    a family or clan grouping. 'The sons of' is the most direct and conventional rendering,
    preserving the Hebrew idiom while remaining understandable in English.
- source_word: אִמֵּר
  chosen: Immer
  lexicon: HALOT
  rationale: Proper personal/family name; per translation philosophy, names are transliterated
    rather than translated.
- source_word: אֶלֶף חֲמִשִּׁים וּשְׁנָיִם
  chosen: 1,052
  alternatives:
  - one thousand fifty-two
  lexicon: HALOT
  rationale: The Hebrew cardinal sequence literally reads 'a thousand, fifty, and
    two.' Rendering as numerals suits a census/list context and communicates the total
    clearly in modern English without loss of meaning.
