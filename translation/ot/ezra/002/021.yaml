id: EZR.2.21
reference: Ezra 2:21
source:
  edition: WLC
  text: בְּנֵ֣י בֵֽית לָ֔חֶם מֵאָ֖ה עֶשְׂרִ֥ים וּ/שְׁלֹשָֽׁה־׃ס
translation:
  text: the sons of Bethlehem, one hundred twenty-three.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the men of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of בֵּן, literally 'sons of.' In Ezra's
    census-style list, it can denote members/descendants of a family or locality.
    'The sons of' preserves the formal wording and the genealogical/register style
    better than a more interpretive 'descendants of' or 'men of.'
- source_word: בֵית לָחֶם
  chosen: Bethlehem
  alternatives:
  - Beth-lehem
  lexicon: HALOT
  rationale: This is the place name Bethlehem. Per translation philosophy, names are
    transliterated by standard English convention rather than translated literally
    ('house of bread').
- source_word: מֵאָה עֶשְׂרִים וּשְׁלֹשָׁה
  chosen: one hundred twenty-three
  alternatives:
  - a hundred and twenty-three
  - one hundred and twenty-three
  lexicon: HALOT
  rationale: The Hebrew cardinal sequence gives the total number 123. 'One hundred
    twenty-three' is clear modern English and fits the list format. The conjunction
    before 'three' is represented idiomatically within the English number rather than
    woodenly reproduced.
