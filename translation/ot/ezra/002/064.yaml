id: EZR.2.64
reference: Ezra 2:64
source:
  edition: WLC
  text: כָּל הַ/קָּהָ֖ל כְּ/אֶחָ֑ד אַרְבַּ֣ע רִבּ֔וֹא אַלְפַּ֖יִם שְׁלֹשׁ מֵא֥וֹת
    שִׁשִּֽׁים־־׃
translation:
  text: The whole assembly together was forty-two thousand three hundred sixty,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'as one.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: The whole
  alternatives:
  - all
  lexicon: HALOT
  rationale: כָּל with the definite noun expresses totality. 'The whole' is natural
    English before 'assembly' and preserves the comprehensive sense.
- source_word: הַקָּהָל
  chosen: assembly
  alternatives:
  - congregation
  - community
  lexicon: HALOT
  rationale: קָהָל denotes the gathered community. 'Assembly' is a clear, modern rendering
    that fits a counted body of returnees without importing later ecclesiastical overtones
    that 'congregation' may carry.
- source_word: כְּאֶחָד
  chosen: together
  alternatives:
  - as one
  - as a single unit
  lexicon: HALOT
  rationale: The idiom literally means 'as one' and here summarizes the total number
    of the group collectively. 'Together' gives the idiomatic force in readable English;
    'as one' is preserved as an alternative.
- source_word: אַרְבַּע רִבּוֹא
  chosen: forty thousand
  lexicon: HALOT
  rationale: 'The Hebrew numeric construction is straightforward: four ten-thousands
    = forty thousand.'
- source_word: אַלְפַּיִם
  chosen: two thousand
  lexicon: HALOT
  rationale: Standard cardinal number.
- source_word: שְׁלֹשׁ מֵאוֹת
  chosen: three hundred
  lexicon: HALOT
  rationale: Standard cardinal number.
- source_word: שִׁשִּׁים
  chosen: sixty
  lexicon: HALOT
  rationale: Standard cardinal number completing the total 42,360.
