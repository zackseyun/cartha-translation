id: EZR.2.16
reference: Ezra 2:16
source:
  edition: WLC
  text: בְּנֵֽי אָטֵ֥ר לִֽ/יחִזְקִיָּ֖ה תִּשְׁעִ֥ים וּ/שְׁמֹנָֽה־׃ס
translation:
  text: the sons of Ater, of Hezekiah, ninety-eight.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: Construct plural of בֵּן in genealogical/census context commonly denotes
    a family line or clan membership. 'The sons of' preserves the formal structure
    and matches the register of returnee lists, while alternatives are possible more
    dynamically.
- source_word: אָטֵר
  chosen: Ater
  rationale: Proper personal/family name; transliterated according to the translation
    philosophy to transliterate names rather than translate them.
- source_word: לִיחִזְקִיָּה
  chosen: of Hezekiah
  alternatives:
  - belonging to Hezekiah
  - for Hezekiah
  lexicon: HALOT
  rationale: 'The prefixed ל here marks affiliation/subclassification within the family
    list: ''Ater, of Hezekiah,'' distinguishing this branch from another Ater line.
    ''Of Hezekiah'' is the most natural concise English rendering in this census formula.'
- source_word: תִּשְׁעִים וּשְׁמֹנָה
  chosen: ninety-eight
  lexicon: HALOT
  rationale: Cardinal number phrase rendered idiomatically in standard English as
    'ninety-eight.'
