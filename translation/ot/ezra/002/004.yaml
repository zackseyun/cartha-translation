id: EZR.2.4
reference: Ezra 2:4
source:
  edition: WLC
  text: בְּנֵ֣י שְׁפַטְיָ֔ה שְׁלֹ֥שׁ מֵא֖וֹת שִׁבְעִ֥ים וּ/שְׁנָֽיִם׃ס
translation:
  text: the sons of Shephatiah, three hundred seventy-two.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: Construct plural of בֵּן in a genealogical/list context commonly denotes
    a family line or clan membership. 'The sons of' preserves the formal structure
    of the register while remaining natural in English; broader alternatives are possible
    but less textually direct.
- source_word: שְׁפַטְיָה
  chosen: Shephatiah
  alternatives:
  - Shephatya
  lexicon: HALOT
  rationale: Personal names are transliterated by standard conventions per translation
    philosophy. 'Shephatiah' is the conventional English transliteration of the Hebrew
    proper name.
- source_word: שְׁלֹשׁ מֵאוֹת שִׁבְעִים וּשְׁנָיִם
  chosen: three hundred seventy-two
  alternatives:
  - three hundred and seventy-two
  lexicon: HALOT
  rationale: The Hebrew cardinal number sequence is rendered in standard contemporary
    English style. 'Three hundred seventy-two' is clear, accurate, and readable modern
    English; the variant with 'and' is stylistic rather than semantic.
