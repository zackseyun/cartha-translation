id: EZR.2.65
reference: Ezra 2:65
source:
  edition: WLC
  text: מִ֠/לְּ/בַד עַבְדֵי/הֶ֤ם וְ/אַמְהֹֽתֵי/הֶם֙ אֵ֔לֶּה שִׁבְעַ֣ת אֲלָפִ֔ים שְׁלֹ֥שׁ
    מֵא֖וֹת שְׁלֹשִׁ֣ים וְ/שִׁבְעָ֑ה וְ/לָ/הֶ֛ם מְשֹׁרְרִ֥ים וּֽ/מְשֹׁרְר֖וֹת מָאתָֽיִם׃
translation:
  text: besides their male and female slaves, these were 7,337; and they had 200 male
    and female singers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servants' / 'maidservants.' The Hebrew terms can denote household servants
      more broadly, but in this census context 'slaves' best reflects their dependent
      status.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִלְּבַד
  chosen: besides
  alternatives:
  - apart from
  - excluding
  lexicon: HALOT
  rationale: Introduces an exception/addition to the preceding total. 'Besides' is
    concise and natural in English for a census note.
- source_word: עַבְדֵיהֶם
  chosen: their male slaves
  alternatives:
  - their servants
  - their male servants
  lexicon: HALOT
  rationale: The noun עבד commonly denotes a slave/servant depending on context. In
    a property/census listing paired with female slaves, the bonded status is foregrounded,
    so 'slaves' best reflects the social reality. 'Male' is supplied to match the
    explicit female counterpart and preserve gender accuracy.
- source_word: אַמְהֹתֵיהֶם
  chosen: female slaves
  alternatives:
  - maidservants
  - female servants
  lexicon: HALOT
  rationale: אָמָה refers to a female slave/maidservant. In parallel with עבד and
    in a census of dependents, 'female slaves' is the clearest modern rendering.
- source_word: אֵלֶּה
  chosen: these were
  alternatives:
  - these
  - these amounted to
  lexicon: HALOT
  rationale: 'In this numerical statement, English idiom prefers an explicit copular
    sense: ''these were 7,337.'''
- source_word: שִׁבְעַת אֲלָפִים שְׁלֹשׁ מֵאוֹת שְׁלֹשִׁים וְשִׁבְעָה
  chosen: 7,337
  alternatives:
  - seven thousand three hundred thirty-seven
  lexicon: HALOT
  rationale: Rendered as digits for readability in a census context while preserving
    the exact number.
- source_word: וְלָהֶם
  chosen: and they had
  alternatives:
  - and there were for them
  - and with them were
  lexicon: HALOT
  rationale: Possessive/existential construction rendered idiomatically in English
    as 'they had.'
- source_word: מְשֹׁרְרִים וּמְשֹׁרְרוֹת
  chosen: male and female singers
  alternatives:
  - singers, both men and women
  - singing men and singing women
  lexicon: HALOT
  rationale: The paired masculine and feminine participles explicitly distinguish
    gender. 'Male and female singers' preserves that distinction in natural English.
- source_word: מָאתָיִם
  chosen: '200'
  alternatives:
  - two hundred
  lexicon: HALOT
  rationale: Digits improve readability in a list of census figures.
