id: EZR.2.13
reference: Ezra 2:13
source:
  edition: WLC
  text: בְּנֵי֙ אֲדֹ֣נִיקָ֔ם שֵׁ֥שׁ מֵא֖וֹת שִׁשִּׁ֥ים וְ/שִׁשָּֽׁה׃ס
translation:
  text: the sons of Adonikam, six hundred sixty-six.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: Construct plural of בֵּן in a genealogical/list context commonly denotes
    a family line or clan membership. 'The sons of' is the most direct and conventional
    rendering in these returnee lists, preserving the formal structure of the Hebrew
    while remaining natural in English.
- source_word: אֲדֹנִיקָם
  chosen: Adonikam
  rationale: Personal name; per translation philosophy, names are transliterated rather
    than translated.
- source_word: שֵׁשׁ מֵאוֹת שִׁשִּׁים וְשִׁשָּׁה
  chosen: six hundred sixty-six
  alternatives:
  - six hundred and sixty-six
  lexicon: HALOT
  rationale: 'The Hebrew cardinal number sequence is straightforward: ''six, hundreds,
    sixty, and six.'' Rendered in standard modern English as ''six hundred sixty-six'';
    the alternative with ''and'' is stylistic rather than semantic. Spelling out the
    number suits the literary register of Bible translation.'
