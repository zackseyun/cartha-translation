lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: Construct plural of בֵּן in genealogical/list context commonly denotes
    a family line or clan membership. 'The sons of' preserves the formal structure
    of the returnee list while remaining natural English. Alternatives such as 'descendants
    of' are interpretive expansions and less formally aligned.
- source_word: עַזְגָּד
  chosen: Azgad
  lexicon: HALOT
  rationale: Proper personal/family name; per translation philosophy, names are transliterated
    rather than translated.
- source_word: אֶלֶף מָאתַיִם עֶשְׂרִים וּשְׁנָיִם
  chosen: 1,222
  alternatives:
  - one thousand two hundred twenty-two
  - a thousand two hundred and twenty-two
  lexicon: HALOT
  rationale: The Hebrew cardinal sequence totals 1,222. Numerals are rendered with
    Arabic digits for readability in a census-style list. Spelled-out alternatives
    are possible, but digits better suit the genre and modern English presentation.
