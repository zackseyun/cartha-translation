id: EZR.2.35
reference: Ezra 2:35
source:
  edition: WLC
  text: בְּנֵ֣י סְנָאָ֔ה שְׁלֹ֣שֶׁת אֲלָפִ֔ים וְ/שֵׁ֥שׁ מֵא֖וֹת וּ/שְׁלֹשִֽׁים׃ס
translation:
  text: the sons of Senaah, three thousand six hundred and thirty.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the men of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'sons' and in genealogical/census contexts
    commonly denotes a clan or descendant group. 'The sons of' preserves the formal
    census style of Ezra 2 while remaining natural English.
- source_word: סְנָאָה
  chosen: Senaah
  alternatives:
  - Senaa
  lexicon: HALOT
  rationale: This is a proper name and, per translation philosophy, names are transliterated
    rather than translated. 'Senaah' follows the Hebrew form represented in the Masoretic
    Text.
- source_word: שְׁלֹשֶׁת אֲלָפִים
  chosen: three thousand
  lexicon: HALOT
  rationale: The cardinal number plus 'thousands' is rendered straightforwardly as
    'three thousand.'
- source_word: וְשֵׁשׁ מֵאוֹת
  chosen: six hundred
  lexicon: HALOT
  rationale: The conjunction plus numeral and 'hundreds' is idiomatically rendered
    'six hundred.'
- source_word: וּשְׁלֹשִׁים
  chosen: and thirty
  lexicon: HALOT
  rationale: The final coordinated numeral completes the total. Retaining 'and thirty'
    reflects the additive Hebrew number construction and standard English number style
    in formal biblical lists.
