id: EZR.2.60
reference: Ezra 2:60
source:
  edition: WLC
  text: בְּנֵי דְלָיָ֥ה בְנֵי טוֹבִיָּ֖ה בְּנֵ֣י נְקוֹדָ֑א שֵׁ֥שׁ מֵא֖וֹת חֲמִשִּׁ֥ים
    וּ/שְׁנָֽיִם־־׃ס
translation:
  text: 'the sons of Delaiah, the sons of Tobiah, the sons of Nekoda: six hundred
    fifty-two.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: In this genealogical/list context, בְּנֵי is the standard construct expression
    for a family line or clan grouping. 'The sons of' preserves the formal structure
    of the Hebrew and matches the register of census/genealogical lists better than
    the broader 'descendants of' or 'children of.'
- source_word: דְלָיָה
  chosen: Delaiah
  rationale: 'Personal name transliterated according to the translation philosophy:
    names are transliterated rather than translated.'
- source_word: טוֹבִיָּה
  chosen: Tobiah
  alternatives:
  - Tobijah
  rationale: Personal name transliterated by standard English convention. 'Tobiah'
    is the familiar and natural English form.
- source_word: נְקוֹדָא
  chosen: Nekoda
  alternatives:
  - Nekodah
  rationale: Personal name transliterated. 'Nekoda' closely reflects the consonantal
    form and is a standard English representation.
- source_word: שֵׁשׁ מֵאוֹת חֲמִשִּׁים וּשְׁנָיִם
  chosen: six hundred fifty-two
  alternatives:
  - six hundred and fifty-two
  lexicon: HALOT
  rationale: The Hebrew cardinal number is rendered in clear modern English. 'Six
    hundred fifty-two' is stylistically natural and accurate; the alternative with
    'and' is acceptable but less streamlined for this translation's modern English
    aim.
