id: EZR.2.3
reference: Ezra 2:3
source:
  edition: WLC
  text: בְּנֵ֣י פַרְעֹ֔שׁ אַלְפַּ֕יִם מֵאָ֖ה שִׁבְעִ֥ים וּ/שְׁנָֽיִם׃ס
translation:
  text: the sons of Parosh, 2,172.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the descendants of Parosh.' The Hebrew literally says 'the sons of Parosh,'
      a standard clan designation in this register.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: In this census/genealogical context, בְּנֵי literally means 'sons of'
    and functions as a clan designation. 'The sons of' preserves the formal structure
    of the list better than the broader 'descendants of,' though that broader sense
    is implicit.
- source_word: פַרְעֹשׁ
  chosen: Parosh
  lexicon: HALOT
  rationale: Proper personal/family name; transliterated according to the translation
    philosophy to transliterate names rather than translate them.
- source_word: אַלְפַּיִם מֵאָה שִׁבְעִים וּשְׁנָיִם
  chosen: 2,172
  alternatives:
  - two thousand one hundred seventy-two
  - two thousand one hundred and seventy-two
  lexicon: HALOT
  rationale: The Hebrew cardinal sequence totals 2,172. Numerals are rendered as digits
    for readability in a census list, while preserving the exact quantity.
