id: EZR.2.26
reference: Ezra 2:26
source:
  edition: WLC
  text: בְּנֵ֤י הָ/רָמָה֙ וָ/גָ֔בַע שֵׁ֥שׁ מֵא֖וֹת עֶשְׂרִ֥ים וְ/אֶחָֽד׃ס
translation:
  text: the sons of Ramah and Geba, six hundred twenty-one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'the descendants of Ramah and Geba.' The Hebrew idiom 'sons
      of' in this census list can denote a broader family or community group rather
      than immediate sons.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the men of
  lexicon: HALOT
  rationale: In Ezra 2 this term introduces clan or locality-based returnee groups.
    'The sons of' preserves the formal genealogical/list structure of the Hebrew while
    allowing that the referent is a broader descendant group, not only immediate male
    children.
- source_word: הָרָמָה
  chosen: Ramah
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated in keeping with
    the translation philosophy for names.
- source_word: וָגָבַע
  chosen: and Geba
  alternatives:
  - and Gaba
  lexicon: HALOT
  rationale: Proper place name joined by waw. 'Geba' is the standard English transliteration
    of the Hebrew place name.
- source_word: שֵׁשׁ מֵאוֹת עֶשְׂרִים וְאֶחָד
  chosen: six hundred twenty-one
  alternatives:
  - six hundred and twenty-one
  lexicon: HALOT
  rationale: Cardinal number giving the census total. Rendered in contemporary readable
    English without the British-style 'and.'
