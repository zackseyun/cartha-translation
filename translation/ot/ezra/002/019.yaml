id: EZR.2.19
reference: Ezra 2:19
source:
  edition: WLC
  text: בְּנֵ֣י חָשֻׁ֔ם מָאתַ֖יִם עֶשְׂרִ֥ים וּ/שְׁלֹשָֽׁה׃ס
translation:
  text: the sons of Hashum, two hundred twenty-three.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: In Ezra's returnee list, בְּנֵי introduces a family/clan grouping traced
    through a male ancestor. 'The sons of' is the standard and sufficiently transparent
    rendering, preserving the genealogical/list structure more formally than broader
    options like 'descendants of.'
- source_word: חָשֻׁם
  chosen: Hashum
  rationale: Personal names are transliterated by standard conventions per project
    philosophy. 'Hashum' is the conventional English transliteration of the Hebrew
    proper name.
- source_word: מָאתַיִם עֶשְׂרִים וּשְׁלֹשָׁה
  chosen: two hundred twenty-three
  alternatives:
  - '223'
  - two hundred and twenty-three
  lexicon: HALOT
  rationale: The Hebrew cardinal number sequence literally gives 'two hundred, twenty,
    and three.' Rendering it as 'two hundred twenty-three' communicates the total
    naturally in modern English while remaining fully faithful to the source. The
    spelling without 'and' fits readable modern English.
