id: EZR.2.7
reference: Ezra 2:7
source:
  edition: WLC
  text: בְּנֵ֣י עֵילָ֔ם אֶ֕לֶף מָאתַ֖יִם חֲמִשִּׁ֥ים וְ/אַרְבָּעָֽה׃ס
translation:
  text: the sons of Elam, 1,254.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: Construct plural of בֵּן introducing a family/clan grouping in the census
    list. 'The sons of' is the most direct and conventional rendering, preserving
    the genealogical/list structure better than the broader 'descendants of' or 'children
    of.'
- source_word: עֵילָם
  chosen: Elam
  lexicon: HALOT
  rationale: 'Proper name transliterated according to the translation philosophy:
    personal/clan names are transliterated rather than translated.'
- source_word: אֶלֶף מָאתַיִם חֲמִשִּׁים וְאַרְבָּעָה
  chosen: 1,254
  alternatives:
  - one thousand two hundred fifty-four
  - a thousand two hundred and fifty-four
  lexicon: HALOT
  rationale: The Hebrew cardinal sequence totals 1,254. Numerals are rendered as digits
    for readability in a census register; this preserves the plain quantitative sense
    without adding interpretation.
