theological_decisions:
- issue: Rendering of the technical term הַנְּתִינִים
  chosen_reading: the temple servants
  alternative_readings:
  - the Nethinim
  rationale: This is not a major doctrinally contested term, but it is a specialized
    postexilic designation. The translation favors meaning over transliteration in
    keeping with optimal equivalence, while preserving the traditional transliteration
    in a footnote for readers familiar with the term.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not archaic or academic.'
