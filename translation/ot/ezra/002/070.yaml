id: EZR.2.70
reference: Ezra 2:70
source:
  edition: WLC
  text: וַ/יֵּשְׁב֣וּ הַ/כֹּהֲנִ֣ים וְ֠/הַ/לְוִיִּם וּֽ/מִן הָ/עָ֞ם וְ/הַ/מְשֹׁרְרִ֧ים
    וְ/הַ/שּׁוֹעֲרִ֛ים וְ/הַ/נְּתִינִ֖ים בְּ/עָרֵי/הֶ֑ם וְ/כָל יִשְׂרָאֵ֖ל בְּ/עָרֵי/הֶֽם־־׃ס
translation:
  text: So the priests, the Levites, some of the people, the singers, the gatekeepers,
    and the temple servants lived in their cities, and all Israel lived in their cities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the Nethinim,'' a technical term for a class assigned to temple
      service.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשְׁבוּ
  chosen: lived
  alternatives:
  - settled
  - dwelt
  lexicon: HALOT
  rationale: The verb ישׁב in this narrative context refers to taking up residence/settling
    in a place. 'Lived' is natural modern English and fits the repeated clause structure;
    'settled' is possible, but 'lived' better matches the simple stative/resultative
    sense here.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of כהנים in postexilic cultic context.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of לוים as the Levitical group distinct from priests.
- source_word: וּמִן הָעָם
  chosen: some of the people
  alternatives:
  - and some of the people
  - and from the people
  lexicon: HALOT
  rationale: The preposition מן before 'the people' is partitive here, distinguishing
    a subset of the laity from the named temple personnel. 'Some of the people' expresses
    the Hebrew idiom more clearly than the overly literal 'from the people.'
- source_word: הַמְשֹׁרְרִים
  chosen: the singers
  alternatives:
  - the musicians
  lexicon: HALOT
  rationale: The participial/nominal form denotes those assigned to singing in temple
    service. 'Singers' is the most direct and conventional rendering.
- source_word: הַשּׁוֹעֲרִים
  chosen: the gatekeepers
  alternatives:
  - the doorkeepers
  lexicon: HALOT
  rationale: Refers to those guarding/attending the gates, especially in temple service.
    'Gatekeepers' is the clearest modern equivalent.
- source_word: הַנְּתִינִים
  chosen: the temple servants
  alternatives:
  - the Nethinim
  - the given ones
  lexicon: HALOT
  rationale: נתינים is a technical term for a class attached to temple service. Translating
    it as 'temple servants' communicates function to modern readers better than transliteration
    alone, while preserving the cultic setting.
- source_word: בְּעָרֵיהֶם
  chosen: in their cities
  alternatives:
  - in their towns
  lexicon: HALOT
  rationale: עיר can be rendered 'city' or 'town'; 'cities' is retained for consistency
    with common biblical geographic usage and because the phrase is formulaic here.
- source_word: וְכָל יִשְׂרָאֵל
  chosen: and all Israel
  alternatives:
  - and the whole of Israel
  lexicon: HALOT
  rationale: A conventional collective expression referring to the returned covenant
    community as Israel. 'All Israel' preserves the biblical idiom.
- source_word: בְּעָרֵיהֶם
  chosen: lived in their cities
  alternatives:
  - was in their cities
  lexicon: HALOT
  rationale: The second occurrence depends on the initial verb and is best made explicit
    in English for readability. Repeating 'lived' preserves the Hebrew sense and avoids
    an awkward ellipsis.
