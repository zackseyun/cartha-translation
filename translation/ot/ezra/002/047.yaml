id: EZR.2.47
reference: Ezra 2:47
source:
  edition: WLC
  text: בְּנֵי גִדֵּ֥ל בְּנֵי גַ֖חַר בְּנֵ֥י רְאָיָֽה־־׃
translation:
  text: the sons of Giddel, the sons of Gahar, the sons of Reaiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "Raiah."
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: Construct plural of בֵּן in a genealogical/list context. 'The sons of'
    is the standard, formally accurate rendering in returnee/genealogical registers,
    while also naturally conveying a clan or family line in English.
- source_word: גִדֵּל
  chosen: Giddel
  lexicon: HALOT
  rationale: Proper name; transliterated rather than translated in keeping with the
    translation philosophy for personal names.
- source_word: גַחַר
  chosen: Gahar
  lexicon: HALOT
  rationale: Proper name; transliterated by standard English convention.
- source_word: רְאָיָה
  chosen: Reaiah
  alternatives:
  - Raiah
  lexicon: HALOT
  rationale: Proper name; transliterated. 'Reaiah' reflects a common English representation
    of the Hebrew form, while 'Raiah' is a possible simplified transliteration worth
    preserving as a lexical alternative.
