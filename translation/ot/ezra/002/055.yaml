id: EZR.2.55
reference: Ezra 2:55
source:
  edition: WLC
  text: בְּנֵ֖י עַבְדֵ֣י שְׁלֹמֹ֑ה בְּנֵי סֹטַ֥י בְּנֵי הַ/סֹּפֶ֖רֶת בְּנֵ֥י פְרוּדָֽא־־׃
translation:
  text: 'the sons of Solomon’s servants: the sons of Sotai, the sons of Hassophereth,
    the sons of Peruda.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Ezra reads Peruda; the parallel list in Nehemiah 7:57 has Perida.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the members of
  lexicon: HALOT
  rationale: In this genealogical/list context, בְּנֵי is the standard construct expression
    for a family line or clan grouping. 'The sons of' preserves the formal structure
    of the Hebrew and matches the repeated cadence of the list, while readers can
    understand it corporately rather than as only immediate male children.
- source_word: עַבְדֵי
  chosen: servants
  alternatives:
  - slaves
  lexicon: HALOT
  rationale: Although עֶבֶד can mean 'slave' or 'servant,' here the phrase is a fixed
    designation, 'Solomon’s servants,' for a known class within the returnee lists.
    Because the verse is an administrative/genealogical label rather than a context
    emphasizing bonded status, 'servants' is the better optimal-equivalence rendering
    while preserving the traditional category name.
- source_word: שְׁלֹמֹה
  chosen: Solomon
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names rather than translate them.
- source_word: סֹטַי
  chosen: Sotai
  alternatives:
  - Sotay
  lexicon: HALOT
  rationale: Proper name transliterated directly from the Hebrew. 'Sotai' is a standard
    English-form transliteration and preserves the name without attempting to derive
    meaning.
- source_word: הַסֹּפֶרֶת
  chosen: Hassophereth
  alternatives:
  - Has-sophereth
  - Sophereth
  lexicon: HALOT
  rationale: The Hebrew form includes the article הַ attached to the proper name/form.
    In this list of names, it is best represented in transliteration rather than translated
    as a common noun. 'Hassophereth' reflects the consonantal form with the assimilated
    article and preserves the traditional identification as a family name.
- source_word: פְרוּדָא
  chosen: Peruda
  alternatives:
  - Perida
  lexicon: HALOT
  rationale: The MT here reads Peruda. Since the source text given is Ezra, the main
    text should follow the Hebrew reading. An alternative spelling/readings tradition
    is worth preserving in a footnote because the parallel in Nehemiah differs.
