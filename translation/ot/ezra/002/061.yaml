id: EZR.2.61
reference: Ezra 2:61
source:
  edition: WLC
  text: וּ/מִ/בְּנֵי֙ הַ/כֹּ֣הֲנִ֔ים בְּנֵ֥י חֳבַיָּ֖ה בְּנֵ֣י הַקּ֑וֹץ בְּנֵ֣י בַרְזִלַּ֗י
    אֲשֶׁ֣ר לָ֠קַח מִ/בְּנ֞וֹת בַּרְזִלַּ֤י הַ/גִּלְעָדִי֙ אִשָּׁ֔ה וַ/יִּקָּרֵ֖א
    עַל שְׁמָֽ/ם־׃
translation:
  text: 'And from among the sons of the priests: the sons of Hobaiah, the sons of
    Hakkoz, the sons of Barzillai, who had taken a wife from the daughters of Barzillai
    the Gileadite and was called by their name.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “and took their name.” The Hebrew literally says
      “and was called by their name.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִבְּנֵי הַכֹּהֲנִים
  chosen: And from among the sons of the priests
  alternatives:
  - And from the sons of the priests
  - And among the priestly descendants
  lexicon: HALOT
  rationale: The prefixed conjunction plus מן gives a partitive sense, 'and from among.'
    בְּנֵי is rendered 'sons' rather than a more interpretive 'descendants' to preserve
    the genealogical register and gender-accurate wording of the Hebrew, while still
    naturally indicating lineage in context.
- source_word: בְּנֵי חֳבַיָּה ... בְּנֵי הַקּוֹץ ... בְּנֵי בַרְזִלַּי
  chosen: the sons of Hobaiah, the sons of Hakkoz, the sons of Barzillai
  alternatives:
  - the descendants of Hobaiah ...
  - the family of Hobaiah ...
  lexicon: HALOT
  rationale: The repeated construct בְּנֵי is kept as 'the sons of' for formal transparency
    in this list structure. The names are transliterated according to standard English
    conventions, in keeping with the philosophy of transliterating personal names.
- source_word: אֲשֶׁר לָקַח
  chosen: who had taken
  alternatives:
  - who took
  lexicon: HALOT
  rationale: The relative clause refers back to Barzillai. The qatal verb is rendered
    with English past perfect ('had taken') to show the prior action relative to the
    naming that follows, improving readability without changing sense.
- source_word: מִבְּנוֹת ... אִשָּׁה
  chosen: a wife from the daughters of
  alternatives:
  - a woman from among the daughters of
  - one of the daughters of ... as wife
  lexicon: HALOT
  rationale: The idiom לקח ... אשה means 'take a wife' or 'marry.' Retaining 'taken
    a wife' preserves the Hebrew idiom while remaining understandable. 'From the daughters
    of' reflects the partitive מן plus plural 'daughters,' indicating one of the women
    from that family.
- source_word: בַּרְזִלַּי הַגִּלְעָדִי
  chosen: Barzillai the Gileadite
  alternatives:
  - Barzillai of Gilead
  lexicon: HALOT
  rationale: The gentilic adjective is best rendered 'the Gileadite,' a standard and
    concise English equivalent.
- source_word: וַיִּקָּרֵא עַל שְׁמָם
  chosen: and was called by their name
  alternatives:
  - and was named after them
  - and took their name
  lexicon: HALOT
  rationale: The Niphal of קרא with על־שם means to be called by someone's name. 'Was
    called by their name' stays close to the Hebrew. The plural suffix 'their' naturally
    refers to the family of Barzillai through the daughters; this preserves the wording
    without over-interpreting the exact social mechanism.
