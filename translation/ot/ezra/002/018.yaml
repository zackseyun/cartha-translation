id: EZR.2.18
reference: Ezra 2:18
source:
  edition: WLC
  text: בְּנֵ֣י יוֹרָ֔ה מֵאָ֖ה וּ/שְׁנֵ֥ים עָשָֽׂר׃ס
translation:
  text: the sons of Jorah, one hundred and twelve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: Jorah; Neh 7:24 has the variant form Jora.'
    reason: cross_reference
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: Construct plural of בֵּן in genealogical/census context commonly denotes
    a family line or clan membership. 'The sons of' preserves the formal census style
    of Ezra 2 while remaining natural in English.
- source_word: יוֹרָה
  chosen: Jorah
  alternatives:
  - Jora
  rationale: Personal name transliterated per translation philosophy. 'Jorah' follows
    the Hebrew form here; 'Jora' reflects the parallel spelling in Nehemiah 7:24 and
    is worth preserving as a cross-reference/alternative form, but the main text should
    reflect the form in Ezra.
- source_word: מֵאָה וּשְׁנֵים עָשָׂר
  chosen: one hundred and twelve
  alternatives:
  - a hundred and twelve
  lexicon: HALOT
  rationale: Cardinal number phrase rendered in standard modern English. 'One hundred
    and twelve' is slightly more formal and suits the register of a census list.
