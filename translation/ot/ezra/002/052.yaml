id: EZR.2.52
reference: Ezra 2:52
source:
  edition: WLC
  text: בְּנֵי בַצְל֥וּת בְּנֵי מְחִידָ֖א בְּנֵ֥י חַרְשָֽׁא־־׃
translation:
  text: the sons of Bazluth, the sons of Mehida, the sons of Harsha—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descendants of' for each occurrence of 'sons of'; the Hebrew list formula
      בְּנֵי often denotes a family or clan line, not only immediate sons.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: In this returnee list, בְּנֵי is the standard genealogical/list formula
    meaning members of a family line or clan. 'The sons of' preserves the formal structure
    and matches the Hebrew construct, while readers can understand it corporately
    rather than as only immediate male offspring.
- source_word: בַצְל֥וּת
  chosen: Bazluth
  alternatives:
  - Bazlut
  rationale: Proper name transliterated rather than translated, following the project's
    policy to transliterate names. 'Bazluth' reflects a conventional English representation
    of the Hebrew consonants and final taw.
- source_word: מְחִידָ֖א
  chosen: Mehida
  alternatives:
  - Mechida
  rationale: Proper name transliterated. 'Mehida' is a standard readable English form
    preserving the Hebrew name without attempting to translate uncertain meaning.
- source_word: חַרְשָֽׁא
  chosen: Harsha
  alternatives:
  - Harshaʾ
  rationale: Proper name transliterated. The final aleph is not normally represented
    in standard English Bible spelling, so 'Harsha' is the most natural form.
