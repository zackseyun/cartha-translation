id: EZR.2.68
reference: Ezra 2:68
source:
  edition: WLC
  text: וּ/מֵ/רָאשֵׁי֙ הָֽ/אָב֔וֹת בְּ/בוֹאָ֕/ם לְ/בֵ֥ית יְהוָ֖ה אֲשֶׁ֣ר בִּ/ירוּשָׁלִָ֑ם הִֽתְנַדְּבוּ֙ לְ/בֵ֣ית הָֽ/אֱלֹהִ֔ים לְ/הַעֲמִיד֖/וֹ עַל מְכוֹנֽ/וֹ־׃
translation:
  text: And some of the heads of the fathers’ houses, when they came to the house of Yahweh that is in Jerusalem, gave freewill offerings for the house of God, to set it up on its foundation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'family heads.' The Hebrew literally refers to 'the heads of the fathers’ houses,' an Israelite clan-based social unit.
    reason: lexical_alternative
  - marker: b
    text: Or, 'offered willingly.' The verb emphasizes voluntary giving.
    reason: lexical_alternative
  - marker: c
    text: Or, 'to establish it in its place' or 'on its site.' The Hebrew may refer either to the temple’s foundation or to its fixed location.
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/מֵ/רָאשֵׁי הָאָבוֹת
  chosen: And some of the heads of the fathers’ houses
  alternatives:
  - And from the heads of the fathers
  - And some of the family heads
  lexicon: HALOT
  rationale: The partitive מן after the conjunction indicates 'some of' rather than all. רָאשֵׁי הָאָבוֹת in Ezra commonly refers to clan/family leaders. 'Fathers’ houses' preserves the Hebrew social structure more closely than the smoother 'families,' while still being intelligible.
- source_word: בְּבוֹאָם
  chosen: when they came
  alternatives:
  - at their coming
  - upon their arrival
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct with suffix is temporal here. 'When they came' is natural English and accurately conveys the temporal sense.
- source_word: לְבֵית יְהוָה
  chosen: to the house of the LORD
  alternatives:
  - to the temple of the LORD
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' Although it refers to the temple, 'house of the LORD' preserves the source wording and its covenantal resonance. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name, preserving the traditional reverential substitution.
- source_word: אֲשֶׁר בִּירוּשָׁלָם
  chosen: that is in Jerusalem
  alternatives:
  - which was in Jerusalem
  lexicon: HALOT
  rationale: The relative clause identifies the location of the house of the LORD. Present tense 'is' fits the narrative reference to the site in Jerusalem and reads naturally in English.
- source_word: הִתְנַדְּבוּ
  chosen: gave freewill offerings
  alternatives:
  - offered willingly
  - volunteered gifts
  lexicon: HALOT
  rationale: The Hitpael of נדב conveys voluntary, willing contribution. 'Gave freewill offerings' makes explicit the donation sense in context and matches the following לְבֵית הָאֱלֹהִים.
- source_word: לְבֵית הָאֱלֹהִים
  chosen: for the house of God
  alternatives:
  - for the temple of God
  - for God's house
  lexicon: HALOT
  rationale: The preposition ל marks the object/purpose of the voluntary giving. 'House of God' preserves the lexical parallel with 'house of the LORD' while avoiding unnecessary variation.
- source_word: לְהַעֲמִידוֹ
  chosen: to set it up
  alternatives:
  - to establish it
  - to erect it
  - to restore it
  lexicon: HALOT
  rationale: The Hiphil of עמד means to cause to stand, establish, or set up. In the temple-rebuilding context, 'set it up' is concrete and natural, without over-specifying restoration versus initial construction.
- source_word: עַל מְכוֹנוֹ
  chosen: on its foundation
  alternatives:
  - in its place
  - on its site
  - on its fixed place
  lexicon: HALOT
  rationale: מָכוֹן can denote a fixed place or foundation/base. In this rebuilding context, 'on its foundation' best captures the physical and locative sense, likely meaning reestablishing the temple on its proper base/site.
