id: EZR.2.51
reference: Ezra 2:51
source:
  edition: WLC
  text: בְּנֵי בַקְבּ֥וּק בְּנֵי חֲקוּפָ֖א בְּנֵ֥י חַרְחֽוּר־־׃
translation:
  text: the sons of Bakbuk, the sons of Hakupha, the sons of Harhur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descendants of' for each occurrence of 'sons of'; the Hebrew genealogical
      formula can denote a family line or clan, not only immediate sons.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: Construct plural of בֵּן in a genealogical/list context. 'The sons of'
    is the standard, formally accurate rendering for these returnee/family-group lists
    in Ezra, while alternatives such as 'descendants of' are possible but less literal.
    The phrase likely denotes clan members rather than only immediate male offspring,
    but the Hebrew expression itself is best preserved.
- source_word: בַקְבּוּק
  chosen: Bakbuk
  lexicon: HALOT
  rationale: Proper name; per translation philosophy, personal names are transliterated
    rather than translated.
- source_word: חֲקוּפָא
  chosen: Hakupha
  alternatives:
  - Haqupha
  lexicon: HALOT
  rationale: Proper name; transliterated into standard English form. 'Hakupha' reflects
    a conventional English representation of the Hebrew consonants and vowels; 'Haqupha'
    is a possible more strictly consonantal alternative.
- source_word: חַרְחוּר
  chosen: Harhur
  lexicon: HALOT
  rationale: Proper name; transliterated directly into English in keeping with the
    treatment of personal/family names.
