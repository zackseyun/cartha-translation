id: EZR.2.41
reference: Ezra 2:41
source:
  edition: WLC
  text: הַֽ/מְשֹׁרְרִ֑ים בְּנֵ֣י אָסָ֔ף מֵאָ֖ה עֶשְׂרִ֥ים וּ/שְׁמֹנָֽה׃פ
translation:
  text: 'The singers: the sons of Asaph, one hundred twenty-eight.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: הַמְשֹׁרְרִים
  chosen: the singers
  alternatives:
  - the musicians
  - the temple singers
  lexicon: HALOT
  rationale: The participial form from שׁיר denotes those who sing. In this census/list
    context, 'the singers' is the most direct and natural rendering. 'Musicians' is
    too broad, and 'temple singers' adds contextual specificity not explicit in the
    Hebrew of this verse alone.
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the members of
  lexicon: HALOT
  rationale: In genealogical and clan-list contexts, בְּנֵי commonly introduces a
    family or guild line. 'The sons of' preserves the formal structure of the Hebrew
    while remaining idiomatic in English. Broader renderings like 'descendants of'
    are possible but less textually exact here.
- source_word: אָסָף
  chosen: Asaph
  rationale: Personal names are transliterated by standard convention per translation
    philosophy. Asaph is the established English form of the Hebrew proper name.
- source_word: מֵאָה עֶשְׂרִים וּשְׁמֹנָה
  chosen: one hundred twenty-eight
  alternatives:
  - a hundred and twenty-eight
  lexicon: HALOT
  rationale: 'The Hebrew cardinal sequence is straightforward: 100 + 20 + 8. ''One
    hundred twenty-eight'' is clear modern English and fits the project''s readability
    goals better than the more traditional ''a hundred and twenty-eight''.'
