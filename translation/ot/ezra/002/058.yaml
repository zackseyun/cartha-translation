id: EZR.2.58
reference: Ezra 2:58
source:
  edition: WLC
  text: כָּ֨ל הַ/נְּתִינִ֔ים וּ/בְנֵ֖י עַבְדֵ֣י שְׁלֹמֹ֑ה שְׁלֹ֥שׁ מֵא֖וֹת תִּשְׁעִ֥ים
    וּ/שְׁנָֽיִם־׃ס
translation:
  text: All the temple servants and the sons of Solomon’s servants were three hundred
    ninety-two.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew נְתִינִים (Nethinim), a technical term for a class assigned to temple
      service.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - The total of
  lexicon: HALOT
  rationale: The noun quantifier introduces the full combined total of the two following
    groups. 'All' is the most direct and natural rendering in English.
- source_word: הַנְּתִינִים
  chosen: the temple servants
  alternatives:
  - the Nethinim
  - the given ones
  lexicon: HALOT
  rationale: נְתִינִים is a technical postexilic term for a class attached to temple
    service. 'Temple servants' communicates the function clearly in modern English,
    while 'Nethinim' is a transliteration that obscures meaning for most readers.
    'Given ones' is too literal and unnatural.
- source_word: וּבְנֵי
  chosen: and the sons of
  alternatives:
  - and the descendants of
  - and the children of
  lexicon: HALOT
  rationale: בְּנֵי literally means 'sons of.' Here it introduces a recognized group
    designation. 'Sons of' preserves the Hebrew form and is gender-accurate to the
    source, while also naturally encompassing a lineage/group label in English.
- source_word: עַבְדֵי
  chosen: servants of
  alternatives:
  - slaves of
  lexicon: HALOT
  rationale: עֶבֶד can mean either 'servant' or 'slave' depending on context. In this
    genealogical/administrative list, the text identifies a traditional class known
    as 'Solomon's servants'; the bonded nuance is not foregrounded, so 'servants'
    is the better contextual rendering.
- source_word: שְׁלֹמֹה
  chosen: Solomon’s
  alternatives:
  - Shelomoh’s
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name is 'Solomon.' The
    construct chain requires the possessive form in English.
- source_word: שְׁלֹשׁ מֵאוֹת תִּשְׁעִים וּשְׁנָיִם
  chosen: three hundred ninety-two
  alternatives:
  - three hundred and ninety-two
  lexicon: HALOT
  rationale: This is the straightforward cardinal number. The form without 'and' is
    standard concise modern English and suits the translation's readability goals.
