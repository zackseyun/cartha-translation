id: EZR.2.29
reference: Ezra 2:29
source:
  edition: WLC
  text: בְּנֵ֥י נְב֖וֹ חֲמִשִּׁ֥ים וּ/שְׁנָֽיִם׃ס
translation:
  text: the sons of Nebo, fifty-two.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the men of
  lexicon: HALOT
  rationale: In Ezra's returnee list, בְּנֵי regularly introduces a clan or place-associated
    group. 'The sons of' preserves the formal structure of the Hebrew while remaining
    understandable in English. Alternatives like 'descendants of' or 'men of' are
    possible in context but are less formally aligned with the repeated list formula.
- source_word: נְבוֹ
  chosen: Nebo
  lexicon: HALOT
  rationale: This is a proper name and is therefore transliterated rather than translated,
    in keeping with the project's policy to transliterate names. It likely refers
    to the place/clan name Nebo in this census list.
- source_word: חֲמִשִּׁים וּשְׁנָיִם
  chosen: fifty-two
  alternatives:
  - fifty and two
  lexicon: HALOT
  rationale: The Hebrew cardinal number is straightforwardly rendered in contemporary
    English as 'fifty-two.' The more literal 'fifty and two' is possible but less
    natural in modern English and not required to preserve meaning.
