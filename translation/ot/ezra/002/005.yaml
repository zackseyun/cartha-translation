id: EZR.2.5
reference: Ezra 2:5
source:
  edition: WLC
  text: בְּנֵ֣י אָרַ֔ח שְׁבַ֥ע מֵא֖וֹת חֲמִשָּׁ֥ה וְ/שִׁבְעִֽים׃ס
translation:
  text: the sons of Arah, seven hundred seventy-five.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: In this census/list context, בְּנֵי introduces a family/clan grouping
    traced to a named ancestor. 'The sons of' is the standard, formally transparent
    rendering, while readers can understand it corporately rather than as only immediate
    male offspring.
- source_word: אָרַח
  chosen: Arah
  rationale: Personal/family name transliterated rather than translated, following
    the translation philosophy for names.
- source_word: שְׁבַע מֵאוֹת חֲמִשָּׁה וְשִׁבְעִים
  chosen: seven hundred seventy-five
  alternatives:
  - '775'
  - seven hundred and seventy-five
  lexicon: HALOT
  rationale: The Hebrew number is composed straightforwardly as 700 + 5 + 70 = 775.
    The wording is rendered in readable modern English without the British-style 'and';
    numerals were avoided to preserve literary consistency with the surrounding list
    style.
