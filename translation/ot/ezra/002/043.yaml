id: EZR.2.43
reference: Ezra 2:43
source:
  edition: WLC
  text: הַ/נְּתִינִ֑ים בְּנֵי צִיחָ֥א בְנֵי חֲשׂוּפָ֖א בְּנֵ֥י טַבָּעֽוֹת־־׃
translation:
  text: 'The temple servants: the sons of Ziha, the sons of Hasupha, the sons of Tabbaoth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the Nethinim''; traditionally transliterated rather than translated.
      The term refers to a class of temple servants attached to sanctuary service.'
    reason: lexical_alternative
  - marker: b
    text: Or 'descendants of' for each repeated 'sons of'; the Hebrew genealogical
      formula can denote a family line, not only immediate sons.
    reason: lexical_alternative
  - marker: c
    text: Hasupha is also spelled 'Hashupha' in some English traditions.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנְּתִינִים
  chosen: the temple servants
  alternatives:
  - the Nethinim
  - the given ones
  - the servants
  lexicon: HALOT
  rationale: Though traditionally transliterated 'Nethinim,' the term derives from
    נתן ('to give') and refers to a recognized class attached to temple service in
    the postexilic community. 'Temple servants' communicates the function in clear
    modern English while avoiding opaque transliteration. The article is preserved
    with 'the.'
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the family of
  lexicon: HALOT
  rationale: In genealogical/list contexts, בְּנֵי literally means 'sons of' but can
    denote a clan or family line. Here 'the sons of' preserves the formal structure
    of the register and matches the repeated pattern of the verse.
- source_word: צִיחָא
  chosen: Ziha
  alternatives:
  - Zihah
  rationale: Proper name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names rather than translate them.
- source_word: חֲשׂוּפָא
  chosen: Hasupha
  alternatives:
  - Hashupha
  rationale: Proper name transliterated. The initial ח is represented with 'H' in
    standard English transliteration. An alternative spelling with 'Hashupha' reflects
    a different handling of the consonant cluster and vocalization tradition.
- source_word: טַבָּעוֹת
  chosen: Tabbaoth
  alternatives:
  - Tabaoth
  rationale: Proper name transliterated rather than translated. Although the form
    resembles a common noun elsewhere, in this list it functions as a personal or
    clan name, so transliteration is appropriate.
