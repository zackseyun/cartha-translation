id: EZR.2.46
reference: Ezra 2:46
source:
  edition: WLC
  text: בְּנֵי חָגָ֥ב בְּנֵי שמלי בְּנֵ֥י חָנָֽן־־׃
translation:
  text: the sons of Hagab, the sons of Shamlai, the sons of Hanan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Shamlai: alternatively rendered ''Shalmai'' in some translations and related
      name traditions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: In Ezra's returnee/genealogical list, בְּנֵי is the standard construct
    expression for a family line or clan grouping. 'The sons of' preserves the formal
    genealogical style of the Hebrew while remaining natural in English. Alternatives
    like 'descendants of' are possible interpretively, but the list formula is best
    retained.
- source_word: חָגָב
  chosen: Hagab
  lexicon: HALOT
  rationale: Proper personal or clan name; transliterated rather than translated in
    keeping with the translation philosophy for names.
- source_word: שמלי
  chosen: Shamlai
  alternatives:
  - Shalmai
  lexicon: HALOT
  rationale: This is a proper name and is transliterated. Given the consonantal form
    here, 'Shamlai' closely reflects the Hebrew spelling in this verse. 'Shalmai'
    is a known alternative representation and appears in some English traditions,
    so it is preserved in a footnote as a lexical alternative.
- source_word: חָנָן
  chosen: Hanan
  lexicon: HALOT
  rationale: Proper personal or clan name; transliterated directly from the Hebrew.
