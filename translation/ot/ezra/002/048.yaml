id: EZR.2.48
reference: Ezra 2:48
source:
  edition: WLC
  text: בְּנֵי רְצִ֥ין בְּנֵי נְקוֹדָ֖א בְּנֵ֥י גַזָּֽם־־׃
translation:
  text: the sons of Rezin, the sons of Nekoda, the sons of Gazzam;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descendants of' for each repeated phrase 'the sons of,' since the expression
      can denote a family line or clan rather than only immediate male children.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: Construct plural of בֵּן in this genealogical/list context most naturally
    means 'sons of,' a standard formula for clan or family-group membership in returnee
    lists. 'Descendants of' is possible as an interpretive smoothing, but 'sons of'
    better preserves the Hebrew form while remaining understandable in English.
- source_word: רְצִין
  chosen: Rezin
  lexicon: HALOT
  rationale: Proper name; transliterated rather than translated in keeping with the
    translation philosophy for personal names.
- source_word: נְקוֹדָא
  chosen: Nekoda
  alternatives:
  - Nekodah
  lexicon: HALOT
  rationale: Proper name; transliterated. 'Nekoda' closely reflects the consonantal
    form here. 'Nekodah' appears in some English traditions influenced by alternate
    vocalization/transliteration conventions, but the Hebrew form here is adequately
    represented by 'Nekoda.'
- source_word: גַזָּם
  chosen: Gazzam
  alternatives:
  - Gazam
  lexicon: HALOT
  rationale: Proper name; transliterated. The doubled z reflects the dagesh in the
    Hebrew spelling and preserves the phonetic shape more closely than the simplified
    'Gazam.'
