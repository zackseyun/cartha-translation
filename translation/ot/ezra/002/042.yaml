id: EZR.2.42
reference: Ezra 2:42
source:
  edition: WLC
  text: בְּנֵ֣י הַ/שֹּֽׁעֲרִ֗ים בְּנֵי שַׁלּ֤וּם בְּנֵֽי אָטֵר֙ בְּנֵי טַלְמ֣וֹן בְּנֵי
    עַקּ֔וּב בְּנֵ֥י חֲטִיטָ֖א בְּנֵ֣י שֹׁבָ֑י הַ/כֹּ֕ל מֵאָ֖ה שְׁלֹשִׁ֥ים וְ/תִשְׁעָֽה־־־־׃פ
translation:
  text: 'The sons of the gatekeepers: the sons of Shallum, the sons of Ater, the sons
    of Talmon, the sons of Akkub, the sons of Hatita, the sons of Shobai, all together
    one hundred thirty-nine.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the members of
  lexicon: HALOT
  rationale: In this genealogical/register context, בְּנֵי introduces clan/group affiliation
    by ancestry. 'The sons of' preserves the formal structure and conventional register-list
    style better than the more interpretive 'descendants of' or 'members of,' while
    still being understandable in English.
- source_word: הַשֹּׁעֲרִים
  chosen: the gatekeepers
  alternatives:
  - the doorkeepers
  - the porters
  lexicon: HALOT
  rationale: The term denotes those assigned to guard or attend the gates, especially
    in temple service. 'Gatekeepers' is the clearest modern equivalent and avoids
    the archaic 'porters.'
- source_word: שַׁלּוּם
  chosen: Shallum
  rationale: Personal name transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: אָטֵר
  chosen: Ater
  rationale: Personal name transliterated by standard English convention.
- source_word: טַלְמוֹן
  chosen: Talmon
  rationale: Personal name transliterated by standard English convention.
- source_word: עַקּוּב
  chosen: Akkub
  alternatives:
  - Aqqub
  rationale: Personal name transliterated. 'Akkub' follows common English convention;
    'Aqqub' is a possible more phonetic alternative but less familiar.
- source_word: חֲטִיטָא
  chosen: Hatita
  alternatives:
  - Hatitah
  rationale: Personal name transliterated. 'Hatita' is a straightforward rendering
    of the consonantal form; some English traditions add a final 'h,' but the simpler
    form better reflects standard transliteration practice here.
- source_word: שֹׁבָי
  chosen: Shobai
  alternatives:
  - Shobi
  rationale: Personal name transliterated. 'Shobai' reflects the likely vocalization
    represented in the Masoretic pointing.
- source_word: הַכֹּל
  chosen: all together
  alternatives:
  - the whole
  - all of them
  lexicon: HALOT
  rationale: In a census total, the phrase sums the preceding groups. 'All together'
    is idiomatic modern English and clearly signals a total.
- source_word: מֵאָה שְׁלֹשִׁים וְתִשְׁעָה
  chosen: one hundred thirty-nine
  alternatives:
  - a hundred and thirty-nine
  rationale: The cardinal number is rendered in standard modern English style without
    'and,' matching the translation's readability goals.
