id: EZR.2.6
reference: Ezra 2:6
source:
  edition: WLC
  text: בְּנֵֽי פַחַ֥ת מוֹאָ֛ב לִ/בְנֵ֥י יֵשׁ֖וּעַ יוֹאָ֑ב אַלְפַּ֕יִם שְׁמֹנֶ֥ה מֵא֖וֹת
    וּ/שְׁנֵ֥ים עָשָֽׂר־׃ס
translation:
  text: the sons of Pahath-moab, of the sons of Jeshua and Joab, 2,812.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: In Ezra's returnee lists, בְּנֵי commonly introduces a family/clan grouping.
    'The sons of' preserves the formal genealogical idiom while remaining natural
    in English; broader alternatives like 'descendants of' are possible but less literal.
- source_word: פַחַת מוֹאָב
  chosen: Pahath-moab
  alternatives:
  - Pahath Moab
  lexicon: HALOT
  rationale: This is a proper name and should be transliterated rather than translated.
    The hyphen reflects the conventional English representation of the compound name.
- source_word: לִבְנֵי
  chosen: of the sons of
  alternatives:
  - belonging to the sons of
  - namely the sons of
  lexicon: HALOT
  rationale: The prefixed ל here links the clan designation more specifically to a
    sub-branch or associated line. 'Of the sons of' is concise and idiomatic in English
    for this genealogical construction.
- source_word: יֵשׁוּעַ
  chosen: Jeshua
  alternatives:
  - Joshua
  lexicon: HALOT
  rationale: As a postexilic personal name, יֵשׁוּעַ is conventionally transliterated
    'Jeshua' in Ezra-Nehemiah. 'Joshua' reflects the same underlying name but is less
    suitable here because the narrative context uses the shorter form as a distinct
    conventional English name.
- source_word: יוֹאָב
  chosen: Joab
  lexicon: HALOT
  rationale: Standard transliteration of the personal name.
- source_word: אַלְפַּיִם שְׁמֹנֶה מֵאוֹת וּשְׁנֵים עָשָׂר
  chosen: 2,812
  alternatives:
  - two thousand eight hundred and twelve
  lexicon: HALOT
  rationale: The Hebrew cardinal number is straightforward. Numerals improve readability
    in a census/list context without loss of meaning; the spelled-out alternative
    is equally possible.
