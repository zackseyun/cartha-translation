id: EZR.2.31
reference: Ezra 2:31
source:
  edition: WLC
  text: בְּנֵי֙ עֵילָ֣ם אַחֵ֔ר אֶ֕לֶף מָאתַ֖יִם חֲמִשִּׁ֥ים וְ/אַרְבָּעָֽה׃ס
translation:
  text: the sons of another Elam, 1,254.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the sons of Elam, another [group]," distinguishing this clan from the
      earlier Elam listed in the chapter.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: Construct plural of בֵּן in a genealogical/census list commonly denotes
    a family line or clan membership. 'The sons of' preserves the formal structure
    and matches the register of the returnee list.
- source_word: עֵילָם
  chosen: Elam
  lexicon: HALOT
  rationale: Proper name transliterated per translation philosophy. In this context
    it is the family/place name Elam in the returnee list.
- source_word: אַחֵר
  chosen: another
  alternatives:
  - other
  - the other
  lexicon: HALOT
  rationale: אַחֵר distinguishes this Elam group from the earlier Elam entry in the
    chapter. 'Another' is the most natural English rendering in this enumerative context.
- source_word: אֶלֶף מָאתַיִם חֲמִשִּׁים וְאַרְבָּעָה
  chosen: 1,254
  alternatives:
  - one thousand two hundred fifty-four
  lexicon: HALOT
  rationale: The Hebrew cardinal sequence totals 1,254. Numerals are rendered in digits
    for readability in a census-style list while preserving exact quantity.
