id: EZR.2.8
reference: Ezra 2:8
source:
  edition: WLC
  text: בְּנֵ֣י זַתּ֔וּא תְּשַׁ֥ע מֵא֖וֹת וְ/אַרְבָּעִ֥ים וַ/חֲמִשָּֽׁה׃ס
translation:
  text: the sons of Zattu, nine hundred forty-five.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: In Ezra's returnee lists, בְּנֵי regularly introduces a family or clan
    grouping. 'The sons of' is the most direct formal rendering and preserves the
    genealogical/list structure, while English readers can still understand it corporately.
- source_word: זַתּוּא
  chosen: Zattu
  alternatives:
  - Zatthu
  lexicon: HALOT
  rationale: Personal names are transliterated by standard conventions per project
    philosophy. 'Zattu' is the conventional English transliteration of the Hebrew
    proper name.
- source_word: תְּשַׁע מֵאוֹת וְאַרְבָּעִים וַחֲמִשָּׁה
  chosen: nine hundred forty-five
  alternatives:
  - nine hundred and forty-five
  lexicon: HALOT
  rationale: The Hebrew cardinal sequence literally gives 900 + 40 + 5. Rendering
    it as 'nine hundred forty-five' communicates the total naturally in modern English
    while remaining fully faithful to the source numeration.
