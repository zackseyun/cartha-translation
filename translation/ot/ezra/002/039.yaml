id: EZR.2.39
reference: Ezra 2:39
source:
  edition: WLC
  text: בְּנֵ֣י חָרִ֔ם אֶ֖לֶף וְ/שִׁבְעָ֥ה עָשָֽׂר׃ס
translation:
  text: the sons of Harim, 1,017.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the descendants of Harim." The Hebrew expression "sons of" often denotes
      a wider family line or clan, not only immediate sons.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: In Ezra's census-style list, בְּנֵי introduces a family/clan grouping.
    'The sons of' is the standard, formally transparent rendering, while readers can
    understand it corporately rather than as only immediate male offspring.
- source_word: חָרִם
  chosen: Harim
  lexicon: HALOT
  rationale: Proper personal/family name; per translation philosophy, names are transliterated
    rather than translated.
- source_word: אֶלֶף וְשִׁבְעָה עָשָׂר
  chosen: 1,017
  alternatives:
  - one thousand and seventeen
  lexicon: HALOT
  rationale: 'The Hebrew cardinal number is straightforward: ''one thousand and seventeen.''
    Numerals are rendered with digits for readability in a census list, without loss
    of meaning.'
