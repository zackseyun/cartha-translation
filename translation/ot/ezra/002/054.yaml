id: EZR.2.54
reference: Ezra 2:54
source:
  edition: WLC
  text: בְּנֵ֥י נְצִ֖יחַ בְּנֵ֥י חֲטִיפָֽא׃
translation:
  text: the sons of Neziah, the sons of Hatipha.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - descendants of
  - members of the clan of
  lexicon: HALOT
  rationale: In Ezra's returnee list, בְּנֵי regularly introduces family or guild
    groupings. 'The sons of' preserves the formal structure of the Hebrew while remaining
    idiomatic in English; broader alternatives like 'descendants of' are possible
    but less consistent with the list format.
- source_word: נְצִיחַ
  chosen: Neziah
  alternatives:
  - Netsiah
  lexicon: HALOT
  rationale: This is a proper name, so it is transliterated rather than translated,
    following the project's policy for personal names. 'Neziah' reflects a standard
    English convention for this Hebrew form.
- source_word: חֲטִיפָא
  chosen: Hatipha
  alternatives:
  - Hatifa
  lexicon: HALOT
  rationale: This is likewise a proper name and is best transliterated. 'Hatipha'
    preserves the conventional English representation of the final aleph and the medial
    consonants without attempting to force a meaning that is not contextually relevant
    in this genealogical list.
