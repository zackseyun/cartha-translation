id: EZR.2.40
reference: Ezra 2:40
source:
  edition: WLC
  text: הַ/לְוִיִּ֑ם בְּנֵי יֵשׁ֧וּעַ וְ/קַדְמִיאֵ֛ל לִ/בְנֵ֥י הוֹדַוְיָ֖ה שִׁבְעִ֥ים
    וְ/אַרְבָּעָֽה־׃ס
translation:
  text: 'The Levites: the sons of Jeshua and Kadmiel, of the sons of Hodaviah, seventy-four.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew reads 'Hodaviah'; the parallel in Nehemiah 7:43 has 'Hodevah.'
    reason: textual_variant
lexical_decisions:
- source_word: הַלְוִיִּם
  chosen: The Levites
  alternatives:
  - As for the Levites
  lexicon: HALOT
  rationale: Definite article + ethnicon/group designation introduces the next census
    category. 'The Levites' is natural English and preserves the categorical heading
    function.
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  lexicon: HALOT
  rationale: In genealogical/census contexts, בְּנֵי commonly marks clan or family
    membership. 'The sons of' is the more formal and transparent rendering; 'descendants
    of' is possible but less literal.
- source_word: יֵשׁוּעַ
  chosen: Jeshua
  alternatives:
  - Joshua
  lexicon: HALOT
  rationale: This is a postexilic personal name regularly transliterated 'Jeshua'
    in Ezra. Transliteration follows the project's policy for personal names.
- source_word: וְקַדְמִיאֵל
  chosen: and Kadmiel
  lexicon: HALOT
  rationale: Simple conjunction plus personal name; transliterated as a name rather
    than translated.
- source_word: לִבְנֵי
  chosen: of the sons of
  alternatives:
  - belonging to the sons of
  - for the sons of
  lexicon: HALOT
  rationale: The prefixed ל here is best taken in a genealogical/classificatory sense
    linking Jeshua and Kadmiel to the clan designation that follows. 'Of the sons
    of' gives smooth English while preserving the relationship.
- source_word: הוֹדַוְיָה
  chosen: Hodaviah
  alternatives:
  - Hodevah
  lexicon: HALOT
  rationale: The MT form here is Hodaviah. A variant form appears in the parallel
    list (Neh 7:43), but this verse should reflect the Ezra reading in the main text.
- source_word: שִׁבְעִים וְאַרְבָּעָה
  chosen: seventy-four
  alternatives:
  - seventy and four
  lexicon: HALOT
  rationale: Modern English expresses the cardinal number idiomatically as 'seventy-four.'
