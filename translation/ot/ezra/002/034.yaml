id: EZR.2.34
reference: Ezra 2:34
source:
  edition: WLC
  text: בְּנֵ֣י יְרֵח֔וֹ שְׁלֹ֥שׁ מֵא֖וֹת אַרְבָּעִ֥ים וַ/חֲמִשָּֽׁה׃ס
translation:
  text: 'The sons of Jericho: three hundred forty-five.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  - The men of
  lexicon: HALOT
  rationale: In Ezra's census-style list, בְּנֵי literally means 'sons of' and commonly
    functions for members/descendants of a family or place-group. 'The sons of' preserves
    the formal structure of the register without over-paraphrasing.
- source_word: יְרֵחוֹ
  chosen: Jericho
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard English convention as required
    by the translation philosophy.
- source_word: שְׁלֹשׁ מֵאוֹת אַרְבָּעִים וַחֲמִשָּׁה
  chosen: three hundred forty-five
  alternatives:
  - '345'
  - three hundred and forty-five
  lexicon: HALOT
  rationale: The Hebrew cardinal sequence straightforwardly totals 345. Spelling out
    the number fits readable modern English while remaining close to the source. 'Forty-five'
    is idiomatic English for the final compound.
