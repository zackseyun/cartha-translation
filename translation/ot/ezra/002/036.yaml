id: EZR.2.36
reference: Ezra 2:36
source:
  edition: WLC
  text: הַֽ/כֹּהֲנִ֑ים בְּנֵ֤י יְדַֽעְיָה֙ לְ/בֵ֣ית יֵשׁ֔וּעַ תְּשַׁ֥ע מֵא֖וֹת שִׁבְעִ֥ים
    וּ/שְׁלֹשָֽׁה׃ס
translation:
  text: 'The priests: the sons of Jedaiah, of the house of Jeshua, 973.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the descendants of Jedaiah.' The Hebrew literally says 'the sons of
      Jedaiah,' a standard genealogical expression.
    reason: lexical_alternative
  - marker: b
    text: Jeshua is the postexilic personal name also related to the name Joshua.
    reason: cultural_note
lexical_decisions:
- source_word: הַכֹּהֲנִים
  chosen: The priests
  alternatives:
  - The priestly families
  lexicon: HALOT
  rationale: Definite plural noun meaning 'the priests.' In this census context it
    introduces the priestly group being enumerated. 'Priestly families' is interpretive
    and less direct than the Hebrew.
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  lexicon: HALOT
  rationale: Literally 'sons of.' In genealogical/register contexts this can denote
    descendants or members of a family line, but 'sons of' preserves the Hebrew form
    and the register style.
- source_word: יְדַעְיָה
  chosen: Jedaiah
  rationale: Personal name, transliterated according to standard English convention,
    in keeping with the philosophy to transliterate names.
- source_word: לְבֵית
  chosen: of the house of
  alternatives:
  - belonging to the house of
  - for the house of
  lexicon: HALOT
  rationale: The preposition ל with 'house' here marks affiliation within a family/household
    line. 'Of the house of' is natural English and preserves the genealogical sense.
- source_word: יֵשׁוּעַ
  chosen: Jeshua
  alternatives:
  - Joshua
  rationale: Personal name, transliterated as 'Jeshua,' the conventional English form
    for this postexilic name in Ezra. 'Joshua' reflects a related form but is less
    precise to the spelling here.
- source_word: תְּשַׁע מֵאוֹת שִׁבְעִים וּשְׁלֹשָׁה
  chosen: '973'
  alternatives:
  - nine hundred seventy-three
  lexicon: HALOT
  rationale: The Hebrew cardinal number sequence totals 973. Numerals are rendered
    in digits for readability in a census list; this does not alter meaning.
