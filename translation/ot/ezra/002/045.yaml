id: EZR.2.45
reference: Ezra 2:45
source:
  edition: WLC
  text: בְּנֵי לְבָנָ֥ה בְנֵי חֲגָבָ֖ה בְּנֵ֥י עַקּֽוּב־־׃
translation:
  text: the sons of Lebanah, the sons of Hagabah, the sons of Akkub.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of' may denote a family line or clan group, not only immediate
      male children.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - descendants of
  - members of the family of
  lexicon: HALOT
  rationale: In this genealogical/list context, בְּנֵי literally means 'sons of,'
    but functions as a clan/family designation. 'The sons of' preserves the Hebrew
    form and the repetitive structure of the register better than a more interpretive
    rendering such as 'descendants of.'
- source_word: לְבָנָה
  chosen: Lebanah
  alternatives:
  - Lebana
  lexicon: HALOT
  rationale: Proper name; per translation philosophy, personal/family names are transliterated
    rather than translated. 'Lebanah' closely reflects the Hebrew vocalization.
- source_word: חֲגָבָה
  chosen: Hagabah
  alternatives:
  - Hagaba
  lexicon: HALOT
  rationale: Proper name; transliterated according to the Hebrew form. The final he
    is represented with 'h' to reflect the Masoretic spelling.
- source_word: עַקּוּב
  chosen: Akkub
  alternatives:
  - Akkuv
  lexicon: HALOT
  rationale: Proper name; transliterated in a conventional English form that reflects
    the doubled qoph/k sound and long u vowel. 'Akkub' is the standard rendering in
    English Bible tradition and fits the Hebrew spelling well.
