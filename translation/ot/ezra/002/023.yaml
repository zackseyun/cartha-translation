lexical_decisions:
- source_word: אַנְשֵׁי
  chosen: the men of
  alternatives:
  - the people of
  - the sons of
  lexicon: HALOT
  rationale: Construct plural of אִישׁ used in census/genealogical lists for male
    members of a place or family group. 'The men of' is the most direct and gender-accurate
    rendering in this register; 'people of' would flatten the masculine form, and
    'sons of' is not the wording here.
- source_word: עֲנָתוֹת
  chosen: Anathoth
  lexicon: HALOT
  rationale: Proper place name; per translation philosophy, names are transliterated
    rather than translated.
- source_word: מֵאָה עֶשְׂרִים וּשְׁמֹנָה
  chosen: one hundred twenty-eight
  alternatives:
  - a hundred and twenty-eight
  - '128'
  lexicon: HALOT
  rationale: Cardinal number phrase. Spelled out in readable modern English. 'One
    hundred twenty-eight' is concise and natural; numeral form is avoided in the running
    translation.
