  text: אַנְשֵׁ֣י עֲנָת֔וֹת מֵאָ֖ה עֶשְׂרִ֥ים וּ/שְׁמֹנָֽה׃ס
translation:
  text: the men of Anathoth, one hundred twenty-eight.
