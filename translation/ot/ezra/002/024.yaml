id: EZR.2.24
reference: Ezra 2:24
source:
  edition: WLC
  text: בְּנֵ֥י עַזְמָ֖וֶת אַרְבָּעִ֥ים וּ/שְׁנָֽיִם׃ס
translation:
  text: 'The sons of Azmaveth: forty-two.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descendants of Azmaveth.' The Hebrew expression 'sons of' can denote
      a broader family line or clan, not only immediate male children.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  - The men of
  lexicon: HALOT
  rationale: Construct plural of בֵּן in genealogical/census contexts commonly denotes
    members of a family line or clan. 'The sons of' is the most direct and conventional
    rendering here, preserving the formal structure of the returnees list.
- source_word: עַזְמָוֶת
  chosen: Azmaveth
  lexicon: HALOT
  rationale: Proper name/place name is transliterated rather than translated, following
    the project's policy to transliterate names by standard conventions. In this list
    it likely identifies the ancestral house or locality associated with the group.
- source_word: אַרְבָּעִים וּשְׁנָיִם
  chosen: forty-two
  alternatives:
  - forty and two
  lexicon: HALOT
  rationale: The Hebrew cardinal number is straightforwardly rendered in contemporary
    English as 'forty-two.' The more literal 'forty and two' is unnecessarily archaic
    and conflicts with the project's readable modern English aim.
