id: EZR.2.56
reference: Ezra 2:56
source:
  edition: WLC
  text: בְּנֵי יַעְלָ֥ה בְנֵי דַרְק֖וֹן בְּנֵ֥י גִדֵּֽל־־׃
translation:
  text: the sons of Jaalah, the sons of Darkon, the sons of Giddel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: Construct plural of בֵּן in this genealogical/list context is most naturally
    rendered 'sons of.' In returnee and temple-servant lists, the phrase functions
    as a clan/family designation, but 'sons of' preserves the Hebrew form while remaining
    natural in English.
- source_word: יַעְלָה
  chosen: Jaalah
  alternatives:
  - Jaalah
  lexicon: HALOT
  rationale: Proper name transliterated rather than translated, following the project's
    policy for personal names. 'Jaalah' is a standard English transliteration reflecting
    the Hebrew consonants and vowels.
- source_word: דַרְקוֹן
  chosen: Darkon
  lexicon: HALOT
  rationale: Proper name transliterated directly. No translation is appropriate for
    this personal/family name in a list context.
- source_word: גִדֵּל
  chosen: Giddel
  alternatives:
  - Giddel/Giddel as a family name
  lexicon: HALOT
  rationale: Proper name transliterated directly. The repeated 'sons of' indicates
    a family or clan designation descended from or associated with this named ancestor.
