id: EZR.2.57
reference: Ezra 2:57
source:
  edition: WLC
  text: בְּנֵ֧י שְׁפַטְיָ֣ה בְנֵֽי חַטִּ֗יל בְּנֵ֛י פֹּכֶ֥רֶת הַצְּבָיִ֖ים בְּנֵ֥י
    אָמִֽי־׃
translation:
  text: the sons of Shephatiah, the sons of Hattil, the sons of Pokereth-hazzebaim,
    the sons of Ami.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'Pokereth of Zebaim'; the Hebrew may be read as a compound family
      name or as a name followed by a qualifying element.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: In this genealogical/list context, בְּנֵי introduces family or clan groupings.
    'The sons of' is the conventional and sufficiently transparent rendering, preserving
    the formal structure of the Hebrew list better than the broader 'descendants of'
    or 'children of.'
- source_word: שְׁפַטְיָה
  chosen: Shephatiah
  rationale: Proper personal name; transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: חַטִּיל
  chosen: Hattil
  rationale: Proper personal or clan name; transliterated rather than translated.
- source_word: פֹּכֶרֶת הַצְּבָיִים
  chosen: Pokereth-hazzebaim
  alternatives:
  - Pokereth of Zebaim
  lexicon: HALOT
  rationale: This appears to function as a compound proper name in the list tradition.
    Retaining it as a transliterated name best preserves the source form and avoids
    over-interpreting whether הַצְּבָיִים is an appositional element ('of Zebaim')
    or an inseparable part of the name. The hyphen reflects the close connection of
    the elements in English transliteration.
- source_word: אָמִי
  chosen: Ami
  rationale: Proper personal or clan name; transliterated rather than translated.
