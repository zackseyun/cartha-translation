id: EZR.2.11
reference: Ezra 2:11
source:
  edition: WLC
  text: בְּנֵ֣י בֵבָ֔י שֵׁ֥שׁ מֵא֖וֹת עֶשְׂרִ֥ים וּ/שְׁלֹשָֽׁה׃ס
translation:
  text: the sons of Bebai, six hundred twenty-three.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: Construct plural of בֵּן in a genealogical/list context commonly denotes
    a family line or clan. 'The sons of' is the most direct and conventional rendering
    in Ezra's returnee list, preserving the source form while allowing representative
    descent.
- source_word: בֵבָי
  chosen: Bebai
  rationale: Proper personal/family name; transliterated according to the translation
    philosophy to preserve the name rather than translate it.
- source_word: שֵׁשׁ מֵאוֹת עֶשְׂרִים וּשְׁלֹשָׁה
  chosen: six hundred twenty-three
  alternatives:
  - six hundred and twenty-three
  lexicon: HALOT
  rationale: 'The Hebrew cardinal sequence is straightforward: 6 + 100s, 20, and 3
    = 623. Rendered in contemporary readable English without ''and,'' consistent with
    modern style, while preserving the exact number.'
