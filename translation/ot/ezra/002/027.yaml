id: EZR.2.27
reference: Ezra 2:27
source:
  edition: WLC
  text: אַנְשֵׁ֣י מִכְמָ֔ס מֵאָ֖ה עֶשְׂרִ֥ים וּ/שְׁנָֽיִם׃ס
translation:
  text: 'The men of Mikmas: one hundred twenty-two.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or Michmas.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי
  chosen: the men of
  alternatives:
  - the people of
  - the sons of
  lexicon: HALOT
  rationale: Construct plural of אִישׁ in this census/list context denotes the male
    members or household representatives associated with the place named next. 'The
    men of' is the standard, gender-accurate rendering for this register genre and
    fits the source better than broader 'people of'.
- source_word: מִכְמָס
  chosen: Mikmas
  alternatives:
  - Michmas
  lexicon: HALOT
  rationale: Proper place name; per translation philosophy, names are transliterated
    rather than translated. 'Mikmas' closely reflects the Hebrew form, while 'Michmas'
    is a familiar traditional English form worth preserving as an alternative.
- source_word: מֵאָה עֶשְׂרִים וּשְׁנָיִם
  chosen: one hundred twenty-two
  alternatives:
  - a hundred and twenty-two
  - one hundred and twenty-two
  lexicon: HALOT
  rationale: 'The Hebrew cardinal sequence is straightforwardly additive: 100 + 20
    + 2. Rendered in readable modern English without unnecessary archaism.'
