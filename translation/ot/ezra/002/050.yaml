id: EZR.2.50
reference: Ezra 2:50
source:
  edition: WLC
  text: בְּנֵי אַסְנָ֥ה בְנֵי מעינים בְּנֵ֥י נפיסים־־׃
translation:
  text: the sons of Asnah, the sons of Meunim, the sons of Nephisim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Meunim may also be rendered 'Maonim' in some English traditions.
    reason: lexical_alternative
  - marker: b
    text: Nephisim may also be rendered 'Nefusim' in some English traditions.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: In Ezra's returnee/genealogical list, בְּנֵי regularly introduces a clan
    or group identified by an ancestor or eponym. 'The sons of' preserves the formal
    structure and matches the list style, while allowing readers to understand it
    corporately rather than as immediate biological sons.
- source_word: אַסְנָה
  chosen: Asnah
  rationale: 'Proper name transliterated according to the translation philosophy:
    personal or clan names are transliterated rather than translated.'
- source_word: מעינים
  chosen: Meunim
  alternatives:
  - Maonim
  lexicon: HALOT
  rationale: This is a proper group name in a genealogical register. The consonantal
    form here is commonly represented in English as 'Meunim.' Because the underlying
    name has some transliteration uncertainty in English tradition, an alternative
    form is preserved in a footnote.
- source_word: נפיסים
  chosen: Nephisim
  alternatives:
  - Nefusim
  lexicon: HALOT
  rationale: Proper group name transliterated. English tradition varies between 'Nephisim'
    and 'Nefusim' due to vocalization/transliteration differences; the main text follows
    a straightforward transliteration of the Masoretic pointing, with the alternative
    preserved in a footnote.
