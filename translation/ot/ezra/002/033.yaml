id: EZR.2.33
reference: Ezra 2:33
source:
  edition: WLC
  text: בְּנֵי לֹד֙ חָדִ֣יד וְ/אוֹנ֔וֹ שְׁבַ֥ע מֵא֖וֹת עֶשְׂרִ֥ים וַ/חֲמִשָּֽׁה־׃ס
translation:
  text: 'The sons of Lod, Hadid, and Ono: seven hundred twenty-five.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The descendants of Lod, Hadid, and Ono.' In this returnee list, 'sons
      of' can denote a broader family or community grouping, not only immediate male
      children.
    reason: lexical_alternative
  - marker: b
    text: Lod is later known as Lydda.
    reason: cross_reference
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  - The men of
  lexicon: HALOT
  rationale: בני in these census/genealogical lists commonly introduces a clan, family
    line, or inhabitants associated with the following place names. 'The sons of'
    preserves the formal structure of the Hebrew while remaining natural in English.
    Alternatives such as 'descendants of' or 'men of' are possible contextual renderings
    but are less literal.
- source_word: לֹד
  chosen: Lod
  alternatives:
  - Lydda
  lexicon: HALOT
  rationale: This is a place name and is therefore transliterated per the translation
    philosophy. 'Lydda' reflects a later Greek/English form, but the Hebrew here is
    Lod.
- source_word: חָדִיד
  chosen: Hadid
  lexicon: HALOT
  rationale: Place name; transliterated directly from the Hebrew.
- source_word: וְאוֹנוֹ
  chosen: and Ono
  lexicon: HALOT
  rationale: Conjunction plus place name. The waw is rendered with the normal English
    coordinator 'and,' and the place name is transliterated.
- source_word: שְׁבַע מֵאוֹת עֶשְׂרִים וַחֲמִשָּׁה
  chosen: seven hundred twenty-five
  alternatives:
  - seven hundred and twenty-five
  lexicon: HALOT
  rationale: The Hebrew cardinal sequence gives the total number 725. The translation
    uses standard modern English number style without 'and' for readability, while
    preserving the exact value.
