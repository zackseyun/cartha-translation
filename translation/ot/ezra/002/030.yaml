id: EZR.2.30
reference: Ezra 2:30
source:
  edition: WLC
  text: בְּנֵ֣י מַגְבִּ֔ישׁ מֵאָ֖ה חֲמִשִּׁ֥ים וְ/שִׁשָּֽׁה׃ס
translation:
  text: the sons of Magbish, one hundred fifty-six.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the men of
  lexicon: HALOT
  rationale: In Ezra's returnee list, בְּנֵי regularly introduces a family or clan
    grouping. 'The sons of' is the most transparent formal rendering, while English
    readers can understand it corporately rather than as strictly immediate male offspring.
- source_word: מַגְבִּישׁ
  chosen: Magbish
  rationale: 'Proper name/place name transliterated per translation philosophy: names
    are transliterated rather than translated. The exact referent is uncertain, but
    the form is best preserved as a name.'
- source_word: מֵאָה חֲמִשִּׁים וְשִׁשָּׁה
  chosen: one hundred fifty-six
  alternatives:
  - a hundred and fifty-six
  - '156'
  lexicon: HALOT
  rationale: The Hebrew cardinal sequence straightforwardly totals 156. Spelling out
    the number fits readable modern English in a formal list while preserving the
    source sense.
