id: EZR.2.22
reference: Ezra 2:22
source:
  edition: WLC
  text: אַנְשֵׁ֥י נְטֹפָ֖ה חֲמִשִּׁ֥ים וְ/שִׁשָּֽׁה׃
translation:
  text: the men of Netophah, fifty-six.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'fifty and six.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי
  chosen: the men of
  alternatives:
  - the people of
  - the sons of
  lexicon: HALOT
  rationale: Construct plural of אִישׁ used in census/genealogical lists for male
    members or household representatives from a locality. 'The men of' is the most
    direct and idiomatic rendering here, preserving the masculine form rather than
    neutralizing it.
- source_word: נְטֹפָה
  chosen: Netophah
  alternatives:
  - Netopha
  lexicon: HALOT
  rationale: Toponym; per translation philosophy, names are transliterated rather
    than translated. 'Netophah' is the standard English transliteration of the place
    name.
- source_word: חֲמִשִּׁים וְשִׁשָּׁה
  chosen: fifty-six
  alternatives:
  - fifty and six
  lexicon: HALOT
  rationale: Cardinal number phrase meaning 56. Hyphenated modern English numeral
    is clearer and more natural than the more literal but archaic 'fifty and six'.
