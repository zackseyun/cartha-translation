id: EZR.2.49
reference: Ezra 2:49
source:
  edition: WLC
  text: בְּנֵי עֻזָּ֥א בְנֵי פָסֵ֖חַ בְּנֵ֥י בֵסָֽי־־׃
translation:
  text: the sons of Uzza, the sons of Paseah, the sons of Besai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of' may denote a broader family line or descendants, not only
      immediate sons.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: Construct plural of בֵּן in a genealogical/list context. In Ezra's returnee
    lists, 'sons of' is the standard concise rendering and can denote a family line
    or clan descended from the named ancestor. 'Descendants of' is possible but less
    formally aligned with the repeated Hebrew structure.
- source_word: עֻזָּא
  chosen: Uzza
  alternatives:
  - Uza
  lexicon: HALOT
  rationale: Proper name transliterated according to standard English convention,
    following the translation philosophy to transliterate personal names rather than
    translate them.
- source_word: פָסֵחַ
  chosen: Paseah
  alternatives:
  - Phaseah
  lexicon: HALOT
  rationale: Proper name transliterated. 'Paseah' reflects common English representation
    of the Hebrew name in Ezra/Nehemiah lists.
- source_word: בֵסָי
  chosen: Besai
  alternatives:
  - Besay
  lexicon: HALOT
  rationale: Proper name transliterated in a conventional English form. The final
    yod can be represented as -i or -y; 'Besai' is the more familiar biblical English
    spelling.
