id: EZR.2.15
reference: Ezra 2:15
source:
  edition: WLC
  text: בְּנֵ֣י עָדִ֔ין אַרְבַּ֥ע מֵא֖וֹת חֲמִשִּׁ֥ים וְ/אַרְבָּעָֽה׃ס
translation:
  text: the sons of Adin, four hundred fifty-four.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: In Ezra's returnee lists, בְּנֵי regularly introduces a family/clan grouping.
    'The sons of' is the most formally accurate rendering and preserves the genealogical/list
    structure, while alternatives like 'descendants of' are possible but less literal.
- source_word: עָדִין
  chosen: Adin
  rationale: Personal name; per translation philosophy, names are transliterated rather
    than translated.
- source_word: אַרְבַּע מֵאוֹת חֲמִשִּׁים וְאַרְבָּעָה
  chosen: four hundred fifty-four
  alternatives:
  - four hundred and fifty-four
  lexicon: HALOT
  rationale: This is the straightforward cardinal number sequence 454. The main text
    uses contemporary English style without 'and' for readability, while preserving
    the exact count.
