id: EZR.2.38
reference: Ezra 2:38
source:
  edition: WLC
  text: בְּנֵ֣י פַשְׁח֔וּר אֶ֕לֶף מָאתַ֖יִם אַרְבָּעִ֥ים וְ/שִׁבְעָֽה׃ס
translation:
  text: the sons of Pashhur, 1,247.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: In Ezra's census-style genealogy, בְּנֵי regularly introduces a family
    or clan line. 'The sons of' is the most transparent and formally accurate rendering,
    while English readers can still understand it corporately rather than as only
    immediate male offspring.
- source_word: פַשְׁחוּר
  chosen: Pashhur
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per project
    philosophy. 'Pashhur' is the established English transliteration of this Hebrew
    name.
- source_word: אֶלֶף מָאתַיִם אַרְבָּעִים וְשִׁבְעָה
  chosen: 1,247
  alternatives:
  - one thousand two hundred forty-seven
  - a thousand two hundred and forty-seven
  lexicon: HALOT
  rationale: The Hebrew cardinal sequence literally gives 'one thousand, two hundred,
    forty and seven.' Rendering as a numeral is natural in an English census/list
    context and preserves the exact count clearly. The conjunction before 'seven'
    is idiomatic in Hebrew number formation and need not be separately represented
    beyond the final English number.
