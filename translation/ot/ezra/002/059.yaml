id: EZR.2.59
reference: Ezra 2:59
source:
  edition: WLC
  text: וְ/אֵ֗לֶּה הָֽ/עֹלִים֙ מִ/תֵּ֥ל מֶ֨לַח֙ תֵּ֣ל חַרְשָׁ֔א כְּר֥וּב אַדָּ֖ן אִמֵּ֑ר
    וְ/לֹ֣א יָֽכְל֗וּ לְ/הַגִּ֤יד בֵּית אֲבוֹתָ/ם֙ וְ/זַרְעָ֔/ם אִ֥ם מִ/יִּשְׂרָאֵ֖ל
    הֵֽם־׃
translation:
  text: And these were the ones who came up from Tel-melah, Tel-harsha, Kerub, Addan,
    and Immer, but they were not able to declare their fathers’ house and their offspring,
    whether they were from Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their ancestral house and their descendants.' The Hebrew expression
      refers to documented paternal lineage.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֹלִים
  chosen: the ones who came up
  alternatives:
  - those who went up
  - the returnees
  lexicon: HALOT
  rationale: עלה in this postexilic census context refers to those ascending/returning
    to the land. 'Came up' preserves the conventional geographic idiom without over-paraphrasing
    to 'returnees' in the main text.
- source_word: מִתֵּל מֶלַח תֵּל חַרְשָׁא כְּרוּב אַדָּן אִמֵּר
  chosen: from Tel-melah, Tel-harsha, Kerub, Addan, and Immer
  alternatives:
  - from Tel Melah, Tel Harsha, Cherub, Addan, and Immer
  lexicon: HALOT
  rationale: These are place or clan names and are therefore transliterated rather
    than translated, following the stated philosophy for names. Hyphenation in Tel-melah
    and Tel-harsha reflects the compound place names.
- source_word: לֹא יָכְלוּ
  chosen: were not able
  alternatives:
  - could not
  lexicon: HALOT
  rationale: This renders the verbal idea straightforwardly and naturally. 'Were not
    able' slightly preserves the formal force of the Hebrew better than the more compressed
    'could not,' though both are viable.
- source_word: לְהַגִּיד
  chosen: to declare
  alternatives:
  - to tell
  - to show
  lexicon: HALOT
  rationale: נגד in this administrative/genealogical setting means to make known or
    state. 'Declare' fits the formal register of a census record and pairs well with
    the following objects.
- source_word: בֵּית אֲבוֹתָם
  chosen: their fathers’ house
  alternatives:
  - their ancestral house
  - their family line
  lexicon: HALOT
  rationale: This is a technical genealogical expression for paternal household/descent
    group. 'Fathers’ house' keeps the source imagery and social structure more precisely
    than the interpretive 'family line.'
- source_word: וְזַרְעָם
  chosen: and their offspring
  alternatives:
  - and their descendants
  - and their seed
  lexicon: HALOT
  rationale: זרע here refers to lineage/descendants. 'Offspring' is natural modern
    English while still preserving the genealogical sense; 'seed' would be overly
    literal and awkward here.
- source_word: אִם מִיִּשְׂרָאֵל הֵם
  chosen: whether they were from Israel
  alternatives:
  - whether they were of Israel
  - whether they belonged to Israel
  lexicon: HALOT
  rationale: The clause expresses uncertainty about Israelite descent. 'From Israel'
    is idiomatic and clear in English while preserving the descent-oriented sense
    of the Hebrew.
