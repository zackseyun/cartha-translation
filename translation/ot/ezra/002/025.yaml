id: EZR.2.25
reference: Ezra 2:25
source:
  edition: WLC
  text: בְּנֵ֨י קִרְיַ֤ת עָרִים֙ כְּפִירָ֣ה וּ/בְאֵר֔וֹת שְׁבַ֥ע מֵא֖וֹת וְ/אַרְבָּעִ֥ים
    וּ/שְׁלֹשָֽׁה׃ס
translation:
  text: 'The sons of Kiriath-arim, Kephirah, and Beeroth: 743.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Chephirah' for כְּפִירָה; the Hebrew points to the same place name,
      and English tradition varies in transliteration.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  - The men of
  lexicon: HALOT
  rationale: In Ezra's returnee lists, בְּנֵי regularly introduces a clan or the inhabitants
    associated with a place. 'The sons of' preserves the formal structure of the Hebrew
    while remaining intelligible in English; alternatives are possible but less formally
    transparent.
- source_word: קִרְיַת עָרִים
  chosen: Kiriath-arim
  alternatives:
  - Kiriath-arim (place name left untranslated)
  lexicon: HALOT
  rationale: This is a proper place name and should be transliterated rather than
    translated, per project philosophy. The form is preserved as a single toponym
    in English.
- source_word: כְּפִירָה
  chosen: Kephirah
  alternatives:
  - Chephirah
  lexicon: HALOT
  rationale: A proper place name; transliteration is preferred. 'Kephirah' reflects
    a straightforward modern transliteration, while 'Chephirah' reflects older English
    convention.
- source_word: וּבְאֵרוֹת
  chosen: and Beeroth
  alternatives:
  - and Be'eroth
  lexicon: HALOT
  rationale: The conjunction is rendered explicitly, and the place name is transliterated.
    'Beeroth' is a standard English form; a more phonetic transliteration could be
    used, but the conventional form is readable and recognizable.
- source_word: שְׁבַע מֵאוֹת וְאַרְבָּעִים וּשְׁלֹשָׁה
  chosen: '743'
  alternatives:
  - seven hundred and forty-three
  lexicon: HALOT
  rationale: The Hebrew cardinal number is rendered as a modern numeral for readability
    in a census-style list. This preserves the quantity exactly without unnecessary
    stiffness.
