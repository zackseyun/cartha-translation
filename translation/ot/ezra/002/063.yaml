theological_decisions:
- issue: Nature of קֹדֶשׁ הַקֳּדָשִׁים in this context
  chosen_reading: It refers to the most holy priestly portions/offerings, not access
    to the inner sanctuary.
  alternative_readings:
  - It refers to the Holy of Holies as a place.
  rationale: The context concerns disputed priestly genealogy and whether certain
    men may partake of priestly holy food. The prohibition is about eating, so the
    phrase must denote edible sacred portions rather than entrance into the sanctuary.
    This avoids importing a spatial meaning the text does not support.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of Urim and Thummim
  chosen_reading: Preserve as transliterated technical terms.
  alternative_readings:
  - Translate interpretively as 'lights and perfections'.
  rationale: The exact referents and function are historically debated, and a literalizing
    translation would suggest more certainty than the text provides. Transliterating
    preserves the cultic specificity and theological ambiguity.
  doctrine_reference: Translation philosophy §3
