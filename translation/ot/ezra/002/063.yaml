id: EZR.2.63
reference: Ezra 2:63
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר הַ/תִּרְשָׁ֨תָא֙ לָ/הֶ֔ם אֲשֶׁ֥ר לֹא יֹאכְל֖וּ מִ/קֹּ֣דֶשׁ הַ/קֳּדָשִׁ֑ים
    עַ֛ד עֲמֹ֥ד כֹּהֵ֖ן לְ/אוּרִ֥ים וּ/לְ/תֻמִּֽים־׃
translation:
  text: And the governor said to them that they should not eat from the most holy
    things until a priest should arise with Urim and Thummim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Tirshatha,' a Persian administrative title.
    reason: lexical_alternative
  - marker: b
    text: That is, the priestly portions of the offerings regarded as especially holy;
      not the inner sanctuary ('the Holy of Holies').
    reason: cultural_note
  - marker: c
    text: Urim and Thummim were sacred means of priestly inquiry; the exact form and
      procedure are uncertain.
    reason: cultural_note
lexical_decisions:
- source_word: הַתִּרְשָׁתָא
  chosen: the governor
  alternatives:
  - the Tirshatha
  - the governor of the province
  lexicon: HALOT
  rationale: The term is a Persian administrative title. Translating it as 'the governor'
    follows the philosophy of translating titles rather than merely transliterating
    them, while preserving the sense for modern readers. 'Tirshatha' is a traditional
    transliteration but is less transparent in English.
- source_word: אֲשֶׁר לֹא יֹאכְלוּ
  chosen: that they should not eat
  alternatives:
  - that they were not to eat
  - that they must not eat
  lexicon: HALOT
  rationale: This construction reports the content of what the governor said. 'Should
    not eat' preserves the indirect-command force without sounding overly stiff or
    overly strong.
- source_word: מִקֹּדֶשׁ הַקֳּדָשִׁים
  chosen: from the most holy things
  alternatives:
  - from the holy of holies
  - from the most holy food
  - from the sacred offerings
  lexicon: HALOT
  rationale: The phrase literally means 'from the holy thing(s) of holy things' and
    in context refers to the priestly portions of especially holy offerings, not the
    inner sanctuary itself. 'Most holy things' preserves the superlative force while
    avoiding the misleading spatial sense of 'holy of holies.'
- source_word: עַד עֲמֹד כֹּהֵן
  chosen: until a priest should arise
  alternatives:
  - until a priest stood up
  - until a priest should appear
  lexicon: HALOT
  rationale: 'The infinitive construct with עַד marks a future point: the restriction
    remains in place until a priest arises/appears. ''Should arise'' is idiomatic
    and preserves the formal tone of the administrative ruling.'
- source_word: לְאוּרִים וּלְתֻמִּים
  chosen: with Urim and Thummim
  alternatives:
  - for Urim and Thummim
  - by means of Urim and Thummim
  lexicon: HALOT
  rationale: Urim and Thummim are technical cultic terms and are best transliterated.
    The preposition לְ here is rendered idiomatically as 'with,' expressing a priest
    equipped to consult by means of Urim and Thummim. A more explicit instrumental
    rendering is possible but less natural in the main text.
