id: EZR.2.1
reference: Ezra 2:1
source:
  edition: WLC
  text: וְ/אֵ֣לֶּה בְּנֵ֣י הַ/מְּדִינָ֗ה הָֽ/עֹלִים֙ מִ/שְּׁבִ֣י הַ/גּוֹלָ֔ה אֲשֶׁ֥ר
    הֶגְלָ֛ה נבוכדנצור מֶֽלֶךְ בָּבֶ֖ל לְ/בָבֶ֑ל וַ/יָּשׁ֛וּבוּ לִ/ירוּשָׁלִַ֥ם וִֽ/יהוּדָ֖ה
    אִ֥ישׁ לְ/עִירֽ/וֹ׀־׃
translation:
  text: Now these are the sons of the province who came up from the captivity of the
    exiles, whom Nebuchadnezzar king of Babylon had carried away to Babylon, and they
    returned to Jerusalem and Judah, each to his own city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of the province' is an idiom for the members or people of the
      province; the translation keeps the literal form to reflect the source wording.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the exile' or 'from the captivity.' The Hebrew expression is fuller,
      literally 'from the captivity of the exiles.'
    reason: lexical_alternative
  - marker: c
    text: Nebuchadnezzar is also spelled 'Nebuchadrezzar' in some English transliterations.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - people of
  - children of
  lexicon: HALOT
  rationale: Literal 'sons of' is retained because it is a common Hebrew idiom for
    members of a group and preserves the source's masculine form per the gender-accurate
    policy. 'People of' would smooth the idiom but loses the formal texture; the representative
    sense is clear in context.
- source_word: הַמְּדִינָה
  chosen: the province
  alternatives:
  - the district
  - the region
  lexicon: HALOT
  rationale: מְדִינָה in Persian-period texts commonly denotes an administrative province.
    'Province' best matches the historical setting and standard usage in Ezra.
- source_word: הָעֹלִים
  chosen: who came up
  alternatives:
  - who were going up
  - who returned
  lexicon: HALOT
  rationale: The participle literally means 'the ones going up/coming up.' In this
    context of return to Judah and Jerusalem, 'came up' preserves the idiomatic ascent
    language without over-wooden English. 'Returned' is too interpretive here because
    the verb שׁוּב later explicitly states the return.
- source_word: מִשְּׁבִי הַגּוֹלָה
  chosen: from the captivity of the exiles
  alternatives:
  - from the exile
  - from the captivity
  - from the captivity of the deportation
  lexicon: HALOT
  rationale: The phrase combines שְׁבִי ('captivity') and גּוֹלָה ('exile/exiles').
    Rendering both elements as 'the captivity of the exiles' preserves the doubled
    expression rather than collapsing it to a single abstract term. It communicates
    both the state of captivity and the community of deportees.
- source_word: הֶגְלָה
  chosen: had carried away
  alternatives:
  - had exiled
  - had deported
  lexicon: HALOT
  rationale: The Hiphil of גלה here means to send into exile/deport. 'Had carried
    away' is idiomatic English that reflects the forced removal. 'Deported' is historically
    precise but slightly more technical in tone.
- source_word: נבוכדנצור
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  lexicon: HALOT
  rationale: A standard English transliteration is used for the personal name, following
    the instruction to transliterate names by standard conventions. 'Nebuchadrezzar'
    more closely reflects some Hebrew forms but is less familiar in English Bible
    usage.
- source_word: וַיָּשׁוּבוּ
  chosen: and they returned
  alternatives:
  - and they came back
  lexicon: HALOT
  rationale: This verb explicitly marks the act of return, so it is rendered straightforwardly
    as 'returned.' This also distinguishes it from the earlier ascent idiom in הָעֹלִים.
- source_word: לִירוּשָׁלַם וִיהוּדָה
  chosen: to Jerusalem and Judah
  alternatives:
  - to Jerusalem and to Judah
  lexicon: HALOT
  rationale: The paired destinations are rendered directly. Omitting the second 'to'
    in English is natural and does not obscure the syntax.
- source_word: אִישׁ לְעִירוֹ
  chosen: each to his own city
  alternatives:
  - each man to his city
  - everyone to his city
  lexicon: HALOT
  rationale: אִישׁ distributively means 'each' or 'each man.' 'Each to his own city'
    preserves the masculine singular possessive and the distributive force while reading
    naturally in English. 'Everyone' would be more gender-neutral than the source
    warrants under the stated policy.
