translation:
  text: Their horses were seven hundred thirty-six; their mules, two hundred forty-five.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: סוּסֵיהֶם
  chosen: their horses
  alternatives:
  - the horses belonging to them
  lexicon: HALOT
  rationale: סוּס means 'horse'; the plural construct with 3mp suffix indicates possession,
    naturally rendered 'their horses.'
- source_word: שְׁבַע מֵאוֹת שְׁלֹשִׁים וְשִׁשָּׁה
  chosen: seven hundred thirty-six
  alternatives:
  - seven hundred and thirty-six
  rationale: The Hebrew cardinal sequence straightforwardly expresses the total number
    736. Modern English style favors omission of 'and' in this context for readability.
- source_word: פִּרְדֵיהֶם
  chosen: their mules
  alternatives:
  - their pack animals
  lexicon: HALOT
  rationale: פֶּרֶד denotes a 'mule.' 'Mules' is the precise lexical equivalent; broader
    renderings like 'pack animals' are less exact than the source warrants.
- source_word: מָאתַיִם אַרְבָּעִים וַחֲמִשָּׁה
  chosen: two hundred forty-five
  alternatives:
  - two hundred and forty-five
  rationale: The numeral chain gives the total 245. Modern English numeric phrasing
    without 'and' is clear and natural.
