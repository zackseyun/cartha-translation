  text: סוּסֵי/הֶ֕ם שְׁבַ֥ע מֵא֖וֹת שְׁלֹשִׁ֣ים וְ/שִׁשָּׁ֑ה פִּרְדֵי/הֶ֕ם מָאתַ֖יִם
