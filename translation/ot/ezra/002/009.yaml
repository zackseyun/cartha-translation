id: EZR.2.9
reference: Ezra 2:9
source:
  edition: WLC
  text: בְּנֵ֣י זַכָּ֔י שְׁבַ֥ע מֵא֖וֹת וְ/שִׁשִּֽׁים׃ס
translation:
  text: the sons of Zakkai, seven hundred and sixty.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: In genealogical/register contexts, בְּנֵי commonly introduces a family
    or clan line. 'The sons of' is the most direct and conventional rendering, while
    still allowing representative descent rather than only immediate male offspring.
- source_word: זַכָּי
  chosen: Zakkai
  alternatives:
  - Zaccai
  lexicon: HALOT
  rationale: Personal names are transliterated by standard conventions per project
    philosophy. 'Zakkai' closely reflects the Hebrew consonants and doubled kaf.
- source_word: שְׁבַע מֵאוֹת
  chosen: seven hundred
  lexicon: HALOT
  rationale: This is the straightforward cardinal-number construction in Hebrew and
    is rendered idiomatically in English as 'seven hundred.'
- source_word: וְשִׁשִּׁים
  chosen: and sixty
  lexicon: HALOT
  rationale: The conjunction plus cardinal continues the total number, yielding the
    standard English expression 'seven hundred and sixty.'
