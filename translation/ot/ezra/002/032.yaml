id: EZR.2.32
reference: Ezra 2:32
source:
  edition: WLC
  text: בְּנֵ֣י חָרִ֔ם שְׁלֹ֥שׁ מֵא֖וֹת וְ/עֶשְׂרִֽים׃ס
translation:
  text: the sons of Harim, three hundred and twenty.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: In Ezra's returnee list, בְּנֵי introduces a family/clan grouping. 'The
    sons of' is the standard, formally transparent rendering, while readers can infer
    a broader descendant sense from the genealogical context.
- source_word: חָרִם
  chosen: Harim
  lexicon: HALOT
  rationale: Proper personal or clan name; per translation philosophy, names are transliterated
    rather than translated.
- source_word: שְׁלֹשׁ מֵאוֹת וְעֶשְׂרִים
  chosen: three hundred and twenty
  alternatives:
  - three hundred twenty
  lexicon: HALOT
  rationale: This is the straightforward cardinal number construction. 'Three hundred
    and twenty' preserves the Hebrew count naturally in English and fits the register
    of census-style lists.
