id: EZR.2.20
reference: Ezra 2:20
source:
  edition: WLC
  text: בְּנֵ֥י גִבָּ֖ר תִּשְׁעִ֥ים וַ/חֲמִשָּֽׁה׃ס
translation:
  text: the sons of Gibbar, ninety-five.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the men of
  lexicon: HALOT
  rationale: In Ezra's returnee list, בְּנֵי literally means 'sons of' and commonly
    functions as a clan/family designation. 'The sons of' preserves the formal structure
    of the register while remaining natural in English. Alternatives such as 'descendants
    of' or 'the men of' are possible contextual renderings but are less formally aligned
    with the repeated list formula.
- source_word: גִבָּר
  chosen: Gibbar
  alternatives:
  - Gibbar/Gibar (orthographic variation)
  lexicon: HALOT
  rationale: This is a proper name and, per translation philosophy, personal names
    are transliterated rather than translated. The form 'Gibbar' follows the consonantal/vocalized
    Hebrew as given here.
- source_word: תִּשְׁעִים וַחֲמִשָּׁה
  chosen: ninety-five
  alternatives:
  - ninety and five
  lexicon: HALOT
  rationale: The Hebrew cardinal number phrase literally reads 'ninety and five.'
    Standard modern English expresses this as 'ninety-five,' which preserves the sense
    accurately and readably.
