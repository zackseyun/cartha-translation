id: EZR.2.14
reference: Ezra 2:14
source:
  edition: WLC
  text: בְּנֵ֣י בִגְוָ֔י אַלְפַּ֖יִם חֲמִשִּׁ֥ים וְ/שִׁשָּֽׁה׃ס
translation:
  text: the sons of Bigvai, two thousand fifty-six.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''two thousand, fifty, and six.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: In Ezra 2 genealogical/list context, בְּנֵי regularly introduces a family
    or clan grouping. 'The sons of' preserves the formal structure of the register
    while allowing representative descent-group sense.
- source_word: בִגְוָי
  chosen: Bigvai
  lexicon: HALOT
  rationale: Proper personal/clan name; transliterated rather than translated in keeping
    with the translation philosophy for names.
- source_word: אַלְפַּיִם
  chosen: two thousand
  lexicon: HALOT
  rationale: Cardinal number in dual/plural form meaning 'two thousand'; rendered
    straightforwardly in idiomatic English.
- source_word: חֲמִשִּׁים
  chosen: fifty
  lexicon: HALOT
  rationale: Cardinal number 'fifty,' combined additively with the following numeral.
- source_word: וְשִׁשָּׁה
  chosen: six
  lexicon: HALOT
  rationale: Conjunction plus cardinal number 'and six'; in English number style within
    a census/list, the combined total is best rendered as a single summed figure,
    'fifty-six,' rather than preserving the Hebrew additive sequence woodenly.
