id: EZR.2.2
reference: Ezra 2:2
source:
  edition: WLC
  text: אֲשֶׁר בָּ֣אוּ עִם זְרֻבָּבֶ֗ל יֵשׁ֡וּעַ נְ֠חֶמְיָה שְׂרָיָ֨ה רְֽעֵלָיָ֜ה
    מָרְדֳּכַ֥י בִּלְשָׁ֛ן מִסְפָּ֥ר בִּגְוַ֖י רְח֣וּם בַּעֲנָ֑ה מִסְפַּ֕ר אַנְשֵׁ֖י
    עַ֥ם יִשְׂרָאֵֽל־־׃ס
translation:
  text: 'who came with Zerubbabel: Jeshua, Nehemiah, Seraiah, Reelaiah, Mordecai,
    Bilshan, Mispar, Bigvai, Rehum, and Baanah. The number of the men of the people
    of Israel:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: In the parallel list at Nehemiah 7:7, 'Reelaiah' appears as 'Raamiah.'
    reason: alternative_reading
  - marker: b
    text: In the parallel list at Nehemiah 7:7, 'Mispar' appears as 'Mispereth.'
    reason: alternative_reading
  - marker: c
    text: In the parallel list at Nehemiah 7:7, 'Rehum' appears as 'Nehum.'
    reason: alternative_reading
  - marker: d
    text: This clause introduces the census total that is given in the following verse.
    reason: cross_reference
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - those who
  lexicon: HALOT
  rationale: Relative particle introducing the clause that continues from the previous
    verse; 'who' is the most natural English connector here, while 'those who' would
    slightly over-specify what is already implied by context.
- source_word: בָּאוּ
  chosen: came
  alternatives:
  - returned
  - arrived
  lexicon: HALOT
  rationale: Qal perfect plural of בוא, basic sense 'came.' Although the larger context
    is return from exile, the verb itself here simply states coming with Zerubbabel;
    'returned' would import contextual interpretation into the verb.
- source_word: עִם
  chosen: with
  alternatives:
  - along with
  lexicon: HALOT
  rationale: Straightforward preposition indicating accompaniment.
- source_word: זְרֻבָּבֶל
  chosen: Zerubbabel
  rationale: Personal name transliterated according to standard English convention,
    per translation philosophy.
- source_word: יֵשׁוּעַ
  chosen: Jeshua
  alternatives:
  - Joshua
  rationale: Proper name commonly rendered 'Jeshua' in postexilic contexts to distinguish
    this figure from other Joshuas in English tradition; the Hebrew form supports
    this transliteration.
- source_word: נְחֶמְיָה
  chosen: Nehemiah
  rationale: Standard English transliteration of the personal name.
- source_word: שְׂרָיָה
  chosen: Seraiah
  alternatives:
  - Azariah
  rationale: The MT reads Seraiah here. Some parallel traditions differ, but the Hebrew
    consonantal text supports 'Seraiah' in the main text.
- source_word: רְעֵלָיָה
  chosen: Reelaiah
  alternatives:
  - Raamiah
  rationale: The MT form is best represented by 'Reelaiah.' A parallel in Nehemiah
    7:7 reads 'Raamiah,' which is worth preserving in a footnote as an alternative
    name form.
- source_word: מָרְדֳּכַי
  chosen: Mordecai
  rationale: Standard English transliteration of the personal name; no reason to distinguish
    from the better-known Esther figure at the level of spelling.
- source_word: בִּלְשָׁן
  chosen: Bilshan
  rationale: Proper name transliterated directly.
- source_word: מִסְפָּר
  chosen: Mispar
  alternatives:
  - Mispereth
  rationale: Here מִסְפָּר is a proper name, not the common noun 'number.' The parallel
    in Nehemiah 7:7 has 'Mispereth,' which should be footnoted as an alternative form.
- source_word: בִּגְוַי
  chosen: Bigvai
  rationale: Standard transliteration of the personal name.
- source_word: רְחוּם
  chosen: Rehum
  alternatives:
  - Nehum
  rationale: The MT reads 'Rehum.' The parallel in Nehemiah 7:7 has 'Nehum,' so the
    alternative is preserved in a footnote rather than adopted into the main text.
- source_word: בַּעֲנָה
  chosen: Baanah
  rationale: Standard transliteration of the personal name.
- source_word: מִסְפַּר
  chosen: The number
  alternatives:
  - the total number
  lexicon: HALOT
  rationale: Here the noun is the common noun 'number,' introducing the census total
    that follows. 'The number' is formally close and idiomatic in English.
- source_word: אַנְשֵׁי
  chosen: the men of
  alternatives:
  - the people of
  - the men from
  lexicon: HALOT
  rationale: Construct plural of אִישׁ, literally 'men of.' In a census/list context,
    retaining 'men' reflects the Hebrew wording and the source's gendered form, in
    line with the gender-accurate policy.
- source_word: עַם יִשְׂרָאֵל
  chosen: the people of Israel
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: Construct chain meaning 'people of Israel.' Rendering the full phrase
    preserves the formal sense and identifies the group being counted.
