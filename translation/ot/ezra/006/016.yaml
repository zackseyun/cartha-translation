id: EZR.6.16
reference: Ezra 6:16
source:
  edition: WLC
  text: וַ/עֲבַ֣דוּ בְנֵֽי יִ֠שְׂרָאֵל כָּהֲנַיָּ֨/א וְ/לֵוָיֵ֜/א וּ/שְׁאָ֣ר בְּנֵי
    גָלוּתָ֗/א חֲנֻכַּ֛ת בֵּית אֱלָהָ֥/א דְנָ֖ה בְּ/חֶדְוָֽה־־־׃
translation:
  text: And the sons of Israel, the priests, the Levites, and the rest of the sons
    of the exile celebrated the dedication of this house of God with joy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more smoothly, 'and the rest of the exiles.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲבַדוּ
  chosen: celebrated
  alternatives:
  - performed
  - observed
  - made
  lexicon: HALOT
  rationale: In this Aramaic context the verb means to carry out or observe a ceremonial
    event. Since the direct object is 'the dedication,' idiomatic English is 'celebrated
    the dedication' rather than the overly literal 'did/made the dedication.'
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: A formally close rendering preserves the source expression while remaining
    natural in English. 'The Israelites' is possible, but 'the sons of Israel' matches
    the construct phrase and fits the verse's listing style.
- source_word: כָּהֲנַיָּא
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of the priestly class; no contextual reason to vary.
- source_word: וְלֵוָיֵא
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering for members of the tribe/clan serving temple functions.
- source_word: וּשְׁאָר בְּנֵי גָלוּתָא
  chosen: and the rest of the sons of the exile
  alternatives:
  - and the rest of the exiles
  - and the remainder of the returned exiles
  lexicon: HALOT
  rationale: The phrase literally refers to the remainder of the 'sons of exile,'
    that is, the returned exilic community beyond priests and Levites. The chosen
    rendering preserves the source wording while remaining intelligible. A smoother
    alternative is preserved in a footnote.
- source_word: חֲנֻכַּת
  chosen: the dedication
  alternatives:
  - the dedication ceremony
  - the consecration
  lexicon: HALOT
  rationale: The noun denotes dedication, especially of a house or altar. 'Dedication'
    is the most direct and natural rendering here.
- source_word: בֵּית אֱלָהָא דְנָה
  chosen: this house of God
  alternatives:
  - this temple of God
  - this house, God’s house
  lexicon: HALOT
  rationale: Literally 'this house of God.' 'Temple' would be interpretive; 'house
    of God' preserves the source metaphor and temple terminology.
- source_word: בְּחֶדְוָה
  chosen: with joy
  alternatives:
  - joyfully
  - with rejoicing
  lexicon: HALOT
  rationale: The preposition plus noun is best rendered adverbially in English. 'With
    joy' is clear and close to the source.
