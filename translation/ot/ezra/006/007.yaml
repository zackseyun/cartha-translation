id: EZR.6.7
reference: Ezra 6:7
source:
  edition: WLC
  text: שְׁבֻ֕קוּ לַ/עֲבִידַ֖ת בֵּית אֱלָהָ֣/א דֵ֑ךְ פַּחַ֤ת יְהוּדָיֵ/א֙ וּ/לְ/שָׂבֵ֣י
    יְהוּדָיֵ֔/א בֵּית אֱלָהָ֥/א דֵ֖ךְ יִבְנ֥וֹן עַל אַתְרֵֽ/הּ־־־׃
translation:
  text: Leave the work on this house of God alone; let the governor of the Jews and
    the elders of the Jews rebuild this house of God on its site.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Judeans' instead of 'the Jews.' The Aramaic term can denote the
      people of Judah in either an ethnic or regional sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁבֻקוּ
  chosen: Leave ... alone
  alternatives:
  - let alone
  - leave
  lexicon: HALOT
  rationale: Imperative plural from שבק in Imperial Aramaic, here an order to desist
    from interference. English idiom 'leave ... alone' best captures the prohibitive
    force in natural modern English.
- source_word: לַעֲבִידַת
  chosen: the work
  alternatives:
  - the service
  - the labor
  lexicon: HALOT
  rationale: עֲבִידָה can denote work/service. In this rebuilding context, 'work'
    fits the construction activity better than the more cultic-sounding 'service'.
- source_word: בֵּית אֱלָהָא דֵךְ
  chosen: this house of God
  alternatives:
  - that house of God
  lexicon: HALOT
  rationale: The deictic דֵךְ points to the specific temple under discussion. 'This
    house of God' reflects the immediacy of the decree's reference better than 'that,'
    while remaining natural in English.
- source_word: פַּחַת
  chosen: the governor
  alternatives:
  - the satrap
  - the provincial governor
  lexicon: HALOT
  rationale: פַּחַת denotes a governor or provincial official. 'Governor' is the clearest
    and most standard English equivalent here; 'satrap' would be too specific and
    potentially misleading.
- source_word: יְהוּדָיֵא
  chosen: of the Jews
  alternatives:
  - of Judah
  - the Judeans
  lexicon: HALOT
  rationale: The ethnogeographic term can be rendered 'Jews' or 'Judeans.' In Ezra,
    either is possible; 'Jews' is traditional and readily understood, while still
    accurately referring to the people associated with Judah.
- source_word: וּלְשָׂבֵי יְהוּדָיֵא
  chosen: and the elders of the Jews
  alternatives:
  - and the officials of the Jews
  - and the old men of the Jews
  lexicon: HALOT
  rationale: שָׂבֵי is the construct plural 'elders of.' 'Elders' is the standard
    rendering for communal leaders and fits the administrative context.
- source_word: יִבְנוֹן
  chosen: let ... rebuild
  alternatives:
  - they shall build
  - let ... build
  lexicon: HALOT
  rationale: Imperfect plural in decree style can function jussively. 'Let ... rebuild'
    matches the permissive/authoritative force following the imperative 'leave ...
    alone.' 'Rebuild' makes explicit the restoration context of the temple.
- source_word: עַל אַתְרֵהּ
  chosen: on its site
  alternatives:
  - in its place
  - on its place
  lexicon: HALOT
  rationale: אַתַר means place/site. 'On its site' is idiomatic English for rebuilding
    a structure in its original location and preserves the spatial sense of עַל.
