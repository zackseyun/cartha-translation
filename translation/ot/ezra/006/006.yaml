id: EZR.6.6
reference: Ezra 6:6
source:
  edition: WLC
  text: כְּעַ֡ן תַּ֠תְּנַי פַּחַ֨ת עֲבַֽר נַהֲרָ֜/ה שְׁתַ֤ר בּוֹזְנַי֙ וּ/כְנָוָ֣תְ/ה֔וֹן
    אֲפַרְסְכָיֵ֔/א דִּ֖י בַּ/עֲבַ֣ר נַהֲרָ֑/ה רַחִיקִ֥ין הֲו֖וֹ מִן תַּמָּֽה־־׃
translation:
  text: Now Tattenai, governor of the province Beyond the River, Shethar-bozenai,
    and your associates, the officials of Persia who are in Beyond the River, keep
    far away from there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'be far from there.'
    reason: lexical_alternative
  - marker: b
    text: '''Beyond the River'' is the Persian administrative name for the province
      west of the Euphrates.'
    reason: cultural_note
  - marker: c
    text: The term rendered 'officials of Persia' may also be transliterated as 'Apharsachites.'
    reason: alternative_reading
lexical_decisions:
- source_word: כְּעַן
  chosen: Now
  alternatives:
  - Therefore
  - So now
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the king's directive in response
    to the preceding report. 'Now' is natural modern English and preserves the transition
    without overinterpreting it as strictly inferential.
- source_word: תַּתְּנַי
  chosen: Tattenai
  rationale: Personal name is transliterated per translation philosophy.
- source_word: פַּחַת עֲבַר נַהֲרָה
  chosen: governor of the province Beyond the River
  alternatives:
  - governor beyond the River
  - governor of Trans-Euphrates
  lexicon: HALOT
  rationale: פַּחַת denotes a provincial governor under imperial administration. עֲבַר
    נַהֲרָה is the standard Persian provincial designation 'Beyond the River' (i.e.,
    west of the Euphrates from the imperial perspective). Adding 'of the province'
    makes the administrative title clear in English.
- source_word: שְׁתַר בּוֹזְנַי
  chosen: Shethar-bozenai
  alternatives:
  - Shetar-bozenai
  rationale: Proper name transliterated; hyphenation reflects the compound form commonly
    represented in English.
- source_word: וּכְנָוָתְהוֹן
  chosen: and your associates
  alternatives:
  - and their companions
  - and your colleagues
  lexicon: HALOT
  rationale: The noun refers to companions/associates. Because the suffix is second
    masculine plural, 'your associates' matches the direct address of the decree better
    than 'their companions.'
- source_word: אֲפַרְסְכָיֵא
  chosen: the officials of Persia
  alternatives:
  - the Apharsachites
  - the Persian officials
  lexicon: HALOT
  rationale: The term likely refers to Persian officials/administrators rather than
    requiring a bare transliteration of an ethnic-administrative label. Translating
    the sense is clearer in modern English while preserving the governmental context.
- source_word: דִּי בַּעֲבַר נַהֲרָה
  chosen: who are in Beyond the River
  alternatives:
  - who are beyond the River
  - who are in the province Beyond the River
  lexicon: HALOT
  rationale: Relative clause identifying the associates/officials by location within
    the imperial district. Retaining the proper provincial title 'Beyond the River'
    preserves the administrative sense.
- source_word: רַחִיקִין הֲוֹו מִן תַּמָּה
  chosen: keep far away from there
  alternatives:
  - be far from there
  - stay away from there
  lexicon: HALOT
  rationale: 'Idiomatic imperative-like command in Aramaic: literally ''be far from
    there.'' ''Keep far away from there'' communicates the force of a royal prohibition
    in natural English without adding content.'
