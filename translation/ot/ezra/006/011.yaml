theological_decisions:
- issue: Nature of the execution term in imperial-penalty language
  chosen_reading: Render the punishment as 'impaled on it' in the main text
  alternative_readings:
  - hanged on it
  rationale: The Aramaic wording most naturally refers to suspension on a wooden beam
    or stake extracted from the offender's house. Because 'hanged' in modern English
    can suggest a later gallows-style execution, 'impaled' better preserves the ancient
    setting without softening the brutality. The common traditional rendering is preserved
    in a footnote.
  doctrine_reference: Translation philosophy §1, §6
