id: EZR.6.11
reference: Ezra 6:11
source:
  edition: WLC
  text: וּ/מִנִּ/י֮ שִׂ֣ים טְעֵם֒ דִּ֣י כָל אֱנָ֗שׁ דִּ֤י יְהַשְׁנֵא֙ פִּתְגָמָ֣/א
    דְנָ֔ה יִתְנְסַ֥ח אָע֙ מִן בַּיְתֵ֔/הּ וּ/זְקִ֖יף יִתְמְחֵ֣א עֲלֹ֑/הִי וּ/בַיְתֵ֛/הּ
    נְוָל֥וּ יִתְעֲבֵ֖ד עַל דְּנָֽה־־־׃
translation:
  text: 'And from me a decree is issued: if any man alters this edict, a beam shall
    be pulled out from his house, and he shall be impaled on it; and his house shall
    be made a refuse heap because of this.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he shall be hanged on it.'
    reason: alternative_reading
  - marker: b
    text: Literally, 'a beam/timber shall be pulled out from his house.'
    reason: lexical_alternative
  - marker: c
    text: Traditionally, 'dunghill.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂים טְעֵם
  chosen: a decree is issued
  alternatives:
  - an order is made
  - a command is set
  lexicon: HALOT
  rationale: The idiom literally involves 'setting' a decree. 'A decree is issued'
    gives natural English while preserving the formal royal-administrative sense.
- source_word: יְהַשְׁנֵא
  chosen: alters
  alternatives:
  - changes
  - transgresses
  lexicon: HALOT
  rationale: In context of a royal edict, the verb denotes changing or tampering with
    the word of the decree. 'Alters' best captures interference with the official
    command rather than mere disobedience.
- source_word: פִּתְגָמָא
  chosen: edict
  alternatives:
  - word
  - decree
  - command
  lexicon: HALOT
  rationale: This Aramaic administrative term commonly refers to an official word
    or decree. 'Edict' fits the imperial context and distinguishes it from ordinary
    speech.
- source_word: יִתְנְסַח אָע מִן בַּיְתֵהּ
  chosen: a beam shall be pulled out from his house
  alternatives:
  - a timber shall be torn from his house
  - a stake shall be taken from his house
  lexicon: HALOT
  rationale: The phrase describes removing a wooden beam/timber from the offender's
    house for use in the punishment. 'Beam' is concrete and idiomatic in English.
- source_word: וּזְקִיף יִתְמְחֵא עֲלֹהִי
  chosen: he shall be impaled on it
  alternatives:
  - he shall be hanged on it
  - he shall be fastened to it
  lexicon: HALOT
  rationale: The imagery is of being lifted up on the extracted timber. 'Impaled'
    better reflects the ancient punitive practice than the more anachronistic 'hanged,'
    while preserving the severity of the penalty.
- source_word: נְוָלוּ
  chosen: refuse heap
  alternatives:
  - dunghill
  - rubbish heap
  lexicon: HALOT
  rationale: The noun refers to a disgraceful ruin or filth heap. 'Refuse heap' is
    clear modern English and avoids archaic diction while retaining the sense of public
    defilement.
- source_word: יִתְעֲבֵד
  chosen: shall be made
  alternatives:
  - shall become
  - shall be turned into
  lexicon: HALOT
  rationale: 'Passive/impersonal sense fits the legal curse formula: the house is
    to be made into such a heap as a consequence of the offense.'
- source_word: כָל אֱנָשׁ
  chosen: any man
  alternatives:
  - any person
  - whoever
  lexicon: HALOT
  rationale: The source is singular masculine/generic. Per translation philosophy,
    a gender-accurate rendering is preferred where the generic force is represented
    by masculine form.
