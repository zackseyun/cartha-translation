id: EZR.6.22
reference: Ezra 6:22
source:
  edition: WLC
  text: וַ/יַּֽעֲשׂ֧וּ חַג מַצּ֛וֹת שִׁבְעַ֥ת יָמִ֖ים בְּ/שִׂמְחָ֑ה כִּ֣י שִׂמְּחָ֣/ם
    יְהוָ֗ה וְֽ/הֵסֵ֞ב לֵ֤ב מֶֽלֶךְ אַשּׁוּר֙ עֲלֵי/הֶ֔ם לְ/חַזֵּ֣ק יְדֵי/הֶ֔ם בִּ/מְלֶ֥אכֶת
    בֵּית הָ/אֱלֹהִ֖ים אֱלֹהֵ֥י יִשְׂרָאֵֽל־׀־־׃פ
translation:
  text: And they kept the Feast of Unleavened Bread for seven days with joy, because
    the LORD had made them joyful and had turned the heart of the king of Assyria
    toward them, to strengthen their hands in the work of the house of God, the God
    of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the king of Assyria.'' Though the ruler in Ezra''s time was Persian,
      the text uses the older imperial designation, likely referring to the realm
      that included former Assyrian territory.'
    reason: cultural_note
  - marker: b
    text: Or 'had made them rejoice.'
    reason: lexical_alternative
  - marker: c
    text: Or 'had inclined the heart of the king of Assyria toward them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  chosen: they kept
  alternatives:
  - they celebrated
  - they observed
  - they did/made
  lexicon: HALOT
  rationale: עשה with a festival object idiomatically means to keep/celebrate/observe
    a feast, not literally 'do' a feast. 'Kept' is concise and natural while remaining
    close to the Hebrew idiom.
- source_word: חַג מַצּוֹת
  chosen: the Feast of Unleavened Bread
  alternatives:
  - the festival of unleavened bread
  lexicon: HALOT
  rationale: Standard rendering of the fixed festival name. Capitalized as a recognized
    Israelite feast.
- source_word: שִׁבְעַת יָמִים
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: HALOT
  rationale: English idiom naturally supplies 'for' with duration.
- source_word: בְּשִׂמְחָה
  chosen: with joy
  alternatives:
  - joyfully
  - in gladness
  lexicon: HALOT
  rationale: The prepositional phrase is best rendered adverbially. 'With joy' preserves
    the noun and reads naturally.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for their joy; 'because' is clearer in modern English
    than 'for'.
- source_word: שִׂמְּחָם
  chosen: had made them joyful
  alternatives:
  - had made them rejoice
  - had given them joy
  lexicon: HALOT
  rationale: 'The Piel verb with object suffix is causative/intensive: the LORD caused
    them to rejoice. ''Had made them joyful'' matches the causal force and links well
    with the preceding ''with joy''.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'.
- source_word: וְהֵסֵב לֵב
  chosen: and had turned the heart
  alternatives:
  - and had changed the heart
  - and had inclined the heart
  lexicon: HALOT
  rationale: סבב/הסב with 'heart' conveys turning or redirecting disposition. 'Turned
    the heart' is a close and idiomatic rendering.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: the king of Assyria
  alternatives:
  - the Assyrian king
  lexicon: HALOT
  rationale: Formal genitive construction is straightforward. Although the historical
    referent is a Persian ruler, the text itself says 'king of Assyria,' likely using
    the older imperial designation for the region/domain; the translation preserves
    the source wording.
- source_word: עֲלֵיהֶם
  chosen: toward them
  alternatives:
  - to them
  - in their favor
  lexicon: HALOT
  rationale: With 'turned the heart,' על conveys direction toward them. 'Toward them'
    is literal and avoids over-interpreting as explicit favor, though favor is implied.
- source_word: לְחַזֵּק יְדֵיהֶם
  chosen: to strengthen their hands
  alternatives:
  - to strengthen them
  - to encourage them
  lexicon: HALOT
  rationale: A common Hebrew idiom for giving strength or support. The literal 'strengthen
    their hands' is understandable in English and preserves the imagery.
- source_word: בִּמְלֶאכֶת
  chosen: in the work of
  alternatives:
  - for the work of
  - in the service of
  lexicon: HALOT
  rationale: Refers to the labor/task associated with rebuilding and temple service.
    'In the work of' fits the Hebrew preposition and the following construct chain.
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - the temple of God
  lexicon: HALOT
  rationale: Literally 'house of God.' While 'temple' is contextually accurate, 'house
    of God' preserves the Hebrew expression and remains clear.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Standard construct rendering, appositional to 'God' and identifying Israel's
    covenant God.
