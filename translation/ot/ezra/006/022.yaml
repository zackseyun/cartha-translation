theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagint pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Historical designation 'king of Assyria' for a Persian-period ruler
  chosen_reading: Retain 'the king of Assyria' in the main text
  alternative_readings:
  - the Persian king
  - the king over Assyria
  rationale: The Hebrew text explicitly reads 'king of Assyria.' Translating it away
    to harmonize with historical context would import interpretation beyond the wording
    of the source. The likely explanation can be noted in a footnote rather than altering
    the text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import claims the text does not make.'
