id: EZR.6.8
reference: Ezra 6:8
source:
  edition: WLC
  text: וּ/מִנִּ/י֮ שִׂ֣ים טְעֵם֒ לְ/מָ֣א דִֽי תַֽעַבְד֗וּן עִם שָׂבֵ֤י יְהוּדָיֵ/א֙
    אִלֵּ֔ךְ לְ/מִבְנֵ֖א בֵּית אֱלָהָ֣/א דֵ֑ךְ וּ/מִ/נִּכְסֵ֣י מַלְכָּ֗/א דִּ֚י מִדַּת֙
    עֲבַ֣ר נַהֲרָ֔/ה אָסְפַּ֗רְנָא נִפְקְתָ֛/א תֶּהֱוֵ֧א מִֽתְיַהֲבָ֛א לְ/גֻבְרַיָּ֥/א
    אִלֵּ֖ךְ דִּי לָ֥א לְ/בַטָּלָֽא־־־־׃
translation:
  text: 'And by me a decree is issued concerning what you are to do with these elders
    of the Jews for the rebuilding of the house of your God: the full expense is to
    be paid promptly to these men from the king’s goods, from the province Beyond
    the River, so that the work may not cease.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the cost' or 'the expenditure' for 'the full expense.'
    reason: lexical_alternative
  - marker: b
    text: '''Beyond the River'' was the Persian administrative name for the region
      west of the Euphrates.'
    reason: cultural_note
  - marker: c
    text: Or 'so that there may be no interruption.'
    reason: alternative_reading
lexical_decisions:
- source_word: שִׂים טְעֵם
  chosen: a decree is issued
  alternatives:
  - an order is made
  - a decision is set
  lexicon: HALOT
  rationale: The idiom literally involves 'setting' a 'decree/decision.' 'A decree
    is issued' is natural English and preserves the official administrative force
    of the Aramaic.
- source_word: לְמָא דִי תַעַבְדוּן
  chosen: concerning what you are to do
  alternatives:
  - as to what you shall do
  - for what you must do
  lexicon: HALOT
  rationale: This clause introduces the content of the decree. 'Concerning what you
    are to do' captures both the directive sense and the administrative style without
    over-paraphrasing.
- source_word: שָׂבֵי יְהוּדָיֵא
  chosen: elders of the Jews
  alternatives:
  - Jewish elders
  - the elders of Judah
  lexicon: HALOT
  rationale: The phrase refers to the leadership group among the Judean/Jewish community.
    'Elders of the Jews' stays close to the Aramaic genitive and matches the ethnic
    designation used in Ezra.
- source_word: לְמִבְנֵא
  chosen: for the rebuilding
  alternatives:
  - for building
  - to build
  lexicon: HALOT
  rationale: The infinitival form here expresses purpose with respect to the temple
    project. 'For the rebuilding' fits the context of resumed construction and reads
    idiomatically in English.
- source_word: בֵּית אֱלָהָא דֵךְ
  chosen: the house of your God
  alternatives:
  - the temple of your God
  lexicon: HALOT
  rationale: Literally 'the house of your God.' While 'temple' is contextually accurate,
    'house of your God' preserves the source wording and its reverential tone.
- source_word: מִנִּכְסֵי מַלְכָּא
  chosen: from the king’s goods
  alternatives:
  - from the king's treasury
  - from the king's resources
  lexicon: HALOT
  rationale: The noun denotes property/assets. 'Goods' is a fairly direct rendering;
    'treasury' would be interpretive and is not the lexical form here, though the
    context is financial.
- source_word: מִדַּת עֲבַר נַהֲרָה
  chosen: from the province Beyond the River
  alternatives:
  - from the province across the River
  - from Trans-Euphrates
  lexicon: HALOT
  rationale: This is the standard Persian administrative designation for the satrapy
    west of the Euphrates. 'Beyond the River' preserves the official title while remaining
    readable.
- source_word: אָסְפַּרְנָא
  chosen: promptly
  alternatives:
  - diligently
  - exactly
  - carefully
  lexicon: HALOT
  rationale: In this fiscal-administrative context the adverb emphasizes prompt and
    careful execution. 'Promptly' best fits the command that funds be supplied without
    delay.
- source_word: נִפְקְתָא
  chosen: the full expense
  alternatives:
  - the cost
  - the outlay
  - the expenditure
  lexicon: HALOT
  rationale: The noun refers to expenditure/outlay. 'The full expense' makes clear
    that the costs of the project are in view and suits the funding context.
- source_word: תֶּהֱוֵא מִתְיַהֲבָא
  chosen: is to be paid
  alternatives:
  - shall be given
  - must be provided
  lexicon: HALOT
  rationale: The passive verbal sequence indicates that the expense is to be given/provided.
    'Is to be paid' makes the financial sense explicit in natural English.
- source_word: לְגֻבְרַיָּא אִלֵּךְ
  chosen: to these men
  alternatives:
  - to these persons
  - to them
  lexicon: HALOT
  rationale: The Aramaic explicitly says 'to these men,' referring back to the elders.
    Retaining 'men' reflects the source wording and follows the gender-accurate policy.
- source_word: דִּי לָא לְבַטָּלָא
  chosen: so that the work may not cease
  alternatives:
  - so that it may not be hindered
  - so that there may be no interruption
  lexicon: HALOT
  rationale: 'The clause expresses purpose: the funding is to prevent stoppage of
    the project. Supplying ''the work'' is contextually necessary in English, since
    the verb ''cease/be interrupted'' refers to the rebuilding activity.'
