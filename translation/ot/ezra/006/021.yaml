theological_decisions:
- issue: Identity of the additional participants in the Passover
  chosen_reading: The verse includes not only returned exiles but also other persons
    who separated themselves from the uncleanness of the local peoples and joined
    the returned community in seeking the LORD.
  alternative_readings:
  - The phrase refers specifically to proselytes/converts from surrounding peoples.
  - The phrase refers to Israelites in the land who had separated from foreign contamination.
  rationale: The Hebrew wording is broad and does not explicitly label the group as
    converts or as ethnic Israelites only. The translation therefore preserves the
    text's openness by rendering the participial description directly rather than
    importing a narrower identity category.
  doctrine_reference: Preserve theological tension rather than resolve it.
