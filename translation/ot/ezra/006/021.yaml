id: EZR.6.21
reference: Ezra 6:21
source:
  edition: WLC
  text: וַ/יֹּאכְל֣וּ בְנֵֽי יִשְׂרָאֵ֗ל הַ/שָּׁבִים֙ מֵֽ/הַ/גּוֹלָ֔ה וְ/כֹ֗ל הַ/נִּבְדָּ֛ל
    מִ/טֻּמְאַ֥ת גּוֹיֵֽ הָ/אָ֖רֶץ אֲלֵ/הֶ֑ם לִ/דְרֹ֕שׁ לַֽ/יהוָ֖ה אֱלֹהֵ֥י יִשְׂרָאֵֽל־־׃
translation:
  text: The sons of Israel who had returned from the exile ate, together with everyone
    who had separated himself from the uncleanness of the peoples of the land to join
    them, to seek the LORD, the God of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''The Israelites.'' Hebrew: ''the sons of Israel.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'from the impurity/defilement of the peoples of the land.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'to them'; that is, they joined themselves to the returned community.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאכְלוּ
  chosen: ate
  alternatives:
  - ate it
  - celebrated by eating
  lexicon: HALOT
  rationale: The verb simply means 'ate.' The object (the Passover meal/lamb) is implied
    from the immediate context (v. 20) and need not be supplied in English main text.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: The sons of Israel
  alternatives:
  - The Israelites
  - The people of Israel
  lexicon: HALOT
  rationale: A formally transparent rendering of the Hebrew construct. 'Israelites'
    is idiomatic, but 'sons of Israel' preserves the source expression and fits the
    gender-accurate policy without implying only males participated.
- source_word: הַשָּׁבִים מֵהַגּוֹלָה
  chosen: who had returned from the exile
  alternatives:
  - who returned from the captivity
  - the returned exiles
  lexicon: HALOT
  rationale: This participial phrase identifies the Judean returnees. 'Exile' is more
    natural and contextually precise than 'captivity' in modern English.
- source_word: וְכֹל הַנִּבְדָּל
  chosen: together with everyone who had separated himself
  alternatives:
  - and everyone who separated himself
  - and all who had set themselves apart
  lexicon: HALOT
  rationale: The Niphal participle denotes one who had separated himself/itself. 'Everyone'
    captures the collective singular כֹל with natural English. 'Together with' clarifies
    that this is an additional participating group.
- source_word: מִטֻּמְאַת גּוֹיֵי הָאָרֶץ
  chosen: from the uncleanness of the peoples of the land
  alternatives:
  - from the impurity of the nations of the land
  - from the defilement of the peoples of the land
  lexicon: HALOT
  rationale: טֻמְאָה is ritual/moral 'uncleanness' or 'impurity.' 'Uncleanness' preserves
    the cultic resonance in this Passover context. גּוֹיֵי הָאָרֶץ is best rendered
    'peoples of the land,' referring to surrounding populations rather than a single
    nation.
- source_word: אֲלֵהֶם
  chosen: to join them
  alternatives:
  - to them
  - with them
  lexicon: HALOT
  rationale: Literally 'to them,' but in context it indicates association with the
    returned community. 'To join them' makes the relational force explicit without
    overparaphrasing.
- source_word: לִדְרֹשׁ
  chosen: to seek
  alternatives:
  - to worship
  - to inquire of
  lexicon: HALOT
  rationale: דרשׁ with God as object commonly means 'seek' in the sense of turning
    to him in devotion. 'Seek' preserves the broader covenantal sense better than
    the narrower 'worship' or 'inquire of.'
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of YHWH is 'the LORD.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Standard construct rendering, preserving the covenantal identification
    of Israel's God.
