theological_decisions:
- issue: Temple-name theology in the phrase about God causing his name to dwell in
    Jerusalem
  chosen_reading: Retain the idiom 'has caused his name to dwell there' rather than
    paraphrasing it as mere ownership or presence
  alternative_readings:
  - has set his name there
  - who dwells there
  rationale: The text invokes a standard biblical way of speaking about God's covenantal
    association with the temple without implying that God is spatially confined there.
    Preserving the 'name' idiom maintains that theological nuance and avoids flattening
    the expression.
  doctrine_reference: Translation philosophy §1, §3
