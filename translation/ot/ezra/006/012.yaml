id: EZR.6.12
reference: Ezra 6:12
source:
  edition: WLC
  text: וֵֽ/אלָהָ֞/א דִּ֣י שַׁכִּ֧ן שְׁמֵ֣/הּ תַּמָּ֗ה יְמַגַּ֞ר כָּל מֶ֤לֶךְ וְ/עַם֙
    דִּ֣י יִשְׁלַ֣ח יְדֵ֗/הּ לְ/הַשְׁנָיָ֛ה לְ/חַבָּלָ֛ה בֵּית אֱלָהָ֥/א דֵ֖ךְ דִּ֣י
    בִ/ירוּשְׁלֶ֑ם אֲנָ֤ה דָרְיָ֨וֶשׁ֙ שָׂ֣מֶת טְעֵ֔ם אָסְפַּ֖רְנָא יִתְעֲבִֽד־׀־׃פ
translation:
  text: And may the God who has caused his name to dwell there overthrow any king
    or people who stretches out his hand to alter this, to destroy this house of God
    that is in Jerusalem. I, Darius, have issued a decree; let it be done with all
    diligence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has set his name there.' The Aramaic idiom refers to God's covenantal
      identification of the temple as the place associated with his name.
    reason: lexical_alternative
  - marker: b
    text: Or 'speedily.' The adverb can emphasize prompt execution; 'with all diligence'
      brings out both promptness and careful compliance.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁכִּן שְׁמֵהּ תַּמָּה
  chosen: has caused his name to dwell there
  alternatives:
  - has made his name dwell there
  - has set his name there
  lexicon: HALOT
  rationale: The Aramaic idiom speaks of God causing his name to reside in a place,
    a covenantal-temple expression. 'Has caused his name to dwell there' preserves
    the verbal force and the theological idiom better than the flatter 'has set his
    name there.'
- source_word: יְמַגַּר
  chosen: overthrow
  alternatives:
  - destroy
  - tear down
  lexicon: HALOT
  rationale: The verb here expresses bringing down or overthrowing in judgment. 'Overthrow'
    fits the curse-like royal formulation directed against any king or people who
    would oppose the decree.
- source_word: כָּל מֶלֶךְ וְעַם
  chosen: any king or people
  alternatives:
  - every king and people
  - any king and any people
  lexicon: HALOT
  rationale: In context this is a general malediction against whoever might oppose
    the decree. 'Any king or people' is idiomatic English and preserves the distributive
    sense.
- source_word: יִשְׁלַח יְדֵהּ
  chosen: stretches out his hand
  alternatives:
  - puts forth his hand
  - raises his hand
  lexicon: HALOT
  rationale: This is a common Semitic idiom for taking action against something. 'Stretches
    out his hand' is a natural English equivalent that preserves the metaphor.
- source_word: לְהַשְׁנָיָה
  chosen: to alter this
  alternatives:
  - to change this
  - to modify this
  lexicon: HALOT
  rationale: The infinitive refers to changing or altering the decree/arrangement.
    'Alter this' is concise and fits the legal-administrative context.
- source_word: לְחַבָּלָה בֵּית אֱלָהָא
  chosen: to destroy this house of God
  alternatives:
  - to damage the house of God
  - to ruin the house of God
  lexicon: HALOT
  rationale: The verb denotes ruining or destroying. Since the object is the temple,
    'destroy' best conveys the severity of the threatened action.
- source_word: דֵךְ
  chosen: this
  alternatives:
  - that
  lexicon: HALOT
  rationale: The demonstrative points to the specific temple under discussion. 'This'
    reflects the immediacy of the decree's perspective.
- source_word: שָׂמֶת טְעֵם
  chosen: have issued a decree
  alternatives:
  - have made a decree
  - have set forth an edict
  lexicon: HALOT
  rationale: The phrase is an imperial-administrative formula. 'Have issued a decree'
    is clear modern English while preserving the official force.
- source_word: אָסְפַּרְנָא
  chosen: with all diligence
  alternatives:
  - speedily
  - carefully and promptly
  lexicon: HALOT
  rationale: The adverb conveys promptness and thoroughness in carrying out the decree.
    'With all diligence' captures both urgency and seriousness better than merely
    'speedily.'
- source_word: יִתְעֲבִד
  chosen: let it be done
  alternatives:
  - it shall be done
  - let it be carried out
  lexicon: HALOT
  rationale: The passive/imperfect in this closing formula functions jussively. 'Let
    it be done' preserves the authoritative imperative tone.
