theological_decisions:
- issue: Corporate scope of 'all Israel' in the post-exilic setting
  chosen_reading: Retain 'for all Israel' without narrowing it to only the returned
    exiles.
  alternative_readings:
  - for all the returned exiles
  - for the whole covenant people represented symbolically
  rationale: The text explicitly says 'all Israel' and immediately grounds the number
    twelve in the tribes of Israel. The translation preserves that covenant-wide scope
    without importing a more restrictive historical interpretation into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
