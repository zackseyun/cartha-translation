id: EZR.6.17
reference: Ezra 6:17
source:
  edition: WLC
  text: וְ/הַקְרִ֗בוּ לַ/חֲנֻכַּת֮ בֵּית אֱלָהָ֣/א דְנָה֒ תּוֹרִ֣ין מְאָ֔ה דִּכְרִ֣ין
    מָאתַ֔יִן אִמְּרִ֖ין אַרְבַּ֣ע מְאָ֑ה וּ/צְפִירֵ֨י עִזִּ֜ין ל/חטיא עַל כָּל יִשְׂרָאֵל֙
    תְּרֵֽי עֲשַׂ֔ר לְ/מִנְיָ֖ן שִׁבְטֵ֥י יִשְׂרָאֵֽל־־־־׃
translation:
  text: And they offered for the dedication of this house of God one hundred bulls,
    two hundred rams, four hundred lambs, and as a sin offering for all Israel, twelve
    male goats, according to the number of the tribes of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on behalf of all Israel.'
    reason: lexical_alternative
  - marker: b
    text: The twelve male goats correspond to the twelve tribes of Israel, expressing
      the offering's representative scope.
    reason: cultural_note
lexical_decisions:
- source_word: וְהַקְרִבוּ
  chosen: And they offered
  alternatives:
  - And they presented
  - And they brought near
  lexicon: HALOT
  rationale: The verb from קרב in the causative stem commonly denotes presenting or
    offering sacrificial animals. 'Offered' best fits the cultic context in natural
    English.
- source_word: לַחֲנֻכַּת
  chosen: for the dedication
  alternatives:
  - at the dedication
  - for the consecration
  lexicon: HALOT
  rationale: חנכה denotes a dedication or inauguration. 'For the dedication' reflects
    the lamed preposition and the ceremonial purpose.
- source_word: בֵּית אֱלָהָא דְנָה
  chosen: of this house of God
  alternatives:
  - of this temple of God
  - of this house belonging to God
  lexicon: HALOT
  rationale: Literally 'house of this God/this house of God' in Imperial Aramaic idiom.
    'House of God' preserves the source wording; 'temple' is possible but less formally
    aligned.
- source_word: תּוֹרִין
  chosen: bulls
  alternatives:
  - oxen
  - young bulls
  lexicon: HALOT
  rationale: In sacrificial lists this term refers to bovines offered in sacrifice.
    'Bulls' is the clearest idiomatic rendering in English.
- source_word: דִּכְרִין
  chosen: rams
  alternatives:
  - male sheep
  lexicon: HALOT
  rationale: The Aramaic term denotes male sheep; in sacrificial English 'rams' is
    the standard and concise rendering.
- source_word: אִמְּרִין
  chosen: lambs
  alternatives:
  - young sheep
  lexicon: HALOT
  rationale: This term denotes lambs or young sheep. 'Lambs' is the most natural rendering
    in a sacrificial inventory.
- source_word: וּצְפִירֵי עִזִּין
  chosen: male goats
  alternatives:
  - goat bucks
  - he-goats
  lexicon: HALOT
  rationale: The construct phrase specifies goats, specifically males. 'Male goats'
    is clear modern English; 'he-goats' is accurate but less natural.
- source_word: לחטיא
  chosen: as a sin offering
  alternatives:
  - for a sin offering
  - for purification from sin
  lexicon: HALOT
  rationale: The form is a sacrificial term related to sin/purification offering.
    'As a sin offering' is the standard concise rendering and fits the list structure.
- source_word: עַל כָּל יִשְׂרָאֵל
  chosen: for all Israel
  alternatives:
  - on behalf of all Israel
  lexicon: HALOT
  rationale: The preposition here conveys representation or benefit. 'For all Israel'
    is natural while preserving the corporate scope.
- source_word: תְּרֵי עֲשַׂר
  chosen: twelve
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: לְמִנְיָן שִׁבְטֵי יִשְׂרָאֵל
  chosen: according to the number of the tribes of Israel
  alternatives:
  - corresponding to the number of the tribes of Israel
  - by the count of the tribes of Israel
  lexicon: HALOT
  rationale: This phrase explains why twelve goats were offered. 'According to the
    number' is idiomatic and preserves the explanatory force of the Aramaic.
