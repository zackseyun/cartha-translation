id: EZR.6.10
reference: Ezra 6:10
source:
  edition: WLC
  text: דִּֽי לֶהֱוֺ֧ן מְהַקְרְבִ֛ין נִיחוֹחִ֖ין לֶ/אֱלָ֣הּ שְׁמַיָּ֑/א וּ/מְצַלַּ֕יִן
    לְ/חַיֵּ֥י מַלְכָּ֖/א וּ/בְנֽוֹ/הִי־׃
translation:
  text: so that they may offer pleasing aromas to the God of heaven and pray for the
    life of the king and his sons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sweet aromas' or 'soothing aromas.' The Aramaic term refers to the pleasing
      aroma of acceptable sacrifices.
    reason: lexical_alternative
  - marker: b
    text: Or 'for the welfare of the king and his sons.' Literally, 'for the life
      of the king and his sons.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּי
  chosen: so that
  alternatives:
  - that
  - in order that
  lexicon: HALOT
  rationale: Here the Aramaic particle introduces purpose, linking the royal provision
    to its intended result. 'So that' gives clear English purpose sense.
- source_word: לֶהֱוֺן
  chosen: they may
  alternatives:
  - they would be
  - they might be
  lexicon: HALOT
  rationale: This form functions with the following participles to express a modal/purposive
    sense. In English, 'they may' naturally carries the intended jussive/purpose nuance.
- source_word: מְהַקְרְבִין
  chosen: offer
  alternatives:
  - present
  - bring near
  lexicon: HALOT
  rationale: The participle from קרב in sacrificial context refers to presenting offerings.
    'Offer' is idiomatic and preserves the cultic sense without over-literal awkwardness.
- source_word: נִיחוֹחִין
  chosen: pleasing aromas
  alternatives:
  - sweet savor offerings
  - soothing aromas
  - pleasing odors
  lexicon: HALOT
  rationale: The noun denotes soothing/pleasing aroma associated with acceptable sacrifice.
    'Pleasing aromas' is natural modern English and preserves the sacrificial imagery
    better than a flattened 'sacrifices.'
- source_word: לֶאֱלָהּ שְׁמַיָּא
  chosen: to the God of heaven
  alternatives:
  - before the God of heaven
  - for the God of heaven
  lexicon: HALOT
  rationale: The lamed with 'God of heaven' is well rendered 'to' in the context of
    offering sacrifices. 'God of heaven' is a standard title in Ezra and should be
    preserved.
- source_word: וּמְצַלַּיִן
  chosen: and pray
  alternatives:
  - and be praying
  - and intercede
  lexicon: HALOT
  rationale: The participle denotes prayer. 'And pray' fits the coordinated purpose
    sequence with 'offer' and reads smoothly in English.
- source_word: לְחַיֵּי
  chosen: for the life of
  alternatives:
  - for the well-being of
  - for the welfare of
  lexicon: HALOT
  rationale: Literally 'for the life/lives of.' In royal petition context this can
    imply welfare or preservation, but 'for the life of' stays closer to the source
    while remaining intelligible.
- source_word: מַלְכָּא
  chosen: the king
  alternatives:
  - the emperor
  lexicon: HALOT
  rationale: The Aramaic term is the ordinary word for 'king.' Although the referent
    is the Persian emperor, 'king' matches the source wording and Ezra's usage.
- source_word: וּבְנֹוהִי
  chosen: and his sons
  alternatives:
  - and his children
  lexicon: HALOT
  rationale: The noun specifically denotes sons, not children generally. The masculine
    plural should be retained as gender-accurate per translation philosophy.
