theological_decisions:
- issue: Cultic expression נִיחוֹחִין in a Persian royal decree concerning temple
    offerings
  chosen_reading: Rendered as 'pleasing aromas' rather than reducing it to 'sacrifices'
    or importing later theological terminology.
  alternative_readings:
  - sweet savor offerings
  - acceptable sacrifices
  rationale: The phrase refers to the aroma of acceptable offerings and should retain
    sacrificial imagery without paraphrastic expansion. This preserves the text's
    cultic language while remaining readable.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
- issue: Gendered filial term in reference to the king's offspring
  chosen_reading: Rendered 'his sons.'
  alternative_readings:
  - his children
  rationale: The source is specifically masculine plural, and the doctrine requires
    gender-accurate rendering rather than neutralization where the source is specific.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
