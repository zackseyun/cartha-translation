id: EZR.6.15
reference: Ezra 6:15
source:
  edition: WLC
  text: וְ/שֵׁיצִיא֙ בַּיְתָ֣/ה דְנָ֔ה עַ֛ד י֥וֹם תְּלָתָ֖ה לִ/ירַ֣ח אֲדָ֑ר דִּי הִ֣יא
    שְׁנַת שֵׁ֔ת לְ/מַלְכ֖וּת דָּרְיָ֥וֶשׁ מַלְכָּֽ/א־־׃פ
translation:
  text: And this house was finished by the third day of the month Adar, which was
    the sixth year of the reign of King Darius.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'this temple.' The Aramaic reads literally 'this house,' a common designation
      for the temple in Ezra.
    reason: lexical_alternative
  - marker: b
    text: Or, 'on the third day of the month Adar.' The phrase may be understood as
      the date on which completion occurred.
    reason: alternative_reading
lexical_decisions:
- source_word: וְשֵׁיצִיא
  chosen: was finished
  alternatives:
  - was completed
  - they finished
  lexicon: HALOT
  rationale: The Aramaic verb from יצא/שיצא in this stem and context denotes bringing
    a building project to completion. An English passive, 'was finished,' best reflects
    the form and keeps the focus on the temple rather than the builders. 'Was completed'
    is possible, but 'finished' is more natural and direct.
- source_word: בַּיְתָה דְנָה
  chosen: this house
  alternatives:
  - this temple
  lexicon: HALOT
  rationale: Literally 'this house.' In Ezra, 'house' commonly refers to the temple,
    but retaining 'house' preserves the source wording while remaining clear in context.
- source_word: עַד יוֹם תְּלָתָה
  chosen: by the third day
  alternatives:
  - until the third day
  - on the third day
  lexicon: HALOT
  rationale: The preposition עַד with a date expression can mark the point up to which
    the work continued, idiomatically rendered in English as 'by the third day.' 'On
    the third day' is also possible, but 'by' better captures completion reached at
    that point.
- source_word: לִירַח אֲדָר
  chosen: of the month Adar
  alternatives:
  - in the month Adar
  lexicon: HALOT
  rationale: The Aramaic phrase literally means 'of the month Adar.' This is the most
    straightforward rendering in English date style.
- source_word: דִּי הִיא
  chosen: which was
  alternatives:
  - that was
  lexicon: HALOT
  rationale: This relative clause links the date just given with the regnal year.
    'Which was' is smooth modern English and accurately reflects the syntax.
- source_word: שְׁנַת שֵׁת
  chosen: the sixth year
  alternatives:
  - year six
  lexicon: HALOT
  rationale: Standard English rendering of the ordinal/regnal-year expression.
- source_word: לְמַלְכוּת
  chosen: of the reign of
  alternatives:
  - of the kingdom of
  - of the kingship of
  lexicon: HALOT
  rationale: In this chronological formula, the noun refers to royal rule in the sense
    of a regnal year. 'Of the reign of' is the idiomatic English equivalent.
- source_word: דָּרְיָוֶשׁ מַלְכָּא
  chosen: King Darius
  alternatives:
  - Darius the king
  lexicon: HALOT
  rationale: Both are accurate. 'King Darius' is more natural in contemporary English,
    while preserving the royal title explicitly present in the Aramaic.
