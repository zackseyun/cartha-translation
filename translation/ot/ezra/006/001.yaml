id: EZR.6.1
reference: Ezra 6:1
source:
  edition: WLC
  text: בֵּ/אדַ֛יִן דָּרְיָ֥וֶשׁ מַלְכָּ֖/א שָׂ֣ם טְעֵ֑ם וּ/בַקַּ֣רוּ בְּ/בֵ֣ית סִפְרַיָּ֗/א
    דִּ֧י גִנְזַיָּ֛/א מְהַחֲתִ֥ין תַּמָּ֖ה בְּ/בָבֶֽל׀׃
translation:
  text: Then King Darius issued a decree, and they searched in the house of the archives,
    where the treasures were stored there in Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Darius the king made a decree, and a search was made in the archive
      house.' The Aramaic more literally reads 'set a decree' and uses a third-person
      plural verb ('they searched'), which may function impersonally.
    reason: alternative_reading
  - marker: b
    text: '''House of the archives'' is literally ''house of the books/documents,''
      referring to an official records repository.'
    reason: lexical_alternative
  - marker: c
    text: '''Treasures'' may also be understood more broadly as stored valuables or
      deposits kept in the archive complex.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  chosen: Then
  alternatives:
  - At that time
  - Thereupon
  lexicon: HALOT
  rationale: Aramaic discourse marker introducing the next event in sequence. 'Then'
    is natural modern English and preserves the narrative progression.
- source_word: דָּרְיָוֶשׁ מַלְכָּא
  chosen: King Darius
  alternatives:
  - Darius the king
  lexicon: HALOT
  rationale: Name is transliterated and title translated per project philosophy. English
    idiom favors 'King Darius,' though 'Darius the king' would be more formally aligned.
- source_word: שָׂם טְעֵם
  chosen: issued a decree
  alternatives:
  - gave an order
  - set a decree
  - made a decree
  lexicon: HALOT
  rationale: Literally 'set a decree/order.' 'Issued a decree' is idiomatic English
    for royal administrative action and fits the Persian court context without over-paraphrasing.
- source_word: וּבַקַּרוּ
  chosen: they searched
  alternatives:
  - and they examined
  - and a search was made
  lexicon: HALOT
  rationale: The plural verb is active. The subject is indefinite/impersonal in context,
    but the Aramaic uses a 3mp form, best represented as 'they searched' rather than
    converting to passive.
- source_word: בְּבֵית סִפְרַיָּא
  chosen: in the house of the archives
  alternatives:
  - in the archive house
  - in the library
  - in the record office
  lexicon: HALOT
  rationale: Literally 'in the house of the books/documents.' In administrative context
    this denotes an archive repository. 'House of the archives' preserves the concrete
    imagery while remaining understandable.
- source_word: דִּי
  chosen: where
  alternatives:
  - which
  - that
  lexicon: HALOT
  rationale: Relative particle linking the archive house with the following clause.
    'Where' brings out the locative sense naturally in English.
- source_word: גִנְזַיָּא
  chosen: the treasures
  alternatives:
  - the treasury
  - the valuable documents
  - the stored valuables
  lexicon: HALOT
  rationale: The noun is related to treasures/valuables stored away. In this context
    of an archive building, it may refer broadly to deposited valuables or state stores.
    'The treasures' is the most straightforward lexical rendering, while the following
    participle clarifies storage.
- source_word: מְהַחֲתִין
  chosen: were stored
  alternatives:
  - were deposited
  - were laid up
  - were placed
  lexicon: HALOT
  rationale: Passive/resultative participle describing items kept in storage. 'Were
    stored' is clear modern English and suits an archival/treasury setting.
- source_word: תַּמָּה
  chosen: there
  alternatives:
  - therein
  lexicon: HALOT
  rationale: Locative adverb retained for emphasis. Although somewhat redundant in
    English after 'where,' it reflects the source text's explicit location marking.
- source_word: בְּבָבֶל
  chosen: in Babylon
  alternatives:
  - at Babylon
  lexicon: HALOT
  rationale: Standard rendering of the place name with preposition. 'In Babylon' is
    normal English usage.
