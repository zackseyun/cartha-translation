theological_decisions:
- issue: Nature of the cultic ordering in relation to Mosaic authority
  chosen_reading: The verse states that the priests and Levites were arranged for
    temple service in accordance with Mosaic written instruction.
  alternative_readings:
  - The verse could be read more loosely as merely customary organization rather than
    explicit scriptural conformity.
  rationale: The closing phrase explicitly grounds the arrangement in what is written
    in the Book of Moses, so the translation preserves that normative connection without
    expanding it into later doctrinal claims about canon or authorship beyond the
    text's wording.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
