id: EZR.6.18
reference: Ezra 6:18
source:
  edition: WLC
  text: וַ/הֲקִ֨ימוּ כָהֲנַיָּ֜/א בִּ/פְלֻגָּתְ/ה֗וֹן וְ/לֵוָיֵ/א֙ בְּ/מַחְלְקָ֣תְ/ה֔וֹן
    עַל עֲבִידַ֥ת אֱלָהָ֖/א דִּ֣י בִ/ירוּשְׁלֶ֑ם כִּ/כְתָ֖ב סְפַ֥ר מֹשֶֽׁה־׃פ
translation:
  text: And they set up the priests in their divisions and the Levites in their groups
    for the service of God that is in Jerusalem, as it is written in the Book of Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in their divisions' for both the priests and the Levites; the two Aramaic
      nouns are closely related organizational terms.
    reason: lexical_alternative
  - marker: b
    text: Or 'according to what is written in the Book of Moses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲקִימוּ
  chosen: they set up
  alternatives:
  - they appointed
  - they established
  lexicon: HALOT
  rationale: The verb from קום in the causative means to cause to stand, set in place,
    or appoint. 'Set up' preserves the concrete sense while fitting the context of
    assigning cultic personnel to their proper places.
- source_word: כָהֲנַיָּא
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of the Aramaic cognate of 'priests.' The definite
    sense is natural in context, referring to the known priestly body involved in
    temple service.
- source_word: בִּפְלֻגָּתְהוֹן
  chosen: in their divisions
  alternatives:
  - by their divisions
  - in their courses
  lexicon: HALOT
  rationale: The noun denotes divisions or assigned sections. 'Divisions' is clear
    modern English and matches the organizational sense of priestly ordering. 'Courses'
    is traditional but less transparent to modern readers.
- source_word: וְלֵוָיֵא
  chosen: and the Levites
  lexicon: HALOT
  rationale: Straightforward rendering of the temple assistants from the tribe of
    Levi.
- source_word: בְּמַחְלְקָתְהוֹן
  chosen: in their groups
  alternatives:
  - in their divisions
  - by their divisions
  - in their classes
  lexicon: HALOT
  rationale: The noun refers to divisions or assigned groupings. Because the previous
    priestly term is already rendered 'divisions,' 'groups' avoids awkward repetition
    while preserving the same organizational idea; the semantic overlap is noted here
    for auditability.
- source_word: עַל עֲבִידַת אֱלָהָא
  chosen: for the service of God
  alternatives:
  - over the service of God
  - for the work of God
  lexicon: HALOT
  rationale: The preposition plus noun can indicate assignment over or for a task.
    In idiomatic English, 'for the service of God' best conveys their appointment
    to temple duties without over-literal stiffness.
- source_word: דִּי בִירוּשְׁלֶם
  chosen: that is in Jerusalem
  alternatives:
  - in Jerusalem
  - which was in Jerusalem
  lexicon: HALOT
  rationale: The relative particle is retained with 'that is' to reflect the Aramaic
    construction linking God's service specifically to the Jerusalem temple context.
- source_word: כִּכְתָב
  chosen: as it is written
  alternatives:
  - according to what is written
  - according to the writing of
  lexicon: HALOT
  rationale: This idiom introduces conformity to written authority. 'As it is written'
    is natural English and preserves the appeal to scriptural norm.
- source_word: סְפַר מֹשֶׁה
  chosen: the Book of Moses
  alternatives:
  - the scroll of Moses
  lexicon: HALOT
  rationale: סְפַר can denote a written document or book/scroll. 'Book of Moses' is
    the established and intelligible English expression for the Mosaic written law
    corpus in this context.
