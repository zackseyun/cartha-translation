id: EZR.6.2
reference: Ezra 6:2
source:
  edition: WLC
  text: וְ/הִשְׁתְּכַ֣ח בְּ/אַחְמְתָ֗א בְּ/בִֽירְתָ֛/א דִּ֛י בְּ/מָדַ֥י מְדִינְתָּ֖/ה
    מְגִלָּ֣ה חֲדָ֑ה וְ/כֵן כְּתִ֥יב בְּ/גַוַּ֖/הּ דִּכְרוֹנָֽ/ה־׃פ
translation:
  text: 'And in Ecbatana, the fortress that is in the province of Media, a scroll
    was found, and this was written in it as a record:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "Achmetha," a closer transliteration of the Aramaic name for Ecbatana.
    reason: lexical_alternative
  - marker: b
    text: Or "citadel" for "fortress." The Aramaic term refers to a fortified royal
      or administrative complex.
    reason: lexical_alternative
  - marker: c
    text: Or "memorandum" for "record." The term denotes an official written remembrance
      or archival note.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִשְׁתְּכַח
  chosen: was found
  alternatives:
  - was discovered
  lexicon: HALOT
  rationale: Passive sense of the Aramaic verb 'to be found' fits the archival context.
    'Was found' is the most natural and direct English rendering.
- source_word: אַחְמְתָא
  chosen: Ecbatana
  alternatives:
  - Achmetha
  lexicon: HALOT
  rationale: Standard English historical transliteration for the Median capital. 'Achmetha'
    more closely reflects the Aramaic form but is less recognizable in modern English.
- source_word: בִּירְתָא
  chosen: the fortress
  alternatives:
  - the citadel
  - the palace-fortress
  lexicon: HALOT
  rationale: The term denotes a fortified royal/administrative complex. 'Fortress'
    is clear and sufficiently broad; 'citadel' is possible but slightly less common
    in contemporary English.
- source_word: דִּי בְּמָדַי מְדִינְתָּה
  chosen: that is in the province of Media
  alternatives:
  - which was in the province of Media
  - in the province of Media
  lexicon: HALOT
  rationale: Renders the relative clause explicitly and preserves the administrative
    designation 'province of Media.'
- source_word: מְגִלָּה חֲדָה
  chosen: a scroll
  alternatives:
  - one scroll
  - a single scroll
  lexicon: HALOT
  rationale: The numeral/adjective can mark indefiniteness ('a certain/one'). In English
    archival narrative, 'a scroll' is idiomatic and sufficient without overemphasizing
    the numeral.
- source_word: וְכֵן כְּתִיב
  chosen: and this was written
  alternatives:
  - and thus it was written
  - and so it was written
  lexicon: HALOT
  rationale: Introduces the quoted memorandum. 'This was written' is natural English
    and captures the deictic force before the citation.
- source_word: בְּגַוַּהּ
  chosen: in it
  alternatives:
  - within it
  - inside it
  lexicon: HALOT
  rationale: Simple locative reference to the scroll. 'In it' is the most natural
    English expression.
- source_word: דִּכְרוֹנָה
  chosen: as a record
  alternatives:
  - memorandum
  - record
  - memorial
  lexicon: HALOT
  rationale: In this administrative context the noun refers to an official written
    record or memorandum. 'As a record' reads naturally in English while preserving
    the documentary sense.
