id: EZR.6.13
reference: Ezra 6:13
source:
  edition: WLC
  text: אֱ֠דַיִן תַּתְּנַ֞י פַּחַ֧ת עֲבַֽר נַהֲרָ֛/ה שְׁתַ֥ר בּוֹזְנַ֖י וּ/כְנָוָתְ/ה֑וֹן
    לָ/קֳבֵ֗ל דִּֽי שְׁלַ֞ח דָּרְיָ֧וֶשׁ מַלְכָּ֛/א כְּנֵ֖מָא אָסְפַּ֥רְנָא עֲבַֽדוּ־־׃
translation:
  text: Then Tattenai, the governor of Beyond the River, Shethar-bozenai, and their
    associates did exactly so, in accordance with what King Darius had sent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did it carefully' or 'carried it out with all exactness.' The Aramaic
      expression emphasizes precise compliance with the king's directive.
    reason: lexical_alternative
  - marker: b
    text: '''Beyond the River'' was the Persian administrative term for the region
      west of the Euphrates.'
    reason: cultural_note
lexical_decisions:
- source_word: אֱדַיִן
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Common Aramaic discourse marker introducing the next event in sequence;
    'Then' is natural modern English and preserves narrative flow.
- source_word: פַּחַת עֲבַר נַהֲרָה
  chosen: the governor of Beyond the River
  alternatives:
  - the governor of Trans-Euphrates
  - the governor of the province Beyond the River
  lexicon: HALOT
  rationale: פַּחַת denotes a provincial governor. עֲבַר נַהֲרָה is the Persian imperial
    regional designation 'Beyond the River' (from the Mesopotamian/Persian perspective).
    Retaining the title-like geographic expression is more transparent to the source
    than replacing it with a purely interpretive modern label.
- source_word: שְׁתַר בּוֹזְנַי
  chosen: Shethar-bozenai
  alternatives:
  - Shetar-bozenai
  rationale: Personal name is transliterated per project philosophy. Hyphenation reflects
    conventional English presentation of the compound name.
- source_word: וּכְנָוָתְהוֹן
  chosen: and their associates
  alternatives:
  - and their companions
  - and their colleagues
  lexicon: HALOT
  rationale: The term refers to those aligned with or accompanying them in official
    capacity. 'Associates' fits the administrative context better than the more generic
    'companions'.
- source_word: לָקֳבֵל דִּי
  chosen: in accordance with what
  alternatives:
  - according to what
  - corresponding to what
  lexicon: HALOT
  rationale: This idiom introduces conformity to an order or directive. 'In accordance
    with what' is idiomatic English and preserves the sense of compliance.
- source_word: שְׁלַח
  chosen: had sent
  alternatives:
  - sent
  - had issued
  lexicon: HALOT
  rationale: 'The verb is literally ''sent.'' English past perfect fits the sequence:
    Darius had sent the decree/order, and they acted in response. ''Issued'' is interpretive
    and less literal.'
- source_word: כְּנֵמָא אָסְפַּרְנָא
  chosen: exactly so
  alternatives:
  - carefully
  - diligently
  - with all exactness
  lexicon: HALOT
  rationale: The paired adverbial expression intensifies precision and prompt compliance.
    'Exactly so' captures the emphasis on exact conformity better than merely 'carefully,'
    while remaining natural English.
- source_word: עֲבַדוּ
  chosen: did
  alternatives:
  - acted
  - carried it out
  lexicon: HALOT
  rationale: A broad verb meaning 'did/made.' In context it refers to carrying out
    the king's directive. 'Did' works smoothly with 'exactly so' and avoids over-specifying
    an implied object.
