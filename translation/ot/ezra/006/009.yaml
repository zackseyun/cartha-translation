id: EZR.6.9
reference: Ezra 6:9
source:
  edition: WLC
  text: וּ/מָ֣ה חַשְׁחָ֡ן וּ/בְנֵ֣י תוֹרִ֣ין וְ/דִכְרִ֣ין וְ/אִמְּרִ֣ין לַ/עֲלָוָ֣ן
    לֶ/אֱלָ֪הּ שְׁמַיָּ֟/א חִנְטִ֞ין מְלַ֣ח חֲמַ֣ר וּ/מְשַׁ֗ח כְּ/מֵאמַ֨ר כָּהֲנַיָּ֤/א
    דִי בִ/ירֽוּשְׁלֶם֙ לֶהֱוֵ֨א מִתְיְהֵ֥ב לְ/הֹ֛ם י֥וֹם בְּ/י֖וֹם דִּי לָ֥א שָׁלֽוּ׀׀׀־׀־׃
translation:
  text: And whatever is needed—young bulls, rams, and lambs for burnt offerings to
    the God of heaven, wheat, salt, wine, and oil, according to the word of the priests
    who are in Jerusalem—let it be given to them day by day without neglect,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the instruction of the priests who are in Jerusalem.' The
      Aramaic phrase is literally 'according to the word of the priests.'
    reason: lexical_alternative
  - marker: b
    text: Or 'without fail' / 'so that there is no omission.' The final clause stresses
      that the daily provisions are not to lapse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָה
  chosen: whatever is needed
  alternatives:
  - and whatever
  - whatever
  lexicon: HALOT
  rationale: 'The conjunction plus interrogative/indefinite introduces an open-ended
    category: ''and whatever'' or idiomatically ''whatever is needed.'' The following
    noun specifies need, so the fuller English phrase best captures the sense.'
- source_word: חַשְׁחָן
  chosen: is needed
  alternatives:
  - is lacking
  - necessity
  lexicon: HALOT
  rationale: This Aramaic noun denotes need or requirement. In English, folding it
    into 'whatever is needed' is natural and preserves the administrative sense of
    required provisions.
- source_word: בְנֵי תוֹרִין
  chosen: young bulls
  alternatives:
  - bulls
  - sons of oxen
  lexicon: HALOT
  rationale: The idiom literally means 'sons of bulls/oxen' and refers to young bulls
    suitable for sacrifice. 'Young bulls' is the standard natural equivalent.
- source_word: דִכְרִין
  chosen: rams
  alternatives:
  - male sheep
  lexicon: HALOT
  rationale: The term denotes male sheep; in sacrificial lists 'rams' is the idiomatic
    and precise English rendering.
- source_word: אִמְּרִין
  chosen: lambs
  alternatives:
  - young lambs
  - lambs of the flock
  lexicon: HALOT
  rationale: This term refers to lambs. 'Lambs' fits the sacrificial inventory and
    reads naturally.
- source_word: לַעֲלָוָן
  chosen: for burnt offerings
  alternatives:
  - for ascent offerings
  - for offerings
  lexicon: HALOT
  rationale: The noun refers to burnt offerings, likely cognate with the Hebrew עלה
    concept of that which goes up. 'Burnt offerings' is the established and accurate
    cultic term.
- source_word: לֶאֱלָהּ שְׁמַיָּא
  chosen: to the God of heaven
  alternatives:
  - for the God of heaven
  lexicon: HALOT
  rationale: A standard Ezra-Aramaic title for Israel's God. 'To the God of heaven'
    fits the offering context, though 'for' would also be possible.
- source_word: חִנְטִין
  chosen: wheat
  alternatives:
  - grain
  lexicon: HALOT
  rationale: The word specifically denotes wheat, not grain in general.
- source_word: מְלַח
  chosen: salt
  lexicon: HALOT
  rationale: Straightforward lexical equivalent.
- source_word: חֲמַר
  chosen: wine
  lexicon: HALOT
  rationale: In this provisioning context the term denotes wine.
- source_word: וּמְשַׁח
  chosen: and oil
  alternatives:
  - and olive oil
  lexicon: HALOT
  rationale: The noun means oil, likely olive oil in context, but 'oil' is sufficient
    unless the source specifies otherwise.
- source_word: כְּמֵאמַר
  chosen: according to the word
  alternatives:
  - according to the command
  - according to the instruction
  lexicon: HALOT
  rationale: Literally 'according to the word/saying.' In administrative context it
    conveys authoritative instruction. I retained 'word' in the main text to stay
    close to the source while remaining intelligible.
- source_word: כָּהֲנַיָּא דִי בִירוּשְׁלֶם
  chosen: of the priests who are in Jerusalem
  alternatives:
  - of the priests in Jerusalem
  lexicon: HALOT
  rationale: The relative clause is straightforward; the slightly fuller rendering
    preserves the syntax.
- source_word: לֶהֱוֵא מִתְיְהֵב
  chosen: let it be given
  alternatives:
  - it shall be given
  - let there be given
  lexicon: HALOT
  rationale: The construction expresses an official directive. 'Let it be given' conveys
    the jussive/imperatival force in clear English.
- source_word: לְהֹם
  chosen: to them
  lexicon: HALOT
  rationale: Refers to the priests in Jerusalem as the recipients of the provisions.
- source_word: יוֹם בְּיוֹם
  chosen: day by day
  alternatives:
  - daily
  - each day
  lexicon: HALOT
  rationale: The idiom means a regular daily provision. 'Day by day' preserves the
    repetitive force.
- source_word: דִּי לָא שָׁלוּ
  chosen: without neglect
  alternatives:
  - without fail
  - that there be no omission
  lexicon: HALOT
  rationale: The phrase indicates that nothing should be omitted or lacking in the
    daily supply. 'Without neglect' captures the administrative sense of no lapse
    in provision.
