id: EZR.6.5
reference: Ezra 6:5
source:
  edition: WLC
  text: וְ֠/אַף מָאנֵ֣י בֵית אֱלָהָ/א֮ דִּ֣י דַהֲבָ֣/ה וְ/כַסְפָּ/א֒ דִּ֣י נְבֽוּכַדְנֶצַּ֗ר
    הַנְפֵּ֛ק מִן הֵיכְלָ֥/א דִי בִ/ירוּשְׁלֶ֖ם וְ/הֵיבֵ֣ל לְ/בָבֶ֑ל יַהֲתִיב֗וּן
    וִ֠/יהָךְ לְ/הֵיכְלָ֤/א דִי בִ/ירֽוּשְׁלֶם֙ לְ/אַתְרֵ֔/הּ וְ/תַחֵ֖ת בְּ/בֵ֥ית
    אֱלָהָֽ/א־־־־׃ס
translation:
  text: And also let the gold and silver vessels of the house of God, which Nebuchadnezzar
    took out from the temple that was in Jerusalem and brought to Babylon, be returned,
    and let each be brought to the temple that is in Jerusalem, to its place; and
    you shall put them in the house of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let them be restored, and let them go to the temple in Jerusalem, each
      to its place.' The Aramaic wording around 'and let each be brought/go' is somewhat
      difficult, but the sense is the restoration of the temple vessels to their proper
      places in Jerusalem.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאַף
  chosen: And also
  alternatives:
  - Moreover
  - Also
  lexicon: HALOT
  rationale: The conjunction plus additive particle introduces an additional decree
    item. 'And also' preserves the additive force without sounding overly formal.
- source_word: מָאנֵי
  chosen: vessels
  alternatives:
  - articles
  - utensils
  lexicon: HALOT
  rationale: Refers to temple objects/items used in worship or furnishing. 'Vessels'
    is the standard and suitably broad rendering in this cultic context.
- source_word: בֵית אֱלָהָא
  chosen: the house of God
  alternatives:
  - the temple of God
  lexicon: HALOT
  rationale: Literally 'house of God.' Since the verse later uses הֵיכְלָא for 'temple,'
    preserving 'house of God' here maintains the lexical distinction while still clearly
    referring to the temple complex.
- source_word: דִּי דַהֲבָה וְכַסְפָּא
  chosen: gold and silver
  alternatives:
  - of gold and silver
  lexicon: HALOT
  rationale: These genitives describe the material composition of the vessels. English
    idiom is smoother with 'the gold and silver vessels.'
- source_word: הַנְפֵּק
  chosen: took out
  alternatives:
  - brought out
  - removed
  lexicon: HALOT
  rationale: The verb denotes causing to go out/removing from the temple. 'Took out'
    is natural and fits the narrative sequence.
- source_word: הֵיכְלָא
  chosen: temple
  alternatives:
  - palace
  - sanctuary
  lexicon: HALOT
  rationale: In this context it clearly refers to the Jerusalem temple, not a royal
    palace. 'Temple' is the most transparent rendering.
- source_word: וְהֵיבֵל
  chosen: brought
  alternatives:
  - carried
  lexicon: HALOT
  rationale: Simple narrative verb of transporting the vessels to Babylon; 'brought'
    is idiomatic in English narrative.
- source_word: יַהֲתִיבוּן
  chosen: be returned
  alternatives:
  - be restored
  - be brought back
  lexicon: HALOT
  rationale: The passive/jussive sense in context is a royal command that the vessels
    be put back. 'Be returned' captures both restoration and destination.
- source_word: וִיהָךְ
  chosen: let each be brought
  alternatives:
  - and let them go
  - and let it go back
  lexicon: HALOT
  rationale: The form is difficult, but in context it continues the command of restoration
    toward Jerusalem. Rendering distributively as 'let each be brought' makes good
    sense with the following singular 'to its place' and avoids an awkward literalism.
- source_word: לְאַתְרֵהּ
  chosen: to its place
  alternatives:
  - to its site
  - to its proper place
  lexicon: HALOT
  rationale: Refers to the appropriate location of each vessel within the temple setting.
    'To its place' is concise and faithful.
- source_word: וְתַחֵת
  chosen: and you shall put them
  alternatives:
  - and set them down
  - and place them
  lexicon: HALOT
  rationale: Second masculine singular fits the king's directive to an official. 'You
    shall put them' preserves the direct imperative force in decree style.
- source_word: בְּבֵית אֱלָהָא
  chosen: in the house of God
  alternatives:
  - in the temple of God
  lexicon: HALOT
  rationale: Again literally 'house of God.' Repeating the phrase preserves the source
    wording and frames the temple as God's house.
