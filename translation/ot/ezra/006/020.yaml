id: EZR.6.20
reference: Ezra 6:20
source:
  edition: WLC
  text: כִּ֣י הִֽטַּהֲר֞וּ הַ/כֹּהֲנִ֧ים וְ/הַ/לְוִיִּ֛ם כְּ/אֶחָ֖ד כֻּלָּ֣/ם טְהוֹרִ֑ים
    וַ/יִּשְׁחֲט֤וּ הַ/פֶּ֨סַח֙ לְ/כָל בְּנֵ֣י הַ/גּוֹלָ֔ה וְ/לַ/אֲחֵי/הֶ֥ם הַ/כֹּהֲנִ֖ים
    וְ/לָ/הֶֽם־׃
translation:
  text: For the priests and the Levites had purified themselves as one; all of them
    were clean. And they slaughtered the Passover lamb for all the sons of the exile,
    and for their brothers the priests, and for themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for all the returned exiles' or 'for all the exilic community'; literally,
      'for all the sons of the exile.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces an explanatory clause giving the reason or basis for the following
    action. 'For' fits natural English while preserving the explanatory force.
- source_word: הִטַּהֲרוּ
  chosen: had purified themselves
  alternatives:
  - were purified
  - had cleansed themselves
  lexicon: HALOT
  rationale: The Hitpael form is reflexive, indicating the priests and Levites undertook
    ritual purification themselves. 'Had purified themselves' captures both reflexive
    sense and prior action relative to the slaughtering.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering for כהנים in cultic context.
- source_word: וְהַלְוִיִּם
  chosen: and the Levites
  lexicon: HALOT
  rationale: Standard rendering for the Levitical group distinct from the priests.
- source_word: כְּאֶחָד
  chosen: as one
  alternatives:
  - together
  - as one man
  lexicon: HALOT
  rationale: Expresses unity or unanimity. 'As one' is concise and preserves the idiomatic
    force without importing the more gendered traditional 'as one man.'
- source_word: כֻּלָּם טְהוֹרִים
  chosen: all of them were clean
  alternatives:
  - all of them were pure
  - all were ceremonially clean
  lexicon: HALOT
  rationale: טְהוֹרִים here refers to ritual cleanness in preparation for Passover.
    'Clean' is accessible English; the ritual sense is clear from context.
- source_word: וַיִּשְׁחֲטוּ
  chosen: they slaughtered
  alternatives:
  - they killed
  - they sacrificed
  lexicon: HALOT
  rationale: The verb denotes slaughtering an animal. 'Slaughtered' is more precise
    than 'killed' and avoids overinterpreting with 'sacrificed,' though sacrificial
    context is present.
- source_word: הַפֶּסַח
  chosen: the Passover lamb
  alternatives:
  - the Passover
  - the Passover sacrifice
  lexicon: HALOT
  rationale: In this context the term refers concretely to the Passover victim being
    slaughtered. 'Passover lamb' makes the implied object explicit in idiomatic English.
- source_word: לְכָל בְּנֵי הַגּוֹלָה
  chosen: for all the sons of the exile
  alternatives:
  - for all the children of the exile
  - for all the returned exiles
  - for all the exiles
  lexicon: HALOT
  rationale: Literally 'sons of the exile,' a communal designation for the returned
    exilic community. The main text keeps the familial idiom more closely; a smoother
    alternative is worth preserving in a footnote.
- source_word: וְלַאֲחֵיהֶם הַכֹּהֲנִים
  chosen: and for their brothers the priests
  alternatives:
  - and for their fellow priests
  - and for their brothers, the priests
  lexicon: HALOT
  rationale: Refers to the priests as the Levites' brothers within Israel's sacred
    service structure. The appositional phrase is retained rather than flattened to
    'fellow priests,' since the Levites are distinguished from priests in the verse.
- source_word: וְלָהֶם
  chosen: and for themselves
  alternatives:
  - and for them
  lexicon: HALOT
  rationale: The pronoun most naturally refers back to the Levites who performed the
    slaughtering, distinguishing them from 'their brothers the priests.' 'For themselves'
    makes the reflexive sense clear in English.
