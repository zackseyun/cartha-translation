theological_decisions:
- issue: Ritual purity terminology
  chosen_reading: Rendered טְהוֹרִים as 'clean' in a cultic sense, not moral purity.
  alternative_readings:
  - pure
  - ceremonially clean
  rationale: The verse concerns Passover preparation and priestly/Levitical qualification,
    so the purity is ritual rather than an abstract moral state. The translation avoids
    importing broader theological claims about inner holiness while preserving the
    cultic requirement.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    what the text states without importing doctrinal claims.'
- issue: Gendered communal designation in בְּנֵי הַגּוֹלָה
  chosen_reading: Kept 'sons of the exile' in the main text.
  alternative_readings:
  - children of the exile
  - returned exiles
  - exilic community
  rationale: Per the gender-accurate principle, the masculine plural construct is
    preserved where it functions as a communal designation. Because English readers
    may understand it corporately rather than male-only, a footnote preserves a more
    idiomatic alternative.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
