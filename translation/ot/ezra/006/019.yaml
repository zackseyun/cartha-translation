id: EZR.6.19
reference: Ezra 6:19
source:
  edition: WLC
  text: וַ/יַּעֲשׂ֥וּ בְנֵי הַ/גּוֹלָ֖ה אֶת הַ/פָּ֑סַח בְּ/אַרְבָּעָ֥ה עָשָׂ֖ר לַ/חֹ֥דֶשׁ
    הָ/רִאשֽׁוֹן־־׃
translation:
  text: And the sons of the exile kept the Passover on the fourteenth day of the first
    month.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the children of the exile' or 'the exiles.' The Hebrew idiom is literally
      'the sons of the exile.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  chosen: kept
  alternatives:
  - celebrated
  - observed
  - did
  lexicon: HALOT
  rationale: Although the verb is literally 'did/made,' with פֶּסַח as its object
    the idiomatic sense in English is 'kept' or 'celebrated' the Passover. 'Kept'
    preserves the covenantal/ritual sense without sounding wooden.
- source_word: בְנֵי
  chosen: sons of
  alternatives:
  - children of
  - people of
  lexicon: HALOT
  rationale: The construct phrase is literally 'sons of.' This is a genealogical/collective
    idiom. 'Sons of' is retained because it is the most source-near rendering and
    aligns with the gender-accurate policy; the phrase functions corporately rather
    than referring only to male individuals.
- source_word: הַגּוֹלָה
  chosen: the exile
  alternatives:
  - the captivity
  - the exiles
  - the returned exiles
  lexicon: HALOT
  rationale: The noun denotes the exile/exiled community. Rendering the full phrase
    as 'sons of the exile' preserves the Hebrew idiom and the communal identity of
    those returned from Babylon. 'Returned exiles' is interpretive and adds information
    not explicit in this verse alone.
- source_word: הַפָּסַח
  chosen: the Passover
  alternatives:
  - Passover sacrifice
  - Passover festival
  lexicon: HALOT
  rationale: In context the term refers to the Passover observance. 'The Passover'
    is the standard and sufficiently broad rendering, allowing the ritual/festival
    sense without over-specifying sacrifice or meal.
- source_word: בְּאַרְבָּעָה עָשָׂר
  chosen: on the fourteenth day
  alternatives:
  - on the fourteenth
  - at fourteen
  lexicon: HALOT
  rationale: The Hebrew gives the cardinal number 'fourteen' in a date formula. English
    idiom normally supplies 'day' for clarity in calendrical expressions.
- source_word: לַחֹדֶשׁ הָרִאשׁוֹן
  chosen: of the first month
  alternatives:
  - in the first month
  lexicon: HALOT
  rationale: This completes the date formula. 'Of the first month' fits naturally
    with 'the fourteenth day' and closely reflects the Hebrew construction.
