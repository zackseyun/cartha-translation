id: EZR.6.3
reference: Ezra 6:3
source:
  edition: WLC
  text: בִּ/שְׁנַ֨ת חֲדָ֜ה לְ/כ֣וֹרֶשׁ מַלְכָּ֗/א כּ֣וֹרֶשׁ מַלְכָּ/א֮ שָׂ֣ם טְעֵם֒
    בֵּית אֱלָהָ֤/א בִֽ/ירוּשְׁלֶם֙ בַּיְתָ֣/א יִתְבְּנֵ֔א אֲתַר֙ דִּֽי דָבְחִ֣ין
    דִּבְחִ֔ין וְ/אֻשּׁ֖וֹ/הִי מְסֽוֹבְלִ֑ין רוּמֵ/הּ֙ אַמִּ֣ין שִׁתִּ֔ין פְּתָיֵ֖/הּ
    אַמִּ֥ין שִׁתִּֽין־־׃
translation:
  text: 'In the first year of King Cyrus, Cyrus the king issued a decree: Concerning
    the house of God in Jerusalem, let the house be rebuilt, the place where they
    offer sacrifices, and let its foundations be laid. Its height shall be sixty cubits,
    and its width sixty cubits,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'let its foundations be retained/raised up.' The Aramaic phrase is difficult,
      and translations vary; 'let its foundations be laid' best fits the building
      context.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂם טְעֵם
  chosen: issued a decree
  alternatives:
  - made a decree
  - set forth a decree
  lexicon: HALOT
  rationale: The Aramaic idiom literally 'set a decree' means to promulgate an official
    ruling. 'Issued a decree' is natural modern English while preserving the formal
    administrative sense.
- source_word: בֵּית אֱלָהָא
  chosen: the house of God
  alternatives:
  - the temple of God
  lexicon: HALOT
  rationale: Literally 'house of God.' Although this refers to the temple, retaining
    'house' preserves the source wording and matches the repeated בַּיְתָא later in
    the verse.
- source_word: יִתְבְּנֵא
  chosen: let the house be rebuilt
  alternatives:
  - let the house be built
  - the house shall be rebuilt
  lexicon: HALOT
  rationale: The imperfect in this decree context has jussive/imperatival force. 'Rebuilt'
    fits the historical context of restoration after destruction, though the verb
    itself is simply 'be built'; the context warrants the English prefix without changing
    the sense.
- source_word: אֲתַר דִּי דָבְחִין דִּבְחִין
  chosen: the place where they offer sacrifices
  alternatives:
  - the place where sacrifices are sacrificed
  - the place for sacrificing sacrifices
  lexicon: HALOT
  rationale: This clause identifies the temple as the site of sacrificial worship.
    A smoother English rendering is needed because the Aramaic uses a verbal-nominal
    cognate expression.
- source_word: וְאֻשּׁוֹהִי מְסוֹבְלִין
  chosen: and let its foundations be laid
  alternatives:
  - and let its foundations be retained
  - and its foundations shall support
  lexicon: HALOT
  rationale: The phrase is difficult. In context of construction specifications, the
    most likely sense is that the temple's foundations are to be set/laid firmly.
    This is the standard contextual rendering and fits the following dimensions.
- source_word: רוּמֵהּ
  chosen: Its height
  alternatives:
  - its elevation
  lexicon: HALOT
  rationale: The noun denotes height. 'Height' is the straightforward architectural
    term in English.
- source_word: אַמִּין שִׁתִּין
  chosen: sixty cubits
  alternatives:
  - sixty cubits high
  lexicon: HALOT
  rationale: אַמָּה is the cubit, an ancient unit of length. Keeping 'cubits' preserves
    the historical measurement rather than converting to modern units.
- source_word: פְּתָיֵהּ
  chosen: its width
  alternatives:
  - its breadth
  lexicon: HALOT
  rationale: The noun refers to breadth/width. 'Width' is more natural in contemporary
    English while preserving the architectural sense.
