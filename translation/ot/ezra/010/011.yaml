theological_decisions:
- issue: Whether to render תודה here as thanksgiving/praise or confession
  chosen_reading: give thanks
  alternative_readings:
  - make confession
  rationale: The Hebrew idiom can bear either nuance depending on context. Because the phrase is followed by commands to do God's will and separate from unlawful unions, the context includes acknowledgment of wrongdoing; however, the lexical form itself most straightforwardly means giving thanks/praise. To preserve the interpretive tension without overresolving it, the main text uses 'give thanks' and the alternative is footnoted.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
