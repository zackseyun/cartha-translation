id: EZR.10.11
reference: Ezra 10:11
source:
  edition: WLC
  text: וְ/עַתָּ֗ה תְּנ֥וּ תוֹדָ֛ה לַ/יהוָ֥ה אֱלֹהֵֽי אֲבֹתֵי/כֶ֖ם וַ/עֲשׂ֣וּ רְצוֹנ֑/וֹ וְ/הִבָּֽדְלוּ֙ מֵ/עַמֵּ֣י הָ/אָ֔רֶץ וּ/מִן הַ/נָּשִׁ֖ים הַ/נָּכְרִיּֽוֹת־־׃
translation:
  text: So now give praise to Yahweh, the God of your fathers, and do his will. Separate yourselves from the peoples of the land and from the foreign women.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'make confession to the LORD.' The Hebrew idiom 'give thanks/confession' can carry either sense in context.
    reason: alternative_reading
  - marker: b
    text: Or 'from the foreign wives.' The broader context concerns marriages, though the Hebrew here says 'the foreign women.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּנ֥וּ תוֹדָ֛ה
  chosen: give thanks
  alternatives:
  - make confession
  - give praise
  lexicon: HALOT
  rationale: The idiom נתן תודה can mean to give thanks/praise or, in some contexts, to make confession. In this context Shecaniah is calling for acknowledgment before God that leads to obedient action; 'give thanks' is the most natural English rendering of the Hebrew phrase as written, while 'make confession' is a plausible contextual alternative preserved in a footnote.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: אֱלֹהֵי אֲבֹתֵיכֶם
  chosen: the God of your fathers
  alternatives:
  - the God of your ancestors
  lexicon: HALOT
  rationale: A formal rendering preserves the covenantal and ancestral language of the Hebrew. 'Fathers' matches the source and the project's gender-accurate policy.
- source_word: וַעֲשׂוּ רְצוֹנוֹ
  chosen: and do his will
  alternatives:
  - and do what pleases him
  - and carry out his desire
  lexicon: HALOT
  rationale: רצון commonly denotes will, pleasure, or desire. 'Do his will' is idiomatic, clear, and preserves the moral force of the command.
- source_word: וְהִבָּדְלוּ
  chosen: Separate yourselves
  alternatives:
  - be separated
  - set yourselves apart
  lexicon: HALOT
  rationale: The Niphal imperative/reflexive sense calls for the community's active withdrawal from prohibited associations. 'Separate yourselves' best captures the reflexive force in natural English.
- source_word: מֵעַמֵּי הָאָרֶץ
  chosen: from the peoples of the land
  alternatives:
  - from the peoples of the הארץ
  - from the people of the land
  lexicon: HALOT
  rationale: The plural construct עמי indicates multiple surrounding peoples, not a single collective 'people.' 'Of the land' preserves the Hebrew expression without overinterpreting it as specifically 'the land of Israel' or 'the surrounding lands.'
- source_word: וּמִן הַנָּשִׁים הַנָּכְרִיּוֹת
  chosen: and from the foreign women
  alternatives:
  - and from the foreign wives
  - and from the alien women
  lexicon: HALOT
  rationale: The Hebrew says 'the women, the foreign ones,' not explicitly 'wives' in this verse, though wives are in view in the broader context. 'Foreign women' is therefore the more textually precise main rendering; 'foreign wives' is preserved as a contextual alternative in a footnote.
