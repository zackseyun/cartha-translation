theological_decisions:
- issue: Ethnic/religious separation language in post-exilic covenant context
  chosen_reading: Render the prohibition straightforwardly as a ban on intermarriage
    and on seeking the peace/prosperity of the surrounding peoples in this specific
    covenant-historical setting, without softening or universalizing it.
  alternative_readings:
  - Soften to a general warning against spiritually harmful alliances
  - Expand into a timeless command about relations with outsiders
  rationale: The verse speaks within Ezra's post-exilic context about preserving covenant
    faithfulness and the holy seed from syncretism. The translation should neither
    mute the severity of the command nor import broader doctrinal applications not
    stated in the text.
  doctrine_reference: Translation philosophy items 1 and 3
