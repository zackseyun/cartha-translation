id: EZR.9.12
reference: Ezra 9:12
source:
  edition: WLC
  text: וְ֠/עַתָּה בְּֽנוֹתֵי/כֶ֞ם אַל תִּתְּנ֣וּ לִ/בְנֵי/הֶ֗ם וּ/בְנֹֽתֵי/הֶם֙ אַל
    תִּשְׂא֣וּ לִ/בְנֵי/כֶ֔ם וְ/לֹֽא תִדְרְשׁ֧וּ שְׁלֹמָ֛/ם וְ/טוֹבָתָ֖/ם עַד עוֹלָ֑ם
    לְמַ֣עַן תֶּחֶזְק֗וּ וַ/אֲכַלְתֶּם֙ אֶת ט֣וּב הָ/אָ֔רֶץ וְ/הוֹרַשְׁתֶּ֥ם לִ/בְנֵי/כֶ֖ם
    עַד עוֹלָֽם־־־־־־׃
translation:
  text: So now, do not give your daughters to their sons, and do not take their daughters
    for your sons. Never seek their peace or their prosperity, so that you may be
    strong and eat the good of the land and leave it as an inheritance to your sons
    forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'do not seek their peace or their good forever.'
    reason: lexical_alternative
  - marker: b
    text: Or 'leave it to your sons as an inheritance forever.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנוֹתֵיכֶם ... לִבְנֵיהֶם
  chosen: give your daughters to their sons
  alternatives:
  - give your daughters in marriage to their sons
  lexicon: HALOT
  rationale: The Hebrew literally says 'give your daughters to their sons.' In English
    this idiom refers to marriage, but the shorter rendering preserves the source
    structure without over-paraphrasing. The marital sense is clear from the parallel
    clause.
- source_word: וּבְנֹתֵיהֶם אַל תִּשְׂאוּ לִבְנֵיכֶם
  chosen: do not take their daughters for your sons
  alternatives:
  - do not take their daughters in marriage for your sons
  - do not take their daughters for your sons as wives
  lexicon: HALOT
  rationale: נשא here is the idiom for taking in marriage. 'For your sons' makes explicit
    the lamed phrase while keeping the Hebrew parallelism with the first clause.
- source_word: תִדְרְשׁוּ
  chosen: seek
  alternatives:
  - pursue
  - work for
  lexicon: HALOT
  rationale: דרש commonly means 'seek.' In this context it governs 'their peace and
    their prosperity,' conveying active concern for their welfare.
- source_word: שְׁלֹמָם
  chosen: their peace
  alternatives:
  - their welfare
  lexicon: HALOT
  rationale: שָׁלוֹם has a broad sense including peace and well-being. 'Peace' is
    the more direct lexical equivalent and preserves the familiar covenantal term;
    the broader sense is complemented by the following noun.
- source_word: וְטוֹבָתָם
  chosen: their prosperity
  alternatives:
  - their good
  - their welfare
  lexicon: HALOT
  rationale: טוֹבָה here refers to benefit or well-being. 'Prosperity' distinguishes
    it from 'peace' while reflecting material/social good in context.
- source_word: עַד עוֹלָם
  chosen: never
  alternatives:
  - forever
  - for all time
  lexicon: HALOT
  rationale: In the prohibition 'do not seek ... עד עולם,' the idiomatic force is
    durative and absolute. 'Never' communicates the prohibition naturally in English
    without losing the force of perpetual duration.
- source_word: לְמַעַן תֶּחֶזְקוּ
  chosen: so that you may be strong
  alternatives:
  - so that you may be strengthened
  - so that you may prevail
  lexicon: HALOT
  rationale: חזק in Qal can mean be strong or grow strong. 'You may be strong' is
    a natural English rendering that preserves the result/purpose sense introduced
    by לְמַעַן.
- source_word: וַאֲכַלְתֶּם אֶת טוּב הָאָרֶץ
  chosen: and eat the good of the land
  alternatives:
  - and enjoy the good of the land
  - and eat the produce of the land
  lexicon: HALOT
  rationale: The Hebrew literally says 'eat the good of the land,' an idiom for enjoying
    its bounty. Retaining 'eat' preserves the concrete imagery while remaining understandable.
- source_word: וְהוֹרַשְׁתֶּם
  chosen: leave it as an inheritance
  alternatives:
  - cause it to be inherited
  - bequeath it
  lexicon: HALOT
  rationale: 'The Hiphil of ירש here is causative: causing the land''s good or possession
    to pass to descendants. English expresses this most clearly as ''leave it as an
    inheritance,'' with ''it'' referring to the land''s good/possession in context.'
- source_word: לִבְנֵיכֶם
  chosen: to your sons
  alternatives:
  - to your children
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural 'sons.' Per the gender-accurate
    policy, the translation keeps 'sons' rather than neutralizing to 'children,' even
    though descendants are in view more broadly.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for all time
  - perpetually
  lexicon: HALOT
  rationale: At the end of the verse the phrase modifies the enduring inheritance
    across generations. 'Forever' is the most natural concise rendering.
