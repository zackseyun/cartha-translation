theological_decisions:
- issue: Rendering covenantal moral terms אַשְׁמָה and עָוֹן distinctly
  chosen_reading: Translate אַשְׁמָה as 'guilt' and עָוֹן as 'iniquities'
  alternative_readings:
  - Translate both broadly as 'sin'
  - Render אַשְׁמָה as 'trespass'
  rationale: The verse layers confession and judgment language. Distinguishing 'guilt'
    from 'iniquities' preserves the texture of Ezra's corporate confession without
    importing extra doctrinal nuance. This aligns with the project's preference for
    original-language primacy and documented consistency of key terms.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Corporate solidarity in confession
  chosen_reading: Retain 'we, our kings, and our priests' as a collective confession
  alternative_readings:
  - Restructure to minimize corporate identification
  rationale: The Hebrew explicitly includes the community and its leaders together
    under judgment. The translation preserves this theological and historical solidarity
    rather than softening it.
  doctrine_reference: Translation philosophy §1
