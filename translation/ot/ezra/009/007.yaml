id: EZR.9.7
reference: Ezra 9:7
source:
  edition: WLC
  text: מִ/ימֵ֣י אֲבֹתֵ֗י/נוּ אֲנַ֨חְנוּ֙ בְּ/אַשְׁמָ֣ה גְדֹלָ֔ה עַ֖ד הַ/יּ֣וֹם הַ/זֶּ֑ה
    וּ/בַ/עֲוֺנֹתֵ֡י/נוּ נִתַּ֡נּוּ אֲנַחְנוּ֩ מְלָכֵ֨י/נוּ כֹהֲנֵ֜י/נוּ בְּ/יַ֣ד
    מַלְכֵ֣י הָ/אֲרָצ֗וֹת בַּ/חֶ֜רֶב בַּ/שְּׁבִ֧י וּ/בַ/בִּזָּ֛ה וּ/בְ/בֹ֥שֶׁת פָּנִ֖ים
    כְּ/הַ/יּ֥וֹם הַ/זֶּֽה׀׃
translation:
  text: From the days of our fathers until this day, we have been in great guilt.
    Because of our iniquities, we, our kings, and our priests have been given into
    the hand of the kings of the lands, to the sword, to captivity, to plunder, and
    to shame of face, as it is this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to open shame' or 'to humiliation'; literally, 'to shame of face.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִימֵי אֲבֹתֵינוּ
  chosen: From the days of our fathers
  alternatives:
  - Since the days of our fathers
  - From the time of our fathers
  lexicon: HALOT
  rationale: The preposition מִן with יָמִים marks the starting point in time. 'From
    the days of our fathers' is a natural English rendering that preserves the idiom
    and the historical continuity Ezra is confessing.
- source_word: אֲנַחְנוּ בְּאַשְׁמָה גְדֹלָה
  chosen: we have been in great guilt
  alternatives:
  - we are in great guilt
  - we have been deeply guilty
  lexicon: HALOT
  rationale: אַשְׁמָה denotes guilt or guiltiness, not merely the feeling of shame.
    'In great guilt' keeps the covenantal-legal sense better than 'ashamed' or 'in
    great trespass.' The verbless clause is rendered with English present perfect
    to match the span 'from...until this day.'
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: until this day
  alternatives:
  - to this day
  lexicon: HALOT
  rationale: This temporal phrase marks continuation up to the present moment. 'Until
    this day' is idiomatic and preserves the formal tone.
- source_word: וּבַעֲוֹנֹתֵינוּ
  chosen: Because of our iniquities
  alternatives:
  - For our iniquities
  - In our iniquities
  - Because of our sins
  lexicon: HALOT
  rationale: עָוֹן often carries the sense of iniquity/guilt and its consequences.
    Here the prefixed ב is causal/instrumental in context, introducing the reason
    for the judgment. 'Because of our iniquities' best reflects that force.
- source_word: נִתַּנּוּ
  chosen: have been given
  alternatives:
  - were given
  - have been handed over
  lexicon: HALOT
  rationale: 'The Niphal of נָתַן is passive: ''be given/handed over.'' ''Have been
    given'' fits the continuing-result perspective of the verse; ''handed over'' is
    possible but slightly more interpretive.'
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  - under the control of
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for being delivered into someone's power.
    Retaining 'into the hand of' preserves the idiom while remaining understandable
    in English.
- source_word: מַלְכֵי הָאֲרָצוֹת
  chosen: the kings of the lands
  alternatives:
  - the kings of the countries
  - the kings of the earth
  lexicon: HALOT
  rationale: אֲרָצוֹת here refers to surrounding lands/nations rather than the whole
    earth. 'Lands' is more literal and contextually appropriate than 'earth.'
- source_word: בַּחֶרֶב
  chosen: to the sword
  alternatives:
  - to the sword's edge
  - to warfare
  lexicon: HALOT
  rationale: This judgment formula is commonly rendered 'to the sword.' It denotes
    death or devastation by warfare. The concise traditional phrasing remains clear
    and close to the Hebrew.
- source_word: בַּשְּׁבִי
  chosen: to captivity
  alternatives:
  - to exile
  - to captivity as prisoners
  lexicon: HALOT
  rationale: שְׁבִי denotes captivity/captive state. 'Captivity' is the most direct
    rendering; 'exile' would narrow the sense and overlap with later historical terminology.
- source_word: וּבַבִּזָּה
  chosen: to plunder
  alternatives:
  - to spoil
  - to looting
  lexicon: HALOT
  rationale: בִּזָּה refers to plunder/spoil taken by enemies. 'Plunder' is modern
    and clear; 'spoil' is more traditional but less immediately transparent.
- source_word: וּבְבֹשֶׁת פָּנִים
  chosen: to shame of face
  alternatives:
  - to open shame
  - to humiliation
  - to shamefacedness
  lexicon: HALOT
  rationale: The phrase literally means 'shame of face' and denotes public disgrace.
    Retaining the concrete expression preserves the Hebrew imagery; an explanatory
    alternative is worth noting in a footnote.
- source_word: כְּהַיּוֹם הַזֶּה
  chosen: as it is this day
  alternatives:
  - as at this day
  - as is the case today
  lexicon: HALOT
  rationale: This idiom compares the present condition with the just-described judgment.
    'As it is this day' is idiomatic English that preserves the demonstrative force.
