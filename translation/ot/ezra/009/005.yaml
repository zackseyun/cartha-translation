id: EZR.9.5
reference: Ezra 9:5
source:
  edition: WLC
  text: וּ/בְ/מִנְחַ֣ת הָ/עֶ֗רֶב קַ֚מְתִּי מִ/תַּֽעֲנִיתִ֔/י וּ/בְ/קָרְעִ֥/י בִגְדִ֖/י
    וּ/מְעִילִ֑/י וָֽ/אֶכְרְעָ/ה֙ עַל בִּרְכַּ֔/י וָ/אֶפְרְשָׂ֥/ה כַפַּ֖/י אֶל יְהוָ֥ה
    אֱלֹהָֽ/י־־׃
translation:
  text: At the evening offering I rose from my fasting, with my garment and my robe
    torn, and I fell on my knees and spread out my hands to the LORD my God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more specifically, 'At the evening grain offering.' The Hebrew term
      often refers to a grain offering, though here it can stand for the evening sacrificial
      time more generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְמִנְחַת הָעֶרֶב
  chosen: At the evening offering
  alternatives:
  - At the evening grain offering
  - At the offering of the evening
  lexicon: HALOT
  rationale: מִנְחָה can denote a gift, tribute, or grain offering; in temple context
    with הָעֶרֶב it refers to the regular evening offering. 'Offering' is clear modern
    English, while 'grain offering' is a possible more specific alternative preserved
    because מִנְחָה often has that cultic sense.
- source_word: קַמְתִּי
  chosen: I rose
  alternatives:
  - I arose
  - I stood up
  lexicon: HALOT
  rationale: The verb קום straightforwardly means to rise/stand up. 'I rose' is natural
    modern English and fits the narrative sequence.
- source_word: מִתַּעֲנִיתִי
  chosen: from my fasting
  alternatives:
  - from my affliction
  - from my self-humbling
  lexicon: HALOT
  rationale: תַּעֲנִית commonly denotes fasting, though derived from the idea of self-affliction/humiliation.
    In this context Ezra has been in a posture of mourning and abstinence; 'from my
    fasting' best captures the likely concrete practice without overexpanding.
- source_word: וּבְקָרְעִי בִגְדִי וּמְעִילִי
  chosen: with my garment and my robe torn
  alternatives:
  - while my garments and my robe were torn
  - with my clothes and my cloak torn
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב can express accompanying circumstance.
    The phrase refers to Ezra remaining in torn clothes as a sign of grief. 'Garment'
    for בֶּגֶד and 'robe' for מְעִיל preserve the distinction between the two items
    better than collapsing both into 'clothes.'
- source_word: וָאֶכְרְעָה עַל בִּרְכַּי
  chosen: and I fell on my knees
  alternatives:
  - and I knelt on my knees
  - and I bent my knees
  lexicon: HALOT
  rationale: כרע means to bend/kneel. English idiom favors 'fell on my knees' for
    a sudden act of prayerful collapse, matching the emotional force of the scene.
- source_word: וָאֶפְרְשָׂה כַפַּי
  chosen: and spread out my hands
  alternatives:
  - and spread out my palms
  - and stretched out my hands
  lexicon: HALOT
  rationale: פרשׂ with כף describes the prayer gesture of extending/opening the hands.
    'Spread out my hands' is idiomatic and preserves the physical imagery.
- source_word: אֶל יְהוָה אֱלֹהָי
  chosen: to the LORD my God
  alternatives:
  - to Yahweh my God
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The preposition אֶל is naturally
    'to' in this prayer context, and אֱלֹהַי is 'my God.'
