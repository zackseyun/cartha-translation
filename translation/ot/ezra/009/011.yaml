theological_decisions:
- issue: Nature of the land's defilement language
  chosen_reading: Render the verse in terms of impurity/uncleanness without narrowing
    it to merely ritual or merely moral categories.
  alternative_readings:
  - Render entirely as ritual impurity language
  - Render entirely as moral corruption language
  rationale: The verse uses terms that can carry ritual and moral-covenantal overtones
    together (נִדָּה, טֻמְאָה, תּוֹעֵבָה). The translation preserves that theological
    tension rather than collapsing the categories into one modern abstraction.
  doctrine_reference: Translation philosophy §3
