id: EZR.9.11
reference: Ezra 9:11
source:
  edition: WLC
  text: אֲשֶׁ֣ר צִוִּ֗יתָ בְּ/יַ֨ד עֲבָדֶ֣י/ךָ הַ/נְּבִיאִים֮ לֵ/אמֹר֒ הָ/אָ֗רֶץ אֲשֶׁ֨ר
    אַתֶּ֤ם בָּאִים֙ לְ/רִשְׁתָּ֔/הּ אֶ֤רֶץ נִדָּה֙ הִ֔יא בְּ/נִדַּ֖ת עַמֵּ֣י הָ/אֲרָצ֑וֹת
    בְּ/תוֹעֲבֹֽתֵי/הֶ֗ם אֲשֶׁ֥ר מִלְא֛וּ/הָ מִ/פֶּ֥ה אֶל פֶּ֖ה בְּ/טֻמְאָתָֽ/ם־׃
translation:
  text: which you commanded by the hand of your servants the prophets, saying, ‘The
    land that you are entering to possess is a land of impurity, because of the impurity
    of the peoples of the lands, because of their abominations, with which they have
    filled it from end to end with their uncleanness.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'from mouth to mouth,' an idiom meaning the land was filled
      completely, from one end to the other.
    reason: lexical_alternative
  - marker: b
    text: Or 'an unclean land' for 'a land of impurity.' The Hebrew term carries defilement
      language that may include both ritual and moral overtones.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיַד
  chosen: by the hand of
  alternatives:
  - through
  - by
  lexicon: HALOT
  rationale: Retains the common Hebrew idiom for agency while remaining natural in
    English. 'Through' is possible, but 'by the hand of' preserves the prophetic mediation
    more transparently.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: In this context the term refers honorifically to God's prophetic agents
    rather than emphasizing bonded status, so 'servants' best fits the register and
    sense.
- source_word: הַנְּבִיאִים
  chosen: the prophets
  lexicon: HALOT
  rationale: Standard rendering for נביאים; no contextual reason to vary.
- source_word: לְרִשְׁתָּהּ
  chosen: to possess
  alternatives:
  - to inherit
  - to take possession of
  lexicon: HALOT
  rationale: The verb ירשׁ often carries the sense of taking possession/inheriting
    the land. 'To possess' is concise and idiomatic here, while still preserving the
    covenant-land nuance.
- source_word: אֶרֶץ נִדָּה
  chosen: a land of impurity
  alternatives:
  - an unclean land
  - a land of uncleanness
  - a land of filthiness
  lexicon: HALOT
  rationale: נִדָּה can denote impurity/uncleanness, often with ritual overtones.
    'A land of impurity' preserves the abstract force and avoids over-specifying one
    kind of defilement.
- source_word: בְּנִדַּת עַמֵּי הָאֲרָצוֹת
  chosen: because of the impurity of the peoples of the lands
  alternatives:
  - with the uncleanness of the peoples of the lands
  - by the impurity of the peoples of the countries
  lexicon: HALOT
  rationale: 'The beth is taken causally/instrumentally in context: the land is impure
    on account of the impurity associated with its peoples. ''Peoples of the lands''
    preserves the plural and the ethnic-national scope.'
- source_word: בְּתוֹעֲבֹתֵיהֶם
  chosen: because of their abominations
  alternatives:
  - with their abominations
  - by their detestable practices
  lexicon: HALOT
  rationale: תוֹעֵבָה commonly denotes abominable or detestable practices, especially
    in covenantal/moral-religious contexts. 'Abominations' preserves the strong biblical
    register; the preposition is rendered in coordination with the previous causal
    phrase.
- source_word: מִלְאוּהָ
  chosen: they have filled it
  alternatives:
  - they filled it
  - they made it full
  lexicon: HALOT
  rationale: The perfect is rendered with English present perfect to fit the prayer's
    retrospective description of an existing condition.
- source_word: מִפֶּה אֶל־פֶּה
  chosen: from end to end
  alternatives:
  - from one end to the other
  - from mouth to mouth
  lexicon: HALOT
  rationale: Although literally 'from mouth to mouth,' the idiom here denotes spatial
    extent across the whole land. 'From end to end' communicates the sense clearly
    in modern English.
- source_word: בְּטֻמְאָתָם
  chosen: with their uncleanness
  alternatives:
  - with their impurity
  - by their uncleanness
  lexicon: HALOT
  rationale: טֻמְאָה denotes uncleanness/impurity. 'Uncleanness' here gives a slightly
    more concrete and forceful conclusion after the earlier abstract 'impurity,' while
    preserving the defilement theme.
