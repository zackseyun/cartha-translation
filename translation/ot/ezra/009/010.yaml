theological_decisions:
- issue: Tone of Ezra's confession
  chosen_reading: A rhetorical confession of guilt and speechlessness before God
  alternative_readings:
  - A simple request for guidance about what to say next
  rationale: The clause 'what can we say... for we have forsaken your commandments'
    is not neutral deliberation but penitential rhetoric. The translation preserves
    this tension without adding interpretive expansion beyond the Hebrew.
  doctrine_reference: Preserve theological tension rather than resolve it
