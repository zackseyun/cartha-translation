id: EZR.9.10
reference: Ezra 9:10
source:
  edition: WLC
  text: וְ/עַתָּ֛ה מַה נֹּאמַ֥ר אֱלֹהֵ֖י/נוּ אַֽחֲרֵי זֹ֑את כִּ֥י עָזַ֖בְנוּ מִצְוֺתֶֽי/ךָ־־׃
translation:
  text: And now, what can we say, our God, after this? For we have forsaken your commandments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what shall we say.' The Hebrew imperfect may be rendered more formally
      this way.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - But now
  - So now
  lexicon: HALOT
  rationale: Temporal-discursive transition introducing Ezra's next thought in prayer.
    'And now' preserves the connective ו plus the adverb עתה without overinterpreting
    the discourse relation.
- source_word: מַה נֹּאמַר
  chosen: what can we say
  alternatives:
  - what shall we say
  - what are we to say
  lexicon: HALOT
  rationale: The imperfect first common plural in this lament/prayer context expresses
    deliberative force rather than simple future. 'What can we say' communicates rhetorical
    helplessness in natural English.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  alternatives:
  - O our God
  lexicon: HALOT
  rationale: Possessive form with direct address in prayer. English punctuation supplies
    the vocative force; adding 'O' is possible but not required and would sound more
    archaic than the translation philosophy prefers.
- source_word: אַחֲרֵי זֹאת
  chosen: after this
  alternatives:
  - after this thing
  - after this event
  lexicon: HALOT
  rationale: Idiomatic temporal expression referring back to the reported sin and
    crisis. 'After this' is concise and natural while preserving the source sense.
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for Ezra's inability to speak. 'For' fits the explanatory
    relation and preserves the formal connection to the previous clause.
- source_word: עָזַבְנוּ
  chosen: have forsaken
  alternatives:
  - have abandoned
  - have left
  lexicon: HALOT
  rationale: עזב in covenantal/moral contexts carries the weight of abandoning or
    forsaking obligations. 'Forsaken' best preserves the gravity of covenant disobedience.
- source_word: מִצְוֺתֶיךָ
  chosen: your commandments
  alternatives:
  - your commands
  lexicon: HALOT
  rationale: Standard rendering for מצוות in covenantal contexts. 'Commandments' retains
    the formal and theological weight of divine instruction better than the slightly
    lighter 'commands'.
