id: EZR.9.2
reference: Ezra 9:2
source:
  edition: WLC
  text: כִּֽי נָשְׂא֣וּ מִ/בְּנֹֽתֵי/הֶ֗ם לָ/הֶם֙ וְ/לִ/בְנֵי/הֶ֔ם וְ/הִתְעָֽרְבוּ֙
    זֶ֣רַע הַ/קֹּ֔דֶשׁ בְּ/עַמֵּ֖י הָ/אֲרָצ֑וֹת וְ/יַ֧ד הַ/שָּׂרִ֣ים וְ/הַ/סְּגָנִ֗ים
    הָֽיְתָ֛ה בַּ/מַּ֥עַל הַ/זֶּ֖ה רִאשׁוֹנָֽה־׃ס
translation:
  text: For they have taken some of their daughters for themselves and for their sons,
    so that the holy seed has mixed itself with the peoples of the lands. And the
    hand of the officials and the deputies has been foremost in this unfaithfulness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have married some of their daughters.' The Hebrew says literally 'have
      taken from their daughters.'
    reason: lexical_alternative
  - marker: b
    text: '''The holy seed'' may also be rendered ''the holy offspring.'' The Hebrew
      preserves covenantal lineage language.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the hand of the officials and the deputies was first in this faithlessness,'
      an idiom meaning they were chiefly responsible.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָשְׂאוּ
  chosen: have taken
  alternatives:
  - have married
  - have taken in marriage
  lexicon: HALOT
  rationale: The verb literally means 'lift/carry/take,' but in this context with
    'daughters' and the dative phrases it refers to taking women in marriage. 'Have
    taken' preserves the Hebrew wording while allowing the marital sense to be inferred
    from context.
- source_word: מִבְּנֹתֵיהֶם
  chosen: some of their daughters
  alternatives:
  - their daughters
  - from their daughters
  lexicon: HALOT
  rationale: 'The preposition מִן is partitive here: they took from among the daughters
    of the surrounding peoples. ''Some of their daughters'' makes the partitive force
    natural in English.'
- source_word: לָהֶם וְלִבְנֵיהֶם
  chosen: for themselves and for their sons
  alternatives:
  - for them and for their sons
  lexicon: HALOT
  rationale: The lamed marks advantage/recipient. 'For themselves and for their sons'
    clearly conveys that both the men and their sons entered these marriages.
- source_word: וְהִתְעָרְבוּ
  chosen: has mixed itself
  alternatives:
  - has intermingled
  - has mingled
  lexicon: HALOT
  rationale: 'The hitpael conveys mixture/intermingling. Because the grammatical subject
    is singular ''seed,'' English idiom works best with singular agreement: ''has
    mixed itself.'''
- source_word: זֶרַע הַקֹּדֶשׁ
  chosen: the holy seed
  alternatives:
  - the holy offspring
  - the holy line
  lexicon: HALOT
  rationale: A formally close rendering is preferable here. 'Seed' preserves the covenantal/genealogical
    language of the Hebrew, even though 'offspring' is possible. It should not be
    flattened into a merely racial or biological term beyond the text's covenant-community
    context.
- source_word: בְּעַמֵּי הָאֲרָצוֹת
  chosen: with the peoples of the lands
  alternatives:
  - among the peoples of the lands
  - with the peoples of the countries
  lexicon: HALOT
  rationale: The phrase refers to the surrounding peoples in the various lands/regions.
    'Of the lands' keeps the plural and echoes the post-exilic setting better than
    the more modern 'countries.' 'With' fits the sense of intermixture.
- source_word: וְיַד
  chosen: the hand
  alternatives:
  - the influence
  - the involvement
  lexicon: HALOT
  rationale: Hebrew 'hand' is idiomatic for agency or active involvement. Retaining
    'the hand' preserves the metaphor and is still understandable in English.
- source_word: הַשָּׂרִים וְהַסְּגָנִים
  chosen: the officials and the deputies
  alternatives:
  - the princes and the rulers
  - the leaders and the prefects
  lexicon: HALOT
  rationale: These are administrative leaders. 'Officials and the deputies' gives
    clear modern English without overstating monarchical rank implied by older 'princes.'
- source_word: מַּעַל
  chosen: unfaithfulness
  alternatives:
  - treachery
  - faithlessness
  - transgression
  lexicon: HALOT
  rationale: מעל often denotes breach of faith, especially covenantal unfaithfulness.
    'Unfaithfulness' captures both the moral and covenantal dimensions better than
    the more generic 'transgression.'
- source_word: רִאשׁוֹנָה
  chosen: foremost
  alternatives:
  - first
  - chief
  lexicon: HALOT
  rationale: Here the adjective functions adverbially/predicatively to indicate leading
    responsibility. 'Foremost' communicates that the leaders were the primary offenders,
    not merely first in sequence.
