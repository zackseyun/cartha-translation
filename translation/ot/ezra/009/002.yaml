theological_decisions:
- issue: Meaning of 'the holy seed' in a passage about intermarriage
  chosen_reading: Retain the covenantal expression 'the holy seed' without expanding
    it into an ethnic or racial theory.
  alternative_readings:
  - Render as 'holy offspring' to reduce possible misunderstanding
  - Interpret as primarily ethnic purity language
  rationale: The phrase should be translated transparently and allowed to stand in
    its post-exilic covenant context. The verse concerns the distinctness of the holy
    community in relation to surrounding peoples and their practices; the translation
    should not import later racialized categories, nor should it paraphrase away the
    text's strong covenantal language.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering of leadership culpability
  chosen_reading: 'Translate the idiom to show that the leaders bore primary responsibility:
    ''the hand of the officials and the deputies has been foremost.'''
  alternative_readings:
  - '''the officials and deputies were the first in this trespass'''
  - '''the leaders took the lead in this unfaithfulness'''
  rationale: The Hebrew idiom with 'hand' and 'first/foremost' emphasizes agency and
    leading guilt. Preserving the idiom while making the sense clear best fits optimal
    equivalence.
  doctrine_reference: Translation philosophy §§1, 5, 6
