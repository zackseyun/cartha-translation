id: EZR.9.13
reference: Ezra 9:13
source:
  edition: WLC
  text: וְ/אַֽחֲרֵי֙ כָּל הַ/בָּ֣א עָלֵ֔י/נוּ בְּ/מַעֲשֵׂ֨י/נוּ֙ הָ/רָעִ֔ים וּ/בְ/אַשְׁמָתֵ֖/נוּ
    הַ/גְּדֹלָ֑ה כִּ֣י אַתָּ֣ה אֱלֹהֵ֗י/נוּ חָשַׂ֤כְתָּֽ לְ/מַ֨טָּה֙ מֵֽ/עֲוֺנֵ֔/נוּ
    וְ/נָתַ֥תָּה לָּ֛/נוּ פְּלֵיטָ֖ה כָּ/זֹֽאת־׀׃
translation:
  text: And after all that has come upon us because of our evil deeds and our great
    guilt—though you, our God, have punished us less than our iniquities deserve and
    have given us such a remnant as this—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'have spared us more than our iniquities warranted.' The Hebrew idiom
      literally speaks of God withholding judgment below the measure of their guilt.
    reason: lexical_alternative
  - marker: b
    text: Or, 'an escape' or 'survivors.' The term refers to those preserved through
      judgment; 'remnant' brings out the post-exilic covenant context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַחֲרֵי
  chosen: And after
  alternatives:
  - After
  lexicon: HALOT
  rationale: Introduces the clause as a continuation of Ezra's prayer. Retaining 'And'
    reflects the Hebrew conjunction and preserves the flow from the previous verse.
- source_word: כָּל הַבָּא עָלֵינוּ
  chosen: all that has come upon us
  alternatives:
  - all that has happened to us
  - all that came upon us
  lexicon: HALOT
  rationale: A natural rendering of the participial construction with על, expressing
    the totality of calamity experienced by the people. 'Come upon us' preserves the
    idiom more closely than 'happened to us.'
- source_word: בְּמַעֲשֵׂינוּ הָרָעִים
  chosen: because of our evil deeds
  alternatives:
  - for our evil deeds
  - through our evil acts
  lexicon: HALOT
  rationale: The preposition ב here is causal/instrumental in context. 'Because of'
    makes the causal force clear in English while preserving the moral emphasis of
    'evil deeds.'
- source_word: וּבְאַשְׁמָתֵנוּ הַגְּדֹלָה
  chosen: and our great guilt
  alternatives:
  - and our great trespass
  - and our great guiltiness
  lexicon: HALOT
  rationale: אַשְׁמָה denotes guilt or culpability, not merely a feeling of guilt.
    'Great guilt' is clear modern English and preserves the objective moral liability.
- source_word: כִּי
  chosen: though
  alternatives:
  - for
  - indeed
  - since
  lexicon: HALOT
  rationale: 'Here כִּי introduces a concessive nuance within Ezra''s prayer: despite
    the people''s guilt and the calamities suffered, God has shown mercy. ''Though''
    best captures the discourse function in English.'
- source_word: חָשַׂכְתָּ לְמַטָּה מֵעֲוֺנֵנוּ
  chosen: have punished us less than our iniquities deserve
  alternatives:
  - have withheld from below our iniquity
  - have spared us more than our iniquities warranted
  - have held back beneath our guilt
  lexicon: HALOT
  rationale: The verb חָשַׂךְ means 'withhold, spare.' In this context, with לְמַטָּה
    מִן, the sense is that God has not dealt with them to the full extent their sins
    merited. 'Punished us less than our iniquities deserve' expresses the idiom clearly
    and faithfully.
- source_word: עָוֺן
  chosen: iniquities
  alternatives:
  - sins
  - guilt
  lexicon: HALOT
  rationale: עָוֺן often carries the sense of guilt/iniquity as culpable wrongdoing.
    'Iniquities' preserves the gravity and avoids flattening it to the more general
    'sins.'
- source_word: וְנָתַתָּה לָּנוּ
  chosen: and have given us
  alternatives:
  - and gave us
  lexicon: HALOT
  rationale: The perfect is rendered with present relevance in English because Ezra
    is reflecting on God's recent merciful action with ongoing significance.
- source_word: פְּלֵיטָה
  chosen: a remnant
  alternatives:
  - an escape
  - those who have escaped
  - deliverance
  lexicon: HALOT
  rationale: פְּלֵיטָה can denote escape/survivors. In the post-exilic context, 'remnant'
    best captures the theological and historical sense of a surviving group preserved
    by God.
- source_word: כָּזֹאת
  chosen: such a remnant as this
  alternatives:
  - such as this
  - like this
  lexicon: HALOT
  rationale: The demonstrative intensifies the surprising mercy shown. Expanding slightly
    to 'such a remnant as this' makes clear what 'such as this' modifies in English.
