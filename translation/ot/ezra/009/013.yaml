theological_decisions:
- issue: Rendering of divine mercy in relation to deserved judgment
  chosen_reading: have punished us less than our iniquities deserve
  alternative_readings:
  - have spared us beyond our iniquity
  - have withheld from our iniquity below measure
  rationale: The Hebrew idiom emphasizes that God's judgment has been less than what
    the people's guilt warranted. This preserves both divine justice and mercy without
    importing later doctrinal formulations.
  doctrine_reference: Translation philosophy §3
- issue: Rendering פְּלֵיטָה in post-exilic context
  chosen_reading: a remnant
  alternative_readings:
  - an escape
  - survivors
  rationale: In Ezra's covenantal-historical setting, the preserved surviving community
    carries remnant significance. 'Remnant' reflects that theological-historical nuance
    while remaining lexically grounded.
  doctrine_reference: Translation philosophy §1
