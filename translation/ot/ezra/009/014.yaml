theological_decisions:
- issue: Characterization of the surrounding peoples in relation to 'abominations'
  chosen_reading: Render the phrase as referring to peoples identified by abominable
    practices, not as an essentialized ethnic slur.
  alternative_readings:
  - the peoples of these abominations
  - these abominable peoples
  rationale: The Hebrew construct phrase is compressed and could be rendered more
    literally, but the context in Ezra concerns prohibited practices and intermarriage
    tied to idolatry and impurity. The chosen rendering preserves the moral-religious
    basis of the prohibition without importing a claim about ethnic inferiority.
  doctrine_reference: Translation philosophy §1, §6
- issue: Retention of 'remnant' language
  chosen_reading: Keep 'remnant' in the main text.
  alternative_readings:
  - survivors
  - those left
  rationale: Although 'remnant' can sound traditional, it is an important biblical-theological
    term and is still readable in modern English. Preserving it maintains intertextual
    resonance with judgment-and-preservation themes in Ezra and the wider canon.
  doctrine_reference: Translation philosophy §5
