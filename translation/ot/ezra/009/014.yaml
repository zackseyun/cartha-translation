id: EZR.9.14
reference: Ezra 9:14
source:
  edition: WLC
  text: הֲ/נָשׁוּב֙ לְ/הָפֵ֣ר מִצְוֺתֶ֔י/ךָ וּ֨/לְ/הִתְחַתֵּ֔ן בְּ/עַמֵּ֥י הַ/תֹּעֵב֖וֹת
    הָ/אֵ֑לֶּה הֲ/ל֤וֹא תֶֽאֱנַף בָּ֨/נוּ֙ עַד כַּלֵּ֔ה לְ/אֵ֥ין שְׁאֵרִ֖ית וּ/פְלֵיטָֽה־־׃פ
translation:
  text: Shall we again break your commandments and intermarry with the peoples who
    practice these abominations? Would you not be angry with us until you had consumed
    us, leaving no remnant or survivor?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'with the peoples of these abominations.' The Hebrew
      likely means peoples characterized by such abominable practices.
    reason: lexical_alternative
  - marker: b
    text: Or 'leaving no remnant or escaped survivor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲנָשׁוּב
  chosen: Shall we again
  alternatives:
  - Shall we return
  - Should we turn back
  lexicon: HALOT
  rationale: The verb שוב literally means 'return/turn back.' In this rhetorical context,
    with the following infinitives describing renewed disobedience, English 'again'
    best captures the idiomatic sense of resuming former sinful behavior without awkwardness.
- source_word: לְהָפֵר
  chosen: break
  alternatives:
  - violate
  - nullify
  lexicon: HALOT
  rationale: הפר in covenantal/legal contexts means to break or violate. 'Break' is
    natural modern English and preserves the force of violating God's commands.
- source_word: מִצְוֺתֶיךָ
  chosen: your commandments
  alternatives:
  - your commands
  lexicon: HALOT
  rationale: מצוה is commonly rendered 'commandment.' The plural with 2ms suffix directly
    addresses God; 'your commandments' preserves the formal covenantal tone.
- source_word: וּלְהִתְחַתֵּן
  chosen: and intermarry
  alternatives:
  - and marry into
  - and make marriage alliances
  lexicon: HALOT
  rationale: The hitpael of חתן refers to entering marriage relations, especially
    with another group. 'Intermarry' succinctly conveys the reciprocal, group-level
    sense in context.
- source_word: בְּעַמֵּי הַתֹּעֵבוֹת הָאֵלֶּה
  chosen: with the peoples who practice these abominations
  alternatives:
  - with the peoples of these abominations
  - with these abominable peoples
  lexicon: HALOT
  rationale: Literally 'with the peoples of these abominations.' The genitive likely
    characterizes the peoples by their abominable practices rather than making an
    ontological statement about ethnicity. 'Who practice these abominations' makes
    the implied sense explicit and avoids suggesting the peoples themselves are the
    abominations.
- source_word: הֲלוֹא תֶאֱנַף בָּנוּ
  chosen: Would you not be angry with us
  alternatives:
  - Would you not be enraged against us
  lexicon: HALOT
  rationale: אנף denotes anger/wrath. 'Be angry with us' is idiomatic and fits the
    prayer's rhetorical question.
- source_word: עַד כַּלֵּה
  chosen: until you had consumed us
  alternatives:
  - until complete destruction
  - until finishing us off
  lexicon: HALOT
  rationale: כלה conveys bringing to an end, consuming, or destroying completely.
    Rendering with a finite English clause after 'until' communicates the result clearly
    in natural English.
- source_word: לְאֵין
  chosen: leaving no
  alternatives:
  - so that there would be no
  - to the point of no
  lexicon: HALOT
  rationale: 'The phrase introduces the result of total destruction: the absence of
    what follows. ''Leaving no'' is concise and idiomatic.'
- source_word: שְׁאֵרִית
  chosen: remnant
  alternatives:
  - surviving remnant
  lexicon: HALOT
  rationale: שְׁאֵרִית is a key biblical term for what remains after judgment. 'Remnant'
    preserves that theological and lexical resonance.
- source_word: וּפְלֵיטָה
  chosen: or survivor
  alternatives:
  - or escape
  - or escaped one
  - or deliverance
  lexicon: HALOT
  rationale: פליטה can denote escape, deliverance, or those who escape. In parallel
    with 'remnant,' the concrete sense 'survivor' best fits the clause's focus on
    no one remaining.
