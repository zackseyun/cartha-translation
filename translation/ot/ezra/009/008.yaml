id: EZR.9.8
reference: Ezra 9:8
source:
  edition: WLC
  text: וְ/עַתָּ֡ה כִּ/מְעַט רֶגַע֩ הָיְתָ֨ה תְחִנָּ֜ה מֵ/אֵ֣ת יְהוָ֣ה אֱלֹהֵ֗י/נוּ לְ/הַשְׁאִ֥יר לָ֨/נוּ֙ פְּלֵיטָ֔ה וְ/לָ/תֶת לָ֥/נוּ יָתֵ֖ד בִּ/מְק֣וֹם קָדְשׁ֑/וֹ לְ/הָאִ֤יר עֵינֵ֨י/נוּ֙ אֱלֹהֵ֔י/נוּ וּ/לְ/תִתֵּ֛/נוּ מִֽחְיָ֥ה מְעַ֖ט בְּ/עַבְדֻתֵֽ/נוּ־׀־׃
translation:
  text: But now, for a brief moment, favor has come from Yahweh our God, to leave us a remnant that has escaped and to give us a peg in his holy place, so that our God may brighten our eyes and give us a little reviving in our slavery.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a secure hold' for 'a peg'; the Hebrew keeps the concrete image of something fixed firmly in place.
    reason: lexical_alternative
  - marker: b
    text: Or 'give light to our eyes'; this idiom expresses renewed vitality or hope.
    reason: lexical_alternative
  - marker: c
    text: Or 'in our servitude' or 'in our bondage.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְחִנָּה
  chosen: favor
  alternatives:
  - grace
  - supplication
  - mercy
  lexicon: HALOT
  rationale: Although the noun often denotes a plea for favor or supplication, in this context with הָיְתָה מֵאֵת יְהוָה it refers to favor shown from the LORD rather than Israel's act of pleading. 'Favor' best captures the granted mercy without importing later theological freight as strongly as 'grace.'
- source_word: פְּלֵיטָה
  chosen: a remnant that has escaped
  alternatives:
  - escape
  - survivors
  - remnant
  lexicon: HALOT
  rationale: The term denotes those who have escaped/survived. Because Ezra is speaking of the preserved post-exilic community, 'a remnant that has escaped' preserves both the survival sense and the covenant-historical nuance of remnant.
- source_word: יָתֵד
  chosen: a peg
  alternatives:
  - stake
  - tent peg
  - secure hold
  lexicon: HALOT
  rationale: Literally 'peg' or 'stake.' The image is metaphorical for a secure foothold or fixed place, but the concrete image should be preserved in the main text. An explanatory alternative is preserved in a footnote.
- source_word: בִּמְקוֹם קָדְשׁוֹ
  chosen: in his holy place
  alternatives:
  - in his sanctuary
  - in his holy dwelling
  lexicon: HALOT
  rationale: A fairly direct rendering of the phrase. 'Holy place' preserves the Hebrew wording and can encompass the temple-centered sense without over-specifying beyond the text.
- source_word: לְהָאִיר עֵינֵינוּ
  chosen: brighten our eyes
  alternatives:
  - give light to our eyes
  - restore our eyes
  lexicon: HALOT
  rationale: This idiom conveys renewed vitality, hope, or encouragement. 'Brighten our eyes' keeps the metaphor while remaining natural English.
- source_word: מִחְיָה
  chosen: reviving
  alternatives:
  - preservation of life
  - renewal
  - a little life
  lexicon: HALOT
  rationale: The noun refers to preservation or restoration of life. In context, after exile and under subjection, 'reviving' naturally conveys renewed life and strength while fitting the idiom of the verse.
- source_word: בְּעַבְדֻתֵנוּ
  chosen: in our slavery
  alternatives:
  - in our servitude
  - in our bondage
  lexicon: HALOT
  rationale: The term denotes a state of servitude/subjection. Since the people remain under imperial domination, 'slavery' best preserves the force of the Hebrew rather than the softer 'service' or 'servitude.'
- source_word: כִּמְעַט רֶגַע
  chosen: for a brief moment
  alternatives:
  - for a little moment
  - for a short time
  lexicon: HALOT
  rationale: This phrase emphasizes the smallness and brevity of the respite. 'For a brief moment' is idiomatic modern English and preserves the temporal force.
- source_word: הָיְתָה ... מֵאֵת יְהוָה אֱלֹהֵינוּ
  chosen: has come from the LORD our God
  alternatives:
  - there has been from the LORD our God
  - has been granted by the LORD our God
  lexicon: HALOT
  rationale: English requires some smoothing of the existential Hebrew clause. 'Has come from' preserves the source emphasis of מֵאֵת while reading naturally.
