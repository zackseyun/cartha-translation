theological_decisions:
- issue: Rendering of מַעַל in a covenantal-sin context
  chosen_reading: unfaithfulness
  alternative_readings:
  - trespass
  - faithlessness
  rationale: The term carries the idea of breach of faith against God, not merely
    a generic wrongdoing. 'Unfaithfulness' communicates the covenantal dimension in
    clear modern English without importing later doctrinal categories.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Sense of הַגּוֹלָה
  chosen_reading: the exiles
  alternative_readings:
  - the captivity
  - the returned exiles
  - the exile community
  rationale: The noun refers to the community of those carried away and now restored.
    'The exiles' is the most natural English rendering and avoids the less personal
    abstract 'captivity.'
  doctrine_reference: Translation philosophy §§1, 6
