id: EZR.9.4
reference: Ezra 9:4
source:
  edition: WLC
  text: וְ/אֵלַ֣/י יֵאָסְפ֗וּ כֹּ֤ל חָרֵד֙ בְּ/דִבְרֵ֣י אֱלֹהֵֽי יִשְׂרָאֵ֔ל עַ֖ל
    מַ֣עַל הַ/גּוֹלָ֑ה וַ/אֲנִי֙ יֹשֵׁ֣ב מְשׁוֹמֵ֔ם עַ֖ד לְ/מִנְחַ֥ת הָ/עָֽרֶב־׃
translation:
  text: Then everyone who trembled at the words of the God of Israel because of the
    unfaithfulness of the exiles gathered to me, while I sat appalled until the evening
    offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of the trespass of the exile community.'
    reason: lexical_alternative
  - marker: b
    text: '''Evening offering'' translates minḥah, often specifically a grain offering,
      here functioning as the stated time of day for the regular temple offering.'
    reason: cultural_note
lexical_decisions:
- source_word: יֵאָסְפוּ
  chosen: gathered
  alternatives:
  - assembled
  - were gathered
  lexicon: HALOT
  rationale: Niphal of אסף here denotes people coming together to Ezra. 'Gathered'
    is natural English and preserves the collective action without over-specifying
    whether the sense is passive ('were gathered') or reflexive/middle.
- source_word: כֹּל חָרֵד
  chosen: everyone who trembled
  alternatives:
  - all who trembled
  - everyone trembling
  lexicon: HALOT
  rationale: The singular adjective חָרֵד after כֹּל functions collectively. 'Everyone
    who trembled' gives idiomatic English while preserving the personal, reverent
    fear conveyed by חרד.
- source_word: בְּדִבְרֵי אֱלֹהֵי יִשְׂרָאֵל
  chosen: at the words of the God of Israel
  alternatives:
  - because of the words of the God of Israel
  - at the word of the God of Israel
  lexicon: HALOT
  rationale: With חרד, the preposition ב can mark the object/cause of trembling. 'At
    the words' is idiomatic in English and keeps the plural 'words' of the Hebrew
    construct.
- source_word: עַל מַעַל הַגּוֹלָה
  chosen: because of the unfaithfulness of the exiles
  alternatives:
  - because of the trespass of the exiles
  - concerning the faithlessness of the returned exiles
  lexicon: HALOT
  rationale: מַעַל denotes breach of faith, unfaithfulness, or trespass, often with
    covenantal overtones. 'Unfaithfulness' best captures the moral-religious breach
    in accessible English. הַגּוֹלָה refers to the exile community / returned exiles;
    'the exiles' is concise and accurate.
- source_word: יֹשֵׁב מְשׁוֹמֵם
  chosen: sat appalled
  alternatives:
  - sat desolate
  - sat devastated
  - remained sitting appalled
  lexicon: HALOT
  rationale: The participle יֹשֵׁב plus משומם describes Ezra's continued posture and
    stunned state. 'Sat appalled' is concise, idiomatic, and preserves the sense of
    horrified desolation without sounding archaic.
- source_word: עַד לְמִנְחַת הָעָרֶב
  chosen: until the evening offering
  alternatives:
  - until the evening grain offering
  - until the evening sacrifice
  lexicon: HALOT
  rationale: מִנְחָה can denote a grain offering specifically, but in time expressions
    it often refers to the regular evening offering service. 'Evening offering' preserves
    the cultic reference without over-narrowing or importing 'sacrifice' where the
    Hebrew term itself is minḥah.
