id: EZR.9.6
reference: Ezra 9:6
source:
  edition: WLC
  text: וָ/אֹמְרָ֗/ה אֱלֹהַ/י֙ בֹּ֣שְׁתִּי וְ/נִכְלַ֔מְתִּי לְ/הָרִ֧ים אֱלֹהַ֛/י פָּנַ֖/י
    אֵלֶ֑י/ךָ כִּ֣י עֲוֺנֹתֵ֤י/נוּ רָבוּ֙ לְ/מַ֣עְלָ/ה רֹּ֔אשׁ וְ/אַשְׁמָתֵ֥/נוּ גָדְלָ֖ה
    עַ֥ד לַ/שָּׁמָֽיִם׃
translation:
  text: And I said, “My God, I am ashamed and humiliated to lift up my face to you,
    my God, because our iniquities have multiplied above our head, and our guilt has
    grown as high as the heavens.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'over our heads.' The Hebrew idiom is singular 'head' with a plural possessive
      sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֹּשְׁתִּי
  chosen: I am ashamed
  alternatives:
  - I am embarrassed
  - I have been ashamed
  lexicon: HALOT
  rationale: Conveys personal shame in natural English. Present English best captures
    the stative force in context, though the Hebrew perfect is formally past.
- source_word: וְנִכְלַמְתִּי
  chosen: and humiliated
  alternatives:
  - and disgraced
  - and confounded
  lexicon: HALOT
  rationale: Pairs with בֹּשְׁתִּי to intensify Ezra's sense of disgrace. 'Humiliated'
    is readable modern English and preserves the emotional force better than the more
    archaic 'confounded.'
- source_word: לְהָרִים ... פָּנַי אֵלֶיךָ
  chosen: to lift up my face to you
  alternatives:
  - to raise my face to you
  - to lift up my eyes to you
  lexicon: HALOT
  rationale: Keeps the Hebrew idiom of approaching God openly or confidently. 'Face'
    is retained rather than replaced with 'eyes' because the source explicitly says
    face.
- source_word: עֲוֺנֹתֵינוּ
  chosen: our iniquities
  alternatives:
  - our sins
  - our guilt
  lexicon: HALOT
  rationale: עָוֹן often denotes iniquity/guilt in a morally weighty sense. 'Iniquities'
    preserves that gravity and distinguishes it from the later אַשְׁמָה term.
- source_word: רָבוּ
  chosen: have multiplied
  alternatives:
  - have increased
  - are many
  lexicon: HALOT
  rationale: The verb emphasizes increase or becoming many, not merely static quantity.
    'Have multiplied' reflects the verbal force and suits the cumulative confession.
- source_word: לְמַעְלָה רֹאשׁ
  chosen: above our head
  alternatives:
  - over our head
  - higher than our head
  lexicon: HALOT
  rationale: A literal rendering preserves the metaphor of sins rising beyond what
    can be managed. Singular 'head' follows the Hebrew idiom, functioning corporately
    with 'our.'
- source_word: אַשְׁמָתֵנוּ
  chosen: our guilt
  alternatives:
  - our guilt offering
  - our trespass
  - our culpability
  lexicon: HALOT
  rationale: In this context the noun denotes liability/guilt, not a sacrificial offering.
    'Guilt' is the clearest contextual rendering and differentiates the term from
    עֲוֹנוֹת.
- source_word: גָדְלָה עַד לַשָּׁמַיִם
  chosen: has grown as high as the heavens
  alternatives:
  - has become great up to heaven
  - has grown up to the heavens
  lexicon: HALOT
  rationale: Expresses the hyperbolic vertical imagery naturally in English while
    preserving the plural 'heavens,' a common Hebrew form.
- source_word: אֱלֹהַי
  chosen: My God
  alternatives:
  - O my God
  lexicon: HALOT
  rationale: Direct address is clear without adding the vocative particle 'O,' which
    is not required in modern English. Repetition is retained both times for emphasis
    in the Hebrew.
- source_word: וָאֹמְרָה
  chosen: And I said
  alternatives:
  - Then I said
  lexicon: HALOT
  rationale: Simple narrative continuation is sufficient here. 'And' preserves the
    Hebrew waw-consecutive flow without overinterpreting sequence.
