theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of God's righteousness in context
  chosen_reading: you are righteous
  alternative_readings:
  - you are just
  rationale: The verse does not require importing a systematic-theological explanation of divine righteousness; it simply confesses God's rightness in judgment and mercy. 'Righteous' preserves that broader biblical category without narrowing it to retributive justice alone.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension rather than resolve it'
