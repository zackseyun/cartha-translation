id: EZR.9.15
reference: Ezra 9:15
source:
  edition: WLC
  text: יְהוָ֞ה אֱלֹהֵ֤י יִשְׂרָאֵל֙ צַדִּ֣יק אַ֔תָּה כִּֽי נִשְׁאַ֥רְנוּ פְלֵיטָ֖ה כְּ/הַ/יּ֣וֹם הַ/זֶּ֑ה הִנְ/נ֤וּ לְ/פָנֶ֨י/ךָ֙ בְּ/אַשְׁמָתֵ֔י/נוּ כִּ֣י אֵ֥ין לַ/עֲמ֛וֹד לְ/פָנֶ֖י/ךָ עַל זֹֽאת־־׃פ
translation:
  text: O Yahweh, God of Israel, you are righteous, for we have been left as a remnant, as it is this day. Here we are before you in our guilt, for no one can stand before you because of this.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'just.'
    reason: lexical_alternative
  - marker: b
    text: Or 'an escaped remnant' or 'survivors.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'there is no standing before you because of this,' an idiom for being unable to remain or endure in God's presence under guilt.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as 'LORD' per doctrine default for the divine name, following established English convention for YHWH while signaling the covenant name.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: God of Israel
  lexicon: HALOT
  rationale: Construct phrase rendered straightforwardly and idiomatically; preserves covenantal address.
- source_word: צַדִּיק
  chosen: righteous
  alternatives:
  - just
  lexicon: HALOT
  rationale: '''Righteous'' best matches the moral/judicial sense here in direct address to God and aligns with common biblical usage; ''just'' is possible but narrower in English.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'The first כִּי introduces the ground for the confession: God''s righteousness is seen in the fact that a remnant remains. ''For'' preserves that explanatory force.'
- source_word: נִשְׁאַרְנוּ
  chosen: we have been left
  alternatives:
  - we remain
  - we have survived
  lexicon: HALOT
  rationale: The Niphal conveys being left/remained over. 'Have been left' preserves the passive nuance better than the simpler 'remain.'
- source_word: פְלֵיטָה
  chosen: a remnant
  alternatives:
  - an escape
  - survivors
  lexicon: HALOT
  rationale: In this restoration context the noun refers to those who escaped judgment and remain. 'Remnant' captures both survival and covenant-historical resonance.
- source_word: כְּהַיּוֹם הַזֶּה
  chosen: as it is this day
  alternatives:
  - as on this day
  - as at this day
  lexicon: HALOT
  rationale: Idiomatic temporal expression indicating the present observable state. 'As it is this day' is natural modern English while preserving the Hebrew sense.
- source_word: הִנְנוּ לְפָנֶיךָ
  chosen: Here we are before you
  alternatives:
  - behold, we are before you
  - see, we are before you
  lexicon: HALOT
  rationale: הִנְנוּ is a presentative expression. 'Here we are' conveys the immediacy without archaic 'behold.'
- source_word: בְּאַשְׁמָתֵינוּ
  chosen: in our guilt
  alternatives:
  - in our guiltiness
  - with our guilt
  lexicon: HALOT
  rationale: The phrase expresses the people's state before God as guilty. 'In our guilt' is concise and natural while preserving the substantive sense of אשמה.
- source_word: כִּי אֵין לַעֲמוֹד לְפָנֶיךָ
  chosen: though no one can stand before you
  alternatives:
  - for there is no standing before you
  - for we cannot stand before you
  lexicon: HALOT
  rationale: This clause states inability to endure or remain before God. 'No one can stand before you' is idiomatic English and keeps the judicial sense of being unable to stand in God's presence. 'No one' is preferred over 'we' because the Hebrew uses an impersonal existential construction rather than an explicit first-person subject.
- source_word: עַל זֹאת
  chosen: because of this
  alternatives:
  - on account of this
  - for this reason
  lexicon: HALOT
  rationale: The preposition עַל here gives causal force, referring back to the guilt just confessed, likely especially the intermarriage trespass in context. 'Because of this' is the clearest idiomatic rendering.
