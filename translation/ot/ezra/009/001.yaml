theological_decisions:
- issue: Rendering of covenantal-ethical term תועבות
  chosen_reading: abominations
  alternative_readings:
  - detestable practices
  rationale: The verse reports a charge of covenantal impurity and assimilation. 'Abominations'
    preserves the strong moral-religious force of the Hebrew without softening the
    accusation. This is a lexical-theological choice because weaker renderings could
    reduce the text's covenantal severity.
  doctrine_reference: Translation philosophy §1, §6
- issue: Scope of the accusation against Israelite groups
  chosen_reading: The report includes the people of Israel, the priests, and the Levites
    together as those who have not separated themselves
  alternative_readings:
  - Only the laity are primarily in view, with priests and Levites appended secondarily
  rationale: The Hebrew syntax coordinates all three groups under the same verbal
    claim. The translation preserves that breadth and does not narrow the indictment.
  doctrine_reference: Translation philosophy §1, §3
