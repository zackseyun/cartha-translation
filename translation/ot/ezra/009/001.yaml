id: EZR.9.1
reference: Ezra 9:1
source:
  edition: WLC
  text: וּ/כְ/כַלּ֣וֹת אֵ֗לֶּה נִגְּשׁ֨וּ אֵלַ֤/י הַ/שָּׂרִים֙ לֵ/אמֹ֔ר לֹֽא נִבְדְּל֞וּ
    הָ/עָ֤ם יִשְׂרָאֵל֙ וְ/הַ/כֹּהֲנִ֣ים וְ/הַ/לְוִיִּ֔ם מֵ/עַמֵּ֖י הָ/אֲרָצ֑וֹת כְּ֠/תוֹעֲבֹֽתֵי/הֶם
    לַ/כְּנַעֲנִ֨י הַ/חִתִּ֜י הַ/פְּרִזִּ֣י הַ/יְבוּסִ֗י הָֽ/עַמֹּנִי֙ הַ/מֹּ֣אָבִ֔י
    הַ/מִּצְרִ֖י וְ/הָ/אֱמֹרִֽי־׃
translation:
  text: Now when these things were finished, the officials approached me, saying,
    “The people of Israel, and the priests and the Levites, have not separated themselves
    from the peoples of the lands, according to their abominations—the Canaanites,
    the Hittites, the Perizzites, the Jebusites, the Ammonites, the Moabites, the
    Egyptians, and the Amorites.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in accordance with their detestable practices.' The Hebrew term is strong
      and often used for religiously offensive or idolatrous practices.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְכַלּוֹת אֵלֶּה
  chosen: Now when these things were finished
  alternatives:
  - And when these things were finished
  - After these things had been completed
  lexicon: HALOT
  rationale: The prefixed conjunction plus temporal preposition and infinitive construct
    of כלה forms a temporal clause. 'Now when' gives natural English narrative flow
    while preserving the sequence marker; 'were finished' reflects the passive/resultative
    sense in context.
- source_word: נִגְּשׁוּ אֵלַי
  chosen: approached me
  alternatives:
  - came near to me
  - drew near to me
  lexicon: HALOT
  rationale: נגשׁ in the Niphal commonly means 'approach/draw near.' 'Approached me'
    is idiomatic modern English and preserves the personal movement toward Ezra.
- source_word: הַשָּׂרִים
  chosen: the officials
  alternatives:
  - the princes
  - the leaders
  lexicon: HALOT
  rationale: שׂרים refers to ruling officials or leaders. 'Officials' best fits the
    Persian-period administrative setting and avoids the potentially misleading aristocratic
    nuance of 'princes.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - to say
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing direct speech; 'saying' is
    the most transparent rendering.
- source_word: לֹא נִבְדְּלוּ
  chosen: have not separated themselves
  alternatives:
  - have not kept themselves separate
  - have not been separated
  lexicon: HALOT
  rationale: בדל in the Niphal here conveys reflexive/separative force in covenantal-social
    context. 'Have not separated themselves' preserves the verbal idea without overinterpreting
    motive.
- source_word: הָעָם יִשְׂרָאֵל וְהַכֹּהֲנִים וְהַלְוִיִּם
  chosen: the people of Israel, and the priests and the Levites
  alternatives:
  - the people Israel, the priests, and the Levites
  lexicon: HALOT
  rationale: The phrase names three groups implicated in the report. 'The people of
    Israel' is idiomatic English for העם ישראל, and the coordination is preserved.
- source_word: מֵעַמֵּי הָאֲרָצוֹת
  chosen: from the peoples of the lands
  alternatives:
  - from the peoples of the countries
  - from the peoples of the surrounding lands
  lexicon: HALOT
  rationale: The plural 'peoples' and 'lands' should both be retained. 'Lands' is
    more literal than 'countries' and reflects the regional-ethnic sense of the Hebrew.
- source_word: כְּתוֹעֲבֹתֵיהֶם
  chosen: according to their abominations
  alternatives:
  - with their abominations
  - following their abominations
  - in accordance with their detestable practices
  lexicon: HALOT
  rationale: The prefixed כ marks comparison or conformity. 'According to their abominations'
    preserves the formal relation and the strong moral-religious term תועבות. A smoother
    dynamic option like 'detestable practices' was possible, but 'abominations' better
    retains the covenantal weight of the Hebrew.
- source_word: לַכְּנַעֲנִי ... וְהָאֱמֹרִי
  chosen: the Canaanites, the Hittites, the Perizzites, the Jebusites, the Ammonites,
    the Moabites, the Egyptians, and the Amorites
  alternatives:
  - the Canaanite ... and the Amorite
  lexicon: HALOT
  rationale: Although the Hebrew forms are singular gentilic with articles, English
    idiom normally renders such ethnic lists in the plural. This preserves referential
    sense and readability.
- source_word: הַמִּצְרִי
  chosen: the Egyptians
  alternatives:
  - the Egyptian people
  lexicon: HALOT
  rationale: The gentilic is rendered as the ethnic group in parallel with the surrounding
    peoples. Plural English matches the list structure.
