id: EZR.9.3
reference: Ezra 9:3
source:
  edition: WLC
  text: וּ/כְ/שָׁמְעִ/י֙ אֶת הַ/דָּבָ֣ר הַ/זֶּ֔ה קָרַ֥עְתִּי אֶת בִּגְדִ֖/י וּ/מְעִילִ֑/י
    וָ/אֶמְרְטָ֞/ה מִ/שְּׂעַ֤ר רֹאשִׁ/י֙ וּ/זְקָנִ֔/י וָ/אֵשְׁבָ֖/ה מְשׁוֹמֵֽם־־׃
translation:
  text: As soon as I heard this matter, I tore my garment and my robe, pulled out
    some of the hair of my head and my beard, and sat appalled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'When I heard this report, I tore my clothes and my robe ... and sat
      astonished.'
    reason: lexical_alternative
  - marker: b
    text: Tearing garments and pulling out hair were customary expressions of grief,
      horror, or mourning.
    reason: cultural_note
lexical_decisions:
- source_word: וּכְשָׁמְעִי
  chosen: As soon as I heard
  alternatives:
  - When I heard
  - And when I heard
  lexicon: HALOT
  rationale: The conjunction plus temporal preposition and infinitive/verb form introduces
    an immediate temporal clause. 'As soon as I heard' captures both the timing and
    the emotional immediacy better than a flatter 'when I heard,' while remaining
    faithful to the syntax.
- source_word: הַדָּבָר הַזֶּה
  chosen: this matter
  alternatives:
  - this thing
  - this report
  - this word
  lexicon: HALOT
  rationale: דָּבָר has a broad semantic range including 'word,' 'matter,' or 'thing.'
    In context Ezra is reacting to a reported situation, so 'this matter' is natural
    modern English that preserves the referential sense without overinterpreting as
    merely speech.
- source_word: קָרַעְתִּי
  chosen: I tore
  alternatives:
  - I ripped
  lexicon: HALOT
  rationale: The verb denotes tearing garments as a conventional act of grief or horror.
    'Tore' is the standard and suitably solemn English rendering.
- source_word: בִּגְדִי
  chosen: my garment
  alternatives:
  - my clothes
  - my tunic
  lexicon: HALOT
  rationale: בֶּגֶד is a general term for clothing or a garment. Singular 'my garment'
    preserves the Hebrew singular and fits the paired expression with 'my robe.'
- source_word: וּמְעִילִי
  chosen: my robe
  alternatives:
  - my mantle
  - my outer garment
  lexicon: HALOT
  rationale: מְעִיל commonly refers to an outer robe or mantle. 'Robe' is clear, natural,
    and distinguishes it from the more general בֶּגֶד.
- source_word: וָאֶמְרְטָה
  chosen: pulled out
  alternatives:
  - plucked out
  - tore out
  lexicon: HALOT
  rationale: The verb refers to forcibly removing hair. 'Pulled out' is idiomatic
    modern English and conveys the physical action without sounding either too mild
    or overly graphic.
- source_word: מִשְּׂעַר רֹאשִׁי וּזְקָנִי
  chosen: some of the hair of my head and my beard
  alternatives:
  - hair from my head and beard
  - the hair of my head and beard
  lexicon: HALOT
  rationale: The preposition מִן before 'hair' naturally suggests taking from among
    the hair rather than removing all of it. 'Some of the hair of my head and my beard'
    makes that partitive sense explicit in English.
- source_word: וָאֵשְׁבָה
  chosen: and sat
  alternatives:
  - and I sat down
  - and remained seated
  lexicon: HALOT
  rationale: The verb is the common 'sit/dwell/remain.' 'Sat' is sufficient and keeps
    the sequence of actions concise.
- source_word: מְשׁוֹמֵם
  chosen: appalled
  alternatives:
  - astonished
  - desolate
  - horrified
  lexicon: HALOT
  rationale: The participle conveys being devastated, appalled, or stunned into desolation.
    'Appalled' best fits the emotional shock in contemporary English; 'astonished'
    can sound too neutral, while 'desolate' emphasizes aftermath more than immediate
    reaction.
