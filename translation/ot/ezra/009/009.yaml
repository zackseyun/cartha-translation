id: EZR.9.9
reference: Ezra 9:9
source:
  edition: WLC
  text: כִּֽי עֲבָדִ֣ים אֲנַ֔חְנוּ וּ/בְ/עַבְדֻ֔תֵ/נוּ לֹ֥א עֲזָבָ֖/נוּ אֱלֹהֵ֑י/נוּ
    וַֽ/יַּט עָלֵ֣י/נוּ חֶ֡סֶד לִ/פְנֵי֩ מַלְכֵ֨י פָרַ֜ס לָֽ/תֶת לָ֣/נוּ מִֽחְיָ֗ה
    לְ/רוֹמֵ֞ם אֶת בֵּ֤ית אֱלֹהֵ֨י/נוּ֙ וּ/לְ/הַעֲמִ֣יד אֶת חָרְבֹתָ֔י/ו וְ/לָֽ/תֶת
    לָ֣/נוּ גָדֵ֔ר בִּֽ/יהוּדָ֖ה וּ/בִ/ירוּשָׁלִָֽם־־־־־־׃ס
translation:
  text: For we are slaves; yet in our slavery our God has not forsaken us, but has
    extended covenant faithfulness to us before the kings of Persia, to give us reviving,
    to raise up the house of our God, to set up its ruins, and to give us a wall in
    Judah and in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'steadfast love,' 'kindness,' or 'favor' for 'covenant faithfulness.'
      The Hebrew חֶסֶד carries the sense of loyal, gracious covenant mercy.
    reason: lexical_alternative
  - marker: b
    text: Or 'a protective enclosure' or 'a hedge.' The image may refer more broadly
      to security and protection in Judah and Jerusalem, not only to a literal wall.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲבָדִים
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: HALOT
  rationale: The noun denotes people in bondage or subjection. Here the community
    speaks of its continued subservient status under imperial rule, so 'slaves' best
    preserves the bonded force rather than the softer 'servants.'
- source_word: וּבְעַבְדֻתֵנוּ
  chosen: in our slavery
  alternatives:
  - in our servitude
  - in our bondage
  lexicon: HALOT
  rationale: Cognate with the previous term and refers to the condition of servitude.
    'In our slavery' keeps the lexical connection and the rhetorical contrast with
    God's mercy.
- source_word: עֲזָבָנוּ
  chosen: has not forsaken us
  alternatives:
  - has not abandoned us
  - has not left us
  lexicon: HALOT
  rationale: The verb עזב commonly means to leave, forsake, or abandon. 'Forsaken'
    fits covenantal and prayer language well without becoming archaic.
- source_word: וַיַּט עָלֵינוּ חֶסֶד
  chosen: has extended covenant faithfulness to us
  alternatives:
  - has shown us steadfast love
  - has extended kindness to us
  - has granted us favor
  lexicon: HALOT
  rationale: The idiom 'stretch out/extend ḥesed over' conveys active bestowal of
    loyal, gracious favor. Because חֶסֶד is theologically weighty and richer than
    mere kindness, 'covenant faithfulness' captures loyal mercy while remaining intelligible.
    'Extended' reflects the verbal image of נטה.
- source_word: לִפְנֵי מַלְכֵי פָרַס
  chosen: before the kings of Persia
  alternatives:
  - in the sight of the kings of Persia
  - in the presence of the kings of Persia
  lexicon: HALOT
  rationale: לִפְנֵי here indicates relation to or in the presence of the Persian
    kings. 'Before' is concise and natural English.
- source_word: מִחְיָה
  chosen: reviving
  alternatives:
  - a remnant of life
  - preservation of life
  - renewed life
  lexicon: HALOT
  rationale: The noun can denote preservation or restoration of life. In this post-exilic
    context it points to renewed vitality granted to the community, so 'reviving'
    captures both survival and restoration.
- source_word: לְרוֹמֵם
  chosen: to raise up
  alternatives:
  - to exalt
  - to restore
  lexicon: HALOT
  rationale: The infinitive from רום literally means to raise or lift high. With 'the
    house of our God,' it likely refers to restoring and reestablishing the temple.
    'Raise up' preserves the metaphor while fitting the rebuilding context.
- source_word: בֵּית אֱלֹהֵינוּ
  chosen: the house of our God
  alternatives:
  - the temple of our God
  lexicon: HALOT
  rationale: Literally 'house of our God.' This is the temple, but the literal phrase
    is transparent in English and preserves the Hebrew expression.
- source_word: וּלְהַעֲמִיד אֶת חָרְבֹתָיו
  chosen: to set up its ruins
  alternatives:
  - to restore its ruins
  - to establish its ruins
  lexicon: HALOT
  rationale: The verb means to cause to stand, set up, or establish. With 'its ruins,'
    the sense is to reestablish what lay in ruins. 'Set up its ruins' stays close
    to the Hebrew while remaining understandable; the possessive refers back to the
    house/temple.
- source_word: גָדֵר
  chosen: a wall
  alternatives:
  - a fence
  - a protective enclosure
  lexicon: HALOT
  rationale: The noun can denote a wall, fence, or enclosing barrier. In the Judah/Jerusalem
    context, 'wall' is the most natural rendering, while still allowing the broader
    sense of protection.
- source_word: בִּיהוּדָה וּבִירוּשָׁלִָם
  chosen: in Judah and in Jerusalem
  alternatives:
  - around Judah and Jerusalem
  lexicon: HALOT
  rationale: The preposition is locative. 'In Judah and in Jerusalem' is the straightforward
    rendering and avoids overinterpreting the metaphor of 'wall' as necessarily surrounding.
