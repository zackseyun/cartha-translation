id: EZR.7.5
reference: Ezra 7:5
source:
  edition: WLC
  text: בֶּן אֲבִישׁ֗וּעַ בֶּן פִּֽינְחָס֙ בֶּן אֶלְעָזָ֔ר בֶּן אַהֲרֹ֥ן הַ/כֹּהֵ֖ן
    הָ/רֹֽאשׁ־־־־׃
translation:
  text: son of Abishua, son of Phinehas, son of Eleazar, son of Aaron the chief priest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'son of Aaron, the head priest' or, in genealogical sense, 'descendant
      of.' Hebrew genealogies often use 'son of' for lineal descent more broadly.
    reason: lexical_alternative
  - marker: b
    text: Traditionally 'high priest.' The Hebrew reads literally 'the priest, the
      head/chief,' not the more usual expression for 'high priest.'
    reason: alternative_reading
lexical_decisions:
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: In a genealogy, בֶּן most directly marks filial descent. Although Hebrew
    genealogies can telescope generations and thus imply broader descent, the repeated
    formula is best rendered literally as 'son of' in the main text.
- source_word: אֲבִישׁוּעַ
  chosen: Abishua
  rationale: 'Personal name transliterated according to the translation philosophy:
    names are transliterated rather than translated.'
- source_word: פִּֽינְחָס
  chosen: Phinehas
  alternatives:
  - Phinehas
  rationale: Standard English transliteration of the personal name. Kept in its familiar
    biblical form for readability and continuity.
- source_word: אֶלְעָזָר
  chosen: Eleazar
  rationale: Personal name transliterated by standard convention.
- source_word: אַהֲרֹן
  chosen: Aaron
  rationale: Personal name transliterated by standard convention.
- source_word: הַכֹּהֵן
  chosen: priest
  alternatives:
  - the priest
  lexicon: HALOT
  rationale: With the following adjective הָרֹאשׁ, the phrase functions as a title,
    'the chief priest.' English idiom prefers dropping the second article before the
    noun phrase complement and rendering the whole expression smoothly as a title.
- source_word: הָרֹאשׁ
  chosen: chief
  alternatives:
  - head
  - high
  lexicon: HALOT
  rationale: רֹאשׁ literally means 'head,' but in titles it commonly denotes primacy
    or chief status. 'Chief priest' is the most natural English rendering here. 'High
    priest' is possible, but the Hebrew here is not the usual later title הַכֹּהֵן
    הַגָּדוֹל, so 'chief priest' better reflects the actual wording.
