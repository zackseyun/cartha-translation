theological_decisions:
- issue: Rendering of Aaron's priestly title
  chosen_reading: chief priest
  alternative_readings:
  - high priest
  rationale: The phrase הַכֹּהֵן הָרֹאשׁ identifies Aaron as the principal priestly
    ancestor. Rendering it 'chief priest' preserves the lexical sense of רֹאשׁ ('head/chief')
    without importing the more technical later title 'high priest' where the Hebrew
    does not use גָּדוֹל.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; consistency of key terms, or documented exception.'
