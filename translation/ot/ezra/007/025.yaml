id: EZR.7.25
reference: Ezra 7:25
source:
  edition: WLC
  text: וְ/אַ֣נְתְּ עֶזְרָ֗א כְּ/חָכְמַ֨ת אֱלָהָ֤/ךְ דִּֽי בִ/ידָ/ךְ֙ מֶ֣נִּי שָׁפְטִ֞ין
    וְ/דַיָּנִ֗ין דִּי לֶהֱוֺ֤ן דאנין לְ/כָל עַמָּ/ה֙ דִּ֚י בַּ/עֲבַ֣ר נַהֲרָ֔/ה לְ/כָל
    יָדְעֵ֖י דָּתֵ֣י אֱלָהָ֑/ךְ וְ/דִ֧י לָ֦א יָדַ֖ע תְּהוֹדְעֽוּן־־־־׃
translation:
  text: And you, Ezra, according to the wisdom of your God that is in your hand, appoint
    magistrates and judges who may judge all the people who are beyond the River—all
    who know the laws of your God; and those who do not know them, you shall teach.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which you possess' for 'that is in your hand'; the Aramaic idiom can
      denote possession or entrusted authority.
    reason: lexical_alternative
  - marker: b
    text: '''Beyond the River'' is the Persian administrative designation for the
      territory west of the Euphrates.'
    reason: cultural_note
lexical_decisions:
- source_word: כְּחָכְמַת אֱלָהָךְ
  chosen: according to the wisdom of your God
  alternatives:
  - in keeping with the wisdom of your God
  - by the wisdom of your God
  lexicon: HALOT
  rationale: כְּ marks accordance or conformity. 'According to' preserves the formal
    relation while remaining natural English.
- source_word: דִּי בִידָךְ
  chosen: that is in your hand
  alternatives:
  - which you possess
  - that you have
  lexicon: HALOT
  rationale: The idiom literally says 'in your hand.' Retaining the image is understandable
    in English and preserves the source texture; it likely conveys possession or entrusted
    authority without over-interpreting.
- source_word: מֶנִּי
  chosen: appoint
  alternatives:
  - set
  - establish
  lexicon: HALOT
  rationale: In this administrative context the verb calls for Ezra to designate officials.
    'Appoint' is the clearest idiomatic rendering.
- source_word: שָׁפְטִין וְדַיָּנִין
  chosen: magistrates and judges
  alternatives:
  - judges and officials
  - judicial officers and judges
  lexicon: HALOT
  rationale: The paired terms appear to distinguish classes of legal officials. Rendering
    both distinctly avoids collapsing the doublet. 'Magistrates and judges' is natural
    and preserves the administrative nuance.
- source_word: דִּי לֶהֱוֺן דאנין
  chosen: who may judge
  alternatives:
  - who will judge
  - to be judging
  lexicon: HALOT
  rationale: The clause expresses the function of the appointed officials. 'Who may
    judge' captures purpose/result without sounding wooden.
- source_word: לְכָל עַמָּה
  chosen: all the people
  alternatives:
  - the whole people
  - everyone among the people
  lexicon: HALOT
  rationale: Collective singular with כל is best rendered as a collective plural in
    English.
- source_word: דִּי בַּעֲבַר נַהֲרָה
  chosen: who are beyond the River
  alternatives:
  - who are in the province Beyond the River
  - across the River
  lexicon: HALOT
  rationale: The phrase is the standard imperial-geographical designation for the
    region west of the Euphrates from a Persian perspective. 'Beyond the River' preserves
    the conventional title-like expression.
- source_word: לְכָל יָדְעֵי דָּתֵי אֱלָהָךְ
  chosen: all who know the laws of your God
  alternatives:
  - all who know the law of your God
  - all who know your God's decrees
  lexicon: HALOT
  rationale: דָּת in Ezra often refers to legal decrees or laws, here plural. 'Laws'
    fits the administrative-religious setting and preserves the plural form.
- source_word: וְדִי לָא יָדַע
  chosen: and those who do not know them
  alternatives:
  - and whoever does not know
  - and those who do not know
  lexicon: HALOT
  rationale: The relative construction contrasts with the preceding group. Supplying
    'them' in English makes explicit that the object is the laws just mentioned.
- source_word: תְּהוֹדְעוּן
  chosen: you shall teach
  alternatives:
  - you shall make known
  - you shall instruct
  lexicon: HALOT
  rationale: The causative of ידע means 'make know.' In context of laws, 'teach' is
    the most natural English expression while preserving the causative sense.
