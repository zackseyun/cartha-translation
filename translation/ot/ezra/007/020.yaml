id: EZR.7.20
reference: Ezra 7:20
source:
  edition: WLC
  text: וּ/שְׁאָ֗ר חַשְׁחוּת֙ בֵּ֣ית אֱלָהָ֔/ךְ דִּ֥י יִפֶּל לָ֖/ךְ לְ/מִנְתַּ֑ן תִּנְתֵּ֕ן
    מִן בֵּ֖ית גִּנְזֵ֥י מַלְכָּֽ/א־־׃
translation:
  text: And whatever other need of the house of your God falls to you to provide,
    you shall provide it from the house of the king’s treasuries.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more smoothly, 'from the king’s treasury.' The Aramaic is more literally
      'from the house of the king’s treasuries.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁאָר
  chosen: And whatever other
  alternatives:
  - And the rest of
  - And any additional
  lexicon: HALOT
  rationale: The conjunction plus noun means 'and the rest/remainder.' In idiomatic
    English here, introducing additional items beyond those already listed, 'whatever
    other' best captures the sense of further unspecified provisions.
- source_word: חַשְׁחוּת
  chosen: need
  alternatives:
  - expense
  - requirement
  - what is needed
  lexicon: HALOT
  rationale: The Aramaic term denotes need or requirement, especially material necessity.
    'Need' is concise and natural; 'expense' is possible in context but narrower than
    the source, which can include any required provision.
- source_word: בֵּית אֱלָהָךְ
  chosen: the house of your God
  alternatives:
  - your God's house
  - the temple of your God
  lexicon: HALOT
  rationale: A formally transparent rendering preserves the temple idiom without over-interpreting.
    'Temple' would be contextually correct but less literal than 'house,' which is
    a standard biblical designation.
- source_word: דִּי
  chosen: that/which (implicit in English structure)
  alternatives:
  - which
  - that
  lexicon: HALOT
  rationale: The relative particle is absorbed into natural English syntax rather
    than translated woodenly.
- source_word: יִפֶּל לָךְ
  chosen: falls to you
  alternatives:
  - comes upon you
  - is incumbent on you
  - devolves on you
  lexicon: HALOT
  rationale: The idiom expresses obligation or assignment. 'Falls to you' preserves
    the metaphor while remaining readable modern English.
- source_word: לְמִנְתַּן
  chosen: to provide
  alternatives:
  - to give
  - for giving
  lexicon: HALOT
  rationale: The infinitive of 'give' here functions in an administrative/funding
    context. 'Provide' better conveys supplying what is needed, while remaining faithful
    to the sense.
- source_word: תִּנְתֵּן
  chosen: you shall provide it
  alternatives:
  - you shall give
  - you must provide
  lexicon: HALOT
  rationale: The finite verb repeats the giving idea for emphasis. 'You shall provide
    it' reflects the imperative force in smooth English and makes explicit the implied
    object from context.
- source_word: מִן בֵּית גִּנְזֵי מַלְכָּא
  chosen: from the house of the king’s treasuries
  alternatives:
  - from the royal treasury house
  - from the house of the king's treasures
  - from the king's treasury
  lexicon: HALOT
  rationale: Literally 'from the house of the king's treasuries/storehouses.' The
    phrase likely refers to the royal treasury complex. 'House of the king’s treasuries'
    preserves the source structure; a smoother alternative is preserved in a footnote.
