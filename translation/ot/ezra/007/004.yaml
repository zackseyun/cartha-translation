id: EZR.7.4
reference: Ezra 7:4
source:
  edition: WLC
  text: בֶּן זְרַֽחְיָ֥ה בֶן עֻזִּ֖י בֶּן בֻּקִּֽי־־־׃
translation:
  text: son of Zerahiah, son of Uzzi, son of Bukki,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: The construct noun בֶּן in a genealogy is most naturally rendered 'son
    of.' While genealogies can sometimes telescope generations and thus imply broader
    descent, the standard English genealogical formula 'son of' best matches the Hebrew
    form and preserves the lineage structure.
- source_word: זְרַחְיָה
  chosen: Zerahiah
  alternatives:
  - Zerachiah
  rationale: Personal names are transliterated rather than translated per project
    philosophy. 'Zerahiah' is a standard English transliteration reflecting the Hebrew
    consonants and familiar biblical usage.
- source_word: עֻזִּי
  chosen: Uzzi
  alternatives:
  - Uzzi
  rationale: Personal name transliterated by standard convention. 'Uzzi' is the established
    English form for עֻזִּי.
- source_word: בֻּקִּי
  chosen: Bukki
  alternatives:
  - Buki
  rationale: Personal name transliterated by standard convention. 'Bukki' preserves
    the doubled consonant indicated in Hebrew and aligns with common English biblical
    spelling.
