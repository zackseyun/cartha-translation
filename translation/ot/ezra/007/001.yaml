id: EZR.7.1
reference: Ezra 7:1
source:
  edition: WLC
  text: וְ/אַחַר֙ הַ/דְּבָרִ֣ים הָ/אֵ֔לֶּה בְּ/מַלְכ֖וּת אַרְתַּחְשַׁ֣סְתְּא מֶֽלֶךְ
    פָּרָ֑ס עֶזְרָא֙ בֶּן שְׂרָיָ֔ה בֶּן עֲזַרְיָ֖ה בֶּן חִלְקִיָּֽה־־־־׃
translation:
  text: Now after these things, in the reign of Artaxerxes king of Persia, Ezra son
    of Seraiah, son of Azariah, son of Hilkiah—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'son of' in genealogies can also denote a more remote descendant,
      not only an immediate father-son relationship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַחַר
  chosen: Now after
  alternatives:
  - And after
  - After
  lexicon: HALOT
  rationale: The conjunction וְ plus אַחַר introduces a new narrative section while
    linking it to what precedes. 'Now after' preserves both the connective force and
    natural English discourse flow better than a bare 'After,' while avoiding an overly
    wooden 'And after.'
- source_word: הַדְּבָרִים הָאֵלֶּה
  chosen: these things
  alternatives:
  - these events
  - these matters
  lexicon: HALOT
  rationale: דְּבָרִים here functions idiomatically for prior events/matters. 'These
    things' is a standard and sufficiently transparent rendering that preserves the
    Hebrew phrasing without unnecessary paraphrase.
- source_word: בְּמַלְכוּת
  chosen: in the reign of
  alternatives:
  - during the reign of
  - in the kingdom of
  lexicon: HALOT
  rationale: The noun refers here to the period of royal rule, not the territorial
    kingdom. 'In the reign of' is the most precise and idiomatic English equivalent
    in this context.
- source_word: אַרְתַּחְשַׁסְתְּא
  chosen: Artaxerxes
  rationale: Personal names are transliterated by standard English convention per
    project philosophy. 'Artaxerxes' is the established English form of this Persian
    royal name.
- source_word: מֶלֶךְ פָּרָס
  chosen: king of Persia
  alternatives:
  - the king of Persia
  lexicon: HALOT
  rationale: 'The construct phrase identifies Artaxerxes. English idiom does not require
    the article here after a proper name apposition: ''Artaxerxes king of Persia''
    is concise and natural.'
- source_word: עֶזְרָא
  chosen: Ezra
  rationale: Proper name transliterated by standard English convention.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: In genealogical sequences בן can sometimes denote a more remote descendant,
    but the immediate literary function is a genealogy formula. 'Son of' preserves
    the Hebrew wording and conventional genealogical style; the possibility of broader
    descent is worth preserving in a footnote rather than flattening the formula in
    the main text.
- source_word: שְׂרָיָה
  chosen: Seraiah
  rationale: Proper name transliterated by standard English convention.
- source_word: עֲזַרְיָה
  chosen: Azariah
  rationale: Proper name transliterated by standard English convention.
- source_word: חִלְקִיָּה
  chosen: Hilkiah
  rationale: Proper name transliterated by standard English convention.
