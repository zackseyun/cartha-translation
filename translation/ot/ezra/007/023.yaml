theological_decisions:
- issue: Rendering the temple phrase בֵית אֱלָהּ שְׁמַיָּא
  chosen_reading: for the house of the God of heaven
  alternative_readings:
  - for the temple of the God of heaven
  rationale: No doctrinal dispute is at stake, but the translation preserves the source
    metaphor 'house' rather than interpreting it as 'temple' in the main text. This
    follows original-language primacy while remaining understandable.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering the warning clause as 'lest wrath come'
  chosen_reading: lest wrath come upon the kingdom of the king and his sons
  alternative_readings:
  - for why should there be wrath against the realm of the king and his sons
  rationale: The Aramaic idiom can be represented more literally as a rhetorical question,
    but the main sense is a warning to avoid divine wrath. 'Lest' preserves that force
    without importing extra theology.
  doctrine_reference: Translation philosophy §3, §6
