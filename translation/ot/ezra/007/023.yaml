id: EZR.7.23
reference: Ezra 7:23
source:
  edition: WLC
  text: כָּל דִּ֗י מִן טַ֨עַם֙ אֱלָ֣הּ שְׁמַיָּ֔/א יִתְעֲבֵד֙ אַדְרַזְדָּ֔א לְ/בֵ֖ית
    אֱלָ֣הּ שְׁמַיָּ֑/א דִּֽי לְ/מָ֤ה לֶֽהֱוֵא֙ קְצַ֔ף עַל מַלְכ֥וּת מַלְכָּ֖/א וּ/בְנֽוֹ/הִי־־־־׃
translation:
  text: Whatever is commanded by the God of heaven, let it be done diligently for
    the house of the God of heaven, lest wrath come upon the kingdom of the king and
    his sons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'for why should there be wrath upon the kingdom of the
      king and his sons?'
    reason: lexical_alternative
  - marker: b
    text: '''House of the God of heaven'' refers to the temple.'
    reason: cultural_note
lexical_decisions:
- source_word: כָּל דִּי
  chosen: Whatever
  alternatives:
  - Everything that
  - All that
  lexicon: HALOT
  rationale: 'The combination introduces an indefinite totalizing relative clause:
    ''whatever/all that.'' ''Whatever'' is idiomatic modern English and preserves
    the comprehensive force.'
- source_word: מִן טַעַם
  chosen: is commanded by
  alternatives:
  - is decreed by
  - is according to the command of
  lexicon: HALOT
  rationale: Aramaic טַעַם can denote command, decree, or decision. In this imperial-administrative
    context, 'commanded' is clear and natural. The preposition מִן marks source, hence
    'by.'
- source_word: אֱלָהּ שְׁמַיָּא
  chosen: the God of heaven
  alternatives:
  - God of heaven
  lexicon: HALOT
  rationale: This is a standard title in Ezra-Aramaic. Including the article reflects
    the determined form and yields natural English.
- source_word: יִתְעֲבֵד
  chosen: let it be done
  alternatives:
  - it shall be done
  - it must be done
  lexicon: HALOT
  rationale: The imperfect/passive sense here functions jussively in context. 'Let
    it be done' preserves the directive force without over-specifying modality.
- source_word: אַדְרַזְדָּא
  chosen: diligently
  alternatives:
  - carefully
  - exactly
  - with all diligence
  lexicon: HALOT
  rationale: The adverb conveys promptness/care/exactness in execution. 'Diligently'
    captures the earnest administrative force in readable English.
- source_word: לְבֵית
  chosen: for the house of
  alternatives:
  - for the temple of
  - in the house of
  lexicon: HALOT
  rationale: The underlying noun is 'house,' and while it refers to the temple, the
    phrase 'house of the God of heaven' is retained to preserve the source wording
    and reverential register.
- source_word: דִּי לְמָה
  chosen: lest
  alternatives:
  - for why should
  - so that not
  lexicon: HALOT
  rationale: 'This idiom introduces a negative purpose/result question: ''why should...?''
    In English, ''lest'' concisely and accurately conveys the warning purpose.'
- source_word: לֶהֱוֵא קְצַף
  chosen: wrath come
  alternatives:
  - there be wrath
  - wrath fall
  lexicon: HALOT
  rationale: The clause literally expresses 'wrath be/come to be.' 'Wrath come' is
    idiomatic and preserves the sense of impending divine anger.
- source_word: עַל מַלְכוּת מַלְכָּא
  chosen: upon the kingdom of the king
  alternatives:
  - against the realm of the king
  - upon the king's kingdom
  lexicon: HALOT
  rationale: The phrase refers to the king's realm/kingdom rather than merely his
    person. 'Kingdom of the king' is slightly formal but transparent and close to
    the source.
- source_word: וּבְנוֹהִי
  chosen: and his sons
  alternatives:
  - and his descendants
  lexicon: HALOT
  rationale: The noun straightforwardly means 'his sons.' Although dynastic implications
    may be present, the more literal rendering should stand in the main text.
