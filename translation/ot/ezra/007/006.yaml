theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to expand the idiom 'the hand of the LORD ... upon him' interpretively
  chosen_reading: Retain the hand idiom in the main text
  alternative_readings:
  - because the LORD his God was favoring him
  - by the power of the LORD his God upon him
  rationale: The idiom can imply favor, empowerment, or providential guidance. To preserve theological tension rather than resolve the nuance, the translation keeps the concrete metaphor rather than collapsing it into a single interpretation.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
