id: EZR.7.6
reference: Ezra 7:6
source:
  edition: WLC
  text: ה֤וּא עֶזְרָא֙ עָלָ֣ה מִ/בָּבֶ֔ל וְ/הֽוּא סֹפֵ֤ר מָהִיר֙ בְּ/תוֹרַ֣ת מֹשֶׁ֔ה אֲשֶׁר נָתַ֥ן יְהוָ֖ה אֱלֹהֵ֣י יִשְׂרָאֵ֑ל וַ/יִּתֶּן ל֣/וֹ הַ/מֶּ֗לֶךְ כְּ/יַד יְהוָ֤ה אֱלֹהָי/ו֙ עָלָ֔י/ו כֹּ֖ל בַּקָּשָׁתֽ/וֹ־־־־׃פ
translation:
  text: This Ezra went up from Babylon, and he was a skilled scribe in the Law of Moses, which Yahweh, the God of Israel, had given. And the king granted him all his request, according to the hand of Yahweh his God upon him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'according to the hand of the LORD his God upon him,' an idiom for the LORD's favor, power, or providential help.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלָה מִבָּבֶל
  chosen: went up from Babylon
  alternatives:
  - came up from Babylon
  lexicon: HALOT
  rationale: עלה with מן is the standard idiom for ascending/traveling up from a place; 'went up' preserves the Hebrew wording and the Jerusalem-oriented sense better than a flatter 'came.'
- source_word: סֹפֵר
  chosen: scribe
  alternatives:
  - scholar
  - secretary
  lexicon: HALOT
  rationale: סֹפֵר can denote an official secretary or a learned copyist/expert in texts. In this context, qualified by 'in the Law of Moses,' 'scribe' best preserves both the literary and legal-religious sense without over-interpreting as merely 'scholar.'
- source_word: מָהִיר
  chosen: skilled
  alternatives:
  - ready
  - swift
  - learned
  lexicon: HALOT
  rationale: The adjective can carry the sense of quick, ready, or expert. In English, 'skilled scribe' naturally conveys competence in the Torah context. 'Swift' would sound physical rather than intellectual; 'ready' is too vague.
- source_word: בְּתוֹרַת מֹשֶׁה
  chosen: in the Law of Moses
  alternatives:
  - in the instruction of Moses
  - in the Torah of Moses
  lexicon: HALOT
  rationale: תּוֹרָה can mean instruction broadly, but in Ezra's postexilic legal-covenantal setting 'Law' is the most contextually fitting and idiomatic rendering. 'Torah' is possible but less transparent for general readers.
- source_word: אֲשֶׁר נָתַן יְהוָה אֱלֹהֵי יִשְׂרָאֵל
  chosen: which the LORD, the God of Israel, had given
  alternatives:
  - which the LORD God of Israel gave
  lexicon: HALOT
  rationale: The relative clause modifies 'the Law of Moses.' Rendering YHWH as 'the LORD' follows the doctrinal default. The pluperfect 'had given' fits the prior action relative to Ezra's present description.
- source_word: וַיִּתֶּן לוֹ הַמֶּלֶךְ
  chosen: the king granted him
  alternatives:
  - the king gave him
  lexicon: HALOT
  rationale: '''Granted'' is a natural English rendering when the object is a request rather than a physical item, while still reflecting נתן.'
- source_word: כְּיַד יְהוָה אֱלֹהָיו עָלָיו
  chosen: according to the hand of the LORD his God upon him
  alternatives:
  - according to the good hand of the LORD his God upon him
  - as the hand of the LORD his God was upon him
  lexicon: HALOT
  rationale: The Hebrew here lacks 'good' (טוֹבָה), which appears in nearby verses; it should not be imported. 'Hand ... upon him' is a common idiom for divine favor/power, and retaining it preserves the theological imagery. 'According to' reflects כְּ faithfully.
- source_word: כֹּל בַּקָּשָׁתוֹ
  chosen: all his request
  alternatives:
  - everything he asked
  - all his petition
  lexicon: HALOT
  rationale: The singular noun with כֹּל is well represented by 'all his request,' preserving the formal tone and the sense that the king granted the entirety of what Ezra sought.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
