id: EZR.7.21
reference: Ezra 7:21
source:
  edition: WLC
  text: וּ֠/מִנִּ/י אֲנָ֞ה אַרְתַּחְשַׁ֤סְתְּא מַלְכָּ/א֙ שִׂ֣ים טְעֵ֔ם לְ/כֹל֙ גִּזַּֽבְרַיָּ֔/א
    דִּ֖י בַּ/עֲבַ֣ר נַהֲרָ֑/ה דִּ֣י כָל דִּ֣י יִ֠שְׁאֲלֶנְ/כוֹן עֶזְרָ֨א כָהֲנָ֜/ה
    סָפַ֤ר דָּתָ/א֙ דִּֽי אֱלָ֣הּ שְׁמַיָּ֔/א אָסְפַּ֖רְנָא יִתְעֲבִֽד־־׃
translation:
  text: 'And from me, I, King Artaxerxes, issue a decree to all the treasurers in
    Beyond the River: whatever Ezra the priest, the scribe of the law of the God of
    heaven, asks of you, let it be done diligently.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let it be done exactly/promptly'; the Aramaic adverb emphasizes careful
      and full compliance.
    reason: lexical_alternative
  - marker: b
    text: '''Beyond the River'' is the Persian administrative name for the region
      west of the Euphrates.'
    reason: cultural_note
lexical_decisions:
- source_word: וּמִנִּי
  chosen: And from me
  alternatives:
  - And by me
  - Moreover, from me
  lexicon: HALOT
  rationale: Introduces the king's personal authorization. 'And from me' preserves
    the emphatic source phrasing better than smoothing it away.
- source_word: אֲנָה
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: 'Retains the explicit first-person pronoun for emphasis: the decree comes
    personally from the king.'
- source_word: אַרְתַּחְשַׁסְתְּא מַלְכָּא
  chosen: King Artaxerxes
  alternatives:
  - Artaxerxes the king
  lexicon: HALOT
  rationale: Standard English order for a royal title with a personal name; preserves
    the identification clearly and naturally.
- source_word: שִׂים טְעֵם
  chosen: issue a decree
  alternatives:
  - make a decree
  - set forth an order
  lexicon: HALOT
  rationale: The idiom means to establish or promulgate an official order. 'Issue
    a decree' is idiomatic modern English while preserving the formal legal sense.
- source_word: לְכֹל גִּזַּבְרַיָּא
  chosen: to all the treasurers
  alternatives:
  - to all the treasurers/treasury officials
  - to all the officials of the treasury
  lexicon: HALOT
  rationale: גִּזַּבְרַיָּא refers to treasury officials. 'Treasurers' is concise
    and fits the administrative context.
- source_word: דִּי בַּעֲבַר נַהֲרָה
  chosen: in Beyond the River
  alternatives:
  - in the province Beyond the River
  - across the River
  lexicon: HALOT
  rationale: This is the standard Persian administrative designation for the region
    west of the Euphrates. Capitalizing 'Beyond the River' signals a proper regional
    title rather than a mere geographic description.
- source_word: כָל דִּי
  chosen: whatever
  alternatives:
  - everything that
  - all that
  lexicon: HALOT
  rationale: This compactly renders the indefinite relative construction in natural
    English.
- source_word: יִשְׁאֲלֶנְכוֹן
  chosen: asks of you
  alternatives:
  - requests from you
  - requires of you
  lexicon: HALOT
  rationale: The verb denotes asking or requesting. 'Asks of you' preserves the directness
    without overstating compulsion, which is supplied by the royal decree itself.
- source_word: עֶזְרָא כָהֲנָה
  chosen: Ezra the priest
  alternatives:
  - Ezra, the priest
  lexicon: HALOT
  rationale: Straightforward appositional identification.
- source_word: סָפַר דָּתָא
  chosen: the scribe of the law
  alternatives:
  - the scholar of the law
  - the secretary of the law
  lexicon: HALOT
  rationale: סָפַר here is an official/scholarly title. 'Scribe' best preserves both
    the administrative and learned dimensions without overinterpretation.
- source_word: דִּי אֱלָהּ שְׁמַיָּא
  chosen: of the God of heaven
  alternatives:
  - of the God of the heavens
  lexicon: HALOT
  rationale: This is a common imperial-period title for Israel's God. Singular 'heaven'
    is standard English idiom and preserves the sense.
- source_word: אָסְפַּרְנָא
  chosen: diligently
  alternatives:
  - exactly
  - promptly
  - carefully
  lexicon: HALOT
  rationale: The adverb conveys careful, exact, or prompt execution. 'Diligently'
    captures the sense of thorough compliance in an administrative order.
- source_word: יִתְעֲבִד
  chosen: let it be done
  alternatives:
  - it shall be done
  - it must be done
  lexicon: HALOT
  rationale: Passive/imperfect in decree style. 'Let it be done' preserves the formal
    jussive force in natural English; the imperative authority is already clear from
    the king's decree.
