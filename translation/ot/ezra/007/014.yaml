id: EZR.7.14
reference: Ezra 7:14
source:
  edition: WLC
  text: כָּ/ל קֳבֵ֗ל דִּי֩ מִן קֳדָ֨ם מַלְכָּ֜/א וְ/שִׁבְעַ֤ת יָעֲטֹ֨/הִי֙ שְׁלִ֔יחַ
    לְ/בַקָּרָ֥א עַל יְה֖וּד וְ/לִֽ/ירוּשְׁלֶ֑ם בְּ/דָ֥ת אֱלָהָ֖/ךְ דִּ֥י בִ/ידָֽ/ךְ־־־׃
translation:
  text: because you are sent from before the king and his seven counselors to inquire
    concerning Judah and Jerusalem according to the law of your God that is in your
    hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the presence of the king.' The Aramaic court idiom emphasizes that
      Ezra's commission comes from the royal presence.
    reason: lexical_alternative
  - marker: b
    text: Or 'which is in your possession' or 'which is entrusted to you.' Literally,
      'that is in your hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל־קֳבֵל דִּי
  chosen: because
  alternatives:
  - forasmuch as
  - since
  - inasmuch as
  lexicon: HALOT
  rationale: This Aramaic idiom introduces the reason for the decree. 'Because' is
    natural modern English and preserves the causal force without archaic phrasing.
- source_word: מִן קֳדָם מַלְכָּא
  chosen: from before the king
  alternatives:
  - by the king
  - from the presence of the king
  lexicon: HALOT
  rationale: Literally 'from before the king,' an official court expression indicating
    commission from the royal presence. Retaining 'from before' preserves the formal
    flavor better than the flatter 'by the king.'
- source_word: וְשִׁבְעַת יָעֲטֹהִי
  chosen: and his seven counselors
  alternatives:
  - and his seven advisers
  lexicon: HALOT
  rationale: The noun refers to royal advisers/counselors. 'Counselors' fits the court
    setting and is standard English for such officials.
- source_word: שְׁלִיחַ
  chosen: you are sent
  alternatives:
  - you are commissioned
  - you are dispatched
  lexicon: HALOT
  rationale: Passive participle describing Ezra's official status. 'You are sent'
    is straightforward and sufficiently formal; 'commissioned' is possible but slightly
    more interpretive.
- source_word: לְבַקָּרָא
  chosen: to inquire
  alternatives:
  - to investigate
  - to examine
  lexicon: HALOT
  rationale: The verb carries the sense of seeking out, examining, or making inquiry.
    'To inquire' best balances formal accuracy and readable English in an administrative
    context.
- source_word: עַל יְהוּד וְלִירוּשְׁלֶם
  chosen: concerning Judah and Jerusalem
  alternatives:
  - about Judah and Jerusalem
  - over Judah and Jerusalem
  lexicon: HALOT
  rationale: With this verb and preposition, the sense is inquiry regarding the condition
    or conduct of Judah and Jerusalem. 'Concerning' is precise and natural.
- source_word: בְּדָת אֱלָהָךְ
  chosen: according to the law of your God
  alternatives:
  - with regard to the law of your God
  - by the law of your God
  lexicon: HALOT
  rationale: The preposition marks the standard or norm by which the inquiry is to
    be made. 'According to' clearly conveys that Ezra's investigation is governed
    by God's law.
- source_word: דִּי בִידָךְ
  chosen: that is in your hand
  alternatives:
  - which is in your possession
  - which is entrusted to you
  lexicon: HALOT
  rationale: Literally 'that is in your hand.' This can imply possession, custody,
    or mastery. The literal rendering is clear in English and preserves the idiomatic
    texture while allowing readers to infer possession/authority.
