id: EZR.7.27
reference: Ezra 7:27
source:
  edition: WLC
  text: בָּר֥וּךְ יְהוָ֖ה אֱלֹהֵ֣י אֲבוֹתֵ֑י/נוּ אֲשֶׁ֨ר נָתַ֤ן כָּ/זֹאת֙ בְּ/לֵ֣ב
    הַ/מֶּ֔לֶךְ לְ/פָאֵ֕ר אֶת בֵּ֥ית יְהוָ֖ה אֲשֶׁ֥ר בִּ/ירוּשָׁלִָֽם־׃
translation:
  text: Blessed be the LORD, the God of our fathers, who put such a thing into the
    king’s heart, to beautify the house of the LORD that is in Jerusalem,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to adorn' or 'to glorify' the house of the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרוּךְ
  chosen: Blessed be
  alternatives:
  - Blessed
  - Praised be
  lexicon: HALOT
  rationale: A predicative passive participle used in doxological blessing formulae.
    'Blessed be' is idiomatic English for this Hebrew benediction and preserves the
    praise-directed sense better than a flat adjectival 'Blessed' alone.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the divine name is rendered 'the LORD' rather than transliterated.
- source_word: אֱלֹהֵי אֲבוֹתֵינוּ
  chosen: the God of our fathers
  alternatives:
  - the God of our ancestors
  lexicon: HALOT
  rationale: This construct chain is a standard covenantal expression. 'Fathers' is
    retained as gender-accurate and formally closer to the Hebrew; 'ancestors' is
    possible but less literal and flattens the traditional idiom.
- source_word: אֲשֶׁר נָתַן
  chosen: who put
  alternatives:
  - who gave
  lexicon: HALOT
  rationale: נתן literally means 'gave,' but with 'into the heart' English idiom prefers
    'put,' which naturally conveys the causative placement of intention or desire.
- source_word: כָּזֹאת
  chosen: such a thing
  alternatives:
  - this
  - such things
  lexicon: HALOT
  rationale: The feminine singular demonstrative with prefixed כ conveys 'like this'
    or 'such as this.' 'Such a thing' is idiomatic and fits the singular reference
    to the king's intention.
- source_word: בְּלֵב הַמֶּלֶךְ
  chosen: into the king’s heart
  alternatives:
  - in the king’s heart
  lexicon: HALOT
  rationale: The preposition with 'heart' in this idiom expresses inward motivation
    or resolve. 'Into the king's heart' preserves the directional nuance of implanted
    intention better than simply 'in.'
- source_word: לְפָאֵר
  chosen: to beautify
  alternatives:
  - to glorify
  - to adorn
  - to honor
  lexicon: HALOT
  rationale: The piel infinitive of פאר here refers to making the temple splendid
    or adorned. 'Beautify' best captures the concrete sense in context; 'glorify'
    would sound more abstract and potentially over-theologized.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of the LORD.' While it refers to the temple, retaining
    'house' preserves the Hebrew expression and its covenantal resonance.
- source_word: אֲשֶׁר בִּירוּשָׁלִָם
  chosen: that is in Jerusalem
  alternatives:
  - which is in Jerusalem
  lexicon: HALOT
  rationale: A straightforward relative clause locating the house of the LORD. 'That
    is in Jerusalem' is natural modern English.
