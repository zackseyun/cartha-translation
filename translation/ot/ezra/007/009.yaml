id: EZR.7.9
reference: Ezra 7:9
source:
  edition: WLC
  text: כִּ֗י בְּ/אֶחָד֙ לַ/חֹ֣דֶשׁ הָ/רִאשׁ֔וֹן ה֣וּא יְסֻ֔ד הַֽ/מַּעֲלָ֖ה מִ/בָּבֶ֑ל
    וּ/בְ/אֶחָ֞ד לַ/חֹ֣דֶשׁ הַ/חֲמִישִׁ֗י בָּ֚א אֶל יְר֣וּשָׁלִַ֔ם כְּ/יַד אֱלֹהָ֖י/ו
    הַ/טּוֹבָ֥ה עָלָֽי/ו־־׃
translation:
  text: For on the first day of the first month he began the journey up from Babylon,
    and on the first day of the fifth month he came to Jerusalem, according to the
    good hand of his God upon him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'because the good hand of his God was upon him.' The Hebrew idiom can
      express divine favor as the reason for Ezra's successful arrival.
    reason: alternative_reading
  - marker: b
    text: Literally, 'the ascent from Babylon,' a conventional way of speaking about
      the journey up to Jerusalem.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces an explanatory statement giving the timing and reason-context
    for Ezra's arrival. 'For' fits the discourse flow in English better than a more
    causal 'because' here.
- source_word: בְּאֶחָד לַחֹדֶשׁ הָרִאשׁוֹן
  chosen: on the first day of the first month
  alternatives:
  - in the first month, on the first day
  lexicon: HALOT
  rationale: This date formula is most naturally rendered as a calendar expression
    in English. 'On the first day of the first month' preserves the Hebrew structure
    and sense.
- source_word: יְסֻד
  chosen: began
  alternatives:
  - was founded
  - laid the foundation of
  - set out
  lexicon: HALOT
  rationale: The noun/verb-form expression with הוּא and הַמַּעֲלָה idiomatically
    refers to the commencement of the expedition. A wooden 'was founded' would be
    misleading in English; 'began' captures the sense of initiating the journey.
- source_word: הַמַּעֲלָה
  chosen: the journey up
  alternatives:
  - the ascent
  - the expedition
  lexicon: HALOT
  rationale: The term literally denotes an ascent/going up. Because travel to Jerusalem
    is conventionally 'up,' 'the journey up' preserves both the travel sense and the
    Jerusalem-oriented elevation idiom.
- source_word: מִבָּבֶל
  chosen: from Babylon
  lexicon: HALOT
  rationale: Straightforward source location for the journey.
- source_word: וּבְאֶחָד לַחֹדֶשׁ הַחֲמִישִׁי
  chosen: and on the first day of the fifth month
  alternatives:
  - then on the first day of the fifth month
  lexicon: HALOT
  rationale: Maintains the parallel date formula and the narrative sequence.
- source_word: בָּא אֶל יְרוּשָׁלַם
  chosen: he came to Jerusalem
  alternatives:
  - he arrived at Jerusalem
  lexicon: HALOT
  rationale: '''Came to'' is a direct and natural rendering of the Hebrew verb plus
    preposition. ''Arrived at'' is possible but slightly more interpretive.'
- source_word: כְּיַד
  chosen: according to the ... hand
  alternatives:
  - by the ... hand
  - because of the ... hand
  lexicon: HALOT
  rationale: The idiom denotes action in accordance with or by means of divine power/favor.
    'According to the ... hand' preserves the Hebrew metaphor while remaining intelligible
    in English.
- source_word: אֱלֹהָיו
  chosen: his God
  lexicon: HALOT
  rationale: The pronominal suffix is singular and personal, referring to Ezra's God.
- source_word: הַטּוֹבָה
  chosen: good
  alternatives:
  - gracious
  - beneficent
  lexicon: HALOT
  rationale: '''Good'' is the plain lexical sense and preserves the familiar biblical
    idiom ''the good hand of God.'' ''Gracious'' would narrow the semantic range toward
    favor alone.'
- source_word: עָלָיו
  chosen: upon him
  alternatives:
  - on him
  lexicon: HALOT
  rationale: '''Upon him'' preserves the elevated idiomatic force of divine favor/resting
    presence in readable English.'
