theological_decisions:
- issue: Rendering the idiom כְּיַד אֱלֹהָיו הַטּוֹבָה עָלָיו
  chosen_reading: according to the good hand of his God upon him
  alternative_readings:
  - because the good hand of his God was upon him
  - by the good hand of his God upon him
  rationale: The phrase is an idiom of divine favor and enabling. The chosen rendering
    keeps the metaphor of God's 'hand' rather than flattening it into mere causation,
    preserving the theological texture of providential guidance without over-interpreting
    the exact nuance of כְּ.
  doctrine_reference: Translation philosophy §1, §3, §6
