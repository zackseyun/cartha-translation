id: EZR.7.19
reference: Ezra 7:19
source:
  edition: WLC
  text: וּ/מָֽאנַיָּ/א֙ דִּֽי מִתְיַהֲבִ֣ין לָ֔/ךְ לְ/פָלְחָ֖ן בֵּ֣ית אֱלָהָ֑/ךְ הַשְׁלֵ֕ם
    קֳדָ֖ם אֱלָ֥הּ יְרוּשְׁלֶֽם־׃
translation:
  text: And the vessels that are given to you for the service of the house of your
    God, deliver in full before the God of Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the worship of the house of your God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'present in full before the God of Jerusalem.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָאנַיָּא
  chosen: the vessels
  alternatives:
  - the articles
  - the utensils
  lexicon: HALOT
  rationale: Aramaic term for implements or vessels. In temple context, 'vessels'
    is the most natural and established English rendering without becoming overly
    technical.
- source_word: דִּי
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Relative particle introducing the clause describing the vessels. 'That'
    is idiomatic modern English.
- source_word: מִתְיַהֲבִין לָךְ
  chosen: are given to you
  alternatives:
  - are being given to you
  - have been given to you
  lexicon: HALOT
  rationale: Passive participial form from יהב in Imperial Aramaic. 'Are given to
    you' preserves the passive sense and fits the decree style.
- source_word: לְפָלְחָן
  chosen: for the service
  alternatives:
  - for the ministry
  - for the worship
  lexicon: HALOT
  rationale: The noun denotes service or cultic service. 'Service' is broad enough
    to include temple use without importing later ecclesiastical terminology; 'worship'
    is possible but slightly more interpretive.
- source_word: בֵּית אֱלָהָךְ
  chosen: of the house of your God
  alternatives:
  - for the house of your God
  - of your God's house
  lexicon: HALOT
  rationale: Construct chain indicating the temple belonging to Ezra's God. 'Of the
    house of your God' closely follows the source syntax while remaining readable.
- source_word: הַשְׁלֵם
  chosen: deliver in full
  alternatives:
  - present in full
  - pay in full
  - complete
  lexicon: HALOT
  rationale: Imperative from שלם in the sense of making complete, delivering fully,
    or rendering in full. In context of temple vessels, 'deliver in full' best conveys
    handing them over completely, not merely finishing an action abstractly.
- source_word: קֳדָם
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: Common Aramaic preposition meaning 'before' or 'in the presence of.'
    'Before' is concise and natural.
- source_word: אֱלָהּ יְרוּשְׁלֶם
  chosen: the God of Jerusalem
  alternatives:
  - God in Jerusalem
  lexicon: HALOT
  rationale: The phrase identifies Israel's God in relation to Jerusalem, as in Persian-period
    administrative style. 'The God of Jerusalem' is the most direct rendering.
