theological_decisions:
- issue: Temple-related terminology
  chosen_reading: service of the house of your God
  alternative_readings:
  - worship of the house of your God
  - ministry of the house of your God
  rationale: The verse concerns cultic use of temple vessels, but the Aramaic noun
    itself is broader than explicitly liturgical 'worship.' 'Service' preserves the
    temple context without narrowing the meaning beyond the source text.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source
    text''s plain sense without importing doctrinal claims.'
