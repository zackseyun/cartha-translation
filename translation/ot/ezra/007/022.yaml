id: EZR.7.22
reference: Ezra 7:22
source:
  edition: WLC
  text: עַד כְּסַף֮ כַּכְּרִ֣ין מְאָה֒ וְ/עַד חִנְטִין֙ כֹּרִ֣ין מְאָ֔ה וְ/עַד חֲמַר֙
    בַּתִּ֣ין מְאָ֔ה וְ/עַד בַּתִּ֥ין מְשַׁ֖ח מְאָ֑ה וּ/מְלַ֖ח דִּי לָ֥א כְתָֽב־־־־־׃
translation:
  text: up to one hundred talents of silver, and up to one hundred cors of wheat,
    and up to one hundred baths of wine, and up to one hundred baths of oil, and salt
    without limit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'salt, which is not written,' that is, salt with no
      specified amount.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד
  chosen: up to
  alternatives:
  - as far as
  - until
  lexicon: HALOT
  rationale: In this administrative list, עַד marks a maximum allotment or limit for
    each item, best rendered 'up to' in natural English.
- source_word: כְּסַף
  chosen: silver
  alternatives:
  - money
  lexicon: HALOT
  rationale: The term literally denotes silver; in a tribute/provision context it
    can function as money, but the text specifies the metal measured by talents, so
    'silver' is more precise.
- source_word: כַּכְּרִין
  chosen: talents
  lexicon: HALOT
  rationale: This Aramaic plural refers to the talent as a weight-based monetary measure.
    'Talents' preserves the ancient unit rather than obscuring it with a modern equivalent.
- source_word: מְאָה
  chosen: one hundred
  alternatives:
  - a hundred
  lexicon: HALOT
  rationale: Cardinal number rendered straightforwardly; repeated for each commodity
    to preserve the source's measured, decree-like style.
- source_word: חִנְטִין
  chosen: wheat
  alternatives:
  - grain
  lexicon: HALOT
  rationale: The noun specifically denotes wheat, not grain in general.
- source_word: כֹּרִין
  chosen: cors
  alternatives:
  - kor measures
  - cors (kor measures)
  lexicon: HALOT
  rationale: An ancient dry measure. 'Cors' is a standard English transliteration
    that preserves the specific unit without speculative conversion.
- source_word: חֲמַר
  chosen: wine
  lexicon: HALOT
  rationale: The Aramaic term denotes wine in this list of temple provisions.
- source_word: בַּתִּין
  chosen: baths
  alternatives:
  - bath measures
  lexicon: HALOT
  rationale: This is the plural of the liquid measure 'bath.' Retaining the ancient
    unit is more transparent than converting.
- source_word: מְשַׁח
  chosen: oil
  alternatives:
  - olive oil
  lexicon: HALOT
  rationale: The term denotes oil, likely olive oil in context, but the text itself
    does not explicitly specify 'olive,' so 'oil' is preferable.
- source_word: מְלַח
  chosen: salt
  lexicon: HALOT
  rationale: Straightforward rendering of the commodity listed last.
- source_word: דִּי לָא כְתָב
  chosen: without limit
  alternatives:
  - which is not written
  - without specification
  - without measure
  lexicon: HALOT
  rationale: The idiom means that no fixed amount is prescribed for the salt. 'Without
    limit' communicates the administrative sense clearly in idiomatic English. A more
    literal alternative is preserved in a footnote.
