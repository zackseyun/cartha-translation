id: EZR.7.28
reference: Ezra 7:28
source:
  edition: WLC
  text: וְ/עָלַ֣/י הִטָּה חֶ֗סֶד לִ/פְנֵ֤י הַ/מֶּ֨לֶךְ֙ וְ/יֽוֹעֲצָ֔י/ו וּ/לְ/כָל שָׂרֵ֥י הַ/מֶּ֖לֶךְ הַ/גִּבֹּרִ֑ים וַ/אֲנִ֣י הִתְחַזַּ֗קְתִּי כְּ/יַד יְהוָ֤ה אֱלֹהַ/י֙ עָלַ֔/י וָ/אֶקְבְּצָ֧/ה מִ/יִּשְׂרָאֵ֛ל רָאשִׁ֖ים לַ/עֲל֥וֹת עִמִּֽ/י־־־׃פ
translation:
  text: and who extended steadfast love to me before the king and his counselors and all the king’s mighty officials. And I took courage, because the hand of Yahweh my God was upon me, and I gathered leading men from Israel to go up with me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'showed favor to me' for 'extended steadfast love to me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I strengthened myself according to the hand of the LORD my God upon me.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'heads'; that is, leading men or chiefs from Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִטָּה חֶסֶד
  chosen: extended steadfast love
  alternatives:
  - showed favor
  - inclined covenant faithfulness
  - extended kindness
  lexicon: HALOT
  rationale: The idiom literally means 'stretched out/extended ḥesed.' 'Extended steadfast love' preserves the verbal image and the covenantally weighty noun חֶסֶד better than the flatter 'showed favor,' while remaining natural English.
- source_word: חֶסֶד
  chosen: steadfast love
  alternatives:
  - kindness
  - favor
  - lovingkindness
  lexicon: HALOT
  rationale: חֶסֶד often carries loyal, gracious covenantal overtones. Here the benefaction comes through the Persian king, but Ezra attributes it ultimately to God, so 'steadfast love' preserves the theological weight better than merely 'kindness'.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the sight of
  - in the presence of
  lexicon: HALOT
  rationale: A straightforward rendering of the preposition that fits the repeated sequence with the king, his counselors, and his officials.
- source_word: יֹעֲצָיו
  chosen: his counselors
  alternatives:
  - his advisers
  lexicon: HALOT
  rationale: Either English term works; 'counselors' is slightly more formal and matches court context.
- source_word: שָׂרֵי הַמֶּלֶךְ הַגִּבֹּרִים
  chosen: the king’s mighty officials
  alternatives:
  - the king's powerful princes
  - the king's mighty commanders
  lexicon: HALOT
  rationale: שָׂרִים are high officials/princes; הַגִּבֹּרִים marks them as powerful or mighty. 'Officials' fits the Persian administrative setting better than 'princes,' and 'mighty' preserves the adjective.
- source_word: הִתְחַזַּקְתִּי
  chosen: I took courage
  alternatives:
  - I strengthened myself
  - I became strong
  lexicon: HALOT
  rationale: The hitpael here expresses being strengthened/emboldened. 'I took courage' communicates the idiomatic sense in natural English without implying self-generated strength apart from the following clause.
- source_word: כְּיַד ... עָלַי
  chosen: because the hand of the LORD my God was upon me
  alternatives:
  - according to the hand of the LORD my God upon me
  - as the hand of the LORD my God was on me
  lexicon: HALOT
  rationale: The phrase can be rendered more formally as 'according to the hand... upon me,' but in context it explains the basis of Ezra's courage. 'Because the hand ... was upon me' makes the causal force clear in idiomatic English while preserving the metaphor of divine empowerment.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וָאֶקְבְּצָה
  chosen: I gathered
  alternatives:
  - I assembled
  lexicon: HALOT
  rationale: A simple past narrative verb; 'gathered' is direct and natural.
- source_word: רָאשִׁים
  chosen: leading men
  alternatives:
  - heads
  - chief men
  - leaders
  lexicon: HALOT
  rationale: Literally 'heads,' referring to recognized leaders. 'Leading men' preserves the masculine reference and social role more clearly than the abstract 'leaders.'
- source_word: לַעֲלוֹת
  chosen: to go up
  alternatives:
  - to ascend
  lexicon: HALOT
  rationale: The standard idiom for travel to Jerusalem is 'go up.' This preserves the biblical directional language without sounding overly formal.
