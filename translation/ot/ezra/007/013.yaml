id: EZR.7.13
reference: Ezra 7:13
source:
  edition: WLC
  text: מִנִּ/י֮ שִׂ֣ים טְעֵם֒ דִּ֣י כָל מִתְנַדַּ֣ב בְּ/מַלְכוּתִ/י֩ מִן עַמָּ֨/ה
    יִשְׂרָאֵ֜ל וְ/כָהֲנ֣וֹ/הִי וְ/לֵוָיֵ֗/א לִ/מְהָ֧ךְ לִֽ/ירוּשְׁלֶ֛ם עִמָּ֖/ךְ
    יְהָֽךְ־־׃
translation:
  text: A decree is issued by me that anyone in my kingdom from the people of Israel,
    and its priests and Levites, who freely offers himself to go to Jerusalem with
    you, may go.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everyone who volunteers.' The Aramaic participle emphasizes willing,
      voluntary action.
    reason: lexical_alternative
  - marker: b
    text: Or 'and his priests,' if the suffix is taken differently; context favors
      'its priests,' referring to Israel.
    reason: alternative_reading
lexical_decisions:
- source_word: מִנִּי
  chosen: by me
  alternatives:
  - from me
  lexicon: HALOT
  rationale: In the administrative formula מִנִּי שִׂים טְעֵם, the preposition with
    first-person suffix marks the royal source of the edict. 'By me' is idiomatic
    in English legal style while preserving that the decree proceeds from the king.
- source_word: שִׂים טְעֵם
  chosen: A decree is issued
  alternatives:
  - a decree is set
  - an order is made
  lexicon: HALOT
  rationale: This Aramaic idiom literally involves 'placing/setting a decree.' English
    legal idiom prefers 'a decree is issued.' The passive-like English reflects the
    formal proclamation style without over-literal awkwardness.
- source_word: דִּי
  chosen: that
  alternatives:
  - which
  - for
  lexicon: HALOT
  rationale: Here דִּי introduces the content of the decree, best rendered by the
    complementizer 'that.'
- source_word: כָל מִתְנַדַּב
  chosen: anyone ... who freely offers himself
  alternatives:
  - everyone who volunteers
  - whoever is willing
  lexicon: HALOT
  rationale: The Hitpael participle conveys voluntary willingness. 'Freely offers
    himself' preserves the reflexive-volitional nuance more closely than the flatter
    'volunteers.' Because the form is masculine singular and refers to an individual
    member of the listed groups, the gender-accurate singular is retained.
- source_word: בְּמַלְכוּתִי
  chosen: in my kingdom
  alternatives:
  - in my realm
  lexicon: HALOT
  rationale: The phrase denotes the territory/domain under the king's rule. 'Kingdom'
    is the most natural and transparent rendering.
- source_word: מִן עַמָּה יִשְׂרָאֵל
  chosen: from the people of Israel
  alternatives:
  - from the people Israel
  - from Israel's people
  lexicon: HALOT
  rationale: The expression identifies the ethnic-national group from which volunteers
    may come. 'The people of Israel' is idiomatic and clear.
- source_word: וְכָהֲנוֹהִי
  chosen: and its priests
  alternatives:
  - and his priests
  lexicon: HALOT
  rationale: The suffix most naturally refers back to Israel as the antecedent in
    context, yielding 'its priests' = Israel's priests. This avoids implying the king's
    own priests.
- source_word: וְלֵוָיֵא
  chosen: and Levites
  lexicon: HALOT
  rationale: Standard rendering of the temple-servant tribal designation.
- source_word: לִמְהָךְ
  chosen: to go
  alternatives:
  - to depart
  lexicon: HALOT
  rationale: Infinitive of הלך in Aramaic; simple motion toward Jerusalem is intended.
- source_word: לִירוּשְׁלֶם
  chosen: to Jerusalem
  lexicon: HALOT
  rationale: Standard place-name transliteration with directional preposition.
- source_word: עִמָּךְ
  chosen: with you
  lexicon: HALOT
  rationale: Directly indicates accompaniment with Ezra.
- source_word: יְהָךְ
  chosen: may go
  alternatives:
  - let him go
  - shall go
  lexicon: HALOT
  rationale: The imperfect/jussive-like form in decree context grants permission.
    'May go' captures authorized permission better than a bare future.
