id: EZR.7.7
reference: Ezra 7:7
source:
  edition: WLC
  text: וַ/יַּֽעֲל֣וּ מִ/בְּנֵֽי יִ֠שְׂרָאֵל וּ/מִן הַ/כֹּהֲנִ֨ים וְ/הַ/לְוִיִּ֜ם
    וְ/הַ/מְשֹׁרְרִ֧ים וְ/הַ/שֹּׁעֲרִ֛ים וְ/הַ/נְּתִינִ֖ים אֶל יְרוּשָׁלִָ֑ם בִּ/שְׁנַת
    שֶׁ֖בַע לְ/אַרְתַּחְשַׁ֥סְתְּא הַ/מֶּֽלֶךְ־־־־׃
translation:
  text: And some of the sons of Israel, and some of the priests, the Levites, the
    singers, the gatekeepers, and the temple servants went up to Jerusalem in the
    seventh year of King Artaxerxes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'some of the Israelites.' The Hebrew literally says 'some of the sons
      of Israel,' with a partitive sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Nethinim,' a technical term for a class of temple servants.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲלוּ
  chosen: went up
  alternatives:
  - came up
  - ascended
  lexicon: HALOT
  rationale: עלה commonly denotes going up, especially for travel to Jerusalem, preserving
    the geographical/cultic nuance better than the flatter 'went.'
- source_word: מִבְּנֵי יִשְׂרָאֵל
  chosen: some of the sons of Israel
  alternatives:
  - some of the Israelites
  - from the sons of Israel
  lexicon: HALOT
  rationale: The partitive מִן indicates that only some members of this group went
    up. 'Sons of Israel' is more formally aligned with the Hebrew than 'Israelites,'
    while still natural in English with the added 'some of.'
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֲנִים in this cultic list.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of the tribal/temple class term.
- source_word: הַמְשֹׁרְרִים
  chosen: the singers
  alternatives:
  - the musicians
  lexicon: HALOT
  rationale: The participial/nominal form refers specifically to those who sing in
    temple service; 'singers' is more precise than the broader 'musicians.'
- source_word: הַשֹּׁעֲרִים
  chosen: the gatekeepers
  alternatives:
  - the doorkeepers
  lexicon: HALOT
  rationale: Traditional and accurate rendering for temple personnel responsible for
    the gates.
- source_word: הַנְּתִינִים
  chosen: the temple servants
  alternatives:
  - the Nethinim
  - the given ones
  lexicon: HALOT
  rationale: A functional translation communicates the role of this recognized temple
    service group better than simple transliteration, while avoiding an opaque term
    for modern readers.
- source_word: אֶל יְרוּשָׁלִָם
  chosen: to Jerusalem
  alternatives:
  - into Jerusalem
  lexicon: HALOT
  rationale: Standard directional rendering for אֶל with a place name.
- source_word: בִּשְׁנַת שֶׁבַע
  chosen: in the seventh year
  alternatives:
  - in year seven
  lexicon: HALOT
  rationale: Idiomatic English rendering of the temporal phrase.
- source_word: לְאַרְתַּחְשַׁסְתְּא הַמֶּלֶךְ
  chosen: of King Artaxerxes
  alternatives:
  - of Artaxerxes the king
  lexicon: HALOT
  rationale: Both are accurate; 'of King Artaxerxes' is slightly more natural in contemporary
    English while preserving the royal title.
