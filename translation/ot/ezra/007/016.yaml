id: EZR.7.16
reference: Ezra 7:16
source:
  edition: WLC
  text: וְ/כֹל֙ כְּסַ֣ף וּ/דְהַ֔ב דִּ֣י תְהַשְׁכַּ֔ח בְּ/כֹ֖ל מְדִינַ֣ת בָּבֶ֑ל עִם֩
    הִתְנַדָּב֨וּת עַמָּ֤/א וְ/כָֽהֲנַיָּ/א֙ מִֽתְנַדְּבִ֔ין לְ/בֵ֥ית אֱלָהֲ/הֹ֖ם
    דִּ֥י בִ/ירוּשְׁלֶֽם׃
translation:
  text: and all the silver and gold that you find in all the province of Babylon,
    together with the freewill offering of the people and the priests, who are freely
    offering for the house of their God that is in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the voluntary offering.” The Aramaic term denotes a gift given willingly,
      especially in a temple context.
    reason: lexical_alternative
  - marker: b
    text: “House of their God” refers to the temple in Jerusalem.
    reason: cultural_note
lexical_decisions:
- source_word: וְכֹל
  chosen: and all
  alternatives:
  - and every
  lexicon: HALOT
  rationale: Coordinates this item with the preceding list and preserves the comprehensive
    force of כֹל.
- source_word: כְּסַף וּדְהַב
  chosen: the silver and gold
  alternatives:
  - silver and gold
  lexicon: HALOT
  rationale: Standard rendering of the paired precious metals; the article in English
    is natural for a defined quantity being gathered.
- source_word: דִּי תְהַשְׁכַּח
  chosen: that you find
  alternatives:
  - that may be found by you
  - which you obtain
  lexicon: HALOT
  rationale: The relative particle plus verb is most naturally rendered as a relative
    clause addressed to Ezra. 'Find' preserves the straightforward sense without overformalizing
    into passive English.
- source_word: בְּכֹל מְדִינַת בָּבֶל
  chosen: in all the province of Babylon
  alternatives:
  - throughout the whole province of Babylon
  - in the whole province of Babylon
  lexicon: HALOT
  rationale: מְדִינָה here denotes an administrative province. Singular 'province'
    fits the construct phrase and the imperial-administrative context.
- source_word: עִם
  chosen: together with
  alternatives:
  - with
  lexicon: HALOT
  rationale: Signals addition of another source of funds in a slightly fuller way
    than bare 'with,' improving readability while remaining close to the source.
- source_word: הִתְנַדָּבוּת
  chosen: the freewill offering
  alternatives:
  - the voluntary offering
  - the donation
  lexicon: HALOT
  rationale: This noun denotes a voluntary gift. 'Freewill offering' preserves the
    cultic nuance and matches common biblical usage without being archaic in this
    context.
- source_word: עַמָּא וְכָהֲנַיָּא
  chosen: of the people and the priests
  alternatives:
  - of the people and of the priests
  lexicon: HALOT
  rationale: The emphatic Aramaic forms refer to the Jewish people and priests contributing
    to the temple. English omits repeated preposition for smoothness.
- source_word: מִתְנַדְּבִין
  chosen: who are freely offering
  alternatives:
  - who are making a freewill offering
  - who volunteer
  lexicon: HALOT
  rationale: Participial form describes the ongoing or characteristic action of the
    people and priests. 'Freely offering' keeps the lexical connection with the preceding
    noun from the same root.
- source_word: לְבֵית אֱלָהֲהֹם
  chosen: for the house of their God
  alternatives:
  - for the temple of their God
  - to the house of their God
  lexicon: HALOT
  rationale: Literally 'house of their God.' 'House' is retained to preserve the temple
    idiom; 'for' fits the sense of donation directed toward the temple.
- source_word: דִּי בִירוּשְׁלֶם
  chosen: that is in Jerusalem
  alternatives:
  - which is in Jerusalem
  - in Jerusalem
  lexicon: HALOT
  rationale: The relative clause specifies the location of the house/temple. 'That
    is in Jerusalem' is natural modern English and preserves the modifier.
