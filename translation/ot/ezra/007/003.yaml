id: EZR.7.3
reference: Ezra 7:3
source:
  edition: WLC
  text: בֶּן אֲמַרְיָ֥ה בֶן עֲזַרְיָ֖ה בֶּן מְרָיֽוֹת־־־׃
translation:
  text: son of Amariah, son of Azariah, son of Meraioth,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew genealogies may use 'son of' for a descendant in a lineage, not necessarily
      only an immediate father-son relationship.
    reason: cultural_note
lexical_decisions:
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: The construct noun בֶּן in genealogical lists is most naturally rendered
    'son of.' In biblical genealogies it can sometimes denote a more remote descendant,
    but the conventional and textually transparent English rendering in a lineage
    sequence is 'son of,' without importing a claim about immediate biological proximity
    beyond the genre's normal usage.
- source_word: אֲמַרְיָה
  chosen: Amariah
  rationale: 'Personal name transliterated according to the translation philosophy:
    translate titles, transliterate names.'
- source_word: עֲזַרְיָה
  chosen: Azariah
  rationale: Personal name transliterated by standard English convention.
- source_word: מְרָיוֹת
  chosen: Meraioth
  alternatives:
  - Merayoth
  rationale: Personal name transliterated by standard convention. 'Meraioth' reflects
    familiar English representation of the Hebrew name; a more tightly phonetic spelling
    is possible but less conventional.
