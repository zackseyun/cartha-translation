id: EZR.7.17
reference: Ezra 7:17
source:
  edition: WLC
  text: כָּ/ל קֳבֵ֣ל דְּנָה֩ אָסְפַּ֨רְנָא תִקְנֵ֜א בְּ/כַסְפָּ֣/א דְנָ֗ה תּוֹרִ֤ין
    דִּכְרִין֙ אִמְּרִ֔ין וּ/מִנְחָתְ/ה֖וֹן וְ/נִסְכֵּי/ה֑וֹן וּ/תְקָרֵ֣ב הִמּ֔וֹ
    עַֽל מַדְבְּחָ֔/ה דִּ֛י בֵּ֥ית אֱלָהֲ/כֹ֖ם דִּ֥י בִ/ירוּשְׁלֶֽם־׀־׃
translation:
  text: Therefore you shall diligently buy with this silver bulls, rams, lambs, along
    with their grain offerings and their drink offerings, and you shall offer them
    on the altar of the house of your God that is in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'carefully' or 'exactly' for 'diligently'; the Aramaic adverb emphasizes
      precise execution of the command.
    reason: lexical_alternative
  - marker: b
    text: '''Silver'' may function as money here, but the text literally says ''silver.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'the temple of your God'; literally, 'the house of your God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל־קֳבֵל דְּנָה
  chosen: Therefore
  alternatives:
  - For this reason
  - Accordingly
  lexicon: HALOT
  rationale: Aramaic idiom meaning 'for this reason/therefore.' 'Therefore' is concise
    and natural in English while preserving the inferential force.
- source_word: אָסְפַּרְנָא
  chosen: diligently
  alternatives:
  - carefully
  - exactly
  - with all diligence
  lexicon: HALOT
  rationale: The adverb intensifies the command, conveying carefulness or exactness
    in carrying it out. 'Diligently' captures the sense in readable modern English.
- source_word: תִקְנֵא
  chosen: you shall buy
  alternatives:
  - you are to purchase
  - you shall acquire
  lexicon: HALOT
  rationale: Basic sense is 'buy/purchase.' 'You shall buy' preserves the direct imperative-like
    force of the royal instruction.
- source_word: בְּכַסְפָּא דְנָה
  chosen: with this silver
  alternatives:
  - with this money
  lexicon: HALOT
  rationale: כַּסְפָּא literally means 'silver,' and in this administrative context
    refers to the funds just mentioned. 'Silver' keeps the source wording rather than
    flattening to 'money.'
- source_word: תּוֹרִין
  chosen: bulls
  alternatives:
  - oxen
  lexicon: HALOT
  rationale: In sacrificial context, 'bulls' is the more idiomatic and specific English
    rendering.
- source_word: דִּכְרִין
  chosen: rams
  alternatives:
  - male sheep
  lexicon: HALOT
  rationale: The term denotes male sheep; 'rams' is the standard sacrificial English
    equivalent.
- source_word: אִמְּרִין
  chosen: lambs
  alternatives:
  - young sheep
  lexicon: HALOT
  rationale: Common sacrificial animal term; 'lambs' is the natural English rendering
    in this cultic list.
- source_word: מִנְחָתְהוֹן
  chosen: their grain offerings
  alternatives:
  - their offering
  - their cereal offerings
  lexicon: HALOT
  rationale: מִנְחָה in sacrificial context refers specifically to the accompanying
    grain offering. 'Grain offerings' is clear modern English.
- source_word: נִסְכֵּיהוֹן
  chosen: their drink offerings
  alternatives:
  - their libations
  lexicon: HALOT
  rationale: Standard cultic term for liquid offerings poured out. 'Drink offerings'
    is transparent and readable; 'libations' is a viable but less accessible alternative.
- source_word: וּתְקָרֵב הִמּוֹ
  chosen: and you shall offer them
  alternatives:
  - and you shall present them
  - and bring them near
  lexicon: HALOT
  rationale: The verb is the standard sacrificial 'bring near/present/offer.' In context
    of altar sacrifice, 'offer them' best communicates the ritual action.
- source_word: עַל מַדְבְּחָה
  chosen: on the altar
  alternatives:
  - upon the altar
  lexicon: HALOT
  rationale: Straightforward locative phrase; 'on the altar' is idiomatic modern English.
- source_word: בֵּית אֱלָהֲכֹם
  chosen: the house of your God
  alternatives:
  - the temple of your God
  lexicon: HALOT
  rationale: Literally 'house of your God.' Although it refers to the temple, retaining
    'house' preserves the source expression and biblical idiom.
- source_word: דִּי בִירוּשְׁלֶם
  chosen: that is in Jerusalem
  alternatives:
  - which is in Jerusalem
  lexicon: HALOT
  rationale: Relative clause locating the temple. 'That is in Jerusalem' is natural
    and precise.
