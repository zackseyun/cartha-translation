id: EZR.7.18
reference: Ezra 7:18
source:
  edition: WLC
  text: וּ/מָ֣ה דִי֩ עלי/ך וְ/עַל אחי/ך יֵיטַ֗ב בִּ/שְׁאָ֛ר כַּסְפָּ֥/א וְ/דַהֲבָ֖/ה
    לְ/מֶעְבַּ֑ד כִּ/רְע֥וּת אֱלָהֲ/כֹ֖ם תַּעַבְדֽוּן־׃
translation:
  text: And whatever seems good to you and your brothers to do with the rest of the
    silver and the gold, do according to the will of your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whatever is good to you and your brothers.' The Aramaic idiom can be
      rendered more formally as 'is good' or more idiomatically as 'seems good.'
    reason: lexical_alternative
  - marker: b
    text: Or 'according to the desire of your God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָה דִי
  chosen: And whatever
  alternatives:
  - And what
  - And whatever it is that
  lexicon: HALOT
  rationale: The Aramaic combination introduces an indefinite relative clause. 'Whatever'
    captures the open-ended sense more naturally in English than the more wooden 'what.'
- source_word: עֲלָיִךְ וְעַל אַחַיִךְ יֵיטַב
  chosen: seems good to you and your brothers
  alternatives:
  - is good to you and your brothers
  - pleases you and your brothers
  lexicon: HALOT
  rationale: The idiom with יטב plus על conveys what appears good or pleasing to someone.
    'Seems good to' is idiomatic English and preserves the deliberative sense of royal
    permission.
- source_word: אַחַיִךְ
  chosen: your brothers
  alternatives:
  - your kinsmen
  - your colleagues
  lexicon: HALOT
  rationale: The noun is literally 'your brothers.' In context it likely refers to
    Ezra's fellow Jews or associates, but the text itself uses the kinship term, so
    the gender-accurate and source-near rendering is retained.
- source_word: בִּשְׁאָר כַּסְפָּא וְדַהֲבָה
  chosen: with the rest of the silver and the gold
  alternatives:
  - with the remainder of the silver and gold
  - from the surplus silver and gold
  lexicon: HALOT
  rationale: שְׁאָר denotes what remains. 'The rest of the silver and the gold' is
    clear and reflects the definite, previously mentioned funds.
- source_word: לְמֶעְבַּד
  chosen: to do
  alternatives:
  - to make
  - to use
  lexicon: HALOT
  rationale: The infinitive of עבד in Imperial Aramaic here functions broadly for
    carrying out or doing something with the funds. 'To do' keeps the wording general,
    matching the source.
- source_word: כִּרְעוּת
  chosen: according to the will
  alternatives:
  - according to the desire
  - as is pleasing to
  lexicon: HALOT
  rationale: The noun denotes will, desire, or pleasure. 'According to the will' fits
    the formal tone of the decree and links the action explicitly to divine intention.
- source_word: אֱלָהֲכֹם
  chosen: your God
  alternatives:
  - your god
  lexicon: HALOT
  rationale: Although spoken by a Persian king, the referent is the God of Israel.
    Capitalizing 'God' in English reflects referential specificity rather than adding
    theology beyond the text.
- source_word: תַּעַבְדוּן
  chosen: do
  alternatives:
  - you shall do
  - you may do
  - perform
  lexicon: HALOT
  rationale: The imperfect here functions as an authorization/instruction in the decree.
    'Do' in English conveys the directive naturally without overcomplicating the syntax.
