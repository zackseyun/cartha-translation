theological_decisions:
- issue: Capitalization of the divine reference אֱלָהֲכֹם
  chosen_reading: your God
  alternative_readings:
  - your god
  rationale: The verse refers specifically to the God worshiped by Ezra and his companions,
    not to a generic deity. English capitalization signals that specificity and is
    standard in Bible translation, without importing additional doctrinal content.
  doctrine_reference: Affirmations; Translation philosophy §1
