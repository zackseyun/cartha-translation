id: EZR.7.8
reference: Ezra 7:8
source:
  edition: WLC
  text: וַ/יָּבֹ֥א יְרוּשָׁלִַ֖ם בַּ/חֹ֣דֶשׁ הַ/חֲמִישִׁ֑י הִ֛יא שְׁנַ֥ת הַ/שְּׁבִיעִ֖ית
    לַ/מֶּֽלֶךְ׃
translation:
  text: And he came to Jerusalem in the fifth month, which was the seventh year of
    the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he arrived at Jerusalem in the fifth month; it was the seventh year
      of the king.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: And he came
  alternatives:
  - And he arrived
  lexicon: HALOT
  rationale: The waw-consecutive with בוא narrates the next event in sequence. 'Came'
    is a straightforward rendering; 'arrived' is possible, but 'came' preserves the
    simple verbal sense without adding nuance.
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Proper place name, transliterated by standard English convention in keeping
    with the translation philosophy to transliterate names.
- source_word: בַּחֹדֶשׁ הַחֲמִישִׁי
  chosen: in the fifth month
  alternatives:
  - during the fifth month
  lexicon: HALOT
  rationale: 'The preposition ב with ''month'' is naturally temporal: ''in the fifth
    month.'' This is clear modern English and preserves the calendrical reference.'
- source_word: הִיא
  chosen: which was
  alternatives:
  - it was
  lexicon: HALOT
  rationale: The feminine pronoun refers back to the implied time designation and
    links the month with the regnal-year notice. 'Which was' reads smoothly in English
    while preserving the explanatory function of the Hebrew pronoun.
- source_word: שְׁנַת הַשְּׁבִיעִית
  chosen: the seventh year
  alternatives:
  - year seven
  lexicon: HALOT
  rationale: Construct phrase with ordinal adjective indicating a regnal year. 'The
    seventh year' is the standard and clearest English rendering.
- source_word: לַמֶּלֶךְ
  chosen: of the king
  alternatives:
  - for the king
  - of King Artaxerxes
  lexicon: HALOT
  rationale: The lamed here marks relation within regnal dating, idiomatically rendered
    'of the king.' Supplying 'Artaxerxes' would be interpretive expansion from context
    rather than direct translation of this verse alone.
