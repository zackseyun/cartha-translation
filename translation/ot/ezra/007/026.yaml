id: EZR.7.26
reference: Ezra 7:26
source:
  edition: WLC
  text: וְ/כָל דִּי לָא֩ לֶהֱוֵ֨א עָבֵ֜ד דָּתָ֣/א דִֽי אֱלָהָ֗/ךְ וְ/דָתָ/א֙ דִּ֣י
    מַלְכָּ֔/א אָסְפַּ֕רְנָא דִּינָ֕/ה לֶהֱוֵ֥א מִתְעֲבֵ֖ד מִנֵּ֑/הּ הֵ֤ן לְ/מוֹת֙
    הֵ֣ן ל/שרשו הֵן לַ/עֲנָ֥שׁ נִכְסִ֖ין וְ/לֶ/אֱסוּרִֽין־־־־׃פ
translation:
  text: And anyone who will not obey the law of your God and the law of the king,
    let judgment be executed on him promptly, whether for death, or for banishment,
    or for confiscation of goods, or for imprisonment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for expulsion' or more literally 'for uprooting.' The Aramaic term is
      rare and may refer to banishment from one's place or community.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל דִּי
  chosen: And anyone who
  alternatives:
  - And whoever
  - And all who
  lexicon: HALOT
  rationale: The combination introduces an indefinite relative clause referring to
    any person meeting the condition. 'Anyone who' is idiomatic modern English and
    preserves the distributive force better than the more wooden 'all who' in this
    legal context.
- source_word: לָא לֶהֱוֵא עָבֵד
  chosen: will not obey
  alternatives:
  - does not do
  - does not carry out
  lexicon: HALOT
  rationale: The Aramaic literally means 'will not be doing' or 'will not do,' but
    with דָּתָא ('law/decree') the sense is compliance. 'Obey' communicates the legal
    force naturally in English without over-paraphrasing.
- source_word: דָּתָא
  chosen: law
  alternatives:
  - decree
  - edict
  lexicon: HALOT
  rationale: In Ezra's Imperial Aramaic context, דָּתָא can denote law, decree, or
    legal regulation. Because the phrase is paired as 'the law of your God and the
    law of the king,' 'law' gives the best parallelism and reflects an established
    legal standard rather than a one-time edict.
- source_word: אֱלָהָךְ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward second-person singular possessive addressed to Ezra in
    the royal decree.
- source_word: וְדָתָא דִּי מַלְכָּא
  chosen: and the law of the king
  alternatives:
  - and the king's law
  lexicon: HALOT
  rationale: This preserves the parallel structure with 'the law of your God' and
    keeps the formal legal tone.
- source_word: אָסְפַּרְנָא
  chosen: promptly
  alternatives:
  - diligently
  - strictly
  - speedily
  lexicon: HALOT
  rationale: The adverb conveys promptness or exactness in execution. 'Promptly' fits
    the judicial context well and avoids ambiguity that 'strictly' might introduce.
- source_word: דִּינָה לֶהֱוֵא מִתְעֲבֵד מִנֵּהּ
  chosen: let judgment be executed on him
  alternatives:
  - let justice be done to him
  - let sentence be carried out on him
  lexicon: HALOT
  rationale: The phrase denotes the carrying out of judicial sentence against the
    offender. 'Judgment be executed on him' preserves the passive legal sense and
    fits the following list of penalties.
- source_word: הֵן ... הֵן ... הֵן ... וְ
  chosen: whether ... or ... or ... or
  alternatives:
  - either ... or ... or ... or
  lexicon: HALOT
  rationale: This construction introduces alternative penalties. 'Whether ... or'
    is natural English for listing possible judicial outcomes.
- source_word: לְמוֹת
  chosen: for death
  alternatives:
  - to death
  - capital punishment
  lexicon: HALOT
  rationale: The preposition marks the penalty imposed. 'For death' is slightly formal
    but matches the parallel structure of the list; 'capital punishment' would be
    more interpretive.
- source_word: לשרשו
  chosen: for banishment
  alternatives:
  - for uprooting
  - for expulsion
  lexicon: HALOT
  rationale: The noun is difficult and likely derives from a root meaning 'uprooting,'
    used here as a legal penalty. In context, it most plausibly refers to removal
    from one's place or community. 'Banishment' communicates the judicial sense in
    readable English while preserving the severity of the sanction.
- source_word: לַעֲנָשׁ נִכְסִין
  chosen: for confiscation of goods
  alternatives:
  - for a fine on property
  - for punishment by loss of possessions
  lexicon: HALOT
  rationale: The phrase literally involves punishment concerning possessions/property.
    'Confiscation of goods' best captures a state-imposed property penalty in this
    legal list.
- source_word: וְלֶאֱסוּרִין
  chosen: or for imprisonment
  alternatives:
  - or for binding
  - or for incarceration
  lexicon: HALOT
  rationale: The noun refers to bonds or imprisonment. In a list of judicial penalties,
    'imprisonment' gives the intended legal outcome rather than the more literal but
    less clear 'binding'.
