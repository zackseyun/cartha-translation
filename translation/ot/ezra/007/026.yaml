theological_decisions:
- issue: Relation of divine law and royal law in the decree
  chosen_reading: 'Render both plainly and coordinately: ''the law of your God and
    the law of the king'''
  alternative_readings:
  - Render one as subordinate to the other
  - Interpret the king's law as merely enforcing God's law
  rationale: The verse itself presents two coordinated legal authorities within the
    Persian decree. The translation preserves that textual tension without importing
    a theological hierarchy not explicitly stated in the wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
