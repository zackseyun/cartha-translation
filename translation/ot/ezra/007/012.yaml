theological_decisions:
- issue: Rendering דָּתָא in a context involving Ezra and Israel's God
  chosen_reading: law
  alternative_readings:
  - decree
  rationale: Although the Aramaic term can denote a royal decree or legal statute,
    in this appositional description of Ezra ('the priest, the scribe of the law of
    the God of heaven') the reference is to divine instruction/Torah rather than a
    Persian edict. This reflects the source context without importing later doctrinal
    claims.
  doctrine_reference: Translation philosophy §1, §5
- issue: Handling the epistolary formula גְּמִיר וּכְעֶנֶת
  chosen_reading: complete peace. And now—
  alternative_readings:
  - perfect peace, and now
  - greetings, and now
  rationale: The phrase is formulaic and somewhat compressed. Rendering it as 'complete
    peace. And now—' preserves both the salutation element and the transition into
    the decree, while avoiding paraphrastic smoothing. The dash signals that the sentence
    continues in the next verse.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source-text
    sense without paraphrase'
