id: EZR.7.12
reference: Ezra 7:12
source:
  edition: WLC
  text: אַ֨רְתַּחְשַׁ֔סְתְּא מֶ֖לֶךְ מַלְכַיָּ֑/א לְ/עֶזְרָ֣א כָ֠הֲנָ/א סָפַ֨ר דָּתָ֜/א
    דִּֽי אֱלָ֧הּ שְׁמַיָּ֛/א גְּמִ֖יר וּ/כְעֶֽנֶת־׃
translation:
  text: 'Artaxerxes, king of kings, to Ezra the priest, the scribe of the law of the
    God of heaven: complete peace. And now—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the scribe of the decree of the God of heaven,' if דָּתָא is taken in
      the broader administrative sense 'decree' rather than 'law.'
    reason: lexical_alternative
  - marker: b
    text: The Aramaic greeting is formulaic; 'complete peace' could also be rendered
      'perfect peace' or more idiomatically 'greetings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַ֨רְתַּחְשַׁ֔סְתְּא
  chosen: Artaxerxes
  lexicon: HALOT
  rationale: Proper royal name; transliterated per translation philosophy ('Translate
    titles; transliterate names').
- source_word: מֶ֖לֶךְ מַלְכַיָּ֑א
  chosen: king of kings
  alternatives:
  - the king, king of kings
  lexicon: HALOT
  rationale: Construct chain/title in Imperial Aramaic. English idiom naturally renders
    the royal superlative title as 'king of kings' without repeating the article-like
    first noun separately.
- source_word: לְעֶזְרָ֣א
  chosen: to Ezra
  lexicon: HALOT
  rationale: Lamed marks the addressee of the letter heading.
- source_word: כָהֲנָא
  chosen: the priest
  alternatives:
  - priest
  lexicon: HALOT
  rationale: Determined form in Aramaic; rendered with English article in apposition
    to Ezra.
- source_word: סָפַר דָּתָא
  chosen: the scribe of the law
  alternatives:
  - scribe of the decree
  - scholar of the law
  lexicon: HALOT
  rationale: סָפַר is 'scribe'; דָּתָא in Ezra commonly denotes law/decree. Here,
    with reference to the God of heaven and Ezra's role, 'law' best fits the religious-legal
    sense.
- source_word: דִּי אֱלָהּ שְׁמַיָּא
  chosen: of the God of heaven
  alternatives:
  - of God in heaven
  - of the heavenly God
  lexicon: HALOT
  rationale: דִּי marks the genitival relation; the established biblical title is
    best rendered straightforwardly as 'the God of heaven.'
- source_word: גְּמִיר
  chosen: complete
  alternatives:
  - perfect
  - full
  - entire
  lexicon: HALOT
  rationale: Adjective meaning complete/full/perfect. In epistolary formula with the
    following term, it modifies the greeting, yielding 'complete peace' rather than
    standing independently.
- source_word: וּכְעֶנֶת
  chosen: And now—
  alternatives:
  - and at this time
  - and so now
  lexicon: HALOT
  rationale: Aramaic adverb/conjunction used in official correspondence to transition
    from salutation to decree body. Since the thought continues into the next verse,
    an em dash appropriately signals the incomplete transition.
