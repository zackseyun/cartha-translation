id: EZR.7.2
reference: Ezra 7:2
source:
  edition: WLC
  text: בֶּן שַׁלּ֥וּם בֶּן צָד֖וֹק בֶּן אֲחִיטֽוּב־־־׃
translation:
  text: son of Shallum, son of Zadok, son of Ahitub—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew genealogical 'son of' can at times denote a more remote descendant
      in compressed genealogies.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: The construct noun בֶּן in genealogical lists is most naturally rendered
    'son of.' While Hebrew genealogies can sometimes telescope generations and thus
    imply broader descent, nothing in this immediate verse requires weakening the
    direct genealogical formula.
- source_word: שַׁלּוּם
  chosen: Shallum
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: צָדוֹק
  chosen: Zadok
  rationale: Personal name transliterated by standard convention. 'Zadok' is the established
    and recognizable English form.
- source_word: אֲחִיטוּב
  chosen: Ahitub
  rationale: Personal name transliterated by standard convention. The Hebrew proper
    name is carried over rather than translated.
