theological_decisions:
- issue: Rendering of God's relation to Jerusalem in מִשְׁכְּנֵהּ
  chosen_reading: whose dwelling is in Jerusalem
  alternative_readings:
  - who dwells in Jerusalem
  rationale: The Aramaic uses a noun for dwelling place rather than a simple verbal
    predicate. Rendering it as 'whose dwelling is in Jerusalem' preserves the temple-centered
    covenantal sense without suggesting that God is spatially confined to Jerusalem.
    This maintains the text's own theological emphasis while avoiding over-interpretation.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
