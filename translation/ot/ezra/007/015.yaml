id: EZR.7.15
reference: Ezra 7:15
source:
  edition: WLC
  text: וּ/לְ/הֵיבָלָ֖ה כְּסַ֣ף וּ/דְהַ֑ב דִּֽי מַלְכָּ֣/א וְ/יָעֲט֗וֹ/הִי הִתְנַדַּ֨בוּ֙
    לֶ/אֱלָ֣הּ יִשְׂרָאֵ֔ל דִּ֥י בִֽ/ירוּשְׁלֶ֖ם מִשְׁכְּנֵֽ/הּ־׃
translation:
  text: and to bring the silver and gold that the king and his counselors have freely
    offered to the God of Israel, whose dwelling is in Jerusalem,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who dwells in Jerusalem.' The Aramaic more literally says 'whose dwelling
      is in Jerusalem.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְהֵיבָלָה
  chosen: and to bring
  alternatives:
  - and to carry
  - and to convey
  lexicon: HALOT
  rationale: Aramaic infinitive with prefixed conjunction and preposition, expressing
    purpose/result in the royal commission. 'Bring' is natural modern English and
    fits the context of transporting funds to Jerusalem without over-specifying the
    mode.
- source_word: כְּסַף וּדְהַב
  chosen: the silver and gold
  alternatives:
  - silver and gold
  lexicon: HALOT
  rationale: Definite sense is supplied in English because the following relative
    clause specifies particular silver and gold donated by the king and his counselors.
- source_word: דִּי
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Relative particle introducing the clause describing the silver and gold.
    'That' is the most natural English relative here.
- source_word: מַלְכָּא
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward rendering of the Aramaic noun with emphatic state functioning
    definitively.
- source_word: וְיָעֲטוֹהִי
  chosen: and his counselors
  alternatives:
  - and his advisers
  lexicon: HALOT
  rationale: The term denotes royal advisers/counselors. 'Counselors' preserves the
    court setting and is a standard English equivalent.
- source_word: הִתְנַדַּבוּ
  chosen: have freely offered
  alternatives:
  - have volunteered
  - have made a freewill offering
  lexicon: HALOT
  rationale: The verb conveys voluntary, willing contribution. 'Have freely offered'
    captures both the completed action and the voluntary nature without becoming cumbersome.
- source_word: לֶאֱלָהּ יִשְׂרָאֵל
  chosen: to the God of Israel
  lexicon: HALOT
  rationale: Standard rendering of the divine designation in Ezra. 'To' fits the sense
    of dedicating the offering to Israel's God.
- source_word: דִּי בִירוּשְׁלֶם מִשְׁכְּנֵהּ
  chosen: whose dwelling is in Jerusalem
  alternatives:
  - who dwells in Jerusalem
  - whose tabernacle is in Jerusalem
  lexicon: HALOT
  rationale: The relative clause literally speaks of his dwelling place being in Jerusalem.
    'Whose dwelling is in Jerusalem' preserves the noun-based expression and avoids
    implying a limitation on God's omnipresence; 'tabernacle' would be too specific
    here.
