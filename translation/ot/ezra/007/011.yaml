id: EZR.7.11
reference: Ezra 7:11
source:
  edition: WLC
  text: וְ/זֶ֣ה פַּרְשֶׁ֣גֶן הַֽ/נִּשְׁתְּוָ֗ן אֲשֶׁ֤ר נָתַן֙ הַ/מֶּ֣לֶךְ אַרְתַּחְשַׁ֔סְתְּא לְ/עֶזְרָ֥א הַ/כֹּהֵ֖ן הַ/סֹּפֵ֑ר סֹפֵ֞ר דִּבְרֵ֧י מִצְוֺת יְהוָ֛ה וְ/חֻקָּ֖י/ו עַל יִשְׂרָאֵֽל׀־־׃פ
translation:
  text: 'Now this is the copy of the document that King Artaxerxes gave to Ezra the priest, the scribe, a scribe of the words of the commandments of Yahweh and of his statutes for Israel:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the text of the letter' or 'the transcript of the document.'
    reason: lexical_alternative
  - marker: b
    text: Or 'concerning Israel' or 'over Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּרְשֶׁגֶן
  chosen: copy
  alternatives:
  - text
  - transcript
  lexicon: HALOT
  rationale: The term denotes a copy or transcript of an official writing. 'Copy' is natural modern English and fits the documentary context better than the more technical 'transcript.'
- source_word: הַנִּשְׁתְּוָן
  chosen: the document
  alternatives:
  - the letter
  - the written decree
  lexicon: HALOT
  rationale: This loanword refers to an official written communication. 'Document' is broad enough to cover the formal royal communication introduced here, while avoiding over-specifying as 'letter' if the content functions as an edict.
- source_word: וְזֶה
  chosen: Now this is
  alternatives:
  - And this is
  - This is
  lexicon: HALOT
  rationale: The conjunction plus demonstrative introduces the following citation. 'Now this is' reads smoothly in English while preserving the discourse transition.
- source_word: נָתַן
  chosen: gave
  alternatives:
  - issued
  - granted
  lexicon: HALOT
  rationale: The basic verb is 'gave.' Although in context it concerns an official royal document, 'gave' preserves the plain lexical sense without paraphrasing.
- source_word: הַמֶּלֶךְ אַרְתַּחְשַׁסְתְּא
  chosen: King Artaxerxes
  rationale: Title is translated and the personal name is transliterated, following the project's principle to translate titles and transliterate names.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Straightforward rendering of Ezra's priestly office.
- source_word: הַסֹּפֵר
  chosen: the scribe
  alternatives:
  - the scholar
  lexicon: HALOT
  rationale: In Persian-period administrative and Torah contexts, 'scribe' best preserves both the official and literary sense. 'Scholar' is interpretive and too modern.
- source_word: סֹפֵר דִּבְרֵי מִצְוֺת יְהוָה
  chosen: a scribe of the words of the commandments of the LORD
  alternatives:
  - an expert in the words of the commandments of the LORD
  - a scribe skilled in the commandments of the LORD
  lexicon: HALOT
  rationale: The appositional phrase further defines Ezra. Retaining 'scribe of the words of the commandments' stays close to the Hebrew structure and preserves the emphasis on written divine instruction. More idiomatic alternatives are possible but more interpretive.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְחֻקָּיו
  chosen: and of his statutes
  alternatives:
  - and his statutes
  - and of his decrees
  lexicon: HALOT
  rationale: '''Statutes'' is a standard rendering for חֻקִּים and fits legal/instructional context. The added ''of'' reflects the construct relation carried through the phrase in English.'
- source_word: עַל יִשְׂרָאֵל
  chosen: for Israel
  alternatives:
  - concerning Israel
  - over Israel
  lexicon: HALOT
  rationale: Here עַל likely indicates reference or application. 'For Israel' communicates that these commandments and statutes are directed toward Israel in a natural English way.
