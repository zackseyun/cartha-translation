id: EZR.7.10
reference: Ezra 7:10
source:
  edition: WLC
  text: כִּ֤י עֶזְרָא֙ הֵכִ֣ין לְבָב֔/וֹ לִ/דְר֛וֹשׁ אֶת תּוֹרַ֥ת יְהוָ֖ה וְ/לַ/עֲשֹׂ֑ת וּ/לְ/לַמֵּ֥ד בְּ/יִשְׂרָאֵ֖ל חֹ֥ק וּ/מִשְׁפָּֽט־׃ס
translation:
  text: For Ezra had set his heart to seek the Law of Yahweh, and to do it, and to teach statutes and judgments in Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had prepared his heart.' The Hebrew idiom expresses deliberate inward resolve.
    reason: lexical_alternative
  - marker: b
    text: Or 'to inquire into' or 'to study' the Law of the LORD.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the LORD' represents the divine name YHWH.
    reason: alternative_reading
  - marker: d
    text: Or 'statute and ordinance' or 'statutes and rules.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the explanation for the favor and success described in the surrounding context. 'For' preserves the explanatory force in natural English.
- source_word: הֵכִין לְבָבוֹ
  chosen: had set his heart
  alternatives:
  - had prepared his heart
  - had established his heart
  lexicon: HALOT
  rationale: The idiom combines כון in Hiphil with 'heart' to express deliberate inward resolve. 'Set his heart' is idiomatic English that preserves the volitional sense better than a more wooden 'prepared his heart,' while still reflecting the Hebrew closely.
- source_word: לִדְרוֹשׁ
  chosen: to seek
  alternatives:
  - to study
  - to inquire into
  lexicon: HALOT
  rationale: דרש can mean seek, inquire, or investigate. In this context of Torah devotion, 'seek' preserves both the intellectual and devotional dimensions without reducing it merely to academic study.
- source_word: תּוֹרַת יְהוָה
  chosen: the Law of the LORD
  alternatives:
  - the instruction of the LORD
  - the Torah of the LORD
  lexicon: HALOT
  rationale: תּוֹרָה can mean instruction broadly, but in Ezra's priestly-scribal context it naturally refers to the covenantal Law. 'Law' is the most recognizable and contextually fitting rendering. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name, preserving the reverential substitution traditional in English Bibles and aligned with the doctrine excerpt.
- source_word: וְלַעֲשׂוֹת
  chosen: and to do it
  alternatives:
  - and to practice it
  - and to obey it
  lexicon: HALOT
  rationale: The implied object is the Law just mentioned. 'Do it' is concise and faithful to the Hebrew infinitive, preserving the emphasis on actual obedience without overinterpreting.
- source_word: וּלְלַמֵּד
  chosen: and to teach
  alternatives:
  - and to instruct
  lexicon: HALOT
  rationale: למד in the Piel means to teach/instruct. 'Teach' is the clearest and most direct rendering in this sequence of Ezra's purposes.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - among Israel
  lexicon: HALOT
  rationale: The phrase marks the sphere of Ezra's teaching ministry. 'In Israel' is the most straightforward rendering.
- source_word: חֹק וּמִשְׁפָּט
  chosen: statute and judgment
  alternatives:
  - statute and ordinance
  - statutes and rules
  - decree and judgment
  lexicon: HALOT
  rationale: These are paired legal terms. 'Statute and judgment' preserves the singular Hebrew forms and the formal legal register. Although 'rules' or 'ordinances' are possible, this rendering best reflects the covenant-law terminology without excessive paraphrase.
