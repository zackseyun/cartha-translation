theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Scope of תּוֹרָה in Ezra's mission
  chosen_reading: Law
  alternative_readings:
  - instruction
  - Torah
  rationale: In this postexilic priestly-scribal context, the term points specifically to the covenantal Law rather than generic instruction. 'Law' preserves that canonical and communal force while remaining readable English.
