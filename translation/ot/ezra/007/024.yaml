id: EZR.7.24
reference: Ezra 7:24
source:
  edition: WLC
  text: וּ/לְ/כֹ֣ם מְהוֹדְעִ֗ין דִּ֣י כָל כָּהֲנַיָּ֣/א וְ֠/לֵוָיֵ/א זַמָּ֨רַיָּ֤/א
    תָרָֽעַיָּ/א֙ נְתִ֣ינַיָּ֔/א וּ/פָ֣לְחֵ֔י בֵּ֖ית אֱלָהָ֣/א דְנָ֑ה מִנְדָּ֤ה בְלוֹ֙
    וַ/הֲלָ֔ךְ לָ֥א שַׁלִּ֖יט לְ/מִרְמֵ֥א עֲלֵי/הֹֽם־׃
translation:
  text: And we make known to you that it is not permitted to impose tribute, tax,
    or toll on any of the priests, Levites, singers, gatekeepers, temple servants,
    or other servants of this house of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Nethinim,' a traditional transliteration of נְתִינַיָּא.
    reason: lexical_alternative
  - marker: b
    text: 'The three fiscal terms likely distinguish different kinds of imperial levy:
      ''tribute, tax, or toll'' could also be rendered ''tribute, custom, or transit
      duty.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מְהוֹדְעִין
  chosen: we make known
  alternatives:
  - we inform
  - it is made known
  lexicon: HALOT
  rationale: Aramaic participial form from ידע functions as an official notification
    formula. 'We make known' preserves the formal administrative tone better than
    the flatter 'we inform.'
- source_word: כָל
  chosen: any of
  alternatives:
  - all
  - every
  lexicon: HALOT
  rationale: With the following list of temple personnel and the negative legal statement,
    English idiom is best served by 'any of,' conveying that none in the listed classes
    are to be taxed.
- source_word: כָּהֲנַיָּא
  chosen: priests
  lexicon: HALOT
  rationale: Standard rendering of the priestly class.
- source_word: לֵוָיֵא
  chosen: Levites
  lexicon: HALOT
  rationale: Standard transliterated rendering for the Levitical class.
- source_word: זַמָּרַיָּא
  chosen: singers
  alternatives:
  - musicians
  lexicon: HALOT
  rationale: The term denotes those engaged in musical praise; 'singers' is the most
    direct and traditional rendering in temple lists.
- source_word: תָרָעַיָּא
  chosen: gatekeepers
  alternatives:
  - porters
  - doorkeepers
  lexicon: HALOT
  rationale: Refers to those guarding or attending the gates; 'gatekeepers' is clear
    modern English.
- source_word: נְתִינַיָּא
  chosen: temple servants
  alternatives:
  - Nethinim
  - given ones
  lexicon: HALOT
  rationale: Although 'Nethinim' is traditional, the translation philosophy prefers
    meaning over opaque transliteration where possible. 'Temple servants' communicates
    their function accessibly.
- source_word: פָלְחֵי בֵּית אֱלָהָא דְנָה
  chosen: other servants of this house of God
  alternatives:
  - workers in this house of God
  - ministers of this house of God
  lexicon: HALOT
  rationale: The participle means those serving/worshiping in the house of God. Because
    temple servants were already named separately, 'other servants' avoids collapsing
    the categories while preserving the broad service sense.
- source_word: מִנְדָּה
  chosen: tribute
  alternatives:
  - tax
  lexicon: HALOT
  rationale: In Persian-period administrative language this denotes an imposed levy
    or tribute. Rendering it distinctly helps preserve the threefold tax formula.
- source_word: בְלוֹ
  chosen: tax
  alternatives:
  - excise
  - custom
  lexicon: HALOT
  rationale: This term is commonly distinguished from the other two fiscal terms;
    'tax' serves as a broad middle term in the triad.
- source_word: וַהֲלָךְ
  chosen: toll
  alternatives:
  - custom
  - transit duty
  lexicon: HALOT
  rationale: Often understood as a road, transit, or customs duty. 'Toll' is concise
    and preserves distinction from the other levies.
- source_word: לָא שַׁלִּיט
  chosen: it is not permitted
  alternatives:
  - it is not lawful
  - there is no authority
  lexicon: HALOT
  rationale: The phrase expresses legal authorization. 'It is not permitted' communicates
    the juridical prohibition naturally in English.
- source_word: לְמִרְמֵא עֲלֵיהֹם
  chosen: to impose ... on
  alternatives:
  - to lay upon
  - to levy on
  lexicon: HALOT
  rationale: The idiom literally means 'to throw/place upon them,' but in a taxation
    context 'impose ... on' is the clearest idiomatic equivalent.
