id: EZR.4.1
reference: Ezra 4:1
source:
  edition: WLC
  text: וַֽ/יִּשְׁמְע֔וּ צָרֵ֥י יְהוּדָ֖ה וּ/בִנְיָמִ֑ן כִּֽי בְנֵ֤י הַ/גּוֹלָה֙ בּוֹנִ֣ים הֵיכָ֔ל לַ/יהוָ֖ה אֱלֹהֵ֥י יִשְׂרָאֵֽל־׃
translation:
  text: Now the adversaries of Judah and Benjamin heard that the sons of the exile were building a temple for Yahweh, the God of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the sons of the exile''; that is, the community of those who had gone into exile and returned.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמְעוּ
  chosen: heard
  alternatives:
  - came to hear
  - learned
  lexicon: HALOT
  rationale: The waw-consecutive with שׁמע narrates a simple past event. 'Heard' is the most direct and natural English rendering in context.
- source_word: צָרֵי
  chosen: adversaries
  alternatives:
  - enemies
  - foes
  lexicon: HALOT
  rationale: The construct plural of צר denotes opponents/hostile parties. 'Adversaries' preserves the antagonistic sense without over-specifying military hostility.
- source_word: יְהוּדָה וּבִנְיָמִן
  chosen: Judah and Benjamin
  rationale: These are tribal/regional names and should be transliterated as names, not translated.
- source_word: כִּי
  chosen: that
  alternatives:
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the content of what they heard, so 'that' fits better than a causal 'because.'
- source_word: בְנֵי הַגּוֹלָה
  chosen: the sons of the exile
  alternatives:
  - the children of the exile
  - the exiles
  - the returned exiles
  lexicon: HALOT
  rationale: Formally, the phrase is 'sons of the exile,' referring to the community descended from or identified with the deported group. This keeps the Hebrew expression visible while remaining understandable. 'Returned exiles' is interpretive and 'exiles' alone omits בני.
- source_word: בּוֹנִים
  chosen: were building
  alternatives:
  - built
  - were rebuilding
  lexicon: HALOT
  rationale: The participle conveys ongoing action in past narrative context. 'Were building' captures the progressive sense. 'Were rebuilding' adds information not explicit in the verb itself.
- source_word: הֵיכָל
  chosen: temple
  alternatives:
  - palace
  - sanctuary
  lexicon: HALOT
  rationale: Though היכל can denote a palace in some contexts, here the object is explicitly for the LORD, the God of Israel, so 'temple' is the clear contextual sense.
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - to the LORD
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The preposition ל here is naturally rendered 'for' with 'building a temple for the LORD.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: A straightforward construct chain identifying the LORD as Israel's God; standard and precise English rendering.
