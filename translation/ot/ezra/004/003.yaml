id: EZR.4.3
reference: Ezra 4:3
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ לָ/הֶ֨ם זְרֻבָּבֶ֜ל וְ/יֵשׁ֗וּעַ וּ/שְׁאָ֨ר רָאשֵׁ֤י הָֽ/אָבוֹת֙ לְ/יִשְׂרָאֵ֔ל לֹֽא לָ֣/כֶם וָ/לָ֔/נוּ לִ/בְנ֥וֹת בַּ֖יִת לֵ/אלֹהֵ֑י/נוּ כִּי֩ אֲנַ֨חְנוּ יַ֜חַד נִבְנֶ֗ה לַֽ/יהוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל כַּ/אֲשֶׁ֣ר צִוָּ֔/נוּ הַ/מֶּ֖לֶךְ כּ֥וֹרֶשׁ מֶֽלֶךְ פָּרָֽס־־׃
translation:
  text: But Zerubbabel, Jeshua, and the rest of the heads of the fathers’ houses of Israel said to them, “It is not for you and for us to build a house for our God, but we alone will build it for Yahweh, the God of Israel, just as King Cyrus, the king of Persia, commanded us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “for we together will build”; here “together” is understood in context to mean that they themselves, without the offered partners, would do the building.
    reason: lexical_alternative
  - marker: b
    text: “A house” refers to the temple.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - answered
  - spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר; English 'said' is the natural narrative rendering.
- source_word: זְרֻבָּבֶל וְיֵשׁוּעַ
  chosen: Zerubbabel, Jeshua
  alternatives:
  - Joshua (for יֵשׁוּעַ)
  lexicon: HALOT
  rationale: Personal names are transliterated by standard conventions per translation philosophy. 'Jeshua' reflects the Hebrew form here more directly than 'Joshua'.
- source_word: וּשְׁאָר רָאשֵׁי הָאָבוֹת לְיִשְׂרָאֵל
  chosen: and the rest of the heads of the fathers’ houses of Israel
  alternatives:
  - and the rest of the family heads of Israel
  - and the rest of the chief fathers of Israel
  lexicon: HALOT
  rationale: רָאשֵׁי הָאָבוֹת is a clan/family leadership expression. 'Heads of the fathers’ houses' preserves the Hebrew social structure more transparently than flattening to 'leaders' alone.
- source_word: לֹא לָכֶם וָלָנוּ
  chosen: You have no part with us
  alternatives:
  - It is not for you and us together
  - Not yours and ours
  lexicon: HALOT
  rationale: The idiom denies shared claim or participation. 'You have no part with us' communicates the exclusionary force in idiomatic English better than a wooden reproduction.
- source_word: לִבְנוֹת בַּיִת
  chosen: in building a house
  alternatives:
  - to build a house
  - in order to build a house
  lexicon: HALOT
  rationale: Infinitive construct with ל expresses the activity/purpose. 'In building a house' fits the English idiom after 'have no part with us'.
- source_word: בַּיִת לֵאלֹהֵינוּ
  chosen: a house for our God
  alternatives:
  - the house of our God
  - a temple for our God
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In context it refers to the temple, but 'house' preserves the source wording while remaining clear. 'Temple' is interpretive and therefore left as an alternative.
- source_word: כִּי אֲנַחְנוּ יַחַד
  chosen: for we alone
  alternatives:
  - for we together
  - for we ourselves together
  lexicon: HALOT
  rationale: יַחַד literally means 'together,' but in this contrastive context it marks the Judean group acting by themselves rather than jointly with the petitioners. 'We alone' best conveys the exclusion intended by the clause.
- source_word: נִבְנֶה
  chosen: will build it
  alternatives:
  - will build
  - are building
  lexicon: HALOT
  rationale: Imperfect 1cp here is volitional/future in context. 'Will build it' makes explicit the understood object from the prior clause in natural English.
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - for Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct phrase; standard and transparent rendering.
- source_word: כַּאֲשֶׁר צִוָּנוּ
  chosen: just as ... commanded us
  alternatives:
  - as ... ordered us
  - according to what ... commanded us
  lexicon: HALOT
  rationale: כַּאֲשֶׁר introduces comparison/conformity; צוה is well rendered 'commanded' here, preserving the official force of Cyrus's decree.
- source_word: הַמֶּלֶךְ כּוֹרֶשׁ מֶלֶךְ פָּרָס
  chosen: King Cyrus, the king of Persia
  alternatives:
  - Cyrus king of Persia
  lexicon: HALOT
  rationale: The appositional royal title is retained in readable English. Repeating 'king' reflects the Hebrew and preserves formal register.
