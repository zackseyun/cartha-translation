id: EZR.3.9
reference: Ezra 3:9
source:
  edition: WLC
  text: וַ/יַּעֲמֹ֣ד יֵשׁ֡וּעַ בָּנָ֣י/ו וְ֠/אֶחָי/ו קַדְמִיאֵ֨ל וּ/בָנָ֤י/ו בְּנֵֽי
    יְהוּדָה֙ כְּ/אֶחָ֔ד לְ/נַצֵּ֛חַ עַל עֹשֵׂ֥ה הַ/מְּלָאכָ֖ה בְּ/בֵ֣ית הָ/אֱלֹהִ֑ים
    בְּנֵי֙ חֵֽנָדָ֔ד בְּנֵי/הֶ֥ם וַ/אֲחֵי/הֶ֖ם הַ/לְוִיִּֽם־־ס׃
translation:
  text: Then Jeshua, his sons and his brothers, and Kadmiel and his sons, the sons
    of Judah, stood together as one to oversee those doing the work in the house of
    God, along with the sons of Henadad, their sons and their brothers, the Levites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the sons of Judah.'' Some ancient versions and modern translations
      read ''the sons of Hodaviah.'''
    reason: textual_variant
lexical_decisions:
- source_word: וַיַּעֲמֹד
  chosen: stood
  alternatives:
  - took his stand
  - stood up
  lexicon: HALOT
  rationale: The verb עמד literally means 'stand' or 'take one's stand.' In this coordination
    context it introduces the Levites' assuming a position for supervision. 'Stood'
    keeps the concrete Hebrew while reading naturally in English.
- source_word: יֵשׁוּעַ
  chosen: Jeshua
  alternatives:
  - Joshua
  lexicon: HALOT
  rationale: As a personal name, it is transliterated rather than translated, following
    the project's policy to transliterate names. 'Jeshua' is the conventional English
    form in Ezra.
- source_word: בָּנָיו וְאֶחָיו
  chosen: his sons and his brothers
  alternatives:
  - his children and his brothers
  - his sons and his kinsmen
  lexicon: HALOT
  rationale: The Hebrew explicitly uses male kinship terms. 'Sons' and 'brothers'
    preserve the source's gendered wording and familial structure.
- source_word: קַדְמִיאֵל וּבָנָיו
  chosen: and Kadmiel and his sons
  alternatives:
  - Kadmiel with his sons
  lexicon: HALOT
  rationale: This is a second coordinated family group parallel to Jeshua's. The simple
    coordination best reflects the Hebrew sequence.
- source_word: בְּנֵי יְהוּדָה
  chosen: the sons of Judah
  alternatives:
  - the sons of Hodaviah
  - the Judeans
  lexicon: HALOT
  rationale: The consonantal text reads 'Judah.' Some versions emend or follow alternate
    traditions to 'Hodaviah,' but the MT as given should be translated directly here.
    'The sons of Judah' is the plain rendering of the Hebrew form.
- source_word: כְּאֶחָד
  chosen: together as one
  alternatives:
  - as one
  - with one accord
  lexicon: HALOT
  rationale: The phrase emphasizes unified action. 'Together as one' preserves both
    the unity and the idiomatic force in readable English.
- source_word: לְנַצֵּחַ
  chosen: to oversee
  alternatives:
  - to supervise
  - to direct
  lexicon: HALOT
  rationale: In this context the piel infinitive of נצח refers to supervisory direction
    over workers, not musical leadership. 'Oversee' is clear modern English and fits
    the construction with עַל.
- source_word: עַל עֹשֵׂה הַמְּלָאכָה
  chosen: those doing the work
  alternatives:
  - the workers
  - those who were doing the workmanship
  lexicon: HALOT
  rationale: The singular participle with article functions collectively. 'Those doing
    the work' preserves the verbal nuance while sounding natural; it avoids over-specifying
    beyond the Hebrew.
- source_word: בְּבֵית הָאֱלֹהִים
  chosen: in the house of God
  alternatives:
  - at the house of God
  - in God's house
  lexicon: HALOT
  rationale: A standard temple expression. 'House of God' preserves the formal biblical
    idiom without archaic diction.
- source_word: בְּנֵי חֵנָדָד בְּנֵיהֶם וַאֲחֵיהֶם הַלְוִיִּם
  chosen: along with the sons of Henadad, their sons and their brothers, the Levites
  alternatives:
  - the sons of Henadad, their sons and their brothers, the Levites
  - including the sons of Henadad with their sons and brothers, the Levites
  lexicon: HALOT
  rationale: This final phrase appositionally identifies another Levitical group included
    in the supervisory body. 'Along with' makes the inclusion explicit in smooth English
    while retaining the Hebrew list structure. 'The Levites' is kept as the concluding
    appositional identifier.
