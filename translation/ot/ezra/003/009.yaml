theological_decisions:
- issue: Possible textual/interpretive uncertainty in בְּנֵי יְהוּדָה
  chosen_reading: Translate the Masoretic Text directly as 'the sons of Judah.'
  alternative_readings:
  - the sons of Hodaviah
  rationale: The provided source text is the WLC Masoretic reading, and no doctrinal
    issue requires departing from it. Because some traditions reflect a different
    underlying name, the alternative is preserved in a footnote for auditability.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it (applied analogically
    to textual/interpretive ambiguity).'
