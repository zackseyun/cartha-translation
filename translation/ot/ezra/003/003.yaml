id: EZR.3.3
reference: Ezra 3:3
source:
  edition: WLC
  text: וַ/יָּכִ֤ינוּ הַ/מִּזְבֵּ֨חַ֙ עַל מְכ֣וֹנֹתָ֔י/ו כִּ֚י בְּ/אֵימָ֣ה עֲלֵי/הֶ֔ם מֵ/עַמֵּ֖י הָ/אֲרָצ֑וֹת ו/יעל עָלָ֤י/ו עֹלוֹת֙ לַֽ/יהוָ֔ה עֹל֖וֹת לַ/בֹּ֥קֶר וְ/לָ/עָֽרֶב־׃
translation:
  text: They set up the altar on its foundations, for fear was upon them because of the peoples of the lands, and they offered up burnt offerings on it to Yahweh, burnt offerings morning and evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on its base' or 'in its fixed place.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'fear was upon them from the peoples of the lands,' that is, they were afraid because of the surrounding peoples.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּכִינוּ
  chosen: They set up
  alternatives:
  - they established
  - they prepared
  lexicon: HALOT
  rationale: The Hiphil of כון here refers to putting the altar in place or making it ready for use. 'Set up' is natural English for installing an altar and fits the following phrase 'on its foundations.'
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Standard rendering of מזבח in sacrificial context.
- source_word: עַל מְכֹנוֹתָיו
  chosen: on its foundations
  alternatives:
  - on its base
  - on its fixed place
  lexicon: HALOT
  rationale: מְכוֹנוֹת denotes bases, foundations, or fixed supports. In context, the sense is that the altar was reinstalled in its proper foundational location. 'On its foundations' best preserves the concrete image while remaining readable.
- source_word: כִּי בְּאֵימָה עֲלֵיהֶם
  chosen: for fear was upon them
  alternatives:
  - for they were in dread
  - for terror was on them
  lexicon: HALOT
  rationale: The clause is verbless and literally expresses fear resting upon them. 'Fear was upon them' preserves the Hebrew idiom with understandable English.
- source_word: מֵעַמֵּי הָאֲרָצוֹת
  chosen: because of the peoples of the lands
  alternatives:
  - from the peoples of the lands
  - because of the peoples of the countries
  lexicon: HALOT
  rationale: The preposition מִן after a fear expression can mark source or cause. In English, 'because of' communicates the causal sense clearly. 'Peoples of the lands' preserves the plural and the reference to surrounding regional populations.
- source_word: וַיַּעַל עָלָיו עֹלוֹת
  chosen: and they offered up burnt offerings on it
  alternatives:
  - and they caused burnt offerings to ascend on it
  - and they offered burnt offerings on it
  lexicon: HALOT
  rationale: The verb עלה in Hiphil with עֹלוֹת is the standard idiom for offering burnt offerings. Although the consonantal form is singular in the table, the contextual subject is plural, and English naturally renders the continuing plural subject from the previous clause. 'Offered up' reflects the ascent nuance without awkwardness.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: עֹלוֹת לַבֹּקֶר וְלָעָרֶב
  chosen: burnt offerings for the morning and for the evening
  alternatives:
  - morning and evening burnt offerings
  - burnt offerings morning and evening
  lexicon: HALOT
  rationale: The repetition of עֹלוֹת is retained rather than collapsed entirely, since Hebrew repeats the noun for emphasis/specification. 'For the morning and for the evening' communicates the regular daily times of sacrifice.
