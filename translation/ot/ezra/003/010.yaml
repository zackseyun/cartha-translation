id: EZR.3.10
reference: Ezra 3:10
source:
  edition: WLC
  text: וְ/יִסְּד֥וּ הַ/בֹּנִ֖ים אֶת הֵיכַ֣ל יְהוָ֑ה וַ/יַּעֲמִידוּ֩ הַ/כֹּהֲנִ֨ים מְלֻבָּשִׁ֜ים בַּ/חֲצֹֽצְר֗וֹת וְ/הַ/לְוִיִּ֤ם בְּנֵֽי אָסָף֙ בַּֽ/מְצִלְתַּ֔יִם לְ/הַלֵּל֙ אֶת יְהוָ֔ה עַל יְדֵ֖י דָּוִ֥יד מֶֽלֶךְ יִשְׂרָאֵֽל־־־־־׃
translation:
  text: When the builders laid the foundation of the temple of Yahweh, they stationed the priests, clothed in their vestments, with trumpets, and the Levites, the sons of Asaph, with cymbals, to praise Yahweh according to the directions of David king of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''by the hand of David king of Israel,'' an idiom meaning according to David''s direction or prescription.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִסְּדוּ
  chosen: laid the foundation
  alternatives:
  - founded
  - established the foundation
  lexicon: HALOT
  rationale: The verb יסד in this construction refers specifically to laying a building's foundation. English idiom prefers 'laid the foundation' over the less natural 'founded' in this temple-building context.
- source_word: הַבֹּנִים
  chosen: the builders
  alternatives:
  - those building
  - the workmen
  lexicon: HALOT
  rationale: The participle functions substantivally for those engaged in construction. 'Builders' is concise and natural.
- source_word: הֵיכַל יְהוָה
  chosen: the temple of the LORD
  alternatives:
  - the house of the LORD
  - the sanctuary of the LORD
  lexicon: HALOT
  rationale: הֵיכָל commonly denotes the temple/palace structure. In Ezra's cultic context, 'temple' is the clearest rendering. יְהוָה follows the doctrinal default as 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיַּעֲמִידוּ
  chosen: they stationed
  alternatives:
  - they set
  - they made stand
  - they appointed
  lexicon: HALOT
  rationale: The hiphil of עמד here means to cause persons to take their places for liturgical service. 'Stationed' captures the ceremonial arrangement better than the more generic 'set'.
- source_word: הַכֹּהֲנִים מְלֻבָּשִׁים
  chosen: the priests, clothed in their vestments
  alternatives:
  - the priests, arrayed
  - the priests, dressed
  lexicon: HALOT
  rationale: מְלֻבָּשִׁים means 'clothed.' Because the context is formal temple worship, 'clothed in their vestments' makes explicit the ceremonial sense without overtranslating.
- source_word: בַּחֲצֹצְרוֹת
  chosen: with trumpets
  alternatives:
  - with the trumpets
  lexicon: HALOT
  rationale: חֲצֹצְרוֹת are straight ceremonial trumpets used in worship. 'With trumpets' is idiomatic English and sufficiently specific in context.
- source_word: וְהַלְוִיִּם בְּנֵי אָסָף
  chosen: and the Levites, the sons of Asaph
  alternatives:
  - and the Levites, Asaph's sons
  - and the Levitical sons of Asaph
  lexicon: HALOT
  rationale: The appositional phrase identifies the Levitical musicians associated with Asaph's line. Retaining 'sons of Asaph' preserves the Hebrew familial designation.
- source_word: בַּמְצִלְתַּיִם
  chosen: with cymbals
  alternatives:
  - with the cymbals
  lexicon: HALOT
  rationale: The dual/plural form denotes cymbals used in temple music. 'With cymbals' is natural English.
- source_word: לְהַלֵּל אֶת יְהוָה
  chosen: to praise the LORD
  alternatives:
  - to give praise to the LORD
  lexicon: HALOT
  rationale: 'The infinitive expresses purpose: the priests and Levites were positioned for praising YHWH. ''To praise the LORD'' is direct and idiomatic.'
- source_word: עַל יְדֵי דָּוִיד
  chosen: according to the directions of David
  alternatives:
  - according to the ordinance of David
  - by the hand of David
  - as prescribed by David
  lexicon: HALOT
  rationale: The idiom עַל יְדֵי literally 'by the hand of' often means agency or instrumentality, and in this cultic-organizational setting refers to arrangements transmitted through David. 'According to the directions of David' communicates that the praise followed Davidic prescription without implying David's physical presence.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: king of Israel
  lexicon: HALOT
  rationale: A straightforward royal title; no contextual pressure suggests variation.
