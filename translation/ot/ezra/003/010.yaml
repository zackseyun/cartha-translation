theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Following the project's doctrinal standard preserves consistency with the stated default and with longstanding reverential convention.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of עַל יְדֵי דָּוִיד in temple worship context
  chosen_reading: according to the directions of David
  alternative_readings:
  - by David
  - according to the ordinance of David
  - as prescribed by David
  rationale: The phrase could be rendered more literally as 'by the hand of David,' but in context it refers to the Davidic pattern or prescription for praise. The chosen rendering preserves the historical-liturgical connection without obscuring the idiom for modern readers.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
