id: EZR.3.6
reference: Ezra 3:6
source:
  edition: WLC
  text: מִ/יּ֤וֹם אֶחָד֙ לַ/חֹ֣דֶשׁ הַ/שְּׁבִיעִ֔י הֵחֵ֕לּוּ לְ/הַעֲל֥וֹת עֹל֖וֹת לַ/יהוָ֑ה וְ/הֵיכַ֥ל יְהוָ֖ה לֹ֥א יֻסָּֽד׃
translation:
  text: From the first day of the seventh month they began to offer burnt offerings to Yahweh, though the foundation of the temple of Yahweh had not been laid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''But the foundation of the temple of the LORD had not yet been laid.'' The Hebrew conjunction can be rendered more simply as ''and'' or adversatively as ''but''; the sense is that sacrifices began before the temple foundation was laid.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִיּוֹם אֶחָד
  chosen: From the first day
  alternatives:
  - On the first day
  - Since the first day
  lexicon: HALOT
  rationale: The preposition מִן with יוֹם can mark a starting point in time, so 'From the first day' best reflects the temporal sense. 'On the first day' is possible in smoother English, but 'from' preserves the Hebrew nuance of commencement from that date.
- source_word: לַחֹדֶשׁ הַשְּׁבִיעִי
  chosen: of the seventh month
  lexicon: HALOT
  rationale: 'A straightforward genitival construction specifying which day is meant: the first day belonging to the seventh month.'
- source_word: הֵחֵלּוּ
  chosen: they began
  alternatives:
  - they started
  lexicon: HALOT
  rationale: Hiphil of חלל/החל commonly means 'begin.' 'Began' is standard, clear, and suitably formal without being archaic.
- source_word: לְהַעֲלוֹת עֹלוֹת
  chosen: to offer burnt offerings
  alternatives:
  - to bring up burnt offerings
  - to sacrifice burnt offerings
  lexicon: HALOT
  rationale: The idiom literally involves 'causing to go up' offerings, but in sacrificial context the natural English equivalent is 'offer burnt offerings.' This preserves the cultic sense without wooden literalism.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The preposition ל marks the recipient/direction of the offerings.
- source_word: וְהֵיכַל יְהוָה
  chosen: the temple of the LORD
  alternatives:
  - the palace/shrine of the LORD
  - the house of the LORD
  lexicon: HALOT
  rationale: הֵיכָל can denote a temple sanctuary or palace. In Ezra's restoration context, 'temple' is the clearest and most contextually appropriate rendering.
- source_word: לֹא יֻסָּד
  chosen: had not been laid
  alternatives:
  - had not yet been founded
  - was not yet established
  lexicon: HALOT
  rationale: The passive of יסד refers to laying a foundation. In English, 'the foundation ... had not been laid' is the idiomatic completion of the clause, making explicit what is implicit in the Hebrew passive.
- source_word: וְ
  chosen: though
  alternatives:
  - but
  - yet
  - and
  lexicon: HALOT
  rationale: 'The conjunction here is adversative/concessive in context: they began sacrifices despite the temple foundation not yet being laid. ''Though'' brings out that relationship more clearly than a bare ''and''.'
