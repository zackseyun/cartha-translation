theological_decisions:
- issue: Rendering of kinship term אחים in a representative group
  chosen_reading: his brothers
  alternative_readings:
  - his kinsmen
  - his associates
  rationale: The Hebrew is grammatically masculine and refers to male associates/kinsmen
    in context. Per the translation philosophy, gender-accurate wording is preferred
    over neutralizing the term.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering of תּוֹרָה in a cultic-legal citation
  chosen_reading: the Law of Moses
  alternative_readings:
  - the instruction of Moses
  - the Torah of Moses
  rationale: The context is explicit conformity to written sacrificial prescription.
    'Law' best communicates that force in natural English without denying the broader
    semantic range of תּוֹרָה.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
