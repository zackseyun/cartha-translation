id: EZR.3.2
reference: Ezra 3:2
source:
  edition: WLC
  text: וַ/יָּקָם֩ יֵשׁ֨וּעַ בֶּן יֽוֹצָדָ֜ק וְ/אֶחָ֣י/ו הַ/כֹּהֲנִ֗ים וּ/זְרֻבָּבֶ֤ל
    בֶּן שְׁאַלְתִּיאֵל֙ וְ/אֶחָ֔י/ו וַ/יִּבְנ֕וּ אֶת מִזְבַּ֖ח אֱלֹהֵ֣י יִשְׂרָאֵ֑ל
    לְ/הַעֲל֤וֹת עָלָי/ו֙ עֹל֔וֹת כַּ/כָּת֕וּב בְּ/תוֹרַ֖ת מֹשֶׁ֥ה אִישׁ הָ/אֱלֹהִֽים־־־־׃
translation:
  text: Then Jeshua son of Jozadak arose with his brothers the priests, and Zerubbabel
    son of Shealtiel with his brothers, and they built the altar of the God of Israel
    to offer burnt offerings on it, as it is written in the Law of Moses, the man
    of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his kinsmen' / 'his associates'; Hebrew 'his brothers,' with the following
      phrase specifying Jeshua's group as 'the priests.'
    reason: lexical_alternative
  - marker: b
    text: '''Law'' translates Hebrew torah, which can also mean ''instruction.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: arose
  alternatives:
  - stood up
  - set out
  lexicon: HALOT
  rationale: The verb קום in wayyiqtol here marks the beginning of decisive action.
    'Arose' preserves the narrative movement without over-interpreting it as merely
    physical standing or as a more idiomatic 'began.'
- source_word: יֵשׁוּעַ
  chosen: Jeshua
  alternatives:
  - Joshua
  lexicon: HALOT
  rationale: A personal name is transliterated rather than translated, following the
    stated philosophy. In Ezra-Nehemiah this postexilic form is conventionally represented
    as 'Jeshua.'
- source_word: וְאֶחָיו
  chosen: his brothers
  alternatives:
  - his kinsmen
  - his fellow priests
  lexicon: HALOT
  rationale: אָח commonly means 'brother(s)' and can extend to close kin or associates.
    Here the following apposition 'the priests' clarifies that Jeshua's brothers are
    his priestly associates, but 'his brothers' best preserves the Hebrew wording
    while remaining natural English.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Straightforward rendering of the appositional noun identifying Jeshua's
    brothers.
- source_word: זְרֻבָּבֶל
  chosen: Zerubbabel
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
- source_word: שְׁאַלְתִּיאֵל
  chosen: Shealtiel
  alternatives:
  - Salathiel
  lexicon: HALOT
  rationale: Personal name transliterated from the Hebrew form; 'Shealtiel' matches
    standard OT English usage.
- source_word: וַיִּבְנוּ
  chosen: they built
  alternatives:
  - they rebuilt
  - they constructed
  lexicon: HALOT
  rationale: בנה means 'build.' Although the altar may be a restoration in historical
    context, the Hebrew verb itself does not explicitly mark repetition, so 'built'
    is preferred.
- source_word: מִזְבַּח
  chosen: the altar
  lexicon: HALOT
  rationale: Standard rendering for sacrificial altar.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Construct phrase rendered directly and naturally in English.
- source_word: לְהַעֲלוֹת עָלָיו עֹלוֹת
  chosen: to offer burnt offerings on it
  alternatives:
  - to cause burnt offerings to go up on it
  - to sacrifice burnt offerings on it
  lexicon: HALOT
  rationale: The Hiphil of עלה with עֹלוֹת is sacrificial idiom for presenting burnt
    offerings. 'Offer burnt offerings on it' communicates the idiom clearly while
    preserving the altar reference in עָלָיו.
- source_word: עֹלוֹת
  chosen: burnt offerings
  alternatives:
  - whole burnt offerings
  lexicon: HALOT
  rationale: Standard cultic term for offerings consumed by fire. 'Burnt offerings'
    is the established and accurate English equivalent.
- source_word: כַּכָּתוּב
  chosen: as it is written
  alternatives:
  - according to what is written
  lexicon: HALOT
  rationale: This formula introduces conformity to scriptural prescription. 'As it
    is written' is concise and idiomatic.
- source_word: בְּתוֹרַת מֹשֶׁה
  chosen: in the Law of Moses
  alternatives:
  - in the instruction of Moses
  - in the Torah of Moses
  lexicon: HALOT
  rationale: תּוֹרָה can mean 'instruction,' but in this legal-cultic context referring
    to written Mosaic prescription, 'Law of Moses' is the clearest conventional rendering.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  lexicon: HALOT
  rationale: Established biblical title for one commissioned by God. Rendering it
    directly preserves both idiom and theological weight.
