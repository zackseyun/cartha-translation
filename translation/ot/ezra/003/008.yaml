id: EZR.3.8
reference: Ezra 3:8
source:
  edition: WLC
  text: וּ/בַ/שָּׁנָ֣ה הַ/שֵּׁנִ֗ית לְ/בוֹאָ֞/ם אֶל בֵּ֤ית הָֽ/אֱלֹהִים֙ לִ/יר֣וּשָׁלִַ֔ם בַּ/חֹ֖דֶשׁ הַ/שֵּׁנִ֑י הֵחֵ֡לּוּ זְרֻבָּבֶ֣ל בֶּן שְׁ֠אַלְתִּיאֵל וְ/יֵשׁ֨וּעַ בֶּן יֽוֹצָדָ֜ק וּ/שְׁאָ֥ר אֲחֵי/הֶ֣ם הַ/כֹּהֲנִ֣ים וְ/הַ/לְוִיִּ֗ם וְ/כָל הַ/בָּאִים֙ מֵ/הַ/שְּׁבִ֣י יְרֽוּשָׁלִַ֔ם וַ/יַּעֲמִ֣ידוּ אֶת הַ/לְוִיִּ֗ם מִ/בֶּ֨ן עֶשְׂרִ֤ים שָׁנָה֙ וָ/מַ֔עְלָ/ה לְ/נַצֵּ֖חַ עַל מְלֶ֥אכֶת בֵּית יְהוָֽה־־־׀־־־־׃פ
translation:
  text: And in the second year after their coming to the house of God at Jerusalem, in the second month, Zerubbabel son of Shealtiel and Jeshua son of Jozadak, and the rest of their brothers the priests and the Levites, and all who had come from the captivity to Jerusalem, began and appointed the Levites from twenty years old and upward to oversee the work of the house of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “from exile.”
    reason: lexical_alternative
lexical_decisions:
- source_word: לְבוֹאָם
  chosen: after their coming
  alternatives:
  - when they came
  - after they arrived
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ל and 3mp suffix functions temporally here. 'After their coming' preserves the Hebrew structure while remaining natural English.
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - God's house
  - the temple of God
  lexicon: HALOT
  rationale: A formally close rendering is preferable here because the text is referring to the temple site in covenantal language. 'Temple' is interpretive and is avoided in the main text.
- source_word: הֵחֵלּוּ
  chosen: began
  alternatives:
  - started
  lexicon: HALOT
  rationale: Standard rendering of החל in the Hiphil. Although the verb does not specify the object, English can carry the sense with 'began' before the following coordinated action.
- source_word: וַיַּעֲמִידוּ
  chosen: appointed
  alternatives:
  - set
  - stationed
  lexicon: HALOT
  rationale: The Hiphil of עמד here means to cause to stand in position, i.e., to appoint or install for a task. 'Appointed' best fits the administrative context.
- source_word: אֶת הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Straightforward ethnic/tribal-cultic designation; retained consistently.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  chosen: from twenty years old and upward
  alternatives:
  - twenty years old and older
  - from the age of twenty and above
  lexicon: HALOT
  rationale: This is a standard age-threshold formula. The chosen rendering is idiomatic and close to the Hebrew wording.
- source_word: לְנַצֵּחַ
  chosen: to oversee
  alternatives:
  - to supervise
  - to direct
  lexicon: HALOT
  rationale: In this context נצח refers to supervisory responsibility over labor rather than musical leadership. 'Oversee' is clear and contextually precise.
- source_word: מְלֶאכֶת בֵּית יְהוָה
  chosen: the work of the house of the LORD
  alternatives:
  - the service of the house of the LORD
  - the work on the house of the LORD
  lexicon: HALOT
  rationale: מלאכה denotes work/labor. 'Work of the house' preserves the Hebrew genitive relation and can include construction-related activity. The divine name is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrinal guideline for the Tetragrammaton.
- source_word: אֲחֵיהֶם
  chosen: their brothers
  alternatives:
  - their kinsmen
  - their fellow Israelites
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural 'brothers.' Per translation philosophy, gender-accurate language is retained rather than neutralized.
- source_word: מֵהַשְּׁבִי
  chosen: from the captivity
  alternatives:
  - from exile
  - from the exiles
  lexicon: HALOT
  rationale: The noun refers to the state/community of exile. 'From the captivity' is formally close; 'from exile' is smoother but slightly less concrete. The main text keeps the more literal expression, with the alternative preserved in a footnote.
