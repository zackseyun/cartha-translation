id: EZR.3.4
reference: Ezra 3:4
source:
  edition: WLC
  text: וַֽ/יַּעֲשׂ֛וּ אֶת חַ֥ג הַ/סֻּכּ֖וֹת כַּ/כָּת֑וּב וְ/עֹלַ֨ת י֤וֹם בְּ/יוֹם֙
    בְּ/מִסְפָּ֔ר כְּ/מִשְׁפַּ֖ט דְּבַר י֥וֹם בְּ/יוֹמֽ/וֹ־־׃
translation:
  text: They kept the Festival of Booths as it is written, and offered the daily burnt
    offerings by number according to the ordinance, as each day required.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the Feast/Festival of Tabernacles.' The Hebrew
      literally says 'Booths.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  chosen: They kept
  alternatives:
  - they did
  - they celebrated
  - they observed
  lexicon: HALOT
  rationale: With חַג ('festival/feast') as the object, עשה idiomatically means to
    keep/celebrate/observe a festival rather than merely 'do' it. 'Kept' is concise,
    natural English and preserves the cultic sense.
- source_word: חַג הַסֻּכּוֹת
  chosen: the Festival of Booths
  alternatives:
  - the Feast of Booths
  - the Festival of Tabernacles
  - the Feast of Tabernacles
  lexicon: HALOT
  rationale: חַג is 'festival/feast' and סֻכּוֹת literally means 'booths.' 'Festival
    of Booths' preserves the Hebrew image more transparently than the traditional
    'Tabernacles,' while remaining readable.
- source_word: כַּכָּתוּב
  chosen: as it is written
  alternatives:
  - according to what is written
  - as written
  lexicon: HALOT
  rationale: This formula points to conformity with written prescription. 'As it is
    written' is idiomatic and retains the scriptural-authoritative force.
- source_word: וְעֹלַת
  chosen: and offered the ... burnt offerings
  alternatives:
  - and the burnt offering of
  - and a burnt offering of
  lexicon: HALOT
  rationale: The noun עֹלָה denotes a burnt offering. Because English requires a finite
    verb for smooth sense and the clause is coordinated to the previous action, 'and
    offered' is supplied naturally. The singular construct with following distributive
    expressions functions collectively here, hence plural 'burnt offerings' in English.
- source_word: יוֹם בְּיוֹם
  chosen: daily
  alternatives:
  - day by day
  - for each day
  lexicon: HALOT
  rationale: The expression is distributive/repetitive. 'Daily' communicates the sense
    compactly in modern English; the day-by-day nuance is then reinforced by the following
    phrase.
- source_word: בְּמִסְפָּר
  chosen: by number
  alternatives:
  - in number
  - according to the number
  lexicon: HALOT
  rationale: This indicates that the offerings were presented in the prescribed numerical
    quantity. 'By number' is a fairly formal but clear rendering that fits the sacrificial
    context.
- source_word: כְּמִשְׁפַּט
  chosen: according to the ordinance
  alternatives:
  - according to the rule
  - according to the custom
  - according to the judgment
  lexicon: HALOT
  rationale: מִשְׁפָּט here refers to prescribed legal procedure or ordinance, not
    judicial verdict. 'Ordinance' best captures the cultic-regulatory sense.
- source_word: דְּבַר יוֹם בְּיוֹמוֹ
  chosen: as each day required
  alternatives:
  - the matter of each day on its day
  - each day's requirement on its day
  - what was required for each day on that day
  lexicon: HALOT
  rationale: This idiom means the requirement appropriate to each specific day. A
    more literal rendering would be awkward in English; 'as each day required' preserves
    the distributive force and temporal specificity.
