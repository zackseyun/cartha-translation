id: EZR.3.11
reference: Ezra 3:11
source:
  edition: WLC
  text: וַֽ֠/יַּעֲנוּ בְּ/הַלֵּ֨ל וּ/בְ/הוֹדֹ֤ת לַֽ/יהוָה֙ כִּ֣י ט֔וֹב כִּֽי לְ/עוֹלָ֥ם
    חַסְדּ֖/וֹ עַל יִשְׂרָאֵ֑ל וְ/כָל הָ/עָ֡ם הֵרִיעוּ֩ תְרוּעָ֨ה גְדוֹלָ֤ה בְ/הַלֵּל֙
    לַֽ/יהוָ֔ה עַ֖ל הוּסַ֥ד בֵּית יְהוָֽה־־־־׃ס
translation:
  text: 'And they sang responsively, praising and giving thanks to the LORD: “For
    he is good, for his steadfast love is forever toward Israel.” And all the people
    shouted a great shout in praise to the LORD because the house of the LORD had
    been founded.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they answered'—the Hebrew verb can mean 'responded,' likely in antiphonal
      or responsive praise.
    reason: lexical_alternative
  - marker: b
    text: Or, 'for his steadfast love endures forever toward Israel.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'because the house of the LORD was founded'; in context this
      refers to the laying of the temple's foundation.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעֲנוּ
  chosen: they sang responsively
  alternatives:
  - they answered
  - they responded
  lexicon: HALOT
  rationale: ענה in this liturgical context commonly carries the sense of responding
    antiphonally rather than merely answering. 'Sang responsively' brings out the
    worship setting and fits the following praise formula.
- source_word: בְּהַלֵּל וּבְהוֹדֹת
  chosen: praising and giving thanks
  alternatives:
  - with praise and thanksgiving
  - in praise and thanksgiving
  lexicon: HALOT
  rationale: 'The paired infinitive/verb forms express manner or accompanying action
    in worship. Rendering them verbally keeps the clause natural in English while
    preserving both distinct acts: praise and thanksgiving.'
- source_word: לַיהוָה / יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding covenantal usage.
- source_word: כִּי טוֹב
  chosen: For he is good
  alternatives:
  - For he is good indeed
  - Because he is good
  lexicon: HALOT
  rationale: This is the standard confessional praise formula. Including 'he is' makes
    the English idiomatic and explicit.
- source_word: כִּי לְעוֹלָם חַסְדּוֹ
  chosen: for his steadfast love is forever
  alternatives:
  - for his lovingkindness endures forever
  - for his covenant love is everlasting
  - for his mercy endures forever
  lexicon: HALOT
  rationale: חסד denotes loyal, covenantal love; 'steadfast love' is the most established
    concise English rendering. 'Is forever' closely reflects לְעוֹלָם without over-paraphrasing.
- source_word: עַל יִשְׂרָאֵל
  chosen: toward Israel
  alternatives:
  - upon Israel
  - for Israel
  lexicon: HALOT
  rationale: The preposition עַל here marks direction or reference of the LORD's steadfast
    love. 'Toward Israel' preserves that sense more naturally than the more wooden
    'upon Israel.'
- source_word: הֵרִיעוּ תְרוּעָה גְדוֹלָה
  chosen: shouted a great shout
  alternatives:
  - raised a great shout
  - gave a loud shout
  lexicon: HALOT
  rationale: The Hebrew uses a cognate accusative for emphasis. 'Shouted a great shout'
    preserves the force and repetition better than smoothing it away entirely.
- source_word: בְּהַלֵּל לַיהוָה
  chosen: in praise to the LORD
  alternatives:
  - while praising the LORD
  - praising the LORD
  lexicon: HALOT
  rationale: This phrase explains the character of the people's shout. 'In praise
    to the LORD' preserves the prepositional nuance and links the shout directly to
    worship.
- source_word: עַל הוּסַד בֵּית יְהוָה
  chosen: because the house of the LORD had been founded
  alternatives:
  - because the foundation of the house of the LORD had been laid
  - over the founding of the house of the LORD
  lexicon: HALOT
  rationale: The Hophal of יסד means 'was founded/was established.' Since the context
    is temple rebuilding, English readers may think specifically of laying foundations,
    but the Hebrew clause itself states that the house had been founded. This rendering
    stays close to the form while remaining clear.
