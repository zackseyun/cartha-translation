theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, preserving reverential convention and alignment with the Septuagintal/Lord
    pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering חַסְדּוֹ in a covenantal praise formula
  chosen_reading: his steadfast love
  alternative_readings:
  - his lovingkindness
  - his mercy
  - his covenant love
  rationale: The term carries covenant loyalty and enduring benevolence. 'Steadfast
    love' best preserves both semantic breadth and established biblical usage without
    archaic diction.
  doctrine_reference: DOCTRINE.md Translation philosophy §6; consistency of key terms
    §5
