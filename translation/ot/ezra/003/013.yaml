id: EZR.3.13
reference: Ezra 3:13
source:
  edition: WLC
  text: וְ/אֵ֣ין הָ/עָ֗ם מַכִּירִים֙ ק֚וֹל תְּרוּעַ֣ת הַ/שִּׂמְחָ֔ה לְ/ק֖וֹל בְּכִ֣י
    הָ/עָ֑ם כִּ֣י הָ/עָ֗ם מְרִיעִים֙ תְּרוּעָ֣ה גְדוֹלָ֔ה וְ/הַ/קּ֥וֹל נִשְׁמַ֖ע עַד
    לְ/מֵ/רָחֽוֹק־׃פ
translation:
  text: And the people could not distinguish the sound of the shout of joy from the
    sound of the people’s weeping, for the people were shouting with a great shout,
    and the sound was heard far away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'could not recognize the sound of the joyful shouting from the sound
      of the people’s weeping.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'with a great shout'; some English versions render 'with a loud shout.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַכִּירִים
  chosen: could not distinguish
  alternatives:
  - could not recognize
  - could not discern
  lexicon: HALOT
  rationale: The Hiphil of נכר here conveys the ability to tell one thing from another.
    In context, the issue is not mere recognition but distinguishing between two sounds.
- source_word: ק֚וֹל
  chosen: sound
  alternatives:
  - voice
  - noise
  lexicon: HALOT
  rationale: קוֹל can mean voice, sound, or noise. Because the verse contrasts audible
    phenomena rather than spoken content, 'sound' is the most natural and precise
    rendering.
- source_word: תְּרוּעַת הַשִּׂמְחָה
  chosen: the shout of joy
  alternatives:
  - the joyful shout
  - the sound of rejoicing
  lexicon: HALOT
  rationale: תְּרוּעָה denotes a loud cry or shout, often jubilant. The construct
    phrase is best rendered explicitly as 'the shout of joy' to preserve both the
    noun and its genitive relationship.
- source_word: לְקוֹל בְּכִי הָעָם
  chosen: from the sound of the people’s weeping
  alternatives:
  - from the sound of the people's crying
  - from the noise of the people's weeping
  lexicon: HALOT
  rationale: The comparison is between two audible sounds. Rendering בְּכִי as 'weeping'
    preserves the emotional force and matches the preceding context of older men weeping.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the explanation for why the sounds could not be
    distinguished. 'For' is concise and natural in English.
- source_word: מְרִיעִים
  chosen: were shouting
  alternatives:
  - were raising a shout
  - were giving a shout
  lexicon: HALOT
  rationale: The Hiphil of רוע in this context refers to raising a loud cry. 'Were
    shouting' is idiomatic modern English and fits the ongoing action.
- source_word: תְּרוּעָה גְדוֹלָה
  chosen: with a great shout
  alternatives:
  - a loud shout
  - with a mighty shout
  lexicon: HALOT
  rationale: This preserves the cognate construction with מְרִיעִים while keeping
    readable English. 'Great shout' is slightly more formal than 'loud shout' and
    reflects גְדוֹלָה directly.
- source_word: נִשְׁמַע
  chosen: was heard
  alternatives:
  - could be heard
  lexicon: HALOT
  rationale: The Niphal of שׁמע is naturally passive here. 'Was heard' is straightforward
    and preserves the Hebrew verbal form.
- source_word: עַד לְמֵרָחוֹק
  chosen: far away
  alternatives:
  - from afar
  - to a great distance
  lexicon: HALOT
  rationale: The phrase indicates that the sound carried to a distant place. 'Far
    away' is idiomatic and clear in modern English.
