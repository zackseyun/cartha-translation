id: EZR.3.5
reference: Ezra 3:5
source:
  edition: WLC
  text: וְ/אַחֲרֵי כֵ֞ן עֹלַ֤ת תָּמִיד֙ וְ/לֶ֣/חֳדָשִׁ֔ים וּ/לְ/כָל מוֹעֲדֵ֥י יְהוָ֖ה הַ/מְקֻדָּשִׁ֑ים וּ/לְ/כֹ֛ל מִתְנַדֵּ֥ב נְדָבָ֖ה לַ/יהוָֽה־׃
translation:
  text: And after that came the regular burnt offering, and the offerings for the new moons and for all the appointed feasts of Yahweh that were consecrated, and for everyone who willingly offered a freewill offering to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the continual burnt offering' or 'the daily burnt offering.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'new moons,' referring to the monthly sacred observances at the start of each month.
    reason: cultural_note
  - marker: c
    text: Or 'appointed times' or 'festivals' of the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַחֲרֵי כֵן
  chosen: And after that
  alternatives:
  - Afterward
  - And afterward
  lexicon: HALOT
  rationale: Temporal transition linking this verse to the preceding sacrificial activity. 'And after that' preserves the conjunction and sequence naturally in English.
- source_word: עֹלַת תָּמִיד
  chosen: the regular burnt offering
  alternatives:
  - the continual burnt offering
  - the daily burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard whole burnt offering. תָּמִיד denotes regular/continual recurrence. 'Regular burnt offering' is clear modern English and avoids over-specifying 'daily' where the Hebrew says 'continual/regular,' though the cultic referent is the daily offering.
- source_word: וְלֶחֳדָשִׁים
  chosen: and for the new moons
  alternatives:
  - and for the monthly offerings
  - and for the beginnings of the months
  lexicon: HALOT
  rationale: חֹדֶשׁ here refers to the new-moon observances marking the start of months, not merely 'months' in general. 'New moons' is the established and accurate cultic expression.
- source_word: וּלְכָל מוֹעֲדֵי יְהוָה
  chosen: and for all the appointed feasts of the LORD
  alternatives:
  - and for all the appointed times of the LORD
  - and for all the festivals of the LORD
  lexicon: HALOT
  rationale: מוֹעֲדִים are fixed sacred times/festivals. 'Appointed feasts' preserves both the calendrical and celebratory sense in this sacrificial context.
- source_word: הַמְקֻדָּשִׁים
  chosen: that were consecrated
  alternatives:
  - that were holy
  - that were sanctified
  lexicon: HALOT
  rationale: Passive participle modifying the appointed feasts. 'Consecrated' captures the idea of being set apart as sacred observances more precisely than the flatter 'holy.'
- source_word: וּלְכֹל מִתְנַדֵּב
  chosen: and for everyone who willingly offered
  alternatives:
  - and for everyone who volunteered
  - and for everyone who freely offered
  lexicon: HALOT
  rationale: The hitpael participle expresses voluntary willingness. Rendering with a verbal idea ('who willingly offered') fits the following cognate noun and avoids awkward literalism.
- source_word: נְדָבָה
  chosen: a freewill offering
  alternatives:
  - a voluntary offering
  lexicon: HALOT
  rationale: Standard sacrificial term for an offering given voluntarily. 'Freewill offering' is the clearest established equivalent in English Bible style.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
