theological_decisions:
- issue: Gendered corporate language in בְּנֵי יִשְׂרָאֵל and כְּאִישׁ אֶחָד
  chosen_reading: Retain 'sons of Israel' and 'as one man' in the main text
  alternative_readings:
  - the Israelites
  - as one
  - with one accord
  rationale: The doctrine excerpt directs gender-accurate rendering over gender-neutral
    smoothing where the source uses masculine forms with representative force. Here
    both expressions are conventional Hebrew corporate expressions, and preserving
    them maintains transparency to the source text while remaining intelligible English.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
