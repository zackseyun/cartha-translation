id: EZR.3.1
reference: Ezra 3:1
source:
  edition: WLC
  text: וַ/יִּגַּע֙ הַ/חֹ֣דֶשׁ הַ/שְּׁבִיעִ֔י וּ/בְנֵ֥י יִשְׂרָאֵ֖ל בֶּ/עָרִ֑ים וַ/יֵּאָסְפ֥וּ
    הָ/עָ֛ם כְּ/אִ֥ישׁ אֶחָ֖ד אֶל יְרוּשָׁלִָֽםס־׃ס
translation:
  text: When the seventh month arrived, and the sons of Israel were in the cities,
    the people gathered together as one man to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' Hebrew 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''as one man,'' that is, in united action or with one accord.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגַּע
  chosen: arrived
  alternatives:
  - came
  - reached
  lexicon: HALOT
  rationale: The verb נגע literally means 'touch/reach,' but with a time expression
    ('the seventh month') it idiomatically means the month 'arrived' or 'came.' 'Arrived'
    is natural modern English while preserving the temporal sense.
- source_word: הַחֹדֶשׁ הַשְּׁבִיעִי
  chosen: the seventh month
  lexicon: HALOT
  rationale: A straightforward formal rendering of the temporal phrase; no reason
    to substitute a later month name in the translation.
- source_word: וּבְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Following the project's gender-accurate principle, בנים is preserved
    as 'sons' rather than flattened to 'Israelites.' 'Children of Israel' is traditional,
    but 'sons of Israel' more directly reflects the Hebrew form.
- source_word: בֶּעָרִים
  chosen: were in the cities
  alternatives:
  - were in their cities
  - were in the towns
  lexicon: HALOT
  rationale: The Hebrew is elliptical, with the location phrase functioning predicatively
    after 'the sons of Israel.' 'Were in the cities' supplies the implied copular
    sense in idiomatic English. 'Their' is not explicit in the Hebrew, so it is omitted
    from the main text.
- source_word: וַיֵּאָסְפוּ
  chosen: gathered together
  alternatives:
  - assembled
  - were gathered
  lexicon: HALOT
  rationale: אָסף in the Niphal here denotes assembling. 'Gathered together' is clear,
    natural, and preserves the communal action.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the people as a whole
  - the assembly
  lexicon: HALOT
  rationale: A standard rendering of העם. It refers collectively to the returned community.
- source_word: כְּאִישׁ אֶחָד
  chosen: as one man
  alternatives:
  - as one
  - with one accord
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'as one man,' emphasizing unified action.
    Per the project's gender-accurate policy, the masculine singular is retained rather
    than neutralized in the main text.
- source_word: אֶל יְרוּשָׁלִָם
  chosen: to Jerusalem
  alternatives:
  - at Jerusalem
  lexicon: HALOT
  rationale: אֶל normally indicates movement toward a destination, so 'to Jerusalem'
    best fits the gathering action.
