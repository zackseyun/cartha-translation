id: JDG.20.27
reference: Judges 20:27
source:
  edition: WLC
  text: וַ/יִּשְׁאֲל֥וּ בְנֵֽי יִשְׂרָאֵ֖ל בַּֽ/יהוָ֑ה וְ/שָׁ֗ם אֲרוֹן֙ בְּרִ֣ית הָ/אֱלֹהִ֔ים בַּ/יָּמִ֖ים הָ/הֵֽם־׃
translation:
  text: And the sons of Israel inquired of Yahweh—for the ark of the covenant of God was there in those days—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Israelites inquired of the LORD.' The Hebrew is literally 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: The clause 'for the ark of the covenant of God was there in those days' explains the setting of their inquiry.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁאֲלוּ
  chosen: inquired
  alternatives:
  - asked
  - consulted
  lexicon: HALOT
  rationale: שׁאל with ב + divine name commonly means to seek an oracle or consult the LORD, not merely to ask a casual question. 'Inquired' preserves the formal religious sense in readable English.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: Formally the Hebrew reads 'sons of Israel.' In this narrative setting it refers to the covenant people collectively. Per gender-accurate philosophy, the masculine form is retained rather than neutralized to 'Israelites,' though that remains a viable idiomatic alternative.
- source_word: בַּיהוָה
  chosen: of the LORD
  alternatives:
  - before the LORD
  - from the LORD
  lexicon: HALOT
  rationale: The preposition ב with שׁאל in this idiom is best represented in English as 'inquire of' or 'consult.' The divine name יְהוָה follows the project's default rendering 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְשָׁם
  chosen: for ... was there
  alternatives:
  - and ... was there
  - now ... was there
  lexicon: HALOT
  rationale: The conjunction plus adverb introduces a parenthetical explanatory note. Rendering it with an em-dash and 'for' communicates the explanatory force more naturally in English than a simple coordinate 'and.'
- source_word: אֲרוֹן בְּרִית הָאֱלֹהִים
  chosen: the ark of the covenant of God
  alternatives:
  - the ark of God's covenant
  - the ark of the covenant
  lexicon: HALOT
  rationale: A close rendering preserves the full construct chain. 'Ark of the covenant of God' is slightly more formal but transparent and faithful to the Hebrew wording.
- source_word: בַּיָּמִים הָהֵם
  chosen: in those days
  alternatives:
  - at that time
  lexicon: HALOT
  rationale: This is the standard temporal idiom and is naturally rendered 'in those days.'
