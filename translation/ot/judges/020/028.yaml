theological_decisions:
- issue: Referent of the suffix in לְפָנָיו
  chosen_reading: The suffix refers to the ark of the covenant mentioned in the previous verse, rendered 'before it.'
  alternative_readings:
  - The suffix refers to the LORD, rendered 'before him'
  rationale: The immediate context in v.27 mentions the ark of the covenant of God being there, followed by Phinehas standing לפניו. Hebrew pronominal reference can follow the nearest salient antecedent, and the physical posture of standing before the ark is contextually apt. Because the antecedent could also be understood as the LORD by theological association, the alternative is preserved in a footnote rather than resolved dogmatically.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Rendering of יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for the divine name.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
