  to: And Phinehas the son of Eleazar, son of Aaron, stood before him in those days, saying, “Shall I yet again go out to battle against the sons of Benjamin my brother, or shall I stop?” And the LORD said, “Go up, for tomorrow I will give him into your hand.”
