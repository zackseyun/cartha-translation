id: JDG.20.28
reference: Judges 20:28
source:
  edition: WLC
  text: וּ֠/פִינְחָס בֶּן אֶלְעָזָ֨ר בֶּֽן אַהֲרֹ֜ן עֹמֵ֣ד לְ/פָנָ֗י/ו בַּ/יָּמִ֣ים הָ/הֵם֮ לֵ/אמֹר֒ הַ/אוֹסִ֨ף ע֜וֹד לָ/צֵ֧את לַ/מִּלְחָמָ֛ה עִם בְּנֵֽי בִנְיָמִ֥ן אָחִ֖/י אִם אֶחְדָּ֑ל וַ/יֹּ֤אמֶר יְהוָה֙ עֲל֔וּ כִּ֥י מָחָ֖ר אֶתְּנֶ֥/נּוּ בְ/יָדֶֽ/ךָ־־׀־־־׃
translation:
  text: And Phinehas the son of Eleazar, son of Aaron, stood before him in those days, saying, “Shall I yet again go out to battle against the sons of Benjamin my brother, or shall I stop?” And Yahweh said, “Go up, for tomorrow I will give him into your hand.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “stood before him,” with the pronoun understood as referring to the LORD rather than to the ark mentioned in the previous verse.
    reason: alternative_reading
  - marker: b
    text: Hebrew “the sons of Benjamin, my brother,” preserving the language of kinship even in civil war.
    reason: cultural_note
  - marker: c
    text: Or “I will deliver him into your hand.” The singular “him” likely treats Benjamin collectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפִינְחָס
  chosen: And Phinehas
  alternatives:
  - Now Phinehas
  lexicon: HALOT
  rationale: The conjunction waw is carried forward naturally as 'And' in narrative sequence. The personal name is transliterated per translation philosophy.
- source_word: בֶּן אֶלְעָזָר בֶּן אַהֲרֹן
  chosen: the son of Eleazar, son of Aaron
  alternatives:
  - son of Eleazar, the son of Aaron
  lexicon: HALOT
  rationale: A straightforward genealogical apposition. Retaining both generations preserves the Hebrew emphasis on priestly lineage.
- source_word: עֹמֵד לְפָנָיו
  chosen: stood before it
  alternatives:
  - was standing before him
  - ministered before it
  lexicon: HALOT
  rationale: The participle עֹמֵד denotes standing/serving in attendance. The pronominal suffix in context most naturally refers to the ark mentioned in the previous verse, so English 'it' makes the referent coherent. 'Stood before' preserves the formal posture without over-interpreting as technical priestly service.
- source_word: בַּיָּמִים הָהֵם
  chosen: in those days
  alternatives:
  - at that time
  lexicon: HALOT
  rationale: This is a standard temporal expression; 'in those days' is both natural and close to the Hebrew.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Infinitive construct introducing direct speech is well represented by 'saying'.
- source_word: הַאוֹסִף עוֹד
  chosen: Shall I yet again
  alternatives:
  - Shall I continue still
  - Am I to add again
  lexicon: HALOT
  rationale: The idiom with יסף plus עוד expresses repetition/continuation. 'Yet again' captures the sense of resuming another attempt after previous battles.
- source_word: לָצֵאת לַמִּלְחָמָה
  chosen: go out to battle
  alternatives:
  - go out for war
  - march out to the battle
  lexicon: HALOT
  rationale: This is a common military idiom. 'Go out to battle' is idiomatic English and preserves the Hebrew imagery.
- source_word: עִם בְּנֵי בִנְיָמִן
  chosen: against the sons of Benjamin
  alternatives:
  - against the people of Benjamin
  - with the sons of Benjamin
  lexicon: HALOT
  rationale: Although עִם often means 'with,' in battle contexts it can denote engagement against an opponent. 'Sons of Benjamin' preserves the tribal/familial idiom more closely than 'Benjaminites.'
- source_word: אָחִי
  chosen: my brother
  alternatives:
  - my kinsman
  - my fellow Israelite brother
  lexicon: HALOT
  rationale: The singular with first-person suffix highlights kinship despite conflict. The singular collective nuance is retained in the literal 'my brother' rather than being expanded interpretively.
- source_word: אִם אֶחְדָּל
  chosen: or shall I stop?
  alternatives:
  - or shall I cease?
  - or should I refrain?
  lexicon: HALOT
  rationale: חדל means cease/stop. 'Shall I stop?' is clear modern English and fits the deliberative question.
- source_word: וַיֹּאמֶר יְהוָה
  chosen: And the LORD said
  alternatives:
  - Then the LORD said
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The narrative waw is represented with 'And'.
- source_word: עֲלוּ
  chosen: Go up
  alternatives:
  - Advance
  - March up
  lexicon: HALOT
  rationale: עלה in military movement often means 'go up/advance.' 'Go up' preserves the conventional biblical idiom and geographic nuance.
- source_word: כִּי מָחָר
  chosen: for tomorrow
  alternatives:
  - because tomorrow
  - tomorrow indeed
  lexicon: HALOT
  rationale: כִּי here introduces the reason/assurance for the command. 'For tomorrow' is concise and natural.
- source_word: אֶתְּנֶנּוּ בְיָדֶךָ
  chosen: I will give him into your hand
  alternatives:
  - I will deliver him into your hand
  - I will give them into your hand
  lexicon: HALOT
  rationale: נתן ביד is a standard idiom for handing over in victory. The suffix is singular ('him'), likely treating Benjamin collectively as a unit or its force as a singular entity; this is preserved rather than harmonized to a plural.
