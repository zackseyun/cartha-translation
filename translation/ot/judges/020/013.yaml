theological_decisions:
- issue: Rendering of בְּנֵי בְלִיַּעַל
  chosen_reading: sons of worthlessness
  alternative_readings:
  - worthless men
  - sons of Belial
  rationale: The phrase is a moral characterization, not necessarily a reference to
    a personal demonic figure. Rendering it literally preserves the Hebrew idiom without
    importing later theological associations tied to 'Belial' as a proper name.
  doctrine_reference: Translation philosophy §1, §3, §4
- issue: Judicial force of the cohortatives
  chosen_reading: so that we may put them to death and purge the evil from Israel
  alternative_readings:
  - and we will kill them and remove evil from Israel
  rationale: The verse presents a communal judicial demand aimed at covenantal purification.
    The chosen wording preserves that legal-covenantal force without paraphrastic
    expansion.
  doctrine_reference: Translation philosophy §1, §5
