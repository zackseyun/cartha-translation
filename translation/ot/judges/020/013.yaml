id: JDG.20.13
reference: Judges 20:13
source:
  edition: WLC
  text: וְ/עַתָּ֡ה תְּנוּ֩ אֶת הָ/אֲנָשִׁ֨ים בְּנֵֽי בְלִיַּ֜עַל אֲשֶׁ֤ר בַּ/גִּבְעָה֙
    וּ/נְמִיתֵ֔/ם וּ/נְבַעֲרָ֥ה רָעָ֖ה מִ/יִּשְׂרָאֵ֑ל וְ/לֹ֤א אָבוּ֙ בִּנְיָמִ֔ן
    לִ/שְׁמֹ֕עַ בְּ/ק֖וֹל אֲחֵי/הֶ֥ם בְּנֵֽי יִשְׂרָאֵֽל־־־׃
translation:
  text: Now hand over the men, the sons of worthlessness, who are in Gibeah, so that
    we may put them to death and purge evil from Israel. But Benjamin was not willing
    to listen to the voice of their brothers, the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'worthless men'; traditionally 'sons of Belial.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'listen to the voice of,' an idiom that can also mean 'obey' or 'heed.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the Israelites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּנוּ
  chosen: hand over
  alternatives:
  - give
  - deliver up
  lexicon: HALOT
  rationale: In this judicial context, the imperative asks for surrendering the guilty
    parties to the assembly for punishment, not merely 'giving' them in a general
    sense. 'Hand over' is idiomatic and preserves the legal force.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the persons
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural and refers to the male perpetrators.
    'The men' is gender-accurate and contextually precise.
- source_word: בְּנֵי בְלִיַּעַל
  chosen: sons of worthlessness
  alternatives:
  - worthless men
  - sons of Belial
  - scoundrels
  lexicon: HALOT
  rationale: Literally 'sons of worthlessness.' This preserves the Hebrew idiom more
    transparently than flattening it to 'scoundrels.' 'Sons of Belial' is traditional
    but may misleadingly suggest a proper name here; the phrase in context denotes
    morally vile men.
- source_word: אֲשֶׁר בַּגִּבְעָה
  chosen: who are in Gibeah
  alternatives:
  - who are at Gibeah
  lexicon: HALOT
  rationale: The relative clause identifies the perpetrators by location. 'In Gibeah'
    is the most natural rendering for the town setting.
- source_word: וּנְמִיתֵם
  chosen: so that we may put them to death
  alternatives:
  - and we will kill them
  - that we may execute them
  lexicon: HALOT
  rationale: The cohortative expresses intended action following compliance with the
    command. 'Put them to death' conveys formal judicial execution better than the
    blunter 'kill them.'
- source_word: וּנְבַעֲרָה רָעָה
  chosen: and purge the evil
  alternatives:
  - and burn out the evil
  - and remove the evil
  lexicon: HALOT
  rationale: בער in this formulaic covenant-judicial expression means to remove or
    purge evil from the community. 'Purge the evil' preserves the established legal-moral
    force.
- source_word: מִיִּשְׂרָאֵל
  chosen: from Israel
  alternatives:
  - out of Israel
  lexicon: HALOT
  rationale: Standard rendering of the prepositional phrase in this legal formula.
- source_word: וְלֹא אָבוּ
  chosen: was not willing
  alternatives:
  - did not consent
  - refused
  lexicon: HALOT
  rationale: The verb expresses volition or willingness. Because the subject 'Benjamin'
    is singular in English though collective in sense, 'was not willing' reads naturally
    while preserving the idea of refusal.
- source_word: בִּנְיָמִן
  chosen: Benjamin
  lexicon: HALOT
  rationale: Tribal name transliterated according to standard convention, in keeping
    with the translation philosophy for names.
- source_word: לִשְׁמֹעַ בְּקוֹל
  chosen: to listen to the voice of
  alternatives:
  - to obey
  - to heed
  lexicon: HALOT
  rationale: The Hebrew idiom can mean 'obey' or 'heed,' but here retaining 'listen
    to the voice of' preserves the concrete wording while still making sense in English.
    It also leaves the relational nuance intact rather than reducing it only to compliance.
- source_word: אֲחֵיהֶם
  chosen: their brothers
  alternatives:
  - their kinsmen
  - their fellow Israelites
  lexicon: HALOT
  rationale: The term is literally 'their brothers.' Given the tribal/familial setting,
    this preserves the kinship language central to the narrative.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: This appositional phrase identifies the brothers more specifically. 'The
    sons of Israel' preserves the formal tribal designation and the Hebrew wording
    more closely than the smoother 'Israelites.'
