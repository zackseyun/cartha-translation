id: JDG.20.23
reference: Judges 20:23
source:
  edition: WLC
  text: וַ/יַּעֲל֣וּ בְנֵֽי יִשְׂרָאֵ֗ל וַ/יִּבְכּ֣וּ לִ/פְנֵֽי יְהוָה֮ עַד הָ/עֶרֶב֒ וַ/יִּשְׁאֲל֤וּ בַֽ/יהוָה֙ לֵ/אמֹ֔ר הַ/אוֹסִ֗יף לָ/גֶ֨שֶׁת֙ לַ/מִּלְחָמָ֔ה עִם בְּנֵ֥י בִנְיָמִ֖ן אָחִ֑/י וַ/יֹּ֥אמֶר יְהוָ֖ה עֲל֥וּ אֵלָֽי/ו־־־־׃פ
translation:
  text: Then the sons of Israel went up and wept before Yahweh until evening, and they inquired of Yahweh, saying, “Shall we continue to draw near for battle against the sons of Benjamin, my brother?” And Yahweh said, “Go up against him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Shall I again approach for battle against the sons of Benjamin, my brother?” The Hebrew can express either continuing or repeating the attack, and עִם may be understood adversatively in this battle context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲלוּ
  chosen: went up
  alternatives:
  - came up
  - ascended
  lexicon: HALOT
  rationale: עלה in narrative commonly denotes movement upward, often to a sanctuary or higher location. 'Went up' preserves the directional sense without overinterpreting the destination.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: A formally closer rendering is preferred here. 'Sons of Israel' preserves the idiom and the familial/corporate identity in the Hebrew, consistent with gender-accurate policy.
- source_word: וַיִּבְכּוּ
  chosen: wept
  alternatives:
  - cried
  lexicon: HALOT
  rationale: '''Wept'' best captures the lamentative force of בכה in this context of mourning before God.'
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי is naturally rendered 'before.' Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: עַד הָעֶרֶב
  chosen: until evening
  alternatives:
  - until the evening
  lexicon: HALOT
  rationale: Idiomatic English omits the article while preserving the temporal endpoint.
- source_word: וַיִּשְׁאֲלוּ בַיהוָה
  chosen: they inquired of the LORD
  alternatives:
  - they asked the LORD
  - they consulted the LORD
  lexicon: HALOT
  rationale: שׁאל with ב can denote seeking an oracle or inquiry from God. 'Inquired of' fits the religious-consultative sense better than the more generic 'asked.'
- source_word: הַאוֹסִיף
  chosen: Shall I continue
  alternatives:
  - Shall I again
  - Shall I add
  lexicon: HALOT
  rationale: The Hiphil of יסף here idiomatically asks whether to continue or repeat an action. 'Continue' communicates the sense clearly in modern English.
- source_word: לָגֶשֶׁת
  chosen: to go near
  alternatives:
  - to approach
  - to advance
  lexicon: HALOT
  rationale: נגשׁ literally means 'to approach/draw near.' Here it introduces engagement in battle. 'Go near' preserves the verbal imagery, though the military sense is clarified by the following phrase.
- source_word: לַמִּלְחָמָה
  chosen: for battle
  alternatives:
  - to battle
  - to the battle
  - for the war
  lexicon: HALOT
  rationale: 'This prepositional phrase expresses purpose with the approach: they are drawing near in order to fight. ''For battle'' is concise and idiomatic.'
- source_word: עִם בְּנֵי בִנְיָמִן
  chosen: with the sons of Benjamin
  alternatives:
  - against the sons of Benjamin
  - with Benjamin's sons
  lexicon: HALOT
  rationale: The preposition עִם is formally 'with,' but in battle contexts it can imply hostile engagement. The main text keeps the formal sense, while the military opposition is already signaled by 'for battle.'
- source_word: אָחִי
  chosen: my brother
  alternatives:
  - my kinsman
  lexicon: HALOT
  rationale: The singular with first-person suffix is retained as spoken, expressing Israel's recognition of Benjamin as kin. 'My brother' preserves the familial and emotional force.
- source_word: עֲלוּ אֵלָיו
  chosen: Go up against him
  alternatives:
  - Go up to him
  - Attack him
  lexicon: HALOT
  rationale: Although אֶל can mean 'to/toward him,' in this military context the sense is adversative. 'Go up against him' preserves the directional idiom while making the battle context explicit.
