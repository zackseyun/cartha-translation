theological_decisions:
- issue: Rendering of the covenant name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Gendered national designation בני ישראל
  chosen_reading: sons of Israel
  alternative_readings:
  - Israelites
  rationale: The translation philosophy prefers gender-accurate renderings where the source is grammatically masculine and representative. 'Sons of Israel' preserves the Hebrew form; the smoother alternative 'Israelites' is preserved as a lexical alternative rather than adopted in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
