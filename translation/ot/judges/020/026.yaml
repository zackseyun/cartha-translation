id: JDG.20.26
reference: Judges 20:26
source:
  edition: WLC
  text: וַ/יַּעֲל֣וּ כָל בְּנֵי֩ יִשְׂרָאֵ֨ל וְ/כָל הָ/עָ֜ם וַ/יָּבֹ֣אוּ בֵֽית אֵ֗ל וַ/יִּבְכּוּ֙ וַ/יֵּ֤שְׁבוּ שָׁם֙ לִ/פְנֵ֣י יְהוָ֔ה וַ/יָּצ֥וּמוּ בַ/יּוֹם הַ/ה֖וּא עַד הָ/עָ֑רֶב וַֽ/יַּעֲל֛וּ עֹל֥וֹת וּ/שְׁלָמִ֖ים לִ/פְנֵ֥י יְהוָֽה־־־־־׃
translation:
  text: Then all the sons of Israel and all the people went up and came to Bethel, and they wept and sat there before Yahweh and fasted that day until evening. Then they offered up burnt offerings and peace offerings before Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the Israelites and all the people.'
    reason: lexical_alternative
  - marker: b
    text: Or 'fellowship offerings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲלוּ
  chosen: went up
  alternatives:
  - came up
  - ascended
  lexicon: HALOT
  rationale: עלה commonly denotes upward movement; in narrative travel contexts 'went up' is the natural English equivalent and preserves the directional nuance without sounding wooden.
- source_word: כָל בְּנֵי יִשְׂרָאֵל וְכָל הָעָם
  chosen: all the sons of Israel and all the people
  alternatives:
  - all the Israelites and all the people
  lexicon: HALOT
  rationale: בני ישראל is rendered more formally as 'sons of Israel' to preserve the Hebrew familial-national expression, in keeping with the gender-accurate policy. 'All the people' retains the appositional/emphatic second phrase rather than collapsing it.
- source_word: בֵית אֵל
  chosen: Bethel
  alternatives:
  - Beth-el
  lexicon: HALOT
  rationale: This is the standard English transliteration of the place name rather than a literal translation such as 'house of God.'
- source_word: וַיִּבְכּוּ
  chosen: they wept
  alternatives:
  - they cried
  lexicon: HALOT
  rationale: '''Wept'' best conveys formal lament in this worship-and-defeat context; ''cried'' is possible but less specific.'
- source_word: וַיֵּשְׁבוּ שָׁם לִפְנֵי יְהוָה
  chosen: sat there before the LORD
  alternatives:
  - remained there before the LORD
  lexicon: HALOT
  rationale: ישב literally means 'sit/dwell/remain.' Here the physical and devotional posture is likely in view, so 'sat there before the LORD' preserves the concrete sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיָּצֻמוּ
  chosen: fasted
  lexicon: HALOT
  rationale: The verb צום straightforwardly denotes abstaining from food as an act of mourning or devotion; 'fasted' is the standard concise rendering.
- source_word: בַיּוֹם הַהוּא עַד הָעָרֶב
  chosen: that day until evening
  alternatives:
  - on that day until the evening
  lexicon: HALOT
  rationale: This is idiomatic modern English while preserving the temporal boundaries stated in Hebrew.
- source_word: וַיַּעֲלוּ עֹלוֹת
  chosen: they offered up burnt offerings
  alternatives:
  - they brought up burnt offerings
  lexicon: HALOT
  rationale: With sacrificial objects, עלה in the Hiphil idiomatically means to offer. 'Offered up' preserves the sacrificial nuance and echoes the Hebrew verb.
- source_word: שְׁלָמִים
  chosen: peace offerings
  alternatives:
  - fellowship offerings
  lexicon: HALOT
  rationale: '''Peace offerings'' is the traditional and still accurate rendering for שלמים. ''Fellowship offerings'' captures one aspect of the sacrifices but is more interpretive.'
