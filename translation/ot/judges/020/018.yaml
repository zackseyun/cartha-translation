theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Corporate designation בְּנֵי יִשְׂרָאֵל
  chosen_reading: The sons of Israel
  alternative_readings:
  - The Israelites
  - The children of Israel
  rationale: The translation philosophy prefers gender-accurate renderings over gender-neutral ones when the source is grammatically masculine and representative. Here the literal kinship expression is retained rather than neutralized.
