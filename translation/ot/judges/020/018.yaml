id: JDG.20.18
reference: Judges 20:18
source:
  edition: WLC
  text: וַ/יָּקֻ֜מוּ וַ/יַּעֲל֣וּ בֵֽית אֵל֮ וַ/יִּשְׁאֲל֣וּ בֵ/אלֹהִים֒ וַ/יֹּֽאמְרוּ֙ בְּנֵ֣י יִשְׂרָאֵ֔ל מִ֚י יַעֲלֶה לָּ֣/נוּ בַ/תְּחִלָּ֔ה לַ/מִּלְחָמָ֖ה עִם בְּנֵ֣י בִנְיָמִ֑ן וַ/יֹּ֥אמֶר יְהוָ֖ה יְהוּדָ֥ה בַ/תְּחִלָּֽה־־־׃
translation:
  text: Then they arose and went up to Bethel, and they inquired of God. The sons of Israel said, “Who will go up first for us to the battle against the sons of Benjamin?” And Yahweh said, “Judah first.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the LORD'; alternatively 'Yahweh.'
    reason: alternative_reading
  - marker: b
    text: Or 'The Israelites.' Hebrew 'the sons of Israel.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'with the sons of Benjamin,' that is, in battle against them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֻמוּ
  chosen: they arose
  alternatives:
  - they got up
  - they set out
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום, narrating the next action in sequence. 'Arose' preserves the formal narrative movement without sounding overly archaic in context.
- source_word: וַיַּעֲלוּ
  chosen: went up
  alternatives:
  - ascended
  - went
  lexicon: HALOT
  rationale: עלה commonly means 'go up,' often for travel to a higher place or to a sanctuary. Here it likely reflects travel to Bethel and should be preserved rather than flattened to simply 'went'.
- source_word: בֵית אֵל
  chosen: Bethel
  alternatives:
  - Beth-el
  lexicon: HALOT
  rationale: Proper place name, transliterated by standard English convention per translation philosophy.
- source_word: וַיִּשְׁאֲלוּ בֵאלֹהִים
  chosen: they inquired of God
  alternatives:
  - they asked God
  - they sought counsel from God
  lexicon: HALOT
  rationale: שׁאל with ב can denote consulting or inquiring of a deity. 'Inquired of God' captures the formal sense of seeking divine guidance better than the more generic 'asked God'.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: The sons of Israel
  alternatives:
  - The Israelites
  - The children of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Because the phrase is grammatically masculine and refers to the covenant people corporately, 'sons of Israel' preserves the source form and the project's gender-accurate principle. 'Israelites' is possible but less transparent to the Hebrew wording.
- source_word: מִי יַעֲלֶה לָּנוּ
  chosen: Who will go up first for us
  alternatives:
  - Who shall go up for us first
  - Who will lead us up first
  lexicon: HALOT
  rationale: The singular verb after 'who' asks which tribe/person is to take the lead. 'Go up first for us' preserves both the military-leading sense and the underlying עלה language.
- source_word: בַתְּחִלָּה
  chosen: first
  alternatives:
  - at the beginning
  - initially
  lexicon: HALOT
  rationale: In this military question and answer, the idiomatic sense is priority/order rather than temporal beginning in the abstract. 'First' is the most natural and precise rendering.
- source_word: לַמִּלְחָמָה
  chosen: to the battle
  alternatives:
  - for battle
  - to war
  lexicon: HALOT
  rationale: The preposition ל with מלחמה here expresses engagement in combat. 'To the battle' fits the immediate question of who will go up first into the fighting.
- source_word: עִם בְּנֵי בִנְיָמִן
  chosen: against the sons of Benjamin
  alternatives:
  - against the Benjaminites
  - with the sons of Benjamin
  lexicon: HALOT
  rationale: Although עִם often means 'with,' in warfare contexts it can denote opposition/engagement with an enemy. Given the context of civil war, 'against' is required in English. 'Sons of Benjamin' preserves the Hebrew kinship expression.
- source_word: וַיֹּאמֶר יְהוָה
  chosen: And the LORD said
  alternatives:
  - And Yahweh said
  lexicon: HALOT
  rationale: Per doctrine table, יְהוָה is rendered 'the LORD' rather than 'Yahweh' in the main text.
- source_word: יְהוּדָה בַתְּחִלָּה
  chosen: Judah first
  alternatives:
  - Judah shall go up first
  - Judah at the beginning
  lexicon: HALOT
  rationale: The Hebrew answer is terse and elliptical. 'Judah first' preserves that brevity while making the sense clear in English. A fuller expansion is possible but less formally transparent.
