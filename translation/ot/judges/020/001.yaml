theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Gendered corporate language in בְּנֵי יִשְׂרָאֵל and כְּאִישׁ אֶחָד
  chosen_reading: Preserve 'sons of Israel' and 'as one man' in the main text
  alternative_readings:
  - Israelites
  - as one person
  rationale: The translation philosophy calls for gender-accurate rather than gender-neutral renderings where the source uses masculine forms with representative force. Here the masculine wording is retained and can be clarified in footnotes rather than neutralized in the text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
