id: JDG.20.1
reference: Judges 20:1
source:
  edition: WLC
  text: וַ/יֵּצְאוּ֮ כָּל בְּנֵ֣י יִשְׂרָאֵל֒ וַ/תִּקָּהֵ֨ל הָ/עֵדָ֜ה כְּ/אִ֣ישׁ אֶחָ֗ד לְ/מִ/דָּן֙ וְ/עַד בְּאֵ֣ר שֶׁ֔בַע וְ/אֶ֖רֶץ הַ/גִּלְעָ֑ד אֶל יְהוָ֖ה הַ/מִּצְפָּֽה־־־׃
translation:
  text: Then all the sons of Israel came out, and the congregation assembled as one man, from Dan to Beer-sheba, and from the land of Gilead, to Yahweh at Mizpah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Sons of Israel'' is a literal rendering of the Hebrew expression for the people of Israel; it refers corporately to the tribes, not only to male individuals.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'as one man,' an idiom meaning in united agreement or action.
    reason: lexical_alternative
  - marker: c
    text: Or 'before the LORD at Mizpah.' The Hebrew wording can be understood as the assembly gathering in the LORD's presence at Mizpah.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּצְאוּ
  chosen: came out
  alternatives:
  - went out
  lexicon: HALOT
  rationale: The verb יצא commonly means 'go out/come out.' In narrative English, 'came out' works naturally with the following picture of the tribes gathering for assembly, without overstating directionality.
- source_word: כָּל בְּנֵי יִשְׂרָאֵל
  chosen: all the sons of Israel
  alternatives:
  - all the Israelites
  - all the children of Israel
  lexicon: HALOT
  rationale: Rendered gender-accurately per translation philosophy. The Hebrew literally says 'sons of Israel'; while it refers corporately to Israel, preserving 'sons' reflects the source wording better than flattening to 'Israelites.'
- source_word: וַתִּקָּהֵל הָעֵדָה
  chosen: the congregation assembled
  alternatives:
  - the assembly gathered
  - the community assembled
  lexicon: HALOT
  rationale: The Niphal-like narrative form of קהל with עֵדָה denotes the gathered body assembling. 'Congregation' preserves the corporate sense of עֵדָה without importing specifically cultic meaning beyond the context.
- source_word: כְּאִישׁ אֶחָד
  chosen: as one man
  alternatives:
  - like one man
  - as one person
  lexicon: HALOT
  rationale: This is a common idiom for unified action. 'As one man' preserves the Hebrew idiom and its masculine singular form; a more neutral rendering would lose the source texture.
- source_word: לְמִדָּן וְעַד בְּאֵר שֶׁבַע
  chosen: from Dan to Beer-sheba
  alternatives:
  - from Dan as far as Beer-sheba
  lexicon: HALOT
  rationale: This is a standard geographic merism for the span of Israelite territory. 'From Dan to Beer-sheba' is the natural English equivalent and preserves the idiomatic force.
- source_word: וְאֶרֶץ הַגִּלְעָד
  chosen: and from the land of Gilead
  alternatives:
  - including the land of Gilead
  - and the land of Gilead
  lexicon: HALOT
  rationale: The phrase adds the Transjordanian territory to the geographic scope. Repeating 'from' in English clarifies that Gilead is included as an additional region represented in the assembly.
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - before the LORD
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The preposition אֶל is most directly 'to'; in this assembly context it likely conveys gathering in relation to the LORD, but 'to the LORD' stays closer to the Hebrew while remaining intelligible.
- source_word: הַמִּצְפָּה
  chosen: at Mizpah
  alternatives:
  - to Mizpah
  lexicon: HALOT
  rationale: Mizpah is a place name and is transliterated. Although the Hebrew sequence is literally 'to the LORD, the Mizpah,' idiomatic English expresses the destination/meeting place as 'at Mizpah,' making clear that the assembly was before the LORD there.
