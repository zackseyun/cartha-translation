theological_decisions:
- issue: Covenantal nuance of נַחֲלַת יִשְׂרָאֵל
  chosen_reading: Israel’s inheritance
  alternative_readings:
  - the land of Israel
  - Israelite territory
  rationale: Retaining 'inheritance' preserves the covenant-land nuance of נַחֲלָה
    rather than flattening it to mere geography.
  doctrine_reference: Translation philosophy §1, §5
- issue: Moral force of זִמָּה וּנְבָלָה
  chosen_reading: lewdness and outrage
  alternative_readings:
  - wickedness and disgrace
  - depravity and vile folly
  rationale: The pair expresses severe moral condemnation, likely with sexual shame
    in view. The chosen rendering preserves both the sexual-moral aspect and the communal
    outrage without importing later technical theological categories.
  doctrine_reference: Translation philosophy §1, §6
