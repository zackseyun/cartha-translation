id: JDG.20.6
reference: Judges 20:6
source:
  edition: WLC
  text: וָֽ/אֹחֵ֤ז בְּ/פִֽילַגְשִׁ/י֙ וָֽ/אֲנַתְּחֶ֔/הָ וָֽ/אֲשַׁלְּחֶ֔/הָ בְּ/כָל
    שְׂדֵ֖ה נַחֲלַ֣ת יִשְׂרָאֵ֑ל כִּ֥י עָשׂ֛וּ זִמָּ֥ה וּ/נְבָלָ֖ה בְּ/יִשְׂרָאֵֽל־׃
translation:
  text: So I took hold of my concubine and cut her in pieces, and sent her throughout
    all the territory of Israel’s inheritance, because they committed lewdness and
    outrage in Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Then I seized my concubine and dismembered her, and sent her throughout
      every region of Israel’s inheritance.'
    reason: lexical_alternative
  - marker: b
    text: '''Israel’s inheritance'' preserves the covenantal sense of the land allotted
      to Israel, not merely geography.'
    reason: cultural_note
  - marker: c
    text: '''Lewdness'' may also be rendered ''wickedness'' or ''depravity''; ''outrage''
      may also be rendered ''disgraceful act'' or ''vile folly.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹחֵז
  chosen: So I took hold of
  alternatives:
  - Then I seized
  - So I took
  lexicon: HALOT
  rationale: The verb אחז means to grasp, seize, or take hold of. 'Took hold of' preserves
    the physical action without overstating violence beyond the context. The prefixed
    waw is rendered with narrative progression as 'So'.
- source_word: בְּפִילַגְשִׁי
  chosen: my concubine
  alternatives:
  - my secondary wife
  lexicon: HALOT
  rationale: פִּילֶגֶשׁ conventionally denotes a concubine, a socially recognized
    woman of lower status than a full wife. 'Concubine' is the standard and most precise
    English equivalent here.
- source_word: וָאֲנַתְּחֶהָ
  chosen: cut her in pieces
  alternatives:
  - dismembered her
  - divided her limb by limb
  lexicon: HALOT
  rationale: נתח refers to cutting up into pieces. 'Cut her in pieces' is direct,
    idiomatic, and faithful to the gruesome action described.
- source_word: וָאֲשַׁלְּחֶהָ
  chosen: sent her
  alternatives:
  - sent the pieces of her
  - dispatched her
  lexicon: HALOT
  rationale: The verb שלח means to send. Although the object refers to the dismembered
    body, the Hebrew keeps the feminine singular pronoun; English can preserve this
    with 'sent her,' while the prior clause makes clear what is meant.
- source_word: בְּכָל שְׂדֵה נַחֲלַת יִשְׂרָאֵל
  chosen: throughout all the territory of Israel’s inheritance
  alternatives:
  - into every region of Israel's inheritance
  - through all the field-land of Israel's inheritance
  lexicon: HALOT
  rationale: שָׂדֶה literally means 'field,' but in this distributive territorial
    expression it refers more broadly to the land/territory. נַחֲלָה is 'inheritance,'
    evoking covenant land allotment. The phrase is rendered naturally while preserving
    that covenantal nuance.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: כִּי here introduces the reason for his action, best rendered 'because'
    in contemporary English.
- source_word: עָשׂוּ
  chosen: they committed
  alternatives:
  - they did
  - they carried out
  lexicon: HALOT
  rationale: With the following abstract nouns, English idiom prefers 'committed'
    rather than the more wooden 'did'.
- source_word: זִמָּה
  chosen: lewdness
  alternatives:
  - wickedness
  - depravity
  - heinous act
  lexicon: HALOT
  rationale: זִמָּה often denotes a morally outrageous, especially sexually shameful,
    act. 'Lewdness' preserves the sexual-moral dimension in this context.
- source_word: וּנְבָלָה
  chosen: outrage
  alternatives:
  - disgraceful act
  - vile folly
  - outrageous deed
  lexicon: HALOT
  rationale: נְבָלָה denotes an outrageous, disgraceful act violating communal and
    covenantal norms. 'Outrage' is concise and forceful in modern English.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - against Israel
  - among Israel
  lexicon: HALOT
  rationale: 'The preposition ב here is locative/social: the act occurred within the
    community of Israel. ''In Israel'' preserves the Hebrew straightforwardly.'
