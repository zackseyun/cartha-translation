id: JDG.20.35
reference: Judges 20:35
source:
  edition: WLC
  text: וַ/יִּגֹּ֨ף יְהוָ֥ה אֶֽת בִּנְיָמִן֮ לִ/פְנֵ֣י יִשְׂרָאֵל֒ וַ/יַּשְׁחִיתוּ֩ בְנֵ֨י יִשְׂרָאֵ֤ל בְּ/בִנְיָמִן֙ בַּ/יּ֣וֹם הַ/ה֔וּא עֶשְׂרִ֨ים וַ/חֲמִשָּׁ֥ה אֶ֛לֶף וּ/מֵאָ֖ה אִ֑ישׁ כָּל אֵ֖לֶּה שֹׁ֥לֵף חָֽרֶב׀־־׃
translation:
  text: And Yahweh struck Benjamin down before Israel, and the sons of Israel destroyed twenty-five thousand one hundred men of Benjamin that day, all these drawing the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'defeated Benjamin before Israel.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגֹּף
  chosen: struck ... down
  alternatives:
  - defeated
  - smote
  lexicon: HALOT
  rationale: נָגַף in military context commonly denotes striking/defeating in battle. 'Struck ... down' preserves both the divine action and the lethal battle setting better than the flatter 'defeated,' while avoiding archaic 'smote.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לִפְנֵי יִשְׂרָאֵל
  chosen: before Israel
  alternatives:
  - in the presence of Israel
  - before the Israelites
  lexicon: HALOT
  rationale: The idiom means Benjamin was struck down in the face of / before Israel, i.e., in battle against them. 'Before Israel' is concise and natural while preserving the Hebrew idiom.
- source_word: וַיַּשְׁחִיתוּ
  chosen: destroyed
  alternatives:
  - killed
  - cut down
  lexicon: HALOT
  rationale: שׁחת in the Hiphil can mean destroy/ruin. In this battle report it refers to lethal destruction. 'Destroyed' preserves the severity and echoes the Hebrew more closely than the narrower 'killed.'
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: The phrase is formally 'sons of Israel.' Given the translation philosophy's gender-accurate preference, this is retained rather than generalized to 'Israelites,' especially in a military census/battle context involving male combatants.
- source_word: בְּבִנְיָמִן
  chosen: of Benjamin
  alternatives:
  - among Benjamin
  - from Benjamin
  - in Benjamin
  lexicon: HALOT
  rationale: The preposition ב here marks the object sphere from which the casualties are counted. English idiom is best served by 'of Benjamin' after the number of men.
- source_word: עֶשְׂרִים וַחֲמִשָּׁה אֶלֶף וּמֵאָה אִישׁ
  chosen: twenty-five thousand one hundred men
  alternatives:
  - twenty-five thousand and one hundred men
  lexicon: HALOT
  rationale: This is the straightforward numerical expression. 'Men' renders אִישׁ in a counting formula for combatants.
- source_word: כָּל אֵלֶּה
  chosen: all these
  alternatives:
  - all of these
  - all these men
  lexicon: HALOT
  rationale: A resumptive phrase referring back to the counted casualties. 'All these' is sufficiently clear in context without adding words not present in Hebrew.
- source_word: שֹׁלֵף חָרֶב
  chosen: drawing the sword
  alternatives:
  - wielding the sword
  - bearing arms
  lexicon: HALOT
  rationale: Literally 'drawing sword.' This idiom denotes armed fighting men. 'Drawing the sword' preserves the Hebrew image more closely than interpretive alternatives.
