theological_decisions:
- issue: Divine agency in Israel's oppression
  chosen_reading: The verse states directly that the LORD sold Israel into the hand
    of Jabin.
  alternative_readings:
  - The LORD permitted Israel to fall under Jabin's power
  rationale: The Hebrew verb assigns active agency to the LORD in covenant judgment.
    The translation should preserve that directness rather than soften it to mere
    permission.
  doctrine_reference: 'Translation philosophy §1, §3; Contested terms: יְהוָה → the
    LORD'
