id: JDG.4.2
reference: Judges 4:2
source:
  edition: WLC
  text: וַ/יִּמְכְּרֵ֣/ם יְהוָ֗ה בְּ/יַד֙ יָבִ֣ין מֶֽלֶךְ כְּנַ֔עַן אֲשֶׁ֥ר מָלַ֖ךְ
    בְּ/חָצ֑וֹר וְ/שַׂר צְבָא/וֹ֙ סִֽיסְרָ֔א וְ/ה֥וּא יוֹשֵׁ֖ב בַּ/חֲרֹ֥שֶׁת הַגּוֹיִֽם־־׃
translation:
  text: So the LORD sold them into the hand of Jabin king of Canaan, who reigned in
    Hazor; and the commander of his army was Sisera, who lived in Harosheth-haggoyim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''sold them into the hand of,'' a covenant-judgment idiom meaning
      he gave them over to Jabin''s power.'
    reason: lexical_alternative
  - marker: b
    text: Harosheth-haggoyim likely means 'Harosheth of the Nations.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּמְכְּרֵם
  chosen: sold them
  alternatives:
  - gave them over
  - delivered them
  lexicon: HALOT
  rationale: The verb מָכַר literally means 'sell.' In Judges it is a recurring covenant-judgment
    idiom for handing Israel over to oppressors. 'Sold them' preserves the metaphor
    and the severity better than the smoother 'gave them over.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  - to
  lexicon: HALOT
  rationale: This Hebrew idiom commonly denotes being delivered into someone's power.
    'Into the hand of' keeps the source imagery while remaining natural English.
- source_word: יָבִין מֶלֶךְ כְּנַעַן
  chosen: Jabin king of Canaan
  alternatives:
  - Jabin, the king of Canaan
  lexicon: HALOT
  rationale: A close rendering of the construct chain and apposition. The article
    is not explicit in Hebrew, so the tighter form is acceptable in English narrative
    style.
- source_word: אֲשֶׁר מָלַךְ בְּחָצוֹר
  chosen: who reigned in Hazor
  alternatives:
  - who ruled in Hazor
  - who was king in Hazor
  lexicon: HALOT
  rationale: מָלַךְ is specifically 'reign/be king.' 'Reigned in Hazor' is both accurate
    and idiomatic.
- source_word: וְשַׂר צְבָאוֹ
  chosen: and the commander of his army was
  alternatives:
  - and the captain of his army was
  - and his army commander was
  lexicon: HALOT
  rationale: שַׂר is a leader/official; with צָבָא it denotes the military commander.
    'Commander' is clear modern English.
- source_word: סִיסְרָא
  chosen: Sisera
  rationale: Standard English transliteration of the personal name.
- source_word: וְהוּא יוֹשֵׁב
  chosen: who lived
  alternatives:
  - and he was living
  - and he dwelt
  lexicon: HALOT
  rationale: The clause refers back most naturally to Sisera, giving his place of
    residence. 'Who lived' is a natural rendering of the participial construction
    in English.
- source_word: בַּחֲרֹשֶׁת הַגּוֹיִם
  chosen: in Harosheth-haggoyim
  alternatives:
  - in Harosheth of the Nations
  - in Harosheth of the Gentiles
  lexicon: HALOT
  rationale: This is a place name, so transliteration is preferred. The second element
    literally means 'the nations,' but preserving the established toponym avoids implying
    an interpretation of the name in the main text.
