id: JDG.4.24
reference: Judges 4:24
source:
  edition: WLC
  text: וַ/תֵּ֜לֶךְ יַ֤ד בְּנֵֽי יִשְׂרָאֵל֙ הָל֣וֹךְ וְ/קָשָׁ֔ה עַ֖ל יָבִ֣ין מֶֽלֶךְ
    כְּנָ֑עַן עַ֚ד אֲשֶׁ֣ר הִכְרִ֔יתוּ אֵ֖ת יָבִ֥ין מֶֽלֶךְ כְּנָֽעַן־־־׃פ
translation:
  text: And the hand of the sons of Israel went on, growing harder against Jabin king
    of Canaan, until they cut off Jabin king of Canaan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Israelites.” The Hebrew reads “the sons of Israel.”
    reason: lexical_alternative
  - marker: b
    text: Or “became stronger against” or “grew more severe against.” The Hebrew expression
      combines “went” with an intensifying form meaning increasing pressure.
    reason: lexical_alternative
  - marker: c
    text: “Cut off” here means they destroyed or removed him decisively.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּלֶךְ
  chosen: went on
  alternatives:
  - advanced
  - continued
  - went
  lexicon: HALOT
  rationale: With the idiomatic subject 'the hand of...' and the following infinitive
    absolute, the verb conveys continued progress or persistence rather than simple
    motion. 'Went on' preserves the Hebrew verbal imagery while reading naturally
    in English.
- source_word: יַד
  chosen: hand
  alternatives:
  - power
  - strength
  - control
  lexicon: HALOT
  rationale: Hebrew 'hand' is a common idiom for power or agency. Retaining 'hand'
    preserves the concrete Hebrew expression and allows the idiom 'the hand of Israel'
    to carry the sense of increasing power.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: Per the gender-accurate principle, the masculine plural is preserved.
    Although 'Israelites' is smoother, 'sons of Israel' more directly reflects the
    source and remains understandable here.
- source_word: הָלוֹךְ וְקָשָׁה
  chosen: growing harder
  alternatives:
  - becoming stronger
  - going on and becoming severe
  - steadily hardening
  lexicon: HALOT
  rationale: The infinitive absolute plus adjective forms an idiom of progressive
    intensification. 'Growing harder' captures the increasing pressure of Israel's
    power against Jabin without over-paraphrasing.
- source_word: עַל
  chosen: against
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: In this hostile context, 'against' best conveys adversarial force.
- source_word: הִכְרִיתוּ
  chosen: cut off
  alternatives:
  - destroyed
  - wiped out
  - eliminated
  lexicon: HALOT
  rationale: The Hiphil of כרת commonly means 'cut off,' often with the sense of destroying
    or removing. 'Cut off' is the more textually transparent rendering; the context
    implies decisive destruction.
