theological_decisions:
- issue: Divine agency in Israel's victory
  chosen_reading: God is stated as the direct subject who subdued Jabin.
  alternative_readings:
  - An impersonal rendering that foregrounds Israel's military success
  rationale: The Hebrew explicitly places אֱלֹהִים as the subject of the verb, so
    the translation should preserve divine agency rather than recasting the event
    as merely human victory.
  doctrine_reference: Translation philosophy §1, §3
- issue: Gendered covenant people expression
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The source uses the masculine plural construct בְּנֵי יִשְׂרָאֵל. Per
    the project's gender-accurate policy, the translation keeps the gendered form
    where it reflects the source's wording, rather than neutralizing it in the main
    text.
  doctrine_reference: Translation philosophy §4
