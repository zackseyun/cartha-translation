id: JDG.4.23
reference: Judges 4:23
source:
  edition: WLC
  text: וַ/יַּכְנַ֤ע אֱלֹהִים֙ בַּ/יּ֣וֹם הַ/ה֔וּא אֵ֖ת יָבִ֣ין מֶֽלֶךְ כְּנָ֑עַן
    לִ/פְנֵ֖י בְּנֵ֥י יִשְׂרָאֵֽל־׃
translation:
  text: So on that day God subdued Jabin king of Canaan before the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Israelites” or “the children of Israel.” The Hebrew reads “the sons
      of Israel.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכְנַע
  chosen: subdued
  alternatives:
  - humbled
  - brought into subjection
  - subjected
  lexicon: HALOT
  rationale: The Hiphil wayyiqtol of כנע here denotes causing an enemy to be brought
    low or into subjection. 'Subdued' is idiomatic in English for military-political
    defeat and fits the narrative context better than the more inward-sounding 'humbled.'
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here the noun clearly refers to the God of Israel acting in history,
    so the singular English 'God' is required despite the morphologically plural form.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - that day
  lexicon: HALOT
  rationale: This temporal phrase is naturally rendered 'on that day' in English.
    It preserves the narrative marker without sounding wooden.
- source_word: אֵת יָבִין
  chosen: Jabin
  lexicon: HALOT
  rationale: אֵת marks the definite direct object; the personal name is transliterated
    according to the project's policy for names.
- source_word: מֶלֶךְ כְּנָעַן
  chosen: king of Canaan
  alternatives:
  - the king of Canaan
  lexicon: HALOT
  rationale: The construct chain is straightforwardly 'king of Canaan.' The article
    is not required in English because the proper name and apposition already identify
    him.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  - before the face of
  lexicon: HALOT
  rationale: In this context לִפְנֵי expresses relation to Israel in whose sight or
    against whom Jabin was subdued. 'Before' is the most natural concise rendering
    and matches common biblical English usage.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' Following the project's gender-accurate
    policy, this preserves the source expression rather than flattening it to 'Israelites,'
    while remaining understandable in context.
