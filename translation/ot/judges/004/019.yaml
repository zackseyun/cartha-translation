id: JDG.4.19
reference: Judges 4:19
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר אֵלֶ֛י/הָ הַשְׁקִי/נִי נָ֥א מְעַט מַ֖יִם כִּ֣י צָמֵ֑אתִי וַ/תִּפְתַּ֞ח
    אֶת נֹ֧אוד הֶ/חָלָ֛ב וַ/תַּשְׁקֵ֖/הוּ וַ/תְּכַסֵּֽ/הוּ־־־׃
translation:
  text: And he said to her, “Please give me a little water to drink, for I am thirsty.”
    So she opened the skin of milk and gave him a drink and covered him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the skin-bottle of milk.” The Hebrew refers to a skin container, not
      a modern bottle.
    reason: cultural_note
lexical_decisions:
- source_word: הַשְׁקִי/נִי
  chosen: give me ... to drink
  alternatives:
  - let me drink
  - give me a drink
  lexicon: HALOT
  rationale: Hiphil imperative of שׁקה with 1cs suffix means 'cause me to drink' or
    'give me to drink.' In natural English, 'give me ... to drink' preserves both
    the request form and the causative sense better than a bare 'water me' or overly
    free paraphrase.
- source_word: נָא
  chosen: Please
  alternatives:
  - I pray you
  - please now
  lexicon: HALOT
  rationale: Polite particle softening the imperative. 'Please' is the clearest modern
    equivalent and fits the translation philosophy's preference for readable modern
    English.
- source_word: מְעַט מַיִם
  chosen: a little water
  alternatives:
  - a little bit of water
  - some water
  lexicon: HALOT
  rationale: מְעַט marks a small quantity. 'A little water' is straightforward and
    close to the Hebrew wording.
- source_word: כִּי צָמֵאתִי
  chosen: for I am thirsty
  alternatives:
  - because I am thirsty
  - for I thirst
  lexicon: HALOT
  rationale: The clause gives the reason for the request. 'For I am thirsty' is idiomatic
    and sufficiently formal without archaism.
- source_word: נֹאוד הֶחָלָב
  chosen: the skin of milk
  alternatives:
  - the skin-bottle of milk
  - the bottle of milk
  lexicon: HALOT
  rationale: נֹאוד denotes a skin container, typically a skin-bottle or wineskin.
    Rendering it as 'skin' keeps the ancient container in view without overloading
    the line. The construct with הֶחָלָב indicates it contained milk. This also preserves
    the narrative contrast with Sisera's request for water.
- source_word: וַתַּשְׁקֵהוּ
  chosen: gave him a drink
  alternatives:
  - gave him milk to drink
  - made him drink
  lexicon: HALOT
  rationale: The verb again is שׁקה in the causative. Since the immediately preceding
    clause specifies the milk container, 'gave him a drink' is natural English and
    avoids unnecessary repetition while still implying she gave him milk. 'Made him
    drink' sounds coercive, which the context does not require.
- source_word: וַתְּכַסֵּהוּ
  chosen: covered him
  alternatives:
  - wrapped him up
  - covered over him
  lexicon: HALOT
  rationale: כסה here means to cover or conceal him, likely with a rug or blanket
    in context. 'Covered him' is the most direct rendering and leaves the object implicit
    as in Hebrew.
