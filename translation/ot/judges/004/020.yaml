id: JDG.4.20
reference: Judges 4:20
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלֶ֔י/הָ עֲמֹ֖ד פֶּ֣תַח הָ/אֹ֑הֶל וְ/הָיָה֩ אִם אִ֨ישׁ יָב֜וֹא
    וּ/שְׁאֵלֵ֗/ךְ וְ/אָמַ֛ר הֲ/יֵֽשׁ פֹּ֥ה אִ֖ישׁ וְ/אָמַ֥רְתְּ אָֽיִן־־׃
translation:
  text: And he said to her, “Stand at the entrance of the tent, and if a man comes
    and asks you and says, ‘Is there a man here?’ you shall say, ‘No.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew repeats ''man'' (אִישׁ) in both the condition and the question:
      ''if a man comes ... Is there a man here?'' English could also render this more
      generically as ''someone'' or ''anyone,'' but the main text preserves the masculine
      wording of the source.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲמֹד
  chosen: Stand
  alternatives:
  - Stay standing
  - Take your stand
  lexicon: HALOT
  rationale: Qal imperative of עמד, here a direct command to take/maintain position.
    'Stand' is the most natural and sufficiently formal English rendering.
- source_word: פֶּתַח הָאֹהֶל
  chosen: the entrance of the tent
  alternatives:
  - the doorway of the tent
  - the opening of the tent
  lexicon: HALOT
  rationale: פֶּתַח denotes an opening/entrance. 'Entrance of the tent' is idiomatic
    modern English and fits the physical setting better than the more wooden 'doorway,'
    since a tent does not necessarily imply a rigid door.
- source_word: וְהָיָה אִם
  chosen: and if
  alternatives:
  - and it shall be, if
  - and when/if
  lexicon: HALOT
  rationale: This construction often introduces a conditional scenario. In English,
    'and if' communicates the sense naturally without preserving unnecessary Hebrew
    idiom.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - anyone
  lexicon: HALOT
  rationale: The Hebrew noun is grammatically and lexically 'man.' In this context
    it likely refers generically to a male searcher, and the project's gender-accurate
    policy favors retaining 'man' rather than neutralizing to 'someone' or 'anyone'.
- source_word: יָבֹוא
  chosen: comes
  alternatives:
  - enters
  - arrives
  lexicon: HALOT
  rationale: בוא commonly means 'come.' Here it refers to someone coming to the tent
    area. 'Comes' is the broadest and most natural choice.
- source_word: וּשְׁאֵלֵךְ
  chosen: asks you
  alternatives:
  - inquires of you
  - questions you
  lexicon: HALOT
  rationale: שׁאל in this context means to ask/inquire. 'Asks you' is clear, direct,
    and idiomatic.
- source_word: הֲיֵשׁ פֹּה אִישׁ
  chosen: Is there a man here?
  alternatives:
  - Is any man here?
  - Is there anyone here?
  lexicon: HALOT
  rationale: The interrogative particle with יֵשׁ asks about presence/existence. Retaining
    'man' reflects the repeated אִישׁ and preserves the wording of the search question.
    'Here' renders פֹּה naturally.
- source_word: אָיִן
  chosen: 'No'
  alternatives:
  - There is not
  - No one
  lexicon: HALOT
  rationale: The negative response is terse in Hebrew. 'No' best preserves the abrupt
    brevity of the reply in natural English.
