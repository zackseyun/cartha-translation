id: JDG.4.11
reference: Judges 4:11
source:
  edition: WLC
  text: וְ/חֶ֤בֶר הַ/קֵּינִי֙ נִפְרָ֣ד מִ/קַּ֔יִן מִ/בְּנֵ֥י חֹבָ֖ב חֹתֵ֣ן מֹשֶׁ֑ה
    וַ/יֵּ֣ט אָהֳל֔/וֹ עַד אֵל֥וֹן ב/צענים אֲשֶׁ֥ר אֶת קֶֽדֶשׁ־־׃
translation:
  text: Now Heber the Kenite had separated from the Kenites, from the sons of Hobab,
    the father-in-law of Moses, and had pitched his tent as far as the oak in Zaannannim,
    which is near Kedesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the relative by marriage of Moses'; the Hebrew term can be broader than
      'father-in-law.'
    reason: alternative_reading
  - marker: b
    text: Or 'the terebinth in Zaannannim.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִפְרָד
  chosen: had separated
  alternatives:
  - was separated
  - had broken away
  lexicon: HALOT
  rationale: The Niphal of פרד here denotes separation or breaking off from a group.
    'Had separated' fits the narrative background function and reads naturally in
    English.
- source_word: מִקַּיִן / הַקֵּינִי
  chosen: the Kenites / the Kenite
  alternatives:
  - Kain
  - Cain
  lexicon: HALOT
  rationale: Although the consonants can reflect 'Qayin/Cain,' in this context the
    gentilic clearly refers to the clan of the Kenites. Rendering both forms with
    'Kenite/Kenites' preserves the ethnic reference rather than suggesting the individual
    Cain.
- source_word: מִבְּנֵי חֹבָב
  chosen: from the sons of Hobab
  alternatives:
  - from the descendants of Hobab
  lexicon: HALOT
  rationale: בני literally means 'sons of,' and here refers to the clan line descending
    from Hobab. 'Sons of' preserves the Hebrew form while remaining understandable.
- source_word: חֹתֵן מֹשֶׁה
  chosen: the father-in-law of Moses
  alternatives:
  - the relative by marriage of Moses
  - the brother-in-law of Moses
  lexicon: HALOT
  rationale: חֹתֵן most commonly denotes a relation by marriage, often specifically
    'father-in-law.' In the Moses traditions this is the standard and most likely
    sense, though the broader affinity term is noted as an alternative.
- source_word: וַיֵּט אָהֳלוֹ
  chosen: had pitched his tent
  alternatives:
  - pitched his tent
  - stretched out his tent
  lexicon: HALOT
  rationale: The idiom נטה אהל means to pitch or spread a tent. The pluperfect 'had
    pitched' matches the backgrounded explanatory nature of the verse.
- source_word: עַד
  chosen: as far as
  alternatives:
  - up to
  - near
  lexicon: HALOT
  rationale: עַד marks extent toward a location. 'As far as' best conveys the movement
    and settlement range in idiomatic English.
- source_word: אֵלוֹן
  chosen: the oak
  alternatives:
  - the terebinth
  - the great tree
  lexicon: HALOT
  rationale: אֵלוֹן can denote a large tree, often understood as oak or terebinth.
    'Oak' is a common, clear rendering in English; the botanical alternative is preserved
    in a footnote.
- source_word: בצענים
  chosen: in Zaannannim
  alternatives:
  - at Zaanannim
  - in Bezaanannim
  lexicon: HALOT
  rationale: This is a place name. Standard transliteration 'Zaannannim' is used rather
    than attempting to translate an uncertain toponymic meaning.
- source_word: אֲשֶׁר אֶת קֶדֶשׁ
  chosen: which is near Kedesh
  alternatives:
  - which is beside Kedesh
  - which is at Kedesh
  lexicon: HALOT
  rationale: The construction indicates proximity to Kedesh. 'Near Kedesh' communicates
    the locative relationship naturally in English.
