theological_decisions:
- issue: Meaning of חֹתֵן in relation to Moses
  chosen_reading: the father-in-law of Moses
  alternative_readings:
  - the relative by marriage of Moses
  rationale: The Hebrew term can be broader than 'father-in-law,' but in the narrative
    tradition concerning Hobab and Moses, 'father-in-law' is the conventional and
    likely intended sense. Because the kinship identification has interpretive significance,
    the broader alternative is preserved in a footnote rather than resolved silently.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
