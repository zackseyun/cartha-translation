id: JDG.4.5
reference: Judges 4:5
source:
  edition: WLC
  text: וְ֠/הִיא יוֹשֶׁ֨בֶת תַּֽחַת תֹּ֜מֶר דְּבוֹרָ֗ה בֵּ֧ין הָ/רָמָ֛ה וּ/בֵ֥ין בֵּֽית
    אֵ֖ל בְּ/הַ֣ר אֶפְרָ֑יִם וַ/יַּעֲל֥וּ אֵלֶ֛י/הָ בְּנֵ֥י יִשְׂרָאֵ֖ל לַ/מִּשְׁפָּֽט־־׃
translation:
  text: She used to sit under the Palm of Deborah, between Ramah and Bethel in the
    hill country of Ephraim, and the sons of Israel went up to her for judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew reads 'the sons of Israel,' a standard covenantal
      expression for the people of Israel.
    reason: lexical_alternative
  - marker: b
    text: Or 'for justice' or 'for a legal decision.' The Hebrew term can denote judicial
      decision-making or the administration of justice.
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹשֶׁבֶת
  chosen: used to sit
  alternatives:
  - was sitting
  - dwelt
  lexicon: HALOT
  rationale: The qatal-participial description in context portrays Deborah’s customary
    judicial location rather than a single momentary action. 'Used to sit' captures
    habitual past action in natural English better than the more static 'was sitting.'
- source_word: תַּחַת
  chosen: under
  alternatives:
  - beneath
  lexicon: HALOT
  rationale: The preposition straightforwardly denotes location beneath the tree;
    'under' is the most natural modern equivalent.
- source_word: תֹּמֶר דְּבוֹרָה
  chosen: the Palm of Deborah
  alternatives:
  - Deborah's palm tree
  - the palm tree of Deborah
  lexicon: HALOT
  rationale: The construct phrase is best rendered as a place-name-like designation.
    Capitalizing 'Palm' reflects that this tree functions as a known landmark, while
    preserving the genitival relation.
- source_word: בֵּין הָרָמָה וּבֵין בֵּית אֵל
  chosen: between Ramah and Bethel
  alternatives:
  - between the Ramah and Bethel
  lexicon: HALOT
  rationale: These are established place names, so standard English transliteration
    without the article is appropriate.
- source_word: בְּהַר אֶפְרָיִם
  chosen: in the hill country of Ephraim
  alternatives:
  - in the mountains of Ephraim
  - in Mount Ephraim
  lexicon: HALOT
  rationale: The singular 'mountain/hill country' often denotes a mountainous region.
    'Hill country of Ephraim' is idiomatic English and fits the geographic sense better
    than the overly literal 'Mount Ephraim.'
- source_word: וַיַּעֲלוּ אֵלֶיהָ
  chosen: went up to her
  alternatives:
  - came up to her
  - went to her
  lexicon: HALOT
  rationale: עלה commonly means 'go up,' often with topographical nuance. Since the
    movement is toward her location in the hill country, 'went up to her' preserves
    the Hebrew imagery.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Per the project's gender-accurate philosophy, the formally masculine
    expression is preserved where it refers to the covenant people in traditional
    corporate language. 'The Israelites' is smoother but loses the source expression;
    'children of Israel' is traditional but less precise to בנים.
- source_word: לַמִּשְׁפָּט
  chosen: for judgment
  alternatives:
  - for justice
  - for a legal decision
  lexicon: HALOT
  rationale: In this judicial context, מִשְׁפָּט refers to adjudication or legal judgment.
    'For judgment' is concise and preserves the formal judicial sense without over-paraphrasing.
