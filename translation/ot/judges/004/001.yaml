id: JDG.4.1
reference: Judges 4:1
source:
  edition: WLC
  text: וַ/יֹּסִ֨פוּ֙ בְּנֵ֣י יִשְׂרָאֵ֔ל לַ/עֲשׂ֥וֹת הָ/רַ֖ע בְּ/עֵינֵ֣י יְהוָ֑ה וְ/אֵה֖וּד מֵֽת׃
translation:
  text: And the sons of Israel again did what was evil in the eyes of Yahweh after Ehud died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, “the Israelites.” Hebrew: “the sons of Israel.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּסִפוּ
  chosen: again did
  alternatives:
  - continued to do
  - added to do again
  lexicon: HALOT
  rationale: The verb יסף with an infinitive commonly conveys repetition or continuation. In this narrative formula in Judges, idiomatic English is best expressed as 'again did' rather than the overly literal 'added to do.' 'Continued to do' is possible, but 'again' better matches the cyclical pattern of relapse after deliverance.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: Formally the phrase is 'sons of Israel.' Because the translation philosophy prefers gender-accurate renderings where the source is masculine and representative, the main text preserves 'sons of Israel.' 'Israelites' is a natural English alternative but is less transparent to the Hebrew wording.
- source_word: לַעֲשׂוֹת
  chosen: did
  alternatives:
  - to do
  lexicon: HALOT
  rationale: The infinitive construct with יסף is rendered idiomatically in English as part of the verbal phrase 'again did.' This avoids awkwardness while preserving the sense of repeated action.
- source_word: הָרַע
  chosen: what was evil
  alternatives:
  - evil
  - the evil
  lexicon: HALOT
  rationale: The substantivized adjective with the article is naturally rendered 'what was evil' in this recurring Deuteronomistic formula. This is more idiomatic than 'the evil' while preserving the moral evaluation.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'in the eyes of.' The chosen rendering keeps the metaphor and remains clear in English. 'In the sight of' is also idiomatic, but the more literal form better preserves the source imagery.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְאֵהוּד מֵת
  chosen: after Ehud had died
  alternatives:
  - and Ehud died
  - while Ehud was dead
  lexicon: HALOT
  rationale: Though formally a waw plus subject and qatal verb, in context this clause gives the temporal setting for Israel's renewed evil after the judge's death. English naturally expresses this as 'after Ehud had died,' making the narrative relation explicit without adding foreign content.
