id: JDG.4.16
reference: Judges 4:16
source:
  edition: WLC
  text: וּ/בָרָ֗ק רָדַ֞ף אַחֲרֵ֤י הָ/רֶ֨כֶב֙ וְ/אַחֲרֵ֣י הַֽ/מַּחֲנֶ֔ה עַ֖ד חֲרֹ֣שֶׁת
    הַגּוֹיִ֑ם וַ/יִּפֹּ֞ל כָּל מַחֲנֵ֤ה סִֽיסְרָא֙ לְ/פִי חֶ֔רֶב לֹ֥א נִשְׁאַ֖ר עַד
    אֶחָֽד־־־׃
translation:
  text: And Barak pursued the chariots and the army as far as Harosheth of the nations,
    and all Sisera’s army fell by the edge of the sword; not even one was left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the chariot force,” taking “chariots” as a collective military term.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “Harosheth of the nations”; traditionally “Harosheth-haggoyim.”
    reason: lexical_alternative
lexical_decisions:
- source_word: רָדַף אַחֲרֵי
  chosen: pursued
  alternatives:
  - chased
  - went after
  lexicon: HALOT
  rationale: The verb plus preposition denotes active pursuit in battle. 'Pursued'
    is idiomatic and preserves the military sense without over-paraphrasing.
- source_word: הָרֶכֶב
  chosen: the chariots
  alternatives:
  - the chariot force
  - the chariotry
  lexicon: HALOT
  rationale: Although collective in sense, the Hebrew noun is commonly rendered 'chariots'
    in English and fits the immediate military context.
- source_word: הַמַּחֲנֶה
  chosen: the army
  alternatives:
  - the camp
  - the host
  lexicon: HALOT
  rationale: In this battle narrative, מַחֲנֶה refers not merely to a campsite but
    to the military force. 'Army' communicates the intended referent clearly in modern
    English.
- source_word: עַד חֲרֹשֶׁת הַגּוֹיִם
  chosen: as far as Harosheth of the nations
  alternatives:
  - to Harosheth-haggoyim
  - as far as Harosheth of the Gentiles
  lexicon: HALOT
  rationale: The phrase marks the extent of pursuit. The place name is transliterated,
    while retaining the appositional/genitival element 'of the nations' rather than
    collapsing it into a conventionalized form. 'Gentiles' is possible but 'nations'
    is the more basic sense of גּוֹיִם here.
- source_word: וַיִּפֹּל כָּל מַחֲנֵה סִיסְרָא
  chosen: all Sisera’s army fell
  alternatives:
  - all the camp of Sisera fell
  - all Sisera’s force fell
  lexicon: HALOT
  rationale: The singular verb with collective subject describes the defeat of the
    whole force. 'Fell' preserves the Hebrew idiom for being struck down in battle.
- source_word: לְפִי חֶרֶב
  chosen: by the edge of the sword
  alternatives:
  - by the sword
  - to the mouth of the sword
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for death in battle. 'By the edge of
    the sword' is the established English equivalent that preserves the imagery better
    than the flatter 'by the sword.'
- source_word: לֹא נִשְׁאַר עַד אֶחָד
  chosen: not even one was left
  alternatives:
  - there was not left even one
  - none remained, up to one
  lexicon: HALOT
  rationale: The passive construction states total annihilation of the force. 'Not
    even one was left' is natural English and preserves the emphatic totality of עַד
    אֶחָד.
