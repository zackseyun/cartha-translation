theological_decisions:
- issue: Rendering Deborah's role and gender marking
  chosen_reading: Deborah is presented explicitly as a female prophet and as one judging
    Israel, without minimizing either description.
  alternative_readings:
  - Smoothing to 'Deborah the prophet judged Israel'
  - Rendering נְבִיאָה as generic 'prophet'
  rationale: The verse itself foregrounds Deborah's sex and offices through appositional
    nouns. Following the translation philosophy's gender-accurate principle, the translation
    preserves these features rather than neutralizing them. No doctrinal tension requires
    harmonization beyond the plain sense.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
