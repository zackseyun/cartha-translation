id: JDG.4.4
reference: Judges 4:4
source:
  edition: WLC
  text: וּ/דְבוֹרָה֙ אִשָּׁ֣ה נְבִיאָ֔ה אֵ֖שֶׁת לַפִּיד֑וֹת הִ֛יא שֹׁפְטָ֥ה אֶת יִשְׂרָאֵ֖ל
    בָּ/עֵ֥ת הַ/הִֽיא־׃
translation:
  text: Now Deborah, a woman, a prophetess, the wife of Lappidoth, was judging Israel
    at that time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'a woman of torches,' if לַפִּידוֹת is taken descriptively
      rather than as the personal name Lappidoth; however, the most natural reading
      is 'the wife of Lappidoth.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/דְבוֹרָה
  chosen: Now Deborah
  alternatives:
  - And Deborah
  lexicon: HALOT
  rationale: The conjunction ו can be rendered simply as 'and,' but in narrative English
    'now' often better signals the introduction or refocusing on a character without
    overstating coordination. 'Deborah' is a standard transliteration of the personal
    name.
- source_word: אִשָּׁה
  chosen: a woman
  alternatives:
  - woman
  lexicon: HALOT
  rationale: The noun explicitly identifies Deborah as female. Retaining 'a woman'
    preserves the appositional structure of the Hebrew and the gender-accurate emphasis
    of the source rather than smoothing it away.
- source_word: נְבִיאָה
  chosen: a prophetess
  alternatives:
  - a female prophet
  - a prophet
  lexicon: HALOT
  rationale: The feminine noun specifically denotes a female prophet. 'Prophetess'
    is concise, accurate, and preserves the marked feminine form present in Hebrew.
    'Female prophet' is possible but less idiomatic; 'prophet' would lose the explicit
    gender marking.
- source_word: אֵשֶׁת לַפִּידוֹת
  chosen: the wife of Lappidoth
  alternatives:
  - wife of Lappidoth
  - woman of torches
  lexicon: HALOT
  rationale: The construct אֵשֶׁת most naturally means 'wife of' when followed by
    a personal name, and the morphology identifies לַפִּידוֹת as a proper noun here.
    Some have proposed a descriptive sense related to 'torches,' but the plain sense
    in context is marital identification by husband's name.
- source_word: הִיא
  chosen: was
  alternatives:
  - she was
  lexicon: HALOT
  rationale: 'The independent pronoun adds emphasis in Hebrew, but English does not
    require an explicit ''she'' here because Deborah is already the subject. The verbal
    clause is naturally rendered with English past progressive/copular force: ''was
    judging.'''
- source_word: שֹׁפְטָה
  chosen: was judging
  alternatives:
  - judged
  - was serving as judge over
  lexicon: HALOT
  rationale: The participial form conveys ongoing or characteristic action in past
    narrative context. 'Was judging' preserves that durative sense better than the
    simple past 'judged.' 'Serving as judge over' is interpretive expansion beyond
    the Hebrew wording.
- source_word: אֶת יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - the people of Israel
  lexicon: HALOT
  rationale: The direct-object marker plus the proper name is straightforwardly 'Israel.'
    Expanding to 'the people of Israel' is possible contextually but adds words not
    present in the text.
- source_word: בָּעֵת הַהִיא
  chosen: at that time
  alternatives:
  - in those days
  - at that time then
  lexicon: HALOT
  rationale: The phrase literally means 'at that time.' 'In those days' is a common
    idiomatic rendering elsewhere, but here 'at that time' is the more direct equivalent.
