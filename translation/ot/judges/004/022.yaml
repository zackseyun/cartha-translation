id: JDG.4.22
reference: Judges 4:22
source:
  edition: WLC
  text: וְ/הִנֵּ֣ה בָרָק֮ רֹדֵ֣ף אֶת סִֽיסְרָא֒ וַ/תֵּצֵ֤א יָעֵל֙ לִ/קְרָאת֔/וֹ וַ/תֹּ֣אמֶר
    ל֔/וֹ לֵ֣ךְ וְ/אַרְאֶ֔/ךָּ אֶת הָ/אִ֖ישׁ אֲשֶׁר אַתָּ֣ה מְבַקֵּ֑שׁ וַ/יָּבֹ֣א
    אֵלֶ֔י/הָ וְ/הִנֵּ֤ה סִֽיסְרָא֙ נֹפֵ֣ל מֵ֔ת וְ/הַ/יָּתֵ֖ד בְּ/רַקָּתֽ/וֹ־־־׃
translation:
  text: And look, Barak was pursuing Sisera. Jael went out to meet him and said to
    him, “Come, and I will show you the man whom you are seeking.” So he went in to
    her, and look, Sisera was lying there dead, with the tent peg in his temple.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''fallen, dead''; the translation renders the idiom as ''was lying
      there dead'' for natural English while preserving the scene''s result.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And look
  alternatives:
  - And behold
  - Now look
  lexicon: HALOT
  rationale: Discourse marker drawing attention to a new scene. 'Look' preserves the
    vividness more naturally than archaic 'behold'; retaining it in both occurrences
    reflects the Hebrew repetition.
- source_word: רֹדֵף
  chosen: was pursuing
  alternatives:
  - pursued
  - was chasing
  lexicon: HALOT
  rationale: Participle conveys ongoing action; 'was pursuing' captures the progressive
    sense better than simple past.
- source_word: לִקְרָאתוֹ
  chosen: to meet him
  alternatives:
  - to encounter him
  lexicon: HALOT
  rationale: Standard idiom for going out to meet someone; 'to meet him' is the natural
    English equivalent.
- source_word: לֵךְ
  chosen: Come
  alternatives:
  - Go
  lexicon: HALOT
  rationale: Though formally 'go,' in direct invitation English idiom prefers 'come'
    when inviting someone to accompany the speaker. This is an optimal-equivalence
    adjustment for natural speech.
- source_word: וְאַרְאֶךָּ
  chosen: and I will show you
  alternatives:
  - that I may show you
  - let me show you
  lexicon: HALOT
  rationale: Cohortative-like invitation after the imperative is well represented
    by straightforward future in English.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the person
  lexicon: HALOT
  rationale: Masculine singular noun referring specifically to Sisera; gender-accurate
    rendering is required by context.
- source_word: מְבַקֵּשׁ
  chosen: are seeking
  alternatives:
  - are looking for
  lexicon: HALOT
  rationale: Both are possible; 'seeking' is slightly more formal and fits the narrative
    tone while remaining clear.
- source_word: וַיָּבֹא אֵלֶיהָ
  chosen: So he went in to her
  alternatives:
  - Then he came to her
  - So he entered to her
  lexicon: HALOT
  rationale: The verb plus preposition here indicates entering her space/tent in context.
    'Went in to her' is idiomatic narrative English and avoids flattening the movement.
- source_word: נֹפֵל מֵת
  chosen: was lying there dead
  alternatives:
  - had fallen dead
  - was fallen, dead
  lexicon: HALOT
  rationale: Literally 'fallen, dead.' In English, with Sisera already slain in the
    prior context, 'was lying there dead' communicates the resultant state naturally
    while preserving the visual scene.
- source_word: הַיָּתֵד
  chosen: the tent peg
  alternatives:
  - the peg
  lexicon: HALOT
  rationale: In context from the preceding narrative this is a tent peg; making the
    object explicit aids clarity in English without distorting the referent.
- source_word: בְּרַקָּתוֹ
  chosen: in his temple
  alternatives:
  - in his head
  - through his temple
  lexicon: HALOT
  rationale: רַקָּה refers to the temple/side of the head. 'In his temple' is the
    most precise lexical rendering. 'Through' would add directional force not explicit
    in this clause.
