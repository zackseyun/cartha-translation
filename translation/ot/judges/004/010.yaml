id: JDG.4.10
reference: Judges 4:10
source:
  edition: WLC
  text: וַ/יַּזְעֵ֨ק בָּרָ֜ק אֶת זְבוּלֻ֤ן וְ/אֶת נַפְתָּלִי֙ קֶ֔דְשָׁ/ה וַ/יַּ֣עַל
    בְּ/רַגְלָ֔י/ו עֲשֶׂ֥רֶת אַלְפֵ֖י אִ֑ישׁ וַ/תַּ֥עַל עִמּ֖/וֹ דְּבוֹרָֽה־־׃
translation:
  text: Then Barak summoned Zebulun and Naphtali to Kedesh, and ten thousand men went
    up at his feet, and Deborah went up with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'ten thousand men went up at his feet,' an idiom meaning they
      followed him or went under his lead.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּזְעֵק
  chosen: summoned
  alternatives:
  - called
  - mustered
  lexicon: HALOT
  rationale: The verb זעק in the Hiphil can mean to call together or summon. In this
    military context, 'summoned' captures the act of calling the tribes to assemble
    without overinterpreting it as a formal conscription, though 'mustered' is possible.
- source_word: אֶת זְבוּלֻן וְאֶת נַפְתָּלִי
  chosen: Zebulun and Naphtali
  lexicon: HALOT
  rationale: These are the tribal names functioning as the objects of Barak's summons.
    Transliteration of personal/tribal names follows the stated philosophy.
- source_word: קֶדְשָׁה
  chosen: to Kedesh
  alternatives:
  - at Kedesh
  - toward Kedesh
  lexicon: HALOT
  rationale: The directional he on the place name indicates motion toward the location.
    'To Kedesh' is the most natural English rendering.
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - marched up
  - ascended
  lexicon: HALOT
  rationale: עלה is commonly rendered 'go up.' Because the text likely reflects movement
    to a higher location and/or conventional military movement, 'went up' preserves
    the source wording without unnecessary paraphrase.
- source_word: בְּרַגְלָיו
  chosen: at his feet
  alternatives:
  - following him
  - under his command
  lexicon: HALOT
  rationale: Literally 'at his feet.' In context it denotes troops accompanying or
    following Barak. The main text preserves the idiom more formally as 'at his feet';
    a footnote preserves the more idiomatic sense.
- source_word: עֲשֶׂרֶת אַלְפֵי אִישׁ
  chosen: ten thousand men
  alternatives:
  - ten thousand troops
  lexicon: HALOT
  rationale: The Hebrew is literally 'ten thousands of man/men,' a standard expression
    for a military force of ten thousand. 'Men' is gender-accurate and contextually
    appropriate for fighting troops.
- source_word: וַתַּעַל עִמּוֹ דְּבוֹרָה
  chosen: and Deborah went up with him
  alternatives:
  - and Deborah accompanied him
  lexicon: HALOT
  rationale: The clause straightforwardly states Deborah's accompanying ascent. 'Went
    up with him' preserves the repeated עלה and keeps the narrative rhythm.
