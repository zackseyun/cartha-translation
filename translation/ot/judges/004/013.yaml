id: JDG.4.13
reference: Judges 4:13
source:
  edition: WLC
  text: וַ/יַּזְעֵ֨ק סִֽיסְרָ֜א אֶת כָּל רִכְבּ֗/וֹ תְּשַׁ֤ע מֵאוֹת֙ רֶ֣כֶב בַּרְזֶ֔ל
    וְ/אֶת כָּל הָ/עָ֖ם אֲשֶׁ֣ר אִתּ֑/וֹ מֵ/חֲרֹ֥שֶׁת הַגּוֹיִ֖ם אֶל נַ֥חַל קִישֽׁוֹן־־־־־׃
translation:
  text: Then Sisera summoned all his chariots, nine hundred iron chariots, and all
    the people who were with him, from Harosheth-haggoyim to the Wadi Kishon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Kishon River' or 'the torrent Kishon'; Hebrew naḥal can denote a
      wadi, streambed, or seasonal torrent valley.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּזְעֵק
  chosen: summoned
  alternatives:
  - called together
  - mustered
  lexicon: HALOT
  rationale: The verb זעק commonly means 'cry out,' but in this military context with
    direct object markers before forces, it denotes calling up or assembling troops/chariots.
    'Summoned' preserves the causative sense without over-paraphrasing.
- source_word: רִכְבּוֹ
  chosen: his chariots
  alternatives:
  - his chariot force
  - his cavalry
  lexicon: HALOT
  rationale: Although רכב can denote chariotry collectively, the following apposition
    'nine hundred iron chariots' makes the concrete rendering 'his chariots' natural
    and clear in English.
- source_word: תְּשַׁע מֵאוֹת רֶכֶב בַּרְזֶל
  chosen: nine hundred iron chariots
  alternatives:
  - nine hundred chariots of iron
  lexicon: HALOT
  rationale: This is the straightforward numerical phrase. 'Iron chariots' is idiomatic
    modern English while preserving the likely sense of chariots fitted with iron
    components or weaponry.
- source_word: כָּל הָעָם אֲשֶׁר אִתּוֹ
  chosen: all the people who were with him
  alternatives:
  - all the troops who were with him
  - all the army with him
  lexicon: HALOT
  rationale: עָם literally means 'people.' In military context it refers to the fighting
    force accompanying Sisera, but 'people' stays closer to the Hebrew while remaining
    intelligible. The military sense is supplied by context.
- source_word: מֵחֲרֹשֶׁת הַגּוֹיִם
  chosen: from Harosheth-haggoyim
  alternatives:
  - from Harosheth of the Nations
  lexicon: HALOT
  rationale: This is a place name, so transliteration follows the translation philosophy
    for personal and place names. The prefixed מִן is rendered 'from.'
- source_word: נַחַל קִישׁוֹן
  chosen: the Wadi Kishon
  alternatives:
  - the Kishon River
  - the torrent of Kishon
  - the Kishon Valley
  lexicon: HALOT
  rationale: נחל denotes a wadi, streambed, or torrent valley rather than a large
    perennial river. 'Wadi Kishon' best preserves the Hebrew geographical term in
    readable English; alternatives are worth preserving because many English versions
    use 'River Kishon.'
