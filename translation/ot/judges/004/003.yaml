id: JDG.4.3
reference: Judges 4:3
source:
  edition: WLC
  text: וַ/יִּצְעֲק֥וּ בְנֵֽי יִשְׂרָאֵ֖ל אֶל יְהוָ֑ה כִּ֠י תְּשַׁ֨ע מֵא֤וֹת רֶֽכֶב
    בַּרְזֶל֙ ל֔/וֹ וְ֠/הוּא לָחַ֞ץ אֶת בְּנֵ֧י יִשְׂרָאֵ֛ל בְּ/חָזְקָ֖ה עֶשְׂרִ֥ים
    שָׁנָֽה־־־־׃ס
translation:
  text: Then the sons of Israel cried out to the LORD, because he had nine hundred
    iron chariots, and he oppressed the sons of Israel harshly for twenty years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' / 'the people of Israel.' Literally, 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'chariots of iron.'
    reason: lexical_alternative
  - marker: c
    text: Or 'he oppressed the sons of Israel with force' or 'severely.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצְעֲקוּ
  chosen: cried out
  alternatives:
  - called out
  - cried for help
  lexicon: HALOT
  rationale: צעק in this narrative context commonly denotes an urgent cry for help
    directed to God under oppression. 'Cried out' preserves both the emotional force
    and the conventional covenantal pattern in Judges.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' In keeping with gender-accurate policy, the
    formal familial expression is retained here rather than flattening to the ethnic
    label alone. It refers corporately to Israel.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' following established reverential convention and the Septuagintal pattern.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Introduces the reason for Israel's cry. 'Because' is clear modern English
    and fits the causal sense.
- source_word: תְּשַׁע מֵאוֹת
  chosen: nine hundred
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: רֶכֶב בַּרְזֶל
  chosen: iron chariots
  alternatives:
  - chariots of iron
  lexicon: HALOT
  rationale: The construct phrase denotes chariots characterized by iron. 'Iron chariots'
    is idiomatic modern English while preserving the military force of the expression.
- source_word: לוֹ
  chosen: he had
  alternatives:
  - belonged to him
  - were his
  lexicon: HALOT
  rationale: The preposition with pronominal suffix expresses possession in context.
    English requires an explicit possessive construction; 'he had' is the most natural.
- source_word: וְהוּא
  chosen: and he
  alternatives:
  - and he himself
  lexicon: HALOT
  rationale: Simple subject pronoun resuming Sisera. No special emphasis needs to
    be brought out beyond normal English subject expression.
- source_word: לָחַץ
  chosen: oppressed
  alternatives:
  - pressed
  - crushed
  lexicon: HALOT
  rationale: לחץ in contexts of domination and suffering is well rendered 'oppressed.'
    It captures sustained harsh subjugation better than the more literal but less
    idiomatic 'pressed.'
- source_word: בְּחָזְקָה
  chosen: harshly
  alternatives:
  - mightily
  - with force
  - severely
  lexicon: HALOT
  rationale: The phrase indicates forceful severity. 'Harshly' communicates the manner
    of oppression in natural English; 'with force' is more literal but less smooth.
- source_word: עֶשְׂרִים שָׁנָה
  chosen: for twenty years
  lexicon: HALOT
  rationale: Standard duration expression.
