id: JDG.4.18
reference: Judges 4:18
source:
  edition: WLC
  text: וַ/תֵּצֵ֣א יָעֵל֮ לִ/קְרַ֣את סִֽיסְרָא֒ וַ/תֹּ֣אמֶר אֵלָ֗י/ו סוּרָ֧/ה אֲדֹנִ֛/י
    סוּרָ֥/ה אֵלַ֖/י אַל תִּירָ֑א וַ/יָּ֤סַר אֵלֶ֨י/הָ֙ הָ/אֹ֔הֱלָ/ה וַ/תְּכַסֵּ֖/הוּ
    בַּ/שְּׂמִיכָֽה־׃
translation:
  text: Jael went out to meet Sisera and said to him, “Turn aside, my lord, turn aside
    to me; do not be afraid.” So he turned aside to her into the tent, and she covered
    him with a blanket.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Come in, my lord, come in to me.” The Hebrew verb literally means “turn
      aside,” preserving the image of leaving one’s path to enter shelter.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term may also refer to a rug or other covering cloth.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּצֵא
  chosen: went out
  alternatives:
  - came out
  lexicon: HALOT
  rationale: From יצא, the basic motion is outward movement. 'Went out' is a natural
    English rendering that preserves the directional sense from her tent toward Sisera.
- source_word: לִקְרַאת
  chosen: to meet
  alternatives:
  - to encounter
  - to go out to
  lexicon: HALOT
  rationale: The infinitive construct of קרא/לקראת here expresses purposeful movement
    toward someone. 'To meet' is idiomatic and fits the narrative context.
- source_word: סוּרָה
  chosen: Turn aside
  alternatives:
  - Come in
  - Stop here
  lexicon: HALOT
  rationale: סור commonly means 'turn aside' or 'deviate from the way.' Here Jael
    invites Sisera to leave his course and enter her space. 'Turn aside' preserves
    the verbal repetition and the Hebrew imagery better than the more interpretive
    'come in.'
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - sir
  - my master
  lexicon: HALOT
  rationale: As a polite address to a socially superior male, 'my lord' best reflects
    the deferential tone without overinterpreting ownership implied by 'master.' Lowercase
    avoids confusion with a divine title.
- source_word: אַל תִּירָא
  chosen: do not be afraid
  alternatives:
  - do not fear
  lexicon: HALOT
  rationale: A standard reassurance formula from ירא. 'Do not be afraid' is clear
    modern English while preserving the force of the prohibition.
- source_word: וַיָּסַר
  chosen: turned aside
  alternatives:
  - went in
  - came aside
  lexicon: HALOT
  rationale: Using 'turned aside' maintains lexical consistency with Jael's repeated
    imperative סוּרָה and shows Sisera responding to her invitation.
- source_word: הָאֹהֱלָה
  chosen: into the tent
  alternatives:
  - to the tent
  lexicon: HALOT
  rationale: The directional ending on אֹהֱלָה indicates motion toward/into the tent.
    In context, entry is implied, so 'into the tent' is the clearest English rendering.
- source_word: וַתְּכַסֵּהוּ
  chosen: she covered him
  alternatives:
  - she concealed him
  - she wrapped him
  lexicon: HALOT
  rationale: כסה means 'cover.' 'Covered him' is the direct and least interpretive
    rendering; concealment is an implication but not the lexical core.
- source_word: בַּשְּׂמִיכָה
  chosen: with a blanket
  alternatives:
  - with a rug
  - with a covering
  lexicon: HALOT
  rationale: שׂמיכה denotes a covering cloth, likely a blanket or rug. 'Blanket' is
    the most accessible modern term and fits the immediate action of covering a fugitive
    in a tent.
