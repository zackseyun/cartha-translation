id: JDG.4.9
reference: Judges 4:9
source:
  edition: WLC
  text: וַ/תֹּ֜אמֶר הָלֹ֧ךְ אֵלֵ֣ךְ עִמָּ֗/ךְ אֶ֚פֶס כִּי֩ לֹ֨א תִֽהְיֶ֜ה תִּֽפְאַרְתְּ/ךָ֗
    עַל הַ/דֶּ֨רֶךְ֙ אֲשֶׁ֣ר אַתָּ֣ה הוֹלֵ֔ךְ כִּ֣י בְֽ/יַד אִשָּׁ֔ה יִמְכֹּ֥ר יְהוָ֖ה
    אֶת סִֽיסְרָ֑א וַ/תָּ֧קָם דְּבוֹרָ֛ה וַ/תֵּ֥לֶך עִם בָּרָ֖ק קֶֽדְשָׁ/ה־־־־׃
translation:
  text: And she said, “I will surely go with you. Nevertheless, the honor will not
    be yours on the way that you are going, for the LORD will sell Sisera into the
    hand of a woman.” Then Deborah arose and went with Barak to Kedesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “the LORD will hand Sisera over to a woman.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הָלֹךְ אֵלֵךְ
  chosen: I will surely go
  alternatives:
  - I will indeed go
  - going I will go
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the verb. 'I will
    surely go' preserves the emphatic force in natural English better than a wooden
    repetition.
- source_word: עִמָּךְ
  chosen: with you
  lexicon: HALOT
  rationale: Straightforward accompaniment preposition with 2ms suffix; rendered idiomatically
    in English.
- source_word: אֶפֶס
  chosen: Nevertheless
  alternatives:
  - However
  - Except that
  lexicon: HALOT
  rationale: Here the particle introduces a limiting qualification to Deborah's agreement.
    'Nevertheless' captures the adversative nuance in smooth modern English.
- source_word: תִּפְאַרְתְּךָ
  chosen: the honor will not be yours
  alternatives:
  - your glory will not be
  - there will be no glory for you
  lexicon: HALOT
  rationale: תִּפְאֶרֶת can denote glory, honor, or splendor. In this military context
    the point is renown/credit for victory, so 'honor' communicates the sense clearly
    without sounding overly elevated. The possessive idea is expressed naturally as
    'will not be yours'.
- source_word: עַל הַדֶּרֶךְ אֲשֶׁר אַתָּה הוֹלֵךְ
  chosen: on the way that you are going
  alternatives:
  - in the course you are taking
  - on the journey you are undertaking
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the metaphor/path language and avoids
    over-interpreting it as merely strategic course or physical journey.
- source_word: בְיַד אִשָּׁה
  chosen: into the hand of a woman
  alternatives:
  - by the hand of a woman
  - to a woman
  lexicon: HALOT
  rationale: The idiom 'into the hand of' is common in Hebrew for being given over
    to someone's power. Retaining 'hand' preserves the Hebrew imagery while remaining
    intelligible.
- source_word: יִמְכֹּר
  chosen: will sell
  alternatives:
  - will give over
  - will hand over
  lexicon: HALOT
  rationale: The verb's plain sense is 'sell.' Although idiomatically it means to
    hand an enemy over, 'sell' is the lexical value and is understandable in this
    military-deliverance context. A footnote preserves the more idiomatic alternative.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD' rather than a transliteration.
- source_word: וַתָּקָם
  chosen: arose
  alternatives:
  - got up
  - set out
  lexicon: HALOT
  rationale: '''Arose'' preserves the narrative sequence and formal tone without unnecessary
    paraphrase.'
- source_word: קֶדְשָׁה
  chosen: Kedesh
  lexicon: HALOT
  rationale: Place name is transliterated according to the translation philosophy
    of translating titles but transliterating names.
