id: JDG.4.17
reference: Judges 4:17
source:
  edition: WLC
  text: וְ/סִֽיסְרָא֙ נָ֣ס בְּ/רַגְלָ֔י/ו אֶל אֹ֣הֶל יָעֵ֔ל אֵ֖שֶּׁת חֶ֣בֶר הַ/קֵּינִ֑י
    כִּ֣י שָׁל֗וֹם בֵּ֚ין יָבִ֣ין מֶֽלֶךְ חָצ֔וֹר וּ/בֵ֕ין בֵּ֖ית חֶ֥בֶר הַ/קֵּינִֽי־־׃
translation:
  text: But Sisera fled on foot to the tent of Jael, the wife of Heber the Kenite,
    because there was peace between Jabin king of Hazor and the house of Heber the
    Kenite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And Sisera fled on foot.' The Hebrew conjunction can be rendered simply
      'and'; 'but' reflects the narrative contrast in context.
    reason: alternative_reading
  - marker: b
    text: '''The house of Heber'' means Heber''s household or clan.'
    reason: cultural_note
lexical_decisions:
- source_word: וְ/סִֽיסְרָא֙
  chosen: But Sisera
  alternatives:
  - And Sisera
  lexicon: HALOT
  rationale: The conjunction ו can be rendered simply as 'and,' but in narrative context
    here it marks a contrast with the preceding defeat and chariot abandonment, so
    'But Sisera' communicates the discourse turn naturally in English without adding
    content beyond the narrative flow.
- source_word: נָ֣ס
  chosen: fled
  alternatives:
  - escaped
  - ran away
  lexicon: HALOT
  rationale: The verb נס in the qal commonly means 'flee.' 'Fled' is the most direct
    and idiomatic narrative rendering.
- source_word: בְּ/רַגְלָ֔י/ו
  chosen: on foot
  alternatives:
  - with his feet
  - by foot
  lexicon: HALOT
  rationale: Literally 'by his feet.' In English narrative, 'on foot' is the standard
    idiom and accurately conveys that he fled without a vehicle.
- source_word: אֶל אֹ֣הֶל יָעֵ֔ל
  chosen: to the tent of Jael
  alternatives:
  - to Jael's tent
  lexicon: HALOT
  rationale: The construct phrase is most transparently rendered 'to the tent of Jael.'
    This preserves the Hebrew structure while remaining natural English.
- source_word: אֵ֖שֶּׁת חֶ֣בֶר הַ/קֵּינִ֑י
  chosen: the wife of Heber the Kenite
  alternatives:
  - Heber the Kenite's wife
  lexicon: HALOT
  rationale: This appositional identification clarifies who Jael is. 'The wife of
    Heber the Kenite' is slightly more formal and mirrors the Hebrew apposition.
- source_word: כִּ֣י
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the reason Sisera fled there. 'Because' is clearer
    in modern English than the more formal 'for.'
- source_word: שָׁל֗וֹם
  chosen: peace
  alternatives:
  - friendly relations
  - alliance
  lexicon: HALOT
  rationale: שָׁלוֹם here denotes peaceful relations between parties. 'Peace' is the
    primary gloss and preserves the Hebrew term's breadth without over-specifying
    a formal treaty.
- source_word: בֵּ֚ין יָבִ֣ין מֶֽלֶךְ חָצ֔וֹר וּ/בֵ֕ין
  chosen: between Jabin king of Hazor and
  alternatives:
  - between Jabin, the king of Hazor, and
  lexicon: HALOT
  rationale: This straightforwardly renders the relational phrase. The appositional
    title is kept compact in English narrative style.
- source_word: בֵּ֖ית חֶ֥בֶר הַ/קֵּינִֽי
  chosen: the house of Heber the Kenite
  alternatives:
  - Heber the Kenite's household
  - the family of Heber the Kenite
  lexicon: HALOT
  rationale: '''House'' is the formal equivalent of בֵּית and can denote household
    or clan. Retaining ''house'' preserves the Hebrew social-unit concept while remaining
    understandable in context.'
