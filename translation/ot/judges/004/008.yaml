id: JDG.4.8
reference: Judges 4:8
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֵלֶ֨י/הָ֙ בָּרָ֔ק אִם תֵּלְכִ֥י עִמִּ֖/י וְ/הָלָ֑כְתִּי וְ/אִם
    לֹ֥א תֵלְכִ֛י עִמִּ֖/י לֹ֥א אֵלֵֽךְ־־׃
translation:
  text: Barak said to her, “If you will go with me, I will go; but if you will not
    go with me, I will not go.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “If you go with me, then I will go; but if you do not
      go with me, I will not go.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - said to
  - told
  lexicon: HALOT
  rationale: Standard wayyiqtol of אמר introducing direct speech; simple past 'said'
    is the natural English narrative equivalent.
- source_word: אֵלֶיהָ
  chosen: to her
  alternatives:
  - unto her
  lexicon: HALOT
  rationale: Preposition אֶל with 3fs suffix clearly marks the indirect object, referring
    to Deborah in context. Modern English prefers 'to her.'
- source_word: בָּרָק
  chosen: Barak
  rationale: 'Personal name is transliterated according to the translation philosophy:
    translate titles, transliterate names.'
- source_word: אִם
  chosen: if
  alternatives:
  - provided that
  lexicon: HALOT
  rationale: Introduces the protasis of a conditional clause. 'If' is the direct and
    idiomatic rendering.
- source_word: תֵּלְכִי
  chosen: you will go
  alternatives:
  - you go
  - you would go
  lexicon: HALOT
  rationale: Qal imperfect 2fs of הלך addressed to Deborah. In this conditional context,
    English future 'you will go' best captures the sense and reads naturally.
- source_word: עִמִּי
  chosen: with me
  lexicon: HALOT
  rationale: 'Preposition עם with 1cs suffix straightforwardly means accompaniment:
    ''with me.'''
- source_word: וְהָלָכְתִּי
  chosen: I will go
  alternatives:
  - then I will go
  - I would go
  lexicon: HALOT
  rationale: Qal perfect 1cs following a conditional protasis functions as the result/apodosis.
    English future 'I will go' is the idiomatic equivalent. The conjunction is represented
    by clause flow rather than a separate 'then' in the first half.
- source_word: וְאִם לֹא
  chosen: but if not
  alternatives:
  - and if not
  - but if you will not
  lexicon: HALOT
  rationale: The conjunction plus repeated conditional introduces the contrasting
    second condition. 'But if' brings out the adversative contrast in natural English
    while preserving the Hebrew structure.
- source_word: לֹא אֵלֵךְ
  chosen: I will not go
  alternatives:
  - I am not going
  lexicon: HALOT
  rationale: Negated Qal imperfect 1cs of הלך expresses Barak's refusal under the
    negative condition. 'I will not go' is the clearest and most direct rendering.
