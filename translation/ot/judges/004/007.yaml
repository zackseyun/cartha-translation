id: JDG.4.7
reference: Judges 4:7
source:
  edition: WLC
  text: וּ/מָשַׁכְתִּ֨י אֵלֶ֜י/ךָ אֶל נַ֣חַל קִישׁ֗וֹן אֶת סִֽיסְרָא֙ שַׂר צְבָ֣א
    יָבִ֔ין וְ/אֶת רִכְבּ֖/וֹ וְ/אֶת הֲמוֹנ֑/וֹ וּ/נְתַתִּ֖י/הוּ בְּ/יָדֶֽ/ךָ־־־־־׃
translation:
  text: And I will draw Sisera, the commander of Jabin’s army, along with his chariots
    and his multitude, to you at the Wadi Kishon, and I will give him into your hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to the Kishon River” or “to the torrent of Kishon”; the Hebrew term
      can refer to a wadi, streambed, or torrent valley.
    reason: lexical_alternative
  - marker: b
    text: Or “his troops” or “his army”; the Hebrew word is broader, literally “his
      multitude.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָשַׁכְתִּי
  chosen: I will draw
  alternatives:
  - I will lure
  - I will pull
  - I will lead
  lexicon: HALOT
  rationale: The verb משׁך in this context conveys causing Sisera to come toward a
    designated place. 'Draw' preserves the metaphorical force without over-interpreting
    motive. 'Lure' is possible contextually but adds nuance not explicit in the verb
    itself.
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - toward you
  lexicon: HALOT
  rationale: The preposition with 2ms suffix indicates motion in relation to Barak.
    'To you' is idiomatic and preserves the personal direction of the action.
- source_word: אֶל נחל קישׁון
  chosen: at the Wadi Kishon
  alternatives:
  - to the Kishon River
  - to the torrent of Kishon
  - to the Wadi of Kishon
  lexicon: HALOT
  rationale: נחל often denotes a wadi, streambed, or torrent valley rather than a
    permanently flowing river. 'Wadi Kishon' best reflects the Hebrew terrain term
    while remaining readable; 'at' fits the English construction with 'draw ... to
    you at' better than a second 'to.'
- source_word: סיסרא
  chosen: Sisera
  rationale: Standard English transliteration of the personal name.
- source_word: שׂר צבא יבין
  chosen: the commander of Jabin’s army
  alternatives:
  - the captain of Jabin’s host
  - the prince of Jabin’s army
  lexicon: HALOT
  rationale: שׂר צבא denotes a military leader. 'Commander' is clear modern English;
    'army' is the natural rendering of צבא here.
- source_word: רכבו
  chosen: his chariots
  alternatives:
  - his chariot force
  - his chariotry
  lexicon: HALOT
  rationale: While רכב can denote chariotry collectively, 'his chariots' is the most
    straightforward and natural rendering in English, and the military sense remains
    clear in context.
- source_word: המונו
  chosen: his multitude
  alternatives:
  - his troops
  - his army
  - his horde
  lexicon: HALOT
  rationale: המון broadly means a crowd, multitude, or mass. 'His multitude' preserves
    the lexical breadth and avoids collapsing it too quickly into a technical military
    term, though the military context is evident.
- source_word: ונתתיהו
  chosen: I will give him
  alternatives:
  - I will deliver him
  lexicon: HALOT
  rationale: נתן plus 'into your hand' is a common idiom for handing over to someone's
    power. 'Give him' keeps the Hebrew idiom intact, while the following phrase clarifies
    the sense.
- source_word: בידך
  chosen: into your hand
  alternatives:
  - into your power
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for delivering someone into another's
    control. 'Into your hand' preserves the imagery and is familiar, readable English.
