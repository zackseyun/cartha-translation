id: JDG.4.6
reference: Judges 4:6
source:
  edition: WLC
  text: וַ/תִּשְׁלַ֗ח וַ/תִּקְרָא֙ לְ/בָרָ֣ק בֶּן אֲבִינֹ֔עַם מִ/קֶּ֖דֶשׁ נַפְתָּלִ֑י
    וַ/תֹּ֨אמֶר אֵלָ֜י/ו הֲ/לֹ֥א צִוָּ֣ה יְהוָ֣ה אֱלֹהֵֽי יִשְׂרָאֵ֗ל לֵ֤ךְ וּ/מָֽשַׁכְתָּ֙
    בְּ/הַ֣ר תָּב֔וֹר וְ/לָקַחְתָּ֣ עִמְּ/ךָ֗ עֲשֶׂ֤רֶת אֲלָפִים֙ אִ֔ישׁ מִ/בְּנֵ֥י
    נַפְתָּלִ֖י וּ/מִ/בְּנֵ֥י זְבֻלֽוּן־׀־׃
translation:
  text: 'She sent and summoned Barak son of Abinoam from Kedesh-naphtali, and said
    to him, “Has not the LORD, the God of Israel, commanded: ‘Go, draw up to Mount
    Tabor, and take with you ten thousand men from the sons of Naphtali and from the
    sons of Zebulun’?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from Kedesh of Naphtali.”
    reason: lexical_alternative
  - marker: b
    text: Or “march to Mount Tabor” or “draw together at Mount Tabor.”
    reason: lexical_alternative
  - marker: c
    text: Hebrew “from the sons of Naphtali and from the sons of Zebulun”; that is,
      men from those tribes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּשְׁלַח
  chosen: She sent
  alternatives:
  - She sent word
  - She dispatched
  lexicon: HALOT
  rationale: The verb שׁלח in this context introduces Deborah's initiative in sending
    for Barak. 'She sent' is the most direct rendering; English idiom is completed
    by the following 'and summoned.'
- source_word: וַתִּקְרָא
  chosen: and summoned
  alternatives:
  - and called
  - and sent for
  lexicon: HALOT
  rationale: קרא literally means 'call,' but in this narrative context with a direct
    object person at a distance, 'summoned' best conveys that she had Barak brought
    or called to appear, without excessive paraphrase.
- source_word: לְבָרָק בֶּן אֲבִינֹעַם
  chosen: Barak son of Abinoam
  alternatives:
  - to Barak, the son of Abinoam
  rationale: Names are transliterated per project philosophy. 'Son of' preserves the
    Hebrew filial construction naturally in English.
- source_word: מִקֶּדֶשׁ נַפְתָּלִי
  chosen: from Kedesh-naphtali
  alternatives:
  - from Kedesh of Naphtali
  - from Kedesh in Naphtali
  lexicon: HALOT
  rationale: The place name is traditionally distinguished as Kedesh in Naphtali.
    A hyphenated transliteration keeps the toponym compact while preserving the tribal
    association embedded in the Hebrew.
- source_word: הֲלֹא
  chosen: Has not
  alternatives:
  - Did not
  - Surely
  lexicon: HALOT
  rationale: The interrogative particle with negation expects an affirmative answer.
    'Has not' preserves the rhetorical force and fits the perfect verb that follows.
- source_word: צִוָּה
  chosen: commanded
  alternatives:
  - ordered
  - given command
  lexicon: HALOT
  rationale: צוה is a strong verb of command. 'Commanded' preserves the authoritative
    force of the divine speech.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: A straightforward construct rendering that identifies the covenant God
    in relation to Israel.
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Go on
  lexicon: HALOT
  rationale: Simple imperative preserved directly.
- source_word: וּמָשַׁכְתָּ
  chosen: draw up
  alternatives:
  - march
  - deploy
  - draw together
  lexicon: HALOT
  rationale: משך can mean draw/pull, and in military context here likely means to
    draw troops up or move into position toward Mount Tabor. 'Draw up' preserves the
    military nuance without over-specifying tactics.
- source_word: בְּהַר תָּבוֹר
  chosen: to Mount Tabor
  alternatives:
  - on Mount Tabor
  - at Mount Tabor
  lexicon: HALOT
  rationale: Although the preposition is ב, with verbs of movement English idiom commonly
    uses 'to.' This avoids awkwardness while preserving destination sense.
- source_word: וְלָקַחְתָּ עִמְּךָ
  chosen: and take with you
  alternatives:
  - and bring with you
  lexicon: HALOT
  rationale: לקח with עִם naturally means taking persons along. 'Take with you' is
    the most transparent rendering.
- source_word: עֲשֶׂרֶת אֲלָפִים אִישׁ
  chosen: ten thousand men
  alternatives:
  - ten thousand troops
  - ten thousand men of war
  lexicon: HALOT
  rationale: Literally 'ten thousand man/men.' 'Men' is gender-accurate and contextually
    refers to fighting men. 'Troops' would be smoother but less formally tied to איש.
- source_word: מִבְּנֵי נַפְתָּלִי וּמִבְּנֵי זְבֻלֻן
  chosen: from the sons of Naphtali and from the sons of Zebulun
  alternatives:
  - from the people of Naphtali and Zebulun
  - from Naphtali and Zebulun
  lexicon: HALOT
  rationale: בני literally means 'sons of.' Per gender-accurate philosophy, this is
    retained in the main text rather than neutralized, since the military context
    likely refers to male tribal members. A more idiomatic alternative is worth preserving
    in a footnote.
