id: JDG.4.15
reference: Judges 4:15
source:
  edition: WLC
  text: וַ/יָּ֣הָם יְ֠הוָה אֶת סִֽיסְרָ֨א וְ/אֶת כָּל הָ/רֶ֧כֶב וְ/אֶת כָּל הַֽ/מַּחֲנֶ֛ה לְ/פִי חֶ֖רֶב לִ/פְנֵ֣י בָרָ֑ק וַ/יֵּ֧רֶד סִֽיסְרָ֛א מֵ/עַ֥ל הַ/מֶּרְכָּבָ֖ה וַ/יָּ֥נָס בְּ/רַגְלָֽי/ו־־־־־־׃
translation:
  text: And Yahweh threw Sisera, all the chariots, and all the army into confusion before Barak by the sword. Then Sisera got down from the chariot and fled on foot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'routed'; the Hebrew verb can mean to throw into panic or confusion in battle.
    reason: lexical_alternative
  - marker: b
    text: Literally 'by the mouth/edge of the sword.'
    reason: lexical_alternative
  - marker: c
    text: Or 'all the camp' / 'all the host'; here the sense is the whole fighting force.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּהָם
  chosen: threw ... into confusion
  alternatives:
  - routed
  - threw into panic
  - confounded
  lexicon: HALOT
  rationale: The verb המם commonly conveys causing panic, confusion, or disorder in battle. 'Threw ... into confusion' preserves the causative force and avoids over-specifying total defeat in the verb itself, since the following phrase 'by the sword' narrates the military outcome.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶת סִיסְרָא וְאֶת כָּל הָרֶכֶב וְאֶת כָּל הַמַּחֲנֶה
  chosen: Sisera, all his chariots, and all his army
  alternatives:
  - Sisera, all the chariotry, and all the camp/host
  lexicon: HALOT
  rationale: The direct-object chain lists Sisera, the chariot force, and the army. 'His chariots' is idiomatic in English and contextually refers to Sisera's forces. 'Army' is the most natural rendering of מַחֲנֶה here in a battle context, though the term can more literally mean 'camp' or 'host'.
- source_word: הָרֶכֶב
  chosen: his chariots
  alternatives:
  - the chariotry
  - the chariot force
  lexicon: HALOT
  rationale: רֶכֶב can denote chariots collectively or chariot troops. 'His chariots' is clear modern English and fits the narrative, while still representing the military unit.
- source_word: הַמַּחֲנֶה
  chosen: his army
  alternatives:
  - the camp
  - the host
  lexicon: HALOT
  rationale: In military narrative מַחֲנֶה often refers to the encamped force, hence 'army' communicates the referent better than the more literal but potentially misleading 'camp'.
- source_word: לְפִי חֶרֶב
  chosen: by the sword
  alternatives:
  - with the edge of the sword
  - to the mouth of the sword
  lexicon: HALOT
  rationale: This idiom literally involves the 'mouth/edge' of the sword and means defeat or slaughter by sword. 'By the sword' is a natural English equivalent that preserves the martial instrument without awkward literalism.
- source_word: לִפְנֵי בָרָק
  chosen: before Barak
  alternatives:
  - in the presence of Barak
  - before the face of Barak
  lexicon: HALOT
  rationale: לִפְנֵי here marks what happened in front of or before Barak as he advanced in battle. 'Before Barak' is concise and idiomatic.
- source_word: וַיֵּרֶד
  chosen: got down
  alternatives:
  - came down
  - descended
  lexicon: HALOT
  rationale: '''Got down'' is natural English for dismounting from a vehicle. ''Descended'' is too formal for the narrative register.'
- source_word: מֵעַל הַמֶּרְכָּבָה
  chosen: from his chariot
  alternatives:
  - from the chariot
  - off the chariot
  lexicon: HALOT
  rationale: Although the Hebrew has the definite article ('the chariot'), English idiom prefers the possessive in context since it is Sisera's own chariot.
- source_word: וַיָּנָס בְּרַגְלָיו
  chosen: fled on foot
  alternatives:
  - fled by his feet
  - ran away on his feet
  lexicon: HALOT
  rationale: The idiom means fleeing without a vehicle, i.e., on foot. This captures the contrast with leaving the chariot behind.
