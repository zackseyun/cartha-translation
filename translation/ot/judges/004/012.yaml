id: JDG.4.12
reference: Judges 4:12
source:
  edition: WLC
  text: וַ/יַּגִּ֖דוּ לְ/סִֽיסְרָ֑א כִּ֥י עָלָ֛ה בָּרָ֥ק בֶּן אֲבִינֹ֖עַם הַר תָּבֽוֹר־־׃ס
translation:
  text: And they told Sisera that Barak son of Abinoam had gone up to Mount Tabor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּגִּדוּ
  chosen: And they told
  alternatives:
  - And they reported
  - And it was told
  lexicon: HALOT
  rationale: Hiphil wayyiqtol of נגד commonly means 'tell, report, declare.' The plural
    subject is indefinite/unspecified in context, so active English 'they told' is
    natural and preserves the Hebrew verbal movement better than an impersonal passive.
- source_word: לְסִיסְרָא
  chosen: Sisera
  rationale: Proper name with preposition לְ marking the indirect object, naturally
    rendered in English as 'told Sisera' rather than more woodenly 'told to Sisera.'
- source_word: כִּי
  chosen: that
  alternatives:
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces reported content after a verb of telling, so 'that'
    fits the syntax and sense better than causal 'because.'
- source_word: עָלָה
  chosen: had gone up to
  alternatives:
  - went up to
  - ascended to
  lexicon: HALOT
  rationale: עלה means 'go up, ascend.' With 'Mount Tabor' as destination, 'gone up
    to' is idiomatic English and reflects the directional/topographical sense. The
    pluperfect 'had gone up' works smoothly in English after 'they told Sisera that...'
    without overstating aspect.
- source_word: בָּרָק
  chosen: Barak
  rationale: Standard transliteration of the personal name.
- source_word: בֶּן אֲבִינֹעַם
  chosen: son of Abinoam
  alternatives:
  - the son of Abinoam
  rationale: Hebrew patronymic construction is best preserved straightforwardly in
    English as 'son of Abinoam.'
- source_word: הַר תָּבוֹר
  chosen: Mount Tabor
  alternatives:
  - the hill country of Tabor
  - the mountain Tabor
  lexicon: HALOT
  rationale: הַר means 'mountain/hill country,' but with a specific named peak the
    conventional and accurate English rendering is 'Mount Tabor.' This preserves the
    geographic reference in natural English.
