id: JDG.4.14
reference: Judges 4:14
source:
  edition: WLC
  text: וַ/תֹּאמֶר֩ דְּבֹרָ֨ה אֶל בָּרָ֜ק ק֗וּם כִּ֣י זֶ֤ה הַ/יּוֹם֙ אֲשֶׁר֩ נָתַ֨ן יְהוָ֤ה אֶת סִֽיסְרָא֙ בְּ/יָדֶ֔/ךָ הֲ/לֹ֥א יְהוָ֖ה יָצָ֣א לְ/פָנֶ֑י/ךָ וַ/יֵּ֤רֶד בָּרָק֙ מֵ/הַ֣ר תָּב֔וֹר וַ/עֲשֶׂ֧רֶת אֲלָפִ֛ים אִ֖ישׁ אַחֲרָֽי/ו־־׃
translation:
  text: Then Deborah said to Barak, “Arise, for this is the day on which Yahweh has given Sisera into your hand. Has not Yahweh gone out before you?” So Barak went down from Mount Tabor, with ten thousand men following him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “has delivered Sisera into your hand.”
    reason: lexical_alternative
  - marker: b
    text: Or “Has not the LORD gone ahead of you?”
    reason: lexical_alternative
lexical_decisions:
- source_word: קוּם
  chosen: Rise up
  alternatives:
  - Arise
  - Get up
  lexicon: HALOT
  rationale: Imperative calling Barak to immediate action. 'Rise up' preserves the force and elevated narrative tone without sounding archaic.
- source_word: כִּי זֶה הַיּוֹם אֲשֶׁר
  chosen: for this is the day in which
  alternatives:
  - for this is the day that
  - because this is the day when
  lexicon: HALOT
  rationale: Keeps the demonstrative emphasis ('this is the day') and the relative clause. 'For' fits the motivational force of כִּי in Deborah's exhortation.
- source_word: נָתַן ... בְּיָדֶךָ
  chosen: has given ... into your hand
  alternatives:
  - has delivered ... into your hand
  - has handed ... over to you
  lexicon: HALOT
  rationale: The idiom בְּיָד with נתן commonly means to give into someone's power. 'Into your hand' preserves the Hebrew idiom while remaining natural English. Perfect aspect is rendered 'has given' to reflect the prophetic certainty of the announced victory.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הֲלֹא
  chosen: Has not
  alternatives:
  - Is it not true that
  - Surely
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Has not' preserves the interrogative form more closely than a flattened adverb such as 'surely.'
- source_word: יָצָא לְפָנֶיךָ
  chosen: gone out before you
  alternatives:
  - gone ahead of you
  - marched out before you
  lexicon: HALOT
  rationale: Military movement is implied, but the Hebrew verb is simply 'gone out.' 'Gone out before you' preserves the imagery and leaves the martial nuance to context.
- source_word: וַיֵּרֶד
  chosen: went down
  alternatives:
  - descended
  lexicon: HALOT
  rationale: Standard narrative rendering of ירד. 'Went down' is natural modern English and fits movement from a mountain.
- source_word: מֵהַר תָּבוֹר
  chosen: from Mount Tabor
  alternatives:
  - from the hill country of Tabor
  lexicon: HALOT
  rationale: Proper geographic name with the common English form 'Mount Tabor.'
- source_word: וַעֲשֶׂרֶת אֲלָפִים אִישׁ
  chosen: with ten thousand men
  alternatives:
  - and ten thousand men
  - along with ten thousand men
  lexicon: HALOT
  rationale: The phrase is appended to the action and naturally expresses accompaniment. 'Men' is retained because אִישׁ is explicitly masculine here and refers to fighting men, in keeping with gender-accurate translation philosophy.
- source_word: אַחֲרָיו
  chosen: following him
  alternatives:
  - after him
  - behind him
  lexicon: HALOT
  rationale: '''Following him'' conveys the sense idiomatically in English while preserving the troop movement behind Barak.'
