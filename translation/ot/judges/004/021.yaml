id: JDG.4.21
reference: Judges 4:21
source:
  edition: WLC
  text: וַ/תִּקַּ֣ח יָעֵ֣ל אֵֽשֶׁת חֶ֠בֶר אֶת יְתַ֨ד הָ/אֹ֜הֶל וַ/תָּ֧שֶׂם אֶת הַ/מַּקֶּ֣בֶת
    בְּ/יָדָ֗/הּ וַ/תָּב֤וֹא אֵלָי/ו֙ בַּ/לָּ֔אט וַ/תִּתְקַ֤ע אֶת הַ/יָּתֵד֙ בְּ/רַקָּת֔/וֹ
    וַ/תִּצְנַ֖ח בָּ/אָ֑רֶץ וְ/הֽוּא נִרְדָּ֥ם וַ/יָּ֖עַף וַ/יָּמֹֽת־־־־־׃
translation:
  text: Then Jael, the wife of Heber, took a tent peg and put a hammer in her hand,
    and she went to him quietly and drove the peg into his temple until it went down
    into the ground. Now he was fast asleep and exhausted, and he died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stealthily' for 'quietly.' The Hebrew emphasizes her silent, unobtrusive
      approach.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and it sank into the ground,' with the verb most naturally referring
      to the peg.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְתַד / הַיָּתֵד
  chosen: tent peg / the peg
  alternatives:
  - tent pin
  - stake
  lexicon: HALOT
  rationale: Refers to a peg used for securing a tent. 'Tent peg' is idiomatic modern
    English and preserves the concrete image better than 'tent pin'; 'stake' is possible
    but less specific in this domestic tent context.
- source_word: הַמַּקֶּבֶת
  chosen: hammer
  alternatives:
  - mallet
  lexicon: HALOT
  rationale: A striking tool used with the peg. 'Hammer' is the most natural and sufficiently
    precise English rendering; 'mallet' is possible but less likely as the default
    sense.
- source_word: בְּיָדָהּ
  chosen: in her hand
  alternatives:
  - with her hand
  lexicon: HALOT
  rationale: The prepositional phrase naturally indicates that she took/held the hammer
    in her hand. 'In her hand' is the most direct rendering.
- source_word: בַּלָּאט
  chosen: quietly
  alternatives:
  - secretly
  - stealthily
  lexicon: HALOT
  rationale: Conveys silent, unobtrusive approach. 'Quietly' is clear modern English;
    'stealthily' slightly over-interprets motive, while 'secretly' is less tied to
    manner of movement.
- source_word: וַתִּתְקַע
  chosen: drove
  alternatives:
  - struck
  - hammered
  - pierced
  lexicon: HALOT
  rationale: In context with peg and hammer, the verb denotes driving the peg in by
    force. 'Drove' captures the action succinctly and idiomatically.
- source_word: בְּרַקָּתוֹ
  chosen: into his temple
  alternatives:
  - through his temple
  - into the side of his head
  lexicon: HALOT
  rationale: רַקָּה denotes the temple/side of the head. 'Into his temple' is anatomically
    clear and avoids overstating the trajectory; 'through' is possible but more interpretive.
- source_word: וַתִּצְנַח בָּאָרֶץ
  chosen: until it went down into the ground
  alternatives:
  - and it sank into the ground
  - so that it went into the ground
  lexicon: HALOT
  rationale: The feminine verb most naturally refers to the peg sinking down into
    the ground after passing through Sisera's head. Rendering the implied subject
    in English clarifies the action sequence.
- source_word: נִרְדָּם
  chosen: fast asleep
  alternatives:
  - asleep
  - in deep sleep
  lexicon: HALOT
  rationale: The participle indicates a sleeping state; 'fast asleep' fits the narrative
    emphasis and natural English style.
- source_word: וַיָּעַף
  chosen: exhausted
  alternatives:
  - weary
  - faint
  lexicon: HALOT
  rationale: Describes Sisera's condition of fatigue. 'Exhausted' is vivid, contemporary,
    and fits the immediate context of his sleep.
- source_word: וַיָּמֹת
  chosen: and he died
  alternatives:
  - so he died
  lexicon: HALOT
  rationale: Simple narrative continuation is best preserved. English can retain the
    blunt finality without embellishment.
- source_word: אֵשֶׁת חֶבֶר
  chosen: the wife of Heber
  alternatives:
  - Heber's wife
  lexicon: HALOT
  rationale: Both are accurate; 'the wife of Heber' stays slightly closer to the Hebrew
    apposition while remaining natural English.
