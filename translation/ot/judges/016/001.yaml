theological_decisions:
- issue: Whether to make the sexual sense of וַיָּבֹא אֵלֶיהָ fully explicit or preserve
    the Hebrew euphemism
  chosen_reading: Preserve the euphemistic idiom with 'he went in to her'
  alternative_readings:
  - he had sexual relations with her
  - he slept with her
  rationale: The context strongly implies sexual intercourse, but the Hebrew itself
    uses a conventional euphemistic expression rather than an explicit verb. Optimal
    equivalence favors preserving that level of explicitness in the main text rather
    than heightening it.
  doctrine_reference: Translation philosophy §1, §3, §6
