id: JDG.16.1
reference: Judges 16:1
source:
  edition: WLC
  text: וַ/יֵּ֥לֶךְ שִׁמְשׁ֖וֹן עַזָּ֑תָ/ה וַ/יַּרְא שָׁם֙ אִשָּׁ֣ה זוֹנָ֔ה וַ/יָּבֹ֖א
    אֵלֶֽי/הָ־׃
translation:
  text: Samson went to Gaza, and there he saw a prostitute, and he went in to her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and he had sexual relations with her.' The Hebrew says literally, 'and
      he went in to her,' a common euphemistic expression in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - traveled
  - came
  lexicon: HALOT
  rationale: הלך in the wayyiqtol narrative sequence is the ordinary verb of motion,
    best rendered simply as 'went.' 'Traveled' is possible but adds nuance not required
    by the Hebrew.
- source_word: שִׁמְשׁוֹן
  chosen: Samson
  rationale: Personal name is transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: עַזָּתָה
  chosen: to Gaza
  alternatives:
  - Gaza-ward
  - toward Gaza
  lexicon: HALOT
  rationale: The directional he on the place name indicates motion toward the city.
    In natural English this is best expressed as 'to Gaza.'
- source_word: וַיַּרְא שָׁם
  chosen: and there he saw
  alternatives:
  - and he saw there
  lexicon: HALOT
  rationale: The adverb שָׁם means 'there.' English idiom prefers 'there he saw' rather
    than the more wooden 'he saw there.'
- source_word: אִשָּׁה זוֹנָה
  chosen: a prostitute
  alternatives:
  - a harlot
  - a promiscuous woman
  lexicon: HALOT
  rationale: זוֹנָה denotes a prostitute. 'Harlot' is archaic, and 'promiscuous woman'
    weakens the commercial/sexual sense present in the term. Since אִשָּׁה functions
    with the participle as a single expression, concise English 'a prostitute' is
    preferable to the more formal 'a woman, a prostitute.'
- source_word: וַיָּבֹא אֵלֶיהָ
  chosen: and he went in to her
  alternatives:
  - and he had relations with her
  - and he came to her
  lexicon: HALOT
  rationale: בוא אל can function as a sexual euphemism in context. 'Went in to her'
    preserves the Hebrew idiom and its euphemistic force without over-paraphrasing.
    'Had relations with her' is interpretive; 'came to her' is possible but less idiomatic
    in contemporary English.
