id: JDG.16.17
reference: Judges 16:17
source:
  edition: WLC
  text: וַ/יַּגֶּד לָ֣/הּ אֶת כָּל לִבּ֗/וֹ וַ/יֹּ֤אמֶר לָ/הּ֙ מוֹרָה֙ לֹֽא עָלָ֣ה
    עַל רֹאשִׁ֔/י כִּֽי נְזִ֧יר אֱלֹהִ֛ים אֲנִ֖י מִ/בֶּ֣טֶן אִמִּ֑/י אִם גֻּלַּ֨חְתִּי֙
    וְ/סָ֣ר מִמֶּ֣/נִּי כֹחִ֔/י וְ/חָלִ֥יתִי וְ/הָיִ֖יתִי כְּ/כָל הָ/אָדָֽם־־־־־־־־׃
translation:
  text: So he told her his whole heart and said to her, “A razor has never come upon
    my head, for I have been a Nazirite of God from my mother’s womb. If I am shaved,
    then my strength will leave me, and I will become weak and be like every other
    man.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “he told her all that was in his heart.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “a Nazirite of God,” a technical term for one specially dedicated
      to God.
    reason: cultural_note
  - marker: c
    text: Or, “like any other man.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגֶּד ... אֶת כָּל לִבּוֹ
  chosen: he told her his whole heart
  alternatives:
  - he told her all that was in his heart
  - he told her everything
  lexicon: HALOT
  rationale: The idiom literally involves 'all his heart.' Rendering it as 'his whole
    heart' preserves the Hebrew metaphor of full disclosure better than flattening
    it to merely 'everything,' while remaining intelligible in English.
- source_word: מוֹרָה
  chosen: razor
  alternatives:
  - shaving razor
  lexicon: HALOT
  rationale: The noun denotes a razor in this context, specifically the instrument
    forbidden to touch a Nazirite's head. 'Razor' is the natural modern English equivalent.
- source_word: לֹא עָלָה עַל רֹאשִׁי
  chosen: has never come upon my head
  alternatives:
  - has never touched my head
  - has never gone over my head
  lexicon: HALOT
  rationale: The Hebrew uses the idiom 'come up upon my head.' 'Has never come upon
    my head' preserves the imagery and remains understandable; 'touched my head' is
    a smoother but more interpretive alternative.
- source_word: נְזִיר אֱלֹהִים
  chosen: a Nazirite of God
  alternatives:
  - God's Nazirite
  - one dedicated to God as a Nazirite
  lexicon: HALOT
  rationale: '''Nazirite'' is the established transliteration for the technical term
    נְזִיר in the vow/dedication context of Numbers 6 and Samson narratives. ''Of
    God'' preserves the genitive relation without overexplaining.'
- source_word: מִבֶּטֶן אִמִּי
  chosen: from my mother’s womb
  alternatives:
  - from my mother's belly
  - since my mother's womb
  lexicon: HALOT
  rationale: This is a standard idiom for consecration from birth. 'From my mother's
    womb' is both literal and idiomatic in English Bible style without sounding archaic.
- source_word: אִם גֻּלַּחְתִּי
  chosen: If I am shaved
  alternatives:
  - If my head is shaved
  - If I am shorn
  lexicon: HALOT
  rationale: The passive form indicates Samson being shaved rather than shaving himself.
    'If I am shaved' is concise and accurate; the object 'my head' is implied by context.
- source_word: וְסָר מִמֶּנִּי כֹחִי
  chosen: then my strength will leave me
  alternatives:
  - my strength will depart from me
  lexicon: HALOT
  rationale: Future sense is appropriate in the conditional sequence. 'Leave me' is
    clear modern English for the verb 'depart/turn aside' in this context.
- source_word: וְחָלִיתִי
  chosen: I will become weak
  alternatives:
  - I will be weak
  - I will grow sickly
  lexicon: HALOT
  rationale: In context the verb refers to loss of vigor/strength, not illness. 'Become
    weak' best captures the resulting change of condition.
- source_word: כְּכָל הָאָדָם
  chosen: like every other man
  alternatives:
  - like every man
  - like any other man
  - like humankind
  lexicon: HALOT
  rationale: אָדָם here refers to an ordinary human male in contrast to Samson's extraordinary
    strength. Following the doctrine's gender-accurate principle, 'man' is preferable
    to 'person' or 'humankind.' 'Every other man' makes the contrast explicit in natural
    English.
