theological_decisions:
- issue: Rendering the consecration term נְזִיר in Samson's self-description
  chosen_reading: Nazirite of God
  alternative_readings:
  - one dedicated to God
  - one consecrated to God
  rationale: The term is a technical designation tied to the Nazirite institution
    and Samson's calling narrative. Transliteration preserves that canonical linkage
    better than a generic paraphrase, while 'of God' retains the explicit divine relation
    in the Hebrew.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency
    of key terms, or documented exception.'
- issue: Rendering הָאָדָם in the final clause
  chosen_reading: man
  alternative_readings:
  - person
  - human
  rationale: The doctrine excerpt directs gender-accurate rendering over gender-neutral
    language where the source intends it. In this narrative context Samson contrasts
    himself with ordinary men, not abstract humanity in general.
  doctrine_reference: 'Translation philosophy: gender-accurate over gender-neutral;
    Contested terms table for אָדָם.'
