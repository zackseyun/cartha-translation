id: JDG.16.14
reference: Judges 16:14
source:
  edition: WLC
  text: וַ/תִּתְקַע֙ בַּ/יָּתֵ֔ד וַ/תֹּ֣אמֶר אֵלָ֔י/ו פְּלִשְׁתִּ֥ים עָלֶ֖י/ךָ שִׁמְשׁ֑וֹן
    וַ/יִּיקַץ֙ מִ/שְּׁנָת֔/וֹ וַ/יִּסַּ֛ע אֶת הַ/יְתַ֥ד הָ/אֶ֖רֶג וְ/אֶת הַ/מַּסָּֽכֶת־־׃
translation:
  text: Then she fastened it with the pin and said to him, “The Philistines are upon
    you, Samson!” And he awoke from his sleep and pulled away the loom pin and the
    web.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the peg.' The Hebrew term can denote a peg or pin; in this weaving
      context, 'pin' best fits the sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'pulled out' or 'tore away.' The Hebrew verb can denote forceful removal.
    reason: lexical_alternative
  - marker: c
    text: Or 'the woven fabric.' The Hebrew term refers to the woven material on the
      loom.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּתְקַע
  chosen: fastened
  alternatives:
  - drove in
  - secured
  lexicon: HALOT
  rationale: The verb תקע commonly means to drive in, thrust, or fasten. In this context,
    with the loom arrangement from the previous verse, the sense is that Delilah secured
    the woven hair with the pin. 'Fastened' is natural English and preserves the action
    without over-specifying the mechanics.
- source_word: בַּיָּתֵד
  chosen: with the pin
  alternatives:
  - with the peg
  lexicon: HALOT
  rationale: 'יָתֵד can mean peg or pin. In the weaving context of Samson''s hair
    being woven into the loom, ''pin'' better fits the textile setting in English
    than the broader ''peg.'' The preposition is rendered instrumentally: ''with the
    pin.'''
- source_word: פְּלִשְׁתִּים עָלֶיךָ
  chosen: The Philistines are upon you
  alternatives:
  - The Philistines are attacking you
  - The Philistines are on you
  lexicon: HALOT
  rationale: This is the idiomatic alarm formula used repeatedly in the Samson narrative.
    'Are upon you' preserves the Hebrew idiom and urgency better than a more interpretive
    paraphrase.
- source_word: וַיִּיקַץ מִשְּׁנָתוֹ
  chosen: he awoke from his sleep
  alternatives:
  - he woke from his sleep
  lexicon: HALOT
  rationale: A straightforward rendering of the verb plus prepositional phrase. 'Awoke'
    fits the narrative register smoothly.
- source_word: וַיִּסַּע
  chosen: pulled away
  alternatives:
  - pulled out
  - tore away
  - set out
  lexicon: HALOT
  rationale: נסע has a broad range including pull up, pull away, or remove. Here Samson
    forcefully removes the loom fixtures attached to his hair. 'Pulled away' captures
    the physical action without implying travel ('set out') or excessive violence
    beyond the text.
- source_word: הַיְתַד הָאֶרֶג
  chosen: the loom pin
  alternatives:
  - the pin of the loom
  - the weaving pin
  lexicon: HALOT
  rationale: The construct-like sequence is best rendered as a textile implement associated
    with the loom. 'Loom pin' is concise and clear in modern English.
- source_word: הַמַּסָּכֶת
  chosen: the web
  alternatives:
  - the woven fabric
  - the warp
  lexicon: HALOT
  rationale: מַסָּכֶת here refers to the woven material produced on the loom. 'The
    web' is a standard and suitably literal rendering in weaving contexts. 'Warp'
    is more technical and may be too specific; 'woven fabric' is more interpretive.
