theological_decisions:
- issue: Narrative summary of Samson’s tenure
  chosen_reading: And he judged Israel twenty years
  alternative_readings:
  - Now he had judged Israel twenty years
  rationale: The Hebrew perfect after the burial notice can be rendered as a simple
    past summary or as a pluperfect-like retrospective. The simple past is retained
    because it matches the recurring formula in Judges and reads naturally in English,
    while still functioning as a concluding summary of Samson’s career.
  doctrine_reference: Translation philosophy §3, preserve tension rather than resolve
    it
