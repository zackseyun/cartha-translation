id: JDG.16.31
reference: Judges 16:31
source:
  edition: WLC
  text: וַ/יֵּרְד֨וּ אֶחָ֜י/ו וְ/כָל בֵּ֣ית אָבִי/הוּ֮ וַ/יִּשְׂא֣וּ אֹת/וֹ֒ וַֽ/יַּעֲל֣וּ
    וַ/יִּקְבְּר֣וּ אוֹת֗/וֹ בֵּ֤ין צָרְעָה֙ וּ/בֵ֣ין אֶשְׁתָּאֹ֔ל בְּ/קֶ֖בֶר מָנ֣וֹחַ
    אָבִ֑י/ו וְ/ה֛וּא שָׁפַ֥ט אֶת יִשְׂרָאֵ֖ל עֶשְׂרִ֥ים שָׁנָֽה־׀־׃פ
translation:
  text: Then his brothers and all his father’s household came down, carried him away,
    brought him up, and buried him between Zorah and Eshtaol, in the tomb of Manoah
    his father. And he judged Israel twenty years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Now he had judged Israel twenty years.' The Hebrew can be understood
      as a retrospective summary.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּרְדוּ
  chosen: came down
  alternatives:
  - went down
  - descended
  lexicon: HALOT
  rationale: ירד literally denotes downward movement. 'Came down' fits the narrative
    viewpoint and natural English while preserving the directional sense.
- source_word: אֶחָיו
  chosen: his brothers
  alternatives:
  - his kinsmen
  lexicon: HALOT
  rationale: The noun normally means biological brothers. There is no contextual pressure
    here to broaden it to 'kinsmen,' so the more direct rendering is retained.
- source_word: כָּל בֵּית אָבִיהוּ
  chosen: all his father’s household
  alternatives:
  - all his father’s house
  - all the house of his father
  lexicon: HALOT
  rationale: The Hebrew idiom 'house of his father' refers to the paternal family/household.
    'Household' communicates the social unit more clearly in modern English than the
    more wooden 'father’s house.'
- source_word: וַיִּשְׂאוּ אֹתוֹ
  chosen: carried him away
  alternatives:
  - lifted him up
  - bore him
  lexicon: HALOT
  rationale: נשא with a direct object in burial context means to carry or bear the
    body. 'Carried him away' is idiomatic and contextually clear.
- source_word: וַיַּעֲלוּ
  chosen: brought him up
  alternatives:
  - went up
  - carried him up
  lexicon: HALOT
  rationale: עלה marks upward movement, likely topographical. Because the object has
    just been mentioned and remains implicit, 'brought him up' makes the sense explicit
    in English without adding new content.
- source_word: וַיִּקְבְּרוּ אֹתוֹ
  chosen: buried him
  alternatives:
  - interred him
  lexicon: HALOT
  rationale: A straightforward burial verb; 'buried him' is the plain and natural
    equivalent.
- source_word: בֵּין צָרְעָה וּבֵין אֶשְׁתָּאֹל
  chosen: between Zorah and Eshtaol
  alternatives:
  - between Tsorah and Eshtaol
  lexicon: HALOT
  rationale: The prepositional phrase gives the burial location between two known
    places. Standard English transliterations 'Zorah' and 'Eshtaol' are used.
- source_word: בְּקֶבֶר מָנוֹחַ אָבִיו
  chosen: in the tomb of Manoah his father
  alternatives:
  - in the grave of Manoah his father
  - in Manoah his father’s tomb
  lexicon: HALOT
  rationale: קבר can mean grave or tomb. 'Tomb' fits a family burial place and reads
    naturally with the following proper name. The apposition 'his father' is preserved.
- source_word: וְהוּא שָׁפַט אֶת־יִשְׂרָאֵל
  chosen: And he judged Israel
  alternatives:
  - Now he had judged Israel
  - He governed Israel
  lexicon: HALOT
  rationale: שפט in Judges is the standard verb for the role of a judge/deliverer.
    'Judged' preserves the book’s recurring terminology better than interpretive alternatives
    like 'governed.'
- source_word: עֶשְׂרִים שָׁנָה
  chosen: twenty years
  lexicon: HALOT
  rationale: Simple cardinal-plus-noun expression; rendered directly.
