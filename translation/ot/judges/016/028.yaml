id: JDG.16.28
reference: Judges 16:28
source:
  edition: WLC
  text: וַ/יִּקְרָ֥א שִׁמְשׁ֛וֹן אֶל יְהוָ֖ה וַ/יֹּאמַ֑ר אֲדֹנָ֣/י יֱהֹוִ֡ה זָכְרֵ֣/נִי
    נָא֩ וְ/חַזְּקֵ֨/נִי נָ֜א אַ֣ךְ הַ/פַּ֤עַם הַ/זֶּה֙ הָ/אֱלֹהִ֔ים וְ/אִנָּקְמָ֧ה
    נְקַם אַחַ֛ת מִ/שְּׁתֵ֥י עֵינַ֖/י מִ/פְּלִשְׁתִּֽים־־׃
translation:
  text: Then Samson called to the LORD and said, “Lord GOD, please remember me, and
    please strengthen me just this once, O God, so that I may take vengeance on the
    Philistines with a single act of vengeance for my two eyes.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''for my two eyes,'' referring to the Philistines'' blinding of
      Samson.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - cried out
  lexicon: HALOT
  rationale: The verb קרא with אֶל + divine object commonly means to call out to or
    invoke. 'Called' is concise and natural; 'cried out' is possible but slightly
    more emotive than the context requires.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'
    rather than a transliteration.
- source_word: אֲדֹנָי יֱהֹוִה
  chosen: Lord GOD
  alternatives:
  - Lord LORD
  - Lord Yahweh
  - Lord GOD
  lexicon: HALOT
  rationale: The compound title is conventionally rendered 'Lord GOD' in English to
    avoid the awkward repetition 'Lord LORD' while preserving both אֲדֹנָי and the
    divine name.
- source_word: זָכְרֵנִי נָא
  chosen: please remember me
  alternatives:
  - remember me, please
  lexicon: HALOT
  rationale: Imperative + particle נָא expresses entreaty. 'Please remember me' captures
    the plea in idiomatic modern English.
- source_word: וְחַזְּקֵנִי נָא
  chosen: and please strengthen me
  alternatives:
  - and make me strong, please
  - and strengthen me, please
  lexicon: HALOT
  rationale: חזק in the Piel here asks God to impart strength. 'Strengthen me' is
    both natural and semantically precise.
- source_word: אַךְ הַפַּעַם הַזֶּה
  chosen: just this once
  alternatives:
  - only this time
  - only this once
  lexicon: HALOT
  rationale: The phrase limits the request to the present occasion. 'Just this once'
    is idiomatic and preserves the exclusivity conveyed by אַךְ.
- source_word: הָאֱלֹהִים
  chosen: O God
  alternatives:
  - God
  lexicon: HALOT
  rationale: Used here in direct address following the plea. 'O God' reflects the
    vocative force in English prayer language.
- source_word: וְאִנָּקְמָה
  chosen: so that I may take vengeance
  alternatives:
  - that I may be avenged
  - and let me avenge myself
  lexicon: HALOT
  rationale: The cohortative expresses Samson's purpose/request. Rendering it with
    'so that I may' captures the volitional nuance in smooth English.
- source_word: נְקַם אַחַת
  chosen: with a single act of vengeance
  alternatives:
  - one vengeance
  - one act of revenge
  lexicon: HALOT
  rationale: The cognate accusative intensifies the verbal idea. 'A single act of
    vengeance' preserves both the singularity and the emphatic cognate construction
    better than a wooden 'one vengeance.'
- source_word: מִשְּׁתֵי עֵינַי
  chosen: for my two eyes
  alternatives:
  - for my two eye sockets
  - for the loss of my two eyes
  - because of my two eyes
  lexicon: HALOT
  rationale: Literally 'from/for my two eyes.' In context it refers to the Philistines'
    blinding of Samson. 'For my two eyes' stays close to the Hebrew while remaining
    intelligible; more explicit expansions interpret beyond the wording.
- source_word: מִפְּלִשְׁתִּים
  chosen: on the Philistines
  alternatives:
  - against the Philistines
  - from the Philistines
  lexicon: HALOT
  rationale: With נקם, English idiom commonly uses 'take vengeance on/against.' 'On
    the Philistines' is natural and fits the action requested.
