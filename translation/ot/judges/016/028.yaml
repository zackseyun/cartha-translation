theological_decisions:
- issue: Rendering the divine names and titles in Samson's prayer
  chosen_reading: Distinguish יְהוָה as 'the LORD' and אֲדֹנָי יֱהֹוִה as 'Lord GOD.'
  alternative_readings:
  - Yahweh
  - Lord Yahweh
  rationale: This follows the project's stated default for YHWH while preserving the
    layered address in the Hebrew prayer. The translation avoids collapsing the titles
    into a single generic 'God.'
  doctrine_reference: 'DOCTRINE.md: Contested terms table, יְהוָה YHWH → ''the LORD'''
