id: JDG.16.30
reference: Judges 16:30
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר שִׁמְשׁ֗וֹן תָּמ֣וֹת נַפְשִׁ/י֮ עִם פְּלִשְׁתִּים֒ וַ/יֵּ֣ט בְּ/כֹ֔חַ
    וַ/יִּפֹּ֤ל הַ/בַּ֨יִת֙ עַל הַ/סְּרָנִ֔ים וְ/עַל כָּל הָ/עָ֖ם אֲשֶׁר בּ֑/וֹ וַ/יִּהְי֤וּ
    הַ/מֵּתִים֙ אֲשֶׁ֣ר הֵמִ֣ית בְּ/מוֹת֔/וֹ רַבִּ֕ים מֵ/אֲשֶׁ֥ר הֵמִ֖ית בְּ/חַיָּֽי/ו־־־־־׃
translation:
  text: And Samson said, “Let me die with the Philistines.” Then he bent with all
    his strength, and the house fell on the rulers and on all the people who were
    in it. So the dead whom he killed at his death were more than those whom he had
    killed during his life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “Let my soul die with the Philistines.” Here “my soul”
      is an idiomatic way of referring to Samson himself.
    reason: lexical_alternative
  - marker: b
    text: Or “the lords” of the Philistines.
    reason: lexical_alternative
  - marker: c
    text: Or “the building”; the Hebrew is the ordinary word for “house.”
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּמוֹת נַפְשִׁי
  chosen: Let me die
  alternatives:
  - Let my soul die
  - May I die
  lexicon: HALOT
  rationale: The Hebrew is literally 'may my נפש die,' an idiom meaning the person's
    own death. 'Let me die' is natural English and preserves the volitional/jussive
    force without importing a separate anthropology of 'soul' distinct from the self.
- source_word: עִם פְּלִשְׁתִּים
  chosen: with the Philistines
  alternatives:
  - along with the Philistines
  lexicon: HALOT
  rationale: עִם straightforwardly means 'with.' The phrase expresses Samson's willingness
    to die together with his enemies.
- source_word: וַיֵּט בְּכֹחַ
  chosen: he bent with all his strength
  alternatives:
  - he bowed with strength
  - he pushed with might
  lexicon: HALOT
  rationale: The verb נטה commonly means 'stretch out, bend, incline.' In this context
    of bracing against the pillars and collapsing the structure, 'bent with all his
    strength' captures the bodily exertion implied by the narrative. 'With all his
    strength' makes explicit the intensive force of בְּכֹחַ in idiomatic English.
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the building
  - the temple
  lexicon: HALOT
  rationale: The Hebrew term is the ordinary word for 'house/building.' Since the
    immediate context identifies it as the structure in which the Philistines were
    gathered, 'house' is a faithful rendering; 'temple' would be interpretive, though
    contextually understandable.
- source_word: הַסְּרָנִים
  chosen: the rulers
  alternatives:
  - the lords
  - the chiefs
  lexicon: HALOT
  rationale: סְרָנִים refers to the Philistine leaders. 'Rulers' communicates their
    governing status in clear modern English. 'Lords' is traditional but can sound
    archaic or suggest feudal categories not required by the Hebrew.
- source_word: כָּל הָעָם אֲשֶׁר בּוֹ
  chosen: all the people who were in it
  alternatives:
  - all the people in it
  lexicon: HALOT
  rationale: This renders the totality marker כָּל and the relative clause naturally
    while preserving the reference to those inside the structure.
- source_word: הַמֵּתִים
  chosen: the dead
  alternatives:
  - the dead ones
  lexicon: HALOT
  rationale: A standard rendering of the participial/substantival form, referring
    to those who died in the collapse.
- source_word: אֲשֶׁר הֵמִית בְּמוֹתוֹ
  chosen: whom he killed at his death
  alternatives:
  - whom he killed when he died
  - whom he killed in his death
  lexicon: HALOT
  rationale: The phrase marks the deaths Samson caused in the event of his own dying.
    'At his death' is concise and idiomatic while preserving the temporal connection.
- source_word: רַבִּים מֵאֲשֶׁר
  chosen: were more than those whom
  alternatives:
  - were many more than those whom
  lexicon: HALOT
  rationale: The comparative construction indicates that the number killed in his
    death exceeded the number killed in his life. English expresses this most naturally
    with 'were more than those whom.' 'Many more' is possible but adds emphasis not
    strictly required.
- source_word: בְּחַיָּיו
  chosen: during his life
  alternatives:
  - in his lifetime
  - while he lived
  lexicon: HALOT
  rationale: This temporal phrase contrasts with 'at his death.' 'During his life'
    preserves the contrast clearly and idiomatically.
