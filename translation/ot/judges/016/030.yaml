theological_decisions:
- issue: Rendering Samson's final statement without importing a doctrine of the soul
  chosen_reading: Let me die with the Philistines
  alternative_readings:
  - Let my soul die with the Philistines
  rationale: Because נֶפֶשׁ here functions idiomatically for the self/person, the
    translation avoids a wooden 'my soul' that could suggest a metaphysical claim
    the text is not making. This preserves the narrative sense without doctrinal overreading.
  doctrine_reference: Translation philosophy §1, §3
