id: JDG.16.8
reference: Judges 16:8
source:
  edition: WLC
  text: וַ/יַּעֲלוּ לָ֞/הּ סַרְנֵ֣י פְלִשְׁתִּ֗ים שִׁבְעָ֛ה יְתָרִ֥ים לַחִ֖ים אֲשֶׁ֣ר
    לֹא חֹרָ֑בוּ וַ/תַּאַסְרֵ֖/הוּ בָּ/הֶֽם־־׃
translation:
  text: So the Philistine rulers brought up to her seven fresh bowstrings that had
    not been dried, and she bound him with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the lords of the Philistines.' The Hebrew term refers to the leading
      Philistine officials.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲלוּ
  chosen: brought up
  alternatives:
  - brought
  - delivered
  - came up with
  lexicon: HALOT
  rationale: The verb עלה literally means 'go up/bring up.' In context, the Philistine
    rulers supply Delilah with the requested items, so 'brought up to her' preserves
    the Hebrew motion idiom without becoming unnatural English.
- source_word: סַרְנֵי פְלִשְׁתִּים
  chosen: the Philistine rulers
  alternatives:
  - the lords of the Philistines
  - the Philistine chiefs
  lexicon: HALOT
  rationale: סַרְנֵי denotes the recognized political leaders of the Philistines.
    'Rulers' is clear modern English; 'lords' is traditional but can sound feudal
    or overly formal in contemporary usage.
- source_word: יְתָרִים
  chosen: bowstrings
  alternatives:
  - cords
  - strings
  lexicon: HALOT
  rationale: In the Samson narrative this term refers specifically to cords associated
    with a bow, not generic ropes. 'Bowstrings' best captures the likely referent
    and fits the immediate context.
- source_word: לַחִים
  chosen: fresh
  alternatives:
  - moist
  - green
  - new
  lexicon: HALOT
  rationale: The adjective literally conveys moist/fresh rather than dried out. 'Fresh'
    is idiomatic in English for material not yet dried or cured.
- source_word: אֲשֶׁר לֹא חֹרָבוּ
  chosen: that had not been dried
  alternatives:
  - that were not dry
  - that had not dried out
  lexicon: HALOT
  rationale: 'The passive/resultative sense is important: these bowstrings were still
    undried. ''Had not been dried'' communicates the state clearly and naturally.'
- source_word: וַתַּאַסְרֵהוּ
  chosen: she bound him
  alternatives:
  - she tied him up
  - she restrained him
  lexicon: HALOT
  rationale: אסר commonly means bind/tie. 'Bound him' is concise, faithful, and fits
    the narrative register better than the more colloquial 'tied him up.'
- source_word: בָּהֶם
  chosen: with them
  alternatives:
  - by them
  - using them
  lexicon: HALOT
  rationale: The preposition marks instrumentality. 'With them' is the most natural
    English rendering.
