id: JDG.16.5
reference: Judges 16:5
source:
  edition: WLC
  text: וַ/יַּעֲל֨וּ אֵלֶ֜י/הָ סַרְנֵ֣י פְלִשְׁתִּ֗ים וַ/יֹּ֨אמְרוּ לָ֜/הּ פַּתִּ֣י
    אוֹת֗/וֹ וּ/רְאִי֙ בַּ/מֶּה֙ כֹּח֣/וֹ גָד֔וֹל וּ/בַ/מֶּה֙ נ֣וּכַל ל֔/וֹ וַ/אֲסַרְנֻ֖/הוּ
    לְ/עַנֹּת֑/וֹ וַ/אֲנַ֨חְנוּ֙ נִתַּן לָ֔/ךְ אִ֕ישׁ אֶ֥לֶף וּ/מֵאָ֖ה כָּֽסֶף־׃
translation:
  text: Then the lords of the Philistines came up to her and said to her, “Entice
    him, and see in what his great strength lies, and by what means we may overpower
    him, so that we may bind him to afflict him; and we will each give you eleven
    hundred pieces of silver.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'eleven hundred silver.' This likely refers to eleven
      hundred pieces or shekels of silver from each Philistine lord.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲלוּ אֵלֶיהָ
  chosen: came up to her
  alternatives:
  - went up to her
  - approached her
  lexicon: HALOT
  rationale: עלה with אל commonly denotes movement toward someone; 'came up to her'
    is idiomatic and preserves the directional nuance without over-literal awkwardness.
- source_word: סַרְנֵי פְלִשְׁתִּים
  chosen: the lords of the Philistines
  alternatives:
  - the rulers of the Philistines
  - the chiefs of the Philistines
  lexicon: HALOT
  rationale: סרן is the standard title for Philistine rulers in Judges/Samuel. 'Lords'
    is the conventional and contextually fitting rendering for these city rulers.
- source_word: פַּתִּי
  chosen: Entice
  alternatives:
  - Persuade
  - Seduce
  - Coax
  lexicon: HALOT
  rationale: The piel imperative of פתה here calls for Delilah to lure Samson into
    disclosure by deception. 'Entice' captures the manipulative sense without importing
    explicitly sexual content not demanded by the verb itself.
- source_word: וּרְאִי בַּמֶּה כֹּחוֹ גָדוֹל
  chosen: and see in what his great strength lies
  alternatives:
  - and find out wherein his great strength is
  - and see by what his strength is great
  lexicon: HALOT
  rationale: במה asks the basis/source; 'in what ... lies' is natural English that
    preserves the inquiry into the secret/source of his strength. 'Great strength'
    keeps the adjective explicit.
- source_word: וּבַמֶּה נוּכַל לוֹ
  chosen: and by what means we may overpower him
  alternatives:
  - and how we may prevail against him
  - and by what we may be able against him
  lexicon: HALOT
  rationale: The idiom יכל ל means to prevail over or overcome someone. 'Overpower
    him' fits the hostile context and reads naturally in English.
- source_word: וַאֲסַרְנֻהוּ
  chosen: so that we may bind him
  alternatives:
  - and bind him
  - that we may tie him up
  lexicon: HALOT
  rationale: The prefixed waw here is best taken in sequence/purpose with the preceding
    clause. 'Bind him' is the standard rendering of אסר and suits the capture context.
- source_word: לְעַנֹּתוֹ
  chosen: to afflict him
  alternatives:
  - to subdue him
  - to humble him
  - to mistreat him
  lexicon: HALOT
  rationale: ענה in the piel can mean afflict, humble, or mistreat. 'Afflict him'
    preserves the broad sense of inflicting suffering/oppression without narrowing
    it merely to humiliation or torture.
- source_word: וַאֲנַחְנוּ נִתַּן לָךְ אִישׁ אֶלֶף וּמֵאָה כָּסֶף
  chosen: and we will each give you eleven hundred pieces of silver
  alternatives:
  - and we will give you, each man, eleven hundred silver pieces
  - and each of us will give you eleven hundred shekels of silver
  lexicon: HALOT
  rationale: 'איש after the verb is distributive: each one of us. The Hebrew says
    literally ''eleven hundred silver''; ''pieces of silver'' is a clear English completion.
    ''Shekels'' is possible by implication but not explicit in the text, so it is
    left to a footnote rather than the main text.'
