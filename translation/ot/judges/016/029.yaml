id: JDG.16.29
reference: Judges 16:29
source:
  edition: WLC
  text: וַ/יִּלְפֹּ֨ת שִׁמְשׁ֜וֹן אֶת שְׁנֵ֣י עַמּוּדֵ֣י הַ/תָּ֗וֶךְ אֲשֶׁ֤ר הַ/בַּ֨יִת֙
    נָכ֣וֹן עֲלֵי/הֶ֔ם וַ/יִּסָּמֵ֖ךְ עֲלֵי/הֶ֑ם אֶחָ֥ד בִּ/ימִינ֖/וֹ וְ/אֶחָ֥ד בִּ/שְׂמֹאלֽ/וֹ־׀׃
translation:
  text: Then Samson grasped the two middle pillars on which the house stood, and he
    braced himself against them, one with his right hand and one with his left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'leaned against them.' The Hebrew verb can denote leaning or supporting
      oneself on something; 'braced himself against them' reflects the likely physical
      sense in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'the two central pillars.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלְפֹּת
  chosen: grasped
  alternatives:
  - seized
  - took hold of
  lexicon: HALOT
  rationale: The verb denotes taking hold firmly or clutching. 'Grasped' is natural
    modern English and conveys deliberate, forceful contact without overtranslating.
- source_word: שְׁנֵי עַמּוּדֵי הַתָּוֶךְ
  chosen: the two middle pillars
  alternatives:
  - the two central pillars
  - the two pillars in the middle
  lexicon: HALOT
  rationale: עַמּוּדֵי means 'pillars,' and הַתָּוֶךְ refers to the middle/interior.
    'Middle pillars' is concise and fits the architectural sense in context.
- source_word: אֲשֶׁר הַבַּיִת נָכוֹן עֲלֵיהֶם
  chosen: on which the house stood
  alternatives:
  - on which the house was supported
  - upon which the building rested
  lexicon: HALOT
  rationale: נָכוֹן here conveys being established or supported. The clause identifies
    these pillars as structural supports. 'The house stood' is idiomatic and preserves
    the dependence of the building on the pillars.
- source_word: וַיִּסָּמֵךְ עֲלֵיהֶם
  chosen: he braced himself against them
  alternatives:
  - he leaned against them
  - he supported himself against them
  lexicon: HALOT
  rationale: The verb סמך can mean lean, support, or brace oneself upon. In this immediate
    context, Samson is positioning himself for the collapse that follows, so 'braced
    himself against them' best captures the physical action without importing later
    details into the verse.
- source_word: אֶחָד בִּימִינוֹ וְאֶחָד בִּשְׂמֹאלוֹ
  chosen: one with his right hand and one with his left
  alternatives:
  - one in his right hand and one in his left
  - one on his right and one on his left
  lexicon: HALOT
  rationale: The singular distributive אֶחָד ... וְאֶחָד marks one pillar for each
    side. Because the suffixes are on 'right' and 'left,' the sense is Samson's right
    and left side/hand. 'With his right hand ... with his left' makes the bodily action
    explicit and natural in English.
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the building
  lexicon: HALOT
  rationale: The Hebrew word is literally 'house.' Although the structure is a temple-like
    building in context, 'house' preserves the source wording and remains intelligible.
