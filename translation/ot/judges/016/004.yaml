id: JDG.16.4
reference: Judges 16:4
source:
  edition: WLC
  text: וַֽ/יְהִי֙ אַחֲרֵי כֵ֔ן וַ/יֶּאֱהַ֥ב אִשָּׁ֖ה בְּ/נַ֣חַל שֹׂרֵ֑ק וּ/שְׁמָ֖/הּ
    דְּלִילָֽה־׃
translation:
  text: After this, he loved a woman in the Valley of Sorek, and her name was Delilah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the Wadi Sorek.' The Hebrew נַחַל can refer to a valley, streambed,
      or seasonal watercourse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי אַחֲרֵי כֵן
  chosen: After this
  alternatives:
  - And it happened after this
  - Afterward
  lexicon: HALOT
  rationale: The Hebrew narrative formula literally means 'and it happened after this.'
    In natural modern English, 'After this' preserves the temporal sequence without
    unnecessary stiffness.
- source_word: וַיֶּאֱהַב
  chosen: he loved
  alternatives:
  - he fell in love with
  - he took a liking to
  lexicon: HALOT
  rationale: The verb אָהַב straightforwardly means 'to love.' 'He loved' is the most
    direct rendering and avoids adding romantic nuance beyond what the Hebrew states.
- source_word: אִשָּׁה
  chosen: a woman
  alternatives:
  - a wife
  lexicon: HALOT
  rationale: The noun can mean 'woman' or 'wife' depending on context. Here no marital
    relationship is indicated, so 'a woman' is the contextually appropriate and more
    neutral rendering.
- source_word: בְּנַחַל שֹׂרֵק
  chosen: in the Valley of Sorek
  alternatives:
  - by the wadi of Sorek
  - in the Wadi Sorek
  lexicon: HALOT
  rationale: נַחַל can denote a wadi, streambed, or valley. 'Valley' is idiomatic
    and readily understandable in English, while preserving the geographical sense.
    'Sorek' is transliterated as a place name.
- source_word: וּשְׁמָהּ
  chosen: and her name was
  alternatives:
  - whose name was
  lexicon: HALOT
  rationale: This clause explicitly introduces the woman's name. 'And her name was'
    closely follows the Hebrew structure and reads naturally in English.
- source_word: דְּלִילָה
  chosen: Delilah
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
