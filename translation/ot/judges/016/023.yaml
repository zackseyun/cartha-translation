theological_decisions:
- issue: Rendering אֱלֹהֵיהֶם / אֱלֹהֵינוּ in a pagan context
  chosen_reading: god / Our god
  alternative_readings:
  - gods / Our gods
  rationale: In this verse both occurrences refer specifically to Dagon as the Philistines'
    deity, so singular 'god' best matches the immediate syntax and sense. This avoids
    importing polytheistic plurality where the text here focuses on one named deity.
