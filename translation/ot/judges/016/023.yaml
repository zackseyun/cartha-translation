id: JDG.16.23
reference: Judges 16:23
source:
  edition: WLC
  text: וְ/סַרְנֵ֣י פְלִשְׁתִּ֗ים נֶֽאֱסְפוּ֙ לִ/זְבֹּ֧חַ זֶֽבַח גָּד֛וֹל לְ/דָג֥וֹן
    אֱלֹהֵי/הֶ֖ם וּ/לְ/שִׂמְחָ֑ה וַ/יֹּ֣אמְר֔וּ נָתַ֤ן אֱלֹהֵ֨י/נוּ֙ בְּ/יָדֵ֔/נוּ
    אֵ֖ת שִׁמְשׁ֥וֹן אוֹיְבֵֽי/נוּ־׃
translation:
  text: Now the rulers of the Philistines gathered to offer a great sacrifice to Dagon
    their god and to celebrate, and they said, “Our god has given Samson, our enemy,
    into our hand.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the lords of the Philistines.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “into our hand,” an idiom meaning into our power or control.
    reason: lexical_alternative
lexical_decisions:
- source_word: סַרְנֵי
  chosen: rulers
  alternatives:
  - lords
  - princes
  lexicon: HALOT
  rationale: סֶרֶן denotes the leading officials of the Philistine city-states. 'Rulers'
    is clear modern English and avoids the archaic feel of 'lords' while preserving
    their governing status.
- source_word: נֶאֱסְפוּ
  chosen: gathered
  alternatives:
  - assembled
  lexicon: HALOT
  rationale: The Niphal of אסף here indicates coming together as a group. 'Gathered'
    is natural English and sufficiently formal.
- source_word: לִזְבֹּחַ זֶבַח גָּדוֹל
  chosen: to offer a great sacrifice
  alternatives:
  - to sacrifice a great sacrifice
  - to make a great sacrifice
  lexicon: HALOT
  rationale: The infinitive plus cognate accusative intensifies the sacrificial act.
    English normally avoids the literal repetition, so 'to offer a great sacrifice'
    preserves the sense without awkwardness.
- source_word: לְדָגוֹן אֱלֹהֵיהֶם
  chosen: to Dagon their god
  alternatives:
  - to Dagon, their god
  lexicon: HALOT
  rationale: This identifies Dagon as the deity receiving the sacrifice. The appositional
    phrase is rendered directly and naturally in English.
- source_word: וּלְשִׂמְחָה
  chosen: and to celebrate
  alternatives:
  - and for rejoicing
  - and for merrymaking
  lexicon: HALOT
  rationale: The noun שִׂמְחָה denotes joy or festivity. In this context of a public
    victory feast, 'to celebrate' captures the purpose idiomatically.
- source_word: נָתַן ... בְּיָדֵנוּ
  chosen: has given ... into our hand
  alternatives:
  - has delivered ... into our hand
  - has given ... into our power
  lexicon: HALOT
  rationale: The idiom נתן ביד means to hand someone over to another's control. 'Into
    our hand' preserves the Hebrew imagery while remaining intelligible in English.
- source_word: אֵת שִׁמְשׁוֹן
  chosen: Samson
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: אוֹיְבֵינוּ
  chosen: our enemy
  alternatives:
  - our adversary
  - the one hostile to us
  lexicon: HALOT
  rationale: Although morphologically plural in form, the word functions here with
    Samson as a singular referent. 'Our enemy' reflects the sense in context and reads
    naturally in English.
