id: JDG.16.25
reference: Judges 16:25
source:
  edition: WLC
  text: וַֽ/יְהִי֙ כי טוב לִבָּ֔/ם וַ/יֹּ֣אמְר֔וּ קִרְא֥וּ לְ/שִׁמְשׁ֖וֹן וִ/ישַֽׂחֶק
    לָ֑/נוּ וַ/יִּקְרְא֨וּ לְ/שִׁמְשׁ֜וֹן מִ/בֵּ֣ית ה/אסירים וַ/יְצַחֵק֙ לִ/פְנֵי/הֶ֔ם
    וַ/יַּעֲמִ֥ידוּ אוֹת֖/וֹ בֵּ֥ין הָ/עַמּוּדִֽים־׃
translation:
  text: And when their hearts were merry, they said, “Call for Samson, so that he
    may entertain us.” So they called for Samson from the prison house, and he entertained
    them. And they made him stand between the pillars.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'so that he may perform for us' or 'so that he may make sport for us.'
      The Hebrew verb can denote amusement, mockery, or public performance.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from the house of the prisoners,' that is, from the prison house.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי טוֹב לִבָּם
  chosen: when their hearts were merry
  alternatives:
  - when they were in good spirits
  - when their hearts were glad
  lexicon: HALOT
  rationale: The idiom literally speaks of the heart being 'good,' meaning cheerful
    or merry. 'Their hearts were merry' preserves the Hebrew imagery while remaining
    natural English.
- source_word: קִרְאוּ לְשִׁמְשׁוֹן
  chosen: Call for Samson
  alternatives:
  - Call Samson
  - Summon Samson
  lexicon: HALOT
  rationale: The imperative of קרא with ל marks summoning someone. 'Call for Samson'
    is idiomatic and fits the public command context.
- source_word: וִישַׂחֶק לָנוּ
  chosen: so that he may entertain us
  alternatives:
  - that he may amuse us
  - that he may perform for us
  - that he may make sport for us
  lexicon: HALOT
  rationale: The verb שׂחק here refers to making sport or providing amusement. 'Entertain
    us' best captures the sense in contemporary English without implying innocent
    play.
- source_word: מִבֵּית הָאֲסִירִים
  chosen: from the prison house
  alternatives:
  - from the prison
  - from the house of prisoners
  lexicon: HALOT
  rationale: The phrase is literally 'from the house of the prisoners/prisoners' house.'
    'Prison house' preserves the concrete Hebrew expression better than the flatter
    'prison,' while remaining understandable.
- source_word: וַיְצַחֵק לִפְנֵיהֶם
  chosen: and he entertained them
  alternatives:
  - and he performed before them
  - and he made sport before them
  - and he amused them
  lexicon: HALOT
  rationale: The verb צחק in this context likely denotes performing as an object of
    mockery or amusement before the Philistines. 'Entertained them' matches the preceding
    request and reads naturally, while the public aspect is retained by the context.
- source_word: וַיַּעֲמִידוּ אֹתוֹ בֵּין הָעַמּוּדִים
  chosen: And they made him stand between the pillars
  alternatives:
  - And they stationed him between the pillars
  - And they set him between the pillars
  lexicon: HALOT
  rationale: The Hiphil of עמד means to cause to stand or set in position. 'Made him
    stand' preserves the causative force and the humiliating control exercised over
    Samson.
