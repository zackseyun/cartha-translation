id: JDG.16.6
reference: Judges 16:6
source:
  edition: WLC
  text: וַ/תֹּ֤אמֶר דְּלִילָה֙ אֶל שִׁמְשׁ֔וֹן הַגִּֽידָ/ה נָּ֣א לִ֔/י בַּ/מֶּ֖ה כֹּחֲ/ךָ֣
    גָד֑וֹל וּ/בַ/מֶּ֥ה תֵאָסֵ֖ר לְ/עַנּוֹתֶֽ/ךָ־־׃
translation:
  text: Then Delilah said to Samson, “Please tell me what your great strength lies
    in, and how you could be bound to afflict you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and by what means you could be bound to subdue you.' The Hebrew verb
      can mean 'afflict,' 'humble,' or in context 'subdue/overpower.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence.
- source_word: דְּלִילָה
  chosen: Delilah
  rationale: Personal name transliterated per translation philosophy.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition in direct speech introduction.
- source_word: שִׁמְשׁוֹן
  chosen: Samson
  rationale: Personal name transliterated by standard English convention.
- source_word: הַגִּידָה נָּא לִי
  chosen: Please tell me
  alternatives:
  - Tell me, please
  - Declare to me, please
  lexicon: HALOT
  rationale: הגיד is 'tell/declare/report'; נא adds politeness or entreaty. 'Please
    tell me' is idiomatic and preserves the request tone.
- source_word: בַּמֶּה
  chosen: what ... lies in
  alternatives:
  - in what
  - by what means
  lexicon: HALOT
  rationale: Literally 'in what.' In English, with the following noun phrase, 'what
    your great strength lies in' is natural and preserves the sense of source or basis.
- source_word: כֹּחֲךָ גָדוֹל
  chosen: your great strength
  alternatives:
  - your strength is so great
  - the greatness of your strength
  lexicon: HALOT
  rationale: כח means 'strength/power'; גדול adjectivally intensifies it. 'Your great
    strength' is concise and natural.
- source_word: וּבַמֶּה
  chosen: and how
  alternatives:
  - and by what means
  - and in what
  lexicon: HALOT
  rationale: Here the interrogative introduces the means by which Samson might be
    overpowered. 'And how' is idiomatic optimal equivalence.
- source_word: תֵאָסֵר
  chosen: you could be bound
  alternatives:
  - you may be bound
  - you can be tied up
  lexicon: HALOT
  rationale: Niphal of אסר means 'be bound/tied.' 'Could be bound' fits the interrogative
    about possibility or means without sounding wooden.
- source_word: לְעַנּוֹתֶךָ
  chosen: to afflict you
  alternatives:
  - to humble you
  - to subdue you
  - to torment you
  lexicon: HALOT
  rationale: ענה in the Piel commonly means 'afflict, oppress, humble.' In this context
    Delilah asks how Samson could be restrained so as to be overpowered or mistreated.
    'Afflict you' stays close to the Hebrew while remaining readable; 'subdue you'
    is interpretive and 'humble' may sound overly psychological.
