id: JDG.16.11
reference: Judges 16:11
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלֶ֔י/הָ אִם אָס֤וֹר יַאַסְר֨וּ/נִי֙ בַּ/עֲבֹתִ֣ים חֲדָשִׁ֔ים
    אֲשֶׁ֛ר לֹֽא נַעֲשָׂ֥ה בָ/הֶ֖ם מְלָאכָ֑ה וְ/חָלִ֥יתִי וְ/הָיִ֖יתִי כְּ/אַחַ֥ד
    הָ/אָדָֽם־־׃
translation:
  text: He said to her, “If they bind me tightly with new ropes that have never been
    used for work, then I will become weak and be like one of the men.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “with which no work has been done.”
    reason: lexical_alternative
  - marker: b
    text: Or, “be like any man,” that is, like an ordinary human being without unusual
      strength.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלֶיהָ
  chosen: He said to her
  alternatives:
  - And he said to her
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing Samson's reply. English can
    omit the initial 'and' for natural flow without loss of meaning.
- source_word: אִם אָסוֹר יַאַסְרוּנִי
  chosen: If they bind me tightly
  alternatives:
  - If they surely bind me
  - If I am bound
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb of אסר intensifies the action.
    'Bind me tightly' captures the emphatic force in idiomatic English better than
    a wooden repetition.
- source_word: בַּעֲבֹתִים
  chosen: with ... ropes
  alternatives:
  - with cords
  - with thick ropes
  lexicon: HALOT
  rationale: עבתים denotes cords/ropes, likely thick braided bindings. 'Ropes' is
    the clearest modern English choice in this context.
- source_word: חֲדָשִׁים
  chosen: new
  alternatives:
  - fresh
  lexicon: HALOT
  rationale: Straightforward adjective modifying the ropes; 'new' is natural and precise.
- source_word: אֲשֶׁר לֹא נַעֲשָׂה בָהֶם מְלָאכָה
  chosen: that have never been used for work
  alternatives:
  - with which no work has been done
  - that have not been put to use
  lexicon: HALOT
  rationale: The passive construction literally means no work has been done with them.
    This idiomatic rendering preserves the sense that the ropes are unused.
- source_word: וְחָלִיתִי
  chosen: then I will become weak
  alternatives:
  - then I will be weakened
  - then I will grow weak
  lexicon: HALOT
  rationale: From חלה in the sense 'be weak/sick.' In Samson's statement about loss
    of strength, 'become weak' best fits the context.
- source_word: וְהָיִיתִי כְּאַחַד הָאָדָם
  chosen: and be like one of the men
  alternatives:
  - and be like any man
  - and be like one of mankind
  lexicon: HALOT
  rationale: אָדָם here refers to an ordinary human male in contrast to Samson's extraordinary
    strength. Following the doctrine's gender-accurate principle, 'men' is preferable
    to a gender-neutral rendering. 'One of the men' preserves the singular-plus-partitive
    structure.
