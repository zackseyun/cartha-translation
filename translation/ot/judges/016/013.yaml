id: JDG.16.13
reference: Judges 16:13
source:
  edition: WLC
  text: וַ/תֹּ֨אמֶר דְּלִילָ֜ה אֶל שִׁמְשׁ֗וֹן עַד הֵ֜נָּה הֵתַ֤לְתָּ בִּ/י֙ וַ/תְּדַבֵּ֤ר
    אֵלַ/י֙ כְּזָבִ֔ים הַגִּ֣ידָ/ה לִּ֔/י בַּ/מֶּ֖ה תֵּאָסֵ֑ר וַ/יֹּ֣אמֶר אֵלֶ֔י/הָ
    אִם תַּאַרְגִ֗י אֶת שֶׁ֛בַע מַחְלְפ֥וֹת רֹאשִׁ֖/י עִם הַ/מַּסָּֽכֶת־־־־־׃
translation:
  text: Then Delilah said to Samson, “Until now you have mocked me and told me lies.
    Tell me what you may be bound with.” And he said to her, “If you weave the seven
    locks of my head into the web.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “If you weave the seven braids of my hair with the loom,” or “into the
      woven fabric.” The Hebrew weaving term is somewhat specialized.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵתַ֤לְתָּ בִּי
  chosen: you have mocked me
  alternatives:
  - you have made a fool of me
  - you have deceived me
  lexicon: HALOT
  rationale: The verb הלל/תלל in this stem here conveys trifling with or making sport
    of someone in a deceptive way. 'Mocked me' is concise and idiomatic in context,
    while the following clause already supplies the explicit idea of lying.
- source_word: כְּזָבִים
  chosen: lies
  alternatives:
  - falsehoods
  lexicon: HALOT
  rationale: Straightforward plural noun for false statements; 'lies' is the most
    natural modern English equivalent.
- source_word: הַגִּידָה לִּי
  chosen: Tell me
  alternatives:
  - Declare to me
  - Explain to me
  lexicon: HALOT
  rationale: Imperative of נגד commonly means to tell or declare. 'Tell me' fits readable
    modern English.
- source_word: בַּמֶּה תֵּאָסֵר
  chosen: what you may be bound with
  alternatives:
  - how you may be bound
  - by what you may be tied up
  lexicon: HALOT
  rationale: The Hebrew asks literally 'with what you may be bound.' Retaining 'with'
    preserves the instrumental sense better than a looser 'how.' 'May be bound' reflects
    the imperfect/passive nuance.
- source_word: תַּאַרְגִי
  chosen: you weave
  alternatives:
  - you braid
  - you interweave
  lexicon: HALOT
  rationale: From ארג, the ordinary verb for weaving. 'Weave' is the clearest basic
    rendering.
- source_word: שֶׁבַע מַחְלְפוֹת רֹאשִׁי
  chosen: the seven locks of my head
  alternatives:
  - the seven braids of my hair
  - the seven tresses of my head
  lexicon: HALOT
  rationale: מחלפות refers to locks or braids of hair. 'Locks of my head' stays close
    to the Hebrew while remaining natural; 'hair' is implied by context.
- source_word: עִם הַמַּסָּכֶת
  chosen: into the web
  alternatives:
  - with the loom
  - with the woven fabric
  lexicon: HALOT
  rationale: מַסָּכֶת here is a weaving term in the Samson-Delilah scene, likely referring
    to the woven web/fabric on the loom rather than a metal image (a different sense
    of the same consonants). 'Into the web' best fits the action of weaving hair into
    loom-work and anticipates the fuller wording in the next verse.
