id: JDG.16.10
reference: Judges 16:10
source:
  edition: WLC
  text: וַ/תֹּ֤אמֶר דְּלִילָה֙ אֶל שִׁמְשׁ֔וֹן הִנֵּה֙ הֵתַ֣לְתָּ בִּ֔/י וַ/תְּדַבֵּ֥ר
    אֵלַ֖/י כְּזָבִ֑ים עַתָּה֙ הַגִּֽידָ/ה נָּ֣א לִ֔/י בַּ/מֶּ֖ה תֵּאָסֵֽר־־׃
translation:
  text: Then Delilah said to Samson, “Look, you have mocked me and told me lies. Now
    please tell me what you may be bound with.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you have made a fool of me'; the Hebrew verb can convey mocking or trifling
      with someone through deception.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: An attention-getter introducing Delilah's accusation. 'Look' is readable
    modern English and preserves the deictic force better than archaic 'Behold.'
- source_word: הֵתַלְתָּ בִּי
  chosen: you have mocked me
  alternatives:
  - you have made a fool of me
  - you have deceived me
  - you have toyed with me
  lexicon: HALOT
  rationale: The verb התל in this context conveys making sport of someone or trifling
    with them through deception. 'Mocked me' captures the insult and manipulation
    succinctly. 'Made a fool of me' is idiomatic but more expansive; 'deceived me'
    overlaps too much with the following clause about lies.
- source_word: וַתְּדַבֵּר אֵלַי כְּזָבִים
  chosen: and told me lies
  alternatives:
  - and spoke lies to me
  - and lied to me
  lexicon: HALOT
  rationale: Literally 'and you spoke to me lies.' 'Told me lies' is idiomatic English
    that preserves both the verbal action and the plural noun כזבים.
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - So now
  - At this time
  lexicon: HALOT
  rationale: Marks the transition from accusation to renewed request. 'Now' is the
    most natural concise rendering.
- source_word: הַגִּידָה נָּא לִי
  chosen: please tell me
  alternatives:
  - tell me, please
  - do tell me
  lexicon: HALOT
  rationale: The imperative with נָא expresses entreaty rather than command. 'Please
    tell me' preserves the pleading tone in natural English.
- source_word: בַּמֶּה תֵּאָסֵר
  chosen: what you may be bound with
  alternatives:
  - how you may be bound
  - with what you may be tied up
  - by what you may be bound
  lexicon: HALOT
  rationale: 'The preposition plus interrogative is instrumentally focused: ''with
    what.'' The Niphal of אסר is passive/reflexive in sense, ''be bound.'' ''May be
    bound with'' preserves the modal nuance of potentiality in context.'
