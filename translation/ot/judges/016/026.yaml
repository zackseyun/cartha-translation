id: JDG.16.26
reference: Judges 16:26
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר שִׁמְשׁ֜וֹן אֶל הַ/נַּ֨עַר הַ/מַּחֲזִ֣יק בְּ/יָד/וֹ֮ הַנִּ֣יחָ/ה
    אוֹתִ/י֒ ו/הימש/ני אֶת הָֽ/עַמֻּדִ֔ים אֲשֶׁ֥ר הַ/בַּ֖יִת נָכ֣וֹן עֲלֵי/הֶ֑ם וְ/אֶשָּׁעֵ֖ן
    עֲלֵי/הֶֽם־־׃
translation:
  text: Then Samson said to the young man who was holding his hand, “Let me rest,
    and guide me to the pillars on which the house stands, so that I may lean against
    them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “Leave me, and bring me to the pillars …” The Hebrew of Samson’s request
      can be rendered more literally, but the main text reflects the likely sense
      in context: he asks to be positioned at the supporting pillars so he can lean
      on them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנַּעַר
  chosen: the young man
  alternatives:
  - the boy
  - the servant
  lexicon: HALOT
  rationale: נַעַר commonly denotes a youth or young male attendant. In this context,
    the person leading blind Samson is best rendered 'young man' as a natural, age-marked
    term without over-specifying servile status.
- source_word: הַמַּחֲזִיק בְּיָדוֹ
  chosen: who was holding his hand
  alternatives:
  - who was leading him by the hand
  - who held him by the hand
  lexicon: HALOT
  rationale: The participle from חזק with 'in/by his hand' describes the ongoing action
    of physically holding Samson's hand. 'Who was holding his hand' stays close to
    the Hebrew while remaining idiomatic English.
- source_word: הַנִּיחָה אוֹתִי
  chosen: Let me rest
  alternatives:
  - Leave me
  - Set me down
  - Allow me to rest
  lexicon: HALOT
  rationale: The Hiphil imperative of נוח can mean 'let rest,' 'set down,' or 'leave.'
    Given the following request to be guided to the pillars and then lean on them,
    Samson is asking to be placed/rested there rather than merely abandoned. 'Let
    me rest' captures the immediate sense well.
- source_word: וְהִימְשֵׁנִי
  chosen: and guide me to
  alternatives:
  - and bring me near to
  - and let me feel
  - and move me toward
  lexicon: HALOT
  rationale: From מושׁ/ימשׁ in this form, the sense is causative movement or guidance.
    In context, the attendant is to position Samson at the pillars. 'Guide me to'
    is idiomatic and fits the blindness context without adding more than the Hebrew
    implies.
- source_word: הָעַמֻּדִים
  chosen: the pillars
  alternatives:
  - the columns
  lexicon: HALOT
  rationale: עַמּוּד refers to structural pillars or columns. 'Pillars' is the more
    familiar biblical architectural term in English and suits the scene.
- source_word: אֲשֶׁר הַבַּיִת נָכוֹן עֲלֵיהֶם
  chosen: on which the house stands
  alternatives:
  - on which the house rests
  - by which the house is supported
  lexicon: HALOT
  rationale: נָכוֹן conveys being established, fixed, or set firm. With עַל, the clause
    describes the pillars as the supports on which the building is established. 'On
    which the house stands' is clear, natural, and structurally accurate.
- source_word: וְאֶשָּׁעֵן עֲלֵיהֶם
  chosen: so that I may lean against them
  alternatives:
  - and I may lean on them
  - that I may support myself on them
  lexicon: HALOT
  rationale: The Niphal of שׁען means to lean oneself upon, rely on physically here.
    'Lean against them' is idiomatic in English for bodily support against pillars.
