theological_decisions:
- issue: Number of אֱלֹהִים in Philistine speech
  chosen_reading: singular 'their god' / 'our god'
  alternative_readings:
  - plural 'their gods' / 'our gods'
  rationale: Despite the plural form, the singular verb נָתַן and the immediate context
    of praise to Dagon support a singular sense. This is a grammatical-semantic decision
    rather than a doctrinal one, but it affects how the Philistines' theology is represented
    in translation.
