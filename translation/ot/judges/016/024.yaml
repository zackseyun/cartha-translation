id: JDG.16.24
reference: Judges 16:24
source:
  edition: WLC
  text: וַ/יִּרְא֤וּ אֹת/וֹ֙ הָ/עָ֔ם וַֽ/יְהַלְל֖וּ אֶת אֱלֹהֵי/הֶ֑ם כִּ֣י אָמְר֗וּ
    נָתַ֨ן אֱלֹהֵ֤י/נוּ בְ/יָדֵ֨/נוּ֙ אֶת א֣וֹיְבֵ֔/נוּ וְ/אֵת֙ מַחֲרִ֣יב אַרְצֵ֔/נוּ
    וַ/אֲשֶׁ֥ר הִרְבָּ֖ה אֶת חֲלָלֵֽי/נוּ־־־׃
translation:
  text: When the people saw him, they praised their god, for they said, “Our god has
    given into our hand our enemy, the devastator of our land, the one who multiplied
    our slain.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''has given into our hand,'' an idiom meaning ''has handed over
      into our power.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'the destroyer of our land.'
    reason: lexical_alternative
  - marker: c
    text: Or 'who increased our dead' or 'who killed many of us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְאוּ אֹתוֹ
  chosen: When the people saw him
  alternatives:
  - And the people saw him
  - When they saw him
  lexicon: HALOT
  rationale: 'The waw-consecutive advances the narrative. Rendering with ''When''
    captures the temporal sense naturally in English while preserving the sequence:
    upon seeing Samson, the people respond with praise.'
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the crowd
  lexicon: HALOT
  rationale: עָם is the standard term for a people/group. 'The people' is the most
    direct rendering and fits the collective Philistine populace in context better
    than the more interpretive 'crowd'.
- source_word: וַיְהַלְלוּ
  chosen: praised
  alternatives:
  - gave praise to
  - celebrated
  lexicon: HALOT
  rationale: הלל in the piel commonly means 'praise.' 'Praised' is direct and preserves
    the religious act directed toward their deity.
- source_word: אֱלֹהֵיהֶם
  chosen: their god
  alternatives:
  - their gods
  lexicon: HALOT
  rationale: Although אֱלֹהִים can be morphologically plural, here the surrounding
    singular verbs and the immediate context of Dagon indicate a singular referent.
    Thus 'their god' best reflects the sense.
- source_word: כִּי אָמְרוּ
  chosen: for they said
  alternatives:
  - because they said
  lexicon: HALOT
  rationale: כִּי introduces the reason for their praise. 'For they said' is idiomatic
    and keeps the causal force.
- source_word: נָתַן ... בְיָדֵנוּ
  chosen: has given into our hand
  alternatives:
  - gave into our hand
  - delivered into our hand
  - has given into our power
  lexicon: HALOT
  rationale: The idiom 'give into the hand' denotes handing over into someone's power.
    'Has given into our hand' preserves the Hebrew imagery while remaining understandable
    in English.
- source_word: אֹיְבֵנוּ
  chosen: our enemy
  alternatives:
  - the one hostile to us
  lexicon: HALOT
  rationale: Straightforward rendering of the singular participial/nominal form with
    first person plural suffix. Singular fits Samson as the representative enemy.
- source_word: מַחֲרִיב אַרְצֵנוּ
  chosen: the devastator of our land
  alternatives:
  - the destroyer of our land
  - the one who laid waste our land
  lexicon: HALOT
  rationale: The hiphil participle of חרב here functions substantivally. 'Devastator'
    is vivid, concise, and reflects ongoing/resultative destructive activity against
    the land.
- source_word: וַאֲשֶׁר הִרְבָּה אֶת חֲלָלֵינוּ
  chosen: the one who multiplied our slain
  alternatives:
  - who killed many of us
  - who increased our dead
  lexicon: HALOT
  rationale: הִרְבָּה means 'made many/increased,' and חֲלָלִים are slain persons,
    not merely generic dead. 'Multiplied our slain' preserves the Hebrew's starkness
    and poetic force better than a flattened paraphrase.
