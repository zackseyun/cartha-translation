id: JDG.16.7
reference: Judges 16:7
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֵלֶ֨י/הָ֙ שִׁמְשׁ֔וֹן אִם יַאַסְרֻ֗/נִי בְּ/שִׁבְעָ֛ה יְתָרִ֥ים
    לַחִ֖ים אֲשֶׁ֣ר לֹא חֹרָ֑בוּ וְ/חָלִ֥יתִי וְ/הָיִ֖יתִי כְּ/אַחַ֥ד הָ/אָדָֽם־־׃
translation:
  text: And Samson said to her, “If they bind me with seven fresh bowstrings that
    have not dried, then I will become weak and be like one of the men.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “like any other man.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר ... שִׁמְשׁוֹן אֵלֶיהָ
  chosen: And Samson said to her
  alternatives:
  - Then Samson said to her
  - So Samson said to her
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introduces the next event. 'And' preserves
    Hebrew narrative flow without overinterpreting sequence.
- source_word: אִם
  chosen: If
  alternatives:
  - If indeed
  lexicon: HALOT
  rationale: Introduces the condition straightforwardly; no emphatic expansion is
    required.
- source_word: יַאַסְרֻנִי
  chosen: they bind me
  alternatives:
  - one binds me
  - they tie me up
  lexicon: HALOT
  rationale: The 3mp form is an indefinite plural in context. 'They bind me' is natural
    English and preserves the passive-like indefinite sense better than supplying
    a specific subject.
- source_word: בְּשִׁבְעָה
  chosen: with seven
  alternatives:
  - by seven
  lexicon: HALOT
  rationale: Instrumental beth is best rendered 'with' in English.
- source_word: יְתָרִים
  chosen: bowstrings
  alternatives:
  - cords
  - strings
  lexicon: HALOT
  rationale: In this Samson context, יתרים refers specifically to bowstrings rather
    than generic ropes; this is the most precise and idiomatic rendering.
- source_word: לַחִים
  chosen: fresh
  alternatives:
  - moist
  - green
  - wet
  lexicon: HALOT
  rationale: The adjective literally means 'moist/fresh.' 'Fresh' is idiomatic with
    bowstrings and fits the contrast with 'not dried.'
- source_word: אֲשֶׁר לֹא חֹרָבוּ
  chosen: that have not dried
  alternatives:
  - that are not dried out
  - that have not been dried
  lexicon: HALOT
  rationale: The clause describes the bowstrings as still undried. 'Have not dried'
    is concise and natural.
- source_word: וְחָלִיתִי
  chosen: then I will become weak
  alternatives:
  - then I will be weak
  - then I will grow weak
  lexicon: HALOT
  rationale: From חלה in the sense 'be weak/sick.' Here it refers to loss of strength,
    so 'become weak' best captures the resultant change.
- source_word: וְהָיִיתִי
  chosen: and be
  alternatives:
  - and I will be
  - so that I am
  lexicon: HALOT
  rationale: Simple continuation of the result clause.
- source_word: כְּאַחַד הָאָדָם
  chosen: like one of the men
  alternatives:
  - like any other man
  - like one man
  - like an ordinary man
  lexicon: HALOT
  rationale: The phrase literally compares Samson to 'one of the man/mankind.' In
    context it means an ordinary human male in contrast to Samson's extraordinary
    strength. 'Like one of the men' stays close to the Hebrew while remaining intelligible.
    A more idiomatic alternative is preserved in a footnote.
- source_word: הָאָדָם
  chosen: the men
  alternatives:
  - man
  - humankind
  lexicon: HALOT
  rationale: Although אדם can mean 'man' or 'humankind,' here the singular collective
    after 'one of' functions idiomatically for ordinary human beings, especially men
    in context. The rendering is gender-accurate and context-sensitive per doctrine
    guidance.
