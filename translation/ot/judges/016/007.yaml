theological_decisions:
- issue: Rendering of אָדָם in a comparative idiom
  chosen_reading: like one of the men
  alternative_readings:
  - like any other man
  - like an ordinary man
  rationale: The Hebrew uses אדם in a generic-human sense, but the immediate context
    concerns Samson's male physical strength and social comparison. The chosen rendering
    preserves the source's gendered form while allowing an idiomatic alternative in
    a footnote.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested
    terms table for אָדָם'
