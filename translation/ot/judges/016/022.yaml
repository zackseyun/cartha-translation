id: JDG.16.22
reference: Judges 16:22
source:
  edition: WLC
  text: וַ/יָּ֧חֶל שְׂעַר רֹאשׁ֛/וֹ לְ/צַמֵּ֖חַ כַּ/אֲשֶׁ֥ר גֻּלָּֽח־׃פ
translation:
  text: But the hair of his head began to grow again after it had been shaved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'began to grow'—the Hebrew verb itself does not explicitly include 'again';
      the sense is supplied by the context of the prior shaving.
    reason: lexical_alternative
  - marker: b
    text: Or, 'when it had been shaved' or 'after he had been shaved.' The Hebrew
      permits slightly different ways of expressing the temporal clause and its implied
      referent.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּחֶל
  chosen: began
  alternatives:
  - started
  lexicon: HALOT
  rationale: From חלל/יחל in the Hiphil/wayyiqtol idiom meaning 'to begin.' 'Began'
    is the standard, natural English rendering and fits the infinitive that follows.
- source_word: שְׂעַר רֹאשׁוֹ
  chosen: the hair of his head
  alternatives:
  - his head hair
  - his hair
  lexicon: HALOT
  rationale: A construct chain literally meaning 'the hair of his head.' This fuller
    rendering preserves the Hebrew expression and its emphasis on Samson's head hair,
    which is contextually significant in the narrative.
- source_word: לְצַמֵּחַ
  chosen: to grow again
  alternatives:
  - to grow
  - to sprout
  lexicon: HALOT
  rationale: The verb צמח means 'to sprout/grow.' In context, because the hair had
    previously been removed, English naturally expresses the sense as 'grow again.'
    This is a contextually warranted expansion, not a paraphrase.
- source_word: כַּאֲשֶׁר
  chosen: after
  alternatives:
  - when
  - as
  lexicon: HALOT
  rationale: Though often rendered 'as/when,' here the clause marks the circumstance
    following the shaving. 'After' communicates the temporal relationship clearly
    in idiomatic English.
- source_word: גֻּלָּח
  chosen: it had been shaved
  alternatives:
  - he had been shaved
  - it was shaved
  lexicon: HALOT
  rationale: Passive of גלח, 'to shave.' The most immediate referent in English is
    the hair, so 'it had been shaved' avoids ambiguity while preserving the passive
    sense. 'He had been shaved' is possible by sense, but the Hebrew clause most directly
    follows the subject 'hair.'
