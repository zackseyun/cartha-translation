id: JDG.16.16
reference: Judges 16:16
source:
  edition: WLC
  text: וַ֠/יְהִי כִּֽי הֵצִ֨יקָה לּ֧/וֹ בִ/דְבָרֶ֛י/הָ כָּל הַ/יָּמִ֖ים וַ/תְּאַֽלֲצֵ֑/הוּ
    וַ/תִּקְצַ֥ר נַפְשׁ֖/וֹ לָ/מֽוּת־־׃
translation:
  text: And it happened that, when she pressed him with her words all the days and
    urged him on, his soul grew short to the point of death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'his soul grew short to die,' an idiom expressing extreme
      anguish, impatience, or exhaustion.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כִּי
  chosen: And it happened that, when
  alternatives:
  - And it came to pass, when
  - When
  lexicon: HALOT
  rationale: Retains the narrative transition introduced by וַיְהִי while using readable
    modern English. 'And it came to pass' is more traditional but archaic; reducing
    to 'When' would lose some of the Hebrew narrative flavor.
- source_word: הֵצִיקָה לוֹ
  chosen: she pressed him
  alternatives:
  - she harassed him
  - she distressed him
  - she vexed him
  lexicon: HALOT
  rationale: The verb conveys causing distress or pressure. 'Pressed him' fits the
    immediate context of persistent verbal pressure and pairs naturally with 'with
    her words.'
- source_word: בִּדְבָרֶיהָ
  chosen: with her words
  alternatives:
  - by her words
  - with what she said
  lexicon: HALOT
  rationale: A straightforward rendering of the instrumental beth plus 'her words.'
    'With her words' preserves the concrete expression without unnecessary paraphrase.
- source_word: כָּל הַיָּמִים
  chosen: all the days
  alternatives:
  - every day
  - continually
  lexicon: HALOT
  rationale: More formally reflects the Hebrew phrase while still sounding natural.
    It conveys repeated persistence over time better than the more interpretive 'continually.'
- source_word: וַתְּאַלֲצֵהוּ
  chosen: urged him on
  alternatives:
  - pressed him
  - importuned him
  - badgered him
  lexicon: HALOT
  rationale: This verb intensifies Delilah's coercive persistence. Since הֵצִיקָה
    already carries the idea of pressing, 'urged him on' avoids awkward repetition
    while preserving the cumulative force.
- source_word: וַתִּקְצַר נַפְשׁוֹ
  chosen: his soul grew short
  alternatives:
  - he became impatient
  - his patience ran out
  - he was worn out
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of the soul becoming short, expressing
    extreme inner constriction or exasperation. The more literal rendering preserves
    the idiom's vividness; an English reader can still understand it in context.
- source_word: לָמוּת
  chosen: to the point of death
  alternatives:
  - unto death
  - so that he wanted to die
  - to death
  lexicon: HALOT
  rationale: 'This captures the resultative force of the infinitive in context: Samson
    was driven to an extreme state, not necessarily making an explicit statement of
    suicidal desire. ''To the point of death'' is idiomatic and precise.'
