id: JDG.16.18
reference: Judges 16:18
source:
  edition: WLC
  text: וַ/תֵּ֣רֶא דְלִילָ֗ה כִּֽי הִגִּ֣יד לָ/הּ֮ אֶת כָּל לִבּ/וֹ֒ וַ/תִּשְׁלַ֡ח
    וַ/תִּקְרָא֩ לְ/סַרְנֵ֨י פְלִשְׁתִּ֤ים לֵ/אמֹר֙ עֲל֣וּ הַ/פַּ֔עַם כִּֽי הִגִּ֥יד
    ל/ה אֶת כָּל לִבּ֑/וֹ וְ/עָל֤וּ אֵלֶ֨י/הָ֙ סַרְנֵ֣י פְלִשְׁתִּ֔ים וַ/יַּעֲל֥וּ
    הַ/כֶּ֖סֶף בְּ/יָדָֽ/ם־־־־־־׃
translation:
  text: When Delilah saw that he had told her all his heart, she sent and called for
    the Philistine rulers, saying, “Come up this time, for he has told her all his
    heart.” Then the Philistine rulers came up to her and brought the silver in their
    hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''for he has told her all his heart.'' In direct speech, some readers
      may expect ''me'' instead of ''her,'' but the received Hebrew text reads third
      person feminine singular.'
    reason: textual_variant
  - marker: b
    text: Or 'the lords of the Philistines.'
    reason: lexical_alternative
  - marker: c
    text: That is, silver as payment.
    reason: cultural_note
lexical_decisions:
- source_word: וַתֵּרֶא
  chosen: When ... saw
  alternatives:
  - and ... saw
  - realized
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. Rendering with 'When ...
    saw' captures both the temporal force in context and natural English narrative
    flow. 'Realized' is interpretive and less tied to the visual verb ראה.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'After ''saw,'' כִּי introduces the content of what Delilah perceived:
    ''that he had told her...'' rather than a causal ''because.'''
- source_word: הִגִּיד
  chosen: had told
  alternatives:
  - declared
  - made known
  lexicon: HALOT
  rationale: נגד in Hiphil commonly means 'tell, declare, make known.' 'Had told'
    is the most natural modern English in this narrative setting.
- source_word: אֶת־כָּל לִבּוֹ
  chosen: all his heart
  alternatives:
  - his whole heart
  - everything in his heart
  lexicon: HALOT
  rationale: 'A literal rendering preserves the Hebrew idiom and its narrative significance:
    Samson has fully disclosed himself. ''Everything in his heart'' is possible but
    more expansive than the Hebrew phrase.'
- source_word: וַתִּשְׁלַח וַתִּקְרָא
  chosen: she sent and called for
  alternatives:
  - she sent and summoned
  - she sent word and called
  lexicon: HALOT
  rationale: The two verbs are both retained to preserve the Hebrew sequence. 'Called
    for' communicates the summoning force without awkwardness.
- source_word: סַרְנֵי פְלִשְׁתִּים
  chosen: the Philistine rulers
  alternatives:
  - the lords of the Philistines
  - the Philistine chiefs
  lexicon: HALOT
  rationale: סרן denotes the high officials/rulers of the Philistines. 'Rulers' is
    clear modern English; 'lords' is traditional but may sound feudal and less transparent.
- source_word: עֲלוּ הַפַּעַם
  chosen: Come up this time
  alternatives:
  - Come up now
  - Come up this once
  lexicon: HALOT
  rationale: עלה here reflects movement to Delilah's location. 'This time' matches
    הַפַּעַם naturally in context, indicating that now the true opportunity has arrived.
- source_word: כִּי הִגִּיד לָהּ אֶת־כָּל לִבּוֹ
  chosen: for he has told her all his heart
  alternatives:
  - for he has told me all his heart
  lexicon: HALOT
  rationale: The consonantal text has third feminine singular pronoun ('her'). Although
    first person would fit the direct speech context more idiomatically in English,
    the received Hebrew reads 'her,' so the translation preserves it rather than emending.
- source_word: וְעָלוּ אֵלֶיהָ
  chosen: Then ... came up to her
  alternatives:
  - and ... went up to her
  lexicon: HALOT
  rationale: '''Came up to her'' is idiomatic in English and preserves the directional
    sense of עלה toward Delilah.'
- source_word: וַיַּעֲלוּ הַכֶּסֶף בְּיָדָם
  chosen: and brought the silver in their hands
  alternatives:
  - and brought up the silver in their hands
  - and carried the money in their hands
  lexicon: HALOT
  rationale: The phrase indicates that they came carrying the payment. 'Silver' is
    more literal than 'money' and fits the likely sense of payment metal; 'brought'
    communicates the action naturally in English while retaining the object and instrument
    phrase.
