id: JDG.16.19
reference: Judges 16:19
source:
  edition: WLC
  text: וַ/תְּיַשְּׁנֵ֨/הוּ֙ עַל בִּרְכֶּ֔י/הָ וַ/תִּקְרָ֣א לָ/אִ֔ישׁ וַ/תְּגַלַּ֕ח
    אֶת שֶׁ֖בַע מַחְלְפ֣וֹת רֹאשׁ֑/וֹ וַ/תָּ֨חֶל֙ לְ/עַנּוֹת֔/וֹ וַ/יָּ֥סַר כֹּח֖/וֹ
    מֵ/עָלָֽי/ו־־׃
translation:
  text: So she made him sleep on her knees, and she called for the man, and she shaved
    off the seven locks of his head. Then she began to afflict him, and his strength
    left him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on her lap'; literally 'on her knees.'
    reason: lexical_alternative
  - marker: b
    text: Or 'she summoned a man' / 'she called a man.' The Hebrew can refer either
      to calling for a man already in view or summoning a man for the task.
    reason: alternative_reading
  - marker: c
    text: Or 'the seven braids of his head.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּיַשְּׁנֵהוּ
  chosen: she made him sleep
  alternatives:
  - she put him to sleep
  - she lulled him to sleep
  lexicon: HALOT
  rationale: 'Hiphil of ישׁן expresses causation: Delilah causes Samson to sleep.
    ''Made him sleep'' is a clear, natural rendering that preserves the causative
    force without over-specifying method.'
- source_word: עַל בִּרְכֶּיהָ
  chosen: on her knees
  alternatives:
  - on her lap
  lexicon: HALOT
  rationale: Literally 'on her knees.' Although English idiom may use 'lap,' the Hebrew
    noun is explicitly 'knees,' and this is sufficiently natural in English, so the
    more literal rendering is preferred.
- source_word: וַתִּקְרָא לָאִישׁ
  chosen: she called for the man
  alternatives:
  - she called a man
  - she summoned the man
  lexicon: HALOT
  rationale: The preposition ל with אִישׁ most naturally means 'called for the man'
    or 'summoned the man,' implying she had someone come to perform the shaving. 'Called
    for the man' preserves the narrative flow and avoids implying an indefinite new
    character more strongly than the Hebrew does.
- source_word: וַתְּגַלַּח
  chosen: she shaved off
  alternatives:
  - he shaved off
  - she had shaved off
  lexicon: HALOT
  rationale: The verb is feminine singular, matching Delilah as subject in the Hebrew
    form as pointed here. English can retain her as grammatical subject even if she
    acts through the summoned man. 'Shaved off' captures the removal sense.
- source_word: שֶׁבַע מַחְלְפוֹת רֹאשׁוֹ
  chosen: the seven locks of his head
  alternatives:
  - the seven braids of his head
  - the seven strands of his hair
  lexicon: HALOT
  rationale: מַחְלְפוֹת refers to locks/braids of hair. 'Locks' is idiomatic and traditional
    without being archaic. Including 'of his head' reflects the Hebrew genitive construction.
- source_word: וַתָּחֶל
  chosen: Then she began
  alternatives:
  - and she began
  lexicon: HALOT
  rationale: The verb marks the inception of the next action. 'Then she began' gives
    good English narrative sequence while preserving the ingressive sense.
- source_word: לְעַנּוֹתוֹ
  chosen: to afflict him
  alternatives:
  - to weaken him
  - to torment him
  - to humble him
  lexicon: HALOT
  rationale: ענה in the Piel commonly means afflict, oppress, or humble. In this context
    it likely refers to the onset of mistreatment/testing after his hair is cut. 'Afflict'
    is broad enough to preserve the Hebrew without narrowing it to a specific mechanism
    such as weakening.
- source_word: וַיָּסַר כֹּחוֹ מֵעָלָיו
  chosen: his strength left him
  alternatives:
  - his strength departed from him
  - his power turned aside from upon him
  lexicon: HALOT
  rationale: The idiom means that his strength departed. 'Left him' is natural modern
    English and accurately conveys the loss of strength.
