theological_decisions:
- issue: Nature of Samson's lost power
  chosen_reading: Render the text phenomenologically as 'his strength left him' without
    adding an explicit reference to the LORD in this verse.
  alternative_readings:
  - Interpretively expanding to 'the LORD's strength left him'
  rationale: This verse itself states only that Samson's strength departed from him.
    The broader context connects his strength to his Nazirite status and the LORD's
    empowerment, but importing that explicitly here would add information not stated
    in this verse. This preserves theological tension and avoids doctrinal over-interpretation.
  doctrine_reference: Translation philosophy §1, §3
