id: JDG.16.2
reference: Judges 16:2
source:
  edition: WLC
  text: לַֽ/עַזָּתִ֣ים לֵ/אמֹ֗ר בָּ֤א שִׁמְשׁוֹן֙ הֵ֔נָּה וַ/יָּסֹ֛בּוּ וַ/יֶּאֶרְבוּ
    ל֥/וֹ כָל הַ/לַּ֖יְלָה בְּ/שַׁ֣עַר הָ/עִ֑יר וַ/יִּתְחָרְשׁ֤וּ כָל הַ/לַּ֨יְלָה֙
    לֵ/אמֹ֔ר עַד א֥וֹר הַ/בֹּ֖קֶר וַ/הֲרְגְנֻֽ/הוּ׀־־־־׃
translation:
  text: The Gazites were told, saying, “Samson has come here.” So they surrounded
    the place and lay in wait for him all night at the city gate. They kept quiet
    all night, saying, “Until the light of morning, then we will kill him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The people of Gaza were told' or 'The Gazans were told.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'remained silent' or 'kept still' all night; the Hebrew suggests stealthy
      silence while waiting in ambush.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'until the light of the morning.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַעַזָּתִים
  chosen: The Gazites
  alternatives:
  - the people of Gaza
  - the Gazans
  lexicon: HALOT
  rationale: Gentilic plural referring to the inhabitants of Gaza. 'Gazites' is a
    concise, standard English rendering that preserves the ethnic/local designation.
- source_word: לֵאמֹר
  chosen: were told, saying
  alternatives:
  - it was said to
  - they were told
  lexicon: HALOT
  rationale: 'The construction introduces reported speech. Because the Hebrew lacks
    an explicit passive verb before ''saying,'' English supplies a natural passive
    sense: news came to the Gazites. ''Were told, saying'' preserves the reporting
    function without over-paraphrasing.'
- source_word: בָּא ... הֵנָּה
  chosen: has come here
  alternatives:
  - came here
  - has arrived here
  lexicon: HALOT
  rationale: The perfect reports the arrival as a present fact relevant to the ensuing
    action. 'Has come here' captures that force in idiomatic English.
- source_word: וַיָּסֹבּוּ
  chosen: surrounded the place
  alternatives:
  - went around
  - encircled
  lexicon: HALOT
  rationale: The verb means to go around or surround. In context of an ambush at the
    city gate, the sense is tactical encirclement. 'The place' is implied by context
    though not explicit in Hebrew; it makes the English intelligible.
- source_word: וַיֶּאֶרְבוּ לוֹ
  chosen: lay in wait for him
  alternatives:
  - ambushed him
  - set an ambush for him
  lexicon: HALOT
  rationale: A standard idiomatic rendering of ארב with ל, expressing hostile waiting
    in ambush.
- source_word: כָל הַלַּיְלָה
  chosen: all night
  alternatives:
  - the whole night
  lexicon: HALOT
  rationale: Natural English equivalent preserving the full duration.
- source_word: בְּשַׁעַר הָעִיר
  chosen: at the city gate
  alternatives:
  - in the gate of the city
  - by the city gate
  lexicon: HALOT
  rationale: Refers to the gate area of the city, the strategic exit point. 'At the
    city gate' is idiomatic and sufficiently precise.
- source_word: וַיִּתְחָרְשׁוּ
  chosen: kept quiet
  alternatives:
  - remained silent
  - kept still
  lexicon: HALOT
  rationale: The hitpael here conveys acting silently/stealthily. 'Kept quiet' fits
    the ambush context and readable modern English.
- source_word: עַד אוֹר הַבֹּקֶר
  chosen: Until the light of morning
  alternatives:
  - until morning light
  - until daybreak
  lexicon: HALOT
  rationale: Literally 'until the light of the morning.' The chosen rendering preserves
    the imagery while remaining natural. 'Daybreak' is possible but slightly more
    interpretive.
- source_word: וַהֲרְגְנֻהוּ
  chosen: then we will kill him
  alternatives:
  - and we will kill him
  - let us kill him
  lexicon: HALOT
  rationale: 'First common plural with 3ms suffix: ''and/we will kill him.'' In English
    direct speech after ''until the light of morning,'' ''then we will kill him''
    makes the temporal sequence explicit.'
