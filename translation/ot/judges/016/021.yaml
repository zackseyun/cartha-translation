id: JDG.16.21
reference: Judges 16:21
source:
  edition: WLC
  text: וַ/יֹּאחֲז֣וּ/הוּ פְלִשְׁתִּ֔ים וַֽ/יְנַקְּר֖וּ אֶת עֵינָ֑י/ו וַ/יּוֹרִ֨ידוּ
    אוֹת֜/וֹ עַזָּ֗תָ/ה וַ/יַּאַסְר֨וּ/הוּ֙ בַּֽ/נְחֻשְׁתַּ֔יִם וַ/יְהִ֥י טוֹחֵ֖ן
    בְּ/בֵ֥ית ה/אסירים־׃
translation:
  text: Then the Philistines seized him, gouged out his eyes, brought him down to
    Gaza, bound him with bronze shackles, and he was grinding in the prison house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'put out his eyes.' The Hebrew verb is a concrete term for mutilating
      the eyes; 'gouged out' makes the violence explicit.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the prison.' Literally, 'in the house of the prisoners.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאחֲזוּהוּ
  chosen: seized him
  alternatives:
  - took hold of him
  - captured him
  lexicon: HALOT
  rationale: The verb from אחז denotes taking hold or grasping. 'Seized him' is concise,
    forceful, and fits the hostile action in context better than the more neutral
    'took hold of him.'
- source_word: פְלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard transliteration for the people group; definite article is natural
    in English for the known group acting here.
- source_word: וַיְנַקְּרוּ אֶת עֵינָיו
  chosen: gouged out his eyes
  alternatives:
  - put out his eyes
  - blinded him
  lexicon: HALOT
  rationale: The verb נקר in this context refers concretely to mutilating the eyes.
    'Gouged out his eyes' preserves the graphic physical sense better than the traditional
    but slightly euphemistic 'put out his eyes' or the more general 'blinded him.'
- source_word: וַיּוֹרִידוּ אֹתוֹ עַזָּתָה
  chosen: brought him down to Gaza
  alternatives:
  - took him down to Gaza
  - led him down to Gaza
  lexicon: HALOT
  rationale: ירד in the causative commonly means 'bring down' or 'take down.' 'Brought
    him down' is natural English and preserves the directional nuance toward Gaza.
- source_word: עַזָּתָה
  chosen: to Gaza
  lexicon: HALOT
  rationale: Directional he on the place name indicates motion toward Gaza; rendered
    idiomatically as 'to Gaza.'
- source_word: וַיַּאַסְרוּהוּ
  chosen: bound him
  alternatives:
  - imprisoned him
  - tied him
  lexicon: HALOT
  rationale: אסר means to bind or fetter. 'Bound him' fits the following instrumental
    phrase about shackles and avoids collapsing the action into the later imprisonment
    setting.
- source_word: בַּנְחֻשְׁתַּיִם
  chosen: with bronze shackles
  alternatives:
  - with bronze fetters
  - with bronze chains
  lexicon: HALOT
  rationale: The dual/plural form refers to metal restraints. 'Bronze shackles' is
    clear modern English and likely more precise than 'chains.' 'Bronze' is preferred
    over 'brass' as the usual rendering of נְחֹשֶׁת in biblical contexts.
- source_word: וַיְהִי טוֹחֵן
  chosen: he was grinding
  alternatives:
  - he became a grinder
  - he ground grain
  lexicon: HALOT
  rationale: The construction presents his resulting state/activity. 'He was grinding'
    communicates ongoing forced labor without adding an explicit object absent from
    the Hebrew.
- source_word: בְּבֵית הָאֲסִירִים
  chosen: in the prison house
  alternatives:
  - in the prison
  - in the house of prisoners
  lexicon: HALOT
  rationale: Literally 'in the house of the prisoners/prisoners' house.' 'Prison house'
    preserves the concrete Hebrew expression better than the flatter 'prison,' while
    remaining understandable in English.
