id: JDG.16.3
reference: Judges 16:3
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֣ב שִׁמְשׁוֹן֮ עַד חֲצִ֣י הַ/לַּיְלָה֒ וַ/יָּ֣קָם בַּ/חֲצִ֣י הַ/לַּ֗יְלָה
    וַ/יֶּאֱחֹ֞ז בְּ/דַלְת֤וֹת שַֽׁעַר הָ/עִיר֙ וּ/בִ/שְׁתֵּ֣י הַ/מְּזוּז֔וֹת וַ/יִּסָּעֵ/ם֙
    עִֽם הַ/בְּרִ֔יחַ וַ/יָּ֖שֶׂם עַל כְּתֵפָ֑י/ו וַֽ/יַּעֲלֵ/ם֙ אֶל רֹ֣אשׁ הָ/הָ֔ר
    אֲשֶׁ֖ר עַל פְּנֵ֥י חֶבְרֽוֹן־׀־־־־־׃פ
translation:
  text: And Samson lay down until midnight. Then he arose at midnight and seized the
    doors of the city gate and the two doorposts, and pulled them up with the bar;
    he put them on his shoulders and carried them up to the top of the hill that is
    opposite Hebron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tore them out with the bar.' The Hebrew verb can denote pulling out
      or uprooting from place.
    reason: lexical_alternative
  - marker: b
    text: Or 'the hill that faces Hebron.' The Hebrew idiom literally says 'upon the
      face of Hebron.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: lay down
  alternatives:
  - lay
  - slept
  lexicon: HALOT
  rationale: The verb שׁכב commonly means 'lie down' or 'sleep.' Here 'lay down' preserves
    the physical action without overstating whether sleep is emphasized.
- source_word: עַד חֲצִי הַלַּיְלָה / בַּחֲצִי הַלַּיְלָה
  chosen: until midnight / at midnight
  alternatives:
  - until the middle of the night / in the middle of the night
  lexicon: HALOT
  rationale: English 'midnight' is the most natural equivalent for 'half/middle of
    the night' in both clauses and preserves the narrative timing clearly.
- source_word: וַיֶּאֱחֹז
  chosen: seized
  alternatives:
  - took hold of
  - grasped
  lexicon: HALOT
  rationale: A strong verb fits the forceful action in context better than the more
    neutral 'took hold of.'
- source_word: דַּלְתוֹת שַׁעַר הָעִיר
  chosen: the doors of the city gate
  alternatives:
  - the gate leaves of the city gate
  - the doors of the gate of the city
  lexicon: HALOT
  rationale: This refers to the paired gate doors. 'Doors of the city gate' is idiomatic
    modern English while retaining the architectural sense.
- source_word: וּבִשְׁתֵּי הַמְּזוּזוֹת
  chosen: and the two doorposts
  alternatives:
  - and the two posts
  - and the two jambs
  lexicon: HALOT
  rationale: מְזוּזוֹת are the side posts/jambs of a doorway or gate. 'Doorposts'
    is clear and natural for modern readers.
- source_word: וַיִּסָּעֵם עִם הַבְּרִיחַ
  chosen: pulled them up with the bar
  alternatives:
  - tore them out with the bar
  - uprooted them with the bar
  lexicon: HALOT
  rationale: The verb נסע in this context conveys removing or pulling out from their
    place. 'Pulled them up' captures the action without adding excessive vividness
    beyond the Hebrew. 'With the bar' indicates the gate bar was taken along with
    them.
- source_word: וַיָּשֶׂם עַל כְּתֵפָיו
  chosen: he put them on his shoulders
  alternatives:
  - he placed them on his shoulders
  - he set them on his shoulders
  lexicon: HALOT
  rationale: Straightforward rendering of the idiom; plural 'shoulders' matches English
    usage for carrying a load across the upper back.
- source_word: וַיַּעֲלֵם
  chosen: carried them up
  alternatives:
  - brought them up
  - took them up
  lexicon: HALOT
  rationale: The suffix refers to the removed gate components. 'Carried them up' makes
    explicit the manner implied by the previous clause about placing them on his shoulders.
- source_word: אֶל רֹאשׁ הָהָר
  chosen: to the top of the hill
  alternatives:
  - to the top of the mountain
  - to the summit of the hill
  lexicon: HALOT
  rationale: רֹאשׁ הָהָר is literally 'head/top of the mountain/hill.' Given the narrative
    setting and readable English, 'top of the hill' is a suitable optimal-equivalence
    rendering.
- source_word: אֲשֶׁר עַל פְּנֵי חֶבְרוֹן
  chosen: that is opposite Hebron
  alternatives:
  - that faces Hebron
  - that is before Hebron
  lexicon: HALOT
  rationale: The idiom עַל־פְּנֵי often means 'in front of' or 'opposite/facing.'
    'Opposite Hebron' is concise and preserves the geographical relation without over-specifying.
