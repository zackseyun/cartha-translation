theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nature of divine withdrawal in 'the LORD had departed from him'
  chosen_reading: Retain the text's statement of the LORD's departure without explaining its mechanism
  alternative_readings:
  - the LORD had left him
  - the LORD's empowering presence had departed from him
  rationale: The verse states divine departure but does not explicitly parse whether this refers specifically to empowering presence, covenant favor, or another theological category. To preserve theological tension and avoid importing a system-specific explanation, the translation stays close to the Hebrew wording.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
