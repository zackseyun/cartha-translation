id: JDG.16.20
reference: Judges 16:20
source:
  edition: WLC
  text: וַ/תֹּ֕אמֶר פְּלִשְׁתִּ֥ים עָלֶ֖י/ךָ שִׁמְשׁ֑וֹן וַ/יִּקַ֣ץ מִ/שְּׁנָת֗/וֹ וַ/יֹּ֨אמֶר֙ אֵצֵ֞א כְּ/פַ֤עַם בְּ/פַ֨עַם֙ וְ/אִנָּעֵ֔ר וְ/הוּא֙ לֹ֣א יָדַ֔ע כִּ֥י יְהוָ֖ה סָ֥ר מֵ/עָלָֽי/ו׃
translation:
  text: And she said, “The Philistines are upon you, Samson!” And he awoke from his sleep and said, “I will go out as at other times and shake myself free.” But he did not know that Yahweh had departed from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “and shake myself,” with the sense likely being to shake himself loose or free as on previous occasions.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּלִשְׁתִּים עָלֶיךָ
  chosen: The Philistines are upon you
  alternatives:
  - The Philistines are attacking you
  - The Philistines are on you
  lexicon: HALOT
  rationale: The idiom עַל with a hostile subject signals imminent attack or seizure. 'Are upon you' preserves the vividness and traditional force without sounding archaic beyond comprehension.
- source_word: וַיִּקַץ מִשְּׁנָתוֹ
  chosen: he awoke from his sleep
  alternatives:
  - he woke up from his sleep
  lexicon: HALOT
  rationale: A straightforward rendering of the verb יקץ plus the prepositional phrase. 'Awoke' is slightly more literary but still natural in modern English.
- source_word: אֵצֵא
  chosen: I will go out
  alternatives:
  - I will go forth
  lexicon: HALOT
  rationale: The verb יצא commonly means 'go out.' This likely implies going out to confront the attackers, but the text itself states only 'go out,' so the translation avoids over-specification.
- source_word: כְּפַעַם בְּפַעַם
  chosen: as at other times
  alternatives:
  - as before
  - as time after time
  lexicon: HALOT
  rationale: The idiom refers to previous repeated occasions. 'As at other times' communicates recurrence naturally in English and fits Samson's assumption that this occasion will be like the earlier ones.
- source_word: וְאִנָּעֵר
  chosen: and shake myself free
  alternatives:
  - and shake myself
  - and free myself
  lexicon: HALOT
  rationale: The Niphal of נער here conveys shaking oneself loose or free, likely from the Philistines' grasp or from drowsiness into action. 'Shake myself free' makes the implied result explicit enough for English while staying close to the idiom.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: סָר מֵעָלָיו
  chosen: had departed from him
  alternatives:
  - had turned away from him
  - had left him
  lexicon: HALOT
  rationale: סור with מן/מעל indicates withdrawal or departure. 'Had departed from him' preserves the solemn theological force of divine withdrawal without adding interpretive detail about permanence or covenant status.
