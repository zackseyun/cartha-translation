id: JDG.16.27
reference: Judges 16:27
source:
  edition: WLC
  text: וְ/הַ/בַּ֗יִת מָלֵ֤א הָֽ/אֲנָשִׁים֙ וְ/הַ/נָּשִׁ֔ים וְ/שָׁ֕מָּ/ה כֹּ֖ל סַרְנֵ֣י
    פְלִשְׁתִּ֑ים וְ/עַל הַ/גָּ֗ג כִּ/שְׁלֹ֤שֶׁת אֲלָפִים֙ אִ֣ישׁ וְ/אִשָּׁ֔ה הָ/רֹאִ֖ים
    בִּ/שְׂח֥וֹק שִׁמְשֽׁוֹן־׃
translation:
  text: Now the house was full of men and women, and all the lords of the Philistines
    were there. And on the roof were about three thousand men and women watching Samson
    as he entertained them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'watching Samson perform' or more formally, 'watching Samson at sport.'
      The Hebrew expression uses the root שׂחק, which can denote laughing, playing,
      sporting, or entertaining.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the building
  - the temple hall
  lexicon: HALOT
  rationale: Basic sense is 'house/building.' In this context it refers to the structure
    of the Philistine gathering, likely the temple complex of Dagon, but the Hebrew
    here simply says 'the house,' so 'house' preserves the source wording without
    over-specifying.
- source_word: מָלֵא
  chosen: was full of
  alternatives:
  - was filled with
  lexicon: HALOT
  rationale: Predicate verb meaning 'to be full.' 'Was full of' is idiomatic modern
    English and closely matches the Hebrew stative sense.
- source_word: הָאֲנָשִׁים ... וְהַנָּשִׁים
  chosen: men and women
  alternatives:
  - the men and the women
  lexicon: HALOT
  rationale: The pair explicitly marks both sexes present in the crowd. English drops
    repeated articles naturally while preserving the gender-accurate distinction required
    by the source.
- source_word: וְשָׁמָּה
  chosen: were there
  alternatives:
  - were present there
  - were there present
  lexicon: HALOT
  rationale: Adverb of place, linked with the following clause. 'Were there' gives
    natural English while retaining the locative emphasis.
- source_word: כֹּל סַרְנֵי פְלִשְׁתִּים
  chosen: all the lords of the Philistines
  alternatives:
  - all the rulers of the Philistines
  - all the Philistine chiefs
  lexicon: HALOT
  rationale: סַרְנֵי refers to the distinctive Philistine rulers. 'Lords' is a conventional
    and suitably elevated rendering; 'rulers' or 'chiefs' are possible, but 'lords'
    best reflects the political rank without flattening the title.
- source_word: וְעַל הַגָּג
  chosen: And on the roof were
  alternatives:
  - And on the rooftop were
  - Now on the roof there were
  lexicon: HALOT
  rationale: גָּג is 'roof/rooftop.' 'On the roof were' preserves the Hebrew fronting
    of location and fits the architectural scene.
- source_word: כִּשְׁלֹשֶׁת אֲלָפִים
  chosen: about three thousand
  alternatives:
  - some three thousand
  - approximately three thousand
  lexicon: HALOT
  rationale: 'The prefixed כ indicates approximation/comparison here: ''about/as many
    as three thousand.'' ''About three thousand'' is concise and accurate.'
- source_word: אִישׁ וְאִשָּׁה
  chosen: men and women
  alternatives:
  - persons, both men and women
  lexicon: HALOT
  rationale: Though singular forms are used distributively, the sense is plural and
    mixed-gender. 'Men and women' is natural English and preserves the explicit gender
    reference.
- source_word: הָרֹאִים
  chosen: watching
  alternatives:
  - looking on
  - seeing
  lexicon: HALOT
  rationale: Participle describing the rooftop crowd's ongoing action. 'Watching'
    best fits the spectacle context.
- source_word: בִּשְׂחוֹק שִׁמְשׁוֹן
  chosen: as he entertained them
  alternatives:
  - while Samson performed
  - at Samson's sport
  - while Samson was made to amuse them
  lexicon: HALOT
  rationale: The phrase is difficult and context-sensitive. The root שׂחק can denote
    laughing, playing, sporting, or entertaining. Given the immediate narrative context
    (Samson brought out to amuse the Philistines), 'as he entertained them' communicates
    the likely sense in readable English. The more formal alternative 'at Samson's
    sport' is less clear in modern English, and 'performed' is possible but less explicit
    about the humiliating entertainment aspect.
