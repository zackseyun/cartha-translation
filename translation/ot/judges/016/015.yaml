id: JDG.16.15
reference: Judges 16:15
source:
  edition: WLC
  text: וַ/תֹּ֣אמֶר אֵלָ֗י/ו אֵ֚יךְ תֹּאמַ֣ר אֲהַבְתִּ֔י/ךְ וְ/לִבְּ/ךָ֖ אֵ֣ין אִתִּ֑/י
    זֶ֣ה שָׁלֹ֤שׁ פְּעָמִים֙ הֵתַ֣לְתָּ בִּ֔/י וְ/לֹא הִגַּ֣דְתָּ לִּ֔/י בַּ/מֶּ֖ה
    כֹּחֲ/ךָ֥ גָדֽוֹל־׃
translation:
  text: Then she said to him, “How can you say, ‘I love you,’ when your heart is not
    with me? These three times you have mocked me and have not told me in what your
    great strength lies.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you have toyed with me,' 'you have deceived me,' or 'you have made a
      fool of me.' The Hebrew verb carries the sense of trifling with someone through
      deceptive mockery.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיךְ
  chosen: How can
  alternatives:
  - How do
  - How is it that
  lexicon: HALOT
  rationale: Introduces Delilah’s incredulous challenge. 'How can' captures the rhetorical
    force in natural English better than a more wooden 'How do.'
- source_word: אֲהַבְתִּיךְ
  chosen: I love you
  alternatives:
  - I have loved you
  lexicon: HALOT
  rationale: The perfect with direct speech is best rendered as a present in English
    here, expressing Samson’s claimed ongoing affection rather than a past action.
- source_word: לִבְּךָ אֵין אִתִּי
  chosen: your heart is not with me
  alternatives:
  - your heart is not with me at all
  - your heart is not mine
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the Hebrew idiom of loyalty/inner
    commitment without over-interpreting it as possession or total alienation.
- source_word: זֶה שָׁלֹשׁ פְּעָמִים
  chosen: These three times
  alternatives:
  - This is three times
  - Three times now
  lexicon: HALOT
  rationale: Idiomatic English equivalent of the Hebrew demonstrative plus number
    expression, referring to the repeated prior incidents.
- source_word: הֵתַלְתָּ בִּי
  chosen: you have mocked me
  alternatives:
  - you have toyed with me
  - you have deceived me
  - you have made a fool of me
  lexicon: HALOT
  rationale: The verb conveys trifling with or making sport of someone through deception.
    'Mocked me' preserves the personal affront and fits the context of repeated misleading
    answers. Alternatives are possible, but 'mocked' best balances lexical force and
    readability.
- source_word: הִגַּדְתָּ לִּי
  chosen: have not told me
  alternatives:
  - have not declared to me
  - have not made known to me
  lexicon: HALOT
  rationale: Straightforward English equivalent for נגד in this conversational context;
    more formal options would sound stilted.
- source_word: בַּמֶּה כֹּחֲךָ גָדוֹל
  chosen: in what your great strength lies
  alternatives:
  - where your great strength is
  - by what your great strength is
  - what makes your strength so great
  lexicon: HALOT
  rationale: This rendering brings out the sense of the interrogative phrase as asking
    the basis or source of Samson’s extraordinary strength, not merely its location.
