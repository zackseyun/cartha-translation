id: JDG.16.9
reference: Judges 16:9
source:
  edition: WLC
  text: וְ/הָ/אֹרֵ֗ב יֹשֵׁ֥ב לָ/הּ֙ בַּ/חֶ֔דֶר וַ/תֹּ֣אמֶר אֵלָ֔י/ו פְּלִשְׁתִּ֥ים
    עָלֶ֖י/ךָ שִׁמְשׁ֑וֹן וַ/יְנַתֵּק֙ אֶת הַ/יְתָרִ֔ים כַּ/אֲשֶׁ֨ר יִנָּתֵ֤ק פְּתִֽיל
    הַ/נְּעֹ֨רֶת֙ בַּ/הֲרִיח֣/וֹ אֵ֔שׁ וְ/לֹ֥א נוֹדַ֖ע כֹּחֽ/וֹ־־׃
translation:
  text: Now the ambush was waiting for her in the inner room, and she said to him,
    “Philistines are upon you, Samson!” But he snapped the cords as a thread of tow
    snaps when it smells fire, and his strength was not discovered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the one lying in wait was in the room”; the Hebrew singular participle
      may function collectively for the concealed attackers.
    reason: lexical_alternative
  - marker: b
    text: Literally, “as a thread of tow is snapped when it smells fire.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֹרֵב
  chosen: the ambush
  alternatives:
  - the one lying in wait
  - the ambusher
  - the men in ambush
  lexicon: HALOT
  rationale: The participle from ארב denotes one lying in wait. In context it refers
    collectively to those concealed for an attack. 'The ambush' is natural English
    and preserves the tactical sense without over-specifying number.
- source_word: יֹשֵׁב
  chosen: was waiting
  alternatives:
  - was sitting
  - was staying
  lexicon: HALOT
  rationale: Although the verb is literally 'sitting/dwelling,' with an ambush context
    it idiomatically means remaining posted or waiting. 'Was waiting' best conveys
    the function of the concealed presence.
- source_word: לָהּ
  chosen: for her
  alternatives:
  - with her
  - belonging to her
  lexicon: HALOT
  rationale: 'The preposition with pronoun most naturally indicates location relative
    to Delilah: the ambush was positioned for her use or at her disposal. ''For her''
    fits the narrative setup.'
- source_word: בַּחֶדֶר
  chosen: in the inner room
  alternatives:
  - in the room
  - in the chamber
  lexicon: HALOT
  rationale: חֶדֶר is an inner room or chamber. 'Inner room' is slightly more specific
    and suits the hidden-ambush setting better than the generic 'room.'
- source_word: פְּלִשְׁתִּים עָלֶיךָ
  chosen: Philistines are upon you
  alternatives:
  - The Philistines are on you
  - The Philistines are attacking you
  - Philistines are against you
  lexicon: HALOT
  rationale: This is an alarm cry. 'Are upon you' preserves the idiomatic urgency
    of עַל in attack contexts and echoes the repeated refrain in the Samson narrative.
- source_word: וַיְנַתֵּק
  chosen: snapped
  alternatives:
  - tore off
  - broke apart
  - pulled loose
  lexicon: HALOT
  rationale: נתק conveys tearing or snapping apart. 'Snapped' is vivid, concise, and
    fits the comparison to a thread breaking.
- source_word: הַיְתָרִים
  chosen: the cords
  alternatives:
  - the bowstrings
  - the strings
  lexicon: HALOT
  rationale: In the immediate context these are the bindings placed on Samson. While
    the term can denote bowstrings, 'cords' is the broader and clearer rendering here,
    especially after they have dried and are used as restraints.
- source_word: פְּתִיל הַנְּעֹרֶת
  chosen: a thread of tow
  alternatives:
  - a cord of flax fiber
  - a string of tinder
  - a thread of loose fiber
  lexicon: HALOT
  rationale: פְּתִיל is thread/cord; נְעֹרֶת refers to shaken-off fiber, commonly
    tow or flax fiber. 'A thread of tow' is concise and preserves the image of something
    flimsy and combustible.
- source_word: בַּהֲרִיחוֹ אֵשׁ
  chosen: when it smells fire
  alternatives:
  - when it comes near fire
  - at the scent of fire
  - when fire touches it
  lexicon: HALOT
  rationale: The Hiphil infinitive of רוח here is literally 'at its smelling fire.'
    The unusual sensory expression should be preserved rather than flattened, so 'when
    it smells fire' keeps the Hebrew imagery while remaining intelligible.
- source_word: וְלֹא נוֹדַע כֹּחוֹ
  chosen: his strength was not discovered
  alternatives:
  - his strength was not known
  - the secret of his strength was not found out
  lexicon: HALOT
  rationale: The Niphal of ידע means 'became known.' 'Was not discovered' fits the
    narrative emphasis that the source of Samson's strength remained concealed, not
    merely unknown in the abstract.
