id: JDG.16.12
reference: Judges 16:12
source:
  edition: WLC
  text: וַ/תִּקַּ֣ח דְּלִילָה֩ עֲבֹתִ֨ים חֲדָשִׁ֜ים וַ/תַּאַסְרֵ֣/הוּ בָ/הֶ֗ם וַ/תֹּ֤אמֶר
    אֵלָי/ו֙ פְּלִשְׁתִּ֤ים עָלֶ֨י/ךָ֙ שִׁמְשׁ֔וֹן וְ/הָ/אֹרֵ֖ב יֹשֵׁ֣ב בֶּ/חָ֑דֶר
    וַֽ/יְנַתְּקֵ֛/ם מֵ/עַ֥ל זְרֹעֹתָ֖י/ו כַּ/חֽוּט׃
translation:
  text: Then Delilah took new ropes and bound him with them, and said to him, “The
    Philistines are upon you, Samson!” Now the ambush was sitting in the inner room,
    but he snapped them from off his arms like a thread.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cords' for 'ropes.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the one lying in wait was in the inner room.' The Hebrew uses a singular
      participle for the hidden watcher/ambush.
    reason: lexical_alternative
  - marker: c
    text: '''Inner room'' may also be rendered ''chamber.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲבֹתִים
  chosen: ropes
  alternatives:
  - cords
  lexicon: HALOT
  rationale: Refers to thick binding cords/ropes rather than fine strings. 'Ropes'
    is natural modern English and fits the contrast with 'like a thread' at the end
    of the verse.
- source_word: חֲדָשִׁים
  chosen: new
  alternatives:
  - fresh
  lexicon: HALOT
  rationale: Straightforward adjectival sense; 'new ropes' matches the narrative emphasis
    that these bindings had not been previously weakened.
- source_word: וַתַּאַסְרֵהוּ
  chosen: bound him
  alternatives:
  - tied him up
  lexicon: HALOT
  rationale: '''Bound'' preserves the more formal narrative diction and directly reflects
    the verb אסר.'
- source_word: פְּלִשְׁתִּים עָלֶיךָ
  chosen: The Philistines are upon you
  alternatives:
  - The Philistines are attacking you
  - The Philistines are on you
  lexicon: HALOT
  rationale: This is the idiomatic cry used in the Samson narrative. 'Are upon you'
    preserves the urgency and closeness of the Hebrew idiom without over-paraphrasing.
- source_word: וְהָאֹרֵב
  chosen: the ambush
  alternatives:
  - the one lying in wait
  - the ambusher
  lexicon: HALOT
  rationale: The singular participle refers collectively or functionally to the hidden
    attacker(s). 'The ambush' idiomatically captures the lurking setup in English
    better than the awkward singular personal form.
- source_word: יֹשֵׁב
  chosen: was sitting
  alternatives:
  - was staying
  - was waiting
  lexicon: HALOT
  rationale: The participle literally denotes sitting/dwelling. 'Was sitting' keeps
    the concrete image, though in context it implies waiting in concealment.
- source_word: בֶּחָדֶר
  chosen: in the inner room
  alternatives:
  - in the room
  - in the chamber
  lexicon: HALOT
  rationale: חֶדֶר often denotes an inner chamber or private room. 'Inner room' gives
    the likely sense of a concealed interior space from which the ambush could emerge.
- source_word: וַיְנַתְּקֵם
  chosen: he snapped them
  alternatives:
  - he tore them off
  - he broke them
  lexicon: HALOT
  rationale: The verb conveys forceful tearing loose or snapping apart. 'Snapped them'
    fits the image and the comparison to a thread.
- source_word: מֵעַל זְרֹעֹתָיו
  chosen: from off his arms
  alternatives:
  - off his arms
  - from his arms
  lexicon: HALOT
  rationale: The phrase is spatially explicit. 'From off his arms' preserves the Hebrew
    prepositional force while remaining readable.
- source_word: כַּחוּט
  chosen: like a thread
  alternatives:
  - like thread
  - like a string
  lexicon: HALOT
  rationale: חוּט is a thread/string. 'Like a thread' gives a vivid singular comparison
    and preserves the image of effortless breaking.
