id: JDG.18.16
reference: Judges 18:16
source:
  edition: WLC
  text: וְ/שֵׁשׁ מֵא֣וֹת אִ֗ישׁ חֲגוּרִים֙ כְּלֵ֣י מִלְחַמְתָּ֔/ם נִצָּבִ֖ים פֶּ֣תַח
    הַ/שָּׁ֑עַר אֲשֶׁ֖ר מִ/בְּנֵי דָֽן־־׃
translation:
  text: And six hundred men, armed with their weapons of war, were standing at the
    entrance of the gate—these were from the sons of Dan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who were Danites.' Literally, 'who were from the sons of Dan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/שֵׁשׁ מֵאוֹת אִישׁ
  chosen: And six hundred men
  alternatives:
  - Now six hundred men
  - And six hundred men
  lexicon: HALOT
  rationale: The conjunction וְ is naturally rendered 'and' in narrative sequence.
    אִישׁ after a numeral functions collectively, so 'men' is the natural English
    rendering.
- source_word: חֲגוּרִים
  chosen: armed
  alternatives:
  - girded
  - belted
  lexicon: HALOT
  rationale: The participle literally means 'girded,' here with weapons, so idiomatic
    English 'armed' best conveys the military sense without unnecessary archaism.
- source_word: כְּלֵי מִלְחַמְתָּם
  chosen: their weapons of war
  alternatives:
  - their weapons
  - their battle gear
  - their implements of war
  lexicon: HALOT
  rationale: כְּלִי is broad ('vessel, implement, weapon'), but in military context
    with מִלְחָמָה it refers to weapons/gear for battle. 'Weapons of war' preserves
    the Hebrew emphasis and avoids over-specifying a particular type of equipment.
- source_word: נִצָּבִים
  chosen: were standing
  alternatives:
  - stood
  - were stationed
  lexicon: HALOT
  rationale: The participle denotes a standing position or being posted. 'Were standing'
    preserves the participial, scene-setting force in English narrative.
- source_word: פֶּתַח הַשָּׁעַר
  chosen: at the entrance of the gate
  alternatives:
  - at the doorway of the gate
  - at the gate entrance
  lexicon: HALOT
  rationale: פֶּתַח is 'opening, entrance.' 'At the entrance of the gate' is a clear
    and fairly formal rendering that preserves both nouns.
- source_word: אֲשֶׁר מִבְּנֵי דָן
  chosen: these were from the sons of Dan
  alternatives:
  - who were from the sons of Dan
  - who belonged to the Danites
  - from the sons of Dan
  lexicon: HALOT
  rationale: The relative clause identifies the six hundred men. English requires
    some smoothing; 'these were from the sons of Dan' makes the referent explicit
    while preserving the Hebrew kinship expression 'sons of Dan' rather than replacing
    it with the more interpretive ethnic label 'Danites' in the main text.
