id: JDG.18.5
reference: Judges 18:5
source:
  edition: WLC
  text: וַ/יֹּ֥אמְרוּ ל֖/וֹ שְׁאַל נָ֣א בֵ/אלֹהִ֑ים וְ/נֵ֣דְעָ֔ה הֲ/תַצְלִ֣יחַ דַּרְכֵּ֔/נוּ
    אֲשֶׁ֥ר אֲנַ֖חְנוּ הֹלְכִ֥ים עָלֶֽי/הָ־׃
translation:
  text: And they said to him, “Please inquire of God, so that we may know whether
    our journey on which we are going will succeed.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “whether our way will prosper,” with “way” preserving the more literal
      Hebrew image.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ לוֹ
  chosen: And they said to him
  alternatives:
  - Then they said to him
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introduces the next event. 'And' preserves
    Hebrew narrative flow without overinterpreting temporal sequence.
- source_word: שְׁאַל נָא
  chosen: Please inquire
  alternatives:
  - Ask, please
  - Consult, please
  lexicon: HALOT
  rationale: שׁאל with נָא is a polite imperative. 'Inquire' fits the context of seeking
    divine guidance better than the more generic 'ask.' 'Please' conveys the softening
    force of נָא.
- source_word: בֵאלֹהִים
  chosen: of God
  alternatives:
  - of the gods
  - through God
  lexicon: HALOT
  rationale: 'In this context the singular sense is most natural: they are asking
    the priest to seek an oracle from Israel''s God. The preposition ב here is idiomatic
    with שׁאל in the sense ''inquire of/by means of'' God; English ''of God'' is the
    most natural rendering.'
- source_word: וְנֵדְעָה
  chosen: so that we may know
  alternatives:
  - and let us know
  - that we may know
  lexicon: HALOT
  rationale: The cohortative expresses purpose/result following the request. 'So that
    we may know' makes the relation clear in natural English.
- source_word: הֲתַצְלִיחַ
  chosen: will succeed
  alternatives:
  - will prosper
  - will be successful
  lexicon: HALOT
  rationale: The Hiphil of צלח commonly conveys prospering or succeeding. 'Will succeed'
    is clear modern English; 'prosper' is possible but can sound more economic than
    the context requires.
- source_word: דַּרְכֵּנוּ
  chosen: our journey
  alternatives:
  - our way
  - our path
  lexicon: HALOT
  rationale: Though literally 'our way/path,' the referent here is the expedition
    they are undertaking. 'Our journey' communicates the intended sense while remaining
    close to the Hebrew.
- source_word: אֲשֶׁר אֲנַחְנוּ הֹלְכִים עָלֶיהָ
  chosen: on which we are going
  alternatives:
  - that we are taking
  - in which we are walking
  lexicon: HALOT
  rationale: The clause literally describes the way 'upon which' they are going. 'On
    which we are going' preserves the imagery and syntax more closely than a freer
    idiom, while still reading naturally enough in context.
