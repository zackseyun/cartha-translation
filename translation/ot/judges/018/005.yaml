theological_decisions:
- issue: Reference of אֱלֹהִים
  chosen_reading: God (singular)
  alternative_readings:
  - gods
  rationale: Although אֱלֹהִים can be morphologically plural, the narrative context
    concerns seeking divine guidance through the priest, and the singular sense best
    fits the immediate discourse. This is a lexical-contextual decision, not a doctrinal
    expansion.
