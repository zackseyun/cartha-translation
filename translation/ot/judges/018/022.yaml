id: JDG.18.22
reference: Judges 18:22
source:
  edition: WLC
  text: הֵ֥מָּה הִרְחִ֖יקוּ מִ/בֵּ֣ית מִיכָ֑ה וְ/הָ/אֲנָשִׁ֗ים אֲשֶׁ֤ר בַּ/בָּתִּים֙
    אֲשֶׁר֙ עִם בֵּ֣ית מִיכָ֔ה נִֽזְעֲק֔וּ וַ/יַּדְבִּ֖יקוּ אֶת בְּנֵי דָֽן־־־׃
translation:
  text: When they had gone some distance from Micah’s house, the men who were in the
    houses near Micah’s house were called together, and they overtook the sons of
    Dan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'raised the alarm' for 'were called together.' The Hebrew verb can suggest
      either a cry of alarm or the gathering that results from it.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵמָּה
  chosen: they
  lexicon: HALOT
  rationale: Independent pronoun resumes the Danites and is naturally rendered by
    English subject pronoun 'they.'
- source_word: הִרְחִיקוּ
  chosen: had gone some distance
  alternatives:
  - had gone far
  - had moved away
  lexicon: HALOT
  rationale: From רחק in the causative/stative sense of becoming distant or going
    far away. English idiom 'had gone some distance' fits the narrative progression
    better than a wooden 'had made distant.'
- source_word: מִבֵּית מִיכָה
  chosen: from Micah’s house
  alternatives:
  - from the house of Micah
  lexicon: HALOT
  rationale: Construct phrase with preposition; possessive English is the most natural
    modern rendering.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the people
  lexicon: HALOT
  rationale: The Hebrew specifically uses 'men,' not a generic term for people; this
    follows the gender-accurate policy.
- source_word: אֲשֶׁר בַּבָּתִּים אֲשֶׁר עִם בֵּית מִיכָה
  chosen: who were in the houses near Micah’s house
  alternatives:
  - who were in the houses that were with Micah’s house
  - who were in the houses around Micah’s house
  lexicon: HALOT
  rationale: The phrase is somewhat awkward literally. עִם here conveys proximity/association,
    so 'near' captures the sense in readable English. 'In the houses' likely refers
    to neighboring households rather than occupants of Micah’s own house alone.
- source_word: נִזְעֲקוּ
  chosen: were called together
  alternatives:
  - were summoned
  - raised the alarm
  lexicon: HALOT
  rationale: Niphal of זעק here is best taken as a collective mustering/crying out
    in response to the theft. Because the following verb describes pursuit, 'were
    called together' conveys the gathering of neighbors for action. The alternative
    'raised the alarm' is possible and worth preserving.
- source_word: וַיַּדְבִּיקוּ
  chosen: and they overtook
  alternatives:
  - and they caught up with
  - and they pursued closely
  lexicon: HALOT
  rationale: The verb denotes catching up to or overtaking. 'Overtook' is concise
    and fits the narrative sequence.
- source_word: אֶת בְּנֵי דָן
  chosen: the sons of Dan
  alternatives:
  - the Danites
  lexicon: HALOT
  rationale: Formal kinship expression is retained here. 'Danites' is idiomatic but
    slightly less transparent to the Hebrew wording.
