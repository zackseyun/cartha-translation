id: JDG.18.31
reference: Judges 18:31
source:
  edition: WLC
  text: וַ/יָּשִׂ֣ימוּ לָ/הֶ֔ם אֶת פֶּ֥סֶל מִיכָ֖ה אֲשֶׁ֣ר עָשָׂ֑ה כָּל יְמֵ֛י הֱי֥וֹת
    בֵּית הָ/אֱלֹהִ֖ים בְּ/שִׁלֹֽה־־־׃פ
translation:
  text: So they set up for themselves Micah’s carved image that he had made, all the
    days that the house of God was in Shiloh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'idol.' The Hebrew term refers to a carved cult image; 'carved image'
      preserves the concrete sense, while 'idol' makes the function more explicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשִׂימוּ לָהֶם
  chosen: they set up for themselves
  alternatives:
  - they established for themselves
  - they placed for themselves
  lexicon: HALOT
  rationale: שׂים commonly means 'put/place/set.' In this cultic context with an idol,
    'set up' is idiomatic English and conveys installation for worship better than
    the flatter 'placed.' The reflexive nuance of לָהֶם is preserved with 'for themselves.'
- source_word: פֶּסֶל
  chosen: carved image
  alternatives:
  - idol
  - graven image
  lexicon: HALOT
  rationale: פֶּסֶל denotes an image fashioned for cultic use, often carved. 'Carved
    image' is a clear modern rendering that preserves the material/constructed sense
    better than the more interpretive 'idol,' while avoiding the archaic feel of 'graven
    image.'
- source_word: מִיכָה
  chosen: Micah
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: אֲשֶׁר עָשָׂה
  chosen: that he had made
  alternatives:
  - which he made
  lexicon: HALOT
  rationale: The relative clause modifies 'Micah’s carved image.' English past perfect
    ('had made') fits the narrative sequence naturally, indicating prior action relative
    to the setting up.
- source_word: כָּל יְמֵי
  chosen: all the days that
  alternatives:
  - throughout the time that
  - for as long as
  lexicon: HALOT
  rationale: A fairly literal rendering that preserves the durative temporal force.
    'All the days that' is natural enough in English and keeps close to the Hebrew
    idiom.
- source_word: הֱיוֹת
  chosen: was
  alternatives:
  - continued to be
  - existed
  lexicon: HALOT
  rationale: 'The infinitive construct of היה in this temporal expression is best
    rendered idiomatically in English with a finite verb: ''was.'''
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - the house of the true God
  - the sanctuary of God
  lexicon: HALOT
  rationale: The phrase straightforwardly denotes the recognized worship site/tabernacle.
    'House of God' is the most direct rendering. 'Sanctuary' is possible but less
    literal; 'true God' imports emphasis not explicit in the Hebrew.
- source_word: בְּשִׁלֹה
  chosen: in Shiloh
  rationale: Standard transliteration of the place name with the preposition rendered
    directly.
