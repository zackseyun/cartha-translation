theological_decisions:
- issue: Rendering בֵּית הָאֱלֹהִים in a context contrasting Dan's illicit cult with
    Israel's central worship site
  chosen_reading: the house of God
  alternative_readings:
  - the sanctuary of God
  - God’s house
  rationale: The Hebrew expression is not itself polemical, but in context it marks
    the coexistence of Dan's carved image with the legitimate worship center at Shiloh.
    'The house of God' preserves the source wording without adding interpretive commentary.
    This maintains the narrative's theological tension rather than resolving it with
    an expanded gloss.
  doctrine_reference: Preserve theological tension rather than resolve it.
