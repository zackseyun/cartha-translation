id: JDG.18.20
reference: Judges 18:20
source:
  edition: WLC
  text: וַ/יִּיטַב֙ לֵ֣ב הַ/כֹּהֵ֔ן וַ/יִּקַּח֙ אֶת הָ֣/אֵפ֔וֹד וְ/אֶת הַ/תְּרָפִ֖ים
    וְ/אֶת הַ/פָּ֑סֶל וַ/יָּבֹ֖א בְּ/קֶ֥רֶב הָ/עָֽם־־־׃
translation:
  text: And the priest’s heart was glad, and he took the ephod, the household idols,
    and the carved image, and went into the midst of the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the teraphim.' The Hebrew term refers to household cult objects or household
      gods.
    reason: lexical_alternative
  - marker: b
    text: Or 'idol' or 'graven image.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּיטַב לֵב
  chosen: the priest’s heart was glad
  alternatives:
  - the priest was pleased
  - the priest was glad
  lexicon: HALOT
  rationale: Literally 'the heart of the priest was good/glad.' Rendering the idiom
    with 'heart was glad' preserves the Hebrew expression while remaining natural
    English. 'Was pleased' is possible but slightly flattens the idiomatic imagery.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Straightforward rendering of the common noun for priest; the definite
    article is preserved.
- source_word: הָאֵפוֹד
  chosen: the ephod
  lexicon: HALOT
  rationale: A technical cultic term best transliterated rather than paraphrased,
    since English lacks a concise equivalent and 'ephod' is established usage.
- source_word: הַתְּרָפִים
  chosen: the household idols
  alternatives:
  - the teraphim
  - the household gods
  lexicon: HALOT
  rationale: Teraphim refers to household cult objects/deities. 'Household idols'
    communicates the sense clearly in modern English; 'teraphim' is more formal but
    less transparent, and 'household gods' could sound too theologically positive
    in English.
- source_word: הַפָּסֶל
  chosen: the carved image
  alternatives:
  - the idol
  - the graven image
  lexicon: HALOT
  rationale: פסל denotes an idol/image made by carving. 'Carved image' is both accurate
    and readable. 'Graven image' is traditional but archaic; 'idol' is possible but
    less concrete about the form.
- source_word: בְּקֶרֶב הָעָם
  chosen: into the midst of the people
  alternatives:
  - among the people
  - into the center of the people
  lexicon: HALOT
  rationale: בקרב commonly means 'in the midst of, among.' 'Into the midst of the
    people' preserves the movement and spatial nuance of the Hebrew more fully than
    the simpler 'among the people.'
