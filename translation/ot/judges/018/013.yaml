id: JDG.18.13
reference: Judges 18:13
source:
  edition: WLC
  text: וַ/יַּעַבְר֥וּ מִ/שָּׁ֖ם הַר אֶפְרָ֑יִם וַ/יָּבֹ֖אוּ עַד בֵּ֥ית מִיכָֽה־־׃
translation:
  text: From there they passed through the hill country of Ephraim and came as far
    as Micah’s house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the house of Micah.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “the hill country of Ephraim”; traditionally also rendered “Mount
      Ephraim.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַבְרוּ
  chosen: they passed through
  alternatives:
  - they crossed over
  - they went on
  lexicon: HALOT
  rationale: The verb עבר commonly means to pass over/through. In this travel context
    with a regional object ('the hill country of Ephraim'), 'passed through' is the
    most natural English rendering and preserves the sense of movement across a territory.
- source_word: מִשָּׁם
  chosen: From there
  alternatives:
  - from that place
  lexicon: HALOT
  rationale: A straightforward deictic adverb marking departure from the previous
    location. 'From there' is idiomatic and precise.
- source_word: הַר אֶפְרָיִם
  chosen: the hill country of Ephraim
  alternatives:
  - Mount Ephraim
  - the mountains of Ephraim
  lexicon: HALOT
  rationale: Although literally 'mountain/hill-country of Ephraim,' this expression
    is a known regional designation. 'Hill country of Ephraim' is standard, geographically
    accurate English and avoids implying a single peak by 'Mount Ephraim.'
- source_word: וַיָּבֹאוּ
  chosen: and came
  alternatives:
  - and arrived
  - and went
  lexicon: HALOT
  rationale: בוא is the common verb 'to come/enter/arrive.' 'And came' fits the narrative
    sequence and pairs naturally with the following preposition עַד.
- source_word: עַד
  chosen: as far as
  alternatives:
  - to
  - up to
  lexicon: HALOT
  rationale: The preposition marks extent or limit. 'As far as' best captures the
    sense of reaching a destination boundary in English narrative style.
- source_word: בֵּית מִיכָה
  chosen: Micah’s house
  alternatives:
  - the house of Micah
  lexicon: HALOT
  rationale: The construct phrase literally means 'house of Micah.' 'Micah’s house'
    is natural modern English while preserving the possessive sense. The personal
    name is transliterated per translation philosophy.
