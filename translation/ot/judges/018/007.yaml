id: JDG.18.7
reference: Judges 18:7
source:
  edition: WLC
  text: וַ/יֵּלְכוּ֙ חֲמֵ֣שֶׁת הָ/אֲנָשִׁ֔ים וַ/יָּבֹ֖אוּ לָ֑יְשָׁ/ה וַ/יִּרְא֣וּ
    אֶת הָ/עָ֣ם אֲשֶׁר בְּ/קִרְבָּ֣/הּ יוֹשֶֽׁבֶת לָ֠/בֶטַח כְּ/מִשְׁפַּ֨ט צִדֹנִ֜ים
    שֹׁקֵ֣ט וּ/בֹטֵ֗חַ וְ/אֵין מַכְלִ֨ים דָּבָ֤ר בָּ/אָ֨רֶץ֙ יוֹרֵ֣שׁ עֶ֔צֶר וּ/רְחֹקִ֥ים
    הֵ֨מָּה֙ מִ/צִּ֣דֹנִ֔ים וְ/דָבָ֥ר אֵין לָ/הֶ֖ם עִם אָדָֽם־־־׀־־־׃
translation:
  text: Then the five men went and came to Laish, and they saw the people who were
    in it, dwelling securely, according to the custom of the Sidonians, quiet and
    secure. And there was no one in the land to humiliate them in anything, possessing
    authority; and they were far from the Sidonians, and they had no dealings with
    anyone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after the manner of the Sidonians.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew is difficult: ''and there was no one humiliating a thing in the
      land, possessing authority.'' The sense is likely that no ruler or oppressor
      was present to shame or dominate them.'
    reason: lexical_alternative
  - marker: c
    text: Or 'they had no alliance/dealings with anyone.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָיְשָׁה
  chosen: Laish
  alternatives:
  - Leshem
  lexicon: HALOT
  rationale: Proper place name; transliterated per translation philosophy. 'Laish'
    is the form in this context (cf. Dan later renaming it).
- source_word: יוֹשֶׁבֶת לָבֶטַח
  chosen: dwelling securely
  alternatives:
  - living in safety
  - dwelling in security
  lexicon: HALOT
  rationale: Combines the participle with the noun idiomatically while preserving
    the sense of settled security rather than momentary safety.
- source_word: כְּמִשְׁפַּט צִדֹנִים
  chosen: according to the custom of the Sidonians
  alternatives:
  - after the manner of the Sidonians
  - according to the rule/judgment of the Sidonians
  lexicon: HALOT
  rationale: מִשְׁפָּט here refers to customary practice or social pattern, not a
    legal verdict. 'Custom' is natural English and fits the ethnographic description.
- source_word: שֹׁקֵט וּבֹטֵחַ
  chosen: quiet and secure
  alternatives:
  - quiet and unsuspecting
  - undisturbed and secure
  - tranquil and secure
  lexicon: HALOT
  rationale: Retains the pair of descriptive terms. 'Secure' overlaps with לָבֶטַח
    but reflects the Hebrew's cumulative emphasis on ease and lack of fear.
- source_word: מַכְלִים דָּבָר
  chosen: to humiliate them in anything
  alternatives:
  - to shame them in any matter
  - to put them to shame in anything
  lexicon: HALOT
  rationale: The Hiphil of כלם carries the sense of causing shame/humiliation. The
    phrase indicates absence of anyone who would oppressively put them to shame or
    dishonor them.
- source_word: יוֹרֵשׁ עֶצֶר
  chosen: possessing authority
  alternatives:
  - exercising restraint
  - occupying dominion
  - heir of control
  lexicon: HALOT
  rationale: This is a difficult expression. In context it likely describes a ruler
    or power-holder who might dominate or oppress. 'Possessing authority' communicates
    the functional sense without overcommitting to a highly specific reconstruction.
- source_word: וּרְחֹקִים הֵמָּה מִצִּדֹנִים
  chosen: they were far from the Sidonians
  alternatives:
  - they were distant from Sidon
  - they lived far away from the Sidonians
  lexicon: HALOT
  rationale: Straightforward spatial statement explaining their isolation from their
    parent/related city.
- source_word: וְדָבָר אֵין לָהֶם עִם אָדָם
  chosen: they had no dealings with anyone
  alternatives:
  - they had nothing to do with anyone
  - they had no relationship with any man
  - they had no alliance with anyone
  lexicon: HALOT
  rationale: The idiom 'no matter/word with someone' denotes no dealings, arrangements,
    or relations. 'Anyone' fits the generic sense of אָדָם here.
- source_word: אָדָם
  chosen: anyone
  alternatives:
  - man
  - humankind
  lexicon: HALOT
  rationale: Although the noun is singular 'man,' the context is generic and idiomatic;
    'anyone' best conveys the sense in natural English while matching intent.
