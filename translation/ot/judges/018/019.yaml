theological_decisions:
- issue: Sense of 'father' as a title
  chosen_reading: Retain the literal title 'father' rather than interpret it as 'advisor'
    or 'leader.'
  alternative_readings:
  - advisor
  - patron
  - leader
  rationale: The Hebrew uses the culturally loaded title 'father' alongside 'priest.'
    Preserving the literal term maintains transparency and avoids importing a narrower
    institutional meaning than the text states.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering of kinship term משפחה
  chosen_reading: Render as 'clan' in distinction from 'tribe.'
  alternative_readings:
  - family
  rationale: 'This preserves the social hierarchy in the verse: one man''s house versus
    a larger tribal/clan entity in Israel. It avoids flattening the contrast.'
  doctrine_reference: Translation philosophy §§1, 5
