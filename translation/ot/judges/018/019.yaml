id: JDG.18.19
reference: Judges 18:19
source:
  edition: WLC
  text: וַ/יֹּאמְרוּ֩ ל֨/וֹ הַחֲרֵ֜שׁ שִֽׂים יָדְ/ךָ֤ עַל פִּ֨י/ךָ֙ וְ/לֵ֣ךְ עִמָּ֔/נוּ
    וֶֽ/הְיֵה לָ֖/נוּ לְ/אָ֣ב וּ/לְ/כֹהֵ֑ן הֲ/ט֣וֹב הֱיוֹתְ/ךָ֣ כֹהֵ֗ן לְ/בֵית֙ אִ֣ישׁ
    אֶחָ֔ד א֚וֹ הֱיוֹתְ/ךָ֣ כֹהֵ֔ן לְ/שֵׁ֥בֶט וּ/לְ/מִשְׁפָּחָ֖ה בְּ/יִשְׂרָאֵֽל־־־׀׃
translation:
  text: They said to him, “Be quiet; put your hand over your mouth, and come with
    us, and be to us a father and a priest. Is it better for you to be priest to the
    house of one man, or to be priest to a tribe and a clan in Israel?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Be silent.' The Hebrew imperative can be rendered 'be quiet,' 'keep
      silent,' or 'be silent.'
    reason: lexical_alternative
  - marker: b
    text: '''Father'' here is a title of social or religious leadership, not a biological
      relationship.'
    reason: cultural_note
  - marker: c
    text: Or 'family' for 'clan'; the Hebrew term refers to a kinship group within
      a tribe.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֲרֵשׁ
  chosen: Be quiet
  alternatives:
  - Keep silent
  - Be silent
  lexicon: HALOT
  rationale: Imperative from חרשׁ in the sense of being silent. 'Be quiet' is natural
    modern English while preserving the command to stop speaking.
- source_word: שִׂים יָדְךָ עַל־פִּיךָ
  chosen: put your hand over your mouth
  alternatives:
  - lay your hand on your mouth
  lexicon: HALOT
  rationale: Idiomatic gesture of silence/restraint. 'Over your mouth' communicates
    the physical image clearly in contemporary English without losing the idiom.
- source_word: וְהְיֵה לָנוּ לְאָב וּלְכֹהֵן
  chosen: be to us a father and a priest
  alternatives:
  - be our father and priest
  lexicon: HALOT
  rationale: Retains the twofold role. 'Father' here is not biological but a social-religious
    title of patronal or advisory leadership; preserving the literal term is preferable
    to interpretive paraphrase.
- source_word: לְאָב
  chosen: father
  alternatives:
  - advisor
  - patron
  lexicon: HALOT
  rationale: Literal rendering best preserves the cultural title and leaves its nuance
    transparent. More interpretive alternatives are possible but would narrow the
    semantic range.
- source_word: כֹהֵן
  chosen: priest
  lexicon: HALOT
  rationale: Standard rendering for כהן; consistent and contextually straightforward.
- source_word: הֲטוֹב
  chosen: Is it better for you
  alternatives:
  - Is it good for you
  - Would it be better for you
  lexicon: HALOT
  rationale: The interrogative plus adjective frames a comparison of advantage. 'Better'
    fits the comparative sense implied by the following alternatives.
- source_word: לְבֵית אִישׁ אֶחָד
  chosen: to the house of one man
  alternatives:
  - for one man's household
  - to one man's household
  lexicon: HALOT
  rationale: '''House'' preserves the household/family sense of בית while staying
    close to the Hebrew construction.'
- source_word: לְשֵׁבֶט וּלְמִשְׁפָּחָה בְּיִשְׂרָאֵל
  chosen: to a tribe and a clan in Israel
  alternatives:
  - to a tribe and a family in Israel
  lexicon: HALOT
  rationale: שבט is 'tribe.' משפחה in this context is a kinship subdivision within
    Israel; 'clan' better conveys the social unit than the broader modern English
    'family'.
- source_word: עִמָּנוּ
  chosen: with us
  lexicon: HALOT
  rationale: Direct and unambiguous prepositional phrase.
- source_word: וַיֹּאמְרוּ לוֹ
  chosen: They said to him
  alternatives:
  - And they said to him
  lexicon: HALOT
  rationale: English narrative style commonly omits initial 'and' while preserving
    the sense.
