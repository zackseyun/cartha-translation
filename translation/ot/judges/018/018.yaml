id: JDG.18.18
reference: Judges 18:18
source:
  edition: WLC
  text: וְ/אֵ֗לֶּה בָּ֚אוּ בֵּ֣ית מִיכָ֔ה וַ/יִּקְחוּ֙ אֶת פֶּ֣סֶל הָ/אֵפ֔וֹד וְ/אֶת
    הַ/תְּרָפִ֖ים וְ/אֶת הַ/מַּסֵּכָ֑ה וַ/יֹּ֤אמֶר אֲלֵי/הֶם֙ הַ/כֹּהֵ֔ן מָ֥ה אַתֶּ֖ם
    עֹשִֽׂים־־־׃
translation:
  text: These men went into Micah’s house and took the carved image, the ephod, the
    household idols, and the cast image. Then the priest said to them, “What are you
    doing?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the teraphim.” The Hebrew term refers to household cult objects or idols.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: These men
  alternatives:
  - And these
  - These
  lexicon: HALOT
  rationale: The demonstrative literally means 'and these,' referring back to the
    five men in the immediate context. 'These men' makes the referent explicit in
    natural English without adding new content.
- source_word: בָּאוּ
  chosen: went into
  alternatives:
  - came
  - entered
  lexicon: HALOT
  rationale: The verb is 'came/went,' but with the following object 'Micah's house'
    the sense is entry. 'Went into' is idiomatic English and fits the narrative movement
    from the prior verse.
- source_word: בֵּית מִיכָה
  chosen: Micah’s house
  alternatives:
  - the house of Micah
  lexicon: HALOT
  rationale: Construct phrase rendered in natural English possessive form.
- source_word: וַיִּקְחוּ
  chosen: took
  alternatives:
  - seized
  lexicon: HALOT
  rationale: Standard narrative verb for taking; 'took' is sufficient and does not
    over-interpret the action.
- source_word: פֶּסֶל
  chosen: carved image
  alternatives:
  - idol
  - graven image
  lexicon: HALOT
  rationale: Refers to an idol/image made by carving. 'Carved image' is transparent
    and avoids archaic 'graven image' while preserving the physical sense better than
    the more interpretive 'idol' alone.
- source_word: הָאֵפוֹד
  chosen: the ephod
  alternatives:
  - the priestly ephod
  lexicon: HALOT
  rationale: '''Ephod'' is a culturally specific item with no simple English equivalent;
    transliteration is standard and least misleading. Adding ''priestly'' would over-specify
    here, since in Judges the object may function in illicit cultic practice.'
- source_word: הַתְּרָפִים
  chosen: the household idols
  alternatives:
  - the teraphim
  - the household gods
  lexicon: HALOT
  rationale: Teraphim are domestic cult objects. 'Household idols' communicates meaning
    clearly for modern readers; 'teraphim' is less accessible, while 'gods' may imply
    actual deities rather than cult images.
- source_word: הַמַּסֵּכָה
  chosen: the cast image
  alternatives:
  - the molten image
  - the metal image
  lexicon: HALOT
  rationale: The noun denotes an image made by casting metal. 'Cast image' is clear,
    fairly formal, and avoids the archaic feel of 'molten image'.
- source_word: וַיֹּאמֶר אֲלֵיהֶם הַכֹּהֵן
  chosen: Then the priest said to them
  alternatives:
  - And the priest said to them
  lexicon: HALOT
  rationale: Narrative waw often advances the storyline. 'Then' gives smooth English
    sequence while preserving the simple progression.
- source_word: מָה אַתֶּם עֹשִׂים
  chosen: What are you doing?
  alternatives:
  - What are you doing here?
  - What are you doing?
  lexicon: HALOT
  rationale: The Hebrew asks directly 'What are you doing?' No locative element is
    present, so 'here' is omitted.
