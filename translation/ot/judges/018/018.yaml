theological_decisions:
- issue: Rendering of cultic objects in an idolatrous context
  chosen_reading: Use concrete terms ('carved image,' 'household idols,' 'cast image')
    rather than flattening all items into a single generic term.
  alternative_readings:
  - idol(s)
  - graven image(s)
  rationale: The verse lists distinct cultic objects, and the translation preserves
    those distinctions without importing extra theological commentary. This aligns
    with optimal equivalence and the principle of documenting significant lexical
    distinctions.
  doctrine_reference: Translation philosophy §§1, 5, 6
