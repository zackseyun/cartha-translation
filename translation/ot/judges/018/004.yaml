theological_decisions:
- issue: Nature of the priestly role in an irregular cultic setting
  chosen_reading: his priest
  alternative_readings:
  - a priest for him
  rationale: The Hebrew לְכֹהֵן with לוֹ indicates service rendered to Micah in a
    priestly capacity. 'His priest' is idiomatic English and reflects the personal
    attachment without implying legitimacy of the arrangement beyond what the text
    states.
  doctrine_reference: Preserve theological tension rather than resolve it.
