id: JDG.18.4
reference: Judges 18:4
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֲלֵ/הֶ֔ם כָּ/זֹ֣ה וְ/כָ/זֶ֔ה עָ֥שָׂה לִ֖/י מִיכָ֑ה וַ/יִּשְׂכְּרֵ֕/נִי
    וָ/אֱהִי ל֖/וֹ לְ/כֹהֵֽן־׃
translation:
  text: He said to them, “Micah did such and such for me, and he hired me, and I became
    his priest.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “thus and thus”; the Hebrew idiom summarizes previously described actions
      without repeating them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: He said
  alternatives:
  - And he said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces the priest's reply. English normally omits
    the connective at the start of direct response for readability, while preserving
    the narrative sequence.
- source_word: אֲלֵהֶם
  chosen: to them
  lexicon: HALOT
  rationale: Direct object of speech, straightforwardly rendered as indirect addressee.
- source_word: כָּזֹה וְכָזֶה
  chosen: such and such
  alternatives:
  - thus and thus
  - this and that
  lexicon: HALOT
  rationale: This idiom summarizes previously described actions without repeating
    them. 'Such and such' is natural modern English and preserves the indefinite resumptive
    force better than the more archaic 'thus and thus.'
- source_word: עָשָׂה לִי
  chosen: did ... for me
  alternatives:
  - dealt with me in this way
  - did this for me
  lexicon: HALOT
  rationale: עשה with ל conveys what Micah did on the speaker's behalf or in relation
    to him. 'Did ... for me' fits the idiom and the context of arrangements Micah
    made for the Levite.
- source_word: מִיכָה
  chosen: Micah
  rationale: Personal name is transliterated per translation philosophy.
- source_word: וַיִּשְׂכְּרֵנִי
  chosen: he hired me
  alternatives:
  - he employed me
  - he paid me wages
  lexicon: HALOT
  rationale: From שׂכר in the sense 'hire for wages.' 'Hired me' is the most direct
    and idiomatic rendering in context.
- source_word: וָאֱהִי לוֹ
  chosen: and I became his
  alternatives:
  - and I was his
  lexicon: HALOT
  rationale: The verb היה can mean 'be' or 'become.' In this narrative sequence after
    'he hired me,' 'I became his' better reflects entry into a new role.
- source_word: לְכֹהֵן
  chosen: priest
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן. Here it denotes the cultic role the Levite
    served for Micah.
