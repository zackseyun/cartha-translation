id: JDG.18.11
reference: Judges 18:11
source:
  edition: WLC
  text: וַ/יִּסְע֤וּ מִ/שָּׁם֙ מִ/מִּשְׁפַּ֣חַת הַ/דָּנִ֔י מִ/צָּרְעָ֖ה וּ/מֵ/אֶשְׁתָּאֹ֑ל
    שֵֽׁשׁ מֵא֣וֹת אִ֔ישׁ חָג֖וּר כְּלֵ֥י מִלְחָמָֽה־׃
translation:
  text: So six hundred men from the clan of the Danites set out from there, from Zorah
    and from Eshtaol, armed with weapons of war.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'girded with weapons of war.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from the family of the Danites'; the Hebrew term refers to a kinship
      subdivision within the tribe, hence 'clan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: set out
  alternatives:
  - journeyed
  - departed
  lexicon: HALOT
  rationale: The verb נסע in the wayyiqtol narrative form denotes breaking camp and
    moving on. 'Set out' is natural modern English and preserves the sense of departure
    without sounding archaic.
- source_word: מִשָּׁם
  chosen: from there
  alternatives:
  - from that place
  lexicon: HALOT
  rationale: A straightforward locative adverb; 'from there' is the plain sense and
    fits the narrative flow.
- source_word: מִמִּשְׁפַּחַת הַדָּנִי
  chosen: from the clan of the Danites
  alternatives:
  - from the family of the Danites
  - from the tribe of Dan
  lexicon: HALOT
  rationale: מִשְׁפָּחָה is more specific than the whole tribe and commonly refers
    to a clan-level kinship group. 'Clan' best reflects that social unit here. 'Danites'
    renders the gentilic naturally in English.
- source_word: מִצָּרְעָה וּמֵאֶשְׁתָּאֹל
  chosen: from Zorah and from Eshtaol
  alternatives:
  - out of Zorah and Eshtaol
  lexicon: HALOT
  rationale: These are place names, so they are transliterated. Repeating 'from' reflects
    the Hebrew prepositions and keeps the source structure visible in readable English.
- source_word: שֵׁשׁ מֵאוֹת אִישׁ
  chosen: six hundred men
  alternatives:
  - six hundred menfolk
  - six hundred persons
  lexicon: HALOT
  rationale: Although אִישׁ is singular in form, with numerals it functions idiomatically
    for counted adult males. 'Men' is gender-accurate and matches the military context.
- source_word: חָגוּר
  chosen: armed
  alternatives:
  - girded
  - belted
  lexicon: HALOT
  rationale: Literally 'girded,' but in context with military equipment it means equipped
    for combat. 'Armed' communicates the sense clearly in modern English.
- source_word: כְּלֵי מִלְחָמָה
  chosen: weapons of war
  alternatives:
  - weapons
  - articles of war
  - military gear
  lexicon: HALOT
  rationale: כְּלִי is broad ('vessel, implement, article'), but in martial context
    it refers to weapons/equipment. 'Weapons of war' preserves the formal force of
    the Hebrew phrase better than the flatter 'weapons' alone.
