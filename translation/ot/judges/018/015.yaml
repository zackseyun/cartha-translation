id: JDG.18.15
reference: Judges 18:15
source:
  edition: WLC
  text: וַ/יָּס֣וּרוּ שָׁ֔מָּ/ה וַ/יָּבֹ֛אוּ אֶל בֵּֽית הַ/נַּ֥עַר הַ/לֵּוִ֖י בֵּ֣ית
    מִיכָ֑ה וַ/יִּשְׁאֲלוּ ל֖/וֹ לְ/שָׁלֽוֹם־־־׃
translation:
  text: They turned aside there and came to the house of the young Levite, to the
    house of Micah, and asked him about his welfare.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and greeted him' or 'and asked him if all was well.' The Hebrew idiom
      literally refers to inquiring concerning peace/well-being.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּסוּרוּ
  chosen: They turned aside
  alternatives:
  - They went aside
  - They stopped by
  lexicon: HALOT
  rationale: From סוּר, here in wayyiqtol plural, indicating a deviation from the
    route or a turning in to a place. 'Turned aside' preserves the movement nuance
    better than the more idiomatic but less formal 'stopped by'.
- source_word: שָׁמָּה
  chosen: there
  alternatives:
  - to that place
  lexicon: HALOT
  rationale: Directional adverb indicating movement toward that location. In English,
    'there' naturally conveys the destination after 'turned aside'.
- source_word: וַיָּבֹאוּ אֶל
  chosen: and came to
  alternatives:
  - and entered
  - and went to
  lexicon: HALOT
  rationale: בוא with אֶל commonly means 'come/go to.' 'Came to' fits the narrative
    sequence and avoids overtranslating as 'entered,' since the focus is arrival at
    the house.
- source_word: בֵּית הַנַּעַר הַלֵּוִי
  chosen: the house of the young Levite
  alternatives:
  - the house of the young man, the Levite
  - the house of the Levite youth
  lexicon: HALOT
  rationale: נַעַר means 'young man/youth,' and הַלֵּוִי identifies him as a Levite.
    'Young Levite' is concise and natural while preserving both elements.
- source_word: בֵּית מִיכָה
  chosen: the house of Micah
  alternatives:
  - Micah's house
  lexicon: HALOT
  rationale: Construct phrase repeated appositionally to identify the location more
    specifically. Rendering both house phrases preserves the Hebrew structure and
    emphasis.
- source_word: וַיִּשְׁאֲלוּ לוֹ לְשָׁלוֹם
  chosen: and asked him about his welfare
  alternatives:
  - and greeted him
  - and asked him if all was well
  - and asked him of his peace
  lexicon: HALOT
  rationale: The idiom שׁאל לְשָׁלוֹם means to inquire after someone's well-being.
    'Asked him about his welfare' preserves the interpersonal inquiry without flattening
    it into a mere greeting.
