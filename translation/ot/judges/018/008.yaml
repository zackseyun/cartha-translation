id: JDG.18.8
reference: Judges 18:8
source:
  edition: WLC
  text: וַ/יָּבֹ֨אוּ֙ אֶל אֲחֵי/הֶ֔ם צָרְעָ֖ה וְ/אֶשְׁתָּאֹ֑ל וַ/יֹּאמְר֥וּ לָ/הֶ֛ם
    אֲחֵי/הֶ֖ם מָ֥ה אַתֶּֽם־׃
translation:
  text: Then they came to their brothers at Zorah and Eshtaol, and their brothers
    said to them, “What about you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to their kinsmen'; Hebrew 'their brothers' can refer to fellow clan
      or tribal relatives, not only literal siblings.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew question is very brief and elliptical, literally 'What, you?'—an
      idiomatic inquiry likely asking for their report or situation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: Then they came
  alternatives:
  - And they came
  - So they came
  lexicon: HALOT
  rationale: Wayyiqtol of בוא advances the narrative. 'Then they came' gives natural
    English narrative sequence while preserving the simple motion verb.
- source_word: אֶל אֲחֵיהֶם
  chosen: to their brothers
  alternatives:
  - to their kinsmen
  - to their brothers/relatives
  lexicon: HALOT
  rationale: אָח commonly means literal brothers or broader kin. In this tribal setting
    it likely refers to fellow Danites/kinsmen, but 'brothers' preserves the Hebrew
    wording and fits the translation philosophy of gender-accurate rendering. The
    broader sense is worth preserving in a footnote.
- source_word: צָרְעָה וְאֶשְׁתָּאֹל
  chosen: Zorah and Eshtaol
  rationale: These are place names, so they are transliterated rather than translated,
    per project philosophy.
- source_word: וַיֹּאמְרוּ לָהֶם אֲחֵיהֶם
  chosen: and their brothers said to them
  alternatives:
  - and their kinsmen said to them
  lexicon: HALOT
  rationale: Maintains the explicit subject 'their brothers' from the Hebrew rather
    than reducing it to 'they said,' which helps clarity in English.
- source_word: מָה אַתֶּם
  chosen: What about you?
  alternatives:
  - What is with you?
  - What are you doing?
  - What news do you have?
  lexicon: HALOT
  rationale: The Hebrew is elliptical and idiomatic. A hyper-literal rendering ('What
    you?') is not acceptable English. 'What about you?' best captures the brief inquiry
    in context, likely inviting their report, without over-specifying content.
