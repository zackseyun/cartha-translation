id: JDG.18.3
reference: Judges 18:3
source:
  edition: WLC
  text: הֵ֚מָּה עִם בֵּ֣ית מִיכָ֔ה וְ/הֵ֣מָּה הִכִּ֔ירוּ אֶת ק֥וֹל הַ/נַּ֖עַר הַ/לֵּוִ֑י
    וַ/יָּס֣וּרוּ שָׁ֗ם וַ/יֹּ֤אמְרוּ ל/וֹ֙ מִֽי הֱבִיאֲ/ךָ֣ הֲלֹ֔ם וּ/מָֽה אַתָּ֥ה
    עֹשֶׂ֛ה בָּ/זֶ֖ה וּ/מַה לְּ/ךָ֥ פֹֽה־־־־־׃
translation:
  text: While they were near Micah’s house, they recognized the voice of the young
    Levite. So they turned aside there and said to him, “Who brought you here? What
    are you doing in this place? And what do you have here?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “What are you doing here?” The Hebrew literally says, “What are you
      doing in this?”
    reason: lexical_alternative
  - marker: b
    text: Or, “What is your business here?” for “what do you have here?”
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵמָּה עִם בֵּית מִיכָה
  chosen: While they were near Micah’s house
  alternatives:
  - They were with/by Micah’s house
  - When they were at Micah’s house
  lexicon: HALOT
  rationale: עִם can denote proximity/association ('with, near, by'). In this narrative
    setting, the sense is locative rather than companionship with the house itself.
    'While they were near' captures both the circumstantial force and natural English
    style.
- source_word: הִכִּירוּ
  chosen: recognized
  alternatives:
  - identified
  - became acquainted with
  lexicon: HALOT
  rationale: The Hiphil of נכר here means to recognize or identify. 'Recognized' is
    the most idiomatic fit with 'voice' as the object.
- source_word: אֶת קוֹל הַנַּעַר הַלֵּוִי
  chosen: the voice of the young Levite
  alternatives:
  - the sound of the young Levite
  - the young Levite’s voice
  lexicon: HALOT
  rationale: 'קוֹל commonly means ''voice'' in contexts of speech recognition. נַעַר
    is rendered ''young'' rather than ''servant'' because the context identifies his
    age/status as a young man, and הַלֵּוִי is appositional: ''the young Levite.'''
- source_word: וַיָּסוּרוּ שָׁם
  chosen: So they turned aside there
  alternatives:
  - they went aside there
  - they turned in there
  lexicon: HALOT
  rationale: סור in this stem often means to turn aside or turn in from one’s route.
    'Turned aside there' preserves the movement toward the location without overinterpreting.
- source_word: מִי הֱבִיאֲךָ הֲלֹם
  chosen: Who brought you here?
  alternatives:
  - Who caused you to come here?
  - Who brought you to this place?
  lexicon: HALOT
  rationale: בוא in Hiphil is causative, 'bring.' הֲלֹם means 'here/hither.' The direct
    question is best rendered simply and idiomatically.
- source_word: וּמָה אַתָּה עֹשֶׂה בָּזֶה
  chosen: What are you doing in this place?
  alternatives:
  - What are you doing with this?
  - What are you doing here?
  lexicon: HALOT
  rationale: בָּזֶה literally 'in this/with this' is somewhat elliptical. In context,
    the men are asking about his activity at this location, so 'in this place' makes
    explicit the locative sense that English requires. A more literal 'with this'
    is possible but less clear.
- source_word: וּמַה לְּךָ פֹה
  chosen: And what do you have here?
  alternatives:
  - And what is here for you?
  - And what is your business here?
  lexicon: HALOT
  rationale: The idiom מַה לְּךָ פֹה asks what interest, possession, or business one
    has in a place. 'What do you have here?' preserves the concrete wording while
    remaining intelligible. The broader sense 'what is your business here?' is interpretive
    and worth preserving in a footnote.
