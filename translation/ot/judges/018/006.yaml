id: JDG.18.6
reference: Judges 18:6
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר לָ/הֶ֛ם הַ/כֹּהֵ֖ן לְכ֣וּ לְ/שָׁל֑וֹם נֹ֣כַח יְהוָ֔ה דַּרְכְּ/כֶ֖ם
    אֲשֶׁ֥ר תֵּֽלְכוּ בָֽ/הּ־׃פ
translation:
  text: And the priest said to them, “Go in peace. The journey on which you are going
    is before the LORD.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Your way is before the LORD,' that is, your journey is in his sight.
      The phrase does not necessarily state explicit divine approval.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative advance; 'And ... said' preserves Hebrew
    narrative flow without overinterpreting temporal sequence.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Definite noun referring to the priest already present in context; straightforward
    rendering.
- source_word: לְכוּ
  chosen: Go
  alternatives:
  - Go on
  - Proceed
  lexicon: HALOT
  rationale: Imperative of הלך; simple command is best represented by 'Go.'
- source_word: לְשָׁלוֹם
  chosen: in peace
  alternatives:
  - peacefully
  - for peace
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression of departure/blessing. 'Go in peace' is natural
    English and preserves the blessing-like force.
- source_word: נֹכַח
  chosen: before
  alternatives:
  - in the presence of
  - under the eye of
  lexicon: HALOT
  rationale: The preposition/adverb indicates being in front of or before someone.
    Here it conveys that their journey lies before the LORD, i.e., in his sight.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: דַּרְכְּכֶם
  chosen: the journey
  alternatives:
  - your way
  - your path
  lexicon: HALOT
  rationale: Though literally 'your way/path,' in this travel context 'journey' communicates
    the intended sense in natural English while remaining close to the Hebrew.
- source_word: אֲשֶׁר תֵּלְכוּ בָהּ
  chosen: on which you are going
  alternatives:
  - which you are taking
  - in which you will walk
  lexicon: HALOT
  rationale: The relative clause modifies 'journey/way.' 'On which you are going'
    preserves the Hebrew imagery of traveling on a way while reading naturally in
    English.
