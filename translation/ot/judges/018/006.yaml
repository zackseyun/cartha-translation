theological_decisions:
- issue: Force of the priest's statement about the LORD and the Danites' journey
  chosen_reading: 'Rendered as a statement of divine awareness/oversight: ''The journey
    on which you are going is before the LORD.'''
  alternative_readings:
  - 'Rendered more positively as assurance of divine approval or success: ''The LORD
    approves your journey'' or ''Your journey is under the LORD''s care'''
  rationale: The Hebrew נֹכַח יְהוָה with 'your way' most directly states that the
    journey is before/in the presence of the LORD. It does not explicitly say the
    LORD approves, blesses, or guarantees success. This preserves theological tension
    and avoids importing a stronger endorsement than the text states.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
