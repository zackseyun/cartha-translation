theological_decisions:
- issue: Narrative statement 'there was no king in Israel'
  chosen_reading: Retained as a historical-political observation without implying
    an explicit theological endorsement of monarchy beyond the narrator's wording.
  alternative_readings:
  - A stronger implied criticism of the period of the judges
  - A merely neutral chronological note
  rationale: The verse frames the narrative with a repeated formula used in Judges.
    The translation should preserve the statement itself and not import a stronger
    doctrinal or political conclusion than the Hebrew states.
  doctrine_reference: Preserve theological tension rather than resolve it.
