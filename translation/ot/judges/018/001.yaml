id: JDG.18.1
reference: Judges 18:1
source:
  edition: WLC
  text: בַּ/יָּמִ֣ים הָ/הֵ֔ם אֵ֥ין מֶ֖לֶךְ בְּ/יִשְׂרָאֵ֑ל וּ/בַ/יָּמִ֣ים הָ/הֵ֗ם
    שֵׁ֣בֶט הַ/דָּנִ֞י מְבַקֶּשׁ ל֤/וֹ נַֽחֲלָה֙ לָ/שֶׁ֔בֶת כִּי֩ לֹֽא נָ֨פְלָה לּ֜/וֹ
    עַד הַ/יּ֥וֹם הַ/ה֛וּא בְּ/תוֹךְ שִׁבְטֵ֥י יִשְׂרָאֵ֖ל בְּ/נַחֲלָֽה־־־־׃ס
translation:
  text: In those days there was no king in Israel. And in those days the tribe of
    the Danites was seeking for itself an inheritance to dwell in, because up to that
    day no inheritance had fallen to it among the tribes of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the tribe of Dan.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'no inheritance had fallen to it,' an idiom referring to the allotment
      of tribal land.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין מֶלֶךְ
  chosen: there was no king
  alternatives:
  - there was not a king
  lexicon: HALOT
  rationale: Idiomatic English rendering of the existential negation plus noun, preserving
    the straightforward political statement without adding interpretive nuance.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  lexicon: HALOT
  rationale: Standard locative rendering; no reason to expand to 'among Israel' here.
- source_word: שֵׁבֶט הַדָּנִי
  chosen: the tribe of the Danites
  alternatives:
  - the tribe of Dan
  - the Danite tribe
  lexicon: HALOT
  rationale: Construct phrase referring to the tribal group descended from Dan. 'The
    tribe of the Danites' is natural English and preserves the collective sense.
- source_word: מְבַקֶּשׁ
  chosen: was seeking
  alternatives:
  - sought
  - was looking for
  lexicon: HALOT
  rationale: The participle conveys ongoing action; 'was seeking' reflects the progressive
    sense better than a simple past.
- source_word: לוֹ
  chosen: for itself
  alternatives:
  - for it
  - for themselves
  lexicon: HALOT
  rationale: The pronoun is grammatically singular but refers to the collective noun
    'tribe.' 'For itself' matches the singular grammatical antecedent in English.
- source_word: נַחֲלָה
  chosen: an inheritance
  alternatives:
  - a possession
  - an allotted inheritance
  lexicon: HALOT
  rationale: In tribal-land context, נַחֲלָה denotes inherited territorial allotment.
    'Inheritance' preserves the covenantal-land nuance better than the flatter 'possession.'
- source_word: לָשֶׁבֶת
  chosen: to dwell in
  alternatives:
  - to live in
  - to settle in
  lexicon: HALOT
  rationale: Infinitive of ישׁב in a land-settlement context. 'To dwell in' is slightly
    more formal but still readable and fits the territorial sense.
- source_word: כִּי לֹא נָפְלָה לוֹ
  chosen: because ... no inheritance had fallen to it
  alternatives:
  - because ... it had not received an inheritance
  - because ... no allotment had come to it
  lexicon: HALOT
  rationale: נפל with inheritance language evokes the lot/allotment 'falling' to a
    tribe. Retaining 'fallen' preserves the idiom and its connection to land distribution,
    while remaining understandable in context.
- source_word: עַד הַיּוֹם הַהוּא
  chosen: up to that day
  alternatives:
  - until that day
  - to that time
  lexicon: HALOT
  rationale: Natural temporal expression in English that preserves the retrospective
    narrative viewpoint.
- source_word: בְּתוֹךְ שִׁבְטֵי יִשְׂרָאֵל
  chosen: among the tribes of Israel
  alternatives:
  - in the midst of the tribes of Israel
  lexicon: HALOT
  rationale: Idiomatic rendering of בתוך in a distributive/group setting.
- source_word: בְּנַחֲלָה
  chosen: no inheritance had fallen to it among the tribes of Israel
  alternatives:
  - as an inheritance
  - for an inheritance
  lexicon: HALOT
  rationale: The final phrase specifies the sphere or manner of allotment. In English
    it is best absorbed into the clause rather than rendered woodenly, since 'among
    the tribes of Israel as an inheritance' is awkward. The sense of territorial allotment
    is preserved.
