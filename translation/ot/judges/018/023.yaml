id: JDG.18.23
reference: Judges 18:23
source:
  edition: WLC
  text: וַֽ/יִּקְרְאוּ֙ אֶל בְּנֵי דָ֔ן וַ/יַּסֵּ֖בּוּ פְּנֵי/הֶ֑ם וַ/יֹּאמְר֣וּ לְ/מִיכָ֔ה
    מַה לְּ/ךָ֖ כִּ֥י נִזְעָֽקְתָּ־־־׃
translation:
  text: They called out to the sons of Dan, and they turned around and said to Micah,
    “What is the matter with you, that you have called out?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “you have cried out” / “you have raised an outcry.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “to the sons of Dan”; that is, to the Danites.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרְאוּ
  chosen: They called out
  alternatives:
  - They cried out
  - They called
  lexicon: HALOT
  rationale: קרא commonly means 'call' or 'cry out.' In this narrative setting, 'called
    out' fits an audible summons without overstating distress.
- source_word: אֶל בְּנֵי דָן
  chosen: to the sons of Dan
  alternatives:
  - to the Danites
  lexicon: HALOT
  rationale: Literally 'to the sons of Dan.' 'Sons of Dan' preserves the Hebrew kinship
    expression; 'Danites' is a natural alternative but slightly less formal.
- source_word: וַיַּסֵּבּוּ פְּנֵיהֶם
  chosen: they turned around
  alternatives:
  - they turned their faces
  - they turned back
  lexicon: HALOT
  rationale: The idiom literally means 'they turned their faces.' 'Turned around'
    is clear modern English and accurately conveys the action.
- source_word: לְמִיכָה
  chosen: to Micah
  rationale: Standard rendering of the preposition plus proper name.
- source_word: מַה לְּךָ
  chosen: What is the matter with you
  alternatives:
  - What do you want
  - What is with you
  lexicon: HALOT
  rationale: This idiom asks what concerns or troubles someone. 'What is the matter
    with you' best captures the sense in idiomatic English.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content or explanation of the question: ''that/for
    why you have called out.'' English reads most naturally with ''that'' after the
    idiom.'
- source_word: נִזְעָקְתָּ
  chosen: you have called out
  alternatives:
  - you have cried out
  - you have raised an outcry
  lexicon: HALOT
  rationale: The Niphal of זעק denotes crying out or raising an outcry. 'Called out'
    keeps verbal consistency with the earlier clause while fitting the context of
    Micah's shouted protest.
