id: JDG.18.30
reference: Judges 18:30
source:
  edition: WLC
  text: וַ/יָּקִ֧ימוּ לָ/הֶ֛ם בְּנֵי דָ֖ן אֶת הַ/פָּ֑סֶל וִ֠/יהוֹנָתָן בֶּן גֵּרְשֹׁ֨ם
    בֶּן מְ ה֣וּא וּ/בָנָ֗י/ו הָי֤וּ כֹהֲנִים֙ לְ/שֵׁ֣בֶט הַ/דָּנִ֔י עַד י֖וֹם גְּל֥וֹת
    הָ/אָֽרֶץ־־־־־׃
translation:
  text: Then the sons of Dan set up for themselves the carved image, and Jonathan
    the son of Gershom, son of Moses,[a] he and his sons were priests for the tribe
    of the Danites until the day of the exile of the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '[a]'
    text: 'Hebrew: ''Moses''; the Masoretic tradition includes a suspended letter,
      yielding the traditional reading ''Manasseh.'''
    reason: textual_variant
lexical_decisions:
- source_word: וַיָּקִימוּ
  chosen: set up
  alternatives:
  - established
  - erected
  lexicon: HALOT
  rationale: The Hifil of קום here means to cause to stand, i.e., to erect or install.
    'Set up' is natural modern English and fits the context of installing an idol.
- source_word: לָהֶם
  chosen: for themselves
  alternatives:
  - for them
  lexicon: HALOT
  rationale: The dative pronoun indicates the Danites acted for their own use/benefit.
    'For themselves' makes that reflexive sense clear in English.
- source_word: בְּנֵי דָן
  chosen: the sons of Dan
  alternatives:
  - the Danites
  - the people of Dan
  lexicon: HALOT
  rationale: A formally close rendering preserves the Hebrew expression while remaining
    clear. Since 'the Danites' also appears later for הַדָּנִי, keeping 'sons of Dan'
    here avoids flattening both expressions into the same English phrase.
- source_word: הַפָּסֶל
  chosen: the carved image
  alternatives:
  - the idol
  - the graven image
  lexicon: HALOT
  rationale: פֶּסֶל denotes an image made by carving. 'Carved image' preserves the
    concrete sense without archaic wording like 'graven image.'
- source_word: וִיהוֹנָתָן
  chosen: Jonathan
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: בֶּן גֵּרְשֹׁם
  chosen: the son of Gershom
  rationale: Straightforward genealogical construction.
- source_word: בֶּן מְהוּא
  chosen: son of Moses
  alternatives:
  - son of Manasseh
  lexicon: HALOT
  rationale: The consonantal text points to Moses, with the suspended nun in the Masoretic
    tradition signaling scribal sensitivity. The base reading is best represented
    in the main text as 'Moses,' while the traditional alternative 'Manasseh' is preserved
    in a footnote because it is textually and interpretively significant.
- source_word: וּבָנָיו
  chosen: he and his sons
  alternatives:
  - and his sons
  lexicon: HALOT
  rationale: Although the Hebrew conjunction simply says 'and his sons,' English idiom
    benefits from making explicit that both Jonathan and his sons are the subject
    of 'were priests.'
- source_word: כֹהֲנִים
  chosen: priests
  lexicon: HALOT
  rationale: Standard rendering for כהנים in cultic context.
- source_word: לְשֵׁבֶט הַדָּנִי
  chosen: for the tribe of the Danites
  alternatives:
  - for the tribe of Dan
  - for the Danite tribe
  lexicon: HALOT
  rationale: This phrase indicates service on behalf of the tribal group. 'For the
    tribe of the Danites' is clear and preserves the gentilic force of הַדָּנִי.
- source_word: עַד יוֹם גְּלוֹת הָאָרֶץ
  chosen: until the day of the exile of the land
  alternatives:
  - until the day the land went into exile
  - until the day of the exile from the land
  lexicon: HALOT
  rationale: The Hebrew is somewhat terse and unusual. A relatively formal rendering
    preserves the ambiguity of what specific exile is meant rather than resolving
    it interpretively.
