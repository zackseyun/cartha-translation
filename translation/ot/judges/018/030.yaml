theological_decisions:
- issue: Genealogical identification of Jonathan's ancestor
  chosen_reading: son of Moses
  alternative_readings:
  - son of Manasseh
  rationale: The written form in the Masoretic tradition preserves a reading associated
    with Moses, though a suspended nun yields the traditional reading 'Manasseh.'
    Because the textual tradition intentionally preserves the tension, the main text
    follows the base consonantal sense while the alternative is retained in a footnote
    rather than silently resolved.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
