theological_decisions:
- issue: Rendering of cultic objects associated with Micah's shrine
  chosen_reading: 'Use concrete, minimally interpretive terms: ''ephod, household
    idols, a carved image, and a cast image.'''
  alternative_readings:
  - '''ephod, teraphim, an idol, and a molten image'''
  - '''priestly garment, household gods, carved idol, and metal idol'''
  rationale: The verse lists illicit or irregular cult objects, but the translation
    should not collapse the distinct Hebrew terms into a single generalized category.
    Preserving the distinctions allows readers to see the layered nature of the shrine
    inventory without importing extra theological commentary into the main text.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Gendered kinship term אֲחֵיהֶם
  chosen_reading: Translate as 'their brothers.'
  alternative_readings:
  - their kinsmen
  - their fellow tribesmen
  rationale: The doctrine excerpt directs gender-accurate rather than gender-neutral
    rendering. Since the referents are male Danite warriors/scouts in context, 'brothers'
    is both literal and contextually fitting.
  doctrine_reference: Translation philosophy §4
