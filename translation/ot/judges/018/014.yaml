id: JDG.18.14
reference: Judges 18:14
source:
  edition: WLC
  text: וַֽ/יַּעֲנ֞וּ חֲמֵ֣שֶׁת הָ/אֲנָשִׁ֗ים הַ/הֹלְכִים֮ לְ/רַגֵּל֮ אֶת הָ/אָ֣רֶץ
    לַיִשׁ֒ וַ/יֹּֽאמְרוּ֙ אֶל אֲחֵי/הֶ֔ם הַ/יְדַעְתֶּ֗ם כִּ֠י יֵ֣שׁ בַּ/בָּתִּ֤ים
    הָ/אֵ֨לֶּה֙ אֵפ֣וֹד וּ/תְרָפִ֔ים וּ/פֶ֖סֶל וּ/מַסֵּכָ֑ה וְ/עַתָּ֖ה דְּע֥וּ מַֽה
    תַּעֲשֽׂוּ־־־׃
translation:
  text: Then the five men who had gone to spy out the land of Laish answered and said
    to their brothers, “Do you know that in these houses there are an ephod, household
    idols, a carved image, and a cast image? So now, know what you will do.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'teraphim'; the Hebrew term refers to household cult images or household
      gods.
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has 'molten image' for 'cast image.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲנוּ
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: ענה in narrative often introduces a response even when no explicit prior
    speech is quoted immediately before. 'Answered' preserves the Hebrew discourse
    formula and pairs naturally with the following 'said.'
- source_word: חֲמֵשֶׁת הָאֲנָשִׁים
  chosen: the five men
  alternatives:
  - five of the men
  lexicon: HALOT
  rationale: The construct numeral plus noun is most naturally rendered 'the five
    men,' referring back to the previously mentioned scouting party.
- source_word: הַהֹלְכִים לְרַגֵּל
  chosen: who had gone to spy out
  alternatives:
  - who were going to spy out
  - who went to scout
  lexicon: HALOT
  rationale: The participle with infinitive describes the men by their prior mission.
    English past perfect best captures their already-completed scouting role in the
    narrative context.
- source_word: אֶת הָאָרֶץ לַיִשׁ
  chosen: the land of Laish
  alternatives:
  - the country of Laish
  lexicon: HALOT
  rationale: אָרֶץ here refers to the territory associated with the city Laish, not
    the earth generally. 'Land of Laish' is idiomatic and sufficiently formal.
- source_word: אֶל אֲחֵיהֶם
  chosen: to their brothers
  alternatives:
  - to their kinsmen
  - to their fellow Danites
  lexicon: HALOT
  rationale: אֲחֵיהֶם literally means 'their brothers.' In context it refers to fellow
    members of their tribe/company, but the translation philosophy prefers gender-accurate
    rendering rather than flattening to a neutral collective. The contextual sense
    is clear from the narrative.
- source_word: הֲיְדַעְתֶּם
  chosen: Do you know
  alternatives:
  - Did you know
  - Are you aware
  lexicon: HALOT
  rationale: The interrogative use of ידע here introduces information meant to prompt
    action. Present English 'Do you know' works naturally as an attention-getting
    question.
- source_word: כִּי יֵשׁ
  chosen: that ... there are
  alternatives:
  - that ... there is
  lexicon: HALOT
  rationale: Existential יֵשׁ introduces the contents found in the houses. Because
    the list contains multiple cult objects, plural English agreement is natural.
- source_word: בַּבָּתִּים הָאֵלֶּה
  chosen: in these houses
  alternatives:
  - in these households
  - in these buildings
  lexicon: HALOT
  rationale: בָּתִּים is literally 'houses.' Although the reference may be to the
    shrine complex or domestic structures, 'houses' best preserves the lexical form
    without over-interpreting.
- source_word: אֵפוֹד
  chosen: an ephod
  alternatives:
  - a priestly ephod
  lexicon: HALOT
  rationale: אֵפוֹד is a culturally specific cultic object with no simple English
    equivalent. Transliteration preserves the term accurately without importing a
    possibly too-specific interpretation.
- source_word: תְּרָפִים
  chosen: household idols
  alternatives:
  - teraphim
  - household gods
  lexicon: HALOT
  rationale: Though often transliterated, the likely sense is domestic cult images.
    'Household idols' is accessible modern English and conveys the object type clearly.
- source_word: פֶּסֶל
  chosen: a carved image
  alternatives:
  - an idol
  - a graven image
  lexicon: HALOT
  rationale: פֶּסֶל denotes an image fashioned by carving. 'Carved image' is more
    precise than the broader 'idol' and avoids archaic 'graven image.'
- source_word: מַסֵּכָה
  chosen: a cast image
  alternatives:
  - a metal image
  - a molten image
  lexicon: HALOT
  rationale: מַסֵּכָה refers to an image made by casting, often metal. 'Cast image'
    is accurate and readable; 'molten image' is traditional but less natural in contemporary
    English.
- source_word: וְעַתָּה
  chosen: So now
  alternatives:
  - And now
  - Now then
  lexicon: HALOT
  rationale: The conjunction plus adverb marks an inference from the information just
    given and a transition to deliberation. 'So now' captures that pragmatic force.
- source_word: דְּעוּ
  chosen: know
  alternatives:
  - consider
  - understand
  lexicon: HALOT
  rationale: Imperative of ידע literally means 'know.' In context it urges informed
    deliberation. Retaining 'know' keeps the lexical link with the preceding question.
- source_word: מַה תַּעֲשׂוּ
  chosen: what you will do
  alternatives:
  - what you should do
  - what to do
  lexicon: HALOT
  rationale: The Hebrew imperfect can express contemplated future action. 'What you
    will do' preserves the open-ended deliberative force without adding the stronger
    modal 'should,' which is not explicit.
