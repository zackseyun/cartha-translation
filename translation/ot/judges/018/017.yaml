id: JDG.18.17
reference: Judges 18:17
source:
  edition: WLC
  text: וַֽ/יַּעֲל֞וּ חֲמֵ֣שֶׁת הָ/אֲנָשִׁ֗ים הַ/הֹלְכִים֮ לְ/רַגֵּ֣ל אֶת הָ/אָרֶץ֒
    בָּ֣אוּ שָׁ֔מָּ/ה לָקְח֗וּ אֶת הַ/פֶּ֨סֶל֙ וְ/אֶת הָ֣/אֵפ֔וֹד וְ/אֶת הַ/תְּרָפִ֖ים
    וְ/אֶת הַ/מַּסֵּכָ֑ה וְ/הַ/כֹּהֵ֗ן נִצָּב֙ פֶּ֣תַח הַ/שַּׁ֔עַר וְ/שֵׁשׁ מֵא֣וֹת
    הָ/אִ֔ישׁ הֶ/חָג֖וּר כְּלֵ֥י הַ/מִּלְחָמָֽה־־־־־־׃
translation:
  text: Then the five men who had gone to spy out the land went up, came there, and
    took the carved image, the ephod, the household gods, and the cast image, while
    the priest was standing at the entrance of the gate with the six hundred men armed
    with weapons of war.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the teraphim.' The Hebrew term refers to household cult objects or household
      gods.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: ''the molten image.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲלוּ
  chosen: went up
  alternatives:
  - went in
  - ascended
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' In narrative movement it often retains
    the idiomatic sense 'went up,' even when English might simply say 'went.' Preserving
    'went up' reflects the Hebrew verbal choice without becoming unnatural.
- source_word: הַהֹלְכִים לְרַגֵּל אֶת־הָאָרֶץ
  chosen: who had gone to spy out the land
  alternatives:
  - who were going to scout the land
  - who went to explore the land
  lexicon: HALOT
  rationale: The participial phrase identifies the five men by their earlier mission.
    'Spy out' best fits רגל in this military-reconnaissance context and matches the
    hostile/strategic setting better than the softer 'explore.' The pluperfect-like
    English 'had gone' clarifies prior action relative to the present narrative.
- source_word: בָּאוּ שָׁמָּה
  chosen: came there
  alternatives:
  - entered there
  - came in there
  lexicon: HALOT
  rationale: A straightforward rendering of the sequence 'came there.' 'Entered' would
    over-specify the object entered, which the Hebrew does not explicitly state here.
- source_word: לָקְחוּ
  chosen: took
  alternatives:
  - seized
  lexicon: HALOT
  rationale: לקח is the ordinary verb 'take.' Although the context is theft, 'took'
    is the direct lexical equivalent and lets the narrative context carry the force.
- source_word: הַפֶּסֶל
  chosen: the carved image
  alternatives:
  - the idol
  - the graven image
  lexicon: HALOT
  rationale: פסל denotes an image fashioned by carving. 'Carved image' is concrete
    and transparent; 'idol' is interpretive, and 'graven image' is archaic.
- source_word: הָאֵפוֹד
  chosen: the ephod
  alternatives:
  - the priestly ephod
  lexicon: HALOT
  rationale: אֵפוֹד is a culturally specific term with no simple English equivalent,
    so transliteration is preferable. Adding 'priestly' would import specificity not
    explicit in the word itself here.
- source_word: הַתְּרָפִים
  chosen: the household gods
  alternatives:
  - the teraphim
  - the household idols
  lexicon: HALOT
  rationale: תרפים refers to household cult objects/deities. 'Household gods' communicates
    the sense in accessible English; the transliteration 'teraphim' is less immediately
    clear, so it is preserved in a footnote.
- source_word: הַמַּסֵּכָה
  chosen: the cast image
  alternatives:
  - the molten image
  - the metal image
  lexicon: HALOT
  rationale: מסכה denotes an image made by casting, often of metal. 'Cast image' is
    accurate modern English; 'molten image' is traditional but less natural.
- source_word: וְהַכֹּהֵן נִצָּב
  chosen: while the priest was standing
  alternatives:
  - and the priest was standing
  - with the priest standing
  lexicon: HALOT
  rationale: The clause is circumstantial relative to the taking of the objects. 'While
    the priest was standing' captures the concurrent action clearly in English.
- source_word: פֶּתַח הַשַּׁעַר
  chosen: at the entrance of the gate
  alternatives:
  - at the gateway
  - at the opening of the gate
  lexicon: HALOT
  rationale: פתח is 'opening/entrance.' 'At the entrance of the gate' is slightly
    more formal but preserves both nouns; 'gateway' is possible but compresses the
    Hebrew expression.
- source_word: וְשֵׁשׁ מֵאוֹת הָאִישׁ
  chosen: with the six hundred men
  alternatives:
  - and the six hundred men
  lexicon: HALOT
  rationale: 'Though literally ''and six hundred the man/men,'' the phrase is best
    taken with the priest''s position: he was standing there with the six hundred
    men. English requires smoothing to idiomatic plural ''men.'''
- source_word: הֶחָגוּר כְּלֵי הַמִּלְחָמָה
  chosen: armed with weapons of war
  alternatives:
  - girded with weapons of war
  - wearing battle gear
  lexicon: HALOT
  rationale: חגור conveys being girded/equipped. 'Armed with weapons of war' is idiomatic
    and preserves the military sense. 'Girded' is more literal but archaic for many
    readers.
