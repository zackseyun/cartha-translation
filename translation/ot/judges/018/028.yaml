id: JDG.18.28
reference: Judges 18:28
source:
  edition: WLC
  text: וְ/אֵ֨ין מַצִּ֜יל כִּ֧י רְֽחוֹקָה הִ֣יא מִ/צִּיד֗וֹן וְ/דָבָ֤ר אֵין לָ/הֶם֙
    עִם אָדָ֔ם וְ/הִ֕יא בָּ/עֵ֖מֶק אֲשֶׁ֣ר לְ/בֵית רְח֑וֹב וַ/יִּבְנ֥וּ אֶת הָ/עִ֖יר
    וַ/יֵּ֥שְׁבוּ בָֽ/הּ־־־־־׃
translation:
  text: And there was no one to deliver them, because it was far from Sidon, and they
    had no dealings with anyone; and it was in the valley that belongs to Beth-rehob.
    Then they rebuilt the city and lived in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the valley near Beth-rehob.' The Hebrew phrase is elliptical, and
      the preposition may indicate proximity rather than possession.
    reason: alternative_reading
lexical_decisions:
- source_word: מַצִּיל
  chosen: to deliver them
  alternatives:
  - to rescue them
  - to save them
  lexicon: HALOT
  rationale: The Hiphil participle of נצל denotes one who rescues or delivers. 'Deliver'
    fits the military-crisis context and preserves the concrete sense without importing
    later theological overtones of 'save.' 'Them' is supplied naturally in English
    from the context of the city's inhabitants.
- source_word: רְחוֹקָה הִיא מִצִּידוֹן
  chosen: it was far from Sidon
  alternatives:
  - she was far from Sidon
  lexicon: HALOT
  rationale: The feminine pronoun refers to the city. English idiom normally uses
    'it' for a city in this kind of geographical description.
- source_word: וְדָבָר אֵין לָהֶם עִם אָדָם
  chosen: they had no dealings with anyone
  alternatives:
  - they had nothing to do with anyone
  - they had no relationship with anyone
  - they had no agreement with anyone
  lexicon: HALOT
  rationale: Literally, 'there was no matter/thing for them with man.' In context
    this indicates social or political isolation rather than absolute absence of human
    contact. 'No dealings with anyone' captures the idiomatic force well in modern
    English.
- source_word: אָדָם
  chosen: anyone
  alternatives:
  - man
  lexicon: HALOT
  rationale: Although אדם is formally singular 'man,' here it functions generically.
    Per doctrine, gender-accurate rendering favors the contextual sense rather than
    preserving masculine form woodenly.
- source_word: בָּעֵמֶק
  chosen: in the valley
  alternatives:
  - in the plain
  lexicon: HALOT
  rationale: עמק commonly denotes a valley or lowland. 'Valley' is the most straightforward
    rendering here.
- source_word: אֲשֶׁר לְבֵית רְחוֹב
  chosen: that belongs to Beth-rehob
  alternatives:
  - which was by Beth-rehob
  - which belonged to Beth-rehob
  - near Beth-rehob
  lexicon: HALOT
  rationale: The phrase is somewhat elliptical. The prefixed ל can indicate relation
    or belonging. 'That belongs to Beth-rehob' preserves the likely territorial sense
    while remaining readable. Because the exact nuance is debated, an alternative
    is preserved in a footnote.
- source_word: וַיִּבְנוּ אֶת הָעִיר
  chosen: they rebuilt the city
  alternatives:
  - they built the city
  lexicon: HALOT
  rationale: Given the immediate context that the city had been struck and burned
    (v. 27), English 'rebuilt' makes explicit what the Hebrew verb 'built' implies
    in context. This is a contextually warranted optimal-equivalence choice, not a
    paraphrase.
- source_word: וַיֵּשְׁבוּ בָהּ
  chosen: lived in it
  alternatives:
  - dwelt in it
  - settled in it
  lexicon: HALOT
  rationale: ישב often means to dwell or settle. 'Lived in it' is clear modern English
    and fits the narrative conclusion.
- source_word: רְחוֹב
  chosen: Beth-rehob
  alternatives:
  - Beth Rehob
  lexicon: HALOT
  rationale: This is a place name, so per philosophy it is transliterated rather than
    translated.
