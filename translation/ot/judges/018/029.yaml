id: JDG.18.29
reference: Judges 18:29
source:
  edition: WLC
  text: וַ/יִּקְרְא֤וּ שֵׁם הָ/עִיר֙ דָּ֔ן בְּ/שֵׁם֙ דָּ֣ן אֲבִי/הֶ֔ם אֲשֶׁ֥ר יוּלַּ֖ד
    לְ/יִשְׂרָאֵ֑ל וְ/אוּלָ֛ם לַ֥יִשׁ שֵׁם הָ/עִ֖יר לָ/רִאשֹׁנָֽה־־׃
translation:
  text: And they called the name of the city Dan, after the name of Dan their father,
    who was born to Israel; however, the name of the city formerly was Laish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their ancestor'; Hebrew 'their father' can denote a forefather, not
      only an immediate parent.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרְאוּ
  chosen: they called
  alternatives:
  - they named
  lexicon: HALOT
  rationale: The verb קרא with שֵׁם commonly means to call/name. 'They called' preserves
    the Hebrew idiom, while the object phrase 'the name of the city Dan' makes the
    naming sense clear in English.
- source_word: שֵׁם הָעִיר
  chosen: the name of the city
  alternatives:
  - the city
  lexicon: HALOT
  rationale: Retaining 'the name of' reflects the explicit Hebrew wording rather than
    simplifying to 'they named the city,' though the latter is a possible smoother
    English rendering.
- source_word: דָּן
  chosen: Dan
  rationale: Proper name transliterated according to the translation philosophy.
- source_word: בְּשֵׁם דָּן
  chosen: after the name of Dan
  alternatives:
  - by the name of Dan
  - for Dan
  lexicon: HALOT
  rationale: The preposition ב with שֵׁם here indicates naming in reference to or
    after someone. 'After the name of Dan' communicates that the city was named in
    honor of the ancestor Dan.
- source_word: אֲבִיהֶם
  chosen: their father
  alternatives:
  - their ancestor
  lexicon: HALOT
  rationale: Hebrew 'father' often includes ancestor/founding forefather. 'Their father'
    is kept in the main text because it is the direct lexical value and idiomatic
    in biblical genealogical contexts.
- source_word: אֲשֶׁר יוּלַּד לְיִשְׂרָאֵל
  chosen: who was born to Israel
  alternatives:
  - who was born to Jacob
  - who was begotten by Israel
  lexicon: HALOT
  rationale: This relative clause identifies Dan as the son born to Israel (Jacob).
    'Israel' is retained because that is the source text; 'Jacob' would be interpretive
    expansion. 'Was born to' is natural English for the passive of ילד with ל.
- source_word: וְאוּלָם
  chosen: however
  alternatives:
  - but
  - nevertheless
  lexicon: HALOT
  rationale: This adversative particle marks a contrast with the new name just given.
    'However' conveys the explanatory contrast smoothly in modern English.
- source_word: לַיִשׁ
  chosen: Laish
  rationale: Proper place name transliterated.
- source_word: לָרִאשֹׁנָה
  chosen: formerly
  alternatives:
  - at first
  - beforehand
  - originally
  lexicon: HALOT
  rationale: In context this adverbial expression refers to the city's earlier name
    before it was renamed Dan. 'Formerly' is concise and idiomatic.
