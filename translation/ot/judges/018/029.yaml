- issue: Genealogical designation אֲבִיהֶם
  chosen_reading: their father
  alternative_readings:
  - their ancestor
  rationale: The term does not raise a doctrinal dispute, but it can be understood
    broadly as forefather. The main text preserves the Hebrew familial idiom without
    flattening it; the broader sense is noted as an alternative lexical possibility.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
