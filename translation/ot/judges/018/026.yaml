id: JDG.18.26
reference: Judges 18:26
source:
  edition: WLC
  text: וַ/יֵּלְכ֥וּ בְנֵי דָ֖ן לְ/דַרְכָּ֑/ם וַ/יַּ֣רְא מִיכָ֗ה כִּי חֲזָקִ֥ים הֵ֨מָּה֙
    מִמֶּ֔/נּוּ וַ/יִּ֖פֶן וַ/יָּ֥שָׁב אֶל בֵּיתֽ/וֹ־־־׃
translation:
  text: Then the sons of Dan went on their way, and Micah saw that they were stronger
    than he was, so he turned and went back to his house.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְנֵי דָן
  chosen: the sons of Dan
  alternatives:
  - the Danites
  - the people of Dan
  lexicon: HALOT
  rationale: Formal familial expression used ethnically/tribally. 'Sons of Dan' preserves
    the Hebrew wording and tribal identity more transparently than the smoother 'Danites.'
- source_word: לְדַרְכָּם
  chosen: went on their way
  alternatives:
  - to their way
  - along their way
  lexicon: HALOT
  rationale: Idiomatic English rendering of the Hebrew prepositional phrase with 'way/path.'
    'Went on their way' is natural while preserving the sense of continuing their
    journey.
- source_word: חֲזָקִים הֵמָּה מִמֶּנּוּ
  chosen: they were stronger than he was
  alternatives:
  - they were too strong for him
  - they were stronger than him
  lexicon: HALOT
  rationale: Comparative sense of חזק with מן is best expressed as 'stronger than.'
    Adding 'he was' makes the English grammatical and clear. 'Too strong for him'
    is possible but slightly more interpretive.
- source_word: וַיִּפֶן
  chosen: he turned
  alternatives:
  - he turned back
  - he turned around
  lexicon: HALOT
  rationale: The verb means 'turn' or 'turn about.' Since the following verb already
    states that he 'went back,' rendering this simply as 'turned' avoids redundancy
    while preserving the sequence.
- source_word: וַיָּשָׁב אֶל בֵּיתוֹ
  chosen: went back to his house
  alternatives:
  - returned to his house
  - went home
  lexicon: HALOT
  rationale: שׁוב conveys return; 'went back to his house' is clear, natural, and
    preserves the directional phrase אֶל בֵּיתוֹ. 'Went home' is idiomatic but less
    formally tied to the Hebrew wording.
- source_word: בֵּיתוֹ
  chosen: his house
  alternatives:
  - his home
  lexicon: HALOT
  rationale: '''House'' is the direct lexical equivalent of בית. In context it can
    imply home, but ''house'' better preserves the source term.'
