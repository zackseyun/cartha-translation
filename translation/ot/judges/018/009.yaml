id: JDG.18.9
reference: Judges 18:9
source:
  edition: WLC
  text: וַ/יֹּאמְר֗וּ ק֚וּמָ/ה וְ/נַעֲלֶ֣ה עֲלֵי/הֶ֔ם כִּ֤י רָאִ֨ינוּ֙ אֶת הָ/אָ֔רֶץ
    וְ/הִנֵּ֥ה טוֹבָ֖ה מְאֹ֑ד וְ/אַתֶּ֣ם מַחְשִׁ֔ים אַל תֵּעָ֣צְל֔וּ לָ/לֶ֥כֶת לָ/בֹ֖א
    לָ/רֶ֥שֶׁת אֶת הָ/אָֽרֶץ־־־׃
translation:
  text: And they said, “Rise up, and let us go up against them, for we have seen the
    land, and behold, it is very good. And you are keeping silent—do not be sluggish
    to go, to enter, to take possession of the land.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you are silent.' The Hebrew participle can be rendered either as an
      ongoing action ('keeping silent') or a present state ('silent').
    reason: lexical_alternative
  - marker: b
    text: Or 'do not be lazy' or 'do not delay.' The Hebrew emphasizes slackness or
      reluctance in acting.
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֚וּמָה
  chosen: Rise up
  alternatives:
  - Get up
  - Come on
  lexicon: HALOT
  rationale: Imperative of קום with enclitic ה; an urgent summons. 'Rise up' preserves
    the elevated, mobilizing force better than the flatter 'get up.'
- source_word: וְנַעֲלֶה
  chosen: let us go up
  alternatives:
  - we will go up
  - let us attack
  lexicon: HALOT
  rationale: Cohortative 1cp of עלה. 'Let us go up' preserves both the cohortative
    exhortation and the common military/topographical idiom without over-interpreting
    it as direct attack.
- source_word: עֲלֵיהֶם
  chosen: against them
  alternatives:
  - to them
  - upon them
  lexicon: HALOT
  rationale: In this military context על + pronoun naturally means movement against
    a people, not merely toward them.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the country
  - the territory
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the region under consideration, not the earth in
    general. 'Land' is the most natural and biblically consistent rendering.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - indeed
  lexicon: HALOT
  rationale: '''Behold'' preserves the deictic, attention-directing force of the Hebrew
    while remaining understandable in modern literary English.'
- source_word: טוֹבָה מְאֹד
  chosen: very good
  alternatives:
  - extremely good
  - very favorable
  lexicon: HALOT
  rationale: A straightforward evaluative statement about the land. 'Very good' is
    idiomatic and preserves the Hebrew intensification.
- source_word: מַחְשִׁים
  chosen: you are keeping silent
  alternatives:
  - you are silent
  - you are doing nothing
  lexicon: HALOT
  rationale: Hiphil participle of חרשׁ, 'to be silent/keep quiet.' The participial
    form suggests ongoing inaction expressed as silence. 'Keeping silent' captures
    the durative nuance better than the stative 'are silent.'
- source_word: אַל תֵּעָצְלוּ
  chosen: do not be sluggish
  alternatives:
  - do not be lazy
  - do not delay
  lexicon: HALOT
  rationale: From עצל, conveying slackness or laziness. 'Do not be sluggish' preserves
    the rebuke of lethargy without sounding colloquial. 'Do not delay' is too weak
    and shifts from character/energy to mere timing.
- source_word: לָלֶכֶת לָבֹא לָרֶשֶׁת
  chosen: to go, to enter, to take possession
  alternatives:
  - to go and enter and possess
  - to set out, enter, and inherit
  lexicon: HALOT
  rationale: 'The Hebrew uses a sequence of infinitives for rhetorical buildup. Preserving
    the threefold progression in English reflects the urgency and process: set out,
    arrive, and seize possession. ''Take possession'' is preferable to ''inherit''
    here because the immediate context is conquest/occupation rather than covenantal
    inheritance language foregrounded explicitly.'
