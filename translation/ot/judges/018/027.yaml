id: JDG.18.27
reference: Judges 18:27
source:
  edition: WLC
  text: וְ/הֵ֨מָּה לָקְח֜וּ אֵ֧ת אֲשֶׁר עָשָׂ֣ה מִיכָ֗ה וְֽ/אֶת הַ/כֹּהֵן֮ אֲשֶׁ֣ר
    הָיָה ל/וֹ֒ וַ/יָּבֹ֣אוּ עַל לַ֗יִשׁ עַל עַם֙ שֹׁקֵ֣ט וּ/בֹטֵ֔חַ וַ/יַּכּ֥וּ אוֹתָ֖/ם
    לְ/פִי חָ֑רֶב וְ/אֶת הָ/עִ֖יר שָׂרְפ֥וּ בָ/אֵֽשׁ־־־־־־־׃
translation:
  text: So they took what Micah had made, along with the priest who belonged to him,
    and came against Laish, against a people quiet and secure. They struck them with
    the edge of the sword and burned the city with fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'with the mouth of the sword,' an idiom meaning 'with the edge of
      the sword.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵמָּה
  chosen: So they
  alternatives:
  - And they
  - Now they
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis/continuity. 'So they' gives natural
    English narrative progression while preserving the subject emphasis better than
    omitting it entirely.
- source_word: לָקְחוּ
  chosen: took
  alternatives:
  - seized
  - carried off
  lexicon: HALOT
  rationale: A straightforward rendering of לקח in narrative context. 'Took' is sufficiently
    broad to cover both the cult objects and the priest without over-interpreting
    the manner.
- source_word: אֵת אֲשֶׁר עָשָׂה מִיכָה
  chosen: what Micah had made
  alternatives:
  - the things that Micah had made
  - what Micah made
  lexicon: HALOT
  rationale: The relative construction is idiomatically rendered as 'what Micah had
    made.' The plainer English avoids awkwardness while still referring back to the
    cultic items made by Micah in context.
- source_word: וְאֶת הַכֹּהֵן אֲשֶׁר הָיָה לוֹ
  chosen: along with the priest who belonged to him
  alternatives:
  - and the priest who was his
  - and the priest who was with him
  - and the priest who was his own
  lexicon: HALOT
  rationale: היה לו literally means 'was to/for him.' In context it denotes the priest
    attached to Micah's household/shrine. 'Belonged to him' preserves the possessive
    relationship without implying ownership in a chattel sense.
- source_word: וַיָּבֹאוּ עַל לַיִשׁ
  chosen: came against Laish
  alternatives:
  - came to Laish
  - attacked Laish
  lexicon: HALOT
  rationale: The preposition עַל with בוא in military context indicates hostile movement
    toward/against. 'Came against' preserves the idiom and prepares for the attack
    described next without collapsing the clauses into one verb.
- source_word: עַל עַם שֹׁקֵט וּבֹטֵחַ
  chosen: against a people quiet and secure
  alternatives:
  - against a people at peace and unsuspecting
  - against a tranquil and secure people
  lexicon: HALOT
  rationale: שׁקט denotes quiet/tranquility; בטח denotes security/confidence. 'Quiet
    and secure' is concise and close to the Hebrew. 'Unsuspecting' is interpretive
    and therefore left as an alternative only.
- source_word: וַיַּכּוּ אוֹתָם
  chosen: They struck them
  alternatives:
  - they struck down them
  - they attacked them
  - they killed them
  lexicon: HALOT
  rationale: נכה is broad and often means strike/defeat/kill depending on context.
    Because the following phrase specifies the manner ('with the edge of the sword'),
    'struck them' is the most textually restrained rendering.
- source_word: לְפִי חָרֶב
  chosen: with the edge of the sword
  alternatives:
  - by the mouth of the sword
  - with the sword
  lexicon: HALOT
  rationale: This is the standard Hebrew idiom literally 'to the mouth of the sword.'
    'With the edge of the sword' is the established idiomatic English equivalent that
    preserves the violent specificity better than simply 'with the sword.'
- source_word: וְאֶת הָעִיר שָׂרְפוּ בָאֵשׁ
  chosen: and burned the city with fire
  alternatives:
  - and set the city on fire
  - and burned the city
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'with fire'; retaining it preserves the
    formal force and vividness of the clause. 'Set the city on fire' is natural English
    but slightly more interpretive than the direct rendering.
