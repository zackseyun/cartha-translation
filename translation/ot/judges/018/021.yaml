id: JDG.18.21
reference: Judges 18:21
source:
  edition: WLC
  text: וַ/יִּפְנ֖וּ וַ/יֵּלֵ֑כוּ וַ/יָּשִׂ֨ימוּ אֶת הַ/טַּ֧ף וְ/אֶת הַ/מִּקְנֶ֛ה
    וְ/אֶת הַ/כְּבוּדָּ֖ה לִ/פְנֵי/הֶֽם־־־׃
translation:
  text: So they turned and went on, and put the little children, the livestock, and
    the valuables in front of themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the goods," "the baggage," or "the property" for "the valuables." The
      Hebrew term refers here to portable possessions or wealth, not to "glory."
    reason: lexical_alternative
  - marker: b
    text: Literally, "before them" or "ahead of them."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְנוּ
  chosen: they turned
  alternatives:
  - they turned around
  - they set out
  lexicon: HALOT
  rationale: From פנה, the basic sense is to turn/turn around. In sequence with 'went
    on,' 'they turned' preserves the narrative movement without overinterpreting direction.
- source_word: וַיֵּלֵכוּ
  chosen: went on
  alternatives:
  - went
  - proceeded
  lexicon: HALOT
  rationale: הלך in wayyiqtol continues the action after 'turned.' 'Went on' gives
    natural English narrative flow while preserving the simple motion.
- source_word: וַיָּשִׂימוּ
  chosen: put
  alternatives:
  - placed
  - set
  lexicon: HALOT
  rationale: שׂים commonly means put/place/set. 'Put' is the most natural modern English
    equivalent here.
- source_word: הַטַּף
  chosen: the little children
  alternatives:
  - the children
  - the dependents
  lexicon: HALOT
  rationale: טף refers to little ones/children, often the noncombatant young of a
    group. 'The little children' captures the diminutive and vulnerable sense better
    than the broader 'children.'
- source_word: הַמִּקְנֶה
  chosen: the livestock
  alternatives:
  - the cattle
  - the herds
  lexicon: HALOT
  rationale: מקנה denotes livestock or acquired herd animals generally. 'Livestock'
    is broader and more accurate than 'cattle' in modern English.
- source_word: הַכְּבוּדָּה
  chosen: the valuables
  alternatives:
  - the goods
  - the baggage
  - the property
  lexicon: HALOT
  rationale: כבודה here refers to weighty possessions or valuable goods being transported.
    'Valuables' best reflects the sense of portable wealth/property in this travel
    context, while 'glory' would be inappropriate here.
- source_word: לִפְנֵיהֶם
  chosen: in front of themselves
  alternatives:
  - before them
  - ahead of them
  lexicon: HALOT
  rationale: Literally 'before them/in front of them.' Because the subject is the
    same group that arranged these items, 'in front of themselves' makes explicit
    that they positioned the vulnerable persons and possessions ahead of the main
    body.
