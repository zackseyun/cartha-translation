id: JDG.18.25
reference: Judges 18:25
source:
  edition: WLC
  text: וַ/יֹּאמְר֤וּ אֵלָי/ו֙ בְּנֵי דָ֔ן אַל תַּשְׁמַ֥ע קוֹלְ/ךָ֖ עִמָּ֑/נוּ פֶּֽן
    יִפְגְּע֣וּ בָ/כֶ֗ם אֲנָשִׁים֙ מָ֣רֵי נֶ֔פֶשׁ וְ/אָסַפְתָּ֥ה נַפְשְׁ/ךָ֖ וְ/נֶ֥פֶשׁ
    בֵּיתֶֽ/ךָ־־־׃
translation:
  text: And the sons of Dan said to him, “Do not let your voice be heard among us,
    lest men bitter of soul fall upon you, and you lose your life and the lives of
    your household.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fierce men,' 'desperate men,' or 'men of bitter spirit' for 'men bitter
      of soul.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'Do not let your voice be heard among us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי דָן
  chosen: the sons of Dan
  alternatives:
  - the Danites
  lexicon: HALOT
  rationale: A more formal rendering preserves the Hebrew kinship expression while
    still being natural English. 'Danites' is possible, but 'sons of Dan' keeps the
    tribal identity explicit.
- source_word: אַל תַּשְׁמַע קוֹלְךָ עִמָּנוּ
  chosen: Do not let your voice be heard among us
  alternatives:
  - Do not make your voice heard among us
  - Do not let us hear your voice
  lexicon: HALOT
  rationale: The idiom literally involves 'hearing your voice.' This rendering preserves
    the Hebrew image while communicating the warning not to keep speaking in their
    presence. It is preferable to a looser paraphrase like 'Do not argue with us.'
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - otherwise
  lexicon: HALOT
  rationale: '''Lest'' concisely captures the warning force of the conjunction and
    fits the gravity of the threat.'
- source_word: יִפְגְּעוּ בָכֶם
  chosen: fall upon you
  alternatives:
  - attack you
  - strike you
  lexicon: HALOT
  rationale: The verb can denote hostile encounter or attack. 'Fall upon you' preserves
    the vividness of the Hebrew and fits the threatening context.
- source_word: אֲנָשִׁים מָרֵי נֶפֶשׁ
  chosen: men bitter of soul
  alternatives:
  - fierce men
  - desperate men
  - men of bitter spirit
  lexicon: HALOT
  rationale: The phrase is idiomatic and denotes dangerous, embittered, or reckless
    men. 'Men bitter of soul' stays close to the Hebrew while remaining intelligible.
    A more interpretive rendering like 'desperate men' is possible but less transparent.
- source_word: וְאָסַפְתָּה נַפְשְׁךָ
  chosen: and you lose your life
  alternatives:
  - and you gather up your life
  - and you forfeit your life
  lexicon: HALOT
  rationale: The idiom with אסף plus נפש here means the loss or removal of life, not
    literal gathering. 'Lose your life' communicates the sense clearly in context.
- source_word: וְנֶפֶשׁ בֵּיתֶךָ
  chosen: and the lives of your household
  alternatives:
  - and the life of your household
  - and your household's lives
  lexicon: HALOT
  rationale: Though 'nephesh' is singular in form, the collective sense in English
    is best expressed as 'the lives of your household,' referring to the members of
    his house who would also be endangered.
