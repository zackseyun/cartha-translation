id: JDG.18.12
reference: Judges 18:12
source:
  edition: WLC
  text: וַֽ/יַּעֲל֗וּ וַֽ/יַּחֲנ֛וּ בְּ/קִרְיַ֥ת יְעָרִ֖ים בִּֽ/יהוּדָ֑ה עַל כֵּ֡ן
    קָרְאוּ֩ לַ/מָּק֨וֹם הַ/ה֜וּא מַחֲנֵה דָ֗ן עַ֚ד הַ/יּ֣וֹם הַ/זֶּ֔ה הִנֵּ֕ה אַחֲרֵ֖י
    קִרְיַ֥ת יְעָרִֽים־־׃
translation:
  text: They went up and camped at Kiriath-jearim in Judah. Therefore that place has
    been called Mahaneh-dan to this day; behold, it is west of Kiriath-jearim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Mahaneh-dan means "Camp of Dan."
    reason: lexical_alternative
  - marker: b
    text: Or possibly "behind Kiriath-jearim"; the Hebrew spatial term can be rendered
      more literally, but here likely indicates a western location.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲלוּ
  chosen: They went up
  alternatives:
  - They ascended
  - They set out
  lexicon: HALOT
  rationale: עלה in narrative travel contexts commonly means 'go up,' often reflecting
    movement through the land or toward higher terrain. 'Went up' preserves the Hebrew
    idiom without overinterpreting.
- source_word: וַיַּחֲנוּ
  chosen: camped
  alternatives:
  - encamped
  lexicon: HALOT
  rationale: חנה means to camp or encamp. 'Camped' is modern and readable while remaining
    faithful to the military/travel setting.
- source_word: בְּקִרְיַת יְעָרִים
  chosen: at Kiriath-jearim
  alternatives:
  - in Kiriath-jearim
  lexicon: HALOT
  rationale: The preposition ב can be rendered 'in' or 'at' with place names. 'At'
    fits the sense of stopping and camping at a location. The place name is transliterated
    per project policy.
- source_word: בִּיהוּדָה
  chosen: in Judah
  alternatives:
  - of Judah
  lexicon: HALOT
  rationale: The phrase locates Kiriath-jearim within the territory of Judah. 'In
    Judah' is the clearest natural English rendering.
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For that reason
  - That is why
  lexicon: HALOT
  rationale: This idiom introduces an explanatory naming statement. 'Therefore' is
    concise and preserves the causal connection.
- source_word: קָרְאוּ לַמָּקוֹם הַהוּא
  chosen: that place has been called
  alternatives:
  - they called that place
  - people called that place
  lexicon: HALOT
  rationale: Although the Hebrew verb is active plural ('they called'), English commonly
    uses the passive in etiological place-name formulas, especially when followed
    by 'to this day.' This preserves the ongoing naming result naturally.
- source_word: מַחֲנֵה דָן
  chosen: Mahaneh-dan
  alternatives:
  - Camp of Dan
  lexicon: HALOT
  rationale: As a place name, transliteration is preferred by project policy ('translate
    titles; transliterate names'). The lexical sense 'Camp of Dan' is worth preserving
    in a footnote.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: This is the standard idiomatic rendering of the Hebrew temporal formula
    indicating the name persisted to the narrator's present.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - indeed
  - now
  lexicon: HALOT
  rationale: הנה draws attention to the location note that follows. 'Behold' preserves
    the deictic force, though somewhat elevated; here it suits the explanatory style
    of the verse.
- source_word: אַחֲרֵי
  chosen: west of
  alternatives:
  - behind
  - after
  - beyond
  lexicon: HALOT
  rationale: In geographical descriptions, אַחֲרֵי can denote a position 'behind'
    relative to orientation, often idiomatically 'west of' in English translations
    of Hebrew spatial usage. Here 'west of' best communicates the locational note
    in natural English.
