id: JDG.15.13
reference: Judges 15:13
source:
  edition: WLC
  text: וַ/יֹּ֧אמְרוּ ל֣/וֹ לֵ/אמֹ֗ר לֹ֚א כִּֽי אָסֹ֤ר נֶֽאֱסָרְ/ךָ֙ וּ/נְתַנּ֣וּ/ךָ
    בְ/יָדָ֔/ם וְ/הָמֵ֖ת לֹ֣א נְמִיתֶ֑/ךָ וַ/יַּאַסְרֻ֗/הוּ בִּ/שְׁנַ֨יִם֙ עֲבֹתִ֣ים
    חֲדָשִׁ֔ים וַֽ/יַּעֲל֖וּ/הוּ מִן הַ/סָּֽלַע־־׃
translation:
  text: They said to him, “No, but we will surely bind you and hand you over into
    their hand; yet we will certainly not put you to death.” So they bound him with
    two new ropes and brought him up from the rock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “deliver you into their power.” The Hebrew idiom is literally “hand you
      over into their hand.”
    reason: lexical_alternative
  - marker: b
    text: Or “from the crag/cliff.” Hebrew סלע can refer to a rocky height or crag,
      not only a single rock.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא כִּי
  chosen: No, but
  alternatives:
  - No, rather
  - No; instead
  lexicon: HALOT
  rationale: The sequence functions as a denial followed by correction/qualification.
    'No, but' is natural English and preserves the contrast in their reply.
- source_word: אָסֹר נֶאֱסָרְךָ
  chosen: we will surely bind you
  alternatives:
  - we will certainly bind you
  - we will bind you fast
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. 'Surely
    bind' preserves the emphatic force without sounding wooden.
- source_word: וּנְתַנּוּךָ בְיָדָם
  chosen: hand you over into their hand
  alternatives:
  - deliver you into their hand
  - give you into their power
  lexicon: HALOT
  rationale: The idiom 'into their hand' is common in Hebrew for being given into
    someone's power. Retaining 'hand' preserves the Hebrew imagery while remaining
    understandable in English.
- source_word: וְהָמֵת לֹא נְמִיתֶךָ
  chosen: yet we will certainly not put you to death
  alternatives:
  - but we will surely not kill you
  - we will by no means cause your death
  lexicon: HALOT
  rationale: Again the infinitive absolute with finite verb gives emphasis. 'Put you
    to death' is slightly more formal and fits the solemn assurance; 'certainly not'
    reflects the emphatic negation.
- source_word: וַיַּאַסְרֻהוּ
  chosen: they bound him
  alternatives:
  - they tied him up
  lexicon: HALOT
  rationale: Same root as earlier binding statement; 'bound' keeps lexical consistency
    with אסר.
- source_word: בִּשְׁנַיִם עֲבֹתִים חֲדָשִׁים
  chosen: with two new ropes
  alternatives:
  - with two fresh cords
  - with two new cords
  lexicon: HALOT
  rationale: עבתים refers to thick cords/ropes. 'Ropes' is the clearest modern English
    choice; 'new' is retained because it is narratively significant in the Samson
    cycle.
- source_word: וַיַּעֲלֻהוּ מִן הַסָּלַע
  chosen: brought him up from the rock
  alternatives:
  - led him up from the crag
  - brought him up from the cliff
  lexicon: HALOT
  rationale: סלע can denote a rock, crag, or rocky height. 'The rock' is sufficiently
    literal and likely refers to the rocky stronghold mentioned in context. 'Brought
    him up' fits the causative sense of העלה.
