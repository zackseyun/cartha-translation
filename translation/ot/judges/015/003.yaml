id: JDG.15.3
reference: Judges 15:3
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר לָ/הֶם֙ שִׁמְשׁ֔וֹן נִקֵּ֥יתִי הַ/פַּ֖עַם מִ/פְּלִשְׁתִּ֑ים כִּֽי
    עֹשֶׂ֥ה אֲנִ֛י עִמָּ֖/ם רָעָֽה־׃
translation:
  text: And Samson said to them, “This time I am blameless against the Philistines
    when I do them harm.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I am innocent of the Philistines,' that is, 'I am free from blame in
      regard to the Philistines.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'do them evil.' Here 'harm' conveys hostile injury in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative advance; 'And' preserves Hebrew narrative
    flow without overinterpreting temporal sequence.
- source_word: לָהֶם
  chosen: to them
  lexicon: HALOT
  rationale: Directly reflects the preposition plus 3mp suffix; the antecedent is
    Samson's hearers in context.
- source_word: שִׁמְשׁוֹן
  chosen: Samson
  rationale: Personal name is transliterated by standard English convention per translation
    philosophy.
- source_word: נִקֵּיתִי
  chosen: I am blameless
  alternatives:
  - I am innocent
  - I am clear of guilt
  - I am justified
  lexicon: HALOT
  rationale: From נקה in the sense of being free from guilt/liability. 'I am blameless'
    best captures Samson's claim that he bears no culpability in relation to the Philistines
    for the action he is about to take. Present English fits the stative/resultative
    force.
- source_word: הַפַּעַם
  chosen: This time
  alternatives:
  - Now
  - At this time
  lexicon: HALOT
  rationale: Idiomatic temporal expression marking a new stage in the conflict.
- source_word: מִפְּלִשְׁתִּים
  chosen: against the Philistines
  alternatives:
  - from the Philistines
  - with respect to the Philistines
  lexicon: HALOT
  rationale: The preposition מִן after נקה can mark separation from guilt in relation
    to someone. In English, 'blameless against the Philistines' communicates that
    he considers himself not culpable vis-à-vis them; 'against' is idiomatic in this
    hostile context.
- source_word: כִּי
  chosen: when
  alternatives:
  - for
  - because
  - that
  lexicon: HALOT
  rationale: Here כִּי introduces the circumstance under which Samson counts himself
    blameless. 'When I do them harm' is more natural in English than 'for I am doing...'
    while preserving the logic of the clause.
- source_word: עֹשֶׂה אֲנִי
  chosen: I do
  alternatives:
  - I am about to do
  - I am doing
  lexicon: HALOT
  rationale: Qal participle with explicit pronoun can express imminent or ongoing
    action. English simple present in a temporal clause ('when I do') naturally conveys
    intended action without overcommitting to aspect.
- source_word: עִמָּם
  chosen: them
  alternatives:
  - to them
  - against them
  lexicon: HALOT
  rationale: With עשה plus עִם, the idiom means 'do with/to them.' English object
    pronoun 'them' is the most natural complement after 'do ... harm.'
- source_word: רָעָה
  chosen: harm
  alternatives:
  - evil
  - wrong
  - injury
  lexicon: HALOT
  rationale: Although רָעָה can mean 'evil,' in this context of retaliatory action
    'harm' best conveys concrete hostile injury without importing a moral evaluation
    beyond the Hebrew expression.
