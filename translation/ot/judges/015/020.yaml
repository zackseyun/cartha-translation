id: JDG.15.20
reference: Judges 15:20
source:
  edition: WLC
  text: וַ/יִּשְׁפֹּ֧ט אֶת יִשְׂרָאֵ֛ל בִּ/ימֵ֥י פְלִשְׁתִּ֖ים עֶשְׂרִ֥ים שָׁנָֽה־׃פ
translation:
  text: And he judged Israel twenty years in the days of the Philistines.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'led Israel for twenty years'; the Hebrew verb can denote broader governing
      activity, not only judicial decision-making.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁפֹּט
  chosen: judged
  alternatives:
  - led
  - governed
  - served as judge over
  lexicon: HALOT
  rationale: The verb שׁפט in Judges commonly denotes exercising leadership/judicial
    rule as a judge. 'Judged' preserves the book's recurring terminology and avoids
    over-paraphrasing, while still allowing the broader leadership sense to be inferred
    from context.
- source_word: אֶת יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - the Israelites
  lexicon: HALOT
  rationale: The direct object is the proper name 'Israel.' Rendering it as 'Israel'
    is formally closer and idiomatic in English in this construction ('judged Israel').
    'The Israelites' is possible dynamically but less consistent with the source wording.
- source_word: בִּימֵי
  chosen: in the days of
  alternatives:
  - during
  - in the time of
  lexicon: HALOT
  rationale: The construct phrase literally means 'in the days of.' This is natural
    English and preserves the temporal idiom without unnecessary flattening.
- source_word: פְלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard transliteration of the people-group name; the article is natural
    in English for an ethnic/political group in this context.
- source_word: עֶשְׂרִים שָׁנָה
  chosen: twenty years
  lexicon: HALOT
  rationale: 'Straightforward numerical expression. English idiom places the duration
    after the object here: ''judged Israel twenty years.'''
