theological_decisions:
- issue: Sense of Samson's role in שׁפט
  chosen_reading: Retain 'judged' rather than interpretively expanding to 'ruled'
    or 'delivered.'
  alternative_readings:
  - ruled Israel for twenty years
  - led Israel for twenty years
  rationale: The verse summarizes Samson within the literary framework of the book
    of Judges. 'Judged' preserves that canonical and lexical connection without importing
    a narrower modern courtroom sense or a broader political claim not explicit in
    the text.
  doctrine_reference: 'Translation philosophy: optimal equivalence; consistency of
    key terms, or documented exception.'
