id: JDG.15.8
reference: Judges 15:8
source:
  edition: WLC
  text: וַ/יַּ֨ךְ אוֹתָ֥/ם שׁ֛וֹק עַל יָרֵ֖ךְ מַכָּ֣ה גְדוֹלָ֑ה וַ/יֵּ֣רֶד וַ/יֵּ֔שֶׁב
    בִּ/סְעִ֖יף סֶ֥לַע עֵיטָֽם־׃ס
translation:
  text: And he struck them down hip and thigh with a great slaughter, and he went
    down and stayed in the cleft of the rock of Etam.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'hip and thigh,' likely an idiom for a devastating or thorough defeat.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּךְ
  chosen: he struck them down
  alternatives:
  - he struck
  - he attacked
  - he killed
  lexicon: HALOT
  rationale: נכה commonly means 'strike/smite.' In this violent context, 'struck them
    down' conveys both the action and its lethal/resultative force without over-specifying
    that every individual was killed by the verb alone.
- source_word: שׁוֹק עַל יָרֵךְ
  chosen: hip and thigh
  alternatives:
  - leg upon thigh
  - thigh upon hip
  - utterly
  lexicon: HALOT
  rationale: This idiom is difficult. A formally transparent rendering 'hip and thigh'
    preserves the Hebrew imagery while allowing readers to sense its idiomatic force.
    Because the exact nuance is debated, a more interpretive alternative is preserved
    in a footnote rather than replacing the concrete expression in the main text.
- source_word: מַכָּה גְדוֹלָה
  chosen: with a great slaughter
  alternatives:
  - with a great blow
  - with a severe defeat
  - with a great strike
  lexicon: HALOT
  rationale: מכה is literally 'blow/strike,' but in battle contexts it often denotes
    a defeat or slaughter. 'With a great slaughter' best fits the context of Samson's
    violent rout and reads naturally in English while retaining the intensity of גְדוֹלָה.
- source_word: וַיֵּרֶד
  chosen: he went down
  alternatives:
  - he descended
  lexicon: HALOT
  rationale: A straightforward narrative verb. 'Went down' is idiomatic modern English
    and preserves the directional sense.
- source_word: וַיֵּשֶׁב
  chosen: stayed
  alternatives:
  - dwelt
  - sat
  - remained
  lexicon: HALOT
  rationale: ישב can mean 'sit,' 'dwell,' or 'remain.' In this narrative setting,
    'stayed' communicates temporary residence or lodging more naturally than the more
    wooden 'sat' or the potentially overlong 'dwelt.'
- source_word: בִּסְעִיף
  chosen: in the cleft
  alternatives:
  - in the fissure
  - in the branch/crag
  lexicon: HALOT
  rationale: The noun refers to a split, cleft, or fissure. 'Cleft' is natural English
    for a rocky refuge and fits the following construct with 'rock.'
- source_word: סֶלַע
  chosen: the rock
  alternatives:
  - the crag
  - the cliff
  lexicon: HALOT
  rationale: סלע denotes a rock formation or crag. 'Rock' is the broadest and most
    standard rendering; the following proper name localizes it sufficiently.
- source_word: עֵיטָם
  chosen: Etam
  rationale: Proper place name; per translation philosophy, names are transliterated
    rather than translated.
