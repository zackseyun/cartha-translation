id: JDG.15.10
reference: Judges 15:10
source:
  edition: WLC
  text: וַ/יֹּֽאמְרוּ֙ אִ֣ישׁ יְהוּדָ֔ה לָ/מָ֖ה עֲלִיתֶ֣ם עָלֵ֑י/נוּ וַ/יֹּאמְר֗וּ
    לֶ/אֱס֤וֹר אֶת שִׁמְשׁוֹן֙ עָלִ֔ינוּ לַ/עֲשׂ֣וֹת ל֔/וֹ כַּ/אֲשֶׁ֖ר עָ֥שָׂה לָֽ/נוּ־׃
translation:
  text: And the men of Judah said, “Why have you come up against us?” And they said,
    “We have come up to bind Samson, to do to him just as he did to us.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אִישׁ יְהוּדָה
  chosen: the men of Judah
  alternatives:
  - the man of Judah
  - the people of Judah
  lexicon: HALOT
  rationale: Though אִישׁ is morphologically singular, it functions collectively here
    with the plural verb וַיֹּאמְרוּ, so English plural 'the men of Judah' best reflects
    the sense without awkwardness. 'People of Judah' is possible dynamically, but
    'men' preserves the gendered collective form.
- source_word: לָמָה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Standard interrogative of reason; 'Why' is the natural modern English
    equivalent.
- source_word: עֲלִיתֶם עָלֵינוּ
  chosen: have you come up against us
  alternatives:
  - have you gone up against us
  - have you attacked us
  lexicon: HALOT
  rationale: עלה with עַל commonly means 'go/come up against' in hostile movement.
    'Come up against us' preserves both the directional idiom and adversative force
    without overtranslating to explicit attack.
- source_word: לֶאֱסוֹר
  chosen: to bind
  alternatives:
  - to tie up
  - to seize
  lexicon: HALOT
  rationale: אָסַר means 'bind, tie, imprison.' In this immediate context of capturing
    Samson, 'bind' is the most direct and contextually fitting rendering.
- source_word: עָלִינוּ
  chosen: We have come up
  alternatives:
  - We came up
  - We have gone up
  lexicon: HALOT
  rationale: The verb עלה is repeated from the previous clause, and preserving 'come
    up' maintains the lexical link. English present perfect fits the dialogue naturally.
- source_word: לַעֲשׂוֹת לוֹ
  chosen: to do to him
  alternatives:
  - to deal with him
  - to do for him
  lexicon: HALOT
  rationale: עשה + ל can mean 'do to/for.' Here the retaliatory context and following
    comparison clause require 'do to him,' not benefactive 'for him'.
- source_word: כַּאֲשֶׁר עָשָׂה לָנוּ
  chosen: just as he did to us
  alternatives:
  - as he has done to us
  - according to what he did to us
  lexicon: HALOT
  rationale: 'כַּאֲשֶׁר introduces comparison: ''just as/as.'' ''Just as he did to
    us'' is idiomatic and preserves the retaliatory symmetry of the statement.'
- source_word: שִׁמְשׁוֹן
  chosen: Samson
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
