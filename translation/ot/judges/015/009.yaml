id: JDG.15.9
reference: Judges 15:9
source:
  edition: WLC
  text: וַ/יַּעֲל֣וּ פְלִשְׁתִּ֔ים וַֽ/יַּחֲנ֖וּ בִּ/יהוּדָ֑ה וַ/יִּנָּטְשׁ֖וּ בַּ/לֶּֽחִי׃
translation:
  text: Then the Philistines went up and camped in Judah, and spread out at Lehi.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deployed themselves at Lehi.' The Hebrew verb can suggest spreading
      out in a military sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲלוּ
  chosen: went up
  alternatives:
  - came up
  - marched up
  lexicon: HALOT
  rationale: עלה in narrative commonly means 'go up/come up,' often with geographic
    or military movement. 'Went up' preserves the conventional directional sense without
    overinterpreting the route.
- source_word: פְלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard ethnic designation for the people group; definite article is
    natural in English for a known national enemy.
- source_word: וַיַּחֲנוּ
  chosen: camped
  alternatives:
  - encamped
  - pitched camp
  lexicon: HALOT
  rationale: חנה denotes setting up camp. 'Camped' is clear modern English; 'encamped'
    is more formal but less natural.
- source_word: בִּיהוּדָה
  chosen: in Judah
  alternatives:
  - against Judah
  lexicon: HALOT
  rationale: The preposition ב normally indicates location here. Since the next clause
    specifies Lehi, 'in Judah' best reflects geographic setting rather than hostility,
    which is already implied by context.
- source_word: וַיִּנָּטְשׁוּ
  chosen: spread out
  alternatives:
  - deployed themselves
  - made a raid
  - were scattered
  lexicon: HALOT
  rationale: From נטשׁ in this stem/context, the sense is that the force extended
    or deployed itself over an area. 'Spread out' captures the military movement idiomatically
    without forcing a more technical term.
- source_word: בַּלֶּחִי
  chosen: at Lehi
  alternatives:
  - in Lehi
  lexicon: HALOT
  rationale: Lehi is a place name here. 'At Lehi' fits the sense of military positioning
    at a site better than 'in Lehi,' though either is possible.
