id: JDG.15.7
reference: Judges 15:7
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר לָ/הֶם֙ שִׁמְשׁ֔וֹן אִֽם תַּעֲשׂ֖וּ/ן כָּ/זֹ֑את כִּ֛י אִם נִקַּ֥מְתִּי
    בָ/כֶ֖ם וְ/אַחַ֥ר אֶחְדָּֽל־־׃
translation:
  text: And Samson said to them, “If this is what you do, then I swear I will take
    vengeance on you, and after that I will stop.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “If you do such a thing, surely I will avenge myself on you, and afterward
      I will stop.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative advance; 'And ... said' preserves Hebrew
    narrative flow without overinterpreting temporal sequence.
- source_word: לָהֶם
  chosen: to them
  lexicon: HALOT
  rationale: Directly reflects the preposition plus 3mp suffix, indicating Samson's
    speech is addressed to the Philistines.
- source_word: שִׁמְשׁוֹן
  chosen: Samson
  rationale: Personal name is transliterated by standard English convention per translation
    philosophy.
- source_word: אִם תַּעֲשׂוּן כָּזֹאת
  chosen: If this is what you do
  alternatives:
  - If you do such a thing
  - If you act like this
  lexicon: HALOT
  rationale: The clause is conditional and idiomatic. 'If this is what you do' is
    natural modern English while preserving the force of the Hebrew expression.
- source_word: כִּי אִם
  chosen: then I swear
  alternatives:
  - surely
  - indeed
  - for if
  lexicon: HALOT
  rationale: Here the particle combination is idiomatic and emphatic, introducing
    Samson's resolve. 'Then I swear' captures the asseverative force better than a
    wooden rendering, while remaining within the source sense.
- source_word: נִקַּמְתִּי
  chosen: I will take vengeance
  alternatives:
  - I avenge myself
  - I will be avenged
  lexicon: HALOT
  rationale: From נקם in the Niphal, used here with active retaliatory sense in context.
    Future English best fits the forward-looking resolve after the conditional clause.
- source_word: בָכֶם
  chosen: on you
  alternatives:
  - against you
  lexicon: HALOT
  rationale: English idiom with 'take vengeance' normally takes 'on'; this preserves
    the hostile object relation.
- source_word: וְאַחַר
  chosen: and after that
  alternatives:
  - and afterward
  - then afterward
  lexicon: HALOT
  rationale: Temporal adverb marking sequence; 'after that' is clear and natural.
- source_word: אֶחְדָּל
  chosen: I will stop
  alternatives:
  - I will cease
  - I will desist
  lexicon: HALOT
  rationale: חדל means to cease/stop. 'I will stop' is readable modern English and
    fits Samson's statement that his retaliation will end after this act.
