id: JDG.15.17
reference: Judges 15:17
source:
  edition: WLC
  text: וַֽ/יְהִי֙ כְּ/כַלֹּת֣/וֹ לְ/דַבֵּ֔ר וַ/יַּשְׁלֵ֥ךְ הַ/לְּחִ֖י מִ/יָּד֑/וֹ
    וַ/יִּקְרָ֛א לַ/מָּק֥וֹם הַ/ה֖וּא רָ֥מַת לֶֽחִי׃
translation:
  text: And when he had finished speaking, he threw the jawbone from his hand, and
    he called that place Ramath-lehi.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ramath-lehi likely means "Jawbone Hill" or "Height of the Jawbone," preserving
      the wordplay with lehi, "jawbone."
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּכַלֹּתוֹ
  chosen: when he had finished
  alternatives:
  - as he finished
  - after he finished
  lexicon: HALOT
  rationale: The prefixed כְ with the infinitive construct of כלה plus pronominal
    suffix gives a temporal sense, 'when/after he finished.' 'When he had finished'
    is natural English and preserves the sequence leading into the next action.
- source_word: לְדַבֵּר
  chosen: speaking
  alternatives:
  - to speak
  lexicon: HALOT
  rationale: With כְּכַלֹּתוֹ, this infinitive completes the idiom 'when he had finished
    speaking.' English gerund style is the most natural equivalent.
- source_word: וַיַּשְׁלֵךְ
  chosen: he threw
  alternatives:
  - he cast
  - he flung
  lexicon: HALOT
  rationale: The verb שלה/שלך here denotes throwing or casting away. 'Threw' is clear
    modern English; 'cast' is more traditional but less natural, and 'flung' may overstate
    force not explicit in the verb.
- source_word: הַלְּחִי
  chosen: the jawbone
  alternatives:
  - the jaw
  lexicon: HALOT
  rationale: In context this refers to the donkey's jawbone used as Samson's weapon
    in the preceding verses. 'Jawbone' is the clearest contextual rendering in English.
- source_word: מִיָּדוֹ
  chosen: from his hand
  alternatives:
  - out of his hand
  lexicon: HALOT
  rationale: A straightforward rendering of the preposition מן plus 'hand.' 'From
    his hand' preserves the Hebrew wording and idiom naturally.
- source_word: וַיִּקְרָא
  chosen: he called
  alternatives:
  - he named
  lexicon: HALOT
  rationale: The verb קרא with a place-name can mean 'call/name.' 'He called' stays
    closer to the Hebrew while remaining idiomatic with the following object and name.
- source_word: לַמָּקוֹם הַהוּא
  chosen: that place
  alternatives:
  - the place
  - that location
  lexicon: HALOT
  rationale: The phrase literally means 'to that place' in a naming construction.
    English idiom prefers 'he called that place...'
- source_word: רָמַת לֶחִי
  chosen: Ramath-lehi
  alternatives:
  - Jawbone Hill
  - Height of Lehi
  lexicon: HALOT
  rationale: Per translation philosophy, personal and place names are transliterated
    rather than translated in the main text. The Hebrew name is a wordplay involving
    'height/hill' and 'jawbone/Lehi,' so the transliteration is retained and the sense
    preserved in a footnote.
