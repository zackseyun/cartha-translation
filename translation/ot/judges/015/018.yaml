id: JDG.15.18
reference: Judges 15:18
source:
  edition: WLC
  text: וַ/יִּצְמָא֮ מְאֹד֒ וַ/יִּקְרָ֤א אֶל יְהוָה֙ וַ/יֹּאמַ֔ר אַתָּה֙ נָתַ֣תָּ
    בְ/יַֽד עַבְדְּ/ךָ֔ אֶת הַ/תְּשׁוּעָ֥ה הַ/גְּדֹלָ֖ה הַ/זֹּ֑את וְ/עַתָּה֙ אָמ֣וּת
    בַּ/צָּמָ֔א וְ/נָפַלְתִּ֖י בְּ/יַ֥ד הָ/עֲרֵלִֽים־־־׃
translation:
  text: And he became very thirsty, and he called to the LORD and said, “You have
    given this great deliverance by the hand of your servant, and now shall I die
    from thirst and fall into the hand of the uncircumcised?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “he cried out to the LORD.”
    reason: lexical_alternative
  - marker: b
    text: “This great deliverance” could also be rendered “this great victory” or
      “this great salvation.”
    reason: lexical_alternative
  - marker: c
    text: “The uncircumcised” refers to Israel’s enemies, here especially the Philistines,
      using a covenantally charged term rather than an ethnic name.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּצְמָא מְאֹד
  chosen: he became very thirsty
  alternatives:
  - he was very thirsty
  - he thirsted greatly
  lexicon: HALOT
  rationale: The verb צמא denotes becoming thirsty or suffering thirst. 'Became very
    thirsty' reflects the ingressive sense of the wayyiqtol in context and reads naturally
    in modern English.
- source_word: וַיִּקְרָא אֶל יְהוָה
  chosen: he called to the LORD
  alternatives:
  - he cried out to the LORD
  lexicon: HALOT
  rationale: קרא אל commonly means to call out to someone in appeal or prayer. 'Called
    to' is slightly more formal; 'cried out to' is possible but adds emotional coloring
    not strictly required by the Hebrew. יְהוָה follows the doctrinal default 'the
    LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, the default rendering of the divine
    name is 'the LORD' rather than a transliteration.
- source_word: אַתָּה נָתַתָּ
  chosen: You have given
  alternatives:
  - You gave
  lexicon: HALOT
  rationale: The perfect can be rendered as a completed past action with present relevance.
    'You have given' fits Samson's prayerful acknowledgment of the just-accomplished
    victory.
- source_word: בְיַד עַבְדְּךָ
  chosen: by the hand of your servant
  alternatives:
  - through your servant
  - into your servant's hand
  lexicon: HALOT
  rationale: The idiom ביד can denote agency or instrumentality. 'By the hand of your
    servant' preserves the Hebrew image while remaining understandable. 'Through your
    servant' is smoother but less formally transparent.
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote slave or servant, here Samson speaks deferentially
    to God in a conventional self-designation. The bonded-status nuance is not foregrounded,
    so 'servant' is the better contextual rendering under optimal equivalence.
- source_word: הַתְּשׁוּעָה הַגְּדֹלָה הַזֹּאת
  chosen: this great deliverance
  alternatives:
  - this great salvation
  - this great victory
  lexicon: HALOT
  rationale: תשועה can mean deliverance, salvation, or victory. In Judges, the immediate
    referent is military rescue/victory granted by God, and 'deliverance' preserves
    both the concrete and theological dimensions better than the narrower 'victory'
    or more potentially anachronistic 'salvation'.
- source_word: וְעַתָּה
  chosen: and now
  alternatives:
  - now
  lexicon: HALOT
  rationale: The conjunction plus adverb marks the ironic contrast between the great
    victory and Samson's present danger. 'And now' preserves that rhetorical turn.
- source_word: אָמוּת בַּצָּמָא
  chosen: shall I die from thirst
  alternatives:
  - am I to die of thirst
  - shall I die in thirst
  lexicon: HALOT
  rationale: The interrogative force is pragmatic rather than marked by a formal interrogative
    particle; English expresses this naturally as a rhetorical question. ב + noun
    here indicates cause/circumstance, best rendered 'from thirst' or 'of thirst.'
- source_word: וְנָפַלְתִּי בְּיַד
  chosen: and fall into the hand of
  alternatives:
  - and fall by the hand of
  - and be given into the hand of
  lexicon: HALOT
  rationale: נפל ביד is an idiom for falling into someone's power. 'Fall into the
    hand of' is the most transparent equivalent and preserves the Hebrew metaphor.
- source_word: הָעֲרֵלִים
  chosen: the uncircumcised
  alternatives:
  - the Philistines
  lexicon: HALOT
  rationale: The Hebrew adjective literally means 'the uncircumcised' and functions
    here as a covenantally charged designation for Israel's enemies, likely the Philistines.
    The literal rendering preserves the theological and rhetorical force better than
    replacing it with the ethnic referent.
