theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse directly addresses Israel's covenant God. Following the project's
    doctrinal standard, the Tetragrammaton is rendered 'the LORD' rather than transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Covenantal force of הָעֲרֵלִים
  chosen_reading: the uncircumcised
  alternative_readings:
  - the Philistines
  rationale: Samson's wording is not merely ethnic but covenantal, contrasting God's
    deliverance with the shame of falling into the power of those outside the covenant
    sign. The literal rendering preserves that theological tension without overexplaining
    it in the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 5
