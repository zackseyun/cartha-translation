id: JDG.15.5
reference: Judges 15:5
source:
  edition: WLC
  text: וַ/יַּבְעֶר אֵשׁ֙ בַּ/לַּפִּידִ֔ים וַ/יְשַׁלַּ֖ח בְּ/קָמ֣וֹת פְּלִשְׁתִּ֑ים
    וַ/יַּבְעֵ֛ר מִ/גָּדִ֥ישׁ וְ/עַד קָמָ֖ה וְ/עַד כֶּ֥רֶם זָֽיִת־־־׃
translation:
  text: He set fire to the torches and let them go into the standing grain of the
    Philistines, and burned up the shocks and the standing grain, and even the olive
    groves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'firebrands' for 'torches.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from the heap/stacked grain to the standing grain and as far as
      the olive grove'; the translation renders the extent idiomatically as a list
      of what was burned.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּבְעֶר
  chosen: set fire to
  alternatives:
  - kindled
  - burned
  lexicon: HALOT
  rationale: The verb בער in the Hiphil here means to ignite or kindle. 'Set fire
    to' is idiomatic modern English and fits the direct object 'the torches.'
- source_word: אֵשׁ
  chosen: fire
  lexicon: HALOT
  rationale: Standard rendering of אֵשׁ. In English it is absorbed naturally into
    the verbal phrase 'set fire to.'
- source_word: לַפִּידִים
  chosen: torches
  alternatives:
  - brands
  lexicon: HALOT
  rationale: לַפִּידִים refers to flaming torches or firebrands. 'Torches' is the
    clearest modern term; 'brands' is possible but less immediately clear.
- source_word: וַיְשַׁלַּח
  chosen: let them go
  alternatives:
  - sent
  - released
  lexicon: HALOT
  rationale: The verb means 'sent' or 'let loose.' Given the narrative context of
    Samson releasing the animals with torches attached from the previous verse, 'let
    them go' best conveys the action in natural English without repeating details
    not stated in this verse.
- source_word: בְּקָמוֹת
  chosen: into the standing grain
  alternatives:
  - among the standing grain
  - into the grain fields
  lexicon: HALOT
  rationale: קָמָה denotes standing grain, i.e., grain still rooted in the field.
    'Standing grain' preserves the agricultural specificity better than the broader
    'grain fields.'
- source_word: פְּלִשְׁתִּים
  chosen: of the Philistines
  lexicon: HALOT
  rationale: Standard gentilic rendering.
- source_word: וַיַּבְעֵר
  chosen: burned up
  alternatives:
  - set ablaze
  - consumed
  lexicon: HALOT
  rationale: A second use of בער summarizes the destructive result. 'Burned up' communicates
    completed destruction in readable English.
- source_word: מִגָּדִישׁ
  chosen: the shocks
  alternatives:
  - the stacked grain
  - the grain heaps
  lexicon: HALOT
  rationale: גָּדִישׁ refers to a heap or stack of harvested grain. 'Shocks' is a
    traditional agricultural term for bundled sheaves set together in the field; it
    preserves the distinction from the standing grain, though 'stacked grain' is also
    possible.
- source_word: וְעַד קָמָה
  chosen: and the standing grain
  alternatives:
  - as far as the standing grain
  lexicon: HALOT
  rationale: The construction מִן...וְעַד marks extent, 'from...to....' In idiomatic
    English after 'burned up,' listing the affected items as 'the shocks and the standing
    grain' communicates the range of destruction clearly.
- source_word: וְעַד כֶּרֶם זָיִת
  chosen: and even the olive groves
  alternatives:
  - as far as the olive orchard
  - and the olive vineyard/orchard
  lexicon: HALOT
  rationale: כֶּרֶם usually denotes a cultivated plantation, often a vineyard, and
    with זַיִת specifies olive cultivation. 'Olive groves' is the most natural English
    expression for an olive plantation. 'Even' reflects the climactic extension of
    the damage.
