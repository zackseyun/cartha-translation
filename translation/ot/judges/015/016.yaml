id: JDG.15.16
reference: Judges 15:16
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר שִׁמְשׁ֔וֹן בִּ/לְחִ֣י הַ/חֲמ֔וֹר חֲמ֖וֹר חֲמֹרָתָ֑יִם בִּ/לְחִ֣י
    הַ/חֲמ֔וֹר הִכֵּ֖יתִי אֶ֥לֶף אִֽישׁ׃
translation:
  text: Then Samson said, “With the jawbone of a donkey—heaps upon heaps! With the
    jawbone of a donkey I have struck down a thousand men.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew uses a wordplay: the same consonants behind ''donkey'' sound like
      the term rendered ''heaps.'' Traditional renderings such as ''a heap, two heaps''
      attempt to preserve the pun more literally.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - and ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence.
- source_word: שִׁמְשׁוֹן
  chosen: Samson
  rationale: Standard English transliteration of the personal name.
- source_word: בִּלְחִי הַחֲמוֹר
  chosen: With the jawbone of a donkey
  alternatives:
  - By the jawbone of the donkey
  - With a donkey's jawbone
  lexicon: HALOT
  rationale: לְחִי means 'jawbone/cheek'; here the object used as a weapon is clearly
    'jawbone.' The preposition ב marks instrument, best rendered 'with.' The article
    on 'donkey' is retained in Hebrew, but English idiom prefers the indefinite expression
    in this poetic exclamation.
- source_word: חֲמוֹר
  chosen: donkey
  alternatives:
  - ass
  lexicon: HALOT
  rationale: Modern readable English favors 'donkey'; 'ass' is traditional but potentially
    distracting for contemporary readers.
- source_word: חֲמוֹר חֲמֹרָתָיִם
  chosen: heaps upon heaps
  alternatives:
  - a heap, two heaps
  - donkey upon donkeys
  - an ass, two asses
  lexicon: HALOT
  rationale: This is a wordplay on חֲמוֹר ('donkey') and a similar-sounding form meaning
    'heap/heaps,' likely an intensive or dual expression. The sense in context is
    Samson's taunt celebrating piled-up slain enemies. 'Heaps upon heaps' preserves
    the poetic force in idiomatic English, while the donkey/heap pun is noted in a
    footnote.
- source_word: הִכֵּיתִי
  chosen: I have struck down
  alternatives:
  - I struck
  - I have killed
  lexicon: HALOT
  rationale: נכה commonly means 'strike, smite'; in this context it results in death,
    but 'struck down' preserves the lexical sense without over-specifying beyond the
    verb itself. The perfect can be rendered naturally in English as 'I have struck
    down' in this victory utterance.
- source_word: אֶלֶף אִישׁ
  chosen: a thousand men
  alternatives:
  - a thousand people
  lexicon: HALOT
  rationale: אִישׁ is masculine singular used collectively here; 'men' is gender-accurate
    and fits the military context better than a neutral term.
