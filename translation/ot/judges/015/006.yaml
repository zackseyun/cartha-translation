id: JDG.15.6
reference: Judges 15:6
source:
  edition: WLC
  text: וַ/יֹּאמְר֣וּ פְלִשְׁתִּים֮ מִ֣י עָ֣שָׂה זֹאת֒ וַ/יֹּאמְר֗וּ שִׁמְשׁוֹן֙ חֲתַ֣ן
    הַ/תִּמְנִ֔י כִּ֚י לָקַ֣ח אֶת אִשְׁתּ֔/וֹ וַֽ/יִּתְּנָ֖/הּ לְ/מֵרֵעֵ֑/הוּ וַ/יַּעֲל֣וּ
    פְלִשְׁתִּ֔ים וַ/יִּשְׂרְפ֥וּ אוֹתָ֛/הּ וְ/אֶת אָבִ֖י/הָ בָּ/אֵֽשׁ־־׃
translation:
  text: Then the Philistines said, “Who did this?” And they said, “Samson, the Timnite’s
    son-in-law, because he took his wife and gave her to his companion.” So the Philistines
    went up and burned her and her father with fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “gave her to his friend.” The Hebrew term can denote a companion or friend;
      some understand it more specifically in the wedding context as a groomsman or
      best man.
    reason: lexical_alternative
  - marker: b
    text: Literally “burned her and her father with fire.”
    reason: lexical_alternative
lexical_decisions:
- source_word: פְלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard ethnonym; definite article supplied naturally in English for
    the known people group in context.
- source_word: מִי עָשָׂה זֹאת
  chosen: Who did this?
  alternatives:
  - Who has done this?
  lexicon: HALOT
  rationale: Simple past fits the Hebrew narrative perfect in direct speech and reads
    naturally in English.
- source_word: חֲתַן הַתִּמְנִי
  chosen: the Timnite’s son-in-law
  alternatives:
  - the son-in-law of the Timnite
  - the Timnite's bridegroom
  lexicon: HALOT
  rationale: חָתָן can denote a marriage relation such as bridegroom or son-in-law.
    In this context Samson is related to the Timnite as the husband of his daughter,
    so 'the Timnite’s son-in-law' is the clearest contextual rendering.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for identifying Samson as the perpetrator; 'because'
    is clearer in modern English than the more formal 'for'.
- source_word: לָקַח אֶת אִשְׁתּוֹ
  chosen: he took his wife
  alternatives:
  - he took away his wife
  - he took Samson's wife
  lexicon: HALOT
  rationale: The subject is the Timnite father from the prior phrase. Hebrew leaves
    the subject implicit; English preserves the flow while keeping the most direct
    verbal sense 'took.' The possessive 'his wife' refers to Samson's wife from Samson's
    perspective in the reported explanation.
- source_word: וַיִּתְּנָהּ לְמֵרֵעֵהוּ
  chosen: and gave her to his companion
  alternatives:
  - and gave her to his friend
  - and gave her to his best man
  lexicon: HALOT
  rationale: מֵרֵעַ commonly means companion or friend. 'Companion' preserves some
    ambiguity and matches the earlier narrative relationship without over-specifying
    a ceremonial role.
- source_word: וַיַּעֲלוּ
  chosen: went up
  alternatives:
  - came up
  lexicon: HALOT
  rationale: Literal narrative idiom of movement retained; 'went up' is standard and
    sufficiently natural.
- source_word: וַיִּשְׂרְפוּ אוֹתָהּ וְאֶת אָבִיהָ בָּאֵשׁ
  chosen: burned her and her father with fire
  alternatives:
  - burned her and her father to death
  - set her and her father on fire
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'burned ... with fire.' Retaining 'with fire'
    preserves the emphatic instrument and avoids adding 'to death,' though death is
    clearly implied by context.
