id: JDG.15.4
reference: Judges 15:4
source:
  edition: WLC
  text: וַ/יֵּ֣לֶךְ שִׁמְשׁ֔וֹן וַ/יִּלְכֹּ֖ד שְׁלֹשׁ מֵא֣וֹת שׁוּעָלִ֑ים וַ/יִּקַּ֣ח
    לַפִּדִ֗ים וַ/יֶּ֤פֶן זָנָב֙ אֶל זָנָ֔ב וַ/יָּ֨שֶׂם לַפִּ֥יד אֶחָ֛ד בֵּין שְׁנֵ֥י
    הַ/זְּנָב֖וֹת בַּ/תָּֽוֶךְ־־־׃
translation:
  text: So Shimshon went and caught three hundred foxes, and he took torches and turned
    tail to tail, and put one torch between each pair of tails, in the middle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'jackals.' The Hebrew שׁוּעָלִים can refer to foxes or similar canids;
      'foxes' is retained as the main rendering because it is the most common sense
      and fits the narrative tradition.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - set out
  - went off
  lexicon: HALOT
  rationale: Common wayyiqtol of הלך introducing the action sequence; 'went' is the
    plain narrative rendering.
- source_word: שִׁמְשׁוֹן
  chosen: Shimshon
  alternatives:
  - Samson
  rationale: Per philosophy, personal names are transliterated rather than replaced
    by traditional Anglicized forms.
- source_word: וַיִּלְכֹּד
  chosen: caught
  alternatives:
  - captured
  - seized
  lexicon: HALOT
  rationale: The verb לכד in this context refers to trapping live animals; 'caught'
    is natural and accurate.
- source_word: שְׁלֹשׁ מֵאוֹת
  chosen: three hundred
  rationale: Straightforward cardinal number construction.
- source_word: שׁוּעָלִים
  chosen: foxes
  alternatives:
  - jackals
  lexicon: HALOT
  rationale: The traditional and most common rendering is 'foxes.' The Hebrew שׁוּעָל
    can denote foxes and may in some contexts overlap with jackals, but absent compelling
    contextual necessity the main text keeps 'foxes' while preserving 'jackals' in
    a footnote.
- source_word: לַפִּדִים / לַפִּיד
  chosen: torches
  alternatives:
  - firebrands
  lexicon: HALOT
  rationale: Refers to burning brands/torches. 'Torches' is clearer modern English;
    'firebrands' is more traditional but less accessible.
- source_word: וַיֶּפֶן זָנָב אֶל זָנָב
  chosen: turned tail to tail
  alternatives:
  - tied tail to tail
  - paired tail to tail
  lexicon: HALOT
  rationale: The verb פנה literally means 'turn.' The text states he arranged them
    tail to tail; it does not explicitly say 'tied,' so the translation avoids adding
    that detail.
- source_word: וַיָּשֶׂם לַפִּיד אֶחָד
  chosen: put one torch
  alternatives:
  - placed one torch
  - set one torch
  lexicon: HALOT
  rationale: Simple rendering of שׂים with direct object.
- source_word: בֵּין שְׁנֵי הַזְּנָבוֹת
  chosen: between each pair of tails
  alternatives:
  - between the two tails
  lexicon: HALOT
  rationale: Literally 'between the two tails.' In idiomatic English, 'between each
    pair of tails' makes clear that the action is repeated for the paired animals.
- source_word: בַּתָּוֶךְ
  chosen: in the middle
  alternatives:
  - in the midst
  - between them
  lexicon: HALOT
  rationale: Adverbial clarification of placement. 'In the middle' is natural modern
    English and reflects the Hebrew.
