id: JDG.15.11
reference: Judges 15:11
source:
  edition: WLC
  text: וַ/יֵּרְד֡וּ שְׁלֹשֶׁת֩ אֲלָפִ֨ים אִ֜ישׁ מִֽ/יהוּדָ֗ה אֶל סְעִיף֮ סֶ֣לַע עֵיטָם֒
    וַ/יֹּאמְר֣וּ לְ/שִׁמְשׁ֗וֹן הֲ/לֹ֤א יָדַ֨עְתָּ֙ כִּֽי מֹשְׁלִ֥ים בָּ֨/נוּ֙ פְּלִשְׁתִּ֔ים
    וּ/מַה זֹּ֖את עָשִׂ֣יתָ לָּ֑/נוּ וַ/יֹּ֣אמֶר לָ/הֶ֔ם כַּ/אֲשֶׁר֙ עָ֣שׂוּ לִ֔/י
    כֵּ֖ן עָשִׂ֥יתִי לָ/הֶֽם־־־׃
translation:
  text: Then three thousand men of Judah went down to the cleft of the rock of Etam
    and said to Samson, “Do you not know that the Philistines are ruling over us?
    What then is this that you have done to us?” And he said to them, “As they did
    to me, so I have done to them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fissure of the rock of Etam.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרְדוּ
  chosen: went down
  alternatives:
  - came down
  - descended
  lexicon: HALOT
  rationale: Basic narrative wayyiqtol of ירד, indicating downward movement. 'Went
    down' is natural modern English and preserves the directional sense.
- source_word: שְׁלֹשֶׁת אֲלָפִים אִישׁ
  chosen: three thousand men
  alternatives:
  - three thousand menfolk
  - three thousand of the men
  lexicon: HALOT
  rationale: The construction gives a counted group of males; 'men' is gender-accurate
    and straightforward. 'Three thousand men' is idiomatic English.
- source_word: מִיהוּדָה
  chosen: of Judah
  alternatives:
  - from Judah
  lexicon: HALOT
  rationale: With the counted group, this identifies them as belonging to Judah. 'Of
    Judah' is concise and idiomatic here, though 'from Judah' would also be possible.
- source_word: אֶל סְעִיף סֶלַע עֵיטָם
  chosen: to the cleft of the rock of Etam
  alternatives:
  - to the fissure of the rock of Etam
  - to the crag of the rock Etam
  lexicon: HALOT
  rationale: סְעִיף denotes a cleft, fissure, or branch-like split. In this topographical
    context, 'cleft' best conveys a rocky split or recess. סֶלַע is 'rock/crag'; rendered
    'rock' in the construct phrase. עֵיטָם is transliterated as the place-name Etam.
- source_word: הֲלֹא יָדַעְתָּ
  chosen: Do you not know
  alternatives:
  - Do you not realize
  - Did you not know
  lexicon: HALOT
  rationale: The interrogative with negation is rhetorical. Present English 'Do you
    not know' best captures the force in context, where they appeal to an obvious
    fact.
- source_word: כִּי מֹשְׁלִים בָּנוּ פְּלִשְׁתִּים
  chosen: that the Philistines are ruling over us
  alternatives:
  - that the Philistines rule over us
  - that the Philistines are our rulers
  lexicon: HALOT
  rationale: מֹשְׁלִים is a participle expressing ongoing domination. 'Are ruling
    over us' preserves the verbal force and the oppressive sense of political control.
- source_word: וּמַה זֹּאת עָשִׂיתָ לָּנוּ
  chosen: What then is this that you have done to us?
  alternatives:
  - What is this you have done to us?
  - Why have you done this to us?
  lexicon: HALOT
  rationale: The Hebrew is literally 'and what is this you have done to us?' The added
    'then' reflects the discourse force after the prior rhetorical question without
    becoming paraphrastic. 'To us' preserves their complaint that Samson's act has
    brought consequences upon them.
- source_word: כַּאֲשֶׁר עָשׂוּ לִי כֵּן עָשִׂיתִי לָהֶם
  chosen: As they did to me, so I have done to them
  alternatives:
  - Just as they did to me, so I did to them
  - I did to them as they did to me
  lexicon: HALOT
  rationale: This is a concise statement of reciprocity. The chosen rendering preserves
    the Hebrew correlative structure and the perfect verbs' summary sense.
