theological_decisions:
- issue: Tone of Samson's reply as retaliatory reciprocity
  chosen_reading: 'Rendered as a straightforward statement of retaliation without
    moral commentary: ''As they did to me, so I have done to them.'''
  alternative_readings:
  - Rendered more interpretively as justified vengeance
  - Rendered more negatively as personal revenge
  rationale: The verse itself reports Samson's rationale but does not explicitly evaluate
    it. To preserve theological tension and avoid importing judgment not stated in
    the text, the translation remains descriptively close to the Hebrew.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
