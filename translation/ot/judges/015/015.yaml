id: JDG.15.15
reference: Judges 15:15
source:
  edition: WLC
  text: וַ/יִּמְצָ֥א לְחִֽי חֲמ֖וֹר טְרִיָּ֑ה וַ/יִּשְׁלַ֤ח יָד/וֹ֙ וַ/יִּקָּחֶ֔/הָ
    וַ/יַּךְ בָּ֖/הּ אֶ֥לֶף אִֽישׁ־־׃
translation:
  text: And he found a fresh jawbone of a donkey, and he reached out his hand and
    took it, and with it he struck down a thousand men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a new jawbone of a donkey.' The Hebrew adjective can denote something
      fresh or newly available.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְצָא
  chosen: he found
  alternatives:
  - he came upon
  lexicon: HALOT
  rationale: Standard wayyiqtol of מצא, narrating a simple past event. 'Found' is
    the plain and natural English equivalent.
- source_word: לְחִי חֲמוֹר
  chosen: jawbone of a donkey
  alternatives:
  - cheekbone of a donkey
  - jaw of a donkey
  lexicon: HALOT
  rationale: לְחִי denotes the jaw/jawbone or cheek area; in this narrative context
    it is clearly a usable bone weapon, so 'jawbone' is more precise than 'cheekbone.'
    The construct with חֲמוֹר is naturally rendered 'of a donkey.'
- source_word: טְרִיָּה
  chosen: fresh
  alternatives:
  - new
  - still moist
  lexicon: HALOT
  rationale: The adjective means fresh, not dried out. 'Fresh' is idiomatic and preserves
    the likely sense that the bone was recently available and not brittle.
- source_word: וַיִּשְׁלַח יָדוֹ
  chosen: he reached out his hand
  alternatives:
  - he stretched out his hand
  - he put out his hand
  lexicon: HALOT
  rationale: The idiom literally includes 'hand' and is common in Hebrew narrative.
    'Reached out his hand' keeps the concrete imagery while remaining natural English.
- source_word: וַיִּקָּחֶהָ
  chosen: took it
  alternatives:
  - seized it
  lexicon: HALOT
  rationale: לקח with feminine suffix refers back to the jawbone. 'Took it' is the
    straightforward narrative rendering.
- source_word: וַיַּךְ בָּהּ
  chosen: with it he struck down
  alternatives:
  - he struck with it
  - he killed with it
  lexicon: HALOT
  rationale: נכה often means strike/smite and in context results in death. 'Struck
    down' communicates the lethal outcome without overtranslating the verb itself;
    fronting 'with it' reflects the instrumental בָּהּ naturally in English.
- source_word: אֶלֶף אִישׁ
  chosen: a thousand men
  alternatives:
  - one thousand men
  - a thousand people
  lexicon: HALOT
  rationale: אִישׁ is masculine singular used distributively after the number. Given
    the combat setting, 'men' is the gender-accurate rendering, not the more generic
    'people.'
