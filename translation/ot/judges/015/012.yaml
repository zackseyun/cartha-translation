id: JDG.15.12
reference: Judges 15:12
source:
  edition: WLC
  text: וַ/יֹּ֤אמְרוּ ל/וֹ֙ לֶ/אֱסָרְ/ךָ֣ יָרַ֔דְנוּ לְ/תִתְּ/ךָ֖ בְּ/יַד פְּלִשְׁתִּ֑ים
    וַ/יֹּ֤אמֶר לָ/הֶם֙ שִׁמְשׁ֔וֹן הִשָּׁבְע֣וּ לִ֔/י פֶּֽן תִּפְגְּע֥וּ/ן בִּ֖/י
    אַתֶּֽם־־׃
translation:
  text: They said to him, “We have come down to bind you, to hand you over into the
    hand of the Philistines.” Samson said to them, “Swear to me that you yourselves
    will not attack me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to deliver you into the power of the Philistines.” The Hebrew idiom
      is literally “to give you into the hand of the Philistines.”
    reason: lexical_alternative
  - marker: b
    text: Or “that you yourselves will not fall upon me.” The verb can denote violent
      assault in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶאֱסָרְךָ
  chosen: to bind you
  alternatives:
  - to tie you up
  - to seize you
  lexicon: HALOT
  rationale: אָסַר commonly means to bind or tie. 'Bind you' is the most direct and
    idiomatic rendering in this context of arrest/restraint.
- source_word: יָרַדְנוּ
  chosen: we have come down
  alternatives:
  - we came down
  - we went down
  lexicon: HALOT
  rationale: יָרַד is literally 'go down/come down.' Given the speakers' movement
    toward Samson from Judah to the rock area, 'have come down' preserves the directional
    sense while reading naturally in English.
- source_word: לְתִתְּךָ בְּיַד
  chosen: to hand you over into the hand of
  alternatives:
  - to deliver you into the hand of
  - to give you into the power of
  lexicon: HALOT
  rationale: The idiom נתן ביד means to give someone into another's power. 'Hand you
    over into the hand of' keeps the Hebrew imagery while remaining readable; the
    repeated 'hand' is significant enough to preserve rather than flatten completely.
- source_word: פְּלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard transliteration for the people group.
- source_word: הִשָּׁבְעוּ לִי
  chosen: Swear to me
  alternatives:
  - Take an oath to me
  - Promise me under oath
  lexicon: HALOT
  rationale: The Niphal imperative of שׁבע here calls for an oath, not a mere promise.
    'Swear to me' is concise and forceful.
- source_word: פֶּן
  chosen: that ... not
  alternatives:
  - lest
  - so that ... not
  lexicon: HALOT
  rationale: פֶּן introduces a negative precaution. In contemporary English after
    'swear to me,' the construction 'that you will not' communicates the sense more
    naturally than 'lest'.
- source_word: תִּפְגְּעוּן בִּי
  chosen: you yourselves will not attack me
  alternatives:
  - you yourselves will not fall upon me
  - you yourselves will not strike me
  - you yourselves will not kill me
  lexicon: HALOT
  rationale: פגע can mean meet, encounter, fall upon, strike, or attack depending
    on context. Here Samson seeks assurance that his own countrymen will not turn
    violent against him while surrendering him. 'Attack me' best captures the broad
    threat without over-specifying death.
- source_word: אַתֶּם
  chosen: you yourselves
  alternatives:
  - you
  - you on your part
  lexicon: HALOT
  rationale: The explicit pronoun adds emphasis. 'You yourselves' preserves Samson's
    concern that they personally not assault him, even if they bind him for transfer.
