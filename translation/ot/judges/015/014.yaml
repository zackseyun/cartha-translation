id: JDG.15.14
reference: Judges 15:14
source:
  edition: WLC
  text: הוּא בָ֣א עַד לֶ֔חִי וּ/פִלְשִׁתִּ֖ים הֵרִ֣יעוּ לִ/קְרָאת֑/וֹ וַ/תִּצְלַ֨ח
    עָלָ֜י/ו ר֣וּחַ יְהוָ֗ה וַ/תִּהְיֶ֨ינָה הָ/עֲבֹתִ֜ים אֲשֶׁ֣ר עַל זְרוֹעוֹתָ֗י/ו
    כַּ/פִּשְׁתִּים֙ אֲשֶׁ֣ר בָּעֲר֣וּ בָ/אֵ֔שׁ וַ/יִּמַּ֥סּוּ אֱסוּרָ֖י/ו מֵ/עַ֥ל
    יָדָֽי/ו־־־׃
translation:
  text: When he came as far as Lehi, the Philistines shouted as they came to meet
    him. Then the Spirit of the LORD rushed upon him, and the ropes that were on his
    arms became like flax that has been burned in the fire, and his bonds melted off
    his hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lehi is a place name; the Hebrew word is also related to 'jawbone,' an important
      motif in the surrounding narrative.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶחִי
  chosen: Lehi
  alternatives:
  - Jawbone
  lexicon: HALOT
  rationale: Rendered as the place name 'Lehi' because in context Samson is arriving
    at a location already identified by that name. The lexical sense 'jawbone' is
    relevant etymologically and in the wider narrative, but here the proper-name function
    is primary.
- source_word: הֵרִיעוּ לִקְרָאתוֹ
  chosen: shouted as they came to meet him
  alternatives:
  - raised a shout to meet him
  - gave a war cry at his approach
  lexicon: HALOT
  rationale: הֵרִיעוּ denotes a loud cry or shout, often in battle or triumph. The
    infinitive phrase לִקְרָאתוֹ adds motion/encounter ('to meet him'). The chosen
    rendering preserves both the vocal outcry and the confrontational approach without
    over-specifying 'war cry'.
- source_word: וַתִּצְלַח עָלָיו רוּחַ יְהוָה
  chosen: the Spirit of the LORD rushed upon him
  alternatives:
  - came powerfully upon him
  - came mightily upon him
  lexicon: HALOT
  rationale: צלח with רוּחַ יְהוָה in Judges commonly conveys a sudden, forceful empowering.
    'Rushed upon him' preserves the vividness and dynamism of the Hebrew better than
    the more traditional but less concrete 'came mightily upon him.' 'the LORD' follows
    the doctrinal default for יְהוָה.
- source_word: הָעֲבֹתִים
  chosen: the ropes
  alternatives:
  - the cords
  - the thick ropes
  lexicon: HALOT
  rationale: The term refers to binding cords/ropes. 'Ropes' is natural modern English
    and fits the context of Samson being bound. 'Thick ropes' may be implied by the
    lexeme in some contexts, but the verse's simile and result do not require that
    nuance in the main text.
- source_word: זְרוֹעֹתָיו
  chosen: his arms
  alternatives:
  - his forearms
  lexicon: HALOT
  rationale: זְרוֹעַ can denote arm in general. 'Arms' is the most natural English
    rendering here; 'forearms' is too anatomically specific for the context.
- source_word: כַּפִּשְׁתִּים
  chosen: like flax
  alternatives:
  - like linen fibers
  lexicon: HALOT
  rationale: פִשְׁתִּים refers to flax. The simile compares the ropes' fragility under
    divine empowerment to flax under fire. 'Flax' is concise and standard.
- source_word: אֲשֶׁר בָּעֲרוּ בָאֵשׁ
  chosen: that has been burned in the fire
  alternatives:
  - when it catches fire
  - scorched by fire
  lexicon: HALOT
  rationale: The clause describes flax affected by fire. 'Has been burned in the fire'
    communicates the completed effect that explains the ropes' disintegration. It
    avoids the awkwardness of a too-literal participial sequence while preserving
    the image.
- source_word: וַיִּמַּסּוּ
  chosen: melted off
  alternatives:
  - dissolved
  - slipped away
  lexicon: HALOT
  rationale: מסס conveys melting/dissolving. 'Melted off' preserves the metaphorical
    force and fits the image of restraints losing all strength and falling away.
- source_word: אֱסוּרָיו
  chosen: his bonds
  alternatives:
  - his bindings
  - his fetters
  lexicon: HALOT
  rationale: The noun denotes what bound him. 'Bonds' is idiomatic, dignified, and
    broad enough for rope restraints; 'fetters' would suggest metal shackles too strongly.
- source_word: מֵעַל יָדָיו
  chosen: off his hands
  alternatives:
  - from upon his hands
  - from his wrists
  lexicon: HALOT
  rationale: The Hebrew is literally 'from upon his hands.' In English, 'off his hands'
    is the most natural equivalent. 'Wrists' is interpretive and more specific than
    the text.
