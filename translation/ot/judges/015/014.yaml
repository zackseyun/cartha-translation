theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines specify 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Depiction of divine empowerment in Samson
  chosen_reading: the Spirit of the LORD rushed upon him
  alternative_readings:
  - the Spirit of the LORD came mightily upon him
  - the Spirit of the LORD came powerfully upon him
  rationale: The translation preserves the text's portrayal of sudden divine empowerment
    without importing later theological categories beyond the narrative's wording.
    'Rushed upon' reflects the Hebrew idiom's force while remaining readable.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source text''s
    plain sense; readable modern English'
