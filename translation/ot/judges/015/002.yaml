id: JDG.15.2
reference: Judges 15:2
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אָבִ֗י/הָ אָמֹ֤ר אָמַ֨רְתִּי֙ כִּי שָׂנֹ֣א שְׂנֵאתָ֔/הּ וָ/אֶתְּנֶ֖/נָּה
    לְ/מֵרֵעֶ֑/ךָ הֲ/לֹ֨א אֲחֹתָ֤/הּ הַ/קְּטַנָּה֙ טוֹבָ֣ה מִמֶּ֔/נָּה תְּהִי נָ֥א
    לְ/ךָ֖ תַּחְתֶּֽי/הָ־־׃
translation:
  text: And her father said, “I really thought that you utterly hated her, so I gave
    her to your companion. Is not her younger sister better than she? Please let her
    be yours instead of her.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to your friend”; the Hebrew term can refer broadly to an associate or
      companion, and in this wedding context some understand it as the man who attended
      Samson as his companion.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָבִיהָ
  chosen: her father
  alternatives:
  - her father said
  lexicon: HALOT
  rationale: Construct form with 3fs suffix refers to the woman previously in context;
    English naturally renders the possessive explicitly as 'her father.'
- source_word: אָמֹר אָמַרְתִּי
  chosen: I really thought
  alternatives:
  - I said to myself
  - I surely thought
  - I indeed thought
  lexicon: HALOT
  rationale: Infinitive absolute + perfect of אמר intensifies the statement. 'I really
    thought' captures the emphatic force in natural modern English without wooden
    repetition.
- source_word: שָׂנֹא שְׂנֵאתָהּ
  chosen: you utterly hated her
  alternatives:
  - you surely hated her
  - you completely hated her
  - you hated her
  lexicon: HALOT
  rationale: Infinitive absolute + perfect of שׂנא intensifies the verb. 'Utterly
    hated' preserves the emphatic force better than a flat 'hated.'
- source_word: וָאֶתְּנֶנָּה
  chosen: so I gave her
  alternatives:
  - and I gave her
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative with consequential sense here;
    'so I gave her' reflects the father's reasoning from his assumption.
- source_word: לְמֵרֵעֶךָ
  chosen: to your companion
  alternatives:
  - to your friend
  - to your best man
  lexicon: HALOT
  rationale: מֵרֵעַ denotes an associate/companion/friend. 'Companion' is broad and
    fits the narrative without over-specifying a wedding role, though 'best man' is
    possible contextually.
- source_word: הֲלֹא
  chosen: Is not
  alternatives:
  - Isn't
  - Surely
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Is not' preserves
    the rhetorical force in a readable but slightly formal way suitable to the dialogue.
- source_word: אֲחֹתָהּ הַקְּטַנָּה
  chosen: her younger sister
  alternatives:
  - her little sister
  - her younger sister
  lexicon: HALOT
  rationale: Though קָטָן can mean 'small' or 'young,' in sibling context 'younger'
    is the idiomatic and contextually appropriate English rendering.
- source_word: טוֹבָה מִמֶּנָּה
  chosen: better than she
  alternatives:
  - better than her
  - more attractive than she
  lexicon: HALOT
  rationale: טוֹב can denote general superiority, not merely physical attractiveness.
    'Better than she' keeps the comparison broad and avoids importing a narrower sense.
- source_word: תְּהִי נָא לְךָ
  chosen: Please let her be yours
  alternatives:
  - Please let her become yours
  - Please take her for yourself
  lexicon: HALOT
  rationale: Jussive היה with particle נָא expresses polite entreaty. 'Please let
    her be yours' communicates the father's proposal in natural English without adding
    explicit marriage language not stated in the Hebrew.
- source_word: תַּחְתֶּיהָ
  chosen: instead of her
  alternatives:
  - in her place
  - as a substitute for her
  lexicon: HALOT
  rationale: תַּחַת here expresses substitution. 'Instead of her' is the clearest
    idiomatic English equivalent.
