id: JDG.15.1
reference: Judges 15:1
source:
  edition: WLC
  text: וַ/יְהִ֨י מִ/יָּמִ֜ים בִּ/ימֵ֣י קְצִיר חִטִּ֗ים וַ/יִּפְקֹ֨ד שִׁמְשׁ֤וֹן אֶת
    אִשְׁתּ/וֹ֙ בִּ/גְדִ֣י עִזִּ֔ים וַ/יֹּ֕אמֶר אָבֹ֥אָה אֶל אִשְׁתִּ֖/י הֶ/חָ֑דְרָ/ה
    וְ/לֹֽא נְתָנ֥/וֹ אָבִ֖י/הָ לָ/בֽוֹא־־־־׃
translation:
  text: And after some days, in the days of the wheat harvest, Samson visited his
    wife with a young goat. He said, “Let me go in to my wife, into the inner room.”
    But her father would not allow him to go in.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “into the chamber.” The Hebrew likely refers to an inner room; in context
      it implies the private marital room.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי מִיָּמִים
  chosen: And after some days
  alternatives:
  - And it happened after some time
  - And after a while
  lexicon: HALOT
  rationale: The idiom marks elapsed time rather than merely introducing narrative.
    'After some days' preserves the Hebrew temporal sense in natural English without
    retaining a wooden 'and it happened.'
- source_word: בִּימֵי קְצִיר חִטִּים
  chosen: in the days of the wheat harvest
  alternatives:
  - at the time of wheat harvest
  - during wheat harvest
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the Hebrew construction 'in the days
    of' while remaining readable. 'Wheat harvest' is the specific seasonal marker.
- source_word: וַיִּפְקֹד
  chosen: visited
  alternatives:
  - went to see
  - paid a visit to
  lexicon: HALOT
  rationale: Here פקד in context means to visit or attend to someone, not to muster,
    appoint, or punish. 'Visited' is concise and idiomatic, while the following gift
    clarifies the purpose.
- source_word: אֶת אִשְׁתּוֹ
  chosen: his wife
  lexicon: HALOT
  rationale: Straightforward possessive rendering. Although the relationship is strained
    in context, the Hebrew still identifies her as his wife.
- source_word: בִּגְדִי עִזִּים
  chosen: with a young goat
  alternatives:
  - with a kid goat
  - bringing a young goat
  lexicon: HALOT
  rationale: The phrase indicates what Samson brought as a gift. 'Young goat' is clear
    modern English; 'kid' could be misunderstood by some readers.
- source_word: אָבֹאָה אֶל אִשְׁתִּי
  chosen: Let me go in to my wife
  alternatives:
  - I will go in to my wife
  - Let me come to my wife
  lexicon: HALOT
  rationale: The cohortative/volitional nuance is best represented by 'Let me go in.'
    The idiom 'go in to' is a conventional biblical euphemism for entering to have
    marital relations, and should be preserved rather than flattened.
- source_word: הֶחָדְרָה
  chosen: into the inner room
  alternatives:
  - into the chamber
  - into the bedroom
  lexicon: HALOT
  rationale: The directional form refers to the room/chamber. 'Inner room' preserves
    the spatial sense without over-specifying 'bedroom,' though the sexual context
    is evident.
- source_word: וְלֹא נְתָנוֹ אָבִיהָ לָבוֹא
  chosen: But her father would not allow him to go in
  alternatives:
  - But her father did not permit him to enter
  - But her father would not let him come in
  lexicon: HALOT
  rationale: The clause expresses refusal of access. 'Would not allow' captures the
    father's active prevention, and 'go in' echoes Samson's own wording for cohesion.
