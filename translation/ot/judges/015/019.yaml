theological_decisions:
- issue: Referent of בַּלֶּחִי / location of the water source
  chosen_reading: Treat Lehi as the place name in the main text rather than translating
    the term as 'jawbone.'
  alternative_readings:
  - the hollow in the jawbone
  rationale: The immediate context repeatedly uses Lehi as a named location, and the
    closing clause 'which is at Lehi to this day' strongly supports a geographical
    reference. Some interpreters understand the water to come from the jawbone itself,
    but the Hebrew here is more naturally read as a hollow place at Lehi. The alternative
    is preserved in a footnote because it affects how the miracle is pictured.
