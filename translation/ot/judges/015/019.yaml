id: JDG.15.19
reference: Judges 15:19
source:
  edition: WLC
  text: וַ/יִּבְקַ֨ע אֱלֹהִ֜ים אֶת הַ/מַּכְתֵּ֣שׁ אֲשֶׁר בַּ/לֶּ֗חִי וַ/יֵּצְא֨וּ
    מִמֶּ֤/נּוּ מַ֨יִם֙ וַ/יֵּ֔שְׁתְּ וַ/תָּ֥שָׁב רוּח֖/וֹ וַ/יֶּ֑חִי עַל כֵּ֣ן קָרָ֣א
    שְׁמָ֗/הּ עֵ֤ין הַקּוֹרֵא֙ אֲשֶׁ֣ר בַּ/לֶּ֔חִי עַ֖ד הַ/יּ֥וֹם הַ/זֶּֽה־־־׀׃
translation:
  text: Then God split open the hollow place that is at Lehi, and water came out from
    it. When he drank, his spirit returned and he revived. Therefore he called its
    name En-hakkore, which is at Lehi to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En-hakkore likely means 'Spring of the Caller' or 'Spring of the one who
      called,' referring to Samson's cry to God.
    reason: lexical_alternative
  - marker: b
    text: Or, according to another reading of the scene, 'God split open the hollow
      in the jawbone, and water came out of it.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּבְקַע
  chosen: split open
  alternatives:
  - cleft
  - broke open
  lexicon: HALOT
  rationale: The verb denotes a forceful splitting or cleaving. 'Split open' is natural
    modern English and preserves the concrete action better than the more archaic
    'clave' or the vaguer 'opened'.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In this narrative context the referent is the God of Israel acting directly;
    'God' is the standard English rendering.
- source_word: הַמַּכְתֵּשׁ
  chosen: the hollow place
  alternatives:
  - the mortar
  - the basin-like hollow
  lexicon: HALOT
  rationale: Though the noun commonly means 'mortar,' in context it refers to a hollow
    or cavity at Lehi from which water emerges. Rendering it as 'the hollow place'
    communicates the topographical sense without forcing a household-object image
    into the main text.
- source_word: בַּלֶּחִי
  chosen: at Lehi
  alternatives:
  - in Lehi
  - in the jawbone
  lexicon: HALOT
  rationale: Lehi is functioning as a place name in the narrative. Although the underlying
    noun can mean 'jawbone,' here the repeated phrase points to the location named
    Lehi rather than the physical jawbone itself.
- source_word: וַיֵּצְאוּ מִמֶּנּוּ מַיִם
  chosen: water came out from it
  alternatives:
  - waters came out of it
  - water flowed from it
  lexicon: HALOT
  rationale: English idiom prefers singular 'water' here. 'Came out from it' closely
    reflects the Hebrew sequence while remaining readable.
- source_word: וַיֵּשְׁתְּ
  chosen: when he drank
  alternatives:
  - and he drank
  lexicon: HALOT
  rationale: The waw-consecutive can be rendered simply as sequence, but in English
    'When he drank' smoothly conveys the temporal relation to the following restoration
    without changing the sense.
- source_word: וַתָּשָׁב רוּחוֹ
  chosen: his spirit returned
  alternatives:
  - his breath returned
  - his strength returned
  lexicon: HALOT
  rationale: רוּחַ can denote spirit, breath, or animating vitality. 'His spirit returned'
    preserves the Hebrew wording and the sense of renewed life, while avoiding over-interpretation.
    The more physiological 'breath' and interpretive 'strength' are possible alternatives.
- source_word: וַיֶּחִי
  chosen: he revived
  alternatives:
  - he came to life
  - he recovered
  lexicon: HALOT
  rationale: The verb here indicates restoration to vitality after near collapse,
    not resurrection from death. 'He revived' captures that nuance well in idiomatic
    English.
- source_word: קָרָא שְׁמָהּ
  chosen: he called its name
  alternatives:
  - he named it
  lexicon: HALOT
  rationale: This formula is common in Hebrew naming statements. 'He called its name'
    preserves the Hebrew flavor; the object suffix is feminine, referring to the spring/place.
- source_word: עֵין הַקּוֹרֵא
  chosen: En-hakkore
  alternatives:
  - Spring of the Caller
  - Spring of the one who called
  lexicon: HALOT
  rationale: Per translation philosophy, names are transliterated rather than translated
    in the main text. The meaning is preserved in a footnote because the etymology
    is significant to the narrative.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: This is the standard idiomatic English rendering of the Hebrew temporal
    formula.
