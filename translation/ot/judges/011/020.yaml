id: JDG.11.20
reference: Judges 11:20
source:
  edition: WLC
  text: וְ/לֹא הֶאֱמִ֨ין סִיח֤וֹן אֶת יִשְׂרָאֵל֙ עֲבֹ֣ר בִּ/גְבֻל֔/וֹ וַ/יֶּאֱסֹ֤ף
    סִיחוֹן֙ אֶת כָּל עַמּ֔/וֹ וַֽ/יַּחֲנ֖וּ בְּ/יָ֑הְצָ/ה וַ/יִּלָּ֖חֶם עִם יִשְׂרָאֵֽל־־־־־׃
translation:
  text: But Sihon did not trust Israel to pass through his territory. So Sihon gathered
    all his people, and they camped at Jahaz, and he fought with Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not believe Israel' or, by implication, 'did not trust Israel enough
      to let them pass through.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'all his people'; the text does not explicitly say 'army,' though
      the context is military.
    reason: lexical_alternative
  - marker: c
    text: Or 'fought against Israel.' Hebrew literally says 'fought with Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶאֱמִין
  chosen: did not trust
  alternatives:
  - did not believe
  - did not allow
  lexicon: HALOT
  rationale: The Hiphil of אמן here means to place trust/confidence in someone. In
    context Sihon refuses Israel's request for safe passage because he does not trust
    them. 'Did not believe Israel' is more literal but less idiomatic in English;
    'did not allow' states the result rather than translating the verb itself.
- source_word: עֲבֹר
  chosen: to pass through
  alternatives:
  - to cross
  - to pass over
  lexicon: HALOT
  rationale: The infinitive of עבר with בְּגְבוּלוֹ refers to transit through territory.
    'Pass through' is the most natural English expression for requested passage across
    a land border.
- source_word: בִּגְבֻלוֹ
  chosen: through his territory
  alternatives:
  - through his border
  - within his boundary
  lexicon: HALOT
  rationale: גְּבוּל can mean border, boundary, or territory. In this context of national
    transit, English idiom favors 'territory' rather than the more spatially narrow
    'border.' 'Through his territory' captures the sense of crossing the land under
    his control.
- source_word: וַיֶּאֱסֹף
  chosen: gathered
  alternatives:
  - assembled
  - collected
  lexicon: HALOT
  rationale: אָסַף here describes mustering forces. 'Gathered' is clear modern English
    and broad enough to cover military assembly without overtranslating.
- source_word: כָּל עַמּוֹ
  chosen: all his people
  alternatives:
  - all his army
  - all his men
  lexicon: HALOT
  rationale: The Hebrew says 'all his people,' not explicitly 'army.' Since the following
    context is military, the gathered people are likely fighting forces, but the translation
    should preserve the source wording and not narrow it unnecessarily.
- source_word: וַיַּחֲנוּ
  chosen: they camped
  alternatives:
  - they encamped
  lexicon: HALOT
  rationale: Plural verb matches the gathered people. 'They camped' is readable modern
    English; 'encamped' is acceptable but slightly more formal.
- source_word: בְּיָהְצָה
  chosen: at Jahaz
  alternatives:
  - in Jahaz
  lexicon: HALOT
  rationale: The place name is conventionally rendered 'Jahaz.' 'At' fits a military
    encampment location in English.
- source_word: וַיִּלָּחֶם עִם
  chosen: he fought with Israel
  alternatives:
  - he fought against Israel
  - he made war with Israel
  lexicon: HALOT
  rationale: The singular verb returns to Sihon as subject. While English often says
    'fought against,' the Hebrew preposition עִם is literally 'with.' 'Fought with
    Israel' is acceptable and preserves the source structure, though the adversarial
    sense is clear from context.
