id: JDG.11.5
reference: Judges 11:5
source:
  edition: WLC
  text: וַ/יְהִ֕י כַּ/אֲשֶׁר נִלְחֲמ֥וּ בְנֵֽי עַמּ֖וֹן עִם יִשְׂרָאֵ֑ל וַ/יֵּֽלְכוּ֙
    זִקְנֵ֣י גִלְעָ֔ד לָ/קַ֥חַת אֶת יִפְתָּ֖ח מֵ/אֶ֥רֶץ טֽוֹב־־־־׃
translation:
  text: And when the Ammonites fought against Israel, the elders of Gilead went to
    bring Jephthah from the land of Tob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to take Jephthah from the land of Tob.' The Hebrew verb often means
      'take,' but here it refers to going to retrieve him and bring him back.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַּאֲשֶׁר
  chosen: And when
  alternatives:
  - And it happened when
  - Now when
  lexicon: HALOT
  rationale: The Hebrew narrative formula introduces the next event in sequence. 'And
    when' preserves the temporal force without overly wooden English.
- source_word: נִלְחֲמוּ
  chosen: fought
  alternatives:
  - made war
  - were fighting
  lexicon: HALOT
  rationale: The Niphal of לחם here denotes engaging in battle. 'Fought' is natural
    modern English and fits the completed narrative sequence.
- source_word: בְנֵי עַמּוֹן
  chosen: the Ammonites
  alternatives:
  - the sons of Ammon
  - the people of Ammon
  lexicon: HALOT
  rationale: This is the standard ethnic designation in context. 'The Ammonites' is
    idiomatic English while accurately representing the people group.
- source_word: עִם יִשְׂרָאֵל
  chosen: against Israel
  alternatives:
  - with Israel
  lexicon: HALOT
  rationale: Although עִם literally means 'with,' with נלחם it commonly marks the
    party one fights against in context. 'Against Israel' conveys the adversarial
    sense clearly in English.
- source_word: זִקְנֵי גִלְעָד
  chosen: the elders of Gilead
  alternatives:
  - Gilead's elders
  lexicon: HALOT
  rationale: A straightforward construct chain referring to the recognized leaders
    of Gilead.
- source_word: לָקַחַת
  chosen: to bring
  alternatives:
  - to take
  - to fetch
  lexicon: HALOT
  rationale: Although לקח often means 'take,' in this context of going to retrieve
    Jephthah and bring him back, 'to bring' best reflects the intended action in idiomatic
    English. The more literal 'take' could sound misleading in English.
- source_word: אֶת יִפְתָּח
  chosen: Jephthah
  lexicon: HALOT
  rationale: Direct object marker plus personal name; standard transliteration of
    the Hebrew name.
- source_word: מֵאֶרֶץ טוֹב
  chosen: from the land of Tob
  alternatives:
  - from the territory of Tob
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'territory.' 'Land of Tob' is the conventional
    and sufficiently clear rendering for this place name.
