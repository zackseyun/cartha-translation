id: JDG.11.10
reference: Judges 11:10
source:
  edition: WLC
  text: וַ/יֹּאמְר֥וּ זִקְנֵֽי גִלְעָ֖ד אֶל יִפְתָּ֑ח יְהוָ֗ה יִהְיֶ֤ה שֹׁמֵ֨עַ֙ בֵּֽינוֹתֵ֔י/נוּ אִם לֹ֥א כִ/דְבָרְ/ךָ֖ כֵּ֥ן נַעֲשֶֽׂה־־־׃
translation:
  text: Then the elders of Gilead said to Jephthah, “Yahweh will be witness between us if we do not do according to your word.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'May the LORD be hearing between us'—that is, hearing as witness or judge between the two parties.
    reason: lexical_alternative
lexical_decisions:
- source_word: זִקְנֵי גִלְעָד
  chosen: the elders of Gilead
  alternatives:
  - Gilead's elders
  lexicon: HALOT
  rationale: Construct phrase denoting the recognized leaders/elders belonging to Gilead. Standard idiomatic English is 'the elders of Gilead.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יִהְיֶה שֹׁמֵעַ בֵּינוֹתֵינוּ
  chosen: be a witness between us
  alternatives:
  - be hearing between us
  - listen between us
  - be listening between us
  lexicon: HALOT
  rationale: 'Although שֹׁמֵעַ is literally ''hearing/listening,'' in oath and dispute contexts ''hear between'' carries judicial sense: to hear and thus witness/judge between parties. ''Be a witness between us'' communicates the idiomatic force in natural English without over-paraphrasing.'
- source_word: אִם לֹא
  chosen: if ... not
  alternatives:
  - surely
  - indeed
  lexicon: HALOT
  rationale: 'Here אִם לֹא introduces the condition attached to the oath: ''if we do not...'' rather than a simple asseveration. This fits the syntax of the elders'' pledge to Jephthah.'
- source_word: כִדְבָרְךָ
  chosen: according to your word
  alternatives:
  - as you say
  - according to what you have said
  lexicon: HALOT
  rationale: The phrase is formally 'according to your word.' This preserves the source wording while remaining clear in English; 'word' here means Jephthah's stated terms/instructions.
- source_word: כֵּן נַעֲשֶׂה
  chosen: do
  alternatives:
  - do so
  - act accordingly
  lexicon: HALOT
  rationale: Combined with the preceding phrase, the sense is 'we will do accordingly.' In English, 'do according to your word' is concise and faithful. The future nuance is carried by the oath context and English modal phrasing.
- source_word: וַיֹּאמְרוּ
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: Narrative waw commonly advances the storyline. 'Then' gives natural English narrative flow while preserving sequence.
