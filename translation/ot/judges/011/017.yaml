id: JDG.11.17
reference: Judges 11:17
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֣ח יִשְׂרָאֵ֣ל מַלְאָכִ֣ים אֶל מֶלֶךְ֩ אֱד֨וֹם לֵ/אמֹ֜ר אֶעְבְּרָה
    נָּ֣א בְ/אַרְצֶ֗/ךָ וְ/לֹ֤א שָׁמַע֙ מֶ֣לֶךְ אֱד֔וֹם וְ/גַ֨ם אֶל מֶ֧לֶךְ מוֹאָ֛ב
    שָׁלַ֖ח וְ/לֹ֣א אָבָ֑ה וַ/יֵּ֥שֶׁב יִשְׂרָאֵ֖ל בְּ/קָדֵֽשׁ׀־׀־־׃
translation:
  text: Then Israel sent messengers to the king of Edom, saying, ‘Please let me pass
    through your land,’ but the king of Edom did not listen. He also sent to the king
    of Moab, but he was unwilling, so Israel remained at Kadesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Please let me pass' uses a first-person singular form, with Israel
      speaking corporately as a single entity; some English translations render it
      'let us pass.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he refused' / 'he did not consent' for 'he was unwilling.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of שׁלח, best rendered with simple past
    'sent' in English narrative.
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - envoys
  - angels
  lexicon: HALOT
  rationale: In human diplomatic context, 'messengers' is the plain sense; 'angels'
    would be misleading in English.
- source_word: מֶלֶךְ אֱדוֹם
  chosen: the king of Edom
  alternatives:
  - Edom's king
  lexicon: HALOT
  rationale: Transparent rendering of construct relationship, preserving the political
    title.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Idiomatic introduction to direct speech in English narrative.
- source_word: אֶעְבְּרָה נָּא
  chosen: Please let me pass
  alternatives:
  - Please let us pass
  - Let me pass, please
  - I would like to pass
  lexicon: HALOT
  rationale: The cohortative first person singular with נָא expresses polite request.
    Singular is retained because the speaker is corporate Israel represented as a
    single entity. English adds 'let' for natural idiom.
- source_word: בְאַרְצֶךָ
  chosen: through your land
  alternatives:
  - in your land
  - across your land
  lexicon: HALOT
  rationale: With עבר in travel context, English idiom is 'pass through your land,'
    expressing transit rather than mere location.
- source_word: וְלֹא שָׁמַע
  chosen: did not listen
  alternatives:
  - did not hear
  - would not listen
  lexicon: HALOT
  rationale: שׁמע here means to heed/respond favorably, not merely auditory hearing.
    'Did not listen' preserves that sense without overinterpreting.
- source_word: וְגַם
  chosen: He also
  alternatives:
  - and also
  - and furthermore
  lexicon: HALOT
  rationale: Connects the second diplomatic appeal. Rendering as 'He also' makes the
    subject continuity clear in English.
- source_word: שָׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Same verb as earlier in the verse; consistency maintained.
- source_word: וְלֹא אָבָה
  chosen: he was unwilling
  alternatives:
  - he refused
  - he did not consent
  lexicon: HALOT
  rationale: אָבָה denotes willingness/consent. 'He was unwilling' closely reflects
    the lexical sense and avoids adding a more forceful nuance than the Hebrew requires.
- source_word: וַיֵּשֶׁב
  chosen: remained
  alternatives:
  - stayed
  - dwelt
  - settled
  lexicon: HALOT
  rationale: In this travel narrative context, 'remained' best conveys continued staying
    at a location without implying permanent settlement.
- source_word: בְּקָדֵשׁ
  chosen: at Kadesh
  alternatives:
  - in Kadesh
  lexicon: HALOT
  rationale: For a place-name in travel narrative, 'at Kadesh' is natural English
    and fits the sense of encampment/location.
