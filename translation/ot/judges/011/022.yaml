id: JDG.11.22
reference: Judges 11:22
source:
  edition: WLC
  text: וַ/יִּ֣ירְשׁ֔וּ אֵ֖ת כָּל גְּב֣וּל הָ/אֱמֹרִ֑י מֵֽ/אַרְנוֹן֙ וְ/עַד הַ/יַּבֹּ֔ק
    וּ/מִן הַ/מִּדְבָּ֖ר וְ/עַד הַ/יַּרְדֵּֽן־־־־׃
translation:
  text: So they took possession of all the territory of the Amorites, from the Arnon
    as far as the Jabbok, and from the wilderness as far as the Jordan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they possessed' or 'they inherited'; the Hebrew verb can carry those
      senses, but here it refers to taking control of territory.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the Amorite,' a collective singular referring to the Amorite people.
    reason: lexical_alternative
  - marker: c
    text: Or 'border'/'boundary' of the Amorites; here the sense is the land within
      those boundaries.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּירְשׁוּ
  chosen: they took possession of
  alternatives:
  - they possessed
  - they inherited
  - they dispossessed
  lexicon: HALOT
  rationale: The verb ירשׁ in conquest contexts commonly means to take possession/occupy
    territory rather than receive an inheritance in a passive sense. 'Took possession
    of' is natural English and preserves the active territorial sense.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: Retains the comprehensive force of the Hebrew quantifier.
- source_word: גְּבוּל
  chosen: territory
  alternatives:
  - border
  - boundary
  - region
  lexicon: HALOT
  rationale: Although גְּבוּל can mean 'border/boundary,' in this context with named
    extent markers it refers to the land area within those bounds. 'Territory' best
    conveys the sense in idiomatic English.
- source_word: הָאֱמֹרִי
  chosen: the Amorites
  alternatives:
  - the Amorite
  lexicon: HALOT
  rationale: The singular collective in Hebrew often refers to the people group as
    a whole. English idiom prefers the plural ethnonym here.
- source_word: מֵאַרְנוֹן
  chosen: from the Arnon
  alternatives:
  - from Arnon
  lexicon: HALOT
  rationale: The phrase marks one boundary point. Including 'the' before river names
    is standard English usage.
- source_word: וְעַד הַיַּבֹּק
  chosen: as far as the Jabbok
  alternatives:
  - to the Jabbok
  - up to the Jabbok
  lexicon: HALOT
  rationale: '''As far as'' clearly expresses territorial extent from one boundary
    to another in smooth English.'
- source_word: וּמִן הַמִּדְבָּר
  chosen: from the wilderness
  alternatives:
  - from the desert
  lexicon: HALOT
  rationale: מִדְבָּר can be rendered 'wilderness' or 'desert.' 'Wilderness' is the
    more common biblical-geographical term and need not imply a sandy desert specifically.
- source_word: וְעַד הַיַּרְדֵּן
  chosen: as far as the Jordan
  alternatives:
  - to the Jordan
  - up to the Jordan River
  lexicon: HALOT
  rationale: This completes the second boundary pair. 'The Jordan' is standard English
    for the river and matches the concise style of the verse.
