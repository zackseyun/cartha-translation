id: JDG.11.25
reference: Judges 11:25
source:
  edition: WLC
  text: וְ/עַתָּ֗ה הֲ/ט֥וֹב טוֹב֙ אַתָּ֔ה מִ/בָּלָ֥ק בֶּן צִפּ֖וֹר מֶ֣לֶךְ מוֹאָ֑ב
    הֲ/ר֥וֹב רָב֙ עִם יִשְׂרָאֵ֔ל אִם נִלְחֹ֥ם נִלְחַ֖ם בָּֽ/ם־־־׃
translation:
  text: And now, are you really better than Balak son of Zippor, king of Moab? Did
    he ever contend with Israel, or did he ever fight against them?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'are you any better than Balak son of Zippor, king of Moab?' The Hebrew
      uses an emphatic repetition ('good, good') to intensify the comparison.
    reason: lexical_alternative
  - marker: b
    text: Or, 'Did he ever dispute with Israel, or did he ever wage war against them?'
      The first verb can denote legal contention or quarrel, while the second specifically
      denotes fighting.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - So now
  - Now then
  lexicon: HALOT
  rationale: Standard discourse-transition phrase introducing Jephthah's rhetorical
    challenge; 'And now' preserves the connective force of וְ plus the temporal/adversative
    sense of עַתָּה.
- source_word: הֲטוֹב טוֹב אַתָּה
  chosen: are you really better
  alternatives:
  - are you indeed better
  - are you any better
  lexicon: HALOT
  rationale: The interrogative הֲ with the infinitive absolute/adjectival intensification
    טוֹב טוֹב before אַתָּה creates an emphatic rhetorical question. 'Really better'
    captures the emphasis idiomatically without over-literal awkwardness.
- source_word: מִבָּלָק בֶּן־צִפּוֹר מֶלֶךְ מוֹאָב
  chosen: than Balak son of Zippor, king of Moab
  alternatives:
  - than Balak the son of Zippor, the king of Moab
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy. The construct
    chain is rendered straightforwardly in natural English.
- source_word: הֲרֹב רָב
  chosen: Did he ever contend
  alternatives:
  - Did he indeed contend
  - Did he actually dispute
  - Did he bring a case
  lexicon: HALOT
  rationale: Infinitive absolute plus finite verb of ריב intensifies the rhetorical
    question. In this context of interstate conflict and claim-making, 'contend' best
    preserves the broad sense without narrowing it only to legal dispute or only to
    military action.
- source_word: עִם יִשְׂרָאֵל
  chosen: with Israel
  alternatives:
  - against Israel
  lexicon: HALOT
  rationale: The preposition עִם is most basically 'with.' Because the following clause
    explicitly states 'fight against them,' retaining 'with Israel' avoids collapsing
    the two verbs into the same nuance while still fitting English with 'contend with.'
- source_word: אִם
  chosen: or
  alternatives:
  - if
  - whether
  lexicon: HALOT
  rationale: Here אִם introduces the second member of a rhetorical alternative question,
    functioning idiomatically as 'or' in English.
- source_word: נִלְחֹם נִלְחַם בָּם
  chosen: did he ever fight against them
  alternatives:
  - did he indeed wage war against them
  - did he fight with them
  lexicon: HALOT
  rationale: Infinitive absolute plus finite Niphal of לחם gives emphatic verbal force.
    'Fight against them' makes explicit the adversative sense natural in English and
    distinguishes this clause from the prior broader 'contend with Israel.'
