id: JDG.11.6
reference: Judges 11:6
source:
  edition: WLC
  text: וַ/יֹּאמְר֣וּ לְ/יִפְתָּ֔ח לְכָ֕/ה וְ/הָיִ֥יתָה לָּ֖/נוּ לְ/קָצִ֑ין וְ/נִֽלָּחֲמָ֖ה
    בִּ/בְנֵ֥י עַמּֽוֹן׃
translation:
  text: And they said to Jephthah, “Come and be our commander, so that we may fight
    against the Ammonites.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of Ammon,' a standard ethnic designation meaning the Ammonites.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: And they said
  alternatives:
  - Then they said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces the next event in sequence. 'And they said'
    preserves the narrative flow without overinterpreting temporal nuance.
- source_word: לְיִפְתָּח
  chosen: to Jephthah
  lexicon: HALOT
  rationale: 'Proper name is transliterated per project philosophy: titles are translated,
    names transliterated.'
- source_word: לְכָה
  chosen: Come
  alternatives:
  - Come now
  - Go
  lexicon: HALOT
  rationale: Imperative of הלך in this idiom functions as an invitation/summons. 'Come'
    is the most natural English equivalent in direct address here.
- source_word: וְהָיִיתָה לָּנוּ
  chosen: and be our
  alternatives:
  - and you shall be for us
  - and become our
  lexicon: HALOT
  rationale: The Hebrew literally says 'and you shall be to/for us,' but idiomatic
    English in this construction is 'be our.' This preserves the force without wooden
    phrasing.
- source_word: לְקָצִין
  chosen: commander
  alternatives:
  - chief
  - leader
  - captain
  - ruler
  lexicon: HALOT
  rationale: קָצִין denotes a leader or military chief. In this immediate war context,
    'commander' best captures the requested role. 'Leader' is possible but less specific;
    'chief' is less natural in contemporary English.
- source_word: וְנִלָּחֲמָה
  chosen: so that we may fight
  alternatives:
  - and let us fight
  - that we may fight
  lexicon: HALOT
  rationale: Cohortative first person plural expresses purpose/result following the
    request. 'So that we may fight' makes the relationship clear in natural English.
- source_word: בִּבְנֵי עַמּוֹן
  chosen: against the Ammonites
  alternatives:
  - against the sons of Ammon
  - with the Ammonites
  lexicon: HALOT
  rationale: ב + לחם commonly marks the opponent in battle. 'Against the Ammonites'
    is idiomatic and accurately renders 'the sons of Ammon' as the people group.
