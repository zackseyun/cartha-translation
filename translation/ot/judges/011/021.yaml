id: JDG.11.21
reference: Judges 11:21
source:
  edition: WLC
  text: וַ֠/יִּתֵּן יְהוָ֨ה אֱלֹהֵֽי יִשְׂרָאֵ֜ל אֶת סִיח֧וֹן וְ/אֶת כָּל עַמּ֛/וֹ בְּ/יַ֥ד יִשְׂרָאֵ֖ל וַ/יַּכּ֑וּ/ם וַ/יִּירַשׁ֙ יִשְׂרָאֵ֔ל אֵ֚ת כָּל אֶ֣רֶץ הָ/אֱמֹרִ֔י יוֹשֵׁ֖ב הָ/אָ֥רֶץ הַ/הִֽיא־־־־־׃
translation:
  text: And Yahweh, the God of Israel, gave Sihon and all his people into the hand of Israel, and they struck them down. So Israel took possession of all the land of the Amorites who lived in that land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''into the hand of Israel,'' an idiom meaning into Israel''s power.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: gave
  alternatives:
  - delivered
  - handed over
  lexicon: HALOT
  rationale: The verb נתן with the idiom 'into the hand of' commonly means to give over into another's power. 'Gave' preserves the Hebrew wording while the following phrase clarifies the military sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: A straightforward construct chain identifying YHWH covenantally as Israel's God.
- source_word: סִיחוֹן
  chosen: Sihon
  rationale: Standard English transliteration of the personal name.
- source_word: כָּל עַמּוֹ
  chosen: all his people
  alternatives:
  - all his army
  - all his folk
  lexicon: HALOT
  rationale: עַם normally means 'people.' In this battle context it refers to those under Sihon's power who fought with him, but 'people' is the more textually direct rendering.
- source_word: בְּיַד יִשְׂרָאֵל
  chosen: into the hand of Israel
  alternatives:
  - into Israel's hand
  - into the power of Israel
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for being delivered into someone's power. Retaining 'hand' preserves the idiom while remaining intelligible in English.
- source_word: וַיַּכּוּם
  chosen: they struck them down
  alternatives:
  - they defeated them
  - they struck them
  lexicon: HALOT
  rationale: נכה in military narrative often denotes a decisive blow or defeat. 'Struck them down' preserves the concrete force better than the flatter 'defeated,' while the plural subject matches the Hebrew verb.
- source_word: וַיִּירַשׁ
  chosen: took possession of
  alternatives:
  - possessed
  - dispossessed
  - inherited
  lexicon: HALOT
  rationale: ירש can mean to possess, inherit, or dispossess depending on context. Here Israel comes to occupy territory after victory, so 'took possession of' best captures the result in natural English.
- source_word: כָּל אֶרֶץ הָאֱמֹרִי
  chosen: all the land of the Amorites
  alternatives:
  - all the territory of the Amorites
  - the whole land of the Amorite
  lexicon: HALOT
  rationale: Although the Hebrew has singular 'the Amorite' as a collective ethnonym, English idiom prefers the plural ethnic form 'the Amorites' in this context.
- source_word: יוֹשֵׁב הָאָרֶץ הַהִיא
  chosen: who lived in that land
  alternatives:
  - inhabiting that land
  - dwelling in that land
  lexicon: HALOT
  rationale: The participle modifies 'the Amorites' collectively. 'Who lived in that land' is clear modern English and preserves the descriptive force.
