id: JDG.11.32
reference: Judges 11:32
source:
  edition: WLC
  text: וַ/יַּעֲבֹ֥ר יִפְתָּ֛ח אֶל בְּנֵ֥י עַמּ֖וֹן לְ/הִלָּ֣חֶם בָּ֑/ם וַ/יִתְּנֵ֥/ם יְהוָ֖ה בְּ/יָדֽ/וֹ־׃
translation:
  text: So Jephthah crossed over to the Ammonites to fight against them, and Yahweh gave them into his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''crossed over to the sons of Ammon.'' The phrase means Jephthah went against the Ammonites in battle.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבֹר
  chosen: crossed over
  alternatives:
  - advanced against
  - went over
  lexicon: HALOT
  rationale: The verb עבר literally denotes passing over or crossing. In this military context, 'crossed over' preserves the concrete movement and fits the narrative flow better than the more interpretive 'advanced against.'
- source_word: אֶל
  chosen: to
  alternatives:
  - against
  lexicon: HALOT
  rationale: The preposition normally means 'to/toward.' Because the following infinitive already expresses hostile intent ('to fight against them'), rendering it simply as 'to' avoids importing conflict into the preposition itself.
- source_word: בְּנֵי עַמּוֹן
  chosen: the Ammonites
  alternatives:
  - the sons of Ammon
  - the people of Ammon
  lexicon: HALOT
  rationale: Although literally 'sons of Ammon,' the idiomatic ethnic sense in English is 'the Ammonites.' This is standard and clear modern English while remaining faithful to the referent.
- source_word: לְהִלָּחֶם בָּם
  chosen: to fight against them
  alternatives:
  - to wage war against them
  - to battle them
  lexicon: HALOT
  rationale: The Niphal infinitive of לחם with ב conveys engaging in battle against someone. 'To fight against them' is natural, sufficiently formal, and avoids overstating the scale with 'wage war.'
- source_word: וַיִּתְּנֵם
  chosen: gave them
  alternatives:
  - delivered them
  - handed them over
  lexicon: HALOT
  rationale: נתן with an object plus 'into the hand' is a common idiom for giving enemies over in battle. 'Gave them' keeps the Hebrew idiom intact, while the following phrase clarifies the sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּיָדוֹ
  chosen: into his hand
  alternatives:
  - into his power
  - under his control
  lexicon: HALOT
  rationale: The idiom 'into his hand' is common biblical battle language. It is transparent enough in English and preserves the source imagery better than a flattened paraphrase.
