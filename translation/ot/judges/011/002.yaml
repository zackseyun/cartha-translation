id: JDG.11.2
reference: Judges 11:2
source:
  edition: WLC
  text: וַ/תֵּ֧לֶד אֵֽשֶׁת גִּלְעָ֛ד ל֖/וֹ בָּנִ֑ים וַ/יִּגְדְּל֨וּ בְֽנֵי הָ/אִשָּׁ֜ה
    וַ/יְגָרְשׁ֣וּ אֶת יִפְתָּ֗ח וַ/יֹּ֤אמְרוּ ל/וֹ֙ לֹֽא תִנְחַ֣ל בְּ/בֵית אָבִ֔י/נוּ
    כִּ֛י בֶּן אִשָּׁ֥ה אַחֶ֖רֶת אָֽתָּה־־־־־־׃
translation:
  text: And Gilead’s wife bore him sons. When the sons of the wife grew up, they drove
    Jephthah out and said to him, “You will not have an inheritance in our father’s
    house, for you are the son of another woman.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “You shall not inherit in our father’s house.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵשֶׁת גִּלְעָד
  chosen: Gilead’s wife
  alternatives:
  - the wife of Gilead
  lexicon: HALOT
  rationale: Construct chain indicating possession; the smoother English possessive
    preserves the same sense without loss.
- source_word: וַתֵּלֶד ... לוֹ בָּנִים
  chosen: bore him sons
  alternatives:
  - gave birth to sons for him
  - bore sons to him
  lexicon: HALOT
  rationale: ילד with indirect object plus בנים straightforwardly means that Gilead’s
    wife bore male children for/to him. 'Bore him sons' is idiomatic and preserves
    the male-specific noun.
- source_word: בָּנִים / בְנֵי
  chosen: sons
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural, not a generic term for children.
    Per gender-accurate policy, 'sons' should be retained.
- source_word: וַיִּגְדְּלוּ
  chosen: grew up
  alternatives:
  - grew
  - became grown
  lexicon: HALOT
  rationale: In context of sons reaching maturity before acting against Jephthah,
    'grew up' best conveys development to adulthood in natural English.
- source_word: בְנֵי הָאִשָּׁה
  chosen: the sons of the wife
  alternatives:
  - her sons
  - the woman’s sons
  lexicon: HALOT
  rationale: The phrase literally identifies them as the sons of 'the wife,' contrasting
    the legitimate wife with Jephthah’s different maternal status. Retaining 'the
    wife' preserves the social contrast in the Hebrew.
- source_word: וַיְגָרְשׁוּ
  chosen: drove ... out
  alternatives:
  - expelled
  - cast out
  lexicon: HALOT
  rationale: גרש commonly denotes expulsion or driving out. 'Drove out' is vivid,
    natural, and fits the familial exclusion context.
- source_word: לֹא תִנְחַל
  chosen: You will not have an inheritance
  alternatives:
  - You shall not inherit
  - You will not inherit
  lexicon: HALOT
  rationale: נחל in Qal here concerns receiving an inheritance. The English phrase
    'have an inheritance' makes explicit the object implied by the following phrase
    and reads naturally in direct speech.
- source_word: בְּבֵית אָבִינוּ
  chosen: in our father’s house
  alternatives:
  - in the house of our father
  - among our father’s household
  lexicon: HALOT
  rationale: בית can denote household/estate as the sphere of inheritance. 'In our
    father’s house' preserves the literal image while remaining idiomatic.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for exclusion. 'For' fits the formal tone of the
    accusation while remaining clear.
- source_word: בֶּן אִשָּׁה אַחֶרֶת
  chosen: the son of another woman
  alternatives:
  - the son of a different woman
  - the son of another wife
  lexicon: HALOT
  rationale: The Hebrew says 'another woman,' not explicitly 'another wife.' Given
    11:1 identifies Jephthah’s mother as a prostitute, this wording preserves the
    brothers’ disparaging distinction without importing marital status not stated
    here.
