theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for the Tetragrammaton is 'the LORD,' following the
    stated doctrine and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nature of Jephthah's empowerment by רוּחַ יְהוָה
  chosen_reading: The verse describes the Spirit of the LORD coming upon Jephthah
    for empowerment.
  alternative_readings:
  - A less personal force such as wind or breath
  rationale: In Judges, this idiom regularly marks divine empowerment of leaders.
    The translation should preserve that theological force without adding claims beyond
    the text.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
