id: JDG.11.29
reference: Judges 11:29
source:
  edition: WLC
  text: וַ/תְּהִ֤י עַל יִפְתָּח֙ ר֣וּחַ יְהוָ֔ה וַ/יַּעֲבֹ֥ר אֶת הַ/גִּלְעָ֖ד וְ/אֶת
    מְנַשֶּׁ֑ה וַֽ/יַּעֲבֹר֙ אֶת מִצְפֵּ֣ה גִלְעָ֔ד וּ/מִ/מִּצְפֵּ֣ה גִלְעָ֔ד עָבַ֖ר
    בְּנֵ֥י עַמּֽוֹן־־־־׃
translation:
  text: Then the Spirit of the LORD came upon Jephthah, and he passed through Gilead
    and Manasseh. He passed through Mizpah of Gilead, and from Mizpah of Gilead he
    passed on to the Ammonites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he crossed over to the Ammonites.' The Hebrew verb can denote passing
      through, crossing over, or advancing onward, depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ר֣וּחַ יְהוָ֔ה
  chosen: the Spirit of the LORD
  alternatives:
  - the רוח of the LORD
  - the wind/spirit of the LORD
  lexicon: HALOT
  rationale: In this narrative context רוּחַ denotes God's empowering Spirit rather
    than wind or breath. יְהוָה follows the project default as 'the LORD.'
- source_word: וַ/תְּהִ֤י עַל
  chosen: came upon
  alternatives:
  - was upon
  - came to rest on
  lexicon: HALOT
  rationale: The idiom 'was/came upon' with רוח conveys divine empowerment. 'Came
    upon' is natural English and preserves the eventive force of the wayyiqtol.
- source_word: יִפְתָּח
  chosen: Jephthah
  rationale: Standard English transliteration of the personal name.
- source_word: וַ/יַּעֲבֹ֥ר
  chosen: he passed through
  alternatives:
  - he crossed
  - he went through
  lexicon: HALOT
  rationale: עבר can mean cross over or pass through. With direct objects naming regions,
    'passed through' best fits Jephthah's movement across territories in preparation
    for battle.
- source_word: אֶת הַ/גִּלְעָד וְ/אֶת מְנַשֶּׁה
  chosen: Gilead and Manasseh
  alternatives:
  - the Gilead and Manasseh
  rationale: These are territorial names. English omits the article before proper
    regional names.
- source_word: מִצְפֵּ֣ה גִלְעָ֔ד
  chosen: Mizpah of Gilead
  alternatives:
  - Mizpeh-gilead
  - the watchtower of Gilead
  lexicon: HALOT
  rationale: This is a place name, so it is transliterated rather than translated
    from the root meaning 'watchtower.' The construct is represented by 'of Gilead.'
- source_word: וּ/מִ/מִּצְפֵּ֣ה גִלְעָ֔ד
  chosen: from Mizpah of Gilead
  alternatives:
  - and from Mizpah of Gilead
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition is naturally rendered 'and
    from,' but English style can absorb the conjunction into the sentence flow. The
    sense of departure from that location is preserved.
- source_word: עָבַ֖ר בְּנֵ֥י עַמּֽוֹן
  chosen: he passed on to the Ammonites
  alternatives:
  - he crossed over to the Ammonites
  - he advanced against the Ammonites
  - he passed through to the Ammonites
  lexicon: HALOT
  rationale: With בני עמון as the destination/opponent, the sense is movement onward
    toward them for conflict. 'Passed on to' preserves the motion without over-interpreting
    as immediate attack, while remaining clearer than a bare 'crossed over' in English.
