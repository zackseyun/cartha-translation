id: JDG.11.34
reference: Judges 11:34
source:
  edition: WLC
  text: וַ/יָּבֹ֨א יִפְתָּ֣ח הַ/מִּצְפָּה֮ אֶל בֵּית/וֹ֒ וְ/הִנֵּ֤ה בִתּ/וֹ֙ יֹצֵ֣את
    לִ/קְרָאת֔/וֹ בְ/תֻפִּ֖ים וּ/בִ/מְחֹל֑וֹת וְ/רַק֙ הִ֣יא יְחִידָ֔ה אֵֽין ל֥/וֹ
    מִמֶּ֛/נּוּ בֵּ֖ן אוֹ בַֽת־־־׃
translation:
  text: Then Jephthah came to Mizpah, to his house, and behold, his daughter was coming
    out to meet him with tambourines and with dances. Now she was his only child;
    besides her he had neither son nor daughter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'came out to meet him with tambourines and dancing.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his only one'; that is, his only child.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: Then ... came
  alternatives:
  - and ... came
  - so ... came
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... came' gives natural
    English narrative sequence while preserving the simple motion verb 'came.'
- source_word: הַמִּצְפָּה
  chosen: to Mizpah
  alternatives:
  - to the Mizpah
  lexicon: HALOT
  rationale: Although marked with the article in Hebrew, place names with the article
    are commonly rendered as simple proper names in English. 'Mizpah' is the standard
    transliteration.
- source_word: אֶל בֵּיתוֹ
  chosen: to his house
  alternatives:
  - to his home
  lexicon: HALOT
  rationale: Retains the concrete noun 'house' rather than the slightly more interpretive
    'home.'
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: Preserves the sudden, dramatic force of the discourse marker in a readable
    but still literary English form.
- source_word: בִתּוֹ
  chosen: his daughter
  lexicon: HALOT
  rationale: Straightforward filial term with no need for expansion.
- source_word: יֹצֵאת לִקְרָאתוֹ
  chosen: was coming out to meet him
  alternatives:
  - came out to meet him
  - was going out to meet him
  lexicon: HALOT
  rationale: The participle gives an ongoing/imperfective sense at the moment of his
    arrival; 'was coming out' captures that vividness. 'To meet him' reflects the
    infinitive construction naturally.
- source_word: בְתֻפִּים
  chosen: with tambourines
  alternatives:
  - with timbrels
  - with hand drums
  lexicon: HALOT
  rationale: '''Tambourines'' is clear modern English for festive frame drums and
    avoids archaic ''timbrels.'''
- source_word: וּבִמְחֹלוֹת
  chosen: and with dances
  alternatives:
  - and with dancing
  lexicon: HALOT
  rationale: The plural noun is best represented by 'dances,' matching the plural
    form and the celebratory scene.
- source_word: וְרַק הִיא יְחִידָה
  chosen: Now she was his only child
  alternatives:
  - and she was his only one
  - and she alone was unique/only
  lexicon: HALOT
  rationale: יְחִידָה here denotes an only child in context, clarified by the following
    clause denying any other son or daughter. 'Only child' communicates the sense
    idiomatically and precisely.
- source_word: אֵין לוֹ מִמֶּנּוּ בֵּן אוֹ בַת
  chosen: besides her he had neither son nor daughter
  alternatives:
  - he had no son or daughter besides her
  - there was not from him a son or a daughter
  lexicon: HALOT
  rationale: The clause explains and reinforces that she was his sole offspring. 'Besides
    her' captures מִמֶּנּוּ in context as excluding any other child from him; 'he
    had neither son nor daughter' is natural English preserving the total negation.
