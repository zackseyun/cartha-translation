theological_decisions:
- issue: Interpretation of Jephthah's daughter's status
  chosen_reading: Render the verse descriptively without importing later interpretive
    conclusions about Jephthah's vow or the daughter's fate.
  alternative_readings:
  - Some readers connect the emphasis on her being an only child to a later literal
    sacrifice reading.
  - Others connect it to perpetual virginity/childlessness.
  rationale: This verse itself states only that she was his only child and came out
    celebrating. The translation should preserve that narrative fact without resolving
    the broader debated interpretation from the surrounding passage.
  doctrine_reference: Preserve theological tension rather than resolve it.
