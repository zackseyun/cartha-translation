id: JDG.11.18
reference: Judges 11:18
source:
  edition: WLC
  text: וַ/יֵּ֣לֶךְ בַּ/מִּדְבָּ֗ר וַ/יָּ֜סָב אֶת אֶ֤רֶץ אֱדוֹם֙ וְ/אֶת אֶ֣רֶץ מוֹאָ֔ב
    וַ/יָּבֹ֤א מִ/מִּזְרַח שֶׁ֨מֶשׁ֙ לְ/אֶ֣רֶץ מוֹאָ֔ב וַֽ/יַּחֲנ֖וּ/ן בְּ/עֵ֣בֶר
    אַרְנ֑וֹן וְ/לֹא בָ֨אוּ֙ בִּ/גְב֣וּל מוֹאָ֔ב כִּ֥י אַרְנ֖וֹן גְּב֥וּל מוֹאָֽב־־־־׃
translation:
  text: Then he went through the wilderness and went around the land of Edom and the
    land of Moab, and came to the east side of the land of Moab, and they camped beyond
    the Arnon; but they did not enter the territory of Moab, for the Arnon was the
    border of Moab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'came from the sunrise to the land of Moab,' an idiom
      meaning they approached Moab from the east/east side.
    reason: lexical_alternative
  - marker: b
    text: Or 'on the other side of the Arnon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went through
  alternatives:
  - went
  - traveled
  lexicon: HALOT
  rationale: הלך is the basic verb 'go/walk.' In context with בַּמִּדְבָּר, English
    idiom is improved by 'went through the wilderness,' making the route sense explicit
    without over-paraphrasing.
- source_word: בַּמִּדְבָּר
  chosen: the wilderness
  alternatives:
  - the desert
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/desert terrain. 'Wilderness' fits
    biblical geographic style and avoids implying a sandy desert specifically.
- source_word: וַיָּסָב
  chosen: went around
  alternatives:
  - circled around
  - bypassed
  lexicon: HALOT
  rationale: סבב here describes taking a route around Edom and Moab rather than passing
    through them. 'Went around' is natural modern English and preserves the directional
    sense.
- source_word: אֶרֶץ אֱדוֹם
  chosen: the land of Edom
  alternatives:
  - the territory of Edom
  lexicon: HALOT
  rationale: אֶרֶץ can mean land/territory/country. 'Land' is the most straightforward
    and idiomatic here.
- source_word: אֶרֶץ מוֹאָב
  chosen: the land of Moab
  alternatives:
  - the territory of Moab
  lexicon: HALOT
  rationale: Same term as with Edom; rendered consistently as 'land' in the route
    description.
- source_word: וַיָּבֹא מִמִּזְרַח שֶׁמֶשׁ לְאֶרֶץ מוֹאָב
  chosen: came to the east side of the land of Moab
  alternatives:
  - came from the east to the land of Moab
  - came east of the land of Moab
  lexicon: HALOT
  rationale: Literally 'came from the sunrise to the land of Moab.' In geographic
    narrative this idiom indicates approach on the eastern side. 'To the east side
    of' best captures the sense in clear English and matches the following statement
    that they did not enter Moab's border.
- source_word: וַיַּחֲנוּן
  chosen: they camped
  alternatives:
  - they encamped
  lexicon: HALOT
  rationale: חנה means to camp/encamp. The subject shifts from singular collective
    narration to plural, referring to Israel; 'they camped' is natural English.
- source_word: בְּעֵבֶר אַרְנוֹן
  chosen: beyond the Arnon
  alternatives:
  - on the other side of the Arnon
  - across the Arnon
  lexicon: HALOT
  rationale: עֵבֶר denotes the far side/other side. 'Beyond the Arnon' is concise
    and preserves the relative geographic perspective without forcing a specific viewpoint.
- source_word: וְלֹא בָאוּ בִּגְבוּל מוֹאָב
  chosen: they did not enter the territory of Moab
  alternatives:
  - they did not come within the border of Moab
  - they did not enter the border of Moab
  lexicon: HALOT
  rationale: גבול is border/boundary/territory. In English, 'enter the territory of
    Moab' communicates the practical sense of crossing into Moabite land.
- source_word: כִּי אַרְנוֹן גְּבוּל מוֹאָב
  chosen: for the Arnon was the border of Moab
  alternatives:
  - for the Arnon was Moab's boundary
  lexicon: HALOT
  rationale: A nominal clause explaining why Israel did not enter Moab. 'Border' matches
    the previous use of גבול and keeps the explanatory force of כִּי.
