theological_decisions:
- issue: Scope of Jephthah's promised authority
  chosen_reading: The elders promise Jephthah civic-military leadership over all the
    inhabitants of Gilead, not merely command in battle.
  alternative_readings:
  - The promise refers only to temporary military command.
  rationale: The phrase וְהָיִיתָ לָּנוּ לְרֹאשׁ לְכֹל יֹשְׁבֵי גִלְעָד extends beyond
    the immediate battle request and indicates broader headship over the population
    of Gilead. Rendering 'head over all the inhabitants of Gilead' preserves that
    wider scope without importing later constitutional categories.
