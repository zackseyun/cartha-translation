id: JDG.11.8
reference: Judges 11:8
source:
  edition: WLC
  text: וַ/יֹּאמְרוּ֩ זִקְנֵ֨י גִלְעָ֜ד אֶל יִפְתָּ֗ח לָ/כֵן֙ עַתָּה֙ שַׁ֣בְנוּ אֵלֶ֔י/ךָ
    וְ/הָלַכְתָּ֣ עִמָּ֔/נוּ וְ/נִלְחַמְתָּ֖ בִּ/בְנֵ֣י עַמּ֑וֹן וְ/הָיִ֤יתָ לָּ֨/נוּ֙
    לְ/רֹ֔אשׁ לְ/כֹ֖ל יֹשְׁבֵ֥י גִלְעָֽד־׃
translation:
  text: 'And the elders of Gilead said to Jephthah, “That is why we have now come
    back to you: come with us, fight against the Ammonites, and you will be head over
    all the inhabitants of Gilead.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'we have returned to you.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sons of Ammon,' that is, the Ammonites.
    reason: lexical_alternative
lexical_decisions:
- source_word: זִקְנֵי
  chosen: the elders of
  alternatives:
  - the leaders of
  lexicon: HALOT
  rationale: זָקֵן in this construct refers to the recognized elders/leaders of the
    community. 'Elders' preserves the social-political office more directly than the
    broader 'leaders.'
- source_word: לָכֵן עַתָּה
  chosen: That is why ... now
  alternatives:
  - therefore now
  - for this reason now
  lexicon: HALOT
  rationale: The combination gives the reason for their appeal in light of Jephthah's
    objection in the previous verse. 'That is why ... now' communicates both the inferential
    force and the immediacy in natural English.
- source_word: שַׁבְנוּ אֵלֶיךָ
  chosen: we have now come back to you
  alternatives:
  - we have returned to you
  - we have turned back to you
  lexicon: HALOT
  rationale: שׁוּב commonly means 'return.' In context the elders are renewing contact
    with Jephthah after prior rejection, so 'come back to you' is idiomatic and preserves
    the relational sense.
- source_word: וְהָלַכְתָּ עִמָּנוּ
  chosen: come with us
  alternatives:
  - go with us
  - and you shall go with us
  lexicon: HALOT
  rationale: הלך literally means 'go/walk,' but in direct speech inviting someone
    to join a mission, 'come with us' is the natural English equivalent from the speakers'
    perspective.
- source_word: וְנִלְחַמְתָּ בִּבְנֵי עַמּוֹן
  chosen: fight against the Ammonites
  alternatives:
  - fight against the sons of Ammon
  - battle the Ammonites
  lexicon: HALOT
  rationale: '''Sons of Ammon'' is the literal ethnonym, but ''the Ammonites'' is
    standard, clear English. ''Against'' reflects the hostile sense of נלחם with בְּ.'
- source_word: וְהָיִיתָ לָּנוּ לְרֹאשׁ
  chosen: you will be head over us
  alternatives:
  - you will be chief for us
  - you will become our leader
  lexicon: HALOT
  rationale: רֹאשׁ literally 'head' often denotes leadership. 'Head over us' preserves
    the metaphor and authority structure better than flattening it to 'leader' alone.
- source_word: לְכֹל יֹשְׁבֵי גִלְעָד
  chosen: over all the inhabitants of Gilead
  alternatives:
  - over all who live in Gilead
  - for all the residents of Gilead
  lexicon: HALOT
  rationale: יֹשְׁבֵי is a participial expression meaning those dwelling in a place.
    'Inhabitants' is concise and natural while preserving the collective scope.
