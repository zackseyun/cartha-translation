id: JDG.11.16
reference: Judges 11:16
source:
  edition: WLC
  text: כִּ֖י בַּ/עֲלוֹתָ֣/ם מִ/מִּצְרָ֑יִם וַ/יֵּ֨לֶךְ יִשְׂרָאֵ֤ל בַּ/מִּדְבָּר֙
    עַד יַם ס֔וּף וַ/יָּבֹ֖א קָדֵֽשָׁ/ה־־׃
translation:
  text: For when they came up from Egypt, Israel went through the wilderness as far
    as the Red Sea and came to Kadesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Sea of Reeds' for 'Red Sea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - when
  lexicon: HALOT
  rationale: In Jephthah's historical explanation, כִּי introduces the reason/background
    for the claim that follows. 'For' fits the discourse flow in English while still
    allowing the temporal clause introduced by the infinitive construct to carry the
    'when' sense.
- source_word: בַּעֲלוֹתָם מִמִּצְרַיִם
  chosen: when they came up from Egypt
  alternatives:
  - when they went up from Egypt
  - at their coming up from Egypt
  lexicon: HALOT
  rationale: The preposition ב with infinitive construct of עלה plus suffix gives
    a temporal sense, 'when they came up.' 'Came up from Egypt' preserves the conventional
    Exodus idiom without over-literal awkwardness.
- source_word: וַיֵּלֶךְ
  chosen: went through
  alternatives:
  - went
  - traveled
  lexicon: HALOT
  rationale: הלך basically means 'go/walk,' but with the following phrase 'in the
    wilderness as far as the Red Sea,' English idiom is clearer with 'went through
    the wilderness,' expressing movement across/within that region without adding
    content beyond the context.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Proper name retained by standard transliteration. Though grammatically
    singular, it denotes the people collectively; singular English verbing with the
    name is natural here.
- source_word: בַּמִּדְבָּר
  chosen: through the wilderness
  alternatives:
  - in the wilderness
  - through the desert
  lexicon: HALOT
  rationale: מִדְבָּר denotes wilderness/desert region. 'Wilderness' is the more biblically
    resonant and standard rendering. 'Through' is chosen in English to express the
    route of travel naturally with הלך.
- source_word: עַד יַם סוּף
  chosen: as far as the Red Sea
  alternatives:
  - to the Red Sea
  - as far as the Sea of Reeds
  lexicon: HALOT
  rationale: עַד marks extent, so 'as far as' is slightly more precise than simple
    'to.' יַם סוּף is traditionally 'Red Sea'; although 'Sea of Reeds' is a plausible
    lexical alternative, 'Red Sea' remains the most recognizable English rendering.
    The alternative is preserved in a footnote for auditability.
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: בוא means 'come/enter/arrive.' 'Came' keeps the narrative sequence simple
    and close to the Hebrew.
- source_word: קָדֵשָׁה
  chosen: to Kadesh
  alternatives:
  - to Kadesh-barnea
  lexicon: HALOT
  rationale: The directional he on the place name indicates motion toward the location,
    so English supplies 'to.' The Hebrew here names Kadesh, not explicitly Kadesh-barnea,
    so the shorter form is retained in the main text.
