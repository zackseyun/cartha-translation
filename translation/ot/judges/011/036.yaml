id: JDG.11.36
reference: Judges 11:36
source:
  edition: WLC
  text: וַ/תֹּ֣אמֶר אֵלָ֗י/ו אָבִ/י֙ פָּצִ֤יתָה אֶת פִּ֨י/ךָ֙ אֶל יְהוָ֔ה עֲשֵׂ֣ה
    לִ֔/י כַּ/אֲשֶׁ֖ר יָצָ֣א מִ/פִּ֑י/ךָ אַחֲרֵ֡י אֲשֶׁ֣ר עָשָׂה֩ לְ/ךָ֙ יְהוָ֧ה נְקָמ֛וֹת
    מֵ/אֹיְבֶ֖י/ךָ מִ/בְּנֵ֥י עַמּֽוֹן־־׃
translation:
  text: And she said to him, “My father, you have opened your mouth to the LORD; do
    to me according to what has gone out from your mouth, since the LORD has given
    you vengeance on your enemies, on the sons of Ammon.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “against the Ammonites.” Hebrew: “from/on the sons of Ammon.”'
    reason: lexical_alternative
  - marker: b
    text: “You have opened your mouth to the LORD” is a Hebrew idiom for making a
      solemn spoken vow.
    reason: cultural_note
lexical_decisions:
- source_word: פָּצִיתָה אֶת־פִּיךָ
  chosen: you have opened your mouth
  alternatives:
  - you have given your word
  - you have made a vow
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of opening the mouth, here in the context
    of a vow to the LORD. Retaining the idiom preserves the solemnity and lets the
    following clause explain its force. More interpretive renderings like 'made a
    vow' are possible but slightly flatten the wording.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name is rendered 'the LORD' rather
    than transliterated.
- source_word: עֲשֵׂה לִי
  chosen: do to me
  alternatives:
  - deal with me
  - do for me
  lexicon: HALOT
  rationale: In context Jephthah's daughter submits herself to the outworking of his
    vow. 'Do to me' best reflects the direct object sense implied by the preposition
    with first-person suffix here, while remaining natural in English.
- source_word: כַּאֲשֶׁר יָצָא מִפִּיךָ
  chosen: according to what has gone out from your mouth
  alternatives:
  - according to what you have spoken
  - according to your vow
  lexicon: HALOT
  rationale: This keeps the concrete Hebrew expression and links it to the earlier
    idiom of the mouth, emphasizing the binding force of spoken words.
- source_word: אַחֲרֵי אֲשֶׁר
  chosen: since
  alternatives:
  - after
  - because
  lexicon: HALOT
  rationale: Here the phrase introduces the ground for her statement rather than simple
    temporal sequence. 'Since' captures the causal nuance in readable English.
- source_word: נְקָמוֹת
  chosen: vengeance
  alternatives:
  - vindication
  - acts of vengeance
  - avenging
  lexicon: HALOT
  rationale: The plural noun expresses acts of vengeance or avenging. English commonly
    uses the singular abstract 'vengeance' idiomatically in this setting. 'Vindication'
    is possible but weakens the retributive sense against enemies.
- source_word: מֵאֹיְבֶיךָ
  chosen: on your enemies
  alternatives:
  - from your enemies
  - against your enemies
  lexicon: HALOT
  rationale: Although the preposition is literally 'from,' with 'vengeance' English
    idiom prefers 'on' or 'against.' 'On your enemies' communicates the target of
    the vengeance clearly.
- source_word: מִבְּנֵי עַמּוֹן
  chosen: on the sons of Ammon
  alternatives:
  - against the Ammonites
  - from the sons of Ammon
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the ethnonym's literal structure.
    'Ammonites' is smoother English, but 'sons of Ammon' reflects the Hebrew expression
    and remains understandable.
