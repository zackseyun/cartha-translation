theological_decisions:
- issue: Nature of Jephthah's vow in the daughter's response
  chosen_reading: Render her words without resolving whether the vow entailed literal
    sacrifice or lifelong dedication.
  alternative_readings:
  - She accepts a vow leading to her death as a sacrifice.
  - She accepts a vow leading to perpetual virginity/service.
  rationale: The verse itself records her submission to the vow but does not specify
    in this line how the vow will be fulfilled. The translation therefore preserves
    the ambiguity and avoids importing a debated interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
