theological_decisions:
- issue: Meaning of the annual observance for Jephthah's daughter
  chosen_reading: Render the verb as 'lament' in the main text while preserving a
    commemorative sense as an alternative.
  alternative_readings:
  - commemorate
  - recount
  - celebrate/praise
  rationale: The verse is tied to the debated interpretation of Jephthah's vow and
    his daughter's fate. The Hebrew verb is rare and can be understood in more than
    one way. To preserve theological and interpretive tension rather than resolve
    it beyond the text, the main text uses the traditional and contextually plausible
    'lament,' while a footnote preserves the alternative commemorative sense.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
