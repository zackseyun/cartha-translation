id: JDG.11.40
reference: Judges 11:40
source:
  edition: WLC
  text: מִ/יָּמִ֣ים יָמִ֗ימָ/ה תֵּלַ֨כְנָה֙ בְּנ֣וֹת יִשְׂרָאֵ֔ל לְ/תַנּ֕וֹת לְ/בַת
    יִפְתָּ֖ח הַ/גִּלְעָדִ֑י אַרְבַּ֥עַת יָמִ֖ים בַּ/שָּׁנָֽה׀־׃ס
translation:
  text: From year to year the daughters of Israel would go to lament the daughter
    of Jephthah the Gileadite four days in the year.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to commemorate' or 'to recount concerning' the daughter of Jephthah.
      The Hebrew verb is rare and debated.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִיָּמִים יָמִימָה
  chosen: From year to year
  alternatives:
  - yearly
  - from days to days
  lexicon: HALOT
  rationale: This idiom denotes regular annual recurrence. 'From year to year' preserves
    the Hebrew flavor while communicating the temporal sense more clearly than a literal
    'from days to days.'
- source_word: תֵּלַכְנָה
  chosen: would go
  alternatives:
  - went
  - used to go
  lexicon: HALOT
  rationale: The imperfect here expresses customary past action in context, so 'would
    go' captures the repeated practice established after the preceding events.
- source_word: בְּנוֹת יִשְׂרָאֵל
  chosen: the daughters of Israel
  alternatives:
  - the women of Israel
  - the young women of Israel
  lexicon: HALOT
  rationale: A formally closer rendering is preferable. 'Daughters of Israel' preserves
    the Hebrew expression without over-interpreting age or marital status.
- source_word: לְתַנּוֹת
  chosen: to lament
  alternatives:
  - to commemorate
  - to recount
  - to praise
  lexicon: HALOT
  rationale: The verb is difficult and debated in this context. Given the narrative
    setting and common interpretation, 'lament' is the best main-text rendering, but
    the alternative sense of commemorating or recounting should be preserved in a
    footnote.
- source_word: לְבַת יִפְתָּח
  chosen: the daughter of Jephthah
  alternatives:
  - the daughter of Yiphtah
  lexicon: HALOT
  rationale: The construction straightforwardly identifies the object of the annual
    observance as Jephthah's daughter. Standard English transliteration uses 'Jephthah.'
- source_word: הַגִּלְעָדִי
  chosen: the Gileadite
  alternatives:
  - of Gilead
  lexicon: HALOT
  rationale: 'The gentilic is best rendered adjectivally in English: ''the Gileadite.'''
- source_word: אַרְבַּעַת יָמִים בַּשָּׁנָה
  chosen: four days in the year
  alternatives:
  - four days a year
  - for four days in the year
  lexicon: HALOT
  rationale: This phrase specifies the duration/frequency of the observance. 'Four
    days in the year' stays close to the Hebrew while remaining natural English.
