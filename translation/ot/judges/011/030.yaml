id: JDG.11.30
reference: Judges 11:30
source:
  edition: WLC
  text: וַ/יִּדַּ֨ר יִפְתָּ֥ח נֶ֛דֶר לַ/יהוָ֖ה וַ/יֹּאמַ֑ר אִם נָת֥וֹן תִּתֵּ֛ן אֶת
    בְּנֵ֥י עַמּ֖וֹן בְּ/יָדִֽ/י־־׃
translation:
  text: And Jephthah made a vow to the LORD and said, “If you indeed give the Ammonites
    into my hand,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “If you surely give the Ammonites into my hand.” The Hebrew uses an infinitive
      absolute with a finite verb for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּדַּר
  chosen: made a vow
  alternatives:
  - vowed
  lexicon: HALOT
  rationale: The verb נדר means to make/vow a vow. Rendering with the verb phrase
    'made a vow' is natural English and preserves the formal connection with the following
    noun נֶדֶר.
- source_word: נֶדֶר
  chosen: a vow
  lexicon: HALOT
  rationale: Standard rendering of נֶדֶר. Keeping the cognate object explicit reflects
    the Hebrew idiom rather than collapsing it entirely into a single English verb.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD' rather than
    a transliteration. The preposition ל is preserved as 'to.'
- source_word: אִם
  chosen: If
  alternatives:
  - Surely if
  lexicon: HALOT
  rationale: Introduces the conditional protasis of Jephthah's vow. Simple 'If' best
    matches the syntax and leaves the sentence open for completion in the next verse.
- source_word: נָתוֹן תִּתֵּן
  chosen: you indeed give
  alternatives:
  - you surely give
  - you truly give
  - you give
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the action. 'Indeed
    give' conveys the emphasis without sounding wooden; the addressee is singular
    masculine, referring to the LORD.
- source_word: בְּנֵי עַמּוֹן
  chosen: the Ammonites
  alternatives:
  - the sons of Ammon
  - the people of Ammon
  lexicon: HALOT
  rationale: Idiomatic rendering of the ethnonym in English. 'The sons of Ammon' is
    more formally literal, but 'the Ammonites' communicates the referent clearly.
- source_word: בְּיָדִי
  chosen: into my hand
  alternatives:
  - into my power
  - into my hands
  lexicon: HALOT
  rationale: The idiom 'give into the hand' commonly denotes delivering someone into
    another's power. 'Into my hand' preserves the singular Hebrew and the biblical
    idiom while remaining understandable.
