id: JDG.11.31
reference: Judges 11:31
source:
  edition: WLC
  text: וְ/הָיָ֣ה הַ/יּוֹצֵ֗א אֲשֶׁ֨ר יֵצֵ֜א מִ/דַּלְתֵ֤י בֵיתִ/י֙ לִ/קְרָאתִ֔/י בְּ/שׁוּבִ֥/י בְ/שָׁל֖וֹם מִ/בְּנֵ֣י עַמּ֑וֹן וְ/הָיָה֙ לַֽ/יהוָ֔ה וְ/הַעֲלִיתִ֖/הוּ עוֹלָֽה׃פ
translation:
  text: then whatever comes out from the doors of my house to meet me when I return in peace from the Ammonites shall be Yahweh’s, and I will offer it up as a burnt offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'shall be the LORD’s, or I will offer it up as a burnt offering.' Some interpreters take the Hebrew conjunction here in a disjunctive sense, yielding two possible outcomes depending on what came out to meet Jephthah.
    reason: alternative_reading
lexical_decisions:
- source_word: הַיּוֹצֵא אֲשֶׁר יֵצֵא
  chosen: whatever comes out
  alternatives:
  - whoever comes out
  - the one that comes out
  lexicon: HALOT
  rationale: The Hebrew uses a masculine singular participle plus relative/imperfect construction, literally 'the one coming out who comes out.' In context it can refer to either a person or an animal, and the vow's ambiguity is important to preserve. 'Whatever' best keeps that open in English, while 'whoever' would prematurely narrow it to a human.
- source_word: מִדַּלְתֵי בֵיתִי
  chosen: from the doors of my house
  alternatives:
  - from the doorway of my house
  - from the entrance of my house
  lexicon: HALOT
  rationale: דַּלְתֵי is the plural construct of 'doors.' 'From the doors of my house' is formally close to the Hebrew and idiomatic enough in English, while still conveying emergence from the house entrance.
- source_word: לִקְרָאתִי
  chosen: to meet me
  alternatives:
  - to greet me
  - to come out to meet me
  lexicon: HALOT
  rationale: The infinitive of קרא with ל conveys movement for encounter. 'To meet me' is the standard and natural rendering.
- source_word: בְּשׁוּבִי בְשָׁלוֹם
  chosen: when I return in peace
  alternatives:
  - when I return safely
  - at my returning in peace
  lexicon: HALOT
  rationale: This phrase marks Jephthah's safe return after battle. 'In peace' preserves the Hebrew wording and its broader sense of well-being, not merely absence of conflict.
- source_word: מִבְּנֵי עַמּוֹן
  chosen: from the Ammonites
  alternatives:
  - from the sons of Ammon
  - from the Ammonites' hand
  lexicon: HALOT
  rationale: Though literally 'from the sons of Ammon,' standard English uses the people-name 'the Ammonites.' The preposition marks return from conflict with them.
- source_word: וְהָיָה לַיהוָה
  chosen: shall be the LORD’s
  alternatives:
  - shall belong to the LORD
  - shall be for the LORD
  lexicon: HALOT
  rationale: This clause expresses dedication or belonging to YHWH. Because the following clause is debated, this wording preserves the sense of consecration without over-interpreting the exact mode.
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, YHWH is rendered 'the LORD' in the main text.
- source_word: וְהַעֲלִיתִהוּ עוֹלָה
  chosen: and I will offer it up as a burnt offering
  alternatives:
  - and I will offer him up as a burnt offering
  - or I will offer it up as a burnt offering
  lexicon: HALOT
  rationale: עלה in the Hiphil with עוֹלָה is the standard sacrificial idiom 'offer up as a burnt offering.' The pronominal suffix is masculine singular and can be rendered 'it' or 'him'; 'it' fits the deliberately open antecedent created by 'whatever.' The conjunction ו is rendered 'and' in the main text because that is its normal value, while the possible disjunctive sense often argued here is preserved in a footnote.
