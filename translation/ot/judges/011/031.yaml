theological_decisions:
- issue: Whether Jephthah's vow is rendered as a single outcome ('shall be the LORD's, and I will offer it up as a burnt offering') or as two alternatives ('shall be the LORD's, or I will offer it up as a burnt offering').
  chosen_reading: Single outcome with conjunctive 'and.'
  alternative_readings:
  - Two alternatives with disjunctive 'or'
  rationale: The Hebrew conjunction ו normally means 'and,' and the syntax most naturally reads as a single vow in which the one coming out is dedicated to YHWH and offered as a burnt offering. Because interpreters dispute whether the verse allows a non-sacrificial dedication reading, that alternative is preserved in a footnote rather than adopted in the main text. This follows the translation philosophy of preserving tension without importing a doctrinally motivated resolution beyond the plain sense.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it); Contested terms table for יְהוָה
