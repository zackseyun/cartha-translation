id: JDG.11.39
reference: Judges 11:39
source:
  edition: WLC
  text: וַ/יְהִ֞י מִ/קֵּ֣ץ שְׁנַ֣יִם חֳדָשִׁ֗ים וַ/תָּ֨שָׁב֙ אֶל אָבִ֔י/הָ וַ/יַּ֣עַשׂ
    לָ֔/הּ אֶת נִדְר֖/וֹ אֲשֶׁ֣ר נָדָ֑ר וְ/הִיא֙ לֹא יָדְעָ֣ה אִ֔ישׁ וַ/תְּהִי חֹ֖ק
    בְּ/יִשְׂרָאֵֽל׀־־־־׃
translation:
  text: 'And at the end of two months she returned to her father, and he did to her
    according to his vow that he had vowed. Now she had not known a man. And it became
    a custom in Israel:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he carried out on her the vow that he had made.' Interpreters differ
      on whether this means Jephthah sacrificed her or dedicated her to lifelong virginity;
      the Hebrew wording itself does not explicitly resolve the question here.
    reason: alternative_reading
  - marker: b
    text: Literally, 'she had not known a man,' a Hebrew idiom indicating that she
      had not had sexual relations.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקֵּץ שְׁנַיִם חֳדָשִׁים
  chosen: at the end of two months
  alternatives:
  - after two months
  lexicon: HALOT
  rationale: מִקֵּץ denotes the end or completion of a period. 'At the end of two
    months' preserves the temporal boundary more formally than the smoother 'after
    two months'.
- source_word: וַתָּשָׁב אֶל אָבִיהָ
  chosen: she returned to her father
  alternatives:
  - she came back to her father
  lexicon: HALOT
  rationale: שׁוּב in this narrative context is straightforwardly 'return.' 'To her
    father' is retained rather than 'home' because the Hebrew explicitly names the
    relational destination.
- source_word: וַיַּעַשׂ לָהּ אֶת נִדְרוֹ אֲשֶׁר נָדָר
  chosen: he did to her according to his vow that he had vowed
  alternatives:
  - he carried out on her the vow that he had made
  - he fulfilled his vow to her
  lexicon: HALOT
  rationale: 'The Hebrew is stark and somewhat repetitive: ''he did to her his vow
    which he vowed.'' The chosen rendering preserves both the concreteness of עשה
    and the emphatic repetition with נדר, while using ''according to'' for readable
    English. ''Fulfilled his vow'' is possible but softens the directness of ''did
    to her.'''
- source_word: וְהִיא לֹא יָדְעָה אִישׁ
  chosen: Now she had not known a man
  alternatives:
  - and she had never known a man
  - and she was a virgin
  lexicon: HALOT
  rationale: יָדַע + אִישׁ is the idiom for sexual relations. 'Had not known a man'
    preserves the Hebrew idiom and leaves the narrative implication explicit without
    collapsing it into the interpretive gloss 'was a virgin,' though that is the sense.
- source_word: חֹק
  chosen: a custom
  alternatives:
  - a statute
  - an ordinance
  lexicon: HALOT
  rationale: In this narrative conclusion, חֹק refers to an established practice in
    Israel rather than primarily a formal legal statute. 'Custom' best fits the immediate
    context of the following annual observance.
- source_word: וַתְּהִי חֹק בְּיִשְׂרָאֵל
  chosen: it became a custom in Israel
  alternatives:
  - it was a statute in Israel
  - it became an ordinance in Israel
  lexicon: HALOT
  rationale: The clause marks the emergence of an ongoing communal practice. 'Became
    a custom' captures the narrative development signaled by וַתְּהִי and the social
    sense of חֹק here.
