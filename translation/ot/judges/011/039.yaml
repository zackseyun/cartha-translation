theological_decisions:
- issue: Nature of Jephthah's fulfillment of the vow
  chosen_reading: The translation preserves the Hebrew's ambiguity/directness without
    softening it into a specific interpretive conclusion beyond the text.
  alternative_readings:
  - He offered her as a burnt offering
  - He dedicated her to perpetual virginity/service
  rationale: This verse is central to a long-standing interpretive dispute. The Hebrew
    says he 'did to her according to his vow' and immediately notes that 'she had
    not known a man.' Rather than importing either interpretation into the main text,
    the translation keeps the wording close to the source and preserves the major
    alternatives in a footnote, in keeping with the principle of preserving theological
    tension where the text is debated.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
