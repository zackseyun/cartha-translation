theological_decisions:
- issue: Meaning of Jephthah's daughter's lament over her virginity
  chosen_reading: The translation preserves the text's wording about mourning her
    virginity without resolving whether the broader narrative implies literal sacrifice,
    perpetual virginity, or both dimensions.
  alternative_readings:
  - She laments impending death and childlessness together
  - She laments lifelong virginity/dedication rather than imminent death
  rationale: The verse itself foregrounds virginity, not death explicitly. In keeping
    with the doctrine's instruction to preserve theological tension rather than resolve
    ambiguity, the translation stays close to the Hebrew and avoids interpretive additions.
  doctrine_reference: Translation philosophy §3
