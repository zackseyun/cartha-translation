id: JDG.11.37
reference: Judges 11:37
source:
  edition: WLC
  text: וַ/תֹּ֨אמֶר֙ אֶל אָבִ֔י/הָ יֵעָ֥שֶׂה לִּ֖/י הַ/דָּבָ֣ר הַ/זֶּ֑ה הַרְפֵּ֨ה
    מִמֶּ֜/נִּי שְׁנַ֣יִם חֳדָשִׁ֗ים וְ/אֵֽלְכָה֙ וְ/יָרַדְתִּ֣י עַל הֶֽ/הָרִ֔ים וְ/אֶבְכֶּה֙
    עַל בְּתוּלַ֔/י אָנֹכִ֖י ו/רעית/י־־־׃
translation:
  text: 'And she said to her father, “Let this thing be done for me: leave me alone
    for two months, so that I may go and go down on the mountains and weep over my
    virginity, I and my companions.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “give me leave” / “let me alone” for two months.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “weep over my virginity”; the text emphasizes her unmarried state
      and childlessness, without here resolving the wider interpretive question in
      the narrative.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵעָשֶׂה לִּי הַדָּבָר הַזֶּה
  chosen: Let this thing be done for me
  alternatives:
  - Let this be done for me
  - Grant me this request
  lexicon: HALOT
  rationale: 'The Niphal imperfect of עשה here functions jussively/passively: ''let
    ... be done.'' ''This thing'' preserves the Hebrew demonstrative expression without
    over-paraphrasing into ''request,'' though that is the sense.'
- source_word: הַרְפֵּה מִמֶּנִּי
  chosen: leave me alone
  alternatives:
  - let me alone
  - give me leave
  - release me
  lexicon: HALOT
  rationale: The imperative of רפה with מן + pronoun idiomatically asks to be left
    free or allowed space/time. 'Leave me alone' is natural modern English and fits
    the request for a period of withdrawal; a footnote preserves the more formal alternative
    'give me leave.'
- source_word: שְׁנַיִם חֳדָשִׁים
  chosen: two months
  alternatives:
  - for two months
  lexicon: HALOT
  rationale: Straightforward temporal expression. English idiom supplies 'for' in
    context with the preceding imperative/request.
- source_word: וְאֵלְכָה וְיָרַדְתִּי
  chosen: so that I may go and go down
  alternatives:
  - and let me go and descend
  - that I may go about on
  lexicon: HALOT
  rationale: Both verbs are retained because the Hebrew uses two coordinated actions.
    'Go and go down' sounds slightly unusual in English but preserves the sequence
    better than collapsing to a single verb. The phrase likely reflects movement from
    habitation to the hill country terrain.
- source_word: עַל הֶהָרִים
  chosen: on the mountains
  alternatives:
  - in the mountains
  - through the hills
  lexicon: HALOT
  rationale: The preposition על is most basically 'on/upon.' In idiomatic English,
    'in the mountains' is possible, but 'on the mountains' stays closer to the Hebrew
    while remaining understandable.
- source_word: וְאֶבְכֶּה עַל בְּתוּלַי
  chosen: and weep over my virginity
  alternatives:
  - and bewail my virginity
  - and mourn because of my virginity
  lexicon: HALOT
  rationale: בכה על means 'weep over/lament.' בְּתוּלִים refers to virginity/maidenhood,
    not merely youth. 'Weep over my virginity' preserves the object and the pathos
    without importing a specific interpretation beyond the text.
- source_word: אָנֹכִי וְרֵעוֹתָי
  chosen: I and my companions
  alternatives:
  - I and my friends
  - I and my female companions
  lexicon: HALOT
  rationale: The noun from רֵעַ in feminine plural with 1cs suffix refers to her female
    companions/friends. 'Companions' is slightly broader and dignified; the feminine
    sense is contextually clear from the speaker and form.
