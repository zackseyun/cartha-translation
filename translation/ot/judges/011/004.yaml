id: JDG.11.4
reference: Judges 11:4
source:
  edition: WLC
  text: וַ/יְהִ֖י מִ/יָּמִ֑ים וַ/יִּלָּחֲמ֥וּ בְנֵֽי עַמּ֖וֹן עִם יִשְׂרָאֵֽל־־׃
translation:
  text: After some time, the Ammonites fought against Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''And it happened after days,'' an idiom meaning that some time
      passed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי מִיָּמִים
  chosen: After some time
  alternatives:
  - And it happened after days
  - And after some days
  lexicon: HALOT
  rationale: The idiom וַיְהִי מִיָּמִים introduces a lapse of time rather than focusing
    on the bare occurrence formula. 'After some time' gives natural modern English
    while preserving the temporal sense.
- source_word: וַיִּלָּחֲמוּ
  chosen: fought against
  alternatives:
  - went to war with
  - fought with
  lexicon: HALOT
  rationale: The Niphal/wayyiqtol form from לחם in this context denotes engaging in
    battle. 'Fought against' makes the adversarial sense explicit in idiomatic English.
- source_word: בְּנֵי עַמּוֹן
  chosen: the Ammonites
  alternatives:
  - the sons of Ammon
  - the people of Ammon
  lexicon: HALOT
  rationale: This ethnonym commonly refers to the people group descended from/identified
    with Ammon. 'The Ammonites' is the standard and most natural English rendering;
    'sons of Ammon' is more formal but less idiomatic here.
- source_word: עִם יִשְׂרָאֵל
  chosen: against Israel
  alternatives:
  - with Israel
  lexicon: HALOT
  rationale: Although עִם literally means 'with,' in warfare contexts with לחם it
    marks the opposing party. Rendering it as 'against Israel' communicates the actual
    relational force in English.
