id: JDG.11.23
reference: Judges 11:23
source:
  edition: WLC
  text: וְ/עַתָּ֞ה יְהוָ֣ה אֱלֹהֵ֣י יִשְׂרָאֵ֗ל הוֹרִישׁ֙ אֶת הָ֣/אֱמֹרִ֔י מִ/פְּנֵ֖י
    עַמּ֣/וֹ יִשְׂרָאֵ֑ל וְ/אַתָּ֖ה תִּירָשֶֽׁ/נּוּ׀־׃
translation:
  text: And now the LORD, the God of Israel, has dispossessed the Amorites from before
    his people Israel; and are you to possess it?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to inherit it' / 'to take possession of it.' The Hebrew verb can denote
      receiving or taking possession of land.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - So now
  - Now then
  lexicon: HALOT
  rationale: Discourse marker introducing Jephthah’s conclusion from the preceding
    argument. 'And now' preserves the connective force and the rhetorical transition.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'
    rather than a transliteration.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Construct phrase identifying YHWH specifically as Israel’s God; standard,
    transparent rendering.
- source_word: הוֹרִישׁ
  chosen: has dispossessed
  alternatives:
  - drove out
  - caused to lose possession of
  - disinherited
  lexicon: HALOT
  rationale: Hiphil of ירש here means to cause another people to lose possession of
    land. 'Has dispossessed' captures the land-tenure sense better than the more general
    'drove out.' The perfect is rendered with present relevance in English.
- source_word: הָאֱמֹרִי
  chosen: the Amorites
  alternatives:
  - the Amorite
  lexicon: HALOT
  rationale: Although morphologically singular, the ethnic singular often functions
    collectively in Hebrew. English idiom prefers the plural for the people group
    in this context.
- source_word: מִפְּנֵי
  chosen: from before
  alternatives:
  - from the presence of
  - from before the face of
  lexicon: HALOT
  rationale: Retains the Hebrew spatial idiom while remaining natural enough in English.
    It conveys removal from the presence/territory before Israel.
- source_word: עַמּוֹ יִשְׂרָאֵל
  chosen: his people Israel
  alternatives:
  - Israel his people
  - his people, Israel
  lexicon: HALOT
  rationale: The suffix on 'people' refers to the LORD. 'His people Israel' is direct
    and preserves the appositional identification.
- source_word: וְאַתָּה
  chosen: and are you
  alternatives:
  - and you
  - so you
  lexicon: HALOT
  rationale: The independent pronoun is emphatic in a rhetorical question. Rendering
    it with 'are you' brings out the confrontational emphasis in English.
- source_word: תִּירָשֶׁנּוּ
  chosen: to possess it
  alternatives:
  - to take possession of it
  - to inherit it
  lexicon: HALOT
  rationale: Qal of ירש commonly means to take possession/inherit land. 'Possess it'
    is concise and matches the land-claim context; the object suffix is singular,
    referring to the land/territory rather than the people.
