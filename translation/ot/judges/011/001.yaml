id: JDG.11.1
reference: Judges 11:1
source:
  edition: WLC
  text: וְ/יִפְתָּ֣ח הַ/גִּלְעָדִ֗י הָיָה֙ גִּבּ֣וֹר חַ֔יִל וְ/ה֖וּא בֶּן אִשָּׁ֣ה
    זוֹנָ֑ה וַ/יּ֥וֹלֶד גִּלְעָ֖ד אֶת יִפְתָּֽח־־׃
translation:
  text: Now Jephthah the Gileadite was a mighty warrior, and he was the son of a prostitute;
    and Gilead fathered Jephthah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'a mighty man of valor.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the son of a prostitute'; older English versions often have 'harlot.'
    reason: lexical_alternative
  - marker: c
    text: Gilead here is the personal name of Jephthah's father, not merely a reference
      to the region.
    reason: cultural_note
lexical_decisions:
- source_word: הַגִּלְעָדִי
  chosen: the Gileadite
  alternatives:
  - of Gilead
  lexicon: HALOT
  rationale: The gentilic/adjectival form identifies Jephthah by regional affiliation.
    'The Gileadite' is the most natural English equivalent and preserves the Hebrew
    designation more clearly than the looser 'of Gilead.'
- source_word: גִּבּוֹר חַיִל
  chosen: a mighty warrior
  alternatives:
  - a mighty man of valor
  - a valiant warrior
  - a capable man
  lexicon: HALOT
  rationale: The collocation often denotes a man of strength, valor, or military capability.
    In this narrative context, 'mighty warrior' communicates the likely martial sense
    in readable modern English. 'Man of valor' is more traditional but less natural
    for contemporary readers.
- source_word: בֶּן אִשָּׁה זוֹנָה
  chosen: the son of a prostitute
  alternatives:
  - the son of a harlot
  - the son of a promiscuous woman
  lexicon: HALOT
  rationale: זוֹנָה most straightforwardly denotes a prostitute. 'Prostitute' is clear,
    contemporary, and neither euphemistic nor archaic. 'Harlot' is traditional but
    dated; 'promiscuous woman' weakens the occupational/social force of the term.
- source_word: וַיּוֹלֶד
  chosen: fathered
  alternatives:
  - begot
  - was the father of
  lexicon: HALOT
  rationale: The verb ילד in the Hiphil here indicates biological paternity. 'Fathered'
    is concise, natural modern English and preserves the genealogical force. 'Begot'
    is accurate but archaic.
- source_word: גִּלְעָד
  chosen: Gilead
  alternatives:
  - Gilead (the man, not merely the region)
  lexicon: HALOT
  rationale: The proper name here functions as the subject of 'fathered,' so it refers
    to a person named Gilead, not simply the territory. Retaining the name without
    expansion keeps the text close to the Hebrew while the syntax clarifies the personal
    referent.
- source_word: וְ
  chosen: Now
  alternatives:
  - And
  lexicon: HALOT
  rationale: The initial conjunction introduces a new episode or character in the
    narrative. 'Now' is a common and natural English way to mark this discourse transition,
    whereas 'And' is more mechanically formal.
