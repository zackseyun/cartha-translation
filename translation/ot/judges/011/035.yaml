theological_decisions:
- issue: Whether to make Jephthah's statement explicitly about a vow in the main text
  chosen_reading: Retain the Hebrew idiom 'I have opened my mouth to the LORD' and
    let the context imply the vow.
  alternative_readings:
  - I have made a vow to the LORD
  - I have given my word to the LORD
  rationale: The immediate context concerns Jephthah's vow, so an explicit rendering
    is contextually defensible. However, the Hebrew wording is more literal and solemn
    than a simple paraphrase. Preserving the idiom avoids importing more interpretation
    than necessary while a footnote supplies the explicit sense.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: How strongly to render Jephthah's distress toward his daughter
  chosen_reading: Use 'You have brought me very low' and 'the cause of my trouble'
    without implying moral blame beyond the text.
  alternative_readings:
  - You have ruined me
  - You have become my destroyer
  rationale: The Hebrew expresses intense anguish, but stronger English options can
    suggest a harsher accusation than the text requires. The chosen wording preserves
    emotional force while avoiding overstatement.
  doctrine_reference: Translation philosophy §§1, 3, 6
