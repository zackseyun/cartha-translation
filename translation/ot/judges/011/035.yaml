id: JDG.11.35
reference: Judges 11:35
source:
  edition: WLC
  text: וַ/יְהִי֩ כִ/רְאוֹת֨/וֹ אוֹתָ֜/הּ וַ/יִּקְרַ֣ע אֶת בְּגָדָ֗י/ו וַ/יֹּ֨אמֶר֙
    אֲהָ֤הּ בִּתִּ/י֙ הַכְרֵ֣עַ הִכְרַעְתִּ֔/נִי וְ/אַ֖תְּ הָיִ֣יתְ בְּ/עֹֽכְרָ֑/י
    וְ/אָנֹכִ֗י פָּצִ֤יתִי פִ/י֙ אֶל יְהוָ֔ה וְ/לֹ֥א אוּכַ֖ל לָ/שֽׁוּב־־־׃
translation:
  text: And when he saw her, he tore his clothes and said, “Alas, my daughter! You
    have brought me very low, and you have become the cause of my trouble. For I have
    opened my mouth to the LORD, and I cannot turn back.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, “I have made a vow to the LORD.” The Hebrew reads literally,
      “I have opened my mouth to the LORD.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כִרְאוֹתוֹ
  chosen: And when he saw
  alternatives:
  - And it happened, when he saw
  - Now when he saw
  lexicon: HALOT
  rationale: The Hebrew narrative formula וַיְהִי plus temporal infinitive construct
    is idiomatically rendered in English as a simple temporal clause. Retaining 'it
    happened' would be overly wooden here.
- source_word: וַיִּקְרַע אֶת־בְּגָדָיו
  chosen: he tore his clothes
  alternatives:
  - he tore his garments
  lexicon: HALOT
  rationale: קרע with בגדים is the standard idiom for an act of grief or distress.
    'Clothes' is more natural modern English than 'garments' while preserving the
    action.
- source_word: אֲהָהּ
  chosen: Alas
  alternatives:
  - Ah
  - Oh no
  lexicon: HALOT
  rationale: An interjection of grief or dismay. 'Alas' best preserves the lament-like
    force without becoming colloquial.
- source_word: בִּתִּי
  chosen: my daughter
  lexicon: HALOT
  rationale: Direct vocative with first-person suffix; straightforwardly rendered.
- source_word: הַכְרֵעַ הִכְרַעְתִּנִי
  chosen: You have brought me very low
  alternatives:
  - You have utterly brought me down
  - You have made me bow down
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verb כרע. The
    sense is severe humbling/crushing. 'Brought me very low' communicates the idiomatic
    force in readable English without over-literal awkwardness.
- source_word: וְאַתְּ הָיִיתְ בְּעֹכְרָי
  chosen: and you have become the cause of my trouble
  alternatives:
  - and you have become my troubler
  - and you are among those who trouble me
  lexicon: HALOT
  rationale: עכר denotes bringing trouble/disaster. The participial form with pronominal
    suffix is idiomatic; 'the cause of my trouble' is natural English and preserves
    the causative sense.
- source_word: וְאָנֹכִי פָצִיתִי פִי אֶל־יְהוָה
  chosen: For I have opened my mouth to the LORD
  alternatives:
  - For I have spoken to the LORD
  - For I have made a vow to the LORD
  lexicon: HALOT
  rationale: Literally 'opened my mouth to the LORD,' an idiom here referring to making
    a solemn utterance/vow. The literal image is preserved in the main text because
    it is intelligible in English and keeps the solemnity; the more explicit interpretive
    alternative is preserved in a footnote.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'.
- source_word: וְלֹא אוּכַל לָשׁוּב
  chosen: and I cannot turn back
  alternatives:
  - and I cannot take it back
  - and I cannot retract it
  lexicon: HALOT
  rationale: שוב here means to turn back from what he has said or vowed. 'Turn back'
    is a close rendering; the more explicit 'take it back' is interpretive but possible.
