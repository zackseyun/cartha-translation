id: JDG.11.7
reference: Judges 11:7
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יִפְתָּח֙ לְ/זִקְנֵ֣י גִלְעָ֔ד הֲ/לֹ֤א אַתֶּם֙ שְׂנֵאתֶ֣ם אוֹתִ֔/י
    וַ/תְּגָרְשׁ֖וּ/נִי מִ/בֵּ֣ית אָבִ֑/י וּ/מַדּ֜וּעַ בָּאתֶ֤ם אֵלַ/י֙ עַ֔תָּה כַּ/אֲשֶׁ֖ר
    צַ֥ר לָ/כֶֽם׃
translation:
  text: Jephthah said to the elders of Gilead, “Did you not hate me and drive me out
    from my father’s house? So why have you come to me now, when you are in distress?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when you are in trouble.' The Hebrew clause כַּאֲשֶׁר צַר לָכֶם expresses
      being in straits or distress.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - asked
  - spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר is best rendered simply as 'said'
    in English narrative.
- source_word: זִקְנֵי גִלְעָד
  chosen: the elders of Gilead
  alternatives:
  - the leaders of Gilead
  lexicon: HALOT
  rationale: זָקֵן in plural construct commonly denotes community elders, not merely
    old men. 'Elders of Gilead' preserves the social-political role.
- source_word: הֲלֹא
  chosen: Did ... not
  alternatives:
  - Have ... not
  - Is it not that
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. English idiom is
    best captured by 'Did you not ... ?'
- source_word: שְׂנֵאתֶם
  chosen: hate
  alternatives:
  - detest
  - reject
  lexicon: HALOT
  rationale: The verb שׂנא straightforwardly means 'hate.' A stronger paraphrase is
    unnecessary; the plain relational hostility is in view.
- source_word: וַתְּגָרְשׁוּנִי
  chosen: drive me out
  alternatives:
  - expel me
  - cast me out
  lexicon: HALOT
  rationale: גרשׁ often denotes forcible expulsion. 'Drive me out' is natural modern
    English and preserves the force better than the milder 'send away.'
- source_word: מִבֵּית אָבִי
  chosen: from my father’s house
  alternatives:
  - from my father’s household
  - out of my father’s home
  lexicon: HALOT
  rationale: The phrase can denote household/family sphere, but 'father’s house' is
    a standard and transparent rendering that preserves the familial-legal setting.
- source_word: וּמַדּוּעַ
  chosen: So why
  alternatives:
  - And why
  - Why then
  lexicon: HALOT
  rationale: The conjunction links the question to the previous accusation. 'So why'
    captures the inferential force in idiomatic English.
- source_word: בָּאתֶם אֵלַי עַתָּה
  chosen: have you come to me now
  alternatives:
  - did you come to me now
  - have you come to me at this time
  lexicon: HALOT
  rationale: The perfect in direct speech can be rendered idiomatically in English
    as present perfect. 'Now' preserves עתה's temporal emphasis.
- source_word: כַּאֲשֶׁר צַר לָכֶם
  chosen: when you are in distress
  alternatives:
  - when things are hard for you
  - because you are in trouble
  - when trouble has come upon you
  lexicon: HALOT
  rationale: The clause marks the circumstance prompting their visit. צַר with ל can
    express being in straits/distress. 'In distress' is concise, natural, and preserves
    the adversity without over-specifying its cause.
