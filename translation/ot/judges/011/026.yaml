id: JDG.11.26
reference: Judges 11:26
source:
  edition: WLC
  text: בְּ/שֶׁ֣בֶת יִ֠שְׂרָאֵל בְּ/חֶשְׁבּ֨וֹן וּ/בִ/בְנוֹתֶ֜י/הָ וּ/בְ/עַרְע֣וֹר
    וּ/בִ/בְנוֹתֶ֗י/הָ וּ/בְ/כָל הֶֽ/עָרִים֙ אֲשֶׁר֙ עַל יְדֵ֣י אַרְנ֔וֹן שְׁלֹ֥שׁ
    מֵא֖וֹת שָׁנָ֑ה וּ/מַדּ֥וּעַ לֹֽא הִצַּלְתֶּ֖ם בָּ/עֵ֥ת הַ/הִֽיא־־־׃
translation:
  text: While Israel has lived in Heshbon and its daughter towns, and in Aroer and
    its daughter towns, and in all the cities that are along the Arnon, for three
    hundred years, why did you not recover them at that time?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'its daughters,' meaning the smaller settlements dependent on a larger
      city.
    reason: cultural_note
  - marker: b
    text: Or 'deliver them' or 'rescue them'; in context the sense is reclaiming the
      territory.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/שֶׁבֶת
  chosen: While Israel has lived
  alternatives:
  - During Israel's dwelling
  - When Israel lived
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct of ישׁב introduces a temporal
    circumstance. 'While Israel has lived' captures the durative force leading into
    the rhetorical question, better than a bare infinitive in English.
- source_word: בְּנוֹתֶיהָ
  chosen: its daughter towns
  alternatives:
  - its villages
  - its dependent towns
  lexicon: HALOT
  rationale: Literally 'its daughters,' an idiom for satellite settlements dependent
    on a main city. 'Daughter towns' preserves the metaphor and remains understandable;
    the more interpretive 'villages' is possible but less precise.
- source_word: עַרְעוֹר
  chosen: Aroer
  rationale: Standard English transliteration of the place name.
- source_word: עַל יְדֵי אַרְנוֹן
  chosen: along the Arnon
  alternatives:
  - by the Arnon
  - on the banks of the Arnon
  lexicon: HALOT
  rationale: The idiom עַל יְדֵי means 'at the side of, alongside, near.' 'Along the
    Arnon' is natural English and fits a region containing multiple cities.
- source_word: שְׁלֹשׁ מֵאוֹת שָׁנָה
  chosen: for three hundred years
  alternatives:
  - three hundred years
  lexicon: HALOT
  rationale: English idiom normally supplies 'for' with a duration. This expresses
    the length of Israel's occupation/residence.
- source_word: וּמַדּוּעַ
  chosen: why
  alternatives:
  - and why
  lexicon: HALOT
  rationale: The conjunction can be left untranslated in smooth English since the
    rhetorical question follows naturally from the preceding clause.
- source_word: הִצַּלְתֶּם
  chosen: recover them
  alternatives:
  - deliver them
  - rescue them
  - take them back
  lexicon: HALOT
  rationale: The Hiphil of נצל commonly means 'deliver/rescue,' but in this territorial
    dispute context it refers to reclaiming territory from another's control. 'Recover
    them' best fits the argument. The object 'them' is implicit from the cities/territory
    just mentioned and is supplied in English for clarity.
- source_word: בָּעֵת הַהִיא
  chosen: at that time
  alternatives:
  - in that time
  - then
  lexicon: HALOT
  rationale: Standard temporal expression; 'at that time' preserves the demonstrative
    emphasis without sounding wooden.
