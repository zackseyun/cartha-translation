id: JDG.11.28
reference: Judges 11:28
source:
  edition: WLC
  text: וְ/לֹ֣א שָׁמַ֔ע מֶ֖לֶךְ בְּנֵ֣י עַמּ֑וֹן אֶל דִּבְרֵ֣י יִפְתָּ֔ח אֲשֶׁ֥ר שָׁלַ֖ח
    אֵלָֽי/ו־׃פ
translation:
  text: But the king of the Ammonites did not listen to the words of Jephthah that
    he sent to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not heed' or 'did not obey.' The Hebrew verb can carry the sense
      of hearing, listening, or obeying depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא
  chosen: But ... did not
  alternatives:
  - And ... did not
  - Yet ... did not
  lexicon: HALOT
  rationale: The conjunction with negation continues the narrative while marking contrast
    with Jephthah's prior message; 'But' captures the adversative force naturally
    in English.
- source_word: שָׁמַע
  chosen: listen to
  alternatives:
  - hear
  - obey
  lexicon: HALOT
  rationale: שׁמע can mean hear, listen, or obey depending on context. Here the object
    is 'the words of Jephthah,' so 'listen to' best conveys refusal to heed his message
    without overstating to explicit obedience.
- source_word: מֶלֶךְ בְּנֵי עַמּוֹן
  chosen: the king of the Ammonites
  alternatives:
  - the king of the sons of Ammon
  - the king of the people of Ammon
  lexicon: HALOT
  rationale: The construct literally means 'king of the sons of Ammon,' but standard
    English idiom is 'king of the Ammonites.' This preserves the referent clearly
    and naturally.
- source_word: אֶל דִּבְרֵי יִפְתָּח
  chosen: to the words of Jephthah
  alternatives:
  - to Jephthah's words
  - to the message of Jephthah
  lexicon: HALOT
  rationale: דִּבְרֵי is literally 'words of.' 'Words of Jephthah' is slightly more
    formal and transparent to the Hebrew; 'message' is possible but less literal.
- source_word: יִפְתָּח
  chosen: Jephthah
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: אֲשֶׁר שָׁלַח אֵלָיו
  chosen: that he sent to him
  alternatives:
  - which he had sent to him
  - that Jephthah sent to him
  lexicon: HALOT
  rationale: 'The relative clause modifies ''words.'' Because English pronouns could
    be ambiguous, the antecedents are clarified by context: Jephthah sent the words
    to the king. The simple past matches the Hebrew narrative perfect well in English.'
