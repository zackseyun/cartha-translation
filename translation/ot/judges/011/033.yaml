id: JDG.11.33
reference: Judges 11:33
source:
  edition: WLC
  text: וַ/יַּכֵּ֡/ם מֵ/עֲרוֹעֵר֩ וְ/עַד בּוֹאֲ/ךָ֨ מִנִּ֜ית עֶשְׂרִ֣ים עִ֗יר וְ/עַד֙
    אָבֵ֣ל כְּרָמִ֔ים מַכָּ֖ה גְּדוֹלָ֣ה מְאֹ֑ד וַ/יִּכָּֽנְעוּ֙ בְּנֵ֣י עַמּ֔וֹן
    מִ/פְּנֵ֖י בְּנֵ֥י יִשְׂרָאֵֽל־׃פ
translation:
  text: And he struck them from Aroer as far as the approach to Minnith—twenty cities—and
    as far as Abel-keramim, with a very great slaughter. So the sons of Ammon were
    subdued before the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as far as Minnith' or 'up to the entrance of Minnith.' The Hebrew expression
      is somewhat difficult and may refer either to the approach to the city or simply
      to the city itself.
    reason: alternative_reading
  - marker: b
    text: Abel-keramim is a place name; the components of the name may mean something
      like 'meadow of vineyards,' but it is left transliterated here because it functions
      as a proper name.
    reason: lexical_alternative
  - marker: c
    text: Or 'with a very great blow/defeat.' The Hebrew phrase can denote a devastating
      military strike; 'slaughter' makes the severity explicit in context.
    reason: lexical_alternative
  - marker: d
    text: Or more idiomatically, 'the Ammonites' and 'the Israelites.' The translation
      preserves the Hebrew expressions 'sons of Ammon' and 'sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכֵּם
  chosen: And he struck them
  alternatives:
  - and he defeated them
  - and he struck them down
  lexicon: HALOT
  rationale: נכה commonly means 'strike/smite.' 'Struck them' preserves the concrete
    military action without overinterpreting the extent of death in the verb itself;
    the later phrase מַכָּה גְּדוֹלָה מְאֹד supplies the scale of the blow.
- source_word: מֵעֲרוֹעֵר
  chosen: from Aroer
  lexicon: HALOT
  rationale: Toponym; transliterated per philosophy to transliterate names rather
    than translate them.
- source_word: וְעַד בּוֹאֲךָ מִנִּית
  chosen: as far as the approach to Minnith
  alternatives:
  - as far as Minnith
  - up to the entrance of Minnith
  lexicon: HALOT
  rationale: בּוֹא can denote 'entrance/approach' or the act of coming. The suffix
    in the form is difficult in English if rendered woodenly ('your coming'), and
    in a geographic notice it most naturally refers to the approach/entrance to the
    place. 'Approach to Minnith' preserves the locative sense while remaining readable.
- source_word: עֶשְׂרִים עִיר
  chosen: twenty cities
  alternatives:
  - twenty towns
  lexicon: HALOT
  rationale: Straightforward numeral + noun. 'Cities' is the standard rendering for
    עִיר in conquest/travel notices.
- source_word: וְעַד אָבֵל כְּרָמִים
  chosen: and as far as Abel-keramim
  alternatives:
  - and as far as Abel Keramim
  - and as far as Meadow of Vineyards
  lexicon: HALOT
  rationale: Place name; transliterated rather than translated. Although the components
    may suggest a meaning, the phrase functions here as a toponym.
- source_word: מַכָּה גְּדוֹלָה מְאֹד
  chosen: with a very great slaughter
  alternatives:
  - with a very great blow
  - with a very great defeat
  lexicon: HALOT
  rationale: מַכָּה is literally 'blow/strike,' but in military context often denotes
    a devastating defeat or slaughter. 'Slaughter' best conveys the severity intensified
    by גְּדוֹלָה מְאֹד, while still fitting the battle context.
- source_word: וַיִּכָּנְעוּ
  chosen: were subdued
  alternatives:
  - were humbled
  - were brought into subjection
  lexicon: HALOT
  rationale: כנע in the Niphal commonly means 'be subdued/humbled.' 'Were subdued'
    fits the military-political outcome in context better than the more inward 'were
    humbled.'
- source_word: בְּנֵי עַמּוֹן
  chosen: the sons of Ammon
  alternatives:
  - the Ammonites
  lexicon: HALOT
  rationale: A more formal rendering preserves the Hebrew kinship expression. 'Ammonites'
    is idiomatic English, but 'sons of Ammon' maintains source-text texture and parallels
    the following 'sons of Israel.'
- source_word: מִפְּנֵי בְּנֵי יִשְׂרָאֵל
  chosen: before the sons of Israel
  alternatives:
  - before the Israelites
  - before the sons of Israel's presence
  lexicon: HALOT
  rationale: מִפְּנֵי literally means 'from before/before the face of,' often expressing
    subjugation before an opponent. 'Before the sons of Israel' is concise and preserves
    the relational force.
