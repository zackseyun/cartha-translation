id: JDG.11.38
reference: Judges 11:38
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר לֵ֔כִי וַ/יִּשְׁלַ֥ח אוֹתָ֖/הּ שְׁנֵ֣י חֳדָשִׁ֑ים וַ/תֵּ֤לֶךְ
    הִיא֙ וְ/רֵ֣עוֹתֶ֔י/הָ וַ/תֵּ֥בְךְּ עַל בְּתוּלֶ֖י/הָ עַל הֶ/הָרִֽים־־׃
translation:
  text: And he said, “Go.” So he sent her away for two months, and she went, she and
    her companions, and wept over her virginity on the mountains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “for her virginity” / “because of her virginity.” The Hebrew states explicitly
      that the object of her lament was her virginity, a detail central to interpretations
      of the wider passage.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵכִי
  chosen: Go
  alternatives:
  - Go on
  - Depart
  lexicon: HALOT
  rationale: Imperative 2fs of הלך. A brief direct command is best represented by
    the simple English imperative “Go.”
- source_word: וַיִּשְׁלַח אוֹתָהּ
  chosen: he sent her away
  alternatives:
  - he let her go
  - he sent her
  lexicon: HALOT
  rationale: שׁלח with direct object here indicates dismissal/permission to depart.
    “Sent her away” captures the action more naturally than the overly bare “sent
    her,” without implying rejection.
- source_word: שְׁנֵי חֳדָשִׁים
  chosen: for two months
  alternatives:
  - two months
  lexicon: HALOT
  rationale: The phrase marks the duration of the leave granted. English idiom prefers
    “for two months” in this context.
- source_word: וַתֵּלֶךְ הִיא וְרֵעוֹתֶיהָ
  chosen: she went, she and her companions
  alternatives:
  - she went with her companions
  - she went, along with her friends
  lexicon: HALOT
  rationale: The Hebrew explicitly places the pronoun הִיא before “and her companions,”
    giving slight emphasis. “She went, she and her companions” preserves the structure
    while remaining readable.
- source_word: רֵעוֹתֶיהָ
  chosen: her companions
  alternatives:
  - her friends
  - her female companions
  lexicon: HALOT
  rationale: The noun refers to her associates/companions. “Companions” is slightly
    broader and more formal than “friends,” fitting the narrative tone without over-specifying
    gender already clear from context.
- source_word: וַתֵּבְךְּ
  chosen: wept
  alternatives:
  - lamented
  - cried
  lexicon: HALOT
  rationale: בכה denotes weeping/crying. “Wept” fits the solemn tone and pairs naturally
    with the following prepositional phrase.
- source_word: עַל בְּתוּלֶיהָ
  chosen: over her virginity
  alternatives:
  - for her virginity
  - because of her virginity
  lexicon: HALOT
  rationale: The phrase most directly expresses lament concerning her virginity, not
    merely virginity as an abstract state but her unmarried childlessness. “Over her
    virginity” is the most literal and idiomatic rendering, preserving the text’s
    emphasis without importing a fuller interpretation into the main text.
- source_word: עַל הֶהָרִים
  chosen: on the mountains
  alternatives:
  - in the mountains
  - upon the hills
  lexicon: HALOT
  rationale: הרים is the common plural “mountains/hills.” “On the mountains” follows
    the Hebrew preposition closely and suits the scene of going up into the highlands.
