theological_decisions:
- issue: Meaning of Jephthah's daughter's lament over her virginity
  chosen_reading: The main text preserves the Hebrew focus on her virginity without
    resolving the broader interpretive debate about whether the narrative implies
    literal sacrifice, perpetual virginity, or both.
  alternative_readings:
  - She mourned impending death as a human sacrifice
  - She mourned a life of perpetual virginity and childlessness
  rationale: The verse itself explicitly states that she wept over her virginity.
    To translate beyond that would import an interpretation from the wider passage
    into this verse. Preserving the lexical wording maintains theological and interpretive
    tension as required by the translation philosophy.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
