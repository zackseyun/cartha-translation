id: JDG.11.12
reference: Judges 11:12
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֤ח יִפְתָּח֙ מַלְאָכִ֔ים אֶל מֶ֥לֶךְ בְּנֵֽי עַמּ֖וֹן לֵ/אמֹ֑ר
    מַה לִּ֣/י וָ/לָ֔/ךְ כִּֽי בָ֥אתָ אֵלַ֖/י לְ/הִלָּחֵ֥ם בְּ/אַרְצִֽ/י־־־־׃
translation:
  text: Then Jephthah sent messengers to the king of the Ammonites, saying, “What
    is there between me and you, that you have come against me to fight in my land?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “What do I have to do with you?” The Hebrew idiom expresses hostility
      or dispute between parties.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: Then ... sent
  alternatives:
  - And ... sent
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence better than a bare 'and.'
- source_word: יִפְתָּח
  chosen: Jephthah
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - angels
  - envoys
  lexicon: HALOT
  rationale: In this diplomatic context, the word refers to human representatives,
    not heavenly beings. 'Messengers' is the clearest general rendering; 'envoys'
    is possible but slightly more specialized.
- source_word: אֶל מֶלֶךְ בְּנֵי עַמּוֹן
  chosen: to the king of the Ammonites
  alternatives:
  - to the king of the sons of Ammon
  - to the king of the Ammonite people
  lexicon: HALOT
  rationale: '''Bene Ammon'' is the standard ethnic designation. ''The Ammonites''
    is idiomatic English and preserves the referent without wooden literalism.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard idiomatic rendering introducing direct speech.
- source_word: מַה לִּי וָלָךְ
  chosen: What is there between me and you
  alternatives:
  - What do I have to do with you
  - What is between me and you
  lexicon: HALOT
  rationale: This idiom expresses dispute or estrangement between parties. The chosen
    rendering stays relatively close to the Hebrew while remaining intelligible. A
    more idiomatic English alternative is preserved in a footnote because the phrase
    can sound unusual in English.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Here it introduces the content/explanation of the complaint: ''that
    you have come...'' rather than a strongly causal ''because'' in English.'
- source_word: בָאתָ אֵלַי
  chosen: you have come against me
  alternatives:
  - you have come to me
  - you came against me
  lexicon: HALOT
  rationale: Although literally 'come to me,' the hostile context and following infinitive
    'to fight' show adversative force. 'Against me' makes the sense explicit in natural
    English.
- source_word: לְהִלָּחֵם
  chosen: to fight
  alternatives:
  - to wage war
  - to battle
  lexicon: HALOT
  rationale: The Niphal infinitive of לחם denotes engaging in battle. 'To fight' is
    clear and direct; 'to wage war' is possible but slightly more expansive.
- source_word: בְּאַרְצִי
  chosen: in my land
  alternatives:
  - against my land
  - in my territory
  lexicon: HALOT
  rationale: The preposition is literally 'in.' Given the motion and conflict context,
    'in my land' is both faithful and natural. 'Territory' is possible but less concrete.
