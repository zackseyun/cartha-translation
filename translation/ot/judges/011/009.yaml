theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Clause force of אָנֹכִי אֶהְיֶה לָכֶם לְרֹאשׁ
  chosen_reading: 'rendered as a question: ''will I become your head?'''
  alternative_readings:
  - 'rendered as a statement: ''I will be your head'''
  rationale: The Hebrew lacks an explicit interrogative particle in the final clause, but the larger exchange shows Jephthah negotiating terms and seeking confirmation. English idiom strongly favors making the implied question explicit here rather than leaving a potentially misleading flat assertion.
