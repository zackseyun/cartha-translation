id: JDG.11.9
reference: Judges 11:9
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יִפְתָּ֜ח אֶל זִקְנֵ֣י גִלְעָ֗ד אִם מְשִׁיבִ֨ים אַתֶּ֤ם אוֹתִ/י֙ לְ/הִלָּחֵם֙ בִּ/בְנֵ֣י עַמּ֔וֹן וְ/נָתַ֧ן יְהוָ֛ה אוֹתָ֖/ם לְ/פָנָ֑/י אָנֹכִ֕י אֶהְיֶ֥ה לָ/כֶ֖ם לְ/רֹֽאשׁ־־׃
translation:
  text: Jephthah said to the elders of Gilead, “If you bring me back to fight against the Ammonites, and Yahweh gives them before me, I will be your head.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “leader” or “chief” for “head.”
    reason: lexical_alternative
  - marker: b
    text: 'The final clause can also be rendered as a statement: “I will be your head.”'
    reason: alternative_reading
lexical_decisions:
- source_word: מְשִׁיבִים
  chosen: bring me back
  alternatives:
  - return me
  - restore me
  lexicon: HALOT
  rationale: The Hiphil of שוב means to cause to return. In context Jephthah has been driven away and is being asked to come back, so 'bring me back' is idiomatic and preserves the causative sense better than a bare 'return me.'
- source_word: לְהִלָּחֵם
  chosen: to fight
  alternatives:
  - to wage war
  - to battle
  lexicon: HALOT
  rationale: The Niphal infinitive of לחם here denotes engaging in battle. 'To fight' is natural modern English and fits the military context without over-expansion.
- source_word: בִּבְנֵי עַמּוֹן
  chosen: against the Ammonites
  alternatives:
  - against the sons of Ammon
  - against the people of Ammon
  lexicon: HALOT
  rationale: Though literally 'against the sons of Ammon,' standard English ethnonym 'the Ammonites' best conveys the referent. 'Against' reflects the adversarial force of ב in this combat context.
- source_word: וְנָתַן יְהוָה אוֹתָם לְפָנַי
  chosen: and the LORD gives them before me
  alternatives:
  - and the LORD gives them into my hand
  - and the LORD delivers them before me
  lexicon: HALOT
  rationale: נתן + לפני literally means 'give before.' 'Gives them before me' stays close to the Hebrew while remaining intelligible. 'Into my hand' would be interpretive because יד is not present in the text. The divine name follows project policy as 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְרֹאשׁ
  chosen: head
  alternatives:
  - chief
  - leader
  lexicon: HALOT
  rationale: ראש literally means 'head' and often metaphorically 'chief' or 'leader.' 'Head' preserves the metaphor and matches the likely political sense in context. Because English readers may hear 'leader' more readily, that alternative is worth preserving in a footnote.
- source_word: אָנֹכִי אֶהְיֶה לָכֶם לְרֹאשׁ
  chosen: will I become your head?
  alternatives:
  - I will be your head
  - shall I be your chief?
  lexicon: HALOT
  rationale: Although formally this is a declarative clause, in context it functions as Jephthah's condition-testing question, as reflected by the surrounding dialogue and many translations. Rendering it as a question best captures discourse force in English. 'Become' reflects the contingent future status implied by the condition.
