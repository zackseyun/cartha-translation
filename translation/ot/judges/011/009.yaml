theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God as the one who grants victory.
    Following the project's stated policy for the Tetragrammaton preserves consistency
    and aligns with Jewish reverence tradition and longstanding English Bible practice.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Clause force of אָנֹכִי אֶהְיֶה לָכֶם לְרֹאשׁ
  chosen_reading: 'rendered as a question: ''will I become your head?'''
  alternative_readings:
  - 'rendered as a statement: ''I will be your head'''
  rationale: The Hebrew lacks an explicit interrogative particle in the final clause,
    but the larger exchange shows Jephthah negotiating terms and seeking confirmation.
    English idiom strongly favors making the implied question explicit here rather
    than leaving a potentially misleading flat assertion.
