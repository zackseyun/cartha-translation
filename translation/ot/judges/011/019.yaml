id: JDG.11.19
reference: Judges 11:19
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֤ח יִשְׂרָאֵל֙ מַלְאָכִ֔ים אֶל סִיח֥וֹן מֶֽלֶךְ הָ/אֱמֹרִ֖י מֶ֣לֶךְ
    חֶשְׁבּ֑וֹן וַ/יֹּ֤אמֶר ל/וֹ֙ יִשְׂרָאֵ֔ל נַעְבְּרָה נָּ֥א בְ/אַרְצְ/ךָ֖ עַד מְקוֹמִֽ/י־־־־׃
translation:
  text: Then Israel sent messengers to Sihon king of the Amorites, king of Heshbon,
    and Israel said to him, “Please let us pass through your land to my place.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to my own place,” with Israel speaking as a collective singular. Compare
      the parallel request in Numbers 21:22, which reads “to my place” in the Hebrew
      tradition here reflected.
    reason: cross_reference
  - marker: b
    text: “Messengers” could also be rendered “envoys” in this diplomatic setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Standard wayyiqtol of שׁלח in narrative; 'sent' is the natural English
    narrative equivalent.
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - envoys
  - angels
  lexicon: HALOT
  rationale: In this diplomatic context the word refers to human representatives,
    not heavenly beings; 'messengers' is clear and sufficiently formal.
- source_word: סִיחוֹן
  chosen: Sihon
  rationale: Personal name transliterated per translation philosophy.
- source_word: מֶלֶךְ הָאֱמֹרִי
  chosen: king of the Amorites
  alternatives:
  - Amorite king
  lexicon: HALOT
  rationale: Construct phrase rendered transparently; preserves the ethnic designation.
- source_word: מֶלֶךְ חֶשְׁבּוֹן
  chosen: king of Heshbon
  lexicon: HALOT
  rationale: Second appositional title retained to match the Hebrew and identify Sihon's
    realm.
- source_word: וַיֹּאמֶר לוֹ יִשְׂרָאֵל
  chosen: and Israel said to him
  alternatives:
  - and said to him
  - and Israel told him
  lexicon: HALOT
  rationale: Hebrew repeats 'Israel' explicitly after the verb; the translation preserves
    that repetition rather than smoothing it away.
- source_word: נַעְבְּרָה נָּא
  chosen: Please let us pass
  alternatives:
  - Let us pass, please
  - Please allow us to pass
  lexicon: HALOT
  rationale: Cohortative with particle נָא expresses a polite request. English idiom
    is best captured with 'Please let us pass.'
- source_word: בְאַרְצְךָ
  chosen: through your land
  alternatives:
  - in your land
  - across your land
  lexicon: HALOT
  rationale: With עבר, the sense is movement through territory; 'through your land'
    expresses the travel request more naturally than a more literal 'in your land.'
- source_word: עַד מְקוֹמִי
  chosen: to my place
  alternatives:
  - to my land
  - to my territory
  - to my own place
  lexicon: HALOT
  rationale: The Hebrew reads singular 'my place,' likely personified speech of Israel
    as a collective. The translation keeps the singular rather than harmonizing to
    the parallel wording in Numbers 21:22 ('to my place'/'my own place' rather than
    'our place').
