id: JDG.11.13
reference: Judges 11:13
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ מֶ֨לֶךְ בְּנֵי עַמּ֜וֹן אֶל מַלְאֲכֵ֣י יִפְתָּ֗ח כִּֽי לָקַ֨ח
    יִשְׂרָאֵ֤ל אֶת אַרְצִ/י֙ בַּ/עֲלוֹת֣/וֹ מִ/מִּצְרַ֔יִם מֵ/אַרְנ֥וֹן וְ/עַד הַ/יַּבֹּ֖ק
    וְ/עַד הַ/יַּרְדֵּ֑ן וְ/עַתָּ֕ה הָשִׁ֥יבָ/ה אֶתְ/הֶ֖ן בְּ/שָׁלֽוֹם־־־־־־׃
translation:
  text: And the king of the Ammonites said to Jephthah’s messengers, “Because Israel
    took my land when it came up from Egypt, from the Arnon as far as the Jabbok and
    as far as the Jordan, now restore them peacefully.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “restore them in peace.” The Hebrew phrase can be rendered more literally
      this way.
    reason: lexical_alternative
  - marker: b
    text: The pronoun “them” is feminine plural in Hebrew, referring to the territories/lands
      claimed by the king of the Ammonites.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' preserves
    the Hebrew narrative flow without overinterpreting sequence.
- source_word: מֶלֶךְ בְּנֵי עַמּוֹן
  chosen: the king of the Ammonites
  alternatives:
  - the king of the sons of Ammon
  - the king of the Ammonite people
  lexicon: HALOT
  rationale: This is the natural English rendering of the construct chain, preserving
    the ethnic-political designation.
- source_word: מַלְאֲכֵי יִפְתָּח
  chosen: Jephthah’s messengers
  alternatives:
  - Jephthah’s envoys
  - the messengers of Jephthah
  lexicon: HALOT
  rationale: מַלְאָךְ in this context refers to human diplomatic representatives,
    not angels. 'Messengers' is straightforward and contextually clear.
- source_word: כִּי
  chosen: Because
  alternatives:
  - For
  - That
  lexicon: HALOT
  rationale: Here כִּי introduces the stated reason for the Ammonite king's demand.
    'Because' makes the causal force explicit in natural English.
- source_word: לָקַח
  chosen: took
  alternatives:
  - seized
  - captured
  lexicon: HALOT
  rationale: The basic sense is 'take.' 'Took' is sufficiently direct and avoids adding
    a stronger nuance not required by the verb alone.
- source_word: אַרְצִי
  chosen: my land
  alternatives:
  - my territory
  - my country
  lexicon: HALOT
  rationale: אֶרֶץ here denotes territorial land. 'My land' best matches the king's
    claim in concise English.
- source_word: בַּעֲלוֹתוֹ מִמִּצְרַיִם
  chosen: when it came up from Egypt
  alternatives:
  - when he came up from Egypt
  - at its coming up from Egypt
  lexicon: HALOT
  rationale: The suffix on the infinitive is 3ms, and the nearest logical referent
    is collective 'Israel,' which is often construed as singular in Hebrew. English
    can render this naturally as 'it' for the nation as a collective entity.
- source_word: מֵאַרְנוֹן וְעַד הַיַּבֹּק וְעַד הַיַּרְדֵּן
  chosen: from the Arnon as far as the Jabbok and as far as the Jordan
  alternatives:
  - from the Arnon to the Jabbok and to the Jordan
  lexicon: HALOT
  rationale: The repeated עַד marks extent. 'As far as' preserves the boundary sense
    a bit more clearly than a simple repeated 'to'.
- source_word: וְעַתָּה
  chosen: now
  alternatives:
  - so now
  - therefore now
  lexicon: HALOT
  rationale: This adverb marks the transition from accusation to demand. 'Now' is
    sufficient and idiomatic.
- source_word: הָשִׁיבָה
  chosen: restore
  alternatives:
  - give back
  - return
  lexicon: HALOT
  rationale: The Hiphil imperative of שוב means to cause to return. 'Restore' fits
    the diplomatic tone of the demand.
- source_word: אֶתְהֶן
  chosen: them
  alternatives:
  - it
  - these lands
  lexicon: HALOT
  rationale: The feminine plural pronoun likely refers to the lands/territories just
    described, even though 'land' earlier appears singular. 'Them' preserves the plural
    object without overexplicating in the main text.
- source_word: בְּשָׁלוֹם
  chosen: peacefully
  alternatives:
  - in peace
  - amicably
  lexicon: HALOT
  rationale: The phrase denotes a peaceful, non-hostile manner of restoration. 'Peacefully'
    is natural modern English; the more literal 'in peace' is preserved as an alternative.
