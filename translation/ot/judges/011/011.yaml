id: JDG.11.11
reference: Judges 11:11
source:
  edition: WLC
  text: וַ/יֵּ֤לֶךְ יִפְתָּח֙ עִם זִקְנֵ֣י גִלְעָ֔ד וַ/יָּשִׂ֨ימוּ הָ/עָ֥ם אוֹת֛/וֹ
    עֲלֵי/הֶ֖ם לְ/רֹ֣אשׁ וּ/לְ/קָצִ֑ין וַ/יְדַבֵּ֨ר יִפְתָּ֧ח אֶת כָּל דְּבָרָ֛י/ו
    לִ/פְנֵ֥י יְהוָ֖ה בַּ/מִּצְפָּֽה־־־׃פ
translation:
  text: So Jephthah went with the elders of Gilead, and the people made him head and
    commander over them. And Jephthah spoke all his words before the LORD at Mizpah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the people appointed him head and ruler over them.' The Hebrew term
      rendered 'commander' can also mean 'ruler' or 'captain.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Jephthah repeated all his terms before the LORD at Mizpah.' The Hebrew
      literally says 'spoke all his words.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - set out
  - went along
  lexicon: HALOT
  rationale: Standard wayyiqtol of הלך narrating the next event; 'went' is the plain,
    natural English rendering.
- source_word: עִם
  chosen: with
  alternatives:
  - along with
  lexicon: HALOT
  rationale: Marks accompaniment between Jephthah and the elders of Gilead.
- source_word: זִקְנֵי גִלְעָד
  chosen: the elders of Gilead
  lexicon: HALOT
  rationale: Conventional and accurate rendering of the civic leaders of the region.
- source_word: וַיָּשִׂימוּ הָעָם אֹתוֹ עֲלֵיהֶם
  chosen: the people made him ... over them
  alternatives:
  - the people appointed him ... over them
  - the people set him over them
  lexicon: HALOT
  rationale: שׂים with object plus עַל commonly means appointing or setting someone
    over others. 'Made him ... over them' is idiomatic and preserves the installation
    sense.
- source_word: הָעָם
  chosen: the people
  lexicon: HALOT
  rationale: Refers to the assembled people of Gilead, distinct from the elders just
    mentioned.
- source_word: לְרֹאשׁ
  chosen: head
  alternatives:
  - chief
  - leader
  lexicon: HALOT
  rationale: רֹאשׁ literally 'head' often functions metaphorically for chief leader.
    'Head' preserves the Hebrew metaphor while remaining understandable in English.
- source_word: וּלְקָצִין
  chosen: and commander
  alternatives:
  - and ruler
  - and captain
  lexicon: HALOT
  rationale: קָצִין denotes an official leader, ruler, or military commander. In this
    context of impending conflict with Ammon, 'commander' best captures the likely
    military-administrative role without excluding leadership.
- source_word: וַיְדַבֵּר ... אֶת כָּל דְּבָרָיו
  chosen: spoke all his words
  alternatives:
  - recounted all his words
  - spoke all these words
  lexicon: HALOT
  rationale: The Hebrew is literally 'spoke all his words.' This likely refers to
    Jephthah's previously stated terms and matters, but the translation keeps the
    source wording rather than over-interpreting it as a formal recitation.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Standard covenantal expression. Per doctrine, יְהוָה is rendered 'the
    LORD.' 'Before the LORD' preserves the solemn, possibly cultic/judicial setting.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: בַּמִּצְפָּה
  chosen: at Mizpah
  alternatives:
  - in Mizpah
  lexicon: HALOT
  rationale: Place-name transliterated. 'At Mizpah' is the more natural English preposition
    for the setting of a public or sacred assembly.
