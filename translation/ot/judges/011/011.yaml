theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render the Tetragrammaton as 'the LORD,' following
    Jewish reverence tradition and longstanding English convention while signaling
    the covenant name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of Jephthah's speech before the LORD
  chosen_reading: And Jephthah spoke all his words before the LORD at Mizpah.
  alternative_readings:
  - And Jephthah repeated all his terms before the LORD at Mizpah.
  - And Jephthah laid out all his matters before the LORD at Mizpah.
  rationale: The phrase can suggest solemn reaffirmation, vow-like speech, or presentation
    of the agreement in a sacred setting. The translation preserves the broader wording
    'spoke all his words' rather than narrowing it to a legal ratification or prayer
    alone.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
