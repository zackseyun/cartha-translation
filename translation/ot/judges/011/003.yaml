id: JDG.11.3
reference: Judges 11:3
source:
  edition: WLC
  text: וַ/יִּבְרַ֤ח יִפְתָּח֙ מִ/פְּנֵ֣י אֶחָ֔י/ו וַ/יֵּ֖שֶׁב בְּ/אֶ֣רֶץ ט֑וֹב וַ/יִּֽתְלַקְּט֤וּ
    אֶל יִפְתָּח֙ אֲנָשִׁ֣ים רֵיקִ֔ים וַ/יֵּצְא֖וּ עִמּֽ/וֹ־׃פ
translation:
  text: So Jephthah fled from his brothers and lived in the land of Tob, and worthless
    men gathered to Jephthah and went out with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'empty men'; the Hebrew idiom refers to men of low character or standing,
      not merely men lacking possessions.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבְרַח
  chosen: fled
  alternatives:
  - ran away
  - escaped
  lexicon: HALOT
  rationale: The verb ברח denotes fleeing or running away from danger or hostility.
    'Fled' is concise and idiomatic in narrative English, preserving the sense of
    forced departure.
- source_word: מִפְּנֵי אֶחָיו
  chosen: from his brothers
  alternatives:
  - from before his brothers
  - from the presence of his brothers
  lexicon: HALOT
  rationale: The idiom מִפְּנֵי literally means 'from before/from the presence of,'
    but in context it marks separation caused by hostile pressure from his brothers.
    'From his brothers' communicates the sense naturally in English without losing
    meaning.
- source_word: וַיֵּשֶׁב
  chosen: lived
  alternatives:
  - dwelt
  - settled
  lexicon: HALOT
  rationale: ישב can mean sit, dwell, remain, or live. In this narrative setting,
    'lived' is natural modern English and captures residence without implying permanent
    settlement as strongly as 'settled' might.
- source_word: בְּאֶרֶץ טוֹב
  chosen: in the land of Tob
  alternatives:
  - in the territory of Tob
  lexicon: HALOT
  rationale: אֶרֶץ commonly means land/territory. 'Land of Tob' is the conventional
    and clear rendering, while 'Tob' is transliterated as a place name in keeping
    with the philosophy of transliterating names.
- source_word: וַיִּתְלַקְּטוּ
  chosen: gathered
  alternatives:
  - banded together
  - collected themselves
  lexicon: HALOT
  rationale: The hitpael form conveys people assembling themselves. 'Gathered' is
    straightforward and preserves the narrative sense without overinterpreting the
    social structure.
- source_word: אֶל יִפְתָּח
  chosen: to Jephthah
  alternatives:
  - around Jephthah
  - to join Jephthah
  lexicon: HALOT
  rationale: The preposition אֶל is most basically 'to/toward.' Here it indicates
    movement into association with Jephthah. 'To Jephthah' is formally closer; the
    resulting sense is clarified by the following clause.
- source_word: אֲנָשִׁים רֵיקִים
  chosen: worthless men
  alternatives:
  - empty men
  - vain men
  - idle men
  lexicon: HALOT
  rationale: רֵיקִים literally means 'empty,' but in this idiom it refers to socially
    disreputable, undisciplined, or morally dubious men. 'Worthless men' best matches
    the idiomatic force in English and aligns with similar usage in contexts like
    Judg 9:4, while avoiding an overly specific criminal label not explicit in the
    Hebrew.
- source_word: וַיֵּצְאוּ עִמּוֹ
  chosen: went out with him
  alternatives:
  - went about with him
  - raided with him
  lexicon: HALOT
  rationale: יצא means 'go out.' In context it likely implies accompanying Jephthah
    on expeditions, but the object or purpose is unstated. 'Went out with him' preserves
    the Hebrew's openness and avoids importing 'raided' from context alone.
