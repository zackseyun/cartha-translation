id: JDG.11.27
reference: Judges 11:27
source:
  edition: WLC
  text: וְ/אָֽנֹכִי֙ לֹֽא חָטָ֣אתִי לָ֔/ךְ וְ/אַתָּ֞ה עֹשֶׂ֥ה אִתִּ֛/י רָעָ֖ה לְ/הִלָּ֣חֶם בִּ֑/י יִשְׁפֹּ֨ט יְהוָ֤ה הַ/שֹּׁפֵט֙ הַ/יּ֔וֹם בֵּ֚ין בְּנֵ֣י יִשְׂרָאֵ֔ל וּ/בֵ֖ין בְּנֵ֥י עַמּֽוֹן־׃
translation:
  text: I have not sinned against you, but you are doing me wrong by making war against me. May Yahweh, the Judge, judge today between the sons of Israel and the sons of Ammon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'between the Israelites and the Ammonites.' The Hebrew reads literally, 'between the sons of Israel and the sons of Ammon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָטָאתִי
  chosen: have not sinned
  alternatives:
  - have not wronged
  - did not offend
  lexicon: HALOT
  rationale: The verb חטא commonly means 'to sin' or 'to do wrong.' In this diplomatic-legal context it could be smoothed to 'wronged,' but 'sinned' preserves the moral-judicial force of the Hebrew while remaining natural in English.
- source_word: לָךְ
  chosen: against you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: The preposition ל with חטא is idiomatically rendered 'sin against' in English. Although the morphology table marks a 2fs suffix, the discourse context addresses the king of the Ammonites; English 'you' avoids importing a gender issue not intended by the text.
- source_word: עֹשֶׂה אִתִּי רָעָה
  chosen: are doing me wrong
  alternatives:
  - are doing evil to me
  - are treating me badly
  lexicon: HALOT
  rationale: The phrase literally means 'are doing evil/bad to/with me.' 'Doing me wrong' best captures the legal grievance and reciprocal contrast with 'I have not sinned against you' without sounding wooden.
- source_word: לְהִלָּחֶם בִּי
  chosen: by making war against me
  alternatives:
  - to fight against me
  - by warring against me
  lexicon: HALOT
  rationale: The infinitive gives the manner or result of the wrongdoing. 'Making war against me' reflects the interstate conflict context more precisely than the more general 'fight against me.'
- source_word: יִשְׁפֹּט ... הַשֹּׁפֵט
  chosen: May ... judge ... the Judge
  alternatives:
  - let ... judge ... the judge
  - will judge ... the judge
  lexicon: HALOT
  rationale: The repetition of the שפט root is rhetorically significant and should be preserved. Rendering the first as a jussive-like 'May ... judge' fits the appeal formula, while retaining 'the Judge' for the participial title.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: '''Today'' is the natural modern English equivalent and preserves the immediacy of the appeal.'
- source_word: בֵּין בְּנֵי יִשְׂרָאֵל וּבֵין בְּנֵי עַמּוֹן
  chosen: between the sons of Israel and the sons of Ammon
  alternatives:
  - between the people of Israel and the people of Ammon
  - between the Israelites and the Ammonites
  lexicon: HALOT
  rationale: The Hebrew literally says 'sons of.' In keeping with the gender-accurate policy and the formal flavor of the legal declaration, 'sons of Israel' and 'sons of Ammon' are retained in the main text rather than replacing them with ethnic adjectives.
