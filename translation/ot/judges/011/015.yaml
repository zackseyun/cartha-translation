id: JDG.11.15
reference: Judges 11:15
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר ל֔/וֹ כֹּ֖ה אָמַ֣ר יִפְתָּ֑ח לֹֽא לָקַ֤ח יִשְׂרָאֵל֙ אֶת אֶ֣רֶץ
    מוֹאָ֔ב וְ/אֶת אֶ֖רֶץ בְּנֵ֥י עַמּֽוֹן־־־׃
translation:
  text: 'And he said to him, “Thus says Jephthah: Israel did not take the land of
    Moab or the land of the sons of Ammon.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “the land of the Ammonites.” Hebrew: “the land of the sons of Ammon.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר לּוֹ
  chosen: And he said to him
  alternatives:
  - And he told him
  lexicon: HALOT
  rationale: The waw-consecutive plus אמר introduces the next speech event in straightforward
    narrative sequence. 'Said to him' is the most natural and sufficiently formal
    rendering.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus said
  lexicon: HALOT
  rationale: This messenger formula is idiomatic in Hebrew. 'Thus says' preserves
    the formal declarative tone and reflects the present-like force of the quoted
    formula in English.
- source_word: יִפְתָּח
  chosen: Jephthah
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: לֹא לָקַח
  chosen: did not take
  alternatives:
  - did not seize
  - did not capture
  lexicon: HALOT
  rationale: לקח commonly means 'take.' In this diplomatic-historical context, 'did
    not take' is broad and accurate, avoiding an unnecessarily violent nuance unless
    context demands it.
- source_word: אֶרֶץ
  chosen: land
  alternatives:
  - territory
  - country
  lexicon: HALOT
  rationale: '''Land'' is the standard rendering and fits both geographic and political
    sense here. It also preserves the repeated structure of the Hebrew.'
- source_word: מוֹאָב
  chosen: Moab
  rationale: Standard transliteration of the place/people name.
- source_word: בְּנֵי עַמּוֹן
  chosen: the sons of Ammon
  alternatives:
  - the Ammonites
  - the people of Ammon
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Ammon.' Because the project prefers
    gender-accurate renderings and the phrase is a standard ethnonym, the more literal
    form is retained in the main text. A more idiomatic ethnic rendering is worth
    preserving in a footnote.
