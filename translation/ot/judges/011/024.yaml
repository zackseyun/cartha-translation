id: JDG.11.24
reference: Judges 11:24
source:
  edition: WLC
  text: הֲ/לֹ֞א אֵ֣ת אֲשֶׁ֧ר יוֹרִֽישְׁ/ךָ֛ כְּמ֥וֹשׁ אֱלֹהֶ֖י/ךָ אוֹת֥/וֹ תִירָ֑שׁ
    וְ/אֵת֩ כָּל אֲשֶׁ֨ר הוֹרִ֜ישׁ יְהוָ֧ה אֱלֹהֵ֛י/נוּ מִ/פָּנֵ֖י/נוּ אוֹת֥/וֹ נִירָֽשׁ־׃
translation:
  text: Will you not possess what Chemosh your god gives you to possess? And everything
    that the LORD our God has dispossessed before us, that we will possess.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'inherit' / 'take possession of' for the repeated Hebrew verb ירשׁ; the
      term refers to possessing territory, often by dispossessing prior occupants.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'what Chemosh your god causes you to possess'; the verb can carry
      the sense of gaining possession by dispossessing others.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Will you not
  alternatives:
  - Do you not
  - Surely you will
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Will you not'
    fits the argument addressed directly to the Ammonite king and works naturally
    with the following imperfect verb.
- source_word: יוֹרִישְׁךָ
  chosen: gives you to possess
  alternatives:
  - causes you to inherit
  - dispossesses for you
  lexicon: HALOT
  rationale: Hiphil of ירשׁ can mean to cause someone to possess by dispossessing
    others. In English, 'gives you to possess' communicates the resulting possession
    clearly without overloading the clause. The dispossessing nuance is preserved
    explicitly in the second half of the verse where it is more foregrounded.
- source_word: כְּמוֹשׁ אֱלֹהֶיךָ
  chosen: Chemosh your god
  alternatives:
  - Chemosh, your god
  lexicon: HALOT
  rationale: Personal divine name is transliterated per project philosophy; appositional
    relation is rendered directly.
- source_word: תִירָשׁ
  chosen: possess
  alternatives:
  - inherit
  - take possession of
  lexicon: HALOT
  rationale: ירשׁ here refers to holding territory. 'Possess' is more idiomatic in
    this diplomatic-military context than 'inherit,' which can sound overly familial
    in English.
- source_word: הוֹרִישׁ
  chosen: has dispossessed
  alternatives:
  - has driven out
  - has given to possess
  lexicon: HALOT
  rationale: Hiphil of ירשׁ in the second clause foregrounds YHWH's action against
    prior occupants. 'Has dispossessed' preserves the causative-conquest sense and
    sets up Israel's resulting possession.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Rendered 'the LORD' according to the project's stated default for the
    divine name.
- source_word: מִפָּנֵינוּ
  chosen: before us
  alternatives:
  - from before us
  - ahead of us
  lexicon: HALOT
  rationale: The idiom literally means 'from before us' and refers to peoples removed
    in Israel's presence/path. 'Before us' is natural English and preserves the spatial-confrontational
    sense.
- source_word: נִירָשׁ
  chosen: we will possess
  alternatives:
  - we will inherit
  - we will take possession of
  lexicon: HALOT
  rationale: Matches the territorial sense of ירשׁ and maintains verbal consistency
    with the earlier clause while keeping the English readable.
