theological_decisions:
- issue: Reference to Chemosh as 'your god' in Jephthah's speech
  chosen_reading: Translate straightforwardly as diplomatic/rhetorical speech without
    implying the narrator affirms Chemosh's real divinity or power.
  alternative_readings:
  - Render with scare quotes or qualifying language to distance the claim
  - Interpret as irony and paraphrase accordingly
  rationale: The Hebrew simply reports Jephthah's argument from the opponent's claimed
    deity and Israel's God. Adding qualifiers would import interpretation not present
    in the text. The translation preserves the rhetoric without endorsing pagan theology.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
