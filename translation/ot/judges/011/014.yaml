id: JDG.11.14
reference: Judges 11:14
source:
  edition: WLC
  text: וַ/יּ֥וֹסֶף ע֖וֹד יִפְתָּ֑ח וַ/יִּשְׁלַח֙ מַלְאָכִ֔ים אֶל מֶ֖לֶךְ בְּנֵ֥י
    עַמּֽוֹן־׃
translation:
  text: Then Jephthah again sent messengers to the king of the Ammonites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the king of the sons of Ammon,'' an idiom referring to the Ammonite
      people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹסֶף עוֹד
  chosen: Then ... again
  alternatives:
  - And ... again
  - Jephthah continued and again
  lexicon: HALOT
  rationale: The idiom יָסַף עוֹד + finite verb conveys repetition/continuation ('did
    again, continued to'). In English, 'again' captures the core sense naturally;
    'Then' represents the narrative waw sequence without over-literal repetition.
- source_word: יִפְתָּח
  chosen: Jephthah
  rationale: 'Personal name transliterated according to the translation philosophy:
    translate titles, transliterate names.'
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Standard rendering of שׁלח in this narrative context. 'Sent' is clear,
    idiomatic, and sufficiently formal.
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - envoys
  - angels
  lexicon: HALOT
  rationale: In diplomatic human context, מַלְאָכִים refers to human messengers/envoys,
    not angels. 'Messengers' is the broad, natural English equivalent; 'envoys' is
    possible but slightly more specialized.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Directional preposition rendered with standard modern English 'to'.
- source_word: מֶלֶךְ בְּנֵי עַמּוֹן
  chosen: the king of the Ammonites
  alternatives:
  - the king of the sons of Ammon
  - the king of the people of Ammon
  lexicon: HALOT
  rationale: בְּנֵי עַמּוֹן is the standard ethnogeographic expression for the Ammonite
    people. 'The Ammonites' is idiomatic English and preserves the referent better
    than a wooden 'sons of Ammon' in the main text.
