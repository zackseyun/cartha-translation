id: JDG.7.21
reference: Judges 7:21
source:
  edition: WLC
  text: וַ/יַּֽעַמְדוּ֙ אִ֣ישׁ תַּחְתָּ֔י/ו סָבִ֖יב לַֽ/מַּחֲנֶ֑ה וַ/יָּ֧רָץ כָּל
    הַֽ/מַּחֲנֶ֛ה וַ/יָּרִ֖יעוּ ו/יניסו־׃
translation:
  text: And each man stood in his place around the camp, and the whole camp ran, and
    they shouted and fled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they raised a war cry and fled.' The verb translated 'shouted' can refer
      to a loud cry in battle or panic.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַמְדוּ
  chosen: stood
  alternatives:
  - took their stand
  - remained standing
  lexicon: HALOT
  rationale: The verb from עמד denotes standing or taking one's position. 'Stood'
    is the most direct and natural rendering in context.
- source_word: אִישׁ תַּחְתָּיו
  chosen: each man stood in his place
  alternatives:
  - each man under himself
  - each man where he was
  lexicon: HALOT
  rationale: The idiom 'man under him/under himself' means each person in his own
    position or place. 'In his place' conveys the idiomatic sense in clear English
    while preserving the distributive force of אִישׁ.
- source_word: סָבִיב לַמַּחֲנֶה
  chosen: around the camp
  alternatives:
  - all around the camp
  - surrounding the camp
  lexicon: HALOT
  rationale: סָבִיב with ל marks position around the camp. 'Around the camp' is concise
    and accurate.
- source_word: וַיָּרָץ כָּל הַמַּחֲנֶה
  chosen: the whole camp ran
  alternatives:
  - all the camp ran
  - the whole camp rushed about
  lexicon: HALOT
  rationale: רץ ordinarily means 'run.' In this panic scene it likely implies chaotic
    movement, but 'ran' preserves the Hebrew image without over-interpreting.
- source_word: וַיָּרִיעוּ
  chosen: they shouted
  alternatives:
  - they raised a war cry
  - they cried out
  lexicon: HALOT
  rationale: The verb רוע/ריע can denote raising a shout, often in battle or alarm.
    'Shouted' is broad enough to preserve the ambiguity between panic and battle cry.
- source_word: ויניסו
  chosen: fled
  alternatives:
  - took flight
  - ran away
  lexicon: HALOT
  rationale: From נוס, the standard sense is 'flee.' 'Fled' is the clearest idiomatic
    English equivalent.
