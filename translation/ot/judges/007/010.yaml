id: JDG.7.10
reference: Judges 7:10
source:
  edition: WLC
  text: וְ/אִם יָרֵ֥א אַתָּ֖ה לָ/רֶ֑דֶת רֵ֥ד אַתָּ֛ה וּ/פֻרָ֥ה נַעַרְ/ךָ֖ אֶל הַֽ/מַּחֲנֶֽה־־׃
translation:
  text: But if you are afraid to go down, go down to the camp with Purah your young
    man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with Purah your servant' or 'with Purah your attendant.' The Hebrew
      na'ar can refer to a young man, servant, or attendant depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - Now if
  lexicon: HALOT
  rationale: The conjunction plus conditional particle introduces a conditional qualification
    to the previous command. 'But if' captures the mild contrast in context better
    than a bare 'if' or overly sequential 'and if.'
- source_word: יָרֵא
  chosen: are afraid
  alternatives:
  - fear
  - are fearful
  lexicon: HALOT
  rationale: The adjective/participle-like form with the pronoun expresses Gideon's
    state. 'Are afraid' is idiomatic modern English and preserves the sense of fear
    without sounding wooden.
- source_word: לָרֶדֶת
  chosen: to go down
  alternatives:
  - to descend
  lexicon: HALOT
  rationale: The infinitive of ירד is naturally rendered 'to go down' in narrative
    English. 'Descend' is more formal and less natural here.
- source_word: רֵד
  chosen: go down
  alternatives:
  - descend
  lexicon: HALOT
  rationale: The imperative repeats the same verb as the infinitive, so the English
    keeps the repetition for rhetorical force and clarity.
- source_word: וּפֻרָה
  chosen: with Purah
  alternatives:
  - and Purah
  lexicon: HALOT
  rationale: The prefixed conjunction here is best understood in English as accompaniment
    with the following noun phrase, since the command is for Gideon to go down accompanied
    by Purah. 'With Purah' communicates the sense more naturally than a literal 'and
    Purah.'
- source_word: נַעַרְךָ
  chosen: your young man
  alternatives:
  - your servant
  - your attendant
  lexicon: HALOT
  rationale: נַעַר can denote a youth, servant, or attendant depending on context.
    Here it refers to Purah as Gideon's personal subordinate. 'Your young man' preserves
    the lexical form and avoids importing the stronger institutional sense of 'servant,'
    while still sounding intelligible. The common contextual alternative 'your servant'
    is preserved in a footnote.
- source_word: אֶל הַמַּחֲנֶה
  chosen: to the camp
  alternatives:
  - into the camp
  lexicon: HALOT
  rationale: The preposition אֶל normally means 'to/toward.' 'To the camp' is the
    most direct rendering; 'into the camp' is possible contextually but slightly more
    interpretive.
