id: JDG.7.7
reference: Judges 7:7
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל גִּדְע֗וֹן בִּ/שְׁלֹשׁ֩ מֵא֨וֹת הָ/אִ֤ישׁ הַֽ/מֲלַקְקִים֙
    אוֹשִׁ֣יעַ אֶתְ/כֶ֔ם וְ/נָתַתִּ֥י אֶת מִדְיָ֖ן בְּ/יָדֶ֑/ךָ וְ/כָל הָ/עָ֔ם יֵלְכ֖וּ
    אִ֥ישׁ לִ/מְקֹמֽ/וֹ־־־׃
translation:
  text: And the LORD said to Gideon, “With the three hundred men who lapped, I will
    save you and give Midian into your hand. And let all the people go, each man to
    his place.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “By the three hundred men who lapped, I will deliver you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    the traditional small-caps covenantal substitute rather than transliteration.
- source_word: בִּשְׁלֹשׁ מֵאוֹת הָאִישׁ
  chosen: With the three hundred men
  alternatives:
  - By the three hundred men
  - Through the three hundred men
  lexicon: HALOT
  rationale: The preposition ב here is instrumental; 'with' is natural English that
    still preserves the means/instrument sense of deliverance through this specific
    group.
- source_word: הַמֲלַקְקִים
  chosen: who lapped
  alternatives:
  - who were lapping
  - the lappers
  lexicon: HALOT
  rationale: Retains the concrete identifying action from the previous context without
    over-specifying the object ('water'), which is not repeated in this verse.
- source_word: אוֹשִׁיעַ אֶתְכֶם
  chosen: I will save you
  alternatives:
  - I will deliver you
  - I will give you victory
  lexicon: HALOT
  rationale: The Hiphil of ישׁע commonly means save/deliver. 'Save' is concise and
    preserves the theological and military sense; 'you' is plural in form but here
    naturally refers to Gideon and Israel with no need to force an awkward distinction
    in English.
- source_word: וְנָתַתִּי אֶת מִדְיָן בְּיָדֶךָ
  chosen: and give Midian into your hand
  alternatives:
  - and deliver Midian into your hand
  - and put Midian into your hand
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for granting victory or control. 'Give
    ... into your hand' preserves the idiom in readable English better than flattening
    it to 'defeat'.
- source_word: וְכָל הָעָם
  chosen: all the people
  alternatives:
  - all the troops
  - all the men
  lexicon: HALOT
  rationale: Though the referent is the assembled fighting force, the Hebrew says
    'the people.' This keeps the source wording while remaining clear in context.
- source_word: יֵלְכוּ
  chosen: let ... go
  alternatives:
  - shall go
  - may go
  lexicon: HALOT
  rationale: The imperfect here functions jussively after the divine declaration,
    expressing command/permission. 'Let ... go' captures that force more naturally
    than a simple future.
- source_word: אִישׁ לִמְקֹמוֹ
  chosen: each man to his place
  alternatives:
  - each to his place
  - every man to his home
  lexicon: HALOT
  rationale: Preserves the distributive singular אִישׁ and follows the project's gender-accurate
    principle. 'His place' is more literal than 'home' and fits the military dispersal
    context.
