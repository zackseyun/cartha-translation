id: JDG.7.12
reference: Judges 7:12
source:
  edition: WLC
  text: וּ/מִדְיָ֨ן וַ/עֲמָלֵ֤ק וְ/כָל בְּנֵי קֶ֨דֶם֙ נֹפְלִ֣ים בָּ/עֵ֔מֶק כָּ/אַרְבֶּ֖ה
    לָ/רֹ֑ב וְ/לִ/גְמַלֵּי/הֶם֙ אֵ֣ין מִסְפָּ֔ר כַּ/ח֛וֹל שֶׁ/עַל שְׂפַ֥ת הַ/יָּ֖ם
    לָ/רֹֽב־־־׃
translation:
  text: Now Midian and Amalek and all the people of the East were lying in the valley
    as numerous as locusts, and their camels were without number, as the sand on the
    seashore in abundance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''sons of the East.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'had fallen' / 'were spread out' in the valley; the Hebrew participle
      literally means 'falling/fallen' and here describes the army lying encamped.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹפְלִים
  chosen: were lying
  alternatives:
  - had fallen
  - were spread out
  lexicon: HALOT
  rationale: The participle of נפל literally means 'falling/fallen,' but in military-camp
    context it idiomatically describes troops lying encamped or spread out in the
    valley. 'Were lying' preserves the image without over-paraphrasing.
- source_word: בָּעֵמֶק
  chosen: in the valley
  alternatives:
  - in the plain
  lexicon: HALOT
  rationale: עֵמֶק commonly denotes a valley. 'In the valley' is the most natural
    and direct rendering here.
- source_word: בְּנֵי קֶדֶם
  chosen: the people of the East
  alternatives:
  - the sons of the East
  - the eastern peoples
  lexicon: HALOT
  rationale: Literally 'sons of the East.' 'People of the East' communicates the ethnogeographic
    designation in readable modern English while preserving the collective sense.
- source_word: כָּאַרְבֶּה לָרֹב
  chosen: as numerous as locusts
  alternatives:
  - like locusts in multitude
  - like the locust for abundance
  lexicon: HALOT
  rationale: The phrase compares the army's number to locusts. 'As numerous as locusts'
    expresses the simile idiomatically in English while retaining the emphasis on
    overwhelming multitude.
- source_word: לִגְמַלֵּיהֶם
  chosen: their camels
  lexicon: HALOT
  rationale: Direct rendering of the noun with 3mp suffix.
- source_word: אֵין מִסְפָּר
  chosen: were without number
  alternatives:
  - could not be counted
  - were innumerable
  lexicon: HALOT
  rationale: The Hebrew is literally 'there is no number.' 'Were without number' is
    a natural English equivalent that preserves the hyperbolic force.
- source_word: כַּחוֹל שֶׁעַל שְׂפַת הַיָּם
  chosen: as the sand on the seashore
  alternatives:
  - like the sand that is on the shore of the sea
  lexicon: HALOT
  rationale: This is a standard Hebrew simile for innumerability. 'Seashore' is idiomatic
    English for שְׂפַת הַיָּם.
- source_word: לָרֹב
  chosen: in abundance
  alternatives:
  - for multitude
  - in great number
  lexicon: HALOT
  rationale: The final לָרֹב restates the idea of abundance/intensity. Rendering it
    as 'in abundance' preserves the Hebrew's emphatic repetition rather than omitting
    it as redundant.
- source_word: וּ/מִדְיָן וַ/עֲמָלֵק וְ/כָל בְּנֵי קֶדֶם
  chosen: Now Midian and Amalek and all the people of the East
  alternatives:
  - And Midian and Amalek and all the people of the East
  lexicon: HALOT
  rationale: The initial conjunction links the verse to the narrative flow. 'Now'
    is a natural discourse rendering in English, though simple 'And' is also possible.
