id: JDG.7.15
reference: Judges 7:15
source:
  edition: WLC
  text: וַ/יְהִי֩ כִ/שְׁמֹ֨עַ גִּדְע֜וֹן אֶת מִסְפַּ֧ר הַ/חֲל֛וֹם וְ/אֶת שִׁבְר֖/וֹ
    וַ/יִּשְׁתָּ֑חוּ וַ/יָּ֨שָׁב֙ אֶל מַחֲנֵ֣ה יִשְׂרָאֵ֔ל וַ/יֹּ֣אמֶר ק֔וּמוּ כִּֽי
    נָתַ֧ן יְהוָ֛ה בְּ/יֶדְ/כֶ֖ם אֶת מַחֲנֵ֥ה מִדְיָֽן־־־־־׃
translation:
  text: And when Gideon heard the telling of the dream and its interpretation, he
    bowed down in worship. Then he returned to the camp of Israel and said, “Get up,
    for the LORD has given the camp of Midian into your hand.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the account of the dream and its interpretation.”
    reason: lexical_alternative
lexical_decisions:
- source_word: מִסְפַּר
  chosen: the telling of
  alternatives:
  - the account of
  - the recounting of
  - the narration of
  lexicon: HALOT
  rationale: Although the noun often means 'number,' in this idiom with 'dream' it
    refers to the recounting or telling of the dream. 'The telling of the dream' is
    natural English and fits the narrative context better than a literal 'number of
    the dream.'
- source_word: הַחֲלוֹם
  chosen: the dream
  lexicon: HALOT
  rationale: Straightforward rendering of the noun for Gideon's overheard dream.
- source_word: שִׁבְרוֹ
  chosen: its interpretation
  alternatives:
  - its breaking
  - its meaning
  - its explanation
  lexicon: HALOT
  rationale: In context this noun refers to the interpretation or explanation of the
    dream, not a literal 'breaking.' 'Interpretation' best captures the sense in English
    and matches the immediate narrative setting.
- source_word: וַיִּשְׁתָּחוּ
  chosen: he bowed down in worship
  alternatives:
  - he bowed down
  - he worshiped
  lexicon: HALOT
  rationale: The verb denotes prostration/bowing, often as an act of worship before
    God. 'Bowed down in worship' preserves both the physical action and its devotional
    force without over-paraphrasing.
- source_word: מַחֲנֵה יִשְׂרָאֵל
  chosen: the camp of Israel
  alternatives:
  - Israel's camp
  lexicon: HALOT
  rationale: A clear and fairly formal rendering of the construct phrase.
- source_word: קוּמוּ
  chosen: Get up
  alternatives:
  - Arise
  - Rise up
  lexicon: HALOT
  rationale: Imperative plural calling the men to action. 'Get up' is idiomatic modern
    English while retaining the command's force.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: נָתַן ... בְּיֶדְכֶם
  chosen: has given ... into your hand
  alternatives:
  - has delivered ... into your hand
  - has given ... into your power
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for handing over into someone's power.
    'Has given ... into your hand' preserves the idiom while remaining understandable
    in English.
- source_word: מַחֲנֵה מִדְיָן
  chosen: the camp of Midian
  alternatives:
  - Midian's camp
  - the army of Midian
  lexicon: HALOT
  rationale: The Hebrew specifically says 'camp,' which in context refers to the Midianite
    encampment/force. 'Camp of Midian' stays close to the source without unnecessarily
    expanding to 'army.'
