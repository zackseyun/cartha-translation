- issue: Singular collective 'Israel' with singular pronouns
  chosen_reading: Israel boast ... 'My own hand has saved me'
  alternative_readings:
  - Israelites boast ... 'Our own hand has saved us'
  rationale: The Hebrew treats Israel as a singular collective entity. Preserving the singular maintains the source-text perspective and avoids interpretive smoothing.
