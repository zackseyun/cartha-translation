id: JDG.7.2
reference: Judges 7:2
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל גִּדְע֔וֹן רַ֗ב הָ/עָם֙ אֲשֶׁ֣ר אִתָּ֔/ךְ מִ/תִּתִּ֥/י אֶת מִדְיָ֖ן בְּ/יָדָ֑/ם פֶּן יִתְפָּאֵ֨ר עָלַ֤/י יִשְׂרָאֵל֙ לֵ/אמֹ֔ר יָדִ֖/י הוֹשִׁ֥יעָה לִּֽ/י־־־׃
translation:
  text: And Yahweh said to Gideon, “The people who are with you are too many for me to give Midian into their hand, lest Israel boast against me, saying, ‘My own hand has saved me.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into their hands.' Hebrew idiom often uses singular 'hand' for power or control.
    reason: lexical_alternative
  - marker: b
    text: Or 'deliver me.' The Hebrew verb can mean 'save' or 'deliver.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Standard waw-consecutive narrative form; 'And ... said' preserves the Hebrew narrative flow without overinterpreting sequence.
- source_word: רַב הָעָם
  chosen: The people ... are too many
  alternatives:
  - The people ... are many
  - The people ... are too numerous
  lexicon: HALOT
  rationale: Though literally 'many/great is the people,' idiomatic English requires 'are too many' in light of the following infinitive clause explaining why their number is excessive.
- source_word: אֲשֶׁר אִתָּךְ
  chosen: who are with you
  alternatives:
  - that are with you
  lexicon: HALOT
  rationale: Natural English relative clause referring to the people accompanying Gideon.
- source_word: מִתִּתִּי
  chosen: for me to give
  alternatives:
  - than for me to give
  - from giving
  lexicon: HALOT
  rationale: 'מן with infinitive construct here expresses prevention/inappropriateness: the people are too many with respect to Yahweh''s giving Midian over. ''For me to give'' is clear modern English and preserves the sense.'
- source_word: בְּיָדָם
  chosen: into their hand
  alternatives:
  - into their hands
  - by their hand
  lexicon: HALOT
  rationale: The Hebrew uses singular 'hand' idiomatically for power/control. 'Into their hand' preserves the biblical idiom while remaining understandable.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - so that ... not
  lexicon: HALOT
  rationale: Introduces a negative purpose/result clause. 'Lest' is concise and accurately reflects the warning nuance.
- source_word: יִתְפָּאֵר עָלַי
  chosen: boast against me
  alternatives:
  - glorify itself against me
  - vaunt itself over me
  lexicon: HALOT
  rationale: The hitpael of פאר here conveys self-exaltation/boasting. With עַל, the sense is boasting in opposition to or against the LORD. 'Boast against me' is both accurate and readable.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - by saying
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing the content of Israel's boast.
- source_word: יָדִי
  chosen: My own hand
  alternatives:
  - My hand
  lexicon: HALOT
  rationale: Adding 'own' brings out the emphatic possessive force in idiomatic English without adding new content.
- source_word: הוֹשִׁיעָה לִּי
  chosen: has saved me
  alternatives:
  - delivered me
  - won victory for me
  lexicon: HALOT
  rationale: The verb ישׁע commonly means 'save/deliver.' Here Israel claims self-deliverance from oppression; 'has saved me' preserves the theological irony that salvation belongs to the LORD, not Israel's own strength.
