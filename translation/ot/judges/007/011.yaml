id: JDG.7.11
reference: Judges 7:11
source:
  edition: WLC
  text: וְ/שָֽׁמַעְתָּ֙ מַה יְדַבֵּ֔רוּ וְ/אַחַר֙ תֶּחֱזַ֣קְנָה יָדֶ֔י/ךָ וְ/יָרַדְתָּ֖
    בַּֽ/מַּחֲנֶ֑ה וַ/יֵּ֤רֶד הוּא֙ וּ/פֻרָ֣ה נַעֲר֔/וֹ אֶל קְצֵ֥ה הַ/חֲמֻשִׁ֖ים אֲשֶׁ֥ר
    בַּֽ/מַּחֲנֶֽה־־׃
translation:
  text: and you will hear what they are saying, and afterward your hands will be strengthened,
    and you will go down into the camp.” So he went down with Purah his young man
    to the edge of the armed men who were in the camp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his servant' or 'his attendant' for 'his young man' (נַעֲרוֹ).
    reason: lexical_alternative
  - marker: b
    text: Or 'to the outskirts of the armed troops'; the Hebrew term can denote those
      equipped for battle.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמַעְתָּ
  chosen: and you will hear
  alternatives:
  - then you will hear
  - and you shall hear
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this sequence functions with
    future sense in direct speech. 'Hear' is the plain sense of שׁמע here, referring
    to overhearing speech.
- source_word: מַה יְדַבֵּרוּ
  chosen: what they are saying
  alternatives:
  - what they say
  - what they will say
  lexicon: HALOT
  rationale: The interrogative מַה introduces content, and the imperfect of דבר can
    be rendered as present/future in English. 'Are saying' fits the immediate scene
    of overhearing conversation.
- source_word: וְאַחַר
  chosen: and afterward
  alternatives:
  - and after that
  - then afterward
  lexicon: HALOT
  rationale: Temporal adverb marking sequence; 'afterward' preserves the progression
    from hearing to strengthened resolve.
- source_word: תֶּחֱזַקְנָה יָדֶיךָ
  chosen: your hands will be strengthened
  alternatives:
  - your hands will grow strong
  - you will be strengthened
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of the hands being strengthened. Retaining
    'hands' preserves the source imagery for courage and resolve, while passive English
    communicates the sense naturally.
- source_word: וְיָרַדְתָּ בַּמַּחֲנֶה
  chosen: and you will go down into the camp
  alternatives:
  - then you will go down against the camp
  - and you will go down to the camp
  lexicon: HALOT
  rationale: ירד is literal 'go down.' With בְּ plus 'camp,' 'into the camp' best
    fits the movement envisioned in context, though the broader sense is movement
    toward/against the enemy encampment.
- source_word: וַיֵּרֶד הוּא
  chosen: So he went down
  alternatives:
  - And he went down
  - Then he went down
  lexicon: HALOT
  rationale: Narrative wayyiqtol advances the story. 'So' gives smooth English connection
    to the preceding divine instruction.
- source_word: וּפֻרָה
  chosen: Purah
  rationale: Proper name transliterated according to the translation philosophy.
- source_word: נַעֲרוֹ
  chosen: his young man
  alternatives:
  - his servant
  - his attendant
  lexicon: HALOT
  rationale: נַעַר can denote a youth, servant, or attendant. 'Young man' is the most
    direct lexical rendering and avoids importing a more formal servant role than
    the text explicitly states.
- source_word: אֶל קְצֵה
  chosen: to the edge of
  alternatives:
  - to the outskirts of
  - to the extremity of
  lexicon: HALOT
  rationale: קצה denotes an end, edge, or extremity. 'Edge of' is natural English
    and suits the tactical setting.
- source_word: הַחֲמֻשִׁים
  chosen: the armed men
  alternatives:
  - the troops in battle array
  - the warriors equipped for battle
  lexicon: HALOT
  rationale: From חמשׁ in the passive/participle sense of being equipped or armed.
    In this context it refers to armed soldiers at the perimeter, not merely a numerical
    formation.
- source_word: אֲשֶׁר בַּמַּחֲנֶה
  chosen: who were in the camp
  alternatives:
  - who were in the encampment
  - that were in the camp
  lexicon: HALOT
  rationale: Relative clause identifying the armed men as those belonging to or stationed
    in the camp. 'Who' is appropriate for persons.
