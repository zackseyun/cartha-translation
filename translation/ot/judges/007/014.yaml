id: JDG.7.14
reference: Judges 7:14
source:
  edition: WLC
  text: וַ/יַּ֨עַן רֵעֵ֤/הוּ וַ/יֹּ֨אמֶר֙ אֵ֣ין זֹ֔את בִּלְתִּ֗י אִם חֶ֛רֶב גִּדְע֥וֹן
    בֶּן יוֹאָ֖שׁ אִ֣ישׁ יִשְׂרָאֵ֑ל נָתַ֤ן הָֽ/אֱלֹהִים֙ בְּ/יָד֔/וֹ אֶת מִדְיָ֖ן
    וְ/אֶת כָּל הַֽ/מַּחֲנֶֽה־־־־־׃פ
translation:
  text: His companion answered and said, “This is nothing other than the sword of
    Gideon son of Joash, a man of Israel. God has given Midian and the whole camp
    into his hand.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “This is nothing but the sword of Gideon son of Joash.”
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: “into his hand,” an idiom meaning into his power or control.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: Standard narrative rendering of ענה in dialogue formulas; paired naturally
    with the following ויאמר.
- source_word: רֵעֵהוּ
  chosen: his companion
  alternatives:
  - his friend
  - his fellow
  lexicon: HALOT
  rationale: In this military-camp context, 'companion' fits better than the more
    intimate 'friend' and preserves the relational sense of רעהו.
- source_word: וַיֹּאמֶר
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Conventional English rendering in Hebrew narrative after 'answered'.
- source_word: אֵין זֹאת בִּלְתִּי אִם
  chosen: This is nothing other than
  alternatives:
  - This is nothing but
  - This can be nothing else except
  lexicon: HALOT
  rationale: 'The idiom expresses strong exclusion: the dream''s meaning is identified
    decisively. ''Nothing other than'' is idiomatic modern English while preserving
    the emphatic force.'
- source_word: חֶרֶב
  chosen: the sword
  alternatives:
  - a sword
  lexicon: HALOT
  rationale: Although Hebrew lacks the article on חרב, English idiom in this identificational
    statement favors 'the sword' as a symbolic designation of Gideon as the agent
    of defeat.
- source_word: גִּדְעוֹן בֶּן יוֹאָשׁ
  chosen: Gideon son of Joash
  alternatives:
  - Gideon, the son of Joash
  lexicon: HALOT
  rationale: Standard concise rendering of the patronymic.
- source_word: אִישׁ יִשְׂרָאֵל
  chosen: a man of Israel
  alternatives:
  - an Israelite man
  - a man of IsraeI
  lexicon: HALOT
  rationale: Retains the singular איש and the ethnic/national identification. This
    follows the project's gender-accurate principle rather than flattening to a gender-neutral
    term.
- source_word: נָתַן הָאֱלֹהִים
  chosen: God has given
  alternatives:
  - God gave
  lexicon: HALOT
  rationale: The Hebrew perfect can be rendered as a present perfect in English to
    convey the certainty of the action as already determined from the speaker's perspective.
    'God' is the straightforward rendering of האלהים here.
- source_word: בְּיָדוֹ
  chosen: into his hand
  alternatives:
  - into his power
  - into his control
  lexicon: HALOT
  rationale: Preserves the Hebrew idiom of handing over into someone's hand, a common
    expression for delivering an enemy into another's power.
- source_word: אֶת מִדְיָן
  chosen: Midian
  lexicon: HALOT
  rationale: Proper-name rendering of the people/group opposed to Israel in context.
- source_word: וְאֶת כָּל הַמַּחֲנֶה
  chosen: and the whole camp
  alternatives:
  - and the entire camp
  - and all the army camp
  lexicon: HALOT
  rationale: מחנה here refers to the Midianite encampment/host. 'The whole camp' is
    natural English and preserves the totality marked by כל.
