theological_decisions:
- issue: Rendering of אִישׁ יִשְׂרָאֵל
  chosen_reading: a man of Israel
  alternative_readings:
  - an Israelite
  rationale: The Hebrew explicitly uses the masculine singular איש. Per the translation
    philosophy's gender-accurate principle, the masculine form is retained where it
    is part of the source wording and not merely generic. Here it identifies Gideon
    as an Israelite male warrior.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Aspect of נָתַן in prophetic/certain declaration
  chosen_reading: God has given
  alternative_readings:
  - God gave
  rationale: The perfect is used in a context of confident interpretation of the dream.
    English present perfect communicates the sense of a decisive act already settled,
    without overstating theology beyond the text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
