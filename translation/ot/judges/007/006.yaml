id: JDG.7.6
reference: Judges 7:6
source:
  edition: WLC
  text: וַ/יְהִ֗י מִסְפַּ֞ר הַֽ/מֲלַקְקִ֤ים בְּ/יָדָ/ם֙ אֶל פִּי/הֶ֔ם שְׁלֹ֥שׁ מֵא֖וֹת
    אִ֑ישׁ וְ/כֹל֙ יֶ֣תֶר הָ/עָ֔ם כָּרְע֥וּ עַל בִּרְכֵי/הֶ֖ם לִ/שְׁתּ֥וֹת מָֽיִם־־׃ס
translation:
  text: And the number of those lapping with their hand to their mouth was three hundred
    men, but all the rest of the people knelt on their knees to drink water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'from their hand to their mouth.' The Hebrew phrase emphasizes that
      they brought the water up by hand rather than kneeling to drink directly.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִסְפַּר
  chosen: the number of
  alternatives:
  - the count of
  lexicon: HALOT
  rationale: Standard quantitative noun introducing the tally of a subgroup; 'the
    number of' is natural and sufficiently formal.
- source_word: הַמֲלַקְקִים
  chosen: those lapping
  alternatives:
  - those who lapped
  - the lappers
  lexicon: HALOT
  rationale: Participle from לקק, describing the action characteristic of this group.
    'Lapping' preserves the vivid physical image central to the narrative test.
- source_word: בְּיָדָם אֶל־פִּיהֶם
  chosen: with their hand to their mouth
  alternatives:
  - from their hand to their mouth
  - with their hands to their mouths
  lexicon: HALOT
  rationale: 'The Hebrew uses singular collectives with 3mp suffixes. English idiom
    prefers singular distributive here: each man used his hand to bring water to his
    mouth. This preserves the contrast with those who knelt directly to drink.'
- source_word: שְׁלֹשׁ מֵאוֹת אִישׁ
  chosen: three hundred men
  alternatives:
  - three hundred men in number
  - three hundred persons
  lexicon: HALOT
  rationale: אִישׁ after a number commonly means 'men' or 'persons'; here 'men' fits
    the military context and the gender-accurate policy.
- source_word: וְכֹל יֶתֶר הָעָם
  chosen: but all the rest of the people
  alternatives:
  - and all the rest of the people
  - all the remainder of the people
  lexicon: HALOT
  rationale: Though ו can be rendered 'and,' English contrast is clearer with 'but'
    because the clause sets the larger group over against the three hundred.
- source_word: כָּרְעוּ
  chosen: knelt
  alternatives:
  - bowed down
  - got down
  lexicon: HALOT
  rationale: The verb denotes kneeling. 'Knelt' is the most direct and idiomatic rendering
    in this context.
- source_word: עַל בִּרְכֵיהֶם
  chosen: on their knees
  alternatives:
  - upon their knees
  lexicon: HALOT
  rationale: Direct rendering of the prepositional phrase; it clarifies the bodily
    posture contrasted with hand-to-mouth lapping.
- source_word: לִשְׁתּוֹת מָיִם
  chosen: to drink water
  alternatives:
  - to drink
  lexicon: HALOT
  rationale: The infinitive phrase states purpose. Retaining 'water' matches the Hebrew
    explicitly and keeps the scene concrete.
