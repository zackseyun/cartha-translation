id: JDG.7.16
reference: Judges 7:16
source:
  edition: WLC
  text: וַ/יַּ֛חַץ אֶת שְׁלֹשׁ מֵא֥וֹת הָ/אִ֖ישׁ שְׁלֹשָׁ֣ה רָאשִׁ֑ים וַ/יִּתֵּ֨ן
    שׁוֹפָר֤וֹת בְּ/יַד כֻּלָּ/ם֙ וְ/כַדִּ֣ים רֵקִ֔ים וְ/לַפִּדִ֖ים בְּ/ת֥וֹךְ הַ/כַּדִּֽים־־־׃
translation:
  text: Then he divided the three hundred men into three companies, and put trumpets
    into the hands of all of them, and empty jars, with torches inside the jars.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'three heads,' an idiom meaning three groups or companies.
    reason: lexical_alternative
  - marker: b
    text: Or 'rams' horns' for 'trumpets' (Hebrew shofarot).
    reason: lexical_alternative
  - marker: c
    text: Or 'empty pitchers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחַץ
  chosen: divided
  alternatives:
  - split
  - apportioned
  lexicon: HALOT
  rationale: The verb חצה in this context refers to dividing the force into groups.
    'Divided' is natural modern English and preserves the military-organizational
    sense without over-specifying method.
- source_word: שְׁלֹשׁ מֵאוֹת הָאִישׁ
  chosen: the three hundred men
  alternatives:
  - the three hundred soldiers
  lexicon: HALOT
  rationale: אִישׁ literally means 'man.' Here it refers to Gideon's fighting force.
    'Men' is gender-accurate and sufficiently clear; 'soldiers' is interpretive and
    not required by the Hebrew.
- source_word: שְׁלֹשָׁה רָאשִׁים
  chosen: three companies
  alternatives:
  - three groups
  - three divisions
  - three heads
  lexicon: HALOT
  rationale: Literally 'three heads,' but רָאשִׁים here is an idiom for divisions
    or companies. 'Companies' conveys the military grouping idiomatically in English
    while staying close to the sense.
- source_word: וַיִּתֵּן
  chosen: put
  alternatives:
  - gave
  - placed
  lexicon: HALOT
  rationale: נתן commonly means 'give,' but with objects placed in someone's hand,
    English idiom prefers 'put ... into the hands of.' This preserves the concrete
    imagery of distribution.
- source_word: שׁוֹפָרוֹת
  chosen: trumpets
  alternatives:
  - rams' horns
  - horns
  lexicon: HALOT
  rationale: שׁוֹפָר denotes a horn used as a signaling instrument. 'Trumpets' is
    the conventional and readily understood rendering in this military context; the
    more specific material sense 'rams' horns' is possible but not necessary in the
    main text.
- source_word: בְּיַד כֻּלָּם
  chosen: into the hands of all of them
  alternatives:
  - in the hand of each of them
  - to all of them
  lexicon: HALOT
  rationale: The Hebrew is literally 'in/into the hand of all of them.' The chosen
    rendering preserves the concrete distributive sense better than the flatter 'to
    all of them.'
- source_word: כַדִּים רֵקִים
  chosen: empty jars
  alternatives:
  - empty pitchers
  - empty jars
  lexicon: HALOT
  rationale: כַּד is a jar or pitcher. 'Jars' is more contemporary and fits the likely
    earthenware containers. 'Empty' is retained explicitly from רֵקִים.
- source_word: לַפִּדִים
  chosen: torches
  alternatives:
  - firebrands
  - flaming torches
  lexicon: HALOT
  rationale: לַפִּיד refers to a torch or flaming brand. 'Torches' is the clearest
    standard English equivalent.
- source_word: בְּתוֹךְ הַכַּדִּים
  chosen: inside the jars
  alternatives:
  - in the midst of the jars
  - within the jars
  lexicon: HALOT
  rationale: The phrase indicates location within the containers. 'Inside the jars'
    is straightforward modern English and preserves the concealment implied by the
    Hebrew.
