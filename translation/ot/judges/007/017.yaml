id: JDG.7.17
reference: Judges 7:17
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֲלֵי/הֶ֔ם מִמֶּ֥/נִּי תִרְא֖וּ וְ/כֵ֣ן תַּעֲשׂ֑וּ וְ/הִנֵּ֨ה
    אָנֹכִ֥י בָא֙ בִּ/קְצֵ֣ה הַֽ/מַּחֲנֶ֔ה וְ/הָיָ֥ה כַ/אֲשֶׁר אֶעֱשֶׂ֖ה כֵּ֥ן תַּעֲשֽׂוּ/ן־׃
translation:
  text: And he said to them, “Watch me, and do likewise. Behold, when I come to the
    edge of the camp, then as I do, so you shall do.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Look at me and do the same.”
    reason: lexical_alternative
lexical_decisions:
- source_word: מִמֶּנִּי
  chosen: Watch me
  alternatives:
  - Look at me
  - Watch from me
  lexicon: HALOT
  rationale: With ראה plus מן in this instructional context, the sense is to observe
    Gideon as the model for action. 'Watch me' is idiomatic English and fits the following
    command to imitate him.
- source_word: וְכֵן תַּעֲשׂוּ
  chosen: and do likewise
  alternatives:
  - and do so
  - and thus you shall do
  lexicon: HALOT
  rationale: כֵן marks manner ('thus/so'). 'Do likewise' communicates imitation naturally
    in English while preserving the imperative force.
- source_word: וְהִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  - Now
  lexicon: HALOT
  rationale: The particle draws attention to what follows. 'Behold' preserves the
    deictic emphasis without adding content; though slightly elevated, it remains
    clear and concise here.
- source_word: בָא
  chosen: I come
  alternatives:
  - I am coming
  - I arrive
  lexicon: HALOT
  rationale: The participle expresses imminent or ongoing action. 'I come' works well
    after 'when' in English and keeps the instruction vivid; 'I am coming' is possible
    but slightly heavier.
- source_word: בִּקְצֵה הַמַּחֲנֶה
  chosen: to the edge of the camp
  alternatives:
  - at the outskirts of the camp
  - to the end of the camp
  lexicon: HALOT
  rationale: קצה denotes extremity or edge. 'Edge of the camp' is the most natural
    concise rendering in context.
- source_word: וְהָיָה כַאֲשֶׁר
  chosen: then as
  alternatives:
  - and it shall be, as
  - and when
  lexicon: HALOT
  rationale: This construction introduces the circumstance for the next command. A
    more literal 'and it shall be, as' is awkward in English; 'then as' preserves
    the sequence and conditional sense.
- source_word: אֶעֱשֶׂה כֵּן תַּעֲשׂוּן
  chosen: as I do, so you shall do
  alternatives:
  - just as I do, so you must do
  - what I do, do the same
  lexicon: HALOT
  rationale: This is the core imitation formula. 'As I do, so you shall do' is clear,
    close to the Hebrew, and preserves the directive force of the imperfect with paragogic
    nun.
