id: JDG.7.18
reference: Judges 7:18
source:
  edition: WLC
  text: וְ/תָקַעְתִּי֙ בַּ/שּׁוֹפָ֔ר אָנֹכִ֖י וְ/כָל אֲשֶׁ֣ר אִתִּ֑/י וּ/תְקַעְתֶּ֨ם בַּ/שּׁוֹפָר֜וֹת גַּם אַתֶּ֗ם סְבִיבוֹת֙ כָּל הַֽ/מַּחֲנֶ֔ה וַ/אֲמַרְתֶּ֖ם לַ/יהוָ֥ה וּ/לְ/גִדְעֽוֹן־־־׃פ
translation:
  text: When I and all who are with me blow the ram’s horn, then you also must blow the horns all around the whole camp, and say, ‘For Yahweh and for Gideon!’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditional English versions often read, 'The sword of the LORD and of Gideon,' influenced by the nearby wording in Judges 7:20. The Hebrew of this verse itself reads simply, 'For the LORD and for Gideon.'
    reason: alternative_reading
  - marker: b
    text: Hebrew שׁוֹפָר refers to a horn, often a ram’s horn, rather than a metal trumpet.
    reason: cultural_note
lexical_decisions:
- source_word: תָקַעְתִּי / תְקַעְתֶּם
  chosen: blow
  alternatives:
  - sound
  - blow into
  lexicon: HALOT
  rationale: תקע with שופר means to blow/sound a horn. 'Blow' is the most natural modern English verb and preserves the concrete action.
- source_word: שׁוֹפָר / שׁוֹפָרוֹת
  chosen: ram’s horn / horns
  alternatives:
  - trumpet
  - shofar
  lexicon: HALOT
  rationale: שופר is specifically a horn, often a ram’s horn, not a metal trumpet. Rendering the singular first occurrence as 'ram’s horn' preserves the concrete Hebrew sense; the plural is naturally 'horns.' 'Shofar' was avoided in the main text for readability.
- source_word: אָנֹכִי וְכָל אֲשֶׁר אִתִּי
  chosen: I and all who are with me
  alternatives:
  - I and all that are with me
  - I and everyone with me
  lexicon: HALOT
  rationale: This phrase identifies Gideon and his accompanying men. 'All who are with me' is idiomatic, personal, and faithful to the referent.
- source_word: גַּם אַתֶּם
  chosen: you also
  alternatives:
  - you too
  - even you
  lexicon: HALOT
  rationale: גַּם adds inclusion/emphasis. 'You also' preserves the exhortational force without overemphasis.
- source_word: סְבִיבוֹת כָּל הַמַּחֲנֶה
  chosen: all around the whole camp
  alternatives:
  - around the entire camp
  - surrounding all the camp
  lexicon: HALOT
  rationale: The phrase expresses encirclement of the camp. 'All around the whole camp' captures both סביבות and כל, preserving the comprehensive spatial sense.
- source_word: וַאֲמַרְתֶּם
  chosen: say
  alternatives:
  - cry out
  - shout
  lexicon: HALOT
  rationale: The verb is the ordinary 'say.' Although the battlefield context implies a loud cry, the Hebrew does not specify shouting, so 'say' avoids importing intensity not explicit in the text.
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - for Yahweh
  - of the LORD
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' The prefixed ל here is best taken in the battle cry sense 'for,' indicating allegiance or invocation.
- source_word: וּלְגִדְעוֹן
  chosen: and for Gideon
  alternatives:
  - and for Gid'on
  - and Gideon
  lexicon: HALOT
  rationale: The repeated ל joins Gideon with the LORD in the slogan. 'And for Gideon' preserves the parallel structure and the force of the preposition better than simply 'and Gideon.'
