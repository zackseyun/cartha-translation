id: JDG.7.13
reference: Judges 7:13
source:
  edition: WLC
  text: וַ/יָּבֹ֣א גִדְע֔וֹן וְ/הִ֨נֵּה אִ֔ישׁ מְסַפֵּ֥ר לְ/רֵעֵ֖/הוּ חֲל֑וֹם וַ/יֹּ֜אמֶר
    הִנֵּ֧ה חֲל֣וֹם חָלַ֗מְתִּי וְ/הִנֵּ֨ה צלול לֶ֤חֶם שְׂעֹרִים֙ מִתְהַפֵּךְ֙ בְּ/מַחֲנֵ֣ה
    מִדְיָ֔ן וַ/יָּבֹ֣א עַד הָ֠/אֹהֶל וַ/יַּכֵּ֧/הוּ וַ/יִּפֹּ֛ל וַ/יַּהַפְכֵ֥/הוּ
    לְ/מַ֖עְלָ/ה וְ/נָפַ֥ל הָ/אֹֽהֶל־־׃
translation:
  text: 'When Gideon came, behold, a man was telling a dream to his companion. He
    said, “Look, I dreamed a dream: behold, a round loaf of barley bread was rolling
    around in the camp of Midian, and it came up to the tent and struck it, so that
    it fell. He turned it upside down, and the tent collapsed.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a cake of barley bread” or “a barley loaf.” The Hebrew term translated
      “round loaf” is rare, and likely refers to a round cake or loaf.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: When Gideon came
  alternatives:
  - And Gideon came
  - Now Gideon came
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'When Gideon came' gives
    natural English while preserving the temporal sense that sets the scene.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - there was
  lexicon: HALOT
  rationale: The particle marks vividness and sudden attention. 'Behold' preserves
    the narrative force, though a later instance is rendered 'Look' inside direct
    speech for more natural English dialogue.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  lexicon: HALOT
  rationale: The Hebrew is singular and concrete. 'A man' is gender-accurate and matches
    the source better than the more indefinite 'someone'.
- source_word: מְסַפֵּר לְרֵעֵהוּ
  chosen: was telling a dream to his companion
  alternatives:
  - was recounting a dream to his friend
  - was relating a dream to his fellow
  lexicon: HALOT
  rationale: The participle conveys ongoing action. 'Companion' fits רֵעַ in this
    military setting without over-specifying intimacy.
- source_word: חֲלוֹם
  chosen: a dream
  lexicon: HALOT
  rationale: Straightforward rendering of the noun.
- source_word: הִנֵּה חֲלוֹם חָלַמְתִּי
  chosen: Look, I dreamed a dream
  alternatives:
  - Behold, I had a dream
  - Look, I dreamed
  lexicon: HALOT
  rationale: The Hebrew uses cognate accusative for emphasis. 'I dreamed a dream'
    preserves that emphasis more transparently than smoothing it away.
- source_word: צלול
  chosen: a round loaf
  alternatives:
  - a cake
  - a barley loaf
  - a loaf tumbling
  lexicon: HALOT
  rationale: The noun is rare and likely denotes a round cake/loaf. 'Round loaf' communicates
    the shape without importing too much interpretation. Because the exact nuance
    is uncertain, an alternative is preserved in a footnote.
- source_word: לֶחֶם שְׂעֹרִים
  chosen: of barley bread
  alternatives:
  - of barley
  - barley loaf
  lexicon: HALOT
  rationale: The construct phrase identifies the loaf as barley bread. 'Of barley
    bread' keeps both elements explicit.
- source_word: מִתְהַפֵּךְ
  chosen: was rolling around
  alternatives:
  - was tumbling
  - was turning over
  lexicon: HALOT
  rationale: The hitpael suggests turning/rolling over on itself. 'Was rolling around'
    captures the motion in idiomatic English.
- source_word: בְּמַחֲנֵה מִדְיָן
  chosen: in the camp of Midian
  alternatives:
  - into the camp of Midian
  lexicon: HALOT
  rationale: The preposition ב normally means 'in.' The motion is supplied by the
    participle and following verb, so 'in the camp of Midian' is sufficiently literal
    and clear.
- source_word: עַד הָאֹהֶל
  chosen: up to the tent
  alternatives:
  - to the tent
  lexicon: HALOT
  rationale: עַד marks movement up to a point. 'Up to the tent' preserves that sense.
- source_word: וַיַּכֵּהוּ
  chosen: struck it
  alternatives:
  - hit it
  - smote it
  lexicon: HALOT
  rationale: Simple past narrative. 'Struck it' is natural modern English and suitably
    forceful.
- source_word: וַיִּפֹּל
  chosen: so that it fell
  alternatives:
  - and it fell
  lexicon: HALOT
  rationale: The sequence implies result after the strike. 'So that it fell' makes
    the relation clear in English while staying close to the narrative flow.
- source_word: וַיַּהַפְכֵהוּ לְמַעְלָה
  chosen: He turned it upside down
  alternatives:
  - he overturned it upward
  - he turned it over
  lexicon: HALOT
  rationale: The idiom is difficult literally ('to upward'). In context it describes
    complete overturning of the tent. 'Turned it upside down' conveys the effect in
    clear English.
- source_word: וְנָפַל הָאֹהֶל
  chosen: the tent collapsed
  alternatives:
  - and the tent fell
  lexicon: HALOT
  rationale: This final clause restates the result emphatically. 'Collapsed' is idiomatic
    and reflects the destructive fall of a tent better than the bare 'fell,' while
    preserving the sense.
