id: JDG.7.25
reference: Judges 7:25
source:
  edition: WLC
  text: וַֽ/יִּלְכְּד֡וּ שְׁנֵֽי שָׂרֵ֨י מִדְיָ֜ן אֶת עֹרֵ֣ב וְ/אֶת זְאֵ֗ב וַ/יַּהַרְג֨וּ
    אֶת עוֹרֵ֤ב בְּ/צוּר עוֹרֵב֙ וְ/אֶת זְאֵב֙ הָרְג֣וּ בְ/יֶֽקֶב זְאֵ֔ב וַֽ/יִּרְדְּפ֖וּ
    אֶל מִדְיָ֑ן וְ/רֹאשׁ עֹרֵ֣ב וּ/זְאֵ֔ב הֵבִ֨יאוּ֙ אֶל גִּדְע֔וֹן מֵ/עֵ֖בֶר לַ/יַּרְדֵּֽן־־־־־־־־־־׃
translation:
  text: And they captured the two princes of Midian, Oreb and Zeeb. They killed Oreb
    at the rock of Oreb, and they killed Zeeb at the winepress of Zeeb. Then they
    pursued Midian, and they brought the heads of Oreb and Zeeb to Gideon from across
    the Jordan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Oreb is related to the Hebrew word for 'raven,' and Zeeb to the word for
      'wolf,' but both are rendered as personal names in the main text.
    reason: lexical_alternative
  - marker: b
    text: Or 'from beyond the Jordan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֵי
  chosen: princes
  alternatives:
  - chiefs
  - leaders
  - officials
  lexicon: HALOT
  rationale: שַׂר commonly denotes a ruler, chief, or prince. Here it refers to high-ranking
    Midianite leaders. 'Princes' preserves the elevated political-military status
    and matches the narrative register better than the flatter 'leaders' or more bureaucratic
    'officials.'
- source_word: וַיִּלְכְּדוּ
  chosen: captured
  alternatives:
  - seized
  - took
  lexicon: HALOT
  rationale: The verb לָכַד means to capture or seize. 'Captured' is the clearest
    idiomatic English choice in a military context and fits the subsequent execution
    of the prisoners.
- source_word: עֹרֵב
  chosen: Oreb
  alternatives:
  - Raven
  lexicon: HALOT
  rationale: This is a personal name, so per translation philosophy names are transliterated
    rather than translated, even though the name is related to 'raven.'
- source_word: זְאֵב
  chosen: Zeeb
  alternatives:
  - Wolf
  lexicon: HALOT
  rationale: This is a personal name, so it is transliterated rather than translated,
    though the lexical sense is 'wolf.'
- source_word: בְּצוּר
  chosen: at the rock of
  alternatives:
  - on the rock of
  - at Oreb's rock
  lexicon: HALOT
  rationale: צוּר means 'rock' or 'cliff.' 'At the rock of Oreb' is a natural rendering
    of the place-name construction and preserves the etiological naming reflected
    in the Hebrew.
- source_word: בְיֶקֶב
  chosen: at the winepress of
  alternatives:
  - in the winepress of
  - at Zeeb's winepress
  lexicon: HALOT
  rationale: יֶקֶב denotes a winepress or wine vat. 'At the winepress of Zeeb' best
    reflects the preposition and the place-name construction. 'In' is possible but
    less neutral than 'at' for a named location.
- source_word: וַיִּרְדְּפוּ אֶל מִדְיָן
  chosen: Then they pursued Midian
  alternatives:
  - and they pursued Midian
  - and they pursued toward Midian
  lexicon: HALOT
  rationale: The idiom with רָדַף plus אֶל here conveys continuing pursuit against
    the Midianites. English idiom prefers 'pursued Midian' rather than the more wooden
    'pursued toward Midian.' 'Then' reflects the narrative sequence of the waw-consecutive.
- source_word: וְרֹאשׁ עֹרֵב וּזְאֵב
  chosen: the heads of Oreb and Zeeb
  alternatives:
  - the head of Oreb and of Zeeb
  lexicon: HALOT
  rationale: Though רֹאשׁ appears singular in construct, the coordinated names indicate
    a distributive sense, naturally rendered in English as the plural 'heads.' This
    avoids awkwardness while accurately conveying that both severed heads were brought.
- source_word: מֵעֵבֶר לַיַּרְדֵּן
  chosen: from across the Jordan
  alternatives:
  - from beyond the Jordan
  - from the other side of the Jordan
  lexicon: HALOT
  rationale: The phrase literally means 'from beyond/across the Jordan.' 'From across
    the Jordan' is clear modern English and preserves the spatial perspective without
    archaic tone.
