id: JDG.7.8
reference: Judges 7:8
source:
  edition: WLC
  text: וַ/יִּקְח֣וּ אֶת צֵדָה֩ הָ/עָ֨ם בְּ/יָדָ֜/ם וְ/אֵ֣ת שׁוֹפְרֹֽתֵי/הֶ֗ם וְ/אֵ֨ת
    כָּל אִ֤ישׁ יִשְׂרָאֵל֙ שִׁלַּח֙ אִ֣ישׁ לְ/אֹֽהָלָ֔י/ו וּ/בִ/שְׁלֹשׁ מֵא֥וֹת הָ/אִ֖ישׁ
    הֶֽחֱזִ֑יק וּ/מַחֲנֵ֣ה מִדְיָ֔ן הָ֥יָה ל֖/וֹ מִ/תַּ֥חַת בָּ/עֵֽמֶק־־־׃פ
translation:
  text: So they took the provisions of the people in their hands, along with their
    trumpets. And he sent every man of Israel, each to his tent, but retained the
    three hundred men. And the camp of Midian was below him in the valley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “their horns” or “their rams’ horns”; the Hebrew term refers to a horn
      used as a signaling instrument.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  chosen: they took
  alternatives:
  - they received
  - they took up
  lexicon: HALOT
  rationale: Common narrative wayyiqtol of לקח, best rendered with simple past 'took.'
    The plural subject naturally refers to Gideon's force/the selected men.
- source_word: צֵדָה
  chosen: provisions
  alternatives:
  - food
  - supplies
  lexicon: HALOT
  rationale: Refers to travel or military provisions rather than food narrowly; 'provisions'
    fits the military setting and leaves the term appropriately broad.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the troops
  lexicon: HALOT
  rationale: Formally 'the people.' In context it refers to the larger body of Israelite
    fighters, but the Hebrew uses the broader term, so 'the people' is retained.
- source_word: בְּיָדָם
  chosen: in their hands
  alternatives:
  - into their hands
  lexicon: HALOT
  rationale: A literal rendering preserves the concrete idiom. It indicates possession/carrying
    by the three hundred.
- source_word: שׁוֹפְרֹתֵיהֶם
  chosen: their trumpets
  alternatives:
  - their horns
  - their rams' horns
  lexicon: HALOT
  rationale: שׁוֹפָר denotes a horn used as a signaling instrument. 'Trumpets' is
    idiomatic modern English in this military context, while 'horns' or 'rams' horns'
    are possible more concrete alternatives.
- source_word: שִׁלַּח
  chosen: he sent
  alternatives:
  - he dismissed
  lexicon: HALOT
  rationale: Singular verb has Gideon as subject. 'Sent' is the basic sense; the context
    implies dismissal, but 'sent' stays closer to the Hebrew.
- source_word: כָּל אִישׁ יִשְׂרָאֵל ... אִישׁ לְאֹהָלָיו
  chosen: every man of Israel, each to his tent
  alternatives:
  - all the men of Israel, each to his tent
  - every Israelite man, each to his tent
  lexicon: HALOT
  rationale: The Hebrew is distributive and explicitly masculine singular. Per translation
    philosophy, the gendered wording is preserved because it refers to male soldiers,
    not generic humanity.
- source_word: וּבִשְׁלֹשׁ מֵאוֹת הָאִישׁ הֶחֱזִיק
  chosen: but retained the three hundred men
  alternatives:
  - and held fast to the three hundred men
  - and kept the three hundred men with him
  lexicon: HALOT
  rationale: החזיק here means to keep hold of/retain. 'Retained' communicates that
    Gideon kept this smaller force while dismissing the rest. 'But' makes the contrast
    explicit in natural English.
- source_word: מַחֲנֵה מִדְיָן
  chosen: the camp of Midian
  alternatives:
  - Midian's camp
  lexicon: HALOT
  rationale: Construct chain rendered straightforwardly. 'Camp of Midian' preserves
    the formal relation and the identity of the opposing force.
- source_word: מִתַּחַת
  chosen: below
  alternatives:
  - beneath
  - down below
  lexicon: HALOT
  rationale: Spatial term indicating lower elevation. 'Below' is concise and natural
    in English.
- source_word: בָּעֵמֶק
  chosen: in the valley
  alternatives:
  - in the plain
  - in the vale
  lexicon: HALOT
  rationale: The noun denotes a valley/plain depression. Given the immediate topographical
    contrast with 'below him,' 'valley' is the clearest English choice.
