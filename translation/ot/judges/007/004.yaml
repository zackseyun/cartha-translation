id: JDG.7.4
reference: Judges 7:4
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל גִּדְע֗וֹן עוֹד֮ הָ/עָ֣ם רָב֒ הוֹרֵ֤ד אוֹתָ/ם֙ אֶל הַ/מַּ֔יִם וְ/אֶצְרְפֶ֥/נּוּ לְ/ךָ֖ שָׁ֑ם וְ/הָיָ֡ה אֲשֶׁר֩ אֹמַ֨ר אֵלֶ֜י/ךָ זֶ֣ה יֵלֵ֣ךְ אִתָּ֗/ךְ ה֚וּא יֵלֵ֣ךְ אִתָּ֔/ךְ וְ/כֹ֨ל אֲשֶׁר אֹמַ֜ר אֵלֶ֗י/ךָ זֶ֚ה לֹא יֵלֵ֣ךְ עִמָּ֔/ךְ ה֖וּא לֹ֥א יֵלֵֽךְ־־׀־־׃
translation:
  text: Then Yahweh said to Gideon, “The people are still too many. Bring them down to the water, and there I will test them for you. And it shall be that the one of whom I say to you, ‘This one shall go with you,’ he shall go with you; and everyone of whom I say to you, ‘This one shall not go with you,’ he shall not go.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''I will refine him/it for you there,'' using a verb often used of smelting metal; here it means to test or prove the people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the covenant name while matching established English convention.
- source_word: עוֹד הָעָם רָב
  chosen: The people are still too many
  alternatives:
  - The people are still many
  - The people are yet numerous
  lexicon: HALOT
  rationale: רָב with עוֹד in context expresses excessive number, not merely a neutral statement of size. 'Too many' best captures the narrative force behind the coming reduction.
- source_word: הוֹרֵד אוֹתָם אֶל הַמַּיִם
  chosen: Bring them down to the water
  alternatives:
  - Take them down to the water
  - Lead them down to the water
  lexicon: HALOT
  rationale: הוֹרֵד is a causative imperative of ירד, literally 'cause to go down.' 'Bring them down' is natural English and preserves the directional sense.
- source_word: וְאֶצְרְפֶנּוּ לְךָ שָׁם
  chosen: and there I will test them for you
  alternatives:
  - and there I will refine them for you
  - and there I will try them for you
  lexicon: HALOT
  rationale: צרף literally refers to smelting/refining metals, but in this context it is metaphorical for proving or testing the men. 'Test' communicates the intended action clearly in modern English. The plural object 'them' reflects the sense, though the suffix is morphologically singular/collective referring back to the people as a group.
- source_word: וְהָיָה
  chosen: And this is what will happen
  alternatives:
  - And it shall be
  - And it will be
  lexicon: HALOT
  rationale: A formal 'and it shall be' is possible, but the phrase introduces the procedure that follows. This rendering preserves the discourse function in readable English.
- source_word: אֲשֶׁר אֹמַר אֵלֶיךָ זֶה יֵלֵךְ אִתָּךְ
  chosen: anyone of whom I say to you, ‘This one shall go with you,’
  alternatives:
  - whoever I say to you, 'This one will go with you,'
  - the one of whom I say to you, 'This one shall go with you,'
  lexicon: HALOT
  rationale: The Hebrew construction identifies each individual by divine designation. 'Anyone of whom I say to you' is slightly more idiomatic than a rigidly literal rendering while preserving the selection formula.
- source_word: הוּא יֵלֵךְ אִתָּךְ
  chosen: he shall go with you
  alternatives:
  - that one shall go with you
  lexicon: HALOT
  rationale: The resumptive pronoun הוּא adds emphasis and confirmation. 'He shall go with you' preserves the masculine singular and the emphatic restatement.
- source_word: וְכֹל אֲשֶׁר אֹמַר אֵלֶיךָ זֶה לֹא יֵלֵךְ עִמָּךְ
  chosen: but anyone of whom I say to you, ‘This one shall not go with you,’
  alternatives:
  - and everyone of whom I say to you, 'This one shall not go with you,'
  - but the one of whom I say to you, 'This one shall not go with you,'
  lexicon: HALOT
  rationale: וְכֹל here functions distributively in contrast with the prior clause. 'But anyone' makes the contrast explicit in natural English.
- source_word: עִמָּךְ / אִתָּךְ
  chosen: with you
  lexicon: HALOT
  rationale: Both prepositional forms mean 'with you.' English does not need to preserve the stylistic variation.
- source_word: הוּא לֹא יֵלֵךְ
  chosen: he shall not go
  alternatives:
  - that one shall not go
  lexicon: HALOT
  rationale: Again the pronoun is resumptive and emphatic, confirming exclusion. 'He shall not go' preserves the force without awkwardness.
