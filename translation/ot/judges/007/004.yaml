theological_decisions:
- issue: Rendering the divine testing language
  chosen_reading: God says he will 'test' the people at the water
  alternative_readings:
  - God will 'refine' the people
  - God will 'prove/try' the people
  rationale: The metaphor of refining could be retained more formally, but in this narrative context the point is divine selection by means of a proving process. 'Test' preserves the meaning without importing later theological categories beyond the text.
  doctrine_reference: Translation philosophy §1, §6
- issue: Masculine singular selection formula
  chosen_reading: Retained as 'he shall go / he shall not go'
  alternative_readings:
  - they shall go / they shall not go
  - that one shall go / shall not go
  rationale: The Hebrew uses masculine singular forms for each selected individual. Per the project's gender-accurate policy, the singular masculine is preserved rather than neutralized.
  doctrine_reference: Translation philosophy §4
