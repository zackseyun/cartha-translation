id: JDG.7.3
reference: Judges 7:3
source:
  edition: WLC
  text: וְ/עַתָּ֗ה קְרָ֨א נָ֜א בְּ/אָזְנֵ֤י הָ/עָם֙ לֵ/אמֹ֔ר מִֽי יָרֵ֣א וְ/חָרֵ֔ד
    יָשֹׁ֥ב וְ/יִצְפֹּ֖ר מֵ/הַ֣ר הַ/גִּלְעָ֑ד וַ/יָּ֣שָׁב מִן הָ/עָ֗ם עֶשְׂרִ֤ים וּ/שְׁנַ֨יִם֙
    אֶ֔לֶף וַ/עֲשֶׂ֥רֶת אֲלָפִ֖ים נִשְׁאָֽרוּ־־׃ס
translation:
  text: Now please proclaim in the hearing of the people, saying, ‘Whoever is fearful
    and trembling, let him return and depart from Mount Gilead.’ Then twenty-two thousand
    of the people returned, and ten thousand remained.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew verb rendered 'depart' (וְיִצְפֹּר) is uncommon and debated;
      it may imply 'leave early' or 'slip away.'
    reason: lexical_alternative
  - marker: b
    text: '''Mount Gilead'' is the plain rendering of the Hebrew, though the geographical
      reference is difficult in this context; some understand it more broadly as the
      hill country of Gilead.'
    reason: cultural_note
lexical_decisions:
- source_word: קְרָא נָא
  chosen: please proclaim
  alternatives:
  - call out, please
  - announce, please
  lexicon: HALOT
  rationale: קרא in the imperative with נָא is a polite but urgent command to make
    a public announcement. 'Proclaim' fits the formal public setting better than the
    more generic 'call out.'
- source_word: בְּאָזְנֵי הָעָם
  chosen: in the hearing of the people
  alternatives:
  - in the ears of the people
  - to the people
  lexicon: HALOT
  rationale: The idiom is literally 'in the ears of,' but idiomatic English is 'in
    the hearing of.' This preserves the public-auditory sense without wooden phrasing.
- source_word: מִי יָרֵא וְחָרֵד
  chosen: Whoever is fearful and trembling
  alternatives:
  - Whoever is afraid and trembling
  - Whoever is fearful and anxious
  lexicon: HALOT
  rationale: 'The pair intensifies fear: יָרֵא denotes fearfulness, and חָרֵד conveys
    trembling or shaking. ''Fearful and trembling'' preserves the heightened emotional
    state and the participial/adjectival force.'
- source_word: יָשֹׁב
  chosen: let him return
  alternatives:
  - may he return
  - he shall return
  lexicon: HALOT
  rationale: 'As a jussive following the proclamation formula, the sense is permissive/directive:
    the fearful man is to go back. ''Let him return'' captures this better than a
    simple future.'
- source_word: וְיִצְפֹּר
  chosen: and depart
  alternatives:
  - and leave early
  - and go away
  - and turn back early
  lexicon: HALOT
  rationale: The verb is difficult and relatively rare. Traditional renderings often
    connect it with early departure or prompt withdrawal. In context, the core sense
    is that the fearful person is to withdraw from the muster. 'Depart' communicates
    the practical force clearly in modern English without overcommitting to a debated
    nuance; the more specific alternative is preserved in a footnote.
- source_word: מֵהַר הַגִּלְעָד
  chosen: from Mount Gilead
  alternatives:
  - from the hill country of Gilead
  - from the mountain of Gilead
  lexicon: HALOT
  rationale: הַר commonly means 'mountain' or 'hill country.' Since the Hebrew is
    singular and place-like, 'Mount Gilead' is the most straightforward rendering,
    while acknowledging the geographical difficulty in a footnote.
- source_word: וַיָּשָׁב מִן הָעָם
  chosen: Then ... of the people returned
  alternatives:
  - Then ... returned from the people
  - So ... from among the people returned
  lexicon: HALOT
  rationale: 'The singular verb with a following numeral is a common Hebrew collective
    construction. English requires an explicit plural subject with the number: ''twenty-two
    thousand of the people returned.'''
- source_word: עֶשְׂרִים וּשְׁנַיִם אֶלֶף
  chosen: twenty-two thousand
  alternatives:
  - twenty and two thousand
  lexicon: HALOT
  rationale: Standard contemporary English number expression.
- source_word: וַעֲשֶׂרֶת אֲלָפִים נִשְׁאָרוּ
  chosen: and ten thousand remained
  alternatives:
  - and ten thousand were left
  - and ten thousand were left over
  lexicon: HALOT
  rationale: נשאר means 'remain, be left.' 'Remained' is natural and concise in narrative
    English.
