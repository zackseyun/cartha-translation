id: JDG.7.19
reference: Judges 7:19
source:
  edition: WLC
  text: וַ/יָּבֹ֣א גִ֠דְעוֹן וּ/מֵאָה אִ֨ישׁ אֲשֶׁר אִתּ֜/וֹ בִּ/קְצֵ֣ה הַֽ/מַּחֲנֶ֗ה
    רֹ֚אשׁ הָ/אַשְׁמֹ֣רֶת הַ/תִּֽיכוֹנָ֔ה אַ֛ךְ הָקֵ֥ם הֵקִ֖ימוּ אֶת הַ/שֹּֽׁמְרִ֑ים
    וַֽ/יִּתְקְעוּ֙ בַּ/שּׁ֣וֹפָר֔וֹת וְ/נָפ֥וֹץ הַ/כַּדִּ֖ים אֲשֶׁ֥ר בְּ/יָדָֽ/ם־־־׃
translation:
  text: So Gideon and the hundred men who were with him came to the edge of the camp
    at the beginning of the middle watch, just as they had posted the watchmen; and
    they blew the trumpets and smashed the jars that were in their hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the middle night watch' or 'the second watch.' The Hebrew refers to
      a division of the night.
    reason: lexical_alternative
  - marker: b
    text: Or 'they had just set the watchmen' or 'they had stationed the guards.'
      The Hebrew construction emphasizes the action of posting the watch.
    reason: lexical_alternative
  - marker: c
    text: Hebrew shofarot, traditionally 'trumpets,' more specifically horns used
      for signaling.
    reason: cultural_note
lexical_decisions:
- source_word: בִּ/קְצֵה
  chosen: to the edge of
  alternatives:
  - at the outskirts of
  - to the outer edge of
  lexicon: HALOT
  rationale: קָצֶה denotes an extremity or edge. 'To the edge of the camp' is natural
    English and preserves the spatial sense without over-paraphrasing.
- source_word: רֹאשׁ
  chosen: at the beginning of
  alternatives:
  - at the start of
  - at the head of
  lexicon: HALOT
  rationale: Literally 'head,' but idiomatically marks the beginning of a time period.
    'At the beginning of' best conveys the temporal force in English.
- source_word: הָ/אַשְׁמֹרֶת הַ/תִּיכוֹנָה
  chosen: the middle watch
  alternatives:
  - the middle night watch
  - the second watch
  lexicon: HALOT
  rationale: The phrase refers to a division of the night watch. 'Middle watch' is
    concise and sufficiently transparent; 'night' is implied by 'watch' in context.
- source_word: אַךְ
  chosen: just as
  alternatives:
  - only
  - surely
  - indeed
  lexicon: HALOT
  rationale: 'Here אַךְ functions adverbially to mark immediacy or exact timing rather
    than restriction. ''Just as'' fits the sequence: they arrived precisely when the
    watch was being set.'
- source_word: הָקֵם הֵקִימוּ אֶת הַשֹּׁמְרִים
  chosen: they had posted the watchmen
  alternatives:
  - they had just set the watchmen
  - they had stationed the guards
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies or emphasizes the
    verbal action of קום in the Hiphil, here meaning to set/post guards. 'Had posted
    the watchmen' captures the pluperfect-like background sense in context. 'Watchmen'
    is retained over 'guards' to reflect the participial noun from שמר and the military-watch
    setting.
- source_word: וַיִּתְקְעוּ בַּשּׁוֹפָרוֹת
  chosen: they blew the trumpets
  alternatives:
  - they sounded the horns
  - they blew the ram's horns
  lexicon: HALOT
  rationale: שׁוֹפָר is specifically a horn, often a ram's horn, but in many English
    Bible contexts 'trumpet' is the established functional equivalent. Here 'trumpets'
    reads naturally while preserving the signaling function. The more specific 'ram's
    horns' is possible but not required by the immediate context.
- source_word: וְנָפוֹץ
  chosen: and smashed
  alternatives:
  - and broke
  - and shattered
  lexicon: HALOT
  rationale: The verb conveys forceful breaking/shattering. 'Smashed' communicates
    the sudden violent action appropriate to the military surprise.
- source_word: הַכַּדִּים
  chosen: the jars
  alternatives:
  - the pitchers
  - the clay jars
  lexicon: HALOT
  rationale: כַּד refers to a jar or pitcher. 'Jars' is clear modern English; 'pitchers'
    can sound more specialized or domestic. 'Clay' is possible by cultural inference
    but not explicit in the Hebrew.
- source_word: אֲשֶׁר בְּיָדָם
  chosen: that were in their hands
  alternatives:
  - that were in their hand
  - which they held
  lexicon: HALOT
  rationale: The phrase identifies the jars as those being carried by the men. 'In
    their hands' is a straightforward rendering of the plural suffix and avoids unnecessary
    interpretive expansion.
