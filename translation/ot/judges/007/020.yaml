theological_decisions:
- issue: Rendering the battle cry חֶרֶב לַיהוָה וּלְגִדְעוֹן
  chosen_reading: A sword for the LORD and for Gideon!
  alternative_readings:
  - The sword of the LORD and of Gideon!
  rationale: The phrase is syntactically compressed and could be expanded in more
    than one way. The chosen rendering preserves the Hebrew preposition לְ ('for')
    and the abrupt force of a shouted war cry, without importing a fuller interpretive
    expansion than the text requires. Because the traditional alternative is well
    known and plausible, it is preserved in a footnote rather than excluded.
  doctrine_reference: Translation philosophy items 1 and 3; Contested terms entry
    for יְהוָה YHWH
