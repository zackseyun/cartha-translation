id: JDG.7.20
reference: Judges 7:20
source:
  edition: WLC
  text: וַֽ֠/יִּתְקְעוּ שְׁלֹ֨שֶׁת הָ/רָאשִׁ֥ים בַּ/שּֽׁוֹפָרוֹת֮ וַ/יִּשְׁבְּר֣וּ
    הַ/כַּדִּים֒ וַ/יַּחֲזִ֤יקוּ בְ/יַד שְׂמאוֹלָ/ם֙ בַּ/לַּפִּדִ֔ים וּ/בְ/יַ֨ד יְמִינָ֔/ם
    הַ/שּׁוֹפָר֖וֹת לִ/תְק֑וֹעַ וַֽ/יִּקְרְא֔וּ חֶ֥רֶב לַֽ/יהוָ֖ה וּ/לְ/גִדְעֽוֹן־־׃
translation:
  text: Then the three companies blew the trumpets and shattered the jars. They held
    the torches in their left hands and the trumpets in their right hands to blow,
    and they cried out, “A sword for the LORD and for Gideon!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “The sword of the LORD and of Gideon!”
    reason: alternative_reading
lexical_decisions:
- source_word: שְׁלֹשֶׁת הָרָאשִׁים
  chosen: the three companies
  alternatives:
  - the three heads
  - the three divisions
  lexicon: HALOT
  rationale: In this military narrative, רָאשִׁים refers to the three divisions/groups
    Gideon arranged, not literal 'heads.' 'Companies' is idiomatic modern English
    for troop divisions and fits the context of 7:16, while remaining close to the
    source sense.
- source_word: שׁוֹפָרוֹת
  chosen: trumpets
  alternatives:
  - rams' horns
  - shofars
  lexicon: HALOT
  rationale: שׁוֹפָר denotes the horn instrument used for signaling. 'Trumpets' is
    the most natural English rendering in context; 'rams' horns' is more specific
    but less idiomatic here, and 'shofars' would transliterate rather than translate.
- source_word: הַכַּדִּים
  chosen: the jars
  alternatives:
  - the pitchers
  - the clay jars
  lexicon: HALOT
  rationale: כַּד refers to a jar/pitcher container. 'Jars' is clear, natural modern
    English. 'Pitchers' is traditional but can sound dated or overly specific in shape.
- source_word: וַיַּחֲזִיקוּ
  chosen: They held
  alternatives:
  - they seized
  - they grasped firmly
  lexicon: HALOT
  rationale: The verb חזק in Hiphil here describes taking/holding firmly in hand.
    'Held' communicates the action naturally in English without overstating force.
- source_word: בְיַד שְׂמֹאולָם ... וּבְיַד יְמִינָם
  chosen: in their left hands ... in their right hands
  alternatives:
  - in the hand of their left side ... in the hand of their right side
  lexicon: HALOT
  rationale: The singular 'hand' with plural suffix is distributive in Hebrew. English
    idiom requires plural 'hands' to express that each man held one item in each hand.
- source_word: לַפִּדִים
  chosen: the torches
  alternatives:
  - the firebrands
  - the flaming torches
  lexicon: HALOT
  rationale: לַפִּיד refers to a torch/flame-bearing object. 'Torches' is the standard
    and clearest rendering in this scene.
- source_word: לִתְקֹעַ
  chosen: to blow
  alternatives:
  - for blowing
  - to sound
  lexicon: HALOT
  rationale: 'The infinitive expresses purpose: they held the trumpets in order to
    blow them. ''To blow'' is concise and natural.'
- source_word: וַיִּקְרְאוּ
  chosen: they cried out
  alternatives:
  - they called out
  - they proclaimed
  lexicon: HALOT
  rationale: קרא here is a loud battle cry, not merely speaking. 'Cried out' best
    captures the force and urgency.
- source_word: חֶרֶב לַיהוָה וּלְגִדְעוֹן
  chosen: A sword for the LORD and for Gideon!
  alternatives:
  - The sword of the LORD and of Gideon!
  - A sword belongs to the LORD and to Gideon!
  lexicon: HALOT
  rationale: The Hebrew is verbless and elliptical. 'A sword for the LORD and for
    Gideon' preserves the terseness and battle-cry character. The traditional 'The
    sword of the LORD and of Gideon' is possible, but the preposition לְ is more directly
    'for/to,' so the chosen rendering stays closer to the Hebrew while remaining intelligible.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD,'
    following established reverential convention and the project's default rendering.
