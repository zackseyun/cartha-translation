id: JDG.7.22
reference: Judges 7:22
source:
  edition: WLC
  text: וַֽ/יִּתְקְעוּ֮ שְׁלֹשׁ מֵא֣וֹת הַ/שּׁוֹפָרוֹת֒ וַ/יָּ֣שֶׂם יְהוָ֗ה אֵ֣ת חֶ֥רֶב אִ֛ישׁ בְּ/רֵעֵ֖/הוּ וּ/בְ/כָל הַֽ/מַּחֲנֶ֑ה וַ/יָּ֨נָס הַֽ/מַּחֲנֶ֜ה עַד בֵּ֤ית הַשִּׁטָּה֙ צְֽרֵרָ֔תָ/ה עַ֛ד שְׂפַת אָבֵ֥ל מְחוֹלָ֖ה עַל טַבָּֽת־־־־־׃
translation:
  text: When the three hundred trumpets were blown, Yahweh set every man's sword against his companion and against the whole camp, and the camp fled as far as Beth-shittah toward Zererah, as far as the edge of Abel-meholah, by Tabbath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the three hundred ram's horns were blown.' The Hebrew שׁוֹפָרוֹת refers to horn-trumpets, often made from rams' horns.
    reason: lexical_alternative
  - marker: b
    text: Or 'throughout the whole camp.' The Hebrew may emphasize either that each man turned his sword against the others in the camp or that the panic spread through the entire camp.
    reason: alternative_reading
  - marker: c
    text: Beth-shittah, Zererah, Abel-meholah, and Tabbath are place names in the route of the fleeing army.
    reason: cultural_note
  - marker: d
    text: Or 'the bank' or 'the border' of Abel-meholah for 'the edge of Abel-meholah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְקְעוּ ... הַשּׁוֹפָרוֹת
  chosen: the three hundred trumpets were blown
  alternatives:
  - the three hundred ram's horns sounded
  - they blew the three hundred trumpets
  lexicon: HALOT
  rationale: שׁוֹפָר denotes a horn/trumpet, often specifically a ram's horn. 'Trumpets' is clear modern English and fits the military-signaling context; the passive English construction avoids overemphasizing the human subject and keeps focus on the event.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיָּשֶׂם ... אֵת חֶרֶב אִישׁ בְּרֵעֵהוּ
  chosen: set every man's sword against his companion
  alternatives:
  - turned each man's sword against his fellow
  - caused each man to fight his neighbor
  lexicon: HALOT
  rationale: The idiom literally speaks of placing/setting a man's sword against his companion. 'Set ... against' preserves the Hebrew imagery while remaining natural English. 'Companion' reflects רֵעַ here as fellow associate within the camp.
- source_word: וּבְכָל הַמַּחֲנֶה
  chosen: and against the whole camp
  alternatives:
  - and throughout the whole camp
  lexicon: HALOT
  rationale: The phrase extends the internal sword-turning to the camp at large. 'Against the whole camp' preserves the hostile force of בְ here in context, though 'throughout' is also possible.
- source_word: וַיָּנָס הַמַּחֲנֶה
  chosen: and the camp fled
  alternatives:
  - and the army fled
  lexicon: HALOT
  rationale: מַחֲנֶה can mean camp or army. Since the verse has just referred to the Midianite encampment and then its movement in retreat, 'camp' preserves the Hebrew term while still making sense as the force itself fleeing.
- source_word: עַד בֵּית הַשִּׁטָּה
  chosen: as far as Beth-shittah
  alternatives:
  - as far as Beth-shittahah
  lexicon: HALOT
  rationale: This is a place name and is transliterated according to the translation philosophy.
- source_word: צְרֵרָתָה
  chosen: toward Zererah
  alternatives:
  - to Zererah
  lexicon: HALOT
  rationale: The directional ending suggests motion toward the place. 'Toward Zererah' captures that nuance better than a simple 'to,' though either is defensible.
- source_word: שְׂפַת אָבֵל מְחוֹלָה
  chosen: the edge of Abel-meholah
  alternatives:
  - the bank of Abel-meholah
  - the border of Abel-meholah
  lexicon: HALOT
  rationale: שָׂפָה literally means lip/edge/bank. In a geographical expression, 'edge' is suitably broad and avoids over-specifying a riverbank where the text itself does not explicitly mention water.
- source_word: עַל טַבָּת
  chosen: by Tabbath
  alternatives:
  - toward Tabbath
  - as far as Tabbath
  lexicon: HALOT
  rationale: The preposition עַל with a place name here likely indicates proximity or location in relation to Tabbath. 'By' is concise and natural, while preserving some ambiguity.
- source_word: אִישׁ
  chosen: every man's
  alternatives:
  - each man's
  - every warrior's
  lexicon: HALOT
  rationale: 'The distributive sense is important: each individual turned on his fellow. ''Every man''s'' preserves the masculine singular representative force in line with the gender-accurate policy.'
