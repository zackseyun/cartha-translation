id: JDG.7.24
reference: Judges 7:24
source:
  edition: WLC
  text: וּ/מַלְאָכִ֡ים שָׁלַ֣ח גִּדְעוֹן֩ בְּ/כָל הַ֨ר אֶפְרַ֜יִם לֵ/אמֹ֗ר רְד֞וּ
    לִ/קְרַ֤את מִדְיָן֙ וְ/לִכְד֤וּ לָ/הֶם֙ אֶת הַ/מַּ֔יִם עַ֛ד בֵּ֥ית בָּרָ֖ה וְ/אֶת
    הַ/יַּרְדֵּ֑ן וַ/יִּצָּעֵ֞ק כָּל אִ֤ישׁ אֶפְרַ֨יִם֙ וַ/יִּלְכְּד֣וּ אֶת הַ/מַּ֔יִם
    עַ֛ד בֵּ֥ית בָּרָ֖ה וְ/אֶת הַ/יַּרְדֵּֽן־־־־־־׃
translation:
  text: And Gideon sent messengers throughout all the hill country of Ephraim, saying,
    “Come down to meet Midian, and seize the waters as far as Beth-barah, and the
    Jordan.” So every man of Ephraim was called out, and they seized the waters as
    far as Beth-barah, and the Jordan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seize the watercourses' or 'seize the fords'; the Hebrew reads literally
      'the waters,' likely referring to strategic crossing points.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'every man of Ephraim.' The singular collective likely refers to
      the fighting men of Ephraim being summoned as a group.
    reason: lexical_alternative
  - marker: c
    text: The verb rendered 'was called out' is difficult; some understand it more
      literally as 'cried out,' but the context favors the sense of being summoned
      or mustered.
    reason: alternative_reading
lexical_decisions:
- source_word: וּמַלְאָכִים
  chosen: messengers
  alternatives:
  - envoys
  lexicon: HALOT
  rationale: In this narrative context the word refers to human agents sent with a
    message, not supernatural 'angels.' 'Messengers' is the plain and natural English
    equivalent.
- source_word: שָׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Standard rendering for the Qal of שלח in narrative; 'sent' is both accurate
    and idiomatic.
- source_word: בְּכָל הַר אֶפְרַיִם
  chosen: throughout all the hill country of Ephraim
  alternatives:
  - throughout all Mount Ephraim
  - throughout all the mountains of Ephraim
  lexicon: HALOT
  rationale: הַר here denotes the hill-country region, not a single peak. 'Hill country
    of Ephraim' best reflects the geographic sense in readable English.
- source_word: רְדוּ
  chosen: Come down
  alternatives:
  - Go down
  - Descend
  lexicon: HALOT
  rationale: The imperative is literally 'go down/descend,' but in direct speech summoning
    nearby hearers, 'Come down' is idiomatic English and preserves the topographical
    movement from the highlands.
- source_word: לִקְרַאת מִדְיָן
  chosen: to meet Midian
  alternatives:
  - against Midian
  - to confront Midian
  lexicon: HALOT
  rationale: לקראת literally means 'to meet/toward the encounter of.' In military
    context it implies interception or confrontation. 'To meet Midian' preserves the
    Hebrew wording without over-paraphrasing.
- source_word: וְלִכְדוּ לָהֶם
  chosen: and seize
  alternatives:
  - and capture for yourselves
  - and take
  lexicon: HALOT
  rationale: לכד commonly means seize/capture. The pronoun לָהֶם likely has an ethical/dative
    nuance ('for yourselves' or 'for your side'), but explicit inclusion in English
    would sound awkward here; the core command is to seize strategic points.
- source_word: אֶת הַמַּיִם
  chosen: the waters
  alternatives:
  - the watercourses
  - the fords
  lexicon: HALOT
  rationale: Literally 'the waters.' In context this likely refers to water crossings
    or access points, but the Hebrew expression itself is broader. Main text keeps
    the literal phrase; a footnote preserves the contextual alternative.
- source_word: עַד בֵּית בָּרָה
  chosen: as far as Beth-barah
  alternatives:
  - up to Beth-barah
  lexicon: HALOT
  rationale: עַד marks extent. Beth-barah is treated as a place name and transliterated
    per project policy for names.
- source_word: וְאֶת הַיַּרְדֵּן
  chosen: and the Jordan
  alternatives:
  - and the Jordan River
  lexicon: HALOT
  rationale: The proper name is best rendered simply 'the Jordan'; 'River' is interpretive
    and unnecessary.
- source_word: וַיִּצָּעֵק כָּל אִישׁ אֶפְרַיִם
  chosen: So every man of Ephraim was called out
  alternatives:
  - Then every man of Ephraim cried out
  - Then every man of Ephraim was summoned
  lexicon: HALOT
  rationale: The Niphal/related passive-like form here is difficult if rendered woodenly
    as 'cried out.' In context, following Gideon's sending of messengers, the sense
    is that the men of Ephraim were mustered/summoned. 'Was called out' captures the
    likely force while remaining close to the narrative development. 'Every man' preserves
    the gender-accurate singular collective איש per translation policy.
- source_word: וַיִּלְכְּדוּ
  chosen: they seized
  alternatives:
  - they captured
  - they took
  lexicon: HALOT
  rationale: Same root as earlier command; 'seized' preserves lexical consistency
    across the verse.
