id: JDG.7.9
reference: Judges 7:9
source:
  edition: WLC
  text: וַֽ/יְהִי֙ בַּ/לַּ֣יְלָה הַ/ה֔וּא וַ/יֹּ֤אמֶר אֵלָי/ו֙ יְהוָ֔ה ק֖וּם רֵ֣ד בַּֽ/מַּחֲנֶ֑ה כִּ֥י נְתַתִּ֖י/ו בְּ/יָדֶֽ/ךָ׃
translation:
  text: And it happened that night that Yahweh said to him, “Arise, go down into the camp, for I have given it into your hand.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''into your hand,'' an idiom meaning into your power or control.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - That night
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new scene. 'And it happened' preserves the Hebrew discourse function without the archaic feel of 'came to pass.'
- source_word: בַּלַּיְלָה הַהוּא
  chosen: that night
  alternatives:
  - in that night
  - during that night
  lexicon: HALOT
  rationale: Idiomatic temporal expression. 'That night' is natural modern English and accurately conveys the definite time reference.
- source_word: וַיֹּאמֶר אֵלָיו
  chosen: said to him
  alternatives:
  - spoke to him
  lexicon: HALOT
  rationale: אמר is the standard verb of speaking; 'said to him' is the most direct and contextually fitting rendering.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: קוּם
  chosen: Arise
  alternatives:
  - Get up
  - Rise
  lexicon: HALOT
  rationale: Imperative calling Gideon to immediate action. 'Arise' preserves the elevated but still readable tone of divine command better than the more colloquial 'get up.'
- source_word: רֵד
  chosen: go down
  alternatives:
  - descend
  lexicon: HALOT
  rationale: ירד commonly means 'go down' in movement. This is the most natural English equivalent and fits the military/topographical context.
- source_word: בַּמַּחֲנֶה
  chosen: into the camp
  alternatives:
  - to the camp
  - against the camp
  lexicon: HALOT
  rationale: The preposition ב normally means 'in/into.' Here movement with 'go down' favors 'into the camp' rather than merely 'to the camp.' 'Against the camp' would overinterpret the military implication.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the command. 'For' is concise and preserves the causal force.
- source_word: נְתַתִּיו
  chosen: I have given it
  alternatives:
  - I have handed it over
  - I give it
  lexicon: HALOT
  rationale: נתן with pronominal suffix refers to the camp, standing for the enemy force. The perfect expresses a completed divine decision with present relevance; English present perfect captures this well.
- source_word: בְּיָדֶךָ
  chosen: into your hand
  alternatives:
  - into your power
  - into your control
  lexicon: HALOT
  rationale: A common Hebrew idiom for delivering someone or something into another's power. 'Into your hand' preserves the biblical idiom clearly enough in English.
