id: JDG.7.5
reference: Judges 7:5
source:
  edition: WLC
  text: וַ/יּ֥וֹרֶד אֶת הָ/עָ֖ם אֶל הַ/מָּ֑יִם וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל גִּדְע֗וֹן כֹּ֣ל אֲשֶׁר יָלֹק֩ בִּ/לְשׁוֹנ֨/וֹ מִן הַ/מַּ֜יִם כַּ/אֲשֶׁ֧ר יָלֹ֣ק הַ/כֶּ֗לֶב תַּצִּ֤יג אוֹת/וֹ֙ לְ/בָ֔ד וְ/כֹ֛ל אֲשֶׁר יִכְרַ֥ע עַל בִּרְכָּ֖י/ו לִ/שְׁתּֽוֹת־־ס־־־־־׃
translation:
  text: So he brought the people down to the water, and Yahweh said to Gideon, “Everyone who laps the water with his tongue, as a dog laps, you shall set apart by himself; likewise everyone who kneels on his knees to drink.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “you shall place him by himself”; the verb can mean to set or station someone separately.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹרֶד
  chosen: brought ... down
  alternatives:
  - led ... down
  - caused ... to go down
  lexicon: HALOT
  rationale: Hiphil of ירד is causative, indicating Gideon caused the people to go down to the water. 'Brought down' is natural English and preserves the causative sense better than a flat 'went down.'
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the troops
  - the men
  lexicon: HALOT
  rationale: עם is the broad collective 'people.' In this military context 'troops' is possible, but the Hebrew itself remains general, so 'the people' best preserves the wording.
- source_word: הַמָּיִם
  chosen: the water
  alternatives:
  - the waters
  lexicon: HALOT
  rationale: Though morphologically plural, מים commonly functions as a mass noun. Singular 'the water' is idiomatic English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כֹּל אֲשֶׁר יָלֹק
  chosen: Everyone who laps
  alternatives:
  - Whoever laps
  - Everyone who licks up
  lexicon: HALOT
  rationale: The construction is distributive and refers to each individual in the group. 'Everyone who laps' is clear and natural.
- source_word: בִּלְשׁוֹנוֹ
  chosen: with his tongue
  alternatives:
  - with the tongue
  lexicon: HALOT
  rationale: The suffix is singular masculine, referring to each individual. 'With his tongue' preserves the concrete image.
- source_word: מִן הַמַּיִם
  chosen: some of the water
  alternatives:
  - from the water
  - of the water
  lexicon: HALOT
  rationale: מן after a drinking verb can be rendered partitivally in English. 'Some of the water' reads naturally while preserving the sense of taking from the water source.
- source_word: כַּאֲשֶׁר יָלֹק הַכֶּלֶב
  chosen: as a dog laps
  alternatives:
  - just as the dog laps
  - as the dog licks
  lexicon: HALOT
  rationale: The comparison is explicit and vivid. English idiom prefers the indefinite class sense 'a dog' rather than 'the dog' here.
- source_word: תַּצִּיג אֹתוֹ לְבָד
  chosen: you shall set apart by himself
  alternatives:
  - you shall place him separately
  - you shall station him alone
  lexicon: HALOT
  rationale: The Hiphil of יצג here has the sense of placing or setting someone in position, and לְבָד marks separation. 'Set apart by himself' communicates the sorting action clearly.
- source_word: וְכֹל אֲשֶׁר יִכְרַע עַל בִּרְכָּיו לִשְׁתּוֹת
  chosen: likewise everyone who kneels on his knees to drink
  alternatives:
  - and everyone who kneels down to drink
  - and everyone who bends on his knees to drink
  lexicon: HALOT
  rationale: כרע means to kneel or bend the knees. Retaining 'on his knees' reflects the Hebrew phrase explicitly, even though English could shorten it. 'Likewise' makes clear that this second group is also to be separated, as implied by the command structure.
