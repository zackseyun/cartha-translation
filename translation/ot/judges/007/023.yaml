id: JDG.7.23
reference: Judges 7:23
source:
  edition: WLC
  text: וַ/יִּצָּעֵ֧ק אִֽישׁ יִשְׂרָאֵ֛ל מִ/נַּפְתָּלִ֥י וּ/מִן אָשֵׁ֖ר וּ/מִן כָּל
    מְנַשֶּׁ֑ה וַֽ/יִּרְדְּפ֖וּ אַחֲרֵ֥י מִדְיָֽן־־־־׃
translation:
  text: And the men of Israel were summoned from Naphtali, from Asher, and from all
    Manasseh, and they pursued Midian.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “was called out,” “was mustered,” or more literally “cried out.” The
      Hebrew verb is difficult here; in context it refers to Israel being gathered
      for pursuit.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “the man of Israel,” a collective expression meaning “the men of
      Israel” or “the Israelites.”
    reason: lexical_alternative
  - marker: c
    text: “Midian” stands for the Midianite forces.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצָּעֵק
  chosen: were summoned
  alternatives:
  - was called out
  - cried out
  - was mustered
  lexicon: HALOT
  rationale: 'The Niphal form of צעק here is best taken in a passive/reflexive sense
    in context: the Israelites are being called together or mustered in response to
    Midian''s flight, not themselves uttering a cry. ''Were summoned'' captures the
    military-gathering sense in natural English. ''Cried out'' would follow the more
    common active sense of the root but fits the stem and context less well here.'
- source_word: אִישׁ יִשְׂרָאֵל
  chosen: the men of Israel
  alternatives:
  - the man of Israel
  - Israelite men
  lexicon: HALOT
  rationale: Although singular in form, אִישׁ with a collective/national complement
    often functions distributively or collectively. The following plural verb וַיִּרְדְּפוּ
    confirms a plural sense. 'The men of Israel' is idiomatic and preserves the masculine
    reference of the Hebrew rather than flattening to a gender-neutral expression.
- source_word: מִנַּפְתָּלִי
  chosen: from Naphtali
  alternatives:
  - out of Naphtali
  lexicon: HALOT
  rationale: The preposition מן marks origin/source of those summoned. 'From Naphtali'
    is the most natural English rendering.
- source_word: וּמִן אָשֵׁר
  chosen: from Asher
  alternatives:
  - and from Asher
  lexicon: HALOT
  rationale: Continues the list of tribal sources. The conjunction is absorbed naturally
    into English list style.
- source_word: וּמִן כָּל מְנַשֶּׁה
  chosen: from all Manasseh
  alternatives:
  - from the whole of Manasseh
  - from all the tribe of Manasseh
  lexicon: HALOT
  rationale: כָּל intensifies the comprehensiveness of the tribal participation. 'From
    all Manasseh' is concise and preserves the force without over-expanding the tribal
    name.
- source_word: וַיִּרְדְּפוּ
  chosen: they pursued
  alternatives:
  - they chased
  - they gave chase to
  lexicon: HALOT
  rationale: רדף in military narrative commonly means to pursue an enemy. 'Pursued'
    is standard, accurate, and suitably formal for the narrative context.
- source_word: אַחֲרֵי מִדְיָן
  chosen: Midian
  alternatives:
  - after Midian
  - the Midianites
  lexicon: HALOT
  rationale: The preposition אַחֲרֵי with רדף is idiomatically rendered in English
    by a direct object ('pursued Midian'). 'Midian' here stands metonymically for
    the Midianite force; retaining the proper name follows the Hebrew closely while
    remaining clear.
