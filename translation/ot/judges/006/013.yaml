theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Reference of אֲדֹנִי in Gideon's address
  chosen_reading: human honorific ('my lord') addressed to the messenger
  alternative_readings:
  - divine title ('Lord')
  rationale: In this immediate exchange Gideon appears to address the figure respectfully before the fuller identity of the messenger is unfolded. Lowercase 'lord' avoids importing a theological conclusion not demanded by this clause alone.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
