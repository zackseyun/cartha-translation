id: JDG.6.13
reference: Judges 6:13
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֵלָ֤י/ו גִּדְעוֹן֙ בִּ֣י אֲדֹנִ֔/י וְ/יֵ֤שׁ יְהוָה֙ עִמָּ֔/נוּ וְ/לָ֥/מָּה מְצָאַ֖תְ/נוּ כָּל זֹ֑את וְ/אַיֵּ֣ה כָֽל נִפְלְאֹתָ֡י/ו אֲשֶׁר֩ סִפְּרוּ לָ֨/נוּ אֲבוֹתֵ֜י/נוּ לֵ/אמֹ֗ר הֲ/לֹ֤א מִ/מִּצְרַ֨יִם֙ הֶעֱלָ֣/נוּ יְהוָ֔ה וְ/עַתָּה֙ נְטָשָׁ֣/נוּ יְהוָ֔ה וַֽ/יִּתְּנֵ֖/נוּ בְּ/כַף מִדְיָֽן־־־־׃
translation:
  text: Gideon said to him, “Please, my lord, if Yahweh is with us, why then has all this happened to us? And where are all his wonders that our fathers told us about, saying, ‘Did not Yahweh bring us up from Egypt?’ But now Yahweh has abandoned us and given us into the hand of Midian.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Pardon me, my lord.” The Hebrew is a polite form of address.
    reason: lexical_alternative
  - marker: b
    text: Or “his wondrous deeds” or “his miracles.”
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: “into the hand of Midian,” an idiom meaning into Midian’s power.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּי אֲדֹנִי
  chosen: Please, my lord
  alternatives:
  - Pardon me, my lord
  - Please, sir
  lexicon: HALOT
  rationale: בִּי functions as a polite interjection ('please'/'pardon me'), and אֲדֹנִי here addresses the messenger respectfully, not as a divine title. 'My lord' preserves the deferential tone without implying deity.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְיֵשׁ יְהוָה עִמָּנוּ
  chosen: if the LORD is with us
  alternatives:
  - and the LORD is with us
  - since the LORD is with us
  lexicon: HALOT
  rationale: 'Though וְיֵשׁ is formally ''and there is,'' in this rhetorical context after Gideon''s address it introduces a conditional premise: ''if the LORD is with us.'' This best reflects the sense of Gideon''s challenge in natural English.'
- source_word: לָמָּה מְצָאַתְנוּ כָּל זֹאת
  chosen: why then has all this happened to us?
  alternatives:
  - why has all this found us?
  - why then did all this come upon us?
  lexicon: HALOT
  rationale: מצא with calamity as subject can mean 'befall' or 'happen to.' 'Happened to us' is idiomatic English while preserving the causative sense of adversity overtaking them. 'Then' reflects the inferential force in Gideon's argument.
- source_word: אַיֵּה
  chosen: where are
  alternatives:
  - where is
  lexicon: HALOT
  rationale: Used as an interrogative of absence/location. Because the object is plural ('all his wonders'), English requires 'where are.'
- source_word: נִפְלְאֹתָיו
  chosen: his wonders
  alternatives:
  - his wondrous deeds
  - his miracles
  lexicon: HALOT
  rationale: The noun denotes extraordinary acts that evoke wonder, often divine acts in salvation history. 'Wonders' preserves the lexical connection to God's marvelous deeds without over-specifying as 'miracles'.
- source_word: סִפְּרוּ לָנוּ אֲבוֹתֵינוּ
  chosen: that our fathers told us about
  alternatives:
  - that our ancestors recounted to us
  - which our fathers told us
  lexicon: HALOT
  rationale: סִפֵּר means recount/tell. 'Our fathers' is retained as gender-accurate and source-matching; it refers to the forefathers/tradition-bearers of Israel.
- source_word: הֲלֹא מִמִּצְרַיִם הֶעֱלָנוּ יְהוָה
  chosen: Did not the LORD bring us up from Egypt?
  alternatives:
  - Has not the LORD brought us up from Egypt?
  - Was it not the LORD who brought us up from Egypt?
  lexicon: HALOT
  rationale: The interrogative particle expects an affirmative answer. 'Bring us up from Egypt' is the standard idiom for the exodus and should be preserved rather than paraphrased as merely 'rescued us.'
- source_word: וְעַתָּה
  chosen: But now
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: In context this marks a sharp contrast between the exodus tradition and present distress. 'But now' brings out the adversative force naturally in English.
- source_word: נְטָשָׁנוּ
  chosen: has abandoned us
  alternatives:
  - has forsaken us
  - has cast us off
  lexicon: HALOT
  rationale: נטש conveys leaving, abandoning, or forsaking. 'Abandoned' is clear modern English and communicates the emotional force of Gideon's complaint.
- source_word: וַיִּתְּנֵנוּ בְּכַף מִדְיָן
  chosen: and given us into the hand of Midian
  alternatives:
  - and handed us over to Midian
  - and given us into Midian's power
  lexicon: HALOT
  rationale: The idiom 'into the hand of' expresses subjection to another's power. Retaining 'hand' preserves the Hebrew imagery while remaining understandable in English.
- source_word: מִדְיָן
  chosen: Midian
  lexicon: HALOT
  rationale: Standard English transliteration of the people/group name.
