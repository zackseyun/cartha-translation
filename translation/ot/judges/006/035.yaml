id: JDG.6.35
reference: Judges 6:35
source:
  edition: WLC
  text: וּ/מַלְאָכִים֙ שָׁלַ֣ח בְּ/כָל מְנַשֶּׁ֔ה וַ/יִזָּעֵ֥ק גַּם ה֖וּא אַחֲרָ֑י/ו
    וּ/מַלְאָכִ֣ים שָׁלַ֗ח בְּ/אָשֵׁ֤ר וּ/בִ/זְבֻלוּן֙ וּ/בְ/נַפְתָּלִ֔י וַֽ/יַּעֲל֖וּ
    לִ/קְרָאתָֽ/ם־־׃
translation:
  text: And he sent messengers throughout all Manasseh, and it too was summoned after
    him. He also sent messengers through Asher, Zebulun, and Naphtali, and they went
    up to meet them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and they went up to meet him'—the Hebrew could be understood as referring
      to Gideon, though the plural suffix more naturally points to the opposing forces.
    reason: alternative_reading
lexical_decisions:
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - envoys
  lexicon: HALOT
  rationale: In this military-mobilization context, the word refers to human agents
    carrying a summons, not angels. 'Messengers' is the most natural and transparent
    English rendering.
- source_word: שָׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Standard rendering of the verb in narrative context; 'sent' is clear
    and sufficiently formal without overtranslating.
- source_word: בְּכָל מְנַשֶּׁה
  chosen: throughout all Manasseh
  alternatives:
  - through all Manasseh
  - in all Manasseh
  lexicon: HALOT
  rationale: The preposition with the tribal territory indicates circulation through
    the whole region/clan grouping. 'Throughout all Manasseh' best conveys broad distribution
    of the summons.
- source_word: וַיִּזָּעֵק
  chosen: was summoned
  alternatives:
  - was called out
  - was mustered
  - cried out
  lexicon: HALOT
  rationale: 'The Niphal form here is best taken as passive/reflexive in a military
    sense: the tribe/group was called up in response to Gideon''s summons. ''Cried
    out'' would misread the form and context. ''Was summoned'' preserves the passive
    sense while remaining readable.'
- source_word: גַּם הוּא
  chosen: it too
  alternatives:
  - it also
  - he too
  lexicon: HALOT
  rationale: The pronoun refers back to Manasseh as a tribal entity, grammatically
    masculine singular in Hebrew but naturally rendered as 'it' in English for a tribe/territory.
- source_word: אַחֲרָיו
  chosen: after him
  alternatives:
  - behind him
  - following him
  lexicon: HALOT
  rationale: The phrase indicates rallying behind Gideon. 'After him' is the most
    direct rendering; the mobilization sense is clear from context.
- source_word: בְּאָשֵׁר וּבִזְבֻלוּן וּבְנַפְתָּלִי
  chosen: through Asher, Zebulun, and Naphtali
  alternatives:
  - to Asher, Zebulun, and Naphtali
  - in Asher, Zebulun, and Naphtali
  lexicon: HALOT
  rationale: The repeated preposition with tribal names most naturally means messengers
    were sent through/in those tribal territories to summon them. 'Through' matches
    the earlier phrase and keeps the dispatch imagery.
- source_word: וַיַּעֲלוּ
  chosen: went up
  alternatives:
  - came up
  - marched up
  lexicon: HALOT
  rationale: The verb literally means 'went up.' In military movement it can imply
    ascent or advance. Retaining 'went up' preserves the Hebrew narrative idiom without
    unnecessary paraphrase.
- source_word: לִקְרָאתָם
  chosen: to meet them
  alternatives:
  - to meet him
  lexicon: HALOT
  rationale: The suffix is plural, so the object is 'them.' In context this most likely
    refers to the opposing forces gathered in the Jezreel Valley, not Gideon alone.
    The plural should be preserved in the main text.
