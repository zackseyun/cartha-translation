theological_decisions:
- issue: Referent of the plural suffix in לִקְרָאתָם
  chosen_reading: the summoned tribes went up to meet the enemy forces
  alternative_readings:
  - the summoned tribes went up to meet Gideon and his forces
  rationale: The Hebrew suffix is plural and does not specify the antecedent explicitly.
    Given the immediate military context in Judges 6, the most likely referent is
    the hostile forces already assembled. However, because the antecedent is not explicit,
    the alternative is worth preserving in a footnote rather than being dogmatically
    resolved.
  doctrine_reference: Preserve theological/interpreive tension rather than resolve
    it where the source is genuinely ambiguous.
