id: JDG.6.34
reference: Judges 6:34
source:
  edition: WLC
  text: וְ/ר֣וּחַ יְהוָ֔ה לָבְשָׁ֖ה אֶת גִּדְע֑וֹן וַ/יִּתְקַע֙ בַּ/שּׁוֹפָ֔ר וַ/יִזָּעֵ֥ק
    אֲבִיעֶ֖זֶר אַחֲרָֽי/ו־׃
translation:
  text: Then the Spirit of the LORD clothed Gideon, and he blew the trumpet, and Abiezer
    was called out after him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Spirit of the LORD came upon Gideon'; literally, 'the Spirit of
      the LORD clothed Gideon.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew shofar, a horn used for signaling.
    reason: cultural_note
  - marker: c
    text: Or, 'Abiezer was summoned after him' or 'Abiezer rallied behind him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/ר֣וּחַ יְהוָ֔ה
  chosen: the Spirit of the LORD
  alternatives:
  - the רוח of the LORD
  - the wind of the LORD
  lexicon: HALOT
  rationale: רוּחַ can denote spirit, wind, or breath; in this narrative empowerment
    context, 'Spirit' is the clear sense. יְהוָה follows the project default 'the
    LORD' rather than 'Yahweh'.
- source_word: לָבְשָׁ֖ה אֶת גִּדְע֑וֹן
  chosen: clothed Gideon
  alternatives:
  - came upon Gideon
  - put on Gideon
  lexicon: HALOT
  rationale: The verb לבשׁ literally means 'to clothe/put on a garment.' Here the
    feminine subject 'Spirit' takes Gideon as object, yielding the vivid image that
    the Spirit 'clothed' Gideon. This preserves the Hebrew metaphor better than the
    more interpretive 'came upon.'
- source_word: וַ/יִּתְקַע֙ בַּ/שּׁוֹפָ֔ר
  chosen: he blew the trumpet
  alternatives:
  - he blew the ram's horn
  - he sounded the shofar
  lexicon: HALOT
  rationale: שׁוֹפָר is specifically a horn, often a ram's horn, but 'trumpet' is
    idiomatic and readily understood in English. 'Shofar' would preserve cultural
    specificity but is less accessible in the main text.
- source_word: וַ/יִזָּעֵ֥ק
  chosen: was called out
  alternatives:
  - was summoned
  - cried out
  - was mustered
  lexicon: HALOT
  rationale: 'The Niphal form here is best taken as passive/reflexive in context:
    the clan was summoned or rallied by Gideon''s trumpet blast. ''Was called out''
    preserves the passive sense without over-specifying military organization.'
- source_word: אֲבִיעֶ֖זֶר
  chosen: Abiezer
  rationale: Proper name transliterated according to project policy.
- source_word: אַחֲרָֽי/ו
  chosen: after him
  alternatives:
  - behind him
  - following him
  lexicon: HALOT
  rationale: The phrase indicates rallying in support of Gideon. 'After him' is a
    natural rendering that preserves the directional and allegiance nuance.
