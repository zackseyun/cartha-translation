id: JDG.6.33
reference: Judges 6:33
source:
  edition: WLC
  text: וְ/כָל מִדְיָ֧ן וַ/עֲמָלֵ֛ק וּ/בְנֵי קֶ֖דֶם נֶאֶסְפ֣וּ יַחְדָּ֑ו וַ/יַּעַבְר֥וּ
    וַֽ/יַּחֲנ֖וּ בְּ/עֵ֥מֶק יִזְרְעֶֽאל־־׃
translation:
  text: Then all Midian and Amalek and the people of the East gathered together, crossed
    over, and camped in the Valley of Jezreel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of the east,' an idiom for eastern peoples.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כָל מִדְיָן
  chosen: all Midian
  alternatives:
  - the whole of Midian
  - all the Midianites
  lexicon: HALOT
  rationale: The phrase is literally 'all Midian.' In English, 'all Midian' can stand
    as a collective reference to the Midianite force. 'All the Midianites' is interpretive
    but possible; the more source-near collective expression is retained.
- source_word: וַ/עֲמָלֵק
  chosen: and Amalek
  alternatives:
  - and the Amalekites
  lexicon: HALOT
  rationale: As with 'Midian,' the ethnonym can function collectively. 'Amalek' preserves
    the Hebrew form and collective sense without over-expanding.
- source_word: וּ/בְנֵי קֶדֶם
  chosen: and the people of the East
  alternatives:
  - and the sons of the east
  - and the eastern peoples
  lexicon: HALOT
  rationale: בני קדם is a standard Hebrew expression for eastern peoples/tribes. 'People
    of the East' is readable modern English and preserves the collective ethnic-geographic
    sense better than the more literal but less natural 'sons of the east.'
- source_word: נֶאֶסְפוּ יַחְדָּו
  chosen: gathered together
  alternatives:
  - assembled together
  - were gathered together
  lexicon: HALOT
  rationale: The Niphal of אסף here denotes assembling. 'Gathered together' reflects
    both the passive/reflexive nuance and the adverb יחדו without sounding wooden.
- source_word: וַ/יַּעַבְרוּ
  chosen: crossed over
  alternatives:
  - passed over
  - advanced across
  lexicon: HALOT
  rationale: עבר commonly means 'cross over/pass over.' 'Crossed over' is the most
    natural English rendering in a military movement context, though the object crossed
    is left implicit in Hebrew and English alike.
- source_word: וַֽ/יַּחֲנוּ
  chosen: camped
  alternatives:
  - encamped
  - pitched camp
  lexicon: HALOT
  rationale: חנה in military narrative means to camp/encamp. 'Camped' is clear modern
    English; 'encamped' is slightly more formal but not necessary.
- source_word: בְּ/עֵמֶק יִזְרְעֶאל
  chosen: in the Valley of Jezreel
  alternatives:
  - in the plain of Jezreel
  - in Jezreel Valley
  lexicon: HALOT
  rationale: עמק denotes a valley/plain. 'Valley of Jezreel' is the standard and natural
    English geographical rendering. Capitalizing 'Valley' treats it as a recognized
    place name in context.
