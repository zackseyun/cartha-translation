id: JDG.6.24
reference: Judges 6:24
source:
  edition: WLC
  text: וַ/יִּבֶן֩ שָׁ֨ם גִּדְע֤וֹן מִזְבֵּ֨חַ֙ לַֽ/יהוָ֔ה וַ/יִּקְרָא ל֥/וֹ יְהוָ֖ה שָׁל֑וֹם עַ֚ד הַ/יּ֣וֹם הַ/זֶּ֔ה עוֹדֶ֕/נּוּ בְּ/עָפְרָ֖ת אֲבִ֥י הָעֶזְרִֽי־׃פ
translation:
  text: Then Gideon built an altar there to Yahweh and called it, “Yahweh Is Peace.” It remains there to this day in Ophrah of the Abiezrites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH shalom''; traditionally transliterated ''Yahweh-shalom.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  chosen: built
  alternatives:
  - constructed
  lexicon: HALOT
  rationale: Standard rendering of בנה in narrative context for erecting an altar.
- source_word: מִזְבֵּחַ
  chosen: altar
  lexicon: HALOT
  rationale: The normal cultic term for an altar; no contextual reason to vary.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: 'Per doctrine, יְהוָה is rendered ''the LORD'' rather than transliterated. The preposition ל marks dedication/direction: the altar is built to the LORD.'
- source_word: וַיִּקְרָא לוֹ
  chosen: called it
  alternatives:
  - called to it
  - named it
  lexicon: HALOT
  rationale: In naming contexts קרא + ל often means 'call/name' something. English idiom prefers 'called it' here for the naming of the altar.
- source_word: יְהוָה שָׁלוֹם
  chosen: The LORD Is Peace
  alternatives:
  - The LORD Peace
  - The LORD is peace
  - Yahweh-shalom
  lexicon: HALOT
  rationale: This is the altar's commemorative name. Translating rather than transliterating preserves meaning, and supplying 'is' makes natural English while reflecting the verbless Hebrew naming formula.
- source_word: שָׁלוֹם
  chosen: Peace
  alternatives:
  - well-being
  - wholeness
  lexicon: HALOT
  rationale: '''Peace'' is the most natural concise rendering in a proper-name formula, while broader nuances such as well-being/wholeness are conceptually present but too expansive for the main text.'
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: Conventional but accurate English idiom for the Hebrew temporal expression indicating continued existence up to the narrator's present.
- source_word: עוֹדֶנּוּ
  chosen: It remains there
  alternatives:
  - it is still there
  - it is yet there
  lexicon: HALOT
  rationale: The form indicates continued existence/presence of the altar. 'It remains there' is clear modern English and preserves the durative sense.
- source_word: בְּעָפְרָת
  chosen: in Ophrah
  lexicon: HALOT
  rationale: Proper place name, transliterated by standard convention.
- source_word: אֲבִי הָעֶזְרִי
  chosen: of the Abiezrites
  alternatives:
  - of Abiezer
  - of the clan of Abiezer
  lexicon: HALOT
  rationale: The gentilic/clan designation is best represented as 'the Abiezrites' in this geographic identifier. This is smoother in English than the more wooden 'Abiezerite' after a place name.
