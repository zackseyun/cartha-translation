theological_decisions:
- issue: Rendering the divine name יְהוָה in both the dedication phrase and the altar name
  chosen_reading: Yahweh / Yahweh Is Peace
  alternative_readings:
  - Yahweh
  - Yahweh Is Peace
  - Jehovah-shalom
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
