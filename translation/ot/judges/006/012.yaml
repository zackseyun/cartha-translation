  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Understanding מַלְאַךְ יְהוָה
  chosen_reading: the angel of Yahweh
  alternative_readings:
  - the messenger of the LORD
  rationale: The translation preserves the Hebrew expression without importing a stronger theological identification such as a Christophany into the main text. The phrase is translated lexically rather than interpreted doctrinally.
