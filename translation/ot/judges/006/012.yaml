id: JDG.6.12
reference: Judges 6:12
source:
  edition: WLC
  text: וַ/יֵּרָ֥א אֵלָ֖י/ו מַלְּאַ֣ךְ יְהוָ֑ה וַ/יֹּ֣אמֶר אֵלָ֔י/ו יְהוָ֥ה עִמְּ/ךָ֖ גִּבּ֥וֹר הֶ/חָֽיִל׃
translation:
  text: Then the angel of Yahweh appeared to him and said to him, “Yahweh is with you, mighty warrior.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the messenger of the LORD.” The Hebrew word can mean either “messenger” or “angel,” though “angel” best fits this appearance scene.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: “mighty man of valor.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרָא
  chosen: appeared
  alternatives:
  - was seen
  - showed himself
  lexicon: HALOT
  rationale: The Niphal of ראה here is best rendered as an intransitive passive/reflexive, 'appeared,' the standard idiom for divine or angelic manifestation in narrative. 'Was seen' is more wooden and less natural in English.
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאָךְ can mean either 'messenger' or 'angel,' but in this narrative setting involving a visible heavenly appearance, 'angel' is the most natural English rendering. יְהוָה is rendered 'the LORD' per doctrine default.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֹּאמֶר אֵלָיו
  chosen: and said to him
  alternatives:
  - and said to Gideon
  - and told him
  lexicon: HALOT
  rationale: The Hebrew simply has the pronoun 'to him'; supplying the antecedent name would go beyond the immediate wording of the verse. 'Said to him' preserves the directness of the narrative.
- source_word: יְהוָה עִמְּךָ
  chosen: The LORD is with you
  alternatives:
  - The LORD be with you
  - The LORD is with you!
  lexicon: HALOT
  rationale: The verbless clause is most naturally rendered as a present-tense declaration in context, not a wish or benediction. English supplies 'is' idiomatically.
- source_word: גִּבּוֹר הֶחָיִל
  chosen: mighty warrior
  alternatives:
  - mighty man of valor
  - valiant warrior
  - mighty hero
  lexicon: HALOT
  rationale: The phrase denotes a strong, valiant, capable fighting man. 'Mighty warrior' is natural modern English and preserves the martial force better than the traditional but archaic 'mighty man of valor.'
