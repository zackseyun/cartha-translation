id: JDG.6.8
reference: Judges 6:8
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֧ח יְהוָ֛ה אִ֥ישׁ נָבִ֖יא אֶל בְּנֵ֣י יִשְׂרָאֵ֑ל וַ/יֹּ֨אמֶר לָ/הֶ֜ם
    כֹּה אָמַ֥ר יְהוָ֣ה אֱלֹהֵ֣י יִשְׂרָאֵ֗ל אָנֹכִ֞י הֶעֱלֵ֤יתִי אֶתְ/כֶם֙ מִ/מִּצְרַ֔יִם
    וָ/אֹצִ֥יא אֶתְ/כֶ֖ם מִ/בֵּ֥ית עֲבָדִֽים־־׀׃
translation:
  text: 'Then the LORD sent a man, a prophet, to the sons of Israel, and he said to
    them, “Thus says the LORD, the God of Israel: I brought you up from Egypt, and
    I brought you out from the house of slaves.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to the Israelites” or “to the children of Israel.”
    reason: lexical_alternative
  - marker: b
    text: Or “from the house of slavery.” The Hebrew is literally “from the house
      of slaves.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: Then ... sent
  alternatives:
  - And ... sent
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative progression while preserving sequence; 'and' is possible but less idiomatic
    here.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the LXX/English Bible pattern.
- source_word: אִישׁ נָבִיא
  chosen: a man, a prophet
  alternatives:
  - a prophet
  - a prophetic man
  lexicon: HALOT
  rationale: The Hebrew uses both nouns appositionally. Rendering both preserves the
    wording and the emphasis that the messenger was a man who was a prophet, not merely
    collapsing to 'a prophet.'
- source_word: אֶל בְּנֵי יִשְׂרָאֵל
  chosen: to the sons of Israel
  alternatives:
  - to the Israelites
  - to the children of Israel
  lexicon: HALOT
  rationale: Gender-accurate policy favors preserving the masculine plural where it
    refers to the covenant people corporately. 'Sons of Israel' is more formally aligned
    to the Hebrew than 'Israelites,' while remaining understandable.
- source_word: וַיֹּאמֶר לָהֶם
  chosen: and he said to them
  alternatives:
  - and said to them
  lexicon: HALOT
  rationale: The explicit subject in English helps clarity after the introduction
    of the prophet and preserves the narrative flow.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus said
  lexicon: HALOT
  rationale: This is the standard prophetic messenger formula. Present-tense 'says'
    is idiomatic in English for prophetic citation even when introduced by past narrative.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  alternatives:
  - Israel's God
  lexicon: HALOT
  rationale: This preserves the covenantal title in a clear, standard English form.
- source_word: אָנֹכִי
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis in Hebrew, but English already
    conveys sufficient force in the divine self-declaration without overtranslation.
    The emphasis is retained by the direct first-person statement.
- source_word: הֶעֱלֵיתִי
  chosen: I brought you up
  alternatives:
  - I led you up
  lexicon: HALOT
  rationale: עלה in the Hiphil commonly describes the exodus as bringing up from Egypt.
    'Brought you up' preserves the established exodus idiom.
- source_word: מִמִּצְרַיִם
  chosen: from Egypt
  lexicon: HALOT
  rationale: Straightforward geographic source phrase.
- source_word: וָאֹצִיא
  chosen: and I brought you out
  alternatives:
  - and I led you out
  lexicon: HALOT
  rationale: יצא in the Hiphil means to cause to go out, a standard exodus expression.
    'Brought you out' is natural and preserves the deliverance motif.
- source_word: מִבֵּית עֲבָדִים
  chosen: from the house of slaves
  alternatives:
  - from the house of slavery
  - from the slave house
  - from the house of bondage
  lexicon: HALOT
  rationale: Literally, 'from the house of slaves.' This keeps the concrete Hebrew
    image and reflects the bonded condition more directly than the traditional but
    more abstract 'house of bondage.' 'House of slavery' is also possible, but 'house
    of slaves' more closely matches the plural noun עֲבָדִים.
