theological_decisions:
- issue: Force of אֲדֹנָי in Gideon's address
  chosen_reading: Rendered as respectful human-style address, 'my lord,' with lowercase
  alternative_readings:
  - Rendered as divine title, 'Lord'
  rationale: The immediate discourse presents Gideon speaking deferentially before
    full clarity about the speaker's identity. Lowercase preserves the narrative tension
    rather than resolving it prematurely.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
