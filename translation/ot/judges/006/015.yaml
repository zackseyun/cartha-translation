id: JDG.6.15
reference: Judges 6:15
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֵלָי/ו֙ בִּ֣י אֲדֹנָ֔/י בַּ/מָּ֥ה אוֹשִׁ֖יעַ אֶת יִשְׂרָאֵ֑ל
    הִנֵּ֤ה אַלְפִּ/י֙ הַ/דַּ֣ל בִּ/מְנַשֶּׁ֔ה וְ/אָנֹכִ֥י הַ/צָּעִ֖יר בְּ/בֵ֥ית אָבִֽ/י־׃
translation:
  text: But he said to him, “Please, my lord, how can I save Israel? Look, my clan
    is the weakest in Manasseh, and I am the youngest in my father’s house.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'my family group' (literally, 'my thousand'); the Hebrew term can refer
      to a clan division.
    reason: lexical_alternative
  - marker: b
    text: Or, 'the poorest' or 'the least' in Manasseh.
    reason: lexical_alternative
  - marker: c
    text: Or, 'the least' in my father’s house.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּי
  chosen: Please
  alternatives:
  - Pardon me
  - Excuse me
  lexicon: HALOT
  rationale: Discourse particle used in polite entreaty, not a literal locative sense
    here. 'Please' gives natural modern English while preserving Gideon's deferential
    appeal.
- source_word: אֲדֹנָי
  chosen: my lord
  alternatives:
  - Lord
  - sir
  lexicon: HALOT
  rationale: Here Gideon addresses the messenger respectfully, not necessarily using
    the divine name/title. Lowercase 'my lord' preserves the ambiguity of respectful
    address and avoids importing a stronger theological claim than the immediate wording
    requires.
- source_word: בַּמָּה
  chosen: how can
  alternatives:
  - by what
  - with what
  lexicon: HALOT
  rationale: Idiomatic interrogative asking by what means Gideon could accomplish
    the task. 'How can' is the most natural English equivalent in context.
- source_word: אוֹשִׁיעַ
  chosen: I save
  alternatives:
  - I deliver
  - I rescue
  lexicon: HALOT
  rationale: From יָשַׁע in the Hiphil, meaning to save/deliver. 'Save' is retained
    as the broad, standard rendering; 'deliver' and 'rescue' are possible but less
    consistent with common biblical usage.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Marks attention to the explanation that follows. 'Look' is readable modern
    English and preserves the demonstrative force without archaic tone.
- source_word: אַלְפִּי
  chosen: my clan
  alternatives:
  - my thousand
  - my family group
  lexicon: HALOT
  rationale: Though literally related to 'thousand,' in tribal/social contexts אֶלֶף
    can denote a clan or subdivision. 'My clan' best fits the social sense in context
    and avoids a misleadingly literal rendering.
- source_word: הַדַּל
  chosen: the weakest
  alternatives:
  - the poorest
  - the least
  lexicon: HALOT
  rationale: דַּל can denote lowliness, weakness, or poverty. In this context of social
    standing and capability within Manasseh, 'the weakest' best captures Gideon's
    claim of insignificance and inability.
- source_word: בִּמְנַשֶּׁה
  chosen: in Manasseh
  lexicon: HALOT
  rationale: Straightforward tribal reference; transliterated proper name per translation
    philosophy.
- source_word: הַצָּעִיר
  chosen: the youngest
  alternatives:
  - the least
  - the smallest
  lexicon: HALOT
  rationale: Can mean small/insignificant/young. In the phrase 'in my father's house,'
    'the youngest' is the most natural familial sense, while still implying lesser
    status.
- source_word: בְּבֵית אָבִי
  chosen: in my father’s house
  alternatives:
  - in my father’s household
  lexicon: HALOT
  rationale: A standard Hebrew expression for the paternal household/family unit.
    'House' is retained for biblical continuity, while still understandable in modern
    English.
