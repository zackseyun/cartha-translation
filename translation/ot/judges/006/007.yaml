id: JDG.6.7
reference: Judges 6:7
source:
  edition: WLC
  text: וַ/יְהִ֕י כִּֽי זָעֲק֥וּ בְנֵֽי יִשְׂרָאֵ֖ל אֶל יְהוָ֑ה עַ֖ל אֹד֥וֹת מִדְיָֽן־־־׃
translation:
  text: And it happened that, when the sons of Israel cried out to the LORD because
    of Midian,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew reads 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'on account of Midian.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened that
  alternatives:
  - And it came to pass
  - Now it happened that
  lexicon: HALOT
  rationale: The waw-consecutive form of היה introduces a new narrative development.
    'And it happened that' preserves the Hebrew narrative marker in readable modern
    English without archaic diction.
- source_word: כִּי
  chosen: when
  alternatives:
  - that
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the temporal clause following ויהי. ''When'' best
    reflects the syntax: ''it happened that, when...'''
- source_word: זָעֲקוּ
  chosen: cried out
  alternatives:
  - called out
  - cried
  lexicon: HALOT
  rationale: זעק commonly denotes a cry for help in distress. 'Cried out' captures
    both urgency and appeal better than the flatter 'called out.'
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: This is the literal Hebrew expression. In keeping with the gender-accurate
    principle, 'sons of Israel' preserves the source form; 'Israelites' is possible
    but less transparent to the Hebrew wording.
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition אֶל marks direction toward the one addressed in prayer.
    Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's default rendering for the divine name, preserving
    established reverential convention and the pattern noted in the doctrine document.
- source_word: עַל אֹדוֹת
  chosen: because of
  alternatives:
  - on account of
  - concerning
  lexicon: HALOT
  rationale: The phrase עַל אֹדוֹת here gives the reason for the cry. 'Because of'
    is the clearest idiomatic English equivalent in context.
- source_word: מִדְיָן
  chosen: Midian
  lexicon: HALOT
  rationale: Standard English transliteration of the people/group name is appropriate.
