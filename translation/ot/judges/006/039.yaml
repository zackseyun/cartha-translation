id: JDG.6.39
reference: Judges 6:39
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר גִּדְעוֹן֙ אֶל הָ֣/אֱלֹהִ֔ים אַל יִ֤חַר אַפְּ/ךָ֙ בִּ֔/י וַ/אֲדַבְּרָ֖ה
    אַ֣ךְ הַ/פָּ֑עַם אֲנַסֶּ֤ה נָּא רַק הַ/פַּ֨עַם֙ בַּ/גִּזָּ֔ה יְהִי נָ֨א חֹ֤רֶב
    אֶל הַ/גִּזָּה֙ לְ/בַדָּ֔/הּ וְ/עַל כָּל הָ/אָ֖רֶץ יִֽהְיֶה טָּֽל־־־־־־־־־׃
translation:
  text: 'Then Gideon said to God, “Do not let your anger burn against me, and let
    me speak just this once. Please let me test just this once with the fleece: let
    there be dryness on the fleece alone, and on all the ground let there be dew.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Do not be angry with me.' The Hebrew idiom is literally, 'Do not let
      your anger burn against me.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'Please let me try just this once with the fleece.'
    reason: lexical_alternative
  - marker: c
    text: '''Ground'' could also be rendered ''land'' or ''earth''; here it refers
      to the area around the fleece in contrast with the fleece itself.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל יִחַר אַפְּךָ בִּי
  chosen: Do not let your anger burn against me
  alternatives:
  - Do not be angry with me
  - Do not let your nose burn against me
  lexicon: HALOT
  rationale: The idiom literally speaks of the nose/anger burning. 'Do not let your
    anger burn against me' preserves the Hebrew metaphor more transparently than the
    flatter 'do not be angry with me,' while remaining natural English.
- source_word: וַאֲדַבְּרָה
  chosen: and let me speak
  alternatives:
  - that I may speak
  - and I will speak
  lexicon: HALOT
  rationale: The cohortative expresses Gideon's request/resolve to continue speaking.
    'Let me speak' fits the polite plea in context.
- source_word: אַךְ הַפָּעַם
  chosen: just this once
  alternatives:
  - only this time
  - but this once
  lexicon: HALOT
  rationale: This adverbial phrase limits the request. 'Just this once' is idiomatic
    modern English and preserves the sense of a final, restricted appeal.
- source_word: אֲנַסֶּה נָּא
  chosen: Please let me test
  alternatives:
  - Please let me try
  - Please let me put to the test
  lexicon: HALOT
  rationale: נסה here means to test/try. Because Gideon is asking permission to seek
    another sign, 'Please let me test' best reflects the action without over-paraphrase.
- source_word: רַק הַפַּעַם
  chosen: just this once
  alternatives:
  - only this time
  - this one time only
  lexicon: HALOT
  rationale: The repetition intensifies the limitation of Gideon's request. Rendering
    similarly in English preserves the rhetorical emphasis.
- source_word: בַּגִּזָּה
  chosen: with the fleece
  alternatives:
  - by the fleece
  - on the fleece
  lexicon: HALOT
  rationale: The preposition marks the object/instrument of the test. 'With the fleece'
    reads naturally in English while keeping the fleece central to the sign.
- source_word: יְהִי נָא חֹרֶב
  chosen: let there be dryness
  alternatives:
  - please let it be dry
  - let there be drought
  lexicon: HALOT
  rationale: חֹרֶב denotes dryness rather than a full-scale drought here. The existential
    phrasing mirrors the Hebrew jussive construction.
- source_word: אֶל הַגִּזָּה לְבַדָּהּ
  chosen: on the fleece alone
  alternatives:
  - upon the fleece only
  - to the fleece alone
  lexicon: HALOT
  rationale: Although אֶל often means 'to,' in this context with moisture/dryness
    it functions spatially. 'On the fleece alone' communicates the intended distribution
    of dryness clearly.
- source_word: וְעַל כָּל הָאָרֶץ יִהְיֶה טָּל
  chosen: and on all the ground let there be dew
  alternatives:
  - and on all the earth let there be dew
  - while dew is on all the land
  lexicon: HALOT
  rationale: הָאָרֶץ can mean earth/land/ground. In this immediate contrast with the
    fleece, 'ground' best conveys the local surface area rather than the whole world.
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the God
  lexicon: HALOT
  rationale: With the article, Hebrew can still refer to the true God in narrative
    address. English idiom normally omits the article here.
