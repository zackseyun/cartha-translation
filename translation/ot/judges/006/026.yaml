theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering אֲשֵׁרָה
  chosen_reading: Asherah
  alternative_readings:
  - Asherah pole
  - wooden image of Asherah
  rationale: The term likely denotes a cultic object associated with the goddess Asherah,
    but the exact physical referent is debated. To avoid importing a more specific
    identification than the Hebrew requires, the main text keeps 'Asherah' and a footnote
    preserves the explanatory alternative.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, #5'
