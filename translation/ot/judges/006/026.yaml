id: JDG.6.26
reference: Judges 6:26
source:
  edition: WLC
  text: וּ/בָנִ֨יתָ מִזְבֵּ֜חַ לַ/יהוָ֣ה אֱלֹהֶ֗י/ךָ עַ֣ל רֹ֧אשׁ הַ/מָּע֛וֹז הַ/זֶּ֖ה
    בַּ/מַּֽעֲרָכָ֑ה וְ/לָֽקַחְתָּ֙ אֶת הַ/פָּ֣ר הַ/שֵּׁנִ֔י וְ/הַעֲלִ֣יתָ עוֹלָ֔ה
    בַּ/עֲצֵ֥י הָ/אֲשֵׁרָ֖ה אֲשֶׁ֥ר תִּכְרֹֽת־׃
translation:
  text: Then build an altar to the LORD your God on the top of this stronghold, in
    the proper arrangement, and take the second bull and offer it up as a burnt offering
    with the wood of the Asherah that you cut down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the wood of the Asherah pole.' The Hebrew term may refer to a cultic
      wooden object associated with Asherah.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָנִיתָ
  chosen: Then build
  alternatives:
  - and build
  - you shall build
  lexicon: HALOT
  rationale: Qal perfect 2ms with prefixed conjunction in sequential instruction;
    rendered as an imperative-like future command in smooth English. 'Then' captures
    the narrative-command sequence better than a bare 'and'.
- source_word: מִזְבֵּחַ
  chosen: an altar
  lexicon: HALOT
  rationale: Standard rendering for sacrificial structure; no contextual reason to
    vary.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' The preposition ל marks dedication/direction,
    naturally expressed here as 'to the LORD.'
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'Retained explicitly to preserve the covenantal address: ''the LORD your
    God,'' not merely ''the LORD.'''
- source_word: עַל רֹאשׁ הַמָּעוֹז הַזֶּה
  chosen: on the top of this stronghold
  alternatives:
  - on the top of this fortress
  - on the summit of this refuge
  lexicon: HALOT
  rationale: רֹאשׁ is literally 'head/top.' מָעוֹז denotes a place of strength or
    fortification. 'Stronghold' fits the local cultic/high-place setting and is more
    natural than 'fortress' while preserving the sense of a fortified height.
- source_word: בַּמַּעֲרָכָה
  chosen: in the proper arrangement
  alternatives:
  - with the arrangement
  - in orderly fashion
  - on the laid stones
  lexicon: HALOT
  rationale: The noun can denote arrangement or orderly disposition. Here it most
    likely refers to building/preparing the altar in an orderly/proper way. 'In the
    proper arrangement' preserves the concreteness without over-specifying stones
    or wood.
- source_word: וְלָקַחְתָּ אֶת־הַפָּר הַשֵּׁנִי
  chosen: and take the second bull
  alternatives:
  - and take the second young bull
  lexicon: HALOT
  rationale: פַּר is a bull. 'Second' is retained literally, likely distinguishing
    it from the first bull mentioned in the context. 'Young' is possible in some contexts
    but not required by the noun itself here.
- source_word: וְהַעֲלִיתָ עוֹלָה
  chosen: and offer it up as a burnt offering
  alternatives:
  - and sacrifice it as a burnt offering
  - and cause it to ascend as a burnt offering
  lexicon: HALOT
  rationale: The Hiphil of עלה with עֹלָה is sacrificial idiom. 'Offer it up as a
    burnt offering' is idiomatic English that preserves the technical sacrificial
    sense.
- source_word: בַּעֲצֵי הָאֲשֵׁרָה
  chosen: with the wood of the Asherah
  alternatives:
  - with the wood of the Asherah pole
  - with the wood from the Asherah image
  lexicon: HALOT
  rationale: אֲשֵׁרָה may refer to the cult object associated with Asherah. The Hebrew
    here names the object directly; 'Asherah' is retained rather than paraphrased,
    since the exact form (pole/tree/image) is debated. A footnote preserves the common
    explanatory alternative.
- source_word: אֲשֶׁר תִּכְרֹת
  chosen: that you cut down
  alternatives:
  - which you shall cut down
  - that you are to cut down
  lexicon: HALOT
  rationale: Qal imperfect 2ms after relative particle in instructional context; rendered
    as a relative clause referring to the Asherah to be felled for fuel.
