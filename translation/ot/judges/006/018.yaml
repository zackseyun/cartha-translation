theological_decisions:
- issue: Sense of מִנְחָה in Gideon's presentation
  chosen_reading: offering
  alternative_readings:
  - gift
  - tribute
  - grain offering
  rationale: The term can denote several kinds of presented gift. In this context
    the narrative moves toward a divinely accepted presentation, so 'offering' preserves
    the religious resonance while not over-specifying the material as a formal grain
    offering.
  doctrine_reference: Translation philosophy §§1, 3, 5
