id: JDG.6.18
reference: Judges 6:18
source:
  edition: WLC
  text: אַל נָ֨א תָמֻ֤שׁ מִ/זֶּה֙ עַד בֹּאִ֣/י אֵלֶ֔י/ךָ וְ/הֹֽצֵאתִי֙ אֶת מִנְחָתִ֔/י
    וְ/הִנַּחְתִּ֖י לְ/פָנֶ֑י/ךָ וַ/יֹּאמַ֕ר אָנֹכִ֥י אֵשֵׁ֖ב עַ֥ד שׁוּבֶֽ/ךָ־־־׃
translation:
  text: Please do not depart from here until I come to you and bring out my offering
    and set it before you." And he said, "I will stay until you return.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "my gift" or "my tribute"; the Hebrew term can refer broadly to a presented
      gift and in some contexts to an offering.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָמֻשׁ
  chosen: depart
  alternatives:
  - move
  - go away
  - leave
  lexicon: HALOT
  rationale: The verb מוש in this context means to move away or depart. 'Depart' is
    natural modern English and fits Gideon's request that the visitor remain in place.
- source_word: מִזֶּה
  chosen: from here
  alternatives:
  - from this place
  - from here
  lexicon: HALOT
  rationale: The deictic phrase points to the present location. 'From here' is idiomatic
    and sufficiently precise.
- source_word: עַד בֹּאִי אֵלֶיךָ
  chosen: until I come to you
  alternatives:
  - until my coming to you
  lexicon: HALOT
  rationale: This infinitive construct with pronominal suffix is most naturally rendered
    as a finite clause in English.
- source_word: וְהוֹצֵאתִי
  chosen: and bring out
  alternatives:
  - and bring forth
  - and take out
  lexicon: HALOT
  rationale: The Hiphil of יצא here refers to bringing something out from where Gideon
    is going to prepare it. 'Bring out' is clear and idiomatic.
- source_word: מִנְחָתִי
  chosen: my offering
  alternatives:
  - my gift
  - my tribute
  - my grain offering
  lexicon: HALOT
  rationale: מִנְחָה can denote a gift, tribute, or offering. In this narrative setting
    Gideon prepares food and presents it before the messenger in a manner that takes
    on sacrificial overtones. 'Offering' best preserves that ambiguity without prematurely
    narrowing it to 'grain offering,' which would be too specific here.
- source_word: וְהִנַּחְתִּי לְפָנֶיךָ
  chosen: and set it before you
  alternatives:
  - and place it before you
  - and lay it before you
  lexicon: HALOT
  rationale: The idiom means to place something in someone's presence. 'Set it before
    you' is natural English and preserves the formal tone.
- source_word: אָנֹכִי אֵשֵׁב
  chosen: I will stay
  alternatives:
  - I will sit
  - I will remain
  lexicon: HALOT
  rationale: Although ישב is literally 'sit,' in context the sense is to remain or
    stay in place. 'Stay' communicates the intended meaning more clearly in English.
- source_word: עַד שׁוּבֶךָ
  chosen: until you return
  alternatives:
  - until your returning
  lexicon: HALOT
  rationale: The infinitive construct with suffix is best rendered as a finite clause
    in idiomatic English.
- source_word: נָא
  chosen: Please
  alternatives:
  - I pray you
  lexicon: HALOT
  rationale: נָא marks polite entreaty. 'Please' conveys the tone in readable modern
    English.
