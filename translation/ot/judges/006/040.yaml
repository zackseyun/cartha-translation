id: JDG.6.40
reference: Judges 6:40
source:
  edition: WLC
  text: וַ/יַּ֧עַשׂ אֱלֹהִ֛ים כֵּ֖ן בַּ/לַּ֣יְלָה הַ/ה֑וּא וַ/יְהִי חֹ֤רֶב אֶל הַ/גִּזָּה֙
    לְ/בַדָּ֔/הּ וְ/עַל כָּל הָ/אָ֖רֶץ הָ֥יָה טָֽל־־־־׃פ
translation:
  text: 'And God did so that night: there was dryness on the fleece alone, and on
    all the ground there was dew.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on all the land there was dew.' The Hebrew אֶרֶץ can mean 'ground,'
      'land,' or 'earth'; here 'ground' best fits the immediate setting of Gideon's
      sign.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - acted
  - made it happen
  lexicon: HALOT
  rationale: 'The verb עשה here refers back to Gideon''s requested sign and is most
    naturally rendered with the simple English verb ''did'': ''God did so.'' This
    preserves the concise narrative style and the anaphoric force of כֵּן.'
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In this narrative context אֱלֹהִים refers to the God of Israel and is
    best rendered 'God.' There is no occurrence of the divine name YHWH in this verse
    itself.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  lexicon: HALOT
  rationale: כֵּן points back to the requested condition in the previous verse. 'So'
    is natural modern English and preserves the backward reference without sounding
    archaic like 'thus.'
- source_word: בַּלַּיְלָה הַהוּא
  chosen: that night
  alternatives:
  - on that night
  lexicon: HALOT
  rationale: The prepositional phrase is idiomatically rendered 'that night.' This
    is a standard English equivalent that preserves temporal specificity without unnecessary
    stiffness.
- source_word: וַיְהִי
  chosen: there was
  alternatives:
  - and it was
  - and there came to be
  lexicon: HALOT
  rationale: The existential use of היה is best represented by 'there was' in both
    clauses, yielding clear English while reflecting the Hebrew narrative construction.
- source_word: חֹרֶב
  chosen: dryness
  alternatives:
  - dry
  - dry ground
  - dry condition
  lexicon: HALOT
  rationale: חֹרֶב denotes dryness rather than merely the adjective 'dry.' 'Dryness'
    best captures the nominal form and the contrast with dew. 'Dry' would be understandable
    but less formally aligned with the Hebrew noun.
- source_word: אֶל הַגִּזָּה
  chosen: on the fleece
  alternatives:
  - upon the fleece
  - with respect to the fleece
  lexicon: HALOT
  rationale: With חֹרֶב, the preposition אֶל expresses the sphere or location affected.
    In idiomatic English, 'on the fleece' communicates the result clearly.
- source_word: הַגִּזָּה
  chosen: the fleece
  alternatives:
  - the wool fleece
  lexicon: HALOT
  rationale: גִּזָּה in this context refers to the shorn wool fleece used in Gideon's
    sign. 'The fleece' is the conventional and sufficiently precise rendering.
- source_word: לְבַדָּהּ
  chosen: alone
  alternatives:
  - by itself
  - only
  lexicon: HALOT
  rationale: 'The feminine singular suffix refers back to the fleece. ''Alone'' succinctly
    conveys exclusivity: the dryness was confined to the fleece.'
- source_word: וְעַל כָּל הָאָרֶץ
  chosen: and on all the ground
  alternatives:
  - and on all the land
  - while on all the earth
  lexicon: HALOT
  rationale: אָרֶץ here refers to the surrounding ground in the immediate scene, not
    the whole earth in a global sense. 'Ground' best fits the local physical setting
    and the contrast with the fleece.
- source_word: טָל
  chosen: dew
  lexicon: HALOT
  rationale: The noun straightforwardly means 'dew.' It is the key contrasting element
    in the sign and should be rendered directly.
