id: JDG.6.10
reference: Judges 6:10
source:
  edition: WLC
  text: וָ/אֹמְרָ֣/ה לָ/כֶ֗ם אֲנִי֙ יְהוָ֣ה אֱלֹהֵי/כֶ֔ם לֹ֤א תִֽירְאוּ֙ אֶת אֱלֹהֵ֣י הָ/אֱמֹרִ֔י אֲשֶׁ֥ר אַתֶּ֖ם יוֹשְׁבִ֣ים בְּ/אַרְצָ֑/ם וְ/לֹ֥א שְׁמַעְתֶּ֖ם בְּ/קוֹלִֽ/י־׃פ
translation:
  text: And I said to you, ‘I am Yahweh your God; do not fear the gods of the Amorites, in whose land you dwell. But you have not listened to my voice.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you shall not fear' or 'do not fear.' The Hebrew expresses a prohibition.
    reason: lexical_alternative
  - marker: b
    text: '''Listened to my voice'' can also be understood as ''obeyed my voice.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמְרָה
  chosen: And I said
  alternatives:
  - And I told you
  - And I declared to you
  lexicon: HALOT
  rationale: Qal wayyiqtol 1cs of אמר introduces the LORD's prior speech. 'Said' is the most direct rendering; 'And' preserves the narrative continuation from the preceding context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: Though morphologically plural in form, אֱלֹהִים with pronominal suffix referring to Israel's deity is singular in sense here. 'Your God' correctly reflects covenantal reference.
- source_word: לֹא תִירְאוּ
  chosen: you must not fear
  alternatives:
  - do not fear
  - you shall not fear
  lexicon: HALOT
  rationale: The imperfect with negation expresses prohibition. 'You must not fear' communicates the force naturally in modern English while preserving the command.
- source_word: אֶת אֱלֹהֵי הָאֱמֹרִי
  chosen: the gods of the Amorites
  alternatives:
  - the gods of the Amorite
  lexicon: HALOT
  rationale: Collective ethnic singular in Hebrew is best rendered by the normal English plural ethnonym 'Amorites.' The construct phrase means the deities worshiped by that people.
- source_word: אֲשֶׁר אַתֶּם יוֹשְׁבִים בְּאַרְצָם
  chosen: in whose land you dwell
  alternatives:
  - in whose land you are living
  - whose land you inhabit
  lexicon: HALOT
  rationale: The relative clause modifies 'Amorites.' 'Dwell' preserves the settled-residence sense of ישב and keeps the line concise and elevated without sounding archaic.
- source_word: וְלֹא שְׁמַעְתֶּם בְּקוֹלִי
  chosen: But you have not listened to my voice
  alternatives:
  - but you have not obeyed my voice
  - and you did not listen to my voice
  lexicon: HALOT
  rationale: שמע בקול often carries the sense of heeding/obeying. 'Listened to my voice' preserves the Hebrew idiom transparently, while still implying failed obedience. 'But' brings out the adversative force naturally in English.
