id: JDG.6.11
reference: Judges 6:11
source:
  edition: WLC
  text: וַ/יָּבֹ֞א מַלְאַ֣ךְ יְהוָ֗ה וַ/יֵּ֨שֶׁב֙ תַּ֤חַת הָֽ/אֵלָה֙ אֲשֶׁ֣ר בְּ/עָפְרָ֔ה
    אֲשֶׁ֥ר לְ/יוֹאָ֖שׁ אֲבִ֣י הָֽעֶזְרִ֑י וְ/גִדְע֣וֹן בְּנ֗/וֹ חֹבֵ֤ט חִטִּים֙ בַּ/גַּ֔ת
    לְ/הָנִ֖יס מִ/פְּנֵ֥י מִדְיָֽן׃
translation:
  text: Then the angel of the LORD came and sat under the oak that was in Ophrah,
    which belonged to Joash the Abiezrite, while Gideon his son was beating out wheat
    in the winepress to hide it from Midian.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the terebinth.' The Hebrew tree term can be rendered either way in English.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Abiezerite.'
    reason: lexical_alternative
  - marker: c
    text: Or 'was threshing wheat.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאַךְ can mean either 'messenger' or 'angel,' but in this recurring
    narrative formula in Judges the supernatural sense is most natural. יְהוָה is
    rendered 'the LORD' per doctrine guidance for the divine name.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered with 'the LORD' in keeping with the project's
    stated default for יְהוָה.
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: A standard narrative wayyiqtol of בוא; 'came' is the most natural and
    sufficiently formal rendering in English narrative.
- source_word: וַיֵּשֶׁב
  chosen: sat
  alternatives:
  - remained seated
  - dwelt
  lexicon: HALOT
  rationale: In this immediate scene-setting context, 'sat' best matches the concrete
    action of taking a place under the tree.
- source_word: הָאֵלָה
  chosen: the oak
  alternatives:
  - the terebinth
  - the great tree
  lexicon: HALOT
  rationale: אֵלָה can denote a large tree, often identified as terebinth. 'Oak' is
    idiomatic and widely understood in English, but the botanical alternative is worth
    preserving in a footnote because the Hebrew term is not fully certain in English
    tradition.
- source_word: בְּעָפְרָה
  chosen: in Ophrah
  lexicon: HALOT
  rationale: Place name transliterated according to project policy to transliterate
    names rather than translate them.
- source_word: אֲשֶׁר לְיוֹאָשׁ
  chosen: that was in Ophrah, which belonged to Joash
  alternatives:
  - that was in Ophrah, which was Joash's
  lexicon: HALOT
  rationale: 'The two relative clauses are preserved: first locating the tree in Ophrah,
    then identifying it as belonging to Joash. ''Belonged to'' makes the possessive
    relation explicit in natural English.'
- source_word: אֲבִי הָעֶזְרִי
  chosen: the Abiezrite
  alternatives:
  - the Abiezerite
  lexicon: HALOT
  rationale: This gentilic identifies Joash by clan affiliation. 'Abiezrite' follows
    a direct transliteration from the Hebrew form here; the more familiar 'Abiezerite'
    reflects the related clan name elsewhere and is worth preserving as an alternative.
- source_word: חֹבֵט חִטִּים
  chosen: was beating out wheat
  alternatives:
  - was threshing wheat
  lexicon: HALOT
  rationale: חבט refers to beating out grain. 'Beating out wheat' is slightly more
    concrete than the broader 'threshing,' and it fits the unusual setting of a winepress.
- source_word: בַּגַּת
  chosen: in the winepress
  alternatives:
  - at the winepress
  lexicon: HALOT
  rationale: גת is a winepress. 'In the winepress' reflects the Hebrew preposition
    and the image of Gideon working in a concealed place.
- source_word: לְהָנִיס
  chosen: to hide it
  alternatives:
  - to put it out of reach
  - to flee with it
  lexicon: HALOT
  rationale: The Hiphil of נוּס commonly means 'cause to flee' or 'put to flight,'
    but in this context with grain and the threat of Midian it idiomatically conveys
    removing it from enemy detection or seizure. 'To hide it' captures the practical
    sense in clear English.
- source_word: מִפְּנֵי מִדְיָן
  chosen: from Midian
  alternatives:
  - from the Midianites
  - because of Midian
  lexicon: HALOT
  rationale: The singular proper name stands in the Hebrew. 'From Midian' preserves
    the wording while still naturally referring to the Midianite threat.
