theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether מַלְאַךְ יְהוָה should be rendered with supernatural force
  chosen_reading: the angel of the LORD
  alternative_readings:
  - the messenger of the LORD
  rationale: The Hebrew lexeme permits either sense, but the narrative presentation
    in Judges strongly supports a heavenly messenger rather than an ordinary human
    envoy. This preserves the text's theological tension without importing later doctrinal
    conclusions about the identity of the figure.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (preserve theological
    tension rather than resolve it)
