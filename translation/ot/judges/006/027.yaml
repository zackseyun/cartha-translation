id: JDG.6.27
reference: Judges 6:27
source:
  edition: WLC
  text: וַ/יִּקַּ֨ח גִּדְע֜וֹן עֲשָׂרָ֤ה אֲנָשִׁים֙ מֵֽ/עֲבָדָ֔י/ו וַ/יַּ֕עַשׂ כַּ/אֲשֶׁ֛ר
    דִּבֶּ֥ר אֵלָ֖י/ו יְהוָ֑ה וַ/יְהִ֡י כַּ/אֲשֶׁ֣ר יָרֵא֩ אֶת בֵּ֨ית אָבִ֜י/ו וְ/אֶת
    אַנְשֵׁ֥י הָ/עִ֛יר מֵ/עֲשׂ֥וֹת יוֹמָ֖ם וַ/יַּ֥עַשׂ לָֽיְלָה־־׃
translation:
  text: So Gideon took ten men from among his servants and did as the LORD had spoken
    to him. But because he feared his father's household and the men of the city too
    much to do it by day, he did it at night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'from doing it by day'; the sense is that his fear kept
      him from doing it in daytime.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - selected
  lexicon: HALOT
  rationale: Basic narrative verb לקח commonly means 'take.' 'Took' is the most direct
    and natural rendering in context.
- source_word: עֲשָׂרָה אֲנָשִׁים
  chosen: ten men
  alternatives:
  - ten persons
  lexicon: HALOT
  rationale: The Hebrew explicitly uses the masculine plural 'men'; per gender-accurate
    policy, this is retained rather than neutralized.
- source_word: מֵעֲבָדָיו
  chosen: from among his servants
  alternatives:
  - from his servants
  - from among his slaves
  lexicon: HALOT
  rationale: עֶבֶד can mean servant or slave depending on context. Here the text refers
    to members of Gideon's household workforce without emphasizing bonded status,
    so 'servants' is the better contextual choice. 'From among' reflects the partitive
    מִן.
- source_word: וַיַּעַשׂ כַּאֲשֶׁר דִּבֶּר אֵלָיו יְהוָה
  chosen: did as the LORD had spoken to him
  alternatives:
  - did as the LORD had told him
  - did according to what the LORD had spoken to him
  lexicon: HALOT
  rationale: This preserves the formal correspondence between divine speech and Gideon's
    obedience while remaining idiomatic English. 'The LORD' follows the project's
    default for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: וַיְהִי כַּאֲשֶׁר
  chosen: But because
  alternatives:
  - And it happened that, because
  - Now because
  - And since
  lexicon: HALOT
  rationale: The Hebrew introduces an explanatory circumstance. A more literal 'and
    it happened, because' is awkward in English; 'But because' captures the narrative
    turn and explanation naturally.
- source_word: יָרֵא
  chosen: feared
  alternatives:
  - was afraid of
  lexicon: HALOT
  rationale: The verb ירא here denotes fear of people. 'Feared' is concise and faithful;
    the sense of being afraid is clear from context.
- source_word: בֵּית אָבִיו
  chosen: his father's household
  alternatives:
  - his father's house
  - his family
  lexicon: HALOT
  rationale: '''Father''s household'' best conveys the social unit implied by ''house''
    here, broader than the physical building and more precise than simply ''family.'''
- source_word: אַנְשֵׁי הָעִיר
  chosen: the men of the city
  alternatives:
  - the townsmen
  - the people of the city
  lexicon: HALOT
  rationale: The Hebrew specifically says 'men of the city,' not the more general
    'people.' This preserves the source wording and likely social authority implied.
- source_word: מֵעֲשׂוֹת יוֹמָם
  chosen: too much to do it by day
  alternatives:
  - from doing it by day
  - to do it by day
  lexicon: HALOT
  rationale: 'The preposition מִן with infinitive after ''feared'' expresses prevention
    or reluctance: he feared them so that he did not do it by day. English requires
    an explicit complement; ''too much to do it by day'' makes the causal force clear
    and idiomatic.'
- source_word: וַיַּעַשׂ לָיְלָה
  chosen: he did it at night
  alternatives:
  - he did it by night
  lexicon: HALOT
  rationale: This clearly contrasts with 'by day' in the previous clause. 'At night'
    is natural modern English.
