theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD.' This is a translation-policy
    decision rather than a claim about pronunciation.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, יְהוָה YHWH → the LORD'
- issue: Idiomatic force of כְּאִישׁ אֶחָד
  chosen_reading: as one man
  alternative_readings:
  - as if one man
  - as one person
  rationale: The masculine singular image is retained rather than neutralized, in
    keeping with the project's gender-accurate principle. The phrase here describes
    the manner/certainty of Gideon's striking Midian, not a doctrinal statement about
    anthropology or gender.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4, Gender-accurate over
    gender-neutral'
