id: JDG.6.16
reference: Judges 6:16
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֵלָי/ו֙ יְהוָ֔ה כִּ֥י אֶהְיֶ֖ה עִמָּ֑/ךְ וְ/הִכִּיתָ֥ אֶת מִדְיָ֖ן
    כְּ/אִ֥ישׁ אֶחָֽד־׃
translation:
  text: And the LORD said to him, “Surely I will be with you, and you will strike
    Midian as one man.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “as if one man” / “like a single man.” The Hebrew idiom emphasizes unified
      or decisive action against Midian.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name YHWH as
    'the LORD,' following Jewish reverence tradition and the LXX pattern.
- source_word: וַיֹּאמֶר אֵלָיו
  chosen: And ... said to him
  alternatives:
  - Then ... said to him
  lexicon: HALOT
  rationale: The waw-consecutive with אמר advances the narrative. 'And ... said to
    him' preserves the Hebrew narrative flow without overinterpreting temporal nuance.
- source_word: כִּי
  chosen: Surely
  alternatives:
  - for
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the assurance grounding Gideon's success. 'Surely'
    captures the emphatic-assuring force in idiomatic English better than a wooden
    'for' or causal 'because' in direct speech.
- source_word: אֶהְיֶה עִמָּךְ
  chosen: I will be with you
  alternatives:
  - I am with you
  lexicon: HALOT
  rationale: The verb is first person singular imperfect of היה, naturally future
    here in a promise context. 'I will be with you' preserves the covenantal assurance
    formula.
- source_word: וְהִכִּיתָ
  chosen: and you will strike
  alternatives:
  - and you shall strike
  - and you will defeat
  lexicon: HALOT
  rationale: The perfect with prefixed waw after the promise has future/result sense.
    'Strike' keeps closer to נכה while still natural in English; 'defeat' is interpretive
    and less formally tied to the Hebrew verb.
- source_word: אֶת מִדְיָן
  chosen: Midian
  alternatives:
  - the Midianites
  lexicon: HALOT
  rationale: The Hebrew names the entity 'Midian' singular, which can stand for the
    people/group. 'Midian' preserves the source wording; English readers can understand
    it corporately in context.
- source_word: כְּאִישׁ אֶחָד
  chosen: as one man
  alternatives:
  - as if one man
  - like a single man
  - as one person
  lexicon: HALOT
  rationale: This idiom conveys unified or effortless action against the whole enemy
    force. 'As one man' is the most direct and established equivalent, preserving
    the masculine singular imagery of the Hebrew per the gender-accurate policy.
