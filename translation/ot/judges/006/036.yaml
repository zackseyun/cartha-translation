theological_decisions:
- issue: Rendering of אֱלֹהִים in Gideon's address
  chosen_reading: God
  alternative_readings:
  - the God
  - God/god
  rationale: In context Gideon is addressing Israel's God, not an unspecified deity.
    Capitalized 'God' reflects referential specificity without importing additional
    doctrinal content.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English'
