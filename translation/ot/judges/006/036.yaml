id: JDG.6.36
reference: Judges 6:36
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר גִּדְע֖וֹן אֶל הָ/אֱלֹהִ֑ים אִם יֶשְׁ/ךָ֞ מוֹשִׁ֧יעַ בְּ/יָדִ֛/י
    אֶת יִשְׂרָאֵ֖ל כַּ/אֲשֶׁ֥ר דִּבַּֽרְתָּ־־־׃
translation:
  text: Then Gideon said to God, “If you are going to save Israel by my hand, as you
    have spoken,”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving sequential force.
- source_word: אֶל הָאֱלֹהִים
  chosen: to God
  alternatives:
  - to the God
  lexicon: HALOT
  rationale: Though the noun has the article in Hebrew, English idiom normally omits
    it with 'God' in direct reference. The phrase denotes Gideon's address to God,
    not a generic deity.
- source_word: אִם
  chosen: If
  alternatives:
  - Indeed if
  - whether
  lexicon: HALOT
  rationale: Introduces the conditional/protasis that continues into the next verse.
    'If' is the plain sense and preserves the open conditional form.
- source_word: יֶשְׁךָ
  chosen: you are going to
  alternatives:
  - you will
  - there is for you
  lexicon: HALOT
  rationale: The construction with יֵשׁ plus pronominal suffix and participle expresses
    prospective action or intent. 'You are going to' is natural English that captures
    the imminent/prospective nuance without over-literal awkwardness.
- source_word: מוֹשִׁיעַ
  chosen: save
  alternatives:
  - deliver
  lexicon: HALOT
  rationale: From ישׁע, meaning to save/deliver. 'Save' is the broader and more recognizable
    term in English; 'deliver' is possible, but 'save' fits the immediate military-rescue
    context without losing theological resonance.
- source_word: בְּיָדִי
  chosen: by my hand
  alternatives:
  - through me
  - by means of me
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the Hebrew idiom of agency. It is
    also natural enough in English and keeps the concrete imagery of Gideon as the
    instrument.
- source_word: אֶת יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Direct object marker אֵת is untranslated; 'Israel' is retained as the
    object of saving.
- source_word: כַּאֲשֶׁר דִּבַּרְתָּ
  chosen: as you have spoken
  alternatives:
  - as you said
  - just as you spoke
  lexicon: HALOT
  rationale: This preserves the directness of דִּבַּרְתָּ while sounding dignified
    and natural. 'Have spoken' reflects the completed prior speech with present relevance.
