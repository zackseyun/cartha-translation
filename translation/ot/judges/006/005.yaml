id: JDG.6.5
reference: Judges 6:5
source:
  edition: WLC
  text: כִּ֡י הֵם֩ וּ/מִקְנֵי/הֶ֨ם יַעֲל֜וּ וְ/אָהֳלֵי/הֶ֗ם יבאו כְ/דֵֽי אַרְבֶּה֙
    לָ/רֹ֔ב וְ/לָ/הֶ֥ם וְ/לִ/גְמַלֵּי/הֶ֖ם אֵ֣ין מִסְפָּ֑ר וַ/יָּבֹ֥אוּ בָ/אָ֖רֶץ
    לְ/שַׁחֲתָֽ/הּ־׃
translation:
  text: For they and their livestock would come up, and their tents would come in
    like locusts in multitude; both they and their camels were without number, and
    they came into the land to destroy it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as numerous as locusts' or 'like swarms of locusts.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'their tents would come in,' using 'tents' for the invaders'
      encampments.
    reason: cultural_note
  - marker: c
    text: Or 'to ravage it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces an explanation of the preceding statement about Israel's impoverishment;
    'For' fits the discourse connection naturally in English.
- source_word: הֵם
  chosen: they
  lexicon: HALOT
  rationale: Explicit pronoun retained for emphasis, referring to the invading peoples.
- source_word: וּמִקְנֵיהֶם
  chosen: and their livestock
  alternatives:
  - and their cattle
  lexicon: HALOT
  rationale: מִקְנֶה denotes acquired animals/livestock broadly, not only bovines;
    'livestock' is the most accurate modern collective term.
- source_word: יַעֲלוּ
  chosen: would come up
  alternatives:
  - went up
  - came up
  lexicon: HALOT
  rationale: Imperfect here expresses customary/repeated action in past narrative
    context; 'would come up' captures iterative force.
- source_word: וְאָהֳלֵיהֶם יָבֹאוּ
  chosen: and their tents would come in
  alternatives:
  - and they would come with their tents
  - and their encampments would come
  lexicon: HALOT
  rationale: The Hebrew literally mentions 'their tents' as what comes, a vivid metonymy
    for a migrating encampment. Retaining 'their tents would come in' preserves the
    imagery while remaining intelligible.
- source_word: כְּדֵי אַרְבֶּה לָרֹב
  chosen: like locusts in multitude
  alternatives:
  - as numerous as locusts
  - like swarms of locusts
  lexicon: HALOT
  rationale: The phrase compares the invaders' abundance to locusts. 'Like locusts
    in multitude' stays close to the Hebrew while reading naturally.
- source_word: וְלָהֶם וְלִגְמַלֵּיהֶם אֵין מִסְפָּר
  chosen: both they and their camels were without number
  alternatives:
  - they and their camels were innumerable
  - for them and their camels there was no number
  lexicon: HALOT
  rationale: The construction emphasizes the countless number of both the people and
    their camels. 'Without number' preserves the Hebrew idiom.
- source_word: וַיָּבֹאוּ בָאָרֶץ
  chosen: and they came into the land
  alternatives:
  - and they entered the land
  lexicon: HALOT
  rationale: Simple narrative advance; 'came into the land' is a natural rendering
    of the Hebrew preposition and verb.
- source_word: לְשַׁחֲתָהּ
  chosen: to destroy it
  alternatives:
  - to ravage it
  - to ruin it
  lexicon: HALOT
  rationale: Infinitive of שׁחת here expresses purpose/result of the invasion. 'Destroy
    it' is the broad, straightforward sense; 'ravage' is possible but slightly more
    interpretive.
