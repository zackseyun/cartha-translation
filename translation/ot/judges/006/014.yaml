id: JDG.6.14
reference: Judges 6:14
source:
  edition: WLC
  text: וַ/יִּ֤פֶן אֵלָי/ו֙ יְהוָ֔ה וַ/יֹּ֗אמֶר לֵ֚ךְ בְּ/כֹחֲ/ךָ֣ זֶ֔ה וְ/הוֹשַׁעְתָּ֥ אֶת יִשְׂרָאֵ֖ל מִ/כַּ֣ף מִדְיָ֑ן הֲ/לֹ֖א שְׁלַחְתִּֽי/ךָ־׃
translation:
  text: Then Yahweh turned to him and said, “Go in this strength of yours and save Israel from the hand of Midian. Have I not sent you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “with this strength of yours.” The Hebrew phrase may be understood instrumentally or locatively, with the demonstrative adding emphasis.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “from the hand of Midian,” an idiom for deliverance from Midian’s power or control.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Rendered according to the project's default for the divine name, preserving the traditional small-caps covenantal form in English rather than transliteration.
- source_word: וַיִּפֶן
  chosen: turned
  alternatives:
  - turned toward
  - looked
  lexicon: HALOT
  rationale: The verb פנה commonly means 'turn' or 'turn toward.' 'Turned to him' is natural English and preserves the narrative action without overinterpreting it as merely visual attention.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - toward him
  lexicon: HALOT
  rationale: The preposition plus pronominal suffix is straightforwardly directional. 'To him' fits idiomatic English with 'turned.'
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard narrative rendering for אמר; 'said' is the most natural and sufficiently formal choice.
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Go on
  - Depart
  lexicon: HALOT
  rationale: Imperative of הלך. 'Go' is direct and preserves the commissioning force.
- source_word: בְּכֹחֲךָ זֶה
  chosen: in this strength of yours
  alternatives:
  - with this strength of yours
  - in your strength, this one
  lexicon: HALOT
  rationale: The phrase is somewhat emphatic, combining the preposition ב with 'your strength' and the demonstrative 'this.' 'In this strength of yours' preserves both the instrumental sense and the demonstrative emphasis better than a flatter 'with your strength.'
- source_word: וְהוֹשַׁעְתָּ
  chosen: and save
  alternatives:
  - and you shall save
  - and deliver
  lexicon: HALOT
  rationale: 'The form can function as an imperative-like continuation after לֵךְ in a commission context. English idiom prefers coordinated command sense: ''Go ... and save.'' ''Save'' is chosen over ''deliver'' as the more direct equivalent here.'
- source_word: אֶת יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Direct object marker plus proper name; no expansion needed.
- source_word: מִכַּף מִדְיָן
  chosen: from the hand of Midian
  alternatives:
  - from Midian's hand
  - from the power of Midian
  lexicon: HALOT
  rationale: The idiom 'from the hand of' is common in Hebrew for power or control. Retaining 'hand' preserves the Hebrew imagery while remaining understandable in English.
- source_word: הֲלֹא
  chosen: Have I not
  alternatives:
  - Did I not
  - Surely I have
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting affirmation. 'Have I not' fits the English rhetorical force and pairs naturally with the perfect verb that follows.
- source_word: שְׁלַחְתִּיךָ
  chosen: sent you
  alternatives:
  - commissioned you
  lexicon: HALOT
  rationale: The verb שלח means 'send.' 'Sent you' preserves the basic commissioning language without importing interpretive nuance.
