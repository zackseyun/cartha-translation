id: JDG.6.19
reference: Judges 6:19
source:
  edition: WLC
  text: וְ/גִדְע֣וֹן בָּ֗א וַ/יַּ֤עַשׂ גְּדִֽי עִזִּים֙ וְ/אֵיפַת קֶ֣מַח מַצּ֔וֹת
    הַ/בָּשָׂר֙ שָׂ֣ם בַּ/סַּ֔ל וְ/הַ/מָּרַ֖ק שָׂ֣ם בַּ/פָּר֑וּר וַ/יּוֹצֵ֥א אֵלָ֛י/ו
    אֶל תַּ֥חַת הָ/אֵלָ֖ה וַ/יַּגַּֽשׁ־־־׃ס
translation:
  text: Then Gideon went in and prepared a young goat and unleavened bread from an
    ephah of flour. He put the meat in a basket and the broth in a pot, and brought
    them out to him under the terebinth and presented them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under the oak.' The Hebrew word likely refers to a terebinth tree, though
      'oak' is a traditional rendering.
    reason: lexical_alternative
  - marker: b
    text: Or 'brought it near' / 'set it before him.' The Hebrew verb means 'brought
      near' or 'presented.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּא
  chosen: went in
  alternatives:
  - came
  - went
  lexicon: HALOT
  rationale: In context Gideon departs from the visitor in order to prepare food,
    so 'went in' captures movement into his dwelling or place of preparation better
    than the more neutral 'came.'
- source_word: וַיַּעַשׂ
  chosen: prepared
  alternatives:
  - made
  - did
  lexicon: HALOT
  rationale: For food preparation, English idiom prefers 'prepared' over the more
    wooden 'made,' while remaining faithful to the verb's broad sense.
- source_word: גְּדִי עִזִּים
  chosen: a young goat
  alternatives:
  - a kid of the goats
  - a goat kid
  lexicon: HALOT
  rationale: This construct phrase denotes a young goat. 'Young goat' is natural modern
    English and preserves the animal specified.
- source_word: אֵיפַת קֶמַח
  chosen: an ephah of flour
  alternatives:
  - an ephah of meal
  - a measure of flour
  lexicon: HALOT
  rationale: The Hebrew names the specific dry measure אֵיפָה. Following the philosophy
    of preserving source-text specificity where understandable, 'ephah' is retained
    rather than generalized to 'measure.' 'Flour' is more accessible than 'meal' here.
- source_word: מַצּוֹת
  chosen: unleavened bread
  alternatives:
  - unleavened cakes
  - matzot
  lexicon: HALOT
  rationale: The term refers to bread made without leaven. 'Unleavened bread' is the
    clearest standard English rendering, though the exact form may have been cakes
    or loaves.
- source_word: הַבָּשָׂר
  chosen: the meat
  alternatives:
  - the flesh
  lexicon: HALOT
  rationale: In food context, 'meat' is the natural English equivalent; 'flesh' would
    sound overly literal and unnatural.
- source_word: סַּל
  chosen: basket
  alternatives:
  - basket-container
  lexicon: HALOT
  rationale: Standard rendering for a carrying basket; no reason to use a more technical
    gloss.
- source_word: הַמָּרַק
  chosen: the broth
  alternatives:
  - the soup
  - the juice
  lexicon: HALOT
  rationale: The word denotes broth or cooking liquid. 'Broth' best fits the likely
    culinary setting and remains suitably literal.
- source_word: פָּרוּר
  chosen: pot
  alternatives:
  - cooking pot
  - bowl
  lexicon: HALOT
  rationale: A vessel for holding cooked liquid; 'pot' is concise and natural. 'Cooking
    pot' is possible but unnecessary in the main text.
- source_word: וַיּוֹצֵא אֵלָיו
  chosen: brought them out to him
  alternatives:
  - brought it out to him
  - took them out to him
  lexicon: HALOT
  rationale: Although the verb is singular, the sense covers the prepared items collectively.
    English naturally uses plural 'them' to refer to the meat and broth together.
- source_word: תַּחַת הָאֵלָה
  chosen: under the terebinth
  alternatives:
  - under the oak
  - beneath the great tree
  lexicon: HALOT
  rationale: אֵלָה commonly refers to a terebinth rather than an oak. This follows
    original-language primacy over inherited translation tradition.
- source_word: וַיַּגַּשׁ
  chosen: presented them
  alternatives:
  - set it before him
  - brought near
  - offered them
  lexicon: HALOT
  rationale: The verb means to bring near/present. 'Presented them' fits the hospitality
    context and avoids over-interpreting the act as a formal sacrifice at this point.
