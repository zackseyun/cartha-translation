theological_decisions:
- issue: Potential sacrificial nuance in Gideon's act
  chosen_reading: hospitality/presentation language rather than explicit sacrificial
    language
  alternative_readings:
  - offered them as a sacrifice
  rationale: The Hebrew verbs describe preparing food, bringing it out, and presenting
    it. Although the scene develops sacrificial overtones in the following verses,
    this verse itself does not explicitly state that Gideon offered a sacrifice. The
    translation preserves that narrative tension rather than importing later interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
