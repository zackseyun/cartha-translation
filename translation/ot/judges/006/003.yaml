id: JDG.6.3
reference: Judges 6:3
source:
  edition: WLC
  text: וְ/הָיָ֖ה אִם זָרַ֣ע יִשְׂרָאֵ֑ל וְ/עָלָ֨ה מִדְיָ֧ן וַֽ/עֲמָלֵ֛ק וּ/בְנֵי
    קֶ֖דֶם וְ/עָל֥וּ עָלָֽי/ו־־׃
translation:
  text: And whenever Israel sowed, Midian and Amalek and the people of the East would
    come up against him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'against him,' with singular suffix, referring collectively to Israel;
      some translations smooth this to 'against them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And whenever
  alternatives:
  - And it happened
  - And it would happen
  - Now it happened
  lexicon: HALOT
  rationale: The waw + qatal of היה introduces a recurring circumstance in narrative.
    In context with אִם and the following verbs, the sense is iterative rather than
    a single past event, so 'And whenever' captures the habitual force in natural
    English.
- source_word: אִם
  chosen: whenever
  alternatives:
  - if
  - when
  lexicon: HALOT
  rationale: 'Although often ''if,'' here אִם with the iterative narrative construction
    expresses repeated temporal circumstance: ''whenever'' or ''when(ever).'' ''Whenever''
    best conveys the repeated pattern described in the surrounding context.'
- source_word: זָרַע
  chosen: sowed
  alternatives:
  - planted
  - had sown
  lexicon: HALOT
  rationale: The verb זרע means 'to sow seed.' 'Sowed' is the most direct agricultural
    equivalent and fits the habitual setting.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Proper name of the people/nation; transliterated per translation philosophy.
- source_word: וְעָלָה
  chosen: would come up
  alternatives:
  - came up
  - went up
  - would go up
  lexicon: HALOT
  rationale: עלה literally means 'go up/come up.' In military movement toward Israelite
    territory, 'come up' is idiomatic in English and preserves the directional nuance.
    The habitual sense is reflected by 'would come up.'
- source_word: מִדְיָן
  chosen: Midian
  lexicon: HALOT
  rationale: Proper ethnic/geographical name; transliterated.
- source_word: וַעֲמָלֵק
  chosen: Amalek
  alternatives:
  - the Amalekites
  lexicon: HALOT
  rationale: The Hebrew has the proper name עֲמָלֵק rather than the gentilic form.
    'Amalek' is therefore the more formally precise rendering, though it refers to
    the Amalekite people.
- source_word: וּבְנֵי קֶדֶם
  chosen: the people of the East
  alternatives:
  - the sons of the East
  - the eastern peoples
  - the people of the east
  lexicon: HALOT
  rationale: Literally 'sons of the east.' For readable modern English, 'the people
    of the East' preserves the collective ethnic/regional sense without wooden literalism.
    Capitalizing 'East' reflects the regional designation.
- source_word: וְעָלוּ עָלָיו
  chosen: would come up against him
  alternatives:
  - would come up against them
  - would attack him
  - would come up against it
  lexicon: HALOT
  rationale: The verb + על expresses hostile advance. The suffix is 3ms singular ('against
    him'), likely a collective singular referring to Israel as a people. To remain
    gender-accurate to the source and avoid smoothing away the singular, 'against
    him' is retained in the main text.
