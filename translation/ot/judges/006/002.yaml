id: JDG.6.2
reference: Judges 6:2
source:
  edition: WLC
  text: וַ/תָּ֥עָז יַד מִדְיָ֖ן עַל יִשְׂרָאֵ֑ל מִ/פְּנֵ֨י מִדְיָ֜ן עָשֽׂוּ לָ/הֶ֣ם
    בְּנֵ֣י יִשְׂרָאֵ֗ל אֶת הַ/מִּנְהָרוֹת֙ אֲשֶׁ֣ר בֶּֽ/הָרִ֔ים וְ/אֶת הַ/מְּעָר֖וֹת
    וְ/אֶת הַ/מְּצָדֽוֹת־־׀־־־׃
translation:
  text: And the hand of Midian prevailed against Israel. Because of Midian, the sons
    of Israel made for themselves the mountain hideouts, the caves, and the strongholds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew reads 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term rendered 'hideouts' is rare and has also been translated
      'dens.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּעָז
  chosen: prevailed
  alternatives:
  - grew strong
  - was strong
  lexicon: HALOT
  rationale: From עזז/עזז-like verbal idea of becoming strong or prevailing. In context
    with 'hand of Midian ... against Israel,' English 'prevailed' best conveys hostile
    dominance rather than mere increase in strength.
- source_word: יַד מִדְיָן
  chosen: the hand of Midian
  alternatives:
  - Midian's power
  - Midian
  lexicon: HALOT
  rationale: Hebrew 'hand' is a common idiom for power or control. Retaining 'hand'
    preserves the source imagery while remaining intelligible in English.
- source_word: עַל יִשְׂרָאֵל
  chosen: against Israel
  alternatives:
  - over Israel
  - upon Israel
  lexicon: HALOT
  rationale: With hostile domination in context, 'against' communicates oppressive
    force more naturally than the more spatially literal 'upon' or the potentially
    neutral 'over'.
- source_word: מִפְּנֵי מִדְיָן
  chosen: Because of Midian
  alternatives:
  - from before Midian
  - because of the presence of Midian
  lexicon: HALOT
  rationale: The phrase expresses causation arising from Midian's threat. 'Because
    of Midian' is idiomatic and captures the sense of fear-driven response.
- source_word: עָשׂוּ לָהֶם
  chosen: made for themselves
  alternatives:
  - prepared for themselves
  - fashioned for themselves
  lexicon: HALOT
  rationale: A straightforward rendering of the verb plus reflexive/dative pronoun,
    indicating the Israelites constructed or adapted these places for their own use.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural construct. Per gender-accurate
    philosophy, 'sons of Israel' preserves the form; a more idiomatic collective alternative
    is noted.
- source_word: הַמִּנְהָרוֹת
  chosen: the mountain hideouts
  alternatives:
  - the dens
  - the tunnels
  - the ravines
  lexicon: HALOT
  rationale: This rare term is traditionally rendered 'dens,' but likely refers to
    holes, clefts, or hideouts used for refuge. Because the next items are 'caves'
    and 'strongholds,' 'mountain hideouts' avoids redundancy while fitting the mountain
    setting.
- source_word: אֲשֶׁר בֶּהָרִים
  chosen: the mountain
  alternatives:
  - that are in the mountains
  - in the hills
  lexicon: HALOT
  rationale: The phrase modifies the hideouts' location. In smooth English, 'the mountain
    hideouts' incorporates the locative sense compactly without losing meaning.
- source_word: הַמְּעָרוֹת
  chosen: the caves
  alternatives:
  - the caverns
  lexicon: HALOT
  rationale: Standard and clear rendering for natural caves.
- source_word: הַמְּצָדוֹת
  chosen: the strongholds
  alternatives:
  - the fortresses
  - the strong places
  lexicon: HALOT
  rationale: Conveys defensible refuges or fortified places. 'Strongholds' is idiomatic
    and fits the survival context.
