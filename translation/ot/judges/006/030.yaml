theological_decisions:
- issue: Rendering of אֲשֵׁרָה in an Israelite polemic context
  chosen_reading: the Asherah
  alternative_readings:
  - the Asherah pole
  - the goddess Asherah
  rationale: The text refers to a cultic object associated with Baal worship, but
    the Hebrew term itself is best preserved in translation because English alternatives
    either flatten the religious specificity ('pole') or misidentify the referent
    as necessarily the deity herself. A lexical footnote preserves the common alternative.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of וְיָמֹת
  chosen_reading: so that he may die
  alternative_readings:
  - let him die
  - he must die
  - that he may be put to death
  rationale: The Hebrew expresses a death demand following the imperative 'Bring out
    your son.' The chosen rendering preserves the syntax and avoids importing a more
    formal legal idiom than the text itself states.
  doctrine_reference: Translation philosophy §1, §6
