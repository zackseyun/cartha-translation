id: JDG.6.30
reference: Judges 6:30
source:
  edition: WLC
  text: וַ/יֹּ֨אמְר֜וּ אַנְשֵׁ֤י הָ/עִיר֙ אֶל יוֹאָ֔שׁ הוֹצֵ֥א אֶת בִּנְ/ךָ֖ וְ/יָמֹ֑ת
    כִּ֤י נָתַץ֙ אֶת מִזְבַּ֣ח הַ/בַּ֔עַל וְ/כִ֥י כָרַ֖ת הָ/אֲשֵׁרָ֥ה אֲשֶׁר עָלָֽי/ו־־־־׃
translation:
  text: Then the men of the city said to Joash, “Bring out your son, so that he may
    die, because he has torn down the altar of Baal and cut down the Asherah that
    was beside it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Asherah pole.” The Hebrew term can refer to the cult object associated
      with Asherah; here the context suggests the object rather than the goddess herself.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי הָעִיר
  chosen: the men of the city
  alternatives:
  - the people of the city
  - the townsmen
  lexicon: HALOT
  rationale: אַנְשֵׁי is literally 'men of.' In keeping with the gender-accurate policy,
    'men of the city' preserves the masculine form and likely reference to the male
    civic actors rather than neutralizing to 'people.'
- source_word: הוֹצֵא
  chosen: Bring out
  alternatives:
  - Bring forth
  - Produce
  lexicon: HALOT
  rationale: Imperative of יצא in the causative stem here means to cause someone to
    come out; 'Bring out' is natural modern English and sufficiently formal.
- source_word: וְיָמֹת
  chosen: so that he may die
  alternatives:
  - and let him die
  - that he may be put to death
  lexicon: HALOT
  rationale: The conjunction plus jussive expresses the demanded result/purpose of
    the command. 'So that he may die' preserves the force without over-specifying
    judicial procedure. 'Be put to death' is interpretive, since the Hebrew states
    'die,' though the context clearly implies execution.
- source_word: נָתַץ
  chosen: has torn down
  alternatives:
  - has broken down
  - has demolished
  lexicon: HALOT
  rationale: נתץ commonly refers to pulling down or tearing down structures. 'Torn
    down' fits an altar and is idiomatic.
- source_word: מִזְבַּח הַבַּעַל
  chosen: the altar of Baal
  alternatives:
  - Baal's altar
  lexicon: HALOT
  rationale: Construct relationship is straightforward; 'the altar of Baal' is clear
    and formal enough.
- source_word: כָרַת
  chosen: cut down
  alternatives:
  - cut off
  - chopped down
  lexicon: HALOT
  rationale: For wooden cultic objects or trees, כרת is well rendered 'cut down.'
- source_word: הָאֲשֵׁרָה
  chosen: the Asherah
  alternatives:
  - the Asherah pole
  - the wooden image of Asherah
  lexicon: HALOT
  rationale: The Hebrew term can denote either the goddess or the cult object associated
    with her. Here the verb 'cut down' and the local setting indicate the cult object.
    Rendering it as 'the Asherah' preserves the Hebrew term without overcommitting
    to 'pole,' which is likely but not explicit.
- source_word: אֲשֶׁר עָלָיו
  chosen: that was beside it
  alternatives:
  - that was on it
  - that was upon it
  - that was by it
  lexicon: HALOT
  rationale: The preposition על can mean 'on, upon, over, by.' In this context of
    an altar and associated Asherah, the sense is most likely spatial association
    rather than literal placement on top of the altar. 'Beside it' communicates the
    probable cultic arrangement in readable English.
