id: JDG.6.22
reference: Judges 6:22
source:
  edition: WLC
  text: וַ/יַּ֣רְא גִּדְע֔וֹן כִּֽי מַלְאַ֥ךְ יְהוָ֖ה ה֑וּא וַ/יֹּ֣אמֶר גִּדְע֗וֹן
    אֲהָהּ֙ אֲדֹנָ֣/י יְהוִ֔ה כִּֽי עַל כֵּ֤ן רָאִ֨יתִי֙ מַלְאַ֣ךְ יְהוָ֔ה פָּנִ֖ים
    אֶל פָּנִֽים־ס־־־׃
translation:
  text: Then Gideon saw that he was the angel of the LORD, and Gideon said, “Ah, Lord
    GOD! For I have seen the angel of the LORD face to face.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the messenger of the LORD.' The Hebrew word can mean either 'angel'
      or 'messenger.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: Then ... saw
  alternatives:
  - And ... saw
  - realized
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative, naturally rendered 'Then'
    in English. The verb ראה is literally 'saw'; in context it includes recognition,
    but 'saw' preserves the Hebrew wording while allowing the following clause to
    convey realization.
- source_word: כִּי
  chosen: that
  alternatives:
  - when
  - indeed
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of Gideon''s perception: ''saw that
    he was...'' rather than a temporal or emphatic sense.'
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאָךְ can mean 'messenger' or 'angel.' In this narrative the being
    appears as a supernatural envoy, and standard English 'angel' best fits the context.
    יְהוָה is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered 'the LORD' according to the project's stated
    default for יְהוָה.
- source_word: הוּא
  chosen: he was
  alternatives:
  - it was
  - this was
  lexicon: HALOT
  rationale: 'The pronoun identifies the figure Gideon has encountered. English requires
    an explicit copular sense: ''he was the angel of the LORD.'''
- source_word: אֲהָהּ
  chosen: Ah
  alternatives:
  - Alas
  - Oh no
  lexicon: HALOT
  rationale: This interjection expresses alarm or dismay. 'Ah' is concise and natural
    modern English, while preserving the solemnity of Gideon's cry better than the
    more colloquial 'Oh no.'
- source_word: אֲדֹנָי יְהוִה
  chosen: Lord GOD
  alternatives:
  - Lord GOD!
  - Lord Yahweh
  - my Lord, the LORD
  lexicon: HALOT
  rationale: The compound divine address is conventionally distinguished in English
    as 'Lord GOD' to avoid 'Lord LORD' when אֲדֹנָי precedes the divine name. This
    preserves both elements of the Hebrew address.
- source_word: כִּי עַל כֵּן
  chosen: For
  alternatives:
  - Because of this
  - Surely because
  lexicon: HALOT
  rationale: The phrase introduces the reason for Gideon's alarm. In idiomatic English,
    'For I have seen...' captures the explanatory force without overtranslating the
    particles.
- source_word: רָאִיתִי
  chosen: I have seen
  alternatives:
  - I saw
  lexicon: HALOT
  rationale: The perfect can be rendered as a present-result perfect in English, fitting
    Gideon's immediate reaction to what has just occurred.
- source_word: פָּנִים אֶל פָּנִים
  chosen: face to face
  alternatives:
  - in person
  - directly
  lexicon: HALOT
  rationale: This is a fixed Hebrew idiom meaning direct encounter. 'Face to face'
    is the natural and sufficiently literal English equivalent.
