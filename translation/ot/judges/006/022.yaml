theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    the Tetragrammaton, following Jewish reverence tradition and the Septuagintal
    pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Understanding מַלְאַךְ יְהוָה
  chosen_reading: the angel of the LORD
  alternative_readings:
  - the messenger of the LORD
  rationale: The translation preserves the Hebrew expression without resolving broader
    theological debates about whether this figure is merely an angelic messenger or
    a theophanic manifestation. The text itself identifies the figure as 'the angel
    of the LORD,' and the translation should not import a stronger doctrinal conclusion.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
