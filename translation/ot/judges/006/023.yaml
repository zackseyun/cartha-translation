id: JDG.6.23
reference: Judges 6:23
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר ל֧/וֹ יְהוָ֛ה שָׁל֥וֹם לְ/ךָ֖ אַל תִּירָ֑א לֹ֖א תָּמֽוּת־׃
translation:
  text: But Yahweh said to him, “Peace be to you. Do not fear; you shall not die.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Peace to you.” The Hebrew shalom can convey peace, well-being, or reassurance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר is most naturally rendered 'said' in English narrative.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שָׁלוֹם לְךָ
  chosen: Peace be to you
  alternatives:
  - Peace to you
  - It is well with you
  lexicon: HALOT
  rationale: שָׁלוֹם here functions as a reassurance formula, not merely absence of conflict. 'Peace be to you' preserves the idiomatic blessing/reassurance while remaining natural English.
- source_word: אַל תִּירָא
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: The prohibition with ירא is a common reassurance formula. 'Do not fear' is slightly more formal and concise, fitting the solemn divine speech.
- source_word: לֹא תָּמוּת
  chosen: you shall not die
  alternatives:
  - you will not die
  lexicon: HALOT
  rationale: The imperfect after reassurance expresses future result/assurance. 'You shall not die' preserves the solemnity of divine declaration better than the more colloquial 'you will not die'.
