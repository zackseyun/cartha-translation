id: JDG.6.38
reference: Judges 6:38
source:
  edition: WLC
  text: וַ/יְהִי כֵ֕ן וַ/יַּשְׁכֵּם֙ מִֽ/מָּחֳרָ֔ת וַ/יָּ֖זַר אֶת הַ/גִּזָּ֑ה וַ/יִּ֤מֶץ
    טַל֙ מִן הַ/גִּזָּ֔ה מְל֥וֹא הַ/סֵּ֖פֶל מָֽיִם־־־׃
translation:
  text: And it was so. He rose early the next day and squeezed the fleece, wringing
    dew from the fleece—a bowlful of water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pressed the fleece' / 'wrung out the fleece.' The Hebrew uses two verbs
      in sequence to describe compressing the fleece and extracting dew from it.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כֵן
  chosen: And it was so
  alternatives:
  - And it happened so
  - And so it was
  lexicon: HALOT
  rationale: Idiomatic confirmation that Gideon’s requested sign occurred as asked.
    'And it was so' is natural English while staying close to the Hebrew sequence.
- source_word: וַיַּשְׁכֵּם מִמָּחֳרָת
  chosen: He rose early the next day
  alternatives:
  - He got up early the next morning
  - He rose early on the following day
  lexicon: HALOT
  rationale: The verb commonly means to rise early, and מִמָּחֳרָת specifies the following
    day. 'The next day' is clear modern English.
- source_word: וַיָּזַר אֶת־הַגִּזָּה
  chosen: and squeezed the fleece
  alternatives:
  - and pressed the fleece
  - and wrung out the fleece
  lexicon: HALOT
  rationale: The verb here describes compressing the fleece to extract liquid. 'Squeezed'
    is accessible and accurate; 'wrung out' is possible but slightly anticipates the
    result already expressed in the next clause.
- source_word: וַיִּמֶץ טַל
  chosen: wringing dew
  alternatives:
  - and he drained out dew
  - and he squeezed out dew
  lexicon: HALOT
  rationale: This verb conveys extracting or draining liquid. Rendering it as a participial/resultative
    phrase after 'squeezed the fleece' produces natural English while preserving the
    action-result relationship.
- source_word: מִן־הַגִּזָּה
  chosen: from the fleece
  alternatives:
  - out of the fleece
  lexicon: HALOT
  rationale: Straightforward source indication; 'from' is the most neutral rendering.
- source_word: מְלֹא הַסֵּפֶל מָיִם
  chosen: a bowlful of water
  alternatives:
  - a full bowl of water
  - the bowl full of water
  lexicon: HALOT
  rationale: The construct phrase literally means 'the fullness of the bowl, water,'
    i.e., enough water to fill a bowl. 'A bowlful of water' is idiomatic and preserves
    the quantity sense without awkward literalism.
- source_word: הַסֵּפֶל
  chosen: bowl
  alternatives:
  - basin
  - cup
  lexicon: HALOT
  rationale: The vessel is a bowl or basin-like container. 'Bowl' is the clearest
    everyday English choice here; 'cup' is too small and 'basin' may sound overly
    large.
