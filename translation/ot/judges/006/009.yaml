id: JDG.6.9
reference: Judges 6:9
source:
  edition: WLC
  text: וָ/אַצִּ֤ל אֶתְ/כֶם֙ מִ/יַּ֣ד מִצְרַ֔יִם וּ/מִ/יַּ֖ד כָּל לֹחֲצֵי/כֶ֑ם וָ/אֲגָרֵ֤שׁ
    אוֹתָ/ם֙ מִ/פְּנֵי/כֶ֔ם וָ/אֶתְּנָ֥/ה לָ/כֶ֖ם אֶת אַרְצָֽ/ם־־׃
translation:
  text: And I delivered you from the hand of Egypt and from the hand of all your oppressors,
    and I drove them out from before you and gave you their land.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וָאַצִּל
  chosen: I delivered
  alternatives:
  - I rescued
  - I snatched away
  lexicon: HALOT
  rationale: From נצל, denoting deliverance/rescue from danger or power. 'Delivered'
    fits biblical idiom well here and pairs naturally with 'from the hand of,' while
    remaining clear in modern English.
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from the power of
  - from
  lexicon: HALOT
  rationale: The idiom 'from the hand of' is preserved because it is transparent in
    English and retains the concrete Hebrew image of power/control.
- source_word: מִצְרַיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: Standard rendering of the place/nation name.
- source_word: כָּל לֹחֲצֵיכֶם
  chosen: all your oppressors
  alternatives:
  - all who oppressed you
  - all your enemies
  lexicon: HALOT
  rationale: לֹחֲצִים refers specifically to those who press, oppress, or afflict.
    'Oppressors' is more precise than the broader 'enemies' and reads naturally.
- source_word: וָאֲגָרֵשׁ
  chosen: I drove them out
  alternatives:
  - I expelled them
  - I cast them out
  lexicon: HALOT
  rationale: גרש commonly means to drive out or expel. 'Drove them out' is idiomatic
    and suits the conquest/land-giving context.
- source_word: מִפְּנֵיכֶם
  chosen: from before you
  alternatives:
  - out before you
  - away from your presence
  lexicon: HALOT
  rationale: The phrase literally means 'from before your face/presence.' 'From before
    you' preserves the Hebrew spatial idiom in understandable English.
- source_word: וָאֶתְּנָה לָכֶם אֶת אַרְצָם
  chosen: and gave you their land
  alternatives:
  - and I gave their land to you
  lexicon: HALOT
  rationale: This is a straightforward rendering of נתן + indirect object + direct
    object. The chosen order is natural modern English while preserving the sense
    exactly.
