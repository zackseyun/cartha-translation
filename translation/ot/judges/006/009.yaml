theological_decisions:
- issue: Divine action in Israel's deliverance and land possession
  chosen_reading: 'The verse is rendered with God as the explicit subject of each
    action: delivering, driving out, and giving the land.'
  rationale: The Hebrew first-person verbs emphasize the LORD's direct agency in redemption
    and conquest. The translation preserves that emphasis without adding theological
    interpretation beyond the text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
