id: JDG.6.32
reference: Judges 6:32
source:
  edition: WLC
  text: וַ/יִּקְרָא ל֥/וֹ בַ/יּוֹם הַ/ה֖וּא יְרֻבַּ֣עַל לֵ/אמֹ֑ר יָ֤רֶב בּ/וֹ֙ הַ/בַּ֔עַל
    כִּ֥י נָתַ֖ץ אֶֽת מִזְבְּחֽ/וֹ־־־׃פ
translation:
  text: So on that day he called him Jerubbaal, saying, “Let Baal contend against
    him, because he tore down his altar.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jerubbaal sounds like a name built on the verb 'contend'; the explanation
      is, 'Let Baal contend against him.'
    reason: lexical_alternative
  - marker: b
    text: Or 'May Baal contend against him'; the Hebrew verb may be heard as a jussive
      wish. Some take it as indicative, 'Baal will contend against him.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְרָא לוֹ
  chosen: he called him
  alternatives:
  - he named him
  - one called him
  lexicon: HALOT
  rationale: The verb קרא with ל plus pronominal suffix commonly means to call/name
    someone. English 'called him' preserves the narrative wording while allowing the
    following name to function as a bestowed epithet. The subject is left as singular
    'he' following the Hebrew form, though English does not specify the antecedent.
- source_word: בַיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - that day
  lexicon: HALOT
  rationale: A straightforward temporal expression. 'On that day' is slightly more
    formal and reflects the preposition ב.
- source_word: יְרֻבַּעַל
  chosen: Jerubbaal
  rationale: Personal names are transliterated by project policy. The form also carries
    wordplay with the following verb ריב ('contend'), which is preserved by the explanatory
    clause rather than translated in the name itself.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - that is
  - with the words
  lexicon: HALOT
  rationale: Standard narrative quotative introducing the explanation of the name.
- source_word: יָרֶב בּוֹ הַבַּעַל
  chosen: Let Baal contend against him
  alternatives:
  - May Baal contend against him
  - Baal will contend against him
  - Let Baal plead against him
  lexicon: HALOT
  rationale: The jussive sense is best represented by 'Let ... contend.' The verb
    ריב can mean contend, dispute, or plead a case; 'contend' preserves the broad
    adversarial sense and echoes the name Jerubbaal. 'Against him' makes the hostile
    force explicit in idiomatic English.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the saying/name. 'Because' is clearer in modern
    English than the more formal 'for.'
- source_word: נָתַץ
  chosen: he tore down
  alternatives:
  - he broke down
  - he demolished
  lexicon: HALOT
  rationale: נתץ denotes pulling down or tearing down, especially an altar or structure.
    'Tore down' is natural modern English and fits the physical action.
- source_word: אֶת מִזְבְּחוֹ
  chosen: his altar
  alternatives:
  - Baal's altar
  lexicon: HALOT
  rationale: The suffix is singular masculine, most naturally referring to Baal in
    the immediate context. 'His altar' preserves the Hebrew pronoun while allowing
    the antecedent to be inferred from context.
