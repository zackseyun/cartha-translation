theological_decisions:
- issue: Rendering the divine name/title בַּעַל in a polemical context
  chosen_reading: Baal
  alternative_readings:
  - the lord
  rationale: Here בעל is the proper name/title of the Canaanite deity, not a generic
    noun meaning 'lord' or 'master.' Translating it as 'Baal' preserves the idolatry
    polemic and avoids confusion with the LORD.
