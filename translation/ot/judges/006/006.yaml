id: JDG.6.6
reference: Judges 6:6
source:
  edition: WLC
  text: וַ/יִּדַּ֧ל יִשְׂרָאֵ֛ל מְאֹ֖ד מִ/פְּנֵ֣י מִדְיָ֑ן וַ/יִּזְעֲק֥וּ בְנֵֽי יִשְׂרָאֵ֖ל
    אֶל יְהוָֽה־־׃פ
translation:
  text: So Israel became very weak because of Midian, and the sons of Israel cried
    out to the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was brought very low' or 'became impoverished.' The Hebrew verb can
      denote being reduced, weakened, or brought low under oppression.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sons of Israel,' a standard covenantal designation for the people
      of Israel.
    reason: lexical_alternative
  - marker: c
    text: Hebrew YHWH, traditionally rendered 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּדַּל
  chosen: became very weak
  alternatives:
  - was brought very low
  - became impoverished
  - was greatly weakened
  lexicon: HALOT
  rationale: The verb from דל conveys being brought low, weakened, or reduced. In
    this context of Midianite oppression, 'became very weak' captures the state of
    severe reduction without over-specifying purely economic poverty, while the following
    מְאֹד intensifies it.
- source_word: מְאֹד
  chosen: very
  alternatives:
  - greatly
  - exceedingly
  lexicon: HALOT
  rationale: Standard adverbial intensifier. 'Very' is natural modern English and
    preserves the force without sounding archaic.
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - before
  - from the presence of
  - on account of
  lexicon: HALOT
  rationale: 'Here the preposition expresses cause in context: Israel''s weakened
    condition resulted from Midian. ''Because of'' communicates the causal sense more
    clearly than the more literal but less idiomatic ''from before''.'
- source_word: מִדְיָן
  chosen: Midian
  rationale: Standard English transliteration of the people/group name.
- source_word: וַיִּזְעֲקוּ
  chosen: cried out
  alternatives:
  - called out
  - cried for help
  - appealed
  lexicon: HALOT
  rationale: זעק commonly denotes a cry of distress. 'Cried out' preserves both the
    emotional urgency and the broadness of the appeal to God.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'sons of Israel.' Per the gender-accurate principle,
    this is retained rather than flattened to 'Israelites,' while still functioning
    corporately for the covenant people.
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition אֶל is straightforwardly 'to.' The divine name יְהוָה
    is rendered 'the LORD' in keeping with the project's stated default for YHWH.
