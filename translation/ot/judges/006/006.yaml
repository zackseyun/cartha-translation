theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD,' following Jewish reverence
    tradition and common English Bible convention while signaling the covenant name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering בְנֵי יִשְׂרָאֵל with gender-accurate language
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The Hebrew form is grammatically masculine plural construct and explicitly
    says 'sons.' Following the gender-accurate principle, the translation preserves
    that form rather than neutralizing it, while recognizing its representative corporate
    sense.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
