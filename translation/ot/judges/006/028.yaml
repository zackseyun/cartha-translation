theological_decisions:
- issue: Rendering of אֲשֵׁרָה
  chosen_reading: the Asherah
  alternative_readings:
  - the Asherah pole
  - the sacred pole
  rationale: The term can denote the cult symbol/object associated with Asherah, and
    some English versions specify 'pole.' Because the Hebrew itself uses the term
    directly and the referent may be broader than a simple pole, the main text preserves
    'Asherah' while noting the more interpretive alternative in a footnote.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sense of עָלָיו with the Asherah
  chosen_reading: beside it
  alternative_readings:
  - on it
  - upon it
  rationale: A strictly formal rendering would be 'upon it,' but in the narrative
    and archaeological/cultic context the Asherah is more plausibly associated with
    or standing beside the altar. Optimal equivalence favors the probable sense while
    preserving the more literal alternative in a footnote.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense without wooden literalism'
