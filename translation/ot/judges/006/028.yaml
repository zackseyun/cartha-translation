id: JDG.6.28
reference: Judges 6:28
source:
  edition: WLC
  text: וַ/יַּשְׁכִּ֜ימוּ אַנְשֵׁ֤י הָ/עִיר֙ בַּ/בֹּ֔קֶר וְ/הִנֵּ֤ה נֻתַּץ֙ מִזְבַּ֣ח
    הַ/בַּ֔עַל וְ/הָ/אֲשֵׁרָ֥ה אֲשֶׁר עָלָ֖י/ו כֹּרָ֑תָה וְ/אֵת֙ הַ/פָּ֣ר הַ/שֵּׁנִ֔י
    הֹֽעֲלָ֔ה עַל הַ/מִּזְבֵּ֖חַ הַ/בָּנֽוּי־־׃
translation:
  text: When the men of the city rose early in the morning, behold, the altar of Baal
    had been torn down, and the Asherah that was beside it had been cut down, and
    the second bull had been offered up on the altar that had been built.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Asherah pole'; Hebrew 'the Asherah.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'upon it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכִּימוּ
  chosen: rose early
  alternatives:
  - got up early
  - arose early
  lexicon: HALOT
  rationale: From שׁכם in the Hiphil/wayyiqtol, indicating an early rising. 'Rose
    early' is idiomatic modern English and preserves the temporal emphasis without
    unnecessary stiffness.
- source_word: אַנְשֵׁי הָעִיר
  chosen: the men of the city
  alternatives:
  - the people of the city
  - the townsmen
  lexicon: HALOT
  rationale: Literally 'men of the city.' Per gender-accurate policy, the masculine
    form is retained rather than neutralized to 'people,' since the Hebrew specifically
    uses men.
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - at morning
  - that morning
  lexicon: HALOT
  rationale: Standard temporal phrase; 'in the morning' is natural English and preserves
    the sense.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - and there was
  lexicon: HALOT
  rationale: Marks sudden discovery and vividness. 'Behold' preserves the narrative
    force better than a flattened omission, while remaining understandable in this
    context.
- source_word: נֻתַּץ
  chosen: had been torn down
  alternatives:
  - had been broken down
  - was demolished
  lexicon: HALOT
  rationale: Passive of נתץ, used for pulling down or demolishing an altar. 'Torn
    down' is vivid and natural for an altar structure.
- source_word: מִזְבַּח הַבַּעַל
  chosen: the altar of Baal
  alternatives:
  - Baal's altar
  lexicon: HALOT
  rationale: Construct relationship is best rendered straightforwardly as 'the altar
    of Baal.'
- source_word: הָאֲשֵׁרָה
  chosen: the Asherah
  alternatives:
  - the Asherah pole
  - the sacred pole
  lexicon: HALOT
  rationale: The Hebrew term likely refers either to the cultic object associated
    with Asherah or, by metonymy, the goddess's symbol. To avoid over-specifying 'pole'
    where the text itself says אֲשֵׁרָה, the transliterated form is retained in the
    main text.
- source_word: אֲשֶׁר עָלָיו
  chosen: that was beside it
  alternatives:
  - that was on it
  - that was upon it
  lexicon: HALOT
  rationale: Though עַל often means 'on/upon,' in this cultic setting the Asherah
    is associated with the altar and likely positioned adjacent to it rather than
    literally on top of it. 'Beside it' gives the probable sense in idiomatic English.
- source_word: כֹּרָתָה
  chosen: had been cut down
  alternatives:
  - had been chopped down
  - was cut down
  lexicon: HALOT
  rationale: Passive of כרת in the sense of cutting down a wooden cult object. 'Had
    been cut down' matches the narrative sequence and the likely wooden nature of
    the Asherah object.
- source_word: הַפָּר הַשֵּׁנִי
  chosen: the second bull
  alternatives:
  - the second young bull
  lexicon: HALOT
  rationale: פַּר denotes a bull; 'second' links back to the prior narrative. 'Young'
    is possible in some contexts but not required here.
- source_word: הֹעֲלָה
  chosen: had been offered up
  alternatives:
  - had been sacrificed
  - was offered
  lexicon: HALOT
  rationale: Hophal of עלה here refers to being caused to ascend as an offering, likely
    a burnt offering in context. 'Offered up' preserves the sacrificial idiom without
    adding more than the verb itself states.
- source_word: הַמִּזְבֵּחַ הַבָּנוּי
  chosen: the altar that had been built
  alternatives:
  - the built altar
  - the altar newly built
  lexicon: HALOT
  rationale: The passive participle indicates the altar as the one that had been built
    previously in the narrative. The relative clause is the most natural English rendering.
