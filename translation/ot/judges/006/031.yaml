id: JDG.6.31
reference: Judges 6:31
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יוֹאָ֡שׁ לְ/כֹל֩ אֲשֶׁר עָמְד֨וּ עָלָ֜י/ו הַ/אַתֶּ֣ם תְּרִיב֣וּ/ן
    לַ/בַּ֗עַל אִם אַתֶּם֙ תּוֹשִׁיע֣וּ/ן אוֹת֔/וֹ אֲשֶׁ֨ר יָרִ֥יב ל֛/וֹ יוּמַ֖ת עַד
    הַ/בֹּ֑קֶר אִם אֱלֹהִ֥ים הוּא֙ יָ֣רֶב ל֔/וֹ כִּ֥י נָתַ֖ץ אֶֽת מִזְבְּחֽ/וֹ־׀־־־־׃
translation:
  text: But Joash said to all who stood against him, “Will you contend for Baal? Will
    you save him? Whoever contends for him shall be put to death by morning. If he
    is a god, let him contend for himself, because someone has torn down his altar.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'because he has torn down his altar,' with the implied subject understood
      as Gideon.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָמְדוּ עָלָיו
  chosen: stood against him
  alternatives:
  - stood by him
  - stood over him
  - confronted him
  lexicon: HALOT
  rationale: In context the men are opposing Joash over Gideon's actions, so the idiom
    is adversative rather than spatially neutral. 'Stood against him' captures the
    confrontational sense naturally in English.
- source_word: תְּרִיבוּן / יָרִיב / יָרֶב
  chosen: contend / contends / let him contend
  alternatives:
  - plead
  - fight
  - take up the case
  lexicon: HALOT
  rationale: The repeated root ריב structures the verse rhetorically. 'Contend' preserves
    the repetition and can cover both legal and combative dispute without over-specifying
    one nuance.
- source_word: תּוֹשִׁיעוּן
  chosen: save
  alternatives:
  - deliver
  - rescue
  lexicon: HALOT
  rationale: '''Save'' is the most direct rendering of the Hiphil of ישׁע here and
    fits the irony: are the people going to rescue their god?'
- source_word: אֲשֶׁר יָרִיב לוֹ
  chosen: Whoever contends for him
  alternatives:
  - He who contends for him
  - Whoever pleads for him
  lexicon: HALOT
  rationale: This indefinite relative introduces a general principle. 'Whoever' is
    idiomatic modern English and preserves the force.
- source_word: יוּמַת
  chosen: shall be put to death
  alternatives:
  - shall die
  - must be executed
  lexicon: HALOT
  rationale: The Hophal is causative/passive, so 'be put to death' is more precise
    than the simple 'die.'
- source_word: עַד הַבֹּקֶר
  chosen: by morning
  alternatives:
  - before morning
  - until morning
  lexicon: HALOT
  rationale: In this threat formula, the sense is a deadline by the coming morning.
    'By morning' is concise and idiomatic.
- source_word: אֱלֹהִים הוּא
  chosen: he is a god
  alternatives:
  - he is God
  - he is divine
  lexicon: HALOT
  rationale: Here אֱלֹהִים refers to Baal as a supposed deity, not the God of Israel.
    The anarthrous predicative sense is best represented as 'a god.'
- source_word: כִּי נָתַץ אֶת מִזְבְּחוֹ
  chosen: because someone has torn down his altar
  alternatives:
  - because he has torn down his altar
  - for his altar has been torn down
  lexicon: HALOT
  rationale: The Hebrew uses a 3ms verb without an explicit subject. Since Joash is
    speaking generally and the immediate point is the fact of the altar's destruction,
    'someone has torn down' avoids over-specifying Gideon as the explicit subject
    while keeping the causal force of כִּי.
- source_word: וַיֹּאמֶר
  chosen: But Joash said
  alternatives:
  - And Joash said
  lexicon: HALOT
  rationale: The conjunction advances the narrative with a contrastive turn in context,
    as Joash responds to the accusers. 'But' brings out that response naturally in
    English.
