theological_decisions:
- issue: Reference of אֱלֹהִים to Baal
  chosen_reading: Rendered as 'a god' rather than 'God'
  alternative_readings:
  - If he is God, let him contend for himself
  rationale: The speaker is referring to Baal's claimed deity, not affirming Baal
    as the true God. Lowercase with the indefinite article communicates this clearly
    without importing theological confusion.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    the source''s plain sense.'
