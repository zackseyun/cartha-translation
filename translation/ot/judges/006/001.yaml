id: JDG.6.1
reference: Judges 6:1
source:
  edition: WLC
  text: וַ/יַּעֲשׂ֧וּ בְנֵי יִשְׂרָאֵ֛ל הָ/רַ֖ע בְּ/עֵינֵ֣י יְהוָ֑ה וַ/יִּתְּנֵ֧/ם יְהוָ֛ה בְּ/יַד מִדְיָ֖ן שֶׁ֥בַע שָׁנִֽים־־׃
translation:
  text: And the sons of Israel did what was evil in the eyes of Yahweh, and Yahweh gave them into the hand of Midian for seven years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the Israelites.'' Hebrew: ''the sons of Israel.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'in the sight of the LORD.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'into the hand of Midian,' an idiom meaning under Midian's power or control.
    reason: cultural_note
lexical_decisions:
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' This preserves the Hebrew idiom and the source's masculine plural form, in keeping with the gender-accurate policy. 'Israelites' is smoother English, but the more literal rendering is still natural enough here and reflects the recurring Judges formula.
- source_word: הָרַע
  chosen: what was evil
  alternatives:
  - evil
  - what was wrong
  lexicon: HALOT
  rationale: With עשה, the idiom means 'do the evil/what was evil.' 'What was evil' is idiomatic English that preserves the moral force of the Hebrew better than a flatter 'did evil' while remaining readable.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This is a standard Hebrew evaluative idiom. 'In the eyes of' is a transparent, fairly literal rendering; 'in the sight of' is a viable English alternative. The divine name is rendered 'the LORD' per doctrine for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיִּתְּנֵם
  chosen: gave them
  alternatives:
  - handed them over
  - delivered them
  lexicon: HALOT
  rationale: נתן with the following phrase 'into the hand of' is a common idiom for giving someone over to another's power. 'Gave them' keeps the Hebrew structure and allows the next phrase to carry the sense of subjection.
- source_word: בְּיַד מִדְיָן
  chosen: into the hand of Midian
  alternatives:
  - into Midian's hand
  - under the power of Midian
  lexicon: HALOT
  rationale: The singular 'hand' is a Hebrew idiom for power or control. Rendering it literally preserves the imagery and common biblical phrasing; the sense of domination is clear in context.
- source_word: מִדְיָן
  chosen: Midian
  lexicon: HALOT
  rationale: Proper name transliterated according to standard English convention, per project policy to transliterate names.
- source_word: שֶׁבַע שָׁנִים
  chosen: for seven years
  alternatives:
  - seven years
  lexicon: HALOT
  rationale: English idiom naturally supplies 'for' to express duration. This does not add meaning beyond what the Hebrew duration phrase conveys.
