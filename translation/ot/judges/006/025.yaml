  - Jehovah
  rationale: Required by the project's contested-terms policy for YHWH.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering הָאֲשֵׁרָה
  chosen_reading: the Asherah
  alternative_readings:
  - the Asherah pole
  - the sacred pole
  rationale: Using the transliterated cultic term avoids over-resolving whether the referent is strictly a wooden pole, a cult symbol, or an object representing the goddess. This preserves the historical-religious ambiguity of the Hebrew term.
