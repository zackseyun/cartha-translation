id: JDG.6.25
reference: Judges 6:25
source:
  edition: WLC
  text: וַ/יְהִי֮ בַּ/לַּ֣יְלָה הַ/הוּא֒ וַ/יֹּ֧אמֶר ל֣/וֹ יְהוָ֗ה קַ֤ח אֶת פַּר הַ/שּׁוֹר֙ אֲשֶׁ֣ר לְ/אָבִ֔י/ךָ וּ/פַ֥ר הַ/שֵּׁנִ֖י שֶׁ֣בַע שָׁנִ֑ים וְ/הָרַסְתָּ֗ אֶת מִזְבַּ֤ח הַ/בַּ֨עַל֙ אֲשֶׁ֣ר לְ/אָבִ֔י/ךָ וְ/אֶת הָ/אֲשֵׁרָ֥ה אֲשֶׁר עָלָ֖י/ו תִּכְרֹֽת־־־־־׃
translation:
  text: And it happened that night that Yahweh said to him, “Take your father’s bull and the second bull, seven years old, and tear down the altar of Baal that belongs to your father, and cut down the Asherah that is upon it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Asherah pole' or 'the sacred pole.' The Hebrew term can denote a cultic object associated with Asherah.
    reason: lexical_alternative
  - marker: b
    text: Literally 'that is upon it.' The phrase may indicate the Asherah stood on, over, or in close association with the altar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי בַּלַּיְלָה הַהוּא
  chosen: And it happened that night
  alternatives:
  - That night
  - And it came to pass that night
  lexicon: HALOT
  rationale: Retains the narrative wayyiqtol introduction while using readable modern English. 'That night' captures the temporal phrase; 'And it happened' preserves the Hebrew narrative transition without archaic 'came to pass.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md.
- source_word: קַח
  chosen: Take
  alternatives:
  - Bring
  - Fetch
  lexicon: HALOT
  rationale: Direct imperative sense is best represented by 'Take.'
- source_word: פַּר הַשּׁוֹר
  chosen: your father’s bull
  alternatives:
  - the bull of the oxen
  - the young bull that belongs to your father
  lexicon: HALOT
  rationale: פַּר denotes a bull/young bull. The construct with הַשּׁוֹר is somewhat appositional or specifying; idiomatic English is best served by 'your father's bull.'
- source_word: וּפַר הַשֵּׁנִי שֶׁבַע שָׁנִים
  chosen: the second bull, seven years old
  alternatives:
  - and the second bull, seven years old
  - even the second bull, seven years old
  lexicon: HALOT
  rationale: The Hebrew can be read as mentioning a second bull in addition to the first. The appositional phrasing is preserved in English. 'Seven years old' directly renders the age expression.
- source_word: וְהָרַסְתָּ
  chosen: tear down
  alternatives:
  - break down
  - demolish
  lexicon: HALOT
  rationale: A forceful but natural rendering for the command to destroy an altar.
- source_word: מִזְבַּח הַבַּעַל
  chosen: the altar of Baal
  alternatives:
  - Baal's altar
  lexicon: HALOT
  rationale: Formal and clear rendering of the construct phrase.
- source_word: אֲשֶׁר לְאָבִיךָ
  chosen: that belongs to your father
  alternatives:
  - that is your father's
  - which your father has
  lexicon: HALOT
  rationale: Makes explicit the possessive relation in natural English.
- source_word: הָאֲשֵׁרָה
  chosen: the Asherah
  alternatives:
  - the Asherah pole
  - the sacred pole
  lexicon: HALOT
  rationale: The Hebrew term may refer to a cultic object associated with Asherah. Because the form here is the proper cultic term and the referent can be debated, the transliterated rendering preserves ambiguity better than 'pole' in the main text.
- source_word: אֲשֶׁר עָלָיו
  chosen: that is beside it
  alternatives:
  - that is on it
  - that is upon it
  lexicon: HALOT
  rationale: Though literally 'upon it,' in context of an Asherah associated with an altar, English 'beside it' likely communicates the spatial relation more naturally. The more literal alternative is preserved in a footnote because the exact positioning is not fully certain.
- source_word: תִּכְרֹת
  chosen: cut down
  alternatives:
  - cut off
  - chop down
  lexicon: HALOT
  rationale: Standard rendering for felling a wooden cult object.
