id: JDG.6.37
reference: Judges 6:37
source:
  edition: WLC
  text: הִנֵּ֣ה אָנֹכִ֗י מַצִּ֛יג אֶת גִּזַּ֥ת הַ/צֶּ֖מֶר בַּ/גֹּ֑רֶן אִ֡ם טַל֩ יִהְיֶ֨ה
    עַֽל הַ/גִּזָּ֜ה לְ/בַדָּ֗/הּ וְ/עַל כָּל הָ/אָ֨רֶץ֙ חֹ֔רֶב וְ/יָדַעְתִּ֗י כִּֽי
    תוֹשִׁ֧יעַ בְּ/יָדִ֛/י אֶת יִשְׂרָאֵ֖ל כַּ/אֲשֶׁ֥ר דִּבַּֽרְתָּ־־־־־־׃
translation:
  text: Look, I am placing a fleece of wool on the threshing floor. If there is dew
    on the fleece alone, and dryness on all the ground, then I will know that you
    will save Israel by my hand, just as you have spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the land' or 'all the earth'; the Hebrew word can refer to the ground
      locally or to the land more broadly. Here it likely means the surrounding ground
      in the setting of the sign.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces Gideon's proposed sign with deictic emphasis. 'Look' is natural
    modern English while preserving the attention-getting force better than omitting
    it.
- source_word: מַצִּיג
  chosen: am placing
  alternatives:
  - am setting
  - am laying out
  lexicon: HALOT
  rationale: The participle with אָנֹכִי conveys imminent or present action. 'Am placing'
    is idiomatic and suitably concrete for setting the fleece in position.
- source_word: גִּזַּת הַצֶּמֶר
  chosen: a fleece of wool
  alternatives:
  - the wool fleece
  - a shorn fleece
  lexicon: HALOT
  rationale: Refers to a fleece, specifically of wool. English idiom prefers 'a fleece
    of wool.' The Hebrew construct is preserved in sense without awkwardness.
- source_word: בַּגֹּרֶן
  chosen: on the threshing floor
  alternatives:
  - in the threshing floor area
  lexicon: HALOT
  rationale: Standard rendering for גֹּרֶן. 'On the threshing floor' is idiomatic
    for placing an object on that prepared surface.
- source_word: אִם
  chosen: If
  alternatives:
  - Suppose that
  lexicon: HALOT
  rationale: Introduces the condition of Gideon's test straightforwardly.
- source_word: טַל יִהְיֶה
  chosen: there is dew
  alternatives:
  - dew falls
  - dew is present
  lexicon: HALOT
  rationale: Existential English best captures the Hebrew clause without over-specifying
    the action of falling.
- source_word: עַל הַגִּזָּה לְבַדָּהּ
  chosen: on the fleece alone
  alternatives:
  - only on the fleece
  - on the fleece by itself
  lexicon: HALOT
  rationale: לְבַדָּהּ marks exclusivity. 'On the fleece alone' preserves the emphasis
    and reads smoothly.
- source_word: וְעַל כָּל הָאָרֶץ חֹרֶב
  chosen: and dryness on all the ground
  alternatives:
  - while all the earth is dry
  - and dry ground over all the land
  lexicon: HALOT
  rationale: חֹרֶב here denotes dryness rather than a named object. 'Ground' fits
    the immediate physical setting better than the broader 'earth,' while still reflecting
    הָאָרֶץ contextually.
- source_word: וְיָדַעְתִּי
  chosen: then I will know
  alternatives:
  - and I will know
  lexicon: HALOT
  rationale: The conjunction plus perfect in context expresses the result of the fulfilled
    condition. 'Then' makes the logical sequence explicit in natural English.
- source_word: כִּי תוֹשִׁיעַ
  chosen: that you will save
  alternatives:
  - that you are going to deliver
  lexicon: HALOT
  rationale: The Hiphil of יָשַׁע means to save/deliver. 'Save' is the more direct
    and biblically consistent rendering here.
- source_word: בְּיָדִי
  chosen: by my hand
  alternatives:
  - through me
  - by means of me
  lexicon: HALOT
  rationale: Literally 'by my hand,' a common Hebrew idiom for agency or instrumentality.
    Retained because it is clear in English and preserves the Hebrew imagery.
- source_word: כַּאֲשֶׁר דִּבַּרְתָּ
  chosen: just as you have spoken
  alternatives:
  - as you said
  - just as you promised
  lexicon: HALOT
  rationale: Keeps close to the Hebrew verb 'spoken' without importing the stronger
    covenantal nuance of 'promised,' though that is implied by context.
