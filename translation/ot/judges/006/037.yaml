theological_decisions:
- issue: Scope of הָאָרֶץ in the sign narrative
  chosen_reading: ground
  alternative_readings:
  - earth
  - land
  rationale: In this immediate narrative setting Gideon contrasts the fleece with
    the surrounding surface of the threshing floor/area, not the entire world or necessarily
    the whole land of Israel. 'Ground' preserves the local physical sense without
    overstating the scope.
