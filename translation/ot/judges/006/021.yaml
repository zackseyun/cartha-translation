id: JDG.6.21
reference: Judges 6:21
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֞ח מַלְאַ֣ךְ יְהוָ֗ה אֶת קְצֵ֤ה הַ/מִּשְׁעֶ֨נֶת֙ אֲשֶׁ֣ר בְּ/יָד֔/וֹ
    וַ/יִּגַּ֥ע בַּ/בָּשָׂ֖ר וּ/בַ/מַּצּ֑וֹת וַ/תַּ֨עַל הָ/אֵ֜שׁ מִן הַ/צּ֗וּר וַ/תֹּ֤אכַל
    אֶת הַ/בָּשָׂר֙ וְ/אֶת הַ/מַּצּ֔וֹת וּ/מַלְאַ֣ךְ יְהוָ֔ה הָלַ֖ךְ מֵ/עֵינָֽי/ו־־־־׃
translation:
  text: Then the angel of the LORD reached out the tip of the staff that was in his
    hand and touched the meat and the unleavened bread. And fire went up from the
    rock and consumed the meat and the unleavened bread. Then the angel of the LORD
    went away from his sight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the messenger of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'flesh'; here it refers to the prepared meat of the offering.
    reason: lexical_alternative
  - marker: c
    text: Or 'departed from before him'; Hebrew literally 'went from his eyes,' meaning
      he was no longer visible to Gideon.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאָךְ can mean either 'messenger' or 'angel'; in this narrative context
    the being acts supernaturally, so 'angel' best fits normal English usage while
    preserving the Hebrew construction. יְהוָה follows the doctrinal default rendering
    'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the covenant name is rendered 'the LORD' rather than
    transliterated forms.
- source_word: קְצֵה הַמִּשְׁעֶנֶת
  chosen: the tip of the staff
  alternatives:
  - the end of the staff
  - the tip of the walking stick
  lexicon: HALOT
  rationale: קָצֶה means 'end/extremity'; מִשְׁעֶנֶת is a staff/support. 'Tip of the
    staff' is natural English and preserves the concrete image.
- source_word: וַיִּשְׁלַח
  chosen: reached out
  alternatives:
  - stretched out
  - sent out
  lexicon: HALOT
  rationale: In context with the object 'the tip of the staff,' the verb denotes extending
    the staff outward, not sending. 'Reached out' is idiomatic and accurate.
- source_word: וַיִּגַּע
  chosen: touched
  alternatives:
  - struck
  - made contact with
  lexicon: HALOT
  rationale: נגע commonly means 'touch'; no stronger action is required by the context.
- source_word: בָּשָׂר
  chosen: meat
  alternatives:
  - flesh
  lexicon: HALOT
  rationale: Here the referent is prepared food in Gideon's offering, so 'meat' communicates
    the culinary sense better than the more literal but potentially misleading 'flesh.'
- source_word: מַצּוֹת
  chosen: unleavened bread
  alternatives:
  - unleavened cakes
  - matzot
  lexicon: HALOT
  rationale: The plural refers to the food item Gideon prepared. 'Unleavened bread'
    is clear modern English and preserves the essential meaning.
- source_word: וַתַּעַל הָאֵשׁ מִן הַצּוּר
  chosen: fire went up from the rock
  alternatives:
  - the fire rose from the rock
  - fire came up out of the rock
  lexicon: HALOT
  rationale: עלה with fire and מן indicates upward emergence from the rock. 'Went
    up from the rock' preserves the vivid sequence without overinterpreting.
- source_word: וַתֹּאכַל
  chosen: consumed
  alternatives:
  - ate up
  - devoured
  lexicon: HALOT
  rationale: Although literally 'ate,' English idiom for fire is 'consumed,' which
    is both natural and faithful.
- source_word: הָלַךְ מֵעֵינָיו
  chosen: went away from his sight
  alternatives:
  - departed from before him
  - vanished from his sight
  lexicon: HALOT
  rationale: The Hebrew literally indicates departure from Gideon's sight. 'Went away
    from his sight' stays close to the wording without adding the stronger implication
    of sudden disappearance that 'vanished' might suggest.
