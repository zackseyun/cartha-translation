id: JDG.6.29
reference: Judges 6:29
source:
  edition: WLC
  text: וַ/יֹּֽאמְרוּ֙ אִ֣ישׁ אֶל רֵעֵ֔/הוּ מִ֥י עָשָׂ֖ה הַ/דָּבָ֣ר הַ/זֶּ֑ה וַֽ/יִּדְרְשׁוּ֙
    וַ/יְבַקְשׁ֔וּ וַ/יֹּ֣אמְר֔וּ גִּדְעוֹן֙ בֶּן יוֹאָ֔שׁ עָשָׂ֖ה הַ/דָּבָ֥ר הַ/זֶּֽה־־׃
translation:
  text: And each man said to his neighbor, “Who did this thing?” And they inquired
    and searched, and they said, “Gideon son of Joash did this thing.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “one man to another.” The Hebrew idiom literally reads “a man to his
      neighbor.”
    reason: lexical_alternative
  - marker: b
    text: Or “this deed” or “this act.” Hebrew דָּבָר here refers to the action that
      had been done.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ אֶל־רֵעֵהוּ
  chosen: each man ... to his neighbor
  alternatives:
  - one man ... to another
  - each person ... to his companion
  lexicon: HALOT
  rationale: The idiom literally reads 'a man to his neighbor/friend' and denotes
    mutual discussion among the townsmen. 'Each man ... to his neighbor' preserves
    the distributive sense and the masculine singular forms without flattening the
    Hebrew idiom into a vague plural.
- source_word: מִי
  chosen: Who
  lexicon: HALOT
  rationale: Straightforward interrogative pronoun introducing the question of agency.
- source_word: עָשָׂה
  chosen: did
  alternatives:
  - has done
  - made
  lexicon: HALOT
  rationale: In this context of an act committed against the altar and Asherah, idiomatic
    English prefers 'did' over the more wooden 'made.' The perfect verb reports completed
    action.
- source_word: הַדָּבָר הַזֶּה
  chosen: this thing
  alternatives:
  - this deed
  - this act
  - this matter
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'thing.' Here it refers to the concrete
    action just discovered. 'This thing' is natural and sufficiently broad; 'deed'
    is possible but slightly more interpretive.
- source_word: וַיִּדְרְשׁוּ
  chosen: they inquired
  alternatives:
  - they investigated
  - they sought to find out
  lexicon: HALOT
  rationale: דרשׁ here conveys inquiry/investigation. 'Inquired' preserves the verbal
    distinction from the following בקשׁ while remaining readable.
- source_word: וַיְבַקְשׁוּ
  chosen: searched
  alternatives:
  - looked for answers
  - sought
  lexicon: HALOT
  rationale: בקשׁ commonly means 'seek.' Rendering it as 'searched' differentiates
    it from the preceding 'inquired' and reflects the progression from asking to actively
    seeking the culprit.
- source_word: גִּדְעוֹן בֶּן־יוֹאָשׁ
  chosen: Gideon son of Joash
  alternatives:
  - Gideon, the son of Joash
  lexicon: HALOT
  rationale: Personal names are transliterated. 'Son of Joash' is the standard Hebrew
    patronymic and is clear in English without adding punctuation not required by
    the syntax.
- source_word: וַיֹּאמְרוּ
  chosen: they said
  alternatives:
  - they concluded
  - they answered
  lexicon: HALOT
  rationale: The repeated verb אמר is retained as 'said' rather than interpreted more
    strongly. The narrative simply reports their speech after inquiry.
