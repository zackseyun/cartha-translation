theological_decisions:
- issue: Rendering of divine messenger terminology in a theophanic context
  chosen_reading: the angel of God
  alternative_readings:
  - the messenger of God
  rationale: The Hebrew term itself allows either sense, but in Judges 6 the figure
    is presented as a supernatural divine envoy. Rendering it 'angel' preserves the
    narrative's theological weight without prematurely resolving every aspect of the
    theophany beyond the text.
  doctrine_reference: Translation philosophy §1, §3
