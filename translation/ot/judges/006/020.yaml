id: JDG.6.20
reference: Judges 6:20
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֵלָ֜י/ו מַלְאַ֣ךְ הָ/אֱלֹהִ֗ים קַ֣ח אֶת הַ/בָּשָׂ֤ר וְ/אֶת הַ/מַּצּוֹת֙
    וְ/הַנַּח֙ אֶל הַ/סֶּ֣לַע הַלָּ֔ז וְ/אֶת הַ/מָּרַ֖ק שְׁפ֑וֹךְ וַ/יַּ֖עַשׂ כֵּֽן־־־־׃
translation:
  text: Then the angel of God said to him, “Take the meat and the unleavened bread,
    and set them on this rock, and pour out the broth.” And he did so.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the messenger of God.” The Hebrew word can mean either a human messenger
      or an angelic messenger; here the context favors a supernatural envoy.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאַךְ הָאֱלֹהִים
  chosen: the angel of God
  alternatives:
  - the messenger of God
  lexicon: HALOT
  rationale: מַלְאַךְ can mean either 'messenger' or 'angel'; in this narrative context
    the supernatural identity is becoming evident, so 'angel' is the most natural
    English rendering. The construct with הָאֱלֹהִים is rendered straightforwardly
    as 'of God,' not 'of the gods.'
- source_word: קַח
  chosen: Take
  alternatives:
  - Bring
  lexicon: HALOT
  rationale: The imperative of לקח most directly means 'take.' 'Bring' would add directional
    nuance not explicit in the verb itself.
- source_word: הַבָּשָׂר
  chosen: the meat
  alternatives:
  - the flesh
  lexicon: HALOT
  rationale: While בָּשָׂר is literally 'flesh,' in food context 'meat' is the natural
    and accurate English equivalent.
- source_word: הַמַּצּוֹת
  chosen: the unleavened bread
  alternatives:
  - the unleavened cakes
  - the matzot
  lexicon: HALOT
  rationale: מַצּוֹת refers to unleavened baked items. 'Unleavened bread' is clear
    modern English; 'cakes' is possible but less idiomatic here. The plural idea is
    retained collectively.
- source_word: וְהַנַּח
  chosen: set them
  alternatives:
  - place them
  - lay them down
  lexicon: HALOT
  rationale: The Hiphil imperative of נוח here means to place or set down. 'Set them'
    is concise and natural; the plural object is supplied in English from the preceding
    coordinated objects ('the meat and the unleavened bread').
- source_word: אֶל־הַסֶּלַע הַלָּז
  chosen: on this rock
  alternatives:
  - onto this crag
  - to this rock
  lexicon: HALOT
  rationale: סֶּלַע is 'rock/crag.' With הנח in context, English idiom prefers 'on
    this rock' rather than the more literal 'to this rock.' הַלָּז is a demonstrative-like
    form meaning 'this.'
- source_word: הַמָּרַק
  chosen: the broth
  alternatives:
  - the soup
  - the juice
  lexicon: HALOT
  rationale: מָרָק denotes broth or cooking liquid. 'Broth' best fits the sacrificial-meal
    context without sounding overly colloquial.
- source_word: שְׁפֹוךְ
  chosen: pour out
  alternatives:
  - pour
  lexicon: HALOT
  rationale: The imperative of שפך commonly means 'pour out.' Including 'out' reflects
    standard English usage and the likely sense of emptying the liquid onto the rock.
- source_word: וַיַּעַשׂ כֵּן
  chosen: And he did so
  alternatives:
  - And he did thus
  - So he did
  lexicon: HALOT
  rationale: This idiom reports obedient compliance. 'And he did so' is natural modern
    English and preserves the concise force of the Hebrew.
