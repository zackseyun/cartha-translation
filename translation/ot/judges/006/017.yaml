theological_decisions:
- issue: Identity emphasis in Gideon's request
  chosen_reading: 'The clause is rendered to emphasize confirmation of the speaker''s
    identity: ''that you are the one speaking with me.'''
  alternative_readings:
  - that you are speaking with me
  - that it is you speaking with me
  rationale: The Hebrew includes the explicit pronoun אַתָּה before the participle
    מְדַבֵּר, which naturally heightens the subject. The translation preserves Gideon's
    request for a confirming sign without importing a fuller theological conclusion
    about Gideon's exact understanding at this moment.
  doctrine_reference: Preserve theological tension rather than resolve it.
