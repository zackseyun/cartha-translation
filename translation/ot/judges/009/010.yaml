id: JDG.9.10
reference: Judges 9:10
source:
  edition: WLC
  text: וַ/יֹּאמְר֥וּ הָ/עֵצִ֖ים לַ/תְּאֵנָ֑ה לְכִי אַ֖תְּ מָלְכִ֥י עָלֵֽי/נוּ־׃
translation:
  text: Then the trees said to the fig tree, ‘You come, reign over us.’
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequential force; 'said' is the plain sense of
    אמר.
- source_word: הָעֵצִים
  chosen: the trees
  alternatives:
  - the wood/plants
  lexicon: HALOT
  rationale: עֵצִים is the common plural for trees/wood. In this fable context, 'trees'
    is clearly intended as the speaking subjects.
- source_word: לַתְּאֵנָה
  chosen: to the fig tree
  alternatives:
  - to the fig
  lexicon: HALOT
  rationale: 'תְּאֵנָה denotes the fig tree rather than merely its fruit in this context.
    The preposition ל marks indirect object: the trees speak to the fig tree.'
- source_word: לְכִי
  chosen: You come
  alternatives:
  - Come
  - Go, come
  lexicon: HALOT
  rationale: Imperative feminine singular of הלך addressed to the feminine noun 'fig
    tree.' English commonly omits the pronoun in imperatives, but retaining 'You'
    helps reflect the explicit feminine-singular addressee and the emphatic direct
    address in the parallel fable lines.
- source_word: אַתְּ
  chosen: You
  alternatives:
  - ': implicit in English imperative'
  lexicon: HALOT
  rationale: The independent pronoun is explicit in Hebrew and adds emphasis before
    the second imperative. Rendering it as 'You' preserves that emphasis.
- source_word: מָלְכִי
  chosen: reign
  alternatives:
  - be king
  - rule as king
  lexicon: HALOT
  rationale: Imperative feminine singular from מלך. 'Reign' is idiomatic and concise
    in English; 'be king over us' is possible, but 'reign over us' better captures
    the verbal force.
- source_word: עָלֵינוּ
  chosen: over us
  alternatives:
  - upon us
  lexicon: HALOT
  rationale: With מלך, על indicates rule over subjects. 'Over us' is the standard
    and natural English rendering.
