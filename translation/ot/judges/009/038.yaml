id: JDG.9.38
reference: Judges 9:38
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֵלָ֜י/ו זְבֻ֗ל אַיֵּ֨ה אֵפ֥וֹא פִ֨י/ךָ֙ אֲשֶׁ֣ר תֹּאמַ֔ר מִ֥י
    אֲבִימֶ֖לֶךְ כִּ֣י נַעַבְדֶ֑/נּוּ הֲ/לֹ֨א זֶ֤ה הָ/עָם֙ אֲשֶׁ֣ר מָאַ֣סְתָּה בּ֔/וֹ
    צֵא נָ֥א עַתָּ֖ה וְ/הִלָּ֥חֶם בּֽ/וֹ־׃ס
translation:
  text: Then Zebul said to him, “Where is your mouth now, you who said, ‘Who is Abimelech,
    that we should serve him?’ Is this not the people whom you despised? Go out now
    and fight against him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “Where is your mouth now?”—an idiom mocking his earlier
      bold talk.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַיֵּה אֵפוֹא
  chosen: Where ... now
  alternatives:
  - Where then
  - Where indeed now
  lexicon: HALOT
  rationale: The combination is an idiomatic taunt asking where Gaal's earlier bravado
    has gone. 'Where ... now' captures the mocking force in natural English without
    over-paraphrasing.
- source_word: פִּיךָ
  chosen: your mouth
  alternatives:
  - your boast
  - your words
  lexicon: HALOT
  rationale: Literally 'your mouth.' Retained in English to preserve the vivid Hebrew
    idiom and insult. The sense is Gaal's speech/boasting, but the literal image works
    well in context.
- source_word: אֲשֶׁר תֹּאמַר
  chosen: you who said
  alternatives:
  - that said
  - when you said
  lexicon: HALOT
  rationale: This relative clause points back to Gaal as the one who had made the
    earlier statement. 'You who said' is idiomatic and keeps the direct address clear.
- source_word: מִי אֲבִימֶלֶךְ כִּי נַעַבְדֶנּוּ
  chosen: Who is Abimelech, that we should serve him?
  alternatives:
  - Who is Abimelech, that we may serve him?
  - Who is Abimelech, that we should become his servants?
  lexicon: HALOT
  rationale: A near-formal rendering of Gaal's earlier challenge. 'Should serve him'
    best conveys the rhetorical, dismissive force of the clause.
- source_word: הֲלֹא
  chosen: Is this not
  alternatives:
  - Is it not
  - Surely this is
  lexicon: HALOT
  rationale: Introduces a rhetorical question. 'Is this not' preserves the interrogative
    force and the confrontational tone.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - this people
  - the troops
  lexicon: HALOT
  rationale: Refers collectively to Abimelech's force. 'The people' is the straightforward
    rendering of the Hebrew noun and fits the immediate context.
- source_word: מָאַסְתָּה בּוֹ
  chosen: whom you despised
  alternatives:
  - whom you rejected
  - that you scorned
  lexicon: HALOT
  rationale: The verb denotes rejection/contempt. 'Despised' best matches the taunting
    tone and the force of Gaal's prior disdain.
- source_word: צֵא נָא עַתָּה
  chosen: Go out now
  alternatives:
  - Come out now
  - Go out, please, now
  lexicon: HALOT
  rationale: צֵא is an imperative to go out into battle. נָא here softens or urges
    rather than politely requests; in English the urgency is best conveyed simply
    by 'now' without adding 'please,' which would sound misleadingly courteous.
- source_word: וְהִלָּחֶם בּוֹ
  chosen: and fight against him
  alternatives:
  - and fight with him
  - and do battle against him
  lexicon: HALOT
  rationale: The Niphal of לחם in this context means to engage in battle. 'Against
    him' makes the adversarial sense explicit and natural in English.
