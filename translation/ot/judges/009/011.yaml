id: JDG.9.11
reference: Judges 9:11
source:
  edition: WLC
  text: וַ/תֹּ֤אמֶר לָ/הֶם֙ הַ/תְּאֵנָ֔ה הֶ/חֳדַ֨לְתִּי֙ אֶת מָתְקִ֔/י וְ/אֶת תְּנוּבָתִ֖/י
    הַ/טּוֹבָ֑ה וְ/הָ֣לַכְתִּ֔י לָ/נ֖וּעַ עַל הָ/עֵצִֽים־־־׃
translation:
  text: But the fig tree said to them, ‘Should I stop producing my sweetness and my
    good fruit, and go to sway over the trees?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to rule over the trees.' The Hebrew verb literally means 'to sway' or
      'to move,' preserving the tree imagery while implying rulership in the fable.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: But ... said
  alternatives:
  - and ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. In English, 'But' fits the
    contrastive flow in Jotham's fable, since this is another refusal following the
    previous tree's response.
- source_word: הַתְּאֵנָה
  chosen: the fig tree
  alternatives:
  - the fig
  lexicon: HALOT
  rationale: The noun denotes the fig tree as the speaking character in the fable;
    'fig tree' is the natural English equivalent.
- source_word: הֶחֳדַלְתִּי
  chosen: Should I stop producing
  alternatives:
  - Have I ceased
  - Should I cease
  - Should I leave off
  lexicon: HALOT
  rationale: 'In this rhetorical question, the perfect form carries deliberative force:
    ''Should I stop...?'' The verb חדל means to cease or stop. ''Producing'' is supplied
    idiomatically because the objects are products of the tree.'
- source_word: מָתְקִי
  chosen: my sweetness
  alternatives:
  - my sweetness produce
  - my sweet fruit
  - my sweetness
  lexicon: HALOT
  rationale: The noun refers to sweetness/sweetness-quality. 'My sweetness' preserves
    the metaphorical-personified wording better than flattening it to simply 'sweet
    fruit.'
- source_word: תְּנוּבָתִי הַטּוֹבָה
  chosen: my good fruit
  alternatives:
  - my good produce
  - my good yield
  lexicon: HALOT
  rationale: תְּנוּבָה denotes produce, yield, or fruit. For a fig tree, 'fruit' is
    the most natural contextual rendering. 'Good' preserves the adjective directly.
- source_word: וְהָלַכְתִּי
  chosen: and go
  alternatives:
  - and should I go
  - then go
  lexicon: HALOT
  rationale: Following the rhetorical opening, the sequence continues naturally in
    English as 'and go,' dependent on 'Should I stop...?' rather than requiring a
    second explicit auxiliary.
- source_word: לָנוּעַ
  chosen: to sway over
  alternatives:
  - to wave over
  - to move over
  - to hold sway over
  - to rule over
  lexicon: HALOT
  rationale: The verb נוע literally means to move, sway, or shake. In the fable's
    irony about kingship among trees, 'sway over' preserves the arboreal imagery better
    than the more interpretive 'rule over.'
- source_word: עַל הָעֵצִים
  chosen: over the trees
  alternatives:
  - above the trees
  - over the other trees
  lexicon: HALOT
  rationale: עַל here expresses position or authority in the fable. 'Over the trees'
    is idiomatic and preserves the image.
