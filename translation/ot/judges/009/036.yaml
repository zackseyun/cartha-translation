id: JDG.9.36
reference: Judges 9:36
source:
  edition: WLC
  text: וַ/יַּרְא גַּעַל֮ אֶת הָ/עָם֒ וַ/יֹּ֣אמֶר אֶל זְבֻ֔ל הִנֵּה עָ֣ם יוֹרֵ֔ד מֵ/רָאשֵׁ֖י
    הֶ/הָרִ֑ים וַ/יֹּ֤אמֶר אֵלָי/ו֙ זְבֻ֔ל אֵ֣ת צֵ֧ל הֶ/הָרִ֛ים אַתָּ֥ה רֹאֶ֖ה כָּ/אֲנָשִֽׁים־־־־׃ס
translation:
  text: When Gaal saw the people, he said to Zebul, “Look, people are coming down
    from the tops of the mountains.” But Zebul said to him, “You are seeing the shadow
    of the mountains as men.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “You see the shadow of the mountains like men.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - looked
  - perceived
  lexicon: HALOT
  rationale: Qal wayyiqtol of ראה in straightforward narrative is best rendered 'saw.'
- source_word: הָעָם / עָם
  chosen: the people / people
  alternatives:
  - the troops
  - the army
  lexicon: HALOT
  rationale: עָם commonly means 'people.' In context it refers to a group of persons
    approaching, but the Hebrew does not explicitly specify soldiers, so 'people'
    preserves the wording.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: An attention-getter in direct speech; 'Look' is natural modern English
    without archaic tone.
- source_word: יוֹרֵד
  chosen: are coming down
  alternatives:
  - is descending
  - comes down
  lexicon: HALOT
  rationale: 'Although morphologically singular, עָם is a collective noun; English
    idiom prefers plural agreement here: ''people are coming down.'' ''Coming down''
    fits the deictic perspective of an observed approach from higher ground.'
- source_word: מֵרָאשֵׁי הֶהָרִים
  chosen: from the tops of the mountains
  alternatives:
  - from the mountain tops
  - from the summits of the mountains
  lexicon: HALOT
  rationale: רֹאשׁ in plural construct with mountains denotes top/summit. 'Tops of
    the mountains' is clear and natural.
- source_word: צֵל הֶהָרִים
  chosen: the shadow of the mountains
  alternatives:
  - the shade of the mountains
  lexicon: HALOT
  rationale: צֵל is literally 'shadow/shade.' 'Shadow' better fits the visual misperception
    Zebul claims Gaal is experiencing.
- source_word: אַתָּה רֹאֶה כָּאֲנָשִׁים
  chosen: You are seeing ... as men
  alternatives:
  - You see ... like men
  - You are seeing ... as though they were men
  lexicon: HALOT
  rationale: 'The phrase indicates mistaken perception: the mountain shadows are being
    perceived ''as men.'' This preserves the comparison without overparaphrasing.'
- source_word: אֲנָשִׁים
  chosen: men
  alternatives:
  - people
  - persons
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine plural and here refers to apparent
    male figures in a military setting. Per gender-accurate policy, 'men' is preferred.
