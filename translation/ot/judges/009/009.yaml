theological_decisions:
- issue: Referent of אֱלֹהִים in the clause 'by which gods and men are honored'
  chosen_reading: gods
  alternative_readings:
  - God
  rationale: The plural form with plural verb and the fable's cultural setting favor
    'gods.' A long-standing translation tradition renders this as 'God and man/men,'
    often understanding olive oil as used in worship of the true God. Because the
    Hebrew form is plural and the context is a parabolic speech rather than direct
    covenantal narration, 'gods' is preferred in the main text while preserving the
    traditional alternative in a footnote.
  doctrine_reference: Translation philosophy §1 (original-language primacy), §3 (preserve
    tension)
