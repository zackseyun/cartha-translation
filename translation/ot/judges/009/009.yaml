id: JDG.9.9
reference: Judges 9:9
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר לָ/הֶם֙ הַ/זַּ֔יִת הֶ/חֳדַ֨לְתִּי֙ אֶת דִּשְׁנִ֔/י אֲשֶׁר בִּ֛/י
    יְכַבְּד֥וּ אֱלֹהִ֖ים וַ/אֲנָשִׁ֑ים וְ/הָ֣לַכְתִּ֔י לָ/נ֖וּעַ עַל הָ/עֵצִֽים־־־׃
translation:
  text: But the olive tree said to them, ‘Should I stop producing my richness, by
    which gods and men are honored, and go to sway over the trees?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'by which God and men are honored.' Many translations take אֱלֹהִים
      here as referring to the true God, since olive oil was used in worship; the
      Hebrew form itself is plural.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'my fatness,' a figurative expression for the olive tree's rich produce.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַזַּיִת
  chosen: the olive tree
  alternatives:
  - the olive
  lexicon: HALOT
  rationale: Though the Hebrew noun is literally 'olive,' in this fable context it
    refers to the tree as a speaking character. English idiom prefers 'olive tree.'
- source_word: הֶחֳדַלְתִּי
  chosen: Should I stop producing
  alternatives:
  - Have I ceased
  - Should I leave off
  lexicon: HALOT
  rationale: The form is a 1cs perfect of חדל used rhetorically in context after the
    trees' invitation. English idiom renders the rhetorical sense naturally as 'Should
    I stop...?' rather than a bare past tense.
- source_word: דִּשְׁנִי
  chosen: my richness
  alternatives:
  - my fatness
  - my oil
  - my abundance
  lexicon: HALOT
  rationale: The noun literally denotes fatness/richness. In context of the olive
    tree it points to its rich produce, likely olive oil, but the Hebrew does not
    explicitly say 'oil.' 'My richness' preserves the metaphor while remaining intelligible.
- source_word: אֲשֶׁר בִּי
  chosen: by which
  alternatives:
  - with which
  - in me/by me
  lexicon: HALOT
  rationale: The relative clause links the olive tree's richness to the honoring of
    gods and men. 'By which' best captures instrumental sense in smooth English.
- source_word: יְכַבְּדוּ
  chosen: are honored
  alternatives:
  - they honor
  - glorify
  lexicon: HALOT
  rationale: The Hebrew is active plural, 'they honor,' but the subject is unspecified
    and the focus is on the effect of the olive's richness. Passive English is natural
    here and avoids forcing an explicit subject not present in the text.
- source_word: אֱלֹהִים
  chosen: gods
  alternatives:
  - God
  - divine beings
  lexicon: HALOT
  rationale: In the setting of Jotham's fable and ancient Near Eastern usage, the
    plural most naturally refers to gods rather than the singular God. This also fits
    the plural verb. Some interpreters take it as a plural of majesty referring to
    God, but the immediate literary context does not require that reading.
- source_word: וַאֲנָשִׁים
  chosen: and men
  alternatives:
  - and humans
  - and people
  lexicon: HALOT
  rationale: This preserves the masculine/generic form in line with the project's
    gender-accurate policy. In this proverbial pairing with 'gods,' 'men' is the most
    natural English equivalent.
- source_word: וְהָלַכְתִּי
  chosen: and go
  alternatives:
  - and should I go
  - and then go
  lexicon: HALOT
  rationale: Following the rhetorical question introduced by 'Should I stop,' the
    waw + perfect continues the rhetorical sequence idiomatically as 'and go.'
- source_word: לָנוּעַ
  chosen: to sway over
  alternatives:
  - to wave over
  - to wander over
  - to hold sway over
  lexicon: HALOT
  rationale: In this fable the verb conveys moving to and fro in a ruling position
    over the other trees, likely with ironic nuance. 'Sway over' preserves both the
    arboreal imagery and the sense of exercising prominence.
- source_word: עַל הָעֵצִים
  chosen: over the trees
  alternatives:
  - above the trees
  - among the trees
  lexicon: HALOT
  rationale: With the preceding verb, על is best rendered 'over,' expressing the proposed
    kingship over the other trees.
