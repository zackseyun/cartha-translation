id: JDG.9.16
reference: Judges 9:16
source:
  edition: WLC
  text: וְ/עַתָּ֗ה אִם בֶּ/אֱמֶ֤ת וּ/בְ/תָמִים֙ עֲשִׂיתֶ֔ם וַ/תַּמְלִ֖יכוּ אֶת אֲבִימֶ֑לֶךְ
    וְ/אִם טוֹבָ֤ה עֲשִׂיתֶם֙ עִם יְרֻבַּ֣עַל וְ/עִם בֵּית֔/וֹ וְ/אִם כִּ/גְמ֥וּל
    יָדָ֖י/ו עֲשִׂ֥יתֶם לֽ/וֹ־־־־־־׃
translation:
  text: Now therefore, if you have acted in truth and integrity when you made Abimelech
    king, and if you have dealt well with Jerubbaal and with his house, and if you
    have dealt with him according to the recompense of his hands,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to what his hands deserved.' The Hebrew idiom refers to treatment
      corresponding to a person's deeds.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now therefore
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Introduces Jotham's conditional challenge with a discourse-transition
    marker. 'Now therefore' captures both the temporal and inferential force in context
    better than a bare 'now'.
- source_word: אִם
  chosen: if
  lexicon: HALOT
  rationale: Marks the first condition in a series of rhetorical if-clauses.
- source_word: בֶּאֱמֶת
  chosen: in truth
  alternatives:
  - truly
  - faithfully
  lexicon: HALOT
  rationale: אֱמֶת here denotes truthfulness/reliability in conduct. 'In truth' preserves
    the Hebrew idiom and moral sense.
- source_word: וּבְתָמִים
  chosen: and integrity
  alternatives:
  - and sincerity
  - and blamelessness
  lexicon: HALOT
  rationale: תָמִים in ethical contexts conveys wholeness/integrity. 'Integrity' is
    idiomatic modern English and fits the paired moral terms with אֱמֶת.
- source_word: עֲשִׂיתֶם
  chosen: you have acted
  alternatives:
  - you have done
  lexicon: HALOT
  rationale: The verb עשה is broad, but in English 'acted' better suits the moral
    evaluation introduced by 'in truth and integrity'.
- source_word: וַתַּמְלִיכוּ
  chosen: when you made ... king
  alternatives:
  - and made ... king
  - and crowned
  lexicon: HALOT
  rationale: Hiphil of מלך means to cause to reign/make king. 'Made Abimelech king'
    is the clearest natural rendering. 'When' smooths the relation to the prior verb
    in English while preserving the sequence of action.
- source_word: אֶת אֲבִימֶלֶךְ
  chosen: Abimelech
  lexicon: HALOT
  rationale: Personal name transliterated per project policy.
- source_word: טוֹבָה עֲשִׂיתֶם עִם
  chosen: you have dealt well with
  alternatives:
  - you have done good to
  - you have treated ... well
  lexicon: HALOT
  rationale: The Hebrew idiom 'do good with/toward' is best rendered idiomatically
    as 'dealt well with' in contemporary English.
- source_word: יְרֻבַּעַל
  chosen: Jerubbaal
  alternatives:
  - Gideon
  lexicon: HALOT
  rationale: The Hebrew text uses the name Jerubbaal, not Gideon. Transliteration
    preserves source-text specificity.
- source_word: בֵּיתוֹ
  chosen: his house
  alternatives:
  - his household
  - his family
  lexicon: HALOT
  rationale: '''House'' preserves the common Hebrew term and its familial/dynastic
    breadth; ''household'' is possible but slightly narrower.'
- source_word: כִּגְמוּל יָדָיו
  chosen: according to the recompense of his hands
  alternatives:
  - according to what his hands deserved
  - according to his deeds
  lexicon: HALOT
  rationale: This idiom refers to what one's actions have earned or merited. 'Recompense
    of his hands' preserves the concrete Hebrew imagery while remaining understandable.
- source_word: עֲשִׂיתֶם לוֹ
  chosen: you have dealt with him
  alternatives:
  - you have done to him
  lexicon: HALOT
  rationale: English idiom prefers 'dealt with him' in this evaluative context; it
    also avoids awkward repetition of 'done' after the previous clauses.
