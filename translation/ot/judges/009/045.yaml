id: JDG.9.45
reference: Judges 9:45
source:
  edition: WLC
  text: וַ/אֲבִימֶ֜לֶךְ נִלְחָ֣ם בָּ/עִ֗יר כֹּ֚ל הַ/יּ֣וֹם הַ/ה֔וּא וַ/יִּלְכֹּד֙
    אֶת הָ/עִ֔יר וְ/אֶת הָ/עָ֥ם אֲשֶׁר בָּ֖/הּ הָרָ֑ג וַ/יִּתֹּץ֙ אֶת הָ/עִ֔יר וַ/יִּזְרָעֶ֖/הָ
    מֶֽלַח־־־־׃פ
translation:
  text: And Abimelech fought against the city all that day, and he captured the city
    and killed the people who were in it. Then he tore down the city and sowed it
    with salt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'attacked the city.' The Hebrew verb is literally 'fought' and, with
      the preposition used here, likely means military action against the city.
    reason: lexical_alternative
  - marker: b
    text: '''Sowed it with salt'' is a symbolic act of devastation and curse, marking
      the city''s ruin.'
    reason: cultural_note
lexical_decisions:
- source_word: נִלְחָם בָּעִיר
  chosen: fought against the city
  alternatives:
  - fought in the city
  - attacked the city
  lexicon: HALOT
  rationale: The verb לחם with ב can denote fighting against an object in battle context.
    Here the following clauses describe capture and destruction of the city, so 'fought
    against the city' best reflects the hostile military action. 'Attacked' is possible
    but slightly more interpretive than the Hebrew verb itself.
- source_word: כֹּל הַיּוֹם הַהוּא
  chosen: all that day
  alternatives:
  - the whole of that day
  - all day long
  lexicon: HALOT
  rationale: This idiom marks the duration of the action on that specific day. 'All
    that day' is natural modern English and preserves the temporal emphasis.
- source_word: וַיִּלְכֹּד
  chosen: he captured
  alternatives:
  - he took
  - he seized
  lexicon: HALOT
  rationale: לכד in military context commonly means to capture or take a city. 'Captured'
    makes the military sense explicit in idiomatic English.
- source_word: הָעָם אֲשֶׁר בָּהּ
  chosen: the people who were in it
  alternatives:
  - the people who were there
  - the inhabitants in it
  lexicon: HALOT
  rationale: עָם here refers to the population within the city rather than an ethnic
    'people' in a broader sense. 'The people who were in it' is straightforward and
    avoids over-specifying with 'inhabitants' while preserving the relative clause.
- source_word: הָרָג
  chosen: killed
  alternatives:
  - struck down
  - slew
  lexicon: HALOT
  rationale: The verb simply denotes killing. 'Killed' is the clearest modern equivalent;
    'slew' is archaic, and 'struck down' adds stylistic color not required by the
    text.
- source_word: וַיִּתֹּץ
  chosen: he tore down
  alternatives:
  - he demolished
  - he broke down
  lexicon: HALOT
  rationale: נתץ often means to pull down or demolish structures. 'Tore down' is vivid,
    natural English that fits city destruction without sounding overly technical.
- source_word: וַיִּזְרָעֶהָ מֶלַח
  chosen: sowed it with salt
  alternatives:
  - scattered salt over it
  - salted it
  lexicon: HALOT
  rationale: The Hebrew literally says 'sowed it [with] salt.' Retaining 'sowed' preserves
    the deliberate metaphorical action and the traditional image of rendering the
    site desolate. 'Salted it' is too compressed and loses the verbal imagery.
