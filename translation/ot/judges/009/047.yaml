id: JDG.9.47
reference: Judges 9:47
source:
  edition: WLC
  text: וַ/יֻּגַּ֖ד לַ/אֲבִימֶ֑לֶךְ כִּ֣י הִֽתְקַבְּצ֔וּ כָּֽל בַּעֲלֵ֖י מִֽגְדַּל
    שְׁכֶֽם־־׃
translation:
  text: And it was reported to Abimelech that all the leaders of the tower of Shechem
    had gathered together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the lords/masters of the tower of Shechem.' The Hebrew expression
      is literally 'all the baals of the tower of Shechem,' referring contextually
      to its leading men or authorities.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֻּגַּד
  chosen: it was reported
  alternatives:
  - it was told
  - word was brought
  lexicon: HALOT
  rationale: Passive/Hophal form of נגד conveys that information was made known to
    Abimelech. 'It was reported' is natural modern English and preserves the passive
    sense.
- source_word: לַאֲבִימֶלֶךְ
  chosen: to Abimelech
  rationale: Directional preposition with the proper name indicates the recipient
    of the report. Name is transliterated per translation philosophy.
- source_word: כִּי
  chosen: that
  alternatives:
  - how
  lexicon: HALOT
  rationale: Introduces the content of the report in indirect discourse; 'that' is
    the most straightforward English equivalent.
- source_word: הִתְקַבְּצוּ
  chosen: had gathered together
  alternatives:
  - had assembled
  - had gathered
  lexicon: HALOT
  rationale: The Hitpael of קבץ denotes assembling/gathering oneself. 'Had gathered
    together' reflects the completed action reported to Abimelech and preserves the
    reflexive/collective nuance.
- source_word: כָּל
  chosen: all
  lexicon: HALOT
  rationale: Retained directly to preserve the comprehensiveness of the statement.
- source_word: בַּעֲלֵי
  chosen: leaders
  alternatives:
  - lords
  - masters
  - citizens
  lexicon: HALOT
  rationale: Literally 'owners/masters/lords of,' but in this civic-military context
    the expression refers to the principal men or authorities associated with the
    place. 'Leaders' communicates the social-political sense without importing feudal
    overtones.
- source_word: מִגְדַּל
  chosen: tower
  alternatives:
  - stronghold
  lexicon: HALOT
  rationale: The noun's basic sense is 'tower.' Although the structure may function
    defensively, the Hebrew term itself is best represented by 'tower' here.
- source_word: שְׁכֶם
  chosen: Shechem
  rationale: Standard transliteration of the place name.
