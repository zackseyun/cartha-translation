id: JDG.9.40
reference: Judges 9:40
source:
  edition: WLC
  text: וַ/יִּרְדְּפֵ֣/הוּ אֲבִימֶ֔לֶךְ וַ/יָּ֖נָס מִ/פָּנָ֑י/ו וַֽ/יִּפְּל֛וּ חֲלָלִ֥ים
    רַבִּ֖ים עַד פֶּ֥תַח הַ/שָּֽׁעַר־׃
translation:
  text: Abimelech pursued him, and he fled before him; and many slain fell as far
    as the entrance of the gate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'many casualties fell' / 'many were struck down, as far as the gateway.'
      The Hebrew keeps the vivid battle idiom 'fell' with 'slain.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְדְּפֵהוּ
  chosen: pursued him
  alternatives:
  - chased him
  - pressed after him
  lexicon: HALOT
  rationale: רדף commonly denotes pursuing or chasing an enemy. 'Pursued him' is natural
    modern English and preserves the military sense without over-paraphrase.
- source_word: וַיָּנָס
  chosen: he fled
  alternatives:
  - he ran away
  - he took flight
  lexicon: HALOT
  rationale: נוס means to flee. The singular verb refers back to Gaal from the previous
    verse. 'He fled' is the most direct rendering.
- source_word: מִפָּנָיו
  chosen: before him
  alternatives:
  - from before him
  - from his presence
  lexicon: HALOT
  rationale: Literally 'from his face/presence,' but in this idiom it means fleeing
    before someone. 'Before him' is idiomatic and sufficiently close to the Hebrew.
- source_word: וַיִּפְּלוּ
  chosen: fell
  alternatives:
  - were struck down
  - collapsed
  lexicon: HALOT
  rationale: נפל literally means 'fell.' In battle contexts it often implies being
    struck down, but retaining 'fell' preserves the Hebrew imagery while allowing
    the following noun to clarify the sense.
- source_word: חֲלָלִים
  chosen: slain
  alternatives:
  - the slain
  - casualties
  - dead
  lexicon: HALOT
  rationale: חללים denotes those pierced/slain in battle. Rendering it as 'slain'
    keeps the martial nuance. Combined with 'fell,' it yields the idiomatic phrase
    'many slain fell.'
- source_word: רַבִּים
  chosen: many
  alternatives:
  - a great number of
  lexicon: HALOT
  rationale: רבים straightforwardly means 'many.'
- source_word: עַד פֶּתַח הַשָּׁעַר
  chosen: as far as the entrance of the gate
  alternatives:
  - up to the entrance of the gate
  - as far as the gateway
  lexicon: HALOT
  rationale: פתח is 'opening/entrance' and שער is 'gate.' 'As far as the entrance
    of the gate' closely follows the Hebrew while remaining readable. 'Gateway' is
    possible but slightly less transparent to the two-word Hebrew expression.
