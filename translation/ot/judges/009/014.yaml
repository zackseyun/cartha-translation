id: JDG.9.14
reference: Judges 9:14
source:
  edition: WLC
  text: וַ/יֹּאמְר֥וּ כָל הָ/עֵצִ֖ים אֶל הָ/אָטָ֑ד לֵ֥ךְ אַתָּ֖ה מְלָךְ עָלֵֽי/נוּ־־־׃
translation:
  text: Then all the trees said to the bramble, ‘You come, reign over us.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the thornbush.' The Hebrew אָטָד refers to a thorny shrub; 'bramble'
      is chosen as an idiomatic English rendering in this fable.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: Then ... said
  alternatives:
  - and ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving the sequential sense better than a mechanically
    repeated 'and.'
- source_word: כָל הָעֵצִים
  chosen: all the trees
  lexicon: HALOT
  rationale: A straightforward rendering of the collective subject; the definite article
    on 'trees' is naturally represented in English by 'the trees.'
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition in direct speech introduction.
- source_word: הָאָטָד
  chosen: the bramble
  alternatives:
  - the thornbush
  - the buckthorn
  lexicon: HALOT
  rationale: אָטָד denotes a thorny bush/shrub. 'Bramble' is idiomatic in English
    for Jotham's fable context and matches the plant's lowly, prickly character without
    over-specifying a botanical species.
- source_word: לֵךְ אַתָּה
  chosen: You come
  alternatives:
  - Come, you
  - Go, you
  lexicon: HALOT
  rationale: The idiom with imperative הלך before another imperative functions as
    an urgent summons or commissioning. In English, 'You come' is natural and preserves
    the emphatic second-person pronoun אַתָּה. 'Go' would be overly literal and awkward
    here.
- source_word: מְלָךְ
  chosen: reign
  alternatives:
  - be king
  - rule as king
  lexicon: HALOT
  rationale: The verb means 'to reign, be king.' 'Reign' is concise and idiomatic
    with 'over us,' preserving royal nuance without adding words not explicit in the
    Hebrew.
- source_word: עָלֵינוּ
  chosen: over us
  lexicon: HALOT
  rationale: Standard rendering of על in a rulership context.
