id: JDG.9.7
reference: Judges 9:7
source:
  edition: WLC
  text: וַ/יַּגִּ֣דוּ לְ/יוֹתָ֗ם וַ/יֵּ֨לֶךְ֙ וַֽ/יַּעֲמֹד֙ בְּ/רֹ֣אשׁ הַר גְּרִזִ֔ים
    וַ/יִּשָּׂ֥א קוֹל֖/וֹ וַ/יִּקְרָ֑א וַ/יֹּ֣אמֶר לָ/הֶ֗ם שִׁמְע֤וּ אֵלַ/י֙ בַּעֲלֵ֣י
    שְׁכֶ֔ם וְ/יִשְׁמַ֥ע אֲלֵי/כֶ֖ם אֱלֹהִֽים־׃
translation:
  text: And they told Jotham, and he went and stood on the top of Mount Gerizim, and
    he lifted up his voice and called out and said to them, “Listen to me, lords of
    Shechem, that God may listen to you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'leaders of Shechem.' The Hebrew is literally 'lords/masters of Shechem.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and may God listen to you.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּגִּדוּ
  chosen: they told
  alternatives:
  - they reported
  - they informed
  lexicon: HALOT
  rationale: Hiphil of נגד commonly means to tell/report. 'They told' is natural and
    sufficiently formal in narrative sequence.
- source_word: לְיוֹתָם
  chosen: Jotham
  rationale: Personal name is transliterated per translation philosophy.
- source_word: וַיֵּלֶךְ
  chosen: he went
  alternatives:
  - he departed
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of הלך; 'he went' is the plain sense.
- source_word: וַיַּעֲמֹד
  chosen: stood
  alternatives:
  - took his stand
  lexicon: HALOT
  rationale: עמד here denotes taking a position. 'Stood' preserves the simple narrative
    style.
- source_word: בְּרֹאשׁ
  chosen: on the top of
  alternatives:
  - at the summit of
  - on the crest of
  lexicon: HALOT
  rationale: ראש in topographical usage means top/head/summit. 'On the top of' is
    idiomatic and clear.
- source_word: הַר גְּרִזִים
  chosen: Mount Gerizim
  rationale: Standard English rendering of the place name; 'Mount' is idiomatic for
    הר with a proper name.
- source_word: וַיִּשָּׂא קוֹלוֹ
  chosen: he lifted up his voice
  alternatives:
  - he raised his voice
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for speaking loudly. The more formal idiom
    is retained in the main text because it remains understandable in modern English.
- source_word: וַיִּקְרָא
  chosen: called out
  alternatives:
  - cried out
  - proclaimed
  lexicon: HALOT
  rationale: קרא here indicates a loud public call. 'Called out' fits the scene and
    avoids overinterpreting as formal proclamation.
- source_word: שִׁמְעוּ אֵלַי
  chosen: Listen to me
  alternatives:
  - Hear me
  lexicon: HALOT
  rationale: Imperative of שמע with אל means to listen to/hear. 'Listen to me' is
    more natural modern English while preserving the appeal.
- source_word: בַּעֲלֵי שְׁכֶם
  chosen: lords of Shechem
  alternatives:
  - leaders of Shechem
  - masters of Shechem
  - citizens of Shechem
  lexicon: HALOT
  rationale: בעלי literally means 'lords/masters/owners of.' In Judges this expression
    refers to the leading men or power-holders of Shechem, not merely its inhabitants.
    'Lords of Shechem' preserves the lexical force better than the traditional but
    weaker 'men of Shechem,' while a footnote preserves the more interpretive alternative
    'leaders of Shechem'.
- source_word: וְיִשְׁמַע אֲלֵיכֶם אֱלֹהִים
  chosen: that God may listen to you
  alternatives:
  - and may God listen to you
  - so that God may hear you
  lexicon: HALOT
  rationale: 'The prefixed conjunction with imperfect is best taken here as expressing
    purpose/result in the rhetorical appeal: if they listen to him, God may listen
    to them. ''Listen'' is chosen for consistency with שמע in the preceding clause,
    though ''hear'' is also possible in English.'
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Singular sense is required by the singular verb יִשְׁמַע and the context.
