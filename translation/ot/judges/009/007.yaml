theological_decisions:
- issue: Force of Jotham's final clause
  chosen_reading: 'Rendered as a purpose/result appeal: ''that God may listen to you.'''
  alternative_readings:
  - 'Rendered coordinately: ''and may God listen to you.'''
  rationale: 'The Hebrew conjunction before the imperfect can be read as purpose/result
    after the imperative, or as a jussive-like wish. The purpose/result rendering
    best captures the rhetorical structure: ''Listen to me ... that God may listen
    to you.'' This preserves the moral reciprocity implied in the speech without adding
    doctrinal content.'
  doctrine_reference: Translation philosophy §3 (preserve tension where ambiguity
    is genuine)
