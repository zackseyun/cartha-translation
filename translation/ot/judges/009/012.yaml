id: JDG.9.12
reference: Judges 9:12
source:
  edition: WLC
  text: וַ/יֹּאמְר֥וּ הָ/עֵצִ֖ים לַ/גָּ֑פֶן לְכִי אַ֖תְּ מלוכי עָלֵֽי/נוּ־׃
translation:
  text: Then the trees said to the vine, ‘Come, you reign over us.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Go, you be king over us.' The Hebrew idiom is more naturally
      expressed in English as 'Come, you reign over us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence; 'and' is possible but less idiomatic
    here.
- source_word: הָעֵצִים
  chosen: the trees
  alternatives:
  - the wood/plants
  lexicon: HALOT
  rationale: The noun עֵץ in the plural here refers to trees in Jotham's fable context,
    not wood as material. 'The trees' is the plain contextual sense.
- source_word: לַגָּפֶן
  chosen: to the vine
  alternatives:
  - to the grapevine
  lexicon: HALOT
  rationale: גֶּפֶן denotes the vine/grapevine. 'Vine' is concise, natural English
    and fits the fable's personification.
- source_word: לְכִי
  chosen: Come
  alternatives:
  - Go
  lexicon: HALOT
  rationale: Although the verb הלך literally means 'go/walk,' the idiom לְכִי plus
    following imperative in summons contexts is naturally rendered 'Come' in English,
    inviting the addressee to take action.
- source_word: אַתְּ
  chosen: you
  lexicon: HALOT
  rationale: The pronoun is second feminine singular, agreeing with 'vine,' which
    is grammatically feminine in Hebrew. English does not normally mark this gender
    for an inanimate personified plant, so 'you' is appropriate.
- source_word: מְלֹכִי
  chosen: reign
  alternatives:
  - be king
  - rule as king
  lexicon: HALOT
  rationale: From מלך in the imperative feminine singular, addressed to the vine.
    'Reign' is idiomatic and captures royal rule. 'Be king' is possible, but 'reign
    over us' better reflects the verbal force with עָלֵינוּ.
- source_word: עָלֵינוּ
  chosen: over us
  alternatives:
  - upon us
  lexicon: HALOT
  rationale: With מלך, עַל marks the sphere of rule. 'Over us' is the standard and
    natural English rendering.
