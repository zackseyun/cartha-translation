theological_decisions:
- issue: Rendering the cultic site name/title אֵל בְּרִית
  chosen_reading: El-berith
  alternative_readings:
  - God of the covenant
  - Baal-berith (by harmonization with nearby context)
  rationale: This is primarily a lexical and historical decision rather than a doctrinal
    one. Transliteration preserves the ambiguity of whether the phrase is functioning
    as a proper divine name/title. It also avoids importing interpretive harmonization
    from nearby verses beyond what this verse itself states.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Translate titles; transliterate names; Preserve theological tension
    rather than resolve it.'
