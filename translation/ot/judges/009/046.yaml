id: JDG.9.46
reference: Judges 9:46
source:
  edition: WLC
  text: וַֽ/יִּשְׁמְע֔וּ כָּֽל בַּעֲלֵ֖י מִֽגְדַּל שְׁכֶ֑ם וַ/יָּבֹ֣אוּ אֶל צְרִ֔יחַ
    בֵּ֖ית אֵ֥ל בְּרִֽית־־־׃
translation:
  text: When all the leaders of the tower of Shechem heard of it, they went into the
    inner chamber of the house of El-berith.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Migdal-shechem,' taking the phrase as a place-name rather than 'the
      tower of Shechem.'
    reason: alternative_reading
  - marker: b
    text: Or 'vault,' 'stronghold,' or 'inner room' for the Hebrew term describing
      a protected interior chamber.
    reason: lexical_alternative
  - marker: c
    text: El-berith may mean 'God of the covenant.' Compare the related name 'Baal-berith'
      elsewhere in this chapter.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁמְעוּ
  chosen: heard of it
  alternatives:
  - heard
  lexicon: HALOT
  rationale: The verb means 'heard.' English idiom commonly supplies the object as
    'heard of it' from the narrative context, since what they heard is the report
    of the preceding events. This makes the clause natural without materially expanding
    the sense.
- source_word: בַּעֲלֵי
  chosen: leaders
  alternatives:
  - lords
  - masters
  - owners
  - citizens
  lexicon: HALOT
  rationale: Literally 'lords/masters of.' In this civic-military context, the term
    refers to the principal men or leading inhabitants associated with Migdal-shechem,
    not ownership in a narrow economic sense. 'Leaders' best captures the social-political
    role in clear modern English.
- source_word: מִגְדַּל שְׁכֶם
  chosen: the tower of Shechem
  alternatives:
  - Migdal-shechem
  - the stronghold of Shechem
  lexicon: HALOT
  rationale: מִגְדַּל literally means 'tower.' Because the phrase may function either
    as a place-name ('Migdal-shechem') or as a descriptive designation ('tower of
    Shechem'), the main text keeps the transparent sense 'the tower of Shechem,' while
    preserving the place-name possibility in a footnote.
- source_word: וַיָּבֹאוּ אֶל
  chosen: they went into
  alternatives:
  - they entered
  - they came to
  lexicon: HALOT
  rationale: The verb 'came/went' with אֶל here indicates movement into the refuge
    named in the next phrase. 'Went into' communicates the directional force naturally
    in English.
- source_word: צְרִיחַ
  chosen: the inner chamber
  alternatives:
  - the vault
  - the stronghold
  - the crypt
  lexicon: HALOT
  rationale: The noun denotes an inner room, vault, or fortified chamber. In this
    context of seeking refuge within a temple complex, 'inner chamber' is a cautious
    rendering that preserves the architectural sense without overcommitting to a more
    specific reconstruction such as 'crypt' or 'vault.'
- source_word: בֵּית אֵל בְּרִית
  chosen: the house of El-berith
  alternatives:
  - the temple of El-berith
  - the house of God of the covenant
  - the house of Baal-berith
  lexicon: HALOT
  rationale: בֵּית is literally 'house,' often used for a temple/shrine. 'House of
    El-berith' preserves the Hebrew form and avoids prematurely harmonizing with the
    related title Baal-berith in the chapter. Because אֵל בְּרִית may be understood
    as the divine name/title 'El-berith' ('God of the covenant'), that alternative
    is preserved in a footnote.
