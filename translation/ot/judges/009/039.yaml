id: JDG.9.39
reference: Judges 9:39
source:
  edition: WLC
  text: וַ/יֵּ֣צֵא גַ֔עַל לִ/פְנֵ֖י בַּעֲלֵ֣י שְׁכֶ֑ם וַ/יִּלָּ֖חֶם בַּ/אֲבִימֶֽלֶךְ׃
translation:
  text: So Gaal went out before the leaders of Shechem and fought against Abimelech.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the head of the leaders of Shechem,' reflecting the idiomatic force
      of 'before' in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - came out
  lexicon: HALOT
  rationale: Qal wayyiqtol of יצא, the standard narrative verb for going out. 'Went
    out' is the most natural English narrative rendering here.
- source_word: גַעַל
  chosen: Gaal
  rationale: Personal name; per translation philosophy, names are transliterated rather
    than translated.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - at the head of
  - in the presence of
  lexicon: HALOT
  rationale: The preposition literally means 'before/in front of.' In this military-political
    context, 'before' can idiomatically indicate leadership or position in front of
    the men of Shechem. It preserves the Hebrew wording while remaining readable.
- source_word: בַּעֲלֵי שְׁכֶם
  chosen: the leaders of Shechem
  alternatives:
  - the lords of Shechem
  - the citizens of Shechem
  - the men of Shechem
  lexicon: HALOT
  rationale: בעלים here refers to the leading men or masters of the city, not merely
    inhabitants. 'Leaders' best conveys the civic-political sense in modern English
    without the misleading feudal tone of 'lords.'
- source_word: וַיִּלָּחֶם
  chosen: fought
  alternatives:
  - made war
  - engaged in battle
  lexicon: HALOT
  rationale: Niphal wayyiqtol of לחם in the sense 'to fight/do battle.' 'Fought' is
    concise and idiomatic in English narrative.
- source_word: בַּאֲבִימֶלֶךְ
  chosen: against Abimelech
  alternatives:
  - with Abimelech
  lexicon: HALOT
  rationale: With לחם, the preposition ב commonly marks the opponent. English idiom
    requires 'fought against Abimelech,' not the more ambiguous 'fought with Abimelech.'
