id: JDG.9.30
reference: Judges 9:30
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֗ע זְבֻל֙ שַׂר הָ/עִ֔יר אֶת דִּבְרֵ֖י גַּ֣עַל בֶּן עָ֑בֶד וַ/יִּ֖חַר
    אַפּֽ/וֹ־־־׃
translation:
  text: When Zebul, the ruler of the city, heard the words of Gaal son of Ebed, his
    anger burned.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''his nose burned,'' an idiom meaning ''he became angry'' or ''his
      anger burned.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: heard
  alternatives:
  - listened to
  lexicon: HALOT
  rationale: 'The waw-consecutive imperfect advances the narrative: ''and/heard''
    idiomatically becomes ''when ... heard'' in English. ''Heard'' is the plain sense
    of שׁמע here, indicating reception of Gaal''s speech rather than attentive obedience.'
- source_word: זְבֻל
  chosen: Zebul
  rationale: Personal name is transliterated per project philosophy.
- source_word: שַׂר הָעִיר
  chosen: the ruler of the city
  alternatives:
  - the governor of the city
  - the prince of the city
  - the official of the city
  lexicon: HALOT
  rationale: שַׂר denotes a leader, chief, or official. 'Ruler' is broad and natural
    English, fitting Zebul's civic authority without over-specifying a modern office.
    'Governor' is possible but may imply a more formal administrative structure than
    the text requires.
- source_word: אֶת דִּבְרֵי
  chosen: the words of
  alternatives:
  - what ... said
  - the statements of
  lexicon: HALOT
  rationale: דִּבְרֵי is literally 'words of.' Retaining 'words' preserves the concrete
    Hebrew expression while remaining idiomatic in English narrative.
- source_word: גַּעַל בֶּן עָבֶד
  chosen: Gaal son of Ebed
  alternatives:
  - Gaal the son of Ebed
  rationale: Names are transliterated. 'Son of Ebed' is the standard concise English
    rendering of the Hebrew patronymic.
- source_word: וַיִּחַר אַפּוֹ
  chosen: his anger burned
  alternatives:
  - he became angry
  - his nose burned
  - his anger flared
  lexicon: HALOT
  rationale: The Hebrew idiom literally refers to the burning of the nose/anger. 'His
    anger burned' preserves the metaphorical force better than the flatter 'he became
    angry,' while avoiding the opaque literalism 'his nose burned.'
