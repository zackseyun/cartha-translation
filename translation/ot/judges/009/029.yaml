id: JDG.9.29
reference: Judges 9:29
source:
  edition: WLC
  text: וּ/מִ֨י יִתֵּ֜ן אֶת הָ/עָ֤ם הַ/זֶּה֙ בְּ/יָדִ֔/י וְ/אָסִ֖ירָה אֶת אֲבִימֶ֑לֶךְ
    וַ/יֹּ֨אמֶר֙ לַ/אֲבִימֶ֔לֶךְ רַבֶּ֥ה צְבָאֲ/ךָ֖ וָ/צֵֽאָ/ה־־׃
translation:
  text: If only this people were in my hand, then I would remove Abimelek. And he
    said to Abimelek, “Increase your army and come out!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more formally, ''Who would give this people into my hand? Then I would
      remove Abimelek.'' The Hebrew uses an idiom of wish: ''Who will give...?'''
    reason: lexical_alternative
  - marker: b
    text: The challenge 'Increase your army and come out' is likely a taunt directed
      at Abimelek, whether spoken directly or rhetorically.
    reason: cultural_note
lexical_decisions:
- source_word: וּמִי יִתֵּן
  chosen: If only
  alternatives:
  - Who would give
  - Would that
  lexicon: HALOT
  rationale: The idiom מִי יִתֵּן expresses a wish rather than a literal question.
    'If only' gives natural modern English while preserving the optative force.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - these people
  - this army
  lexicon: HALOT
  rationale: עָם is singular in form here and refers to the body of people under discussion.
    'This people' preserves the singular collective sense better than 'these people';
    'army' is too narrow in this context.
- source_word: בְּיָדִי
  chosen: in my hand
  alternatives:
  - under my power
  - in my control
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'in my hand,' denoting power or control.
    The literal rendering is clear in English and preserves the metaphor.
- source_word: וְאָסִירָה
  chosen: I would remove
  alternatives:
  - I would drive away
  - I would depose
  lexicon: HALOT
  rationale: From סוּר in the Hiphil, the sense is 'remove' or 'take away.' 'Remove'
    is broad and fits the threat against Abimelek without over-specifying whether
    death, expulsion, or deposition is intended.
- source_word: וַיֹּאמֶר לַאֲבִימֶלֶךְ
  chosen: And he said to Abimelek
  alternatives:
  - And he said of Abimelek
  lexicon: HALOT
  rationale: The preposition ל normally marks the indirect object, yielding 'to Abimelek.'
    In context this is a taunt or challenge directed toward Abimelek, whether directly
    or rhetorically.
- source_word: רַבֶּה
  chosen: Increase
  alternatives:
  - Make great
  - Multiply
  lexicon: HALOT
  rationale: The imperative from רבה calls for making something numerous or great.
    'Increase' is idiomatic with 'army' in English.
- source_word: צְבָאֲךָ
  chosen: your army
  alternatives:
  - your host
  - your forces
  lexicon: HALOT
  rationale: צָבָא commonly denotes an army or military force. 'Army' is the most
    natural modern rendering here.
- source_word: וָצֵאָה
  chosen: and come out
  alternatives:
  - and go out
  - and march out
  lexicon: HALOT
  rationale: The imperative of יצא means 'go/come out.' In a challenge addressed to
    an opponent, 'come out' is the most natural English idiom.
