id: JDG.9.52
reference: Judges 9:52
source:
  edition: WLC
  text: וַ/יָּבֹ֤א אֲבִימֶ֨לֶךְ֙ עַד הַ/מִּגְדָּ֔ל וַ/יִּלָּ֖חֶם בּ֑/וֹ וַ/יִּגַּ֛שׁ
    עַד פֶּ֥תַח הַ/מִּגְדָּ֖ל לְ/שָׂרְפ֥/וֹ בָ/אֵֽשׁ־־׃
translation:
  text: Abimelech came up to the tower and fought against it, and he came near to
    the entrance of the tower to burn it with fire.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came up
  alternatives:
  - came
  - advanced to
  - approached
  lexicon: HALOT
  rationale: The verb בוא basically means 'come/enter/arrive.' In this siege context
    with עַד plus destination, 'came up to' is idiomatic English for advancing against
    a fortified structure and preserves the narrative movement better than the flatter
    'came to.'
- source_word: הַמִּגְדָּל
  chosen: the tower
  alternatives:
  - the stronghold
  lexicon: HALOT
  rationale: מִגְדָּל ordinarily denotes a tower. Since the immediate context is a
    fortified tower structure with an entrance that can be burned, 'tower' is the
    most direct rendering; 'stronghold' is interpretive and broader.
- source_word: וַיִּלָּחֶם בּוֹ
  chosen: fought against it
  alternatives:
  - attacked it
  - fought with it
  lexicon: HALOT
  rationale: לחם with ב can mean 'fight against.' 'Fought against it' stays close
    to the Hebrew while making clear the hostile direction. 'Attacked it' is possible
    but slightly more interpretive than the source wording.
- source_word: וַיִּגַּשׁ
  chosen: came near
  alternatives:
  - approached
  - drew near
  lexicon: HALOT
  rationale: נגש commonly means 'approach/draw near.' 'Came near' is natural modern
    English and preserves the sequential movement toward the doorway.
- source_word: פֶּתַח
  chosen: the entrance
  alternatives:
  - the doorway
  - the opening
  - the door
  lexicon: HALOT
  rationale: פֶּתַח refers to an opening/entrance. 'Entrance' fits a tower context
    well and avoids over-specifying a physical door leaf, which the Hebrew does not
    explicitly mention.
- source_word: לְשָׂרְפוֹ
  chosen: to burn it
  alternatives:
  - to set it on fire
  - to burn it down
  lexicon: HALOT
  rationale: The infinitive construct of שׂרף with 3ms suffix means 'to burn it.'
    'Burn it down' adds a result not explicit in the verb; 'set it on fire' is possible
    but less direct than the Hebrew.
- source_word: בָאֵשׁ
  chosen: with fire
  alternatives:
  - in fire
  lexicon: HALOT
  rationale: 'The preposition ב here is instrumental: he intended to burn the tower
    by means of fire. ''With fire'' is the standard and clearest English rendering.'
- source_word: אֲבִימֶלֶךְ
  chosen: Abimelech
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
