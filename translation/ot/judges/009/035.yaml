id: JDG.9.35
reference: Judges 9:35
source:
  edition: WLC
  text: וַ/יֵּצֵא֙ גַּ֣עַל בֶּן עֶ֔בֶד וַ/יַּעֲמֹ֕ד פֶּ֖תַח שַׁ֣עַר הָ/עִ֑יר וַ/יָּ֧קָם
    אֲבִימֶ֛לֶךְ וְ/הָ/עָ֥ם אֲשֶׁר אִתּ֖/וֹ מִן הַ/מַּאְרָֽב־־־׃
translation:
  text: Then Gaal son of Ebed went out and stood at the entrance of the city gate,
    and Abimelech and the people who were with him rose from the ambush.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'came out' for 'went out.' The Hebrew verb simply marks movement outward.
    reason: lexical_alternative
  - marker: b
    text: Or 'rose up from the place of ambush.' The Hebrew noun can denote either
      the ambush itself or the ambush-position.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - came out
  lexicon: HALOT
  rationale: The verb יצא in the waw-consecutive narrative form denotes movement outward.
    'Went out' is a natural narrative rendering and preserves the directional sense
    without overinterpreting the point of departure.
- source_word: גַּעַל בֶּן עֶבֶד
  chosen: Gaal son of Ebed
  alternatives:
  - Gaal the son of Ebed
  rationale: Personal names are transliterated by standard convention per translation
    philosophy. 'Son of' is retained as the normal Hebrew patronymic construction.
- source_word: וַיַּעֲמֹד
  chosen: stood
  alternatives:
  - took his stand
  - stationed himself
  lexicon: HALOT
  rationale: עמד commonly means 'stand' or 'take one's stand.' Here the simple narrative
    action is best represented by 'stood' without adding military nuance not explicit
    in the text.
- source_word: פֶּתַח שַׁעַר הָעִיר
  chosen: at the entrance of the city gate
  alternatives:
  - in the entrance of the city gate
  - at the opening of the city gate
  lexicon: HALOT
  rationale: פתח means 'opening/entrance,' and שער העיר is 'gate of the city' or 'city
    gate.' 'At the entrance of the city gate' is idiomatic English that preserves
    the construct relationship and the public setting.
- source_word: וַיָּקָם
  chosen: rose
  alternatives:
  - got up
  - arose
  lexicon: HALOT
  rationale: קום here describes Abimelech and his men springing into action from concealment.
    'Rose' is concise and preserves the narrative force; the following phrase supplies
    the tactical context.
- source_word: וְהָעָם אֲשֶׁר אִתּוֹ
  chosen: and the people who were with him
  alternatives:
  - and the troops with him
  - and the men who were with him
  lexicon: HALOT
  rationale: עם literally means 'people.' In this military context it refers to Abimelech's
    accompanying force, but 'people who were with him' stays closer to the Hebrew
    while remaining clear.
- source_word: מִן הַמַּאְרָב
  chosen: from the ambush
  alternatives:
  - from the place of ambush
  - from the ambush site
  lexicon: HALOT
  rationale: מארב denotes an ambush or ambush-position. 'From the ambush' is the most
    natural English rendering and fits the tactical scene established in the context.
