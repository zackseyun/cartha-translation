id: JDG.9.20
reference: Judges 9:20
source:
  edition: WLC
  text: וְ/אִם אַ֕יִן תֵּ֤צֵא אֵשׁ֙ מֵ/אֲבִימֶ֔לֶךְ וְ/תֹאכַ֛ל אֶת בַּעֲלֵ֥י שְׁכֶ֖ם
    וְ/אֶת בֵּ֣ית מִלּ֑וֹא וְ/תֵצֵ֨א אֵ֜שׁ מִ/בַּעֲלֵ֤י שְׁכֶם֙ וּ/מִ/בֵּ֣ית מִלּ֔וֹא
    וְ/תֹאכַ֖ל אֶת אֲבִימֶֽלֶךְ־־־־׃
translation:
  text: But if not, let fire come out from Abimelech and consume the leaders of Shechem
    and Beth-millo; and let fire come out from the leaders of Shechem and from Beth-millo
    and consume Abimelech.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the lords of Shechem.' The Hebrew expression refers to the ruling men
      or notable leaders of the city.
    reason: lexical_alternative
  - marker: b
    text: Beth-millo may also be rendered 'the house of Millo,' likely a place or
      ruling group associated with Shechem.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם אַיִן
  chosen: But if not
  alternatives:
  - But if not so
  - But if not
  lexicon: HALOT
  rationale: Idiomatic conditional transition continuing Jotham's curse from the previous
    verse. 'But if not' is natural English and preserves the adversative force of
    וְ plus the negative conditional sense.
- source_word: תֵּצֵא אֵשׁ
  chosen: let fire come out
  alternatives:
  - may fire come out
  - fire will come out
  lexicon: HALOT
  rationale: The yiqtol here functions jussively in an imprecatory statement. 'Let
    fire come out' best captures the curse/wish force without overcommitting to simple
    future prediction.
- source_word: מֵאֲבִימֶלֶךְ
  chosen: from Abimelech
  alternatives:
  - out from Abimelech
  lexicon: HALOT
  rationale: Straightforward source marker. 'From Abimelech' is idiomatic and preserves
    the metaphor of destructive force proceeding from him.
- source_word: וְתֹאכַל
  chosen: and consume
  alternatives:
  - and devour
  lexicon: HALOT
  rationale: אכל with fire commonly means 'consume/devour.' 'Consume' fits modern
    readable English and preserves the destructive imagery.
- source_word: בַּעֲלֵי שְׁכֶם
  chosen: the leaders of Shechem
  alternatives:
  - the lords of Shechem
  - the citizens of Shechem
  - the masters of Shechem
  lexicon: HALOT
  rationale: בעלים here refers to the ruling men/notables of the city, not merely
    inhabitants. 'Leaders' communicates social-political authority in clear modern
    English.
- source_word: בֵּית מִלּוֹא
  chosen: Beth-millo
  alternatives:
  - the house of Millo
  lexicon: HALOT
  rationale: As a proper name/place designation, transliteration follows the project's
    principle to transliterate names. The construct form likely functions as the established
    place/group name.
- source_word: וְתֵצֵא אֵשׁ מִבַּעֲלֵי שְׁכֶם וּמִבֵּית מִלּוֹא
  chosen: and let fire come out from the leaders of Shechem and from Beth-millo
  alternatives:
  - and may fire come out from the lords of Shechem and from Beth-millo
  lexicon: HALOT
  rationale: The second clause mirrors the first and should be rendered symmetrically
    to preserve the reciprocal curse structure.
- source_word: אֶת אֲבִימֶלֶךְ
  chosen: Abimelech
  lexicon: HALOT
  rationale: Direct object of the final verb; no expansion needed. The symmetry of
    mutual destruction is preserved by ending with Abimelech as the consumed object.
