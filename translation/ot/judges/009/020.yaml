theological_decisions:
- issue: Nature of the 'fire' imagery
  chosen_reading: Retain 'fire' as the literal lexical image within an imprecatory
    curse, without interpreting it in the main text as purely metaphorical or as direct
    divine fire.
  alternative_readings:
  - Treat 'fire' as metaphor for violent conflict
  - Treat 'fire' as explicit divine judgment
  rationale: The Hebrew text uses the concrete image 'fire' in a curse formula. In
    context it likely foreshadows mutual destruction, but the translation should preserve
    the image and not resolve whether it is metaphorical, literal, or both.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
