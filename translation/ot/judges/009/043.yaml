id: JDG.9.43
reference: Judges 9:43
source:
  edition: WLC
  text: וַ/יִּקַּ֣ח אֶת הָ/עָ֗ם וַֽ/יֶּחֱצֵ/ם֙ לִ/שְׁלֹשָׁ֣ה רָאשִׁ֔ים וַ/יֶּאֱרֹ֖ב
    בַּ/שָּׂדֶ֑ה וַ/יַּ֗רְא וְ/הִנֵּ֤ה הָ/עָם֙ יֹצֵ֣א מִן הָ/עִ֔יר וַ/יָּ֥קָם עֲלֵי/הֶ֖ם
    וַ/יַּכֵּֽ/ם־־׃
translation:
  text: He took the people, divided them into three companies, and lay in wait in
    the field. When he saw that the people were coming out of the city, he rose up
    against them and struck them down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'divided them into three groups/bands'; literally 'into three heads,'
      a Hebrew idiom for divisions or companies.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח אֶת־הָעָם
  chosen: He took the people
  alternatives:
  - He took his men
  - He took the troops
  lexicon: HALOT
  rationale: עָם literally means 'people.' In this military narrative it refers to
    the force under Abimelech, but 'the people' preserves the Hebrew wording without
    over-specifying beyond the text.
- source_word: וַיֶּחֱצֵם לִשְׁלֹשָׁה רָאשִׁים
  chosen: divided them into three companies
  alternatives:
  - divided them into three groups
  - divided them into three bands
  lexicon: HALOT
  rationale: The verb חצה means 'divide.' רָאשִׁים literally 'heads' is an idiom for
    divisions/companies. 'Three companies' is natural English and fits the military
    context.
- source_word: וַיֶּאֱרֹב בַּשָּׂדֶה
  chosen: and lay in wait in the field
  alternatives:
  - and set an ambush in the field
  - and ambushed in the field
  lexicon: HALOT
  rationale: ארב denotes lying in ambush or waiting in ambush. 'Lay in wait' preserves
    the verbal nuance; 'in the field' is the straightforward sense of בַּשָּׂדֶה.
- source_word: וַיַּרְא וְהִנֵּה
  chosen: When he saw that
  alternatives:
  - and he saw, and behold
  - and he looked, and behold
  lexicon: HALOT
  rationale: The Hebrew uses narrative sequencing plus הִנֵּה for vividness. In readable
    modern English, 'When he saw that' conveys the sense without woodenly reproducing
    'behold'.
- source_word: הָעָם יֹצֵא מִן־הָעִיר
  chosen: the people were coming out of the city
  alternatives:
  - the people came out of the city
  - the men were going out from the city
  lexicon: HALOT
  rationale: The participle יֹצֵא gives an ongoing/imperfective sense in narrative
    context. 'Were coming out' captures the action in progress as he observed it.
- source_word: וַיָּקָם עֲלֵיהֶם
  chosen: he rose up against them
  alternatives:
  - he attacked them
  - he sprang upon them
  lexicon: HALOT
  rationale: קום על can mean to rise against or attack. 'Rose up against them' stays
    closer to the Hebrew while still sounding natural.
- source_word: וַיַּכֵּם
  chosen: and struck them down
  alternatives:
  - and struck them
  - and killed them
  lexicon: HALOT
  rationale: נכה broadly means 'strike, smite, defeat.' The immediate context is violent
    assault, but the verb itself does not require explicit killing. 'Struck them down'
    conveys decisive violence without overstating the lexical force.
