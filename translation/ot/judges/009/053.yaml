id: JDG.9.53
reference: Judges 9:53
source:
  edition: WLC
  text: וַ/תַּשְׁלֵ֞ךְ אִשָּׁ֥ה אַחַ֛ת פֶּ֥לַח רֶ֖כֶב עַל רֹ֣אשׁ אֲבִימֶ֑לֶךְ וַ/תָּ֖רִץ
    אֶת גֻּלְגָּלְתּֽ/וֹ־־׃
translation:
  text: But one woman threw an upper millstone on Abimelek’s head and crushed his
    skull.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a piece of an upper millstone'; the Hebrew phrase may emphasize a section
      or fragment of the upper millstone.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּשְׁלֵךְ
  chosen: threw
  alternatives:
  - cast
  - dropped
  lexicon: HALOT
  rationale: The verb שׁלך in the waw-consecutive narrative form denotes throwing/casting.
    'Threw' is natural modern English and preserves the active force better than the
    weaker 'dropped.'
- source_word: אִשָּׁה אַחַת
  chosen: one woman
  alternatives:
  - a woman
  - a certain woman
  lexicon: HALOT
  rationale: The phrase literally means 'one woman.' In narrative Hebrew this can
    function idiomatically as an indefinite, but retaining 'one woman' preserves the
    emphasis on an otherwise unnamed individual acting decisively.
- source_word: פֶּלַח רֶכֶב
  chosen: an upper millstone
  alternatives:
  - a piece of a millstone
  - the upper stone of a handmill
  lexicon: HALOT
  rationale: פֶּלַח is a slice/section, and רֶכֶב refers to the upper millstone. English
    tradition often has 'a piece of a millstone,' but the Hebrew more specifically
    points to the upper millstone element. 'Upper millstone' is concise and reflects
    the lexical specificity; the possibility of 'piece of a millstone' is preserved
    in a footnote because some understand פֶּלַח as emphasizing a fragment.
- source_word: עַל רֹאשׁ
  chosen: on ... head
  alternatives:
  - upon ... head
  lexicon: HALOT
  rationale: A straightforward spatial expression. 'On' is idiomatic modern English.
- source_word: אֲבִימֶלֶךְ
  chosen: Abimelek
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: וַתָּרִץ
  chosen: crushed
  alternatives:
  - smashed
  - shattered
  lexicon: HALOT
  rationale: The verb רצץ means to crush or smash. 'Crushed' is vivid but not overstated,
    fitting the violent narrative context.
- source_word: גֻּלְגָּלְתּוֹ
  chosen: his skull
  alternatives:
  - his head
  lexicon: HALOT
  rationale: The noun specifically denotes skull rather than the more general 'head.'
    Rendering it as 'skull' preserves the anatomical precision and the severity of
    the blow.
