id: JDG.9.8
reference: Judges 9:8
source:
  edition: WLC
  text: הָל֤וֹךְ הָֽלְכוּ֙ הָ/עֵצִ֔ים לִ/מְשֹׁ֥חַ עֲלֵי/הֶ֖ם מֶ֑לֶךְ וַ/יֹּאמְר֥וּ
    לַ/זַּ֖יִת מלוכ/ה עָלֵֽי/נוּ׃
translation:
  text: The trees once went to anoint a king over themselves, and they said to the
    olive tree, ‘Reign over us.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew uses an intensive verbal form ('going they went'), an idiom emphasizing
      the action; alternatively, 'The trees surely went' or 'The trees set out to
      anoint a king over themselves.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָלֹוךְ הָלְכוּ
  chosen: once went
  alternatives:
  - went and went
  - surely went
  - set out
  lexicon: HALOT
  rationale: The infinitive absolute with the finite verb of הלך intensifies the action.
    In narrative English, 'once went' idiomatically introduces the fable ('the trees
    once went...') without wooden repetition, while still signaling a marked verbal
    form.
- source_word: הָעֵצִים
  chosen: the trees
  alternatives:
  - the wood/trees
  lexicon: HALOT
  rationale: The plural noun plainly refers to trees in Jotham's parable; 'the trees'
    is the natural English rendering.
- source_word: לִמְשֹׁחַ
  chosen: to anoint
  alternatives:
  - to appoint by anointing
  - to consecrate
  lexicon: HALOT
  rationale: משׁח commonly denotes anointing, especially for installation to office.
    'To anoint' preserves the concrete and political-religious imagery rather than
    flattening it to 'appoint.'
- source_word: עֲלֵיהֶם
  chosen: over themselves
  alternatives:
  - for themselves
  lexicon: HALOT
  rationale: With מלך, על expresses rule 'over.' Because the subject is plural and
    reflexive in sense, 'over themselves' best captures that the trees seek a king
    to rule over them.
- source_word: מֶלֶךְ
  chosen: a king
  alternatives:
  - king
  lexicon: HALOT
  rationale: 'Indefinite in sense here: the trees seek to anoint ''a king'' for themselves.'
- source_word: וַיֹּאמְרוּ
  chosen: and they said
  alternatives:
  - and they told
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר; 'and they said' is the straightforward
    rendering.
- source_word: לַזַּיִת
  chosen: to the olive tree
  alternatives:
  - to the olive
  lexicon: HALOT
  rationale: Though זית can denote olive/olive tree, the personified addressee in
    the fable is best rendered 'olive tree' in English.
- source_word: מְלֹכָה
  chosen: Reign
  alternatives:
  - Be king
  - Rule as king
  lexicon: HALOT
  rationale: Imperative of מלך addressed to the olive tree. 'Reign over us' is idiomatic
    English and matches the following prepositional phrase.
- source_word: עָלֵינוּ
  chosen: over us
  alternatives:
  - for us
  lexicon: HALOT
  rationale: With מלך, על indicates dominion over subjects; 'over us' is the natural
    and precise rendering.
