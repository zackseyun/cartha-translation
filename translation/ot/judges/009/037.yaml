id: JDG.9.37
reference: Judges 9:37
source:
  edition: WLC
  text: וַ/יֹּ֨סֶף ע֣וֹד גַּעַל֮ לְ/דַבֵּר֒ וַ/יֹּ֕אמֶר הִנֵּה עָם֙ יֽוֹרְדִ֔ים מֵ/עִ֖ם
    טַבּ֣וּר הָ/אָ֑רֶץ וְ/רֹאשׁ אֶחָ֣ד בָּ֔א מִ/דֶּ֖רֶךְ אֵל֥וֹן מְעוֹנְנִֽים־־׃
translation:
  text: Gaal spoke again and said, “Look, people are coming down from the center of
    the land, and one company is coming by the way of the Oak of the Soothsayers.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the navel of the land,' an idiom for the central part
      of the land.
    reason: lexical_alternative
  - marker: b
    text: Or 'the terebinth of the diviners' / 'the oak of Meonenim.' The final place-name
      element is uncertain and may refer to soothsayers or augurers.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּסֶף עוֹד
  chosen: spoke again
  alternatives:
  - continued speaking
  - added further
  lexicon: HALOT
  rationale: The idiom 'added again' with an infinitive of speaking is naturally rendered
    in English as resuming or continuing speech. 'Spoke again' is concise and idiomatic
    while preserving the narrative sense.
- source_word: לְדַבֵּר
  chosen: spoke
  alternatives:
  - to speak
  - continued speaking
  lexicon: HALOT
  rationale: Combined with וַיֹּסֶף עוֹד, the infinitive functions idiomatically.
    English finite verb style is preferable here.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: A discourse particle drawing attention. 'Look' is readable modern English
    and preserves the deictic force better than the archaic 'Behold.'
- source_word: עָם
  chosen: people
  alternatives:
  - a people
  - troops
  - men
  lexicon: HALOT
  rationale: In context Gaal is spotting approaching groups. 'People' is the broad,
    natural rendering; 'troops' would over-specify the military sense beyond the noun
    itself.
- source_word: יֹרְדִים
  chosen: are coming down
  alternatives:
  - are descending
  - are going down
  lexicon: HALOT
  rationale: The participle indicates ongoing movement. 'Coming down' fits the observer's
    perspective and natural English narrative style.
- source_word: מֵעִם טַבּוּר הָאָרֶץ
  chosen: from the center of the land
  alternatives:
  - from the navel of the land
  - from the middle of the land
  lexicon: HALOT
  rationale: טַבּוּר literally means 'navel,' but in geographic usage it denotes the
    middle or central part. 'Center of the land' communicates the sense clearly in
    modern English while preserving the metaphor's referent.
- source_word: וְרֹאשׁ אֶחָד
  chosen: one company
  alternatives:
  - one head
  - one group
  - one division
  lexicon: HALOT
  rationale: רֹאשׁ literally means 'head,' but here it refers to a leading part or
    division of the approaching people. 'One company' is idiomatic for a distinct
    group within a larger force.
- source_word: בָּא
  chosen: is coming
  alternatives:
  - comes
  - is arriving
  lexicon: HALOT
  rationale: The participial-like narrative sense in context is best represented by
    the progressive 'is coming,' matching the ongoing visual report.
- source_word: מִדֶּרֶךְ
  chosen: by the way of
  alternatives:
  - from the direction of
  - by way of
  - from the road of
  lexicon: HALOT
  rationale: The phrase indicates route or direction. 'By the way of' is a natural
    English rendering that preserves the topographical sense.
- source_word: אֵלוֹן
  chosen: Oak
  alternatives:
  - terebinth
  - great tree
  lexicon: HALOT
  rationale: אֵלוֹן can denote a large tree, often rendered 'oak' or 'terebinth.'
    'Oak' is a standard and readable rendering, though the exact species may be uncertain.
- source_word: מְעוֹנְנִים
  chosen: the Soothsayers
  alternatives:
  - the Augurers
  - the Diviners
  - Meonenim
  lexicon: HALOT
  rationale: The form is traditionally understood as related to soothsaying/divination.
    Because it likely functions here as part of a place-name, the phrase is capitalized.
    The exact nuance is uncertain, so an alternative is preserved in a footnote.
