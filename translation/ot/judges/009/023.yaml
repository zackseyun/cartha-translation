id: JDG.9.23
reference: Judges 9:23
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֤ח אֱלֹהִים֙ ר֣וּחַ רָעָ֔ה בֵּ֣ין אֲבִימֶ֔לֶךְ וּ/בֵ֖ין בַּעֲלֵ֣י
    שְׁכֶ֑ם וַ/יִּבְגְּד֥וּ בַעֲלֵי שְׁכֶ֖ם בַּ/אֲבִימֶֽלֶךְ־׃
translation:
  text: Then God sent an evil spirit between Abimelech and the leaders of Shechem,
    and the leaders of Shechem dealt treacherously with Abimelech.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a harmful spirit.' The Hebrew can emphasize either moral evil or injurious
      effect.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the lords/masters of Shechem'; here likely the city's leading men
      or civic leaders.
    reason: lexical_alternative
  - marker: c
    text: Or 'acted treacherously against Abimelech' or 'betrayed Abimelech.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: The verb שׁלח in the waw-consecutive narrative form is straightforwardly
    'sent.' 'Sent' is idiomatic and preserves divine agency without embellishment.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: In this narrative context אֱלֹהִים refers to the true God acting in judgment.
    'God' is the natural English rendering.
- source_word: רוּחַ רָעָה
  chosen: an evil spirit
  alternatives:
  - a harmful spirit
  - a bad spirit
  lexicon: HALOT
  rationale: רוּחַ with רָעָה denotes a spirit characterized by evil/harm. 'An evil
    spirit' is the most direct and established rendering. 'Harmful spirit' captures
    effect but can soften the moral force of רָעָה; therefore it is preserved as an
    alternative in a footnote.
- source_word: בֵּין ... וּבֵין
  chosen: between ... and
  lexicon: HALOT
  rationale: The paired prepositions mark hostility or division between two parties.
    'Between ... and' is the standard and precise rendering.
- source_word: בַּעֲלֵי שְׁכֶם
  chosen: the leaders of Shechem
  alternatives:
  - the citizens of Shechem
  - the lords of Shechem
  - the men of Shechem
  lexicon: HALOT
  rationale: בַּעֲלֵי literally means 'lords/masters/owners of,' but in this civic-political
    context it refers to the leading men or power-holders of Shechem. 'Leaders of
    Shechem' communicates the social-political sense in clear modern English. Alternatives
    are preserved because the term can be rendered more formally as 'lords' or more
    broadly as 'citizens/men' depending on context.
- source_word: וַיִּבְגְּדוּ
  chosen: dealt treacherously
  alternatives:
  - acted treacherously
  - betrayed
  lexicon: HALOT
  rationale: בגד commonly denotes acting unfaithfully or treacherously. 'Dealt treacherously'
    preserves the covenantal/moral nuance better than the narrower 'betrayed,' though
    'betrayed' is a plausible contextual alternative.
- source_word: בַּאֲבִימֶלֶךְ
  chosen: with Abimelech
  alternatives:
  - against Abimelech
  lexicon: HALOT
  rationale: The preposition ב with בגד can be rendered 'against' or 'with' in English
    depending on idiom. 'Dealt treacherously with Abimelech' is the most natural collocation
    in English while retaining the sense of hostile disloyalty. 'Against Abimelech'
    is preserved as an alternative.
