theological_decisions:
- issue: Divine agency in sending the evil spirit
  chosen_reading: 'The text is rendered with direct divine agency: ''God sent an evil
    spirit.'''
  alternative_readings:
  - God allowed an evil spirit
  - God permitted a spirit of ill will
  rationale: The Hebrew verb and syntax explicitly attribute the sending to God. To
    weaken this to mere permission would import interpretation beyond the text. The
    translation preserves the narrative's theological tension without resolving metaphysical
    questions about secondary causation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
