id: JDG.9.5
reference: Judges 9:5
source:
  edition: WLC
  text: וַ/יָּבֹ֤א בֵית אָבִי/ו֙ עָפְרָ֔תָ/ה וַֽ/יַּהֲרֹ֞ג אֶת אֶחָ֧י/ו בְּנֵֽי יְרֻבַּ֛עַל
    שִׁבְּעִ֥ים אִ֖ישׁ עַל אֶ֣בֶן אֶחָ֑ת וַ/יִּוָּתֵ֞ר יוֹתָ֧ם בֶּן יְרֻבַּ֛עַל הַ/קָּטֹ֖ן
    כִּ֥י נֶחְבָּֽא־־־־־׃ס
translation:
  text: Then he went to his father’s house at Ophrah and killed his brothers, the
    sons of Jerubbaal—seventy men—on one stone. But Jotham, the youngest son of Jerubbaal,
    was left, because he hid himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and he came to his father’s house, to Ophrah.'
    reason: lexical_alternative
  - marker: b
    text: '''On one stone'' may refer to a single stone at which the executions were
      carried out, emphasizing that the seventy were killed together in one place.'
    reason: cultural_note
  - marker: c
    text: Or 'was left alive.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: Then he went
  alternatives:
  - And he came
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Went' fits the movement
    to a specified destination ('to his father’s house at Ophrah') more naturally
    in English than the more literal 'came,' while preserving the basic motion sense.
- source_word: בֵית אָבִיו
  chosen: his father’s house
  alternatives:
  - the house of his father
  - his father’s household
  lexicon: HALOT
  rationale: The construct phrase is rendered straightforwardly. 'House' can imply
    household, but here the following place-name ('at Ophrah') supports a concrete
    location, so 'his father’s house' is preferred.
- source_word: עָפְרָתָה
  chosen: at Ophrah
  alternatives:
  - to Ophrah
  lexicon: HALOT
  rationale: The directional ending indicates motion toward Ophrah, but in English
    the destination is naturally expressed with the whole phrase 'went to his father’s
    house at Ophrah.' This preserves the place reference without awkwardness.
- source_word: וַיַּהֲרֹג
  chosen: killed
  alternatives:
  - slew
  - murdered
  lexicon: HALOT
  rationale: '''Killed'' is the basic lexical sense and avoids importing an additional
    legal or emotive nuance beyond the verb itself. The murderous character of the
    act is clear from context without requiring ''murdered'' in the main text.'
- source_word: אֶת אֶחָיו בְּנֵי יְרֻבַּעַל
  chosen: his brothers, the sons of Jerubbaal
  alternatives:
  - his brothers—the sons of Jerubbaal
  - his brothers, Jerubbaal’s sons
  lexicon: HALOT
  rationale: The appositional phrase identifies who the brothers are. Retaining both
    expressions preserves the Hebrew emphasis and clarity.
- source_word: שִׁבְעִים אִישׁ
  chosen: seventy men
  alternatives:
  - seventy persons
  lexicon: HALOT
  rationale: אִישׁ after a number commonly means 'men' or 'persons'; here the referents
    are Gideon/Jerubbaal’s sons, so 'men' is accurate and gender-appropriate.
- source_word: עַל אֶבֶן אֶחָת
  chosen: on one stone
  alternatives:
  - upon one stone
  - at one stone
  lexicon: HALOT
  rationale: This is the plain sense of the Hebrew. It likely indicates a single execution
    site or stone used in the slaughter, and the translation preserves that stark
    imagery without over-interpreting it.
- source_word: וַיִּוָּתֵר
  chosen: was left
  alternatives:
  - remained
  - was left alive
  lexicon: HALOT
  rationale: The Niphal conveys being left over or remaining. 'Was left' is concise
    and lets the context imply survival; 'was left alive' is interpretive but possible.
- source_word: הַקָּטֹן
  chosen: the youngest
  alternatives:
  - the small/lesser
  - the youngest one
  lexicon: HALOT
  rationale: In familial context, 'the youngest' is the natural English equivalent
    of 'the small/young one.'
- source_word: כִּי נֶחְבָּא
  chosen: because he hid himself
  alternatives:
  - for he hid himself
  - because he had hidden
  lexicon: HALOT
  rationale: The clause gives the reason for Jotham’s survival. 'Because he hid himself'
    is a clear rendering of the Niphal/passive-reflexive sense in context.
