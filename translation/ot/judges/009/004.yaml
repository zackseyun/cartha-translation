id: JDG.9.4
reference: Judges 9:4
source:
  edition: WLC
  text: וַ/יִּתְּנוּ ל/וֹ֙ שִׁבְעִ֣ים כֶּ֔סֶף מִ/בֵּ֖יתּ בַ֣עַל בְּרִ֑ית וַ/יִּשְׂכֹּ֨ר
    בָּ/הֶ֜ם אֲבִימֶ֗לֶךְ אֲנָשִׁ֤ים רֵיקִים֙ וּ/פֹ֣חֲזִ֔ים וַ/יֵּלְכ֖וּ אַחֲרָֽי/ו־׃
translation:
  text: And they gave him seventy pieces of silver from the house of Baal-berith,
    and with them Abimelek hired worthless and reckless men, and they followed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the temple of Baal-berith.' The Hebrew says 'house,' which in a
      cultic setting can refer to a shrine or temple.
    reason: lexical_alternative
  - marker: b
    text: Or 'seventy silver shekels.' The Hebrew says literally 'seventy silver,'
      a monetary amount expressed by weight.
    reason: lexical_alternative
  - marker: c
    text: Literally 'empty and reckless men.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁבְעִים כֶּסֶף
  chosen: seventy pieces of silver
  alternatives:
  - seventy silver shekels
  - seventy silver pieces
  lexicon: HALOT
  rationale: כֶּסֶף literally means 'silver' and can denote money by weight. 'Pieces
    of silver' is natural English that preserves the monetary sense without over-specifying
    'shekels,' which is not explicit in the Hebrew.
- source_word: מִבֵּית בַּעַל בְּרִית
  chosen: from the house of Baal-berith
  alternatives:
  - from the temple of Baal-berith
  - from the house of Baal of the covenant
  lexicon: HALOT
  rationale: בַּיִת ('house') in cultic context can mean temple/shrine, but 'house'
    preserves the Hebrew image while remaining understandable. The divine name/title
    is transliterated as the proper name 'Baal-berith' rather than translated, following
    the policy to transliterate names.
- source_word: וַיִּשְׂכֹּר בָּהֶם
  chosen: and with them ... hired
  alternatives:
  - and hired with it
  - and for them ... hired
  lexicon: HALOT
  rationale: The preposition ב plus pronoun refers back to the silver as the means
    by which Abimelek hired the men. English idiom requires restructuring as 'with
    them' referring to the silver pieces.
- source_word: אֲנָשִׁים רֵיקִים
  chosen: worthless men
  alternatives:
  - empty men
  - vain men
  - idle men
  lexicon: HALOT
  rationale: רֵיקִים literally means 'empty,' but in this characterization it denotes
    men of no worth or substance. 'Worthless men' best captures the moral and social
    force in idiomatic English.
- source_word: וּפֹחֲזִים
  chosen: reckless
  alternatives:
  - lawless
  - unstable
  - boastful
  lexicon: HALOT
  rationale: The term describes people who are undisciplined, rash, and unreliable.
    'Reckless' fits the context of hired troublemakers and pairs naturally with 'worthless.'
- source_word: וַיֵּלְכוּ אַחֲרָיו
  chosen: and they followed him
  alternatives:
  - and they went after him
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'went after him,' but in context it means
    they attached themselves to Abimelek as his followers. 'Followed him' is the clearest
    optimal-equivalence rendering.
