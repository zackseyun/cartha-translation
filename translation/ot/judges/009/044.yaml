id: JDG.9.44
reference: Judges 9:44
source:
  edition: WLC
  text: וַ/אֲבִימֶ֗לֶךְ וְ/הָ/רָאשִׁים֙ אֲשֶׁ֣ר עִמּ֔/וֹ פָּשְׁט֕וּ וַ/יַּ֣עַמְד֔וּ
    פֶּ֖תַח שַׁ֣עַר הָ/עִ֑יר וּ/שְׁנֵ֣י הָֽ/רָאשִׁ֗ים פָּֽשְׁט֛וּ עַֽל כָּל אֲשֶׁ֥ר
    בַּ/שָּׂדֶ֖ה וַ/יַּכּֽוּ/ם־־׃
translation:
  text: And Abimelech and the leaders who were with him rushed forward and took their
    stand at the entrance of the city gate, while the two other companies rushed against
    everyone who was in the field and struck them down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the two leaders.' In context, this likely refers to the
      two remaining companies or divisions from the three groups mentioned in the
      previous verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּשְׁטוּ
  chosen: rushed forward
  alternatives:
  - advanced
  - spread out
  - made a raid
  lexicon: HALOT
  rationale: In this military context the verb denotes a rapid forward movement/attack
    rather than merely 'spread out.' 'Rushed forward' fits the tactical action described
    here and in the second clause.
- source_word: הָרָאשִׁים
  chosen: the leaders
  alternatives:
  - the chiefs
  - the captains
  - the companies
  lexicon: HALOT
  rationale: Literally 'the heads,' but in context it refers to the commanders or
    division leaders with Abimelech. 'Leaders' is clear modern English and preserves
    the military-organizational sense.
- source_word: וַיַּעַמְדוּ
  chosen: took their stand
  alternatives:
  - stood
  - stationed themselves
  lexicon: HALOT
  rationale: The idiom conveys deliberate positioning in battle. 'Took their stand'
    expresses purposeful military placement better than the bare 'stood.'
- source_word: פֶּתַח שַׁעַר הָעִיר
  chosen: the entrance of the city gate
  alternatives:
  - the opening of the city gate
  - the gateway of the city
  lexicon: HALOT
  rationale: The construct phrase points to the gate entrance/opening. 'Entrance of
    the city gate' is natural English and keeps the concrete spatial detail.
- source_word: וּשְׁנֵי הָרָאשִׁים
  chosen: the two other companies
  alternatives:
  - the two other leaders
  - the two divisions
  lexicon: HALOT
  rationale: Although the consonantal text again reads 'heads/leaders,' the immediate
    context (v. 43) has Abimelech dividing his forces into three companies. Here the
    sense is the remaining two military groups, not merely two individual commanders.
    This is a contextual rendering for clarity.
- source_word: עַל כָּל אֲשֶׁר בַּשָּׂדֶה
  chosen: against everyone who was in the field
  alternatives:
  - upon all who were in the field
  - against everything in the field
  lexicon: HALOT
  rationale: Given the following verb 'struck them down,' the object is best understood
    as people in the fields rather than crops or property. 'Everyone who was in the
    field' makes the implied human referent explicit.
- source_word: וַיַּכּוּם
  chosen: struck them down
  alternatives:
  - killed them
  - attacked them
  - smote them
  lexicon: HALOT
  rationale: The verb נכה often means to strike down/defeat/kill depending on context.
    'Struck them down' preserves the violence without over-specifying whether every
    individual was killed.
