id: JDG.9.51
reference: Judges 9:51
source:
  edition: WLC
  text: וּ/מִגְדַּל עֹז֮ הָיָ֣ה בְ/תוֹךְ הָ/עִיר֒ וַ/יָּנֻ֨סוּ שָׁ֜מָּ/ה כָּל הָ/אֲנָשִׁ֣ים
    וְ/הַ/נָּשִׁ֗ים וְ/כֹל֙ בַּעֲלֵ֣י הָ/עִ֔יר וַֽ/יִּסְגְּר֖וּ בַּעֲדָ֑/ם וַֽ/יַּעֲל֖וּ
    עַל גַּ֥ג הַ/מִּגְדָּֽל־־־־׃
translation:
  text: But there was a strong tower in the middle of the city, and all the men and
    women and all the leaders of the city fled there and shut themselves in, and they
    went up onto the roof of the tower.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a fortified tower.' The Hebrew phrase literally combines 'tower' with
      'strength,' emphasizing its defensive character.
    reason: lexical_alternative
  - marker: b
    text: Or 'all the principal men of the city.' The Hebrew 'owners/masters of the
      city' is an idiom for the city's leading men, not necessarily every inhabitant.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִגְדַּל עֹז
  chosen: a strong tower
  alternatives:
  - a fortified tower
  - a tower of strength
  lexicon: HALOT
  rationale: מִגְדַּל is 'tower' and עֹז denotes strength/stronghold. 'Strong tower'
    is natural English and preserves the defensive sense without becoming overly interpretive.
    'Tower of strength' sounds idiomatic in English but can suggest metaphor rather
    than a literal fortified structure.
- source_word: בְּתוֹךְ הָעִיר
  chosen: in the middle of the city
  alternatives:
  - within the city
  - inside the city
  lexicon: HALOT
  rationale: בְּתוֹךְ literally means 'in the midst/middle of.' 'In the middle of
    the city' preserves the spatial sense more precisely than the broader 'within
    the city.'
- source_word: וַיָּנֻסוּ שָׁמָּה
  chosen: fled there
  alternatives:
  - ran there
  - took refuge there
  lexicon: HALOT
  rationale: נוּס means 'to flee.' 'Fled there' is the most direct rendering. 'Took
    refuge there' captures the implied purpose but adds interpretation beyond the
    verb itself.
- source_word: כָּל הָאֲנָשִׁים וְהַנָּשִׁים
  chosen: all the men and women
  alternatives:
  - all the people, men and women
  lexicon: HALOT
  rationale: The Hebrew explicitly distinguishes men and women, so the translation
    preserves both terms rather than collapsing them into a generic 'people.' This
    follows the gender-accurate principle.
- source_word: וְכֹל בַּעֲלֵי הָעִיר
  chosen: and all the leaders of the city
  alternatives:
  - and all the citizens of the city
  - and all the lords/masters of the city
  lexicon: HALOT
  rationale: בַּעֲלֵי literally means 'owners/masters/possessors,' but in this civic
    context it idiomatically refers to the city's principal men or leaders. 'Leaders
    of the city' best fits the context and avoids the misleadingly broad 'citizens.'
- source_word: וַיִּסְגְּרוּ בַעֲדָם
  chosen: shut themselves in
  alternatives:
  - shut the door behind them
  - closed it behind them
  lexicon: HALOT
  rationale: The phrase literally means 'they shut behind them/for themselves.' English
    idiom is best captured by 'shut themselves in,' which conveys enclosure without
    requiring an explicit object absent from the Hebrew.
- source_word: וַיַּעֲלוּ עַל גַּג הַמִּגְדָּל
  chosen: they went up onto the roof of the tower
  alternatives:
  - they climbed to the roof of the tower
  - they went up to the top of the tower
  lexicon: HALOT
  rationale: עָלָה is the common verb 'go up,' and גַּג specifically means 'roof,'
    not merely 'top.' 'Went up onto the roof of the tower' preserves both the motion
    and the architectural detail.
