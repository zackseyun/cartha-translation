id: JDG.9.32
reference: Judges 9:32
source:
  edition: WLC
  text: וְ/עַתָּה֙ ק֣וּם לַ֔יְלָה אַתָּ֖ה וְ/הָ/עָ֣ם אֲשֶׁר אִתָּ֑/ךְ וֶ/אֱרֹ֖ב בַּ/שָּׂדֶֽה־׃
translation:
  text: Now then, arise by night, you and the people who are with you, and lie in
    wait in the field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at night.' The Hebrew adverbial expression indicates nighttime action
      without necessarily specifying 'tonight.'
    reason: lexical_alternative
  - marker: b
    text: Or 'set an ambush' / 'ambush.' The Hebrew verb means to lie in wait, often
      with ambush in view.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now then
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Discourse marker introducing an immediate instruction. 'Now then' captures
    both the transitional force of וְ and the urgency of עַתָּה in natural English.
- source_word: קוּם
  chosen: arise
  alternatives:
  - get up
  - rise
  lexicon: HALOT
  rationale: Imperative of קום. 'Arise' preserves the command's directness and slightly
    elevated military tone better than the more colloquial 'get up.'
- source_word: לַיְלָה
  chosen: by night
  alternatives:
  - at night
  - tonight
  lexicon: HALOT
  rationale: Adverbial accusative indicating time. 'By night' is a natural military
    expression in English and fits the tactical context. 'Tonight' would over-specify
    immediacy beyond the Hebrew.
- source_word: אַתָּה
  chosen: you
  lexicon: HALOT
  rationale: Explicit pronoun retained for emphasis in Hebrew; represented in English
    by placing 'you' explicitly before the accompanying group.
- source_word: וְהָעָם אֲשֶׁר אִתָּךְ
  chosen: and the people who are with you
  alternatives:
  - and the troops with you
  - and the men who are with you
  lexicon: HALOT
  rationale: עָם is broadly 'people' here, referring to the force accompanying him.
    'People' is the most direct lexical equivalent; 'troops' is contextually plausible
    but interpretive, and 'men' is not demanded by the Hebrew.
- source_word: וֶאֱרֹב
  chosen: and lie in wait
  alternatives:
  - and set an ambush
  - and ambush
  lexicon: HALOT
  rationale: From ארב, to lie in wait/ambush. 'Lie in wait' preserves the verbal nuance
    of taking up an ambush position, whereas 'ambush' can sound more like the attack
    itself.
- source_word: בַּשָּׂדֶה
  chosen: in the field
  alternatives:
  - in the open country
  - in the countryside
  lexicon: HALOT
  rationale: שָׂדֶה commonly means 'field' or open country. 'In the field' is the
    most straightforward rendering and suits the immediate tactical setting.
