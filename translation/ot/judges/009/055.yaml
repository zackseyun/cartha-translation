id: JDG.9.55
reference: Judges 9:55
source:
  edition: WLC
  text: וַ/יִּרְא֥וּ אִֽישׁ יִשְׂרָאֵ֖ל כִּ֣י מֵ֣ת אֲבִימֶ֑לֶךְ וַ/יֵּלְכ֖וּ אִ֥ישׁ
    לִ/מְקֹמֽ/וֹ־׃
translation:
  text: When the men of Israel saw that Abimelech was dead, each went to his own place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the men of Israel ... each to his place.' The singular
      'each' distributes the action among the group.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְאוּ
  chosen: saw
  alternatives:
  - realized
  - looked and saw
  lexicon: HALOT
  rationale: Basic sense of ראה in the wayyiqtol narrative sequence is visual perception
    leading to recognition. 'Saw' preserves the Hebrew wording and natural English
    narrative flow.
- source_word: אִישׁ יִשְׂרָאֵל
  chosen: the men of Israel
  alternatives:
  - the Israelites
  - each man of Israel
  lexicon: HALOT
  rationale: Although singular אִישׁ is used collectively, the following plural verbs
    show a collective sense. 'The men of Israel' preserves the gendered, representative
    force better than the more neutral 'Israelites,' in keeping with the gender-accurate
    philosophy.
- source_word: כִּי
  chosen: that
  alternatives:
  - when
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of what they saw/recognized: ''saw
    that Abimelech was dead.'' This is the most straightforward syntactic function
    in context.'
- source_word: מֵת
  chosen: was dead
  alternatives:
  - had died
  - dead
  lexicon: HALOT
  rationale: The predicate adjective/participle states Abimelech's condition at the
    moment perceived. 'Was dead' is idiomatic and matches the Hebrew state description
    better than the more event-focused 'had died.'
- source_word: אֲבִימֶלֶךְ
  chosen: Abimelech
  rationale: Personal name is transliterated by standard English convention, following
    the project's policy to transliterate names rather than translate them.
- source_word: וַיֵּלְכוּ
  chosen: went
  alternatives:
  - departed
  - returned
  lexicon: HALOT
  rationale: הלך in simple narrative commonly means 'went.' 'Returned' would overinterpret,
    since the text states movement to one's place without explicitly emphasizing return.
- source_word: אִישׁ לִמְקֹמוֹ
  chosen: each went to his own place
  alternatives:
  - each man to his place
  - each to his home
  lexicon: HALOT
  rationale: The distributive singular אִישׁ after a plural verb is well represented
    by 'each.' מָקוֹם is more literally 'place' than 'home'; 'his own place' preserves
    the Hebrew while remaining natural English.
