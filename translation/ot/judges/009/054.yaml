id: JDG.9.54
reference: Judges 9:54
source:
  edition: WLC
  text: וַ/יִּקְרָ֨א מְהֵרָ֜ה אֶל הַ/נַּ֣עַר נֹשֵׂ֣א כֵלָ֗י/ו וַ/יֹּ֤אמֶר ל/וֹ֙ שְׁלֹ֤ף
    חַרְבְּ/ךָ֙ וּ/מ֣וֹתְתֵ֔/נִי פֶּן יֹ֥אמְרוּ לִ֖/י אִשָּׁ֣ה הֲרָגָ֑תְ/הוּ וַ/יִּדְקְרֵ֥/הוּ
    נַעֲר֖/וֹ וַ/יָּמֹֽת־׀־׃
translation:
  text: Then he quickly called to the young man who carried his weapons and said to
    him, “Draw your sword and kill me, lest they say of me, ‘A woman killed him.’”
    So his young man pierced him through, and he died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “his armor-bearer” for “the young man who carried
      his weapons” / “his young man.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: Then he ... called
  alternatives:
  - And he called
  - So he called
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative. 'Then' gives natural English narrative
    sequence without over-paraphrasing.
- source_word: מְהֵרָה
  chosen: quickly
  alternatives:
  - in haste
  - hurriedly
  lexicon: HALOT
  rationale: Adverbial accusative indicating haste. 'Quickly' is clear modern English.
- source_word: הַנַּעַר
  chosen: the young man
  alternatives:
  - the servant
  - the attendant
  lexicon: HALOT
  rationale: נַעַר commonly denotes a youth/young man; here it refers to Abimelech's
    armor-bearer. 'Young man' preserves the lexical sense better than the more interpretive
    'servant'.
- source_word: נֹשֵׂא כֵלָיו
  chosen: who carried his weapons
  alternatives:
  - his armor-bearer
  - who bore his armor
  lexicon: HALOT
  rationale: Literally 'bearer of his equipment/weapons.' 'Who carried his weapons'
    is transparent and readable; 'armor-bearer' is a valid idiomatic alternative but
    slightly more interpretive.
- source_word: שְׁלֹף
  chosen: Draw
  alternatives:
  - Pull out
  - Unsheathe
  lexicon: HALOT
  rationale: Imperative of drawing a sword from its sheath. 'Draw' is the standard
    concise English equivalent.
- source_word: חַרְבְּךָ
  chosen: your sword
  lexicon: HALOT
  rationale: Straightforward rendering of the noun with 2ms suffix.
- source_word: וּמוֹתְתֵנִי
  chosen: and kill me
  alternatives:
  - and put me to death
  lexicon: HALOT
  rationale: Causative/denominative force in context is a request to cause his death.
    'Kill me' is the most direct natural English equivalent.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - so that not
  - otherwise
  lexicon: HALOT
  rationale: Introduces a negative purpose/result clause. 'Lest' is concise and idiomatic
    in solemn narrative.
- source_word: יֹאמְרוּ לִי
  chosen: they say of me
  alternatives:
  - they say about me
  - they say to me
  lexicon: HALOT
  rationale: Although literally 'say to me,' the idiom in context concerns what people
    will say concerning Abimelech's death. English requires 'of/about me' to convey
    the intended sense.
- source_word: אִשָּׁה הֲרָגָתְהוּ
  chosen: ‘A woman killed him’
  alternatives:
  - ‘A woman slew him’
  - ‘He was killed by a woman’
  lexicon: HALOT
  rationale: The Hebrew foregrounds 'woman' and uses a 3fs verb with 3ms object. Direct
    quotation with active voice preserves the shame-honor force of the statement.
- source_word: וַיִּדְקְרֵהוּ
  chosen: pierced him through
  alternatives:
  - stabbed him
  - ran him through
  lexicon: HALOT
  rationale: The verb denotes thrusting/piercing with a weapon. 'Pierced him through'
    preserves the violent specificity better than the more general 'killed'.
- source_word: נַעֲרוֹ
  chosen: his young man
  alternatives:
  - his servant
  - his attendant
  lexicon: HALOT
  rationale: Maintains lexical consistency with earlier נַעַר in the verse. Though
    it refers to his armor-bearer, repeating 'young man' preserves the Hebrew wording.
- source_word: וַיָּמֹת
  chosen: and he died
  alternatives:
  - so he died
  lexicon: HALOT
  rationale: Simple narrative conclusion; formal enough while remaining natural.
