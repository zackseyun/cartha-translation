id: JDG.9.24
reference: Judges 9:24
source:
  edition: WLC
  text: לָ/ב֕וֹא חֲמַ֖ס שִׁבְעִ֣ים בְּנֵֽי יְרֻבָּ֑עַל וְ/דָמָ֗/ם לָ/שׂ֞וּם עַל אֲבִימֶ֤לֶךְ
    אֲחִי/הֶם֙ אֲשֶׁ֣ר הָרַ֣ג אוֹתָ֔/ם וְ/עַל֙ בַּעֲלֵ֣י שְׁכֶ֔ם אֲשֶׁר חִזְּק֥וּ
    אֶת יָדָ֖י/ו לַ/הֲרֹ֥ג אֶת אֶחָֽי/ו־־־־־׃
translation:
  text: so that the violence done to the seventy sons of Jerubbaal might come, and
    their blood be laid on Abimelech their brother, who killed them, and on the leaders
    of Shechem, who strengthened his hands to kill his brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'their blood be laid on,' an idiom for assigning guilt or responsibility
      for bloodshed.
    reason: lexical_alternative
  - marker: b
    text: Or 'the lords of Shechem'; the Hebrew refers to the leading men or power-holders
      of the city.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'strengthened his hands,' that is, supported or backed him.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָבֹוא
  chosen: might come
  alternatives:
  - would come
  - could come
  - come upon
  lexicon: HALOT
  rationale: 'Infinitive construct with prefixed ל expresses purpose/result in context
    following the previous verse: ''in order that ... might come.'' ''Come'' preserves
    the idiom of violence/bloodguilt coming upon perpetrators.'
- source_word: חֲמָס
  chosen: the violence done to
  alternatives:
  - violence
  - wrong
  - outrage
  lexicon: HALOT
  rationale: חמס can denote violence or violent wrong. Here it refers to the atrocity
    committed against Jerubbaal's sons, so 'the violence done to' makes the object
    relation clear in natural English without over-paraphrasing.
- source_word: שִׁבְעִים בְּנֵי יְרֻבָּעַל
  chosen: the seventy sons of Jerubbaal
  lexicon: HALOT
  rationale: Straightforward construct chain. 'Jerubbaal' is transliterated as a personal
    name per translation philosophy.
- source_word: וְדָמָם
  chosen: and their blood
  alternatives:
  - and their bloodguilt
  - that is, their blood
  lexicon: HALOT
  rationale: Literal 'their blood' is retained. In context it metonymically refers
    to bloodguilt for their murder, but the Hebrew idiom should be preserved in the
    main text.
- source_word: לָשׂוּם עַל
  chosen: be laid on
  alternatives:
  - be placed on
  - be set upon
  - be charged against
  lexicon: HALOT
  rationale: Hebrew idiom for assigning guilt/responsibility. Passive English 'be
    laid on' preserves the imagery and legal-moral force.
- source_word: אֲבִימֶלֶךְ אֲחִיהֶם
  chosen: Abimelech their brother
  alternatives:
  - Abimelech, their brother
  lexicon: HALOT
  rationale: Appositional phrase identifying Abimelech as brother to the slain men;
    retained directly for clarity and rhetorical force.
- source_word: הָרַג
  chosen: killed
  alternatives:
  - slew
  - murdered
  lexicon: HALOT
  rationale: Basic verb 'kill.' Although the act is morally murder, the Hebrew verb
    itself is the common term; 'killed' avoids importing a legal label not explicit
    in the lexeme.
- source_word: בַּעֲלֵי שְׁכֶם
  chosen: the leaders of Shechem
  alternatives:
  - the lords of Shechem
  - the citizens of Shechem
  - the masters of Shechem
  lexicon: HALOT
  rationale: בעלי here denotes the leading men / power-holders of the city rather
    than all inhabitants. 'Leaders' communicates the social-political sense in readable
    English.
- source_word: חִזְּקוּ אֶת יָדָיו
  chosen: strengthened his hands
  alternatives:
  - supported him
  - encouraged him
  - made his hands strong
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of strengthening the hands, meaning
    giving support or backing. The main text keeps the idiom because it is intelligible
    in English and preserves the source texture.
- source_word: לַהֲרֹג אֶת אֶחָיו
  chosen: to kill his brothers
  alternatives:
  - to slay his brothers
  lexicon: HALOT
  rationale: Direct infinitive phrase of purpose/result. 'Brothers' is gender-accurate
    and contextually specific, referring to male siblings.
