theological_decisions:
- issue: Rendering of bloodguilt imagery
  chosen_reading: Retain 'their blood be laid on' in the main text
  alternative_readings:
  - their bloodguilt be charged to
  - vengeance for their blood fall on
  rationale: The verse speaks in covenantal-judicial idiom of responsibility for shed
    blood. Preserving 'blood' rather than resolving it to 'bloodguilt' keeps the Hebrew
    imagery and theological tension while remaining understandable in English.
  doctrine_reference: Translation philosophy §3, §5
