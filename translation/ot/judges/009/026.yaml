id: JDG.9.26
reference: Judges 9:26
source:
  edition: WLC
  text: וַ/יָּבֹ֞א גַּ֤עַל בֶּן עֶ֨בֶד֙ וְ/אֶחָ֔י/ו וַ/יַּעַבְר֖וּ בִּ/שְׁכֶ֑ם וַ/יִּבְטְחוּ
    ב֖/וֹ בַּעֲלֵ֥י שְׁכֶֽם־־׃
translation:
  text: Then Gaal son of Ebed came with his brothers and crossed into Shechem, and
    the leaders of Shechem put their trust in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and his brothers'; the Hebrew conjunction is simply 'and,' though English
      idiom may express accompaniment as 'with his brothers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'passed through Shechem' or 'went over into Shechem'; the Hebrew verb
      can denote crossing or passing over, and the exact nuance in context is debated.
    reason: lexical_alternative
  - marker: c
    text: Or 'the lords of Shechem'; the Hebrew literally reads 'the בעלי of Shechem,'
      referring to the city's leading men or power-holders.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: Then ... came
  alternatives:
  - And ... came
  - Now ... came
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative progression without losing the sequential force of the Hebrew verb בוא
    ('come').
- source_word: גַּעַל
  chosen: Gaal
  rationale: 'Personal name is transliterated according to the translation philosophy:
    translate titles, transliterate names.'
- source_word: בֶּן עֶבֶד
  chosen: son of Ebed
  rationale: Standard patronymic construction; 'son of Ebed' is the natural formal
    rendering.
- source_word: וְאֶחָיו
  chosen: with his brothers
  alternatives:
  - and his brothers
  lexicon: HALOT
  rationale: Although the conjunction is simply 'and,' English idiom after 'came'
    naturally expresses accompaniment as 'came with his brothers.' This preserves
    the sense without awkwardness.
- source_word: וַיַּעַבְרוּ בִּשְׁכֶם
  chosen: crossed into Shechem
  alternatives:
  - passed through Shechem
  - went over into Shechem
  - came into Shechem
  lexicon: HALOT
  rationale: עבר commonly means 'pass over/cross.' With בְּ plus place name here,
    the sense is movement into/through the city. 'Crossed into Shechem' preserves
    the motion nuance better than the flatter 'came to Shechem.'
- source_word: וַיִּבְטְחוּ בוֹ
  chosen: put their trust in him
  alternatives:
  - trusted him
  - felt secure because of him
  lexicon: HALOT
  rationale: בטח with בְּ marks trust/confidence in a person. 'Put their trust in
    him' is slightly fuller English and preserves the relational confidence implied.
- source_word: בַּעֲלֵי שְׁכֶם
  chosen: the leaders of Shechem
  alternatives:
  - the lords of Shechem
  - the citizens of Shechem
  - the masters of Shechem
  lexicon: HALOT
  rationale: בעלים of a city refers to its leading men or power-holders rather than
    all inhabitants. 'Leaders of Shechem' communicates the sociopolitical sense in
    clear modern English better than the archaic 'lords.'
