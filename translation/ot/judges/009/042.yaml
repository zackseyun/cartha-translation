id: JDG.9.42
reference: Judges 9:42
source:
  edition: WLC
  text: וַֽ/יְהִי֙ מִֽ/מָּחֳרָ֔ת וַ/יֵּצֵ֥א הָ/עָ֖ם הַ/שָּׂדֶ֑ה וַ/יַּגִּ֖דוּ לַ/אֲבִימֶֽלֶךְ׃
translation:
  text: And it happened on the next day that the people went out into the field, and
    it was reported to Abimelek.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'and they told Abimelek,' with an indefinite plural subject;
      English 'it was reported to Abimelek' conveys the same sense more naturally.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing the next event in sequence. 'And
    it happened' preserves the Hebrew narrative marker in readable modern English
    without archaic phrasing.
- source_word: מִמָּחֳרָת
  chosen: on the next day
  alternatives:
  - the next day
  - on the following day
  - on the morrow
  lexicon: HALOT
  rationale: Temporal expression meaning the following day. 'On the next day' is natural
    English and preserves the temporal force.
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - came out
  - went forth
  lexicon: HALOT
  rationale: From יצא, standard motion verb. 'Went out' is the plain contextual sense
    in narrative.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the men
  - the populace
  lexicon: HALOT
  rationale: עם here is a collective noun referring to the inhabitants/people as a
    group, not specifically males; 'the people' best matches the source and context.
- source_word: הַשָּׂדֶה
  chosen: into the field
  alternatives:
  - to the field
  - into the countryside
  lexicon: HALOT
  rationale: שׂדה denotes the open field/cultivated land outside the city. 'Into the
    field' fits English idiom with 'went out' and preserves the singular noun.
- source_word: וַיַּגִּדוּ
  chosen: it was reported
  alternatives:
  - they told
  - they reported
  lexicon: HALOT
  rationale: The Hebrew uses a 3rd person plural verb with an indefinite subject ('they
    told/reported'). English commonly renders this idiom with an impersonal passive,
    'it was reported,' which preserves the sense without implying a specific named
    subject.
- source_word: לַאֲבִימֶלֶךְ
  chosen: to Abimelek
  lexicon: HALOT
  rationale: Proper name transliterated according to standard English convention,
    following the translation philosophy to transliterate names.
