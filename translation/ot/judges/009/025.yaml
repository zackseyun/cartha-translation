id: JDG.9.25
reference: Judges 9:25
source:
  edition: WLC
  text: וַ/יָּשִׂ֣ימוּ ל/וֹ֩ בַעֲלֵ֨י שְׁכֶ֜ם מְאָרְבִ֗ים עַ֚ל רָאשֵׁ֣י הֶ/הָרִ֔ים
    וַ/יִּגְזְל֗וּ אֵ֛ת כָּל אֲשֶׁר יַעֲבֹ֥ר עֲלֵי/הֶ֖ם בַּ/דָּ֑רֶךְ וַ/יֻּגַּ֖ד לַ/אֲבִימֶֽלֶךְ־־׃פ
translation:
  text: Then the leaders of Shechem set men in ambush for him on the hilltops, and
    they robbed everyone who passed by them on the road; and it was reported to Abimelech.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the citizens of Shechem' or 'the lords of Shechem.' The Hebrew expression
      literally means 'the בעלי of Shechem' and can denote the city's leading men
      or power-holders.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַעֲלֵי שְׁכֶם
  chosen: the leaders of Shechem
  alternatives:
  - the citizens of Shechem
  - the lords of Shechem
  - the men of Shechem
  lexicon: HALOT
  rationale: בַּעֲלֵי literally means 'owners/masters/lords of,' but in this civic-political
    context it refers to the leading men or power-holders of the city. 'Leaders of
    Shechem' communicates the social-political sense in natural English without implying
    feudal lordship.
- source_word: וַיָּשִׂימוּ לוֹ
  chosen: set men in ambush for him
  alternatives:
  - stationed ambushers against him
  - set ambushers for him
  lexicon: HALOT
  rationale: The verb שׂים with indirect object plus the participle מְאָרְבִים yields
    the idiom of placing/setting an ambush against someone. Supplying 'men' makes
    the English idiomatic and reflects the participial plural.
- source_word: מְאָרְבִים
  chosen: men in ambush
  alternatives:
  - ambushers
  - those lying in wait
  lexicon: HALOT
  rationale: The participle from ארב denotes persons lying in wait. 'Men in ambush'
    is clear modern English and preserves the personal force better than the abstract
    'an ambush.'
- source_word: עַל רָאשֵׁי הֶהָרִים
  chosen: on the hilltops
  alternatives:
  - on the tops of the mountains
  - on the mountain heights
  lexicon: HALOT
  rationale: Literally 'on the heads of the mountains/hills.' In this local narrative
    setting, 'hilltops' is a natural rendering that preserves the elevated vantage
    point without sounding wooden.
- source_word: וַיִּגְזְלוּ
  chosen: they robbed
  alternatives:
  - they plundered
  - they raided
  lexicon: HALOT
  rationale: גזל commonly denotes seizing by violence or robbery. 'Robbed' fits the
    immediate object of travelers on the road better than the broader 'plundered.'
- source_word: אֵת כָּל אֲשֶׁר יַעֲבֹר עֲלֵיהֶם
  chosen: everyone who passed by them
  alternatives:
  - all who passed by them
  - everyone who came past them
  lexicon: HALOT
  rationale: 'The singular verb after כָּל has a distributive sense: each person who
    passed. ''Everyone who passed by them'' captures the collective-distributive force
    in idiomatic English.'
- source_word: בַּדָּרֶךְ
  chosen: on the road
  alternatives:
  - along the way
  - on the الطريق
  lexicon: HALOT
  rationale: The definite noun means the roadway/path used by travelers. 'On the road'
    is the most natural contextual rendering.
- source_word: וַיֻּגַּד לַאֲבִימֶלֶךְ
  chosen: it was reported to Abimelech
  alternatives:
  - Abimelech was told
  - word was brought to Abimelech
  lexicon: HALOT
  rationale: The passive/Hophal of נגד leaves the reporter unspecified. 'It was reported
    to Abimelech' preserves the impersonal passive and the narrative flow.
