id: JDG.9.57
reference: Judges 9:57
source:
  edition: WLC
  text: וְ/אֵ֗ת כָּל רָעַת֙ אַנְשֵׁ֣י שְׁכֶ֔ם הֵשִׁ֥יב אֱלֹהִ֖ים בְּ/רֹאשָׁ֑/ם וַ/תָּבֹ֣א
    אֲלֵי/הֶ֔ם קִֽלֲלַ֖ת יוֹתָ֥ם בֶּן יְרֻבָּֽעַל־־׃פ
translation:
  text: And God repaid all the evil of the men of Shechem on their own heads, and
    the curse of Jotham son of Jerubbaal came upon them.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: הֵשִׁיב
  chosen: repaid
  alternatives:
  - brought back
  - returned
  lexicon: HALOT
  rationale: 'In the Hiphil of שוב with evil as object and ''on their head'' as complement,
    the sense is causative recompense: God caused their evil to return upon them.
    ''Repaid'' communicates judicial retribution naturally in English without over-paraphrase.'
- source_word: רָעַת
  chosen: evil
  alternatives:
  - wickedness
  - harm
  lexicon: HALOT
  rationale: רעה here denotes moral evil done by the men of Shechem, not merely misfortune.
    'Evil' preserves both the ethical force and the narrative's retributive logic.
- source_word: בְּרֹאשָׁם
  chosen: on their own heads
  alternatives:
  - upon their heads
  - back on their heads
  lexicon: HALOT
  rationale: This idiom expresses consequences returning to the perpetrators themselves.
    'On their own heads' preserves the Hebrew image and clarifies reflexive force
    in idiomatic English.
- source_word: קִלֲלַת
  chosen: the curse
  alternatives:
  - the cursing
  - the imprecation
  lexicon: HALOT
  rationale: The noun refers to Jotham's spoken curse earlier in the chapter. 'The
    curse' is the most natural and contextually precise rendering.
- source_word: וַתָּבֹא אֲלֵיהֶם
  chosen: came upon them
  alternatives:
  - came to them
  - fell on them
  lexicon: HALOT
  rationale: This is standard judgment language indicating that the curse took effect
    against them. 'Came upon them' preserves the movement metaphor and the sense of
    realized judgment.
- source_word: אַנְשֵׁי שְׁכֶם
  chosen: the men of Shechem
  alternatives:
  - the people of Shechem
  - the leaders of Shechem
  lexicon: HALOT
  rationale: The Hebrew is specifically 'men of Shechem.' While the phrase may function
    corporately, the source is grammatically masculine and should be rendered gender-accurately
    per project philosophy.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here אֱלֹהִים clearly takes a singular verb and refers to the God of
    Israel acting in judgment, so 'God' is the straightforward rendering.
- source_word: יוֹתָם בֶּן יְרֻבָּעַל
  chosen: Jotham son of Jerubbaal
  alternatives:
  - Jotham, the son of Jerubbaal
  rationale: Personal names are transliterated by project policy. The filial expression
    is retained straightforwardly to preserve the narrative identification.
