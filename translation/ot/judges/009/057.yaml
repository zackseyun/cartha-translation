theological_decisions:
- issue: Divine retribution language
  chosen_reading: God actively repaid the evil of the men of Shechem on their own
    heads.
  alternative_readings:
  - God allowed their evil to return on them
  rationale: The Hebrew presents God as the grammatical subject of הֵשִׁיב, indicating
    active divine judgment in the narrative. The translation should preserve that
    agency rather than soften it into mere permission.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
