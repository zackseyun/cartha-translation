id: JDG.9.15
reference: Judges 9:15
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר הָ/אָטָד֮ אֶל הָ/עֵצִים֒ אִ֡ם בֶּ/אֱמֶ֣ת אַתֶּם֩ מֹשְׁחִ֨ים אֹתִ֤/י
    לְ/מֶ֨לֶךְ֙ עֲלֵי/כֶ֔ם בֹּ֖אוּ חֲס֣וּ בְ/צִלִּ֑/י וְ/אִם אַ֕יִן תֵּ֤צֵא אֵשׁ֙
    מִן הָ֣/אָטָ֔ד וְ/תֹאכַ֖ל אֶת אַרְזֵ֥י הַ/לְּבָנֽוֹן־־־־׃
translation:
  text: Then the bramble said to the trees, ‘If you are truly anointing me as king
    over you, come, take refuge in my shade; but if not, let fire come out from the
    bramble and consume the cedars of Lebanon.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the thornbush.' The Hebrew אָטָד refers to a thorny shrub; 'bramble'
      is a natural English rendering in this fable context.
    reason: lexical_alternative
  - marker: b
    text: '''Take refuge'' can also be rendered ''seek shelter.'' The wording may
      carry ironic force, since a bramble offers little real shade.'
    reason: lexical_alternative
  - marker: c
    text: Or 'fire will come out from the bramble.' The Hebrew verb may be understood
      as a jussive-like wish or as a predictive statement.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאָטָד
  chosen: the bramble
  alternatives:
  - the thornbush
  - the buckthorn
  lexicon: HALOT
  rationale: אָטָד denotes a thorny bush/shrub. 'Bramble' is idiomatic, vivid English
    for Jotham's fable and fits the contrast with noble trees better than the more
    technical 'buckthorn.'
- source_word: אִם בֶּאֱמֶת
  chosen: If you are truly
  alternatives:
  - If in truth
  - If really
  lexicon: HALOT
  rationale: The phrase expresses sincerity or genuineness. 'Truly' preserves the
    conditional challenge in natural English.
- source_word: מֹשְׁחִים אֹתִי לְמֶלֶךְ
  chosen: anointing me as king
  alternatives:
  - making me king
  - appointing me king
  lexicon: HALOT
  rationale: משׁח is specifically 'anoint,' an important political/royal verb in Hebrew.
    Retaining 'anointing' preserves the source image rather than flattening it to
    mere appointment.
- source_word: עֲלֵיכֶם
  chosen: over you
  alternatives:
  - upon you
  lexicon: HALOT
  rationale: In royal context עַל commonly marks rule or authority over subjects;
    'over you' is the natural English equivalent.
- source_word: בֹּאוּ חֲסוּ
  chosen: come, take refuge
  alternatives:
  - come, seek shelter
  - come, trust
  lexicon: HALOT
  rationale: The paired imperatives invite approach and protection. חסה often means
    seeking refuge/protection, not merely physical shelter, so 'take refuge' best
    captures the force.
- source_word: בְצִלִּי
  chosen: in my shade
  alternatives:
  - in my shadow
  lexicon: HALOT
  rationale: צל literally means shade/shadow. 'Shade' is more idiomatic in the context
    of trees and preserves the irony that a bramble offers negligible protection.
- source_word: וְאִם אַיִן
  chosen: but if not
  alternatives:
  - and if not
  - otherwise if there is not
  lexicon: HALOT
  rationale: This introduces the contrary outcome of the condition. 'But if not' communicates
    the adversative turn clearly in English.
- source_word: תֵּצֵא אֵשׁ מִן הָאָטָד
  chosen: let fire come out from the bramble
  alternatives:
  - fire will come out from the bramble
  lexicon: HALOT
  rationale: The imperfect here functions jussively in the curse-like apodosis. 'Let
    fire come out' preserves the volitional force better than a simple future.
- source_word: וְתֹאכַל
  chosen: and consume
  alternatives:
  - and devour
  - and eat up
  lexicon: HALOT
  rationale: אכל with fire is a common idiom for consuming by burning. 'Consume' is
    natural and suitably elevated without being archaic.
- source_word: אַרְזֵי הַלְּבָנוֹן
  chosen: the cedars of Lebanon
  alternatives:
  - Lebanon's cedars
  lexicon: HALOT
  rationale: A standard phrase for the majestic cedars associated with Lebanon. The
    traditional order is clear and preserves the literary resonance.
