id: JDG.9.31
reference: Judges 9:31
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֧ח מַלְאָכִ֛ים אֶל אֲבִימֶ֖לֶךְ בְּ/תָרְמָ֣ה לֵ/אמֹ֑ר הִנֵּה֩ גַ֨עַל
    בֶּן עֶ֤בֶד וְ/אֶחָי/ו֙ בָּאִ֣ים שְׁכֶ֔מָ/ה וְ/הִנָּ֛/ם צָרִ֥ים אֶת הָ/עִ֖יר עָלֶֽי/ךָ־־־׃
translation:
  text: And he sent messengers to Abimelek secretly, saying, “Look, Gaal son of Ebed
    and his brothers have come to Shechem, and look, they are stirring up the city
    against you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “they are making the city hostile to you.” The Hebrew verb here is difficult;
      some understand it more literally as “they are besieging the city,” but in context
      the sense is more likely that Gaal and his group are inciting Shechem against
      Abimelek.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: And he sent
  alternatives:
  - Then he sent
  lexicon: HALOT
  rationale: Wayyiqtol narrative form is naturally rendered as a simple past in English.
    'And he sent' preserves the Hebrew narrative flow without overloading the conjunction.
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - envoys
  lexicon: HALOT
  rationale: In this political/military context the term refers to human agents carrying
    a message, not angels. 'Messengers' is the most direct and natural rendering.
- source_word: בְּתָרְמָה
  chosen: secretly
  alternatives:
  - in secret
  - deceitfully
  - with cunning
  lexicon: HALOT
  rationale: The phrase indicates covert or deceptive action in sending the message.
    'Secretly' communicates the adverbial force clearly in modern English. Because
    the context is clandestine communication, 'secretly' fits better than the more
    morally loaded 'deceitfully,' while still preserving the covert sense.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard introduction to direct speech; 'saying' is idiomatic in English
    narrative.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Used to draw attention to the report. 'Look' preserves the discourse
    force in readable modern English better than the archaic 'Behold.'
- source_word: גַעַל בֶּן עֶבֶד
  chosen: Gaal son of Ebed
  alternatives:
  - Gaal the son of Ebed
  lexicon: HALOT
  rationale: Personal names are transliterated; the filial construction is rendered
    straightforwardly as 'son of.'
- source_word: וְאֶחָיו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'his brothers.' In narrative context this
    may denote literal brothers or close male kin/allies, but the translation should
    preserve the source term rather than generalize.
- source_word: בָּאִים שְׁכֶמָה
  chosen: have come to Shechem
  alternatives:
  - are coming to Shechem
  - have arrived at Shechem
  lexicon: HALOT
  rationale: The participle with directional ending can be rendered as present or
    present-perfect depending on discourse context. Given the following report about
    their current activity in the city, 'have come to Shechem' best conveys their
    arrival with present relevance.
- source_word: וְהִנָּם
  chosen: and look, they are
  alternatives:
  - and behold, they are
  - and indeed they are
  lexicon: HALOT
  rationale: This resumes the attention-getting particle with pronominal suffix. Rendering
    it as 'and look' preserves the emphatic report structure.
- source_word: צָרִים אֶת הָעִיר עָלֶיךָ
  chosen: they are stirring up the city against you
  alternatives:
  - they are besieging the city against you
  - they are making the city hostile to you
  - they are pressing the city into action against you
  lexicon: HALOT
  rationale: The verb from צור in this context is difficult. Since the object is 'the
    city' and the phrase ends 'against you,' the sense is not that they are besieging
    the city, but that they are constraining, agitating, or inciting the city against
    Abimelek. 'Stirring up the city against you' best fits the syntax and context
    of political revolt.
