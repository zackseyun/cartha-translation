id: JDG.9.33
reference: Judges 9:33
source:
  edition: WLC
  text: וְ/הָיָ֤ה בַ/בֹּ֨קֶר֙ כִּ/זְרֹ֣חַ הַ/שֶּׁ֔מֶשׁ תַּשְׁכִּ֖ים וּ/פָשַׁטְתָּ֣
    עַל הָ/עִ֑יר וְ/הִנֵּה ה֞וּא וְ/הָ/עָ֤ם אֲשֶׁר אִתּ/וֹ֙ יֹצְאִ֣ים אֵלֶ֔י/ךָ וְ/עָשִׂ֣יתָ
    לּ֔/וֹ כַּ/אֲשֶׁ֖ר תִּמְצָ֥א יָדֶֽ/ךָ־־־׃ס
translation:
  text: Then in the morning, as soon as the sun rises, you must get up early and spread
    out against the city. And look, when he and the people who are with him come out
    against you, you shall do to him as your hand finds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew idiom: ''as your hand finds,'' meaning according to what is within
      your power or opportunity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: Then
  alternatives:
  - And it shall be
  - And it will happen
  lexicon: HALOT
  rationale: Here the clause-initial וְהָיָה functions idiomatically to advance the
    instructions rather than to emphasize mere existence. 'Then' gives natural English
    sequence while preserving the directive force.
- source_word: בַבֹּקֶר
  chosen: in the morning
  alternatives:
  - in the morning time
  - at morning
  lexicon: HALOT
  rationale: Standard temporal expression; 'in the morning' is the natural English
    equivalent.
- source_word: כִּזְרֹחַ הַשֶּׁמֶשׁ
  chosen: as soon as the sun rises
  alternatives:
  - when the sun rises
  - at the rising of the sun
  lexicon: HALOT
  rationale: The infinitive construct with כ marks time. 'As soon as the sun rises'
    captures the immediacy implied in the military instruction.
- source_word: תַּשְׁכִּים
  chosen: you must get up early
  alternatives:
  - you shall rise early
  - you will rise early
  lexicon: HALOT
  rationale: Hiphil of שכם means to rise early/start early. In context of commands
    within a battle plan, 'you must get up early' conveys imperative force in idiomatic
    English.
- source_word: וּפָשַׁטְתָּ עַל הָעִיר
  chosen: and spread out against the city
  alternatives:
  - and rush upon the city
  - and deploy against the city
  - and attack the city
  lexicon: HALOT
  rationale: פשט in military contexts can mean to spread out, raid, or make an attack.
    'Spread out against' preserves the image of advancing/deploying against the city
    without over-specifying the manner beyond the Hebrew.
- source_word: וְהִנֵּה
  chosen: And look
  alternatives:
  - And behold
  - Then look
  - Now look
  lexicon: HALOT
  rationale: Discourse marker drawing attention to the next development. 'And look'
    is readable modern English and preserves the deictic force better than omitting
    it.
- source_word: הוּא וְהָעָם אֲשֶׁר אִתּוֹ
  chosen: he and the people who are with him
  alternatives:
  - he and the troops with him
  - he and the men who are with him
  lexicon: HALOT
  rationale: עָם here refers to the group accompanying him. 'People' is broad and
    textually safe; 'troops' would sharpen the military nuance but is slightly more
    interpretive.
- source_word: יֹצְאִים אֵלֶיךָ
  chosen: come out against you
  alternatives:
  - come out to you
  - are coming out toward you
  lexicon: HALOT
  rationale: Although אֶל can be directional ('to/toward'), in battle context 'come
    out against you' best reflects the hostile movement implied by the scene.
- source_word: וְעָשִׂיתָ לּוֹ
  chosen: you shall do to him
  alternatives:
  - you shall deal with him
  - you shall do to them
  lexicon: HALOT
  rationale: The singular pronominal suffix refers primarily to the leader, though
    it may stand representatively for his force. 'Do to him' follows the Hebrew directly.
- source_word: כַּאֲשֶׁר תִּמְצָא יָדֶךָ
  chosen: as your hand finds
  alternatives:
  - as your hand is able
  - whatever your hand finds to do
  - as opportunity allows
  lexicon: HALOT
  rationale: This Hebrew idiom refers to what is within one's power or opportunity.
    A relatively literal rendering is retained in the main text for transparency,
    since the idiom remains understandable in English though slightly foreign.
