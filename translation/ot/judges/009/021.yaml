id: JDG.9.21
reference: Judges 9:21
source:
  edition: WLC
  text: וַ/יָּ֣נָס יוֹתָ֔ם וַ/יִּבְרַ֖ח וַ/יֵּ֣לֶךְ בְּאֵ֑רָ/ה וַ/יֵּ֣שֶׁב שָׁ֔ם מִ/פְּנֵ֖י
    אֲבִימֶ֥לֶךְ אָחִֽי/ו׃פ
translation:
  text: Then Jotham fled and escaped and went to Beer, and he lived there because
    of Abimelech his brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Beerah.' The Hebrew place name בְּאֵרָה may be represented in English
      either as 'Beer' or 'Beerah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּנָס
  chosen: fled
  alternatives:
  - ran away
  lexicon: HALOT
  rationale: From נוס, denoting flight from danger. 'Fled' is concise and idiomatic
    in narrative English.
- source_word: וַיִּבְרַח
  chosen: escaped
  alternatives:
  - fled
  - ran away
  lexicon: HALOT
  rationale: From ברח, also involving flight. Since two near-synonymous verbs are
    used in sequence, varying the English as 'fled and escaped' preserves the rhetorical
    doubling without sounding awkwardly repetitive in English.
- source_word: בְּאֵרָה
  chosen: Beer
  alternatives:
  - Beerah
  lexicon: HALOT
  rationale: A place name, so transliterated per project philosophy. 'Beer' reflects
    the consonantal form directly; 'Beerah' is a possible fuller anglicization but
    is less standard from the given form.
- source_word: וַיֵּשֶׁב שָׁם
  chosen: he lived there
  alternatives:
  - he stayed there
  - he dwelt there
  lexicon: HALOT
  rationale: ישב commonly means to sit, remain, dwell, or live. In this narrative
    context, 'lived there' communicates settled residence in natural modern English
    better than the more formal 'dwelt there'.
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - from before
  - away from
  - for fear of
  lexicon: HALOT
  rationale: 'Literally ''from the face/presence of,'' but in context it expresses
    the reason for his residence there: he was away because of Abimelech. ''Because
    of'' is clear and idiomatic while preserving the causal force.'
- source_word: אָחִיו
  chosen: his brother
  lexicon: HALOT
  rationale: Straightforward kinship term with 3ms suffix. Retained explicitly to
    preserve the familial relationship that heightens the narrative tension.
