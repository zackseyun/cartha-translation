id: JDG.9.50
reference: Judges 9:50
source:
  edition: WLC
  text: וַ/יֵּ֥לֶךְ אֲבִימֶ֖לֶךְ אֶל תֵּבֵ֑ץ וַ/יִּ֥חַן בְּ/תֵבֵ֖ץ וַֽ/יִּלְכְּדָֽ/הּ־׃
translation:
  text: Then Abimelech went to Thebez, camped against Thebez, and captured it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'encamped in Thebez'; the Hebrew preposition can be rendered more literally
      that way, but in this military context it likely means he set camp against the
      city.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - marched
  - proceeded
  lexicon: HALOT
  rationale: The verb הלך in the wayyiqtol narrative sequence is most naturally rendered
    'went.' 'Marched' would add military color not explicit in the verb itself, though
    the context is military.
- source_word: אֲבִימֶלֶךְ
  chosen: Abimelech
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: אֶל
  chosen: to
  alternatives:
  - against
  lexicon: HALOT
  rationale: The preposition אֶל primarily marks movement toward a place, so 'to'
    best reflects the source here. The hostile sense is conveyed later by the siege
    verb and context.
- source_word: תֵּבֵץ
  chosen: Thebez
  alternatives:
  - Tebez
  rationale: Standard English transliteration of the place name. 'Thebez' is the more
    familiar conventional form.
- source_word: וַיִּחַן
  chosen: camped against
  alternatives:
  - encamped in
  - camped at
  lexicon: HALOT
  rationale: חנה means to camp/encamp. Because it is followed by בְּ with a city in
    a military context, English idiom 'camped against' communicates siege posture
    more clearly than the more wooden 'camped in,' while remaining faithful to the
    narrative sense.
- source_word: בְּתֵבֵץ
  chosen: against Thebez
  alternatives:
  - in Thebez
  - at Thebez
  lexicon: HALOT
  rationale: Although בְּ often means 'in,' with חנה in siege contexts it can denote
    encamping at or against a city. 'Against Thebez' fits the immediate military action
    and prepares for the capture that follows.
- source_word: וַיִּלְכְּדָהּ
  chosen: captured it
  alternatives:
  - took it
  - seized it
  lexicon: HALOT
  rationale: לכד commonly means to capture or seize, especially of taking a city.
    'Captured it' is clear modern English and preserves the military sense. The feminine
    suffix refers back to the city, Thebez.
