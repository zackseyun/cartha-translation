id: JDG.9.2
reference: Judges 9:2
source:
  edition: WLC
  text: דַּבְּרוּ נָ֞א בְּ/אָזְנֵ֨י כָל בַּעֲלֵ֣י שְׁכֶם֮ מַה טּ֣וֹב לָ/כֶם֒ הַ/מְשֹׁ֨ל
    בָּ/כֶ֜ם שִׁבְעִ֣ים אִ֗ישׁ כֹּ֚ל בְּנֵ֣י יְרֻבַּ֔עַל אִם מְשֹׁ֥ל בָּ/כֶ֖ם אִ֣ישׁ
    אֶחָ֑ד וּ/זְכַרְתֶּ֕ם כִּֽי עַצְמֵ/כֶם וּ/בְשַׂרְ/כֶ֖ם אָנִֽי־־־־־׃
translation:
  text: 'Please speak in the hearing of all the leaders of Shechem: Which is better
    for you—that seventy men, all the sons of Jerubbaal, rule over you, or that one
    man rule over you? And remember that I am your bone and your flesh.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew idiom: ''your bone and your flesh,'' meaning ''your own flesh and
      blood'' or close kin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבְּרוּ נָא
  chosen: Please speak
  alternatives:
  - Speak, please
  - Say, please
  lexicon: HALOT
  rationale: Imperative plural of דבר with particle נָא expressing request/entreaty.
    'Please speak' gives the polite urging naturally in English without overformal
    wording.
- source_word: בְּאָזְנֵי
  chosen: in the hearing of
  alternatives:
  - in the ears of
  - to
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression meaning to address someone so they hear.
    'In the hearing of' preserves the public-address nuance better than the more literal
    but awkward 'in the ears of.'
- source_word: בַּעֲלֵי שְׁכֶם
  chosen: the leaders of Shechem
  alternatives:
  - the lords of Shechem
  - the citizens of Shechem
  - the masters of Shechem
  lexicon: HALOT
  rationale: בַּעֲלֵי can denote owners, masters, or leading men depending on context.
    Here it refers to the influential men/civic authorities of Shechem, so 'leaders'
    best captures the social-political sense in readable English.
- source_word: מַה טּוֹב לָכֶם
  chosen: Which is better for you
  alternatives:
  - What is good for you
  - What is better for you
  lexicon: HALOT
  rationale: Comparative sense is implied by the following alternatives. 'Which is
    better for you' makes the rhetorical comparison explicit in idiomatic English.
- source_word: המשל בכם ... אם משל בכם
  chosen: rule over you ... rule over you
  alternatives:
  - govern you
  - have dominion over you
  lexicon: HALOT
  rationale: The infinitive/verb from משל in this political context refers to exercising
    rule. 'Rule over' is straightforward and preserves the repeated Hebrew wording.
- source_word: שִׁבְעִים אִישׁ כֹּל בְּנֵי יְרֻבַּעַל
  chosen: seventy men, all the sons of Jerubbaal
  alternatives:
  - seventy men—all the sons of Jerubbaal
  - seventy persons, all Jerubbaal's sons
  lexicon: HALOT
  rationale: אִישׁ after a number is idiomatic for counting men. 'Men' is gender-accurate
    and contextually specific, since these are Gideon's sons.
- source_word: אִם
  chosen: or
  alternatives:
  - whether
  - if
  lexicon: HALOT
  rationale: In this disjunctive question, אִם introduces the second option. English
    'or' best conveys the contrast.
- source_word: אִישׁ אֶחָד
  chosen: one man
  alternatives:
  - a single man
  - one person
  lexicon: HALOT
  rationale: Gender-accurate singular in contrast to 'seventy men.' 'One man' is concise
    and preserves the rhetorical force.
- source_word: וּזְכַרְתֶּם
  chosen: And remember
  alternatives:
  - And keep in mind
  - And recall
  lexicon: HALOT
  rationale: Direct imperative-like force in context, though formally perfect with
    waw. 'Remember' is the standard and suitably weighty rendering.
- source_word: עַצְמֵכֶם וּבְשַׂרְכֶם
  chosen: your bone and your flesh
  alternatives:
  - your own bone and flesh
  - your kin
  lexicon: HALOT
  rationale: This kinship idiom expresses blood relation/close familial identity.
    The singulars 'bone' and 'flesh' reflect the Hebrew forms and preserve the idiom;
    a footnote can clarify the sense.
- source_word: אָנִי
  chosen: I am
  alternatives:
  - I myself am
  lexicon: HALOT
  rationale: Independent pronoun adds emphasis, but standard English can convey this
    adequately with simple word order in this context.
