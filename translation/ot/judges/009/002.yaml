theological_decisions:
- issue: Kinship idiom and potential over-interpretation
  chosen_reading: Retain the concrete idiom 'your bone and your flesh' in the main
    text
  alternative_readings:
  - I am your own flesh and blood
  - I am your kinsman
  rationale: The phrase is not a doctrinally contested term, but it carries relational
    significance. Preserving the idiom avoids flattening the Hebrew into mere paraphrase
    while a footnote can explain the meaning as kinship.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Gendered language in counting Jerubbaal's offspring
  chosen_reading: Use 'seventy men' and 'one man'
  alternative_readings:
  - seventy persons ... one person
  rationale: The Hebrew uses אִישׁ in a context referring specifically to Jerubbaal's
    sons and to Abimelech himself. This should remain gender-accurate rather than
    neutralized.
  doctrine_reference: Translation philosophy §4
