id: JDG.9.3
reference: Judges 9:3
source:
  edition: WLC
  text: וַ/יְדַבְּר֨וּ אֲחֵֽי אִמּ֜/וֹ עָלָ֗י/ו בְּ/אָזְנֵי֙ כָּל בַּעֲלֵ֣י שְׁכֶ֔ם
    אֵ֥ת כָּל הַ/דְּבָרִ֖ים הָ/אֵ֑לֶּה וַ/יֵּ֤ט לִבָּ/ם֙ אַחֲרֵ֣י אֲבִימֶ֔לֶךְ כִּ֥י
    אָמְר֖וּ אָחִ֥י/נוּ הֽוּא־־־׃
translation:
  text: And his mother’s brothers spoke all these words about him in the hearing of
    all the leaders of Shechem, and their hearts turned after Abimelech, for they
    said, “He is our brother.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “all the lords of Shechem” or “all the leading men of Shechem.” The Hebrew
      expression refers to the influential men of the city.
    reason: lexical_alternative
  - marker: b
    text: Or “all these things.” The Hebrew word can mean either spoken words or matters/events,
      but here likely points to the proposal just reported.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבְּרוּ
  chosen: spoke
  alternatives:
  - said
  - spoke of
  lexicon: HALOT
  rationale: Common narrative use of דבר in the piel with direct object of 'words';
    'spoke' is natural English and preserves the verbal action without over-specifying
    manner.
- source_word: אֲחֵי אִמּוֹ
  chosen: his mother’s brothers
  alternatives:
  - his maternal brothers
  - his mother’s kinsmen
  lexicon: HALOT
  rationale: The construct phrase refers specifically to male siblings of his mother,
    not a broader kin group. 'His mother’s brothers' is gender-accurate and clear.
- source_word: עָלָיו
  chosen: about him
  alternatives:
  - concerning him
  - on his behalf
  lexicon: HALOT
  rationale: In this context the preposition with דבר indicates speaking concerning
    Abimelech to persuade the Shechemites. 'About him' best fits the discourse context;
    'on his behalf' is possible but more interpretive.
- source_word: בְּאָזְנֵי
  chosen: in the hearing of
  alternatives:
  - to
  - before
  lexicon: HALOT
  rationale: Literally 'in the ears of'; the idiom means something spoken so as to
    be heard by an audience. 'In the hearing of' preserves the idiomatic force with
    good English style.
- source_word: כָּל בַּעֲלֵי שְׁכֶם
  chosen: all the leaders of Shechem
  alternatives:
  - all the lords of Shechem
  - all the citizens of Shechem
  - all the men of Shechem
  lexicon: HALOT
  rationale: בעלי can denote masters, owners, or leading men. In this political setting
    it refers to the influential men/civic leaders of Shechem rather than every inhabitant.
    'Leaders' communicates the social-political role clearly.
- source_word: אֵת כָּל הַדְּבָרִים הָאֵלֶּה
  chosen: all these words
  alternatives:
  - all these things
  - all these matters
  lexicon: HALOT
  rationale: Though דברים can mean 'things/matters,' here it points back to Abimelech's
    proposal in the previous verse as reported speech. 'All these words' keeps the
    verbal connection and remains idiomatic enough.
- source_word: וַיֵּט לִבָּם
  chosen: their hearts turned
  alternatives:
  - their heart inclined
  - he turned their hearts
  lexicon: HALOT
  rationale: The singular verb with collective subject/object idiomatically expresses
    the inclination of the Shechemites' inner disposition. English pluralizes naturally
    as 'their hearts turned.' This avoids forcing a causative subject not explicit
    in translation.
- source_word: אַחֲרֵי אֲבִימֶלֶךְ
  chosen: after Abimelech
  alternatives:
  - to follow Abimelech
  - toward Abimelech
  lexicon: HALOT
  rationale: '''After'' preserves the Hebrew metaphor of allegiance or following.
    It is understandable in English in this context, especially with ''turned after
    Abimelech.'''
- source_word: כִּי אָמְרוּ
  chosen: for they said
  alternatives:
  - because they said
  lexicon: HALOT
  rationale: כִּי here introduces the reason for their support. 'For' is concise and
    fits narrative explanation.
- source_word: אָחִינוּ הוּא
  chosen: He is our brother
  alternatives:
  - He is one of our brothers
  - He is our kinsman
  lexicon: HALOT
  rationale: The statement appeals to kinship with Abimelech through his Shechemite
    mother. 'Brother' is the direct lexical equivalent and preserves the rhetoric
    of clan solidarity; broader 'kinsman' is possible but less exact.
