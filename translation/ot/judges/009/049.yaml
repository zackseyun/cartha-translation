id: JDG.9.49
reference: Judges 9:49
source:
  edition: WLC
  text: וַ/יִּכְרְת֨וּ גַם כָּל הָ/עָ֜ם אִ֣ישׁ שׂוֹכֹ֗/ה וַ/יֵּ֨לְכ֜וּ אַחֲרֵ֤י אֲבִימֶ֨לֶךְ֙
    וַ/יָּשִׂ֣ימוּ עַֽל הַ/צְּרִ֔יחַ וַ/יַּצִּ֧יתוּ עֲלֵי/הֶ֛ם אֶֽת הַ/צְּרִ֖יחַ בָּ/אֵ֑שׁ
    וַ/יָּמֻ֜תוּ גַּ֣ם כָּל אַנְשֵׁ֧י מִֽגְדַּל שְׁכֶ֛ם כְּ/אֶ֖לֶף אִ֥ישׁ וְ/אִשָּֽׁה־־־־־־׃פ
translation:
  text: So all the people also cut each man his branch, and they went after Abimelek
    and piled them against the inner chamber, and set the inner chamber on fire over
    them, so that all the men of the tower of Shechem also died, about a thousand
    men and women.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stronghold' for 'inner chamber'; the Hebrew term likely refers to the
      enclosed refuge within the tower rather than the tower itself.
    reason: lexical_alternative
  - marker: b
    text: Literally 'each man his branch.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכְרְתוּ
  chosen: cut
  alternatives:
  - cut down
  - chopped off
  lexicon: HALOT
  rationale: כרת in this context refers to cutting off branches from trees, not covenant-cutting
    or extermination. 'Cut' is concise and natural in English.
- source_word: אִישׁ שׂוֹכֹה
  chosen: each man his branch
  alternatives:
  - each one his bough
  - each man his bundle of branches
  lexicon: HALOT
  rationale: The idiom literally reads 'a man his branch.' Retaining 'each man his
    branch' preserves the distributive force and the singular noun while remaining
    understandable. 'Branch' fits שׂוֹךְ/שׂוֹכָה here better than the more interpretive
    'bundle.'
- source_word: וַיֵּלְכוּ אַחֲרֵי אֲבִימֶלֶךְ
  chosen: they went after Abimelek
  alternatives:
  - they followed Abimelek
  lexicon: HALOT
  rationale: The Hebrew is literally 'went after.' In military-narrative context this
    means following his lead. 'Went after' preserves the concrete imagery while remaining
    idiomatic.
- source_word: הַצְּרִיחַ
  chosen: the inner chamber
  alternatives:
  - the stronghold
  - the vault
  - the chamber
  lexicon: HALOT
  rationale: In the immediate context of Judges 9, this term denotes the enclosed
    inner part/refuge of the tower-fortification rather than the tower as a whole.
    'Inner chamber' best distinguishes it from מִגְדַּל ('tower') later in the verse
    and matches the narrative setting of people sheltering inside.
- source_word: וַיָּשִׂימוּ עַל הַצְּרִיחַ
  chosen: piled them against the inner chamber
  alternatives:
  - placed them on the inner chamber
  - put them against the vault
  lexicon: HALOT
  rationale: Although עַל often means 'on,' in this siege/burning context English
    'against' better conveys placing the cut branches onto/against the structure in
    preparation for burning. 'Piled' makes explicit the collective action implied
    by the plural object from context.
- source_word: וַיַּצִּיתוּ עֲלֵיהֶם אֶת הַצְּרִיחַ בָּאֵשׁ
  chosen: set the inner chamber on fire over them
  alternatives:
  - burned the inner chamber above them
  - set the chamber on fire around them
  lexicon: HALOT
  rationale: The phrase indicates that the structure/refuge was ignited while the
    people were beneath/inside it. 'Over them' preserves the spatial force of עֲלֵיהֶם
    without overinterpreting.
- source_word: אַנְשֵׁי מִגְדַּל שְׁכֶם
  chosen: the men of the tower of Shechem
  alternatives:
  - the people of the tower of Shechem
  - the lords of the tower of Shechem
  lexicon: HALOT
  rationale: אַנְשֵׁי is formally masculine plural and here likely refers to the inhabitants/defenders
    associated with the tower. Because the verse then explicitly adds 'men and women,'
    rendering the phrase as 'men of the tower of Shechem' preserves the source wording
    and avoids flattening the gendered expression.
- source_word: כְּאֶלֶף
  chosen: about a thousand
  alternatives:
  - approximately a thousand
  - some thousand
  lexicon: HALOT
  rationale: The prefixed כ marks approximation/comparison here. 'About a thousand'
    is the most natural English rendering.
- source_word: אִישׁ וְאִשָּׁה
  chosen: men and women
  alternatives:
  - male and female
  lexicon: HALOT
  rationale: This idiom counts both sexes among the dead. 'Men and women' is natural
    modern English and preserves the distinction.
