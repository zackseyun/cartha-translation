id: JDG.9.41
reference: Judges 9:41
source:
  edition: WLC
  text: וַ/יֵּ֥שֶׁב אֲבִימֶ֖לֶךְ בָּ/ארוּמָ֑ה וַ/יְגָ֧רֶשׁ זְבֻ֛ל אֶת גַּ֥עַל וְ/אֶת
    אֶחָ֖י/ו מִ/שֶּׁ֥בֶת בִּ/שְׁכֶֽם־־׃
translation:
  text: And Abimelech stayed in Arumah, and Zebul drove Ga'al and his brothers out
    from living in Shechem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'drove Ga'al and his brothers out so that they could not dwell in Shechem.'
      The Hebrew infinitive construction expresses exclusion from residing there.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  chosen: stayed
  alternatives:
  - remained
  - dwelt
  - lived
  lexicon: HALOT
  rationale: The verb ישׁב commonly means 'sit, dwell, remain.' In this narrative
    context, after military action, 'stayed' naturally conveys that Abimelech took
    up position or remained in Arumah without sounding overly wooden. 'Dwelt' is too
    formal here, and 'lived' may imply long-term residence more strongly than the
    immediate context requires.
- source_word: בָּארוּמָה
  chosen: in Arumah
  alternatives:
  - at Arumah
  rationale: This is a place name, so it is transliterated rather than translated,
    per project policy. 'In' is the most natural rendering for the prefixed preposition
    with a town/place name.
- source_word: וַיְגָרֶשׁ
  chosen: drove ... out
  alternatives:
  - expelled
  - banished
  - cast out
  lexicon: HALOT
  rationale: גרשׁ often carries the sense of driving out or expelling. 'Drove ...
    out' preserves the force of removal while remaining idiomatic in English. 'Banished'
    may suggest a formal legal sentence not explicit in the Hebrew.
- source_word: זְבֻל
  chosen: Zebul
  rationale: Personal name transliterated by standard convention.
- source_word: גַּעַל
  chosen: Ga'al
  alternatives:
  - Gaal
  rationale: Personal name transliterated. The apostrophe helps reflect the ayin and
    distinguishes the pronunciation more transparently, though 'Gaal' is a common
    simplified English form.
- source_word: אֶחָיו
  chosen: his brothers
  alternatives:
  - his kinsmen
  - his companions
  lexicon: HALOT
  rationale: The noun is the ordinary word for 'brothers.' While in some contexts
    it can extend to kin or allies, there is no strong contextual reason here to move
    away from the familial term. This also aligns with the project's gender-accurate
    principle.
- source_word: מִשֶּׁבֶת
  chosen: from living
  alternatives:
  - from dwelling
  - so that they could not remain
  - from staying
  lexicon: HALOT
  rationale: The preposition מן with the infinitive construct of ישׁב expresses prevention/removal
    from residing in a place. 'From living in Shechem' communicates the result clearly
    in natural English. 'From dwelling' is more formal; 'so that they could not remain'
    is more interpretive.
- source_word: בִּשְׁכֶם
  chosen: in Shechem
  rationale: Place name transliterated. 'In Shechem' is the straightforward locative
    rendering.
