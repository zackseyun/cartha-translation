id: JDG.9.28
reference: Judges 9:28
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר גַּ֣עַל בֶּן עֶ֗בֶד מִֽי אֲבִימֶ֤לֶךְ וּ/מִֽי שְׁכֶם֙ כִּ֣י נַעַבְדֶ֔/נּוּ
    הֲ/לֹ֥א בֶן יְרֻבַּ֖עַל וּ/זְבֻ֣ל פְּקִיד֑/וֹ עִבְד֗וּ אֶת אַנְשֵׁ֤י חֲמוֹר֙ אֲבִ֣י
    שְׁכֶ֔ם וּ/מַדּ֖וּעַ נַעַבְדֶ֥/נּוּ אֲנָֽחְנוּ׀־־־־־׃
translation:
  text: And Gaal son of Ebed said, “Who is Abimelek, and who is Shechem, that we should
    serve him? Is he not the son of Jerubbaal, and Zebul his officer? Serve the men
    of Hamor, the father of Shechem! But why should we serve him?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Who is Abimelek, and what is Shechem...?' The Hebrew names 'Shechem'
      directly, likely referring metonymically to the city or its ruling community.
    reason: lexical_alternative
  - marker: b
    text: '''His officer'' may also be rendered ''his deputy'' or ''his appointed
      official.'''
    reason: lexical_alternative
  - marker: c
    text: That is, the people descended from or associated with Hamor, remembered
      as the father/founder of Shechem; compare Genesis 34.
    reason: cross_reference
lexical_decisions:
- source_word: מִי
  chosen: Who is
  alternatives:
  - What is
  lexicon: HALOT
  rationale: Interrogative pronoun used rhetorically to challenge status or legitimacy.
    In English, 'Who is ...?' best captures the contemptuous force directed at Abimelek
    and Shechem.
- source_word: שְׁכֶם
  chosen: Shechem
  alternatives:
  - the men of Shechem
  - the city of Shechem
  lexicon: HALOT
  rationale: The proper name likely stands metonymically for the city/community, but
    the Hebrew text names 'Shechem' directly. Retaining the name preserves the rhetoric
    and allows the metonymic sense to be inferred.
- source_word: כִּי נַעַבְדֶנּוּ
  chosen: that we should serve him
  alternatives:
  - that we should be subject to him
  - that we should work for him
  lexicon: HALOT
  rationale: עבד in this context denotes political service/subjection rather than
    ordinary labor. 'Serve him' is concise and idiomatic while preserving the political
    sense.
- source_word: הֲלֹא
  chosen: Is he not
  alternatives:
  - Isn't he
  - Surely he is
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Is he not' preserves
    the formal rhetorical force better than a more colloquial contraction.
- source_word: בֶן יְרֻבַּעַל
  chosen: the son of Jerubbaal
  alternatives:
  - Jerubbaal's son
  lexicon: HALOT
  rationale: A straightforward filial designation. The fuller form preserves the rhetorical
    emphasis on Abimelek's lineage.
- source_word: פְּקִידוֹ
  chosen: his officer
  alternatives:
  - his deputy
  - his commissioner
  - his overseer
  lexicon: HALOT
  rationale: פָּקִיד denotes an appointed official or subordinate administrator. 'Officer'
    is natural modern English and fits Zebul's role under Abimelek without over-specifying
    the office.
- source_word: עִבְדוּ
  chosen: Serve
  alternatives:
  - You should serve
  - Serve instead
  lexicon: HALOT
  rationale: Masculine plural imperative addressed to Gaal's hearers. The bare imperative
    preserves the sharpness of his taunt.
- source_word: אַנְשֵׁי חֲמוֹר אֲבִי שְׁכֶם
  chosen: the men of Hamor, the father of Shechem
  alternatives:
  - the descendants of Hamor, Shechem's father
  - the lords of Hamor, father of Shechem
  lexicon: HALOT
  rationale: אַנְשֵׁי literally 'men of' can denote the people associated with Hamor.
    Retaining 'men of Hamor' stays close to the Hebrew and preserves the allusion
    to the city's ancestral founder in Genesis 34.
- source_word: וּמַדּוּעַ
  chosen: But why
  alternatives:
  - And why
  - Why then
  lexicon: HALOT
  rationale: The conjunction plus interrogative marks a renewed challenge. 'But why'
    brings out the adversative, climactic force in English.
- source_word: אֲנָחְנוּ
  chosen: we
  alternatives:
  - we ourselves
  lexicon: HALOT
  rationale: The explicit pronoun adds emphasis in Hebrew. English can convey this
    adequately with stress in context; adding 'ourselves' would sound heavy-handed
    here.
