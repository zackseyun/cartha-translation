id: JDG.9.1
reference: Judges 9:1
source:
  edition: WLC
  text: וַ/יֵּ֨לֶךְ אֲבִימֶ֤לֶךְ בֶּן יְרֻבַּ֨עַל֙ שְׁכֶ֔מָ/ה אֶל אֲחֵ֖י אִמּ֑/וֹ
    וַ/יְדַבֵּ֣ר אֲלֵי/הֶ֔ם וְ/אֶל כָּל מִשְׁפַּ֛חַת בֵּית אֲבִ֥י אִמּ֖/וֹ לֵ/אמֹֽר־־־־־׃
translation:
  text: Now Abimelech son of Jerubbaal went to Shechem, to his mother's brothers,
    and spoke to them and to the whole clan of his mother's father's house, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the house of his mother's father' refers to his maternal family
      household or lineage.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: Now ... went
  alternatives:
  - And ... went
  - Then ... went
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Now' gives natural English
    narrative progression without wooden repetition of 'and,' while preserving the
    sequential force of the Hebrew verb הלך.
- source_word: אֲבִימֶלֶךְ
  chosen: Abimelech
  rationale: Personal name is transliterated according to the project's policy to
    transliterate names rather than translate them.
- source_word: בֶּן יְרֻבַּעַל
  chosen: son of Jerubbaal
  alternatives:
  - the son of Jerubbaal
  lexicon: HALOT
  rationale: A straightforward filial designation. 'Son of Jerubbaal' is the natural
    English equivalent and preserves the identifying relation.
- source_word: שְׁכֶמָה
  chosen: to Shechem
  alternatives:
  - toward Shechem
  lexicon: HALOT
  rationale: The directional he on the place name marks motion toward the city. In
    idiomatic English, 'to Shechem' best conveys the sense.
- source_word: אֶל אֲחֵי אִמּוֹ
  chosen: to his mother's brothers
  alternatives:
  - to his maternal brothers
  - to his mother's relatives
  lexicon: HALOT
  rationale: אֲחֵי literally means 'brothers.' In context these are his mother's brothers,
    i.e., maternal uncles. The more literal 'his mother's brothers' preserves the
    kinship term without over-paraphrasing.
- source_word: וַיְדַבֵּר אֲלֵיהֶם
  chosen: and spoke to them
  alternatives:
  - and said to them
  lexicon: HALOT
  rationale: דבר commonly means 'speak.' Since the verse then continues with לֵאמֹר
    introducing the content, 'spoke to them' avoids awkward repetition while remaining
    accurate.
- source_word: וְאֶל כָּל מִשְׁפַּחַת
  chosen: and to the whole clan
  alternatives:
  - and to all the family
  - and to the whole family group
  lexicon: HALOT
  rationale: מִשְׁפָּחָה denotes a kinship group broader than the nuclear family.
    'Clan' best captures the social unit in this context; 'whole' reflects כָּל.
- source_word: בֵּית אֲבִי אִמּוֹ
  chosen: of his mother's father's house
  alternatives:
  - of his maternal grandfather's household
  - of the house of his mother's father
  lexicon: HALOT
  rationale: The Hebrew is literally 'house of the father of his mother.' 'His mother's
    father's house' preserves the source structure and kinship emphasis. 'House' here
    carries the sense of household/lineage, but retaining 'house' keeps the idiom
    visible.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - and said,
  lexicon: HALOT
  rationale: This infinitive introduces the direct speech of the next verse. 'Saying,'
    is the standard and clear English equivalent.
